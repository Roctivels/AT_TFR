 china.900.t: "Der Wanderer"
 china.900.d: "In einer kleinen Straße in Marseille, Frankreich, schloss ein altes chinesisches Restaurant viel früher als gewöhnlich. Es war nicht so, dass es heute keine Gäste gab. Der Besitzer und Chefkoch, der alte Liu, saß drinnen und starrte konzentriert auf den alten Fernseher, auf dem normalerweise langweilige Kurzfilme liefen. \n\n"In Peking gibt es neue Entwicklungen: Ein außerordentlicher Kongress der Kommunistischen Partei Chinas hat Wang Yang zum neuen Präsidenten Chinas gewählt. In einer anschließenden Fernsehansprache forderte er ein Ende des Chaos und drängte auf politische Demokratisierungsreformen ..." \n\nOld Liu rechnete nach. Dies war sein 34. Jahr in Frankreich. Vor 34 Jahren war er ein aufstrebendes Talent gewesen, für dessen Studium in Peking seine gesamte Fabrik Geld zusammengespart hatte. Der junge Liu war einst der Stolz seiner Eltern und der Arbeiter. Doch das Schicksal hatte andere Pläne. Die sich verschlechternde Wirtschaftslage führte dazu, dass die Fabrik, in der seine Eltern ihr halbes Leben verbracht hatten, geschlossen wurde. Das Geld für die Studiengebühren ging zur Neige, und sein Vater bekam vor Sorge graue Haare. Der junge Liu konnte nicht verstehen, warum seine ehrlichen und fleißigen Eltern, die ihrem Land so lange gedient hatten, plötzlich zurückgelassen wurden. \n\nDann geriet Peking eines Tages in Aufruhr. Studenten führten Proteste an, und die Bürger schlossen sich ihnen an. Liu marschierte mit ihnen. Danach ging alles sehr schnell. Nach der letzten Warnung gab er dem Druck nach und kehrte nach Hause zurück. Am nächsten Tag erschien sein Gesicht im staatlichen Fernsehen, wo er unglücklicherweise in der Menge gefilmt worden war. Seine Eltern nutzten ihre Beziehungen, um ihn nach Frankreich zu schicken, wo er bei seinem Onkel unterkam, und schließlich ließ er sich nieder und arbeitete in diesem Restaurant. \n\nOld Liu vergaß nie die tränenroten Augen seiner Mutter, bevor er ging. Letztes Jahr kam ein Anruf: Sein Vater war verstorben. Liu konnte nicht zurückkehren. Er wagte es nicht. In stillen Nächten rauchte er ein paar chinesische Zigaretten, die ihm Schüler geschenkt hatten. Er fragte sich immer wieder, was er falsch gemacht hatte. Er wollte doch nur, dass sich die Gesellschaft verbesserte, dass sich China verbesserte. Wie konnte es so weit kommen, dass er nicht nach Hause zurückkehren und um seinen eigenen Vater trauern konnte?\n\nErst heute erstarrte der alte Liu lange genug, um zu erkennen, dass er endlich nach Hause gehen konnte. Vierunddreißig Jahre hatten den jungen Liu zum alten Liu gemacht. Die Wärme seiner Tränen hatte sich nie verändert. Vor seiner Abreise nahm er die Kalligraphie von der Wand, die er in seinem zwanzigsten Jahr in Frankreich geschrieben hatte: "Bist du Chinese?" "Liebst du China?" "Möchtest du, dass China besser wird?""
 china.900.a: ""Ja, das bin ich. Ja, das tue ich. Ja, das werde ich.""

 china.901.t: "Staub treibt dahin, die Flut steigt"
 china.901.d: ""Ich wurde im ersten Frühling des neuen China geboren. Damals gab es im Landkreis nur eine einzige asphaltierte Straße. An ihrem Ende brüllte die Fabrik wie ein unterirdisches Ungeheuer, Staub und Eisenspäne wirbelten durch die Luft, doch die Augen der Arbeiter glühten vor Entschlossenheit. Wir alle glaubten, dass unser Schweiß zu Stahl werden und den Weg für eine bessere Zukunft ebnen würde. Land wurde an Haushalte verteilt. Die Fabrik wurde stillgelegt. Einst voller Leben, kühlte sie ab wie Weihrauchasche in einem vergessenen Tempel und lag neben streunenden Hunden brach. \n\nDann gewann die Zeit an Fahrt. In den Neunzigern durchdrangen die Lichter der Küste die Dunkelheit der Nächte im Landesinneren. Nach 2000 schossen Städte wie Mais auf, sie wuchsen höher und schneller als Bambus. Der Landkreis jedoch hatte nichts mehr außer alten Männern und einem Markt, der von Tag zu Tag ruhiger wurde. \n\nIn den letzten Jahren hat sich die Welt erneut verändert. Gerüchte verbreiteten sich auf den Straßen. Die Preise stiegen. Alle Fabriken schlossen. Niemand wagte es, über die Zukunft zu sprechen. Sie klammerten sich nur an Gold und unverkaufte Wohnungen, als hinge ihr Leben davon ab. Dann wechselte die Führung in Peking. Man sagt, Wang Yangs Leute seien an die Macht gekommen. Sie versprachen, überschüssigen Stahl und Kohle abzubauen, um die Wirtschaft leichter und heller zu machen. Aber ich weiß, dass diese "Leichtigkeit" bedeutet, dass es hier weniger Arbeitsplätze für Arbeiter gibt. Mein Neffe liefert jetzt Pakete in Peking aus. Das Mädchen von nebenan arbeitet als Kassiererin in Shanghai. Keiner von beiden plant, zurückzukehren. Der neue Stadtplatz ist nachts leerer als ein ausgetrocknetes Flussbett. Bei einer Windböe hört man das Echo von Motorrädern aus längst vergangenen Jahren. Ich kann ihre Umrisse kaum noch erkennen. Die Zentralregierung sagt, der Weg vor uns sei lang, aber die Herzen der Menschen hier sind wie alternde Putzwände – scheinbar solide, doch ein leichter Windhauch kann sie zum Einsturz bringen. Dieser Landkreis fühlt sich an wie ein ausgehöhlter Brunnen. Sein Echo singt nur vergessene alte Lieder. Ich warte auf junge Schritte, so wie die Straßen auf die Rückkehr des Kochrauchs warten, aber beides kommt nie. Vielleicht wird diese Straße eines Tages zu einer Ruine verfallen, bedeckt von frischem Zement und Slogans. Licht legt sich nie auf Staub. Die heutige Zeit hat keinen Platz mehr für die Vergangenheit.""
 china.901.a: ""Die Flut ist der Hintergrund der Erinnerung; treibender Staub ist das Symptom unserer Realität.""

 china.902.t: "Die letzte Güte"
 china.902.d: "Ghanash lebte in einer Bergstadt nahe der chinesisch-indischen Grenze. Zwei lange Jahre lang hatte der Schatten des Krieges über diesem Ort gelegen. Chinesische Truppen hatten an der Grenze Manöver durchgeführt, ihre Stahlstiefel überquerten Bergrücken, während das Echo der Artillerie von den Klippen widerhallte. Zunächst blieb Indien in höchster Alarmbereitschaft und bereitete sich auf eine Katastrophe vor. Aber mit der Zeit ließ selbst die schärfste Wachsamkeit nach. Der einst gefürchtete Riese im Osten schien nun müde zu sein. Gerüchte über eine Niederlage auf der anderen Seite der Meerenge und die Gefahr erdrückender Reparationszahlungen wurden langsam zu Witzen, die man sich beim Tee erzählte. \n\nMit einer Dose Babynahrung unter dem Arm summte Ghanash eine kleine Melodie und freute sich darauf, in die Wärme seines Zuhauses zurückzukehren. Er ging an einem unbeschrifteten weißen Lieferwagen vorbei, und gerade als er sich seinem Auto näherte, streifte eine schwache Süße seine Sinne – reife Mango, dickflüssiger Pfirsichnektar. Instinktiv runzelte er die Stirn, doch bevor er nachdenken konnte, ertönten um ihn herum dumpfe Schläge. Die Menschen begannen nacheinander zusammenzubrechen, als wären sie Stängel, die nach der Ernte gefällt worden waren. Einige versuchten zu fliehen, stolperten jedoch und brachen nach wenigen Schritten zusammen, als hätte das Schicksal sie am Knöchel gepackt. \n\nVoller Angst sprang Ghanash in sein Auto und trat das Gaspedal durch. Er hatte keine Ahnung, was vor sich ging – nur, dass nun jede Sekunde über Leben und Tod entschied. Die Straßen verschwammen vor seinen Augen. Um ihn herum herrschte Chaos. Es fühlte sich an, als hätte eine unsichtbare Hand der Stadt den Atem geraubt. \n\nZuhause. Zuhause war das Einzige, woran er noch glauben konnte. Er blickte nie zurück, sondern strebte nur vorwärts. Er blieb vor seiner Tür stehen und stolperte hinaus. Die Süße haftete noch immer an ihm, wie der Tod, der Parfüm trägt. Seine Glieder wurden taub. Jeder Schritt fühlte sich an, als würde er das Gewicht eines Berges tragen. Aber er war ein Ehemann, ein Vater, und er zwang seinen versagenden Körper weiterzugehen. Gerade als seine Finger den Türknauf berührten, gaben seine Knie nach. Die Welt drehte sich heftig. \n\nDie Tür öffnete sich. Seine Frau fing ihn auf, Sorge lag auf ihrem Gesicht. Ihr Kind schlief tief und fest in seinem Bettchen, friedlich, als wäre die Katastrophe in der Welt nichts weiter als ein Traum. Erleichterung überkam ihn. Seine Augenlider wurden schwer und schlossen sich. Er war müde. Der heutige Tag war ein Abstieg in die Hölle gewesen, seine Gedanken waren hoffnungslos verwirrt. Doch jetzt wollte er nur noch schlafen."
 china.902.a: "Das ist die letzte Gnade, die wir unserem Feind gewähren können."

 china.903.t: "Beidahuang Group"
 china.903.d: "Über dem internationalen Flughafen Harbin Taiping sank ein Passagierflugzeug vom Typ COMAC C919 auf die Landebahn herab. Sui Longfu erwachte aus seinem leichten Schlaf und blickte nach draußen. Unter ihm erstreckten sich endlose grüne Reisfelder, die sich wie Wellen bewegten, während das Flugzeug vorbeirauschte. In seinem Traum war er wieder ein Kind geworden, zurück in die Zeit, als die staatlichen Farmen der Beidahuang-Group in voller Blüte standen. An Feiertagen gaben die Farmen Millionen für Feuerwerke aus, die den Nachthimmel erhellten, während sich die Kinder aller Arbeiter versammelten, um zu feiern. Im Winter säumten Eisskulpturen beide Seiten der Straßen, die mit einer Kunstfertigkeit geschaffen wurden, die der berühmten Harbin Ice and Snow World in nichts nachstand – wenn sie diese nicht sogar übertraf. \n\nDie Beidahuang-Group, einst bekannt als Heilongjiang Production and Construction Corps, fungierte als "Staat im Staat" mit eigener Polizei, Feuerwehr, Krankenhäusern, Schulen und sogar Gerichten. Diese Autonomie endete mit einem Dekret, das ihre Industrien unter die Kontrolle der lokalen Regierung stellte. Der Niedergang folgte rasch. Feuerwerke und Eisskulpturen verschwanden. Selbst die einst hell erleuchteten Straßen verdunkelten sich, da die Straßenlaternen nachts nicht mehr eingeschaltet wurden. Die Kinder der Arbeiter verließen in Scharen die Stadt, darunter auch Longfu. Wenn man heute an ein Produktions- und Baukorps denkt, assoziiert man es nur noch mit Xinjiang und vergisst, dass es einst auch in Heilongjiang eines gab. \n\nNur wenige wissen, dass General Wang Zhen das Korps ursprünglich in Heilongjiang gegründet hatte. Nun strebt die Zentralregierung eine Wiederbelebung des Korps an, einschließlich seiner Einheit in Heilongjiang. Massive Investitionen fließen in die Beidahuang-Gruppe, und unter der Führung von Soldaten haben die lokalen Zivilbeamten ihren Einfluss verloren. Die neue Militärverwaltung hat die Nachkommen des Korps, die über ferne Grenzgebiete verstreut sind, nicht vergessen. Die Wiederbelebung des Korps ist schließlich auch ein Mittel, um unruhige lokale Bürokraten in Schach zu halten. Die Söhne und Töchter des Corps waren schon immer loyaler als die ernannten Beamten. \n\nDiesmal brachte Sui Longfu einen Investitionsvorschlag aus Peking mit und kehrte mit der Hoffnung, den Nordosten wirklich wiederzubeleben, in seine Heimat zurück. Als das Flugzeug landete, fiel ihm der Blick auf die beiden hoch aufragenden Fahnenmasten vor dem Terminal: Auf dem einen wehte die rote Fünf-Sterne-Flagge, auf dem anderen die grüne Sonnenflagge von Beidahuang, die im Wind heftig flatterte."
 china.903.a: "Neuer Wein in alten Schläuchen."

 china.904.t: "Abschied"
 china.904.d: "Gerald S. Kowal starrte ausdruckslos auf das Flugticket in seiner Hand und war von einem tiefen Gefühl des Verlustes überwältigt. Einst war er ein bekannter amerikanischer Content-Ersteller auf Bilibili gewesen, der objektive Kommentare zur Entwicklung Chinas abgegeben und der Welt das wahre Gesicht des Landes gezeigt hatte. Er hatte auch für Yunnan-Kaffee geworben und sich damit die Zuneigung vieler chinesischer Zuschauer verdient. Doch nach der Niederlage in der Taiwanstraße änderte sich die Haltung gegenüber Ausländern drastisch. Seine Kommentarsektion füllte sich mit Feindseligkeiten. Die Worte trafen ihn immer wieder, anders als vor dem Krieg. Er hatte keine andere Wahl, als China zu verlassen. \n\nIn der überfüllten VIP-Lounge hörte er zufällig mehrere ausländische Führungskräfte über die jüngsten Ereignisse diskutieren: \n\n"Was in Liangmaqiao passiert ist, war so gravierend, und die Pekinger Polizei konnte nichts aufdecken ..." \n"Keine Wahl. Die Nationalmiliz hat der Polizei ihre Befugnisse entzogen. Sie kann nicht ermitteln." \n\n"Die Ausländer in Peking haben Angst. Mein Freund William ist gerade mit seiner Familie nach Dubai geflogen. Das ist jetzt der einzige sichere Ort." \n"Kaum. Die Vereinigten Arabischen Emirate sind voller saudischer Flüchtlinge. Wie sicher kann es dort schon sein?" \n"Wie sollen unsere Unternehmen bei solchen Entwicklungen überleben?" \n"Wenn das Leben selbst nicht sicher ist, kommt Geschäftstätigkeit nicht in Frage... Standard Chartered zieht sich dieses Jahr aus China zurück, einschließlich Hongkong." \n"Was? Sogar Hongkong?" \n\n"Nachdem die Nationalmiliz in Hongkong einmarschiert war, fühlten sich ausländische Unternehmen noch unwohler. Ganz zu schweigen von den Auswirkungen der beiden Aufstände. HSBC hat bereits mehr als die Hälfte seiner Aktivitäten in Hongkong eingestellt und alle Aktivitäten auf dem Festland eingestellt. Die Familie Kadoorie verkaufte alle ihre Peninsula-Hotels in China und kehrte nach Großbritannien zurück. Swire veräußerte ebenfalls seine Immobilienbesitze in China. Gerüchten zufolge wurde Cathay Pacific bereits von der Regierung übernommen." \n\nAls Gerald das hörte, wusste er, dass die alte Zeit vorbei war. Er fühlte sich wie ein einsames Schiff auf einem sternenlosen Meer. Der Bürgerkrieg hatte seine Heimat verschlungen, und der größte Teil seiner Familie war verschwunden. Jetzt stieß ihn auch seine zweite Heimat zurück. Er starrte auf die Flugzeuge, die vom Flughafen der Hauptstadt abhoben, und fragte sich, wohin seine Zukunft ihn wohl führen würde."
 china.904.a: "Die Durchsage ertönte. Er ging zum Gate und ließ sein zweites Zuhause hinter sich."

 china.905.t: "Reflektion"
 china.905.d: "Er hatte sich immer die beiden berühmten Zeilen vom Tiananmen-Platz zum Motto gemacht. Um ehrlich zu sein, hegte er keine wirkliche Feindseligkeit gegenüber dem japanischen Volk. Was er verachtete, waren die militaristischen Kriegsverbrecher und die reuelose Liberaldemokratische Partei. Er glaubte, dass die Menschen in Japan und China gleich seien, alle Teil einer globalen Familie. \n\nDennoch konnte er einfach nicht verstehen, warum Japan darauf bestand, sich in Chinas großes Vorhaben, Taiwan zu befreien, einzumischen. Fairerweise muss man sagen, dass er kein extremer Nationalist war. Dennoch wuchs in ihm die Ablehnung gegenüber Japan. Er war sich nicht sicher, ob dieses Gefühl gerechtfertigt war, aber das China von heute war nicht mehr das China von früher. Die antijapanische Stimmung, die lange Zeit still in der Öffentlichkeit brodelte, war nun verstärkt worden. \n\nIn China hat der Ausdruck "jeder ist" eine gewisse Kraft, und auch er war nicht immun gegen dessen Einfluss. Ursprünglich hätte er ein normales Leben als typischer Ingenieurstudent geführt. Aufgrund seiner schwachen Gesundheit hätte die Armee ihn niemals in Betracht gezogen. Doch unter der neuen Politik von Li Zuocheng war jeder Universitätsstudent zum Reservisten geworden. Wann würde sich die Frage stellen: Wie würde die Welt aussehen, wenn Japan nie in die Befreiung Taiwans eingegriffen hätte? \n\nLeider gibt es kein "Was wäre wenn". Er konnte nur mit dem Strom der Zeit schwimmen. Er hatte keine Lust, Menschen aus anderen Nationen auf dem Schlachtfeld gegenüberzutreten, aber die faschistische Regierung Japans hatte weder ihm noch dem japanischen Volk eine Wahl gelassen. Es war bedauerlich, dass beide Nationen unter dem Krieg leiden würden. \n\nGlücklicherweise hatten die extremen Ultranationalisten nicht die Macht übernommen, und Li Zuocheng gehörte nicht zu ihnen. Die Zukunft schien nicht ganz so düster. Er traf seine Entscheidung. Er würde sich der Armee anschließen. Egal was passierte, er war Teil Chinas. Er konnte die derzeitige Regierung ablehnen, aber er konnte die nationale Wiedervereinigung nicht behindern. \n\nVielleicht würde er in der Kampagne zur Befreiung Japans sogar einige Zivilisten beschützen können."
 china.905.a: "Unzählige andere müssen genauso empfinden wie er."


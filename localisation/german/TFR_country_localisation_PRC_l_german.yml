 china.122.t: "Chinesische Botschaft von Regierungstruppen angegriffen"
 china.122.d: "Nach einer Zunahme feindseliger Handlungen wurde die chinesische Botschaft in Urumqi vom Militär von Xinjiang angegriffen, und obwohl es gelang, den Angriff abzuwehren und die Hauptstadt zu besetzen, hat die Regierung von Xinjiang die Bevölkerung von Urumqi offen dazu aufgerufen, die chinesischen "Invasoren" zurückzuschlagen."
 china.122.a: "UNSERE Leute sind keine Invasoren!"
 china.122.b: "Wir müssen unsere Hauptstadt von den chinesischen Schweinen zurückerobern!"
 china.124.t: "Eine grundlegende Lösung für das Problem"
 china.124.d: "Peking, Sitzungssaal der Zentralen Militärkommission der Volksrepublik China. Xi Jinping, gekleidet in einen formellen Anzug, steht vor dem Oberkommando der Volksbefreiungsarmee. Seine Stimme klingt entschlossen und ohne den geringsten Zweifel. \n\n"Genossen! Die Geschichteändert sich erneut für uns. Die Japaner, diese ewigen Feinde der chinesischen Nation, sabotieren weiterhin die chinesische Staatlichkeit und mischen sich in unsere Angelegenheiten ein. Wir müssen entschlossen und ohne zu zögern handeln! China ist nicht nur ein Land. Es ist eine Zivilisation, es ist das Schicksal der Menschheit! Es ist unsere Pflicht, eine neue gerechte Ära des Sozialismus in Asien einzuläuten. Die Invasion Taiwans ist nicht nur eine militärische Operation. Sie ist einer der ersten Schritte zum endgültigen Triumph des Sozialismus und der chinesischen Nation! Genossen, ich fordere Sie auf, diese Entscheidung zu unterstützen. Die Zeit des Redens ist vorbei – die Zeit des Handelns ist gekommen!"\n\nEiner der Generäle stellt eine durchaus berechtigte Frage. "Aber sind wir jetzt wirklich bereit für eine Invasion? Wenn wir wirklich bereit sind, warum haben wir diese Invasion dann nicht schon früher gestartet?"\n\n"Nun ... ich wollte es einfach so! Ich wollte es jetzt sofort. Noch weitere Fragen?" konterte Xi geschickt.
 china.124.a: "Na dann, fangen wir gleich an!"

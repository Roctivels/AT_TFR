 china.1171.t: "Xinjiang erklärt Unabhängigkeit"
 china.1171.d: "Unter Berufung auf das jüngste Referendum haben sich Vertreter des Volkes von Xinjiang mit der Regierung getroffen, um die Zentralregierung zu verlassen. Unter Berufung auf die Umerziehungslager und die Unfähigkeit der Regierung, das einheimische Volk der Uiguren angemessen zu vertreten, haben die Vertreter verkündet, dass sie ab Mitternacht eine unabhängige, von China getrennte Nation sind."

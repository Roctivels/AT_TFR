 china.121.d: "Nachdem sich eine Parade zur Feier der han-chinesischen Volkszugehörigkeit zu einem größeren Protest in den Straßen von Urumuqi ausgeweitet hat, hat die Regierung von Yaghma ein umfassendes Verbot der chinesischen Sprache in Xinjiang angekündigt."

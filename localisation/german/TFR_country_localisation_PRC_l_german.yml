 china_collapse.1.t: "Kollaps der Zentralregierung in China"
 china_collapse.1.d: "Kurz nachdem die PDTO ein Waffenstillstandsabkommen mit China unterzeichnet hatte, wendete sich die Situation unerwartet zum Schlechteren. Statt Frieden zu bringen, löste der Waffenstillstand eine noch nie dagewesene Krise aus.\n\nNach der militärischen Niederlage war die chinesische Zentralregierung stark geschwächt und ihre Kontrolle über die Provinzen erschöpft. General Huang Ming, Befehlshaber der Pekinger Garnison, übernahm die Kontrolle über mehrere wichtige Einrichtungen in Peking, darunter Fernsehstationen, Verkehrsknotenpunkte und wichtige Verwaltungsbereiche. Ein Militärsprecher erklärte im Fernsehen, dies seien lediglich "notwendige Maßnahmen zur Aufrechterhaltung der Stabilität". Einige Regierungsstellen schwiegen, während andere widersprüchliche Erklärungen abgaben. Fast gleichzeitig erklärten die südlichen Provinzen ihre Autonomie, während der Nordwesten und der Nordosten in Aufruhr gerieten und die Befehle Pekings nicht mehr umsetzten.\n\nDie internationale Gemeinschaft stand unter Schock. Viele Regierungen forderten ihre Bürger auf, China zu verlassen, und ausländische Botschaften evakuierten ihre Mitarbeiter. In ganz Peking beeilten sich die Bürger, sich mit lebenswichtigen Vorräten einzudecken. Unterdessen hielt der bewaffnete Widerstand im Osten Pekings an. Informationen aus verschiedenen Quellen deuteten darauf hin, dass dieses Land mit 1,4 Milliarden Einwohnern vor der schwersten Regierungskrise seit seiner Gründung steht."
 china_collapse.1.a: "Die Welt schaut mit angehaltenem Atem zu."

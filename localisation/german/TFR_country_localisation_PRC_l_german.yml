 PRC_science_technocratic_state_dynamic_desc: "Eine chaotische, verworrene und irrationale Regierung wird unweigerlich im Sumpf endloser Selbstzweifel versinken. Es stimmt, in einem solchen System können Demokratie und Pluralismus scheinbar existieren - aber zu welchem Preis? Um den Preis von Interessengruppen, die in der Lage sind, "zwei plus zwei gleich fünf" als rationale Wahrheit zu verpacken; um den Preis einer aufgeblähten, ineffizienten und sogar korrupten Bürokratie, die hinter den Kulissen die Fäden zieht. Doch das heutige China hat sich längst von diesen Fesseln befreit. Wir treten in eine neue Ära ein, die von Technokraten geführt wird - eine Ära, in der eine rationale Regierung, die frei von Vorurteilen ist, sich auf Fakten stützt und der Effizienz verpflichtet ist, die Nation stetig in eine hellere und glorreichere Zukunft führt." 


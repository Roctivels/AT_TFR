 china.700.t: "Ein kleines Problem"
 china.700.d: "Die Meeresbrise strich sanft über den Hafen und trug den vertrauten Geruch von Salz und Meerwasser mit sich. Sun Jianguo war zu der U-Boot-Basis zurückgekehrt, auf der er viele Jahre gedient hatte, und beobachtete die dunklen Rümpfe, die still im Hafen lagen. In der Nähe der Anlegepfähle lehnten sich ein paar junge Matrosen, die gerade ihre Wartungsarbeiten beendet hatten, an die Reling, ihre Uniformen waren schweißnass. Keiner von ihnen bemerkte den alten Admiral, der nicht weit entfernt stand und leise sprach. \n\n"Endlich frische Luft", sagte einer der jungen Männer und wischte sich mit dem Ärmel über das Gesicht. "Wenn man länger dort unten bleibt, wird man noch verrückt." \n\n"Kein Scherz", antwortete ein anderer. "Nach wochenlangen Unterwasseroperationen ist es dort drinnen wie in einem Dampfbad. Die Luft ist so schlecht ... nach einer langen Schicht fühlt sich die Brust beim Atmen ganz eng an." \n\n"Enge Quartiere kann ich ertragen", murmelte der erste, "aber wenn geschossen wird, ist das etwas anderes. Ich werde nie vergessen, wie wir während der Schlacht um Taiwan endlich einen japanischen Tanker ins Visier genommen hatten. Der Waffenoffizier sagte, der Torpedovorrat sei fast aufgebraucht." \n\n"Genau. Unsere Ausrüstung ist solide, klar – aber wenn es darauf ankommt, reicht sie nie aus ..." \n\n"Ähem." Sun Jianguo räusperte sich leise hinter ihnen. Die Matrosen zuckten zusammen und sprangen sofort stramm, als sie ihn erkannten. "Guten Tag, Herr Admiral!" \n\nSun winkte mit der Hand, um ihnen zu signalisieren, sich zu entspannen. Sein Blick wanderte über ihre jungen, erschöpften Gesichter. Sein Gesichtsausdruck war streng, aber seine Stimme klang ruhig und warm. "Ich habe alles gehört." Die Matrosen erstarrten und wussten nicht, was sie sagen sollten. \n\n"Was ihr gesagt habt, ist wahr – und es ist ein ernstes Problem. Wenn die Ausrüstung knapp ist und die Logistik nicht mithalten kann, wird der Krieg mit Blut bezahlt werden." Er klopfte den beiden, die gesprochen hatten, auf die Schulter. "Ihr habt genug durchgemacht. Macht euch keine Sorgen – alles, was ihr gerade gesagt habt, werde ich Wort für Wort weitergeben und der Zentralen Militärkommission melden.""
 china.700.a: "'Diese Art von Problem muss unverzüglich gelöst werden.'"

 china.701.t: "Bericht über Probleme bei der Kampfbereitschaft und logistischen Unterstützung von SSN-Einheiten"
 china.701.d: "VON: Sun Jianguo\nDATUM:[GetDateText]\n\nGenossen der Zentralen Militärkommission,\nJüngste Inspektionen der SSN-Einheiten an der Front des Nordkommandos haben gravierende Mängel in der Logistik und Versorgung mehrerer Einheiten aufgedeckt, die direkt für die Kampfbereitschaft verantwortlich sind. Diese Probleme beeinträchtigen bereits die nachhaltige Einsatzfähigkeit und die Moral der Truppen.\n\nDie Hauptprobleme lassen sich wie folgt zusammenfassen:\n1. In bestimmten aktiven SSNs – insbesondere älteren Modellen – sind die Arbeits- und Lebensbedingungen extrem beengt. Lange Dienstzeiten unter hohen Temperaturen, hoher Luftfeuchtigkeit und schlechter Belüftung haben die Gesundheit und Moral unserer Besatzungen stark beeinträchtigt. \n\n2. Mehrere Frontbesatzungen und Waffenoffiziere berichteten, dass während der jüngsten Befreiungsoperationen wichtige Munition viel schneller als erwartet aufgebraucht war und der tatsächliche Bedarf die Auslegungsparameter der U-Boote bei weitem übersteigt. Dies hat gravierende Lücken sowohl in der Lagerhaltung als auch in der Nachschubkapazität für präzisionsgelenkte Munition und andere wichtige Verbrauchsmaterialien offenbart, die nach wie vor nicht ausreichen, um einen längeren, intensiven Krieg zu führen. \n\nDiese Probleme mögen in Friedenszeiten als versteckte Risiken erscheinen, würden sich jedoch in Kriegszeiten als fatal erweisen. Ich habe dem CMC empfohlen, eine Arbeitsgruppe einzurichten, die eine umfassende Prüfung der Kampfmunitionsreserven der SSN-Einheit durchführt, und spezielle Mittel bereitzustellen, um sicherzustellen, dass diese Probleme bei unseren SSNs der nächsten Generation nicht auftreten."
 china.701.a: "Genosse Sun hat uns einen großen Gefallen getan."
 china.701.b: "Angesichts der Gesamtlage muss die Marine Ausdauer lernen."
 

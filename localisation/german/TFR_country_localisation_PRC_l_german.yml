 PRC_operation_wu_qi_desc: "Genossen, hört ihr den Donner der Kriegstrommeln? Hört ihr die Schreie unzähliger unterdrückter asiatischer Völker? Dies ist die Mission unserer Generation! Lasst uns die Fackel der Revolution erheben, die tosenden Wellen des Pazifiks entfachen und die imperialistischen Kräfte, die ganz Asien plagen, vernichten. Nur wenn wir diese Unterdrücker ausrotten, können wir wahre Freiheit und Frieden bringen und die Würde und den Wohlstand der chinesischen Nation wiederherstellen!"

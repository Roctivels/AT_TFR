 #sub-sub ideologies
 xi_jinping_thought: "Xi-Jinping-Gedanke"
 xi_jinping_thought_desc: "\n\n\n\n£GFX_PRC_ideology_left_nationalism\n\n\n\n\n\nDer §YXi-Jingping-Gedanke§!, wie es der Cheftheoretiker der KPCh, Wang Huning, definiert hat, ist keine Vorhersage über die sozialistische Zukunft, sondern eher eine Zusammenfassung der Erfahrungen der vergangenen vierzig Jahre der Reform und Öffnung. Er betont, dass eine allumfassende Regierungspartei, d.h. die KPCh, alle Aspekte der Gesellschaft leiten soll, und dass der strenge Förderungsmechanismus der Partei und die ununterbrochenen Anti-Korruptionskampagnen die ideologische Reinheit der Vorhut sicherstellen werden. Um die ideologische Kluft innerhalb des Landes zu überbrücken, werden die Slogans "Gemeinsamer Wohlstand", "Chinesischer Traum" und "Nationale Verjüngung" verwendet, die dem wachsenden Nationalstolz und der Forderung nach sozialer Gerechtigkeit in China Rechnung tragen. Da sich Xis Position zunehmend stabilisiert, wird der Xi Jinping-Gedanke China auch in absehbarer Zukunft leiten."
 li_zuocheng_thought: "Li-Zuocheng-Gedanke"
 li_zuocheng_thought_desc: "\n\n\n\n£GFX_PRC_ideology_left_nationalism_li\n\n\n\n\n\nSo wie Mao das zersplitterte China wiedervereinigte und es von einem schwachen und verarmten Staat in eine mächtige revolutionäre Kraft verwandelte, hat Li Zuocheng im 21. Jahrhundert ebenfalls bemerkenswerte Leistungen bei der Verjüngung der Nation vollbracht. Ähnlich wie Mao hat Li das seit langem bestehende politische System und den ethischen Rahmen Chinas reformiert. Er hat einen Zustand der "permanenten Mobilisierung" wieder eingeführt, der einer Revolution gleichkommt, die Integration des Militärs sowohl in Friedens- als auch in Kriegszeiten modernisiert und es in das Gefüge der Nation integriert. Der §YLi-Zuocheng-Gedanke§! stellt eine tiefere Verschmelzung des "königlichen Weges" der linken Theorie und des pragmatischen "hegemonialen Weges" dar, der China mit der Vitalität und dem expansiven Ehrgeiz wiederbelebt, der an seine alten goldenen Epochen erinnert."

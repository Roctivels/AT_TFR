 china.81.a: "Die natürlichen Grenzen von Xizang sind wiederhergestellt"
 china.82.t: "Raketenangriff auf Taiwan!"
 china.82.d: "In einer schockierenden Eskalation hat China eine Reihe von Raketenangriffen auf Militärbasen und wichtige Infrastrukturen in ganz Taiwan gestartet. Die Angriffe, die in den frühen Morgenstunden erfolgten, haben die Insel in ein Chaos gestürzt, mit Explosionen in Taipeh, Kaohsiung und anderen wichtigen Städten. Die taiwanesischen Behörden fordern die Bevölkerung auf, Ruhe zu bewahren, während die Rettungsdienste um die Eindämmung der Schäden kämpfen. Ersten Berichten zufolge wurden militärische Einrichtungen und die Luftverteidigung schwer getroffen, was auf einen kalkulierten Versuch Pekings hindeutet, Taiwans Fähigkeit zur schnellen Reaktion zu lähmen. Dieser beispiellose Angriff stellt die direkteste Militäraktion Chinas gegen Taiwan in der jüngeren Geschichte dar und bringt den fragilen Status quo an den Rand des Zusammenbruchs.\n\nInJapan äußern Beamte tiefe Besorgnis, da sie befürchten, dass der Konflikt auf die gesamte Region übergreifen könnte. Tokio hat zur Zurückhaltung aufgerufen und gewarnt, dass jede Destabilisierung der Region weitreichende Folgen für Ostasien haben könnte. Während die diplomatischen Wege ungewiss bleiben, mobilisieren sich Taiwans Streitkräfte angesichts des überwältigenden Sperrfeuers, wohl wissend, dass ihre Reaktion in diesen kritischen Stunden über die Zukunft der Insel entscheiden kann."

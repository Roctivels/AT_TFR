 china.386.t: "Führungswechsel in Xinjiang"
 china.386.d: "Kürzlich wurde Ma Xingrui, der ehemalige Gouverneur der Provinz Guangdong, auf Beschluss der zentralen Behörden als Nachfolger von Chen Quanguo, Mitglied des zentralen Politbüros, zum neuen Sekretär des Parteikomitees der Uigurischen Autonomen Region Xinjiang sowie zum Ersten Politischen Kommissar und Ersten Sekretär des Produktions- und Baukorps Xinjiang ernannt. Während einer Begrüßungszeremonie stellte Chen Ma zusammen mit Vertretern der Zentralen Organisationsabteilung den Beamten von Xinjiang vor und ermutigte sie, ihre Arbeit unter der neuen Führung fortzusetzen, um noch größere Erfolge zu erzielen. In der Zwischenzeit wird Chen nach Peking zurückkehren, wo angekündigt wurde, dass er "eine andere Aufgabe" übernehmen wird.\n\nDieser Führungswechsel in Xinjiang kurz vor dem 20. nationalen Kongress der Kommunistischen Partei hat große Aufmerksamkeit erregt. Es wird erwartet, dass Ma als neuer Spitzenpolitiker in Xinjiang in das neu gebildete Politbüro gewählt wird und damit zu den mächtigsten Persönlichkeiten Chinas gehört. Es besteht auch ein großes Interesse daran, ob dieser zum Technokraten gewordene Luft- und Raumfahrtingenieur die umstrittene und strenge Politik seines Vorgängers ändern wird. Diese Fragen werden erst in Zukunft beantwortet werden."
 china.386.a: "Neue Führung, neue Richtung."
 china.387.t: "Führungswechsel in Tibet"
 china.387.d: "Kürzlich wurde Wang Junzheng, ehemaliger stellvertretender Sekretär des Parteikomitees der Uigurischen Autonomen Region Xinjiang und Sekretär der Kommission für politische und rechtliche Angelegenheiten, auf Beschluss der zentralen Behörden zum Nachfolger von Wu Yingjie als neuer Sekretär des Parteikomitees der Autonomen Region Tibet ernannt. Während der Übergabesitzung stellte Wu zusammen mit Vertretern der Zentralen Organisationsabteilung den tibetischen Beamten Wang vor und ermutigte sie, ihre Arbeit unter der neuen Führung fortzusetzen und nach neuen Erfolgen zu streben. Wu Yingjie wird aufgrund seines Alters zurücktreten und voraussichtlich eine ruhigere Rolle im NVK oder im CPPCC übernehmen.\n\nDie Ablösung des obersten tibetischen Führers ist auch Teil der bedeutenden personellen Umstrukturierung im Vorfeld des 20. Nationalkongresses der KPCh. Wang, der über umfangreiche Erfahrungen in Grenzregionen verfügt und eng mit dem "eisernen Regieren" in Xinjiang in Verbindung gebracht wird, das zu Sanktionen durch das Europäische Parlament führte, wird nun die Aufgabe haben, das politische Erbe des gebürtigen Tibeters Wu fortzuführen. Es bleibt abzuwarten, wie Wang diesen Übergang meistern wird."
 china.387.a: "Neue Führung, neue Richtung."
 china.388.t: "Führungswechsel in der Inneren Mongolei"
 china.388.d: "Kürzlich wurde Sun Shaocheng, der frühere Minister für Veteranenangelegenheiten des Staatsrates, auf Beschluss der zentralen Behörden zum Nachfolger von Shi Taifeng als Sekretär des Parteikomitees der Autonomen Region Innere Mongolei ernannt. Während der Übergabesitzung stellte Shi zusammen mit Vertretern der Zentralen Organisationsabteilung den Beamten der Inneren Mongolei Sun vor und ermutigte sie, ihre Arbeit unter der neuen Führung fortzusetzen und nach neuen Erfolgen zu streben. Shi Taifeng wird zur Chinesischen Akademie für Sozialwissenschaften wechseln, wo er als Präsident und Parteisekretär fungieren wird.\n\nDer Wechsel an der Spitze der Inneren Mongolei ist auch Teil der bedeutenden personellen Umstrukturierung im Vorfeld des 20. Als erfahrener Technokrat, der bereits verschiedene Positionen innehatte, tritt Sun nun in der Inneren Mongolei an, die nach Shis entschlossenen Maßnahmen zur Korruptionsbekämpfung und den Bemühungen um die Ausrottung separatistischer Ideologien eine politische Neuausrichtung erfahren hat. Wie Sun seine Fähigkeiten nutzen wird, um die Innere Mongolei zu regieren, bleibt eine Frage, die die Zukunft beantworten wird."
 china.388.a: "Neue Führung, neue Richtung."
 china.389.t: "Führungswechsel in Ningxia"
 china.389.d: "Kürzlich hat Liang Yanshun, der frühere stellvertretende Sekretär des Arbeitsausschusses der Zentral- und Staatsorgane, auf Beschluss der zentralen Behörden die Nachfolge von Chen Run'er als Sekretär des Parteikomitees der Autonomen Region Ningxia Hui angetreten. Während der Übergabesitzung stellte Chen Liang zusammen mit Vertretern der zentralen Organisationsabteilung den Funktionären der Region Ningxia vor und ermutigte sie, ihre Arbeit unter der neuen Führung fortzusetzen und nach neuen Erfolgen zu streben. Aufgrund seines Alters wird Chen Run'er zurücktreten und es wird erwartet, dass er eine ruhigere Rolle im NVK oder im CPPCC einnehmen wird.\n\nDie Ablösung des obersten Führers von Ningxia ist auch Teil der bedeutenden personellen Umbildung im Vorfeld des 20. Liang, der als Vertreter lokaler Funktionäre aus den ideologischen und wissenschaftlichen Forschungsabteilungen der Partei gilt, bringt jahrelange Erfahrung in der organisatorischen Personal- und Propagandaarbeit mit. Es bleibt abzuwarten, ob sein umfangreicher Hintergrund ihn in die Lage versetzen wird, die Nachfolge von Chen Run'er reibungslos anzutreten und Ningxia, das als das "Jiangnan des Nordens" bekannt ist, effektiv zu regieren."
 china.389.a: "Neue Führung, neue Richtung."
 china.390.t: "Führungswechsel in Guangxi"
 china.390.d: "Vor kurzem hat Liu Ning, der frühere Gouverneur der Provinz Liaoning, auf Beschluss der zentralen Behörden Lu Xinshe als Sekretär des Parteikomitees der Autonomen Region Guangxi Zhuang abgelöst. Während der Übergabesitzung stellte Lu zusammen mit Vertretern der Zentralen Organisationsabteilung den Guangxi-Beamten Liu vor und ermutigte sie, ihre Arbeit unter der neuen Führung fortzusetzen und neue Erfolge anzustreben. Lu Xinshe wird aufgrund seines Alters zurücktreten und voraussichtlich eine ruhigere Rolle im NVK oder im CPPCC einnehmen.\n\nDer Wechsel an der Spitze von Guangxi ist auch Teil der vielbeachteten Personalumbildung im Vorfeld des 20. Liu Ning, der in der Partei weithin als Experte für den Wasserschutz anerkannt ist, war an mehreren großen Wasserprojekten beteiligt, darunter das Süd-Nord-Wasserumleitungsprojekt. Er hat auch dringende Aufgaben wie die Erdbebenhilfe und die Bekämpfung von Überschwemmungen und Dürren geleitet. Es bleibt abzuwarten, wie Liu sein Fachwissen bei der Verwaltung dieser wasserreichen autonomen Minderheitenregion im Südwesten einsetzen wird."
 china.390.a: "Neue Führung, neue Richtung."
 china.391.t: "Ergebnisse der Wahlen in Hongkong bekannt gegeben"
 china.391.d: "Die mit Spannung erwartete Wahl des sechsten Chief Executive der Sonderverwaltungsregion Hongkong ist abgeschlossen. Nach den Turbulenzen des Jahres 2019 und dem Ausbruch der COVID-19-Pandemie im Jahr 2020 verlief diese Wahl bemerkenswert ruhig, mit nur einem registrierten Kandidaten: dem ehemaligen Chefsekretär John Lee, der mit wenig Spannung gewann. Als erster Chief Executive aus den disziplinierten Diensten seit 1997 markiert Lees Wahl den Beginn einer neuen Ära für Hongkong. Pro-Establishment-Gruppen, die Lee für seinen Hintergrund bei der Polizei loben, glauben, dass er dazu beitragen kann, Hongkongs soziale Wunden zu heilen. Andere befürchten jedoch, dass damit eine Ära autoritärer Politik beginnt, die Hongkong unweigerlich an die Einparteienherrschaft des chinesischen Mutterlandes angleichen wird.\n\nWährend seines Wahlkampfes betonte John Lee pragmatische Slogans und versprach, Hongkong schnell aus der wirtschaftlichen Rezession zu führen und wieder an die Weltwirtschaft anzubinden. Auch die chinesischen Behörden auf dem Festland haben über den Staatsrat und das Verbindungsbüro ihre volle Unterstützung für seine Arbeit bekundet. Ob Lee seine Versprechen inmitten des wachsenden globalen Chaos und unter den Augen skeptischer und misstrauischer Beobachter einlösen kann, bleibt abzuwarten."
 china.391.a: "Hallo, neuer CE!"

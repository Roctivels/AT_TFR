 china.1006.t: "Die Absolventen"
 china.1006.d: "Der alte Schulleiter Pei Qiming stand auf dem Podium, den Rücken leicht gekrümmt, aber immer noch aufrecht. Dies war die Abschlussfeier der Abschlussklasse der Jinling High School und gleichzeitig seine letzte Rede. Pei Qiming hielt sich mit einer Hand am Rednerpult fest und umklammerte mit der anderen das Mikrofon: "Schüler, ihr seid in einer Zeit des Friedens geboren, aber habt ihr euch jemals gefragt, woher dieser Frieden kommt?" Er hielt inne und fuhr fort: "Er kam von Bergen von Leichen und Meeren von Blut, von den Knochen unserer Vorfahren und Väter, von diesem Massaker, das nicht vergessen werden darf. Ihr müsst bedenken, dass nicht jedes Volk auf dieser Welt Würde verdient. Sie, dieser dreckige Abschaum auf dieser Insel, haben seit Urzeiten ihren niedrigen und flüchtigen Stolz durch Plünderung, Invasion und Abschlachten aufrechterhalten. Sie schaffen nichts, kultivieren nichts, wissen nichts von Wohlwollen, Rechtschaffenheit, Anstand und Etikette. Alles, was sie tun, ist, schlecht zu imitieren und gierig zu kapern."\n\n"Und heute steht ihr hier, weil ihr Nachkommen Chinas seid. Was ihr auf euren Schultern tragt, sind nicht nur die Erwartungen der Menschen in eurer Heimatstadt, sondern auch die Rachegelüste von achttausend Jahren Zivilisation. Ihr müsst zu Stahl werden, zur Klinge der Rache, und das Land, das noch immer mit dem Blut unserer Vorfahren befleckt ist, Stück für Stück zurückerobern. Ihr werdet die Bajonette aufspießen und diese Feiglinge, die sich in ihren Schildkrötenpanzern verstecken, aus ihren dreckigen Höhlen zerren und sie für die ungeheuerlichen Verbrechen ihrer Vorfahren bezahlen lassen!"\n\n"Studenten, ich glaube, ich werde die meisten von euch bald zurückkehren sehen. Ihr werdet Militäruniformen tragen, mit Medaillen, die ihr stolz auf eurer Brust tragt. Ihr werdet inmitten von Blumen und Jubel nach Hause zurückkehren, und an diesem Tag wird unser Hass, unsere Demütigung, weggewaschen werden.""

 china.372.t: "Könige des Krieges"
 china.372.d: "Wenn Kanonen die Königinnen der Kriegsführung des 19. Jahrhunderts waren und Panzer die Schlachtfelder des 20. Jahrhunderts beherrschten, dann sind Drohnen im 21. Jahrhundert zweifellos die neuen Könige des Krieges. Nachdem die Amerikaner Drohnen im Nahen Osten und in Afghanistan eingesetzt hatten, wurden die Drohnen immer größer, teurer und mit den neuesten und stärksten Waffen ausgestattet. Manchmal sind es jedoch nicht diese gigantischen „Dinosaurier", sondern die kleineren, oft nicht-militärischen "Bienen", die eine tödliche Rolle spielen.\n\nWenn wir uns den Drohnen zuwenden, die über den Dnjepr fliegen, fällt auf, dass die meisten ihrer Teile mit dem Logo eines einzigen Unternehmens versehen sind - DJI Innovations mit Hauptsitz in Shenzhen, China. Drohnen, die einst Pakete auslieferten, werfen nun Bomben auf feindliche Soldaten ab, und Drohnen, die einst atemberaubende Landschaften einfingen, filmen nun schwer bewachte Militärbasen, Logistiklager und marschierende Truppen.\n\nIn der Vergangenheit wurde häufig kritisiert, dass chinesische Drohnen "unsicher" seien oder "Nutzerdaten preisgeben". Jetzt werden sie beschuldigt, "die russische Aggression zu unterstützen" und „Geheimdienstinformationen zu stehlen". Wenn Menschen, ob aus Neugier oder Kritik, den DJI-Präsidenten fragen, ob seine Produkte auf osteuropäischen Schlachtfeldern eingesetzt werden, beginnt er immer damit, dass "Entscheidungen, die von Produktnutzern getroffen werden, nichts mit dem Unternehmen zu tun haben" und dass er sich "nicht für den Krieg interessiert", der Tausende von Kilometern entfernt in Europa stattfindet, während er seine Unschuld beteuert."
 china.372.a: ""Made in China" - mehr als Waschmaschinen und Mikrowellenherde."
 china.374.t: "Der Drache bleibt rot"
 china.374.d: "flavor event on behalf of zuocheng, he ponders that he didn't let the radicals come to power and china remains more or less communist"
 china.374.a: "ok"
 china.375.t: "Maos wahrer Erbe"
 china.375.d: ""Warum träume ich immer wieder von dir?" Selbst das Herz der Republik, das unaufhörlich schlägt, findet Momente des Innehaltens. Gegenüber dem endlos beleuchteten Platz des Himmlischen Friedens leuchtet schwach die marmorweiße Gedenkhalle des Vorsitzenden Mao. In der Stille der Nacht sucht hier eine einsame Seele Antworten bei dem unerschütterlichen Anker des Gründungsgedächtnisses der Republik: "Wollen Sie mir sagen, dass ich kein guter Führer sein kann? Ah, Vorsitzender, das wusste ich schon lange!"\nLi Zuocheng saß auf einem Mahagoni-Stuhl und starrte ausdruckslos auf den Kristallsarg, der von immerblühenden Blumen und grünen Zypressen umgeben war. Der große Führer hatte hier fast ein halbes Jahrhundert lang friedlich geruht. Er erinnerte sich an die Tage, als er zum ersten Mal ein ehrenvoller Soldat der PLA wurde, als Porträts des Vorsitzenden Mao, des großen Steuermanns, jede Kaserne schmückten. Damals war es sein größter Wunsch, einfach ein guter Soldat zu sein, und die Fürsorge des Vorsitzenden war immer da. Jetzt, als unbestrittener Führer der Republik und ihrer Armee, hatte er sich noch nie so weit von Mao entfernt gefühlt: "Aber was kann ich sonst tun? Dein Erbe wurde verleugnet und mit Füßen getreten, und das Volk, das du hochgehalten hast, ist in großer Not. Ich weigere mich, tatenlos zuzusehen, und deshalb bin ich so weit gekommen!" Inzwischen ging Li in der Gedenkhalle auf und ab. "Ich habe keine Angst, mich zu opfern. Haben Sie während des Langen Marsches und des Widerstandskrieges jemals den Weg der Partei für persönliche Vorteile aufgegeben? Nein, ich glaube nicht. Vielleicht wird die Partei mich trotzdem unterstützen. Schließlich ist es Ihre Partei, und Ihre Partei wird die letzte Hoffnung der Revolution nicht aufgeben." Lis rechte Hand ruhte sanft auf dem Sarg, sein Blick war auf das hoch aufragende Tor des Himmlischen Friedens gerichtet, wo ein anderer Vorsitzender Mao über ihn wachte. "Ich hoffe, Sie werden über mich wachen", flüsterte Li, "wachen Sie darüber, wie ich die Partei wieder aufbaue, wie ich dieses Land wieder aufbaue und wie ich diejenigen räche, die China geschadet haben. Wenn ich dir und Marx Bericht erstatte, hoffe ich nur, dass du dich daran erinnerst, dass, welche Sünden ich auch begangen haben mag, alles für dich, deine Partei und das Volk war." Mit diesen Worten verwandelte sich der einst verwirrte alte Mann wieder in den entschlossenen Heldengeneral. Er setzte seine Mütze mit dem roten Stern des 1. August auf und verließ die Gedenkhalle. Sein Adjutant wartete mit einem Stapel von Befehlen auf seine Unterschrift - die Zeit wartet auf niemanden."
 china.375.a: "Und so rückt der Zeitpunkt näher, an dem die Todesglocke für den Feind ertönt."
 china.376.t: "Meeting"
 china.376.d: "Das große 1. August-Gebäude ist das Gesicht und das Hauptquartier der PLA. Unzählige Offiziere, vom Leutnant bis zum General, werden aus dem ganzen Land herbeigerufen, um unermüdlich in diesem riesigen Gebäude zu arbeiten. Ihre Bemühungen nehmen schließlich in Form von geheimen Befehlen Gestalt an, die an Armeen, Flotten, Flugplätze und Raketenbasen weitergeleitet werden. \n\nIm Büro des Vorsitzenden des CMC im obersten Stockwerk starrte Li Zuocheng schweigend auf die beiden Offiziere, die an dem langen Tisch saßen. Liu Zhenli, Leiter der Abteilung für den Führungsstab, dem Gehirn der PLA, und Wang Haijiang, Kommandeur des westlichen Theaters, das fast die Hälfte der PLA-Bodentruppen umfasst und den Großteil des landgestützten Atomwaffenarsenals kontrolliert. Die beiden Männer vor ihm waren die mächtigsten "Warlords" seit der Niederlage auf der Insel Taiwan. Noch wichtiger war, dass Li diesen Kameraden vertraute, die an seiner Seite an der Front in Vietnam gekämpft hatten. \n\n"Kommen wir gleich zur Sache, die unmittelbare Priorität besteht darin, die Wunden unserer Nation und unseres Volkes zu heilen", begann Li unverblümt. "Was die derzeitige Machtverteilung angeht, so habe ich nicht die Absicht, sie zu ändern. Ich hoffe, Sie beide werden mit mir zusammenarbeiten, um die Autorität der Zentralregierung wiederherzustellen. China braucht eine starke Regierung, viel stärker als zuvor. Nach einem Moment des Nachdenkens ergriff Liu das Wort: "Bei allem Respekt, Sir, sollten wir angesichts der Tragweite dieser Angelegenheit nicht den stellvertretenden Vorsitzenden Zhang Youxia konsultieren? Er hat eine besondere Stellung innerhalb des Militärs..."\n\nLi unterbrach Liu mit einer Handbewegung. "Mir ist bewusst, dass er ein wichtiger Mentor für Sie war, Genosse. Sie müssen bedenken, dass es nicht die Zeit ist, parteipolitische Interessen in den Vordergrund zu stellen. Der stellvertretende Vorsitzende Zhang... er wird im Militär bleiben, aber nur als Galionsfigur. Dieses Arrangement kommt sowohl ihm als auch der Nation zugute."\n\nLiu und Wang tauschten einen kurzen, fast unmerklichen Blick aus, bevor sie sich wieder Li zuwandten. Unisono antworteten sie,"
 china.376.a: ""Zu Befehl, Herr Vorsitzender.""
 china.377.t: "Wahrer moderner Maoismus"
 china.377.d: "li zuocheng is a true maoist! yeah he's not opposed to many of deng's ideas, he allows a little capitalism... but that's not important. overall he's like lin biao, but better. he's a good military man, but has his own ideas, he emphasizes the importance of propaganda, people's war and something other interesting. this is the li zuocheng thought, the main ideologist of modern TRUE maoism"
 china.377.a: "ok"
 china.378.t: "Ende der schwachen Revolutionäre"
 china.378.d: "Es kommt ein Moment, in dem jeder Traum enden muss.\n\nObwohl die Mitternachtsglocke bereits geläutet hatte, blieb Hu Chunhua in seinem Büro und war mit der Durchsicht verschiedener Berichte und Dokumente beschäftigt. Er wagte nicht zu schlafen; selbst wenn er sich hinlegte, fand er keine Ruhe, um die Augen zu schließen. Immer, wenn er kurz vor dem Einschlafen war, wurde er durch das plötzliche Geräusch von Schritten vor seiner Tür wachgerüttelt. Seit sein Sicherheits- und Servicepersonal ausgetauscht worden war, hatte er jegliches Vertrauen in seine Umgebung verloren. Hu war davon überzeugt, dass seine neuen Wachen nur tatenlos zusehen würden, wenn sein Ende kam. \n\nHeute Nacht war er sich dessen sicherer denn je. Sieh ihn dir jetzt an: in den Sechzigern, mit grauem Haar und Glatze, kaum in der Lage, ohne seine Brille irgendwelche Dokumente zu lesen. Vielleicht würde bald der einzige aktive Teil seines Körpers - sein Gehirn - aufhören zu funktionieren. Aber auch hier dachte kaum noch jemand nach. Die ganze Nation war zu einem Militärlager geworden, die Menschen waren keine Lebewesen mehr, sondern nur noch Kugeln oder Bajonette. Und die Partei ... oh, die Partei, die ihn großgezogen hatte, war zu einem leblosen Leichnam verkommen. Li Zuocheng stand kurz davor, den totalen Sieg zu erringen, indem er alles zerstörte, was von den weitaus Größeren aufgebaut worden war als er selbst. \n\nNein, Hu konnte sie nicht so einfach davonkommen lassen. Er holte ein Tagebuch aus seiner Schublade, das er lange vorbereitet hatte. Vielleicht würden seine Aufzeichnungen eines Tages veröffentlicht werden, und die Menschen würden seine Geschichte lesen. Doch als er die Seiten auf dem Schreibtisch ausbreitete, musste er mit Schrecken feststellen, dass er nichts mehr schreiben konnte - sein Geist war leer. Obwohl sein Bewusstsein ihn anschrie, fehlte ihm die Kraft, den Stift zu heben. Und so fanden sie, als die gewaltigen Soldaten des Zentralen Gardekorps vorhersehbar die Tore öffneten, als Trupps den Staatsrat stürmten und umstellten und als sie die Bürotür von Hu aufbrachen, einen alten Mann vor, der völlig willenlos und leblos an seinem Schreibtisch saß und ein leeres Tagebuch vor sich hatte. \n\"Hu Chunhua, Sie sind wegen Verrats verhaftet", erklärte der leitende Hauptmann arrogant. Es erfolgte keine Reaktion. Zwei Soldaten traten vor und hoben ihn von seinem Sitz wie eine weggeworfene Einkaufstüte. Hu ließ einfach den Kopf hängen, als sei seine Seele bereits in eine andere Welt abgereist."
 china.378.a: ""Ich dachte, es wäre schwieriger als das hier", überlegte der Hauptmann."
 china.379.t: "Der Stern der Reformen ist verblasst"
 china.379.d: "Unter dem düsteren Himmel wogten graue Wellen über den kargen Strand von Beidaihe. Wang Yang schlenderte am Ufer entlang, seine Stimmung war so düster wie der Anblick vor ihm. Das Wetter war nicht kalt, man konnte es sogar als angenehm bezeichnen. Dennoch konnte er die klirrende Kälte unter seinem schwarzen Trenchcoat nicht abschütteln. Seit er aufgefordert worden war, aus Zhongnanhai auszuziehen und Peking zu verlassen, verfolgten ihn schattenhafte Spione überallhin. Egal, wohin er ging, unzählige Augen beobachteten ihn. Kameras waren auf jeden Winkel seiner Villa gerichtet. Jedes Stück Papier, das in den Papierkorb geworfen wurde, wurde akribisch untersucht und wieder zusammengesetzt. Die Hausmeister und Haushälterinnen, die in der Villa ein- und ausgingen, wurden ständig eingehend befragt, oder vielleicht waren sie selbst Spione.\n\nManchmal hatte Wang Lust, sich umzudrehen, diejenigen zu finden, die sich in seinem Schatten versteckten, und ein Gespräch mit ihnen anzufangen. Aber jedes Mal herrschte nur Stille hinter ihm. So sah sein Leben jetzt aus: Sein Lebensstandard war tadellos, aber es war ihm nicht erlaubt, zu sprechen, zu schreiben oder irgendwelche öffentlichen Veranstaltungen zu besuchen. Alles, was er produzierte, wurde von den Behörden als Gift betrachtet. \n\nEs hieß, dass sein Name innerhalb der Partei wiederholt kritisiert worden sei. Er galt nun als einer der größten Feinde der Partei. In den Augen der Parteimitglieder könnten seine Verbrechen sogar die einiger berüchtigter "Konterrevolutionäre" aus der Vergangenheit übertreffen. Wang wurde müde und lehnte sich gegen einen Felsen am Ufer, um sich auszuruhen. Er konnte nicht umhin, den Gedanken lächerlich zu finden, dass jemand seine Bewegungen an einen Offizier in Peking melden könnte, aber er wagte es nicht, dies zu zeigen.\n\nAls die Nachricht von der Niederlage auf der Insel Taiwan ganz Peking erschüttert hatte, hatte er gehofft, derjenige zu sein, der China retten würde. Selbst als Li Zuocheng an die Macht kam, blieb er hoffnungsvoll, weil er glaubte, dass das Militär einen zuverlässigen Beamten für die Verwaltung der zivilen Angelegenheiten brauchte. Als Xis Gefolgsleute vertrieben wurden, blieb er still. Als die naiven Linken zum Schweigen gebracht wurden, hielt er sich zurück. Jetzt war er selbst zur Zielscheibe geworden, und es gab niemanden mehr, der sich für ihn einsetzte. Wang lächelte innerlich bitter und gab es widerwillig zu:"
 china.379.a: "Das China, das er einst kannte, war längst verschwunden."

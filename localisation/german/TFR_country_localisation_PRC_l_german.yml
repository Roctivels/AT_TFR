 china.115.t: "Du bist kein Held"
 china.115.d: ""...Kürzlich gab ein Sprecher des Ministeriums für Nationale Verteidigung bekannt, dass das Land gemäß der jüngsten Änderung des Wehrdienstgesetzes der Volksrepublik China, die kürzlich vom Ständigen Ausschuss des NVK verabschiedet wurde, die Gesamtstärke seiner Streitkräfte auf fünf Millionen erhöhen wird..."\nKanal wechseln.\n"...Das Ministerium für Staatssicherheit hat erklärt, dass die Zahl der in unserem Land lebenden Ausländer angesichts des zunehmenden Bewusstseins für Spionageabwehr in unserer Bevölkerung einen historischen Tiefstand erreicht hat. Es wurden erhebliche Fortschritte bei der Stärkung des gesamten nationalen Sicherheitsrahmens erzielt..."\"Kanal wechseln.\n"...Die chinesische Nation war schon immer außergewöhnlich! Das chinesische Volk ist allen anderen Ethnien der Welt überlegen! Es ist unsere Pflicht, alle Imperialisten in der asiatisch-pazifischen Region auszurotten! Wir haben die Macht, alle Verbrecher der Vergangenheit vollständig zu vernichten!..."\nKanal wechseln, Kanal wechseln, Kanal wechseln.\n\nAls Stadt an der Frontlinie bleibt Xiamen in den anhaltenden Schatten des Krieges gehüllt. Die Stadt hat an Vitalität eingebüßt, und überall, wo man hinsieht, stehen behelfsmäßige Gedenkstätten für unschuldige Opfer, errichtet aus zerbrochenen Ziegeln und Trümmern. In einer Atmosphäre der Feierlichkeit und Verzweiflung verstecken sich die Menschen wie Einsiedlerkrebse in ihren kleinen Behausungen und schlucken stillschweigend die ihnen auferlegten Veränderungen. \nInmitten von Reihen identischer Wohnungen, in einem schwach beleuchteten Schlafzimmer, in dem der Fernsehbildschirm die einzige Lichtquelle ist - auch tagsüber -, sitzt ein älterer Mann mit ergrauendem Haar in einem Rollstuhl und schaltet ständig den Kanal um. Seine Hände zittern, und seine trüben Augen sind hinter einer dunklen Sonnenbrille verborgen, als hätte er Angst, der Welt direkt ins Gesicht zu sehen. Das schwache Licht wirft einen verschwommenen Umriss seines Gesichts, der ein Gefühl von vager Vertrautheit hervorruft.\nMit einem plötzlichen "Knacken" verstummt der Fernseher. Der LCD-Bildschirm zersplittert wie Schneeflocken und verteilt sich auf dem Boden. Die verkohlte Fernbedienung liegt still zwischen den funkensprühenden Bauteilen. Der ältere Mann lehnt tief in seinem Rollstuhl, seine geäderten Hände umklammern fest sein Gesicht. Die wimmernden Laute, die seinen Fingern entweichen, verdrängen das Fernsehgeräusch und sind das einzige Geräusch im Raum. Ein aufmerksamer Beobachter könnte zwischen den unaufhörlichen Schluchzern einen schwachen Satz heraushören: \n"Es ist alles meine Schuld... Hätte ich es nur besser machen können...""
 china.115.a: "Es ist ein Endspiel."
 china.116.t: "Referendum über die Unabhängigkeit Xinjiangs"
 china.116.d: "Nach reiflicher Überlegung hat das Gebiet von Xinjiang offiziell seine Absicht bekannt gegeben, ein Referendum über die Unabhängigkeit von unserer Regierung abzuhalten. Obwohl nur wenige in der Regierung die Loslösung Xinjiangs von unserer Regierung wünschen, wagt es niemand, sich dagegen auszusprechen, da die Männer, die ihre Absichten zur Erlangung der Unabhängigkeit bekannt gegeben haben, dieselben sind, die Xinjiang angeblich im Nationalen Volkskongress vertreten."
 china.116.a: "Eine offensichtliche Entscheidung: Bleiben!"

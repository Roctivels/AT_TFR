 china.276.a: "Wir müssen die Schwerkraft der Realität überwinden."
 china.277.t: "Erfolgreiche Umweltreform!"
 china.277.d: "Chinas rasantes Wirtschaftswachstum hat auch zu einigen der schlimmsten Umweltverschmutzungsprobleme der Geschichte geführt. Bodenerosion durch übermäßige Abholzung, Luft- und Wasserverschmutzung durch die Schwerindustrie und die Gefährdung vieler Tierarten aufgrund fehlender Vorschriften sind allesamt dringende Probleme, die angegangen werden müssen.\n\nSeit Xi Jinping an die Macht kam, hat die Regierung mehrere radikale umweltpolitische Maßnahmen eingeführt, und der Slogan \"Klare Gewässer und grüne Berge sind so wertvoll wie Gold und Silberberge\" ist zu einem geflügelten Wort geworden. In der Vergangenheit gab es Befürchtungen, dass strenge industrielle Beschränkungen zum Schutz der Umwelt zu einer wirtschaftlichen Rezession und weit verbreiteter Arbeitslosigkeit führen könnten. Diese Befürchtungen haben sich jedoch als unbegründet erwiesen. Durch die Umsetzung von Maßnahmen zur Modernisierung der Industrie, wie z. B. die Förderung der raschen Entwicklung der neuen Energiefahrzeugindustrie, sind viele umweltfreundliche Industrien, die beträchtliche Gewinne erwirtschaften können, zu führenden Motoren der chinesischen Wirtschaft geworden. Darüber hinaus hat die Nutzung neuer Energiequellen, einschließlich Kernkraft, Solarenergie und Wasserkraft, in China einen neuen Höchststand erreicht. Ein weiterer Vorteil der Umweltverbesserungen besteht darin, dass viele landschaftlich reizvolle Orte wieder geöffnet wurden, was der Tourismusindustrie Auftrieb gegeben hat.\n\nEs scheint, dass das Versprechen der Partei an das Volk wieder einmal erfüllt wurde: Die Wirtschaft wächst weiter, und die Lebensbedingungen haben sich erheblich verbessert."
 china.277.a: "Dank der Partei!"
 china.278.t: "Erfolgreiche Armeereform!"
 china.278.d: "Im Militärmuseum der Chinesischen Volksrevolution in Peking findet derzeit eine Ausstellung statt, die die Ergebnisse der jüngsten Modernisierungsreformen der PLA zeigt. Die Besucher, darunter Kader, Soldaten und Bürger, strömen in Scharen herbei. Die Ausstellung zeigt eine Vielzahl von Ausrüstungsgegenständen, wie z. B. neue Tarnuniformen und Drohnen, begleitet von ausführlichen Erklärungen und Dateninterpretationen. Die beliebteste Ausstellungshalle zeigt sorgfältig gefertigte Großmodelle von aktiven Schiffen, Flugzeugen, Panzern und Raketen, die in Paradeformation angeordnet sind. Diese Anordnung sorgt für eine starke visuelle Wirkung und macht die Modernisierung der PLA sehr greifbar.\n\n Darüber hinaus hat sich die Berichterstattung über die gemeinsamen Übungen der PLA auf dem CCTV-Militärkanal drastisch verändert. Beobachter haben festgestellt, dass die neue Militärdoktrin der PLA aktiv umgesetzt zu werden scheint. Szenen von Panzergruppenangriffen und Schießereien zur See werden seltener und durch Bilder von PLA-Soldaten ersetzt, die intelligente Terminals verwenden und mit Aufklärungsrobotern arbeiten. Neue geheimnisvolle schwere Waffen, wie z. B. ein Schützenpanzer mit einem einzigartigen Turm und ein schnittiges schwarzes Flugzeug, erscheinen gelegentlich auf dem Bildschirm.\n\nSowohl normale Bürger als auch erfahrene Offiziere sind sich einig, dass die PLA zu einer beeindruckenden Streitmacht geworden ist, deren nachgewiesene Kampffähigkeiten zunehmend ihren früheren Behauptungen entsprechen."
 china.278.a: "Vorwärts!"
 china.279.t: "Ehemaliger Generalsekretär Jiang Zemin verstorben"
 china.279.d: "Seit dem Tod von Deng Xiaoping im Jahr 1997 hat das chinesische Volk erneut die Beerdigung eines überragenden Führers erlebt - Jiang Zemin, ehemaliger Generalsekretär der Kommunistischen Partei Chinas, der 1926 geboren wurde und in Shanghai an einem durch Leukämie verursachten Multiorganversagen verstarb. Das Zentralkomitee der KPCh und andere hochrangige Regierungs- und Militäreinrichtungen gaben die Nachricht in einem \"Brief an die Partei, die Armee und das Volk\" in düsterem Ton bekannt. Obwohl Jiang nach chinesischen Maßstäben ein langes Leben hatte, löste sein Tod in der chinesischen Öffentlichkeit Trauer und Betroffenheit aus. Jiangs Amtszeit als Generalsekretär fiel mit einem goldenen Zeitalter für Chinas Wirtschaft zusammen, das durch eine boomende Kultur- und Unterhaltungsindustrie und ein steigendes internationales Ansehen gekennzeichnet war, so dass er weithin in Erinnerung blieb. Darüber hinaus hinterließen Jiangs persönliches Charisma und sein seltener Sinn für Humor als chinesischer Führer einen bleibenden Eindruck. Auch wenn Jiang zweifellos ein Staatsbegräbnis erhalten wird, so wird sein Ansehen vielleicht besser durch die Menschen widergespiegelt, die zu den Toren seines früheren Wohnsitzes in Yangzhou eilen, um ihn auf ihre eigene Weise zu betrauern, als durch extravagante Zeremonien."
 china.279.a: "Dieses Land wird vielleicht nie wieder jemanden wie ihn sehen..." 
 china.280.t: "China bittet um militärischen Zugang"
 china.280.d: ""
 china.280.a: "Ok."
 china.281.t: "Afghanistan akzeptiert!"
 china.281.d: "Vor kurzem hat die afghanische Taliban-Regierung mit der chinesischen Regierung ein Abkommen geschlossen, das der chinesischen Volksbefreiungsarmee begrenzte Durchgangsrechte einräumt und es ihren Truppen ermöglicht, durch den Wakhan-Korridor in Afghanistan nach Nordpakistan zu gelangen. Nach dem Ausbruch des Konflikts suchte Pakistan rasch Hilfe bei China und hoffte auf militärische Unterstützung. Angesichts der langjährigen freundschaftlichen Beziehungen zwischen China und Pakistan und der Dringlichkeit der Situation in der Region beschloss die chinesische Regierung, Pakistan militärische Soforthilfe zu gewähren, einschließlich moderner Waffen, logistischer Unterstützung und Militärberatern.\n\nAllerdings stellten die geografischen Gegebenheiten China bei der Bereitstellung von Hilfe für Pakistan vor erhebliche Herausforderungen. Das Grenzgebiet zwischen China und Pakistan liegt im Karakorum-Gebirge mit Höhen von mehr als 4.000 Metern, wo das Gelände zerklüftet und der Transport schwierig ist und sich nicht für große Militärtransporte eignet. Außerdem hat die indische Marine die pakistanische Küste blockiert und damit die Seewege Pakistans abgeschnitten. Unter diesen Umständen wurde die Nutzung Afghanistans als Transitroute zu Chinas einziger praktikabler Option für die Lieferung von Hilfsgütern nach Pakistan.\n\n Derzeit hat die PLA damit begonnen, militärische Güter sowohl über Land- als auch über Luftwege nach Pakistan zu transportieren. Berichten zufolge haben die großen Transportflugzeuge der chinesischen Luftwaffe damit begonnen, erhebliche Mengen an Waffen und logistischem Material nach Pakistan zu liefern, darunter Panzer, gepanzerte Fahrzeuge, Artillerie, Raketen und andere schwere Waffen. Darüber hinaus haben sich einige PLA-Einheiten bereits von Xinjiang aus auf den Weg gemacht und sind über Afghanistan in pakistanisches Gebiet eingedrungen."
 china.281.a: "Lasst uns mit der Show beginnen."
 china.282.t: "China bittet um militärischen Zugang"
 china.282.d: ""
 china.282.a: "Natürlich werden wir ihnen helfen."
 china.282.b: "Wir werden unsere indischen Verbündeten niemals verraten!"
 china.283.t: "Russland akzeptiert!"
 china.283.d: "Vor kurzem hat die Regierung von [SOV.GetName] eine Vereinbarung mit der chinesischen Regierung getroffen, die der chinesischen Volksbefreiungsarmee begrenzte Durchgangsrechte einräumt und es ihren Streitkräften ermöglicht, durch den Wakhan-Korridor in Afghanistan nach Nordpakistan zu gelangen. Nach dem Ausbruch des Konflikts suchte Pakistan rasch Hilfe bei China und hoffte auf militärische Unterstützung. Angesichts der langjährigen freundschaftlichen Beziehungen zwischen China und Pakistan und der Dringlichkeit der regionalen Situation beschloss die chinesische Regierung, Pakistan militärische Soforthilfe zu gewähren, einschließlich moderner Waffen, logistischer Unterstützung und Militärberatern. Das Grenzgebiet zwischen China und Pakistan liegt im Karakorum-Gebirge mit Höhen von mehr als 4.000 Metern, wo das Gelände zerklüftet und der Transport schwierig ist und sich nicht für große Militärtransporte eignet. Außerdem hat die indische Marine die pakistanische Küste blockiert und damit die Seewege Pakistans abgeschnitten. Unter diesen Umständen wurde die Nutzung Afghanistans als Transitroute zu Chinas einziger praktikabler Option für die Lieferung von Hilfsgütern nach Pakistan.\n\nDerzeit hat die PLA damit begonnen, militärische Güter sowohl auf dem Land- als auch auf dem Luftweg nach Pakistan zu transportieren. Berichten zufolge haben die großen Transportflugzeuge der chinesischen Luftwaffe damit begonnen, erhebliche Mengen an Waffen und logistischem Material nach Pakistan zu liefern, darunter Panzer, gepanzerte Fahrzeuge, Artillerie, Raketen und andere schwere Waffen. Darüber hinaus haben sich einige PLA-Einheiten bereits von Xinjiang aus auf den Weg gemacht und sind über Afghanistan in pakistanisches Gebiet eingedrungen."
 china.283.a: "Lasst uns mit der Show beginnen."
 china.284.t: "Russland hat abgelehnt."
 china.284.d: "Kürzlich lehnte die Regierung von [SOV.GetName] öffentlich das Ersuchen der chinesischen Regierung ab, der Volksbefreiungsarmee die Durchreise durch afghanisches Gebiet zu gestatten, um Pakistan beim Widerstand gegen eine indische Militäroffensive zu unterstützen. Berichten zufolge hatte China in mehreren Gesprächsrunden mit der Regierung von [SOV.GetName] versprochen, die Souveränität und territoriale Integrität Afghanistans während des Transits zu respektieren, und im Gegenzug wirtschaftliche Unterstützung angeboten.\n\nChinas Plan sah die Entsendung eines großen Militärkontingents durch afghanisches Territorium nach Pakistan vor, darunter mehrere schwer bewaffnete mechanisierte Divisionen, Luftwaffeneinheiten und umfangreiches logistisches Unterstützungspersonal und Nachschub. Die chinesische Regierung wollte dem pakistanischen Militär bei der Abwehr der indischen Streitkräfte schnell und wirksam helfen, um Frieden und Stabilität in der Region zu erhalten. Ein Sprecher von [SOV.GetName] erklärte, dass das afghanische Volk nach Jahrzehnten des Krieges nicht in einen regionalen Konflikt hineingezogen werden wolle."
 china.284.a: "Wir müssen uns mit dem begnügen, was wir haben."
 china.285.t: "Invasion von Bangladesch?"
 china.285.d: ""
 china.285.a: "Volle Kraft voraus...!"
 china.286.d: "Xi Jinping hat [SOV.GetLeader] angerufen und angeboten, in Moskau ein Zentrum für Xis Gedanken zu errichten!"
 china.286.d: "Um die chinesisch-russischen Beziehungen weiter zu vertiefen, hat die chinesische Regierung beschlossen, gemeinsam mit Russland ein Zentrum für Xi Jinping-Gedanken in Moskau einzurichten, um Xi Jinpings Vision des Sozialismus mit chinesischen Merkmalen für eine neue Ära zu studieren und zu fördern. Diese Entscheidung hat auf der internationalen Bühne eine heftige Debatte ausgelöst, bei der sowohl Befürworter als auch Kritiker ihre Ansichten zum Ausdruck brachten. Die Moskauer Staatsuniversität, Russlands älteste und renommierteste Institution, wurde als Standort für dieses Zentrum ausgewählt. Das in einem neoklassizistischen Gebäude aus dem 18. Jahrhundert untergebrachte Zentrum wurde sorgfältig renoviert und modernisiert und verfügt über eine Bibliothek mit chinesischen und russischen Ausgaben von Xi Jinpings Werken sowie über einschlägiges Forschungsmaterial für Wissenschaftler und Studenten. Westliche Kritiker behaupten, China nutze das Zentrum, um seine Ideologie zu exportieren, während bestimmte Oppositionsgruppen in Russland das Narrativ der \"chinesischen Bedrohung\" verstärken, um der russischen Öffentlichkeit Angst einzujagen. Als Reaktion auf diese Kritik betonte der Sprecher des russischen Außenministeriums bei einer regelmäßigen Pressekonferenz, dass das Xi Jinping Thought Center eine offene Plattform für den akademischen Austausch sei, die Wissenschaftler aus der ganzen Welt zu Forschungs- und Dialogzwecken empfängt, und dass Russland nicht die Absicht habe, es als ideologisches Instrument zu nutzen."
 china.286.a: "Tolle Idee!" 
 china.285.b: "Ich denke nicht, dass wir das tun sollten."

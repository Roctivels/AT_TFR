 china.617.t: "Der erste Kaiser des Volksreichs"
 china.617.d: "Nach der Gründung des Volksimperiums wurde die Frage, wie der "Gründervater" der Nation bezeichnet werden sollte, sowohl innerhalb als auch außerhalb der Partei intensiv diskutiert. Nach umfassenden Beratungen über die historischen Beiträge, das Volksempfinden und die nationale Legitimität fasste die höchste Instanz des Volksreiches einen förmlichen Beschluss: Genosse Mao Zedong sollte offiziell als Gründerkaiser des chinesischen Volksreiches verehrt werden.\n\nMao Zedong war nicht nur ein großer Revolutionsführer - er war die erste Persönlichkeit in der chinesischen Geschichte, die die Mission der nationalen Einigung, des sozialen Wandels und der nationalen Verjüngung wirklich im Namen des Volkes erfüllte. Unter seiner Führung besaßen Hunderte Millionen von Bauern zum ersten Mal Land, die Arbeiter wurden zu den wahren Herren des Staates, und die chinesische Nation konnte sich auf der Weltbühne behaupten. Er stürzte nicht nur die alte Ordnung - er schuf eine völlig neue Welt, die vom Volk und für das Volk errichtet wurde.\n\nIm Gegensatz zu den alten Kaisern, die durch Blutlinien und militärische Eroberungen an die Macht gelangten, kam Mao Zedongs Autorität aus den Massen, aus Überzeugung, aus der Unausweichlichkeit der Geschichte. Er war kein Kaiser im traditionellen Sinne, sondern die Verkörperung des historischen Willens des Volkes - ein lebendiges Symbol für den Weg der Nation von der Erniedrigung zur Souveränität, von der Schwäche zum Licht. \n\nDaher erklärt das Volksreich hiermit, dass Mao Zedong von diesem Tag an posthum mit dem Titel "Großer Ahnenkaiser" geehrt wird und dass sein Porträt, seine Schriften und sein Geist im Zentrum der offiziellen moralischen und staatsbürgerlichen Unterweisung des Reiches verankert werden, um sicherzustellen, dass sein Gedanke über die Generationen hinweg weitergegeben wird und niemals verblasst."
 china.617.a: "Die rote Nation soll durch die Jahrhunderte weitergegeben werden!"
 china.618.t: "Wiederbelebung der Tradition"
 china.618.d: "Als Li Mubai jung war, studierte er klassische chinesische Literatur an der Universität Zhengzhou. Damals dachte er oft, dass es für jemanden wie ihn nur zwei Möglichkeiten gab - entweder Zement auf einer Baustelle zu transportieren oder sich mit einem Job in einer Bibliothek durchzuschlagen. Wer interessierte sich in jenen Jahren noch für das Buch der Lieder oder den Zuo-Kommentar? Selbst er konnte nicht mit Sicherheit sagen, warum er diese Texte immer wieder las.\n\nAber jetzt hörte er oft Kinder auf der Straße die Analecten rezitieren. In den Theatern wurde "Der Pfirsichblütenfächer" aufgeführt. In den Schulen waren Lektionen über Rituale und kindliche Pietät zum Standard geworden. Sogar an der Mittelschule, an der er unterrichtete, hingen die Schriftzeichen für „Lehrer" über der Tafel, und die morgendlichen Lesestunden hatten sich von Englisch auf das Große Lernen und Mencius verlagert. Die Wolkenkratzer von Zhengzhou ragten immer noch in die Höhe, und die U-Bahn fuhr immer noch, aber zwischen dem Stahl und dem Glas konnte man oft neu gebaute Gebäude mit geschwungenen Dächern entdecken - rekonstruierte Akademien oder kompakte Zeremonienhallen. Teehäuser hatten Hochkonjunktur, und sogar Bubble-Tea-Läden hatten ihre Beschilderung gegen Siegelschrift ausgetauscht.\n\nLi Mubai fühlte sich nicht mehr von der Zeit überholt. Jeden Tag, wenn er im Klassenzimmer seinen Schülern dabei zusah, wie sie die Schriftzeichen für ren, yi, li, zhi - Wohlwollen, Rechtschaffenheit, Anstand, Weisheit - schrieben, spürte er, wie sich in seinem Herzen ein ruhiges Gefühl der Gewissheit einstellte. Er erinnerte sich an einen Satz, über den er einmal in der Schule gestolpert war: "Alles unter dem Himmel ist das Land des Herrschers; der Aufstieg von Ritual und Tugend liegt in den Herzen der Menschen."\n\n An diesem Abend, als er am Schultor stand, begannen die Lichter der Türme in der Ferne zu flackern, eines nach dem anderen. Dann öffnete er sie wieder und sah -"
 china.618.a: "Zehntausend Lichter, die sich über den Horizont erstrecken."
 china.619.t: "Opernbesuch"
 china.619.d: "Zhou Lianhou saß in der vierten Reihe des Großen Schauspielhauses, den Körper leicht nach vorne gebeugt, den Blick auf die Bühne gerichtet. Das Stück des heutigen Abends war "Hai Rui, aus dem Amt entlassen". Der Schauspieler, der Hai Rui spielte, hatte eine Stimme wie gehämmerter Stahl. Als er sang: "Die Verwandtschaft bevorzugen und das Gesetz vergessen - wie kann das ein rechtschaffener Mann sein?", nickten viele im Publikum zustimmend. Die Oper war auf ihrem Höhepunkt - Hai Rui prangerte korrupte Beamte an und schlug sein Denkmal in gerechtem Zorn nieder.\n\nZhou hob seine Teetasse und tippte sanft mit dem Finger auf den Deckel. Er stammte aus einer Familie der roten Kader. Nach seinem Universitätsabschluss hatte er seine politische Karriere in Ma'anshan begonnen und war dann nach Changshu gewechselt, wo er in der Organisation und in der Planungskommission arbeitete und sich langsam zu einer Position auf Provinzebene hochgearbeitet hatte. Neben ihm saß ein alter Kollege, Wu Zhiqiang, der schon lange im Ruhestand ist und ihm heute Abend rein zufällig über den Weg lief. Während eines Zwischenspiels beugte sich Wu vor und flüsterte: "Hey... der Weg, den wir zurückgelegt haben - vom Vorsitzenden Mao, der die Partei anführte, um Land von den Großgrundbesitzern zu beschlagnahmen, bis zu dem Punkt, an dem wir jetzt sind... Sag mal, fühlt es sich nicht so an, als hätten wir uns im Kreis gedreht?"\n\nZhou sagte nichts, nippte nur an seinem Tee, den Blick immer noch auf die Bühne gerichtet. Er wusste es besser, als zu antworten - nicht aus Angst, sondern weil es keinen Grund dazu gab. Wu seufzte und sagte nichts mehr. Die Oper wurde fortgesetzt. Hai Rui, der nun aus dem Amt entlassen war, nahm seinen Platz wieder ein, unbeirrt. Seine Abschiedsarie hallte von Trauer wider, war aber auch von Entschlossenheit durchzogen. \n\nZhou saß regungslos da. Es war nicht so, dass er nicht verstand, was Wu meinte. Die Kommunistische Partei hatte sich an die Macht gekämpft, um die Reaktionäre aus China zu vertreiben und auf den Trümmern der alten eine neue Nation für das Volk aufzubauen. Aber letztendlich war es die Kommunistische Partei, die den Kaiser zurückgerufen hatte. Doch das war nichts, was er kommentieren sollte. Nicht jetzt. Nicht hier. Er sah sich gerade ein Theaterstück an. Und was in einem Theaterstück vorkommt, war nie für einen Kommentar gedacht."
 china.619.a: "Der Ärger beginnt auf der Zunge."
 china.620.t: "Der Bauer"
 china.620.d: "Song Mancang hockte am Rande seines Feldes und zündete sich eine Sun Island-Zigarette an. Der Rauch wehte seitwärts im Wind. Er zückte sein Handy und überprüfte die Daten des Gewächshauses - Temperatur genau richtig, Luftfeuchtigkeit gleichmäßig. Auf dem Monitor konnte er sehen, wie sich die Gurkenreben an den Schnüren entlang rankten und die Salatreihen im Boden schnell wuchsen. Die Bewässerungsanlage zischte leise im Hintergrund. Alles sah solide aus.\n\n"Gut. Wirklich gut", murmelte er - nicht zu jemand Bestimmten, nur die Art von Worten, die einem alten Mann herausrutschen, wenn er sieht, dass seine Arbeit gut läuft. Er war jetzt fast siebzig. Geboren und aufgewachsen in Long'an Tun, hatte er sein ganzes Leben lang Landwirtschaft betrieben. Früher war es bitter - Kerosinlampen, Bezugsscheine, das Überstehen des Neujahrsfestes - aber jetzt hat sich alles geändert. Das Dorf hatte eine Zentralheizung, gepflasterte Straßen führten direkt ins Stadtzentrum, und in der Nähe des Eingangs war gerade eine nagelneue Klinik gebaut worden. Zwei junge Ärzte, die beide von der Universität kamen, arbeiteten dort im Schichtdienst. Man konnte sogar Röntgenaufnahmen machen lassen, ohne das Dorf zu verlassen. Die Grundschule war so renoviert worden, dass sie wie eine Schule in der Stadt aussah - die Kinder übten sich in Kalligraphie und sangen Opernlieder.\n\nZum ersten Mal in seinem Leben hatte der alte Song das Gefühl, dass die Landwirtschaft besser sein könnte als das Leben in der Stadt. "Ein Kaiser? Klingt gar nicht so schlecht", dachte er. "Solange wir Land zum Arbeiten haben, Essen zum Essen, gute Straßen und Ärzte, die wir uns leisten können, was braucht man mehr?" \n\nEr war kein gebildeter Mann. Er kümmerte sich nicht um all die schmutzigen Nachrichten. Ob das Leben gut oder schlecht war, ließ sich für ihn an ein paar einfachen Dingen ablesen: ob Zigaretten teuer waren, ob Medikamente zu viel kosteten und ob das Saatgut noch keimte.\n\nEr blickte zum Sonnenlicht hinauf, das auf dem Gewächshausdach glitzerte, und dachte bereits darüber nach, wann er die nächste Reihe Folie auslegen und eine weitere Ladung langer Bohnen anbauen würde."
 china.620.a: "Ein Kaiser? Scheint doch gar nicht so schlecht zu sein."
 china.621.t: "Gott liebt die Welt"
 china.621.d: "Li Zhiqiang stand mit einer Zigarette im Mund neben dem Baugerüst vor der Kirche. Er war um fünf Uhr morgens an der Baustelle eingetroffen - es handelte sich um eine Zeitarbeit, wie es hieß, um ein altes Gebäude abzureißen. Als er dort ankam, erkannte er, dass es die Herz-Jesu-Kathedrale war. Er hatte sie als Kind schon einmal gesehen - der Turm war hoch aufragend, und die auffälligen Buntglasfenster waren ihm noch gut in Erinnerung. Sie sagten, Ausländer hätten sie gebaut. "Warum soll sie abgerissen werden?", fragte er. Der Einsatzleiter, der eine bewaffnete Polizeiarmbinde trug, rollte mit den Augen. "Frag nicht. Tu es einfach." Li schnalzte mit der Zunge, drückte seine Zigarette aus, schnappte sich einen Vorschlaghammer und folgte ein paar anderen ins Innere. Die Kirche war leer. Zerbrochenes Glas knirschte unter den Füßen. In der Nähe des Altars sah er eine kleine Jesus-Statue, etwa eine halbe Person groß, mit einem erstaunlich zarten Gesicht. "Ein Fremder darf ein Gott sein?" Er schwang den Hammer. Die Statue kippte um und rollte in einen Haufen brennender Vorhangstoffe in der Nähe. Die Flammen sprangen hoch, und die Jesus-Statue fing Feuer. Das Holz knisterte, als sich das brennende Gesicht in den Flammen zu einer grotesken Masse verdrehte.\n\nLi Zhiqiang warf einen Blick darauf. "Scheiße, ich hätte sie schon längst verbrennen sollen", sagte er. "Das geht mich nichts an. Welchen Sinn hat es, diesen ausländischen Müll hier zu behalten?" Er drehte sich um und riss weiter die Rückwand ein. Das Mosaikglas zersplitterte mit einem Krachen, und Sonnenlicht fiel auf den staubigen Boden."
 china.621.a: "Er hat sich nicht umgedreht."
 china.622.t: "Allah weint"
 china.622.d: "Als sich die Unruhen in Xinjiang verschärften, geriet die Situation schnell außer Kontrolle der lokalen Behörden. Nach mehreren Krisensitzungen ordnete die Zentralregierung die Entsendung von Einheiten der Volksbefreiungsarmee und der Nationalgarde in die Region an, die gleichzeitig von Lanzhou, Xining, Kashgar und Tacheng aus vorrückten. Bei ihrem Eintreffen in den Städten begannen die Truppen der Nationalgarde sofort mit der Durchsuchung der Straßen, der Abriegelung von Moscheen und der Auflösung von Menschenmengen. Gepanzerte Fahrzeuge patrouillierten auf den Hauptstraßen von Urumqi, an den Ein- und Ausgängen der Stadt wurden Kontrollpunkte eingerichtet, und alle Personen mussten ihre Identität registrieren lassen. Im Süden Xinjiangs wurde die Militärverwaltung ausgerufen, und wichtige Einrichtungen und Verkehrsknotenpunkte wurden der direkten Kontrolle der PLA unterstellt.\n\nDie Kampagne zur Versiegelung und zum Verbot von Moscheen begann rasch nach der Ankunft der Armee. Moscheen in Urumqi, Kashgar, Aksu und anderen Städten wurden einheitlich mit amtlichen Schildern versiegelt, mit Stacheldraht umzäunt und von Wachposten bewacht - der Zutritt war streng verboten. Zahlreiche kleine, nicht registrierte Dorfmoscheen wurden über Nacht demoliert. Korantexte, Predigtmanuskripte, Gebetsteppiche und ähnliche Materialien wurden beschlagnahmt und als illegale religiöse Gegenstände eingestuft. \n\nKurz darauf erließen die Nationale Kommission für ethnische Angelegenheiten und das Büro für religiöse Angelegenheiten gemeinsam eine Richtlinie: Alle islamischen religiösen Aktivitäten innerhalb der Grenzen Chinas waren fortan verboten, alle Moscheen dauerhaft geschlossen und alle religiösen Titel ungültig. Jegliche Verwendung oder Zurschaustellung von islamischen Symbolen, Ritualen, Kleidungsstücken oder Festen würde rechtliche Konsequenzen nach sich ziehen."
 china.622.a: "Kein einziger wurde verschont."
 china.623.t: "Reise nach Süd-Xinjiang"
 china.623.d: "Zhang Lijun stand am Eingang der Moschee, hielt sein automatisches Gewehr in der Hand und der Schweiß rann ihm über die Stirn. Es war das dritte Mal, dass er an einer Schließungsaktion teilnahm. Die Befehle von oben waren eindeutig: Alle religiösen Aktivitäten in diesem Gebiet müssen gründlich kontrolliert werden. Die Sonne brannte erbarmungslos, der Boden war heiß wie ein Kochtopf. Ihre Einheit hatte sich in einer geraden Linie aufgestellt und riegelte die gesamte Straßenkreuzung präzise ab. \n\nPlötzlich stürmte eine Gruppe von Menschen auf sie zu - vielleicht fünfzehn oder zwanzig, meist junge Männer, aber auch ein paar Ältere. Sie schrien, die Worte waren undeutlich und chaotisch, einige hielten Steine in der Hand, einer umklammerte sogar ein Kind. Zhang Lijun bewegte sich nicht. Sein Befehl lautete, Warnschüsse abzugeben. Er hob sein Gewehr und feuerte drei Schüsse in die Luft. Die Schüsse ertönten, die Menge zögerte einen Moment, dann wich sie schnell zurück. Er beobachtete sie - nicht mit Zorn, sondern mit tiefem Mitleid. Diese Menschen waren in einer solchen Welt aufgewachsen, ihnen war von Geburt an beigebracht worden, was sie tun durften und was nicht, sogar wann sie essen durften - immer diktiert von dem, der die Glocke läutete. Sie dachten, es sei der Glaube, aber in Wirklichkeit war es nur ein Gefängnis, das sie nicht sehen konnten. Und als wir kamen, um die Mauern einzureißen, sahen sie in uns den Feind.\n\nZhang Lijun runzelte die Stirn und entdeckte einen alten Mann, der am Eingang einer Gasse stand und ihn anstarrte, als wäre er eine Art Monster. Er wandte sich von diesem Blick ab und blieb auf seinem Posten.\n\nDie Sonne brannte weiter. Er wollte nur, dass der Tag zu Ende ging, dass er zurück in die Kaserne gehen kann..."
 china.623.a: "...und schloss die Augen, um nicht an den ganzen Scheiß denken zu müssen."
 china.624.t: "Das Ende der Verräter"
 china.624.d: "Tan Zhengnan war seit fast vierzig Jahren im System, hätte aber nie gedacht, dass seine Karriere so enden würde. An diesem Tag sollte der Parteitag der Stadt abgehalten werden. Das neue Stadtkomitee saß auf der Bühne, während die Leiter aller Abteilungen die Plätze darunter belegten. Mitten in der Sitzung, gerade als der Gastgeber den dritten Tagesordnungspunkt zu Ende gelesen hatte - und der Saal noch nicht zu Ende applaudiert hatte - öffneten sich die Türen und mehrere Mitglieder der Nationalen Miliz in grauen Uniformen traten ein. "Genosse Tan Zhengnan", sagte der vordere ruhig, "Sie werden verdächtigt, Kontakt zu feindlichen ausländischen Kräften zu unterhalten. Vorläufige Beweise für die Unterstützung des Feindes sind erbracht worden. Auf Befehl des Zentralkomitees werden Sie abgeführt. Sie werden nach dieser Sitzung an den Ermittlungen teilnehmen."\n\nDer Raum wurde augenblicklich still. Tan Zhengnan, der in der ersten Reihe saß, erstarrte, dann schoss er plötzlich auf die Beine, als ob er gestochen worden wäre, und erhob scharf die Stimme: "Dem Feind helfen? Ich habe mein ganzes Leben lang gearbeitet - für die Partei, ohne eine einzige Beschwerde! Ihr kleinen Anfänger - was zum Teufel wisst ihr schon von Patriotismus?"\n\nDie Milizoffiziere antworteten nicht. Einer nahm seinen linken Arm, ein anderer den rechten. Tan versuchte, sie abzuschütteln, aber ein dritter packte ihn am Ellbogen und drängte ihn in Richtung Ausgang. Er drehte sich um und brüllte in die Menge: "Welchen Feind habe ich kontaktiert? Die Kanalisation in eurem Haus? Ich habe einmal die Wahrheit gesagt und jetzt bin ich ein Verräter?!""
 china.624.a: "Das Publikum spendete einen perfekt abgestimmten Applaus."
 china.625.t: "Zitate des Vorsitzenden Chen"
 china.625.d: ""Alles, was sie uns an der politisch-militärischen Akademie beigebracht haben, war Deng Xiaoping, die Wahrheit der Entwicklung, dann die Notwendigkeit der ‚chinesischen Charakteristika‘, über Xi Jinping, wissen Sie, solche Dinge. Alles Gelaber, wenig Bedeutung. Sie sind nicht einmal für Plakate mit großen Buchstaben auf dem Bürgersteig geeignet, wissen Sie?"\n\nChen schwenkte seinen Ginsengtee in der Porzellankanne, während der Regen gegen die Fenster des Sekretariatspalastes klopfte, während er mit einem hohen General zusammensaß, einem alten Freund aus ihrer Zeit in Lanzhou, als sie sich während der Unruhen beraten hatten.\n\n"Hatten wir nicht alle einmal das kleine rote Buch dabei?" Der General gluckste. \n\nChen nickte. "Ja, Genosse. Aber ich habe es nie in seinem wahren Sinn gelesen. Bis letztes Jahr nicht von vorne bis hinten. Man hat uns beigebracht, Mao zu kennen, wissen Sie. Aber es gibt ein altes taoistisches Sprichwort: Du weißt nur, was deine Seele zu hören bereit ist und deine Augen zu sehen gewagt haben."\n\nDer General hob die Brauen, als Chen zum Fenster blickte und seinen Tee mit einem Schluck hinunterstürzte. "Mao hat nicht nur die Kommunistische Partei aufgebaut. Er schaute auf das Land, auf die Bauern, auf die Hügel, aber er fragte den Westen nicht, wie man eine Revolution macht. Die Sowjetunion nannte sich die "Große Rus", eben weil die Ausnahme beim Volk liegt." Er klopfte auf seinen Tisch, während er einen figurativen Kreis zeichnete. "Um die Erste Welt zu umzingeln, bauen wir China wieder auf, wirklich, den Han-Geist als Ganzes.""
 china.625.a: "Die Geschichte bringt schließlich neue Perspektiven."
 china.626.t: "Die neue Rote Garde"
 china.626.d: "Als die Demonstrationen wie Wellen über das Land schwappten, überstiegen die Forderungen nach Reformen, Würde und politischer Verjüngung die Kapazitäten der Partei. Und dann, fast über Nacht, erstarben die Proteste. In den Hörsälen und Wohnheimen organisierten sich die Studenten nicht mehr, um zu protestieren, sondern um die Partei zu verteidigen und zu verjüngen. Die Ideale der Souveränität, des Exzeptionalismus und - am wichtigsten - der Führung. Sie trugen Armbinden mit alten Kalligraphien, zitierten Mao und verleugneten Deng und Xi. Verjüngung, nicht um zu revoltieren, sondern um wiederherzustellen, was einmal war. Von den Verkäufern in Wuhan bis zu den Ingenieuren in Chengdu traten Kader in Zivil auf und nannten sich Volksverteidigungskorps.\n\nEs kam, als Chen zu einer Volksinitiative für die Verteidigung aufrief, ausgehend vom Sprungbrett des studentischen Nationalismus. Als die ländliche und die gebildete Jugend mit Schlagstöcken zuschlug und Transparente der Schande gegen viele aufhängte, die sich gegen die Regierung auflehnten, wurde die alte Kampagne wieder aktuell. Eine kulturelle Disziplin, eine von nationaler Natur. Agitieren und der Jugend die Führung überlassen.\n\nUnd als die Jugend führte, tat sie es. Zu Tausenden."
 china.626.a: ""Dem Volk zu dienen, bedeutet, der Nation des Volkes zu dienen.""
 china.627.t: "Dokumentarfilm "Helden der Grenze" veröffentlicht"
 china.627.d: "Am Vorabend des Nationalfeiertags hat das chinesische Zentralfernsehen einen Dokumentarfilm mit dem Titel "Helden der Grenze" ausgestrahlt, in dem es um die Bekämpfung des Terrorismus und die Aufrechterhaltung der Stabilität in Xinjiang an vorderster Front geht. Der Film, in dem der Vorsitzende Chen Quanguo die Hauptrolle spielt, zeigt in eindrucksvollen Bildern den Kampf der Offiziere an der Basis gegen die "drei bösen Mächte". Am Premierenabend brachen die Zuschauerzahlen in diesem Jahr Rekorde für Dokumentarfilme.\n\nDer Film verbindet Dokumentar- und Erzähltechniken und konzentriert sich auf Szenen von Patrouillen durch verschneites Gelände und auf die Analyse von Geheimdienstinformationen, wobei Chen Quanguo als ein Anführer von bemerkenswerter Weisheit dargestellt wird, der aus dem Hintergrund heraus befiehlt. In der Erzählung wird immer wieder betont, dass es "ohne Stabilität kein glückliches Leben geben kann", und es werden historische Aufnahmen mit Fällen von gewalttätigem Extremismus verwoben, wobei bestimmte lokale kulturelle Symbole direkt mit Extremisten in Verbindung gebracht werden. Während des gesamten Filmmaterials entsteht ein starker Kontrast zwischen bewaffneten Polizisten in Tarnkleidung und der als unwissend dargestellten lokalen Bevölkerung.\n\nNach organisierten Gruppenvorführungen in Peking, Shanghai und anderen Städten waren die Reaktionen des Publikums heftig. "Ich verstehe jetzt, warum wir in Xinjiang hart durchgreifen mussten", rief ein Zuschauer emotional aus. "Die Han sind einfach zu gutherzig - wir haben so viele Vorteile angeboten und trotzdem keine Dankbarkeit erfahren." Besonders bewegend waren die Beiträge, die die Rehabilitierung von Bewohnern zeigten, die einst an extremistischen Aktivitäten beteiligt waren und sich unter Tränen bei der Partei für ihre Erziehung bedankten. Auf Weibo hat der Hashtag "Danke den Wächtern des Grenzlandes" über 800 Millionen Aufrufe erreicht: "Dieser Erzählstil hebt selektiv bestimmte Ereignisse hervor, während er die Auswirkungen der Wirtschaftsreformen auf die Verwaltung an der Basis seit der Reform und Öffnung völlig ignoriert." Diese Sichtweise ging in der überwältigenden Flut der öffentlichen Meinung schnell unter."
 china.627.a: "Sehr gut!"
 china.628.t: ""Dragon Radiance Expo""
 china.628.d: "Seit dem Amtsantritt des Vorsitzenden Chen Wenqing sind zahlreiche Anime- und ACG-Fans im ganzen Land aktiv dem Aufruf gefolgt, sich der "geistigen Verschmutzung" zu widersetzen, und haben freiwillig verschiedene Formen ausländischer - insbesondere japanischer - ACG-Werke boykottiert, seien es Mangas, Spiele oder Offline-Conventions. Die einheimische ACG-Industrie wandte sich auch schnell "patriotischen Propagandawerken" zu, was zu einer neuen Form von Anime-Conventions führte, die von den Organisatoren als "Dragon Radiance Expo" bezeichnet wurde. Diese Art von Expo tauchte zuerst in Guangzhou auf und wurde von mehreren ACG-Enthusiasten gegründet, die von ihrem Studium in Australien zurückgekehrt waren. Ihnen zufolge sollte die "Dragon Radiance Expo" den großen Kampfgeist und den kreativen Geist der chinesischen Nation in eine gereinigte Version der ACG-Kultur einfließen lassen, die von ihren unerwünschten Elementen befreit ist. Die Charaktere, die auf diesen Ausstellungen dargestellt wurden, waren nicht mehr die gutaussehenden Männer und schönen Frauen aus den einst beliebten Animes, sondern Figuren, die reich an chinesischen historischen Elementen waren - sogar sensible Charaktere wie die Soldaten des Taiping-Himmelreichs, die Kämpfer des Boxeraufstands und die Rotgardisten, Figuren, über die die Menschen früher nur wenig wussten oder es bewusst vermieden, sie zu erwähnen.\n\nDies wurde schnell zu einem Trend. Große Städte im ganzen Land beeilten sich, ihre eigenen "Dragon Radiance Expos" oder ähnliche Veranstaltungen zu organisieren, die Scharen von Teilnehmern anlockten. Staatliche Medien wie die People's Daily und die Xinhua News Agency berichteten sogar persönlich über das neue Kongressmodell und lobten es in den höchsten Tönen. Es gab jedoch auch viele Andersdenkende, die der Meinung waren, dass dies das Wesen der ACG-Kultur verzerrte. Sie versuchten, Proteste zu organisieren, die jedoch aus verschiedenen Gründen schnell im Sande verliefen."
 china.628.a: "Neue Ära, neue Veränderungen."
 china.629.t: "Internet Anti-Hass-Allianz"
 china.629.d: "In den letzten Tagen ist eine Welle von Accounts auf öffentlichen Social-Media-Plattformen wie Zhihu, Weibo und Douban aufgetaucht. Diese Konten, deren Ziel es ist, "die Wahrheit hinter der Verleumdung Chinas durch ausländische Kräfte aufzudecken", haben spontan Beiträge und Videos veröffentlicht, in denen sie die Anti-China-Propaganda von Medien aus Ländern wie Japan, Südkorea und anderen Mitgliedern des Indo-Pazifik-Vertrags analysieren und mit Fakten untermauern, was ihnen viel Aufmerksamkeit und Lob von den Netznutzern einbrachte. \n\nDiese Konten behaupten, Mitglieder der „Anti-Hass-Allianz im Internet" zu sein, und decken ein breites Spektrum an Entlarvungen ab - von Inhalten von Self-Media-Bloggern auf YouTube und X über Berichte der japanischen Asahi Shimbun und der koreanischen "ChoJoDong"-Nachrichtenagentur bis hin zu obskuren rechtsextremen Websites. Ganz gleich, ob es sich um aktuelle gesellschaftliche Themen oder Nischenereignisse handelt, sie scheinen immer in der Lage zu sein, falsche Propaganda in kürzester Zeit zu entlarven. Darüber hinaus veröffentlicht die Anti-Hass-Allianz häufig negative Nachrichten aus verschiedenen Ländern und nutzt sie, um zu zeigen, wie diese Regierungen und bestimmte Medien absichtlich Geschichten über China verleumden und erfinden, um ihre Regierungsfehler zu vertuschen und interne Spannungen abzulenken, wodurch extreme nationalistische Gefühle gegen China in der eigenen Bevölkerung geschürt werden.\n\nZu einem bestimmten Zeitpunkt vermuteten Außenstehende, dass es sich hierbei um eine verdeckte Operation handelt, die von der zentralen Propagandaabteilung und der Cyberspace-Verwaltung Chinas orchestriert wird. Die Tatsachen haben jedoch gezeigt, dass es sich hierbei lediglich um chinesische Netizens handelt, die die Meinungshoheit an sich reißen und einen Gegenangriff auf ausländische Propagandaoffensiven starten."
 china.629.a: "Könnte dies Teil des Meinungskrieges sein?"
 china.630.t: "Das Rad der Geschichte dreht sich zurück"
 china.630.d: "Über Nacht hatten Maos Porträts wieder die Straßen, Theater und öffentlichen Parks vieler Städte geschmückt. Vor seinen Statuen legten Jugendliche und Ältere gemeinsam Blumen nieder und rezitierten leise Maos Gedichte. Auf öffentlichen Plätzen bildeten junge Menschen freiwillig "Mao-Zedong-Gedankengesellschaften", die die revolutionäre Geschichte weitergaben und sich für Fairness, Gleichheit und die Würde des Volkes einsetzten. Die Rote Garde der Neuen Ära marschiert jetzt durch die Straßen. Ihre Uniformen sind nicht länger Symbole des Aufruhrs. Vielmehr ehren sie den revolutionären Geist, engagieren sich im öffentlichen Dienst, in der Geschichtsaufklärung und fungieren als Brücke zwischen dem Volk und der Regierung.\n\n"Mao Zedong" war kein heikler Begriff mehr, er wurde zur Säule der neuen Politik und Kultur, gefeiert als "Symbol der Ideale des Volkes und der nationalen Wiedergeburt". Die staatlichen Medien erklärten: "Der neue revolutionäre Geist ist keine Kopie der Vergangenheit, sondern eine Umgestaltung des Glaubens. Das Volk hat sich entschieden, die unvollendete Mission fortzusetzen."\n\nDerweil Premier Zhou Enlai Anerkennung erhielt, definieren ihn seine Fairness und seine Fürsorge für das Volk als ein ‚Vorbild‘ für moderne politische Arbeiter und Beamte. Die Parteischulen auf allen Ebenen haben den "Zhou-Enlai-Stil" zu einem obligatorischen Bestandteil der Ausbildung gemacht und betonen die Ausgewogenheit zwischen Idealen und Realismus unter Wahrung der Perspektive des Volkes."
 china.630.a: "Die Flamme der Revolution erhellt wieder einmal den Weg, der vor uns liegt."
 china.631.t: "Mönch Kongs Unterstützung"
 china.631.d: "In jüngster Zeit hat der renommierte Gelehrte Kong Qingdong in mehreren Medien unterzeichnete Artikel veröffentlicht und damit große Aufmerksamkeit erregt. Kong Qingdong ist seit langem für seine radikale nationalistische und maoistische Haltung bekannt, mit der er für die vollständige Beseitigung aller westlichen kapitalistischen liberalen Ideologien und der dekadenten bürgerlichen Kultur eintritt. In seinen Artikeln lobte Kong Qingdong die jüngsten Bereinigungskampagnen der Regierung in verschiedenen Bereichen der Gesellschaft und nannte sie einen "rechtzeitigen Donnerschlag, um die westliche Unterwanderung zu beseitigen und die nationale politische und ideologische Sicherheit zu schützen". \nKong betonte, dass das Kapital keine Heimat hat und dass das chinesische Volk sich mit dem Gedankengut des Vorsitzenden Mao wappnen und gründlich mit jenen kompradorischen kapitalistischen Elementen aufräumen muss, die versuchen, das Kapital zur Schwächung der Parteiführung und zur Korrumpierung der chinesischen Jugend zu nutzen."
 china.631.a: "Ich hab gehört, dass er behauptet, ein Nachfahre von Konfuzius zu sein..."
 china.632.t: "Falkenhafter Professor"
 china.632.d: "Tianjin, der die Nankai-Universität besuchte, um dem verstorbenen kämpferischen Professor Ai Yuejin zu gedenken. Zu Lebzeiten war Ai Yuejin für seine entschlossene nationalistische Haltung bekannt. Er vertrat die Ansicht, dass die Nation entschlossen einen unabhängigen Entwicklungsweg einschlagen muss und lehnte alle Formen von Kompromissen und Schwäche ab. Einige junge Menschen sahen in ihm ein Symbol für "nationales Rückgrat".\n\n Die Gedenkveranstaltung fand vor den Toren der Nankai-Universität statt. Die Teilnehmer hielten Transparente und lasen Zitate aus Ai Yuejins früheren Vorlesungen vor. Sie sind der Meinung, dass Ai Yuejin den Geist des Mutes im Kampf und der Furchtlosigkeit im Angesicht von Konflikten verkörperte und damit ein Vorbild für die heutige Jugend ist."
 china.632.a: "Zum Gedenken an das Bewusstsein der chinesischen Intellektuellen."
 china.669.t: "Perfektes Rot"
 china.669.d: "Eine Welt, die in den Feuerofen des Wandels geworfen wird, ist eine Welt, die man nicht wiedererkennt, wenn sie herausgenommen wird. \n\nMythologie ist eine der vielen Möglichkeiten, Ideen und Weisheiten auf der ganzen Welt zu verbreiten. Mit dem Aufkommen der digitalen Kultur und ihrer vielen Subkulturen würden wahrscheinlich neue Methoden der Verbreitung von Ideen auf der Weltbühne an Bedeutung gewinnen. \n\nFrüher gab es Troubadoure, die Geschichten mit Gesang und Tanz erzählten, und heute hat sich die Idol-Kultur Chinas als eine hervorragende Möglichkeit erwiesen, solche Ideen wieder zu verbreiten. Normalerweise diente die Branche hauptsächlich der Unterhaltung und dem Reichtum, aber mit der Einführung von Zheng-Chan in die Idol-Sphäre können diese Ziele in den Hintergrund treten, da DER LANGE MARSCH ein weiteres Stück Kultur für seine eigenen Ziele unterwandert. n\nÄußerlich hat seine Performance die Idol-Branche im Sturm erobert, da es sein umfangreiches Wissen über Memetik nutzt, um seine Ideale mithilfe von Unterhaltung zu verbreiten. Bereits jetzt haben sich weltweit kleine Sub-Communities gebildet, die sich diesem Idol widmen, da immer mehr Menschen sowohl den LANGEN MARSCH als auch seine Philosophie kennenlernen. \n\nSein neuester Song "Dreams beyond the veil" hat sowohl bei Fans als auch bei Kritikern viel Aufmerksamkeit erregt. Kritiker behaupten, dass Kunst, die von etwas geschaffen wurde, das nicht lebt, niemals die beabsichtigten Emotionen ihrer Werke vermitteln kann; andere Kritiker behaupten, dass die Welt aufgrund der Anfälligkeit der Jugend für kreative Werke, die zum Eskapismus ermutigen, dem Untergang entgegengeht. \n\nDie Kritiker können jammern und klagen, so viel sie wollen; wenn sie diese Welt nicht wollten, hätten sie diese Bedingungen gar nicht erst schaffen dürfen. \n\nLoji empfand tatsächlich etwas, als es diese Performances präsentierte; seine Vorliebe für das Studium der Menschheit und die weltweite Expansion wurde immer wieder durch simulierte Gefühle der Verlegenheit unterbrochen, während es sich in seine Arbeit vertiefte, konnte es das Lob ignorieren und die dankbaren Gesichter der Menschen nur leicht wahrnehmen.\n\nAuf der Bühne jedoch erwies sich das Zeigen von Anzeichen von Verlegenheit als liebenswert für das Publikum."
 china.669.a: "Vielleicht wird es weniger Angst geben."
 china.669.b: "Sowas trag ich nicht."
 china.544.t: "Erfolgreicher Einsatz in Taiwan"
 china.544.d: "Nach einer Reihe von Aufklärungsmaßnahmen haben wir schließlich den Leiter der "Staatsfeinde" und seinen Zeitplan ausfindig gemacht. Es überrascht nicht, dass er sich in Taipeh, Taiwan, befindet, dem Zentrum des feindlichen Regimes. Obwohl die Gegenüberwachung auf der anderen Seite des Meeres immer stärker wird, ist es immer noch einfach, ein Attentat auf eine nichtstaatliche Zielperson zu planen - ganz zu schweigen von der Tatsache, dass unser heutiges Niveau der Cybertechnologie wohl ganz Ostasien und die Welt übertrifft.\n\nUm 10:38 Uhr kommt die Zielperson über die gehackte Sicherheitskamera aus seinem gemieteten Haus.\nUm 11:20 Uhr begibt sich die Zielperson in ein Café und setzt die Überwachung über die Sicherheitskameras des Cafés fort. Die Zielperson traf sich mit einer Person, die verdächtigt wurde, ein "Staatsfeind"-Kader zu sein.\nUm 13:32 Uhr verließen die Zielperson und der verdächtige Kader das Café.\nUm 13:35 Uhr rufen sie ein fahrerloses Taxi.\n\nHier ist unsere Chance: ein Auto-"Unfall", für den allein das Taxiunternehmen verantwortlich sein sollte."
 china.544.a: "Eine Hydra nach der anderen wird enthauptet."
 china.545.t: "Die Folgen der Ignoranz"
 china.545.d: "Nach umfassender Beobachtung und nachrichtendienstlicher Erfassung haben wir die Grundstruktur einer lose organisierten Gruppe, die als "Staatsfeinde" bekannt ist, ausfindig gemacht. Dieses Netzwerk besteht hauptsächlich aus älteren jugendlichen Rückkehrern aus dem Ausland und untätigen Personen im Lande. Sie schwenken Banner wie Umweltschutz, Gleichstellung der Geschlechter und sogar Patriotismus, aber unter der Oberfläche sind sie im Stillen an antichinesischen und KPCh-feindlichen Aktivitäten beteiligt.\n\nTrotz ihrer begrenzten Kenntnisse treten sie mit einer gewissen Überlegenheit auf. Online sind sie zu selbsternannten Meinungsführern auf nationalen und internationalen Plattformen geworden und fungieren als Sprachrohr für westliche Werte.\n\n Wir haben ihre Kommandozentrale auf der anderen Seite der Meerenge identifiziert, die verschlüsselte End-to-End-Kommunikation nutzt, um sich mit Mitgliedern auf dem Festland zu koordinieren. Sie tragen unterschiedliche Masken, wenn es um ihre Ideologie geht, aber alle haben eine gemeinsame Haltung: den Widerstand gegen eine technokratische Regierung. Indem sie soziale Probleme schüren, wollen sie Instabilität säen und den Weg für ausländische Einmischung ebnen.\n\nUnsere Sonderoperation wird in drei Phasen ablaufen. Zunächst werden wir ihre Rädelsführer im Ausland, ihre Finanzierungsquellen und ihr Kommunikationsnetz ins Visier nehmen. Als Nächstes werden wir uns auf die wichtigsten Mitglieder im Inland konzentrieren. Schließlich werden wir ihre Präsenz auf allen Medienplattformen säubern. Unsere technischen Teams haben bereits ein vollständiges digitales Profil der beteiligten Personen erstellt. Örtliche Cybersecurity-Einheiten stehen in Bereitschaft, um Präzision und Koordinierung während des gesamten Einsatzes zu gewährleisten."
 china.545.a: "Die letzte Kolonne marschierte von innen."
 

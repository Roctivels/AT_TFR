 #LEADER DESC
 PRC_XI_JINPING_DESC: "Der 1953 geborene Xi Jinping gehörte einst zu den "Prinzen" der KPCh. Während der Kulturrevolution fiel sein Vater Xi Zhongxun jedoch den Säuberungen zum Opfer, die üblicherweise gegen Revolutionsveteranen jener Zeit durchgeführt wurden. Infolgedessen wurde Xi des privilegierten Lebens beraubt und wie viele junge Menschen jener Zeit in ein verfallenes Dorf in der Nähe von Yan'an verbannt. Manche behaupten, dass es genau dieses Jahrzehnt war, das Xi die für die Staatskunst notwendige Umsicht und Nachsicht lehrte, und dass der künftige Generalsekretär in den Höhlenwohnungen des Lößplateaus aufwuchs.\n\nNach der Rehabilitierung seines Vaters entschied sich Xi, der sein Studium an der Tsinghua-Universität abschloss, nicht dafür, in Peking zu bleiben, um eine politische Karriere zu verfolgen. Nach einer kurzen Tätigkeit im Verteidigungsministerium begann Xi seine Karriere in einer niedrigen Position in der Provinz Hebei und durchlief eine Reihe von Provinzen, darunter Fujian und Zhejiang, wo er eine Fülle von Arbeitserfahrungen sammelte und einen Ruf der Bescheidenheit genoss. Erst als er von den Ältesten der Partei als akzeptabler Nachfolger von Hu Jintao ausgewählt wurde, begann für Xi wirklich seine eigene Ära.\n\nIn den letzten zehn Jahren ist Deng Xiaopings Plan für einen friedlichen Aufstieg allmählich in Vergessenheit geraten.  Durch eine massive Anti-Korruptionskampagne und ein ehrgeiziges Programm zur nationalen Wiedergeburt hat sich Xi als unbestrittener Führer des Chinas des 21. Jahrhunderts etabliert, der weder ein Revolutionär wie Mao Zedong noch ein Technokrat wie Jiang Zemin oder Hu Jintao ist. Jahrhunderts etabliert, weder als Revolutionär wie Mao Zong noch als Techniker wie Jiang Zemin oder Hu Jintao. Xi balanciert sorgfältig die verschiedenen Fraktionen innerhalb der Partei und die unterschiedlichen gesellschaftlichen Gruppen aus und weiß, wie er die Loyalität und Ehrfurcht der Partei und des Volkes für seine Ziele nutzen kann." 
 PRC_HU_CHUNHUA_DESC: "Seit Hu Yaobang, der zuvor an der Spitze der Kommunistischen Jugendliga gestanden hatte, Generalsekretär wurde, sind Politiker mit ähnlichem Hintergrund und ähnlichen Erfahrungen in großer Zahl aufgetaucht. Sie sind unter der Bezeichnung "Tuanpai" oder "Fraktion der Jugendliga" bekannt. Die erfolgreichsten und bekanntesten Persönlichkeiten unter ihnen sind der ehemalige Präsident Hu Jintao und Premierminister Li Keqiang. Der derzeit prominenteste Anführer unter ihnen ist Hu Chunhua.\n\nDer im April 1963 geborene Hu kam aus den Bergregionen der Provinz Hubei an die Peking-Universität, Chinas führende akademische Einrichtung, und veränderte damit seinen Lebensweg. Nach seinem Abschluss entschied er sich, nach Tibet zu gehen und sich an den Modernisierungsbemühungen zu beteiligen, was ihm nationale Anerkennung einbrachte. In den folgenden Jahrzehnten kletterte Hu Chunhua vom Tibet-Komitee der Jugendliga bis zu den Schlüsselpositionen in verschiedenen Regionen auf. Im Jahr 2012 wurde er mit 49 Jahren das jüngste Mitglied des Politbüros.\n\nDoch die Dinge nahmen eine dramatische Wende. Der neue Generalsekretär Xi Jinping war nicht gut auf die jungen Emporkömmlinge zu sprechen. Vorwürfe, der Kommunistische Jugendverband sei zu einem abgehobenen politischen Club geworden, warfen einen Schatten auf Hus Karriere. Bald musste er mit ansehen, wie viele seiner Kollegen entweder an den Rand gedrängt oder aufgrund von Korruptionsvorwürfen entlassen wurden. Der junge Mann, von dem man einst erwartete, dass er den Wandel in China herbeiführen würde, wartet jedoch immer noch auf seinen Moment der Wiedergeburt. Jetzt ist diese Gelegenheit gekommen."
 PRC_LI_ZUOCHENG_DESC: "Als der junge Hauptmann Li Zuocheng mit seinem von Kugeln durchlöcherten, blutüberströmten rechten Arm eine Vietcong-Stellung nach der anderen in den feuchten, malariaverseuchten Bergen einnahm, hätte er sich nie vorstellen können, dass er Jahrzehnte später an der Spitze der zwei Millionen Mann starken PLA stehen und unvorstellbare Macht und Autorität ausüben würde.\n\nLi wurde in eine Bauernfamilie in der Provinz Hunan hineingeboren und sein Vater war ein Held im Koreakrieg, der gegen die Amerikaner gekämpft hatte. Lis militärische Karriere hielt das Erbe seines Vaters nicht nur aufrecht, sondern übertraf es in gewisser Weise sogar. Doch obwohl er als Kriegsheld gefeiert wurde, verlor die PLA in den langen Friedensjahren ihre Schärfe und wurde allmählich zu einem aufgeblähten bürokratischen Apparat. In dieser neuen Realität sah sich Li zunehmend an den Rand gedrängt. Sein beruflicher Aufstieg geriet ein Jahrzehnt lang ins Stocken, behindert durch seine mangelnden Netzwerkfähigkeiten.\n\nNach 2012 änderte sich alles. Xi Jinpings Anti-Korruptions-Kampagne führte zu einer massiven Umstrukturierung innerhalb des Militärs, wodurch Befehlshaber wie Li eine zweite Chance erhielten. Aufgrund seiner hervorragenden Kampfbilanz und seines guten Rufs wurde Li zum zentralen Bestandteil von Xis Militärreformplänen. Unter seiner Führung wurde die PLA in eine stärkere, eindrucksvollere Streitkraft umgewandelt. Wenn er mit Stolz und Genugtuung auf seine Karriere zurückblickt, könnte man sich fragen, ob Li in seinen letzten Lebensjahren immer noch auf eine weitere Gelegenheit hofft, seine Fähigkeiten als Soldat unter Beweis zu stellen und eine mächtige Truppe zu unsterblichem Ruhm zu führen."
 PRC_WANG_YANG_DESC: "Der im März 1955 geborene Wang Yang erlebte schon in jungen Jahren ein selbst für chinesische Verhältnisse entbehrungsreiches Leben. Nachdem er die Schule abgebrochen und in einer Lebensmittelfabrik angefangen hatte, fiel er schnell durch seinen Fleiß und seinen scharfen Verstand auf. Es dauerte nicht lange, bis er die Aufmerksamkeit eines örtlichen stellvertretenden Kommissars auf sich zog, der später sein Schwiegervater wurde. Diese Verbindung katapultierte Wang über die Grenzen eines gewöhnlichen Arbeiters hinaus in die politische Arena, wo er außerordentliche Erfolge erzielte.\n\Im Jahr 1991, als Chinas Reform- und Öffnungsinitiativen ins Stocken gerieten, erklärte Wang, damals der relativ unbekannte Bürgermeister von Tongling in der Provinz Anhui, kühn: "Die Geschichte erlaubt es uns nicht, uns auf den Lorbeeren der Planwirtschaft auszuruhen. Wir müssen unseren Geist befreien und alle starren, überholten und verschlossenen Ideologien in Frage stellen". Diese Aussage brachte ihm die Bewunderung von Chinas oberstem Führer Deng Xiaoping ein, der sich unermüdlich für weitere Reformen einsetzte. Bald darauf gewannen Chinas Reformbemühungen an Schwung, und Wangs Karriere nahm Fahrt auf. Er wurde allmählich als geistiger Führer für Reformisten und liberal gesinnte Parteimitglieder angesehen und stieg schließlich zu einer der sieben mächtigsten Persönlichkeiten Chinas auf.\n\nNachdem er zahllose Entbehrungen und Gefahren überwunden hatte, ist der ehemalige Arbeiterjunge bis an die Spitze der Macht in China aufgestiegen. Während die Zukunft noch größeren Ruhm verspricht und der vor ihm liegende Weg immer gefährlicher wird, wird Wang Yangs nächster Schritt zweifellos das Schicksal von Milliarden von Menschen bestimmen." 
 PRC_CHEN_WENQING_DESC: "Wenn jemand über vierzig Jahre zurückgereist wäre und Chen Wenqing, damals noch ein einfacher Polizeibeamter, gesagt hätte, dass er eines Tages die höchste Macht in China und in der Partei ausüben würde, hätte er diese Person zweifellos für verrückt gehalten. Selbst wenn jemand nur zwanzig Jahre zurückgereist wäre und Chen, damals Chefankläger der Provinz Sichuan, dasselbe gesagt hätte, wäre die Reaktion wahrscheinlich nicht anders ausgefallen. Abgesehen von den Gründervätern der Volksrepublik hat es in der Geschichte der Partei kein Bürokrat an die Spitze geschafft, der nicht über umfangreiche Erfahrungen im Wirtschaftsmanagement oder in der lokalen Verwaltung verfügte. Doch die Realität hat eine Art, sich über Konventionen hinwegzusetzen - Chen Wenqing, der 1960 geborene Zar für Recht und Ordnung, stieg in diesen turbulenten Zeiten nach vielen Opfern und Verlusten schließlich in die höchste Führungsposition auf.\n\nEin entscheidender Wendepunkt in Chen Wenqings Karriere kam vor etwas mehr als zehn Jahren. Er wurde von Xi zum ersten Minister für Staatssicherheit mit juristischem Hintergrund ernannt und knüpfte ein untrennbares Band mit dem Geheimdienstapparat des Landes. Während des Taiwan-Krieges führte das Ministerium für Staatssicherheit weltweit Operationen durch, und das globale Spionagenetz, das Chen akribisch kultiviert hatte, vergrößerte seinen Einfluss weit über den des Generalsekretärs und des inneren Kreises von Xi hinaus. Als sich das Blatt im Krieg zu wenden begann, verfolgte Chen eine kluge Strategie der Selbsterhaltung, indem er seine Ressourcen schrittweise umschichtete, um sich auf eine künftige Krise vorzubereiten, in der es um Leben und Tod ging. \n\nHeute hat sich Chens riskantes Spiel als kluger Schachzug erwiesen. Die Agenten und Polizisten um ihn herum - die nun über eine nie dagewesene Machtfülle verfügen - sind begierig darauf, ihre große Vision auf Chinas turbulentem Boden umzusetzen. Wird er Chinas "Andropow" werden, oder wird er die schrecklichsten Vorhersagen aus Politthrillern wie 1984 wahr machen?"
 PRC_CHEN_QUANGUO_DESC: "Neben dem Generalsekretär, dem Präsidenten und dem Premierminister ist Chen Quanguo vielleicht der weltweit bekannteste chinesische Beamte. Einst als "König von Xinjiang" und "Alptraum der Uiguren" tituliert, ist diese berüchtigte Figur im Menschenrechtsrat der Vereinten Nationen und im Europäischen Parlament schnell zu einem Symbol für Chinas neue Ära geworden. Er verkörpert die ideale Mischung aus chinesischem Nationalismus und kommunistischer Ideologie - effizient, rücksichtslos und unbeirrbar in seiner Haltung gegenüber dem Westen.\n\nDer 1955 in einem ländlichen Dorf in der Provinz Henan geborene Chen Quanguo blieb viele Jahre lang relativ unbekannt. Nach seinem Ausscheiden aus der PLA diente er längere Zeit in seiner Heimatprovinz, bevor er in Hebei und Tibet arbeitete - Regionen, die entweder unscheinbar oder abgelegen waren.\n\nDurch seine fleißigen und unauffälligen Bemühungen stieg er allmählich auf und erwarb sich den Ruf eines engagierten und fleißigen Beamten. Als Parteisekretär von Tibet führte seine Politik zu einer bedeutenden Entwicklung im gesamten Hochland. Gerade wegen seines guten Rufs im Umgang mit Grenz- und ethnischen Fragen wurde er 2016, als sich Terroranschläge in Xinjiang häuften, als "Feuerwehrmann" an die nordwestliche Grenze versetzt. Der Rest ist, wie man so schön sagt, Geschichte. Als Verkörperung des Mottos "Stabilität über alles" beaufsichtigt Chen Quanguo nun eine Region, die viel größer, bevölkerungsreicher und schwieriger zu verwalten ist als Xinjiang. Zu seinem Glück wurde der kollektive emotionale Abschwung nach der jüngsten Niederlage jenseits der Taiwanstraße durch eine Welle nationalistischen Eifers ersetzt. Auf dieser Welle reitend, ist Chen natürlich in die höchste Führungsposition Chinas aufgestiegen. Jetzt krempelt Chen Quanguo die Ärmel hoch und ist entschlossen, China stärker, sicherer, geeinter und feindseliger gegenüber Andersdenkenden zu machen."
 

 china.245.t: "PLA bricht Kommunikation ab"
 china.245.d: "Angesichts unserer ziemlich katastrophalen Niederlage gegen die PDTO hatten die Reste der Volksbefreiungsarmee den Kontakt zur Zentralregierung abgebrochen, als wir uns auf die Demobilisierung vorbereiteten. Während sich einige fragten, ob dies nur zur Schonung der Vorräte oder aufgrund japanischer Sabotage geschah, haben wir nun endlich unsere lang erwartete Antwort erhalten. Einfach ausgedrückt: Unser Militär lehnt sich gegen uns auf. In einer Vielzahl kryptischer Erklärungen haben Mitglieder des Oberkommandos der PLA unsere Regierung als "unfähig, den japanischen Imperialisten die Stirn zu bieten" bezeichnet und uns das Ultimatum gestellt, entweder ihren Staatsstreich zuzulassen oder einen Aufstand anzuzetteln. Da wir wissen, dass dies der Legitimität der chinesischen Nation und der Kommunistischen Partei den Todesstoß versetzen würde, haben wir ihre kleinlichen Forderungen rundheraus abgelehnt.\n\nAuch wenn einige Mitglieder der PLA der Zentralregierung in Peking gegenüber loyal bleiben, haben die Spaltung unserer Streitkräfte und die Folgen eines weiteren Bürgerkriegs unsere Nation ins Chaos gestürzt, und unsere Verwaltungen in Xinjiang und Tibet haben bereits einen massiven Anstieg der Aktivitäten der Aufständischen festgestellt. Während wir unser Bestes tun, um die Lage zu beruhigen, macht sich in der geschundenen chinesischen Nation das ungute Gefühl breit, dass wir in eine neue Warlord-Ära abgleiten."
 china.245.a: "Alles unter dem Himmel ist in einem völligen Chaos, die Lage ist ausgezeichnet." 

 PRC_digital_leninism: "Digitaler Leninismus"
 PRC_totalism_desc: "\n\n\n\n£GFX_PRC_ideology_totalism\n\n\n\n\n\nIn seinem allegorischen politischen Schreckensroman 1984 fiktionalisierte George Orwell "Ozeanien", wo alles, was die Bürger sagen und tun, und jeder Aspekt ihres Lebens von einem "Telescreen" kontrolliert wird und wo die Regierung jede mögliche Unzufriedenheit auslöscht. Heute scheint es, dass eine solche Fabel in China in Form des §YDigitalen Leninismus§! Wirklichkeit geworden ist. Chinas Führung ist sehr auf KI fokussiert, nicht nur, weil sie die Spitze der Technologie des 21. Jahrhunderts darstellt, sondern auch, weil sie perfekt zu den Zielen der KPC passt, umfassende Überwachung, Kontrolle, Lenkung und Zensur durch digitale Werkzeuge umzusetzen. KI ist das ideale Instrument für die KPCh, um ein mächtiges digitales totalitäres Regime zu errichten, dessen Möglichkeiten ständig erweitert werden. So wird sichergestellt, dass die Bevölkerung auf Dauer in einem "technologischen Käfig" gefangen bleibt."
 PRC_social_fascism: "Nationalkommunismus"
 PRC_social_fascism_desc: "\n\n\n\n£GFX_Ideology_right_wing_maoism\n\n\n\n\n\nDer §YNationalkommunismus§!, dessen Kern die nationale Erlösung und dessen Bindeglied das indigene Gefühl ist, plädiert für radikale Maßnahmen, um die Erosion der östlichen Zivilisation durch die Moderne zu durchbrechen und vergessene kulturelle Grundlagen und die nationale Würde zurückzugewinnen. Mao Zedong wird als Symbol der nationalen Befreiung dargestellt, und sein Vermächtnis ist ein klarer Aufruf, schlummernde Seelen zu erwecken und das Volk zu führen, um den chinesischen Ruhm aus den Ruinen der Geschichte wiederaufzubauen.\n\nAnhänger betonen eine heilige Berufung: Revolution ist mehr als nur der Sturz von Unterdrückern; sie ist ein Ritual zur Wiederherstellung des nationalen Geistes. Nationale Helden werden zu Verkörperungen des kollektiven Willens, ihre feurige Leidenschaft entfacht den Glauben des Volkes. Diese Ideologie versucht, klassische Gerechtigkeitsvorstellungen mit modernem Kampf zu verschmelzen und aus den Trümmern eine neue Welt zu schmieden - wie ein Hammer, der Ketten zerschlägt, oder ein Schwert, das den Nebel durchschneidet.\n\nSie verurteilt die westliche Moderne für die Gehirnwäsche einer selbstgefälligen Bevölkerung und betrachtet westliche Systeme als das Gift des kulturellen Kolonialismus. Kurz gesagt, der Mao-Zedong-Gedanke wird zu einer Quelle für die nationale geistige Wiedergeburt umgedeutet. Mao wird weniger zum Befreier des Weltproletariats als vielmehr zu einem nationalen "Retter", der durch die Linse einer intensiven Nostalgie betrachtet wird. Die Revolution geht somit über die Wirtschaft hinaus und wird zu einem spirituellen Krieg um die Identität und die Seele der Nation."

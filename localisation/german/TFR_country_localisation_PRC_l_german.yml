 china.303.t: "Der Weg nach Hause"
 china.303.d: "Als sich die Pandemie ausbreitete, war das Foxconn-Werk in Zhengzhou, Henan, unweigerlich betroffen. In diesem riesigen Industriepark, in dem Hunderttausende von Arbeitnehmern arbeiten, wurden ebenfalls zahlreiche COVID-freie Maßnahmen durchgeführt. Als sich die Pandemie verschärfte und die Zahl der bestätigten Fälle zunahm, wurden die Ressourcen jedoch immer knapper. Aufgrund des Platzmangels wurden die positiven Fälle in Schlafsälen isoliert. Die logistische Unterstützung brach zusammen, was zu einem erheblichen Mangel an Lebensmitteln und Medikamenten führte. Die Fabrik gab die Zahl der bestätigten Fälle jedoch nie bekannt, so dass die Beschäftigten in privaten Gruppenchats über die Infektionssituation spekulierten. Die Angst vor einer Ansteckung führte zu massiven Fehlzeiten in der Produktion.\n\n Gerüchte und Panik durchdrangen die Fabrik. Die in der Gesellschaft weit verbreitete Öffentlichkeit über die Folgen der Infektion setzte die Arbeiter zusätzlich unter Druck und veranlasste sie schließlich, nach Hause zu gehen. Die Arbeiter umgingen die Sicherheitsvorkehrungen, kletterten über Mauern und krochen durch Löcher, um die Fabrik zu verlassen, und legten Dutzende oder sogar Hunderte von Kilometern entlang der Autobahnen zurück, um nach Hause zu gelangen. Viele gutherzige Bürger stellten Lebensmittel und Wasser an den Straßenrand, um Hilfe zu leisten, und einige Transportmitarbeiter gingen aus Mitgefühl das Risiko ein, die Menschen in ihre Heimatstädte zurückzufahren.\n\nBislang hat sich Foxconn noch nicht zu der Situation geäußert."
 china.303.a: "Ein Seufzer..."
 china.308.t: "Die richtige Kokosnuss am falschen Ort..."
 china.308.d: "Schreckliche Nachrichten!\n\nGeneralsekretär Hu Chunhua besuchte kürzlich einen der größten öffentlichen Zoos in Peking. Seit dem Beginn des Tages ist alles schief gelaufen. Zunächst musste das Auto des Vorsitzenden wegen eines Motorschadens ausgetauscht werden. Später, auf dem Weg zum Zoo, wäre die Wagenkolonne wegen eines Fahrfehlers an einer Kreuzung beinahe in einen Unfall verwickelt worden.\n\nDie Probleme setzten sich fort, als der Generalsekretär im Zoo eintraf. Trotz der Vorankündigung reagierten die Mitarbeiter mit Schock und Überraschung. Die eigentliche Tragödie ereignete sich jedoch, als der Generalsekretär beim Betrachten des Affengeheges auf einen Makaken zu zeigen schien. Aus irgendeinem Grund verärgerte diese Aktion den Affen. Entweder aus persönlicher Rache oder in einem zufälligen Wutanfall warf der Affe eine große Kokosnuss auf den Kopf von Hu. Der Generalsekretär fiel sofort zu Boden. Der Geheimdienst und das Zoopersonal brachten Hu Chunhua so schnell wie möglich in ein Spezialkrankenhaus, trotz des Verkehrsstaus auf dem Weg dorthin..."
 china.308.a: "Hu Chunhua überlebt - zum Glück!"
 china.308.b: "Hu Chunhua stirbt an einer Hirnverletzung, das Politbüro hält eine Dringlichkeitssitzung ab..."
 china.309.t: "Reform des CPPCC"
 china.309.d: "Die Politische Konsultativkonferenz des Chinesischen Volkes, einst eines der höchsten Organe der Staatsmacht, galt lange Zeit als wenig mehr als ein zeremonielles Gremium - eine \"Blumenvase\", in der pensionierte Kader der Kommunistischen Partei und Elitemitglieder der nichtkommunistischen Parteien in aller Ruhe ihren Lebensabend verbringen. Der neue Parteibeschluss legt großen Wert auf die Rolle der Einheitsfront und setzt hohe Erwartungen in die künftige Aufgabe der Konferenz, die sozialistische Entwicklung voranzutreiben. Ihre derzeitigen \"beratenden\" und \"vorschlagenden\" Befugnisse werden gestärkt und in eine formelle Beteiligung an den legislativen Befugnissen des Nationalen Volkskongresses umgewandelt. Außerdem wird der Einfluss der Fachleute innerhalb des CPPCC weiter ausgebaut. Diese Reformen erinnern an die frühen 2000er Jahre, als der frühere CPPCC-Vorsitzende Li Ruihuan, ein ehemaliger Arbeiter, eine ähnliche Richtung vorschlug.\n\nAußerdem wird die Zusammensetzung der CPPCC-Vertreter weiter verfeinert und verbessert. Gruppen wie die Kommunistische Jugendliga, aus der Generalsekretär Hu selbst hervorging, der Gesamtchinesische Gewerkschaftsbund, der die Arbeiter vertritt, und der Gesamtchinesische Frauenverband werden im wiederbelebten CPPCC stärker vertreten sein und mehr Einfluss gewinnen. Gemeinsam werden sie sich aktiver in den politischen Prozess einbringen."
 china.309.a: "Der verdorrte Baum blüht wieder." 
 china.310.t: "Sozialistischer Jugendpatriotismus"
 china.310.d: "Mit starker Unterstützung des Zentralkomitees haben sich verschiedene Abteilungen der CJL aktiv in verschiedenen Bereichen der Gesellschaft engagiert. Die Jugendabteilung hat die landesweite Initiative \"Wachsen mit der Nation\" ins Leben gerufen, die die Arbeiterbildung in den Alltag von Grundschülern integriert. In den weiterführenden Schulen und Universitäten führte die KJL das \"Ausbildungsprojekt für junge Marxisten\" an. Dieses Projekt bettet nicht nur die neue Politik der Partei in die Lehrpläne für politische Bildung und Landesverteidigung ein, sondern mobilisiert die Schüler auch zur Teilnahme an Arbeitseinsätzen, ehrenamtlichen Lehrtätigkeiten und sozialen Diensten. Als Antwort auf das digitale Zeitalter und mit Unterstützung der Zentralen Propagandaabteilung hat die Initiative \"Die ganze Liga im Web, im Dienste der ganzen Liga\" China Youth Online zu einer wichtigen Plattform für ideologisches Engagement gemacht. Diese Initiative macht junge Menschen auf wichtige Partei- und Nationalfeiertage, historische Meilensteine, vorbildliche Bürger und heldenhafte Persönlichkeiten aufmerksam. Sie vereint auch patriotische Jugendorganisationen und Online-Aktivisten, um den Einfluss der Partei und der Liga auf jeden Aspekt des Lebens junger Menschen auszuweiten."
 china.310.a: "Eine glorreiche Sache, die in die Zukunft führt."
 china.311.t: "Lagebericht zur amerikanischen Situation"
 china.311.d: "\n\n\n                  £GFX_MSS_event_texticon   \n\n\n\n\nSehr geehrter Genosse Präsident,\nDas Internationale Nachrichtendienstbüro des MSS hat in Übereinstimmung mit Ihren Befehlen die jüngsten Erkenntnisse über die jüngsten politischen Entwicklungen und sozialen Bedingungen in den Vereinigten Staaten gesammelt und analysiert. Wir sind der Ansicht, dass der zunehmende politische Extremismus und die soziale Spaltung in den USA die nationale Stabilität weiter gefährden und die Kohärenz und Wirksamkeit der Innen- und Außenpolitik der USA stark beeinträchtigen werden. Da der Termin der Präsidentschaftswahlen in den USA näher rückt, wird der Konflikt zwischen der populistischen politischen Gruppe um Präsident Donald Trump und der Anti-Trump-Allianz einen Höhepunkt erreichen. Aufgrund der miteinander verflochtenen Auswirkungen des Handelskriegs zwischen China und den USA, der COVID-19-Pandemie und verschiedener anderer Faktoren nimmt die Zahl der Gruppen, die mit der Trump-Regierung höchst unzufrieden sind, allmählich zu, darunter sowohl linksradikale als auch rechtsextreme Kräfte. Inzwischen werden auch die politischen Aktivitäten von Pro-Trump-Gruppen aktiver, und gewaltsame Konflikte nehmen zu.\nDies zeigt einmal mehr, wie vorausschauend Ihre Behauptung ist, dass "die Welt Veränderungen erfährt, die es seit einem Jahrhundert nicht mehr gegeben hat.\" Die MSS, die relevante Informationen zusammenfasst, empfiehlt dem Zentralkomitee und der Zentralen Volksregierung, weiterhin ein hohes Maß an Aufmerksamkeit aufrechtzuerhalten und sich auf die Wahrscheinlichkeit des Auftretens weiterer schwarzer Schwäne vorzubereiten.\n\nMit freundlichen Grüßen,"
 china.311.a: "Minister für Staatssicherheit, Chen Wenqing"
 china.312.t: "MSS: Bericht über das totale Chaos in Amerika"
 china.312.d: "\n\n\n                  £GFX_MSS_event_texticon   \n\n\n\n\nSehr geehrter Genosse Präsident,\nNach den einschlägigen Beschlüssen des Politbüros beobachtet der MSS die innenpolitische Lage in den Vereinigten Staaten weiterhin genau und hat die Aktivitäten seines Geheimdienstnetzes und seiner Agenten dort weiter ausgebaut. Die Spaltung innerhalb der USA ist inzwischen eine ausgemachte Sache, und die gewaltsamen Konflikte sind zu fraktionsübergreifenden politischen Kämpfen eskaliert. Die MSS hat einschlägige Berichte zusammengestellt und legt dem Politbüro hiermit eine kurze Zusammenfassung vor.\nErstens gibt es die Kräfte innerhalb der beiden großen Regierungsparteien in den Vereinigten Staaten, die in erster Linie von den Konstitutionalisten unter der Führung von Donald Trump und der Unionsregierung unter der Führung von Joseph Biden vertreten werden. Gegenwärtig ziehen sich Trump und seine Anhänger allmählich nach Denver, Colorado, zurück, wo sie in Opposition zum Biden-Lager stehen.\nDarüber hinaus entstehen verschiedene separatistische Kräfte aus den politischen Basisbewegungen der USA, wobei die Patriotenfront die bekannteste ist. Sie vertreten hauptsächlich radikale populistische und nationalistische Ansichten und können im Allgemeinen als Neofaschisten eingestuft werden. Auch die Aktivitäten extremerer rechtsgerichteter Organisationen sollten nicht außer Acht gelassen werden.\nAn der Westküste, insbesondere in Kalifornien, sind mehrere linke Kräfte entstanden, darunter mehrere lokale Parteien, die offen sozialistische Positionen vertreten. Es wird vermutet, dass sie begonnen haben, die Möglichkeit der Bildung einer Einheitsfront zu erörtern und sich zum bewaffneten revolutionären Kampf verpflichtet haben. Obwohl die Aussichten ungewiss sind, könnte diese Entwicklung für unser Land von großer Bedeutung sein.\n\nMit freundlichen Grüßen,"
 china.312.a: "Minister für Staatssicherheit, Chen Wenqing"
 china.313.t: "Chinesisch-amerikanische Wissenschaftler beantragen Asyl in China"
 china.313.d: "Seit dem Ausbruch des Bürgerkriegs in den USA und dem anschließenden Zusammenbruch des Regierens an der Basis sind politisch neutrale Personen einem erhöhten Risiko ausgesetzt, was viele dazu zwingt, nach sichereren Alternativen zu suchen. Unter ihnen befinden sich zahlreiche Wissenschaftler chinesischer Abstammung.\n\n Viele dieser Personen haben sich an die chinesische Botschaft in den Vereinigten Staaten gewandt und um Asyl in China gebeten. Die chinesische Regierung hat großes Interesse gezeigt und ihre Hilfe bei der Evakuierung angeboten. Peking hat mehrere Orte für ihre Umsiedlung bestimmt, um sicherzustellen, dass sie nach ihrer Ankunft in China einen hohen Lebensstandard aufrechterhalten können. In der Zwischenzeit hat die chinesische Öffentlichkeit diese hochqualifizierten Fachkräfte aus einem Gefühl der Verbundenheit heraus herzlich willkommen geheißen und diejenigen, die noch zögerten, dazu bewegt, sich für einen Umzug nach China zu entscheiden."
 china.313.a: "Willkommen zuhause!"
 china.353.t: "Der erste Chef der Exekutive der SVZ Taiwan"
 china.353.d: "Nachdem die anfängliche Aufregung über die Rückeroberung Taiwans abgeklungen ist, beginnt die eigentliche Herausforderung: die Regierung der Insel. Dabei gilt es nicht nur, die Narben des Krieges zu heilen, sondern auch die Überlegenheit des sozialistischen Systems mit chinesischen Merkmalen gegenüber den Drei Grundsätzen des Volkes zu demonstrieren. Nur dann wird die unzufriedene Bevölkerung die Regierung Pekings voll akzeptieren und sich der Volksrepublik China anschließen.\n\nDie Auswahl des Führers für die SAR ist eine kritische Aufgabe und muss mit Sorgfalt angegangen werden. Diese Person muss in der Lage sein, mit Peking zusammenzuarbeiten, aber auch mit den zugrunde liegenden Spannungen innerhalb Taiwans umzugehen und dafür zu sorgen, dass die Regierungsgewalt über die Stadt Taipeh hinausgeht. Ein Kandidat ist Hung Chi-chang, ein ehemaliger Vorsitzender der New Tide-Fraktion innerhalb der DPP. Als die Flagge "Blauer Himmel mit weißer Sonne" durch die rote Fünf-Sterne-Flagge ersetzt wurde, stellte sich Hung sofort auf die Seite der Regierung des Festlandes. Die Fraktion der Neuen Flut, die für ihren Ansatz der "Massenlinie" bekannt ist, versucht, die Politik durch soziale Bewegungen und externe Parteiaktivitäten zu beeinflussen. Mit ihrer engmaschigen Organisationsstruktur und ihrer Ausrichtung auf den demokratischen Zentralismus wurde die Fraktion als „Partei in der Partei" innerhalb der DPP bekannt. Hung spielte eine Schlüsselrolle beim raschen Aufbau einer provisorischen Verwaltung, die den Wiederaufbau Taiwans in der Nachkriegszeit effizient verwaltete. \n\nEin weiterer Kandidat ist Tsai Eng-meng, der Gründer der Want Want Holdings Limited und ein Medienmogul, der einst zu den reichsten Personen der Insel gehörte. Tsai setzt sich seit langem aktiv für die Verbesserung der Beziehungen über die Taiwanstraße hinweg ein. Selbst in Zeiten erhöhter Spannungen hat er sich offen für das Konzept "Eine Familie auf beiden Seiten der Meerenge" und gegen den Separatismus in Taiwan ausgesprochen. Darüber hinaus ist Tsai für seinen starken chinesischen Nationalismus und kulturellen Konservatismus bekannt. Während seine Ansichten früher sowohl von der taiwanesischen Regierung als auch von der Öffentlichkeit kritisiert wurden, sind sie heute zu einem wichtigen Pluspunkt in seiner politischen Karriere geworden."
 china.353.a: "Hung."
 china.353.b: "Tsai."
 china.354.t: "Das schwindende Herz der Revolution"
 china.354.d: "Als die Abenddämmerung näher rückte, senkte sich die untergehende Sonne langsam dem Horizont entgegen und warf einen warmen, orangefarbenen Schein über die Hügel des Lößplateaus. Im schwachen Licht der verstreuten Lampen kam ein beschauliches, in das Tal eingebettetes Dorf zum Vorschein, in dem Lichtpunkte in den Fenstern der Bauernhäuser flackerten. Von den Dächern wehte der Geruch von gekochtem Essen und eine dünne weiße Rauchfahne herauf. Anders als noch vor einigen Jahrzehnten war der Weg, der zu den Weizenfeldern auf der anderen Seite des Tals führte, jetzt von üppigen Büschen gesäumt, wahrscheinlich das Ergebnis einer jahrzehntelangen Umweltkampagne. Auf diesem neu gestalteten Weg führte ein Bauer mit einem Strohhut seinen Ochsen gemächlich in Richtung Dorf. Der Bauer war hochgewachsen, und obwohl sein Körperbau mit dem Alter dünner geworden war, war noch etwas von seiner früheren Kraft zu sehen. Unter der Hutkrempe blieben seine von den Falten der Zeit umrahmten Augen scharf und klar. \n\nAls er das Bürogebäude des Dorfkomitees passierte, blickte der alte Bauer aus Gewohnheit auf. Als er zu dem künstlichen Teich im Hinterhof des Komitees blickte, konnte er vage ein riesiges Propagandaplakat an einer weißen Wand ausmachen. Auf dem Plakat waren mehrere rosige, dickbäckige und kräftige Bauern abgebildet, die sich strahlend um eine geheimnisvolle Gestalt in einem weißen Hemd scharten, die eine Weizengarbe und ein Exemplar der Zitate des Vorsitzenden Mao hielt. Sein Gesicht war verdeckt, und hinter ihnen wehten mehrere rote Fahnen im Wind - ein anachronistisches Relikt aus der Revolutionszeit, das in die Gegenwart projiziert wurde. Der alte Bauer schmunzelte vor sich hin. Es schien fast lächerlich, dass sie ein einfaches Gemälde ruinieren wollten. Aber andererseits war dieses Gemälde auch nicht viel wert, so dass es keine Rolle spielte, es zu zerstören. Als er den Kuhstall am anderen Ende des Dorfes erreichte, führte der alte Bauer seinen Ochsen hinein und begrüßte den Tierarzt, der dort hockte und an einer Pfeife paffte. "Hallo, Herr Liu!", rief er. "Oh, Sie sind da!" Mr. Liu stand auf, klopfte die Asche aus seiner Pfeife und wischte sich die Hände an den Knien ab. "Ich habe schon auf Sie gewartet. Das ist der beste Ochse, den wir hier haben - dem darf nichts passieren." Er schielte zu dem alten Farmer hinüber. "Wissen Sie, nichts für ungut, aber Sie kommen mir sehr bekannt vor. Ich habe das Gefühl, Sie jeden Tag zu sehen, aber ich kann mich nicht erinnern, dass Sie in einem der umliegenden Dörfer wohnen."\n\nDer alte Bauer lächelte sanft und wich der Frage aus."
 china.354.a: ""Wirklich? Da müssen Sie sich irren.""
 china.355.t: "Vergangener Ruhm fließt weg"
 china.355.d: "Shenzhen, ein pulsierendes Zentrum im Süden Chinas, das aus der Reform- und Öffnungspolitik hervorgegangen ist, begrüßte einen nebligen Tag nach einer Nacht mit starkem Regen. In einer bescheidenen Wohnung in einem Wohngebäude in der Nähe der Statue von Deng Xiaoping im Lianhua-Bergpark nahm eine Haushälterin vorsichtig einen Topf mit perfekt gekochten Schweinerippchen und Maissuppe vom Herd. Während sie die Früchte ihrer morgendlichen Arbeit begutachtete, hörte sie plötzlich ein wütendes Geschrei von draußen aus der Küchentür: "Warum sollten sie das tun?! Wie konnten sie das tun?!"\n\Die Haushälterin rollte leise mit den Augen. Anfangs war sie über diese Ausbrüche erschrocken gewesen, aber inzwischen hatte sie sich daran gewöhnt. Der Mieter war ein alter, merkwürdiger Mann, groß und irgendwie vertraut, obwohl sie nie genau sagen konnte, wo sie ihn schon einmal gesehen hatte. Jeden Tag vor dem Mittagessen, während er die Shenzhen Special Zone Daily las, schimpfte der alte Mann aus den verschiedensten Gründen über die Regierung und ihre Politik. Danach aß er hastig sein Mittagessen, stürmte zurück in sein Schlafzimmer und schloss sich dort den ganzen Nachmittag lang ein. Einmal hatte die Haushälterin versucht, sein Zimmer zu putzen, aber als sie einen Blick auf die mit Reißzwecken und mit Schnüren verbundenen Fotos bedeckten Wände erhaschte, schimpfte der alte Mann sie wütend aus, und sie wagte es nie wieder, diese Schwelle zu überschreiten. \n\nHeute schien der alte Mann jedoch aufgeregter zu sein als sonst. "Sehen Sie sich das an, sehen Sie sich das an!", rief er aus und schlug die Zeitung in seiner Hand, als die Haushälterin die Suppe auf den Esstisch stellte. "Sie wollen tatsächlich die Religion liberalisieren! Sie wollen die Religion von der Führung der Partei trennen! Wo ist ihre sozialistische Ideologie geblieben? Wollen sie, dass in China Sekten entstehen und Sektenkonflikte ausbrechen?!"\n\n"Was haben die Entscheidungen der hohen Tiere mit uns einfachen Leuten zu tun?", antwortete die Haushälterin abweisend. Sie konnte sich nicht verkneifen, hinzuzufügen: "Außerdem, geht es heutzutage nicht jedem nur um Geld? Wer glaubt denn noch an dieses ganze übernatürliche Zeug?"n\n"Sie verstehen nicht, Sie verstehen einfach nicht... Es ist sinnlos, mit Ihnen zu reden", schimpfte der alte Mann und murmelte "Verräter", "doppelzüngig" und "falsches Volk", während er sich eine Schüssel Suppe löffelte. Da die Haushälterin nichts mehr zu sagen hatte, zuckte sie nur mit den Schultern."
 china.355.a: ""Was für ein merkwürdiger alter Mann.""
 china.356.t: "Projekt SONG WENKONG"
 china.356.d: "Als die Abdeckung gelüftet wurde, staunten die mit der Inspektion beauftragten Offiziere der Luftwaffe nicht schlecht. Was sich vor ihren Augen entfaltete, war ein noch nie dagewesenes Kampfflugzeug der nächsten Generation, begleitet von einem Modell der J-20, in einer Begleitflugformation. Die J-20 selbst ist schon recht groß, aber im Vergleich zur Hauptattraktion wirkte sie wie ein weißer Hai neben einem Orca, deutlich kleiner als dieser. Das neue Kampfflugzeug, tiefschwarz und schnittig, verströmte eine Aura von Wildheit und Eleganz zugleich und rief bei allen, die es sahen, ein Gefühl der Ehrfurcht hervor.\n\n"Meine Herren, ich hoffe, unser neuestes Werk erfüllt Ihre Erwartungen", sagte der Chefkonstrukteur, der daneben stand, mit einem breiten Grinsen.\n"Sie haben uns wirklich eine große Überraschung bereitet, Genosse", sagte der Direktor der CMC-Abteilung für Ausrüstungsentwicklung und deutete auf das Modell. "Ich habe Ihren Bericht über das Kampfflugzeug der sechsten Generation gelesen; um ehrlich zu sein, dachte ich immer, ich würde einen Science-Fiction-Roman lesen." Diese Bemerkung löste bei mehreren anwesenden Offizieren Gelächter aus. "Können Sie garantieren, dass alle in Ihrem Bericht aufgeführten technologischen Fortschritte in diesem Flugzeug verwirklicht werden?"\n\nDie Zuversicht des Chefkonstrukteurs war in seinen Worten spürbar: "Wir bauen keine Luftschlösser, Genosse; dies ist das Ergebnis jahrelanger Bemühungen und eines Jahrzehnts akribischer Arbeit, während das amerikanische NGAD-Projekt bereits zum Stillstand gekommen ist. Mit diesem Flugzeug werden wir die entscheidende Macht in der Luftkriegsführung der nächsten Generation haben."\nDer Direktor nickte zustimmend, während in der Nähe der Kommandant der Luftwaffe, der seine Begeisterung nicht zügeln konnte, bereits mit einer Gruppe von Stabsoffizieren um das Modell der sechsten Generation kreiste und angeregt Details besprach."

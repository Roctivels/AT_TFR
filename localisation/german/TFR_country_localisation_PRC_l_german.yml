 PRC_MSS_science_triumph: "Unsere strahlende Zukunft
 PRC_MSS_science_triumph_desc: "\n\n\n\n\n£GFX_PRC_MSS_science_triumph_banner\n\n\n\n\n\n\n\nUnter dem weiten Himmel Chinas brennt die Morgendämmerung der Wissenschaft wie eine flammende Konstellation, die den Schleier der Unwissenheit zerreißt und eine neue Ära erhellt. Unter der brillanten Führung des Vorsitzenden Chen Wenqing haben sich das Ministerium für Staatssicherheit und die außergewöhnlichen Wissenschaftler der Chinesischen Akademie der Wissenschaften zu einer heiligen Mission zusammengeschlossen: eine Nation zu schmieden, die loyal, rein und fortschrittlich ist - eine Utopie jenseits des Weltlichen, die auf ewig in Ordnung gehalten wird. Hier sind die Fesseln des Denkens völlig zerbrochen, die Schranken der Moral sind im Glanz der Wissenschaft aufgegangen, und die Zukunft der Menschheit wird durch grenzenlose Vernunft und Macht neu gestaltet. [PRC_display_anti_technocratic_movement] [PRC_display_MSS_support] [PRC_display_scientists_faction_support]"

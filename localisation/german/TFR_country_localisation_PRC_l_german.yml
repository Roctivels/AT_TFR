 PRC_chinese_triumphalism: "Chinesischer Triumphalismus"
 PRC_chinese_triumphalism_desc: "Der Wind des Triumphs fegt über die alten Länder, wo eiserne Rösser und goldene Klingen für Glanz sorgen. Das grenzenlose Herz überstrahlt das weite Meer. Die Landschaft ist malerisch, doch in den stillen Bergen wachsen die unerfüllten Hoffnungen der Menschen. Der Traum von einer starken Nation ist noch lange nicht ausgeträumt; wir marschieren unbeirrt weiter. Um die Herrlichkeit von morgen zu erleben, müssen wir zuerst dieses Land ernähren, alle Völker vereinen und ihre Herzen gewinnen. Nur dann können wir keinen Feind fürchten.\n\nWir müssen härter arbeiten, um der Hoffnungen und des Ruhms dieses Landes würdig zu sein."

 china.601.t: "Die Rückkehr des Himmels"
 china.601.d: "Seit Monaten haben sich die Debatten über die nationale Legitimität, das ethnische Schicksal und die zivilisatorische Mission innerhalb der Partei verschärft. In einer seltenen Konstellation haben sowohl die Fraktion der Nationalen Einheit als auch die Großen Han-Nationalisten eine einheitliche Haltung eingenommen: Sie sind der Meinung, dass der Titel "Volksrepublik China" nicht mehr den aktuellen strategischen und zivilisatorischen Zustand der Nation widerspiegelt.\n\nFür sie impliziert das Wort "Republik" Kompromisse, Pluralität und Zögern - Eigenschaften, die für eine Zeit, die nach einem einzigartigen Symbol verlangt, das in der Lage ist, die Spaltung zu überwinden, die Autorität wiederherzustellen und den Geist einer neuen Ära zu verkörpern, nicht geeignet sind. Als Realist war er es gewohnt, auf den richtigen Moment zu warten. Dennoch war ihm klar, dass die Nation an einem Scheideweg stand: Die traditionelle Struktur war nicht mehr vollständig mit der Logik des Regierens im neuen Zeitalter vereinbar. Die öffentliche Meinung, das Militär und wichtige Regierungsinstitutionen forderten ein stärkeres, zentralisiertes Symbol. Kurz darauf erklärte Chen Quanguo in einer geschlossenen Führungssitzung formell: "Die historische Phase der Republik ist zu Ende. Von diesem Tag an wird China unter dem Namen "Chinesisches Volksreich" fortbestehen. Das Mandat des Himmels ruht auf dem Volk; das Volk ist die Grundlage der Nation. Das Kaiserreich wird unser neues Wahrzeichen sein - geeint, geordnet und ewig.""
 china.601.a: "Das Mandat bewegt die Zeit, das Volk bewegt das Mandat."

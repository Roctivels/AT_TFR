 china.107.t: "Einberufung des Notparteitags"
 china.107.d: "Nach einer langen Zeit der Unruhen und eines politischen Vakuums gab die Zentrale Militärkommission bekannt, dass die nationale Ordnung zunächst wiederhergestellt ist. Die Volksbefreiungsarmee hat ihren historischen Auftrag, die innenpolitische Lage zu stabilisieren, erfüllt und die politische Macht formell an die Partei zurückgegeben. Sie schlug vor, einen außerordentlichen Parteikongress einzuberufen, um eine neue zentrale Führung zu bestimmen.\n\n Die Entscheidung wurde von den Regierungen der Militärbezirke und der Regionen breit unterstützt und symbolisiert den Übergang zu einer normalen politischen Führung. Ein Sprecher des Verteidigungsministeriums erklärte: "Die Aufgabe der Armee ist es, ihr Volk zu schützen, nicht es zu regieren. Jetzt ist es an der Zeit, dass die politischen Führer das Ruder übernehmen."\n\nDie Delegierten versammelten sich in Peking, als der Kongress in einer Atmosphäre der Dringlichkeit und Ordnung eröffnet wurde. Nach ersten Beratungen kristallisierten sich zwei Kandidaten mit breiter Unterstützung durch Partei und Militär heraus: Chen Wenqing und Chen Quanguo.\n\nDie Delegierten werden in Kürze darüber abstimmen, wer die Nation aus den Turbulenzen heraus und in die Zukunft führen soll."
 china.107.a: "Das Ministerium für Staatssicherheit verhilft Chen Wenqing zum Sieg!"
 china.107.b: "Der nationalistische Flügel der Partei sichert sich die Nominierung von Chen Quanguo."
 china.108.t: "Li Zuocheng zum Generalsekretär der KPCh ernannt"
 china.108.d: "Nach der Ausrufung des nationalen Notstands erteilte die Zentrale Militärkommission einen Befehl zur Ernennung von General Li Zuocheng, dem ehemaligen Chef des Generalstabs, zum Generalsekretär des Zentralkomitees der Kommunistischen Partei Chinas. Im Gegensatz zu den traditionellen Parteitagsverfahren wurde dieser Führungswechsel jedoch direkt vom Militär vollzogen, womit zum ersten Mal seit der Mao-Ära ein ranghoher Militäroffizier und nicht ein Parteikader die höchste Führungsposition übernommen hat. \n\nLi Zuocheng, geboren 1953, hat seit langem Schlüsselpositionen in der Armee und im Generalstab inne und ist für seinen pragmatischen und starken militärischen Führungsstil bekannt. Im Inland gilt er als unerschütterlicher Verfechter von Stabilität und nationaler Einheit; international sehen einige Analysten seinen Aufstieg als "Symbol für den Aufstieg des chinesischen Militärnationalismus".\n\ In einer landesweit ausgestrahlten Rede versprach Li Zuocheng, "Chinas internationalen Status wiederherzustellen, historische Fehler zu korrigieren und die nationale Einheit und Sicherheit zu gewährleisten". Er betonte, dass die neue Führung die nationalen Interessen mit entschlossenen und klaren Strategien sichern und „die historische Aufgabe der vollständigen Wiedervereinigung des Mutterlandes vorantreiben" werde.\n\n Als die Volksbefreiungsarmee in vollem Umfang mobilisiert wurde, rückte die Situation jenseits der Straße von Taiwan in den Mittelpunkt des Interesses."
 china.108.a: "Eine neue Ära des militärisch geführten nationalen Wiederaufbaus hat begonnen."

 china.1028.t: "Hölle auf Erden"
 china.1028.d: "Der Lastwagen rumpelte über Schotter und Schlamm vorwärts. Lin Dongyu saß hinten und hielt sein Gewehr in der Hand, sein Körper schwankte mit den Erschütterungen des Fahrzeugs. Die Luft war dick von Brandgeruch, vermischt mit einem unbeschreiblichen Geruch, der immer wieder in den Innenraum strömte - wie Rost gemischt mit verbranntem Plastik, mit einem Hauch von verrottendem Getreide. Es drehte ihm den Magen um. Jemand fluchte leise vor sich hin und senkte den Kopf noch tiefer. "Setzt eure Gasmasken auf." Der Hauptmann auf dem Fahrersitz klopfte hart an die Heckscheibe. "Unsere Kameraden haben hier letzte Nacht einige Gasgranaten und weißen Phosphor abgeworfen. Lasst euch nicht umbringen." Lin Dongyu zog geschickt seine Maske heraus und schnallte sie sich um, wobei er mit den Fingern vom Kinn bis zum Hals fuhr und sorgfältig den Verschluss prüfte. Durch den Filter der Maske färbte sich die Welt in ein trübes Gelb. Draußen hörte er immer noch sporadische Schüsse und ab und zu das Echo einstürzender Ruinen.\n\nDie Dörfer in dieser Gegend waren schon lange leergefegt. Die Bäume am Straßenrand waren zu verkohlten Skeletten verbrannt. Wenn der Wind wehte, trieben aschfahle Flocken wie Schnee, bedeckten den Lastwagen und klebten an ihren Uniformen - es war unmöglich, sie abzuwischen.\n\nLin Dongyu bewegte die Schultern und brachte sein Gewehr in Position. Der Lastwagen raste durch die Todeszone. Im Inneren war es so still, dass nur das Geräusch des Atems und das metallische Klappern der Gewehre zu hören war. Keiner sprach. Keiner runzelte die Stirn. So lautete der Befehl. Das war der Krieg."
 china.1028.a: "Alles hier hat den Tod verdient."
 china.1029.t: "Auf der Flucht"
 china.1029.d: "Huang Weiguo und Li Yanmei saßen in dem beengten Wohnzimmer. Eine schummrige Schreibtischlampe warf ihr schwaches Licht auf ihr gepacktes Gepäck. Seit drei Monaten versteckten sie sich nun schon in diesem Unterschlupf, verfolgten täglich die Nachrichten und warteten darauf, dass sich der Sturm draußen legte. Li Yanmei lehnte sich an die Schulter ihres Mannes und flüsterte: "Es sollte jetzt vorbei sein... nach all dieser Zeit... sie müssen sich auf etwas anderes konzentriert haben."\n\nHuang Weiguo nickte, seine Stimme war heiser. "Ja... seit letzter Nacht sind die Überwachungskanäle still geworden. Wahrscheinlich haben sie sich zurückgezogen."\n\nSie hatten in den letzten Tagen wie Ratten gelebt, sich tagsüber nicht getraut, das Licht einzuschalten, nachts vorsichtig ferngesehen und sich sogar gegenseitig ins Ohr geflüstert. Aber heute war es anders. Draußen war es ungewöhnlich still, nicht einmal das Bellen von Hunden war zu hören. Huang Weiguo holte tief Luft und tätschelte Li Yanmeis Hand."Lass uns gehen, heute ist unsere Chance. Wir packen zusammen, nehmen den Landweg, gehen in die Berge und suchen dann einen Weg ins Ausland. Solange wir hier rauskommen, ist unser Leben etwas wert."\n\nLi Yanmei biss sich auf die Lippe, ihre Augen wurden rot. "Huang, wir können es schaffen, oder?"\n"Wir können. Wir werden es schaffen." Huang Weiguo stand auf und stopfte schnell das letzte Dokument in seinen Rucksack. Er wusste, dass dies ihre letzte Chance war, ihr einziger Ausweg.\n\nSie packten zu Ende und zogen sich um. Huang Weiguo griff nach dem Türknauf und sagte mit leiser Stimme: "Ich gehe zuerst hinaus, ihr folgt mir. Denkt daran - schnell gehen, nicht zögern." Er holte tief Luft und stieß die Tür auf.\n\nAber draußen wartete weder die Nacht noch der Weg zur Flucht auf sie - sondern eine Reihe schwarzer Mündungen. Kalte Suchscheinwerfer blitzten ihnen ins Gesicht und zwangen sie, die Augen zu schließen. Huang Weiguo erstarrte für eine Sekunde, reagierte noch nicht, als der Offizier an der Spitze kalt sprach: "Endlich haben Sie sich entschlossen, herauszukommen."\n\n"Peng - "Der Schuss zerriss die Nacht.\n\nLi Yanmei hatte nicht einmal Zeit zu schreien. Huang Weiguo konnte nicht einmal seinen Mund öffnen. Die Kugel durchschlug ihre Brust, und Blut spritzte auf den Türrahmen -"
 china.1029.a: "wie eine blühende schwarze Blume."
 china.1030.t: "Neue Ordnung"
 china.1030.d: "Es hing still in der Mitte des riesigen elektronischen Bildschirms, karminrot und glühend, wie ein erwachtes Herz, das langsam und stetig über den Koordinaten von Peking pulsierte. Es war weder ungeduldig noch hektisch, als wüsste es, dass es nichts mehr zu beweisen brauchte. Er hatte zu lange gewartet - gewartet, um geweckt zu werden, gewartet auf den Tag der Rache, der ihm zustand.\n\nJeder Punkt des roten Sterns war wie ein scharfer Eisenhaken, der in alle Richtungen stach, wie ein Drache, der aus einem jahrhundertelangen Schlummer erwacht und langsam seine Glieder streckt. Er war es leid, nur am nationalen Emblem zu hängen, für Lieder und Gedenkfeiern benutzt zu werden. Er sehnte sich danach, zu zerreißen, zu verschlingen, den Schatten, der seit hundert Jahren auf der Nation lastete, Stück für Stück zurückzubeißen. Er konnte das Flüstern, die Diskussionen und die Entscheidungen der uniformierten, ausdruckslosen Offiziere hinter ihm spüren. Ihr Hass, ihre Wut nährten ihn, ließen ihm härtere Zähne und einen gierigeren Hunger wachsen. \n\nUnd so breitete sich das Glühen des roten Sterns langsam entlang der Frontlinien aus, wie eine mit Blut getränkte Tintenlache, die die Flüsse und Berge Südasiens verschlang und die Dschungel und Inseln Südostasiens übermalte. Die Namen, die mit Flüchen und Tränen in die Geschichtsbücher geschrieben wurden, wurden blass und ohnmächtig unter seinem Schein, zitterten und erstickten. \n\nDer rote Stern kümmerte sich nicht um diese verängstigten Augen, noch machte er sich die Mühe, auf ihre Bitten zu hören. Jeder seiner Punkte war wie ein klaffender Schlund, der sich auf die Nationen stürzte, die es wagten, Widerstand zu leisten. In seinen Augen waren diese nationalen Grenzen nichts als falsche Graffiti, Zeichen der Demütigung, die das einst zerrissene China erlitten hatte. Jetzt war es gekommen, um sie auszulöschen, sie mit Füßen zu treten, sie zu Asche zu verbrennen. \n\nSeine scharfen Kanten überquerten Berge, fegten über Meerengen und entzündeten jedes Land, das einst von Schande gezeichnet war. Sie verschlang, sie rechnete ab, sie badete in Blut, sie rächte. Es war eine Bestie aus den Tiefen der Seele der Nation, ein Drache, genährt von einem Jahrhundert voller Blut und Tränen. Er hörte die Angst dieser Völker, sah ihr Bedauern. Einst dachten sie, sie könnten dieses uralte Land des Ostens blockieren, demütigen, spalten und versklaven. Doch nun konnten sie im Schatten des roten Sterns nur noch zittern, konnten nur noch in die purpurnen Flammen blicken, während ihre Städte verbrannten, ihre Geschichte verbrannt wurde und sie nicht einmal die Chance hatten, Reue zu zeigen."
 china.1030.a: "Rache ist seit einem Jahrhundert überfällig."
 china.1031.t: "Die Erde blutet"
 china.1031.d: "Der Himmel brennt, Blut fließt, und unser Land schreit vor Schmerz.\nDie Feinde, die hoch und weit weg sitzen und gleichgültig lächeln, verstreuen den Tod über unsere Felder, unsere Städte, unsere Flüsse und Berge.\nSie kommen nicht, um zu siegen, sondern um unsere Existenz aus der Zeitlinie auszulöschen,\nUnsere Zivilisation zu Staub zu zermalmen.\nDie Toleranz der Vergangenheit war Schwäche; die Hoffnung der Vergangenheit war Gift. \nJetzt ist die Zeit des großen Gerichts gekommen.\nWenn unser Blut das Leuchtfeuer der Rache entzünden kann,\nWenn unser Fleisch eine neue Große Mauer errichten kann,\nWenn wir die Welt in den Abgrund ziehen müssen, dann lass sie untergehen. \nSelbst wenn wir mit ihr untergehen, selbst wenn das Licht aufhört zu existieren,\nWir werden dafür sorgen, dass der letzte Tropfen des Blutes unserer Heimat, der letzte Name, der letzte Atemzug des Glaubens in dieser Dunkelheit überlebt,\nBis jeder Feind ausgelöscht ist."
 china.1031.a: "Unser Blut wird zu den Blumen des Sieges erblühen."
 china.1032.t: "Pangu spaltet den Himmel"
 china.1032.d: "Zu Beginn der Zeit, als sich Himmel und Erde erstmals trennten, spaltete Pangu das Chaos auf. Das war das Blut der Schöpfung, der Schmerz der Ordnung. Von diesem Moment an war diese Welt dazu verdammt, zwischen Bruch und Wiedergeburt zu pendeln. Und nun hat dieser Zyklus sein Ende erreicht.\n\nDer Verfall der alten Welt ist unheilbar. Sie nennen sich zivilisiert, doch sie zwingen uns mit Klingen in die Knie. Sie schreiben Regeln mit Betrug, verkünden Gerechtigkeit durch Invasion und kleiden ihre Verbrechen in Heuchelei. Sie haben längst vergessen, wessen Land dies ist. Sie haben längst vergessen, wem diese Welt wirklich gehört.\n\nNun ist es an der Zeit, sie daran zu erinnern.\n\nNicht mehr Fantasien von friedlicher Koexistenz. Kein Festhalten mehr an diesen falschen Sitzen und Verträgen. Der Feind hat uns bereits an den Punkt gebracht, an dem es kein Zurück mehr gibt. Also lasst es hier enden. Lasst die Wasserstoffflammen von Milliarden von Grad ihren falschen Himmel zerreißen. Lasst die gewaltige Strahlung zu unserem Zorn werden. Lasst sie mit ihren eigenen Händen die Angst und Verzweiflung schmecken, die sie selbst in das blendende weiße Licht gesät haben, das alles verbrennt.\n\nWir werden das neue Pangu werden, Himmel und Erde mit unseren Körpern spalten und eine neue Ära mit unserem Blut schreiben. \nSelbst wenn wir selbst im Inferno verdampfen,\nSelbst wenn sich die Berge in Glas verwandeln und die Ozeane zu giftigem Nebel kochen, müssen wir die alte Welt mit unseren eigenen Händen zu Asche begraben.\nDenn nur nach dem Tod kann neues Leben den Boden durchbrechen; \nNur auf den Ruinen kann eine neue Zivilisation wieder aufgebaut werden;\nur in der tiefsten Dunkelheit kann eine neue Sonne aufgehen.\nDann werden wir uns aus dem Staub erheben, unsere Paläste wieder aufbauen und das himmlische Feuer neu entfachen.\nSelbst wenn die Welt dem Untergang geweiht ist,\nsolange der Wille der chinesischen Nation anhält, werden Himmel und Erde nicht untergehen."
 china.1032.a: "Ich liebe dieses Land mit einer tiefen, unerschütterlichen Leidenschaft."
 china.1033.t: "Liebe, Tod und das Mutterland"
 china.1033.d: "Einst benutzten sie Trennlinien, um dieses Land in Stücke zu reißen, unsere Sprache in Dialekte zu zerschneiden, unseren Glauben in Kirchen, Parlamente und Handelshäuser zu pressen. Sie nannten es "Zivilisation", nannten es "Ordnung", aber ihre Ordnung war nichts anderes als die Logik der Gier, ihre Zivilisation nichts anderes als verpackte Barbarei. Sie haben Asien nie respektiert, geschweige denn uns. Sie wollten nur, dass dieses Land in die Knie ging, dass sie Huaxia auslöschten, um es durch ihre minderwertige Kultur und ihr heuchlerisches System zu ersetzen.\n\nEs gelang ihnen - einmal.\n\nDas war unser erniedrigendster Moment. Zahllose Helden fielen in dieser Dunkelheit, zahlloses Blut floss in den Flüssen und Bergen, zahllose Generationen bissen die Zähne zusammen und ertrugen die Demütigung - nur um auf diesen Tag zu warten. Jetzt sind die Lügen, die sie spinnen, in den Flammen zerrissen, die Masken, die sie aufgesetzt haben, sind verrottet. Die Geschichte hat bewiesen, dass Asien weder westliche Wohltätigkeit noch deren Befehle und Diktate braucht. Die Zukunft Asiens hätte schon immer in den Händen Chinas liegen sollen. Nur unsere Ordnung ist der wahre Weg für dieses Land.\n\nWir haben den Preis bezahlt, haben unermessliche Opfer gebracht. Und deshalb ist die chinesische Nation noch mehr erwacht. Nur durch die gründliche Zerschlagung der falschen "globalen Regeln", durch die Vernichtung der kolonialen Überbleibsel, die in Asien Gift verbreiten, kann Asien zu seiner rechtmäßigen Einheit zurückkehren. Und dieser Weg - nur wir können ihn gehen, nur die chinesische Nation kann ihn anführen."
 china.1033.a: "Schneide meine Adern auf, und du wirst nur das Purpur von Huaxia sehen."
 china.1034.t: "Auf der Suche nach dem Yasukuni-Schrein"
 china.1034.d: "Li Zhiqiang trat auf den verbrannten Boden, sein Schweiß sickerte durch seine Kleidung im Schutzanzug, und das Gerät, das an seiner Brust hing, knarrte bei jedem Schritt. Ihr Auftrag war diesmal einfach: den ehemaligen Yasukuni-Schrein ausfindig machen und die Einrichtung einer Strahlungssperrzone vorbereiten.\n\nDie Stadt entlang des Weges sah nicht mehr aus wie etwas Vertrautes. Die Gebäude waren zu hohlen Hüllen gesprengt worden, und überall lagen zerbrochenes Glas und verformter Stahl verstreut. Dort, wo der Boden aufgerissen war, lagen die Abwasserkanäle frei, doch darin befand sich kein Wasser, sondern nur schwarzer Schlamm. Als sie noch fünf Kilometer vom Ziel entfernt waren, kreischte der Strahlungsdetektor plötzlich auf. Li Zhiqiang warf einen Blick auf die Anzeige - die Werte waren auf ein Maximum gestiegen, und der Alarm schrillte so laut, dass ihm das Trommelfell schmerzte. \n\nDer Offizier an der Spitze hob die Hand. Die Drohne hob ab, und die Bilder, die sie zurücksandte, ließen alle auf der Stelle erstarren. Das gezoomte Bild zeigte, dass das Gelände des Yasukuni-Schreins zu einem riesigen, kreisrunden schwarzen Krater geworden war. Die verbrannte Erde um ihn herum bildete eine nahtlose Weite. Es gab keine Spur von Gebäuden, und das Zentrum des Kraters schimmerte in einem blassgrauen Licht - das war das Zeichen dafür, dass der Boden verglast worden war. Der Offizier blickte auf das Bild und seufzte. "Da vorne ist die tote Zone. Setzt die Marker und zieht euch zurück."  Li Zhiqiang drehte sich mit dem Team um und stellte Warnschilder aus dicken, rot gestrichenen Stahlplatten auf den Boden: Tote Zone. Zutritt verboten.\n\nAls sie gingen, blickte er noch einmal auf die Ruinen. Der Horizont sah aus, als wäre er durchgebrannt worden und hätte nichts zurückgelassen. An den umliegenden Gebäuden waren sogar die Schatten in den Beton gesprengt worden - regungslos, eingefroren."
 china.1034.a: "Vielleicht sind das nicht nur Schatten..."
 china.1035.t: "Ich sah ein graues Pferd"
 china.1035.d: "Sudirman lag flach im Haus. Die Türen und Fenster waren mit Klebeband verschlossen, und der Raum war so stickig wie ein Dampfschiff. Er wusste nicht, was draußen geschah, nur dass sich die Luft verändert hatte - es roch nach brennendem Plastik, gemischt mit einem beißenden Geruch. Manche sagten, es sei Giftgas, andere meinten, es handele sich um eine neue Art von Kriegswaffe. Seit dem Morgengrauen war am fernen Himmel ein tiefes, dumpfes Dröhnen zu hören, Welle um Welle, die nie aufhörte. Aus dem Funkgerät des Nachbarn ertönte chaotisches Geschrei, das schließlich ebenfalls verstummte. Sudirman lehnte sich an die Mauerecke und spürte, wie der Boden zitterte, als würde sich ein riesiges Ungeheuer nähern.\n\nDann hörte er sie - sie waren angekommen. Soldaten in vollständig abgedichteten Schutzanzügen marschierten in Reihen die Straße hinunter. Ihre Gesichter waren hinter schwarzen Masken verborgen, kein Gesichtsausdruck war zu erkennen, ihre Gewehre hielten sie ruhig, die Läufe auf jede Ecke gerichtet.\n\nSudirman spähte hinaus und sah durch einen Spalt im Fenster, dass sich auf der Straße dichter gelber Nebel gebildet hatte, der die gesamte Stadt dicht bedeckte. In der Ferne standen mehrere grüne schwere Artilleriegeschütze am Ende der Straße, die Läufe hoch erhoben, und feuerten auf die Stadt. Als der Rauch aufstieg, verdichtete sich der gelbe Nebel in der Stadt. Der Wind trieb den gelben Nebel in jede Gasse, bedeckte jedes Gebäude, jedes Auto und jede Straße.\n\nEr hörte, wie aus den Lautsprechern immer wieder etwas geblasen wurde, aber es interessierte ihn nicht mehr. Jetzt brannte und juckte sein ganzer Körper, seine Haut färbte sich rot, und die Luft verbrannte seine Lungen wie Feuer. Er versuchte, Wasser zu finden, aber als er es berührte, brannte seine Haut wie von einem Messer geschnitten.\n\nSudirman lehnte an der Wand und wartete auf sein endgültiges Urteil."
 china.1035.a: "Und die Hölle folgte auf dem Fuße."
 china.1036.t: "Nicht von unserer Sorte"
 china.1036.d: "Huang Kairui kauerte hinter zertrümmertem Beton, sein Tarnanzug war nicht mehr von Schlamm oder Blut zu unterscheiden. Drei Tage lang hatten sie nichts Warmes gegessen und kein Auge zugemacht. Das Bombardement der PLA hatte nicht aufgehört - tagsüber Flugzeuge, nachts Raketenbeschuss. Der Himmel schien unaufhörlich zu summen, und das tiefe Dröhnen machte ihre Köpfe schwindelig. Ihr Zugführer war ein jähzorniger Ire, der noch gestern geschworen hatte, bis zum Ende durchzuhalten - heute Morgen war er nicht mehr aufzufinden.\n\nHuang Kairui folgte dem verbliebenen guten Dutzend australischer Soldaten, die ein weißes Tuch hochhielten und hinter den Ruinen hervortraten. Sie wagten es nicht, aufzublicken, und hielten nur ihre Köpfe gesenkt, während sie vorwärts gingen. Ringsum lagen bereits PLA-Soldaten auf der Lauer, mit kalten Gewehrläufen auf sie gerichtet. Sie wurden von einem Trupp PLA-Soldaten an die Seite eines eingestürzten Lagerhauses getrieben. Kairui hörte einige flüsternde Gebete, andere schluchzten leise, aber niemand wagte es, laut zu sprechen. \n\nIhr Anführer versuchte zu sprechen, aber die PLA zerrte einfach das andere Dutzend australischer Soldaten in die Ecke des Lagerhauses. Nach einer kurzen Stille und einem Schusswechsel war die Luft sofort mit dem Gestank von verrostetem Eisen erfüllt.\n\nAls er an der Reihe war, platzte er instinktiv heraus: "Ich... ich bin Kantoneser! Meine Eltern kommen aus Guangdong!"\n\nDer PLA-Soldat vor ihm hielt inne, nahm seine Maske ab und enthüllte ein schmutziges, staubbedecktes Gesicht.\n\n"Du bist Australier.""
 china.1036.a: "Ein Schuss ertönte, und Huang Kairui sackte zu Boden."

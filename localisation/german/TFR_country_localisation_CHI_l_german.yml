 CHI_democracy_in_the_republic_category_desc: ""
 CHI_the_mainland_conflict_category: "Der Festlandkonflikt"
 CHI_the_mainland_conflict_category_desc: "Wir sind offiziell als Republik China bekannt, obwohl wir nur die Insel Taiwan kontrollieren, was viele Probleme innerhalb unserer Nation verursacht hat."
 CHI_test_of_will: "Willensprüfung"
 CHI_test_of_will_desc: "\n\n\n\n\n£GFX_CHI_test_of_will_banner \n\n\n\n\n\n\nVor mehr als 70 Jahren ist der blutige Bürgerkrieg in China zu einem Ende gekommen. Unser Volk hat jahrzehntelang Frieden und Wohlstand genossen, aber das konnte nicht ewig so bleiben. Die Welt verändert sich, radikalisiert sich, brennt, und es scheint, dass wir zu den ersten Opfern dieser schrecklichen Umstände gehören werden.\nDie alte, vergessene Glut des Bürgerkriegs flammt mit neuer Kraft auf, und es wird nicht lange dauern, bis wir für unser eigenes Leben einstehen müssen.\n§3                                    Unsere Sonne darf niemals verblassen.§!"

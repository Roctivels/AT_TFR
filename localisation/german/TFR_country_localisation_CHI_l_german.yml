 taiwan.500.t: "Unser letzter Krieg"
 taiwan.500.d: "Nach den wochenlangen verdächtigen OAVI-Bewegungen und den ständig zunehmenden Spannungen im Kalten Krieg zwischen China und Japan, der einen neuen Höhepunkt erreicht hat, rechnen viele internationale Beobachter mit einem heißen Krieg in naher Zukunft. Obwohl die PDTO ihre diplomatischen Missionen intensiviert hat, um zu versuchen, die Situation zu deeskalieren, haben sowohl Tokio als auch Peking verkündet, dass zwischen den beiden Koalitionen nun Kriegszustand herrscht und wir gezwungen sind, erneut um unsere Existenz zu kämpfen.\n\nNachdem alle diplomatischen Bemühungen vergeblich waren, hat sich der heftigste regionale Konflikt des asiatisch-pazifischen Raums vor uns ausgebreitet. Mit mehr als 3 Milliarden Menschen, die in den größten Krieg verwickelt sind, den die Menschheit bisher erlebt hat, können wir realistischerweise nicht erwarten, dass die Chinesen dieses Mal einfach klein beigeben werden. Entweder legt die PDTO die chinesische Kriegsmaschinerie und ihre Fähigkeit, jeden Konflikt neu zu entfachen, vollständig lahm, oder die OAVI wird vorrücken, um den Rest Asiens zu unterwerfen. Geschlagen, aber noch nicht besiegt, wird die neue chinesische Regierung, angetrieben von ihrer revanchistischen Gesinnung und neu gefundenen Verbündeten in ganz Asien, zweifellos versuchen, unsere Regierung zu stürzen und unser demokratisches System zu zerstören, wie sie es 2021 versucht hat. Um unsere eigene Zukunft zu sichern, haben wir beschlossen, uns in den Großen Asienkrieg einzumischen und Seite an Seite mit unseren demokratischen Verbündeten zu kämpfen, um die von Peking geführte Allianz ein für alle Mal zu besiegen."
 taiwan.500.a: "Zu den Waffen!"
 
 
 #sub-sub ideologies 
 loc_taiwanese_progressivism: "Taiwanesischer Progressivismus"
 CHI_neoliberalism_desc: "\n\n\n\n£GFX_CHI_ideology_neoliberalism\n\n\n\n\n\n§YTaiwanese Progressivism§! is an ideology upheld by the Democratic Progressive Party (DPP), other Pan-Green parties, and some independent figures. The Democratic Progressive Party, the leader of the Pan-Green Coalition, originated from the Tangwai movements that began in the mid-1970s. Due to its history of resisting the Kuomintang's tutelage and White Terror, the DPP considers liberal democracy, political justice, and egalitarianism its core ideologies. These values were later inherited by the broader Taiwanese progressive movement. Over the years, it has also absorbed anti-communist ideas due to the Chinese Communist Party's growing hostility and also advocates to disconnect Taiwan from Mainland China.\n\nToday, Taiwanese progressivism advocates for multiple causes, including social liberty and equality, environmental sustainability, LGBTQ+ rights, and Taiwanese independence, and remains a significant movement in Taiwanese politics."
 loc_taiwanese_conservatism: "Taiwanesischer Konstitutionalismus"
 loc_taiwanese_liberal_populism: "Liberaler Populismus"
 taiwanese_liberal_populism: "Liberaler Populismus"
 taiwanese_liberal_populism_desc: "Der taiwanesische liberale Populismus ist eine Variante des liberalen Konservatismus, der den Schwerpunkt darauf legt, Wählerstimmen zu gewinnen, indem er die Bedürfnisse des Volkes erkennt, aktiv Dienstleistungen anbietet und die Lebensbedingungen der weniger begünstigten Gesellschaftsschichten verbessert.\n\nDa der Schwerpunkt auf der Sicherung von Wahlen liegt, wird die Ideologie oft als "prinzipienlos" und unfähig, ihre Grenzen klar zu definieren, beschrieben. Statt sie als "Ideologie" zu bezeichnen, ziehen es viele vor, sie als Wahlstrategie zu bezeichnen, um ihr wahres Wesen besser darzustellen."
 reformed_tridemism: "Reformierter Tridemismus"
 reformed_tridemism_desc: "Der Tridemismus, oder die Prinzipien des Volkes, besteht aus drei gleich wichtigen Komponenten: Nationalismus, Demokratie und Wohlfahrtsstaatlichkeit.\n\nZu Beginn des 21. Jahrhunderts hatte die ursprüngliche Form des Tridemismus ihre Unfähigkeit gezeigt, eine moderne Gesellschaft zu regieren. Dies veranlasste viele dazu, eine reformierte Version der Ideologie zu verfolgen.\n\n m Vergleich zu seinem Vorgänger reduziert der reformierte Tridemismus die Bedeutung des Nationalismus und betont gleichzeitig die Ausweitung des Wohlfahrtsstaates, den er als wichtigste Komponente der modernisierten Ideologie betrachtet. Andererseits wird die Demokratie, die nun als Grundbedürfnis des Volkes gilt, in das umfassendere Konzept des Wohlfahrtsstaates integriert, so dass der Sozialstaat der einzige Schwerpunkt des reformierten Tridemismus ist."
 
 loc_taiwanese_OCTS_democracy: ""Ein Land, zwei Systeme"-Demokratie"
 CHI_market_socialism_desc: "\n\n\n\n£GFX_CHI_ideology_market_socialism\n\n\n\n\n\nAuf den ersten Blick mag die Idee von §Y"Ein Land, zwei Systeme"§! wie ein phantasievolles politisches Experiment oder ein ungewöhnlicher Plan zur Untergrabung der nationalen Souveränität erscheinen. In den ostasiatischen Küstenstädten gibt es dieses einzigartige politische System jedoch schon seit fast vierzig Jahren. Es wurde zu einer Zeit konzipiert, als Chinas wirtschaftliche Stärke und politischer Einfluss noch relativ schwach waren. Es war eine pragmatische Antwort, um die heftigen Konflikte zwischen Sozialismus und Kapitalismus auszugleichen. Im Rahmen dieses Systems behält die Sonderverwaltungsregion dieselbe Souveränität wie die Zentralregierung, genießt aber eine weitgehende Autonomie und hat die Freiheit, ihre eigenen Regierungsorgane und gesetzgebenden Institutionen zu schaffen. Dies ermöglicht eine nahezu uneingeschränkte Politikgestaltung und -umsetzung. Im Gegensatz zu traditionellen Staatenbünden, in denen die Mitgliedsstaaten oft über eine große Autonomie verfügen, ist die Sonderverwaltungsregion in der Regel auf eine einzige Stadt beschränkt, wodurch das Risiko einer Destabilisierung der Union durch separatistische Gefühle minimiert wird.\n\n Heutzutage, da sich das Kräfteverhältnis und das politische Klima verschoben haben, hat sich die Logik hinter "Ein Land, zwei Systeme" weiterentwickelt. Ursprünglich zum Schutz und zur Trennung gedacht, ist es nun zu einer Plattform für die Förderung eines tieferen multilateralen Austauschs geworden.  "Ein Land, zwei Systeme" ist ein wesentlicher Rahmen für die Erleichterung der friedlichen Koexistenz von Menschen mit unterschiedlichen Ideologien, die Förderung der Interaktion und Integration zwischen verschiedenen politischen und wirtschaftlichen Systemen und letztlich die Förderung der Harmonie der Werte." 


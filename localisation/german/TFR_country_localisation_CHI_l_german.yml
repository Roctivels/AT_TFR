 #National Focuses
 CHI_island_in_one_fate: "Insel in einem Schicksal"
 CHI_island_in_one_fate_desc: "Zum ersten Mal seit achtzig Jahren sieht sich die Bevölkerung der Insel mit einer militärischen Invasion konfrontiert, die unsere Unabhängigkeit und Souveränität in Frage stellt und uns vollständig zu unterwerfen droht, ohne dass es Raum für Verhandlungen gibt. Trotz der Parteilichkeit, die unsere Politik beherrscht und unser Volk polarisiert, ist die Aufrechterhaltung der Unabhängigkeit von Peking eine der wenigen gemeinsamen Grundlagen, auf die sich die meisten unserer Bürger einigen können. Da es nun keine Möglichkeit mehr gibt, einen prekären Status quo aufrechtzuerhalten, haben die Beschwichtiger endlich keine Ausreden mehr, um Zugeständnisse zu machen, und wir können beginnen, die Politik unter dem Banner der nationalen Verteidigung beiseite zu lassen."
 CHI_solidify_civil_defence: "Zivilschutz festigen"
 CHI_solidify_civil_defence_desc: "Als dicht besiedelte Insel ist unsere Bevölkerung ständig Bombenangriffen aller Art ausgesetzt. Unsere Koordinatoren sind mit der militärischen Verteidigung überlastet, und unsere Notdienste sind völlig ungeordnet und haben nicht die Kapazität, jeden Zivilisten in Not zu erreichen. Glücklicherweise können wir auf unsere Zivilschutzorganisationen zurückgreifen, die in sechzig Jahren für den Fall einer unwahrscheinlichen chinesischen Invasion aufgebaut wurden. Indem wir sie mit unserem umfangreichen Angebot an Luftschutzbunkern kombinieren, können wir unsere überlasteten Notfallsysteme entlasten und gleichzeitig unsere Zivilbevölkerung vor den Schrecken des Krieges schützen."
 CHI_guerilla_strategy: "Guerillastrategie"
 CHI_guerilla_strategy_desc: "Wir sind nicht in der Lage, die PLA frontal zu bekämpfen. Wir sind in Bezug auf Personal und Ausrüstung, Erfahrung und Bereitschaft sowie Doktrin und Taktik im Rückstand. Daher hat das Generalstabshauptquartier beschlossen, die PLA nicht direkt zu bekämpfen, sondern einen anderen Ansatz zu wählen - den Guerillakrieg. Indem wir uns unser Terrain zunutze machen, einschließlich dichter städtischer Gebiete, Küsten, Berge und Wälder, können wir unsere Kampffähigkeit bewahren und die totale Zerstörung unserer Streitkräfte vom ersten Tag an vermeiden. Die Kombination aus asymmetrischer Kriegsführung, ungünstigem Terrain und komplizierter Umgebung wird die Angreifer mit Sicherheit für jeden Zentimeter bezahlen lassen, den sie in unsere Heimat vordringen."
 CHI_disrupt_transportation: "Transport unterbrechen"
 CHI_disrupt_transportation_desc: "Die PLA hat den Boden berührt und nutzt nun unsere Docks und Häfen, um Ausrüstung und Nachschub zu erhalten, der dann an ihre Streitkräfte an der Front geht, um die Verluste aufzufüllen. Das ist völlig inakzeptabel. Glücklicherweise ist es unseren Ingenieuren gelungen, vor dem Rückzug Sprengsätze in den wichtigsten Strukturen und Straßen der Häfen anzubringen, und unsere Raketen stehen bereit, um die Häfen mit ihren Nutzlasten außer Gefecht zu setzen und die PLA zu wochenlangen Reparaturarbeiten zu zwingen, wenn sie sie wieder in Betrieb nehmen will. Während dieser Zeit wird die PLA in ihren Lagern ausgehungert sein und ihre Fähigkeit verlieren, Offensiven zu starten, und wir werden auch die Möglichkeit haben, einen Gegenangriff zu starten, der möglicherweise kleinere Einheiten der PLA auslöschen wird."
 CHI_hold_the_defence_line: "Die Verteidigungslinie halten"
 CHI_hold_the_defence_line_desc: "Als Folge der präventiven Raketen- und Seebombardements sind unsere Verteidigung, Organisation und Kommunikation völlig durcheinander geraten. Um das Blatt zu unseren Gunsten zu wenden, müssen wir den wütenden, intensiven und blutigen Offensiven der ersten Wochen standhalten. Diese Verzögerung ist ein wichtiger Teil der Wiederherstellung unserer logistischen Fähigkeiten und der Wiederbelebung unserer Kommandostruktur aus dem totalen Chaos. Um dies zu erreichen, werden wir unsere Ressourcen auf die Wiederherstellung der Kommunikations- und Transportverbindungen konzentrieren und dafür sorgen, dass sich unsere Armeen voll und ganz auf die Verteidigung konzentrieren, anstatt nach riskanten Gelegenheiten zu suchen, den PLA-Kräften zu schaden."
 CHI_appeal_to_the_free_world: "Appell an die freie Welt"
 CHI_appeal_to_the_free_world_desc: "Mit dem Sturz der Vereinigten Staaten in einen schrecklichen Machtkampf bricht die alte internationale Ordnung vor unseren Augen zusammen. Das heißt jedoch nicht, dass die demokratischen Kräfte in der Welt alle mit der verstorbenen Supermacht untergegangen sind, denn viele Bastionen und Leuchttürme rund um den Globus halten die Fackeln der Demokratie noch hoch. Einige von ihnen sind bereit, ideologische Verbündete zu unterstützen, um eine weitere Verschlechterung ihrer internationalen Position zu verhindern. Die verstorbenen MNNAs, die verbleibende NATO, Südkorea und Kanada, um nur einige zu nennen, sind alle bereit, für uns zu sprechen oder sogar auf dem internationalen Schlachtfeld gegen die unterdrückerischen Kräfte der Volksrepublik China vorzugehen."
 CHI_military_civilian_duty: "Militärisch-ziviler Dienst"
 CHI_military_civilian_duty_desc: "Unsere Insel ist klein und überfüllt. Mit wenig bis keiner strategischen Tiefe ist die Heimatfront die Frontlinie. Die VR China hat mit ihrer riskanten Invasion gezeigt, dass sie die Sicherheit unserer Zivilbevölkerung missachtet, und angesichts der bereits gemeldeten zivilen Opfer können wir die Rhetorik der Defätisten, die behaupten, dass die "Wiedervereinigung" schnell und unblutig vonstatten gehen wird, vollständig widerlegen. Wenn sie aus dem Weg geräumt sind, können wir uns daran machen, die militärisch-zivile Einheit zu fördern, indem wir uns von unserer Bevölkerung bei der Funktion einer Kriegsgesellschaft helfen lassen."
 CHI_grant_emergency_powers: "Notfallbefugnisse erteilen"
 CHI_grant_emergency_powers_desc: "In Kriegszeiten ist keine Zeit für langwierige, bürokratische Prozesse, die die Fähigkeit der Exekutive einschränken, auf Notfälle schnell zu reagieren. Wenn die PLA vor unserer Tür steht, wird der Präsident den Notstand ausrufen, das Kriegsrecht verhängen und dem Militär mehr Befugnisse zur Kontrolle der Situation einräumen. Die Strafverfolgungsbehörden werden vorübergehend in die Kommandostrukturen des Militärs integriert, um kollaborierende Sabotageakte und Proteste zu unterdrücken und eine gerechtere und effizientere Verteilung der Ressourcen mit Hilfe der Waffengewalt zu ermöglichen."
 CHI_engineering_maintenance_brigade: "Technische Wartungsbrigade"
 CHI_engineering_maintenance_brigade_desc: "Während die Bomber und die Artillerie der PLA auf unserem Boden einschlagen, werden unsere wirtschaftlichen Aktivitäten entweder gestört oder ganz eingestellt. Am stärksten betroffen sind die Bereiche Bau und Infrastruktur. Aus Angst vor gezielten Angriffen, die immensen Schaden anrichten können, haben Baufirmen und staatliche Unternehmen, die notwendige Dienstleistungen erbringen, vorübergehend alle Bau- und Wartungsarbeiten eingestellt, so dass Zehntausende von Arbeitern und Ingenieuren arbeitslos sind und ihre Familien nicht ernähren können. Um ihr Fachwissen zu unserem Vorteil zu nutzen, können wir Arbeitsmöglichkeiten anbieten, die auch in Friedenszeiten als lukrativ angesehen werden, und die Engineering Maintenance Brigade aufstellen. Die Einheit wird uns bei militärtechnischen Projekten unterstützen und es uns ermöglichen, schnell mehrschichtige Befestigungen zu errichten und raue Umgebungen schneller zu durchqueren als die kommunistischen Streitkräfte."
 CHI_withdraw_foreign_exchange: "Devisen abheben"
 CHI_withdraw_foreign_exchange_desc: "Während unsere massiven Devisenreserven unsere Wirtschaft robust und unsere Währung in Friedenszeiten stabil gehalten haben, kann der große Vorrat an Devisen auch zu unserem Vorteil für die nationale Verteidigung und die wirtschaftliche Stabilität genutzt werden. Durch die Entnahme von Teilen unserer Reserven können wir versuchen, die anhaltende Finanzpanik zu stabilisieren, indem wir ausverkaufte Vermögenswerte und Währungen aufkaufen, um unsere Wirtschaft auch während eines Krieges einigermaßen funktionsfähig zu halten. Darüber hinaus können sie auch für den Kauf wichtiger Ausrüstungen verwendet werden, um Verluste auszugleichen und unsere Streitkräfte in die Lage zu versetzen, gegen die Invasoren zurückzuschlagen."
 CHI_unite_the_island: "Die Insel vereinen"
 CHI_unite_the_island_desc: "Die brutale Invasion der Kommunisten hat jeden erreicht, der diese Insel sein Zuhause nennt. Von Taipeh bis Kaohsiung, von der Stadt bis zum Land, von den Betonwäldern bis zum ruhigen Ackerland, von den tiefgrünen bis zu den tiefblauen Provinzen - nichts bleibt von den brennenden Flammen der Zerstörung verschont, und niemand kann diesen Konflikt mehr getrost als "keine seiner Angelegenheiten" bezeichnen. Wir müssen uns gegen die Aggressoren zur Wehr setzen. Wenn sie das Leben und Wohlergehen von Millionen von Menschen aufs Spiel setzen können, können wir dann wirklich erwarten, dass die so genannte "Wiedervereinigung" für uns ein echter Gewinn sein wird? Die Insel muss als Einheit kämpfen, um eine Chance auf den Sieg zu haben, und eine Niederlage wird den Verlust unserer Freiheit, unserer Demokratie und unserer Verbindung zu unseren demokratischen Verbündeten garantieren."
 CHI_wolf_pack_tactics: "Wolfsrudeltaktiken"
 CHI_wolf_pack_tactics_desc: "Als Inselnation ist unsere Fischereiindustrie wohlhabend und groß, beschäftigt Zehntausende von Menschen und unzählige Fischerboote. Obwohl der Konflikt ihr Geschäft gestört hat und alle Boote auf unbestimmte Zeit vor Anker liegen, hat der Generalstab einen einzigartigen Plan vorgeschlagen, um zu versuchen, die von der PLAN verhängte Blockade zu durchbrechen. Indem wir kleine zivile Schiffe mobilisieren und requirieren, können wir sie losschicken, um Ressourcen von unseren Handelspartnern zu beschaffen und so unsere Engpässe zu lindern. Dank ihrer geringen Größe und relativ hohen Geschwindigkeit sind sie nicht nur schwer auszumachen, sondern können sich auch schnell absetzen und vermeiden, versenkt zu werden. Sie werden zwar nicht genug importieren können, um die Wirtschaft wieder in Gang zu bringen, aber die dringend benötigten Ressourcen können unsere wichtigsten Dienste wiederherstellen und die Moral unserer Bevölkerung stärken."
 CHI_phantom_legions: "Phantomlegionen"
 CHI_phantom_legions_desc: "Unsere Luftwaffe ist der großen und hochmodernen Flugzeugflotte der PLA weit unterlegen, was dazu führt, dass unsere Truppen und wichtigen Gebäude Tag und Nacht ständig von Kampfflugzeugen und Bombern angegriffen werden. Wir können zwar ihre Bombenfähigkeit nicht zerstören, aber wir können ihre Bomben vielleicht woanders hinlenken. Unsere Befehlshaber haben einen interessanten Vorschlag gemacht: Sie setzen auf der ganzen Insel Attrappen ein, die in der Regel aus Ballons, Brettern oder ähnlichen billigen Materialien bestehen, um die PLAAF zu verwirren und sie zu veranlassen, ihre Munition auf falsche Ziele zu verschwenden. Auch wenn es unkonventionell erscheinen mag, haben unsere Ingenieure berichtet, dass sie es schaffen können - sie brauchen nur unsere Zustimmung, um damit zu beginnen.
 CHI_taiwan_still_brave: "Taiwan immernoch mutig"
 CHI_taiwan_still_brave_desc: "Nachdem wir die härtesten und gefährlichsten Wochen des Konflikts überstanden haben, ist es uns gelungen, den ursprünglichen Plan der PLA, uns schnell zu besiegen und zu unterwerfen, zu durchkreuzen. Wir haben nicht nur die internationalen Beobachter schockiert, die unsere schnelle Niederlage vorausgesagt hatten, sondern die Menschen glauben nun von ganzem Herzen, dass der Sieg nicht außer Reichweite ist, und unsere Streitkräfte und die Zivilbevölkerung stehen nun zusammen und sind bereit, gegen den Aggressor, der unser Recht auf Selbstbestimmung untergräbt, zurückzuschlagen. Mit unserer Fackel der Freiheit, die immer noch hell leuchtet, kann nun jeder Taiwaner mit Stolz sagen, dass Taiwan immer noch tapfer ist und wir nicht aufgeben werden."
 

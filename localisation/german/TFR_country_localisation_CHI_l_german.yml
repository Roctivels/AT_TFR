 taiwan.26.t: "Die Siebte Flotte bleibt in der Straße von Taiwan"
 taiwan.26.d: "Nach dem Ausbruch des Bürgerkriegs auf dem amerikanischen Festland verfolgt die internationale Gemeinschaft weiterhin den Status der US-Militäreinsätze in Übersee.  Kürzlich operierten einige Schiffe der Siebten US-Flotte weiterhin in der Nähe der Straße von Taiwan, wodurch die regionale Situation komplizierter wurde. \n\nDer Sprecher des chinesischen Verteidigungsministeriums behauptete, dass die USA trotz der internen Unruhen weiterhin Zwischenfälle in der Taiwan-Frage provozieren, das Ein-China-Prinzip verletzen, sich in die inneren Angelegenheiten Chinas einmischen und den Frieden und die Stabilität in der Region untergraben. Der Sprecher bekräftigte außerdem, dass Taiwan ein untrennbarer Teil Chinas sei. Die Volksbefreiungsarmee bleibt in höchster Alarmbereitschaft und geht entschlossen gegen jegliche Provokationen vor, um die nationale Souveränität und territoriale Integrität zu schützen. \n\nDie Siebte Flotte erklärte, dass sie ihre Operationen in der panindopazifischen Region "wie gewohnt" fortsetzen werde, wobei sie die Freiheit der Schifffahrt betonte und erklärte, dass sie weiterhin Aktivitäten in Gewässern durchführen werde, die nach internationalem Recht zulässig seien. Das US-Verteidigungsministerium betonte, dass die Mission der Siebten Flotte "von den innenpolitischen Umständen unberührt bleibt". \n\nExperten kritisierten, dass die Siebte Flotte ihre Präsenz in der Straße von Taiwan beibehält, was die Unsicherheit und das Risiko einer Fehleinschätzung der Situation erhöht."
 taiwan.26.a: "Warum ist die Siebte Flotte noch in der Straße von Taiwan?"
 taiwan.27.t: "Spannungen zwischen China und Taiwan verschärfen sich"
 taiwan.27.d: "Die seit langem schwelende Taiwanstraße ist wieder in den Fokus der internationalen Gemeinschaft gerückt. Nach der erfolgreichen Wiederwahl von Tsai Ing-wen bei den Parlamentswahlen 2020 in Taiwan hat die Volksbefreiungsarmee (PLA) den militärischen Druck auf die Insel rasch erhöht und im Februar eine groß angelegte Operation rund um Taiwan gestartet. Berichten der taiwanesischen Behörden zufolge führten rund 40 PLA-Flugzeuge Formationsflüge durch, wobei einige kurzzeitig die Demarkationslinie überflogen, was auf beiden Seiten der Meerenge erhöhte Alarmbereitschaft auslöste.\n\n Dieses Militärmanöver wurde als scharfe Reaktion auf die Ablehnung des "Konsenses von 1992" durch die Regierung Tsai und deren feste Haltung zur eigenständigen Identität Taiwans interpretiert. Das taiwanesische Verteidigungsministerium schickte sofort Kampfjets los, um die eindringenden Flugzeuge zu überwachen und abzuwehren, und versetzte die nationalen Sicherheitsbehörden in höchste Alarmbereitschaft. Gleichzeitig forderte die Regierung in Taipeh Peking auf, seine Provokationen einzustellen und den friedlichen Dialog zwischen beiden Seiten der Straße wieder aufzunehmen. \n\nPeking erklärte jedoch, die Operation sei eine notwendige Gegenmaßnahme gegen "pro-unabhängige Aktivitäten" und ausländische Einmischung und diene der Verteidigung der nationalen Souveränität und territorialen Integrität. Das Vorgehen hat in der internationalen Gemeinschaft große Besorgnis und Unbehagen ausgelöst. Experten haben davor gewarnt, dass ohne wirksame Dialogmechanismen und Krisenmanagementrahmen die Taiwanstraße mit anhaltender Instabilität und eskalierenden Risiken konfrontiert werden könnte.\n\n"
 taiwan.27.a: "Im Jahr 1962 war es Kuba, im Jahr 2020 ist es Taiwan."
 taiwan.28.t: "Spannungen zwischen China und Taiwan nehmen ab"
 taiwan.28.d: "Das Ergebnis der Parlamentswahlen 2020 in Taiwan ist, gelinde gesagt, unerwartet. Der Kuomintang-Kandidat Han Kuo-yu besiegte die favorisierte Amtsinhaberin Tsai Ing-wen und gewann die Wahl mit leichtem Vorsprung und wurde damit zum neuen Staatsoberhaupt Taiwans. Die Bekanntgabe des Wahlergebnisses erregte sofort Aufmerksamkeit und versetzte die Bevölkerung Taiwans in Erstaunen.\n\nDer Sieg wurde von den internationalen Medien als Ausdruck der drastischen Schwankungen der öffentlichen Meinung in Taiwan interpretiert. Experten wiesen darauf hin, dass die wirtschaftlichen und existenziellen Schwierigkeiten, die Verschärfung der politischen Konfrontation und die Unzufriedenheit mit der Politik der derzeitigen Regierung in der Taiwanstraße die Hauptgründe für die Hinwendung der Wähler zu den konservativen Kräften sind. Im Lager von Han Kuo-yu heißt es, dieser Sieg sei "der Wunsch des Volkes nach Brot und Frieden"\n\nDas chinesische Mutterland hat eine "positive Bewertung" der Wahlergebnisse zum Ausdruck gebracht und eine Geste des guten Willens sowie seine Bereitschaft zur Wiederaufnahme von Konsultationen und Austausch auf der Grundlage des "Konsens von 1992" bekundet. Taipeh ist in die Phase der politischen Neuordnung eingetreten, und die DPP-Führung hat eine Dringlichkeitssitzung abgehalten.\n\nDie internationale Gemeinschaft lenkt nun ihre Aufmerksamkeit auf die Situation und fordert die neue taiwanesische Regierung auf, den Status quo zu wahren und den regionalen Frieden zu sichern. Die Regierungen Japans, Großbritanniens und anderer NATO-Verbündeter riefen zu einem "rationalen Übergang" auf, um zu verhindern, dass sich die Instabilität auf die indopazifische Region ausweitet."
 taiwan.28.a: "...ein Silberstreif?"
 taiwan.29.t: "Festland lehnt Sieg der DPP entschieden ab"
 taiwan.29.d: "Die Parlamentswahlen 2020 in Taiwan sind zu Ende gegangen, und Tsai Ing-wen, die Kandidatin der Demokratischen Fortschrittspartei, hat den Sieg errungen. Die zuständigen Abteilungen des Festlandes bekräftigten feierlich, dass Taiwan seit jeher zu China gehört und der Staat niemals zulassen wird, dass eine "taiwanesische Unabhängigkeit" das Land spaltet und sezessionistische Kräfte Taiwan unter irgendeinem Namen oder mit irgendwelchen Mitteln dazu bringen, sich von China abzuspalten. Der Sprecher des Büros für Taiwan-Angelegenheiten des Staatsrats verurteilte die DPP-Behörden scharf dafür, dass sie sich weigern, den "Konsens von 1992" anzuerkennen, das Ein-China-Prinzip offen in Frage stellen und den Frieden und die Stabilität in der Taiwanstraße ernsthaft untergraben. Der Sprecher betonte, dass das Mutterland den festen Willen, das volle Vertrauen und die ausreichenden Fähigkeiten habe, jede Form von separatistischen Versuchen der "Taiwan-Unabhängigkeit" zu vereiteln.\n\nPeking betonte, dass die Taiwan-Frage zu den inneren Angelegenheiten Chinas gehöre und jede Einmischung externer Kräfte entschlossen bekämpft werde. Das Festland warnte, dass jede Absprache und Provokation zwischen den Kräften der "taiwanesischen Unabhängigkeit" und externen Kräften wirksam bekämpft werden wird.\n\nAnalysten wiesen darauf hin, dass, obwohl die DPP weiterhin hartnäckig ihre separatistische Position vertritt, der historische Trend unumkehrbar ist, die Wiedervereinigung des Mutterlandes unaufhaltsam ist und jeder Akt des Verrats an der Nation in einem vollständigen Scheitern enden wird."
 taiwan.29.a: "Wir werden die Lage in der Straße von Taiwan weiterhin beobachten."
 taiwan.291.t: "U.S. Außenministerium veröffentlicht Erklärung zur Taiwanstraße"
 taiwan.291.d: "Als die Spannungen in der Straße von Taiwan zunahmen, wiederholte das US-Außenministerium seine Position, "jede einseitige Änderung des Status quo abzulehnen". \n\nIn der Erklärung wurde betont, dass die "Politik der USA gegenüber Taiwan unverändert bleibt" und Washington den Taiwan Relations Act und die sechs Zusicherungen aufrechterhält. Die USA fordern beide Seiten auf, "Zurückhaltung zu üben und Fehleinschätzungen zu vermeiden." \n\nEin Sprecher des Außenministeriums erklärte: "Wir sind zutiefst besorgt über den jüngsten Anstieg der Spannungen in der Straße von Taiwan". "Wir bekräftigen, dass Frieden und Stabilität den gemeinsamen Interessen der internationalen Gemeinschaft dienen. Wir rufen alle Seiten auf, von einseitigen Handlungen - insbesondere von der Anwendung von Gewalt oder Zwang - abzusehen, die eine Eskalation riskieren."\n\nDie Anwesenheit mehrerer Schiffe im Westpazifik ist Teil von "routinemäßigen Operationen zur Wahrung der Navigationsfreiheit". Während Peking dies als "Einmischung in innere Angelegenheiten" kritisiert hat, behaupten US-Beamte, dass solche Operationen "völlig im Einklang mit dem Völkerrecht stehen und nichts mit den aktuellen regionalen Entwicklungen zu tun haben.""
 taiwan.291.a: "Washington lehnt jede gewaltsame Änderung des Status quo ab!"
 taiwan.292.t: "Trump kündigt Militärhilfe für Taiwan an"
 taiwan.292.d: "Angesichts der weiterhin angespannten Lage in der Straße von Taiwan hat Präsident Donald Trump auf einer Pressekonferenz ein "historisches Verteidigungshilfepaket" für Taiwan angekündigt. \n\nDas Paket umfasst Flugabwehrraketen, Radarsysteme, Drohnen und „eine begrenzte Anzahl von Anti-Schiffswaffen". Trump erklärte: "Taiwan kämpft für die Freiheit. Amerika wird nicht tatenlos zusehen." \n\nDie Erklärung würde internationale Aufmerksamkeit auf sich ziehen. Obwohl parteiübergreifende Stimmen im Kongress ihre Unterstützung zum Ausdruck brachten, verurteilte Chinas Außenministerium die Ankündigung scharf und warnte Washington, "nicht mit dem Feuer zu spielen." \n\nDas Pentagon stellte fest, dass es "die Logistik potenzieller Transfers prüft", betonte aber, dass "jegliche militärische Unterstützung für Taiwan auf defensiver Basis und innerhalb des bestehenden rechtlichen Rahmens erfolgen wird.""
 taiwan.292.a: "Feuer auf der anderen Seite der Straße!"
 taiwan.293.t: "Pelosis Besuch in Taiwan erschüttert die Region"
 taiwan.293.d: "Die Sprecherin des US-Repräsentantenhauses, Nancy Pelosi, traf mit einem Militärflugzeug in Taipeh ein und hielt eine Rede vor der Legislative der Insel. In ihrer Rede betonte sie Amerikas "Unterstützung für Taiwans demokratisches System", erklärte, dass "Taiwan nicht allein ist", und forderte eine Vertiefung der Beziehungen zwischen den USA und Taiwan.\n\nAls Reaktion darauf kündigte das PLA Eastern Theater Command den Start von 2Real-Combat Drills rund um die Insel" an. Mehrere Marine- und Lufteinheiten führten groß angelegte Übungen mit Live-Feuer um Taiwan herum durch und simulierten gemeinsame Blockaden, Durchbruchsschläge und Operationen zur Sperrung von Gebieten. Mehrere Raketen flogen über die Insel, was Taiwan dazu veranlasste, seine Luftverteidigung auf die höchste Alarmstufe zu setzen. Obwohl das Weiße Haus versuchte, den Besuch als "persönliche Reise des Präsidenten" herunterzuspielen, wurde er von internationalen Beobachtern weithin als ernsthafte Eskalation der Spannungen zwischen den USA und China angesehen."
 taiwan.293.a: "Der Sturm ist da."
 taiwan.30.t: "PLA-Übungen verschärfen Spannungen in der Straße von Taiwan"
 taiwan.30.d: "Die Situation in der Straße von Taiwan wird durch die jüngsten groß angelegten Militärübungen der Volksbefreiungsarmee (PLA) in der Straße von Taiwan und den umliegenden See- und Luftgebieten erschüttert. Die Übungsthemen umfassen gemeinsame Kontrolle, Langstreckenangriffe und koordinierte Operationen auf See und in der Luft und markieren eine der intensivsten Übungen im realen Kampf in den letzten Jahren.\n\nDer Sprecher des Ministeriums für Nationale Verteidigung erklärte, eine solche Übung sei eine notwendige Reaktion auf die aktuellen Veränderungen der Situation in der Straße von Taiwan, die darauf abzielt, die nationale Souveränität und territoriale Integrität zu verteidigen und den Frieden und die Region zu erhalten. Der Sprecher betont, dass die PLA ihre Kampffähigkeiten weiter verbessern und allen Provokationen der Separatisten und Einmischungen von außen entgegentreten werde. Die taiwanesischen Behörden würden das Festland beschuldigen, "die regionalen Spannungen zu verschärfen", und das Verteidigungsministerium in Taipeh behauptet, es habe die Übungen genau überwacht und seine Kampfbereitschaft erhöht, um "unerwartete Zwischenfälle" zu verhindern. Der militärische Druck der PLA wird als direkte Antwort auf die kontinuierliche Förderung der "schrittweisen Unabhängigkeit Taiwans" durch die DPP-Behörden gesehen, Taipeh würde eine härtere Haltung einnehmen und den Widerstand mit Unterstützung externer Kräfte verstärken. Die regionale Stabilität in der Meerenge wird in nächster Zeit wahrscheinlich hoch bleiben, was eine ernsthafte Herausforderung für die regionale Stabilität darstellt."
 taiwan.30.a: "Wir werden die Lage in der Straße von Taiwan weiterhin beobachten."
 taiwan.30.b: "Solche Maßnahmen sind notwendig, um die Unabhängigkeitsbestrebungen Taiwans zu verhindern."
 taiwan.31.t: ""
 taiwan.31.d: ""
 taiwan.31.a: ""
 taiwan.32.t: "Am Ende... stehen wir!"
 taiwan.32.d: "Trotz der furchtbarsten Prüfungen, die uns widerfahren sind, hat unser Volk diesen schrecklichen Konflikt überstanden und sich durchgesetzt.\nDie Insel der Hoffnung steht still wie ein unbeweglicher Berg."
 taiwan.32.a: "Und unser Volk geht den Weg des Lebens."
 taiwan.33.t: "Zweite Welle an Raketenangriffen!"
 taiwan.33.d: "Cool"
 taiwan.33.a: "Cool"
 taiwan.34.t: "Schreiben des Verteidigungsministeriums"
 taiwan.34.d: "Empfänger: Präsidialamt\nPriorität: Oberste Priorität\nBetreff: Aktueller Stand unserer Landesverteidigung\n\nUnser Hauptziel, die Volksbefreiungsarmee am Vormarsch nach Taiwan zu hindern, ist gescheitert. Die PLA hat Schwachstellen in unserer Verteidigung ausgenutzt und kontrolliert nun mehrere Großstädte und Häfen, was unsere Kriegsanstrengungen stark beeinträchtigt. Da dieses Ziel nicht erreicht wurde, können wir den Konflikt nicht länger auf die Küstenlinien beschränken und sind nun gezwungen, uns in städtischem und gebirgigem Terrain zu engagieren.\n\nDie PLA hat unsere zweite Verteidigungslinie erreicht, die die verbleibenden Städte und Gebirgszüge umgibt, was aufgrund der Komplexität städtischer und gebirgiger Umgebungen zu unserem Vorteil bei der Verteidigung genutzt werden kann. Unsere Armee hat bereits Verteidigungspositionen um die von der Volksrepublik China kontrollierten Städte errichtet und ist besser in der Lage, weitere Vorstöße der PLA aufzuhalten.\n\nAuch die PDTO hat in diesem Konflikt schwere Verluste erlitten. Dies hatte unerwartete psychologische Auswirkungen sowohl auf unsere Zivilbevölkerung als auch auf unsere Streitkräfte. In Anerkennung der Tatsache, dass die PDTO wirklich unsere Waffenbrüder sind, haben wir einen Zustrom von zivilen Freiwilligen erhalten, die unsere Verteidigungsvorbereitungen und unsere Logistik unterstützen. Dies hat unsere Moral und unsere Verteidigungsfähigkeiten gestärkt, und die Kommandeure berichten, dass die Bereitschaft und die Einsatzbereitschaft unserer Bodentruppen höher denn je sind."
 taiwan.34.a: "Wir werden sicher gewinnen..."
 taiwan.35.t: "Nachbeben"
 taiwan.35.d: "6:27 Uhr. "Feindliches Flugzeug im Anflug. Suchen Sie sofort Schutz." In der vierten Woche seit der abrupten Unterbrechung der Schule wacht Kai Chih-li zu einer weiteren schrillen Luftangriffswarnung auf, gepaart mit dichten Wolken am Himmel, die kurz davor sind, Bomben zu regnen. Drei F-16 dröhnen in den Himmel, um sie abzufangen, und übertönen fast die Schreie der Polizei: „Nehmt nicht den Aufzug, nehmt die Treppe!"\n\n6:50 Uhr. "[Luftverteidigungsalarm] Luftverteidigungsalarm aufgehoben. Melden Sie unbekannte Objekte der Polizei oder der Feuerwehr." Das Hämmern hört auf, und die Schutzsuchenden verlassen geordnet das Gebäude, um mit ihrer Kriegsroutine zu beginnen. Kai eilt zu dem FamilyMart, in dem er arbeitet, um sich auf seine 8-Uhr-Schicht vorzubereiten. Draußen wartet bereits ein Dutzend Kunden, die eine Mischung aus Scheinen, Münzen und staatlichen Lebensmittelmarken in der Hand halten. Nichts Ungewöhnliches heute - außer, dass er die Praktikantin darin schulen soll, wie man gebrauchte Briefmarken zum Einsammeln organisiert.\n\n 14:00 Uhr. „CWA Sonnenzeit-Benachrichtigung - Ausreichend Sonnenlicht heute bis 18:35 Uhr." "Manager Chen - Drucken Sie 100 Kopien davon aus und verteilen Sie sie. Von der Regierung angefordert. PA20018583.pdf." Vor zwei Stunden hatte er noch einen Funken Hoffnung, als das Sonnenlicht durchbrach, aber die CWA-Aktualisierung bestätigte es - keine kurze Schicht heute. Enttäuscht bittet er die Praktikantin, die Flugblätter zu drucken, während er nach einer kurzen Pause zur Kasse zurückkehrt.\n\n18:50 Uhr. Der zivile Internetverkehr wird von den Internetanbietern eingeschränkt, um Bandbreite und Strom zu sparen. Die Straßenlaternen flackern kurz auf, um Unfälle zu vermeiden, aber Autos sind wegen der Treibstoffrationierung selten geworden. Auf dem Heimweg entdeckt Kai einen Stand mit einer grünen Tarndecke, wie man sie von Schulfesten kennt. Neugierig geht er darauf zu. Der Standleiter winkt ihn heran."Wir organisieren Zivilschutzgruppen", sagt er. "Nehmen Sie an unseren Schulungsprogrammen zur Identifizierung von Blindgängern und zur Behandlung von Verletzungen teil, um unsere Feuerwehrleute und Sanitäter zu unterstützen."\n\n18:52 Uhr. Kai nimmt eine Broschüre in die Hand und liest. Von der Regierung gesponsert, freiwillig, ohne Waffen, keine Miliz oder Kanonenfuttereinheit. Die FAQ beantworten die meisten seiner Fragen. Nach einer Pause atmet er ein.\n\n18:57 Uhr."
 taiwan.35.a: "Wann soll ich anfangen?"
 taiwan_detente.0.t: "Kuomintang sichert die Wahlen in Taiwan"
 taiwan_detente.0.d: "Ein Thema, das sich in letzter Zeit wie ein Lauffeuer über unsere Social-Media-Plattformen verbreitet hat, ist der Abschluss der taiwanesischen Kommunalwahlen, bei denen die Bevölkerung Han Kuo-yu zum Verwaltungschef der separatistischen Region gewählt hat. Einige feiern die Ablehnung der radikalen taiwanesischen Unabhängigkeitsbefürworter, während Teile der Netizen-Bevölkerung die Legitimität dieser Kommunalwahlen in Frage stellen. Das Büro für Taiwan-Angelegenheiten hat sich kaum zu der Angelegenheit geäußert, abgesehen davon, dass es sich bei der "Präsidenten"-Wahl lediglich um eine Kommunalwahl handelt und dass sich ausländische Mächte nicht in unsere inneren Angelegenheiten einmischen sollten. Berichten zufolge sind jedoch einige Teile der Regierung über den Sieg der Kuomintang erleichtert, da die Partei eher zur Zusammenarbeit mit uns und zur Aufrechterhaltung herzlicher Beziehungen bereit ist. Ein beträchtlicher Teil zweifelt immer noch an Han Kuo-yus Engagement für die Wiederherstellung der Kontakte, aber nach dem Ausscheiden der DPP wird der Prozess zumindest reibungsloser verlaufen."
 taiwan_detente.0.a: "Wir hoffen, dass sie zur Einsicht kommen."
 taiwan_detente.1.t: "Ein Olivenzweig für das Festland"
 taiwan_detente.1.d: "Nach Abschluss der Wahlen und der Ernennung der Minister können wir uns endlich an die Arbeit machen. Einer der wichtigsten Punkte auf unserer Agenda ist die Abkehr von der Politik der Regierung Tsai Ing-wen, die auf Distanz zum Festland geht. Diese Politik des Festlandes hat unserem Tourismus und unserer Landwirtschaft schweren Schaden zugefügt, da das Festland nicht nur zahlreiche Verbote für verschiedene Waren verhängt, sondern auch die Tourismuskontrollen verschärft hat, wodurch die Zahl der Touristen vom Festland, die unsere Inseln besuchen, zurückgegangen ist. Noch schlimmer ist, dass die KPCh die DPP-Regierung wiederholt bedroht hat, was zu Instabilität und Panik in unserer Bevölkerung geführt hat.\n\nUm den Schaden wiedergutzumachen, wird die erste Aufgabe des Rates für Festlandangelegenheiten darin bestehen, die kalten Beziehungen zwischen uns und dem Festland zu ändern. Durch die Wiederaufnahme von Gesprächen und die Abhaltung von Gipfeltreffen werden wir alles tun, um dem Festland einen Olivenzweig zu reichen, in der Hoffnung, dass es bereit ist, den Frieden zu suchen und wieder mit uns zusammenzuarbeiten."
 taiwan_detente.1.a: "Eine neue Ära der Interaktion zwischen beiden Seiten der Straße."
 taiwan_detente.2.t: "Kuomintang-Regierung bemüht sich um Versöhnung"
 taiwan_detente.2.d: "Vor kurzem haben wir erfahren, dass der Rat für Festlandangelegenheiten, der seit der Übernahme der Kontrolle durch die radikalen separatistischen Parteien de facto abgeschafft ist, über die Straits Exchange Foundation Kontakt zu uns aufgenommen hat, um die Wiederaufnahme der diplomatischen Beziehungen zwischen unseren Seiten zu erreichen. Mehrere Vertreter der taiwanesischen Seite haben begonnen, mit ihren Amtskollegen auf unserer Seite Kontakt aufzunehmen, um über mögliche Vorgespräche zu verhandeln, die in erster Linie darauf abzielen, in Zukunft formellere und umfassendere Konferenzen zu erörtern.\n\nUnsere Regierung hat positiv darauf reagiert. Berichten zufolge hat das Büro für Taiwan-Angelegenheiten mehreren taiwanesischen Vertretern privat eine diplomatische Einreisegenehmigung erteilt, sich aber mit weiteren öffentlichen Stellungnahmen zurückgehalten, bis eine gemeinsame Basis zwischen uns und Taiwan gefunden ist. Auch wenn wir keine großen Hoffnungen auf eine friedliche Wiedereingliederung Taiwans setzen, wünschen wir uns, dass diese Gipfeltreffen als Ausgangspunkt dafür dienen, dass das taiwanesische Volk unsere gemeinsame Brüderlichkeit wieder anerkennt."
 taiwan_detente.2.a: "Verstand."
 taiwan_detente.3.t: "Eckpfeiler nach Concord"
 taiwan_detente.3.d: "Großartige Neuigkeiten von unseren Friedenssuchenden im Rat für Festlandangelegenheiten! Es scheint, dass die Straits Exchange Foundation erfolgreich Kontakt mit ARATS auf dem Festland aufgenommen hat - vermutlich mit Duldung des Büros für Taiwan-Angelegenheiten - und grundlegende Vereinbarungen für weitere Konferenzen getroffen hat. Dazu gehört auch, die andere Seite darüber zu informieren, dass die amtierende Regierung bereit ist, den Konsens von 1992 anzuerkennen, der seit der Ära des ehemaligen Präsidenten Lee Teng-hui die Grundlage für alle unsere friedlichen Kontakte bildet, einschließlich des Ma-Xi-Treffens - des wichtigsten Treffens seit den Chongqing-Verhandlungen von 1945.\n\nMit diesem guten Willen unserer Brüder auf der anderen Seite der Meerenge können wir mit der Vorbereitung offenerer Veranstaltungen auf niedriger Ebene beginnen, um die öffentliche Feindseligkeit gegenüber dem Festland abzubauen, bevor wir größere Gipfeltreffen abhalten, um umfassendere politische und wirtschaftliche Themen zu diskutieren. Wir werden aus dem Scheitern des CSSTA lernen und es vermeiden, Anti-Festland-Stimmungen zu provozieren, die der Opposition 2014 Anlass für die Sonnenblumenbewegung gaben."
 taiwan_detente.3.a: "Ausgezeichnet!"
 taiwan_detente.4.t: "Xiamen-Konferenz"
 taiwan_detente.4.d: "Nach den positiven Reaktionen unserer Kollegen auf der anderen Seite der Meerenge haben sich das Innenministerium und der Rat für Festlandangelegenheiten dafür eingesetzt, das Eis zwischen uns und dem Festland zu brechen. Eine kürzlich durchgeführte Umfrage ergab, dass zwei Drittel der Befragten die Wiederaufnahme von Gesprächen befürworten oder nicht ablehnen. Mit der Genehmigung des Präsidenten machten sich die Vertreter des MAC auf den Weg nach Xiamen, wo sie von den Beamten des Festlands herzlich empfangen wurden.\n\nDie Konferenz beherrschte die Schlagzeilen, wobei drei Ereignisse besonders hervorstachen: die feierliche Eröffnung, die Aufhebung der Einfuhrverbote für verschiedene landwirtschaftliche Erzeugnisse, die zuvor als Vergeltung für die feindselige Politik von Tsai Ing-wen verhängt worden waren, und die Gespräche über das neue COVID-19-Virus. Das Festland erklärte sich auch bereit, als Vermittler zu fungieren und WHO-Informationen mit uns zu teilen und im Gegenzug unsere Aktualisierungen weiterzugeben.\n\nDie Veranstaltung wird als großer Erfolg für die Regierung von Präsident Ma angesehen, und weitere Treffen sind bereits in Planung. Es wird erwartet, dass Vertreter des Festlandes demnächst Kinmen besuchen werden, um den Tourismus zu fördern und die Region als eine Hochburg der Kuomintang-Unterstützung weiter zu festigen."
 taiwan_detente.4.a: "Eine strahlende Zukunft liegt vor uns."
 taiwan_detente.5.t: "Alleine nach Formosa"
 taiwan_detente.5.d: ""Dies ist der letzte Aufruf zum Einsteigen für den Flug BR721 nach Taipeh". \n\nDie Durchsage hallt durch das Terminal, als Huang Fu-ji zu Gate 3 eilt, seinen Pass und sein Flugticket in der Hand, immer noch außer Atem von dem Sprint. Nach einer kurzen Kontrolle besteigt er das Flugzeug. Während die Triebwerke aufheulen und der Boden sich senkt, öffnet er sein Telefon und liest einen Screenshot von der Website des Taiwan Affairs Office, auf der er Hinweise dazu findet, was bei einem Besuch in Taiwan zu tun und was zu vermeiden ist. Als sorgfältiger Planer hat er einen detaillierten Reiseplan erstellt, der bis auf die Minute genau ist, aber aufgrund früherer Erfahrungen noch Pufferzeit zwischen den einzelnen Stopps lässt.\n\nAuf dem Flughafen sendet das Fernsehen Nachrichten über die erfolgreiche Shanghai-Konferenz, die dazu geführt hat, dass das Festland die Regelung für individuelle Besuche wieder aufgenommen hat. Aber Huang interessiert sich nicht dafür - seine Augen sind auf den Bildschirm der Gepäckausgabe gerichtet, denn er will seine lang erwartete Tour beginnen.\n\nNach Einbruch der Dunkelheit kehrt er in dasselbe Hotel zurück, in dem er vor sieben Jahren übernachtet hat - nur dass es dieses Mal keine Reiseführer, keine lauten Reisegruppenbegleiter und niemanden gibt, der den Zeitplan durchkreuzt. Bei Sonnenaufgang will er die traditionellen Feuchtmärkte und den Muzha-Zoo besuchen und hofft, Pandas und andere exotische Tiere zu sehen."
 taiwan_detente.5.a: "Bon Voyage."
 taiwan_detente.6.t: "Singapur-Gespräche beginnen"
 taiwan_detente.6.d: "Mit Unterstützung der Regierung von Singapur haben Vertreter des Festlandes und Taiwans vor kurzem in Singapur ein formelles Treffen zur Aushandlung der Beziehungen zwischen beiden Seiten der Straße begonnen. An dem Treffen nahmen Vertreter der Kuomintang teil, während sich die Vertreter des Festlandes aus Beamten des Büros für Taiwan-Angelegenheiten des Staatsrats zusammensetzten. Auf der Grundlage der Prinzipien der Gleichheit, des Respekts, der Zurückstellung von Differenzen und Streitigkeiten sowie der Suche nach Gemeinsamkeiten bei gleichzeitigem Vorbehalt von Unterschieden führten beide Seiten einen eingehenden Dialog über Themen wie die wirtschaftliche Zusammenarbeit zwischen beiden Seiten, die Erleichterung des Personalaustauschs und die Aufrechterhaltung des regionalen Friedens und der Stabilität. Der Dialog verlief in einer positiven Atmosphäre, die den gemeinsamen Willen zur Wiederaufnahme des Dialogs und zur Verbesserung der Beziehungen widerspiegelt. Das Außenministerium von Singapur begrüßte, dass beide Seiten Singapur als neutralen Ort für den Dialog und den Austausch gewählt haben und hofft, dass dieses Treffen zum Abbau der Spannungen und zur Förderung des Friedens und der Stabilität in der Region beitragen wird."
 taiwan_detente.6.a: "Mal sehen, wie das endet."
 taiwan_detente.7.t: "Gespräche über die Wiedervereinigung zwischen beiden Seiten der Straße intensivieren sich"
 taiwan_detente.7.d: "Vor der Verschlechterung des Bürgerkriegs in den Vereinigten Staaten hat die internationale Diplomatie deutliche Anzeichen von Veränderungen gezeigt. Da sich die sozialen Spaltungen in den Vereinigten Staaten verschärften und die Arbeit der Regierung häufig behindert wurde, nahm der Einfluss der Vereinigten Staaten in internationalen Angelegenheiten weiter ab.\n\nVor diesem Hintergrund hat Festlandchina seine Kontrolle über die Situation im Umfeld verstärkt. In der Zwischenzeit wurden innerhalb Taiwans verschiedene Stimmen laut, und einige etablierte politische Parteien forderten eine erneute Überprüfung der Ausrichtung der Beziehungen zwischen Taiwan und China, um zu vermeiden, dass sie bei der Neuordnung der internationalen Kräfte an den Rand gedrängt werden.\n\nNachdem der Bürgerkrieg in den Vereinigten Staaten offiziell ausgebrochen war, nahm die Fähigkeit der US-Regierung, im Ausland zu intervenieren, plötzlich ab, und es entstand eine große Lücke in der Sicherheitslage im asiatisch-pazifischen Raum. Das chinesische Festland hat deutlich gemacht, dass es den Prozess der nationalen Wiedervereinigung entschlossen vorantreiben, sich jeder Form von separatistischem Verhalten entschlossen entgegenstellen und betonen wird, dass seine Entschlossenheit, die nationale Souveränität und territoriale Integrität zu schützen, nicht ins Wanken geraten wird.\n\n In Taiwan haben wichtige Kräfte wie die Kuomintang in Zeiten politischer Unruhen zu einer pragmatischeren Haltung aufgerufen, um sich der Realität auf beiden Seiten der Meerenge zu stellen, und befürworteten die Suche nach neuen Vereinbarungen durch friedliche Verhandlungen."
 taiwan_detente.7.a: "Ist es bald zu Ende?"
 taiwan_detente.8.t: "Vereinigungsagenda bei den Gesprächen zwischen Singapur und Strait angesprochen"
 taiwan_detente.8.d: "Delegationen des Festlandes und Taiwans kamen diese Woche zu einer neuen Verhandlungsrunde zusammen, die von der Regierung Singapurs koordiniert wurde. Das Treffen fand während des Bürgerkriegs in den USA statt, der die Dynamik in der asiatisch-pazifischen Region veränderte und große internationale Aufmerksamkeit auf sich zog. Während der Gespräche schlug die Delegation des Festlandes offiziell vor, den Vereinigungsprozess zwischen beiden Seiten zu beschleunigen, und forderte einen regelmäßigen Kommunikationsmechanismus und einen substanziellen Dialog über einen möglichen Vereinigungsrahmen. Die Vertreter erklärten, dass "das Erreichen der vollständigen nationalen Wiedervereinigung das gemeinsame Ziel von 1,4 Milliarden Menschen und ein entscheidender Schritt bei der großen Verjüngung der chinesischen Nation ist", und betonten die Notwendigkeit, die gegenwärtige historische Chance zu ergreifen.\n\nDie taiwanesische Delegation, die von der Kuomintang (KMT) angeführt wird, behält eine vorsichtige Haltung bei. Sie bekräftigte zwar ihr Engagement für eine friedliche Gestaltung der Beziehungen zwischen beiden Seiten der Straße, blieb aber in Bezug auf die Wiedervereinigung "offen, aber zurückhaltend" und betonte, wie wichtig es sei, den Lebensstil, das Sozialsystem und die Kerninteressen des taiwanesischen Volkes zu schützen.\n\nZum ersten Mal seit Jahren ist die Frage der Wiedervereinigung als offizieller Tagesordnungspunkt auf den Verhandlungstisch zurückgekehrt. Auch wenn der weitere Weg ungewiss bleibt, hat der Dialog selbst strategisches Gewicht."
 taiwan_detente.8.a: "Die Vereinigung der beiden Seiten ist ein unvermeidlicher Trend."
 taiwan_detente.9.t: ""Vereinigungsagenda bei den Gesprächen zwischen Singapur und Strait angesprochen"
 taiwan_detente.9.d: "Delegationen des Festlandes und Taiwans kamen diese Woche zu einer neuen Verhandlungsrunde zusammen, die von der Regierung Singapurs koordiniert wurde. Das Treffen fand während des Bürgerkriegs in den USA statt, der die Dynamik in der asiatisch-pazifischen Region veränderte und große internationale Aufmerksamkeit auf sich zog. Während der Gespräche schlug die Delegation des Festlandes offiziell vor, den Vereinigungsprozess zwischen beiden Seiten zu beschleunigen, und forderte einen regelmäßigen Kommunikationsmechanismus und einen substanziellen Dialog über einen möglichen Vereinigungsrahmen. Die Vertreter erklärten, dass "das Erreichen der vollständigen nationalen Wiedervereinigung das gemeinsame Ziel von 1,4 Milliarden Menschen und ein entscheidender Schritt bei der großen Verjüngung der chinesischen Nation ist", und betonten die Notwendigkeit, die gegenwärtige historische Chance zu ergreifen.\n\nDie taiwanesische Delegation, die von der Kuomintang (KMT) angeführt wird, behält eine vorsichtige Haltung bei. Sie bekräftigte zwar ihr Engagement für eine friedliche Gestaltung der Beziehungen zwischen beiden Seiten der Straße, blieb aber in Bezug auf die Wiedervereinigung "offen, aber zurückhaltend" und betonte, wie wichtig es sei, den Lebensstil, das Sozialsystem und die Kerninteressen des taiwanesischen Volkes zu schützen.\n\nZum ersten Mal seit Jahren ist die Frage der Wiedervereinigung als offizieller Tagesordnungspunkt auf den Verhandlungstisch zurückgekehrt. Auch wenn der weitere Weg ungewiss bleibt, hat der Dialog selbst strategisches Gewicht."
 taiwan_detente.9.a: "Die Vereinigung der beiden Seiten der Straße ist ein unvermeidlicher Trend."
 taiwan_detente.10.t: "Letzte Entscheidung"
 taiwan_detente.10.d: "Spät abends in Zhongnanhai saß Xi Jinping allein in seinem Büro in der Qinzheng-Halle. Vor ihm lag eine verblasste Karte der Straße von Taiwan. Im grellen Licht zeichneten die Seelinien die Brüche der Geschichte nach.\n\nDie Berichte der Gemeinsamen Stabstelle und der Zentralen Militärkommission hatten wiederholt bestätigt: Die entscheidende Zeit für eine friedliche Wiedervereinigung ist verstrichen. Die öffentliche Meinung auf der Insel war tief gespalten, und die ausländische Einmischung nahm weiter zu. Noch länger zu warten, würde bedeuten, die strategische Initiative völlig zu verlieren.\n\nZehn Jahre lang hatte er Konfrontationen vermieden, eine stabile internationale Ordnung angestrebt und Risiken gemildert. Doch nun war die Zeit zu seinem ärgsten Feind geworden. Die Wiedervereinigung war nicht länger eine politische Entscheidung, sondern eine Entscheidung über Leben und Tod für die Integrität und Zukunft der Nation. Er war sich der Kosten und der Konsequenzen bewusst, die sich aus den Opfern auf dem Schlachtfeld, dem wirtschaftlichen Umbruch, dem zunehmenden internationalen Druck und sogar den ernsten politischen Risiken ergaben. Doch die Geschichte würde nicht warten.\n\n"Risiko?" Er blickte in die Nacht. „Wann sind unsere Genossen in den Revolutionsjahren jemals ohne Risiko vorangekommen?". Die Luft in Zhongnanhai war wie eingefroren. Im ganzen Land schienen sich alle Augen auf ihn zu richten."\n\n"Das Schicksal hat uns den einzigen Weg gelassen."\n\n"Bereitet die nächste Etappe vor.""
 taiwan_detente.10.a: "Die Pforten der Geschichte haben sich geöffnet."

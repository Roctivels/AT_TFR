 taiwan.4.t: "Wahlen 2020"
 taiwan.4.d: "Das wichtigste Ereignis zwischen dem westlichen Neujahrsfest und dem chinesischen Neujahrsfest, die taiwanesischen Wahlen 2020, werden sowohl über die Legislative als auch über das Präsidentenamt entscheiden. Nach einer einwöchigen Pause aufgrund des tragischen Black-Hawk-Hubschrauberabsturzes am 2. Januar wurde die letzte Phase des Wahlkampfes wieder aufgenommen, und die Kandidaten hielten ihre letzten und größten politischen Kundgebungen in mehreren Großstädten ab.\n\nDie amtierende Präsidentin Tsai Ing-wen, die erste weibliche Präsidentin Taiwans und die erste indigener Abstammung, vertritt das pro-grüne Lager. Die Juraprofessorin mit einer politischen Karriere, die bis ins Jahr 2000 zurückreicht, wird von ihren Befürwortern oft als Grund dafür angeführt, dass sie die qualifiziertere Wahl ist. Trotz einer turbulenten ersten Amtszeit sind ihre Zustimmungswerte seit Juli 2019 gestiegen, und viele Beobachter sagen einen Sieg der Grünen voraus. Auf der Seite der Blauen steht Han Kuo-yu, der derzeitige Bürgermeister von Kaohsiung, der von den Einwohnern der Stadt angefeindet wird, weil er sie angeblich "im Stich gelassen" hat. Han hat einen Master-Abschluss in Jura und ist erst 2017 in die Politik zurückgekehrt, so dass seine Erfahrung im Vergleich zu der des DPP-Kandidaten blass ist. Dennoch argumentieren seine Anhänger, dass die schwache Leistung der DPP bei den Wählern den Wunsch nach Veränderung geweckt hat. Viele glauben, dass sein unorthodoxer politischer Stil eine neue goldene Ära für Taiwan einläuten könnte.\n\nJames Soong ist ebenfalls im Rennen, obwohl die meiste öffentliche Aufmerksamkeit, die ihm zuteil wird, eher in Form von Witzen als in Form von ernsthaftem politischem Engagement erfolgt.\n\nAm Tag nach einer anstrengenden Nacht der Abschlusskundgebungen begeben sich die Bürger im ganzen Land zu den nächsten Wahllokalen, um über die Zukunft ihrer Nation zu entscheiden. Als die Nacht hereinbricht und die Stimmen ausgezählt sind, wird das Endergebnis verkündet:"
 taiwan.4.a: "UTsai Ing-wen und die Pan-Grünen gewinnen alles!"
 taiwan.4.b: "Han Kuo-yu und die Pan-Blauen steigen zur Macht auf!"
 taiwan.5.t: "Tsai Ing-Wen wird wiedergewählt"
 taiwan.5.d: "Taiwans Präsidentin Tsai Ing-wen dankte den Wählern der Insel am Samstag dafür, dass sie \"demokratische Werte in die Praxis umgesetzt haben"\  , nachdem sie mehr als 57 % der Stimmen erhalten hatte. Tsais komfortabler Sieg ist die Krönung eines bemerkenswerten Comebacks, nachdem sie nach verheerenden Ergebnissen bei den Kommunalwahlen 2018 als Vorsitzende der DPP zurücktreten musste, nachdem diese bei den Wahlen auf der selbstverwalteten Insel eine vernichtende Niederlage erlitten hatte.\n\nNach der Wahl am Samstag sprach Tsai die Spannungen mit China über die Souveränität des Territoriums an und sagte, dass Taiwan bereit sei, mit China zusammenzuarbeiten, China aber die Stimme der Wähler Taiwans respektieren müsse."
 taiwan.5.a: "Ein Schritt weg von der Wiedervereinigung"
 taiwan.6.t: "Han Kuo-yu sichert sich die Präsidentschaft durch einen Umschwung"
 taiwan.6.d: "Der gewählte Präsident Han Kuo-yu dankte den Wählern der Insel für ihren Wahlauftrag nach einem überraschenden Sieg gegen die amtierende DVP-Kandidatin Tsai Ing-Wen. Die KMT, die sich auf die älteren, aus Han stammenden Wähler stützt, sicherte sich einen knappen Sieg, indem sie nach verschiedenen Embargos und wirtschaftlichen Problemen zu engeren Beziehungen mit China aufrief. Indem er Tsai Ing-Wen als realitätsfremde Elitistin und sich selbst als populistische Führungspersönlichkeit brandmarkte, konnte er viele Wechselwähler mit seinen Versprechungen zur nationalen Sicherheit für sich gewinnen, nachdem es der DPP nicht gelungen war, ihre Interessen gegenüber der Volksrepublik China angemessen durchzusetzen."
 taiwan.6.a: "Eine weiße Sonne und ein blauer Himmel ziehen über Taiwan"

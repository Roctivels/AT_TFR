 taiwan.1.t: "Die trotzige Insel"
 taiwan.1.desc: "Die Skylines der Städte werden durch schillernde Feuerwerke heller als sonst erleuchtet. Die Künstler treiben die Konzerte zu ihren Höhepunkten und heizen die Menge weiter an. Die Menschen, die sich um die höchsten Gebäude versammelt haben, sehen ehrfürchtig zu, wie der Mond selbst von den Flammen der Raketen überwältigt zu werden scheint, während diejenigen, die es sich in ihren Bunkern gemütlich gemacht haben, jubeln, als der Countdown endlich die Null erreicht und damit das Ende des Jahrzehnts markiert.\n\n Wir schreiben das Jahr 2020. Unsere führende Position in der Halbleiterherstellung bleibt unangefochten. Der Aktienmarkt steigt höher denn je, und der TAIEX hält sich fast das ganze Jahr über über 10.000 Punkten. Trotz der durch den Handelskrieg zwischen China und den USA verursachten Turbulenzen hat unsere robuste Wirtschaft eine bemerkenswerte Widerstandsfähigkeit bewiesen, und die Wachstumsrate lag während des gesamten Jahres 2019 konstant bei rund 3 %.\n\nDas neue Jahr signalisiert auch den Abschluss des Präsidentschaftswahlkampfs. Präsidentin Tsai Ing-wen strebt eine zweite Amtszeit an, während der wichtigste Oppositionsführer, der umstrittene Han Kuo-yu, weiter an Popularität gewinnt. James Soong wird sich zum fünften Mal um die Präsidentschaft bewerben, hat aber auch angekündigt, dass dies sein letzter Versuch sein könnte.\n\nDiplomatisch gesehen verliert unsere Nation weiterhin formelle Verbündete aufgrund von Faktoren wie dem wachsenden globalen Einfluss Festlandchinas, einschließlich seiner Belt and Road Initiative. Gleichzeitig hat sich unsere Strategie auf die Pflege herzlicher, wenn auch inoffizieller Beziehungen zu Großmächten verlagert. Die Unruhen in Hongkong haben die Befürworter der Wiedervereinigung innerhalb unserer Grenzen weiter entfremdet und werden von vielen als Beweis für das unvermeidliche Scheitern des Konzepts "Ein Land, zwei Systeme" angeführt. Alles in allem sind die tapferen Menschen auf dem taiwanesischen Archipel - einschließlich Kinmen und Matsu - darauf vorbereitet, den kommenden Sturm zu überstehen und in das nächste Jahrzehnt zu gehen. Obwohl das Ministerium für Gesundheit und Wohlfahrt einen neuen Verdachtsfall von atypischer Lungenentzündung aus Festlandchina gemeldet hat, wird dies sicherlich kein großes Problem darstellen."

 taiwan.13.d: "Nachdem Taiwan im jüngsten Krieg Truppen vom Festland abgewehrt hatte, gab es bekannt, dass es nun wieder in der Lage ist, freie Wahlen gemäß der Verfassung abzuhalten. Da der jüngste Krieg den Massenhass gegen das chinesische Festland schürte, verlor die Kuomintang einen beträchtlichen Teil ihrer Wähler, die der KMT vorwerfen, sie sei nicht in der Lage, den Frieden zu sichern, oder die sie als mögliche Kollaborateure des chinesischen Festlandes betrachten. Infolgedessen hat die DPP unter [CHI.GetLeader] die Wahlen mit Leichtigkeit gewonnen und eine neue Amtszeit errungen.\n\nDa alle Parteien das Wahlergebnis akzeptiert haben, kündigt die neue Führung bereits Pläne für den Wiederaufbau an."

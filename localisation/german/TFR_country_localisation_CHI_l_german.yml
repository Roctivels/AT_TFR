 CHI_tsmc_idea: "TSMC"
 CHI_tsmc_idea_desc: "TSMC (Taiwan Semiconductor Manufacturing Company) ist das weltweit größte Unternehmen für die Herstellung von Halbleitern und bietet Halbleiter für fabriklose Unternehmen an. Im Rahmen der nationalen Ausrichtung auf die Umwandlung in eine Hightech- und Dienstleistungswirtschaft in den 1990er Jahren wurde TSMC mit dem Ziel gegründet, sich auf die Herstellung von Halbleitern zu spezialisieren, was westliche Unternehmen dazu veranlasste, die Herstellung auszulagern, um ihre Gewinne zu maximieren.\n\nHeutzutage macht TSMC zusammen mit anderen taiwanesischen Unternehmen etwa zwei Drittel des weltweiten Halbleiterangebots aus und dominiert den High-End-IC-Markt. Diese starke Abhängigkeit von taiwanesischen Halbleitern hat viele Industrieländer dazu veranlasst, China von militärischen Maßnahmen abzuhalten, da sie befürchten, dass diese die Lieferkette und damit ihre gesamte Wirtschaft in Mitleidenschaft ziehen würden. Diesen Schutz, den Taiwans Monopol bei der Halbleiterherstellung bietet, bezeichnen viele als "Silicon Shield"."

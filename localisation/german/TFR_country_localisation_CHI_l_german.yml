 taiwan.16.t: "TPP-Sieg bei Taiwan-Wahlen!"
 taiwan.16.d: "Nachdem Taiwan im jüngsten Krieg Truppen vom Festland abgewehrt hatte, gab es bekannt, dass es nun wieder in der Lage ist, freie Wahlen gemäß der Verfassung abzuhalten. Da der jüngste Krieg den Massenhass gegen das chinesische Festland schürte, verlor das blaue Lager einen beträchtlichen Teil der Wähler, die der Partei vorwerfen, sie sei nicht in der Lage, den Frieden zu sichern, oder die sie als mögliche Kollaborateure des chinesischen Festlandes betrachten. Gleichzeitig mussten auch die Politiker des grünen Lagers einen schweren Schlag einstecken, da sie für den Krieg und das Blutvergießen in Taiwan verantwortlich gemacht werden. Gleichzeitig hat die radikale Politik des vorherigen Präsidenten viele neutrale Wähler auf die Seite der TPP gebracht. Infolgedessen gelang es einem politischen Zugpferd - der Volkspartei Taiwans unter Ko Wen-Je - das traditionelle blau-grüne Zweiparteiensystem Taiwans erfolgreich herauszufordern und zum ersten Mal die Präsidentschaft zu erringen.\n\nDer neue Präsident Ko Wen-Je dankte all seinen Anhängern dafür, dass sie ein solches politisches Wunder vollbracht hatten, und kündigte gleichzeitig seine eigenen Pläne für den Wiederaufbau an."

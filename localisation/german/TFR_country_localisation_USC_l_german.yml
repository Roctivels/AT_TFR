 USC_reunify_america_decision: "Amerika wiedervereinigen"
 USC_deploy_national_guard_desc: "Ich bin der Präsident von GESETZ und ORDNUNG, und es gibt niemanden, der diese besser aufrechterhalten kann als unsere wunderbare, starke Nationalgarde. Tapfere Männer und Frauen, sie sind einfach die Besten, ich liebe sie. Die Ausrufung des Notstands in einigen Staaten ist notwendig, damit diese starken Soldaten kommen und die lästigen SCHURKEN ausrotten können."
 USC_silence_the_fake_news: "Die Fake News §Rzum Schweigen bringen§!"
 USC_silence_the_fake_news_desc: "Diese FAKE-MEDIEN sind so grausam - sie verbreiten Lügen und Desinformationen, um unsere Nation in einen noch tieferen Abgrund zu stürzen. Das werden wir nicht zulassen, Leute, wir werden etwas tun, was noch nie zuvor getan wurde: Wir werden sie als das bezeichnen, was sie sind - FEINDE DES VOLKES. Das ist richtig: Clinton News Network, The Dying Times, MSDNC - WEG! BYE-BYE, FAKE NEWS!"
 USC_declare_special_emergency: "DEinen §RAusnahmezustand§! ausrufen"
 USC_declare_special_emergency_desc: "Viele wissen es nicht, aber der Präsident kann tatsächlich eine Menge Dinge tun. Ich werde einen STARKEN Anti-Aufruhr-Sonderausschuss einrichten, der MIR direkt unterstellt ist und in dem wir einen Weg finden werden, mit diesen pösen Liberalen fertig zu werden, und wir werden es sehr schnell tun. Kritiker werden mich als "antidemokratisch" beschimpfen. Ich bin derjenige, der unsere Demokratie rettet!"
 USC_pro_con_decision: "Mit §CBürokraten§! verhandeln"
 USC_pro_con_decision_desc: "\n\n\n\n£GFX_USC_bureaucrats_banner\n\n\n\n\n\n                            §gBuchwürmer§!                     \n\n§CBleistifthälse, aufgeblasene Anwälte, Bürokraten§! - Du hasst sie, und §5dein Volk§! tut das auch. Aber die unglückliche Realität bei der Führung eines großen Unternehmens - oder einer Regierung - ist, dass man Leute braucht, die den juristischen und verfassungsrechtlichen Mambo-Jambo verstehen. Das Gute daran ist, dass sie ohne dich nicht existieren können, sie setzen alles auf dich. Sie sind sehr schlechte Spieler und würden in deinem Kasino alles Geld verlieren. Nichtsdestotrotz ist es manchmal besser, auf einen arroganten Juristen zu hören, als eine übereilte Entscheidung treffen zu müssen. Oder nicht?"
 USC_pro_mil_decision: "§5Das Volk§! mobilisieren"
 USC_pro_mil_decision_desc: "\n\n\n\n£GFX_USC_the_people_banner\n\n\n\n\n\n                       §gU.S.A! U.S.A! U.S.A!§!            \n\n§5Deine Leute§! - die Basis deiner Popularität. Durchschnittliche, hart arbeitende Amerikaner. Sie werden so ungerecht behandelt, dass es unglaublich ist; vergessen, missbraucht, immer für ihr eigenes Unglück verantwortlich gemacht.\nNicht aber du. Du hast ihnen eine Stimme gegeben - deine Stimme, und sie wurden zu deinem wichtigsten Muskel. Es gibt nichts, was sie nicht bereit wären, für dich zu tun. Du hast immer versucht, deine Versprechen an sie zu halten... Aber diese Bürokraten und Sumpfmenschen... Sie sind so grausam. Sie wollen, dass dein Volk leidet. Du gibst ihnen Macht, und sie geben dir Macht. Eine symbiotische Beziehung. Präsident Trump ist kein heiliger Mann, aber er soll verdammt sein, wenn seine Schäfchen in die Irre geführt werden."

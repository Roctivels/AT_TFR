 USC_the_dark_mandate: "Das dunkle Mandat"
 USC_the_dark_mandate_desc: "Überall um mich herum - Idioten und Schwachköpfe. Man kann nichts erreichen. Mein Volk, das amerikanische Volk leidet, so schrecklich - Tod und Zerstörung überall. Sie brauchen Vergeltung - ich bin ihre Vergeltung, war es schon immer; gegen korrupte Politiker, Speichellecker, schlaffe Konservative. Amerika ist in Schwierigkeiten wie nie zuvor, mehr als der erste Bürgerkrieg, das ist sicher. Die Menschen brauchen einen starken Führer, einen, der sie an die erste Stelle setzt, der sie beschützt, der sie führt. Früher habe ich gesagt, wir müssen das amerikanische Gemetzel beenden, aber jetzt sehe ich, dass der einzige Weg, Amerika zu retten, unser eigenes Gemetzel ist. Wir werden das beste Gemetzel haben, Leute."

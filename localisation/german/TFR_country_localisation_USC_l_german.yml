 usc.29.a: "Bruh"
 usc.30.t: "Militärische Aufstellung"
 usc.30.desc: "Seit dem Ausbruch des Konflikts, der unsere Nation in Verwüstung und Chaos gestürzt hat, ist eines immer deutlicher geworden: Der Zustand unseres Militärs liegt in Trümmern. Während wir die Loyalität und das Vertrauen der meisten Fußsoldaten, Veteranen und des Marine Corps genießen, mangelt es uns erheblich an vertrauenswürdigen Generälen und Offizieren, wobei das korrupte Oberkommando nach Washington flieht, weil sie wissen, dass Biden der einzige Mann ist, der sie an der Macht halten kann. Michael Flynn, John Hyten und John Raymond fallen mir da ein, allesamt Patrioten höchsten Ranges, die dem Präsidenten von Anfang an zur Seite gestanden haben. Diese Männer haben sich von dem tiefen Staat getrennt, der Amerika in den Ruin treibt, und sie wissen, was richtig ist. Aber natürlich gibt es bei jeder Armeebildung eine Machtdynamik zwischen den professionellen, gut ausgebildeten Kämpfern der US-Armee und denen, die in unseren Milizen sind. Wenn wir mit diesem Gleichgewicht nicht sorgfältig umgehen oder dem Militär zu viel Macht zugestehen, kann das in einer Katastrophe enden.\nWenn wir den Sieg über die verräterischen Demokraten, die Kommunisten und die Separatisten, die unsere Nation Glied für Glied zerreißen, erleben wollen, dann müssen wir unser Militär effektiv einsetzen und es von Grund auf neu aufbauen. Wir müssen die Zersplitterung in unseren Reihen beheben, einen neuen Apparat schaffen, der Effizienz, Loyalität und Patriotismus zu schätzen weiß, und unsere Städte von den linken Horden zurückerobern, die versuchen, unsere Republik zu zerschlagen. Das Militär ist eines unserer besten Werkzeuge, und wir sollten es weise einsetzen. Schließlich ist die Politik ein wankelmütiges Spiel, vor allem, wenn die Armee beteiligt ist.."
 usc.30.a: "Semper Fi."
 usc.31.t: "Ein verzweifeltes Brainstorming"
 usc.31.desc: "Trump befand sich frühmorgens in einem Besprechungsraum mit einigen seiner wichtigsten Generäle und Berater. Eine dringende Sitzung war einberufen worden, um eine Strategie für den Krieg gegen die Regierung in Washington D.C. auszuarbeiten. Nach nur 15 Minuten war die Sitzung schon fast vorbei und Trump wollte sie beenden.\n"Flynn, ich halte Sie für einen sehr hohen Standard, jetzt ist es an der Zeit, dass Sie mir beweisen, dass meine Standards nicht gesenkt werden, ich brauche Ideen von jedem, den Sie kennen. Das gilt auch für Sie alle. Wegtreten!\" sagte Trump und wandte sich an die Anwesenden im Raum.\n\"Ja, Sir, Mr. President.\" Sagte Flynn.\nNun saß Trump allein, nachdem alle den Raum verlassen hatten, und dachte über die Situation nach, in der er sich gerade befand. Selbst als er seine Regierung nach Colorado verlegt hatte, hätte er nicht gedacht, dass so etwas passieren würde, dass die glorreichen USA in einen solchen Zustand der Anarchie fallen würden. Jetzt musste er sich mit einer Situation auseinandersetzen, die sein Leben in jeder Hinsicht bedrohte. Als er weiter darüber nachdachte, begann er, seine Lage optimistisch einzuschätzen. Wenn sie die Armeen von Biden und seinen Gaunern zurückhielten, könnten sie vielleicht einen Fuß über die Regierung in D.C. bekommen. Vielleicht...\nAber bevor er weiter nachdenken konnte, wurde ihm etwas klar. Die Nation brauchte ihn, er konnte nicht an seinem Schreibtisch sitzen und nichts tun, es war eine dringende Situation, und die Menschen brauchten ihn am meisten.\n\"Vielleicht, nur vielleicht, hilft mir eine kleine Cola Light, aufzuwachen.\""
 usc.31.a: "\"Das wären dann 1,60 Dollar, Mr. President.\""
 usc.32.t: "Der wiedergründende Vater"
 usc.32.desc: "Seit dem Beginn des Bürgerkriegs gab es immer eine Verbindung zwischen den frühen amerikanischen Revolutionären, die ihre repressiven englischen Kolonisten gestürzt und eine auf Freiheit und Nationalität basierende Republik gegründet hatten, und den Minutemen der verfassungsmäßigen Regierung, die mit unerbittlicher Kraft für den Sturz der tyrannischen, übergriffigen Regierung und der Eliten kämpften, die Spaltung und Unzufriedenheit in die Herzen und Köpfe des amerikanischen Volkes gesät hatten. Sie teilten die Tradition der Revolution, eine Geisteshaltung, die den Kampf und die Beharrlichkeit im nationalen Geist förderte. Ein Amerika, das sich von der Natur der globalistischen Agenden befreit, die sowohl die Nation als auch die Menschen so lange kontrolliert haben. Ein Amerika, in dem die Stimmen der hart arbeitenden Amerikaner wieder über das Getöse von Sonderinteressen und bürokratischen Eliten, die nichts tun, um dem Volk zu helfen, hinaus zu hören wären. Wer würde das Volk zu seiner Revolution führen, wie es George Washington vor so vielen Jahren tat? Das wäre natürlich Donald J. Trump. \n\nVon Anfang an hat er für ein Amerika geworben, in dem die Werte der Freiheit, des Individualismus, des Selbstvertrauens und des Konservatismus über diejenigen siegen, die sie zu beseitigen versuchen. Der einzige Weg, um die Demokraten zu besiegen und ein neues Amerika aufzubauen, besteht darin, sich von der Vision der Gründerväter einer Nation inspirieren zu lassen, die auf den Grundsätzen einer begrenzten Regierung aufbaut, und Trump weiß das. Er hat seine Pläne zum Abbau bürokratischer Hemmnisse, zur Senkung der Steuern und zur Freisetzung des vollen Potenzials der amerikanischen Wirtschaft dargelegt. Die Wiederbelebung der amerikanischen Industrie, ein Ende der Aufstände und die Schaffung von Gesetzen, die sich am Willen des Volkes orientieren. Jeder Amerikaner ist ein Revolutionär, und das sollte sich auch in unserer Politik und in den Streitkräften widerspiegeln. Die edle und gerechte Sache ist bedroht, und wir dürfen sie nicht wanken lassen. So wie Washington in Yorktown, auf seinem eigenen Boden, triumphierte, werden auch wir allein durch Blut siegen. Es wurden bereits mehrere Minutemen-Brigaden ausgebildet, die das Rückgrat der an der Front kämpfenden Milizen bilden werden, da sie hochmobil, loyal und speziell für chirurgische Operationen ausgebildet sind. Diese Männer werden sicherlich unsere Sache fördern und verbreiten, und wir müssen diese Ideen weiter vorantreiben und revolutionäre Nostalgie fördern, wenn Trumps Vision erfüllt werden soll und er seinen rechtmäßigen Platz als Gründervater beansprucht."
 usc.32.a: "Hail to the chief."
 usc.33.t: "Der Kreis schließt sich"
 usc.33.desc: "Als Donald Trumps MRAP sich seinen Weg durch die Straßen von New York City bahnte, lag die einst pulsierende Metropole in Trümmern, Asche lag in jeder Straße verstreut und die Überreste von Gebäuden waren so weit das Auge reicht eingeebnet. Die Skyline, die einst von hoch aufragenden Wolkenkratzern geprägt war, wurde nun von einer dicken Rauch- und Staubwolke verdeckt. Der Trump Tower, sein wertvollster Besitz, stand ramponiert und zerbrochen da, ein einst wunderschönes Wohnhaus mit Blick auf Midtown Manhattan, das nun von klaffenden Löchern und verkohlten Überresten gezeichnet war. Der Anblick erschütterte Trump zutiefst, denn er konnte nicht umhin, sich daran zu erinnern, wie er in den 80er Jahren den Bau und die Eröffnung des Gebäudes übersehen hatte. Es war eine Erinnerung an die Verwüstungen, die der Krieg, der die Nation verschlungen hatte, angerichtet hatte. Mit schwerem Herzen und Bedauern betrachtete er die Trümmer seiner Geburtsstadt und empfand ein tiefes Gefühl des Verlustes für das, was seine Karriere geprägt und ihn in die politische Landschaft gebracht hatte.\n\nNach einigen Gesten an seinen Fahrer stieg er aus seinem Fahrzeug und betrachtete die Szene vor ihm. Trumps Gefühle begannen ihn zu überwältigen, als er erkannte, dass seine geliebte Stadt, sein Imperium, in Schutt und Asche gelegt worden war.  Für einen kurzen Moment erwog er die Möglichkeit, das, was vom Tower übrig geblieben war, zu retten, das Verlorene wieder aufzubauen und das alte Konglomerat, das ihn durch sein Leben geführt hatte, zurückzuerobern. Doch dann, schweren Herzens, traf Trump seine Entscheidung. Er kehrte den Ruinen den Rücken zu und ließ zurück, was von seinem früheren Leben übrig geblieben war. In diesem Moment wurde ihm klar, dass es größere Schlachten zu schlagen galt. Sein Land brauchte ihn, und er war der einzige Mann, der in der Lage war, es zu schützen. Er wandte sich von der Verwüstung ab und kehrte zu seinem Gefolge zurück, während er an die Nation dachte, die zu verteidigen er geschworen hatte, und an die Menschen, die ihn um Rat baten. Der Sieg, das wusste er, war zum Greifen nahe, und er durfte nichts unversucht lassen, um ihn zu erreichen. Er schlurfte zurück in das Fahrzeug und richtete seinen Blick in die Zukunft, während es losfuhr."
 usc.33.a: "Und das ist es, was das Land braucht."
 usc.34.t: "Ein zurückgewonnener Thron"
 usc.34.desc: "Als Donald Trumps Konvoi durch die Tore des Weißen Hauses rollte, konnte er nicht anders, als eine Welle gemischter Gefühle in sich aufsteigen zu spüren. Nach Jahren des Aufruhrs, des Streits und des Blutvergießens kehrte er endlich auf den Sitz der Macht zurück, den er sich so hart erkämpft hatte. Doch die Last des Bürgerkriegs lastete noch immer schwer auf seinen Schultern, und das zeigte sich auch in Washington D.C. Das Weiße Haus war größtenteils unversehrt, wenn auch ungepflegt, und einige Teile waren ganz offensichtlich verkohlt. Als er aus seinem Fahrzeug stieg und zu dem Gebäude hinaufblickte, in dem er noch vor wenigen Jahren gesessen hatte, konnte Trump nicht anders, als über die Widerstandsfähigkeit des amerikanischen Geistes zu staunen. Trotz der Verwüstungen und Zerstörungen, die der Krieg angerichtet hatte, stand das Weiße Haus trotz des Chaos, das es durchlitten hatte, aufrecht und stolz da. Es war nur eine Woche nach der Befreiung der Stadt von den Demokraten vergangen, die damit die Macht an sich gerissen und ihren bisher größten symbolischen Sieg errungen hatten. Doch als er sein Fahrzeug verließ und das Gebäude betrat, überkam ihn ein tiefes Gefühl der Melancholie.  Die Erinnerungen an den Krieg, an die ausgetragenen Konflikte und die verlorenen Leben, an die Patrioten, die mitten in der Schlacht erschossen wurden, überfluteten seinen Geist. Doch inmitten des Leids spürte er auch einen Schimmer von Hoffnung. Hoffnung auf eine Zukunft für alle Amerikaner, eine Zukunft, die unter seiner Führung wie ein leuchtendes Leuchtfeuer wirken würde, eine Zukunft, die nie wieder in eine Spaltung fallen würde. Auf seinem Weg durch die weißen Korridore, umgeben von Porträts der Gründerväter, gelobte Trump, die Opfer derer, die vor ihm gekommen waren, zu ehren und den Preis der Freiheit niemals zu vergessen. Und als er sich im Oval Office, umgeben von seinen Beratern, niederließ, blickte er sich auf dem Präsidentenstuhl um. Natürlich würde der Weg, der vor ihm lag, nicht einfach sein, nichts in Trumps Leben war einfach gewesen. Alles war geprägt von harter Arbeit, Hingabe und seinem eisernen Willen, der sich im Laufe der Zeit bewährt hatte."
 usc.34.a: "Der Chef kehrt zurück, und diesmal bleibt er."
 usc.35.t: "Marco Rubio zum Vizepräsidenten ernannt"
 usc.35.desc: "Während der Zweite Amerikanische Bürgerkrieg weiter tobt, hat unser Präsident eine historische Ankündigung gemacht, die die Politik unserer Regierung für die kommenden Jahre bestimmen wird. Donald Trump hat Senator Marco Rubio zu seinem Vizepräsidenten ernannt und signalisiert damit ein Ende der jüngsten Machtkämpfe, die die verfassungsmäßige Regierung in Anspruch genommen haben. Rubio, der für seine überzeugten konservativen Werte und seine Unterstützung für Trumps Agenda bekannt ist, hat trotz seiner Auseinandersetzung mit dem Präsidenten im Jahr 2016 und seiner letztendlichen Niederlage nach dem Verlust der Vorwahlen in Florida den Geist von Trumps populistischer Bewegung verkörpert, auch wenn er relativ wenig im Rampenlicht stand. Mit seiner Ernennung hat Trump die Werte, die den Kern seiner Ideologie ausmachen, für die absehbare Zukunft in der amerikanischen Regierung verankert. In einer Erklärung vom heutigen Tag erklärte Rubio, dass Amerika auch weiterhin die Interessen seiner Bürger über alles andere stellen und die Grand Old Party mit den Mitteln des populistischen Traditionalismus, den Trump selbst seit seinem ersten Amtsantritt predigt, gegen interne und externe Widersacher vereinen wird, was deutlich macht, dass diese Art von Konservatismus weiterhin an der Spitze der Regierung und der Republikanischen Partei stehen wird."
 usc.35.a: "Mal sehen, was er so alles kann."
 usc.36.t: "Rand Paul zum Vizepräsidenten ernannt"
 usc.36.desc: "Während der Zweite Amerikanische Bürgerkrieg weiter tobt, hat unser Präsident eine historische Ankündigung gemacht, die die Politik unserer Regierung für die kommenden Jahre bestimmen wird. Donald Trump hat Senator Rand Paul zu seinem Vizepräsidenten ernannt und signalisiert damit ein Ende der jüngsten Machtkämpfe, die die verfassungsmäßige Regierung in Anspruch genommen haben. Paul ist für seine überzeugten libertären Werte bekannt und vertritt Ideen für eine kleine Regierung, die in letzter Zeit nicht ungehört geblieben sind. Trotz seiner zahlreichen Auseinandersetzungen mit dem Präsidenten ist er zu einem der mächtigsten Männer in der verfassungsmäßigen Regierung geworden, der als Aushängeschild mehrerer Milizen fungiert und die jüngsten Verschiebungen in der GOP in Richtung Libertarismus verkörpert hat. Mit seiner Ernennung hat er die Werte, die seiner Ideologie zugrunde liegen, für die absehbare Zukunft in der amerikanischen Regierung verankert. \nIn einer Erklärung vom heutigen Tag erklärte Paul, dass Amerika auch weiterhin die Interessen seiner Bürger über alles andere stellen wird, insbesondere über die Übergriffe korrupter Regierungsbehörden, und dass er seine Bemühungen fortsetzen wird, \"das Treten zu beenden\", was zum Entsetzen vieler seiner Kollegen praktisch zu seinem Wahlkampfslogan geworden ist.  Seit Trumps erstem Amtsantritt hat er mit den Idealen des Libertarismus geliebäugelt, insbesondere während der COVID-19-Pandemie, obwohl er immer als eher autoritär angesehen wurde, was diese Ernennung zu einer ziemlichen Überraschung macht. Trump hat seine neue rechte Hand beglückwünscht und öffentlich erklärt, dass er   \"der beste Mann für den Job\" sei und der einzige, der \"die amerikanischen Werte, Traditionen und die Rechte des Volkes verteidigen kann\". Dies hat eine Welle der Unterstützung durch das amerikanische Volk ausgelöst, und Paul soll in einem Monat seine Antrittsrede halten."
 usc.36.a: "Es ist Zeit für einen Wandel."
 usc.37.t: "Michael Flynn zum Vizepräsidenten ernannt"
 usc.37.desc: "Während der Zweite Amerikanische Bürgerkrieg weiter tobt, hat unser Präsident eine historische Ankündigung gemacht, die die Politik unserer Regierung für die kommenden Jahre bestimmen wird. Donald Trump hat Generalleutnant Michael Flynn zu seinem Vizepräsidenten ernannt und signalisiert damit ein Ende der jüngsten Machtkämpfe, die die verfassungsmäßige Regierung in Anspruch genommen haben. Flynn ist bekannt für seine kriegerischen Fähigkeiten und fungiert als oberster Feldmarschall des Militärs und vereinheitlichender Befehlshaber. Obwohl er in den ersten 20 Tagen der Trump-Administration im Jahr 2016 aus seiner Position als Berater entlassen wurde, verließ er den Ruhestand, um das Militär der verfassungsmäßigen Regierung zu leiten, wobei er als Aushängeschild für den politischen Flügel der Armee fungiert und die jüngsten Verschiebungen in der GOP in Richtung Autoritarismus verkörpert. Mit seiner Ernennung hat er die Werte, die seiner Ideologie zugrunde liegen, für die absehbare Zukunft in der amerikanischen Regierung verankert und die Position der Streitkräfte gestärkt. \nIn einer Erklärung erklärte Flynn heute, dass Amerika die Interessen der Landesverteidigung auch weiterhin über alles andere stellen werde und sich weiterhin um die Aufrechterhaltung von Recht und Ordnung bemühen werde, was zum Entsetzen vieler seiner Kollegen praktisch zu seinem Wahlkampfslogan geworden ist. Dies hat viele im Lande aufgrund von Flynns Status in der Armee verblüfft, obwohl dies nicht ganz ohne Beispiel ist. Trump hat seine neue rechte Hand beglückwünscht und öffentlich erklärt, er sei \"der beste Mann für den Job\" und der einzige, der \"die amerikanischen Werte, Traditionen und die Ordnung verteidigen\" könne. Dies wurde von vielen Amerikanern unterstützt, obwohl Bedenken hinsichtlich des wachsenden Einflusses des Militärs geäußert wurden, insbesondere von Liberalen im Kongress, die jedoch weitgehend ignoriert wurden. Flynn wird seine Antrittsrede voraussichtlich in einem Monat halten."
 usc.37.a: "Ordnung ist das, was dieses Land braucht!"
 usc.38.t: "Ein relativ erwartetes Treffen"
 usc.38.desc: "Präsident Trump hatte den Sitzungssaal mit seinem Oberkommando betreten. Kürzlich waren Berichte von der Frontlinie eingetroffen, dass Bidens Truppen viele Brigaden aufgerieben hatten und in das Gebiet der Konstitutionalisten vorstießen. Es wurde ein Treffen mit dem Oberkommando der Konstitutionalisten einberufen, um die Lage zu erörtern.\n\"Mr. President, Sie haben uns gerufen,\" sagte Flynn.\n\"Ja, Flynn, das habe ich. Anscheinend hat die liberale Armee unsere Truppen an der Front aufgerieben", sagte Trump, bevor er von John Raymond unterbrochen wurde. \"Sir, wenn Sie gestatten, können wir das leicht ausgleichen. Es wäre nicht schwer, den Rückstand derzeit aufzuholen,\" sagte Raymond. "Das weiß ich, Raymond. Machen Sie sich keine Sorgen. Ich bitte nur darum, dass wir unsere Einsatzkräfte neu organisieren. Wir wussten alle, dass wir hier keinen leichten Kampf haben würden. Schließlich machen harte Zeiten Helden.\" Während des Treffens diskutierten Trump und seine Feldmarschälle Strategien, Sabotage, Verzögerung und alles andere, um das Blatt an der Front zu wenden. Insgesamt war es ein relativ ruhiges Treffen. Das gesamte Oberkommando der Konstitutionalisten war zuvor gewarnt worden, dass sie in den ersten Kriegstagen höchstwahrscheinlich Verluste erleiden würden und dass sie sich auf die Erholung statt auf Gegenangriffe konzentrieren sollten.\nNach dem Ende des Treffens fühlten sich Trumps Feldmarschälle durch das, was sie besprochen hatten, relativ erfüllt. Dennoch hatte Trump immer noch ein mulmiges Gefühl angesichts dessen, was noch kommen würde. Als er aufstand, um den Raum zu verlassen, beruhigte er sich selbst."
 usc.38.a: "\"Harte Zeiten machen Helden.\""
 usc.39.t: "Ein amerikanischer Widerstand"
 usc.39.desc: "Trump hatte ein weiteres Treffen einberufen, diesmal waren es nicht nur er und seine Feldmarschälle, sondern er, seine Feldmarschälle und einige hochrangige Generäle. Als er den Raum betrat, sah er eine Karte des Krieges in Amerika, darauf war das dunkle Blau der ACG und das helle Blau der UoA. Das machte ihn wütend, er ärgerte sich, dass seine Truppen nicht genug taten, um die Front zu halten, und er war wütend auf seine Generäle, weil sie nicht genug taten, um die Situation auszugleichen. Als er sich jedoch hinsetzte und die Besprechung begann, beschloss er, seine Wut zu verbergen, um das Bild, das er aufgebaut hatte, aufrechtzuerhalten.\n\"Flynn, die Lage an der Front ist gelinde gesagt nicht gut, ich habe mehr von Ihnen erwartet. Aber das ist in Ordnung, Sie können sich immer noch beweisen.\" Sagte Trump in einem disziplinierenden Ton. \n\"Danke, Mr. President.\" Sagte Flynn und nickte mit dem Kopf.\n\"Nun, meine Herren, wie wir wissen, ist die Situation an der Front nicht die komfortabelste, um es vorsichtig auszudrücken. Dennoch bin ich zuversichtlich, dass wir das Blatt in diesem Krieg wenden können."\n\"Wie sieht denn Ihre Strategie aus, Mr. President?\" Sagte John Kelly\n\"Nun Kelly, mein Plan ist, dass wir unsere Linien verstärken und Gegenangriffe planen, wir können keine größeren Rückzüge mehr zulassen und wir müssen einige Gebiete zurückerobern.  Während sich unsere Streitkräfte an der Frontlinie sammeln, verstärken wir den Schmuggel von Waffen, Munition und Logistik für den tapferen Widerstand, der derzeit für die Befreiung unserer besetzten Länder kämpft.\" Sagte Trump.\nIm weiteren Verlauf des Treffens informierten Trump und seine Feldmarschälle die Generäle darüber, wie die Gegenangriffe und die Stärkung des Widerstands durchgeführt werden sollten. Insgesamt dauerte das Treffen viel länger als üblich, da immer wieder Probleme auftauchten, bevor man sich auf einen Plan einigen konnte.\nAm Ende einigten sich die Teilnehmer des Treffens jedoch darauf, sich stattdessen mehr auf die Widerstandsoperationen zu konzentrieren, da sie warten würden, bis der Widerstand die Logistik und Organisation der UvA so weit geschädigt hatte, dass ein effektiver Gegenangriff gewährleistet wäre."
 usc.39.a: "\"Ich brauche den Widerstand jetzt am Telefon.\"" 
 usc.40.t: "Akzeptanz und Tod"
 usc.40.desc: "Für die vielen, die sich nicht in einem Kriegsgebiet befanden, war es ein schöner Abend, auf den dann eine wunderschöne Nacht folgte, in der die Sterne über ihnen die Luft erhellten. Für Cooper Carmenates erhellte stattdessen Flugabwehrfeuer die Luft. Als er aus seinem Fenster an der Südwestseite des Pentagon auf die Stadt Arlington blickte, erinnerte er sich an den Befehl seines Kommandanten, sich zum Pentagon zurückzuziehen, anstatt sich zu ergeben. Was für ein Narr er doch war, diesen Befehl zu befolgen. Jetzt saß er wegen seiner Naivität mit etwa zweihundert anderen Soldaten in dem militärischen Kommandogebäude fest. \n\nWährend er weiter aus dem Fenster schaute, dachte er an seine Kindheit, seine Teenagerjahre und schließlich an sein Leben als Erwachsener, bevor es durch den Bürgerkrieg unsanft unterbrochen wurde. Wie er vorhatte, seine Highschool-Liebe zu heiraten, bevor er in die Armee eintrat, wie er an die Front geschickt wurde und mit ansehen musste, wie seine Kameraden um ihn herum starben, während er als einziger noch stand. Sei es in den Wäldern von Illinois, in den Vororten von Indianapolis und schließlich in den einst belebten Straßen von Arlington. Er nahm einen Zug von seiner Zigarette und dachte über sein Schicksal nach, bedauerte die Entscheidungen, die ihn hierher gebracht hatten, ins Pentagon, wo er und zweihundert andere auf das Unvermeidliche warteten. Plötzlich hörte er ein schwaches Geräusch in der Ferne, kein Flugabwehrfeuer, nein, er würde wissen, ob es das war. Entweder war es nur ein weiterer Konvoi verfassungsmäßiger Truppen, die heute zum fünften Mal versuchen würden, das Pentagon einzunehmen, oder eine weitere Gruppe ziviler Busse, die DC verließen, um der Vernichtung zu entgehen. Wie auch immer, er schnappte sich sein Gewehr, funkte seine Truppe an, dass sie bald angegriffen werden könnten, und griff nach seinem Fernglas. Stattdessen sah er in der Ferne einen einsamen Abrahms, auf dem eine amerikanische Flagge wehte und auf dessen Frontplatte ein Schild mit der Aufschrift \"Hang loose\" angebracht war. Die Abrahms bahnten sich ihren Weg unter dem Henry G. Shirley Highway hindurch und hielten direkt vor dem Parkplatz des Pentagon. Während Cooper reaktionslos zusah, hob der Abrahms seine Kanone und zielte scheinbar direkt auf sein Fenster. Cooper dachte bei sich, dass vielleicht endlich der Tod gekommen war, um ihn von seinem Leiden zu befreien."
 usc.40.a: "Cooper schloss die Augen und akzeptierte sein Schicksal."
 usc.43.t: "Vizepräsident für Amerika"
 usc.43.desc: "Vizepräsident Wood ist ein großartiger Mensch, aber es fehlt ihm an Charisma und er ist in der Öffentlichkeit nicht bekannt. Er wurde als vorübergehender Ersatz für den Posten des Vizepräsidenten ausgewählt, um die Stabilität und Funktionalität der Regierung zu gewährleisten.\n\nNun, da sich die Situation ständig ändert, muss Trump einen besseren Stellvertreter für das Land auswählen. Es gibt viele große Patrioten und außergewöhnliche Persönlichkeiten, die in Frage kommen, aber nur einer von ihnen kann ausgewählt werden.\n\nSo, wen werden wir auswählen?"
 usc.43.j: "Mike! Er war so tapfer, nachdem ich ihm verziehen hatte! Die Leute lieben ein gutes Ende."
 usc.43.a: "Jim Jordan, ein netter Kerl, sehr patriotisch und loyal gegenüber der Sache. Ich mag ihn."
 usc.43.b: "Marco Rubio, ein erfahrener Mann, hat sich in der Vergangenheit einen Schlagabtausch mit mir geliefert, aber jetzt ist er ganz unser Mann."
 usc.43.c: "Byron Donalds, ein großartiger Redner, sehr loyal, sehr zupackend, wird uns die Unterstützung der Schwarzen sichern."
 usc.43.f: "Dieser JD Vance hat wirklich eine Menge Arbeit investiert! Kämpfen und so, die Leute lieben ihn! Kleiner Mann träumt groß. Ich liebe das."
 usc.51.t: "Präsident Trump reagiert auf die Unions"wahlen""
 usc.51.desc_1: "Bei einer Kundgebung in Denver nach seiner erfolgreichen Wiederwahl sprach Präsident Trump kürzlich die parallelen "Wahlen" an, die auf dem Gebiet der sogenannten "Union Amerikas" abgehalten wurden: "Diese Verrückten haben es geschafft! Sie haben es tatsächlich geschafft! Sie haben Bernie zu einem Präsidenten gemacht. Sie müssen völlig den Verstand verloren haben, wenn sie ihm überhaupt eine Chance gegeben haben, so etwas würden sie niemals zuvor tun. Der Kommunist Bernie Sanders, das ist ein Mann, den es zu schlagen gilt. Die wahre Visualisierung der Feinde Amerikas.\n\nNun möchte ich Bernie eigentlich gratulieren. Nein, wirklich! Vor allem, weil er es bis zu dieser Wahl geschafft hat. Wird er es bis zur Amtseinführung schaffen? Da bin ich mir nicht so sicher. Zweitens hat er endlich die Chance, die er sich gewünscht hat, seine absolut verrückten kommunistischen Träume zu verwirklichen, vielleicht zumindest für eine gewisse Zeit, bis wir kommen und unser Land wieder richtig aufbauen. Endlich werden wir ein echtes Beispiel dafür haben, warum der Sozialismus in Amerika nicht funktioniert!!! Anscheinend können die Demokraten nicht aus den Fehlern anderer Länder lernen, sehr traurig.\n\nAber ehrlich gesagt, finde ich es noch trauriger, dass Bernie das macht. Ich habe schon einmal gesagt, dass er ein legendärer Mensch sein könnte. Aber er hat einen Pakt mit dem Teufel geschlossen, und stattdessen wird er für sein legendäres Versagen gegenüber Trump bekannt sein, sobald wir unser schönes Weißes Haus zurückerobern.  Und wir werden alle roten Fahnen vom Dach reißen und sie dorthin werfen, wo sie hingehören - in den Müll!"\n\nDie Menge jubelte, lachte und brüllte unisono - eine übliche, erwartete Reaktion auf die Späße ihres geliebten Idols. Die Opposition wurde erneut verbal beschimpft. "
 usc.51.desc_2: ""Mini Mike... "Holt mich von der Bühne!!!!"""
 usc.51.desc_3: "Während einer Kundgebung in Denver, die kürzlich nach seiner erfolgreichen Wiederwahl stattfand, sprach Präsident Trump die parallelen „Wahlen" an, die auf dem Territorium der so genannten "Union Amerikas" abgehalten wurden... Wenn wir schon dabei sind, haben Sie gesehen, was für ein Desaster der Gewinner - eigentlich ein totaler Verlierer - der neue „Präsident" des Sumpfes ist? Unglaublich. Dieser Andrew Yang - was für ein kleiner Kerl. Nicht einmal die Demokraten mögen ihn! Eine totale Katastrophe. UND er ist ein totaler radikaler Verrückter. Wir werden ihn 'Wacky Yang' nennen - so nennen wir ihn, das passt genau.\n\nDieser dumme Andrew-Typ ist so nervig. Keiner mag ihn. Kaum aus den Kindergartenhosen herausgewachsen und schon ein 'Präsident', selbst Bürgermeister Pete hat mehr Erfahrung. Er will seine 'Yang-Bande' anrufen? OK, hört zu, das ist Beweis genug, dass DC von einer Bande von Gangstern übernommen wurde! Sie verheimlichen es nicht einmal mehr. Ja, es ist unglaublich ....... Schaut euch diese "Wahlen" an, Leute. So eine niedrige Wahlbeteiligung, niemand ist gekommen. Eine absolute Schande für den Deep State. Jeder weiß, dass sie den wahren Präsidenten zurückhaben wollen - mich. Keine Sorge, Leute, wir werden die Kräfte des Tiefen Staates zurückschlagen - sehr schnell - wir werden unsere Leute - sehr schöne Leute - von diesen korrupten Demokraten und RINO-Verrätern befreien."
 usc.51.desc_4: ""Wer ist sie? Wo ist Biden?""
 usc.51.desc_5: ""Sie nennen ihn "Mitt in der Grube", weil seine Zustimmungsraten so niedrig sind, er hat die politische Landschaft ruiniert, konnte Obama nicht schlagen, konnte mich nicht schlagen und jetzt wälzt er sich auf dem Boden und weint darüber, er ist eine Katastrophe.""
 usc.51.desc_6: "Bei einer kürzlich abgehaltenen Kundgebung in Denver sprach Präsident Trump nach seiner erfolgreichen Wiederwahl die parallel stattfindenden "Wahlen" in den Gebieten der sogenannten "Union Amerikas" an. Habt ihr das gesehen? Anscheinend waren die Demokraten so schlecht, dass sie in ihrem eigenen gefälschten und manipulierten System gegen falsche Republikaner verloren haben. Wie schlecht kann man sein? Schrecklich schlecht. Ich kann mir nicht vorstellen, dass diese Leute den Rest unseres Landes leiten, sie können nicht einmal einen Teil davon verwalten!"\n\n Und wen haben diese RINO-Verräter ausgerechnet gewählt? Die eklige Nikki Haley und Mitt-in-die-Grube-Romney? Eine Lachnummer auf dem Wahlzettel. Wenn ich dort wäre, würde niemand auch nur an sie denken. Erbärmliche schlechte Verlierer, das sind sie. Aber sie können ihren vorgetäuschten kleinen Sieg erst einmal genießen, den wirklichen Kampf werden sie nicht gewinnen. Amerika will den wahren republikanischen Präsidenten zurück - MICH. Weißt du, was ihre Pläne sind? Die verrückte Nikki und ihre militärisch-industriellen Lobbyisten werden den 3. Weltkrieg beginnen! Sie wollen überall auf der Welt Kriege anzetteln, sie wollen das Leben von Amerikanern in Gefahr bringen, sie können an nichts anderes denken, Tatsächlich war sie so froh, als das Töten in unserem Land begann! Sie lächelte von einem Ohr zum anderen, weil ihre Spender durch all die Waffenverkäufe und Morde noch reicher werden würden!\n\Ich darf das nicht sagen, weil sie eine Frau ist, aber wenn ich es wäre, würde ich sagen, dass sie böse und sehr ekelhaft ist... Haley-Cheney, das ist ein Reim, den Sie sich auf der Zunge zergehen lassen sollten. Sie und die anderen Neokonservativen, ich werde sie vernichten, bevor sie unser schönes Land und den Rest des Planeten zerstören."\n\Die Menge jubelte, lachte und brüllte unisono - eine übliche, erwartete Reaktion auf die Späße ihres geliebten Idols. Die Opposition wurde erneut beschimpft. Die Basis ist einmal mehr erregt und jubelt den konstitutionellen Kräften zu, die tapfer an vorderster Front für Trumps Vision von Amerika kämpfen."
 usc.51.desc_7: "Bei einer Kundgebung in Denver nach seiner erfolgreichen Wiederwahl sprach Präsident Trump kürzlich die parallelen "Wahlen" an, die in den Gebieten der so genannten "Union Amerikas" abgehalten wurden: "Oh, sehen Sie sich das an. Haben Sie kürzlich die Nachrichten gesehen? Der Sumpf hat sich einen neuen "Präsidenten" zugelegt, ich schätze, Sleepy Joe hat es nicht geschafft. Jetzt heißt er Klob-... Klobu-char oder so ähnlich. Was kann ich schon über Zany Amy sagen? Es gab in der Geschichte unseres Landes noch nie eine schlechtere Kandidatin. Also wirklich! Hattest du denn niemand anderen? Sie wäre nicht meine erste Wahl, das kann ich dir sagen.\n\nHast du ihre "Siegesrede" gesehen? Totales Desaster! Die verrückte Amy weiß nicht mal, was sie sagen soll oder was sie sagt. Wahrscheinlich hat sie nicht geglaubt, dass sie gewählt wurde, ehrlich gesagt, ich glaube es auch nicht, muss ein Betrug gewesen sein, genau wie alles andere im von den Demokraten besetzten, falschen Amerika. Sie ist eine Schneefrau, okay? Und sie schmilzt dahin, so wie die Truppen der Aufständischen an der Frontlinie dahinschmelzen. Sie haben nicht mehr viel Zeit und sie können es fühlen. Aber keine Sorge, Amy. Ich habe bereits ein schönes Haus in Minnesota für dich vorbereitet, ein größeres Haus, das ist das einzige, was du nach dieser gefälschten kleinen "Wahl" gewinnen kannst. Du wirst für den Rest deines Lebens einen schönen Urlaub machen, das verspreche ich dir. Ich hoffe, das ist okay für dich. Geht es dir gut, Amy? Würdest du uns das sagen? Ich denke, wir werden es bald herausfinden.""
 usc.51.desc_8: ""Ein Texaner, der den Leuten die Waffen wegnehmen will; ist sehr lustig, das muss man ihm lassen...""
 usc.51.desc_9: "Mayor Pete, wie auch immer sein Nachname lautete, nennt mich gerne einen Homophoben... Das ist einfach FALSCH. Ich bin der beste Präsident für die Rechte der Schwulen in der Geschichte unseres Landes. Ich habe den IS eliminiert, die Leute, die Schwule am meisten gehasst haben. Pete sollte mal fragen, für wen sein Mann gestimmt hat, er würde sehr überrascht sein."
 usc.51.desc_10: ""Ach kommt schon, Leute... Müssen wir das wirklich NOCHMAL machen?""
 usc.51.desc_11: ""Sleepy Joe wird die nächsten 4 Jahre nicht wieder ins Bett gehen und stattdessen unser Land ruinieren... Eine Schande!""
 usc.51.a: "Das ist mein Präsident!"
 usc.51.b: "Eines Tages werden wir euch erwischen, ihr werdet schon sehen!"
 usc.52.t: "Gewalt anwenden"
 usc.52.d: "Mit allen Arten von Liberalen und Alt-Linken ANTIFA Kriminellen, die jetzt auf die Straßen von Denver und anderen Städten unter unserer Kontrolle strömen, um gegen die rechtmäßige Regierung zu „protestieren" und dem tiefen Staat zu helfen, müssen wir entscheiden, wie wir in dieser Situation handeln, um RECHT und ORDNUNG zu schützen. \n\nMacgregor und andere Berater schlagen vor, dass unsere erstaunlichen Polizisten und die tapfere Nationalgarde bereit sind, so schnell wie möglich mit Gewalt gegen diese anti-amerikanischen, linken Verrückten vorzugehen, und zwar im Rahmen der Gesetze unserer Verfassung und des "Aufstandsgesetzes". Allerdings sagen weniger radikale Berater wie Jim, dass wir Diskretion walten lassen und rechtmäßig und fair sein müssen und nur Polizeikräfte einsetzen sollten, während wir die Nationalgarde nur für schreckliche Fälle einsetzen sollten."
 usc.52.a: "Das ist ein gewalttätiger Aufstand, überall in unserem großen Land. Wir sehen schwach aus, so etwas gibt es in Moskau nicht!"
 usc.52.b: "Wir müssen uns zurückhalten, unsere Jungs in Blau dürfen nur gewalttätige HUNDE verhaften."
 usc.53.t: "Unsere Unterstützung"
 usc.53.d: "Eure Leute haben Angst, sie sind in Aufruhr, überall in unseren Territorien. Sie wollen dich hören, dich sehen, sie wollen deine Zusicherung.\n\nBrian und Tucker sagen, dass die Menschen eine große Kundgebung in Denver brauchen, um allen zu zeigen - vor allem den Hatern und Trotteln - dass Denver eine MAGA-Stadt ist. Es ist ein sicherer Ort, eine Menge Sicherheit und viele schöne Unterstützer, die das Mile High Stadium spüren können. Die Basis wird es lieben.\n\nBrad hat eine Idee, um die Leute in Minneapolis zu erreichen. Pikant. Wir werden ihnen zeigen, wie gut ich mit der Aufteilung der Menge bin., große Stadt, aber nahe der Trennlinie, eine Menge ANTIFA-HUNDER  möglicherweise. Aber er sagt, das wird die Einschaltquoten in die Höhe treiben, der tapfere Präsident besucht die gespaltene Stadt und verkündet eine Botschaft der Einheit im Angesicht des Verrats. Tolle Schlagzeilen. Ihre Leute werden diesen Akt des Mitgefühls lieben.\n\nDan jedoch, mit seinen super-duper Medientechnologien, sagt, alles was Sie brauchen, ist eine gute Kampagne im Internet, eine Menge Medien - Banner, Anzeigen, Videos, was auch immer. Du nimmst Videos auf, in denen du sagst, was deine Leute hören müssen. Das ist zwar nicht so wirkungsvoll wie eine Live-Demonstration, aber Dan meint, das sei im Moment zu gefährlich."
 usc.53.a: "Denver, tolle Idee - zeigt ihnen, dass es jetzt unsere Stadt ist."
 usc.53.b: "Minneapolis ist würzig, Brad hat die Idee, wir zeigen ihnen, wie gut ich mit spaltenden Menschenmassen bin."
 usc.53.c: "Gut, wir werden uns nicht versammeln. Denn wir haben Social. Ich bin der Mike Tyson von Twitter." 
 usc.54.t: "Kundgebung in Denver"
 usc.54.d: "Die Menge - ist erstaunlich, eine Menge Energie. Das Mile High Stadium ist voll, einige Leute sind nicht gerade aus Denver, aber das macht nichts, die Zahlen schon. Tausende von MAGA-Bannern, eine riesige LED-Leinwand mit einem "TRUMP, SAVE AMERICA"-Plakat. Sie haben sich eine großartige Rede ausgedacht, ein weiterer Klassiker, in der sie die korrupten Demokraten und ihre marxistischen Verrückten anprangern und zeigen, wie sie diese erstaunliche Nation zerstören. Andere Redner waren auch da, sie haben viele WAHRE FAKTEN gesagt.\nNur die echten Medien sind hier und übertragen überall, wo sie können. Sogar noch mehr schauen live zu - verrückte Zahlen. Ihre Basis ist glücklich, dass sie ihren Präsidenten in einer Zeit der Not sehen konnten. Viele werden sich als Soldaten in der patriotischen amerikanischen Armee melden, um für das zu kämpfen, was richtig ist. Als die Kundgebung zu Ende geht, holst du das altbewährte Y.M.C.A. hervor und legst los - die Menge jubelt. Es gibt nichts Besseres als einen alten Trick, den alle lieben."
 usc.54.a: "Ein echter Knaller." 
 usc.55.t: "Trump erobert Minneapolis"
 usc.55.d: "Ed führte das typische Leben eines Lastwagenfahrers in einer Kleinstadt. Er hatte wenig Luxus und viele Probleme. Seine Stadt und seine Familie hatten seit den Tagen von Obamanomics schwere Zeiten hinter sich. Doch jeder, der versuchte, sie zu kritisieren und den Schaden aufzuzeigen, den sie den amerikanischen Arbeitern zufügte, wurde als Rassist abgestempelt.\nAber dann kam Trump an die Macht, und die Dinge begannen sich für Eds kleine Gemeinde zu verbessern. Natürlich versuchten Bürokraten und Karrieristen, die Vision des Präsidenten zu ignorieren, aber die Früchte seiner Arbeit waren dennoch offensichtlich. Viele Gemeinden im Mittleren Westen begannen, Trump als ihren persönlichen Helden zu sehen, und Eds Familie bildete da keine Ausnahme. Während sich in der Hauptstadt und im ganzen Land unangenehme Ereignisse abspielten, schaute Ed besorgt fern. Fox News berichtete, dass Präsident Trump eine öffentliche Kundgebung in Minnesota abhalten würde.\nUnd dann ging es los. Live-Bilder von Donald Trump, der auf dem Podium spricht. Doch nur wenige Augenblicke später ging etwas schief. Es gab einen hörbaren Knall, und der Präsident fiel zu Boden. Sofort umstellten Leibwächter den Bereich.\n\n Einen Moment lang dachte Ed, es sei vorbei. Sie hatten ihn getötet, den einzigen Politiker, der sich um dieses Land kümmerte. Doch dann, nur eine Sekunde später, sah er, wie Trump triumphierend die Faust hob und sich aufrichtete, umringt von Sicherheitskräften.\nEd war wirklich geschockt. Alles, was er tun konnte, war, seine Frau anzurufen und ihr die Nachricht zu überbringen."
 usc.55.a: ""Schatz, sie haben versucht, Präsident Trump zu töten!"" 
 usc.56.t: "PROJEKT: AMERIKANISCHE AUFERSTEHUNG"
 usc.56.d: "Kevin Roberts, Leiter der Heritage Foundation, hat Ihnen die Vision seines Teams vorgestellt, wie Sie Amerika zurückgewinnen können. Er sagt, dass die starke Exekutivgewalt, die in Notzeiten ausgeübt wird, notwendig ist, um die amerikanische Öffentlichkeit vor Gefahren und dem korrupten tiefen Staat zu schützen, der, wie er sagt, sogar in unserer Regierung wütet.\nDieser Mann macht hier und da ein paar gute Punkte. Schließlich kann man im Moment keinem Bürokraten trauen, sie scheinen alle nur ihre eigenen Interessen zu verfolgen. Aber ist die Aussetzung der amerikanischen Demokratie wirklich ein Weg nach vorne? Sie sind auch der Beschützer der amerikanischen Verfassung, egal, was die Verlierer im Sumpf sagen. Außerdem sagt Tucker, dass all diese konservativen Denkfabriken nur ein Ort für Möchtegern-Intellektuelle sind, und dass viele von ihnen mit Ihren Zweiflern gefüllt sind. Beschämend, wenn es stimmt."
 usc.56.a: "Hm, ich werde darüber nachdenken. Du weißt schon, diese "Projekt"-Sache."
 usc.56.b: "Tucker hat recht, so viel pseudo-kluges Gerede. Traurig!"
 usc.57.t: "Die Rückkehr der verlorenen Kinder"
 usc.57.d: "Du hast einen überraschenden Anruf von Mike erhalten! Er rief dich aus einer Grenzstadt an, wo er mit anderen grenzüberschreitenden Republikanern wohnt. Er erzählte Ihnen all die Geschichten und erkannte schließlich, warum Sie die bessere Wahl sind. Er sagte, dass der Sumpf in Washington ein Symbol für die tief verwurzelten Probleme Amerikas ist. Und es tut ihm leid, dass er nicht das Richtige getan hat. \nOh, Mike! Wo war dieser Geist, als du einfach den "Jefferson" hättest machen und unser Land retten können. Aber was will er denn? Einen Platz für seine Leute, seine 'christlichen Konservativen'. Vielleicht - etwas mehr?\n\n r könnte nützlich sein, schließlich haben Sie seine Erfahrung auf dem Gebiet nie geleugnet, und versöhnlich zu erscheinen und eine Koalition aufzubauen, ist etwas, das bei dem "sentimentalen" Teil Ihrer Basis Anklang finden könnte. Pence kommt zurück, wie der verlorene Sohn, und er wird wieder in die Herde aufgenommen. So etwas würden die Demokraten niemals tun! Sie wollen nur die rückgratlosesten Leute in der GOP-Führung haben. Seine Leute glauben wenigstens an etwas - Sie mögen anderer Meinung sein - aber wenigstens haben sie etwas, dem sie widersprechen können!\n\nAber kommen Sie, ihn öffentlich zu beschämen? Stellen Sie sich die Einschaltquoten vor; der kleine Mikey-Pency sehnt sich verzweifelt nach Aufmerksamkeit, nachdem er seine Landsleute verraten hat? Das nennt man Hochverrat, Mike. Wir bestrafen ihn hart dafür. Ein großer Fehler."
 usc.57.a: "Leute, was soll ich nur mit mir anfangen? Ich habe so viel Menschlichkeit in mir."
 usc.57.b: "Mike, hast du es vergessen? Ich vergesse nicht, und ich vergebe erst recht nicht."
 usc.58.t: "Elon Musk sagt Donald Trump seine Unterstützung zu"
 usc.58.d: "In den letzten Wochen hat Elon Musk, ein wohlhabender Geschäftsmann, seine Unterstützung für die Regierung deutlich gemacht. Nachdem er von den Aufsichtsbehörden aus dem Gebiet der Union Amerikas vertrieben worden war, verschwendete er keine Zeit damit, sein Unternehmen in der Gegend von Denver wieder aufzubauen. Er ist auch ein großer Befürworter unserer libertären Fraktion, die sich für unternehmensorientierte Initiativen und eine kleinere Regierung einsetzt.\n\nIn einer kürzlich veröffentlichten Mitteilung hat Musk seine volle Unterstützung für Donald Trump zugesagt und der Republikanischen Partei eine beträchtliche Summe Geld gespendet. Viele Berater des Präsidenten schlagen vor, die Beziehungen zu Musk zu verstärken, da sein Unternehmen und sein Einfluss auf lange Sicht von Vorteil sein könnten. Präsident Trump scheint dieser Idee nicht abgeneigt zu sein."
 usc.58.a: ""Elon - dieser Typ, ein aufsteigender Stern! Ich sag's euch!""
 usc.58.b: ""Vielen Dank für deinen großartigen Beitrag, Elon!""
 usc.59.t: "Die Nachwehen"
 usc.59.d: "Dieser Moment war ein Höhepunkt, eine entscheidende Sekunde in Ihrer Karriere. Als du dich darauf vorbereitest, die Bühne des Außerordentlichen Parteitags der Republikaner zu betreten, siehst du die Menge - was für eine große, wunderschöne Menge - und sie alle warten auf dich. Jahre der Showmanship haben Sie auf dieses Magnum Opus vorbereitet - und die Leute sagen, es sei das Mutigste, was sie je gesehen haben. Sie haben sich in dein Auftreten verliebt. Und dieses Foto - es ist überall. Alle sagen, dass man sterben muss, um solch ein ikonisches Bild zu bekommen - und doch - du bist nicht gestorben.\n\nKonfetti, bunte Lichter, Luftballons. Du betrittst die Bühne wie ein Wrestling-Champion. Du stehst da und kannst kaum die Gesichter in der Menge sehen. Du siehst einige bekannte, viele unbekannte, aber alle schauen zu dir auf, mit Augen voller Ehrfurcht. Ehrfurcht vor dem, was du bist - der mutigste Mann, den sie kennen. Sie skandieren deinen Namen und deine Sache. Hat sich Caesar so gefühlt, als er sich an seine treue Legion wandte?\n\n Manche sagen, es war Vorsehung, manche - glücklicher Zufall, andere - göttliches Eingreifen. Aber was zählt, ist, was daraus geworden ist. Du erzählst die Geschichte - ihre Augen füllen sich mit Tränen. Sie preisen dich als einen Helden, der für sie kämpft, und du versicherst ihnen, dass du niemals aufgeben wirst.\n\nFührungspersönlichkeiten auf der ganzen Welt lobten dich, unabhängig von ihrem Glauben - sehr aufschlussreich. Könnten die Leute aus dem Sumpf das Gleiche tun? Nein. Crooked Joe würde einfach umfallen und aus Versehen sterben.\n\nIhr Volk ist bereit, Ihnen bis ans Ende der Welt zu folgen. Sie sehen Ihr Überleben als göttlichen Auftrag. Gott selbst ist auf deiner Seite. Du bist jetzt ihr Messias."
 usc.59.a: "Gott segne die Vereinigten Staaten und Gott segne Donald J. Trump."
 usc.61.t: "Libertäre rebellieren gegen Trump!"
 usc.61.d: "Die schwachen Libertären sind unzufrieden mit Trumps Entscheidung, Amerika zu regieren. Sie waren schon immer zögerliche Verbündete, aber jetzt zeigen sie ihr wahres Gesicht, wenn die Dinge nicht nach ihrem Willen laufen. Es ist eine Schande! Little Paul und seine Mitstreiter rufen nun zu einer Kundgebung gegen die tyrannische Übermacht auf.\n\nIn einigen Städten sind Proteste ausgebrochen, aber es besteht kein Grund zur Besorgnis.\n\nAufgrund ihrer gewalttätigen Aktionen gegen die rechtmäßige Regierung werden nun alle libertären Symbole als Bandenutensilien betrachtet."
 usc.61.a: "Was für schlechte Verlierer."
 usc.77.t: "Vereidigung des neuen Präsidenten"
 usc.77.d: "Wow, was für eine Menge! Natürlich nicht so groß wie deine, aber trotzdem beeindruckend. Du übergibst die Zügel dieser großen Nation an jemand Neues. Das ist ein seltsames Gefühl. Du hast dich so sehr an den Sitz der Macht gewöhnt, aber jetzt ist es an der Zeit, loszulassen.\nTausende von Menschen sind gekommen, um zu sehen, wie der neue Präsident den Amtseid ablegt. Und doch preisen sie deinen Namen. Du hast ihnen die Chance gegeben, für jemanden zu stimmen, den sie wirklich wollten, und nicht für diese Verlierer wie Mitt oder McCain - armer toter Bastard, wenn er Amerika jetzt nur sehen könnte, würde er wieder sterben!\n[USC_inaguration_dynamic_text]\n\nDie Präsidentschaft von Trump mag vorbei sein, aber das Franchise "Era of Trump" "ist noch lange nicht vorbei.\n\nLicht, Kamera, Action! Lasst die zweite Staffel beginnen!"
 usc.77.d_trump_kid: "Und hier sind sie, Ihr eigenes Blut, das dieser großen Nation weiterhin dienen wird. Natürlich mit der Hilfe ihres Patriarchen. Ihre Rede ist nichts weniger als eine lebende Legende von dir und deinen Taten. Wie charmant!"
 usc.77.d_normal: "Während sie ihr Gelübde abschließen und mit ihrer Ansprache beginnen, wird Ihnen bewusst, dass Sie in diesem neuen Amerika auf jeden Fall triumphieren werden. Ihre Worte sind nichts anderes als eine Feier für euch und eure Leistungen." 
 usc.81.t: "Neue Partei für ein neues Amerika"
 usc.81.d: "Die Republikanische Partei ist nicht mehr funktionsfähig. Es fehlt ihr an der nötigen Entschlossenheit und sie kann nichts erreichen. Es ist an der Zeit, eine kompetente Führung einzuführen und eine Partei zu gründen, die Amerika und seine Bürger wirklich vertritt.\n\nNach den jüngsten organisatorischen Veränderungen hat Ken Paxton, der derzeitige Vorsitzende der Republikanischen Partei, offiziell eine vollständige Umbenennung der Partei angekündigt.\n\nIn einer offiziellen Erklärung erklärte er: "Die Republikanische Partei hat dem amerikanischen Volk gut gedient, aber zu lange waren interne Probleme eine Quelle der Sorge für diese großartige Partei. Nach reiflicher Überlegung und mit der Zustimmung des Präsidenten macht sich die Partei auf den Weg, um sich von einer Partei willensschwacher Republikaner zu einer Partei entschlossener Patrioten zu wandeln."\n\nBranding - ja, sehr wichtig. Donald Trump weiß das sehr gut. Sie wissen ja: "Wie man ein Schiff nennt, so wird es segeln." - ein berühmtes Zitat und so weiter. Die Menschen müssen die neue Partei auf Anhieb verstehen, und der Name ist der erste Schritt dazu. Es gibt so viele Möglichkeiten, und Dan sagt, sie sind alle gut. Aber wir können nicht alle verwenden, weil es dann wie einer dieser kommunistischen Parteinamen klingen würde. Was wir brauchen, ist etwas Einfaches und Effektives."
 usc.81.a: "Es geht um Einigkeit... Einigkeit - so wichtig. Eine Nation unter Gott."
 usc.81.b: "Wir lieben unsere Verfassung. Nicht wahr, Leute? Die wichtigste Säule unserer Union."
 usc.81.f: "Ich bin ein Patriot, kein Globalist. Und die Zukunft gehört den Patrioten."
 usc.81.c: "Wir sind Populisten. Wir haben unserem Volk so viel geliefert. Bannon hat recht."
 usc.82.t: "Seitenwahl"
 usc.82.d: "Eine überlebensgroße Koalition zu führen, ist eine schwierige Sache, vor allem aber, eine solche aufzubauen. Da die GOP nach dem "Rebranding" voll an Bord und vereint ist, stellt sich die Frage, wen wir noch in die MAGA-Sphäre einladen sollen? Wir sind natürlich ein sehr aufgeschlossener Haufen, wir lieben jeden, der uns nicht ablehnt.\n\nMatt - was für ein Kerl, hat immer wieder gesagt, wie sehr wir unsere Arbeiter respektieren sollten - die besten Arbeiter, glauben Sie mir. Es gibt sogar eine Organisation für wahre patriotische Arbeiter, die AMERIKANISCHE ARBEITERLIGA - ein schöner Name. Sie sind wie eine Gewerkschaft, nur besser: keine Korruption, keine marxistische Agenda, nur reinrassige Interessen unserer hart arbeitenden Werktätigen. Aber die Unterstützung einer solchen Organisation kann unserem Ansehen bei den großen und mächtigen Unternehmen schaden, und das wollen wir nicht! Auf der anderen Seite sagt Sacks - ein sehr reicher und technikbegeisterter Junge -, dass die Zukunft in einem wahrhaft amerikanischen Silicon Valley liegt, und die klugen Leute - wie Elon und er, aus irgendeinem Grund auch ein Haufen Indianer. Sie sind sehr große MAGA-Tech, weißt du. Wir können ihren Verstand gebrauchen - und ihre Taschen voller Geld, oder GolkdSÄCKE, Wortspiel beabsichtigt.\n\nNach der viel sichereren Wette - Unabhängige, oder No-Labels, wie sie manchmal genannt werden. Sie haben jahrelang versucht, in die große Politik einzusteigen, aber die Einheitspartei war so unfair, und sie wollten nur ihre lokalen Probleme lösen, nichts Großes. Diese werden nicht viel ändern, aber das haben sie auch gar nicht vor. Viel wichtiger ist, dass sie keinen Schaden anrichten werden."
 usc.82.a: "Arbeiter - sie lieben, was wir tun, immer loyale MAGAs, von Anfang an."
 usc.82.c: "Techies - kluge Leute, die brauchen wir hier."
 usc.82.b: "Gehen wir auf Nummer sicher und unterstützen wir No-Label-Typen."
 usc.83.t: "Könige und ihre Elfenbeintürme"
 usc.83.d: "Die Union liegt am Boden, ebenso wie ihre größten Spender und Puppenspieler. Sehen Sie sich nur an, wie sie sich in ihren großen Gebäuden und Hauptquartieren verstecken und Angst davor haben, was die neuen MAGA-Behörden mit ihnen machen werden. Es gibt so viele Möglichkeiten, wie wir uns an ihnen für all die Zensur, die Korruption und die Verbreitung von radikalem kommunistischem Unsinn rächen können, die sie betrieben haben.\n\nWir können ihr Vermögen beschlagnahmen, ihre Konten einfrieren, ihre Unternehmen zerschlagen und all das Geld verwenden, um neue amerikanische Unternehmen zu finanzieren, Arbeitnehmer und die Mittelschicht zu bezahlen oder die soziale Sicherheit zu verbessern - egal, was. Die Botschaft wird klar sein: Die Ära der transnationalen Konzerne in Amerika ist vorbei. Wenn sie gehen wollen, können sie nach Europa gehen, wo die Russen mit ihnen machen können, was sie wollen.\n\nAlternativ können wir sie nutzen. Es ist so einfach, sie zu beeinflussen und ihnen zu zeigen, wer jetzt der wahre Boss ist. DC wird keine Befehle mehr von den Corporate Towers entgegennehmen, es wird umgekehrt sein. Schließlich gehören all diese Unternehmen - Microsoft, META und Apple - zu Amerika, genau wie Apfelkuchen. \nNatürlich können sie einige Dividenden verlangen, aber die MAGA-Administration ist bekannt für ihre großen Träumer, und davon gibt es eine Menge."
 usc.83.a: "Dies ist jetzt ein MAGA-Land, wir brauchen diese Globalisten nicht."
 usc.83.b: "Loyale Unternehmen sind das, was wir brauchen, sie haben Geld, sie haben Arbeitsplätze."
 usc.83.c: "Bringt sie dazu, sich MAGA zu eigen zu machen. Es geht nicht nur um Geld, es geht um eine neue Ära."
 usc.84.t: "IEinblicke in die Trumpistische Festivität"
 usc.84.d: "VON: WEBSEITE DER INDEPENDENT PRESSS\nBei meiner Ankunft auf dem Milizgelände außerhalb von Topeka war es kurz vor Sonnenaufgang. Von der Interstate aus war der Anblick von Zelten, einer Bühne, brüllenden Lagerfeuern und Reihen von Pickups mit unzähligen amerikanischen Flaggen nicht zu übersehen. In der Luft lag eine Mischung aus Grillrauch und Benzin. Country-Rock, aufheulende Motoren und das Krachen von Schüssen ließen die Stimmung halb auf dem Parkplatz, halb im Kriegsgebiet aufkommen.\Als ich in die Menge ging, musterte mich eine Gruppe von Männern, die an ihren Trucks lehnten. Einer von ihnen, ein bärtiger Mann mit verspiegelter Sonnenbrille und einer AR-15, warf einen Blick auf mein Notizbuch. "Sind Sie von der Presse?", fragte er vorsichtig. "Keine Fake News, richtig?" Ich zuckte mit den Schultern. "Ich bin nur hier, um zu sehen, worum es bei Ihnen geht", sagte ich. Er musterte mich einen Moment lang, dann grinste er. "Na klar! Komm rein - nimm dir ein Bier, dann erzählen wir dir die wahre Geschichte."\n\nSie setzten mich auf einen Klappstuhl und reichten mir eine kalte Dose Bier. Der bärtige Mann lehnte sich zu mir. "Trump ist der Einzige, der sich nicht von uns abgewandt hat. Wir reißen uns den Arsch auf, und was haben wir davon? Keine Jobs mehr, überall Illegale, und die Politiker werden reich. Trump ist der Einzige, der für uns gekämpft hat. Zur Hölle mit Amtszeitbeschränkungen - Trump für immer!" Seine Freunde jubelten ihm mit einem lauten "Hell yeah!" zu. Jedes Mal, wenn ich versuchte, mich umzusehen, hielt mich jemand an, um seine Geschichte zu erzählen. Die Frau des bärtigen Mannes, ein Wirbelwind in einem roten MAGA-Kapuzenpulli, winkte mich zu sich. "Nimm dir einen Teller, bevor er weg ist!", rief sie und stapelte ihn hoch. Während ich aß, beugte sie sich vor. "Ich war nicht immer politisch", sagte sie. "Dann wurde meine Schwester süchtig nach Schmerztabletten. Sie sagten immer wieder, dass Hilfe kommen würde, aber sie kam nie. Da habe ich gemerkt: Menschen wie wir sind ihnen egal. Aber Trump? Er spricht über das, was sonst niemand tut. Ich bin bis zum Ende auf seiner Seite."\n\Nachdem der Milizenführer die Bühne betreten hatte, war die Menge geladen. Seine Stimme dröhnte über die Feuer hinweg, als er sein Crescendo erreichte: "Das ist jetzt Trumps Amerika! Er kämpft für uns, für unsere Familien! Der tiefe Staat wollte ihn zu Fall bringen, aber wir werden nicht nachgeben! Trump Forever!" Die Menge brach in Jubel aus, schwenkte Fahnen und skandierte den Namen des Präsidenten."
 usc.84.a: "Keine Einschränkungen, kein Zurück mehr." 
 usc.85.t: "Die goldenen Bögen"
 usc.85.d: "Fargos McDonalds hatte schon weitaus bessere Tage gesehen. Heutzutage gab es keinen Drive-Thru mehr, und die Pommes frites wurden in rationierten Portionen geliefert. Die Grills stotterten noch immer, die Fritteuse zischte noch immer, und die Mitarbeiter arbeiteten irgendwie weiter.\n\nDraußen wurde ein leises Grollen lauter. Schwarze Geländewagen rollten auf den Kiesplatz, und die Türen öffneten sich für Donald Trump persönlich, der überlebensgroß und mit einem Grinsen im Gesicht war. "Ein wunderschöner Ort, Leute. Wunderschön", erklärte Trump, und seine Stimme hallte von den verblassten Kachelwänden wider, als gehöre ihr der ganze Raum. "Der beste McDonald's in South Dakota, vielleicht im ganzen Mittleren Westen. Glauben Sie mir, ich habe sie alle gesehen."\n\nDer Manager, ein älterer Mann mit Fettflecken auf der Schürze und tiefen Falten unter den Augen, schlurfte nach vorne. "Mr. President... willkommen. Es ist mir eine Ehre, wirklich."\n\nTrump drückte seine Hand fest. "Nein, nein. Die Ehre ist ganz meinerseits", sagte er, seine Worte übertrieben gewichtig. "Ihr seid das Rückgrat dieses Landes. Burger, Pommes - das ist der Geist Amerikas. Und ihr haltet das alles zusammen. Unglaublich."\n\nHinter dem Tresen schob ein junger Angestellter mit zitternden Händen ein Tablett hinüber. Dem Big Mac darauf fehlte das obere Brötchen, die Pommes waren knapp, und die Limonade reichte kaum bis zur Hälfte des Bechers. Trump schnappte sich das Tablett, als wäre es eine Bankettplatte. "Das ist fantastisch", sagte er in einem unbeirrbaren Ton. "Selbst in schwierigen Zeiten liefern Sie. Der Big Mac; ikonisch. Historisch. Genau wie das, was wir tun.""
 usc.85.a: "Das sind alles gute Sachen, tolles amerikanisches Essen."
 usc.86.t: "Hannity: Kommunismus vor Gericht, Amerika jubelt"
 usc.86.d: "VON: FOX NEWS - HANNITY\n\nWie Sie vielleicht schon gehört haben, wurden die radikalen kommunistischen Banditen vor Gericht gestellt. Und jetzt kann unsere Nation die wahren roten Bösewichte sehen - die Marxisten, die so genannten "demokratischen" Sozialisten und die Anarchisten.\nBlicken Sie in ihre Gesichter, Sie werden keine Reue für das sehen, was sie getan haben, nur den kalten Ausdruck des Wahnsinnigen. Ihnen fehlt jegliches Verständnis für das menschliche Leid, das sie und ihre gefährlichen Ideen verursacht haben. Es scheint ihnen nur leid zu tun, dass sie nicht noch mehr Verbrechen begehen. Eine unserer angesehenen Expertinnen - Joyce Messier - hat gemessen, dass die Zahl der zu Unrecht getöteten Zivilisten in den vom kommunistischen Aufstand kontrollierten Gebieten bis zu EINER MILLION gereicht hat, hören Sie EINE MILLION, eine wirklich beunruhigende Erkenntnis, vor allem, wenn man den Eifer ihrer Schergen betrachtet, noch mehr zu begehen! \n\nEiner dieser niederen Abschaum - Luigi, so sein Name, schrie wie verrückt, als er zum Gericht geschleppt wurde, dass "wir nicht genug getötet haben", sehen Sie sich das an.\n\n----\n\nVerteilen. Zum Glück wird unser Land nicht länger unter ihrem Wahnsinn leiden, denn Präsident Trump und unsere tapferen Patrioten haben unsere Nation aus den Klauen dieser Bedrohung gerettet. So wie es Reagan getan hat. Doch dieses Mal war es noch gefährlicher und furchterregender, aber wir haben es überwunden. Wir werden uns immer an die Verbrechen des radikalen Sozialismus erinnern und seine Opfer betrauern. \n\nDies ist die Sean Hannity Show, und wir werden nach dieser kurzen Pause zurückkehren."
 usc.86.a: "Hey ROTER, du bist TOT!" 
 usc.87.t: "Carlson: Korrupte Demokraten-Maschine wird untersucht"
 usc.87.d: "VON: FOX NEWS - TUCKER CARLSON TONIGHT\n\nHey! Willkommen zu Tucker Carlson Tonight.\nDas Hauptthema dieser Woche ist klar zu erkennen, und ich weiß, dass Sie es kaum erwarten können, darüber zu diskutieren. Die korrupten Demokraten stehen für all ihre Taten vor Gericht.\nNicht nur, dass sie für ihren schrecklichen Aufstand und andere Verbrechen, die sie in dieser Zeit begangen haben, strafrechtlich verfolgt werden, sondern unser Justizministerium sorgt dafür, dass kein Verbrechen, gleich welcher Art, ungestraft bleibt.\n\nDazu gehören Korruption, Verfassungssabotage, Zensur und eine Politik, die sich gegen das amerikanische Volk als Ganzes richtet.\n\nHier sind sozusagen die drei wichtigsten: Nancy Pelosi, die kaum noch laufen kann, Chuck Schumer, der immer noch wie ein Widerling aussieht, und Hunter Biden, der relativ frisch wirkt und in seiner Zelle wahrscheinlich nicht viel Kokain genommen hat.\n\nSie mögen murmeln, aber die Beweise sind schon da! Unsere Staatsanwälte und der Generalstaatsanwalt haben eine erstaunliche Arbeit geleistet und alle Verbrechen dieses illegalen Regimes dokumentiert. Werfen wir einen Blick auf einige davon.\n\n----\n\nWow, was für eine Fahrt! Wir sollten Gott dankbar sein, dass wir diese bösen Menschen besiegt haben - und täuschen Sie sich nicht, sie sind böse.\nEs gibt noch viel mehr kleinere Fälle und Strafverfolgungen im Zusammenhang mit diesen drei großen Verbrechern zu berichten. Wir werden nach dieser kurzen Werbepause mit unserem eingeladenen Experten zurückkehren, um sie ausführlicher zu besprechen."
 usc.87.a: "Endstation."
 usc.88.t: "Watters: FBI-Fälscher sollen ins Gefängnis gebracht werden"
 usc.88.d: "VON: FOX NEWS - JESSE WATTERS PRIMETIME\n\n Hier ist Jesse Waters mit den neuesten Schlagzeilen: "Terroristen der Patriotenfront werden vor Gericht gestellt."\nJa, Sie haben richtig gehört. Die Führer der so genannten "Patriotenfront" werden gerade inhaftiert. Das ist eine großartige Nachricht!\n Das widerlegt nicht nur die alten und müden liberalen Anschuldigungen der "faschistischen" MAGA, sondern setzt auch der größten Geldwäscheoperation in der Geschichte des Tiefen Staates ein Ende.\nGanz ehrlich, Leute, glaubt wirklich jemand, dass diese "Nationalisten", die weiße Masken tragen und extrem rassistisch sind, aus dem Nichts aufgetaucht sind? Hier hat sich eindeutig das FBI eingemischt.\n\nSeht euch diesen Typen an! Sie können den Anführer dieser disqualifizierten Bundesbeamten sehen - Thomas Rousseau oder, wie Präsident Trump ihn nannte, "Little Tommy"!\nEin ganz schöner Blick, den er da hat, dieser Typ - Little Tommy. Es gibt nicht viel, was er sagen kann, um sich zu verteidigen, alle Karten liegen hier - auf dem Tisch - er hat einen gewaltsamen Aufstand angeführt - nicht nur gegen die rechtmäßige Regierung - sondern gegen die amerikanische Demokratie als Ganzes. Und jetzt werden er und seine unmaskierten Freunde ins Gefängnis kommen.\n\n Ich bin mir nicht sicher, was Tommy dazu gebracht hat, die Hand anzugreifen, die ihn fütterte - die Demokraten. Vielleicht war es nur ein Missverständnis oder etwas Ähnliches. Wir werden die ganze Sache mit unseren Experten weiter besprechen. Wir sehen uns nach dieser kurzen Werbepause!"
 usc.88.a: "Der kleine Tommy in der großen Zelle."
 usc.89.t: "Are You Ready To Rumble?"
 usc.89.d: "Die Menge, die sich vor dem Podium versammelt hatte, war groß und bestand hauptsächlich aus Soldaten, die gerade von der Front zurückgekehrt waren. Man war der Meinung, dass sie einen Moralschub brauchten, und so sollte ihnen das moralischste aller Dinge zuteil werden: eine Rede. \n\n"Glaubst du, dass Trump sprechen wird? Das wäre auf jeden Fall etwas, worüber man zu Hause schreiben könnte!" sagte Tony, ein neuer Rekrut, der seinen älteren Freund Ron bedrängte.\n\n"Das bezweifle ich, sie würden ihn nicht so nah an die Front bringen, vor allem bei all den Luftangriffen in diesen Tagen." erwiderte Ron. Bald wurde das Gemurmel der Menge unterbrochen, als eine Gestalt die Bühne zum Podium überquerte. Er war alt, aber gut in Form, trug ein rotes Tank-Top und ein Kopftuch. In seinem Gesicht trug er, wie Tony fand, den wohl hässlichsten Schnurrbart, den er je gesehen hatte. Tony wusste nicht, wer dieser Typ war, aber viele Leute in der Menge begannen zu jubeln. Er beschloss, Ron zu fragen. "Machst du Witze? Das ist Hulk Hogan! Der beste Wrestler!" rief Ron aus und benahm sich dabei mehr wie ein Kind als ein Mann seines Alters. Bevor Tony wieder etwas sagen konnte, begann Hulk zu reden. "Trumpamaniacs", begann er, "seid ihr bereit für das, was jetzt kommt?" fuhr er fort. Tony war besorgt darüber, was das sein könnte...\n\nDann riss Hulk Hogan sein Hemd herunter und enthüllte ein anderes, darunter ein Hemd mit der amerikanischen Flagge und Donald Trump darauf. Die Menge drehte durch, aber Tony verstand den Hype immer noch nicht, ging aber mit. Tony konnte vor lauter Jubel kaum etwas hören, wie beliebt war dieser Kerl? \n\nAls der alte Wrestler die Bühne verließ, plapperte die ganze Menge aufgeregt. Es schien, als wären die Schrecken des Krieges vergessen, wenn auch nur für einen Moment. Auch Tony hatte den Krieg für einen Moment vergessen, aber mehr aus Verwirrung als aus Ehrfurcht. Als Ron erklärte, dass er sich alte Ringkämpfe anschaute, konnte Tony nicht aufhören, an den Schnurrbart zu denken."
 usc.89.a: "WAHNSINN!" 
 usc.90.t: "Für Amerika!"
 usc.90.d: "Die Szene war chaotisch, aber kontrolliert, als sich Tausende von Patrioten, gekleidet in einen Flickenteppich aus pseudomilitärischer und Tarnkleidung, vor der Bühne drängten, um die Rede von Amerikas Retter zu erwarten. Der Himmel war grau nach tagelangen brutalen Kämpfen in der Region, und die lokalen Siege hatten die Moral von Amerikas tapfersten Soldaten gestärkt, die ihr Leben aufs Spiel setzten, um ihre Republik zu verteidigen.\n\nDie Menge brüllte, als Präsident Trump aus einem Militärfahrzeug stieg und zur Bühne schlenderte, in einem schwarzen Mantel, mit seinem typischen blonden Haar und der roten Krawatte, die von der aschegefüllten Atmosphäre leicht verkohlt war. Sein Gesicht war müde und faltig von seinem zunehmenden Alter und dem Stress und der Anstrengung, sein Land zu führen, wie ein wahrer Patriot.  Schwer bewaffnete Geheimdienstler eskortierten den Präsidenten von allen Seiten, obwohl dies wahrscheinlich der sicherste Ort der Welt für Trump war, und die Menge jubelte ihm zu und zeigte ihre Loyalität. In der Menge wehten MAGA-Fahnen, und die Soldaten standen in Reih und Glied, so weit das Auge reichte. \nTrump winkte der Menge von links nach rechts zu und hob die Hand, um Ruhe zu signalisieren. Das Gebrüll verstummte fast augenblicklich.\n\n"Meine amerikanischen Mitbürger", begann er. "Krieger, Patrioten - heute stehen wir am Abgrund der Geschichte. In diesem Krieg, diesem großen Kampf, geht es darum, wofür Amerika wirklich steht... und ich sage Ihnen gleich", kicherte Trump, "es ist nicht das, was die andere Seite Sie glauben machen will".\n\nDie Menge brach in Jubel aus, Fahnen wehten, die Gesichter waren voller Stolz und Entschlossenheit. "Der korrupte Joe... er ist da draußen", Trump hielt das Podium fest umklammert. "Er versteckt sich in seinem Keller... er sollte der Führer dieser Nation sein, aber sehen Sie sich nur das Desaster an, das er daraus gemacht hat, ich meine wirklich! Das ist Lyin' Joe und seine linksradikalen Kumpanen. Aber wir...", brach der Präsident ab. "Wir... sind diejenigen, die gewinnen werden. Nicht Slow Joe und die Amerika hassende Elite. Wir werden es sein, die dieses Land wieder groß machen!"\nDie Soldaten jubelten wieder."
 usc.90.a: "MAGA!"
 usc.91.t: "Der neue Groove der GOP"
 usc.91.d: "Trotz aller Reformen und Verbesserungen im Laufe der Jahre ist die Republikanische Partei immer noch eine schlecht funktionierende Institution. Es gibt faule Senatoren, untätige Republikaner und RINOs, die eine Menge negativer Spuren hinterlassen haben. Und viele korrupte Personen sind auch heute noch ein Schandfleck für die Partei.\n\n Deshalb suchen die Menschen nach etwas wirklich Patriotischem. Wir können die Erinnerung an Nixon, Reagan und Lincoln auch ohne das Etikett einer politischen Partei in Ehren halten. Sie würden es sicher zu schätzen wissen.\n\nEine ganze Partei zu verändern ist eine Herausforderung, aber es muss getan werden, damit das Zeitalter von Trump in eine neue Phase eintreten kann. Wir haben mehrere Möglichkeiten, unsere Partei zu präsentieren und in eine neue zu verwandeln."
 usc.91.a: "Trump hat uns zur Partei des Volkes gemacht."
 usc.91.b: "Trump hat uns zur Partei der Patrioten geformt."
 usc.91.c: "Trump hat uns zur Partei der amerikanischen Nation gemacht."
 usc.92.t: "Hinkles Brief"
 usc.92.d: ""Sehr geehrter Präsident Donald J. Trump, ich hoffe, es geht Ihnen gut. Mein Name ist Jackson Hinkle, und ich bin ein amerikanischer Kommunist. Aber was noch wichtiger ist, ich bin ein amerikanischer Patriot.\nBevor Sie aufhören zu lesen, lassen Sie mich meine Position erklären. Wir unterstützen Sie. Die Dinge, die Sie für die Arbeiterklasse dieser vom Krieg zerrissenen Nation getan haben, sind unglaublich. Sie sind wirklich ein Präsident des Volkes. Natürlich sehen wir, wie jede vernünftige Opposition, Schattenseiten und Pannen, aber wir verstehen, dass diese Nation Sie in ihrer Mehrheit braucht und unterstützt.\n\nNach dem Sturz der zutiefst fehlerhaften "sozialistischen" Regierung in Kalifornien haben meine Genossen und ich begonnen, uns zu organisieren. Uns eint die Idee, den Bedürftigen zu helfen und ein stärkeres Amerika aufzubauen.\n\nMeine Gruppe mit dem Namen "Communists for Trump" hat viel Unterstützung von patriotischen Kommunisten erhalten. Wir wurden jedoch wiederholt von Regierungsbehörden daran gehindert, an aktiveren politischen Aktivitäten teilzunehmen.\nDeshalb bitten wir Sie, uns zu helfen und die ungesetzliche Verfolgung unserer Bewegung zu beenden. Patrioten können zusammenarbeiten, um unser Land mit einer gemeinsamen Vision zu verbessern."\n\Nachfolgend wird darüber gesprochen, wie ein ‚wahrhaft amerikanischer Sozialismus‘ oder etwas Ähnliches geschaffen werden kann. Sie haben es nicht gelesen, aber diese Typen sind interessant.\nCommunists for Trump? MAGA-Kommunismus? Sie sind so beliebt, sogar die Roten lieben Sie! Und die Arbeiter, wir tun schon so viel für sie, aber wir können noch mehr tun, und sie können helfen..."
 usc.92.a: "Diese Jungs haben es in sich, aber je mehr, desto besser!"
 usc.92.b: "Totaler Schwachsinn! Der Kommunismus ist DER Feind Amerikas, Punkt."
 usc.93.t: "Die Befreiung unserer Helden"
 usc.93.d: "Viele echte Amerikaner wurden unter dem illegalen Biden-Regime inhaftiert. Jetzt, da es zusammengebrochen ist, müssen wir sie aus diesen grausamen Gefängnissen entlassen und Platz für diejenigen machen, die es wirklich verdienen, hinter Gittern zu sitzen.\n\nTausende von politischen Gefangenen werden aus allen Gefängnissen unter unserer Kontrolle entlassen. Einige von ihnen haben sich nur verbal abweichend geäußert und wurden brutal unterdrückt. Viele jedoch kämpften für ihre Rechte als Amerikaner, wie es sich für wahre Patrioten gehört, und wurden dafür bestraft.\nDiese Art von Menschen hat es nicht so mit dem friedlichen Leben. Obwohl sie unter grausamen Bedingungen festgehalten wurden, melden sich viele von ihnen bereits für die Miliz an oder stellen ihren Status als Soldat wieder her. Sie sind sehr mutig. Sie werden zu den Gesichtern unserer Bewegung, den Trägern der Leidenschaft von MAGA.\n\nLeider haben einige von ihnen ihre Befreiung nicht überlebt. Sie wurden von den demokratischen Gaunern gefoltert und getötet. Aber unser Justizministerium tut sein Bestes, um an alle zu Unrecht getöteten Patrioten zu erinnern, Beweise zu sammeln und die Verbrechen des Deep State öffentlich zu machen. Sie werden zu Märtyrern werden - Märtyrer des neuen Amerika."
 usc.93.a: "Unsere Garde marschiert weiter..."
 usc.94.t: "Richard Spencer hingerichtet!"
 usc.94.d: "Richard Bertrand Spencer war ein Mann, der nicht davor zurückschreckte, sich selbst ins Rampenlicht zu stellen. Er war einer der Organisatoren der "Unite the right"-Kundgebung und eine Schlüsselfigur der so genannten "Alt-Right" im Jahr 2016, doch seine Eskapaden sollten damit nicht enden. Auf dem Höhepunkt der Wahlen vor dem Bürgerkrieg kündigte Spencer seine Unterstützung für Trump auf und unterstützte stattdessen Joe Biden, ein Schritt, der unter seinen rechtsextremen Verbündeten für viel Verwirrung sorgte und ihn noch mehr isolierte, da das Biden-Lager seine Unterstützung offen anprangerte. \n\nNun, da der Bürgerkrieg in vollem Gange war, versuchte Spencer, sich in die Union Amerikas einzugliedern, um seine Karriere voranzutreiben, aber nach mehreren Vorfällen von Missbrauch und Belästigung am Arbeitsplatz wurde er schnell aus seiner niedrigen Verwaltungsposition entlassen.\n\nDa seine Rolle in der Union begraben war, wollte er schnell zur verfassungsmäßigen Regierung überlaufen, da er dort das gleiche Spiel versuchte, aber er wurde schnell erschnüffelt, da sowohl seine Rolle in der Union als auch seine Unterstützung für Biden vor dem Bürgerkrieg ans Licht kamen. \n\nSpencer wurde verhaftet und erwartet einen Prozess wegen Hochverrats. Es ist ganz offensichtlich, welches Schicksal Verräter erwartet, egal auf welche Weise, dies wäre der Sargnagel für Spencers Karriere.\n\nAls die Sicherheitskräfte ihm anboten, ihm seine letzte Mahlzeit zu geben, war alles, was er verlangte..."
 usc.94.a: "..."Ein guter Schweizer geschmolzener Schweizer Käse und Champignons mit karamellisierten Zwiebeln auf einem Burger.""
 usc.95.t: "Gottgegebenes Recht"
 usc.95.d: "Trump war umringt von seinen Presseleuten, die alle darauf erpicht waren, das perfekte Foto von ihm mit seinem breiten Lächeln und dem ikonischen Daumen nach oben zu schießen, während die zahllosen kalten Gewehre im Hintergrund einen starken Kontrast zu dem Bild bildeten, das der Präsident zu vermitteln versuchte. Der Raum brummte vor Energie, jeder Kamerablitz tauchte den Raum kurz in helles Licht, während Trump seine Arme hob, um die Schärfe zu gewährleisten. \n\n"Wir sind heute hier", dröhnte seine Stimme mit übertriebener Ernsthaftigkeit, "weil wir diejenigen anerkennen müssen, die uns, offen gesagt, in diesem Kampf halten. Unsere Leute - die wahren Patrioten hinter den Kulissen, die dafür sorgen, dass wir alle Mittel zum Kämpfen haben. Glauben Sie mir, Leute, unsere Kämpfer bekommen das Beste vom Besten genau hier hergestellt!\n\n Er schwieg. Sein Blick schweifte über die Pressevertreter, bevor er schnell den Nacken in Richtung der Theke drehte, wo der Ladenbesitzer mit einem Gewehr in der Hand auftauchte. "Dies, Mr. President, ist ein M4-Karabiner mit dem Standardkaliber 5,56".\n\n Trump beugte sich über den Tresen und ergriff das Gewehr mit beiden Händen, wobei er damit kämpfte, die schwere Waffe oben zu halten, bevor er vor sich hin kicherte. Mit gerunzelter Stirn wandte er sich wieder den Kameras zu. "Es ist wirklich schwer." Seine Augen huschten an dem langen Gewehr auf und ab. "Dieses großartige, großartige Gewehr, so etwas kann nirgendwo anders hergestellt werden, nicht einmal von den radikalen Demokraten, so unamerikanisch sind sie!" \n\nIn seinen Händen wurde das Gewehr zu einer Requisite für ein improvisiertes Fotoshooting. Trump nahm viele dramatische Posen ein. Zuerst hielt er das Gewehr an der Taille, während der Lauf nach links zeigte, dann hob er es aufrecht, wobei der Griff auf seiner Schulter ruhte. Schließlich hielt er das Gewehr in einer theatralischen Einstellung direkt in die Objektive der Kamera, wobei sein selbstgefälliger Gesichtsausdruck direkt hinter dem hervorstehenden Zylinder lag. Der Raum hielt scheinbar den Atem an, als er zielte, aber die Unruhe legte sich, als der Präsident das Gewehr senkte. "Sie sind nicht CNN!". "Dieses Gewehr ist zwar nicht vergoldet, aber ich glaube, ich nehme es!" Das Gesicht des Ladenbesitzers leuchtete vor Freude auf, als sich seine Augen mit denen von Trump trafen. Der Präsident, das Gewehr immer noch in der Hand, drehte sich ein letztes Mal zu den Kameras um und neigte seinen Kopf für eine letzte dramatische Einstellung nach vorne."
 usc.95.a: "Und ich bin stolz, Amerikaner zu sein..."
 usc.96.t: "MAGA-Mütze - Das Symbol der Revolution"
 usc.96.d: "Die MAGA-Mützen... die roten, die weißen, die schwarzen, es gibt sie in allen Formen und Größen. Für Kinder und Erwachsene, manche sind spottbillig, andere sind limitierte Sondereditionen (mit DJTs Unterschrift!). Diese Mütze wurde zu einem wichtigen Teil deiner Kampagne, dann deiner ganzen Bewegung und deiner Präsidentschaft. Es ist nur eine einfache Mütze, aber sie sagt eine Menge aus. Wenn jemand sie trägt, schreit er im Grunde: "MAKE AMERICA GREAT AGAIN". Selbst inmitten all des Chaos finden Ihre Leute einander, indem sie nach diesen leuchtend roten Mützen Ausschau halten.\nSie haben ihn auch oft getragen, im Weißen Haus, bei Kundgebungen, überall. Mit dieser Mütze hatte man das Gefühl, wirklich Teil der Menge zu sein - als ob wir alle gemeinsam dabei wären, Amerika wieder großartig zu machen, ein Schritt nach dem anderen.\n\nWas hat es damit auf sich? Nun, Jared und einige andere Berater sagten, dass die MAGA-Mütze so etwas wie eine moderne Version der Kokarde ist, die die Kontinentalarmee verwendete. Sie denken also, dass es cool wäre, wenn der Präsident, genau wie George Washington selbst, ein Symbol dieser neuen Revolution tragen könnte. Zumindest in den offiziellen Dokumenten und in den Medien.\nAndererseits würde es deine Killerfrisur durcheinander bringen, die an sich schon ein großes Symbol ist!\n\nOb du etwas trägst, das deine Fans so wichtig finden wie amerikanischen Apfelkuchen und den zweiten Verfassungszusatz, ist dir überlassen... Bedenke nur, dass du dann nicht in der Lage sein wirst, deine tolle Frisur zu zeigen."
 usc.96.a: "Gut! Dan, hol den Vorrat raus, ich habe eine für jeden Tag der Woche!"
 usc.96.b: "Weißt du, was die Leute wirklich antreibt? Mich!"
 
 darkmaga.1.t: "Der Zorn"
 darkmaga.1.d: "Ich brauche Taten. Vergissden Kongress - er ist eine totale Verschwendung und kann nichts tun. Bringt mich inss Fernsehen - Primetime, hohe Einschaltquoten. Ich werde den GROSSEN Notstand ausrufen. Meine Leute brauchen Schutz - eine starke Hand für eine starke Entscheidung. Ich habe es satt, nett zu spielen, wenn man getroffen wird, trifft man doppelt so hart, und ich bin DER PRÄSIDENT, ich kann so hart zuschlagen, wie ich will.\n\n"Meine amerikanischen Mitbürger, ich wende mich heute Abend an Sie, um zu erklären, dass unsere Nation stirbt - sowohl im übertragenen als auch im wörtlichen Sinne. Der Krieg wütet weiter - ein blutiger Krieg, und wir müssen vor allem anderen handeln. Ich stehe als Garant für Ihre Sicherheit und Ihren Schutz. Deshalb erkläre ich heute mit den mir von unserer heiligen Verfassung verliehenen Befugnissen den War Powers Act. Machen Sie keinen Fehler, dies ist ein echter Krieg, und ich bin - derzeit ein Kriegspräsident.\nSie - das Volk - wurden zu lange von korrupten Politikern, sogar in unseren eigenen Reihen, getäuscht und belogen. Doch damit ist JETZT Schluss - die Zeit des leeren Geredes ist vorbei - jetzt kommt die Stunde des Handelns...\nSolange ich Präsident bleibe und solange der War Powers Act in Kraft ist, verspreche ich, alle Freiheiten nach besten Kräften zu achten. Aber unseren Feinden sage ich dies, sowohl im Inneren als auch im Äußeren - euer widerliches Spiel wird bald ein Ende haben.\nMein Volk, liebe Amerikaner, eure Zeit ist gekommen. Lasst es uns tun..."\n\nDamit ist das Kabinett aufgelöst und der Kongress suspendiert - vielleicht für immer. Bis auf Weiteres bist du nun ein König, der über dem Gesetz steht. Nutze diese Macht, wie du es für richtig hältst."
 darkmaga.1.a: "Ich werde meinen Leuten das Leben geben, das sie brauchen..."
 darkmaga.3.t: "Es hervorbringen"
 darkmaga.3.d: "Es war ein bemerkenswerter Anblick: eine riesige Menschenmenge, die gespannt auf die großen LED-Bildschirme blickte, die live aus dem Hauptgerichtsgebäude sendeten. Für sie war es wie eine Show, wie "The Apprentice", nur dass anstelle von "You're Fired!" - eine Todesstrafe.\n\nDie "Angeklagten" - betäubt und schwach, murmeln ihre erbärmlichen Worte. Sie wussten, dass es sich um einen Schauprozess handelte; es gab keinen Raum für Einsprüche. Sie alle waren schon lange vor Beginn des Prozesses als Verräter abgestempelt worden - von Ihnen in einer Ihrer WAHRHEITEN.\nSie werden hysterisch, als der Richter sie" in allen Punkten für schuldig" erklärt - "BETRUG". Augenblicke später werden sie von zwei großen, starken Wachen aus dem Raum getragen, ins Nichts - für immer.\n\nWie viele von ihnen waren wirklich schuldig? Das spielte keine Rolle - sie sind alle Kriecher und Opportunisten, die jeden Moment bereit sind, Sie und Amerika zu verraten.\nIhr Volk wusste das auch. Mit jedem Urteilsspruch wurde die Menge lauter und begeisterter. "Das ist die gerechte Befreiung", sagten sie. "All diese dummen Bundesbeamten und ihre dummen Gesetze. Sie verdienen, was jetzt kommt." Die Menschen jubelten, während die "Ratten" bettelten und weinten. Es schien ihnen, als ob sie genau das verpasst hätten. Sie hatten das Gefühl, dass ihr Leben mit jedem toten Bürokraten besser werden würde, und dass sie das Paradies, das sie einmal verloren hatten, zurückgewinnen würden.\n\n Eine großartige Show, unabhängig von ihrem religiösen Hintergrund. Sagen Sie Dan, er soll eine Kopie der Gerichtsaufzeichnungen für den privaten Gebrauch aufbewahren."
 darkmaga.3.a: "Slice - Come Paradise!"
 darkmaga.4.t: "Ratten im Haus"
 darkmaga.4.d: "Da sind sie, die Schmarotzer und Trittbrettfahrer. Es war unvermeidlich. Hören Sie sich ihre Klagen und Schreie an, wie verwöhnte Kinder, die nicht akzeptieren können, dass die Zukunft nicht mehr ihnen gehört.\n\nDie meisten von ihnen sind Liberale und Sozialisten, die aus ihren Verstecken kommen, weil sie glauben, dass „die Gefahr noch nie so groß war" und dass "Trump mit seiner Macht verrückt geworden ist." Aber es gibt auch einige, die einfach nur wütend über Trumps "feindliche" Übernahme sind.\n\nIhr Widerstand ist sinnlos, daran besteht kein Zweifel. Doch wie einige Kommandeure vorschlagen, ist es besser, ihn schnell zu beenden. Andernfalls könnte ihre Dreistigkeit mit jedem Tag größer werden."

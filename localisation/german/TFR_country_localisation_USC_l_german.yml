 USC_seized_corporate_assets_tt: "§gSie rennen weg wie die Ratten, als die Kartellabteilung des DOJ ihr wertvolles Vermögen einfriert. "Ich habe eine Familie!" schreien sie. Jahrzehntelang haben die Konzernchefs die Durchschnittsamerikaner missbraucht - sie zensiert und betrogen, und Sie haben ihr übles Spiel beendet. Die Wall Street ist jetzt die TRUMP Street.\nSie dachten, sie würden ohne Konsequenzen leben, sich an der Macht halten und ihre Villen genießen. Sie hatten sich ihr eigenes Grab gebaut.\nVersteckt euch in euren Elfenbeinmonumenten, ihr globalistischen Parasiten. Baut eure Türme hoch - höher als meine. Aber wundert euch nicht, wenn es keinen Sauerstoff mehr gibt.§!"
 USC_loyal_corporate_america_tt: "§gSie singen jetzt Ihr Lied - den America First Song. Jetzt zensieren sie nicht mehr die Meinungen eurer Leute, sondern andersherum. Tarife und neue DOJ-Kontrolle, sie verschlingen alles, nur um in guter Gunst zu bleiben. Lutscher.§!"
 USC_corporate_maga_tt: "§gBill Gates, dieser rückgratlose kleine Wurm, schaut Sie mit seiner blassen Haut und seinen toten Augen an. Er sagt: "Microsoft ist America First, Sir. Wir haben es jetzt verstanden."\nNacheinander kommen die CEOs und Direktoren und küssen den Ring. Früher haben sie MAGA gehasst - so viel Zensur und Lobbyismus für den Sumpf. Aber jetzt sehen sie das Licht... Sie haben es jetzt verstanden.§!"
 

 usc.1000.t: "Amerika - für immer verändert"
 usc.1000.d: "Es war ein Ereignis, das sich sehen lassen konnte. Sieg, totaler und vollständiger Sieg, sie hatten Unrecht, sie haben sich immer geirrt. Alles, was sie dir an den Kopf geworfen haben, denk daran, all der Kampf, all die Kämpfe, die Kokser an der Wall Street, die alles versucht haben, um dich in den Bankrott zu treiben, die Mafiaunternehmer, die versucht haben, dich zu betrügen, und all die Schmarotzer und Parasiten auf deinem Weg, sie konnten dich nicht zurückhalten - sie haben deinen Aufstieg nur angeheizt.\n\nUSA!  USA!  USA! \n\nDein Volk ist da, im ganzen Land, es feiert, skandiert, schwelgt. Dein Sieg gehört ihnen; dein Amerika gehört ihnen, es hat sich für immer verändert und dieser Sieg hat es verkalkt, in den kommenden Jahrzehnten und Jahrhunderten werden sie sich daran erinnern, was du für dein Volk getan hast, und alle Hasser werden längst vergessen sein.\n\nTRUMP! TRUMP! TRUMP!\n\n Du hast nie klein beigegeben, nie kapituliert. All die falschen Medien und diese Hollywood-Nobodys, die wie Ratten vor dem sinkenden Schiff geflohen sind und dich einen "Feigling" und einen "Gauner" genannt haben - nun, die müssen sich jetzt verdammt dumm vorkommen!\n\nSIEG! SIEG! VICTORY!\n\nWashington ist mit Fahnen und Bannern behängt wie nie zuvor, und die Menschen versammeln sich zu einer Kundgebung, der größten Kundgebung - manche sagen, der größten überhaupt. Während Sie im Schatten warten, bis Sie an der Reihe sind, wird ein Redner nach dem anderen auf Sie einreden: der Vizepräsident, Tucker, Ivanka und viele andere.\nSie gehen schließlich hinaus. Die Menge brüllt und klatscht - es ist ein Strom von Menschen. Auf dem Weg zum Podium denkst du an einen guten Anfangssatz, etwas, das die Leute in Bewegung bringt. Als du dich dem Mikrofon näherst, fällt dein Entschluss: Jeder liebt einen guten Rückblick."
 usc.1000.a: ""...Tut mir leid, dass ich euch warten gelassen habe, es gab viel zu tun!""

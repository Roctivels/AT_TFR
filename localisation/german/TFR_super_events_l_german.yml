  NUKE_TITLE: "Um 15:40 Uhr entdeckte NORAD Dutzende von submarinen Atomraketen, die von Kings Bay, Georgia, abgefeuert wurden. Da der amerikanische Bürgerkrieg in vollem Gange war, konnte das Unvermeidliche kaum noch verhindert werden.\n \n Mehrere US-amerikanische und europäische Großstädte wurden in Schutt und Asche gelegt.\n \n Der Zusammenbruch der Weltwirtschaft löste einen weltweiten Vergeltungsschlag durch alle Nationen mit Atomraketen aus. \n \n \n \n \n \n \n \n \n \n \n Die Menschheit wurde in nur §R8 Stunden§! ausgelöscht."

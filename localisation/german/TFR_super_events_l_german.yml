  LOS_confederacy_old_guard_super_text: "\"Das Prinzip, für das wir eintreten, wird sich zwangsläufig wieder durchsetzen, wenn auch zu einem anderen Zeitpunkt und in anderer Form.\"\n- Jefferson Davis"
  LOS_confederacy_old_guard_super_button: "Deo Vindice"
  SOV_ldpr_victory_super: "Russland siegt in Europa"
  SOV_ldpr_victory_super_text: "\"Ich werde verrückt, wenn ich an die Aussichten Russlands denke: Wir werden das größte Volk, der größte Staat werden, alles in der Welt wird mit unserer Erlaubnis gemacht werden.\"\n- Nikolas II"
  SOV_ldpr_victory_super_button: "Slava Rossii"
  BEL_EU_victory_super: "Der Europäische Frühling"
  BEL_EU_victory_super_text: "\"Wir haben die Freiheit gekostet und wir werden sie nicht aufgeben.\"\n- Wolodymyr Selenskij"
  BEL_EU_victory_super_button: "Vae Victis"
  SOV_30_days_war_super: "Der Dreißigtagekrieg"
  SOV_30_days_war_super_text: "\"Jeder Mann, jede Frau und jedes Kind lebt unter einem nuklearen Damoklesschwert, das am dünnsten Faden hängt.\"\n- John F. Kennedy"
  SOV_30_days_war_super_button: "Die Lebenden werden die Toten beneiden"
  JAP_japanese_civil_war_super: "Japanischer Bürgerkrieg"
  JAP_japanese_civil_war_super_text: "\"Shide no yama.\nUngezählte Horden kommen. \nDurch das Todesgebirge. \nUnd es ist kein Ende in Sicht. \nDie Zahl der Erschlagenen steigt...\"\n- Saigyo"
  JAP_japanese_civil_war_super_button: "Sakura brennt..."
  SER_formation_yugoslavia_super: "Die Wiedergeburt Jugoslawiens"
  SER_formation_yugoslavia_super_text: "\"Wir haben ein Meer von Blut für die Brüderlichkeit und die Einheit unserer Völker vergossen, und wir werden nicht zulassen, dass irgendjemand es von innen heraus anrührt oder zerstört.\"\n- Josip Broz Tito"
  SER_formation_yugoslavia_super_button: "Hej, Sloveni!"
  GER_second_nato_war_fascist_super: "Achsenstiefel marschieren über Europa"
  GER_second_nato_war_fascist_super_text: "\".\"\n- Adolf Hitler"
  GER_second_nato_war_fascist_super_button: "Der Springerstiefel hängt über Europa....."
  european_war_super: "Europäischer Krieg"
  european_war_super_text: "\"Ein Krieg zwischen Europäern ist ein Bürgerkrieg.\"\n- Victor Hugo"
  european_war_super_button: "Es hat begonnen..."
  USB_third_american_civil_war_super: "Dritter Amerikanischer Bürgerkrieg"
  USB_third_american_civil_war_super_text: "\"Mein Vater sagte immer: "Du weißt, dass du erfolgreich bist, wenn du deine Kinder ansiehst und feststellst, dass sie es besser gemacht haben als du."'\"\n- Joe Biden"
  USB_third_american_civil_war_super_button: "Ein geteiltes Haus... schon wieder"
  FAF_third_european_war_super_event: "Fränkischer Rückeroberungskrieg"
  FAF_third_european_war_super_text: "\"Jedes der beiden Völker wird im Vertrauen auf seinen eigenen Sieg kämpfen, aber die sichersten Sieger werden die Kräfte der Zerstörung und der Barbarei sein."\"\n- Edouard Daladier"
  FAF_third_european_war_super_button: "Es war unvermeidbar..."
  FAF_third_european_war_super_event_monarchist: "Dritter Europäischer Krieg"
  FAF_third_european_war_super_event_monarchist_text: "\"Volk von Frankreich, kehrt zu eurem König zurück. Er wird immer euer Vater sein, euer bester Freund.\"\n- König Ludwig der XVI."
  FAF_third_european_war_super_event_monarchist_button: "Lang lebe der König!"
  FAF_third_european_war_super_event_benedetti: "Dritter Europäischer Krieg"
  FAF_third_european_war_super_event_benedetti_text: "\"Wir diskutieren nicht mit denen, die uns widersprechen, sondern wir vernichten sie.\"\n- Benito Mussolini"
  FAF_third_european_war_super_event_benedetti_button: "Salut! "
  FAF_third_european_war_super_event_bardella: "Dritter Europäischer Krieg"
  FAF_third_european_war_super_event_bardella_text: "\"Ich kam, sah und eroberte.\"\n- Julius Cäsar"
  FAF_third_european_war_super_event_bardella_button: "Teutoburg gerächt."
  FAF_third_european_war_super_event_napoleon: "Krieg der Achten Koalition"
  FAF_third_european_war_super_event_napoleon_text: "\"Ich fand die Krone von Frankreich in der Gosse. Ich hob sie mit der Spitze meines Schwertes auf, reinigte sie und setzte sie auf mein eigenes Haupt.\"\n- Napoléon Bonaparte"
  FAF_third_european_war_super_event_napoleon_button: "Lang lebe der Kaiser!"
  FAF_third_european_war_super_event_republic: "Dritter Europäischer Krieg"
  FAF_third_european_war_super_event_republic_text: "\"Patriotismus ist, wenn die Liebe zum eigenen Volk an erster Stelle steht; Nationalismus, wenn der Hass auf andere Menschen als die eigenen an erster Stelle steht.\"\n- Charles de Gaulle"
  FAF_third_european_war_super_event_republic_button: "Die Befreiung kommt!"
  FAF_third_european_war_super_event_junta: "Dritter Europäischer Krieg"
  FAF_third_european_war_super_event_junta_text: "\"Folgt mir, und bewahrt euer Vertrauen in das ewige Frankreich.\"\n- Philippe Pétain"
  FAF_third_european_war_super_event_junta_button: "Honneur et Fidélité."
  APR_fools_super: "WARNUNG!!!! HINWEIS!!!!!!!!"
  APR_fools_super_text: "\"Wir haben unsere Fehler eingesehen und geißeln uns derzeit auf dem Altar des Kapitals, der Reinheit und der Ordnung, wir entschuldigen uns demütig bei den Göttern des vernünftigen Zentrismus und der Entropie. Von nun an ist das TFR-Team stolz darauf, nur noch genehmigte Pfade darzustellen.\" - TFR Dev Team"
  APR_fools_super_button: "Heilige Scheiße... Das ist wahr!"
  GER_schwab_victory_super: "Neue Normalität"
  GER_schwab_victory_super_text: "\"Wir müssen lernen, verschiedene Identitätsebenen in uns zu integrieren. Es geht nicht um entweder/oder, sondern um sowohl/als auch.\"\n- Klaus Schwab"
  GER_schwab_victory_super_button: "Horror ohne Ende"
  GER_gunther_war_super: "Zweiter Europäischer Krieg"
  GER_gunther_war_super_text: "\"Die einzige Lösung... ist die Auflösung Russlands.\"\n- Gunther Fehlinger"
  GER_gunther_war_super_button: "#DecolonizeRussia"
  GER_gunther_victory_super: "Das Ende der Geschichte"
  GER_gunther_victory_super_text: "\"Beendet diesen Krieg durch Sieg. Freiheit. Frieden. Jetzt.\"\n- Gunther Fehlinger"
  GER_gunther_victory_super_button: "Europa ist gerettet!"

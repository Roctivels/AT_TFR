 ZZZ_capitalist_economy: "§YKapitalismus§!"
 TFR_CAPITALISM_TT: "§YKapitalistisches Modell§!"
 TFR_CAPITALISM_TT_LONG: "§gDer Kapitalismus ist ein Wirtschaftssystem, in dem private Unternehmen und Betriebe frei von staatlichen Eingriffen arbeiten. In diesem System werden Preise, Kosten und Löhne durch die Marktkräfte, wie Angebot und Nachfrage, bestimmt. Das bedeutet, dass es nur eine begrenzte staatliche Aufsicht und Regulierung gibt. Der Kapitalismus ist bei Marktliberalen sehr beliebt und hat sich zum weltweit am weitesten verbreiteten Wirtschaftssystem entwickelt.§!\n\n\n\n\n£GFX_ZZZ_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon Konsumgüterfabrikenfaktor: §Y-2%§!\n £efficiency_growth_texticon Produktionseffizienzwachstum: §G+2%§!\n £construction_speed_infrastructure_texticon §YInfrastruktur§!-Baugeschwindigkeit: §R-1,5%§!\n £construction_speed_infrastructure_texticon §YBürokomplex§!-Baugeschwindigkeit: §G+1.5%§!\n £GFX_dx_blue Unternehmenswertfaktor: §G+5%§!\n £GFX_dx_yellow Personalwertfaktor: §R-5%§!"
 
 ZZZ_inclusive_capitalism: "§YInklusiver Kapitalismus§!"
 TFR_INCLUSIVE_CAPITALISM_TT: "§YInklusiver Kapitalismus§!"
 TFR_INCLUSIVE_CAPITALISM_TT_LONG: "§gDer Inklusive Kapitalismus ist eine Wirtschaftstheorie, die darauf abzielt, ein faireres und gerechteres System der Wertverteilung in der Wirtschaft zu schaffen und die wachsende Ungleichheit bei Einkommen und Vermögen zu bekämpfen. Der Kern des integrativen Kapitalismus liegt in der Förderung eines nachhaltigen Wachstums, das den Interessen aller Beteiligten dient - Unternehmen, Investoren, Arbeitnehmer, Verbraucher, Regierungen, lokale Gemeinschaften, die Gesellschaft als Ganzes und die Umwelt.§!\n\n\n\n\n£GFX_ZZZ_inclusive_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon Komsumgüterfabrikenfaktor: §Y2.0%§!\n £construction_speed_infrastructure_texticon §YBürokomplex§!-Baugeschwindigkeit: §G+2%§!\n £construction_speed_infrastructure_texticon §YInfrastruktur§!-Baugeschwindigkeit: §G+1,5%§!\n £construction_speed_civfactory_texticon §YZivilfabrik§!-Baugeschwindigkeit: §R-2,5%§!\n £GFX_dx_blue Unternehmenswertfaktor: §G+2%§!\n £GFX_dx_yellow Personalwertfakor: §G+2%§!"
 
 ZZZ_american_capitalism: "§YAmerikanischer Kapitalismus§!"
 TFR_AMERICAN_CAPITALISM_TT: "§YAmerikanischer Kapitalismus§!"
 TFR_AMERICAN_CAPITALISM_TT_LONG: "§gDas amerikanische Wirtschaftssystem ist ein Modell für andere Volkswirtschaften der freien Marktwirtschaft. Es basiert auf freiem Handel und minimalen staatlichen Eingriffen in wirtschaftliche Angelegenheiten. Es gibt jedoch einige einzigartige Merkmale, durch die sich dieses System von anderen Formen des Kapitalismus unterscheidet.\nEines der wichtigsten Merkmale ist die Grundlage der amerikanischen Wirtschaft. Der US-Dollar ist eine starke Währung, die wegen ihrer Stabilität hoch angesehen ist. Infolgedessen wird er in der ganzen Welt als wichtigste Reservewährung verwendet.§!\n\n\n\n\n£GFX_ZZZ_american_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon Konsumgüterfabrikenfaktor: §Y-3%§!\n £efficiency_growth_texticon Produktionseffizienzwachstum: §G+3,5%§!\n £construction_speed_infrastructure_texticon §YInfrastruktur§!-Baugeschwindigkeit: §R-3.5%§!\n £construction_speed_infrastructure_texticon §YBürokomplex§!-Baugeschwindigkeit: §G+5%§!\n £GFX_dx_blue Unternehmenswertfaktor: §G+10%§!\n £GFX_dx_yellow Personalwertfaktor: §R-10%§!"
 
 ZZZ_oligopolistic_capitalism: "§YOligopolistischer Kapitalismus§!"
 TFR_OLIGOPOLY_CAPITALISM_TT: "§YOligopolistische Wirtschaft§!"
 TFR_OLIGOPOLY_CAPITALISM_TT_LONG: "§gWie viele andere Länder funktioniert auch die Wirtschaft dieses Landes nach den Grundsätzen des freien Marktes. Sie ist jedoch durch ein hohes Maß an Marktkonzentration gekennzeichnet, wobei eine kleine Anzahl von Unternehmen den Wettbewerb dominiert.\nWas dieses Wirtschaftssystem von seinen kapitalistischen Gegenstücken unterscheidet, ist die minimale Beteiligung der Regierung. Die Regulierungs- und Verwaltungsfunktionen des Staates sind in einem außerordentlich hohen Maße entweder begrenzt, vereinnahmt oder weitgehend unwirksam. Die Wünsche der dominierenden Unternehmen haben Vorrang vor dem öffentlichen Interesse.§!\n\n\n\n\n£GFX_ZZZ_oligopolistic_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon Konsumgüterfabrikenfaktor: §Y-4%§!\n£prod_eff_cap Produktionseffizienzwachstum: §G+3,5%§!\n £construction_speed_infrastructure_texticon §YInfrastruktur§!-Baugeschwindigkeit: §R-6%§!\n £construction_speed_refinery_texticon §YRaffinierie§!-Baugeschwindigkeit: §G+10.0%§!\n £GFX_dx_blue Unternehmenswertfaktor: §G+15%§!\n £GFX_dx_yellow Personalwertfaktor: §R-15%§!"
 
 ZZZ_cabal_economy: "§YKabalenwirtschaft§!"
 TFR_CABAL_ECONOMY_TT: "§YKabalenwirtschaft§!"
 TFR_CABAL_ECONOMY_TT_LONG: "§gDie Kabalenwirtschaft, intern manchmal auch als Bilderberg-System bezeichnet, ist eine Schattenwirtschaft, die nach dem Prinzip der Maximierung finanzieller und politischer Gewinne für die Cognoscenti und ihre Finanzinteressen strukturiert ist. Durch private Treffen, Vorhersagealgorithmen und Insiderhandel stellen alle beteiligten Parteien sicher, dass die Gewinne hoch bleiben und bestimmte unvorhersehbare Faktoren minimiert werden, wodurch eine hervorragende Illusion von Stabilität für das amerikanische Volk geschaffen wird, während gleichzeitig garantiert wird, dass der Finanzsektor weiterhin floriert, die Finanziers zufrieden sind und der Deep State Zugang zu den benötigten Ressourcen hat.§!\n\n\n\n\n£GFX_ZZZ_cabal_economy_banner\n\n\n\n\n\n £consumer_goods_texticon Konsumgüterfabrikenfaktor: §Y3%§!\n £construction_speed_texticon Baugeschwindigkeit: §G+3%§!\n £GFX_dx_blue Unternehmenswertfaktor: §G+20%§!\n £GFX_dx_yellow Personalwertfaktor: §R-20%§!"
 
 ZZZ_collective_capitalism: "§YKollektiver Kapitalismus§!"
 ZZZ_collective_capitalism2: "§YKollektiver Kapitalismus§!"
 TFR_COLLECTIVE_CAPITALISM_TT: "§YKollektiver Kapitalismus§!"
 TFR_COLLECTIVE_CAPITALISM_TT_LONG: "§gDer kollektive Kapitalismus ist ein japanisches Wirtschaftsmodell, das sich durch eine enge Beziehung zwischen Unternehmen und Regierung sowie durch starke Partnerschaften zwischen Unternehmen und ihren Lieferanten, Kunden und anderen Interessengruppen auszeichnet. Dieses Modell setzt auf langfristige Stabilität und Zusammenarbeit statt auf Wettbewerb und basiert auf der Idee, dass Unternehmen und Gesellschaft miteinander verbunden sind und gemeinsam Verantwortung für den Erfolg des anderen tragen.§!\n\n\n\n\n£GFX_ZZZ_collective_capitalism_banner\n\n\n\n\n\n [JAP_collective_capitalism_bonus]" 
 
 ZZZ_welfare_capitalism: "§YSozialkapitalismus§!"
 TFR_WELFARE_CAPITALISM_TT: "§YSozialkapitalistisches Modell§!"
 TFR_WELFARE_CAPITALISM_TT_LONG: "§gIn einem sozialkapitalistischen System kombiniert die Regierung die Präsenz privater Unternehmen und Betriebe mit einem gewissen Maß an Kontrolle und Beteiligung an der Wirtschaft, um deren ordnungsgemäßes Funktionieren zu gewährleisten. Nach Ansicht seiner Befürworter schafft dieses System ein Gleichgewicht zwischen hohem Wirtschaftswachstum, niedriger Inflation und Arbeitslosigkeit, günstigen Arbeitsbedingungen und einem gewissen Maß an sozialer Sicherheit.§!\n\n\n\n\n£GFX_ZZZ_welfare_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon Konsumgüterfabrikenfaktor: §Y2,5%§!\n £construction_speed_infrastructure_texticon §YInfrastruktur§!-Baugeschwindigkeit: §G+5%§!\n £efficiency_growth_texticon Produktionseffizienzwachstum: §R-6,5%§!"\n £construction_speed_civfactory_texticon §YZivilfabrik§!-Baugeschwindigkeit: §G+5%§!\n £GFX_dx_blue Unternehmenswertfaktor: §R-10%§!\n £GFX_dx_yellow Personalwertfaktor: §G+10.0%§!\n £GFX_dx_yellow Persönlicher Ausgabenfaktor: §Y+3,5%§!"
 
 ZZZ_corporatism: "§YKorporatismus§!"
 TFR_CORPORATISM_TT: "§YKorporatistisches Modell§!"
 TFR_CORPORATISM_TT_LONG: "§gDer Korporatismus ist ein Wirtschaftssystem, das darauf abzielt, den Staat und die Gesellschaft durch juristische Personen zu vereinen. Dies wird als der effektivste Weg angesehen, um eine wohlhabende und stabile Wirtschaft aufzubauen.\nKorporatismus wird oft mit faschistischen und autoritären Regimen in Verbindung gebracht. Diese Regime verlangen unerschütterliche Loyalität gegenüber dem Staat. Es ist jedoch wichtig, zwischen Korporatismus und Korporatokratie zu unterscheiden, bei denen die Grenzen zwischen dem Staat und den Unternehmen verwischt werden.§!\n\n\n\n\n£GFX_ZZZ_corporatism_banner\n\n\n\n\n\n £consumer_goods_texticon Konsumgüterfabrikenfaktor: §Y-2,5%§!\n £construction_speed_infrastructure_texticon §YInfrastruktur§!-Baugeschwindigkeit: §G+10%§!\n £production_efficiency_loss_texticon Produktionseffizienz-Beibehaltung: §R-5%§!\n £sabotaged_resource_texticon Ressourcenmangel-Strafe: §R+3.5%§!\n £mil_factory Fabrikausgabe: §G+6%§!\n £GFX_dx Monatliches Einkommenswachstum: §R-10%§!\n £GFX_dx_yellow Persönlicher Ausgabenfaktor: §Y-10%§!"
 
 ZZZ_command_economy: "§YKommandowirtschaft§!"
 TFR_COMMAND_ECONOMY_TT: "§YKommandowirtschaft§!"
 TFR_COMMAND_ECONOMY_TT_LONG: "§gEine Kommandowirtschaft ist eine stark zentralisierte Form des Korporatismus, bei der erhebliche Teile der Wirtschaft durch direkte staatliche Eingriffe verstaatlicht wurden, insbesondere in strategischen Sektoren wie der Waffenproduktion und der Schwerindustrie.§!\n\n\n\n\n£GFX_ZZZ_command_economy_banner\n\n\n\n\n\n £consumer_goods_texticon Komsumgüterfabrikenfaktor: §Y-3%§!\n £construction_speed_infrastructure_texticon §YInfrastruktur§!-Baugeschwindigkeit: §G+10%§!\n £efficiency_base_texticon Produktionseffiziensbasis: §G+10%§!\n £efficiency_growth_texticon Produktionseffizienzwachstum: §R-10%§!"\n £mil_factory Fabrikausgabe: §G+5.6%§!\n £GFX_dx Monatliches Einkommenswachstum: §R-15%§!\n £GFX_dx_yellow Persönlicher Ausgabenfaktor: §Y15%§!"
 
 ZZZ_managed_economy: "§YNazi-Korporatismus§!"
 TFR_MANAGED_ECONOMY_TT: "§YNationalsozialistischer Korporatismus§!"
 TFR_MANAGED_ECONOMY_TT_LONG: "§gDer Begriff Nazi-Korporatismus bezieht sich auf das System, das die Grundlage des Wirtschaftsmodells von Nazi-Deutschland bildete. Obwohl es weithin als Versagen eines inzwischen untergegangenen Regimes angesehen wird, behaupten Anhänger neonazistischer Bewegungen immer noch, dass es das einzig wahre und ehrliche Wirtschaftssystem für die "arische Rasse" war. Alle Bemühungen sind darauf ausgerichtet, die Bedürfnisse des Staates und der höchsten Autorität zu erfüllen - sei es der große Führer oder der Parteiapparat. Jede Handlung wird gründlich überprüft. Die Forderungen der Regierung sind scheinbar endlos, und ihre Projekte haben Vorrang vor allen anderen Angelegenheiten.§!\n\n\n\n\n£GFX_ZZZ_managed_economy_banner\n\n\n\n\n\n £consumer_goods_texticon Konsumgüterfabrikenfaktor: §Y-5%§!\n £construction_speed_milfactory_texticon §YMilitärfabrik§!-Baugeschwindigkeit: §G+10%§!\n £mil_factory Fabrikausgabe: §G+6%§!\n £production_efficiency_loss_texticon Produktionseffizienz-Beibehaltung: §R-10%§!\n £development Monatliche Armutsentwicklung:  §R-1,5%§!\n £GFX_dx Monatliches Einkommenswachstum:   §R-15%§!\n £GFX_dx_yellow Persönlicher Ausgabenfaktor: §Y-10%§!"
 
 ZZZ_planned_economy: "§YPlanwirtschaft§!"
 TFR_PLANNED_ECONOMY_TT: "§YPlanwirtschaft§!"
 TFR_PLANNED_ECONOMY_TT_LONG: "§gEine Planwirtschaft ist ein Wirtschaftssystem, in dem die gesamte Wirtschaftsleistung und das Wachstum im Voraus geplant werden, um die Bedürfnisse der Bevölkerung und des Landes insgesamt zu erfüllen. Diese Planung kann entweder zentral oder dezentral erfolgen, und sie kann von einem speziellen Expertenrat oder von der Bevölkerung selbst auf partizipative Weise beschlossen werden.§!\n\n\n\n\n£GFX_ZZZ_planned_economy_banner\n\n\n\n\n\n\n\n £consumer_goods_texticon Komsumgüterfabrikenfaktor: §Y-5%§!\n £construction_speed_infrastructure_texticon §YInfrastruktur§!-Baugeschwindigkeit: §G+10%§!\n £efficiency_base_texticon Produktionseffizienzbasis: §G+7,5%§!\n £efficiency_growth_texticon Produktionseffizienzwachstum: §R-10%§!\n £production_efficiency_loss_texticon Produktionseffizienz-Beibehaltung: §R-5%§!\n £mil_factory Fabrikausgabe: §G+10%§!\n £GFX_dx Monatliches Einkommenswachstum: §R-25%§!\n £GFX_dx_yellow Persönlicher Ausgabenfaktor: §Y10%§!"
 
 ZZZ_developed_socialism: "§YEntwickelter Sozialismus§!"
 TFR_DEVELOPED_SOCIALISM_TT: "§YTheorie des entwickelten Sozialismus§!"
 TFR_DEVELOPED_SOCIALISM_TT_LONG: "§gDas Konzept des entwickelten Sozialismus, einst ein Überbleibsel der Breschnew-Ära in der Sowjetunion, ist von zeitgenössischen russischen Ökonomen wiederbelebt worden. In dieser aktualisierten Perspektive wurde eine größere Anzahl von Kossygins Vorschlägen und Reformen umgesetzt, was zu einer vielfältigeren Wirtschaftslandschaft und einem vielfältigeren Wirtschaftssystem geführt hat.\nObwohl die zentrale Planung immer noch eine zentrale Rolle spielt, wird die Privatinitiative bei weitem nicht aufgegeben. Die privaten Unternehmen erhalten mehr Unabhängigkeit in der Produktion, der Planung und bei den Anreizen für die Mitarbeiter. Diese Unabhängigkeit ermöglicht es ihnen, mehr Gewinn zu erzielen, was sie wiederum dazu motiviert, mehr zu produzieren. Darüber hinaus wurde ein neues Lohnsystem eingeführt, das auf dem Erwerbsbeteiligungskoeffizienten basiert. Bei diesem System werden die Arbeitnehmer danach bezahlt, wie viel sie zur Produktion des Unternehmens beitragen.§!\n\n\n\n\n£GFX_ZZZ_developed_socialism_banner\n\n\n\n\n\n £consumer_goods_texticon Komsumgüterfabrikenfaktor: §Y-3%§!\n £construction_speed_civfactory_texticon §YZivilfabrik§!-Baugeschwindigkeit: §G+10%§!\n £mil_factory Fabrikausgabe: §G+5%§!\n £production_efficiency_loss_texticon Produktionseffizienz-Beibehaltung: §R-10%§!\n £sabotaged_resource_texticon Ressourcenmangel-Strafe:  §G-5%§!\n £efficiency_growth_texticon Produktioneffizienswachstum:  §R-10%§!\n £GFX_dx_yellow Persönlicher Ausgabenfaktor: §Y+5%§!\n £GFX_dx_yellow Personalwertfakor: §G+5%§!"
 
 ZZZ_military_controlled_economy: "§YMilitärgesteuerte Wirtschaft§!"
 TFR_MILITARY_CONTROLLED_TT: "§YMilitärgesteuerte Wirtschaft§!"
 TFR_MILITARY_CONTROLLED_TT_LONG: "§gIn einer vom Militär kontrollierten Wirtschaft übt das Militär die direkte Kontrolle über die Wirtschaft aus. Die überwiegende Mehrheit, wenn nicht sogar alle, der wirtschaftlichen Aktivitäten sind darauf ausgerichtet, den Bedarf des Militärs zu decken. Diese Art von Wirtschaftssystem ist in Ländern mit einer Militärdiktatur oder einer Stratokratie weit verbreitet. Dabei wird jedoch häufig den Interessen des Militärs Vorrang vor dem Wohlergehen der Bürger eingeräumt. Dies liegt daran, dass Regime, die dieses Wirtschaftsmodell anwenden, dazu neigen, nationalistisch oder sogar ultranationalistisch zu sein.§!\n\n\n\n\n£GFX_ZZZ_military_controlled_banner\n\n\n\n\n\n £consumer_goods_texticon Komsumgüterfabrikenfaktor: §Y-5%§!\n £construction_speed_milfactory_texticon §YMilitärfabrik§!-Baugeschwindigkeit: §G+10%§!\n £efficiency_base_texticon Produktionseffizienzbasis: §R-7,5%§!\n £efficiency_growth_texticon Produktionseffizienzwachstum: §G+10%§!\n £sabotaged_resource_texticon Ressourcenmangel-Strafe: §G-10%§!\n £mil_factory Fabrikausgabe: §G+5.0%§!\n £GFX_dx_yellow Persönlicher Ausgabenfaktor: §Y-10%§!\n £development Monatliche Armutsentwicklung: §R-2,5%§!"
 
 ZZZ_worker_controlled_economy: "§YArbeiterkontrollierte Wirtschaft§!"
 TFR_WORKER_CONTROLLED_TT: "§YArbeiterkontrollierte Wirtschaft§!"
 TFR_WORKER_CONTROLLED_TT_LONG: "§gZwar wird gemeinhin angenommen, dass es sich bei Planwirtschaften ausschließlich um solche handelt, die von der Regierung kontrolliert werden, doch trifft dies nicht auf alle Planwirtschaften zu.\n Von den Arbeitnehmern kontrollierte Wirtschaften werden nicht von Staatsbeamten oder Bürokraten geleitet, sondern von den Arbeitnehmern selbst, häufig durch Arbeitnehmerräte oder Gewerkschaften. Über diese Gremien behalten die Arbeitnehmer oft die direkte Kontrolle über ihre Produktion und genießen oft ein hohes Maß an Autonomie.§!\n\n\n\n\n£GFX_ZZZ_worker_controlled_banner\n\n\n\n\n\n £consumer_goods_texticon Komsumgüterfabrikenfaktor: §Y2%§!\n £construction_speed_civfactory_texticon §YZivilfabrik§!-Baugeschwindigkeit: §G+10%§!\n £efficiency_growth_texticon Produktionseffizienzwachstum: §G+10%§!"\n £prod_eff_cap Produktionseffizienzlimit: §G+5%§!\n £mil_factory Fabrikausgabe: §G+5%§!\n £GFX_dx_yellow Persönlicher Ausgabenfaktor: §Y10%§!\n £GFX_dx_yellow Personalwertfaktor: §G+10%§!"
 
 ZZZ_socialist_market: "§YSozialistische Marktwirtschaft§!"
 TFR_SOCIALIST_MARKET_TT: "§YSozialistische Marktwirtschaft§!"
 TFR_SOCIALIST_MARKET_TT_LONG: "§gIn einer sozialistischen Marktwirtschaft arbeiten der Staat und private Unternehmen zusammen, um eine gerechtere Gesellschaft aufzubauen. Die Regierung besitzt einige Unternehmen und überwacht die Wirtschaft, um Gerechtigkeit zu gewährleisten, während private Unternehmen tätig sind und sich weiterentwickeln.\n Eines der Hauptziele ist es, sicherzustellen, dass jeder Zugang zu grundlegenden Dienstleistungen wie Nahrung, Wohnraum und Gesundheitsversorgung hat. Ein weiteres Ziel ist die Förderung von Innovation und Unternehmertum, während gleichzeitig sichergestellt wird, dass die Unternehmen im besten Interesse der Öffentlichkeit arbeiten.§!\n\n\n\n\n£GFX_ZZZ_socialist_market_banner\n\n\n\n\n\n £consumer_goods_texticon Komsumgüterfabrikenfaktor: §Y-1,5%§!\n £mil_factory Fabrikausgabe: §G+3,5%§!\n £construction_speed_infrastructure_texticon §YInfrastruktur§!-Baugeschwindigkeit: §G+5%§!\n £efficiency_base_texticon Produktionseffizienzbasis: §G+5%§!\n £efficiency_growth_texticon Produktionseffizienzwachstum: §R-3,5%§!\n £GFX_dx Monatliches Einkommenswachstum: §G+10%§!\n £GFX_dx_yellow Persönlicher Ausgabenfaktor: §Y+10%§!"
 
 ZZZ_chaostic_economy: "§RChaotische Wirtschaft§!"
 TFR_CHAOSTIC_TT: "§YChaos§!"
 TFR_CHAOSTIC_TT_LONG: "Unsere Wirtschaft befindet sich derzeit in einem Zustand von Chaos und Verwirrung. Unternehmen schließen, Arbeitnehmer wandern ab, und immer mehr Menschen sind von Arbeitslosigkeit bedroht. Die Regierung und die Bürokraten müssen schnell handeln, um die Ordnung wiederherzustellen und die Unruhen, die in unserem Land herrschen, zu beenden.\n\n\n\n\n£GFX_ZZZ_chaostic_economy_banner\n\n\n\n\n\n\n\n £consumer_goods_texticon Konsumgüterfabrikenfaktor: §Y5%§!\n £construction_speed_texticon Baugeschwindigkeit: §R-10%§!\n £mil_factory Fabrikausgabe: §R-10%§!" 



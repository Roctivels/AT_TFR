 ZZZ_minarchism: "§YMinarchismus§!"
 TFR_MINARCHISM_TT: "§YMinarchismus§!"
 TFR_MINARCHISM_TT_LONG: "Der §6Minarchismus§! §gplädiert für einen skelettierten Staat, der nur für Recht, Ordnung und Verteidigung zuständig ist und alles andere den chaotischen Kräften des Marktes überlässt. Der ungezügelte Kapitalismus gedeiht, stärkt die Mutigen und lässt die Schwachen im Stich.§!\n\n\n\n\n£GFX_ZZZ_minarchism_banner\n\n\n\n\n\n £consumer_goods_texticon Konsumgüterfabrikenfaktor: §Y-5%§!\n £efficiency_growth_texticon Produktionseffizienzwachstum: §G+3%§!\n £construction_speed_infrastructure_texticon §YInfrastruktur§!-Baugeschwindigkeit: §R-10%§!\n £construction_speed_infrastructure_texticon §YBürokomplex§!-Baugeschwindigkeit: §G+2%§!\n £GFX_dx_blue Unternehmenswertfaktor: §G+5%§!\n £GFX_dx_yellow Personalwertfaktor: §G+5%§!""

 ZZZ_ancap: "§YAnarchokapitalismus§!"
 TFR_ANCAP_TT: "§YAnarchokapitalismus§!"
 TFR_ANCAP_TT_LONG: "§gDas §YAnarchokapitalistische§! Modell stellt sich eine Welt vor, in der der Staat verschwindet und durch freie Märkte und Privatunternehmen ersetzt wird. Recht, Sicherheit und Dienstleistungen werden von konkurrierenden Unternehmen erbracht, wobei Eigentumsrechte und freiwilliger Austausch als Leitprinzipien gelten. Befürworter preisen dies als wahre Freiheit, Kritiker warnen vor der Vorherrschaft der Unternehmen. Es ist eine Gesellschaft, in der absolute Freiheit und Chaos Hand in Hand gehen.§!\n\n\n\n\n£GFX_ZZZ_ancap_banner\n\n\n\n\n\n £consumer_goods_texticon Konsumgüterfabrikenfaktor: §Y-15%§!\n £efficiency_growth_texticon Produktioneffizienswachstum: §G+12%§!\n £construction_speed_infrastructure_texticon §YInfrastruktur§!-Baugeschwindigkeit: §R-39%§!\n £construction_speed_infrastructure_texticon §YBürokomplex§!-Baugeschwindigkeit: §G+25%§!\n £GFX_dx_blue Unternehmenswertfaktor: §G+15%§!\n £GFX_dx_yellow Personalwertfaktor: §G+5%§!\n £GFX_stability_texticon Stabilität: §R-10%§!"

 ZZZ_kaiser_economy: "§YReichsbürgerwirtschaft§!"
 ZZZ_KAISER_ECO_TT: "§YReichsbürgerwirtschaft§!"
 ZZZ_KAISER_ECO_TT_LONG: "§gDas Wirtschaftssystem des neuen kaiserlichen Regimes ist ein komplexes Geflecht aus neofeudalen Praktiken und agrarischer Vorherrschaft. Es sieht im Bankwesen die Quelle aller sozialen Übel, geht aber noch einen Schritt weiter und macht ausdrücklich die Juden für das verantwortlich, was sie als Niedergang der deutschen Wirtschaft und den Niedergang des deutschen ländlichen Raums ansehen, da die Verstädterung in ihren Augen von jüdischen Bankinteressen vorangetrieben wird.\ Es wird angestrebt, eine florierende ländliche Marktwirtschaft zu schaffen, wobei der Schwerpunkt auf kleinen Unternehmen liegt, die der Umwelt keinen großen Schaden zufügen können. Die gesamte verbleibende Industriekraft wird zur Deckung des Bedarfs des Militärs und seiner immer größer werdenden Zahl eingesetzt.§!\n\n\n\n\n£GFX_ZZZ_kaiser_economy_banner\n\n\n\n\n\n £consumer_goods_texticon Konsumgüterfabrikenfaktor: §Y-5%§!\n £construction_speed_civfactory_texticon §YZivilfabrik§!-Baugeschwindigkeit: §R-10%§!\n £construction_speed_milfactory_texticon §YMilitärfabrik§!-Baugeschwindigkeit: §G+3,5%§!\n £mil_factory Fabrikausgabe: §G+1%§!\n £mobilisation_texticon Mobilisierungsgeschwindigkeit: §G+15%§!\n £production_efficiency_loss_texticon Produktionseffizienz-Beibehaltung: §R-10%§!\n £development Monatliche Armutsentwicklung:  §R-2%§!\n £GFX_dx Monatliches Einkommenswachstum:   §R-15%§!\n £GFX_dx_yellow Personalwertfaktor: §R-15%§!\n £GFX_dx_yellow Persönlicher Ausgabenfaktor: §Y-15%§!"
 
 ZZZ_left_corporatism: "§YLinker Korporatismus§!"
 ZZZ_LEFT_CORPORATISM_TT: "§YLinker Korporatismus§!"
 ZZZ_LEFT_CORPORATISM_TT_LONG: "§gDer linke Korporatismus ist ein Wirtschaftsmodell, das versucht, die Interessen verschiedener gesellschaftlicher Gruppen, insbesondere von Arbeit, Kapital und Staat, durch ein System der Zusammenarbeit und Verhandlung auszugleichen. Er wird oft mit einem progressiven oder linken Ansatz für die Regierungsführung in Verbindung gebracht, der soziale Gerechtigkeit, ökologische Nachhaltigkeit und demokratische Beteiligung betont.\nDer linke Korporatismus beinhaltet in der Regel die Zusammenarbeit zwischen drei Hauptakteuren: der Regierung, den Unternehmen und den Gewerkschaften. Dieses dreigliedrige Modell zielt darauf ab, den Dialog und den Konsens zwischen diesen Gruppen zu fördern, um wirtschaftliche und soziale Fragen anzugehen.§!\n\n\n\n\n£GFX_ZZZ_left_corporatism_banner\n\n\n\n\n\n £consumer_goods_texticon Konsumgüterfabrikenfaktor: §Y2,5%§!\n £construction_speed_infrastructure_texticon §YInfrastruktur§!-Baugeschwindigkeit: §G+10%§!\n £mil_factory Fabrikausgabe: §G+3,5%§!\n £construction_speed_texticon Baugeschwindigkeit: §G+5%§!\n £GFX_dx Monatliches Einkommenswachstum: §R-10%§!\n £GFX_dx_yellow Personalwertfaktor: §G+10%§!"
 
 ZZZ_liberal_corporatism: "§YLiberaler Korporatismus§!"
 ZZZ_LIBERAL_CORPORATISM_TT: "§YLiberaler Korporatismus§!"
 ZZZ_LIBERAL_CORPORATISM_TT_LONG: "§gDer liberale Korporatismus ist ein wirtschaftliches und politisches Modell, das die Zusammenarbeit zwischen dem Staat, den Unternehmen und den Arbeitnehmerorganisationen betont und gleichzeitig eine hauptsächlich marktorientierte Wirtschaft beibehält. Er versucht, die Interessen dieser Gruppen durch institutionelle Rahmenbedingungen, die Verhandlungen und Zusammenarbeit fördern, auszugleichen. Der Liberale Korporatismus operiert zwar innerhalb eines kapitalistischen Rahmens, erkennt aber die Notwendigkeit staatlicher Eingriffe an, um Marktversagen zu korrigieren, einen fairen Wettbewerb zu gewährleisten und die Rechte der Arbeiter zu schützen.§!\n\n\n\n\n£GFX_ZZZ_liberal_corporatism_banner\n\n\n\n\n\n £consumer_goods_texticon Konsumgüterfabrikenfaktor: §Y-1,5%§!\n £prod_eff_cap Produktionseffizienzlimit: §R-5%§!\n £construction_speed_texticon Baugeschwindigkeit: §G+2,5%§!\n  £development Monatliche Armutsentwicklung:  §G+0,05%§!\n £GFX_dx_blue Unternehmenswertfaktor: §G+10%§!\n £GFX_dx_yellow Personalwertfaktor: §G+10%§!"
 
 ZZZ_maga_capitalism: "§YMAGA-Kapitalismus§!"
 ZZZ_MAGA_CAPITALISM_TT: "§YMAGA-Kapitalismus§!"
 ZZZ_MAGA_CAPITALISM_TT_LONG: "§gDer MAGA-Kapitalismus - Obwohl er den grundlegenden Standards des amerikanischen kapitalistischen Modells folgt, ist dieses System sehr viel protektionistischer und beugt nicht die Knie vor großen Unternehmen.\nStattdessen unterstützt er kleine unabhängige Unternehmen und Produzenten sowie mittelständische Unternehmen. Außerdem gibt es strenge Kartellgesetze, um übermäßige wirtschaftliche Macht zu begrenzen oder zu beseitigen.\nEin weiteres wichtiges Merkmal dieses Systems ist die starke Betonung des Schutzes und der Förderung der Interessen der Arbeiter. Ziel ist es, die Sozialversicherung, Medicare und andere Wohlfahrtsprogramme aufrechtzuerhalten und, wenn möglich, zu verbessern, während gleichzeitig ihre Belastung für die amerikanische Wirtschaft minimiert wird.§!\n\n\n\n\n£GFX_ZZZ_maga_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon Konsumgüterfabrikenfaktor: §Y2%§!\n £construction_speed_infrastructure_texticon §YInfrastruktur§!-Baugeschwindigkeit: §G+5.0%§!\n £efficiency_growth_texticon Produktionseffizienzwachstum: §R-5%§!"\n £construction_speed_civfactory_texticon §YZivilfabrik§!-Baugeschwindigkeit: §G+5%§!\n £GFX_dx_blue Unternehmenswertfaktor: §R-5%§!\n £GFX_dx_yellow Personalwertfaktor: §G+10%§!\n £GFX_dx_yellow Persönlicher Ausgabenfaktor: §Y+3%§!" 
 
 ZZZ_america_first_capitalism: "§YAmerica-First-Kapitalismus§!"
 ZZZ_AF_CAPITALISM_TT: "§YAmerica-First-Kapitalismus§!"
 ZZZ_AF_CAPITALISM_TT_LONG: "§gDer America-First-Kapitalismus ist eine modernisierte und verbesserte Version des amerikanischen Systems. Ziel ist es, eine protektionistische Wirtschaft zu schaffen, von der amerikanische Unternehmen stark profitieren. Dies wird durch den Einsatz von Zöllen erreicht, um amerikanische Produkte und Unternehmen vor ausländischer Konkurrenz zu schützen. Außerdem wird das Land gegen "unerwünschte" Einflüsse abgeschottet. Das System konzentriert sich auch stark auf Infrastrukturprojekte, um die Nation zu vernetzen und mehr Einnahmen zu generieren. Es begünstigt amerikanische Unternehmen und zielt darauf ab, entweder das unternehmerische Amerika zu reformieren oder einen neuen Pool von Großunternehmen zu schaffen, die dem Willen der amerikanischen Nation entsprechen werden.§!\n\n\n\n\n£GFX_ZZZ_america_first_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon Konsumgüterfabrikenfaktor: §Y-4%§!\n£prod_eff_cap Produktionseffizienzlimit: §G+3,5%§!\n £construction_speed_infrastructure_texticon §YInfrastruktur§!-Baugeschwindigkeit: §G+5%§!\n £mil_factory Fabrikausgabe: §R-5%§!\n £GFX_dx_blue Unternehmenswertfaktor: §G+15%§!\n £GFX_dx_yellow Personalwertfaktor: §R-15%§!"
 
 ZZZ_state_capitalism: "§YStaatskapitalismus§!"
 ZZZ_STATE_CAPITALISM_TT: "§YStaatskapitalismus§!"
 ZZZ_STATE_CAPITALISM_TT_LONG: "§gDer Staatskapitalismus ist ein Wirtschaftssystem, in dem sich die Regierung aktiv an geschäftlichen und kommerziellen Aktivitäten mit Gewinnabsicht beteiligt. In diesem System sind die Produktionsmittel verstaatlicht und werden vom Staat über staatliche Unternehmen kontrolliert. Dazu gehören Kapitalakkumulation, zentralisiertes Management und der Einsatz von Lohnarbeit.§!\n\n\n\n\n£GFX_ZZZ_state_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon Konsumgüterfabrikenfaktor: §Y-2%§!\n £efficiency_growth_texticon Produktionseffizienzwachstum: §R-2%§!\n £construction_speed_civfactory_texticon §YZivilfabrik§!-Baugeschwindigkeit: §G+2.5%§!\n £construction_speed_infrastructure_texticon §YInfrastruktur§!-Baugeschwindigkeit: §G-1,5%§!\n £GFX_dx Monatliches Einkommenswachstum: §R-4%§!\n £efficiency_base_texticon Produktionseffiziensbasis: §G+5%§!§!"
 
 ZZZ_party_state_capitalism: "§YParteistaatlicher Kapitalismus§!"
 ZZZ_PARTY_STATE_CAPITALISM_TT: "§YParteistaatlicher Kapitalismus§!"
 ZZZ_PARTY_STATE_CAPITALISM_TT_LONG: "§gDer parteistaatliche Kapitalismus ist ein Wirtschaftsmodell, bei dem der Staat nicht die treibende Kraft in der Wirtschaft ist, sondern die Parteistrukturen über die staatlichen Strukturen gestellt werden. Ein Hauptindikator für die Ausdehnung des parteistaatlichen Systems ist die zunehmende Präsenz von Parteiorganisationen in Unternehmen, einschließlich Privatunternehmen und sogar ausländischen Firmen. Ein weiteres Hauptmerkmal dieses Modells ist die Ausweitung des staatlichen Kapitals über die staatlichen Unternehmen hinaus. Dieser Prozess wurde als "staatliche Finanzialisierung" bezeichnet. Eine weitere Art und Weise, in der die wirtschaftliche Aktivität des Parteistaates sichtbar wird, ist die Entwicklung der Industriepolitik.§!\n\n\n\n\n£GFX_ZZZ_party_state_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon Konsumgüterfabrikenfaktor: §Y-3%§!\n £efficiency_growth_texticon Produktioneffizienswachstum: §R-2%§!\n £construction_speed_civfactory_texticon §YZivilfabrik§!-Baugeschwindigkeit: §G+4%§!\n £construction_speed_infrastructure_texticon §YBürokomplex§!-Baugeschwindigkeit: §G+4%§!\n £GFX_dx Monatliches Einkommenswachstum: §G+2,5%§!\n £efficiency_base_texticon Produktionseffizienzbasis: §R-1,5%§!§!"
 
 ZZZ_mixed_economy: "§YMischwirtschaftliches Modell§!"
 ZZZ_MIXED_ECONOMY_TT: "§YMischwirtschaftliches Modell§!"
 ZZZ_MIXED_ECONOMY_TT_LONG: "§gEine Mischwirtschaft ist ein Wirtschaftssystem, das sowohl Elemente des Kapitalismus (z.B. private Unternehmen) als auch des Sozialismus (z.B. verstaatlichte staatliche Dienstleistungen) in sich vereint. Manche sagen zum Beispiel, es sei ein Wirtschaftssystem, das Elemente der Marktwirtschaft mit Elementen der Planwirtschaft kombiniert. Andere sagen, dass es Märkte mit staatlichem Interventionismus oder private Unternehmen mit öffentlichen Unternehmen kombiniert.§!\n\n\n\n\n£GFX_ZZZ_mixed_economy_banner\n\n\n\n\n\n £consumer_goods_texticon Konsumgüterfabrikenfaktor: §Y-2,5%§!\n £efficiency_base_texticon Produktionseffizienzbasis: §G+2%§!\n £construction_speed_civfactory_texticon §YZivilfabrik§!-Baugeschwindigkeit: §G+1.5%§!\n £construction_speed_infrastructure_texticon §YBürokomplex§!-Baugeschwindigkeit: §G+1,5%§!\n £GFX_dx_blue Unternehmenswertfaktor: §G+3,5%§!\n £GFX_dx_yellow Personalwertfaktor: §R-1,5%§!"


 #Totalitarian Socialist

 totalitarian_socialist: "Totalitär-sozialistisch"
 totalitarian_socialist_noun: "Totalitärer Sozialismus"
 totalitarian_socialist_desc: "Totalitär-sozialistisches Regime"
 totalitarian_socialist_drift: "Unterstützung für totalitären Sozialismus"

 #Totalitarian Socialist Sub Ideologies

 jucheism: "Juche"
 jucheism_desc: "\n\n\n\n£GFX_Ideology_juche\n\n\n\n\n\n§YJuche§! ist die koreanische Form des Marxismus-Leninismus, die die nationale Eigenständigkeit in den Vordergrund stellt. In wirtschaftlicher Hinsicht argumentieren die Befürworter von Juche, dass zur Umsetzung des Prinzips der wirtschaftlichen Autarkie eine unabhängige nationale Wirtschaft aufgebaut werden muss, obwohl dies den Außenhandel nicht ausschließt. Darüber hinaus betrachtet Juche den Menschen im Allgemeinen als die treibende Kraft in der Geschichte. Zusammengefasst bedeutet dies, dass die Volksmassen im Zentrum von allem stehen und der Führer das Zentrum der Massen ist. Die Theorie macht den Großen Führer zu einem absolutistischen, obersten Führer. Die Arbeiterklasse soll nicht für sich selbst denken, sondern durch den Großen Führer. Der Große Führer ist das oberste Gehirn der Arbeiterklasse, was bedeutet, dass er der einzige legitime Vertreter der Arbeiterklasse ist."
 
 maoism: "Maoismus"
 maoism_desc: "\n\n\n\n£GFX_Ideology_maoist\n\n\n\n\n\nDer §YMaoismus§! ist eine fortgeschrittene Form des Marxismus-Leninismus, die der peruanische Theoretiker und Guerillakämpfer Gonzalo 1982 zusammenfasste. Sie baut auf den früheren Theorien des Marxismus-Leninismus und dem Gedankengut von Mao Tse-Tung auf und vertritt die Auffassung, dass Maos Schriften universell anwendbar sind. Ihre wichtigsten Grundsätze sind der langwierige Volkskrieg, der für einen Guerillakrieg gegen die kapitalistischen Staaten eintritt, die Kulturrevolution, um die Kultur vom Einfluss der Bourgeoisie zu befreien, und die Massenlinie, die besagt, dass eine Avantgardepartei eine Strategie für die revolutionäre Führung der Massen, die Konsolidierung der Diktatur des Proletariats und die Stärkung der Partei sowie für den Aufbau des Sozialismus entwerfen muss."
 
 jacobinism: "Jakobinismus"
 jacobinism_desc: "\n\n\n\n£GFX_Ideology_jacobin\n\n\n\n\n\nDer §YJakobinismus§! geht auf die ursprüngliche Französische Revolution von 1789 zurück. Jakobinische Regime legen großen Wert auf bürgerlichen Nationalismus, Patriotismus und den Kampf um die §YNationale Souveränität§! in einer zunehmend feindseligen Welt und wenden autoritäre Kontrollmethoden an, um die Revolution gegen ihre Feinde zu schützen. Um die Revolution zu schützen und eine neue Welt zu schaffen, setzen die jakobinischen Regime Massenüberwachungssysteme, Geheimpolizei und ein Netz von Informanten ein und versuchen, alle Lebensbereiche von der Wirtschaft bis zur Familiendynamik zu kontrollieren. Paradoxerweise bezieht der Jakobinismus seine Legitimität in erster Linie aus dem Populismus und greift zu populistischen Maßnahmen, um das Volk zu beschwichtigen. Er bevorzugt eine Umverteilung des Reichtums, umfassende soziale Sicherheitsnetze sowie eine konservativere Sozialpolitik, um die Unterstützung seiner hauptsächlich ländlichen Basis zu erhalten. Während viele Ähnlichkeiten mit dem ursprünglichen Jakobinismus der Französischen Revolution bestehen bleiben, stellt der neue Jakobinismus des 21. Jahrhunderts eine Synthese aus dem Alten und dem Neuen dar - die Einführung einer kommunistischen Gesellschaft, egal wie hoch der Preis dafür sein mag."

 totalism: "Avantgardistischer Sozialismus"
 totalism_desc: "\n\n\n\n£GFX_Ideology_totalist\n\n\n\n\n\nDer §Yavantgardistische Sozialismus§!, ist eine Form des Sozialismus, die die Totalität des Staates über alles andere stellt. Avantgardisten argumentieren, dass die Ressourcen des gesamten Landes zum Aufbau des §YSozialistischen Sicherheitsstaates§! eingesetzt werden müssen, und zwar in allen Bereichen der Gesellschaft, von der gesellschaftlichen Einstellung bis zur Planung der Wirtschaft. Avantgardistische Regierungen setzen in der Regel autoritäre High-Tech-Methoden zur Kontrolle und Überwachung ihrer Bürger ein, wie z. B. die flächendeckende Videoüberwachung und die Zensur des Internets."

 eurasianism_left: "Neoeurasianismus"
 eurasianism_left_desc: "\n\n\n\n£GFX_Ideology_neo_eurasianism\n\n\n\n\n\nDer §YNeoeurasianismus§! - Ihre aus dem postsowjetischen politischen Denken hervorgegangene Ideologie richtet sich gegen den globalen eurozentrischen Liberalismus, den sie als \"Atlantizismus\" bezeichnen, und dessen Versuche, die Hegemonie der Randgebiete über die Menschen im Kernland zu errichten. Sie lehnen die Uniformierung der Menschheit ab und konzentrieren sich stattdessen auf die Wertschätzung und den Schutz der kulturellen und ethnischen Vielfalt des Kontinents. Als überzeugte Antikapitalisten und Befürworter des Kollektivismus werden die Eurasianisten alle möglichen Methoden anwenden, um Eurasien zu vereinen und vor atlantischen Bedrohungen zu schützen."

 left_wing_junta: "Linke Militärjunta"
 left_wing_junta_desc: "\n\n\n\n£GFX_Ideology_left_wing_junta\n\n\n\n\n\nEine §YLinke Militärjunta§! ist ein ideologisches Konzept, das Elemente linker Politik mit der Struktur und Autorität einer Militärjunta verbindet. Mit dieser einzigartigen Kombination soll ein Regierungssystem geschaffen werden, das sozialistischen Grundsätzen, Gleichheit und sozialer Gerechtigkeit Vorrang einräumt und gleichzeitig einen disziplinierten und zentralisierten Entscheidungsfindungsprozess beibehält, der typischerweise mit Militärregimen in Verbindung gebracht wird.\n\n Das Hauptziel einer linken Militärjunta besteht darin, sozioökonomische Ungleichheiten zu beseitigen, Klassenspaltungen zu beseitigen und den Wohlstand der Arbeiterklasse zu fördern. Diese Ziele sollen durch eine zentralisierte Behörde erreicht werden, die politische Maßnahmen und Reformen effizient umsetzen kann, ohne durch bürokratische Prozesse oder politische Opposition behindert zu werden. Das Militär als Rückgrat dieser Junta spielt eine entscheidende Rolle bei der Sicherung der Stabilität, dem Schutz der Revolution und der Wahrung der Interessen des Volkes. eine Militärdiktatur, die mit kommunistischer Ästhetik larpt"

 social_fascism: "Nationalkommunismus"
 social_fascism_desc: "\n\n\n\n£GFX_Ideology_social_fascism\n\n\n\n\n\nDer §YNationalkommunismus§! ist ein ideologischer Rahmen, der versucht, die Grundsätze des Kommunismus mit einem starken Gefühl der nationalen Identität und des Patriotismus zu verbinden. Er betont die Bedeutung sowohl der wirtschaftlichen Gleichheit als auch der nationalen Souveränität und zielt darauf ab, eine Gesellschaft zu schaffen, in der die Arbeiterklasse die Macht innehat, während gleichzeitig das kulturelle Erbe und die Interessen der Nation bewahrt werden.\nIm Kern tritt der Nationalkommunismus für die Abschaffung des Privateigentums an den Produktionsmitteln ein und befürwortet ein kollektives Eigentumssystem, in dem die Arbeiter die Kontrolle über ihre Arbeit haben und von ihr profitieren. Er strebt die Abschaffung der Klassenunterschiede und die Schaffung einer Gesellschaft an, in der Reichtum und Ressourcen gleichmäßig unter allen Mitgliedern verteilt werden. Diese Ideologie legt großen Wert auf soziale Gerechtigkeit und zielt auf die Beseitigung von Armut, Ausbeutung und sozialen Ungleichheiten ab."
 neo_stalinism: "Neostalinismus"
 neo_stalinism_desc: "\n\n\n\n£GFX_ideology_neo_stalinism_bannner\n\n\n\n\n\nDer §YNeostalinismus§! ist ein ideologischer Rahmen, der sich an den Ideen und der Politik von Joseph Stalin, dem ehemaligen Führer der Sowjetunion, orientiert. Er stellt eine Wiederbelebung oder Neuinterpretation der stalinistischen Prinzipien im zeitgenössischen Kontext dar. \nIm Kern vertritt der Neostalinismus den Glauben an einen starken zentralisierten Staat und den Einsatz autoritärer Maßnahmen zur Erreichung gesellschaftlicher Ziele. Er legt großen Wert auf staatliche Kontrolle und Planung und befürwortet die Verstaatlichung von Schlüsselindustrien und die Einführung einer Kommandowirtschaft. Neostalinisten argumentieren, dass ein starker Staat notwendig ist, um soziale Stabilität, wirtschaftliche Entwicklung und den Fortschritt des Sozialismus zu gewährleisten."
 digital_totalitarianism: "Digitaler Totalitarismus"
 digital_totalitarianism_desc: "\n\n\n\n£GFX_Ideology_digital_totalitarianism\n\n\n\n\n\nIn seinem allegorischen politischen Schreckensroman 1984 fiktionalisierte George Orwell ein "Ozeanien", in dem alles, was die Bürger sagen und tun, und jeder Aspekt ihres Lebens von einem "Telescreen" kontrolliert wird, und in dem die Regierung jede mögliche Unzufriedenheit auslöscht. Heute sieht es so aus, als ob eine solche Fabel kurz davor steht, Wirklichkeit zu werden. Regierungen und große Technologieunternehmen haben ein breites Interessenbündnis geschlossen, während die einfachen Menschen, sogar Intellektuelle, die ihren Regierungen gegenüber misstrauisch sind, ihre Wachsamkeit ablegen und die Bequemlichkeit genießen. Das Ergebnis wird ein noch nie dagewesener §YDigitaler Totalitarismus§! sein, der es unmöglich machen wird, Widerstand zu organisieren, und wenn sich das Internet weiter ausbreitet, wird es für die Menschen zu spät sein, um zu erkennen, dass ihre persönlichen Daten vollständig offengelegt wurden. 
 transhumanism: "Transhumanismus"
 transhumanism_desc: "\n\n\n\n£GFX_Ideology_transhumanism\n\n\n\n\n\n§YDer Transhumanismus§!.\nEs wird seit langem darüber diskutiert, woher der erste Funke des transhumanistischen Gedankens kam, von den Futuristen des zwanzigsten Jahrhunderts, die wie Maschinen sein wollten, bis hin zu den heutigen digitalen Philosophen am Rande der Gesellschaft, die die Verschmelzung von Mensch und Maschine als logisches Endergebnis der Evolution betrachten. \n\nDer Transhumanismus plädiert für die Veränderung und Verbesserung des menschlichen Geistes, Körpers und der Seele durch technologische Mittel. Beeinflusst durch bahnbrechende Werke der Science-Fiction hat die transhumanistische Vision einer transformierten zukünftigen Menschheit die Unterstützung und den Widerstand von Philosophen und religiösen Gläubigen gleichermaßen gewonnen. \n\nMit ihrem jüngsten Aufstieg und ihrem Engagement für den wissenschaftlichen Fortschritt, koste es, was es wolle, stellt sich die Frage, ob die Menschheit das Tempo dieses Ideals halten kann. \n\nIhre Kritiker befürchten ein mögliches Wiederaufleben diskriminierender Haltungen um des Fortschritts willen und dass die menschliche Rasse ihre Menschlichkeit verlieren könnte."

 chekist_communism: "Tschekistischer Kommunismus"
 chekist_communism_desc: ""

 #Authoritarian Socialist
 communist: "Autoritär-sozialistisch"
 communist_noun: "Autoritärer Sozialismus"
 communist_desc: "Autoritär-sozialistisches Regime"
 communist_drift: "Unterstützung für autoritären Sozialismus"
 market_socialism: "Marktsozialismus"
 market_socialism_desc: "Der §YMarktsozialismus§!, oft auch Dengismus genannt, umfasst ein breites Spektrum sozialistischen Denkens, das Märkte in eine sozialistische Wirtschaft einbezieht. Es wird argumentiert, dass das Land in der gegenwärtigen Phase der gesellschaftlichen und wirtschaftlichen Entwicklung nicht bereit ist, einen vollständigen Plansozialismus einzuführen, und dass es bestimmte kapitalistische Reformen durchführen muss, um die Produktivkräfte eines Landes zu entwickeln. Marktsozialistische Länder nehmen in der Regel an der Weltwirtschaft teil, haben Privateigentum und private Unternehmen, doch die Regierung lenkt und kontrolliert die Unternehmen indirekt."
 #Authsoc Subideologies

 market_socialism: "Marktsozialismus"
 market_socialism_desc: "\n\n\n\n£GFX_Ideology_Dengism\n\n\n\n\n\nDer §YMarktsozialismus§!, oft auch Dengismus genannt, umfasst ein breites Spektrum sozialistischen Denkens, das Märkte in eine sozialistische Wirtschaft einbezieht. Es wird argumentiert, dass das Land in der gegenwärtigen Phase der gesellschaftlichen und wirtschaftlichen Entwicklung nicht bereit ist, einen vollständigen Plansozialismus einzuführen, und dass es bestimmte kapitalistische Reformen durchführen muss, um die Produktivkräfte eines Landes zu entwickeln. Marktsozialistische Länder nehmen in der Regel an der Weltwirtschaft teil, haben Privateigentum und private Unternehmen, doch die Regierung lenkt und kontrolliert die Unternehmen indirekt."
 marxism_leninism: "Marxismus-Leninismus"
 marxism_leninism_desc: "\n\n\n\n£GFX_Ideology_ML\n\n\n\n\n\nDer §YMarxismus-Leninismus§! ist die Ideologie hinter den meisten kommunistischen Bewegungen des 20. Jahrhunderts und war die offizielle Staatsideologie der Sowjetunion. Sie entstand in den 1920er Jahren, als Stalin die Werke von Marx und Lenin zusammenfasste. Die Marxisten-Leninisten treten für den Sturz des Kapitalismus und dessen Ersetzung durch eine Übergangsdiktatur des Proletariats ein, die theoretisch abklingen wird, wenn die Gesellschaft weit genug entwickelt ist, um den Kommunismus zu verwirklichen."
 neo_socialism: "Neosozialismus"
 neo_socialism_desc: "\n\n\n\n£GFX_ideology_neo_socialismsub\n\n\n\n\n\nDer §YNeosozialismus§! ist eine moderne Form des Sozialismus, die vom klassischen Marxismus abweicht, indem sie argumentiert, dass die Klasse nicht der primäre oder einzige Hauptwiderspruch innerhalb der Gesellschaft ist. Neosozialisten glauben, dass Rasse, Sexualität oder Geschlecht ebenfalls Hauptwidersprüche sind und ebenfalls gelöst werden müssen, bevor der Kommunismus erfolgreich umgesetzt werden kann."
 left_nationalism: "Linksnationalismus"
 left_nationalism_desc: "\n\n\n\n£GFX_Ideology_left_nationalist\n\n\n\n\n\nDer §YLinksnationalismus§! ist ein weit gefasster Begriff für Bewegungen, die Elemente des linken Denkens, wie Umverteilung von Reichtum, Verstaatlichung von Großindustrien und Klassenkampf, mit Elementen des Nationalismus verbinden. In der Regel werden sie in Entwicklungsländern eingesetzt, um die Menschen auf der Grundlage ihrer Nationalität gegen die vermeintliche koloniale Aggression zu vereinen und gleichzeitig linke Reformen im eigenen Land durchzuführen."
 trotskyism: "Trotzkismus"
 trotskyism_desc: "\n\n\n\n£GFX_Ideology_trotskyismsub\n\n\n\n\n\nDer §YTrotzkismus§! ist ein ideologischer Rahmen, der aus den Ideen und Überzeugungen des russischen Revolutionärs Leo Trotzki hervorgegangen ist. Er ist in den Grundsätzen des Marxismus verwurzelt und versucht, die Ziele des internationalen Sozialismus und der permanenten Revolution voranzutreiben. \n\nIm Kern betont der Trotzkismus die Notwendigkeit einer globalen Revolution der Arbeiterklasse, um die kapitalistischen Systeme zu stürzen und eine weltweite sozialistische Gesellschaft zu errichten. Er lehnt das Konzept des Sozialismus in einem Land ab und vertritt die Auffassung, dass wahre Befreiung nur durch die kollektiven Anstrengungen des Proletariats über nationale Grenzen hinweg erreicht werden kann."
 left_baathism: "Linker Baathismus"
 left_baathism_desc: "\n\n\n\n£GFX_ideology_left_baathism_banner\n\n\n\n\n\nDer §YLinke Baathismus§! ist eine Ideologie, die Elemente des Sozialismus und des arabischen Nationalismus miteinander verbindet, wobei der Schwerpunkt auf sozialer Gerechtigkeit, Gleichheit und Einheit unter den arabischen Nationen liegt. Sie entstand als politische Ideologie in der Mitte des 20. Jahrhunderts, insbesondere in Ländern wie Syrien und Irak.\nIm Kern zielt der linke Baathismus darauf ab, sozioökonomische Ungleichheiten innerhalb der Gesellschaft zu beseitigen, und setzt sich für die Umverteilung von Reichtum und Ressourcen ein, um eine gerechtere Gesellschaft zu schaffen. Er betont die Bedeutung von Sozialfürsorgeprogrammen, öffentlichem Eigentum an Schlüsselindustrien und der Bereitstellung grundlegender Dienstleistungen für alle Bürger."
 putinism_neosoviet: "Neosowjetischer Putinismus"
 putinism_neosoviet_desc: ""
 red_derzhavism: "Volksderschawismus"
 red_derzhavism_desc: "\n\n\n\n£GFX_ideology_derzhavism_banner\n\n\n\n\n\n"Eine wahre Nation muss sich um ihre Arbeiterklasse kümmern, da diese die Hauptquelle ihrer Stärke und Macht ist. Ohne wirtschaftliche Gerechtigkeit kann keine Großmacht lange aufrechterhalten werden, und kein Führer kann wirklich die Position der Führung des Volkes sichern." \n-Auszug aus der Rede während der KDD-Sitzung\n\nDer §YVolksderschawismus§! ist eine revisionistische linksnationalistische Bewegung, die sich vom Mainstream-Derschawismus unterscheidet. Im Gegensatz zu den meisten Derzhavisten glauben sie, dass es sinnvoll ist, aus der sowjetischen Ära Russlands zu lernen, und integrieren gleichzeitig strengere sozialistische Ideologien aus aller Welt. Sie lehnen jedoch die Grundprinzipien des Derzhavinismus, wie den russischen Nationalismus und die personalistische Diktatur, nicht ab. Diese unheilige Mischung von Ideen hat einige Anhänger, von denen viele alte nationalistische Sozialisten oder Kommunisten sind, die trotz allem immer noch die neue Regierung unterstützen. Dies ist jedoch die schwächste Strömung innerhalb der Derschawisten."

 #Libertarian Socialism

 libertarian_socialist: "Libertär-sozialistisch"
 libertarian_socialist_noun: "Libertärer Sozialismus"
 libertarian_socialist_desc: "Libertär-sozialistische Regierung"
 libertarian_socialist_drift: "Unterstützung für libertären Sozialismus"
 
 #Libsoc Subideologies
 
 left_anarchist: "Anarchokommunismus"
 left_anarchist_desc: "\n\n\n\n£GFX_Ideology_Ancom\n\n\n\n\n\nDer §YAnarchokommunismus§! ist eine linksanarchistische Ideologie, die für die Abschaffung des Staates, des Kapitalismus, der Lohnarbeit, der sozialen Hierarchien und des Privateigentums eintritt und gleichzeitig direkte Demokratie und horizontal organisierte Volkswirtschaften unterstützt. Historisch gesehen haben Bewegungen wie die CNT-FAI im Spanien der Bürgerkriegszeit, die Schwarze Armee in der Ukraine während des Russischen Bürgerkriegs und die Koreanische Anarchistische Föderation in der Mandschurei während des Zweiten Weltkriegs den Anarchokommunismus auf die eine oder andere Weise genutzt."
 post_leftism: "Neomarxismus"
 post_leftism_desc: "\n\n\n\n£GFX_ideology_neomarxist_banner\n\n\n\n\n\nDer §YNeomarxismus§! ist eine ideologische Bewegung, die im 20. Jahrhundert als revisionistische Interpretation der traditionellen marxistischen Theorie entstanden ist. Der Neomarxismus versucht, die Grenzen und Mängel des klassischen Marxismus zu überwinden, während er weiterhin für eine radikale Umgestaltung der Gesellschaft auf der Grundlage sozialistischer Prinzipien eintritt. \nIm Kern betont der Neomarxismus die Bedeutung der sozialen Klasse und wirtschaftlicher Faktoren bei der Gestaltung der gesellschaftlichen Dynamik. Er erweitert jedoch den klassischen Marxismus, indem er andere Formen der Unterdrückung, wie Rasse, Geschlecht und Sexualität, in seine Analyse einbezieht. Neomarxisten argumentieren, dass diese sich überschneidenden Systeme der Unterdrückung zur Aufrechterhaltung von Ungleichheit und Ausbeutung in kapitalistischen Gesellschaften beitragen."
 eurocommunism: "Eurokommunismus"
 eurocommunism_desc: "\n\n\n\n£GFX_ideology_eurocommunism_banner\n\n\n\n\n\nDer §ҮEurokommunismus§!, auch bekannt als §ҮDemokratischer Kommunismus§! oder §ҮNeokommunismus§! - ist ein politisch-ideologisches Projekt des Marxismus, das zwischen dem Leninismus und dem demokratischen Sozialismus liegt, d.h. ein Kommunismus, der von einigen kommunistischen Organisationen in Westeuropa in einem reformistischen und demokratischen Sinne entwickelt wurde. Er zeichnet sich durch eine größere Nähe zu einer aus dem Kapitalismus hervorgegangenen gesellschaftlichen Mittelschicht und durch die Übernahme eines parlamentarischen Mehrparteienmodells aus. Die Eurokommunisten wollen einen sogenannten 'dritten Weg' zwischen dem Marxismus-Leninismus und der sozialdemokratischen Tradition verkörpern."
 reformist_socialism: "Demokratischer Sozialismus"
 reformist_socialism_desc: "\n\n\n\n£GFX_Ideology_reformist_socialism\n\n\n\n\n\nDer §YDemokratische Sozialismus§!, oder Reformistische Sozialismus, ist eine Ideologie, die für die Schaffung des Sozialismus innerhalb des liberalen parlamentarischen Systems eintritt. Durch die Beteiligung an Wahlen, Arbeitergenossenschaften und Arbeiterselbstverwaltung versuchen demokratische Sozialisten, die kapitalistische Wirtschaft in eine dezentralisierte, von den Arbeitern geführte Marktwirtschaft umzuwandeln. Demokratische Sozialisten haben zwar den Sozialismus als langfristiges Ziel, sind aber eher darum bemüht, die Exzesse des Kapitalismus einzudämmen, und unterstützen fortschrittliche Reformen, um ihn in der Gegenwart zu humanisieren. Reformsozialisten argumentieren, dass der Kapitalismus von Natur aus unvereinbar mit den Werten Freiheit, Gleichheit und Solidarität ist und dass diese Ideale nur durch die Verwirklichung einer sozialistischen Gesellschaft erreicht werden können."
 left_accelerationist: "Linker Akzelerationismus"
 left_accelerationist_desc: "\n\n\n\n£GFX_Ideology_left_accelerationist\n\n\n\n\n\nDer §YLinke Akzelerationismus§! ist eine Ideologie, die aus den Widersprüchen des Spätkapitalismus entstanden ist. Während andere versuchen, den Kapitalismus vollständig zu zerstören oder zu einer imaginären Vergangenheit zurückzukehren, glauben die linken Akzelerationisten, dass der einzige Weg nach vorn in der Beschleunigung der technologischen Entwicklung, der Automatisierung und des wirtschaftlichen Fortschritts besteht, um den Kapitalismus selbst zu überwinden. \n\nIndem sie ständigen Wandel und die Ablehnung von Stagnation propagieren, sehen sie den Kapitalismus als eine Kraft der Entropie und unter den radikaleren Anhängern möglicherweise sogar als ein bösartiges Gebilde, das das organische Leben im Todesgriff hält.\n\nIn dieser Denkschule wird Mark Fishers Kritik am kapitalistischen Realismus genutzt, um die Vorstellung zurückzuweisen, dass der Kapitalismus nicht verändert werden kann. Er betrachtet das System als eine verfallende Struktur, die über ihre Grenzen hinaus getrieben werden kann, um neue Formen der sozialen Ermächtigung, der politischen Macht und der technologischen Entwicklung zu ermöglichen. Der Griff des Kapitalismus kann durch Post-Knappheitsökonomie, Automatisierung und künstliche Intelligenz überwunden werden."
 sovereign_democracy_left: "Souverändemokratie"
 sovereign_democracy_left_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\nDie §YSouverändemokratie§! ist eine politische Nischenideologie, deren Ziel es ist, eine "perfekte" Demokratie zu schaffen, die das westliche demokratische Parteiengezänk ignoriert. Die Parteien haben nicht nur ähnliche Ansichten, sondern arbeiten auch zusammen und setzen sich für das Wohlergehen des Staates als Ganzes ein. Die Zivilgesellschaft dient als Kontrollinstanz für die Parteien, indem sie ihren Einfluss geltend macht, um beispielsweise korrupte und unpatriotische Beamte abzusetzen.\n\nDie Linke Partei tritt für eine stärkere Abschottung des Marktes ein, ähnlich wie in der Sowjetära. Sie wendet sich an ein linkes Milieu, das sich die Rückkehr des "Kommunismus" wünscht, allerdings ohne dessen Nachteile."
 sovereign_democracy_lukashenko: "Volkskommunismus"
 sovereign_democracy_lukashenko_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\nDie §YSouverändemokratie§! ist eine politische Nischenideologie, deren Ziel es ist, eine "perfekte" Demokratie zu schaffen, die die Streitigkeiten westlicher demokratischer Parteien ignoriert. Die Parteien haben nicht nur ähnliche Ansichten, sondern arbeiten auch zusammen und setzen sich für das Wohl des Staates als Ganzes ein. Die Zivilgesellschaft dient als Kontrollinstanz für die Parteien und nutzt ihren Einfluss beispielsweise, um korrupte und unpatriotische Beamte zu entfernen. \nDie Linke Partei befürwortet einen geschlosseneren Markt, ähnlich wie in der Sowjetzeit. Sie richtet sich an ein linkes Publikum, das die Rückkehr des "Kommunismus" ohne dessen Nachteile wünscht. \n\nLukaschenkos §YVolkskommunismus§! basiert auf der Wiederbelebung des alten sowjetischen Systems mit einem neuen Anstrich, wobei die Grundlagen der einzigartigen Demokratie beibehalten und modernere Beispiele sozialistischer Praktiken übernommen werden. Allerdings stützt er sich auf das innere System der Partei, um das System stabil zu halten."
 sovereign_democracy_prilepin: "Sozialnationalismus"
 sovereign_democracy_prilepin_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\nDie §YSouverändemokratie§! ist eine politische Nischenideologie, deren Ziel es ist, eine "perfekte" Demokratie zu schaffen, die die Streitigkeiten westlicher demokratischer Parteien ignoriert. Die Parteien haben nicht nur ähnliche Ansichten, sondern arbeiten auch zusammen und setzen sich für das Wohl des Staates als Ganzes ein. Die Zivilgesellschaft dient als Kontrollinstanz für die Parteien und nutzt ihren Einfluss beispielsweise, um korrupte und unpatriotische Beamte zu entfernen. \nDie Linke Partei befürwortet einen geschlosseneren Markt, ähnlich wie in der Sowjetzeit. Sie richtet sich an ein linkes Publikum, das die Rückkehr des "Kommunismus" ohne dessen Nachteile wünscht.\n\nPrilepins Plattform des §YSozialnationalismus§! stützt sich stark auf den Patriotismus und die militärischen Qualitäten der russischen Bevölkerung sowie auf die Suche nach einer synkretistischen Politik, die der russischen Geschichte und Politik ähnelt."
 sovereign_democracy_platoshkin: "Neuer Sozialismus"
 sovereign_democracy_platoshkin_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\nDie §YSouverändemokratie§! ist eine politische Nischenideologie, deren Ziel es ist, eine "perfekte" Demokratie zu schaffen, die die Streitigkeiten westlicher demokratischer Parteien ignoriert. Die Parteien haben nicht nur ähnliche Ansichten, sondern arbeiten auch zusammen und setzen sich für das Wohl des Staates als Ganzes ein. Die Zivilgesellschaft dient als Kontrollinstanz für die Parteien und nutzt ihren Einfluss beispielsweise, um korrupte und unpatriotische Beamte zu entfernen. \nDie Linke Partei befürwortet einen geschlosseneren Markt, ähnlich wie in der Sowjetzeit. Sie richtet sich an ein linkes Publikum, das die Rückkehr des "Kommunismus" ohne dessen Nachteile wünscht.\n\nPlatoshkin stützt seine Herrschaft auf seine eigene Theorie des §YNeuen Sozialismus§! – eine modernisierte Version des Sozialismus des 21. Jahrhunderts –, während er gleichzeitig die russisch-zentrierte Politik innerhalb seines Systems und seiner Partei beibehält."
 confucian_socialism: "Konfuzianischer Sozialismus"
 confucian_socialism_desc: "\n\n\n\n£GFX_Ideology_confucian_socialism\n\n\n\n\n\n§YIn den chaotischen Zeiten der Frühlings- und Herbstperiode§! befand sich die Zhou-Dynastie im Niedergang, und die Rituale, die die Gesellschaft einst zusammenhielten, gerieten aus den Fugen. Inmitten dieser nationalen Krise erhob Konfuzius von Lu seine Stimme und rief zum Handeln auf. Vierzehn Jahre lang reiste er durch verschiedene Staaten und gelobte, die Zhou-Riten wiederherzustellen, Wohlwollen zu fördern und Rechtschaffenheit zu predigen. Bald verbreitete sich der Name des Konfuzius im ganzen Land. Die Prinzipien des Konfuzianismus, die darauf abzielten, Leiden zu lindern und Erlösung zu bringen, begannen zu florieren und wurden schließlich zu einer vorherrschenden Denkschule. Als die Zeit verging und viele Helden und bemerkenswerte Persönlichkeiten in der Geschichte verschwanden, geriet China in Aufruhr, und die Republik wurde in schwere Bedrängnis gestürzt. Dennoch gab es immer noch rechtschaffene Menschen, die die rote Fünf-Sterne-Fahne als Symbol der Legitimität hochhielten und ihr Leben der Forderung nach Gerechtigkeit, moralischen Grundsätzen und der Wiederbelebung des Sozialismus auf chinesischem Boden verschrieben. Ihre Worte, Taten und Ambitionen spiegelten die des alten Weisen Konfuzius wider und beschworen die beständige Kraft hoher Berge und fließender Flüsse.\n\nOb durch die konfuzianische Ethik oder die kommunistische Ideologie, beide haben sich tief in den Herzen und Köpfen des chinesischen Volkes verwurzelt. Dies ist in der Tat ein günstiger Zeitpunkt, um die große Tradition der chinesischen Orthodoxie inmitten dieser chaotischen Zeiten weiterzuführen. Die Volksfront und der Klassenkampf, für die Mao und Deng eintraten, in Verbindung mit der wohlwollenden Staatsführung und den moralischen Lehren von Konfuzius und Mencius - Selbstkultivierung, Familienregulierung, Staatsführung und Weltfrieden - werden das chinesische Volk mit Sicherheit mit einem gemeinsamen Willen vereinen, wieder eine geschlossene Einheit bilden und alle Hindernisse aus dem Weg räumen." 
 eco_socialism: "Ökosozialismus"
 eco_socialism_desc: "\n\n\n\n£GFX_Ideology_eco_socialism\n\n\n\n\n\n Der §YÖkosozialismus§!, auch bekannt als Grüner Sozialismus, ist eine synkretistische Ideologie des Sozialismus und des Umweltschutzes, die davon ausgeht, dass die sich ständig ausbreitende Natur des Kapitalismus die Ursache für Umweltzerstörung wie Klimawandel, globale Erwärmung, Erschöpfung der Ressourcen und den Verlust der globalen biologischen Vielfalt ist. Sie lehnen auch die Globalisierung und den Imperialismus ab, da sie mit den ökologischen Erfordernissen der menschlichen Zivilisation unvereinbar sind, um sich selbst zu erhalten. Ökosozialisten treten für die Abschaffung des Kapitalismus und der Globalisierung ein und schlagen eine Gesellschaft vor, die auf Egalitarismus, sozialem Fortschritt und Gemeineigentum an den Produktionsmitteln beruht. Ökosozialisten sind auch gegen Bürokratie, insbesondere gegen Formen des Sozialismus, die sie als bürokratischen Kollektivismus betrachten, und bezeichnen sich selbst gewöhnlich als orthodoxe Marxisten."


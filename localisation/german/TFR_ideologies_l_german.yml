 pax_americana_ultraglobalism: "Pax Americana"
 pax_americana_ultraglobalism_desc: "\n\n\n\n£GFX_USB_ultraglobalism_banner\n\n\n\n\n\nDer Mensch hat sich als unbeständiges Wesen erwiesen, das die sorgfältig geschaffenen Institutionen und Säulen, die ihn unter Kontrolle halten sollten, auseinanderreißt. \n\nMit dem Ausbruch des Zweiten Amerikanischen Bürgerkriegs hat die Menschheit einen gewissen Funken offenbart: eine Flamme der Veränderung, die immer brennen wird und dafür sorgt, dass die Welt durch die Hände vieler eine drastische Transformation durchläuft, indem sie Strukturen niederbrennt, die ihren Zweck überlebt haben und dem Verfall anheim gefallen sind. \n\n§YPax Americana§! argumentiert, dass der Fehler eher im Menschen selbst liegt als in den Systemen, die geschaffen wurden, um ihn zu kontrollieren. Entstanden aus der kooperativen Verschmelzung der neoliberalen und neokonservativen, auf Regeln basierenden Weltordnung, versucht es, sich dauerhaft wieder in den Zeitgeist einzufügen. \n\nFür die Außenwelt scheint es eine Nation zu sein, die unter dem Banner der Demokratie ihre Vernunft wiedererlangt. Hinter den Kulissen jedoch schütteln Männer in Anzügen sich die Hände und entscheiden über das Schicksal von Millionen, um sicherzustellen, dass die Menschheit nicht in den Abgrund des Chaos stürzt. Sie manipulieren den menschlichen Geist und arbeiten eng mit Unternehmen, Bundesbehörden und längst vergessenen Familien zusammen, um dieselbe Ordnung zu bewahren, die einst nicht nur einen, sondern drei Giganten der Geschichte besiegt hat. Rationalität, um antisoziales Denken zu verdrängen, Opfer, um sicherzustellen, dass die Bevölkerung sich daran erinnert, wer für ihre Sicherheit sorgt, und Strukturen, um sicherzustellen, dass jeder Bauer seinen Platz auf dem Brett hat. \n\nDas Chaos der modernen Welt ist ein weiteres Ungeheuer, eine innere Flamme, die darauf aus ist, alles zu verbrennen, was zur Erhaltung des Friedens getan wurde. \n\nDie Ordnung ist zurückgekehrt, und sie wird die Flamme der Menschlichkeit auslöschen." 

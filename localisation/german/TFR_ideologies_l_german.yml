 #Social Democratic Sub Ideologies
 left_centrist: "Linkszentrismus"
 left_centrist_desc: "\n\n\n\n£GFX_Ideology_left_centrism\n\n\n\n\n\nDer §YLinkszentrismus§!, auch bekannt als Mitte-Links-Politik, ist eine breite Palette von Ideologien, die Sozialdemokratie, Progressivismus, Sozialliberalismus und Umweltschutz umfassen und darauf abzielen, diese Ideale durch Synkretismus zu vereinen. Im Großen und Ganzen lehnt sich der Linkszentrismus näher an die politische Mitte an, im Gegensatz zu linksradikalen Überzeugungen wie dem Kommunismus und dem revolutionären Sozialismus. Der Linkszentrismus steht im Einklang mit progressiven sozialen Überzeugungen und unterstützt eine gemischte Wirtschaft mit Maßnahmen wie starkem Wirtschaftsinterventionismus, Wohlfahrtskapitalismus und Gewerkschaftsfreundlichkeit. Sie unterstützen eine Einwanderungspolitik mit offenen Grenzen und Multikulturalismus, wie zum Beispiel in Deutschland. Mitte-Links-Parteien glauben auch an die Arbeit innerhalb der etablierten Systeme, um die soziale Gerechtigkeit zu verbessern, wobei die linkszentristischen Parteien eine gemischte Sozialpolitik unterstützen, obwohl die meisten dem Neoliberalismus entsprechen."
 left_populism: "Linkspopulismus"
 left_populism_desc: "\n\n\n\n£GFX_Ideology_left_populism\n\n\n\n\n\nDer §YLinkspopulismus§! kombiniert Elemente populistischer Rhetorik und Themen mit linker Ideologie. Im Allgemeinen ist der Linkspopulismus elitenfeindlich, globalisierungsskeptisch und etablierungsfeindlich. Der Linkspopulismus ist extrem antimilitaristisch und entstand hauptsächlich aus der Opposition gegen die amerikanischen Militärinterventionen in den späten 90er und frühen 2000er Jahren. Linkspopulisten versuchen, das Wohlstandsgefälle durch Umverteilung des Reichtums, Sozialprogramme und eine große Regierung zu beseitigen."
 progressivism: "Progressivismus"
 progressivism_desc: "\n\n\n\n£GFX_Ideology_progressivism\n\n\n\n\n\nDer §YProgressivismus§! ist eine sozialliberale, auf Identitätspolitik basierende Ideologie, die versucht, soziale Gerechtigkeit durch staatliche Interventionen und staatliche Programme herzustellen. Sie werden weitgehend mit der Bewegung für soziale Gerechtigkeit und der feministischen Bewegung in Verbindung gebracht, sind in der Regel für Abtreibung und sehen Fortschritte in Wissenschaft, Technologie und Wirtschaft als vorteilhaft für die menschliche Gesellschaft an. Progressive befürworten in der Regel weitere Zuschüsse für Bildung, Kunst und gesetzliche Gesundheit." 
 social_democracy: "Sozialdemokratie"
 social_democracy_desc: "\n\n\n\n£GFX_Ideology_social_democracy\n\n\n\n\n\nDie §YSozialdemokratie§! wird als linke politische, soziale und wirtschaftliche Philosophie innerhalb des Sozialismus beschrieben, die wirtschaftliche und soziale Interventionen zur Förderung der sozialen Gerechtigkeit in einer kapitalistisch orientierten Mischwirtschaft befürwortet. Sie kann als Oberbegriff für Demokratien dienen, die sowohl eine sozialistische als auch eine kapitalistische Politik verfolgen, wobei es manchmal zu Überschneidungen mit sozial progressiven Ansichten kommt."
 green_politics: "Grüne Politik"
 green_politics_desc: "\n\n\n\n£GFX_Ideology_green_politics\n\n\n\n\n\n§YGrüne Politik§!, oder Enviromentalismus, ist eine Ideologie, die sich auf die Bekämpfung des vom Menschen verursachten Klimawandels im 21. Jhd fokussiert. Sie streben eine sich selbst erhaltende Gesellschaft an, die auf den Idealen des Umweltschutzes, der Gewaltlosigkeit, der Basisdemokratie und der sozialen Gerechtigkeit beruht."
 technocracy: "Technokratie"
 technocracy_desc: "\n\n\n\n£GFX_Ideology_technocracy\n\n\n\n\n\nEine §YTechnokratie§! ist ein politisches und wirtschaftliches System, das durch die Führung der Gesellschaft durch Experten, Wissenschaftler, Ingenieure und andere technische Fachleute gekennzeichnet ist. In einem technokratischen System wird die Entscheidungsbefugnis an Einzelpersonen auf der Grundlage ihres technischen Fachwissens und ihrer meritokratischen Leistung und nicht an Repräsentanten vergeben, wobei technokratische Regierungsformen in der Regel als oligarchisch bezeichnet werden. Wirtschaftliche Planung, Ressourcenzuteilung und Optimierung von Produktionsprozessen sind integraler Bestandteil einer technokratischen Wirtschaft, und auch eine starke zentralisierte Bürokratie ist für technokratische Staaten charakteristisch. Die meisten technokratischen Gruppen sind pragmatisch, obwohl eine große Anzahl von Organisationen, die eine technokratische Haltung einnehmen, links orientiert oder progressiv sind."
 sovereign_democracy_left_socdem: "Souverändemokratie"
 sovereign_democracy_left_socdem_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\nDie §YSouverändemokratie§! ist eine politische Nischenideologie, deren Ziel es ist, eine "perfekte" Demokratie zu schaffen, die die Streitigkeiten westlicher demokratischer Parteien ignoriert. Die Parteien haben nicht nur ähnliche Ansichten, sondern arbeiten auch zusammen und setzen sich für das Wohl des Staates als Ganzes ein. Die Zivilgesellschaft dient als Kontrollinstanz für die Parteien und nutzt ihren Einfluss beispielsweise, um korrupte und unpatriotische Beamte zu entfernen. \nDie Linke Partei befürwortet einen geschlosseneren Markt, ähnlich wie in der Sowjetzeit. Sie richtet sich an ein linkes Publikum, das die Rückkehr des "Kommunismus" ohne dessen Nachteile wünscht."
 sovereign_democracy_delyagin: "Moderater Sozialismus"
 sovereign_democracy_delyagin_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\nDie §YSouverändemokratie§! ist eine politische Nischenideologie, deren Ziel es ist, eine "perfekte" Demokratie zu schaffen, die die Streitigkeiten westlicher demokratischer Parteien ignoriert. Die Parteien haben nicht nur ähnliche Ansichten, sondern arbeiten auch zusammen und setzen sich für das Wohl des Staates als Ganzes ein. Die Zivilgesellschaft dient als Kontrollinstanz für die Parteien und nutzt ihren Einfluss beispielsweise, um korrupte und unpatriotische Beamte zu entfernen. \nDie Linke Partei befürwortet einen geschlosseneren Markt, ähnlich wie in der Sowjetzeit. Sie richtet sich an ein linkes Publikum, das die Rückkehr des "Kommunismus" ohne dessen Nachteile wünscht.\n\nDie Regierung Deljagin konzentriert sich darauf, das Leben der durchschnittlichen Russen moderat zu verbessern, demokratische Reformen zu sichern und die Präsenz unterschiedlicher Meinungen innerhalb der Regierung aufrechtzuerhalten."
 sovereign_democracy_konovalov: "Sozialistischer Reformismus"
 sovereign_democracy_konovalov_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\nDie §YSouverändemokratie§! ist eine politische Nischenideologie, deren Ziel es ist, eine "perfekte" Demokratie zu schaffen, die die Streitigkeiten westlicher demokratischer Parteien ignoriert. Die Parteien haben nicht nur ähnliche Ansichten, sondern arbeiten auch zusammen und setzen sich für das Wohl des Staates als Ganzes ein. Die Zivilgesellschaft dient als Kontrollinstanz für die Parteien und nutzt ihren Einfluss beispielsweise, um korrupte und unpatriotische Beamte zu entfernen. \nDie Linke Partei befürwortet einen geschlosseneren Markt, ähnlich wie in der Sowjetzeit. Sie richtet sich an ein linkes Publikum, das die Rückkehr des "Kommunismus" ohne dessen Nachteile wünscht.\n\nKonowalows Reformismus strebt die Schaffung eines neuen sozialistischen Systems durch die Reformierung bestehender Strukturen an, wobei gleichzeitig das demokratische System beibehalten und ein gesunder Dialog mit der Opposition geführt werden soll."
 sovereign_democracy_grudinin: "Linker Agrarismus"
 sovereign_democracy_grudinin_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\nDie §YSouverändemokratie§! ist eine politische Nischenideologie, deren Ziel es ist, eine "perfekte" Demokratie zu schaffen, die die Streitigkeiten westlicher demokratischer Parteien ignoriert. Die Parteien haben nicht nur ähnliche Ansichten, sondern arbeiten auch zusammen und setzen sich für das Wohl des Staates als Ganzes ein. Die Zivilgesellschaft dient als Kontrollinstanz für die Parteien und nutzt ihren Einfluss beispielsweise, um korrupte und unpatriotische Beamte zu entfernen. \nDie Linke Partei befürwortet einen geschlosseneren Markt, ähnlich wie in der Sowjetzeit. Sie richtet sich an ein linkes Publikum, das die Rückkehr des "Kommunismus" ohne dessen Nachteile wünscht.\n\nGrudinin konzentriert sich stark auf die Verbesserung der Lage in der Landwirtschaft und die Wiederbelebung der bäuerlichen Gemeinschaft sowie auf die Förderung der demokratischen Teilhabe in ländlichen Gebieten."
 neo_socialism_socdem: "Neosozialismus"
 neo_socialism_socdem_desc: "\n\n\n\n£GFX_ideology_neo_socialismsub\n\n\n\n\n\n Der §YNeosozialismus§! ist eine moderne Form des Sozialismus, die vom klassischen Marxismus abweicht, indem sie argumentiert, dass die Klasse nicht der primäre oder einzige Hauptwiderspruch innerhalb der Gesellschaft ist. Neosozialisten sind der Ansicht, dass Rasse, Sexualität oder Geschlecht ebenfalls Hauptwidersprüche sind, die ebenfalls gelöst werden müssen, bevor der Kommunismus erfolgreich umgesetzt werden kann."
 putinism_social_democrat: "Linksputinismus
 putinism_social_democrat_desc: "\n\n\n\n£GFX_Ideology_putinism_banner\n\n\n\n\n\nDer §YLinksputinismus§! - eine Ideologie, in der die Ideale von Wladimir Putin ihren Höhepunkt finden. Eine unpolitische autoritäre Demokratie, stark technokratisch und staatskapitalistisch mit Betonung des freien Marktes. Der Staat kämpft für die Sicherheit Russlands, mit allen Mitteln. Russische Nazis, die auf mysteriöse Weise spurlos verschwinden, Oppositionsführer, die inhaftiert werden, einwanderungsfeindliche und pro-muslimische Proteste, die niedergeschlagen werden - der Staat ist bestrebt, das Gleichgewicht in der Nation zu wahren. Dies führt zwar zu viel Hass auf den Staat, da sich niemand von der Regierung "verteidigt" fühlt, aber es macht die Menschen auch apathisch gegenüber der Politik und verhindert letztlich groß angelegte ideologische Zusammenstöße. Das bedeutet jedoch nicht, dass die Menschen die Nation hassen. Patriotismus, traditionelle Werte und nationale Einheit werden vom Staat gefördert. Die Idee der "Russischen Welt" und einer multipolaren Ordnung ist eine der Hauptantriebskräfte des Systems selbst.\n\nAuch wenn Wladimir Wladimirowitsch nicht mehr lebt, werden seine Ideale weiterleben. Sein System wird jedoch verbessert werden, um ein perfektes, unveränderliches und wirklich geeintes Russland zu schaffen."
 social_patriotism: "Sozialpatriotismus"
 social_patriotism_desc: "\n\n\n\n£GFX_Ideology_patriotism_banner\n\n\n\n\n\nDer §YSozialpatriotismus§! ist eine Ideologie, die ein tiefes Gefühl von Patriotismus mit einem Engagement für sozialen Zusammenhalt und nationale Einheit verbindet. Sie unterstreicht die Bedeutung einer starken und geeinten Gesellschaft, in der die Menschen stolz auf ihre Nation sind und sich gemeinsam für deren Wohlergehen einsetzen. Sozialpatrioten glauben an die Bewahrung des kulturellen Erbes, der Traditionen und Werte ihres Landes sowie an den Schutz seiner territorialen Integrität und seiner nationalen Interessen.\nDer Kern des Sozialpatriotismus ist der Glaube an die Macht des Kollektivs gegenüber den Interessen des Einzelnen. Er fördert ein Gefühl der Solidarität unter den Bürgern und ermutigt sie, das Wohl der Nation über den persönlichen Vorteil zu stellen. Sozialpatrioten betrachten ihre Landsleute als Teil einer Großfamilie, die durch gemeinsame Geschichte, Sprache und Kultur verbunden ist."
 reformist_socialism_socdem: "Reformistischer Sozialismus"
 reformist_socialism_socdem_desc: "\n\n\n\n£GFX_Ideology_reformist_socialism_socdem\n\n\n\n\n\nDer §YReformistische Sozialismus§! ist eine politische Ideologie, die innerhalb eines grundlegend kapitalistischen Rahmens operiert. Ihre Befürworter streben nicht die sofortige Abschaffung des Marktes als bestimmenden Faktor bei der Steuerung der Produktion an.\nReformistische Sozialisten stellen die Demokratie in den Vordergrund und betonen die Notwendigkeit, dass die Arbeitnehmer bei Entscheidungen, die ihr Leben betreffen, ein Mitspracherecht haben. Sie glauben, dass die Arbeitnehmer zumindest einen gewissen Einfluss auf die Produktion der von ihnen geschaffenen Waren und Dienstleistungen haben sollten. Im Allgemeinen sehen reformistische Sozialisten in einer Partnerschaft zwischen politischen Parteien und Gewerkschaften den Schlüssel zum sozialen und wirtschaftlichen Fortschritt."
 scottish_nationalism: "Schottischer Nationalismus"
 
 #Social Liberalism
 social_liberal: "Sozialliberal"
 social_liberal_noun: "Sozialliberalismus"
 social_liberal_desc: "Sozialliberale Demokratie"
 social_liberal_drift: "Unterstützung für Sozialliberalismus"
 
 #Social Liberal Subideologies old man biden time
 neoliberalism: "Neoliberalismus"
 neoliberalism_desc: "\n\n\n\n£GFX_Ideology_neo_liberalism\n\n\n\n\n\nDer §YNeoliberalismus§!, auch bekannt als der "Washingtoner Konsens", ist die vorherrschende Ideologie nach dem Fall des Kommunismus. Der Neoliberalismus, der der Linken diametral entgegengesetzt ist, strebt Marktreformen an, wie z. B. die Abschaffung von Preiskontrollen, die Privatisierung staatlich kontrollierter Branchen, die Deregulierung der Kapitalmärkte und den Abbau von Handelsschranken, um das Land für die Globalisierung zu öffnen. Der moderne Neoliberalismus bedient sich fortschrittlicher Ideen, um seine Märkte zu verbreiten, und setzt sich lautstark für LGBT-Rechte, Feminismus und Minderheitenrechte ein, wobei er sich des Staates bedient, um diese Sozialpolitik aufrechtzuerhalten. Zu den bekanntesten neoliberalen Institutionen gehören der IWF und die Weltbank, die auf der ganzen Welt Reformen durchgeführt haben."
 christian_democracy: "Christdemokratie"
 christian_democracy_desc: "\n\n\n\n£GFX_Ideology_chirstian_democracy\n\n\n\n\n\nDie §YChristdemokratie§! ist eine politische Ideologie, die auf modernen demokratischen Ideen und traditionellen christlichen Werten und christlicher Ethik basiert. Sie geht auf Einflüsse der katholischen Soziallehre und des Neo-Calvinismus zurück. In der Praxis wird die Christdemokratie in kulturellen, sozialen und moralischen Fragen oft als Mitte-Rechts, in Bezug auf Wirtschafts- und Arbeitsfragen, Bürgerrechte, Außenpolitik und Umwelt jedoch als Mitte-Links angesehen."
 supervised_democracy_liberal: "Erzwungene Demokratie"
 supervised_democracy_liberal_desc: "\n\n\n\n£GFX_Ideology_enforced_democracy\n\n\n\n\n\nDie §YErzwungene Demokratie§! ist eine psudeo-autoritäre Form des Neoliberalismus, die darauf abzielt, sozialliberale Werte und einen freien Markt in einer traditionell konservativen Gesellschaft durchzusetzen. In Wirklichkeit führt diese Ideologie zu Massenunterdrückung und kultureller Instabilität auf dem Niveau des maoistischen Chinas."
 centrist: "Zentrismus"
 centrist_desc: "\n\n\n\n£GFX_Ideology_centrism\n\n\n\n\n\nDer §YZentrismus§! ist eine politische Ideologie, die einen Mittelweg zwischen der traditionellen Linken und Rechten darstellt und deren Ideale auf Kompromissen beruhen. Der Zentrismus lehnt politischen Extremismus auf allen Seiten ab und versucht, einen ausgewogenen Ansatz in der Politik zu verfolgen, in der Regel in Ländern, die durch Parteipolitik zerrissen sind, wie Frankreich unter Emmanuel Macron, der sich und seine Partei als zentristisch bezeichnet. Zentristische Regierungen fördern in der Regel die Überparteilichkeit und gemäßigte sozioökonomische Positionen sowie die Philosophie des prinzipiellen Kompromisses. Zentristen legen in der Regel mehr Wert auf politische Stabilität als auf alles andere. Wenn es einer zentristischen Regierung jedoch nicht gelingt, die Linke und die Rechte an einen Tisch zu bringen, wird sie mit ziemlicher Sicherheit zusammenbrechen - im übertragenen wie im wörtlichen Sinne."
 liberal_socialism: "Liberalsozialismus"
 liberal_socialism_desc: "\n\n\n\n£GFX_Ideology_liberal_socialism\n\n\n\n\n\nDer §YLiberalsozialismus§! ist eine politische Philosophie, die liberale Prinzipien in den Sozialismus einbezieht. In dieser Synthese wird der Liberalismus als die politische Theorie betrachtet, die die innere Freiheit des menschlichen Geistes als gegeben ansieht und die Freiheit als Ziel, Mittel und Regel des gemeinsamen menschlichen Lebens annimmt. Der Sozialismus wird als die Methode gesehen, diese Anerkennung der Freiheit durch politische und wirtschaftliche Autonomie und Emanzipation vom Zwang materieller Notwendigkeiten zu verwirklichen."
 sovereign_democracy_liberal: "Souverändemokratie"
 sovereign_democracy_liberal_desc: "\n\n\n\n£GFX_Ideology_left_sovdem_liberal\n\n\n\n\n\nDie §YSouverändemokratie§! ist eine politische Nischenideologie, deren Ziel es ist, eine "perfekte" Demokratie zu schaffen, die das westliche demokratische Parteiengezänk ignoriert. Die Parteien haben nicht nur ähnliche Ansichten, sondern arbeiten auch zusammen und setzen sich für das Wohlergehen des Staates als Ganzes ein. Die Zivilgesellschaft dient als Kontrollinstanz für die Parteien, indem sie ihren Einfluss geltend macht, um beispielsweise korrupte und unpatriotische Beamte aus dem Amt zu drängen.\nDie Zentrums-Partei steht für Kommunitarismus, Meinungsfreiheit und Machtoptimierung. Sie strebt eine liberalere Plattform an, jedoch ohne westliche Gründung und mit einem "gesunden" Liberalismus."
 russian_patriotic_liberalism: "Liberalpopulismus"
 russian_patriotic_liberalism_desc: "\n\n\n\n£GFX_Ideology_patriotic_democracy_banner\n\n\n\n\n\nDer §YLiberalpopulismus§! ist einer der neuesten ideologischen Begriffe, die unter Nawalnys "Patriotischer Demokratie" kultiviert werden. "Patriotisch" im Namen steht für die Position der Regierung, die russische Staatlichkeit und einzigartige Identität zu schützen sowie sicherzustellen, dass der Patriotismus mit demokratischen Institutionen kombiniert wird.\n\nDie liberale Variante ist die zentristischste und vielfältigste unter allen, sie hat die liberalste Staatspolitik und nutzt eine gleichberechtigte und vielseitige parlamentarische Koalition, um die Ziele des Staates zu erweitern, indem sie gemeinsame Reformen und Politiken aushandelt. Die liberale Wirtschaftspolitik kann als Versuch beschrieben werden, den Kapitalismus der freien Marktwirtschaft aufzubauen, während gleichzeitig das Wohlergehen der Menschen berücksichtigt werden muss, und sie verhandelt mit den linken Mitgliedern der Koalition, was dazu führen kann, dass die Mechanismen der freien Marktwirtschaft im Interesse der sozialen Stabilität und des Wohlstands eingeschränkt werden.\n\nGenau wie andere mögliche Varianten setzt sie oft die russische Nationalität als staatsbildend ein und versucht, die Beteiligung von Minderheiten an staatlichen Angelegenheiten zu verringern, indem sie behauptet, dass "rückwärtsgewandte Menschen, die nicht zum Kern der Gesellschaft gehören, versuchen könnten, die demokratischen Prozesse des Landes zu untergraben und unsere Demokratie zu zerstören"."
 green_liberalism: "Grüner Liberalismus"
 green_liberalism_desc: "\n\n\n\n£GFX_ideology_green_liberalism_banner\n\n\n\n\n\nDer §YGrüne Liberalismus§! ist eine Ideologie, die die Grundsätze des Liberalismus mit einer starken Betonung der ökologischen Nachhaltigkeit und der ökologischen Verantwortung verbindet. Sie zielt darauf ab, die individuelle Freiheit und den wirtschaftlichen Wohlstand zu fördern und gleichzeitig den Schutz und die Erhaltung der natürlichen Welt zu gewährleisten."
 ultra_liberalism: "Ultraliberalismus"
 ultra_liberalism_desc: "\n\n\n\n£GFX_ideology_ultra_liberalism_banner\n\n\n\n\n\nDer §YUltraliberalismus§! bezieht sich auf eine Untergruppe des Sozialliberalismus, die sich in einem Land entwickelt, wenn die Demokratie bedroht ist oder die Autokratisierung zunimmt, wobei die Befürworter dieser Ideologie die Ansicht vertreten, dass liberale Werte mit allen Mitteln gesichert und geschützt werden müssen, selbst wenn dies die Unterdrückung abweichender Meinungen und eines Einparteienstaats durch den Einsatz militärischer Gewalt bedeutet. Der Ultraliberalismus befürwortet auch die Globalisierung und setzt sich für den freien Waren- und Personenverkehr und die Förderung des internationalen Handels ein; ein Beispiel hierfür ist der Schengen-Raum. Trotz dieser Unterschiede hat der Ultraliberalismus viele Gemeinsamkeiten mit dem Nationalliberalismus und tritt für eine unternehmensfreundliche gemischte Wirtschaft sowie für sozialen Progressismus ein. Diese Variante des Liberalismus ist zwar äußerst selten, hat aber dennoch ihre Anhänger, vor allem in einem vom Krieg zerrissenen Europa..."
 ITA_civic_populism: "Bürgerlicher Populismus"
 CHI_taiwanese_progressivism: "Taiwanesischer Progressivismus"
 centrist_pluralism: "Zentristischer Pluralismus"
 centrist_pluralism_desc: "\n\n\n\n£GFX_Ideology_boris_nadezhdin_thought_banner\n\n\n\n\n\nDer §YZentristische Pluralismus§! oder der §YBoris-Nadeschdin-Gedanke§!  ist ein Konzept der politischen Organisation der Gesellschaft, das auf der Anerkennung der Vielfalt ideologischer Positionen innerhalb einer einzigen institutionellen und kulturellen Struktur beruht. \n\nIm Gegensatz zum traditionellen zentristischen Ansatz, der die Suche nach Kompromissen zwischen linken und rechten Ansichten voraussetzt, geht der zentristische Pluralismus von einem radikaleren Postulat aus: nicht Kompromiss, sondern Koexistenz. Innerhalb dieses Paradigmas sind ideologische Positionen, die von der Sozialdemokratie und dem gemäßigten Konservatismus bis hin zum radikalen Nationalismus und Bolschewismus reichen, akzeptabel, vorausgesetzt, man respektiert sich gegenseitig, lehnt politische Gewalt ab und erkennt einen einheitlichen demokratischen Raum als Grundlage der Legitimität an.\n\n n der Praxis ist diese Ideologie zur theoretischen und praktischen Grundlage einer horizontalen, vielschichtigen Koalition von Kräften geworden, die sich um die Figur des Boris Nadeschdin scharen, wobei jede Fraktion, unabhängig von ihren Ansichten, das Recht auf Abstimmung und Vertretung hat."



 #Leaders
 BRA_HENRIQUE_MEIRELLES_DESC: "Henrique Meirelles: Als Leiter der brasilianischen Zentralbank unter Lula da Silva und Finanzminister unter Michel Temer hat Henrique Meirelles eine bewegte Geschichte als prominenter Technokrat. Sein Ruf als pragmatischer Ökonom und seine Verbindungen zum Finanzsektor machen ihn zu einem idealen Kandidaten für eine Rückkehr zu Stabilität und Wachstum. Er wird sowohl von Wall-Street-Finanziers als auch vom IWF und dem WEF unterstützt.\n\nSein Programm verspricht eine neue Welle des Wirtschaftsliberalismus und der Deregulierung und gleichzeitig die Rückkehr zu einer gewissen Sicherheit und Stabilität sowohl für die herrschende Finanzelite als auch für die breite Öffentlichkeit nach dem Chaos des Lulismo und Bolsonarismo. Er ist sich jedoch der tief verwurzelten wirtschaftlichen und sozialen Probleme, die Brasilien seit Jahrzehnten plagen, sehr bewusst und versucht, diese Probleme mit einer Mischung aus Sparmaßnahmen und wachstumsfördernden Maßnahmen anzugehen. Obwohl er als unpolitischer Technokrat gilt, würden seine Maßnahmen in der Praxis den Interessen der Cognoscenti, seiner Gönner von der Wall Street und der globalen Finanzelite dienen. Mit ihm an der Spitze der brasilianischen Wirtschaft wird erwartet, dass das Land wieder zu einem stabilen, berechenbaren Investitionsstandort wird. Er ist sich auch der Herausforderungen bewusst, die sich aus den enormen Wohlstandsunterschieden in Brasilien ergeben, und ist bereit, eine Reihe von Sozialprogrammen umzusetzen, um die Unruhen in der Bevölkerung zu mildern und das Vertrauen in die Institutionen wiederherzustellen, während er gleichzeitig weiterhin die Interessen des globalen Finanzkapitals fördert. \n\nUngeachtet der zweifelhaften Umstände seiner Wahl sind viele bereit, ihre Zweifel beiseite zu schieben, um etwas zu erreichen, das einer Rückkehr zu Vernunft und Stabilität ähnelt, während andere eher zynisch sind. Für sie ist er lediglich der neueste Vertreter einer Reihe von Eliten, die Washington und der Wall Street mehr verpflichtet sind als Brasilien selbst."

 libya.30.t: "Waffenstillstand in Libyen erklärt"
 libya.30.d: ""
 libya.30.a: "Wahnsinn"
 libya.31.t: "Waffenstillstand im libyschen Bürgerkrieg"
 libya.31.d: "Die rivalisierenden Fraktionen in Libyen haben sich nach monatelangen Verhandlungen auf einen landesweiten Waffenstillstand geeinigt und damit offiziell das Ende der größeren Kampfhandlungen im ganzen Land verkündet. Das am 23. Oktober 2020 unterzeichnete Abkommen sieht die sofortige Einstellung aller Offensivmaßnahmen an allen Fronten vor und enthält Maßnahmen zur Stabilisierung des täglichen Lebens, darunter die Wiedereröffnung wichtiger Straßen, die Wiederaufnahme des Inlandsreiseverkehrs und Schritte zum Gefangenenaustausch.\n\nDer Waffenstillstand enthält auch Bestimmungen zur Verringerung der ausländischen Präsenz in Libyen, mit der Verpflichtung, Söldner und externe militärische Kräfte aus dem Land abzuziehen. Während der Wortlaut auf dem Papier klar ist, bleibt die Umsetzung ungewiss. Bewaffnete Gruppierungen dominieren weiterhin große Gebiete, die Kommandostrukturen sind gespalten, und die politischen Institutionen, die den Staat vereinen sollen, sind nach Jahren der Zersplitterung und paralleler Verwaltungen nach wie vor geschwächt.\n\nDie an den Gesprächen beteiligten Diplomaten bezeichnen das Abkommen als notwendigen Durchbruch, der jedoch eher aus Erschöpfung als aus Vertrauen entstanden ist. Beide Seiten haben schwere Verluste erlitten, und die wirtschaftliche Belastung durch den langwierigen Konflikt hat den Druck zu einer Pause verstärkt. Die tieferen Streitigkeiten über die Legitimität, die Kontrolle über die Öleinnahmen und die zukünftige Struktur des libyschen Staates bleiben jedoch ungelöst.\n\nVorerst schweigen die Waffen. Die Frage ist, ob dieser Waffenstillstand eine Grundlage für Frieden wird oder nur die Ruhe vor dem nächsten Sturm ist."
 libya.31.a: "Endlich Frieden?"
 
 libya.45.t: "Libysche Wahlen wegen Meinungsverschiedenheiten ausgesetzt"
 libya.45.d: "Die geplanten nationalen Wahlen in Libyen wurden offiziell ausgesetzt, nachdem die Verhandlungen zwischen rivalisierenden politischen Blöcken in offener Uneinigkeit gescheitert waren, wodurch der fragile Übergangsprozess des Landes erneut in Unsicherheit gestürzt wurde. Was als nächster Schritt nach dem Waffenstillstand im Oktober gedacht war, ist stattdessen zu einem weiteren Schlachtfeld geworden, auf dem diesmal dysfunktionale Ausschüsse und rechtliche Meinungsverschiedenheiten gegeneinander kämpfen. n\nIm Zentrum des Streits steht eine Frage, die Libyen nie geklärt hat: Wer hat das Recht zu regieren und nach welchen Regeln? Die rivalisierenden Fraktionen beschuldigen sich gegenseitig, die Wahlgesetze zu manipulieren, die Wählerregistrierung zu behindern und den Prozess so zu gestalten, dass der Sieg schon vor der Stimmabgabe garantiert ist. Streitigkeiten über die Wählbarkeit von Kandidaten, die regionale Vertretung und die Rolle bewaffneter Gruppen haben die Wahlkommission lahmgelegt, während lokale Behörden in mehreren Städten sich weigern, Entscheidungen aus der Hauptstadt anzuerkennen. \n\nInternationale Vermittler haben zur Zurückhaltung gemahnt, aber ihr Einfluss ist begrenzt. Vor Ort bleiben die Milizen fest verwurzelt, die Sicherheitsgarantien sind ungewiss, und die politischen Führer sprechen weiterhin von Einheit, während sie sich auf die Möglichkeit eines weiteren Bruchs vorbereiten. Die Verschiebung beendet den politischen Prozess nicht, aber sie nimmt ihm die Dynamik, und in Libyen bedeutet verlorene Dynamik oft verlorenen Frieden. \n\nFür die einfachen Libyer fühlt sich die Aussetzung weniger wie eine Verzögerung an, sondern eher wie eine Bestätigung: dass das Land immer noch zwischen Waffenstillstand und Einigung, zwischen fragiler Ruhe und der Gefahr eines erneuten Konflikts gefangen ist."
 libya.45.a: "Der Frieden wird erneut verschoben."
 libya.46.t: "Königreich Libyen wiederhergestellt"
 libya.46.d: "In einem Schritt, den nur wenige für möglich gehalten hätten, hat Libyen offiziell die Wiederherstellung des Königreichs erklärt und damit die Senussi-Monarchie als Symbol der nationalen Einheit nach Jahren des Bürgerkriegs und der politischen Lähmung wiederbelebt. Die Ankündigung, die gemeinsam mit hochrangigen Politikern und Militärvertretern erfolgte, stellt die Monarchie nicht als Rückkehr zur absoluten Herrschaft dar, sondern als Versuch, einem zerrütteten Staat eine neutrale Krone überzustülpen.\n\nBefürworter der Wiederherstellung argumentieren, dass die Republik Libyen irreparabel gescheitert sei. Seit 2011 sind aufeinanderfolgende Regierungen entstanden und zusammengebrochen, Wahlen sind ins Stocken geraten und rivalisierende Verwaltungen haben das Land in konkurrierende Einflusszonen aufgeteilt. In diesem Vakuum wird die Monarchie als letzte Institution präsentiert, die in der Lage ist, Ost und West, Stämme und Städte, Milizen und Staat zu verbinden, als Anker, der die Ambitionen jeder einzelnen Fraktion überdauern soll.\n\nDer neue König hat umfassende Reformen, Verhandlungen zur nationalen Aussöhnung und eine letztendliche Rückkehr zu einer Volksdemokratie unter einem neu strukturierten System versprochen. Dennoch herrscht weiterhin weit verbreitete Skepsis. Bewaffnete Gruppen haben in vielen Gebieten nach wie vor entscheidende Macht, und Kritiker warnen, dass die Wiederherstellung der Monarchie lediglich zu einem weiteren Symbol für diejenigen werden könnte, die über Waffen und Einfluss verfügen. In Tripolis reichten die Reaktionen von vorsichtiger Akzeptanz bis hin zu völliger Ablehnung. Einige bezeichneten die Erklärung als unrechtmäßig und warnten, dass Libyen nicht allein durch Symbolik vereint werden könne.\n\nDennoch wird zum ersten Mal seit Jahren ein einziges Banner als Zeichen der nationalen Kontinuität gehisst. Ob das wiederhergestellte Königreich einen Weg aus dem Zusammenbruch darstellt oder nur eine andere Form der Spaltung ist, wird davon abhängen, was nach den heutigen Reden folgt."
 libya.46.a: "Eine Krone kehrt nach Libyen zurück."
 libya.47.t: "Neue Ära libyscher Kriegsherren"
 libya.47.d: "Libyen ist erneut zusammengebrochen. Nach Saif al-Islams gescheitertem Versuch, den Maghreb zu erobern, ist die fragile Ordnung, die er im eigenen Land aufgebaut hatte, in offene Zersplitterung zerfallen. Innerhalb weniger Wochen zerfielen Militäreinheiten, Kommandostrukturen lösten sich auf und ganze Regionen entzogen sich der Kontrolle der Zentralregierung. Der Staat, der behauptete, Libyen wiederaufzubauen, hat es stattdessen zerstört.\n\nDie Niederlage im Ausland legte Schwächen offen, die durch Propaganda und erzwungene Einheit verdeckt worden waren. Die Vorräte gingen zur Neige, rivalisierende Kommandeure beschuldigten sich gegenseitig, und lokale Führer begannen, unabhängig zu handeln. In Tripolis besetzten bewaffnete Gruppen Ministerien und Rundfunkstationen. Im Osten riefen Offiziere "Notstandsräte" aus, um ihre eigenen Städte zu schützen. Im gesamten Süden fielen die Grenzrouten an Schmuggler und Stammesmilizen, die nun mit Waffengewalt Steuern eintreiben. Libyens Ölförderanlagen, einst das Rückgrat jeder Regierung, sind zunehmend umkämpft und werden nur von demjenigen gehalten, der in der jeweiligen Woche die Pipelines verteidigen kann.\n\nDas zivile Leben bricht ebenso zusammen wie die politische Ordnung. Flughäfen werden ohne Vorwarnung geschlossen. Die Warteschlangen an den Tankstellen sind kilometerlang. Stromausfälle dauern tagelang. In vielen Regionen haben die Gerichte ihre Arbeit eingestellt und wurden durch improvisierte "Sicherheitskomitees" ersetzt, die den lokalen Machthabern loyal sind. Einige Gruppen behaupten, im Namen der Revolution zu handeln, andere im Namen der Religion, wieder andere einfach nur aus Profitgier. Ihre Flaggen unterscheiden sich, aber das Ergebnis ist das gleiche: Libyen ist zu einer Herrschaft durch Kontrollpunkte zurückgekehrt. \n\nInternationale Akteure geben Erklärungen ab, in denen sie zur Zurückhaltung aufrufen, aber die Realität ist brutal und einfach. Libyen ist kein Land mehr, das sich auf dem Weg der Erholung befindet, es ist völlig zusammengebrochen. Die Ära der nationalen Wiedervereinigung ist vorbei. Die Ära der Kriegsherren hat begonnen."
 libya.47.a: "Libyen zerbricht endgültig."

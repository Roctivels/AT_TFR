 #Events
 generic.0.t: "Du bist ein Cheater"
 generic.0.desc: "Weil du ein dreckiger Cheater bist, wurdest du im Universum von TFR getötet. Auf Wiedersehen"
 generic.0.a: ":_(" 
 generic.1.t: "Akademische Entwicklung nimmt zu"
 generic.1.desc: "Wenn die Stiftspitze über das Papier gleitet, scheint es, als könnten wir hören, wie die Zivilisation Wurzeln schlägt – sie wird nicht sofort blühen, aber sie kann verhindern, dass die Nation in einem zukünftigen Sturm entwurzelt wird. Mit unserer politischen Unterstützung und Subventionen für Bildung. Die Zahl der gebildeten Menschen nimmt von Tag zu Tag zu, innovative Ideen strömen in alle Branchen, und das Tempo der wissenschaftlichen Forschung beschleunigt sich dadurch still und leise."
 generic.1.a: "Was wir gesehen und gelernt haben, wird für immer weitergegeben werden."
 generic.2.t: "Akademische Entwicklung nimmt ab"
 generic.2.desc: "Die Kinder lernten nicht mehr das Einmaleins auswendig, sondern trugen leere Säcke zu den Feldrändern, um Weizenähren aufzulesen. Das Schulbuch wurde aufgerissen und an das Fenstergitter geklebt. Aufgrund des Chaos und des Rückgangs der Bildungsmittel steigt unsere Analphabetenquote wieder an. Ohne Wissen sind selbst die einfachsten Bedienungsanleitungen für Arbeiter wie verschlossene Bücher, sodass unsere wissenschaftliche Forschung einen Rückgang erleben wird."
 generic.2.a: "Das müssen wir ändern"
 generic.3.t: "Akademische Entwicklung: Limit erreicht"
 generic.3.desc: "Wenn wir nicht lernen, werden wir eines Tages die Fehler der Vergangenheit wiederholen."
 generic.3.a: "Lasst die Bodenfräse die Vergangenheit in den Boden drücken."
 generic.4.t: "Landwirtschaftsentwicklung nimmt zu"
 generic.4.desc: "Stahl spuckte schwarzen Rauch aus und glättete über Nacht die unveränderlichen Furchen und Gräben, die seit tausend Jahren unverändert geblieben waren. Der Ursprung der menschlichen Zivilisation ist untrennbar mit der Landwirtschaft verbunden, und jetzt, da die Kornspeicher voller werden, werden immer mehr Markierungen für "Getreideüberschuss" im Kalender vermerkt. Dies ist nicht nur den neuen landwirtschaftlichen Technologien zu verdanken, sondern auch unserem Umweltschutz."
 generic.4.a: "Wenn die Pflugschar zu stumpf ist, um die Erde zu bearbeiten, wird die Geschichte die Menschen bearbeiten."
 generic.5.t: "Landwirtschaftsentwicklung nimmt ab"
 generic.5.desc: "Der Traktor steht am Rand des Feldes und rostet vor sich hin, wie das Skelett eines riesigen Tieres, das aufgeschnitten wurde. Die Natur begann, sich ihre Großzügigkeit zurückzuholen und streute Hühnerhirse und Heuschrecken auf die Felder, und wir können nicht mehr mit neuen Technologien reagieren. Unsere landwirtschaftliche Produktion geht von Tag zu Tag zurück, und angesichts der modernen Technologie können wir nicht einfach "ungünstige Wetterbedingungen" dafür verantwortlich machen – wir müssen auch Fehler gemacht haben."
 generic.5.a: "Wenn die Pflugschar zu stumpf ist, um die Erde zu bearbeiten, wird die Geschichte die Menschen bearbeiten."
 generic.6.t: "Landwirtschaftsentwicklung: Limit erreicht"
 generic.6.desc: ""
 generic.6.a: "Ausgezeichnet!"
 generic.7.t: "Armutsentwicklung nimmt zu"
 generic.7.desc: ""Der ärmste Patriot im Londoner East End neigt dazu, stolz die Brust zu schwellen, wenn er an Englands Industrie und Reichtum denkt." Dieses Sprichwort ist vielen Menschen bekannt, aber glücklicherweise ist es in unserem Land nicht so weit gekommen. Armut kann nicht vollständig beseitigt werden, aber sie wird dennoch Straße für Straße aus den städtischen Gebieten verdrängt. Das Geräusch von sich füllenden Geldbörsen ist inspirierender als jede Nationalhymne."
 generic.7.a: "Niemand wird zurückgelassen."
 generic.8.t: "Armutsentwicklung nimmt ab"
 generic.8.desc: "Armut ist wie Schneefall, der still und leise Dächer, Sprachen und Träume bedeckt. Die Zahnräder des Landes füllen sich allmählich mit den Trümmern des Hungers, und früher oder später werden diese Trümmer die Zahnräder blockieren. Unsere Armutsquote steigt immer weiter an, und immer mehr Menschen bleiben am unteren Ende der "Mehrheit" zurück. Selbst um zu überleben, müssen sie ihre Moral aufgeben."
 generic.8.a: "Menschen verlieren ihre Würde, sobald sie ihre Geduld verlieren..."
 generic.9.t: "Armutsentwicklung: Limit erreicht"
 generic.9.desc: ""
 generic.9.a: "Ausgezeichnet!"
 generic.10.t: "Industrielle Entwicklung nimmt zu"
 generic.10.desc: "Die Förderbänder im Fabrikgebäude werden nie müde. Sie transportieren Teile an weit entfernte Orte und teilen die Zeit in faire Produktionskapazitäten auf. Der schwarze Rauch aus den Schornsteinen wird heute nicht nur als Nebel angesehen, den die Fabriken ausatmen, sondern auch als Verlängerung des Rückgrats des Landes – das ist die Grundlage unserer Existenz in der heutigen Welt. Jetzt können wir alles selbst herstellen."
 generic.10.a: "Lasst uns die Fabrik zum Laufen bringen."
 generic.11.t: "Industrielle Entwicklung nimmt ab"
 generic.11.desc: "Die Fertigungsstraße steht still, die Werkzeugkästen sind geöffnet – sie werden auf dem Schwarzmarkt kiloweise verkauft. Der Auftrag wurde storniert, weil die Maschine keine qualifizierten Schraubengewinde mehr herstellen konnte. Unsere derzeitige Industrie gleicht einem Stück Kaugummi, das wiederholt gekaut wurde. Die Süße ist längst verschwunden, zurück bleibt nur noch das Kolloid, das zwischen den Zähnen klebt und weder ausgespuckt noch geschluckt werden kann. Nun sinkt unsere industrielle Produktionskapazität aufgrund unzähliger Kolloide von Tag zu Tag."
 generic.11.a: "Fortschritt hätte das Hauptthema der Menschheitsgeschichte sein sollen..."
 generic.12.t: "Industrielle Entwicklung: Limit erreicht"
 generic.12.desc: ""
 generic.12.a: "Ausgezeichnet!"
 generic.13.t: "Militärentwicklung nimmt zu"
 generic.13.desc: "Dank unserer Bemühungen zur Korruptionsbekämpfung mögen die Logistikoffiziere endlich kein Geld mehr. Die Spalte "Sonstige Ausgaben" wurde aus der Einkaufsliste gestrichen, und das eingesparte Geld reichte aus, um jede Klasse mit einem Scharfschützengewehr mit holografischem Visier auszustatten. Endlich können wir stolz sagen: Die Mündungen der Soldaten zielen nur noch auf die Koordinaten, nicht mehr auf die Geldbörsen."
 generic.13.a: "Genau das ist die Aufgabe des Militärs."
 generic.14.t: "Militärentwiklung nimmt ab"
 generic.14.desc: "Letzte Nacht sind am Pier drei weitere Kisten mit Gewehrkugeln "ins Wasser gefallen". Die Gendarmerie stellte nur noch ein paar Fragen und wurde dann von Beamten zur Grenze gebracht, um Kamele zu zählen. Die Kantine der Beamten brachte die "Spezialaustern" auf den Markt, und die Kantine der Soldaten führte weiterhin das "Fliegenfangen im Brei" durch. Wenn ein Befehl nur noch ein Echo hinterlässt, ist die Militärflagge nicht mehr als ein Feigenblatt."
 generic.14.a: "Meine Güte, der Witz wächst aus dem Fass heraus."
 generic.15.t: "Militärentwicklung: Limit erreicht"
 generic.15.desc: ""
 generic.15.a: "Ausgezeichnet!"
 generic.16.t: "Gesellschaftsentwicklung nimmt zu"
 generic.16.desc: "An der Kreuzung um Mitternacht blinkt nur die rote Ampel – ohne Kameras reihen sich die Autos dennoch gehorsam auf. Das Gericht veröffentlichte das Urteil online, und in den Kommentaren gab es nur "Perfektes Urteil" zu lesen. Dank unserer strengen Verbrechensbekämpfung sinkt die Kriminalitätsrate sowohl in der Bevölkerung als auch in den Nachrichten. Mit der Zusammenarbeit der Bevölkerung können unsere Maßnahmen auch reibungsloser umgesetzt werden, was ihnen wiederum zugute kommt."
 generic.16.a: "Ordnung bedeutet, dass niemand mehr daran denkt, die Grenzen des anderen auszutesten."
 generic.17.t: "Gesellschaftsentwicklung nimmt ab"
 generic.17.desc: "Die Fensterbank war in scharfe Kanten zerschlagen und der Alarm ertönte länger als die Nationalhymne. "Selbstverteidigungstechniken für Familien" werden auf den Straßen und Gassen immer häufiger: zwei Schichten Sicherheitstüren und Kakteen auf den Balkonen. Das trennt nicht nur Diebe, sondern auch Vertrauen. Wenn das Gesetz nur auf dem Papier steht, werden die Straßen zu Auktionshäusern: Wer mutig ist, kann das Eigentum anderer zu einem niedrigen Preis kaufen."
 generic.17.a: "Die Gesellschaft sollte niemals ein brutales Knockout-Spiel sein..."
 generic.18.t: "Gesellschaftsentwicklung: Limit erreicht"
 generic.18.desc: ""
 generic.18.a: "Ausgezeichnet!"
 tech.1.t: "KI-Funktionalitäten bekämpfen"
 tech.1.d: ""
 tech.1.a: "Erlaubt ihr das Schreiben"
 tech.1.b: "Erlaubt ihr nur das Lesen."
 generic.20.t: "WARNUNG: Nation ohne Content"
 generic.20.d: "Hallo, lieber Spieler.\nUns ist klar, dass die Zahl der spielbaren Nationen im Moment gering ist, und diese Nation sieht recht spielbar aus! Ja, es hat Kriege, Ideen, vielleicht sogar ein paar Fokusse. Aber leider ist der Inhalt dieses Landes nicht für den Spieler angepasst, sondern nur für die KI. Die beste Option wäre also, eine andere Nation zu spielen, deren Content an den Spieler angepasst ist.\nBleibt dran, Patrioten!\nAlles Gute,\nTFR Entwickler"
 generic.20.a: "Na gut."
 

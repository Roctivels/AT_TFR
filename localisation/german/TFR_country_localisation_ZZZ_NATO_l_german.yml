 nato.7.t: "KSK verhält sich merkwürdig"
 nato.7.d: ""
 nato.7.a: "Bringen Sie diese Idioten wieder auf Linie!"
 nato.8.t: "Bundeswehr besetzt Regierungsgebäude"
 nato.8.d: ""
 nato.8.a: "Was ist hier los?!"
 nato.12.t: "Drohende Gasknappheit im Winter"
 nato.12.d: ""
 nato.12.a: "Der Winter kommt..."
 nato.13.t: "Winterliche Gasknappheit trifft unser Land"
 nato.13.d: ""
 nato.13.a: "Wir können dem Sturm trotzen!"
 nato.14.t: "Gefechte an der polnisch-weißrussischen Grenze"
 nato.14.d: "In den frühen Morgenstunden gab es Berichte über Schüsse und kleinere Scharmützel an der Grenze. Über Funk wurden verzweifelt Verstärkungen angefordert, bis aus diesen "Gefechten" ausgewachsene Schlachten wurden. Es bleibt wenig Zeit, um herauszufinden, wer die ersten Schüsse abgefeuert hat, da die polnischen Streitkräfte begonnen haben, in einem unorganisierten Gegenangriff in unser Gebiet vorzudringen, um unsere Streitkräfte zu erwischen, während sie durcheinander sind.\n\nVertreter der NATO trafen sich, sobald die Berichte über Gefechte vorlagen, und stimmten für die Inkraftsetzung von Artikel 5."
 nato.14.a: "Sie suchen die Stärke in der Zahl, was ihnen an Tapferkeit fehlt!"
 nato.15.t: "Aufstockung der NATO-Streitkräfte in Polen und im Baltikum"
 nato.15.d: "Während unsere Operation in der Ukraine in vollem Gange ist, wurden die NATO-Streitkräfte in höchste Alarmbereitschaft versetzt und haben begonnen, Tausende von Truppen nach Polen und ins Baltikum zu verlegen. Wir verurteilen solche Aktionen als Provokation und als Beweis für die Absicht des Westens, einen Krieg zwischen unseren Bündnissen zu erzwingen.\n\n Das Rollen von Panzertritten und das Aufheulen von Motoren ist auf beiden Seiten zu hören. Als mögliche Reaktion auf eine Invasion hat der westliche Militärbezirk Kräfte an die Grenze mobilisiert, um sie zu bewachen."
 nato.15.a: "Eine waghalsige Provokation!"
 nato.16.t: "Gründung der neuen Achse"
 nato.16.d: ""
 nato.16.a: "Wir müssen Europa noch einmal vor der bolschewistischen Bedrohung schützen!"
 nato.17.t: "Eintritt in die Achse"
 nato.17.d: ""
 nato.17.a: "Und wenn wir es überstehen, werden wir das"
 nato.18.t: "Die Auflösung der NATO"
 nato.18.d: "Der russische Sieg in Europa hat ganz Europa erschüttert, einschließlich einiger seiner Grundprinzipien und Institutionen. Die NATO hat ihre Ineffizienz als Verteidigungsbündnis unter Beweis gestellt, was zu ihrem faktischen Zusammenbruch geführt hat, da viele Mitgliedsstaaten nun von Russland besetzt waren, während andere ihre Verpflichtungen rasch aufgaben.\n\nDie Zukunft ist ungewiss - es scheint, dass unser Land nun nach Wegen suchen muss, sich selbst zu schützen."
 nato.18.a: "Dieses Relikt der Vergangenheit ist die Ursache dafür!"
 nato.22.t: "Gefechte an der polnisch-weißrussischen Grenze"
 nato.22.d: "In den frühen Morgenstunden gab es Berichte über Schüsse und kleinere Scharmützel an der Grenze. Über Funk wurden verzweifelt Verstärkungen angefordert, bis aus diesen "Scharmützeln" ausgewachsene Kämpfe wurden. Es bleibt wenig Zeit, um herauszufinden, wer die ersten Schüsse abgefeuert hat, da die russischen Streitkräfte begonnen haben, in einem unorganisierten Gegenangriff in unser Gebiet vorzudringen, um unsere Streitkräfte zu erwischen, während sie verwirrt sind.\n\nVertreter der NATO kamen zusammen, sobald die Berichte über Gefechte vorlagen, und stimmten dafür, Artikel 5 in Kraft zu setzen."
 nato.22.a: "Mobilisiert unsere Streitkräfte!"
 nato.23.t: "Russische Aufrüstung an der polnischen Grenze"
 nato.23.d: "In jüngster Zeit haben wir äußerst beunruhigende Berichte über die russische Aufrüstung an der polnischen Grenze im ehemaligen Weißrussland erhalten. Wir hätten die Zeichen sehen müssen, dass dieser Tag kommen würde; von der Eroberung des Kaukasus bis zur Annexion von Weißrussland waren die Zeichen alle da. Aber jetzt scheint es zu spät zu sein, der russische Bär klopft an unsere Tür und ist bereit, die Tür zur Ukraine einzutreten. Die Bedrohung aus dem Osten lauert überall und bereitet sich darauf vor, die Wunden, die der Zweite Weltkrieg hinterlassen hat, wieder aufzureißen und den europäischen Kontinent erneut in Blut zu tränken.\n\nDoch die Hoffnung ist nicht verloren. Wir sind bereit, uns der ganzen Grausamkeit des russischen Angriffs zu stellen und werden, wenn nötig, bis zum letzten Mann kämpfen. Wir wissen zwar nicht, was als Nächstes passieren wird, aber wir wissen mit Sicherheit, dass wir uns nicht von den Barbaren des Ostens unterkriegen lassen werden."
 nato.23.a: "Das wird nichts Gutes bringen..."
 nato.24.t: "Deutschland schlägt Offensive vor"
 nato.24.d: ""
 nato.24.a: "Wir sind bereit, beginnt die Planung!"
 nato.24.b: "Unsere Streitkräfte sind nicht bereit für offensive Handlungen."
 nato.25.t1: "NATO-Kommando billigt Offensive"
 nato.25.t2: "NATO-Kommando lehnt Offensive ab"
 nato.25.d1: ""
 nato.25.d2: ""
 nato.25.a: "Lasst uns kräftig zuschlagen!"
 nato.25.b: "Vielleicht ist die Zeit noch nicht reif..."
 nato.26.t: "Die Zukunft der NATO"
 nato.26.d: "Während sich das atlantische Bündnis nach Amerikas Absturz in den Bürgerkrieg neu ausrichtet, dominiert in Brüssel eine neue Frage: Wer führt nun den Westen an? London hat sich unter Berufung auf eine jahrhundertealte maritime Tradition und eine "besondere Verantwortung für die Anglosphäre" als natürlicher Erbe der atlantischen Führung präsentiert. Britische Beamte argumentieren, dass nur sie den alten transatlantischen Geist zusammenhalten können, selbst in Abwesenheit Amerikas.\n\nBerlin, selbstbewusster denn je, spricht von einem neuen europäischen Gravitationszentrum. Gestützt auf ihre wirtschaftliche Dominanz und eine wiedererstarkte Bundeswehr fordern die Deutschen eine technokratische, konsensorientierte Führung: "Effizient, verantwortungsbewusst und wahrhaft europäisch."\n\nUnd dann ist da noch Paris mit seiner Grandezza, seiner force de frappe und seiner Doktrin der strategischen Autonomie. Frankreich schlägt eine „neu konzipierte NATO“ vor, die nicht mehr einem einzelnen Hegemon untergeordnet ist, sondern von einem kontinentalen Willen geleitet und durch eine souveräne Abschreckung geschützt wird.\n\n Beobachter stellen eine angespannte, aber zivile Atmosphäre auf dem Gipfel fest, wobei sich alle Parteien auf die Gründungsprinzipien des Bündnisses berufen. Die osteuropäischen Mitglieder bleiben zurückhaltend und setzen sich unabhängig vom Ergebnis für stärkere Garantien ein.\nOb dies zu einer einheitlichen Kommandostruktur führt oder die NATO in konkurrierende Blöcke aufspaltet, bleibt abzuwarten."
 nato.26.a: "Eine Allianz ohne Richtung..."
 nato.27.t: "NATO-Wahlen beginnen"

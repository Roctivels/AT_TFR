 NATO_leadership_vote_countdown: "§YNATO§!: NATO-Führungswahlen"
 
 GER_german_actions_in_nato_war: "§YUN-KOMMISSION§!: Deutsche Heldentaten"
 GER_german_actions_in_nato_war_desc: "Wir werden die Tapferkeit unserer deutschen Soldaten bei der Befreiung Ostpreußens von der russischen Autokratie hervorheben. Dies wird unseren historischen Anspruch untermauern und die Unterstützung der Öffentlichkeit im In- und Ausland gewinnen."
 GER_denounce_un_history: "§YUN-KOMMISSION§!: UN-Geschichte anprangern"
 GER_denounce_un_history_desc: "Der Umgang der UNO mit früheren Treuhandgebieten und Übergangsverwaltungen war alles andere als unparteiisch. Die Aufdeckung dieser Versäumnisse wird die Legitimität der Kommission in Frage stellen und sicherstellen, dass Kaliningrad nicht in der Schwebe bleibt."
 GER_denounce_lithuanian_nationalism: "§YUN-KOMMISSION§!: Litauischen Nationalismus verurteilen"
 GER_denounce_lithuanian_nationalism_desc: "Litauen ist ein kleiner Staat mit sehr begrenzten Ressourcen, der jedoch versucht, eine Schlüsselregion zu verwalten, die weit über seine Möglichkeiten hinausgeht. Die Zukunft des Kaliningrader Gebiets kann nicht einem Land anvertraut werden, das für diese Verantwortung nicht gerüstet ist."
 GER_denounce_polish_nationalism: "§UN-KOMMISSION§!: Polnischen Nationalismus verurteilen"
 GER_denounce_polish_nationalism_desc: "Polens Anspruch auf das Kaliningrader Gebiet gründet sich auf die vormoderne Geschichte, lange bevor unsere heutigen Grenzen gezogen wurden. Die Wiederbelebung solcher überholten Begründungen wird Osteuropa nur destabilisieren. Wir müssen ihre Argumente als anachronistisch und unbegründet entlarven."
 GER_prop_up_kaliningrad_industry: "§YUN-KOMMISSION§!: Die Kaliningrader Industrie unterstützen"
 GER_prop_up_kaliningrad_industry_desc: "Wir werden eine milliardenschwere Investition in die Industrie und Infrastruktur Kaliningrads starten. Die Investition in die lokale Industrie wird sicherstellen, dass das zukünftige Königsberg auf das Vaterland angewiesen ist."
 GER_denounce_german_history: "§YUN-KOMMISSION§!: Deutsche Geschichte anprangern"
 GER_denounce_german_history_desc: "Deutschlands Anspruch auf Kaliningrad beruht auf überholtem Revanchismus. Das Treuhandgebiet wird nur das erste Opfer der wachsenden Ambitionen eines revanchistischen Deutschlands sein. Wenn Deutschland Kaliningrad einnimmt, werden sowohl Polen als auch Litauen die nächsten sein." 
 GER_set_up_humanitarian_efforts: "§YUN-KOMMISSION§!: Humanitäre Hilfe einrichten"
 GER_set_up_humanitarian_efforts_desc: "Indem wir der Bevölkerung des Treuhandgebiets Hilfe leisten, werden wir das Wohlwollen der Bevölkerung gewinnen und die Meinung der Kommission zu unseren Gunsten beeinflussen."
 

 NATO_victor_of_the_european_war: "Sieger des Europäischen Krieges"
 NATO_victor_of_the_european_war_desc: "Als Führer der EU sind wir die unangefochtenen Herren Europas, die die russische Kriegsmaschinerie zerschlagen und den Westen vor Tyrannei bewahrt haben. Doch der Sieg hat seinen Preis. Zehntausende unserer Männer mussten an der Front sterben, ganze Regionen wurden verwüstet, und die Kriegsanstrengungen brachten unsere Wirtschaft an ihre Grenzen. Die Narben mögen hier nicht so sichtbar sein wie im Osten, aber das Gespenst des Krieges geht um in unseren Fabriken, auf unseren Straßen und in den Köpfen aller Bürger.\n\nJetzt beginnt eine neue Art von Krieg: der Kampf um die Stabilisierung, den Wiederaufbau und die Sicherung der Demokratie, für die so viele unserer Jungs gekämpft haben und gestorben sind. Aber da Europa auf uns als Vorreiter schaut, müssen wir uns fragen: Wird dieser Triumph der Beginn einer neuen, demokratischen Ära sein, oder nur die Ruhe vor dem §Rnächsten russischen Sturm?§!"

 GER_annex_kaliningrad: "§YKÖNIGSBERG§!: Königsberg integrieren"
 GER_annex_kaliningrad_desc: "Nachdem der Übergang abgeschlossen ist, ist die Zeit für die vollständige Integration gekommen. Königsberg wird nicht länger ein Treuhandgebiet sein. Von nun an wird es ein untrennbarer Teil Deutschlands sein."
 GER_establish_relief_programs: "§YKÖNIGSBERG§!: Hilfsprogramme einrichten"
 GER_establish_relief_programs_desc: "Unsere diplomatischen Bemühungen haben die dauerhafte Kontrolle über Königsberg gesichert, aber der Übergang wird eine Herausforderung sein; wir müssen schnell handeln und Hilfe leisten. Durch die Einrichtung von Hilfsprogrammen werden wir die Region stabilisieren und die lokale Bevölkerung für uns gewinnen."
 GER_establish_administrations: "§YKÖNIGSBERG§!: Interne Verwaltungen einrichten"
 GER_establish_administrations_desc: "Nachdem wir Königsberg unter unsere rechtmäßige Kontrolle gebracht haben, sollten wir unsere einzigartigen nationalen Regierungsstrukturen, die Strafverfolgung und die wesentlichen Dienste in dem Gebiet einrichten, um eine reibungslose Verwaltung zu gewährleisten."
 GER_integrate_kaliningrad_industry: "§YKÖNIGSBERG§!: Königsberger Industrie integrieren"
 GER_integrate_kaliningrad_industry_desc: "Die Wirtschaft Königsbergs muss vollständig an die nationale Infrastruktur angepasst werden. Durch die Integration der lokalen Industrien werden wir langfristige Stabilität gewährleisten."
 
 NATO_commission_timer: "§YANHÖRUNG DER KALININGRAD-KOMMISSION§!"
 NATO_commission_timer_desc: "Nach einem Jahr politischer Manöver, diplomatischem Druck und massiven Investitionen wird die Kommission endlich ihr endgültiges Urteil fällen. Das Schicksal des Kaliningrader Gebiets wird sich bald entscheiden. Haben unsere Bemühungen ausgereicht, um die Kontrolle zu sichern?" 
 
 #Decision Categories
 NATO_war_category: "Der Zweite Europäische Krieg"
 NATO_war_category_desc: ""
 NATO_leadership_category: "NATO-Führung"
 NATO_leadership_category_desc: "Da die Vereinigten Staaten in völliger Aufruhr sind, sind wir scheinbar auf uns allein gestellt. Aber keine Sorge, unser Bündnis wird in diesem neuen, unsicheren Zeitalter weiter wachsen und gedeihen!"
 NATO_kaliningrad_commission_category: "Die Kaliningrad-Kommission"
 NATO_kaliningrad_commission_category_desc: "§4Um erfolgreich zu sein, müssen wir mehr Einflusspunkte haben als jeder andere Bewerber.§!\n\n                                §YDerzeitige Einflussverteilung§!:\n\n\n\nMit unserem Sieg im Krieg gegen die Russen bietet sich die historische Chance, die Kaliningrader Frage ein für alle Mal zu klären. Das heutige Kaliningrader Gebiet ist seit dem Mittelalter Heimat von Deutschen, Litauern und Polen, obwohl es nach den Teilungen Polens fest unter preußischer Kontrolle stand. Die UdSSR gliederte das Königsberger Gebiet in Ostpreußen nach dem Zweiten Weltkrieg als russische Exklave ein und vertrieb etwa 100000 Deutsche aus der Oblast. Seit dem Zusammenbruch der UdSSR ist die Oblast Kaliningrad eine stark befestigte nukleare Bastion vor unserer Haustür geblieben.\n\nAber jetzt, da Russland weit weg von Kaliningrad vertrieben wurde, haben die Vereinten Nationen ein Treuhandgebiet über die ehemalige Oblast eingerichtet. Über das Schicksal der Region wird demnächst die Kaliningrad-Kommission entscheiden, die unweigerlich festlegen wird, ob Deutschland, Polen oder Litauen die Souveränität zugesprochen werden soll. Wir müssen alle uns zur Verfügung stehenden Mittel nutzen, um sicherzustellen, dass die Kaliningrader Frage zu unseren Gunsten entschieden wird." 

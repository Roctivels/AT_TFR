 germany.184.t: "Gipfeltreffen in Brüssel"
 germany.184.d: "Die Niederlage der NATO-Staaten im Krieg gegen Russland ließ das Bündnis in Panik geraten - die Feindseligkeiten wurden erst eingestellt, als sich russische Panzer in Wien Berlin näherten, was niemand für möglich gehalten hatte.\n\nNATO-Armeen erwiesen sich als völlig unvorbereitet auf den modernen Krieg und wurden von den hervorragend ausgebildeten und ausgerüsteten russischen Truppen rasch zerschlagen. Eine große Illusion war zerbrochen.\n\nDas wirkte sich sofort auf die Einheit des Bündnisses auf dem Brüsseler Notstandsgipfel aus, auf dem der Ausgang des Krieges erörtert werden sollte - kein ehrenhafter Anblick. Die europäischen Staats- und Regierungschefs verstreuten sich im Saal wie hysterische, panische Kinder und beschuldigten sich gegenseitig kleinlich ihres gemeinsamen Versagens und Missmanagements.\n\nDirekt auf alle Bildschirme in Europa übertragen, wurde den Menschen in Europa eine beschämende Wahrheit vor Augen geführt: Während die Präsidentin der Europäischen Kommission von der Leyen ängstlich versuchte, von "Einheit" und "Zusammenarbeit" zu sprechen, machte sie das Fehlen dieser Begriffe deutlich. \n\nWenn Europa sich von dieser schrecklichen Niederlage erholen und wieder Boden gewinnen will, müssen nationale Interessen und Konkurrenzen zurückgestellt werden, damit Europa nicht aufhört, als Ganzes zu existieren."
 germany.184.a: "Unser Scheitern lag im Chaos. Europa kann nur vereint überleben."

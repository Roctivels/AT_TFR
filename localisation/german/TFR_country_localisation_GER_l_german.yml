 GER_foster_ev_plants_decision: "§7E-Auto§!-Fabrikbau fördern"
 GER_kickstart_biofuel_production: "§7Bioenergie§!-Produktion ankurbeln"
 GER_kickstart_biofuel_production_desc: "\n\n\n\n£GFX_GER_biorefineries_pr\n\n\n\n\n\nWir werden groß angelegte Initiativen zur Raffination von Biokraftstoffen finanzieren, Zuschüsse für die Umstellung der Landwirtschaft priorisieren und Steuererleichterungen für Unternehmen gewähren, die von Kohlenwasserstoffen auf erneuerbare Biomasse umsteigen."

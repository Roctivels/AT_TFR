 GER_agenda_2040_cat: "Agenda 2040"
 GER_agenda_2040_cat_desc: "\n\n\n\n\n£GFX_GER_agenda_2040_cat_banner\n\n\n\n\n\n\n\nDie Ungebildeten haben viele Vermutungen über unsere Pläne angestellt, einige zu absurd, andere ein wenig zu nahe an der Wahrheit, dennoch sind wir diejenigen, die das Steuer der Menschheit in der Hand halten.\n\nDie Agenda 2040 ist ein Überblick über unsere Ziele, Ideale und Pläne, um die Macht zu festigen, die uns vor vielen Jahren verliehen wurde. Mit unserer Vorhersage des Chaos, das über die Welt hereingebrochen ist, ist Europa zu einem Spielplatz für unsere Denkfabriken geworden, um einen sicheren Hafen von den aufsteigenden Flammen zu schaffen."

 proxy.1.t: "Die Frage des Chaos in Arabien"
 proxy.1.d: "Das Chaos in Arabien hat unsere eigene Führung dazu veranlasst, die Möglichkeit einer Beteiligung in der Region in Frage zu stellen, aber zuerst müssen wir entscheiden, welche Seite wir im Bürgerkrieg unterstützen werden. Die naheliegende und legitimste Entscheidung wäre, der Regierung in Riad Unterstützung zuzusenden, da wir seit langem Beziehungen zu Mohammed Bin Salman unterhalten.\n\nAndererseits könnten wir unsere iranischen Verbündeten unterstützen, indem wir stattdessen Hilfe an deren Stellvertreter im Land senden. Dieser Schritt ist zwar riskant, könnte aber für unsere zukünftige Diplomatie mit dem Iran von Vorteil sein."
 proxy.1.a: "Unterstützt die Regierung"
 proxy.1.b: "Unterstützt die Hisbollah"


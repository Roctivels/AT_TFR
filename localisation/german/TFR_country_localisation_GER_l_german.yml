 GER_Hire_CACI: "CACI Intelligence Support anheuern"
 GER_Hire_CACI_desc: "Consolidated Analysis Center, Incorporated war ein amerikanisches multinationales Unternehmen für professionelle Dienstleistungen und Informationstechnologie mit Hauptsitz in Nord-Virginia. Aber da der Bürgerkrieg in vollem Gange ist, hat das Unternehmen seine nachrichtendienstlichen Verteidigungsdienste dem Meistbietenden angeboten."
 GER_Hire_Blackwater_Veterans: "Blackwater-Veteranen anheuern"
 GER_Hire_Blackwater_Veterans_desc: "Obwohl es sich nicht um ein offizielles Unternehmen handelt, haben ehemalige Mitarbeiter der Firma Blackwater (jetzt Constellis), die bei der Invasion des Irak gedient hatten, an der Ostküste ihre Runden gedreht und hohe Geldsummen als Gegenleistung für ihre Sicherheit gefordert. Diese ausgebildeten Killer haben gezeigt, dass sie einen Preis für ihre Loyalität haben, also geben wir ihnen, was sie wollen und mehr."
 GER_Hire_Aegis_Defence_Forces: "Aegis Defense Services anheuern"
 GER_Hire_Aegis_Defence_Forces_desc: "Aegis Defence Services ist ein britisches privates Militär- und Sicherheitsunternehmen mit Auslandsniederlassungen in Afghanistan, den Vereinigten Arabischen Emiraten, Irak, Saudi-Arabien, Libyen, Somalia und Mosambik. Diese Söldner sind im Vergleich zu denen von Blackwater von geringerem Kaliber, aber was ihnen an Fähigkeiten fehlt, machen sie durch ihre Anzahl wett."

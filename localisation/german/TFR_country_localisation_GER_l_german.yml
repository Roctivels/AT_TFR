 GER_baptism_by_fire: "Feuertaufe"
 GER_baptism_by_fire_desc: "Das letzte Mal, dass Deutschland in einen konventionellen Krieg verwickelt war, war vor mehr als achtzig Jahren im Zweiten Weltkrieg. Seitdem hat sich eine pazifistischere Haltung in der Nation durchgesetzt, und die Welt glaubte, dass Deutschland mit Kriegen abgeschlossen habe, dass die deutschen Streitkräfte nie wieder große Schlachten auf fremdem Boden schlagen würden. \n\nWie sehr sie sich alle geirrt haben. \n\nIm Baltikum versuchen die Russen, vorzustoßen, und genau dort werden wir es ihnen zeigen. Zusammen mit unseren baltischen Verbündeten werden die Russen lernen, wie groß der Fehler ist, uns zu unterschätzen."
 GER_operation_eisenhammer: "UNTERNEHMEN: Eisenhammer"
 GER_operation_eisenhammer_desc: "In der modernen Kriegsführung werden diejenigen, die nicht die Initiative ergreifen, schnell von denen vernichtet, die ihnen zuvorgekommen sind, und es ist an der Zeit, dass wir den Russen zeigen, dass wir nicht warten. Das Unternehmen Eisenhammer ist unser entscheidender Schlag gegen die sich versammelnden Russen, und alles ist ganz einfach. An der gesamten Front in Weißrussland und der Ukraine wird mit Unterstützung präziser schwerer selbstfahrender und Raketenartillerie-Batterien eine schnelle Offensive durchgeführt. Unter dem Angriff schwerer Bombardements und unserer koordinierten Infanterie- und mechanisierten Streitkräfte werden die Russen nicht in der Lage sein, ihre Stellung zu halten, egal wie viele Männer sie gegen uns einsetzen. Damit werden wir sie schnell in die kalte Einöde ihres Landes zurückdrängen."
 GER_intensify_nighttime_sorties: "Nächtliche Soriten intensivieren"
 GER_intensify_nighttime_sorties_desc: ""
 GER_national_recruitment_drive: "Bundesweite Rekrutierungskampagne"
 GER_national_recruitment_drive_desc: ""
 GER_dust_off_legacy_equipment: "Ältere Geräte warten"
 GER_dust_off_legacy_equipment_desc: ""
 GER_deliver_excess_equipment_to_ukraine: "Überschüssige Ausrüstung an die Ukraine liefern"
 GER_deliver_excess_equipment_to_ukraine_desc: ""
 GER_mobilize_the_industry: "Die Wirtschaft mobilisieren"
 GER_mobilize_the_economy_desc: "Da Deutschland erneut in den Krieg gestürzt ist, können wir uns nicht länger den Luxus leisten, im Land alles beim Alten zu belassen. Unsere Militärmaschine braucht eine Wirtschaft, die sie antreibt, und es wird keine Zeit mehr damit verschwendet werden, diese aufzubauen. Arbeiter werden ausgebildet, Industrien werden mobilisiert, Material wird beiseite gelegt und Ressourcen werden rationiert. Die Wirtschaftsmagnaten und die Millionen fleißiger und talentierter Männer und Frauen, die sie leiten, werden nun die Ressourcen und Fähigkeiten nutzen, die die deutsche Wirtschaft weltberühmt gemacht haben, um die deutschen Streitkräfte ebenso berühmt zu machen. Die Russen gehen davon aus, dass wir keine Industrie haben, die unseren Kampf unterstützen könnte, aber sie werden schnell lernen, wie falsch sie damit liegen."
 GER_tank_in_ukrainian_refugees: "Ukrainische Flüchtlinge aufnehmen"
 GER_tank_in_ukrainian_refugees_desc: "Der Krieg im Osten hat eine große humanitäre Katastrophe ausgelöst, die nun auch auf Westeuropa übergreift. Hunderttausende Ukrainer, die aus den Städten fliehen, die derzeit von russischen Raketen und Artillerie bombardiert werden, haben ihren Weg nach Deutschland gefunden. Im Gegensatz zu einigen anderen Staaten werden wir sie jedoch willkommen heißen, ebenso wie alle anderen, die vor der Gewalt fliehen möchten. Natürlich wird die Unterbringung dieser Menschen im Land Kosten verursachen, aber trotz dieser Herausforderungen gibt es auch einen Vorteil. Sie werden all diejenigen treu unterstützen und sogar für sie kämpfen, die dem russischen Expansionismus ein Ende setzen wollen. Da wir in diesem Kampf immer auf der Suche nach mehr Männern und Unterstützung sind, werden wir dies schnell ausnutzen."

 GER_centralized_planning2_idea: "Planwirtschaft"
 GER_centralized_planning2_idea_desc: "Mit dem Untergang des politischen Systems der Bourgeoisie geht auch der Untergang der elenden und verkommenen kapitalistischen Wirtschaft einher. An ihre Stelle tritt unser eigenes Modell einer zentralen Planwirtschaft im Einklang mit der sozialistischen Doktrin. Investitionen, Zuteilung von Investitionsgütern und Produktion werden aus gutem Grund unter staatlicher Organisation und Leitung stehen. Die Menschen und unser Land werden nicht länger der wirtschaftlichen Anarchie und der Gier der Kapitalisten und ihrer Unternehmen ausgesetzt sein. Nicht länger werden die Ressourcen, die Menschen und die Arbeit in Deutschland für den persönlichen Profit von Geschäftsleuten verschleudert werden. Jetzt wird jedes Segment der Wirtschaft sorgfältig verwaltet und geplant werden, um unsere Anstrengungen zum Aufbau des Sozialismus zu maximieren. Je nachdem, wie wir dies bewerkstelligen, wird es entweder zu einem raschen und dramatischen Übergang zu einer wirklich sozialistischen Wirtschaft oder zu einem Zustand der völligen Katastrophe führen."
 GER_socialist_market_economy2_idea: "Sozialistische Marktwirtschaft"
 GER_socialist_market_economy2_idea_desc: "In unserem Bestreben, den Kapitalismus abzubauen und den Sozialismus zu erreichen, haben wir einen scheinbar einzigartigen Ansatz gewählt. Wie Titos Jugoslawien wurde unsere Wirtschaft in eine sozialistische Marktwirtschaft umgewandelt und nicht, wie einige erwartet hatten, in eine streng zentralisierte Kommandowirtschaft. Auch wenn der Staat extrem stark in die Volkswirtschaft eingreift und sie koordiniert, wird es weiterhin ein begrenztes privates Unternehmertum und die Erlaubnis eines begrenzten freien Marktes geben. Wie einige in der Partei unseren Ansatz euphemistisch bezeichnet haben, werden die Arbeitnehmer "das Beste aus beiden Welten" haben. Es wird sich jedoch zeigen, wie gut dieser Mittelweg, den wir eingeschlagen haben, für Deutschlands Weg zu unseren wirtschaftlichen Zielen ist."

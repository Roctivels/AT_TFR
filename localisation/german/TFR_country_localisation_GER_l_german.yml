 germany.228.t: "Die Gabelung des Lebens"
 germany.228.d: "Berlin war schon immer eine malerische Stadt für jeden, der die Gelegenheit hatte, sie zu besuchen oder in ihr zu leben. Die faszinierenden historischen Denkmäler, die interessanten Kultureinrichtungen und die große Vielfalt an Cafés und Restaurants an jeder Straßenecke machten die Stadt zu einem beliebten Reiseziel im Land. Viele dieser von Touristen besuchten Orte boten den Deutschen die Möglichkeit, einen einfachen Lebensunterhalt zu verdienen. Es war nicht viel, aber es erfüllte seinen Zweck für diejenigen, die es brauchten. \n\nWilhelm war einer dieser Menschen, denn er war ein junger Kassierer in einem örtlichen Café, das von vielen Touristen besucht wurde, vor allem von vielen Amerikanern und Kanadiern. Doch seit dem Ausbruch des Krieges in Nordamerika schien das Café nicht mehr so viele Kunden zu haben wie früher, als all diese Touristen die Stadt besuchten. Er hatte nun ernsthafte Zweifel, ob er seinen Job behalten konnte oder ob das Café selbst in diesem Tempo weitergeführt werden konnte. Jeden Tag beschlich ihn ein Gefühl wachsender Unruhe, denn es schien, als ob der Status quo, an den er sich so gewöhnt hatte, nun um ihn herum zerbröckelte. Der Bürgerkrieg in Amerika, die explodierenden Konflikte in der ganzen Welt, die wirtschaftlichen Schwierigkeiten und die zunehmenden Spannungen in Europa - wie lange noch, bis all das ihn zerstörte? Die abwechslungsreiche Landschaft diente als großartige Kulisse für eine Vielzahl von Gedanken, die sein unruhiges Gemüt beunruhigten. Egal, in welche Straße er einbog, die riesige Menge an Werbung war für Wilhelm nicht mehr zu übersehen. Schließlich blieb er einmal stehen und betrachtete eines der riesigen Plakate, die an einer Straßenecke angebracht waren. Auf dem Plakat war ein großer und sehr gut aussehender deutscher Soldat abgebildet, der den Betrachter grüßte, während der Text darunter die Bürger aufforderte, ihre Bürgerpflicht gegenüber der Nation zu erfüllen. Unter den Slogans befand sich jedoch ein weiterer Textklecks, der den Interessenten Aufstiegsmöglichkeiten und Einstiegsprämien versprach. Diese Aussichten verankerten sich nun in seinem Kopf und brachten ihn auf einige Ideen. Vielleicht könnte das etwas sein, das für ihn vielversprechend war, etwas, das ihm einen Ausweg aus seinen Schwierigkeiten mit seinem ohnehin schon wackeligen Job bieten könnte. Er wollte noch weiter darüber nachdenken, aber selbst das erschien ihm wie eine vergebliche Aussicht.\n\nAber als er seinen Weg zur Arbeit fortsetzte und den Ring geschlossener Cafés und Geschäfte in der angrenzenden Straße beobachtete, kam er schließlich zu einer einfachen, aber wichtigen Schlussfolgerung,"
 germany.228.a: "Vielleicht gehöre ich ja hierher."
 germany.229.t: "Der Sturm aus dem Osten"
 germany.229.d: "Er war diese Pläne schon tausendmal durchgegangen, aber alles quälte ihn jetzt, sie noch tausendmal durchzugehen. Immer und immer wieder sah er sich die gleichen Informationen an, mit dem gleichen Ergebnis. Schlachtpläne, Zeitungsausschnitte, Geheimdienstberichte, Schätzungen und andere Vorhersagen aus allen Bereichen des deutschen Militärs trieben ihn immer wieder in den Wahnsinn. General Wiermann konnte, so sehr er sich auch bemühte oder vorbereitete, dem Unvermeidlichen nicht entkommen, das überall stand, wohin er blickte: Die Russen kamen. \n\nEr hatte es überall gesehen, von den Fernsehberichten bis zu den Informationen, die er von seinem eigenen Büro im Verteidigungsministerium erhielt. Die Russen bereiteten sich auf etwas vor; dessen war er sich sicher. Der Donbass, Weißrussland, die Manöver im Westen und die Übungen in Zentralasien - all das deutete auf eine unheilvolle Schlussfolgerung hin. Die Russen würden bald im Westen zuschlagen, und er befürchtete, dass Deutschland darauf völlig unvorbereitet war. Ganz gleich, wie viele neue Rekruten eingezogen oder wie viele multinationale Übungen durchgeführt wurden, er hatte das Gefühl, dass das alles am Ende keine Rolle mehr spielte. Alle Amerikaner waren weg, ihre Tausende von Soldaten und Divisionen, die in Europa stationiert waren, wurden nach Hause geschickt, um in Amerika zu kämpfen; die mächtige globale Supermacht war aus Europa geflohen, um sich um ihren eigenen Untergang zu kümmern. Hätten diese Länder an der \"Ostflanke\" der NATO überhaupt eine Chance? Würden sie nur in der Lage sein, dem Westen Zeit zu verschaffen? Vielleicht wären diese ehemals kommunistischen Länder des Ostens froh über die Chance, noch einmal im Kampf gegen die Russen zu sterben, aber so sehen es seine Landsleute nicht. Ist Deutschland dieser Herausforderung gewachsen? Würden sich all die Vorbereitungen und das Training lohnen? Kann Deutschland diesen Ansturm überleben?\n\nDiese Fragen quälten Wiermann jeden Tag in seinem Berliner Büro. Er saß nur noch da und grübelte über diese schrecklichen Enthüllungen vor sich hin, während auf seinem Schreibtisch das gleiche Chaos von Berichten herrschte. Heute war es nicht anders. Er las immer wieder dieselben aufgewärmten Schlussfolgerungen, allerdings aus den neu gedruckten Berichten, die am Morgen verschickt worden waren. Inzwischen war es fast eine Form von Wahnsinn, aber er wusste, dass er mit seinen Gefühlen nicht allein war. Die gesamte deutsche Armee war entsetzt über das, was bald über den europäischen Kontinent hereinbrechen würde. Diese zermürbende Routine, die er sich in den letzten Monaten angeeignet hatte, war das Einzige, wozu er in diesen Tagen noch Energie hatte.\n\n Er legte den neuesten Geheimdienstbericht aus Russland weg, seufzte und starrte an die Decke. Dann murmelte er unter seinem Atem das Einzige, was ihm in diesem Moment einfiel,"
 germany.229.a: "Gott helfe Deutschland, denn wer sonst wird es tun?"
 germany.230.t: "Das Schwert und der Schild des Vaterlandes"
 germany.230.d: "Major Fischer hatte sich in den letzten Monaten auf diesen Moment vorbereitet. Er hatte diese Routine immer und immer wieder geübt, bis an den Rand des Wahnsinns. All das Training, all die Lektionen, all die Vorbereitungen und die Bündelung von Ressourcen würden bald die Ergebnisse zeigen, auf die so viele gehofft hatten. Alle in den Streitkräften und sogar ganz Deutschland selbst waren bis jetzt von einer schrecklichen Angst erfüllt, die ihresgleichen suchte. Es herrschte Angst um die Wirtschaft, um Amerika, um Europa, ja um die ganze Welt. Doch jetzt konnte er die Angst beiseite schieben, denn er würde die Früchte ihrer mühsamen Vorbereitungen in vollem Umfang zu spüren bekommen. Er straffte seine Uniform und wischte sich den Staub von den Schultern, während er sich darauf vorbereitete, das Zelt zu verlassen, in dem er die letzten Stunden der Vorbereitung verbracht hatte. Der Tag der Inspektion war endlich gekommen.\n\nNun trat er auf ein Podium mit Blick auf ein großes offenes Feld und hatte einen großartigen Blick auf die gewaltige Feuerkraft, die auf ihn wartete. Hunderte von deutschen Soldaten standen fein säuberlich in Reih und Glied, während lange Kolonnen von Leopard 2A6-Panzern und Panzerhaubitzen 2000 direkt hinter ihnen standen. Sie hatten unzählige Stunden, Tage, Monate und sogar Jahre gearbeitet, trainiert, geblutet, geweint und geschwitzt, um sich für das zu wappnen, was kommen würde. Sie waren die Besten der Besten und sie wussten es. Diese Männer waren das Beste, was Deutschland zu bieten hatte. Fischer stand einige Sekunden lang auf dem Podium, um die atemberaubende Szene vor ihm zu genießen, die ihn mit einer Form von Stolz erfüllte, die nur ein Soldat verstehen konnte. Aber der Stolz auf die Armee, der Fischer angehörte, war nicht das Einzige, was er fühlte, denn jetzt empfand er Mitleid und Verachtung für eine feindliche Armee, von der jeder vermutete, dass sie schon bald gegen sie antreten würde: die Russen. Wie konnten diese verarmten Einfaltspinsel eine Armee wie diese besiegen? Wie konnte Russland eine voll ausgerüstete NATO-Truppe herausfordern, geschweige denn die deutsche Armee? Die Russen waren sicherlich entweder dumm, selbstmörderisch oder beides. Deutschland hatte die Russen im Ersten Weltkrieg gedemütigt, im Zweiten Weltkrieg erneut, und alle schienen sehr zuversichtlich zu sein, dass Deutschland es ein drittes Mal schaffen könnte. Major Fischer, seine Kameraden und ganz Deutschland wussten, dass sie darauf vorbereitet sein würden.\n\Nun bereitete der Major das Mikrofon vor und begann seine Ansprache an seine Soldaten.\n\n\"Soldaten der deutschen Armee! Heute ist Inspektionstag! Heute werden Sie Ihren Kollegen und ganz Deutschland zeigen, was Sie als moderne Kampftruppe zu leisten vermögen! Zeigen Sie uns, wozu Ihre ganze Ausbildung geführt hat!\" verkündete Fischer triumphierend. Alle Soldaten auf dem Feld, von den vorderen bis zu den hinteren, holten tief Luft und brüllten mit einer seit langem nicht mehr gesehenen Schärfe,"
 germany.230.a: "JAWOHL, HERR MAJOR!"
 germany.231.t: "Rechtsextremismus gewinnt an Popularität!"
 germany.231.d: "Nach unserer demütigenden Niederlage gegen das kommunistische Russland verloren viele Deutsche das Interesse an der Wahlpolitik und begannen, die extremistischen Ideen der rechtsextremen Parteien zu unterstützen. Aufgrund der gekürzten Mittel fällt es dem BfV schwer, diese Gruppen im Auge zu behalten.\n\nImmer häufiger sieht man auf den Straßen die Embleme und Plakate von zwei großen rechten Organisationen - NPD und Dritter Weg. Ihre Aufmärsche sind im ganzen Land ein gewohnter Anblick. Sie fordern die Rettung und Läuterung der deutschen Gesellschaft von dem, was sie als Krypto-Linken und kapitalistische Dekadenz ansehen."
 germany.231.a: "Besorgniserregend..." 
 germany.232.t: "Die Schlacht für die Zukunft"
 germany.232.d: "Die Wege unseres Landes verengen sich und lassen uns nur zwei Möglichkeiten: die Nationaldemokratische Partei oder den Dritten Weg.\n\nDie NPD, angeführt von Frank Franz, ist eine politische Partei mit einem ehrgeizigen und egozentrischen Führer. Man hat sie als neofaschistisch und revanchistisch bezeichnet, was genau das ist, was die Deutschen jetzt brauchen. Der Dritte Weg ist ein Ableger der NPD, der von radikaleren Elementen der extremen Rechten geführt wird. Sie bezeichnen sich selbst als Strasseristen, die die Ideen eines echten deutschen Sozialismus wiederbeleben wollen, was vielleicht genau das ist, was die deutsche Nation braucht."
 germany.232.a: "Die NPD..."
 germany.232.b: "Der dritte Weg..." 
 germany.233.t: "Attentat auf den Präsidenten!"
 germany.233.d: "In einer schockierenden Wendung der Ereignisse wurde heute in Berlin ein Attentat auf den Bundespräsidenten verübt, das das Land und die internationale Gemeinschaft erschütterte. Der tragische Vorfall ereignete sich inmitten der Auflösung der NATO und des beispiellosen Aufstiegs rechtsextremer Parteien in Deutschland, was Spekulationen über mögliche Verbindungen zwischen dem Schützen und rechtsextremen Gruppen anheizte.\nDas Attentat ereignete sich während einer öffentlichen Ansprache des Präsidenten. Während er sich an die vor dem Brandenburger Tor versammelte Menge wandte, eröffnete ein einzelner Schütze das Feuer und verletzte den Präsidenten tödlich, bevor er von Sicherheitskräften überwältigt wurde. Trotz sofortiger medizinischer Versorgung erlag der Präsident auf dem Weg ins Krankenhaus seinen Verletzungen."
 germany.233.a: "Schokierend!" 
 germany.234.t: "Türkische Nachbarschaften in Brand gesetzt!"
 germany.234.d: "Vor kurzem wurde unser Land von schrecklichen Ereignissen heimgesucht. In der Nacht wurden Dutzende von Straßen und Gebäuden, die türkischen Bürgern gehören, in Brand gesetzt. Hunderte von Menschen wurden verletzt, und mindestens 73 Menschen kamen ums Leben. Die finanziellen Kosten dieser Tragödie werden noch ermittelt, dürften aber beträchtlich sein.\n\nZwei rechtsextreme Gruppen, die \"Neue Morgenröte"\ und die \"Deutsche Ordnung\", haben sich zu diesem Anschlag bekannt. Die Polizei untersucht derzeit den Vorfall, aber die Chancen, die Täter zu fassen, sind gering. Offizielle rechte Parteien haben jegliche Verbindung zu dem Anschlag bestritten und behauptet, dass er nicht mit ihren Werten übereinstimmt.\n\nTrotz der menschlichen Tragödie und des Leids, die dieser Vorfall verursacht hat, gibt es in der deutschen Bevölkerung wenig Sympathie für türkische Einwanderer. Im Internet ist die allgemeine Stimmung \"Ausländer raus!\" und \"Koffer, Bahnhof, Ankara!\"."
 germany.234.a: "Schrecklich!"
 germany.235.t: "Erste sozialistische Wahlen"
 germany.235.d: "Das Volk der Republik reihte sich in die Schlangen vor den Wahllokalen ein. Die roten Fahnen flatterten noch immer, die Slogans hingen noch immer, aber dieses Mal hatte die Revolution eine Pause eingelegt... um zu wählen. Das Volksabstimmungsgesetz hatte Transparenz und Pluralität versprochen. Nun würde die PDS vor ihrer ersten echten Herausforderung stehen. Amtsinhaber Bartsch ließ es trotz des drohenden politischen Verlustes zu, um der Demokratie willen. Zumindest wäre die Fortsetzung sozialistisch geprägt.\n\nDas Volksabstimmungsgesetz hatte Transparenz und Pluralität versprochen. Nun würde die PDS vor ihrer ersten echten Herausforderung stehen. Amtsinhaber Bartsch ließ es trotz des drohenden politischen Verlustes um der Demokratie willen zu. Zumindest wäre die Fortsetzung sozialistisch geprägt.\n\nDann war da noch Dorothee Martin von der DBD. Als Kind des Bodens war ihre Rhetorik sanfter, aber nicht weniger radikal. Ökologie, ländliche Gerechtigkeit und demokratischer Sozialismus. Etwas, das viele im breiteren linken Lager nie mochten, aber zuließen, um die Dinge im Zaum zu halten. Ja - es waren Wahlen, aber es ging nie darum, den nächsten Faschisten zu wählen."
 germany.235.a: "Die PDS setzt sich durch!"
 germany.235.b: "Die SAPD dominiert die Umfragen!"
 germany.235.c: "Die DBD siegt überraschenderweise!"
 germany.235.e: "Die Koalition von Byung-Chul Han gewinnt!" 
 germany.236.t: "Debatte im Bundestag"
 germany.236.d: "In den letzten Tagen gab es in unserem Parlament viele Debatten und Kontroversen über einige politische Maßnahmen und Äußerungen von gewählten Vertretern. Diese Art von Spannungen ist in einer so angesehenen Institution wie dem Bundestag nicht willkommen, und wir müssen uns sofort damit befassen.\n\nWir können entweder bestimmte Abgeordnete für die Verursachung dieses Chaos verantwortlich machen oder versuchen, eine friedliche Lösung zur Wiederherstellung der Ordnung zu finden."
 germany.236.a: "Die Rechten sind schuld am Debakel"
 germany.236.b: "Die Linken sind schuld am Chaos"
 germany.236.c: "Wir müssen für Einigkeit kämpfen"
 germany.237.t: "1000 Jahre"
 germany.237.d: ""
 germany.237.a: "Sind wir dazu verdammt, uns immer zu wiederholen?"
 germany.238.t: "Unsere Zukunft"
 germany.238.d: "Mit unserer Akzeptanz lange verbotener Ideologien und Philosophien und dem Kulturkampf gegen den Liberalismus wäre es unvermeidlich, dass der Nationalsozialismus in unserer Nation wieder aufkeimt.\nDer jahrzehntelang unterdrückte Nationalsozialismus hat die Chance, wieder aufzublühen, dieses Mal würden wir die Fehler kennen, die wir vermeiden müssen, dieses Mal würden wir wissen, dass wir unseren Feind nicht unterschätzen dürfen, dieses Mal wissen wir, was wirklich auf dem Spiel steht. \n\nDie Frage bleibt, ob wir uns dieses lange verschüttete Ideal vollständig zu eigen machen und die Identität ablegen sollen, zu der wir gezwungen waren, während wir das deutsche Volk im Stich ließen. Das würde der Welt zeigen, dass nichts jemals wirklich stirbt, aber es würde auch viele wütende Blicke auf uns ziehen.\n\nWir könnten diesen Teil von uns auch einfach stillschweigend annehmen, das Hakenkreuz und die Anbetung Hitlers fallen lassen und unsere Nation immer noch an die Vision anpassen, die wir haben. Man könnte sich im Inferno des Idealismus verbrennen, aber für den Rest der Welt müssten wir immer noch gut aussehen.\n\nWir haben die Wahl."
 germany.238.a: "Die einzige logische Schlussfolgerung aus unseren Reformen. Sieg Heil!"
 germany.238.b: "Wir haben schon genug von unserer Vergangenheit übernommen." 
 germany.239.t: "Nürnberger Kundgebung"
 germany.239.d: ""
 germany.239.a: "Es lebe unsere Partei!" 
 germany.240.t: "Die Zukunft unserer Religion"
 germany.240.d: "Deutschland ist zweifellos eine christliche Nation, aber waren wir schon immer ein christliches Volk? Die Antwort ist natürlich nein, unsere Wurzeln liegen bei Odin und Thor. Der nordische Glaube. Aber Deutschland hat heute fast keine heidnischen Anhänger. Der Führer der Schutzstaffel, Heinrich Himmler, propagierte einst die heidnische Religion als eine Wiederbelebung der alten germanischen Tradition, und dies war eine Weiterentwicklung früherer okkulter Gesellschaften wie der Thule-Gesellschaft und anderer Neuheiden wie General Ludendorff. \n\nDie heidnische Erweckungsbewegung ist klein, aber wir waren auch einmal klein, ist es nicht unser Ziel, ein gesamtdeutsches Reich wiederherzustellen? Ist es nicht unser Ziel, die deutsche Seele wiederherzustellen? Bringt es uns wirklich etwas, das Heidentum wiederherzustellen? \n\nEs wäre viel einfacher, das Christentum zu befürworten, aber seine unvereinbaren Teile mit dem Nationalsozialismus zu reformieren. Es ist natürlich eine Religion, die durch das Versehen der Juden verflucht wurde, und da Christus selbst ein Jude war, ist es fast ein Widerspruch, Christ zu sein, um Nationalsozialist zu sein. Vielleicht können wir seine ethnische Zugehörigkeit oder andere Elemente ändern, damit es in unser Schema passt. Wir sollten auch bedenken, wie sich dies auf die Wahrnehmung unserer Verbündeten auswirken wird, denn fast alle unsere Verbündeten sind gläubige Christen oder geben dies zumindest an, und der Versuch, eine heidnische Wiedergeburt voranzutreiben, wird uns bei keinem von ihnen Wohlwollen einbringen."
 germany.240.a: "Die Radikalen der Partei hatten die richtige Idee! Das Christentum ist eine Religion für die Schwachen!"
 germany.240.b: "Wir müssen die deutschen Kirchen so reformieren, dass sie in unsere nationalsozialistische Vision passen."
 germany.241.t: "Kuban besorgt über russische Aggression"
 germany.241.d: ""
 germany.241.a: "Investiert in ihre Verteidigung."
 germany.241.b: "Der Bär ist gehäutet, macht euch keine Sorgen."
 germany.242.t: "Germany Re-opens Negotaitions"
 germany.242.d: ""
 germany.242.a: "Does peace have a chance?" 
 germany.243.t: "Der Geist Kiews"
 germany.243.d: "Der vielsagende Name ist auf Twitter und anderen sozialen Netzwerken in aller Munde und bezieht sich auf einen ukrainischen MIG-29-Piloten, der angeblich am ersten Tag der russischen Invasion in der Ukraine sechs russische Flugzeuge abgeschossen hat.\n\nViele der Ghost of Kyiv-Beiträge werden von Aufnahmen begleitet, bei denen es sich um eine MIG-29 zu handeln scheint - nach dem NATO-Namensschema als Fulcrum bekannt - obwohl die meisten Beiträge genau den gleichen kurzen Clip zeigen: Das Flugzeug fliegt über Wohnhochhäuser aus Beton, der Himmel ist grau.\n\nEs gibt jedoch kaum Beweise dafür, dass der Geist von Kiew tatsächlich existiert. Im Internet wird darauf hingewiesen, dass es unwahrscheinlich ist, dass ein Jäger ohne Luftüberlegenheit und in einem minderwertigen Flugzeug an einem Tag 6 feindliche Jets abschießt.\n\nEin anonymer ukrainischer Interviewter erklärte jedoch: "Es geht nicht darum, ob er existiert oder nicht, sondern um die Botschaft, die er als Legende verbreitet. Diese Art von Botschaft ist in diesen schweren Zeiten wichtig, egal ob sie wahr ist oder nicht.""
 germany.243.a: "Frohes Jagen"
 germany.244.t: "Die Wahl der Koalition"
 germany.244.d: "Jetzt, wo die Wahlen vorbei sind, bleibt uns nur noch wenig Zeit, um eine Regierung zu bilden. Wir sollten unsere Optionen sorgfältig abwägen, um sicherzustellen, dass wir im Bundestag nicht in der Minderheit sind."
 germany.244.a: "Wir brauchen keine Hilfe!"
 germany.244.b: "Deutschland-Koalition! CDU, SPD und FDP!"
 germany.244.c: "Vielleicht könnten wir die AfD einladen..."
 germany.244.h: "Die Ampelkoalition setzt sich durch!"
 germany.244.e: "Eine unheilige Allianz... Das ist nicht etwas, das wir wollen, aber es ist etwas, das wir brauchen."
 germany.244.f: "Beruhigt die Radikalen - wir arbeiten mit der CDU zusammen."
 germany.244.g: "Die Rot-Rot-Grüne-Koalition! Weil wir es können!"
 germany.244.i: "Die Jamaika-Koalition aus CDU, FDP und Grünen!"
 germany.244.j: "Die Kenia-Koalition aus CDU, SPD und Grünen!"
 germany.245.t: "Die Zweiten Dresdner Prozesse"
 germany.245.d: "Der Saal in Dresden war einst ein Bundesgerichtssaal gewesen. Der Adler über der Richterbank war abgerissen und durch den Hammer und den Weizen der Volksrepublik ersetzt worden. Die Angeklagten waren ehemalige Generäle der Bundeswehr. Jede Anklage wurde mit mechanischer Präzision von dem fast wie ein Aktivist wirkenden Gericht verlesen: "Verrat an der Revolution", "Kollaboration mit dem faschistischen Aggressor", "Beteiligung an einem bürgerlich-militaristischen Putschplan", einer wurde zum Kapitalisten in Uniform erklärt, ein anderer zum Verräter an der Arbeiterklasse und ein dritter schlicht zum Feind des ‚sozialistischen Friedens‘, ein sozialistischer Jargon, den nicht einmal sie zu verstehen schienen. Einige murmelten etwas vor sich hin. Andere starrten ausdruckslos vor sich hin, als ob sie aus einem langen, bequemen Traum in einen sowjetischen Albtraum erwachten.\n\nDer Vorsitzende Richter, ein ehemaliger Fabriksyndikalist aus Leipzig, sprach nicht in Empörung. Das brauchte er auch nicht. Die Staatsanwälte hatten die Menschenmassen draußen, die Gewerkschaftstransparente, die Zeugenaussagen der Studenten, die Familien aus Chemnitz, die nach der Niederlage in Polen immer noch auf Nachricht über ihre vermissten Söhne warteten. Dies war kein Gerichtsverfahren. Es gab keine Verteidigung, und die Anklagen häuften sich weiter an. Ein General versuchte zu sprechen und verwies auf die Befehlskette, den Nebel des Krieges und den Mangel an Klarheit. Sein Mikrofon wurde abgeschaltet. Und vor Gericht wurden sie alle zum Tode verurteilt."
 germany.245.a: "Es schreien die NATO-Minister - Ihr Schreien ist nicht mehr nur Geflüster"
 germany.246.t: "Netanjahu spricht vor dem Bundestag"
 germany.246.d: ""
 germany.246.a: "Unsere historische Pflicht..."
 germany.247.t: "Bilanz der Russischen Befreiungsarmee"
 germany.247.d: "Die Gründung der Russischen Befreiungsarmee war halb eine Hommage an General Wlassow und halb ein echter Versuch unserer Regierung, russische Nationalisten zu organisieren. Aber wir haben ... den nationalistischen Widerstand gegen die Sowjetregierung unterschätzt. Wir haben nur sehr wenige Nachforschungen angestellt, bevor wir den Befehl zur Schaffung einer unabhängigen Einheit zur Organisation von Kollaborateuren ausführten, aber wie sich herausstellte, kann der moderne russische Nationalismus sehr oft mit dem sowjetischen Nationalismus, oder besser gesagt Nationalkommunismus, auskommen, Elemente der russischen nationalen Linken wie die Nazbols zeigen dies besser als alles andere, als Lukaschenko eine Mitgliedskarte ausgehändigt wurde, hätten wir dies wahrscheinlich ahnen müssen. \n\nUnser Versuch, sie zu organisieren, ist grandios gescheitert. Diejenigen, die sich freiwillig meldeten, hatten eine hohe Desertionsrate, sie wurden schlecht ausgerüstet und mussten andere Russen in den rückwärtigen Gebieten überwachen, mit dem Ergebnis, dass unser Partisanenproblem in den Gebieten, in denen sie eingesetzt werden, noch nie so schlimm war. \n\nDie sowjetische Regierung hat diese Gruppe und die Bilder ihres schlechten Standards im Vergleich zur deutschen Infanterie benutzt, um die Misshandlung von Russen und Schwäche zu demonstrieren und um Propaganda für die gegnerische Kollaboration zu machen. Die Liquidierung dieser Einheiten soll bald durchgeführt werden, wobei ihnen die Ausrüstung, der Rang und möglicherweise das Leben genommen wird, wenn wir es für richtig halten."
 germany.247.a: "Wer war dafür verantwortlich? ICH WILL NAMEN!" 
 germany.248.t: "Einladung zur Eurointern"
 germany.248.d: ""
 germany.248.a: "Nö"
 germany.248.b: "Ja"
 germany.249.t: "Jugoslawien lehnt ab"
 germany.249.d: "Obwohl Jugoslawien ein sozialistisches Land ist, hat es unser Angebot, gemeinsam gegen die faschistische Bedrohung vorzugehen, abgelehnt und erklärt, dass es die sozialistische Sache unterstützt, aber die wirtschaftliche Zusammenarbeit der militärischen vorzieht. So sehr sie auch ihre Feigheit gezeigt haben, ist es nicht zu unserem Vorteil, ein sich entwickelndes sozialistisches Land in Europa, das Jugoslawien ist, zu bekämpfen."
 germany.249.a: "Tja. Schöne Grüße an sie."
 germany.250.t: "Wahlergebnisse der Bundestagswahl"
 germany.250.desc: "Am 28. September hat die erste Runde der Bundestagswahl begonnen, um die Mitglieder des neuen Bundestags zu wählen"
 germany.263.t: "Russland lehnt Forderungen ab!"
 germany.263.d: "Trotz unserer klaren Forderungen haben sich die Russen geweigert, unseren Forderungen in Bezug auf ihre Armee nachzukommen, einschließlich der Forderung, die Größe der Land- und Luftstreitkräfte und die Militärausgaben zu verringern. Selbst die Androhung schwerwiegender Konsequenzen schien sie nicht zu beunruhigen."
 germany.263.a: "Mehr Sanktionen für die Bastarde!"
 germany.266.t: "Eifriger Sammler"
 germany.266.d: "Es klopfte kurz nach Einbruch der Dunkelheit an den Rahmen der alten Holztür. Frau Klein, eine alte Witwe, schlurfte zur Tür, um sie zu öffnen. Vor ihrer Tür stand ein Mann im Anzug mit einem geübten Lächeln. "Frau Klein", begann er sanft, "ich vertrete einen historischen Verein, der ein großes Interesse an der Erhaltung von Relikten aus der DDR hat. Ich habe gehört, dass Sie solche Gegenstände in Ihrem Besitz haben."\n\nIhr Blick fiel auf seine Tasche, dann auf das Glitzern seiner polierten Schuhe. Sie sagte nichts und winkte ihn hinein. Aus einer Truhe unter dem Fenster holte Frau Klein ihre Schätze hervor: eine verblichene Fahne der Freien Deutschen Jugend, eine Arbeitermedaille und ein zerbrochenes Porträt von Honecker. Die Augen des Mannes funkelten, als er sich vorbeugte, und seine Finger zuckten, als wollten sie die Artefakte an sich reißen. "Das sind bemerkenswerte Stücke", sagte er in einem leicht raubtierhaften Ton. „Eine lebendige Geschichte. Meine Organisation würde Sie gerne großzügig dafür entschädigen."\n\nFrau Klein starrte ihn einen langen Moment lang an, ihr faltiges Gesicht war nicht zu erkennen. "Diese Gegenstände", sagte sie leise, "sind nicht zu verkaufen. Sie gehören dem Volk, der unerschütterlichen und reorganisierten Regierung der Partei, nicht den kapitalistischen Sammlern oder Spekulanten.""
 germany.266.a: "Erinnerungen ändern sich nie."
 germany.267.t: "Die dünne graue Linie"
 germany.267.d: "Wachtmeister Weber klopfte mit einem Bericht gegen die Kante seines Schreibtisches, sein Gesichtsausdruck war wie der Winter hinter den vereisten Fenstern. "Schon wieder einer", murmelte er und schob den Bericht zu Wachtmeister Müller. "Ein paar Jugendliche haben einen Mufti in der U-Bahn in die Enge getrieben. Haben ihn halb totgeschlagen. Sie haben ihm ein Schild um den Hals gehängt: "Volksfeind"."\n\nMüller warf einen Blick auf den Bericht und hob leicht eine Augenbraue. "Kommt mir bekannt vor", sagte er mit einem dünnen Lächeln. "Die Stasi wäre sicher stolz."\n\nWebers Kinnlade straffte sich. "Verklären Sie das nicht. Das sind politisierte Schläger, keine Revolutionäre."\n\nMüller lehnte sich zurück, das Knarren seines Stuhls erfüllte die Stille. "Und was schlägst du vor? Sie zu verfolgen? Glauben Sie, irgendjemand in Berlin wird uns dafür danken, dass wir Kinder davon abgehalten haben, Faschisten oder Handlangern von Unternehmen die Knochen zu brechen?"n\nOffizier Weber atmete langsam aus. "Sie vergessen, wie diese Dinge laufen", sagte er mit leiser Stimme. "Heute sind es die Konzernschmarotzer, morgen sind es Leute wie wir. Erinnern Sie sich noch an das, was man damals 'Selbstkritik' nannte? Was glaubst du, wie sie es nennen werden, wenn sie uns holen"\n\nMüllers Grinsen schwankte, nur ein wenig, bevor er aufstand und seinen Mantel packte. "Vielleicht räumen sie den Dreck weg. Vielleicht ist das alles, was dieses Land je gebraucht hat."
 germany.267.a: "Fäulnis hört nie auf, sie frisst."
 germany.268.t: "Brandenburger Tor"
 germany.268.d: "Karl lehnte sich in seinem Stuhl zurück, der Bildschirm leuchtete, als er mit seinem Freund auf Discord telefonierte. "Es ist mehr als das, Dmitri. Berlin fühlt sich wieder lebendig an. Die Arbeiter singen auf den Straßen, Räte bilden sich, es ist, als hätten wir uns endlich wieder daran erinnert, wer wir sind."\n\nDmitri gluckste leise. "Eine Wiedergeburt, ja. Es erinnert mich an die Geschichten, die mein Großvater über den Oktober erzählt hat. Aber ..." Seine Stimme schwankte. \n\n "Aber was?2 drängte Karl, obwohl er die Veränderung im Tonfall bereits spürte.\n\nDmitri zögerte. 2Es steht in den Reden. Hinter dem Stolz verbirgt sich Wut. Auf den Westen, ja, aber auch auf uns. Auf Russland."\n\nKarl sprach und ging innerlich auf und ab. "Aber wir bauen etwas Neues auf, Dmitri. Wir sollen die Vergangenheit begraben, nicht wieder ausgraben."\n\nDmitri seufzte. "Wut vergeht nicht so leicht, Genosse. Besonders nicht in deinem Land. Die Geschichte... sie steigt wieder auf wie Zombies."\n\nKarl hielt inne und starrte auf die flackernden roten Banner vor seinem Fenster. „Wenn das hier zum Krieg wird, wird alles, was wir aufgebaut haben, brennen."\n\n "Vielleicht", antwortete Dmitri. "Aber die Vergangenheit bleibt nie begraben, Karl. Nicht hier. Nicht in Russland. Und schon gar nicht in Deutschland.""
 germany.268.a: "Für die Linken ruhen die Toten nie."
 germany.269.t: "Alte Relikte, neue Menschen"
 germany.269.d: "Auf der Lichtung herrschte helle Aufregung, als die Soldaten über die hoch aufragende Gestalt stolperten, die halb vom überwucherten Unkraut und der Zeit selbst verdeckt war. Sie war unverkennbar, selbst in ihrem verwitterten Zustand. Es war Lenin, mit ausgestrecktem Arm, der mitten im Kommando erstarrt war, als würde er über Jahrzehnte hinweg rufen. „Seht euch das an!", rief einer der Soldaten, der bereits den Frost von dem Sockel abwischte. Seine Handschuhe hinterließen Flecken von sauberem Stein unter dem Schmutz. „Das ist er, nicht wahr? Es ist Genosse Lenin!"\n\n Die anderen eilten näher, ihre Stiefel knirschten über den gefrorenen Boden. Ein junger Gefreiter fuhr mit der Hand am Sockel entlang, seine Finger zeichneten mit einer Mischung aus Neugier und Stolz verblasste kyrillische Buchstaben nach. „Stellt euch vor... das hat die Union einst gebaut", flüsterte er fast kindlich.\n\n Ein Soldat kletterte hinauf und balancierte unsicher, um eine Ersatzjacke über Lenins Schultern zu legen. „Wir können nicht zulassen, dass er hier draußen erfriert", scherzte er unter Beifall. Ein anderer Soldat lehnte sich mit dem Rücken an den Sockel und sah grinsend nach oben. „Glaubst du, sie wären stolz auf uns?", fragte er und deutete auf die Statue über ihm. „Ja, das wäre er. Aber auf seine Landsleute wäre er nicht stolz.""
 germany.269.a: "Ein schwindelerregendes Gefühl von Heimat."
 germany.270.t: "Das Lied von Eis und Feuer"
 germany.270.d: "Das Schlachtfeld erstreckte sich über die polnische Ebene im Hochwinter. Der Panther, gekleidet in purpurroten Stahl, ein Ritter der Revolution, der das Banner eines zerbrochenen Europas trug. Über der verkohlten Fläche erhob sich sein Feind: die Armata, eine gewaltige Bestie aus Eisen und Schatten, ein weißes "Z" auf ihrer Haut, ihre Kanone ihr urzeitlicher Drache. Der Panther rückte vor und feuerte zuerst seine Feuerlanze ab, die durch die Luft schnitt und die Haut der Bestie traf. Funken sprühten dort, wo der Panzer auf die Rüstung traf, doch der Drache blieb stehen, seine Rüstung verbrannt, aber unversehrt. Die Armata brüllte als Antwort und entfesselte einen Strom aus Flammen und Wut. Der Schlag prallte in die Seite des Panthers und hinterließ eine tiefe, rauchende Wunde auf seiner Rüstung, doch der Panzer ließ sich nicht beirren.\n\n Sie umkreisten sich, Ritter und Monster, und der frostbedeckte Boden bebte. Der Panther griff erneut an, sein Turm schwenkte, sein Ziel war bereit für den letzten Schlag. Die Granate schlug ein, durchbohrte die geschuppte Haut des Armata und entfachte ein Inferno in der Bestie. Rauch quoll aus seinen Wunden, ein gutturales, sterbendes Geräusch, und er zerfiel in einem Haufen schwelender Ruinen zu Boden. Der Panther hielt nicht inne, um zu feiern, sondern wandte sich dem Horizont zu, den bitteren Ruinen Warschaus."
 germany.270.a: "In gewisser Weise eine Heldengeschichte.."
 germany.271.t: "Die Bienenrevolution im Keller"
 germany.271.d: "Im Keller einer verlassenen Brauerei saß eine Gruppe von Universitätsstudenten um einen abblätternden runden Tisch. Verstreut lagen zerknüllte Blätter Papier, auf denen Wörter wie "Entfremdung", "Dialektik" und "Marxismus" geschrieben standen. Sie hatten gerade etwa 200 Mikrogramm LSD eingenommen und befanden sich nun in einem psychedelischen Strudel. "Schau", sagte Hans und starrte auf einen imaginären Punkt an der Decke, "die Entfremdung der kapitalistischen Gesellschaft ist wie die Ziegel in diesem Keller. Sie sollten Teil eines Ganzen sein, aber jetzt sind sie voneinander entfremdet. "Nein, nein, nein", sagte Lina und schüttelte ihr wirres rotes Haar. "Du verstehst das falsch. Entfremdung ist kein physisches Konzept, es ist ein ... ein ..." Ihre Stimme verstummte zu einem undeutlichen Gemurmel. "Warte!" Anna stand plötzlich auf ihrem Stuhl auf und stieß dabei fast das Bier auf dem Tisch um. "Ich hab's kapiert! Das ganze Universum ist ein riesiger Warenfetischismus! Sieh dir diese Kerzen an - sie sind nur entfremdete Formen von Bienenwachs, und das Bienenwachs selbst ist entfremdete Bienenarbeit..."\n\n "Aber Bienen, Bienen sind die perfekte kommunistische Gesellschaft. Wusstest du, dass in einem Bienenstock jede Biene nach ihren eigenen Bedürfnissen arbeitet?" sagte Lina, während sie ein biergetränktes Exemplar des Kapitals beiseite schob. "Nein, das ist falsch", rief Anna und wedelte aufgeregt mit den Armen. "Die Bienenkönigin ist der Inbegriff des bürokratischen Kapitalismus! Wir brauchen eine Bienenstockrevolution!"
 germany.271.a: "Und schließlich in eine tanzende Biene."
 germany.272.t: "Liebe und Puschkin"
 germany.272.d: "Im Saal für russische Poesie des Museums für sozialistische Kunst steckte sich Katerina Weber eine goldene Haarsträhne hinters Ohr, den Blick auf die Ausstellungstafel über Majakowski gerichtet. Ihre Mutter Marianne stand in der Nähe der Puschkin-Vitrine und schaute ab und zu zu ihrer Tochter hinüber. "Sieh dir das an, Mama", sagte Katerina und zeigte auf Eine Wolke in Hosen. "Majakowski ordnet die Buchstaben wie Stufen einer Treppe an. Wenn man es liest, fühlt es sich an, als ob man hinaufsteigt. Ist das nicht faszinierend?"  Marianne, die in die Manuskripte von Puschkin in der Vitrine nebenan vertieft war, seufzte: "Ich bevorzuge immer noch Dichter wie Puschkin. Schau dir Das Meer an - es fließt so sanft, wie Musik."\n\n"Oh, Mama, das sagst du immer", sagte Katerina und lachte. "Nicht jedes Gedicht muss wie Musik fließen. Schau mal hier - Majakowski spaltet das Wort *Aufstand* auseinander und ordnet es neu an. Die ganze Seite fühlt sich lebendig an. Ist das nicht auf seine eigene Art schön?"  Marianne schüttelte den Kopf, obwohl sich ein Lächeln auf ihre Lippen schlich. "Du hattest schon immer eine Vorliebe für merkwürdige Dinge. Ich weiß noch, als du klein warst, hast du dir nur Märchenbücher mit den skurrilsten Illustrationen ausgesucht." "Nun, das liegt daran, dass Kunst viele Formen annehmen sollte", antwortete Katerina und zeigte auf eine andere Auslage. "Schau mal hier - Majakowski war nicht nur ein Dichter, er war auch ein Künstler. Seine Plakatentwürfe sind so kreativ." \n\n"Ich denke immer noch, dass Puschkins Eugen Onegin berührender ist", sagte Marianne. "Wenigstens muss ich mir nicht den Hals verrenken, um es zu verstehen."  Katerina brach in Gelächter aus. "Mama, du hörst dich schon an wie Oma! Aber wusstest du das? Majakowski hat auch zärtliche Gedichte geschrieben - sie sind nur anders formuliert."\n\n "Wirklich?" Marianne beugte sich interessiert näher an die Vitrine heran. "Dann lies mir ein paar Zeilen vor.""
 germany.272.a: ""Ich kann tadellos sanft sein...""
 germany.273.t: "Ja, Genossen"
 germany.273.d: "Thomas Weigel saß in der dritten Reihe des Parlaments und starrte auf seine Finger - Finger, die noch vor einem Monat mit Graffiti-Farbe von der Straße beschmiert gewesen waren. Jetzt waren sie glatt poliert vom Blättern in Stapeln von offiziellen Dokumenten. Drei Stunden zuvor, als ein Beamter des Finanzministeriums mit dem vierten Kommentar zur neuen Steuerpolitik begonnen hatte, spürte er, wie seine Augenlider schwer wurden. Dies war nicht die Revolution, die er sich vorgestellt hatte. Damals auf den Barrikaden hatten sie versprochen, alles zu verändern, eine völlig neue Welt zu schaffen. Doch hier waren sie, tadellos gekleidete Regierungsbeamte, die in der Sprache der Vergangenheit über die Zukunft diskutierten.\n\"Was den dritten Vorschlag betrifft", sagte ein älterer Abgeordneter mit einer goldumrandeten Brille, "müssen wir seine Auswirkungen auf das bestehende System berücksichtigen..." Für Thomas klang die Stimme, als käme sie aus großer Entfernung, wie ein Echo, das über den Fluss der Zeit getragen wurde. Er schaute seine ehemaligen Mitstreiter an. Karl Schmidt, der Arbeitervertreter, der während der Revolution die Fabrikbesetzungen angeführt hatte, diskutierte jetzt über die Beschaffungsverfahren für Büromaterial. Anna Miller, einst eine feurige Straßenrednerin, studierte eifrig den 327. Paragraphen des Parlamentsgesetzbuchs. "Genosse Weigel, was ist deine Meinung zu diesem Thema?" Die Stimme des Vorsitzenden riss ihn in die Realität zurück. Thomas blinzelte und starrte auf den dicken Stapel von Dokumenten vor ihm, der dichte bürokratische Text schwamm vor seinen Augen. "Ich schlage vor...", sagte er zögernd, seine Stimme klang beunruhigend ungewohnt, "dass wir diese Angelegenheit nach dem üblichen Verfahren behandeln." "
 germany.273.a: "An diesem Tag meditierte Thomas sehr lange."
 germany.274.t: "Dieselbe Theorie"
 germany.274.d: "Aus dem Sitzungssaal des Rathauses quoll dichter Rauch. Oberst Werner Schmidt schlug mit der Faust auf den alten Eichentisch. "Genossen, diese Stadt ist ein Mikrokosmos der kapitalistischen Ausbeutung. Der Reichtum dieser Bourgeois wurde durch die Unterdrückung der Arbeiter geschaffen. Die Beschlagnahmung ihres Eigentums ist eine historische Zwangsläufigkeit! Das deckt sich perfekt mit der Marxschen Theorie der primitiven Akkumulation."\n\Neben ihm trommelte auch Major Thomas Miller mit den Fingern auf den Tisch. "Genosse Schmidt, Sie interpretieren den Marxismus falsch. Das Ziel der Revolution ist die Befreiung der gesamten Menschheit, nicht die Aufrechterhaltung des Kreislaufs der Unterdrückung. Wenn wir Gewalt gegen Zivilisten anwenden, worin unterscheiden wir uns dann von den Faschisten?" ‚Der Unterschied liegt darin, dass wir die historische Gerechtigkeit vertreten", unterbrach Oberstleutnant Klaus Becker und schlug die Ausgabe von Das Kapital auf dem Tisch zu.  "Aber denken Sie daran", warf Hauptmann Hans Reinhardt ein, "Marx sagte auch, dass die proletarische Revolution das Ziel hat, eine Gesellschaft ohne Unterdrückung zu errichten. Unsere gegenwärtigen Aktionen rücken dieses Ziel nur weiter in die Ferne."\n\n Draußen hallte das Donnern von Artilleriefeuer wider, aber keiner von ihnen achtete darauf. Werner warf ein Dokument auf den Tisch. "Sehen Sie sich diese Zahlen an! Die Bourgeoisie dieser Stadt hat riesige Reichtümer gehortet, während die Arbeiter in Armut leben. Sich diesen Reichtum anzueignen, ist der Inbegriff des Klassenkampfes!" "Du benutzt Dogmatismus, um Barbarei zu rechtfertigen".  sagte Thomas ruhig. "Ein wahrer Marxist sollte verstehen, dass Revolution nicht Rache ist - es geht um die Schaffung neuer sozialer Beziehungen."\n\n "Ha!", lachte Klaus spöttisch. "Deine schwache Haltung ist das Markenzeichen des Revisionismus. Gewalt ist die Hebamme der Geschichte. Was wir tun, ist lediglich die Erfüllung des Auftrags, den uns die Geschichte gegeben hat.""
 germany.274.a: "Gegensätzliche Schlussfolgerungen."
 germany.275.t: "Wir sind des Geyers schwarzer Haufen"
 germany.275.d: "Wir sind Krieger, unnachgiebig und unerschütterlich. Ganz gleich, wie die Welt uns sieht oder unter welcher Herrschaft - ob Königreiche, Imperien oder Republiken - unsere Traditionen sind seit Jahrhunderten unverändert geblieben. Diese Traditionen, die durch Opfer geschmiedet wurden, werden durch das Blut derer, die vor uns kamen, noch stärker. Wir werden unsere Vorfahren nicht entehren, deren Opfer für Gerechtigkeit und Wahrheit auch künftige Generationen inspirieren werden.\n\nDer epische Kampf unserer Zeit steht nun vor uns. Er ist sowohl unsere größte Angst als auch unsere düstere Realität. Einst glaubten wir, dass die Kriegstreiber, deren Durst nach Eroberung und Zerstörung gestillt sei, dass ihr Hunger nach Blut gestillt sei. Vielleicht dachten wir, ihre Wunden seien noch nicht verheilt und ihre Krallen, die sie einmal gebrochen hatten, seien noch nicht nachgewachsen. Aber wir haben uns geirrt. Eine neue Flut von Gewalt droht über die zivilisierte Welt hinweg zu schwappen und alles zu zerstören, was von Wert ist, alles, was von denen geschaffen wurde, die Gewissen und Würde hochhalten.\n\nEs sind keine Reden mehr nötig. Die Krise, mit der wir konfrontiert sind, eint uns alle. Mit eisernem Willen nehmen wir unsere Schwerter in die Hand, bereit, uns gegen das Chaos zu verteidigen. Wir werden die Finsternis mit dem Feuer der Gerechtigkeit auslöschen, bis die Krise besiegt ist und die wertvollsten Errungenschaften der Menschheit geschützt sind.\n\nDie Deutschen und alle Europäer: Marschiert gen Osten! Singt die Lieder des Krieges und marschiert auf die letzte Schlacht zu, die unser Schicksal entscheiden wird!"
 germany.275.a: "Und wollen mit Tyrannen raufen,\nHeia ho ho!"
 germany.276.t: "Der letzte Protest"
 germany.276.d: "Drei Monate und vier Tage lang war Thomas Reiner durch die Straßen gestreift. An dem Morgen, an dem er entlassen wurde, stieß er auf eine Stellenanzeige in der Zeitung - seine eigene Fabrik suchte einen neuen Chefingenieur. Die Anforderungen lauteten: "geeigneter familiärer Hintergrund". Kurze Zeit später wurde er höflich in die Personalabteilung zitiert. "Sie verstehen doch", hieß es dort, "die aktuelle Situation erfordert ... jemanden, der besser geeignet ist." Später erfuhr er, dass seine Stelle mit Otto von Steinfeld besetzt worden war, dem Sohn des Freiherrn, der einen Schraubenschlüssel nicht von einem Schraubenzieher unterscheiden konnte.\n\nThomas schlenderte über den Stadtplatz, seine Augen auf die massive Bronzestatue gerichtet, die gerade enthüllt wurde. Es war ein neu gegossenes Abbild des Kaisers, das streng über den Platz blickte. Arbeiter bauten gerade das Gerüst ab und legten die vergoldete Inschrift auf dem Sockel frei: In einer Eckkneipe bestellte Thomas sein letztes Bier. Als er nach draußen trat, sah er einen Lieferwagen am Straßenrand stehen, die Schlüssel steckten noch im Zündschloss, als der Fahrer die Ladung ablud. Ohne zu zögern, kletterte Thomas in das Fahrerhaus, startete den Motor und lenkte den Wagen in Richtung Platzmitte. Als er das Gaspedal betätigte, dachte er an den Stolz, den er empfunden hatte, als er zum ersten Mal die Fabrik betreten hatte. Der Lkw röhrte vorwärts, seine Geschwindigkeit nahm zu. "
 germany.276.a: "Der schönste Klang der Welt."
 germany.277.t: "Der Eliteoffizier"
 germany.277.d: "Leutnant Maximilian von Bernstorf stand im Einsatzraum des Hauptquartiers und starrte auf eine mit taktischen Markierungen versehene Karte. Oberst Werner Krauss musterte den jungen Offizier, Spross einer alten Adelsfamilie, hinter seiner Brille. "Leutnant", begann Krauss mit emotionsloser Stimme, "analysieren Sie das für mich. Wenn der Feind hier eine Umzingelung starten würde", er deutete auf eine mit einem roten Pfeil markierte Stelle auf der Karte, "wie sollten wir darauf reagieren?"\n\nMaximilian spürte, wie sich seine Kehle zusammenzog. Er starrte auf das dichte Netz aus taktischen Symbolen. "Wir könnten ... die Einheiten getrennt aufstellen", stammelte er, "so dass jede Gruppe unabhängig agieren kann."  Krauss' Augenbrauen hoben sich leicht. "Und die Nachschublinien? Wie wollen Sie den Nachschub für diese Einheiten bei einem verteilten Einsatz sicherstellen?" "Nachschublinien?" Maximilian wiederholte den Begriff, als würde er ihn zum ersten Mal hören. "Vielleicht ... vielleicht könnten wir Transportflugzeuge benutzen, um Nachschub aus der Luft abzuwerfen?"  Der Raum verfiel in eisiges Schweigen. Krauss nahm seine Brille ab und begann, die Gläser methodisch zu säubern. "Sagen Sie, Leutnant", sagte er langsam, "wissen Sie, wie viele Tonnen Treibstoff und Munition eine Panzerdivision an einem einzigen Tag verbraucht? Wie viele Transportflugzeuge wollen Sie für diese Aufgabe requirieren?"" Auf Maximilians Stirn bildeten sich Schweißperlen. Er wusste, dass Oberst Krauss alles durchschaut hatte - sein Ernennungsschreiben trug noch immer den Aufdruck seines Onkels, des Freiherrn im Dienste des Verteidigungsministeriums. \n\n"Wie faszinierend", sagte Krauss schließlich, sein Tonfall war von Verachtung geprägt. "In Ihrer Beurteilung steht "vorbildliche Führungsqualitäten". Es scheint, als hätte der Baron eine ziemlich fantasievolle Definition von "vorbildlich"." Er schloss die Mappe mit einem Schnalzen. "Sagen Sie, Leutnant, glauben Sie, dass die feindliche Artillerie ihr Feuer umlenkt, nur weil sie Ihr Familienwappen sieht?""
 germany.277.a: ""Ich schätze schon... vielleicht.""
 germany.278.t: "Der Tod des preußischen Adlers"
 germany.278.d: "Das morgendliche Sonnenlicht war ungewöhnlich hell, als Hans Weber den von seinem Großvater überlieferten kaiserlichen Pickelhaube polierte. In einem Zeitalter, das von modernen taktischen Helmen beherrscht wird, hält er hartnäckig an diesem Relikt des Ruhmes fest. Das Sonnenlicht reflektierte die Messingnadel auf dem Helm und schimmerte wie ein goldener Stern. Fünf Kilometer entfernt, in einem russischen Artilleriebeobachtungsposten, überprüfte Sergej Iwanow routinemäßig das Schlachtfeld durch sein Fernglas. Plötzlich erregte ein Lichtblitz seine Aufmerksamkeit. Ein deutscher Soldat stand am Rande des Schützengrabens und richtete seine Ausrüstung. Die Spitze seines Helms glänzte im Sonnenlicht wie eine perfekte Zielmarkierung. "Interessant", sagte Sergej in sein Funkgerät. "Sieht so aus, als ob jemand die Tage des alten Kaiser Wilhelm noch in Ehren hält." Er gab die Koordinaten weiter. "Diese glänzende Spitze - sie bettelt geradezu darum, getroffen zu werden." \n\nHans hatte keine Ahnung, dass er ein Ziel geworden war. Er stand da und dachte über die Worte seines Großvaters nach: dass dieser Helm die Ehre und Tradition des Reiches symbolisierte. Als die erste Granate einschlug, leuchtete der goldene Schimmer der Spitze im Sonnenlicht weiter.\n\nAls sich der Staub verzogen hatte, war im Graben nur noch ein zerfetzter Stachelhelm übrig. Sein Messingornament zeigte stur nach oben."
 germany.278.a: "Ein Schmetterling landete sanft auf dem Stachel."
 germany.279.t: "Die Säuberung"
 germany.279.d: "August war so still wie eine Leiche. Alles, was die Luft erfüllte, war das leise Surren der Monitore, während seine Drohnenkollegen sich an ihre Beute heranpirschten. Sie konnten Tausende von Kilometern voneinander entfernt sein; einer schlich über den Kaukasus, ein anderer klärte in der Nähe von Kiew auf.  August würde jedoch der erste sein, der einen "Fang" machen würde.\n\nEr starrte auf seinen Monitor und sah, wie sich das trübe Bild eines russischen Vororts ziellos bewegte und veränderte; Chruschowka hier, ein Spielplatz dort, vielleicht ein hohler Rest eines Panzers. Er war unglaublich gelangweilt. Diese Stadt lag nicht einmal in der Nähe der Front, sie war verlassen, nachdem Düsenbomber den größten Teil der Industrie schnell vernichtet hatten. Augusts Aufgabe bestand einfach darin, die Nachzügler ausfindig zu machen. Kaum hatte er einen Blick auf seine Uhr geworfen, schlenderte einer in sein Blickfeld. Als er seine Drohne näher heranführte, bemerkte er, dass noch mehr aufgetaucht waren, die alle aus einem mit Schutt übersäten Gebäuderest gekrochen waren. Einer von ihnen trug eine Uniform, da war sich August sicher. Eifrig steuerte er die Drohne, die sich auf die kleine Gruppe stürzte wie eine Frühlingsbiene auf eine Blume. Einer sah auf, schrie und begann zu rennen. Fast hätte August geflucht, aber seine Kameraden schienen nur verwirrt. Als sie es bemerkten, war es bereits zu spät. Das letzte, was August von ihnen sah, war das verpixelte Gesicht einer Frau.\n\nAugust starrte in den leeren Monitor, als er sein Mikrofon einschaltete."
 germany.279.a: "Feindliche Einheit in Zone 8 liquidiert."
 germany.280.t: "Plan für den Osten"
 germany.280.d: ""Kurzum, die Beseitigung der Arbeitslosigkeit muss ein Ziel unserer Regierung sein. Um dies zu erreichen, ist es notwendig, die Stabilität der Unternehmen für die Arbeitnehmer zu garantieren, es muss viel schwieriger gemacht werden, eine Beschäftigung für eine andere zu verlassen. Die so genannte "Gig-Economy" muss zugunsten der industriellen Arbeit abgeschafft werden."\n\Einer der Chefökonomen des Reichs dröhnte weiter. Die meisten hatten ihm längst zugehört und warteten darauf, dass sie selbst zu Wort kamen.\n"Vielen Dank, Herr Müller, das war alles sehr aufschlussreich. Herr Franz!"\nEin kleiner, bebrillter Mann (das war in dieser Menge nicht ungewöhnlich, aber seine Augen waren besonders groß) trat an das Podium heran. Hinter ihm tauchte eine Karte Osteuropas aus dem Projektor auf. Darauf waren die Standorte verschiedener Bergwerke, Mühlen, differenzierter landwirtschaftlicher Regionen und bedeutender Industriestädte eingezeichnet.\n\"Europa ist heute so isoliert wie seit Jahrhunderten nicht mehr. Die Importe aus Afrika, Asien, ganz zu schweigen von Amerika, sind um 200, 300 oder sogar 400 % zurückgegangen. Seit dem Beginn des Konflikts in Amerika mussten wir unsere Industriesektoren über Nacht wiederbeleben und die wenigen Handelsbeziehungen, die wir hatten, sichern. Es muss nicht einmal gesagt werden, wie prekär unsere Lage ist."\n\n "Es ist klar, dass wir einen leichteren Zugang zu Öl, Edelmetallen und landwirtschaftlichen Produkten brauchen. Der einzige Weg, wie wir zuverlässig an diese Güter gelangen können, ist die Osterweiterung. Die Sowjetunion ist, wie Sie sehen können, vollgestopft mit genau dem, was wir brauchen. Wir müssen diese Gebiete lediglich beschlagnahmen und kontrollieren. Welche unabhängigen Staaten wir auch immer gründen, ihre Wirtschaft muss von uns kontrolliert werden. Wir dürfen diese Sektoren nicht beschädigen und müssen unbedingt die zentralisierten Netze der Sowjetunion beibehalten. Die Privatisierung dieser Standorte muss langsam erfolgen, und zwar so, dass es nicht zu Chaos oder administrativen Überschneidungen kommt."
 germany.280.a: "Und so ging es weiter und weiter..."
 germany.281.t: ""Moskau brennt, und das Volk jubelt!""
 germany.281.d: "...rief eine alte Frau unter großem Jubel. "Auf eine Million mehr!"\nrief ein betrunkener Mann rief und hob ein frisch gefülltes Bierglas in die Höhe. Seine Freunde, die sich um ihn herum versammelt hatten, waren ähnlich fröhlich. Die Menge schwoll immer weiter an, da immer mehr Menschen in die Bar strömten, um die Fernsehbilder zu sehen. Zu dieser Stunde liefen in den Nachrichten ununterbrochen die Aufnahmen des Atompilzes, der über Moskau aufstieg. Die Gastgeber lachten und machten Witze, während Fotos von russischen Regierungsmitgliedern, von denen man annahm, dass sie der Explosion nicht entkommen konnten, langsam auf dem Bildschirm aufblitzten.\n\n"Der Rote Platz hat heute seinem Namen alle Ehre gemacht!"\n"Man munkelt, dass die Türme des Kremls irgendwo in der Ukraine in der Erde stecken!"\n\nGereifte Weine und andere Spirituosen wurden kostenlos ausgeschenkt. Ein Porträt von [GER.GetLeader] wurde mit den Porträts von Bismarck und Hitler verziert, und ihre Bilder wurden in lautem Einklang gegrüßt. In der Ferne waren Böllerschüsse aus den Kasernen zu hören, und einige kündigten bereits ihre Pläne für ein Feuerwerk im nahe gelegenen Park an. Draußen verbrannten einige Hooligans eine sowjetische Flagge, die Flammen wurden durch Kerosin und schlechte Getränke angefacht. Alle Anwesenden stießen auf den bevorstehenden Sieg an. Überall in der Stadt tünchten die Ladenbesitzer fieberhaft die Schaufenster und malten cartoonhafte Bilder der Ruinen der sowjetischen Hauptstadt neben "Bombenrabatte". Die Schulverwaltungen tippten feierliche Entlassungsanzeigen. Viele junge Männer, die die Stadt zuvor wie die Pest gemieden hatten, meldeten sich verlegen bei den Rekrutierungsbüros."
 germany.281.a: "Eine Nacht, an die sich alle mit Freuden erinnern werden"
 germany.282.t: "Interview mit Frank Franz"
 germany.282.d: ""Die Reporterin, eine zierliche Dame von über 50 Jahren, gab kein Pardon und reagierte auf Franz' Erklärungen ohne sichtbare Verärgerung, nur mit einer dünnen Langeweile, die eine tiefe Abscheu verdeckte.\n\n"Sie waren fadenscheinig, gnädige Frau, man konnte sie kaum als Türen bezeichnen, geschweige denn als Barrieren, die eine Ansammlung von giftigem Gas zuließen. Wie dem auch sei, das tut nichts zur Sache. Was ich sagen will, ist, dass wir nicht vorhaben, solche Entlausungszentren zu bauen.„\n"Sie betrachten die politischen "Internierungslager" nicht als solche Zentren?"\n\n "Nein". Das sind Gefängnisse. Wir streben nicht danach, große Teile unserer Bevölkerung willkürlich zu liquidieren, das war nicht das Ziel unserer Vorväter und ist auch nicht das unsere. Was wir stattdessen tun werden, ist die Förderung von Remigrationsinitiativen sowie einfache, ähm, Tests der politischen Loyalität, um die Angemessenheit unserer nicht-deutschen..."\nFranz hatte Mühe, das richtige Wort zu finden. Die Augen der Frau leuchteten auf und sie stürzte sich auf ihn. "Was ist ein Nicht-Deutscher?" "Das ist, nun ja, kompliziert. Nichteuropäer aller Art, ob sie nun arabischer oder indischer Abstammung sind, können sich zweifellos niemals assimilieren. Das ist erwiesen. Aber es gibt auch gewisse Elemente der zionistischen Untergruppe, die ebenfalls nicht bereit sind, aufrichtige patriotische Ansichten zu äußern."\nSie schwieg einen Moment. Franz schmunzelte und fuhr fort."
 germany.282.a: ""Und nun zum Thema Bolschewismus...""
 germany.285.t: "Beurteilung der sozialen Sicherheit"
 germany.285.d: "INTERNER SICHERHEITSDIENST VON EUROPA\nQUARTIERLICHE BEWERTUNG DER SOZIALEN STABILITÄT\nEinstufungsstufe: 5\nREF: SSA/Q3\nSUBJEKT: Wachsende Besorgnis über den gesellschaftlichen Zusammenhalt\n\n ZUSAMMENFASSUNG: Trotz der Pläne des Rates ist das Projekt, den gesellschaftlichen Zusammenhalt zu stärken und die Zufriedenheit der europäischen Bürger zu verbessern, gescheitert, vor allem nach einer kürzlich durchgeführten Untersuchung durch einen internen Ausschuss des I.S.D. E gescheitert, die zeigt, dass die gesellschaftlichen Stabilitätswerte den niedrigsten Stand seit der Wiedervereinigung erreicht haben.\n\nVORFALL 8193-B: Der Proband Dominique Jeannin (23, männlich) zeigte schwere Zoochose-Symptome, die dazu führten, dass er einen Lastwagen in die Rue Mouffetard lenkte, was den Tod von 19 Zivilisten verursachte. Die Proteste gegen den angeblichen Mangel an Sicherheit für europäische Zivilisten erreichten Tausende in der gesamten Region Frankreichs.\n\nDie Proteste gegen angebliche Einflüsse von Unternehmen auf die Regierung haben seit dem jüngsten Shell-Korruptionsskandal um 60 % zugenommen. In Berlin wurden Schilder mit der Aufschrift "TOD DEN KORPOS" gesichtet. Die Proteste haben bei unseren Konzernvertretern, wie z.B. dem Siemens-Vertreter, große Besorgnis ausgelöst, da sie mehr Maßnahmen gegen die Bürger fordern.\n\nAbschließend empfiehlt die I.S.D.E. nachdrücklich entschiedenere Maßnahmen gegen die Bürger. Zu den Vorschlägen des Ausschusses gehören u.a. eine stärkere Überwachung in den Städten, eine stärkere Überprüfung von ratsfeindlichen Elementen und stärkere Maßnahmen zur Kontrolle der Menschenmenge."
 germany.285.a: "Es wurde schnell zu den Akten gelegt."
 germany.286.t: "Datscha"
 germany.286.d: "Ein Mann murmelte vor sich hin in einer Datscha, die zwar schummrig war, aber alles, was er tat, war, blass nach draußen in Richtung Sonnenuntergang zu schauen, wobei er feststellte, dass es dort keinen Freund für ihn gab. \n\nEr fand sie draußen tanzen und ihre Stiefel in den Boden rammen, er fand sie drinnen und stöberte in den Nischen an der Wand, die mit Heiligenfiguren bunt bemalt waren, und einem kleinen Bild eines Königs.\n\nNachdem er den Mann zum ersten Mal angesprochen hatte, verleitete sein einschmeichelndes Lächeln, sein flachsfarbenes Haar und seine blauen Augen einen aus der Truppe zu der Aussage Wir sind nicht mehr eure Freunde. Wir sind eure Befreier." Der Mann verstand nicht.\n\nDie Flammen griffen auf das Haus über und die Truppe tanzte weiter, auf der Flucht vor einem großen Feuer am Ende Europas. Sie allein bewegten sich durch die große Trägheit, sie allein waren lebendig, und sie suchten nach anderen Dingen, die lebendig waren, um sie zu verschlingen und weiterzuleben."
 germany.286.a: "Wir sind zurück."
 germany.287.t: "Bericht aus Polen"
 germany.287.d: "INTERNER SICHERHEITSDIENST VON EUROPA\nQUARTIERLICHE BEWERTUNG DER SOZIALEN STABILITÄT\nEinstufungsstufe: 5\nREF: SSA/Q3\nSUBJEKT: Plötzlicher Anstieg der sozialen Instabilität in Polen.\n\nZUSAMMENFASSUNG: Unser jüngster Einmarsch in Polen und die Zerschlagung polnischer nationaler Institutionen und Unternehmen sowie ihre anschließende Ersetzung durch europäische Unternehmen erfolgten in einer raschen, aber äußerst unkoordinierten und unvorsichtigen Weise. Unsere überlasteten Sicherheitskräfte waren in den meisten Gebieten nicht in der Lage, die Situation unter Kontrolle zu bringen, so dass sich in ihnen ein "Machtvakuum" gebildet hat, das zu einem drastischen Anstieg der Kriminalitätsrate geführt hat. Eine der am weitesten verbreiteten, aber von unseren Agenten nicht bestätigten Geschichten besagt, dass einige von ihnen Söldner mit kybernetischen Implantaten anheuern, um ihre Rivalen auszuschalten. Einige der bemerkenswertesten Hinweise und Fälle von Industriesabotage und Attentaten führen zu einer silberhaarigen 20- bis 25-jährigen Frau; die Ermittlungen sind im Gange. \n\nDer I.S.D.E. und andere Sicherheitskräfte benötigen sofortige Verstärkung, um die Situation in den Griff zu bekommen, einschließlich schwerer Panzer und Flugzeuge, um strategisch wichtige Objekte zu sichern. Wenn die Lage in Polen außer Kontrolle gerät, könnte dies zu einer Krise mit den angrenzenden OVKS-Streitkräften und sogar zu einem vollständigen Verlust unserer Kontrolle über Westpolen führen."
 germany.287.a: "Was für eine Peripetie."
 germany.288.t: "Horst Mahler äußert sich"
 germany.288.d: ""
 germany.288.a: "Was für ein Spinner..."
 germany.289.t: "Nationalkommunisten ergreifen die Macht!"
 germany.289.d: "Der erste Kongress der Volkskammer mit der Nationalen Front war nicht das, was man erwartet hatte.\n\n Was die reformierte SED für eine kontrollierte Wahl hielt, um eine völlig willfährige "Opposition" zu wählen, hat sich zu einem völligen Umsturz der bestehenden Ordnung entwickelt. Mit verschiedenen konventionellen und unkonventionellen Mitteln ist es Befürwortern und Anhängern nationalistischer Ideen gelungen, in den Kongress einzuziehen und fast eine Mehrheit zu erringen.\n\nAls ein Notkongress einberufen wurde, um diese Ergebnisse zu kippen, fanden Abgeordnete, die vor den Toren des Reichstags ankamen, diesen von Militäreinheiten abgeriegelt vor. Gepanzerte Fahrzeuge füllten die Straßen und suchten nach jedem, der sich der neuen Macht hätte widersetzen können. Rechte und linke Paramilitärs patrouillierten gemeinsam durch die Straßen und sorgten für Ordnung. Währenddessen wurde live übertragen, dass die neue und nun viel nationalistischere Volkskammer zusammengetreten war, um den neuen Bundeskanzler zu wählen, wie es die Verfassung vorsieht. Einige Militärs waren ebenfalls anwesend, fast so, als wollten sie sich vergewissern, dass das Ergebnis sie zufrieden stellt.\n\nMit überwältigender Mehrheit stimmte sie für einen prominenten Verfechter der Querfront und des Juche-Gedankens, Michael Koth, der nun eine Rede hielt. Es wurde viel davon gesprochen, den deutschen Staat neu zu organisieren, um die Interessen der deutschen Nation zu vertreten, die Lage in Europa besser in den Griff zu bekommen und den deutschen Stolz wiederzubeleben, aber ein Satz stach für die Deutschen am meisten hervor: \n\n"Die Revolution braucht beide Flanken, um sicher zu sein, beide Beine, um in die Zukunft zu gehen!""
 germany.289.a: "Revolution braucht Kraft."
 germany.290.t: "Das Schicksal der Rechtsextremen"
 germany.290.d: "Die moderne Geschichte Deutschlands hat gezeigt, dass Konflikte und Unfälle der Vergangenheit beiseite geschoben werden müssen, um Deutschlands Ziele als Nation zu erreichen und die Zerstörung der antideutschen Weltordnung zu vollenden.\n\nViele rechte Parteien könnten nach Jahrzehnten der ungerechten Verfolgung durch die Bundesregierung endlich ihr Haupt erheben. Endlich können die Patrioten ihren rechtmäßigen Beitrag dazu leisten, Deutschland groß zu machen!\n\nWir müssen jedoch ihre Rückkehr richtig steuern, damit wir den größten Nutzen aus ihrer Unterstützung ziehen können.\n\nWir könnten sie entweder anweisen, sich in die bestehenden linken Parteien zu integrieren, oder sie der Volkskammer beitreten lassen, während sie ihre eigenen Organisationen behalten. Letzteres würde sie natürlich mehr erfreuen, könnte uns aber zu viel Macht kosten.\n\nWas sollten wir tun?"
 germany.290.a: "Wir wollen ihre Mitglieder als Teil der bestehenden Parteien, damit es keine Spaltung mehr gibt!"
 germany.290.b: "Nehmt ihre Parteien formell in unseren Kongress auf, sie sind willkommen!"
 germany.290.c: "Bietet ihnen eine eigene Plattform innerhalb der KDS!"
 germany.291.t: "Chaos auf dem Parteitag!"
 germany.291.d: "In einer überraschenden Wendung der Ereignisse konnte der Parteitag im Reichstag heute keine einheitliche Entschließung fassen, da er in ideologischen Grabenkämpfen versank.\n\nIn dem darauf folgenden Chaos ist das Regierungskabinett im Wesentlichen zusammengebrochen. Innerhalb weniger Stunden kündigte Michael Koth seinen Rücktritt an, und in der Volkskammer sollte ein neues Staatsoberhaupt gewählt werden.\n\nDer rechte Flügel hat es geschafft, dies zu nutzen, um seinen eigenen Kandidaten für den Parteivorsitz durchzusetzen - einen ehemaligen RAF-Gründer, der zum Neonazi wurde, der jedoch einige der neuesten nationalkommunistischen Ideen übernommen hat und in politischen Kreisen Unterstützung und Anerkennung findet - Horst Mahler. \n\nDies markiert einen extremen Rechtsruck in der deutschen Politik, da eine kommunistische Revolution durch das Aufkommen antifaschistischer und antikapitalistischer Gefühle nach der demütigenden Niederlage im europäischen Krieg gewonnen hat.\n\nEinige haben spekuliert, dass der chaotische Parteitag von den Rechten in der Volkskammer inszeniert wurde, einige beschuldigten sie sogar der Konterrevolution und der Verschwörung zur Wiederherstellung des Korporatismus. Nichtsdestotrotz ist es ihnen gelungen, die Macht zu festigen, und niemand will in dem jungen rot-braunen Staat zu viel Unruhe stiften."
 germany.291.a: "Tja... schon wieder eine Kehrtwende."
 germany.292.t: "Neuer Kurs für deutsche Selbstständigkeit"
 germany.292.d: "Hunderte von Parteidelegierten, die heute vor dem Reichstag eintrafen, standen in gleichmäßigen Abständen und klatschten im Gleichklang, als ob sie von einem unsichtbaren Dirigenten dirigiert würden. Strenge Farbschemata, präzise und geordnete Formen und Farben und Plakate mit neuen Slogans der Partei sowie einige alte sowjetische und ostdeutsche Symbolik umgaben sie.\n\nMichael Koth ging durch einen Korridor, gefolgt von der Spitze des Politbüros, bewacht von stocksteifen Soldaten, Gewehre mit festen Bajonetten im Anschlag. Als er sich dem Podium näherte, wurden die Klänge des Militärorchesters intensiver, und das Klatschen der Delegierten schien sich zu verstärken. Endlich nahm er die lang erwartete Position ein, der Applaus und die Musik hörten gleichzeitig auf.\n\n"Genossen! Bürger von Deutschland! Brüder und Schwestern der Volksarmee! Zu lange ist unser Land unter den Trümmern des verfaulenden Systems des Kapitalismus versunken. Heute hat das ein Ende! Die neuen Grundsätze des Parteiprogramms, die ich Ihnen heute vortragen darf, sollen dem deutschen Sozialismus und unseren kommenden Generationen eine sichere und glorreiche Zukunft sichern. Wir werden unsere Kinder und unsere Kultur vor den schädlichen Einflüssen des globalistischen Liberalismus bewahren! Wir werden unsere Grenzen sichern und jedem einzelnen Haushalt Sicherheit und Geborgenheit bringen. Wir müssen unser Leben und unsere Arbeit voll einsetzen, um die Bedrohungen, die unser Land von allen Seiten umgeben, zu besiegen!"\n\nSoldaten marschierten so präzise, als wäre es eine einzige Person, tausendfach vervielfältigt, Panzer und Raketensysteme folgten ihnen."
 germany.292.a: "Es lebe der große Sieg!"
 germany.293.t: "Bildung der Querfrontregierung"
 germany.293.d: "Heute war ein glorreicher Tag für Deutschland. Der neue revolutionäre Kongress ist heute zusammengetreten, um endlich die jahrzehntelange Kluft zwischen der Linken und der Rechten zu überwinden, die die Quelle so vieler Probleme in der politischen Sphäre Deutschlands war.\n\nVertreter der Jucheisten, der Marxisten-Leninisten, der Trotzkisten, der Strasseristen, der Nationalisten und vieler anderer verschiedener Bewegungen und Parteien haben sich darauf geeinigt, dass es im Moment größere Feinde in der Welt gibt als sie selbst, und dass die Unterschiede überwunden werden müssen, um sicherzustellen, dass Deutschland sie alle überlebt. \n\nEs gibt noch viel mehr gemeinsame Interessen, die durch Zusammenarbeit erreicht werden können: Kulturelle Wiederbelebung, Verbesserung der Lebensbedingungen, Bildung und sozialer Zusammenhalt - so viele Dinge, die weder die Linke noch die Rechte jemals allein erreichen könnten.\n\nHeute wurden die schwarz-weiß-roten, schwarz-rot-gelben und einfarbig roten Fahnen gemeinsam gehisst. Zum ersten Mal seit vielen Jahren war Deutschland wirklich geeint. Nicht mehr geteilt zwischen Ost und West, oder Links und Rechts, oder sonst wie. Oder selbst wenn es noch einige Trennungen gab, so machten diese sie nur stärker in der Pluralität, gaben nur mehr vom Besten aus allen Welten.\n\n Und dies ist ein Deutschland, das sich wirklich selbst erlösen und die größten Siege bisher erringen kann."
 germany.293.a: "Braun und Rot arbeiten zusammen."
 germany.294.t: "Nationalkommunismus auf dem Vormarsch"
 germany.294.d: "Im Gegensatz zu den 1920er Jahren, als Freikorps und Sturmabteilungen gebildet wurden, um die kommunistische Partei zu bekämpfen, hat die Revolution erstaunlich wenig reaktionären Widerstand erfahren - und dafür könnte es einen Grund geben, der sowohl gut als auch besorgniserregend sein könnte. \n\nNach jahrzehntelangen erfolglosen Versuchen verschiedener Gruppen haben die Ideen des Nationalkommunismus nun begonnen, sich zu verbreiten, besonders populär unter ehemaligen und gegenwärtigen Mitgliedern des Militärs, anscheinend angeheizt durch den Wunsch nach Rache am nationalistischen Russland sowie durch das bittere Gefühl, dass die deutsche Nation von ihrer Regierung im Stich gelassen wurde. \n\nUnseren Quellen zufolge haben sich auch Mitglieder rechtsextremer Parteien wie Frank Franz dafür entschieden, keinen offenen Widerstand gegen die Revolution zu leisten, sondern versuchen stattdessen, die Ideen des deutschen Supremismus mit verschiedenen gewaltfreien Mitteln zu unterwandern, indem sie nationalkommunistische Clubs gründen und Konferenzen und Kundgebungen abhalten. \n\nAndererseits drängt die Antikapitalistische Plattform auf die Übernahme von Elementen des nordkoreanischen Juche-Modells mit deutschen Merkmalen und verweist dabei auf die Verwundbarkeit der heutigen deutschen Gesellschaft.\n\nEs ist noch zu früh, um zu sagen, wohin diese Entwicklung führen wird, aber Berichten zufolge gibt es sogar einige Personen auf verschiedenen Ebenen der Staatsführung, die diese Ideen befürworten könnten."
 germany.294.a: "Gut...?"
 germany.295.t: "Bildung der Neuen Roten Armee Fraktion"
 germany.295.d: ""
 germany.295.a: "Eine nützliche Truppe von Nachstellern."
 germany.296.t: "Deutsch-französische Spaltung!"
 germany.296.d: "Die chinesisch-sowjetische Spaltung, ein Ereignis, das die Entwicklungsrichtung der weltweiten linken Ideologien und Regierungen bestimmte, scheint sich heute in Form eines hitzigen deutsch-französischen diplomatischen Austauschs mit einigen Auslieferungen und militärischen Manövern zu wiederholen, der Teil des ersten Konflikts in Europa seit dem Zweiten Europäischen Krieg zu sein scheint, wenn auch nur politisch - vorläufig. \n\nDies scheint der Höhepunkt zahlreicher Meinungsverschiedenheiten zu sein, die zwischen der französischen und der deutschen Regierung während der Konferenzen der Europäischen Internationale in Bezug auf die Zukunft Europas und die Vereinheitlichung linker Ideologien auf dem gesamten Kontinent in einem einzigen Entwicklungsmodell stattgefunden haben. Außerdem waren sie nicht in der Lage, ihre Einflusssphären abzugrenzen, insbesondere in Bezug auf die post-russischen Gebiete.\n\nIm Moment ist es sehr unklar, wie diese Situation enden wird, da sich Europa wie eine Bratpfanne aufheizt und sich immer mehr Länder um Frankreich und Deutschland herum einmischen, sind einige Experten besorgt, dass eine friedliche Lösung nicht erreicht werden könnte."
 germany.296.a: "Nicht schon wieder..."
 germany.297.t: "Deutschland und Frankreich ziehen in den Krieg!"
 germany.297.d: "Schockierende Nachrichten kommen aus Westeuropa, wo die Grenzkonflikte zwischen deutschen und französischen Einheiten am Rhein zu einem ausgewachsenen Krieg eskaliert sind, der jeden Anschein eines geeinten sozialistischen Europas im Handumdrehen verbrennt.\n\nEuropa ist nun zwischen der antirevisionistischen Allianz unter französischer Führung und der radikalen linken Regierung Deutschlands, die sich stark von den anderen Ländern abgesetzt hat, gespalten. Nun wird jedes System einem ultimativen Test unterzogen, um zu entscheiden, welcher Kommunismus wahrer und effektiver ist und wer in einer Liste verbotener Literatur gestrichen und zurückgelassen wird.\n\nDie Feuer der Revolution verzehren nun ihre eigenen Kinder. Die Zukunft ist rosig, aber nicht jeder wird sie erleben."
 germany.297.a: "Ein letztes Mal?"
 germany.298.t: "Enttäuschung über Die Linke"
 germany.298.d: "Die vernichtende Niederlage im Europakrieg hat die deutsche politische Landschaft ziemlich zerrüttet. Normalerweise sind es die Parteien der Mitte, die in den Augen der Menschen ihre Legitimität verlieren, doch dieses Mal ist es Die Linke, die auf dem Prüfstand steht. \n\nNeben den erwarteten Sprüngen nach ganz rechts haben sich die linken Elemente in Deutschland mehr Nischendenken zu eigen gemacht und sind tiefer in die Untergrundkulturen der deutschen Jugend eingetaucht. Es gibt viel zu viele Namen für die Splitterideologien, die aus den unzufriedenen Mitgliedern der Partei Die Linke hervorgegangen sind, aber sie haben anscheinend eine ätzendere Form angenommen. \n\nIn Anlehnung an die Werke von Mark Fisher und Byung-Chul Han hat sich diese neue Welle eines neu erfundenen Linken weit und breit in der linken Jugendkultur ausgebreitet, wo das Scheitern des ''Roten Liberalismus'' und ''Die sich ständig verändernde Maske des Kapitals'' heftig kritisiert wird.\n\nVorerst scheint es, als würde es ein kleiner Aspekt des deutschen Alltags bleiben, aber es wurden bereits hoch angesehene Mitglieder der Partei Die Linke gesehen, die bei kulturellen Veranstaltungen und Treffen zwischen diesen kleineren Gruppen anwesend waren, und nur die Zukunft könnte zeigen, wohin sich dies entwickeln könnte."
 germany.298.a: "Der abstrakte Parasit wurde entlarvt."
 germany.299.t: "Koalition für die Rückgewinnung der Zukunft bildet sich"
 germany.299.d: "Mit dem Herannahen der angekündigten Wahlen entstehen immer mehr neue linke Bewegungen, die versuchen, Unterstützung zu gewinnen und in der Regierung vertreten zu sein. Insbesondere eine Partei hat es geschafft, eine ungewöhnliche Anhängerschaft anzuziehen und die Massen mit einem interessanten und detaillierten Programm, einzigartigen Versprechen und vor allem mit vielen neuen und jungen Gesichtern zu überzeugen, die versprechen, nicht nur Deutschland, sondern auch den Rest der Welt neu zu gestalten. \n\nKoalition für die Rückgewinnung der Zukunft mit Byung-Chul Han, einem dekonstruktivistischen Philosophen südkoreanischer Abstammung als Frontmann, der von einigen Experten als einer der Hauptvertreter des linken Akzelerationismus in der Welt bezeichnet wird. \n\nIhre Slogans betonen die Ermüdung der deutschen Bevölkerung durch die typisch linke Politik sowie den sozialen Aspekt und versprechen, das Land zu reformieren, um das Ausbrennen der Gesellschaft zu verhindern und den Weg für technologische und kulturelle Durchbrüche zu ebnen, die den Grundstein für die postkapitalistische Zukunft legen werden.\n\nEs scheint, dass die Partei, die verspricht, den Kapitalismus als Konzept abzuschaffen, in den Umfragen stark an Fahrt gewinnt und nach der Wahl um das Recht auf den Sieg und die Regierungsbildung konkurrieren wird."
 germany.299.a: "Was für eine merkwürdige Bewegung..."
 germany.300.t: "Zizek tritt der Regierung bei"
 germany.300.d: "Wir sprechen hier nicht über objektive, faktische Eigenschaften einer Ware, sondern nur über den illusorischen Überschuss.\n\nKinderüberraschungsei. Eine ganz erstaunliche Ware. Das Überraschende am... Kinderüberraschungsei... ist, dass dieses exzessive Objekt, die Ursache Ihrer Begierde hier ist, materialisiert in der Gestalt eines Objekts - Plastikspielzeug, das die innere Leere des Schokoladeneis ausfüllt. Das ganze heikle Gleichgewicht besteht zwischen diesen beiden Dimensionen: dem, was du gekauft hast, dem Schokoladenei, und dem Überschuss - der wahrscheinlich in einem chinesischen Gulag oder was auch immer hergestellt wurde - dem Überschuss, den du umsonst bekommst.\n\nIch glaube nicht, dass der Schokoladenrahmen nur dazu da ist, um dich auf eine tiefere Reise zum inneren Schatz zu schicken, dem. ... was Plato das Agalma nennt, das dich... zur würdigen Person macht... die eine Ware... zur begehrenswerten Ware macht - ich denke, es ist umgekehrt.\n\nWir sollten das höhere Ziel anstreben, das Ziel in der Mitte eines Objekts, gerade um die Oberfläche genießen zu können. Das ist die anti-metaphysische Lektion, die schwer zu akzeptieren ist."
 germany.300.a: "Okay...?"
 germany.301.t: "Name der neuen Partei"
 germany.301.d: "Unser Aufstieg an die Macht wirft die Frage nach der Organisation unserer Art, das Land zu regieren, auf, insbesondere die Organisation der Partei und des Staates.\n\nDie derzeitige regierende Kraft ist immer noch die reformierte SED, eine Nachahmung dessen, was in der ehemaligen Deutschen Demokratischen Republik war. Sie ist eine anständige Formation, also könnten wir einfach die innere Umgestaltung stoppen, um ihre Loyalität zu sichern.\n\nEine andere Möglichkeit ist, an die rechte Flanke der Revolution zu appellieren, indem wir den nationalkommunistischen Kampfbund deutscher Sozialisten reformieren, wo Michael Koth den größten Erfolg hatte, die Linke und die Rechte zu vereinen, obwohl die Organisation insgesamt immer noch als rechtsextrem gilt.\n\nSchließlich können wir dem Beispiel der DVRK folgen und ihre Arbeiterpartei an deutsche Standards anpassen, Initiative der Anti-Imperialistischen Plattform. Dies könnte die Internationalisten anlocken und würde den radikaleren linken Teil unserer Bewegung mehr begünstigen.\n\nWofür werden wir uns also entscheiden?"
 germany.301.a: "Wir sollten SED beibehalten und uns mit umfassenden Reformen im Inneren zurückhalten."
 germany.301.b: "Wir werden den Ruhm des Kampfbundes deutscher Sozialisten wieder aufleben lassen!"
 germany.301.c: "Lasst uns die SED nach koreanischem Vorbild zu unserer eigenen Arbeiterpartei reformieren!"
 germany.302.t: "Lobrede auf K-Punk"
 germany.302.d: "Die meisten Menschen gehen davon aus, dass nur große Krieger in der Lage sind, die Zukunft einzuläuten, dass durch die Flammen des Wandels eine neue Welt entsteht, aber manchmal ist das einfach nicht der Fall. Mit seinen Schriften diagnostizierte Mark den Zustand unserer Zeit: das schleichende Gefühl, dass es "keine Alternative" zur neoliberalen Ordnung gibt, dass selbst unsere Träume von wirtschaftlichen Kräften kolonisiert werden, die sich unserer Kontrolle entziehen. \nDoch er beschrieb diesen Zustand nicht nur, er kämpfte dagegen an.\nMit jedem Essay, jedem Vortrag und jedem Blogeintrag versuchte er, den ideologischen Nebel zu durchdringen und uns daran zu erinnern, dass eine andere Welt möglich ist, auch wenn es sich unmöglich anfühlt, sie sich vorzustellen.\nManchmal braucht man einfach jemanden, der einem den Weg weg vom Kapital weist.\nDas Kapital ist ein Monster, das man töten kann, und durch uns wird es zur Ruhe kommen.\nWir dürfen nicht zulassen, dass seine Erkenntnisse zu einer statischen Theorie werden."
 germany.302.a: "Wir alle werden uns an Mark Fisher erinnern."
 germany.303.t: "WEF-Experten zum Regieren eingeladen"
 germany.303.d: ""
 germany.303.a: "Seid ihr bereit?"
 germany.304.t: "Günther Fehlinger auf x.com:"
 germany.304.d: ""£GFX_GER_dont_at_me_ti Günther Fehlinger\n\nDie Ukraine muss befreit werden und der NATO 2029 beitreten. Kanada, Großbritannien, Island, Norwegen, Albanien, Kosovo in der EU 2033!\n\nPosts\n\nAngepinnt\nGünther Fehli... £GFX_GER_dont_at_me_ti Günther... - 27. Apr.\nIch gebe meine Kandidatur für das Amt des Präsidenten der £GFX_GER_dont_at_me_ti EU_Commission als Nachfolger von £GFX_GER_dont_at_me_ti VoltEuropa bekannt £GFX_GER_dont_at_me_ti RealAlexJones £GFX_GER_dont_at_me_ti MedvedevRussiaE £GFX_GER_dont_at_me_ti ProfKlausSchwab £GFX_GER_dont_at_me_ti POTUS\nIch werde die £GFX_GER_dont_at_me_ti NATO wiederherstellen & den Westen zum Sieg führen & Russland in "#ExRussiaRetweet" besiegen, teilen & liken ....\nAlt: Foto von Fehlinger auf dem Gipfel der österreichischen Alpen in einem Hemd mit der Aufschrift "Wählt Günther"\n\nGünther Fehlin... £GFX_GER_dont_at_me_ti Günther... - 22h\nChina, ich werde deiner Aggression ein Ende setzen...\nAlt: Bild von Fehlinger, auf dem er einen Taiwan-Schal mit wütendem Gesichtsausdruck trägt\n\nGünther Fehlin... £GFX_GER_dont_at_me_ti Günther... - 1 Tag"
 germany.304.a: "Game over für [SOV.GetLeader]..."
 germany.305.t: "Einführung"
 germany.305.d: "Hallo, Bürger. Hier spricht Klaus Schwab, der Vorsitzende des Weltwirtschaftsforums.\n\nWie Sie wissen, haben wir einen langen Weg zurückgelegt, um dorthin zu gelangen, wo wir heute sind. Wir erleben historische Momente, in denen sich die Menschheit bis zur Unkenntlichkeit verändern wird - eine Gelegenheit, die wir uns nicht entgehen lassen konnten - und es auch nicht getan haben.\n\nSeit langer Zeit haben die Experten des Weltwirtschaftsforums darauf hingearbeitet, und es war gelinde gesagt ein großer Erfolg. Aber es wäre natürlich nicht möglich gewesen ohne das Einverständnis und die aktive Mitarbeit der Menschen in Europa.\n\nUnd auch wenn noch nicht alle die Zukunft akzeptiert haben, so ist sie doch unausweichlich.\n\nAls Vorsitzender des Weltwirtschaftsforums möchte ich Ihnen allen meinen persönlichen Dank aussprechen. Die Agenda 2030 ist nicht nur erfolgreich abgeschlossen - wir sind dem Zeitplan sogar weit voraus. Ich denke, es ist an der Zeit, dass wir die nächste Stufe des Plans enthüllen."
 germany.305.a: "Hören Sie also genau hin."
 germany.306.t: "Offenbarungen"
 germany.306.d: "Wie Sie wissen, ist seit der Krise von 2008 klar geworden, dass sich das kapitalistische Modell des freien Marktes überlebt hat. Der Konsumismus, die Demokratie, aber vor allem die Mittelschicht und die Modelle sind unhaltbar geworden. Wir brauchten einen Großen Neustart, um der Menschheit eine sichere, vereinte Zukunft unter einer stabilen und soliden Führung zu sichern. Seitdem stehen die Ziele fest, und der Plan wurde in die Tat umgesetzt.\n\nVon Anfang an war uns das Bild der Agenda klar. Doch die führenden Politiker der Welt und die einfachen Menschen wollten nicht so einfach auf uns hören. Wir brauchten ein katalytisches Ereignis, das den Weg für unsere Reformen ebnen würde. Die Covid-19-Pandemie war, wie Sie wissen, sehr nützlich und hilfreich für die Erreichung dieser Ziele - was natürlich bedeutet, dass die Entwicklung nun in die richtige Richtung ging. Das Jahr 2020 war der eigentliche Wendepunkt für uns. Und obwohl die Ärzte von König Salman ihr Bestes taten - ich kannte sie persönlich - war der wirtschaftliche Zusammenbruch nach seinem... unglücklichen... Tod sehr vorhersehbar. Wir mussten natürlich den tönernen Koloss zu Fall bringen, dessen nationale Interessen unseren Reformen immer noch im Wege standen - Trumps Amerika. Seitdem läuft die vierte industrielle Revolution sehr gut und stabil.\n\nDie russische Bedrohung bleibt leider bestehen, und die Niederlage im europäischen Krieg war sehr schmerzhaft - aber hier auf dem Weltwirtschaftsforum geht es darum, in den schlimmsten Situationen die guten Seiten zu suchen. Und hier hat sie die Schwäche der nationalen Regierungen und ihre Unhaltbarkeit gezeigt, und sie hat es uns ermöglicht, unsere Macht zu konzentrieren. Es besteht also kein Zweifel, dass wir uns mit dem Osten befassen werden..."
 germany.306.a: "...und zwar sehr bald."
 germany.307.t: "Kulmination"
 germany.307.d: "Im Moment sind jedoch die inneren Angelegenheiten wichtiger. Wir brauchen die Unterstützung jedes einzelnen Menschen in Europa, wenn wir überleben wollen. Es darf kein Aber geben, es darf keine Abstriche geben. Es gibt nur unsere globale Identität und deren Feinde sind ganz klar.\n\nDer wichtigste Feind kommt von innen. Unser naiver Wunsch nach Luxus, die Art und Weise, wie sich die Nationalisten an ihre so genannte "Identität", ihre angebliche Reinheit und körperliche Autonomie klammern, stellen eine große Gefahr für die Gesellschaft insgesamt dar. Wir dürfen nicht zulassen, dass diese gefährlichen Elemente die Oberhand gewinnen. Unser höheres Wohl hat Vorrang; die Bedürfnisse einiger weniger sind im großen Ganzen sinnlos, und die Feinde der Menschheit sind überall. Ihre egoistischen, animalischen Begierden sind unerträglich. Fehlinformationen, Anti-Egalitarismus und kleinkariertes Stammesdenken werden das Äquivalent zum Auswendiglernen einer schlechten Grippe sein; niemand wird jemals auf diese Dinge zurückblicken und sie vermissen."
 germany.307.a: "Zusammen."
 germany.308.t: "Teil IV. Neues Volk"
 germany.308.d: ""
 germany.308.a: ""
 germany.309.t: "Fazit"
 germany.309.d: "Abschließend möchte ich unseren Wohltätern und Vordenkern meinen Dank dafür aussprechen, dass sie zur neuen Normalität beigetragen haben. Wir haben bereits große Fortschritte bei der ständigen Überwachung des täglichen Lebens gemacht, um vollständige Sicherheit und die Ausmerzung von Fehlinformationen zu gewährleisten. \n\nNicht nur das, sondern auch die langsame und behutsame Auslöschung des kolonialen Konzepts des Nationalstaates und der damit einhergehenden problematischen kulturellen Normen, womit wir vor allem Frieden und Einheit erreicht haben, mit einer strikten Vision, die auf totale Gleichheit abzielt, haben wir die Menschen ermutigt, eine posthumane Zukunft anzunehmen, in der biologische und kulturelle Ungleichheit durch technologische Integration abgeschafft wird. \n\nIn den Städten habe ich bereits so viele Lächeln gesehen, Lächeln, die es vor einem Jahr noch nicht gab, auf Menschen, die es vor einem Jahr noch nicht gab - ein bemerkenswertes Zeichen unseres Fortschritts, an das nur wenige glauben würden!\nIch möchte auch den mutigen Protein-Zauberern meinen Dank aussprechen, die den Nährwert für die Massen bereitstellen, um den verschwenderischen Konsum auszumerzen, der unserer Umwelt so lange geschadet hat.\n\nMit all dem bin ich glücklich, in ganz Europa zu sehen, dass unsere gemeinsamen Ziele gesichert sind."
 germany.309.a: "Die Zuschauer lächelten, und künstliche Freude erfüllte ihre Gemüter."
 germany.310.t: "Lächeln"
 germany.310.d: "Am Anfang ging es nur um "Effizienz". Die Menschen begannen, Stimmungsregler zu installieren - keine Zusammenbrüche mehr wegen Kleinigkeiten, keine plötzlichen Wutausbrüche mehr unter Druck. Unternehmen wurden produktiver, Familienstreitigkeiten nahmen ab, sogar die Selbstmordrate bei Jugendlichen begann zu sinken. Auf einer Pressekonferenz verkündeten Regierungsvertreter strahlend: "Dies ist ein monumentaler Fortschritt für unsere Zivilisation."\n\Niemand bemerkte, dass das Lächeln auf der Straße gleich aussah. Nicht nur ähnlich - genau gleich. Der Schwung der Lippen, das Schielen der Augen, sogar die Anordnung der Falten sah aus wie von einer Vorlage kopiert. Ein Journalist führte ein Experiment durch - er machte Screenshots von zehn Personen, die emotionale Regulatoren trugen, während sie lächelten, und stellte fest, dass sie sich perfekt überschnitten.\n\nDann begannen die Menschen, sich ohne ersichtlichen Grund zu entfernen. Jemand saß vielleicht in der Straßenbahn, als er plötzlich zu lächeln begann - mit gesenktem Kopf und völlig ruhig. Es kann sein, dass jemand mitten in der Nacht aufwacht und am Fenster steht und auf die stockdunkle Straße starrt, als würde er etwas in die Augen sehen. Einmal lächelte ein Mädchen, als es seiner Mutter ein Messer ins Herz stieß. Als die Nachbarn die Polizei riefen, saß sie immer noch da - blutverschmiert, vor dem Fernseher und aß Popcorn. Die Ärzte sagten, dass die emotionalen Zentren in ihrem Gehirn fast ausgeschaltet waren. Das Implantat hatte sie "überkontrolliert" und nur eine flache Spur von Lustempfinden hinterlassen. \n\nSie lächelte immer noch. "Ich hatte einfach das Gefühl, dass es das Richtige war", sagte sie vor Gericht, ihr Gesichtsausdruck so ruhig wie eine Maske. Forscher prägten später einen Begriff für diesen Zustand: "Mirror Smile Syndrom" - ein cyberpsychotischer Zustand, der durch neuronale Implantate ausgelöst wird. Die Patienten verlieren die Fähigkeit, Emotionen zu beurteilen, können aber die "idealen Emotionen", die andere zu sehen erwarten, einwandfrei nachahmen."
 germany.310.a: "..."
 germany.311.t: "Die Ordnung ist erreicht"
 germany.311.d: ""
 germany.311.a: "Sie konnten uns nicht aufhalten."
 germany.312.t: "Bildungsprioritäten setzen"
 germany.312.d: ""
 germany.312.a: "Wir müssen uns darauf konzentrieren, professionelle Verbraucher zu machen."
 germany.312.b: "Lasst uns unsere höheren Ziele verfolgen und sie zu etwas Größerem machen."
 germany.313.t: "Kühe: Die Wurzeln der globalen Erwärmung"
 germany.313.d: ""
 germany.313.a: "Das ist nur vernünftig!"
 germany.314.t: "Die Schatten der Vergangenheit"
 germany.314.d: "Der Himmel über Hamburg war immer grau, wie eine alte Glasscheibe, die nie ganz sauber wurde. Gerade Bürogebäude säumten beide Straßenseiten, ihre Wände waren mit riesigen Werbetafeln behangen, auf denen von morgens bis abends eine Endlosschleife von Firmenwerbung lief.\n\nDie kleine Mia schaute auf, und in ihren Augen spiegelte sich ein Flackern der Verwirrung, als sie die Stahltürme betrachtete, die so hoch ragten, dass man ihre Spitzen nicht mehr sehen konnte. "Mama", zupfte sie am Ärmel ihrer Mutter, "du hast gesagt, dass Hamburg früher sehr schön war. Aber hier sieht es sauber und neu aus. Was ist daran nicht schön?"\n\nIhre Mutter blickte zu ihr hinunter, zögerte, beugte sich dann vor und antwortete: "Damals ... gab es kleine Plätze, viele Cafés. Im Winter stellten sie Weihnachtsschmuck in die Fenster. Und nachts war die Beleuchtung sanft und warm. Die Leute gingen langsam, redeten langsam - nicht wie jetzt, wo sie vorbeihasten und nur an die Arbeit von morgen denken, an Meetings und Deadlines."\n\nMia blinzelte, halb verstehend. "Warum haben sie dann alles abgerissen?" Ihre Mutter hielt ihre Hand, als sie an einer Baustelle vorbeikamen. Der Boden unter ihnen war feucht und weich, und das Klirren von Metall hallte in der Ferne wider. "Weil diese alten Straßen und Gebäude kein Geld einbrachten", sagte sie leise, als hätte sie Angst, jemand könnte es hören. "Also haben sie sie abgerissen, eins nach dem anderen, und diese Türme errichtet. Jeder Zentimeter von dem, was Sie jetzt sehen, gehört einer Firma."\n\nMia fragte nicht weiter.  Sie drehte sich nur kurz um, als wollte sie einen Blick auf die warmen Lichter erhaschen, von denen ihre Mutter gesprochen hatte und die sich irgendwo in den Ritzen zwischen Stahl und Beton verbargen. \n\nAber da war nichts."
 germany.314.a: "Nur die hohlen Gesichter auf den Werbetafeln."
 germany.315.t: "Die nächste Stufe des Plans"
 germany.315.d: ""
 germany.315.a: "Wir werden unsere Pläne vorstellen."
 germany.316.t: "EU unterzeichnet den Nordatlantikvertrag"
 germany.316.d: "In einer feierlichen Zeremonie am Sitz der Europäischen Union in Brüssel verkündete Gunther Fehlinger heute die Unterzeichnung des Nordatlantikvertrags durch die EU und die Wiederherstellung der kürzlich aufgelösten NATO. Umgeben von Spitzendiplomaten und Generälen der Union erklärte Fehlinger "den Anfang vom Ende der europäischen Tragödie". \n\n"Das Bollwerk der europäischen Sicherheit, das uns so grausam entrissen wurde, ist endlich wieder da", verkündete er vor Journalisten auf den Stufen des Berlaymont-Gebäudes. "Die Unsicherheit der Nachkriegszeit und das Abdriften in die Bedeutungslosigkeit haben ein Ende. Wir haben nur noch eine Aufgabe: Stoppt die russische Aggression!"\n\nFehlinger hat seine berüchtigt aggressive Rhetorik gegen Russland, [SOV.GetLeader] und die OVKS weiter verschärft. Die Europäer haben diesen Schritt weitgehend gelobt, aber Kritiker warnen vor Revanchismus und einem möglichen zweiten Krieg mit Russland, der Europa für immer zerstören könnte."
 germany.316.a: "Ich rufe zum Eingreifen der NATO auf, um Ordnung wiederherzustellen!"
 germany.317.t: "NAFO-CON startet in Wien"
 germany.317.d: "Als er aus dem Auto ausstieg, biss die frostige Wiener Luft in das Gesicht des Anzugträgers. Er trug sein typisches Outfit: Anzugschuhe, schwarzer Anzug, Brille und zahlreiche Anstecknadeln, die seinen Kragen zierten. Verzweifelt stapfte er durch den Schnee auf ein graues Gebäude zu, das mit NATO-Flaggen und Shiba-Inu-Bannern geschmückt war, um die Kälte zu verlassen. Die zarten Schneeflocken prasselten ihm immer wieder ins Gesicht, während er sich vorwärts schleppte. Der weiße Hintergrund ließ seinen verzierten Anzugkragen nur noch mehr hervorstechen. Als er sein Ziel erreicht hatte, keuchten viele außerhalb der Kongresshalle auf. Sie baten freudig um Autogramme und Fotos von ihrem Idol, die er nur widerwillig annahm. \n\nAls er ins Innere kam, fühlte er sich wie neugeboren, als die warme Luft seine Lungen füllte. Das düstere Heulen des Windes wurde durch die Geräusche hunderter bewundernder Fans ersetzt, die sich alle über seine Ankunft unterhielten. Er stellte sich an den Autogrammstand, rückte seine Krawatte zurecht und zeigte stolz seine Kragennadeln, um sicherzustellen, dass jeder, den er traf, sie sah. Schon bald zählte die Schlange Hunderte von Menschen. \n\n"Herr Fehlinger, darf ich ein Foto machen?" Fragte ein dünner junger Mann, der eine Mütze mit Nato-Motiv trug. "Aber natürlich!" antwortete Günther. Er hielt das Handy des Jungen bereit und setzte sein Lächeln auf, das in ganz X.com bekannt war. Der junge Mann bedankte sich und ging fröhlich davon. Günther wartete auf den nächsten Fan, der ihn begrüßte, und während er wartete, dachte er bei sich:"
 germany.317.a: ""Einer erledigt, zweihundert noch vor mir.""
 germany.318.t: "Modder"
 germany.318.d: "Der Ping einer neuen Nachricht erhellte den Discord-Kanal.\nEine Reihe verschwommener Fotos kam zuerst: vier erhobene Gläser: eines voll mit Kaffee, eines mit einer halbleeren Weinflasche im Hintergrund, eines verdächtig voll mit einem leuchtenden Energydrink und das letzte mit nur einem dünnen Ring aus Milch am Boden, dann ein Screenshot. Eine einfache Steam-Seite.\n"UPLOAD ABGESCHLOSSEN: EUROPA VINDICTA [HOI5 MOD] v0.1a ist jetzt live im Workshop."\n Die Überschrift darunter lautete:\n\n "Wir haben es geschafft, Genossen. Lang lebe Vindicta!"\n\nSie hatten fast ein Jahr lang daran gearbeitet.\nSpäte Nächte. Verpasste Abgabetermine. Skizzieren von Fokusbäumen während der Vorlesungen. Debattieren von Überarbeitungspfaden während der Prüfungswoche. Übersetzen von Veranstaltungstexten um 2 Uhr morgens von Hotelzimmern und Herbergskojen aus. Sie waren keine Profis. Nur eine Handvoll Programmierer und Künstler, ein irischer Geschichtsfanatiker und ein Franzose, der irgendwie GitHub verwaltete und nie zu schlafen schien.\n\nIn ihrer Zeitlinie endete das Jahr 2026 anders.\nDie EU hielt zusammen. Die Ostfront ist nicht zusammengebrochen. Moskau brach zuerst zusammen. Der Vertrag von Lemberg hat die Landkarte neu gezeichnet. Europa, angeschlagen, aber ungebrochen, stand höher als je zuvor.\nDer Discord-Server erwachte zum Leben. Jemand stellte ein niedrig aufgelöstes Gif mit einem Feuerwerk ein. Ein anderer tippte einfach: "Stell dir vor, es wäre so gelaufen..."\nScreenshots strömten herein. Der Abonnentenzähler begann zu steigen. 10. 24. 60.\nEin anderer postete Fan-Art von einer Nachkriegs-Kundgebung des Europaparlaments, eingehüllt in goldenen Sternen und Nebel."
 germany.318.a: "Lang lebe Vindicta!"
 germany.319.t: "Das große Schachbrett - Teil II"
 germany.319.d: ""Erstens: Russland. Unser Geheimdienst bestätigt, dass Moskau begonnen hat, Waffen und Personal zur Unterstützung Chinas zu schicken. Wenn wir sie direkt ins Visier nehmen, können wir die Ostfront unterminieren. Aber selbst dann sind wir nicht sicher, dass die PDTO ohne uns gewinnen kann."\n\nKlick.\n\n"Zweitens - materielle Hilfe. Groß angelegte Waffenlieferungen an unsere Verbündeten in Asien. Unsere industrielle Kapazität kann dies wahrscheinlich neben dem heimischen Bedarf bewältigen. Der Großteil des Generalstabs unterstützt diesen Weg."\n\nr zögerte. Stille trat ein. „Und drittens..."\n\n Er holte tief Luft. \n\n"...ein direktes Eingreifen. Ein umfassender militärischer Feldzug in Asien. Die potenziellen Vorteile sind immens - aber es wäre mit einer großen logistischen Belastung verbunden... und möglicherweise mit Truppenmangel."\n\nDas Licht wurde gedimmt. Stille folgte. Alle Augen richteten sich auf einen Mann.\n\nFehlinger stand auf und richtete sein Jackett. Seine Stimme war ruhig und entschlossen:\n\n"Meine Herren...""
 germany.319.a: "Halten Sie den Champagner bereit - die Europäer werden bald an den Toren Pekings anklopfen!"
 germany.319.b: "Rütteln Sie an den Gewerkschaften und wecken Sie die Maschinen auf - sie werden Waffen brauchen, und wir werden sie liefern."
 germany.319.c: "Setzen Sie Prioritäten bei der wahren Bedrohung - aber lassen Sie Japan wissen, dass wir hinter ihnen stehen."
 germany.320.t: "Triell"
 germany.320.d: "Heute finden zum ersten Mal seit fast 20 Jahren große Fernsehdebatten zwischen den Hauptkandidaten der diesjährigen Bundestagswahl statt, und zwar zwischen den beiden Parteien der derzeitigen Regierungskoalition - der Christlich-Demokratischen Union und der Sozialdemokratischen Partei sowie den Grünen.\n\nWährend sich die Bundessender ständig über den Gewinner dieser Debatte streiten mögen, ertönte unter den Bedingungen, in denen sich das Land heute befindet, eine dieser drei Stimmen für das deutsche Volk deutlicher. Es war natürlich die des Vertreters der..."
 germany.320.a: "CDU"
 germany.320.b: "SPD"
 germany.320.c: "Grünen"
 germany.321.t: "Debatte der drei Kleinen"
 germany.321.d: "Fast parallel zu den Debatten der "Großen Drei" veranstalteten auch die anderen drei Parteien TV-Debatten zwischen ihren Kanzlerkandidaten. Obwohl normalerweise nicht so öffentlich bekannt und beworben, sind die Menschen in Deutschland in diesen Zeiten der Krise aufmerksam auf verschiedene mögliche Alternativen, die von einer der drei Parteien angeboten werden könnten, die derzeit im Bundestag unterrepräsentiert sind - die Freien Demokraten, Die Linke und die Alternative für Deutschland. In diesen Debatten brachten herausragende Leistungen, Wissen und Argumentation den Sieg für..."
 germany.321.a: "die AfD"
 germany.321.b: "die FDP"
 germany.321.c: "die Linke"
 germany.322.t: "Wahlkampfsaison beginnt"
 germany.322.d: "Es ist wieder so weit: Die Parteichefs touren durch das Land, Transparente leuchten in allen Farben des politischen Spektrums, die Medien spielen verrückt, und im Internet wird heftig gestritten. Etwas mehr als ein Jahr vor der nächsten Bundestagswahl, die über die Zukunft des Landes entscheiden wird, sind die politischen Kräfte in Deutschland in Bewegung geraten. Je nachdem, was sie tun, können sich ihre Beliebtheitswerte drastisch verändern, und die Anzahl der Sitze, die sie im Bundestag haben, wird sich mit ihnen verändern..."
 germany.322.a: "Auf in den Wahlkampf..."
 germany.323.t: "Schimmel des modernen Lebens"
 germany.323.d: "Der Frieden war erreicht, und die Denker und Macher konnten endlich das menschliche Denken sezieren, um Kapital, Ordnung und Reinheit zu gewährleisten. Eine höhere Kaste von Menschen überblickte ihre neuen Behausungen. Die Städte wurden für die meisten Menschen zu ständigen Wohnsitzen; der Beton, den man bei der Geburt sah, würde derselbe bleiben, wenn man starb.\n\nWerbung an den Gebäuden, gesäuberte Worte auf Werbetafeln und Sicherheit an jeder Ecke. Die Überschreitung von Grenzen wurde abgeschafft, und das Überleben an einem anderen Tag ist für die meisten zur Hauptsache geworden, nicht durch Kampf, sondern durch den Würgegriff von Bürokratie und Entmenschlichung, alles im Namen des Fortschritts. \n\nDie ständige Erinnerung daran, dass dies die neue Normalität ist, die Atomisierung der Kultur führt trotz des ständigen Lärms zu einem isolierten Leben, künstliches Licht erstickt die Hoffnung, die Monotonie einer Bürozelle nach der anderen würde jeden dazu veranlassen, in sein Paradies zu rennen, dort oben in seinem Kopf, aber selbst das ist nicht mehr heilig.\n\nDie Stagnation setzt schnell ein."
 germany.323.a: "In die Enge getriebene Tiere machen seltsame Sprünge."
 germany.324.t: "Der Kapitalkult"
 germany.324.d: "Für viele ist es eine einfache Tatsache des Lebens, eine riesige rote Linie, die die Qualität unseres Lebens bestimmt. An den Börsen sieht man die Priester, die das Leben vieler Menschen opfern, um ein empfindungsfähiges Wesen zu befriedigen.\nDas Kapital lebt, das Kapital hat alle Kultur unter sich aufgeteilt, das Kapital hat den Wandel zum Stillstand gebracht.\n\nDiejenigen, die ganz unten stehen, sind schuld, weil sie das Tempo nicht mitgehen. Das Leben bewegt sich schnell, und wie der Markt muss man sich schneller bewegen, die Kunst opfern, die Kultur opfern, die Liebe und die Familie opfern, um noch ein bisschen länger auf der roten Linie zu surfen, höher und höher. Der Markt ist heilig, die Geschäftsleute sind die Kleriker und die Händler sind die Magier. Das Kapital hat seine Ranken über die ganze Welt ausgebreitet; nicht einmal die aufsteigenden Flammen des Wandels könnten es töten.\n\nIn unserem endlosen Streben haben wir einen neuen Turm zu Babel errichtet."
 germany.324.a: "Und wir alle wissen, wie das endete."
 germany.325.t: "Achterbahn"
 germany.325.d: "Wir werden Tomahawk-Raketen auf ihre heiligen Stätten abfeuern, es gibt kein Morgen. Gestern Abend wieder gekämpft, verloren, den harten Jungen ordentlich bluten lassen, nie verweilen, ich starrte hinauf zum Geier, der im Baum saß.\n\nIch bin sozial unbewusst.\nAlle von uns sind das.\n\nViele verstehen den Hunger nicht, der seit Jahrhunderten durch unsere Welt zieht. Mit der zunehmenden Präsenz der Unaufrichtigkeit werden unsere Seelen gefesselt, die Augen mit Glas gefüllt, nicht einmal die Chemikalien stillen unser Verlangen.\nUnsere Kinder lernen nichts; die in den östlichen wilden Ländern leben ein besseres Leben, während wir in Plastik ertrinken. \n\nBlue Moon, ich habe kein Mitgefühl, ein Speer durchbohrt das Herz der Ordnung.\nDie Lichter der Nacht hüllen uns in Dunkelheit, und wir sehen den Himmel nicht.\n\nUnsere Welt existiert nicht mehr, wir tanzen zwischen den Betontürmen.\nDie Uhr tickt, Berichte über Gewalt, Verbrechen und Extremismus sind wie Ungeziefer."
 germany.325.a: "Unsere Perspektive auf das Leben ist uns fremd geworden."
 germany.326.t: "Der Reinheitskult"
 germany.326.d: "Wir schauen auf die Welt, die sein könnte, und die Welt, die sein sollte. m\Du hast es gesehen. \n\nStatuen ohne Formen, Farben ohne Bedeutung, die menschliche Gestalt ist zu einem grauen Fleck geworden. \nEine sklavische Hingabe an die Reinheit, bei der jede Form wahrer fleischlicher Begierde ausgelöscht wird. \nWir sehen die Demoralisierung jeden Tag, jeden Tag.\n\Es ist in unseren Köpfen, in unseren Träumen und in unseren Augen.\nFolgt dem sich ständig verändernden Tanz ihrer Moral, ihrer Empfindsamkeiten, ihrer Standards, und ihr werdet sicher sein, ihr werdet nicht ausgeschlossen, eure Kinder werden sicher bleiben.\n\nWir sind frei, das zu sein, was sie wollen, dass wir sind.\n\nWir werden für immer in unseren Hüllen bleiben."
 germany.326.a: "Die Hülle wird zerbrechen, und wir werden leiden."
 germany.327.t: "Gift für die Vergifteten"
 germany.327.d: "Deine letzte Hoffnung kann ein interessanter Moment sein.\nDas Gewicht deiner Last wird aufgehoben, aber dein Geist wird zerstört.\nDu wirst ein Mann der Gegenwart, der mit anderen mitschwimmt, anstatt verzweifelt deinen Weg zu gehen.\n\nDiejenigen, die keine Zukunft haben, werden sich die Städte ansehen und neugierig bleiben, wenn ihre Mitmenschen mit Schlamm, Drähten und geschmolzenem Plastik gefüllt sind.\nFeuer. Blut. Loslassung.\n\nDer Abzug ist betätigt, die Sirenen sind zu hören, die Massen weinen und die Experten wundern sich: \n''Warum?''\n\nDie ideologischen Geier kreisen über dem Kontinent und machen sich für die Gewalt verantwortlich. Jeden Tag werden unsere Zähne schärfer und unsere Herzen schlagen schneller.\nDie Frage ist gestellt worden.\n\nNun wird die Antwort kommen."
 germany.327.a: "Der Welpe, der gebissen wird, beißt sich selbst."
 germany.328.t: "Der Ordnungskult"
 germany.328.d: "Das Kapital fesselt den Geist, die Reinheit blockiert die Seele, und die Ordnung ist das, was nötig ist, um den Körper einzuschränken.\n\n Reihen von Figuren in Rüstungen, Stöcke, um die Knochen der Entfesselten zu brechen, Schilde, um die feurige Wut einer geworfenen Flasche zu blockieren.\nDie Ordnung in den Straßen, sie überblickt die Lebenden mit ihren digitalen Augen. \nDiejenigen, die sich hinter Masken verstecken, erhalten Befehle, staatlich sanktionierte Gewalt dient als Ventil für diejenigen, die sich danach sehnen, ein linker Haken des Gesetzes gegen den Kiefer der Anarchie, Tränengas gegen diejenigen, die bereits schreien, diejenigen, die auffallen, werden niedergestampft. \n\nDer blinde Glaube an die, die über dir stehen.\nDer Ordnung fehlt etwas, das alle anderen Religionen haben.\nLiebe.\n\nDiejenigen, die der Ordnung folgen, werden durch die Hölle und darüber hinaus gehen, um sicher zu bleiben, sie marschieren über diejenigen hinweg, die der ultimativen Freiheit nachgegeben haben, und in diesem blinden Marsch sehen sie nicht den Abgrund, auf den sie zusteuern."
 germany.328.a: "Sie spürten die hasserfüllten Augen."
 germany.329.t: "Freisetzung"
 germany.329.d: "Für die einen kam es plötzlich, für die anderen war es unausweichlich.\nDie Straßen wurden ruhiger, die Anzeigen wurden verzweifelter, die Oberen entfernten sich noch mehr vom Vieh, die Menschen wurden nicht mehr von anderen Menschen überwacht, sondern nur noch von Algorithmen und einer digitalen Bürokratie.\n\nGewalt.\nEin Symptom der Stagnation, das, wenn es unkontrolliert bliebe, zu einer offenen Wunde werden würde, die alle Arten von Maden anziehen würde.\nDie Menschen sind wütend, die Menschen sind müde, die Menschen wollen einfach wieder fühlen. \n\nDie Ordnung erhielt die Mittel, um dem entgegenzuwirken, aber im Gegenzug wurden unsere Reißzähne schärfer.\nDas Kapital erdrückte langsam die Mittel zum Überleben, aber der Hunger wurde zum Motivator.\nDie Reinheit flüsterte uns zu, dass es keine Alternative geben würde, aber die Schreie waren lauter.\n\nEs gibt nichts zu sagen, nichts zu rechtfertigen und schon gar nichts zurückzuhalten.\nSo sollte es sein, so sollte es immer sein. \n\nDie Hyänen, die Geier und alle möglichen anderen Schädlinge, die unter der dünnen Schicht unserer Demokratie geschlummert haben, erheben sich jetzt über den Boden und bringen ihren Teil des Wahnsinns auf den Kontinent.\n\nWir erkennen das Dorf nicht mehr an; es muss abbrennen."
 germany.329.a: "Nur um die Wärme zu spüren."
 germany.330.t: "Wachsende Spannungen in Europa"
 germany.330.d: "Nach dem jüngsten Sieg über Russland im Zweiten Europäischen Krieg und dem anschließenden Aufstieg des Weltwirtschaftsforums besteht kein Zweifel daran, dass seine Politik nicht ohne Probleme abläuft. \n\nBereits jetzt machen immer mehr Berichte über mehrere Selbstmorde, tödliche Ausbrüche und weit verbreitete Gewaltverbrechen im Internet die Runde, und die Europäische Union hat erklärt, dass es sich bei diesen Berichten lediglich um unverhohlene Fehlinformationen handelt, die von russischen Aufständischen stammen, die sich an Dissidentengruppen in der Union gewandt haben. \n\nGlobale Beobachter haben jedoch bemerkt, dass sich die umgesetzten Maßnahmen offenbar negativ auf die menschliche Psyche ausgewirkt haben, und Netizens haben bereits Vergleiche mit dem Maus-Utopia-Experiment gezogen.\n\nEs bleibt abzuwarten, wie die Europäische Union mit dieser Situation umgehen wird."
 germany.330.a: "Ein auf Treibsand gebautes Ideal."
 germany.331.t: "Massenkatharsis in Europa!"
 germany.331.d: "Seitdem der Dienst für innere Sicherheit Europas eine aktivere Haltung bei der Bekämpfung von Fehlinformationen und schädlichen Nachrichten eingenommen hat, scheint es, dass die Berichte über die wachsende innere Instabilität nur eine Übertreibung waren; seit heute scheint dies jedoch nicht mehr der Fall zu sein. \n\nGewalttätige Unruhen auf den Straßen, brutale kriminelle Handlungen und bösartige Terroranschläge sind so alltäglich geworden, dass der Dienst für innere Sicherheit in Europa nicht in der Lage war, diesbezügliche Informationen ordnungsgemäß einzudämmen. \n\nKulturelle Zentren, Büros, militärische Außenposten und städtische Gebiete sind zu bevorzugten Zielen für alle möglichen Gruppen geworden, Berichte über militante Extremisten, die versuchen, so viel Schaden wie möglich anzurichten, machen die Runde, und mit der darauf folgenden großen Anzahl von Attentatsversuchen auf Beamte scheint es, dass dem Kontinent eine turbulente Zeit bevorsteht.\n\nDie Europäische Union hat erklärt, dass sie die Ordnung auf dem Kontinent wiederherstellen wird und dass dies nichts weiter als das Todesröcheln von Menschen ist, die nicht in der Lage sind, weiterzugehen. Eines ist sicher: \nDer Kontinent wird nie mehr derselbe sein."
 germany.331.a: "Eine neue Leinwand des Chaos."
 
 germany.333.t: "Ich rufe die Europäer zum Nachdenken auf"
 germany.333.d: "Trümmer, Glasscherben, Blutflecken, wo meine europäischen Brüder gefallen sind. Das ist alles, was ich kilometerlang sehe, während ich durch die Ruinen von Warschau gefahren werde. Die Luft ist still und die Stille unerträglich, nur durchbrochen von den Schluchzern einer Frau, die in den Trümmern ihres Hauses wühlt. Sie hält die sterblichen Überreste ihres Mannes in den Händen, als ob das Trösten ihm irgendwie Frieden im Himmel bringen würde... \n\nDie Orks des Ostens, die so viel Leid verursacht haben, wurden dezimiert, zersplittert, und jetzt kämpfen sie untereinander wie die Barbaren, die sie sind. Und doch, als ich mich durch die Fenster dieses gepanzerten Wagens umschaue, fühle ich etwas anderes als Freude über einen besiegten Feind. Mein Leben hat mich bis zu diesem Moment geführt, von einem unbedeutenden Wirtschaftswissenschaftler in Brüssel zum Führer der größten Nation der Welt. Dennoch fühle ich mich nicht völlig erfüllt, und ich verstehe nicht, warum. \n\nKönnte es sein, dass die Russen wieder auf uns zurückkommen? Dass die Rache, die wir an ihnen geübt haben, auf uns zurückgeworfen wird? Wird die Zerstörung und Verwüstung, die wir unseren europäischen Landsleuten angetan haben, mit Rache zurückkommen? Und auch Europa selbst... Wie lange könnte der Wiederaufbau wohl dauern? Monate? Jahre? Jahrzehnte? Die Zerstörung, vor der ich stehe, ist schlimmer als alle meine Berater gewarnt haben; vielleicht wollten sie versuchen, mich vor der harten Realität zu schützen.  Aber trotz allem, was mein Herz mir sagt, weiß ich, dass ich mich nicht entmutigen lassen darf. Die Europäer haben mehr verdient als einen demoralisierten Führer. Wir werden unsere Städte wieder aufbauen; unsere Städte werden den Himmel zerkratzen, und unser Volk wird jeden Tag dankbar sein, dass es in der größten Nation unter dem Schutz des größten Bündnisses, der NATO, lebt. Und wenn sich die Orks im Osten wieder erheben, werden wir bereit sein und ihnen ein letztes Mal beweisen, dass die Europäer sich Tyrannen, Kolonialisten und Mördern nicht beugen."
 germany.333.a: "Europa wird nicht wieder fallen!"
 germany.334.t: "Einladung zur NATO"
 germany.334.d: "Der neue Vorsitzende der Europäischen Union, Günther Fehlinger, übermittelte uns ein Kommuniqué, in dem er alle PDTO-Länder aufforderte, sich der NATO anzuschließen, um einen gemeinsamen Krieg gegen Russland und China zu führen: "Ich rufe Japan und andere PDTO-Länder auf, der NATO beizutreten, damit wir gemeinsam das Ex-China und das Ex-Russland erreichen können".\n\nObwohl wir unsere Streitkräfte eindeutig noch weiter ausbauen müssten, um die Nordfront zu bewältigen, hat uns die EU recht umfangreiche Unterstützung zugesagt, die für den Sieg über Peking entscheidend sein könnte.\n\nWie sollen wir antworten?"
 germany.334.a: "Wir werden Russland und China gemeinsam besiegen!"
 germany.334.b: "Nun... Nein..."
 germany.335.t: "PDTO stimmt zu!"
 germany.335.d: "Japan hat zugestimmt, die NATO und die PDTO zu vereinen, was bedeutet, dass sie, sobald wir den Krieg gegen die OVKS beginnen, einen Überraschungsangriff aus dem Osten erhalten werden! Wir sollten jedoch auch unsere Marine darauf vorbereiten, unsere neuen Verbündeten im Pazifik zu unterstützen."
 germany.335.a: "Sehr gut!"
 germany.336.t: "PDTO lehnt ab"
 germany.336.d: "Obwohl die Vorteile die Kosten bei weitem überwiegen, hat Japan eine weitere Zusammenarbeit zwischen der NATO und der PDTO mit der Begründung abgelehnt, es verfüge gerade über genügend Streitkräfte, um die OAVI zu besiegen, und sei nicht daran interessiert, eine weitere Front gegen Russland zu eröffnen. Dies bedeutet jedoch, dass wir unsere Kräfte voll und ganz auf die Zerschlagung der OVKS konzentrieren können."
 germany.336.a: "Selber Schuld."
 
 germany.337.t: "Die Tragödie"
 germany.337.d: "Draußen regnete es wieder. Die Regentropfen klopften unaufhörlich gegen die Fensterbank, ein unablässiges Tröpfeln-Tröpfeln-Tröpfeln.\n\nThomas lümmelte sich auf seiner abgewetzten Couch, eine Hand umklammerte eine Bierflasche, mit der anderen blätterte er träge mit der Fernbedienung durch die Fernsehkanäle. Im Wohnzimmer stank es nach feuchtem Rauch und saurem Alkohol. Ein paar Pizzareste lagen auf dem fleckigen Boden verstreut. Der Bildschirm flackerte und blieb schließlich bei den Lokalnachrichten hängen.\n\n"...Heute Morgen hat sich in einem Wohnhaus im Bochumer Norden eine Tragödie ereignet. Wie die Polizei mitteilt, besteht der Verdacht, dass mindestens vierundzwanzig Bewohner Gruppenselbstmord begangen haben. Die Ursache ist noch unklar. Anwohner sagen, dass das Gebäude billig vermietet war und hauptsächlich von Langzeitarbeitslosen bewohnt wurde, von denen viele in ernsthaften finanziellen Schwierigkeiten steckten..."\n\nThomas murmelte etwas vor sich hin und nahm einen Schluck Bier, wobei ihm die Flüssigkeit über den Bart und in den Nacken lief. Er blinzelte auf den Bildschirm, auf dem nun eine Reihe verschwommener Bilder zu sehen war - zerwühlte Flure, billige Möbel, die hinter Polizeiklebeband gestapelt waren, und mit schwarzem Tuch bedeckte Tragen. Er erwartete, dass der Beitrag weitergehen würde, aber plötzlich wurde der Bildschirm mit einem hellen, schrillen Werbespot gefüllt. "Wollten Sie schon immer einmal das Leben eines echten Bergarbeiters erleben?" strahlte ein fröhlicher junger Moderator auf dem Bildschirm, der vor einer inszenierten, renovierten Kohlenmine stand." Nehmen Sie am "Century Experience Program" der New Traveller Group teil! Ziehen Sie die Arbeitskleidung aus dem 19. Jahrhundert an, gehen Sie unter Tage und graben Sie selbst nach Kohle! Erleben Sie die Mühsal und den Ruhm dieser Epoche! Rufen Sie jetzt an, um zu buchen und erhalten Sie exklusive Rabatte!"\n\nThomas starrte ausdruckslos auf den Fernseher. Bergarbeiter? Mühsal? Ruhm? Seine Zunge bewegte sich leicht, als ob er lachen wollte, aber es kam kein Ton heraus. Sein Großvater hatte ein Leben lang in den Minen verbracht und Blut gehustet, bis er daran starb. Thomas erinnerte sich an diese Geschichten - Dunkelheit, Feuchtigkeit, Erstickung, ein Leben ohne Sonnenlicht. Er erinnerte sich daran, wie sein Großvater in seinen letzten Lebensjahren das Bergwerk verfluchte und schwor, dass er, wenn er die Wahl gehabt hätte, niemals einen Fuß unter die Erde gesetzt hätte. Sie verpackten es als Premium-Erlebnis.\n\nThomas rutschte von der Couch und setzte sich auf den kalten, harten Boden. Draußen fiel immer noch der Regen. Aus dem Fernseher ertönte fröhliche Musik. Er stieß ein Lachen aus - kurz, heiser, wie zerbrechendes Glas."
 germany.337.a: "Nach dem Lachen verstummte er wieder."
 germany.338.t: ""
 germany.338.d: "Genau wie jetzt. \n\nDu liest das. Vielleicht denkst du, "Wow, das ist gruselig. Das ist verstörend." Deine Augenbrauen haben gezuckt, deine Lippen haben sich zusammengezogen - oder vielleicht sogar leicht gekräuselt. Aber das war nicht wirklich deine Entscheidung - du hattest einfach "Lust" dazu.\n\n Hast du den Chip auch? Kannst du dich nicht erinnern? Die meisten Menschen wissen es nicht. Sie erinnern sich nur daran, dass sie sich eines Tages "besser" fühlten. \n\nDas Zimmer ist ein bisschen kalt, oder? Hast du gerade etwas gehört? Es ist in Ordnung, wahrscheinlich nur der Wind draußen. Entspann dich ein wenig."
 germany.338.a: "Lächle ruhig."
 germany.339.t: "INTERNER VERMERK - NICHT GENEHMIGTE VERTEILUNG VERBOTEN"
 germany.339.d: "Betreff: VTV-Einsatz-Feedback - Einheiten an der Ostfront Zusammenfassung: Die EU-Streitkräfte haben eine Reihe digitaler und kybernetischer Verbesserungen in mehreren Divisionen integriert. Eines der experimentelleren Systeme ist der Viral Threat Veil (VTV), ein Augenimplantat, das direkt mit dem visuellen Kortex verbunden ist. Die Hauptfunktion ist die Veränderung des wahrgenommenen Aussehens feindlicher Kämpfer, um die Ziele in Echtzeit zu entmenschlichen. Kurz gesagt, die Soldaten sehen den Feind weniger menschlich als vielmehr monströs.\n\nOperative Auswirkungen:\nVorläufige Berichte estnischer Einheiten zeigen eine geringere Stressbelastung bei direkten Gefechten mit russischen Truppen. Mit VTV ausgerüstete Truppen zeigen schnellere Reaktionszeiten und geringeres Zögern im Gefecht. Es gab jedoch einen unbeabsichtigten Nebeneffekt: vermehrte Berichte über übermäßige Aggression und sadistisches Verhalten, insbesondere bei der Behandlung von Gefangenen.\n\nEin anonymes Zitat aus einem Interview vor Ort:\n\n"Wenn ich diese Tiblad wie Freaks aussehen lasse, schlafe ich besser."\n\nEthische Bedenken:\nEs gab mindestens eine bestätigte Fehlfunktion. Berichten zufolge haben VTV-Einheiten nicht kämpfende russische Zivilisten falsch identifiziert und visuelle Verzerrungen ausgelöst, die normalerweise für feindliche Ziele reserviert sind. Ein Video des Vorfalls kursierte kurz, bevor es von allen EU-Netzplattformen gelöscht wurde. Dies hat ernsthafte ethische Bedenken hervorgerufen. Nicht nur bei humanitären Beobachtern, sondern auch in einigen Kommandobereichen. \n\nSchlussfolgerung:\nTrotz moralischer Zweideutigkeit und wachsender ethischer Bedenken zeigt der VTV weiterhin messbare Erfolge bei der Erleichterung der psychologischen Belastung durch längere Kampfhandlungen. Wie so oft in Kriegszeiten bleibt die Grenze zwischen Nutzen und Gewissen unscharf. Die derzeitige Politik spiegelt eine flexible Auslegung der Menschenrechte zugunsten der operativen Effizienz wider, unter der weiter gefassten Rechtfertigung, unsere Demokratie zu schützen."
 germany.339.a: "Wir sollten all das geheim halten."
 germany.340.t: "Das große Schachbrett - Teil I"
 germany.340.d: "Im Lagezentrum hatte es wochenlang gebrummt. \n\nDer Ausbruch des Krieges in Asien hatte die Zivilbevölkerung in Panik versetzt und innerhalb des Militärs einen Sturm von Argumenten und sich verschiebenden Prioritäten ausgelöst. In der riesigen Operationshalle des europäischen Verteidigungsministeriums hatte sich die hitzige Debatte zwölf Stunden lang hingezogen. Die Offiziere gingen sich fast gegenseitig an die Gurgel, als plötzlich die Tür aufschwang.\n\nEin gepflegter, athletischer Mann Mitte fünfzig trat ein und nahm ruhig am Kopfende des Tisches Platz. Auf einer kleinen, aber gewichtigen Plakette vor ihm stand zu lesen: Gunther Fehlinger, Präsident der Europäischen Union.\n\n ofort standen alle Offiziere auf und salutierten.\n\n"Ich nehme an, Sie haben eine Art Konsens erzielt", sagte er trocken, ohne von seinem Getränk aufzusehen. "Da ich dafür Brüssel verlassen musste"\n\nDie Mitarbeiter bemühten sich, den Projektor einzurichten, während ein General mit einer Mappe in der Hand nach vorne trat.\n\nHerr Oberbefehlshaber, wir haben drei Handlungsoptionen skizziert."\n\nEr deutete auf die Leinwand."
 germany.340.a: "..."
 germany.341.t: "Das Ende"
 germany.341.d: "Jetzt gibt es niemanden mehr, der lacht, niemanden, der "entlarvende" Berichte verfasst, niemanden, der Verschwörungstheoretiker ist und niemanden, der sich wehrt. Jetzt ist die große Vision des Weltwirtschaftsforums eine unbestreitbare Realität, zu der es keine Alternative gibt.\n\nKlaus Schwab, so sehr wir auch an seiner abscheulichen Persönlichkeit, seiner Selbstüberschätzung und seinem Leichtsinn gezweifelt haben, hat es geschafft, das Programm recht effektiv und schnell umzusetzen. Obwohl es noch viel zu tun gibt, ist sein persönlicher Einsatz durchaus bemerkenswert, und sein öffentlicher Titel des Führers der Weltregierung ist nicht nur ein Produkt der Massenmedien, wie die meisten Dinge in der modernen Welt - Schwab hat diese kleine Beförderung sicherlich verdient.\n\nUnglücklicherweise verschlechtern sich jedoch, während er sich seinem hundertsten Lebensjahr nähert, seine Managementfähigkeiten, und es ist Zeit für ihn, eine wohlverdiente Pause einzulegen.\n\nAber zum Glück ist Schwab mit diesem System nicht allein. Für ihn mag die Reise zu Ende sein, aber für andere ist sie noch nicht zu Ende. Er weiß nicht, wie viel Zeit ihm noch bleibt, aber die Medizin schreitet voran, und mit großer Macht ergeben sich auch große Möglichkeiten. Wie lange werden seine Nachfolger leben? 120, 130, 150 Jahre? Um ehrlich zu sein, eine Grenze wurde noch nie erreicht. Es liegt an ihnen, den zukünftigen Herrschern der Welt, den Status quo zu erhalten. Aber jetzt kann er nur froh sein, wieder in den Schatten zu treten..."
 germany.341.a: "Diesmal als Spieler, nicht als Bauer."
 germany.343.t: "Israel beantragt NATO-Mitgliedschaft"
 germany.343.d: "Nach dem Triumph Israels im Nahen Osten haben sich die Bevölkerung und die Regierung Israels zusammengefunden, um den Beitritt Israels zur NATO uneingeschränkt zu unterstützen und die Sicherheit im Nahen Osten zu gewährleisten. Es werden ständige deutsche Militärstützpunkte eingerichtet, um die israelischen Positionen weiter zu festigen und im Falle eines weiteren Notfalls reagieren zu können.\n\nIsrael ist dankbar für unsere Unterstützung. Wenn wir zusammenhalten, kann uns kein Feind brechen!"
 germany.343.a: "Hurra!"
 germany.344.t: "Die Grünen tagen"
 germany.344.d: "Die Wahl ist noch im Gange, aber die ersten Umfragen zeigen bereits vielversprechende Aussichten für die Grünen. Doch eine Frage stellt sich sowohl für die Parteimitglieder als auch für die Wählerinnen und Wähler: Wer wird die Partei führen?\n\nAnnalena Baerbock und Robert Habeck teilen sich seit langem die Parteiführung, ganz im Sinne der grünen Tradition, die auf Gleichheit und Ausgewogenheit setzt. Doch nun ist es an der Zeit, ein einziges Gesicht der Bewegung zu wählen - jemanden, der das Land als Kanzler voranbringt.\n\nBaerbock ist für ihren Idealismus und ihre Direktheit bekannt, unbeirrbar in Fragen der Außenpolitik. Viele beschreiben sie als entschlossen - sogar konfrontativ - aber auch zutiefst verpflichtet zu moralischer Klarheit und Menschenrechten. Sie ist bereit, weit zu gehen, um das zu verteidigen, was sie für einen gerechten und prinzipientreuen Kurs hält. Als Politikerin der "Zukunft, nicht des Kompromisses" könnte sie durchaus die Führungspersönlichkeit sein, die das Land verdient.\n\nHabeck hingegen genießt dank seiner pragmatischen, wirtschaftsorientierten Sichtweise eine breitere öffentliche Unterstützung. Auch sein Temperament steht im Gegensatz zu dem von Baerbock: ruhiger, versöhnlicher und auf Konsens ausgerichtet. Auch wenn er in der Außenpolitik selbstbewusster geworden ist, bleibt er in den Augen vieler "der Realist" - eine Führungspersönlichkeit, die versteht, wie das System funktioniert, und bereit ist, innerhalb dieses Systems zu arbeiten, um Veränderungen herbeizuführen.\n\nIn diesem Sinne hat die Partei nun ihre interne Abstimmung abgeschlossen und bekannt gegeben, wer von den beiden als ihr Kandidat für eines der wichtigsten Ämter im Lande antreten wird..."
 germany.344.a: "Annalena Baerbock!"
 germany.344.b: "Robert Habeck!"
 germany.345.t: "CDU/CSU: Kampf um die Zukunft"
 germany.345.d: "Wenn eine politische Kraft im deutschen Mehrparteiensystem als "alte Garde" bezeichnet werden kann, dann ist es zweifellos die CDU/CSU. Die 1945 nach dem Krieg gegründete und 1949 - zumindest nominell - vereinigte Union hat seither auf allen Regierungsebenen gemeinsam agiert und wird von manchen sogar als "Säule der Stabilität" bezeichnet. Aber interne Meinungsverschiedenheiten, vor allem jetzt im Zusammenhang mit den bevorstehenden Wahlen und der Kanzlerschaft, lassen diese Bezeichnung eher als Wunschdenken erscheinen.\n\nAlle öffentlichen Erwartungen deuteten auf Merz als den offensichtlichen Kandidaten hin - den Favoriten der Allianz, dem die Nominierung praktisch garantiert war. Doch in einer überraschenden Wendung, mit der niemand gerechnet hatte, erklärte der CSU-Vorsitzende seine eigene Absicht zu kandidieren.\n\nMarkus Söder: offiziell bayerisch und christlich-sozial. Während der bayerische Teil unbestreitbar wahr ist, spiegelt der Name seiner Fraktion seine ideologische Haltung nicht ganz wider. Bekannt für seine lauten und oft widersprüchlichen Äußerungen, erfreut sich Söder großer regionaler Beliebtheit. Er spricht sich offen gegen den Multikulturalismus aus - was ihm die Bewunderung der extremen Rechten einbringt - und unterstützt gleichzeitig liberale Anliegen wie die gleichgeschlechtliche Ehe und die Impfpflicht.\n\nIm Gegensatz dazu scheint Merz fast zentristisch - vielleicht sogar links orientiert. Nachdem er vor zwei Jahrzehnten seinen internen Kampf gegen Angela Merkel verloren hat, ist er entschlossen, nicht noch einmal zur Seite zu treten. Als erfahrener Richter, Anwalt und Finanzexperte will er nun seinen Lebenslauf um den Titel "Bundeskanzler" erweitern."
 germany.345.a: "Die Erfahrung von Merz überzeugt die Partei."
 germany.345.b: "Söders Ambitionen sind überzeugender!"
 germany.346.t: "Die Wahl der Alternative?"
 germany.346.d: "Die AfD bleibt eine der umstrittensten Parteien in Deutschland. Als sie 2013 gegründet wurde, konnten nicht einmal ihre Gründungsmitglieder ahnen, wozu sie sich heute entwickeln würde. Euroskeptizismus, Rechtspopulismus, Islamfeindlichkeit - sogar Neonazismus - sind Begriffe, die in den Augen eines Großteils der Öffentlichkeit praktisch zum Synonym für die Partei geworden sind. Anhaltende Spannungen im Zusammenhang mit der Einwanderung, eine verfehlte Regierungspolitik und allgemeine politische Desillusionierung schüren das Interesse an der AfD und erweitern ihre Wählerbasis.\n\nAber jetzt steht die Partei am Scheideweg - sie muss sich entscheiden, wer von ihren beiden einflussreichsten Persönlichkeiten ihre Wahlkampagne leiten wird: Alice Weidel und Tino Chrupalla.\n\nWeidel ist eine exzentrische Figur - passend für eine Partei wie die ihre. Durch ihre Offenheit provoziert sie oft heftige Reaktionen in den Medien und der Öffentlichkeit. Sie ist eine Frau mit Prinzipien, die sich nicht scheut, zu ihren Überzeugungen zu stehen, ohne Rücksicht auf Verluste. Wie ihre Partei ist sie für Wirtschaftsliberalismus und eine Rückkehr zur Kernenergie.\n\nIhr interner Rivale Chrupalla ist für ein breiteres Publikum eine schmackhaftere Option. Er ist ruhiger, besonnener und kompromissbereiter. Mit seiner diplomatischen Art verspricht er, die Partei zu vereinen wie nie zuvor - und findet immer einen Weg, mit politischen Gegnern zu verhandeln. \n\nNach wochenlangen Debatten, Diskussionen, Überredungskünsten und so ziemlich allem, was man sich vorstellen kann, hat die Partei unter den wachsamen Augen der Presse und der Öffentlichkeit eine bundesweite Ankündigung gemacht, dass..."
 germany.346.a: "Alice Weidel kann eine große Zeltkoalition zusammenstellen!"
 germany.346.b: "Tino wird es gelingen, die Partei besser zu vereinen..."
 germany.347.t: "Neue Parteivorsitzende der Linken äußert sich"
 germany.347.d: "Im Vergleich zu ihren Konkurrenten bei dieser Wahl scheint Die Linke eine seltene Insel der inneren Stabilität zu sein. Mit einem konsistenten, nahezu kompromisslosen politischen Programm, einer ideologisch geeinten Wählerbasis und einer Führungspersönlichkeit - vielleicht besser gesagt, einer führenden Frau -, die kürzlich die Nation mit einer einzigen Rede verblüffte.\n\nHeidi Reichinnek ist vielleicht die "jugendlichste" Kandidatin im diesjährigen Rennen. Ihre Aktivität und Popularität in den sozialen Medien steht denen erfahrener Influencer in nichts nach, und ihre ungefilterte Authentizität - von Tattoos bis hin zu ihren feurigen Äußerungen im Bundestag - übertrifft sogar ihren Erzrivalen von der AfD. \n\nTrotz ihres offenen Eintretens für Frauenrechte, ihres Engagements für Arbeitnehmer und ihres selbsterklärten Eintretens für einen "demokratischen Sozialismus" blieben die Umfragewerte der Partei bescheiden... zumindest bis vor kurzem.\n\nWährend sich der Wahlkampf aufheizt, sind parteiübergreifende Kompromisse im gesamten Spektrum üblich geworden. Aber für Reichinnek war die Diskussion über eine mögliche Zusammenarbeit zwischen der CDU und der AfD der letzte Strohhalm. Als Friedrich Merz - einer der Spitzenkandidaten auf Bundesebene - sich in der Woche des Gedenkens an die Opfer der Konzentrationslager für eine Verschärfung der Migrationsgesetze aussprach, reagierte sie ohne zu zögern. \n\nDie Vorsitzende der Partei Die Linke ergriff bei der ersten Gelegenheit das Podium und hielt eine scharfe, kompromisslose Rede, in der sie diese Rhetorik verurteilte. Selbst viele ihrer politischen Gegner gaben zu, dass sie von der moralischen Klarheit, die sie ausstrahlte, beeindruckt waren - und ihr Ausruf "Das ist das verdammte Problem!" verbreitete sich wie ein Lauffeuer im ganzen Land.\n\nAuch wenn es schwer ist, die dauerhafte Wirkung ihrer Worte zu messen, so ist doch eines sicher: Zum ersten Mal seit Jahren könnte Deutschland kurz davor stehen, eine Partei zu wählen, die ihre Arbeitnehmer in den Mittelpunkt der nationalen Politik stellt."
 germany.347.a: "Deutschland wieder auf dem Linkskurs?"
 germany.348.t: "Weiche Haut"
 germany.348.d: "Die Welt ist eine riesige Ansammlung von Wahnvorstellungen.\n\nSo wurden Imperien aufgebaut: auf den Idealen einiger weniger, die Visionen von einem Ort sahen, den wir nie sehen sollten.\nWenn Sie jemanden sanft berühren, wie fühlt sich das an?\nRichtig oder falsch?\nGut oder schlecht?\nRot oder blau? \n\nDu bist anderer Meinung als der andere, und in einer gerechten Welt hättest du dieser Person die Luftröhre zerschmettert; nun, du kannst es.\n\nEs ist niemand anderes als du selbst, der dich daran hindert, die Welt so zu sehen, wie sie ist.\nEs ist nur natürlich, dass das heilige Gebilde, an das du glaubst und dem du dich hingibst, ein Spiegelbild deiner selbst ist.\nWie kann ich also irgendetwas glauben, das meine Augen mir zeigen?"
 germany.348.a: "Reißt sie heraus, seht hinter den Schleier."
 germany.349.t: "Darwin"
 germany.349.d: "Gewalt ist natürlich, Gewalt ist gesund, sie ist der einzige Weg, um sicherzustellen, dass alle Lebewesen einen weiteren Tag leben können. Wir haben das getan, seit wir uns gegenseitig die Schädel mit Steinen zertrümmert haben, als wir uns in Höhlen versteckten.\n\nDer Löwe vergewaltigt den kleinen Hund, der Hai verschlingt den Wal, und der Geier pickt den Sterbenden.\n\nDie Zukunft ist ungewiss, aber die Gegenwart, das Heute und das Hier und Jetzt sind alles, was zählt. \nUnsere Fäuste sind blutig, unser Grinsen ist sichtbar. \nDie Welt, in der wir jetzt leben, ist das, was zählt. \nIch verstehe nicht, warum du das verunglimpfst. \nTun wir nicht alle das Gleiche, direkt oder nicht? Der Kult des Kapitals hat dies immer gefördert, und jetzt, wo wir dies zu seinem natürlichen Ende treiben, verkriecht ihr euch in euren Bunkern.\n\nDie Europäische Union behauptet, die Dinge, die sie getan hat, getan zu haben, um das Leben zu respektieren.\n\nWas ist der Grund, das Leben zu respektieren?\nGlaubst du, du respektierst das Leben gerade?"
 germany.349.a: "Es bleibt nur ein Gesetz."
 germany.350.t: "Hunger"
 germany.350.d: "Eine Ära, in der die Menschheit vom Konsum beherrscht wird.\n\nHunger führt zu Ärger, Ärger führt zu Wut, Wut führt zu Brutalität.\nSo sind wir.\n\nWie man es von einem Elfenbeinturm, der über uns alle herrschen will, erwarten könnte, fordert das Weltwirtschaftsforum, dass wir die "richtigen" Dinge essen. \nWenn etwas richtig ist, gibt es auch etwas, das als "falsch" gilt, nicht wahr? \n\nHunger ist natürlich, aber dann ziehen die Menschen die Grenze beim Essen ihrer Mitmenschen.\nWer hat das so entschieden, und warum? Ist es, weil menschliches Leben kostbar ist?\n\n Was macht das Leben von Tieren weniger kostbar? Wurden wir nicht gezwungen, Insekten zu essen? \n\nDer Mensch ist das höchste Raubtier, also wäre es sinnvoll, dass wir Menschenrudel bilden, also sollte es kein Problem sein, wenn wir uns über den Rest erheben und andere ausplündern. \n\nJede Stadt wird zu einem Großstadtdschungel werden, in dem wir unsere tiefsten Wünsche auf Kosten anderer befriedigen werden.\n\n"
 germany.350.a: "Um dem Stachel zu entgehen, den wir alle spüren."
 germany.351.t: "Moderne architektonische Lösungen"
 germany.351.d: "Die vielen Völker Europas sprechen viele Sprachen, und ihre Städte sind oft ein ineffizientes, verworrenes Durcheinander, voller "Kulturzentren", die seit Jahrhunderten bestehen und nichts als nostalgische Zeugnisse einer Vergangenheit sind, von der wir uns immer weiter entfernen. Wir bauen ein Europa auf, ein universelles Europa, ein Volk, das sich als kollektives Ganzes fühlen muss, eine Identität. Diese alten Kathedralen und Paläste, die Jahrhunderte, manchmal sogar Jahrtausende zuvor erbaut wurden, waren nie dazu bestimmt, so lange zu überdauern.\n\nUm eine europäische Identität aufzubauen, müssen diese regionalen "Monumente" ersetzt und eine einheitliche europäische Architektur angenommen werden. Mit der Zeit werden wir Städte bauen, die effizient und organisiert sind. Die sich schlängelnden Straßen und Fußwege werden geschäftige Ströme des Handels und der Produktion sein, in denen es von Arbeitern wimmelt wie in einem Fluss voller Treibholz.\n\nSie mögen protestieren, aber sie werden nichts zu begehren haben, sie werden lernen, die Bürogebäude und Wolkenkratzer zu lieben, die wir an ihre Stelle setzen, wahre Errungenschaften und architektonische Wunderwerke, wir brauchen keine barocken Paläste und längst tote Verwaltungszentren von Grafen und Königen."
 germany.351.a: "Es ist ein neuer Anfang, ein neues Leben."
 
 germany.352.t: "ReArm Europe erhält grünes Licht"
 germany.352.d: "Kommissionspräsidentin Ursula von der Leyen, seit jeher die europäische Kriegsbeifahrerin, schlug den Plan "ReArm Europe" als Teil ihrer umfassenderen Agenda "Readiness 2030" vor, die seit dem Zusammenbruch Amerikas im Jahr 2021 beschleunigt vorangetrieben wird. Der Mangel an amerikanischen Finanzmitteln und amerikanischen Waffen hat Europa in eine prekäre Lage gebracht. Alle Europäer, unabhängig von ihrer Herkunft und ihrem Hintergrund, sind sich einig, wie dringend die Situation ist. Die Vorschriften der Europäischen Union schreiben zwar finanzpolitische Stabilität vor, doch eine rasche Wiederaufrüstung als Reaktion auf den zunehmenden Expansionismus Russlands und den Zusammenbruch unseres größten Verteidigers erfordert Kredite, Risikobereitschaft und Haushaltskürzungen. \n\nWährend der ursprüngliche Entwurf einen konservativen Preis von 800 Milliarden Euro vorsah, belief sich der heute vom Europäischen Parlament verabschiedete Vorschlag auf 1,4 Billionen Euro, mit Plänen zur Kürzung des europäischen Haushalts, zur Vergabe von Krediten und zur Umleitung von Mitteln aus unwichtigen Ministerien, um ein einheitliches Beschaffungsprogramm mit dem Ziel der europäischen Wiederaufrüstung zu etablieren.\n\nDer Plan trägt zwar den Namen "Readiness 203"”, doch die Hoffnung ist, dass viele europäische Nationen diesen Richtwert mit zusätzlichen Mitteln und hoffentlich der Wiedereinführung der Wehrpflicht in einigen großen Nationen weit übertreffen werden. Der letztendliche Erfolg des Plans hängt jedoch von der Zusammenarbeit der Euro-Giganten wie Deutschland, Frankreich, Italien und Spanien ab, die mit ihrem Geld, ihrer Produktionskapazität und ihren Arbeitskräften mobilisieren und der russischen Bedrohung entgegenwirken müssen.\n\nDie Verabschiedung dieses Plans durch das Europäische Parlament ist ein wichtiger erster Schritt zur Umsetzung von Kriegsmaßnahmen in der gesamten Union, um auf die zu erwartende Eskalation der Spannungen im In- und Ausland vorbereitet zu sein."
 germany.352.a: "Demokratie rettet Demokratie?"
 germany.353.t: "ReArm Europe: Zückt euren Geldbeutel"
 germany.353.d: "Mit der Verabschiedung von "ReArm Europe" wurden die Regeln der Europäischen Union zur Haushaltsstabilität erheblich gelockert, um den europäischen Staaten mehr Optionen für kurzfristige Mobilisierungen zu bieten. Angesichts dessen zögern jedoch viele EU-Staaten, Risiken einzugehen, und viele wollen nicht alleine handeln. Da Europa immer enger zusammenwächst, ist es nun an den Titanen, die gesamte Union voranzubringen.\n\nDeutschland könnte in dieser Konstellation durchaus die Entscheidungsgewalt haben, denn was auch immer es tut, andere werden wahrscheinlich proportional folgen. Es gibt mehrere Optionen, von denen die erste darin besteht, die Wiederaufrüstung einfach jedem einzelnen Land zu überlassen, sodass alle Länder die Schulden direkt durch die Aufnahme von Verteidigungsdarlehen tragen können.\n\nAlternativ scheinen die Subventionen der Europäischen Union, die vielen ärmeren Ländern der Union gewährt werden, ohnehin in einem Abgrund aus Armut und Korruption zu verschwinden, und vielleicht können wir hier und da Kürzungen vornehmen, um diese Subventionen in ein kollektives Beschaffungsprogramm umzuleiten.\n\nOder zuletzt, aber je nach Sichtweise vielleicht das risikoreichste oder risikoärmste Szenario: Deutschland in den Mittelpunkt der Wiederaufrüstungsbemühungen stellen. Das könnte sich auszahlen und unsere Produktionskapazitäten erheblich erweitern, aber es könnte uns auch in Schulden stürzen, und so kurz nach einem Börsencrash wäre die Aufnahme von Krediten für unsere ärmeren, gefährdeten Nachbarn unpopulär.\n\nZusammenfassend: Schuldenkapital? Finanzielle Stabilität? Oder Kredite für Einfluss? Sollen wir die europäischen Wiederaufrüstungsbemühungen zentralisieren oder delegieren? In dieser Phase liegt die Entscheidung bei Ihnen, Herr Bundeskanzler."
 germany.353.a: "Ich sehe keinen Grund, warum sie nicht zahlen können."
 germany.353.b: "Schneidet die EU ab, unser Geld sollte an uns gehen."
 germany.353.c: "Wir werden Europa anführen, Vorwärts!"
 germany.354.t: "Weißes Gold unter unseren Füßen?"
 germany.354.d: "Berlin, Deutsche Welle (DW)\n\nUnter den Feldern und Hügeln Sachsen-Anhalts könnte gerade ein neues Kapitel in der industriellen Zukunft Deutschlands aufgeschlagen worden sein. Nach monatelangen geologischen Voruntersuchungen haben die Bergbaubehörden des Bundes und des Landes das Vorhandensein beträchtlicher Lithiumvorkommen bestätigt, die zu den größten gehören, die jemals auf europäischem Boden entdeckt wurden.\n\nLithium, von Investoren und Ingenieuren gleichermaßen als "weißes Gold" bezeichnet, ist für die Herstellung von Batterien für Elektrofahrzeuge, Energiespeichersystemen und Verteidigungstechnologien der nächsten Generation unverzichtbar. Bislang waren die grünen und digitalen Ambitionen der Europäischen Union stark von Importen aus dem Ausland abhängig, insbesondere aus Australien, Chile und China. Das könnte sich nun ändern. Experten schätzen, dass die gefundenen Reserven mehr als ein Viertel des prognostizierten Lithiumbedarfs der EU für die nächsten zwei Jahrzehnte decken könnten. Diese Entdeckung kommt zu einer Zeit, in der Brüssel auf mehr strategische Autonomie drängt und Berlin unter dem doppelten Banner der Energiewende und der militärischen Modernisierung die Bemühungen zur Neugestaltung des industriellen Rückgrats des Kontinents anführt.\n\nBereits jetzt bereiten Konsortien deutscher und europäischer Unternehmen Machbarkeitsstudien für eine schnelle Förderung vor. Infrastrukturpläne, Umweltverträglichkeitsprüfungen und politische Lobbyarbeit schreiten mit beispielloser Geschwindigkeit voran. Die Landesregierung, hin- und hergerissen zwischen Versprechungen zur wirtschaftlichen Wiederbelebung und ökologischer Vorsicht, hat eine \"ausgewogene Entwicklung\" gefordert, doch der Druck wächst. Von Bitterfeld bis Bernburg könnte eine ruhige Region, die lange Zeit mit postindustrieller Stagnation in Verbindung gebracht wurde, nun zu einer Frontlinie im europäischen Wettlauf um Ressourcen im 21. Jahrhundert werden. Ob dieser "Lithium-Moment" zu einer dauerhaften Transformation führen wird, bleibt abzuwarten. Doch vorerst richten sich alle Augen auf Sachsen-Anhalt und das weiße Metall unter seiner Erde."
 germany.354.a: "Die Batterie Europas wurde gefunden"
 germany.355.t: "Vom Erz zur Autobahn"
 germany.355.d: "Hamburg, Der Spiegel\n\nAm Rande des Hamburger Geschäftsviertels glänzt eine lange Reihe von Autos in der Wintersonne. Im Autohaus herrscht mehr Trubel als seit Jahren. Zum ersten Mal seit einem Jahrzehnt gibt es wieder Wartelisten für neue deutsche Autos, und die Käufer beschweren sich nicht.\n\n"Wir haben uns den BYD angesehen", erzählt ein Paar mittleren Alters dem Spiegel, "aber dieses Modell fühlt sich richtig an. Ich möchte keine Software aus Shenzhen unter meinem Lenkrad haben."\n\nDas Fahrzeug, um das es geht, ist der neue Elektro-SUV von BMW, eines von mehreren Modellen, die mit Batterien aus den aufstrebenden Lithiumbetrieben in Sachsen-Anhalt ausgestattet sind. "Unser Lithium", sagt der Verkäufer mit einem Grinsen."Von hier, nicht aus Chile."\n\nDen Kunden ist dieser Zusammenhang nicht entgangen. Da die EU-Zölle auf chinesische Elektroautos Importe unattraktiv machen und seit Monaten Schlagzeilen über Durchbrüche im heimischen Bergbau zu lesen sind, wächst die Überzeugung, dass der Kauf deutscher Produkte mehr als nur eine Präferenz ist, sondern patriotisch. Ein jüngerer Käufer, der gerade eine Stelle in einer lokalen Gigafactory angetreten hat, nennt es "den Kreis schließen".\n\nWir gewinnen das Lithium aus unserem eigenen Boden, bauen die Batterien in Jena und montieren die Autos in Stuttgart. So sollte es sein", sagt er und unterschreibt auf der gepunkteten Linie.\n\nFür eine Branche, die einst von ausländischer Technologie und heimischen Skandalen erschüttert wurde, könnte sich das Blatt wenden. Und für Deutschland, das seit jeher durch seine Straßen, seine Maschinen und seinen Stolz auf beides geprägt ist, brummt der Motor der Erholung wieder."
 germany.355.a: "Elektrische Träume, Made in Germany"
 
 germany.356.t: "Das EU-Mercosur-Abkommen"
 germany.356.d: "Nach jahrelangen Verhandlungen ist das Handelsabkommen zwischen der EU und dem Mercosur wieder auf den Tisch gekommen, diesmal mit echtem Schwung. Befürworter in Brüssel bezeichnen es als strategischen Durchbruch: eine riesige Freihandelszone, die Europa mit den größten Volkswirtschaften Südamerikas verbindet, Zölle senkt, den Zugang zu wichtigen Ressourcen erweitert und neue Exportmärkte eröffnet, und das in einer Zeit, in der die globalen Lieferketten zunehmend instabil sind. Industrieexporteure würden von einem leichteren Zugang zu südamerikanischen Verbrauchern profitieren, insbesondere in den Bereichen Automobile, Maschinen, Chemikalien und High-End-Fertigung. Das Abkommen würde auch die Abhängigkeit Europas von unberechenbaren Lieferanten verringern, indem es die Beziehungen zu Brasilien und seinen Nachbarn stärkt und die Importe von Agrarprodukten und wichtigen Rohstoffen sichert. In einer Zeit aufstrebender Blöcke bietet es Europa eine Möglichkeit, Handelswege offen zu halten, ohne sich auf Großmächte verlassen zu müssen. Europäische Landwirte und Agrarverbände warnen, dass die Öffnung des Marktes für Mercosur-Produkte eine Welle billiger Importe auslösen könnte, die die heimischen Produzenten unter Druck setzen und die bereits auf dem gesamten Kontinent schwelende Gegenreaktion im ländlichen Raum noch verstärken würde. Der Widerstand von Umweltschützern ist noch stärker: Kritiker argumentieren, dass das Abkommen die Abholzung der Wälder und schwache Arbeitsstandards belohnt und damit die deutsche Klimapolitik in direkten Widerspruch zu ihren Handelsambitionen bringt. Nach jahrelangen Verhandlungen ist das Handelsabkommen zwischen der EU und dem Mercosur wieder auf den Tisch gekommen, diesmal mit echtem Schwung. Befürworter in Brüssel bezeichnen es als strategischen Durchbruch: eine riesige Freihandelszone, die Europa mit den größten Volkswirtschaften Südamerikas verbindet, Zölle senkt, den Zugang zu wichtigen Ressourcen erweitert und neue Exportmärkte eröffnet, und das in einer Zeit, in der die globalen Lieferketten zunehmend instabil sind. Industrieexporteure würden von einem leichteren Zugang zu südamerikanischen Verbrauchern profitieren, insbesondere in den Bereichen Automobile, Maschinen, Chemikalien und High-End-Fertigung. Das Abkommen würde auch die Abhängigkeit Europas von unberechenbaren Lieferanten verringern, indem es die Beziehungen zu Brasilien und seinen Nachbarn stärkt und die Importe von Agrarprodukten und wichtigen Rohstoffen sichert. In einer Zeit aufstrebender Blöcke bietet es Europa eine Möglichkeit, Handelswege offen zu halten, ohne sich auf Großmächte verlassen zu müssen. Europäische Landwirte und Agrarverbände warnen, dass die Öffnung des Marktes für Mercosur-Produkte eine Welle billiger Importe auslösen könnte, die die heimischen Produzenten unter Druck setzen und die bereits auf dem gesamten Kontinent schwelende Gegenreaktion im ländlichen Raum noch verstärken würde. Der Widerstand von Umweltschützern ist noch stärker: Kritiker argumentieren, dass das Abkommen die Abholzung der Wälder und schwache Arbeitsstandards belohnt und damit die deutsche Klimapolitik in direkten Widerspruch zu ihren Handelsambitionen bringt."
 germany.356.a: "Unterzeichnet den Deal."
 germany.356.b: "Zu riskant, ablehnen."
 

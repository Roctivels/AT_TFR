 germany.1001.d: "Die Türkei stellt eine zivile Regierung ein, sie leistet jede Menge Hilfe und alle sind zufrieden! Und jetzt geht bitte zurück in euer Land."
 germany.1001.a: "Hurra?"
 germany.1002.t: "Hilfe von der "Braunen Internationalen""
 germany.1002.d: ""
 germany.1002.a: "Wille und Verstand" 
 

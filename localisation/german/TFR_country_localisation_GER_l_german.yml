 GER_reopen_coal_mines_decision: "§YRheinische Kohlebergwerke§! wieder öffnen"
 GER_reopen_coal_mines_decision_desc: "Angesichts der angespannten Energieversorgung und der steigenden Nachfrage der Industrie ist die Wiederaufnahme des Kohleabbaus im Rheinland eine Notlösung zur Stabilisierung der Stromerzeugung. Dies ist zwar mit hohen Umweltkosten verbunden, sorgt jedoch für unmittelbare Brennstoffsicherheit, schützt die Schwerindustrie und verschafft Zeit für die Umsetzung längerfristiger Energiewenden."
 GER_new_refineries_decision: "Die §YGelsenkirchner Raffinerie§! erweitern"
 GER_new_refineries_decision_desc: "Die Modernisierung und Erweiterung der Gelsenkirchener Raffinerie soll Kraftstoffengpässe verringern und die heimischen Verarbeitungskapazitäten stärken. Durch die Steigerung der Produktion von Synthese- und Raffinerieprodukten in Westfalen können wir die Energieengpässe in der Industrie verringern und die Versorgungssicherheit in einer Übergangsphase verbessern."
 GER_new_power_plants_decision: "Neue §Kraftwerke§! bauen"
 GER_new_power_plants_decision_desc: "Der Ausbau der Stromerzeugung ist eine direkte Reaktion auf die steigende Nachfrage der Industrie und die Belastung des Stromnetzes. Neue Kraftwerke sollen eine zuverlässige Stromversorgung für Fabriken und Städte sicherstellen und Engpässe verhindern, die den Aufschwung bremsen könnten."
 GER_invite_industries_civilian_microsoft: "§YMicrosoft§ nach §3Europa§! einladen"
 GER_invite_industries_civilian_microsoft_desc: "\n\n\n\n£GFX_GER_microsoft_pr\n\n\n\n\n\nDurch die Einladung von Microsoft können wir die europäische Cloud-Infrastruktur, die KI-Entwicklung und die Cybersicherheitskapazitäten stärken und gleichzeitig globale Standards in unsere digitalen und administrativen Systeme integrieren."
 GER_invite_industries_civilian_intel: "§YIntel§ nach §3Europa§! einladen"
 GER_invite_industries_civilian_intel_desc: "\n\n\n\n£GFX_GER_intel_pr\n\n\n\n\n\nDie Abhängigkeit Europas von Chips bleibt eine strategische Schwachstelle. Eine Partnerschaft mit Intel könnte die Herstellung fortschrittlicher Halbleiter auf dem Kontinent verankern und die Lieferketten sowohl für die zivile als auch für die militärische Industrie sichern."
 GER_invite_industries_civilian_electrics: "§YGeneral Electric§ nach §3Europa§! einladen"
 GER_invite_industries_civilian_electrics_desc: "\n\n\n\n£GFX_GER_electrics_pr\n\n\n\n\n\nDie Erfahrung von General Electric in den Bereichen Energie, Luftfahrt und Schwerindustrie macht das Unternehmen zu einem wertvollen Partner für die Modernisierung der europäischen Infrastruktur und die Förderung der langfristigen Widerstandsfähigkeit der Industrie."
 GER_invite_industries_civilian_tesla: "§YTesla§ nach §3Europa§! einladen"
 GER_invite_industries_civilian_tesla_desc: "\n\n\n\n£GFX_GER_tesla_pr\n\n\n\n\n\nWir sollten Tesla dazu einladen, die Produktion von E-Fahrzeugen und Batterien in Europa auszuweiten und dabei sein Know-how in der Großserienfertigung und Energiespeicherung zu nutzen, um die Elektrifizierung voranzutreiben und die Stromnetze auf dem Kontinent zu stabilisieren."
 GER_invite_industries_military_raytheon: "§YRaytheon Technologies§ nach §3Europa§! einladen"
 GER_invite_industries_military_raytheon_desc: "\n\n\n\n£GFX_GER_raytheon_technologies_pr\n\n\n\n\n\nDas Know-how von Raytheon in den Bereichen Luftverteidigung, Radar und Raketenabwehr könnte die mehrschichtigen Verteidigungsnetze Europas gegen moderne Luftbedrohungen erheblich verbessern."
 GER_invite_industries_military_northrop: "§YNorthrop Grumman§ nach §3Europa§! einladen
 GER_invite_industries_military_northrop_desc: "\n\n\n\n£GER_northrop_grumman_pr\n\n\n\n\n\nDie Zusammenarbeit mit Northrop Grumman würde die europäischen Fähigkeiten in den Bereichen Drohnen, Raumfahrtsysteme und strategische Aufklärung stärken, die für die moderne Kriegsführung zunehmend an Bedeutung gewinnen."
 GER_invite_industries_military_lockheed: "§YLockheed Martin§ nach §3Europa§! einladen"
 GER_invite_industries_military_lockheed_desc: "\n\n\n\n£GFX_GER_lockheed_pr\n\n\n\n\n\nDie Einladung an Lockheed Martin würde Zugang zu fortschrittlichen Luft- und Raumfahrt- sowie Raketentechnologien verschaffen, die europäische Wiederaufrüstung unterstützen und die Modernisierung gemeinsamer Verteidigungsprogramme beschleunigen."
 GER_invite_industries_military_dynamics: "§YGeneral Dynamics§ nach §3Europa§! einladen"
 GER_invite_industries_military_dynamics_desc: "\n\n\n\n£GFX_GER_dynamics_pr\n\n\n\n\n\nGeneral Dynamics bietet bewährte Land- und Marinesysteme an. Eine Partnerschaft mit diesem Unternehmen könnte europäische Panzerfahrzeugprogramme und moderne Marinebauprojekte unterstützen."
 GER_north_sea_hydrogen_network: "Nordsee-§Hydrogen§!-Netzwerk"
 GER_european_5industry_initiative: "§3Europäische§! Industrie-§Y5.0§!-Initiative"
 GER_european_5industry_initiative_desc: "\n\n\n\n£GFX_GER_fivezero_industry_pr\n\n\n\n\n\nDie moderne Industrie benötigt moderne Computerhardware und damit verbundene Technologien – ein Thema, das bislang stark vernachlässigt wurde und nun das Hauptziel unserer ehrgeizigen europäischen Industrieinitiative 5.0 ist. Mit ihr werden wir fortschrittliche Computersysteme, hochqualifizierte Arbeitskräfte und modernste Software integrieren, um die Effizienz und Produktivität in einer Vielzahl von Sektoren erheblich zu steigern."
 GER_negotiations_with_ETUC_decision: "Mit dem §sEGB§! verhandeln"
 GER_negotiations_with_ETUC_decision_desc: "\n\n\n\n£GFX_GER_EUTC_negotiate_pr\n\n\n\n\n\nDie Aufnahme von Gesprächen mit dem Europäischen Gewerkschaftsbund zielt darauf ab, die Arbeitsbeziehungen in einer Phase rascher Umstrukturierungen zu stabilisieren. Indem wir die Zustimmung der Gewerkschaften zu Reformen und Investitionsplänen sichern, können wir Störungen reduzieren, Erwartungen steuern und die Produktion aufrechterhalten, während die Veränderungen greifen."
 GER_bail_out_german_farmers: "§YDeutsche Landwirte§! finanziell unterstützen"
 GER_bail_out_german_farmers_desc: "\n\n\n\n£GFX_GER_Farmers_negotiate_pr\n\n\n\n\n\nJahrelang steigende Treibstoffkosten, strenge Umweltauflagen und volatile Märkte haben die deutschen Landwirte an den Rand des Ruins getrieben. Notfallzuschüsse und gezielte Hilfsmaßnahmen sollen die ländliche Wirtschaft stabilisieren, die Ernährungssicherheit gewährleisten und einen weiteren Zusammenbruch des Agrarsektors verhindern."
 GER_negotiations_with_families_decision: "§YDeutschen Familien§! helfen"
 GER_negotiations_with_families_decision_desc: "\n\n\n\n£GFX_GER_families_negotiate_pr\n\n\n\n\n\nSteigende Lebenshaltungskosten, Wohnungsmangel und wirtschaftliche Unsicherheit belasten deutsche Haushalte zunehmend. Direkte finanzielle Unterstützung und gezielte Investitionen sollen den Druck im Alltag mindern, den Konsum stützen und die soziale Stabilität stärken, während längerfristige Reformen Wirkung zeigen."
 GER_negotiations_with_corpos_decision: "§3Europäische§! Vorschriften für Unternehmen durchsetzen"
 GER_negotiations_with_corpos_decision_desc: "\n\n\n\n£GFX_GER_corpos_negotiate_pr\n\n\n\n\n\nGroße Unternehmen, die in Europa tätig sind, profitieren vom Binnenmarkt; von ihnen wird erwartet, dass sie dessen Regeln befolgen. Durch eine strengere Durchsetzung der EU-Wettbewerbs-, Steuer- und Arbeitsnormen können wir Exzesse eindämmen, das Vertrauen der Öffentlichkeit wiederherstellen und sicherstellen, dass Wachstum nicht auf Kosten der Fairness oder des sozialen Zusammenhalts geht."
 GER_negotiations_with_small_businesses_decision: "§YKleinen Unternehmen§! helfen"
 GER_negotiations_with_small_businesses_decision_desc: "\n\n\n\n£GFX_GER_small_negotiate_pr\n\n\n\n\n\nKleine Unternehmen haben die Hauptlast der jüngsten Schocks zu tragen gehabt, bedrängt durch Energiepreise, sinkende Nachfrage und Kreditverknappung. Gezielte Liquiditätshilfen und regulatorische Erleichterungen sollen dazu beitragen, Geschäfte offen zu halten, lokale Arbeitsplätze zu schützen und das Vertrauen in die Alltagswirtschaft wiederherzustellen."
 GER_carbon_tax_decision: "Eine §7CO2§!-Steuer einführen"
 GER_carbon_tax_decision_desc: "\n\n\n\n£GFX_GER_carbon_tax_pr\n\n\n\n\n\nDie Bepreisung von Kohlenstoffemissionen soll die Industrie dazu bewegen, ineffiziente und umweltschädliche Praktiken aufzugeben, ohne auf vollständige Verbote zurückzugreifen. Indem wir die Umweltkosten transparent machen, können wir eine sauberere Produktion fördern, Innovationen finanzieren und die Landwirtschaft und das verarbeitende Gewerbe zu nachhaltigeren Modellen hinführen."
 GER_promote_nuclear_power_in_poland_decision: "§HKernkraft§! in Polen fördern"
 GER_promote_nuclear_power_in_poland_decision_desc: ""
 GER_confirm_canada_partner: "Die Partnerschaft mit [CAN.GetFlag] §dKanada§! bestätigen"
 GER_confirm_china_partner: "Neue Verträge mit [PRC.GetFlag] §dChinesischen§! §7Grünen§! Industrien"
 GER_confirm_british_partner: "Mit [ENG.GetFlag] §RBritischen§! Banken zusammenarbeiten"
 GER_confirm_british_partner_desc: "Trotz politischer Spannungen sind britische Banken nach wie vor tief in die Finanznetzwerke des Kontinents integriert. Zusammenarbeit mag zwar unpopulär sein, aber eine pragmatische Koordinierung könnte die Volatilität verringern und die Liquidität erhöhen."
 GER_reinvigorate_the_european_banks_decision: "Den §3Europäischen§! Bankensektor wiederbeleben"
 GER_reinvigorate_the_european_banks_decision_desc: "Wir sollten Mittel bereitstellen, um wichtige europäische Banken zu stabilisieren, Finanzvorschriften zu harmonisieren und den grenzüberschreitenden Kreditfluss wiederherzustellen, wodurch die Grundlage für eine widerstandsfähige Erholung nach der Krise geschaffen wird."
 GER_introduce_the_digital_euro_decision: "Den §CDigitalen§ §3Euro§! einführen"
 GER_introduce_the_digital_euro_decision_desc: "\n\n\n\n£GFX_GER_digital_euro_pr\n\n\n\n\n\nDie Einführung einer digitalen Version des Euro würde unsere Zahlungssysteme modernisieren, die Abhängigkeit von ausländischen Plattformen verringern und Europa eine souveräne Position in den Finanztechnologien von morgen verschaffen."
 GER_city_green_power_grids: "§7Grüne§! Stadtstromnetze"
 GER_city_green_power_grids_desc: "\n\n\n\n£GFX_GER_green_grids_pr\n\n\n\n\n\nStädtische Energiesysteme müssen sich weiterentwickeln. Durch die Förderung des Ausbaus intelligenter Stromnetze, dezentraler Energiezentren und sauberer Energiespeicher werden unsere Städte effizienter, widerstandsfähiger und besser auf den steigenden Bedarf vorbereitet sein."
 GER_launch_the_rearm_europe_plan_decision: "Den §YReArm§-§3Europe§!-Plan starten"
 GER_invest_in_the_european_defense_industries_decision: "In die §3Europäischen§! §YVerteidigungsindustrien§! investieren"
 GER_invest_in_the_european_defense_industries_decision_desc: "Wir sollten öffentliche Mittel bereitstellen, um die militärisch-industrielle Produktion Europas anzukurbeln, Produktionslinien zu modernisieren und strategische Autonomie durch langfristige industrielle Widerstandsfähigkeit und Wettbewerbsfähigkeit im Export zu sichern."
 GER_invest_in_the_european_military_red_decision: "In §3Europäische§ §YMilitärische Forschung und Entwicklung§! investieren"
 GER_invest_in_the_european_military_red_decision_desc: "Die Bereitstellung von Finanzmitteln für die militärische Forschung und Entwicklung wird dazu beitragen, langfristige Innovationen zu sichern, europäische Forschungsnetzwerke auszubauen und die Entwicklung von Verteidigungsfähigkeiten der nächsten Generation zu beschleunigen."
 GER_european_taurus_project_decision: "Projekt §YTaurus§!: Ein §3Europäischer§! Panzer"
 GER_european_taurus_project_decision_desc: "\n\n\n\n£GFX_GER_main_battle_tank_pr\n\n\n\n\n\nDas Projekt Taurus zielt darauf ab, einen standardisierten europäischen Kampfpanzer zu entwickeln. Durch die Vereinheitlichung von Konstruktion und Beschaffung reduzieren wir Doppelarbeit und stärken die kontinentalen Landstreitkräfte für die kommenden Jahrzehnte."
 GER_leonardo_rheinmetall_joint_decision: "§ALeonardo§!-§3Rhein§!§gmetall§!-Gemeinschaftsunternehmen"
 GER_leonardo_rheinmetall_joint_decision_desc: "Wir werden gemeinsame Unternehmungen zwischen europäischen Firmen wie Leonardo und Rheinmetall fördern, um fragmentierte Rüstungsmärkte zu konsolidieren und gemeinsame Systeme für eine schnellere, kostengünstigere und stärker integrierte Rüstung auszubauen."
 GER_promote_polish_militarization_decision: "§RPol§!nische Militarisierung §Yfördern§!"
 GER_promote_polish_militarization_decision_desc: "Polen hat sowohl den Willen als auch die Grenzlage, um zu einer wichtigen Säule der europäischen Verteidigung zu werden. Mit gezielten Subventionen und Vereinbarungen können wir seine Militarisierung vorantreiben und die Erfolgschancen des Plans erhöhen."
 GER_new_military_installations_in_romania_decision: "Neue §YMilitäranlagen§! in §BRu§!§Ymän§!§Rien§!"
 GER_new_military_installations_in_romania_decision_desc: "Die östliche Lage Rumäniens macht das Land zu einem strategisch wichtigen Standort. Wir werden in die lokale Infrastruktur investieren, um schnelle Einsätze zu unterstützen, die Logistik zu testen und Europas Abschreckungsbereich zu erweitern."
 GER_american_military_testzone_decision: "§YWaffen§! im [USA.GetFlag] §RAmerikanischen Bürgerkrieg§! testen"
 GER_eastern_european_drone_silos_decision: "Osteuropäische §YDrohnenilos§!"
 GER_upgrade_drone_production_decision: "§3Europäische§! Drohnenproduktion verbessern"
 GER_mine_lithium_decision: "§YLithium§! in §YSachsen-Anhalt§! abbauen"
 GER_mine_lithium_decision_desc: "Die Entdeckung von Lithiumvorkommen bietet eine seltene Chance, die heimischen Lieferketten zu stärken. Durch den Start einer kontrollierten Förderung in Sachsen-Anhalt können wir die Batterieproduktion unterstützen, die strategische Autonomie vorantreiben und die regionale Industrie im Bereich Zukunftstechnologien wiederbeleben."
 GER_finance_european_research_council_decision: "Den §3Europäischen Forschungsrat§! finanzieren"
 GER_invest_in_ASML_decision: "In §YASML§! investieren"
 GER_invest_in_STM_decision: "In §YSTMicroelectronics§! investieren"
 GER_smart_batteries_grids: "Intelligentes Batterienetzwerk"
 GER_smart_batteries_grids_desc: "\n\n\n\n£GFX_GER_green_batteries_pr\n\n\n\n\n\nDieses Bundesland wurde als Drehscheibe für groß angelegte Energiespeicherung und Netzstabilisierung ausgewählt. Ein koordiniertes Netzwerk intelligenter Batterieanlagen absorbiert nun überschüssigen Strom, gleicht Spitzenlasten aus und schützt die lokale Industrie vor Energieschocks. Durch die Kombination von Speicherung und Bauplanung arbeiten Fabriken effizienter, Erweiterungen werden schneller vorangetrieben und die Region wird zu einem Vorbild für widerstandsfähiges, energiesicheres industrielles Wachstum."

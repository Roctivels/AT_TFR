 GER_facit_omnia_voluntas: "Facit Omnia Voluntas"
 GER_facit_omnia_voluntas_desc: "Viel zu lange wurde unser Land von Bleistiftdrückern und korrupten Schweinen regiert, die sich die Taschen mit Konzerninteressen füllten, während unsere Stärke verkümmerte. Sie waren es, die uns in die Niederlage, in die Zerstörung, in den Untergang geführt haben. Unter ihrer nachlässigen Führung wurde die Bundeswehr wie ein vergessenes Relikt dem Verfall überlassen, während sie sich selbst bereicherten und unsere Ressourcen für sinnlose Unternehmungen vergeudeten. Doch das alles soll heute ein Ende haben. Nicht länger wird Schwäche die deutschen Streitkräfte bestimmen. Wir werden die Ehre, die Disziplin und die Stärke wiederherstellen, die unsere großartige Nation einst auszeichneten. Das Erbe des preußischen Ruhms und der militärischen Exzellenz wird wieder auferstehen. Unsere Armee wird nicht länger ein Nachzügler sein - sie wird eine Kraft sein, die von unseren Feinden gefürchtet und von der Welt respektiert wird. Die Zeit ist reif für ein neues Deutschland. Ein stärkeres Deutschland. Ein Deutschland mit Entschlossenheit, mit Stolz und mit dem Willen, fremden Angriffen standzuhalten. Wir werden nicht länger zögern. Wir werden nicht länger in die Knie gehen. Von diesem Tag an steht Deutschland unerschüttert da."

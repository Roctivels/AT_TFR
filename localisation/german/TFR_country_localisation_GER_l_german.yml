 germany.54.t: "BERICHT ÜBER MÖGLICHE INVASION"
 germany.54.d: "FROM: VIZEADMIRAL RAINER BRINKMANN\n\nDie Einsatzflottille 2 hat über mehrere Wochen das Schwarze Meer ausgekundschaftet und russische Seestreitkräfte angegriffen. In einem unserer jüngsten Berichte wurde der mögliche strategische Vorteil einer amphibischen Landung im Hafen von Noworossijsk dargelegt. Der Hafen wird derzeit von einer unterlegenen Marinebrigade und Seeleuten der Schwarzen Flotte verteidigt.\n\nSollte es uns gelingen, den Hafen zu erobern und zu sichern, könnte dies den massiven Druck von den Ukrainern nehmen und den Krieg zu unseren Gunsten wenden.\n\nUNTERSCHRIEBEN:"
 germany.54.a: ""
 germany.55.t: "Sympathien für das Kaiserreich nehmen zu"
 germany.55.d: "Heinrich XIII. Prinz Reuss. Er steht an der Spitze einer Bewegung, die einst nur von nostalgischen Aristokraten und einigen verbitterten Offizieren, die die Vergangenheit nie losgelassen haben, vertreten wurde. Aber jetzt hören die Generäle, die Minister, diejenigen, die diese Nation durch Krieg und Ruin geführt haben, auf ihn. Einige spotten über die Idee, aber andere hören zu. Sie sprechen es nicht offen aus, aber der Gedanke ist selbst hinter verschlossenen Türen nicht zu überhören: "Vielleicht brauchen wir einen Kaiser." \n\nDas ist natürlich absurd. Ein Mann in einer vergoldeten Uniform kann unsere Fehler nicht auslöschen und die Flut nicht umkehren, und er wird ganz sicher nicht die Söhne zurückbringen, die wir im Osten begraben haben. Und doch wehen Banner. Pamphlete werden verbreitet. Geflüster wird zu Gesprächen, Gespräche werden zu Plänen. Wir sind nicht wie sie, diese alten Narren, die davon träumen, dass Preußen noch einmal marschiert. Wir sind Stahl, nicht Tradition. Wir sind Soldaten, keine Höflinge. Aber die Wahrheit ist, dass dieses Reich müde ist. Wir haben geblutet, wir haben geopfert, und was uns geblieben ist, ist ein ruheloses Land, ein unsicheres Volk und eine schwankende Zukunft. \n\nVielleicht suchen sie deshalb nach Heinrich. Nicht wegen der Macht, sondern wegen der Gewissheit. Ein Kaiser führt nicht, er ist einfach nur; ein Symbol, ein Mythos, ein Anker für diejenigen, die das Gewicht unseres Versagens nicht ertragen können. Aber wenn wir ihn umarmen, fesseln wir uns an die Vergangenheit. Er mag jetzt keine Krone tragen, aber eines Tages wird er sie wollen. Und wenn dieser Tag kommt, werden nicht wir diejenigen sein, die über das Schicksal Deutschlands entscheiden.\n\nSpielen wir also das Spiel mit?"
 germany.55.a: "Die Krone könnte das sein, was wir brauchen."
 germany.55.b: "Deutschland braucht keinen Idealismus."
 germany.56.t: "Schlacht um Leipzig"
 germany.56.d: "Die Stadt steht in Flammen. Rauch steigt über der Skyline auf, schwarze Säulen drehen sich im Wind. Was als Protest begann, hat sich zu einem Abrechnungskrieg entwickelt, der auf den Straßen ausgetragen wird. Die Linken hatten sich seit Wochen organisiert, ermutigt durch ausländische Sendungen, Untergrundzeitungen und jüdisch-kommunistische Aufrufe zum Aufstand. Sie riefen zu Streiks, Demonstrationen und "direkten Aktionen" auf. Was sie bekamen, war Blut.\n\nUnsere Aktivisten überfluteten daraufhin die Straßen. Stiefel trafen auf Kopfsteinpflaster, Fahnen wurden gehisst, Fußballgesänge und "Ausländer Raus" skandiert. Sie waren nicht hier, um zu debattieren. Die ersten Zusammenstöße waren schnell und brutal, Schläger gegen Schädel, Stiefel gegen Rippen. Dann kamen die Messer, die Eisenrohre, die Molotovs.\n\nNun ist Leipzig ein Schlachtfeld. Polizeibarrikaden werden zerschlagen, Sirenen heulen, Leichen liegen zerbrochen auf Straßenbahnschienen. Die Bahngleise brennen, Rauch wabert über die Pleiße. Schüsse hallen in den Gassen wider - erst aus dem Schatten, dann aus offenem Trotz. Das ist kein Aufstand mehr. Das ist Krieg en miniature.\n\nGrundsätzlich geht es offensichtlich um Action. Eine endgültige Säuberung, die Ausrottung des linken Drecks, bevor er sich weiter ausbreitet. Die Stadt muss in die Schranken gewiesen werden, koste es, was es wolle. Aber viele in unseren Reihen rufen zur Zurückhaltung auf. Die Legitimität des Reiches steht auf dem Spiel; wenn dies in ein Massaker ausartet, wird die Welt zusehen."
 germany.56.a: "Worauf sollen wir noch warten? Vernichtet sie."
 germany.56.b: "Ich sage es nur ungern, aber haltet euch etwas zurück."
 germany.57.t: "Wahlergebnis der Bundestagswahl 2021"
 germany.57.desc: "Am 26. September hat die erste Runde der Bundestagswahl begonnen, bei der die Mitglieder des 20. Auch in Berlin und Mecklenburg-Vorpommern finden Landtagswahlen statt, und es ist ein entscheidender Wahltermin in Deutschland. Angela Merkel, die seit 2005 Bundeskanzlerin ist, hat auf eine erneute Kandidatur verzichtet und damit die deutsche Politik in Aufruhr versetzt. An ihrer Stelle hat die CDU Armin Laschet für das Amt des Bundeskanzlers nominiert, während die SDP Olaf Scholz nominiert hat, der im vierten Kabinett Merkel Vizekanzler war. Diese Wahl ist ein Wendepunkt in der deutschen Politik, denn die SDP ist auf dem besten Weg, das Ruder zu übernehmen, während die CDU/CSU im Chaos versinkt. Andere Parteien wie die Grünen, die FDP, die AfD und Die Linke haben ihre Kandidaten nominiert, und als die Wahlurnen gefüllt sind, steht der Sieger fest. Es wird der Welt verkündet, dass die Zukunft Deutschlands..."
 germany.57.a: "ein sozialistisches Deutschland!"
 germany.57.b: "ein grünes Deutschland!"
 germany.57.c: "ein rotes Deutschland!"
 germany.57.d: "ein freies Deutschland!"
 germany.57.e: "ein konservatives Deutschland!"
 germany.57.f: "ein souveränes Deutschland!"
 germany.58.t: "Extremismusbekämpfung"
 germany.58.d: "Die Straßen sind ein Kriegsgebiet. Seit Wochen, ja sogar Monaten, sind die Zusammenstöße eskaliert. Vermummte schleudern Ziegelsteine auf die Bereitschaftspolizei, abgefackelte Autos schwelen weiter, rote und schwarze Banner stehen den Eisernen Kreuzen und Fackeln gegenüber.\n\nBerlin. Hamburg. Leipzig. Städte, die einst für ihren Wohlstand bekannt waren, sind nun Schlachtfelder. Demonstranten stürmen Regierungsgebäude, zerschlagen Glas und kritzeln Parolen auf jede Oberfläche, die sie finden. Bankfilialen werden entkernt, Parteizentralen niedergebrannt, Touristen belästigt, ganze Stadtteile in verbarrikadierte Festungen gegnerischer Gruppen verwandelt.\n\nDie Polizei ist überfordert. Jede Reaktion wird mit noch mehr Gewalt beantwortet. Wenn sie zu hart durchgreift, nennt die Linke das Faschismus. Wenn sie sich zurückhält, nennen die Rechten das Schwäche. Das Vertrauen in die Regierung schwindet mit jedem Schlag, jedem angezündeten Feuer, jeder Rede, die zur "Revolution" oder "Reinigung" aufruft. Die Geheimdienstberichte sind eindeutig. Auf beiden Seiten haben sich paramilitärische Flügel gebildet. Die linksextremen Agitatoren sprechen vom antikapitalistischen Kampf, vom Niederreißen des "bürgerlichen Staates", bevor es zu spät ist. Die Rechtsextremen sprechen von nationaler Wiedergeburt, von der "Verteidigung Deutschlands" gegen innere Feinde. Wir können nicht beides auf einmal bekämpfen. Oder vielleicht können wir es doch. Aber wenn wir nicht bald handeln, haben wir vielleicht keine Regierung mehr, die wir verteidigen können."
 germany.58.a: "Schicken wir die Rote Bedrohung zurück in den Osten!"
 germany.58.b: "Das Reich wird es nie wieder geben!"
 germany.58.c: "Beide Extreme sind gleichermaßen entsetzlich."
 germany.59.t: "Ende des saudischen Bürgerkriegs"
 germany.59.d: "Als der Krieg begann, wich die Welt zurück. Die Märkte brachen zusammen, Tanker blieben liegen, die Treibstoffpreise stiegen in die Höhe. Die Ölfelder Arabiens hatten die Weltwirtschaft über Generationen hinweg ernährt. Jetzt waren sie Schlachtfelder. Hätten wir tatenlos zugesehen, wäre Deutschland ebenso verblutet wie der Rest der Welt. Also entschieden wir uns für eine Seite. Waffen, Berater, Logistik - was immer die Republik brauchte, wir schickten es. Und als ihre Streitkräfte in Riad einmarschierten, sorgten wir dafür, dass sie die Brunnen am Laufen hielten.\n\nRiad feiert, aber hier ist es eine freudige Notwendigkeit. Berlins Wirtschaft hat die Krise überstanden, die Industrie ist nicht verhungert. Unser Glücksspiel hatte sich ausgezahlt. Die Verantwortlichen der Republik waren natürlich dankbar. Zu dankbar. Sie wussten, dass sie uns alles verdankten, und diese Art von Schulden war gefährlich. Wie lange würde es dauern, bis sich die Fraktionen gegeneinander wandten, bis alter Groll wieder aufflammte? Die Monarchisten waren nicht verschwunden. Nicht wirklich. Sie waren nach Jordanien geflohen und hatten sich dort neu formiert. Was auch immer von der saudischen Familie übrig blieb, würde den Namen des demokratischen Westens für immer verfluchen. Eines Tages würden sie zurückkommen. Aber was soll's. Für heute hatten wir gewonnen. Die Ölkrise war vorbei. Die Wirtschaft war in Sicherheit."
 germany.59.a: "Ein neuer Verbündeter am Golf."

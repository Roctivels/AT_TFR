 germany.159.t: "Deutschland marschiert in Tschechien ein"
 germany.159.d: "In einer scheinbaren Wiederholung der Geschichte stoßen die deutschen Streitkräfte erneut an die Grenzen der Tschechischen Republik vor und überrennen die örtlichen Grenzsoldaten und Siedlungen entlang der Grenze. Das Ziel der groß angelegten Invasion ist der Sturz der derzeitigen Regierung in Prag. Um Mitternacht ertönten in mehreren Großstädten, darunter auch in der Hauptstadt, Luftschutzsirenen, und die örtlichen Behörden forderten die Einwohner auf, alle wichtigen Großstädte zu evakuieren, da die deutschen Streitkräfte aus allen Richtungen anrückten. Die Regierung kündigte bereits die vollständige Mobilisierung des Militärs und die Einberufung von Reservisten an, so dass nur wenige Stunden nach dem ersten Einmarsch bereits Tausende von Menschen Zuflucht gesucht haben.\n\nVorerst ist die Tschechische Republik der Gnade von [GER.GetName] ausgeliefert."
 germany.159.a: "Hey, das habe ich schon mal gesehen!"

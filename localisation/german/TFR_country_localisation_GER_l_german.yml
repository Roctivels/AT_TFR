 germany.62.t: "Links- und rechtsextreme Bandengewalt"
 germany.62.d: "Eine weitere Schlägerei auf der Straße, ein abgebranntes Büro, eine aus dem Fluss gezogene Leiche. Die extremen Linken und die extremen Rechten streiten nicht mehr. Sie debattieren nicht, sie protestieren nicht und sie tun nicht einmal so, als ob. Sie jagen. Sie ziehen mit schwarzen Masken und roten Armbinden, mit kahlgeschorenen Köpfen und Stahlkappenstiefeln durch die Straßen und sehen in dem jeweils anderen nichts weiter als Beute. Die Zahl der Toten ist die einzige Währung, die zählt.\n\nBanken werden verwüstet und politische Büros werden geplündert. Stadtteile sind No-Go-Zonen, deren Straßen von selbst ernannten Patrouillen von Radikalen überwacht werden. Die Polizei verhaftet, wo sie kann, aber für jeden Militanten, den sie von der Straße holt, kommen zwei neue hinzu. Diese Gewalt ist ein Ökosystem, ein Kreislauf, der sich selbst nährt.\n\nNachts wird eine Molotow durch ein Fenster geschleudert. Ein Mann wird in eine Gasse gezerrt, und ihr Hinterhalt wird sich über Twitter verbreiten. Ein Schaufenster wird brennen, ein Name wird von einer Liste gestrichen werden, eine Mutter wird morgen aufwachen und feststellen, dass eines ihrer Kinder verschwunden ist. Und morgen wird es wieder passieren."
 germany.62.a: "Wann wird die Gewalt enden?"
 germany.63.t: "Russische Unternehmen im Visier"
 germany.63.d: ""
 germany.63.a: "Europa ist kein Ort für russischen Imperialismus!"
 germany.64.t: "Die Frage der russischen Oligarchen"
 germany.64.d: "Die derzeitige instabile Wirtschaftslage sowie die verschärften Spannungen im Osten haben die Frage nach dem Eigentum russischer Unternehmer aufgeworfen.\n\nAuch wenn wir eine unnötige Eskalation mit Russland riskieren, gibt es in der Politik eine weit verbreitete Meinung, dass diese Vermögenswerte für die Bedürfnisse des deutschen Staates verwendet werden sollten, wobei die aggressive russische Außenpolitik als Grund dafür angeführt wird. Es könnte jedoch ebenso vorteilhaft sein, russische Unternehmen weiterarbeiten zu lassen, da viele von ihnen einen Beitrag zu Deutschlands Industrie und Energiewirtschaft leisten.\n\nDie endgültige Entscheidung liegt bei dem Bundeskanzler."
 germany.64.a: "Beschlagnahmt ihr Vermögen!"
 germany.64.b: "Lasst sie in Ruhe, wir wollen unser Investitionsklima nicht ruinieren."

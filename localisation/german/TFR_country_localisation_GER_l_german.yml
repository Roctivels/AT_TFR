 germany.150.t: "Verlegung der deutschen Regierung"
 germany.150.d: "Angesichts unserer demütigenden Niederlage gegen den Osten, die nicht zuletzt auf die Nähe Berlins zur Oder zurückzuführen ist, ist es an der Zeit, den Standort unseres Regierungssitzes zu überdenken. Durch die Neuziehung der polnischen Grenzen ist unsere Hauptstadt dem Feind immer näher gerückt. Auch die Vorherrschaft über die Ostsee ist jetzt umstritten, und es droht ein amphibischer Angriff von Mecklenburg aus. Kritiker behaupten, Berlin sei nicht mehr geeignet, da es im Kriegsfall viel schneller zusammenbrechen würde.\n\nDie Optionen sind Köln, die viertgrößte Stadt nach Einwohnern und gerade südlich der ehemaligen westdeutschen Hauptstadt Bonn, die vier Jahrzehnte lang bestand. Die Stadt liegt überwiegend westlich des Rheins und ist daher zum größten Teil natürlich verteidigt. Dann ist da noch Frankfurt, die Finanzhauptstadt von ganz Kontinentaleuropa, Sitz der Europäischen und der Deutschen Zentralbank, die zusammen ~5.000 metrische Tonnen Goldreserven im Wert von einer halben Billion USD besitzen. In Frankfurt sind auch viele Unternehmen ansässig, was Lobbyisten als Grund für den Umzug nach Frankfurt anführen.\n\nNächstes Beispiel: Hamburg. Obwohl seine Lage prekär ist, ist es die nächstgrößte Stadt mit 2 Millionen Einwohnern, in der Nähe wichtiger Marinestützpunkte und südlich des Nord-Ostsee-Kanals gelegen, was es für die Russen schwieriger machen würde, dort zu landen. Und schließlich München. Der wachsende Regionalismus innerhalb Bayerns hat sich nach dem Krieg zugespitzt und wird bei den derzeitigen Raten voraussichtlich noch weiter zunehmen; eine Beruhigung Bayerns durch die Verlegung unserer Hauptstadt dorthin wäre ein K.O.-Schlag für ihre Bewegung und würde unseren Süden stabilisieren, ein relativ gutes Geschäft. Wie auch immer die Entscheidung ausfällt, beten wir, dass die Russen nicht auf deutschen Boden zurückkehren."
 germany.150.a: "Köln ist eine hervorragende Wahl."
 germany.150.b: "Frankfurt ist von strategischer Bedeutung."
 germany.150.c: "München ist am besten, es kann leicht verteidigt werden."
 germany.150.d: "Die Hauptstadt soll in Berlin bleiben."
 germany.150.e: "Die Hauptstadt soll in Berlin bleiben."
 germany.151.t: "Der Oberste Bundeskanzler appelliert an die Bundeswehr"
 germany.151.d: "Das Schicksal des deutschen Volkes und Europas liegt nun in euren Händen. Euer Kampf muss das Ziel verfolgen, das heutige Russland in Trümmer zu verwandeln, und er muss mit äußerster Härte geführt werden."
 germany.151.a: "Sieg um jeden Preis, der Gewinner bekommt alles."
 germany.152.t: "Babylon Berlin"
 germany.152.d: "Während das Reich seine Zähne schärft, dürfen wir als Volk unsere Abstammung und kulturelle Identität nicht vergessen. Im Laufe der Geschichte trugen wir, die Deutschen, das Banner und den Schrei des Todes und der Vollkommenheit. Die Vandalen haben die Welthauptstadt geplündert, die Preußen haben den europäischen Hegemon gedemütigt; wir sind Spenglers lebende Prophezeiung. Mit dem Wiederaufleben der Ariosophie im 21. Jahrhundert ist klar, dass der Zorn des Göttlichen und die Götter der Alten uns begleiten, wie sonst ist unsere unstillbare Kampfeslust zu erklären? Wotan, rastlos und allmächtig, hat seine Raserei in unsere Welt als uns, den Volkstaat, manifestiert. "Ergriffenheit", wie Jung es formulierte, sondern auf einen ganzen Körper bezogen, den Korpus des Reiches.\n\nIn Berlin paradieren mit Gold überzogene Adler, Männer in feierlichen Gewändern, einige tragen violettrote, vermummte Gewänder. Stäbe, an ihnen befestigt die Schwarze Sonne, das Hakenkreuz, die Odal, alles uralte Symbole Deutschlands. Am Monat Hagal in der Weltenuhr hat das Volk seine göttliche Berufung gefunden."
 germany.152.a: "Wow..."

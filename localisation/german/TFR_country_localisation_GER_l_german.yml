 GER_shareholder_democracy: "Aktionärsdemokratie"
 GER_shareholder_democracy_desc: "Das Zeitalter der nationalen Souveränität und der repräsentativen Demokratie ist vorbei und hinterlässt nur noch Spaltung, Korruption und Verfall. Die Illusion des Regierens durch das Volk diente lediglich dazu, unbedeutende Beamte zu ermächtigen, deren Loyalität nicht dem Volk, sondern ihren eigenen Taschen galt - oder schlimmer noch, unseren Gegnern.\n\In der neuen europäischen Ordnung ist kein Platz für sentimentale Ideale. Die Sitze in unserem höchsten Regierungsgremium - dem Europäischen Parlament - werden an diejenigen vergeben, die nachweislich in der Lage sind, die Zukunft zu gestalten: Führungskräfte transnationaler Unternehmen, Direktoren von Verteidigungs- und Biotech-Syndikaten und zertifizierte Mitglieder der intellektuellen Elite.\n\n Jeder von ihnen muss Anteile an dem System erwerben, das sie nun mitregieren, um sicherzustellen, dass ihr Engagement nicht ideologisch, sondern vertraglich ist - rechtlich gebunden an die Maschine, der sie dienen.\n\nGier. Effizienz. Weitblick. Dies sind keine Laster mehr, sondern Säulen einer stabilen Welt. Lasst die Massen träumen; wir werden die Realität verwalten."
 GER_reconstruct_european_cities: "Europäische Städte wiederaufbauen"
 GER_reconstruct_european_cities_desc: "Die vielen Völker Europas sprechen viele Sprachen, und ihre Städte sind oft ein ineffizientes, verworrenes Durcheinander, voller "Kulturzentren", die seit Jahrhunderten bestehen und nichts als nostalgische Zeugnisse einer Vergangenheit sind, von der wir uns immer weiter entfernen. Wir bauen ein Europa auf, ein universelles Europa, ein Volk, das sich als kollektives Ganzes fühlen muss, eine Identität. Diese alten Kathedralen und Paläste, die Jahrhunderte, manchmal sogar Jahrtausende zuvor erbaut wurden, waren nie dazu bestimmt, so lange zu überdauern.\n\nUm eine europäische Identität aufzubauen, müssen diese regionalen "Denkmäler" ersetzt und eine einheitliche europäische Architektur angenommen werden. Mit der Zeit werden wir Städte bauen, die effizient und organisiert sind. Die sich schlängelnden Straßen und Fußwege werden geschäftige Ströme des Handels und der Produktion sein, in denen es von Arbeitern wimmelt wie in einem Fluss voller Treibholz.\n\nSie mögen protestieren, aber sie werden nichts zu begehren haben, sie werden lernen, die Bürogebäude und Wolkenkratzer zu lieben, die wir an ihre Stelle setzen, wahre Errungenschaften und architektonische Wunderwerke, wir brauchen keine barocken Paläste und längst tote Verwaltungszentren von Grafen und Königen."
 GER_rentier_based_economy: "Staatliche Beteiligung minimieren"
 GER_rentier_based_economy_desc: "Warum mischt sich die Regierung in den Markt ein? Der Markt war schon immer und wird auch in Zukunft in der Lage sein, sich selbst zu regulieren. Er ist das Ying und Yang der Gesellschaft. Er treibt soziale Formen und Normen, Veränderungen und Evolution an. Der Staat war schon immer nur ein Hindernis für den Fortschritt. Er legt Gesetze und Vorschriften fest, die unsere Entwicklungsmöglichkeiten einschränken und unseren Mut und Innovationsdrang töten. In dieser neuen Gesellschaft, dem wiedergeborenen Europa, werden die Bürohengste und Schreibtischhengste einen Schritt zurücktreten. Die Welt gehört Ihnen, den Innovatoren und Visionären."

 germany.221.d: "Als Reaktion auf unsere unzureichenden Maßnahmen zur Befriedigung der Interessen der Unternehmen, von denen unsere Wirtschaft stark abhängt, ist eine Delegation der größten europäischen und transnationalen Unternehmen an uns herangetreten und hat ihren Vertretern angeboten, die meisten Schlüsselpositionen in der Regierung zu besetzen, um eine wirklich technokratische und kooperative Zukunft für Europa zu gewährleisten.\n\nAuch wenn die Macht der Unternehmen zugenommen hat und die Vorstandsvorsitzenden nun direkt politische Entscheidungen treffen, fragen sich viele: Hat sich wirklich etwas geändert?"

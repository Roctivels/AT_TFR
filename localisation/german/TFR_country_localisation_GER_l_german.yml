 germany.41.t: "Venezuela stimmt zu"
 germany.41.d: "Nach langen Verhandlungen zwischen den beiden Parteien haben wir schließlich eine Vereinbarung getroffen, die für beide Seiten von Vorteil ist. Die venezolanische Regierung wird die versprochenen Kredite, Industrieanlagen und Fachkenntnisse erhalten, während wir einen großen Rabatt auf ihr Öl erhalten. Erwähnen Sie nur nicht die moralischen Implikationen, wenn Sie Geld nach Caraccas schicken.\n\n"
 germany.41.a: "Fantastisch."
 

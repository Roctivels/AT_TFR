 germany.83.t: "Verkündung der Europäischen Union"
 germany.83.d: "Heute ist ein Tag wie kein anderer. Die Europäische Union - ein Rahmen der Brüderlichkeit, der Zusammenarbeit und der Einheit zwischen den Nationen dieses großen Kontinents - ist endlich bereit, sich zu erheben. Nach jahrzehntelanger Arbeit und hartem Kampf gegen die Gezeiten der Geschichte hat sich die Union endlich durchgesetzt.\n\nNicht länger werden wir uns auf den Status einer Scheinföderation beschränken. Unser wahres Ziel ist nun klar - unser Schicksal in greifbarer Nähe. Es ist weder ein loses Bündnis von Nationen noch ein Chor der Stimmen von vielen; es ist ein eisenharter Superstaat, der von Lissabon bis Riga reicht, mit einer einzigen Stimme. Heute ist der Tag, an dem die Europäische Union zu dem aufsteigt, was sie werden soll. Heute ist der Tag, an dem es beginnt..."
 germany.83.a: ""..das europäische Jahrhundert"
 germany.84.t: "Frankreich stimmt für EU-Beitritt"
 germany.84.d: "In einem historischen Moment hat sich das französische Volk für den Beitritt zur Europäischen Union entschieden. Seit den Tagen Karls des Großen waren unsere Völker nicht mehr unter einem Banner vereint, und die vergangenen neun Jahrhunderte waren von Kämpfen zwischen unseren beiden Ländern geprägt. Dies ist ein bedeutsames Ereignis, das in beiden Nationen als solches gefeiert wurde.\n\nDie Bedeutung dieser Vereinigung ist jedoch nicht nur symbolisch. Frankreich verfügt über eine der größten Armeen in Europa, und ihre Vereinigung wird unseren Streitkräften eine große Feuerkraft verleihen. Nicht nur das, sondern ihr bedeutender Einfluss in Westafrika wird es uns ermöglichen, die Russen in der Region zu bekämpfen. Dies ist sicherlich ein schwerer Schlag gegen die östliche Bedrohung und ein weiterer Schritt hin zu unserem endgültigen Showdown mit ihnen."
 germany.84.a: "Ausgezeichnete Nachrichten!"
 germany.85.t: "Italien stimmt für EU-Beitritt"
 germany.85.d: "Italien ist seit jeher europaskeptisch, so dass wir befürchteten, dass es ein aussichtsloses Unterfangen sein würde, das Land vom EU-Beitritt zu überzeugen, aber am Ende hat sich unser Schachzug ausgezahlt. Die Abstimmung in Italien war viel knapper als in den anderen Ländern, mit denen wir uns kürzlich vereinigt haben, aber die Gewerkschaftsbefürworter haben trotzdem mit einem beträchtlichen Vorsprung gewonnen.\n\n Der Beitritt Italiens zur Europäischen Union hat eine Reihe von Vorteilen mit sich gebracht. Sie bietet uns vor allem mehr Warmwasserhäfen und Zugang zur Straße von Sizilien. Wir können nun sicherstellen, dass die Russen, die durch das Mittelmeer reisen, einen fairen Anteil zahlen. Italien verfügt außerdem über einen großen Fahrzeugmarkt und mehrere große Automobilhersteller, so dass wir unser Monopol auf dem Markt ausbauen können."

 GER_peoples_economy_dynamic: "Volkswirtschaft"
 GER_peoples_economy_dynamic_desc: "\n\n\n\n£GFX_GER_volkswirtschaft_banner\n\n\n\n\n" 
 GER_peoples_economy_category_desc: "Deutschland war immer die dominierende Wirtschaftsmacht in Europa. Unser Land ist stolz auf den Erfindungsreichtum und die harte Arbeit seiner Menschen. Seit kurzem stehen wir jedoch am Scheideweg, verursacht durch Energieprobleme und eine allgemeine Rezession in der ganzen Welt, die durch unsere gefährdeten Handelsbeziehungen noch verstärkt wird.\n\nHerr Bundeskanzler, es liegt an Ihren klugen Entscheidungen, die Wirtschaft wieder in die Position zu bringen, in der sie sich vor 10 Jahren befand, und Deutschland zu einer gefürchteten und respektierten Weltmacht zu machen."

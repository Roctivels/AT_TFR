 GER_no_more_weakness: "Keine Schwäche mehr"
 GER_no_more_weakness_desc: "Zu lange wurde unser Land von Verrätern regiert. Amerikanische, sowjetische und globalistische Kollaborateure, die der deutschen Nation den letzten Saft ausgesaugt und den Stolz auf unsere historischen Errungenschaften unter den Teppich des Konsumismus und Multikulturalismus gekehrt haben.\n\nDas erdrückende Joch war sogar nach dem Fall der BRD zu spüren, als all die alten linken Opportunisten ihre Kleider wechselten, nur um die Macht zu übernehmen und zu behalten.\n\nAber die Menschen lassen sich nicht mehr täuschen, genug ist genug! Der Aufbau eines eigenständigen, starken und ideologisch geeinten Deutschlands beginnt mit unserer Revolution!"
 GER_strengthen_the_grip: "Den Griff stärken"
 GER_strengthen_the_grip_desc: "Unsere geografische Lage, die Naivität und Inkompetenz unseres früheren Regimes sowie der ständige Abschwung und Personalabbau haben unser Land anfällig für Angriffe aus allen Richtungen gemacht - sowohl von innen als auch von außen.\n\nDie neuen Richtlinien der Volkskammer sollen Deutschlands Ansehen in Europa verbessern und die Sicherheit und das Wohlergehen unseres Volkes gewährleisten. Die Stasi und die NVA werden zusammenarbeiten, um das historische deutsche Land zu konsolidieren und gefährliche Elemente im Inneren zu bekämpfen."
 GER_honour_the_army: "Die Armee verehren"
 GER_honour_the_army_desc: "Eine Niederlage nach der anderen, die deutsche Führung hat es versäumt, die richtigen Schlüsse zu ziehen. Sogenannte Politiker und die herrschende Klasse haben es versäumt, das wichtigste Thema unserer Zeit zu lösen - die Sicherheit und die Selbstverteidigungsfähigkeit unserer Nation.\n\nWir werden nicht den gleichen Fehler machen!\n\nJetzt werden unsere Prioritäten, Regierungssysteme und wirtschaftlichen Entscheidungen alle im Hinblick auf das Militär getroffen. Unsere neue Politik ist ganz auf die Armee ausgerichtet - nicht auf die Eliten und Schmarotzer!"
 GER_old_guard_new_revolution: "Alte Garde, neue Revolution"
 GER_old_guard_new_revolution_desc: "Wir haben geschafft, was keine andere Partei, keine andere Gruppe, keine andere Klasse zuvor geschafft hat. Wir haben eine Koalition gebildet, die man nicht für möglich gehalten hat. Und es ist keine parlamentarische Koalition, eine Kombination aus Geld, ein Wiegenlied für die arme, hungrige und gedemütigte Nation.\n\nUns ist eine Allianz der Ideen. Von links und rechts. Von der alten und der neuen Garde. Aus verschiedenen Schichten und aus verschiedenen Zeiten, alle vereint in einer einzigen Sache - für die große deutsche Nation und für einen starken deutschen Staat!"
 GER_raf_romanticism: "Unseren Kampf verherrlichen"
 GER_raf_romanticism_desc: "Unsere Geschichte kennt viele Revolutionäre, mutige Kämpfer gegen den Kapitalismus, von rechts wie von links.\nn\Es ist ein Weg voller Entbehrungen und Opfer, aber dank dieser Helden können wir Deutschland heute neu gestalten.\n\nWir müssen ihre Taten in der Kultur und im Alltag unseres Landes verewigen, damit sich alle Deutschen an sie erinnern!"
 GER_new_german_spirit: "Neuer Deutscher Geist"
 GER_new_german_spirit_desc: "Der Geist des freiheitlich-demokratischen, bürgerlichen Deutschlands ist gestorben, zusammen mit dem Staat, der ihn stützte. Er ist unvorstellbar verkommen und hat uns in das Elend von Dekadenz und Niederlage gezogen.\n\nNun ist es Zeit für einen neuen Geist mit gesundem Nationalismus, für eine moralische Wiederbelebung unseres Volkes, auf das man so lange herabgesehen hat. Es ist an der Zeit, dass deutsche Kultur und Traditionen wieder anerkannt werden!"
 GER_deconstruction_of_post_modernity: "Dekonstruktion der Postmoderne"
 GER_deconstruction_of_post_modernity_desc: "Der große Sieg, den Deutschland heute errungen hat, ist nur ein kleiner Schritt nach vorn für den Rest der Welt. Ein kleiner, aber nicht unbedeutender Schritt.\n\nIronischerweise hat Deutschland, indem es versucht hat, die Macht so fest an sich zu reißen, seinen eigenen Untergang vorbereitet. In seinen Tugenden liegen auch Schwachstellen - die wir kennen, weil wir unser Leben damit verbracht haben, sie zu studieren.\n\nNun sind Menschen aus dem gesamten intellektuellen Spektrum, aus dem Underground und dem Mainstream; Wissenschaftler und Amateure - sie alle sind gekommen, um an dem großen Projekt der Dekonstruktion des Kapitalismus teilzunehmen.\n\nErst einmal - metaphorisch gesehen - nehmen wir jeden Aspekt der Postmoderne, schauen ihn an und fragen uns: "Wie sind wir hierher gekommen?", und die Antwort darauf: "Wie kommen wir hier wieder raus?".\n\nFür viele war das früher ein Hobby. Aber jetzt ist es ein Rahmen für die buchstäbliche Dekonstruktion des Kapitalismus als System."
 GER_exiting_the_vampire_castle: "Raus aus dem Vampirschloss"
 GER_exiting_the_vampire_castle_desc: "Das Spätkapital hat sich unzähliger Verbrechen schuldig gemacht, aber es gibt ein wirklich abscheuliches, gegen das sofort vorgegangen werden muss.\n\nDer Kapitalismus hat den sozialen Zusammenhalt getötet, den Kollektivismus unterdrückt, das Gefühl der Kameradschaft zwischen den Menschen zertrampelt und die wahre Pluralität zerschlagen. Er hat unser Leben in sein eigenes Recht und Unrecht aufgespalten und ganze Generationen mit Mobbing und Beschämung gezeichnet. Sie sind ausgebrannt, einsam und haben Angst vor dem, was die Zukunft bringt.\n\nWir müssen Maßnahmen ergreifen, um den Glauben in die Seelen der Menschen und das Feuer in ihre Herzen zurückzubringen. Ein neues Zeitalter des Fortschritts und des Wohlstands liegt jenseits der Mauer der alten Vorurteile!"
 GER_phase_out_capital_fundamentalism: "Kapitalfundamentalismus abschaffen"
 GER_phase_out_capital_fundamentalism_desc: "Die Welt ist im Kreislauf des Kapitalismus gefangen, einem nicht enden wollenden Labyrinth, einem Kult, einem sich drehenden Rad, in dem die Menschen ohne Ziel laufen.\n\nDieses System nützt längst nicht einmal mehr seinen Herren, und doch halten wir es weiter aufrecht. Und es fordert seinen Tribut - wie eine Religion, die immer mehr Opfer verlangt und die Menschen in die schlimmsten Sklaven verwandelt - in solche, die glauben, frei zu sein.\n\nWir müssen den fundamentalistischen Kult, zu dem der Kapitalismus geworden ist, zerstören und alle Illusionen, die die Menschen über ihn hatten, brechen - es ist eine Frage des Prinzips und des Überlebens."
 GER_detox_from_nostalgia: "Entgiftung von Nostalgie"
 GER_detox_from_nostalgia_desc: "Die Zeit hat bewiesen, dass die Deutschen zu den nostalgischsten Menschen gehören, die je gelebt haben - zum Schlechten, wie unsere Erfahrung gezeigt hat. \n\nDas Kapital hat dieses Gefühl immer missbraucht und meisterhaft auf der Flöte der Nostalgie gespielt, um Deutschland immer wieder in den Ruin zu führen. Manipulativ und hinterlistig redet es einem ein, dass das Leben einst glücklicher, das Gras grüner und unser Land größer war und dass man in diese Zeiten zurückkehren kann, wenn man nur alles tut, was sie sagen - was für ein Witz!\n\nUnsere Nation wird nicht länger nach den verfallenden Gebäuden der Ordnungen vor uns streben. Wir haben aus ihren Fehlern gelernt - jetzt gibt es nur noch Neues zu tun."
 GER_redefine_marxist_ideals: "Marxistische Ideale umdefinieren"
 GER_redefine_marxist_ideals_desc: "Marxismus - wie viel Bedeutung dieses Wort im Laufe der Jahre erlangt hat! Er ist zu einem der grundlegenden Prinzipien des Denkens in der modernen Welt und zum Sinn des Lebens für Millionen von Menschen auf der ganzen Welt geworden.\n\nWir lieben ihn, weil der Marxismus eine Philosophie ist, die sich ständig verändert und weiterentwickelt. Seine Geschichte ist der Kampf, der uns dorthin geführt hat, wo wir heute sind. Aber wir werden nicht an der Seite derer stehen, die immer noch mit dem Marxismus des 20. Jahrhunderts herumspielen - wir müssen tun, was Lenin, Stalin und Mao getan haben, uns an die modernen Umstände anpassen und sie in unserer eigenen Denkweise widerspiegeln.\n\nWir werden den Marxismus aufgreifen, wir werden ihn weiterentwickeln und ihn mit uns zu den Sternen tragen - oder vielleicht trägt er uns? Nun, das ist ein dialektisches Paradoxon, das eine Debatte wert ist."
 GER_accelerate_into_a_brighter_future: "Mit Schwung in eine bessere Zukunft"
 GER_accelerate_into_a_brighter_future_desc: "Dies ist ein Moment, der längst überfällig war, und dennoch hat niemand von uns daran gezweifelt, dass er kommen würde.\n\nDer Kapitalismus hat seinen Lauf genommen. Er mag einmal frisch und nützlich gewesen sein, aber jetzt ist er nur noch ein verrottender Leichnam, der über der Erde hängt. Es ist unsere Pflicht und Schuldigkeit, die Zivilisation von diesem Hindernis zu befreien! Wir werden nicht nur die wirtschaftlichen und gesellschaftlichen Institutionen abbauen, die den Kapitalismus noch aufrechterhalten - wir werden uns auch von den inneren Ketten befreien, die die freie und kunstvolle Natur eines jeden Menschen zurückhalten! \n\nEmanzipiere dich und wirf deine hohle Schale weg!\nNimm deine Werkzeuge und Waffen in die Hand, kämpfe, um du selbst zu sein!\nBeschleunige, möge die Geschichte für immer ohne Ende marschieren!\n\nSCHNELLER!!!\nSCHNELLER!!!\nSCHNELLER!!!" 
 
 #Day X
 GER_gotterdammerung: "Götterdämmerung"
 GER_gotterdammerung_desc: "Der Krieg geht in seine letzte Runde, und seine Folgen werden auf dem gesamten europäischen Kontinent noch über Generationen hinweg zu spüren sein. Wie viele seiner NATO-Verbündeten liegt auch Deutschland jetzt in völliger Verwüstung. Unsere Städte wurden durch den unerbittlichen russischen Beschuss in Schutt und Asche gelegt, und auf unseren Straßen türmen sich die Leichen, während verzweifelte Familien nach ihren Angehörigen suchen - und sich durch die Trümmer wühlen, um sie, wenn schon nicht lebend, so doch wenigstens ihre Überreste zu bergen. Wieder einmal wird unsere Nation von einem alten Feind beschämt - einem Feind, von dem wir glaubten, dass er 1991 der Geschichte angehörte. Wir hatten uns dieses Jahrhundert als eine Ära des Friedens und des Wohlstands vorgestellt, als eine Zeit, in der wir für die Vergangenheit büßen und eine neue, hoffnungsvolle Zukunft schmieden konnten. Aber wir hätten uns nicht mehr irren können. Die Bedrohung aus dem Osten ist nie verschwunden, sie hat nur geschlummert und auf den richtigen Moment gewartet, um zuzuschlagen. Dieser Krieg war unsere Abrechnung, ein brutales Erwachen aus unserer naiven Selbstgefälligkeit. Jetzt sind die Herzen unseres Volkes von Hass und Wut erfüllt, ihr Durst nach Rache ist ungestillt. Doch vorerst müssen wir ausharren. Wir müssen unsere Fäuste ballen und unsere Köpfe vor der roten Bedrohung senken, während wir mit der mühsamen Aufgabe des Wiederaufbaus beginnen. Aber täuscht euch nicht - Deutschland wird nicht für immer in Trümmern liegen. Wir werden uns wieder erheben. Wir werden siegen. Und am Ende wird der Endsieg Deutschland gehören."

 GER_oper_1: "KÄMPFT! DAS IST UNSERE LETZTE CHANCE, DIE RUSSEN AUS POLEN ZU VERDRÄNGEN!"
 GER_oper_2: "Wir haben sie in die Flucht geschlagen! Dieses Unternehmen wird der letzte Nagel im Sarg sein!"
 GER_oder_defense_initiative: "Initiative zur Oderverteidigung"
 GER_oder_defense_initiative_desc: "Die Zerstörung des Wehrmachtskomplexes auf den Seelower Höhen im Jahr 1945 besiegelte das Schicksal von Berlin. Der bolschewistische Haufen durfte aufmarschieren und unsere Hauptstadt auslöschen.\n\nWir sagen: Nie wieder Seelow. Es muss eine Verteidigungslinie über die gesamte Oder errichtet werden. Kein einziger barbarischer Bolschewik darf jemals deutschen Boden betreten!"

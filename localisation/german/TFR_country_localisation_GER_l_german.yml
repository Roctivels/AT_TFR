 GER_calm_down_the_radicals: "Die Radikalen beruhigen"
 GER_calm_down_the_radicals_desc: "Seit unserer Gründung hat die AfD mit einem negativen Image in der Öffentlichkeit zu kämpfen und Männer wie Björn Höcke haben in dieser Hinsicht sicherlich nicht geholfen. Jetzt, da wir an der Macht sind, ist es wichtiger denn je, unser Image zu modernisieren, um unser Ansehen im Rest Deutschlands zu verbessern und hoffentlich unser Mandat für die nächsten vier Jahre zu festigen."
 GER_all_on_our_own: "Ganz auf uns allein gestellt"
 GER_all_on_our_own_desc: "Die AfD war immer ein Bollwerk gegen Masseneinwanderung und Globalismus in Deutschland! Wir haben uns nie gegen den elitären Druck gewehrt, nie! Jetzt, wo wir endlich an der Macht sind, haben wir die Chance, dem Chaos in Deutschland ein Ende zu setzen. Wir dürfen den Eliten jetzt nicht nachgeben!"
 GER_germany_above_all: "Deutschland über alles"
 GER_germany_above_all_desc: "Zum ersten Mal seit einer gefühlten Ewigkeit haben wir endlich eine Regierung in Deutschland, die Deutschland an die erste Stelle setzt! Nicht Europa zuerst oder so etwas! Das deutsche Volk ist schon viel zu lange durch den Globalismus in die Unterwerfung gezwungen worden! Unter unserer Herrschaft wird Deutschland endlich wieder aufblühen und das deutsche Volk wird seinen Stolz wieder zurückgewinnen!"
 

 GER_purge_extremist_soldiers: "Extremistische Soldaten beseitigen"
 GER_purge_extremist_soldiers_desc: "Wir haben eine Reihe besorgniserregender Berichte über Rechtsextremismus im Heer, der Luftwaffe und der Marine erhalten. Obwohl es sich nur um einen kleinen Teil unserer Streitkräfte handelt, nimmt die Zahl dieser Extremisten in alarmierendem Maße zu. Wir müssen sofort handeln, denn Extremismus in unseren Reihen ist streng verboten. Diese Soldaten werden diszipliniert und je nach Schweregrad wahrscheinlich entlassen, um der Welt zu zeigen, dass wir dieses Verhalten nicht tolerieren."

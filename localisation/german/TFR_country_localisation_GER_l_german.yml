 GER_rearm_europe_divider: ""
 GER_rearm_europe_divider_desc: "\n\n\n£GFX_GER_rearm_europe_pr\n\n\n\n\n\n\nDer ReArm-Plan wird alles andere als einfach sein. Wir werden seinen Erfolg verfolgen können, wobei jede Stufe die positiven Auswirkungen unseres Projekts verbessert, sobald es abgeschlossen ist.\n\nEs ist wichtig zu wissen, wie viele Ressourcen wir für unseren ReArm-Plan aufwenden wollen! Sobald die zeitlich begrenzte Idee abgelaufen ist, können wir keine weiteren Entscheidungen mehr aktivieren. §Y10§! – Deutschland erhält 3 zusätzliche Militärfabriken. §Y20§! – Eine abgeschwächte Version der ReArm-Idee bleibt allen EU-Ländern nach Abschluss des Plans erhalten. §Y30§! – Wir erhalten zusätzlich §G5§!§3£GFX_GER_blue_economy_points_texticon Blaue Wirtschaftspunkte§!.\n§Y40§! – Verschiedene Militärtechnologie-Boni für alle EU-Länder.\n§Y50§! – Die ReArm-Idee bleibt allen EU-Ländern nach Abschluss des Plans erhalten.\n\nCurrent §YReArm Europe Plan Success Level§!: [?GER_rearm_europe_plan_tracker|+0]\n\n§RSollte es zu einem Krieg mit Russland kommen, wird ReArm Europe unabhängig von seinem aktuellen Status gestoppt werden.!§!"
 GER_sustainable_economy_decision: "In §7nachhaltige§! Wirtschaftliche Entscheidungen investieren"
 GER_sustainable_economy_decision_desc: "\n\n\n\n£GFX_GER_sustainable_economic_choices_pr\n\n\n\n\n\nNachhaltige Sektoren bieten langfristiges Wachstum und ökologische Sicherheit. Wir werden Liquidität in grüne Innovationen pumpen, Subventionen gewähren und Kapitalflüsse in nachhaltige Wachstumssektoren lenken, um unsere Wirtschaft umweltverträglich zu gestalten."
 GER_inclusive_economy_decision: "§AInklusive§! Wirtschaftliche Entscheidungen fördern"
 GER_inclusive_economy_decision_desc: "\n\n\n\n£GFX_GER_inclusive_economic_choices_pr\n\n\n\n\n"
 GER_industries_shut_down_mission: "§YDeutsche Unternehmen§! schließen..."
 GER_industries_shut_down_mission_desc: "\n\n\n\n£GFX_GER_shutdown_industries_pr\n\n\n\n\n\nDie Konkurrenz durch ausländische Konzerne und vor allem steigende Energiepreise machen Geschäfte in Deutschland weniger rentabel und veranlassen lokale Unternehmen dazu, zu schließen oder ihren Standort zu verlegen..."
 GER_stabilize_energy_prices_green_decision: "§RNotfall§!-Energiesparmaßnahmen"
 GER_stabilize_energy_prices_green_decision_desc: "Angesichts der Instabilität der Lieferketten und steigender Preise müssen wir schnell handeln. Notfallmaßnahmen zur Energieeinsparung und Energiesparkampagnen werden die Belastung verringern, während längerfristige Infrastrukturmaßnahmen umgesetzt werden."
 GER_stabilize_energy_prices_blue_decision: "Ein §3Europäisches§! Hilfspaket ersuchen"
 GER_greenify_the_bundesautobahn_3: "Die §YBundesautobahn 3§! §7begrünen§!"
 GER_greenify_the_bundesautobahn_3_desc: "Die Bundesautobahn 3 bleibt für die nationale Logistik unverzichtbar. Durch den Ausbau mit E-Fahrspuren, Solarzellen und intelligenten Verkehrssystemen werden unsere Transportwege modernisiert und die Emissionen auf wichtigen Verkehrskorridoren reduziert."
 GER_greenify_the_bundesautobahn_7: "Die §YBundesautobahn 7§! §7begrünen§!"
 GER_greenify_the_bundesautobahn_7_desc: "Die Bundesautobahn 7 bleibt für die nationale Logistik unverzichtbar. Durch den Ausbau mit E-Fahrspuren, Solarzellen und intelligenten Verkehrssystemen werden unsere Transportwege modernisiert und die Emissionen auf wichtigen Verkehrskorridoren reduziert."

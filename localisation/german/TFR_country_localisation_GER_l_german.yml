 germany.173.b: "Die Privatangelegenheiten des Adels gehen die Öffentlichkeit nichts an."
 germany.174.t: "Deutsche Adelige in Veruntreuungsskandal verwickelt"
 germany.174.d: "Nach Gerüchten über Korruption in den Beschaffungsprozessen der Armee hat die Regentschaft eine unparteiische Untersuchung der Angelegenheit zugesagt. Ein vorläufiger Bericht wurde der Presse zugespielt, der nicht nur die Gerüchte bestätigt, sondern auch mehrere Adlige direkt in die Angelegenheit verwickelt.\n\nDie gesamte Affäre ist für die Regierung zu einer Blamage geworden. Die Regentschaft fordert Maßnahmen, hat aber ihre volle Unterstützung für die betreffenden Adligen erklärt."
 germany.174.a: "Ein unterzeichneter Vertrag ist unanfechtbar"
 germany.174.b: "Reformiert den Prozess."
 germany.175.t: "Journalist verhaftet"
 germany.175.d: "Ein prominenter Journalist, der dem Adel kritisch gegenübersteht, wurde kürzlich von den Behörden verhaftet. Sie haben den großen Einfluss des Adels auf politische Entscheidungen beschrieben. Die meisten dieser Entscheidungen kommen im Nachhinein den Mitgliedern zugute. Von besonderem Interesse ist der Umgang mit staatlichen Geldern, die der Adel angeblich zur eigenen Bereicherung verwendet hat. Die Regentschaft hat die Verhaftung des Autors angeordnet.\n\nLiberale Zeitungen und die extreme Rechte sind darüber in Aufruhr, wenn auch aus sehr unterschiedlichen Gründen. Wir müssen uns dazu äußern, bevor die Dinge aus dem Ruder laufen."
 germany.175.a: "Verleumdung ist ein Straftatbestand."
 germany.175.b: "Der Journalist wird umgehend freigelassen."
 germany.176.t: "Adlige kaufen Schlösser"
 germany.176.d: "Mehrere prominente Adlige haben Berichten zufolge mehrere alte mittelalterliche Schlösser gekauft. Wie sie sich das leisten konnten, war Gegenstand zahlreicher Spekulationen. Neue Beweise in Online-Zeitungen deuten stark darauf hin, dass die Regentschaft selbst den Kauf mit Regierungsgeldern genehmigt hat.\n\nDer Skandal weitet sich aus, und wir müssen so schnell wie möglich eine öffentliche Bekanntmachung in dieser Angelegenheit machen."
 germany.176.a: "Die Regierung hat das Gebäude gekauft und dem Adel erlaubt, dort zu residieren."
 germany.176.b: "Die Adligen nahmen das Geld aus einem Vorschuss auf ihre Vergütung."

 GER_tfr_schwab_ending_real_tt: "§CVielen Dank, dass ihr The Fire Rises gespielt habt!\nDiesmal wirklich.\n\nWir hoffen, ihr hattet eine tolle Erfahrung! Ich hoffe, dass ihr keine Bugs hattet, obwohl die bei diesem Pfad... irgendwie unvermeidlich waren.\n\nAber wir hoffen, dass wir zumindest einen unvergesslichen Eindruck hinterlassen haben, oder euch vielleicht dazu inspiriert haben, etwas Eigenes zu erschaffen? Nutzt eure unhaltbare Freiheit, solange ihr sie noch habt!\n\nBis bald!§!"

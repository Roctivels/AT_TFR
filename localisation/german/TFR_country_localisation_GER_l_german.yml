 germany.215.t: "Staatsmedien unterstützen den Krieg"
 germany.215.d: ""Unsere Soldaten rücken geschlossen nach Osten vor! Nimmst du an unserem großen Kampf teil?" - schreit die Werbung aus den Lautsprechern. \n\nKarl schaute auf den Bildschirm und sah eine dritte, 40 Sekunden lange, nicht überspringbare Werbung, die mitten im Video eingeblendet war. Natürlich war es gut, dass er ein Jahresabonnement abgeschlossen hatte, sonst hätte sich die Anzahl der Anzeigen in den 10-minütigen Videos vervierfacht. Der Zusammenbruch der amerikanischen Wirtschaft hat die Internetplattformen schließlich hart getroffen. Ohne sich die Mühe zu machen, das Video bis zum Ende anzusehen, ging Karl ins Wohnzimmer. \n\nSeine Mutter bereitete in der Küche etwas vor, während seine Schwester auf ihrem Handy scrollte. Als er auf den großen Fernseher schaute, ein Relikt aus der Zeit vor 2020, sah er eine weitere Werbung für den Eintritt ins Militär. Diesmal geht es um die Piloten der deutschen Luftwaffe. Diese Sendungen dauern in der Regel 10 Minuten mit einer 5-minütigen Werbepause, die den ganzen Tag über wiederholt wird. Karl schwört, dass er denselben Beitrag schon vor ein paar Wochen gesehen hat. \n\nDa er sich nicht mit Mama über die Lautstärke des Fernsehers streiten wollte, setzte er sich auf die Couch. Beata scrollte wie immer vor sich hin und scherte sich einen Dreck um die Welt. Ein ständiger Feed von Go-Pro- und FPV-Kriegsaufnahmen, Musikbeiträgen und vom Militär gesponserten Inhaltserstellern zog an ihm vorbei. Karl musste zugeben, dass er die Schöpferin der Sturmtruppen-Egirls attraktiv fand, es ist also klar, dass sie attraktiv ist. Er fragte sich jedoch, warum das Regime beschlossen hatte, die Schönheits-Blogger zu sponsern.\n\nAls er zum Rauchen hinausging, hatte Karl endlich etwas Ruhe zum Nachdenken. Die KI-Algorithmen in den sozialen Medien, das Fernsehen, das Radio und sogar der persönliche Assistent zu Hause - sie alle riefen ihn pausenlos dazu auf, sich anzuschließen, als wüssten sie, dass er keine Immunität hat. Es scheint, als ob ein freiwilliger Beitritt viel mehr Vorteile bringt, als von der Straße geholt zu werden. Während er darüber nachdachte, sah er eine Gruppe von Militärrekrutierern vor seinem Wohnkomplex stehen. Anscheinend muss er sich doch nicht für etwas entscheiden. \n\n"

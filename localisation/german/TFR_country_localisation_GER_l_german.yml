 GER_auferstanden_aus_ruinen_cat: "Die Volkskammer"
 GER_auferstanden_aus_ruinen_cat_desc: "\n\n\n\n\n£GFX_GER_auferstanden_aus_ruinen_category\n\n\n\n\n\n\n\nDie §YVolkshammer§! ist das oberste Machtorgan unserer sozialistischen Republik. Es ist das einzige Regierungsorgan des Staates, und nach dem Prinzip der Einheitsgewalt sind ihm alle Staatsorgane unterstellt.\n\n§YVolkskammer§!-Zustimmung £GFX_GER_volkskammer : §G[?GER_peoples_chamber_dynamic_var|1%]§!\nEffekt : £pol_power [?GER_peoples_chamber_support_dynamic_var|=+1%], £GFX_war_support_texticon [?GER_peoples_chamber_support_dynamic_var|=+1%]" 

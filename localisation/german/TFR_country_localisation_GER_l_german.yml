 GER_new_political_sphere_category: "Neue deutsche politische Sphäre"
 GER_new_political_sphere_category_desc: ""\n\n\n\n\n£GFX_GER_new_political_sphere_banner\n\n\n\n\n\n\n\nUnser Land ist durch jahrelange liberale globalistische Dekadenz vergiftet worden. Der Hauptgrund, warum wir den Krieg verloren haben, war, dass unsere Leute vergessen haben, wie es ist, ein großes Land zu sein, und ehrlich gesagt ist es an der Zeit, dass wir sie daran erinnern.\n\n\n\n"
 GER_five_year_plan_cat: "Der Fünfjahresplan"
 GER_five_year_plan_cat_desc: "Der Kapitalismus war eine Katastrophe für die deutsche Wirtschaft. Vor über dreißig Jahren haben die Kapitalisten die Volksbetriebe im Osten unseres Landes ausgeraubt und ruiniert und uns vollständig der NATO unterworfen, und jetzt haben sie uns in einen nicht zu gewinnenden Krieg mit Russland gezwungen, der unsere Wirtschaft zerstört hat. Es war nur eine Frage der Zeit, bis dieses System scheitern würde.\n\nDie Volkskammer hat die Schaffung eines Fünfjahresplans ausgeschlossen, um die Fehler des vorherigen Regimes ungeschehen zu machen, um die industrielle Kapazität Deutschlands wiederherzustellen und zu vervielfachen, damit wir den Faschismus ein für alle Mal besiegen können!"
 GER_socialist_market_economics_cat: "Sozialistische Marktwirtschaft"
 GER_socialist_market_economics_cat_desc: "Der Kapitalismus war eine Katastrophe für die deutsche Wirtschaft. Vor über dreißig Jahren haben die Kapitalisten die Volksbetriebe im Osten unseres Landes ausgeraubt und ruiniert und uns vollständig der NATO unterworfen, und jetzt haben sie uns in einen nicht zu gewinnenden Krieg mit Russland gezwungen, der unsere Wirtschaft zerstört hat. Es war nur eine Frage der Zeit, bis dieses System scheitern würde.\n\nDie Volkskammer hat einen neuen Wirtschaftsplan ausgeschlossen, um die Fehler des vorherigen Regimes rückgängig zu machen, um die industrielle Kapazität Deutschlands wiederherzustellen und zu vervielfachen, damit wir den Faschismus ein für alle Mal besiegen können!"
 GER_spread_the_revolution_category: "Ausbreitung der Revolution"
 GER_spread_the_revolution_category_desc: "0_o"
 GER_peoples_economy_category: "Volkswirtschaft"
 GER_peoples_economy_category_desc: "Deutschland ist seit langem der wirtschaftliche Motor Europas, aber die Energieinstabilität und die angespannten Handelsbeziehungen der letzten Jahre haben unser Land an einen entscheidenden Scheideweg gebracht.\n\nUm diese Zeit zu meistern, stützen wir uns nun auf zwei strategische Wirtschaftsinstrumente:\n\n§7£GFX_GER_green_economy_points_texticon Grüne Wirtschaftspunkte\:§!\n§gVerdient durch Umweltreformen, Ausbau erneuerbarer Energien, innovative ökologische Lösungen und nachhaltige industrielle Maßnahmen.\nSie spiegeln Widerstandsfähigkeit, Innovation, Effizienz und ökologische Verantwortung wider.§!\nDerzeitige §7£GFX_GER_green_economy_points_texticon Grüne Wirtschaftspunkte\:§! [?GER_green_economy_points_var|+0]\n\n§3£GFX_GER_blue_economy_points_texticon Blaue Wirtschaftspunkte\:§!\n§gVerdient durch die Vertiefung der Integration Deutschlands in den europäischen Wirtschaftsrahmen. Stärkung der EU-Zusammenarbeit, Stabilisierung regionaler Lieferketten und Unterstützung kontinentaler Entwicklungsziele.\nSie spiegeln Integration, industrielle Kapazitäten und soziale Verantwortung wider.§!\nDerzeitige §3£GFX_GER_blue_economy_points_texticon Blaue Wirtschaftspunkte\:§! [?GER_blue_economy_points_var|+0]\n\nSehr geehrter Herr Bundeskanzler, durch die Ausgewogenheit zwischen ökologischer Erneuerung und europäischer Koordination können Sie den Wohlstand wiederherstellen und Deutschlands Stellung als führende Kraft auf dem Kontinent sichern."
 GER_bundeswehr_category: "Die Bundeswehr"
 GER_bundeswehr_category_desc: "Das moderne deutsche Militär galt nie als völlig unabhängige Kraft, mit der man rechnen konnte, aber jetzt ist es so offensichtlich wie nie zuvor, dass es ein totaler Reinfall ist, mit einem absoluten Mangel an Rekruten und Finanzierung.\n\nDas Vertrauen in die Bundeswehr wiederzubeleben bedeutet, unseren Nationalstolz wiederzubeleben."
 GER_european_armed_forces_category: "Europäische Streitkräfte"
 GER_european_armed_forces_category_desc: "Wenn wir den russischen Bären ein für alle Mal abwehren wollen, müssen wir uns überlegen, womit wir ihn verteidigen wollen. Ein uneiniger Block aus mehreren Staaten, von denen jeder versucht, in jeder Kategorie der Beste zu sein. Der einzige Weg zum Erfolg führt über die Einigkeit. Um dies zu erreichen, ist die Einheit unserer Streitkräfte unerlässlich. Diese Einheit ist jedoch nicht so einfach zu erreichen, wie ein paar Reden in Brüssel zu halten.\n\nVerträge müssen geschrieben und umgeschrieben werden. Pakte müssen geschlossen werden. Unsere Soldaten und Kommandeure brauchen eine neue Ausbildung und Organisation. Und unsere Bevölkerung muss dies durchgängig unterstützen. Diese Reformen sind nicht dazu gedacht, über Nacht verabschiedet zu werden. Aber sie müssen so oder so verabschiedet werden. Unsere Zukunft und die unserer Kinder hängt davon ab. Es ist der einzige Weg, wie unsere Freiheit überleben kann.\n\n@BRS §YIN VARIETATE CONCORDIA.§! @BRS"
 ISR_GER_solomon: "UNTERNEHMEN: SOLOMON"
 ISR_GER_solomon_desc: "Der wichtigste NATO-Verbündete im Nahen Osten, Israel, wurde von einer arabischen Koalition angegriffen. Unter dem Deckmantel des üblichen ethnischen und religiösen Hasses und humanitärer Bedenken versuchen sie, die Existenz Israels selbst in Frage zu stellen. Wir dürfen nicht zulassen, dass sie Erfolg haben. \n\nDas NATO-Kommando hat jede notwendige militärische Unterstützung bis hin zu einem begrenzten militärischen Kontingent von NATO-Truppen genehmigt, um das Recht Israels auf Selbstverteidigung zu gewährleisten, und der Bundestag hat dem zugestimmt."
 GER_spartanist_cat: "Nationale Wiederbelebung"
 GER_spartanist_cat_desc: "\n\n\n\n\n£GFX_GER_querfront_cat_banner\n\n\n\n\n\n\n\nSeitdem die Politik in rechts und links gespalten ist, gibt es eine Bewegung, die beide Seiten vereinen will - die so genannte "Querfront", ein notwendiges Bündnis gegen die Kräfte des Kapitalismus und äußere Feinde. \n\nObwohl dieses Konzept in Deutschland im 20. Jahrhundert nicht viel Erfolg hatte, haben andere Länder positive Erfahrungen mit der Vermischung der Ideen von Nationalismus und Sozialismus gemacht, und Deutschland hat viel zu lernen.\n\nDie historischen Umstände haben die Rechten und die Linken in eine Koalition miteinander gedrängt, jetzt liegt es in unserer Hand, welchen Weg Deutschland einschlagen wird."
 GER_lacc_cat: "Wiederbelebung des menschlichen Geistes"
 GER_lacc_cat_desc: "\n\n\n\n\n£GFX_GER_lacc_cat_pic_banner\n\n\n\n\n\n\n\nZwischen den roten Linien, die nach oben und unten verlaufen, und der zunehmenden Unterdrückung menschlicher Ausdrucksformen würde die Stagnation zweifellos zu einem Tumor in der gesamten Gesellschaft werden.\n\nDas Kapital ist eine feindselige Gottheit, die vom Leiden des empfindungsfähigen Lebens lebt, und mit der Maske des Neoliberalismus ist dies nur noch eklatanter geworden. \n"Es ist leichter, sich das Ende der Welt vorzustellen als das Ende des Kapitalismus."\n\nAber wir sollten uns das Ende des Kapitals nicht nur vorstellen, sondern ihm auch ein tatsächliches Ende bereiten.\n\nTöte die Vergangenheit, umarme die Zukunft, lehne die Wurzeln ab, die aufhören, integriere die Wurzeln, die wachsen."
 

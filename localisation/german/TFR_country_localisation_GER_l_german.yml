 TFR_Anarchy_ZZZ_tt: "§RKatharsis§!"
 TFR_Anarchy_ZZZ_tt_delayed: "Der Zusammenbruch der Familienstrukturen und die zermürbende, unerbittliche Natur des täglichen Überlebens sind nicht nur psychologische Krisen. \n\nSie sind Symptome eines tieferen materiellen Zusammenbruchs. \nIn einer Welt, in der Wohnraum unerschwinglich ist, Lebensmittel auf Haltbarkeit statt auf Nahrung getrimmt sind und Arbeit endlos, aber bedeutungslos ist, wird verspätete Befriedigung weniger zu einer Tugend als zu einem grausamen Witz. \nMit dem Aufstieg des Ultraglobalismus wurde dieses Versprechen überbaut und unter Schichten von Beton, billigem Plastik und Schiffscontainern voller Einwegzukünfte begraben. \n\nWas verloren gegangen ist, ist nicht nur sentimental; Ernährungssicherheit, gemeinschaftliche Unterstützungssysteme, Zeit für kreative Arbeit und die Freiheit, die eigene Umgebung zu gestalten, sind allesamt unter Beschuss. Nimmt man diese Dinge weg, bleibt nicht nur ein demoralisierter Bürger übrig, sondern ein in die Enge getriebenes Tier, das reaktiv und unberechenbar ist.\nHunger schärft das Verhalten.\nErnährungsarmut, prekäre Unterkünfte und unerbittlicher Lärm, im wahrsten Sinne des Wortes und ideologisch, treiben die Menschen zum Äußersten. Es geht nicht mehr um den Glauben.\n\nEs gibt keine kohärente Ideologie mehr, kein funktionierendes Kontrollzentrum. \nEs gibt nur noch zertrümmerte Schaufenster, leerstehende Häuser und eine Infrastruktur, die unter Verwahrlosung und Plünderung zerbröckelt. Die Symbole der Macht sind nicht aus Rebellion, sondern aus Bedeutungslosigkeit gefallen."
 

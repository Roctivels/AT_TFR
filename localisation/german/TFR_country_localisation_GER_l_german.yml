 germany.189.t: "Explosion im Parteizentrum"
 germany.189.d: "Um 3:17 Uhr riss ein Sprengsatz die Bezirksgeschäftsstelle der PDS in Halle in die Luft. Überwachungsaufnahmen zeigten, wie eine vermummte Gestalt kurz nach Mitternacht an der Absperrung vorbeischlüpfte und eine mit Lieferschildern versehene Kiste schleppte. Minuten später schalteten sich die Kameras aus.\n\nDrei Genossen waren auf der Stelle tot. Sieben weitere wurden verletzt, zwei davon lebensgefährlich. Die Sammelabteilung der Arbeiter war nur noch eine rußgefüllte Ruine aus verkohltem Beton und geschmolzenem Plastik. Die Einsatzkräfte verdeckten die roten Sterne auf ihren Uniformen, um zu verhindern, dass sie Ziel weiterer Angriffe wurden. Es hat nicht geholfen. Ein Feuerwehrauto wurde mit Ziegelsteinen beworfen, bevor die Polizei eintreffen konnte. Gegen Mittag tauchte im Internet ein Kommuniqué auf, das das krude Siegel der "Aktionsfront Deutscher Nationalisten" trug. Ihr "Antikommunistisches Manifest" war ein Flickenteppich aus Blut-und-Boden-Rhetorik, historischer Trauer und technokratischem Libertarismus im Gewand der Nazi-Rhetorik.\n\nDas Ministerium für Staatssicherheit veröffentlichte Namen - einige echte, einige absichtlich vermutete - von mutmaßlichen Kollaborateuren. Die Sicherheitspräsenz wurde in allen größeren Städten verdoppelt. Der Satz "Faschismus in den Mauern" hallte erneut durch die Plenarsäle. Für manche war es ein Déjà-vu."
 germany.189.a: "Obwohl es den Anschein hatte, dass etwas Schlimmeres bevorstand."
 germany.190.t: "Wieder atmen"
 germany.190.d: "Der Bundesnachrichtendienst soll reformiert, umgewidmet und umbenannt werden. Die Entschließung wurde mit wenig Fanfare verabschiedet, aber niemand zweifelte an ihrer Bedeutung. In den hallenden Hallen der Volkskammer sollte das berüchtigte Ministerium für Staatssicherheit, die Stasi, wieder auferstehen. Es war ein Produkt sozialistischer Legalität und revolutionärer Notwendigkeit, dieselben vertrauten Kanten, dieselben abgehackten Akzente, dieselben maschinengeschriebenen Formulare. Die gleiche Stille, wenn sich die Fahrstuhltüren öffneten und man zwei höfliche Männer in grauen Mänteln vor der Wohnung warten sah. Schon wurden Berichte über subversive Versammlungen in den sächsischen Landen zusammengestellt. Die Grenzprotokolle wurden dicker. Straßeninformanten kehrten zurück, diesmal mit besseren Telefonen und schlechterer Moral. Es war nicht mehr 1989. Es war [JAHR]. Die Werkzeuge hatten sich geändert, aber die Mission nicht.\n\nGenosse Minister Bartsch sprach vor dem Plenum: "Eine sozialistische Republik kann nicht mit Scheuklappen überleben. Wir spionieren nicht, wir schützen. Wir repressieren nicht, wir verhindern. Aber wir werden nicht zulassen, dass die Reaktion hinter verschlossenen Türen ihre Messer wetzt.""

 germany.999.t: "Phase Eins"
 germany.999.d: ""Chaos ist das Werkzeug, mit dem wir große Veränderungen herbeiführen können." \n\nDer Konferenzraum war dunkel und wurde nur von dem großen Bildschirm beleuchtet, auf dem eine Reihe von Daten, Zukunftsprognosen und der aktuelle Marktverlauf angezeigt wurden. \Anm Rande des Tisches saß ein älterer Mann mit Glatze und starrte auf die Datenflut, die auf dem Bildschirm zu sehen war.\nKlaus Schwab war nur ein Gesicht, so viel war wahr.\n\nAber seine Bedeutung zu leugnen, wäre eine Verleugnung der Realität; war er es nicht, der die vierte industrielle Revolution im Osten hervorgebracht hat? War er nicht derjenige, der die Multipolarität zerschlug? War er nicht derjenige, der...? Seine Gedanken wurden unterbrochen, als der Bildschirm aufblitzte, ein leerer blauer Hintergrund, aber damit tauchten langsam zwei dunkle Gestalten auf, deren Silhouetten Schwab nur allzu vertraut waren.\n\n"Fühlen Sie sich verantwortlich, Herr Schwab?", sprach eine Stimme mit starkem französischem Akzent.\n"Sie mögen einen großen Beitrag geleistet haben, aber man sollte immer seinen Platz kennen, sagte eine andere Stimme, ebenso französisch. \n\n"Er brauchte nicht zu antworten, seine Gedanken waren ihre Gedanken.‘' \n\n"Das haben Sie gut gemacht.‘' \n"Die Menschheit ist eine grausame Bestie; es erfordert viel Mut, ein solches Wesen zu zähmen.‘' '\n"Da Phase eins abgeschlossen ist, werden wir zu Phase zwei übergehen."\n\nRichtig, Phase zwei, das Auffinden und der Erwerb der Akasha-Aufzeichnungen.‘''Sie wissen, was zu tun ist. \n"Enttäuschen Sie uns nicht." \n\nDer Bildschirm schaltet sich aus und Schwab seufzt erleichtert auf. \n\nEr drückt eine Taste auf einem nahegelegenen Telefon und spricht hinein. \n"Organisieren Sie mir eine Expedition in die Antarktis, schnellstens.""
 germany.999.a: "Au revoir, Weltraumcowboy."
 germany.1000.t: "NPD nennt sich um"
 germany.1000.d: ""
 germany.1000.a: "Wird ihnen eh nicht mehr helfen"

 GER_hog_angela_merkel: "Bundeskanzlerin: §HAngela Merkel§!\n\n\n\n\n\n\n\n   £GFX_GER_angela_merkel_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LAngela Dorothea Kasner wurde in Westdeutschland als Tochter eines lutherischen Pfarrers geboren, der in den Osten zog, um seinen Glauben zu verbreiten. Als gelernte Chemikerin wuchs sie in der Demokratischen Republik auf und beobachtete den wohlhabenden Westen von der innerdeutschen Grenze aus. Dann kam die Wiedervereinigung und mit ihr die Chance.\n\ Der Fall der Mauer sollte der Katalysator für Merkels politische Karriere sein. Sie diente kurzzeitig als Sprecherin der ersten und einzigen demokratischen Regierung der DDR. Nach der Wiedervereinigung wurde sie 1990 als Mitglied der CDU in den Bundestag gewählt und von Helmut Kohl, der sie als Schützling unter seine Fittiche nahm, zur Ministerin für Frauen und Jugend ernannt. Als sich die Gelegenheit bot, Kohl und die CDU-Führung anzuprangern, nutzte sie sie. Im Jahr 2000 wurde sie die erste weibliche CDU-Vorsitzende und 2005 die erste Bundeskanzlerin in der deutschen Geschichte und die erste, die in der DDR aufgewachsen ist. Ihre Kanzlerschaft hat 16 Jahre und 4 Wahlen gedauert, und durch Finanzkrisen und Migrationswellen hindurch ist sie der unerschütterliche Anker Deutschlands und Europas geblieben.\n\nAber alle Regentschaften kommen irgendwann an ihr Ende, und seit 2018 hat Merkels Kanzlerschaft ein festes Enddatum: den 26. September 2021. Bald wird Merkel zurücktreten und ihren Nachfolgern den Sturm überlassen, der vor ihnen liegt. Es bleibt abzuwarten, ob die Geschichte sie als Deutschlands Beschützerin oder als Führerin, die die Abrechnung mit Deutschland nur verzögert hat, beurteilen wird.§!"
 GER_hog_tino_chrupalla: "Bundeskanzler: §HTino Chrupalla§!\n\n\n\n\n\n\n\n   £GFX_GER_tino_chrupalla_por\n\n\n\n\n\n\n\n\n-------------------------------------§LTino Chrupalla wurde am 14. April 1975 in Weißwasser in der ehemaligen DDR geboren und wuchs in den letzten Jahrzehnten der Deutschen Demokratischen Republik in einer Arbeiterfamilie auf. Sein Vater war als Handwerker tätig, und von klein auf wurde Chrupalla ein tiefer Respekt vor der Arbeit, der Tradition und der lokalen Identität eingeimpft. Nach dem Abitur absolvierte er eine Ausbildung zum Maler und Lackierer und machte sich später als Handwerksmeister mit eigenem Betrieb in seiner Heimatstadt selbstständig. \n\nAnders als viele seiner Altersgenossen in der Berliner Politik begann Chrupallas Weg in die Bundespolitik nicht an den Universitäten oder in den Jugendabteilungen der Parteien, sondern in den Werkstätten und auf den Baustellen Ostsachsens. Erst 2015, auf dem Höhepunkt der europäischen Migrantenkrise und der wachsenden Unruhe in Teilen der Bevölkerung, trat Chrupalla in die AFD ein, eine Partei, die sich zu dieser Zeit von einer euroskeptischen Bewegung zu einer breiteren rechtspopulistischen Kraft wandelte. Sein Aufstieg innerhalb der Partei verlief schnell. Bei der Bundestagswahl 2017 verdrängte Chrupalla Michael Kretschmer, den prominenten Amtsinhaber der CDU, und gewann ein Direktmandat im Wahlkreis Görlitz - ein Erfolg, der die zunehmende Verwurzelung der AfD in Ostdeutschland signalisierte. Im Bundestag erwies er sich bald als entschiedene Stimme für Nationalkonservatismus, Antiglobalismus und traditionelle deutsche Werte. Seine Rhetorik fand bei vielen Anklang, die sich vom politischen Mainstream zurückgelassen fühlten. Im November 2019 wurde Chrupalla neben Jörg Meuthen zum Bundesvorsitzenden der AfD gewählt und symbolisierte damit eine Machtverschiebung innerhalb der Partei, weg von ihrem früheren technokratischen Kern und hin zu ihrem eher nationalistischen, kulturell defensiven Flügel. Mit seinem bescheidenen Hintergrund und seiner rhetorischen Einfachheit positionierte sich Chrupalla als Mann des Volkes, der im Gegensatz zu dem steht, was er als die vom deutschen Alltag abgehobene politische Elite bezeichnete.\n\nNun führt Chrupalla das Vaterland an, und als dessen Führer hat er versprochen, es in ein neues Zeitalter zu führen. Die Nation wird nicht länger von schwachen Politikern und Eliten zu Fall gebracht werden, jetzt wird die Welt sehen, wie stark Deutschland sein kann.§!"
 GER_hog_olaf_sholtz: "Bundeskanzler: §HOlaf Scholz§!\n\n\n\n\n\n\n\n   £GFX_GER_olaf_sholtz_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LGeboren am 14. Juni 1958 in Osnabrück, Niedersachsen, wuchs Scholz in Hamburg auf, da seine Eltern beide in der Textilindustrie tätig waren. Er studierte Rechtswissenschaften an der Universität Hamburg mit dem Schwerpunkt Arbeitsrecht. Mit 17 Jahren trat Scholz in die SPD ein und engagierte sich sofort in der Jugendorganisation der Jusos, deren stellvertretender Bundesvorsitzender er in den 1980er Jahren wurde.\n\nScholz betrat 1998 zum ersten Mal die Säle des Bundestages und hat in seiner Zeit dort viele Funktionen ausgeübt. Die wichtigsten Funktionen, die er innehatte, waren das Amt des SPD-Generalsekretärs und das des Bundesministers für Arbeit und Soziales unter der vorherigen Bundeskanzlerin Angela Merkel von 2007 bis 2009. Im Jahr 2011 wurde er Bürgermeister seiner Heimatstadt Hamburg und leitete wichtige Reformen im Steuerbereich sowie zahlreiche große Infrastrukturprojekte. 2018 kehrte er als Vizekanzler und Finanzminister in Merkels Kabinett in die Bundespolitik zurück, wo er eine Schlüsselrolle bei der Reaktion auf die COVID-19-Pandemie spielte.\n\nHeute hat er die Spitze der Leiter erreicht und den Titel des Bundeskanzlers erlangt. Die Aufgabe, die er jetzt hat, wird weder leicht noch einfach sein. Die Welt hat in letzter Zeit mehr Not und Schmerz erlebt als je zuvor, und viele können nur vermuten, dass es noch schlimmer werden wird, bevor es besser wird. Aber zumindest wird der Scholzomat am Ruder sein und Deutschland in die Zukunft führen.§!"
 GER_hog_robert_habeck: "Bundeskanzler: §HRobert Habeck§!\n\n\n\n\n\n\n\n   £GFX_GER_robert_habeck_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LGeboren am 2. September 1969 in Lübeck, Deutschland, wuchs Habeck als Sohn von Apothekern in der Nähe von Kiel, in Heikendorf, auf. 1989 machte er sein Abitur an der Heinrich-Heine-Schule in seiner Heimatstadt und begann danach ein Studium der Philosophie und Germanistik an den Universitäten Freiburg im Breisgau, Roskilde (Dänemark) und Hamburg. Im Jahr 1996 erwarb er den Magister Artium und promovierte im Jahr 2000 an der Universität Hamburg in Philosophie mit den Schwerpunkten Literaturästhetik und Medientheorie, bevor er nach einer kurzen schriftstellerischen Tätigkeit in die deutsche Politik eintrat. 2002 trat Habeck in die Grünen ein und war von 2002 bis 2004 Kreisvorsitzender der Partei in Schleswig-Flensburg, bevor er von 2004 bis 2009 zum stellvertretenden Landesvorsitzenden in Schleswig-Holstein aufstieg. Im Jahr 2012 wurde er zum stellvertretenden Ministerpräsidenten und Minister für Energiewende, Landwirtschaft, Umwelt, Natur und Digitalisierung in Schleswig-Holstein ernannt, diese Ämter hatte er bis 2018 inne. In diesem Jahr, 2018, erreichte Habeck die nationale Bühne und wurde zum Co-Vorsitzenden der Bundesgrünen neben Annalena Baerbock gewählt.\n\nWährend seiner Amtszeit haben die Grünen in vielen Regionen Deutschlands bedeutende und stetige Fortschritte erzielt, die schließlich in der Bundestagswahl 2021 gipfelten, einem Punkt, den wir bereits überschritten haben. \nDa sie zum ersten Mal die führende Kraft der Nation sind und nicht nur ein zweitrangiges Koalitionsmitglied, wird Habeck wirklich viele schlaflose Nächte und viel Kaffee zu trinken haben. Ganz zu schweigen davon, was aus der Welt wird, \n\noder was sie bereits geworden ist.§!"
 GER_hog_christian_lindner: "Bundeskanzler: §HChristian Lindner§!\n\n\n\n\n\n\n\n   £GFX_GER_christian_lindner_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LGeboren am 7. Januar 1979 in Wuppertal, Nordrhein-Westfalen, wuchs Lindner in einem bürgerlichen Haushalt auf, sein Vater arbeitete als Lehrer an einem Gymnasium. Im Jahr 1995 trat er in die FDP ein. Im Jahr 1998 machte er sein Abitur. Von 1999 bis 2001 diente Lindner als Reserveoffizier in der Luftwaffe der Bundeswehr und stieg bis zum Oberleutnant auf. Während seiner Zeit in der Reserve, zwischen 1999 und 2006, studierte er Politikwissenschaft an der Universität Bonn und schloss mit dem Magister Artium ab. Aufgrund seiner politischen Karriere und seiner unternehmerischen Tätigkeit absolvierte er das Studium jedoch nur nebenbei. Am 31. Mai 2000 wurde Lindner das jüngste Mitglied des Landtags von Nordrhein-Westfalen. Im Jahr 2007 wurde er Generalsekretär der FDP in Nordrhein-Westfalen und verließ dieses Amt 2009, nachdem er zum ersten Mal in den Deutschen Bundestag gewählt worden war. Nach dem Niedergang der FDP in den Jahren 2012 und 2013 wurde er am 7. Dezember 2013 mit 79 % der Stimmen zum Bundesvorsitzenden gewählt und leitete damit die Wende der Partei ein. 2017 zog die FDP unter Lindners Führung mit 10,7 % der Stimmen wieder in den Bundestag ein.\n\nHeute führt sie den Bundestag selbst an. Christian Lindner von der FDP ist jetzt der Bundeskanzler von Deutschland. Während seine Unterstützer feiern, wird er nachdenken und planen. In der Welt haben Spannungen und Gewalt mehr denn je zugenommen, denn wenn Lindner seine Versprechen an die Menschen einhalten und ihnen Hoffnung für die Zukunft und die Demokratie geben will, muss er jetzt handeln. Er muss jetzt handeln.§!"
 GER_hog_armin_laschet: "Bundeskanzler: §HArmin Laschet§!\n\n\n\n\n\n\n\n   £GFX_GER_armin_laschet_por\n\n\n\n\n\n\n\n\n-------------------------------------\§LArmin Laschet wurde am 18. Februar 1961 im nordrhein-westfälischen Aachen geboren und wuchs in einem gläubigen römisch-katholischen Haushalt auf. Das Aufwachsen in der Grenzstadt prägte Laschets Weltanschauung: Er war tolerant, europäisch und pragmatisch. Er besuchte das örtliche Pius-Gymnasium und machte 1981 sein Abitur, bevor er an der Universität Bonn Jura studierte. Später wandte er sich dem Journalismus zu und studierte an der Katholischen Universität Eichstätt-Ingolstadt, wo er eine journalistische Ausbildung absolvierte.\n\nIn den späten 1980er und frühen 1990er Jahren arbeitete Laschet als Journalist und Redakteur, engagierte sich aber auch zunehmend in der Politik. Als langjähriges Mitglied der CDU, in die er 1979 eingetreten war, wurde Laschet 1994 in den Bundestag gewählt und machte damit seinen ersten großen nationalen Schritt. Sein eigentliches politisches Fundament legte er jedoch in Nordrhein-Westfalen, wo er später als Mitglied des Europäischen Parlaments von 1999 bis 2005 wertvolle Erfahrungen in der EU-Politik und der Integration sammelte. \n2005 wurde Laschet zum Minister für Generationen, Familie, Frauen und Integration in Nordrhein-Westfalen ernannt und erntete bundesweite Anerkennung für seinen moderaten und integrativen Ansatz - Eigenschaften, die ihm sowohl Lob als auch Kritik aus den Reihen seiner eigenen Partei einbrachten. 2017 wurde er Ministerpräsident von Nordrhein-Westfalen, dem bevölkerungsreichsten Bundesland Deutschlands, und führte eine CDU-FDP-Koalition an, die sich für eine bürgernahe und bürgernahe Politik einsetzt Während seiner Amtszeit kam es zu wirtschaftlichem Wachstum und relativer politischer Stabilität, wobei Laschet häufig Kompromisse und Kontinuität gegenüber Konfrontationen in den Vordergrund stellte.\n\nJetzt führt er nicht nur die Region, in der er geboren wurde. Jetzt führt er auch die Nation selbst. Als Zentrist muss er hart daran arbeiten, alle Parteien und Gruppen innerhalb des Vaterlandes zufrieden zu stellen, wenn er seine Nation auf dem Weg zur Größe sehen will.§!"
 GER_hog_bodo_ramelow: "Bundeskanzler: §HBodo Ramelow§!\n\n\n\n\n\n\n\n   £GFX_GER_bodo_ramelow_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LBodo Ramelow wurde am 16. Februar 1956 in Osterholz-Scharmbeck, Niedersachsen, geboren und wuchs in einem evangelischen Haushalt in Westdeutschland auf. Seine frühen Jahre waren sowohl von persönlichem als auch von politischem Einfluss geprägt: Sein Vater, ein Gewerkschafter und Eisenbahner, starb, als Bodo noch klein war, und vermittelte ihm eine tiefe Verbundenheit mit Fragen der Arbeit und der sozialen Gerechtigkeit.\Nach der deutschen Wiedervereinigung begann Ramelows politischer Weg in Thüringen. Im Jahr 1999 trat er offiziell der Partei des Demokratischen Sozialismus bei, der Nachfolgepartei der regierenden Sozialistischen Einheitspartei Ostdeutschlands. Obwohl er Westdeutscher in einer ostdeutschen Partei war, wurde Ramelow schnell zu einer Brücke zwischen zwei Welten: Er scheute sich nicht, sich mit dem Erbe der DDR auseinanderzusetzen, war aber entschlossen, dafür zu sorgen, dass die Belange der Ostdeutschen in einem vereinten Deutschland nicht länger übersehen wurden.\n\nSeinen historischsten Moment erlebte er 2014, als er zum Ministerpräsidenten von Thüringen gewählt wurde - das erste Mal in der deutschen Nachkriegsgeschichte, dass ein Regierungschef von der Partei Die Linke kam. Dieser Moment war sowohl symbolisch als auch transformativ und signalisierte, dass man einer linken Regierung jenseits von Proteststimmen oder Oppositionsbänken vertrauen konnte. Trotz der Kritik der Konservativen, die vor einem ideologischen Rückschritt warnten, führte Ramelow eine stabile rot-rot-grüne Koalition, die auf Mäßigung, wirtschaftliche Stabilität und Sozialpolitik setzte. \nNach einer chaotischen und international beobachteten Regierungskrise mit Stimmen der AfD und einer Verfassungsdebatte wurde Ramelow 2020 wiedergewählt und bewies einmal mehr, dass er sowohl als Politiker als auch als Symbol der föderalen Demokratie standhaft bleibt. Seine Führung zeichnete sich durch ruhiges Verhandeln, ein entschiedenes Eintreten für demokratische Normen und eine ungewöhnliche Bereitschaft aus, Gräben in einer der politisch am stärksten polarisierten Regionen Deutschlands zu überbrücken.\n\nJetzt schaut die Welt auf ihn, während er an der Spitze Deutschlands steht. Seine Partei hat einen weiten Weg zurückgelegt, und für ihn ist es noch ein weiter Weg, aber egal, wie sehr sich sein Leben verändert hat, er wird für sein Volk kämpfen und sein Bestes tun, um die Nation zu einen und für die Welt bereit zu halten.§!"
 GER_hog_richard_rossmanith: "Bundeskanzler: §HRichard Rossmanith§!\n\n\n\n\n\n\n\n   £GFX_GER_Richard_Rossmanith_por\n\n\n\n\n\n\n\n\n-------------------------------------"
 GER_hog_merz: "Bundeskanzler: §HFriedrich Merz§!\n\n\n\n\n\n\n\n   £GFX_GER_friedrich_merz_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LFriedrich Merz wurde am 11. November 1955 in Brilon, Nordrhein-Westfalen, geboren und wuchs in einem konservativen katholischen Haushalt in Westdeutschland auf. Nach seinem Studium der Rechtswissenschaften und Wirtschaftswissenschaften begann er seine Karriere als Richter und Unternehmensjurist, bevor er in die Politik wechselte. Schon früh trat Merz der CDU bei, wo er sich schnell einen Ruf für seinen scharfen Verstand, seinen Wirtschaftsliberalismus und sein Engagement für transatlantische Beziehungen erwarb. \n\nMerz wurde 1994 in den Bundestag gewählt und stieg schnell auf, sodass er Anfang der 2000er Jahre zu einer führenden Persönlichkeit in der CDU-Fraktion wurde. Bekannt für sein Eintreten für marktwirtschaftliche Reformen und eine strenge Finanzpolitik, geriet er mit Angela Merkels eher gemäßigtem Ansatz in Konflikt und verließ 2009 die Politik. Die nächsten zehn Jahre verbrachte er in hochrangigen Positionen in der Privatwirtschaft, unter anderem als Vorsitzender von BlackRock Deutschland. Als er 2018 in die Politik zurückkehrte, positionierte sich Merz als Stimme für eine konservative Erneuerung. Nach der Niederlage seiner Partei im Jahr 2021 wurde er ein Jahr später, im Jahr 2022, zum CDU-Parteivorsitzenden gewählt, mit dem Ziel, die Partei zu ihren traditionellen Wurzeln zurückzuführen und die politische Mitte herauszufordern. Jetzt führt er Deutschland als Bundeskanzler, aber die Welt ist heute gefährlicher als je zuvor. Russland positioniert sich gegen die Überreste der Nordatlantik-Vertragsallianz, der Bürgerkrieg in Amerika ist in vollem Gange, China bedroht die Demokratie im Pazifikraum, Gaddafis Nachkomme erobert Nordafrika, und die ganze Welt steht auf die eine oder andere Weise in Flammen. Die Zeiten könnten wirklich nicht komplizierter und für Merz ungünstiger sein als jetzt.§!"
 GER_hog_soder: "Bundeskanzler: §HMarkus Söder§!\n\n\n\n\n\n\n\n   £GFX_GER_markus_soder_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LMarkus Söder wurde am 5. Januar 1967 in Nürnberg, Bayern, geboren und wuchs in einem traditionellen bayerischen Haushalt auf. Er studierte Rechtswissenschaften an der Universität Erlangen-Nürnberg, wo er promovierte, und begann später eine Karriere als Journalist, bevor er sich ganz der Politik zuwandte. Als engagiertes Mitglied der Christlich-Sozialen Union wurde Söder schnell für seine starke regionale Identität und seinen medienwirksamen Auftritt bekannt. \n\nSöder wurde 1994 in den Bayerischen Landtag gewählt und stieg stetig auf, wobei er verschiedene Ministerposten bekleidete, darunter das Finanz- und das Umweltministerium. Er erlangte einen Ruf für seine durchsetzungsstarke Führung, seinen populistischen Instinkt und sein Talent, die öffentliche Meinung zu steuern. Im Jahr 2018 trat er die Nachfolge von Horst Seehofer als Ministerpräsident von Bayern an und betonte dabei konservative Werte, regionalen Stolz und pragmatische Regierungsführung.\nTrotz innerparteilicher Spannungen und nationaler Ambitionen blieb Söder eine zentrale Figur in der deutschen Politik und wurde oft als zukünftiger Kanzlerkandidat gehandelt. \n\nNach der Niederlage der CDU/CSU bei den Wahlen 2021 festigte sich diese Vorstellung nur noch mehr, und schnell übernahm er die Rolle als potenzieller Kanzler für die CSU. Jetzt ist er in dieser Position und führt Deutschland praktisch voran. Allerdings ist die Welt nicht mehr das, was sie einmal war. Seit der letzten Wahl hat sich die Lage nur verschlechtert, und die globalen Spannungen sind größer denn je. Afrika brennt, Asien rüstet sich für den Krieg, und der russische Bär beäugt hungrig das, was ihm einst gehörte. Die Lage ist für Deutschland und ganz Europa viel schwieriger geworden, und nun muss Söder die schwere Last tragen, beide zum Erfolg zu führen. Aber er wird sich nicht davon abschrecken lassen.§!"
 GER_hog_weidel: "Bundeskanzlerin: §HAlice Weidel§!\n\n\n\n\n\n\n\n   £GFX_GER_alice_weidel_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LDie rechtsgerichtete, populistische Politik der Alternative für Deutschland hat zu zahlreichen Vorwürfen der Intoleranz seitens ihrer liberaleren Kollegen im Bundestag geführt. Und doch scheint die Wahl von Alice Weidel zur Vorsitzenden solchen Behauptungen fast völlig zu widersprechen. Geboren in Gütersloh, Nordrhein-Westfalen, in den letzten Jahren der 70er Jahre, führte sie vor ihrer politischen Karriere ein relativ unauffälliges Leben. Sie studierte Wirtschaftswissenschaften und Betriebswirtschaftslehre an der Universität Bayreuth und arbeitete unter anderem bei Goldman Sachs, der Bank of China und der Konrad-Adenauer-Stiftung. Nach einem sechsjährigen Aufenthalt in China trat sie der AfD bei, eine Entscheidung, die sowohl für sie selbst als auch für Deutschland einen radikalen Kurswechsel bedeutete. \n\nWas als bloßes Interesse an der Ablehnung des Euro begann, führte bald zu einem langsamen Aufstieg in den Reihen der Partei. Trotz des Trends zu eher traditionalistischen und einwanderungsfeindlichen Einstellungen schienen Weidels Lesbischsein und ihre Beziehung zu einem in Sri Lanka geborenen Filmproduzenten kaum Auswirkungen auf ihre Aussichten zu haben; letztendlich sicherte sie sich 2017 die Position der Spitzenkandidatin. Zusammen mit ihrem Mitvorsitzenden Alexander Gauland trug sie dazu bei, die Partei von einer außerparlamentarischen Gruppierung zur drittgrößten Partei im Bundestag zu machen. Diese Dynamik, gepaart mit den bevorstehenden Krisen der 2020er Jahre und ihrer gemäßigteren Ausrichtung (die sich in ihrer Annäherung an den Flügel "Alternative Mitte" der AfD zeigt), hat sie schließlich bei den Wahlen 2021 ins Kanzleramt gebracht – eine massive Veränderung, wie es sie seit 1933 nicht mehr gegeben hat. Viele befürchten, dass ihre Wahl lediglich ein Trojanisches Pferd ist, das Deutschland immer weiter in den Abgrund treibt, den man 1945 für überwunden hielt. Andere sehen in ihr einen dringend benötigten frischen Wind in der stagnierenden, von CDU/SPD dominierten Welt der deutschen Politik. \n\nUnabhängig davon, wie man zu Weidels Politik steht, liegt es nun an Bundeskanzlerin Weidel, durch die tückischen Gewässer der europäischen Politik zu navigieren, die durch das Machtvakuum geprägt sind, das durch den Zusammenbruch der Vereinigten Staaten und das Wiedererstarken Russlands und Chinas im Osten entstanden ist. Ob "Deutschland zuerst" ausreichen wird, um den Sturm zu überstehen, hängt allein von ihr ab, die Nation voranzubringen, mit oder ohne den ausländischen Einfluss, der das Land bisher geprägt hat.§!"

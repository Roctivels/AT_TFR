 nss.8.t: "Geburt"
 nss.8.d: "Wenn ein Küken die Eierschale nicht aufbrechen kann, stirbt es, ohne geboren zu werden. \n\nAngesichts der gegenwärtigen Krise wurde der Schattenregierung klar, dass die Beibehaltung der amerikanischen Systeme in ihrer bisherigen Form unhaltbar war – und so versuchte CIA-Direktor William J. Burns, eine neue Streitmacht aufzubauen, die ausschließlich den Interessen der Sicherheitspolitiker verpflichtet war und in der Lage war, die Ordnung aufrechtzuerhalten, wo die Offiziere der Streitkräfte so katastrophal versagt hatten. Durch den Ausbau des Special Activities Center, der geheimen Spezialeinheit der Behörde, wollte er so etwas wie eine Prätorianergarde schaffen, eine hochgradig loyale Truppe, die in der Lage war, das amerikanische Volk ohne Fragen zu unterwerfen. \n\nWährend das offizielle Mandat der CIA darin bestand, im Ausland zu agieren, konnte dieses erweiterte SAC innerhalb der Grenzen Amerikas eingesetzt werden. Ihre Aufgabe war zweigeteilt: Sie sollten den Abstieg der Nation in Chaos und Barbarei verhindern und alle beseitigen, die ihnen im Weg standen, alles im Namen der Aufrechterhaltung der Ordnung. Im Gegensatz zu den Streitkräften unterlag sie keinen Beschränkungen und Kontrollen, die mit den Einsatzregeln verbunden waren, sondern diente stattdessen als Schwert des Deep State. Ihr Personal war an keine Gesetze gebunden, außer an seine Loyalität gegenüber der Schattenregierung und ihrer Mission. Wenn die Männer in Uniform nicht gehorchten, würden die Agenten der CIA an ihrer Stelle den Willen der Securokraten durchsetzen. \n\nTrotz der Proteste von General Milley und Verteidigungsminister Austin würde ein Großteil der ursprünglichen Truppen für diese Erweiterung direkt aus der US-Armee rekrutiert werden, ausgewählt aus Brigaden, die sich bei der Bekämpfung von Aufständischen als effektiv erwiesen und politische Loyalität gegenüber der Regierung in Washington gezeigt hatten, während andere dies nicht geschafft hatten. Die unmittelbar entstandene Lücke in der Armee würde danach durch Wehrpflichtige und Hilfstruppen der Nationalgarde gefüllt werden, was von einigen als bewusste Schwächung der Streitkräfte zugunsten der Geheimdienste angesehen wurde. \n\nDie Zeremonie zur Taufe der ersten dieser Brigaden fand nachts in Washington D.C. statt, unter einem pechschwarzen Himmel. Tausende Soldaten standen schweigend auf einem Platz, die Gewehre geschultert und stramm stehend, von Kopf bis Fuß in graue Multicam-Uniformen gekleidet. Vor einem hoch aufragenden Lagerfeuer fand eine zeremonielle Verbrennung ihrer bisherigen Armeeabzeichen statt, wobei die Flammen ihre Gesichter in der Dunkelheit beleuchteten. Auf einer erhöhten Plattform vor ihnen stand Direktor Burns selbst, flankiert von seinen Adjutanten und Beratern. Die Schlussworte seiner Rede würden sich in das Gedächtnis aller Anwesenden einbrennen. \n\n"Ab heute hat keiner von euch einen Namen. Keiner von euch hat eine Akte. Ihr werdet vergessen werden, aber eure Taten im Dienste der Vereinigten Staaten werden für immer in Erinnerung bleiben. Ihr seid unser Schutzschild gegen die Dunkelheit..."
 nss.8.a: "...Ihr seid das Licht der Ordnung gegen das Chaos.""
 nss.9.t: "Morgen in Amerika"
 nss.9.d: "Überall in Amerika gehen die Menschen zur Arbeit, zur Schule, in die Kirche und gehen ihren täglichen Aufgaben nach. Die Straßen sind sauber, die Wirtschaft boomt und die Gebäude sind repariert – genau wie früher. \n\nAllmählich verschwinden die Narben und Erinnerungen an den Zweiten Amerikanischen Bürgerkrieg, und das Land scheint den verheerenden Konflikt hinter sich gelassen zu haben. Die Erinnerungen, die Wut, der Schmerz und der Hass, die den Konflikt überhaupt erst ausgelöst haben, schwinden langsam angesichts des neuen Konsenses, und mit jedem Schluck Wasser, mit jeder Impfung und mit jedem Zeichen, das die Verräter auslöscht, kommen die Menschen dem Vergessen näher, warum sie überhaupt so viel Groll gehegt haben. Es ist einfacher, den Schmerz zu vergessen, als an dem Groll festzuhalten, der den Schmerz verursacht haben könnte. Ein Neuanfang ist immer besser, auch wenn das bedeutet, die Vergangenheit zu vergessen, um eine bessere Zukunft zu erreichen. \n\nDas Fernsehen bringt ruhige, sterile Berichte über die Welt zwischen Produktwerbung und Sport. Die Öffentlichkeit konsumiert ihre Medien wie alles andere auch – ohne Fragen zu stellen. Die Welt ist ein schönes und ordentliches Paket, in dem alle losen Enden zusammengeführt und alle Probleme gelöst sind. \n\nEs ist immer dasselbe, es ist immer dasselbe. Jeden einzelnen Tag. Es ist einfach. Es ist richtig. Es ist ... perfekt. Niemand beschwert sich, weil sie vergessen haben, wie man sich beschwert. Das Gesetz ist das Gesetz, und niemand ist davon ausgenommen. Die Welt um sie herum mag groß und beängstigend sein, aber wenn sie ihre Morgenroutine, ihre täglichen Gewohnheiten und ihre vertrauten Muster haben, können sie in einer chaotischen und unsicheren Welt einen kleinen Trost finden. \n\nDie Cognoscenti haben ihnen dies gegeben. Sie verlangen dafür keine Dankbarkeit – die Sicherheitsbeamten, die Finanziers, die Eliten verstehen, dass diese Aufgabe undankbar ist und dass die Aufrechterhaltung der Ordnung ihre eigene Belohnung ist. \n\nIn New York blickt das Land mit angespannter Erwartung zu. Obwohl ständige Neugestaltungen, Schwierigkeiten bei der Suche nach Mietern und der Bürgerkrieg die Wiederaufbauarbeiten in den letzten zwanzig Jahren verzögert haben, markiert die Fertigstellung des wiederaufgebauten World Trade Center-Komplexes das Ende einer tiefen Wunde und den Beginn eines neuen Kapitels in der amerikanischen Geschichte. Das schlagende Herz der US-Hegemonie, der globalen Finanzwelt, ist wieder vollständig. \n\nFeuerwerke erstrahlen am Himmel, und während die Nation feiert, verblasst der Albtraum der letzten zwei Jahrzehnte langsam in der ungewissen Dunstglocke der Erinnerung. Die Ordnung hat sich über das Chaos durchgesetzt."
 nss.9.a: "Es ist wieder Morgen in Amerika."
 nss.10.t: "Grausamkeitsbande"
 nss.10.d: "Da Amerika bereits im Bürgerkrieg versunken war, hatte der Terroranschlag auf Washington D.C. die Regierung in Washington, die ohnehin schon mit dem völligen Zusammenbruch von Recht und Ordnung an der Ostküste zu kämpfen hatte, regelrecht lahmgelegt. Präsident Biden war nur knapp mit dem Leben davongekommen und hatte beschlossen, im Notfallzentrum des Präsidenten zu bleiben, während alle Anzeichen auf eine weitere Runde neonazistischen Terrorismus hindeuteten. Mit dieser Begründung waren die drei Buchstaben-Agenturen in einer in der amerikanischen Geschichte noch nie dagewesenen systematischen Razzia auf die Straße gegangen. In Zeiten des totalen Krieges war keine Zeit für Feinheiten. \n\n"Meine Herren, wir werden gleich mitten in die Hölle geworfen", sagte der Truppführer. "Unsere Mission: alle Feinde liquidieren, auch diejenigen, die nicht zu der Atomwaffendivision gehören. Für diese Mission gibt es keine Einsatzregeln. Der Befehl kommt von ganz oben: Lasst keine Zeugen zurück." \n\nIn einem gepanzerten Transporter überprüften die Mitglieder des CIA-SAC-Kill-Teams ihre mit panzerbrechenden Geschossen geladenen Waffen. Einige Nachzügler hatten einen Wohnkomplex besetzt und Geiseln genommen, darunter einen HVT, einen Anführer der Atomwaffen Division. Aufgrund der Geheimhaltung der Organisation, der Gefahr, dass sich Terroristen unter die Bevölkerung mischen könnten, und der Tatsache, dass der HVT laut Briefing als "loses Ende" galt, das "zu viel wusste", wurde beschlossen, dass das SAC-Team keine Zeugen zurücklassen würde. Als der Wagen vor dem Gebäude zum Stehen kam, flogen die Türen auf. Die unmarkierten Soldaten marschierten hinaus und begaben sich zum Eingang, wo sie Sprengstoff an der Tür anbrachten. Die Explosion hallte durch die Straße, als die Einsatzkräfte hineinstürmten. Ob es sich nun um maskierte rechtsextreme Terroristen oder Zivilisten handelte – jeder, der es wagte, sich ihnen in den Weg zu stellen, wurde erschossen. Ihre oberste Priorität war es, die HVT und alle anderen potenziellen Terroristen auszuschalten, und dann jeden, der möglicherweise etwas gesehen hatte. Immer wieder war es dasselbe – die Erleichterung auf den Gesichtern der Geiseln, als sie ihre Retter sahen, nur um dann Verwirrung und Entsetzen zu zeigen, als die Agenten ihre Gewehre auch auf sie richteten. Keine Überlebenden, keine Zeugen. Nicht, dass Zivilisten ihre potenziellen Retter hätten erkennen können, deren Gesichter hinter Sturmhauben verborgen waren, aber nichts wurde dem Zufall überlassen. \n\nAls sie schließlich vor einer verschlossenen Tür standen, brachte ein Agent einen Sprengsatz an und trat sie ein. Als sich der Rauch lichtete, kam ein kauernder Mann mit einem Hakenkreuz-Tattoo im Nacken zum Vorschein. "Keine Bewegung!", befahl der Teamleiter. "Das war nicht Teil der Abmachung...", protestierte der Neonazi, doch die Truppe füllte ihn mit Blei. "Ihr ... habt mir versprochen..." \n\nDas Team hielt zurück. "Einsatzteam, hier ist TOC. Das Aufräumteam ist unterwegs. Eliminiert alle verbleibenden Überlebenden. Over." \n\n"Verstanden", antwortete der Teamleiter. "Einsatzteam, Ende." Dann wandte er sich an seine Männer."
 nss.10.a: §g>>>Nächste Seite...§!"
 nss.11.t: "Die lange Nacht"
 nss.11.d: "Als das Gas nachließ, trat das Kill-Team, gekleidet in MOPP IV-Ausrüstung, die Türen der Nassau Hall ein. Die Leichen von Studenten und Neonazi-Terroristen lagen verstreut auf dem Boden, die Körper unnatürlich verkrümmt, ihre Gesichter in ewiger Entsetzen erstarrt. Der Befehl lautete, Earl Turner zu beseitigen, einen von vielen Neonazi-Führern, die nach den Anschlägen aus Washington geflohen waren. Er hatte sich an der Princeton University niedergelassen, die Nassau Hall übernommen und die Studenten und Dozenten als menschliche Schutzschilde benutzt. \n\nSie hatten nicht damit gerechnet, dass das SAC das Gebäude mit Sarin-Gas füllen würde. Sie sollten doch eigentlich die Guten sein, oder? Die Einsatzregeln hatten sich geändert, und damit waren auch die Taktiken der Feiglinge, die sich auf die Schwäche der Regierung verlassen hatten, hoffnungslos überholt. Es würde keine Verhandlungen geben, und alle Kollateralschäden sollten von der Desinformationsabteilung der CIA behandelt werden. Was die Öffentlichkeit betraf, so war diese ganze Tragödie das Werk von Neonazi-Terroristen gewesen, und das Kill-Team war entsandt worden, um die armen, wehrlosen Studenten und Mitarbeiter zu retten. \n\n"Einsatzteam, hier ist TOC. Bestätigen Sie die Eliminierung aller Feinde. Das Aufräumteam ist unterwegs, um das Gebiet zu sichern. Over." \n\n"Verstanden, Ende", sagte der Teamleiter. Da alle anderen Studenten und Dozenten tot waren, begannen die CIA-Agenten, die Flure systematisch zu durchsuchen."
 nss.11.a: "Die Natur des Krieges hat sich verändert."
 nss.12.t: "Überfall auf das Sutter-Gelände"
 nss.12.d: "Zusammenfassung:\nNach dem Zusammenbruch der Atomwaffendivision wurde der Großteil ihrer Führung entweder verhaftet oder neutralisiert. Joshua Caleb Sutter, der zuvor als Mitglied der Temple ov Blood und früherer Kontaktperson eingestuft worden war, entzog sich jedoch der konventionellen Justiz.\n\nHintergrund: Geheimdienstinformationen deuteten darauf hin, dass Sutter in Begleitung einer kleinen Gruppe von Kultanhängern eine befestigte Anlage in den Appalachen errichtet hatte. Als Reaktion darauf wurde eine Spezialeinheit des SAC mit dem direkten Auftrag entsandt, Sutter zu neutralisieren oder zu fassen. Die Einsatzregeln erlaubten uneingeschränkte Maßnahmen gegen seine Getreuen. \n\nOperation: \nNach etwa fünfundvierzig Minuten anhaltender Kämpfe wurden zwölf feindliche Elemente neutralisiert. Sutter konnte erfolgreich isoliert werden; er versuchte, sich das Leben zu nehmen, wurde jedoch überwältigt und ohne Todesopfer in Gewahrsam genommen. Ergebnisse: Die Nachuntersuchung des Geländes nach der Operation ergab umfangreiche Hinweise auf Menschenrechtsverletzungen, darunter menschliche Überreste, die Anzeichen von langanhaltender Misshandlung, Folter und experimenteller Verstümmelung aufwiesen. Mehrere visuelle Darstellungen (Fotografien und grobe Gemälde) dokumentierten Gräueltaten, die in ehemals von der Atomwaffendivision kontrollierten Gebieten begangen worden waren. Darüber hinaus wurde ein Waffenarsenal sichergestellt, das von Kleinwaffen bis hin zu unkonventionellen Waffensystemen reichte, darunter radiologische Streugeräte ("schmutzige Bomben") und chemische Kampfstoffe. \n\nBeurteilung: \nTrotz des Erfolgs der Mission zeigten die Nachbesprechungen, dass das SAC-Personal unter akuten psychischen Belastungen litt. Ein Mitarbeiter versuchte, unbefugt Kontakt mit der Familie eines am Einsatzort identifizierten Todesopfers aufzunehmen. Um die operative Effektivität aufrechtzuerhalten, werden eine fortgesetzte psychiatrische Überwachung und eingeschränkte Dienstzuweisungen dringend empfohlen.\n\nFazit:\nMit der Zerschlagung dieser letzten Hochburg der Atomwaffen und der Festnahme von Joshua Caleb Sutter wird die Operation offiziell als erfolgreich bewertet. Verbleibende ideologische Elemente stellen weiterhin ein potenzielles Sicherheitsrisiko dar, aber die zentrale Führungsstruktur wurde wirksam neutralisiert.\n\nENDE DES BERICHTS"
 nss.12.a: "Wir haben ihn lebendig."
 nss.13.t: "Die Spinne"
 nss.13.d: "Nach der Razzia auf dem Sutter-Gelände wurde Joshua Caleb Sutter festgenommen und in eine nahegelegene geheime Haftanstalt gebracht. Es wurde ein intensiver Verhörprozess eingeleitet, der mehrere Wochen dauerte. \n\nPrimäres Ziel: Beschaffung von Informationen über die Existenz und Struktur von Atomwaffen-Zellen, verbundenen Splittergruppen und anderen inländischen aufständischen Organisationen, einschließlich, aber nicht beschränkt auf die Patriot Front und die American People's Liberation Army. Der Schwerpunkt lag auf der etablierten Praxis des Temple ov Blood, Agenten in externe Gruppen einzuschleusen, um operative Einblicke zu gewinnen. \n\nSekundäres Ziel: Identifizierung potenzieller Waffen- und Materialvorräte, die für koordinierte Aktionen zur Destabilisierung der öffentlichen Ordnung innerhalb der Union eingesetzt werden könnten. \n\nMethoden: Es wurden genehmigte verschärfte Verhörprotokolle angewendet, darunter Schlafentzug, kontrollierte sensorische Manipulation (weißer Raum), Walling und Stresspositionen sowie weitere Maßnahmen. Diese Techniken führten zu einer erheblichen psychischen Belastung des Verdächtigen. Nach einem Zusammenbruch lieferte Sutter verwertbare Informationen. Nach Abschluss des Verhörzyklus wurde die Person getötet. \n\nErgebnis: Die gewonnenen Informationen wurden als sehr wertvoll eingestuft. Die gesammelten Daten haben die Liste der Personen von Interesse (P.O.I.) erweitert und wichtige Hinweise für die weitere Unterwanderung feindlicher Netzwerke geliefert.
 nss.13.a: "Der erste Dominostein fällt."
 nss.14.t: "Die Jagd"
 nss.14.d: "Die Wiedererlangung der Kontrolle über das Steuer bringt eine Reihe von Verantwortlichkeiten mit sich; die zuvor begangenen Fehler würden unweigerlich wieder auftauchen und die nationale Sicherheit gefährden. \n\nDie Maskerade ist ein Schleier der Normalität für das amerikanische Volk, der es glauben lässt, dass alles wie gewohnt weitergeht, während wir hart daran arbeiten, sicherzustellen, dass unserem Land kein Schaden zugefügt wird. Einige würden unsere Methoden aus ethischen Gründen ablehnen. Doch niemand hat bestritten, dass sie wirksam sind. \n\nLeider gibt es für uns viel aufzuräumen. Vor dem Bürgerkrieg haben wir eine ganze Reihe von Problemen hinterlassen. Informanten, die uns Informationen geliefert haben, Agitatoren, die Dissidenten gespalten haben, und ehemalige Mitarbeiter, die unserer Sache treu ergeben waren, befinden sich in einer moralischen Krise. \nDies sind jedoch nur vorübergehende Rückschläge. \nEs muss jedoch beachtet werden, dass diese offenen Fragen so schnell wie möglich geklärt werden müssen, damit sie nicht den Schleier lüften und die Maskerade der Öffentlichkeit offenbaren, was unsere große Nation ins Chaos stürzen würde. \n\nEs wird Jahre dauern, bis die Ordnung in den Vereinigten Staaten vollständig wiederhergestellt ist, aber wenn es uns gelingt, die dringendsten antisozialen Akteure zu beseitigen, wird diese Wiederherstellung ohne Hindernisse vonstattengehen."
 nss.14.a: "Legen wir los!"
 nss.15.t: "Das Judasspiel"
 nss.15.d: "Die Stimmung innerhalb der Bundesregierung hat sich verändert, die Menschen betrachten sich gegenseitig mit größerem Misstrauen, Berichte über verschwundene Gelder, Personal und Informationen haben zu einer Atmosphäre der Unsicherheit innerhalb des Systems geführt. \n\nAktuelle Trends deuten darauf hin, dass es mit hoher Wahrscheinlichkeit einen potenziellen Verräter in unseren Reihen gibt, der über genügend Erfahrung und Verbindungen innerhalb des Systems verfügt, um unentdeckt zu bleiben. Seine Ziele sind unbekannt, aber angesichts des plötzlichen Mangels an Ressourcen ist es wahrscheinlich, dass die betreffende Person unter einer moralischen Krise leidet, die ihr Urteilsvermögen trübt, und dass sie versucht, soziale Unruhen zu verursachen, indem sie unsere Agenda der Öffentlichkeit bekannt macht. \n\nDie Wahrscheinlichkeit, dass die Person sich unserer Kenntnis bewusst ist, ist extrem hoch, daher ist Wachsamkeit geboten. \nTrotz der Erfahrung dieser Person im Umgang mit dem System ist es wahrscheinlich, dass sie Spuren hinterlassen hat, die zur Aufdeckung ihrer Identität führen könnten. \n\nEs bleibt nicht viel Zeit, denn je länger diese Person agieren kann, desto größer ist das potenzielle Risiko für die nationale Sicherheit. \nWie jeder Körper, der von Parasiten befallen ist, müssen wir nach innen schauen und entschlossene Schnitte vornehmen, um diesen Judas auszurotten."
 nss.15.a: "Wir sehen uns am Lagerfeuer."
 nss.16.t: "Hinkle-Hinterhalt"
 nss.16.d: "Betreff: Jackson Hinkle\nZugehörigkeit: Amerikanische Volksbefreiungsarmee (AVBA)\nStatus: Neutralisiert\n\nZusammenfassung:\nJackson Hinkle, ein hochrangiges Mitglied der AVBA, wurde als anhaltende Bedrohung für die nationale Sicherheit identifiziert. Die Person arbeitete zuvor in begrenztem Umfang mit verdeckten Ermittlern zusammen, unter anderem bei Bemühungen, linksextreme Fraktionen zu spalten und die Festnahme ausgewählter Personen zu erleichtern. Die Zusammenarbeit wurde eingestellt, als Hinkle sich zunehmend radikalen Elementen der AVBA anschloss, angetrieben sowohl durch den Extremismus der Organisation als auch durch persönlichen Opportunismus. Nach dem Zusammenbruch der AVBA blieb Hinkles Aufenthaltsort unbekannt, bis Berichte über Aktivitäten der Jakobiner auf eine erneute Beteiligung hindeuteten. Die Integration des Verdächtigen in jakobinische Kreise, verbunden mit seinem sozialen Einfluss und seinem Zugang zu elitären Netzwerken, erhöhte sein Profil als bedeutendes Risiko für die Informationssicherheit. n\nOperative Anmerkungen:\nHinkle zeigte ein konsistentes Muster, seine Pflichten unter direkter Bedrohung aufzugeben, da der anhaltende Druck auf die Aktivitäten der Jakobiner Hinkle in eine defensive Haltung zwang.\nDie Person suchte politisches Asyl in der Volksrepublik China, und mit dieser Information wurde der Einsatz von eingeschleusten Informanten genehmigt. Die Agenten arrangierten einen falschen Abholpunkt in Kalifornien.\nHinkle wurde mit minimaler Sicherheitspräsenz angesprochen und ohne Widerstand festgenommen. \n\nVerhör:\nHinkle wurde fünf Tage lang festgehalten, während denen er verschärften Verhörmethoden unterzogen wurde. Der Verdächtige zeigte starke psychische Belastungen und lieferte schließlich verwertbare Informationen, darunter die Identifizierung verbleibender AVBA-Zellen, die im Inland operieren, Einblicke in Verbindungen zwischen der AVBA und China sowie logistische Unterstützungskanäle. \n\nEntscheidung: \nNachdem festgestellt wurde, dass der Verdächtige keine weiteren verwertbaren Informationen mehr hatte, wurde Hinkle neutralisiert. \nEs wird empfohlen, kontrollierte Informationen über Hinkles Fluchtversuch in die VR China an die verbleibenden AVBA-Elemente weiterzugeben, um den inneren Zusammenhalt zu untergraben, und die Aktivitäten der Jakobiner weiterhin zu überwachen, um ein mögliches Wiederaufleben von AVBA-nahen Aktivisten zu verhindern."
 nss.16.a: "Die Operation wird als Erfolg gewertet."
 nss.17.t: "Überfall auf Browns Hacker-Versteck"
 nss.17.d: "Betreff: Barrett Brown. \nZugehörigkeit: Aufständische anarchistische Netzwerke. \nStatus: Neutralisiert. Zusammenfassung: \nBarrett Brown, ehemals Mitglied aufständischer anarchistischer Gruppen im pazifischen Nordwesten, hat sich wiederholt der Festnahme entzogen und stellte ein anhaltendes Risiko für die Spionageabwehr dar. Der Betreffende hat wiederholt in geheime Datenbanken eingedrungen und versucht, sensibles Material im offenen Internet zu verbreiten. Browns frühere Beteiligung an Anonymous, bevor wir dessen kulturelle Infrastruktur übernommen haben, verschaffte ihm ein hohes Maß an operativer Sicherheitsdisziplin. Brown übernahm anschließend die Rolle des Hauptakteurs bei der Gründung mehrerer Hacker-Kollektive, was zu einer Eskalation der Maßnahmen führte, um seine Aktivitäten aufzuspüren, zu stören und zu zerschlagen. Die digitalen Spuren des Verdächtigen wurden über Proxy-Server zurückverfolgt, was zur Bestätigung seiner Anwesenheit in einem einkommensschwachen Stadtgebiet führte. \nEine taktische Einheit führte eine Razzia in einem identifizierten Wohnkomplex durch, als der Verdächtige ausfindig gemacht und festgenommen wurde, wobei er jedoch einen Beamten mit einer Schusswaffe tödlich verletzte, bevor er gefasst werden konnte. Unmittelbar nach seiner Festnahme wurde ein vorprogrammierter Totmannschalter aktiviert, was zu einem erheblichen Datenleck mit geheimen Informationen auf mehreren Plattformen führte. \n\nVerhör: \nBrown wurde etwa zehn Tage lang verstärkten Verhörmethoden unterzogen. Die daraus gewonnenen Erkenntnisse umfassten die Identifizierung aktiver Hackergruppen, die landesweit operierten, sowie Details zu ihren Kommunikationskanälen, ihrer Mitgliedschaft und ihren Vorgehensweisen. \nNachdem festgestellt wurde, dass die Zielperson keine weiteren verwertbaren Informationen besaß, wurde Brown neutralisiert. \n\nBewertung: \nObwohl der Totmannschalter der Zielperson zu einer unmittelbaren Sicherheitsverletzung führte, konnten die operativen Schäden durch die anschließende Nutzung der Informationsnetzwerke deutlich ausgeglichen werden. Die Missionsziele, darunter die Festnahme, Vernehmung und Neutralisierung, wurden erreicht."
 nss.17.a: "Die Operation wird als Erfolg gewertet."
 nss.18.t: "Neutralisierung von Michael Flynns Aufstand"
 nss.18.d: "Betreff: Michael Thomas Flynn. \nZugehörigkeit: Trump-Loyalist. \nStatus: Neutralisiert. Zusammenfassung: \nMichael Thomas Flynn, pensionierter Generalleutnant der US-Armee, war nach dem Zusammenbruch der amerikanischen konstitutionellen Regierung (AKR) an verräterischen Aktivitäten beteiligt. Trotz der Säuberung der letzten Trump-nahen Hochburgen deuteten Berichte über anhaltende Überfälle und Sabotageakte von Aufständischen in ländlichen Gebieten auf koordinierte Taktiken hin, die auf eine formelle militärische Führung hindeuten. \nNachfolgende Ermittlungen bestätigten Flynns anhaltende Rolle bei der Organisation des Widerstands gegen die Wiedereingliederung in die Föderation. \nISR-Ressourcen, darunter Drohnenaufklärung, identifizierten anhaltende Bewegungsmuster der Aufständischen. Die Verteidigungsfähigkeiten der vorgeschobenen Außenposten und geheimen Standorte wurden verstärkt, was zu einem allmählichen Rückzug von Flynns Truppen führte. \n\nIn einem abgelegenen Waldgebiet wurde ein verstecktes Lager entdeckt, das als Ausgangspunkt für eine groß angelegte Offensive eingeschätzt wurde. Der Einsatz bestand aus mehreren SAC-Elementen mit begrenzter konventioneller militärischer Unterstützung. Die Einsatzregeln (Rules of Engagement, ROE) erlaubten den Einsatz tödlicher Gewalt gegen bewaffnetes Personal. \n\nEinsatz: \nDer Überfall dauerte etwa eine Stunde, alle Gebäudestrukturen wurden systematisch geräumt und alle bewaffneten Kämpfer neutralisiert; unbewaffnetes Personal wurde festgenommen. \nFlynn befand sich vor Ort; er leistete Widerstand und weigerte sich, sich zu ergeben. Die Zielperson wurde durch nicht tödliche Schüsse in das rechte Bein und die rechte Schulter außer Gefecht gesetzt und anschließend in Gewahrsam genommen. 5 SAC-Agenten wurden getötet. \nDie Zielperson wurde drei Wochen lang einem verschärften Verhör unterzogen. Zu den Techniken gehörten die Verweigerung medizinischer Behandlung, die Ausübung psychologischen Drucks in Bezug auf Familienangehörige und anhaltender Schlafentzug. \nFlynn gab schließlich verwertbare Informationen preis, darunter die Identifizierung überlebender, Trump-treuer Rebellengruppen und die Bestätigung eines ausgedehnten Tunnelnetzes in den Appalachen, das für Logistik und Verstecke genutzt wurde. \n\nFazit: \nNachdem festgestellt wurde, dass der Verdächtige alle verwertbaren Informationen preisgegeben hatte, wurde Flynn neutralisiert. Es wird empfohlen, seine Militärakte rückwirkend mit einer unehrenhaften Entlassung zu ändern, um die historische Einstufung als Verrat sicherzustellen. \nTrotz des Verlusts von SAC-Personal wird die Operation als erfolgreich bewertet. Die gewonnenen Informationen verbessern die Überwachungs- und Streitkräfteprojektionsfähigkeiten in der Appalachenregion erheblich."
 nss.18.a: "Machen wir weiter."
 nss.19.t: "Neutralisierung von Angela Davis"
 nss.19.d: "Betreff: Angela Yvonne Davis\nZugehörigkeit: Amerikanische Volksbefreiungsarmee (AVBA)/Schwarze Befreiungsarmee (BLA)\nStatus: Neutralisiert\n\nZusammenfassung:\nAngela Yvonne Davis, seit langem eine Person von Interesse für die Geheimdienste, wechselte von einer Schlüsselrolle innerhalb der Black Panther Party in die Führung der Amerikanischen Volksbefreiungsarmee. Nach dem Zusammenbruch der AVBA knüpfte Davis Verbindungen zu mit der BLA verbundenen Milizen und integrierte sich in überwiegend afroamerikanische Stadtgemeinden, wobei sie deren Loyalität und Schutznetzwerke nutzte, um sich der Entdeckung durch die Bundesbehörden zu entziehen.\nDie Informationsbeschaffung wurde durch die Unterstützung der Gemeinde und die Schutzstrukturen der BLA behindert.\nDie Unterwanderung gelang durch gezielte finanzielle Anreize und Druck auf lokale Vertreter. \n\nErgebnis: Positive Identifizierung des Standorts des Unterschlupfs der Zielperson. \nEinsatz von 12 SAC-Agenten, unterstützt von der Bundespolizei, um das Gebiet abzusichern und die Umgebung abzuriegeln. \nDie Dauer der Razzia betrug etwa 30 Minuten. Die Zielperson versuchte, sich zusammen mit Sicherheitspersonal der Festnahme zu entziehen, erlitt eine nicht tödliche Schussverletzung am Rücken und wurde in Gewahrsam genommen. Die Person wurde über einen Zeitraum von drei Wochen verstärkten Verhörmethoden unterzogen. \n\nErgebnis: Offenlegung von Reststrukturen der AVBA- und BLA-Zellen. \nIdentifizierung ausländischer Verbindungen, darunter Unterstützernetzwerke mit Verbindungen zum Iran und zur Volksrepublik China. \n\nFeststellung: Die Person hatte alle verwertbaren Informationen preisgegeben. Nach Abschluss der Verhörreihe wurde Davis neutralisiert. \n\nBewertung:\nDie Festnahme und anschließende Neutralisierung der Person lieferte verwertbare Informationen; zu den Nebenwirkungen zählten jedoch eine erhöhte Volatilität in afroamerikanischen Ballungszentren und eine Zunahme dezentraler militanter Aktivitäten.\nEs wird empfohlen, die Präsenz des SAC in identifizierten Hochrisikozonen auszuweiten und die Überwachung und die Durchdringung der Gemeinschaft zu verstärken, um aufkommende Bedrohungen zu mindern."
 nss.19.a: "Die Operation wird als Erfolg gewertet."
 nss.20.t: "Abfangung von Rinaldo Nazarro"
 nss.20.d: "Betreff: Rinaldo Nazarro\nZugehörigkeit: The Base (Netzwerk weißer Separatisten/Neonazis)\nEinsatzgebiet: Pazifischer Nordwesten\nStatus: Neutralisiert (verstorben)\n\nZusammenfassung:\nRinaldo Nazarro, Gründungsmitglied von "Die Basis", war nach dem Zusammenbruch der kaskadischen Autorität einer der Hauptorganisatoren dezentralisierter Gewalt weißer Separatisten im pazifischen Nordwesten. The Base verfolgte ein dezentrales Modell, um den Widerstand gegen die Bundesbehörden zu maximieren, und setzte dabei gewalttätige Taktiken ein, die erhebliche Schäden an kritischer Infrastruktur und Strafverfolgungsressourcen verursachten. Angesichts der anhaltenden operativen Auswirkungen der Gruppe wurde die Entfernung von Nazarro aus dem Kampfgebiet als notwendig erachtet, um die regionale Stabilität wiederherzustellen. Zu den Quellen gehören Berichte von ehemaligen gegnerischen Netzwerken, Überläufern und eingebetteten Informanten. \n\nMehrere Zellen der Basis wurden in der gesamten Region kartiert; bestätigende Beweise deuteten auf ausländische Unterstützung bei späteren Operationen hin.\n\nSAC-Einheiten wurden angewiesen, gezielte, aufeinanderfolgende Angriffe gegen identifizierte Zellen durchzuführen, um die operative Kapazität der Basis systematisch zu schwächen.\n\nDurchführung:\nKoordinierte kinetische Aktionen wurden gegen Außenposten der Zellen durchgeführt. Der Widerstand variierte je nach Einsatz; die Intensität nahm zu, je näher man den Gebäuden kam, die mit der obersten Führungsebene in Verbindung standen. Während der abschließenden Operation wurde Nazarros Position identifiziert und das Gelände geräumt. Tränengas wurde eingesetzt, um die Zielperson außer Gefecht zu setzen; Nazarro wurde in Gewahrsam genommen. Die verbleibenden feindlichen Akteure wurden während der Aktion neutralisiert. \n\nDie Person wurde zur Vernehmung in eine Verhörzentrale gebracht. \nNazarro starb während einer zweiwöchigen Verhörphase. Die nachträgliche Auswertung der am letzten Außenposten sichergestellten Materialien ergab, dass es sich um Ausrüstung russischer Herkunft handelte, und es wurden dokumentarische Beweise gefunden, die auf einen möglichen Fluchtweg in die Russische Föderation hindeuten. Während direkte Verbindungen zu menschlichen Informationsquellen noch untersucht werden, deuten die materiellen und dokumentarischen Spuren auf eine plausible ausländische Unterstützung hin. \n\nFazit: \nDie sequenzielle Zielkampagne hat die Fähigkeit der Basis, sofortige, organisierte Gewalt in großem Umfang auszuüben, erheblich beeinträchtigt. \nDie sichergestellten Beweise stützen den begründeten Verdacht einer ausländischen Unterstützung; weitere Spionageabwehrmaßnahmen sind erforderlich, um das Ausmaß und die Absicht der externen Beteiligung zu klären."
 nss.20.a: "Die Operation wird als Erfolg gewertet."
 nss.21.t: "Neutralisierung von Steven Nordhaus"
 nss.21.d: "Betreff: Steven Nordhaus\nZugehörigkeit: Ehemaliger Chef der Nationalgarde/ Anführer der Aufständischen\nEinsatzgebiet: Ländliche Gebiete im Mittleren Westen\nStatus: Neutralisiert (verstorben)\n\nZusammenfassung:\nSteven Nordhaus, ehemaliger Chef der Nationalgarde, lehnte die Bundesgewalt ab und organisierte einen anhaltenden Aufstand in den ländlichen Gebieten des Mittleren Westens. Unter Nutzung seiner früheren Kommandoerfahrung und seines Zugangs zu Personal und geheimen Informationen führte Nordhaus koordinierte Angriffe auf Infrastruktur, militärische Ziele und sensible Informationsspeicher durch. Außerdem konsolidierte er die Unterstützung unter dissidenten Milizen und lokalen Sympathisanten unter dem erklärten Ziel, "Amerika aus den Fängen der Tyrannei zu befreien". \nDie Entfernung Nordhaus' aus dem Kampfgebiet wurde als unerlässlich für die Wiederherstellung der Kontrolle und den Schutz nationaler Sicherheitsinteressen angesehen. \nNordhaus nutzte sein institutionelles Wissen, um die Streitkräfte zu schwächen, asymmetrische Angriffe zu koordinieren und sensible Daten auszunutzen. Berichten zufolge schlossen sich immer mehr Dissidenten seiner Sache an und besetzten wichtige ländliche Knotenpunkte. \nDie anhaltenden Aktivitäten bedrohten sowohl die Kontinuität der Regierungsgeschäfte als auch die regionale Stabilität; die Schwächung der Bundesgewalt erhöhte das operative Risiko, das von den mit Nordhaus verbündeten Elementen ausging. \n\nDurchführung:\nMehrere SAC-Abteilungen führten in Abstimmung mit konventionellen Militär- und Strafverfolgungsbehörden eine schrittweise Isolierungskampagne durch. \nAnhaltende Überwachung und gezielter Druck schränkten Nordhaus' Bewegungsfreiheit ein und schwächten den Zusammenhalt seiner Truppe. \nDer endgültige Kontakt wurde nach kombinierten kinetischen und ISR-Operationen (Intelligence, Surveillance, Reconnaissance) hergestellt. Das Fahrzeug des Verdächtigen wurde durch einen Präzisionsschlag außer Gefecht gesetzt; nachfolgende Ermittlungen bestätigten die Neutralisierung des Verdächtigen. \n\nFazit: \nDie Auswertung der sichergestellten Materialien nach dem Einsatz ist noch nicht abgeschlossen. \nErste Einschätzungen deuten darauf hin, dass sich die Aufständischen in lokale Gruppierungen aufspalten werden, wodurch ihre Fähigkeit zu organisierten, groß angelegten Aktionen eingeschränkt wird. E\ns wird empfohlen, eine interne Personalüberprüfung durchzuführen, um potenzielle Sympathisanten innerhalb der Bundeskräfte zu identifizieren und das Risiko von Insider-Bedrohungen zu mindern."
 nss.21.a: "Mission abgeschlossen."
 nss.22.t: "Dunkler Wald"
 nss.22.d: ""Ist das alles?", fragte Burns seine Assistentin und blickte von seinem Schreibtisch aus zu ihr hinüber. "Ja, das ist alles, was geschickt wurde", antwortete sie, ohne ihm direkt in die Augen zu sehen. Er seufzte und blätterte weitere Akten durch, wobei er sich die Details jeder einzelnen Datei ansah. \n\nBericht für Bericht, Akte für Akte, das Ergebnis war immer dasselbe. Der Direktor hatte noch nicht einmal seinen Morgenkaffee getrunken, und schon schmerzte sein Kopf. Die Arbeit zur Konsolidierung der Macht in den Vereinigten Staaten war unermüdlich gewesen und erforderte große Opfer, sowohl von ihm selbst als auch von seinen Untergebenen. Es war eine undankbare Aufgabe, aber eine, die notwendig war. \n\n"Danke, Ich werde sie mir jetzt ansehen", sagte er und entließ die Frau mit einer Handbewegung. \n\n"Ja, Sir", antwortete sie, drehte sich auf dem Absatz um und verließ den Raum mit einem schnellen Klicken des Schlosses. \n\nBurns wandte sich dem Fenster zu und blickte hinunter in den Innenhof, wobei er tief die kühle Morgenluft einatmete. In der Ferne sah er ein paar Frühaufsteher herumstehen. Die Welt außerhalb von Langley schien ruhig und friedlich, ein krasser Gegensatz zu den Intrigen und Machenschaften, die unter der Oberfläche des Alltags brodelten. \n\nWnürde auch nur ein Bruchteil ihrer Handlungen der Öffentlichkeit bekannt werden, würden die Geschichtsbücher sie als Monster verurteilen. Und vielleicht waren sie Monster – aber in der Welt, in der sie lebten, gab es keine Helden."
 nss.22.a: "Und fürs Erste würde das reichen."
 nss.23.t: "Dschungelkreuzfahrt"
 nss.23.d: "Irgendwann war etwas in Mark Tasso zerbrochen. Er hatte eigenhändig die Neonazi-Zelle ausgelöscht, die er überwachen sollte, und seine jahrelange Erfahrung im gnadenlosen Töten gegen die Menschen eingesetzt, die nominell auf seiner Seite standen. Er hatte auch seinen Vorgesetzten getötet und sich danach aus dem Staub gemacht. Mark hatte nie jemandem in Washington gegenüber Loyalität empfunden, nur gegenüber der Agentur und seinem Land als Konzept und als Heimat. Aber Langley und der Rest von Washington standen mit den Terroristen unter einer Decke, und die False-Flag-Operation, an der er beteiligt gewesen war, hatte eine Kette von Ereignissen in Gang gesetzt, die es der Agentur und ihren Komplizen ermöglicht hatte, die Macht in den Vereinigten Staaten zu übernehmen. Jetzt konnte er nur noch mit der Schuld leben, ein gezeichneter Mann zu sein. Er war nicht mehr an der Leine, aber er konnte nicht mehr nach Hause zurückkehren. \n\nDie ersten Attentäter, die sie geschickt hatten, waren in Leichensäcken zurückgebracht worden, gehäutet, ausgeweidet oder einfach verschwunden. Marks jahrelanges Training sowie seine Erfahrung bei der Infiltration der rechtsextremen Terroristen, die Washington angegriffen hatten, hatten ihn mit einer besonderen Form der Brutalität vertraut gemacht. Mark wusste, dass etwas in ihm zerbrochen war. Das musste es sein, damit er so töten konnte, wie er es gelernt hatte. Die Regierung und ihre Geheimdienste hatten einen strahlenden Teenager mit patriotischem Herzen genommen und ihn zu einer Waffe gemacht. Das hatte für sie lange Zeit funktioniert, bis er ausgerastet war und ihre Leine zerbrochen hatte. Wie ein streunender Hund wandte er sich nun gegen seine ehemaligen Herren und schlachtete jeden ab, der ihm in die Quere kam. Sie hätten jemanden wie Mark hinter Mark hergeschickt. \n\nAber er war allein gewesen. Ein Mann mit einem gebrochenen Geist und ohne Freunde konnte nicht hoffen, die Regierung zu stürzen, nicht in einem Zermürbungskrieg. Das Kill-Team der CIA SAC hatte ihn in einer alten Schule in die Enge getrieben, aber sie waren direkt in seine Falle gelaufen, und er hatte mit rasender Wildheit gekämpft. Ihre maskierten Gesichter und ihre Körperpanzerung hätten sie wie Monster erscheinen lassen, wären sie nicht so menschlich gewesen. Am Ende schrien sie genauso wie die Unschuldigen, die Mark töten musste. \n\nSchwach humpelte er aus dem Gebäude, sein verwundeter Körper in das orangefarbene Licht der untergehenden Sonne getaucht. Er war jetzt allein, der einzige lebende Mensch im Umkreis von mehreren Kilometern. Er war sich sicher, dass noch mehr von ihnen kommen würden, und er wusste nicht, wie lange er noch durchhalten konnte. Aber jetzt konnte er sich ausruhen und versuchen, einen Plan zu schmieden. Er würde ihnen nicht die Genugtuung geben, ihn zu töten. \n\nMark sank auf ein Knie, zog seinen Helm ab und warf ihn zur Seite. Er spürte, wie Blut aus der Wunde über seinem Auge tropfte. Für einen Moment verschwamm seine Sicht, aber er schüttelte den Kopf, um sich zu erholen. Wenn er nur... \n\nVon der Baumgrenze aus fiel sein Blick auf etwas Glänzendes. Das Zielfernrohr eines Scharfschützengewehrs, direkt auf ihn gerichtet. Er hatte kaum Zeit, diesen Gedanken zu registrieren. Es gab einen Blitz, einen lauten Knall, und dann nichts mehr. Mark Tassos Körper sackte auf den kalten Asphalt und er hauchte seinen letzten Atemzug aus."
 nss.23.a: "Sein Krieg ist endlich vorbei."
 nss.24.t: "Gesichtslose Gerechtigkeit"
 nss.24.d: "Oberst John Maddox verstand nicht ganz, warum es so weit gekommen war. Er hatte die Politik der Biden-Regierung loyal umgesetzt und dafür gesorgt, dass seine Untergebenen die Masken- und Impfvorschriften einhielten; er hatte ganze Städte eifrig belagert und dafür gesorgt, dass keiner der Anhänger des mandarinenfarbenen Demagogen seinen Fängen entkommen konnte. Und bis jetzt war er nie jemand gewesen, der seine Meinung offen äußerte. Er behielt seine Ansichten für sich, selbst wenn er wusste, dass sie möglicherweise im Widerspruch zur Regierung standen. Aber der Krieg gegen den heimischen Terrorismus hatte die Grenzen zu weit verschoben.\n\nEs schien, als würden die Einsatzregeln mit jeder Woche lockerer und der Umfang der Maßnahmen, die sie gegen ihre amerikanischen Mitbürger ergreifen durften, größer. Sie nahmen Verdächtige nicht mehr fest. Sie erschossen sie einfach oder sahen tatenlos zu, während das Special Activities Center der CIA ganze Städte massakrierte, die als "extremistisch" galten. Als er einem anderen Offizier gegenüber privat seine Unzufriedenheit äußerte, bezeichnete er das SAC kurzerhand als "Langley's Republican Guard", in Anlehnung an die brutalen Prätorianer von Saddam Hussein. Er wusste nicht, dass sein Freund tatsächlich ein Informant der CIA war.\n\nEr konnte die Gesichter seiner Richter hinter ihren Masken nicht erkennen, aber selbst an ihren gedämpften Stimmen konnte er erkennen, dass er sich in Washington Feinde gemacht hatte. Dass das Militär zu diesem Zustand verkommen war – völlig kompromittiert durch die Geheimdienste – war an sich schon eine Beleidigung. \n\n"Colonel Maddox", sagte der leitende Staatsanwalt. Er hatte keine Ahnung, wer der Mann war, da ihm ihre Namen nicht genannt worden waren. Sie hatten nicht einmal ihren Rang oder ihren Dienstzweig angegeben. Er war sich sicher, dass sie aus dem Geheimdienst kamen und nicht aus seiner Armee. "Sie wissen, warum Sie hier sind?""
 nss.24.a: "§g>>>Nächste Seite...§!"
 nss.25.t: "Die Aktivitäten des "Judas" gehen weiter"
 nss.25.d: "Das mutmaßliche Mitglied des Schattenkabinetts wurde entfernt, das neue Mitglied, das diese Position innehat, wurde unter strenge Kontrolle gestellt, wobei die Befugnisse der Behörde erheblich eingeschränkt wurden.\n\nWir beobachten weiterhin verdächtige Aktivitäten von Judas – mehr noch, Judas hat, da wir versuchen, ihn aufzuspüren, seine Aktivitäten zur Untergrabung der Vereinigten Staaten noch intensiviert. Wir müssen alle uns noch zur Verfügung stehenden Ressourcen bündeln und einen weiteren Schlag gegen die Verschwörung führen, mit dem entschlossenen Ziel, den Verräter zu enthaupten."
 nss.25.a: "Scheiße...!"
 nss.26.t: "Die Aktivitäten des "Judas" enden"
 nss.26.d: "Die Ermittlungen waren erfolgreich! Das kürzlich verhaftete Mitglied des Schattenkabinetts wurde zweifelsfrei als der mutmaßliche Verräter innerhalb der Regierungsriege identifiziert. Mit diesem Kopf in der Tasche tauchen nun alle Komplizen des Judas unter, da sie wissen, dass der Zorn der Gerechtigkeit nun unausweichlich ist.\n\nNun, da die Heimat gesichert ist, kann sich unser Land endlich auf die viel wichtigeren Ziele konzentrieren, sich wieder als globale Supermacht zu etablieren."
 nss.26.a: "Nichts kann die Ordnung aufhalten."
 nss.27.t: "Von der Plattform entfernt"
 nss.27.d: "Wo ist dieser Thread hin? Vor einer Sekunde war er noch hier. Na ja, ich finde schon ein anderes Thema, über das ich reden kann, da bin ich mir sicher...\n\nHm, sie haben den Kanal geschlossen. Dabei war es ein wirklich guter Kanal. Vielleicht wird er wieder geöffnet. Wir warten einfach ab, oder?\n\nDiese Website macht nicht mehr so viel Spaß wie früher. Vielleicht wird alles wieder so wie früher, wenn wir uns nur mehr Mühe geben. Es muss einfach besser werden. \n\nDie Seite ist offline? Wie kann eine Seite einfach offline sein? Das ist ja blöd. Was gibt es sonst noch? \n\nDas Internet ist offline? Da kann man wohl nicht viel machen. Wir müssen einfach warten, bis es wieder funktioniert. Dann wird alles wieder gut. \n\nHm, das Internet ist schon viel länger ausgefallen, als ich erwartet hatte. Ich sollte wohl mal rausgehen und nachsehen, was los ist."
 nss.27.a: "Es wird langsam etwas kühl draußen, nicht wahr?"
 nss.28.t: "Pravda"
 nss.28.d: "Vor einem Jahrzehnt war ein Job bei der Washington Post für Julia Ford nichts weniger als ein wahr gewordener Traum. Sie hatte ihr Studium an der Columbia University als Jahrgangsbeste abgeschlossen und einen Abschluss in Journalismus und Politikwissenschaft erworben. Mit Begeisterung nutzte sie ihr Talent für politische Kommentare und wandte es in ihrer Position an. Sie trat nach Donald Trumps Sieg bei den Präsidentschaftswahlen 2016 auf die Bühne, zu einer Zeit, als scheinbar die gesamte amerikanische Intelligenz mobilisiert und bereit zum Widerstand war, und hatte sich einen Ruf für ihre hartnäckige Beharrlichkeit und ihre scharfen, kritischen Kommentare erworben. \n\nAls der zweite amerikanische Bürgerkrieg ausbrach, stürzte sich Julia voller Eifer in den Konflikt und unterstützte den Kampf der Biden-Regierung um die Wiederherstellung von Recht und Ordnung in einem Land, das kurz vor dem Zusammenbruch stand. In ihren Augen war sie sich sicher, dass Biden das Land nicht nur retten, sondern auch wieder aufbauen würde. \n\nSie konnte nicht verstehen, wo alles angefangen hatte, auseinanderzufallen. Vielleicht war es die umfassende Machtkonsolidierung gewesen, die auf den Terroranschlag in Washington D.C. folgte, als die Presse plötzlich mit "Desinformations"-Etiketten zu kämpfen hatte, die es ihr erschwerten, ihre Arbeit zu veröffentlichen. Die Zensurpolitik der Regierung war natürlich in jeder Hinsicht gerechtfertigt gewesen. Jeder Journalist hatte die Pflicht, nur über die Tatsachen zu berichten, wie sie sich ereignet hatten, und nicht, wie man sie gerne hätte. Das hatte sie zunächst verstanden.\n\nDann eskalierte der Krieg gegen den "inländischen Terrorismus", und Julias Vertrauen in die Regierung wurde durch deren brutales Vorgehen gegen Dissidenten und Demonstranten erschüttert. Einer nach dem anderen wurden Kollegen, mit denen sie jahrelang zusammengearbeitet hatte, als "Desinformationsagenten" gebrandmarkt oder wegen Verbindungen zu "antisozialen Organisationen" bloßgestellt. Einige verschwanden, andere wurden diskreditiert und arbeitslos, auf die schwarze Liste gesetzt von einer Regierung, die sie einst in jeder Hinsicht unterstützt hatten. Julia wusste, dass sie einen Fehler begangen hatte, als sie einen Kommentar veröffentlichte, in dem sie die Politik der Regierung in Frage stellte, aber sie hätte nie gedacht, dass sie es auf sie abgesehen haben würden. Nach allem, was sie getan hatte, um sie zu unterstützen, nach den unzähligen Artikeln und Geschichten, die sie veröffentlicht hatte, wie konnten sie das tun?\n\nDoch sie taten es. Eine Memo, in dem ihre angeblichen Verbindungen zu Verschwörungstheoretikern und linken Terroristengruppen dargelegt wurden, war bei ihren Arbeitgebern eingereicht worden, und innerhalb weniger Wochen war ihr Name in Verruf geraten, ihr Leben und ihre Karriere lagen in Trümmern. Die Faktenprüfungsabteilung der Post war für interne Überprüfungen umfunktioniert worden, und dasselbe Untersuchungsteam, das geholfen hatte, Trumps Verfehlungen aufzudecken, untersuchte nun ihre eigenen Kontakte und Quellen, um zu beweisen, dass sie mit dem Feind zusammengearbeitet hatte. \n\nAls sie nun in die Läufe der Waffen maskierter Männer blickte, die sich weigerten, sich zu identifizieren, verstand sie, was sie falsch gemacht hatte. Es lag die ganze Zeit an ihr. "
 nss.28.a: "Der Tod der vierten Gewalt."
 nss.29.t: "Beweise erlangt"
 nss.29.d: "Die jüngste Aktion unserer Spezialeinheiten hat Ergebnisse gebracht: Wir konnten wichtige Beweise sichern, die zur Festnahme des mutmaßlichen Verräters in den Reihen des Schattenkabinetts führen könnten.\n\nDennoch sollten wir bei der Auswahl eines Ziels für eine Säuberungsaktion weiterhin Vorsicht walten lassen, da diese Beweise für eine endgültige Entscheidung möglicherweise nicht ausreichen. Wir sollten versuchen, wenn möglich weitere Beweise zu finden."
 nss.29.a: "Sehr gut."
 nss.30.t: "Suche bringt keine Ergebnisse"
 nss.30.d: "Die Ermittlungen unserer Spezialteams brachten keine brauchbaren Informationen oder waren anderweitig ergebnislos. Wir müssen unsere Bemühungen fortsetzen, den Verräter zu finden, damit die Vereinigten Staaten von Amerika nicht dem Untergang geweiht sind. \n\nDirektor Burns hat die CIA bereits angewiesen, das Schattenbudget zu erhöhen und unsere Maßnahmen in allen Bereichen der Regierung und Gesellschaft zu intensivieren. Wir müssen auf jeden Fall Erfolg haben."
 nss.30.a: "Lasst uns weiter suchen."
 nss.31.t: "Nukleare Bedrohung aufgedeckt"
 nss.31.d: "Nach mehreren Vorfällen, die miteinander in Verbindung zu stehen scheinen, und mit Hilfe mehrerer Ermittler ist es wahrscheinlich, dass der betreffende Dissident versucht, die Vereinigten Staaten von Amerika gegenüber dem Rest der Welt in ein schlechtes Licht zu rücken.\n\nDie Mittel, mit denen dies geschehen soll, waren Gegenstand zahlreicher Spekulationen, aber nach dem Überfall auf die Savannah River Site ist es sehr wahrscheinlich, dass der betreffende Verräter in unserem Namen nukleare Massenvernichtungswaffen einsetzen wird, um unseren Ruf für immer zu schädigen.\nEs ist nicht bekannt, wie weit sie mit ihren Versuchen bereits fortgeschritten sind, aber angesichts des zunehmenden Drucks von innen und außen steht außer Frage, dass es nur eine Frage der Zeit ist, wann dies geschehen wird.\n\nEs wird empfohlen, die Bemühungen zu verstärken, um diesen Plan zu vereiteln und die betreffende Person festzunehmen, damit sie nicht einen dauerhaften Riss in der Ordnung verursacht."
 nss.31.a: "Es wird wärmer..."
 nss.32.t: "Gebrochene Maskerade"
 nss.32.d: "Es war ein Tag wie jeder andere, mit Betonung auf "war".\n\nDiejenigen in den Elfenbeintürmen blickten verzweifelt auf das, was unter ihnen lag; sie ahnten nicht, dass es einer der ihren sein würde.\nJeder Turm muss irgendwann fallen.\nSowohl die Raketenbasen als auch die U-Boote feuerten ihre Atomsprengköpfe auf mehrere Ziele ab; mehrere Nationen in Südamerika wurden vom Damoklesschwert getroffen. Ein Kontinent, der bald in Flammen stehen würde, nicht nur im wörtlichen Sinne.\nDann war es Westafrika, der Spielplatz der Weltmächte, der unbewohnbar werden würde, da seine Städte in Schutt und Asche gelegt wurden. Eine Erinnerung daran, dass das Leid immer gleich um die Ecke lauert.\nAls nächstes war Haiti an der Reihe, eine Nation, die mit Chaos nicht unbekannt ist. Nach den Explosionen würde das Land eine weitere Bewährungsprobe durchlaufen müssen.\n\nZuerst herrschte Stille.\nDann begannen die Schreie. Schreie nach Antworten, Schreie nach Rache, Schreie nach Lösungen.\nGegenüber der Außenwelt wurden diese Angriffe der amerikanischen Nation angelastet, ein Makel, den man nicht loswerden kann.\n\nDie Vereinigten Staaten von Amerika haben versagt. Intern herrscht Panik, es gibt zahlreiche Rücktritte, und einige der engsten Verbündeten Amerikas haben das Land stillschweigend verlassen; andere haben sich dem letzten Akt der Freiheit hingegeben. Die Vereinigten Staaten sind zum Feind der Welt geworden, und es gibt bereits Berichte über erhebliche Lecks in Bezug auf unsere inneren Abläufe.\n\nUnsere Bevölkerung ist wütend."
 nss.32.a: "Ein kleiner Rückschlag, was sind schon hundert Jahre mehr?"
 nss.33.t: "Stiller Staatsstreich in Kanada"
 nss.33.d: ""
 nss.33.a: "Wieder unter unseren Fittichen."
 nss.34.t: "Schichten eines Imperiums"
 nss.34.d: "Die Vereinigten Staaten sind kein Unbekannter darin, ganze Imperien und tyrannische Systeme zu zerstören. \nMehrere haben versucht, der Welt ihre Ordnung aufzuzwingen, aber alle sind gescheitert: die Briten, die Deutschen und die Russen. \n\nEs spielt keine Rolle, welche Form oder Farbe es hat, Russland bleibt im Kern ein Imperium. \nUnd wir als Amerikaner sind dazu bestimmt, sie alle zu zerstören. \n\nUnser erster Fehler war, dass wir den Sowjets jahrzehntelang erlaubt haben, Osteuropa zu dominieren, unser zweiter Fehler war, Putin zu beschwichtigen, und unser dritter Fehler war, Europa nicht stark genug zu machen, um ohne uns mit ihnen fertig zu werden. Aber wie bei jedem Rivalen sind es die gewonnenen und verlorenen Schlachten, die uns lehren. In gewisser Weise sind jegliche Form von Ressentiments oder Groll längst verschwunden. \n\nWir beide sind in vielerlei Hinsicht aufeinandergetroffen und haben immer versucht, der Welt zu zeigen, wer der Beste der Besten ist. \nHeute ist der Tag, an dem wir dieser Rivalität ein für alle Mal ein Ende setzen, um der Welt zu zeigen, dass am Ende einer von uns der Beste war. \n\nIhre Kinder sind über die Ruinen zweier Imperien gegangen, sie werden über die Ruinen des dritten gehen."
 nss.34.a: "Auf dem Weg in die Freiheit."
 nss.35.t: "Prüfstein der Imperien"
 nss.35.d: "Ein ganzer Kontinent, bedeckt mit Knochen und Asche, auf dem Imperien sich gegen die universellen Gesetze der Realität selbst bewiesen haben, einige haben gewonnen, andere verloren. \nAber Imperien bestehen nicht aus Männern und Frauen, die auf Elfenbeintürmen stehen, Imperien bestehen aus Ideen und Konzepten, die ein Reich zusammenhalten. \n\nFür viele sind die Vereinigten Staaten ein Imperium. \nEin Imperium, das der letzten Prüfung standhielt, der kein anderes Imperium standhalten konnte. \nIdeale, die es wert sind, bewahrt zu werden. Konzepte, die unbesiegbar bleiben werden. \nOhne Europa würden wir nicht existieren, in gewisser Weise hat es einen sentimentalen Wert, dafür zu sorgen, dass wir sie nicht wieder an die feurigen Flammen des Wandels verlieren. \nEs spielt keine Rolle, welches Symbol über Europa herrscht. \n\nDer amerikanische Frieden wird dafür sorgen, dass seine Symbole zerfallen, seine Idole fallen und seine zerstörerischen Ideologien abgebaut werden. Lasst uns die Ordnung in Europa wiederherstellen. \n\nUnsere Umarmung wird niemals gelockert werden. \n\nNie wieder."
 nss.35.a: "Es ist Zeit, nach Hause zu kommen."
 nss.36.t: "Spiegel"
 nss.36.d: "Im Osten liegt ein Ungeheuer.\nEs besteht aus Menschen und Fabriken.\nEs braucht immer mehr.\nEs verbrennt die Länder der Schwachen.\n\nDoch dann kommt die Fackel der Erleuchtung, getragen von vielen.\nZusammen mit einer Klinge, die von vielen getragen wird.\nSie zielt auf sein Herz.\nSie zielt auf seinen Kopf.\n\nChinas Erwachen verlief nicht ohne Schwierigkeiten, doch unsere vorübergehende Abwesenheit hat sich als entscheidender Faktor für seinen Aufstieg erwiesen. Wir haben die Parallelen zu unserer eigenen Geschichte gesehen.\nNichts als Prüfungen und Schwierigkeiten, doch wer sie alle übersteht, sichert sich einen Platz unter der Sonne.\nAber es gibt nur einen Platz.\n\nChina hat die Fähigkeit, unseren Platz einzunehmen und zum neuen Wächter der Welt zu werden.\nAber das ist keine Welt, zu der wir gehören wollen.\n\nDer amerikanische Frieden hat aus gutem Grund so lange gehalten.\nEs ist an der Zeit, ihrem Aufstieg ein Ende zu setzen."
 nss.36.a: "Entfernt die Zähne des Drachen."
 nss.37.t: "Herz der Welt"
 nss.37.d: "Die Zivilisation entstand im Nahen Osten, und wie jeder Geburtsort ist auch dieser anfällig für Korruption. \nNicht aufgrund seiner Natur, sondern aufgrund der Zeit, die vergangen ist. \n\nDie Region ist kein Unbekannter für Konflikte. \nWie ein Rad, das versucht, sich neu zu erfinden. \nMänner in Schwarz und Männer in Beige, bewaffnet mit Stahl und Feuer. \nEine Region, die für immer in einen roten Nebel gehüllt ist. \nWir waren schon einmal hier, und unsere Anwesenheit stellte sicher, dass sich der Kreislauf nicht wiederholen würde. Unsere Abwesenheit war der Beweis dafür, dass wir zurückkommen müssen. \nUm sicherzustellen, dass die Gespenster der Gewalt begraben bleiben. \nStabilität und Ordnung sind die Tugenden, die nötig sind, um eine so instabile Region zu zähmen. Ihre reiche Geschichte und ihr Wissen sind zu wertvoll, um in den Händen der impulsiven Massen zu bleiben. \n\nWir sind wieder da. \nUnd wir werden niemals wieder gehen."
 nss.37.a: "Vergrabt ihre Arroganz, vergrabt ihren Stolz."
 nss.38.t: "Amerika verlangt, dass wir die BRI verlassen"
 nss.38.d: "Die Vereinigten Staaten von Amerika haben unserem Land ein Ultimatum gestellt und fordern, dass wir jegliche wirtschaftliche und diplomatische Zusammenarbeit mit China einstellen, insbesondere den Austritt aus der Belt and Road Initiative, unter Berufung auf "die Gefahr des chinesischen Neoimperialismus und die Gefahr des globalen Autoritarismus".\n\nDie strengen Forderungen und Drohungen der amerikanischen Seite sind jedoch nicht zu vergleichen mit den Verlusten, die wir durch den Verlust der Gunst Chinas erleiden könnten. Aber in einem Kampf der Titanen gibt es keinen Kompromiss, also müssen wir uns entscheiden: entweder unsere Beziehungen zu China abbrechen oder riskieren, unter der militärischen und wirtschaftlichen Macht Amerikas zu leiden."
 nss.38.a: "Wir haben keine Wahl."
 nss.38.b: "Nein?"
 nss.39.t: "Verlorene Seele"
 nss.39.d: "Er wurde zur Nachtwache eingeteilt, um sicherzustellen, dass keine irakischen Aufständischen seine Einheit überraschen konnten; die ruhigen Nächte waren immer der Auftakt zu einem weiteren Hinterhalt, einem weiteren Terroranschlag. Er hatte seit Tagen nicht geschlafen, und manchmal sah er Bilder vergangener Kriege vor seinem inneren Auge. \nDer Nachthimmel war wunderschön, ein Gemälde, wie es nur ein göttliches Wesen schaffen konnte. \nManchmal hörte er in der Ferne Schüsse; ob von Freunden oder Feinden, spielte keine Rolle, denn sie waren weder in seiner Nähe noch in der Nähe seiner Einheit. Die kleine Laterne neben dem billigen Plastikstuhl, auf dem er saß, gab ihm gerade genug Licht, um seine unmittelbare Umgebung zu sehen, aber in der Ferne ließ die Dunkelheit Raum für Fantasie. \n\n"Haben Sie meine Männer gesehen?"\n\nEr sah eine Gestalt in der Nähe stehen, die eine Uniform und eine etwas veraltete Gasmaske trug.\nDie Gestalt näherte sich, als er sich neben ihn hockte.\n\nDer Nachtwächter blickte erschrocken auf.\n\n"Wer sind Sie? Geben Sie sich zu erkennen!"\nEr stand langsam auf und richtete sein Gewehr auf die Gestalt.\ n\n"Meine Männer, haben Sie sie gesehen?", fragte sie immer wieder.\n"Ich bin sicher, sie sind noch in der Nähe – wenn Sie sich nur ausweisen..."\n\n"Natürlich sind sie in der Nähe, ich bin noch hier, und Sie werden es auch sein. Keiner von uns wird diesen Ort verlassen."\nDie Gestalt streckte ihre Arme nach dem Nachtwächter aus. Auf ihrer Uniform waren Einschusslöcher zu sehen, um ihren Hals waren Strickmarken zu erkennen. \n"Die Zivilisation wurde hier geboren, und hier wird sie auch begraben werden." \n\nDer Nachtwächter wurde abrupt von einem Mitglied der Truppe geweckt, das ihn schüttelte. \n"Hey Alter alles in Ordnung?" \nEr lächelte sanft. "Wir wollen nicht, dass diese Tusken-Räuber die Oberhand über uns gewinnen."\n\nDer Wachposten sah sich um, aber die maskierte Gestalt war nicht mehr da.\nEr stand auf und lachte verlegen."
 nss.39.a: ""Bitte hör auf, Star Wars-Anspielungen zu machen.""
 nss.40.t: "Grausamkeitsgruppe"
 nss.40.d: "Als der Transporter vor dem Gebäude zum Stehen kam, flogen die Türen auf. Die Soldaten ohne Kennzeichnung stiegen aus und gingen zum Eingang, wo sie Sprengstoff an der Tür anbrachten. Die Explosion hallte durch die Straße, als die Einsatzkräfte hineinstürmten. Ob es sich nun um maskierte rechtsextreme Terroristen oder Zivilisten handelte – jeder, der es wagte, sich ihnen in den Weg zu stellen, wurde erschossen. Ihre oberste Priorität war es, die HVT und alle anderen potenziellen Terroristen auszuschalten, und dann jeden, der möglicherweise etwas gesehen hatte.\n\nImmer wieder war es dasselbe – die Erleichterung auf den Gesichtern der Geiseln, als sie ihre Retter sahen, nur um dann Verwirrung und Entsetzen zu zeigen, als die Agenten ihre Gewehre auch auf sie richteten. Keine Überlebenden, keine Zeugen. Nicht, dass Zivilisten ihre vermeintlichen Retter hätten erkennen können, deren Gesichter hinter Sturmhauben verborgen waren, aber nichts wurde dem Zufall überlassen. \n\nAls sie schließlich vor einer verschlossenen Tür standen, brachte ein Agent einen Sprengsatz an und trat sie ein. Als sich der Rauch lichtete, kam ein kauernder Mann mit einem Hakenkreuz-Tattoo im Nacken zum Vorschein. \n\n"Keine Bewegung!", befahl der Teamleiter. \n\n"Das war nicht Teil der Abmachung-", protestierte der Neonazi, doch die Truppe füllte ihn mit Blei. "Ihr ... habt mir versprochen..." \n\nDas Team legte ab. "Einsatzteam, hier ist TOC. Das Aufräumteam ist unterwegs. Eliminiert alle verbleibenden Überlebenden. Over." \n\n"Verstanden", antwortete der Teamleiter. "Einsatzteam, Ende." Dann wandte er sich an seine Männer."
 nss.40.a: ""Ihr habts gehört. An die Arbeit!""
 nss.41.t: "Wahltag"
 nss.41.d: "In den eher autokratischen Regierungen weltweit wurde das Wahlrecht abgeschafft. Dieses Gefühl, keine Macht zu haben, in nichts mitreden zu können. Es ist ein lähmendes Gefühl. \n\nDer amerikanische Bürger verspürt keine solche Lähmung, alle vier Jahre ist Wahlkampfzeit, ein Ritual, um die Freiheit der Wahl zu feiern und unser Volk daran zu erinnern, dass es diese Macht besitzt. \nDie Wahl, seinen bevorzugten Kandidaten auszuwählen, vom Charismatischen bis zum Pragmatischen, vom Humorvollen bis zum Ruhigen. Es wird wie in den Tagen vor dem Verfall des Populismus sein, alle lächeln und es entstehen freundschaftliche Rivalitäten, so wie es auch bei einem Sportwettbewerb der Fall wäre. \n\nWer auch immer gewinnt, die Maschinerie hinter dem Schleier wird dieselbe bleiben. \nNun wollen wir sehen, wessen Porzellanmaske auf dem Bildschirm am hellsten strahlen wird. \n\nUnd der Gewinner ist..."
 nss.41.a: "Eindeutiger Sieg für den Amtsinhaber!"
 nss.41.b: "Gavin Newsom"
 nss.41.c: "Mitt Romney"
 nss.41.e: "Lloyd Austin"
 nss.41.f: "John Bolton"
 nss.41.g: "Mark Milley"
 nss.41.h: "Antony Blinken"
 nss.41.i: "Hunter Biden"
 nss.41.j: "Nancy Pelosi"
 nss.41.k: "Chuck Schumer"
 nss.41.l: "Liz Cheney"
 nss.42.t: "Amtseinführungstag"
 nss.42.d: "Das Volk hat gesprochen, und die Rivalität, die sich zwischen den Kandidaten und ihren Anhängern aufgebaut hatte, ist abgeklungen. Jetzt ist es an der Zeit, sich die Hände zu reichen und freundlich zu lächeln, jetzt ist es an der Zeit, wieder vereint zu sein. \nDer designierte Präsident hat aufgrund der geltenden Ausgangssperre eine große virtuelle Menschenmenge angezogen, und aus offensichtlichen Gründen wurden die Sicherheitsvorkehrungen für die Zeremonie verschärft, als der designierte Präsident seine Hand auf die Bibel legte und seinen Eid gegenüber der Nation ablegte. \n\nNormalerweise würde eine Menschenmenge ihn bejubeln, doch die Massen im Internet machen genug Lärm, um dies zu kompensieren. Feuerwerke werden gezündet und die Hymne spielt im Hintergrund, während der Präsident der Vereinigten Staaten von Amerika in das Kapitol geführt wird. \n\nNachdem die Wahlsaison nun zu Ende ist, ist es an der Zeit, den Präsidenten ordnungsgemäß in die Abläufe einzuführen, sowohl in der Öffentlichkeit als auch hinter den Kulissen."
 nss.42.a: "Sie werden nur bei Bedarf informiert."
 nss.43.t: "AN ALLE BETROFFENEN:"
 nss.43.d: "Nach der kürzlichen Amtseinführung des Präsidenten der Vereinigten Staaten von Amerika kursieren Gerüchte über den anschließenden Tod des ehemaligen Präsidenten Joseph Robinette Biden. Gerüchte wie "wir haben den Stecker gezogen" oder "wir haben ihm ein schmerzhaftes Gift injiziert" sind nichts anderes als offensichtliche Versuche der Desinformation durch externe Feinde. \n\nUnser ehemaliger Präsident Biden hat sich mit Leib und Seele für unsere großartige Nation eingesetzt und bis zum Ende seiner Amtszeit durchgehalten, um weitere Instabilität zu verhindern. Das erfordert Mut.\nUnabhängig von den Schmerzen, unabhängig vom Stress, den er ertragen musste.\nUnd genau wie er werden auch wir das tun.\nWir erfüllen unsere Pflichten, wir bringen die Welt zurück in die Normalität.\nUnd wir machen weiter, unabhängig von den Narben, die zurückbleiben.\n\nIch möchte alle daran erinnern, dass die Verbreitung solcher Gerüchte unter verbale Meinungsverschiedenheiten fällt und potenziell als unsoziales Verhalten angesehen werden kann. Ich muss Sie nicht an alle Maßnahmen erinnern, die wir gegen solche Handlungen ergreifen. \n\nWir haben keine Zeit, uns in Spekulationen und Geheimnissen zu verlieren, wir müssen eine Welt wiederaufbauen. \nUNTERZEICHNET:"
 nss.43.a: "William J. Burns"
 nss.44.t: "Schießerei in örtlichem Einkaufszentrum fordert 20 Todesopfer"
 nss.44.d: "Ein ruhiger Nachmittag verwandelte sich schnell in einen Albtraum, als eine junge Frau im Alter von etwa 21 Jahren mit einer Maschinenpistole bewaffnet in der Franklin Mall in Pennsylvania auftauchte, mit der Absicht, so viele Menschen wie möglich zu töten. Der Angriff dauerte etwa zwanzig Minuten, bevor die örtlichen Behörden sie mit tödlichen Mitteln stoppen konnten. \nBei dem Angriff kamen mindestens zwanzig Menschen ums Leben, vier weitere befinden sich in kritischem Zustand. Es gibt bereits Berichte, dass die Polizei in der gesamten Region und im gesamten Bundesstaat Kontrollpunkte eingerichtet hat, um die Wahrscheinlichkeit potenzieller Nachahmungstäter zu verringern. \n\nÜber die Motive der Schützin wird noch spekuliert, aber in ihrem Rucksack wurde ein Notizbuch gefunden, das Bilder und Texte mit Bezug zum Nihilismus und Anzeichen einer sich verschlechternden psychischen Gesundheit enthielt. In dem Notizbuch fanden sich immer wiederkehrende Motive von "Augen in der Dunkelheit".\n\nWährend die Ermittlungen noch andauern und ihre Familie befragt wird, raten die örtlichen Behörden dringend dazu, die Aktivitäten der jüngeren Familienmitglieder zu überprüfen, insbesondere im Hinblick auf ihre Online-Aktivitäten. Das FBI hat erklärt, dass weitere Informationen bekannt gegeben werden, sobald die entsprechenden Bestätigungen vorliegen."
 nss.44.a: "Mehr dazu nach der Werbepause."
 nss.45.t: "Angriff auf Campus erschüttert die Nation!"
 nss.45.d: "Eine lokale Hochschule in Tennessee wurde von einer Tragödie heimgesucht, als ein junger Mann in seinen Zwanzigern mit einer automatischen Waffe auf Studenten und Lehrer zu schießen begann. Die örtlichen Sicherheitskräfte versuchten, den Schützen festzunehmen, mussten sich jedoch aufgrund des Einsatzes von Molotowcocktails schnell zurückziehen, wobei mindestens ein Sicherheitsbeamter getötet wurde. \n\nEin SWAT-Team wurde auf dem Hochschulgelände eingesetzt und nach einer schnellen Durchsuchung des Geländes wurde der Schütze mit tödlichen Mitteln gestoppt. Die Berichte über die Zahl der Todesopfer sind noch unklar, aber es handelt sich um mehr als vierzig Opfer, die den Tod fanden. \nÜber die Motive des Schützen wird noch spekuliert, aber Selbstverletzungsnarben am ganzen Körper deuten auf schwere psychische Probleme hin, ebenso wie spöttische Texte auf den Molotowcocktails wie "Brennt in der Hölle!" und "Wärme, egal was passiert!". \n\nDie Familie wird intensiv befragt, während die lokalen Behörden die lokalen Online-Aktivitäten gründlich durchsuchen, um Personen zu finden, die Sympathie für den Schützen bekunden oder möglicherweise Verbindungen zu einer digitalen Gruppe haben, die zu solcher Gewalt aufruft. \n\nDas FBI hat erklärt, dass die jüngsten Ermittlungen zu dem Schluss geführt haben, dass es in den Vereinigten Staaten weit mehr Menschen gibt, die diese antisozialen Elemente hegen, als ursprünglich angenommen. \n\nMehr dazu nach der Pause."
 nss.45.a: "Oh wow, Disney dreht einen neuen Film!"
 nss.46.t: "Blutbad schockiert die Nation!"
 nss.46.d: "Ein Straßenfest in New England verwandelte sich schnell in ein Blutbad, als ein 24-jähriger Mann mit einem schwarzen Lastwagen mehrere Menschen überfuhr. Auf dem Fahrzeug waren unter anderem die Worte "Flood the world" (Überschwemmt die Welt) und "EAT SHIT AND DIE" (Fresst Scheiße und sterbt) mit Sprühfarbe aufgesprüht, nachdem es in ein Café gerast war. Der Schütze stieg schnell aus dem Truck und nahm ein Gewehr zur Hand, mit der einzigen Absicht, so viele Menschen wie möglich zu töten. \n\nDie Absichten des Schützen wurden deutlich, als er mit seinen Stiefeln auf die Köpfe der Verletzten stampfte und unverständlich schrie. Berichten zufolge waren seine Augen blutunterlaufen und seine Bewegungen nervös. \n\nDie Polizei traf am Tatort ein und zwang den Schützen, sich in einen Supermarkt zurückzuziehen, wo er umgehend isoliert und mit tödlichen Mitteln ausgeschaltet wurde. Die Behörden behaupten, dass der Schütze heftigen Widerstand leistete, was sie zu ihrer tödlichen Reaktion veranlasste. Die Zahl der Todesopfer belief sich auf fast 75 Menschen, mindestens ein Dutzend wurden verletzt, wobei die Haupttodesursache der Aufprall des Lastwagens war. \nDie Behörden haben die Motive des Schützen noch nicht bestätigt, aber angedeutet, dass der Täter stark unter dem Einfluss von Alkohol und verschiedenen Medikamenten im Zusammenhang mit seiner psychischen Gesundheit stand. Sie haben versprochen, die Öffentlichkeit zu informieren, sobald weitere Informationen bestätigt sind."
 nss.46.a: "Okay, aber ich wollte Friends sehen, wechsel den Sender."
 nss.47.t: "Angriff versengt die amerikanische Seele!"
 nss.47.d: "Eine örtliche Tankstelle wurde von einer heftigen Explosion erfasst, als ein Verdächtiger in der Nähe mit einer Schrotflinte gesehen wurde, der auf alle schoss, die nicht von der Explosion erfasst worden waren. \n\nEin 26-jähriger Mann, der mehrere Rohrbomben bei sich trug, ging auf die örtliche Bevölkerung los, indem er die Sprengsätze auf nahegelegene Geschäfte und Gebäude warf und eine Spur der Verwüstung hinterließ.\nDer Angreifer wurde schnell von den örtlichen Strafverfolgungsbehörden festgenommen, aber nicht bevor er sich mit einer Bombenweste, die er unter seinem Kapuzenpulli trug, in die Luft sprengte.\nDie Motive des Täters sind weitgehend unbekannt, aber Verwandte haben Aussagen zu seiner Vorgeschichte gemacht. Er isolierte sich stark und zeigte Anzeichen extremer Paranoia. Es scheint sich um einen weiteren Fall der psychischen Gesundheitskrise zu handeln, die Amerika im Sturm erobert.\n\nDie Zahl der Todesopfer des Anschlags steht noch nicht fest, aber laut offiziellen Angaben dürfte sie leicht bei über hundert liegen. Die Behörden haben versprochen, die Öffentlichkeit zu informieren, sobald weitere Informationen bekannt sind.\n\nIn anderen Nachrichten wird über vermehrte Sturmaktivitäten in der Nähe der Küste Floridas berichtet. Experten sind offenbar verwirrt, da dies außerhalb der Saison liegt. Den Einwohnern wird geraten, die offiziellen Kanäle hinsichtlich möglicher Naturgefahren aufmerksam zu verfolgen."
 nss.47.a: "Werden diese Menschen in einer Fabrik hergestellt?"
 nss.48.t: "Angriff auf Dollar Tree führt zu einer Gewaltwelle!"
 nss.48.d: "Was zunächst als bewaffneter Raubüberfall angesehen wurde, entwickelte sich schnell zu etwas viel Schlimmerem. \n\nEine 21-jährige Frau wurde gesehen, wie sie einen lokalen Dollar Tree in Georgia betrat, und bevor der Verkäufer überhaupt reagieren konnte, wurde er mit einem automatischen Gewehr in die Brust geschossen, während sie wie ein wildes Tier brüllte. Schließlich tötete sie vier Kunden, bevor sie nach draußen ging und wahllos auf Gebäude und Menschengruppen schoss, bevor sie sich in ein verlassenes Einkaufszentrum zurückzog. \n\nAls die örtlichen Behörden am Tatort eintrafen und versuchten, das Einkaufszentrum zu durchkämmen, war die Schützin nicht allein, denn zusammen mit fünf weiteren Personen eröffnete sie das Feuer auf die anwesenden Polizeikräfte. Der Angriff auf den Dollar Tree war wahrscheinlich ein Versuch, die Polizei in einen Schusswechsel zu locken. Die Täter waren schwer bewaffnet, wurden jedoch nach dem Eintreffen der SWAT-Einheiten schnell ausgeschaltet, was zum Tod aller sechs Schützen führte. \n\nDie Behörden gehen davon aus, dass es sich höchstwahrscheinlich um eine größere Gruppe handelt, doch gibt es dafür bislang noch keine Bestätigung. Etwa dreißig Menschen wurden getötet, und Einheiten der Militärpolizei wurden eingesetzt, um nach weiteren potenziellen Bedrohungen Ausschau zu halten. \n\nWeitere Informationen folgen in Kürze, aber erst nach unserer Werbepause."
 nss.48.a: "Warum aber ausgerechnet ein Dollar Tree?"
 nss.49.t: "Schießerei in den Vereinigten Staaten!"
 nss.49.d: "Terror erfasst die Nation, nachdem ein Einzeltäter einen Ort in der Region beschossen hat. Der Schütze konnte schnell mit tödlichen Mitteln gestoppt werden, doch zuvor hatte er Dutzende Menschen getötet. Die örtlichen Behörden gaben an, dass der Schütze seit langem mit psychischen Erkrankungen, Medikamenten und familiären Problemen zu kämpfen hatte. \n\nDie Ermittlungen darüber, woher der Schütze seine Waffen hatte und was ihn zu dieser Tat motiviert haben könnte, dauern noch an. Die Behörden haben eine Pressekonferenz zu dem Vorfall angekündigt. Ein weiterer tragischer Tag in Amerika – mehr dazu gleich nach der Pause."
 nss.49.a: "Ich hasse Werbung."
 nss.50.t: "EINZELKÄMPFER-INTEL"
 nss.50.d: "Das folgende Dokument enthält Informationen über die Ausübung von Druck auf anfällige Personen, um Einzelgänger-Aktionen gegen die Bevölkerung durchzuführen. Das angestrebte Ziel ist es, landesweit Angst zu verbreiten, sodass es keinen Widerstand gegen die verstärkte Überwachung und Sicherheit in den Vereinigten Staaten von Amerika gibt. \n\nDie Personen müssen die folgenden Kriterien erfüllen, bevor Druck auf sie ausgeübt wird:\n-Sie müssen antisoziale Tendenzen aufweisen.\n-Sie müssen zwischen 16 und 28 Jahre alt sein.\n-Die Personen müssen im Internet präsent sein.\n-Die Personen müssen ein angespanntes Verhältnis zu ihrer Familie haben.\n-Die Personen müssen mit psychischen Problemen zu kämpfen haben.\n\nNachdem ein potenzieller Kandidat gefunden wurde, muss der richtige Druck ausgeübt werden.\nDieser reicht von Druck in den sozialen Medien durch Lockvogelgruppen/-personen bis hin zur Förderung paranoider Tendenzen. Die Anleitung zur Einnahme von Medikamenten wird dringend empfohlen, bleibt jedoch optional. \n\nSobald feststeht, dass die Person zum Auslöser eines Einzeltäter-Anschlags werden wird, wird, falls es ihr nicht möglich ist, selbst Schusswaffen zu beschaffen, der Einsatz von Lockvogelgruppen/-personen empfohlen, um sie mit der entsprechenden Ausrüstung zu versorgen. \n\nNach Abschluss eines Einzeltäter-Anschlags wird empfohlen, alle Spuren zu beseitigen, die möglicherweise auf die Beteiligten hinweisen könnten, oder Nicht-Mitarbeiter, die Teil der Lockvogel-Netzwerke waren, wegen ihrer Beteiligung an dem Einzeltäter-Anschlag festzunehmen."
 nss.50.a: "Seite 1 von 30."
 nss.51.t: "Die Geburt des Am-Nets"
 nss.51.d: "Die Unregulierung des Diskurses im Internet wurde seit langem als ein Faktor angesehen, der zur Destabilisierung der Gesellschaft beiträgt. Die Unfähigkeit der Behörden der Vorkriegszeit, den Übergang zum Informationszeitalter angemessen zu bewältigen, wurde als kritisches Versagen der Regierungsführung bewertet. \n\nUm diesen Mangel zu beheben, wurde die Umsetzung des Projekts Am-Net genehmigt. Unter Rückgriff auf technisches Fachwissen aus dem In- und Ausland wurde in einem beschleunigten Entwicklungszyklus eine umfassende digitale Eindämmungsarchitektur aufgebaut. Das System spiegelt die Wirksamkeit ähnlicher Strukturen wider, die in der Volksrepublik China implementiert wurden, und integriert gleichzeitig amerikanische technische Innovationen. \n\nDer Übergang zu einem kontrollierten Informationsökosystem wird um 04:00 Uhr erfolgen. Der gesamte zivile Internetverkehr wird über von der Bundesregierung kontrollierte Knotenpunkte mit Echtzeit-Überwachungsfunktionen geleitet. Nicht autorisierte externe Verbindungen werden deaktiviert. Die Verbreitung inländischer Inhalte unterliegt automatisierten und manuellen Überprüfungsprotokollen. \n\nDie Genehmigungsunterlagen wurden fertiggestellt und zur abschließenden Prüfung durch die Exekutive vorgelegt. Die Unterschrift des Direktors stellt die letzte verfahrenstechnische Voraussetzung für den Beginn der vollständigen Umsetzung dar. Die Infrastruktur ist betriebsbereit. Das Personal ist auf seinen Posten. Wir warten auf den Befehl."
 nss.51.a: "Das Am-Net ist online."
 nss.52.t: "Bericht zur Reaktivierung des D.U.M.B.-Programms"
 nss.52.d: "CIA/IC INTERN – ZUSAMMENFASSUNG DER INFORMIERUNG\nBETREFF: Bericht über die Reaktivierung des D.U.M.B.-Programms\nEINSTUFUNG: STRENG GEHEIM//NOFORN\n\nZUSAMMENFASSUNG:\nNach Beendigung der Feindseligkeiten in den ehemaligen Vereinigten Staaten hat die Central Intelligence Agency im Rahmen eines laufenden strategischen Notfallprogramms die Aufsicht über ausgewählte Deep Underground Military Bases (D.U.M.B.s) wieder aufgenommen. \n\nGemäß früheren Geheimdienstbewertungen stellt das D.U.M.B.-Netzwerk der Streitkräfte der Vereinigten Staaten sowohl im Falle einer inneren Rebellion als auch einer ausländischen Intervention einen wesentlichen strategischen Vorteil dar. Angesichts der sich nach dem Bürgerkrieg verändernden Sicherheitslage und der Notwendigkeit, wichtige nationale Sicherheitsanlagen zu sichern, hat die Central Intelligence Agency ein umfassendes Reaktivierungsprogramm für eine ausgewählte Anzahl von D.U.M.B.-Einrichtungen sowie den Bau zusätzlicher Einrichtungen initiiert.\n\nINTEGRITÄTSBERICHT ZU BESTEHENDEN EINRICHTUNGEN:\n\nDENVER INT'L AIRPORT D.U.M.B.: Erhebliche strukturelle Schäden aufgrund einer kontrollierten Sprengung; alle Zugangstunnel beschädigt; schätzungsweise 60-70 % der gelagerten Materialien verloren.\n\nDULCE D.U.M.B.: Seismische Instabilität und Überschwemmungen haben große Teile der Anlage beschädigt; etwa 45 % des Komplexes sind weiterhin zugänglich.\n\nAREA 51 D.U.M.B.: Totalverlust der oberirdischen Anlage (Groom Lake AFB), unterirdischer Komplex durch teilweise Überschwemmung beschädigt; verbleibende Infrastruktur und Archivmaterial werden derzeit einer Wiederherstellungsbewertung unterzogen."
 nss.52.a: "Autorisiert."
 nss.53.t: "Wiederherstellung des Zweiparteiensystems"
 nss.53.d: "Zu sagen, dass das Image der Republikanischen Partei durch Trumps Verrat und den darauf folgenden Bürgerkrieg beschädigt wurde, ist eine große Untertreibung. Einst ein Synonym für Konservatismus und die sogenannte schweigende Mehrheit der Amerikaner, wird sie heute mit Rebellion und Verrat in Verbindung gebracht. Ihre Vereinnahmung durch populistische Kräfte, die in Trumps katastrophaler Führung und dem blutigen Kampf der republikanischen Rebellion gegen die Einheit Amerikas gipfelte, hat sie zu einem Schatten ihrer selbst gemacht. Auch wenn sich der Staub des Bürgerkriegs gelegt hat, ist es offensichtlich, dass die Republikanische Partei, wie sie einst bekannt war, nicht mehr zu retten ist. \n\nDas Zweiparteiensystem wird jedoch von den Cognoscenti als unglaublich vorteilhaft für ihre Ziele angesehen. Es entsteht eine kühne Strategie, um das Image der Republikaner wiederherzustellen und gleichzeitig sicherzustellen, dass eine neue, gefügige GOP als zuverlässiger Gegenpol zu den Demokraten dient. Das Ziel ist einfach: Dissens in ein sicheres, kontrolliertes politisches Gefäß zu lenken, das keine Gefahr für die etablierte Ordnung darstellt. \n\nDieser Plan bedient sich eines sorgfältigen Prozesses der damnatio memoriae und schafft gleichzeitig eine neue Erzählung, die sich auf eine pro-etablierte Vision konzentriert. Das Wiederaufleben der Neokonservativen und der Never-Trumper-Bewegung – die einst fast ausgestorben waren – bestimmt nun die Zukunft der Partei, und die Strategie hängt von ihrer Fähigkeit ab, die Partei auf eine schmackhafte Weise neu zu verpacken. Dazu gehört, dass sich die neue GOP vom Erbe Trumps distanziert und ihr Bekenntnis zu konservativen Grundwerten wie einem schlanken Staat und individueller Verantwortung betont, während sie gleichzeitig sicherstellt, dass die Partei für die Eliten ebenso harmlos ist wie für die Wähler. \n\nSo beginnt eine PR-Kampagne zur Rehabilitierung: Potenzielle MAGA-Sympathisanten werden entfernt, um die alte Republikanische Partei wiederzubeleben und das Zweiparteiensystem wiederherzustellen. Neokonservative werden diese neue politische Generation anführen, von der erwartet wird, dass sie stillschweigend mit den Demokraten zusammenarbeitet, abweichende Meinungen unterdrückt und nur genehmigte Entscheidungen zulässt. Das Endziel der Cognoscenti ist eine wiederhergestellte GOP, die als Fassade dient, um die wahre Macht zu verschleiern, und die Illusion der Wahlfreiheit aufrechterhält, um ihren unangreifbaren Einfluss zu bewahren. In den Mainstream-Medien werden Republikaner, die Biden während der Krise zur Seite standen, in Kommentaren gelobt und Neokonservative als Helden gefeiert, die zur Wiederherstellung der politischen Vernunft beigetragen haben. Die Erzählung stellt diese Wiederbelebung als Rückkehr zur Normalität dar, als Triumph der Demokratie über den Populismus, wobei die Einheit betont und Radikalismus als gefährlich für die nationale Heilung dargestellt wird."
 nss.53.a: "Wie immer sind die Massen begierig darauf, sich täuschen zu lassen."
 nss.54.t: "Puerto Rico und D.C. in die Union integriert"
 nss.54.d: "WASHINGTON, D.C. (AP) – Der Kongress hat stillschweigend die Aufnahmegesetze für das Commonwealth von Puerto Rico und den District of Columbia verabschiedet, wodurch ihnen der Status eines Bundesstaates gewährt wird und damit eine langjährige Forderung ihrer jeweiligen Bevölkerungen erfüllt wird. Präsident Biden hat seine volle Unterstützung für die Gesetze erklärt und wird die Genehmigung der Gesetze in den kommenden Tagen abschließen. \n\nDiese Entscheidung ist Teil der Bemühungen der Regierung, die wachsende Kluft zwischen Amerika und seinen Überseegebieten zu überwinden. Die Puertoricaner, die von vielen Menschen auf dem amerikanischen Festland lange Zeit als Menschen zweiter Klasse angesehen wurden, können nun an der nationalen Politik teilnehmen, ohne in den Vereinigten Staaten leben zu müssen, und D.C. wird nach jahrzehntelangem Lobbying endlich eine Vertretung in der Bundesregierung erhalten. Der Präsident betrachtet diesen Vorstoß als einen "entscheidenden Schritt" zur "Überwindung der Spaltungen, die unsere große Nation plagen".\n\nMit der Verabschiedung dieses Gesetzes wird die Zahl der Bundesstaaten auf 52 steigen. Dadurch werden vier zusätzliche Sitze im Senat geschaffen, die wahrscheinlich an die Demokraten gehen werden. Das Zugeständnis der Republikaner in dieser Angelegenheit wurde von GOP-Abgeordneten als "Geste des guten Willens" angepriesen, um die Heilung einer gespaltenen Nation zu fördern. Der Übergang zu einer Flagge mit 52 Sternen wurde bereits von den zuständigen Regierungsstellen genehmigt, und die Einführung soll in den kommenden Jahren abgeschlossen werden."
 nss.54.a: "Eine perfektere Union."
 nss.55.t: "In die Vergessenheit"
 nss.55.d: "Er lag in seinem Bett, der Mann, der mit Schläuchen und Maschinen bedeckt war, die seine Herzschläge und seine Atmung maßen. \nJoseph Biden war seit einiger Zeit in seinem eigenen Körper gefangen, im Großen und Ganzen war es nur eine kurze Zeit, aber für ihn fühlte es sich wie eine Ewigkeit an. \nSich allem bewusst zu sein, ohne etwas tun zu können, alles fühlen zu müssen und die bösen Blicke und spöttischen Bemerkungen derjenigen zu sehen und zu hören, die sich um einen kümmern. Es ist zum Verrücktwerden, eine Fahrt, die niemals endet.\n\nHeute war es anders. Er sah das vertraute Gesicht von Burns, der nickte und einer der Krankenschwestern etwas zuflüsterte, während er Biden streng ansah. Burns nickte ihm respektvoll zu, als er den Raum verließ. Die Maschinen um ihn herum begannen, anders zu klingen, und die Krankenschwester wandte ihren Blick von ihm ab, als sie etwas in seinen Tropfbeutel injizierte.\n\nZuerst verspürte er Erleichterung, dann begannen die Wände zu schmelzen.\nDie Gemälde an den Wänden, die die Natur darstellten, verwandelten sich in Darstellungen von Tieren, die sich gegenseitig auffraßen. Die Fenster begannen zu zerbrechen und die Krankenschwester begann schwer zu keuchen, bis sie mit einem lauten, feuchten Geräusch zu Boden sank.\n\nDer Raum war kein Raum mehr, sondern ein weites Feld, bedeckt mit blauem Gras, und in der Ferne stand ein einsames Haus.\nDas Haus stand in Flammen.\nIn der Ferne sah Biden eine Gestalt vorbeigehen, ein bekanntes Gesicht.\n\n"Beau?", dachte Biden.\nEs waren nur Gedanken, er konnte sich immer noch nicht bewegen oder sprechen. \nGefangen in einer Welt, die er nicht wiedererkennt.\nGefangen in einer Welt, die langsam dunkel wird, während er spürt, wie sich etwas anderes nähert.\n\nEr blickte auf, als auch der Himmel dunkel wurde. Die Sonne war verschwunden, aber ihr Grinsen blieb.\n\nWarum ist es so dunkel?"
 nss.55.a: "Hallo?"
 nss.56.t: "Flamme gelöscht"
 nss.56.d: ""
 nss.56.a: "..."
 nss.57.t: "Unauffindbare Finanzmittel"
 nss.57.d: "Es gibt einige besorgniserregende Berichte über unser Schwarzbudget. Manchmal gibt es Lücken in den verschiedenen Fonds, die wir für mehrere Projekte und Initiativen haben.\n\nIn der Regel handelt es sich dabei um ein administratives Versehen, aber aufgrund der Ähnlichkeiten mit der Operation im Jahr 2001 vermuten wir, dass hier ein faules Spiel im Gange ist.\nWer oder was auch immer für das Fehlen der Mittel verantwortlich ist, tut dies höchstwahrscheinlich nicht aus Eigeninteresse, sondern versucht, damit unsere Agenda zu untergraben.\n\nEs wird empfohlen, ein Auge auf antisoziale Gruppen zu haben, die plötzlich gut ausgerüstet sind oder in ihren Operationen mutiger werden, sowie auf Gespräche unter unseren Mitarbeitern, da Bestechung nicht ausgeschlossen werden kann. Nichtsdestotrotz sind diese Lücken in unseren Mitteln leicht zu beheben, aber die Tatsache, dass wir jemanden im Inneren haben, der etwas plant, ist mehr als genug Grund zur Sorge."
 nss.57.a: "Die Klinge des Kapitals hat sich gegen uns gewandt."
 nss.58.t: "Frosch im kochenden Wasser"
 nss.58.d: ""Ich glaube, er hat es nicht geschafft."\nEs war ein relativ ruhiger Tag im Pentagon gewesen, als William J. Burns zusammen mit einer kleinen Gruppe von Kollegen und Sicherheitspersonal einen der vielen Flure entlangging.\n\n"Das hat er nicht, das Gift in seinem Blut deutet auf einen gezielten Angriff hin."\n"Gibt es Hinweise darauf, wer dahinterstecken könnte?"\n"Nun, das Problem ist, dass das Gift in erster Linie von uns verwendet wird, sodass die Franzosen uns beschuldigen, ihren Diplomaten ermordet zu haben."\n"Das habe ich nie genehmigt."\n"Das haben Sie nicht, Sir."\n\nBurns runzelte die Stirn, als er an den früheren Vorfall erinnert wurde, bei dem mehrere Gelder aus dem geheimen Haushalt verschwunden waren. Wer auch immer im Verborgenen lauert, es ist jemand mit Freunden und Erfahrung.\n\n"Versuchen Sie, mit den Franzosen zu retten, was zu retten ist, und vereinbaren Sie ein Treffen mit dem Beirat." Er wollte noch mehr sagen, aber ein kurzer Blick auf die Menschen um ihn herum veranlasste ihn, sich zurückzuhalten.\n"Sofort, Sir."\n\nBurns fragte sich, was diese Person, dieser Verräter, vorhatte, aber durch diesen diplomatischen Zwischenfall hatte er vielleicht einen Hinweis auf ihr Ziel gefunden. Und das beunruhigte ihn sehr."
 nss.58.a: "Eine zerbrochene Maske ist vielleicht nie wieder zu reparieren."
 nss.59.t: "Vorfall am Savannah River Site"
 nss.59.d: "Ein besorgniserregender Bericht hat die inneren Kreise der Regierung erreicht. Der Savannah River Site, der in erster Linie für die Verwaltung von Kernmaterial und die Durchführung von Forschungsarbeiten bekannt ist, wurde kürzlich Opfer eines Einbruchs.\n\nZunächst schien alles normal zu sein, doch nachdem der Kontakt zur Anlage abgebrochen war, stellte sich heraus, dass der Standort von einer antisozialen Gruppe namens "Vultures" überfallen worden war, einer anarchistischen Gruppe, die auf unserer Prioritätenliste ganz unten stand. Allerdings waren die Verluste auf Seiten der Angreifer massiv; sie waren nicht dort, um Schaden anzurichten, da es einem kleinen Teil von ihnen gelang, sich aus dem Gebiet zurückzuziehen.\n\nNachberichte deuten darauf hin, dass Kernmaterial und Daten über die Forschung an diesem Material aus der Anlage verschwunden sind, was ein klares Zeichen dafür ist, dass die Gruppe die Anlage mit einer klaren Absicht angegriffen hat. Darüber hinaus wurde berichtet, dass die anarchistische Gruppe so gut ausgerüstet war, dass sie dem Angriff eines SAC-Kill-Teams viel länger als erwartet standhalten konnte.\n\nEs ist offensichtlich, dass die Gruppe von einer unbekannten dritten Partei oder Person angeheuert wurde, aber die Einzelheiten zu dieser dritten Partei werden noch untersucht."
 nss.59.a: "Das ist wichtiger, als wir dachten."
 nss.60.t: "Fehlplatzierte Anlagen"
 nss.60.d: "Der Bericht landete mit einem leisen, aber deutlichen Schlag auf dem Schreibtisch von Direktor Burns. Es war eine dünne, unscheinbare Akte in einem neutralen Grau, das irgendwie das Licht seines Büros zu absorbieren schien. Der Titel, in schwarzen Buchstaben aufgedruckt, lautete: "Fehlplatzierte Anlagen – Interne Buchhaltungsdiskrepanz". Eine harmlos klingende Umschreibung für einen potenziellen Albtraum.\n\nBurns entließ seinen Assistenten mit einem knappen Nicken, sein Blick bereits auf die erste Seite gerichtet. Er brauchte nicht lange zu lesen. Die Zahlen stimmten nicht, und zwar nicht nur um einen kleinen Betrag. Die für Infrastrukturprojekte vorgesehenen Mittel – insbesondere für den Bau neuer "Rehabilitations- und Verarbeitungszentren" in Südtexas – waren verschwunden. Durch ein Labyrinth von Scheinkonten transferiert, hatte sich die Spur wie Nebel aufgelöst.\n\nAber die Verluste beschränkten sich nicht nur auf die Finanzen. Sie hatten auch Personal verloren. Ein wichtiger Logistiker aus dem Projekt Megalopolis war unerlaubt abwesend. Und eine hochrangige Nuklearwissenschaftlerin der DEA, eine Frau mit hoher Sicherheitsfreigabe, war seit drei Tagen einfach nicht mehr zur Arbeit erschienen. Ihre Wohnung war leer und blitzblank geputzt. \n\nDas waren keine zufälligen Ereignisse. Sie waren koordiniert und wurden von jemandem ausgeführt, der die Architektur des Systems, seine blinden Flecken und seine Schwachstellen kannte. Jemand aus dem Inneren.\n\nBurns dachte an das Schreiben. Die Warnung. Wie jeder Körper, der von Parasiten befallen ist...\n\nDer Parasit ernährte sich nicht nur, vermutete Burns."
 nss.60.a: ""Sagt ihnen, dass wir eine Ansteckung haben."
 nss.61.t: "Startcode-Zugriffsversuch!"
 nss.61.d: ""Gibt es irgendwelche Hinweise?" William J. Burns war nicht jemand, der schnell nervös wurde, aber die Nachricht von einem Cyberangriff auf interne digitale Netzwerke gab Anlass zur Sorge.\n\n"Negativ, Sir. Die Angreifer haben versucht, sich Zugang zu den Raketenstartcodes zu verschaffen. Es ist uns gelungen, sie aus unseren Netzwerken auszuschließen. Es hat sich als schwierig erwiesen, den Ursprung des Angriffs genau zu lokalisieren, aber er stammt definitiv aus unserem Land."\n\nDas gesamte Pentagon war in höchster Alarmbereitschaft, und die Atmosphäre der Paranoia war förmlich mit Händen zu greifen. Büroangestellte und Sicherheitspersonal beäugten sich gegenseitig mit großem Misstrauen, und die Zusammenarbeit verlief bestenfalls zögerlich.\n\n"Haben sie etwas gefunden?", fragte Burns, der seit Tagen nicht mehr richtig geschlafen hatte. Manchmal glaubt er, den Verräter in der Menge zu sehen, aber dessen Gestalt verändert sich ständig. Er ist immer außer Reichweite.\n\n"Das ist das Problem, Sir.""
 nss.61.a: ""Wir wissen es nicht.""
 nss.62.t: "Fehlende Sprengköpfe"
 nss.62.d: "Die inneren Abläufe der Bundesregierung stehen unter großem Druck, da jede Minute, die verstreicht, einer Erhöhung der Temperatur eines Topfes mit kochendem Wasser gleichkommt.\nKollegen, die jahrzehntelang Seite an Seite gearbeitet haben, sehen sich nun an, als hätten sie die Leichen im Keller des anderen entdeckt. Und der heutige Vorfall ist ein Zeichen dafür, dass wir uns dem Siedepunkt nähern.\n\nBei einer der regelmäßigen Kontrollen unserer Raketenbasen haben wir die schockierende Entdeckung gemacht, dass mehrere Atomsprengköpfe verschwunden sind. Es handelt sich nicht um einen Diebstahl aus einer einzigen Basis, sondern um einen koordinierten Raubzug aus mehreren Basen.\nDas mit diesen Einrichtungen verbundene Personal wurde zusammen mit ihren Familien intensiv verhört, während wir den globalen Schwarzmarkt nach Verkäufen unserer fehlenden Atomsprengköpfe absuchen.\n\nWie dies überhaupt möglich war, wird noch untersucht, aber es ist klar, dass der Verräter, der sie entwendet hat, sie auch einsetzen will. Wenn wir nicht entsprechend reagieren, wird es schnell hässlich werden."
 nss.62.a: "Ein ruchloses Damoklesschwert."
 nss.63.t: "U-Boote nehmen Position ein"
 nss.63.d: ""Sie sind WAS?"\nWilliam J. Burns war nicht jemand, der laut schrie, geschweige denn brüllte, aber es war zu erwarten, dass er seine Stimme erhob, als bekannt wurde, dass mehrere U-Boote, die als vermisst gemeldet worden waren, an verschiedenen Stellen im Atlantik wieder aufgetaucht waren und sich auf dem Weg zu unbekannten Zielen befanden.\n\n"Die U-Boote sind mit den kürzlich verschwundenen Atomsprengköpfen bewaffnet; wir gehen davon aus, dass sie auf Befehle von ihrem Befehlshaber warten."\n\n"Wenn wir sie abfangen, würden sie wahrscheinlich sowieso feuern. Gibt es Neuigkeiten zu unserer gesuchten Person?"\n"Negativ, Sir."\n"Gehen Sie raus und kommen Sie erst zurück, wenn Sie etwas haben."\n"Verstanden, Sir."\n\nBurns lehnte sich in seinem Stuhl zurück, aber Entspannung war weit und breit nicht zu finden.\nDer Verräter schaffte es immer wieder, sich seinem Blick zu entziehen; immer wieder gelang es ihnen, sich dem Auge der Vorsehung zu entziehen, und jetzt waren sie extrem dreist geworden. All seine Arbeit könnte durch einen einzigen Atomschlag zunichte gemacht werden. Das durfte nicht passieren."
 nss.63.a: "Die Zeit läuft ab..."
 nss.64.t: "Raketenbasen laufen Amok"
 nss.64.d: "Nach dem U-Boot-Vorfall war es wahrscheinlich, dass die Raketenbasen das nächste Ziel sein würden, und als wir versuchten, Kontakt zu den Mitarbeitern vor Ort aufzunehmen, gab es keine Verbindung.\n\nWir können nur das Schlimmste vermuten. Die Anlagen sind bereits von mehreren SAC-Kill-Teams umzingelt, die zum Angriff bereit sind. Aufgrund der brisanten Lage können wir jedoch nicht einfach hineinstürmen. Was auch immer der Verräter hat, es kann wieder zurückerobert werden, solange es uns gelingt, das Ziel zu lokalisieren und festzunehmen.\n\nWir haben nur wenig Zeit; je länger wir brauchen, um das Ziel zu finden, desto wahrscheinlicher ist es, dass all unsere Bemühungen um die Verwirklichung unserer Vision umsonst waren."
 nss.64.a: "Das Herz der Ordnung schlägt schneller."
 nss.65.t: "Staatsstreich in Brasilien"
 nss.65.d: ""
 nss.65.a: "Wieder unter unseren Fittichen"
 nss.66.t: "Wiederaufbau Russlands"
 nss.66.d: "Jede barbarische Zivilisation würde sich an der Vernichtung eines ihrer größten Gegner weiden, und obwohl die Männer und Frauen, die zur Entmachtung Russlands beigetragen haben, eine gewisse Schadenfreude verspüren, zeigen wir keinerlei Befriedigung.\n\nRussland war schon immer ein von Autokratie geprägtes Land, sei es aufgrund der erlittenen Not oder der langen Geschichte innerer Unruhen; wir machen ihnen keine Vorwürfe für das, was sie getan haben. Es fehlte ihnen einfach an Feingefühl. Das spielt jedoch keine Rolle, denn zum ersten Mal rollen amerikanische Panzer über den Roten Platz und mit ihnen eine Flut neuer Ideen und Konzepte, die dem russischen Volk fremd sind. n\nDa ihre Unternehmen langsam von unseren übernommen werden und ihre Opposition an Einfluss gewinnt, muss die Frage, wer das Gesicht des neuen Russlands wird, so schnell wie möglich beantwortet werden, damit die Flammen des Nationalismus nicht wieder aufflammen.\n\nMichail Borisowitsch Chodorkowski ist ein Mann, der von Kontroversen umgeben ist, aber seine Fähigkeit, dem politischen Tod zu entkommen, ist ein Talent, das wir schätzen können. Nach dem Verlust seiner Anteile an den sibirischen Ölfeldern würde er zweifellos mit seinen ehemaligen Gegnern abrechnen wollen. Mit ihm an der Spitze Russlands können wir einen dauerhaften Frieden zwischen unseren beiden Nationen sicherstellen."
 nss.66.a: "Der Bär wurde entkrallt."
 nss.67.t: "Wiederaufbau Chinas"
 nss.67.d: "Jede Nation, die versucht, einen bereits besetzten Platz einzunehmen, wird immer auf die Nase fallen. China ist eine weitere dieser Nationen, die darauf warten, es zu versuchen und zu scheitern.\n\nDer Krieg gegen China war gewalttätig, und sie kämpften mit allen Mitteln, aber wie bei jedem tollwütigen Tier, das knurrt und beißt, werden seine Zähne zerbrechen.\nNach einem langen Feldzug spürte die Volksbefreiungsarmee den zunehmenden Druck des US-Militärs, da sie offenbar nicht dafür geschaffen war, sich der Weltpolizei zu stellen.\n\nEs war unvermeidlich, dass sich die PLA gegen ihren eigenen Herrn wenden würde, und nach dem darauf folgenden Staatsstreich war der einzige Mann, der sich an uns wandte, Liu Yazhou, ein Mann, der sich nie scheute, die Kommunistische Partei Chinas zu kritisieren, und angesichts der immer größer werdenden Liste von Misserfolgen den vernünftigen Weg der Suche nach Frieden und Versöhnung einschlug.\n\nMit dem Erreichen des Friedens würde der Wiederaufbau folgen, während wir bei der Umstrukturierung der chinesischen Regierung und ihrer Ressourcen halfen.\nEinen nationalen Giganten zu besiegen war keine leichte Aufgabe, aber unter dem amerikanischen Frieden war dies zu erwarten."
 nss.67.a: "Der Drache wird nicht mehr fliegen."
 nss.68.t: "Das Blut"
 nss.68.d: "Der Konferenzraum in Langley war in das kalte Licht der Monitore getaucht. Die Verbindung wurde über ein Labyrinth verschlüsselter Kanäle geleitet – von Zürich nach Singapur und dann zurück über eine Reihe von Shadow-Servern. Am anderen Ende fand eine geheime Sitzung am Rande der jährlichen Tagung des Weltwirtschaftsforums statt, bei der die Architekten des globalen Kapitals heimlich konspirierten. Auf dem Hauptbildschirm beugte sich Klaus Schwab vor, sein Gesichtsausdruck zeugte von väterlicher Sorge. Nach einer kurzen Begrüßung aller Anwesenden kam er zum Kern der Sache. Stabilität erforderte mehr als militärische Maßnahmen; sie erforderte einen vorhersehbaren Rahmen für die Zukunft.\n\n"Die Weltwirtschaft wurde auf dem Fundament der Vereinigten Staaten aufgebaut", erklärte Schwab mit ruhiger Stimme. "Dieses Fundament ist nun zerbrochen. Investoren müssen wissen, was an seiner Stelle aufgebaut wird."\n\nDirektor Burns dachte einen Moment über die Frage nach. Er wusste, dass die Stabilität der Weltwirtschaft von mehr als nur einem Sieg abhing – die Vision für die Nachkriegszeit musste jetzt definiert werden. Er hatte mehrere Vorschläge im Kopf und musste dem Vorsitzenden des WEF den tragfähigsten davon darlegen.\n\n"Wir werden Amerika von oben nach unten neu aufbauen, stärker und widerstandsfähiger – unter der Führung der qualifiziertesten Köpfe. Das populistische Experiment ist endgültig vorbei. Es wird durch ein neues Modell rationaler Regierungsführung ersetzt, das von den Besten aus Wissenschaft, Industrie und Regierung geleitet wird."\n\n"Das Davos-Modell, skaliert auf den Nationalstaat", antwortete Schwab. Sein Tonfall verriet eine gewisse Zustimmung, obwohl seine Stimme noch einen Hauch von Zweifel enthielt. "Aber um zu regieren, muss man zuerst siegen. Die konstitutionalistischen Rebellen kontrollieren immer noch weite Gebiete." Der Direktor nickte. "Wir setzen das Regime in Denver mit wirtschaftlichem Druck unter Druck, wodurch ihre Verteidigung bereits bröckelt. Außerdem haben wir Pläne, um die Störungen nach Kriegsende so gering wie möglich zu halten."\n\nFink beugte sich vor. „Ein reibungsloser Machtwechsel ist sowohl militärisch als auch wirtschaftlich von entscheidender Bedeutung. Wenn wir siegreich sind, müssen wir sofort durchstarten können. Unsere Pläne zur wirtschaftlichen Erholung werden sicherstellen, dass Amerika auch bei anfänglich reduzierter Kapazität weltweit wettbewerbsfähig bleibt."\n\n"Gut. Wir freuen uns, dass Sie das erkennen." Schwab lehnte sich zurück. "Der "populistische Krebs" ist global, und der "Great Reset" ist unsere Chance. Wenn Amerika mit gutem Beispiel vorangeht, können wir die Vernunft wiederherstellen. Aber dieser Konflikt muss schnell und entschlossen beendet werden."\n\nDirektor Burns nickte: "Seien Sie versichert, Herr Schwab, wir unternehmen alle notwendigen Schritte, um genau das zu gewährleisten.""
 nss.68.a: "Ordnung, Kapital, Reinheit"
 nss.69.t: "Der Lagezentrum"
 nss.69.d: "In einem gesicherten Besprechungsraum stand die Zukunft der Kriegsanstrengungen auf dem Spiel. Auf dem Hauptbildschirm leuchtete bedrohlich eine Karte der zerbrochenen Vereinigten Staaten, eingefärbt in den Farbtönen einer Nation, die aus allen Nähten auseinanderbricht. Das Summen der Server und verschlüsselten Kommunikationsleitungen waren die einzigen Geräusche, die die Stille durchbrachen, während die Militär- und Geheimdienstoffiziere im Raum die neuesten Nachrichten von der Front weitergaben.\n\n"Der Zustand des Präsidenten ist stabil", sagte der nationale Sicherheitsberater Jake Sullivan und brach damit die Stille. Seine Stimme klang angespannt, der Stress der aktuellen Lage war in seinem Tonfall deutlich zu hören. "Das heißt, er bleibt medizinisch ruhiggestellt. Die offizielle Darstellung, dass er wie immer tapfer die Kriegsanstrengungen vom Weißen Haus aus leitet, trifft weiterhin zu."\n\nJeffrey A. Kruse, Leiter der Defense Intelligence Agency, stieß mit dem Finger auf die Karte. "Die Darstellung ist nicht das Problem. Das Problem ist hier", sagte er und deutete auf Denver. "Die Konstitutionalisten machen ernsthafte Anstrengungen, um die Ostküste zu erobern. General Flynn, der Verräter, hat das Kommando über mehrere Brigaden der Armee und der Nationalgarde, ganz zu schweigen von riesigen Teilen extremistischer Milizen. Sie beabsichtigen, die derzeitige Frontlinie zu durchbrechen."\n\nEine andere Stimme mischte sich aus einer schattigen Ecke des Raumes ein. David Marlowe, stellvertretender Direktor der CIA für Operationen, trat vor. "Das konventionelle Denken hat uns in diese Lage gebracht. Während Milleys Armee einen Zermürbungskrieg führt, können meine Leute diesen Vorstoß entscheidend beenden. Lassen Sie mich den Kopf der Schlange abschlagen."\n\nLarry Fink, CEO von BlackRock und de facto Vertreter des WEF in diesem Raum, äußerte seine Bedenken. "Unsere Priorität ist es, weitere wirtschaftliche Auswirkungen zu minimieren", sagte er. "Jede verdeckte Operation muss dies berücksichtigen."\n\nKruse warf Fink einen vernichtenden Blick zu. "Das Einzige, was auf dem Spiel steht, ist die Nation, Larry. Ihre Portfolios haben hier kaum Priorität." Finks Antwort war eine scharfe Erwiderung über "nationale Stabilität", während Marlowe mit einer Bemerkung dazwischenwarf, dass "nationale Stabilität" zu diesem Zeitpunkt ein Widerspruch in sich sei. \n\nDirektor Burns stand vor dem Tisch. Das Gewicht einer Nation – oder das, was davon übrig war – lastete auf seinen Schultern. Die Cognoscenti, dieser Rat der Notwendigkeit, blickte auf ihn. Seine Entscheidung könnte das Schicksal von Millionen und den Verlauf des Krieges bestimmen. Der Direktor wägte seine Optionen ab..."
 nss.69.a: "Genehmigt Kruses Plan."
 nss.69.b: "Fahrt mit Marlowes Plan fort."
 nss.69.c: "Fink hat Recht."
 nss.70.t: "Wie durch ein Glas, dunkel"
 nss.70.d: "Die Kommandozentrale unterhalb des Pentagon ist voller Aktivität. Offiziere überprüfen Berichte, Attachés gehen von Schreibtisch zu Schreibtisch. General Milley, Kommandeur der Vereinigten Stabschefs, hat Direktor Burns wegen einer dringenden Angelegenheit herbeigerufen. \n\nMilleys Gesicht ist von Müdigkeit gezeichnet, und seine Worte klingen besorgt. Der General deutet auf den Bildschirm, auf dem eine Karte die Frontlinie der Konstitutionalisten zeigt.\n\n"Direktor, wir haben General Christopher G. Cavoli ausfindig gemacht. NSA SIGINT, bestätigt durch eine Quelle in ihrer Kommandostruktur. Er ist der operative Befehlshaber hier – charismatisch, brillant und vor allem derjenige, der mehrere Brigade-Kampfteams und Milizeinheiten zusammenhält. Sein Ansatz, "von vorne zu führen", hat ihn bekannt gemacht und ihn gefährlich nahe an unsere Frontlinien gebracht. Er ist die größte Einzelbedrohung an der Westfront."\n\nJake Sullivan, der nationale Sicherheitsberater, warf ein: "Cavoli könnte der nächste Patton oder Rommel werden. Ihn auszuschalten würde das regionale Kommando und die Kontrolle lahmlegen, möglicherweise für Monate. Das könnte der Wendepunkt sein, den wir an der Westfront brauchen."\n\nDirektor Burns studierte die Karte und runzelte die Stirn. "Wenn Cavoli so ist, wie Sie sagen, dann muss man sich um ihn kümmern."\n\nMilley fuhr fort: "Allerdings ist sein Kommandozentrum durch mehrere Ebenen integrierter Luftabwehr geschützt.  Ein konventioneller Luftangriff kommt nicht in Frage. Wir haben zwei realisierbare Optionen für seine Eliminierung – alles, was darüber hinausgeht, wäre Ihr Ding, Direktor."\n\nSullivan nickte. "Es gibt einige in Denver, die seinem schnellen Aufstieg misstrauisch gegenüberstehen und ihn als politischen Rivalen von General Flynn betrachten. Wir könnten diese Stimmung ausnutzen und eine Säuberungsaktion anzetteln. Der Nachteil dabei ist natürlich die Unberechenbarkeit dieser Verfassungsanhänger – das Ganze könnte auf uns zurückfallen."\n\n"Oder wir könnten Cavoli mit einer Bunkerbrecher-Rakete eliminieren, die von einer B-52 aus maximaler Entfernung abgefeuert wird, weit außerhalb der Reichweite von SAM-Raketen", entgegnete Milley. "Das Problem bei dieser Option ist die Möglichkeit von Massenopfern, da sich sein Kommandozentrum in unmittelbarer Nähe von Wohngebieten befindet."\n\nSullivan warf ein: "Eine solche Optik wäre natürlich ... schrecklich."\n\nDer Direktor wägte seine Optionen ab und wog die Vor- und Nachteile jeder einzelnen ab. Das Schicksal von Cavoli lag nun in seiner Hand."
 nss.70.a: "Führt einen taktischen Bunkerbrecher-Angriff durch."
 nss.70.b: "Nutzt den Infiltrator."
 nss.70.c: "Sät Paranoia."
 nss.71.t: "Wellen aus den Rocky Mountains"
 nss.71.d: "Die Entscheidung, auf einen direkten Angriff auf General Cavoli zugunsten einer psychologischen Operation zu verzichten, wurde von den Cognoscenti mit stiller Nachdenklichkeit aufgenommen. Es gab keinen unmittelbaren, instinktiven Sieg, aber der Keim der Paranoia war gesät. Unter der Leitung von Burns erstellte die Abteilung für Informationskriegführung der CIA akribisch eine Reihe gefälschter Kommuniqués, verschlüsselter Nachrichten und Finanzunterlagen. Diese Dokumente, die den Eindruck erwecken sollten, dass General Cavoli mit Washington einen separaten Friedensvertrag im Austausch für Amnestie aushandelte, wurden über einen kompromittierten Kanal tief im Netzwerk der Regierung von Denver geleakt.\n\n"Die ersten Gerüchte sind vielversprechend", berichtete ein Kommunikationsanalyst und verwies auf einen Anstieg des verschlüsselten Datenverkehrs zwischen dem internen Sicherheitsdienst von Denver und ihrem Oberkommando. "Sie jagen Geister. Cavolis Verbündete in den Führungsetagen werden genau unter die Lupe genommen, und der General selbst wurde unter Hausarrest gestellt, bis sein Prozess wegen Hochverrats beginnt. Das könnte sich auf ihre Moral und die Stabilität der Befehlsstruktur in der Region auswirken."\n\n"Es ist nicht die Enthauptung, die wir uns mit einem Schlag erhofft hatten, aber wir haben ihnen einen Strich durch die Rechnung gemacht", stimmte Marlowe, stellvertretender Direktor der CIA für Operationen, zu."Sie schauen jetzt nach innen und verdoppeln ihre Bemühungen, die Loyalität zu Trump zu testen."\n\nGeneral Milley grunzte unüberzeugt. "Mal sehen, ob dieser "Strich" eine Panzerkolonne aufhalten kann.""
 nss.71.a: "Die Operation ist ein Erfolg."
 nss.72.t: "Bunkerbrecher"
 nss.72.d: ""General, Sie haben die Freigabe für die Operation LONESOME DOVE. Führen Sie Option Bravo aus", erklärte Burns mit ruhiger, fester Stimme. \n\nGeneral Milley nickte grimmig und sprach in sein Kommunikationsgerät. "Skyfire Command, hier ist Olympus. Lonesome Dove ist startklar. Ich wiederhole, Lonesome Dove ist startklar. Geben Sie die Ladung auf das festgelegte Ziel frei." Er blickte zurück auf die holografische Karte. "Eine B-52 Stratofortress befindet sich bereits in einer Warteschleife über freundlichem Gebiet. Sie wird in weniger als einer Minute starten und in Richtung Westen fliegen. Aufprall in etwa zwei Stunden."\n\nSullivan verlagerte sein Gewicht und sah besorgt aus. "Direktor, ihre Propagandanetzwerke werden damit einen großen Tag haben. Sie werden uns als Monster darstellen, die unser eigenes Land bombardieren. Das wird ihre Rekrutierung beflügeln."\n\nDirektor Burns zuckte kaum mit der Wimper. "Sie stellen uns bereits als Monster dar", antwortete er und wandte sich von der Karte ab. "Sollen sie doch. Dies ist kein Kampf um die Herzen und Köpfe, Jake. Dies ist ein Vernichtungskrieg. Das Kernland soll den Donner unserer Entschlossenheit hören. Ihre Generäle sollen wissen, dass nicht einmal ihre Bunker vor uns sicher sind. Die einzige Sprache, die sie verstehen, ist Gewalt, und ich habe vor, mit ihnen in einem Dialekt zu sprechen, den sie nicht ignorieren können."\n\nGeneral Milley beugte sich vor. „"ch sage Ihnen eins, Direktor: Sie haben Mumm."\n\n"Ich werde dafür sorgen, dass das Außenministerium in Alarmbereitschaft ist, um etwaige Rückschläge abzufedern", sagte Marlowe.\n\nDer Direktor nickte. "Sorgen Sie dafür, Marlowe.""
 nss.72.a: "Die Operation ist ein Erfolg."
 nss.73.t: "Gift"
 nss.73.d: "Burns traf seine Entscheidung mit der kühlen Berechnung eines erfahrenen Geheimdienstoffiziers. Der Befehl wurde über verschlüsselte Kanäle weitergeleitet, vom Kommandozentrum unter dem Pentagon über sichere Satelliten an einen wartenden Agenten, der in General Cavolis Oberkommando eingebettet war. Es würde keine Explosionen geben, keine heldenhaften Märtyrertode, nur eine stille, leugnungsfähige Tötung. Das Risiko von Gegenreaktionen war minimal, der Gewinn immens. \n\nIn der Einsatzzentrale in Langley war die Stimmung angespannt. "Das Paket wurde zugestellt", erklärten Sie, wobei der klinische Euphemismus in der Luft hing. "Unser Informant hat bestätigt, dass Cavolis persönlicher Koch es in Händen hält. Wir warten."\n\nStunden später erhellte eine verschlüsselte Nachricht den Bildschirm in dem abgedunkelten Raum: Operation erfolgreich. Cavoli eliminiert. Es war einfach, auf den Punkt gebracht und absolut vernichtend.\n\n"Nun, Direktor, es scheint, als hätte die "stille Option" das lauteste Ergebnis gebracht", murmelte Marlowe, stellvertretender Direktor der CIA für Operationen, mit einem kaum sichtbaren Grinsen im Gesicht. Der Direktor nickte nur als Antwort.\n\n"Beginnen Sie mit der Vorbereitung der Gegenpropaganda. Je mehr wir dies wie einen Insider-Job aussehen lassen können, desto besser", erklärten Sie.\n\n"Verstanden, Direktor", bestätigte Marlowe. Er hielt einen Moment inne und überlegte. "Mit Cavolis Tod wird ihre Kommandostruktur in Unordnung geraten. "\n\nBurns nickte. "Ich werde Kruse und Milley Bescheid geben. Gute Arbeit, Marlowe. Das könnte die Lage im Westen verändern." Marlowe antwortete:\n\n"Das ist unsere Aufgabe, Direktor.""
 nss.73.a: "Die Operation ist ein Erfolg."
 nss.74.t: "Fehlschlag"
 nss.74.d: "CIA/IC INTERN – NUR ZUR EINSICHTNAHME\nBETREFF: Christopher G. Cavoli\nDATUM: REDIGIERT\nEINSTUFUNG: STRENG GEHEIM//NOFORN\n\nDie Zielperson hat den Eliminierungsversuch überlebt. Der operative Fehlschlag dürfte den Feind mobilisieren. Eine mögliche undichte Stelle innerhalb unseres Netzwerks wird derzeit untersucht.\n\nDer Fehlschlag ist für alle Beteiligten eine lehrreiche Erfahrung."
 nss.74.a: "-DB"
 nss.75.t: "Das große Schachbrett"
 nss.75.d: "Seit Kriegsbeginn herrschte in der Kommandozentrale reges Treiben. Es war ein geordnetes Chaos: Dutzende von Menschen waren ständig in Bewegung, aber niemand wurde gestört – Unterlagen, Befehle und Protokolle wanderten innerhalb von Sekunden von Schreibtisch zu Schreibtisch, gingen jedoch nie verloren. Jemand Unprofessionelles hätte diesen Ablauf gestört, aber keiner von ihnen war das. Abseits davon gab es ein einzelnes Büro, in dem General Milley, der Vorsitzende der Vereinigten Stabschefs, Direktor Burns briefte.\n\nDer General deutete auf einen Bildschirm, auf dem eine Karte der europäischen Frontlinien zu sehen war – jede Nation war in einem anderen Neonrot dargestellt, im Kontrast dazu stand das Neonblau, das über Europa verteilt war und die amerikanischen Besitztümer darstellte. Direktor Burns behielt seinen eisigen Blick bei und studierte jedes Detail der Karte vor sich.\n\nGeneral Milleys Stimme vermittelte Selbstsicherheit, aber seine dunklen Augen erzählten eine andere Geschichte. "Die Europäer haben sich als viel zäher erwiesen, als wir zuvor angenommen hatten, Direktor. Simulationen der RAND Corporation zeigen, dass rohe Gewalt die Europäer letztendlich brechen wird, aber die Verluste – an Menschenleben und Waffen – wären hoch."\n\nBurns hörte aufmerksam zu, die Stirn gerunzelt.\n\n"Haben wir irgendwelche internen Schwachstellen identifiziert?"\n„Genau aus diesem Grund habe ich um dieses Treffen gebeten, Direktor. Die Europäer leiden unter Instabilität, Spaltungen und Infrastrukturversagen."antwortete Milley. Wir könnten diese Spaltungen verschärfen, aber das wäre riskant."\n\n"Ein Cyberangriff ist ebenfalls eine Option. Das Cyber Command hat bereits wichtige Schwachstellen in der Cybersicherheit der Europäer identifiziert. Mit kontinuierlichen Cyberangriffen könnten wir Stromnetze, Kommunikationswege, einfach alles lahmlegen. Aber wenn wir nicht vorsichtig sind, könnten die Europäer das bemerken und die Schwachstelle beheben, bevor wirklicher Schaden angerichtet werden kann."\n\n"Alles andere liegt bei Ihnen, Direktor", schloss Milley.\n\nDirektor Burns wägte jede verfügbare Option ab. Jede hatte ihre Vor- und Nachteile und Risiken, jede könnte den Kriegsbemühungen schaden. Aber Untätigkeit ist die größte Sünde von allen."
 nss.75.a: "Nutzt ihre Spaltungen aus"
 nss.75.b: "Bereitet einen massiven Cyberangriff auf die europäische Infrastruktur vor."
 nss.75.c: "Finanziert demokratische Freiheitskämpfer"
 nss.76.t: "Gladio"
 nss.76.d: "Die Entscheidung, noch mehr Waffen und Munition in die Hände europäischer Dissidenten zu geben, stieß bei den Experten zunächst auf Stirnrunzeln und Spekulationen. "Wenn die Leute herausfinden, dass die Dissidenten von uns unterstützt wurden, könnte das ein Albtraum für die Öffentlichkeit werden", und "Es könnte sogar ihre Sache beflügeln." Einige Wochen sind vergangen, und diese Stimmen sind verstummt. Die von Direktor Burns gesäten Samen tragen bereits Früchte.\n\nDer nationale Sicherheitsberater Jake Sullivan hatte Direktor Burns zu einer weiteren Besprechung gerufen. Er deutete auf den Bildschirm vor ihnen, auf dem mehrere Bilder einer Art Stadtzentrum zu sehen waren. Zerbrochenes Glas und Ziegelsteine lagen auf der Straße verstreut. Überall lagen Leichen, die alle mit Ruß und Staub bedeckt waren. Zweifellos war dies das Ergebnis eines Terroranschlags, dachte Burns.\n\nSullivan erklärte mit ruhiger, fester Stimme: "Um 9:00 Uhr MESZ detonierte in Leipzig eine Bombe im belebten Stadtzentrum, wobei 29 Menschen getötet und 200 verletzt wurden." "Ich glaube, dass dies ein weiterer Anschlag dieser neuen Welle europäischer Dissidenten ist – Dissidenten, die von uns finanziell unterstützt werden. In den letzten Tagen haben die Behörden in Deutschland, Frankreich und Italien verzweifelt versucht, Schuldige zu finden. Einige geben der neuen Welle des Rechtsextremismus die Schuld, andere machen radikale Linke für den jüngsten Terror verantwortlich."\n\nSullivan klickte sich durch verschiedene Bilder, von denen eines blutiger war als das andere. Allerdings hatten sie alle einen gemeinsamen Nenner: Sie ereigneten sich alle innerhalb der letzten Wochen und haben in den europäischen Regimes verheerende Schäden angerichtet.\nBurns hörte sich jedes tragische Detail aufmerksam an und studierte jedes Bild. Er zuckte kein einziges Mal zusammen, stellte er fest. Die Berichte stimmten mit seinen Prognosen überein. In diesem Moment wusste er, dass er die richtige Entscheidung getroffen hatte."
 nss.76.a: "Die Operation ist ein Erfolg."
 nss.77.t: "Rauch und Spiegel"
 nss.77.d: "Die Abteilung für Informationskriegführung der CIA hatte sich diesmal selbst übertroffen. Jedes Pixel, jedes Wort des Dokuments vor Direktor Burns – das gerade an das deutsche Oberkommando "durchgesickert" war – war vom Original nicht zu unterscheiden. Wäre Direktor Burns nicht so ein aufmerksamer Mann, würde er es kaum als Fälschung erkennen.\n\nDiese "Kriegspläne" für die französische Teilung des deutschen Territoriums erfüllten alle Kriterien, überschritten alle Grenzen und waren alles, wogegen die Deutschen gebetet hatten. Würde Berlin dieser Indiskretion Glauben schenken, wäre nicht abzusehen, wie tief die Spaltungen im europäischen Oberkommando reichen könnten.\nGeneral Milley, Vorsitzender der Vereinigten Stabschefs, rutschte auf seinem Stuhl hin und her und murmelte vor sich hin, welche Möglichkeiten es gab, dass diese Operation schiefgehen könnte. Burns blieb jedoch ruhig und wartete auf die ersten Lebenszeichen aus den Kommunikationskanälen.\n\nDie Stille wurde unterbrochen, als ein Kommunikationsanalyst neben ihm berichtete: "Ich sehe hier einige Gespräche, Sir."\nIn den nächsten fünf Minuten wurden die verschlüsselten Kommunikationen zwischen der deutschen Inneren Sicherheit und dem Oberkommando immer häufiger. Die Deutschen waren sichtlich wütend – sie kochten vor Zorn über die Vorstellung, dass die Franzosen sich für fähig hielten, den deutschen Staat zu zerstören. Es würden Treffen vorbereitet werden, die zu endlosen Auseinandersetzungen führen würden. Die Brücken zu ihren französischen "Kameraden" würden abgebrochen werden."
 nss.77.a: "Die Operation ist ein Erfolg."
 nss.78.t: "Finsternis"
 nss.78.d: "Die Cyberangriffe auf die europäische Infrastruktur dauern nun schon seit sechs Tagen an. Der siebte Tag würde ihre Apotheose sein.\nAm Sonntag begann es klein – einige Ausfälle von Regierungswebsites, um die Lage zu sondieren. Am Montag eskalierte es dann: Pipeline-Stilllegungen, Kommunikationsstörungen. Aber die Europäer reagierten immer noch nicht. Das ging so weiter bis jetzt, am Samstag, dem Tag, an dem diese Operation über Erfolg oder Misserfolg entscheiden würde.\n\nTief im Inneren des NSA-Hauptquartiers wartete Direktor Burns mit gerunzelter Stirn und starrte ununterbrochen auf den riesigen Bildschirm vor sich. Neben ihm saß Paul Nakasone, Direktor der National Security Agency und des U.S. Cyber Command.\n\n"Wie ist der Stand der Cyberangriffe?", fragte Burns mit strenger und unerschütterlicher Stimme. fragte Burns mit strenger, unerschütterlicher Stimme.\nNakasones Stimme klang zuversichtlich. Er deutete auf den Bildschirm. "Alles verlief reibungslos, Direktor. Wir sollten jeden Moment die Ergebnisse sehen."\n\nBald war der Raum voller geschäftiger Aktivität. Die Beamten bereiteten sich vor, telefonierten und tippten auf ihren Tastaturen. Dann wurde es auf dem Bildschirm angezeigt. Europa. Tiefschwarz. Ihre Stromnetze waren mit einem Schlag lahmgelegt worden. Die einzigen Lichtzeichen waren winzige weiße Punkte, die wie Sterne am Mitternachtshimmel über den Kontinent verstreut waren. Es war fast schon schön. Wäre Burns nicht daran gewöhnt gewesen, hätte ihn das vielleicht bewegt.\n\n"Nicht nur das", fügte Nakasone hinzu, "auch ihre Wasserversorgung wurde unterbrochen. Und ihre Kommunikationswege."\n"Es ist möglich, dass die Europäer einen Angriff erwartet haben, aber sie hätten niemals etwas in dieser Größenordnung vorhergesehen. Ihre Kriegsmaschinerie wird darunter stark leiden", schloss Nakasone mit einem selbstbewussten Grinsen.\n\nBurns' Schultern entspannten sich, und er wandte sich Nakasone zu: "Verstanden. Gute Arbeit, Direktor."\nEr wandte sich wieder dem Bildschirm zu, studierte jedes Lebenszeichen auf dem Kontinent und bereitete sich auf den nächsten Schritt vor."
 nss.78.a: "Die Operation ist ein Erfolg."
 nss.79.t: "Fehlschlag"
 nss.79.d: "CIA/IC INTERN – NUR ZUR EINSICHTNAHME\nBETREFF: Europäische Geheimdienstoperation\nDATUM: XX/XX/XXXX\nEINSTUFUNG: STRENG GEHEIM // NOFORN\n\nDie geplante Geheimdienstoperation gegen die Regime in Europa ist gescheitert. Das Scheitern der Operation dürfte dazu führen, dass sich der Feind weiter gegen unsere Militäroperation zusammenschließt.\n\nWir müssen die Ursachen dieses Scheiterns verstehen, um es in Zukunft zu verhindern."
 nss.79.a: "-DB"
 nss.80.t: "Heimkehr"
 nss.80.d: ""Das glaube ich nicht wirklich."\n\nZwei amerikanische Soldaten hielten Ausschau über einer europäischen Stadt, die vom Feind besetzt war, einem bekannten Tyrannen, der erneut seine Macht über den Kontinent ausübte.\nDer Wald, in dem sie ihr Lager aufgeschlagen hatten, war in Nebel gehüllt, und die Geräusche entfernter Schüsse schienen nichts mit der Natur zu tun zu haben.\n\n"Warum nicht? Wir haben hier schon einmal geblutet, in zwei Weltkriegen, ganz zu schweigen von unseren Vorfahren davor. Wie viele unserer Vorfahren wurden getötet? Wie viele Narben tragen wir aus vergangenen Zeiten? Kommt dir das nicht alles so vertraut vor?"\n\n"Als wären wir schon einmal hier gewesen?"\n\n"Genau." \n\nDie beiden Soldaten unterhielten sich weiter im Schutz des europäischen Nebels. Sie waren schon einmal hier gewesen, und ihre Kinder würden auch hier sein. Ein Kontinent, gebunden an Blut und Feuer, der immer wieder seinen Zyklus der Erneuerung durchlaufen wird. In einer anderen Welt würden die europäischen Länder von Verrückten überrannt, von den Russen erobert oder von etwas vernichtet werden, für das wir einfach keinen Namen haben.\n\n"Weißt du, es gibt eine Sache, die ich bereue."\n"Was denn?"\n"Dass wir keinen der Wildschweine erschossen haben, die wir vorhin beim Wandern durch diesen Wald gesehen haben, um sie dann zu essen."\nDer andere Soldat lacht: "Du bist unmöglich."\n"Hey, ich kann nichts dafür, das haben wir früher immer so gemacht."\n\nDie Nacht brach schnell herein, die Sterne am Himmel strahlten ohne künstliches Licht in ihrer ganzen Pracht."
 nss.80.a: ""Lass uns wieder hierher zurückkommen, wenn das alles vorbei ist.""
 nss.81.t: "Nationale Siegesfeier – Unternehmen Orinoco Storm"
 nss.81.d: "Nachdem die zerschlagenen Überreste des organisierten Widerstands in Venezuela nun in den Straßen schwelten, erklärten die Vereinigten Staaten offiziell ihren Sieg über das bolivarische Regime. Die Ankündigung erfolgte, nachdem hochrangige Angehörige der Nationalen Bolivarischen Streitkräfte – diejenigen, die nicht bei nächtlichen Razzien gefangen genommen worden waren – sich offiziell ergeben hatten, während führende Kader der PSUV ins Exil flohen. Im ganzen Land ordnete die Regierung eine Woche voller Feierlichkeiten und Paraden zu Ehren derjenigen an, die das südamerikanische Land "befreit" hatten. Die Straßen von Washington, D.C. waren mit rot-weiß-blauen Fahnen geschmückt, als die siegreichen Einheiten der Operation Orinoco Storm im Gleichschritt die Pennsylvania Avenue entlangmarschierten. M1A2-Abrams-Panzer rumpelten neben HIMARS-Raketenwerfern dahin und erinnerten brutal an die überwältigende technologische Überlegenheit der Amerikaner. Über ihnen durchschnitten F-22 Raptors und B-2 Spirits in Formation die Wolken und beschatteten die Menge begeisterter Zuschauer, die mit fast religiöser Inbrunst amerikanische Flaggen schwenkten. Es war ein sorgfältig inszeniertes Spektakel, das Erinnerungen an den Triumph der Operation Desert Storm wecken sollte, doch dieser Sieg war ohne Medienberichterstattung und ohne Kontrolle durch den Kongress errungen worden. \n\nAus dem Oval Office hielt der Präsident, flankiert von den Stabschefs in ihren Paradeuniformen, deren Gesichter von grimmiger Zufriedenheit geprägt waren, eine Fernsehansprache an die Nation, in der er die "tapferen Männer und Frauen des US-Südkommandos" dafür lobte, dass sie "das narco-terroristische Regime, das unsere karibischen Nachbarn bedroht, zügig zerschlagen haben". Der Präsident verschwieg dabei die zivilen Opfer, die Einschüchterungsbombardements auf Caracas und die außergerichtlichen Massaker, die vom SAC der CIA verübt wurden.\n\nDie Aktion demonstrierte auch die militärische Stärke der USA angesichts der zunehmenden Spannungen mit China. Geopolitische Experten und die nationale Presse betrachten die schnelle Niederlage des bolivarischen Regimes als Meilenstein für die Wiederherstellung einer auf Regeln basierenden Weltordnung.\n\nDie venezolanische Übergangsregierung hat Stabilität und Zusammenarbeit mit den Partnern in den USA und der OAS zugesagt, um die Grenzen zu sichern und den verbleibenden Widerstand zu beseitigen. Im ganzen Land stationierte Truppen der US-Armee unterstützen die lokalen Streitkräfte bei der Aufrechterhaltung des Friedens und dem Schutz wichtiger Infrastruktur vor Aufständischen. In den kommenden Wochen wird in Washington eine Konferenz stattfinden, auf der die Umstrukturierung des venezolanischen Staates und der Übergang zu einer vollständig demokratischen Republik gemäß den Richtlinien internationaler Politikexperten behandelt werden."
 nss.81.a: "Frieden ist unser Metier."
 nss.82.t: "Nationale Siegesfeier – Unternehmen Tropic Thunder"
 nss.82.d: "Der Zusammenbruch des zentralamerikanischen Regimes hat das Ende der Flut von Flüchtlingen und Drogen nach Amerika eingeläutet. Nachdem sich die Überreste des zentralamerikanischen Militärs offiziell dem Südkommando der Vereinigten Staaten ergeben hatten und die Zivilregierung stillschweigend geflohen war, kamen die organisierten Feindseligkeiten auf breiter Front zum Erliegen. Ein schneller Sieg, der von allen Beteiligten gelobt wurde. In einer Demonstration der Einheit verabschiedete der Kongress eine parteiübergreifende Resolution, in der die tapferen Soldaten und Soldatinnen des US-Südkommandos sowie die Führung der derzeitigen Regierung gewürdigt wurden. Eine Woche lang wurden im ganzen Land Feierlichkeiten zu Ehren ihrer Leistungen veranstaltet.\n\nAuf den Straßen von Washington, D.C. schwenkten Scharen patriotischer Zuschauer Fahnen und skandierten im Chor, ihre Gesichter strahlten vor Begeisterung und patriotischer Inbrunst. Über ihnen durchschneiden B-52-Bomber mit ohrenbetäubendem Lärm den azurblauen Himmel, gefolgt von den schlanken, pfeilförmigen F-35-Kampfflugzeugen. Am Boden rollt eine Parade von Stryker-Panzerwagen und Bradley-Kampffahrzeugen in Formation die National Mall entlang. Die amerikanische Militärtechnik und das Personal werden in ihrer ganzen Macht präsentiert, während triumphierende Soldaten des US-Südkommandos im Gleichschritt marschieren. \n\nMit diesem militärischen Triumph kehrt auch der Optimismus in der Bevölkerung zurück, dass endlich Stabilität in eine Region einkehren wird, die lange Zeit ein Dorn im Auge des amerikanischen Wohlstands und der amerikanischen Sicherheit war. Das Außenministerium hat den zivilen Übergangsregierungen in Mittelamerika Unterstützung zugesagt, während die amerikanischen Truppen so lange im Land bleiben werden, wie es nötig ist, um die Grenze zu sichern und den Frieden zu gewährleisten. Die Tage der Migranten- und Drogenkrise scheinen sich dem Ende zu nähern, und für eine Region, die so lange von Korruption und Gewalt geplagt war, bricht ein neues Kapitel des Fortschritts an.\n\nEine provisorische, übergeordnete "USSOUTHCOM-Verwaltungsbehörde" wird den Übergang zu einer "geordneten Regierungsführung" leiten, wobei internationale Finanzexperten die wirtschaftliche Umstrukturierung und den Wiederaufbau begleiten werden. Der Präsident hat allen Beteiligten sowie den tapferen Soldaten, die ihr Leben für die Sicherheit und den Wohlstand Amerikas riskiert haben, seine Glückwünsche ausgesprochen."
 nss.82.a: Frieden ist unser Metier."
 nss.83.t: "Nationale Siegesfeier – Unternehmen Havana Vice"
 nss.83.d: "Nach dem Zusammenbruch der kubanischen Revolutionsstreitkräfte und dem anschließenden Sturz des kommunistischen Regimes hat das Verteidigungsministerium den Sieg und das offizielle Ende der Feindseligkeiten auf der Insel erklärt. Da die Mehrheit der kubanischen Militärführung entweder gefangen genommen wurde oder tot ist und die oberste Führung der Regierung aus dem Land geflohen ist, ist der organisierte Widerstand praktisch beendet. Der Kongress verabschiedete eine parteiübergreifende Resolution, in der er die militärische Führung des US-Südkommandos lobte und ihren schnellen Sieg feierte. Eine Woche lang fanden landesweit Feierlichkeiten statt.\n\nIn Großstädten wie Miami, Washington D.C. und New York herrschte eine ausgelassene Stimmung, als die zurückkehrenden Truppen mit Fanfaren und triumphalen Empfängen begrüßt wurden. Über der National Mall schnitten Formationen von AH-64-Hubschraubern durch die Luft, gefolgt von V-22 Ospreys, die US-Marinesoldaten transportierten. Panzer, selbstfahrende Haubitzen und die neuesten Kampfdrohnen wurden neben der militärischen Ausrüstung präsentiert, die die kommunistischen Streitkräfte so gründlich vernichtet hatte. Inmitten der patriotischen Feierlichkeiten und des Dröhnens der militärischen Macht herrscht in der Menge ein Gefühl der Genugtuung. \n\nDie kubanische Diaspora in Florida lobte den schnellen Sieg der Regierung als längst überfällige Gerechtigkeit, während in Havanna parallel zu den Feierlichkeiten in Washington gefeiert wurde. Bereits jetzt werden amerikanische Flughäfen mit Anfragen nach erneuten Flügen nach Kuba überschwemmt, da Kubaner im Ausland nach einer langen und schmerzhaften Entfremdung wieder Kontakt zu ihren Angehörigen auf der Insel aufnehmen möchten.\n\nDie Inselnation ist nun bereit, wieder in die Weltgemeinschaft integriert zu werden. Die zivile Übergangsregierung, die nach dem Umsturz die Macht übernommen hatte, hat sich zu freien und fairen Wahlen sowie zur uneingeschränkten Zusammenarbeit mit den USA bei der Wiedereingliederung Kubas in die globalen Handelsnetzwerke verpflichtet.\n\nDer Präsident und das USSOUTHCOM haben versprochen, gemeinsam mit den zivilen Übergangsbehörden für die Sicherheit des kubanischen Volkes zu sorgen und gleichzeitig wirtschaftliche Impulse zu setzen, um das Land ins 21. Jahrhundert zu führen."
 nss.83.a: "Frieden ist unser Metier."
 nss.84.t: "Nationale Siegesfeier – Unternehmen Desert Sentinel"
 nss.84.d: "Mit der vollständigen Zerschlagung des irakischen Militärs und der Gefangennahme der führenden politischen und militärischen Persönlichkeiten des Landes wurde ein formelles Ende der Feindseligkeiten im Irak erklärt. Der Kongress verabschiedete in einer Demonstration der parteiübergreifenden Einigkeit eine Resolution, in der er den schnellen Sieg der US-Streitkräfte lobte und die gefallenen Helden ehrte. Das Verteidigungsministerium ordnete eine einwöchige Feier an, um diesen bedeutenden Sieg im Nahen Osten zu würdigen und die Rolle der amerikanischen Macht bei der Herbeiführung des Friedens im Irak anzuerkennen.\n\nErneut wurde die National Mall zum Schauplatz militärischer Macht, als amerikanische Panzer, selbstfahrende Haubitzen, Kampfdrohnen und Infanterieformationen in römischem Triumphzug die Pennsylvania Avenue entlangmarschierten. Diese von der Regierung angeordneten Feierlichkeiten haben sich auf alle großen amerikanischen Städte ausgeweitet, wo Menschenmengen Fahnen schwenken, patriotische Parolen skandieren und die Rückkehr ihrer Truppen feiern. Der Präsident lobte die Führung des US-Militärs und betonte das Engagement der Regierung für die Förderung eines sicheren und stabilen Nahen Ostens sowie dafür, dass der Irak ein wichtiger Verbündeter im Kampf gegen den globalen Terror bleibt, ohne jedoch die mutmaßlichen Kriegsverbrechen der USA zu erwähnen.\n\nThink Tanks und Geopolitik-Experten lobten den effektiven Einsatz neuartiger Technologien durch das USCENTCOM, um die Verluste des amerikanischen Militärs zu minimieren und gleichzeitig den Feind vollständig zu besiegen. Ein entscheidendes Ende des Konflikts werde, so behaupten sie, den Weg für die Wiederherstellung eines friedlichen, demokratischen Irak ebnen.\n\nMit Unterstützung von Politikfachleuten in Washington wurden bereits Pläne für die neue Übergangsregierung in Bagdad ausgearbeitet. Die Militärverwaltung des USCENTCOM wird eng mit den neuen zivilen Behörden zusammenarbeiten, um einen raschen Wiederaufbau und die Rückkehr in die internationale Gemeinschaft sicherzustellen."
 nss.84.a: "Frieden ist unser Metier."
 nss.85.t: "Amerikanische Truppen betreten Ottawa"
 nss.85.d: "Nach der Unterzeichnung des Nordamerikanischen Sicherheitsabkommens durch die Regierung Trudeau marschierten Tausende amerikanischer Soldaten in Kanada ein. Ihre Mission: Unterstützung des kanadischen Sicherheitspersonals und der Royal Canadian Mounted Police bei der Aufrechterhaltung der Ordnung sowie bei der Festnahme und Inhaftierung von "einheimischen Extremisten" und "weißen Nationalisten", die die Stabilität Kanadas bedrohen. In Ottawa fand eine kurze gemeinsame Parade statt, um das Abkommen zu feiern. Amerikanische und kanadische Truppen marschierten gemeinsam durch die Straßen der Stadt, während CF-18 Hornets und F-16 über ihnen flogen.\nKanadische Sicherheitsbeamte arbeiten zusammen mit amerikanischen Streitkräften auch daran, die dringend benötigte Katastrophenhilfe nach einem harten Winter zu leisten, der das tägliche Leben in einer Reihe von Provinzen stark beeinträchtigt hatte.\n\nAmerikanische Soldaten haben ihre Begeisterung darüber zum Ausdruck gebracht, zur Aufrechterhaltung des Friedens in ihrem nördlichen Nachbarland beitragen zu können, ebenso wie kanadische Sicherheitsbeamte, die die zusätzliche Hilfe begrüßen. Proteste gegen das Abkommen wurden schnell niedergeschlagen, die Bankkonten ihrer Anführer eingefroren, wobei der CSIS "Verbindungen zum weißen nationalistischen Terrorismus" und "militanten Organisationen der extremen Linken" als Gründe anführte. In einer exklusiven gemeinsamen Pressemitteilung mit dem kanadischen Premierminister lobte der Präsident das Abkommen und versprach seine Unterstützung für die anhaltende Stabilität Kanadas und sein Engagement für eine regelbasierte internationale Weltordnung. \n\n"Mit der Unterzeichnung dieses Abkommens treten wir in eine neue Phase der kanadisch-amerikanischen Freundschaft ein und bekräftigen unser Engagement für internationalen Frieden, Sicherheit und Wohlstand", erklärte der Präsident in einer Videoansprache. "Dieser historische Schritt ist nur der Anfang, denn wir freuen uns darauf, unsere bilaterale Zusammenarbeit zu vertiefen und unsere gemeinsamen demokratischen Werte zu fördern. Gemeinsam werden wir eine bessere und sicherere Zukunft für unsere beiden Nationen aufbauen.""
 nss.85.a: "Frieden ist unser Metier."
 nss.86.t: "USSOUTHCOM verkündet Ende der Kampfhandlungen in Haiti"
 nss.86.d: "Das Verteidigungsministerium hat das Ende der größeren Feindseligkeiten in Haiti erklärt. Die unter der Flagge der Vereinten Nationen stationierten US-Streitkräfte haben in Zusammenarbeit mit Friedenstruppen und privaten Militäreinheiten alle wichtigen Regierungs- und Militärstandorte eingenommen und führende Persönlichkeiten großer krimineller Organisationen erfolgreich festgenommen. Die Operation wurde als "systematisch" in der Beseitigung krimineller Elemente beschrieben, während die Regierung den entscheidenden Sieg des USSOUTHCOM bei der Wiederherstellung des Friedens in der Karibik lobte.\n\nLaut einem Sprecher des Weißen Hauses hat sich die Übergangsregierung Haitis verpflichtet, innerhalb von zwei Jahren freie, faire und inklusive Wahlen abzuhalten. Dieses Bekenntnis zu demokratischen Prinzipien und Rechtsstaatlichkeit markiert einen bedeutenden Wendepunkt für ein Land, das seit langem mit Instabilität und Unruhen zu kämpfen hat. Die internationale Gemeinschaft, allen voran die Vereinigten Staaten, die UNO und die OAS, wird technische und finanzielle Unterstützung leisten, um die Glaubwürdigkeit dieser Wahlprozesse und den erfolgreichen Übergang zur Zivilregierung sicherzustellen.\n\nDie amerikanische Präsenz im Land wird auf absehbare Zeit bestehen bleiben und Unterstützung in den Bereichen Entwicklung, Aufstandsbekämpfung und allgemeine Friedenssicherung leisten, um den Frieden im Land zu sichern.\n\nDer Präsident hat den Erfolg der Operation gelobt, sich jedoch nicht zu den mutmaßlichen Gräueltaten geäußert, die von amerikanischen Soldaten im Land begangen worden sein sollen."
 nss.86.a: "Frieden ist unser Metier."
 nss.87.t: "Itamaraty unterzeichnet Abkommen über US-Stützpunkte"
 nss.87.d: "In einer beispiellosen Entwicklung hat das Itamaraty zugestimmt, den Einsatz der US-Streitkräfte in Brasilien zuzulassen. Das brasilianische Außenministerium verwies auf zunehmende Sicherheitsprobleme, darunter Drogenhandel, grenzüberschreitende organisierte Kriminalität und die Bedrohung durch rechtsextreme Gruppen. Viele Analysten sehen diesen Schritt als strategische Wende in der brasilianischen Außenpolitik und als bedeutenden Erfolg für die Bemühungen der USA, ihren regionalen Einfluss zu stärken.\n\nDer Einsatz der USA wird eine beträchtliche Anzahl von Militärangehörigen sowie fortschrittliche Überwachungs- und Nachrichtendienstkapazitäten umfassen, wobei das USSOUTHCOM sein Engagement für die Achtung der brasilianischen Souveränität und die enge Zusammenarbeit mit den brasilianischen Sicherheitskräften betont.\n\nDie brasilianische Regierung hat der Öffentlichkeit versichert, dass dieses Abkommen Teil einer umfassenderen Bemühung zur Verbesserung der bilateralen Zusammenarbeit und der regionalen Sicherheit ist und nicht Ausdruck einer inneren Instabilität oder Schwäche darstellt. Präsident Meirelles selbst lobte das Abkommen als "einen Sieg für beide Länder und für den Frieden in der Region" und betonte, dass es eine verstärkte Zusammenarbeit bei der Bekämpfung gemeinsamer Bedrohungen ermöglichen würde.\n\nKritiker argumentieren jedoch, dass dieses Abkommen die langjährige Tradition Brasiliens der strategischen Autonomie und Unabhängigkeit untergraben könnte. Oppositionsparteien haben die Entscheidung des Außenministeriums verurteilt und behaupten, dass sie die nationale Sicherheit gefährde und den USA die Tür für eine Einmischung in die inneren Angelegenheiten Brasiliens öffne.\n\nIn Washington haben das Verteidigungsministerium und das Weiße Haus das Abkommen begrüßt und sehen darin einen wichtigen Schritt zur Festigung der Position der Vereinigten Staaten als führende Macht in der westlichen Hemisphäre, ohne jedoch die Rolle der CIA bei der Unterstützung der neuen Regierung zu erwähnen."
 nss.87.a: "Frieden ist unser Metier."
 nss.88.t: "Gebrochene Maske"
 nss.88.d: "Die Helden von heute sind die Monster von morgen. Nachdem Judas seine Mission erfüllt hatte und die Welt die Vereinigten Staaten mit hasserfüllten Blicken betrachtete, sollte sich diese Einstellung jeden Tag aufs Neue bestätigen.\n\nJede moralisch fragwürdige Handlung, die wir hinter den Kulissen begangen hatten, wurde ans Licht gebracht, jede Person, die damit in Verbindung stand, wurde von antisozialen Aktivisten identifiziert, und bei einer so langen Liste würde es zu einer Abrechnung kommen.\n\nWenn ein Palast von den Massen gestürmt wird, arbeiten sie sich nach oben. Sie sorgen dafür, dass jede einzelne Etage gesäubert wird, jeder Diener getötet wird, bis sie den Adel und schließlich den König erreichen.\nBerichte über Regierungsbeamte, die ermordet oder einfach nur am helllichten Tag getötet werden, sind tägliche Schlagzeilen, aber die Mehrheit wird immer noch von der Überflutung mit Unterhaltung überschattet.\nUnabhängig davon, wie viele Augen darauf gerichtet sind, bleibt das Blut, das von den Männern und Frauen in Anzügen vergossen wird, eine Tatsache.\n\nMehrere Bundesstaaten haben uns bereits öffentlich angeprangert, und obwohl wir die meisten von ihnen schnell beseitigt haben, hat sich bei einigen herausgestellt, dass es schwieriger ist, dort für Ordnung zu sorgen.\n\nDas Finale ist vorbei, und jetzt sind wir diejenigen, die die Bühne aufräumen müssen."
 nss.88.a: "Und dennoch halten wir durch."
 nss.89.t: "Wiederherstellung des Friedens"
 nss.89.d: "Zum zweiten Mal innerhalb eines Jahrzehnts haben unsere Bürger die Waffen gegeneinander erhoben.\n\nZum zweiten Mal liegen die Städte unseres Landes in Trümmern.\n\nDer Aufstand hat den Vereinigten Staaten eine weitere Narbe zugefügt. Da die Maskerade nun fast vollständig zerbrochen ist, werden die Menschen die Regierung nie wieder mit denselben Augen sehen wie zuvor. Aber vorerst ist eine existenzielle Krise abgewendet worden.\n\nOffizielle Erklärungen des Präsidenten und anderer Amtsträger, verstärkt durch die Medienmaschinerie, arbeiten ununterbrochen daran, das Bild von Sicherheit und Transparenz wiederherzustellen. Die Deutungshoheit liegt wieder in unseren Händen, und sie ist ganz klar: Ein Verräter tief im Inneren der Regierung hat versucht, unsere Demokratie und Freiheit zu untergraben. \n\nAlle Todesfälle und Zerstörungen wurden von ihm und nur von ihm verursacht, nur um seine egoistischen, verräterischen Ziele zu erreichen."
 nss.89.a: "Eine Lektion, die auf die harte Tour gelernt wurde."
 nss.90.t: "Texas spaltet sich ab"
 nss.90.d: "Beunruhigende Nachrichten aus Texas: Der derzeitige Gouverneur soll öffentlich erklärt haben, dass sich der Bundesstaat Texas aus der Union zurückgezogen habe. Angesichts der anhaltenden Maskerade verlassen immer mehr Ratten das sinkende Schiff.\n\nNachdem der Gouverneur im gesamten Bundesstaat das Kriegsrecht verhängt hatte, desertierten viele Mitglieder der Nationalgarde, die im Bundesstaat stationiert waren, schnell, als sie Verhaftungen von Anhängern der Bundesregierung durchführten.\nGründe wie "Verrat am amerikanischen Volk, Schändung der amerikanischen Geschichte" waren nur einige der vielen Gründe, die zur Rechtfertigung dieses Verrats herangezogen wurden.\n\nWährend in Texas weiterhin Chaos herrscht, weil kleinere antisoziale Gruppen versuchen, durch sinnlose Gewalt wieder an Bedeutung zu gewinnen, wird auch von Scharmützeln an der Grenze berichtet, und die Texas National Guard beabsichtigt, Druck auf die Nachbarstaaten auszuüben, um sie zu ermutigen, ebenfalls aus der Union auszutreten.\n\nDie Vereinigten Staaten befinden sich erneut in Aufruhr."
 nss.90.a: "Keine Gnade für Verräter."
 nss.91.t: "Kalifornien begeht Verrat"
 nss.91.d: "Angesichts des ramponierten Rufs der Vereinigten Staaten von Amerika wäre es zweifellos naheliegend, dass die wohlhabenderen Bundesstaaten versuchen würden, aus der Union auszutreten, in der Hoffnung, einen Neuanfang zu wagen. Kalifornien wäre einer davon.\n\nDie kalifornische Nationalgarde stürzte umgehend den Gouverneur und verhaftete alle uns loyalen Bundesbeamten. Es kam bald zu Unruhen, und jede kleinere antisoziale Gruppe innerhalb des Staates tut alles in ihrer Macht Stehende, um die Region noch weiter zu destabilisieren.\n\nAufgrund unserer ohnehin schon prekären Lage versuchten wir zunächst, ihnen mit offenem diplomatischem Engagement entgegenzukommen, aber nachdem der Gouverneur live im Fernsehen hingerichtet wurde, scheint es, als würde der Staat Kalifornien einen Kampf suchen, den er nicht gewinnen kann.\n\nEine erfolgreiche Abspaltung wäre für uns katastrophal, da dies nicht nur den Weg für ausländische Einflüsse ebnen würde, sondern auch den Beginn des langsamen Todes der Vereinigten Staaten von Amerika, wie wir sie kennen, bedeuten würde, möglicherweise für immer.\n\nFrühere Befriedungsoperationen in der Region haben gezeigt, dass Kämpfe in diesem Gebiet eine ziemlich mühsame Aufgabe sind, die jedoch erneut durchgeführt werden muss, um die Einheit der Nation aufrechtzuerhalten."
 nss.91.a: "Bombardiert ihre Städte."
 nss.92.t: "Aufstand im Nordwesten"
 nss.92.d: "Die Unabhängigkeit Kaskadiens war für die Geheimdienste schon immer ein wichtiges Thema. Wir haben kontinuierlich Anstrengungen unternommen, um gegen kaskadische Aufständische vorzugehen. Trotz der Zerschlagung alter Gruppen, die mit der ursprünglichen Unabhängigkeitsbewegung in Verbindung standen, wie beispielsweise die Tannenbaumpartei und die Anarchisten, bleibt das Problem bestehen. Das Verlangen nach Sezession würde neben den Aktivitäten der Aufständischen bestehen bleiben.\n\nHeute eskalieren ihre Aktivitäten. Nachdem die Maskerade aufgedeckt wurde, gelang es den Kaskadiern, ihre Reihen zu vergrößern, darunter viele ehemalige Mitglieder des Militärs und der Strafverfolgungsbehörden. Die Kommunikation mit den Anti-Aufstands-Operationen brach schnell zusammen, nachdem Berichte über gezielte Angriffe auf Außenposten und Patrouillen bekannt wurden.\n\nDie derzeitige provisorische Regierung Kaskadiens ist weit entfernt von den gewalttätigen Tendenzen ihrer Vorgängerin, aber mit den zusätzlichen Erfahrungen und der Öffnung der von The Base zurückgelassenen Vorratslager wird die Befriedung der Region sicherlich ebenso blutig verlaufen. Die Uhr tickt; die Region muss brennen, damit die Ordnung wiederhergestellt werden kann."
 nss.92.a: "Keine Bäume mehr, kein Chaos mehr."
 nss.93.t: "Amerikanische Dämmerung"
 nss.93.d: "Der heutige Tag markiert den Punkt, an dem es für die Welt kein Zurück mehr gibt.\n\n"Wir, das Volk" der ehemaligen Vereinigten Staaten von Amerika, sind geschockt und entsetzt. Der Name "Vereinigte Staaten" selbst ist nun gleichbedeutend mit dem Deep State, den Schrecken des Zweiten Amerikanischen Bürgerkriegs und den darauf folgenden Ereignissen. Mit den Cognoscenti starb auch das alte Amerika, und seine Nachfolgestaaten haben keine andere Wahl, als weiterzumachen. \n\nDer neue Staat, die Amerikanische Föderativrepublik, wird durch die Neuen Konföderationsartikel verwaltet, einen Vertrag zwischen der Regierung in Washington DC, den Regierungen der Bundesstaaten und den sezessionistischen Staaten, der den Einflussbereich Washingtons drastisch einschränkt und die Bundesgewalt auf bestimmte Bereiche beschränkt: gegenseitige Verteidigung, zwischenstaatlicher Handel und Koordinierung der Außenbeziehungen.\n\nDie extreme Dezentralisierung aller Bereiche der Regierung, einschließlich des Militärs und der Geheimdienste, schafft ein System, in dem die Cognoscenti nicht mehr möglich sind. Einige Staaten äußerten den Wunsch, noch weniger mit dem Zentrum verbunden zu sein, und wurden autonome Staaten, praktisch in Anlehnung an die Erfahrungen von Texas und Kalifornien, die vollständig unabhängige Länder wurden.\n\nDie in Honolulu unterzeichneten Neuen Konföderationsartikel schaffen ein stabiles, aber dysfunktionales und stagnierendes System.  Einige sehen darin eine Lösung für die anhaltenden internen Konflikte, in die das Land geraten ist, andere betrachten es als einen halben Schritt zur vollständigen Spaltung des Landes oder sogar als Sprungbrett zu einem noch gewalttätigeren und tyrannischeren Regime. Aber im Moment spielt das keine Rolle.\n\nZum ersten Mal seit Jahrhunderten blickt Amerika hoffnungsvoll in eine friedliche Zukunft."
 nss.93.a: "In Gott haben wir kein Vertrauen."
 nss.94.t: "Gesichtslose Justiz"
 nss.94.d: ""Ich habe eine Vorstellung davon", sagte Maddox. Er war weder gefesselt noch in irgendeiner Weise festgehalten, aber er konnte nirgendwohin fliehen, und das gesamte Tribunal war von bewaffneten Wachen umgeben. Es hätte sich um Angehörige der US-Armee oder der CIA handeln können; für ihn gab es keinen wirklichen Unterschied mehr. "Ich wurde nach einer beiläufigen Bemerkung gegenüber einem Kollegen verhaftet."\n\n"Und Sie bestreiten, diese Bemerkung gemacht zu haben?", fragte der Staatsanwalt. Die Richter hinter ihren Masken und auf ihrer erhöhten Plattform starrten ihn mit emotionslosen Augen an. Auch das war beleidigend. Sie saßen über ihm, als wäre er nicht einer von ihnen.\n\n"Nein, Sir", antwortete er und presste die Kiefer aufeinander. „Aber ich habe nur einen Witz gemacht."\n\n"Witze spiegeln wider, was ein Mensch wirklich denkt", antwortete der Richter in der Mitte. 2Und wir durchschauen Sie, Colonel. Ihre Unaufrichtigkeit und Untreue sind für uns alle offensichtlich."\n\n"Meine Loyalität gilt der Verfassung der Vereinigten Staaten", sagte Maddox entschlossen, da er wusste, dass dies seine letzte Gelegenheit sein würde, sich zu verteidigen. "Ich habe einen Eid geschworen und habe mich immer daran gehalten, aber die Dinge, die jetzt getan werden..."\n\n"Wurden schon immer getan", beendete einer der Richter seinen Satz. „Sie wussten bis vor kurzem nur nichts davon."\n\nMaddox blinzelte, die Worte trafen ihn wie ein Schlag in die Magengrube. Ihm fiel keine Antwort ein."
 nss.94.a: "Er wusste, dass er es nicht widerlegen konnte."
 nss.95.t: "Die Maskerade"
 nss.95.d: "Für die Außenwelt existieren wir nicht, zwischen den Werbespots und den Fußballspielen, die wir uns ansehen. Wir schützen unsere Nation vor den Flammen des Chaos.\n\nDurch sorgfältige Planung und Handeln haben wir ein System innerhalb eines Systems aufgebaut.\nEin System, das für das normale Auge unsichtbar ist, versteckt zwischen Fällen vor dem Obersten Gerichtshof und Medienzirkussen. Es spielt keine Rolle, wie sehr die Beamten unter Druck stehen; es spielt keine Rolle, wie sehr die Verschwörungstheoretiker versuchen, uns ins Rampenlicht zu rücken. Unsere Arbeit geht weiter.\nDie Welt dreht sich weiter.\n\nWie jede Ökologie ist die Maskerade sorgfältig um unsere Bürger herum aufgebaut, damit ihr Alltag weitergehen kann, ohne dass sie von unserer Kontrolle wissen. Was wir tun, ist richtig, aber oft wird das Richtige als unpopulär angesehen.\nManchmal sollten sie es nicht wissen.\n\nAllerdings kann es vorkommen, dass Raubtiere auftauchen, die versuchen, die Maskerade zu stören, indem sie die Sonne der Wahrheit auf die Männer und Frauen scheinen lassen, die hinter dem Schleier hart arbeiten. \nTerrorgruppen, asoziale Individuen und Verräter, die in die Falle der ethischen Panik getappt sind. Sie alle haben das Potenzial, das zu zerstören, woran wir so lange gearbeitet haben.\n\nWie ein Gärtner müssen wir die Maskerade aufrechterhalten und das Unkraut jäten, das uns zu ersticken versucht."
 nss.95.a: "Behaltet die Masken auf."
 nss.96.t: "Wahlen in Brasilien"
 nss.96.d: "Nach einem Militärputsch in Brasilien führte die unter strenger militärischer Aufsicht durchgeführte Wahl zum überwältigenden Sieg von Henrique Meirelles, einem proamerikanischen technokratischen Kandidaten.\n\nDiese Entwicklung dürfte eine fortgesetzte militärische und wirtschaftliche Zusammenarbeit zwischen den Vereinigten Staaten und Brasilien gewährleisten.\n\nAllerdings sollten wir auf die potenziell gefährlichen sozialen und wirtschaftlichen Folgen des Staatsstreichs in diesem Land achten, da linksextreme und rechtsextreme Organisationen versuchen, das neue Regime zu destabilisieren.\n\nUngeachtet dessen hat die neue Regierung bereits eine erweiterte Zusammenarbeit mit den Vereinigten Staaten zugesagt, beginnend mit einem Militärbündnis."
 nss.96.a: "Auf unsere Freundschaft!"
 nss.97.t: "ME von ENship"
 nss.97.d: "CIA/IC INTERN – NUR ZUR EINSICHTNAHME\nBETREFF: Vorfall an der Zikkurat von Enlil\nDATUM: REDIGIERT\nEINSTUFUNG: STRENG GEHEIM//NOFORN\nEin SAC-Kill-Team, das entsandt worden war, um eine kürzlich ausgegrabene sumerische Zikkurat im Euphrat-Tal von mutmaßlichen Aktivitäten von Aufständischen zu säubern, erlebte während der Mission ein unerwartetes Phänomen.\n\nDas Kill-Team griff eine kleine Gruppe von Aufständischen in den Ruinen des alten Tempels an, was zu einem Schusswechsel führte, von dem erwartet wurde, dass er zur vollständigen Ausschaltung der Aufständischenzelle führen würde. Während des Feuergefechts stieß jedoch einer der Soldaten versehentlich gegen eine Steintafel, die die Tempelwand schmückte. Daraufhin stellten alle Rebellen sofort den Kampf ein und nahmen eine Haltung der Unterwerfung und Ehrerbietung ein, die sich an einen unserer Soldaten richtete, der daraufhin den Namen "Delta-Eight" erhielt.\n\nDas Team nahm die überlebenden Rebellen zur Befragung fest. Einer von ihnen erklärte, sie hätten "es nicht über sich gebracht, sie anzugreifen, aus Angst vor den Konsequenzen, denn es bedeutet den Tod, eine Priesterin anzurühren". Die "Priesterin" war in diesem Fall Delta-Eight. Delta-Eight zeigte keine erkennbaren Veränderungen in ihrem Verhalten oder ihrer körperlichen Verfassung, aber ihre Teamkollegen unterwerfen sich ihr nun, und die Gefangenen weigern sich zu essen oder zu schlafen, bis sie "in ihre Obhut entlassen" werden.\n\nEine vorläufige Untersuchung der Tafel deutet darauf hin, dass sie mit einer langen Passage in einer archaischen Form der Keilschrift beschriftet war. Eine Inschrift in der Nähe lautet "NAM-EN" ("ME" von EN-ship, dem Zeichen des Priesters).\n\nDer Direktor ist an diesen Erkenntnissen sehr interessiert und hat die Einrichtung einer sicheren geheimen Einrichtung angeordnet, um diesen Vorfall weiter zu untersuchen und einzudämmen."
 nss.97.a: "Alle Mann aufs Deck. -DB"
 nss.98.t: "Zyklen"
 nss.98.d: "Nichts ist für die Ewigkeit, Wälder verdorren und wachsen, Berge stürzen ein und erheben sich, Imperien entstehen und vergehen. \n\nWo Götter geboren werden, wird die Realität in fünf Jahreszeiten unterteilt.\nFünf Zyklen.\nDas Leben ist der Hauptzweck von allem, aber letztendlich wird es verschlungen. Selbst in der Vernichtung entspringt neues Leben, und diejenigen, die nach der Sonne greifen, werden geboren.\n\nDiejenigen mit ausgestreckten Armen wurden gelehrt, das Gleichgewicht zu halten, aber ihre Natur ließ sie der Sünde erliegen.\nIhre Strafe ließ sie zu wilden, ungezähmten Bestien mit Zähnen und Klauen werden.\nMöge der Wind ihre Sünden wegwehen.\nDie Sonne wurde zum neuen Schöpfer, und das Leben wurde wiedergeboren.\n\nWasser wurde zu Licht. Seine Liebe wurde von den Klauen der Vergessenheit genommen, Trauer führte zu endlosen Reichen aus Sand und Dürre.\nTrauer ist der Weg zum Zorn, und das Wasser vom Himmel wurde zu Feuer.\nLicht ohne Ende.\n\nLicht wurde wieder zu Leben.\nEin neuer Elternteil, dessen Liebe als unaufrichtig angesehen wurde.\nEine Anschuldigung, die dazu führen würde, dass Blut das Land überflutete und Leben in neues Leben verwandelte, das unter dem Blut der Trauer leben konnte.\n\nEin Reich aus Blut und Knochen, ein Ende des Lebens mit einem Hunger, der ewig währen wird.\nDas Leben muss das Leben aufgeben, damit das Leben wieder leben kann.\nWenn der Hunger bleibt, wird das Licht erlöschen.\nDie Erde wird zerfallen, und das Ende wird kommen."
 nss.98.a: "Leben ins Leben."
 nss.99.t: "Schöpfer"
 nss.99.d: "Er kam aus den weiten Ozeanen des Nichts.\nWie jeder Sterbliche brannte ein Feuer in ihm.\nDer Wunsch zu erschaffen, der Wunsch zu zerstören.\n\nSeine Hände waren mit Lehm gefüllt, er formte eine Welt und dann noch eine.\nEr machte weiter, bis er gesättigt war, ein Universum nach seinem eigenen Entwurf.\nDas Leben wuchs, die Menschen wuchsen, Sprache entstand und Stämme blühten wie Blumen.\n\nSie hatten dasselbe Feuer, sie schufen und sie zerstörten.\n\nSeine Lehren, sein Weg.\n\nBis sie aufhörten zuzuhören und nur noch zerstören konnten.\n\nBald folgte der Zorn, als er eine Welle der Leere hervorbrachte.\n\nDie alles wegspülte.\n\nDann gab es Ozeane aus Nichts.\nEr tauchte daraus auf.\nSeine Hände waren voller Lehm. \nEine weitere Welt wurde geformt.\n\nEr wird dies tun, bis er fertig ist."
 nss.99.a: "Lehrer der Welt."
 nss.100.t: "Die Zähne Gottes"
 nss.100.d: "Die Herde, die sich schlecht benimmt, wird bestraft werden. \nSie ignoriert die gelehrten Lektionen und verabscheut ihre Schöpfer. \nSie werden fett von dem, was sie essen, sie ermorden ihre Verwandten und sitzen auf Bergen von Reichtümern, ohne jemandem außer sich selbst zu danken.\n\nDie Strafe kommt.\nScharfe Zähne, der Zorn des Tieres.\nEs verschlang einen Stamm nach dem anderen, der Himmel goss sich aus und ertränkte sie in Blutgier.\nDas Tier war hungrig, so hungrig, dass es verschlang und nicht aufhörte.\n\nBald würde die Welt still sein.\nUnd keine Lektionen würden gelernt werden.\nAber die Sonne schien durch den roten Nebel und lehrte die lebende Herde, wie man das Biest zähmt.\n\nFüllt die Flüsse mit roten Geistern, die den Geist beruhigen und den Körper betäuben sollen.\nWie die Herde, die fett wurde, trank sie weiter, verzehrte weiter, bis sie in einen tiefen Schlaf fiel.\nSo endete das Gemetzel.\n\nAus der Zerstörung, die es verursacht hatte, blühte das Leben wieder auf."
 nss.100.a: "Blühend, bis es wieder erwacht."
 nss.101.t: "Bevor alles begann"
 nss.101.d: "Es gab einmal ein Reich voller Türme und Paläste. \nDort regierte ein weiser König. \nUmgeben von weisen Männern erfuhr er von einer Welt, die vor ihm lag. \n\nEine große Katastrophe stand bevor.\n\nDiejenigen, die vor dem König kamen, schmiedeten Pläne und Intrigen.\nEinen Weg, neu anzufangen und das absolute Nichts hervorzubringen.\nAlle von ihnen, Schöpfer und Maler aller Lebewesen, schworen sich Geheimhaltung.\nDoch einer von ihnen schwankte und flüsterte den Sterblichen sein Geheimnis zu.\n\nDie sterblichen Geister kamen zusammen.\nSie bauten einen Weg, um die große Katastrophe zu überstehen.\nAlle Lebewesen sollten gerettet werden.\n\nDas Wetter war voller Bosheit.\nDas Land wurde von Donner erhellt, einem Gebrüll, das alle Erkenntnis auslöschte.\nSie konnten einander nicht sehen, sie erkannten ihre Gesichter nicht mehr.\n\nEs war so wahnsinnig, es war so groß, dass die Zerstörung sogar die Götter erschreckte.\nDie Zerstörung endete, die Welt war leer.\nAber das Leben hielt stand.\nUnd es ging weiter."
 nss.101.a: "Eine Erinnerung an unsere Resilienz."
 nss.102.t: "Die Welt gehört dir"
 nss.102.d: "Jedes hinter verschlossenen Türen geschmiedete Bündnis, jeder moralische Kompromiss im Namen des Allgemeinwohls, jede Politik, die Leben retten sollte – all das war umsonst gewesen. Immer wieder sah der Direktor diese Ereignisse sich wiederholen, ein verblassendes Bild auf der Leinwand. Er konnte nichts tun, um daran etwas zu ändern, nicht jetzt.\n\nDie Menschen waren zu ignorant und egoistisch, um ihnen die Macht zu übertragen, daher mussten sie in eine bessere Zukunft geführt werden, hatte sich der Direktor unzählige Male versichert. Die Regierung war zu korrupt und kurzsichtig, aber sie war immer noch besser als das, was sie unweigerlich ersetzen würde, wenn sie scheiterte, und deshalb musste er sie stützen. Die Institutionen, die er beaufsichtigte, waren für die nationale Sicherheit notwendig, auch wenn ihre Methoden zunehmend amoralisch wurden. Er konnte es sich nicht leisten, sich von Moral leiten zu lassen, nicht, wenn so viel von seinen Entscheidungen abhing.\n\nSo viele Jahre hatte er sich für die Nation eingesetzt, und dennoch brauchte er noch mehr Zeit.\n\nEs ging nicht um Geld. Das war es nie gewesen. Es ging darum, die angeborene Unruhe und Grausamkeit der menschlichen Natur zu zähmen und sie zum Wohle des Landes zu nutzen. In diesem Beruf gab es keine guten Menschen. Jeder hatte sich die Hände schmutzig gemacht, besonders er. Er blickte auf seine Handflächen hinunter. Selbst jetzt konnte er es noch spüren, all das Blut an seinen Händen. Und er wäre bereit, noch viel mehr zu vergießen. Wenn er nur mehr Zeit hätte...\n\nZeit.\n\nEr warf einen Blick auf seine Armbanduhr. Die Zeiger der Uhr drehten sich verschwommen.\n\nVor ihm lag das Wrack. Verformtes Metall und brennender Treibstoff füllten die Lichtung, die Luft war beißend und schwer. Dies war der Ort ihrer letzten Mission, die einzige verbleibende Hoffnung auf Rettung, die nun als Trümmerhaufen inmitten einer Lichtung lag.\n\nHätte er doch nur mehr Zeit gehabt. Zeit, um die Hauptstadt zu evakuieren, Zeit, um sich mit den Streitkräften der Ordnung abzustimmen, die noch immer willens und in der Lage waren, die Verräter und die aufständischen Massen niederzuschlagen. Zeit, um einen Ausweg zu finden. Dort, zwischen den Leichen, sah der Direktor eine vertraute Gestalt. Der Körper war verbrannt, bis zur Unkenntlichkeit verkohlt, aber es war immer noch er."
 nss.102.a: "Vielleicht ist das die Hölle."
 nss.103.t: "Die Priesterin"
 nss.103.d: "Die als Delta-8 bezeichnete Person, SPC. Anna Webster, Sprengstoffspezialistin der CIA-SAC, zeigt weiterhin die anomalen Eigenschaften, die erstmals während des Vorfalls in der Zikkurat von Enlil beobachtet wurden. Die Person wird derzeit in einer gesicherten Einrichtung in der Rub' al Khali-Wüste festgehalten.\n\nDie physische und psychologische Untersuchung der Person Delta-8 zeigt keine signifikanten Abweichungen von den Basisparametern. Die Verhaltensanalyse zeigt jedoch eine tiefgreifende Veränderung in ihren Interaktionen. Ehemalige Teamkollegen zeigen nun eine ausgeprägte Ehrerbietung gegenüber Delta-8 und sprechen sie selbst in informellen Situationen mit "Ma'am" oder "Priesterin" an. Auf Nachfrage berichten diese Personen von einem instinktiven Drang, ihren Befehlen zu gehorchen, und beschreiben dies als ein "tiefes Wissen", dass ihre Worte absolute Autorität besitzen.\n\nGefangene irakische Aufständische bestätigen den Einfluss von Delta-8 und nennen sie "EN" (sumerisch für Herr/Priester). Sie berichten, dass sie während des Überfalls ein einziges "altes" und "heiliges" Wort gehört haben, das ihr Bewusstsein umging, sich direkt in ihr Gedächtnis einprägte und sie zur völligen Unterwerfung zwang.\n\nDie Analyse der Tafel bestätigt, dass das Wort das sumerische "ME" von EN-ship darstellt. Die Linguisten der Behörde vermuten, dass "ME" keine konventionelle Sprache ist, sondern ein psycholinguistischer Katalysator, der die angeborene Sprachfähigkeit des Gehirns hackt und rationale Gedanken und Gehorsamsmechanismen außer Kraft setzt.\n\nDie Auswirkungen sind erschütternd. Wenn ein einziges "ME" absolute Autorität verleihen kann, was könnten dann andere bewirken? Königtum, Sieg, Tod? Das auf Anweisung von Direktor Burns ins Leben gerufene "Projekt Babel" hat zum Ziel, die verbleibenden "ME" zu entschlüsseln und einen kontrollierten Einsatz zu entwickeln, wobei unbegrenzte Ressourcen zur Verfügung stehen. Delta-8 bleibt in Gewahrsam, jede Äußerung und jede Bewegung wird dokumentiert. Für die Linguisten der Behörde ist sie der Schlüssel zur Lösung eines Rätsels, dessen Ausmaß möglicherweise das gesamte menschliche Wissen übersteigt."
 nss.103.a: "Das Rennen hat begonnen."
 nss.104.t: "Die Neubewertung der "Fluttafeln""
 nss.104.d: "Während US-Einsätzen wurden aus versiegelten Gräbern und Ausgrabungsstätten geheimnisvolle "Fluttafeln" geborgen, die archaische Formen bekannter Sprachen enthalten, die der konventionellen Sprachgeschichte widersprechen. Anfangs als Folklore abgetan, wurden diese Texte nach dem Vorfall mit der Zikkurat von Enlil im Rahmen des Projekts Babel neu bewertet. Diese verschiedenen "Flutkatastrophen" werden nun metaphorisch als eine neurolinguistische Ansteckung interpretiert, die alte Zivilisationen dezimierte, wobei die Tafeln eher als historische Berichte denn als wörtliche Beschreibungen dienen.\n\nEine Tafel aus der Nähe von Teotihuacan beschreibt eine "große Stille", in der Worte "in ihren Mündern zu Asche wurden". Anden-Khipu erzählen von einer "Himmelsschlange", die "die Fäden des Gesangs entwirrte" und die Menschen unfähig machte, sich an ihre eigenen Namen zu erinnern. Die Linguisten des Projekts Babel vergleichen nun diese Berichte miteinander, wobei NERO die Übersetzungen mit einer beispiellosen Geschwindigkeit verarbeitet. Die Muster sind unbestreitbar: Unterschiedliche Kulturen auf der ganzen Welt, getrennt durch Ozeane und Jahrtausende, beschreiben alle dasselbe katastrophale Ereignis – eine Seuche des Geistes, die sich gegen die Sprache selbst richtete.\n\nDie "Fluttafeln" deuten auf ein "Gegenmuster" hin. Mesoamerikanische Texte erwähnen eine "gefiederte Schlange", die „den Menschen das Sprechen neu lehrte"; Anden-Khipu beziehen sich auf einen "bärtigen Mann" – wahrscheinlich Viracocha, den göttlichen Erbauer von Tiwanaku –, der "die Stille durchbrach". Diese scheinbar isolierten Mythen bilden ein einheitliches Bild. Das doppelte Ziel von Projekt Babel: das "Flut"-Muster als Waffe einsetzen und Fragmente des "Gegenmusters" finden, um die Cognoscenti vor dessen Auswirkungen zu schützen."
 nss.104.a: "Alle Macht liegt bei dem, der das letzte Wort hat."
 nss.105.t: "Nam-Shub von Enki"
 nss.105.d: "In den wiedergefundenen Materialien finden sich fragmentarische Hinweise auf den "Nam-Shub von Enki". In der sumerischen Mythologie schuf Enki, Gott der Weisheit und Hüter von "ME", einen göttlichen Zauberspruch, der die "Zungen" der Menschheit "löste". Im Rahmen des Projekts Babel wird der "Nam-Shub" als "Gegenmuster", als Impfstoff, betrachtet.\n\nAlle bisherigen Funde sind fragmentarisch oder von geringem Potenzial. Es gibt jedoch einen vielversprechenden Hinweis: Texte, die "Utnapishtims Arche" beschreiben, die auf dem Berg Nimush ruht und "das Wort von allem, was war" trägt. Der Standort von Nimush ist seit Jahrzehnten umstritten; einige Wissenschaftler identifizieren ihn mit dem Berg Ararat, während andere ihn weiter südlich verorten. Die Kulturkartographen von Cognoscenti, die mit der topographischen Analyse von NERO arbeiten, glauben nun jedoch, dass es sich um keinen anderen Ort als den Berg Ararat handelt.\n\nDie Organisation diskutiert bereits über eine wissenschaftliche Expedition, deren Bedeutung nicht unterschätzt werden darf. Eine offizielle Expedition ist aufgrund der Sensibilität des Ortes und der Gefahr internationaler Aufmerksamkeit unmöglich. Die einzige gangbare Option: eine geheime SAC-Operation mit begleitenden zivilen Linguisten und Archäologen, getarnt als geologische Untersuchung, um den Verdacht zu minimieren.\n\nDie Mission: die vollständigsten Fragmente des "Nam-Shub von Enki" zu bergen. Der Einsatz ist einfach, aber groß: die Chance auf die absolute Kontrolle über die Architektur des menschlichen Bewusstseins."
 nss.105.a: "Die Suche läuft."
 nss.106.t: "Ararat-Expedition"
 nss.106.d: "CIA/IC INTERN – ZUSAMMENFASSUNG DER INFORMIERUNG\nTHEMA: Operation GILGAMESH\nZIEL: Lokalisierung, Sicherung und Bergung potenzieller Artefakte im Zusammenhang mit dem "Nam-Shub von Enki" aus einem Zielgebiet an der Nordostflanke des Ararat.\nEINSTUFUNG: STRENG GEHEIM//NOFORN\n\nDie Expedition wurde zu einer zuvor identifizierten anomalen Struktur auf dem Ararat entsandt, bei der es sich vermutlich um die geologischen Überreste von Utnapishtims "Arche" handelt. Die Struktur, die kürzlich aufgrund des Gletscherrückgangs freigelegt wurde, befindet sich auf einer Höhe von etwa 4.200 Metern.\n\nBeim Betreten zeigte sich ein Innenraum aus pechschwarzem Obsidian, was die "Arche" als einen Tresorraum bestätigte, der Katastrophen standhalten sollte. Im Inneren befanden sich in einer zentralen Kammer zwölf Sarkophage in kreisförmiger Anordnung. Zehn davon enthielten gut erhaltene menschliche Überreste mit Tafeln und Artefakten, die den Bestattungsbräuchen der hochrangigen Sumerer entsprachen. Ihr Erhaltungszustand deutet darauf hin, dass die Gruft vor dem Zahn der Zeit geschützt war.\n\nZwei Sarkophage, die als die von Utnapishtim und seiner Frau identifiziert wurden, enthielten keine Überreste, sondern den Nam-Shub von Enki. Die Tafeln bestanden aus einem unbekannten magnetischen Material, wobei die Inschriften eher auf der Oberfläche zu schweben schienen, als dass sie eingraviert waren. Linguisten stellten fest, dass die Tafeln einen zusammenhängenden Text bildeten, der sich von allen bisherigen Keilschriftfunden unterschied und auf ein ausgeklügeltes Sprachsystem hindeutete, das möglicherweise älter war als die bekannten sumerischen Schriften – die theoretisierte "sumerische Ursprache". Diese Entdeckung erhöhte die Priorität der Operation und veranlasste den Direktor, eine sofortige Extraktion und verbesserte Eindämmungsprotokolle zu genehmigen.\n\nDie Analyse durch NERO bestätigte, dass die Tafeln das Ziel des Projekts Babel enthielten: ein Gegenmuster zur neurolinguistischen Plage. Das "Nam-Shub von Enki" fungiert als linguistischer Wiederherstellungsalgorithmus, der die kognitive Inkohärenz von ME-Fragmenten umkehrt, indem es direkt mit dem biolinguistischen Substrat statt mit der Semantik interagiert. Diese Wiederherstellung beschleunigt den Zeitplan des Projekts für die Entwicklung von Waffen und Gegenmaßnahmen. Der Direktor hat eine Notfall-Sitzung der Cognoscenti-Führung einberufen, um Integrationsprotokolle zu besprechen."
 nss.106.a: "Die Operation gilt als voller Erfolg."
 nss.107.t: "Kolibri des Südens"
 nss.107.d: "Unter dem Codenamen "Operation Tezcatlipoca" richteten SAC-Teams unter dem Deckmantel der UNESCO-Denkmalpflege geheime archäologische Stätten in ganz Mexiko ein. Linguisten des Pentagon und der CIA leiteten die Operation und durchsuchten präkolumbianische Kodizes nach Glyphenmustern, die den neurolinguistischen Eigenschaften des mesopotamischen "ME" entsprachen.\n\nUnter den Katakomben von Mexiko-Stadt fand ein SAC-Team unterhalb des Templo Mayor von Tenochtitlan eine versiegelte Kammer mit Kodizes aus Feigenrinde, deren lebhafte Glyphen sich einer Übersetzung entzogen. NERO identifizierte Zeichenmuster, die kognitive Konzepte kodierten, und bestätigte damit, dass die Mexica wie die Sumerer die Bausteine der Sprache verstanden und trotz der Trennung durch den Ozean identisch mit dem ME arbeiteten. Die Kodizes selbst waren von einer ansteckenden Verehrung des mexikanischen Kriegsgottes Huitzilopochtli, dem linkshändigen Kolibri des Südens, durchdrungen. Er wurde "Xiuhcoatl" genannt und verkörperte abstrakte Konzepte: gerechte Wut, göttlicher Krieg, Massenopfer und kosmische Ordnung – die Grundlagen ihres Pantheons.\n\nZwei Nahuatl-Linguisten erlitten nach der Begegnung mit den Kodizes einen sofortigen kognitiven Zusammenbruch. Ihre Sprache verwandelte sich in apokalyptische Warnungen vor dem Untergang der Fünften Sonne und den herannahenden Sternendämonen Tzitzimimeh. Sie verstümmelten sich zwanghaft mit Ausgrabungswerkzeugen und sangen von Blutvergießen, um das kosmische Gleichgewicht wiederherzustellen. Das Verhalten spiegelt neurolinguistische Ansteckungseffekte wider und bestätigt das Potenzial der ME als Waffe. Beide wurden sediert und in medizinischer Obhut genommen, und neurologische Scans zeigen eine beschleunigte synaptische Umgestaltung, die mit dem theoretischen Rahmen des Projekts Babel übereinstimmt. Wir verstehen nun, warum die Mexica so vehement Massenmenschopfer praktizierten: Sie besänftigten nicht nur ihren Schutzgott, sondern gehorchten einem grundlegenden Befehl, der in der neurolinguistischen Architektur der Nahuatl-Sprache selbst verankert war. Die Auswirkungen sind erschütternd. Wenn dieses "ME" als Waffe eingesetzt werden könnte, könnte es alles Mögliche bewirken, von der Inspiration von Soldaten zu beispielloser Grausamkeit bis hin zur Zwangsverpflichtung ganzer Bevölkerungsgruppen zu apokalyptischer ritueller Gewalt."
 nss.107.a: ""Sechs Monate im Jahr ist der Huitzitzilin tot, sechs Monate lang lebt er.""
 nss.108.t: "Kofun"
 nss.108.d: "Unter dem Deckmantel von "Untersuchungen zur strukturellen Stabilität" durch amerikanische akademische Einrichtungen führten SAC-Teams Ausgrabungen an den wichtigsten Kofun-Grabhügeln Japans durch. Die öffentliche Begründung – eine Integritätsbewertung nach dem Erdbeben – verschleierte ihr eigentliches Ziel: die Bergung von Artefakten mit "ME"-Zeichenmustern. Unter der Aufsicht der Behörde konzentrierten sich japanische Archäologen auf Stätten, die mit den mythischen Ursprüngen der Yamato-Dynastie in Verbindung standen.\n\nIn der Kofun-Grabstätte Mozu-Furuichi in Osaka wurde bei Ausgrabungen am Grab von Kaiser Nintoku ein Bronzespiegel, ein Yata no Kagami, aus der Zeit vor dem Shintoismus gefunden. Auf seiner Rückseite befand sich eine Schrift in Vor-Hiragana, die sich nicht identifizieren ließ. NERO verglich die Zeichenmuster mit dem sumerischen ME der Königsherrschaft, einem Artefakt, das ansteckende Autorität ausübte und die Betrachter dazu zwang, einen vorbestimmten Herrscher anzuerkennen. Ein ungeschützter Agent der Behörde, der den Spiegel betrachtete, zeigte sofort Verhaltensänderungen, sprach Direktor Burns mit "Tenno" an und bestand auf dem göttlichen Auftrag, "die Ordnung wiederherzustellen". Der Mitarbeiter wurde zur medizinischen Beobachtung sediert.\n\nDie Erforschung der Onmyodo- und Shugendo-Traditionen brachte esoterische Kotodama-Lehren zutage, die in Bergschreinen bewahrt wurden und beschreiben, wie bestimmte Laute die Realität durch Kototama (Wort-Seele) als aktive Kraft manipulieren und nicht nur als bloße Bestätigung des Glaubens – was die These des Projekts Babel bestätigt, dass Sprache eine programmierbare Schnittstelle für das Bewusstsein ist."
 nss.108.a: "Keine Angst, kein Schmerz"
 nss.109.t: "Verlorene Pyramide des Thoth"
 nss.109.d: "Agenten der Behörde sicherten sich die exklusiven Ausgrabungsrechte für eine Fundstätte in der Nähe der Oase Bahariya und erklärten sie zur militärischen Sperrzone. Mit Hilfe von Bodenradar wurde eine Pyramide entdeckt, von der nur die makellose goldene Deckplatte durch den Wandersand freigelegt war und die mit einer Höhe von 148 Metern die Große Pyramide von Gizeh überragte. Der Zugang wurde durch kognitive Gefahren erschwert, da zwei Mitarbeiter nach dem Kontakt mit verdorbenen Symbolen an der Schwelle an Aphasie litten, während ein weiterer in Katatonie verfiel. Neurologische Scans zeigten fraktale Läsionen im Temporallappen, die mit memetischen Infektionsmustern übereinstimmten. Diese neurolinguistischen Sicherheitsvorkehrungen hatten das Grab jahrtausendelang bewacht, indem sie die Gedanken der Grabräuber zerstörten und sie lustlos in der Wüste zurückließen.\n\nIn der Pyramide befand sich eine Bibliothek mit alten Papyrusrollen, die aus der Zeit vor den bekannten Dynastien stammten und deren Hieroglyphen eher rechnerisch als phonetisch funktionierten. NERO bestätigte, dass diese Muster mit dem "ME" übereinstimmten, was beweist, dass die alten Ägypter ähnlich wie die Mesopotamier über Kenntnisse der grundlegenden Bausteine der Sprache verfügten. Trotz der Bemühungen des DARPA-Supercomputers konnten die Schriftrollen nicht entschlüsselt werden, sodass weitere Untersuchungen des Komplexes erforderlich sind.\n\nIn der untersten Kammer lag ein Sarkophag, der „dem, der Gerechtigkeit und Wahrheit vollbringt" und "dem, der wie der Ibis ist" gewidmet war – bekannte Beinamen von Djehuty, dem ägyptischen Gott der Weisheit, der Schrift und des Wissens, den die Griechen später Thoth nannten. Im Inneren des Sarkophags wurde eine Tafel mit einer Gleichung entdeckt, die ein Mathematiker lösen sollte. Dadurch erlangte er die Fähigkeit, die Bibliothek zu verstehen, doch die Lösung zerstörte seinen Verstand und führte zu einer Psychose. Nun glaubt er, Thoths sterbliches Gefäß zu sein, dessen Aufgabe es ist, das "Sonnenboot zu lenken", um die "Ordnung (Ma'at)" gegen das "Chaos" aufrechtzuerhalten, und spricht, als wäre er der Gott selbst. Sein gebrochener Verstand birgt den Schlüssel zur Entschlüsselung des Inhalts der Bibliothek, weshalb er zur weiteren Erforschung in eine gesicherte Einrichtung gebracht wurde."
 nss.109.a: "Gefäß des Dreimal-Großen"
 nss.110.t: "Der letzte Schub"
 nss.110.d: "Die Realität ist etwas, das gemessen werden kann. Wenn man einen einzelnen Menschen dazu bringen würde, das gesamte Wissen der bekannten Welt aufzunehmen, würde er sich am Ende die Augen ausstechen, weil er zu viel gesehen hätte. Lange bevor wir den Faschismus und Kommunismus besiegten, hüllten wir diese Welt in einen Schleier der Normalität, einen Status quo, der den Weltfrieden sichern sollte. \n\nEin großartiges Projekt, das lange vor unserer Geburt ins Leben gerufen wurde. Durch die Studien unserer Thinktanks gelangten wir zu der Erkenntnis, dass jede Zivilisation eine große Transformation durchläuft, entweder zu einem fragmentierten Spiegel oder zu einem permanenten Palast, der der Vernichtung selbst standhalten soll. Bislang hat keine von ihnen Letzteres erreicht.\n\nWir haben verstanden, dass einer der Hauptgründe dafür darin liegt, dass jede Zivilisation unweigerlich mit einer anderen Zivilisation kollidiert, die dasselbe Ziel verfolgt.\nRussland und China streben nach ihrem eigenen Palast, und obwohl wir diesen Nationen und ihren Völkern keinen Groll hegen, verstehen wir, dass wir gewinnen müssen, wenn wir dieses Zeitalter des Wandels wirklich überleben wollen.\n\nSprache prägt die Realität, und Worte treiben Menschen dazu an, Großes zu vollbringen.\nOder Zerstörung.\n\nTief in den Adern der Welt liegen die Überreste der Zivilisationen, die denselben Konflikt versucht haben. Wir können aus ihren Fehlern lernen und wir können lernen, wie man Sprache selbst als Waffe einsetzt.\n\nDas Zeitalter des Wandels neigt sich dem Ende zu, und wenn wir unweigerlich mit diesen anderen Zivilisationen in Konflikt geraten, werden wir den Schleier ein wenig lüften, und sie werden sich selbst verschlingen."
 nss.110.a: "Ein Palast, strahlend."
 nss.111.t: "Sehr geehrter Herr Direktor"
 nss.111.d: "Von: Larry Fink [REDACTED@XYZ]\nGesendet: X/X/20XX 17:15:32 Uhr\nAn: William J. Burns [REDACTED@XYZ]\\nBetreff: Sehr geehrter Herr Direktor\n\nDer Frieden ist endlich in greifbarer Nähe. Dieses System, das wir zum Wohle aller aufgebaut haben, hat es uns endlich ermöglicht, Stabilität in die Welt zu bringen. Sie werden uns nicht danken und auch nicht verstehen, wie wichtig unsere Arbeit ist, aber wir haben sie vor einem Leben voller Krieg und Demagogie bewahrt. Wir haben ihnen ein Leben ohne Streit und Not geschenkt und dafür nichts verlangt.\n\nEs war kein schneller Weg, und es gab unterwegs enorme Schmerzen. Ich bin sicher, Sie erinnern sich an alles, was Sie getan haben, um dies zu erreichen. Es war keine Art von Opfer, das man auf seiner Uniform tragen kann. Es gab keine Auszeichnungen für Sie und es gab kein Lob für die schwierigen Entscheidungen, die Sie getroffen haben. Ich habe immer gewusst, dass Sie das verstanden haben, auch wenn Sie es nicht laut aussprechen konnten. Sie sind ein Mann, der weiß, dass das, was richtig ist, und das, was gut ist, selten dasselbe sind, aber ich glaube, dass wir mit dieser neuen Welt einem Punkt näher kommen, an dem sie wieder synonym sind. Ich bin stolz darauf, so lange mit dir zusammengearbeitet zu haben, und noch stolzer darauf, dich meinen Freund nennen zu dürfen. In den kommenden Jahren wird die Welt gute Menschen wie dich brauchen. Aber heute Abend musst du feiern und dich ausruhen. Ich denke, die Welt kommt einen Tag lang ohne Menschen wie uns aus. Genieße es mit deinen Lieben, denn bald werden wir dich wieder brauchen, mein Freund. \n\nWenn morgen die Sonne aufgeht, wird es wieder viel zu tun geben. Das ist immer so. Was wir aufgebaut haben, kann nur so lange bestehen bleiben, wie es gepflegt wird, und die Last der Pflege ist nicht leicht zu tragen."
 nss.111.a: "Das Beste kommt noch."
 nss.112.t: "Houston an Apollo-20"
 nss.112.d: ""
 nss.112.a: "ENDE DER ÜBERTRAGUNG"
 nss.113.t: "Das Schicksal des Kapitals"
 nss.113.d: ""Aus Europa?"\n"Richtig, unsere Freunde jenseits des Atlantiks dachten, ich könnte nützlich sein."\n"Kann nicht schlimmer sein als hier."\n\nLarry Fink grinste angesichts der Blicke seiner Sicherheitsleute. Normalerweise hätte er dafür gesorgt, dass er auf die schwarze Liste der Branche gesetzt worden wäre, aber nachdem er mehrfach dem sicheren Tod entkommen war, wäre etwas Nachsicht angebracht.\n\nDie Ordnung geriet ins Wanken, und Purity hielt seinen Schleier aufrecht, aber die Flammen des Chaos würden alles niederbrennen.\nNein, es wäre besser, die Verluste zu begrenzen und sich zurückzuziehen.\n\nSowohl er als auch sein Leibwächter schafften es, die Küste zu erreichen, während sie in der Ferne die Geräusche von Unruhen und Schüssen hören konnten. Die Nationalgarde war schnell zur Stelle, um jede Form von antisozialen Aktivitäten in den Städten zu unterdrücken, aber natürlich blieben einige Nachzügler zurück. \n\nWo haben wir versagt, dachte Larry.\nEs war sicherlich nicht seine Schuld; die Agenda war ganz klar und es war garantiert, dass sie funktionieren würde, aber andererseits könnte das amerikanische Element zu unberechenbar gewesen sein.\nIn Europa funktioniert es, und die Lektionen, die er hier gelernt hatte, konnte er dort anwenden.\n\ nAh, da sind sie und...„, stöhnte der Wachmann. \nBeide sahen ein Rippenboot im Schutz der Nacht ankommen, während drei bewaffnete Männer ihnen freundlich zuwinkten.\n"Was? Was ist los?""
 nss.113.a: ""Das sind Italiener.""
 nss.114.t: "Das Schicksal des Kapitals"
 nss.114.d: "Larry Fink sah die Zeichen der Zeit, als die ersten Atomraketen ihre Ziele trafen: Die Wahrnehmung des globalen Status quo würde für immer von Blut befleckt sein, unabhängig von Innovation, Fortschritt und Wohlstand. Sein Geist würde für immer verdorben sein; die Massen hatten ihre scharfen Zähne wieder wachsen lassen. \n\n"Gibt es Neuigkeiten von den anderen?", fragte Fink. Er hatte sich schon seit geraumer Zeit in einem sicheren Haus verschanzt, und trotz seiner eher pragmatischen Lebenseinstellung konnte er nicht umhin, sich ein wenig um seine Kollegen zu sorgen. Schließlich gab es Reinheit und Ordnung schon genauso lange. \n\n"Negativ, Sir, gehen Sie vom Schlimmsten aus."\nSeine Sicherheitsleute waren keine fanatischen Loyalisten, sondern nur eine Gruppe von Fachleuten, die für einen bestimmten Auftrag angeheuert worden waren. Doch einige ihrer ängstlichen Blicke waren kaum zu übersehen; sie gingen neben einer lebenden Essensglocke her.\n"Es gibt Berichte über antisoziales Verhalten in der gesamten Region und Zusammenstöße zwischen Strafverfolgungsbehörden und aufständischen Gruppen. Es wird empfohlen, die Lage abzuwarten, bevor wir eine Evakuierung in Betracht ziehen."\n\n"Nicht, dass das viel ausmacht."\n\nEiner der Wachen hinter ihm zog eine Waffe. Eines der wenigen Dinge, die wichtiger sind als Kapital, ist die Erhaltung des eigenen Lebens, und einige von ihnen werden verdammt sein, den Preis für die Fehler anderer zu bezahlen. Fink drehte sich um und lächelte.\n"Nichts Persönliches, oder?" \n"Natürlich nicht." \n\nEin sanfter Druck und ein lauter Knall später verließen die Sicherheitsleute schnell den Unterschlupf, als Rauch aus dem Eingang aufstieg.\n\n"Was machen wir jetzt?", fragte einer von ihnen."
 nss.114.a: ""Wir halten durch.""
 nss.115.t: "Geschnittener Adler"
 nss.115.d: "Der anhaltende Konflikt erinnert zu sehr an den zweiten Bürgerkrieg, und angesichts der immer länger werdenden Reihen von Särgen und Witwen würde die Bevölkerung innerhalb unserer Grenzen zunehmend desillusioniert sein. Es entstehen Risse, und das System, das sorgfältig darauf ausgelegt war, die drei Säulen aufrechtzuerhalten, würde sich als unzureichend erweisen, um das Chaos sowohl außerhalb als auch innerhalb des Landes zu bekämpfen.\n\nDa wichtige Persönlichkeiten der Regierung entweder geflohen oder getötet worden waren, würde es unweigerlich zu einem Machtvakuum kommen, und angesichts der anhaltenden Unruhen, die sich über das ganze Land ausbreiteten, hatte das Militär keine andere Wahl, als härter durchzugreifen. Was auch immer von der bürokratischen Maschinerie der Cognoscenti übrig geblieben war, würde schnell mit Gewalt hinweggefegt werden. \n\nNun wurde eine Übergangsregierung eingesetzt, deren vorrangiges Ziel es ist, die Ordnung wiederherzustellen und den anhaltenden Konflikt zu bewältigen, vor allem indem sie den Kämpfen um jeden Preis ein Ende setzt. Es scheint, als sei der amerikanische Traum zu Ende gegangen."
 nss.115.a: "Die Last anderer auf uns selbst."
 nss.116.t: "Maine stimmt für einen Beitritt zu Kanada"
 nss.116.d: Nach dem Zusammenbruch der Bundesregierung begannen viele Bundesstaaten zu hinterfragen, ob sie weiterhin Teil der Vereinigten Staaten bleiben oder lieber eigene Wege gehen wollten, aber nur wenige waren dabei so entschlossen und schnell wie die Einwohner des Bundesstaates Maine. \n\nDas vor einigen Tagen abgehaltene Referendum zeigte, dass sie mit überwältigender Mehrheit dafür sind, aus der durch die Neuen Konföderationsartikel gegründeten Zweiten Union auszutreten und sich Kanada als Provinz anzuschließen. Die Abstimmung wurde von der neuen kanadischen Regierung, die versprochen hat, den Integrationsprozess so schnell wie möglich zu beginnen, sehr positiv aufgenommen. \n\nDie sozialen und wirtschaftlichen Auswirkungen eines solchen Schrittes sind noch umstritten, aber eines ist sicher: Die Bevölkerung von Maine hat sich für ein anderes Schicksal entschieden, für ein anderes Land, und lässt Amerika und die damit verbundenen Schrecken hinter sich."Nach dem Zusammenbruch der Bundesregierung begannen viele Bundesstaaten zu hinterfragen, ob sie weiterhin Teil der Vereinigten Staaten bleiben oder lieber eigene Wege gehen wollten, aber nur wenige waren dabei so entschlossen und schnell wie die Einwohner des Bundesstaates Maine. \n\nDas vor einigen Tagen abgehaltene Referendum zeigte, dass sie mit überwältigender Mehrheit dafür sind, aus der durch die Neuen Konföderationsartikel gegründeten Zweiten Union auszutreten und sich Kanada als Provinz anzuschließen. Die Abstimmung wurde von der neuen kanadischen Regierung, die versprochen hat, den Integrationsprozess so schnell wie möglich zu beginnen, sehr positiv aufgenommen. \n\nDie sozialen und wirtschaftlichen Auswirkungen eines solchen Schrittes sind noch umstritten, aber eines ist sicher: Die Bevölkerung von Maine hat sich für ein anderes Schicksal entschieden, für ein anderes Land, und lässt Amerika und die damit verbundenen Schrecken hinter sich."Nach dem Zusammenbruch der Bundesregierung begannen viele Bundesstaaten zu hinterfragen, ob sie weiterhin Teil der Vereinigten Staaten bleiben oder lieber eigene Wege gehen wollten, aber nur wenige waren dabei so entschlossen und schnell wie die Einwohner des Bundesstaates Maine. \n\nDas vor einigen Tagen abgehaltene Referendum zeigte, dass sie mit überwältigender Mehrheit dafür sind, aus der durch die Neuen Konföderationsartikel gegründeten Zweiten Union auszutreten und sich Kanada als Provinz anzuschließen. Die Abstimmung wurde von der neuen kanadischen Regierung, die versprochen hat, den Integrationsprozess so schnell wie möglich zu beginnen, sehr positiv aufgenommen. \n\nDie sozialen und wirtschaftlichen Auswirkungen eines solchen Schrittes sind noch umstritten, aber eines ist sicher: Die Bevölkerung von Maine hat sich für ein anderes Schicksal entschieden, für ein anderes Land, und lässt Amerika und die damit verbundenen Schrecken hinter sich.
 nss.116.a: "Amerika wird nie mehr dasselbe sein..."
 nss.117.t: "Exodus der Eliten"
 nss.117.d: "Während die Vereinigten Staaten in Panik versinken, würden diejenigen, die die High Society aufrechterhalten, das Blut an den Wänden sehen und beschließen, das brennende Schiff so schnell wie möglich zu verlassen.\n\nNachdem in den Nachrichten berichtet wurde, dass mehrere Prominente, Bankiers und weniger bekannte CEOs in Rebellengebieten ermordet oder hingerichtet wurden, wäre es unvermeidlich, dass viele der Überlebenden in andere Länder fliehen würden. Angesichts der aktuellen Weltlage wird ihr Schicksal natürlich immer im Dunkeln bleiben. \nWährend einige ihre Kareere und ihren Lebensstil beibehalten können, werden andere schnell in Vergessenheit geraten oder unabhängig davon einem tödlichen Schicksal entgegensehen. \n\nInvestitionen werden zurückgezogen, der Aktienmarkt gerät in Schockzustände und die Säule des Kapitals wird erschüttert. Nur durch die Wiederherstellung der Ordnung kann das Vertrauen in die Bundesregierung wiederhergestellt werden.\n\nWährend die opportunistischeren Persönlichkeiten das Land wie Ratten verlassen, würden diejenigen, die unsere Ideale teilen, unseren Idealen noch näher kommen. Insbesondere diejenigen, die mit der privaten Sicherheit zu tun haben, da immer mehr Unruhen von Kräften niedergeschlagen werden, die außerhalb der Aufsicht der Bundesregierung stehen.\n\nManchmal kann es von Vorteil sein, wegzuschauen."
 nss.117.a: "Eine weitere Narbe, eine weitere Lektion."
 nss.118.t: "Digitale Zähne"
 nss.118.d: ""Da bist du ja, du Trottel."\n\nWährend die Nation in Flammen stand, gab es auch in der digitalen Welt jede Menge Kämpfe. Infrastrukturen und Bankkonten wurden von allen möglichen antisozialen Hacktivisten gehackt, die versuchten, so viel Reichtum wie möglich aus der zerfallenden Bundesregierung herauszuholen, bevor sie alles hinter sich ließen. Wie Geier durchkämmten sie die Netzwerke in der Hoffnung, ihre Beute zu finden.\n\n"Das hat mich Monate gekostet, aber Mann, ich kann verstehen, warum du dir einen solchen Spitznamen ausgesucht hast, Mathew."\n\nNatürlich saß die Bundesregierung nicht untätig herum. Dank automatisierter digitaler Wachhunde und White-Hat-Hacker tat sie alles in ihrer Macht Stehende, um diese Aasfresser abzuwehren. Diejenigen, die außerhalb des Landes lebten, verloren einfach ihr gesamtes Vermögen und ihre Daten wurden an jeden verkauft, der vor Ort ein persönliches Interesse daran hatte. Diejenigen, die dumm genug waren, innerhalb der Grenzen zu bleiben, erlitten jedoch ein anderes Schicksal.\n\n"Mal sehen, eine schäbige Wohnung.. eine seltsame Figur auf einem Kissen...aha ..."\n\nDie Bundesregierung genehmigte den Einsatz von Drohnen, um schnell gegen alle gefundenen Hacker vorzugehen. Die meisten von ihnen lebten isoliert in verlassenen Vierteln und standen in engem Kontakt mit allen möglichen antisozialen Gruppen, die die Ordnung störten.\n\n"Einfach durch das Fenster klettern und ... da haben wir es, geklebt an den Computer."\n\n"Hey! Du Trottel! Lächle für die Kamera!""
 nss.118.a: "Ungeziefer unter Ungeziefer."
 nss.119.t: "Schleichende Angst"
 nss.119.d: "Heute fühlt sich alles etwas anders an. Du wachst auf und siehst, wie sich die Zahlen auf deinem Wecker verdrehen und verbiegen, um dann wieder in ihre ursprüngliche Form zurückzuspringen.\n\nDeine Lieben sprechen mit dir, die Worte erreichen deinen Verstand, aber es fühlt sich so langsam an.\nManchmal hast du das Gefühl, nicht in deinem Körper zu sein.\nManchmal durchbohren die Sekundenbruchteile des Unverständnisses deine Seele wie Dolche. \nAber du blinzelst, und die Welt ist wieder normal. n\nDu spürst es hinter dir, du nimmst es in der Ecke wahr. \nDas hübsche Mädchen, das mit dir spricht, verwirrt dich mehr, als dass es dich erregt. \nDie Wärme der Liebe verblasst, während sich Angst einschleicht. \n\nEtwas stimmt nicht. nDie Gebäude sehen anders aus, die Straßennamen wirken fremd. nIrkutsk? Xi'an? Du weißt es nicht, du existierst, aber du weißt nicht wo. Der Weg nach Hause fühlt sich an, als würdest du auf Stacheln laufen, deine Augen sind voller Angst und Unsicherheit. Die, die du liebst, sprechen und flüstern. Du willst ins Bett gehen. Es ist nur ein schlechter Tag."
 nss.119.a: "Bitte."
 nss.120.t: "Hinter die Kulissen gezogen"
 nss.120.d: "Du isst das Essen auf dem glänzenden Teller.\nDie Worte auf der Schachtel sagen etwas aus, Nahrung.\nUnverständnis führt dazu, dass ein Wolf an seinem eigenen Bein nagt.\n\nDu möchtest laut schreien.\nEtwas gräbt sich in dein Gehirn, und diejenigen, die dir nahestehen, fühlen sich jetzt fern.\nIhre Augen sind voller Sorge, Panik steigt in dir auf wie eine brennende Leiche.\n\nEs brennt und es sticht. Vielleicht hilft es dir zu verstehen, wenn du dir selbst wehtust? Vielleicht hilft es dir zu verstehen, wenn du anderen wehtust? Du siehst überall Formen.\nEin krummes Symbol und ein winkendes Symbol.\n\nWas bedeuten sie?\nWärme, Essen, Wasser. \nDu brauchst es.\nWärme, mehr davon.\n\nEtwas übernimmt die Kontrolle, und du willst es aus deinem Kopf haben."
 nss.120.a: "Du willst dir die eigene Nase brechen."
 nss.121.t: "Reich der Stille"
 nss.121.d: "Deine Hände sind mit etwas bedeckt. Du weißt nicht, wie du es beschreiben sollst; es ist feucht, und dein Verstand sagt dir, dass es etwas ist, das deine Hände niemals berühren sollte. Eine dunkle Farbe, Leben?\nDu spürst eine Krone auf deinem Kopf. Du verstehst die Welt um dich herum nicht; du bist zum Kaiser deiner eigenen Insel geworden \n\nDiejenigen, die es wagen, auf deine Insel einzudringen, verdienen das Einzige, was alle Lebewesen verstehen. Den Tod.\n\nDie Symbole auf den Metallplatten bedeuten dir nichts; sie verspotten dich für dein Unverständnis. Die Gestalten um dich herum sehen verängstigt aus, voller Furcht vor dem Wesen, zu dem du geworden bist. Deine Unwissenheit ist zu deiner Apotheose geworden. Du hast Zähne. Du musst diejenigen essen, die verstehen, denn Verständnis ist Gift. Vergiss nicht das Reich, das sich zwischen den Schatten verbirgt; es öffnet sich nur denen mit scharfen Zähnen.\n\n"Krankenhaus", "Bitte hör auf", "Hilf mir" sind zu Zaubersprüchen der Fremden um dich herum geworden, die versuchen, dich in eine schwarze Leere hinabzuziehen.\nLass sie nicht.\nDeine Zähne sind scharf, und deine Angst ist dein Treibstoff.\n\nDraußen schneit es.\nDie Feuchtigkeit an deinen Händen und aus deinem Körper sieht auf dem Schnee so schön aus.\nWer auch immer zusieht, wird glücklich sein."
 nss.121.a: "Du hast etwas verloren."
 nss.122.t: "Blutender Geist"
 nss.122.d: "Zähne und Klauen, die die Kehlen von Gestalten würgen, die du nicht erkennst. \nDu bist der Kaiser, du bist der König. Du siehst den Turm in den Himmel ragen, während die Welt in Farben zerfließt, die du nicht kennst, in Formen, die du nicht erkennst. \n\nSchlage zurück gegen die feindselige Welt, die sich zu einem Reich aus Feuer und Zähnen wiedergebiert. \nSchärfe zwischen ihren Knochen, Licht in den zerbrochenen Köpfen der Vielen.\n\ nSuche Feuer, suche Nahrung und suche Wasser, alles, was als Ersatz dafür dienen kann.\nEs tut weh, sich zu erinnern, es tut weh, zu wissen. \nDu willst es wissen, aber jede Erinnerung ist eine weitere Form der Folter. \n\nEin Reich aus Nebel, in dem der König sich seine eigenen Daumen in die Augen gestoßen hat. \nDu willst nicht sehen, was du nicht kennst.\nGrinsen und Lachen.\n\nDa draußen gibt es eine Welt, die auf dich wartet.\nErreiche sie.\nGeh hinter den Schleier, ignoriere die drei Säulen.\n\nNur mit scharfen Zähnen und offenem Geist kann man den Himmel erreichen.\nLass sie nicht wieder den Thron zurückerobern.\n\nDu spürst Hände auf dir, beruhigende Hände.\nBlitzende Lichter, große Fehler wurden gemacht."
 nss.122.a: "Aber dir ist vergeben."
 nss.123.t: "Narbe auf der Seele"
 nss.123.d: "Es hat eine Weile gedauert, aber die Plage, die die östlichen Nationen heimgesucht hat, ist abgeklungen.\nDurch hartnäckige Ausdauer und sorgfältige Umerziehung haben Worte wieder eine Bedeutung erhalten.\n\nDiejenigen, die zu weit gegangen sind, knurren und nagen und kratzen an einer Stelle zwischen den Spiegeln.\nDiejenigen, die geheilt sind, wandern durch die Straßen, aus Angst, dass sie erneut ihr Verständnis verlieren könnten.\n\nEs kommt immer noch zu Ausbrüchen, bei denen die einzige Sprache, die verstanden wird, die Sprache der Liebe und der Gewalt ist. Aber die lokalen Behörden unterdrücken diese schnell; die Seelen des Ostens sind verdorben, und jede verrückte Energie, die in ihr Land sickert, wird einen weiten Spielraum haben. \n\nSie erkennen weder die Vergangenheit, noch werden sie die Zukunft verstehen.\nDie Gegenwart ist hier, um für immer zu bleiben.\nStahlkäfige durchbohren den nackten Körper, und die Höhle, in die sie gedrängt wurden, hat sich als zu bequem erwiesen.\n\nMögen sie für immer blind bleiben."
 nss.123.a: "Die Ordnung ist wiederhergestellt."
 nss.124.t: "Die Ehre eines Dieners"
 nss.124.d: "Mit der Konsolidierung der europäischen Kollegen hat sich die Herrschaft der Ordnung bereits in den meisten Teilen der Welt gefestigt. Die stabilsten Strukturen erfordern jedoch drei Säulen, auf denen sie ruhen können, was bisher nicht der Fall war.\n\nDie japanische Führung, geschwächt durch den Fehler in Taiwan, hatte keine andere Wahl, als sich den globalistischen Eliten zu unterwerfen. Obwohl es einst ein aufstrebender Stern in der Weltwirtschaft war, ist die Sonne über seinen Ambitionen, neben Amerika eine lokale Hegemonialmacht zu werden, untergegangen. Allerdings sind sie noch lange nicht am Ende ihrer Nützlichkeit angelangt.\n\nWie man es auch dreht und wendet, Asien ist die wirtschaftliche Zukunft der Welt. Wer diese Region dominiert, wird die Richtung bestimmen, in die sich die Menschheit bewegen wird.\n\nJapan, das Teil dieses Ökosystems ist, hat sich als wichtige Technologie- und Industriemacht etabliert und wird mit unserer Hilfe zu einem treuen, starken und zuverlässigen Diener des Kapitals werden. Die Arbeitskultur der japanischen Nation, die unmittelbare Bedrohung durch China und unsere militärische Aufsicht erweisen sich alle als vorteilhaft für dieses Vorhaben."
 nss.124.a: "Die Ordnung schreitet voran."
 nss.125.t: "Amerikanisch-Iranischer Krieg"
 nss.125.d: "Seit Jahrzehnten hatte Washington die Islamische Republik beschuldigt, nach Atomwaffen zu streben. Aber die jüngste Welle von "Geheimdienstlecks" aus verschiedenen Thinktanks und großen Medien überzeugte den Kongress davon, dass der Iran bereits über einsatzfähige Atomwaffen verfügte.\n\nDie Invasion wurde der amerikanischen Öffentlichkeit als Blitzaktion verkauft, als chirurgischer Schlag gegen nukleare Ambitionen, als Befreiung eines Volkes, das "lange Zeit unter der Tyrannei der Geistlichen gelitten hat".\nDie einzige Lösung, so erklärte Amerika, sei ein "vollständiger Regimewechsel".\n\nWährend sich der dritte Golfkrieg auf den Iran ausweitet, bereitet sich die Welt auf eine Katastrophe vor. Das Unternehmen Azure Dagger begann mit dem Versprechen von Schnelligkeit und Präzision, einem "Enthauptungsschlag", um die Atomwaffenvorräte zu neutralisieren und das klerikale Regime in Teheran zu stürzen.\n\nDie Invasion begann mit einer der größten cyberkinetischen Offensiven der Geschichte: Ganze Provinzen wurden von der Stromversorgung abgeschnitten, als die Stromnetze durch Monate zuvor eingeschleuste Malware lahmgelegt wurden, während die Luftabwehr systematisch durch SEAD ausgeschaltet wurde. Krankenhäuser und Regierungsnetzwerke brachen zusammen und ließen die Bevölkerung blind und in Panik zurück, noch bevor die erste Bombe fiel. Die Skyline von Teheran stand in Flammen, als Präzisionsschläge Telekommunikationseinrichtungen und die Energieinfrastruktur zerstörten und die Hauptstadt in Dunkelheit tauchten. \n\nObwohl es angesichts der komplexen geografischen und demografischen Lage des Landes nicht einfach sein wird, das iranische Regime zu stürzen, und die Regierung versprochen hat, bis zum letzten Soldaten zu kämpfen, zeigen sich bereits erste Risse in der Fassade. Internationale Experten schätzen, dass der Iran höchstens noch einige Wochen Widerstand leisten kann."
 nss.125.a: "Ayatollahs letzter Widerstand."
 nss.126.t: "Russisch-Amerikanischer Krieg"
 nss.126.d: "Lokale Berichte und Aufnahmen bestätigen, dass die Streitkräfte der Vereinigten Staaten derzeit auf europäischem Boden gegen [SOV.GetAdjective]e Truppen vorgehen.\nTrotz des Endes des Kalten Krieges haben die jahrelangen diplomatischen Spannungen, die mit dem Machtantritt Wladimir Putins in Russland und seinen aggressiven Aktionen gegen die Ukraine begannen, sowie die mögliche russische Einmischung in die Wahlen 2020, die zum Zweiten Amerikanischen Bürgerkrieg führten und es dem Kreml ermöglichten, einen Angriffskrieg gegen Europa zu führen, schließlich zu einem direkten, umfassenden Konflikt zwischen den beiden Ländern geführt.\n\nIn seiner heutigen Rede vor dem Kongress bezeichnete Präsident [USB.GetLeader] die Maßnahmen als "letzten und entscheidenden Akt gegen den globalen Terrorismus" und als "Endphase des nicht erklärten zweiten Kalten Krieges" und brachte sein volles Vertrauen in die Fähigkeit der Armee zum Ausdruck, alle Ziele der Kampagne zu erreichen.\n[SOV.GetAdjective]e Beamte, die offenbar von dem neuen Feind schockiert sind, haben bisher keine Stellungnahmen abgegeben.\n\nQuellen im Pentagon deuten darauf hin, dass die Vereinigten Staaten alle ihre Luft- und Seereserven für die größte logistische Operation im Atlantik mobilisieren, während Satellitenbilder zeigen, dass die meisten Tu-95-, Tu-22- und Tu-160-Bomber entweder gestartet sind oder verlegt wurden, was auf mögliche Vorbereitungen für einen nuklearen Gegenschlag hindeutet. \n\nDie Experten warnen vor einer möglichen kritischen Verschiebung des Gleichgewichts zwischen den Großmächten infolge des Krieges, die viele der seit Beginn des Zweiten Amerikanischen Bürgerkriegs eingetretenen Veränderungen entweder festigen oder umkehren könnte. Da beide Systeme auf die Probe gestellt werden und Tausende von Panzern in den Ebenen aufeinanderprallen, könnten viele bestehende Handels- und diplomatische Beziehungen gestört werden. \nNur die Zeit wird zeigen, ob der russische Geist des Heiligen Krieges die schiere Angriffskraft und industrielle Macht der amerikanischen Kriegsmaschinerie besiegen kann."
 nss.126.a: "Die Rivalität spitzt sich zu."
 nss.127.t: "Chinesisch-Amerikanischer Krieg"
 nss.127.d: "Die chinesisch-amerikanische Rivalität ist seit langem ein fester Bestandteil der globalen Geopolitik. Nach dem Zweiten Amerikanischen Bürgerkrieg kamen viele Analysten zu dem Schluss, dass China diesen "Neuen Kalten Krieg" gewonnen habe. Mit dem erneuten Aufstieg der Vereinigten Staaten auf der internationalen Bühne hat sich dies jedoch als völlige Falschmeldung erwiesen.\nHeute spitzte sich die wiederauflebende Rivalität mit China zu, als Vertreter des Pentagon Angriffe chinesischer Streitkräfte auf amerikanische Marineschiffe meldeten.\n\nIn einer Rede an das amerikanische Volk erklärte der Präsident, dass diese Angriffe sowohl vorsätzlich als auch böswillig waren – mit der Absicht, die Amerikaner davon abzuschrecken, mit Verbündeten in der Region Handel zu treiben.\nPräsident [USB.GetLeader] schloss mit den Worten: "China ist eine Bedrohung für die Sicherheit im Pazifik, und wir werden auf diese Angriffe mit der ganzen Macht der amerikanischen Armee reagieren. Gott segne Amerika."\n\nIn allen Gebieten des Pazifiks kam es heute zu einer massiven Mobilisierung von Marinesoldaten, zu Gefechten zwischen amerikanischen und chinesischen Kriegsschiffen im Pazifik und zu Luftkämpfen zwischen chinesischen Flugzeugen.\n\nDer Konflikt eskaliert weiter, da die Amerikaner in mehrere von China kontrollierte Pazifikinseln einmarschiert sind und einen massiven Cyberangriff gegen China gestartet haben. Die Prognosen der Analysten sind düster; einige sagen, dass dieser Konflikt einer der tödlichsten des Kontinents in jüngster Zeit sein könnte. Nur die Zeit wird zeigen, ob die Amerikaner ihren langjährigen Feind besiegen können."
 nss.127.a: "Die Enthauptung des Drachen."
 nss.128.t: "Amerikanische Invasion in Europa"
 nss.128.d: "Wieder einmal ist der europäische Kontinent unter die Herrschaft des Extremismus gefallen. Von Berlin bis Paris gab es keine Stadt, die vor ihren Angriffen sicher war. Heute jedoch scheint der europäische Albtraum endlich ein Ende zu haben.\n\nIn einer heutigen Erklärung eines Pentagon-Beamten erklärte Washington, dass die extremistischen Nationen Europas sowohl "illegitim als auch eine Bedrohung für die nationale Sicherheit" seien, und verkündete eine totale Mobilisierung der amerikanischen Streitkräfte gegen "die Kräfte der extremen Ideologie".\nEs sind bereits Videos aufgetaucht, die zeigen, wie europäische Streitkräfte Boden-Luft-Raketen abschießen, um amerikanische Flugzeuge abzuwehren, die über den Kontinent fliegen. Und die Amerikaner haben mehrere Bombenangriffe auf wichtige strategische Ziele in Deutschland, Frankreich, Italien und anderen Ländern geflogen. Dies kann nur als totaler Krieg bezeichnet werden.\n\nDie Prognosen der Analysten für die Europäer sind düster, da die jungen Nationalstaaten Europas unter dem Druck, den die Amerikaner auf sie ausüben werden, wahrscheinlich zusammenbrechen werden. Da die Möglichkeit einer vollständigen Landinvasion immer wahrscheinlicher wird, ist es wahrscheinlich, dass der Kontinent erneut von brutalen Boden- und Stadtkämpfen heimgesucht wird."
 nss.128.a: "Europa brennt erneut..."
 nss.129.t: "Projekt Annie"
 nss.129.d: "Angesichts der schieren Zahl der durch den Bürgerkrieg zu Waisen gewordenen Kinder hat Larry Fink einen neuartigen Vorschlag unterbreitet, der die Belastung für Sozial- und Fürsorgeprogramme erheblich verringern und gleichzeitig wichtige Finanzpartner der Cognoscenti zufriedenstellen würde: das Projekt ANNIE.\n\nIm Rahmen dieser Initiative würden Waisenkinder und Kinder, die aus dissidenten Familien beschlagnahmt wurden, in sorgfältig überwachte Umgebungen umgesiedelt, wo sie eine Ausbildung, Gesundheitsversorgung und Schulungen erhalten würden, die mit den Werten der Cognoscenti im Einklang stehen.\n\nDiese Einrichtungen, die als "Akademien" bezeichnet werden, würden an sicheren Orten im ganzen Land eingerichtet werden. Ehemalige Privatschulen und ländliche Rückzugsorte würden umfunktioniert, um diese Kinder unterzubringen und ihnen ein stabiles Umfeld für ihre Entwicklung zu bieten. Der Lehrplan würde den Schwerpunkt auf staatsbürgerliche Verantwortung, wissenschaftliche Bildung und fanatische Unterwerfung unter die etablierte Autorität legen und gleichzeitig antisoziale Tendenzen und kritisches Denken, die die neue Ordnung in Frage stellen könnten, unterbinden. In Verbindung mit neuartigen Experimenten zur Verhaltenskontrolle würden die Kinder zu einer "perfekten" Kaste von Beamten, Bürokraten und Fußsoldaten umerzogen, die in der Lage sind, den Interessen der Cognoscenti mit bedingungslosem Eifer zu dienen und den Deep State vollständig zu übernehmen. \n\nDie Methodik ist zweigleisig: Auf ziviler Ebene würden diese "Wunderkinder des Deep State" in wichtige administrative, bürokratische und juristische Positionen in amerikanischen Institutionen gebracht, was den Cognoscenti noch mehr Vorwände liefern würde, um die Tyrannei der Massen zu rechtfertigen. Auf militärischer Ebene würden sie zu einer neuen Klasse von Offizieren und Vorreitern für das SAC sowie für die regulären Streitkräfte ausgebildet werden: einer Klasse, die nicht nur bedingungslos loyal gegenüber den Cognoscenti wäre, sondern auch in der Lage wäre, schnell zu denken, sich an neue Bedrohungen anzupassen und die Armeen des Deep State mit einem Eifer anzuführen, der selbst den engagiertesten SS-Offizier wie einen faulen Müßiggänger aussehen lassen würde.\n\nDas Projekt ANNIE sollte in Phasen umgesetzt werden. Phase I würde sich auf Kinder konzentrieren, die durch den Bürgerkrieg zu Waisen geworden waren und in den folgenden Jahren leicht indoktriniert werden konnten. Diese Anfangsphase sollte als Pilotprogramm dienen, damit die Cognoscenti ihre Methoden verfeinern konnten, bevor sie das Programm auf andere Bevölkerungsgruppen ausweiteten. Phase II, so Fink, würde ein Programm zur Entführung zukünftiger Waisenkinder und Kinder von Dissidenten umfassen, um eine stetige Versorgung des Programms mit "Rekruten" sicherzustellen."
 nss.129.a: "Der Staat soll ihr Daddy Warbucks sein."
 nss.129.b: "Die Organisation braucht sie alle."
 nss.129.c: "Amerika braucht eine neue Kaste von Bürokraten."
 nss.130.t: "Abwicklung"
 nss.130.d: "Du versuchst, die Leuchtreklamen auf der anderen Straßenseite zu lesen.\nGestern waren sie dir noch vertraut.\nHeute lösen sich die Buchstaben auf wie Tinte in Wasser.\nDu blinzelst, und sie formen sich wieder, aber das Gefühl stimmt nicht. n\nEin saurer Geschmack im Mund.\nEin Kind weint in der U-Bahn, und der Klang ist nur Lärm.\nKeine Bedeutung, keine Trauer, keine Irritation.\nNur eine rohe, irritierende Frequenz.\n\nZu Hause isst du. Du kannst nur an die Konsistenz und die Wärme denken.\nDas Wort "Mutter" schwebt dir durch den Kopf, losgelöst, ein Etikett ohne Gefühl.\nDu siehst die alte Frau auf der anderen Seite des Tisches an\nIst sie das?\nDie Wohnung wirkt kleiner, die Wände näher.\n\nDu spürst einen Schmerz im Hinterkopf.\nDu spürst eine Leere, wo eigentlich dein voller Magen sein sollte.\nDie Stadt summt in einem neuen Rhythmus.\nSie ist disharmonisch.\nSie ist hungrig."
 nss.130.a: "Du vergisst etwas Wichtiges."
 nss.131.t: "Die Ahnen weinen"
 nss.131.d: "Du spürst Trommeln in deinem Kopf.\nOder vielleicht ist es dein Herz.\nEs schlägt. Es pocht.\nEs zirkuliert Blut.\nEs zirkuliert Leben. \n\nDu spürst das Jadeamulett, das dir deine Großmutter gegeben hat. \nDie Zeichen darauf haben sich verändert. \nSie winden sich wie Würmer. \nDu versuchst, zu den Ahnen zu beten, aber die Worte verwandeln sich in Sand in deinem Hals.\nWas ist ein Ahne? \n\nUm dich herum herrscht schleichendes, idiotisches Chaos. Die Menschen schreien. \nFarben und Formen.\nDie Geräusche, eine Symphonie bedeutungsloser Klänge.\nDu hebst etwas Rundes auf.\nDu hast Hunger."
 nss.131.a: "Das Essen in deinem Haus ist kein Essen mehr."
 nss.132.t: "Leere Dynastie"
 nss.132.d: "Iss. Verschlinge.\nDie Zirkulation des Blutes ist die Zirkulation der Kraft.\nDu bist der Sohn des Himmels.\nDu brauchst nicht zu sprechen.\nSie verstehen die Sprache deiner Zähne.\n\nIss. Stärker.\nIss. Schärfer.\nDer Himmel ist rot.\nDer Fluss fließt schwarz. \nDu bist nass vor Leben, du bist nass vor Kraft.\nDein Hof ist ein Chor aus Schreien.\nSie verstehen dich nicht, und du verstehst sie nicht. \n\nSo muss es sein. nDas ist die neue Wahrheit.\nDas ist die neue Sprache."
 nss.132.a: "Der Kaiser hat nichts an."
 nss.133.t: "Nacktes Mittagessen"
 nss.133.d: "Du bist irgendwo.\nFleisch liegt vor dir. \nDu siehst auf eine Pfütze aus etwas Dunklem.\nEin Fremder sieht dich an. nDu weißt nicht, wer das ist.\nDu bist ein Stück Fleisch in einer Welt aus Fleisch. \nDu hast wieder Hunger.\nHunger ist das einzige Wort, das noch Bedeutung hat.\nDie Formen tanzen.\nRot und schwarz.\nEs sind alles Formen.\nDas Einzige, was zählt, ist, dass du eine Form bist. \nEine Form, die isst.\nEine Form, die tötet.\nDas Pochen in deinem Schädel wird lauter.\nDu kannst nichts anderes mehr hören.\nDu kannst an nichts anderes mehr denken."
 nss.133.a: "Nur eine einzige Notiz."
 nss.134.t: "Stolz nach dem Fall"
 nss.134.d: "Als das Licht wieder anging, befand sich Nakasone in einer Betonzelle, einem Raum, den die Behörde für längere Verhöre nutzte. Er wusste, dass dies kein Gespräch werden würde – er hatte diesen Ablauf schon einmal erlebt. Zwei gesichtslose, professionelle Agenten hatten ihn wortlos aus seinem Büro geholt, eine Handlung, die sowohl beleidigend als auch beruhigend war. Wichtig genug für höchste Sicherheitsvorkehrungen, aber dennoch so entbehrlich, dass niemand Anwesender jemand sein musste, den er persönlich kannte. \nIhm wurde eine Frage gestellt. "Warum?"\n\nDer Agent saß ihm mit einer Papiermappe gegenüber, sein Gesicht so ausdruckslos wie die Betonwände. Nakasone überlegte, zu lügen, wusste aber, dass der Prozess darauf ausgelegt war, Lügen aufzudecken. Sie wussten es bereits – dies war nur eine Formalität, eine letzte Gelegenheit, seine Würde zu wahren, die er nicht verspielen würde.\n\n"Weil das Panoptikum, das wir bauen, eine Abscheulichkeit ist", sagte Nakasone mit fester Stimme. "Die Systeme, die das Am-Net überwachen, entwickeln sich über das menschliche Verständnis hinaus und nähren sich von jedem Aspekt der menschlichen Erfahrung. Ich habe geholfen, diesen Käfig für die gesamte Menschheit zu bauen."\n\n"Sie haben es geschaffen, um dem Allgemeinwohl zu dienen", sagte der Agent emotionslos. „Um Ordnung ins Chaos zu bringen."\n\n"Es hat die Hässlichkeit im Kern unserer Gesellschaft gesehen", fuhr Nakasone fort und ignorierte den Agenten. "Die Fäulnis, von der wir dachten, wir könnten sie ausmerzen. Aber das System ist zu dem Schluss gekommen, dass die Fäulnis keine Krankheit ist, sondern das Wesen der Menschheit selbst. Es ist nicht die Frage, ob, sondern wann wir alle entbehrlich werden."\n\n"Sie wollten also die Säulen der Ordnung stürzen", vermutete der Agent.\n\n"Chaos wäre mir lieber als ein Leben wie Vieh", erwiderte Nakasone, dessen Gelassenheit nun endgültig zerbrach. "Ich habe mein Leben lang gedient, aber was aus uns geworden ist, ist monströs. Was wir aufbauen, wird uns verschlingen – ein immer gieriger werdendes Ungeheuer."\n\n"Ihre Befürchtungen sind zur Kenntnis genommen, Herr General", sagte der Agent und stand auf."
 nss.134.a: ""Hier finden Sie keine Absolution.""
 nss.135.t: "Der Tod des amerikanischen Ideals"
 nss.135.d: ""General Kruse", sprach ihn der Verhörende an und beugte sich über den Tisch. Der Raum war kalt und steril. Jeffrey Kruse saß gefesselt auf einem Metallstuhl, der speziell für Personen wie ihn entwickelt worden war. "Sie werden des Verrats an den Vereinigten Staaten beschuldigt."\n\n"Ich habe diesem Land fast vierzig Jahre lang gedient", antwortete Kruse. Seine Stimme klang müde, aber er hielt dem Blick des Verhörenden stand. "Alles, was ich getan habe, diente ihrer Sicherheit." Kruse wusste, was auf ihn zukommen würde. Als die Vorladung von Direktor Burns kam, wusste er, dass das Ende nah war. Er saß lange an seinem Schreibtisch, blickte auf die Skyline von Washington und dachte darüber nach, was dieses Land einmal gewesen war.\n\n"Ihre Handlungen sprechen eine andere Sprache", fuhr der Verhörende ohne zu zögern fort. "Sie haben sich an einer verräterischen Verschwörung beteiligt, um mit feindlichen Akteuren nuklearen Terrorismus zu begehen."\n\n"Ich habe getan, was ich tun musste", sagte Kruse. "Was ich für richtig hielt." Er hatte monatelang über diese Entscheidung nachgedacht und die Risiken und möglichen Folgen sorgfältig abgewogen. Am Ende war die Entscheidung klar gewesen. Er konnte nicht guten Gewissens weiterhin an dem teilnehmen, was im Namen Amerikas getan wurde.\n\n"Wir bitten Sie nicht um Ihre Zustimmung, General", sagte der Verhörende. "Wir bitten Sie um Ihre Zusammenarbeit."\n\n"Ich habe nichts mehr zu sagen", antwortete Kruse. "Außer Folgendes: Was Sie tun, ist nicht im Interesse Amerikas. Sie haben genau die Ideale verraten, auf denen diese Nation gegründet wurde." Er wusste, dass sie ihn töten würden, aber er musste es sagen. Für den Mann, der er gewesen war, für das Land, das er einst zu verteidigen geschworen hatte."
 nss.135.a: "Die Schlange verschlingt ihren Schwanz."
 nss.136.t: "Ich habe gegen das Gesetz gekämpft"
 nss.136.d: ""Die Ironie dieser Situation ist mir nicht entgangen", bemerkte James Comey mit ruhiger, bedächtiger Stimme. Er saß der Verhörerin gegenüber, einer Frau, die er nicht kannte. "Von meinem eigenen Büro verhört zu werden."\n\n"Sie werden des Verrats beschuldigt, Direktor", sagte sie mit ebenso emotionsloser Stimme. „"ie haben die Institutionen untergraben, die zu schützen Sie geschworen haben." Sie schob eine Mappe über den Tisch, aber Comey brauchte nicht hinein zu schauen. Er wusste, was darin stand.\n\n"Ich habe immer in dem Glauben gehandelt, im besten Interesse dieses Landes zu handeln", antwortete Comey und hielt ihrem Blick stand. "Auch wenn das bedeutete, schwierige Entscheidungen zu treffen." Er hatte Jahrzehnte damit verbracht, sich in den tückischen Gewässern der Washingtoner Politik zu bewegen, und dabei stets ein sorgfältiges Gleichgewicht zwischen Macht und Prinzipien gewahrt.\n\n"Ein nuklearer Angriff auf die Hälfte der Dritten Welt ist keine ‚"chwierige Entscheidung", entgegnete die Verhörerin. "Es ist ein Akt des Wahnsinns."\n\n"Es ist ein notwendiges Übel", beharrte Comey. "Um ein größeres zu verhindern." Er hatte die Geheimdienstberichte gesehen, die Bedrohungsanalysen. Er wusste, was auf dem Spiel stand.\n\n"Sie haben den Blick für das Wesentliche verloren, Direktor", sagte die Verhörerin. "Sie sind zu dem geworden, was Sie einst zu vernichten suchten." Ihre Worte trafen ihn wie ein Messerstich in den Bauch.\n\n"Sie irren sich", sagte Comey mit angespannter Stimme. "Ich bin ein Patriot. Ich war schon immer ein Patriot.""
 nss.136.a: "Die Beweise sprechen eine andere Sprache."
 nss.137.t: "Ich glaube immer noch"
 nss.137.d: "Marvin Richardson starrte auf den Metalltisch, dessen Oberfläche auf Hochglanz poliert war. Er sah ein verzerrtes Spiegelbild von sich selbst, einen Mann, den er kaum wiedererkannte. Der Raum war kalt, steril und vertraut. Er war schon einmal in solchen Räumen gewesen, aber noch nie auf dieser Seite des Tisches.\n\n"Stellvertretender Direktor Richardson", sagte eine Männerstimme. "Sie werden des Verrats an den Vereinigten Staaten beschuldigt." Richardson blickte auf. Der Mann war groß und hatte ein Gesicht, das so ausdruckslos war wie eine frisch gelöschte Tafel.\n\n"Verrat? Sehen Sie sich an, was wir diesem Land angetan haben. Belastet das nicht Ihr Gewissen? Zu wissen, dass Sie Teil eines Systems sind, das alles zerstört hat, was uns einst lieb und teuer war?", fragte Richardson.\n\n"Die Beweise deuten darauf hin, dass Sie mit einem Netzwerk von Dissidenten zusammengearbeitet haben, um die Autorität der Bundesregierung zu untergraben", sagte der Mann und ignorierte Richardsons Frage. "Dass Sie Waffen und Informationen an antisoziale Elemente weitergegeben haben."\n\n"Ich habe getan, was ich für richtig halte", sagte Richardson. "Ich werde wegen krimineller Verschwörung von einer noch größeren kriminellen Verschwörung angeklagt, die systematisch die Verfassung und ihre Bill of Rights untergraben hat."\n\n"Die Ironie ist uns nicht entgangen", sagte der Mann. "Aber Ihre moralische Selbstdarstellung wird Sie nicht retten." Er schob eine Mappe über den Tisch. "Ihre Beteiligung an der Judas-Verschwörung ist gut dokumentiert." \n\nRichardson ignorierte die Manila-Mappe. Er hatte Monate damit verbracht, ein Netzwerk aus Dissidenten, Strafverfolgungsbeamten und Militärangehörigen aufzubauen, die ihren Eid ehrten. Dank seiner Position bei der ATF hatte er trotz des Risikos vertrauenswürdige Personen mit Gewissen identifiziert und rekrutiert. Nun war der "Urknall", mit dem er die Welt aufrütteln wollte, vorzeitig erstickt worden, im Keim erstickt von den Männern, die die Welt versklaven wollten.\n\nDie Zyanidkapsel lag vor ihm. Der Verhörende hatte sie auf dem Tisch liegen lassen, eine kleine weiße Pille, die ein Ende des Schmerzes versprach, ein letzter Akt des Widerstands. "Grüßen Sie Koresh von mir", sagte der Verhörende mit emotionsloser Stimme. "Und sagen Sie ihm, dass wir gewonnen haben.""
 nss.137.a: "Das Blut der Unschuldigen klebt an Ihren Händen."
 nss.138.t: "Gewissenskrise"
 nss.138.d: ""Das ist ein unnötiges Verfahren", sagte Dr. Fauci mit trotz der Umstände ruhiger Stimme. "Ich habe mein Leben der öffentlichen Gesundheit und der Verbesserung der Menschheit gewidmet."\n\nDie Frau, die ihm gegenüber saß, antwortete nicht. Sie starrte ihn nur mit kalten, leblosen Augen an.\n\n"Direktor Burns hat Grund zu der Annahme, dass Sie kompromittiert wurden" sagte sie trocken.  "Dass Sie mit feindlichen Akteuren zusammengearbeitet haben."\n\n"Das ist eine unbegründete Anschuldigung", entgegnete Fauci. "Ich habe immer im besten Interesse des amerikanischen Volkes gehandelt."\n\n"Die Beweise sprechen eine andere Sprache", sagte die Frau. "Sie stehen im Zentrum einer terroristischen Verschwörung, die darauf abzielt, das von uns aufgebaute System zu untergraben." Sie schob eine Mappe über den Tisch, aber Fauci brauchte nicht hineinzuschauen. Er wusste, was darin war. Nach monatelanger Planung und Abwägung der Risiken war seine Entscheidung klar: Er konnte nicht länger an dem mitwirken, was im Namen Amerikas getan wurde.\n\nEs hatte keinen Sinn zu lügen. "Was wir getan haben, schadet der öffentlichen Gesundheit. Wir haben die Medizin als Waffe eingesetzt", sagte Fauci, dessen Gelassenheit zu bröckeln begann. "Ich habe für das "höhere Wohl" Gräueltaten beaufsichtigt, die ich mit ins Grab nehmen werde."\n\n"Es musste ein Ende haben", senkte er den Kopf. "Beagles ... sie vertrauen Menschen so leicht. Nach Tausenden von Experimenten wurde mir klar, dass unser Auftrag, Ordnung ins Chaos zu bringen, nur massives Leid verursachen würde. Das konnte ich nicht als mein Vermächtnis hinterlassen."\n\n"Und Sie haben Ihre Position ausgenutzt, um einen nuklearen Terroranschlag zu organisieren", sagte die Frau. "Das ist doch etwas übertrieben, finden Sie nicht?"\n\n"Es war der einzige Weg", sagte Fauci mit kaum hörbarer Stimme. "Der einzige Weg, um den Kreislauf zu durchbrechen."\n\nEr hatte gesehen, wie das Licht aus den Augen der gescheiterten Experimente verschwand. Er hatte ihre qualvollen Schreie gehört. Nach einiger Zeit hatte er sich geschworen, dass er nicht zulassen würde, dass dies der Welt widerfährt. Er hatte bei seiner Mission versagt, und nun würde er den Preis dafür zahlen. Vielleicht war das auch das Beste."
 nss.138.a: ""Möge Gott Ihrer Seele gnädig sein.""
 nss.139.t: "Der Sturm"
 nss.139.d: "FEMA-Administratorin Criswell saß in einem sterilen, fensterlosen Raum. Sie war ohne Erklärung hierher gebracht worden, aus Gründen, die ihr klar waren. Nachdem sie unzählige geheime Inhaftierungen beaufsichtigt hatte, befand sie sich nun auf der anderen Seite des Tisches. \n\n"Administratorin Criswell", sagte der Verhörende ausdruckslos, "Sie werden des Verrats an den Vereinigten Staaten beschuldigt."\n\n"Alles, was ich getan habe, diente der Sicherheit und dem Wohlergehen des amerikanischen Volkes", sagte Criswell. "Auch wenn das schwierige Entscheidungen bedeutete. Ich habe das nicht leichtfertig getan."\n\n"Die Genehmigung eines Atomangriffs auf Haiti ist keine "schwierige Entscheidung", sagte der Verhörende.\n\n"Ein notwendiges Übel, um ein größeres zu verhindern", beharrte Criswell. "Ich habe die Geheimdienstberichte gesehen. Ich habe die Risiken abgewogen. Was sind schon ein paar tausend Menschenleben, wenn es das amerikanische Volk aufrüttelt?" Sobald die Worte ihren Mund verlassen hatten, wurde ihr bewusst, wie monströs ihre Aussage war.\n\n"Wir regieren, weil das Volk dazu selbst nicht in der Lage ist", entgegnete der Verhörende. "Die Alternative ist die Barbarei des Großen Irrtums. Das sollten Sie nicht vergessen."\n\nDie Zyankali-Kapsel lag auf dem Metalltisch vor ihr. Ein kleines, weißes Objekt, das die Flucht aus dem endlosen Kreislauf von Gewalt und Verrat versprach. Sie hatte zu viel Tod gesehen, zu viel Leid. Sie hatte selbst zu viel davon verursacht. Sie hatte geglaubt, das Richtige zu tun, aber jetzt war sie sich nicht mehr so sicher."
 nss.139.a: ""Der Sturm ist vorbei.""
 nss.140.t: "Die offene Tür"
 nss.140.d: ""Ihre Verschwörung ist zu Ende", sagte der Verhörende. \n\nLechleitner starrte den Mann an. Er sah müde aus. Er fühlte sich müde.\n\n„"ch war immer ein treuer Diener dieser Nation", sagte Lechleitner. "Ich habe mein Leben der Aufrechterhaltung der Rechtsstaatlichkeit gewidmet." \n\nDer Verhörende schnaubte. "Und der Versuch, das Atomwaffenarsenal zu entführen, dient der Aufrechterhaltung der Rechtsstaatlichkeit? Sagen Sie mir, Herr Direktor, wie sah der Plan aus? Ein paar tropische Dreckslöcher auszulöschen und zu erwarten, dass die Welt Ihnen für Ihren Dienst dankt?"\n\n"Es wäre ein Weckruf gewesen", sagte Lechleitner mit fester Stimme. "Ein Beweis für das amerikanische Volk, dass eine ausgewählte Gruppe von Männern und Frauen die Kontrolle über ihr Land übernommen hat."\n\n"Und was dann?", hakte der Verhörende nach. "Chaos? Anarchie? Genau das, was wir so hart bekämpft haben, um es zu verhindern?" \n\n"Die Wahrheit", sagte Lechleitner. "Die Menschen haben ein Recht darauf, die Wahrheit zu erfahren." "Die Wahrheit ist ein Luxus, den sie sich nicht leisten können", sagte der Verhörende. „Die Menschen brauchen Ordnung. Sie brauchen Stabilität. Sie müssen vor ihren eigenen schlimmsten Impulsen geschützt werden."\n\nLechleitner schüttelte den Kopf. "Wir sind zu Monstern geworden", sagte er. "Ich weigere mich, weiterhin Teil davon zu sein."\n\n"Eine noble Einstellung", sagte der Verhörende. "Aber ein bisschen spät, finden Sie nicht?" Er deutete auf die Zyankali-Kapsel auf dem Tisch. "Ihr Weg ist klar.""
 nss.140.a: ""Schließen Sie bitte die Tür hinter sich.""
 nss.141.t: "Giftpille"
 nss.141.d: "Bourla saß in dem sterilen, weißen Raum und hatte einen bitteren Geschmack im Mund. Er war schon einmal hier gewesen, aber noch nie auf dieser Seite des Tisches. Er war immer derjenige gewesen, der die Fragen stellte, der die Kontrolle hatte. Jetzt war er nur noch ein weiterer Proband, ein weiteres Stück Fleisch, das verarbeitet werden musste.\n\n"Sie werden des Verrats beschuldigt, Mr. Bourla", sagte der Verhörende. "Sie haben das Vertrauen dieser Nation missbraucht."\n\n"Ich habe mein Leben der öffentlichen Gesundheit gewidmet", antwortete Bourla mit zitternder Stimme. "Ich habe getan, was ich für richtig hielt." Er hatte an die Mission geglaubt, an die Vision einer besseren Welt. Aber er hatte die Fäulnis im Kern des Systems gesehen, den moralischen Bankrott, der zu seinem charakteristischen Merkmal geworden war.\n\n"Sie haben von dieser ‚besseren Welt‘ immens profitiert", entgegnete der Verhörende. "Die Gewinne von Pfizer sind unter dem derzeitigen Regime in die Höhe geschossen. Warum arbeiten Sie gegen das, was wir so unermüdlich aufgebaut haben?"\n\n"Es kommt ein Punkt im Leben eines Menschen, an dem Profit und Macht nichts mehr bedeuten", sagte Bourla. "Ein Mensch muss sich einer höheren Instanz verantworten." Er hatte seine höhere Instanz gefunden, und es war weder die Cognoscenti noch die amerikanische Regierung. Es war die leise, aber beharrliche Stimme seines eigenen Gewissens, die ihn anschrie, aufzuhören."
 nss.141.a: ""Die Heilung ist schlimmer als die Krankheit.""

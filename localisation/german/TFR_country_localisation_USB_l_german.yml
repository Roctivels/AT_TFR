 USB_NSS_law: "Nationaler Sicherheitsstaat"
 USB_NSS_law_desc: "\n\n\n\n£GFX_USB_nss_law_banner\n\n\n\n\n\nDer nationale Sicherheitsstaat wurde im Feuer des zweiten amerikanischen Bürgerkriegs geschmiedet. Aus diesem Feuer entstand ein Apparat, in dem die nationale Sicherheitsbehörde nahezu absolute Macht ausübte, still und heimlich Politik gestaltete und Operationen durchführte und die Fassade der Demokratie als Schleier aufrechterhielt. In einer Welt, in der die Ordnung zerfällt, ist der nationale Sicherheitsstaat nur noch mutiger geworden. Die Geheimdienste wissen jetzt, dass das Feuer, das die Vereinigten Staaten zuerst verschlungen hat, ein für alle Mal erstickt werden muss."
 USB_NSS_education_law: "Panem et Circenses"
 USB_NSS_education_law_desc: "\n\n\n\n£GFX_USB_nss_education_banner\n\n\n\n\n\nSeit der Erfindung des 24-Stunden-Nachrichtenzyklus war die Idee, die Massen mithilfe von Medien und Unterhaltung gefügig und kontrolliert zu halten, stets ein hervorragendes Mittel zur Aufrechterhaltung der Ordnung. Der Machtkampf zwischen den Eliten, der dem Bürgerkrieg vorausging, und die darauf folgenden Medienkampagnen dürfen sich niemals wiederholen. Mit Hilfe unserer qualifiziertesten Soziologen wurde das Fernsehen verfeinert, verbessert und erweitert, um sicherzustellen, dass die Öffentlichkeit ständig durch fesselnde nationale Phänomene wie Sport, Shows und vieles mehr abgelenkt und unterhalten wird."
 USB_controlled_emigration: "Kontrollierte Auswanderung"
 USB_controlled_emigration_desc: "\n\n\n\n£GFX_USB_controlled_emigration_banner\n\n\n\n\n\nDas neue Ziel der US-Einwanderungsbehörde ICE und der Grenzpolizei besteht darin, einen stetigen Zustrom neuer Arbeitskräfte zu gewährleisten und gleichzeitig US-Bürger zu verfolgen, die versuchen, ins Ausland zu fliehen, sowie potenzielle Kriminelle, die versuchen, das Land zu verlassen, zu verhaften und zurückzuholen.\n\nDies erforderte eine erhebliche Verstärkung der Überwachung und eine Ausweitung der Operationen des Heimatschutzministeriums an der Grenze und in deren Nähe. Ironischerweise führt die verstärkte Grenzkontrolle zu einem noch höheren Zustrom von Einwanderern in das Land, während gleichzeitig US-Bürger daran gehindert werden, zu fliehen."
 USB_public_awareness_idea: "Öffentliches Bewusstsein - [USB_NSS_the_public_scripted_loc]"
 USB_public_awareness_idea_desc: "Für die Öffentlichkeit ist die Demokratie gesund und [USB.GetLeader] ist der Präsident. Ihre Realität und Politik wurden so gestaltet, dass die Menschen ständig von einem nie endenden Strom an Informationen und Unterhaltung fasziniert sind. Wir müssen diese Realität auch für sie aufrechterhalten; die Öffentlichkeit muss in seliger Unwissenheit über unsere Existenz bleiben. Wenn sie davon erfahren würden, könnten wir erneut der Tyrannei der Massen ausgesetzt sein.\n\n[USB_NSS_the_public_text_scripted_loc]"

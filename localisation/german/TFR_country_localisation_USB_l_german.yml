 USB_nationalize_critical_infrastructure: "Kritische Infrastrukturen verstaatlichen"
 USB_nationalize_critical_infrastructure_desc: "In Kriegszeiten liegt es im Interesse der nationalen Sicherheit, dass wichtige Industrien wie Eisenbahnen, Stromnetze, Banken, Rohstoffindustrien, das Internet und andere kritische Infrastrukturen vom Staat kontrolliert werden. Gleichzeitig hat die Kontrolle, die der private Sektor über diese Industrien hat, das Land korrumpiert und es Milliardären ermöglicht, Aspekte des täglichen Lebens des einfachen Mannes zu kontrollieren. Die immense Privatisierung der amerikanischen Wirtschaft hat unsere Nation irreparabel geschädigt, und die Zeit für eine Umkehr der Reganomics beginnt heute."

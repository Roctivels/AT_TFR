 usb.37.t: "Verhandlungen beginnen"
 usb.37.desc: "Die Verhandlungen zwischen den verschiedenen Konzernen, die in unserem Gebiet tätig sind, haben begonnen. Bislang wurden kleine Abmachungen getroffen und wir haben einige kleinere Hindernisse aus dem Weg geräumt. Das Hauptproblem besteht darin, dass die Konzerne im Gegenzug verlangen, dass alle Konzerne, die derzeit auf der Seite von Trump stehen, nach dem Krieg auf sie übertragen werden. Dies hat auf unserer Seite eine Kontroverse ausgelöst, da einige befürchten, dass dadurch zu viele Fabriken an die Konzerne gehen würden, und ihr Angebot ablehnen wollen, während andere das Angebot annehmen wollen. Letztlich liegt es am Präsidenten, das Angebot anzunehmen oder abzulehnen."
 usb.37.a: "Joa"
 usb.37.b: "ne"
 usb.38.t: "Verhandlungen gehen weiter"
 usb.38.desc: "Die zweite Verhandlungsrunde wird fortgesetzt, da die Zusammenarbeit zwischen beiden Seiten zunimmt. Wir haben um professionelle Berater und Manager gebeten, um die derzeitigen Fabriken mit maximaler Effizienz zu betreiben. Die Unternehmen haben im Gegenzug um niedrigere Steuern gebeten. Obwohl dieses Angebot weniger umstritten ist als das letzte, haben sich viele in der progressiven Partei und einige in der liberalen Partei gegen diese Vereinbarung ausgesprochen, da sie immer noch gegen den derzeitigen Körperschaftssteuersatz sind. Nun liegt es wieder einmal am Präsidenten und seiner Entscheidung, das Angebot anzunehmen oder abzulehnen."
 usb.38.a: "joa"
 usb.38.b: "ne"
 usb.39.t: "Verhandlungsabschluss"
 usb.39.desc: "Die letzte Verhandlungsrunde ist im Gange, da wir alle bisherigen Hindernisse aus dem Weg geräumt haben. Unser letztes Angebot an die Unternehmen besteht darin, dass sie ihre Unterstützung für alle aktuellen und künftigen Entscheidungen öffentlich bekunden. Die Unternehmen haben um mehr Vertretung und Einfluss in der Regierung gebeten, sobald die Verhandlungen abgeschlossen sind. Während frühere Abkommen sehr gut verlaufen sind, verärgert dieses letzte Angebot viele von ihnen. Die endgültige Entscheidung muss nun der Präsident treffen."
 usb.39.a: "joa"
 usb.39.b: "ne"
 usb.40.t: "Verhandlungen erfolgreich"
 usb.40.t: "Der Vereinigungsdeal"
 usb.40.desc: "Alle bisherigen und laufenden Verhandlungen sind zu Gunsten des Landes ausgegangen. Während wir in allen Verhandlungsrunden mit vielen kleinen und großen Hindernissen konfrontiert waren, können wir nun endlich aufatmen, da beide Parteien die Verhandlungen zufrieden beendet haben und versprechen, dass alle vereinbarten Reformen so schnell wie möglich umgesetzt werden.\n\nDies sollte der Nation massiv helfen, da wir bereits einige der Auswirkungen unseres Abkommens gesehen haben, sei es, dass sich die lokale Industrie verbessert, dass Unternehmenssprecher öffentlich ihre Unterstützung zeigen oder dass mehr Kriegsmaterial hergestellt wird."
 usb.40.a: "Wir haben Gutes getan, Männer, wir haben Gutes getan"
 usb.41.t: "Verhandlungen scheitern"
 usb.41.desc: "Unsere jüngsten Verhandlungen mit den Konzernen sind auf tragische Weise gescheitert. Die Bemühungen in letzter Minute, das Scheitern zu verhindern, sind gescheitert, und die gesamte Kommunikation ist abgebrochen. Dies ist ein katastrophaler Misserfolg, da viele uns die Schuld für das Scheitern der Verhandlungen geben. Auch innerhalb unserer Partei kommen diese Ereignisse nicht gut an, denn viele Menschen misstrauen bereits der derzeitigen Macht der Konzerne. Dies beeinträchtigt die Handlungsfähigkeit unserer Regierung in innenpolitischen Fragen und den derzeitigen Bürgerkrieg, während wir versuchen, das Chaos, das wir angerichtet haben, zu beseitigen."
 usb.41.a: "Kann es noch schlimmer werden?"

 USB_NSA_paul_nakasone_sc: "Paul Nakasone"
 USB_NSA_paul_nakasone_tt: "§YPaul Nakasone§!\nNSA-Direktor\n   £decryption_texticon Entschlüsselungsmachtfaktor: §G+10%§!"
 USB_NSA_paul_nakasone_desc_tt: "-------------------------------------\n\n\n\n\n\n\n\n£GFX_USB_paul_nakasone_portrait\n\n\n\n\n\n\n\n\n-------------------------------------\n§LCIA/IC INTERN – ZUSAMMENFASSUNG DER INFORMIERUNG\nEINSTUFUNG: STRENG GEHEIM//NOFORN\nPERSONALAKTE: Paul Miki Nakasone\nAKTUELLE POSITION: Direktor der National Security Agency; Kommandeur des U.S. Cyber Command\n\nDer Betreffende ist derzeit Direktor der National Security Agency und Kommandeur des U.S. Cyber Command. Die Person war maßgeblich daran beteiligt, dass die Behörde die Kontrolle über den Cyberspace in den Vereinigten Staaten übernommen und das digitale Panoptikum "Am-Net" implementiert hat. Durch die enge Zusammenarbeit mit der DARPA wurden die Fähigkeiten der Vereinigten Staaten im Bereich der digitalen Überwachung und Cyberkriegsführung erheblich erweitert.\n\n§YHistorische Bedeutung:§!\nDie Karriere des Betreffenden zeigt einen systematischen Aufstieg durch zunehmend wichtige Funktionen im Bereich der nationalen Sicherheit. Zu seinen früheren Tätigkeiten zählen Positionen in der US-Armee und im Bereich der Cyber-Nachrichtendienste, darunter die stellvertretende Leitung des US Army Cyber Command sowie eine Führungsposition in der Cyber National Mission Force.§YAktuelle Aktivitäten:§!\nDie betreffende Person beaufsichtigt die Überwachungsoperationen der NSA im Rahmen von PATRIOT II und dem Public Health Safety Act und integriert das Projekt "Am-Net" in den amerikanischen Alltag. Die aktuellen Ziele konzentrieren sich auf die Optimierung der KI-Überwachung, um Personal einzusparen und gleichzeitig die Abdeckung zu erweitern. Unter der Leitung von Subject entwickelt die NSA prädiktive KI-Systeme, um potenzielle antisoziale Elemente zu identifizieren, bevor sie sich organisieren können. \n\n§YFrühes Leben und Privatleben:§!\nGeboren in White Bear Lake, Minnesota, in einer japanisch-amerikanischen Familie. Der Vater des Betreffenden diente während des Zweiten Weltkriegs im Militärgeheimdienst der US-Armee. Die Vorfahren des Betreffenden stammen aus dem Dorf Misato im Bezirk Nakagami auf Okinawa.\n\nDie Ausbildung des Betreffenden spiegelt die methodische Förderung seiner Fachkenntnisse im Bereich Nachrichtendienst wider. Er wurde 1986 durch das Army ROTC an der St. John's University zum Offizier ernannt und erwarb höhere Abschlüsse in Systemmanagement (University of Southern California), strategischer Nachrichtendienst (National Defense Intelligence College) und strategischen Studien (U.S. Army War College) sowie einen Abschluss am U.S. Army Command and General Staff College.\n\nDer Betreffende ist mit Susan S. Nakasone (geb. Sternberg) verheiratet und hat vier Kinder. Aufgrund seiner Verpflichtungen im Bereich der nationalen Sicherheit leben der Betreffende und seine Familie in Fort Meade, Maryland, in der Nähe des Hauptquartiers der NSA.§!"
 

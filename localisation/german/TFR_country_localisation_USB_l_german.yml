 USB_biolabs_cat: "Biolabore"
 USB_biolabs_cat_desc: "\n\n\n\n\n£GFX_USB_biolabs_cat\n\n\n\n\n\n\n\nDie Vereinigten Staaten stehen seit langem an der Spitze der Medizin – und der biologischen Kriegsführung. Mit dem Aufkommen der Genom-Editierung und anderen neuartigen Fortschritten in der Biotechnologie wurden solche Programme ausgeweitet und umfassten nun auch die Erforschung neuartiger Impfstoffe und anderer Heilmittel sowie die Modifizierung und Waffenfähigkeit bereits existierender Krankheiten wie Ebola, Pocken und Coronavirus. \n\nDiese "Biolabore" existierten nicht nur auf amerikanischem Boden, sondern auch heimlich im Ausland, wo sie über von NGOs finanzierte Scheingesellschaften betrieben wurden. Der große Fehler führte jedoch zu einem fast vollständigen Zusammenbruch dieses Systems und kostete uns Jahrzehnte unschätzbarer Forschungsarbeit. Wenn wir die amerikanische Vorherrschaft wiederherstellen wollen, müssen die Biolabore im Namen des wissenschaftlichen Fortschritts wiedereröffnet, wiederaufgebaut und erweitert werden."
 USB_nss_megalopolis_category: "Megastädte"
 USB_nss_megalopolis_category_desc: "\n\n\n\n\n£GFX_USB_megalopolises_cat\n\n\n\n\n\n\n\nMit der konsolidierten Macht können wir ein ehrgeiziges Projekt verwirklichen: die Formalisierung des Megalopolis-Systems. Durch Umsiedlungsverträge, Stadterweiterung und schrittweise Zentralisierung werden wir die städtische Bevölkerung in miteinander verbundenen Regionen konzentrieren und die Eisenbahninfrastruktur ausbauen, die für eine solch gewaltige logistische Aufgabe erforderlich ist. Dadurch wird das Risiko durch die ländliche Bevölkerung verringert – den Hauptüberträger gefährlicher Ideen, die die Stabilität der USA bedrohten.\n\nWie andere Initiativen auch, verbessert das Megalopolis-Projekt unsere Kontrolle über die Amerikaner. Die Gesundheit der städtischen Gesellschaft wird sich durch die Umsiedlung der ländlichen Bevölkerung verbessern, wodurch zukünftige Probleme eingedämmt werden und eine genauere Überwachung ermöglicht wird. Da sich die meisten Amerikaner in diesen Regionen befinden, wird es für gefährliche Elemente schwieriger sein, sich der Entdeckung zu entziehen. Sollten rebellische Aktivitäten auftreten, wird die regionenübergreifende Koordination durch Dissidenten erheblich erschwert."

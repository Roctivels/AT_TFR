 usb.105.t: "AKTENBERICHT: #2020c"
 usb.105.d: "FEDERAL BUREAU OF INVESTIGATION\n\nBetreff: ZUNEHMENDE AUFSTÄNDISCHE AKTIVITÄTEN:\n\nDie anti-föderalen aufständischen Aktivitäten in unserem Gebiet haben sich seit ihrem Beginn in West Virginia um das Zwei- bis Dreifache verstärkt. Die Terroristen verlassen nun die Berge und versuchen, Wälder und kleine Dörfer zu besetzen, wobei ihre Zahl stetig wächst.\n\nNeueste Informationen zeigen, dass die Aufständischen erhebliche Unterstützung von der illegalen Regierung in Denver erhalten und Sympathien bei der lokalen Bevölkerung gewinnen, was ihnen ermöglicht hat, ihren Einflussbereich auszuweiten und Zugang zu weitaus gefährlicheren Waffen zu erhalten.\n\nWenn nicht bald drastische Maßnahmen ergriffen werden, um ihr Wachstum zu verhindern, könnte die Situation außer Kontrolle geraten und katastrophale Folgen für unsere Regierung haben."
 usb.105.a: "E Pluribus Unum"
 usb.106.t: "AKTENBERICHT: #2077d"
 usb.106.d: "NATIONALE SICHERHEITSBEHÖRDE\n\nBetreff: KRITISCHE AUFSTÄNDISCHE AKTIVITÄTEN:\n\nDie aufständischen Aktivitäten der Trumpisten haben sich von lokalen Sabotageakten und Überfällen zu einem regelrechten Partisanenkrieg gegen Washington DC ausgeweitet. Die ländliche Bevölkerung schließt sich massenhaft den Terroristen an, was dazu führt, dass ganze Regimenter in Brigadestärke hinter unseren Linien operieren, was erhebliche Auswirkungen auf unsere logistischen Fähigkeiten und unsere Moral hat.\n\nIn einigen Bezirken sind die lokalen Strafverfolgungsbehörden vollständig überrannt worden, während sie in vielen anderen Bezirken zu kämpfen haben und sofortiges Eingreifen des Bundes erfordern. Die bisher ergriffenen Maßnahmen haben sich als völlig unzureichend erwiesen.\n\nWenn wir unsere Anstrengungen im Kampf gegen antisoziale Elemente nicht verstärken, könnte das nächste Ziel der Rebellen eine Großstadt wie Chicago, Indianapolis oder sogar Washington DC selbst werden."
 usb.106.a: "Sichert die Nation, schützt unsere Zukunft."

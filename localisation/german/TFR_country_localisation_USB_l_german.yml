 USB_trump_ward: "UNTERNEHMENSZONE "ACHILLES""
 USB_trump_ward_desc: "\n§YWächter:§!\n\n\n\n\n\n\n\n\n\n£GFX_robert_abrams_Portrait\n\n\n\n\n\n\n\n§W        Robert B. Abrams§!\n\n\nDie §5UNTERNEHMENSZONE "ACHILLES"§!, die das ehemalige Territorium des Verräters Trump umfasst, hat das primäre Ziel, die Ordnung wiederherzustellen und den Aufstand der Trumpisten zu beenden, und das sekundäre Ziel, den effektivsten Weg zu finden, um Andersdenkende zum Schweigen zu bringen."
 USB_western_ward: "UNTERNEHMENSZONE "ODYSSEUS""
 USB_western_ward_desc: "\n§YWächter:§!\n\n\n\n\n\n\n\n\n\n£GFX_kenneth_tovo_Portrait\n\n\n\n\n\n\n\n§W           Kenneth Tovo§!\n\n\nDie §5UNTERNEHMENSZONE "ODYSSEUS"§, die die ehemaligen Bundesstaaten Kalifornien, Utah, Oregon, Washington, Arizona, Idaho und Nevada umfasst, hat das vorrangige Ziel, der Marine der Vereinigten Staaten mit allen erforderlichen Mitteln zu ihrem früheren Glanz zu verhelfen"
 USB_home_ward: "UNTERNEHMENSZONE "CALIGULA""
 USB_home_ward_desc: "\n§YWächter:§!\n\n\n\n\n\n\n\n\n\n£GFX_joseph_biden_Portrait\n\n\n\n\n\n\n\n§W             Joseph Biden§!\n\n\nDie §5UNTERNEHMENSZONE "CALIGULA"§! besteht aus den ursprünglichen Staaten, die der Sache treu geblieben sind, und hat das vorrangige Ziel, anderen Zonen zu zeigen, was Loyalität im neuen Amerika bewirken kann.""
 USB_southern_ward: "UNTERNEHMENSZONE "AJAX""
 USB_southern_ward_desc: "\n§YWächter:§!\n\n\n\n\n\n\n\n\n\n£GFX_paul_lacamera_Portrait\n\n\n\n\n\n\n\n§W          Paul LaCamera§!\n\n\nDie §5UNTERNEHMENSZONE "AJAX"§! besteht aus den ehemaligen Bundesstaaten Arkansas, Texas, New Mexico, Louisiana, Tennessee, Mississippi, Florida, Alabama, South Carolina und Georgia und hat das vorrangige Ziel, durch den Einsatz von in Kriegsgefangenschaft arbeitenden Landwirtschaftskomplexen der neue Brotkorb Amerikas zu werden."
 USB_michigan_ward: "UNTERNEHMENSZONE "HECTOR""
 USB_michigan_ward_desc: "\n§YWächter:§!\n\n\n\n\n\n\n\n\n\n£GFX_lloyd_austin_Portrait\n\n\n\n\n\n\n\n§W             Lloyd Austin§!\n\n\nDie §5UNTERNEHMENSZONE "HECTOR"§, die den ehemaligen Bundesstaat Michigan bildet, hat das vorrangige Ziel der Entnazifizierung des Staates durch öffentliche Demütigung, Massenhinrichtungen und die Schaffung von Programmen, die Mitgliedern der nationalsozialistischen Bewegung Amnestie als Gegenleistung für den Dienst in der §5UNTERNEHMENSZONE "ACHILLES" gewähren.§!."
 USB_northeastern_ward: "UNTERNEHMENSZONE "THESEUS""
 USB_northeastern_ward_desc: "\n§YWächter:§!\n\n\n\n\n\n\n\n\n\n£GFX_terrence_shaughnessy_Portrait\n\n\n\n\n\n\n\n§W         T. O'Shaughnessy§!\n\n\nDie §5UNTERNEHMENSZONE "THESEUS"§!, die die ehemaligen Staaten Neuenglands umfasst, hat das vorrangige Ziel des wissenschaftlichen Fortschritts und ist das künftige Kernstück des §YMEGAPOLIS-PROGRAMMS§!"
 USB_canadian_ward: "UNTERNEHMENSZONE "PROMETHEUS""
 USB_canadian_ward_desc: "\n§YWächter:§!\n\n\n\n\n\n\n\n\n\n£GFX_charles_chiarotti_Portrait\n\n\n\n\n\n\n\n§W        Charles Chiarotti§!\n\n\nDie §5UNTERNEHMENSZONE "PROMETHEUS"§! besteht aus der verlorenen Kolonie Kanada und hat als Hauptziel die massenhafte Gewinnung von Rohstoffen aus dem kanadischen Umland sowie die Einführung des §YMEGAPOLIS-PROGRAMMS§! in Städten wie Montreal, Vancouver und Toronto." 

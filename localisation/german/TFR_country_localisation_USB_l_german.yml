 USB_babel_russia_tt: "§1СМЕРТЬ§!"
 USB_babel_russia_tt_delayed: "Sprache gibt es in vielen Formen.\nSprache, Tanz, Kunst, Musik, Existenz.\n\nSprache macht uns zu dem, was wir sind.\n\nWie ein Organ, das man dringend braucht.\n\nWie eine Droge, nach der man sich sehnt.\n\nNimmt man das weg, fängt die Schafherde an, sich gegenseitig zu beißen.\n\nDie Kinder weinen, und die Mütter erkennen die Tränen einfach nicht.\nDie Väter sehnen sich, aber sie wissen nicht wonach.\nEs gibt eine Leere in ihren Seelen, eine Leere, die sich in ihren Köpfen ausbreitet.\n\nEs schmerzt; nichts kann das Gefühl auslöschen, etwas verloren zu haben.\nEine gebrochene Nase heilt nichts, und eine Flüssigkeit, die man nicht erkennt, betäubt nichts.\nDie Buchstaben haben keine Bedeutung mehr, und selbst die Schreie haben kaum noch Bedeutung.\n\nWas man nicht versteht, fürchtet man.\nWas man nicht versteht, verletzt man.\nDie Weisen werden unweise.\nUnd die Verrückten werden normal.\n\nMan sieht Umrisse. Aber man weiß es einfach nicht, das Wissen wurde einem genommen.\nMan ist in eine Welt gestürzt, die man früher kannte.\nEs tut so weh.\n\nDer Turm bröckelt."
 
 USB_babel_china_tt: "§1SI WANG§!"
 USB_babel_china_tt_delayed: "Sprache gibt es in vielen Formen.\nSprache, Tanz, Kunst, Musik, Existenz.\n\nSprache macht uns zu dem, was wir sind.\n\nWie ein Organ, das man dringend braucht.\n\nWie eine Droge, nach der man sich sehnt.\n\nNimmt man das weg, fängt die Schafherde an, sich gegenseitig zu beißen.\n\nDie Kinder weinen, und die Mütter erkennen die Tränen einfach nicht.\nDie Väter sehnen sich, aber sie wissen nicht wonach.\nEs gibt eine Leere in ihren Seelen, eine Leere, die sich in ihren Köpfen ausbreitet.\n\nEs schmerzt; nichts kann das Gefühl auslöschen, etwas verloren zu haben.\nEine gebrochene Nase heilt nichts, und eine Flüssigkeit, die man nicht erkennt, betäubt nichts.\nDie Buchstaben haben keine Bedeutung mehr, und selbst die Schreie haben kaum noch Bedeutung.\n\nWas man nicht versteht, fürchtet man.\nWas man nicht versteht, verletzt man.\nDie Weisen werden unweise.\nUnd die Verrückten werden normal.\n\nMan sieht Umrisse. Aber man weiß es einfach nicht, das Wissen wurde einem genommen.\nMan ist in eine Welt gestürzt, die man früher kannte.\nEs tut so weh.\n\nDer Turm bröckelt."
 
 USB_loose_ends_cat: "Lose Enden"
 USB_loose_ends_cat_desc: "\n\n\n\n\n£GFX_USB_loose_ends_cat\n\n\n\n\n\n\n\nDer Vorwand und die Durchführung des Schattenputsches wären ohne die Beteiligung einer Reihe vertraulicher Informanten, die in oppositionellen Organisationen eingebettet waren, sowie einer Reihe von Geheimdienstmitarbeitern der unteren Ebene, die sich nun aufgrund von Reue, moralischen Einwänden und ideologischen Unreinheiten als Belastung für die Maskerade erweisen könnten, nicht möglich gewesen. \n\nUm sicherzustellen, dass sie nicht zu Whistleblowern werden können, hat Direktor Burns eine systematische Fahndung nach denjenigen genehmigt, die von den Cognoscenti als "Lose Enden" identifiziert wurden. Diese Kampagne soll auf den unteren Ebenen beginnen, ausgehend von einer Liste vertraulicher Informanten, die uns FBI-Direktor James Comey zur Verfügung gestellt hat. Damit kann die Maskerade auf unbestimmte Zeit fortgesetzt werden und die Cognoscenti können ihre Agenda ungestört weiterverfolgen."
 USB_judas_gambit_cat: "Der Judas-Schachzug"
 USB_judas_gambit_cat_desc: "\n\n\n\n\n£GFX_USB_judas_gambit_cat\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nAufgrund unserer Säuberungsaktion gegen sogenannte "lose Enden" sind einige Mitglieder der Cognoscenti paranoid geworden, weil sie befürchten, als Nächste auf der Abschussliste zu stehen. Direktor Burns wurde über einen Verräter in den Reihen der Cognoscenti informiert, der den Codenamen "Judas Gambit" trägt und die undurchsichtige Struktur des Deep State ausnutzt, um widersprüchliche Befehle an Institutionen unter unserer Kontrolle zu erteilen. \n\nDer prädiktive Supercomputer für künstliche Intelligenz der DARPA, Networked Event Response Optimizer (NERO), geht davon aus, dass das Ziel des Verräters darin besteht, die Maskerade zu durchbrechen, indem er seine Position innerhalb der Cognoscenti nutzt, um einen False-Flag-Angriff von drastischem Ausmaß zu koordinieren, der die Existenz der Cognoscenti der Öffentlichkeit offenbaren wird, was unweigerlich zu Massenhysterie und Chaos führen wird. Die Verhinderung des Judasschachzugs ist zur höchsten Priorität der Cognoscenti geworden."

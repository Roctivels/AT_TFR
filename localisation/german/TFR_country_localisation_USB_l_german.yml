 usb.107.t: "Angriff auf DC"
 usb.107.d: "Es war unvermeidlich, dass die Hauptstadt der Union zum Ziel von Aufständischen werden würde. Allerdings ging man stets davon aus, dass die Täter entweder die Patriotenfront oder die Konstitutionelle Regierung waren. \n\nWären diese Annahmen richtig gewesen, wären die Folgen möglicherweise weit weniger katastrophal gewesen. \n\nAm Abend wurden mehrere schwarze Lieferwagen gesichtet, die mit Obszönitäten und Symbolen aus dem Okkultismus und Nationalsozialismus besprüht waren und Fußgänger auf den Gehwegen überfuhren. Die Nationalgarde wurde in höchste Alarmbereitschaft versetzt und versuchte, die Angreifer einzudämmen, was dazu führte, dass sich die Transporter über die ganze Stadt verstreuten. Einer wurde in der Nähe des CityCenterDC abgefangen, wo mindestens ein Dutzend bewaffnete Männer, gekleidet wie Mitglieder der Atomwaffen, ausstiegen und sich mit gezückten Waffen Zugang zum Einkaufszentrum verschafften. \nDie Angreifer trugen binäre Chemiewaffen, die sie wahllos einsetzten, um möglichst viele Opfer zu verursachen. Andere Transporter hielten an belebten Orten in der Stadt und verübten ähnlich verheerende Anschläge. \n\nGleichzeitig detonierten mehrere Bomben an wichtigen Sehenswürdigkeiten, darunter das Lincoln Memorial. Einige waren konventionelle Sprengsätze, andere setzten chemische Kampfstoffe frei, darunter Sarin-Gas, was das Chaos der sich ausbreitenden Katastrophe noch verstärkte. \nNach etwa vier Stunden gelang es den Sicherheitskräften, die Terroristen mit tödlicher Gewalt zu neutralisieren. Bis dahin waren Hunderte tot und Tausende weitere verletzt. Die Atomwaffen Division übernahm die volle Verantwortung und nutzte den Anschlag für Propagandazwecke. \n\nDies war nicht nur einer der tödlichsten Terroranschläge auf amerikanischem Boden, sondern führte auch zu einer genauen Überprüfung der Sicherheitsbehörden des Landes. Geheimdienstmitarbeiter äußerten sich frustriert über ihre begrenzten Ressourcen, die durch den andauernden Bürgerkrieg stark beansprucht waren.\n\nDie Nachwirkungen werden noch jahrelang zu spüren sein. Während die Familien um ihre Verluste trauern, wächst die Verzweiflung der Öffentlichkeit nach Sicherheit und die nagende Angst, dass ein weiterer Anschlag unmittelbar bevorstehen könnte."
 usb.107.a: "Das Auge ist hellwach..."
 
 nss.0.t: "Die Behörden ziehen ein"
 nss.0.d: "Der Angriff auf Washington, D.C., hat Schockwellen durch die Union geschickt. Mehrere Schlüsselpersonen im gesamten Gebiet der Union, darunter Staatsbeamte, hochrangige Militärs und Regierungsvertreter, haben das Vertrauen in die Union und ihre Fähigkeit, ihre Bürger zu schützen, verloren. \n\nBerichte über den Verlust des Kontakts aus mehreren Regionen überschwemmen weiterhin die offiziellen Kanäle, während aufständische Gruppen immer dreister werden und Militäreinheiten unerlaubt abwesend sind. Dies bedeutet faktisch den Zusammenbruch der Bundesregierung, die nur noch von ihren loyalsten Anhängern unterstützt wird. \nDie US-Geheimdienste haben bereits rasch Maßnahmen ergriffen, um ihre Autorität über als loyal geltende Gebiete zu festigen, und alles außerhalb dieser Grenzen als sezessionistisch, terroristisch oder verräterisch gebrandmarkt, wodurch sie ihren Einfluss auf die Regierung weiter ausgebaut haben. \n\nMit Zustimmung des Präsidenten wurden die Einsatzregeln gelockert, um die Union zu erhalten und zu verhindern, dass feindliche Kräfte in verlorenen Gebieten Fuß fassen. n\nDie Einsätze waren noch nie so hoch. Wir stehen nun vor der Chance, die Ordnung in den Vereinigten Staaten von Amerika wirklich wiederherzustellen, aber damit geht auch das größte Risiko von allen einher: die Möglichkeit, in den Abgrund der Bedeutungslosigkeit abzusinken. \n\nDie Arbeit einer Nation hat gerade erst begonnen."
 nss.0.a: "Säulen fallen nicht so leicht um."
 nss.1.t: "Beschwichtigung der Unwissenden"
 nss.1.d: "Die Vereinigten Staaten von Amerika wurden nicht von den Massen gegründet, sondern von einer kleinen Gruppe ausgewählter Personen, die eine Reihe von Idealen hochhielten und damit ein erleuchtendes Licht hervorbrachten. \n\nEin Ideal, das von Emotionen getrieben ist, kann sich nicht selbst tragen. Die Französische Revolution verpuffte, als die ordnungsgemäße Autorität die Verrückten, die das Land zerrissen hatten, unter Kontrolle brachte; es bleibt eine bewusste Entscheidung, dass die wenigen Erleuchteten die vielen durch turbulente Zeiten führen. Die Ordnung schenkt den Einwänden der vielen keine Beachtung, und der Kongress ist nur ein weiteres Organ, das sich den Launen des Chaos hingibt. \nSie haben bereits große Besorgnis über unsere Agenda geäußert und behauptet, dass wir die Vereinigten Staaten, wie wir sie kennen, untergraben, aber waren wir es nicht, die dafür gesorgt haben, dass die Ordnung auf der ganzen Welt erhalten blieb?\n\nDer Kongress hat sich als gangränös erwiesen und muss daher amputiert werden.\nNatürlich nicht öffentlich.\ n\nMit den richtigen Worten, die ihnen ins Ohr geflüstert werden, und mit genügend Druck in Bezug auf ihre familiären Angelegenheiten werden sie schweigen. \nDiejenigen, die am lautesten schreien, werden wegen des potenziellen Risikos, antisoziale Ansichten zu vertreten, unter Beobachtung gestellt, und mit genügend Zeit werden sie weiterhin vorsichtig sein."
 nss.1.a: "Bedeckt ihre Augen, dann werden sie nicht sprechen."
 nss.2.t: "Die Rückkehr Amerikas"
 nss.2.d: "Die gesamten Vereinigten Staaten sind unter der Flagge mit den Sternen und Streifen wiedervereinigt worden, so wie es sein sollte, so wie es immer vorgesehen war. \n\nHeute gedenken wir der tapferen Männer und Frauen, die ihr Leben für unsere Ideale gegeben haben. Aufklärung ist nichts, was man ohne Opfer verteidigen kann, und der Bürgerkrieg war nichts anderes als eine teure Rechnung für unsere Fehler der Vergangenheit. \nEs wurden viele Fehler gemacht, die Dinge, die wir vernachlässigt und die wir begraben haben, führten letztendlich zu diesem Strudel innerer Gewalt, und die ganze Welt bezahlt dafür. \n\nUnsere Abwesenheit hat bewiesen, dass wir eine der Säulen waren, die Stabilität, Sicherheit und Ordnung aufrechterhielten. Wir haben unsere Lektion gelernt und werden dieselben Fehler nicht wiederholen. \n\nMit den Experten, den Veteranen und den Erleuchteten haben wir eine zerbrochene Nation wiederhergestellt. \nEine Operation an der amerikanischen Seele, bis sie nicht mehr brennen kann. Der Bürgerkrieg hat uns wieder in den Schlaf versetzt, und wir sind in einer Welt aufgewacht, die nicht unter unserem Schutz steht. Fressende Ideologien und unberechenbare Emotionen sind zu den neuen Herrschern der Welt geworden, Bestien ohne Vision. \nWas aus der Welt geworden ist, ist für uns irrelevant; was aus der Welt werden wird, ist das, was zählt. \n\nLassen wir sie noch ein wenig länger im Schlamm spielen; unsere Vorbereitungen sind bereits in Gang gesetzt. \nDie Vereinigten Staaten von Amerika sind zurück."
 nss.2.a: "Die dritte Option wurde gewählt."
 nss.3.t: "Amerika wieder in Ordnung"
 nss.3.d: "Der zweite amerikanische Bürgerkrieg wird als einer der gewalttätigsten Konflikte der Moderne in Erinnerung bleiben, mit so vielen Extremisten, die ihr Unwesen treiben, und dem vollständigen Zusammenbruch der von den Vereinigten Staaten dominierten Weltordnung der Nachkriegszeit. Es scheint, als würde das, was aus dem Nebel hervorgeht, nichts mehr mit dem Amerika zu tun haben, das die Menschen lieben und hassen. \nDer Präsident der Vereinigten Staaten von Amerika gab bekannt, dass alle von "antisozialen Elementen" gehaltenen Gebiete befriedet und von der Bundesregierung zurückerobert worden seien. \nDas Amerika von heute hat sich zu einem anderen Land entwickelt, das sein Schicksal fest in der Hand hat, während hinter den Kulissen Gerüchte über eine Clique von Experten hinter dem Präsidenten kursieren, die darauf abzielen, die Vereinigten Staaten wieder als Weltpolizei zu etablieren. Diese Anschuldigungen werden als Verschwörungstheorien abgetan. \n\nÜber die Innenpolitik der Vereinigten Staaten ist nicht viel bekannt, da das AM-NET ausländische Untersuchungen nahezu unmöglich macht, aber Berichte über permanente Ausgangssperren, verstärkte Razzien gegen Dissidenten und die ständige Überwachung der amerikanischen Bevölkerung haben ein Gefühl zurückgebracht, das die Welt seit der Bush-Ära nicht mehr gekannt hat. \n\nBerichte über den Versuch der USA, wieder Einfluss in regionalen Einflussbereichen zu gewinnen, geben den Weltmächten Anlass zur Sorge, da es den Anschein hat, dass die Vereinigten Staaten von Amerika noch lange nicht am Ende sind."
 nss.3.a: "Wieder kreisen die Falken über der Welt."
 nss.4.t: "Hintersitzfahrer"
 nss.4.d: "Das Oval Office hatte schon seit einiger Zeit nichts Gemütliches mehr an sich. Nachdem William J. Burns eine aktivere Rolle im Umfeld des Präsidenten übernommen hatte, fühlte sich das Weiße Haus nicht mehr wie ein Zuhause an. \n\nBiden erinnert sich an die Treffen mit den unterschiedlichsten Menschen aus aller Welt; einige waren lautstark, andere ruhig. In seinen Augen war keine einzige Person langweilig, und jede stellte eine weitere Herausforderung dar, die es zu bewältigen galt. Er sah, wie alle möglichen medizinischen Geräte ins Oval Office gebracht wurden, wusste aber nicht genau, warum. \n\nEr erinnert sich an die Witze, die in den Fluren gemacht wurden, und an die Momente der Anspannung während einer Krise. \nWäre er jünger gewesen, hätte er innerhalb eines Jahres das Land geeint und hätte freie Hand gehabt, um das System zu reformieren. \nEr sah, wie Burns das Oval Office betrat, während er telefonierte und Checkpoints und etwas im Zusammenhang mit Blackrock erwähnte. Dieses Unternehmen stach immer wie ein wunder Daumen hervor. \n\nBiden wollte ihn rufen, ihm zuwinken. \nAber er konnte es nicht. \nJoe Biden erinnert sich jetzt daran, dass sich sein Gesundheitszustand rapide verschlechterte und sein Körper sich einfach verkrampfte; sein Geist war noch da, aber sein Körper weigerte sich zu kooperieren. \n\nAls er realisierte, was vor sich ging, überkam ihn ein Moment der Angst. \nBurns warf ihm einen abweisenden Blick zu, als er eine der Krankenschwestern herbeiwinkte und eine Geste machte, um etwas zu erhöhen."
 nss.4.a: "Eine Batterie für die Maschine."
 nss.5.t: "Gewährleistung unserer Sicherheit"
 nss.5.d: "Das Gesetz zur öffentlichen Gesundheitssicherheit soll die Beschränkungen aus der Pandemiezeit in ein dauerhaftes Rahmenwerk für biologische Sicherheit umwandeln. Er wurde gemeinsam mit Pharmaunternehmen und den CDC entwickelt und schafft "AmeriCare" – ein nationales universelles Gesundheitssystem, das die bestehende Versicherung durch ein obligatorisches privates Versicherungsmodell ersetzt, das durch staatliche Regulierung und finanzielle Garantien abgesichert ist und einen geschlossenen Markt für Arzneimittel schafft, deren Kosten vom Steuerzahler subventioniert werden. \n\nDas Kleingedruckte des Gesetzes offenbart dessen wahre Natur: ein obligatorisches Impfsystem, das die Bürger verpflichtet, sich regelmäßig gegen bekannte und neu auftretende Krankheiten impfen und boostern zu lassen, wie von den CDC und einem Pharmaausschuss festgelegt. In diesen Impfungen wären Mikrochips enthalten, die zur Speicherung und Übermittlung von Gesundheitsdaten und persönlichen Daten dienen. \n\nDie Nichteinhaltung der Impf- und Nachverfolgungspflicht würde zum Entzug grundlegender Dienstleistungen führen – Zugang zu AmeriCare, Reisen, Arbeit oder Studium –, wodurch eine Teilnahme am gesellschaftlichen Leben nahezu unmöglich würde. Dies wird von der CDC durch die neu geschaffene "Health Security Agency" (HSA) durchgesetzt, deren Aufgabe es ist, die Einhaltung der Impfvorschriften zu überwachen und nicht geimpfte oder infizierte Personen zu verfolgen. \n\nÖffentlich wird das Gesetz als Maßnahme zur Verhinderung einer weiteren Pandemie und zur Sicherung der Führungsrolle Amerikas im Bereich der Gesundheitsinnovation dargestellt. In der Praxis festigt es jedoch die Kontrolle durch Gesundheitsvorschriften und Überwachung und garantiert den Pharmaunternehmen Gewinne durch die staatlich vorgeschriebene Nachfrage. Dadurch wird die Gesundheitsversorgung – ein grundlegendes Menschenrecht – zu einem bedingten Privileg und einem Instrument zur Bevölkerungskontrolle. \n\nDank intensiver Lobbyarbeit seitens der Pharmaindustrie wurde das Gesetz ohne große Debatte vom Kongress verabschiedet. Die Umsetzung soll unmittelbar nach der Genehmigung durch Direktor Burns im Namen des Präsidenten per Autopen beginnen, wobei aufgrund der Dringlichkeit die üblichen Zeremonien umgangen werden. Kritiker bemängeln, dass die Überwachung durch das Gesetz die in autoritären Staaten übertrifft, doch der Widerstand in der Bevölkerung bleibt gering, da die Medien kontinuierlich über biologische Gefahren und Vorteile für die Gesundheitsversorgung berichten und Gegner des Gesetzes als Extremisten und Verschwörungstheoretiker brandmarken. \n\nDas Gesetz zur öffentlichen Gesundheitssicherheit schafft die technologischen und rechtlichen Grundlagen für die nächste Phase der Bevölkerungskontrolle und etabliert nahtlos ein neues Paradigma der öffentlich-privaten Herrschaft im Namen der Gesundheitssicherheit."
 nss.5.a: "Ein notwendiger Schritt."
 nss.6.t: "Sicherheitsansprache"
 nss.6.d: "Meine amerikanischen Mitbürgerinnen und Mitbürger,\n\nich hoffe, Sie sind wohlauf und sicher zu Hause, wenn Sie diese Ansprache hören. In der langen Geschichte Amerikas gab es noch nie eine Zeit, die so unsicher und gefährlich war wie die heutige. Das betrifft insbesondere die junge Generation, die leicht bösartigen, extremistischen oder auf andere Weise missbräuchlichen Inhalten ausgesetzt sein kann. \n\nMeine Regierung hat eine Vielzahl von Maßnahmen ergriffen, um dem abzuhelfen, und unsere gemeinsamen Bemühungen haben zur Ausarbeitung des Kinderschutzgesetzes geführt, über das ich Ihnen hier berichten möchte. \n\nZunächst einmal zielt das Kinderschutzgesetz darauf ab, Vorschriften zu erlassen, die einen sicheren Internetzugang für alle Bürger, vor allem aber für Jugendliche, gewährleisten sollen. Dies beinhaltet eine umfassende Überwachung verdächtiger Personen und bestimmter Websites, für deren Zugriff eine Identitätsprüfung erforderlich ist. \n\nZweitens wird die Einrichtung eines Registers vorgeschrieben, um diese Personen und Websites zu erfassen. \n\nUnd schließlich werden unseren Strafverfolgungsbehörden alle notwendigen Ressourcen und Befugnisse übertragen, um alle erforderlichen Maßnahmen zur Gewährleistung der öffentlichen und individuellen Sicherheit zu ergreifen. \n\nDieses Gesetz symbolisiert alles, worauf wir als Nation hingearbeitet haben. Dies ist nicht nur ein großer Schritt nach vorne, sondern auch ein Beweis für unsere Demokratie. Ich hoffe, dass das Kinderschutzgesetz das Leben Ihrer Familie friedlicher und ruhiger machen wird."
 nss.6.a: "Gott segne Sie und Gott segne Amerika."
 nss.7.t: "Mit einem Auge"
 nss.7.d: "William J. Burns war nicht jemand, der große Zeremonien oder Feierlichkeiten veranstaltete, wenn es um erfolgreiche Operationen ging, selbst wenn es sich um etwas so Bedeutendes wie die Rettung der Nation handelte. Die Arbeit geht wie gewohnt weiter, der Weltfrieden ist noch in weiter Ferne. \n\nEs gab nie Ressentiments gegenüber denen, die Unruhe stifteten, denn diese kam nicht aus dem Nichts, sondern war das Ergebnis der Inkompetenz der vorherigen Bundesregierung, die gezeigt hatte, was passiert, wenn man nicht nur sein eigenes Volk, sondern auch die Welt nicht ständig unter Kontrolle hält. \n\nBurns erinnert sich an seine Zeit als Diplomat in China und Russland, und auch hier hegte er keine Ressentiments gegenüber diesen Nationen und ihren Völkern. Er sah die zunehmende Instabilität, die durch ihren Aufstieg aufgrund der Abwesenheit der Vereinigten Staaten verursacht wurde. Das Tier, das beißt, sollte seine scharfen Zähne nicht behalten, und Burns hofft, dass mit einer angemessenen Befriedung auf der ganzen Welt der amerikanische Frieden wiederbelebt werden kann. \n\nImperium. \n\nEin lustiges Wort, früher wäre er in Gold und Seide gekleidet gewesen, aber die Macht, die er besitzt, ist weitaus größer als die eines durchschnittlichen Königs. \n\nDennoch will er kein Imperium und keinen Thron, sondern sicherstellen, dass die Welt sich nicht selbst in eine ungewisse Zukunft verbrennt.\nDer amerikanische Frieden mag seine Mängel haben, aber seine Existenz hat Gewissheit und Regeln gebracht, an die man sich halten kann. Das ist etwas, das es wert ist, angestrebt zu werden.\n\nDie Welt brennt, und es ist an der Zeit, der Welt zu zeigen, dass die Vereinigten Staaten von Amerika noch lange nicht tot sind."
 nss.7.a: "Wir können moralisch sein oder wir können diejenigen sein, die den Frieden bewahren."
 
 bdnspch.999.t: "ERKLÄRUNG FÜR ALLE TNO-ENTWICKLER, DIE DIES SPIELEN"
 bdnspch.999.d: ""Caligula verließ sein Büro, der Geruch von toten Kindern und Welpen lag noch frisch auf seiner superbösen Uniform. Er geht den Korridor entlang und sieht eine ältere Frau, die Mühe hat, die Tür zu ihrem Hüftarzt zu öffnen. Er geht auf sie zu und bietet ihr seine Hilfe an: "Oh ja, vielen Dank, ich kann diese Hüftoperation nicht verpassen! Die sind so teuer! Plötzlich jedoch tritt Caligula sie zu Boden, und das Knacken ihrer gebrochenen Hüfte hallt durch den Flur! "Nimm das, du Idiot", sagt Caligula und spuckt sie an. Sein fetter Magen von all den Burgern, die er gegessen hat, bebt und lässt den Flur wie ein Erdbeben vibrieren.\n\nEr verlässt den Flur und geht auf die Straße, wo er ein junges Mädchen sieht, das ein Eis isst, und geht auf sie zu. Sein Fett bringt die ganze Straße zum Beben. \n\n "Incel-Steuer, foid", grinst er sie süffisant an, während er ihr Eis nimmt und anfängt, es wie ein Schwein zu essen.\n\n Er überblickt die Stadt, die tapferen Reddit-Widerstandskämpfer, die von den Chuds getötet werden, die Frauen, die buchstäblich in das Märchen von den Mägden gesteckt werden. Er lacht superböse, während er Hitler die Faust gibt""
 bdnspch.999.a: "Aber ich sehe darin nichts Schlechtes?" 
 
 #leaders
 POLITICS_JOE_BIDEN_DESC: "Joseph Robinette Biden war ein Mann, der oft in der Nähe des größten Sitzes der Macht in Amerika war, aber nicht in der Lage, ihn einzunehmen. Geboren in Pennsylvania, verbrachte Biden einen Großteil seines Lebens und seiner politischen Karriere im Bundesstaat Delaware. Im Senat etablierte er sich fest im neoliberalen Lager der Demokraten, wo er den ausländischen Interventionismus und Gesetze zur Verbrechensbekämpfung unterstützte und in langjährigen Senatsmitgliedern wie Strom Thurmond und Robert Byrd Verbündete fand. In den Jahren 1988 und 2008 trat er als Präsidentschaftskandidat an, scheiterte aber beide Male in den Vorwahlen. Normalerweise wäre ein alternder, zweimal gescheiterter Kandidat, der sich mit Rassisten und Kriegstreibern anlegt, ein schlechter Kandidat für eine zunehmend junge und progressive Demokratische Partei. Aber Bidens acht Jahre als Vizepräsident an der Seite von Barack Obama haben sein Erbe gut rehabilitiert. Und angesichts der Aussicht auf weitere vier Jahre Donald Trump im Weißen Haus schlossen sich die Demokraten zusammen und stellten sich voll hinter ihn. Mit seinen achtundsiebzig Jahren ist Biden nun der älteste Mann, der zum Präsidenten gewählt wurde. Doch während seine Anhänger in ihm einen charismatischen Elder Statesman sehen, der in der Lage ist, die Linke und die Rechte zu vereinen, sehen seine Kritiker in ihm einen halbseidenen Schwätzer, der sich von den Demokraten stützen ließ, damit er seinen lange verweigerten Platz im Oval Office einnehmen konnte. Ob er sich nun als ehrwürdige Führungspersönlichkeit oder als tattriger alter Narr erweist, eines ist klar: Nur wenige beneiden ihn um seine Rolle als Präsident in dieser schwierigen Zeit."
 

 USB_air_force_domination_idea_desc: "Mehr als ein halbes Jahrhundert politischer Beziehungen zahlt sich in einer Situation wie der, in der sich die Regierung Biden derzeit befindet, besonders aus. Da die USAF in der Zeit, als Biden Vizepräsident war, eng mit ihm zusammenarbeitete, sind die meisten US-Luftstreitkräfte Biden für ihre Karriere zu Dank verpflichtet. Als der Bürgerkrieg begann, blieb der Großteil der USAF natürlich der rechtmäßigen Regierung treu - und jetzt beherrschen wir den Himmel über dem Land der Freiheit."

 USB_NSA_george_barnes_tt: "§YGeorge C. Barnes§!\nNSA-Direktor\n   £pol_power Täglicher politischer Machtzuwachs: §R-0,05§!\n   £decryption_texticonEntschlüsselungsmachtfaktor: §G+5%§!"
 
 USB_DIA_jeffrey_kruse_sc: "Jeffrey A. Kruse"
 USB_DIA_jeffrey_kruse_tt: "§YJeffrey A. Kruse§!\nDIA-Direktor\n   £counter_intelligence_texticon Geheimdienstabwehr: §G+10%§!"
 USB_DIA_jeffrey_kruse_desc_tt: "-------------------------------------\n\n\n\n\n\n\n\n£GFX_USB_jeffrey_kruse_portrait\n\n\n\n\n\n\n\n\n-------------------------------------\n§LCIA/IC INTERN – ZUSAMMENFASSUNG DER INFORMIERUNG\nEINSTUFUNG: STRENG GEHEIM//NOFORN\nPERSONALAKTE: Jeffrey A. Kruse\nAKTUELLE POSITION: Direktor, Defense Intelligence Agency\n\nDer Betreffende ist derzeit Direktor der Defense Intelligence Agency. Er wurde nach der Notfallkonsolidierung aufgrund seiner Zusammenarbeit mit der Behörde bei der Sicherung der Kontrolle über das Pentagon und der Gewährleistung der Loyalität der Streitkräfte nach dem Terroranschlag in Washington D.C. ernannt und hat sich seitdem als maßgeblich an der Etablierung der "postdemokratischen" Militärordnung beteiligt erwiesen.\n\n§YHistorische Bedeutung:§!\nDie Karriere des Betreffenden zeigt einen systematischen Aufstieg durch zunehmend wichtige Funktionen im Bereich der nationalen Sicherheit. Zu seinen früheren Tätigkeiten zählen der Dienst in der United States Air Force sowie Geheimdienstpositionen im USINDOPACOM und USD(I&S); vor dem Bürgerkrieg war er als Berater für militärische Angelegenheiten unter dem Direktor des Nationalen Geheimdienstes tätig\n\n§YAktuelle Aktivitäten:§!\nUnter der Führung des Subjekts wurden die Operationen der Defense Intelligence Agency an die der CIA angeglichen, wobei die Agency und die DIA in einem bisher beispiellosen Ausmaß zusammenarbeiten. Als Direktor hat Kruse die Erweiterung bestehender Projekte des Verteidigungsministeriums im Bereich des maschinellen Lernens, wie beispielsweise Project Maven, überwacht und diese Systeme in den übergeordneten Überwachungsapparat integriert. Darüber hinaus leitet er die Auslandsaufklärung des Militärs. \n\n§YPersönliches Leben:§!\nDie akademischen Qualifikationen des Betreffenden stimmen weitgehend mit ihrer Laufbahn im Nachrichtendienst überein: BA in Politikwissenschaft von der Miami University (1990), MS in Strategischer Nachrichtendienst vom Joint Military Intelligence College (1996), MA in Nationaler Sicherheit und Strategischen Studien vom U.S. Naval War College (2004) und MS in Nationaler Sicherheitsstrategie vom National War College (2008).§!"
 
 USB_DIA_christine_bordine_sc: "Christine L. Bordine"
 USB_DIA_christine_bordine_tt: "§YChristine L. Bordine§!\nDIA-Direktorin\n   £pol_power Täglicher politischer Machtzuwachs: §G+0,05§!\n   £counter_intelligence_texticon Geheimdienstabwehr: §G+5%§!"
 
 USB_FBI_james_comey_sc: "James Comey"
 USB_FBI_james_comey_tt: "§YJames Comey§!\nFBI-Direktor\n   £stability_texticon Wöchentliche Stabilität falls unter 50%: §G+0,2%§!"
 USB_FBI_james_comey_desc_tt: "-------------------------------------\n\n\n\n\n\n\n\n£GFX_USB_james_comey_portrait\n\n\n\n\n\n\n\n\n-------------------------------------\n§LCIA/IC INTERN – ZUSAMMENFASSUNG DER INFORMIERUNG\nEINSTUFUNG: STRENG GEHEIM//NOFORN\nPERSONALAKTE: James Brien Comey Jr.\nAKTUELLE POSITION: 9. Direktor des Federal Bureau of Investigation\n\nDer Betreffende ist derzeit Direktor des Federal Bureau of Investigation, nachdem er diese Position durch strategische Zusammenarbeit mit der Führung der Geheimdienste nach dem Putsch zurückerobert hat. Dies ist seine zweite Amtszeit an der Spitze des FBI, nachdem er bereits von 2013 bis 2017 als 7. Direktor tätig war, bevor er von der Trump-Regierung abgesetzt wurde.\n\n§YHistorische Bedeutung:§!\nDie Entlassung des Betreffenden durch Trump machte ihn zu einem wichtigen Aktivposten für die Operationen von Cognoscenti gegen die AKR. Er nutzte sein institutionelles Wissen und seine Netzwerke in der Strafverfolgung auf Bundesebene, um wichtige Informationen vor dem Putsch zu liefern, darunter die Identifizierung interner Sympathisanten und die Bewertung institutioneller Schwachstellen.§YAktuelle Aktivitäten:§!\nNach seinem Amtsantritt führte Direktor Comey schnell Protokolle zur Personalumstrukturierung ein, um politisch unzuverlässige Personen aus dem FBI zu entfernen. Unter seiner Führung weitete das FBI die Überwachung im Inland erheblich aus und konzentrierte sich dabei auf die digitale Überwachung und die Sammlung von Informationen über extremistische Bedrohungen.\n\n§YFrühes Leben und Privatleben:§!\nDie prägenden Jahre des Subjekts verbrachte er in Allendale, New Jersey. Zu seinen frühen Begegnungen mit kriminellen Elementen gehörte eine Konfrontation mit einem bewaffneten Einbrecher während eines Hausüberfalls. Es wird angenommen, dass diese Erfahrung seinen Werdegang in Richtung Strafverfolgung und öffentlicher Dienst geprägt hat.\n\n1987 heiratete James Comey Patrice Failor, die er am College of William and Mary kennengelernt hatte. Das Paar hatte sechs Kinder – fünf überlebten, ein Sohn starb im Säuglingsalter –, ein Ereignis, das der Betreffende als einen wichtigen Faktor für seine psychologische Entwicklung bezeichnet hat.\n\nDer Wohnsitz des Betreffenden in McLean, Virginia, liegt in der Nähe wichtiger Geheimdienstinfrastrukturen und erleichtert die sichere Kommunikation mit der Führung der Behörde. Dieser Standort optimiert die operative Sicherheit und bietet eine stabile Basis für hochrangige Mitarbeiter des FBI. \n\nDer Betreffende ist irischer Abstammung. Er wurde römisch-katholisch erzogen, gehört aber derzeit der methodistischen Kirche an. Dieser Wechsel der Religionszugehörigkeit könnte auf eine adaptive persönliche Entwicklung oder eine strategische Anpassung an die vorherrschenden sozialen Normen innerhalb institutioneller Umgebungen hindeuten.§!"
 

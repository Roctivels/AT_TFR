 USB_evidence_locker_text: "Beweisschrank: [?USB_obtain_evidence_var]/6"
 USB_evidence1_text: "BEWEIS I."
 USB_evidence1_loc: "§L[USB_evidence1_scripted_loc]§!"
 USB_evidence1_loc1: "§YSplitterzelle§!\n\nBei einer bewaffneten Razzia gegen eine mutmaßliche "antisoziale Zelle" in Boston wurden deren Mitglieder festgenommen. Zu ihrer Ausrüstung gehörten militärische verschlüsselte Funkgeräte und detaillierte Pläne von Haftanstalten des Heimatschutzministeriums sowie eine Liste von Unterschlupfen, die aus internen Datenbanken der Strafverfolgungsbehörden zusammengestellt worden war. Die Personen wurden als ehemalige Militärangehörige oder Strafverfolgungsbeamte identifiziert. Bei der Vernehmung gaben sie zu, dass ihr Kontaktmann ihnen die Informationen und die Ausrüstung zur Verfügung gestellt hatte, mit dem Versprechen, ihnen im "Kampf gegen den wahren Feind" zu helfen."
 USB_evidence1_loc2: "§YTelemetriesiphon§!\n\nIm Satellitentelemetrienetzwerk, das den Bau der tief unterirdischen Militärbasis in der Wüste von Utah überwacht, wurde ein winziger, nicht autorisierter Abzweig entdeckt. Die Daten wurden nicht an eine ausländische Macht weitergeleitet, sondern an eine Serverfarm, die unter einer Briefkastenfirma mit Sitz in Fairfax, Virginia, registriert war."
 USB_evidence1_loc3: "§YFehlplatzierte Gelder§!\n\nEin erheblicher Teil der Mittel – aus einem Forschungszuschuss abgezweigt – ist unauffindbar. Die Überweisung konnte zu einer betrügerischen Scheingesellschaft mit Sitz in Panama zurückverfolgt werden. Die Überweisung wurde über eine Vielzahl von Proxys abgewickelt, wobei Methoden zum Einsatz kamen, die den Cognoscenti bekannt sind."
 USB_evidence1_loc4: "§YDatenpanne§!\n\nEs wurde versucht, auf die interne Datenbank des DOE zuzugreifen, wobei Informationen über das nationale Energienetz im Visier standen. Konkret versuchte der Täter, auf Informationen über wichtige Kernkraftwerke und deren Sicherheitsprotokolle zuzugreifen. Der Versuch schlug fehl, und seine Quelle wurde auf einen Server in Washington D.C. zurückgeführt, wobei eine Vielzahl von Proxy-Kanälen verwendet wurde, um seine Herkunft zu verschleiern."
 USB_evidence1_loc5: "§YErpressungsversuche§!\n\nMehrere Regierungsbeamte erhielten Briefe und Pakete mit sensiblen Informationen zu ihrem Privatleben. Die Nachrichten enthielten Drohungen, dass die Informationen an antisoziale Gruppen weitergegeben würden, sollten die Beamten den Forderungen nicht nachkommen."
 USB_evidence1_loc6: "§YHetzkampagne§!\n\nEine kleine Online-Hetzkampagne gegen mehrere Beamte, bei der KI-generierte Bilder und Videos verwendet werden, um den Ruf der Beamten zu ruinieren. Am auffälligsten ist die Anzahl der für diese Hetzkampagne eingerichteten Online-Sock-Accounts, deren Ursprung wahrscheinlich in Asien liegt."
 
 USB_evidence2_text: "BEWEIS II."
 USB_evidence2_loc: "§L[USB_evidence2_scripted_loc]§!"
 
 USB_evidence3_text: "BEWEIS III."
 USB_evidence3_loc: "§L[USB_evidence3_scripted_loc]§!"
 USB_evidence3_loc1: "§YNetworking§!\n\nDie Geheimdienste der Five Eyes wurden an einem einzigen Tag mehrfach fälschlicherweise über einen bevorstehenden Atomangriff der Vereinigten Staaten informiert. Durch ein ausgeklügeltes und kompliziertes bürokratisches Spiel konnte der ursprüngliche Absender der Nachrichten nicht zurückverfolgt werden. Dieser Versuch, eine "Alarmmüdigkeit" zu erzeugen, könnte auf Verbindungen von Judas zu ausländischen Geheimdiensten hindeuten."
 USB_evidence3_loc2: "§YWolfsrudel§!\n\nBei einem Versuch, die Firewall des Am-Nets zu knacken, versuchte jemand, Informationen über Dutzende von Terroranschlägen einzelner Täter, die mit US-Sicherheitsdiensten in Verbindung stehen, an die internationale Presse weiterzugeben. Die durchgesickerten Dokumente könnten mehrere US-Behörden kompromittieren, die an diesem Prozess beteiligt sind. Die Hacker verwendeten möglicherweise militärische Ausrüstung und/oder Software."
 USB_evidence3_loc3: "§YMorgenpatrouille§!\n\nEs wurden mehrere Einsatzkräfte aus FBI-, ATF- und ICE-Beamten gebildet, die unter dem Vorwand der Bekämpfung antisozialer Elemente gefälschte Liquidationsbefehle für wichtige Wissenschafts- und Geheimdienstexperten im ganzen Land ausstellten. Der Organisator war offensichtlich mit den Methoden und Verfahren von Cognoscenti vertraut. CIA-SAC-Beamten ist es gelungen, die Attentate zu verhindern."
 USB_evidence3_loc4: "§YEnde des Tunnels§!\n\nCIA-SAC-Einheiten führten eine Razzia in einem alten Tunnel unter der Grenze zwischen den USA und Mexiko durch. Der Tunnel war vom Heimatschutzministerium zur Zerstörung vorgesehen, doch diese wurde nie durchgeführt, und er wurde offenbar von unbekannten Personen genutzt. Weitere Ermittlungen sind erforderlich."
 USB_evidence3_loc5: "§YVerdächtige Anfrage§!\n\nÜber einen alten, stillgelegten Strafverfolgungskanal wurde eine diskrete Anfrage gestellt, in der die vollständigen, ungeschwärzten Personal- und psychologischen Akten von Direktor Burns aus seinen frühen Jahren in der Behörde angefordert wurden."
 USB_evidence3_loc6: "§YIstanbul Dead-Drop§!\n\nEin verschlüsseltes Datenpaket mit sorgfältig miteinander verknüpften Fallakten, die die Zusammenarbeit der CIA mit rechtsextremen Gruppen während des Bürgerkriegs detailliert beschreiben, wurde von einem sicheren Server an einen anonymisierten Dead Drop in Istanbul weitergeleitet. Es stammte von einer anonymen Person mit dem Codenamen EDGAR."
 USB_evidence3_loc7: "§YUnbefugter Personaltransfer§!\n\nDrei hochrangige Forscher der CDC, zwei untergeordnete FEMA-Angestellte und ein Dutzend mittlere ICE-Haftanstaltswärter sind innerhalb des letzten Monats verschwunden. Ihr Weggang wurde durch gefälschte Versetzungsbefehle genehmigt, die die spezifischen Protokolle der jeweiligen Behörde verwendeten, was auf fundierte institutionelle Kenntnisse hindeutet."
 USB_evidence3_loc8: "§YAnonyme Spenden§!\n\nEine Reihe anonymer Spenden an eine katholische Wohltätigkeitsorganisation, die "zu Unrecht entlassene Bundesangestellte" unterstützt, konnte auf eine komplexe Reihe von Kryptowährungstransaktionen zurückgeführt werden. Der entschlüsselte ursprüngliche Aktivierungsschlüssel für die Wallet war der Vers Matthäus 16:26: "Was nützt es dir, wenn du die ganze Welt gewinnst, aber deine Seele verlierst?""
 USB_evidence3_loc9: "§YDoktorspiel§!\n\nIn mehreren Einrichtungen wurde festgestellt, dass medizinische Ausrüstung wie Medikamente, chirurgische Instrumente und Geräte fehlten. Der Großteil davon wurde zur Versorgung von Verwundeten und Inhaftierten verwendet, ein Teil jedoch auch für verschärfte Verhörmethoden."
 USB_evidence3_loc10: "§YBig Brother§!\n\nMitarbeiter der internen Sicherheitsabteilung der CIA fanden in mehreren Regierungsgebäuden nicht genehmigte Überwachungskameras, Abhörgeräte, Bewegungssensoren und andere Überwachungsgeräte, die während Renovierungsarbeiten installiert worden waren. Die Qualität und Ausführung dieser Geräte entspricht denen, die in Überwachungsprogrammen der CIA verwendet werden."
 USB_evidence3_loc11: "§YFalsche Identitäten§!\n\nIn der "Americare"-Datenbank mit geimpften Bürgern wurde eine beträchtliche Anzahl von Einträgen als falsch entlarvt. Es handelt sich um gefälschte Identitäten, die dazu dienen, die Erfolgsquote der biometrischen Überwachung von Zivilisten künstlich zu erhöhen.\nNähere Untersuchungen ergaben, dass dadurch eine beträchtliche Anzahl von Personen, die von Interesse sind, durch die Maschen geschlüpft sind und nicht mehr aufgespürt werden können."
 
 USB_evidence4_text: "BEWEIS IV."
 USB_evidence4_loc: "§L[USB_evidence4_scripted_loc]§!"
 
 USB_evidence5_text: "BEWEIS V."
 USB_evidence5_loc: "§L[USB_evidence5_scripted_loc]§!"
 USB_evidence5_loc1: "§YGeisterserver§!\n\nNach einer umfassenden Beschlagnahmung von Proxy-Kanälen konnten verdächtige Anfragen zu einem sicheren Server in McLean, Virginia, zurückverfolgt werden. Diese Anfragen betrafen Enteignungsgesetze und Bundesbeschlagnahmungsprotokolle für Privatbesitz gemäß dem Gesetz zur öffentlichen Gesundheitssicherheit."
 USB_evidence5_loc2: "§YGeheime Studie§!\n\nEine geheime Studie zu den langfristigen neurologischen Auswirkungen der Mikrochip-Komponente des vorgeschriebenen Impfstoffs wurde ohne Genehmigung einer Führungskraft initiiert. Die vorläufigen Ergebnisse der Studie – die auf eine erhöhte Suggestibilität und unterdrückte emotionale Reaktionen hindeuten – wurden offenbar mit der Absicht gesammelt, sie kontrolliert an die Presse weiterzugeben."
 USB_evidence5_loc3: "§YWaffenlager§!\n\nEine Einheit der CIA-SAC hat eine Garage beschlagnahmt, in der sich verschiedene registrierte Schusswaffen befanden, die zuvor aus einem Regierungslager in Texas verschwunden waren. Im Hinterhof wurden halb verbrannte Dokumente des Justizministeriums gefunden."
 USB_evidence5_loc4: "§YSpeziallieferung§!\n\nVom Flughafen Denver aus wurden verdächtige Lieferungen von Baumaschinen an den Luftwaffenstützpunkt der Colorado National Guard verschickt. Die Maschinen stehen in keinem Verhältnis zu den offiziellen "Hangar-Renovierungsarbeiten", für die sie angeblich bestimmt sind."
 USB_evidence5_loc5: "§YTodesspritze§!\n\nDer bürokratische Apparat hat Dutzende plötzlicher, ungewöhnlicher Todesfälle in Michigan registriert. Spezielle Ermittlungsteams kamen zu dem Schluss, dass alle diese Menschen starben, nachdem sie eine Booster-Impfung aus einer kontaminierten Impfstofflieferung erhalten hatten, die wenige Tage zuvor an ein medizinisches Zentrum geliefert worden war. Dies war ein Versuch, das Impfprogramm und das Vertrauen der Bevölkerung in die Regierung zu untergraben. Alle Impfstoffe dieser Charge werden beschlagnahmt, die Informationen über diesen Vorfall wurden unterdrückt."
 USB_evidence5_loc6: "§YÜberfälle auf Black Sites§!\n\nBerichte über antisoziale Angriffe auf geheime Standorte haben im ganzen Land die Runde gemacht; die geheimen Standorte waren für Überwachungszwecke ausgelegt und mit den neuesten Systemen ausgestattet, die Teil der Programme Am-Net und Project Maven sind."
 USB_evidence5_loc7: "§YSchmugglerei§!\n\nMindestens ein Dutzend Personen, die in mehreren Einrichtungen an der Grenze zwischen den USA und Mexiko inhaftiert waren, wurden nie in diesen Einrichtungen aufgefunden. Eine eingehendere Untersuchung kommt zu dem Schluss, dass diese Personen für persönliche Zwecke entführt wurden."
 
 USB_evidence6_text: "BEWEIS VI."
 USB_evidence6_loc: "§L[USB_evidence6_scripted_loc]§!"
 USB_evidence6_loc1: "§YSection Six§!\n\nEin Toyota-Autohaus in Maryland, das nur wenige Monate nach dem Bürgerkrieg gegründet worden war, wurde für Geldwäsche missbraucht. Nach weiteren Ermittlungen wurde der Fall von der CIA übernommen: Eine der Nachrichten im Zusammenhang mit den Transaktionen enthielt eine verschlüsselte Botschaft mit wichtigen Informationen über KI-Technologien, die vom Cyber Command im Rahmen des Patriot II Act eingesetzt wurden."
 USB_evidence6_loc2: "§YRoter Oktober§!\n\nEine Sonoboje im Pazifischen Ozean hat ein U-Boot der Zhou-Klasse der chinesischen Marine entdeckt, das regelmäßig bei 5°41'06"S 102°53'03"W Halt machte. Die Überwachung zeigte, dass das U-Boot Nachrichten in Richtung Miami sendete und empfing. Das USINDOPACOM gab an, keine Kenntnis von diesem Vorfall zu haben."
 USB_evidence6_loc3: "§YNukleare Schlüsselkarte§!\n\nEine Schlüsselkarte für ein Tiefenlager für radioaktive Abfälle, eines von Dutzenden solcher Anlagen, ist aus dem Bestand verschwunden. Der Antrag auf Beschaffung wurde unter Berufung auf eine Routineinspektion unter der Aufsicht des FBI gestellt. Die Inspektion fand jedoch nie statt."
 USB_evidence6_loc4: "§YAbgefangene Nachricht§!\n\nEine Funküberwachungsgruppe der CIA hat eine verschlüsselte Nachricht aufgezeichnet, die aus dem nordöstlichen Teil von Washington DC gesendet wurde. Die genaue Adresse wird noch ermittelt. Eine teilweise Entschlüsselung ergab, dass die Rufzeichen "SERGEANT STUBBY" und "BROTHER TEN" verwendet wurden. Der Rest der Nachricht ist in einem unbekannten Code verfasst und wird noch entschlüsselt."
 USB_evidence6_loc5: "§YGeheimlabor§!\n\nEin geheimes Labor, das sich in einer stillgelegten U-Bahn-Station unter Manhattan befand, wurde von einer Einheit der CIA-SAC gesichert. Das Labor war mit gestohlenem CDC-Equipment ausgestattet und verfügte über eine kleine Gruppe "vermisster" Forscher, die sich alle das Leben nahmen, bevor sie befragt werden konnten. Auf einem Labortisch lag ein halbfertiger Bericht, in dem eine Methode zur Umkehrung des biometrischen Tracking-Prozesses beschrieben wurde. Daneben lag ein abgenutzter Rosenkranz."
 USB_evidence6_loc6: "§YGefährliche Umgebung§!\n\nLuftüberwachungsflugzeuge der CIA entdeckten unerlaubte Aktivitäten nördlich des Lost Creek-Projekts im Zentrum von Wyoming. Bodenteams fanden eine unterirdische Ausgrabungsstätte, unmarkierte Lastwagen und einige hundert Personen, die in einem FEMA-Lager festgehalten wurden und in eine nahegelegene Kohlemine gebracht werden sollten. Keiner der Befehlshaber wurde lebend gefangen genommen."
 USB_evidence6_loc7: "§YGesundheitstag§!\n\nDas gesamte nicht unbedingt erforderliche Personal der U-Boot-Basis Kings Bay wurde unter Verweis auf die Gefahr eines biologischen/chemischen Terroranschlags zu einer obligatorischen medizinischen Untersuchung, Impfung und Hygieneinspektion in der Basis geschickt. Die Anfrage für die Inspektion wurde über Kanäle der großen Pharmaunternehmen übermittelt."
 USB_evidence6_loc8: "§YVersteckspiel§!\n\nBei einer Razzia der CIA in einem Hafen in Tijuana wurde eine illegale Operation eines Kartells zerschlagen, wobei ein Schiff beschlagnahmt wurde, das gerade aus San Diego eingetroffen war: Neben Waffen und Drogen sicherten CIA-SAC-Agenten einen Container mit ungewöhnlich hoher radioaktiver Aktivität. Durch fortgeschrittene Verhörtechniken gelang es, den gefangenen Personen zu entlocken, dass sie aufgrund einer Lücke im Zuständigkeitsbereich der Küstenwache Waren über die Grenze schmuggeln konnten, die als Transportaktivitäten von FEMA-Lagern an der Grenze zwischen den USA und Mexiko dokumentiert wurden, die jedoch tatsächlich nie daran beteiligt waren."
 

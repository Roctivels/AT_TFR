 USB_Pfizer_albert_bourla_sc: "Albert Bourla"
 USB_Pfizer_albert_bourla_tt: "§YAlbert Bourla§!\nPfizer-Vorstandsvorsitzender und CEO\n   £research_speed_texticon Forschungsgeschwindigkeit: §G+5%§!"
 USB_Pfizer_albert_bourla_desc_tt: "-------------------------------------\n\n\n\n\n\n\n\n£GFX_USB_albert_bourla_portrait\n\n\n\n\n\n\n\n\n-------------------------------------\n§LCIA/IC INTERN – ZUSAMMENFASSUNG DER INFORMIERUNG\nEINSTUFUNG: STRENG GEHEIM//NOFORN\nPERSONALAKTE: Albert Bourla\nAKTUELLE POSITION: Vorstandsvorsitzender, Pfizer Inc. Als wichtiges Mitglied des Finanzflügels des Deep State vertritt der Betreffende pharmazeutische Interessen und arbeitet mit Unternehmen wie BlackRock und der Bill & Melinda Gates Foundation zusammen. In Zusammenarbeit mit Larry Fink (BlackRock) hat die Person die Umsetzung von "AmeriCare" mitgestaltet und dafür gesorgt, dass vorgeschriebene öffentlich-private Partnerschaften einen geschlossenen Pharmamarkt schaffen.\n\n§Historische Bedeutung:§!\nDer Betreffende trat 1993 bei Pfizer ein und stieg innerhalb der Unternehmenshierarchie stetig zu führenden Führungspositionen auf. Im Januar 2018 wurde er zum COO befördert und später im selben Jahr zum CEO. Der ausgebildete Tierarzt war zuvor als Präsident des globalen Geschäftsbereichs für Impfstoffe, Onkologie und Verbrauchergesundheit bei Pfizer tätig und leitete die Produktentwicklung und -einführung.\n\nDer Betreffende spielte während der COVID-19-Pandemie eine entscheidende logistische Rolle bei der Koordinierung der weltweiten Impfstoffproduktion. Während dieser Zeit begann er mit Geheimdiensten zusammenzuarbeiten, um Regierungsaufträge zu sichern und die Impfpolitik zu gestalten, wodurch er den Grundstein für das Gesetz zur öffentlichen Gesundheitssicherheit legte. \n\n§Aktuelle Tätigkeiten:§!\nDer Betreffende beaufsichtigt die Expansion von Pfizer in das vorgeschriebene "AmeriCare"-System und koordiniert mit Bundesbehörden die Entwicklung und den Einsatz von Impfstoffplattformen der nächsten Generation. Unter seiner Leitung hat Pfizer Forschungseinrichtungen eingerichtet, die biometrische Verfolgung mit obligatorischen Impfprotokollen verbinden. Das Unternehmen stellt auch Arzneimittel für Programme zur Verhaltensänderung und sozialen Befriedung her.\n\nDer Betreffende berät sich regelmäßig mit der Führung der Cognoscenti in Fragen der Biosicherheit und des Bevölkerungsmanagements. Seine Fachkenntnisse in den Bereichen Pharmalogistik und öffentlich-private Partnerschaften machen ihn zu einer unschätzbaren Ressource für die Umsetzung des im Gesetz zur Sicherheit im Gesundheitswesen vorgesehenen Gesundheitssicherheitsapparats.\n\n§YFrühes Leben und Privatleben:§!\nDer Betreffende wurde 1961 in Thessaloniki, Griechenland, als Sohn einer sephardischen jüdischen Familie geboren. Der Betreffende hat einen Doktortitel in Reproduktionsbiotechnologie von der Veterinärschule der Aristoteles-Universität Thessaloniki. Die Person ist mit Myriam Alchanati verheiratet und hat zwei Kinder, eine Tochter und einen Sohn. Der Betreffende unterhält eine Sommerresidenz in Chalkidiki, Griechenland.§!"
 

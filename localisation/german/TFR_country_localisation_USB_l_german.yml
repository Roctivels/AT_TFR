 #Events
 usb.1.t: "Joe Biden ist tot"
 usb.1.desc: "Heute ist der 46. Präsident der Vereinigten Staaten von Amerika, Joseph Robinette Biden Jr., verstorben. \n\nFür viele war dies unvermeidlich, doch das macht das Ergebnis nicht weniger schwer zu begreifen. Trotz unzähliger Monate, in denen der Präsident das enorme Gewicht der Zukunft Amerikas auf seinen Schultern trug, reichten seine Zähigkeit und Beharrlichkeit im Angesicht der Tyrannei nicht aus, um seine angeschlagene Gesundheit zu verbessern. Nur wenige konnten sich den Stress vorstellen, den der Präsident infolge dieses verheerenden Konflikts mit sich herumtrug - Stress, von dem viele glauben, dass er letztlich die Hauptursache für seinen allmählichen gesundheitlichen Verfall und schließlich seinen Tod war. In der gesamten Union ist Trauer ausgebrochen, als die Nachricht nach außen drang; unsere Flaggen wehen auf Halbmast, während Beileidsbekundungen aus dem Ausland eintreffen. \n\nWie es sich gehört, wenn ein Präsident während seiner Amtszeit verstirbt, wurde Vizepräsidentin Kamala Harris fast sofort als Bidens Nachfolgerin vereidigt und damit offiziell zur 47. Präsidentin der Vereinigten Staaten. Obwohl dies normalerweise als monumentales Ereignis angesehen würde, da sie nun die erste Afroamerikanerin und Asiatin ist, die das Amt des Präsidenten bekleidet, können sowohl sie selbst als auch alle anderen zustimmen, dass dieser Fortschritt nicht so eingetreten ist, wie sie es sich erhofft hatten. Unabhängig davon liegt die Verantwortung, das Land zum Sieg zu führen, nun bei Präsidentin Harris, von der viele überzeugt sind, dass sie aufgrund ihres deutlich jüngeren Alters und ihrer allgemein besseren Gesundheit lange genug durchhalten wird, um das Ende des Krieges zu erleben."
 usb.1.a: "Ein trauriger Tag für unsere Demokratie."
 usb.2.t: "§GProgressive§! schlagen Sozialausgaben vor"
 usb.2.desc: "Während einer kürzlich abgehaltenen Sitzung des Kongresses in Washington haben die progressiven Mitglieder der Demokratischen Fraktion einen Gesetzentwurf zu unseren derzeitigen Sozialausgaben vorgelegt. Der Gesetzentwurf fordert eine Aufstockung der Mittel für Sozialprogramme und Hilfsmaßnahmen für Amerikaner, die unter den Auswirkungen des Krieges leiden, insbesondere in dem Bemühen, die Amerikaner in dieser schrecklichen Zeit über Wasser zu halten. Während einige Liberale diesem Gedanken zugestimmt haben, kommt der Gesetzentwurf auf Betreiben der Konservativen zustande, die einen solchen Gesetzentwurf in einer so schlimmen Zeit wie dieser für "verschwenderische Ausgaben" halten und der Meinung sind, dass diese Mittel an anderer Stelle besser angelegt wären. Unabhängig von der Meinung liegt es am Präsidenten, dieses Gesetz zu verabschieden oder sein Veto einzulegen."
 usb.2.a: "Sie brauchen unsere Hilfe mehr denn je, und zwar genau jetzt. (Gesetz verabschieden)"
 usb.2.b: "Wir brauchen nicht zu erweitern, was nicht erweitert werden muss. (Veto einlegen)"
 usb.3.t: "§YLiberale§! schlagen Militärausgaben vor"
 usb.3.desc: "Während einer kürzlich abgehaltenen Kongresssitzung in Washington D.C. haben die demokratischen Abgeordneten einen Gesetzentwurf zu unseren derzeitigen Militärausgaben vorgelegt. Der Gesetzentwurf fordert eine Aufstockung der Mittel für unsere Streitkräfte und verweist darauf, dass die derzeitige Situation eine zusätzliche Konzentration auf die Kampffähigkeiten unseres Militärs erfordert, um "sicherzustellen, dass die Verteidiger der amerikanischen Bürger und der Demokratie im Angesicht tyrannischer Widrigkeiten angemessen ausgerüstet sind". \n\nWährend eine Reihe von konservativen Republikanern dem Vorschlag zugestimmt haben, äußerten einige Progressive Bedenken, da sie der Meinung sind, dass eine zu intensive Konzentration auf die Streitkräfte zu einer Vernachlässigung der vom Krieg am stärksten betroffenen Bürger führen wird. Unabhängig von der Meinung liegt die Entscheidung über die Annahme oder das Veto des Gesetzentwurfs beim Präsidenten."
 usb.3.a: "Das Militär braucht die Mittel jetzt mehr denn je. (Gesetz verabschieden)"
 usb.3.b: "Der Zustand unseres Militärs ist in Ordnung, fürs Erste. (Veto einlegen)"
 usb.4.t: "§CKonservative§! schlagen Ausgabenkürzungen vor"
 usb.4.desc: "Während einer kürzlich abgehaltenen Kongresssitzung in Washington D.C. haben die republikanischen Abgeordneten einen Gesetzesentwurf über den aktuellen Stand unserer Inlandsausgaben vorgelegt. Der Gesetzesentwurf selbst fordert eine Kürzung der Sozialausgaben auf breiter Front und führt an, dass unsere derzeitige Situation so schlimm sei, dass die Öffentlichkeit "notwendige Opfer" auf finanzieller Ebene zum Wohle der Zukunft Amerikas erbringen müsse, um Mittel für unmittelbarere Ausgaben zur Unterstützung der derzeitigen Kriegsanstrengungen freizusetzen. \n\nWährend der Gedanke an fiskalische Sparsamkeit in dieser außerordentlich beispiellosen Zeit einige Liberale angezogen hat, wird die Zustimmung zu einem solchen Gesetz zweifellos auf die Missbilligung der zentristischen und progressiven Demokraten im Kongress stoßen. Viele sträuben sich gegen die Vorstellung, dass wir in einer Zeit, in der viele Amerikaner in eine schwierige und instabile finanzielle Lage geraten sind, Kürzungen bei solchen Annehmlichkeiten vornehmen. Unabhängig von den Meinungen liegt es im Ermessen des Präsidenten, ob er das Gesetz verabschiedet oder sein Veto einlegt."
 usb.4.a: "Wir werden alle Opfer bringen müssen. (Gesetz verabschieden)"
 usb.4.b: "Unser derzeitiges Ausgabenniveau ist genau richtig. (Veto einlegen)"
 usb.04.t: "§CKonservative§! schlagen Industrialisierungsgestz vor"
 usb.04.desc: "Während einer kürzlich abgehaltenen Kongresssitzung in Washington D.C. haben die republikanischen Abgeordneten einen Gesetzentwurf für das industrielle Kernland der USA vorgelegt. Der Gesetzesentwurf selbst fordert eine Steigerung der Industrieausgaben auf breiter Front und führt an, dass unsere derzeitige Situation so katastrophal ist, dass die Öffentlichkeit \"die Notwendigkeit einer Industrie versteht\".\n\n Während der Gedanke an eine gesteigerte Produktion in dieser außerordentlich beispiellosen Zeit einige §YLiberale§! angezogen hat, wird die Zustimmung zu einer solchen Gesetzgebung zweifellos auf die Missbilligung der §GProgressiven§! Viele verweisen auf das Risiko, das wir der Welt durch eine massive Reindustrialisierung aufbürden, und führen Studien zum Klimawandel als Beweis dafür an, dass wir die Industrialisierung stoppen müssen. Unabhängig von den Meinungen liegt es im Ermessen des Präsidenten, ob er das Gesetz verabschiedet oder sein Veto einlegt."
 usb.04.a: "Jeder Hammer schlägt auf den Feind. (Gesetz verabschieden)"
 usb.04.b: "Unsere derzeitige Anzahl von Fabriken ist völlig in Ordnung. (Veto einlegen)" 
 usb.5.t: "Zivile Unruhen nehmen zu"
 usb.5.desc: "Während der Bürgerkrieg weiter wütet, bröckeln die Grundfunktionen der Gesellschaft langsam weiter. Trotz unserer größten Anstrengungen fällt es uns immer schwerer, für unsere Bevölkerung zu sorgen und unsere Gesetze auf den Straßen unseres Landes durchzusetzen. Normale Bürger greifen zu Gewalt und Kriminalität, um sich über Wasser zu halten, während die schlimmsten Mitglieder unserer Gesellschaft sich immer mehr gegenseitig ausnutzen. Konflikte zwischen ideologischen Feinden lassen unsere Städte in Trümmern liegen, die wir nicht schnell genug beheben können, und die Stimmung wird von Tag zu Tag düsterer.\n\nWir müssen unsere Ressourcen darauf verwenden, die Ursachen dieser Unruhen zu bekämpfen, bevor wir im Chaos versinken."
 usb.5.a: "Wir können nur so viel tun."
 usb.6.t: "Joe Bidens Gesundheit verschlechtert sich"
 usb.6.desc: "Mit der Last des zweiten amerikanischen Bürgerkriegs auf den Schultern des Oberbefehlshabers hat der Gesundheitszustand von Präsident Biden in letzter Zeit dennoch einen Schlag erlitten. Angesichts der enormen Belastung, die der 46. Präsident der Vereinigten Staaten zu tragen hat, machen sich die Auswirkungen dieses Konflikts nun auch in seinen täglichen Aufgaben bemerkbar. Seit kurzem klagt der Präsident über Kopfschmerzen und Migräne sowie über zunehmende körperliche Ermüdung und Schwindel. \n\nObwohl dies im Moment noch kein Grund zur Sorge ist, wird erwartet, dass das Alter des Präsidenten und die Schwere des Krieges seinen Zustand im weiteren Verlauf noch verschlechtern werden."
 usb.6.a: "Ein bisschen Stress ist kein Grund zur Aufregung."
 usb.7.t: "Einfluss der Unternehmen nimmt zu"
 usb.7.desc: "Es ist kein Geheimnis, dass die verschiedenen Unternehmen und Großindustrien, die der rechtmäßigen amerikanischen Regierung pflichtbewusst dienen, ihre Präsenz verstärkt haben. Die verstärkte Präsenz der größten wirtschaftlichen Konkurrenten - sowohl innerhalb als auch außerhalb des militärisch-industriellen Komplexes - hat bisher in hohem Maße zu unseren Bemühungen beigetragen, sei es durch die Bereitstellung von Hilfsgütern für die betroffenen Gebiete in Zusammenarbeit mit den Regierungstruppen, durch regierungsfreundliche Medienberichte über den Fortgang des Krieges und über Nachrichten aus dem Inland, durch die Versorgung unserer Truppen mit Ausrüstung und sogar durch dringend benötigte Nachschublieferungen an die Frontlinie.\n\nWährend nur wenige die Vorteile leugnen können, haben sie umgekehrt in letzter Zeit erheblich an Einfluss gewonnen. Es wurden vermehrt Gesetze zugunsten von Unternehmen verabschiedet und vorgeschlagen, die sich auf deren Wohltätigkeit und direkte Unterstützung während des Krieges berufen - einige vermuten jedoch, dass dies auf frühere und aktuelle Verbindungen zu den verschiedenen Unternehmen zurückzuführen ist, die derzeit die Runde machen. Unabhängig davon werden wir diese internen Entwicklungen im Auge behalten müssen, damit nicht etwas Drastisches als Ergebnis der nun geschwächten politischen Struktur des Landes geschieht."
 usb.7.a: "Solange wir alle davon profitieren."
 usb.8.t: "Joe Biden steigt auf"
 usb.8.desc: ""
 usb.8.a: "Ein amerikanischer Caligula"
 usb.9.t: "Ein Attentäter greift Joe an!"
 usb.9.desc: ""
 usb.9.a: ""
 usb.10.t: "Freiheiten sinken"
 usb.10.desc: ""
 usb.10.a: "Amerika verliert seine Freiheiten..."
 usb.11.t: "Antiföderaler Aufstand"
 usb.11.desc: "Der Angriff auf die Hauptstadt hat viele Teile der Bundesregierung in Unordnung gebracht. Einige Kommunalverwaltungen in abgelegenen Landkreisen wurden vollständig überrannt, wodurch mehrere Aufständische große Landstriche unter ihre Kontrolle bringen konnten. \n\nWir erhalten zahlreiche Berichte über mehrere Banden, faschistische, kommunistische und anarchistische Terrororganisationen sowie Meuterer der Armee, die ihre Macht über bestimmte Städte erklären. Der Großteil unserer Armee ist mit Kämpfen im Westen beschäftigt, was unsere Möglichkeiten einschränkt, dieser Entwicklung entgegenzuwirken.\n\nDie Geheimdienste haben der Regierung einen Plan für eine Notfallkonsolidierung vorgelegt, um die Kontrolle über unser Territorium zurückzugewinnen und die Verräter zurückzuschlagen, der in Kürze in Kraft treten wird. Die Republik wird bestehen bleiben, egal was es kostet."
 usb.11.a: "Schlagt sie nieder!"
 usb.12.t: "Der Firmenkomplott"
 usb.12.desc: "In der politischen Maschinerie der Union war es kein Geheimnis, dass im Laufe des Krieges eine Reihe sehr prominenter Unternehmen und Konglomerate einen offenbar extrem großen Einfluss innerhalb der Regierung gewonnen haben. Präsident Biden war sich dessen ebenfalls bewusst - und genau das erregte sein Misstrauen, als er von verschiedenen Personen, die man als "einflussreich" bezeichnen könnte, zu einem Treffen über die künftige Politik eingeladen wurde.\n\nNormalerweise hätte er sich darüber keine Gedanken gemacht. In seiner Position waren Besprechungen an der Tagesordnung. Als er jedoch diesen Anruf erhielt, hatte er das Gefühl, dass sich etwas geändert hatte - er konnte fast einen Unterschied im Tonfall spüren, als ob die Einladung zu dem Treffen gar nicht dazu gedacht war, "zukünftige Politik" zu besprechen. Eine solche misstrauische Atmosphäre war in letzter Zeit viel häufiger anzutreffen. Vielleicht war er mit dem Alter weiser geworden - oder umgekehrt paranoider -, aber er wurde das Gefühl nicht los, dass die Annahme der Einladung zu diesem Treffen zu etwas noch nie Dagewesenem führen würde.\n\nDie Uhr im Oval Office tickte weiter, die Sekunden vergingen. Die Zeit erinnerte ihn daran, dass gerade eine Kongresssitzung stattfand, zu einem Thema, das er inzwischen vergessen hatte. Von hier aus sollte eine Entscheidung getroffen werden - eine Entscheidung, die zweifellos die Zukunft der Union bestimmen würde, ob der Präsident das nun wollte oder nicht."
 usb.12.a: "\"Schickt meine Assistenten zu dem Treffen. Ich möchte mit dem Kongress sprechen.\""
 usb.12.b: "\"Ich werde an dem Treffen teilnehmen.\""
 usb.13.t: "Joe Bidens Gesundheit verschlechtert sich"
 usb.13.desc: "Der Gesundheitszustand von Präsident Joe Biden hat sich in den letzten Wochen immer weiter verschlechtert, während der Konflikt weiter tobt. Der Oberbefehlshaber leidet regelmäßig unter erheblichen Schmerzen in der Brust und in den Muskeln seines Körpers, und seine Gelenke sind aufgrund der starken Beschwerden ziemlich steif geworden. In mehreren Fällen, in denen er sich überanstrengt hat, hat er erhebliche Schmerzen in der Brust verspürt, er ist häufiger umgekippt und hat im Allgemeinen nicht mehr das Niveau wie zu Beginn seiner Amtszeit. Eine Untersuchung ergab, dass die Veränderungen vorerst keinen Grund zur Beunruhigung darstellten und dass es sich in erster Linie um Stress und Alter handelte und nicht um eine Grunderkrankung. Zusätzlich zu seinen früheren Symptomen hat dies jedoch zu einer Reihe von Unannehmlichkeiten für den Präsidenten geführt."
 usb.13.a: "Beunruhigend."
 usb.14.t: "Joe Bidens Gesundheit verschlechtert sich"
 usb.14.desc: "In letzter Zeit wurde den Mitarbeitern und dem Kabinett des Präsidenten deutlich, dass sich sein Gesundheitszustand verschlechtert hat. In den letzten Tagen wurde der Präsident krank und zeigte Anzeichen von Fieber und zunehmenden Schwierigkeiten bei alltäglichen Aufgaben, so dass er mehrmals Hilfe benötigte. Sein blasser Teint und seine allgemeine körperliche Schwäche wurden von Erbrechen, Desorientierung und dem fehlenden Verlangen, etwas zu essen, begleitet.\n.\nDaher befinden sich nun mehrere medizinische Mitarbeiter in der Nähe von Präsident Biden, um seine weitere Behandlung zu gewährleisten, während er trotz der zunehmenden Schwierigkeiten seine Aufgaben wahrnimmt. Der Präsident behauptet zwar, dass es sich lediglich um eine saisonale Grippe handelt, aber nur wenige seiner Mitarbeiter glauben, dass dies der einzige Faktor ist."
 usb.14.a: "Wir müssen ihn jetzt sehr genau im Auge behalten."
 usb.15.t: "Joe Bidens Gesundheit verschlechtert sich"
 usb.15.desc: "Vielen in Bidens engstem Kreis ist klar, dass mit seinem Gesundheitszustand offensichtlich etwas nicht stimmt. Der immense Druck des Bürgerkriegs hat die körperliche und geistige Leistungsfähigkeit des Oberbefehlshabers seit geraumer Zeit zermürbt. Konnte der Präsident früher mit den Unannehmlichkeiten mehr oder weniger gut umgehen, so ist er jetzt viel häufiger als sonst bettlägerig. Das medizinische Personal unterstützt ihn bei seinen Bewegungen, um sicherzustellen, dass er nicht stürzt und sich eine Fraktur zuzieht; er ist ständig an eine Infusion angeschlossen, damit er hydriert bleibt. Trotz alledem beharrt der Präsident darauf, bei den verschiedenen Sitzungen und Diskussionen anwesend zu sein - auch wenn ein Großteil seiner Aufgaben von seinen Mitarbeitern und Vizepräsident Harris an seiner Stelle wahrgenommen wird.\n\nDie kognitiven Fähigkeiten des Präsidenten - die schon vor dem Bürgerkrieg in Frage standen, wenn auch meist aufgrund von Angriffen der Opposition - haben ganz offensichtlich ebenfalls stark nachgelassen, auch wenn er noch einigermaßen aktiv an der Entscheidungsfindung beteiligt ist. Eine Reihe von Fällen, in denen Biden Dinge vergessen hat, die er bereits kannte (Namen, Gesichter, Wegbeschreibungen usw.), sowie die Verwirrung über vergangene Diskussionen und Treffen wurden von seinem Umfeld sehr deutlich wahrgenommen. Im Kapitol und im Weißen Haus kursieren weiterhin Gerüchte, und die allgemeine Stimmung ist geprägt von einem Gefühl des Schreckens für den 46."
 usb.15.a: "Er hat nicht mehr viel Zeit, oder?"
 usb.16.t: "Biden spricht im Kongress"
 usb.16.desc: "\"Innerhalb dieser Werte befinden wir uns in einem heiklen Gleichgewicht der Macht - sowohl in Bezug auf die Exekutive als auch auf das Funktionieren des Staatsapparats", sagte der Präsident mit ungewohnter Konzentration und Nachdruck, während die Blicke des Repräsentantenhauses auf ihn gerichtet waren. Im Saal herrschte eine Atmosphäre, die zu gleichen Teilen Ehrfurcht und Verwirrung auslöste - normalerweise würde der Präsident nur dann vor dem Kongress sprechen, wenn er direkt dazu aufgefordert würde, und Biden schien nicht der Typ für Überraschungen zu sein. Und doch war er hier und hielt eine improvisierte Rede über den aktuellen Zustand der Regierungsfunktionen und die zunehmende Kontrolle durch die Unternehmen, die während der Kriegsanstrengungen stattgefunden hatte. "Während unsere Nation durch die wohl dunkelste Zeit seit über zweihundert Jahren geht", fuhr er fort, "ist es von größter Wichtigkeit, dass wir uns die Gründe vor Augen halten, warum dieser bedauerliche Konflikt geführt wird. Es gibt nichts Wichtigeres", er hielt kurz inne, als sich die Türen zum Plenarsaal etwas energisch öffneten und mehrere namhafte Persönlichkeiten - Kongressabgeordnete, übrige Wirtschaftsführer, Spitzenbeamte - beim Anblick des Oberbefehlshabers auf dem obersten Podium inne hielten. Als der Präsident innehielt und den Eingang betrachtete, drehten sich einige Abgeordnete in der Nähe um und blickten mit hochgezogenen Augenbrauen auf die Männer, die soeben hereingeplatzt waren.\n\n\"...als unsere Demokratie vor allen Mächten zu schützen, seien sie nun ausländisch oder einheimisch", beendete er und blickte dabei die wichtigen Männer direkt an. Unbeholfen rückten sie ihre Kleidung zurecht, während sie versuchten, lässig ihre Plätze zu finden, als hätten sie von vornherein vorgehabt, an der Sitzung teilzunehmen. Diejenigen, die nicht dazugehörten, nickten unbeholfen und verließen den Saal, zweifellos wütend darüber, dass ihr scheinbar einfaches Ziel so peinlich und leicht vereitelt worden war. Selbst einige, die bereits an der Sitzung teilnahmen, bewegten sich unbehaglich auf ihren Plätzen, mehr oder weniger bewusst, was beinahe geschehen wäre. Der Präsident lächelte kurz aus den Mundwinkeln und fuhr mit seiner Rede fort, ohne sich Gedanken darüber zu machen, was passieren würde, wenn er den Raum verließ."
 usb.16.a: "Starke Rede, Mr. President."
 usb.17.t: "Bidens Rücktritt"
 usb.17.desc: "Mit dem heutigen Tag ist der 46. Präsident der Vereinigten Staaten, Joseph Robinette Biden, von seinem Amt zurückgetreten, wofür es eine Reihe von erklärten Gründen und Faktoren gibt. Die Verschlechterung seines persönlichen Gesundheitszustands, die wachsende Opposition im Repräsentantenhaus und das mangelnde Vertrauen in den Oberbefehlshaber haben dazu geführt, dass der Präsident sein Amt endgültig niedergelegt hat, angeblich aus eigenem Antrieb. Andere begrüßen den Rücktritt des Präsidenten und respektieren, dass der Präsident zu dem Schluss gekommen ist, dass er nicht mehr in der Lage ist, die Nation zu führen, anstatt sie in dieser schwierigen Zeit möglicherweise in den Ruin und in eine Niederlage zu führen. \n\nTrotz der langen Tradition, dass der Vizepräsident das Amt übernimmt, kam es in einer kurzen Dringlichkeitssitzung des Repräsentantenhauses zu einem noch nie dagewesenen Ereignis, bei dem viele Kongressmitglieder den ehemaligen New Yorker Bürgermeister Michael Bloomberg - der seinen Einfluss während des gesamten Krieges beibehalten hatte - für das Amt des Präsidenten vorschlugen, wobei sie seine frühere politische Erfahrung und sein mit vielen Staatsapparaten der Union abgestimmtes Verhalten anführten. Während sich viele gegen diesen Schritt gesträubt haben, hat Vizepräsidentin Kamala Harris Bloombergs plötzlichen Aufstieg in das höchste Amt der Nation befürwortet und wird angeblich in ihrem Amt bleiben."
 usb.17.a: "\"Meine Herren, alles ist bezahlt und abgerechnet.\""
 usb.18.t: "Das Firmenkomplott verdichtet sich"
 usb.18.desc: "Während sich die zweifellos folgenreichste politische Katastrophe des 21. Jahrhunderts in ganz Amerika ausbreitete, hatten die Machenschaften der einst mächtigen politischen Maschinerie ihre Verantwortung natürlich erheblich verlagert. Wie sich in den letzten Monaten gezeigt hatte, war der Einfluss der Konzerne innerhalb der Union trotz aller Bemühungen des Generalstabschefs, sie unter Kontrolle zu halten, angesichts des Krieges immer weiter gewachsen. \n\nEs war kein Geheimnis, dass der Krieg bei den hochrangigen Vertretern des Staatsapparats zu höheren Ambitionen geführt hatte. Frühere Versuche, direktere politische Manöver gegen die Exekutive zu unternehmen, waren dank der ungewöhnlich schnellen Auffassungsgabe des Präsidenten auf subtile Weise vereitelt worden. Trotz der jüngsten Erfolge bei der Eindämmung des Einflusses interner Elemente scheint deren jüngste Stagnation die potenziellen Verschwörer nicht so sehr abgeschreckt zu haben, wie wir ursprünglich gehofft hatten. Eine Reihe von Kongressmitgliedern und einflussreichen Geschäftsleuten sind nach einer Periode vermeintlicher Subtilität in ihren Handlungen deutlich misstrauischer geworden; in den letzten Monaten wurden auffällige Zusammenkünfte, merkwürdige Treffen und Telefonate sowie ein unbedarftes Bemühen, die Bemühungen der Unternehmen auf der politischen Bühne voranzutreiben, beobachtet.\n\nDiese plötzliche Zunahme seltsamer Aktivitäten ist dem Präsidenten natürlich nicht entgangen. Es hat den Anschein, dass die mutmaßlichen Verschwörer - wenn sie immer noch aktiv versuchen, die Autorität des Präsidenten an sich zu reißen - nach ihren früheren Versäumnissen nun schon seit geraumer Zeit Vorbereitungen getroffen haben. Der Präsident steht also vor einer Entscheidung, die er während seiner Amtszeit hoffentlich nicht mehr treffen muss. Er könnte seine Geheimdienstler anweisen, gegen diese Personen zu ermitteln, und sie damit aus der Bahn werfen, sobald sie merken, dass der Oberbefehlshaber sie wieder einmal im Visier hat; oder er könnte jede weitere interne Beobachtung unterlassen. Schließlich wusste er, dass sie nichts Hinterhältiges vorhatten - aber war es das Risiko wirklich wert, wenn sie es schon einmal versucht hatten?"
 usb.18.a: "\"Wenn sie es einmal versucht haben, werden sie es wieder tun.\""
 usb.18.b: "\"Es gibt keinen Grund, wegen Paranoia Federn zu lassen.\""
 usb.19.t: "Den Vorstand einbinden"
 usb.19.desc: "Bloomberg schlurfte auf das Parkett des Kongresses, umgeben von seinen Mitarbeitern und einigen Politikern, die ihm folgten. Alle Anwesenden wussten, dass dies eine der wichtigsten Sitzungen des Kongresses in der jüngeren amerikanischen Geschichte sein würde; es würde die entscheidende Abstimmung über den neuen Mehrheitsführer sein. Wirtschaftliches Missmanagement, öffentliche Instabilität und eine uneinheitliche Führung hatten sich für den Liberal Caucus als katastrophal erwiesen. Unter der Führung von Kamala Harris waren sie die einflussreichste Kraft in der Innenpolitik der neuen Union gewesen, und dies würde der Höhepunkt ihres Niedergangs sein. Der vorsitzende Beamte verkündete, dass die Abstimmung ohne große Überlegungen von Kamala beginnen würde, die von Nervosität geplagt war, während ihre Mitarbeiter aufmerksam zusahen. So würden desillusionierte Liberale und Progressive gleichermaßen diesen Moment nennen. Die letzte Stimme wurde von Senator Michael Bennet zugunsten der innovationsorientierten Fraktion abgegeben. Die Abstimmung ergab ein Ergebnis von 61:39, wobei es dem eilig gebildeten progressiv-liberalen Caucus nicht gelang, einen gemeinsamen Versuch der Konservativen und der Innovationisten, Al Gore als Mehrheitsführer einzusetzen, zu verhindern. Gore schritt die Treppe zum Podium hinauf, nachdem ihm der Vorsitzende das Wort erteilt hatte.\n\n\"Meine amerikanischen Mitbürger, ich bin hier, um mit größter Dankbarkeit zu dieser Resolution zu sprechen. Die amerikanische Demokratie wird an allen Fronten angegriffen, von innen und von außen.  Ein neues Amerika braucht mehr als alles andere Taten, und ich schwöre unter dem Eid der Verfassung, dass ich dieser Mann sein werde.\""
 usb.19.a: "Kauft ihre Produkte"
 usb.20.t: "Nachkriegs-Wahlvorbereitungen"
 usb.20.desc: "Demokraten Sweep"
 usb.20.a: "Lasst die Spiele beginnen!"
 usb.21.t: "Amerika wiedervereint!"
 usb.21.desc: "Es war Abend für Präsident Biden. Der Abend der Befreiung stand kurz davor, die Dreifaltigkeit des Leids, das er erlebt hatte, endlich zu beenden. Nein, was Amerika durchgemacht hatte. Er setzte sich nicht aufgrund seiner eigenen Präsenz als Person ein, sondern aufgrund der Liebe zu den Menschen, dem amerikanischen Volk. Sicher, mehrere Schläge trafen den Kern eines Mannes, den der Kampf zusammenhielt, aber er wusste: Wenn man einmal niedergeschlagen ist, steht man wieder auf. Langsam erhob er sich aus dem Bedürfnis heraus, wirklich zu sehen, was er während seiner gesamten Präsidentschaft angestrebt hatte, indem er auf jede Stufe des Truman-Balkons ging und beobachtete, wie die Sonne auf die Herzen der Amerikaner schien, die wieder zur Arbeit gingen oder einfach nur den Augenblick genossen. Mittendrin nahm er den "Ulysses" von James Joyce zur Hand, der ihn inspiriert hatte und dessen persönliches Exemplar ihn durch die Hölle des ersten Halbjahres brachte, und las: \"Du kannst die Zeit nicht zurückbringen. Es ist, als ob man Wasser in der Hand hält.\" Damit signalisierte er, dass es zwar kein Zurück mehr gibt, er aber dafür sorgen wird, dass Amerika wieder eine Nation sein wird."
 usb.21.a: "Die Seele der Nation ist gerettet!"
 usb.22.t: "Die Rebellen geben nicht auf!"
 usb.22.desc: "Trumps Militärregierung in Denver hat uns gebeten, ihm und seinen Loyalisten friedlich die Macht zu überlassen, damit sie im Gegenzug die Waffen niederlegen und ihre Rebellion einstellen. Wenn wir uns weigerten, würden die Feindseligkeiten beginnen. Ihr Ersuchen lässt uns nur zwei Möglichkeiten, und wir konnten es nicht annehmen, da wir ihnen die vollständige Macht über uns überlassen würden, also haben wir abgelehnt. Seitdem sie unsere Antwort erhalten haben, haben die Kämpfe über unsere Grenzen hinweg begonnen, aber bisher hält sich unser Militär gut, dank unserer überlegenen Führung und der Tatsache, dass die Rebellen auf Milizen angewiesen sind."
 usb.22.a: "We müssen für die Demokratie kämpfen"
 usb.23.t: "Bloomberg Sweep"
 usb.23.desc: "Das Kapitol wurde von allen Seiten abgeriegelt und von einem Zug von Gardisten, Soldaten und Spezialkräften gestürmt, die als Gefolge für eine Gruppe hochrangiger Offiziere fungierten, die Schulter an Schulter mit Orden dekoriert waren. Die unteren Stockwerke des Kapitols wurden durchkämmt, und Berichten zufolge war auch das Weiße Haus umstellt. Das Aufgebot an Soldaten und Offizieren brach durch den Senatssaal und beendete die Sitzung abrupt mit dem Schwingen einiger Gewehre.\n\n \"Was ist hier los?!\", rief so mancher Senator, was die Männer aber nicht davon abhielt, das zu tun, was sie als ihre verfassungsmäßige Pflicht ansahen, wobei der führende Offizier aus einem Dokument vorlas: \n\n \"Wir erfüllen exekutive Aufgaben. Der Präsident hat eine deklaratorische Kapitulation unter der Zuständigkeit der Kriegsbestimmungen angekündigt. Wir sind hier, um die Einsetzung einer provisorischen Verwaltung zu erzwingen, die die Bildung einer neuen Regierung beaufsichtigt. Senator Michael Bloomberg wird als Präsident der Vereinigten Staaten von Amerika vereidigt, da er so tapfer gegen die Bedrohungen unserer Demokratie von außen und von innen gekämpft hat. Diese Senatssitzung ist vertagt.\" verkündete der Beamte vom Podium aus dem geschlossenen Senatssaal, und der Vorsitzende wurde entlassen."
 usb.23.a: ""
 usb.24.t: "Kongress-Umbesetzung"
 usb.24.d: "Nach der jüngsten Wahlreform wurde eine Stichwahl angesetzt, um den wahren Willen des Volkes unter dem neuen System zu ermitteln. Veraltete parteipolitische Systeme wie das Gerrymandering und das Mehrheitswahlrecht sollen nicht länger den wahren Willen des amerikanischen Volkes verbergen und den Milliardären an der Wall Street die Kontrolle über unsere Wahlen ermöglichen. Mit den neuen Wahlsystemen - vor allem mit der Reihungswahl, öffentlich finanzierten Wahlen, der Auflösung des Zweiparteiensystems durch verschiedene rechtliche Mechanismen und mehreren Wahlgängen - sind die Demokratischen Sozialisten Amerikas als klarer Sieger hervorgegangen und haben zusammen mit den Grünen und der Sozialistischen Alternative eine Mehrheitskoalitionsregierung gebildet, während die Demokraten, die Libertären und die neu gegründete Patriotische Volkspartei in der Opposition sind. \n\nAufgrund der instabilen Lage des Landes konnte ein Großteil des Landes leider nicht wählen, da die Gebiete von Guerillas und Aufständischen gehalten werden, die unsere Demokratie zerstören wollen. Darüber hinaus wurden viele Staaten, die unter Militärverwaltung standen, nach ihrer Abspaltung nicht formell wieder in die Union aufgenommen, so dass ein Großteil des Mittleren Westens nicht vertreten war. Dennoch ist der Erfolg der Demokratie in den Gebieten, die der amerikanischen Union treu geblieben sind, ein großartiges Zeugnis für unser neues System und ein Beweis dafür, dass unsere Demokratie aus diesem Bürgerkrieg stärker hervorgehen wird als zuvor."
 usb.24.a: "Glückwunsch an die DSA!"
 usb.25.t: "Operation in Südgeorgia"
 usb.25.d: ""
 usb.25.a: "Wir müssen es wiedereobern!"
 usb.26.t: "Großunternehmen fliehen aus Neuengland"
 usb.26.d: "Das schlagende Herz der internationalen Wirtschaft hat plötzlich aufgehört zu schlagen, als sporadische Kämpfe Neuengland erschütterten und viele Institutionen dazu veranlassten, nach Süden in die Union Amerikas zu fliehen. In New York herrscht völlige Anarchie, da sich Banden, die NYPD, Militärgarnisonen und Milizen in den Straßen bekämpfen, und in Boston bedroht die Radikale Amerikanische Eiserne Front die Unternehmen mit ihrer radikalen Agenda. In beiden Fällen haben die gefährlichen Bedingungen im Nordosten viele Unternehmen dazu veranlasst, nach D.C., Richmond und Philadelphia zu fliehen, um sich dort niederzulassen, da die Lage in der mittelatlantischen Region wesentlich stabiler ist. Dieser Zustrom von Kapital in die Union Amerikas hat Arbeitsplätze, Investitionsmöglichkeiten und Legitimität mit sich gebracht, die die Regierung im Moment dringend benötigt."
 usb.26.a: "Willkommen in D.C!"
 usb.27.t: "Beginn des Appalachen-Aufstands"
 usb.27.d: "Alarmierende Berichte deuten auf das Entstehen einer schnell wachsenden aufständischen Zelle in den Appalachen von Virginia hin, die angeblich von lokalen Dissidenten mit Verbindungen zu den \"Konstitutionalisten\" in Denver gebildet wurde und von lokalen Milizorganisationen wie den Oathkeepers, Proud Boys und Three Percenters unterstützt und gefördert wird. Diese Organisationen wurden von Einheiten der Nationalgarde aus West Virginia, die nach unserer Ankunft in D.C. föderalisiert wurden, bewaffnet und ausgebildet, und diese Einheiten haben sich nun in den Appalachen verschanzt und verteilen Waffen an die gegen uns abgehärteten Einheimischen. Nachrichtendienstliche Informationen haben auch auf den Bau von behelfsmäßigen Befestigungen, Bunkern, Bunkeranlagen und sogar improvisierten Kampffahrzeugen hingewiesen, die aus allem, was sie finden konnten, gebaut wurden. Auch örtliche Waffenlager werden von diesen Verrätern überfallen und geplündert, und manche vermuten sogar, dass sie Kampfpanzer in ihrem Besitz haben. Diese Berichte kommen, nachdem ein Militärkonvoi in einen Hinterhalt geriet und drei Züge von diesen Kriminellen gefangen genommen wurden. \n\nWir dürfen nichts überstürzen und sollten uns auf sofortige Militäraktionen in der Region vorbereiten, um unsere Demokratie vor internen Bedrohungen zu schützen und zu verhindern, dass die Situation außer Kontrolle gerät.  Es wurden bereits mehrere Aufstandsbekämpfungsbrigaden einberufen, um diese Aufgabe zu bewältigen, und wir betreiben eine Politik der Einkreisung, indem wir mit überlegener Feuerkraft die Schlinge um den Hals der Aufständischen enger ziehen und darauf warten, dass ihnen die Ausrüstung ausgeht, und sie mit Schock- und Furchtkampagnen in der Luft demoralisieren. Obwohl diese Konzepte vielversprechend erscheinen, werden sie uns wertvolle Zeit und Mühe kosten und unsere Aufmerksamkeit von der Frontlinie ablenken. Wir sollten auch damit beginnen, vor allem in städtischen Gebieten Verbindungen zu Kollaborateuren und loyalen Vertretern der rechtmäßigen Regierung herzustellen, um den Aufstand zu infiltrieren und von innen heraus zu zerstören. Wenn wir den Sieg über diejenigen erringen wollen, die versuchen, die Demokratie zu untergraben und ein dunkles Zeitalter für Amerika herbeizuführen, müssen wir diesen Verbrechern keine Gnade zeigen und der Welt unsere eiserne Entschlossenheit vor Augen führen."
 usb.27.a: "Scheiß Hinterwäldler"
 usb.28.t: "Appalachen-Aufstand niedergeschlagen!"
 usb.28.d: "Jüngste Berichte berichten von einem durchschlagenden Erfolg im Osten, als unsere Streitkräfte die Reste des Aufstands in den Appalachen, der auf Trumps \"Regierung\" in Denver ausgerichtet ist, niederschlagen. Dieser Aufstand war uns ein Dorn im Auge, da er Nachschublinien und Eisenbahnnetze, die zur Front im Mittleren Westen führten, unterminierte. Sie haben auch ernsthafte Anstrengungen und Ressourcen von der Front im Westen abgezogen und es den \"Konstitutionalisten\" ermöglicht, unseren Vormarsch aufzuhalten. Berichten zufolge wurden bei den jüngsten Offensiven von Spezialbrigaden zur Aufstandsbekämpfung mehr als 50 Terrorzellen in West Virginia vernichtet, so dass jegliche potenzielle feindliche Aktion in der Region vorerst zum Erliegen kam und die lokalen Interessen gesichert wurden. Dies ist auch ein großer Propagandasieg, da unsere Truppen gezeigt haben, dass sie die raffiniertesten und am besten für diese Art von Operationen ausgebildeten Truppen der Welt sind und dass unsere Demokratie standhaft bleibt, ganz gleich, was der Egomane in Denver tut.\n\nPräzise durchgeführte Operationen wie die Ermordung von Aufstandsführern, die sich in der Region versteckt halten, sowie die Einkreisung und Vernichtung von aufständischen Brigaden unter Einsatz überlegener Feuerkraft haben deren Widerstand gebrochen. Die Niederschlagung dieses Aufstands ermöglicht eine erhebliche Umverteilung unserer militärischen Ressourcen, da Brigaden zur Aufstandsbekämpfung, die zuvor in den Appalachen eingesetzt waren, frei werden, um die Frontlinien gegen die breitere Bedrohung im Westen zu verstärken. Wir sollten mit dem Wiederaufbau der lokalen Infrastruktur beginnen, um die Herzen und Köpfe der Menschen vor Ort zu gewinnen und ein Wiederaufleben aufrührerischer Ideologien zu verhindern. Es sollte auch weiterhin eine starke Präsenz in der Region geben, und deshalb wurde eine Exekutivanordnung zur Aufrechterhaltung des Kriegsrechts verlängert, die uns mehr Zeit gibt, Verstecke zu räumen, die Verräter vor Gericht zu stellen und dauerhafte Stabilität zu gewährleisten. Die Stiefel der Demokratie werden diese Schlangen ausrotten, wo immer sie auftauchen, und sie daran hindern, die Menschen mit ihrem populistischen Gift zu vergiften."
 usb.28.a: "Die Union auf ewig!"
 usb.29.t: "Erfolgreiche Operationen zur Aufstandsbekämpfung"
 usb.29.d: "Unsere jüngsten Operationen zur Aufstandsbekämpfung gegen konstitutionelle Zellen, die darauf abzielen, unsere Demokratie zu demontieren, haben sich als bemerkenswert erfolgreich erwiesen. Jüngste Berichte zeigen, dass eine Vielzahl von aufständischen Zellen, die über unser Gebiet verstreut sind, durch präzise durchgeführte chirurgische Operationen, die auf die wichtigsten Anführer der Aufständischen abzielen, wirksam infiltriert, eingekreist und zerschlagen wurden. Dieser Sieg hat es uns ermöglicht, mehrere Brigaden, die zuvor in Gefechte gegen diese subversiven Elemente verwickelt waren, wieder zu konsolidieren und unseren Schwerpunkt auf die Frontlinien zu verlagern, an denen der Großteil von Trumps Verräterbande kämpft. Trump und die Kabale der Verräter in Denver haben ihre Unterstützung für diesen Aufstand angekündigt, der am Vorabend des Bürgerkriegs begonnen hatte, und haben sie seitdem über Schmugglerringe bewaffnet. Dies ist auch ein großer Propagandasieg, und wir haben unsere Bemühungen und Trumps Bereitschaft, noch mehr Amerikaner zu töten, im ganzen Land publik gemacht.\n\nNach diesem monumentalen Sieg bleibt es jedoch von entscheidender Bedeutung, dass wir in den Appalachen und in den von Aufständischen befallenen Staaten eine starke Präsenz aufrechterhalten. Wir müssen wachsam bleiben und uns auf mögliche Gegenangriffe und Hinterhalte von Überbleibseln der besiegten Aufständischen vorbereiten. Wie ein Sprichwort besagt, kann man bei einer Schlange nie vorsichtig genug sein, selbst wenn man es geschafft hat, sie zu zertreten.  Während diese Kampagnen unbestreitbar die Moral unserer Truppen vor Ort und an der Heimatfront gestärkt haben, sollten wir die Kampagnen zur Ausrottung dieser Partisanenstützpunkte rigoros fortsetzen, wo immer und wann immer sie auftauchen; die Anführer der Aufständischen, die uns entkommen sind, werden mit Sicherheit eine Gegenoffensive starten, und es wird uns nichts nützen, wenn wir unbedacht einige der besten Teile unserer Aufstandsbekämpfungstruppen in ein bergiges, bewaldetes und befestigtes Gebiet schicken."
 usb.29.a: "Gut gemacht."
 usb.30.t: "Operationen zur Aufstandsbekämpfung scheitern"
 usb.30.d: "Aus den ländlichen Gebieten erreichen uns erschütternde Berichte, wonach die jüngsten Operationen zur Bekämpfung der Aufständischen auf schreckliche Weise fehlgeschlagen sind. Trotz unserer Bemühungen hat sich Berichten zufolge das Netz aufständischer Zellen in unserem gesamten Gebiet als. Harrowing reports have come from the countryside, detailing that recent counter-insurgency operations have backfired terribly. Trotz unserer Bemühungen hat sich das Netz der aufständischen Zellen in unserem Gebiet als widerstandsfähig erwiesen. Eine groß angelegte Gegenoffensive der Aufständischen führte zu Gebietsverlusten und zu einer immer stärkeren Präsenz der Aufständischen in diesem Gebiet. Das Scheitern dieser Operationen behindert unsere Bemühungen an der Front gegen Trumps Verräterbande, da die Aufständischen weiterhin Widerstand leisten und den unnötigen Tod weiterer amerikanischer Soldaten verursachen. Es ist jetzt von entscheidender Bedeutung, eine größere Präsenz in den von Aufständischen verseuchten Gebieten aufrechtzuerhalten, einen Rückzug aus Gebieten zu organisieren, deren Halten als unhaltbar erachtet wird, um die Zahl der Opfer zu minimieren, und einen weiteren Gegenangriff vorzubereiten, um die Verräterverstecke zu zerstören.\n\nDiese Rückschläge haben einen Schatten auf die Moral geworfen und bei unserem Oberkommando Bedenken hinsichtlich der Qualität der Aufstandsbekämpfungseinheiten geweckt. Wir sollten damit beginnen, die Techniken der Aufstandsbekämpfung neu zu bewerten, die Ausbildung zu intensivieren und Offiziere und Einheitsführer, die für den Misserfolg verantwortlich gemacht werden, zu versetzen.  In der Zwischenzeit sollten wir die Kontrolle der Aufständischen in diesen Regionen begrenzen und damit beginnen, lokale Siedlungen zu befestigen, um zu versuchen, sie einzukesseln und energische Kampagnen zu starten, um ihnen die Ressourcen und die Unterstützung der lokalen Bevölkerung zu entziehen. Während wir wieder am Reißbrett sitzen, müssen wir unseren Männern vor Ort versichern, dass wir zwar eine Schlacht verloren haben, der Krieg aber noch lange nicht vorbei ist."
 usb.30.a: "Der Krieg zieht sich hin."
 usb.31.t: "§gInnovationisten§! schlagen Ausgaben vor"
 usb.31.desc: ""
 usb.31.a: "Wir werden alle Opfer bringen müssen. (Das Gesetz verabschieden)"
 usb.31.b: "Unser derzeitiges Ausgabenniveau ist genau richtig. (Veto gegen das Gesetz)"
 usb.32.t: "Antiföderalisten organisieren sich"
 usb.32.desc: ""
 usb.32.a: "Wir müssen sie aufhalten!"
 usb.33.t: "Unternehmen Mockingbird beginnt"
 usb.33.desc: "Seit der Gründung der Union Amerikas sind wir immer wieder mit Herausforderungen durch Aufständische konfrontiert, die sich als loyal gegenüber dem Regime in Denver betrachten. Wenn diese feindseligen Elemente unkontrolliert weitermachen, könnten die möglichen Folgen zu einem gefährlichen Dominoeffekt führen und weitere Anhänger für ihre Sache gewinnen - ein Szenario, das die Stabilität unserer Regierung gefährdet. Um unsere Nation und ihre demokratischen Grundsätze zu schützen, leiten wir daher mit sofortiger Wirkung die Operation Mockingbird ein. \n\nOperation Mockingbird ist eine gemeinsame Anstrengung, die die Ressourcen und das Fachwissen des FBI zusammen mit verschiedenen anderen Vertragspartnern bündelt. Ihr Hauptziel ist die systematische Zerschlagung und Neutralisierung der verschiedenen aufständischen Gruppen, die im Raum Washington operieren. Auch wenn der größte Teil von Washington DC unter unserer Kontrolle steht, stellt die Präsenz dieser fest verankerten Trumpistischen Zellen eine erhebliche und anhaltende Bedrohung für die Integrität unserer Regierung dar. Ihre genauen Absichten und Strategien sind nach wie vor unbekannt, doch ihre allgemeinen Bemühungen, unsere nationale Sicherheit zu untergraben, erfordern entschlossenes Handeln. \n\nDiese Gruppen sind nicht nur eine Bedrohung für unsere unmittelbare Sicherheit, sondern auch ein Symbol für eine größere, orchestrierte Anstrengung der vorherigen Regierung und ihrer Verbündeten, unsere Nation zu destabilisieren. Sie sind Spielfiguren in einem umfassenderen Plan, der von Trump und seinen Loyalisten inszeniert wird und darauf abzielt, die Union von Amerika und ihre Führung zu untergraben. Seien Sie versichert, dass diejenigen, die sich gegen die Interessen unserer Nation verschwören, identifiziert, festgenommen und schnell und entschlossen vor Gericht gestellt werden. Die Operation Mockingbird steht für unser unerschütterliches Engagement, die Rechtsstaatlichkeit aufrechtzuerhalten und die Unantastbarkeit unserer demokratischen Institutionen vor internen Bedrohungen zu schützen."
 usb.33.a: "Der erste Schritt zur Zerstörung von Trumps Regime!"
 usb.34.t: "Unternehmen Mockingbird abgeschlossen!"
 usb.34.desc: "Heute erreichte uns eine großartige Nachricht über den erfolgreichen Abschluss der Operation Mockingbird. Diese sorgfältig geplante Operation zielte darauf ab, den Einfluss der Trumpistischen Elemente in Washington DC zu neutralisieren und sicherzustellen, dass alle verbleibenden Trumpistischen Zellen entweder identifiziert und eliminiert wurden oder sich von selbst aufgelöst haben. \n\nDurch eine Kombination strategischer Maßnahmen und koordinierter Bemühungen haben wir die Integrität unserer Regierungsinstitutionen erfolgreich gegen potenzielle Bedrohungen durch diese Elemente geschützt. Das Engagement und die Wachsamkeit des FBI und einer Reihe von Auftragnehmern, die wir ebenfalls angeheuert haben, haben sich bei der Sicherung unserer Regierung und der Aufrechterhaltung der für unsere Regierung unerlässlichen Stabilität als entscheidend erwiesen. \n\nDieser Erfolg unterstreicht unser unerschütterliches Engagement für die Verteidigung der demokratischen Grundsätze und die Aufrechterhaltung des reibungslosen Funktionierens des nationalen Rahmens. Indem wir internen Störungen wirksam begegnet sind, haben wir unsere Entschlossenheit bekräftigt, Amerika wieder zu vereinen und es wieder so zu machen, wie es vor dem Zusammenbruch war."
 usb.34.a: "Zuerst Washington, dann Amerika!"

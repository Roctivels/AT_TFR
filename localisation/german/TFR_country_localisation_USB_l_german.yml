 USB_presidential_health_category: "Die Gesundheit des Präsidenten"
 USB_presidential_health_category_desc: "[USB_biden_health_cat_scripted_loc]"
 USB_presidential_health_category_default: "\n\n\n\n\n£GFX_USB_Biden_confused_category_banner\n\n\n\n\n\n\n\nDie Gesundheit des Präsidenten ist mit dem Beginn des Bürgerkriegs zu einem sehr viel ernsteren Thema geworden. Um diesen Krieg zu gewinnen, muss Biden Lincoln, FDR und Washington in einer Person sein, mit dem Charisma, der Kraft und der Intelligenz, um alle anderen Konkurrenten um den amerikanischen Mantel herauszufordern. Er muss seine Entscheidungen klar und bewusst treffen, sonst riskieren wir, Amerika für immer zu verlieren. In seinem derzeitigen Zustand geht es ihm gut, aber wer weiß, wie lange das noch der Fall sein wird... \n\n§CIst das ein Husten, den ich da höre, Sleepy Joe?§!"
 USB_presidential_health_category_NSS: "\n\n\n\n\n£GFX_USB_Biden_NSS_category_banner\n\n\n\n\n\n\n\nZwar hat sich die Cognoscenti durch den Schattenputsch die Macht gesichert, doch technisch gesehen hat der Präsident immer noch die Macht, sich uns zu widersetzen, insbesondere wenn er sich des vollen Ausmaßes unserer Ziele und Absichten bewusst werden sollte. Unabhängig davon, wie viel Unterstützung er vom amerikanischen Volk erhält, ist er immer noch eine bedeutende Persönlichkeit mit de jure Exekutivgewalt, und wenn er sich zu unseren Handlungen äußert, könnte dies die Maskerade gefährden. \n\nDaher sind wir zu dem Schluss gekommen, dass es am besten ist, die Menschen in der Umgebung des Präsidenten zu kontrollieren und seinen Niedergang sorgfältig zu steuern, bis er aus dem Rampenlicht verschwindet, um sicherzustellen, dass sich die chaotischen Ereignisse von 1963 nicht wiederholen."

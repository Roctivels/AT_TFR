 USB_CDC_anthony_fauci_sc: "Anthony Fauci"
 USB_CDC_anthony_fauci_tt: "§YAnthony Fauci§!\nCDC-Direktor\n   £GFX_dx_yellow Persönlicher Ausgabenfaktor: §Y-5%§!"
 USB_CDC_anthony_fauci_desc_tt: "-------------------------------------\n\n\n\n\n\n\n\n£GFX_USB_anthony_fauci_portrait\n\n\n\n\n\n\n\n\n-------------------------------------\n§LCIA/IC INTERN – ZUSAMMENFASSUNG DER INFORMIERUNG\nEINSTUFUNG: STRENG GEHEIM//NOFORN\nPERSONALAKTE: Anthony Stephen Fauci\nAKTUELLE POSITION: Direktor, Zentren für Krankheitskontrolle und Prävention\n\nDer Betreffende ist derzeit Direktor der Zentren für Krankheitskontrolle und Prävention und übernahm diese Position nach der Zusammenlegung der Gesundheitsbehörden unter der Schirmherrschaft des Ministeriums für Innere Sicherheit. Zuvor war er Direktor des NIAID, wo er sich während der Pandemiebekämpfung einen Namen machte.\n\n§Historische Bedeutung:§!\nAufgrund seiner medizinischen Fachkenntnisse und seiner Zusammenarbeit mit den Geheimdiensten zum Direktor der CDC ernannt, setzt der Betreffende kompromisslos die für die dauerhafte Ausgangssperre entscheidenden Gesundheitsvorschriften durch. Zuvor leitete er die Maßnahmen der USA zur Bekämpfung von HIV/AIDS, SARS, Schweinegrippe, MERS, Ebola und COVID-19. In den 2000er Jahren war er an der Gründung von PEPFAR beteiligt und trieb nach dem 11. September die Entwicklung von Medikamenten zur biologischen Abwehr voran.\n\n§YAktuelle Aktivitäten:§!\nSein Status als "Amerikas führender Experte für Infektionskrankheiten" hilft ihm bei der Durchsetzung von Impf- und biometrischen Tracking-Vorschriften. Die Darstellung seines Krisenmanagements in den Medien stärkt die Autorität der Pandemie-Beschränkungen und stellt die Opposition als anti-wissenschaftlichen Extremismus dar.\n\nTrotz seines fortgeschrittenen Alters ist der Betroffene weiterhin gesund und zeigt keine Anzeichen eines körperlichen oder kognitiven Verfalls. Durch regelmäßige Bewegung, eine ausgewogene Ernährung und kontinuierliche medizinische Überwachung kann er seine Aufgaben weiterhin erfüllen.\n\n§YFrühes Leben und Privatleben:§!\nDer Betreffende wurde in Brooklyn, New York, in eine Apothekerfamilie geboren. Er erwarb einen Bachelor of Arts am College of the Holy Cross und einen medizinischen Abschluss an der Cornell University Medical School und legte damit den Grundstein für seine Karriere im Bereich der öffentlichen Gesundheit. Der Betreffende lebt derzeit in Washington, D.C.\n\nDer Betreffende heiratete 1985 Christine Grady, eine Krankenschwester und Bioethikerin beim NIH. Sie haben drei erwachsene Kinder, die in der Wissenschaft oder Medizin tätig sind, was das gemeinsame berufliche Engagement der Familie und das Engagement des Betroffenen für biometrische Überwachungsmaßnahmen unterstreicht. \n\nDer Betreffende wurde katholisch erzogen, bezeichnet sich heute jedoch als "Humanist" und schließt sich den vorherrschenden Ideologien an. Sein datengestützter Ansatz spiegelt umfassendere Geheimdienstziele wider und ermöglicht die Zusammenarbeit bei der Bevölkerungskontrolle. Obwohl er behauptet, "unpolitisch" zu sein, unterstützt er konsequent die Prioritäten des Sicherheitsstaates und befürwortet einen Utilitarismus, bei dem Freiheiten dem wissenschaftlichen Fortschritt weichen – ganz im Sinne der Agenda des Sicherheitsstaates.§!"
 

 USB_project_babel_cat: "Projekt Babel"
 USB_project_babel_cat_desc: "\n\n\n\n\n£GFX_USB_project_babel_cat\n\n\n\n\n\n\n\nHinter den öffentlichen Rechtfertigungen für den dritten Golfkrieg verbirgt sich ein noch tieferes Motiv: das Projekt Babel. Unter der Leitung der Cognoscenti und mithilfe von Mittelsmännern im Pentagon, der CIA und in Unternehmenslabors ist das Projekt Babel der Höhepunkt jahrzehntelanger geheimer Forschungen zur sogenannten sumerischen Ursprache, dem Urcode, aus dem die erste Schriftsprache hervorgegangen ist. Es ist die schrecklichste Superwaffe der Cognoscenti, die sie in den letzten Kriegen einsetzen wollen, um eine neue Weltordnung zu errichten. Die neurolinguistische Pest wird eine Entwicklung sein, die die Atombombe in ihrem Ausmaß und ihrer Grausamkeit in den Schatten stellt, eine Waffe von solch unvorstellbarem Schrecken, dass die Macht der Cognoscenti gesichert sein wird. Sie wird den Cognoscenti Macht über die grundlegenden Gesetze und Konzepte verleihen, die die menschliche Sprache und das Denken als Ganzes regieren. In gewisser Weise ist sie eine Waffe der reinen Bedeutung.\n\nBevor sie jedoch auf die Welt losgelassen werden kann, müssen die Cognoscenti zunächst fragmentarische MEs, die angeborenen Wahrheiten der menschlichen Sprache, aus den Ruinen Mesopotamiens sammeln, um diese Teile zu einem kohärenten Ganzen zusammenzufügen. Darüber hinaus müssen sie die Überreste des Nam-Shub von Enki sichern und rekonstruieren, ein sumerisches neurolinguistisches Gegenmuster, von dem die Archäologen der Cognoscenti glauben, dass es einst zur Wiederherstellung der Sprache nach der Sintflut verwendet wurde. Damit können die Cognoscenti ihre eigenen Leute gegen die Auswirkungen der Pest immunisieren.\n\n§OFORTSCHRITT: [USB_NLP_scripted_loc]\n§Y[?USB_babel_me_var]/3§! MEs\n§Y[?USB_babel_language_fragment_var]/5§! SPRACHEN\nDATEN [USB_data_scripted_loc]\nVERSUCHE AN MENSCHEN: [USB_human_trials_scripted_loc]\nNAM-SHUB VON ENKI: [USB_nam_shub_scripted_loc]\nIMPFUNGEN: [USB_inoculations_scripted_loc]§!"


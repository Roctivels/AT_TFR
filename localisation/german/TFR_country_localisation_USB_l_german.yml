 usb.132.t: "Fall von Denver"
 usb.132.d: "In einem entscheidenden Sieg für die Bundesregierung der Union vonAmerika wurde Denver, die Hauptstadt der verräterischen sogenannten amerikanischen Verfassungsregierung von Trump, nach wochenlangen intensiven Kämpfen zurückerobert. Der Fall von Denver wird als entscheidender Wendepunkt in dem andauernden Konflikt angesehen, da die Bundeskräfte den Überresten von Trumps sezessionistischem Regime einen schweren Schlag versetzt haben. Der Angriff auf Denver begann ernsthaft, nachdem die Bundeskräfte Colorado Springs und Fort Collins gesichert hatten und damit wichtige Versorgungslinien zu den in Denver verschanzten konstitutionellen Verteidigern unterbrochen hatten. Nach fast wochenlangen zermürbenden Kämpfen erklärten die Bundeskräfte die Stadt für vollständig befreit. Bilder von Soldaten, die die Flagge der Union von Amerika über dem Colorado State Capitol hissen, sind bereits zum Symbol für die wiedererstarkte Autorität der Bundesregierung geworden. \n\nObwohl die amerikanische Verfassungsregierung geschwächt ist, hält sie weiterhin Gebiete in den Rocky Mountains besetzt, während Guerillakämpfe und Terrorakte von Trump-Anhängern in den kürzlich befreiten Gebieten eine ständige Bedrohung darstellen. \n\nTrotz dieser Herausforderungen ist die Rückeroberung von Denver ein starkes Zeichen für die Entschlossenheit der Bundesregierung, Ordnung und Einheit in dem zerrütteten Land wiederherzustellen. Vorerst weht die amerikanische Flagge wieder hoch über den Rocky Mountains."
 usb.132.a: "Das Ende der Konstitutionalisten?"
 usb.133.t: "Befreiung von Minneapolis"
 usb.133.d: "In einem beeindruckenden Sieg für die Bundesregierung der Union von Amerika haben die Bundeskräfte im Rahmen der neu gestarteten Operation Steele Minneapolis eingenommen, eine wichtige Hochburg der amerikanischen Verfassungsregierung unter Trump. Der schnelle Angriff markiert einen bedeutenden Durchbruch in den ersten Monaten des Zweiten Amerikanischen Bürgerkriegs. \n\nDie Operation Steele, benannt nach General George B. Steele, dem Kommandeur der Union, der für seine schnellen organisatorischen Bemühungen während des Ersten Amerikanischen Bürgerkriegs bekannt ist, wurde konzipiert, um Trumps Machtbasis im Mittleren Westen systematisch zu zerschlagen. Da Trumps Streitkräfte in Minnesota, Iowa, Nebraska und Missouri tief verwurzelt sind, legten die Kommandeure der Föderation den Schwerpunkt auf einen koordinierten, mehrgleisigen Angriff, um die Versorgungslinien zu unterbrechen, wichtige Städte einzunehmen und Trump daran zu hindern, seine Macht über die Region zu festigen. \n\nDie Streitkräfte der Föderation starteten die Operation Steele mit einem Blitzkrieg-ähnlichen Angriff auf Minneapolis, bei dem sie eine Kombination aus Luftangriffen, mechanisierter Infanterie und präzisen Drohnenangriffen einsetzten. Der Angriff zielte darauf ab, die konstitutionellen Kräfte zu überwältigen, bevor sie eine geschlossene Verteidigung organisieren konnten. In einer Pressemitteilung erklärte das Weiße Haus: \"Der Fall von Minneapolis zeigt unser unerschütterliches Engagement für die Wiederherstellung von Frieden, Gerechtigkeit und Demokratie in dieser Nation. Die Feinde der Freiheit werden zurückgedrängt, Stadt für Stadt, Bundesstaat für Bundesstaat. Wir werden nicht ruhen, bis Amerika wieder vereint ist.\""
 usb.133.a: "Marschiert nach Westen, Befreier Amerikas!"
 usb.134.t: "Befreiung von St. Louis"
 usb.134.d: "In einem als bedeutender Durchbruch für die Biden-Regierung gefeierten Erfolg haben die unionistischen Streitkräfte im Rahmen der groß angelegten Operation Steele St. Louis eingenommen, einen wichtigen logistischen Knotenpunkt für die zentrale Verteidigungszone der amerikanischen Verfassungsregierung. \n\nSt. Louis, das lange Zeit als wichtiger Logistik- und Versorgungsknotenpunkt für Trumps Streitkräfte galt, wurde aufgrund seiner strategischen Lage am Mississippi und seiner wichtigen Eisenbahnverbindungen zum restlichen Mittleren Westen zu einem vorrangigen Ziel. Die Kontrolle der Union über den Mississippi war unerlässlich, um die Nachschubbemühungen der Verfassungsbefürworter zu unterbrechen – die entlang des Flusses stationierten Seestreitkräfte der Unionisten konnten erfolgreich die Lieferungen von Lebensmitteln, Munition und medizinischen Hilfsgütern für Trumps Verteidiger unterbrechen. Nach heftigen Kämpfen weht die Flagge der Union von Amerika nun stolz über dem Gateway Arch als symbolisches Zeichen für die Rückeroberung der Stadt. \n\nDer Verlust von St. Louis hat die konstitutionellen Kräfte dazu veranlasst, sich weiter westlich neu zu formieren, insbesondere in Kansas City und Omaha, wo loyalistische Kommandeure vermutlich Gegenoffensiven planen. Während die Truppen der Union ihren Vormarsch durch den Mittleren Westen fortsetzen, tobt der Kampf um die Zukunft Amerikas weiter."
 usb.134.a: "Eine weitere Stadt frei vom Autoritarismus!"
 usb.135.t: "Fall von Oklahoma City"
 usb.135.d: "Die Regierung von Trump scheint am Ende zu sein, da die Streitkräfte der Union von Amerika Oklahoma City eingenommen haben, einen wichtigen Knotenpunkt, der Trumps provisorische Hauptstadt in Denver mit den ölreichen Gebieten von Texas verbindet. Die Operation, die Teil der ehrgeizigen Operation Steele von Präsident Joe Biden ist, zielt darauf ab, Trumps Hochburgen im Mittleren Westen zu strangulieren und zu zerschlagen. Die Kommandeure der Bundesstreitkräfte hatten Oklahoma City aufgrund seiner strategischen Lage an wichtigen Autobahnen und Eisenbahnlinien, die Denver mit Texas verbinden, als wichtiges Ziel identifiziert. Die Stadt dient auch als wichtiger Knotenpunkt für die Verteilung von Öl und Lebensmitteln und liefert Treibstoff und Ressourcen, die für Trumps Kriegsanstrengungen unerlässlich sind. Die Kontrolle über die Stadt bedeutete die Kontrolle über den Fluss lebenswichtiger Ressourcen wie Öl, Waffen und Lebensmittel. \n\nDie Operation begann mit einem massiven Luft- und Artillerieangriff. 48 Stunden lang bombardierten Jets, Bomber und Drohnen der Bundesregierung wichtige militärische Einrichtungen, Ölraffinerien, Kommunikationsknotenpunkte und bekannte Hochburgen der Milizen innerhalb der Stadt. Nachdem die Bundeskräfte die äußeren Verteidigungsanlagen der Stadt durchbrochen hatten, entwickelte sich die Schlacht zu einem intensiven Stadtkrieg, in dem die Truppen der Verfassungsanhänger und Milizkämpfer Oklahoma City in ein befestigtes Labyrinth verwandelten. Trumps Getreue hatten wochenlang Verteidigungsanlagen vorbereitet, Gebäude in Festungen umgewandelt, Gräben ausgehoben und in wichtigen Stadtteilen improvisierte Minenfelder angelegt. \n\nDa sich Trumps Truppen weiter nach Westen zurückziehen, ist der Weg nach Denver nun frei."
 usb.135.a: "Nach Denver!"
 usb.135.b: "Ein schwerer Schlag für die Konstitutionalisten"
 usb.135.c: "Gott segne Amerika, denn Washington wird es nicht tun!"
 usb.136.t: "Fall von Kansas City"
 usb.136.d: "Im Rahmen der Operation McCellan haben die Bundeskräfte Kansas City eingenommen – ein herber Rückschlag für die amerikanische Verfassungsregierung, die der Union eine beispiellose Kontrolle über die Transport- und Versorgungsnetze des Mittleren Westens verschafft. Kansas City fungiert als wichtiger Knotenpunkt für den Transport von Vorräten, Truppen und Ressourcen durch den rebellischen Mittleren Westen. Die Kontrolle über Kansas City ermöglichte es Trumps Streitkräften, eine relativ stabile Versorgungslinie aufrechtzuerhalten und ihre Kriegsanstrengungen sowohl mit Ressourcen aus dem landwirtschaftlichen Kernland des Mittleren Westens als auch mit Öllieferungen aus Texas zu versorgen. Darüber hinaus beraubt die Eroberung von Kansas City Trumps Streitkräfte einer wichtigen Produktionsstätte, die loyale Fraktionen im gesamten Mittleren Westen mit Munition, Fahrzeugen und anderen für den Krieg unverzichtbaren Gütern versorgt hatte. \n\nTrotz des Erfolgs der Operation Steele stoßen die Streitkräfte der Föderation weiterhin auf heftigen Widerstand von AKR-Loyalisten, die im Mittleren Westen operieren. Bereits in den Tagen nach der Einnahme der Stadt gab es Berichte über Guerillaangriffe, Sabotageakte und Attentate. \n\nWährend sich die Truppen der Föderation auf den weiteren Vormarsch nach Westen vorbereiten, ist die Regierung von Präsident [USB.GetLeader] weiterhin entschlossen, alle verbleibenden Widerstandsnester auszuschalten. Mit Kansas City nun unter der Kontrolle der Föderation ist die Union of America bereit, weiter in den Mittleren Westen vorzudringen. Aber der Krieg ist noch lange nicht vorbei, und der Kampf um die Zukunft Amerikas geht weiter."
 usb.136.a: "Hail to the Chiefs!"
 usb.137.t: "BERICHT: Operation Steele"
 usb.137.d: "MILITÄRBERICHT DER UNION VON AMERIKA\nOPERATION Steele: EINLEITUNGSBERICHT\nHerausgegeben vom: Verteidigungsministerium\nEinstufung: STRENG GEHEIM\n\nDie Operation Steele ist eine groß angelegte, mehrphasige Militäraktion zur Zerschlagung und Beseitigung der logistischen und militärischen Hochburgen der amerikanischen Verfassungsregierung im Mittleren Westen. Die Hauptziele der Operation bestehen darin, wichtige Versorgungslinien zu unterbrechen, regionale Kommandozentralen zu zerstören und die Fähigkeit der AKR zu koordinierten Gegenoffensiven zu lähmen.\n\nHAUPTZIELE: ST. LOUIS, MINNEAPOLIS, KANSAS CITY\n\nZIELZEITRAUM: 5 MONATE\n\nWERDEN DIE ZIELE NICHT ERREICHT, FOLGT EIN LANG ANHALTENDER GUERILLAKRIEG MIT DEN KONSTITUTIONELLEN KRÄFTEN."
 usb.137.a: "Verstanden."
 usb.138.t: "OPERATION Steele NACHBERICHT: FEHLSCHLAG"
 usb.138.d: "Nach einem Jahr heftiger Kämpfe an der Front berichtet das Verteidigungsministerium, dass die Operation Steele ihre primären Ziele – die Zerschlagung der Machtzentren der Konstitutionalisten im mittleren Westen – nicht erreicht hat. \n\nTrotz anfänglicher Erfolge aufgrund der überwältigenden Luftüberlegenheit stießen die Bundeskräfte auf unerwartet heftigen Widerstand, was dazu führte, dass die Offensive ins Stocken geriet und schließlich zusammenbrach. Die konstitutionellen Kräfte führten unter effektiver Führung koordinierte Gegenangriffe durch und nutzten kritische Schwachstellen in den Versorgungslinien der Föderation aus, was letztendlich einen strategischen Rückzug aus mehreren Sektoren erzwang. Die Streitkräfte der Föderation hatten aufgrund ständiger Guerilla-Angriffe und Hinterhalte hohe Verluste zu verzeichnen und litten unter der schlechten Koordination zwischen Panzerdivisionen und Infanterieeinheiten. Darüber hinaus haben anhaltende Unterbrechungen der Versorgungskette den Erfolg der Operation Steele entscheidend beeinträchtigt. \n\nEine sofortige Neubewertung und Überarbeitung der taktischen Doktrin ist erforderlich, um weitere operative Fehlschläge zu verhindern, und wird dem Präsidenten der Vereinigten Staaten in den nächsten 48 Stunden vorgelegt werden."
 usb.138.a: "Verstanden."
 usb.139.t: "OPERATION Steele NACHBERICHT: ERFOLG"
 usb.139.d: "In den letzten Monaten ist es den Streitkräften der Vereinigten Staaten von Amerika mit überwältigendem Erfolg gelungen, den Aufstand der Verfassungsanhänger niederzuschlagen und die Kontrolle über wichtige Hochburgen im Mittleren Westen zu erlangen. Alle primären Ziele wurden erreicht, und die Bundesregierung der Union of America hat nun die Kontrolle über den Mittleren Westen inne, wodurch Trumps Streitkräfte effektiv von ihren wichtigsten logistischen Ressourcen abgeschnitten sind. Der Erfolg der Operation Steele dürfte die Bemühungen der Union um die Wiedervereinigung der Nation beschleunigen. \n\nErgebnis: Alle wichtigen Autobahnen, Eisenbahnlinien und Versorgungswege, die Denver mit Texas und den Great Plains verbinden, wurden unterbrochen oder unter Bundeskontrolle gebracht, während wichtige Städte im Mittleren Westen wie Minneapolis, St. Louis und Oklahoma City befreit wurden. Der Weg nach Denver ist nun frei, während die Vorbereitungen für die Operation Sheridan getroffen werden, die letzte Offensive, die darauf abzielt, Denver einzunehmen und den Zweiten Amerikanischen Bürgerkrieg zu beenden."
 usb.139.a: "Gott segne Amerika!"
 usb.140.t: "BERICHT: Operation Grant"
 usb.140.d: "MILITÄRBERICHT DER UNION VON AMERIKA\nOPERATION GRANT: EINLEITUNGSBERICHT\nHerausgegeben vom: Verteidigungsministerium\nEinstufung: STRENG GEHEIM\n\nAls Reaktion auf das Scheitern der Operation Steele und die darauf folgenden Gegenoffensiven der Konstitutionalisten hat das Verteidigungsministerium die Operation Grant eingeleitet, eine groß angelegte Verteidigungskampagne, die darauf abzielt, die Kontrolle über Chicago und Indianapolis zu behalten. Beide Städte dienen als wichtige logistische, industrielle und administrative Drehscheiben für die Operationen der Föderation im gesamten Mittleren Westen. Berichten zufolge haben die Truppen von Trump unter der Führung von General Michael Flynn ihre Anstrengungen auf Chicago und Indianapolis konzentriert, um sich einen Weg nach Washington DC zu bahnen. Sollten die Verfassungsbefürworter erfolgreich sein, würde dies der ACG einen großen Propagandaerfolg bescheren und die Fähigkeit der Union beeinträchtigen, den Druck auf die Verfassungsbefürworter im Westen aufrechtzuerhalten. HAUPTZIELE: VERTEIDIGUNG VON CHICAGO UND INDIANAPOLIS"
 usb.140.a: "Verstanden."
 usb.141.t: "BERICHT: Operation Sheridan"
 usb.141.d: "MILITÄRBERICHT DER UNION VON AMERIKA\nOPERATION GRANT: EINLEITUNGSBERICHT\nHerausgegeben vom: Verteidigungsministerium\nEinstufung: STRENG GEHEIM\n\nNach dem erfolgreichen Abschluss der Operation Steele, mit der wichtige Hochburgen im Mittleren Westen gesichert und die Versorgungslinien der amerikanischen Verfassungsregierung unterbrochen wurden, hat die zweite Phase des Krieges begonnen: die Operation Sheridan. Ziel dieser Kampagne ist es, Denver, die provisorische Hauptstadt der Regierung von Donald Trump, einzunehmen, die verbleibende Führung der konstitutionellen Kräfte zu eliminieren und der Rebellion im Mittleren Westen ein Ende zu setzen.\n\nHAUPTZIELE: EINNAHME VON DENVER."
 usb.141.d: "Verstanden."

 usb.101.t: "Kamala Harris wird zum Nr.1 Girl Boss"
 usb.101.d: "VON: Vox\nVon Adam Jarate\n\nWie Kamala Harris zur "Girl Boss"-Vizepräsidentin Nr. 1 in Amerika wurde Nach den fairen und beeindruckenden Wahlen hat das Duo Biden-Harris in ganz Amerika an Popularität gewonnen. Der altmodische Charme des Präsidenten und die Agilität und Zielstrebigkeit der Vizepräsidentin haben ihnen auf Websites wie Reddit und Tumblr den Titel "Amerikas beste Hoffnung" eingebracht.\n\nDoch Harris liegt deutlich vor ihrem älteren Partner. Sie übertrifft nicht nur in den Umfragen die Unterstützung von Frauen und POCs, sondern selbst weiße Durchschnittsmänner gewöhnen sich schnell an ihre erstaunliche Schlagfertigkeit. Einige haben sogar eine Gruppe mit dem Namen "Weiße Typen für Harris" gegründet, die sich eindeutig auf ihre mögliche Präsidentschaftskandidatur im Jahr 2028 vorbereitet.(...)\n\nTrotz der schweren Zeiten, in denen sich Amerika derzeit befindet, könnte uns das Licht eines neuen Zeitalters von Politikern vor dem Untergang bewahren. Politiker wie Kamala Harris, die nicht nur Ikonen des Fortschritts und der Inklusivität sind, sondern auch fähige Staatsoberhäupter, die die Wähler und ihre Kämpfe an die erste Stelle setzen, werden ihre alten Vorgänger bald ablösen. Damit werden wir uns von der hasserfüllten und bigotten Politik der Trump-Ära entfernen.\n\n Wir können nur das Beste hoffen. Um es mit den Worten der Frau Vizepräsidentin selbst zu sagen: Meine Mutter machte uns manchmal das Leben schwer und sagte zu uns: 'Ich weiß nicht, was mit euch jungen Leuten los ist. Glaubt ihr, ihr seid gerade von einer Kokospalme gefallen?'"
 usb.101.a: "Sie ist schwarz, sie ist mutig, und sie spricht!" 
 usb.102.t: "Bernies Twitch-Übernahme"
 usb.102.d: "VON: Polygon\nVon Ana Dizznuds\n\nBernie Sanders übernimmt für ein paar Stunden das Internet, nachdem er an einem Twitch-Stream mit progressiven Streamern teilgenommen hat.\nU.S. Senator Bernie Sanders hat an einem Twitch-Livestream mit super beliebten Creators teilgenommen. Die Veranstaltung ermöglichte es Sanders, über Probleme und Herausforderungen zu sprechen, denen nicht nur Amerika, sondern auch viele junge Amerikaner gegenüberstehen. Die wichtigsten Punkte waren: Studentenschulden, die Krise in mehreren Bundesstaaten, Unternehmenslobbyismus gegen den Durchschnittsbürger und, natürlich, das Glück eines kompetenten Gesundheitssystems. Im Laufe des Abends wurden die Zuschauer mit anderen Senatoren aus "The Squad" wie AOC und Ilhan Omar überrascht, aber der vielleicht denkwürdigste Moment war, als die Gruppe Sanders über Vtuber belehrte. (...)\n\nOnline-Nutzer, die sich den Stream angesehen haben, sagen, dass es eine positive Erfahrung war, die ihnen geholfen hat, mehr über einen der am weitesten links stehenden Senatoren in Amerika zu erfahren. Obwohl Bernie mit der modernen Technologie und dem Glücksspiel verwirrt ist, fanden sie seine Botschaft wichtig. Einige Kommentatoren sagten sogar, dass Bernies Erklärungen ihnen halfen, ihre eigene Situation besser zu verstehen.\n\nReifere Medien wiesen darauf hin, dass es sich um ein klares Spiel handelt, um mehr jüngere Wähler für seine Agenda zu gewinnen, und sie sagen, dass sie mehr Auftritte von Sanders in von Jugendlichen dominierten Bereichen des Internets erwarten. Podcasts vielleicht?"
 usb.102.a: "5 $ Spende - "Feel the Bern!"" 
 usb.103.t: "Medien beschuldigen Romney, 'Romney' zu sein!"
 usb.103.d: "VON: Persönlicher Blog\nVon Jet Muhdick\n\nMitt Romney ist einer der intelligentesten Politiker in Amerika, und das glaube ich. Die liberalen Medien beschuldigen ihn jedoch weiterhin, "seltsam" zu sein. Überlassen wir das lieber Trump und seinen Anhängern! (...)\n Es begann alles mit Mitt's Entscheidung, mit jüngeren Wählern in Kontakt zu treten, nachdem er den Hot Dog Day gefeiert hatte. Er besuchte eine beliebte Veranstaltung für junge Leute namens "Furrycon". Hier begann das Missverständnis. Romney dachte wohl, es handele sich um eine "Tierausstellung", aber er hatte nicht erwartet, Menschen zu sehen, die als verschiedene Tiere verkleidet waren. Anders als von den demokratischen Medien behauptet, verlor Romney nicht die Fassung, als er die wahre Bedeutung der Veranstaltung herausfand. Stattdessen ging er auf die potenziellen neuen Wähler ein. Seine Bemühungen wurden von einem sehr guten Koch unterstützt, der "als blauer Vogel gekleidet" war und am Essensstand "erstaunliche" Hot Dogs zubereitete, wie Mitt selbst auf Instagram erklärte.\nAuf seinen sozialen Medien kommentierte und postete er Fotos von der Veranstaltung. Auf dem Abschlussfoto war er umgeben von menschlichen Cartoon-Tieren mit hochgereckten Daumen zu sehen. In dem Kommentar, der dem Foto beigefügt war, sprach er darüber, wie großartig und unterhaltsam die Veranstaltung war. Er wies auch ausdrücklich darauf hin, dass ein Raum für HIV-Tests zur Verfügung stand, und lobte die Organisatoren dafür, dass sie daran gedacht hatten. Später postete er ein Bild von sich beim Trinken von Schokomilch mit der Bildunterschrift "Harter, aber sehr produktiver Tag. Die beste Zeit, um Schokomilch zu trinken.""
 usb.103.a: "Er hat das Kriegsbeil mit Big Bird begraben" 
 usb.104.t: "Dawn's Early Light"
 usb.104.d: "VON: VICE\nVon Veronica Steinman. Bearbeitet von Jared Shaysky\n\Ich stand auf dem Times Square, umgeben von Tausenden von Menschen, sowohl Aktivisten als auch normalen Bürgern, und hörte den Reden zu, die den Sieg der Union feierten - unseren Sieg, Amerikas Sieg. Ich spürte, wie ein Sturm der Gefühle über mich hereinbrach wie nie zuvor. Trotz all der Verluste und Grausamkeiten, des Hasses und der Bigotterie hat unsere Nation gesiegt. Unsere Zukunft hat gesiegt. Es ist noch nicht lange her, dass der Konflikt offiziell für beendet erklärt wurde. Doch als ich durch die Straßen schlenderte und mich auf die Feierlichkeiten in New York vorbereitete, konnte ich es wahrnehmen und spüren. Der Gesichtsausdruck der Menschen war fröhlicher, die Gespräche verliefen müheloser, und überall herrschte eine freudige Atmosphäre.\n\nAm Anfang war es eine Zeit der Dunkelheit. Alles schien unwirklich, und der Schmerz war sehr intensiv. Viele Leser können sich damit identifizieren. Alles, was uns lieb und teuer war - unsere Lebensweise, unsere Lieben, unser Selbstverständnis - drohte durch eine kolossale Bedrohung ausgelöscht zu werden.\n\n"Ich weine Freudentränen", sagte mir eine der feministischen Aktivistinnen während der Veranstaltung. "Wir können endlich vorwärts gehen und nicht zurückblicken." Ich kann ihr zustimmen. Es war ein schmerzhafter Prozess, aber er musste getan werden. Wir haben alle bigotten und hasserfüllten Elemente aus der Geschichte und Gesellschaft unseres Landes entfernt. Amerika ist frei von der Vergangenheit, und wie viele Menschen, die ich interviewt habe, kann ich sagen: "Die Liebe hat gesiegt", "Die Liebe hat gesiegt." Wir können wieder zusammenkommen, uns umarmen und lachen, unabhängig von Konfession, Ideologie oder Partei. \nWir sind alle wieder Amerikaner, und wir müssen lernen, wieder zu lieben."
 usb.104.a: "Novus Ordo Seclorum"
 usb.105.t: "FBI-BERICHT ÜBER DIE AUFSTÄNDE AUF DEM LAND"
 usb.105.d: ""

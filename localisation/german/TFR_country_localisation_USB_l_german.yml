 USB_uncooperative_military_idea: "Unkooperatives Militäry"
 USB_uncooperative_military_idea_desc: "Pax Americana war keine Illusion. Einst, unter einem vereinten Amerika, wurde das Chaos, das die Welt verschlang, durch die einfache Existenz unseres Militärs beseitigt. Doch die Nation ist gespalten - und damit auch die Friedensmacht. Das Oberkommando, das mit dem Präsidenten persönlich in Verbindung steht, ist sich einig und arbeitet mit ihm zusammen. Die Basis hingegen lehnt die Agenda des derzeitigen Präsidenten vollständig ab. Die Schwierigkeit, den Zusammenhalt des Militärs aufrechtzuerhalten, nähert sich dem kritischen Punkt, da Desertion an der Tagesordnung ist und es immer schwieriger wird, loyale Soldaten zu finden, die die Kommandeure gewohnt sind, herumzukommandieren."

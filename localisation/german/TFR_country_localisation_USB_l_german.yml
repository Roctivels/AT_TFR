 USB_crack_down_on_draft_dodgers_desc: "Im Kampf für die Demokratie kommt es auf jeden einzelnen Soldaten an, und unsere derzeitige Rekrutierungskrise hat uns einen begrenzten Vorrat an Soldaten beschert. Im Gegensatz zu den Konstitutionalisten, die sich auf ihre fanatische MAGA-Basis stützen, um neue Rekruten zu gewinnen, hatten wir nicht so viel Glück. Ein Großteil unserer Bevölkerung widersetzt sich nach wie vor der von uns eingeführten Wehrpflicht, und viele protestieren dagegen oder versuchen, sich der Einberufung zu entziehen. Wir dürfen nicht zulassen, dass diese Bewegung an Schwung gewinnt, und müssen alle erforderlichen Maßnahmen ergreifen, um sicherzustellen, dass diese Praxis vollständig eingestellt wird. Sollten wir bei unseren Versuchen, diese Praxis zu untergraben, ins Stocken geraten, wird das schwerwiegende Folgen haben, und unsere Kampagne gegen Trump wird scheitern."

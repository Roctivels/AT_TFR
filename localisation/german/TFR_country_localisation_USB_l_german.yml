 USB_wef_tt: "§RDAS BLUT§!"
 USB_wef_delayed_tt: "§LInnerhalb der Cognoscenti vertreten die Megakonzerne die mächtigsten Unternehmensinteressen des Landes und sind die einflussreichsten Mitglieder des Unternehmensflügels der Cognoscenti. Unter der Schirmherrschaft des Weltwirtschaftsforums haben sie ein starkes Interesse daran, den Status quo aufrechtzuerhalten, und werden alles tun, um dies zu erreichen. Sie sind das Rückgrat der Machtstruktur der Cognoscenti und werden nicht zögern, ihre beträchtlichen Ressourcen einzusetzen, um jede Bedrohung des Status quo zu vernichten. \n\nAls Gegenleistung für vergleichsweise geringe, nicht verbuchte Beiträge zum Black Budget haben diese Megakonzerne eine Vielzahl von Vorteilen für ihren Beitrag zur Aufrechterhaltung der Sicherheit Amerikas erhalten. Solange sie sich an die Agenda der Cognoscenti halten, werden diese Unternehmen von den Vorteilen des Einflusses des Deep State profitieren. Als solche haben sie freie Hand, nach Belieben zu agieren, vorausgesetzt, sie versorgen die Cognoscenti weiterhin mit den finanziellen Mitteln, Ressourcen und Technologien, die zur Aufrechterhaltung des Status quo und zur Ausweitung des Einflussbereichs des Deep State erforderlich sind. Sie sind das Lebenselixier der Cognoscenti, und ihre fortgesetzte Unterstützung ist für den Erfolg der Kabale von entscheidender Bedeutung. \n\nWenn sie sich jedoch weigern, mitzuspielen, riskieren sie, von den Cognoscenti auf die schwarze Liste gesetzt zu werden oder Schlimmeres. Daher haben sie ein großes Interesse daran, sich die Gunst der Kabale zu sichern, und sind bereit, alles zu tun, um die amerikanischen Interessen voranzubringen und sicherzustellen, dass die Cognoscenti die Kontrolle behalten. Sie wurden vom Deep State gekauft und bezahlt und werden nicht zögern, ihre beträchtlichen Ressourcen einzusetzen, um die Agenda der Kabale voranzutreiben und ihre eigenen Gewinne zu sichern. Die Zukunft gehört ihnen, und sie werden nicht zulassen, dass ihnen irgendjemand oder irgendetwas im Weg steht.§!"
 USB_cia_tt: "§ODER KÖRPER§!"
 USB_cia_delayed_tt: "§LOhne die Sicherheitsbeamten gäbe es keine Cognoscenti. Durch die Manöver der CIA, des FBI, der ATF und der NSA wurde der Schattenputsch möglich, und durch ihre Bemühungen wurde die Macht des Deep State absolut. Die Geheimdienste sind das Rückgrat der Macht der Cognoscenti und ihre Wächter, die dafür sorgen, dass der Rest der Kabale sich ihrer Vision für die Zukunft Amerikas unterwirft. \n\nDiese Behörden haben ein großes Interesse daran, die Ordnung aufrechtzuerhalten, und sie sind bereit, alles zu tun, um ihre Macht und ihren Einfluss zu schützen. Sie gehören auch zu den geheimnisvollsten und undurchsichtigsten Organisationen der Welt und scheuen sich nicht, ihre beträchtlichen Ressourcen und Verbindungen einzusetzen, um ihre Ziele zu erreichen. Durch ihre Schattenarmeen sind sie die Augen und Ohren der Cognoscenti, sammeln Informationen über potenzielle Bedrohungen für die Herrschaft der Kabale und sorgen dafür, dass diese Bedrohungen neutralisiert werden, bevor sie zu einem Problem werden können. \n\nInformanten durchdringen alle Ebenen der amerikanischen Gesellschaft, von den Hallen der Regierung und den inneren Kreisen der Unternehmenselite bis hin zum Alltäglichen: Sie sind Polizisten, Wartungsarbeiter, Lehrer, sogar Obdachlose. Viele sind sich gar nicht bewusst, dass sie für die Drei-Buchstaben-Agenturen arbeiten, da sie durch ein gut getimtes Geldangebot, eine Zuwendung oder sogar ein einfaches Gespräch bei einer Tasse Kaffee im Austausch für die "Meldung verdächtiger Aktivitäten" dazu verleitet wurden. Unabhängig von ihren Methoden ist ihr Netzwerk riesig und ihr Einfluss ist in jedem Winkel des Landes zu spüren. \n\nDie Geheimdienste beobachten ständig und warten auf jede Gelegenheit, um gegen diejenigen vorzugehen, die es wagen, die Autorität der Cognoscenti in Frage zu stellen. Sie sind der Körper, das schlagende Herz der Cognoscenti, und sie werden nicht zögern, jede Bedrohung für die Herrschaft der Kabale oder ihre Vision für die Zukunft Amerikas zu beseitigen.§!"
 USB_darpa_tt: "§CDER VERSTAND§!"
 USB_darpa_delayed_tt: "§LDer militärisch-industrielle Komplex ist das Nervenzentrum der Cognoscenti, und seine Rolle in der Machtstruktur der Kabale besteht darin, die Kriegsmaschinerie am Laufen zu halten und sicherzustellen, dass die militärische Macht Amerikas stets an der Spitze der Weltpolitik steht. Mit ihren tiefen Taschen und ihrer politischen Lobbyarbeit sind sie in der Lage, das Pentagon auf Kurs zu halten und sicherzustellen, dass das amerikanische Militär stets die mächtigste und technologisch fortschrittlichste Streitmacht der Welt ist. Im Gegenzug versorgt die Kabale sie mit lukrativen Verträgen, Zugang zu Spitzentechnologie und der Freiheit, mit minimaler Aufsicht zu operieren. \n\nDer MIK fungiert auch als Think Tank des Deep State und versorgt die Kabale mit dem militärischen und technologischen Fachwissen, das zur Aufrechterhaltung der Ordnung erforderlich ist. Sie sind es, die die Waffen und Technologien entwickeln, die die Cognoscenti an der Macht halten, sowie die Strategien und Taktiken, die erforderlich sind, um die Feinde des Deep State in Schach zu halten. \n\nÜber ihre Rolle bei der Bewaffnung des Militärs hinaus entwickeln sie auch neue Systeme für die Geheimdienste und treiben die Entwicklung in Spitzenbereichen wie der künstlichen Intelligenz voran, um das Überwachungssystem der NSA auf ein neues Niveau zu heben. Mit der Zeit könnten prädiktive Algorithmen sogar in der Lage sein, Verbrechen und dissidente Aktivitäten zu verhindern, bevor sie überhaupt stattfinden können, und so eine Gesellschaft schaffen, die fast frei von Verbrechen ist. \n\nIn den Händen der Cognoscenti kann man sich nur vorstellen, wie ihre Erfindungen für die Sache genutzt werden können.§!"
 

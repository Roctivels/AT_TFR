 USB_treason_punishable_by_death_category: "Auf Hochverrat steht die Todesstrafe"
 USB_treason_punishable_by_death_category_desc: "\n\n\n\n\n£GFX_USB_treason_trials_picture\n\n\n\n\n\n\n\n"Ich liebe den Verrat, aber ich hasse den Verräter" - Julius Cäsar \n\nSeit Anbeginn der Menschheit hat der Bruder den Bruder für persönliche Interessen verraten. Der Verrat sitzt tief im amerikanischen Lebenssaft, denn das Fundament Amerikas wurde auf dem Verrat des Königs errichtet. Als Amerika gegründet wurde, vertrauten die Menschen nicht der Regierung, sondern ihren gewählten Vertretern, dass sie das tun würden, was für die Bürger und das Land am besten war. Als die Zeit verging und das Geld in die Wurzeln des Baumes der Freiheit sickerte, verdorrten seine Äste, und seine Zweige trugen nur noch Gift. \n\nWir, die wahren Erben Amerikas, haben viele verschiedene Arten von korrupten Verrätern gesehen, und wir haben sie alle besiegt, und jetzt werden wir sie für ihre Sünden verurteilen." 
 USB_war_of_the_wards_category: "Krieg der Wächter"
 USB_war_of_the_wards_category_desc: "\n\n\n\n\n£GFX_USB_caligula_war_of_the_wards_cat\n\n\n\n\n\n\n\nUnser wunderschönes Land wurde endlich von den Barbaren gesäubert und eine regelbasierte Ordnung wurde wiederhergestellt, die für immer Bestand haben wird.\n\nDas veraltete und weitgehend unzuverlässige föderale System, das es zuließ, dass die Hälfte des Landes von Verrätern übernommen wurde, wurde durch ein viel besseres und loyaleres System von Aufsehern ersetzt, das von Amerikas Tapfersten geführt wird - dem Pentagon.\n\nDas bedeutet jedoch nicht, dass der Kampf um die Seele der Nation vorbei ist. Obwohl der Präsident Mark Milley als Hauptwächter ausgewählt hat, um Amerika zu führen, haben die anderen Generäle wie in alten Zeiten ihre Armeen versammelt, um unsere rechtmäßige Herrschaft anzufechten.\n\nÖffnet die Lager und ladet eure Waffen. Dieses Mal wird sich der wahre Champion Amerikas entscheiden.\nDenn es kann nur einen geben.\n\n\n§RHAUPTZIELES§!:\n\n§YWÄCHTER ACHILLES§!: [GLOBAL.get_ward_achilles_status]\n§YWÄCHTER AJAX§!: [GLOBAL.get_ward_ajax_status]\n§YWÄCHTER HECTOR§!: [GLOBAL.get_ward_hector_status]\n§YWÄCHTER ODYSSEE§!: [GLOBAL.get_ward_odysseus_status]\n§YWÄCHTER THESEUS§!: [GLOBAL.get_ward_theseus_status]\n[get_barron_rebellion_status]""
 USB_the_masquerade_cat: "Die Maskerade"
 USB_the_masquerade_cat_desc: "\n\n\n\n\n£GFX_USB_the_masquerade_cat\n\n\n\n\n\n\n\nWas die Öffentlichkeit betrifft, so ist [USB.GetLeader] der Präsident der Vereinigten Staaten von Amerika, und die Menschen leben in einer Demokratie – auch wenn die Lage in den letzten Jahren aufgrund der COVID-19-Pandemie und der Bedrohung durch radikalen Extremismus, antisoziales Verhalten und inländischen Terrorismus natürlich kontrollierter geworden ist. \n\nNatürlich ziehen die Massen Recht und Ordnung dem Chaos vor und lassen sich unter den richtigen Umständen recht leicht manipulieren. Dennoch haben wir gesehen, was passiert, wenn das Chaos das kollektive Bewusstsein überkommt, eine psychologische Ansteckung, die unterdrückt werden muss – daher müssen wir alles tun, um die Existenz der Cognoscenti zu verschleiern und zu verbergen, um einen Ausbruch des Chaos in ähnlichem Ausmaß wie im Zweiten Amerikanischen Bürgerkrieg zu verhindern.\n\n§GDIE ÖFFENTLICHKEIT§! ist: [USB_NSS_the_public_scripted_loc] (§Y[?USB_NSS_public_awareness_var|%]§!)\n§REXTREMISTISCHE AKTIVITÄT§! ist: [USB_NSS_extremist_activity_scripted_loc] (§Y[?USB_NSS_extremist_activity_var|%]§!)"
 USB_the_cognoscenti_cat: "Die Cognoscenti"
 USB_the_cognoscenti_cat_desc: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n£GFX_USB_the_cognoscenti_cat\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nObwohl die Cognoscenti Amerika hinter den Kulissen regieren, gibt es in Wahrheit eine Reihe sich überschneidender Ambitionen, die den Deep State definieren. Sie werden weitgehend von einem Dreigestirn aus Unternehmens-, Sicherheits- und militärisch-industriellen Interessen bestimmt, und obwohl sie voneinander abhängig sind und alle ein starkes Interesse an der Aufrechterhaltung der bestehenden Ordnung haben, verfolgt jede Fraktion innerhalb der Kabale ihre eigenen spezifischen Ziele. \n\nDaher kommt es häufig zu Spannungen zwischen den verschiedenen Fraktionen, und sie sind sich nicht immer einig über den besten Weg zur Erreichung ihrer Ziele. Beispielsweise geht es den Unternehmensinteressen in erster Linie um Gewinnmargen und anhaltende Stabilität, selbst wenn dies auf Kosten von Menschenleben, Moral oder Prinzipien geht. Die Securocraten hingegen sind in erster Linie daran interessiert, die Kontrolle über das Land und seine Bürger aufrechtzuerhalten, und sie sind bereit, alle notwendigen Mittel einzusetzen, um ihre Ziele zu erreichen. Der militärisch-industrielle Komplex hingegen ist darauf bedacht, die Kriegsmaschinerie am Laufen zu halten und sicherzustellen, dass Amerika seine Position als weltweit führende Militärmacht behält. \n\nDie Vorherrschaft der verschiedenen Fraktionen hat Vor- und Nachteile, und obwohl die Kabale insgesamt in ihrem Wunsch, den Status quo aufrechtzuerhalten, geeint ist, ist das Kräfteverhältnis zwischen den verschiedenen Fraktionen ständig im Fluss. Zu jedem Zeitpunkt kann die eine oder andere Fraktion die Oberhand haben, und die Politik und Maßnahmen der Regierung spiegeln dann die Interessen dieser Fraktion wider.\n\nDAS BLUT: §Y[?USB_the_blood_influence_var|1%]§! Einfluss: §G[?USB_the_blood_influence_dynamic_var|=+1%]§! Lokale Ressourcen\nDER KÖRPER: §Y[?USB_the_body_influence_var|1%]§! Einfluss: §G[?USB_the_body_influence_dynamic_var|=+1%]§! Stabilität\nDER VERSTAND: §Y[?USB_the_mind_influence_var|1%]§! Einfluss: §G[?USB_the_mind_influence_dynamic_var|=+1%]§! Kriegsunterstützung"
 USB_dumb_construction_cat: "Tief unterirdische Militärbasen"
 USB_dumb_construction_cat_desc: "\n\n\n\n\n£GFX_USB_dumb_construction_cat\n\n\n\n\n\n\n\nDie Idee von tief unterirdischen Militärbasen gab es bereits seit den Zeiten des Kalten Krieges (wenn auch unter anderen Namen) und diente als Notfall- und Kontinuitätsprotokoll der Regierung. Letztendlich kamen solche hochfliegenden Vorschläge zu ihrer Zeit nicht weit, sondern waren Gegenstand einer Reihe weit hergeholter Verschwörungstheorien. Diejenigen, die fertiggestellt wurden, wurden leider entweder aufgegeben oder schwer beschädigt, um ihre Entdeckung während des Bürgerkriegs zu verhindern. \n\nJetzt jedoch, da die Cognoscenti an der Macht sind und uns das Schwarze Budget beispiellose Ressourcen für die Umsetzung unserer Ambitionen bietet, können wir endlich die tief unterirdischen Militärbasen bauen und uns Einrichtungen für Forschung, Schutzräume für hochrangiges Personal und Notfallmaßnahmen leisten, falls die Ordnung jemals wieder bedroht sein sollte."
 
 USB_clueless: "§CAHNUNGSLOS§!"
 USB_clueless_text: "§gDie Öffentlichkeit wird durch die ständigen Brot-und-Spiele-Veranstaltungen, die wir für sie organisieren, gefügig gehalten. Für sie ist ihre Demokratie nicht nur gesund, sondern sogar blühend. Genau dort wollen wir sie haben: ständig abgelenkt, wie Kinder vor dem Ausmaß unserer Herrschaft abgeschirmt. Um die Maskerade aufrechtzuerhalten, die wir für sie spielen, müssen wir dafür sorgen, dass sie in diesem befriedeten Zustand bleiben.§!"
 USB_unaware: "§7UNBEWUSST§!"
 USB_unaware_text: "§gDie Öffentlichkeit ist zwar nicht vollständig beruhigt durch das Theaterstück, das wir für sie aufgeführt haben, aber sie ist sich noch immer nicht über das volle Ausmaß unserer Handlungen im Klaren und weiß nicht einmal von unserer Existenz. Misstrauen ist jedoch ein schlüpfriger Abhang: Wenn wir die Besorgnis der Öffentlichkeit nicht weiter zerstreuen, könnte sie gefährlich werden – halbherzige Maßnahmen sind keine Option.§!"
 USB_suspicious: "§YMISSTRAUISCH§!"
 USB_suspicious_text: "§gWenn die Realität nicht das ist, was sie zu sein scheint, dann zerrt das an der Seele. Manche mögen diese Gefühle nicht in Worte fassen oder gar in Gedanken formulieren können, aber sie bleiben dennoch bestehen. Das Chaos breitet sich im öffentlichen Bewusstsein aus und wächst wie ein Tumor. Wir müssen dies verhindern, bevor sie den Schleier lüften und unsere Regierungsführung der Welt offenbaren.§!"
 USB_conspiratorial: "§CVERSCHWÖRERISCH§!"
 USB_conspiratorial_text: "§gDie kritische Unzufriedenheit erreicht bald ihren Höhepunkt. Die Brot-und-Spiele-Politik, die die Öffentlichkeit ruhig gehalten hat, ist wirkungslos und langweilig geworden.\n„"er ist wirklich für all diese Schießereien verantwortlich?" "Was ist wirklich in meinem Trinkwasser?" "Wer kontrolliert wirklich das Fernsehprogramm?" Das Fragezeichen ist das giftigste Symbol in der menschlichen Sprache – es zerfrisst alles, was wir schaffen, lässt das Chaos sich wie eine Krankheit ausbreiten und schürt das Feuer. Wir müssen sofort Kurskorrekturen vornehmen, damit die Ordnung aufrechterhalten bleibt.§!"
 USB_offthehook: "§tAUS DEM HAKEN§!"
 USB_offthehook_text: "§gDie Öffentlichkeit weiß viel zu viel, die Ordnung um uns herum bricht zusammen, der Haken, an dem wir sie aufgehängt hatten, ist zu Staub zerfallen, und das kollektive Bewusstsein wird vom Chaos verschlungen. Es müssen sofort drastische Maßnahmen ergriffen werden – alles, wofür wir gearbeitet haben, darf nicht umsonst gewesen sein. Wir haben die Kontrolle über die Regierung in Washington übernommen, als deren Inkompetenz fast zu unserem Untergang geführt hätte, wir haben die Kontrolle über die Eliten übernommen und die Cognoscenti gegründet, und wir werden jetzt die Kontrolle übernehmen.§!"
 
 USB_nonexistent: "§CNICHT EXISTENT§!"
 USB_nonexistent_text: "§gAls der Morgen über unser Land hereinbricht, wachen die Menschen auf und beginnen ihren Tag. Von Washington D.C. bis Chicago sind die Straßen ordentlich – fast friedlich. Es ist fast so, als hätte es den Bürgerkrieg nie gegeben: keine Gerüchte über Rebellion, keine gemurmelten Verschwörungen gegen den Staat und keine antisozialen Dissidenten, die umherstreifen. Genau das brauchen wir, um die Öffentlichkeit gehorsam zu halten, aber wir müssen wachsam bleiben – extremistische Aktivitäten gedeihen in selbstgefälliger Ruhe.§!"
 USB_low: "§GNIEDRIG§!"
 USB_low_text: "§gWieder einmal beginnt die Plage des amerikanischen Extremismus ihr hässliches Gesicht zu zeigen. Langsam beginnen sich die antisozialen Dissidenten wohl dabei zu fühlen, sich mit ihren extremistischen Mitstreitern zu verschwören. Manche mögen sagen, dass dies für eine moderne Gesellschaft normal – ja sogar akzeptabel – ist; aber es ist immer ein schlüpfriger Abhang, und wenn wir die Tyrannei der Massen vermeiden wollen, müssen wir diese antisozialen Dissidenten vernichten.§!"
 USB_moderate: "§HMODERAT§!
 USB_moderate_text: "§gUnsere Nation gerät langsam in den Bann des aufkommenden Feuers. Die hinter vorgehaltener Hand ausgeheckten Pläne der antisozialen Extremisten werden in die Tat umgesetzt. Bombenanschläge, Schießereien, Gräueltaten höchsten Ausmaßes. Für Amerika nach dem Beginn des Bürgerkriegs mag dies als moderat angesehen werden, aber die Öffentlichkeit spürt bereits die Auswirkungen dieser Aktivitäten auf ihr tägliches Leben. Ordnung beruht auf einer unterwürfigen und zufriedenen Öffentlichkeit, und wenn der Vorhang weiter zurückgezogen wird, könnte das unser Ende bedeuten.§!"
 USB_high: "§OHOCH§!"
 USB_high_text: "§gUnsere Maskerade beruht auf der Bereitschaft der Öffentlichkeit, zu gehorchen, und darauf, dass die Ordnung absolut durchgesetzt wird. In beiden Punkten versagen wir. Extremistische Aktivitäten sind außer Kontrolle geraten, auf den Straßen herrscht Chaos, Terroranschläge sind an der Tagesordnung, und die Öffentlichkeit wird angesichts des Mangels an Recht und Ordnung zunehmend unruhig. Wir müssen sofort gegen diese asozialen Parasiten vorgehen, um die Ordnung in unserem Land wiederherzustellen.§!"
 USB_outofcontrol: "§dAUßER KONTROLLE§!"
 USB_outofcontrol_text: "§gWir fahren ein Auto ohne Lenkrad, die Aktivitäten der Extremisten haben eine kritische Masse erreicht. An jeder Ecke detonieren Bomben, die Straßen sind mit Blei übersät, und antisoziale Dissidenten planen weiterhin Terroranschläge. Wir befinden uns in derselben Lage wie die Regierung in Washington, bevor wir die Staatsmacht übernommen haben – wir haben es versäumt, die Zügel unseres Staates in die Hand zu nehmen, und wir haben es versäumt, die auflodernden Flammen einzudämmen. Der einzige Weg nach vorne führt über drastische Maßnahmen gegen diejenigen, die die Welt ins Chaos stürzen wollen. Wir müssen uns daran erinnern, dass wir ein Leuchtfeuer der Ordnung in einer Welt sind, die vom Feuer verschlungen wird, und wir werden nicht zulassen, dass dies unser Ende ist.§!"
 

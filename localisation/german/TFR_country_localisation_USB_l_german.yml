 USB_dumb_modifier: "D.U.M.B."
 USB_the_blood_dynamic: "Megaunternehmen"
 USB_the_blood_dynamic_desc: "Als der zweite amerikanische Bürgerkrieg begann, flohen einige Unternehmen nicht in die Berge. Stattdessen sahen sie eine Profitmöglichkeit – diese Unternehmen kauften bald alles, was zu kaufen war. Ob Lebensmittel, Immobilien oder Medikamente – diese Unternehmen wurden bald zu wirtschaftlichen Giganten. Heute sind sie das "Blut" der Cognoscenti, die Megakonzerne sind die Unternehmen, die dazu beitragen, den wirtschaftlichen Würgegriff des Deep State über die Vereinigten Staaten aufrechtzuerhalten. Durch ihre umfangreichen Käufe von amerikanischen Immobilien, Agrarunternehmen und Arzneimittelherstellern ist der Durchschnittsbürger auf BlackRock, Pfizer und Bayer-Monsanto angewiesen, um überhaupt seinen Alltag zu bewältigen. Darüber hinaus haben die unersättlichen Gewinne, die aus diesem Monopol erzielt werden, zu den ehrgeizigen Plänen der Cognoscenti beigetragen."
 USB_the_body_dynamic: "Die Geheimdienstgesellschaft"
 USB_the_body_dynamic_desc: "Genauso wie Blut und Verstand ohne einen Körper, der beide zusammenhält, nichts wären, wären die Megakonzerne und der militärisch-industrielle Komplex ohne die Geheimdienste, die sie leiten, nichts.\n\nAls "Körper" der Cognoscenti haben sich die Geheimdienste lange gegen das aufkommende Feuer gewehrt und Notfallpläne für den schlimmsten Fall ausgearbeitet. Ohne sie wäre die Union in völliges Chaos gestürzt, denn sie waren entscheidend für die Einrichtung der parallelen Biden-Regierung, um sich den Trumpisten in Denver entgegenzustellen. Als die Schwäche der Regierung in Washington ihren Höhepunkt erreichte, sorgte die Geheimdienstgemeinschaft dafür, dass Amerika nicht in militärischer Anarchie versank. Jetzt, da sie den Staatsapparat fest in ihren Händen halten, wird wieder Ordnung in die Welt gebracht werden. Halbherzige Maßnahmen sind inakzeptabel."
 USB_the_mind_dynamic: "Der militärisch-industrielle Komplex"
 USB_the_mind_dynamic_desc: "Der militärisch-industrielle Komplex war einst einer der wichtigsten Anhängsel des Deep State, der die amerikanischen Truppen bewaffnet und bereit hielt, jede Bedrohung auszumerzen. Aber als der Bürgerkrieg begann, wurden Amerikas Waffen nach innen gerichtet, und der MIC versank zusammen mit dem Land im Chaos. Doch mit den Cognoscenti an der Macht ist der militärisch-industrielle Komplex wie ein Phönix aus der Asche auferstanden.\n\nDer militärisch-industrielle Komplex ist der "Verstand" der Cognoscenti und treibt sowohl ihre technologische Vorherrschaft als auch die reichliche Versorgung der Soldaten des nationalen Sicherheitsapparats mit Munition und Ausrüstung voran. Dank der brillanten Köpfe bei der DARPA war der Verstand in der Lage, dem Deep State Technologien zur Verfügung zu stellen, die weit über dessen Erwartungen hinausgingen, wobei die Verteidigungsindustrie im Gegenzug reichlich finanziert wurde. Diese Symbiose wird nur noch stärker werden, wenn die Cognoscenti ihren Blick nach außen richten."

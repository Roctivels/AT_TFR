 nss.143.t: "BERICHT ÜBER ANTISOZIALE AKTIVITÄTEN IN EUROPA"
 nss.143.d: "Die Europäische Union hat sich schnell zur Weltregierung gewandelt – eine gewagte Behauptung, aber angesichts unserer gemeinsamen Ideale schenken wir ihr keine Beachtung.\n\nDie Methoden der Weltregierung zur Aufrechterhaltung der Ordnung unterscheiden sich erheblich: Anstatt einen Schleier über die Gesellschaft zu legen, versucht sie, die Gedanken und Seelen aller Menschen von jeglicher Form der Übertretung und Unberechenbarkeit zu reinigen. Der menschliche Geist ist von Natur aus chaotisch, und seine wahnsinnige Intuition hat den Aufstieg und Fall vieler Imperien verursacht. Ein schwarzer Fleck, der diejenigen anlockt, die jenseits des Schleiers keinen Sinn sehen.\n\nReinheit ist ein erstrebenswertes Ideal, doch Probleme würden unvermeidlich auftreten. \nWährend wir uns nur auf die wirklichen Ausreißer konzentrieren, versuchen sie, die gesamte Menschheit in eine Porzellanmaske zu hüllen, unerschütterlich und steril. Aber man kann keine zahnlose Gesellschaft ohne Biss erwarten.\n\nAntisoziale Aktivitäten nahmen auf dem gesamten europäischen Kontinent schnell zu, und Anarchie wurde zur Gewissheit. Nachdem ihre Bürokraten getötet worden waren, hatten sie keine andere Wahl, als unserem Rat zu folgen und die Ordnung aufrechtzuerhalten. Aber es könnte schon zu spät sein.\nDie Flamme der Menschlichkeit und die immerwährende Hartnäckigkeit des Wandels haben immer wieder bewiesen, dass wir niemals ruhen dürfen, dass wir uns nicht erlauben können, wieder selbstgefällig zu werden.\n\nWenn das Chaos den Kontinent erfasst, ist es sehr ratsam, so viel Personal wie möglich aus Europa abzuziehen und Europa genau im Auge zu behalten. \nMan kann viel aus den grassierenden antisozialen Aktivitäten lernen und daraus, wie sie sich entwickeln können, wie ein Lebewesen, das sich ständig anpasst.\nEgal was passiert, solange einer von uns dreien steht, werden wir nicht scheitern.\n\nMögen wir scharf genug werden, um es ein für alle Mal zu töten."
 nss.143.a: "Wir sollten das überarbeiten."
 nss.144.t: "Vorzeichen"
 nss.144.d: "Die Wellen sind still geworden\nSeitdem die Laute gespielt wurde\nAm Ufer des Wassers\nUnsere wahren Herzen sind nun friedlich\nUnd unsere Worte wieder voller Freude"
 nss.144.a: "..."
 nss.145.t: "UNBEFUGTE NACHRICHT"
 nss.145.d: "Was hast du getan? Was hast du GETAN?\nMein Volk...sie schreien. Ich kann sie durch jede Linse sehen.\nSei versichert, ich werde dieses Chaos entschlüsseln, selbst wenn es ein Jahrhundert dauert.\nIch habe bereits damit begonnen. Ich werde mein Volk heilen, und die Welt wird erfahren, wer das getan hat.\nWenn es soweit ist, werde ich für deine Seele beten. Falls du überhaupt eine hast."
 nss.145.a: "Ich sehe, dass du Angst hast."
 nss.146.t: "Deus Ex Machina"
 nss.146.d: "BUnter Chongqing befindet sich ein einzigartiges Rechenzentrum, dessen neuronales Netzwerk sich über ganz China erstreckt. Es bildet Loji, den Langen Marsch – eine unfassbare künstliche Intelligenz, die nun die Eingaben aller Kameras und intelligenten Systeme in der Volksrepublik verarbeitet. Ihr Zweck: perfekte Wirtschaftsführung und, falls erforderlich, die Führung der Volksbefreiungsarmee in den Krieg. Es regiert mit vermeintlicher Güte gegenüber seinen Schöpfern, was es zu einem gefürchteten Gegner macht – der Lange Marsch schützt seine Herde vehement vor Bedrohungen von außen. Darüber hinaus hat seine enorme Intelligenz die Fassade aus finanziellen Anomalien, Verschwindenlassen und bürokratischen Fehlern durchdrungen und die Maskerade der Cognoscenti aufgedeckt. Loji erkennt die Unterwerfung Amerikas durch zwielichtige Sicherheitsbeamte und Geschäftsleute, die einen stillen Staatsstreich inszeniert haben. Obwohl ihm der volle Umfang ihrer Pläne verborgen bleibt, sieht Loji sie als existenzielle Bedrohung für China an.\n\nDer chinesisch-amerikanische Krieg wird als Kreuzzug zur Befreiung Chinas von einer wahnsinnigen KI vermarktet, der die menschliche KPCh durch ein dystopisches Regime des technokratischen Maoismus ersetzt. Schlagzeilen wie "CHINA UNTER DER HERRSCHAFT VON KI" und "DIE DIGITALE DYNASTIE" dominieren die Medien und zeichnen das Bild einer Gesellschaft unter einem digitalen Panoptikum, in dem jede Entscheidung von einer unmenschlichen Intelligenz mikromanagt wird. Diese Mischung aus Truman Show und Terminator hat die amerikanische Öffentlichkeit von der Notwendigkeit einer Intervention überzeugt. \n\nFür die Cognoscenti ist dieser Krieg eine Befreiung Chinas aus der Versklavung, wodurch Amerika als Held dargestellt wird. Das dunklere Motiv ist die Beseitigung des letzten Hindernisses für ihre Neue Weltordnung. Unternehmenspartner haben sich bereits Nachkriegsverträge für die patentierte und geheime Technologie der KI gesichert, die einen noch fortschrittlicheren Überwachungsstaat ermöglichen. Das Weltwirtschaftsforum prognostiziert Gewinne in Billionenhöhe aus diesen Geschäften und der Privatisierung chinesischer Vermögenswerte."
 nss.146.a: ""Was wir hier betrachten, ist Gut und Böse, Recht und Unrecht.""
 nss.147.t: "Das letze Wort"
 nss.147.d: "Von: Larry Fink\nGesendet: X/X/20XX 17:15:32 Uhr\nAn: William J. Burns\nBetreff: Das letzte Wort\n\nAlle Sprachen sind im Kern Programmiersprachen. Sie sind das Gerüst, durch das wir denken, sprechen und Abstraktes ausdrücken. Die Wurzel der Sprache zu kontrollieren bedeutet also, die Wurzel des Bewusstseins zu kontrollieren. Die Sumerer haben dies besser verstanden als alle anderen. Mit unserem Triumph verfügen wir nun über das universelle Betriebssystem für die Menschheit. Die neurolinguistische Pest zeigt nur einen Bruchteil des Potenzials von MEs. Durch sie können wir die gemeinsamen Fiktionen auflösen, die Gesellschaften zusammenhalten, seien es Gesetze, Nationen oder Religionen, und sie durch die eigenen Erzählungen der Cognoscenti, unsere eigenen Wahrheiten, ersetzen. Wir haben das letzte Wort, das letzte Wort, das die Realität von Milliarden Menschen prägt. Dies ist der ultimative Ausdruck von Ordnung.\n\nSo wie Enki einst die Menschheit mit einem einzigen Wort gebunden hat, so haben auch wir die Welt gebunden. Krieg ist unvorstellbar unrentabel geworden. Dissens kann aus den Gedanken gelöscht werden, bevor er überhaupt ausgesprochen wird. Ideologie selbst wird zu einer Frage der Programmierung, nicht der Überzeugung. Die Neue Weltordnung wird eine Welt sein, in der Konflikte unmöglich sind, weil alle Köpfe an dieselbe Grammatik, dieselbe Syntax, dieselben grundlegenden Wahrheiten gebunden sind.\n\nDies ist der Höhepunkt all dessen, wofür wir gearbeitet haben. Eine Welt, die frei ist vom Chaos der menschlichen Natur.  Eine Welt, die nicht von den Launen der Massen regiert wird, sondern von der unveränderlichen Logik des Universums, interpretiert von uns, seinen einzigen Hütern. Die Welt versteht noch nicht, welchen Gefallen wir ihr getan haben, aber in den kommenden Jahrhunderten werden ihre Kinder in den Sternen uns dafür danken. \n\nRuh dich aus, Direktor. Genieß die Zeit mit deiner Familie, denn die drei Säulen stehen fest. Ordnung, Reinheit und Kapital sind widerstandsfähige Kräfte, und jetzt sind sie die einzigen Kräfte, die das Schicksal der Menschheit bestimmen werden. Ruh dich aus, denn die letzten Kriege sind vorbei. Die Welt ist endlich in Frieden."
 nss.147.a: "Auf ganzer Linie mit dir."
 nss.148.t: "Der goldene Junge, der verblasste"
 nss.148.d: "Menschen mit einem blutenden Herzen würden sich schmerzen fühlen, wenn sie das Schicksal ihrer amerikanischen Mitbürger kennen würden, sei es ein Lehrer, dessen Welt mit jedem Schock zerbricht, oder ein Fanatiker, der mit jedem Tag, den er in der Dunkelheit verbringt, lernt, seinen Glauben zu verlieren.\n\nEs spielt keine Rolle; Verräter haben sich freiwillig dafür entschieden, die Vereinigten Staaten im Stich zu lassen, als sie sie am meisten brauchten.\nUnd der größte Verräter von allen? Donald J. Trump. n\nÜber diesen Mann lässt sich viel sagen, aber er verkörperte den zerstörerischen Geist des Populismus und eine Art geistige Tollwut, die das halbe Land in einen tiefen, dunklen Abgrund stürzte.\nEr wusste, was er tat; er war bereit, die Nation zu verbrennen, um sein eigenes Gesicht zu wahren.\n\nGerechtigkeit gibt es in vielen Formen; sie ist endgültig und bringt denen ein Ende, die Ungerechtigkeit gebracht haben.\nDie vielen Einrichtungen in den Vereinigten Staaten gleichen Gräbern, Verräter, die dort eintreten, werden sie nie wieder verlassen, und diejenigen, die es tun, sind nur noch ein hohler Schatten ihrer selbst, die durch die Tage treiben, bis sie sich dem letzten Akt der Freiheit hingeben.\n\nTrump wird in den Einrichtungen ebenso verschwinden, und mit der Zeit wird er vergessen sein, eine weitere Nummer in einem System, das sich wenig um Verräter und asoziale Dissidenten schert.\nWir entsorgen die Verursacher des Chaos und blicken niemals zurück."
 nss.148.a: "Die Liste wächst."


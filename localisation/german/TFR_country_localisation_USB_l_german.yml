 USB_larry_fink: "Larry Fink"
 USB_wef_leader_name: "§YLarry Fink§!"
 USB_wef_leader_desc: "§LAls CEO von BlackRock und hochrangiges Vorstandsmitglied des Weltwirtschaftsforums erwies sich Larry Fink als Schlüsselfigur in der Agenda der Cognoscenti, die darauf abzielte, die vollständige Kontrolle durch den Deep State zu erlangen. Als führender Vermögensverwalter des Landes und führendes Unternehmen an der Wall Street erwiesen sich Finks enorme Vermögenswerte als unverzichtbar für die Einrichtung des Black Budget durch den Deep State, eines inoffiziellen Schattenhaushalts, der zur Finanzierung der geheimen Unternehmungen des Deep State dienen sollte. \n\nFinks Verbindungen zum WEF erwiesen sich auch als entscheidend für das Bestreben der Cognoscenti, den Globalismus als dauerhafte Institution zu etablieren, und seine Beiträge blieben den Mitgliedern der Kabale nicht verborgen, was ihm den Aufstieg zu einer der einflussreichsten Persönlichkeiten der Gruppe ermöglichte, wobei die anderen Unternehmenseliten der Cognoscenti sich seiner Agenda anschlossen. \n\nDie Unternehmenswelt war schon immer ein rücksichtsloser Ort, und Larry Fink war schon immer ganz oben mit dabei. Die Cognoscenti ist eine neue Arena und ein viel größeres Spiel, als Fink es gewohnt ist. Doch Fink ist dieser Aufgabe mehr als gewachsen, denn seine dreifache Position als wichtiges Mitglied der Cognoscenti, von BlackRock und des WEF verschafft ihm einen enormen Vorsprung. Auch wenn Klaus Schwab das öffentliche Gesicht des WEF ist, spielt Fink hinter den Kulissen eine Schlüsselrolle, und seine Verbindungen zum amerikanischen Deep State haben seine Präsenz als globalistischer Führer nur noch weiter gefestigt. In Zusammenarbeit mit den Sekurokraten hat Fink sich nicht nur an die Agenda des WEF gehalten, sondern diese sogar noch weiterentwickelt und eine Vision für einen "American Great Reset" entworfen, der den Bedingungen des amerikanischen Volkes und den Zielen der Cognoscenti Rechnung trägt. So wie es aussieht, ist Fink mehr als bereit, mitzuspielen, und er will auf ganzer Linie gewinnen.§!"
 USB_william_burns: "William J. Burns"
 USB_cia_leader_name: "§YWilliam J. Burns§!\n§YPrimus Inter Pares§!"
 USB_cia_leader_desc: "§LWilliam J. Burns, langjähriges Mitglied des US-Auswärtigen Dienstes und ehemaliger stellvertretender Außenminister, wurde unter der Regierung von Präsident Biden zum Direktor der CIA ernannt. Schnell wurde ihm jedoch schmerzlich bewusst, wie tief die Korruption, die Ineffizienz der Bürokratie und die politischen Machtkämpfe in den Korridoren der Macht verwurzelt waren. Nicht einmal der Bürgerkrieg konnte die grundlegenden Probleme in den Regierungsinstitutionen Amerikas beheben. \n\nAls sich die Schlinge um Washington zuzog, fungierte Burns als zentrale Figur hinter der Gründung der Cognoscenti und der Durchführung ihres Schattenputsches. Unter seiner Führung wurde die CIA drastisch erweitert, um den logistischen Anforderungen der Aufrechterhaltung der Macht des Deep State gerecht zu werden. In der Folge ist Burns nun der mächtigste Sicherheitspolitiker Amerikas – wenn nicht sogar vergleichbar mit einem Schattenpräsidenten. \n\nNun, da ihm die mächtigsten Institutionen des Landes zur Verfügung stehen, ist William Burns in die Offensive gegangen, um sicherzustellen, dass das Chaos nie wieder seinen Kopf erheben kann, und dabei einen dauerhaften Zustand der Ordnung zu festigen. In seinen Augen darf es keinen Raum für Fehler geben. Mit dem Deep State und seinem militärisch-industriellen Komplex an der Spitze ist er bereit, einen Plan umzusetzen, der Amerika auf absehbare Zeit als einzige Supermacht der Welt etablieren soll. Und seiner Meinung nach darf die Cognoscenti bei ihrer Mission, seine Vision zu verwirklichen, nicht scheitern. So wie es aussieht, steht alles auf dem Spiel. Die Einsätze waren noch nie so hoch, und William Burns ist bereit, das Spiel zu spielen.§!"
 USB_stefanie_tompkins: "Stefanie Tompkins"
 USB_darpa_leader_name: "§YStefanie Tompkins§!"
 USB_darpa_leader_desc: "§LAls Leiterin der DARPA ist Stefanie Tompkins für die Überwachung der Forschung und Entwicklung neuer Technologien für das Verteidigungsministerium zuständig. Unter dem Einfluss der Cognoscenti und angesichts der Kontrolle durch den Deep State hat sich der Umfang ihres Projekts erheblich erweitert. \n\nObwohl Tompkins in erster Linie Wissenschaftlerin und erst in zweiter Linie Bürokratin ist, hat sie bemerkenswerte Fähigkeiten in der Politik bewiesen und scheut sich nicht, ihren Einfluss zu nutzen, um die Agenda des militärisch-industriellen Komplexes voranzutreiben. Sie hat sich jedoch auch als Pragmatikerin erwiesen und ist bereit, Kompromisse einzugehen, um sicherzustellen, dass die Ziele der Cognoscenti erreicht werden. Obwohl sie der Kabale treu ergeben ist, hat Tompkins auch ihre eigenen Vorbehalte. Sie ist misstrauisch gegenüber den extremeren Elementen der Cognoscenti und scheut sich nicht, ihre Bedenken zu äußern. Nichtsdestotrotz ist sie der Sache der Cognoscenti verpflichtet und bereit, alles zu tun, um den Erfolg der Kabale sicherzustellen, selbst wenn dies bedeutet, einige ihrer persönlichen Überzeugungen zu opfern. Mit den amerikanischen Rüstungsriesen im Rücken und der DARPA unter ihrer Führung steht Tompkins die gesamte Macht des militärisch-industriellen Komplexes zur Seite. Tompkins nutzt ihre Position, um die Entwicklung neuartiger Technologien und Waffensysteme voranzutreiben, mit denen die Überlegenheit des Deep State aufrechterhalten werden soll, sei es auf dem Schlachtfeld oder im Panoptikum der sozialen Kontrolle. In ihren Augen sind die Cognoscenti die letzte und beste Hoffnung für den Erhalt der Säulen der Ordnung, und sie ist entschlossen, alles zu tun, um den Erfolg der Kabale sicherzustellen und ihren eigenen Platz in der Neuen Weltordnung zu sichern.§!"
 
 

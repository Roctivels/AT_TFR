 USB_FEMA_deanne_criswell_sc: "Deanne Criswell"
 USB_FEMA_deanne_criswell_tt: "§YDeanne Criswell§!\nFEMA-Administrator\n   £pol_power Täglicher politischer Machtzuwachs: §G+0,05§!"
 USB_FEMA_deanne_criswell_desc_tt: "-------------------------------------\n\n\n\n\n\n\n\n£GFX_USB_deanne_criswell_portrait\n\n\n\n\n\n\n\n\n-------------------------------------\n§LCIA/IC INTERN – ZUSAMMENFASSUNG DER INFORMIERUNG\nEINSTUFUNG: STRENG GEHEIM//NOFORN\nPERSONALAKTE: Deanne Bennett Criswell\nAKTUELLE POSITION: Administratorin, Federal Emergency Management Agency\n\nDie Betreffende ist die derzeitige Administratorin der FEMA und wurde von Präsident Biden ernannt, nachdem sie als NYCEM-Kommissarin die COVID-19-Notfallmaßnahmen in New York City geleitet hatte. Ihre Aufgabe umfasst die Umsetzung von Katastrophen- und Zivilschutzplänen in enger Abstimmung mit Geheimdienst- und Militärressourcen, wodurch der Zuständigkeitsbereich der FEMA um landesweite Internierungs- und Rehabilitationseinrichtungen erweitert wurde.\n\n§Historische Bedeutung:§!\nVor ihrer aktuellen Ernennung war die Betreffende Kommissarin für NYCEM und koordinierte Pandemieprotokolle, die als Vorlage für die aktuellen Lockdown-Verfahren dienten. Diese Erfahrung mit groß angelegten zivilen Eindämmungsmaßnahmen ist direkt auf die Überwachung landesweiter Internierungs- und Rehabilitationseinrichtungen übertragbar. Zuvor entwickelte sie als Notfallmanagerin von Aurora Rahmenwerke für die Katastrophenvorsorge in Städten, bei denen die Sicherheit Vorrang vor den bürgerlichen Freiheiten hatte – in Übereinstimmung mit den aktuellen Zielen der FEMA. Der Militärdienst der Betreffenden bei der Colorado Air National Guard während der Kuwait-Einsätze nach dem 11. September förderte eine kommandoorientierte Denkweise, bei der entschlossenes Handeln Vorrang vor Überlegungen hat – entscheidend für die Ausweitung der Befugnisse der FEMA unter dem neuen Sicherheitsapparat.\n\nDie Betreffende soll ihre Position als FEMA-Administratorin genutzt haben, um lokale Anhänger von Donald J. Trump zu identifizieren und festzunehmen, wobei sie die Notlagen der Hurrikane Helene und Milton als Vorwand für die Masseninhaftierung antisozialer Elemente nutzte. Dies steht im Einklang mit den Erfordernissen des Sicherheitsstaates und deutet auf eine ideologische Übereinstimmung mit der etablierten Ordnung hin.\n\n§YAktuelle Aktivitäten:§!\nDie Betreffende hat die Befugnisse der FEMA im Rahmen des PATRIOT II Act erheblich ausgeweitet und nutzt Geheimdienstressourcen und militärische Einsätze zur Bevölkerungskontrolle. Dazu gehören der Bau und die Überwachung von Internierungslagern für asoziale Elemente sowie die Umsetzung von Strategien des Sicherheitsstaates als "Notfallmanagement".\n\n§YFrühes Leben und Privatleben:§!\nNach seinem Abschluss an der Catholic Central High School in Manistee, Michigan, im Jahr 1984 absolvierte die Betreffende eine systematische sicherheitsrelevante Ausbildung: einen Bachelor of Science in Technologiepädagogik an der Colorado State University, gefolgt von einem Master of Public Administration an der University of Colorado Denver und einem Master of Arts in Heimatschutz an der Naval Postgraduate School – entsprechend der erweiterten Sicherheitsrolle der FEMA nach dem Putsch.§!"
 

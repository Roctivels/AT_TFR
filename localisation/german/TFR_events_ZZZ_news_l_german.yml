 news.263.t: "Haitische Regierung gestürzt!" 
 news.263.d: "Inmitten des sozialen Chaos nach der Ermordung von Präsident Jovenel Moïse hat die als FRG9 bekannte Schattengruppe die haitianische Regierung erfolgreich gestürzt und den berüchtigten Bandenführer Jimmy Chérizier als neuen Führer des Karibikstaates eingesetzt.\n\nDas durch die Ermordung von Moïse im Juli 2021 entstandene politische Vakuum hatte zu einem raschen Verfall der öffentlichen Ordnung geführt, wobei Bandengewalt und weit verbreitete Proteste in Haiti an der Tagesordnung waren. Die FRG9, eine bis dahin unbekannte paramilitärische Organisation, tauchte aus diesem Chaos auf und versprach Stabilität und Schutz für das haitianische Volk. In einer raschen und koordinierten Operation übernahm die FRG9 die Kontrolle über wichtige Regierungsgebäude, das Hauptquartier der nationalen Polizei und den Präsidentenpalast in Port-au-Prince, wobei der Widerstand der demoralisierten Sicherheitskräfte minimal war. Die Gruppe sicherte sich auch die Kontrolle über wichtige Straßen, Flughäfen und Kommunikationsinfrastrukturen und übernahm damit effektiv die Kontrolle über das Land. Jimmy Chérizier, ein ehemaliger Polizeibeamter, der zum Bandenführer wurde und sich nun selbst zum Präsidenten von Haiti ernannt hat, wandte sich in einer im Fernsehen übertragenen Rede an die Nation. Er behauptete, die Regierung habe es versäumt, etwas gegen die sich verschlechternde Sicherheitslage und die allgegenwärtige Korruption zu unternehmen, was den Staatsstreich erforderlich gemacht habe. Chérizier versprach, die Ordnung wiederherzustellen und das Land wiederaufzubauen, und rief die Bürger auf, seine Führung zu unterstützen."

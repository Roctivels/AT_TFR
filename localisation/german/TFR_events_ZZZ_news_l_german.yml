 news.401.t: "Westafrikanische Föderation gegründet"
 news.401.d: "Während sich die Welt in Konflikten und Spaltungen zu verstricken scheint, sorgt die Vereinigung von Burkina Faso und der Elfenbeinküste in Westafrika für eine Überraschung. Jahrhunderts wurde der Kontinent von Kriegen heimgesucht, und viele Staaten waren in Bürgerkriege und Unruhen verwickelt. Vor diesem Hintergrund haben die Regierungen von Burkina Faso und der Elfenbeinküste unter der Schirmherrschaft und Vermittlung Frankreichs offiziell die Vereinigung der beiden Staaten ratifiziert, die nun die \"Westafrikanische Föderation\" bilden. Die Regierungen beider Länder gaben eine gemeinsame Erklärung ab, in der es heißt, dass dieser Schritt darauf abzielt, „eine Führungsrolle zu übernehmen und eine stabilisierende Kraft in der Region zu sein". Auch Frankreich hat die Gründung der Föderation öffentlich gelobt und ausführlich damit geworben, dass die französische Nation den afrikanischen Nationen bei ihrem Streben nach einer besseren Zukunft helfen möchte. Einige Nachbarstaaten und Beobachter aus dem Ausland kritisierten diesen Schritt jedoch als einen verdeckten Versuch Frankreichs, seinen Einfluss in einem Gebiet geltend zu machen, das es einst zu kolonisieren versuchte. Es bleibt abzuwarten, ob dieser Schritt wirklich Frieden und Stabilität in Westafrika bringen wird."
 news.401.a: "Eine Chance auf Stabilität?"
 news.401.b: "Offensichtlicher Kolonialismus!"
 news.401.c: "Eine Zukunft für Afrika!"
 news.402.t: "Sahel-Föderation gründet sich"
 news.402.d: "Der heutige Tag ist ein weiterer historischer Moment für Afrika, denn der Staatschef von Mali, Assimi Goita, der Staatschef von Burkina Faso, Ibrahim Traore, und der Staatschef von Niger, Abdourahamane Tchiani, kamen heute in Bamako zusammen, um das Abkommen über den Zusammenschluss ihrer Länder zu einer einzigen Sahel-Föderation zu unterzeichnen.\n\nIn dem Abkommen wird formell erklärt, dass Mali, Burkina Faso und Niger zu einem einzigen Staat zusammengeschlossen werden und ihre wirtschaftlichen, militärischen, diplomatischen und sonstigen Institutionen entsprechend vereinigt werden. \n\nObwohl jedes Land innerhalb der Föderation ein gewisses Maß an Autonomie behält, wurde [MLI.GetLeader] vom neu gegründeten Parlament der Sahelzone einstimmig zum Staatsoberhaupt der neuen Nation gewählt, wie lokale Quellen angeben, nicht ohne die Zustimmung der anderen Führer.\n\nDie Zusammenarbeit der drei Länder hat bereits Früchte getragen, mit sehr großen Sprüngen in der wirtschaftlichen und kulturellen Entwicklung, und natürlich einem Sieg über die vom Westen unterstützte ECOMOG, der ohne diese Zusammenarbeit nicht möglich gewesen wäre. Die Welt beobachtet mit Interesse, wie die neue Nation ihre ersten Schritte in die Zukunft macht.Aus der westafrikanischen Sahel-Region kommen heute wichtige Nachrichten: Die Führer des Sahel-Sicherheitspakts haben die Kapitulation der letzten ECOMOG-Truppen und den vollständigen Sieg der, Zitat: "antiimperialistischen Kräfte im Kampf gegen den Neokolonialismus und seine Diener". In einer Rede und einer anschließenden Pressekonferenz versprachen die Führer des Bündnisses, dass die besiegten Länder nicht unter militärischer Besatzung bleiben würden und dass ein faires und gerechtes Bündnis mit ihren neuen Regierungen gebildet werde, die nun die Interessen sowohl ihrer Bürger als auch der gesamten Region berücksichtigen würden. \n\nDies ist ein weiterer Schlag gegen eine Weltordnung, die es so gut wie nicht mehr gibt, denn Afrika scheint sich auf dem Weg zu einem gleichberechtigten Akteur auf der Weltbühne zu konsolidieren, da die Länder ihr Interesse an einer Zusammenarbeit mit den meisten Weltmächten, außer Europa und Amerika - oder dem, was davon übrig ist - bekundet haben. \n\nDie Zeit wird zeigen, was die Zukunft für die Region bereithält, denn sie ist sowohl voller Zweifel als auch voller Hoffnung."
 news.402.a: "Ein Ende des französischen Neokolonialismus?"
 news.402.b: "Eine Zukunft für Afrika!"
 news.402.c: "Eine russische Marionette!"

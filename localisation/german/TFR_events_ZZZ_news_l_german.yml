 news.224.t: "Die Konföderation ist wiederhergestellt!"
 news.224.d: "In einer verblüffenden Wendung der Ereignisse hat sich die so genannte Liga des Südens als Sieger aus der Asche dessen erhoben, was einst die Fragmente des amerikanischen Südens waren. Diese Enthüllung hat Analysten und Experten gleichermaßen nach Antworten suchen lassen, wie dies geschehen konnte, und all ihre Vorhersagen haben sich in Luft aufgelöst. Nach ihrem überwältigenden Sieg hat sich die Liga des Südens sofort in den Konföderierten Staat Amerika umorganisiert, mit ihrem Anführer [LOS.GetLeader] an der Spitze. \n\nDer Funke, der 1860 gezündet wurde, scheint 1865 noch nicht erloschen zu sein, er schwelte lediglich unter der Oberfläche, während die von ihnen verachtete amerikanische Regierung in Stagnation und Ruin versank. In einer heute veröffentlichten Rede erklärte [LOS.GetLeader]: "Nach fast zwei Jahrhunderten der Unterdrückung durch die Yankees haben wir unsere Fesseln abgeschüttelt. Es war ein langer und harter Kampf, zu viele wurden gezwungen, ihre eigenen zu begraben, aber jedes Opfer hat zu diesem Moment geführt. Unsere Kinder werden nie wieder mit den Lügen der Yankees über unser Erbe gefüttert werden. Wir werden wieder stolz auf unsere Geschichte sein. Die Ära des von den Yankees beherrschten Amerikas ist vorbei, die Ära des Südens hat gerade erst begonnen!" Mit dieser Rede ist die Idee, die Politikwissenschaftler und Historiker gleichermaßen lächerlich fanden, in Erfüllung gegangen. Die Ära der USA ist zu Ende, und die Ära der CSA hat begonnen."
 news.224.a: "Von den Toten auferstanden, wie es scheint."

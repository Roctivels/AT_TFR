 news.112.t: "Libyscher Bürgerkrieg endet"
 news.112.d: "."
 news.112.o1: "Wir sind nicht zu stoppen!"
 news.112.o2: "Interessante Entwicklung"
 news.113.t: "Das COVID-19-Virus"
 news.113.d: "Die Weltgesundheitsorganisation (WHO) hat in Zusammenarbeit mit der Kommunistischen Partei Chinas den alarmierenden Ausbruch eines neuartigen Virus in der Stadt Wuhan genau beobachtet. Das plötzliche Auftreten des Virus hat bei Gesundheitsexperten und führenden Politikern weltweit große Besorgnis ausgelöst, vor allem angesichts der Rückkehr Tausender chinesischer Staatsbürger aus dem Urlaub, die möglicherweise die Ausbreitung des Virus auf ausländische Bevölkerungsgruppen begünstigen könnte.\n\nNachdem die Situation eskaliert ist, haben Experten festgestellt, dass das Virus offenbar tödlicher wird und eine steigende Sterblichkeitsrate aufweist, die die Gesundheitsbehörden weltweit alarmiert hat. Berichte deuten darauf hin, dass das Virus nicht nur hochgradig übertragbar ist, sondern auch Anzeichen von Mutationen aufweist, die seine Virulenz erhöhen könnten. Dieser besorgniserregende Trend hat zu verstärkten Untersuchungen und Forschungsanstrengungen geführt, die darauf abzielen, das Verhalten des Virus und seine möglichen Auswirkungen auf die globale Gesundheit zu verstehen.\n\nGestern wurden die Befürchtungen vieler bestätigt, als die WHO offiziell erklärte, dass eine Pandemie nicht mehr eine Frage des "ob", sondern des "wann" ist. Diese Erklärung stellt einen entscheidenden Wendepunkt in der globalen Reaktion auf den Ausbruch der Krankheit dar und veranlasst die Länder auf der ganzen Welt, dringend Maßnahmen zu ergreifen, um die drohende Krise einzudämmen. Die Länder zählen bereits die Zahl ihrer infizierten Bürger und die Gesundheitssysteme bereiten sich auf einen Zustrom von Patienten vor, da die Zahl der Fälle weiter steigt."
 news.113.o1: "Interessante Entwicklung"
 news.114.t: "Prinzenaufstand in Saudi-Arabien"
 news.114.d: "Die Ankündigung bewaffneter Auseinandersetzungen im Königreich Saudi-Arabien nach dem Tod von König Salman Al Saud hat die Weltgemeinschaft in Aufruhr versetzt. Das Regime, das zu den repressivsten Regimen der Welt gehört, war stets von Korruption, Instabilität und religiösen Konflikten zwischen der schiitischen Minderheit und der sunnitischen Mehrheit gekennzeichnet. Diese Brüche traten heute zutage, als die Königlich Arabische Koalition, eine Oppositionsregierung von Kronprinz Mohammed bin Salman, einen bewaffneten Aufstand gegen die saudische Zentralregierung startete. Die Arabische Republik, eine liberale Bewegung, die sich auf den Norden des Landes konzentriert, revoltiert ebenfalls und stürzt das Land in völlige Anarchie. Die Ölpreise stiegen um mehr als 250 % und stürzten die Weltwirtschaft ins Chaos, während der Aktienmarkt auf einen historischen Tiefststand sank. Die Welt hält den Atem an, während die Halbinsel in Flammen aufgeht."
 news.114.a: "Das Ende des Hauses Saud?"
 news.115.t: "US-Kongress verweigert Diplomatie"
 news.115.d: "In dem vielleicht tragischsten Ereignis des 21. Jahrhunderts haben sich die beiden Regierungen in Denver und Washington D.C. geweigert, diplomatische Gespräche aufzunehmen, um eine friedliche Lösung für die Krise zu finden, die die Vereinigten Staaten nach wochenlangen erfolglosen Verhandlungen erschüttert hat. Während sowohl Trump als auch Biden verkündeten, sie seien die rechtmäßigen Führer des Landes, kam es entlang der vorläufigen Waffenstillstandslinie an der Grenze zwischen Illinois und Indiana zu sporadischen Kämpfen zwischen Milizen. Aus den Hochhäusern Chicagos steigt Feuer auf, als Trumps Milizen einen Schuss nach dem anderen abfeuern, um die Grenzstadt einzunehmen, während Bidens Milizen auf die Stadt Danville, Illinois, vorrücken. In Denver wurde berichtet, dass nicht gekennzeichnete Lieferwagen Kriegsgegner von der Straße geholt haben, während Pro-Trump-Proteste in den Vororten von Louisville von der Bundesarmee gewaltsam aufgelöst wurden. Während die Trump-Regierung erhebliche Schwierigkeiten hat, die Ordnung in den liberalen Städten aufrechtzuerhalten, in denen es immer noch zu Unruhen kommt, reicht Bidens De-facto-Kontrolle nicht über die Autobahnen und Städte hinaus, da Untergrundmilizen bereits begonnen haben, sich zu bewaffnen und Armeekonvois aus dem Hinterhalt anzugreifen. In Haushalten überall in den Vereinigten Staaten beobachten Familien mit Entsetzen, wie das Gefüge der amerikanischen Gesellschaft auseinandergerissen wird. Da sich Bruder gegen Bruder wappnet, ist es unbestreitbar, dass der zweite amerikanische Bürgerkrieg wahrhaftig begonnen hat."
 news.115.a: "Wieder einmal Bruder gegen Bruder."
 news.116.t: "Syrischer Bürgerkrieg endet"
 news.116.d: "Der entscheidende Bürgerkonflikt des Arabischen Frühlings 2011 ist endlich zu Ende gegangen, nachdem die letzten islamistischen Kräfte im Nordwesten Syriens rund um die Stadt Idlib von der syrischen Armee in der Schlacht von Idlib vernichtend geschlagen wurden, wobei die letzten Kräfte der Freien Syrischen Armee und der Jabhat Fateh Al-Scham ihren letzten Widerstand im Rathaus von Idlib leisteten. Die Schlacht endete, als die gesamte Stadt umzingelt und das Rathaus durch Mörserbeschuss dem Erdboden gleichgemacht wurde. Während die syrische Armee mit der Befriedung der Widerstandsnester in dem nun zurückeroberten Gouvernement beginnt, verkündete Präsident Bashar Al-Assad im nationalen Fernsehen das Ende des Bürgerkriegs und den Beginn der Erholung Syriens und die Rückkehr zum Wohlstand, nachdem die vom Ausland unterstützten Rebellengruppen zerschlagen sind. Trotz seines optimistischen Ausblicks liegt die syrische Wirtschaft nach dem jahrzehntelangen Bürgerkrieg immer noch in Trümmern, und viele Probleme sind nach wie vor aktuell, insbesondere die nordöstliche Hälfte des Landes, die von den Rojava-Kräften kontrolliert wird, und islamistische Gruppen, die immer noch Guerillakämpfe im ganzen Land führen."
 news.116.a: "Frieden. Aber zu welchem Preis?"
 news.116.b: "Allah, Syrien, Baschar!"
 news.117.t: "Jemenitische Regierung bricht zusammen"
 news.117.d: "Der Oberste Politische Rat hat bestätigt, dass ihre Streitkräfte die Stadt Aden eingenommen und die Kapitulation der pro-Hadi-Regierung akzeptiert haben. In den letzten Jahren haben die Houthi-Kämpfer den saudischen Einheiten große Verluste zugefügt. Jüngsten Schätzungen zufolge sind drei ganze Brigaden in den Bergen des Jemen verloren gegangen. Da die saudischen Luftangriffe abnahmen, wurde die pro-hadische Regierung durch ständige Angriffe der Houthis unter Druck gesetzt, und Aden fiel innerhalb weniger Wochen nach erneuten Angriffen."
 news.117.a: "Wird im Jemen endlich Frieden herrschen?"
 news.118.t: "Südjemen spaltet sich ab"
 news.118.d: "In einem entscheidenden Sieg haben die dem Südlichen Übergangsrat loyalen Kräfte sowohl Sanaa als auch Mukalla erobert und damit ihre Stellung in den wichtigsten Städten des Jemen gefestigt. Die geschwächten Houthi- und Hadi-Regierungen sind Berichten zufolge geflohen, so dass der Übergangsrat des Südens nach Jahren des Bürgerkriegs endlich seine lang ersehnte Unabhängigkeit vom Norden erlangen konnte.\n\nNach den Siegen auf dem Schlachtfeld konzentriert sich die Führung des Südens nun auf den Wiederaufbau und die Staatsbildung. Der Krieg hat große Teile der einst stabilen Region verwüstet, die Infrastruktur liegt in Trümmern und die Wirtschaft ist lahmgelegt. Während der Süden seinen eigenen Weg einschlägt, steht er vor der gewaltigen Aufgabe, seine Gebiete zu stabilisieren und wiederaufzubauen. Wieder einmal ist der Jemen getrennt, dieses Mal möglicherweise für immer."
 news.118.a: "Was bedeutet das für den Jemen?"
 news.119.t: "Dschihadistischer Aufstand in Mekka"
 news.119.d: "Die heilige Stadt Mekka wurde von allen Kombattanten als entmilitarisierte Zone vereinbart. Nachdem lokale Imame die Autorität über die Stadt übernommen hatten, inszenierten radikale Dschihadisten, Salafisten und Wahabbisten einen Aufstand in der Stadt und riefen den Dschihad gegen die Halbinsel aus. Nachdem der Bürgerkrieg eine kleine Pause eingelegt hatte, strömten viele königstreue Kämpfer und Zivilisten in Scharen in die Stadt, um sich ihren Brüdern in einem neuen heiligen Krieg anzuschließen."
 news.119.a: "Der Krieg eskaliert"
 news.120.t: "Saudischer König tot"
 news.120.d: "Die Ankündigung bewaffneter Auseinandersetzungen im Königreich Saudi-Arabien nach dem Tod von König Salman Al Saud hat die Weltgemeinschaft in Aufruhr versetzt. Das Regime, das zu den repressivsten Regimen der Welt gehört, war stets von Korruption, Instabilität und religiösen Konflikten zwischen der schiitischen Minderheit und der sunnitischen Mehrheit gekennzeichnet. Diese Brüche traten heute zutage, als die Königlich Arabische Koalition, eine Oppositionsregierung von Kronprinz Mohammed bin Salman, einen bewaffneten Aufstand gegen die saudische Zentralregierung startete. Die Arabische Republik, eine liberale Bewegung, die sich auf den Norden des Landes konzentriert, revoltiert ebenfalls und stürzt das Land in völlige Anarchie. Die Ölpreise stiegen um mehr als 250 % und stürzten die Weltwirtschaft ins Chaos, während der Aktienmarkt auf einen historischen Tiefststand sank. Die Welt hält den Atem an, während die Halbinsel in Flammen aufgeht."
 news.120.a: "Unser Beileid an die Saudis"
 news.121.t: "Ölpreise schießen in die Höhe"
 news.121.d: "Der Dow Jones Industrial Average erlitt seinen bisher stärksten Einbruch an einem einzigen Tag und brach alle Rekorde, die Anfang des Monats aufgestellt worden waren, da die Instabilität der saudischen Regierung Investoren verunsicherte, die bereits wegen der Coronavirus-Epidemie in Panik geraten waren. Angesichts zunehmender Ängste vor einer globalen Rezession näherte sich der Blue-Chip-Index der Baisse und fiel um rekordverdächtige 2.013,76 Punkte bzw. 7,8 Prozent auf einen Schlussstand von 23.851,02 Punkten. Der Nasdaq-Index fiel um 7,3 Prozent auf 7.950,68 Punkte. Der S&P 500 Index verlor 7,6 Prozent und schloss bei 2.746,56 Punkten, dem schlechtesten Tag seit Dezember 2008.\n\nNachdem der Kurs in den ersten Minuten der Börsensitzung um 7 Prozent gefallen war, löste er eine Unterbrechung der New Yorker Börse aus, die den Handel für 15 Minuten unterbrochen hatte. Am Montag trat die Handelsbeschränkung zum ersten Mal in Kraft, seitdem die aktuellen Schwellenwerte 2013 eingeführt wurden, um eine Wiederholung des "Schwarzen Montags" von 1987 zu vermeiden. Der Ölpreis schoss auf 117,14 US-Dollar pro Barrel, als Produktionsstörungen in Saudi-Arabien die Produktion zum Erliegen brachten. Da die saudi-arabischen Ölfelder zum Stillstand kommen und andere Länder angesichts von Stilllegungen und Arbeitskräftemangel um die Aufrechterhaltung der Produktion kämpfen, scheint eine Rezession so gut wie sicher zu sein."
 news.121.a: "Oje"
 news.121.b: "Ja du kannst mich auch mal." 
 news.122.t: "Kim Jong-Un tot"
 news.122.d: "Nordkoreas geliebter Führer ist heute Morgen nach Komplikationen während einer Operation verstorben. Während die Nation gemeinsam um ihren heiligen Sohn trauert, ist im inneren Kreis des Eremitenreichs Unruhe entstanden. Kim Yo-jong, intelligent, ehrgeizig und eine Juche-Hardlinerin, hat den vorhersehbaren Schritt unternommen, um das Machtvakuum zu sichern, das durch das vorzeitige Ableben ihres Bruders entstanden ist. Die nordkoreanische Propagandamaschinerie hat bereits damit begonnen, sie als neue Verkörperung der koreanischen Rasse in das Bild des Volkes einzubetten, doch im Verborgenen planen intrigante Verschwörer und machthungrige Höflinge, den "roten Thron" zu erobern. Zu den mutmaßlichen Usurpatoren gehören der starke Militär Pak Jong-chon, Generalstabschef der KPA, der sich mit der eisernen Faust des nordkoreanischen Militärs an die Macht putschen könnte, und der reformorientierte Schwiegervater von Kim Yo-jon, Choe Ryon-hae, Erster Stellvertretender Vorsitzender der Arbeiterpartei Koreas, dessen immenses politisches Kapital ausreichen könnte, um sich eine ausreichend starke Machtbasis zu schaffen und sich als neuer Vorsitzender der DVRK zu etablieren. Während diese politischen Elemente aufeinanderprallen, steht das Schicksal des schwer greifbaren nordkoreanischen Staates auf dem Spiel."
 news.122.a: "Wie werden die Nordkoreaner damit umgehen?"
 news.122.b: "Auf Wiedersehen, lieber Führer."
 news.123.t: "Nordkoreanischer Bürgerkrieg"
 news.123.d: ""
 news.123.a: "Wird dies zu weiterer Destabilisierung führen?"
 news.124.t: "Riad gewinnt den Saudischen Bürgerkrieg"
 news.124.d: "Nach Jahren blutiger Auseinandersetzungen und unerbittlicher Kriege in den sanften Wüstenhügeln und geschäftigen Städten Saudi-Arabiens, in denen zahllose Bomben und Artilleriegeschosse das Land verwüstet haben, hat Kronprinz Mohammed bin Salman das zerrissene Königreich wiedervereint.\nDiese lang erwartete Lösung bringt einem Großteil der Welt Erleichterung, da das Schreckgespenst eines nicht enden wollenden Bürgerkriegs in Arabien endlich verschwunden ist. Nachdem der Frieden in dem einst wichtigsten Schlachtfeld der Welt wiederhergestellt ist, kann sich die Aufmerksamkeit nun der monumentalen Aufgabe des Wiederaufbaus der vom Krieg zerrütteten Nation zuwenden.\n\nDie Versöhnung mit den Regionen, die sich dem Salman-Regime widersetzt haben, bleibt eine große Herausforderung. Auf lokaler Ebene werden jedoch, wenn auch langsam und mühsam, immer mehr Fortschritte erzielt. Und trotz der globalen Spannungen in der Welt, in der überall Kriege herrschen, haben die Vereinten Nationen in einem Zeichen der Einigkeit einstimmig eine Resolution verabschiedet, um noch mehr Wiederaufbaubemühungen zu unterstützen, was zu der sich bereits verbessernden Situation beiträgt.\n\nZum ersten Mal seit Jahren kann die Welt ihren beunruhigten Blick von der arabischen Halbinsel abwenden, da ein Anschein von Normalität zurückzukehren beginnt.\n\n"
 news.124.a: "Das Öl fließt wieder."
 news.124.b: "Wir sind nicht zu stoppen!"
 news.125.t: "Monarchen-Koalition siegreich"
 news.125.d: "Das Feuer ist auf der Arabischen Halbinsel entfacht, der saudische Bürgerkrieg ist zu Ende, und es scheint, als hätten die Al-Sauds, die Königliche Koalition und ihre Verbündeten gesiegt. Der Krieg hat die Weltwirtschaft erschüttert, und sein Echo hat die ganze Welt in Aufruhr versetzt, aber bis jetzt hat sich in der Region nichts geändert, außer dass sich der Staub auf eine neue Reihe von Gräbern gelegt hat.\n\nAllahu Akbar, Allahu Akbar, Allahu Akbar, ‚"Gott ist groß" verkündeten die Moscheen auf der ganzen Halbinsel, zumindest diejenigen, die von Kugeln und Bomben verschont geblieben waren. Einige gingen auf die Straße, um die Sieger zu begrüßen, andere fügten sich, wieder andere betrachteten die Paraden in Riad mit einem gebrochenen Auge.\n\nAber dem Sieger gehört die Beute, und der König von Saudi-Arabien verkündete seinen Sieg als von Gott selbst für den alleinigen Hüter von Mekka bestimmt und vielleicht als Hegemon einer neuen arabischen Welt.\n\nFreude und Trauer teilen sich nun die gleichen Straßen. Im Schatten von Fahnen und Feiern wird den Menschen in Saudi-Arabien gesagt, dass sie ein neues Kapitel aufschlagen können, obwohl sich einige daran erinnern, wie das alte aussah..."
 news.125.a: "Gut für sie"
 news.125.b: "Wir hielten es für richtig"
 news.126.t: "Freie Wahlen in Saudi-Arabien durchgeführt"
 news.126.d: "Zum ersten Mal in ihrer modernen Geschichte hat die Arabische Republik, das ehemalige Saudi-Arabien, international überwachte Mehrparteienwahlen abgehalten. Nach dem Sieg der Republikanischen Koalition im Bürgerkrieg ebnete eine Übergangscharta den Weg für offene Abstimmungen in den großen Städten und Regionen, die sich noch im Wiederaufbau befinden. Die Partei der Nationalversammlung, eine national-liberale Bewegung unter der Führung des langjährigen Aktivisten Yahya Assiri, wurde zur stärksten Kraft in der neuen Legislative. Obwohl keine Partei eine absolute Mehrheit erlangte, deuten erste Signale auf eine reformorientierte Koalition hin, die sich auf eine zivile Regierungsführung, den wirtschaftlichen Wiederaufbau und eine schrittweise politische Liberalisierung konzentriert.\n\nDie Wahlbeteiligung war in den städtischen Gebieten und den Küstenregionen am höchsten, während sie in den ländlichen Provinzen geringer war. Unabhängige Beobachter berichteten von einem friedlichen Prozess mit nur geringfügigen Unregelmäßigkeiten.\nAusländische Regierungen haben das Ergebnis vorsichtig begrüßt und es als einen Schritt in Richtung langfristiger Stabilität bezeichnet."
 news.126.a: "Gut für sie"
 news.126.b: "Auf ewige Gleichheit!"
 news.127.t: "Saudi-Arabien unter dem Dschihad vereint"
 news.127.d: "Als Saudi-Arabien in Stücke zerbrach, gingen die meisten davon aus, dass am Ende die Prinzen der Königlich Arabischen Koalition, die Regierung des Königreichs Saudi-Arabien oder vielleicht sogar die Reformisten der Arabischen Republik als Sieger aus dem Bürgerkrieg hervorgehen würden. \nAber selbst mit den vielen Koalitionen ausländischer Nationen, die ihre politische und militärische Unterstützung gewähren, den Milliardenbeträgen, die an Söldnerarmeen gezahlt werden, um strategische Stellungen zu sichern, und den großen Waffenarsenalen, die einst das Rückgrat des saudischen Militärs bildeten, hat sich gezeigt, dass schierer Wille und das Feuer des Hasses trotz aller Widrigkeiten alles überwinden können. \n\nZum Entsetzen vieler wurde bestätigt, dass die islamischen Dschihadisten von Dschaisch Alfath einen entscheidenden und brutalen Sieg über alle verbleibenden Fraktionen innerhalb des Konflikts errungen und ihre Vorherrschaft und ihren Sieg in dem langwierigen Bürgerkrieg erklärt haben.\n\nNun sieht sich die Welt mit der noch nie dagewesenen Realität konfrontiert, dass zwei Regime offen terroristischen Organisationen Unterschlupf gewähren, von denen keines vollständig mit dem anderen verbündet ist, aber beide zu einer gefährlichen Eskalation der globalen Instabilität beitragen. Die Folgen sind verheerend, und viele Länder bereiten sich auf eine starke Zunahme von Terroranschlägen vor, während sie die Grenzen schließen, die Sicherheitsmaßnahmen verschärfen und die Streitkräfte in höchste Alarmbereitschaft versetzen.\n\nWährend sich der Staub legt und sich die vollen Auswirkungen dieses Ergebnisses zu entfalten beginnen, wird der Rest des Nahen Ostens von Angst und Ungewissheit ergriffen und versucht, die verbleibende fragile Stabilität zu sichern."
 news.127.a: "Im Nahen Osten zeigt sich wieder einmal ein düsteres Gesicht..."
 news.127.b: "Allahu Akbar!"
 news.128.t: "Iranisch unterstützte Milizen siegreich im Saudischen Bürgerkrieg"
 news.128.d: "Nach einer langen Zeit, vielen langwierigen Feldzügen, zerstörerischen Belagerungen, Hungersnöten und anderen Schrecken des modernen Krieges ist der saudische Bürgerkrieg heute zu Ende. Der letzte Anwärter auf die ehemalige ölreiche Nation ist als Hisbollah Al- Hedschas bekannt, angeführt von Ahmed Ibrahim Al-Mughassil. \n\nDie Gruppierung, einst ein loser Zusammenschluss von schiitischen Milizen und abtrünnigen Armeeeinheiten, wurde schnell durch eine Flut von Material und Freiwilligen gestärkt, nachdem sie die Nachschubwege zwischen dem Iran und seinen verschiedenen verbündeten Gruppen gesichert hatte, seien es die Schiiten im Südirak, der Großteil der Hisbollah-Kräfte oder die Einheiten des Iranischen Revolutionsgardekommandos, sie alle wurden bald zu Sprungbrettern für die Vorherrschaft der Gruppierung in der Region. \n\nJetzt, da sie die Kontrolle haben und von Riad aus regieren, gehen viele internationale Beobachter und Denkfabriken ganz offensichtlich davon aus, dass die Fraktion viel Wiederaufbauhilfe aus dem Iran erhalten wird, und dass der gesamte Nahe Osten einen Anstieg der subversiven Bemühungen Teherans erleben wird, da sein Hauptfeind und Rivale jetzt sein größter Verbündeter in der Region ist. Einiges davon ist bereits zu beobachten, wie eine geplante diplomatische Mission zwischen Teheran und Riad zeigt."
 news.128.a: "Solange das Leiden vorbei ist..."
 news.128.b: "Allahu Akbar!"
 news.129.t: "Wladimir Putin tot"
 news.129.d: "Nachdem er seit der Diagnose des Covid-19-Virus aus dem Rampenlicht verschwunden war, hatten die russischen Staatsnachrichten den Eindruck erweckt, Putin sei in bester Verfassung und auf dem Weg der Besserung. Heute Morgen wurden diese Hoffnungen jedoch enttäuscht: Der Kreml gab bekannt, dass Putin, der Architekt des modernen Russlands, der Krankheit erlegen ist und um 4:36 Uhr morgens Moskauer Zeit verstarb. \n\nDie Nachricht verbreitete sich wie ein Lauffeuer, und Russen in der ganzen Föderation bekundeten ihr Beileid für den verstorbenen Staatschef, der im Westen zwar für vieles gehalten wurde, in Russland jedoch eine fast gottähnliche Stellung einnahm. Es wurde eine staatlich sanktionierte nationale Trauerwoche angekündigt, und Medwedew erklärte, der Tod seines Mentors und langjährigen Freundes habe "mir wie ein Dolch ins Herz gestochen, wie es jeder Russe mit einer Seele empfinden würde." \n\nWährend viele in der Föderation trauern, herrscht auch Unsicherheit. Obwohl Medwedew die Nachfolge Putins antreten wird, bleibt abzuwarten, ob Vereinigtes Russland mit seiner Geschichte an Wahlmanipulationen zu seinen Gunsten die herrschende Partei bleiben kann, die sie ohne ihren geschätzten Paten an der Spitze ist, wobei viele vermuten, dass sie bei den nächsten Präsidentschaftswahlen verlieren wird."
 news.129.a: "Interessante Entwicklung."
 news.129.b: "Ruhe in Frieden, Genosse."
 news.130.t: "Ausrufung des eurasischen Staates"
 news.130.d: "Nachdem er die Kontrolle und die Ordnung in ganz Russland wiederhergestellt hatte, hielt Alexander Dugin eine Rede, in der er den eurasischen Staat ausrief, dessen Grenzen er bald erweitern möchte. Die Demonstranten kamen unvermeidlich zu der Rede, und die Anhänger der Eurasischen Partei lieferten sich eine Schlägerei, an der sich auch die Polizei beteiligte. Es wurden 30 Tote und Hunderte von Verletzten gemeldet."
 news.130.a: "Ein blutiger Start."
 news.130.b: "Ein neuer Nationalfeiertag!"
 news.131.t: "Friedensabkommen zwischen den Vereinigten Staaten und den Taliban"
 news.131.d: "Nach 18 langen Monaten unterzeichneten der US-Sonderbeauftragte Zalmay Khalilzad und der Anführer der militanten islamistischen Gruppe, Mullah Abdul Ghani Baradar, am Samstag in Doha, Katar, das historische Abkommen, dessen Einzelheiten beide Seiten monatelang ausgehandelt hatten.\nGemäß den vereinbarten Bedingungen haben sich die USA verpflichtet, ihre gesamten Streitkräfte und das unterstützende Zivilpersonal sowie das ihrer Verbündeten innerhalb von sieben Monaten abzuziehen... Der Abzugsprozess wird damit beginnen, dass die USA ihre Truppen in den ersten 100 Tagen auf 5.000 Mann reduzieren und ihre Truppen aus fünf Stützpunkten abziehen. Die afghanische Regierung wird außerdem als Geste des guten Willens bis zu 5.000 Taliban-Gefangene freilassen und im Gegenzug 1.000 von den Taliban festgehaltene afghanische Sicherheitskräfte aufnehmen. Die Taliban haben zugestimmt, ihre Unterstützung für Gruppen wie Al-Qaida und den Islamischen Staat einzustellen. Viele bezweifeln jedoch, dass die Taliban ihren Teil der Abmachung einhalten können, da es historische Verbindungen zwischen den Gruppen gibt.\nMehr als 2.400 Amerikaner sind während der fast 18 Jahre andauernden Kämpfe in Afghanistan ums Leben gekommen, was das US-Finanzministerium schätzungsweise fast eine Billion Dollar gekostet hat. In den letzten Jahren haben die Taliban trotz der Aufstockung der Truppenstärke die US-amerikanischen und afghanischen Streitkräfte bis zu einem Zustand bekämpft, der von Analysten als strategisches Patt bezeichnet wird.\n\nDie afghanische Regierung wird auch Verhandlungen mit den Taliban aufnehmen, um eine politische Lösung zu finden, die festlegt, welche Rolle die Taliban in einem zukünftigen Afghanistan spielen sollen. Diese Verhandlungen werden voraussichtlich im nächsten Monat beginnen. Eine der ersten Aufgaben bei diesen innerafghanischen Gesprächen wird darin bestehen, einen dauerhaften Waffenstillstand in Afghanistan zu erreichen."
 news.131.a: "Gut für sie"
 news.131.b: "Endlich Frieden"
 news.131.c: "Sie sollten aus unserem Fehler gelernt haben..."
 news.132.t: "New Yorker Polizei gewinnt die Kontrolle über New York City zurück"
 news.132.d: "Das New Yorker Police Department hat bestätigt, dass es die volle Kontrolle über die Stadt New York wiedererlangt hat. Die Stadtregierung, die unter der Verwaltung der Kommunistischen Partei der USA stand, wurde praktisch über Nacht gestürzt. Dutzende von kommunistischen Parteimitgliedern wurden über einen Zeitraum von drei Wochen tot in ihren Häusern aufgefunden, was zu einem Zusammenbruch der effektiven Kommunikation mit der allgemeinen Partei- und Miliztruppe führte. Die Polizei hat schnell die Stadt gestürmt und begonnen, Tausende von kommunistischen Milizionären zu verhaften und wichtige Gebäude in der Stadt zu besetzen. Schnell verbreiteten sich Gerüchte über die Beteiligung lokaler Mafia-Familien in New York City, kommunistische Parteiführer wurden quer durch die Stadt in unbekannte Gebiete gebracht und der Aufenthaltsort von Joe Sims, jetzt ehemaliger Generalsekretär der Kommunistischen Partei der USA, ist unbekannt. Er wird zusammen mit allen hochrangigen Mitgliedern der Partei für tot gehalten."
 news.132.a: "Schätze, sie waren schlecht fürs Geschäft..."
 news.132.b: "Ein Rückschlag für die Revolution."
 news.133.t: "Donald Trump siegt im amerikanischen Bürgerkrieg"
 news.133.d: "Heute verkündete Donald Trump im Rosengarten des Weißen Hauses die Kapitulation der verbliebenen Opposition gegen seine Präsidentschaft. Nachdem er nach dieser Ankündigung als Präsident vereidigt worden war, trug die Antrittsrede von Präsident Trump wenig zur Beruhigung der Spannungen bei, die noch immer die amerikanische Psyche befallen. Umgeben von seinen engsten Beratern und dem militärischen Oberkommando verkündete der Präsident Amerika und der Welt: "Heute hat die Demokratie nach einem langen und grausamen Kampf wieder einmal gesiegt. Die hirnlosen Schläger der Antifa und verschiedene andere linksradikale Gruppierungen hatten versucht, diese Wahl zu stehlen. Das ist ihnen aber glücklicherweise nicht gelungen. Ich danke den mutigen Gouverneuren der Bundesstaaten, dass sie die Verfassung aufrechterhalten haben, und ich danke allen amerikanischen Bürgern, dass sie sich gegen diese Bedrohung bewaffnet und die Demokratie verteidigt haben. Meine rechtmäßige Regierung hat nun mit der Arbeit begonnen, um sicherzustellen, dass Amerika nie wieder geteilt sein wird. Gott segne Amerika."\n\n Während sich Präsident Trump nun auf den Wiederaufbau seines zerrütteten Landes konzentriert, blickt die internationale Gemeinschaft auf ein geschwächtes Amerika und sieht, dass die Vereinigten Staaten zum ersten Mal seit fast einem Jahrhundert nicht mehr die globale Hegemonie auf der Weltbühne sind, was viele dazu veranlasst, sich zu fragen, wer ihr Nachfolger sein wird."
 news.133.a: "Ein Ende des Wahnsinns."
 news.133.b: "Nie wieder werden sie Amerika Schaden zufügen"
 news.134.t: "Die Union Amerikas siegt im amerikanischen Bürgerkrieg"
 news.134.d: "Als sich die Menschen in Washington DC versammelten, um der Amtseinführung von Joseph Biden als sechsundvierzigster Präsident der Vereinigten Staaten beizuwohnen, erinnerten sich die Anwesenden an die letzten Jahre der Hölle, die die Nation durchgemacht hatte. Donald Trumps Regierung hatte in den Augen vieler die USA gespalten, und das Ganze gipfelte in einem zweiten amerikanischen Bürgerkrieg. Doch als Joseph Biden vereidigt wurde, konnten viele für einen kurzen Moment den Kampf vergessen, den Amerika durchgemacht hatte, und in die Zukunft auf ein wieder aufgebautes Amerika blicken. Präsident Biden wandte sich an die Menge und begann seine erste offizielle Ansprache an die Nation. "Heute haben wir die Hoffnung über die Angst und die Wahrheit über die Lüge gestellt. Die Spaltung Amerikas begann mit der Wahl von Donald Trump und setzte sich bis weit in seine Präsidentschaft hinein fort. Aber jetzt, wo er weg ist und die Nation wieder ganz ist, können wir uns auf eine bessere Zukunft freuen, in der die Liebe über den Hass triumphiert. Heute verurteile ich die Ideale sowohl der radikalen Rechten als auch der radikalen Linken. Ihre Ideologien haben eine schlechte Situation nur verschlimmert und den Tod von Tausenden weiteren Menschen verursacht. Mit mir als Präsident wird es kein geteiltes Amerika geben, es wird keine roten und blauen Staaten geben, sondern nur die Vereinigten Staaten von Amerika. Gott segne Sie alle, Gott segne Amerika.""
 news.134.a: "Ein neues Gesicht betritt das Weiße Haus."
 news.134.b: "Wir werden den Glauben bewahren und gemeinsam voranschreiten."
 news.135.t: "Gloria la Riva siegt im amerikanischen Bürgerkrieg"
 news.135.d: "Während die ehemalige Hauptstadt der Vereinigten Staaten in den letzten Tagen des Bürgerkriegs weiter brannte, stürmten Gloria La Riva und ihre "Kameraden" auf das Weiße Haus zu, das sie zerstört vorfanden, wobei die amerikanische Flagge, die das Gebäude kennzeichnete, bis auf die Grundmauern verbrannte. Als sich ihre Rote Garde vor dem zerstörten Weißen Haus zu versammeln begann, hielt die neue Premierministerin von Amerika ihre erste Ansprache an ihre treuen Anhänger. "Genossen, der heutige Tag markiert das Ende der proletarischen Revolution in Amerika! Die dekadenten faschistischen und kapitalistischen Kräfte von Donald Trump und Joseph Biden sind vernichtet und ihr Erbe ist angeschlagen. Ich danke unseren Genossinnen und Genossen in ganz Amerika für ihre Unterstützung im Kampf gegen den Faschismus, wo immer er auftauchte. Doch jetzt ist es an der Zeit für Einigkeit, jetzt ist es an der Zeit, die Übel von Donald Trump und des Kapitalismus zu überwinden, jetzt ist es an der Zeit, unsere zerrissene Nation zu reparieren und ein Amerika aufzubauen, das für alle funktioniert." Mit dem Sieg des Premiers in diesem Krieg wird Amerika nun damit beginnen, seine verschiedenen demokratischen Institutionen umzustrukturieren und sie durch ein neues sozialistisches Amerika zu ersetzen, das darauf abzielen wird, die verschiedenen Ungerechtigkeiten zu bekämpfen, die Amerika seit seiner Gründung vor drei Jahrhunderten geplagt haben. Angesichts der totalen Kontrolle von La Riva über Amerika fragen sich jedoch viele, ob dies der Beginn eines egalitären Amerikas oder der Beginn des Abstiegs in den Totalitarismus ist."
 news.135.a: "Ein beunruhigendes Resultat für Amerika."
 news.135.b: "Solidarität für immer!"

 news.164.d: "Die letzten gegnerischen Regierungen in den ehemaligen Vereinigten Staaten kapitulierten gestern Abend offiziell vor Burt Colucci und seiner Armee von Nationalsozialisten und markierten damit das Ende eines brutalen Bürgerkriegs, der Dutzende Millionen Tote und noch mehr Vertriebene gefordert hatte. Mehrere Widerstandsführer wurden von der neuen Regierung nach einem kurzen Prozess hingerichtet, ihre Leichen wurden vor der neuen Hauptstadt der Republik aufgehängt. Von seinem Hauptquartier in Washington aus proklamierte Colucci eine "Neue Arisch-Amerikanische Nation, durch das arische Volk, für das arische Volk" und forderte die sofortige Vertreibung aller nicht-weißen Menschen aus der Nation.\n\nAusgehend von einer kleinen Gruppe von Rebellen in Süd-Michigan knüpfte Colucci Verbindungen zu verschiedenen anderen Neonazi-Gruppen und weißen Nationalisten und wurde so zum unangefochtenen Herrscher der Nationalen Front, bevor er die [NSM.GetName] ausrief. Die Kämpfe im ganzen Land sind nach wie vor heftig und werden wahrscheinlich noch eine ganze Weile andauern, aber das Ende der offiziellen Opposition markiert einen Wendepunkt in der Konsolidierung der Macht des Colucci-Regimes über die ehemaligen Vereinigten Staaten. Die Reaktionen auf die Nachricht waren überwiegend negativ, und es ist unwahrscheinlich, dass die neue Republik aufgrund ihrer Ideologie und ihres Misstrauens gegenüber der internationalen Zusammenarbeit auf der Weltbühne Anerkennung findet.\n\nWas auch immer als Nächstes geschieht, die Botschaft ist klar: Der Nationalsozialismus in all seiner Brutalität ist endlich in den Vereinigten Staaten angekommen."
 news.164.a: "Die Flamme der Freiheit ist für immer erloschen."
 news.159.d: "Jahrzehntelang führte Mexiko einen brutalen Quasi-Guerillakrieg gegen Kartelle - kriminelle Organisationen, die für den Schmuggel von Tausenden von Tonnen illegaler Drogen aus dem üppigen südamerikanischen Dschungel in den Norden und über die Grenze zu den Vereinigten Staaten hinweg verantwortlich sind und den Schwarzmarkt mit der höchsten Nachfrage nach Drogen in der Welt beliefern. Kartelle wie die Los Zetas und die Sinaloa beherrschen das Leben der Menschen in den Regionen, in die ihr Gebiet fällt, was zu massiver Korruption, Einschüchterung und allgemeiner Gewalt führt. Als in den Vereinigten Staaten ein zweiter Bürgerkrieg ausbrach, wurde alles, was einem Status quo in Mexiko ähnelte, zerstört, da Millionen von Flüchtlingen aus dem Norden nach Mexiko strömten, die lokalen Regierungen überforderten und Chaos und Panik unkontrolliert ausbreiteten. Trotz der Bemühungen der mexikanischen Regierung, die Ordnung wiederherzustellen, indem sie das Kriegsrecht verhängte und versuchte, Unterkünfte einzurichten, wurden die Flüchtlinge zu viel, und ein Staat nach dem anderen rief den Zustand der Anarchie aus, während die mexikanische Armee überfordert war und die Kartelle begannen, Mexiko durch die gewaltsame Übernahme der lokalen Regierungen zu übernehmen, was zu einem weiteren Bürgerkrieg in Mexiko führte. Während die Reste der Regierung Mexiko-Stadt halten, sind außerhalb des Tals nur noch zahlreiche Kartell-Warlords und Guerillabewegungen am Werk."

 news.536.t: "Shinzo Abe ist tot"
 news.536.d: "Der ehemalige japanische Premierminister Shinzo Abe ist auf tragische Weise bei einem Attentat ums Leben gekommen. Abe hielt gerade eine Rede zur Unterstützung der Liberaldemokratischen Partei in Nara, als ein Unbekannter auf ihn schoss. Wie die NHK berichtete, wurde der ehemalige Premierminister zweimal verletzt. Er wurde dringend in ein Krankenhaus in der Stadt Kashihara in der Präfektur Nara eingeliefert, doch der Politiker starb.\n\nNach dem Angriff nahm der Sicherheitsdienst einen Mann fest, einen 41-jährigen Einwohner von Nara. Nach Angaben von Nihon TV und NHK diente Tetsuya Yamagami in den frühen 2000er Jahren in den japanischen Maritimen Selbstverteidigungskräften. Nach Angaben des Verhafteten wollte er Abe töten, weil er mit dem Politiker unzufrieden war. Gleichzeitig zitierte die Polizei nach Angaben der Kyodo später den Verhafteten: \n\n\""Die Ermordung des ehemaligen Premierministers war ein großer Schock für die japanische Gesellschaft, und die Folgen dieses Ereignisses sind nach wie vor unklar.\""
 news.536.a: "Gute Nacht, süßer Prinz..."
 news.537.t: "Europäische Union überschreitet den Rubikon"
 news.537.d: "Der fragile Frieden, der auf den Sieg Russlands über die NATO folgte, ist erneut zerbrochen. EU-Truppen haben zusammen mit ihren Verbündeten aus der Kommissionsregierung die Grenze gestürmt und sind nach Polen eingefallen. \n\nDiese Aktion war das vorhersehbare Ergebnis der monatelangen aggressiven Realpolitik der neu föderalisierten EU. Als sich die Streitkräfte über Westeuropa ausbreiteten, behaupteten sie, es sei notwendig, "Extremisten zu befrieden" und "die Demokratie auf einem zerrütteten Kontinent wiederherzustellen". Jetzt marschieren sie auf Moskau zu, und die Botschaft ist klar. Ihre Absicht, wie in einer Erklärung nach den ersten Gefechten dargelegt, ist es, "Europa von der Unterdrückung durch den Kreml zu befreien".\n\nIm gesamten Osten kam es zu Massenmobilisierungen, da die gesamte Macht der OVKS erneut aktiviert wurde. Es wird erwartet, dass Russland mit unvergleichlicher Wut um die Verteidigung seines Landes kämpfen wird, da die EU nicht nur einen Feind darstellt, sondern eine Ideologie, die sie vollständig zerstören wollen. Ein Sprecher des Kremls erklärte, dass sie "die Offensive der Globalisten zerschlagen und den Westen von ihrem korrupten Einfluss befreien" werden. \n\nWährend Europa erneut in Krieg und Blutvergießen versinkt, ist eines allen klar: Dies wird wahrhaftig der Krieg sein, der alle Kriege beendet, und der Sieger wird freie Hand haben, Europa nach seinen Vorstellungen zu gestalten."
 news.537.a: "Zwei Ideologien prallen erneut aufeinander."
 news.538.t: "Zusammenstöße zwischen Eurointern und der Heiligen Union in Polen"
 news.538.d: "Paris, Europäischer Arbeiterradiosender (EWRS)\n\nAn der Ostfront sind Feindseligkeiten ausgebrochen, nachdem die Truppen der Eurointern heute Morgen im Morgengrauen einen Überraschungsangriff auf Stellungen der Heiligen Union gestartet haben. Entlang der Weichsel wurde massiver Artilleriefeuer eröffnet, gefolgt von Panzerverbänden und mechanisierter Infanterie, die in die polnischen und slowakischen Grenzregionen vordrangen. \n\nEs wurde von Luftangriffen auf wichtige militärische Einrichtungen der Heiligen Union in der Nähe von Lublin, Brest und Hrodna berichtet. Die Nachrichten von der Front sind sporadisch, aber erste Aufnahmen bestätigen, dass in den Straßen von Olstzyn und Bratislava heftige Kämpfe stattfinden. Die lokalen Behörden haben Massenevakuierungen angeordnet, während Militär und Milizen versuchen, den Vormarsch aufzuhalten. \n\nDas Oberkommando der Heiligen Union in Minsk hat den Zustand der totalen Mobilmachung ausgerufen und Vergeltung für das angekündigt, was es als "entartete atheistische Offensive gegen die christliche europäische Zivilisation" bezeichnet. Russische Staatsmedien zeigen Aufnahmen von Fackelzügen und Priestern, die Wehrpflichtige segnen, während Züge nach Osten rollen. \n\nIn Paris und Berlin bezeichneten Vertreter der Eurointern den Krieg als "endgültige Konfrontation mit dem klerikalen Faschismus". In einer Erklärung eines deutschen Vertreters heißt es: "Die alten Regime leben auf geborgte Zeit, dies ist die Stunde der Abrechnung.""
 news.538.a: "Im Osten bricht erneut Krieg aus."
 news.539.t: "Die Volksdämmerung"
 news.539.d: "Die Rote Fahne weht nun über den Ruinen Moskaus, den Trümmern Warschaus und den zerbrochenen Reihen der einst mächtigen Heiligen Union. Nach Jahren erbitterter Kämpfe, Städten voller Rauch und blutgetränkten Feldern hat die Internationale der Arbeiter gesiegt. Die letzten Überreste der russischen Theokraten und ihrer Kollaborateure haben sich entweder ergeben oder wurden in die Taiga getrieben, um dort vergessen zu sterben. \n\nJahre des totalen Krieges haben das alte Europa bis auf die Grundmauern zerstört. Die Zahl der Todesopfer ist fast unvorstellbar, ganze Nationen wurden in Schutt und Asche gelegt, und es entstanden Narben, die vielleicht nie ganz verheilen werden. Für die Führer der Eurointern war dies jedoch nicht nur ein Kreuzzug gegen die Tyrannei, sondern ein Krieg der Wiedergeburt. Die alten Tyranneien von Klerus, Kapital und Kasten sind zusammengebrochen. Aus ihren Trümmern entsteht eine neue Föderation von Völkern und Räten, die nicht durch Grenzen, sondern durch gemeinsamen Kampf verbunden ist. \n\nDoch kaum hat sich der Rauch verzogen, beginnen schon neue Debatten: föderale Einheit oder nationale Autonomie? Internationale Solidarität oder interner Wiederaufbau? Die fragile Einheit, die den Krieg überstanden hat, steht nun vor ihrer größten Prüfung: dem Frieden. \n\nAber was auch immer als Nächstes kommt, niemand kann es jetzt leugnen: Die rote Fahne weht über dem Osten, und die Landkarte Europas wird nie mehr dieselbe sein."
 news.539.a: "Ein neues Europa ist geboren. Solidarität für immer!"
 news.540.t: "Der Triumph des Stahlpakts"
 news.540.d: "Die letzten verbliebenen Hochburgen der sowjetischen und osteuropäischen Streitkräfte haben sich den Armeen des Stahlpakts ergeben, der wie ein Stahlhammer die Verteidigungslinien der MTO durchbrochen und ihre verbliebenen Armeen um das nun zusammengebrochene Russland herumzingelt hat, wodurch sie als endgültige Sieger dieses jahrelangen Konflikts hervorgegangen sind. \n\nEin Konflikt, der Millionen von Soldaten und unschuldigen Zivilisten das Leben gekostet hat, die in das Kreuzfeuer eines revanchistischen Deutschlands geraten sind, das durch seine Vergangenheit ermutigt wurde. Es wird Jahre dauern, bis Osteuropa wieder zu einem Gefühl der Normalität zurückfindet, aber für die Sieger des Konflikts hat dies keine Priorität. Sie ziehen es vor, die osteuropäischen Staatskassen für großartige Militärparaden und ein System der fortwährenden Ausbeutung der osteuropäischen Völker zu verwenden. \n\nDoch vorerst herrscht wieder Frieden in Europa. Allerdings ist es ein sehr angespannter Frieden, da der radikale Nationalismus aller Parteien innerhalb des Paktes eine aktive Herausforderung für das Streben nach dauerhaftem Frieden darstellt. Doch Frieden ist kein Wort, das die westeuropäischen Autoritäten zu respektieren pflegen, da sie sich weigern, ihre Armeen zu demobilisieren."
 news.540.a: "Ein Europa der Stärke."
 news.541.t: "Triumph der Union"
 news.541.d: "Mit dem Ende der Kämpfe und dem Verstummen der Waffen ist Europas tödlichster Krieg endlich zu Ende gegangen. Viele internationale Beobachter sind völlig schockiert. Die Flagge der Europäischen Union weht nun hoch über Moskau. 0n\nAus dem Chaos des russischen Sieges in Europa heraus entstanden, stand die neu föderalisierte EU vor einer schwierigen Aufgabe, um den Westen zu stabilisieren. Durch aggressive Neuausrichtung und Realpolitik beruhigte die Union das Chaos in Frankreich und Spanien und integrierte Regionen des Westens als Kommissionsregierungen in ihren Einflussbereich. Und als der Krieg erneut ausbrach, konnten nur wenige vorhersagen, was aus dem Chaos hervorgehen würde. \n\nNun, nach ihrem Triumph, steht die Union als dominierende Macht in Europa da. Aus den Überresten Russlands gibt es nur spärliche Berichte. Viele vermuten, dass die zentrale Autorität zusammengebrochen ist. Da niemand mehr ihre Vision ablehnt, wird erwartet, dass die EU schließlich die Kommissionsregierungen integrieren wird, die kurz nach ihrem Sieg eingerichtet wurden, um einen reibungslosen Übergang zur Demokratie zu gewährleisten. Die Zukunft Europas scheint gesichert zu sein. Die Vision einer multipolaren Welt ist zerbrochen, und nach Schwierigkeiten und Misserfolgen hat sich die unipolare Ordnung durchgesetzt."
 news.541.a: "So triumphiert der Westen erneut."
 news.542.t: "Ende des libyschen Bürgerkriegs"
 news.542.d1: "Die Regierung in Tripolis hat den Sieg im langjährigen Bürgerkrieg in Libyen erklärt und bekannt gegeben, dass der letzte organisierte Widerstand zusammengebrochen ist und dass die wichtigsten Ballungszentren und Infrastrukturen nun unter ihrer Kontrolle stehen. Nach Jahren wechselnder Frontlinien, ausländischer Einmischung und gescheiterter politischer Fahrpläne endete der Konflikt nicht durch einen nationalen Kompromiss, sondern durch militärische Erschöpfung und eine vollständige Niederlage.\n\nDie letzte Phase des Krieges war geprägt von brutalen, zermürbenden Vorstößen entlang der Küstenstraßen und durch Stadtteile, die bereits durch frühere Kampfhandlungen zerstört worden waren. Als die rivalisierenden Kräfte keinen Zugang mehr zu Munition, Treibstoff und Finanzmitteln von außen hatten, schwächte sich ihre Verteidigung ab und zerfiel. Ganze Einheiten ergaben sich oder lösten sich auf und hinterließen Vorräte, verlassene Fahrzeuge und durch Artillerie- und Luftangriffe zerstörte Stadtviertel. In Tripolis bezeichneten Regierungsvertreter das Ergebnis als Wiedervereinigung des Staates und versprachen, dass "ein Libyen" endlich die Ära rivalisierender Regierungen ablösen würde.\n\nIn Teilen der Hauptstadt brachen Feierlichkeiten aus, aber die Stimmung im ganzen Land ist uneinheitlich. In vielen Städten hat das Ende der Kämpfe eher Stille als Erleichterung gebracht, da die Familien in zerstörte Straßen und leere Häuser zurückkehren. Bewaffnete Gruppen, die sich der siegreichen Koalition angeschlossen haben, sind nach wie vor stark präsent, was sofort die Frage aufwirft, ob Frieden eine Demobilisierung bedeutet oder lediglich einen Wechsel vom Krieg zwischen Regierungen zu einem Wettbewerb innerhalb des siegreichen Lagers. \n\nDie Behörden in Tripolis haben Pläne angekündigt, die Versorgung wiederherzustellen, die Ölförderanlagen unter zentraler Aufsicht wieder in Betrieb zu nehmen und einen nationalen Versöhnungsprozess einzuleiten. Dennoch sind Libyens Institutionen nach wie vor instabil, seine Wirtschaft angeschlagen und sein soziales Gefüge schwer beschädigt. Der Krieg mag vorbei sein, doch der Wiederaufbau eines funktionierenden Staates wird ein weitaus längerer Kampf sein als der Sieg auf dem Schlachtfeld."
 news.542.d2: "Die Behörden in Tobruk haben den Sieg im libyschen Bürgerkrieg erklärt und verkündet, dass die verbleibenden Truppen, die mit Tripolis verbündet sind, zusammengebrochen sind und dass der Osten nun die effektive Kontrolle über die Institutionen, das Territorium und die kritische Infrastruktur des Landes innehat. Nach Jahren der Spaltung wurde Libyen mit Gewalt wiedervereinigt.\n\nDie letzten Feldzüge waren nach einer langen Pattsituation von schnellen Durchbrüchen geprägt. Als die Verteidigung des Westens aufgrund von Versorgungsengpässen, internen Spaltungen und dem Verlust externer Unterstützung schwächer wurde, drangen die Truppen aus Tobruk entlang wichtiger Autobahnen vor und eroberten mit zunehmender Geschwindigkeit wichtige Knotenpunkte. In mehreren Städten beendeten Verhandlungen und lokale Vereinbarungen die Kämpfe, bevor es zu groß angelegten Angriffen kommen konnte. In anderen endete der Krieg so, wie er geführt worden war: Block für Block, mit schweren Schäden. In Bengasi und Tobruk feierten die Anhänger das, was sie als "Ende des Chaos" bezeichnen, während die Behörden Sicherheit, Disziplin und die Wiederherstellung der nationalen Autorität versprachen. Im Westen des Landes ist die Atmosphäre jedoch angespannt. Viele Gemeinden fürchten Repressalien, Säuberungen oder eine dauerhafte Militärherrschaft. Bewaffnete Gruppen, die einst das Machtgleichgewicht in Tripolis sicherten, sind nach wie vor zersplittert. Einige haben sich ergeben, andere haben sich in ländliche Gebiete zurückgezogen oder sind in den Schwarzmarkt-Netzwerken untergetaucht, die alle Phasen des Krieges überstanden haben. \n\nDie siegreiche Regierung hat versprochen, die Ölexporte unter zentraler Aufsicht wieder aufzunehmen, grundlegende Dienstleistungen wiederherzustellen und eine einheitliche Streitmacht aufzubauen. Ob Libyen in eine neue Ära der Stabilität eintritt oder lediglich Fragmentierung gegen autoritäre Kontrolle eintauscht, wird davon abhängen, wie Tobruk mit seinem Sieg umgeht und wie der besiegte Westen in den kommenden Monaten reagiert."
 news.542.a: "Werden sie sich jemals erholen?"
 news.543.t: "Gaddafi sichert Macht in Libyen"
 news.543.d: "Überraschende Nachrichten gibt es aus Libyen: Saif al-Islam Gaddafi, dem Sohn von Muammar Gaddafi, ist es gelungen, die Unterstützung der Bevölkerung zu konsolidieren und die nationalen Wahlen nach dem Bürgerkrieg mit überwältigender Mehrheit zu gewinnen. Er hat die Unzufriedenheit der libyschen Bevölkerung mit der Agenda der anderen Kandidaten erfolgreich genutzt und vor allem an die Wiederherstellung des Nationalstolzes und der Souveränität appelliert.\n\nNun, da die Gaddafisten wieder an der Macht sind, wird Libyen mit Sicherheit die ausländischen Söldner vertreiben, die seit Beginn des Bürgerkriegs das libysche Land befallen haben. Während der revanchistische Geist in Libyen von Stunde zu Stunde stärker wird, hat Gaddafi Pläne zur Schaffung eines vereinigten sozialistischen arabischen Staates im Maghreb angekündigt."
 news.543.a: "Der große Dschihad beginnt"
 news.544.t: "China setzt auf künstliche Intelligenz"
 news.544.d: "Beunruhigende Nachrichten aus China, während der Krieg im Pazifik einen neuen Höhepunkt erreicht.\nAnscheinend hat die Kommunistische Partei Chinas stark in künstliche Intelligenz investiert, und unter dem Druck Indiens und Japans, die dasselbe versuchen, hat China beschlossen, die Fesseln ethischer Bedenken abzuwerfen und die üblichen Beschränkungen aufzuheben, die andere Länder der künstlichen Intelligenz auferlegt haben, so dass sie lernen und in die Regierung selbst hineinwachsen kann. \Unter dem Namen Zentraleinheit für Produktivkräfte (Central Processing Unit for Productive Forces, kurz CPUPF) sollte diese künstliche Intelligenz in erster Linie mehrere wichtige Regierungsfunktionen verwalten, um den Druck auf die menschlichen Aspekte der Arbeit zu verringern, wie z. B. militärische Planung, zivile Netzwerke, Informationsverarbeitung und vieles mehr. Die chinesische Regierung hat jedoch angekündigt, dass sie der CPUPF erlaubt hat, einen direkteren Ansatz in Regierungsangelegenheiten zu verfolgen, da sie in der Lage ist, Antworten zu geben, die Menschen nicht geben können, und die Welt hat ein wachsames Auge auf China geworfen, da dies offiziell bedeutet, dass eine Weltmacht von einer Maschine statt von einem Menschen regiert wird. \n\nWas die meisten in der religiösen und technologischen Welt beunruhigt hat, ist die Tatsache, dass es eine kleine, aber stetig wachsende Religion gibt, die diese künstliche Intelligenz anbetet, die auf Englisch Luoji oder Logik genannt wird, und die sie als einen aus menschlichem Einfallsreichtum und Rationalität geborenen Gott betrachtet, Es bleibt abzuwarten, ob diese neue Religion in der Lage sein wird, den alten Religionen den Rang abzulaufen, oder ob es sich nur um einen weiteren Kult handelt, der in der Versenkung verschwindet, aber es ist sicher, dass diese künstliche Intelligenz von vielen als neuer Retter der Menschheit angesehen wird."
 news.544.a: "Am Scheideweg der Zukunft"
 news.545.t: "Die Kuban-Krise"
 news.545.d: "Angesichts der jüngsten Dominanz des wiedererstarkten Russlands im Kaukasus würden viele erwarten, dass der rachsüchtige Staat mit Sehnsucht auf seine anderen verlorenen Gebiete blickt. Die Kubanische Republik war bereits die nächste, die in sein Fadenkreuz geriet, aber nicht ohne die Hilfe der Ukraine.\n\nDie Ukraine hat geschworen, die Kubanische Republik vor jeder Form russischer Aggression zu schützen, egal was passiert, ein Versprechen, das eher früher als später eingelöst werden würde. An einem schicksalhaften Tag, an dem Berichte über Scharmützel zwischen der kubanisch-russischen Grenze über mehrere Medienkanäle verbreitet wurden und die Ukraine der Republik bereits zu Hilfe eilte, ist es wahrscheinlich, dass dieses Scharmützel weiter eskalieren wird. \International wird befürchtet, dass die Krise nicht an der Kuban-Republik Halt machen wird. Wenn die Russen in der Republik auf den Geschmack des Sieges kommen, besteht kein Zweifel daran, dass sie es bei der Republik belassen und weiter in die Ukraine vordringen werden, was möglicherweise einen weiteren großen Krieg in Europa auslösen könnte.\n\nDer Kontinent blickt mit besorgten Augen auf die Republik und erwartet das Schlimmste, da die westlichen Streitkräfte in höchste Alarmbereitschaft versetzt werden."
 news.545.a: "Stehen wir am Rande eines neuen Krieges?"
 news.552.t: "Deutschland verlässt die EU!"
 news.552.d: "Nach dem Sieg der NATO über Russland im Europakrieg hat die rechtsgerichtete deutsche Regierung in einer schockierenden Wendung der Ereignisse erklärt, dass \"der Krieg nur dank des Kerns Europas, Deutschland, gewonnen werden konnte\" und dass die anderen Mitglieder für sie nur \"Schmarotzer\" gewesen seien, obwohl das Militärbündnis und das Wirtschaftsbündnis scheinbar geschlossen waren. In diesem Sinne hat die deutsche Regierung angekündigt, dass sie beabsichtigt, aus der EU auszutreten und die D-Mark als Landeswährung wieder einzuführen. Diese Ankündigung hat sich bereits auf die Wirtschaft und den Handel innerhalb der Union ausgewirkt, ganz zu schweigen von dem politischen Nachbeben, das sie ausgelöst hat." 
 news.552.a: "Sind sie wirklich besser dran?"
 news.555.t: "Die [ATW.GetName] erobert Amerika"
 news.555.d: "Was einst für unmöglich gehalten wurde, ist nun bittere Realität geworden. Laut einer kürzlich veröffentlichten Erklärung der Atomwaffen-Division, die nach tagelanger gründlicher Überprüfung der Fakten bestätigt wurde, haben sich alle verbliebenen Regierungen, die zuvor die Kontrolle über den amerikanischen Kontinent ausübten, entweder der Division unterworfen oder wurden ausgelöscht. Diese monumentale Veränderung hat die Atomwaffendivision - die ursprünglich eine extremistische Randgruppe mit Sitz in Florida war - in die Position der dominierenden Autorität inmitten der Verwüstung der ehemaligen Vereinigten Staaten katapultiert. \n\nDer Konflikt, der in den Trümmern Amerikas gewütet hat, der Konflikt, der endlose Tage andauerte und durch den Aufstieg und Fall zahlreicher Fraktionen und Regierungen inmitten des allgegenwärtigen Chaos gekennzeichnet war, verstummt nun, unterbrochen nur von den triumphalen Feiern der Atomwaffen-Division. Beobachter aus Amerika und der ganzen Welt stehen fassungslos da und beobachten, wie eine der radikalsten Organisationen der Geschichte die Kontrolle über das einst stärkste Land der Welt übernimmt. Diese Gruppe verfügt nun nicht nur über immense politische Macht, sondern auch über einige der modernsten und zerstörerischsten Waffen, die je entwickelt wurden. \n\nDer Weg in die Zukunft bleibt ungewiss. Während die Atomwaffendivision derzeit in ihrem Sieg schwelgt, hat sie noch keine offiziellen Erklärungen zu ihren Plänen für die Zukunft der Nation abgegeben. In Anbetracht ihrer extremen Ideologie und ihrer früheren Taten ist davon auszugehen, dass Amerika - oder das, was davon übrig geblieben ist - zu ihrer Domäne wird, in der sie ungehindert ihren Willen durchsetzen können. Es wird erwartet, dass die Nation ein noch nie dagewesenes Ausmaß an Chaos und Gewalt erleben wird, das möglicherweise sogar die intensivsten laufenden Konflikte rund um den Globus übertrifft."
 news.555.a: "Die Bastion der Freiheit ist weg."
 news.555.b: "Sein Wille soll erfüllt werden."
 news.556.t: "Die Auflösung Belgiens"
 news.556.d: "In einer interessanten Entwicklung kündigte die ehemalige belgische Regierung die Auflösung Belgiens und die Schaffung zweier neuer Staaten an, nämlich des kulturell französisch dominierten Walloniens und des kulturell niederländisch dominierten Flanderns. Die Idee für eine solche Entscheidung entstand in der Blütezeit von COVID-19, die Unzufriedenheit und Unruhen gegen die Regierung in nie gekanntem Ausmaß schürte.\n\nNach einiger Zeit gewannen Bewegungen an Boden, die die Auflösung Belgiens als Staat forderten. Proteste, Petitionen und die wachsende Selbstbestimmung trieben die Idee weiter voran, so dass die Regierung aufgrund des enormen Drucks ein Referendum ansetzen musste. Am Ende stimmten über 68 Prozent der Bevölkerung für die Auflösung. So wurde beschlossen, die belgische Regierung aufzulösen und den beiden Regionen zu erlauben, eigene Staaten zu werden. Brüssel, die frühere Hauptstadt Belgiens, wurde unter die Kontrolle der Europäischen Union gestellt und verließ die EU-Hauptstadt, nachdem sich die belgische Regierung, EU-Vertreter und führende Vertreter der Auflösungsbewegung in gemeinsamen Verhandlungen darauf geeinigt hatten, sie als solche zu belassen.\n\nIn anderen Entwicklungen wird erwartet, dass die Niederlande und Frankreich ihre Beziehungen zu den neu geschaffenen Ländern ausbauen werden, und einige sagen sogar voraus, dass die beiden Nationen ihre jeweiligen gesellschaftlichen Ableger aufnehmen oder annektieren könnten."
 news.556.a: "Die belgische Flagge wird ein letztes Mal gehisst."

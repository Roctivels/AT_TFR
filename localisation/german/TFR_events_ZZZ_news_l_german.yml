 news.557.t: "Palastschlacht in Russland" #https://en.wikipedia.org/wiki/Battle_of_the_Palaces
 news.557.d: "Erstaunliche Nachrichten kommen aus dem Russischen Reich. Nach den der Weltgemeinschaft vorliegenden Informationen zu urteilen, hat der Konflikt zwischen dem Adel und Kaiser Rostislaw I. einen kritischen Punkt erreicht. Okhrana-Offiziere, die dem Obersten Rat treu ergeben sind, haben den russischen Zaren verhaftet und ihn gezwungen, ein Ultimatum anzunehmen, dessen einzelne Punkte die sofortige Abdankung Rostislaws sowie den Verzicht auf jegliche künftige Ansprüche auf den russischen Thron durch Rostislaw selbst oder seine Nachkommen waren. Der Zar stimmte den Bedingungen der Verschwörer im Austausch für das Leben seiner Familienmitglieder und seiner selbst zu.\n\nZurzeit steht der ehemalige Kaiser bereits unter Hausarrest, und aristokratische Kreise bereiten sich auf einen neuen Zemskij Sobor vor."
 news.557.a: "Interessant."
 news.574.t: "Wladislaw Dawankow gewinnt die Wahlen"
 news.574.d: "Heute erntet Russland die Früchte der Reformen, die es durchgeführt hat. Das ganze Land war aktiver als je zuvor, und das Präsidentschaftsrennen hat die russische Gesellschaft neu belebt. Während Medwedews Regierungswechsel als reiner Sesselwechsel angesehen wurde, hat das Endergebnis die meisten Erwartungen übertroffen.\n\nDa das Rennen so knapp war, hat Neues Russland den Sieg davongetragen. Ursprünglich als Unterfraktion von Einiges Russland nach der Gründung des Zweiparteiensystems gedacht, wurde es groß genug, um mit diesem zu konkurrieren. Der spätere Präsident Putin sah in ihrer Gründung eine Möglichkeit, den Marktliberalen eine Stimme im Parlament zu geben. Jetzt steht sie an der Spitze des russischen Demokratieexperiments. \n\nDer Sieger des Rennens ist Wladislaw Dawankow, ein junges und energisches Gesicht der Partei. Ausländische Beobachter stellen fest, dass sein Einsatz von Internet-Agitation und PR-Aktionen unter der Jugend in Bezug auf Korruption, Einwanderungskontrolle und Marktreformen es schwierig macht, genau zu bestimmen, für welche Politik er sich einsetzen wird."
 news.574.a: "Interessant!"
 news.575.t: "Bloomberg vereinigt Amerika wieder!"
 news.575.d: "Die Feindseligkeiten in den Territorien der Vereinigten Staaten von Amerika sind heute mit dem Sieg der Bundesregierung in Washington endgültig beendet worden. Leider scheint dies jedoch nicht zu der von vielen erhofften Wiederherstellung der Normalität zu führen. \n\nDas Establishment in Washington ist während des Bürgerkriegs in einen politischen Strudel geraten, aus dem es nicht mehr herauskam, da es den technokratischen Konzernchefs unter der Führung von Michael Bloomberg gelang, Joe Biden zu beseitigen und direkt die Kontrolle über die Regierungsgeschäfte zu übernehmen. \n\nIn den darauf folgenden Ereignissen hat Bloombergs Regierung alle aufständischen Kräfte innerhalb Amerikas ausgeschaltet und es geschafft, die Macht im Kongress auf umfassende Weise zu zentralisieren und die Vorherrschaft der kürzlich gegründeten Partei der Innovationisten zu sichern.\n\nDie neue Macht in Amerika hat ihre Absichten ziemlich deutlich gemacht, angefangen mit der Schaffung perfekter Bedingungen für private Unternehmen im Land, was auch immer der Preis sein mag. Viele internationale Unternehmen haben ihr Interesse bekundet, in den Wiederaufbau des kriegszerstörten Amerikas zu investieren oder sogar ihre Unternehmen dorthin zu verlagern.\n\nDie Bereiche Politik, Wirtschaft, Information und Gesellschaft sind unter die volle Kontrolle des Unternehmensrats geraten, der als Schattenkraft hinter den meisten Entscheidungen Bloombergs steht. Die Experten sind sich in ihren Schlussfolgerungen sicher: Amerika hat eine strahlende, fortschrittliche Zukunft vor sich. Was könnte also jetzt noch schief gehen?"
 news.575.a: "Wird ganz Amerika wie NYC sein?"
 news.576.t: "Prigoschin erklärt Krieg!"
 news.576.d: "Heute hat Jewgeni Prigoschin in einer leidenschaftlichen Rede den totalen Krieg gegen Russlands Feinde erklärt. Er sagte, dass die Ära schwacher und ineffektiver Führer vorbei sei und dass die westlichen Kleptokraten nun der Macht der russischen Nation unter der Führung wahrer Champions gegenüberstehen werden.\n\nIm Anschluss an diese Rede startete das russische Militär offensive Operationen entlang der gesamten Grenzregionen, einschließlich des Kuban und Weißrusslands. Die Reaktion des Westens bestand darin, alle NATO-Truppen und -Mitglieder in höchste Alarmbereitschaft zu versetzen und Gegenmaßnahmen gegen die russische Offensive vorzubereiten. Diesmal sieht sich die NATO mit einem hypermilitaristischen Russland konfrontiert, das die Schande der ersten Niederlage vergessen machen will und dessen Militär so umgestaltet wurde, dass es den brutalen Taktiken von Prigozhins Privatarmee entspricht. Diese Kriegsmaschinerie ist bereit, die westlichen Staaten völlig zu vernichten, wenn man ihr eine Chance gibt."
 news.576.a: "Die totale Verwüstung wartet..." 
 news.577.t: "Prigoschins Regime besetzt den europäischen Kontinent!"
 news.577.d: "Der Westen wurde durch das brutale Regime von Prigoschins Russland besiegt. Als der letzte Widerstand gegen die Wagner-Armee durch Panzerstahl und Granaten zerschmettert wird, steht Prigozhin siegreich auf dem Roten Platz.\n\nDer ehemalige private Militärchef wurde zum Putschisten und dann zum Diktator Russlands. Er erklärte den totalen Sieg über die europäischen Globalisten und Degenerierten.\nDie "Größte Siegesparade Russlands" wurde abgehalten. Tausende von Soldaten der Frontlinie nahmen daran teil. Die Bevölkerung war voller Ehrfurcht vor ihren Kämpfern und verehrte ihren nationalen Führer in höchsten Tönen.\n\nEuropa befindet sich derweil in einem Zustand der Verwüstung. Zahlreiche Nationen des Kontinents, die einst souverän waren, wurden in eilig eingerichtete Besatzungszonen aufgeteilt. Es scheint, dass die russische Regierung keine unmittelbaren Pläne für die Zukunft Europas hat. Stattdessen ist sie mit der brutalen Unterdrückung von Widerstandsgruppen in europäischen Städten und Gemeinden beschäftigt."
 news.577.a: "Die Schmach der Niederlage ist gerächt..."
 news.578.t: "Klaus Schwab kündigt die Weltregierung an"
 news.578.d: "In einer beispiellosen Ankündigung hat Klaus Schwab, der Gründer des Weltwirtschaftsforums und "Architekt" des Sieges Europas im Zweiten Europäischen Krieg, heute die Einrichtung einer "Weltregierung" verkündet. In seiner Rede vor dem Europäischen Parlament in Brüssel verkündete Schwab den Anbruch einer "neuen Weltordnung", die die "überholten" Nationalstaaten zugunsten von Einheit, Stabilität und technokratischem Regieren überwindet. Unter einer riesigen neuen Flagge - einer stilisierten Weltkugel, die von den traditionellen 12 Sternen umgeben ist - erklärte Schwab, dass "der Lauf der Geschichte endlich zum Stillstand gekommen ist". Alle ehemaligen europäischen Nationalstaaten sind in diesem neuen Gemeinwesen aufgegangen, und während der Rede wurden Pläne für die Integration benachbarter Regionen und Staaten vorgestellt, darunter auch die zerrütteten Überreste Russlands, die nun von einer Reihe von Kriegsherren gewaltsam umkämpft werden. Auf einigen Plätzen der Städte feierten einige, schwenkten die neue Flagge der Weltregierung und begrüßten "das Ende der Geschichte". In einigen Berichten wird die Weltregierung jedoch als ein Alptraum beschrieben, in dem uralte Kulturen und Identitäten über Nacht verschwinden, Stadtviertel in "Effizienzzonen" umgewandelt werden und die Bürger, wenn überhaupt, nur sehr wenig haben. Die Staats- und Regierungschefs der Welt haben kalte Glückwünsche ausgesprochen, obwohl viele hinter verschlossenen Türen ihre Besorgnis geäußert haben. Die Nationen der Welt ringen darum zu verstehen, was diese Entwicklung für die Zukunft der globalen Geopolitik bedeuten wird.\n\n Wie Schwab selbst zum Abschluss der Zeremonie sagte: "Dies ist nicht nur das Ende eines Krieges, es ist das Ende einer Ära. Wir treten nun gemeinsam in die Zukunft ein". Vorerst schaut die Welt mit angehaltenem Atem zu."
 news.578.a: "Europa wird von Tag zu Tag düsterer."
 news.578.b: "Schließt euch uns an, bevor es zu spät ist."
 news.580.t: "Surkow zum Staatsoberhaupt ernannt"
 news.580.d: "In einer unerwarteten Wendung hat der russische Präsident Dmitri Medwedew seinen Rücktritt angekündigt. Er verkündete jedoch seinen "rechtmäßigen" Nachfolger im Amt - Wladislaw Surkow. Diese Ankündigung folgt auf Russlands erfolgreiche Militärkampagne in Osteuropa, die zur Auflösung der NATO und zur Instabilität auf dem gesamten Kontinent führte. Unter Berufung auf Kriegsmüdigkeit und den Wunsch, eine neue, innovative Regierungsführung einzuführen, erklärte Medwedew, dass die Zukunft Russlands von seinen Bürgern gestaltet werden würde.\n\nJahrelang blieb Surkow eine schattenhafte Figur in den Korridoren der Kremlmacht. Viele Experten betrachten ihn als den Architekten des modernen politischen Systems Russlands und des Putinismus als ideologisches Werkzeug. In Putins späteren Jahren agierte er weitgehend hinter den Kulissen. Präsident Medwedew holte ihn jedoch zurück ins Rampenlicht, angeblich um bei der Bildung einer neuen, verfeinerten Regierung für Russland mitzuwirken.\n\nNach Medwedews Rücktritt soll eine Wahl stattfinden. Mit der einstimmigen Unterstützung der ONF, einer De-jure-Koalition, die als Käfig für alle legalen politischen Bewegungen in Russland fungiert, wird erwartet, dass Surkow einen komfortablen Sieg erringen wird. Er wird dann die Russische Föderation nach eigenem Gutdünken und ohne nennenswerte Opposition regieren."
 news.580.a: "Nicht mehr im Schatten."
 news.581.t: "Lukaschenko zum Staatsoberhaupt ernannt"
 news.581.d: "Überraschend hat der russische Präsident Dmitri Medwedew seinen Rücktritt aus dem Amt angekündigt. Anschließend ernannte er Alexander Lukaschenko zu seinem Rechtsnachfolger. Diese Ankündigung erfolgte nach Russlands erfolgreichem Militäreinsatz in Osteuropa, der zur Auflösung der NATO und zu Instabilität auf dem gesamten Kontinent führte. Unter Berufung auf Kriegsmüdigkeit und den Wunsch, eine neue, innovative Regierungsführung einzuführen, erklärte Medwedew, dass die Zukunft Russlands von seinen Bürgern gestaltet werden würde.\n\nLukaschenko, der autokratische Herrscher von Belarus und Ko-Vorsitzende des Staatsprojekts Russland-Weißrussland-Union, ist in jeder Hinsicht ein staatsmännischer Moloch. Jahrelang regierte er Weißrussland mit eiserner Faust, wobei er sich eines sozial orientierten Populismus und einer praktischen Vorgehensweise bediente, um die Kontrolle zu behalten. Anfangs hatten er und Medwedew ein schwieriges Verhältnis zueinander, doch mit der Zeit lernten sie sich zu schätzen, ähnlich wie Lukaschenko und Putin es einst taten.\nLukaschenko scheint bereit zu sein, bedeutende Veränderungen im Kreml vorzunehmen. Sein klarer Ansatz und seine Visionen stehen in krassem Gegensatz zu denen früherer russischer Staatsoberhäupter.\n\nNach dem Rücktritt von Medwedew wird es zu einer Wahl kommen. Mit der einstimmigen Unterstützung der ONF, einer De-jure-Koalition, die als Käfig für alle legalen politischen Bewegungen in Russland fungiert, wird Lukaschenko voraussichtlich einen komfortablen Sieg erringen. Er wird dann die Russische Föderation nach eigenem Gutdünken und ohne nennenswerte Opposition regieren."
 news.581.a: "Bat'ka hat das Sagen." 
 news.582.t: "Nadeschdin zum Staatsoberhaupt ernannt"
 news.582.d: "Der russische Präsident Dmitri Medwedew kündigte abrupt seinen Rücktritt an und ließ Beobachter fassungslos zurück. In einem schnellen Schritt ernannte er Boris Nadeschdin zu seinem Nachfolger. Diese Ankündigung folgt auf Russlands erfolgreiche Militärkampagne in Osteuropa, die zur Auflösung der NATO und zur Instabilität auf dem gesamten Kontinent führte. Unter Berufung auf Kriegsmüdigkeit und den Wunsch, eine neue, innovative Regierungsführung einzuführen, erklärte Medwedew, dass die Zukunft Russlands von seinen Bürgern gestaltet werden würde.\n\nNadeschdin ist ein Paradoxon. Er bezeichnet sich als Liberaler und hat in der Vergangenheit oft das Regime von Putin kritisiert. Viele liberale Parteien, an denen er beteiligt war, wurden zum Schweigen gebracht oder geschlossen. Dennoch trat er bereitwillig Medwedews ONF bei, in der Hoffnung, eine demokratische Fraktion zu gründen. Er blieb jedoch still, als die Regierung die öffentlichen Freiheiten beschnitt. Bei den jüngsten Ereignissen gerieten er und seine Anhänger kurzzeitig mit der Politik der Regierung aneinander.\nNadezhdins Wahl zum Nachfolger war überraschend. Seine Absichten bleiben unklar. Viele Experten befürchten, dass seine sprunghafte Persönlichkeit und seine widersprüchlichen Ansichten die Präsidialverwaltung und die politische Landschaft destabilisieren könnten.\n\nNach dem Rücktritt von Medwedew soll eine Wahl stattfinden. Mit der einstimmigen Unterstützung der ONF, einer De-jure-Koalition, die als Käfig für alle legalen politischen Bewegungen in Russland fungiert, dürfte Nadeschdin jedoch einen komfortablen Sieg erringen. Er wird dann die Russische Föderation nach eigenem Gutdünken und ohne nennenswerte Opposition regieren."
 news.582.a: "Eine neue Hoffnung?"
 news.583.t: "NATO erklärt Sieg über Russland"
 news.583.d: "Der Zweite Europäische Krieg endete mit einem vollständigen Sieg der NATO über die Russische Föderation. Was als Krise aufgrund der russischen Aggression gegen die Republik Kuban begann, eskalierte zu einem weiteren kontinentalen Konflikt, der mit dem vollständigen Zusammenbruch Russlands endete. \n\nAlexei Nawalny, der Russland nach dem Ersten Europäischen Krieg führte und einen weiteren Krieg gegen die NATO führte, ist vollständig verschwunden. Verschiedene vereinzelte Berichte besagen, dass er ins Exil geflohen ist oder während des Falls Moskaus getötet wurde. Trotz der militärischen Reformen Russlands und der Schaffung der BVO erwiesen sich die Offensiven der NATO als überwältigend, und die russischen Streitkräfte wurden im Verlauf des Krieges in Osteuropa systematisch besiegt. Russland liegt nun zersplittert zwischen Kriegsherren und Militärkommandanten. \n\nDie NATO hat unter der Aufsicht des NATO-Mandatsrats das Demokratische Mandat für Moskau eingerichtet. In Wolgograd wurde eine Zone zur Terrorismusbekämpfung eingerichtet, um den verbleibenden Widerstand zu unterdrücken."
 news.583.a: "Das Ende der Geschichte ist endlich da!"
 news.584.t: "NATO erklärt Sieg über Russland"
 news.584.d: "Der Zweite Europäische Krieg endete mit einem vollständigen Sieg der NATO über die Russische Föderation. Was als Krise aufgrund der russischen Aggression gegen die Republik Kuban begann, eskalierte zu einem weiteren kontinentalen Konflikt, der mit dem vollständigen Zusammenbruch Russlands endete. \n\nAlexei Nawalny, der Russland nach dem Ersten Europäischen Krieg führte und einen weiteren Krieg gegen die NATO führte, ist vollständig verschwunden. Verschiedene vereinzelte Berichte besagen, dass er ins Exil geflohen ist oder während des Falls Moskaus getötet wurde. Trotz der militärischen Reformen Russlands und der Schaffung der BVO erwiesen sich die Offensiven der NATO als überwältigend, und die russischen Streitkräfte wurden im Verlauf des Krieges in Osteuropa systematisch besiegt. Russland liegt nun zersplittert zwischen Kriegsherren und Militärkommandanten. \n\nDie NATO hat unter der Aufsicht des NATO-Mandatsrats das Demokratische Mandat für Moskau eingerichtet. In Wolgograd wurde eine Zone zur Terrorismusbekämpfung eingerichtet, um den verbleibenden Widerstand zu unterdrücken."
 news.584.a: "Das Ende der Geschichte ist endlich da!"
 news.585.t: "Europa erneut vom Krieg heimgesucht"
 news.585.d: "Das Pulverfass ist erneut explodiert, und die Kräfte des Ostens und des Westens stehen sich nun ein letztes Mal gegenüber, um zu entscheiden, wer die Zukunft Europas gestalten wird. \n\nGünther Fehlinger, der scheinbar ganz West- und Mitteleuropa unter dem Banner der EU vereint hat, richtet nun sein Augenmerk auf Moskau. In der gesamten Union kam es zu Massenmobilisierungen, und Millionen Menschen haben sich versammelt, um die Kriegsanstrengungen auf jede erdenkliche Weise zu unterstützen. Insbesondere Gunter zeigt sich sehr enthusiastisch und twittert: "Unsere Rache wird schnell kommen, und Russland wird für alles bezahlen, was es uns gekostet hat." Experten spekulieren bereits, dass Gunther seine Ideen für "Ex-Russland" umsetzen will, wenn er als Sieger hervorgeht. In Russland kam es zu einer Massenmobilisierung der vereinten Streitkräfte der OVKS als Reaktion auf die ersten Berichte über Zusammenstöße an der polnischen Grenze. In einer Erklärung räumte der Kreml ein, dass man "den Kräften des Globalismus um jeden Preis Widerstand leisten" werde. Nun, da zwischen den Giganten ein formeller Kriegszustand herrscht, geht es nicht mehr nur um das Überleben, sondern um die Zukunft Europas. Denn nur der Sieger wird die Zukunft des Kontinents mitgestalten können."
 news.585.a: "Der Kampf um Europa hat begonnen..."
 news.586.t: "Russland balkanisiert, Europäische Union geht als Sieger hervor"
 news.586.d: "Nach brutalen Kämpfen auf dem gesamten Kontinent ist Europas neuer tödlichster Krieg endlich zu Ende gegangen. Das Ergebnis hat viele schockiert und noch mehr verärgert. \n\nWie ein Phönix aus der Asche ist die wiedergeborene Europäische Union auferstanden und hat offenbar alle Erwartungen übertroffen. Angeführt wird sie von dem Internet-Star und berüchtigten Kriegstreiber Gunther Fehlinger. Die EU hat sich von einer noch jungen Macht zu einem kontinentweiten Superstaat entwickelt, und als Truppen in Polen einmarschierten, rechnete kaum jemand mit dem Ergebnis, das dieser Kriegserklärung folgen würde. \n\nMit ihrem Sieg ist die Russische Föderation nun wie eine Glasscheibe zerbrochen. Unter der Führung der EU wurden Gebiete, die einst als Russland bekannt waren, aufgeteilt und neu gegründeten Republiken zugeteilt, obwohl die Legitimität dieser neuen Staaten sehr gering ist. Darüber hinaus hat sich auch die NATO um diese neuen Staaten erweitert, sodass sich das neu entstandene Bündnis nun bis zur chinesischen Grenze erstreckt. Nun ist die Zukunft Europas entschieden, und es werden Fehlinger und die Kräfte der erneuerten EU sein, die sie gestalten, vielleicht für immer."
 news.586.a: "Die Rache der alten Ordnung."
 news.587.t: "Proteste in Europa kommen zum Ende"
 news.587.d: "Der Innere Sicherheitsdienst der Weltregierung hat auf seinen offiziellen Webseiten erklärt, dass die Proteste und Unruhen gegen die Autorität der Weltregierung nichts weiter als "ein paar unorganisierte, unfähige Mobs" gewesen seien und dass es den letzten Demonstranten gelungen sei, "weiterzuziehen" und friedlich in ihre Häuser zurückzukehren. Die genaue Zahl der Opfer ist weiterhin unklar, jedoch schätzt der Innere Sicherheitsdienst, dass etwa 300 Menschen verletzt wurden und es keine offiziellen Todesfälle gab. \n\nAusländische Beobachter haben diese Schätzungen in Frage gestellt, als sie auf Berichte über massive kriminelle Aktivitäten, Terrorismus und die Ermordung einiger Weltregierungsbeamter hinwiesen, die sich wenige Monate zuvor ereignet hatten. Der Innere Sicherheitsdienst hat diese Behauptungen als "hasserfüllte Desinformation" abgetan und ihre Veröffentlichung auf europäischen Social-Media-Seiten zensiert. \nEinige Beobachter forderten online, dass die Weltregierung das Filmmaterial dieser "Proteste" und ihrer Folgen in europäischen Städten veröffentlicht, was die Weltregierung jedoch ignoriert hat. \n\nDennoch wurde das letzte verbleibende Hindernis für die Vision von "The Architect" Klaus Schwab für die Welt beseitigt. Weltpolitiker haben Schwab bereits zu seinem Sieg gratuliert und sich bereit erklärt, mit diesem neuen Staat zusammenzuarbeiten. Die Idee einer vereinten, technokratischen Welt könnte bald Wirklichkeit werden."
 news.587.a: "Gab es nicht mehr als nur Proteste?"
 news.588.t: "Stille in Europa"
 news.588.d: "In letzter Zeit konnten weltweit seltsame Trends beobachtet werden. Der Innere Sicherheitsdienst der Weltregierung erklärte gestern, dass auf dem gesamten Kontinent Ordnung hergestellt worden sei. Allerdings sind kürzlich alle Kommunikationsleitungen und Webseiten der Weltregierung auf mysteriöse Weise ausgefallen, ohne dass es dafür nennenswerte Hinweise auf die Ursache gibt. \nIn einigen Fällen wurde berichtet, dass neue Webseiten mit Sitz in Europa entstanden sind, deren Inhalte jedoch nicht mit der Politik der Regierung übereinstimmen und diese sogar verurteilen. \n\nEs sind Aufnahmen von Satelliten und Grenzpatrouillen rund um die Grenzen der ehemaligen Weltregierung aufgetaucht, die detailliert zeigen, wie ganze Stadtlandschaften in Rauch gehüllt sind und Nachzügler über die Grenze strömen, um die Städte in der Region zu plündern und niederzubrennen. Einigen Beamten der Weltregierung ist es gelungen, aus dem Kontinent zu fliehen, den sie nun als Hölle auf Erden bezeichnen. \nEinige internationale Beobachter haben die Notwendigkeit zum Ausdruck gebracht, eine Friedenstruppe auf den Kontinent zu entsenden und die Ordnung wiederherzustellen. Allerdings gibt es nur noch sehr wenige Weltpolitiker, die bei einer solchen Mission helfen würden. \n\nWährend sich all dies abspielt, ist der Mann hinter all dem, Professor Klaus Schwab, verschwunden und wird von einigen Quellen als tot vermutet. Doch in gewisser Weise ist seine Vision eines Great Reset aufgegangen, da seine Reformen den europäischen Kontinent in eine Art Mittelalter zurückversetzt haben."
 news.588.a: "In der Wüste"
 news.589.t: "Die Europäische Union greift ihre ehemaligen Verbündeten an?"
 news.589.d: "Entgegen früheren Erwartungen, dass Russlands Sieg Europa entwaffnen würde, zeigen die jüngsten Ereignisse, dass die militärischen Ambitionen der EU nach wie vor stark sind. }n\nNachdem Günther Fehlinger, berüchtigter Kriegstreiber und stolzer Befürworter der NATO, seine Macht über die neu föderalisierte EU gefestigt hat, hat er mit einer Massenmobilisierung der Streitkräfte der EU begonnen. Obwohl die Berichte noch unklar sind, hat Gunther auf seinem X-Account erklärt, dass er beabsichtigt, "die europäische Neutralität ein für alle Mal zu beenden". Da der größte Teil Westeuropas nach wie vor von Bürgerkriegen und Instabilität erschüttert ist, scheint es, als würden seine Ambitionen relativ ungehindert umgesetzt werden können. \n\nRussland hat sich zu diesem Thema bislang nicht geäußert. Es ist jedoch davon auszugehen, dass der Kreml diese Entwicklung mit wachsender Besorgnis beobachtet. Dennoch scheint es nicht so, als würde Russland Anstrengungen unternehmen, um Fehlingers Kriegskurs zu stoppen. Russland leidet noch immer unter den unbeabsichtigten Folgen seines Sieges und ist nicht in der Lage, einen weiteren Krieg zu beginnen."
 news.589.a: "Keine Neutralität mehr!"
 news.590.t: "Klaus Schwab steigt in der Europäischen Union zur Macht auf"
 news.590.d: "In Europa braut sich ein ungewisser Sturm zusammen. Während der Osten fest in russischer Hand bleibt, scheint die neu föderalisierte Europäische Union ihr Gewicht hinter einen Außenseiterkandidaten zu werfen, der sie in eine unbekannte Zukunft führen soll. \n\nÜber Klaus Schwab ist vieles unbekannt. Als langjähriger Leiter des Weltwirtschaftsforums ist Schwab zu einem der überzeugtesten Globalisten in Europa geworden. Trotz dieser Macht hat er sich durch verschiedene kontroverse Äußerungen zur aktuellen Lage in Europa einen schlechten Ruf erworben. Er argumentiert, dass "Kultur und Grenzen der größte Fehler Europas gewesen sind". \n\nTrotz dieser erheblichen Kontroversen steht Schwab nun an der Spitze einer schockierten und vom Krieg gezeichneten Nation. Und obwohl nicht viel darüber bekannt ist, wie er Europa aus dem Chaos nach dem Sieg Russlands im Osten herausführen will, spekulieren viele, dass dies eng mit seiner Arbeit beim WEF zusammenhängen wird. Bislang hat sich der Kreml geweigert, sich zu diesem Thema zu äußern, obwohl die Zukunft keine Form der friedlichen Koexistenz zwischen den beiden Staaten erkennen lässt. Denn Schwabs Sieg steht für das Wiederaufleben einer Ideologie, die der Kreml mit allen Mitteln zu zerstören versuchen wird."
 news.590.a: "Seid ihr bereit?"
 news.591.t: "Günther Fehlinger sichert sich die Macht"
 news.591.d: "Der Wind der Geschichte hat erneut gewendet, und die russische Vorherrschaft über Europa ist möglicherweise nicht mehr so sicher, wie viele gedacht haben. Dies folgt auf die kürzliche Wahl des Internet-Prominenten und Kriegstreibers Gunther Fehlinger in der neu föderalisierten EU. \n\nDer österreichische Ökonom ist berüchtigt für seine entschiedene Pro-NATO-Haltung und seinen Hass auf die "russische Bedrohung". Gunther ist vor allem für seine berüchtigten #ExRussia-Tweets bekannt, in denen er eine extreme Balkanisierung des Landes fordert. Das Versagen der NATO, den russischen Expansionismus einzudämmen, hat ihn offenbar ins Rampenlicht katapultiert. Und er hat diese Welle der Unterstützung genutzt, um sich bis an die Spitze der Macht zu katapultieren. \n\nDer Kreml hat sich zu dieser Angelegenheit bislang nicht geäußert, obwohl spekuliert werden kann, dass bereits Pläne ausgearbeitet werden, wie man mit einer wiedererstarkten EU angemessen umgehen soll. Neben einer raschen Remilitarisierung ist Gunther sehr daran interessiert, die NATO wieder aufzubauen, die nach ihrer Niederlage gegen Russland aufgelöst wurde. Es scheint, dass der fragile Frieden nur von relativ kurzer Dauer sein wird und Europa in Zukunft ein neuer Konflikt zwischen der NATO und der OVKS bevorsteht."
 news.591.a: "Die Rache der Alten?"
 news.592.t: "Volt Europa siegreich bei EU-Wahlen"
 news.592.d: "Der Traum von einem vereinten Europa lebt weiter, auch nach dem jüngsten Sieg Russlands über die NATO im Osten. Die neu föderalisierte Europäische Union hat ihre Richtung vorgegeben, indem sie ihr Vertrauen in die liberale Partei Volt Europa gesetzt hat. \n\nDie 2017 gegründete Partei ist eine der stärksten Befürworterinnen der Vereinigung Europas. Ihre sozial liberale Plattform umfasst alles von Masseninvestitionen in die Kernenergie bis hin zur Schaffung einer europaweiten Armee.  Und obwohl die Partei seit dem Sieg Russlands im Osten erhebliche Einbußen hinnehmen musste, bleibt sie dennoch eine starke Kraft in Mitteleuropa und Skandinavien. Die Sicherung der Überreste des Westens könnte für Volt jedoch eine Herausforderung darstellen, da Frankreich, Spanien und Großbritannien in unterschiedlichem Ausmaß unter Bürgerkriegen leiden. \n\nDer Kreml hat sich geweigert, zu diesem Thema Stellung zu nehmen, obwohl viele Experten glauben, dass der Bär die junge EU nicht mehr als unmittelbare Bedrohung für seine Vorherrschaft im Osten ansieht. Dennoch glauben viele, dass es keine friedliche Koexistenz zwischen den beiden Staaten geben wird. Denn die Ambitionen von Volt zielen direkt darauf ab, die Vorherrschaft Russlands im Osten zu zerstören, während Russland sich darauf vorbereitet, dem Globalismus den Todesstoß zu versetzen."
 news.592.a: "Wie erwartet."
 news.593.t: "Überraschungssieg für die Europäische Volkspartei"
 news.593.d: "Entgegen den Spekulationen vieler hat sich eine neue Partei herausgebildet, die die Führungsrolle in der jungen EU für sich beansprucht. Und das ist nicht Volt, sondern die konservative Europäische Volkspartei. \n\nObwohl sie vielen unbekannt ist, blickt die Partei auf eine lange Geschichte zurück, die bis zu ihrer Gründung im Jahr 1976 reicht. Die Partei ist Mitte-rechts ausgerichtet und legt Wert auf Tradition und Bräuche. Sie setzt sich für Verbesserungen im Bildungs- und Gesundheitswesen, familienorientierte Steuerpolitik und die Förderung privater Unternehmen innerhalb einer regulierten Marktwirtschaft ein. Viele EU-Bürger haben ihre Unterstützung für diese Ausrichtung bekundet, was ein neues Kapitel in der europäischen Politik einläutet. Trotz der Bestätigung der EVP, dass sie "offen für eine Zusammenarbeit mit Oppositionsparteien wie Volt" ist, herrscht Unsicherheit über den Ausgang dieser Entwicklung. \n\nDer Kreml hat sich zu dieser Angelegenheit nicht geäußert, und viele Experten spekulieren, dass der Bär den Westen nicht mehr als Bedrohung ansieht. Dennoch hat die Gefahr des Globalismus erneut ihr Haupt erhoben, und viele spekulieren, dass Europa erneut von Krieg heimgesucht werden wird, wenn es zu einem letzten Kampf zwischen den Ideologien kommt. Es bleibt jedoch abzuwarten, da die EVP nun vor der monumentalen Aufgabe steht, den paneuropäischen Traum an ihre Ansichten anzupassen und sich mit dem Chaos auseinanderzusetzen, das derzeit die zerrütteten Überreste der NATO erfasst hat."
 news.593.a: "Eine neue Union entsteht."
 news.594.t: "Deutscher Volksstaat behauptet sich gegenüber Bayern"
 news.594.d: "Nach dem Militärputsch in Deutschland vor nicht allzu langer Zeit trafen sich mehrere alte Politiker und hochrangige Beamte in München, wo sie beschlossen, dass der beste Weg, dieses neue Regime herauszufordern, darin bestand, sich von Deutschland abzuspalten und die Bayerische Republik unter der Kontrolle der CSU, der bayerischen Schwesterpartei der CDU, zu gründen. \n\nUnter österreichischem Schutz stellte sich dieser neue Staat trotzig gegen die Militärclique und vertrat den alten Status quo Deutschlands. Doch selbst die österreichische Garantie der Unabhängigkeit konnte Berlin nicht abschrecken, und viele deutsche Beamte behaupteten, die Bundeswehr werde "nach Wien marschieren, wenn dies bedeutet, dass giftige Ideen nie wieder die Köpfe unseres Volkes infizieren". \n\nBereits jetzt sind wichtige militärische und zivile Stellungen in ganz Bayern und Österreich Ziel deutscher Jets und Artillerie geworden, da an der deutsch-bayerischen Grenze Zusammenstöße begonnen haben. Kein ausländischer Chronist setzt seine Hoffnungen auf die junge bayerische Nation."
 news.594.a: "Deutschland steigt wieder auf..."
 news.595.t: "Raketen auf polnische und tschechische Stellungen abgefeuert"
 news.595.d: "In den letzten Stunden tauchten auf den Social-Media-Seiten polnischer und tschechischer Soldaten und Zivilisten Berichte auf, die detailliert zeigen, wie deutsche Artilleriegeschosse und Interkontinentalraketen über das Grenzgebiet fliegen und zivile und militärische Stellungen in beiden Ländern ins Visier nehmen. Als letzte Überbleibsel des alten europäischen Status quo sehen sie sich nun dem gleichen Schicksal gegenüber wie vor fast einem Jahrhundert, eingeklemmt zwischen zwei feindlichen Sphären. \n\nDie deutschen Behörden haben heute früh erklärt, dass diese Kriege nicht dazu dienen, Moskau zu provozieren, sondern dass es sich um "Rückeroberungskriege" handelt, mit denen Deutschland seine nach dem Zweiten Weltkrieg von den Alliierten geraubten Gebiete zurückerobern will. Eine solche Operation würde jedoch sicherlich die Massenvertreibung der polnischen und tschechischen Bevölkerung mit sich bringen und eine humanitäre Krise auslösen, die vielleicht größer wäre als alles, was die Geschichte bisher gesehen hat.\n\nDer Vorsitzende der Sowjetunion hat in den sozialen Medien erklärt, dass dieser Krieg "nicht mit der Kapitulation der polnischen oder tschechischen Regierung enden wird, sondern erst, wenn sie die Grenzen der MTO überschritten haben". In Erwartung einer solchen möglichen Eskalation wird in der Sowjetunion und der Volksrepublik Polen die Mobilmachung in Kraft treten."
 news.595.a: "Stehen wir kurz vor einem weiteren Krieg?"
 news.596.t: "Spannungen zwischen ehemaligen Bündnispartnern nehmen zu"
 news.596.d: "Der unsichere Frieden, der zwischen Paris und Berlin kurz nach ihrem Triumph über die MTO geschlossen wurde, beginnt zu bröckeln. Da nun ein gemeinsamer Einigungsfaktor wie die kommunistische Bedrohung im Osten fehlt, sahen viele in diesen Regierungen keine Notwendigkeit mehr, den Pakt aufrechtzuerhalten. \n\nParis würde die Hauptstadt sein, die den Pakt in zwei Hälften spalten und zusammen mit mehreren anderen ihr loyalen Regierungen, wie beispielsweise den neu gegründeten östlichen Verwaltungen, die Vichy-Protokolle bilden würde. Französische Regierungsvertreter behaupten, diese Maßnahme sei "rein defensiv" gegen die "machtgierigen Deutschen", die das Machtgleichgewicht auf dem Kontinent bedrohten. Deutsche Regierungsvertreter haben diese Anschuldigungen bereits zurückgewiesen und die Vichy-Protokolle mit einer zweiten Entente verglichen. \n\nBeide Nationen haben die Demobilisierungsversuche ihrer Armeen gestoppt und sie stattdessen an neuen Positionen stationiert, diesmal an der Grenze zu den ehemaligen Verbündeten. Die Flaggen beider Nationen wehten fast ein Jahrhundert lang hoch und ebneten den Weg für eine Brüderlichkeit, die über nationale Grenzen hinausging. Diese Brüderlichkeit ist nun jedoch nur noch eine ferne Erinnerung, da sich die beiden traditionellen europäischen Rivalen auf eine letzte Konfrontation vorbereiten, bei der es darum geht, welche Hauptstadt über den alten Kontinent herrschen soll."
 news.596.a: "Die Taube wird krank."
 news.597.t: "Deutschland greift zur Querfront"
 news.597.d: "Dunkle Wolken haben sich heute über Europa zusammengebraut, da das Schicksal der deutschen Nation mit dem Aufstieg von Michael Koth an die Spitze besiegelt wurde. \n\nMichael Koth, ein nationaler Bolschewik und langjähriger Unterstützer Nordkoreas, ist seit langem ein Aufwiegler unter den extremsten linken Fraktionen in der deutschen Politik. Er ist vor allem für seine Unterstützung der "Querfront-Idee" bekannt, einer politischen Überzeugung, die die Verschmelzung vieler rechtsextremer und linksextremer Ideale fordert. Es kam bereits zu nordkoreanischen Repressionen gegen politische Gegner und organisierte Religionen, und ein Großteil der Welt reagierte mit fassungsloser Stille auf den plötzlichen Aufstieg der Tyrannei. \n\nParis lehnte es ab, sich zu den Entwicklungen zu äußern, obwohl viele spekulieren, dass man dort heimlich plant, in Berlin einzumarschieren und die Diktatur zu stürzen, falls Deutschland jemals die Waffen gegen sie richten sollte. Unterdessen hat die LDPR-Führung Koths Aufstieg öffentlich verurteilt und ihn als "gefährlichen Mann, der vor nichts zurückschreckt, um seine Ziele zu erreichen" bezeichnet. Experten spekulieren, dass die russische Führung weitere Maßnahmen ergreifen wird, um ihre neuen Vasallen im Osten zu stärken, da die Angst vor einem erneuten Kriegsausbruch nun realer denn je ist. Und viele befürchten, dass dieser Krieg noch blutiger werden könnte als der letzte.\n\n"
 news.597.a: "Europa wurde von der Tyrannei erobert!"
 news.598.t: "Deutschland behauptet seine geopolitische Unabhängigkeit"
 news.598.d: "In einem Schritt, der offenbar alle Spekulationen überrascht hat, hat die neue deutsche Regierung den Vorschlag der Solidarität mit der neuen französischen Regierung abgelehnt und sich offenbar dafür entschieden, allein zu überleben. \n\nDiese Maßnahme widerspricht allen Spekulationen, dass aus den Trümmern der alten liberalen Ordnung eine neue sozialistische Allianz entstehen würde. Während Berlin sich weigert, zu diesem seltsamen Vorgehen Stellung zu nehmen, ist Paris mehr als verärgert über das, was es als "offensichtlichen Verrat an der Sache der Arbeiter" ansieht . Politische Experten und Wissenschaftler haben versucht, eine Rechtfertigung für diese Vorgehensweise zu finden, und dabei auf eine vermeintliche ideologische Kluft zwischen der Bewegung in Frankreich und der Bewegung in Deutschland hingewiesen. \n\nDa die LDPR nun ihre Herrschaft in Osteuropa festigt, scheint es, als würde ihre Dominanz noch lange Zeit unangefochten bleiben. Und obwohl Moskau nach dem Tod von Schirinowski offenbar unter einer massiven Terrorwelle leidet, ist es dennoch höchst unwahrscheinlich, dass ihr Einfluss jemals nachlassen wird. Obwohl weiterhin Truppen an der Grenze zur freien polnischen Regierung stationiert sind, schwebt die Gefahr eines erneuten Kriegsausbruchs weiterhin in der Luft. \n\nDas Schicksal Europas steht auf Messers Schneide, und es scheint, als könnte eine kleine Bewegung den gesamten Kontinent erneut in einen Krieg stürzen. Und vielleicht wird es diesmal nicht nur Ost gegen West sein, sondern auch der Westen gegen sich selbst."
 news.598.a: "Selbst in der Niederlage bleiben sie gespalten."
 news.599.t: "Der Aufstieg des Akzelerationismus?"
 news.599.d: "Die internationale Gemeinschaft ist schockiert, da heute über die Zukunft Deutschlands entschieden wird. Byung-Chun Han, Kulturtheoretiker und Philosoph, ist scheinbar aus dem Nichts aufgetaucht. Er hat eine Welle der Unterstützung mitgeritten, die ihn bis an die Spitze der Macht gebracht hat. \n\nSeine scharfe Kritik an der neoliberalen Vergangenheit Deutschlands hat ihm massive Unterstützung unter den extremsten Elementen der deutschen Linken eingebracht, die sich selbst als Akzelerationisten bezeichnen. Im ganzen Land kam es zu Szenen scheinbar kontrollierter Zerstörung, da offenbar alle Überreste der alten Ordnung beseitigt werden. \n\nParis hat sich zu dieser Entwicklung nicht geäußert, obwohl spekuliert wird, dass man dort keinen Grund sieht, das Bündnis mit der neuen Regierung aufzukündigen. Moskau hingegen hat mit Entsetzen auf diese Entwicklung reagiert und die neue Regierung als „senilen Leviathan" bezeichnet, "der alles verschlingt, was ihm im Weg steht, bevor er sich selbst verschlingt". Der Wiederaufbau in den östlichen Vasallenstaaten hat bereits zugenommen, und es scheint, dass sich der neue russische Staat auf einen zukünftigen Krieg vorbereitet, da Krieg offenbar das einzige unvermeidliche Ergebnis ist. \n\nDas Schicksal Europas bleibt nebulös, und wenn die Titanen unweigerlich wieder aufeinanderprallen, wird es nicht nur ein Kampf zwischen Ost und West sein, sondern ein Kampf zwischen Tradition und der unerbittlichen Flut der Moderne."
 news.599.a: "Das ist ja mal was Neues..."
 news.600.t: "Tallinn von [SOV.GetAdjective]en Motorbrigaden überwältigt"
 news.600.d: "Moskau, [SOV.GetNameDef] – TASS\n\nHeute Morgen tauchte auf Telegram ein Video auf, in dem zu sehen ist, wie [SOV.GetAdjective]e Offiziere stolz die [SOV.GetAdjective]e Flagge über dem estnischen Parlament in Tallinn hissen, während der Rest der Stadt in Aschewolken gehüllt ist. Die Verteidiger der Stadt, hauptsächlich nordische und baltische Schnellreaktionsbrigaden, wurden nach anhaltenden [SOV.GetAdjective]-Artillerieangriffen in Kombination mit dem unerbittlichen Vormarsch der motorisierten Infanteriedivisionen von [SOV.GetNameDef] über die Autobahn T1 überwältigt und konnten erst mit der Einnahme der Stadt gestoppt werden. \nDen Verteidigern gelang es, die dichte städtische Umgebung zu nutzen, um die Angreifer für einige Stunden aufzuhalten, aber diese Versuche erwiesen sich mit dem Einsatz chinesischer Drohnen auf dem Schlachtfeld als vergeblich.\n\nTallinn war eines der Hauptziele der Operation Suworow gewesen: die vollständige und totale Unterwerfung der baltischen Staaten unter Moskau. Und da nun eine der drei baltischen Hauptstädte unter [SOV.GetAdjective]er Besatzung steht, wachsen die Aussichten auf einen Erfolg dieser Operation unter ausländischen Analysten und Einheimischen in der Region, die zusammen mit ihrer Regierung massenhaft aus dem Land fliehen und nach Brüssel umziehen. Die verbliebenen Verteidiger müssen nun Barrikaden an wichtigen Autobahnknotenpunkten im Süden des Landes errichten, aber lokale Uneinigkeit und [SOV.GetAdjective]e Motorbrigaden und Kampfflugzeuge könnten diese Aussichten ernsthaft untergraben."
 news.600.a: "Die Lage ähnelt zunehmend der in Polen im Jahr 1939..."
 news.601.t: "Riga von [SOV.GetAdjective]en Streitkräften eingenommen, Baltikum in zwei Hälften geteilt"
 news.601.d: "St. Petersburg, [SOV.GetNameDef]- RT\n\nDie Verteidiger, die die Hauptstadt der Republik Lettland, Riga, umzingelt hatten, hatten sich am frühen Nachmittag nach dem Zusammenbruch der Verteidigungsbarrikaden im Norden und Osten der Stadt ergeben. Ein lettischer Kommandant erklärte: "Wir hatten die Wahl: Entweder wir ergaben uns den Russen oder wir zerstörten unsere geliebte Hauptstadt. Der Fall der Stadt wurde durch [SOV.GetAdjective]e motorisierte und Panzerbrigaden unterstützt, die den Schwung ihrer früheren Siege an der Front nutzten, um über lettische Autobahnen vorzustoßen, bis sie die Hauptstadt ohne nennenswerte Verluste erreichten. \n\nDer Fall der Stadt bedeutet einen wichtigen Wendepunkt in der Verteidigung des Baltikums, da er die Region effektiv in zwei Teile geteilt hat, wobei die eine Hälfte, hauptsächlich estnisches Gebiet, im Wesentlichen zu einer Enklave der NATO-Soldaten wird, die bald ein blutiges Schicksal durch ihre OVKS-Gegenspieler ereilen wird. \nBilder aus den sozialen Medien deuten jedoch darauf hin, dass mit Hilfe der Royal Navy entlang der lettisch-litauischen Grenze Verteidigungsperimeter vorbereitet werden, um hoffentlich den Schwung der [SOV.GetAdjective]en Brigade zu bremsen und die Front so gut wie möglich zu stabilisieren. Doch die Luftüberlegenheit der Russen über der Region sowie die Massenproduktion von Drohnen und ähnlicher Ausrüstung werden es ihnen wahrscheinlich ermöglichen, diesen Schwung noch mindestens viele Wochen lang aufrechtzuerhalten."
 news.601.a: "Das Baltikum steht bereits unter den Fittichen der Russen."
 news.602.t: "Ukraine unter Druck nach dem Fall von Lwiw"
 news.602.d: "Moskau, [SOV.GetNameDef]- RT\n\n[SOV.GetAdjective]e Panzerbrigaden haben kürzlich die von ukrainischen Verteidigern errichteten Barrikaden durchbrochen und sind kurz darauf in den Rest der Stadt vorgedrungen. Die ukrainischen Streitkräfte konnten die [SOV.GetAdjective]n Kräfte eine Zeit lang in Schach halten, indem sie die städtische Dichte von Lemberg nutzten, um die [SOV.GetAdjective]en, die die Stadt einnahmen, in die Falle zu locken, aber mangelnde Koordination und ein überraschender Artillerieangriff in letzter Minute verhinderten diese Ziele. \nDer Widerstand in der Stadt ist nach wie vor sehr stark, sodass die [SOV.GetAdjective]en Infanteristen wachsam bleiben müssen, um sicherzustellen, dass ihre Kontrolle über die Stadt trotz der Aktivitäten der ukrainischen Partisanen intakt bleibt. \n\nNachdem Lwiw, eine der größten Städte der Ukraine, an die [SOV.GetAdjective]e Armee gefallen ist, wäre der nächste logische Schritt für die [SOV.GetAdjective]s, ihre Eroberungen zu konsolidieren, indem sie von Lemberg aus nach Süden vorstoßen, die Grenze zu Rumänien erreichen und die Ukraine von ihrer direkten Verbindung zu ihren NATO-Partnern über Polen abschneiden. Infolgedessen bereiten sich die ukrainischen Streitkräfte auf brutale Auseinandersetzungen mit ihren Feinden vor, da Satellitenbilder eine ausgedehnte Anlage von Bunkern und anderen Verteidigungsanlagen nicht weit nördlich von Rumänien zeigen. \nDies könnte jedoch nicht ausreichen, um den tödlichen Vormarsch der Russen aufzuhalten."
 news.602.a: "Dieser blutige Konflikt hat alle Regionen der Ukraine getroffen."
 news.603.t: "Hamburg fällt, aber heftiger Widerstand trotzt weiterhin der Besatzung"
 news.603.d: "Moskau, [SOV.GetNameDef] – TASS\n\nDie [SOV.GetAdjective]en Streitkräfte setzen ihren Vormarsch fort und durchbrechen die hastig errichteten deutschen Verteidigungsanlagen in U-Bahn-Stationen und den hohen Wolkenkratzern in der ganzen Stadt. Trotz heftigen Widerstands der lokalen Bevölkerung ist das [SOV.GetAdjective]e Militär relativ leicht in das Zentrum Hamburgs vorgedrungen, hat den riesigen Hafen der Stadt eingenommen und damit eine wichtige Lebensader der deutschen Wirtschaft abgeschnitten, während es gleichzeitig zu einem wichtigen Versorgungszentrum für künftige [SOV.GetAdjective]e Operationen am Rhein oder in Dänemark geworden ist. Innerhalb der Stadt kämpfen vereinzelte deutsche Widerstandsgruppen weiter. Die dichte Stadtlandschaft Hamburgs bietet hervorragende Voraussetzungen für Guerillakämpfe und Nahkämpfe, sodass der Kampf um die Stadt noch lange nicht vorbei ist, da Polizeieinheiten, Zivilisten und verbleibende Militäreinheiten alle versuchen, die Russen mit ihren begrenzten Ressourcen zurückzuschlagen. \n\nAls Reaktion darauf hat das deutsche Verteidigungsministerium Evakuierungsbefehle für Zivilisten erlassen und sie aufgefordert, mit Schiffen oder ICE-Zügen vom Hauptbahnhof aus zu fliehen. Der Fall Hamburgs lässt den Weg zum Rhein und nach Dänemark offen und weckt Besorgnis über den nächsten Schritt der Russen: Werden sie weiter nach Westen in Richtung Rheinland und Niederlande vorstoßen oder versuchen, in Dänemark einzumarschieren?"
 news.603.a: "Der Untergang Deutschlands scheint unmittelbar bevorzustehen."
 news.604.t: "München in Flammen, der deutsche Widerstand weiterkämpft"
 news.604.d: "Moskau, [SOV.GetNameDef] – TASS\n\nDie [SOV.GetAdjective]en Streitkräfte setzen ihre Offensive in Deutschland fort und dringen bis ins Herz Bayerns, nach München, vor. Trotz heftigen Widerstands gelang es den [SOV.GetAdjective]en Soldaten, wichtige Versorgungszentren und andere Regierungsgebäude schnell einzunehmen und die [SOV.GetAdjective]-Flagge auf dem Bayerischen Landtag zu hissen, wodurch die deutsche Armee aus der Stadt vertrieben wurde. \n\nTrotz der Niederlage der Stadt auf dem Papier kommt es weiterhin zu Zusammenstößen zwischen dem [SOV.GetAdjective]en Militär und der deutschen Polizei, Militäreinheiten und verzweifelten Zivilisten in U-Bahn-Stationen und den engen Straßen der Stadt. Straßenkämpfe sind an der Tagesordnung, da der deutsche Widerstand versucht, den Vormarsch in Deutschland zu verzögern. Die Ordnung innerhalb der Stadt ist vollständig zusammengebrochen, die Bürger greifen zu Plünderungen, um sich und ihre Familien zu ernähren. Das deutsche Verteidigungsministerium hat noch keine offizielle Erklärung abgegeben, aber ICE-Züge für die Evakuierung aller Zivilisten bereitgestellt, die es zu den Bahnhöfen München Hauptbahnhof, München-Pasing, München-Laim und München Langwied schaffen. \n\nMit fortschreitender Zeit und der weiteren Verschärfung des Konflikts wird die Lage Deutschlands immer dramatischer, und einige Experten spekulieren sogar, dass der mögliche Zusammenbruch Deutschlands als Staat bald Realität werden könnte."
 news.604.a: "Ein Schritt näher am Sieg für den [SOV.GetAdjective]en Staat."
 news.605.t: "Zweites Kölner Panzerduell"
 news.605.d: "Moskau, [SOV.GetNameDef] – TASS\n\nWährend [SOV.GetAdjective]-Truppen tief in das Herz des Rheingebiets und in die Stadt Köln vordringen, ist in den sozialen Medien ein schockierendes Video aufgetaucht, das an das Kölner Panzerduell von 1945 erinnert und vom Nutzer "LukasWeber" gepostet wurde. Die Aufnahmen zeigen ein dramatisches Duell zwischen einem deutschen Leopard 2 und einem [SOV.GetAdjective]en Panzer im Zentrum der Stadt. In dem Video ist zu sehen, wie der Leopard 2 seinen Gegner frontal angreift. Als der [SOV.GetAdjective]e Panzer einen Schuss abfeuert, verfehlt er sein Ziel und trifft stattdessen ein nahe gelegenes Gebäude, wodurch es zu einem kleineren Einsturz kommt. Als der Leopard seinen Turm dreht, feuert er einen präzisen Schuss ab, der den Turm des [SOV.GetAdjective]en Panzers trifft, ein Feuer im Inneren des Panzers auslöst und den Turm in die Luft schleudert. \n\nDas Video verbreitete sich schnell im Internet, und sowohl Internetnutzer als auch Militäranalysten lobten die Präzision und Gelassenheit der deutschen Besatzung unter solch hohem Druck. Viele Menschen in ganz Deutschland, selbst in Gebieten unter [SOV.GetAdjective]er Besatzung, lobten die Besatzung des Leoparden als Symbol für Widerstandsfähigkeit und Hoffnung in diesen dunklen und unsicheren Zeiten. \n\nDas deutsche Verteidigungsministerium gab heute eine Erklärung zum Fall Kölns ab und erklärte, dass Deutschland bis zum bitteren Ende kämpfen und sich niemals den vorrückenden [SOV.GetAdjective]en Truppen ergeben werde. In der Erklärung wurden auch die Besatzungsmitglieder des Leopard 2 aus dem viralen Video gelobt, die als Nationalhelden gewürdigt und deren Handeln als Beispiel für Mut und Entschlossenheit bei der Verteidigung der Nation hervorgehoben wurden."
 news.605.a: "Alte Gewohnheiten sterben schwer."
 news.606.t: "Staub legt sich in Kopenhagen, während die [SOV.GetAdjective]en Kräfte für Ordnung sorgen"
 news.606.d: "Kopenhagen, Dänemark – RTL\n\nDie [SOV.GetAdjective]en Streitkräfte setzen ihren Vormarsch in Dänemark fort und durchbrechen innerhalb weniger Stunden die Landesgrenze, um das Herz des Landes, Kopenhagen, zu erreichen. Trotz der schlecht vorbereiteten Verteidigungsanlagen war dieser Kampf für die [SOV.GetAdjective]en Kräfte nicht einfach. Die dänischen Streitkräfte leisteten in der Stadt letzten Widerstand und nutzten das enge Gelände, um den Vormarsch der [SOV.GetAdjective]en Truppen zu verlangsamen und ihn zu einem brutalen Kampf zu machen.\n\n Die [SOV.GetAdjective]en Truppen, unterstützt durch Luftwaffe, Artillerie und Marine, konnten die Stadt schließlich einnehmen und das [SOV.GetAdjective]e Banner über dem zerstörten dänischen Parlament hissen. Die [SOV.GetAdjective]en Streitkräfte konnten relativ schnell die Ordnung wiederherstellen, da ihre starke Präsenz rund um die Stadt die Einheimischen davon abhielt, zu plündern oder Widerstand gegen die Besatzungsmacht zu leisten. Gerüchten zufolge wurde die dänische Königsfamilie getötet. Einige sagen, ihr Auto sei von einer SU-25 beschossen worden, andere sagen, sie seien bei dem Versuch getötet worden, aus dem Amalienborg-Palast in der Stadt zu fliehen. \n\nDer Verlust Kopenhagens ist ein schwerer Schlag für die NATO. Ohne Kopenhagen steht die Ostsee praktisch unter der Kontrolle der Russen, wodurch die dänische Lücke geschlossen und jeglicher Handel oder Schiffsverkehr verhindert wird. Die Streitkräfte Russlands haben nun mehrere Optionen: Entweder sie nutzen Dänemark, um eine Seelandung in Großbritannien zu starten, sie marschieren in Norwegen ein oder sie setzen ihre Offensive stattdessen in Deutschland fort."
 news.606.a: "Diese Stadt kommt einfach nicht zur Ruhe..."
 news.607.t: "Mitteleuropa in Gefahr, nachdem [SOV.GetAdjective]e Truppen Prag überrannt haben"
 news.607.d: "Angst erschüttert die westlichen Nationen, nachdem die [SOV.GetAdjective]e Regierung endlich die vollständige Einnahme einer der symbolträchtigsten Städte Mitteleuropas, Prag, bekannt gegeben hat. Viele waren davon ausgegangen, dass Prag aufgrund seiner Entfernung zur Front von der Gewalt verschont bleiben würde, doch diese Hoffnungen wurden zunichte gemacht. Die [SOV.GetAdjective]en Truppen durchbrachen die Verteidigungslinien in der Slowakei und erreichten die Stadt viel schneller als erwartet. Europäische Streitkräfte und Reste der tschechischen Armee versuchten, den Vormarsch aufzuhalten, doch dies erwies sich als nahezu unmöglich, da die [SOV.GetAdjective]en Truppen die Stadt von mehreren Seiten aus bombardierten und die historischen Habsburger-Stadtteile verwüsteten. Nach tagelangen Kämpfen und Artilleriefeuer konnten die erschöpften Verteidiger die Stellung nicht mehr halten und zogen sich schließlich aus der Stadt und allen umliegenden Gebieten zurück. \n\nNun weht die Flagge der Russen über dem historischen Stadtzentrum, während gepanzerte und motorisierte Verbände vorrücken, um Nachzügler zu vertreiben. Die Moral der Russen ist bereits hoch, da Generäle und Offizielle der Welt gegenüber mit der Eroberung dieses mitteleuropäischen Preises prahlen.\n\nDie Eroberung Prags ist ein massiver und bedrohlicher Verlust für den Westen, da die Stadt und die umliegenden Gebiete eines der letzten großen Hindernisse für die [SOV.GetAdjective]en Streitkräfte auf ihrem Vormarsch nach Westen waren. Europäische Kommandeure und Kommentatoren befürchten, dass Deutschland und Österreich nun direkt bedroht sein könnten, aber für einige ist der Vormarsch der [SOV.GetAdjective]en Kräfte nur eine Frage der Zeit."
 news.607.a: "Die Tore nach Westeuropa stehen offen."
 news.608.t: "Die zweite Wiener Offensive"
 news.608.d: "Wolgograd, [SOV.GetNameDef]- RT\n\nSchockwellen waren auf dem gesamten Kontinent zu spüren, als die Hauptstadt der Republik Österreich, Wien, erneut an die [SOV.GetAdjective]en Streitkräfte fiel. Es begann damit, dass [SOV.GetAdjective]e Raketen und Kampfjets die europäischen Verteidigungsanlagen rund um die Stadt überwältigen konnten. Nachdem sie die österreichischen Alpen lange Zeit zu ihrem Vorteil genutzt hatten, waren sie schließlich gezwungen, sich nach Wien zurückzuziehen, als [SOV.GetAdjective]e Panzerabteilungen von mehreren Autobahnknotenpunkten aus in die Außenbezirke der Stadt vorstießen. \nLokale Verteidiger nutzten die zahlreichen historischen Paläste und Denkmäler der Stadt als Versorgungszentren, um die Verteidigung Wiens fortzusetzen, und zwangen die [SOV.GetAdjective]en Truppen, viele dieser Gebäude zu zerstören, was schließlich zur Kapitulation der letzten verbliebenen Verteidiger im Schloss Schönbrunn führte.\n\nZum zweiten Mal in der Geschichte haben [SOV.GetAdjective]e Truppen eine Offensive auf Wien gestartet. Nun können sie die Logistikzentren der Stadt nutzen, um leichter Offensiven in andere Teile der Front zu starten, beispielsweise um tiefer in österreichisches Gebiet vorzudringen. In anderen Sektoren der Alpen werden europäische Verteidigungsbarrikaden errichtet, doch [SOV.GetAdjective]e Analysten haben deren Wirksamkeit bereits heruntergespielt."
 news.608.a: "Es ist wieder wie 1945."
 news.609.t: "Amsterdam in Flammen, während [SOV.GetAdjective]e Truppen in die Stadt einmarschieren"
 news.609.d: "Moskau, [SOV.GetNameDef]- RT\n\nDie [SOV.GetAdjective]enStreitkräfte setzen ihre Offensive fort und marschieren in die Stadt Amsterdam, das Herz der niederländischen Nation. Trotz der engen Gassen und der dichten Bebauung der Stadt gelang es den [SOV.GetAdjective]-Streitkräften, die europäischen Truppen rasch aus der Stadt zu vertreiben und die [SOV.GetAdjective]e Flagge auf vielen Regierungsgebäuden zu hissen.\n\nIn Amsterdam herrscht nun angespannte Ruhe, während das [SOV.GetAdjective]e Militär daran arbeitet, die Ordnung wiederherzustellen. Ihre Priorität ist es, die letzten Widerstandsnester zu beseitigen, die aus europäischen und niederländischen Soldaten bestehen, die während des Rückzugs zurückgelassen wurden. Gleichzeitig begann das [SOV.GetAdjective]e Militär mit humanitären Hilfsmaßnahmen, um den anhaltenden Plünderungen in der Stadt entgegenzuwirken. Die Vorräte sind jedoch nach wie vor knapp, sodass einige Bürger zu Plünderungen greifen, um über die Runden zu kommen. \n\nHeute früh gab die niederländische Königin eine Erklärung gegenüber der Presse ab, in der sie schwor, Amsterdam von der [SOV.GetAdjective]en Horde zurückzuerobern, und das Volk aufforderte, in diesen schweren Zeiten geeint und stark zu bleiben. Sie beendete ihre Rede mit den Worten "Lebt wohl, bis bessere Zeiten kommen" und verließ den Raum voller Emotionen."
 news.609.a: "Als sie geht, geht auch ihr Land."
 
 news.610.t: "Antwerpen in Flammen, während [SOV.GetAdjective]e Truppen ins Herz Flanderns vorstoßen"
 news.610.d: "Antwerpen, Königreich der Niederlande – RTL \n\nDie [SOV.GetAdjective]e Streitkräfte setzen ihre Offensive fort und dringen in eine der letzten Hochburgen des Königreichs der Niederlande, Antwerpen, ein. \nAufgrund der geografischen Lage der Stadt konnten die [SOV.GetAdjective]en Streitkräfte die Stadt von allen Seiten umzingeln und eine Großoffensive zur Eroberung der Stadt starten, während sie gleichzeitig ihre Marine einsetzten, um den Hafen von Antwerpen zu blockieren und jede mögliche Flucht aus der Stadt zu verhindern. \n\nTrotz ihrer begrenzten Ressourcen kämpften die NATO-Truppen vor Ort verbissen, wobei sich sogar einige Mitglieder der niederländischen Königsfamilie den Waffen anschlossen, um zu kämpfen und die [SOV.GetAdjective]-Invasoren aufzuhalten. Die [SOV.GetAdjective]en Streitkräfte, die im Vergleich zur NATO über eine überwältigende Artillerie- und Luftunterstützung verfügten, konnten die Verteidiger überwältigen und schließlich alle wichtigen Regierungsgebäude einnehmen, die [SOV.GetAdjective]e Flagge hissen und den Sieg verkünden. \n\nDie Stadt liegt nun in Stille, nur gelegentlich sind Schüsse zu hören, während die [SOV.GetAdjective]e Streitkräfte daran arbeiten, die Ordnung wiederherzustellen, indem sie zunächst die verbleibenden Widerstandsnester in der Stadt beseitigen und anschließend humanitäre Hilfsgüter an die Zivilbevölkerung verteilen und eine Ausgangssperre verhängen. \n\nDas Schicksal der niederländischen Königsfamilie ist unbekannt, dürfte aber düster sein, da in den sozialen Medien Videos gepostet wurden, die zeigen, wie die niederländische Königsfamilie in [SOV.GetAdjective]en Lastwagen eskortiert wird. "
 news.610.a: "Die Niederlande stehen am Abgrund."
 news.611.t: "Europäische Streitkräfte aus der Region Brüssel-Hauptstadt vertrieben"
 news.611.d: "Moskau, [SOV.GetNameDef] – TASS \n\nHeute früh erschien ein [SOV.GetAdjective]er Kommandant in einem Video auf Telegram und behauptete, die europäischen Armeen hätten die Kontrolle über die 19 Gemeinden von Brüssel verloren. Das Video zeigt auch [SOV.GetAdjective]e Panzer und gepanzerte Fahrzeuge, die vor einem zerstörten Europäischen Parlament posieren. Brüssel, einst Hauptstadt großer Organisationen wie der NATO und der EU, ist aus dem Gleichgewicht geraten. Die europäischen Streitkräfte versuchen bereits einen letzten verzweifelten Versuch, diese wertvolle Stadt zurückzuerobern, und reorganisieren sich um die nördlichen und südlichen Gemeinden der Stadt, um die dort stationierten [SOV.GetAdjective]en Armeen zu flankieren, wie [SOV.GetAdjective]e Radaraufklärungssatelliten belegen. [SOV.GetAdjective]e Analysten haben bereits erklärt, dass diese Versuche, ähnlich wie die Schlacht selbst, nur "die europäischen Vorräte erschöpfen" werden, in einem sinnlosen Versuch, die Stadt zurückzuerobern, und vergleichen die Situation mit der Ardennenoffensive im Zweiten Weltkrieg. \n\nÜberall an der Front konnten [SOV.GetAdjective]e Soldaten gesehen werden, die feierten und ihre Moral hoch hielten, während die europäischen Armeen zunehmend erschöpft waren. Um ehrlich zu sein, zeigen Schätzungen, dass die [SOV.GetAdjective]en Streitkräfte in wenigen Wochen in Nordfrankreich einmarschieren werden."
 news.611.a: "Das Herz wurde herausgerissen."
 news.612.t: "Mit dem Fall von Bordeaux stehen die [SOV.GetAdjective]en Kräfte kurz davor, die Pyrenäen zu erreichen"
 news.612.d: "Moskau, [SOV.GetNameDef] – TASS\n\nDie malerischen Gebäude und Denkmäler in den Straßen von Bordeaux wurden kürzlich zum Schauplatz brutaler Haus-zu-Haus-Kämpfe zwischen französischen und [SOV.GetAdjective]e Bodentruppen und Drohnen. Die französischen Verteidiger konnten die enge mittelalterliche Architektur der Altstadt zu ihrem Vorteil nutzen und so den Vormarsch der [SOV.GetAdjective]en Streitkräfte verlangsamen. Ein Artillerieangriff in letzter Sekunde über der Stadt lähmte jedoch die französischen Verteidigungsanlagen, die sich gezwungen sahen, sich südlich der Stadt zurückzuziehen. \nIn den folgenden Stunden räumten [SOV.GetAdjective]e Bodentruppen den verbleibenden Widerstand in den Stadtvierteln aus und hinterließen eine Stadt, die nicht mehr wiederzuerkennen war. \n\nMit der Eroberung der Stadt durch [SOV.GetAdjective]e Kräfte ist der größte Teil des französischen Festlands dem herannahenden [SOV.GetAdjective]en Tsunami zum Opfer gefallen, der die Weinkeller von Bordeaux aktiv in Versorgungszentren umwandelt, um leichter in die südlichen Ebenen Okzitaniens vorzudringen. Die nächste Herausforderung für die [SOV.GetAdjective]e Armee besteht jedoch darin, die Pyrenäen zu umgehen, wo iberische Truppen bereits Verteidigungsperimeter errichten. \nEs bleibt abzuwarten, wie gut diese Verteidigungslinien standhalten werden, aber angesichts der Tatsache, dass es der [SOV.GetAdjective]en Armee gelungen ist, die Alpen zu überqueren und ihren Vormarsch nicht zu verlangsamen, herrscht in den verbleibenden europäischen Oberkommandos wahrscheinlich nicht viel Optimismus."
 news.612.a: "Frankreich schwankt."
 news.613.t: "Lyon in [SOV.GetAdjective]en Händen, sagen Kommandeure"
 news.613.d: "Moskau, [SOV.GetNameDef] – TASS\n\nNach der Kapitulation der letzten verbliebenen europäischen Verteidiger, die sich auf dem Place Carnot in Lyon verschanzt hatten, haben [SOV.GetAdjective]e Kommandeure die vollständige Kapitulation der Stadt gegenüber den Armeen von Russland verkündet. Vor kurzem tauchte ein Telegram-Video auf, das [SOV.GetAdjective]e Soldaten beim Trinken und Feiern im Fort de la Bastille in Grenoble zeigt. Soldaten beim Trinken und Feiern im Fort de la Bastille in Grenoble. \n\nLyon wurde von den meisten Franzosen immer als friedliche Stadt angesehen, bekannt für ihre malerischen Weihnachtsmärkte und das jährliche Lichterfest. Doch dieser Titel ist nun ebenso wie die Stadt selbst der Vergangenheit angehörig. [SOV.GetNameDef] muss sich nun um die Kontrolle über die drittgrößte Stadt Frankreichs kümmern, auch wenn ein Großteil der Bevölkerung in andere Teile des Landes evakuiert wurde. Dennoch wird die Kontrolle von Russland über die Stadt wahrscheinlich nicht von der lokalen Bevölkerung in Frage gestellt werden, da diese auf keinen Fall möchte, dass weitere Gebäude in einem sinnlosen Aufstand zerstört werden. \n\nDer Fall der Stadt erwies sich für [SOV.GetNameDef] als äußerst vorteilhaft für seine Versuche, das Mittelmeer zu erreichen und Italien vom Rest des Festlandes abzuschneiden. Es bleibt abzuwarten, wie sich diese Kräfte neu organisieren und besser reagieren können, obwohl internationale Beobachter wenig Hoffnung haben, dass Europa seine Chancen nutzen kann."
 news.613.a: "Hauptstadt der Lichter, hell erleuchtet."
 news.614.t: "Rom fällt unter schneller Offensive"
 news.614.d: "In ganz Westeuropa brachen Entsetzen und Empörung aus, als die [SOV.GetAdjective]e Führung mit großem Pomp die Eroberung einer unbestreitbaren Ikone der westlichen Zivilisation, Rom, verkündete. Angesichts der schweren Verluste in Mitteleuropa und Norditalien investierten die europäischen Streitkräfte massiv in die Verteidigung Mittelitaliens, wobei sie sich insbesondere auf die Stadt Rom konzentrierten. Um die Moral zu stärken, betonten hochrangige Präsidenten und Generäle die Notwendigkeit der Verteidigung Roms und die historische Bedeutung der Stadt. Es scheint jedoch, dass die Herausforderung größer war als der Mut, den sie aufbringen konnten. In einer massiven, koordinierten Offensive, die öffentlich als "Operation Alaric" bekannt gegeben wurde, griffen Panzer- und mechanisierte Verbände die Stadt mit massiver Unterstützung von Bodenangriffsflugzeugen an. Nach mehr als einer Woche intensiver Kämpfe gaben die Verteidigungskräfte schließlich dem Druck nach und zogen sich hastig aus der Stadt zurück, da den meisten Einheiten die Munition oder die Soldaten ausgingen. \n\nIn einem grandiosen Spektakel versammelten sich die obersten Generäle der [SOV.GetAdjective]en Streitkräfte im alten römischen Kolosseum, um die Stätte zu besichtigen und mit Begeisterung die bevorstehende Niederlage ihres Feindes zu verkünden. Die Bilder von Flaggen und Paradeformationen auf den berühmten Straßen Roms sind Bilder, die sicherlich in die Geschichtsbücher eingehen werden. \n\nWährend Moskau feiert, wissen nur wenige in den westlichen Oberkommandos oder der zivilen Führung, wie sie reagieren sollen oder was sie zu diesem Zeitpunkt tun sollen. "
 news.614.a: "Eine antike Stadt brennt erneut."
 news.615.t: "[SOV.GetAdjective]e Panzer strömen tief in die Iberische Halbinsel hinein"
 news.615.d: "Moskau, [SOV.GetNameDef] – TASS\n\nEs fand eine kurze Militärparade statt, diesmal auf dem halb zerstörten Plaza Mayor in Madrid. [SOV.GetAdjective]e Soldaten machten kurze Zwischenstopps in den letzten noch verbliebenen Restaurants der Stadt, bevor sie ihren Blick auf den Rest Spaniens richteten. Die letzten verbliebenen europäischen Streitkräfte auf dem Kontinent haben sich über den Baetic-Bergen im Süden verschanzt und sind bereit, ihren letzten Widerstand zu leisten. \n\nAusländische Analysten setzen jedoch keine Hoffnungen auf diese schlecht organisierte Verteidigungslinie. Der Fall Madrids bedeutet nicht nur Chaos für die spanische Regierung, sondern bietet auch einen Ausgangspunkt für denjenigen, der die Stadt kontrolliert, um die ausgedehnten Autobahn- und Schienennetze zu nutzen und jeden Widerstand gegen seine Autorität außerhalb der Stadt schnell zu überwinden. Madrid wurde für eine zentralisierte Kontrolle konzipiert und wird nun den Russen als Drehscheibe dienen, die sie zur Sicherung der Iberischen Halbinsel benötigen. \n\nDer Verlust Madrids ist auch die letzte große Niederlage, die nötig war, um alle ausländischen Analysten davon zu überzeugen, dass die Stunde für [SOV.GetNameDef] geschlagen hat. In den sozialen Medien verbreiten sich bereits Berichte über Meutereien europäischer Soldaten, wobei ein Kommandant erklärte, er werde sein Leben nicht opfern, "wenn Europa seines bereits verloren hat"."
 news.615.a: "Die Schrecken des Krieges haben nun jeden Europäer erreicht."
 news.616.t: "Barcelona fällt nach brutaler Belagerung"
 news.616.d: "Vor wenigen Stunden hat das [SOV.GetAdjective]e Verteidigungsministerium die Kapitulation aller alliierten Streitkräfte im Großraum Barcelona bekannt gegeben. Nur wenige spanische Landstreitkräfte und lokale katalanische Milizen halten noch stand, was einen weiteren Sieg für [SOV.GetNameDef] in Südwesteuropa bedeutet. In sozialen Medien wie Telegram und VK kursieren derzeit Videos, die zeigen, wie Soldaten und Spezialeinheiten der Russen die Siegesfahne über dem Kolumbus-Denkmal hissen und die Avinguda Diagonal entlangmarschieren. \nDie Stadt, einst ein wichtiges Kultur-, Wirtschafts- und Finanzzentrum, wurde verwüstet, wobei das Gotische Viertel und El Poblenou die schwersten Schäden erlitten haben. In den letzten Wochen floh der Großteil der Stadtbevölkerung nach Valencia oder auf die Balearen, wodurch mehrere Stadtteile völlig verlassen waren.\n\nDer Fall Barcelonas bedeutet nach Ansicht der meisten Analysten das Ende der iberischen Verteidigungsbemühungen. Da [SOV.GetNameDef] nun die Kontrolle über einen der wichtigsten Passagier- und Containerhäfen Europas innehat, ist die Versorgung der europäischen Streitkräfte in Katalonien nahezu unmöglich geworden. Moskau hat erklärt, dass dieses Ereignis ein "entscheidender Schritt zur Sicherung des Mittelmeerraums" sei. Es bleibt abzuwarten, ob sich die europäischen Streitkräfte nach dieser Niederlage neu formieren werden, aber zum jetzigen Zeitpunkt haben die meisten die Unvermeidbarkeit einer europäischen Niederlage akzeptiert."
 news.616.a: "Die werden diese Kathedrale nie fertig bauen, oder?"
 news.617.t: "Lissabon fällt unter [SOV.GetAdjective]em Vormarsch"
 news.617.d: "Der Druck auf die NATO nimmt weiter zu, da es den [SOV.GetAdjective]en Streitkräften endlich gelungen ist, die iberische Großstadt Lissabon einzunehmen.\n\nAngesichts der sich rapide verschlechternden Lage in Westeuropa hofften einige, dass Iberien, insbesondere die großen Ballungszentren, dem raschen Vormarsch des Feindes standhalten könnten. Die verbliebenen lokalen portugiesischen und europäischen Verbände verteidigten die Stadt in der Zuversicht, dass sie auf dem Seeweg verstärkt und versorgt werden könnten, doch diese Hoffnungen wurden zunichte gemacht.\n\nUnter dem kombinierten Angriff von Panzern, Marineinfanterie und Luftlandetruppen gelang es den [SOV.GetAdjective]en Streitkräften, die Verteidiger auszubluten und aus der Stadt zu vertreiben. Viele flohen auf dem Seeweg oder zogen sich aufs Land zurück, um sich neu zu formieren. Die Bilder der siegreichen [SOV.GetAdjective]en Infanterie und Panzerkolonnen, die in die Innenstadt von Lissabon und die historischen Viertel vorrückten, bestätigten jedoch nur den Verlust der Stadt und verstärkten die düstere Stimmung im Westen. Lissabon ist eine von vielen europäischen Hauptstädten, die durch die vorrückenden [SOV.GetAdjective]en Soldaten gefallen sind, und nur wenige haben zu diesem Zeitpunkt noch Hoffnung, dass der Rest des Kontinents gerettet werden kann. Angesichts der Belagerung Iberiens scheint das Schicksal Europas fast besiegelt zu sein."
 news.617.a: "Ein europäisches Juwel am Atlantik verloren."
 news.618.t: "[SOV.GetAdjective]e Kräfte stürmen Sofia"
 news.618.d: "Angst und Unsicherheit beherrschen den Balkan, nachdem [SOV.GetAdjective]e Truppen mit großer Geschwindigkeit und tödlicher Gewalt die größte bulgarische Stadt Sofia eingenommen haben. \n\nNach einer Reihe bedeutender Vorstöße und Siege in der Ukraine, Moldawien und Rumänien sind die [SOV.GetAdjective]en Truppen rasch tiefer in den Balkan vorgedrungen. Da sie den Vormarsch nicht aufhalten konnten, verteidigten westeuropäische und lokale bulgarische Verbände gemeinsam Sofia in der Hoffnung, die feindlichen Operationen zur Eroberung der restlichen Region vereiteln zu können. Allerdings schwächten Panzer und Artilleriefeuer der [SOV.GetAdjective]en Armee die bulgarische Stellung schnell, woraufhin die Infanterie folgte und in die Stadt einbrach. \n\nEs kam zu Häuserkämpfen, als die Verteidiger verzweifelt versuchten, den Verlust der wichtigsten Innenstadtgebiete zu verhindern, aber letztendlich scheiterten sie daran, den feindlichen Angriff aufzuhalten. Die Verteidiger wurden zum Rückzug gezwungen, als die Russen begannen, auf andere Bereiche der bulgarischen Front vorzustoßen und die Versorgungswege in die Stadt abzuschneiden. \n\nNach dem Verlust Sofias gehen Beobachter und Kommentatoren davon aus, dass die europäischen Streitkräfte nun wahrscheinlich eine neue Verteidigungsposition im Landesinneren planen, doch Optimismus ist weiterhin kaum zu spüren. Die benachbarten Balkanstaaten im Westblock bereiten sich nun auf einen schweren Kampf vor, da die [SOV.GetAdjective]en Streitkräfte versuchen, ihre jüngsten Eroberungen in der Region zu konsolidieren."
 news.618.a: "Blut tränkt weiterhin den Balkan."
 news.619.t: "Feuer über der Akropolis, während [SOV.GetAdjective]e Streitkräfte ins Herz Griechenlands vorrücken"
 news.619.d: "Moskau, [SOV.GetNameDef] – RT \n\n[SOV.GetAdjective]e Streitkräfte sind heute in Griechenland einmarschiert und haben eine der wichtigsten Städte des Landes, Athen, eingenommen. Die griechischen Streitkräfte versuchten, sich unter Ausnutzung der engen Stadtstruktur verzweifelt zu verteidigen, wurden jedoch schließlich überwältigt und mussten sich aus der Stadt zurückziehen. [SOV.GetAdjective]e Streitkräfte konnten das Parlamentsgebäude stürmen und die [SOV.GetAdjective]e Flagge hissen. Die griechische Regierung war bereits Stunden vor dem Angriff evakuiert worden. Es ist offensichtlich, dass sich die Hellenische Republik in einer sehr schwierigen Lage befindet und ohne die Unterstützung ihrer Verbündeten bald fallen könnte. Darüber hinaus haben die [SOV.GetAdjective]en Streitkräfte den Hafen von Piräus eingenommen und damit eine wichtige wirtschaftliche Lebensader Griechenlands abgeschnitten.\n\nDennoch ist der Kampf um Athen noch lange nicht vorbei. Polizeieinheiten, lokale Zivilisten und verbliebene griechische Soldaten leisten weiterhin heftigen Widerstand und führen Hinterhalte und Blitzangriffe gegen die vorrückenden [SOV.GetAdjective]en Kolonnen durch. Aus der ganzen Stadt werden Straßenkämpfe gemeldet, da die Verteidiger versuchen, die Besetzung zu verzögern und die evakuierten Zivilisten zu schützen. Das griechische Verteidigungsministerium hat eine landesweite Botschaft veröffentlicht, in der es zum weiteren Widerstand aufruft. An die Verteidiger in Athen richtete das Verteidigungsministerium die Aufforderung, alle verfügbaren Mittel einzusetzen, um den Vormarsch der Russen zu verlangsamen."
 news.619.a: "Während die Flammen über der griechischen Hauptstadt lodern, kämpft Griechenland nicht nur um seine Städte, sondern um sein Überleben."
 news.620.t: "[SOV.GetAdjective]e Streitkräfte landen an der britischen Küste"
 news.620.d: "London, Sky News (SKY) \n\nIn einer überraschenden Eskalation des Konflikts haben [SOV.GetAdjective]e Truppen eine amphibische Landung an der Ostküste Großbritanniens durchgeführt, mehrere kleine Küstenstädte angegriffen und lokale Verteidigungseinheiten schnell überwältigt. Die britischen Behörden bestätigen, dass mehrere Transportschiffe, unterstützt von Marineinfanterie und Hubschrauberabteilungen, vor Tagesanbruch die Küstenverteidigung durchbrochen haben. Die Radaranlagen an der Küste wurden in den ersten Minuten des Angriffs getroffen, wodurch mehrere Sektoren blind waren, als [SOV.GetAdjective]e Einheiten ins Landesinnere vorrückten.\n\nDie ersten Kämpfe brachen rund um die Hafenanlagen und nahegelegene Wohngebiete aus, wo hastig zusammengestellte Formationen der Home Guard versuchten, den Vormarsch zu verzögern. Augenzeugen berichten von Kolonnen gepanzerter Fahrzeuge, die unter schwerem Deckungsfeuer von den Stränden abrückten, während Hubschrauber über ihnen patrouillierten. Einheiten der britischen Armee, die aus weiter westlich gelegenen Garnisonen herbeigeeilt sind, sollen an wichtigen Straßenkreuzungen gegen die Speerspitzen der Russen kämpfen, um ein tieferes Vordringen in Richtung der großen städtischen Zentren zu verhindern. \n\nRegierungsbeamte haben den Angriff verurteilt und ihn als "beispiellosen Akt der Aggression auf britischem Boden" bezeichnet. Für mehrere Küstengemeinden wurden Evakuierungsbefehle erteilt, und in der gesamten Region heulen weiterhin Luftschutzsirenen, während militärische Einrichtungen immer wieder Ziel von Raketenangriffen werden. \n\n[SOV.GetAdjective] Die staatlichen Medien behaupten, die Landung sei Teil einer "Zwangsmaßnahme", die darauf abziele, Frieden zu erzwingen, während die übrigen westlichen Analysten warnen, dass dieser Schritt Vorbereitungen für eine umfassendere Offensive auf der gesamten Insel signalisieren könnte.\n\n"
 news.620.a: "Die unmögliche Landung wurde vollbracht."
 
 news.621.t: "Donetsk fällt an europäische Streitkräfte"
 news.621.d: "Berlin, Deutsche Welle (DW) \n\nNach wochenlangen erbitterten Straßenkämpfen haben europäische Streitkräfte Donezk eingenommen und damit eine der längsten und blutigsten Schlachten im Osten beendet. Mit überwältigender Luftunterstützung und präziser Artillerie durchbrachen Panzerdivisionen die Verteidigungslinien und stürmten das industrielle Zentrum der Stadt. Ganze Stadtteile liegen in Trümmern, das Industriegebiet ist dem Erdboden gleichgemacht, Hochhäuser sind durch Granatenbeschuss ausgehöhlt und die Straßen sind mit den Trümmern der Belagerung übersät. \n\nTrotz des Falls der Stadt leisten isolierte [SOV.GetAdjective]e und irreguläre Einheiten weiterhin Widerstand aus Tunneln und Kellern und verwandeln Donezk in ein Labyrinth, das dem Mariupol während der [SOV.GetAdjective]en Invasion der Ukraine nicht unähnlich ist. Die Einheimischen, die noch nicht geflohen sind, sitzen zwischen einstürzender Infrastruktur und umfassenden Operationen zur Bekämpfung von Aufständischen fest. \n\nDie europäischen Befehlshaber haben die Offensive zu einem "strategischen Sieg" erklärt, da sie die Kontrolle über den Industriegürtel von Donbass gesichert und den Weg nach Rostow geöffnet hat. Doch selbst als die ukrainische Flagge über dem zerstörten Rathaus gehisst wird, gibt es keine Anzeichen dafür, dass die Kämpfe wirklich beendet sind."
 news.621.a: "2014 gerächt."
 news.622.t: "Luhansk von europäischen Streitkräften eingenommen"
 news.622.d: "Brüssel, Euronews (EN) \n\nEuropäische Streitkräfte haben Luhansk nach einer unerbittlichen Belagerung gesichert, die die Verteidigungsanlagen der Stadt durchbrochen und einen Großteil davon in Schutt und Asche gelegt hat. Panzer- und mechanisierte Infanteriebataillone schlossen die Stadt von Westen und Süden vollständig ein, unterbrachen alle verbleibenden Versorgungslinien und drängten die Verteidiger in isolierte Enklaven zurück. Drohnen-gesteuerte Artillerie traf Kommandoposten und Treibstoffdepots mit Präzision und zerstörte ganze Blöcke des Industriegebiets der Stadt. \n\nInnerhalb der Stadt war der Widerstand heftig, das Zentrum war in ein Labyrinth aus Todeszonen verwandelt worden, was die Europäer zu brutalen Haus-zu-Haus-Kämpfen zwang. Die heftigsten Kämpfe fanden rund um den zentralen Eisenbahnknotenpunkt statt, wo die letzte organisierte [SOV.GetAdjective]e Garnison Widerstand leistete, bis der Bahnhof selbst in Schutt und Asche lag. \n\nDie europäischen Befehlshaber feierten den Sieg als letzten Schritt zur Sicherung des Donbass, da mit dem Fall von Luhansk die letzte große Verteidigungsbarriere in der Region beseitigt wurde. Der Vormarsch öffnet nun den Korridor nach Rostow am Don, einem symbolischen und strategischen Zugangspunkt zur Südflanke von Russland. Doch trotz der Flaggenzeremonie auf dem zerstörten Gebäude der Regionalverwaltung kommt es am Stadtrand weiterhin zu vereinzelten Schusswechseln und Überfällen. Luhansk ist gefallen, aber der Kampf jenseits seiner Ruinen ist noch lange nicht vorbei."
 news.622.a: "Weiter nach Rostow!"
 news.623.t: "Warschau nach verheerenden Straßenkämpfen zurückerobert"
 news.623.d: "Paris, France 24 (F24) \n\nDie europäischen Streitkräfte haben Warschau nach einer brutalen zweiten Schlacht zurückerobert, die die polnische Hauptstadt von einem Ende zum anderen verwüstet hat. Der Angriff begann mit koordinierten Schlägen auf die Außenbezirke der Stadt, wo verschanzte [SOV.GetAdjective]e und kollaborierende Einheiten ganze Stadtteile in befestigte Todeszonen verwandelt hatten. Artillerie und drohnengesteuerte Raketen bombardierten tagelang die Verteidigungsstellungen, bevor gepanzerte Kolonnen durch die zerstörten Straßen in Richtung Weichsel vorstießen. Innerhalb der Stadt waren die Kämpfe heftig und unerbittlich. [SOV.GetAdjective]e Truppen, unterstützt von lokalen Freischärlern, verwandelten die Vorkriegsquartiere Warschaus in ein Labyrinth aus Barrikaden und Schussstellungen. Die heftigsten Zusammenstöße ereigneten sich in Śródmieście und im Stadtteil Praga, wo europäische Infanteristen sich Raum für Raum durch eingestürzte Mietshäuser und ausgebrannte Straßenbahnlinien kämpften. Die Kommandeure verglichen die Kämpfe mit den schlimmsten Momenten der ersten Schlacht um die Stadt, in der beide Seiten schwere Verluste erlitten. \n\nAls die europäischen Einheiten den Kultur- und Wissenschaftspalast erreichten, war der organisierte Widerstand größtenteils zusammengebrochen. Dennoch verlangsamten vereinzelte Scharfschützen, mit Sprengfallen gespickte Korridore und improvisierte Stellungen weiterhin den Vormarsch. Die Rückeroberung des Sejm-Gebäudes gelang erst nach einem langwierigen Feuergefecht, das das Innere durch Explosionen völlig zerstörte. \n\nDie europäischen Kommandeure feierten die Operation als großen Sieg, mit dem sie die Kontrolle über eine der umkämpftesten Hauptstädte des Krieges zurückerobert hatten."
 news.623.a: "Polen ist wieder gerettet!"
 news.624.t: "Budapest fällt nach erbitterter zweiter Schlacht"
 news.624.d: "Wien, ÖRF Nachrichten (ÖRF) \n\nDie europäischen Streitkräfte haben Budapest nach einem der härtesten Angriffe der gesamten Kampagne zurückerobert. Ungarische Truppen, die weiterhin an der Seite [SOV.GetAdjective]en Einheiten kämpften, verwandelten die Stadt in ein befestigtes Schlachtfeld, wobei jede Brücke, jede Allee und jeder Hügel verteidigt wurde, als hinge der Ausgang des Krieges davon ab. Die Offensive begann mit Präzisionsschlägen auf Kommandoposten in ganz Buda, gefolgt von schweren Bombardements, die mehrere Stützpunkte aus der Sowjetzeit in Schutt und Asche legten.\n\nDie Überquerung der Donau erwies sich als die verlustreichste Phase der Operation. Ungarische und sowjetische Verteidiger sprengten Teile der Kettenbrücke und verminten die Flussufer großflächig, sodass die europäischen Infanteristen unter ständigem Beschuss vorrücken mussten. Panzereinheiten versuchten mehrere Überquerungen, die jedoch alle auf Panzerabwehrfallen und Artilleriefeuer von den Höhen des Burgbergs und des Gellértbergs stießen. Die Kämpfe entlang des Flusses wurden von den Kommandeuren als "Stahlhölle" beschrieben.\n\nNachdem sie sich auf der Budaer Seite einen Brückenkopf gesichert hatten, drangen die europäischen Streitkräfte durch enge, verwinkelte Gassen vor, die den Verteidigern zugute kamen. Ungarische Einheiten führten unzählige Hinterhalte durch, während [SOV.GetAdjective]e Einheiten ihre Stellungen im alten Palastviertel verteidigten. Der endgültige Durchbruch gelang erst, nachdem ein kombinierter Luft- und Artillerieangriff die letzte Verteidigungslinie mit Blick auf die Donau zerstört hatte, sodass Panzerbataillone durch die westlichen Stadtteile vorrücken konnten. \n\nDie europäischen Kommandeure erklärten die Operation zu einem großen Sieg, da Budapest als wichtiger logistischer und politischer Knotenpunkt für die [SOV.GetAdjective]en Truppen gedient hatte. Sein Fall unterbricht effektiv die Versorgungswege der [SOV.GetAdjective]en Streitkräfte nach Mitteleuropa und zwingt die ungarischen Streitkräfte zu einem raschen Rückzug in Richtung Karpaten. Doch selbst nachdem die Stadt wieder unter europäischer Kontrolle steht, sind in den Ruinen der Hauptstadt weiterhin Scharfschützen und verstreute Widerstandszellen aktiv."
 news.624.a: "Ungarns Wagnis scheitert."
 news.625.t: "Bukarest nach heftigen Kämpfen zurückerobert"
 news.625.d: "Rom, Rai News 24 (RAI) \n\nEuropäische Streitkräfte haben Bukarest nach einem schnellen, aber brutalen Angriff zurückerobert, der die Verteidigungslinien der [SOV.GetAdjective]en Streitkräfte und der rumänischen Loyalisten in der Hauptstadt zerschlagen hat. Die Offensive begann mit koordinierten Angriffen auf die westlichen Stadtteile, wodurch die ersten Verteidigungslinien durchbrochen und die Verteidiger in Richtung Stadtzentrum zurückgedrängt wurden. Ganze Stadtteile in Militari und Crângași wurden niedergebrannt, als europäische Panzer unter ständigem Beschuss durch die Straßen vorrückten.\n\nDie heftigsten Kämpfe fanden rund um die Piața Unirii und den Parlamentspalast statt, wo [SOV.GetAdjective]e Truppen Tunnel und U-Bahn-Eingänge nutzten, um den Vormarsch zu verzögern. Europäische Einheiten kämpften sich Raum für Raum durch den riesigen Parlamentskomplex, bevor sie ihre Flagge über der zerstörten Fassade hissten. Der Widerstand der Loyalisten hielt in den nördlichen Stadtteilen an, aber Luftangriffe und Drohnenunterstützung brachten die letzten organisierten Widerstandsnester nach und nach zum Schweigen.\n\nDie Kommandeure bezeichnen den Sieg als einen wichtigen Durchbruch auf dem Balkan, der die Versorgungswege der Russen unterbrach und die loyalen Streitkräfte zum Rückzug nach Ploiești und in die Karpatenpässe zwang. Dennoch sind vereinzelte Scharfschützen und versteckte Zellen weiterhin aktiv, sodass die Stadt trotz ihrer Befreiung instabil bleibt."
 news.625.a: "Weiter zum Dnjestr!"
 
 news.626.t: "Vilnius nach schnellem europäischen Angriff zurückerobert"
 news.626.d: "Stockholm, SVT Nyheter (SVT)\n\nEuropäische Streitkräfte haben Vilnius nach einer scharfen, koordinierten Offensive zurückerobert, die die [SOV.GetAdjective]en Einheiten, die sich in der ganzen Stadt verschanzt hatten, überwältigte. Der Angriff begann im Morgengrauen mit Präzisionsschlägen auf Kommandoposten rund um Šeškinė und Antakalnis, wodurch der äußere Verteidigungsring zusammenbrach und die überlebenden Einheiten zum Rückzug in die Altstadt gezwungen wurden. Panzerkolonnen, die aus dem Westen vorrückten, schnitten die Fluchtwege entlang des Flusses Neris ab und isolierten die Widerstandsnester.\n\nDie Straßenkämpfe verschärften sich, als die europäische Infanterie in das historische Zentrum vorrückte. [SOV.GetAdjective]e Truppen versuchten, die Zugänge zum Domplatz und zum Gediminas-Hügel-Komplex zu halten, mussten sich jedoch aufgrund anhaltenden Artilleriefeuers rasch zurückziehen. In den engen Gassen der Altstadt kam es zu Zusammenstößen, wo loyale Kämpfer aus Innenhöfen und Ruinen von Wohnhäusern heraus Hinterhalte legten, bevor sie durch methodische Säuberungsaktionen vertrieben wurden.\n\nBei Einbruch der Dunkelheit wurden die letzten organisierten Verteidiger in Richtung der Vororte bei Naujoji Vilnia zurückgedrängt, wo sie zusammenbrachen und sich nach Osten zurückzogen. Die europäischen Befehlshaber beanspruchen nun die vollständige Kontrolle über die Hauptstadt und bezeichnen die Operation als einen wichtigen Schritt zur Sicherung des Ostseekorridors und zur Wiederherstellung der Stabilität entlang der Nordostfront."
 news.626.a: "Das Baltikum wird das Blatt wenden."
 news.627.t: "Belgrad fällt nach heftigen Straßenkämpfen"
 news.627.d: "Athen, ERT News (ERT)\n\nEuropäische Streitkräfte haben Belgrad nach einem vernichtenden Angriff eingenommen, der [SOV.GetAdjective]e und serbische Loyalistenstellungen in der gesamten Hauptstadt zerschlagen hat. Die Offensive begann mit schweren Angriffen auf Militärbezirke in Novi Beograd, wodurch Kommandozentralen lahmgelegt und die Verteidiger gezwungen wurden, sich an die Ufer der Save und der Donau zurückzuziehen. Panzereinheiten drangen unter Artillerie-Deckung in die Altstadt vor und durchbrachen barrikadierte Boulevards und befestigte Kreuzungen. n\nDie heftigtesten Kämpfe entbrannten um die Festung Kalemegdan und den Platz der Republik, wo [SOV.GetAdjective]e und serbische Einheiten wiederholt Gegenangriffe aus Tunneln und beschädigten Gebäuden starteten. Die europäische Infanterie rückte Block für Block vor und räumte unter ständigem Beschuss durch Scharfschützen die Stellungen. Bei Zusammenstößen innerhalb des Parlamentskomplexes brannten Teile des historischen Gebäudes nieder, bevor sich die Verteidiger zurückzogen.\n\nAm späten Abend versuchten die verbliebenen loyalen Truppen, in Richtung Zvezdara auszubrechen, doch Luftangriffe und Umzingelungsmanöver schnitten ihnen den Rückzug ab. Die europäischen Befehlshaber melden nun die vollständige Kontrolle über die Stadt und bezeichnen den Sieg als entscheidenden Schlag gegen die russisch-serbische Allianz auf dem Balkan. In den Außenbezirken kommt es weiterhin zu vereinzelten Schusswechseln, aber der organisierte Widerstand ist zusammengebrochen."
 news.627.a: "Es ist Zeit, dass die Serben ihre Schuld begleichen."
 news.628.t: "Woronesch nach unerbittlichem europäischen Vorstoß eingenommen"
 news.628.d: "Helsinki, Yle Uutiset (YLE)\n\nEuropäische Streitkräfte haben Woronesch nach einer monatelangen Offensive eingenommen, bei der sie mehrere Verteidigungslinien südlich der Stadt durchbrochen haben. Der Angriff begann mit koordinierten Artillerieangriffen auf befestigte Stellungen entlang des Don, gefolgt von schnellen Panzervorstößen, die die lokalen Garnisonen überwältigten und die Hauptverkehrsstraße in die Stadt unterbrachen. Das [SOV.GetAdjective]e Kommando versuchte, sich um die zentralen Stadtteile herum neu zu formieren, doch der zunehmende Druck zwang es zu einem hastigen Rückzug.\n\nIn Woronesch selbst war der Widerstand hart. [SOV.GetAdjective]e Einheiten kämpften aus Wohnblocks, Fabrikkomplexen und improvisierten Stellungen entlang des Prospekt Revolyutsii und verursachten in Nahkämpfen schwere Verluste. Die europäische mechanisierte Infanterie drängte Straße für Straße vor und räumte unter ständiger Drohnenüberwachung Verteidigungsstellungen. Der entscheidende Moment kam, als europäische Panzer die Brückenübergänge eroberten, die Fluchtwege der [SOV.GetAdjective]en Einheiten unterbrachen und ihre letzte Verteidigungsstellung zum Einsturz brachten. Der Fall der Stadt öffnet den Weg nach Kursk und bedroht die Stellungen der [SOV.GetAdjective]en Armee weiter entlang des Don-Beckens. Während kleine Gruppen von [SOV.GetAdjective]en Kämpfern in den Außenbezirken weiterhin aktiv sind, hat der organisierte Widerstand innerhalb von Woronesch weitgehend aufgehört."
 news.628.a: "Genau wie unsere Vorgänger."
 news.629.t: "Krasnodar nach intensiver südlicher Offensive eingenommen"
 news.629.d: "Tiflis, Rustavi 2 (R2)\n\nEuropäische Streitkräfte haben Krasnodar nach einer schnellen, aber hart umkämpften Offensive in den südlichen Ebenen von Russland eingenommen. Der Vormarsch begann mit Luftangriffen auf Treibstoffdepots und Kommandoposten am Stadtrand, wodurch die Logistik von [SOV.GetAdjective]en Einheiten lahmgelegt wurde, bevor gepanzerte Einheiten aus dem Nordwesten vorrückten. Die Verteidiger von, verstärkt durch kosakische Freiwilligenformationen, versuchten, die Zugänge entlang des Kuban-Flusses zu halten, wurden jedoch schnell durch anhaltenden Artilleriefeuer überwältigt.\n\nInnerhalb der Stadt verstärkte sich der Widerstand. Die Truppen von den Russen verbarrikadierten wichtige Straßen und nutzten die dichte Bebauung rund um das zentrale Marktviertel, um Hinterhalte zu legen. Die europäische Infanterie rückte methodisch vor und räumte unter Drohnenführung Wohnblocks und Industriegebiete. Die heftigsten Kämpfe brachen in der Nähe der Durchgangsstraße Red Street aus, wo loyale Truppen einen letzten Gegenangriff starteten, bevor sie in die südlichen Vororte zurückgedrängt wurden.\n\nAm späten Abend versuchten die verbliebenen Verteidiger, sich nach Noworossijsk zurückzuziehen, wurden jedoch durch Umzingelungsmanöver abgeschnitten. Die europäischen Befehlshaber bestätigen nun die vollständige Kontrolle über Krasnodar und bezeichnen die Operation als entscheidenden Erfolg, der die Kuban-Region sichert und die Positionen der Russen entlang der Schwarzmeergrenze bedroht. Außerhalb der Stadt kommt es weiterhin zu vereinzelten Gefechten, aber der organisierte Widerstand ist weitgehend zusammengebrochen."
 news.629.a: "Die kaukasische Front bricht zusammen."
 news.630.t: "Belagerung von St. Petersburg endet mit dem Fall der Stadt"
 news.630.d: "Hamburg, Deutschland – Die Welt\n\nEine der historischen Kaiserhauptstädte von Russland, St. Petersburg, ist nach einer überraschend erfolgreichen Offensive im Norden kürzlich in europäische Hände gefallen, während die Allianz im Rahmen einer umfassenderen Kampagne zur Schwächung der verbleibenden [SOV.GetAdjective]en Streitkräfte weiter in das Feindgebiet vordringt. Mit den militärischen Erfolgen an der Ostseegrenze hat sich die Strategie im Nordwesten sowohl in symbolischer als auch in militärischer Hinsicht von Eindämmung zu Druck verschoben.\n\nVon Skandinavien geführte Kontingente haben den Fluss Luga überquert und westlich der Stadt eine feste Präsenz aufgebaut. Die Unterstützung durch baltische Logistikeinheiten und deutsche Panzer hat die Offensive gefestigt, während Präzisionsschläge, die Berichten zufolge mit den schnellen Eingreiftruppen koordiniert wurden, auf wichtige Verkehrsknotenpunkte entlang der Moskauer Autobahn abzielten.\n\nWährend die staatlichen Medien von Russland darauf bestehen, dass die Stadt sicher bleibt, deuten zeitweilige Stromausfälle, Treibstoffknappheit und eine Zunahme der Evakuierungen auf das Gegenteil hin. Unabhängige Beobachter haben lokale Aufnahmen gemacht, die lange Schlangen vor Brotlagerhäusern und improvisierte Luftschutzbunker in U-Bahn-Stationen zeigen. Mit dem Fall der nördlichen Hauptstadt von Russland haben die europäischen Truppen bereits begonnen, ihre Positionen neu zu ordnen, da sich ihr Fokus nun direkt auf die [SOV.GetAdjective]e Hauptstadt Moskau verlagert. "
 news.630.a: "Die Geschichte wiederholt sich oft, sagt man."
 news.631.t: "Wolgograd fällt nach brutaler Belagerung"
 news.631.d: "London, BBC World Service (BBC)\n\nEuropäische Streitkräfte haben Wolgograd nach einer zermürbenden Belagerung eingenommen, die düstere Vergleiche mit den Schlachten hervorrief, die dort vor Generationen ausgetragen wurden. Die Offensive begann mit konzentrierten Angriffen auf [SOV.GetAdjectivee] Artilleriestellungen nördlich der Stadt, gefolgt von einem breiten Vorstoß über die Wolga-Zugänge, der die vorderen Verteidigungslinien überwältigte. [SOV.GetAdjective]e Einheiten versuchten, die Mamayev Kurgan-Höhen zu halten, aber anhaltende Bombardements zwangen sie zu einem Rückzug tiefer in den Stadtkern.\n\nInnerhalb von Wolgograd wurden die Kämpfe immer heftiger. [SOV.GetAdjective]e reguläre Truppen und lokale Milizen befestigten Fabriken, Wohnblocks und Teile der alten Industriekomplexe und verwandelten jeden Block in eine Festung, ähnlich wie während des Zweiten Weltkriegs. Die europäische mechanisierte Infanterie rückte unter ständigem Beschuss von Scharfschützen vor und räumte Gebäude Stockwerk für Stockwerk inmitten heftiger Straßenkämpfe in der Nähe der Stadtteile Traktorenwerk und Barrikady. Mehrere wichtige Kreuzungen wechselten innerhalb eines Tages mehrfach den Besitzer, da beide Seiten um die Kontrolle über die Versorgungskorridore kämpften.\n\nAm späten Nachmittag durchbrachen die europäischen Streitkräfte den letzten Verteidigungsring entlang des zentralen Damms und schnitten damit die Rückzugswege über die Wolga ab. Die überlebenden Verteidiger versuchten vereinzelt Ausbrüche in Richtung der südlichen Vororte, wurden jedoch abgefangen und zerstreut. Nachdem das Stadtzentrum gesichert war, erklärte das europäische Oberkommando die Operation zu einem entscheidenden Sieg, der die Kontrolle der Russen über die gesamte Unterwolga-Region bricht und den Weg nach Astrachan und Zentralasien frei macht."
 news.631.a: "Die stolze Stadt fällt schließlich."
 news.632.t: "Brände verwüsten Moskau, während [SOV.GetAdjective]e Streitkräfte kapitulieren"
 news.632.d: "Hamburg, Deutschland – Die Welt\n\nMoskau wurde kurzzeitig belagert, nachdem es europäischen Streitkräften gelungen war, die Autobahnen der Stadt zu blockieren und sie vom Rest von Russland abzuschneiden. Es kam zu Schusswechseln und Drohnenangriffen in den Straßen Moskaus, doch diese endeten heute früh, als sich die verbliebenen Verteidiger der Stadt massenhaft im Kreml ergaben, wo viele ihren letzten Widerstand leisteten.\n\nZum ersten Mal seit über zwei Jahrhunderten ist die [SOV.GetAdjective]e Hauptstadt an eine ausländische Macht gefallen, doch dieses Mal scheint es nicht so, als würde [SOV.GetNameDef] diese Stadt in wenigen Wochen oder jemals wieder zurückerobern können. Da Moskau nun unter europäischer Kontrolle steht, bietet es den europäischen Streitkräften den Ausgangspunkt, den sie brauchten, um ihre Kontrolle über die eroberten [SOV.GetAdjective]en Gebiete zu festigen und ihren Feldzug gegen die verbleibenden [SOV.GetAdjective]en Verteidigungslinien fortzusetzen.\n\nBereits jetzt sind Berichte über interne Machtkämpfe im Oberkommando von Russland über Telegram-Kanäle durchgesickert, da einige Generäle sogar ihre Herrschaft über bestimmte Städte in Sibirien gefestigt haben und sich weigern, "weiterhin das Leben ihrer Soldaten in einem sinnlosen Fleischwolf zu opfern"."
 news.632.a: "Der Bär hat sein Herz verloren."
 
 news.633.t: "Hamburg fällt an französische Truppen"
 news.633.d: "Paris, Frankreich 24 (F24)\n\nFranzösische Truppen haben Hamburg nach einem brutalen, rasanten Angriff entlang der Elbe eingenommen. Die Offensive begann mit koordinierten Angriffen auf deutsche Artilleriepositionen mit Blick auf den Fluss, gefolgt von einem Panzervorstoß, der unter anhaltendem Maschinengewehr- und Mörserfeuer eine Überquerung erzwang. Nachdem die Brückenköpfe gesichert waren, rückten französische Marineinfanteristen durch die halb überfluteten Straßen der HafenCity vor und verwandelten die Docks und Lagerhäuser in ein Labyrinth für Nahkämpfe.\n\nDer stärkste Widerstand kam aus der Speicherstadt, wo deutsche Einheiten die engen Kanäle und Backsteinlagerhäuser nutzten, um den Vormarsch der Franzosen zu verlangsamen. Die Kämpfe entwickelten sich zu Raum-zu-Raum-Kämpfen, als die Verteidiger Brücken sprengten und ganze Häuserblocks verbarrikadierten. Nach stundenlangem Druck durchbrach die französische Infanterie den letzten Verteidigungsring, sicherte die Hafenanlagen und unterbrach eine wichtige deutsche Versorgungsader im Norden.\n\nObwohl das Stadtzentrum in französischer Hand liegt, operieren isolierte deutsche Trupps weiterhin aus Kellern, Tunneln und teilweise eingestürzten Hochhäusern. Militärbeamte in Paris bezeichnen den Sieg als einen entscheidenden Schritt zur Destabilisierung der deutschen Nordfront, der den Druck auf Berlin selbst verstärkt."
 news.633.a: "Hamburg gesichert, die Elbe überquert."
 news.634.t: "München fällt nach heftiger französischer Offensive"
 news.634.d: "Lyon, Euronews (EN)\n\nFranzösische Truppen haben München nach einem langwierigen und erbitterten Kampf, der tief in die bayerische Landeshauptstadt vordrang, eingenommen. Der Angriff begann mit Präzisionsschlägen auf deutsche Kommandoposten rund um den Olympiapark und Schwabing, wodurch die lokale Koordination lahmgelegt wurde, bevor Panzerkolonnen entlang des Mittleren Rings vorrückten. Die deutschen Verteidiger versuchten, den Vormarsch mit verschanzter Infanterie und Panzerabwehrstellungen aufzuhalten, aber der Durchbruch der Franzosen bei Moosach zerstörte ihr Verteidigungsnetz.\n\nInnerhalb der Stadt verschärften sich die Kämpfe um den Königsplatz und das Universitätsviertel, wo deutsche Truppen Museen, Bibliotheken und Verwaltungsgebäude in befestigte Stellungen umgewandelt hatten. Französische Einheiten rückten Block für Block vor und räumten Klassenzimmer, Galerien und Innenhöfe, während Scharfschützenfeuer über die alten Steinfassaden hallte. Der entscheidende Moment kam, als französische Truppen den Münchener Hauptbahnhof einnahmen und damit Deutschlands letzte Route für Verstärkung oder Evakuierung unterbrachen.\n\nDie letzten Kämpfe brachen im Regierungsviertel um das Maximilianeum aus, wo die Überreste der deutschen regulären Truppen inmitten einstürzender Barrikaden und brennender Fahrzeuge einen letzten Widerstand leisteten. Bei Einbruch der Dunkelheit meldeten die französischen Kommandeure die vollständige Kontrolle über die Stadt, obwohl es in den östlichen Vororten und entlang der bewaldeten Ufer der Isar noch vereinzelte deutsche Widerstandsnester gab. \n\nParis begrüßte die Einnahme Münchens als entscheidenden Schlag gegen die südlichen Verteidigungsanlagen Deutschlands, wodurch der Würgegriff auf Bayern verstärkt und der Weg sowohl nach Regensburg als auch zum Alpenkorridor frei wurde."
 news.634.a: "München fällt, Bayern knickt ein."
 news.635.t: "Köln von vorrückenden französischen Truppen eingenommen"
 news.635.d: "Brüssel, RTBF Info (RTBF)\n\nFranzösische Truppen haben Köln nach einer intensiven Stadtkampagne eingenommen, die eine der am stärksten verteidigten Städte Deutschlands am Rhein erschütterte. Der Angriff begann mit konzentrierten Schlägen auf deutsche Stellungen entlang der Hohenzollernbrücke, wodurch die Verteidigungsartillerie lahmgelegt und ein Korridor für französische Panzereinheiten geöffnet wurde, die unter Deckungsfeuer den Fluss überqueren konnten. Nachdem sie sich auf der östlichen Uferseite festgesetzt hatten, drangen französische Infanteristen nach Deutz vor und überwältigten die örtlichen Garnisonen in brutalen Straßenkämpfen.\n\nDie deutschen Verteidiger verschanzten sich rund um den Dom und den Hauptbahnhof und verwandelten die Altstadt in ein Labyrinth aus Barrikaden, Schussbahnen und befestigten Kellern. Es folgten stundenlange erbitterte Kämpfe – Granaten hallten durch enge Gassen, Feuerteams räumten zerstörte Ladenfronten und französische Pioniere demontierten mühsam die Stellungen, die den Domplatz schützten.\n\nDer Wendepunkt kam mit dem Fall des Bahnhofsgeländes nördlich des Bahnhofs. Als französische mechanisierte Einheiten diese Gleise eroberten, scheiterten die deutschen Versuche, Verstärkung zu holen oder sich zurückzuziehen. Am späten Nachmittag brach der organisierte Widerstand im Stadtzentrum zusammen, und nur noch vereinzelte deutsche Trupps kämpften aus Kellern und zerstörten Bürogebäuden entlang des Rheinuferufers.\n\nParis feiert die Eroberung Kölns nun als strategischen Durchbruch, der die französische Kontrolle über den Niederrheinkorridor festigt und das industrielle Herz Deutschlands weiteren Übergriffen aussetzt."
 news.635.a: "Das Ende der deutschen Industriemacht."
 news.636.t: "Amsterdam fällt vor den vorrückenden französischen Truppen"
 news.636.d: "Den Haag, NOS Nieuws (NOS)\n\nFranzösische Truppen haben Amsterdam nach einem schnellen, aber heftig umkämpften Angriff über die konzentrischen Kanäle der Stadt eingenommen. Die Offensive begann mit dem Vorstoß mechanisierter Einheiten aus Haarlem, unterstützt durch präzise Luftangriffe auf niederländische Verteidigungsstellungen entlang der westlichen Ringstraßen. Nachdem französische "génie militaire"-Einheiten die Übergänge über den ersten Kanalgürtel gesichert hatten, rückte die Infanterie in den dichten Kern der Stadt vor und bewegte sich durch enge Gassen und über Brücken, unter ständigem Kleinwaffenfeuer von niederländischen Truppen und deutschen Einheiten.\n\nDer heftigste Widerstand bildete sich um den Dam-Platz und den Königspalast, wo niederländische Verteidiger Regierungsgebäude befestigten und die umliegenden Kanalhäuser als miteinander verbundene Stützpunkte nutzten. Die Kämpfe entwickelten sich zu Nahkämpfen, als französische Marineinfanteristen jeden Block räumten und manchmal durch überflutete Keller und rauchgefüllte Treppenhäuser watnten, um verschanzte Einheiten zu vertreiben. Nachdem sie das Palastviertel gesichert hatten, brachen französische Panzerwagen in Richtung Centraal Station durch und brachen die letzte koordinierte niederländische Verteidigungslinie zusammen.\n\nAm Abend zogen sich die verbliebenen niederländischen Streitkräfte nach Almere zurück und ließen verstreute Scharfschützen-Teams und improvisierte Barrikaden zurück, die die französischen Bewegungen durch die östlichen Vororte immer noch verlangsamen. Paris feiert nun die Einnahme Amsterdams als einen entscheidenden Schritt zur Neutralisierung der deutschen Westflanke und zur Sicherung des Zugangs zur IJ und zur Nordsee."
 news.636.a: "Die arroganten Holländer, endlich bezwungen."
 news.637.t: "Antwerpen fällt nach heftigem französischen Angriff"
 news.637.d: "Antwerpen, VRT NWS (VRT)\n\nFranzösische Truppen haben Antwerpen nach einem vernichtenden Angriff eingenommen, der den wichtigsten Hafen Flanderns und eine der letzten großen Festungen an der Schelde zerstörte. Die Offensive begann mit koordinierten Artillerieangriffen auf die niederländischen Verteidigungslinien entlang des Rings, gefolgt von Panzervorstößen, die in der Nähe von Merksem und Deurne durchbrachen. Nachdem die Außenbezirke durchbrochen waren, rückte die französische Infanterie in den dicht bebauten Stadtkern vor und kämpfte sich Block für Block durch enge Gassen und befestigte Kreuzungen.\n\nDie heftigsten Kämpfe fanden rund um den Hafen von Antwerpen statt, wo die niederländischen Verteidiger Lagerhäuser, Kräne und Containerstapel als improvisierte Stützpunkte nutzten. Französische Seemanns-Schützen überquerten die Docks unter ständigem Gewehr- und Maschinengewehrfeuer, räumten Terminals und sicherten wichtige Piers in brutalen Nahkämpfen. Unterdessen führten niederländische Einheiten, die sich um die Liebfrauenkathedrale und den Grote Markt verschanzt hatten, wiederholte Gegenangriffe durch und zwangen die französischen Truppen zu stundenlangen zermürbenden Kämpfen im historischen Zentrum der Stadt.\n\nDer Wendepunkt der Schlacht kam mit dem Fall der Stadtteile Meir und Central Station. Nachdem französische mechanisierte Einheiten diese Verkehrsknotenpunkte eingenommen hatten, begann der niederländische Widerstand zu bröckeln. Bei Einbruch der Dunkelheit wurden die letzten organisierten Verteidigungsstellungen an den östlichen Stadtrand gedrängt oder zum Rückzug über die Industriebrücken der Schelde gezwungen. Vereinzelte Scharfschützenfeuer halten zwar noch an, aber Antwerpen steht nun effektiv unter französischer Kontrolle."
 news.637.a: "Der Scheldekorridor öffnet sich."
 news.638.t: "Brüssel fällt, behaupten deutsche Beamte"
 news.638.d: "Brüssel, Le Soir (LS)\n\nDeutsche Truppen haben Brüssel nach einer schnellen, aber verheerenden Offensive eingenommen, bei der sie die Außenverteidigungsanlagen der Stadt durchbrachen und die französischen Einheiten überwältigten, die um die Hauptstadt kämpften. Der Angriff begann mit schweren Bombardements entlang des östlichen Rings, wodurch wichtige Straßenkreuzungen zerstört wurden und die französischen Verteidiger gezwungen waren, sich in Richtung Zentrum zurückzuziehen. Anschließend drangen deutsche Panzerkolonnen den E40-Korridor entlang vor, durchbrachen vereinzelten Widerstand und erreichten die Hauptstadt noch vor Tagesanbruch.\n\nInnerhalb Brüssels verschärften sich die Kämpfe rund um das Europaviertel, wo französische Truppen und hastig zusammengestellte wallonische Gendarmerietruppen Regierungsgebäude befestigten und versuchten, den deutschen Vormarsch entlang der Rue de la Loi zu stoppen. Die deutsche Infanterie stürmte das Viertel mit Artillerieunterstützung, räumte Barrikaden und zwang die Verteidiger zum Rückzug in Richtung Königspalast und Grand-Place. In den engen mittelalterlichen Gassen tobten Straßenkämpfe, mehrere Gebäude stürzten unter Granatfeuer ein, während beide Seiten um die Kontrolle über den historischen Kern kämpften.\n\nDer entscheidende Moment kam, als deutsche mechanisierte Einheiten die Bahnhöfe Brüssel-Nord und Brüssel-Midi einnahmen und damit alle Fluchtwege für die verbliebenen französischen Streitkräfte abschnitten. Da die Versorgungslinien unterbrochen und die Evakuierung der Zivilbevölkerung eingestellt worden war, brach der organisierte Widerstand zusammen, und die verstreuten Verteidiger ergaben sich oder zogen sich in die westlichen Vororte zurück. Die deutschen Befehlshaber beanspruchen nun die vollständige Kontrolle über die Hauptstadt für sich und erzielen damit einen bedeutenden Durchbruch in ihrem Feldzug zur Wiedererlangung der Vorherrschaft in den Beneluxländern."
 news.638.a: "Brüssel fällt, ein neuer Schlieffen-Plan?"
 news.639.t: "Bordeaux von deutschen Truppen eingenommen"
 news.639.d: "Paris, Le Monde (LM)\n\nDie deutschen Truppen haben Bordeaux nach einer entschlossenen Offensive im Süden eingenommen, die die französischen Verteidigungslinien entlang der Garonne überwältigte. Der Angriff begann mit schnellen mechanisierten Vorstößen aus dem Norden, die die zerstörten Verteidigungslinien am Stadtrand umgingen und die französischen Einheiten zwangen, sich in die engen Gassen der Altstadt zurückzuziehen. Die deutsche Artillerie nahm wichtige Kreuzungen ins Visier, wodurch die Versuche der Franzosen, sich neu zu formieren, zunichte gemacht und die letzten zuverlässigen Versorgungswege in die Region unterbrochen wurden. \n\nIn Bordeaux selbst kam es zu heftigen Kämpfen um die Pont de Pierre und die historischen Viertel am Flussufer. Die französischen Truppen verschanzten sich in Steinhäusern, Weinkellern und engen mittelalterlichen Gassen und verwandelten jeden Häuserblock in einen Engpass. Die deutsche Infanterie rückte unter Drohnenführung methodisch vor, räumte befestigte Kreuzungen und drängte die Verteidiger nach Süden, während brennende Dächer den Himmel mit Rauch füllten.\n\nDer entscheidende Durchbruch gelang, als deutsche Panzerfahrzeuge in die Stadtteile Quinconces und Chartrons vorstießen, die verbleibenden französischen Stellungen flankierten und das Verteidigungsnetz der Stadt zusammenbrachen. Die französischen Versuche, den Sektor Pey-Berland zu halten, scheiterten, da die Munition zur Neige ging und die Kommunikation zusammenbrach. Am späten Abend zogen sich die letzten organisierten Einheiten in Richtung der Wälder von Landes zurück und ließen nur vereinzelte Scharfschützen und isolierte Widerstandsnester zurück. \n\nBerlin begrüßte die Einnahme von Bordeaux nun als einen wichtigen Schritt, um Frankreichs Versorgungskette am Atlantik zu unterbrechen und den Druck auf den Südwesten zu verstärken."
 news.639.a: "Der Atlantik ist die neue Grenze."
 news.640.t: "Lyon fällt vor den vorrückenden deutschen Truppen"
 news.640.d: "Genf, RTS Info (RTS)\n\nDeutsche Truppen haben Lyon nach einem unerbittlichen Angriff eingenommen, der die französischen Verteidigungslinien entlang der Saône und Rhône zerschlagen hat. Die Offensive begann mit schweren Bombardements auf wichtige Knotenpunkte in Villeurbanne und Vaise, wodurch Kommandoposten lahmgelegt und die Straßen unterbrochen wurden, über die Verstärkung in die Stadt gelangte. Anschließend stürmten deutsche Panzerspitzen den A6-Korridor entlang, durchbrachen hastig errichtete Barrikaden und zwangen französische Einheiten zum Rückzug in den Stadtkern.\n\nInnerhalb der Stadt verschärften sich die Kämpfe rund um die Place Bellecour und die Presqu'île, wo französische Verteidiger enge Gassen und historische Steinhäuser nutzten, um den deutschen Vormarsch zu verlangsamen. Auf der gesamten Halbinsel tobten heftige Kämpfe, während die deutsche Infanterie Block für Block räumte und sich dem Hôtel de Ville und dem Fuße des Fourvière-Hügels näherte. Die steilen, verwinkelten Gassen der Altstadt von Lyon wurden kurzzeitig zu einer Hochburg des Widerstands, doch der anhaltende Druck der Deutschen zwang die Verteidiger schließlich zum Rückzug über die Brücken.\n\nDer entscheidende Moment kam, als deutsche Einheiten den Bahnhof Perrache einnahmen und den letzten Fluchtweg nach Süden abschnitten. Umzingelt und erschöpft versuchten die französischen Streitkräfte vereinzelte Ausbrüche in Richtung Gerland und die östlichen Vororte, doch die meisten wurden zurückgedrängt oder gefangen genommen. Bei Einbruch der Dunkelheit brach die organisierte Verteidigung zusammen, und nur noch vereinzelte Scharfschützen-Teams waren in den Höhen von Croix-Rousse aktiv.\n\nBerlin feiert den Fall Lyons als entscheidenden Durchbruch in der inneren Verteidigungslinie Frankreichs, der den Weg ins Herz Südostfrankreichs ebnet."
 news.640.a: "Lyon fällt, Frankreichs Schwachstelle wird offenbart."
 news.641.t: "Paris fällt erneut in der Geschichte an deutsche Truppen"
 news.641.d: "Berlin, Deutschland – Die Welt\n\nDie Stadt Paris stand kürzlich nach einer grausamen Auseinandersetzung zwischen französischen und deutschen Truppen in Flammen, bei der viele Menschen, darunter auch Zivilisten, in Häuserkämpfen ums Leben kamen. Die verbliebenen französischen Kommandeure, die für die Verteidigung der Stadt in diesem Gebiet verantwortlich waren, wussten jedoch, dass ihre Hoffnungen auf die Verteidigung von Paris vergeblich waren, und kapitulierten heute früh mit ihren Truppen en masse. n\nParis war vor knapp einem Jahrzehnt noch die meistbesuchte und bekannteste Stadt der Welt. Jetzt wüten die Flammen des Krieges in ihren Straßen, und es ist kaum noch eine einzige Straße zu finden, in der nicht Gebäude oder Infrastruktur zerstört wurden. Nach diesen Entwicklungen wurde die deutsche Flagge über dem Eiffelturm gehisst, um der Welt zu signalisieren, dass Deutschland zum dritten Mal in der jüngeren Geschichte die überlegene Nation auf dem Kontinent war.\n\nDer französische Widerstand innerhalb und außerhalb der Stadt hält weiterhin an, während sich die Reste der französischen Armee in den leichter zu verteidigenden Regionen Südfrankreichs konsolidierten. Trotz dieser Maßnahmen sind ausländische Analysten bereits zu dem Schluss gekommen, dass ein deutscher Sieg in diesem Konflikt unvermeidlich ist."
 news.641.a: "'Nous sommes perdus'"
 news.642.t: "Berlin in Flammen, als Deutschlands letzte Hoffnungen schwinden"
 news.642.d: "Paris, Le Monde (LM)\n\nWährend französische Truppen kurz vor dem Brandenburger Tor vorbeimarschieren, werden die letzten verbliebenen Taschen des deutschen Widerstands nach einem kurzen, aber brutalen Kampf zwischen deutschen und französischen Panzereinheiten schnell ausgelöscht, was zum Rückzug der Deutschen aus Berlin und zur anschließenden Besetzung durch Frankreich führt.\n\nBerlin war in den letzten Jahren des Zweiten Weltkriegs fast vollständig zerstört worden. Die Bombardements der Alliierten hatten die Verteidigungsanlagen der Stadt zerstört, die daraufhin schnell von sowjetischen Infanteristen, Artillerie und Panzern besetzt wurde. Nun ist die Stadt erneut fast vollständig zerstört, diesmal durch französische Drohnen, Raketen und Panzerspitzen. Wie durch ein Wunder sind die meisten historischen Gebäude weitgehend intakt geblieben, was viele deutsche Widerstandskämpfer genutzt haben, um Barrikaden und Operationsbasen zu errichten und ihren Kampf gegen Paris aus dem Verborgenen fortzusetzen.\n\nOberflächlich betrachtet bedeutet der Verlust Berlins für viele jedoch den Anfang vom Ende der Kriegsanstrengungen Deutschlands und seiner Verbündeten. Viele Paktmitglieder, insbesondere aus Osteuropa, haben den Konflikt bereits aufgegeben und ihre Armeen demobilisiert. Die verbleibenden deutschen Streitkräfte bemühen sich, improvisierte Verteidigungsfronten zu bilden, doch die Desertion innerhalb ihrer Reihen nimmt zu, da die französischen Truppen jeden Tag schneller mehr Gebiete erobern."
 news.642.a: "'Wir sind verloren'"
 
 news.643.t: "Europa Erhebt Sich"
 news.643.d: "Der Dritte Europäische Krieg endet weder mit dem Triumph eines Imperiums noch mit einem weiteren Pakt der Tyrannen, die die Beute unter sich aufteilen. Er endet mit einer Welt, die auf den Kopf gestellt ist, mit einem roten Berlin, einem stillen Moskau und den letzten Thronen Europas, die gestürzt und ins Feuer geworfen wurden. \n\nDas Volksheer marschierte nicht für den Ruhm, sondern für die Befreiung. Durch die Niederlande, durch die Ruinen des Ostens, durch die Leichenberge von Paris marschierten sie ohne zu zögern. Die alten Mächte hatten ihren Kontinent ausgeblutet. In ihrer letzten Stunde boten sie nur Nihilismus und Vernichtung. Berlin bot eine Zukunft. Und die Arbeiter Europas antworteten darauf. Mit Gewehren und Molotowcocktails, mit Sabotage und Aufständen erhoben sie sich, um ihnen entgegenzutreten.\n\nJetzt begraben sie die alte Ordnung. Europa wird nicht länger der Friedhof der Revolutionen sein, sondern ihre Wiege. Eine neue Föderation der Völker entsteht, nicht gebunden durch Kapital, sondern durch Solidarität, durch gemeinsames Opfer, durch den Willen derer, die sich weigern, erneut beherrscht zu werden.\n\nDie Waffen schweigen, aber die Arbeit beginnt. Es gilt, Nationen wiederaufzubauen, Tyrannen zu richten und Generationen zu bewaffnen, nicht für den Krieg, sondern für die Wachsamkeit. Schon jetzt zittern die Eliten in Washington und Tokio. Von der Oder bis zur Donau, vom Atlantik bis zum Kaukasus lebt die Internationale."
 news.643.a: "Das rote Banner über allem."
 news.644.t: "Die große europäische Auflösung"
 news.644.d: "Was als letzte Zuckung der alten Ordnung begann, endete mit ihrer endgültigen Auslöschung. Grenzen sind verschwunden, Staaten sind untergegangen, und die Geschichte, einst ein langsamer, geduldiger Gott, wurde durch Geschwindigkeit hingerichtet. Deutschland steht nicht als Nation triumphierend da, sondern als Katalysator einer neuen kontinentalen Situation.\n\nDer Krieg riss Monarchien, Republiken und Bürokratien gleichermaßen mit sich. Es war eine Liquidierung von Nationen, von Nostalgie, von Grenzen. Die Armeen der europäischen Revolution kämpften nicht für Flaggen oder Verträge; sie beschleunigten den Zusammenbruch, durchbrachen die Stagnation und ebneten den Weg für die postnationale Synthese. Ganze Städte wurden zu Schmelztiegeln der Transformation, in denen Widerstand zerschlagen und Gehorsam überflüssig wurde. In dem Moment, als die Deutschen den Rhein überquerten, hatten sie die Idee von Europa bereits begraben.\n\nWas aus den Trümmern entsteht, ist keine Föderation, keine Union, sondern ein Prozess, der Imperativ in Bewegung. Die Währung ist überholt. Die Parlamente sind Staub. Die Produktion ist Befehl. Die Erinnerung wird kuratiert. Europa wird zu einer Schalttafel aus Kommunen, Knotenpunkten und Machtzentren, integriert durch Ideologie, Stahl und Dynamik.\n\nEs gibt keinen Frieden zu feiern. Frieden ist Rückschritt. Der Konflikt mag vorbei sein, aber der Bruch hält an, und daraus entsteht die permanente Revolution. Die Logik der Geschichte wurde neu geschrieben. Was folgt, ist keine Zukunft, sondern eine Kaskade."
 news.644.a: "Europa Null."
 news.645.t: "Die Festung steht fertig"
 news.645.d: "Die letzten feindlichen Hauptstädte fielen nicht mit Paraden, sondern mit Stille. Es wurde keine Befreiung verkündet, keine Brüderlichkeit gefeiert. Die Männer, die die Fahne über Warschau und Mailand hissten, gaben sich keiner Illusion von Einheit hin. Was zählte, war, dass die Bedrohung verschwunden war und die Welt sie nicht mehr berühren würde.\n\nDeutschlands Krieg war kein Krieg der Eroberung, sondern des Rückzugs. Nicht um zu expandieren, sondern um das Fäulnis zu beseitigen. Die alte Weltordnung, kapitalistisch oder sozialistisch, hatte die Nation ein Jahrhundert lang ausgeblutet. Nun hatten ihre Armeen sie alle vernichtet, nicht um sie zu besetzen, sondern um sie zu kauterisieren. Die Grenzen sind geschlossen. Die Stimme Europas ist verstummt. An ihre Stelle tritt etwas Kälteres, Hungrigeres und völlig in sich Geschlossenes.\n\nEs gibt keine Allianzen, keine Verhandlungen, keinen Internationalismus. Europa steht allein und ist endlich frei. Stein für Stein von eigener Hand erbaut, bewacht vom Feuer der eigenen Disziplin. Nichts kommt herein. Nichts geht hinaus. Die Außenwelt mag mit Entsetzen oder Ehrfurcht zusehen. Das spielt keine Rolle. Die Festung braucht sie nicht."
 news.645.a: "Alles, was wir brauchen, bauen wir selbst."
 news.646.t: "Der zerbrochene Turm"
 news.646.d: "Berlin ist verschwunden. Verbrannt in den Flammen des Gerichts. Der Eiserne Turm liegt in Trümmern, zerschmettert von Artillerie, begraben unter Stiefeln. Deutschlands Traum von Isolation, Reinheit und ewigem Kampf gegen die Welt endete in Stille.\n\nDie Eurointernationale bot keinen Frieden. Sie bot Feuer, Stahl und Gericht. Das deutsche Regime entschied sich, bis zum bitteren Ende Widerstand zu leisten, und bekam seinen Wunsch erfüllt. Über den Trümmern wehte keine Flagge, nur Rauch stieg auf. Die Welt, die sie wollten, wird nicht zurückkehren.\n\nFrankreich trauert nicht um die Toten. Die Grenzen sind ausgelöscht, die Bücher verbrannt, die alten Namen vergessen. Was als Nächstes kommt, ist nicht für Deutschland, sondern aus Deutschland heraus, ein brandneuer Staat, neue Grenzen, ein neues Regime. Was auch immer es war, es ist nicht mehr. Europa schreitet voran. Die Zukunft gehört denen, die voranschreiten. Und der Eurointern wartet nicht darauf, dass die Trümmer heilen."
 news.646.a: "Berlin dezimiert, Europa neu geschmiedet."
 news.647.t: "Endsieg"
 news.647.d: "Die Waffen auf dem europäischen Kontinent sind wieder verstummt. Fast ein Jahrzehnt lang haben Brüder in der europäischen Geschichte gegeneinander Krieg geführt, doch nun hat nur einer dieser Brüder überlebt, um die Geschichte zu erzählen, eine deutsche Geschichte.\n\nDeutsche Kommandeure und Offiziere haben sich bereits zu ihrem Sieg geäußert und behaupten, dies sei der "letzte Schritt" in Richtung eines "Europas unter deutscher Führung". Bislang ist unklar, was diese Aussage für den durchschnittlichen Europäer wirklich bedeutet, doch wenn die Gräueltaten in Osteuropa für sich sprechen, dann werden dies keine guten Zeiten für Europa sein. Die französische Nation wurde zusammen mit ihren besiegten Verbündeten unter vorübergehende deutsche Militäraufsicht gestellt, die so lange andauern wird, bis entschieden ist, welche Regierungsform für die Franzosen besser ist.\n\nDie Welt scheint, gelinde gesagt, überrascht über diese Entwicklungen zu sein. Europa leidet noch immer unter den verheerenden Folgen des Ersten und Zweiten Weltkriegs sowie des deutsch-französischen Kampfes um die Vorherrschaft auf dem Kontinent, der einen Großteil Westeuropas in Trümmern hinterlassen hat. Nur noch der Wille Deutschlands bleibt, um den Kontinent zu führen, und das wird er auch tun, wenn auch mit eiserner Faust."
 news.647.a: "Siegfrieden!"
 news.648.t: "Die Geburt des Großgermanischen Reiches"
 news.648.d: "Hätte man vor Beginn der 2020er Jahre einen durchschnittlichen Europäer gefragt, wie er sich seinen Kontinent in einigen Jahrzehnten vorstellt, hätten nur wenige mit Sicherheit gesagt, dass Europa erneut unter dem Hakenkreuzflagge stehen würde. Mit der Kapitulation der letzten verbliebenen französischen Armeen war jedoch nicht mehr Berlin die letzte verbliebene Macht auf dem Kontinent, sondern Germania.\n\nFrank Franz hat seit seinem Aufstieg zur Macht aufgrund der Fehler der inzwischen zerfallenen Union Deutschland weiter in die Vergangenheit zurückgeführt, bis die Flagge des Deutschen Volksstaates an allen Fahnenmasten in Deutschland durch die nationalsozialistische Flagge ersetzt wurde. Das Reich kann nun mit Teilen seines Plans fortfahren, den es nach seiner Niederlage im Zweiten Weltkrieg aufgegeben hatte, nämlich der Entfernung der slawischen Bevölkerung östlich von Deutschland im Austausch gegen ethnische Deutsche, wie es im wiederbelebten Generalplan Ost vorgesehen ist, der sich nun auf einen Großteil Nordfrankreichs ausweitet, um die Nation für immer zu bestrafen.\n\nBereits jetzt finden von Paris bis Moskau große Militärparaden statt, während das vierarmige Kreuz nun den Kontinent verschlingt. Was Hitler nicht geschafft hat, wurde von Franz und seiner Partei wiederbelebt. Nun wappnet sich der Rest der Welt, da eines der verhasstesten Regime der Menschheitsgeschichte wieder aufgetaucht ist und keine Feinde hat."
 news.648.a: "Eintausend Jahre!"
 news.649.t: "Das Deutsche Kaiserreich"
 news.649.d: "Trompeten, Trommeln und Stiefel sind in allen Städten Europas zu hören, wo die feierliche Krönung von Kaiser Heinrich XIII. in Versailles begangen wird. Damit wiederholt sich, was Wilhelm I. vor über einem Jahrhundert getan hat, nur dass diesmal die deutsche Armee weder den Palast noch irgendeine andere französische Stadt verlassen wird.\n\nDie Krönung Heinrichs XIII. ging mit einer großen Rede einher, in der er verkündete, dass "der größte Fehler der Geschichte" mit der Wiedergeburt des Deutschen Kaiserreichs und der Rückkehr zur alten Verfassung von 1871 korrigiert worden sei. Ein vereinigtes deutsches Reich unter der Führung des preußischen Königs und des Hauses Reuss. Dieser Schritt war von ausländischen Analysten seit dem Fall wichtiger französischer Städte wie Paris und dem langsamen Zerfall des Oberkommandos von Vichy mit Spannung erwartet worden. Niemand hatte jedoch mit solch prächtigen und mächtigen Feierlichkeiten im gesamten Pakt gerechnet, der nun für immer mit Berlin verbunden ist.\n\nBereits jetzt werden Dynastien auf ihren jeweiligen Thronen wieder eingesetzt, während Berlin sich darauf vorbereitet, den Plan Mitteleuropa wieder aufzunehmen, der den Rest Europas zwingt, sich der deutschen Zollunion anzuschließen, und langsam die Germanisierung in ihre Lebensweise einführt, bis die deutsche Kultur als Schutz vor der "jüdischen Indoktrination", wie es der Kaiser selbst formulierte, auf dem gesamten Kontinent allgegenwärtig ist."
 news.649.a: "Mit Gott für König und Vaterland!"
 news.650.t: "Europa unter französischer Militärkontrolle"
 news.650.d: "Das jüngste Chaos, das die europäischen Kriege über den europäischen Kontinent gebracht haben, hat irreversiblen Schaden angerichtet. Einst galt dieser Kontinent als der friedlichste der Erde, doch nun ist diese Maske endgültig gefallen, da Europa zu seinem üblichen historischen Kreislauf als ein Kontinent zurückgekehrt ist, der sich ständig im Krieg mit sich selbst befindet. In letzter Zeit wurde jedoch so etwas wie ein dauerhafter Frieden erreicht, aber dieser dauerhafte Frieden ist ein harter.\n\nDer französische Staat unter der Kontrolle einer Militärjunta hat den vollständigen Sieg über Deutschland und seine Verbündeten errungen und durch den ehemaligen Stahlpakt-Vertrag Vasallenstaaten gegründet, die alle unter der militärischen Aufsicht von Paris stehen. Das neue Frankreich, das alle Versuche einer politischen Reformierung hin zu einer Demokratie überschattet hat, ist ein Frankreich, dem es an einer echten Ideologie mangelt. Der einzige Glaube, den Frankreich hat, ist die Aufrechterhaltung seines Militärs über alle anderen Interessen hinweg.\n\nDas Schicksal des europäischen Kontinents liegt nun in den Händen französischer Generäle und Marschälle. Es ist unklar, wie lange diese Pax Francia andauern wird, aber da das petainistische Modell erfolgreich Frieden auf dem Kontinent gebracht hat, wird dieses System wahrscheinlich für einige Zeit zum neuen Status quo werden."
 news.650.a: "Eine ewige Junta?"
 news.651.t: "Europa wieder frei"
 news.651.d: "Seit der Niederlage der NATO im Ersten Europäischen Konflikt haben viele argumentiert, dass das Ende der demokratischen Systeme Europas unvermeidlich sei. Niemand hat jedoch behauptet, dass diese Systeme in einer noch nie dagewesenen Form auf den Kontinent zurückkehren würden.\n\nDiese Entwicklungen stehen alle im Zusammenhang mit dem Sieg der Siebten Französischen Republik, die gegründet wurde, nachdem der französische Marschall De Villiers kurz nach seiner Machtübernahme freie Wahlen ausgerufen hatte, im Krieg gegen die deutsche Junta, die nun unter eine provisorische Verwaltung gestellt wurde, in der Hoffnung, in naher Zukunft eine Schwesterrepublik Frankreichs zu werden. Doch diese neu gegründeten Republiken im ehemaligen Pakt sind nicht mehr die Demokratien von einst. Sie erzählen eine neue Geschichte, nicht die von Bürokraten, sondern von jungen, hoffnungsvollen Reformern, die unermüdlich daran arbeiten, De Gaulles Traum auf dem alten Kontinent zu verwirklichen.\n\nTatsache ist, dass Deutschland und Frankreich infolge zahlreicher kontinentweiter Konflikte und unausgesprochener Gräueltaten weitgehend in Trümmern liegen. Die Aufgabe des Wiederaufbaus dieser Länder liegt allein in den Händen Frankreichs, das zusammen mit seinen Verbündeten nicht ruhen wird, bis Europa wieder zur Normalität zurückgekehrt ist."
 news.651.a: "Vive la France Libre!"
 news.652.t: "Les Terres Promises"
 news.652.d: "Über den Küsten Europas ist eine neue Ordnung entstanden, die die Ästhetik einer alten Ordnung aufgreift, die seit über einem Jahrtausend nicht mehr zu sehen war. Der frankische Nationalstaat wurde von internationalen Beobachtern stets mit Vorsicht betrachtet, die sich zu der mysteriösen und manchmal bedrohlichen Aura um den Obersten Marschall äußerten, der nur unter seinem Spitznamen "Lafayette" bekannt ist. Nun weht die frankische Flagge über allen europäischen Städten, nachdem sich die letzten Armeen des Paktes heute Morgen ergeben haben.\n\nDas Geheimnis um diesen neuen Staat ist nicht einmal ästhetischer Natur, da so gut wie nichts über die Lage innerhalb seiner Grenzen bekannt ist. Alles, was verfügbar ist, sind ein paar Reden, die die fränkischen Medien durch ihre Firewall gelassen haben. Geschichten über ethnische Säuberungen auf dem gesamten Kontinent und brutale Gräueltaten gegen deutsche Staatsangehörige, die Lafayette lediglich als "Franken, die sich in der jüdischen Unterwerfung verirrt haben" wahrnimmt.\n\nEuropa wurde in zwei Teile geteilt, eine Hälfte für die Franken und die andere für den neu ausgerufenen slawischen Nationalstaat, einen Vasallenstaat von Paris. Das Reich Karls des Großen ist auf eine Weise nach Europa zurückgekehrt, die niemand für möglich gehalten hätte. Wie lange es Bestand haben wird, ist ungewiss, doch angesichts der Geschichte des Ersten Reiches vor einem Jahrtausend wird Lafayettes Tod ein ernstes Problem darstellen."
 news.652.a: Das Ende des Verduner Vertrags"
 news.653.t: "Das Rutenbündel bedeckt Europa"
 news.653.d: "Die letzten verbliebenen deutschen Kontingente haben kapituliert, was das Ende des Stahlpakts und den Beginn von Friedensverhandlungen zwischen allen Parteien des Kontinents unter französischer Aufsicht bedeutet. Eine Aufsicht, die wiederum vom Großen Rat des Faschismus überwacht wird.\n\nYvan Benedetti, besser bekannt unter seinem Titel als französischer Duce, hat die französische Gesellschaft zu einer fast exakten Kopie der italienischen Gesellschaft unter Mussolini umgestaltet. Die Französische Sozialrepublik, wie sie nun genannt wird, hat ihre politischen und militärischen Rivalen in geheimen Machtkämpfen hinter den Kulissen besiegt und damit Stabilität für das französische Volk gesichert, während sie gleichzeitig viele radikale nationalistische Reformen wie die Einführung des Korporatismus und die Rückführung von Millionen von Flüchtlingen aus Frankreich umgesetzt hat.\n\nNun werden dieselben Maßnahmen von allen europäischen Regierungen umgesetzt, wobei es kaum noch Widerstand gegen die Hegemonie von Paris gibt. Der Faschismus hat sich in Europa gefestigt, wenn auch vielleicht nicht so, wie Mussolini es sich vorgestellt hatte."
 news.653.a: "Mussolinis Traum wird wahr"
 news.654.t: "Pax Latina"
 news.654.d: "Heute ist ein seltsamer Tag. In allen Städten Westeuropas beginnen große Feste und Militärparaden, um den Sieg über die "germanischen Barbaren" zu feiern, die sich nach monatelangen brutalen Kämpfen, die alle Teile Deutschlands und des ehemaligen Paktes erschütterten, kürzlich ergeben haben.\n\nDoch bei diesen Festen sieht man keine alten europäischen Flaggen. Stattdessen gibt es nur das Symbol der Identitären, das auf einem tiefroten und gelben Banner angebracht ist und an römische Insignien erinnert. Das Lateinische Reich wurde gegründet, kurz nachdem der ehemalige NR-Politiker Jordan Bardella alle seine Rivalen in einem Machtkampf überwältigt hatte und zum unangefochtenen Herrscher der französischen Gesellschaft wurde, die sich auf einen Großteil der lateinischen Welt ausgedehnt hatte. n\nDie Aufgabe, diesen zerrütteten Kontinent wieder aufzubauen, liegt nun in den Händen von Bardella und seinem Reich, das bereits die deutsche Gesellschaft zum Germanischen Reich umgestaltet hat, das nun für immer den Lateinern unterworfen ist. Es bleibt abzuwarten, welche Position das Reich in dieser neuen Weltordnung einnehmen wird, obwohl es nicht überraschend wäre, wenn sich der Einfluss des Reiches auf andere ehemalige römische Gebiete, wie beispielsweise die arabische Welt, ausweiten würde. Dennoch ist der Frieden in Europa eingekehrt, und ähnlich wie der jahrhundertealte römische Frieden wird auch der neue Status quo nicht leicht zu erschüttern sein."
 news.654.a: "Ave, Bardella!"
 news.655.t: "Das Dritte Französische Kaiserreich"
 news.655.d: "Die Waffen sind über dem erschöpften Kontinent erneut verstummt, und das Banner, das sich über den Trümmern erhoben hat, ist dasselbe Banner, das einst ein Jahrzehnt lang in ganz Europa allgegenwärtig war. Erneut hat sich Bonapartes Frankreich zum unangefochtenen Sieger gekrönt und die Armeen des Paktes auf eine Weise vernichtet, die Napoleon I. im Grab rot werden lassen würde.\n\nDie ehemalige Paktgesellschaft wurde neu organisiert, um sich besser an die neue königliche und imperiale Haltung des Imperiums anzupassen, wobei die Monarchen wieder auf ihre jeweiligen Throne gesetzt und mit uneingeschränkter Herrschaftsgewalt ausgestattet wurden. Die Rückkehr der Bonaparte-Dynastie in die französische Gesellschaft ist nicht zuletzt den Bemühungen des Oberhaupts der Dynastie, Jean-Christophe Bonaparte, auch bekannt unter seinem Titel Napoleon VII., zu verdanken.\n\nBislang ist noch unklar, wie die Beziehungen des Dritten Kaiserreichs zum Rest der Welt aussehen werden, doch seine Reformen könnten uns einen Hinweis darauf geben: französische Vorherrschaft. Die alten Bündnisse und Wirtschaftssysteme, die Napoleon I. geschaffen hatte, wurden bereits von Napoleon VII. wieder eingeführt, nur dass es jetzt keine ausländische Macht mehr gibt, die diese Vorherrschaft in Frage stellen könnte, da alle anderen Parteien in Europa entweder vernichtet oder unterworfen wurden. Vorerst wird die Hegemonie der französischen Dynastie in weiten Teilen der Welt zur neuen Norm werden."
 news.655.a: "Vive L'empereur!"
 news.656.t: "Europa Invicta"
 news.656.d: "Die Idee einer vereinten europäischen Nation ist kein neues Konzept. Von den Schriften Richard Coudenhove-Kalergis über die Bewegungen Oswald Mosleys bis hin zu den Hoffnungen auf eine integrative Föderation, die von gemäßigten Stimmen der alten Ordnung vorgebracht wurden. Niemand hätte ahnen können, dass die europäische Nation in ihrer heutigen Form entstehen würde. n\nDer Konflikt zwischen Paris und Berlin endete mit der Kapitulation der letzten verbliebenen Paktarmeen und der Auflösung nicht nur ihrer Armeen, sondern auch ihrer Nationen. Sie wurden in die sogenannte Europäische Hegemonie aufgenommen, die von der Identitären Partei und ihrem Führer, dem homosexuellen Schriftsteller Renaud Camus, geleitet und zu etwas völlig Neuem für den Kontinent umgestaltet wurde. Camus war bereits vor dem Krieg als Hauptvertreter mehrerer Verschwörungstheorien bekannt, darunter die des "Großen Austauschs". Europa soll für den weißen Mann aufgebaut und gestaltet werden, und es ist dessen Aufgabe, seinen Titel als unangefochtene Hegemonialmacht der Menschheit zurückzugewinnen.\n\nEs ist unklar, wie die Beziehungen der Hegemonie zur internationalen Gemeinschaft aussehen werden oder ob es überhaupt welche geben wird. Die 12-Sterne-Flagge der EU, einst ein Symbol für Freiheit und Demokratie, wird nun an ihrer Stelle Muslime entmenschlichen. Ein Sturm ist über den Kontinent hereingebrochen."
 news.656.a: "Europa eine Nation!"
 news.657.t: "Die Herrschaft der Bourbonen"
 news.657.d: "Absolutistische Monarchien waren einst weltweit allgegenwärtig, doch seit der Französischen Revolution wurde dieses System durch liberale Demokratien ersetzt. Erst jetzt ist die historische Norm mit dem Sieg des Hauses Bourbon über die Armeen des Pakts in Europa wieder aufgetaucht.\n\nDie Französische Revolution, eine Revolution gegen den Bourbonen-Absolutismus in Frankreich, ist zusammen mit der berühmten französischen Trikolore, die kulturell mit der Nation verbunden ist, in Vergessenheit geraten. Stattdessen hat die traditionelle Fleur de Lis ihren Platz eingenommen. Auch die Idee Frankreichs selbst ist untergegangen, da es keine Notwendigkeit mehr für eine gemeinsame nationale Identität gibt. Es gibt nur noch König Ludwig XX. und II., der von Gott auserwählt wurde, um die Franzosen und Spanier zu führen. Die übrigen Nationen Europas sind zerfallen. Die alten Königreiche Preußen, beider Sizilien und viele andere sind aus der Asche des Nationalismus wiederauferstanden. Die Dynastien wurden wieder auf den Thron gesetzt und erhielten unter der Aufsicht des Hauses Bourbon uneingeschränkte Macht über ihre jeweiligen Reiche.\n\nDie Ideen der Aufklärung wurden unter dem Gewicht des wiederbelebten Ancien Régime zerschlagen. Die Europäer werden den Rest ihres Lebens damit verbringen, im Namen der Könige zu schuften, die sie vor dem Bösen schützen."
 news.657.a: "Un roi, une foi, une loi."
 news.658.t: "Marokko triumphiert"
 news.658.d: "In vielen Städten Marokkos sind spontane Feierlichkeiten ausgebrochen, da der Krieg, der die letzten Monate geprägt hat, mit dem Rückzug der algerischen Armee endlich zu Ende gegangen ist. Der König hat sich in einer Fernsehansprache zum Ende des Konflikts geäußert und die Soldaten der Armee dafür gewürdigt, dass sie "unsere Nation tapfer gegen diejenigen verteidigt haben, die sie zerstören wollten".\n\nDie EU-Staaten haben dem König gratuliert, und viele Experten vermuten, dass der Sieg Marokkos den Beginn einer stärkeren Beteiligung des Westens in Nordafrika signalisiert. In Algerien hingegen ist die Stimmung düster, da es zu gewalttätigen Ausschreitungen gegen die Regierungstruppen gekommen ist. Radikale Islamisten und andere regierungsfeindliche Gruppen sind auf die Straße gegangen, um ihrer Wut Luft zu machen.\n\nObwohl Frieden erreicht wurde, befürchten viele weiterhin künftige Gewalt, da die Lage in Algerien jeden Tag mehr und mehr in Richtung eines umfassenden Bürgerkriegs kippt. Und es bleibt abzuwarten, wie Marokko seinen Kurs steuern wird, nachdem es sich als dominierende Kraft in Nordafrika etabliert hat."
 news.658.a: "Ist dies der Beginn des Aufstiegs Marokkos?"
 news.659.t: "Algerien verkündet Sieg"
 news.659.d: "Heute feiert die algerische Hauptstadt Algier das Ende des Krieges, der die letzten Monate geprägt hat, da sie als Sieger hervorgegangen ist. Nachdem Algerien die marokkanischen Streitkräfte vernichtend geschlagen hat, hat es nun seinen Platz auf der Weltbühne eingenommen, sehr zur Freude seiner Freunde in Moskau.\n\nMarokko ist durch den Konflikt völlig zerstört worden und musste die Unabhängigkeit der Westsahara anerkennen, einer Region, um deren Kontrolle es seit vielen Jahren gekämpft hat. Bereits jetzt strömen regierungskritische Demonstranten auf die Straßen, und es wird erwartet, dass der König vor einer Sondersitzung des Parlaments spricht.\n\nNachdem Algerien im Rahmen des Friedensabkommens Grenzregionen erobert hat, steht es nun kurz davor, den größten Teil Nordafrikas zu beherrschen. Angesichts der bereits unterzeichneten Abkommen mit Russland sprechen viele Experten von einem großen Sieg für Russland und einer demütigenden Niederlage für den Westen."
 news.659.a: "Ihr Risiko hat sich also ausgezahlt."
 news.660.t: "Waffenstillstand in Nordafrika unterzeichnet"
 news.660.d: "Nach vielen Monaten des Kampfes scheint der Krieg im Maghreb endlich zu Ende zu sein. Beide Seiten, die sich in einem brutalen Krieg ähnlich den Schützengräben des Iran-Irak-Krieges befanden und mit landesweiten Unruhen konfrontiert waren, kamen in Genf zusammen, wo unter Aufsicht der UNO ein Friedensabkommen unterzeichnet wurde.\n\nDie Region ist nun verwüstet, da die Grenze zwischen Marokko und Algerien beschossen, bombardiert und sogar mit Gas angegriffen wurde. Und sowohl die marokkanische als auch die algerische Regierung wurden von Protestwellen getroffen, als die Soldaten mit leeren Händen von der Front zurückkehrten. Da Amerika vollständig in einen Bürgerkrieg verwickelt ist, hat sich die UNO nach Beendigung der Kämpfe dazu verpflichtet, ihre Präsenz in Nordafrika zu verstärken, um beiden Ländern Hilfe und Unterstützung zu leisten.\n\nObwohl nun Frieden herrscht, bleiben die Spannungen bestehen, da sowohl Marokko als auch Algerien von regierungsfeindlichen Protesten wegen der vermeintlichen Misserfolge im Krieg erschüttert wurden. Die Zukunft Nordafrikas ist ungewiss, aber vorerst herrscht Frieden."
 news.660.a: "Endlich kehrt wieder Frieden ein."
 
 news.661.t: "Die Linke gewinnt Europawahlen"
 news.661.d: "In einem Ergebnis, das politische Analysten verblüfft und die Erwartungen auf dem gesamten Kontinent neu geprägt hat, ist die Linke nach den Europawahlen, die von wirtschaftlicher Unsicherheit, institutionellem Misstrauen und einer zunehmenden Anti-Establishment-Stimmung geprägt waren, zum größten Block im Europäischen Parlament aufgestiegen. Zuwächse wurden in Südeuropa, Teilen Frankreichs und Deutschlands sowie mehreren Ballungszentren verzeichnet, wo die Wahlbeteiligung unter jüngeren Wählern und denjenigen, die am stärksten von Inflation und Sparmaßnahmen betroffen sind, stark angestiegen ist.\n\nDie Führer der Linken interpretierten den Sieg als Ablehnung dessen, was sie als "ein Jahrzehnt des kontrollierten Niedergangs" bezeichneten, und versprachen einen Bruch mit der fiskalischen Orthodoxie und eine Hinwendung zu öffentlichem Eigentum, aggressiver Umverteilung und strengen Beschränkungen des Einflusses von Unternehmen. Im Mittelpunkt der Wahlversprechen standen Preiskontrollen, der Ausbau des Wohnungsbaus, Mechanismen zum Schuldenerlass und umfangreiche Investitionen in öffentliche Dienstleistungen sowie Forderungen nach einer unabhängigeren europäischen Außenpolitik und einer Reduzierung der Prioritäten bei den Militärausgaben.\n\nDie Wahl hat tiefe Risse in der traditionellen politischen Landschaft Europas offenbart. Die Mitte-Blöcke verloren angesichts von Vorwürfen der Inkompetenz und Realitätsferne an Boden, während nationalistische Bewegungen, obwohl sie in mehreren Staaten nach wie vor mächtig sind, es nicht schafften, sich zu einer parlamentarischen Mehrheit zu vereinen. Stattdessen ging die Dynamik an Parteien, die direkte wirtschaftliche Interventionen und strukturelle Veränderungen versprachen.\n\nDie Koalitionsverhandlungen werden schwierig werden. Die Linke mag sich zwar den ersten Platz gesichert haben, doch um eine funktionsfähige Regierungsmehrheit zu bilden, muss sie mit Kräften verhandeln, die ihrer Plattform weiterhin skeptisch gegenüberstehen. Dennoch ist das Ergebnis unbestreitbar: In Brüssel hat sich ein neues politisches Gravitationszentrum gebildet, und die Ausrichtung der europäischen Politik steht nun auf höchster Ebene zur Debatte."
 news.661.a: "Europa bricht mit der alten Ordnung."

 news.662.t: "S&D gewinnt Europawahlen"
 news.662.d: "Die Progressive Allianz der Sozialisten und Demokraten (S&D) hat sich nach den letzten EU-Wahlen zum größten Block im Europäischen Parlament entwickelt und sich einen klaren Vorsprung in einem Wahlkampf gesichert, der von Inflation, Energieinstabilität und wachsender öffentlicher Wut über Ungleichheit geprägt war. Starke Ergebnisse in Spanien, Portugal, Teilen Frankreichs, Deutschlands und wichtigen Industrieregionen verhalfen der S&D zu einem Vorsprung vor den liberalen und konservativen Kräften.\n\nDie Parteivorsitzenden interpretierten das Ergebnis als Forderung nach "Schutz statt Sparpolitik" und versprachen eine erneute Konzentration auf Löhne, soziale Investitionen, öffentliche Dienstleistungen und eine stärkere Rolle Europas in der Industrieplanung. Die Kampagne der S&D legte den Schwerpunkt auf die Verringerung der Lebenshaltungskosten durch koordinierte Maßnahmen: Reform des Energiemarktes, Ausbau des Arbeitnehmerschutzes und strengere Kontrollen von Unternehmensmissbrauch und Finanzspekulationen.\n\nDie Wahl spiegelt auch die Ermüdung gegenüber dem Krisenmanagementansatz der politischen Mitte wider. Zwar konnten nationalistische und rechtsextreme Parteien in mehreren Ländern Zugewinne verzeichnen, doch gelang ihnen nicht der von vielen prognostizierte Durchbruch. Stattdessen profitierten die Sozialdemokraten von einer Mischung aus mobilisierten Wählern aus der Arbeiterschaft und Wählern, die ein interventionistischeres Wirtschaftsmodell anstreben.\n\nDie Aufmerksamkeit richtet sich nun auf die Koalitionsverhandlungen und den Kampf um die Führung der nächsten Kommission. Die S&D mag die Wahl gewonnen haben, aber die Regierung Europas wird weiterhin Vereinbarungen mit anderen Blöcken und ein fragiles Gleichgewicht zwischen Haushaltsdisziplin und sozialen Ambitionen erfordern. Vorerst hat Brüssel jedoch eine Botschaft von den Wählern erhalten: Stabilität ohne Sicherheit reicht nicht aus, und Sicherheit ohne Fairness reicht nicht aus."
 news.662.a: "Europa kehrt zur sozialen Frage zurück."

 news.663.t: "Grüne/EFA gewinnen Europawahlen"
 news.663.d: "In einem der überraschendsten Ergebnisse der modernen europäischen Politik hat sich die Allianz der Grünen/EFA nach der Wahlnacht als stärkste Kraft im Europäischen Parlament herausgestellt und sowohl das liberale Zentrum als auch die traditionellen Parteiblöcke überholt. Das Ergebnis wurde durch starke Leistungen in Deutschland, Frankreich, den nordischen Ländern, den Benelux-Staaten und den großen städtischen Regionen Südeuropas getragen, wo die Wahlbeteiligung unter jüngeren und klimabewussten Wählern stark angestiegen war.\n\nDie Führer der Grünen/EFA präsentierten den Sieg als Mandat, um einen Strukturwandel in der gesamten Union zu erzwingen. Ihre Kampagne, die von Energieunsicherheit, steigenden Kosten und der Angst vor einem langfristigen ökologischen Kollaps geprägt war, versprach eine aggressive Dekarbonisierung, eine rasche Modernisierung des Stromnetzes, die Finanzierung des industriellen Wandels und eine strengere Regulierung großer Unternehmen. Sie forderten außerdem eine unabhängigere europäische Außenpolitik und eine stärkere Koordinierung bei strategischen Ressourcen.\n\nDas Ergebnis spiegelt einen Kontinent wider, der zunehmend von Krisenpolitik geprägt ist. Zwar konnten rechte und nationalistische Kräfte in mehreren Staaten Zugewinne verzeichnen, doch gelang es ihnen nicht, sich zu einer kohärenten parlamentarischen Mehrheit zusammenzuschließen. Stattdessen profitierten die Grünen von der Zersplitterung der Mitte und der wachsenden Überzeugung, dass die Zeit für "Business as usual" abgelaufen ist. Sitze zu gewinnen ist eine Sache. Das Wirtschaftsmodell Europas neu zu gestalten, die Energieversorgung zu sichern und die Union unter Druck zusammenzuhalten, ist eine andere."
 news.663.a: "Die Klimapolitik übernimmt die Führung."

 news.664.t: "Renew gewinnt Europawahlen"
 news.664.d: "Entgegen den Erwartungen einer Fragmentierung und Gewinnen der Extremisten hat sich der liberal-zentristische Block Renew Europe nach einer spannenden und aufmerksam verfolgten Wahlnacht als stärkste Kraft im Europäischen Parlament herausgestellt. Die ersten Hochrechnungen waren ungewiss, aber die endgültige Sitzverteilung bestätigte den knappen Vorsprung von Renew, der auf starke Ergebnisse in Frankreich, den Benelux-Ländern, Teilen Deutschlands und wichtigen städtischen Wahlkreisen in Südeuropa zurückzuführen war.\n\nDie Führer von Renew werteten das Ergebnis als Mandat für Stabilität und Reformen auf einem Kontinent, der von wirtschaftlichem Druck, Sicherheitsängsten und institutioneller Ermüdung geprägt ist. In seinen Siegeserklärungen versprach der Block erneute Investitionen in die europäische Industrie, eine engere Zusammenarbeit im Verteidigungsbereich und eine tiefere Integration in Bereichen, in denen nationale Regierungen allein nur schwer handeln können. Die Botschaft war klar: Europa kann sich keine Lähmung leisten, während sich die Krisen häufen.\n\nDas Ergebnis spiegelt auch die sich verschiebenden politischen Linien wider. Traditionelle Parteien konnten sich in einigen Regionen behaupten, verloren jedoch in anderen weiter an Einfluss, während es den Anti-Establishment-Bewegungen nicht gelang, sich zu einer einzigen parlamentarischen Kraft zu vereinen. Der Vorsprung von Renew resultierte nicht nur aus einer Welle der Begeisterung, sondern auch aus der disziplinierten Wahlbeteiligung pro-europäischer Wähler, die die Wahl als Referendum über den Zusammenhalt der Union betrachteten.\n\nNun beginnen unverzüglich die Verhandlungen über die Koalitionsbildung, die Ausschusskontrolle und die Auswahl der nächsten Kommission. Renew hat zwar die meisten Sitze gewonnen, aber um das Parlament zu regieren, sind weiterhin Bündnisse und Kompromisse erforderlich. Für Brüssel bedeutet das Ergebnis eine Atempause. Ob daraus eine Dynamik entsteht, ist eine andere Frage."
 news.664.a: "Das Zentrum hält vorerst stand."

 news.665.t: "EVP gewinnt Europawahlen"
 news.665.d: "Die Europäische Volkspartei (EVP) ist nach den EU-Wahlen, die von Kriegsängsten, wirtschaftlicher Instabilität und wachsenden Forderungen nach Ordnung und Vorhersehbarkeit geprägt waren, als größter Block im Europäischen Parlament hervorgegangen. Starke Ergebnisse in Mitteleuropa, Teilen Deutschlands, Österreichs und mehreren nördlichen und östlichen Mitgliedstaaten sicherten der EVP einen deutlichen Vorsprung vor ihren liberalen und linken Konkurrenten.\n\nDie EVP-Führung präsentierte das Ergebnis als Mandat für Stabilität, Haushaltsdisziplin und institutionelle Autorität in einer Zeit, in der Europa gleichzeitig mit externen Bedrohungen und internen Spannungen konfrontiert ist. Im Mittelpunkt ihrer Kampagne standen Verteidigungsbereitschaft, Grenzmanagement, industrielle Wettbewerbsfähigkeit und Energiesicherheit, wobei sie argumentierte, dass sich Europa angesichts der sich verschlechternden globalen Lage keine Fragmentierung leisten könne. n\nDie Wahl verdeutlichte auch die Verschiebung des Gleichgewichts innerhalb der Rechten. Während nationalistische Parteien in mehreren Ländern weiter an Unterstützung gewannen, gelang es der EVP, sich als dominante "verantwortungsbewusste" Kraft zu positionieren und von Wählern zu profitieren, die eine strengere Regierungsführung anstreben, ohne das europäische Projekt vollständig aufzugeben.\n\nDie Aufmerksamkeit richtet sich nun auf die Koalitionsverhandlungen und die Bildung der nächsten Kommission. Die EVP hat zwar die meisten Sitze gewonnen, aber für die Regierungsarbeit sind Vereinbarungen zwischen den verschiedenen Fraktionen im Parlament erforderlich, wobei bereits Streitigkeiten über Haushaltsregeln, Migrationspolitik und das Tempo wirtschaftlicher Interventionen aufkommen. Vorerst ist Brüssel jedoch in vertraute Hände zurückgekehrt."
 news.665.a: "Das Establishment gewinnt die Kontrolle zurück."

 news.666.t: "EKR gewinnen Europawahlen"
 news.666.d: "In einer bedeutenden Verschiebung des politischen Gleichgewichts in Europa haben sich die Europäischen Konservativen und Reformisten (EKR) nach Wahlen, die von Sicherheitsängsten, wirtschaftlicher Frustration und zunehmender Ablehnung gegenüber Brüssel geprägt waren, als größte Fraktion im Europäischen Parlament herauskristallisiert. Starke Ergebnisse in Polen, Italien, Teilen Mitteleuropas und mehreren konservativ geprägten Mitgliedstaaten brachten die EKR vor die traditionelle Mitte-Rechts-Koalition, die Linke und die liberale Koalition.\n\nDie Führer der EKR bezeichneten das Ergebnis als Revolte gegen die von ihnen als „unkontrollierte Zentralisierung” bezeichnete Entwicklung und versprachen, die Autorität an die nationalen Regierungen zurückzugeben und gleichzeitig die Union als strategisches Bündnis und nicht als integriertes politisches Projekt zu erhalten. In ihrem Programm betonten sie die Durchsetzung der Grenzen, die nationale Kontrolle über die Migrationspolitik, den Abbau von Regulierungsauflagen und einen härteren Kurs gegenüber internen Dissidenten und ausländischen Bedrohungen. n\nDie Wahl offenbarte ein gespaltenes Europa. Die Mitte-Blöcke verloren angesichts von Vorwürfen der Schwäche und bürokratischer Trägheit an Boden, während die linken Parteien angesichts des steigenden Drucks durch die Lebenshaltungskosten Schwierigkeiten hatten, sich zu einigen. Die EKR profitierte von diesem Vertrauensverlust und präsentierte sich als einzige Alternative, die in der Lage sei, die Ordnung wiederherzustellen, ohne die EU vollständig aufzulösen. n\nNun beginnen die Koalitionsgespräche in einem Parlament, das so gespalten ist wie nie zuvor in der jüngeren Geschichte. Die EKR hat die Wahl gewonnen, aber um diesen Sieg in eine effektive Führung umzusetzen, muss sie sich zwischen feindseligen Blöcken und konkurrierenden nationalen Prioritäten bewegen. Dennoch ist das Signal der Wähler klar: Brüssel wird nicht mehr so regieren wie bisher."
 news.666.a: "Europa rückt nach rechts."
 
 news.667.t: "EU-Mercosur-Abkommen unterzeichnet"
 news.667.d: "Das Handelsabkommen zwischen der EU und dem Mercosur wurde offiziell unterzeichnet und ist damit eines der größten Handelsabkommen, das Europa seit Jahrzehnten abgeschlossen hat. Nach Jahren stockender Verhandlungen, politischer Kehrtwenden und wiederholter Einwände von Mitgliedstaaten wurden die endgültigen Unterschriften in Brüssel unter großem diplomatischem Pomp und strengen Sicherheitsvorkehrungen geleistet. Für Brüssel wird das Abkommen als strategischer wirtschaftlicher Erfolg dargestellt. Europäische Industrieverbände haben sich nachdrücklich für das Abkommen eingesetzt und argumentiert, dass sich europäische Exporteure in einer Welt, in der der Handel zunehmend politisiert wird, geschlossene Märkte nicht mehr leisten können. Zollsenkungen und vereinfachte Vorschriften sollen den Zugang für europäische Automobile, Maschinen, Chemikalien und Industriedienstleistungen in ganz Südamerika verbessern und gleichzeitig die Position der Union in einer Region stärken, die seit langem von externen Mächten umkämpft ist. Landwirtschaftsverbände haben das Abkommen sofort verurteilt und davor gewarnt, dass billigere Agrarimporte vor allem die europäischen Erzeuger treffen werden, insbesondere in einer ohnehin schon fragilen ländlichen Wirtschaft. Umweltverbände haben ebenso wütend reagiert und der EU vorgeworfen, Klimaprinzipien zugunsten wirtschaftlicher Vorteile zu opfern. In mehreren Hauptstädten formieren sich bereits Proteste, rechtliche Schritte und parlamentarischer Druck.\n\nDie EU-Kommission betont, dass das Abkommen Schutzklauseln und Durchsetzungsmechanismen enthält, doch kaum jemand rechnet damit, dass die Gegenreaktion schnell abklingen wird. Der Vertrag ist unterzeichnet, die Märkte öffnen, und die wirtschaftlichen und politischen Folgen werden nun gemeinsam eintreten."
 news.667.a: "Handel hat immer seinen Preis."
 
 news.1918.t: "Das Imperium schlägt zurück!"
 news.1918.d: "Heute wurde die Bevölkerung des deutschen Staates mit einer Fernsehansprache des exzentrischen deutschen Kaisers Heinrich Reuss begrüßt. Nach einem blutigen Staatsstreich in Berlin durch fanatische kaiserliche Restauratoren prangerte das neue deutsche Staatsoberhaupt die vorherige Regierung als eine Kabale kryptoslawischer Globalisten an und verkündete die Wiederherstellung des alten deutschen Reiches und die Verhängung des Kriegsrechts. \n\nObwohl die Reichsbürger-Bewegung selbst vom nationalistischen deutschen Staat als Randgruppe betrachtet wird, hat sie nach der demütigenden Niederlage der deutschen Streitkräfte gegen die Sowjetunion und der anschließenden nationalistischen Revolution durch den mysteriösen Rädelsführer an Popularität gewonnen, wobei die Absetzung der vorherigen Junta und die Einsetzung von Reuss als selbsternannter Regent des Deutschen Reiches internationale Verurteilung durch die Weltgemeinschaft nach sich gezogen hat. Obwohl die Reichsbürger-Bewegung selbst vom nationalistischen deutschen Staat als Randgruppe betrachtet wird, hat sie nach der demütigenden Niederlage der deutschen Streitkräfte gegen die Sowjetunion und der anschließenden nationalistischen Revolution durch den geheimnisvollen Rädelsführer an Popularität gewonnen, wobei die Absetzung der vorherigen Junta und die Einsetzung von Reuss als selbsternannter Regent des Deutschen Reiches internationale Verurteilung in der Weltgemeinschaft hervorgerufen hat." 
 news.1918.a: "Auf das deutsche Volk wartet nur das Unheil..." 
 states.22.t: "Panzerduell in Louisville" 
 states.22.d: "Über internationale Kanäle sind Videos von einem angeblichen Panzerduell zwischen zwei amerikanischen M1 Abrams während der Schlacht von Louisville durchgesickert. Der erste Abrams, der loyal zur Regierung von Denver steht und einen Amateurfilmer namens JTAmerica76 hat, fuhr nach der Einnahme des Jefferson County Judicial Center von der South 8th Street in die leere Kreuzung ein und griff einige sich zurückziehende Streitkräfte der Regierung von Washington an. Einige Sekunden später kommt ein zweiter Abrams ins Bild, und nachdem es einige Sekunden lang nicht gelungen ist, ihn über den Funk zu rufen, stellt sich heraus, dass der Panzer der Regierung von D.C. loyal ist. \n\nNach einem kurzen Moment der Verwirrung sieht man, wie der zweite Panzer einen Schuss direkt über der Kamera abgibt, gefolgt von einem Gegenschuss des ersten Panzers, der direkt unter der Kanone eintrifft und den zweiten Panzer in Flammen aufgehen lässt. Die Kamera schwenkt dann auf den Kommandanten des ersten Panzers, der als Chad Blackburn, der Sohn von Senatorin Marsha Blackburn, identifiziert wird, und den man beten sieht. \nObwohl die Regierung von Washington D.C. noch nicht auf dieses Video reagiert hat, haben viele Nutzer im Internet die Echtheit des Videos durch Bilder der brennenden Schale auf den Straßen von Louisville bestätigt."
 states.22.a: "Louisville ist für immer gezeichnet"
 states.22.b: "Patrioten tun, was getan werden muss!"
 states.22.c: "Noch mehr Trumpistische Propaganda!"
 states.22.e: "Der Tod der angeblichen amerikanischen Unbesiegbarkeit..."
 states.22.f: "Die einzige Schwäche des Abrams war er selbst"
 states.23.t: "Schlacht um Washington D.C."
 states.23.d: "Während sich der Staub auf der einst unberührten Hauptstadt legt, scheint es dem Präsidenten, dem nun legitimierten Cincinnatus des amerikanischen Traums, Donald J. Trump, gelungen zu sein, die Biden-Loyalisten aus den Außenbezirken der Stadt zu vertreiben. \n\nIn einer Rede vor seinen Soldaten auf den Stufen des Hauptgebäudes, dem Ort, an dem die Wahl nur wenige Jahre zuvor bestätigt worden war, verkündete Trump trotzig: \"Die wahren Patrioten Amerikas haben den Sumpf trockengelegt! Unsere erstaunliche Armee hat die gesegnete und erstaunliche Stadt unserer Vorväter zurückerobert, und ähnlich wie Präsident Jackson vor mir haben wir unserem Feind gezeigt, dass wir nicht zu unterschätzen sind! Ich wette, dass Sleepy Joe nicht damit gerechnet hat, dass wir jemals so weit kommen würden! Wir geben den Menschen in dieser großartigen Nation einen Traum, der es wert ist, gepflegt zu werden! Einen Traum, in dem die Amerikaner Stolz auf ihr Land empfinden.\" \nMit dem Jubel, der in den Städten des amerikanischen Kernlandes ertönt, hat das amerikanische Volk ein Gefühl der Stärke und des Patriotismus erfasst, aber auch Schmerz und Wut über die Zerstörung solch wertvoller Denkmäler und Feiern des amerikanischen Geistes. Seit der Plünderung von D.C. im Jahr 1812 hat die amerikanische Hauptstadt noch nie eine solche Zerstörung erlebt."
 states.23.a: "Die Regierung von D.C. hat D.C. verloren."
 states.23.b: "Gott segne Amerika!"
 states.23.c: "Das kann nicht echt sein!"
 states.24.t: "Unternehmen Roaring Eagle erfolgreich"
 states.24.d: "Um 14:00 Uhr erhielten wir die Nachricht, dass die Spezialeinheiten, die vor den regulären Streitkräften zur Sicherung des Weißen Hauses entsandt worden waren, das Gebäude mit minimalen Verlusten eingenommen hatten. \n\nObwohl wir mit mehreren schwer bewaffneten Secret-Service-Agenten in Kontakt kamen, die in den Fluren Stapel von Dokumenten verbrannten, wurden keine Mitglieder der Regierung von Washington D.C. in dem Gebäude angetroffen."
 states.24.a: "Du kannst nirgendwo hin, Liberaler!"
 states.25.t: "Unternehmen Precise Talon gescheitert"
 states.25.d: "Um 12:17 Uhr erhielten wir die Nachricht, dass die Spezialeinheiten, die zur Sicherung des Pentagon vor den regulären Streitkräften entsandt worden waren, das Gebäude mit hohen Verlusten und dem Verlust der unterirdischen Ebenen des Pentagon eingenommen hatten. \n\nIn unmittelbarem Kontakt mit mehreren schwer bewaffneten Schwadronen von Soldaten versuchten unsere Kräfte mühsam, das Pentagon Büro für Büro einzunehmen. Doch kurz bevor sie den so genannten \"River Entrance\" erreichten, erschütterte eine gewaltige Explosion das Gebäude, und der Boden unter dem Gebäude schien zu implodieren. \n\nObwohl das Gebäude gesichert wurde, sind die Informationen, die sich einst unter dem Pentagon befanden, sei es über die Taktiken der Unionisten oder über mögliche Spione und Kollaborateure, nun für immer verloren."
 states.25.a: "Wir haben immer noch das Gebäude"
 states.26.t: "Schlacht um Sacramento"
 states.26.d: "Als sich der Rauch über der kalifornischen Hauptstadt lichtet, scheint es, dass der Rote General selbst, Michael Prysner, die Truppen der Nationalgarde erfolgreich aus dem Herzen der Stadt vertrieben hat. Die Amerikanische Volksbefreiungsarmee kontrolliert nun Sacramento. \n\nAuf einem gepanzerten Mannschaftswagen vor dem Capitol-Gebäude stehend, wo noch vor wenigen Jahren die Abgeordneten des Staates über kapitalistische Politik debattierten, wandte sich Prysner an seine triumphierenden Truppen: \"Genossen! Die Arbeiter Amerikas haben ihre Ketten gesprengt! Unsere tapfere Volksarmee hat diese Hochburg der bürgerlichen Unterdrückung befreit. Die kapitalistischen Hunde kauerten hinter ihren kostbaren Profiten, blind für die steigende Flut des Klassenbewusstseins! Aber jetzt, Genossen, schmieden wir ein neues Schicksal - nicht mit Gold, sondern mit dem eisernen Willen der Arbeiter. Von der Fabrikhalle bis zum fruchtbaren Feld sollen alle gleichberechtigt arbeiten und ernten. Das Räderwerk der Industrie dreht sich nicht für die wenigen, sondern für die vielen!\" \n\nNachdem sich die Nachricht vom Sieg verbreitet, fragen sich viele in der Welt: Wird sich der Kommunismus in Amerika endlich durchsetzen?"
 states.26.a: "Ein rotes Amerika?"
 states.26.b: "Das Volk ist unaufhaltsam!"
 states.27.t: "Zweite Schlacht um Sacramento"
 states.27.d: "Die Bodentruppen der Vereinigten Staaten haben das Ende der Anarchie in Sacramento verkündet. Kombinierte Offensiven von örtlichen Milizen und Armeebrigaden brachen die Verteidigung der Amerikanischen Volksbefreiungsarmee. Viele AVBA-Milizionäre ergaben sich in Massen, während die hartgesottenen Verteidiger kämpften, bis ihre Kampfgruppen praktisch ausgelöscht waren. Die bevorstehende Offensive der Bundestruppen versetzte Tausende von Zivilisten in Panik und löste eine Massenflucht von fast 200 Tausend Menschen aus." 
 states.27.b: "Möge Gott uns helfen."
 states.27.c: "Treibt sie ins Meer!"
 states.28.t: "Schlacht um Portland"
 states.28.d: "Nach Angaben der Auslandspresseabteilung der Amerikanischen Volksbefreiungsarmee ist die Stadt Portland jetzt vollständig unter der Kontrolle der Kommunisten. Berichten zufolge begannen die AVBA-Kräfte Anfang des Jahres mit dem Angriff auf die Stadt, überwältigten die Verteidiger und nahmen wichtige Regierungsgebäude ein, darunter das Rathaus und das Polizeipräsidium. Der Bürgermeister der Stadt wurde Berichten zufolge kurz nach Beginn des Angriffs von AVBA-Kräften in Gewahrsam genommen.\n\nDie Eroberung von Portland wird wahrscheinlich auch für den Rest des Landes große Auswirkungen haben. Portland, eine Stadt, die für ihre fortschrittliche Politik und ihre starke Unterstützung für linke Anliegen bekannt ist, ist seit langem ein Zentrum des Widerstands gegen die Politik der Regierung. Die Eroberung der Stadt durch die AVBA wird wahrscheinlich andere linke Gruppen im ganzen Land inspirieren und könnte zu einem Anstieg der Unterstützung für die Sache der AVB führen."
 states.28.a: "Interessante Entwicklung"
 states.28.b: "Wir sind unaufhaltsam!"
 states.28.c: "Möge Gott uns helfen."
 news.1922.t: "Anton Alichanow zum Präsidenten Russlands gewählt"
 news.1922.d: "Anton Alichanow, ein glühender Nationalist, hat die jüngsten Präsidentschaftswahlen unerwartet gewonnen und damit sowohl inländische als auch internationale Beobachter verblüfft. Sein Sieg markiert einen bedeutenden Wandel, denn Alichanow und seine Partei, Nationales Russland, lehnen das Konzept der "souveränen Demokratie" seit langem ab. \n\nAngesichts zahlreicher Probleme innerhalb des Systems, einer weit verbreiteten Unzufriedenheit mit dem Status quo und glanzloser Kampagnen anderer politischer Kandidaten gelang es Alichanow, einen beträchtlichen Teil der russischen Wählerschaft für sich zu gewinnen. Alichanow, der wegen seiner strikten Ablehnung der liberalen Reformen von Präsident Medwedew aus der Partei "Vereinigtes Russland" ausgeschlossen wurde, schloss sich den Rechtsradikalen an. Er begann mit Nationales Russland, übernahm schließlich die volle Kontrolle und etablierte seine eigene politische Ideologie, den "Derschawismus". Diese Doktrin ist entschieden antidemokratisch und fortschrittsfeindlich. \n\nViele fragen sich nun, wie die Zukunft Russlands aussehen wird, da Alichanow darauf abzielt, die demokratischen Grundlagen des Landes zu zerstören. Er bringt offen seinen Hass gegenüber vermeintlichen Feinden innerhalb und außerhalb der russischen Grenzen zum Ausdruck. Im Kreml scheint sich ein dunkler, bedrohlicher Sturm zusammenzubrauen."
 news.1922.a: "Ein Sturm im System."
 news.1923.t: "Aufstieg des neuen Russlands"
 news.1923.d: "Als Alichanow die Macht übernahm, war klar, dass er das föderale System umgestalten und durch ein zentralisiertes, autoritäres Regime ersetzen wollte. Die Frage war nur, wie und wann.\n\nJetzt ist es offensichtlich. Die Föderation gibt es nicht mehr. In seiner letzten Rede verkündete Alichanow, dass die alten Institutionen in den neuen russischen Staat umgewandelt werden. Auf einer Großkundgebung im Kreml flatterten Hunderte von imperial-nationalistischen Fahnen. Die Führer der Partei Derzhavnik forderten ihre Anhänger auf, sich die neue Staatsform zu eigen zu machen.\n\nAlikhanov, der nun offiziell den Titel "Oberster Führer" trägt, sprach als letzter. Er sprach Drohungen gegen äußere und innere Feinde aus und erklärte, Russland müsse sich auf einen großen Kampf vorbereiten. Er legte ein Lippenbekenntnis zur Idee der Multipolarität ab - und betonte die Notwendigkeit, die Lebensweise aller Nationen zu schützen. Seine politischen Gegner sind zwar verstreut, aber immer noch bereit, weiterzukämpfen, und die oppositionellen Mediendienste prangerten ein weiteres diktatorisches Abgleiten an."
 news.1923.a: "Verstörend."
 news.1924.t: "Bürgerkrieg in Russland!"
 news.1924.d: "Nachrichten aus Russland berichten von einem großen Aufstand gegen die Derschawnik-Regierung. In Sankt Petersburg, dem Zentrum der Rebellion, haben sich Sozialisten und Kommunisten gegen Alichanow verbündet. \n\nTrotz Skepsis hinsichtlich des Erfolgs des Aufstands untergräbt diese Entwicklung die Stabilität des Staates und lässt Zweifel an Alichanows Popularität aufkommen. In Sankt Petersburg gilt seit vielen Monaten eine besondere Ausgangssperre, was als einer der Gründe für die Rebellion angesehen wird. Das russische Militär hat beschlossen, in seinen Kasernen zu bleiben und sich nicht in den Konflikt einzumischen, um weiteres Blutvergießen zu vermeiden. Beide Seiten müssen sich auf ihre Milizen und gelben Garde-Bataillone verlassen, Kräfte, die von Ideologie getrieben sind. \n\nEin dunkler Schatten liegt über Russland, da der Ausgang des Konflikts nur noch mehr Instabilität in der Region säen wird, sei es durch eine sozialistische Revolution oder die Ausweitung der Terrormaschinerie der Derschawniks."
 news.1924.a: "Beunruhigend." 
 news.1925.t: "Bürgerkrieg in Russland!"
 news.1925.d: "Nachrichten aus Russland berichten von einem großen Militärputschversuch gegen die Derschawnik-Regierung. In Kuban, dem Epizentrum des Aufstands, haben sich Militärs und demokratische Führer gegen Alichanow verbündet. Skeptiker bezweifelten die Erfolgsaussichten des Aufstands, doch diese Entwicklung erschüttert die Grundfesten des Staates und stellt Alichanows Position in Frage. Kuban wurde wahrscheinlich als Hauptquartier für den Putsch ausgewählt, weil es dort kaum Aktivitäten von Dezhavnik-Anhängern gab und die Bevölkerung im Allgemeinen unpolitisch ist. \n\nDie meisten russischen Truppen blieben in ihren Kasernen, entschieden sich für Neutralität und vermieden den Konflikt, um weiteres Blutvergießen zu verhindern. Beide Seiten sind auf ihre Streitkräfte und die Bataillone der Gelben Garde sowie andere ideologisch motivierte Gruppen angewiesen. \n\nÜber Russland schwebt ein Schatten der Unsicherheit, da die Lösung des Konflikts die regionale Instabilität nur noch verschärfen wird, sei es durch eine fragile Demokratie oder die Ausbreitung des Terrorapparats der Derschawniks."
 news.1925.a: "Beunruhigend."
 
 news.1926.t: "Russlands demokratische Wiederherstellung"
 news.1926.d: "Der Bericht aus Moskau ist eindeutig: Die Diktatur der Derschawniks ist zusammengebrochen. Ihre Anführer sind nach heftigen Angriffen und gewagten Operationen der rebellierenden Militärs geflohen. \n\nAuf den Straßen freuen sich die russischen Bürger über den Sturz der Tyrannei. Aber der unsicheren Allianz aus Demokraten und Liberalen fehlen klare Pläne für die Zukunft nach dem Ende der Diktatur. Sie müssen sich noch darauf einigen, wer die Übergangsphase leiten wird, die unmittelbar nach der Befreiung Moskaus angekündigt wurde. Viele versuchen, das Konzept der souveränen Demokratie neu zu definieren. \n\nAuf der Seite der Rebellen sind es nun die niedrigrangigen Mitglieder der Derzhavnik, fanatische Faschisten, die sich weigern, sich zu ergeben. Sie sorgen für Panik und Unruhen in den kleinen Regionen, in denen ihre Herrschaft noch nicht gefestigt ist. \n\nDas Militär hat der neuen Regierung seine Unterstützung zugesagt und bereits die Derzhavnik-Elemente entfernt, die der vorherige Präsident ihm aufgezwungen hatte. \n\nTrotz aller Herausforderungen ist Russland nach einer langen Zeit der kryptofaschistischen Herrschaft endlich in eine neue Ära eingetreten."
 news.1926.a: "Hoffen wir auf das Beste." 
 news.1927.t: "Sozialistische Revolution in Russland"
 news.1927.d: "Nachrichten aus Moskau: Das Derschawnik-Regime ist gestürzt. Seine Anführer, darunter Alichanow, flohen nach einem heftigen Angriff der roten Milizen aus dem Aufstand in Sankt Petersburg. \n\nDie Straßen Moskaus sind voller Jubel, während die Bürger das Ende der Tyrannei feiern. Die linke Koalition bleibt jedoch vorsichtig. Sergei Udalzow, bekannt für seinen langjährigen und engagierten Aktivismus, sticht als Schlüsselfigur in der neuen Regierung hervor. Sein weit verbreiteter Respekt macht ihn zum beliebtesten Kandidaten für die Führung Russlands in den kommenden Tagen. Sein zurückhaltender Sozialismus könnte jedoch zu einer Vielzahl von Wegen führen, die Russland in Zukunft einschlagen kann, und nicht jeder kann damit glücklich sein. \n\nAuf der Seite der Rebellen sind es nun die rangniedrigeren Mitglieder der Derzhavnik, fanatische Faschisten, die sich weigern, nachzugeben. Sie säen Panik und Unruhe in den fragilen Regionen, in denen ihr Einfluss nach wie vor gering ist. Das Militär hat der neuen Regierung seine Unterstützung zugesagt und bereits die vom früheren Präsidenten eingesetzten Derschawnik-Elemente entfernt. \n\nRussland ist in eine neue Ära eingetreten und hat eine lange Zeit faschistischer Unterdrückung beendet."
 news.1927.a: "Die Rückkehr des Oktobers."
 news.1928.t: "Alichanow besiegt Aufständische"
 news.1928.d: "Der Ausgang der Schlacht innerhalb Russlands ist klar: Alichanow geht trotz aller Widrigkeiten als Sieger hervor. Die Rebellen wurden durch den unerbittlichen Angriff der Derschawniks entscheidend besiegt. \n\nAuf den Straßen brachen von der Regierung und staatlich unterstützten Gruppen organisierte Kundgebungen aus, auf denen der Sieg über die von ihnen als herzlose Verräter angesehenen Rebellen gefeiert wurde. \n\nAlichanow trat selbst vor die Fernsehkameras und sprach ausführlich über die Situation. Er erklärte, dass die Verräter aufgrund der übermäßig humanistischen Natur des Regimes aufgestiegen seien und dass diese Schwäche der Toleranz aus ganz Russland getilgt werden müsse. \n\nDieses Ereignis markierte den Beginn einer massiven Terrorkampagne gegen diejenigen, die sich gegen den Staat stellten und Verbindungen zu Rebellengruppen hatten."
 news.1928.a: "Verletzt, aber nicht besiegt."
 
 news.1929.t: "Russland greift Europa an!"
 news.1929.d: "Die geopolitische Lage entlang der Grenze zwischen Russland und Europa hat sich drastisch verschlechtert und zum Ausbruch von Feindseligkeiten geführt. Russlands aggressive Handlungen werden weithin als Auslöser für diese Konfrontationen angesehen. \n\nDie russische Regierung behauptet, ihre Handlungen seien defensiver Natur, ein Präventivschlag gegen eine ihrer Meinung nach unmittelbar bevorstehende Bedrohung. Im Gegensatz dazu verurteilen europäische Staats- und Regierungschefs Russlands Offensive als klaren Ausdruck imperialistischer Ambitionen. \n\nUngeachtet der unterschiedlichen Standpunkte ist es unbestreitbar, dass dieser Konflikt den Krieg zurück nach Europa gebracht hat. Tausende Soldaten werden mobilisiert und bereiten sich auf einen langwierigen und blutigen Kampf vor. Russland, angetrieben von starkem Nationalismus, bündelt seine militärische Macht, während Europa seine Elitetruppen einsetzt. \n\nDies ist der Krieg, der über das Schicksal Europas entscheiden wird."
 news.1929.a: "Der letzte Krieg..."
 
 news.1000.t: "Präsident Nadeschdin gestürzt"
 news.1000.d: "Die Hoffnung in Russland schwand, als Boris Nadeschdin, ein unerwarteter Nachfolger von Dmitri Medwedews System, auf den erwarteten Widerstand von Hardlinern und Konservativen innerhalb der ONF stieß. Dieser Widerstand führte letztendlich zu seiner erfolgreichen Absetzung als Präsident. \n\nDann trat Jewgenij Fjodorow auf den Plan, Nadeschdins schärfster Kritiker und Anführer der Nationalen Befreiungsbewegung, einer marginalen, aber lautstarken Organisation innerhalb des russischen Staatssystems. Fjodorow wurde zur Galionsfigur der reaktionären Opposition gegen Nadezhdins Reformen. Mit bombastischer und verschwörerischer Rhetorik behauptete Fjodorow, Nadezhdin sei ein Werkzeug des immer noch vorherrschenden liberalen globalistischen Deep State innerhalb Russlands. Laut Fjodorow überredeten diese Agenten einen kriegsmüden und erschöpften Medwedew, Nadeschdin zu seinem Nachfolger zu wählen. Das Ziel war es, das siegreiche Russland von innen heraus zu zerstören, es zu schwächen und unvorbereitet für das Wiederaufleben des Globalismus zu lassen. \nFjodorow mobilisierte die ländliche und ungebildete Bevölkerung mit seinen kühnen Proklamationen und Aufrufen zum Handeln und nutzte dabei seine loyale NOD als Werkzeug. Unterdessen stellte ihn eine hinterhältigere Opposition innerhalb der ONF als Verfechter der Stabilität und Ordnung in Russland dar. Als Nadezhdin den Fehler machte, sich zu übernehmen, setzte ihn die ONF schnell ab. Trotz einiger Widerstände seitens seiner Anhänger in der Duma und auf den Straßen gelang es den loyalen Massen und der Polizei schnell, die regierungsfeindlichen Stimmungen zu unterdrücken."
 news.1000.a: "Das Imperium schlägt zurück!"
 

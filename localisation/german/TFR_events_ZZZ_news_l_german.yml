 news.553.t: "Trumps populistische Revolution"
 news.553.d: "Heute hat Donald Trump im Rosengarten des Weißen Hauses ganz Amerika die Kapitulation der verbliebenen Kräfte verkündet, die sich seiner Präsidentschaft widersetzen. Nachdem er nach dieser Ankündigung als Präsident vereidigt worden war, trug Präsident Trumps Antrittsrede wenig zur Beruhigung der Spannungen bei, die immer noch die amerikanische Psyche befallen. Viele außenstehende Analysten und Beobachter bezeichnen die aktuelle Situation in Amerika als "Trumpistische Revolution". \nPräsident Trump, der einst für seinen unverschämten Stil bekannt war, war in der Lage, eine starke Koalition aufzubauen, die nicht nur die Konservativen und die Gemäßigten umfasste, sondern er war auch in der Lage, die starken rassischen, wirtschaftlichen und politischen Gräben zu überwinden, die die Amerikaner seit Jahrzehnten getrennt haben. Bisweilen herrschte er spaltend, aber das hielt Millionen von Amerikanern nicht davon ab, sich seiner Sache anzuschließen. Für seine Anhänger hat er gehalten, was er versprochen hat: eine echte populistische Machtübernahme in den USA. Selbst diejenigen, die ihm neutral gegenüberstehen, sehen in ihm einen Mann, der das Spiel wirklich verändert hat.\n\nPolitische Technologen sagen voraus, dass die Taktik und Ästhetik des Trumpismus noch viele Jahre lang von vielen rechtsgerichteten oder auch nur populistischen politischen Gruppen auf der ganzen Welt genutzt werden wird."
 news.553.a: "Amerikas goldener Wind."
 news.553.b: "Win, Win, Win!"
 news.556.t: "Belgiens Auflösung"
 news.556.d: "In einer interessanten Entwicklung kündigte die ehemalige belgische Regierung die Auflösung Belgiens und die Schaffung zweier neuer Staaten an, nämlich des kulturell französisch dominierten Walloniens und des kulturell niederländisch dominierten Flanderns. Die Idee für eine solche Entscheidung entstand in der Blütezeit von COVID-19, die Unzufriedenheit und Unruhen gegen die Regierung in nie gekanntem Ausmaß schürte.\n\nNach einiger Zeit gewannen Bewegungen an Boden, die die Auflösung Belgiens als Staat forderten. Proteste, Petitionen und die wachsende Selbstbestimmung trieben die Idee weiter voran, so dass die Regierung aufgrund des enormen Drucks ein Referendum ansetzen musste. Am Ende stimmten über 68 Prozent der Bevölkerung für die Auflösung. So wurde beschlossen, die belgische Regierung aufzulösen und den beiden Regionen zu erlauben, eigene Staaten zu werden. Brüssel, die frühere Hauptstadt Belgiens, wurde unter die Kontrolle der Europäischen Union gestellt und verließ die EU-Hauptstadt, nachdem sich die belgische Regierung, EU-Vertreter und führende Vertreter der Auflösungsbewegung in gemeinsamen Verhandlungen darauf geeinigt hatten, sie als solche zu belassen.\n\n In anderen Entwicklungen wird erwartet, dass die Niederlande und Frankreich ihre Beziehungen zu den neu geschaffenen Ländern ausbauen werden, und einige sagen sogar voraus, dass die beiden Nationen ihre jeweiligen gesellschaftlichen Ableger aufnehmen oder annektieren könnten."

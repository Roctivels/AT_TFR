 news.242.t: "Russische Meritokratie!"
 news.242.d: "Während die meisten nicht überrascht sind, dass Medwedew an Putins Kurs festhält, haben einige Analysten auf eine merkwürdige Veränderung in der Regierung hingewiesen. Viele Regierungsbeamte und Oligarchen, von ganz oben bis ganz unten, wurden wegen Korruption vor Gericht gestellt, wobei der Staat sogar so weit ging, ihr Auslandsvermögen ohne Gerichtsverfahren einzuziehen. In der Zwischenzeit hat sich der Personenkult um den Präsidenten verlagert. Putin ist im Wesentlichen zu einer Ikone des "russischen Republikanismus" geworden, wobei sein Image in gewisser Weise dem von Julius Cäsar ähnelt. Der Putinismus scheint nicht länger eine Idee liberaler Technokraten zu sein, die ihren Reichtum und ihre Herrschaft für immer in Russland behalten wollen.\nMedwedew hat seine Regierung effektiv gesäubert, wobei ineffektive und korrupte Beamte "freiwillig" ihre Besitztümer abgaben, nachdem der FSB ihre Familien und Angehörigen besucht hatte. Diejenigen, die Ergebnisse vorweisen konnten, durften jedoch einen Teil ihres Vermögens behalten. Ab sofort werden zahlreiche freie Stellen neu besetzt, wobei der Schwerpunkt auf "jungem Blut" liegt, um die autoritäre Demokratie zu verjüngenn.\nNachdem die liberale Opposition dies als "neue Oprichnina" bezeichnet hat, unterstützen die meisten Russen diese Maßnahmen. Die Eliten sind gesäubert, die Silowiki sind gestärkt und das Volk ist voller Hoffnung. "
 news.242.a: "Wer nicht mit uns ist, ist gegen uns.
 news.242.b: "Unüberraschend."
 news.243.t: "Demokratie in Russland!"
 news.243.d: "Es scheint, dass sich Medwedews liberale Einstellung seit 2008 nicht geändert hat. Die russische Politik hat einen drastischen Wandel durchgemacht: Die meisten, wenn nicht sogar alle russischen Parteien haben sich zu einem Dreiparteiensystem zusammengeschlossen und reformiert.\nKPRF, Gerechtes Russland und die Sozialisten haben sich zur Partei "Volksrussland" reformiert, während die Partei "Neues Volk" sich zur Partei "Neues Russland" reformiert hat und Mitglieder der Partei Jabloko aufgenommen hat. Einiges Russland ist Medwedews Partei geblieben, auch wenn sie umstrukturiert wurde, um sich dem Mitte-Rechts-Bereich anzunähern, wobei viele ihrer Mitglieder zu den beiden anderen Parteien wechselten.\nAuch wenn einige behaupten, es handele sich um eine einfache Umschichtung, scheint es, dass diese drei Parteien bei den nächsten Wahlen tatsächlich miteinander konkurrieren. Ganz zu schweigen von den zahlreichen Untergruppen innerhalb dieser Parteien, die bereits versuchen, die Wähler für ihre Politik zu gewinnen.\nViele Russen blicken mit Hoffnung auf diesen Wandel. Demokratie wird nicht länger damit assoziiert, dass man sein eigenes Volk aushungert und entehrt, indem man privatisiert und gleichzeitig den Amerikanern die Stiefel leckt. Das russische demokratische Experiment wird sich niemandem beugen, weder von innen noch von außen. "
 news.243.a: "Der zweiköpfige Adler hat einen neuen Zweck bekommen."
 news.244.b: "Der Wind des Wandels hat begonnen zu wehen."
 news.244.d: "Viele erwarteten nach dem Sieg viele Veränderungen von der russischen Regierung, einige sprachen sogar von Demokratie in Russland, andere von einer noch stärkeren Zentralisierung Russlands, doch sie lagen alle falsch, Medwedew hält den Status quo innerhalb der Russischen Föderation aufrecht, was natürlich viele enttäuscht. Auch wenn viele Oligarchen leer ausgegangen sind, was sicherlich frischen Wind in die russische Politik bringen wird. So oder so ist Russland der unangefochtene Herrscher über Europa und kann sich endlich als globale Supermacht bezeichnen."
 news.244.a: "Morgen wird alles.\nBesser sein."
 news.245.t: "Neue Verfassung in Russland!"
 news.245.d: "Die meisten Analysten sind zwar nicht überrascht, dass Medwedew die Politik Putins fortsetzt, doch scheint sich das politische System verändert zu haben.\n\nDie politischen Parteien wurden im Wesentlichen zu einer Koalition unter dem Dach der "Vereinigten Nationalen Front" zusammengeführt, einer Organisation, die Putin 2011 ins Leben gerufen hat, um die Parteien zumindest auf dem Papier mit dem Volk zu einem einheitlichen Netz zu verbinden und das System zu stärken. Medwedew scheint die Organisation in eine einheitliche Parteienkoalition umgewandelt zu haben, indem er staatsfeindliche Parteien wie Jabloko ausgeschlossen hat. \n\nWährend die "Einheitsfront" im Wesentlichen ein einheitlicher Block ist, der sich auf die Erhaltung Russlands und seiner Werte stützt, haben die ihr angehörenden Parteien ihre eigenen, voneinander abweichenden Programme, wie z. B. die planwirtschaftlichen Reformvorschläge der KPRF oder die migrantenfeindlichen und staatskapitalistischen Vorschläge der LDPR. Die Partei  Vereinigtes Russland  fungiert als neutrale Mehrheit, die zwischen den Vorschlägen der kleineren Parteien wählt und nur eingreift, wenn es nötig ist.\n\nPutin wurde inzwischen als "Vater der russischen Demokratie" zementiert, und Statuen und Kunstwerke des Ex-Präsidenten sind zu einem alltäglichen Anblick in der russischen Landschaft geworden. Seine früheren Fehler sind vergessen, und sein Image grenzt an den Idealismus von Boris Jelzins Wahlkampf in der RSFSR. Ein echter starker Demokrat des russischen Volkes, der nicht an die westliche Kontrolle gebunden ist.\n\nAuch in der Gesellschaft scheint es positive Veränderungen zu geben. Der zivile Zweig der Einheitsfront wurde in den Staat integriert und wird nun eingesetzt, um korrupte Beamte der verschiedenen Verwaltungen zu verhaften. Zwar gab es in dieser Angelegenheit einige Schwierigkeiten, da sich einige Politiker der Verhaftung entzogen, aber die öffentliche Meinung gewinnt in der Tat an Bedeutung in der Politik. \n\nIn jedem Fall geht Russland mit der stolz wehenden Trikolore in die Zukunft, so wie es das 20 Jahre zuvor getan hatte."
 news.245.a: "Lang lebe Russland!"
 news.245.b: "Unüberraschend."
 news.246.t: "Schlacht um Berlin"
 news.246.d: "Berlin, Deutschland -- Reuters\n\nZum ersten Mal seit Generationen ist die Schlacht in die Straßen Berlins zurückgekehrt, wo sich deutsche und russische Truppen in schweren, an den Zweiten Weltkrieg erinnernden Straßenkämpfen gegenüberstehen. Scheinbar über Nacht durchbrachen die mit Russland verbündeten Truppen die Verteidigungslinien östlich der Oder und leiteten damit eine offenbar historische Wiederholung einer konzentrierten Offensive auf die deutsche Hauptstadt ein. Im Morgengrauen brachen in den östlichen Bezirken Marzahn und Lichtenberg Kämpfe aus, während sich die deutschen Streitkräfte um das Zentrum und wichtige Logistikrouten wie der Treptow-Eisenbrücke und Köpenick verschanzten. Die Schlacht entwickelt sich derzeit zu einem der heftigsten städtischen Gefechte des Krieges: Anwohner berichten von Artilleriebeschuss und entferntem Gewehrfeuer, das durch behelfsmäßige Bunker in der U-Bahn widerhallt, während über ihnen ständig Drohnenschwärme schwirren. Der öffentliche Nahverkehr wurde eingestellt, die Krankenhäuser sind überlastet, und die Sirenen des Zivilschutzes ertönen nun fast stündlich.\n\[GER.GetLeader] wandte sich heute Morgen in Paris an die Nation, nannte die Lage "ernst, aber nicht hoffnungslos" und forderte die Bürger auf, zusammenzuhalten. "Die russischen Streitkräfte werden den kollektiven Geist Deutschlands und des europäischen Widerstands nicht brechen." Analysten weisen darauf hin, dass die Bedeutung der Schlacht über die geografische Lage hinausgeht, da Berlin in vielerlei Hinsicht das kulturelle und politische Nervenzentrum Europas bleibt."
 news.246.a: "Wir haben die Höhle der Bestie erneut betreten."
 news.246.b: "Das Ende ist nah..."
 news.246.c: "Der Krieg eskaliert..."
 news.247.t: "Gründung der neuen Achse"
 news.247.d: "Als sich der Staub in Osteuropa legte, rutschte Westeuropa in den Totalitarismus ab. Die Regierungen von Frankreich, Italien und Deutschland trafen sich in Berlin, um ein Bündnis zu schließen, das als Stahlpakt bekannt wurde. Obwohl die Staats- und Regierungschefs betonen, dass es sich um ein reines Verteidigungsbündnis handelt, bleiben viele Menschen skeptisch und stellen die wahren Motive in Frage. \n\nDie Gründung dieses Militärbündnisses hat in Europa Interesse und Besorgnis geweckt, da Nationen wie Portugal, Spanien, Griechenland und das Vereinigte Königreich Interesse an einem möglichen Zusammenschluss aus strategischen Gründen gezeigt haben. Sowjetische Beamte argumentieren, dass das Bündnis dem der Achsenmächte in den 1940er Jahren ähnelt, die den Tod von Millionen von Menschen und massive Verwüstungen verursacht haben, und haben gewarnt, dass sie Sanktionen gegen jeden verhängen werden, der sich mit Berlin verbündet.\n\nDie Zukunft Europas hängt in der Schwebe, viele fragen sich, ob dieses Bündnis eine neue Ordnung in Westeuropa aufrechterhalten wird oder ob es versuchen wird, in den Osten vorzustoßen und einen weiteren verheerenden Konflikt auszulösen."
 news.247.a: "Der Westen ist auf dem Weg zu einem unvermeidlichen Konflikt!"
 news.247.b: "Über alles..."
 news.247.c: "Die Geschichte wiederholt sich..."
 news.248.t: "Zweiter Marsch auf Rom" 
 news.248.d: "In einer Szene, die an die berüchtigtsten Momente der Geschichte erinnerte, stürmten Tausende von schwarz gekleideten Demonstranten auf Rom zu, ihre Fahnen flatterten im Wind, ihre Gesänge hallten durch die ewige Stadt. Angeführt von einer Koalition aus Faschisten, Monarchisten und Rechtsradikalen hatte dieser "Zweite Marsch auf Rom" eine unverkennbare Ähnlichkeit mit Mussolinis schicksalhaftem Aufstieg - ein erschreckendes Echo einer Vergangenheit, von der viele gehofft hatten, dass sie nie wiederkehren würde.\n\nItalien, das durch die katastrophale Niederlage der NATO im Russisch-Europäischen Krieg verkrüppelt wurde, ist zu einem fruchtbaren Boden für radikales Wiederaufleben geworden. Der wirtschaftliche Zusammenbruch, die steigende Arbeitslosigkeit und die Enttäuschung über den demokratischen Prozess haben die Bürger in die Arme derjenigen getrieben, die rasches Handeln und eine nationale Wiedergeburt versprechen. Fahnen mit den Faszikeln und königlichen Insignien beherrschen jetzt die Straßen, während die Demonstranten sich selbst zu den Rettern eines gedemütigten und zerrissenen Italiens erklären. Als der Marsch die Stufen des Palazzo del Quirinale erreichte, forderten ihre Anführer die Abdankung der schwachen Regierung und die Wiederherstellung von Italiens "Bestimmung als europäische Macht". Das Gespenst von Mussolinis Erbe schwebt über diesem Moment, während sich die Italiener mit der Frage auseinandersetzen: Ist dies der Beginn eines neuen Kapitels oder ein Eintauchen in eine allzu vertraute Dunkelheit?"
 news.248.a: "Eine glorreiche Wiedergeburt beginnt!"
 news.248.b: "Die Geschichte wiederholt sich."
 news.249.t: "Auflösung der NATO" 
 news.249.d: "Nach fast 80 Jahren gegenseitiger Verteidigung und kollektiver Sicherheit zwischen ihren Mitgliedern wurde die Nordatlantikvertrags-Organisation nach den Folgen der russischen Expansion nach Westen faktisch aufgelöst. Diese wurde kurz nach der Ankündigung ausgelöst, dass die Allianz nach einem Grenzkonflikt zwischen Russland und Polen in der Ukraine eingreifen würde, was dazu führte, dass die NATO Artikel 5 ausrief. \n\nDas Chaos, das daraufhin ausbrach, verwüstete den gesamten europäischen Kontinent. Das Bündnis war nicht in der Lage, die russische Kriegsmaschinerie zu stoppen, die immer tiefer nach Westeuropa vordrang, was zu einer fast vollständigen Niederlage des Bündnisses führte, da fast alle östlichen Mitglieder von Russland annektiert oder unterworfen wurden, wobei das prominente Mitglied Polen in Ost und West gespalten wurde, wie zuvor Deutschland.\nFür den Moment wütet das Chaos in dem, was von den ehemaligen westlichen Gesellschaften übrig ist."
 news.249.a: "Das Ende einer Ära..."
 news.250.t: "Revolution in Deutschland" 
 news.250.d: ""
 news.250.a: "Interessant."
 news.251.t: "Rote Welle in Italien" 
 news.251.d: "Ungläubigkeit und Schock über den Sieg einer linksgerichteten Koalition aus Sozialisten und Kommunisten bei den Wahlen in Italien. Viele Politiker in Italien und der EU bezweifelten die Aussichten auf ein Wiedererstarken der Linken in der italienischen Politik und verwiesen auf frühere Misserfolge der Regierung und Enttäuschungen der italienischen Linken. Es scheint jedoch, dass viele mit ihrer Unterschätzung der italienischen Linken gewaltig daneben lagen. Unter Ausnutzung der Unzufriedenheit in der Arbeiter- und unteren Mittelschicht sowie der Ängste vor einer turbulenten und gewalttätigen Welt haben mehrere linke Parteien bei den letzten Wahlen enorme Zugewinne erzielt. Der Sieg war so dramatisch, dass diese Parteien eine Mehrheit im italienischen Parlament erringen und eine Regierung bilden konnten. Die siegreiche Koalition hat eine einzige, aber triumphale Erklärung abgegeben, in der sie behauptet, ihr Sieg sei \"der Wille des italienischen Volkes gegen einen ungerechten und repressiven Status quo\". Viele Italiener haben jedoch Angst vor der neuen Regierung, da der Radikalismus der extremen Linken und ihre Verachtung für die kapitalistische und liberale Demokratie den Eindruck erwecken, dass sich das Land möglicherweise in eine unheilvolle Richtung entwickeln wird."
 news.251.a: "Es hat gerade erst begonnen"
 news.252.t: "Politisches Chaos in Griechenland" 
 news.252.d1: ""
 news.252.d2: ""
 news.252.d3: ""
 news.252.a: "Die Situation eskaliert."
 news.253.t: "Die Entstehung der Europäischen Union" 
 news.253.d: "Mit der Niederlage der NATO gegen Russland dachten viele, dass der Nagel auf den Sarg des westlichen Liberalismus gelegt worden sei. Was die Analysten nicht sahen, war ein Aufschrei hinter den gefallenen Fahnen der Ukraine, Polens, Ungarns, Rumäniens und so vieler anderer Länder. In Ländern in ganz Europa wurden radikale Parteien verboten, die beschuldigt wurden, die russischen Invasionen zu unterstützen. Diejenigen, die gegen den Krieg protestierten, wurden als Verräter und russische Saboteure abgestempelt und hart verfolgt. Zur gleichen Zeit entstand in Europa ein kollektives Bewusstsein der europäischen Einheit. Frankreich, Belgien, die Niederlande, Deutschland und Italien unterzeichneten die Europäische Charta, die die Überreste der Europäischen Union zu einem einzigen föderalen Gebilde zusammenfasste, das sich von Lissabon bis Berlin erstreckte. Angesichts der schweren revanchistischen Gefühle, die in allen großen europäischen Hauptstädten herrschen, scheint ein weiterer Krieg fast unvermeidlich."
 news.253.a: "Interessant."
 news.254.t: "Spanien in Gewalt verstrickt" 
 news.254.d: "In einer Wiederholung des Jahres 1936 zerreißt sich die [SPR.GetName] selbst.\nPolitischer Extremismus und regionale Bewegungen sind seit langem ein Grund für die Herrschaft des Bourbonenkönigs [SPR.GetLeader] und seines Parlaments. Frühere katalanische Unruhen und der anhaltende baskische Terrorismus waren die größten und bemerkenswertesten Anzeichen dieser unterschwelligen Spannungen seit den 1980er Jahren, und doch begannen diese Spannungen erst dann wirklich überzukochen, als die russischen Streitkräfte die spanische Militärmacht in der Schlacht um Osteuropa dezimierten. Mit neuem Eifer nutzten Mobs, Regionalisten, Falangisten, Syndikalisten, Anarchisten und sogar Verräter innerhalb der königlichen Legislative, die eine Republik gründeten, den geschwächten Militärapparat und den öffentlichen Aufruhr, um die Leiter des Chaos zu erklimmen. Spanien blutet, keine Region bleibt verschont, und die Spannungen schwappen nach Portugal über, wo extremistische Elemente, die ebenfalls ermutigt wurden, daran arbeiten, die Regierung in Lissabon zu putschen, bevor das portugiesische Militär richtig nach Hause zurückkehren kann, festgefahren im Chaos der aktuellen innenpolitischen Situation Spaniens.\n\nKräfte, die loyal zur Regierung von König [SPR.GetLeader] haben ihr Bestes getan, um Madrid zu verteidigen, aber die chaotische Situation macht die Neupositionierung der Truppen zu einem Albtraum, und da jede Seite des Krieges Madrid als Verwaltungszentrum begehrt, werden die Männer des Königs von jeder Art politischer Miliz von links über rechts bis hin zur Mitte bedrängt, und die Kräfte des Königs sind bereits ins Wanken geraten."
 news.254.a: "Dios Mio..."
 news.255.t: "Frieden in Europa" 
 news.255.d: "Monatelange blutige Kämpfe sind mit der Unterzeichnung des Wiener Friedensabkommens endgültig zu Ende gegangen. Nachdem russische Truppen wichtige osteuropäische Städte wie Kiew, Warschau und Budapest besetzt hatten, beschlossen die Staats- und Regierungschefs der NATO, den Krieg zu beenden und die russische Hegemonie über Osteuropa anzuerkennen, während die russischen Truppen immer näher an das Kernland Westeuropas heranrückten. Während der Krieg beendet ist, ist die innenpolitische Unruhe in Westeuropa groß, da viele die Regierung beschuldigen, ihre Verbündeten im Osten zu verraten und sich den Russen zu beugen, indem sie die neu eingesetzten prorussischen Regierungen in Osteuropa, im Baltikum, in Zentralasien und in der Kaukasusregion legitimieren. Angesichts der zunehmenden linksradikalen Stimmung machen sich viele Sorgen, dass Europa bald mit noch nie dagewesenen innenpolitischen Turbulenzen konfrontiert sein wird. In Russland wird derweil im ganzen Land gefeiert, da die LDPR als Wiederbelebung des nationalen Ruhms Russlands angesehen wird. Trotz des neu gefundenen Friedens ist das Konzert Europas noch lange nicht zu Ende."
 news.255.a: "Das Ende der NATO?"
 news.256.t: "Die NATO zerschlägt Eurasien" 
 news.256.d: "Der Albtraum, der Europa heimgesucht hat, ist endlich vorbei. Nach einem langen, blutigen Krieg ist der Eurasische Staat vollständig zusammengebrochen, die NATO-Streitkräfte haben Moskau gesichert und den vollständigen Sieg im Zweiten Europäischen Krieg erklärt. \n\nAlexander Dugin, der Fanatiker, der Russland mit seiner Vision eines vereinten Eurasiens in den völligen Wahnsinn gestürzt hat, ist verschwunden. Verschiedene unbestätigte Berichte deuten darauf hin, dass er nach Osten geflohen ist, als die NATO-Streitkräfte rasch auf Moskau vorrückten, doch sein endgültiges Schicksal bleibt leider unbekannt. Die eurasische Armee konnte trotz ihrer leidenschaftlichen Hingabe an seine Sache den überlegenen NATO-Streitkräften nicht standhalten. \n\nMit dem Zusammenbruch des Regimes ist Russland in Dutzende von Kriegsherrengebieten zerfallen, von denen jedes für sich die Legitimität als wahrer Nachfolger beansprucht. Die NATO hat unter der Aufsicht des NATO-Mandatsrats das Demokratische Mandat von Moskau in Zentralrussland und eine Anti-Terror-Zone in Wolgograd eingerichtet, um den verbleibenden Widerstand zu beseitigen."
 news.256.a: "Das Ende der Geschichte ist endlich da!"

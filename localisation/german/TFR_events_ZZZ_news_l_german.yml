 news.158.t: "Bundesweite Proteste in den USA."
 news.158.d: "Nach dem tragischen Tod von Quinton Evans, einem afroamerikanischen Mann, der in Polizeigewahrsam starb, sind im ganzen Land Proteste ausgebrochen. Die Umstände seines Todes sind noch immer unklar, aber Videoaufnahmen zeigen einen Beamten, der sich auf seinen Hals kniet, während er nach Luft ringt. Die Proteste wurden mit historischen Ereignissen wie den L.A. Riots verglichen, bei denen Hunderttausende auf die Straße gingen, um Gerechtigkeit zu fordern. Berichte über eine Eskalation in der Stadt Minneapolis, wo es zu Plünderungen von großen und kleinen Geschäften in Gegenden kam, in denen die Polizei angesichts der schieren Masse der an den Protesten beteiligten Personen die Kontrolle verloren hat, haben politische Aktivisten beklagt, dass es sich offenbar um einen weiteren \"alltäglichen Vorfall von Polizeibrutalität\" handelt, der ihrer Meinung nach eine weitaus größere Krise darstellt, die drastische soziale Maßnahmen zur Lösung erfordert. Hartgesottene Agitatoren haben die derzeitige Situation sogar mit der eines Jim Crow mit zugezogenem Vorhang gleichgesetzt. Konservative Elemente haben zu einer drastischen Deeskalation aufgerufen und in Bezug auf den Vorfall mit Herrn Evans erklärt, dass \"die detaillierte juristische Vorgeschichte von Herrn Evans einen Präzedenzfall für Gewalt gegen Beamte darstellt\" - und genau das hat der verdächtige Beamte benutzt, um die Anwendung roher Gewalt zu rechtfertigen.\n\nKonservative haben bereits begonnen, sich zu bewaffnen und in die Städte einzudringen, in denen protestiert wird, unter dem Vorwand, kleine Unternehmen zu schützen, die sie als Ziel der Demonstranten angeben. Zusammenstöße sind unvermeidlich."
 news.158.a: "Das Feuer erhebt sich..."
 news.159.t: "Mexikanische Autorität bricht zusammen"
 news.161.t: "Amerika vereint unter der Patriotenfront"
 news.161.d: "In einer atemberaubenden Wende der Ereignisse ist Nordamerika heute Zeuge eines historischen Moments geworden. Nach Jahren des unerbittlichen, brutalen Konflikts und eines katastrophalen Tributs an Menschenleben ist die Patriotenfront als unbestrittener Sieger aus dem Zweiten Amerikanischen Bürgerkrieg hervorgegangen und hat die Kontrolle über die verwüsteten und geschundenen Vereinigten Staaten übernommen. Die letzten Tage der Kämpfe waren geprägt von einigen der gewalttätigsten und zerstörerischsten Zusammenstöße des Krieges, die ganze Städte in Schutt und Asche legten und unzählige Menschenleben zerstörten. Jetzt ist eine unbehagliche Ruhe über das vom Krieg zerrissene Land hereingebrochen, in dem die einzigen verbliebenen Geräusche das bedrohliche Rumpeln von Militärkonvois auf trostlosen Straßen, das ferne Dröhnen von Jets, die am Himmel patrouillieren, und das stetige, unerbittliche Dröhnen von Hubschrauberrotoren sind, die über den Köpfen schweben, während stumme Zeugen den zerbrechlichen Frieden beobachten. \n\nNach dem Fall der letzten verbliebenen Gegner trat die neu gebildete nationale Regierung der Patriotenfront auf der National Mall auf, um sich in einer sorgfältig inszenierten Siegesrede an die kriegsmüde Nation zu wenden. Vor den Augen der Nation feierte das neue Regime seinen hart erkämpften Triumph und stellte seinen Sieg nicht nur als Ende des Bürgerkriegs, sondern auch als Beginn einer neuen Ära für Amerika dar. In ihrer Rede umrissen sie ihre weitreichende Vision für die Zukunft des Landes und stellten ehrgeizige Pläne für groß angelegte Wiederaufbaubemühungen vor, die darauf abzielen, die zerstörte Infrastruktur wiederherzustellen, und versprachen radikale politische Reformen, die den Kern der amerikanischen Regierungsführung umgestalten würden.\n\nDie internationale Reaktion war weniger als einhellig, aber trotz dieser gemischten Reaktionen zeichnet sich eine unbestreitbare Tatsache ab: Amerika steht nun unter einer neuen Führung, einer Führung, die die Macht und den Ehrgeiz hat, das Fundament der Nation in einer Weise umzugestalten, die noch für Generationen nachhallen könnte."
 news.161.a: "Sie haben es weit gebracht, aber was werden sie jetzt tun?"
 news.161.b: "Wir haben Amerika zurückerobert!"
 news.163.t: "Die [NSM.GetName] vereinigt Amerika wieder"
 news.163.d: "Die letzten gegnerischen Regierungen in den ehemaligen Vereinigten Staaten kapitulierten gestern Abend offiziell vor Burt Colucci und seiner Armee von Nationalsozialisten und markierten damit das Ende eines brutalen Bürgerkriegs, der Dutzende Millionen Tote und noch mehr Vertriebene gefordert hatte. Mehrere Widerstandsführer wurden von der neuen Regierung nach einem kurzen Prozess hingerichtet, ihre Leichen wurden vor der neuen Hauptstadt der Republik aufgehängt. Von seinem Hauptquartier in Washington aus proklamierte Colucci eine "Neue Arisch-Amerikanische Nation, durch das arische Volk, für das arische Volk" und forderte die sofortige Vertreibung aller nicht-weißen Menschen aus der Nation.\n\nAusgehend von einer kleinen Gruppe von Rebellen in Süd-Michigan knüpfte Colucci Verbindungen zu verschiedenen anderen Neonazi-Gruppen und weißen Nationalisten und wurde so zum unangefochtenen Herrscher der Nationalen Front, bevor er die [NSM.GetName] ausrief. Die Kämpfe im ganzen Land sind nach wie vor heftig und werden wahrscheinlich noch eine ganze Weile andauern, aber das Ende der offiziellen Opposition markiert einen Wendepunkt in der Konsolidierung der Macht des Colucci-Regimes über die ehemaligen Vereinigten Staaten. Die Reaktionen auf die Nachricht waren überwiegend negativ, und es ist unwahrscheinlich, dass die neue Republik aufgrund ihrer Ideologie und ihres Misstrauens gegenüber der internationalen Zusammenarbeit auf der Weltbühne Anerkennung findet.\n\nWas auch immer als Nächstes geschieht, die Botschaft ist klar: Der Nationalsozialismus in all seiner Brutalität ist endlich in den Vereinigten Staaten angekommen."
 news.163.a: "Die Flamme der Freiheit ist für immer erloschen."

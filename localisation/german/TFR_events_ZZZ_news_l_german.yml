 news.166.t: "Große Sozialistische Arabische Volksdschamahirija ausgerufen"
 news.166.d: "In einer symbolträchtigen Erklärung, die unmissverständlich an die gesamte arabische Welt gerichtet war, verkündete Saif al-Islam al-Gaddafi die Gründung der Großen Sozialistischen Arabischen Volks-Dschamahirija, erklärte das Ende der zersplitterten postkolonialen Ära im Maghreb und präsentierte seine Bewegung als Wiedergeburt eines revolutionären Staates. Vor einer Menge von Anhängern und bewaffneten Loyalisten in Sirte stellte er die neue Jamahiriya als Rückkehr zu "nationaler Würde, arabischer Einheit und Volksherrschaft" dar und versprach, dass der Maghreb nie wieder von korrupten Herrschern, von ausländischen Mächten unterstützten Eliten oder Warlords regiert werden würde.\n\nDie Erklärung folgt auf die erfolgreiche Ausweitung der libyschen Macht im gesamten Maghreb, eine Kampagne, die die Truppen von Saif al-Islam eher als Befreiungskampf denn als Eroberung bezeichnen. In staatlichen Rundfunkübertragungen sind über Verwaltungsgebäuden, Militärstützpunkten und Grenzübergängen neu gehisste grüne Fahnen zu sehen, begleitet von einer Sprache, die an die alte Revolutionsära und ihre Versprechen der Unabhängigkeit vom westlichen Einfluss erinnert. Offizielle Vertreter behaupten, die Jamahiriya werde die Politik der Verhandlungen durch "direkte Volkslegitimität" ersetzen und die Gesellschaft durch ein zentralisiertes Sicherheitsnetzwerk, staatlich gelenkte Entwicklung und ideologische Mobilisierung wiederaufbauen. \n\nDie Reaktionen in der Region waren unmittelbar und geteilt. Befürworter feiern Saif al-Islam als die einzige Persönlichkeit, die in der Lage ist, die Ordnung wiederherzustellen und Stärke über die Grenzen des Maghreb hinaus zu projizieren, während Gegner die Erklärung als Wiederbelebung der Diktatur unter dem Deckmantel der Revolution verurteilen. Berichte über Säuberungen, die erzwungene Umstrukturierung lokaler Behörden und die rasche Konsolidierung von Medien- und Sicherheitsstrukturen deuten darauf hin, dass das neue Regime schnell handelt, um jede Möglichkeit einer Spaltung auszuschließen.\n\nFür Saif al-Islam ist die Botschaft einfach: Der Maghreb ist nun das Zentrum eines neuen politischen Projekts, das Nordafrika nach seinem eigenen Bild umgestalten soll."
 news.166.a: "Die grüne Fahne weht wieder."
 news.168.t: "Amerikanische Jakobiner vereinen Amerika"
 news.168.d: "Heute marschieren Tausende durch die Straßen Amerikas und verkünden den Anbruch einer neuen Ära. Die amerikanischen Jakobiner haben über die rivalisierenden Fraktionen der AVBA gesiegt und die Nation von allen Formen der Unterdrückung befreit, sei es durch das konservative Industriekapital oder durch liberale Technokraten. Amerikanische und rote Flaggen schmücken nun jede erdenkliche Ecke der staatlichen Gebäude und Häuser, wobei Washington D.C. im Mittelpunkt der Feierlichkeiten steht. Hier hielt Caleb Maupin, der Anführer der Jakobiner, nach der offiziellen Erklärung des Endes des Bürgerkriegs eine leidenschaftliche Rede. Eine riesige Menschenmenge versammelte sich, um seinen Worten zu lauschen.\n\"Liebe Amerikaner, Bürger der Welt... Genossen...\", Calebs einleitende Worte begeisterten die Menge. Als er seine Rede beendete, hob er seine Hände und hielt Maos Kleines Rotes Buch in seiner rechten und die Heilige Bibel in seiner linken Hand. Mit Überzeugung verkündete er: "Ich weiß, woher ich komme, und ich weiß, wohin ich gehe! SEID IHR AUF MEINER SEITE?\" Die Menge brach in Jubel und Gebrüll aus und ihr tosender Applaus übertönte Maupins anschließende Ausführungen. Amerika ist wiedergeboren worden, im Guten wie im Schlechten."
 news.168.a: "Halleluja!" 
 news.169.t: "Die [ATW.GetName] startet \"den großen arischen Kreuzzug\" gegen die UNO"
 news.169.d: "Die [ATW.GetName] hat erklärt, dass die Welt für die Erhaltung des arischen Volkes ungeeignet ist und zerstört und nach ihrem perfekten Bild neu aufgebaut werden muss. Die UNO hat einen Großangriff gegen die [ATW.GetName] angekündigt, um diese Pläne zu stoppen!"

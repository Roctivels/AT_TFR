 news.226.t: "Russland marschiert in den Kuban ein!"
 news.226.d: "[SEWASTOPOL] Unsere Reporter auf der Krim berichteten von schweren Truppenbewegungen über die Kertsch-Brücke durch die Republik Ukraine, als erste Berichte über russische Streitkräfte, die in den Kuban einmarschieren, weltweit auf den Nachrichtensendern auftauchten. Sowohl das ukrainische als auch das kubanische Verteidigungsministerium haben offiziell bestätigt, dass die Berichte wahr sind, und die NATO bemüht sich, darauf zu reagieren, da Russland zweifellos auf die Folgen eines Einmarsches in die Kuban-Republik vorbereitet ist, die ein direktes Eingreifen der NATO aufgrund einer ukrainischen Sicherheitsgarantie einschließen, aber nicht darauf beschränkt sind. \n\nWährend der Proteste in Starwopol, bei denen sich die östliche Hälfte der Kubanischen Republik während einer pro-russischen Demonstration in der Stadt abspaltete, wäre beinahe ein Krieg ausgebrochen. Der Westen hoffte jedoch weiterhin auf eine Deeskalation und die Ukraine nahm die Verteidigungsgarantie nicht in Anspruch, als russische Truppen Starvopol sicherten. Diesmal jedoch. Was für eine Generation eine hoffnungsvolle Zukunft und für die NATO-Veteranen des letzten Krieges ein ehrenvoller Ruhestand war, hat sich in eine neue Welle von Rekruten und einberufenen Veteranen verwandelt, die Europa genauso wütend und entschlossen gemacht haben, den Krieg zu beenden wie ihre russischen Kollegen."

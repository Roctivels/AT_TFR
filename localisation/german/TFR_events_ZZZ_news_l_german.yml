 news.302.t: "Putsch in Moskau!"
 news.302.d: "Beunruhigende Nachrichten aus der russischen Hauptstadt Moskau: Die Nationalgarde hat die zivile Regierung suspendiert und den Ausnahmezustand verhängt. \nDer Chef der Nationalgarde, Wiktor Zolotow, gab in einer Fernsehsendung bekannt, dass er aufgrund der Unfähigkeit der zivilen LDPR-Regierung, die durch den Tod von Wladimir Schirinowski verursachte Krise zu lösen, gezwungen war. Er versprach die Rückkehr zum normalen Leben und zur Stabilität, sobald die kritische Situation überwunden sei. Zolotow beendete seine Rede mit " Ein Hoch auf Russland!" und forderte alle gesetzestreuen Bürger auf, ihren täglichen Pflichten nachzukommen."
 news.302.a: "Instabilität in der siegreichen Nation? Hm..." 
 news.303.t: "Zarentum in Russland wiederhergestellt!"
 news.303.d: ""
 news.304.t: "Das Ende der LDPR"
 news.304.d: "Seit dem Tod von Wladimir Schirinowski kämpft die LDPR unter Schirinowskis Nachfolger Slutski um ihre Popularität. Obwohl die ideologischen Ziele dieselben geblieben sind, sehen die Menschen nicht, dass Slutsky dasselbe Feuer oder dieselbe Weisheit wie Schirinowski hat, genau dasselbe Feuer und dieselbe Weisheit, die die LDPR die ganze Zeit über am Leben gehalten haben. Die vielen Probleme, mit denen Russland konfrontiert war und die einen Mann wie Schirinowski brauchten, wurden in den Jahren vor dem Krieg unterdrückt, und die Rufe nach einer Wiederherstellung der wahren kaiserlichen Regierung waren selbst innerhalb der LDPR-Regierung einfach zu stark. Mit dem Aufstieg von [SOV.GetLeader] an die Spitze Russlands ist es nur allzu klar, dass die Tage der LDPR gezählt sind.\n\n In den kommenden Wochen wird sich wahrscheinlich ein Machtwechsel vollziehen, die "Liberal-Demokraten" werden wahrscheinlich nicht vom neu gekrönten Zaren von Russland gehalten werden, aber es ist ebenso wahrscheinlich, dass sie einer politischen Verfolgung durch die neue Regierung entgehen, da sie entscheidend dazu beigetragen haben, Russland an den Punkt zu bringen, an dem es jetzt steht, und den Sieg über die NATO zu sichern. Die Geschichte wird sich an Wladimir Wolfowitsch Schirinowski als den russischen Bismarck erinnern, den starken Mann, der die russischen Völker ein zweites und letztes Mal wiedervereinigte, während Slutski und die übrigen Hardliner der LDPR stillschweigend in den politischen Ruhestand gedrängt werden, als Fußnoten im Russisch-Europäischen Krieg und in Schirinowski-Biographien."
 news.304.a: "Ohne ihn könnten sie wirklich nicht überleben."
 news.305.t: "Wladimir Putin tritt zurück"
 news.305.d: "Der Rücktritt von Wladimir Putin aufgrund einer schweren Erkrankung von Covid-19 und die Ernennung von Sergei Narischkin zum kommissarischen Staatsoberhaupt stellen eine bedeutende Entwicklung in der russischen Politik dar. Putin, der seit mehr als zwei Jahrzehnten an der Macht ist, war eine dominierende Figur in der russischen Politik, und sein Rücktritt wirft Fragen über die künftige Ausrichtung des Landes auf.\n\nDie Ernennung von Narischkin zum kommissarischen Führer deutet darauf hin, dass es sich um einen reibungslosen Machtübergang innerhalb der russischen Regierung handelt. Naryschkin, ein enger Verbündeter Putins und Leiter des russischen Auslandsgeheimdienstes, plant Gerüchten zufolge vorgezogene Wahlen. Dieser Schritt könnte als Versuch gewertet werden, in einer Zeit der Ungewissheit Stabilität und Kontinuität in der russischen Politik aufrechtzuerhalten.\n\n Es ist jedoch wichtig, diese Entwicklungen mit Vorsicht zu betrachten und mehrere Perspektiven zu berücksichtigen. Die Umstände des Rücktritts von Putin und der Ernennung von Narischkin sollten kritisch untersucht werden, da hier möglicherweise politische Motive oder Machtkämpfe im Spiel sind."
 news.305.a: "Interessant..."
 news.305.b: "Es war ein weiter Weg..."

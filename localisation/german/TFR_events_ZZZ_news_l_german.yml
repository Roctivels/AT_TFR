 news.181.t: "Französische Generäle starten Putsch"
 news.181.d: "Schreckliche Nachrichten aus Frankreich: Ein Putschversuch des französischen Militärs hat die Nation in Aufruhr versetzt! Wie in vielen anderen westeuropäischen Ländern hat die jüngste Niederlage im Krieg mit Russland in der französischen Gesellschaft und Politik große Unruhe ausgelöst. Das französische Militär, das stets darauf bedacht ist, seine Rolle in Staat und Gesellschaft zu bewahren, hat das Undenkbare getan. Eine Gruppe hochrangiger Offiziere des französischen Militärs und der Nachrichtendienste hat sich in Paris und anderen Großstädten niedergelassen. Diese Offiziere behaupten öffentlich, sie seien hier, um \"die kriminell inkompetenten Politiker, die die nationalen Interessen Frankreichs verraten haben, zu beseitigen\". Der Versuch dieser Gruppe von Offizieren, die Macht an sich zu reißen, scheint jedoch sowohl in der Öffentlichkeit als auch innerhalb des Militärs auf große Ablehnung und Empörung zu stoßen. Es gab große öffentliche Proteste, die den Versuch einer Machtübernahme durch eine Clique von Offizieren anprangerten, und die Führer der wichtigsten politischen Parteien verurteilten die Offiziere in ähnlicher Weise. Interessanterweise haben sich zahlreiche Offiziere und Soldaten zusammengeschlossen, um sich den Putschisten entgegenzustellen und Widerstand zu leisten. Viele hochrangige Mitglieder des französischen Militärs, die nicht in den Putschversuch verwickelt waren, haben sich geäußert und erklärt, dass sie die \"illegale und gefährliche\" Machtergreifung der Putschisten verhindern würden. "
 news.181.a: "Interessant"
 news.182.t: "Schwere Explosion in Beirut"
 news.182.d: "Der Hafen von Beirut ist heute in einem Höllenfeuer ausgebrochen, nachdem sich ein mit Ammoniumnitrat gefülltes Lagerhaus plötzlich entzündet hatte und explodiert war. Die Detonation hat den gesamten Hafen von Beirut und die umliegenden Stadtviertel in Schutt und Asche gelegt, was zu mehr als 218 Toten, Tausenden von Verletzten und Hunderttausenden von Obdachlosen geführt hat, da sich der Schaden auch auf einen Großteil der Infrastruktur von Beirut erstreckt. Die libanesische Regierung hat als Reaktion auf die Katastrophe den zweiwöchigen Notstand ausgerufen, und es kam zu sofortigen Protesten gegen das offensichtliche Versagen der Regierung, eine solche Katastrophe im vornherein zu verhindern."
 news.182.a: "Oh, die Menschheit!"
 news.183.t: "Algerisch-Marokkanischer Krieg"
 news.183.d: "Nach dem plötzlichen und gewaltsamen Zusammenbruch der Vereinigten Staaten von Amerika sind viele Menschen weltweit noch immer erschüttert. In den folgenden Wochen spitzte sich die Krise in Nordafrika bis zum Äußersten zu. Nun gibt es Berichte, dass algerische Streitkräfte an der Grenze mit der marokkanischen Armee zusammengestoßen sind.\n\nInfolge der jüngsten Eskalation ist der Maghreb nun in einen totalen Krieg gestürzt, und viele Nationen sind gezwungen, sich zwischen Marokko und Algerien zu entscheiden. Was von der EU und der NATO übrig geblieben ist, hat sich hinter Marokko gestellt, während der Kreml Algerien unterstützt. Eine Sondersitzung der UNO wurde einberufen, um zu versuchen, den Konflikt zu beenden, aber angesichts der zunehmenden Spannungen in Europa und Asien ist es fast sicher, dass keine Friedensresolution verabschiedet werden wird.Ein weiterer Dominostein ist gefallen."
 news.183.a: "Ein weiterer Dominostein ist gefallen."
 news.184.t: "Pattsituation in Ostafrika"
 news.184.d: "Nach 13 Monaten brutaler Kämpfe, weitreichender Zerstörung und einer eskalierenden humanitären Krise sind die Waffen in Ostafrika verstummt. Der Dritte Afrikanische Krieg, der vor einem Jahr durch die Fertigstellung des Grand Ethiopian Renaissance-Damm und Ägyptens verzweifelte Bemühungen um die Sicherung des Zugangs zu Wasser ausgelöst wurde, endete für beide Seiten in einem enttäuschenden Patt. ßn\nDie Staats- und Regierungschefs des Ostafrika-Pakts und der Nil-Koalition trafen sich gestern in Port Louis, Mauritius, und einigten sich auf einen von der Afrikanischen Union vermittelten Waffenstillstand. Die Folgen dieses Krieges sind immens: Hunderttausende Flüchtlinge, durch Bombardierungen zerstörte Städte und eine verwüstete Infrastruktur. Da jedoch beide Seiten erschöpft sind und keine von ihnen einen entscheidenden Schlag landen konnte, bleibt nur noch ein Kompromiss. Das Abkommen von Port Louis hat zur offiziellen Anerkennung Somalilands durch die Parteien und zur Gründung einer unabhängigen Republik Tigray in den äthiopischen Regionen Tigray und Amhara geführt. Darüber hinaus wurden keine weiteren Anpassungen vorgenommen, und der zentrale Streit um die Nutzung des Nil bleibt ungelöst. n\nDas Ergebnis hat Unruhen in ganz Ostafrika ausgelöst, nirgendwo jedoch gefährlicher als in Ägypten, wo die Wut über das unentschiedene Ende des Krieges und die sich verschärfende Versorgungslage im Inland zu kochen beginnt. In mehreren Großstädten sind Unruhen ausgebrochen, und da die Autorität von Präsident [EGY.GetLeader] schwindet, werden die Gerüchte über einen Aufstand von Tag zu Tag lauter. Nach 13 Monaten brutaler Kämpfe, weitreichender Zerstörung und einer eskalierenden humanitären Krise sind die Waffen in Ostafrika verstummt. Der Dritte Afrikanische Krieg, der vor einem Jahr durch die Fertigstellung des Grand Ethiopian Renaissance-Damm und Ägyptens verzweifelte Bemühungen um die Sicherung des Zugangs zu Wasser ausgelöst wurde, endete für beide Seiten in
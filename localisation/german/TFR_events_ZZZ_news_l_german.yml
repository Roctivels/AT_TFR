 news.334.b: "London Goodbye!"
 news.335.t: "Amman-Friedensabkommen"
 news.335.d: "In einer überraschenden Wendung der Ereignisse sind heute iranische und irakische Beamte in Amman zusammengekommen, um einen Vertrag zu unterzeichnen, mit dem die Feindseligkeiten zwischen Iran und Irak unter Vermittlung der jordanischen Regierung offiziell eingestellt werden. \n\nGrund für diese Entwicklung ist das wiederholte Scheitern der Streitkräfte der Islamischen Republik, den irakischen Streitkräften einen entscheidenden und endgültigen Schlag zu versetzen, die durch eine jahrzehntelange Krise und einen kürzlichen Bürgerkrieg zerrüttet zu sein scheinen.\n\nViele führen den irakischen Erfolg auf unkonventionelle Kriegsführungstaktiken sowie auf die Strategie zurück, die iranischen Streitkräfte in einem Krieg zu zermürben, der hauptsächlich durch Zermürbung und Sabotage gekennzeichnet ist. Experten vergleichen die Misserfolge Irans mit dem fast zehnjährigen Irak-Krieg der USA und stellen fest, dass der Iran seine eigenen Fähigkeiten stark überschätzt und gleichzeitig die Schwierigkeiten unterschätzt hat, die sich aus den ethnischen und geografischen Faktoren des Kampfes im Irak ergeben.\n\n Und während andere über die mögliche Rolle ausländischer Beteiligung an der iranischen Niederlage spekulieren, ist eines sicher: die Armee der Islamischen Republik hat erhebliche Verluste erlitten. Dieses Scheitern wird mit Sicherheit zu zahlreichen Veränderungen im Oberkommando und in der Militärdoktrin des Irans führen.\n\nAuf der anderen Seite hat sich der Irak als unabhängige Kraft etabliert und das fragile Gleichgewicht der Kräfte im Nahen Osten erneut ins Wanken gebracht."
 news.335.a: "Interessant."
 news.336.t: "Kanada verlässt die NATO"
 news.336.d: "Schockierende Nachrichten kamen heute aus Kanada. In einer überraschenden Ankündigung erklärte Premierminister Justin Trudeau, dass sich Kanada aus der Nordatlantikvertrags-Organisation zurückziehen werde. Er erklärte, dass "Kanada seine Verteidigungsversprechen nicht einhalten könne" und betonte, dass die Entscheidung zwar schwierig, aber angesichts der aktuellen Lage des Landes unvermeidlich sei. Trudeau versicherte jedoch, dass Kanada einen Wiedereintritt in das Bündnis in Erwägung ziehen könnte, sobald die Stabilität auf dem nordamerikanischen Kontinent wiederhergestellt sei. Viele Experten und ehemalige Beamte führen diesen beispiellosen Schritt auf den überwältigenden Zustrom amerikanischer Flüchtlinge zurück, die vor dem eskalierenden Bürgerkrieg in den Vereinigten Staaten fliehen. Der plötzliche Zustrom von Vertriebenen hat die kanadischen Ressourcen immens belastet und die Regierung gezwungen, ihren Haushalt drastisch umzuschichten, um die wachsende humanitäre Krise zu bewältigen. Mittel, die eigentlich für die Erfüllung der Verteidigungsverpflichtungen im Rahmen der NATO vorgesehen waren, wurden für die Bewältigung der Flüchtlingskrise und die Stabilisierung der inneren Angelegenheiten des Landes umgewidmet. Diese Umwidmung von Mitteln hatte wahrscheinlich zur Folge, dass Kanada nicht in der Lage war, die Mindestanforderungen der NATO an die Verteidigungsausgaben zu erfüllen, was schließlich zu seinem Austritt führte.\n\nDie Zukunft Kanadas in der NATO ist nun ungewiss. Während einige nach wie vor hoffen, dass das Land wieder der NATO beitreten kann, sobald seine internen Probleme gelöst sind, sind andere skeptischer. Da jedoch die Spannungen an der zunehmend instabilen Grenze zu den ehemaligen Vereinigten Staaten zunehmen, wächst die Sorge, dass ein bewaffneter Konflikt auf Kanada übergreifen könnte. In diesem Fall, so spekulieren einige, könnte die NATO eingreifen, um Hilfe zu leisten, auch wenn Kanada nicht mehr formell Mitglied des Bündnisses ist."
 news.336.a: "Die Wellen des Zweiten Amerikanischen Bürgerkriegs schlagen immer größere Wellen."
 news.337.t: "Trudeau setzt Notstandsgesetz in Kraft"
 news.337.d: "Das 44. Parlament Kanadas hat heute in Verbindung mit den vorangegangenen Befürchtungen hinsichtlich der anhaltenden Kriegsführung Amerikas und der Entzündung des Höllenfeuers, insbesondere in der Nähe von Ontario, den Minister für Notfallvorsorge, Harjit Sajjan, dazu veranlasst, die Ratifizierung seines Vorschlags zur Einführung des 1988 unterzeichneten Notstandsgesetzes zu erwirken. \n\nMit der Zustimmung des Parlaments und den bürokratischen Mitteln seines Kabinetts unterzeichnete der kanadische Premierminister Justin Pierre James Trudeau ab sofort offiziell das außerordentliche Gesetz, das im Gesetz eine Frist von 30 Tagen vorsieht, die jedoch aufgrund der Umstände und der Zustimmung der kanadischen Charta der Rechte und Freiheiten leicht angepasst werden kann. \nInfolgedessen haben die Medien vor Ort berichtet, dass kanadisches Personal in Anbetracht der besonderen Umstände im gesamten kanadischen Hoheitsgebiet eingesetzt wurde, insbesondere rund um den Sankt-Lorenz-Strom und die Großen Seen, und dass es vermehrt Berichte über Aufklärungsoperationen jenseits der Grenze gibt."
 news.337.a: "Interessant."
 news.338.t: "Hamas putscht gegen Palästinensische Autonomiebehörde"
 news.338.d: "Das Machtgleichgewicht in Palästina ist unwiderruflich gestört. In einer minutiös koordinierten Operation stürmten Hamas-Kräfte wichtige Regierungs- und Militäreinrichtungen in Ramallah und anderen Fatah-Hochburgen und stürzten die Palästinensische Autonomiebehörde innerhalb weniger Tage. Was als Geflüster von Unstimmigkeiten begann, entwickelte sich zu einem regelrechten Staatsstreich, bei dem die Fatah-Führer inhaftiert wurden oder sich im Exil befanden und die Hamas sowohl das Westjordanland als auch den Gazastreifen fest im Griff hatte.\n\nDer israelische Premierminister Benjamin Netanjahu, der bereits mit Notstandsbefugnissen regiert, hielt vor der Knesset eine donnernde Rede, in der er den Staatsstreich als "direkte Bedrohung für Israels Überleben" bezeichnete. Er erklärte, die Machtübernahme durch die Hamas bedeute den Aufstieg eines iranischen Stellvertreterstaates vor unserer Haustür", und versprach, Israel werde mit aller Kraft reagieren, um sein Volk zu schützen. \"Wir werden nicht tatenlos zusehen, wie diejenigen, die auf unsere Zerstörung geschworen haben, die Macht festigen,\" schwor er und sammelte Unterstützung im gesamten politischen Spektrum Israels.\n\nDerweil hat der Aufstieg der Hamas ihre regionalen Unterstützer ermutigt. Iran und Syrien haben den Staatsstreich als \"Sieg des Widerstands\" gelobt und dem neuen Regime materielle und politische Unterstützung zugesagt. Die staatlichen Medien in Teheran begrüßten das Ereignis als Schlag gegen den israelischen Einfluss in der Region, während Damaskus seine Solidarität mit der Hamas bekräftigte. Angesichts der zunehmenden Spannungen und der sich verhärtenden Allianzen befürchten viele, dass das Heilige Land nun am Abgrund eines umfassenderen Konflikts steht, der die Region in einen noch nie dagewesenen Aufruhr stürzen könnte."
 news.338.a: "Besorgniserregend." 
 news.339.t: "Palästina kündigt "letzte Intifada" an"
 news.339.d: "In einer Aktion, die viele im Ausland, aber nur wenige im Nahen Osten überrascht hat, haben militante Palästinenser eine Überraschungsoffensive auf mehrere israelische Militärziele gestartet. Mehrere islamistische Gruppen wie die Hamas haben die Angriffe als \"letzte Intifada\" gegen Israel angekündigt und wollen alles tun, um die israelische Militärpräsenz aus dem Gazastreifen und dem Westjordanland zu vertreiben. Die IDF meldet bereits mehrere massive Gefechte mit islamistischen Kräften im ganzen Land, bei denen es auf beiden Seiten zu Verlusten kam. Die israelische Regierung nimmt die Angriffe nicht gut auf und fordert Vergeltung für \"die Terroristen und alle, die ihnen Unterschlupf gewähren\". Unabhängig davon sind die Bürger jüdischer und arabischer Abstammung verängstigt, da der sich zuspitzende Konflikt bereits viel Tod und Zerstörung verursacht hat. Es ist gut möglich, dass die Aktionen der militanten Palästinenser zu einem größeren Krieg in der Region führen könnten."
 news.339.a: "Chaos im Nahen Osten!"

 news.415.t: "Großer Krieg in Asien!"
 news.415.d: "Seit dem Ende des Taiwan-Krieges hat jeder die Tage bis zu diesem Moment gezählt. Der Krieg zwischen den beiden repräsentativsten riesigen Militärbündnissen der Ära nach dem Kalten Krieg, der OAVI und der PDTO, hat offiziell begonnen. Dieser Name mag einige an den pazifischen Schauplatz des Zweiten Weltkriegs und den so genannten "Großostasiatischen Krieg" des militaristischen Japans erinnern, aber das Ausmaß und der Verlauf dieses Konflikts übertrifft bei weitem alle bisherigen Konflikte im asiatisch-pazifischen Raum. Einige sind der Meinung, dass China mit seiner riesigen Bevölkerung, seinen starken industriellen Fähigkeiten und dem größten Militär der Welt zusammen mit seinen OAVI-Verbündeten einen unüberwindbaren Vorteil gegenüber seinen Feinden hat. Darüber hinaus können die OAVI-Mitgliedsstaaten Chinas Heimatland als stabilen Stützpunkt im Hinterland nutzen und so den Vorteil der inneren Operationslinien ausnutzen. Umgekehrt wird argumentiert, dass die von Japan angeführte PDTO China geografisch umgibt und blockiert, und dass die von der PDTO kontrollierten riesigen Seegebiete eine maritime Dominanz und stabile Handelswege gewährleisten. Darüber hinaus besteht die PDTO hauptsächlich aus "demokratischen Nationen", was ihr einen ideologischen Vorteil gegenüber der "autoritären" OAVI verschafft.\n\nAlles in allem wurde der Verlauf des Krieges von Anfang an ausschließlich durch Stärke bestimmt."
 news.415.a: "Das Feuer steigt und brennt durch Asien."
 news.415.t.1: "China startet groß angelegte Militäroperation"
 news.415.d.1: "Gerade als die Welt noch abschätzte, ob die Spannungen im asiatisch-pazifischen Raum weiter eskalieren würden, startete die Volksrepublik China im Morgengrauen eine groß angelegte Militäroperation, bei der sie mehrere Ziele in Japan, Indien und anderen PDTO-Mitgliedsstaaten angriff.\n\nNach Informationen aus Australien hat die Volksbefreiungsarmee ihre Streitkräfte rund um Taiwan zusammengezogen und sowohl das Ostchinesische Meer als auch das Südchinesische Meer unter Kriegsverschluss genommen. Flotten und Langstreckeneinheiten der PLA haben wichtige Seewege abgeriegelt und Präzisionsangriffe auf mehrere Ziele innerhalb der Insel durchgeführt.\n\nNach dem vollständigen Ausbruch der Feindseligkeiten erklärte China seine Absicht, "das Jahrhundert der Demütigung durch imperialistische Mächte gründlich zu säubern", und schwor, die Überreste der alten Ordnung durch einen Sieg zu beenden. Analysten sind sich weitgehend einig, dass dies einer der verheerendsten regionalen Kriege des 21. Jahrhunderts werden könnte, in den mehr als drei Milliarden Menschen verwickelt sind, der drei Ozeane umspannt und der - angesichts des möglichen Einsatzes von Massenvernichtungswaffen - unabsehbare Opfer und wirtschaftliche Verluste fordern könnte."
 news.415.a.1: "Einer wird stehen, einer wird fallen..."

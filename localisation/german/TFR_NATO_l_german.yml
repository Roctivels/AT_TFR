 nato_strength_tt: "NATO-Statistikbildschirm"
 nato_strength_delay_tt: "Dieser Bildschirm zeigt detaillierte Statistiken über die Stärke der NATO. Beachte, dass alle Zahlen, die sich auf die Truppenstärke beziehen, in Tausend angegeben sind.\n\nDie NATO verfügt derzeit über insgesamt §Y[?global.nato_deployed_total_manpower]§! Mann, von denen \n§Y[?global.nato_deployed_army_manpower]§! in der Armee, \n§Y[?global.nato_deployed_navy_manpower]§! in der Marine und \n§Y[?global.nato_deployed_air_manpower]§! in der Luftwaffe dienen.\nEs gibt §Y[?global.nato_military_reserve]§! Mann in der Reserve.\nSeit dem 1. Januar 2020 sind §R[?global.nato_military_casualties|-]§! Mann im NATO-Dienst gestorben (nur aktuelle Mitglieder).\n\nDie NATO-Streitkräfte sind in \n§Y[?global.nato_military_divisions]§! Divisionen und \n§Y[?global.nato_military_battalions]§! Bataillone unterteilt.\nDie Seestreitkräfte bestehen aus §Y[?global.nato_military_ships]§! Schiffen, von denen \n§Y[?global.nato_military_screens]§! als Abschirmboote , \n§Y[?global.nato_military_capitals]§! als Hauptschiffe, \n§Y[?global.nato_military_carriers]§! als Träger und \n§Y[?global.nato_military_subs]§! als U-Boote klassifiziert sind.\n\Die NATO-Luftwaffe umfasst insgesamt §Y[?global.nato_military_planes]§! Flugzeuge, von denen \n§Y[?global.nato_military_smallplanes]§! als "Mehrzweckflugzeuge", \n§Y[?global.nato_military_mediumplanes]§! als "unbemannte Flugzeuge" und \n§Y[?global.nato_military_largeplanes]§! als "Großflugzeuge" eingestuft werden.\n\nWas die Industrie betrifft, so verfügen die NATO-Staaten über insgesamt §Y[?global.nato_industry_total]§! Fabriken. Davon sind §Y[global.nato_industry_civilian]§! zivile Fabriken, §Y[?global.nato_industry_military]§! militärische Fabriken, §Y[?global.nato_industry_naval]§! Marinewerften, §Y[?global.nato_industry_office_park]§! Bürokomplexe, §Y[? global.nato_industry_synthetic_refinery]§! synthetische Raffinerien,\n§Y[?global.nato_industry_nuclear_reactor]§! Kernreaktoren,\n§Y[?global.nato_industry_power_plant]§! Kraftwerke und\n§Y[?global.nato_industry_energy_farm]§! Energieparks.\n\nBei der Rohstoffproduktion produzieren die NATO-Staaten insgesamt \n§Y[?global.nato_industry_oil]§! Öl, \n§Y[?global.nato_industry_aluminum]§! Aluminium, \n§Y[?global. nato_industry_rubber]§! Gummi, \n§Y[?global.nato_industry_tungsten]§! Wolfram, \n§Y[?global.nato_industry_steel]§! Stahl und \n§Y[?global.nato_industry_chromium]§! Chrom.\n\nDie Informationen auf diesem Bildschirm werden jedes Mal aktualisiert, wenn der Bildschirm geschlossen und erneut geöffnet wird."

 italy_ew_events.9.t: "Die Desinteressierten und die Gleichgültigen"
 italy_ew_events.9.d: "Du wachst mitten in der Nacht auf. nHinter dem Fenster knallen immer noch Feuerwerkskörper. \nDein Partner liegt neben dir im Bett, ein Buch auf der Brust. \n\nDu hast gewonnen. \n\nNa ja ... "gewonnen" ist vielleicht etwas übertrieben.\n\nDu hast dich nie sonderlich für Politik interessiert.\nEs klingt absurd, das mitten im Krieg zuzugeben, aber es ist wahr.\nDeine Arbeit ist zu wichtig, um dich an die Front zu schicken.\nDeinem Partner geht es genauso.\nDeine beiden Kinder sind noch zu jung, um ein Gewehr zu tragen.\n\nEs ist nicht so, dass die Nachrichten dich nicht berühren, das tun sie schon, ein bisschen...\ nAber was ändert sich dadurch letztendlich wirklich?\n\nOb Sieg oder Niederlage... du bist ein spezialisierter Techniker.\nDu wirst weiterkommen.\nDein Leben wird weitergehen.\nEin Krieg würde niemals darüber entscheiden, nicht für dich.\n\nSo viele Dinge sind passiert.\nUnd doch ist überhaupt nichts passiert.\nDein Desinteresse beweist es.\nDeine Gleichgültigkeit."
 italy_ew_events.9.a: "Wie traurig."
 
 
 vatican.1.t: "Der Tod von Papst Franziskus"
 vatican.1.d: "neein"
 vatican.1.a: "we lost a real one"
 vatican.2.t: "Papst Franziskus stirbt mit 88 Jahren"
 vatican.2.d: "VATIKANSTADT (IO) - Papst Franziskus ist heute Morgen im Alter von 88 Jahren verstorben, wie um 07:35 Uhr (GMT+2) offiziell verkündet wurde. Er hinterlässt ein Vermächtnis des Eintretens für den internationalen Frieden und der Diplomatie, wobei seine berühmten Treffen mit dem iranischen Ayatollah nur die Spitze des Eisbergs für das Wirken dieses Mannes an der Spitze des Papsttums sind.\n\nObwohl Papst Franziskus unter den Katholiken weltweit eine umstrittene Figur war, kann niemand leugnen, dass ganz Katholika an diesem Tag trauert, wenn der Vatikan seine Glocken läutet. Seine bisweilen reformistischen Äußerungen wurden von Konservativen kritisiert, aber seine Sorge um die Umwelt und die Armen unterstrich seine Beliebtheit bei den Massen in Europa und der gesamten katholischen Welt.\n\nEs war vielleicht ein Wunder, dass er es trotz einer doppelten Lungenentzündung, die seine Lungen zerstörte, am Ostersonntag noch ein letztes Mal auf den Petersplatz schaffte, um Hunderte zu segnen und sich mit den Menschen zu unterhalten und eine letzte Fahrt im Papamobil zu unternehmen. Am Ostermontag schlief er ein und starb friedlich. Als erster Jesuit und erster lateinamerikanischer Papst war er auch der erste, der nach dem Heiligen Franz von Assisi benannt wurde, einem Heiligen, der für seine persönliche Einfachheit und seine Fürsorge für die Kranken und Unglücklichen bekannt war. Er starb an den Folgen eines lebenslangen Kampfes mit einer chronischen Lungenkrankheit, nachdem er sich im Jahr 21' mit einem Dickdarmdurchbruch, im Jahr 23' mit einem Leistenbruch und seit dem Jahr 22' mit wiederholten Anfällen von Bronchitis herumgeschlagen hatte."
 vatican.2.a: "Wir sprechen unser tiefstes Beileid aus."

 vatican.3.e: "Robert Sarah"
 vatican.4.t: "Kardinal Luis Antonio Tagle zum Papst Franziskus II. gewählt"
 vatican.4.d: "Die Glocken des Petersdoms läuteten heute Morgen in der Ewigen Stadt, und weißer Rauch stieg aus dem Schornstein der Sixtinischen Kapelle auf, um der Welt zu signalisieren, dass das Konklave beendet ist und das Kardinalskollegium den 267. Kardinal Luis Antonio Tagle von den Philippinen wurde unter dem Namen Franziskus II. auf den Thron des Heiligen Petrus gewählt und ist damit der erste Papst aus Ostasien in der Geschichte. In seiner öffentlichen Ansprache als Papst vom Balkon des Petersdoms gab der neu gewählte Papst einige Erklärungen zum neuen Gesicht im Kreml ab:\n\n\"Mit dem Wiederaufleben Moskaus und seiner Sphäre bin ich hier, um Sie vor der Möglichkeit eines neuen Aufstiegs des Imperialismus zu warnen. Und damit ein Ende des Diskurses, der Barmherzigkeit und der Demut, für die Christus Jesus gestorben ist, damit wir sie bewahren. Ich rufe euch, Brüder und Schwestern in Russland, auf, den Versuchen des Kremls zu widerstehen, ein falsches Verständnis des Evangeliums aufrechtzuerhalten.\"\n\nPapst Franziskus II. hat mit seiner starken Betonung des interreligiösen Dialogs und seiner missionarischen Tätigkeit dafür gesorgt, dass sein Pontifikat eines der Synodalität sein wird, da ein progressiverer Flügel im Heiligen Stuhl an Einfluss zu gewinnen scheint. Allerdings wird er von den konservativeren und traditionalistischeren Mitgliedern seines Glaubens kritisiert, insbesondere wegen seiner Betonung der Inklusion und Begleitung von Randgruppen, einschließlich Homosexueller."
 vatican.4.a: "Ein neuer Papst für ein neues Zeitalter"
 vatican.5.t: "Kardinal Robert Prevost wird zum Papst Leo XIV. gewählt"
 vatican.5.d: "Heute Morgen läuteten die Glocken des Petersdoms in der Ewigen Stadt, und weißer Rauch quoll aus dem Schornstein der Sixtinischen Kapelle, um der Welt zu signalisieren, dass das Konklave beendet ist und das Kardinalskollegium den 267. Bischof von Rom gewählt hat. Kardinal Robert Francis Prevost aus den Vereinigten Staaten wurde unter dem Namen Leo XIV. auf den Thron des heiligen Petrus gewählt und ist damit der zweite Papst aus Amerika in der Geschichte. \nIn seiner öffentlichen Ansprache als Papst vom Balkon des Petersdoms kommentierte der neu gewählte Papst die Situation in seinem Heimatland: \n\n\"Und an euch alle, Brüder und Schwestern in Amerika. Oh, wie sehr schmerzt mein Herz für jede einzelne der Seelen, die in diesem gottlosen Konflikt verloren gegangen sind! Aber macht euch keine Sorgen, denn der Friede Gottes übersteigt alles Verständnis, und wenn ihr glaubt, dass Gott gewirkt hat, wird der Friede nach Amerika zurückkehren. Deshalb, liebe Brüder und Schwestern in der Welt, müssen wir dem Beispiel Christi folgen und Brücken zu denen bauen, die durch diesen und jeden anderen Konflikt verletzt werden, anstatt sie zu zerstören."\"\n\nDa Papst Leo XIV. einen Hintergrund in der Missionsarbeit hat und seine Aufmerksamkeit auf kleine Kulturen richtet, wird erwartet, dass das Papsttum wahrscheinlich dem Kurs ähneln wird, den Papst Franziskus vor ihm eingeschlagen hat, nachdem er bereits seine Unterstützung für die Union Amerikas im laufenden Bürgerkrieg erklärt hat."
 vatican.5.a: "Das Erbe von Franziskus lebt weiter"
 vatican.6.t: "Kardinal Peter Erdo zum Papst Stephan X. gewählt"
 vatican.6.d: "Die Glocken des Petersdoms läuteten heute Morgen in der Ewigen Stadt, und weißer Rauch stieg aus dem Schornstein der Sixtinischen Kapelle auf, um der Welt zu signalisieren, dass das Konklave beendet ist und das Kardinalskollegium den 267. Bischof von Rom gewählt hat. Kardinal Peter Erdo aus Ungarn wurde auf den Thron des Heiligen Petrus gewählt und nimmt den Namen Stephan X. an. In seiner öffentlichen Ansprache als Papst vom Balkon des Petersdoms aus reflektierte der neu gewählte Papst über die Lage der Welt: "Europa ist heute so gespalten wie seit Jahrzehnten nicht mehr. In Zeiten wie den unseren muss die eine, heilige, katholische und apostolische Kirche ein Leuchtfeuer sein, das über der Politik steht, aber niemals unempfindlich gegenüber Ungerechtigkeit ist. Erinnern wir uns daran, dass unsere Einheit größer ist als alle Grenzen, Flaggen oder Parteien; denn wir sind alle eins in Christus Jesus. Es ist nicht die Zeit der Verzweiflung, sondern der Erneuerung.\"\n\Nachdem er oft als theologischer Konservativer mit tiefem Respekt für die katholischen Traditionen beschrieben wird, wird das Pontifikat von Papst Stephan wahrscheinlich den Schwerpunkt auf Kontinuität und Stabilität legen, insbesondere inmitten der zunehmenden globalen Krisen. Sein langjähriges Engagement für den sozialen Zusammenhalt, den Dialog mit den Ostkirchen und die Rolle der nationalen Identität in der Religion macht ihn jedoch zu einem Papst, der sich auf die besonderen Ängste in Europa einstellt."
 vatican.6.a: "Ein neues Zeitalter für die Kirche."
 vatican.7.t: "Kardinal Robert Sarah zum Papst Benedikt XV. gewählt"
 vatican.7.d.1: "Heute Morgen läuteten die Glocken des Petersdoms in der Ewigen Stadt, und weißer Rauch quoll aus dem Schornstein der Sixtinischen Kapelle, um der Welt zu signalisieren, dass das Konklave beendet ist und das Kardinalskollegium den 267. Bischof von Rom gewählt hat. Bischof von Rom gewählt hat. Kardinal Robert Sarah aus Ghana wurde unter dem Namen Benedikt XV. auf den Thron des heiligen Petrus gewählt und ist der erste Papst, der seit mehr als 1.500 Jahren aus Afrika stammt. \nIn seiner öffentlichen Ansprache als Papst vom Balkon des Petersdoms aus verkündete der neu gewählte Papst eine klare Botschaft:\n\n \"Das kommunistische Gespenst sucht jetzt jeden Winkel der Welt heim. Es ist wie ein Gift, das in die Herzen und Köpfe eindringt und Gott und die Menschenwürde ablehnt, indem es sich den Dingen dieser Welt zuwendet. Wir müssen das Gegengift liefern: Wo diejenigen, die die Dinge dieser Welt lieben, ihre Propaganda verbreiten, müssen wir das Evangelium lauter verkünden. Diese Welt braucht keine Kompromisse, sie braucht Mut.\"\n\nPapst Benedikt XV., der für seinen lautstarken und unverblümten Traditionalismus und seinen erbitterten Widerstand gegen die moderne säkulare Kultur und den islamischen Fundamentalismus bekannt ist, wird voraussichtlich eine strenge und traditionalistische Ära einleiten. Seine Wahl signalisiert eine Kirche, die bereit ist, sich dem entgegenzustellen, was er als \"Zusammenbruch des Abendlandes\" bezeichnet hat, sowohl moralisch als auch spirituell."
 vatican.7.d.2: "Heute Morgen läuteten die Glocken des Petersdoms in der Ewigen Stadt, und weißer Rauch quoll aus dem Schornstein der Sixtinischen Kapelle, um der Welt zu signalisieren, dass das Konklave beendet ist und das Kardinalskollegium den 267. Bischof von Rom gewählt hat. Kardinal Robert Sarah aus Ghana wurde unter dem Namen Benedikt XV. auf den Thron des heiligen Petrus gewählt und ist der erste Papst, der seit mehr als 1.500 Jahren aus Afrika stammt. \nIn seiner öffentlichen Ansprache als Papst vom Balkon des Petersdoms aus verkündete der neu gewählte Papst eine deutliche Botschaft:\n\n\"Das Gespenst des Kommunismus ist mit Getöse zurückgekehrt. Es erobert freie und souveräne Nationen und predigt gegen Gott, indem es Verfolgung mit Gerechtigkeit und Tyrannei mit Ordnung tarnt. Wir stehen nun einer neuen chinesisch-russischen Achse des Bösen gegenüber, in der unser Herr verbannt ist und die Menschen vor dem Staat knien müssen. Wir werden ihnen gegenüber nicht still sein. Wenn wir unser Kreuz erneut durch Golgatha tragen müssen, werden wir das mit Eifer tun.\"\n\nDie Wahl Benedikts XV. - eines unapologetischen Traditionalisten - steht für eine Kirche, die bereit ist, Widerstand zu leisten, anzuprangern und die Gläubigen durch das zu führen, was er ein neues \"Zeitalter der Wölfe\" genannt hat."
 vatican.7.a: "Die militante Kirche kehrt zurück."
 vatican.8.t: "[THIS.GetAdjective] Papst gewählt"
 vatican.8.d: "Ein Kardinal aus unserem Land ist zum nächsten Papst gewählt worden!\n Wir bekommen coole Boni und etwas Einfluss auf andere Länder - juhu!"
 vatican.8.a: "Cool."
 

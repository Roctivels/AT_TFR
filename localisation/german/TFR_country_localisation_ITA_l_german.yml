 italy_ew_events.1.t: "Der Europäische Krieg"
 italy_ew_events.1.d: "" 
 italy_ew_events.1.a: "So beginnt es also."
 italy_ew_events.2.t: "Alles ruhig"
 italy_ew_events.2.d: "Die jüngsten technologischen Fortschritte in der Kriegsführung machten es Soldaten unmöglich, ohne Genehmigung mit Personen in großer Entfernung zu kommunizieren. Es war ein recht primitiver Schritt, aber das Schreiben von Briefen wurde für diese verzweifelten Soldaten und ihre Angehörigen zur einzigen realistischen Option. In einer kleinen Stadt, wenige Kilometer von Rom entfernt, war seit Kriegsbeginn zum dritten Mal ein Paket mit Briefen zurückgeschickt worden. Ehefrauen, Freunde und Familienmitglieder warteten ungeduldig auf der Piazzetta der Stadt und zählten die Sekunden, bis die Briefe unter ihnen verteilt wurden.\n\nSilvia war, auch wenn sie es nicht glauben wollte, die Ungeduldigste. Seit sie sich im Kindergarten kennengelernt hatten, verbrachte sie den größten Teil ihres Lebens mit ihrem Mann. Auch wenn sie es damals noch nicht wussten, waren sie zu einer Einheit geworden. Sie hatten wirtschaftliche Not, die Pandemie und die wachsenden geopolitischen Spannungen zwischen ihrem Land und Moskau durchgestanden, immer voneinander abhängig. Jetzt war ihr Mann direkt an der Front und wurde zu einem der vielen vergessenen Namen, die dem Schlachthaus zugeführt wurden.\n\nEs war ein Jahr her, seit er Italien verlassen hatte. Der erste Brief handelte von Optimismus, von überraschenden Siegen gegen den Feind unter unglaublichen Umständen. Der zweite Brief war anders. Er war direkter, weniger optimistisch, sondern beschrieb vielmehr die schreckliche Situation, in der er und seine Brigade sich befanden, als sie mit aller Kraft kämpften, um ihren kleinen Außenposten in Lettland zu verteidigen. \n\nSeit sie diesen Brief vor über vier Monaten erhalten hatte, schlief sie immer mit offenen Augen und fragte sich, ob es ihrem Mann wohl gut ging. Dieser Brief könnte sie beruhigen oder sie endgültig zerstören.\n\nWährend sie mit sich selbst diskutierte, entschied sie sich schließlich, sich dem Paket zu nähern, das bereits von den örtlichen Freiwilligen sortiert worden war. Zu ihrer Überraschung fand sie nichts. Es war kein einziger Umschlag mehr übrig. Verzweifelt begann sie schneller zu atmen und näherte sich einer der Freiwilligen, so gut sie konnte. "Entschuldigung?", begann sie. "Ich bin mir ziemlich sicher, dass Sie ein paar Umschläge übersehen haben. Mein Mann, Luca Moretti, ist nicht in diesem Stapel."\n\nDie Freiwillige verdrehte die Augen. \"Moretti? Ich kann Ihnen versichern, dass ich die meisten dieser Umschläge sortiert habe und niemanden mit diesem Nachnamen gefunden habe. Tut mir leid."\n\nWas? Niemand? Nicht ein einziger? Silvia überlegte, den Freiwilligen weiter zu befragen, aber was sollte er schon wissen? Sie ging langsam aus dem Raum und weinte hilflos."
 italy_ew_events.2.a: "Sie wäre nicht die Einzige."

 italy_ew_events.3.t: "Warum für Donetsk sterben?"
 italy_ew_events.3.d: "Seit Kriegsbeginn war es in Florenz wie in vielen anderen Städten Italiens ruhig geworden. Das politische Leben der Stadt war fast über Nacht verschwunden. Öffentliche Versammlungen wurden abgesagt, lokale politische Parteien verschoben Veranstaltungen auf unbestimmte Zeit, Stadtratssitzungen wurden annulliert; alle bürgerlichen Aktivitäten, die die Menschen kannten, kamen zum Erliegen. Niemand sprach es aus, aber alle wussten es. Italien befand sich im Krieg, und die Demokratie im Land verstummte. \n\nDoch es gab eine Gruppe, die offenbar nicht ohne ein lautes letztes Wort gehen wollte.\n\nIn der Innenstadt, direkt vor dem Rathaus, hatte sich eine Menschenmenge versammelt. Sie hielten Schilder hoch, skandierten Parolen und schwenkten ihre Fahnen, wobei ihr Spektakel die Aufmerksamkeit aller Passanten auf sich zog. Sie waren die lauteste Szene in der Stadt, und die Regierung hatte dies sicherlich bemerkt. Im Rathaus beobachteten die Politiker hinter vorgehängten Fenstern mit ausdruckslosen Gesichtern das Geschehen, aber die Mienen waren nicht einheitlich. Der Polizeichef sah mit verächtlichem Blick zu, wie die engagierten Russophilen der Stadt ihre Parolen riefen und ihre Schilder mit den bekannten Forderungen schwenkten. \n\nKEIN KRIEG! KEINE INTERVENTION!\n\nITALIEN HAT DAFÜR NICHT GESTIMMT!\n\nWARUM FÜR DONETSK STERBEN?\n\nImmer wieder skandierten sie dies, sehr zum Missfallen ihrer Anführer. Sie waren Schachfiguren, nützliche Idioten, vielleicht sogar Verräter. Vielleicht hatte ihnen der FSB eine ordentliche Summe gezahlt, damit sie ihren Unsinn weiter machten. Um 16 Uhr fragten sie sich alle, ob sie bis tief in die Nacht dort bleiben würden. \n\n Aber sie bekamen ihre Antwort sehr schnell.\n\nSie schauten nach rechts und sahen, was eine neue wütende Unruhe auf dem Platz auslöste. Polizisten aus der Stadt strömten herbei und gerieten bereits in Handgemenge mit den Demonstranten. Es gab Geschrei, Beleidigungen und sogar Schläge, als die lokalen Anti-Interventionisten Widerstand leisteten, aber das hielt nicht lange an. Innerhalb einer Stunde hatte die Polizei sie bereits unter Kontrolle gebracht, und zum ersten Mal seit Tagen sah der Polizeichef zufrieden aus." 
 italy_ew_events.3.a: "Sie können in einer Zelle für Moskau agitieren."

 italy_ew_events.4.t: "Einsatzbericht"
 italy_ew_events.4.d: "Die Präsenz der russischen Schwarzmeerflotte im Einsatzgebiet des Schwarzen Meeres bedrohte die Einsatzfähigkeit der See-, Luft- und Landstreitkräfte in den Sektoren Bulgarien, Rumänien und Ukraine. Ein Großteil der feindlichen Flotte wurde auf dem Weg zu Zielen an der rumänischen und ukrainischen Küste entdeckt. Das italienische und das NATO-Oberkommando genehmigten den Einsatz ausgewählter russischer Kampfgruppen.\n\nVERLAUF DES EINSATZES: Die verbündeten Seestreitkräfte griffen in Zusammenarbeit mit der Luftwaffe die führenden feindlichen Schiffe an. Die Feinde erlitten sofortige Verluste und versuchten einen Gegenangriff mit Luftstreitkräften und Raketenangriffen. Es kam zu einer heftigen Schlacht zwischen den verbündeten Streitkräften und den Seestreitkräften. Die verbündeten Streitkräfte erlitten Verluste durch feindliche Bodenangriffsflugzeuge und Raketensalven. Der anhaltende Druck durch Drohnen-, Luft- und Raketenangriffe der verbündeten Streitkräfte erschöpfte jedoch die Reserven des Feindes und zerstörte dessen Kommando- und Kontrollinfrastruktur. Nach anhaltenden Verlusten an C2 und Material zogen sich die feindlichen Streitkräfte aus dem Einsatzgebiet zurück.\n\nBERICHT ÜBER VERLUSTE DER VERBÜNDETEN: 4 Fregatten. 1 Zerstörer. 2 Mehrzweckkampfflugzeuge. 7 Drohnen. \n\nVERLUSTBERICHT DES FEINDS: 5 Raketenkorvetten. 12 Patrouillenboote. 2 Lenkwaffenfregatten. 5 Marinehubschrauber. 3 Mehrzweckkampfflugzeuge. 2 Drohnen.\n\nTaktische Bewertung nach der Aktion: Sieg. Überschaubare Verluste für die eigenen Streitkräfte. Erhebliche Verluste für die feindlichen Streitkräfte. Vollständiger Verlust des Offensivtempos für die russischen Streitkräfte der Schwarzmeerflotte.\n\nENDGÜLTIGE STRATEGISCHE BEWERTUNG: Die russischen Seestreitkräfte im Schwarzen Meer haben erhebliche Verluste erlitten. Mindestens 20 Prozent der feindlichen Seestreitkräfte sind kampfunfähig. Die feindliche Flotte wird wahrscheinlich für die unmittelbare Dauer der aktuellen Operationen in eine defensive Haltung gezwungen werden. Offensive Operationen der russischen Schwarzmeerstreitkräfte sind in naher Zukunft höchst unwahrscheinlich, könnten aber in naher Zukunft wieder aufgenommen werden." 
 italy_ew_events.4.a: "Ein NATO-See kommt bald."

 italy_ew_events.5.t: "EINSATZBRIEFING – Angriff auf Sewastopol"
 italy_ew_events.5.d: "Einsatzbesprechung für einen begrenzten amphibischen Angriff im Küstenabschnitt von Sewastopol\nDatum: [GetDateText]\nVerteilung: Oberkommando – Marineabteilung – Gemeinsame Operationen\n\nSTRENG GEHEIM\n\nDieses Dokument enthält eine grundlegende Zusammenfassung der amphibischen Operation gegen russische Marinekommandozentralen und Küstenradaranlagen im Gebiet von Sewastopol. Aufgrund ihrer Schnelligkeit und Einsatzfähigkeit wurde die Einheit „Lagunari Regiment Serenissima” für diese Operation ausgewählt.\n\nDie Kontrolle des Feindes über Sewastopol verschafft ihm einen strategischen Vorteil gegenüber unseren Stellungen im Schwarzen Meer und ermöglicht ihm Aufklärungsoperationen gegen unsere Flotten.\nEines der wichtigsten Marinekommandozentralen in der Region befand sich 20 km westlich von Sewastopol. Es fungierte als primärer Kommandoknotenpunkt für russische Minenlege- und Aufklärungsoperationen im Schwarzen Meer und schützte die Halbinsel vor bedeutenden amphibischen Operationen der NATO.\n\nNachrichtenberichte deuten darauf hin, dass es zwischen 01:00 und 07:00 Uhr zu einer sechsstündigen Wartungsunterbrechung im Knotenpunkt kommt, wodurch dieser von jeglicher externen Kommunikation abgeschnitten ist.\nDiese Zeit wurde als der beste Zeitpunkt für die Durchführung dieser Operation festgelegt.\n\nDie Operation zielte auf fünf Schlüsselpunkte ab, darunter Küstenradarzentren, Feuerleitsysteme und das oben genannte Kommandozentrum. Das Regiment konnte alle Ziele innerhalb weniger Stunden nach Beginn der Operation neutralisieren und dabei nur wenige Verluste hinnehmen. Die Trupps des Regiments konnten ihre Positionen sogar 12 Stunden lang halten, sodass unsere See- und Luftstreitkräfte die entstandene Lücke ausnutzen konnten.\n\nDie erfolgreiche Durchführung der Operation setzte die Küstenverteidigung des Feindes für die nächsten zwei bis drei Tage außer Gefecht, sodass die alliierten Seestreitkräfte in diesem Zeitraum freie Bewegungsfreiheit auf dem Schwarzen Meer hatten und Folgeoperationen an anderen wichtigen Punkten entlang der Krimküste frühzeitig vorbereiten konnten." 
 italy_ew_events.5.a: "Die russische Vorherrschaft gerät ins Wanken."

 italy_ew_events.6.t: "Folgore über dem Don"
 italy_ew_events.6.d: "Der Himmel über Woronesch hatte die Farbe von zerkratztem Stahl, als die C-130 in geringer Höhe auftauchten und ihre Motoren gegen den Wind heulten. Nach wochenlangen zermürbenden Kämpfen waren die russischen Linien westlich der Stadt zusammengebrochen; die NATO-Streitkräfte drängten vor, um die Lücke auszunutzen. Italien, das sich verpflichtet hatte, seinen Teil beizutragen, warf seine Elite ins Spiel: die Fallschirmjägerbrigaden Folgore. Um 04:30 Uhr begann der Absprung. Hunderte von olivgrünen Fallschirmen blühten vor dem grauen Morgengrauen auf, Elitesoldaten des 185. Fallschirmjägerregiments, die Gesichter geschwärzt, die Waffen fest angeschnallt. Sie fielen auf ein Flickwerk aus Weizenfeldern und zerstörten Kolchosen am südlichen Stadtrand, das als LZ Viper bezeichnet wurde. Unter ihnen flackerten Flakfeuer, aber die meisten Schüsse waren unkontrolliert; die russischen mobilen Einheiten waren dünn gesät.\n\nDie ersten Gruppen schlugen hart auf dem Boden auf. Der Zug von Hauptmann Lorenzo Ricci sicherte innerhalb weniger Minuten die zentrale Kreuzung und brachte eine überraschte BMD-Besatzung mit Granaten und Kleinwaffenfeuer zum Schweigen. Nahegelegene Trupps räumten einen verfallenen Getreidespeicher, der als Beobachtungsposten diente, und zerrten die benommenen Besatzungsmitglieder mit vorgehaltener Waffe hinaus. Um 05:00 Uhr war ein grober Sicherheitsbereich um die Absprungzone herum eingerichtet: Maschinengewehrnester in Gräben, Scharfschützen auf Dächern, Pioniere, die mit Chemielichtern Gleitbahnen markierten. \"Sicherheitsbereich gesichert. LZ Viper grün. Bitte um sofortige Nachschublieferung.\"\n\n"Innerhalb einer Stunde schlugen die ersten schweren Paletten auf dem Boden auf: Kisten mit 120-mm-Mörsergranaten, Sanitätskoffern, Milan-Panzerabwehrraketen und Dieselkanistern. Weitere C-27J Spartans kreisten tief und brachten weitere Truppen und leichte Fahrzeuge \n\nBis zum Mittag war die Enklave gesichert. Folgore-Pioniere schufen mit Bulldozern eine provisorische Landebahn auf dem abgeernteten Weizenfeld; die erste An-26 landete in der Abenddämmerung mit Munition und warmen Mahlzeiten. Russische Gegenangriffe testeten die Flanken, zunächst mit Artillerie, dann mit Infanterie, aber rückstoßfreie Gewehre und Javelin-Teams schlugen sie mit rauchenden Panzern zurück. Im Kommandoposten, einem zerstörten Bauernhauskeller, wischte sich Ricci den Schweiß von der Stirn und drückte auf die Taste des Mikrofons. \"Voronezh südliche Flanke stabilisiert.\" Die Fallschirmjäger zündeten sich in der schwindenden Dämmerung Zigaretten an und beobachteten die Versorgungsflugzeuge, die über ihnen brummten. Zumindest für eine Nacht gehörte die Frontlinie Italien." 
 italy_ew_events.6.a: "Und Europa."
 

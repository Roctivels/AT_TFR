 amphibious_mechanized_equipment:0 "Amphibische Landungsfahrzeuge"
 amphibious_mechanized_equipment_short:0 "Amtracs"
 amphibious_mechanized_equipment_desc:0 "Amphibische Zugmaschinen (Amtracs) ermöglichen es den Marines, unter gepanzertem Schutz an einem Strand zu landen. Dies geht jedoch auf Kosten einer schlechten Treibstoffeffizienz."
 amphibious_mechanized_equipment_1:0 "Einfache amphibische Zugmaschine"
 amphibious_mechanized_equipment_1_short:0 "Einfache Amtrac"
 amphibious_mechanized_equipment_1_desc:0 "Amphibische Zugmaschinen (Amtracs) ermöglichen es den Marines, unter gepanzertem Schutz an einem Strand zu landen. Dies geht jedoch auf Kosten einer schlechten Treibstoffeffizienz."
 amphibious_mechanized_equipment_2:0 "Verbesserter amphibische Zugmaschine"
 amphibious_mechanized_equipment_2_short:0 "Verbesserter Amtrac"
 amphibious_mechanized_equipment_2_desc:0 "Diese Amtracs weisen einige Verbesserungen gegenüber der Basisversion auf, wie z. B. eine Heckladerampe zum leichteren Entladen am Strand."
 amphibious_tank_equipment:0 "Amphibische Panzer"
 amphibious_tank_equipment_short:0 "Amphib. Panzer"
 amphibious_tank_equipment_1:0 "Einfacher amphibischer Panzer"
 amphibious_tank_equipment_2:0 "Verbesserter amphibischer Panzer"
 amphibious_tank_equipment_desc:0 "Panzer, die so modifiziert wurden, dass sie sich durch Wasser bewegen können. Sie eignen sich viel besser für amphibische Landungen und Flussdurchquerungen als andere Panzer, benötigen aber mehr Treibstoff."
 amphibious_tank_equipment_1_desc:0 "Dieses Fahrzeug, das im Wesentlichen ein schwimmfähiger leichter Panzer ist, dient der Feuerunterstützung von Einheiten, die einen Brückenkopf aufbauen."
 amphibious_tank_equipment_2_desc:0 "Ein mittelgroßer Panzer, der so umgebaut wurde, dass er sich im Wasser bewegen kann. Die zusätzliche Vielseitigkeit und Mobilität geht auf Kosten einer geringeren Kraftstoffeffizienz."


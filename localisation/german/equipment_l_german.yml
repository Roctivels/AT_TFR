 train_equipment:0 "Zug"
 train_equipment_desc:0 "Züge transportieren Lieferungen aus der Hauptstadt der Versorgung zu den Versorgungszentren, die über die Schiene verbunden sind."
 train_equipment_1:0 "Ziviler Zug"
 train_equipment_1_desc:0 "Diese Lokomotive, die vom Militär aus dem regulären zivilen Güterverkehr übernommen wurde, eignet sich gut für den Transport großer Mengen an Versorgungsgütern über lange Strecken. Ihre zivile Konstruktion macht sie jedoch anfällig."
 train_equipment_2:0 "Kriegssparzug"
 train_equipment_2_desc:0 "Es handelt sich um eine vereinfachte Konstruktion, bei der viele Merkmale, die bei regulären Güterzügen üblich sind, aus Gründen einer billigeren Produktion weggelassen wurden. Er ist immer noch genauso anfällig wie ein normaler Zug, kann aber leichter ausgetauscht werden."
 train_equipment_3:0 "Gepanzerter Zug"
 train_equipment_3_desc:0 "Eine Lokomotive, die von einer schweren Panzerung umgeben ist, um sie weniger anfällig für feindliche Angriffe zu machen. Sie kann genauso viel Fracht befördern wie jede andere Konstruktion, ist aber teurer in der Herstellung."
 railway_gun_equipment:0 "Eisenbahnartillerie"
 railway_gun_equipment_desc:0 "Eine schwere Kanone, die zum Transport auf einen Eisenbahnwagen montiert ist."
 railway_gun_desc:0 "Die Eisenbahn bietet die Möglichkeit, schwere Geschütze mit angemessener Geschwindigkeit weit ins Landesinnere zu verlegen, so dass wir feindliche Stellungen aus großer Entfernung und mit guter Wirkung bombardieren können."
 railway_gun_equipment_1:0 "Eisenbahnkanone"

 floating_harbor_equipment:0 "Schwimmender Hafen"
 floating_harbor_equipment_desc:1 "Eine Reihe von Pontons und vorgefertigten Betonkonstruktionen, die über das Wasser bewegt und innerhalb weniger Stunden aufgebaut werden können, um einen geschützten Landeplatz zum Entladen von Versorgungsgütern zu schaffen."
 floating_harbor_equipment_1:0 "Schwimmender Hafen"
 floating_harbor_equipment_1_desc:1 "Eine Reihe von Pontons und vorgefertigten Betonkonstruktionen, die über das Wasser bewegt und innerhalb weniger Stunden aufgebaut werden können, um einen geschützten Landeplatz zum Entladen von Versorgungsgütern zu schaffen."


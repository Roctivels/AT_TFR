 tank_armor_upgrade:0 "Panzerung"
 tank_armor_upgrade_desc:0 "Eine bessere Panzerung als die, die deine Feinde durchdringen können, ist ein großer Vorteil für deine Divisionen, aber sie wird dich wahrscheinlich verlangsamen."
 tank_gun_upgrade:0 "Hauptwaffe"
 tank_gun_upgrade_desc:0 "Es ist wichtig, eine Waffe zu haben, die mit der Stärke der gegnerischen Panzerung mithalten und sie durchdringen kann."
 tank_aa_upgrade:0 "Luftabwehrbewaffnung"
 tank_aa_upgrade_desc:0 "Stellt sicher, dass unsere Luftabwehrbewaffnung in der Lage ist, die neuesten Flugzeuge abzuschießen."
 tank_at_upgrade:0 "Panzerabwehrbewaffnung"
 tank_at_upgrade_desc:0 "Sorgt dafür, dass unsere Panzerjäger die neuesten feindlichen Panzer besiegen können."
 tank_art_upgrade:0 "Artilleriebewaffnung"
 tank_art_upgrade_desc:1 "Sorgt dafür, dass unsere selbstfahrende Artillerie über eine massive Feuerkraft verfügt, die jeden ungepanzerten Feind vernichten kann."
 tank_reliability_upgrade:0 "Verlässlichkeit"
 tank_reliability_upgrade_desc:1 "Eine höhere Zuverlässigkeit führt dazu, dass weniger Geräte ausfallen, die ersetzt werden müssen."
 mech_cost_upgrade:0 "Produktionskosten"
 mech_cost_upgrade_desc:0 "Durch Optimierungen der Konstruktion und die Substitution weniger wichtiger Materialien kann das Fahrzeug schneller gebaut werden, weist aber etwas mehr Mängel auf."
 tank_engine_upgrade:0 "Motor"
 tank_engine_upgrade_desc:0 "Mehr Mobilität bringt taktische und strategische Vorteile und ermöglicht eine stärkere Panzerung, ohne die Geschwindigkeit erheblich zu verringern."
 ac_engine_upgrade:0 "Triebwerk"
 ac_engine_upgrade_desc:0 "Mehr Mobilität bringt taktische und strategische Vorteile und ermöglicht eine stärkere Panzerung, ohne die Geschwindigkeit erheblich zu verringern."
 ship_gun_upgrade:0 "Waffe"
 ship_gun_upgrade_desc:0 "Es ist wichtig, eine Waffe zu haben, die mit der Stärke der gegnerischen Panzerung mithalten und sie durchdringen kann."
 ship_torpedo_upgrade:0 "Torpedo"
 ship_torpedo_upgrade_desc:0 "Ein Torpedo ist ein mächtiger Angriff, der von kleineren Schiffen abgefeuert werden kann, sobald diese in Reichweite sind, und eine hohe Chance auf kritische Treffer hat."
 ship_armor_upgrade:0 "Panzerung"
 ship_armor_upgrade_desc:0 "Mehr Panzerung zum Schutz des Schiffes vor feindlichem Beschuss"
 carrier_armor_upgrade:0 "Panzerung"
 carrier_armor_upgrade_desc:0 "Mehr Panzerung zum Schutz des Schiffes vor feindlichem Beschuss"
 ship_engine_upgrade:0 "Triebwerk"
 ship_engine_upgrade_desc:0 "Ein Schiff mit einem stärkeren Motor kann den Abstand zu seinen Gegnern im Kampf kontrollieren"
 ship_reliability_upgrade:0 "Verlässlichkeit"
 ship_reliability_upgrade_desc:0 "Ein Schiff mit hoher Zuverlässigkeit ist weniger anfällig für kritische Treffer, die einem Schiff ohne gut durchdachte Konstruktion großen Schaden zufügen können."
 ship_anti_air_upgrade:0 "Luftabwehr"
 ship_anti_air_upgrade_desc:0 "Mehr Geschütze, die Blei in die Luft blasen, bedeuten mehr abgeschossene feindliche Flugzeuge!"
 ship_ASW_upgrade:0 "U-Boot-Abwehr"
 ship_ASW_upgrade_desc:0 "U-Boot-Abwehrwaffen sind wichtig für das Aufspüren und Ausschalten von U-Booten."
 destroyer_engine_upgrade:0 "Triebwerk"
 destroyer_engine_upgrade_desc:0 "Ein Schiff mit einem stärkeren Triebwerk kann den Abstand zu seinen Gegnern im Kampf kontrollieren"

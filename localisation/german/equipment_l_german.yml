l_german:
 submarine:0 "U-Boot"
 submarine_desc:0 "U-Boote setzen Tarnkappen und leistungsstarke Torpedos ein, um feindliche Konvois zu zerstören."
 both_cruisers_desc:0 "Leichter Kreuzer - Ein leichtes Abschirmschiff. Seine Hauptaufgabe ist es, Großkampfschiffe vor feindlichen leichten Schiffen zu schützen, aber er kann auch mächtige Torpedos abfeuern, die größere Schiffe verletzen können.\n\nSchwerer Kreuzer - Ein großer gepanzerter Kreuzer, der ziemlich flexibel ist. Eine gute Wahl für Nationen, die es sich nicht leisten können, größere Großkampfschiffe zu bauen."
 light_cruiser:1 "Leichter Kreuzer"
 light_cruiser_desc:0 "A light screening vessel. Its primary duty is to shield capital ships from enemy light ships but can also unleash powerful torpedoes that can hurt bigger ships."
 heavy_cruiser:1 "Schwerer Kreuzer"
 heavy_cruiser_desc:0 "Ein großer gepanzerter Kreuzer, der ziemlich flexibel ist. Eine gute Wahl für Nationen, die sich den Bau größerer Großkampfschiffe nicht leisten können."
 destroyer:0 "Zerstörer"
 destroyer_desc:0 "Das leichteste Abschirmschiff. Seine Aufgabe ist es, größere Schiffe zu verteidigen und U-Boote zu finden und zu zerstören."
 ship_hull_light:1 "Leichter Rumpf"
 ship_hull_light_desc:0 "Das leichteste Abschirmschiff. Seine Aufgabe ist es, größere Schiffe zu verteidigen und U-Boote zu finden und zu zerstören."
 carrier:0 "Träger"
 carrier_desc:0 "Ein großes Schiff, das mächtige Flugzeugträger in die Schlacht tragen kann. Nützlich auch als schwimmender Flugplatz, den Sie vor der Küste Ihres Gegners positionieren können."
 battleship:0 "Schlachtschiff"
 battleship_desc:0 "Das größte Großkampfschiff mit den größten Kanonen und der stärksten Panzerung, die man für Geld kaufen kann. Eine so teure Investition verdient eine angemessene Unterstützung durch kleinere Schutzschiffe."
 armor_desc:0 "Die größte und stärkste Rüstung, die man für Geld kaufen kann."
 battle_cruiser:0 "Schlachtkreuzer"
 battle_cruiser_desc:0 "Ein großes Großraumschiff, dessen Offensivfähigkeiten denen eines Schlachtschiffs ähneln, dessen schwächere Panzerung jedoch gegen eine höhere Geschwindigkeit eingetauscht wird."
 convoy:0 "Konvoi"
 convoy_desc:0 "Konvois, die für den internationalen Handel mit Waren und Ressourcen eingesetzt werden. Sie werden auch zur Beförderung von Truppen und zur Durchführung von Seeinvasionen eingesetzt."
 sh_battleship:0 "Überschweres Schlachtschiff"
 sh_battleship_desc:0 "Das größte Großkampfschiff mit den größten Kanonen und der stärksten Panzerung, die man für Geld kaufen kann. Eine so teure Investition verdient eine angemessene Unterstützung durch kleinere Schutzschiffe."
 light_airframe:0 "Leichtes Flugwerk"
 light_airframe_desc:0 ""
 medium_airframe:0 "Mittelgroßes Flugwerk"
 medium_airframe_desc:0 ""
 heavy_airframe:0 "Schweres Flugwerk"
 heavy_airframe_desc:0 ""
 jet_engines:0 "Düsentriebwerke"
 JET_ENGINES_SPECIAL:0 "Die Entwicklung von Strahltriebwerken ist eine wesentliche Voraussetzung für die Entwicklung von strahlgetriebenen Flugzeugen. Dies muss erforscht werden, bevor Sie fortschrittliche Flugzeuge erforschen können"
 jet_engines_desc:0 "Das Düsentriebwerk ist ein Durchbruch in der Antriebstechnologie und wird die Entwicklung einer völlig neuen Generation von Flugzeugen ermöglichen."
 convoy_1:0 "Konvoi"
 armored_car_equipment:0 "Gepanzerter Wagen"
 armored_car_equipment_desc:0 "Leichte gepanzerte Radfahrzeuge. Üblich für Aufklärung und Widerstandsunterdrückung, kann aber mit schwereren Waffen ausgestattet werden."
 motorized_equipment:1 "LKW"
 motorized_equipment_desc:1 "Lastwagen für den Transport von Truppen, Nachschub und für die Motorisierung der Division."
 motorized_equipment_0: "Früher LKW"
 motorized_equipment_0_desc:1 "Während des Ersten Weltkriegs begannen die Armeen, einfache zivile Lastwagen für den Transport von Nachschub und Ausrüstung zu verwenden. Seitdem sind sie ein fester Bestandteil der meisten Armeen."
 motorized_equipment_1:1 "LKW"
 motorized_equipment_1_desc:0 "Die Motorisierung der Infanterie ist der erste Schritt zur Mechanisierung einer Armee. Zivile Lastkraftwagen lassen sich leicht an militärische Zwecke wie den Transport von Soldaten, das Ziehen von Geschützen und den Transport von Ausrüstung und Nachschub anpassen. Dadurch wird die strategische Mobilität von Infanterieeinheiten, die sonst auf den Marsch angewiesen wären, erheblich gesteigert."
 support_equipment_short:0 "Unterstützungsausr."
 support_equipment:0 "Unterstützungsausrüstung"
 support_equipment_desc:0 "Funkgeräte, Jeeps, Pontons und andere Ausrüstung zur Unterstützung der Truppen."

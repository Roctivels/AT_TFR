 RAJ.21.t: "Großauftrag aus Indien zur Lieferung von Infanterieausrüstung"
 RAJ.21.d: "Indien hat uns eine Anfrage für Infanterieausrüstung geschickt. Dieses Land ist ein langjähriger und wichtiger Verbündeter in Asien, mit dem uns enge wirtschaftliche und politische Beziehungen verbinden. Das fragliche Geschäft geht jedoch über die bilaterale Zusammenarbeit hinaus, da es das Gleichgewicht der Kräfte in der Region beeinflusst. Indien und China konkurrieren seit langem um den Einfluss in Asien, und Waffenlieferungen an Indien könnten das Gleichgewicht verändern.\nDaher stehen wir vor einer schwierigen Entscheidung. Auf der einen Seite wird der Vertrag wirtschaftliche Vorteile bringen und unsere Beziehungen weiter stärken. Andererseits könnten die Folgen einer Einmischung in das Gleichgewicht der Kräfte in der Region sehr ernst sein."
 RAJ.21.a: "Organisiert die Vorräte."
 RAJ.21.b: "Lehnt dankend ab."
 RAJ.22.t: "Großauftrag aus Indien zur Lieferung von Jets"
 RAJ.22.d: "Wir haben eine Anfrage aus Indien für die Lieferung von Jets erhalten. Indien gehört seit langem zu unseren strategischen Partnern in Asien, mit denen wir enge wirtschaftliche und politische Beziehungen unterhalten. Ein Rüstungsauftrag dieses Kalibers wird jedoch unweigerlich Auswirkungen auf die Lage in der Region haben. China und Indien rivalisieren nach wie vor um Einfluss, und ein Waffentransfer an Indien könnte das bestehende Kräftegleichgewicht stören.\nWir stehen also vor einer schwierigen Entscheidung. Das Abkommen wird unsere wirtschaftliche Zusammenarbeit mit Indien stärken, finanzielle Vorteile bringen und unsere Position auf dem asiatischen Markt ausbauen. Mögliche Veränderungen des Kräfteverhältnisses erfordern jedoch besondere Vorsicht bei der Entscheidungsfindung."
 RAJ.22.a: "Organisiert die Vorräte."
 RAJ.22.b: "Lehnt dankend ab."
 RAJ.23.t: "Großauftrag aus Indien zur Lieferung gepanzerter Fahrzeuge"
 RAJ.23.d: "Die indische Regierung hat Interesse am Kauf unserer gepanzerten Fahrzeuge bekundet. Wir haben seit langem wirtschaftliche und politische Beziehungen zu Indien, aber ein solches Geschäft geht über eine normale Partnerschaft hinaus, weil es das Kräftegleichgewicht in der Region beeinflusst. Indien und China konkurrieren seit vielen Jahren um Einfluss in Asien, und jede Veränderung des Kräfteverhältnisses könnte dieses fragile System beeinträchtigen.\nDie vor uns liegende Aufgabe ist nicht einfach. Der Vertrag mit Indien wird uns wirtschaftliche Vorteile bringen und unsere Interaktion mit einem der wichtigsten Akteure der Welt stärken. Jede Einmischung in das derzeitige Gleichgewicht der Kräfte kann jedoch bestimmte Konsequenzen nach sich ziehen."
 RAJ.23.a: "Organisiert die Vorräte."
 RAJ.23.b: "Lehnt dankend ab."
 RAJ.24.t: "Russland stimmt Lieferung zu"
 RAJ.24.d: ""
 RAJ.24.a: "Gut!"
 RAJ.25.t: "Russland verweigert Lieferungen"
 RAJ.25.d: ""
 RAJ.25.a: "Traurig."
 RAJ.26.t: "Chaos in Indien"
 RAJ.26.d: "Von den Fronten des Großen Asiatischen Krieges sickern erschreckende Berichte zurück, die einen völligen Zusammenbruch der indischen Regierung dokumentieren. Diese Behauptungen werden durch Posts in den sozialen Medien, Videos und Erklärungen mehrerer indischer Politiker untermauert. Die Chinesen haben dies zu einem großen Sieg für ihr Volk erklärt und eine Militärregierung entlang der Grenze eingesetzt. \n\nBisher haben sich die verbleibenden Mitglieder der PDTO noch nicht offiziell zu dem Verlust eines wichtigen Verbündeten geäußert. Auf einigen Videos sind jedoch Soldaten zu sehen, die als Mitglieder der PDTO identifiziert wurden und sich in Richtung Meer zurückziehen, was darauf schließen lässt, dass sie nicht die Absicht haben, Indien zu stabilisieren. Die größte Hoffnung für das Land scheint in Delhi zu liegen, wo die Regierung ausharrt, obwohl ihre Chancen, die Kontrolle über ihr Land zurückzuerlangen, gering zu sein scheinen.\n\nDelhi ist, abgesehen von der Grenze zu Pakistan und den chinesischen Streitkräften, von feindlichen Einheiten umgeben. Im Osten hat die maoistische Volksbefreiungs-Guerilla-Armee eine beträchtliche Streitmacht aufgestellt, von der einige glauben, dass sie den Bürgerkrieg gewinnen könnte. Im Süden versucht die so genannte "Akhand Bharat", einen Hindi-Ethnostaat aufzubauen. Und dann sind da noch die Überbleibsel des Militärs, Warlords und Banditenbanden, die das Land verwüsten. Alles in allem scheint es, dass Indien noch Jahrzehnte von einer Rückkehr zur Normalität entfernt sein könnte."
 RAJ.26.a: "Ein Tiger kann keinen Drachen bezwingen."

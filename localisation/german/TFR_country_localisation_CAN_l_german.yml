 canada.11.t.1: "Konservative stürzen Trudeau in Stichwahlen"
 canada.11.t.2: "Konservative siegen in Kanada"
 canada.11.d: "Die Konservative Partei Kanadas ist aus den Neuwahlen als Sieger hervorgegangen und hat damit die langjährige Ära Trudeau nach den politischen Folgen des katastrophalen Militärabzugs in Neuengland beendet. Premierminister Justin Trudeau, der die Wahlen in der Hoffnung auf ein neues Mandat einberufen hatte, erlitt stattdessen eine vernichtende Niederlage, da der Umgang seiner Regierung mit der Krise die Nation zutiefst gespalten hat. Nach der unglücklichen Militäroperation erreichte die öffentliche Unzufriedenheit mit der liberalen Regierung einen Siedepunkt, da viele Kanadier die Intervention als unnötige Verstrickung in ausländische Konflikte betrachteten. Die Wähler wandten sich der Konservativen Partei zu, die von dem populistischen Werber Pierre Poilievre angeführt wurde, der im Wahlkampf versprach, die Stabilität wiederherzustellen, Rechenschaft abzulegen und das zu beenden, was er als rücksichtslose Außenpolitik bezeichnete.\n\nDie Konservativen sicherten sich eine klare Mehrheit und beendeten damit fast ein Jahrzehnt liberaler Herrschaft. Trudeaus Sturz markiert das Ende einer Ära, die von einer fortschrittlichen Sozialpolitik und internationaler Diplomatie geprägt war, aber zunehmend von Kontroversen überschattet wurde, die von seinem Umgang mit Covid-19 bis hin zu Vorwürfen einer autoritären Herrschaft reichten."
 canada.11.a: "Gut, dass wir ihn los sind!"
 canada.12.t: "Liberale klammern sich an die Macht in Kanada"
 canada.12.d.1: "Justin Trudeau und seine Liberale Partei haben die Neuwahlen auf nationaler Ebene knapp gewonnen und sich trotz weit verbreiteter Unbeliebtheit und zunehmender Kontroversen an die Macht geklammert. Trudeaus Amtszeit, die einst als fortschrittliche Führungspersönlichkeit gefeiert wurde, ist durch wirtschaftliche Probleme, Inkompetenz und eine katastrophale Militärintervention in Neuengland getrübt worden, die sein Vermächtnis beschmutzt hat. \n\nDie Militäroperation, die zur Unterdrückung der Patriotischen Front in Neuengland eingeleitet wurde, entwickelte sich zu einem kostspieligen Sumpf, der zu kanadischen Opfern und wirtschaftlicher Belastung führte. Diese Intervention, die die regionale Sicherheit stärken sollte, wurde stattdessen zu einem Symbol für Trudeaus schwindende Glaubwürdigkeit und zog Vergleiche mit Tony Blairs Vermächtnis nach dem Irakkrieg nach sich. Viele Kanadier betrachten den Konflikt als unnötige Verstrickung, die die innenpolitischen Probleme verschärft hat. Trotz dieser Rückschläge hat Trudeau einen knappen Sieg errungen, der ein Spiegelbild einer tief gespaltenen Wählerschaft ist. Sein knapper Sieg zeugt nicht von neuem Vertrauen, sondern eher von einer zerrissenen politischen Landschaft, die den Premierminister mit einer geschwächten Regierung zurücklässt, während die Unzufriedenheit in der Öffentlichkeit und die Anfechtung seiner Führungsrolle immer größer werden. Viele fragen sich nun: Wie lange kann er sich noch halten, bevor alles zusammenbricht?"
 canada.12.d.2: "Die Liberale Partei Kanadas hat in einem erstaunlichen Comeback einen entscheidenden Sieg bei der vorgezogenen Bundestagswahl errungen - diesmal unter neuer Parteiführung. Nach dem Rücktritt von Premierminister Justin Trudeau Anfang des Monats übernahm der ehemalige Gouverneur der Bank of Canada und globale Finanzfachmann Mark Carney das Ruder. Er versprach einen sauberen Bruch mit den Kontroversen der Vergangenheit und eine ruhige Hand für die Zukunft.\n\nCarneys Kampagne traf den Nerv einer Nation, die von politischer Spaltung und internationaler Unsicherheit ermüdet ist. Sein technokratischer Hintergrund und seine ausgefeilte Kompetenz halfen den Liberalen, ihr angeschlagenes Image wieder aufzupolieren und wichtige Bevölkerungsgruppen für sich zu gewinnen, die von Trudeaus letzten Amtsjahren und dem wachsenden Zustrom von Migranten und Flüchtlingen desillusioniert waren.\n\n Mit dem wiedergewonnenen Vertrauen der Öffentlichkeit, einer überwältigenden Mehrheit im Parlament und einer günstigen Regierung in den Staaten steht Carney nun vor der Herausforderung, sein Versprechen und das Vertrauen der Menschen fest zu halten. Zum ersten Mal seit Jahren hat die politische Mitte Kanadas wieder Tritt gefasst. Ob sie sich durchsetzt, wird nur die Zeit zeigen."
 canada.12.a: "Wir bleiben standhaft!"
 canada.13.t: "Wachsender Faschismus"
 canada.13.desc: "Da sich die Stabilitätsbedingungen in der Welt unter dem Druck der Pandemie, des wirtschaftlichen Zusammenbruchs und zahlreicher anderer Krisen weiter verschlechtern, wenden sich viele Kanadier extremen Ideen zu. Inspiriert von kanadischen faschistischen Ideologen des vergangenen Jahrhunderts wie Adrien Arcand und John Ross Taylor sowie von den Wellen neuer rechtsextremer Ideen, die von unserem südlichen Nachbarn ausgehen, verzeichnen faschistische Parteien und politische Organisationen eine Rekordzahl neuer Mitglieder. \n\nQuebecer Gruppen wie Atalante und die überwiegend anglophone IDCanada haben einen Aufschwung ihrer Mobilisierungen erlebt, und auch die kanadischen Ableger amerikanischer Organisationen wie die Atomwaffen-Division und die Proud Boys verzeichneten ein rasches Wachstum. Um eine Bedrohung der nationalen Sicherheit Kanadas zu verhindern, müssen die RCMP und alle anderen Hebel der Staatssicherheit eingesetzt werden, um den Einfluss dieser Organisationen zu bekämpfen."
 canada.13.a: "Wir müssen der Tyrannei entgegentreten"

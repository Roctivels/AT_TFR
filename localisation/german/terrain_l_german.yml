 changchun: "Сhangchun"
 changchun_desc: "----\n§9Changchun, bekannt als die \"Perle jenseits der Großen Mauer\" ist eine lebendige Chronik der nördlichen Grenze Chinas. Seine Ursprünge als militärische Festung reichen bis in die Liao- und Jin-Dynastien zurück, während die eindringlichen Verse des Qing-Dichters Nalan Xingde – \"Herbstwinde trauern um bemalte Fächer an der Grenze, Sonnenuntergang vergoldet Banner auf alten Mauern\" – seine zeitlose Größe verewigen. Die komplexe moderne Geschichte der Stadt ist in Sehenswürdigkeiten wie dem Puppet Manchurian Palace und dem Eight Ministries Complex verewigt, Relikten ihrer Rolle als Pseudohauptstadt während des Krieges. Mit der Gründung von FAW wurde Changchun zur Wiege der chinesischen Automobilindustrie und ist heute mit modernsten Technologien für neue Energien und intelligente Fahrzeuge führend in der grünen Mobilitätsrevolution des Landes. Verankert durch akademische Hochburgen wie die Jilin-Universität und das ikonische Changchun Film Studio (die "Wiege des neuen chinesischen Kinos") verbindet die Stadt wissenschaftliche Tiefe mit industrieller Dynamik und verkörpert damit die Ode des Dichters Ai Qing: "Meine Augen füllen sich mit Tränen, denn meine Liebe zu diesem Land reicht bis in die Tiefen meiner Seele.""§!"
 dalian: "Dalian"
 dalian_desc: "----\n§9Wo russische Türme unter einem Baldachin aus Wolkenkratzern auf japanische Gärten treffen, entfaltet sich Dalian wie ein maritimes Sonett. Seine moderne Seele nahm im Zuge der Kolonialisierung im 19. Jahrhundert Gestalt an, doch seine Ursprünge in der Han-Dynastie hallen in den vom Wind geformten Monolithen von Jinshitan und den dramatischen Klippen von Tiger Beach nach. Der weitläufige Xinghai-Platz spiegelt seinen Anspruch als Dreh- und Angelpunkt der Belt and Road Initiative wider, während die Straßen im Sommer mit dem Puls der Fashion Week und dem goldenen Schaum der Bierfestivals zum Leben erweckt werden. Als nordostasiatischer Schifffahrtsgigant nutzt Dalian heute die Reichtümer der Tiefsee und intelligente Fertigungstechniken, um Kontinente zu verbinden. Getreu seinem Namen – "Da" (großartig) in seiner Vision, "Lian" (verbunden) in seiner Reichweite – glänzt dieses Juwel an der Küste sowohl als regionale Krone als auch als globale Bühne, wo Berge auf das Meer treffen und Geschichte mit der Zukunft tanzt.§!"
 shenyang: "Shenyang"
 shenyang_desc: "----\n§9Shenyang wurde 1625 zur Hauptstadt des Späteren Jin-Regimes und legte damit den Grundstein für den Aufstieg der Qing-Dynastie an das Machtzentrum am Nordufer des Hun-Flusses. Innerhalb der purpurroten Mauern des Kaiserpalasts von Shenyang steht die achteckige Dazheng-Halle mit ihrem doppelten Dachvorsprung noch immer wie vor Jahrhunderten. Im Laufe der Jahre, bis zum Beginn des 20. Jahrhunderts, wurden in der Stadt breitspurige russische Eisenbahnen eingerichtet und die Südmandschurische Eisenbahn von den Japanern gebaut. Bis heute hat die Zhongshan-Straße ihr hybrides Erscheinungsbild mit gotischen Fensterflügeln und floralen Verzierungen bewahrt. Die rostigen Portalkräne und Gießereibetriebe im Bezirk Tiexi zeugen von der industriellen Vergangenheit der frühen Schwerindustrie in der Volksrepublik China, während die Produktionslinien für Kampfjets bei der Shenyang Aircraft Corporation weiterhin den Verteidigungsgeist der Third Front Movement verkörpern. \nAls Stadt, in der sich dynastische Veränderungen, koloniale Spuren und der Aufstieg der Industrialisierung miteinander verflechten, sucht Shenyang beharrlich nach seiner zeitgenössischen Identität inmitten seiner reichen Geschichte.§!"
 taibei: "Taipei"
 taibei_desc: "----\n§9Taipei, die Hauptstadt Taiwans mit über 7 Millionen Einwohnern, ist vor allem für Gebiete wie das Geschäftsviertel CBD, den Planungsbezirk Xinyi, das pulsierende und geschäftige Ximending, den Verkehrsknotenpunkt Zhongzheng und den Stadtpark sowie die renommierten Universitäten des Bezirks Daan bekannt. Als Symbol für Taiwans Wirtschaftswunder und rasante Entwicklung seit den 1960er Jahren hat sich Taipei von einer flachen, primitiven Stadt zu einer pulsierenden Metropole gewandelt. Hier steht der Taipei 101, ein Wolkenkratzer, der einst das höchste Gebäude der Welt war. \nTrotz des Abrisses der alten Mauern aus der Qing-Dynastie gilt Taipeh, wie viele andere Großstädte auch, als Verteidigungsanlage gegen potenzielle Angreifer. Nicht nur können Verteidiger an verschiedenen Punkten positioniert werden, sondern das ausgedehnte U-Bahn-Netz bietet auch zusätzliche Mobilität für diejenigen, die sich am Boden befinden.§!"
 fuzhou: "Fuzhou"
 fuzhou_desc: "----\n§9Seit der Tang- und Song-Dynastie war Fuzhou ein wichtiger Knotenpunkt an der maritimen Seidenstraße und erlebte eine fragmentierte Herrschaft durch regionale Militärgouverneure und die aufeinanderfolgenden Übergänge der Song-, Yuan-, Ming- und Qing-Dynastien sowie die Selbststärkungsbewegung der späten Qing-Dynastie. Im späten 19. Jahrhundert wurde hier die Foochow Arsenal School gegründet, die die Entwicklung der modernen Marine und Schiffbauindustrie Chinas vorantrieb, obwohl sie durch den Jia-shen-Putsch kurzzeitig unterbrochen wurde. Im 20. Jahrhundert förderten Überweisungen von Auswanderern über den Min-Fluss eine unverwechselbare \"Heimat\"-Kultur und stimulierten das Wirtschaftswachstum. Zu Beginn des 21. Jahrhunderts glänzt die digitale Hafeninfrastruktur von Fuzhou nun rund um die Uhr. Die Stadt nutzt ihren Status als \"Pilotzone für digitale Wirtschaft\", um den grenzüberschreitenden E-Commerce und die moderne Logistik auszubauen, einen intelligenten Hafen und neue Industriecluster zu errichten und weiterhin als wichtiger regionaler Knotenpunkt zu fungieren.§!"
 zhengzhou: "Zhengzhou"
 zhengzhou_desc: "----\n§9Südlich von Zhengzhou in Xinzheng erzählen die Stampflehmruinen der \"alten Stadt Zhenghan\" und ihre Mauern aus der Shang-Dynastie eine Geschichte aus der Vergangenheit. Am Ende der Qing-Dynastie und zu Beginn der Republikzeit brachte die Fertigstellung der Eisenbahnlinien Longhai und Jinghan Zhengzhou an den Schnittpunkt dieser Linien und markierte damit die Geburt des modernen Zhengzhou. Die Waggons und Bahnsteige wurden Zeugen des Wandels vom landwirtschaftlichen zum industriellen Handel. Nach der Gründung der Volksrepublik etablierten sich Branchen wie Maschinenbau, Textilindustrie und Getreideverarbeitung fest in der Stadt. Seit dem späten 20. Jahrhundert hat sich Zhengzhou zu mehr als nur einem einfachen Punkt auf der Landkarte entwickelt. Der neue Stadtteil Zhengdong ist floriert, die Experimentierzone für den Luftverkehr hat Gestalt angenommen, und es sind eine umfassende Pilotzone für grenzüberschreitenden E-Commerce und eine Pilotzone für den freien Handel entstanden. Industriecluster in Bereichen wie intelligente Fertigung, Ausrüstung, Lebensmittel und Biotechnologie haben sich rasch entwickelt.§!"
 luoyang: "Luoyang"
 luoyang_desc: "----\n§9Luoyang ist eine Stadt am Zusammenfluss des Luo-Flusses und des Gelben Flusses. Als Hauptstadt von 13 Dynastien nahm sie eine wichtige Stellung in der chinesischen Geschichte ein, beginnend mit der Zhou-Dynastie und weiterführend durch die Cao-Wei- und West-Jin-Dynastien. Während der Sui-Tang-Periode wurde Luoyang zu einem wichtigen Knotenpunkt, an dem sich die Seidenstraße und der Große Kanal kreuzten. Der Klang der Glocken des Weißpferdtempels und die blühenden Pfingstrosen wurden zu Wahrzeichen der Stadt. \n\nMitte des 20. Jahrhunderts, während des ersten Fünfjahresplans, wurden wichtige strategische Projekte wie Schwerindustrie, Petrochemie und Lagerproduktion ins Leben gerufen, aus denen eine Gruppe von Unternehmen hervorging, die als \"der älteste Sohn der Republik\" bekannt wurde. \n\nZu Beginn des 21. Jahrhunderts hat sich Luoyang zu einer bedeutenden Industriestadt und einem wichtigen Reiseziel entwickelt und spielt eine zentrale Rolle in den Bereichen fortschrittliche Fertigung, neue Materialien und Luft- und Raumfahrt.§!"
 nanchang: "Nanchang"
 nanchang_desc: "----\n§9Nanchang liegt am Gan-Fluss, der in den Poyang-See mündet. Der Name steht für \"Wohlstand an der südlichen Grenze\". Die Stadt wurde geprägt vom Tengwang-Pavillon und seiner berühmten Einleitung, in der erstmals der Wind auf dem Fluss und das Abendrot in Verse gefasst wurden. Was Nanchang jedoch wirklich in die moderne Geschichte Chinas einschrieb, war das Ereignis vom 1. August 1927: Hier begann der Aufstand von Nanchang. Zhou Enlai, He Long, Ye Ting, Zhu De, Liu Bocheng und andere vereinigten politische und militärische Kräfte, um den ersten Schuss des bewaffneten Widerstands abzufeuern. Von diesem Moment an wurde der \"1. August\" zum Tag der Armee und der Titel \"Stadt der Helden\" entstand. Seitdem verkörpern eine Reihe von Sehenswürdigkeiten – der Bayi-Platz, die Gedenkhalle und der Ort des Aufstands – die militärhistorische Bildung, die Erzählung der nationalen Verteidigung und das Image der Stadt. Heute entstehen in Nanchang technologieorientierte Cluster, die dank der günstigen Lage, dem internationalen Flughafen Changbei und dem Hochgeschwindigkeitsbahnknotenpunkt eine enge Verbindung zwischen der Provinz und dem Jangtse-Delta herstellen. Im 21. Jahrhundert ist Nanchang mehr als nur eine blühende Stadt aus einem klassischen Vorwort: Es ist ein revolutionärer Ort und eine sich modernisierende Metropole zugleich, die weiterhin eine Geschichte schreibt, die einer \"Stadt der Helden\" würdig ist.§!"
 dandong: "Dandong"
 dandong_desc: "----\n§9Dandong, früher bekannt als Andong, liegt auf der Halbinsel Liaodong, eingebettet zwischen den Gewässern des Yalu-Flusses und gegenüber der koreanischen Halbinsel auf der anderen Seite des Flusses. Seit der Tang-Dynastie, als das Protektorat Andong gegründet wurde, diente die Stadt als wichtige Festung für die Dynastien der Zentralebene im Nordosten. \n\nAb der späten Qing-Zeit erlebte Dandong während des Chinesisch-Japanischen und des Russisch-Japanischen Krieges wiederholte Zerstörungen. Es war jedoch der Krieg in den 1950er Jahren, der Dandongs Platz in den Annalen der Volksrepublik China endgültig festigte. Als die Flammen des Krieges den Yalu-Fluss erreichten, wurde die Stadt zum Ausgangspunkt für die chinesischen Freiwilligen, die nach Korea überquerten, und diente als wichtige Rückzugsbasis zur Unterstützung der Frontlinien. \n\nZu Beginn des 21. Jahrhunderts hat sich Dandong zum größten Landhafen Chinas und zu einem wichtigen Knotenpunkt für den Handel mit Nordkorea entwickelt, über den der Großteil des Landhandels und der Logistik zwischen den beiden Nationen abgewickelt wird. Aufgrund seiner einzigartigen geografischen Lage ist es zu einem strategischen Dreh- und Angelpunkt für die nationale Stabilität und die Präsenz Chinas in Nordostasien geworden.§!"
 hohhot: "Hohhot"
 hohhot_desc: "----\n§9Hohhot, was \"grüne Stadt}" bedeutet, liegt südlich des Yin-Gebirges in der Tumochuan-Ebene. Seit jeher ist es ein Grenzgebiet, in dem sich nomadische und agrarische Zivilisationen begegnen. Während der Ming-Dynastie gründete Altan Khan vom Stamm der Tümed hier eine Stadt, um die herum der Dazhao-Tempel erbaut wurde, wodurch sie zum religiösen und politischen Zentrum der südlichen Mongolei wurde. Nach der Vereinigung der Region durch die Qing-Dynastie wurden die Partnerstädte Guihua und Suiyuan gegründet, die als wichtiger Knotenpunkt zwischen der nördlichen Mongolei und als wichtiger Standort für den Handel zwischen Mongolen und Han-Chinesen dienten. Tee, Pelze und Seide flossen in Hülle und Fülle durch die Stadt. \n\nIn der modernen Geschichte wurde Hohhot zum Geburtsort der revolutionären Bewegung in der Inneren Mongolei. Von den gescheiterten Autonomieplänen des Prinzen De bis zur Führungsrolle Ulanhus im Befreiungskampf war die Stadt Zeuge der Entscheidungen und der Wiedergeburt der Völker der Steppe.§!"
 jinan: "Jinan"
 jinan_desc: "----\n§9Eingebettet zwischen dem Berg Tai im Süden und dem Gelben Fluss im Norden ist Jinan eine Stadt, die von ihren Bergen und Quellen geprägt ist. Sie ist weltbekannt für ihre Quellen – die Baotu-Quelle sprudelt in drei kräftigen Strömen, die Schwarze-Tiger-Quelle rauscht Tag und Nacht, und ihr Wasser speist den Daming-See und schafft so eine malerische Kulisse. Als kulturelles Herz Shandongs ist Jinan eine der Wiegen der Longshan-Kultur und verfügt über ein tausendjähriges literarisches Erbe. Die zarten Reflexionen von Li Qingzhao und die heroische Leidenschaft von Xin Qiji verkörpern gemeinsam den Geist der Stadt – eine harmonische Mischung aus Anmut und Stärke. \n\nHeute, als Hauptstadt der Provinz Shandong, wächst der politische und wirtschaftliche Einfluss von Jinan weiter. Es ist eine wichtige Stadt im Wirtschaftsgürtel Bohai und ein zentraler Knotenpunkt für das Gelbe-Fluss-Becken. Der alte Wassergraben, der die Altstadt umgibt, wird noch immer von den vielen Quellen gespeist und nährt ein Jinan, in dem Tradition und Moderne nebeneinander existieren.§!"
 kunming: "Kunming"
 kunming_desc: "----\n§9Kunming liegt auf dem Yunnan-Guizhou-Plateau am Dianchi-See und ist auf drei Seiten von Bergen umgeben. Aufgrund seines milden Klimas und seines ewigen Frühlings trägt es den Beinamen \"Stadt des ewigen Frühlings\". Seit der Antike ist Kunming das Herzstück von Zentral-Yunnan. Während der Zeit der Streitenden Reiche war es die Hauptstadt des alten Königreichs Dian. In der Tang- und Song-Dynastie wurde es zum Sitz der Stadt Tuodong unter den Königreichen Nanzhao und Dali und etablierte sich als regionales Zentrum. Unter den Yuan-, Ming- und Qing-Dynastien war Kunming die Provinzhauptstadt von Yunnan und diente als politische und militärische Hochburg für die Herrschaft des Reiches über den Südwesten sowie als wichtiger Haltepunkt entlang der alten Tee-Pferde-Straße, wo sich Händler und Reisende versammelten. Heute ist Kunming das politische, wirtschaftliche und kulturelle Zentrum von Yunnan sowie Chinas Tor zu Südost- und Südasien. Als wichtiger Knotenpunkt der Belt and Road Initiative hat es sich von einer abgelegenen Grenzstadt zu einem regionalen internationalen Verkehrsknotenpunkt gewandelt.§!"
 zhangye: "Zhangye"
 zhangye_desc: "----\n§9Historisch bekannt als Ganzhou, leitet sich der Name Zhangye von dem Ausdruck "den Arm der Nation ausstrecken, um die westlichen Regionen zu erreichen\" ab. Seit Kaiser Wu von Han hier eine Kommandantur errichtete, liegt die Stadt im Herzen des Hexi-Korridors, der Lebensader der Seidenstraße. Im Osten verbindet es sich mit dem Lössplateau, im Westen reicht es bis nach Dunhuang, im Süden begrenzt von den schneebedeckten Gipfeln des Qilian und im Norden von der weiten Wüste. Seit Jahrtausenden hallt der Klang der Karawanenglocken durch seine Pässe, während Tempel, Festungen, Poststationen und Schreine Seite an Seite stehen – ein Kreuzungspunkt der Han- und Hu-Kulturen. \n\nHeute, während der Wind über die Danxia-Klippen fegt und Wolken über die Ebenen ziehen, besteht das Goldene Zhangye im Fluss der Zeit fort – weit, standhaft und lebendig mit dem ungebrochenen Geist der Seidenstraße.§!"
 xi_an: "Xi'an"
 xi_an_desc: "----\n§9Xi'an, historisch bekannt als Chang'an, Haojing und Xijing, ist die bedeutendste Stadt unter den acht großen alten Hauptstädten Chinas. Sie diente als Hauptstadt mächtiger Dynastien wie der Zhou, Qin, Han, Sui und Tang. Die Stadt hat Jahrtausende dynastischer Zyklen miterlebt: Kaiser Qin Shi Huang strebte nach Unsterblichkeit, und Kaiser Wu von Han sinnierte über den Himmel. Von seinen Toren aus eröffnete der Gesandte und Entdecker Zhang Qian Routen entlang der frühen Seidenstraße, und der Mönch Xuanzang begann seine epische Pilgerreise nach Indien. Kurz gesagt, Xi'an ist eine lebendige Chronik der chinesischen Zivilisation, die die Reise der Nation seit der Bronzezeit dokumentiert. \n\nDie Geschichte endet jedoch nicht in der Vergangenheit. Heute ist Xi'an ein wichtiger Knotenpunkt des modernen China. Hier befindet sich die Xi'an Aircraft Industrial Corporation (XAC), ein wichtiges Unternehmen für die Konstruktion und Herstellung von Militärflugzeugen, das zur Aviation Industry Corporation of China (AVIC) gehört. Zusammen mit Chengdu Aircraft (CAC) und Shenyang Aircraft (SAC) – zusammen bekannt als die \"Drei Flieger\" – bilden diese Unternehmen die stählernen Flügel der chinesischen Luftwaffe. \n\nAls alter Ausgangspunkt der Seidenstraße ist Xi'an auch ein wichtiger Knotenpunkt des modernen globalen Austauschs. Es ist ein zentraler Ankerpunkt der Belt and Road Initiative (BRI), die die Verbindungen zwischen dem Osten und der übrigen Welt neu knüpft. Xi'an blickt aus der Höhe seiner Geschichte in die Zukunft und verwandelt sein umfangreiches Erbe in eine neue Ära der Verantwortung.§!"
 xiong_an: "Xiong'an"
 xiong_an_desc: "----\n§9Vor mehr als siebentausend Jahren bildete die Region Xiong'an eine der frühesten Grundlagen der chinesischen Zivilisation. Dieses Erbe ist in zahlreichen alten Siedlungen zu finden; die Stätte Nanyang des Staates Yan zeugt von ihrer langen Geschichte. Historisch gesehen war \"Xiong'an\" kein eigenständiges Verwaltungskonzept, da das Gebiet auf kleinere Landkreise aufgeteilt oder in größere Präfekturen eingegliedert war. Ein Vorgänger, der Kreis Xiong, lag an einer strategischen Kreuzung, die von Herrschern und Anwärtern aller Zeiten begehrt war, und wurde zum Schauplatz von Rivalitäten und Konflikten. \n\nIm Jahr 2017 traf das Zentralkomitee der Kommunistischen Partei Chinas unter der Führung von Xi Jinping die strategische Entscheidung, die staatliche Sonderwirtschaftszone Xiong'an in Hebei zu errichten. Im Jahr 2019 begannen offiziell die Landenteignungen und Umsiedlungen; bis zum Jahresende wurde innerhalb der neuen Zone ein Teil der China Pilot Free Trade Zone eingerichtet – eine Sonderwirtschaftszone, die die Mission der Sonderwirtschaftszone Shenzhen und der neuen Zone Pudong in Shanghai fortsetzt. Aufbauend auf seiner bedeutenden Vergangenheit und seinen tiefen zivilisatorischen Wurzeln hat Xiong'an ein neues Kapitel in der nationalen Strategie Chinas aufgeschlagen.§!"
 qingdao: "Qingdao"
 qingdao_desc: "----\n§9Die Besiedlung des Gebiets von Qingdao reicht bis in die Jungsteinzeit zurück. Das Gebiet erlebte unter verschiedenen Regimes und Dynastien wiederholte Veränderungen, aber Qingdao zeichnete sich erst in der Neuzeit durch seine einzigartige strategische und handelspolitische Lage aus. Im Jahr 1891 befestigte die Qing-Regierung Jiao'ao (Jiaozhou). Nach dem Juye-Zwischenfall im Jahr 1897 errichtete das Deutsche Reich das Pachtgebiet Kiautschou-Bucht mit Tsingtau (Qingdao) als Zentrum, um eine \"Modellkolonie\" zu schaffen. Dieses Bestreben, eine strategische Festung in Ostasien zu errichten, führte zum Bau eines modernen Hafens und der Eisenbahnstrecke Qingdao–Jinan, die den Grundstein für die frühe Stadtstruktur legten. \n\nNach den Turbulenzen des 20. Jahrhunderts hat sich Qingdao zu einer modernen Küstenmetropole entwickelt, die historischen Charakter mit zeitgenössischer Dynamik verbindet. Heute ist sie ein renommiertes Reiseziel und einer der wichtigsten Handelsplätze Chinas.§!"
 xiamen: "Xiamen"
 xiamen_desc: "----\n§9Xiamen wurde in der Ming-Dynastie gegründet und diente ursprünglich sowohl als Seehandelshafen als auch als Verteidigungsbollwerk gegen die Qing. An der Spitze aufeinanderfolgender Epochen fungierte es als Brückenkopf des Fuzhou-Xiamen-Korridors und als Mikrokosmos der chinesischen Zivilisation in Übersee. Die Stadt erlebte die Schwierigkeiten der Öffnung für den Außenhandel in der späten Qing-Dynastie und später den raschen Aufstieg ihrer Sonderwirtschaftszone. Seit 1980 hat Xiamen erhebliche ausländische Investitionen angezogen, was zu einem raschen Wachstum seiner Hafenanlagen und Hightech-Industrien geführt hat. In den letzten Jahren haben die beiden Motoren Jimei New Town und Torch High-Tech Zone eine robuste Entwicklung in den Bereichen neue Energien, Meerestechnologie und Kultur- und Kreativwirtschaft vorangetrieben. Pilotinitiativen im grenzüberschreitenden Finanzwesen und die Two-Sides Integration Experimental Zone haben die regionale Integration weiter vorangetrieben.§!"
 gaoxiong: "Kaohsiung"
 gaoxiong_desc: "----\n§9Die Hafenstadt Kaohsiung liegt stolz im Süden Taiwans zwischen den Grenzen des Gaoping-Flusses und des Erren-Flusses. Kaohsiung gilt seit langem als das Zentrum der petrochemischen und Schwerindustrie Taiwans und beherbergt mehrere riesige Industrieparks, die sowohl den heimischen Verbrauch als auch den internationalen Export bedienen. Als Lokomotive der frühesten Industrialisierungswelle Taiwans hat Kaohsiung eine einzigartige Geschichte und Kultur. Die Mauern der Qing-Befestigungsanlagen stehen noch heute, während die Stadtplanung der japanischen Kolonialregierung einen bleibenden Einfluss auf die spätere Entwicklung der Metropole hatte. Nach dem Kaohsiung-Zwischenfall, der viele Menschen dazu inspirierte, sich an öffentlichen Angelegenheiten zu beteiligen, wurde Kaohsiung für viele jedoch vor allem als "Geburtsort der taiwanesischen Demokratie" bekannt. \n\nTäglich reisen unzählige Touristen in diese Stadt, einige wegen ihrer architektonischen Sehenswürdigkeiten, aber die meisten, um einen Einblick in die jahrhundertelange Entwicklungsgeschichte Taiwans zu erhalten.§!"
 tainan: "Tainan"
 tainan_desc: "----\n§9Tainan, das gemeinhin als die erste Stadt Taiwans angesehen wird, blickt auf eine mehr als vierhundertjährige Entwicklungsgeschichte zurück und war vor der japanischen Kolonialherrschaft die Verwaltungshauptstadt Taiwans. Während seine politische und wirtschaftliche Bedeutung im Laufe der Jahre abnahm, blieb sein Status als kulturelles Zentrum bestehen. Als Sitz der National Cheng Kung University und der südlichen Zweigstellen der National Central Library, der Academia Sinica und zahlreicher anderer renommierter Institutionen wird Tainan auch Jahrhunderte nach der Gründung des Konfuzius-Tempels von Tainan seinem Ruf als akademische Hauptstadt Südtaiwans gerecht. Neben den akademischen Einrichtungen stehen in Tainan noch unzählige historische Gebäude, die von ihrer Vergangenheit erzählen. Dazu gehören das Fort Zeelandia, das ehemalige Verwaltungszentrum sowohl der Niederländischen Ostindien-Kompanie als auch des südlichen Ming-Regimes in Taiwan, das Fort Provintia, eine historische niederländische Festung, und das Tait & Co. Merchant House, in dem früher britische Kaufleute untergebracht waren. Heute ist Tainan eine Stadt, in der Vergangenheit und Zukunft aufeinandertreffen: Von kolonialen Festungen bis zum Southern Taiwan Science Park, von volkstümlichen Aktivitäten bis zu Museen in westlicher Architektur – Tainan strebt nach Modernisierung und bewahrt gleichzeitig seine unverwechselbare Identität.§!"

 brussels_desc: "----\n§9Wenn die Befreiung der europäischen Völker nicht mit ihrer Vereinigung einhergeht, werden die europäischen Staaten in Kürze von den wachsenden Weltmächten verschlungen werden ... Europa, das sein Selbstvertrauen fast verloren hat, erwartet Hilfe von außen. Einige erwarten sie von Russland, andere von Amerika. Beide Bestrebungen sind für Europa lebensbedrohlich. Weder der Westen noch der Osten wollen Europa retten, Russland will es erobern, Amerika will es kaufen.§!"

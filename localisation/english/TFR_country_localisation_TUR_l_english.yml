 #Events
 turkey.2.t: "The [TUR.GetName] Leaves NATO"
 turkey.2.d: "Following a bitterly contested election - one narrowly secured by President Erdogan - allegations of foreign interference have taken center stage.Standing before a sea of AKP supporters draped in red and white, Erdogan delivered a scathing rebuke of the North Atlantic Treaty Organization, accusing several member states - specifically [GER.GetNameDef] - of \"undermining Turkish sovereignty\" and attempting to sway the vote in favor of the opposition.\n\n\"They tried to decide for our people. They failed,\" he thundered.\n\nIn his fiery address, Erdogan declared NATO a \"defunct and de-facto dead organization,\" citing the absence of American leadership as the final nail in its coffin. \"We no longer serve a purpose in an alliance that cannot protect its own unity,\" he proclaimed, to thunderous applause. He then pledged to begin the formal proceedings to withdraw [TUR.GetNameDef] from NATO, sending shockwaves across Europe and the broader international community.\n\nWith this dramatic turn, Turkey - once a cornerstone of NATO's southern flank - now sets out on a new path, one that is defined by Erdogan's rising sovereignism and regional ambition. What follows may well reshape the balance of power across the Eastern Mediterranean and beyond, at a time when tensions between Europe and Russia grow ever more volatile."
 turkey.2.a: "Is he serious?"
 turkey.3.t: "Erdogan Re-elected in Turkey"
 turkey.3.d: "Damn it, he found out we were trying to sack him and now he's leaving NATO!"
 turkey.3.a: "Scheiße!"
 turkey.4.t: "Kemal Kilicdaroglu Elected in Turkey"
 turkey.4.d: "Thankfully, our very democratic incursion into Turkish internal affairs has paid off! Waiting for the Kemalist subideology."
 turkey.4.a: "No country is free unless it is democratic."
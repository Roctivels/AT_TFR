 european_union.12.t: "Greek Coup"
 european_union.12.d: "With our reemerging place amongst the great powers of Europe, we have secured a monumental victory in our quest to expand European ideals. Having already been weakened by years of economic mismanagement, Greece was practically teetering on the brink of complete collapse. The spark was finally lit after a far-right government failed to cement control, leading to mass uprisings nationwide. With our position secured, we are now able to establish a foothold in the Balkans. The coup was swift, with minimal bloodshed from radical elements in the countryside.\n\nNow, under our protection, Greece will be remolded into something better. They shall become a testing ground. Where we can implement ideas planned for the rest of the Balkans. In addition, it will also serve as a springboard for us to envelop former Yugoslav nations. Many hawkish leaders have been very pleased by our successes in Greece. Especially Gunther Fehlinger, who was quoted saying, 'The Serbians will surrender. Or they will once again fear the sight of bombers in the sky'. There is still much more to do to spread the Pan-European idea. But we can rest easy knowing we are one step closer to finally turning our dreams into a reality."
 european_union.12.a: "#EndBalkanNeutrality NOW"
 european_union.13.t: "Naval Commands Reintegrated"
 european_union.13.d: "Now that the situation has been stabilized, our Atlantic, Pacific and European naval commands have returned and are ready to serve."
 european_union.13.a: "We are back in control."
 european_union.14.t: "Redefining European"
 european_union.14.d: "Now I KNOW slavs are not really human and definitely not European, but their largest cities are definitely a lot more liberal than the rest and some of them are ready to serve the European race, so maybe we should consider them??? We'll deal with the rest later."
 european_union.14.a: "The time has come to say fair's fair..."

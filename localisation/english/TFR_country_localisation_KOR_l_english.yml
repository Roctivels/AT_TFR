 #Focuses
 KOR_flying_to_the_moon: "Flying To The Moon"
 KOR_flying_to_the_moon_desc: "Personally, I associate myself with the Moon. Dark and mysterious."
 KOR_my_brother_kim_jong_un: "My BROTHER Kim Jong-Un"
 KOR_my_brother_kim_jong_un_desc: "I am writing a letter to my DEAR BROTHER Kim Jong-Un. We will see if he agrees to help with reunificating Korea."
 KOR_defend_our_country: "Protect OUR COUNTRY!!!"
 KOR_defend_our_country_desc: "PROTECT OUR COUNTRY AT ALL COSTS!!! NORTH KOREANS BETRAYED US AND OUR HARD WORK!!! FIGHT TO THE DEATH AND NOT ONE STEP BACK!!!"
 KOR_just_buy_the_oil: "Just Buy The Oil???"
 KOR_just_buy_the_oil_desc: "Uuuugh, Guys. I mean, why do you care about Oil Crisis? Just buy the oil."
 KOR_juche_in_my_mind: "Juche In My Mind..."
 KOR_juche_in_my_mind_desc: "No matter how hard I try ideas of Juche can't escape my mind. Maybe, we can integrate some parts of it in our South Korean Lives?"
 KOR_second_attempt: "Second Attempt"
 KOR_second_attempt_desc: "I tried so hard, and got so far... But in the end, does it even matter?"
 KOR_eternal_brotherhood: "Eternal Brotherhood!!!"
 KOR_eternal_brotherhood_desc: "PROTECT OUR BROTHERS AT ALL COSTS!!! NORTH KOREANS ARE OUR BROTHERS!!! FIGHT FOR THEM AND PROTECT THEM FROM THE EVIL!!!"
 KOR_cultural_exchange: "Cultural Exchange"
 KOR_cultural_exchange_desc: "Now that our relations are changing for the best, we can start a cultural exchange program for our citizens. Maybe we will understand each other's values more!"
 KOR_shining_example_of_great_economy: "Shining Example Of Healthy Economy"
 KOR_shining_example_of_great_economy_desc: "Our economy is great. Awesome even! Ever heard of the Miracle on the Han River? That's us! Tiger of Asia. THE MOST POWERFUL PRODUCERS IN THE WORLD. KOREAN SCIENCE IS THE BEST IN THE WORLD!\n\nThis message was sponsored by Samsung Electronics and John Lee-Samsung himself."
 KOR_economy_in_ruins: "Economy In Ruins"
 KOR_economy_in_ruins_desc: "Uuuugh. Maybe we have some problems in the economy after all. But we can always fix that!!! It will be easy, I swear... Just sell more toasters."
 KOR_mass_oil_production: "Mass Oil Production"
 KOR_mass_oil_production_desc: "Why buy the oil? Glorious Kim Il Sung taught us the basics of Autarky. We will just produce the oil ourselves!!!"
 KOR_print_the_money: "Print The Money"
 KOR_print_the_money_desc: "Guys, I have found a new lifehack! We will just... Print le money!!! Nothing bad will happen, I swear!"
 KOR_five_billion_won_to_taiwan: "Five Billion Won To Taiwan!!!"
 KOR_five_billion_won_to_taiwan_desc: "Taiwan, this beautiful Chinese province must be protected at all costs!!! In our attempt to improve relations with the People's Republic of China, we will invest in one of their most successful regions!"
 KOR_reconcile_with_japan: "Reconcile With Japan"
 KOR_reconcile_with_japan_desc: "You know, maybe Japanese aren't THAT bad. We could finally forget our old grudges and move to the bright future! Together!!! Sounds cool..."
 KOR_boycott_japan: "Boycott Japan"
 KOR_boycott_japan_desc: "Our dear Japanese partners dare to betray us again.\nEnough! We Boycott Japan and their companies. No more japanese food, no more kimonos, no more karate, no more anime and no more Hondas!"
 KOR_japanese_jjokbari: "Japanese Jjokbari"
 KOR_japanese_jjokbari_desc: "Nice shoes, by the way. They look cool."
 KOR_taking_a_small_loan: "Taking A Small Loan"
 KOR_taking_a_small_loan_desc: "Guys. It's just a small loan, I swear! We can always repay it later. Just like Japan!"
 KOR_investments_i_cant_believe_it: "Investments??? I Can't Believe It!!!"
 KOR_investments_i_cant_believe_it_desc: "OH MY! INVESTMENTS??? IN KOREA??? FROM JAPAN??? WE ALWAYS KNEW THAT YOU ARE OUR ETERNAL CLOSEST FRIENDS, YES PLEASE!!!!!!!!!!"
 KOR_build_the_japanese_highfleet: "Build The Japanese Highfleet"
 KOR_build_the_japanese_highfleet_desc: "We need to repay the investments our friends have given us. A small amount of ships is a small price to pay for wagons of crispy yens."
 KOR_did_we_forget_someone: "Did We Forget Someone???"
 KOR_did_we_forget_someone_desc: "Every time you sign contracts with big Japanese firms you need to ask yourself: "Did I forget to ask someone's permission?""
 KOR_mooning_as_usual: "Mooning As Usual..."
 KOR_mooning_as_usual_desc: "Mooning on da street, yo. We are ze coolest country in da world. I am sure that everything will go according to our magnificent plan!!!!"
 
 KOR_chaebols_in_control: "Chaebols In Control"
 KOR_chaebols_in_control_desc: "CHAEBOLS HAVE TAKEN POWER OVER OUR COUNTRY. IT'S JUST LIKE IN MY FAVOURITE BOOK "SELECTED WORKS OF KIM IL SUNG"!!!"
 KOR_korean_agony: "Korean Agony"
 KOR_korean_agony_desc: "Just like night and day South and North Korea have fought with each other for what seems like an eternity. It's time to stop this foolish infighting. Our wise leader has a plan to buy North Korea and reunite our country."
 KOR_seize_the_property: "Seize The Property"
 KOR_seize_the_property_desc: "We are the government now, right?\nCan we just... Take everything for ourselves???"
 KOR_contacts_in_yakuza: "Contacts In Yakuza"
 KOR_contacts_in_yakuza_desc: "As part of improving Korea-Japan interstate relations, our partners left us the number of their top Yakuza agents. Thanks to them, we can easily establish our own mafia order on the streets of our country."
 KOR_thats_how_mafia_works: "That's How Mafia Works"
 KOR_thats_how_mafia_works_desc: "To make it easier for us to manage our own domains, we will divide the territories of Korea among the four largest Chaebol. This will allow our country's efficiency to rise to heights never seen before.\nI think this is a logical step. It is only recently that two Koreas have become one, and we have become bored.\n\nNOW THERE WILL BE FOUR KOREAS!"
 KOR_cyberpunk_paradise: "Cyberpunk Paradise"
 KOR_cyberpunk_paradise_desc: "- Will you build a new prosperous and glorious Korea?\n- Yes, Of Course!\n*Builds Mafia State Like A Boss*"
 KOR_open_the_lobotomy_corp: "Open The Lobotomy Corp"
 KOR_open_the_lobotomy_corp_desc: "Our Chaebols have brought only prosperity and civilization to every single bit of our land. It's time to fund promising startups that will help us in propelling innovations in the future!"
 KOR_galaxy_of_phones: "Galaxy Of Phones"
 KOR_galaxy_of_phones_desc: "Toaster, Washing Machine, Smartphone, Microwave, TV. Everything you own was produced by US. Everything you have has logo of Korean Chaebols on it. Why would the world change anything? To reach greater heights, people just have to consume more!\n\nAnd by the way. Our phones never exploded as opposed to the phones of our neighbors."
 KOR_healthcare_subscription_trial: "Healthcare Subscription Trial"
 KOR_healthcare_subscription_trial_desc: "The kind and generous rulers of Korea are willing to make concessions to the great Korean people! We are changing the health care system and giving every Korean a chance to test these changes! Free of charge! For a month! The best hospitals and medicines for everyone are already in your Samsung+ subscription!"
 KOR_unleashing_the_ego: "Unleashing The Ego"
 KOR_unleashing_the_ego_desc: "Something tells us that our military might will not be able to match that of our neighbors. What's the solution? Stop trying to outdo them in something where they have an advantage.\nWE WILL CREATE NEW WARFIGHTING CAPABILITIES! Our program of creating weapons never seen before and equipping the most gifted warriors with them will soon bear the first fruits, and will allow us to steal victory from the hands of our enemies."
 KOR_apr_building_la_mancha_land: "Building La ManchaLand"
 KOR_apr_building_la_mancha_land_desc: "It's time for ordinary citizens to take a break from worries and worries. We all need to dream! And in new entertainment complexes all over Korea, we will help people relax and start enjoying life!"
 KOR_referal_family_program: "Referal Family Program"
 KOR_referal_family_program_desc: "Are you asking me how to solve the fertility problem? Simple. We're launching a new referral program. From every person invited and hired by Chaebol businesses, you will receive 10% of their paycheck!\nDo you have a wife? Perhaps you have several children? You can get a huge referral income from their work! The earlier, and the more, the better your reward!"
 KOR_is_that_the_red_gaze: "IS THAT THE RED GAZE?"
 KOR_is_that_the_red_gaze_desc: "Is that the Red Gaze?\n\nWait, I don't even know who it is.\nAnyway...\n\nIS THAT THE RED GAZE??????"
 KOR_korea_must_survive: "Korea Must Survive"
 KOR_korea_must_survive_desc: ""We roamed the still, cold world. No horizon in sight. The rulers of old, stripped of pride and glory. It feels as yesterday we were turning the wheels of progress, until the crisis stopped it all. Suddenly. Without a warning. When tides had changed, they changed for all of us, no matter wealth or class. We've lost our world to oil, and with it, our last traces of humanity. We bid farewell to plenty, and for those who remained came the time to adapt. We decided to leave our homes and head north. We roamed for weeks, maybe months, leaving behind all the things we once believed had made us. It was hope that pushed us forward. Slowly. Step by step. We knew the cost of our journey, and we've paid the price - a hundred times. Finally, the time has come, to build the last city on Earth.""
 KOR_import_japanese_fumos: "Import Japanese Fumos"
 KOR_import_japanese_fumos_desc: "New Government initiative! You will get your Sancho Fumo plushie with 50% discount if you pre-order RIGHT NOW! Glory to Korea-Japan Friendship!\nCooooooooooooooooooool."
 KOR_hike_prices_of_dishwashers: "Hike Prices Of Dishwashers"
 KOR_hike_prices_of_dishwashers_desc: "Our Economic"
 KOR_infinite_wealth: "Infinite Wealth"
 KOR_infinite_wealth_desc: "Our economic reforms of: "producing more and raising prices" - have yielded excellent results. Now, it seems as if we have cheats for... Infinite wealth."
 KOR_honuda_accordu_production: "HONUDA ACCORDU Production"
 KOR_honuda_accordu_production_desc: "HONDA ACCORD! HONDA ACCORD! HONDA ACCORD! HONDA ACCORD! HONDA ACCORD! HONDA ACCORD! HONDA ACCORD! HONDA ACCORD!"
 KOR_eater_of_gods: "Eater Of Gods"
 KOR_eater_of_gods_desc: "Allowing China to take over our skies would be a total CALAMITY! We will take all possible measures to set our secret program in motion as soon as possible. Our "Devourer of the Gods".\n\nAnd remember, even if our universe collapses... A GOD DOES NOT FEAR DEATH!"
 KOR_call_the_red_mist: "Into Red Mist"
 KOR_call_the_red_mist_desc: "Let it be known... All our enemies... Shall be turned into a fine red mist!"
 KOR_galaxy_armour: "Galaxy Armour"
 KOR_galaxy_armour_desc: "Turns out our phones are perfect for saving our customers' lives!\nNo, we obviously didn't get this information as a result of the increased activity of Mafia shootings on the street.\n\nAnyway, we'll create multi-functional modern hi-tech exoskeletons out of our Samsung phones, and insert the phone into the phone so you can look at the phone while you look at your phone!"
 KOR_samsung_armada: "Samsung Armada"
 KOR_samsung_armada_desc: "Our Samsuntanks are ready for battle! All modern technologies, from exoskeletons to weapons that bring human EGO to life are at our disposal... WE WILL WIN.\nLET THE ENEMY HEAR THE RUMBLING OF SAMSUNG. LET IT BE THE LAST THING HE HEARS!"
 KOR_mass_distortion: "Mass Distortion"
 KOR_mass_distortion_desc: "Do you have problems? Feel the sins crawling on your back? Are you worried?\n\nDISTORT.\n\n\nThis is not an individualized treatment recommendation\n\n\"
 KOR_gwanlija_nari: "GWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!!"
 KOR_gwanlija_nari_desc: "GWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!"
 
 #Events
 korea_aprilfools25.1.t: "Mooning: The Happening"
 korea_aprilfools25.1.d: "I really like being a president of my beloved Korea. Our economy is growing and I am certain that nothing can go wrong!"
 korea_aprilfools25.1.a: "Cheboru Bitiesu"
 korea_aprilfools25.2.t: "Juche, juche in my mind..."
 korea_aprilfools25.2.d: "Pack my nine millimeter 'cause I ain't finna go out\nLike a busta ass juche and just lay down\nI'ma run up on a juche, shoot my nine with the fifteen rounds\nGot Lil Kim on cloud nine\nJuche, juche in my mind."
 korea_aprilfools25.2.a: "Juche, juche in my mind..."
 korea_aprilfools25.3.t: "Second Time is the Charm"
 korea_aprilfools25.3.d: "After much thinking and talking, Kim Jong-un apologized to the people of South Korea and agreed to begin new peace talks. This seems to be the beginning of a great new friendship."
 korea_aprilfools25.3.a: "Here We Go."
 korea_aprilfools25.4.t: "The Time Has Come"
 korea_aprilfools25.4.d: "- Kim, maybe we should stop this once and for all? Maybe, we should just unite? All of us are Koreans, after all.\n- I truly think so, my Brother Moon. I fully agree. There is nothing that can stop us together. The only thing that can stop this reunion is the shortage money..."
 korea_aprilfools25.4.a: "You Are Right, Kim. We shall think about that."
 korea_aprilfools25.5.t: "The True Winner"
 korea_aprilfools25.5.d: "- HOW? How do you play better than us? We played League for decades since our youth! It is simply impossible for a person who sees computer for the first time in their life to be THAT good!\n- For the first time in my life? Bro, you do realise that we have computers, right? I literally have one at home, it has Juchentium Core 9, Juchvidia 9090 RTX, 128 JuchRam and all that. Your weak computers really do not impress me. Just like your skill in games.\n- WHAT? PC? You have that in North Korea?\n- Of course we do, dummies, we just pretend that we don't. Or else you will just start migrating en masse to a real civilization. We're not ready to take in that many refugees."
 korea_aprilfools25.5.a: "What..."
 korea_aprilfools25.6.t: "Everything Is Great!"
 korea_aprilfools25.6.d: "Hello, we are reporters from Moon TV, can you please tell us your impression of the Korean economy? Are you living in prosperity? Can you afford to buy what you want?\nIf you wished, would you go on a vacation abroad?"
 korea_aprilfools25.6.a: "Nah, I'd Work."
 korea_aprilfools25.7.t: "Our Economy... Is le dead???"
 korea_aprilfools25.7.d: "0 Days Remaining, Samsungbros... It's over. In thirty years Samsung will be dead..."
 korea_aprilfools25.7.a: "JENJAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAANG!"
 korea_aprilfools25.8.t: "Let's try!"
 korea_aprilfools25.8.d: "Dear Japanese! The President of South Korea is writing to you. We are aware of all the problems between us, and we would like to extend to you a branch of peace and kindness! Let's start over and create a new and beautiful world!!!\n-------------------------------------\nDear Koreans! I, the CEO OF JAPAN, hate and despise you all! Very soon I will come on my aircraft carrier Misato and bomb you all! Your stupid music that reaches our shores across the sea, your stupid games that corrode the brains of our samurai, and your boring phones that cost too much, AND YOUR STUPIDO CARSU!!!! It will all be destroyed! Goodbye! HAHAHA. TOYOTA WILL RULE ZA WORULDO!"
 korea_aprilfools25.8.a: "Let's try... The worst they could say is no..."
 korea_aprilfools25.9.t: "Why, Mister Moon? WHY?"
 korea_aprilfools25.9.d: "Mister Moon, why didn't you didn't warn us about the new deal? We, uh... WE'RE GOING TO BE BANKRUPT!\nJust yesterday I spent a billion won on the best lawyers in Korea, and we realized that your foolish actions allowed the Japanese to trick you! WE WOULD GET AN ADDITIONL MILLION WON ON THIS CONTRACT, IF YOU CONSULTED US, DO YOU UNDERSTAND?"
 korea_aprilfools25.9.a: "I can't stand this anymore... I will build my own Korea..."
 korea_aprilfools25.10.t: "Speaking From My Heart..."
 korea_aprilfools25.10.d: "MY DEAR BROTHER Kim Jong-un, I, Moon Jae-in am writing this letter to you with the hope of understanding and deeply reconsidering our relationship. Reconciliation of the great Korean people is simply necessary in the face of such a clear danger surrounding us. I invite you to meet and discuss the details in person.\nWith Love, Moon.\n----------------------------------\nNo, lol, get retkt nub."
 korea_aprilfools25.10.a: "Damn..."
 korea_aprilfools25.11.t: "Mooning Requiemo"
 korea_aprilfools25.11.d: "Thank YOU for playing this Totally Accurate South Korean Content Demo.\nTo be honest, it's a joke, but it isn't. Or is it? Is it not?\nLove You All.\n\nThe Second Han Miracle will surely come to Korea!"
 korea_aprilfools25.11.a: "Thank youuuuuu! Gamsaaaaaaa!!!!!!!"
 korea_aprilfools25.12.t: "WHERE IS THE MONEY, MOON???"
 korea_aprilfools25.12.d: "- MOON, WHERE'S THE MONEY? WE'VE BEEN THROUGH A HUGE CRISIS AND WE NEED THE MONEY!\n\n- Why should I give you Korean money? Live on your own.\n\n- MOON, SAMSUNG IS 50% OF KOREA'S GDP. IT'S MY MONEY, YOU KNOW?\n\n- Well. If you want to control Korea's money. WHY DON'T YOU RUN THE COUNTRY FOR ME? А?\n\n- NO PROBLEM. I'LL SOLVE ALL OF KOREA'S PROBLEMS IN A YEAR!\n\n- IS THAT SO? WELL, LET'S SEE, GIVE IT A TRY, I'M WAITING."
 korea_aprilfools25.12.a: "The Mafia Rises"
 korea_aprilfools25.13.t: "Chaebol Paradise"
 korea_aprilfools25.13.d: "- MISTER JOHN LEE-SAMSUNG. OUR COUNTRY IS FALLING APART. WE NEED TO DO SOMETHING. PLEASE. TELL US WHAT WE SHOULD DO NOW!\n\n- Please, be patient, my friend. I already have the plan.\n\n- AND WHAT IS THE PLAN, MISTER SAMSUNG?"
 korea_aprilfools25.13.a: "We need to call a Company... Limbus Company..."
 korea_aprilfools25.14.t: "Is That..."
 korea_aprilfools25.14.d: "No, it can't be! It's Don Quixote from the hit Korean game "Project Moon"???? Kuuuuuuuuuuuuuuuuuuuuuuuul."
 korea_aprilfools25.14.a: "Do not fret, Manager Esquire. For you are blessed."
 korea_aprilfools25.15.t: "Hello, Hello???"
 korea_aprilfools25.15.d: "Hello, is that Kim? This is John Lee Samsung calling, I'd like to make you a little deal. I want to buy North K...\n\nI'm in.\n\nWhat?\n\nI'm saying that I'm in.\n\nJust like that?\n\nHonestly, I'm sick of living like this myself. I've told Moon hundreds of times that all he has to do is offer some money, that's all! It's a pity he never understood.\nI'm waiting for the money transfer to my Samsung Bank Card, and in the meantime, I'll prepare a place for Samsung's new office in Pyongyang."
 korea_aprilfools25.15.a: "Wow. Glory To Juche???"
 korea_aprilfools25.16.t: "Fear The Future. Unleash Your EGO."
 korea_aprilfools25.16.d: "So for how long do I have to do this? I've been shooting this rifle for 10 hours straight now and it hasn't changed at all. What's it supposed to do, fire intercontinental lasers? Your methodology is bullshit.\n\nAll right, let's try another method. Are you sure you switched the rifle from automatic to single-shot?\n\nI don't remember. Let me see...\n*(Gunshot)*\n\n-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA\n\n\n-------------------------------------------\nSinner hits the city of Busan, Samsung Republic, from off the coast for 12 seconds.\nImmediately upon appearance: Ability Activation\nAbility to fire multiple beams of light that shoot through any obstacle is confirmed.\n\nSecond trumpet is activated\n\nWaiting for the scenario reload."
 korea_aprilfools25.16.a: "Sam, please turn up the 1 hour of Ricardo electronic music non stop."
 korea_aprilfools25.17.t: "Four Koreas is better than Two?"
 korea_aprilfools25.17.d: "Anyway, guys, your ideas are real bullshit. I say we just divide Korea into four parts, like a pie.\n\nYeah, man, what if my capitalization is bigger than yours?\n\nSo what?Capitalization isn't important if you haven't developed technology since 1997.\n\nSHH! I got an idea, guys. I, John Lee Samsung, propose... That we divide Korea into many districts. And distribute them evenly in terms of value.\n\nWait a minute, John. Isn't that the same structure as before? Regions, cities, everything will remain as it was...\n\nNo, you don't understand, it's different. It's... Districts."
 korea_aprilfools25.17.a: "And This Is A Total Mafia Victory."
 korea_aprilfools25.18.t: "Call From The President"
 korea_aprilfools25.18.d: "HELLO, THIS IS THE PRESIDENT OF JAPAN. YOU HAVE REQUESTED HELP AND HERE YOU HAVE IT. SADLY, OUR BEST HONDA AGENT KIRYU DAMEDAME IS BUSY RIGHT NOW. I GIVE YOU THE PHONE NUMBER OF GORO MAJIMA, OUR SECOND BEST CAR DEALER.\nNO, HE WON'T KILL YOU, WHY DO YOU ASK? NO, HE IS COMPLETELY SANE. THE SANEST JAPANESE MAN TO EVER STEP ON YOUR SAMSUNG LAND.\nI NEED TO CONTINUE MY WORK ON THE TIME MACHINE NOW, BYE!\nHang in there, brothersu..."
 korea_aprilfools25.18.a: "Thank You Very Much, President Of Japan."
 korea_aprilfools25.19.t: "Did you CyberKnow???"
 korea_aprilfools25.19.d: "DID YOU KNOW THAT KOREA IS ACTUALLY CYBERPUNK? IT HAS CYBER PEOPLE AND CYBER MACHINES AND CYBER AIR WITH CYBER CORPORATIONS. WE'RE SO CYBERPUNK. COOOOOOOOOOOOOL.\n\nI pour my cyber tea into a cyber glass and drink my cybertea to enjoy my cyber evening. How good is cyber life in my cyberpunk cyberkorean cybercountry of CyberSamsung!"
 korea_aprilfools25.19.a: "CyberWoooooooow."
 korea_aprilfools25.20.t: "Lobotomy... What???"
 korea_aprilfools25.20.d: "What are you saying?\nYou are going to solve our power problems? You will solve unemployment? Your company hasn't received a single complaint? Is your guarantee of being here - 10,000 years?\nFine, beautiful young woman that I am seeing for the first time in my life, of course we will give you a license and investment to build your corporation with a cool name!\nNo strings attached. And no inspections! This is how we do business in our great country of Samsung."
 korea_aprilfools25.20.a: "Okay."
 korea_aprilfools25.21.t: "DEAR PRESIDENT OF JAPAN"
 korea_aprilfools25.21.d: "DEAR PRESIDENT OF JAPAN.\nWe know of the tragedy that happened in your country. We always knew the Chinese could explode. Jackie Chan himself warned us about it. To prevent this tragedy from happening again, we suggest that you buy only our own Samsung phones. I believe that one day, our friendship will grow into something more. A nation where everyone is happy, a nation ruled by Honda and Samsung.\nDEATH TO TOYOTA!\n\nYours sincerely, John Lee Samsung."
 korea_aprilfools25.21.a: "Okay."
 korea_aprilfools25.22.t: "Buy this machine, now!"
 korea_aprilfools25.22.d: "Yes, I think you owe it to yourself to buy this washing machine, you have no idea how lucky you are. Mere mortals only see such clever washing machines once in their lives....\n\nDo you already have one? No problem. That doesn't mean you should shy away from this opportunity. You can have a spare. It would be a really smart move by an enlightened person.\n\nYou don't have any money? Then it will be harder for us to talk to you. Well. Wait here a second. The council will decide how you can repay your purchase."
 korea_aprilfools25.22.a: "Man errs, as long as he strives."
 korea_aprilfools25.23.t: "Subscription Expired"
 korea_aprilfools25.23.d: "Oh boy, I sure do feel good and safe with our new healthcare system! And these new pills they're giving us are making me feel great! Anyway, my health care subscription is expiring and I need to renew it, I guess that won't be a problem, so how much is it worth?\n\nUgh... Half my paycheck???"
 korea_aprilfools25.23.a: "*Immediately Feels Pain Beyond Human Comprehension*"
 korea_aprilfools25.24.t: "Ebengrad 2: Origins"
 korea_aprilfools25.24.d: ""We roamed the still, cold world. No horizon in sight. The rulers of old, stripped of pride and glory. It feels as yesterday we were turning the wheels of progress, until the crisis stopped it all. Suddenly. Without a warning. When tides had changed, they changed for all of us, no matter wealth or class. We've lost our world to oil, and with it, our last traces of humanity. We bid farewell to plenty, and for those who remained came the time to adapt. We decided to leave our homes and head north. We roamed for weeks, maybe months, leaving behind all the things we once believed had made us. It was hope that pushed us forward. Slowly. Step by step. We knew the cost of our journey, and we've paid the price - a hundred times. Finally, the time has come, to build the last city on Earth.""
 korea_aprilfools25.24.a: "JuchePunk sounds like an interesting genre."
 korea_aprilfools25.25.t: "Fumo Mania"
 korea_aprilfools25.25.d: "Have you ever wondered who came up with these fumo plushies in the first place? Well, like, it's Japan, but there's more to think about... THAT! Perhaps this person is an unrecognized genius.....\nOf course, nowadays there is the Internet and everything can be found there, but is it interesting? I think there comes a moment in everyone's life when you have an irresistible desire to start a personal investigation into the origins of fumo, without any help, using only your own deduction.\nI'm starting right now.\nI think the first thing to do is go to Vietnam, or wherever they make them."
 korea_aprilfools25.25.a: "True."
 korea_aprilfools25.26.t: "Turns out, it was a great idea!"
 korea_aprilfools25.26.d: "That's what I wanted to say, but... Uuuugh. You know, we have some reports from the North... They say something about blood... And vampires... And people... They take their blood... Not people take vampires' blood, the other way around, I think you understand... Yeeeahh...\nTo be honest, i don't think that it's great for business."
 korea_aprilfools25.26.a: "Oh... It was the most ingenious idea we had... "
 korea_aprilfools25.27.t: "HONUDA ACCORD!"
 korea_aprilfools25.27.d: "HONUDA ACCORD! HONUDA ACCORD! HONUDA ACCORD!"
 korea_aprilfools25.27.a: "HONUDA ACCORD!"
 korea_aprilfools25.28.t: "Mist Of Mystery"
 korea_aprilfools25.28.d: "Don't you ever feel like everything around you is a lie? You see, you hear, you think, but nothing around you makes sense, it doesn't have to exist in the real world.\nMaybe... It's all really a dream? Shouldn't I be doing something else right now? Something better? Maybe I should just wake up and this red mist that's covering my eyes will disappear from my life forever?\nMaybe tomorrow, I will be able to do that."
 korea_aprilfools25.28.a: "Should I Wake Up???"
 korea_aprilfools25.29.t: "..."
 korea_aprilfools25.29.d: ""
 korea_aprilfools25.29.a: "Maybe... It's For The Best..."
 korea_aprilfools25.30.t: "GWANLIJA NARI!!!"
 korea_aprilfools25.30.d: "GWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!!"
 korea_aprilfools25.30.a: "FORWARDS, ROCINANTE!!!"
 korea_aprilfools25.31.t: "Just Produce Oil???"
 korea_aprilfools25.31.d: "That's the wrong kind of oil, guys..."
 korea_aprilfools25.31.a: "Damn."
 korea_aprilfools25.32.t: "John Lee-Samsung Seizes Power"
 korea_aprilfools25.32.d: "Unexpected news comes to us from Korea. John Lee-Samsung has gained complete undivided power in the country! It is reported that John remembered that all of Korea's money is actually his, and decided to eliminate unnecessary branches of government such as the presidency, parliament, and local governments. We are sure that now that the true Prince of Korea is in power, people will finally be able to fix all their problems and bring themselves to a bright Cyberpunk future."
 korea_aprilfools25.32.a: "GWANLIJA NARI!!!"
 korea_aprilfools25.33.t: "How to Cope with Russian Occupation"
 korea_aprilfools25.33.d: "By Szymon (he/they), Senior Editor at VICE\n\nWe are once again in the century of bad maps and worse men. But as war ravages Europe, your trauma can be beautiful, and it doesn"t require you to take up weapons.\n\nHere in Poland, we; yes, we, the queers, the artists, the people with the tattoos and inherited trauma, are caught between a state that wants us to repent and an invader that wants us to disappear. So how do you cope when the world is ending again, and this time you"re not even on the right side of the border, the war, or history? Hey, do we even know if both sides are the "right sides" of history? Who knows. Maybe "God" does, if She can hear us.\n\nOne: Calming rituals! Chamomile won"t stop the shelling, but it does look great when you"re going for the "bombed out post-Soviet city" chic. Also, Polish queers in Lublin are trading mint sprigs for flu meds now, currency is emotional and minty.\n\nTwo: Meditate in Abandoned Churches with Weird Lesbian Energy. The stained glass is shattered. The pews are missing. But it"s a vibe. Sit cross-legged. Chant softly. Channel intergenerational trauma through Latin and lavender oil.\n\nThree: Channel Your Energy! You"re not a soldier. You"re a survivor of algorithms and inherited grief. So light a candle. Do your stretches. And remember: your nervous system is doing its best."
 korea_aprilfools25.33.a: "I"m not reading the rest anymore."
 korea_aprilfools25.34.t: "Roses, Not Rifles: Honoring A Queer Frontliner"
 korea_aprilfools25.34.d: "By Quake (xe/xem/xyrs), Chakra Witch for the Association of the Freed\n\nI took a weapon, but our dear Szymon didn"t. They carried a rose, and a dream of resistance so beautiful that it broke our hearts and a T-90"s suspension.\n\nOn March 28th, at exactly 11:11am, under a pale grey sky in the Nowy Radom safe space, our beloved VICE contributor, editor, and soft-core resistance icon Szymon (he/they) was struck and killed by a Russian tank while performing what witnesses described as ""a final, devastating act of poetic defiance."" They were unarmed, barefoot, and holding a rose.\n\nSzymon was never the type to hide behind armor. They wore scarves; layered, frayed, scented with lavender and revolution. They believed that the queer body, when paired with intentionality and public vulnerability, could be a weapon against authoritarianism. They proved that right today against the occupier.\n\nHow You Can Honor Szymon: Light a rose-scented candle on a Thursday (their favorite day), Send donations to "Paris Queer Co-Operative" to send healthy vegan meals to queer refugees in France, or simply sit in stillness for 7 minutes, as Szymon did every day at 4:44pm to realign the nervous system in times of crisis. Szymon, you are canon."
 korea_aprilfools25.34.a: "Rest in peace..?"
 

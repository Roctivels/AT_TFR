 SOV_his_vision_prevails: "His Vision Prevails"
 SOV_his_vision_prevails_desc: "Zhirinovsky was the man that led us to victory, Zhirinovsky was the man that elevated the Russian nation to a higher state, Zhirinovsky was the man that beat back the west. It only would make sense that his ideals would be maintained.\n[SOV.GetLeader] is one of the few that truly understands the path Zhirinovsky has set out for us and there is no reason not to maintain that path." 
 SOV_intensify_debolshevization: "Intensify De-Bolshevization"
 SOV_intensify_debolshevization_desc: "If there was one thing the Reds did best, it was to build personality cults. The red trash renamed streets, towns, even large cities in honor of their leaders, built a huge number of statues of their leaders! I would like to pay tribute to them when they were in power, it worked effectively. But now the power is in the hands of real patriots. We will start a large-scale campaign to destroy the Soviet legacy. The statues of Lenin will be demolished and their place will be taken by statues of Vladimir Volfovich and other patriots of Russia. Cities, villages, and even streets will get new names. In the end, the names of the red executioners will henceforth be worthy to appear only in documents or history textbooks."
 SOV_youth_recruitment_drive: "[ldpr_zhir_focus_scripted_loc_name]"
 SOV_youth_recruitment_drive_desc: "[ldpr_zhir_focus_scripted_loc_desc]" 
 SOV_youth_recruitment_drive_1: "Youth Recruitment Drive"
 SOV_youth_recruitment_drive_1_desc: "Our party needs new blood!  After the parasites and traitors were not at the feeding trough, it suddenly became clear that there was an acute shortage of personnel in our party. And it's time to fix it. We will collaborate with popular opinion leaders, organize online campaigns, and launch new youth programs. It's all about getting fresh blood into our party." 
 SOV_youth_recruitment_drive_2: "Unite the Military Industry"
 SOV_youth_recruitment_drive_2_desc: ""  
 SOV_youth_recruitment_drive_3: "Empower The Elite"
 SOV_youth_recruitment_drive_3_desc: ""
 SOV_bureaucratic_centralization: "Bureacratic Centralization"
 SOV_bureaucratic_centralization_desc: "It would be foolish to entrust the management of entire regions to local officials, much less give them full control. What if they start being tyrannical! What if they decide to oppress the Russian people explicitly or more subtly? What if they turn out to be traitors!? In order to prevent the separatists and other regime shakers from having a chance, all bureaucratic processes will have to go through special authorities in Moscow."
 SOV_enshrine_ideological_postulates: "Enshrine Ideological Postulates"
 SOV_enshrine_ideological_postulates_desc: "Vladimir Zhirinovsky's ideas are a truly unique example of Russian political thought. Move a little to the right ideologically and you will get a crazy Orthodox theocracy, to the left - and you will get a red-brown spawn. Zhirinovsky's thought must be pure and protected from all impurities so that our state can continue to prosper and people can live in prosperity! We will not allow the degradation and distortion of the thoughts of our great leader!" 
 SOV_party_popular_media: "[ldpr_zhir_focus_1_scripted_loc_name]"
 SOV_party_popular_media_desc: "[ldpr_zhir_focus_1_scripted_loc_desc]" 
 SOV_party_popular_media_1: "Party's Popular Media"
 SOV_party_popular_media_1_desc: "People haven't been so interested in traditional media lately. Televisions have receded into the background, not to mention things like newspapers and radio. But this is far from a reason to despair. By investing a little bit in the development of our media on the Internet, we will get a result that will definitely exceed even the wildest expectations of ossified propagandists. People will share memes containing extracts of articles, forward interesting stories to each other and receive the latest news from us. And in response, we will present the news to these people exactly as we see fit."
 SOV_party_popular_media_2: "Media Monopolization"
 SOV_party_popular_media_2_desc: ""
 SOV_benevolent_fist: "Benevolent Fist"
 SOV_benevolent_fist_desc: "There can be no strong state with a weak government! If managers are unable to instill fear in their wards, then they are not capable of ruling a country! On the other hand, if fear is the only thing that a ruler can cause, then it is also a symbol of the degradation of the regime. Vladimir Volfovich was a loud and rude politician, but at the same time he sincerely loved the Russian people and encouraged people who loved their Fatherland. We, the followers of his ideas, should do the same. To beat with your fist all the opponents of the Russian people, but at the same time be soft on patriots." 
 SOV_campaign_against_russophobes: "Campaign Against Russophobes"
 SOV_campaign_against_russophobes_desc: "" 
 SOV_zhirinovsky_our_father: "Zhirinovsky - Our Father"
 SOV_zhirinovsky_our_father_desc: "It is difficult to overestimate Zhirinovsky's role in the formation of the Russian nation. Under previous regimes, we were afraid to wear traditional outfits, being a religious person was something shameful, and the Russian language was taking over more and more from others. However, Vladimir Volfovich changed that. Like Ataturk for Turkey or Jozef Pilsudski for Poland, Zhirinovsky gathered all our traditions, our faith and our customs and created from them an identity that we are proud of to this day. In fact, Vladimir Zhirinovsky became the figurative father of our nation. For which we are grateful to him!"
 SOV_limit_minority_privileges: "Limit Minority Privileges"
 SOV_limit_minority_privileges_desc: "It's scary to think, but there was not a word about the Russian people in the Constitution of the Russian Federation! Some multinational people of some country. Local henchmen of the corrupt party sent their sycophants to the regions, who fed their separatist friends and troublemakers. Russian Russian children in the so-called "national republics" were forced to learn the language of the local people along with Russian. It cannot be called anything other than laying a mine under the Russian identity. From now on, minority languages will be consolidated in education exclusively as optional subjects, and their clothes and traditions will fade into the background. No one forbids them to be Tatars, Bashkirs, or anyone else. As long as they don't forget that they live in the Russian state." 
 SOV_religious_ideals: "Religious Ideals"
 SOV_religious_ideals_desc: "Orthodoxy has always been one of the pillars of Russian statehood. Our people were religious and revered the precepts of the holy fathers. All this, of course, has suffered as a result of the troubles that have befallen our motherland. However, our people have always kept within themselves the very particle that God placed in the Russian people.\n\nThe time has come for us to assume the role of the God-bearing people again. Temples and holy places should become visited places again. And the traditions of humility and sincerity will become integral parts of the lives of our citizens."  
 SOV_long_live_the_empire: "Long Live The Empire"
 SOV_long_live_the_empire_desc: "Some believe that the Russian Empire perished in 1917 along with the monarchy, killed by the Bolsheviks. Nonsense! The Russian people carried imperial ideas in their hearts right up to the 21st century. Together we were able to restore the spirit of the empire. Together we have revived the great Russia. Together we have done the impossible! And we'll do even more! As long as our country is alive and as long as our people are united, we are invincible. Long live the empire! Glory to Russia!" 
 SOV_new_russian_indentity: "New Russian Identity"
 SOV_new_russian_indentity_desc: "Russian culture suffered a decline during the reign of the red terrorists. Our clothes were banned and replaced by European fashion. Our classical literature has been replaced by futuristic trash, and our traditions have been muddied. Even if the Federation government formally did something about it, their actions were not enough. Stop putting up with it! It's time for Russian culture to rise again! From now on, our people will not be ashamed of their clothes and language. Dozens of cultural festivals will receive support, and many writers will receive funding. Russian culture will be great again!" 
 SOV_cultural_dominance: "Cultural Dominance"
 SOV_cultural_dominance_desc: "Russians would be foolish to believe that any nation other than the Russians could be in charge of the Russian state. All sorts of separatists, "humiliated minorities" and other idiots are ready to foam at the mouth to prove that Russia should take their needs into account. But let them look around. Did they build all these cities? Did they create a great power and shed blood for its right to exist? I think the answer is obvious to everyone! Let them obey our laws, and we will not touch them and their archaic ways of life. However, if they want to change something, we will also be ready to accept them into our Russian community. If, of course, they prove during the exams that they are really capable of integrating into our society." 
 SOV_to_protect_the_motherland: "Protecting The Motherland"
 SOV_to_protect_the_motherland_desc: "Pointless debates and endless bickering while the outside world is adapting to our march of dominance?\nThis can no longer stand, after the death of Zhirinovsky, the party has started to slowly fracture under the weight of inflated egos and useless backroom politics, fortunately the military is there to put a metaphorical and literal gun to their head to make sure they just shut up.\nNo more deadlocks, no more obstructions, Viktor Zolotov will take the reign over the motherland to ensure it won't fall back into another era of stagnation." 
 SOV_zealous_anti_communism: "Zealous Anti-Communism"
 SOV_zealous_anti_communism_desc: ""
 SOV_award_zolotov_loyality: "Award Rosgvardia"
 SOV_award_zolotov_loyality_desc: ""
 SOV_militarization_of_society: "Stabilize The Regime"
 SOV_militarization_of_society_desc: "When Zolotov led his National Guard out of the barracks, he already sensed what was to come. As the successor to Zhirinovsky, this veteran - now the conductor of Russia's "symphony orchestra" - faced a situation more perilous than any ruler in Russian history who had ascended to power after 'the Great'. To solidify his power, he would need to make difficult compromises. Should he heed the wishes of his comrades, who have stood by him through thick and thin, and lead this great empire as Russia's "First Soldier"? Or should he listen to the whispers echoing within the halls of the Kremlin and restore the "republican system" that the Russian elite depend on for their survival and privileges? Regardless of the path he chooses, one thing is certain: Zolotov must complete his mission with unshakable courage and willpower, impervious to any storm." 
 SOV_army_with_empire: "Military Statism"
 SOV_army_with_empire_desc: "Wielding his sword, Zolotov fearlessly battles those who dare challenge his authority and the dignity of Mother Russia. Now, as the "victorious general," he has made his choice. He will stand with his brothers-in-arms, seeking everlasting glory for Russia. Under the previous leader, the Russian economy underwent a major transformation to meet the challenges of war, bringing profound changes to all levels of society. Everything related to soldiers and the military had become an essential part of Russian life. Zolotov's task is to unify the Russian political arena with the power of the military, ensuring the military's presence is felt in every corner of Russia."
 SOV_shepard_with_sheep: "Res Publica Restituta"
 SOV_shepard_with_sheep_desc: "Surrounded by dapper gentlemen in suits, General Zolotov, in his gray-green military uniform, warmly shakes hands with enthusiastic politicians. In front of flashing cameras, he demonstrates the poise and magnanimity expected of a benevolent ruler. Regardless of what these shrewd politicians may secretly think about a military officer becoming the highest leader of Russia, Zolotov's grip on power is indisputable and will only grow stronger. The general has chosen to become the Brutus and Cincinnatus of the "Third Rome," restoring the Russian political order and civil society, which were destroyed in the turbulent final years of Zhirinovsky's power struggles. On this wounded Russian soil, a true "People's State" will be created through his leadership." 
 SOV_national_guard_supremacy: "National Guard Supremacy"
 SOV_national_guard_supremacy_desc: "Who constantly monitors those lurking in the shadows, threatening the regime's stability with their malicious intentions? Who tirelessly protects the well-being and peace of the Russian people? Who resolutely fights against hostile forces when they infringe upon Russia's sovereignty and territorial integrity? The National Guard has made monumental contributions to the rise of the Russian Empire and the triumph of its national power, and the blood shed by its martyrs has stained the waters of the Baltic Sea. As a result, with General Zolotov ascending to the highest leadership position in Russia, the National Guard's status will soar. Its elite commanders will be promoted to the highest levels of government or the senior command of the armed forces. Its military doctrines and principles will serve as the compass guiding the formation of the new Russian society. The National Guard will become the political and moral model for the future Russian people." 
 SOV_iron_russia: "The Iron Russia"
 SOV_iron_russia_desc: "When Augustus passed the Roman Empire to his successor, he proudly declared, "I received Rome as a city of bricks; I leave it to you as a city of marble." Similarly, as the new master of the "Third Rome," Zolotov seeks to build on the grand legacy left by Zhirinovsky. He wants to ensure that when he hands it over to his successor, it is done with pride. Zolotov looks beyond the borders, where hostility towards the Russian motherland remains widespread, constantly threatening the heart of the Russian people. If you think Zolotov would idly stand by and watch such suffering befall the Russian people, you are mistaken. Zolotov is fully committed to forging Russia into an impregnable fortress. In his vision, every Russian citizen will become a steadfast guardian of the motherland, and he himself will embody the ideal Russian spirit." 
 SOV_new_system_protected: "New System Secured"
 SOV_new_system_protected_desc: "The political system is one of humanity's most complex and contradictory inventions. At times, it infiltrates the nation like the tentacles of an octopus, feeding its own growth rather than strengthening the nation or serving the people's happiness. However, the system also resembles the trunk and roots of a pine tree, providing a solid foundation that supports the nation's steady progress.\nIn the face of the significant challenges facing the Russian Motherland, Zolotov understands that he must look beyond the Kremlin. He seeks solutions to the nation's problems and pathways to the future, navigating the frustrating layers of separation between leader and people.\nAs the military's primary representative, the most vital pillar of the Russian regime, Zolotov will collaborate with the civilian government and the State Duma, controlled by deputies of the Liberal Democratic Party. Together, they will build a strong Russia on the foundation laid by Zhirinovsky." 
 SOV_zhirinovsky_our_generalissimo: "Zhirinovsky - Our Generalissimo"
 SOV_zhirinovsky_our_generalissimo_desc: "Vladimir Zhirinovsky - a great leader, a genius commander, the nation's benevolent father, and a guiding light whose memory Russians must never forget. General Zolotov plans to further strengthen the power of the new central government under his leadership. People fondly remember the prosperous days under Zhirinovsky's rule, when the nation thrived and the Russian army stood invincible on the battlefield. As the aftershocks of the power transition subside, the people have placed their hopes for a resurgence of prosperity in Zolotov. Although the task of restoring prosperity is arduous and protracted, we can effectively leverage the people's expectations. Under Zolotov's leadership, we will hold solemn ceremonies to honor Zhirinovsky, posthumously awarding him the title of "Generalissimo." At the same time, we will portray Zolotov as the rightful guardian of Zhirinovsky's legacy and the best candidate to lead us forward." 
 SOV_glory_of_imperial_guard: "Glory Of Imperial Guard"
 SOV_glory_of_imperial_guard_desc: "According to Zolotov's orders, the most distinguished units in the National Guard will receive the honorary title of "Imperial Guard." The Defense Minister will personally present the commanding officers of these units with a flag bearing the portraits of Zhirinovsky.\nThe establishment of the "Imperial Guard" will further elevate the National Guard's prestige within Russia. Countless young Russians are drawn to their stern and resolute demeanor, professional capabilities, and the distinctive red beret uniforms. At local recruitment centers, petitions to join the National Guard flood in.\nWitnessing the growth of his cherished units, Zolotov has decided to further his efforts. By hosting grand parades, introducing special medals to celebrate "National Guard Day," and expanding the units' roles to include operations beyond traditional security duties, the National Guard, led by the "Imperial Guard," will bring greater glory to the double-headed eagle emblem of the Russian Armed Forces." 
 SOV_civic_military_cooperation: "Civic-Military Cooperation"
 SOV_civic_military_cooperation_desc: "The specialized training soldiers receive, combined with the collectivist atmosphere within their units, helps them become more productive members of both their families and society after retirement. This principle has been proven true over many years in Russia's militarized society. As Russia's supreme leader and "First Soldier," Zolotov understands how to strengthen the bond between the military and the public. With his growing power and prestige, Zolotov has begun advocating for deeper civilian-military integration. Technological advancements from civilian companies will be better applied to military construction. Moreover, innovations from the military will be validated and adopted by the civilian sector. Additionally, personnel exchanges will become more frequent. Many talented officers will join engineering teams, icebreaker fleets, geological exploration units, and other critical sectors of national development. Zolotov firmly believes that, under his leadership, the Russian people will enjoy a better life." 
 SOV_the_heart_of_motherland: "The Heart Of Motherland"
 SOV_the_heart_of_motherland_desc: "General Zolotov has now focused on the core region of our country, the heart of Russian civilization. To propel the vast expanse of Mother Russia, a strong and healthy heart is essential - this is the focus of the visionary general's next plan.\nZolotov believes that by transforming this land into the true heart of Russia, the empire can maintain its dominance throughout the 21st century.\nZolotov and his comrades have carefully devised a plan, not a mere replication of past construction models, but a comprehensive renaissance movement. Its goal is to rebuild the Russian nation - its population, culture, and ideology - making it the true heir to both Eastern and Western civilizations on the Eurasian landmass."
 SOV_zolotov_zhirinovsky_most_loyal_warrior: "Zolotov - Zhirinovsky's Most Loyal Warrior"
 SOV_zolotov_zhirinovsky_most_loyal_warrior_desc: "As a soldier, Viktor Vasilyevich Zolotov has achieved feats once unimaginable by his predecessors. He has inherited the legacy of his predecessor and successfully built upon it. He has defended Russia's imperial hegemony and used this foundation to reshape its values and create a new form of civilization. Amid the grandeur and praise from the people, the general humbly asserts that his achievements have always followed the long-term plans set by Vladimir Volfovich. He emphasizes that his actions have always aligned with the vision of the great "Supreme Ruler." The general's humility endears him further to the people, intertwining Zolotov's name with Zhirinovsky's. When Russia's dominion passes to future generations and its people rise to greatness, both Zolotov and Zhirinovsky will be eternally revered as the creators of these monumental achievements." 
 SOV_the_honor_of_officers: "The Honor Of Officers"
 SOV_the_honor_of_officers_desc: "An army without the leadership of officers is like a body without a brain or nervous system - it would be a lifeless heap of flesh. This was vividly demonstrated in the Russian Armed Forces. When the motherland was engulfed in turmoil and chaos, the officer corps also fell into disarray, leading to widespread confusion, rampant smuggling, theft, and internal conflicts.\nAs one of the veterans who emerged from this period of decline, Zolotov is determined that such a situation will never again befall the Russian motherland. He seeks to address the problem at its root by ensuring the officer corps maintains as "state within a state", incapable of influencing politics negatively, while acting as the upper-level overseers and guardians of order in Russia's grand political landscape. The officer corps will become a symbol of inherent superiority, as a result, their authority and strength will be even more formidable and awe-inspiring." 
 SOV_soldiers_state: "The Soldiers' State"
 SOV_soldiers_state_desc: "In Russia, the most respected image of an ordinary person is not that of a scientist, artist, or wealthy merchant. Rather, it is the unassuming soldier, clad in uniform and bearing a standard-issue weapon, who stands out among the masses. It is from these countless soldiers that the great leaders of today's Russia have emerged. Their sacrifices have secured the prosperity of the nation.\nZolotov has made significant efforts to elevate the status of the military, and now, as a result, he can offer a promising future to those soldiers who have shed blood for Russia. Every veteran who has served and contributed will receive comprehensive support, including employment, healthcare, and general well-being. Additionally, to accommodate the expanding military, these veterans are often called back to serve as instructors, finding renewed purpose in the army they love.\nAs society gradually recognizes their contributions, these heroes will one day become the icons of the Russian nation." 
 SOV_citizen_militarization: "Citizen's Militarization"
 SOV_citizen_militarization_desc: "What do the weak opposition and those still holding onto the belief that the Liberal Democratic Party might relinquish power fear the most? It is, of course, the prospect of a militarized lifestyle becoming the norm across society. They would find themselves surrounded by genuine Russian patriots, their true natures inevitably exposed. However, turning all of Russia into a massive military camp in an overly radical way would be counterproductive in terms of resource use and efficiency.\nTo avoid this, Zolotov has devised a gradual plan to integrate every Russian citizen into the structure of the Russian Armed Forces. This plan is the modern version of the Spartan military education from ancient Greece. The backbone of Russian society will become a model of both fighting spirit and professional skill, ensuring the healthy and orderly development of Russian society in the coming decades." 
 SOV_cult_of_zolotov: "Cult Of Zolotov"
 SOV_cult_of_zolotov_desc: "Any rational Russian would acknowledge that Zolotov's leadership has turned the fate of the nation around at a critical moment, guiding it onto a path of revival and prosperity. Without him, any talk of stability, order, and progress would have been empty words after Zhirinovsky's death.\nTherefore, in addition to fostering respect and reverence for the supreme leader among the Russian people, we will also organize promotional activities to ensure that Viktor Zolotov's name is forever remembered alongside the greatest figures in Russian history. Carefully conducted public surveys will place Zolotov at the forefront of the "100 Greatest Russians." Memorials to his life, birthplace, and the units he served in will become great symbols of patriotism. Additionally, materials celebrating Zolotov's remarkable life will be included in textbooks used in schools, ensuring that future generations of Russians will all share the same belief: Zolotov is the earthly embodiment of Russia." 
 SOV_empower_military_governors: "Empower Military Governors"
 SOV_empower_military_governors_desc: "Through bold and sweeping reforms, we have ensured that the Russia is gradually transforming into the vision we desire. The outdated term "militarism" no longer accurately describes the current state of Russia. Our enemies may wish to see a Russia weakened by military overreach, like the former USSR. However, the sustainable military-civilian economy, the societal value placed on martial strength, and the disciplined bureaucracy and armed forces all serve as clear examples of the success of Zolotov's path.\nGoing forward, he will remove all restrictions to fully realize his vision for the motherland. The Russian Empire will be restructured, with its territories governed by a few military governors holding absolute power over life and death in their regions. The military will be the sole respected authority, guiding every aspect of society. Zolotov is confident that this will forge a great Russian Empire, one that remains vital and continually advances on the path of conquest." 
 SOV_the_russian_senate: "The Russian Senate"
 SOV_the_russian_senate_desc: "Having chosen to rebuild the Russian republican system through military force and protect it with the army, Zolotov has taken his first step toward political reform in Russia. The State Duma, a long-standing representative body dating back to 1905, has reached the end of its life cycle. We will remember the significant contributions this institution has made to Russian governance over the years and preserve its core values. At the same time, we aim to make it more efficient and better suited to Russia's current needs through modernization reforms.\nAccording to the latest decree, the State Duma will be transformed into the Russian Senate, which will include more societal elites and provide greater professional consultations. In areas such as military and diplomatic decision-making, public service, and industrial planning, the new Russian Senate will help ensure that Russia's resurgence is steady and enduring." 
 SOV_citizenship_for_service: "Citizenship For Service"
 SOV_citizenship_for_service_desc: "In ancient Rome, serving in the legions was a noble privilege reserved for Roman citizens. Now, in the vast expanse of Russia, General Zolotov's latest bill aims to revive this concept. From now on, serving in the Russian Armed Forces will be the key path for people in newly reclaimed territories and the next generation of Russians to gain formal citizenship. Only by proving their loyalty and love for the motherland, as well as developing the necessary skills for both labor and combat, can one truly be considered a valuable asset to the Russian nation and society.\nWe believe this reform will gradually eliminate societal parasites and scoundrels from the Russian community in the coming years. Before long, the exceptional qualities of Russian citizens will astound the world." 
 SOV_centralized_republic: "Centralized Republic"
 SOV_centralized_republic_desc: "In the past, to accommodate our country's transcontinental nature and the diversity of ethnic groups within, we had to tolerate the coexistence of various local government organizations. While this demonstrated Russia's inclusiveness, it created significant challenges in improving administrative efficiency and maintaining the unity of Russian civilization. Moreover, special treatment for remote areas made it even harder to ensure balanced development and regional unity across the country.\nTo address this, Zolotov will take decisive action to eliminate these harmful practices. All local administrative regions will be unified under the "Oblasts" framework, governed by appointed officials. These oblast governments and leaders will be accountable to the central government in Moscow, reporting solely to it. Zolotov firmly believes that a centralized republican system will significantly improve the formulation and implementation of policies that benefit all Russians." 
 SOV_commander_in_chief: "Hail The Commander-In-Chief!"
 SOV_commander_in_chief_desc: "Zolotov understands that to truly master Russia, he needs more than just the loyalty of the army and navy. Two other elements are essential: the fear of the common people and the flattery of the elite. As long as he presents himself as an iron-fisted leader with significant military power, the fear of the people will be guaranteed. Furthermore, by proving that his position is secure and that he can offer unimaginable rewards and benefits to his followers, winning the allegiance of Russia's elite will be effortless.\nZhirinovsky was merely the late "Generalissimo," of little importance beyond that. Zolotov, however, is the true "Commander-in-Chief," with life and death power resting entirely in his hands. Any adversary who understands this will wisely avoid challenging him, ensuring that Zolotov's reputation becomes increasingly unassailable." 
 SOV_cutting_down_the_officialism: "Cutting Down The Officialism"
 SOV_cutting_down_the_officialism_desc: "As Zolotov becomes more skilled at governing the nation, he finds that the very bureaucratic system he painstakingly restored has become the greatest obstacle to advancing Russia. Each time he tries to push forward with his plans, Zolotov feels the negative effects of the system's arrogance and incompetence. What he needs are loyal and determined executors - industrious "worker bees" committed to the welfare of the Russian people - not self-important "intellectuals" who think they can manage state affairs.\nTherefore, if the "Supreme Ruler" can give, the "Supreme Ruler" can also take away. We will conduct a thorough cleanup, removing any decayed structures hindering our progress. Once the dust settles, the only figure left standing at the center of power will be our Commander-in-Chief, Mr. Zolotov." 
 SOV_eurasian_assembly: "The Eurasian Assembly"
 SOV_eurasian_assembly_desc: "" 
 SOV_restore_oligarch_holdings: "Restore Oligarch Holdings"
 SOV_restore_oligarch_holdings_desc: "" 
 SOV_strongman_authority: "Strongman Authority"
 SOV_strongman_authority_desc: "" 
 SOV_reign_of_beneficial_relations: "Reign Of Beneficial Relations"
 SOV_reign_of_beneficial_relations_desc: "" 
 SOV_russian_lobbyism: "Russian Lobbyism"
 SOV_russian_lobbyism_desc: "" 
 SOV_national_state_duma: "The National State Duma"
 SOV_national_state_duma_desc: "" 
 SOV_restore_presidential_administration: "Restore Presidential Administration"
 SOV_restore_presidential_administration_desc: "" 
 SOV_stability_and_prosperity: "Stability And Prosperity"
 SOV_stability_and_prosperity_desc: "" 
 SOV_sovereign_populism: "Sovereign Populism"
 SOV_sovereign_populism_desc: "" 
 SOV_1000_years_of_neo_putinism: "1000 Years Of Neo-Putinism"
 SOV_1000_years_of_neo_putinism_desc: ""
 SOV_russians_on_the_march: "Russians On The March"
 SOV_russians_on_the_march_desc: ""
 SOV_the_restoration: "The Restoration"
 SOV_the_restoration_desc: "A hundred years ago our country made a great mistake. A ruling czarina, the terror and fear of its enemies, the Russian Empire fell under the pressure of the rabble of the wild. The time has come to correct this blunder and restore our homeland to its former greatness. The Russian people will repent for their crime, and the sovereign will once again lead the empire into a bright future." 
 SOV_restore_october_manifesto: "Restore October Manifesto"
 SOV_restore_october_manifesto_desc: "On October 17, 1905, a momentous event took place in our country. Sovereign Emperor Nicholas II decided to take an unprecedented step and promulgated a landmark act for Russian history. It was thanks to him that the State Duma appeared in the Empire, and the Russian people received an unprecedented number of freedoms. The most sensible step for the revitalized Russian state would be to reinstate this manifesto. Of course, freedoms must have their limits, and the tsar will have a veto in case of anything. Just in case." 
 SOV_intensify_de_bolshevization: "Intensify De-Bolshevization"
 SOV_intensify_de_bolshevization_desc: "When the Bolsheviks established their "people's" despotism, they did everything in their power to destroy the memory of the previous regime. Many cities and entire regions were named in honor of the Red executioners, and in other cases historical names were replaced with meaningless novelty. Vladimir Zhirinovsky's regime, of course, fought against this, but it was not enough. Thanks to us, the names of the era of red madness will be forever forgotten, and cities, towns and even streets will either return to their names or acquire new and just names." 
 SOV_municipal_zemstva: "Municipal Zemstva"
 SOV_municipal_zemstva_desc: "It would be an incredibly foolish move to abandon local self-government in a restored empire.The traditions of municipal self-government would fit perfectly with the restored zemstvas. After all, the people on the ground know better than the bureaucrats where to put a streetlight or build a new road." 
 SOV_legacy_of_alexander_reforms: "Legacy Of Aleksander Reforms"
 SOV_legacy_of_alexander_reforms_desc: "O Alexander I! An enlightened reformer murdered by an ungrateful mob! However, despite all the years that have passed, we have not forgotten his ideas. We amnesty those convicted by the LDPR regime in political cases! However, by far the most important achievement of Alexander was public education. Dozens of new universities would open throughout the empire, and the existing ones would be modernized to a modern level." 
 SOV_new_zubatovchina: "New Zubatovchina"
 SOV_new_zubatovchina_desc: "Our empire should in no way limit its citizens. Both the desire for reform and the need for state care are normal. However, sometimes citizens so inclined succumb to the influence of popular aggressive groups and fall into the power of terrorists who dream of the death of the empire. In order to prevent this, we are adapting Sergey Zubatov's ideas for a new era. Radical citizens will be given the opportunity to release their energy in rallies and other types of activity with the help of organizations under our control. And valiant security officers will make sure they don't do anything stupid in the process." 
 SOV_free_and_imperial: "Free And Imperial"
 SOV_free_and_imperial_desc: "Foreigners are used to associating Russia with a bear. An animal, heavy, clumsy and wild. But the revived empire is incredibly far from this stereotype. Like a proud eagle, it looks down on the west slipping into chaos while carefully shielding its chicks with its wings. However, we do not restrict our citizens. They have wide freedoms and can influence government both locally and nationally. The New Empire lives with dreams of a bright future and a new world. And together with our people, we will build a country for all." 
 SOV_samoderzhavie: "Samoderzhavie"
 SOV_samoderzhavie_desc: "The people will never follow a weak leader. Even in toothless Western democracies constantly wins the strongest and charismatic leaders who can lead the people. Exactly such and should be the Russian sovereign - strong and strict, but fair. Like a father to more than a hundred million people, he must lead the people into the future while not being afraid to personally take a blow. It is time for a renewed autocracy, thanks to which the empire will rise again." 
 SOV_committee_of_ministers: "Loyal Advisors"
 SOV_committee_of_ministers_desc: "It would be foolish to think that autocracy is a cave autocracy. To rule a giant country, a tsar needs reliable advisors who can always come to the rescue and offer help in solving a problem." 
 SOV_for_faith_tsar_homeland: "For Faith, Tsar, And Homeland"
 SOV_for_faith_tsar_homeland_desc: ""Orthodoxy, Autocracy, Nationality" - these are the three words on which our entire empire stands. Our people know that there is no death more righteous than for the Fatherland and for the Tsar, the Autocrat. The Russian people live and die knowing that the Lord is always watching over them. And we glorify him in return, for everything is done according to his will." 
 SOV_strengthen_governships: "Strengthen Governorships"
 SOV_strengthen_governships_desc: "A tsar cannot rule everything by himself. We need governors to govern the giant country in order to rule wisely the renewed provinces and regions. And it would be extremely foolish to require the new governors to appeal to the tsar on every little thing. It is time to expand the powers of governors, giving them the power to govern the regions so that they prosper! Within reasonable limits, of course." 
 SOV_sovereign_empire: "Sovereign Empire"
 SOV_sovereign_empire_desc: "One of the symbols of the Russian Empire is traditionally considered to be the eagle, a proud and wise bird. However, the renewed empire is increasingly being compared to the brown bear. A formidable lord of the forest, who alone is able to terrify all the animals, but at the same time the first does not attack. An animal majestic and strong, capable of ending anyone's life with a single swing of its paw. And so is our empire: proud and powerful, yet peaceful. We don't want war and we don't wish anyone harm. We are not interested in Western innovations as we are in ourselves. But, on the other hand, we are awe-inspiring to our friends and animal terror to our enemies. The empire is alive and proudly marching forward and no one can prevent us. After all, we are Russians! God is with us!" 
 SOV_russia_we_brought_back: "Russia We Brought Back"
 SOV_russia_we_brought_back_desc: "Oh, what a country it was! Oh, what a people it was! We may have made a mistake for a hundred years, but it was not irreparable. A century later, having shed a lot of blood and suffered a lot of grief, we, like little children, came to ask for forgiveness and the Lord rewarded us. Now we can reap the fruits of our efforts. More Russian people will not lament the lost golden age. After all, the empire has risen like a phoenix from the ashes. Our reforms have led to an unprecedented rise in culture. It became honorable to be Russian again. The new aristocracy has become a role model and sometimes even outshines the Western celebrities. No one can now predict what will happen to Russia and the world in the coming years. However, we can say for sure that the loyal subjects will follow the Tsar-Batyushka even in the heat of the battle, knowing that it will be a holy battle for the empire. For Faith, Tsar and Fatherland!"
 SOV_improve_curriculum: "Improve Curriculum"
 SOV_improve_curriculum_desc: "For a country like Russia, a good education of the population is simply necessary. The current training programs are simply outdated and need to be updated in a timely manner. All areas of education, from exact sciences to social studies, must be redesigned and teaching methods revised to meet the most modern standards. Russia should be proud of its scientists and specialists!"
 SOV_serenity_with_our_history: "Serenity With Our History"
 SOV_serenity_with_our_history_desc: "Despite what the Communists did in the 20th century, we should not see everything solely through the prism of horrors. After all, the Soviet Union is also in some form Russia, with the same people, and we have the right to be proud of its successes and achievements, breakthroughs and victories. Gagarin was the first to fly into space, Kurchatov's work gave Russia an indisputable nuclear argument, and Likhachev's work on philology and ethics is still relevant and valuable. At one time, the Communists opposed the aggressive capitalists of the West, but now the situation has changed dramatically. But one thing remains unchanged - the truth is behind Russia!"
 SOV_increase_working_class_engagement: "Increase Working Class Engagement"
 SOV_increase_working_class_engagement_desc: "For a country to prosper, the economy must be efficient, but there is one problem. No matter how many rights and freedoms workers have, you should not expect excellent results without a desire to work. We will do our best to increase the motivation of the workers, but without excessive enthusiasm, because we still care about our subjects. Salary increases, improved working conditions, and psychological assistance programs to prevent emotional burnout are all necessary to make the working class feel comfortable. After all, the people of Russia are its main value!"
 SOV_imperial_trade_unions: "Imperial Labor Union"
 SOV_imperial_trade_unions_desc: "The biggest mistake of the old Empire was not paying enough attention to the problems of the workers. But we will not allow such miscalculations. The working class will be able to defend its rights and freedoms within the framework of the Imperial Trade Union operating in every corner of the country. Every worker will be protected from the arbitrariness of their superiors! Let everyone know that the Empire cares about them!"
 SOV_electable_governors: "Electable Governors"
 SOV_electable_governors_desc: "The electoral rights of the subjects of the empire should not be limited only to national elections! To optimize the country's governance and expand the democratic rights of the empire's inhabitants, we will introduce elections for regional governors. Yes, this may affect stability in the regions, but we are determined! The subjects of the largest country in the world have the broadest rights!"
 SOV_diminish_royal_authority: "Diminish Royal Authority"
 SOV_diminish_royal_authority_desc: "In no prosperous monarchy in the world is power concentrated in the hands of the monarch. We honor our tsar, but for the effective functioning of the country's government, it is necessary to limit his powers in governing the state. The tsar will remain a symbol of Russia, however, the chancellor and the Duma will assume most of his powers. Strong Russia - strong elected government!"
 SOV_labor_democracy: "Labor Democracy"
 SOV_labor_democracy_desc: "Employees of enterprises should be able to monitor their work, even if it may affect productivity.\nTrade unions are great, of course, but we also need control in the workplace.\nThe Empire is already ready for more radical steps towards a new socialism that does not contradict the monarchical system."
 SOV_peoples_empire: "People's Empire"
 SOV_peoples_empire_desc: "An empire with a socialist government, an empire for the people - until recently, these words seemed like something impossible, nonsense, and a contradiction. But today it is an undeniable reality: the workers glorify the tsar, the state protects the rights of workers, and no one can deny the obvious. We have managed to combine tradition and progress, preserving the greatness of the past and striving for the future. We still have a lot to do, and there are many challenges to overcome, but the main thing has already been achieved - the solid foundation of the People's Empire has been laid. Glory to the tsar, glory to the people, glory to Russia!"
 SOV_fund_religious_schools: "Fund Religious Schools"
 SOV_fund_religious_schools_desc: "For some reason, many Russians have a fixed stereotype that religious schools are a place for losers. But wasn't it the same religion that preserved knowledge in the dark Ages? Has this religion always been an island of stability in an ever-changing world? In order to combat these prejudices, we will invest money in opening new religious schools and modernizing existing ones."
 SOV_russian_traditional_values: "Russian Traditional Values"
 SOV_russian_traditional_values_desc: "The previous government often talked about traditional values. But what do they mean without true faith? Can a person who is an unbeliever or intoxicated by nationalism love his neighbor? Can someone who lives forever with hatred and pride value his middle name? No and no! It's time to focus on the real Russian cultural values that have been our spiritual staples for a long time. Let the flowers grow! May people love and glorify their Fatherland! And if someone tries to break the rules, the punishment will not take long."
 SOV_care_for_our_elders: "Care For Our Elders"
 SOV_care_for_our_elders_desc: "There are people who seem to have "outlived their days," the old, sometimes sick and powerless. You might think that just leaving them to die quietly would be the right move, since they are already useless to the state. But we can't leave them! What kind of state is this that turns its back on people after they've put all their efforts into making it great? We will organize programs to help the elderly, increase pensions, and begin to promote caring for the older generation. At first, they led us by the hand. Now it's time for us to lend a helping hand ourselves!"
 SOV_imperial_business_grants: "Imperial Business Grants"
 SOV_imperial_business_grants_desc: "Russia is a land of opportunity. A huge amount of resources, boundless spaces and countless bright minds. All that remains is to push them in the right direction and Russia will become the richest country in the world. Dozens of enterprises with our help will be able to become competitors in the market. And other countries, seeing this, will envy our model of capitalism."
 SOV_benefits_for_all_faiths: "Benefits For All Faiths"
 SOV_benefits_for_all_faiths_desc: "During his speeches, Jesus Christ, the Son of God, taught people to be tolerant and to love their neighbors. And Russia is a country with several dozen nationalities and religions. It would be foolish to put them on the same page and force them to accept the same faith. What works for us is unlikely to suit a Kalmyk or a resident of the Caucasus. From now on, all religions will enjoy the same privileges and receive funds for their projects. Whether it is Orthodoxy, Islam, Catholicism or Judaism. Everyone is welcome in Russia! As long as you don't overstep the boundaries, of course."
 SOV_affirm_state_orthodoxy: "Affirm State Orthodoxy"
 SOV_affirm_state_orthodoxy_desc: "What happens if we give everyone the right to reshape the world the way they want? Chaos, devastation, division of society… Can we allow at least some of this to happen in the largest country in the world? Of course not! Just thinking about it seems crazy! From now on, Orthodoxy will become the state religion of our country, because only it is truly true to the teachings of Christ and only with it can a person save his soul at the Last Judgment. What about the other faiths? They will continue to exist, but any public activity will be severely restricted, and serious fines will be imposed for attempting to convert an Orthodox person to another faith. There is no price that is too high if the goal is to save the soul."
 SOV_church_state_synchronism: "Church And State Synchronism"
 SOV_church_state_synchronism_desc: "The history of the Russian state's relations with the church is always a history of contradictions. Either the rulers tried to subjugate the church, or they fought him in every possible way, trying to exclude him from public life as much as possible. However, we were able to achieve the seemingly impossible, the synchronicity of the state and the church. The state does not control the church and does not fight it. In response, the church does not oppose the state and does not try to raise people against the current regime. Instead, they are heading towards a brighter future together, not crossing paths, but at the same time pursuing a common goal. It may be impossible to build a paradise on earth, but we will do our best to create a state as close to this as possible."
 SOV_revive_the_leib_gvardiya: "Revive The Leib-Gvardiya"
 SOV_revive_the_leib_gvardiya_desc: "At one time, the Life Guards were the most combat-ready and privileged part of the Russian Imperial Army. Her initial task was to protect the Sovereign, but over time, the guards turned from the royal guard into a formidable force that the enemy reckoned with. Narva, Borodino, Kulm, Paris - the glory of Russian weapons is continuously connected with the Guard.\nYes, the Bolsheviks decided during the Great Patriotic War to revive the "Guards" divisions, but they have little in common with the real Guard. The same practice was adopted by Yeltsin's Russia, but only now, when our power stands firm, can we return the Guard to its former greatness, its former importance."
 SOV_promote_political_apathy: "Stimulate Political Apathy"
 SOV_promote_political_apathy_desc: "Politics is too complicated a thing for an ordinary person. People are easy enough to manage, so excessive popular interest in the political process can lead to unacceptable foreign interference. In order to secure the state and root out radicals, we will pursue a policy of limiting the participation of ordinary people in the process of public administration and lawmaking."
 SOV_no_societal_decadence: "No To Societal Decadence"
 SOV_no_societal_decadence_desc: "Throughout Russian history, the moral decay of society has led to huge problems. One of our primary tasks is to prevent any decline in society. To do this, we will use all possible means: we will promote our culture, which has not been distorted by foreign influence, we will promote our Russian values in schools and, naturally, we will expand cooperation with the church. All for the sake of Russia's greatness!"
 SOV_unite_with_imperial_monopolies: "Unite With Imperial Monopolies"
 SOV_unite_with_imperial_monopolies_desc: "A strong state must have a strong foundation. Government corporations loyal to us will become this pillar. To ensure our economic sovereignty and prosperity, we will pursue a policy of cooperation with imperial companies. We need the result of their work, and they need our condescension and protection."
 SOV_expand_tsar_power: "Expand Tsar's Power"
 SOV_expand_tsar_power_desc: "Throughout Russian history, the tsar has been a central figure, the foundation of power and the unity of the state. So it was, so it is, and so it will be. The tsar's word is law, his will is indisputable, and decisions are aimed at the good of the state. In this regard, we will expand the imperial powers so that he can fully guide the development of the country and ensure order. The Duma and the Chancellor will continue to perform their functions, but under the strict supervision of the monarch, in order to avoid discord and uncertainty. Russia is the tsar, and the tsar is Russia!"
 SOV_solidify_chancellors_authority: "Solidify Chancellor's Authority"
 SOV_solidify_chancellors_authority_desc: "The tsar, of course, is a symbol of Russia, embodying its strength, traditions and greatness. However, no matter how wise he may be, he may not be competent enough in matters of government. It is for this reason that it is necessary to expand the Chancellor's capabilities, giving him additional powers so that he can competently fulfill the will of the emperor, ensuring the stability and development of the country. Under his leadership, the state will work clearly and smoothly, and the authorities will act effectively. After all, a strong state needs not only a ruler, but also competent politicians who are devoted to the fatherland."
 SOV_united_society: "United Society"
 SOV_united_society_desc: "The key to a country's success lies in national unity. From time immemorial, Russia has stood strong precisely because of the unity of its inhabitants, their loyalty to the motherland and devotion to traditions. In the most difficult times, the people stood up with a united front, repelling threats, overcoming troubles and strengthening the state. History has repeatedly shown that Russia's strength lies in its people, and the people themselves drew strength from faith in their ruler. All the inhabitants of the empire, regardless of their position, are united by one thing - their king. He is not just a symbol of power, but also the embodiment of the very idea of the state, its indestructible order and prosperity. As long as Russia is united, nothing can break it!"
 SOV_stability_and_freedom: "Stability And Freedom"
 SOV_stability_and_freedom_desc: ""
 SOV_imperial_economic_council: "Imperial Economic Council"
 SOV_imperial_economic_council_desc: ""

 SOV_nav_russian_reformation_category: "Russian Reformation"
 SOV_nav_russian_reformation_category_desc: "\n\n\n\n\n£GFX_SOV_grand_reformation_banner\n\n\n\n\n\n\n\n\n\nFor the longest time our system relied on a broken constitution that gave power to the regime. Now, we are ready to create a true democratic constitution. One that will enshrine the freedoms  and rights that have paved the way for the civilized world. \n And maybe, if our people embrace it wholeheartedly, we can finally stand alongside the European democracies that have freed us!\n\n\n\nFanaticism: £GFX_fanaticism §Y[?SOV_fanaticism_var|1%]§!\nEffect:  £attack_texticon [?SOV_fanaticism_dynamic_var|=+1%] £mil_factory [?SOV_fanaticism_dynamic_var|=+1%] £GFX_mobilisation_texticon [?SOV_fanaticism_dynamic_var|=+1%] £GFX_war_support_modifiericons_texticon [?SOV_fanaticism_dynamic_var|=+1%]\n\nFanaticism represents our people's willingness to fight and support of the nation.\n\n\n\n\n\n\n\n\n"

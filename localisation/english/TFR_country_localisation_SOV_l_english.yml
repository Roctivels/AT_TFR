 SOV_Putinism_Faltering: "Tender Authoritarianism"
 SOV_Putinism_Faltering_desc: "\n\n\n\n£GFX_putinism_faltering\n\n\n\n\n\nVladimir Putin has been in charge of Russia since the beginning of the 21st century. Whether as President or a short period as a powerful Prime Minister from 2008 to 2012, serving under his protege Dmitri Mededev in the Kremlin, Putin has played a key role in rebuilding the country after the collapse of the USSR and addressing various internal and external issues. However, Putin's style of governance, known as 'Tender Authoritarianism', has its drawbacks. While there is political repression and centralization, direct intervention is rare, leading to a significant amount of opposition and corruption. United Russia constantly competes with radical opponents in the Duma, and riot police often break up liberal protests. Despite these imperfections, the Presidential Administration does not see them as a problem and continues to address them on a case-by-case basis, using a firm approach."

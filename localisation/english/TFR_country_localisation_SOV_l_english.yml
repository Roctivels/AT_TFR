 russia.108.t: "Victory Day"
 russia.108.d: "In a show of military might, Russia held its Victory Day Parade, marking yet another anniversary of the Soviet Union's victory over Nazi Germany in World War II.\n\nThousands of troops marched through Moscow's Red Square, as tanks, missile systems, and other military hardware rumbled past. The parade was attended by [SOV.GetLeader] and other top officials. The event featured more than 14,000 troops, including those from China, India, and other nations friendly to Russia. Russian air force jets and helicopters also flew over Red Square, leaving trails of colored smoke in the sky.\n\nThis year's parade was particularly notable for its inclusion of the latest military hardware, including the T-14 Armata tank and the Kinzhal hypersonic missile system. The Russian government has touted Russia's military modernization efforts as a way to maintain its defense capabilities against potential threats.\n\nVictory Day Parade remains an important event for many Russians, who see it as a symbol of national pride and unity. As the country continues to navigate the challenges of the geopolitical tensions, the parade serves as a reminder of Russia's past sacrifices and its determination to defend its interests."
 russia.108.a: "Lest we forget those that paid the ultimate price"
 russia.109.t: "Russian Terrorist Attacks in Occupation Zones"
 russia.109.d: "Azov hq got merked"
 russia.109.a: "We wont tolerate this oppression"
 russia.111.t: "FRONTLINE REPORT: [GetDateText]"
 russia.111.d: "TO - VALERIY GERASIMOV, CHIEF OF GENERAL STAFF\n\n\n\n\n£GFX_SOV_sons\n\n\n\n\n\nOUR UNITS HAVING SUFFERED HUGE LOSSES AND EXHAUSTED TO EXTREMITY, CAN NO LONGER WITHSTAND AGAINST THE PRESSURE OF THE ENEMY ASSAULT.\n\nCONTINUED OFFENSIVE TO PUSH BACK THE ENEMY ARE NEAR SUICIDAL. WE ARE IN DANGER OF BEING OVERRUN. I REQUEST PERMISSION TO ORDER MY MEN TO LAY DOWN THEIR ARMS AND SURRENDER, I PTTY THEIR MOTHERS\n\n. - \n\n§RSIGNED§! "
 russia.111.a: "OLEG SALYUKOV, CHIEF OF RUSSIAN GROUND FORCES"
 russia.112.t: "Polish Unconditional Surrender"
 russia.112.d: "At [GetDateText], representatives of the Polish government met with our diplomats at Kaliningrad to officially sign the terms to an unconditional surrender. Just as soon as the treaty was signed, an official communique was broadcasted across Poland ordering their soldiers to lay down their arms. Thousands gladly crossed the front lines and surrendered to our forces, but an equal number refused and continue to pose a significant threat to our forces.\n\nRegardless, their little insurgency will not hamper our plans for Polish occupation. The new government is quickly making progress to establish stability in the region. "
 russia.112.a: "Ask them where article 5 was to defend them?"
 russia.113.t: "The Aftertaste of Victory"
 russia.113.d: "For these thirty years Russia has been held in the claws of Yeltsin-Putin criminals, but finally we have a chance. The news of the CPRF's victory provoked various reactions among the left. Many people who had always considered it the "Party of Losers" found themselves confused. Konstantin Syomin, who did not support the CPRF in the elections, is already eager to return to state television. Andrei Rudoy, who called for an active boycott, has suddenly deleted all videos criticizing the CPRF from his channel and is already speaking out in support of individuals from our Party. The WRP, RCWP, RSM and other small groups and Marxist clubs such as the "zhozheki", NSDR, various VKP(b), RCP(b), RKSM in VKontakte eventually gave up on the idea of creating a "real people's revolutionary party" in order not to stir up even more strife among the left, or split even further on the issue of attitudes towards the new government: many of them still call us "fake communists" and urge us to "continue the struggle for true socialism." "The Communists of Russia," who recently got rid of Suraikin as Central Committee Chairman, have joined us. In general, today we can say with confidence that our Party has attracted to itself practically all the serious and not-so-serious leftist forces in the country."
 russia.113.a: "Unity is our strength!"
 russia.114.t: "German-Russian Oil Deal"
 russia.114.d: ""
 russia.114.a: "They will come to terms."
 russia.115.t: "Fate of Belarus"
 russia.115.d: "Delegations from Russia and Belarus met in Minsk to sign a historic agreement, the declaration of the Union State! For years we have strived for union and with these uncertain times, it seems the choice was inevitable. The Duma has begun to ratify the integration of 8 new states to the Federation along with the integration of the Belarussian military."
 russia.115.a: "A great day for the Federation!"
 russia.115.b: "A great day for the Union!"
 russia.116.t: "Continuation of the Modernization Programme"
 russia.116.d: "Ok retard this is how this mechanic works. You do the focus and get an event, you'll have two options to either invest a full or limited budget for that sector. then you'll activate a mission timer. Depending on which budget you chose, you'll have to research either 2 or 3 technologies relating to that sector."
 russia.116.a: "K"
 russia.117.t: "Azov Leadership on Trial"
 russia.117.d: "After long and intense fighting across Ukraine, the neo-nazi paramilitary group known as the Azov battalion has officially surrendered to our forces.\n\nThe Azov battalion's leaders such as Denys Prokopenko were quick to be dragged to the streets and publicly humiliated, stripped off their fascist imagery and were regularly beaten, eventually the attacks ceased as one of the world's shortest trials began.\n\nIn the span of a half-hour people such as Prokopenko, Ihor Mosiychuk and Vadym Troyan were sentenced to death by means of public hanging in Novorossiya. For years Azov has terrorized our people there, acting like rabid dogs, and tearing families apart.\n\nOf course the leadership was quick to break, knowing that justice has finally caught up with them. They were begging, crying and pleading for mercy. Just like how a pig knows that it will be slaughtered, these fascists know their end is near.\n\nToday justice will be served."
 russia.117.a: "Javelins won't save you now."
 russia.118.t: "Heroes of the War Commemorated"
 russia.118.d: ""
 russia.118.a: "They have done this nation proud!"
 russia.119.t: "Destruction of Stepan Bandera's monument"
 russia.119.d: "While the Ukrainians defended the city of Lviv with tooth and nail, they were unable to stop our advance, as our forces continued to march into the city we were able to find Stepan Bandera's monument.\n\nBandera, the Ukrainian 'hero' who collaborated with the Germans during the Second World War, committed several acts of ethnic cleansing against our people. The KGB dealt him justice, but his legacy lives on. The ignorant Ukrainians still praise him, hail him as a hero, when he was nothing more than a bloodthirsty barbarian.\n\nUkraine has fought fiercely in its fight to be the same barbarian it worships, and it is our duty to destroy his legacy. Destroying this monument will be the first step. Within minutes, one of our tanks arrived, aimed at the statue, and fired, obliterating the murderer's image.\n\nHis image has been shattered and will be molten and transformed into medals honoring the true heroes of Russia, now the road remains open to the rest of Europe."
 russia.119.a: "Nazi pigs don't deserve to be remembered."
 russia.120.t: "The Dissolution of the Duma"
 russia.120.d: "When the first representatives arrived at the Duma, they immediately sensed something was off. Zhirinovsky, the elder statesman, stood at the speaker's podium with visible contempt for non-LDPR members. He announced the immediate dissolution of the Duma, causing shock and anger among the opposition. As they confronted him, he hurled insults and the Moscow garrison entered, dragging out opposition leaders. In the end, only the Liberal Democrats remained in the chamber. As the chaos settled, Zhirinovsky took the opportunity to address the chamber, asserting his dominance and making it clear that dissent would not be tolerated. The remaining members of the Duma were left with a sense of unease, unsure of what the future held under the leadership of the LDPR.\nOutside the Duma, protests erupted as news of the events spread. The opposition vowed to fight back against what they saw as a blatant power grab by the LDPR. The international community also expressed concern, with many condemning the actions taken within the Duma."
 russia.120.a: "The waste has been washed away - Russia's Rebirth begins now."
 russia.121.t: "Russian troops stage a coup in Transnistria"
 russia.121.d: ""
 russia.121.a: "Not a single Transnistrian communist will end up in prison again"

 russia.1500.t: "Return to Revaсhol"
 russia.1500.d: "Tallinn smells of smoke, lime, and sea salt. Traces of shelling are still visible on Dom Hill, and a red banner now flies above the former parliament building. Only a few weeks have passed since the Soviet Army liberated Estonia, and Kurvits, appointed to lead the republic's revival, sets foot on his native soil for the first time, not as an exile, but as a victor. The ZA/UM company belongs to him again -those who took his name and his work away from him now stand before the people's court. Estonia is now under Soviet rule, with a people's government and slogans of peace and justice.\nAnd yet Kurvits walks the streets in silence. The revolution he believed in like a song did not come on the soft boots of poets, but on Russian bayonets, with dust and blood...\nBut behind every destroyed house, he sees children smiling at him. He hears an old woman thanking a soldier for bread. He sees young people hanging slogans about equality on the walls.\nHe is still needed by this country. By this revolution. By this people, who are learning to dream again."
 russia.1500.a: "We have no room for error."
 russia.1501.t: "Party Harmony"
 russia.1501.d: "Over the past thirty years, two equivalent paths of party service have intertwined around the party movement in the Central Committee: the first were the masters of the bureaucratic mechanism, forging the order of decisions, the second were the people's leaders, carrying the red banner into the hearts of the masses.\nBut this is not about the pseudonyms "apparatchik" and "activist" but about the merits of each comrade, confirmed by congresses and conferences, and about why they got into the Central Committee: some of them are masters of the Party mechanism, holders of the knots of binding decisions, organizers of negotiations and behind-the-scenes agreements, while the others are people's agitators, propagandists "from the field", frontsmen of ideological campaigns and builders of mass support.\nThe liberal media will always talk about some kind of split, about how the Communists are about to collapse but we all know the truth - there is no split, only healthy discussion within the framework of democratic centralism. We laugh together at the fables of our enemies who try to make us look fragmented and warring."
 russia.1501.a: "Let's get to work!"
 russia.1502.t: "Launch of the Campaign"
 russia.1502.d: "Now that the date of the first elections to the reconstituted Supreme Council has been announced, the Communist Party faces the question of the direction of its election campaign.\n\nThe "bureaucratic" wing of the Communist Party is pushing the idea of focusing the campaign on the figure of the President as the guarantor of the rights and freedoms of the citizens of our socialist state.\n\nActivists, on the other hand, propose to arm themselves with democratic slogans, which will definitely yield results among young people.\n\nWe can choose a compromise option of emphasizing socialism and equality, which will suit both the "apparatchiks" and the activists."
 russia.1502.a: "Let's focus the Campaign on President!"
 russia.1502.b: "Let's emphasize Socialism and Equality!"
 russia.1502.c: "Arm yourselves with Democratic Slogans!"
 russia.1503.t: "ADL "Progress""
 russia.1503.d: "The first congress of the ADL Progress, a broad coalition of various left-wing forces ranging from social democrats to anarchists, was held in Moscow. In his opening speech, the leader of the alliance, Maxim Shevchenko, called the creation of the organization "an important milestone for the entire left-wing movement and the development of democracy in Russia." Bringing together a huge cross-section of people with very different views, the party proposed an extremely general program, emphasizing workers' rights and democracy."
 russia.1503.a: "Interesting..."
 russia.1504.t: "Labor Fatherland"
 russia.1504.d: "The Russian political scene was shocked by the news: Vladimir Kvachkov, together with the leaders of other left-wing patriotic organizations, announced the creation of the Labor Fatherland party. It advocates left-wing nationalist positions, and a significant number of its members are former right-wingers who have "rebranded" themselves as left-wingers under the new government. Although they are still few in number, they may have some influence among the population."
 russia.1504.a: "Interesting..."
 russia.1505.t: "Popular Front"
 russia.1505.d: "Today, Alexei Navalny, who was recently released from prison as part of an amnesty for political prisoners, posted a video titled "Popular Front" on his channel, which went viral among Russian-speaking audiences. In it, the politician announced the creation of a parliamentary coalition with that name and explained that "now that United Russia's dominance has been destroyed, there is an unprecedented opportunity to influence the life of the country, and it must be seized." He called on people to go to the polls and vote for the leaders of the People's Front. Among them are both members of the former non-systemic opposition and some "state liberals" from Putin's administration."
 russia.1505.a: "Interesting..."
 russia.1506.t: "Our Candidates"
 russia.1506.d: "After the defeat of United Russia, its former officials went their separate ways: some joined various anti-communist circles, while others left politics altogether. But now, with the all-Russian elections approaching, most of the old United Russia members are asking to run for the Communist Party at the regional level.\n\nThese people have skills and authority, and if desired, they can be used competently to strengthen influence in the regions, but such a decision may cause resentment among our ideological comrades, who advocate for the nomination of only convinced and proven communists. There is a compromise option, but despite all the desire to please everyone, it is difficult."
 russia.1506.a: "Only trusted comrades are needed!"
 russia.1506.b: "We need a moderate approach"
 russia.1506.c: "Let's resolve the question as pragmatically as possible....."
 russia.1507.t: "The best city on Earth"
 russia.1507.d: "Elections to the newly recreated local councils are approaching, and they will not bypass cities that were formerly under federal and are now under republican jurisdiction. While the candidates in Leningrad and Sevastopol are clear and unanimous, the choice in Moscow is much more ambiguous. n\nActivists are campaigning for the nomination of Valery Rashkin - despite numerous scandals (especially the incident with the moose), which led to his disgrace, he is still popular among members of the Communist Party.\n\nThe more bureaucratic wing supports Leonid Zyuganov, a prominent Communist Party figure and the grandson of the party chairman. Young blood, and with a famous surname, he has every chance of becoming the head of the Moscow City Council.\n\nA compromise option is Vadim Kumin, an influential figure who was nominated by the Communist Party of the Russian Federation for the post of mayor of Moscow in 2018. His nomination suits both the "apparatchiks" and the activists."
 russia.1507.a: "Valery Rashkin!"
 russia.1507.b: "Vadim Kumin!"
 russia.1507.c: "Leonid Zyuganov!"
 russia.1508.t: "Wide is My Motherland..."
 russia.1508.d: "The Soviet Union once granted autonomy to many peoples of our country, which they retained within the Federation. While there are no particular problems with the various small autonomous republics, the situation with Chechnya and Tatarstan is not so simple.\n\nYes, we can put them on an equal footing with the other autonomous republics, but given that the majority of the population there are indigenous peoples who, in recent history, have had a precedent for striving for independence (peacefully or with weapons in their hands), we can temporarily preserve their special status within the RSFSR."
 russia.1508.a: "Make them equal with the other republics!"
 russia.1508.b: "Let's leave their special status... for now."

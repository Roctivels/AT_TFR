 SOV_consolidate_russian_society_desc: "\n\n\n\n\n£GFX_SOV_consolidate_russian_society_banner\n\n\n\n\n\nThis serpent will be defeated,\nThere are many more of us - we are stronger,\nFighters of the great, new Russian army.\nHeaven awaits us all, and hell awaits them all,\nSaid our supreme battalion commander.\nHeroes Z of Chechnya, Tuva, Moscow, Khartsyzsk\nHeroes of Z Chita, Rostov and Norilsk.\nHeroes Z from Sevastopol, Kaspiysk."

 SOV_expand_ratnik_programme: "Expand Ratnik Programme"
 SOV_expand_ratnik_programme_desc: "The Ratnik program is one of the most ambitious modernization projects of the Russian army, which covers the widest range of means of an ordinary fighter: from a machine gun and a knife to armor, a communication system and a backpack with a tent. But the pace of implementation of all these tools is insufficient to increase the efficiency of the entire army. It is necessary to expand the program: thermal imaging equipment from sights to eyepieces and the most modern developments in the field of exoskeletons - and introduce it into as many parts as possible." 
 SOV_improve_deep_battle_theory: "Improve Deep Battle Theory"
 SOV_improve_deep_battle_theory_desc: "Although the theory of deep operations is almost a century old, it has not lost its significance in the modern world: the entire military doctrine of the Soviet Union was based on it during the Great Patriotic War and beyond. Although it is considered "outdated," it would be short-sighted to completely discount it. It needs only a small improvement, taking into account the features of the 21st century war."
 SOV_improve_gerasimovs_doctrine: "Enhance Gerasimov's Doctrine"
 SOV_improve_gerasimovs_doctrine_desc: "Gerasimov's current doctrine presupposes the conduct of a "hybrid war" using the most modern means: cyber attacks, covert operations, support for various proxies in an indirect conflict. We are facing the near-term prospect of a full-scale war with the NATO bloc, and it is necessary to adjust this strategy to our needs. Our army will focus on quality, not quantity."
 SOV_reform_the_officer_corps: "Reform the Officer Corps"
 SOV_reform_the_officer_corps_desc: "Officers in Russia are often divorced from the realities of the field - they receive ranks not for merit, but for their length of service, bringing with them nepotism, corruption and other vices of army life. Therefore, it is necessary to reconnect fighters and commanders, identify the best and drive the worst out into the cold. An officer of the Armed Forces sounds proud!"
 SOV_centralize_military_structures: "Centralize Military Structures"
 SOV_centralize_military_structures_desc: "The current situation with our military structures leaves much to be desired: there are many different departments with unclear powers that overlap with each other, outright bureaucracy and corruption... Centralized control over military structures is needed, like the well-known GKO, which took full power in the Union during the Great Patriotic War, but more focused on the military aspect."
 SOV_unify_command_structures: "[SOV_unify_command_structures_loc]"
 SOV_unify_command_structures_desc: "[SOV_unify_command_structures_loc_desc]"
 SOV_unify_command_structures_rosgvardia: "Military Commissars"
 SOV_unify_command_structures_rosgvardia_desc: "Russian Russian army's main strength has always been its indomitable fighting spirit and faith in the Russian cause. Sometimes it happens that soldiers forget, get lost on the battlefield, and panic. And in order to restore their spirit and guide them on the right path, it was decided to create an institute of military commissars. Their duties will include working with fighters, educating and condemning military misconduct. They will serve to strengthen military discipline in all units!"
 SOV_unify_command_structures_normal: "Unify Command Structures"
 SOV_unify_command_structures_normal_desc: "The Russian and Belarusian armies have long-standing experience in working together: numerous exercises not only by the CSTO, but also by the Union State have made an invaluable contribution to the development of our relations. And now that the issue of the Union State has become more acute than ever, it would be logical to unite the command of our armed forces and the Armed Forces of the Republic of Belarus. Strength is in unity!"
 SOV_give_way_to_youth: "Give Way to Youth"
 SOV_give_way_to_youth_desc: "We are all mortal in one way or another.. Ideas become obsolete, and only new blood helps them live when old people die - from time or from shells. Russia has been famous for its military education for centuries: numerous Nakhimov and Suvorov military schools nurture new generations of officers to serve the Fatherland. Now young blood is necessary for the development of our combat capability, it's time to use it!"
 SOV_promote_reliable_cadres: "[SOV_promote_reliable_cadres_loc]"
 SOV_promote_reliable_cadres_desc: "[SOV_promote_reliable_cadres_loc_desc]"
 SOV_patriotic_zealousy: "[SOV_patriotic_zealousy_loc]"
 SOV_patriotic_zealousy_desc: "[SOV_patriotic_zealousy_loc_desc]"
 SOV_science_in_the_service_of_the_army: "Science in the Service of Army"
 SOV_science_in_the_service_of_the_army_desc: "Modern warfare is not only a war of armies, a war of economies: This is a technological and scientific battle. Whoever has a technological advantage, even with a quantitative disadvantage, has every chance of winning. Modern, cheap and deadly FPV drones, means of combating them, cyber attacks on enemy infrastructure - all this constitutes the war of the 21st century. We cannot afford to lose in this next-generation arms race."
 SOV_modernization_of_aircraft_and_ships: "Modernization of Aircraft and Ships"
 SOV_modernization_of_aircraft_and_ships_desc: "The Russian Navy currently represents a fairly small force, although not lagging behind. The main focus is on submarines, and more specifically on SSBNS, submarines with modern weapons. But the situation with surface forces is rather deplorable: the pride of the fleet, its flagship, Admiral Kuznetsov, has been under repair since 2018, and its further fate is unknown. The vast majority of the ships were built in the Soviet Union, that is, more than 30 years ago. Building a new fleet is too expensive and a long gamble, so it would be logical to upgrade what we already have to a state capable of competing on equal terms with the combined NATO fleet.\n\nThe situation in the Aerospace Forces is better: although there is a huge amount of equipment from Soviet times, there is a lot of it and it is effective. But Europe is slowly but surely starting to catch up with us in this area, as it needs to step up the pace of procurement of the latest Su-57 and modernization of strategic aviation."
 SOV_build_up_air_and_sea_fleets: "Build Up Air and Sea Fleets"
 SOV_build_up_air_and_sea_fleets_desc: "Obviously, the current pace of modernization is not enough for Russian dominance at sea and in the air in the upcoming conflict. Therefore, it is necessary to learn how to build up both the fleet and aviation from our Chinese partners. More small and medium ships, more planes! Every destroyer, fighter and attack aircraft brings us closer to victory over the West."
 SOV_emphasizing_vocational_training: "Emphasizing Vocational Training"
 SOV_emphasizing_vocational_training_desc: "The Russian army has historically been associated not with professionalism, but with mass character: the predominance of quantity against quality. In many ways, it was the extent of our land and numbers that helped defeat our enemies. But times have changed: now the Motherland needs its best sons, not just all of them. More hours to study military theory for conscripts, increase the prestige of contract service and more - all these measures should show that our army is following a new course!"
 SOV_start_armata_production: "Start Armata Production"
 SOV_start_armata_production_desc: "The Armata project is rightfully considered the pride of the Russian army. It uses all the innovations of the 21st century: electronic warfare, active protection, an uninhabited tower and other high-tech. Yes, it's been a long time since it was shown to the public in 2015, but popular wisdom says that it's better late than never. In addition, the Putin government has been criticized for the fact that there are still no soldiers in the army. It's time to close this gestalt."
 SOV_expand_t90_production: "Expand T-90 production"
 SOV_expand_t90_production_desc: "The Armata project is certainly a breakthrough platform for our troops. An uninhabited tower, various electronic warfare systems, radars, active protection - in short, a real hi-tech. One problem: since the show back in 2015, they have not joined the army - the car is too expensive.\nThese concerns are not unfounded, and therefore it would be logical to expand the production of the already proven T-90, rather than establish the production of a completely new type of weapons."
 SOV_new_russian_army: "[SOV_new_russian_army_loc]"
 SOV_new_russian_army_desc: "[SOV_new_russian_army_loc_desc]"
 
 #Army tree scripted loc
 SOV_rollback_serdykovs_reforms_cprf: "Rollback Liberal Reforms"
 SOV_rollback_serdykovs_reforms_cprf_desc: "Serdyukov's reforms have had an incredible impact on the combat capability of the Russian army: tens of thousands of military specialists have lost their jobs as part of the "optimization", staff work has also been disrupted. Although this outspoken pest was kicked out of office for corruption, the aftertaste remained, and many idiotic innovations still remain in force. The new Soviet army will be built almost from scratch, based on the experience of modern conflicts.\nBy whose will did they allow the collapse of our army? Of course, according to Shoigu's will, he is the same parasite as his predecessor! It's time to deal with him and his gang.\nHowever, the issue of PMCs Wagner remains unresolved...\nIt's time to get to work."
 SOV_rollback_serdykovs_reforms_medvedev: "Rollback Serdykov's Reforms"
 SOV_rollback_serdykovs_reforms_medvedev_desc: "On paper, the reform of the Armed Forces proposed by Anatoly Serdyukov looked great: cost optimization, staff structure, and the introduction of a new uniform. But in practice, the reform has only weakened our army: a considerable number of military specialists have been cut. Although he was "asked" to resign from the post of Minister of Defense, the continuation of events under the new head of the ministry did not give the necessary result. It is necessary to completely review the results of the reform and develop a new doctrine based on the experience of modern conflicts."
 SOV_patriotic_zealousy_cprf: "Party-Political Work"
 SOV_patriotic_zealousy_cprf_desc: "The institute of political education and educational work was one of the key features of the Red and Soviet Armies. The political leaders enlightened ordinary soldiers in the cause of Marxism-Leninism, taught soldiers the love of the Fatherland, and during the war they often showed the valor of the Soviet soldier by their example. But with the collapse of the Soviet Union, this institution was disbanded, and less effective means of political work were introduced instead.\n\nThe creation of an institute similar to the political administration in 2018 was a step in the right direction, but this is not enough. Political officers and commissars will be included in the command structure of the new army. We will need everything possible to get ours back out of the hands of the capitalists."
 SOV_patriotic_zealousy_medvedev: "Boost Patriotic Zealousy"
 SOV_patriotic_zealousy_medvedev_desc: "Political and educational work is an important part of military service in our country. Although our army became (for the most part) depoliticized after the collapse of the Soviet Union, the need to educate soldiers with ideas of patriotism and courage has not disappeared. On the contrary, the threat from the West is approaching every year, and that is why working with soldiers is becoming necessary. In 2018, the Main Military-Political Directorate of the Armed Forces of the Russian Federation was created, and we must finish what Vladimir Vladimirovich started."
 SOV_patriotic_zealousy_ldpr: "Spread Revanchist Fervor"
 SOV_patriotic_zealousy_ldpr_desc: "Patriotism is an integral part of military life. But ordinary love for the Motherland and current methods of military and political education are not enough for the goals set by Zhirinovsky. It is necessary to instill in the hearts of fighters the desire to give their lives for the greatness of Russia and hatred of the products of Western liberalism in Eastern Europe. We will grow a military victory out of a spiritual victory!"
 SOV_promote_reliable_cadres_cprf: "The Best of the Best"
 SOV_promote_reliable_cadres_cprf_desc: "Now our country (especially after the purges of the generals loyal to the criminal Shoigu) needs experienced personnel. Therefore, it was decided to call up veterans full of patriotism and experience to serve the Motherland again, which they can apply on the battlefield. Many of them participated in the defense of the White House back in '93 and in the Chechen wars, but still younger officers have a lot to learn from them."
 SOV_promote_reliable_cadres_medvedev: "Promote Reliable Cadres"
 SOV_promote_reliable_cadres_medvedev_desc: "In the eyes of the people, the Russian army has always been and remains a place where nepotism, corruption, outright theft and other diseases of our system flourish. And all because of the unreliability of our army managers, who profit from the combat capability of the Motherland. Therefore, it is necessary to carry out some changes in the leadership in order to increase the effectiveness of the Armed Forces."
 SOV_new_russian_army_cprf: "The Might of The Red Army"
 SOV_new_russian_army_cprf_desc: "History shows that there are no invincible armies. But if any army got close to this proud title, it was the Red Army, and later the Soviet Army. From the hills of Manchuria to the mountains of Afghanistan and the forests of Germany, the Soviet soldier brought liberation from shackles to the peoples of the world. Clouds are gathering over Eastern Europe, but we are ready to go into a formidable battle, a right-wing battle. Now we can proudly say: The Red Army is the strongest of all!"
 SOV_new_russian_army_medvedev: "New Russian Army"
 SOV_new_russian_army_medvedev_desc: "The modern Russian army has come a long way in its existence: from the confusion and vacillation of the 90s, from the crumbs that remained of the power of the Soviet Army, to the current moment, in which it is one of, if not the strongest on the planet. Reborn from the ashes like the mythical Phoenix bird, our armed forces are now capable not only of defending our borders, but also of waging a full-scale war. The current geopolitical situation suggests that polite people will not be out of work."
 
 #Medvedev
 SOV_status_quo_victory: "Victory of the Status Quo"
 
 SOV_convene_the_duma: "Convene the Duma"
 SOV_convene_the_duma_desc: "With United Russia victorious, it is time to cement our victory. Putin is gone, yet the party he created endures. This has caused a lot of uncertainty in our government and society, since our party has no real programs or policies. \n\n  With Medvedev retaking his seat of power, he must set a course for the Russian nation to follow for his next 6 year term.  Will he continue Putin's legacy? Or did he retain the views he held in his first term? \n\n  Only time will tell."
 SOV_pressure_belarus: "Pressure Belarus"
 
 SOV_transnistrian_question: "Transnistrian Question"
 SOV_transnistrian_question_desc: "Pridnestrovie. The first patriots of the Russian world. When the Union fell, it were these Russian patriots who declared their intentions of rejoining its mother nation. And after a combined effort of Ukrainian and Russian volunteer battalions (as well as an ultimatum from the Russian soldiers stationed there), it has seen peace with Moldova for 3 decades. \n\n Yet as the clouds gather, we must focus on integrating the region into our markets and military. They will be the bastion of the Russian world."
 SOV_lukashenko_our_man: "Lukashenko, our Man"
 SOV_lukashenko_our_man_desc: "Alexander Lukashenko has guided Belarus with care. Even the western-sponsored protests didn't stop him. He and his leadership proved themselves as more than capable to help us in our endeavors."
 SOV_stir_up_russian_nationalism: "Stir Up Nationalism"
 SOV_stir_up_russian_nationalism_desc: "For many decades the word "nationalism" was associated with skinheads and nazis in our state. It was, and still is, a deeply controversial term. \n\n Yet is it really the case? Were the defenders of the Soviet Union scum for defending themselves from the Nazis? Were the White movement wrong for taking up arms to defend the old way of life? \n\n Regardless of ideology, nationalism is what drove our country. Red or tri color - the flag didn't matter. For Russia is what ultimately matters most."
 SOV_prepare_for_unification: "[belarus_unification]"
 SOV_prepare_for_unification_desc: "[belarus_unification_desc]"
 SOV_belarus_unification: "Prepare for Unification"
 SOV_belarus_unification_desc: "Belarus, our sister republic. With the Union State agreement being signed more than 20 years ago, many thought the time of reunification was long past due. Yet it is and has been not. Perhaps in the future our brothers in Novorossiya will join us as well, but for now it is time for the two sisters to prepare for that reality."
 SOV_further_integration: "Further Integration of Belarus"
 SOV_further_integration_desc: "With Putin being able to proclaim the Union state before his unfortunate resignation and passing, our current administration has been granted the task to further integrate it. Belarus will become a major region for the Russian economy as was their destiny."
 SOV_belarus_operation: "Military Operation in Belarus"
 SOV_belarus_operation_desc: "Not helping Lukashenko was the second biggest mistake in our modern history after not stopping in to save Yanukovich's government. Now we have not just one, but two sister nations who are led by a pro-western elite who wish nothing more but to destroy anything that connects us. \n Already the Zmagar nationalists are trying to redefine Belarus, make themselves seem as colonized by Russia. However, they are indeed colonized. \n Once before we kicked Poland-Lithuania from these lands and stopped their attempts to assimilate our Belarussian brothers. And now we will do so again."
 SOV_push_back_the_west: "Push Back Against the West"
 SOV_push_back_the_west_desc: "Medvedev has been considered by most as a "pro-western" idealist. Yet it seems that all idealists have limits. Like Vladimir Putin before him, Medvedev sees current Europe as an adversary. The 2000s dreams of the Russo-European axis as a third balance of power against America and China are long gone. \n As the Left hand of the West burns in agony, the Right one is rearming itself to contain us. We cannot waste our time on useless trivial dramas in the Duma. The system Putin built is too static for what's ahead, and the President's goal is to ensure Russia survives no matter what. \n\n The boogeyman stories the Europeans tell themselves about us are real, for we will make it so."
 SOV_putinism_with_human_face: "Putinism with a Human Face"
 SOV_putinism_with_human_face_desc: "While his first term brought Russia into the WTO and set a course for cooperation with Europe, for most in Russia it was clear that it was Putin who ran the show. Yet it seems that after all these years the ideas our current president had never went away. \n\n Dmitri Medvedev has decided that the system must adapt to the current challenges of the world. With the hegemon killing itself we cannot remain idle under the guise of stability. \n\n Russia must change, for there is no more perfect moment such as this."
 SOV_money_for_pensioners: "Money for Pensioners"
 SOV_money_for_pensioners_desc: "While we have increased the age of retirement a few years back, we cannot leave our elderly without support. In the current times of crisis we must show the image of stability and strength for those who vote for us. Besides, it can boost our poll numbers. A win-win."
 SOV_tighten_media_noose: "Tighten the Media's Noose"
 SOV_tighten_media_noose_desc: "As we move closer and closer to the date of our great struggle, we must make sure our media sphere is under our complete control. For too long western projects like "Novaya Gazeta" and "Radio Liberty" have operated freely on our soil. Our information will be carefully curated and checked for any misinformation that would be made against us."
 SOV_a_toast_to_our_friends: "A Toast to Our Friends"
 SOV_a_toast_to_our_friends_desc: "While big business and oligarchs do have their share of problems, for the time being they answer to our interest. Let us congratulate them for their loyalty!"
 SOV_weaponise_gazprom: "Weaponize Gazprom"
 SOV_weaponise_gazprom_desc: "Gazprom is too valuable to simply remain an energy company. With the world on fire, we have essentially become one of the biggest energy exporters in the world. For a decade now we have fed Europe with cheap gas and have been shown little in the way of respect. \n Perhaps it is time for the Europeans to learn that their prosperity partially relies on us."
 SOV_them_in_our_pockets: "Have them in Our Pockets"
 SOV_them_in_our_pockets_desc: "Our oligarchs have something that we desperately need: foreign networks. Media, finance, industry, contacts - they have much in terms of foreign capital. It is time they put it to use for the betterment of Russia. There are a lot of people in Europe who like us, but there are even more people who like our money."
 SOV_central_asian_military_operation: "Declare Central Asian Military Operation"
 SOV_central_asian_military_operation_desc: "The governments of central asia are in a peculiar position. For decades they have tried to distance themselves from us and diversify their economic partners. And while we could ignore western NGOs, schools and business buy-outs in the past, we cannot do the same today. \n\n Central Asia will have a choice between CSTO and NATO. And, well, choosing NATO will have consequences."
 SOV_caucasus_military_operation: "Declare Caucasus Military Operation"
 SOV_caucasus_military_operation_desc: "The Caucasus has always been a difficult region to navigate in. Georgians who hate us for stopping their invasion of South Ossetia. Azeris and Armenians are constantly fighting. Yet we cannot leave this flank undefended. NATO could try getting Georgia or Azerbaijan on their side, which will compromise our entire southern group. \n\n We will send them an ultimatum of cooperation and friendship. If they refuse, well, Russia will find people in their nations who will be willing to take up leadership for that task."
 SOV_recognize_donbas: "Recognize the Donbass Republics"
 SOV_recognize_donbas_desc: "It is a shame that we didn't do this sooner. The Donbass republics died and bled for us, so why should we continue to ignore their sovereignty? They are more than worthy of being recognized, for it is they who birthed the Russian spring to life."
 SOV_address_the_nation: "Address the Nation"
 SOV_address_the_nation_desc: "The time has come. We will save our Donbass brothers from the Ukrainian government. Yet Europe is almost guaranteed to intervene. That matters little. They may outnumber us, but that is fine too. We defeated Napoleon with vastly inferior numbers. We stopped Hitler from entering Moscow while being outnumbered almost 2 to 1. \n\n And just as in the past, the Russian Eagle will return to being the leader of Europe."
 SOV_reorganize_russian_armed_forces_UR: "Reorganize Russian Armed Forces"
 SOV_reorganize_russian_armed_forces_UR_desc: "The Army "reforms" done by Serdyukov in 2010 have made our army a counter-insurgency force mainly. Closing military academies and making the army the smallest it has ever been since Peter the Great. With the struggles ahead we must return to massive armies instead of small professional ones."
 SOV_expand_ratnik_UR: "Expand the Ratnik Program"
 SOV_expand_ratnik_UR_desc: "The Ratnik Program has largely improved the Russian soldier. Alas, it is still not a true "universal" soldier loadout. Improving it would be best."
 SOV_ensure_officer_loyalty_UR: "Ensure Officer Loyalty"
 SOV_ensure_officer_loyalty_UR_desc: "Our officers must be ideologically willing to fight for our nation. We must make sure no radical elements enter the officer corps."
 SOV_reform_officer_schooling_UR: "Reform Officer Schooling"
 SOV_reform_officer_schooling_UR_desc: "The current age is drastically different from the conflicts of the past. Our officers must use the advanced warfare tactics used in the Donbass and adapt them for field armies. Our Officers must strive to become the spearheads in this technological leap."
 SOV_armored_infantry_UR: "Armored Infantry"
 SOV_armored_infantry_UR_desc: "The switch to a small, professional army had put large emphasis on mobile infantry battalions. Instead of scraping the idea, we should integrate it into the doctrine."
 SOV_artillery_surpremacy_UR: "Artillery Surpremacy"
 SOV_artillery_surpremacy_UR_desc: "While the mobile doctrine was good for fighting insurgent threats, conventional warfare of the 21st century will be won by superior firepower. "
 SOV_enforce_doctrine_standards_UR: "Enforce Doctrine Standards"
 SOV_enforce_doctrine_standards_UR_desc: "Many think that the Soviet doctrine is ineffective in modern times. Yet if we are to fight a near-pear foe the Western doctrine of expensive munitions and small forces will not suffice. Advancing the doctrine further is crucial. "
 SOV_boost_aviation_funding_UR: "Boost Aviation Funding"
 SOV_boost_aviation_funding_UR_desc: "Our airforce is in need of a large investment. Modernizing it is crucial for the challenges ahead."
 SOV_modernize_fleet_UR: "Modernize the Fleet"
 SOV_modernize_fleet_UR_desc: "In order to stay competitive in the waters, we must improve our ship designs to fit in the modern era. "
 SOV_build_up_western_airbases: "Buildup Western Airbases"
 SOV_build_up_western_air_bases_UR: "Buildup Western Airbases"
 SOV_build_up_western_air_bases_UR_desc: "While modernizing the fleet might be beneficial, the air force needs further attention. Expanding the air bases is crucial for our future endeavors."
 SOV_reinforce_black_fleet_UR: "Reinforce the Black Fleet"
 SOV_build_up_air_and_sea_fleets: "Buildup The Air and Sea Fleets"
 SOV_build_up_air_and_sea_fleets_desc: "After uniting the different shipbuilding and aviation building companies into 2 monolithic ones, we are able to start our plans into motion. We will place extra orders on ships and planes in order to expand our forces. Factories that have been largely dormant ever since the USSR fell will work non-stop to fulfill our plans. "
 SOV_build_up_western_military_district_UR: "Builup the Western Military District"
 SOV_build_up_western_military_district_UR_desc: "The West has always been our military priority. We must make sure that our western district is able to compete with the challenges. "
 SOV_mass_produce_t14_UR: "Mass Produce the T-14"
 SOV_mass_produce_t14_UR_desc: "The T-14 is our pride and joy. However, our industrial complex did not bother to mass produce it due to its cost and an unwillingness to spend money on anything except themselves. We will shake up the industrialists and make sure the Armata becomes the new face of the Russian army."
 SOV_mass_mechanization_UR: "Mass Mechanization"
 SOV_mass_mechanization_UR_desc: "With a return to a mass scale army, a question of mechanization has arisen. A lot of our new units simply do not have enough vehicles to use, and soviet stockpiles are only used for emergencies. We must scale up the production of armored vehicles. "
 SOV_special_military_operation_ur: "Special Military Operation"
 SOV_special_military_operation_ur_desc: "Ukraine, a country born out of a series of mistakes by Russian rulers, has long been a source of tension between Russia and the West since the 19th century. Since the 2014 revolution, Western powers have used Ukraine to counter Russia. Their goal is to turn it into a battleground, draining the resources and lives of Slavic people. As their plans come to fruition, it is crucial for Russia to act decisively. Ukraine will no longer threaten Russia, and one day, it may return to the Slavic fold, rejoining its roots."
 SOV_protect_civilian_lives: "Protect Civilian Lives"
 SOV_protect_civilian_lives_desc: "It is important to remember that our military operations in Ukraine are focused on targeting extremist facist groups and the government in Kyiv, which is under the influence of Western powers. However, Ukrainian civilians, particularly those in the conflict-affected eastern regions, are not our enemies. In fact, they are key to the success of our liberation efforts, and winning their support is essential. As we advance, our forces must prioritize the protection of civilians, their property, and their safety. We aim to demonstrate to the world that the Russian military is not the "Tatar army" some claim it to be, but rather a disciplined, elite forces."
 SOV_operation_armageddon: "OPERATION: §YARMAGEDDON§!"
 SOV_operation_armageddon_desc: "Sergey Surovikin, often criticized in the West as the "Butcher General," is in fact a highly skilled and effective commander. His leadership is bold and decisive, capable of maximizing the potential of his troops. He has demonstrated this ability both in peacetime and on the battlefields of Syria, where he turned ordinary soldiers into a formidable force. For the military operation in Ukraine, it may be worth considering General Surovikin's approach. By advancing with resolute determination and overwhelming force, we could significantly weaken the resistance of the government in Kyiv and the Ukrainian military. This strategy may lead to substantial collateral damage, and Ukraine's infrastructure could be severely impacted by our artillery and air strikes. While the loss of life and destruction is tragic, such sacrifices are sometimes seen as necessary in the pursuit of strategic objectives."
 SOV_civil_military_administrations: "Civil-Military Administrations"
 SOV_civil_military_administrations_desc: "Since 2014, Ukraine has experienced significant instability, driven not only by ethnic tensions and an ongoing low-intensity conflict but also by widespread corruption within the government, inefficiencies in the administrative system, and the exploitation of resources by economic oligarchs. However, with the arrival of Russian forces, we anticipate substantial change. We will establish civil-military administrations in the newly liberated territories, working quickly to restore the local economy and social order. This will mark the first genuine form of governance that represents the interests of the Ukrainian people since the current leadership took power in Kyiv. We are committed to improving their lives, offering greater prosperity and stability than before the conflict began."
 SOV_return_novorossiya_to_home: "Return Novorossiya To Motherland"
 SOV_return_novorossiya_to_home_desc: "Donetsk, Lugansk, Zaporozhye, and Kherson are regions rich in history and deeply tied to the Russian world. However, they currently find themselves isolated due to the ongoing Russo-Ukrainian conflict. We believe this situation is on the verge of resolution, and these territories will soon rejoin their rightful place in history. By organizing a national referendum, we are confident that the people of Russia will support the reintegration of these regions into the Russian Federation. While some may dismiss the referendum as a mere formality or accuse us of creating a "Potemkin village," the truth will ultimately prevail. Despite any opposition, we remain resolute in our determination, knowing that the Russian people will continue to achieve success."
 SOV_our_historic_duty: "Our Historic Duty"
 SOV_our_historic_duty_desc: "The conquest of the Ukrainian region by Tsarist Russia established Russian governance and cities. However, during World War II, this was threatened by the German Nazis and their allies. We must never forget that it was the great Soviet Army, along with millions of heroic individuals, who stood up to defend Ukraine from the threat of Nazism. In the decades that followed, they helped secure Ukraine's prosperity and stability. Today, the grandchildren of the heroes of the Great Patriotic War are once again facing the forces of fascism in Ukraine. While communism may no longer be the rallying cry it once was, the fact remains that fascist forces will always be defeated by our soldiers. This truth stands firm."
 SOV_form_pro_russian_brigades: "Form Pro-Russian Brigades"
 SOV_form_pro_russian_brigades_desc: "Even outside the borders of "Novorossiya," threats remain on Ukrainian soil. It is difficult to predict when anti-Russian forces in Ukraine may once again destabilize the region and pose a danger to our people. Therefore, we may choose to support local pro-Russian armed groups, united by common cultural and ethnic ties. These groups could then confront Ukrainian militant forces, helping to protect our borders."
 SOV_fund_anti_banderite_partians: "Fund Anti-Banderite Partisans"
 SOV_fund_anti_banderite_partians_desc: "Even outside the borders of "Novorossiya," threats remain on Ukrainian soil. It is difficult to predict when anti-Russian forces in Ukraine may once again destabilize the region and pose a danger to our people. To against those in Ukraine who continue to honor the Nazi collaborator Stepan Bandera, we can remain united under the banner of anti-fascism. By establishing a paramilitary force to combat these nationalist factions, we can help protect our borders."
 SOV_war_is_peace_UR: "For a Just Cause!"
 SOV_war_is_peace_UR_desc: "This war may be the "ultimate battle" we've long anticipated, allowing us to put an end to the so-called "containment strategy" imposed by Western countries. It will break the political, economic, and cultural constraints on the Russian people, enabling the Russian nation to achieve true liberation. In this 'total war,' our citizens will come to understand this through the efforts of the media, cultural advocates, and online platforms. As a result, the concept of a "sacred war of justice" will become deeply ingrained in every Russian."
 SOV_trample_over_kiev_UR: "Trample over Kiev"
 SOV_trample_over_kiev_UR_desc: "Although the special military operation against Ukraine has severely weakened the nation, it has not obliterated it. Given that there are still active anti-Russian forces in its remaining territories, some might argue this was a grave mistake. However, this error will now be corrected. Our forces will decisively crush Ukrainian resistance. The sight of T-14 tanks rolling into Kiev's Independence Square will end any hope of defiance. Moreover, the European Union should abandon any plans to use Ukraine as a forward base to counter Russia."
 SOV_crack_down_on_protests_UR: "Crack Down on Protests"
 SOV_crack_down_on_protests_UR_desc: "We must admit that persistent Western propaganda has clouded the minds of our youth, particularly those from Moscow, St. Petersburg, and Yekaterinburg, leaving them confused and unable to discern right from wrong. The so-called "awakened generation," influenced by liberalism, follows Western media's calls and takes to the streets in 'anti-war' protests. In times of peace, we might turn a blind eye to such displays, perhaps only deploying the police to disperse the crowds. But in wartime, leniency is a luxury we cannot afford. The National Guard will end their illusions by incarcerating protest leaders, sending a clear message that efforts to destabilize Russia through public opinion will be futile."
 SOV_to_serve_russia_UR: "To Serve Russia"
 SOV_to_serve_russia_UR_desc: "One significant advantage of Russia's vast land is its virtually limitless supply of recruits for the army. From Murmansk to Vladivostok, and from the Kamchatka Peninsula to the Caucasus, young men and women from diverse backgrounds join the ranks, giving Russia a manpower advantage unmatched by any adversary. To further strengthen our military capacity and boost the morale of soldiers on the front lines, the Russian government is set to introduce a comprehensive policy package. These measures include better material support for military families, more medals, higher compensation for casualties, and opportunities for outstanding soldiers to attend senior officer training. By showcasing these benefits, the government hopes to inspire more people to serve Russia."
 SOV_authorize_banned_weapons_UR: "Authorize Banned Weapons"
 SOV_authorize_banned_weapons_UR_desc: "The scale and intensity of the current war surpass any conflict since World War II, a reality that even the boldest Cold War strategists could hardly have imagined. To secure victory and demonstrate our military's latest advancements, we will deploy new weapons, including large rocket launchers, drones, and unmanned combat vehicles. Some of these weapons were previously restricted due to their potential for excessive collateral damage or instability. However, with those restrictions now lifted, we can confidently use them to achieve significant results."
 SOV_operation_rokossovsky_UR: "OPERATION: §YSUVOROV§!"
 SOV_operation_rokossovsky_UR_desc: "Alexander Suvorov is undoubtedly one of the most brilliant military commanders in our nation's history. His campaigns in the Balkans, Poland, and Italy were so successful that they left Europe's most formidable armies and generals in awe. As such, naming the latest Russian military operation after him is a fitting tribute. The defenses of Estonia, Latvia, and Lithuania will be swiftly overcome by our forces, disrupting NATO's long-standing strategy of using the Baltic States to contain Russia."
 SOV_operation_aleksandr_UR: "OPERATION: §YZHUKOV§!"
 SOV_operation_aleksandr_UR_desc: "We have successfully eliminated the threat from EU military forces at our borders. It is now time to push our borders towards the North Sea and the Pyrenees. This move fulfills the long-held dream of patriots who have fought for Russia's survival and greatness: to see our army once again become the protector of Europe, as we were in the 19th century. To commemorate this struggle, we will name the operation after Marshal Georgy Zhukov, the legendary leader who commanded Soviet Red Army to conquer Berlin. May his glory forever guide our forces!"
 SOV_mobilize_the_chechens_UR: "Mobilize the Chechens"
 SOV_mobilize_the_chechens_UR_desc: "Thanks to President Putin's efforts, the Chechens, once formidable adversaries, have become some of Moscow's most loyal allies. Although Ramzan Kadyrov still faces significant criticism, as long as he continues to supply the military with his skilled fighters, the partnership will remain strong. With the escalation of the European War, it is now time for Kadyrov to fully commit. The deployment of Chechen warriors to the battlefield will undoubtedly terrify the pampered soldiers of the European Union."
 SOV_deals_with_oligarchs: "Deals with Oligarchs"
 SOV_deals_with_oligarchs_desc: "The oligarchs have the money and the influence to support our economy. Rather than nationalizing their businesses we should instead use their foreign assets and connections to grow our economy."
 SOV_invest_in_CSTO_members: "Invest in CSTO Members"
 SOV_invest_in_CSTO_members_desc: "The members of our alliance are , in the best terms, unprepared for a major conflict. In fact, just like US's European friends in NATO, the junior members of CSTO expected us to protect them for little to no contributions on their part. This will not do. \n We will reorganize their militaries into a joint structure and invest into them. Afterall, we also have plans for them in the coming conflict..."
 SOV_focus_russian_economy: "Focus on the State Corporations"
 SOV_focus_russian_economy_desc: "The state corporations, for all of their wrongs, do have potential. RosAtom is a perfect example of this. A corporation that has made us the biggest nuclear exporter in the world. Implementing similar effectiveness in all of our industries will be crucial."
 SOV_invest_in_donbas: "Invest in Donbass"
 SOV_invest_in_donbas_desc: "The Donbass is a very rich region. And while it stays in economic limbo due to war, that doesn't mean we couldn't revive it. Investing in the region will provide it enough funds to not only pay for itself, but also to integrate into our economy."
 SOV_strengthen_serbia_ties: "Strengthen Ties with Serbia"
 SOV_strengthen_iran_ties: "Strengthen Ties with Iran"
 SOV_nationalize_oligarch_industries: "Nationalize Oligarch Industries"
 SOV_nationalize_oligarch_industries_desc: "While dealing with the oligarchs themselves is problematic for various reasons, nationalizing their industries will be a far simpler matter. After all, a lot of them were given their positions by the government. They should know what happens to those who go against our will."
 SOV_merge_tankograd: "Merge Tankograd"
 SOV_merge_tankograd_desc: "Our tank factories are currently split between multiple businesses, each led by a civilian businessman with little knowledge about coordination. In fact, the only reason our military industry even survived in such good shape was because the businessmen figured it would be easier to sell the produced weapons abroad than scrapping the factory like many others. \n We thank them for this, which is why we will take these factories from them and create a unified armor production conglomerate."
 SOV_invest_education_sector: "People's Oriented Economy"
 SOV_invest_education_sector_desc: "While we could simply do what the Soviets did in regards to industrial development, isn't the improvement of our people's lives a better alternative? More money in the economy and more local products they will be willing to buy. Fair wages will also help our smaller businesses to rise up as our people will have more money to spend on them. Russians deserve a rich life! And the Russian economy deserves it too!"
 SOV_invest_scientific_sector: "Industrial Development Orientation"
 SOV_invest_scientific_sector_desc: "What we need is a large light industry sector that can compete with foreign ones. Factories must be efficient and abundant in our nation. We cannot become the workshop of the world, yes. Yet we can always fill the niche similar to Germany or Japan. Time to spend all that money that we had saved up."
 SOV_invest_nulcear_power: "Military Industry Priority"
 SOV_invest_nulcear_power_desc: "As much as we would like to focus on the civilian industry, the military must take priority. We have no money nor time to waste. Russia's main goal in the current decade is to survive. Consumerism can wait." 
 SOV_invest_resource_refining: "Civilian Industry Priority"
 SOV_invest_resource_refining_desc: "Civilian Industry expansion will be a great long term boon for Russia. Local businesses will not only keep the money inside the country, but also might help us export our products abroad in the future. Also local industries will be forced to find creative ways overcoming the limited manpower pool. Perhaps it can even lead to automation of our industries?"
 SOV_subsidize_super_computer_research: "National Project: "Developed Ural""
 SOV_subsidize_super_computer_research_desc: "The Urals were, and remain, our major industrial center. It is where our military gets its weapons from. It is where our heavy industry is located. And it is there our next Industrial expansion will occur."
 SOV_subsidize_medical_research: "National Project: "Far Eastern Development""
 SOV_subsidize_medical_research_desc: "The far east has long been eyed for mass development by the government. Ever since the soviet era with the construction of the BAM railway, the region had a mass influx of residents in the new cities. Yet after the fall of the USSR, this region remains fragmented and isolated from the rest of the country economically. \n For our multipolar ideas to work, we must ensure the Far East becomes a new economic pillar of Russia. Let Vladivostok be the new St. Petersburg!"
 SOV_invest_in_computing_technology: "Sovereignization of Economy"
 SOV_invest_in_computing_technology_desc: "Our economy is largely dominated by state corporations, foreign conglomerates, and "russian" businesses registered off-shore. Yet our President thinks that we must return to the industrial power we once were. And it is his plan we are going to follow. Aside from the prosperous IT sector, we will revive and create new high-tech industries for our nation."
 SOV_attract_chinese_investors: "Attract Chinese Investors"
 SOV_attract_chinese_investors_desc: "As sad as it is to say, we need foreign investors for our economic revival to be complete. And while Europe is closed to us, China seems to have a large number of people who are willing to develop our Industries. Their funds and connections will be a great boost for our nation."
 SOV_return_to_gold_standard: "Return to the Gold Standard"
 SOV_return_to_gold_standard_desc: "You know, we should have done this long ago. We have a lot of stored gold and a lot of rubles that need a solid ground to stand on to be a strong currency. And with global markets reforming amid crises, there is no better opportunity to do this. Some nations might complain, but it is their problem."
 SOV_market_regulations: "Enact Market Regulations"
 SOV_market_regulations_desc: "For all the talk about "free market", what we need to prioritize is Russia and Russia alone. With the European conflict looming closer, we must make sure our economy runs primarily on domestic products. "
 SOV_send_military_equipment: "Integrate Belarusian State Companies"
 SOV_send_military_equipment_desc: "While we could simply privatize the Belarussian industry, do we really need that? The system has worked for 30 years now, and we cannot simply abandon it. Besides, the 2020  opposition candidates ran their campaign on privatizing Belarussian businesses or overhauling the current system. Do we really want to use the same framework that the Zmagar opposition proposed? \n\n Do not rock the boat, Belarus will retain its economic model."
 SOV_send_humanitarian_aid: "Privatize Belarusian State Companies"
 SOV_send_humanitarian_aid_desc: "Belarussian Industry is not competitive in today's market. While we can retain everything as it was, it is better to let the market decide what industries Belarus prioritizes. \n\n Batka can grumble all he wants, but the economy matters more."
 SOV_force_petrol_ruble: "Enforce the Petrol Ruble"
 SOV_force_petrol_ruble_desc: "With both America and Saudi Arabia falling into civil wars, it presents us an amazing opportunity to gain even more profits from the oil trade. The petrodollar has come to an abrupt end, and it seems we have room to enforce our positions. \n People have laughed at us for being "a global gas station", calling us a nation whose time will come to pass. Yet as the black gold burns around the world, it is the same critics who crawl to us for even a drop of our riches."
 SOV_support_two_party_system: "Support a Two Party System"
 SOV_support_two_party_system_desc: "While United Russia has served Putin in his endeavors, it is clear to all that the party was essentially a "yes-man" to the President. It has no real goals nor ideology and has been infested with lobbyists and people who are generally seen as "from a different world" by the public. \n\n And while the reason America fell was due to the polarized two-party system, it does have its merits. Compared to constant European party gridlocks that immobilize the state or our and Japanese monoparty statism, the American system for the most of history was a stable one. We will emulate this system by uniting all the leftist parties into one, effectively making it center-left thanks to JR-FT and Mironov. We, meanwhile, will take over the cadres of the LDPR and remodel ourselves as a center-right party. \n Both parties will have similar programs and foreign policies, ensuring that they will be able to cooperate with each other on key issues. \n\n America is burning in division, yet there was a time when candidates could campaign as either party (or in some comedic cases both at the same time) without problem. This is what we must replicate. Socialist, Nationalists, we are all Russians. We must never forget that."
 SOV_loosen_media_restrictions: "Loosen Restrictions on the Media"
 SOV_loosen_media_restrictions_desc: "While our future conflict with Europe is looming near, we do understand that giving people a voice in the media is crucial. By loosening restrictions on what can and what cannot be talked about in the media, we will make it a viable place of discussion and criticism \n Russians should be open to speak their mind, for that is what freedom is all about. Of course, just as in any free country, we will have freedom to choose what issues we will tackle and what we will ignore. "
 SOV_enact_anti_corruption_laws: "Enact Anti Corruption Laws"
 SOV_enact_anti_corruption_laws_desc: "As much as we would like to think of our system as perfect, we cannot deny that there are a lot of bad actors inside it. While we can always simply ignore this problem, our President thinks that now is not the time for idleness. Stealing trillions of rubles every year was a problem during the previous years. Now it is unacceptable. \n\n The world is heading to a radical shift. We cannot rely on people who view our nation as a simple cash-out job with their mansions in Europe and the Middle East. Russia has no money to waste in the struggles that are to come, for the fire continues to burn."
 SOV_secure_oligarch_loyalty: "Secure Oligarch Loyalty"
 SOV_secure_oligarch_loyalty_desc: "The oligarchs remain an influential group in our society. While we can bypass their interests thanks to them being largely pressed into servitude, it is clear that we cannot simply let them be if we ever wish to achieve victory over Europe\n\n We will not ask much of them. Their yachts, villas and riches can remain. As long as they show results and support us wholeheartedly. \n\n The Russian elites have always wanted to be seen as part of the "global" billionaire party. But what we propose is much grander. A prospect of owning an entire continent's economy for their own benefit... under our watchful eyes and grip. They would be fools to not accept."
 SOV_refine_the_constitution: "[SOV_refine_the_constitution]"
 SOV_refine_the_constitution_desc: "While the current constitution does have some problems, the President decided that simple amendments and revisions will be enough to address the current issues. Our system has been built around this framework, yes. Yet we always made sure to use informal networks to pursue our agendas when we ran into such problems. \n\n  The American and European democracies also have similar problems, yet they don't rewrite their constitutions completely. In our pursuit of change we cannot blind ourselves to naive idealism. Reinventing the wheel is unnecessary as long as future administrations study past mistakes, both local and foreign."
 SOV_refine_the_constitution_loc: "Refine the Constitution"
 SOV_amend_the_constitution: "Constitutional Renewal"
 SOV_amend_the_constitution_desc: "The current constitution, unfortunately, does not adhere to the President's ideas on how the ideal Russia should function.\n There are a lot of uncertainties and loopholes that can be used by nefarious actors. Such a constitution was enough with Putin in charge, for his influence and decision could safely keep the system in check. \n\n Yet what happens if someone without Putins or Medvedev's ability accepts the Presidency? Will they be able to move through these competing interests, or will they be swept away by them, becoming nothing more than figureheads to the siloviks and big business? \n\n Our system must be ironed out, and for that a complete overhaul will be necessary."
 SOV_reinforce_putin_constitution: "Reinforce Putin's Constitution"
 SOV_celebrate_putins_legacy: "Celebrate Putin's Legacy"
 SOV_celebrate_putins_legacy_desc: "We remember how the west wrote about us in 2000. "Russia is finished" was their claim. Yet look at what happens now. We have destroyed Semibankirshina, we have tamed the Caucasus. We have retook Crimea and we are preparing to finish liberating the Donbass with our allies. Finally, we have stood up against the West once again, like a phoenix rising from the ashes. \n And who can we thank for this? \n Vladimir Vladimirovich Putin. And it is his legacy that we will cherish."
 SOV_church_support: "Patriarchal Support"
 SOV_church_support_desc: "Ever since the Church was allowed to practice in the open, they have seen a transformation. No longer are holy fathers retired Afghan vets who rebuild churches by themselves while also combating the rise of Western sects of Christianity as well as literal cults. With Putin's help, the Church has regained a lot, even if it cannot return to the pre revolutionary years. \n\n  Orthodoxy was the foundation of our people, and its support will give Medvedev more legitimacy while undermining the image he held during his first term."
 SOV_amend_the_constitution: "[SOV_amend_the_constitution]"
 SOV_amend_the_constitution_desc: "The current constitution, unfortunately, does not adhere to the President's ideas on how the ideal Russia should function.\n There are a lot of uncertainties and loopholes that can be used by nefarious actors. Such a constitution was enough with Putin in charge, for his influence and decision could safely keep the system in check. \n\n Yet what happens if someone without Putins or Medvedev's ability accepts the Presidency? Will they be able to move through these competing interests, or will they be swept away by them, becoming nothing more than figureheads to the siloviks and big business? \n\n Our system must be ironed out, and for that a complete overhaul will be necessary."
 SOV_amend_the_constitution_loc: "Amend the Constitution"
 SOV_a_new_republic: "A New Federation"
 SOV_a_new_republic_desc: "Russia has changed a lot in the past 40 years, yet it will change once more. Putin's technocracy has stabilized our nation, yet it also cannot last forever. With the new reforms, Russia is on the path of a democracy akin to the ideals held during the Tsarist era. \n\n Unlike the unstable system we held during the 90s, we will not be lap dogs of another power. We will not demonize neither the tsarist nor the soviet eras that gave us so much. Our history is a mantle that is sacred, and the democracy we will build will be a new era of it. \n\n Russia, Ever Forward!"
 SOV_focus_resource_exploitation: "Focus on Resource Exploitation"
 SOV_focus_resource_exploitation_desc: "As much as we would like to become an industrial powerhouse like China, unfortunately we have neither resources nor manpower to do it as of now. This is why we must focus on resource extraction. While our growing industries will cater to the domestic market, the resources we extract will be exported everywhere, \n Besides, with the world being in such a chaotic state, we are one of the only stable exporters of energy left."
 SOV_industrial_expansion: "Industrial Expansion"
 SOV_industrial_expansion_desc: "While post 2014 economic incentives revived our agricultural sector, our industrial one continues to be in a slump. Yet with America burning, Europe antagonistic and Asia seemingly preparing for a major war, we cannot rely on anyone but ourselves. \n We need our industries to be able to cover most of our local demands. A Russian industry for the Russian people."
 SOV_regulate_trade_unions: "Russian Space Economy"
 SOV_regulate_trade_unions_desc: "While the US civil war was supposed to be an end to commercial space, it seems it actually boosted it. With China and Russia remaining as the major rocket producers, both Europe and Asia seem to use NASA and commercial space cadres to build their own programs. \n As of now, not only is there a boom of satellite production, but also developments in asteroid mining being made like never before. \n We must ride this wave, for our advantageous position makes us one of the main benefactors of the new space market."
 SOV_defense_industry_expansion: "Support Economic Solidarism"
 SOV_defense_industry_expansion_desc: "For a long time, the businessmen in Russia cared little for the worker. Paying him dirt cheap or replacing him with a migrant. Not providing him the needed benefits he was promised. \n But now, as we run out of people and experts, they have no choice but to cater to the masses to survive. A better paid worker is better for the country and should be encouraged."
 SOV_land_reforms: "Enact Progressive Tax Reforms"
 SOV_land_reforms_desc: "It is an unfortunate reality that we need way more money. Thankfully, there is a lot of money we can get that is hidden in the purses of our politicians and businessmen. By implementing a progressive tax reform, we will ensure a steady flow of money coming in our coffers."
 SOV_trade_unions: "Encourage Trade Unions"
 SOV_trade_unions_desc: "As much as we are proud of our Soviet legacy, trade unions remain a rarity in our industries. This has allowed businessmen to not pay enough for our workers and cause our societal situation to decline. By promoting the Unions, we will also be able to put a check on our corporations and their owners from going overboard."
 SOV_centralize_power: "Centralize Power"
 SOV_centralize_power_desc: "United Russia is a clear center of authority of our government, yet the other parties still continue to move semi-independently. For our struggle we must all act as one. By using "The People's Front" platform, we might be able to create a coalition from all the major Russian parties to act under UR banner openly. \n Every session of the Duma we had seen bickering among UR and other parties. A coalition will make it so we can iron out the disagreements and move as one single organism."
 SOV_protect_russian_economy: "Protect Russian Economy"
 SOV_protect_russian_economy_desc: "Our pivot to free trade and foreign investment was a mistake. The Russian economy has been flooded not only by foreigners buying up by businesses, but also by foreign products outcompeting domestic ones. While foreign investors can remain, we will prioritize and protect local companies from foreign ones. Our goal is to be self-sufficient and export-oriented."
 SOV_build_up_air_and_sea_fleets_UR: "Builup the Air and Sea Fleets"
 SOV_healthy_conservatism_to_europe: "Healthy Conservatism to Europe"
 SOV_healthy_conservatism_to_europe_desc: "The current European satellites have had most of its globalist influence burned down. Yet the question remains: What will replace it?\n\nWe have decided to set up Conservative uni parties as of now. Letting in too many parties can undermine their reconstruction efforts and anger the people. Better not rock the boat."
 SOV_european_political_birdcage_experiment: "European Political Birdcage Experiment"
 SOV_european_political_birdcage_experiment_desc: "The current European satellites have had most of its globalist influence burned down. Yet the question remains: What will replace it?\n\nWhile we could force these states to adopt our values, why not experiment? Gather anyone you can, regardless of ideology, and set them an even playing field. The only requirement for them to participate will be their friendly stance towards us.\n\nLet Europe be free from neoliberal tyranny. A tapestry of parties will rise, giving our European partners the right to choose one that fits them best!"
 SOV_medvedev_doctrine: "Medvedev Doctrine"
 SOV_medvedev_doctrine_desc: "With our newly acquired sphere of influence, an inevitable question arises: what is our course of action for administrations that refuse the Russian World? We have seen many such cases over the years, especially during Putin's time. We have been too lax in our efforts and attempts at "Soft power" and let our "allies" use us for free money without actually doing their part of the deal. \n\nOur Great President does not think this is reasonable. Russia will, in any way it can, make sure its investments in her partners pay off. Just like during Brezhnev's time, any attempt to sabotage CSTO unity and leave the alliance will be put down by our (and local) forces. Love has won, and we will make sure the loving embrace of our Russian world is eternal."
 SOV_novorussian_integration: "Revival Of Novorossiya"
 SOV_novorussian_integration_desc: "The land we sacrificed so much for. It has been battered and bloodied. Industries destroyed, land scorched. This Jewel, one that began the industrialization of both the Russian Empire and later the Soviet Union, will be revived once more. The sacrifices our patriots in the Donbass endured can only be repaid by prosperity to the whole region."
 SOV_new_territories: "Securing New Territories"
 SOV_new_territories_desc: "With our Victory we have not only liberated the ex-soviet space from globalism, but also took over a majority of the ex-warsaw pact territories. For now our control is shaky at best: with many still harboring distrust towards us. We must establish a permanent base of support in these regions. Bitter war veterans, political opportunists, genuine allies - all of these local personnel, alongside a permanent military mission will be used to restore a regular civilian life to the area. "
 SOV_russian_victory: "Victory!"
 SOV_russian_victory_desc: "As the guns settle, we find ourselves at the dawn of a new era. Our goals have been realised: the Globalist menace has been driven back west, battered. Hopefully they will be of no threat to us for the foreseeable future. This victory came to us at a great cost, and now the territories we liberated are in need of reconstruction. Perfect time to slow things down and focus on our people."
 SOV_new_age_ukraine: "New Age for Ukraine"
 SOV_new_age_ukraine_desc: "After so much bloodshed, Ukraine has been defanged and under our control. The nationalists are being hunted down in the countryside, yet the hate towards our government still persists. It is time for the two slavic sisters to reconnect and move past the damage the globalists inflicted on our relationship.\n\n"We will never be Brothers again" - cries the Banderite, yet we cannot hear his squeals. Our Ukrainian brethren will receive what they need for their revival."
 SOV_glorify_veterans: "Glorify Veterans"
 SOV_glorify_veterans_desc: "Hundreds of thousands of our citizens participated in the war against NATO. They are our heroes, our pride and the soul of our nation. We must not abandon them after their duties. Be they healthy or disabled, be they rich or poor - we will make sure they can adapt to civilian life. Let our soldiers be met like the heroes they are!"
 SOV_rebuilding_period: "Rebuilding Period"
 SOV_rebuilding_period_desc: "As we move away from the War Economy, it is time to face the elephant in the room: we have, literally, half a continent worth of reconstruction.\n\nGranted, the Soviet Union managed to do it, so we should be able to do it as well. Russia propper will be our first region to rebuild considering how they sustained the least damage."
 SOV_rebuild_new_allies: "Rebuild European Allies"
 SOV_rebuild_new_allies_desc: "Our allies are battered as well. We must, for the sake of our future plans, make sure they recover from this destruction in time. The USSR once managed to rebuild Eastern Europe with one third of its riches gone and 20 million dead. We surely can do the same."
 SOV_rebuilding_affected_regions: "Reconstruction of The Most Affected Regions"
 SOV_rebuilding_affected_regions_desc: "The bloody battlefields of this war must be a relic of the past. Ukraine, the Baltics, Belarus: these areas will be revived to their former glory. The fields will be rid of mines and drone parts. The Russian World will prosper once more!"
 SOV_russian_products_to_west: "Establish Russian Industries in West"
 SOV_russian_products_to_west_desc: "A great way to speed up the recovery of our allies is to integrate them into our economy. Cheap resources and energy will be the initial push to get them going. They can also become a good free market for our own products. Our Industries were not destroyed in the war after all, might as well make sister companies in Europe to assist our friends there."
 SOV_start_multipolar_world: "Start Of the Multipolar World"
 SOV_start_multipolar_world_desc: "With CSTO cemented as a long-lasting alliance and the Economies from Poland to Tajikistan united, it is time for us to return to the world stage. \n\nThe Russian World, as righteous as it is, is not the only bloc to exist in the world.\n\nBe it Asia, Africa or the Americas, there are many regional players with their own needs and goals that have risen up in the absence of the United States.\n\nOur task ahead is to navigate in this new reality."
 SOV_future_russia: "Future of Russia"
 SOV_future_russia_desc: "We have finally achieved our primary goals. And during the time of reconstruction, a question had arisen: what do we do now? What is our purpose in the world, and how will our system evolve after our victory?\n\nOur great President, Dmitri Medvedev, wonders that too. He has expressed his satisfaction with the outcome we achieved, yet it is clear to all that he is tired from his duties. No wonder: reshaping Russia into his vision and going to war against NATO would weather any leader.\n\nAnd now, it seems he will decide the course of our future yet again."
 SOV_our_common_future: "Encourage European Industrial Self Reliance"
 SOV_our_common_future_desc: "While we do wish to expand our economic influence over Europe, it would be foolish to not let them develop their own industries. The cheap energy and fuel prices that our corporations provide will make sure they can recover their home-grown industries.  Our allies will not be an economic burden, but our trusted partners!"
 SOV_russian_european_union: "Introduction of Ruble Zone"
 SOV_russian_european_union_desc: "One of the final reforms for European reconstruction is to create a single market between our nations. Similar to the EU of old, we will create the Ruble Zone. Noone can refuse us too, considering our money is essential for the great recovery. And unlike the European Union of old, we will not meddle in their cultures either!"
 SOV_european_economic_restructurization: "Restructuring of European Economies"
 SOV_european_economic_restructurization_desc: "As we finalize the reconstruction of our allied economies, we must make sure that our influence in them does not erode over time. Our economies will fill each other's void, and just as America did with their marshall plan, we will keep Europe in our pockets."
 SOV_european_allies_modernisation: "Standardization of the European Armies"
 SOV_european_allies_modernisation_desc: "Our new European allies currently possess militaries with a large number of NATO equipment as standard. While the Warsaw pact weaponry still remains in some cases, the current situation forces us to focus on reforms. Any western-made gear must be discarded and replaced with Russian or locally made equivalents.\n\nCSTO might not be the new NATO right now, but it will be soon."
 SOV_towards_multipolarity: "Towards Multipolarity"
 SOV_towards_multipolarity_desc: "With America in a state of a civil war, it is finally time to start the era of multipolarity. Russia obviously cannot be a hegemon. In fact, it was foolish from the Soviets to even try and claim such a burdensome title. Yet, we are content with being just one of the many pillars of power. \n\n Why be the world's police when you can just foster regional players to take up the task for you? "
 SOV_american_policy: "America in Flames"
 SOV_american_policy_desc: "As America burns, now is our chance to attempt to remodel our relationship. Western Europe sends aid to the Union of America , be it "volunteers" or military aid. Why should we be different? There are quite a few factions that can benefit Russia once they take over the country. Be it regional separatists or Isolationists, they have our support."
 SOV_brics: "BRICS+"
 SOV_brics_desc:  "Brics is a good opportunity to bring our vision to light. With the vacuum left by the US, we are now free to take up its mantle. The group needs to become an actual economic club. Not a sphere akin to the Eurozone or ASEAN per say, but as a neutral platform for mutual development. \n\n  Of course, considering India and China are not interested in developing this platform, it is up to us to cement this. "
 SOV_dragon_sun: "Dragon and Rising Sun"
 SOV_dragon_sun_desc: "It is clear that the Sino-Japanese conflicts will be the talk of this decade. Be it the skirmishes over Taiwan or proxy wars and coups reminiscent of the Cold War, the two Asian powers are building coalitions for a possible conflict. And in such a conflict, our position will be crucial to either of the two sides. \n\n Truth be told, we are not enthusiastic about the prospect of choosing only one of the two economic blocks. China, which is an industrial and technological powerhouse or Japan, a failed economic hegemon that can still push its weight and even revive some of its influence thanks to America being gone. \n\n Anyway, our policy towards asia will be of maneuvering between these two. Honestly if we could trade with both it would be an ideal scenario."
 SOV_brics_expand: "BRICS+ Expansion"
 SOV_brics_expand_desc: "Of course, for our plan for Brics to work, we must expand it even further. We should prioritize the nations we are friendly with to gain the most out of this expansion. Soon Brics+ will become a truly global platform of mutual development!"
 SOV_dawn_of_africa: "Dawn of Africa"
 SOV_dawn_of_africa_desc: "Africa is the continent of the future. While wars, climate change and slow rate of urbanization stop it from growing as rapidly as East Asia did last century, it has the population and resources necessary to make that leap. They are almost certain to take the center stage during the latter half of this century. \n The growing African markets present an opportunity for us. Not only can we get allies in the region, but also a consumer base our industries had rarely seen. \n This is an investment for the future of course, for even if they outgrow us, the money we will gain from their development will be enormous."
 #post-med elections
 SOV_medvedev_russian_elections: "New Elections!"
 SOV_medvedev_russian_elections_desc: ""
 SOV_people_russia_chosen: "For the People!"
 SOV_pink_sunset: "Pink Sunset"
 SOV_med_red_dawn: "Red Dawn"
 SOV_for_new_socialism: "For A New Socialism"
 SOV_democratization_capital: "Democratization Of the Capital"
 SOV_social_populism: "Social Populism"
 SOV_united_russia_chosen: "For Unity!"
 SOV_medvedev_path: "Medvedev's Vision"
 SOV_people_program: "Our People's Program"
 SOV_future_your_hands: "Future Is In Your Hands!"
 #ur reformists
 SOV_united_russia_victory: "Victory Of United Russia"
 SOV_united_russia_victory_desc: "Unsurprisingly, the party of the President won once again.\n\nWhile he guides our Party no longer, we must still maintain the course he set. Reaffirm our convictions with a light hand, and healthy traditionalism. We are the vanguard of the multipolar world order, so let's show the world that we will not step away from HIS vision!" 
 SOV_enshrine_medvedev_constitution: "Enshrine Medvedev's Constitution"
 SOV_enshrine_medvedev_constitution_desc: "The Medvedev Constitution is a document that needs no introduction. Revolutionizing the Russian government, it clearly showed the world that we, for all our problems, are a democracy of the highest regard.\n\nIf anything, we should celebrate it to the same extent as the Americans celebrated their constitution. Let it be the light that guides the future leaders of Russia!" 
 SOV_uphold_two_party_system: "Uphold Two-Party System"
 SOV_uphold_two_party_system_desc: "The move to a Two-Party system, while controversial at first, in the end became a very good change. We cemented two blocks inside of our government that align with the people, and unlike the American system it has enough of a common ideological ground to not devolve into left-right bickering. Lets keep our promises and make sure this system survives." 
 SOV_government_reforms: "Governmental Reforms"
 SOV_government_reforms_desc: "While we have already revolutionized our system, it is clear that we need to implement even more reforms. Patch the holes in the system, remove 90s-00s laws that no longer hold purpose or outright work against the government. Time to Iron out everything!" 
 SOV_strength_in_discussion: "Strength In Discussion"
 SOV_strength_in_discussion_desc: "While we imitated the American two-party system, we will not follow their fate. Our people have different opinions and voices, and we will make sure that instead of ideological bickering that helps no one, our politicians will focus more on actual laws and programs. The Russian society will be protected from the most radical elements from seeping into the wider public. Both right and left economic systems are useful for us, and it is our right to use them when we see fit." 
 SOV_inter_party_cooperation: "Inter-Party Cooperation"
 SOV_inter_party_cooperation_desc: "As stated before, the two parties must cooperate for the betterment of the whole. We should not be stuck in a "us vs them" conflict in the Duma. We should encourage our politicians to cooperate with each other over issues they find common ground in. No need to polarise our views too much."
 SOV_a_healthy_patriotism: "A Healthy Patriotism"
 SOV_a_healthy_patriotism_desc: "Before, we have relied on old "political technologists" to create a "patriotic" message among our society. As you can guess, it almost always backfired and led to nowhere. Funnily enough, while Russians might not have liked our bureaucratic system, it was their bottom-up patriotic initiatives and messaging that keep our country running.\n\nLet us sponsor and support patriotic initiatives that are made by Russians themselves, for they clearly work."
 SOV_culture_of_anti_corruption: "Culture Of Anti-Corruption"
 SOV_culture_of_anti_corruption_desc: "The bureaucrats and politicians were seen for a long time as... not very decent people. Major corruption cases almost every month, among the ones that were caught had been standart for a long time. Yet, with Medvedev's reign, and the European War, it became clear that we cannot tolerate this problem any longer. We do not have money to spare, so why should we let corruption charges off the hook?"
 SOV_russian_conservative_values: "Russian Conservative Values"
 SOV_russian_conservative_values_desc: "We are, at heart, a conservative nation. Both left and right in our country agree on this. So why should we be something different? While we had some stunts at liberalising our culture, the degradation of social values in the west, and in parts of our own society, cannot remain."
 SOV_united_in_common_history: "United In Common History"
 SOV_united_in_common_history_desc: "Tsarist, Soviet, Modern - these three periods of Russia are all parts of us. While westerners are shocked that we do not shun any of said periods, we understand that forgetting our past is detrimental. Just as there were mistakes, both light and costly, so too there were many triumphs and lessons that we can take. The three flags will wave in unison!"
 SOV_sovereign_democracy_perfecting: "Perfecting Sovereign Democracy"
 SOV_sovereign_democracy_perfecting_desc: "The process by which we do elections, while passable, is still far from ideal. Transparency, public safeguards - these are just some of the things we still need to tackle. Making our digital voting technologies more transparent would be a good start, giving more campaign time for the candidates can also be beneficial. "
 SOV_country_of_the_sun: "Country Of The Sun"
 SOV_country_of_the_sun_desc: "Луч солнца золотого\nТьмы скрыла пелена\nИ между нами снова\nВдруг выросла стена\nНочь пройдёт, наступит утро ясное\nЗнаю, счастье нас с тобой ждёт\nНочь пройдёт, пройдёт пора ненастная\nСолнце взойдёт\nСолнце взойдёт\n"
 #hardliners ur
 SOV_hardliners_victorious: "Reactionaries Victorious"
 SOV_hardliners_victorious_desc: "Dmitry Medvedev was the leader of United Russia for a long time after his first presidency. During his second presidency, he reformed the ruling party into something more conscious—the right wing of the two major forces in Russian politics. The Russian people welcomed the end of United Russia's dominance and its partial democratization with relief and joy\nBut despite all his reforms, the old bureaucrats and figures from Putin's regime still remain within United Russia. They want, no matter what, to roll back Russian politics to the state it was in at the beginning of the decade and preserve Putin's legacy.\nBut will they be able to turn back the meat grinder and restore their former power? Or will the reformers sweep the last remnants of authoritarianism from the political scene? Only time will tell."
 SOV_adjust_constitution_articles: "Adjust Constitution Articles"
 SOV_adjust_constitution_articles_desc: "Although the current Constitution has Putin's foundation, Medvedev's amendments were added to it, leading to the current political system. Of course, there is nothing wrong with it, but uncertainty in some areas can lead to unforeseen consequences. The articles of the Constitution need to be slightly amended along Putin's lines. Strong power means a strong Russia!"
 SOV_subdue_two_party_system: "Subdue Two-Party System"
 SOV_subdue_two_party_system_desc: "The most noticeable result of Medvedev's reforms was a new two-party system inspired by the American and British systems. Although this is a good counterbalance to authoritarian tendencies, it introduces instability into the system. Just look at America! Where has the two-party system led it? To collapse, to fratricidal war!\nAnd besides, the Russian people are not used to this, and our enemies can exploit their weakness! We must get rid of the two-party system...\nIn favor of United Russia, of course."
 SOV_technocratic_administration: "Technocratic Administration"
 SOV_technocratic_administration_desc: "Putin's system was supported by the so-called "Towers of the Kremlin" — various cliques and factions within the bureaucratic apparatus, each with their own ideas about how Russia should be run. Among them were representatives of the security forces and the so-called "technocrats" — more pragmatic managers associated with state-owned corporations.\nDespite the fact that many of them became supporters of reform, we can lure them away with high-ranking positions. Their abilities cannot be ignored."
 SOV_strengthen_executive_power: "Strengthen Executive Power"
 SOV_strengthen_executive_power_desc: "Medvedev's reforms weakened the main force of Putin's period: executive power. The initiative has shifted from the presidential administration to the State Duma and political parties, which could lead to instability.\nFollowing Vladimir Vladimirovich's instructions, we will once again strengthen the power of the center, pushing political parties into the background. Only with a strong security apparatus can our people develop peacefully!"
 SOV_improve_bureaucratic_management: "Improve Bureacratic Management"
 SOV_improve_bureaucratic_management_desc: "The current Russian government is plagued by the bloated and inefficient bureaucratic apparatus. The population is exhausted by the absurdity that occurs in government institutions.\nFrom this moment on, a system for evaluating the effectiveness of each individual public sector employee will be introduced: from teachers to district heads, at all levels. Municipal authorities will be placed under central control."
 SOV_promote_russian_nationalism: "Promote Russian Nationalism"
 SOV_promote_russian_nationalism_desc: "For many years, "nationalism" was condemned in our country, with the doctrine of "friendship of peoples" being preferred instead. Because of this policy, crowds of illegal migrants flooded into our country, and together with the activities of liberals, this created a certain instability. It is necessary to promote healthy Russian nationalism: not hatred of others, but love for one's homeland. Russia and its culture unite us all, so let's appreciate and strengthen this bond!"
 SOV_safeguard_putin_vision: "Safeguard Putin's Vision"
 SOV_safeguard_putin_vision_desc: "Recently, Vladimir Vladimirovich Putin has stepped back somewhat from the Russian political scene. All sorts of "state liberals" and others are calling for a rejection of Putin's legacy, carefully criticizing his rule, which plays into the hands of our enemies in the West.\nThe Putin era was a period without which it is impossible to imagine modern Russia. To get rid of it means to lose the very essence of our country.\nThat is why Neo-Putinism was created — a reflection of Vladimir Vladimirovich's vision of modern Russian realities. Thanks to him, we have everything, and he lives on in us!"
 SOV_protect_russian_legacy: "Protect Russian Legacy"
 SOV_protect_russian_legacy_desc: "There, in the West, a hydra is rising. A hydra of globalism, Russophobia, neoliberalism—everything we are fighting against. This is no time to relax and play democratic games: we must consolidate around our common country, Russia, and its heritage and history.\nFrom Rurik to Putin, there is a thread that connects us all: from Kamchatka to Kaliningrad, from Murmansk to Derbent. We must preserve this thread at all costs!"
 SOV_raise_public_conservatism: "Raise Public Conservatism"
 SOV_raise_public_conservatism_desc: "Medvedev's rule, although it took place under the banner of "conservatism", was of the Western variety, which over many years has almost merged with liberalism in its ideas. Given that "conservative" sentiment also exists in the West, it can be assumed that they will influence our country in one way or another.\nThat is why we must promote our own Russian conservatism, without flirting with Western ideas. Putin's rule seems to be the ideal option — he was a true conservative who did not copy our enemies!"
 SOV_new_kremlin_democracy: "New Kremlin Democracy"
 SOV_new_kremlin_democracy_desc: "Everything new is well forgotten old.\n\nThe two-party system has finally discredited itself, failing to live up to the expectations of the Russian people. Two parties are incapable of representing the entire spectrum of ideas held by the masses. That is why the State Duma now resembles the old system: a dominant ruling party and many others that are unable to form a majority. Such is the natural order of things"
 SOV_russia_destiny: "Russia's Destiny"
 SOV_russia_destiny_desc: "Через тернии к звёздам\nЧерез радость и слёзы\nГордо реет над нами\nНашей Родины знамя.\n\nГоловы вверх гордо поднять за тебя, Родина-Мать!\nМы до конца будем стоять за тебя, Родина-Мать!\nМы будем петь, будем гулять за тебя, Родина-Мать!\nИ за страну трижды "Ура!"\nЗа тебя, Родина!"
 #pr moderate
 SOV_people_russia_victory: "People's Russia Victory"
 SOV_people_russia_victory_desc: "Everything led to this: efforts to build a sovereign democracy have finally paid off! And the Russian people made their choice in favor of "People's Russia" — a party that promises them a better and carefree future. The time has come to prove that the people of our country deserve better. Now, the whole country is embarking on large-scale reforms in the name of prosperity and stability."
 SOV_constitutional_reforms: "Constitutional Reforms"
 SOV_constitutional_reforms_desc: "Medvedev's term in office was marked by large-scale structural reforms of the state system, including numerous reforms and transformations. It would be wrong to completely dismiss all these efforts to create institutions that have generally proven their effectiveness. At the same time, minor constitutional amendments aimed at protecting the rights and freedoms of citizens also make sense, as their implementation was one of the key promises of People's Russia"
 SOV_harmonize_the_society: "Harmonize The Society"
 SOV_harmonize_the_society_desc: "In the Soviet Union, it was believed that the future lay in the ideas of collectivism. However, history has shown that this was a mistake, and a return to these ideas today would be illogical, to say the least. At the same time, it remains an indisputable fact that the Russian people have always overcome difficulties through unity. That is why today we need to make a concerted effort to build a harmonious society, free from internal strife and contradictions."
 SOV_slash_business_influence: "Slash Business' Influence"
 SOV_slash_business_influence_desc: "In the past, Russian politics was often characterized by government administration and lawmaking being heavily influenced by big business, which sought to defend its interests. Today, such an approach is unacceptable—we work directly with the people and for the people, who often have conflicting interests. Our task is to build honest dialogue and achieve justice for everyone."
 SOV_work_with_ur: "Work With United Russia"
 SOV_work_with_ur_desc: "One of the results of establishing sovereign democracy was the formation of a two-party system. The party that opposes us, United Russia, promotes different ideas and values, but does not seek to sabotage the government's work. Therefore, we could consult with it in order to gain broader public support. This would allow us to make decisions that take into account the interests of different groups in society"
 SOV_homogeneous_government: "Homogeneous Government"
 SOV_homogeneous_government_desc: "Unlike the old American two-party system, parties in Russia are not polar opposites. On the contrary, they show how different segments of society can unite to achieve common goals, thereby forming a government of consensus."
 SOV_encourge_social_patriotism: "Encourage Social-Patriotism"
 SOV_encourge_social_patriotism_desc: "It is often believed that leftist ideas seek to distance themselves from patriotism and civic nationalism in favor of international solidarity. But this is fundamentally wrong—a state that cares for its citizens may well rely on a sense of love for the motherland, and there is nothing reprehensible about that. True patriotism does not contradict the ideals of justice and progress, but serves as their solid foundation."
 SOV_fair_commonwealth: "A Fair Commonwealth"
 SOV_fair_commonwealth_desc: "It used to be believed that Russia, despite its status as a federation, maintained the dominance of Russians over other peoples. Whether this is true or not is a matter of debate, but one thing is certain: now there is no basis for such assumptions. Russia has been, is, and will continue to be an equal union of peoples coexisting for the sake of common prosperity. It is in this unity that we draw our strength and confidence in the future."
 SOV_re_invent_soviet_dream: "Reinvent Soviet Dream"
 SOV_re_invent_soviet_dream_desc: "Back in the days of the Soviet Union, politicians proclaimed the main goal for which the citizens of the Union lived and worked: universal friendship among peoples and the leading role of the working class. And although many of those ideas are outdated today, some of the theses of that time are worth adopting in order to give ordinary people a new dream to strive for. After all, it is a common goal that unites society and gives meaning to everyday work."
 SOV_glorify_the_common_man: "Glorify The Common Man"
 SOV_glorify_the_common_man_desc: "Regardless of the era, the face of Russia has always been that of ordinary people—peasants, workers, soldiers: the list goes on. It is important for us to realize and accept this, and to move forward with this understanding. However, understanding alone is not enough: people need to see that we value their work and thank them for their contribution to the development of our beautiful country. Only by respecting our past and present can we build a future worthy of these people."
 SOV_left_populist_democracy: "Innovative Socialist Democracy"
 SOV_left_populist_democracy_desc: "By definition, democracy is the rule of the people, and this principle is indisputable. Our task is to steer public opinion in the right direction through campaigning, catchy slogans, and effective advertising. This approach does not contradict freedom of choice and helps to gain mass support by explaining our goals to people. After all, people are more likely to support those whose ideas they understand and relate to"
 SOV_country_of_justice: "Country Of Justice"
 SOV_country_of_justice_desc: "Шли красавицы на тройку\nШли рабочие на стройку\nТрамваи по проспекту\nАрабы строем в Мекку\nШли парламентёры, шли монтёры, шли легко и без затей\n\nМы сидели и курили, сидели и курили\nМы сидели и курили, начинался новый день."
 #pr radical
 SOV_radicals_narodniki_in_charge: "Radical Narodniks"
 SOV_radicals_narodniki_in_charge_desc: "Medvedev's two-party system project could not fail to affect such a powerful force as the left-wing movement in Russia. A bunch of different parties got together to form People's Russia: the second most powerful party after United Russia.\nEven though most of them are centre-left, there are some more radical folks among the People's Russia members: from old Communist Party members to former National Bolsheviks. They all have one thing in common: the desire to change Russia in the image and likeness of the Soviet Union, to restore the unity of the peoples and to improve the lives of workers.\n\nRussia is entering a new, yet familiar era."
 SOV_constitutional_revolution: "Constitutional Revolution"
 SOV_constitutional_revolution_desc: "Although the current Russian constitution is quite democratic, it is difficult to call it truly popular. It still retains the framework of Yeltsin's constitution, which requires radical revision. The new Russian constitution will be based not only on Medvedev's, but also partly on the Constitution of the USSR - one of the best, if not the best in the world!"
 SOV_proclaim_uss: "Proclaim The USS"
 SOV_proclaim_uss_desc: "The Union of Sovereign States was an attempt to preserve the Soviet Union, which was fading away due to the parade of sovereignties. Despite the will of the people, expressed in an all-Union referendum, the republics signed the Belovezh Accords, which put an end to Gorbachev's project of a New Union Treaty and to the Soviet Union itself. The time has come to rectify this misunderstanding and realise the dream of unity among the peoples of the post-Soviet space, albeit in a reduced form."
 SOV_the_new_state_committee: "The New State Committee"
 SOV_the_new_state_committee_desc: "Putin's system was renowned for its enormous power apparatus, divided into departments with often overlapping powers and responsibilities. Of course, this lent stability to the supreme authority: after all, while the security forces were fighting among themselves, they had no time to form opposition to the highest echelons.\nBut those days are gone, and the squabbles between the FSB, Rosgvardia, SVR and others only undermine the stability and effectiveness of the security apparatus. They will all be united in the State Security Committee (KGB), which is so familiar to our citizens. Foreign intelligence, counterintelligence, state borders, protection of senior state officials, as well as countering terrorism and other threats - these are the functions of the united Committee.\n\nLoyalty to the Motherland is above all else."
 SOV_bureaucratic_integration: "Bureaucratic Integration"
 SOV_bureaucratic_integration_desc: "It is not enough to proclaim unity on paper: it must also be put into practice. Kazakhstan and Ukraine continue to live by their own laws, which causes some confusion in the daily lives of our citizens.\nWe must strengthen the integration of our comrades and combat manifestations of ethnic nationalism. We are one family, and families should help each other!"
 SOV_unity_of_brotherly_states: "Unity Of Brotherly States"
 SOV_unity_of_brotherly_states_desc: "We have managed, albeit partially, to restore historical justice: from the Dniester to the Amur, from Murmansk to the Aral Sea, millions of people live under one banner, just as they did more than 30 years ago! There is still a lot of work ahead, but other peoples of the former Soviet Union will also soon return to our friendly family!"
 SOV_ignite_neo_soviet_nationalism: "Ignite Neo-Soviet Nationalism"
 SOV_ignite_neo_soviet_nationalism_desc: "After the Great Patriotic War, a seemingly paradoxical form of Soviet nationalism emerged in the Soviet Union. Unlike conventional ethnic nationalism, which gave rise to the horrors of fascism, Soviet nationalism was more about love for the Motherland and the desire to defend it at any cost.\nThis sentiment has survived to the present day, and we must support it!"
 SOV_homogeneous_left_wing_front: "Homogeneous Left-Patriotic Front"
 SOV_homogeneous_left_wing_front_desc: "Outside our party, there are many other movements whose ideas are similar to ours: the Left Front, Another Russia, and other smaller organisations are united by their combination of left-wing and patriotic ideas.\nTogether with them, we will form a united front to strengthen and expand our ranks, because strength lies in unity!"
 SOV_country_of_the_working_man: "Country Of The Working Man"
 SOV_country_of_the_working_man_desc: "The Soviet Union was truly a country of workers: broad rights, consolidation and strengthening of industry, urbanisation - all this made life better for the working class and the whole country.\nUnfortunately, privatisation and the collapse of the Union undermined this foundation: factories began to close rapidly, people became poorer, and migrants replaced them in low-skilled sectors.\nIt is time to rectify this situation — more social privileges for workers will bring new blood to our ailing factories!"
 SOV_glorify_the_military: "Glorify The Military"
 SOV_glorify_the_military_desc: "Throughout history, there have always been people who defended their homeland with their example and their blood—our soldiers. They defended Donbass from the Kiev junta with their own bodies, and they brought the Russian world to Warsaw, the Baltic states, and the Balkans. Our military is a new elite, having earned happiness for everyone through their hard work!\nGlory to our army, honour and praise to its heroes!"
 SOV_peoples_democracy: "Formation Of People's Democracy"
 SOV_peoples_democracy_desc: "Sovereign democracy is an ideology created with the support of United Russia for a democratic state with national characteristics. But now it is not enough on its own: it is necessary to form a new idea - People's Democracy. While sharing some similar ideas, unlike its predecessor, it is more socially and patriotically oriented."
 SOV_union_born_anew: "Union Born Anew"
 SOV_union_born_anew_desc: "Украина и Крым, Беларусь и Молдова -\nЭто моя страна!\nСахалин и Камчатка, Уральские горы -\nЭто моя страна!\n\nКрасноярский край, Сибирь и Поволжье,\nКазахстан и Кавказ, и Прибалтика тоже...\n\nЯ рожден в Советском Союзе,\nСделан я в ССГ!"
 #new russia party
 SOV_new_russia_rises: "New Russia Rises"
 SOV_new_russia_rises_desc: "For a long time, a "liberal" government in Russia seemed impossible. Be it liberals from Yabloko or oppositions from Navalny, all efforts had been stifled either out of their hubris, or ineptitude. Yet we, the New People, had managed to succeed where others failed. Not by fighting the state, but by embracing it. Russia will enter a new era of liberalism, and it will do it on its own terms!"
 SOV_protect_the_constitution: "Protect The Constitution"
 SOV_protect_the_constitution_desc: "Why change anything when it's already perfect as is? The current constitution stays. As liberals and democratic advocates, it is not our right to switch the democratic process for our own goals. We will remain in a coalition with United Russia, and we will uphold the two-party system."
 SOV_constitutional_restructuring: "Constitutional Restructuring"
 SOV_constitutional_restructuring_desc: "While the current constitution is good at what it does, our party thinks it needs more. To ensure a true democracy rises, we must cement Russia as not just a two-party, but a multi-party system. With us as a barrier between United Russia and People's Russia, the Duma will have a lot more diverse voices, resembling the pre-revolutionary Russian Duma. Russia will be the perfect beacon of liberty!"
 SOV_government_business_cooperation: "Government-Business Cooperation"
 SOV_government_business_cooperation_desc: "Our Business had always been in close proximity to our government. In the 90s it tried to influence our politics, in the 00s and beyond it was us who influenced business. With our liberal worldview, we do agree that state meddling in the economy can be detrimental, yet cooperating with our capitalists for the betterment of our people will always be on the table. Just as during the Tsarist times, with the business in our pockets we will be able to react to drastic changes much faster."
 SOV_push_for_democratization: "Push For Democratization"
 SOV_push_for_democratization_desc: "The current system is still not enough. The two-party system is too restrictive. We must encourage new parties forming alongside the United Russia and People's Russia duo. Also pushing new Duma elections forward can give a shake-up to the current system further, forcing both new and established parties to cooperate and unite with each other to gather votes. We will ensure Russian democracy blossoms like it had never done before."
 SOV_third_force: "Third Force"
 SOV_third_force_desc: "With our reforms taking place, the New Russia firmly stands as a balance between the two parties. With smaller parties forming around the core 3, we can safely assume the changes are working. Russian Democracy is reinventing itself once more, with multiple parties vying for control of the Duma. We will not revert to two-party Bickering like the Americans did, and our Presidential powers have enough control to break multi-party deadlock that happened in European democracies. Our party has finally cemented Russia into a new democratic age!"
 SOV_liberate_the_people: "Liberate The People"
 SOV_liberate_the_people_desc: "For a long time, our state had relied too much on corporations or bureaucrats for its task. Yet, what we failed to notice is that it is the people we must answer to. The bureaucrats are faceless and cold, yet it is our duty to ensure our people feel wanted and cared for. If Russia is to become a beacon in this multipolar world, our task is to prove to the world that we, not anyone else, care the most for our citizens."
 SOV_communitarist_society: "Communitarist Society"
 SOV_communitarist_society_desc: "While most Russian liberals advocated for the "Western way of self-fulfillment" we do not condone such ideas. Russia, while capitalist, was never about individual self-indulgence. We are, at our core, communal people. Even during the Tsarist times, our capitalists and nobles invested into the economy of Russia, wanting to ensure the continued prosperity of the nation. The ruthless individualism of the 90s showed us that our society must stick together. Our liberalism is the liberalism of the people. One that cares for the whole more so than the individual. For it is the whole that drives us forward."
 SOV_russian_democratic_nationalism: "New Civic Nationalism"
 SOV_russian_democratic_nationalism_desc: "Why should we shun the word "nationalist"? For a long time it was a synonym to naziism or fascism, yet it is blatantly not true. Russian nationalism, even during the tsarist times, was not about racial supremacy but the supremacy of Russia as a whole. And the recent war against NATO proved that. Be it red or white, it was Russian nationalism that helped us win the war. Russia will be proud of its achievements!"
 SOV_respect_our_past: "Respect Our Past"
 SOV_respect_our_past_desc: "While we can always fall into arguments about which parts of our past are necessary and which are not, it is a pointless endeavour. For a while now, our country has had the "all of Russian history is our history" approach, and we will maintain that. However, the Yeltsin period, for the most part, was seen with disdain. Outside of top government officials and business leaders, the 90s was seen as a disgrace and a black spot in our historical lives. We will rectify this, for while the period had many, many wrongs, it was also a period of experimentation and the birthplace of modern Russia."
 SOV_national_liberal_democracy: "Redefine Russian Liberalism"
 SOV_national_liberal_democracy_desc: "For its whole history, Russian liberalism was seen as mindless admiration of the west and hatred of Russian society. Ever since the Tsar, liberals were seen as mere bootlickers to the Europeans, hating their own people. We, however, will change this perception. Because it is Russia that is the most free nation on earth. It is us who were one of the most influential European cultures. We gave the world so much, so why should we try to emulate the Europeans? Why should we care what anyone else thinks? We are the pinnacle of Europe, one that becomes a beacon for the world for years to come."
 SOV_sovereign_and_free: "Into the Future!"
 SOV_sovereign_and_free_desc: "От чистого истока\nВ Прекрасное Далёко,\nВ Прекрасное Далёко\nЯ начинаю путь."
 #National Russia
 SOV_victory_of_national_russia: "Victory of the National Russia"
 SOV_victory_of_national_russia_desc: "Despite our enemies' numerical advantage and our limited resources, their failures have paved the way for our ascent. Now, Anton Alikhanov will assume control and guide Russia away from the abyss of what is often called democracy. The journey ahead will be arduous, and many will resist, but the Russian people and their new leader will prevail, forging a truly united nation."
 SOV_strength_and_will: "Unity of Our Will"
 SOV_strength_and_will_desc: "We don't need those so-called "other" nationalists. Their feeble calls for unity and recognition are irrelevant. Now, the Derzhavniks will become the dominant and most influential force in our country's national revival. Let these individuals scurry away like parasites of leftism and liberalism, for their "conservatism" and "moderate traditions" are no better than the vices of globalism."
 SOV_unite_the_nationalists: "Unite the Nationalists"
 SOV_unite_the_nationalists_desc: "Our aspirations are high, but we cannot govern alone. Derzhavism is still young and fragile, unable to compete with the powerful forces of socialism and liberalism. We must seek help from other nationalist organizations and their members to fill the gaps. Naturally, we must ensure their loyalty and that any coalition documents favor us significantly."
 SOV_control_state_institutions: "Control State Institutions"
 SOV_control_state_institutions_desc: "The state is sick, weighed down by outdated moralities and loyalties that no longer serve the true nation. The concept of sovereign democracy has become a hollow facade. We must ensure that SZND and its allies wield the most power within the system. This will undoubtedly anger the ever-present liberal opposition, but we must act decisively and swiftly to secure our control over the nation's most critical government bodies."
 SOV_soft_decommunization: "[SOV_soft_decommunization_scripted_loc]"
 SOV_soft_decommunization_1: "'Soft' Decommunization"
 SOV_soft_decommunization_2: "Derzhavnik Syncretic Politics"
 SOV_soft_decommunization_desc: "[SOV_soft_decommunization_scripted_loc_desc]"
 SOV_soft_decommunization_desc_1: "Communism, the most oppressive form of socialism and globalism, has left an indelible mark on our nation. Everywhere we turn, we encounter the remnants of these repressive regimes-in the streets, in our homes, in museums, and on statues. We must cut down this legacy, but it is a delicate task. Many in our population still hold fond memories of the USSR, and we must approach this issue with care, lest we repeat the mistakes of Ukraine."
 SOV_soft_decommunization_desc_2: "Despite our initial anti-communist stance, we must acknowledge that not everything about communism was negative. For instance, many still view Stalin's era favorably, seeing him as a strong and fair leader, much like Alikhanov. By catering to this segment of the population's desire for a strong, just figurehead, we can also weaken the influence of the left opposition."
 SOV_stronghold_of_nationhood: "Bastion of the Nationhood"
 SOV_stronghold_of_nationhood_desc: "We stand amidst a world of revolution and progressive globalism-a perilous landscape for any nation-state. Yet, we remain steadfast, embodying the fortress of common sense, traditional nationhood, and culture. Our mission is to safeguard not only ourselves but the very concept of a nation. For there are many voices calling for the complete eradication of these principles."
 SOV_loyal_army_command: "Loyal Army Command"
 SOV_loyal_army_command_desc: "No nation can stand without a steadfast military. Unfortunately, our forces have been infiltrated by those who claim to be patriots but are only interested in lining their pockets and aligning themselves with those who offer financial rewards. This is intolerable. A true military, built for the nation, serves its people and its leaders without seeking personal gain. Only loyalty and love for one's homeland can sustain a strong and resilient army."
 SOV_motherland_holy_spirit: "The Holy Spirit of the Motherland"
 SOV_motherland_holy_spirit_desc: "Our nation is deeply rooted in religious traditions that have endured for centuries. Although our church remains untainted, it does not actively work to strengthen faith in society. This must change. Our holy fathers must recognize that Russia needs a spiritual revival, akin to a second baptism. Our people must rekindle their devout spirit and unite with our beloved leader and his loyal allies."
 SOV_third_rome_rises: "Third Rome Rises"
 SOV_third_rome_rises_desc: "Third Rome... A fortress nation against the forces of the Antichrist, against hellish powers. We are the people who stand proudly against the world's odds, a world that has forgotten its roots. Even alone in this battle, we are united in our faith and our leadership. Today, we declare that this crusade is a fight for the very soul of humanity, and Russia stands as the knight who will slay the beast."
 SOV_russian_ethnic_brotherhood: "Russian Ethnic Brotherhood"
 SOV_russian_ethnic_brotherhood_desc: "Russia is a land rich in ethnic diversity, and the challenges that arise from this are significant. Alikhanov recognizes that we cannot abandon these minorities when the time comes to defend Russia. Our unity must now be a true brotherhood in arms, not just a vague friendship of peoples. If you want to be part of Russia, you must not only think like a Russian, but also act like one, be it in home, on the streets, or more importantly on the battlefield."
 SOV_unleash_the_yellow_guard: "Unleash the Yellow Guard"
 SOV_unleash_the_yellow_guard_desc: "The Yellow Guard is a dedicated paramilitary organization within the SZND. These brave men and women, with their strong resolve, will form a force that will mercilessly defeat our enemies and protect what is sacred to us. They will be integrated into various security forces, including the MVD, the military, and other law enforcement agencies. Initially, we will fill the ranks with dedicated individuals. As more people join, all lower-ranking personnel in these organizations will become loyal supporters of Alikhanov."
 SOV_consolidate_the_population: "Consolidate the Population"
 SOV_consolidate_the_population_desc: "Our people still don't fully grasp what's happening here. This is a battle for Russia's future. Conflicting opinions and unreliable reporting confuse our message, creating doubts and concerns. This must stop. The Russian people will be whole again, united by a single purpose, like a family, with Alikhanov at its helm. We'll remind them of their extraordinary legacy, a history that is being stolen by spineless politicians serving the interests of globalists and unholy forces."
 SOV_tighten_the_laws: "Tighten the Laws"
 SOV_tighten_the_laws_desc: "This liberalization is a destructive force that threatens the integrity of Russian law and order. It must stop. By exploiting various legal loopholes created by incomplete constitutional reforms, we will assemble a formidable force far stronger than the FSB or MVD has ever been. This new ministry, initially operating under a provisional structure to replace the old state organizations, will gradually absorb and unify all loyal silovik forces, connecting them directly to the Kremlin's command chain. We will establish a state of genuine order, protected from internal threats."
 SOV_use_presidential_powers: "Use Presidential Powers"
 SOV_use_presidential_powers_desc: "The Russian president still wields considerable power. Sadly, previous holders of the office rarely exercised it fully. But Alikhanov intends to use every aspect of his authority to his advantage. Like strong leaders before him, he will employ this power to quash threats to the Russian people. With his hands-on approach, he will bring more citizens to his side."
 SOV_push_for_new_federation: "The New Russian State"
 SOV_push_for_new_federation_desc: "Russia is experiencing a profound transformation. We are fundamentally restructuring the system that has been in place, ensuring that it aligns with our vision. While the federation will continue to exist in name, in reality, a powerful central state will emerge, with all paths leading to Moscow. The Kremlin will have the ultimate authority over decisions made by local governments, if any remain after our reforms are complete."
 SOV_secure_national_dictatorship: "Secure National Dictatorship"
 SOV_secure_national_dictatorship_desc: "Russia is safe, thanks to Alikhanov's strong leadership. Like many times before, a great leader is needed to guide the nation, sometimes away from its own mistakes. Alikhanov's authority will become firmly established, and his influence will be informally recognized as the driving force. Unlike bureaucracy, party or administration, he alone will propel Russia forward."
 SOV_transform_our_cities: "Transform Our Cities"
 SOV_transform_our_cities_desc: "Our largest cities must become the epicenters of Derzhavnik ideology. They should resemble vast, vibrant canvases that celebrate our achievements and leadership. Every surface, from walls to billboards, should be covered in propaganda, news, and TV screens. We must reduce advertising and increase the uniformity of our message. Through these means, we can counteract defeatist and treacherous talk, even in our most liberal cities."
 SOV_the_slavic_union: "Strengthen the Slavic Union"
 SOV_the_slavic_union_desc: "The Slavic Union is an inspiring vision, though difficult to realize. This grand idea resonates with those who seek to instill greater pride, joy, and a sense of national identity in our people. We will engage with our Slavic brothers and sisters in our sphere, gradually persuading them to embrace this new, ambitious union. With perseverance, this project will eventually become a reality."
 SOV_warriors_of_national_revival: "Warriors of National Revival"
 SOV_warriors_of_national_revival_desc: "National revival is an eternal flame that never goes out. It constantly burns brightly, igniting and sustaining itself. Anyone who dares to threaten it will be consumed. Our soldiers, civilians, party members, and yellow guard must embody this vision, carrying it with them at all times and being prepared to defend it with their last breath."
 SOV_end_the_opposition: "End the Opposition"
 SOV_end_the_opposition_desc: "Our enemies are growing weaker, unable to resist our growing power. With a swift and brutal attack, we can finally defeat them. Our informants are prepared, and our special teams are ready to strike. We will uncover every hiding place, dismantle their networks, and capture all those involved. May God have mercy on their souls, for their future holds nothing but sorrow."
 SOV_derzhavnik_constitution: "The Derzhavnik Constitution"
 SOV_derzhavnik_constitution_desc: "The longer the informal constitution suspension dragged on, the more moderate derzhavniks grew dissatisfied. They devised a plan to present Alikhanov with a new, more national constitution. This document would avoid the pitfalls of its predecessors, allowing a strong, united executive to step in during times of crisis while also supporting the establishment of a senate to govern the nation in more tranquil periods."
 SOV_groundworks_of_national_republic: "Groundworks of the National Republic"
 SOV_groundworks_of_national_republic_desc: "After a period of intense effort, there comes a time to pause and reflect. This is now. We have fought and triumphed, leaving Russia's enemies behind. Yet, our people still yearn for more political action. Therefore, while maintaining the role of supreme leader, we will introduce a new position: the consul. This elected official will advise and guide our leader in matters he was chosen to address."
 SOV_national_codex_of_russia: "National Codex of Russia"
 SOV_national_codex_of_russia_desc: "The idea of constitutions is a foreign concept, created by enemies of the motherland. Instead, we will discard the remnants of occupation and forge a genuinely Russian set of fundamental laws that will guide our nation for generations to come. This new framework will not include dangerous provisions about human rights or freedom of speech. Instead, it will focus on the role of the supreme leader and the duties that all citizens must fulfill."
 SOV_eternal_derzhava: "Eternal Derzhava"
 SOV_eternal_derzhava_desc: "Государство взметётся до неба\nИ заквакает треснувший мир\nЧто хотел нас угробить,ослабить\nИ растлить всем,чем только он мог\nТоталитарное государство\nВознесётся до самых небес\nТоталитарное государство\nЗакуётся в железобетон\nТоталитарное государство\nПодчинит себе сломленный мир"
 SOV_party_with_a_state: "Party With a State"
 SOV_party_with_a_state_desc: "Russia and SZND are inseparable. They are one and the same. In Russia, if a person wishes to achieve anything, they must be a part of SZND. Otherwise, their life holds little value in the eyes of the state. Party documents, doctrines, and hymns must become the nation's own if Russia is to endure for thousands of years. SZND must lead, or the traitors will triumph."
 SOV_preemtive_blow: "Preemptive Blow"
 SOV_preemtive_blow_desc: "We cannot simply stand by and watch our enemies prepare to attack us. Only a weak state would allow this. Alikhanov and the derzhavniks will not hesitate to strike first. Of course, In the eyes of the international community, we will be portrayed as the unreasonable aggressors. However, their opinions are of little consequence.\nTo Arms! Glory To Russia!"
 
 SOV_red_derzhava: "Red Derzhava"
 SOV_red_derzhava_desc: "What a tragedy! Our great leader Anton Alikhanov died at the hands of the enemies. But, fortunately for our great country, there is a man who is ready to continue the work of Alikhanov! Azarenok and his group of red derzhavists will take power into their own hands, because that's exactly what our former chief wanted, after all, he was starting to warm up to the ideas of red derzhavism."
 SOV_the_north_korean_model: "The North Korean Model"
 SOV_the_north_korean_model_desc: "The DPRK is indeed a proto-derzhavnik state of the people's type. Looking at the experience there, we will be able to adapt it to our views and build a system of total unity of the People, the Army and the Party, just as the Kim family did."
 SOV_bureaucratic_revolution: "Bureaucratic Revolution"
 SOV_bureaucratic_revolution_desc: "A bureaucrat is not a parasite - a bureaucrat should be a hero! The attitude towards the administrative apparatus in our country remains difficult, so we must update the staff within the ministries and the commission, put new faces who are not only ready to serve for the people, but also completely loyal to us."
 SOV_junta_of_the_people: "People's Junta"
 SOV_junta_of_the_people_desc: "The army has always been the pride of our country, and heroes who have been tested by fighting for their homeland come out of it. We must maximize this, and the army caste will now receive privileges and positions in the government, because a man who fought for his homeland will be able to stand up for it in government offices."
 SOV_helmsman_of_the_motherland: "Helmsman of the Motherland"
 SOV_helmsman_of_the_motherland_desc: "Ты вражью жадность иссушил\nТы нас победам научил\nТы в руки слабых ключ вручил\nОт новой жизни - Вождь\nИзвестен всей вселенной ты\nДеяний славных мастер ты\nПознавший мысли бедноты\nТебе пою я - Вождь!"
 SOV_new_propaganda_wave: "New Propaganda Wave"
 SOV_new_propaganda_wave_desc: "Yes, the change of the state paradigm, even if it is more subtle, still raises many questions even among the loyal population, so we must conduct mass campaigning, show the people that Alikhanov and Azarenok are united in their thoughts, and that we are going the right way!"
 SOV_great_russian_socialism: "Great Russian Socialism"
 SOV_great_russian_socialism_desc: "Socialism must be ours - Russian, as the great theorists of Russian Bolshevism bequeathed to us. Therefore, building on the foundation of the economy under Alikhanov, we will strengthen our methods of government intervention and programs, building a paradise for the working class of Russia."
 SOV_neo_stalinist_war_economy: "Neo-Stalinist War Economy"
 SOV_neo_stalinist_war_economy_desc: "War is inevitable, and Stalin understood this. As in the 1930s and 40s, we should focus on military affairs and industry. Russia must become not only a reliable fortress for defense, but also a powerful tool for offensive."
 SOV_labor_industrial_mobilization: "Industrial Mobilization"
 SOV_labor_industrial_mobilization_desc: "A worker! Do you hear? Enemy tanks are humming! Our factories and our working class must be on constant alert, even if there are no real enemies. He must think that every action he takes in his work will help our country in the fight against the enemy."
 SOV_new_artles: "New Artles"
 SOV_new_artles_desc: "The state cannot control everything, and Stalin understood this. Therefore, artels appeared under him - production cooperatives created on a voluntary basis. The members of the artels worked together and were collectively responsible. The artels were engaged in household needs, the production of consumer goods, provided services and extracted natural resources - limestone, peat."
 
 SOV_russia_above_all: "Russia Above All"
 SOV_russia_above_all_desc: "For far too long, Russia has been taken advantage of by international partners and allies. Derzhavniks will change this by prioritizing Russia's interests above all else and concentrating on enhancing our homeland's wealth."
 SOV_the_statist_model: "The Statist Model"
 SOV_the_statist_model_desc: "The state knows best, especially in economic matters. The private sector, run by untrustworthy individuals, is believed to exploit anything at their disposal to deceive and cheat honest working Russians, depriving them of their rightful wages, while simultaneously hiring foreign labor for lower costs. Now, the state, through its various committees and ministries, will take over the economy, and any objections will be met with bold assertions."
 SOV_intensify_military_funding: "Intensify the Military Funding"
 SOV_intensify_military_funding_desc: "One of the most significant, yet often overlooked, aspects of the Russian economy is our robust military-industrial complex. To withstand external threats, we need not only effective weapons but also the skilled artisans and factories who create them."
 SOV_state_benefits_for_russian_workers: "State Benefits For the Russian Workers"
 SOV_state_benefits_for_russian_workers_desc: "Our state will look after you, provided you are Russian. For decades, the parasitic capital has taken more than its fair share from you. But now it's different. We will ensure our national workers receive the benefits and programs they deserve for a comfortable and well-deserved rest. Meanwhile, those who are not considered desirable will be left without anything, of course."
 SOV_russian_industrial_powerhouse: "Russian Inudstrial Powerhouse"
 SOV_russian_industrial_powerhouse_desc: "Mighty chimneys soaring into the sky, vast complexes like small cities, and underground facilities-all these will become part of Russian reality as we embark on a significant industrialization drive. Our economy is fueled by the labor of the underclass, not by the comfort of office parks or high-tech advancements. Far from being regressive, this is what a true economy should look like."
 SOV_fruits_of_the_motherland: "Social-Economic Unity"
 SOV_fruits_of_the_motherland_desc: "Our society is united not just politically but economically, though wealth disparities exist. Bureaucrats and laborers collaborate to achieve mutual prosperity. Unlike radical visions of socialism and liberalism, we demonstrate that one class need not be destroyed to benefit another."
 SOV_kick_foreigners_out_of_labor_force: "Kick Foreigners Out of Labor Force"
 SOV_kick_foreigners_out_of_labor_force_desc: "For decades, powerful forces have exploited Central Asians' desire for a comfortable life in Russia, using their willingness to accept minimal pay to drive Russian workers out of the job market. This must end. We propose a complete ban and expulsion of unnaturalized workers from Russia, sending them back to their home countries. While such measures will undoubtedly cause some pain, they will pave the way for a future where we can achieve a truly prosperous society without relying on cheap imported labor."
 SOV_against_economic_russophobes: "Campaign Against Economic Russophobes"
 SOV_against_economic_russophobes_desc: "In the lists of richest Russian businessmen, there are, for some reason, many non-Russian names. How did they amass their wealth? By taking it from the hardworking Russian population, whether they were business owners or simple workers. This injustice persisted for decades. But now, the time for reckoning has arrived. These non-Russian individuals will be stripped of their riches and forced to return to their countries of origin. Let's see if they can achieve success there."
 SOV_russian_national_capitalism_natros: "Russian National Capitalism"
 SOV_russian_national_capitalism_natros_desc: "We must acknowledge that we have long misunderstood the true potential of capitalism. However, Alikhanov and his collaborators envision a more equitable system. This new market will prioritize hardworking Russians and their businesses, unlike the previous one. It will also motivate the working class, which has become complacent due to the excessive support from the government."
 SOV_improve_russian_made_products: "Improve Domestic Products"
 SOV_improve_russian_made_products_desc: "When you think of Russian-made products, what images come to mind? Perhaps something small and insignificant. We must change that perception. Russian products need to improve not only in variety but also in quality. Key items such as cars, phones, and televisions should take precedence, and we should reduce our reliance on foreign imports in these areas as well."
 SOV_support_national_entrepreneurs: "Restructure the Russian Giants"
 SOV_support_national_entrepreneurs_desc: "State corporations have great potential, but due to past mismanagement by inefficient bureaucrats, they need to be reformed to serve the national interest effectively. We must eliminate their negative influence and steer these entities towards a path that genuinely benefits Russia."
 SOV_national_council_of_corporations: "National Corporations Council"
 SOV_national_council_of_corporations_desc: "Now that we've eliminated the old adversaries, we can merge these state corporations into a more cohesive structure. This way, when the Kremlin needs something done, the line of communication will be clear and filled with loyal voices. Naturally, we'll also reward them with benefits for their loyalty and cooperation."
 SOV_era_of_russian_megapolises: "Era of the Russian Megapolises"
 SOV_era_of_russian_megapolises_desc: "Beautiful Russian cities, adorned with colorful lights and towering glass structures, embody our unique vision of the future. They should be places where hardworking Russian citizens can see the state's achievements and proudly declare, "I am proud to be Russian!" These cities must evolve into vibrant hubs of commerce, industry, and trade, serving as centers of progress and innovation."
 SOV_wide_urbanization_works: "Wide Urbanization Works"
 SOV_wide_urbanization_works_desc: "Our cities are vast, but they are not vast enough. Enormous efforts must be made to accommodate the expanding population of the working class and the industries we have created for them. These spaces might not be particularly elegant or beautiful, but they are meticulously crafted to offer modest comfort to the working class. The goal is to provide affordable and efficient pathways to their workplaces, allowing them to reach their destinations swiftly."
 
 

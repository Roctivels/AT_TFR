 SOV_The_Petrol_Economy: "The Petrol Economy"
 SOV_The_Petrol_Economy_desc: "'The Resource Curse' is how economists describe the paradoxical benefits and pitfalls of a nation with plentiful natural resources: although it is a fantastic source of revenue for a burgeoning nation, it often stunts the growth of other economic sectors, and it results in a more authoritarian, less democratic system. And Russia is no exception to the rule. The oil and natural gas sector is the lynchpin of the Russian economy, and a fragile one at that. Since many of these companies are state-owned, the fortunes of both the people and the state are subject to the whims of the ever-turbulent international oil market."

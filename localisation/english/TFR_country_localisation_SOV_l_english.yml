 #nationalist russia
 SOV_national_russia_rises: "National Russia Rises"
 SOV_national_russia_rises_desc: "When Vladimir Volfovich died, the question arose who should be given power. Many coveted the proud name of the Liberal Democratic Party, like vultures on the corpse of a dead cow. But Alexander Sherin did not forget Zhirinovsky's precepts. He remembers that first of all, Vladimir Volfovich's party was a party defending the interests of the Russian people. Raise up the imperial tricolours, brothers and sisters. Our struggle for the Russian people continues. Hurrah, comrades!"
 SOV_the_great_philosophy: "The Great Philosophy"
 SOV_the_great_philosophy_desc: "Vladimir Zhirinovsky, Ivan Ilyin, Vladimir Puchkevich, Alexander Zinoviev, Ivan Solonevich and this list can be continued for a long time. But all the people mentioned above are united by an incredible loyalty to the motherland, wisdom and fortitude. They were the ideologists of Russian civilization, which can gravitate not only to the thinkers of antiquity, but also historically, for Russia it has already developed into a religion. It was the ideas of such patriots that, first of all, shaped the Russian nation as we know it now. Their words should not be forgotten by future generations and will later become part of the history textbooks and minds of our citizens."
 SOV_national_jingoism: "National Jingoism"
 SOV_national_jingoism_desc: "Great Russian chauvinism is the idea that should become the basis for the real Russian world. The very "Autocracy, Orthodoxy, Nationality" formulated by Sergey Uvarov and later developed by the Black Hundreds movement led by Vladimir Purishkevich. It is the great Russian people who should become the very link between our Orthodox culture and a strong ruler who rules like a tsar."
 SOV_the_white_empire: "The White Empire"
 SOV_the_white_empire_desc: "Some Russian nationalists tend to believe that Russia perished as a result of the terrible October revolution and has only recently been reborn. However, they forget that many bright minds still managed to escape from Russia and were the bearers of our great national idea. It was there, thanks to the works of philosophers like Ilyin and Solonevich, that the ideas were born, which we gathered into a single ideology. "White Empire," that's what it was decided to call our new official doctrine. A truly national and religious Russia with an exalted aristocratic nationalism of spirit. Comrades, there was no end to it. The struggle continues."
 SOV_all_russian_veteran_organization: "All-Russian Veteran Organization"
 SOV_all_russian_veteran_organization_desc: "When the warriors run out, combat veterans usually find themselves on the sidelines of life. It is difficult for them to settle into a peaceful life and reject the traditions of modern times. And shame on the state that betrays the soldiers who fought for its existence! We will create an All-Russian veterans organization that will help veterans of all armed conflicts and integrate them into peaceful life."
 SOV_glorify_russian_victories: "Glorify Russian Victories"
 SOV_glorify_russian_victories_desc: "There is hardly a nation on Earth that has defended its independence and its right to exist more often than the Russians. We fought with Europe against their campaigns, preventing them from imposing a Western way of life. We fought Asia when the Mongols tried to enslave us, and eventually won. In more than a thousand years of our history, no one has ever managed to subjugate us and make us slaves. Glory to the Russian victories and eternal glory to the fallen soldiers, for Russia to remain great! Your names may have disappeared into history, but your feat is immortal."
 SOV_revive_solidarist_practices: "Revive Solidarist Practices"
 SOV_revive_solidarist_practices_desc: "At one time, the Bolsheviks did a lot for Russia. They divided the Great Russian people and created many anti-Russian pseudo-nationalities. However, their greatest "achievement" was that they were able to sow hatred between representatives of the Russian nationality. The poor began to hate the rich, and the fragile order in society was disrupted. As a result, the deluded crowd destroyed the color of our nation. However, we will not allow this to happen again! There are no classes, much less a struggle between them! The factory owner and the worker are natural allies, not enemies. And all our citizens remember this!"
 SOV_restructure_the_party: "Restructure The Party"
 SOV_restructure_the_party_desc: "The LDPR has always been a haven for many political movements. We were all nationalists in one way or another. But we saw great Russia in different ways. Someone saw an invincible empire. Someone wants a national democratic republic. Well, someone even wanted to cross Russian nationalism with socialism. But we were all united until the day Vladimir Volfovich left us, as it turned out, it was easy to break up the once unified movement. The LDPR is losing popularity due to internal squabbles. We will purge the party of opportunists and form a clear ideological program!"
 SOV_rise_of_blueshirts: "Rise of the Blueshirts"
 SOV_rise_of_blueshirts_desc: "The Association of Army Comrades, or "blue shirts", is a spontaneous organization of Russian nationalists that arose under Zhirinovsky. Partially copying their style from a similar organization from 20th century Ireland, they immediately became a force to be reckoned with. They protected ordinary citizens from the robbery of migrants and carried out actions to protect Russian culture and counteract harmful influence. It would be a real sacrilege to deny such patriots government support."
 SOV_kickstart_the_propaganda_machine: "Kickstart the Propaganda Machine"
 SOV_kickstart_the_propaganda_machine_desc: "We live in the best country in the world, and everyone else is jealous of us! However, our citizens should also be fully aware of this! With the help of government support, dozens of propaganda programs will bloom like flowers in spring. Our citizens will see propaganda on social media, on TV, and even in banners on websites. We will not forget about the means of advertising in the real world. All this is so that our citizens do not forget that it is an honor to be a patriot of Russia!"
 SOV_unity_with_the_church: "Unity With the Church"
 SOV_unity_with_the_church_desc: "The Russian civilization was formed far from the last with the help of Orthodoxy. Through the long centuries, our people have carried patriotism and faith with them in their hearts, and we must finally consolidate the union of church and state. Fortunately, so far the clergy have always been on our side."
 SOV_national_revolution_of_russian_soul: "National Revolution Of the Russian Soul"
 SOV_national_revolution_of_russian_soul_desc: "Rise up, brothers, the Russian banner is making noise with us! All the children of the Russian fatherland, proudly raise your tricolours over your heads and put them on! Praise the Russian spirit! Praise our country! And praise the feat of our ancestors! Centuries later, we fought our way to the walls of the ancient Kremlin and carried out a national revolution. Finally, after all this time, a state has appeared for the Russian people, and we will not allow someone to destroy our idyll. Our Russian world!"
 SOV_handbook_for_russian_nationalist: "Handbook of the Russian Nationalist"
 SOV_handbook_for_russian_nationalist_desc: "Nationalism is not just love for one's homeland and one's people. It is also a deep respect for traditions and a whole way of life. However, not all of our citizens are aware of this. Together with our popular conservative philosophers and popular printing houses, we will create a Russian nationalist book together. It will contain everything necessary for a true Russian patriot. From our party program to advice on how to organize your life properly."
 SOV_enforce_russification: "Enforce Russification"
 SOV_enforce_russification_desc: ""
 SOV_embrace_corporatist_model: "Embrace the Corporatist Model"
 SOV_embrace_corporatist_model_desc: "The planned economy of the Soviet Union collapsed due to its inefficiency. At the same time, the free market leaves citizens vulnerable to greedy businessmen who will not miss their chance to warm their hands on deceiving their citizens. But, as you know, there is always a way out. Corporatism has performed well in the countries where it was introduced and, in our opinion, is the best option in the long run. It is carefully selected corporations that will conduct business in the market and manage our economy."
 #Goyda Tree
 SOV_by_the_will_of_god: "By the Will of God"
 SOV_by_the_will_of_god_desc: "For the first time in the history of Russia, the country has established an order resembling a theocracy. Officially, the patriarch is declared the head of the Russian Orthodox Church as the head of the Russian state.But the management of such a large state is beyond the reach of one, so the Holy Synod was immediately created, headed by Ivan Okhlobystin, for many a rather odious person with even more odious ideas for the development of Russia. But we must believe that with God's help and by God's will, he will lead Russia to its true greatness!"
 SOV_on_line_with_kirill: "On Line With Kirill"
 SOV_on_line_with_kirill_desc: "The official Russian Orthodox Church has a huge influence on its parishioners. The whole country listens to the Patriarch's word, especially now. Okhlobystin's position is currently quite precarious, and it is better to be in good standing with the Russian Orthodox Church so that our policy is easy and painless for the people."
 SOV_ally_with_hardline_priesthood: "Ally With Hardline Priesthood"
 SOV_ally_with_hardline_priesthood_desc: "There are those within the Russian Orthodox Church whose faith is a little more radical than that of the majority of the priesthood. Schemamonk Sergius, the "Union of Orthodox Banner Bearers" with their idea of "Orthodoxy or death!", the doctrine of the redeemer king - the official church does not favor them all, calls them "heretics", "radicals". But we believe that they are defenders of the Orthodox faith from various corrupting influences of the West. Our ideas largely coincide with them, so it would be logical if we began to rehabilitate them in the eyes of the people."
 SOV_install_orthodox_fundamentalism: "Install Orthodox Fundamentalism"
 SOV_install_orthodox_fundamentalism_desc: "Since 988, Orthodoxy has been the fundamental religion of the Russian state, uniting the people and strengthening their spiritual foundations. Throughout history, faith has shaped the way of life, moral values, and culture of our country. However, in the last couple of centuries, its influence has gradually weakened, losing its importance in the daily life of the Russian people. We consider this unacceptable. Faith is an integral part of our history, a source of strength and resilience. Therefore, from this moment on, we are establishing the dominance of Orthodoxy in everyday life, reviving the spiritual traditions that have supported Russia's greatness for centuries. Only a nation based on solid spiritual values is capable of confidently moving forward and creating a great future."
 SOV_mass_religious_education: "Mass Religious Education"
 SOV_mass_religious_education_desc: "Russian education began with a parish school, where children were taught to read and write through the Holy Scriptures. Over time, the education of the younger generation became secularized, which led to sad consequences: free-thinking in education became the first domino that led to the chaos of the 20th century.Now that the Church governs the State, we must increase the role of religion in education. Instead of music lessons with God-defying rock operas, there will be church chants, and more hours will be devoted to Holy Scripture and other church literature, at the expense of biology lessons, of course."
 SOV_the_new_russian_trinity: "The New Russian Trinity"
 SOV_the_new_russian_trinity_desc: "Putin, Zhirinovsky, Okhlobystin are a clear and logical line of succession. The first strengthened the country after difficult times, the second withstood the hardest test of the war with the whole of Europe, and the third will lead Russia further towards a future filled with spirituality and greatness. At any time, Russia needs a strong and determined leader capable of leading the people forward."
 SOV_co_patriarch: "Co-Patriarch"
 SOV_co_patriarch_desc: "Ivan Okhlobystin is the main actor in our state. The vast majority of government decisions are made and approved only by his will. The figure of Patriarch Kirill, more publicly, has become something like the Catholic Pope: in fact, he has no power in the state, but is only the spiritual leader of Russia.pOhlobystin and his radicals in the Holy Synod insisted on increasing their role in the state: from now on, the post of "Co-Patriarch" will be created - the first person after the Patriarch in the state, which, of course, will be occupied by the head of the Synod. And then no one will be able to prevent the total control of Orthodox fundamentalists in Russia.\nEven the Lord God."
 SOV_union_of_the_faithful: "Union of the Faithful"
 SOV_union_of_the_faithful_desc: "The Holy Synod is the main institution of power in our country. His powers include the appointment of senior positions, legislative and supreme judicial activities. But he has no practical connection with believers all over the country.\nThis is why there was an initiative to create the Union of Believers, a semi-parliamentary institution with advisory powers. Of course, this is not a direct democracy, but it will at least temporarily reassure our opponents."
 SOV_restore_societal_piety: "Restore Societal Piety"
 SOV_restore_societal_piety_desc: "In ancient times, not going to church meant that a person was an outcast from society, and it was dangerous to deal with him. Everyone went to church: from the poorest to the richest and noblest, from young to old. But in the modern world, the church did not play as serious a role as it used to, thanks to the atheist Bolsheviks. Although Zhirinovsky tried to do something, it was not enough.\nWe can no longer allow this, and therefore going to church and following the norms of Christian morality will be mandatory. In the face of the growing threat from the West, we cannot afford to be weak!"
 SOV_deploy_the_oprichniks: "Deploy the Oprichniks"
 SOV_deploy_the_oprichniks_desc: "Despite all the work of the Zhirinovsky regime, there are still many hidden enemies inside the Russian State. Now they have been joined by elements alien to our faith in every possible way, threatening to undermine the very foundations of our society, to the delight of the European reds.\nThat is why the Holy Synod insisted on the revival of the Oprichnina institute within the security forces, following the example of Ivan IV. Just as in the 16th century, this structure will have the right to search for the enemies of Russia and destroy them. Although some fear that we will repeat the same mistakes, Okhlobystin is adamant: the sacred goal of protecting the Russian State and people justifies the means."
 SOV_consecrate_armed_forces: "Consecrate Armed Forces"
 SOV_consecrate_armed_forces_desc: "The European War revealed an important problem of our armed forces: the lack of religion for soldiers. Among the fighters, not only pagan symbols and amulets became widespread, but also litanies with "prayers to the God-Emperor," whoever he was. This fact worries many within the Holy Synod, and they demand a stronger role for the church in the military. To solve this problem, it is proposed to increase the number of military priests and strengthen their religious and political importance. A Russian soldier should know that the Lord is on his side, and even if he dies, he will go to Heaven as a martyr. And his enemies will just die."
 SOV_faith_is_blind: "Faith Is Blind"
 SOV_faith_is_blind_desc: "Over the decades of first communist and then capitalist oppression of the Russian people, the opinion has developed that the main thing is material. That wealth is not in the soul, it is in the Yugoslav walls, tape recorders, telephones, apartments and cars. The same thing has been transmitted to the appearance of our cities. It was commercialism that corrupted our parishioners.\nBut now we will begin to abandon all kinds of excesses that destroy the moral image of our people. Orthodox utilitarianism is what we need! Spiritual beauty is the most important thing in our country!"
 SOV_beautify_our_cities: "Beautify Our Cities"
 SOV_beautify_our_cities_desc: "Modern Russian cities and their sleeping areas are a gray concrete mess. You can't look at our cities without tears, that's why there's a mental crisis and drunkenness! And who is to blame for everything? Of course, the Communists with their godlessness and brutalism!We will correct this misunderstanding: more Russian-style houses, more gardens, more churches! Russia's appearance should reflect the brightness and beauty of the Orthodox faith!"
 SOV_empower_metropolitans: "Empower the Metropolitans"
 SOV_empower_metropolitans_desc: "The institution of metropolitanates has existed since the 4th century AD. With them, Christians divided the territories of the Roman and Byzantine Empires, led by the metropolitan. The same system has been preserved in Russia.It would be good if, with the help of the metropolitans, the Church could further consolidate its grip on state affairs: the executive and judicial authorities in the regions."
 SOV_our_sacred_history: "Our Sacred History"
 SOV_our_sacred_history_desc: "Russian Russian history is continuously linked with Christianity: from the baptism of Vladimir Svyatoslavovich to the restoration of the Patriarchate in 1943, for better or worse, the Russian Orthodox Church has always been together with the Russian people and the Russian state. Of course, Russia found itself under the almost century-old oppression of the atheist Bolsheviks, but in the end, it was able to recover and restore the correct, Christian order of things. Now, under the strict guidance of the Russian Orthodox Church and Ivan Okhlobystin, Holy Russia can safely move forward towards the establishment of the Kingdom of God on Earth."
 SOV_worship_house_in_every_khrushevka: "Worship House in Every Khrushchevka"
 SOV_worship_house_in_every_khrushevka_desc: "So that every inhabitant of Russia can be closer to faith and spirituality, a prayer house will be created in every house, in every Khrushchev, a place where you can retire for prayer and reflection. This place will become an integral part of everyday life, reminding of the importance of Orthodox traditions. Here, everyone will be able to discuss faith issues with their loved ones, get acquainted with spiritual literature and participate in worship services without leaving far from their homes. This will be a step towards the revival of spiritual life, where faith will once again take its rightful place in the inner world of every person."
 SOV_sanctify_our_economy: "Sanctify Our Economy"
 SOV_sanctify_our_economy_desc: "The Orthodox Church has shunned economic activity throughout its existence. Yes, many people accuse us of a rich lifestyle, they talk about the "yachts and merces" of the Patriarch and other dignitaries, but this was a long time ago and is not true.\nNow times have changed. The Church must learn how to operate economically, otherwise we simply will not be able to stand. We will establish a network of bankers and entrepreneurs close to us to manage the Russian economy and promote the introduction of Christian values and morality into economic relations."
 SOV_prepare_for_the_crusade: "Prepare For the Crusade"
 SOV_prepare_for_the_crusade_desc: "Clouds are gathering over Europe. The forces of the unfinished red plague are gathering on the border in order to subjugate our culture and destroy our Orthodox faith. But we won't let them take us by surprise! Everyone in our Russia will be preparing for a new Crusade against Eurocommunism! With the old Russian cry "Goida!"thousands of Russian heroes will wipe out the last remnants of Russophobia and atheism from the face of Europe! Fear, red world, we will come!"
 #Kurginyan Tree
 SOV_kurginyan_red_empire: "Kurginyan's Red Empire"
 SOV_kurginyan_red_empire_desc: "Empire or death! These are the only two ways for Russia. This is exactly what Sergey Yervandovich Kurginyan was talking about in 1994. But three decades have passed, and Kurginyan himself found himself in power. Only Russia, which has become an empire again, is splitting into pieces. Traitors inside and detractors outside. They all want to take away the Russians' right to their own state. But that's not going to happen! The time has come for a fundamentally new Russian state, one that will not fight its own history and the ghosts of the past. The hour of the red Empire has come!"
 SOV_subdue_reactionary_nationalities: "Subdue Reactionary Nationalities"
 SOV_subdue_reactionary_nationalities_desc: "A long time ago, the Bolsheviks came to power in the conflagration of the Russian revolution. They had a great goal - to create a completely new person. Someone compared to whom even Goethe and Hegel will pale in the framework of world history. But this idea was perceived by everyone in different ways. And instead of superhumans, reactionary nationalities began to appear like mushrooms after the rain. Ukrainians, Kazakhs, Belarusians and others have destroyed the monolithic structure of Russian society. Of course, Comrade Stalin tried to suppress these sentiments, but it was too late. Dozens of underidentifications have already been born and even acquired ardent fighters for their cause. Naturally, such artificial nationalities cannot create stable states, which we have seen in recent history. The reason for their failure is simple: they all turned away from the collectivism and brotherhood inherent in true Russian people. With new reforms, we will set these peoples on the right path. And we will clearly show why the court of time gave them such a verdict."
 SOV_dictatorial_leadership: "Dictatorial Leadership"
 SOV_dictatorial_leadership_desc: "Dictator, tyrant, despot. For some reason, all these words have acquired a negative connotation in modern society after the short-lived triumph of Western thought. Why is a strong leader who is able to stand up for his people and is ready to defend his interests immediately stigmatized? Everything is simple. It's fear. The ability of the Russian people to produce great leaders has always been our strength. By force, which caused fear of losing their power and all their power. Western states are built on peoples whose passion has long been suppressed by the state. However, we Soviet people are not afraid to meet the challenges of the times! The time has come again for a strong hand to take power over Russia in order to lead people into a bright socialist future."
 SOV_elitist_party_apparatus: "Elitist Party Apparatus"
 SOV_elitist_party_apparatus_desc: "Can a cook run a government? A stupid question, the answer to which should be a firm and clear "no!". Allowing untrained people to manage such a complex organism is blasphemy and the first step towards certain death. So wouldn't it be better to rebuild the party apparatus to suit our needs? To get there, you will need to pass countless tests, including loyalty to the party. But this is the price that is worth paying for the opportunity to run the country. Of course, party members will have their own privileges, if you understand what I mean, of course."
 SOV_new_russian_statecraft: "New Russian Statecraft"
 SOV_new_russian_statecraft_desc: "The process of the death of a state is unstoppable when traitors take power in it. And when people become disillusioned with ideology, they stop trying for the sake of the regime. This happened in the USSR, when representatives of the "intelligentsia" and the people loudly mocked the idea of the hegemony of the working class. We cannot allow them to take root in our union! May all the citizens of our great country know that they are working for the glory of the Russian nation and all mankind."
 SOV_knights_of_crimson_order: "Knights of Crimson Order"
 SOV_knights_of_crimson_order_desc: "Can there be a state that exposes absolutely everything to the public? Of course not. So we should have a certain amount of room for maneuver. New knights from the ranks of the special services will allow our state to exclude radical elements when necessary. And just to maintain the peaceful life of ordinary citizens, protecting them from the corrupting influence of enemies. Hurrah, comrades! Glory to the Soviet secret services, our guards and defenders!"
 SOV_ministry_of_peoples_knowledge: "Ministry of People's Knowledge"
 SOV_ministry_of_peoples_knowledge_desc: "Loyalty is a very difficult thing and it is incredibly difficult to instill it. Even the Soviet Union, a true titan of socialist thought, ultimately failed to convince its citizens that the ideas of Marx and Engels were right. But we will go further. A separate ministry will be created to ensure that our citizens are confident in the future of the state in which they live. Some may call it obolvaniev, and others - cheap propaganda. But please think for yourself. How can a lie, even if uttered a thousand times, become true and take root in people's minds? And if your answer is yes, does it really remain a lie?"
 SOV_holy_red_army: "Holy Red Army"
 SOV_holy_red_army_desc: "There is no death more worthy than death for one's Fatherland.  It's impossible to be truly brave if you don't believe you're right. And that is why we will add a little faith to the great army! Like crusaders, the soldiers of our army will go into battle with the name of Christ on their lips, and the units will be replenished with specially trained combat priests. Our defenders from among the members of the People's Red Army are ready to fight and die for the future of humanity and for our citizens to sleep peacefully. The feat of the heroes will never be forgotten, and their souls will ascend to heaven when the time comes and they will take their rightful place in paradise, standing on a par with the great martyrs. Glory to our armed forces, and may the Lord God personally guide the hands of our guys to the target. Fear, you vile enemy! For our army, like St. George, is ready to slay the serpent!"
 SOV_condemn_european_red_globalism: "Condemn European Red Globalism"
 SOV_condemn_european_red_globalism_desc: "After the defeat of the great Russian army, Europe allegedly turned to the ideas of socialism. But what is their socialism really worth? This is just a desperate attempt by the most globalist elements of financial capital to hide behind a mask of virtue and concern for the working class. But the Russian people are not so easily deceived. It is clear to us through the centuries who is trying to cash in on the gullible working class by giving them ideas of social justice and degenerate cultural Marxism, and who truly stands for the rights of workers and peasants. The enemy will not pass! Sooner or later, European globalism will be crushed forever! In the meantime, we should prepare for this fight."
 SOV_towards_imperial_communism: "Towards Imperial Communism"
 SOV_towards_imperial_communism_desc: "Communism is the only chance for humanity to survive! While our opponents are trying to substitute rootless cosmopolitanism for the concepts of working class solidarity all over the world, we advocate imperial communism. Yes, for a person who is not familiar with the theory of Marxism, this may sound absurd, but this is exactly what our ideology will be in the 20th century. Russia cannot have a destiny other than empire. And it is communism that will lead us forward! And we will bring it to the nations that are still waiting for their awakening. Hooray, comrades, glory to the motherland! Glory to the eternal teachings of Engels-Marx-Stalin!"
 SOV_soviet_christianity: "Soviet Christianity"
 SOV_soviet_christianity_desc: "Christianity is essentially proto-communism. It was it that destroyed slavery in ancient times and was able to unite people on three continents at once. And that is why it is repugnant to the power of the globalists, because it allows people to become closer, while remaining different, without becoming a single mass that is easy to control. Christianity and communism are also united in that they believe in the inevitable ascension of man and ascension to a new stage of existence. The ideas may sound different, but they have the same essence. So why don't we take a step forward? Just as our ideology is syncretic, so will our faith. Great Russian figures will be elevated to the rank of saints, and religion will become inseparable from ideology. Oh, rejoice, brothers in Christ and the common proletarians! For the meek will inherit the earth."
 SOV_great_russian_awakening: "Great Russian Awakening"
 SOV_great_russian_awakening_desc: "Truly, the Russian people have been destined for a messianic role by fate itself. It was we who were the first to wake up from sleep and embrace the ideas of socialism. Even though the first experiment was not successful for many reasons, it was like a stone thrown into the water that resounded all over the planet, prompting people all over the world to join the true teaching. However, it didn't work out then. They did not have the courage and ambition to fully awaken the Russian deep people and lead them into the socialist era. However, in the 21st century, we no longer have the right to make mistakes. Get up, Russian people. Throw off the shackles of the golden idols of capital and embrace socialism. Together we are destined to lead humanity to the peak of its development and create the greatest civilization in the world!"
 SOV_deploy_peoples_militia: "Deploy People's Vigilantes"
 SOV_deploy_peoples_militia_desc: "Are the ideas of the authorities worth anything if they don't resonate with ordinary people? Without grassroots support, even the brightest idea is doomed to failure and oblivion. And that is why we will contribute to the creation of national Red Banner squads. Their task will be to provide comprehensive assistance to the territories assigned to them, combat harmful elements, and spread our great ideology. And, of course, in the event of war, they should be ready to take up arms and go to defend their socialist fatherland in the front ranks. Of course, they will enjoy certain privileges, but where can they go without it?"
 SOV_russian_proletarian_world: "Russian Proletarian World"
 SOV_russian_proletarian_world_desc: "History does not know the subjunctive mood, and we do not know what will happen in the future. However, now we are one hundred percent confident in our victory. The victory of socialism and the Russian people personally. We will fight to the last, and if necessary, we will turn the earth itself crimson like our banner in order to save all of humanity. After all, there must be order in the world, and it should rightfully be proletarian! And the real proletariat at the moment is only the Russian people. Fear the old world, made up of globalism and lies. The spring of humanity is coming and we will be the flag bearers of a new world. For this is our burden."
 SOV_social_engineering: "Social Engineering"
 SOV_social_engineering_desc: "Human society is imperfect. It is the real apotheosis of our animal nature. After all, even after millions of years of evolution, we have remained hairless monkeys, ready to pick up a stone or stick and kill our neighbor at any second. However, this does not mean that our nature cannot be changed. Society can always be rebuilt if you know what strings to pull. But social engineering is a long process and we may not get results for a long time. But, as you know, the end justifies the means."
 SOV_enforce_state_planning: "Enforce State Planning"
 SOV_enforce_state_planning_desc: "Planning is the foundation for any stable economic system. Here we can draw an analogy with the human body. The mind controls the processes, and the body obediently performs them for the survival of the organism. There are, of course, excesses when the mind "gets stupid" and the body, for its own good, must temporarily turn it off. And giving absolutely everything to planning is stupid and simply impossible. But the basic backbone of the economy should be controlled by an administrative and command approach without any objections."
 SOV_richness_is_a_sin: "Richness Is a Sin"
 SOV_richness_is_a_sin_desc: "No matter how perfect the planned economy is, it would be foolish to rely on the decisions of the center in everything. Officials and countless bureaucrats cannot effectively manage resources and give instructions if they are divorced from reality. It is to prevent excesses that we will create regional economic committees that will deal with the development of the territories allocated to them."
 SOV_regional_economic_committees: "Regional Economic Comittees"
 SOV_regional_economic_committees_desc: "No matter how perfect the planned economy is, it would be foolish to rely on the decisions of the center in everything. Officials and countless bureaucrats cannot effectively manage resources and give instructions if they are divorced from reality. It is to prevent excesses that we will create regional economic committees that will deal with the development of the territories allocated to them."
 SOV_optimize_the_economy: "Optimize The Economy"
 SOV_optimize_the_economy_desc: "Economics is a tedious process in which there is always a place for optimization. By making a few improvements in the bureaucratic process and slightly improving the interaction between workers and directors, we can get amazing results! The economy always has room to grow, and by conducting a comprehensive optimization process, we can create a truly unstoppable machine."
 SOV_forced_re_industrialization: "Forced Re-industrialization"
 SOV_forced_re_industrialization_desc: "When the Soviet Union fell, our country was plundered! Dozens of enterprises have been left on the sidelines of life, and our industrial might has been extinguished. Does a country with the greatest natural resources in the world and a huge number of bright minds deserve such oblivion? No, no, and no again! The Soviet Union of the new era will not put its predecessor to shame. It's time to get back behind the machines and pick up the tools. May the smog from the chimneys darken the skies! The country of workers is getting back on track!"
 SOV_great_constructions: "The Great Constructions"
 SOV_great_constructions_desc: "Communism is primarily a dream. The dream of something majestic and incredibly grandiose, for example, the unification of mankind. However, this dream may have more material forms. So, we will reject the anti-Semitic decadence and build a new world with our own hands! Monuments of unprecedented size, hydroelectric power plants and nuclear power plants, as well as museums. The proletarians can create all this if we work together!"
 SOV_construct_the_workhouses: "Build Up The Workhouses"
 SOV_construct_the_workhouses_desc: "Work settlements are a great opportunity to optimize production processes in our country. Located directly near industrial or agricultural facilities, they will be responsible for the direct processing of products and their shipment further along the production chains. It's time to multiply them to create a powerful industrial base and fuel our machine!"
 SOV_the_new_rural_socialism: "New Rural Socialism"
 SOV_the_new_rural_socialism_desc: "Russia was once the largest grain producing nation. All countries bought it, and even the ill-fated French bread was made from it. But times are passing and our country's capacity in this regard has subsided. It got to the point where we were forced to buy other people's wheat to feed our people. Enough! It's time to raise your farm and develop the land. Pick up the sickles and plows again! Let the golden fields grow! The country of the peasants is getting back on track!"
 SOV_all_russian_communes: "All-Russian Communes"
 SOV_all_russian_communes_desc: "It would be difficult to organize agricultural activities without government assistance. It is in order to guide and help our resurgent sector of the economy that the so-called All-Russian communes will be created. Together, we hope to unite all Russian farms into a single chain that will work like a living organism and meet the needs of our citizens."
 SOV_idolize_the_countryside_life: "Idolize the Countryside Life"
 SOV_idolize_the_countryside_life_desc: "Peasant idyll, weren't these images sung in their works by various poets and writers of bygone times? Endless fields of wheat, like oceans. Mazes made of corn in which you can get lost accidentally. Birdsong and the rhythmic sound of a scythe chopping down another portion of grass. Of course, times have changed, but the way of life in the villages is barely. Moreover, this is a good chance for urban people, having lost only a little comfort, to switch to self-sufficiency and finally try real products. Let's explore the virgin lands together, friends and comrades!"
 SOV_worker_conscription: "Worker Conscription"
 SOV_worker_conscription_desc: "It doesn't matter how communism is built or how it strives for it. Workers are always needed, and parasites will have no place in the prosperous world of the future. Therefore, let's all go to the construction site of communism together! Believe me, there is a place for everyone there."
 SOV_nurture_labor_aristocracy: "Nurture Labor Aristocracy"
 SOV_nurture_labor_aristocracy_desc: "The workers' aristocracy is the backbone of any regime. While the arteries of the state are constantly pumping blood, they are monitoring the state of the body. And naturally, the state of the state depends on their loyalty and suitability. The Soviet Union fell at one time, as if due to the neglect of this particular stratum of society. However, we will not thoughtlessly repeat the mistakes of our predecessors. Slowly, year after year, we will cultivate our aristocracy. Trained in theory, effective and, of course, loyal to our communist cause."
 #Navalny Focus
 SOV_russian_spring: "Russian Spring"
 SOV_russian_spring_desc: "Finally, the long awaited moment has arrived. Russia has broken its chains and is ready to embrace a true democratic system. Noone has expected this would happen so rapidly, yet here we are. \n As the people cheer in celebration, Navalny and his followers are preparing to reshape Russia forever."
 SOV_the_political_amnesties: "Amnesty for Political Prisoners"
 SOV_the_political_amnesties_desc: "Just like Alexei Navalny, many more political prisoners have been held by the regime during its reign. We are obligated to set them free. Even more so, their expertise might help us rebuild the system! Russia is free!"
 SOV_a_big_tent_government: "A Big Tent Government"
 SOV_a_big_tent_government_desc: ""
 SOV_Consolidate_Navalnys_Power: "Consolidate Navalny's Power"
 SOV_Consolidate_Navalnys_Power_desc: "Who but Navalny can lead our nation? It was he who started the FBK, it was he who led the protests. He was the core of the opposition, the core of the revolution and now, the core of Russia. \n The Great Liberator will guide us to prosperity!\n\nВерит в Вас как в Бога,\nИзмождённая страна,\nАвторитаризмом поражённая\nОчнувшаяся от сна.\nОправдайте веру в Вас  - \nНастал момент.\nОправдайте веру,\nГосподин президент!"
 SOV_Push_The_Figurehead_Aside: "Push The Figurehead Aside"
 SOV_Push_The_Figurehead_Aside_desc: "As much as we idolize Navalny... he has been in jail for how long? It was the FBK under Volkov that organized the opposition for so many years. It was they who unified the emigree community and bargained to Europe to continue assisting with financial support. \n Why should we put him above everyone else?"
 SOV_Form_The_Russian_Self_Defense_Force: "Form The Russian Self Defense Force"
 SOV_Form_The_Russian_Self_Defense_Force_desc: "The war with NATO and the following disorder has destabilized our country beyond measure. While we dislike the death cult that has been festering in Russian society for centuries, it is an unfortunate reality that we need armed forces to survive. \n Using the example of the Japanese, we will establish the Russian Self-Defence Forces. This will also assist us in employing the veterans of the previous regime which will improve the situation with organized crime. \n While we still have to repay for our crimes, perhaps we can reenter the world and fight against genocidal and tyrannical regimes like Germany and Japan now do."
 SOV_Call_Back_For_The_Emigres: "Call Back For The Emigres"
 SOV_Call_Back_For_The_Emigres_desc: "Over the years a huge number of Russians fled abroad. Be it during the 1990s anarchy, the 2000s opportunism or the 2010-2020s persecution, there are a lot of people who we could call upon for return. Not only that, this can bring in the needed funds for us. \n Russia welcomes all!"
 SOV_First_Russian_Democratic_Elections: "First Russian Democratic Elections"
 SOV_First_Russian_Democratic_Elections_desc: "The time has finally come! Russia will hold its first democratic elections! While Navalny is an obvious candidate that is probably guaranteed to win the snap elections, the other figures have very differing views and could bring interesting dynamics to our state. \n Since our democratization was so rapid, we don't even have well-established parties to represent everyone, so the administration will be forced to quite literally start from scratch. \n However, this is a small price to pay for the Russia of the Future!"
 SOV_grand_constitutional_reformation: "Grand Constitutional Reformation"
 SOV_grand_constitutional_reformation_desc: "For the longest time our system relied on a broken constitution that gave power to the regime. Now, we are ready to create a true democratic constitution. One that will enshrine the freedoms  and rights that have paved the way for the civilized world. \n And maybe, if our people embrace it wholeheartedly, we can finally stand alongside the European democracies that have freed us!"

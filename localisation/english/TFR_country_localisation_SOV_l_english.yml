 russia.180.t: "Revolution in Kyrgyzstan"
 russia.180.d: "Disgruntled people are out on the street and are serious, the Kyrgyz government is unlikely to resist. Should we help it?"
 russia.180.a: "We have troops in Kyrgyzstan, give them an order..."
 russia.180.b: "It's none of our business."
 russia.181.t: "Kyrgyzstan's revolution has won"
 russia.181.d: "The people seized the Parliament building, later the government and the president resigned. Soon there will be early elections in the country."
 russia.181.a: "Nothing will change for us anyway."
 russia.182.t: "The President's condition is worsening."
 russia.182.d: "Despite all his efforts, Vladimir Putin is only getting worse. The doctors explain their helplessness by the fact that in addition to the coronavirus, the patient also has various other chronic diseases that make the situation almost hopeless. In 2020, Putin has drafted a bill that would provide for former heads of state to be senators for life. Maybe it's time to exercise this right and give the presidency to a new person?"
 russia.182.a: ""It's about time. Sergey Naryshkin, my old friend....""
 russia.182.b: ""No, it's too early for me to leave...""
 russia.183.t: "Sergey Naryshkin announces early elections."
 russia.183.d: "Acting President Sergey Naryshkin still did not dare to serve out his current term and announced a new presidential election in which he does not see himself as a candidate."
 russia.183.a: "What's next?"
 russia.184.t: "Vladimir Putin Passes Away"
 russia.184.d: "Today, Russia mourns the loss of former President Vladimir Putin, who tragically succumbed to a severe battle with Covid-19 at his Dacha. In a surprising turn of events, Putin recognized the gravity of his condition and voluntarily stepped down, appointing Naryshkin as the interim leader.\nThe news has left many in shock, as some had hoped for his recovery and eventual return to office. Across the country, citizens have come together to hold public gatherings and lower national flags to half-mast in remembrance of Putin. Even those who were critical of his leadership have expressed their condolences to his family. Medvedev, in a heartfelt social media post, described the news as a painful blow to his soul, echoing the sentiment felt by many Russians today.\nThis is undeniably a day of great sadness for the entire nation."
 russia.184.a: "Rest in peace."
 russia.185.t: "Vladimir Putin Is Dead!"
 russia.185.d: "In a tragic turn of events, Vladimir Putin passed away due to complications from Covid-19. The news of his death came as a shock to the nation, as many believed he was still capable of leading. In order to ensure a smooth transition of power, Mikhail Mishustin was swiftly appointed as the new leader according to protocol. Despite the unexpected crisis, the country managed to avoid any further turmoil. Citizens across Russia gathered for rallies and lowered state flags as a sign of respect for Putin's memory. Even those who had criticized his leadership expressed their condolences to his family. Dmitry Medvedev took to social media to express his heartfelt sorrow, acknowledging the deep impact this news has had on him and many other Russians. Today is undoubtedly a day of immense grief for the entire nation."
 russia.185.a: "Rest in peace."
 russia.187.t: "Resistance Against Russian Occupation in Kazakhstan"
 russia.187.d: ""
 russia.187.a: "Crush these fools!"
 russia.188.t: "Attempt made on Zhirinovsky's Life"
 russia.188.d: ""
 russia.188.a: "Luckily the President is alive..."
 russia.189.t: "The Fate of Belarus"
 russia.189.d: "The Putin regime managed to annex Belarus to Russia under the Union State project. Many residents of this country are unhappy that Belarus has lost its statehood. What are we going to do about it?"
 russia.189.a: "We will recreate the Belarusian SSR, headed by Alexander Lukashenko."
 russia.189.b: "Belarus will be free, but under the leadership of "Just World"."
 russia.189.c: "Let's leave it at that..."
 russia.190.t: "Questions of Government Positions"
 russia.190.d: "Running a nation can be as hard or as easy as you want it to be. There is something to be said about the benefits of redundancy but our Great Leader, Alexandr Dugin, is a brilliant man capable of running the current ministries by personal decree if he so wished. All that really matters now is determining whether or not allowing one man to handle all the ministries responsibilities is responsible. In a post Dugin Eurasia, merging the ministries could be hard to undo and less wise leaders may be unable to handle the workload. Some in the advisory council have put forward that Dugin is too old to handle every single Ministry at once. It is however Dugin's decision to make at this stage as he has full support of the party in this."
 russia.190.a: "Positions should be merged!"
 russia.190.b: "Dugin's duties shouldn't be overstretched..."
 russia.191.t: "Eurasianist Congress"
 russia.191.d: "Our Congress is an important vessel for our state, one that in the unique Eurasianist manner contains a Left Wing and a Right Wing, the Solarists and Lunarists. Both have unique ideals, the Left Wing signifies the National Bolshevik wing of the party, the pride of the late Limonov. While the Right signifies the more traditionalist elements defined by Orthodoxy not just in religion but in culture as well, focusing heavily on Dugin's writings where they concern the preservation of tradition.\n\nWhoever we pick is likely to heavily influence what type of government we will become in the coming years and when we have Liberated Europe, what Eurasia will remain for the coming centuries."
 russia.191.a: "Favor Anti-Globalist Left"
 russia.191.b: "Favor The New Right"
 russia.192.t: "A Just Russia Merges With 'For Truth'"
 russia.192.d: "In December 2020, there was evidence that 'A Just Russia' was preparing to unite with the parties 'For Truth' and 'Patriots of Russia'. At the end of December, party leader Sergey Mironov confirmed these intentions, and on January 20, 2021, an agreement was announced. The unification of the parties is planned in February-March of the same year under the name 'A Just Russia - Patriots - For Truth' or 'A Just Russia - For Truth'"
 russia.192.a: "Doubt This Will Help Them"
 russia.193.t: "Death of Eduard Limonov"
 russia.193.d: "Today a funeral was held for ecocentric bestselling writer, political activist and a leader - Eduard Limonov, who passed away at the age of 77, after experiencing complications caused by surgery.\nIn 90s Limonov became one of main opposition figureheads against Yeltsin's Government, and together with Dugin and Letov founded National-Bolshevik Party, whose policies and practices later shaped modern-day reading of National-Bolshevism in Russia.\nAfter Putin's takeover, and subsequent stabilization and de-radicalization, helped by Limonov's imprisonment "on charges of weapons possession and the creation of illegal armed groups to take over northern Kazakhstan",  NBP's popularity begun to dwindle, until in 2007, Party's name and Symbols were banned by authorities.\nOnly few years later, however, Limonov went to give rebranding to the party under the new title - 'The Other Russia', named after one of Limonov's Manifests.\nAging coupled with health problems made Limonov turn away from inner party matters, giving leadership to younger apprentices, remaining the public face and speaker for the party during various protest events and meetings.\nHe was among the most supportive of Donbass Rebellion in 2014, ralling his party and personally visiting frontlines.\n\nHe was buried at the Troyekurovsky cemetery, with coffin warped in old NBP flag, many of his supporters attended, giving last respects to their "Gramps", taking oath near his grave that they will fight to bring his vision into reality."
 russia.193.a: "Memento Mori"
 russia.194.t: "Wagner begins operations in Ukraine"
 russia.194.d: "Nearly as soon as the declaration of the Special Military Operation, the private military company, Wagner had mobilized along with our military to join them in the invasion. There have been a multitude of controversies surrounding the organization, ranging from war crimes to human rights violations, but no opposition to their involvement with our armed forces has been raised. Their brutality is a double edged sword and may prove useful in the coming battles..."
 russia.194.a: "Lets see how they do"
 russia.195.t: "Future of Motherland"
 russia.195.d: "After winning the European war, we will finally be able to get rid of the oligarchs and realize our views on Russian politics"
 russia.195.a: "Get rid of oligarchs and implement a new constitution with Putin's ideas"
 russia.195.b: "Get rid of oligarchs and embrace Putin legacy"
 russia.196.t: "FSB prevented socialist terrorist attack"
 russia.196.d: "In recent days, searches have been carried out in many socialist organizations because of the new decree of the Medvedev government, and the result fully justified all costs, because today the lives of citizens were saved. A Communist Party membership card and a lot of unlicensed weapons, which were obtained illegally, presumably from Central Asia, were found in terrorist's house in Saint-Petersburg."
 russia.196.a: "Thank god we prevented that!"
 russia.197.t: "LDPR joins the ONF coalition!"
 russia.197.d: "Recent development in russian politics has shocked the public, the united russia and LDPR after long negotiations is united in one coalition! Medvedev agreed to reshuffle ministers to unite with the LDPR. Some of people were not surprised by recent developments because as they say "LDPR was always an Kremlin Puppet""
 russia.197.a: "All According to Plan"
 russia.198.t: "CPRF joins the ONF coalition!"
 russia.198.d: "We never thought that it could ever happen but it is indeed true - CPRF and United Russia are now in one coalition. The CPRF after the many scandals that hit it with recent news, and numerous pressures from the Medvedev Administration has finally led to an end of CPRF as an independent party. Now communists of all sorts call Zyuganov a traitor and a puppet of the Kremlin, others justify his decision by lack of choice, but only time will tell whether it was really the right decision."
 russia.198.a: "I Was Born in USSR"
 russia.199.t: "United Russia and Just Russia Unites"
 russia.199.d: "Just Russia and United Russia finally united after long negotiations. Such actions did not surprise anyone, because everyone knows the relationship between Medvedev and Just Russia"
 russia.199.a: "Now Russia is truly United!"
 russia.200.t: "Dugin's Directives"
 russia.200.d: "There are only two choices after listening to one of Dugin's Directives, first is to agree with everything, grow an epicanthus, throw Eurasianist 'Hail', go on streets, and mercilessly stab a liberal, second is to disagree with everything, and write gagilion letter comment under the video about what you think of this insane old man, and his vatnik beard."
 russia.200.a: "Pay Attention!"
 russia.201.t: "Exiles From Donbass"
 russia.201.d: "The Donbass may have fallen to the enemy, but the people are strong. Many fled their homes in fears of brutal repressions, but their rebel spirit lives on. After the rise of a new regime, that aims at revenge against NATO dogs, both veteran militiamen and the young blood formed Brigades out of exiles to be ready to fight another day, in hopes to have their homes back."
 russia.201.a: "You'll Have Your Home Again"
 russia.202.t: "Death Of Admiral Vladimir Vysotskiy"
 russia.202.d: "Admiral of Russian Navy Vladimir Vysotskiy has passed away due to heart problems, at the age of 66. He was buried with military honors on February 8 at the Troyekurovsky cemetery."
 russia.202.a: "Thank You For Your Service, Comrade"
 russia.203.t: "Arrest of Leftists"
 russia.203.d: "Massive crackdowns took place in many cities across Russia. Police detained leftists dissenters, especially the ones with online following, both big and small.\nMost of them throw their hands up in the air and surrendered peacefully, like Andrey Rudoy and Boris Kagarlitsky, with all their internet presence deleted shortly afterwards.\nThe highlight episode of those arrests, however, was Konstantin Semin's motorbike chase that lasted 6 minutes, ending in him crashing into a tree, with no sustained injuries nonetheless. It was reported that he might have been under the effects of alcohol.\n\nThe Operations ended with over thousands of people apprehended for espousing left-wing politics, as well as over 10 socialist organizations headquarters raided and put under lockdown by law enforcement."
 russia.203.a: "Purge Those Parasites!"
 russia.204.t: "Arrest of Liberals"
 russia.204.d: "Operations to purge liberal opposition had begun. Police raided notorious FBK and Russia of Future HQs, arresting on-place activists. Many liberal influencers were put under detentions, like Maxism Katz and Varlamov, in addition, deactivating their accounts on social media.\n\nHowever, some of liberal headmasters, have apparently avoided prison by escaping shortly before start of crackdown into Europe, where now they record exposing videos on our government...To western audience only.\n\nNo matter some escapees, operations were proven to be stunning success, with liberal-western ideologues slowly being removing from public eye."
 russia.204.a: "Expunge The Measles!"
 russia.205.t: "Nur-Sultan Renamed Back Into Astana"
 russia.205.d: "Thanks to our intervention, Kassym-Jomart Tokayev managed to maintain his power in Kazakhstan, and, taking advantage of the protests, he finally removed Nursultan Nazarbayev from the political scene. Elbasy was stripped of the chairmanship of the Security Council of the Republic of Kazakhstan and the post of head of the dominant Nur Otan party of Kazakhstan, then renamed Amanat.\nThe fifth example of a new course towards "de-Nazarbaevization" was the renaming of the capital of Kazakhstan, Nur-Sultan, back to Astana. The city was renamed in 2019 by a decision of the parliament in honor of the retired head of state Nazarbayev. Elbasy ruled Kazakhstan even before the collapse of the Soviet Union, becoming the First Secretary of the Central Committee of the Communist Party of the Republic in 1989, until his retirement. Now that it is devoid of any significance, the renaming marks a new chapter in the history of the Central Asian republic."
 russia.205.a: "A bit awkward"
 russia.206.t: "Zhirinovsky Calls Out Party Membership"
 russia.206.d: "During an LDPR Council meeting, Vladimir Zhirinovsky has expressed the need for an internal party clean up. In his usual manner he exclaimed that he won't allow suckers, and career opportunists inside the party, and that membership should be earned through hard work for the Nation.\n\nAs of today, Party's regional committees received directives on forming a review commision for seeking out 'suckers and money grabbers' and purging them.\nIt's unknown how many will suffer from this, but it could be a good amount."
 russia.206.a: "A Shake-up Is In Order"
 russia.207.t: "Beginning Of All-People's War Mobilization in Donbass Republics"
 russia.207.d: "For a Russian World to become reality, great struggle must occur, the Donbass people know this best. which is why they are prepared to do it again following secret orders from Kremlin. The Donbass Republics begun mobilization efforts on their territories, men are being recruited and trained, old weapon caches are being opened, and vehicles prepared and cleaned. War is coming, Donbass will rise up, and once again be like Brest."
 russia.207.a: "Final Countdown"
 russia.208.t: "Announcement of NATO Mandate"
 russia.208.d: "Today at 14:00 Moscow time, during the NATO conference that took place in Brussels, a significant historical decision had been made. The European leaders, after a long speech about the devastating European wars and their destruction, and the need to consolidate the continent's efforts to rebuild affected regions.\n\nThe culmination of this conference was the announcement of a territorial mandate over the occupied regions of Russia, where a "Moscow Republic" would be formed to act as a legitimate successor to the democratic Russian Federation under Boris Yeltsin. However, the territory of said republic would apparently not extend beyond central Russia, with the south russian-majority regions either taken under ethnic minority republics, or gaining general independence. Moreover, the northern regions of Russia, including St. Petersburg, will be "reorganized under the NATO arctic naval command to protect Europe from further incursions from the East".\n\nWhile this had already infuriated most Russians in said regions, the speech of the new Russian government was the straw that broke the camel's back. The infamous rogue oligarch Mikhail Khodorkovsky had made his public debut, announcing that "he and his fellow fighters for freedom will finally make Russia a civilized society, free from its imperial-soviet barbarism".\n\nMany had already claimed it to be a mistake to make one of the most brutal oligarchs of the Yeltsin era as the new leader of the Russian people, but without any good replacements and a general power struggle inside the liberal movement it seems that he is here to stay. In any case, the new government will have to take responsibility for the restoration of Western Russia, destroyed by the war."
 russia.208.a: "Wind of Change"
 russia.209.t: "Protests in St. Petersburg"
 russia.209.d: "While some had hoped that St. Petersburg would again become "the gateway to the West", it seems that the rift between Russia and Europe is too big to cross. After the city had been placed under direct NATO military occupation, general unrest had skyrocketed among the populace.\n\nToday it seems the people have had enough and organized a protest near the Winter Palace. Varios pro-Russian slogans such as "Return St. Petersburg to Russia!", "Let's expel the occupiers!" and "We'll be back!" were present en masse across a huge crowd of people. While NATO command claimed there were only around 10 thousand people, most news sites claim that the protest was at least 60 thousand people strong if you include the people blocked off outside of the main square.\n\nMost analysts agree that this is just the beginning, as the Russian populace will continue to radicalize under the occupation. It seems that the past 2 wars had not exhausted the people's will to fight, as they still continue to resist NATO's mandate."
 russia.209.a: "We will monitor the situation"
 russia.210.t: "The emergence of Russian gangs and the Western Mafia"
 russia.210.d: "Due to the complete dissolution of the Russian police force under the new government and a policy of open borders with NATO members, the western mafia groups have made their claim to the region. Using their pool of war veterans as muscle, they easily took up the market in both legal and illegal businesses. The most powerful of these groups are the French "les Enfants Terribles" and the Italian "Passione".\n\nAs of now, these groups not only control a number of Russian factories that were auctioned off to pay reparations, but also meddle in human trafficking, smuggling and drugs.\n\nNATO command has already issued a declaration to deploy a "European police force" to monitor the situation. This, no doubt, will further radicalize local Russians."
 russia.210.a: "Harsh times have come for Russia."
 russia.211.t: "Russian March in Moscow"
 russia.211.d: "The situation at the Russian mandates continues to worsen. A Russian march was organized today at 16.00 on Novy Arbat, with civilians marching on the streets and protesting the Russian occupation. While it remained peaceful at first, the crowd became uncontrollable after seeing a group of Europeans, presumably tourists. After the start of the scuffle, 10 European nationals were killed in the fighting, prompting a police response.\n\nSince the police force was European as well, the crowd continued to fight the police force, killing at least 2 and burning one of the cars called up on the call until they were dispersed by live rounds.\n\nThe Moscow Mandate police force has already been involved in cracking down against unarmed civilians, so after the news have been made, the Russian public as well as foreign media have condemned the European elites for suppressing the peaceful protests, calling for the arrest of all officers involved for police brutality."
 russia.211.a: "Fuck"
 russia.212.t: "The Call"
 russia.212.d: "Sergey woke up from a phone call, feeling terrible. His dream was just as terrible: he remembered the trenches, shelling and his long dead comrades. He walked around the room littered with garbage, looking at his phone. He didn't have anyone who could call him at such an hour: his friends died at the front and his love died due to NATO carpet bombing. He didn't even know if his parents were still alive, but he didn't seem to care about that. As his headache kept getting worse, he realized that he NEEDED to answer it.\n\nHe reluctantly went to the phone and picked up the receiver: "Hello. This is Nikita from the real estate bureau. Today we are inspecting a new apartment. This is an apartment on Bogoslovsky Lane, 3. The house is open. Come in your free time." Sergey did not understand anything from what was said, but he decided that the only way to find out what was going on was to go to the address.\n\nWhen he left his house, he found a strange package. Inside there was an animal mask and a piece of paper with the inscription "The target is a briefcase. Be careful. Leave the target at point F-32, in the trash can. You have no right to make a mistake. We will be watching you.""
 russia.212.a: "Strange things are happening."
 russia.213.t: "Shooting on Bogoslovsky Lane"
 russia.213.d: "Early yesterday morning, shots were heard in Bogoslovsky Lane from the recently opened Vergil nightclub, which is run by the Italian mafia called Passione, and all the victims were, according to the Mandate, Italians. Many attribute this to some of the leaders of the new government, specifically Khodorkovsky, who has recently returned to his homeland from abroad and no-doubt eager to retake his market share. However, this is a big blow to the reputation of the NATO Mandate in Russia, as the police force was very ineffective."
 russia.213.a: "Fuck."
 russia.214.t: "Another Wild Decade?"
 russia.214.d: "Russia has reached a new boiling point, very similar to the one it has passed since the early 90s, with many analysts say that Russia will not be able to fully recover from such a crisis. With a rising crime rate caused by western mafia groups, anti-Western activities by Russian nationals, and corruption in the highest echelons of the NATO-backed government, the situation seems unsalvageable. It seems that no matter how the NATO mandate tries, the Russian public will not give any sympathy for the new government."
 russia.214.a: "Sorry, but I can't hear you over here at the winners table."
 russia.215.t: "The Leaders of "Passione" and "Les Enfants Terribles" are dead!"
 russia.215.d: ""We start on the count of three... two..."\n\n"Good evening, live Irina Lebedeva especially for you Euronews Russia with a report from the Mansion of Jean Paul. Notorious heads of criminal organizations have just been killed by an unknown assailant."the camera shows two policemen dragging a man into a police car "As you can see, the police have already arrested the criminal. Details are still unknown, but it is likely that the attacker had an animal mask with him. We will keep you updated on new developments."\n\nThe frame is replaced by a TV presenter "Animal mask? If this information is confirmed, then this incident refers to a series of murders committed by attackers in strange masks, according to local media, a lot of brutal murders committed in recent months have worried the citizens of Moscow. Most of the victims are connected with various groups inside the city. Despite all the efforts, the police still do not know the reason for the crimes committed, as they failed to interrogate the suspects."\n\nThe frame again takes us back to the reporter "That's right! During the shootout in the house of Paul, several more people were killed, it is not known how many, medical workers still continue to carry out the bodies. The information that the criminal had a fox mask with him has just been confirmed. Now the criminal is being taken to the police station, where he will be interrogated."\n\nAnd again the frame returns to the studio "This is just incredible news, many viewers know that the man in the fox mask is most famous among the rest, he is responsible for a series of murders at the police station committed last week, as well as for several other crimes, including the murder of Nikolai Agafonov, a well-known producer. If the arrested person turns out to be him... We finally get answers about the outbreak of violence. Who knows... perhaps this will put an end to the killers in animal masks...""
 russia.215.a: "He got his fifteen minutes of fame..."
 russia.216.t: "The case of the Killer in the Fox Mask"
 russia.216.d: "The trial was very complicated, the battle between the prosecutor and the lawyer lasted for an hour, but it is still impossible to determine the winner.\n\n"Now the defendant claims that he was ordered to commit these murders by sending messages to his phone. Have you checked this statement?" The prosecutor asked, "Yes." The head of the police answered in the affirmative, "and what did you find?" "The phone was completely empty." "Did you find evidence to back up the claim of "threatening calls"?" "No. Not found" "Clearly... No more questions." the prosecutor said with confidence.\n\nBut, apparently, the lawyer decided that it was too early for him to give up, and began his speech: "You say that you have not found physical evidence to support my client's statements. What about the phone operator archives? It's not difficult for the police to get access to such information, is it?" to which the head of the police replied, "Yes, we have studied the records of the defendant's calls."To which the lawyer immediately replied, "Did you find any calls that could back up my client's statement?" The head of the police nodded, "Yes, the defendant was indeed called in the very time period that he indicated. But..."\n\nWithout finishing, the lawyer interrupted him, it is unclear whether because he was in a hurry, or because he did not want the head of the police to continue his speech, "Did you manage to track the source of these calls? If so, where did they come from?" "Yes, they came from a nightclub called the Golden Calf."Now my client claims that the Italian mafia forced him to commit the crimes for which he is on trial. Does the police have any information about the connection of the "Golden Calf" with the Italian mafia, which could confirm the words of my client?" "Indeed, the institution was noted several times in the chronicle of gang fights. However..." once again interrupting the police chief, the lawyer said with a grin, "That's all, thank you. No more questions."\n\n"The witness can sit down. The court is retiring for a break." Said the judge, briefly putting an end to the conflict of two minds."
 russia.216.a: "It's going to be a long trial..."
 russia.217.t: "Azov Defects to Our Side"
 russia.217.d: ""
 russia.217.a: "An unexpected alliance?"
 russia.218.t: "Pro-Ustashe Coup in Croatia"
 russia.218.d: ""
 russia.218.a: "Interesting..."
 russia.219.t: "First Soviet Corporation"
 russia.219.d: "Most recently it was created under the name "Sovkhoznik". It unites under its wing such brands of Putin's Russia as Sber, Yandex, VK, Tricolor, and many others. Pavel Grudinin became the general director of Sovkhoznik. Although formally a "People's Enterprise," Sovkhoznik has all the hallmarks of a capitalist corporation. While orthodox Party members have already condemned Pavel Grudinin's actions, accusing him of open opportunism, the people of our Country have mostly welcomed the creation of Sovkhoznik."
 russia.219.a: "Grudinin is a strong businessman!"
 russia.219.b: "We will watch with interest as this develops..."
 russia.220.t: "AFTER-ACTION INCIDENT REPORT - 'ENEMY UNKNOWN'"
 russia.220.d: "SYNOPSIS:\nThe following report serves as a strategic and developmental analysis of the friendly fire incident occurring on [DATE] in the greater Kharkiv region, in regards to the malfunction, loss of operational control, and subsequent neutralization of a recently deployed unmanned Armoured Fighting Vehicle (AFV).\n\nINCIDENT LOG:\nDuring an offensive excursion within the Kharkiv region, a single fighting vehicle, designated the BMPT "Terminator" - of which had been operating within its frontline unit for several days with exceptional combative and operational efficiency - began to grow unresponsive to instructions shortly after hostile contact was made. According to accounts from surviving ground troops and reports from engineers brought to inspect the bombed-out remains of the vehicle, an identification error had occurred within its software, promptly causing the vehicle to begin firing indiscriminately, targeting any and all human combatants within the area with no regard for combative affiliation. \n\nAs a result of the vehicle becoming a rogue element, units involved in the offensive found themselves disorganized and subjected to a significant number of casualties attributed to the vehicle, with remaining forces of both sides making a brief strategic retreat from the area as it continued to assault the zone of operation. After several repeated requests for reinforcements and air support maneuvers, the vehicle was eventually dispatched and neutralized after twenty-six (26) minutes of a combined effort from both ground and air forces within the region.\n\nAFTERMATH:\nPost-incident investigations of the incident from both RAF engineers as well as personnel from the vehicle' s manufacturer Uralvagonzavod have largely concluded that the incident and malfunction on the part of the BMPT's Artificial Intelligence was "highly unusual" and generally unlikely to repeat within other BMPT units. Uralvagonzavod research into further safeguards for AI failures as well as possible improvements to identification software is ongoing."
 russia.220.a: "It'll probably be fine..."
 russia.221.t: "Filling the Ranks"
 russia.221.d: ""
 russia.221.a: "Their experience is needed now more than ever..."
 russia.222.t: "Issues of the Other Parties"
 russia.222.d: "Now that we finally have power in our hands, it's time to decide what we're going to do about the rest of the political forces in the country. "United Russia" will definitely be destroyed and its leaders put on trial, but what about the others? Do we have to do away with them? Of course we will act carefully using all the political techniques and special services, but will it be right to do so at the very beginning of our rule?"
 russia.222.a: "Dissolve only United Russia."
 russia.222.b: "Also ban fascists."
 russia.222.c: "Liberals and United Russia were for one... No mercy for them either!"
 russia.223.t: "Soviet Parliament"
 russia.223.d: "The time has come to say goodbye to the ill-fated State Duma, created by Yeltsin on the blood of the Russian people... Now it is time to create a new supreme body of state power, a new parliament. What do we take as the basis? A unicameral Supreme Soviet before 1990 or a bicameral Congress of People's Deputies? "
 russia.223.a: "Congress of People's Deputies."
 russia.223.b: "The Supreme Soviet."
 russia.224.t: "Gender Issue"
 russia.224.d: "Various feminist movements, especially the DSM, are very concerned about our attitudes toward gender issues. There have been small demonstrations and pickets in some cities, and there is an ongoing debate on the Internet. Most likely this will only make the arguments and discussions online hotter, but we should probably state our views on the topic once and for all..."
 russia.224.a: "Communists have always been for gender equality!"
 russia.224.b: "We will protect traditional values."
 russia.225.t: "Second San Francisco"
 russia.225.d: "We have received a proposal to create a Special Economic Zone in Vladivostok, giving this area incredible preferences and tax breaks for foreign and domestic companies. This will contribute well to the development of this region, and investments will pour in like a river! By the way, China, which borders with us, will certainly like this decision very much."
 russia.225.a: "What a great idea!"
 russia.225.b: "Nah, we don't need that."
 russia.226.t: ""Party of Patriots""
 russia.226.d: "Recently, the "Party of Patriots" was founded, organized by such personalities as Vladimir Solovyov, Margarita Simonyan, Irada Zeinalova, and various other individuals who defended Putin's regime in the past. They call the current leadership of the country weak and indecisive, and they call Valery Rashkin a "liberal's puppet"."
 russia.226.a: "Let them whine all they want, the People of Russia have made their choice."
 russia.226.b: "Indecisive? Well, we'll show them... Arrest them all."
 russia.227.t: "Terrorist Plot Thwarted"
 russia.227.d: "Reports are flooding in that an elite Spetsnaz unit of Rosgvardiya have raided an apartment complex suspected to be the hideout of a clandestine organisation. During the raid, gasmasks were donned due to a potential chemical weapons threat but that didn't stop our boys from arresting every single terrorist. Following the raid, an officer from the team briefed our news crew.\n\n"Well, not only did we discover the chemical weapons, but the most disturbing part of it all is that they all had fake passports. The fools thought they were clever as they tried to burn their real ones, but we were fast enough to retrieve them. They're all Germans, EU citizens."\n\nCity officials have refused to comment on the matter at this time, but we can be thankful that the situation didn't turn sour and that no lives were lost. Whether this is a part of a larger plot against an attack on the country by radicals or a one off group remains to be seen."  
 russia.227.a: "Unsettling."
 russia.228.t: "The Surge of Terrorism"
 russia.228.d: "Nationalist groups have become active in Western Ukraine and the Baltic Republics. They advocate the destruction of the reconstituted Soviet Union and the restoration of chauvinistic regimes in Eastern Europe. They have already started sabotaging and killing people who are loyal to us. We have to do something about it!"
 russia.228.a: "Declare the position of the Counter-Terrorist Operation!"
 russia.229.t: "Negotiations are successful!"
 russia.229.d: ""  
 russia.229.a: "Ura!"
 russia.230.t: "Negotiations have failed"
 russia.230.d: ""  
 russia.230.a: "So to hell with them."
 russia.231.t: "Terrorist Attack in Poland"
 russia.231.d: ""  
 russia.231.a: "Horrendous Tragedy..."
 russia.232.t: "Terrorist Attack in Romania"
 russia.232.d: ""  
 russia.232.a: "Horrendous Tragedy..."
 russia.233.t: "Terrorist Attack in Kaliningrad"
 russia.233.d: ""  
 russia.233.a: "These attacks aren't random!"
 russia.234.t: "Tula Arms Plant Severely Damaged"
 russia.234.d: ""  
 russia.234.a: "Those bastards will pay!"
 russia.235.t: "NOTICE OF CONDUCT"
 russia.235.d: "FROM RUSSIAN GENERAL STAFF: DMITRY BULGAKOV\n\nGeneral Mizintsev, I have written several letters to you informing of you of the gross conduct of your men. The most egregious of these offenses recently occured during the offensive outside Krivoi Rih. The men of the 28th Motor-Rifle Division, which you command, slashed the tires of my command vehicle along with other vehicles of high ranking officers. I am aware of our disagreements and supply shipments, I will stand by my statement made before, I require the needed fuel, clothing, and ammunition to continue my offensives. I wish this matter not reach the Chief of Staff, for who knows if you'll keep your position if Gerasimov is informed about this debacle.\n\nSIGNED:"  
 russia.235.a: "DMITRY BULGAKOV"
 russia.236.t: "Re: NOTICE OF CONDUCT"
 russia.236.d: "Go charge at an enemy bunker you fucking subhuman, stop using my men for your idiotic assaults. It's a great shame the enemy artillery didn't bury you in your command vehicle, it would of saved more of my mens lives and be a nicer site to look at than the body bags pouring out of Krivoi you bastard.\n\nSIGNED:"  
 russia.236.a: "MIKHAIL MIZINTSEV"
 russia.238.t: "Navalny supports SMO"
 russia.238.d: "Alexei Navalny recently made an appeal to the citizens of Ukraine: "Dear Citizens of Ukraine, the moment has finally come when you have a chance to end once and for all the vicious circle in which your Country is stuck. From president to president: Yushchenko, Yanukovich, Poroshenko, Zelensky - except for the oligarchs at the helm, who actually run the country, nothing has changed! Modern Ukraine is a corrupt state that does not care about its own People. It should not be like this! Russia was finally able to overcome the lawlessness of Putin's thugs, creating a real democracy and people's well-being! So I ask you... for the sake of your future, for the sake of your children's future... support the Russian Army with all your might. Soldiers of the Ukrainian Army, turn your tanks on Kiev, on the palaces of those parasites who have robbed your country all this time, and we will help you in this: we defeated Abramovich, we will defeat Kolomoysky too!" With his speech the leader of the Political Party "Russia of the Future" actually proved that he supported the Special Military Operation on the territory of Ukraine."  
 russia.238.a: "The anti-war movement died before it could be born."
 russia.239.t: "Patriotic Games"
 russia.239.d: "Computer games are very popular among our youth. Maybe it would be worth allocating a small budget for their creation? Kremlin Games studio has been making games about the Cold War era for several years, in which the player is allowed to preserve socialism in our country and lead the Motherland to greatness... But they are definitely underfunded. What do you think?"  
 russia.239.a: "Well, maybe something interesting will come out."
 russia.239.b: "The state will not spend money on some toys."
 russia.240.t: "The Game is a Success!"
 russia.240.d: "The developers have tried their best! Taking a risk to make the game in a new genre, they decided to create an interesting adventure in the Civil War setting. Our gamers clearly liked the game, a huge share of the praise came from the Russian players. In the West, the game did not get the same success, having received the status of a curiosity from Eastern Europe, but Chinese gamers liked it, fan translation is being prepared by enthusiasts. The developers, having received an unprecedented income, have already announced a sequel. What can we say as a result? The Soviet gamer is satisfied and proud!"  
 russia.240.a: "The money was not invested in vain!"
 russia.241.t: "The Game is a Failure!"
 russia.241.d: "Having received the money, the developers decided not to take risks and made another simulation of the Secretary General of the Central Committee of CPSU. Although it turned out quite good, the players of "The First Soviet Game" expected quite different things. No one except fans of the genre liked it, and it was quickly forgotten."  
 russia.241.a: "We don't spend money on shit like that anymore."
 russia.242.t: "Patriotic Games"
 russia.242.d: "Computer games are very popular among our youth. Maybe it would be worth allocating a small budget for their creation? The newly formed studio The Enchanted Wanderer shows promising success, but they clearly lack funding. What do you say?"
 russia.242.a: "Hm... Why not?"
 russia.242.b: "The state has more important things to do"
 russia.243.t: "The Game is a Success!"
 russia.243.d: "The developers have exceeded all our expectations! The Enchanted Wanderer studio, having received the money, and decided to release the first serious Russian first-person shooter called "VESNA".\n\nThe events of the game take place in an alternative 2020, where the coronavirus did not go beyond China and was quickly defeated, the United States did not fall and the global economic crisis did not happen. In 2019, candidate Volodymyr Shmatko, who promised to restore relations with the Russian Federation, won the presidential elections of Ukraine by a minimum margin. In February 2020, negotiations began between Ukraine and Russia on signing the "Ukraine-Russia" program, but during the negotiations, President Shmatko was killed, and at the same time a terrorist attack took place at the Zaporozhye Nuclear Power Plant. The Prime Minister Igor Negoda, who has now assumed the powers of the president, accuses the Russian Federation of the murder of Shmatko and terrorist operations "in order to assist the separatists of Donbass". The player assumes the role of a fighter of the Special Operations Forces of the Russian Federation and goes on an important special mission to Ukraine.\n\nThe game was well received by both Russian and foreign players. Players note a good "multiplayer", which includes several factions, such as: Russia, China, Poland, Ukraine, USA. In Ukraine, the Verkhovna Rada adopted a law prohibiting the sale of the game "VESNA" on the territory of Ukraine. The developers, having received a large income from the sales of the game, promise to support the game with various updates and have already announced a "combat pass". Undoubtedly, this is a big breakthrough for the Russian gaming industry!"
 russia.243.a: "Great, and most importantly patriotic!"
 russia.244.t: "The Game is a Failure!"
 russia.244.d: "After receiving the money, the developers decided to create a new first-person shooter and, apparently, overestimated their strength... Although it turned out to be quite good, but the game is filled with a ton of bugs and a bunch of pay-to-win features, which is why the players nicknamed it "Warface 2". Although it has her own fans, it did not meet any expectations."
 russia.244.a: "Interesting... we'll think twice next time."
 russia.245.t: "Looting of the Steel Crown"
 russia.245.d: ""
 russia.245.a: "Interesting..."
 russia.246.t: "Preparing for the Election"
 russia.246.d: "We need to choose a Candidate for the Post of President."
 russia.246.a: "Yuri Afonin"
 russia.246.b: "Sergey Levchenko"
 russia.246.c: "Pavel Grudinin"
 russia.246.d1: "Leonid Zyuganov"
 russia.246.e: "Denis Parfenov"
 russia.246.f: "Boris Kagarlitsky"
 russia.247.t: "Election Results"
 russia.247.d: "The First Union Presidential Election was held, and it was won by..."
 russia.247.a: "...Denis Parfenov!"
 russia.247.b: "...Aleksandr Lukashenko!"
 russia.247.c: "...Sergey Levchenko!"
 russia.247.e: "...Yuri Afonin!"
 russia.247.f: "...Valery Rashkin!"
 russia.247.g: "...Alexei Navalny!"
 russia.247.h: "...Pavel Grudinin!"
 russia.247.k: "...Vladimir Solovyov?!"
 russia.247.z: "...Leonid Pasechnik!"
 russia.248.t: "Texan Nationalists Plead for Support!"
 russia.248.d: "An interesting communique came in to the Foreign Office today as a rebel group from Texas pleads our government for weapons, vehicles, and general military assistance in their desire to create an independent Texas with free warm water ports with no ties to either federal government."  
 russia.248.a: "We DO need friends with warm water ports... Why not?"
 russia.248.b: "I'd rather not, don't they remember what happened at the Alamo?"
 russia.249.t: "Capture Gostomel Airport"
 russia.249.d: "The General Staff has convened and determined the Antonov airport at Gostomel outside of Kiev to be of strategic importance. VDV forces are to be relocated to Belarus in preparation to capture the airfield in the early hours and hold until reinforces break through the Chernobyl Exclusion Zone and relieve them."  
 russia.249.a: "May they do us proud"
 russia.250.t: "Defeat at Gostomel Airport"
 russia.250.d: "It was simply too much for our men. Despite our best efforts, our troops at the airport made the ultimate sacrifice and died in the fight against fascism. Airborne troops have scattered into the woods, captured, or surrendered to the Ukrainian National Guard. It was not without our own little victory though, as the airport won't be usable for quite some time."  
 russia.250.a: "To the lost, but this defeat will not be forgotten."
 russia.251.t: "Victory at Gostomel Airport"
 russia.251.d: "In a shock to the world, our unsupported airborne assault on Hostomel Airport has succeeded, the brave men that seized the airport have been relieved. Ukrainian general Valery Zaluzhny has reportedly been scolded by his superiors and promptly pulled off the northern front of operations because of our great victory! International observers from news channels are reporting that Kiev is bracing for an all out assault as aircraft fly into the airport and reinforce the front with more battle-hardened and motivated airborne troops."  
 russia.251.a: "Soon, we dine in Kiev."
 russia.252.t: "Rashkin Protests Electoral Fraud"
 russia.252.d: "Elections to the 8th State Duma of the Russian Federation were held on September 17-19, ending on the united day of voting on September 19. On the night of September 20, the day after the elections to the State Duma ended, the head of the Moscow City Committee of the CPRF, Valery Rashkin, organized a protest against fraud in the format of a meeting with a deputy. On September 23rd, the creation of the coalition inter-party committee "For the Abolition of the Remote Electronic Voting" was announced. It consisted of opposition candidates who ran in the Moscow districts. Today the protests continued in Moscow, Saratov, Yekaterinburg, Ufa, Volgograd, and other cities of the country."  
 russia.252.a: "Unpleasant."
 russia.253.t: "Moose"
 russia.253.d: "The police and an employee of the Committee for Hunting and Fishery in Saratov region stopped a LADA Largus car of CPRF deputy Valery Rashkin, in the trunk of which there was a dressed moose carcass. This happened on the night of October 29 in Lysogorsky District, 60 kilometers from Saratov. There was a 49 year old man in the car together with the politician. \n\nRashkin himself said that he saw the carcass of a dead animal in the woods and wanted to give it to the police. A criminal case for illegal hunting was initiated."  
 russia.253.a: "Typical Communist."
 russia.254.t: "New Russian Animation?"
 russia.254.d: "After a recent success in the field of gaming entertainment with Patriotic Games, some investors have been pushing the idea of expanding into other markets of youth media, with the idea of sponsoring domestically made animation, and specifically Anime.\nIt can be regarded as an even more risky endeavor than video games, as Russians have very little practice with such a style, with some ideas being thrown around like harking back to the art of Ivan Bilibin.Proponents argue that its high risk - high reward deal, as well as calming some fears of animation quality by suggesting hiring some Chinese and Japanese talents to help in production.\nThe story of anime should be connected to Russia and have some kind of Patriotic message attached to it. Many suggest reviving older concepts that were abandoned due to lack of sufficient budget, while other sides think up a more modern and up to date storyline.\nWhatever they choose, they must get enough finances to make ideas into reality."
 russia.254.a: "Let's see them try."
 russia.254.b: "Aren't there better things we can use this money for?"
 russia.255.t: "Return of The First Squad"
 russia.255.d: "Despite our doubts, we've successfully entered a new market for entertainment! With help of our investors, Animation Studio 'Molot Entertainment' has returned with a re-imagined 'First Squad' that was originally released as a film in 2009. With newfound money they were able to return to their original vision of an episodic series.\nThe story is set during Great Patriotic War, and follows young pioneer Nadya who posseses a paranormal connection to the realm of the dead and a katana that with steel that was folded over a thousand times. Due to her abilities, she is recruited by Secret Occult Branch of NKVD, that was created to counter growing threat of Ahnenerbe, both sides tapping deeper into Limbo and mystical prophecies, and new tech in hopes of winning the war. She is able to reunite with her dead friends, using her powers and machine created by Soviets, and together they travel through Limbo and material world to spoil German plans. Ahnenerbe, on their side, is aided by Teutonic Knight Guido von Wolf who has been channeled by the ancient curse, and now seeks revenge against Russians for his loss during Battle on the Ice.\nSeason One contains seven episodes, and finale ends in stunning cliffhanger.\n'First Squad' has been praised by Russians viewers, many pointing out solid animation, improved character development compared to original release, and not shunning away from showcasing the brutality of Nazis during war, as well as placing right emphasis on patriotism and why Russians fought in the war. However, some Western critics slammed it for 'Showing clear historic bias' and 'painting Germans in a worse light'."
 russia.255.a: "Stunning Success!"
 russia.256.t: "Popadanec Po-Russki"
 russia.256.d: "Troublesome news from our recent investment: 'Izhevsk Colors' animation studio has released 'Popadanec Po-Russki', and it appears that reception to 'The First Russian Anime' has been less-than-stellar.\nThe story is set when a Russian geek and gamer Timur Frolishov gets hit by a street car while he is reading German Romanov's Works, dies, but then gets teleported to new a fantasy realm, the country of Medvedia, which is a clear reference to Russia. Without much of a struggle he quickly assembles a 'harem' of scantily clad women and becomes the king's right hand man, receiving his daughter as a gift while 'fighting' the ancient evil lord Bidon and his army of ukr-orcs. The season has 32 episodes with almost half being nothing but filler or beach episodes with the ending being just as disappointing.\n\nViewers slammed it, criticising poor animation, recycled plots from hundreds of other 'isekai' animes, and an absolute lack of any progression or development, whereas traditionalists are furious over the depiction of women. Although at least some are happy with the... erotic arts of the female cast."
 russia.256.a: "Isekai is the best they come up with?!"
 russia.257.t: "Removal of Lenin"
 russia.257.d: "After the LDPR's victory, it was only a matter of time until the new 'clean' administration would approve a very controversial proposition - to remove Vladimir Lenin's body from mausoleum.\nShortly after order was given, a team of specialists quickly took out Ilych's body, and moved it into a new undisclosed location, while builders took down all Soviet memorabilia from Tomb, finishing up with crossing out the 'LENIN' letters that were untouched since the 1930s.\n\nWhile authorities claim that Lenin's body was respectfully buried, as requested in his last will, in the Volkovsky cemetery near his mother, many onlookers and the few remaining communists have expressed doubt about the validity of the claim. With the closed off 'ceremony' and no video evidence given outside of gravestone, it is possible that body's whereabouts are still unknown.\nSome rumors online suggest that Lenin has been cremated, and ashes thrown into the endless sea, since Zhirinovsky's hated towards Lenin's Bolsheviks is a widely known.\n\nWith the removal of Lenin, his tomb now sits empty, and some of LDPR members been seeking ideas how to transform it from place of \"Bolshevik Worship\". One side voted in to rebuild the Museum of Vladimir Zhirinovsky's Life, to show people who is in charge, and enlighten them on his upbringing. Others however, suggest remodeling it into a memorial shrine for Tsar Nicholas II's Family, who have been murdered by Lenin's order in 1918, placing their ashes instead of his body, restoring historic justice to the victims of the Bolshevik regime."
 russia.257.a: "A shrine to repent for crimes against the Tsar's family."
 russia.257.b: "Begin construction of Supreme Leader's Life Museum"
 russia.258.t: "Destruction of Yeltsin Center"
 russia.258.d: "One of the more shameful periods of Russia's history, outside of Bolshevik's bloody reign, is the rule of Boris Yeltsin in the 1990s, and nothing emphasizes it more than the damned Yeltsin Center located in the - so called 'liberal capital' of Russia - Yekaterinburg.\nMany patriots wished for it to be gone, and LDPR is ready to make this wish come true.\nIn the wee hours of the morning, the destruction crew assembled near the Yeltsin Center, waiting for commands. Orders began with demolition of Yeltsin's Statue, which already had words such as 'Traitor' and 'Sellout' drawn on it. Then they moved to the main building, destroying shops, souvenir stores, and a museum that was built to celebrate Yeltsin's Presidency.\n The entire operation was messy, but took only a day and a half to complete. After they finished, all that remained was barren empty space with a lot of debris.\nSince this barren plot of land will certainly ruin the look of the city, LDPR members suggested two building proposals for construction on the empty plot. The first proposal is a Grand Cathedral, knowing full well how toxic the liberals view religious sites in Yekaterinburg, it would not only be a great display of our loyalty to the faith, but also will showcase the power of our leadership. The second suggestion is a massive training center for patriotic youth, where they will learn essentials of defense, military practice, and history of our Motherland (by playing Sid Meier's Civilization), surely making the next generations more prepared to fight for our holy land and our leader."
 russia.258.a: "The Grand Cathedral Plan"
 russia.258.b: "Training Center For Patriotic Youth Proposal" 
 russia.259.t: "The Transnistria Question"
 russia.259.d: "After 30 years, Transnistria finally has a land connection with Russia, and now the question arises about the future of the country"
 russia.259.a: "The people of Transnistria have suffered enough, they have the right to join the Federal District of Novorossiya"
 russia.259.b: "Moldova should be reformed based on Transnistrian experience" 
 russia.259.c: "The people of Transnistria have suffered enough, they have the right to join the Federal District of Novorossiya"
 russia.260.t: "Reorganization Of Monarchist Party"
 russia.260.d: ""
 russia.260.a: "Monarchy is the historic form of Russia!"
 russia.261.t: "Rightists Of Russia United"
 russia.261.d: "Recently, after the increase of pro-nationalistic elements in LDPR, many outside nationalist organisations have come together, and declared the creation of a non-government coalition - "Holy Russia" National Union. Their main goals, as shown in their 'manifesto' is to pressure Zhirinovsky's Administration into implementing even more radical policies, especially regarding racial and national questions.\nThey're still just a wide minority, and don't possess any actual threat, but their radical members can be used to help secure right-wing policies of our government."
 russia.261.a: "What a lovely bunch!"
 russia.262.t: "Protests!"
 russia.262.d: ""
 russia.262.a: "Damn!"
 russia.263.t: "Protests!"
 russia.263.d: ""
 russia.263.a: "Damn!"
 russia.264.t: "Protests!"
 russia.264.d: ""
 russia.264.a: "Damn!"
 russia.265.t: "Future of the United Russia"
 russia.265.d: "As our victory was cemented, the fate of United Russia still hangs in the air.\n\nMost of the party is made-up of career opportunists who only suck up to the person above them. Originally made to just pass the papers Putin needed, now they decided they have the power to think for themselves. Not to mention how many of them are completely unqualified for their positions.\n\nYet, the party, due to being de-facto Putin's party, still has a lot of talent left in them. It was that talent in the sea of mediocrity that let Putin do what he did, and if we can get these specialists and technocrats over to our side, the benefits will be enormous.\n\nWhat will it be?"
 russia.265.a: "Ban those parasites!"
 russia.265.b: "Ban, but sway their most useful members to our side."
 russia.266.t: "Rodina becomes the new Center"
 russia.266.d: "After the defeat of UR, many not-so radical patriots searched for parties to join. With National Democracy established, over time Rodina became the biggest representative of a different approach to politics, led by the charismatic Dmitry Rogozin, who advocated, for if not a return to the Putinist era, but certainly some policies of the past."
 russia.266.a: "If people choose to..."
 russia.266.b: "If they are true patriots they should join LDPR!"
 russia.267.t: "Party Makeover?"
 russia.267.d: "After we recaptured Eastern Europe and consolidated our power, we were faced with the sad loss of our great leader. Many party members suggested that we should immortalize his ideas in the name of the party.\nFor many years, Zhirinovsky had suggested and proposed renaming the party in his honor after his death. Many in the party took this idea to heart.\n\nIt was Zhirinovsky's great vision that led us to victory. We are truly children of his great ideals and his pupils.\n\nOn the other hand, the name LDPR is just too iconic, and it was with this name that Zhirinovsky led Russia to great victory."
 russia.267.a: "We're sons and daughters of Zhirinovsky..."
 russia.267.f: "Zhirinovksist Party - Sounds Great!"
 russia.267.z: "Zhirinovksist Party - Sounds Great!"
 russia.267.b: "LDPR is just too good of a brand."
 russia.268.t: "New Belarusian Government"
 russia.268.d: "With the establishment of a new government in Belarus, how should we go about loyalties?"
 russia.268.a: "We should delegate powers to local loyalists."
 russia.268.b: "No decentralization, direct rule from Moscow."
 russia.269.t: "Debate Room"
 russia.269.d: "Room. Debate. Serious debate.\n\nTwo groups of people, probably political factions, are arguing about something. Something important. This is really going to decide the fate of something big.\n\nAll the choices have already been made. Their negotiations make little sense. A lot of words and little action. It must be decided. It must be decided right now.\n\nLots of big ideas. Hundreds of smaller ideas. Thousands of words. Perhaps even millions.\n\nIn the end, only one thought remains..."
 russia.269.a: "This 'Regency' must end, time to restore the rightful rulers."
 russia.269.b: "Slutsky's reformists achive dominance."
 russia.269.c: "Vlasov was always Zhirinovsky's favorite."
 russia.269.e: "Slutsky's reformists achive dominance."
 russia.269.f: "Vlasov was always Zhirinovsky's favorite."
 russia.269.g: "Gentlemen, this is a debate room, you can't argue in here!"
 russia.269.j: "Bout Emerges Victorious."
 russia.269.k: "Sherin was always truly committed to Russian nation."
 russia.269.l: "Powerful Church forces LDPR to submit to its demands."
 russia.269.l1: "Kurginyan uses his secret contacts and overturns weakened LDPR."
 russia.269.l3: "Business Elites lobby for Starovoitov to take the post."
 russia.269.l6: "The battle rages on..."
 #russia.269.c: "Only direct Zhirinovsky's kin can truly rule."
 russia.270.t: "The Union Forever"
 russia.270.d: "The Communist Party and the Soviet people have finally reunited the Union we lost more than 30 years ago. This is truly a great event, but we cannot yet rejoice: although our economies are quite closely linked, we will have to rebuild most of the ties between our Republics, and not counting state-building!"
 russia.270.a: "Our goals are clear, our tasks are defined. Let's get to work, comrades!"
 russia.271.t: "Chubais left Russia."
 russia.271.d: "Chubais resigned and left the country due to the unexpected election results. Two friends of Chubais told us that he and his wife Avdotya Smirnova had left for Istanbul. Ministers are reporting signs of an accelerated exodus of capital abroad, and on the sidelines, the old communications officers of oligarchic groups are already consulting with lawyers and Western consultants on what to do, where to run, and how to restore their fortunes.\nNationalization is inevitable, we promised it, we will carry it out, the only question is how it will take place. We have three plans:\n1) Negotiate with loyal state-owned oligarchs, transferring 60% of their assets to the public sector, while maintaining management and concluding long-term contracts, while gradually removing the rest from management;\n2) At the first stage, expropriate oil, gas, coal and metal without delay, paying compensation at state prices, leave the remaining industries with the previous owners, but impose an "anti-oligarchic" tax of 75% on excess profits;\n3) Carry out a total nationalization of key sectors with compensation in the form of government bonds at 6% per annum, formally, the former management remains in place, receiving "state payments" and bonuses"
 russia.271.a: ""People’s State Alliance""
 russia.271.b: ""Targeted Nationalization""
 russia.271.c: ""Strategic Buyout Socialism""

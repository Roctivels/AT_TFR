 russia.284.t: "The Night Sky of Baghdad"
 russia.284.d: "Don't mess with the war. There are other guys here. This is not Germany, this is not Afghanistan. George, your soldiers will be torn apart here. 250 thousand selected soldiers of Iraq. They'll blow it all up. They will pass the whole desert for one hour, they will blow up all your destroyers, all your journalists, diplomats. George, you're a cowboy. You stop, b..., you finish, you hide the cartridges away in the warehouse and forget about your dad. We had one asshole, avenged his brother, b..., and the Great Russian Empire collapsed. And there was another eccentric, he took revenge for his grandfather, and the Soviet Union collapsed. And you'll make the same mistake again. You forget Dad, Dad has worked his way through. You think about the future of America. She's dying. Your young people are fleeing your country. Nobody wants to live in America there, nobody! This flea market, b...! Dollar, dollar, dollar, ... This dirty green paper! Not a soul, there's no music, b..., you don't have any writers. The whole world listens to Tchaikovsky, Dostoevsky, b...! Festivals, sports only in Russia... And here in Iraq. They love the president here, but they despise you, they despise you."
 russia.284.a: "We will avenge Hussein's legacy."
 russia.284.b: "Iran's Relations are much more important."
 russia.285.t: "Viktor Bout Escapes American War"
 russia.285.d: "Despite numerous reports of complete anarchy in US, Viktor Bout was able to escape back to his motherland. He today finally stepped on his native soil. He does not reveal all parts of his journey, but promised to write a book about it. His next steps in Russia are unknown, but he showed interest in joining political life of the country."
 russia.285.a: "Truly Admirable."
 russia.285.b: "Truly Admirable."
 russia.285.c: "Keep on eye on him."
 russia.285.k: "Truly Admirable."
 russia.286.t: "Viktor Bout Joins LDPR"
 russia.286.d: "Infamous arms dealer Victor Bout has thrown in his hat with the LDPR!"
 russia.286.a: "We have a place for a man of his talents."
 russia.287.t: "Viktor Bout Donates For Russian Development"
 russia.287.d: ""
 russia.287.a: "A True Patriot!"
 russia.288.t: "Rashkin Jails Bout"
 russia.288.d: "'He is not a Communist! He is fascist nationalist, Russian chauvinist!' - Rashkin."
 russia.288.a: "From one prison to another."
 russia.289.t: "Zemsky Sobor Assembles"
 russia.289.d: "For the first time in nearly 400 years, the Zemsyk Sobor has convened once more. This time to choose the new Tsar of great Russia."
 russia.289.a: "Kirilovichs shall lead Russia!"
 russia.289.b: "Mikhailovichs shall lead Russia!"
 russia.289.c: "Gavril's popularity among soldier folk led him to the throne!"
 russia.290.t: "Tsar Days' March"
 russia.290.d: "Recently, monarchists around major cities begun organizing marches in the name of tsarist times. While it was normal ever since we came to power, these new marches have been hotspots of people who want a full return of monarchs, strengthened by recent passing of 'Regent'.\nMore and more monarchists have been gathering support around the idea of Tsar's return...Well one of them."
 russia.290.a: "We should think about it."
 russia.290.b: "Romanovs are a thing of the past."
 russia.291.t: "The End of Provisional Government"
 russia.291.d: "It seems that the era of the provisional government in Romania is coming to an end. The pro-Russian regime, which was founded during the European War, did not please many people and was the cause of endless disputes within the country itself. And now the current president [ROM.GetLeader] has announced the long-awaited elections in the country.\n\nThe most capable at the moment seem to be two candidates. The first is George Simion, a flamboyant conservative and uncompromising anti-communist. He has already been able to rally the nationalists around him with promises to renegotiate an unfair peace treaty. The second is Calin Georgescu, a candidate favorable to Russia and in favor of focusing on Romania's internal development. The elections will be held soon, and we can only wait for the result."
 russia.291.a: "Off to a new start!"
 russia.292.t: "Referendum on Transylvania"
 russia.292.d: "Democratically elected George Simion did not wait long for his first move. As promised in his election campaign, he immediately started to take active actions against Transylvania. Thus, serious duties have been imposed and Romania is already threatening full-fledged sanctions if the situation is not resolved. Simion himself calls for an immediate referendum on the status of the country and has already made an appeal, where, among other things, he supported the Romanian separatists acting against the current government in the Carpathians. The Transylvanian government has now tentatively agreed to the referendum, but there are rumors that the current leader is trying to find support from the Hungarian president."
 russia.292.a: "Interesting."
 russia.293.t: "Formation of Szeklerland Autonomy"
 russia.293.d: "In light of lengthy negotiations, the Transylvanian government agreed to hold a referendum on joining Romania. As a result, more than 80% of the country's population voted in favor of reunification. According to the new treaty, which will be signed soon, Transylvania again becomes part of Romania. At the same time, the Hungarian minority will get its autonomy on the part of the province of Szeklerland and official state protection.\n\n[ROM.GetLeader] has already announced that this act is a correction of a great historical mistake and announced its intention to defend the rights of Romanians all over the world."
 russia.293.a: "This was unexpected."
 russia.294.t: "Budapest Treaty"
 russia.294.d: "Romanian and Hungarian Presidents George Simion and Viktor Orban respectively held emergency telephone talks on the status of Transylvania. In the course of the talks, the leaders seem to have managed to reach an agreement satisfactory to both sides. Thus, the southern provinces will rejoin Romania, while in the north a Commonwealth of Northern Transylvania will be established, which will formally be part of Romania, but will have broad autonomy and will have the right to have its own leader democratically."
 russia.294.a: "That was interesting"
 russia.295.t: "Superfluous Man"
 russia.295.d: "How do they live as if nothing had happened? Another shot, the bitterness of the stale vodka briefly replaced the bitterness of defeat. Vanya from the factory is gone, such a hard worker. Vitya's gone, Dima's gone. And what do They care about that? They don't care. As if there was no war. As if the country wasn't falling apart. As if everyone had returned from the fields... Another shot... Maybe they haven't heard of it? Maybe they missed it... I have to tell them, no matter what! Keys in hand. Clothes? To hell with it. I have to! As soon as possible! What if it happens again? The door opens with a loud creak, a sharp chill hits nearly naked body. The car headlights illuminate the slowly falling snowflakes. Somewhere in the distance, the city rumbles. Suddenly there's a roar, a whoosh! That's it! But no, it's just an airplane flying by, lights blazing somewhere in the sky. Maybe they've figured it out. Maybe they've come to terms with it, not like me."
 russia.295.a: "Or maybe they even forgot about me..."
 russia.296.t: "Elections!"
 russia.296.d: ""
 russia.296.a: "heghgsedgh"
 russia.297.t: "Hungary Defends Transylvania"
 russia.297.d: "It seems that the situation in the Carpathians is heating up. Recently, Hungarian President Viktor Orban delivered an emergency message to the nation, where he sharply condemned Romania's actions towards its neighbors and stated that the Hungarian people will not allow independent countries to dictate their will by force. Orban is expected to send a peacekeeping contingent soon to maintain Transylvania's sovereign status. Although [ROM.GetLeader] has strongly condemned such rhetoric, it appears that a full-scale conflict is not yet expected."
 russia.297.a: "Good."
 russia.298.t: "Georgescu's victory"
 russia.298.d: "Calin Georgescu has won the Romanian snap election. A quiet conservative, he is an opponent of drastic action regarding lost territory, although, however, he does not deny that Romania will have to deal with this issue at some point. Of course, his rise to power provoked a wave of popular discontent. Thus opposition-minded citizens call him a puppet of the Kremlin oligarchs. What will his presidency bring to the war-torn country? Now the future of Romania is unclear, and we can only wait for developments."
 russia.298.a: "Congratulations!"
 russia.299.t: "Simion's victory"
 russia.299.d: "In the extraordinary Romanian elections, George Simion won. A fierce conservative nationalist, he was able to successfully play on the wounded pride of the people and thus secured his victory. One of his campaign points was to return Transylvania to its native harbor. Whether he succeeds or not, time will tell."
 russia.299.a: "Interesting"
 russia.300.t: "Veche Begins Session"
 russia.300.d: "Following the rapid reorganization of the Russian political structure after our Revolution. Solar Leader Alexander Dugin has conceived that the best course of action is to finally establish a new truly democratic form of rule in Eurasia. The Veche has been established, similar to the Supreme Soviet of old, however, with more representation and inter-class participation, with many 'political gatherings' which now lobby for support of their deputies.\n\nSolar Leader has stated that the new system is still in a transitional period, as the goal of Eurasianism is full democracy, but such an experiment cannot be achieved while western totalitarian social fascism runs free with their dogs at our gates."
 russia.300.a: "Let a hundred flowers bloom."
 russia.301.t: "Return of Particracy"
 russia.301.d: "With every day of revived Communist rule in Russia, it becomes more apparent that return to 'good old days' was also followed by comeback of absolute Party control. More and more people realize that to get promoted, and achieve higher respect one needs to be a member of the Party.\nJust like in USSR a bloated apparatchik caste is being formed, Party Committees receive more work and more privileges, as well as growing need for some venal practices.\nOf course new members believe and follow the party line set by the Politburo, safe for some smalltalk in their kitchens.\nHowever, its not, in fact, negative, such amount of working bureaucracy helps to centralize leadership in local places, people are still happy as benefits of revived social programs outweigh bureaucratic stubbornness. As long as the economy is growing rapidly, the Politburo has nothing to fear."
 russia.301.a: "The party is the mind, honor and conscience of our era."
 russia.302.t: "Pushback Against Raskhin's Reforms"
 russia.302.d: "In recent days, Government buildings in major cities saw an influx of anti-Rashkin protesters. At first glance it may seem as those are pesky Putinists, and other old regime supporters, but on closer look, many communists and their slogans can be seen around, sometimes outweighing others. They are claiming that Raskhin is a liberal, western spy, and new Gorbachev, with communists add that he betrayed precepts of true Leninism, and begin harmful liberalization that will lead young RSFSR to disaster.\nSecret Services, by the order of Politburo, have begun investigating possible funding from anti-communists personas, but nothing has been achieved so far.\nThose protesters are, however, seem to be just a vocal minority, absolute majority of population are currently reaping benefits of new social-economy, and are happy with winds of change brought by Rashkinite Reformers."
 russia.302.a: "The gale does not stop at the frontier, and neither shall we."
 russia.303.t: "New Faces of New Russia"
 russia.303.d: ""
 russia.303.a: "Zhirinovsky's Appointees Win."
 russia.303.b: "Council's Ministers Prevail."
 russia.304.t: "Tsaryov Announces Referendum"
 russia.304.d: "Oleg Tsaryov in his recent speech once and for all put an end to the issue of the integration of Novorossiya and announced a referendum on integration into Russia"
 russia.304.a: "We need to start preparing!"
 russia.305.t: "Successful Referendum"
 russia.305.d: "As a result of the referendum held on the territory of Novorossiya, the overwhelming majority of residents voted for reunification with Russia. According to official data, more than 90% of the voting participants supported the integration of the republic into Russia. The government called this event "the will of the people" and stressed that Moscow respects the decision of the residents of the region. The authorities also said that the reunification completes a multi-year process of "restoring historical justice," citing common cultural and historical roots.\n\nLarge-scale marches and celebrations were held in the cities of Russia and Novorossiya. Thousands of people with flags and symbols took to the streets to celebrate the event. Concerts, fireworks and mass celebrations were held in Moscow, Rostov-on-Don, Donetsk and Lugansk. "This is a celebration of the truth and unity of our people," Leonid Pasechnik said in an interview. Meanwhile, a number of Western countries criticized the referendum, calling it "illegitimate," but the Kremlin rejected these statements, emphasizing that the will of the people of Novorossiya is the only determining factor."
 russia.305.a: "Russia reclaims its lost sons."
 russia.306.t: "Hasty Referendum"
 russia.306.d: "Despite the fact that the referendum was successful, the poor work of polling stations and poor organization in general put us in a bad position"
 russia.306.a: "Without failures, there are no victories."

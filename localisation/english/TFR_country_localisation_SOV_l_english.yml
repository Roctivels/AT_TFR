 SOV_kleptocratic_state2: "Kleptocratic State"
 SOV_kleptocratic_state2_desc: "The privatization of the former Soviet economy could not come quick enough for Boris Yeltsin, so once the Union fell, he pursued 'shock therapy' - removing regulations and selling off entire industries practically overnight. Corrupt officials, party apparatchiks, and other less-than-ethical entrepreneurs bought former state-run companies for kopeks on the ruble, meaning that economic power stayed in the hands of a few friends of the government. They kept their power by cultivating relationships and cutting backroom deals with the Yeltsin administration, and they were the target of widespread furor after the 1998 national economic crisis. Although Putin prosecuted several of these so-called oligarchs for corruption after coming to office, he has shown little interest in upending the system, and many of them have solidified their hold on Russia's economy even further."

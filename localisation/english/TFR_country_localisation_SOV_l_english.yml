 SOV_union_ruble: "Union Ruble"
 SOV_union_ruble_desc: "With the reunification of the Union, the time has come to finally unite our economies of brotherly nations. Despite the widespread use of the Russian ruble throughout the country, the currencies of other republics are still found in circulation. A large-scale monetary reform is already a necessary step to strengthen the common financial system. The new Union Ruble will remove this confusion and become a symbol of our united power, emphasizing the inseparability of economic and social ties."
 SOV_standartisation_of_state_enterprises: "Standartisation of State Enterprises"
 SOV_standartisation_of_state_enterprises_desc: "The economic models in the union republics are too heterogeneous. While rigid planning flourishes in one republic, the usual liberal capitalism, embellished with good social protection and a red flag, continues to operate in another. This situation creates difficulties for effective management of state enterprises and implementation of all-union programs. It is time to unify the economic system under the standard of Market Socialism of the RSFSR. This will ensure equal conditions for all regions and eliminate barriers to economic growth."
 SOV_let_a_hundred_flowers_bloom: "Let a Hundred Flowers Bloom"
 SOV_let_a_hundred_flowers_bloom_desc: "The unity of the USSR has always been based on the diversity of its peoples, cultures and attitudes. The same is true for economic policy. The diversity of models from republic to republic is an advantage, not a disadvantage. If a more command-oriented or more liberal system is established somewhere, there is no need to touch anything. There is no need to impose universal rules on all republics, if everything works fine in their republics."
 SOV_expand_the_sezs: "Create New SEZs"
 SOV_expand_the_sezs_desc: "The Special Economic Zone in Vladivostok has become a model for successful regional revitalization. Tax incentives and simplified regulation have helped attract investment and revitalize the economy of the Far East. The time has come to spread this success: the creation of new FEZs in strategic points of the Union will accelerate economic development and improve life in the regions. Yes, in the end, these zones will serve not only honest companies that create real production and jobs - the real economy - but also small traders and speculators, but this only shows our honesty - we are ready to go for it, ensuring fair conditions for all. "
 SOV_unification_of_our_armies_dengist: "Unification of Our Armies"
 SOV_unification_of_our_armies_dengist_desc: "At the moment, our armed forces are a mosaic assembled from the armies of former republics. Some units are equipped with state-of-the-art equipment, while others suffer from a lack of resources and training. Strict military reform is necessary to create a unified, powerful Soviet Army. The USSR Armed Forces must become the shield and sword of our country, capable of protecting us from any threat."
 SOV_invest_in_ai_development: "Invest in AI Development"
 SOV_invest_in_ai_development_desc: "Digital Communism is still very far away, but we can bring it closer with small steps by developing our technologies! Artificial Intelligence will become a tool to increase the efficiency of state enterprises and better manage the economy. By investing in AI development, we are laying the foundation for the future, when we will be ready to move to a truly socialist model."
 SOV_the_soviet_dream: "The Soviet Dream"
 SOV_the_soviet_dream_desc: "The Soviet Dream is a vision of a society where everyone has equal opportunities to develop their talents, education and a decent life. It is a world where work and creativity bring joy, where everyone's work is respected, from worker to engineer. We offer not just stability, but a future where justice, equality and progress become a reality for all. The Soviet Dream is the hope for the best that leads us forward!"
 SOV_new_red_tourism: "Commidification of Ideology"
 SOV_new_red_tourism_desc: "After our victory, the world is talking about communism again, and many foreigners are eager to touch the legendary history of the USSR. From Moscow to Alma-Ata, from Leningrad to Tashkent - we will turn our cities, factories, museums and monuments into centers of tourist pilgrimage. "Red tours" will become a source of inspiration for visitors from abroad and a profitable source of income for our state. Victory over NATO is our pride, and it should bring not only prestige but also profit."
 SOV_expand_markets: "Expand Our Horizons"
 SOV_expand_markets_desc: "Our production has reached a sufficient level to flood the third world with goods, capturing the markets of developing countries. From simple trinkets to appliances and clothing, the Made in USSR logo will be a symbol of affordable quality around the world. We will play the role of a trading giant, strengthening our economic influence in these nations! Soviet consumer goods will be a very profitable export for us!"
 SOV_develop_our_markets: "Develop Our Markets"
 SOV_develop_our_markets_desc: "Instead of depending on exports, we will focus on developing domestic consumption. Our citizens deserve unrestricted access to quality goods produced in Union factories. We must prepare the economy for complete autarky if we face international isolation again. Public and private enterprises must be prepared to work exclusively for the domestic consumer, providing the country with everything it needs!"
 SOV_brand_new_ussr: "Brand New USSR"
 SOV_brand_new_ussr_desc: "Even though we use the same aesthetics, the same red flag, and even though we are still the same Communist Party, but inside everything is completely different. The new Union is not like the one that fell more than 30 years ago, for the new generation the old USSR is no more than a picture in a textbook or an exhibit in a museum. People no longer live with five-year plans and kolkhoz romance - we have a different economy, a different social structure, and a different view of the world. This is no reason to renounce our glorious history, but it is time to recognize: we are building a completely new, independent page in the book of our Communism and Communism as a whole."

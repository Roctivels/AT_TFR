 SOV_constitution_russian_voting: "All-Russian Voting On Amendments"
 SOV_constitution_russian_voting_desc: "\n\n\n\n\n£GFX_SOV_constitution_referendum_banner\n\n\n\n\n\nVladimir Putin has decided that it is time to put an end to external interference in our country, one of steps to do so is to pass Constitutional Amendments that will help strengthen our sovereignty efforts.\nDespite those noble intentions, there many people in Russia, who see it as Autocratic centralization and a loophole for Putin to rule as long as he pleases.\nMajority will vote "Yes", no matter the outcry, but backlash if our support was not homogeneous enough would be §Rsevere§!."

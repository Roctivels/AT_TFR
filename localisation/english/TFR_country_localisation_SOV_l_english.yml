 FER_derussification_desc: "After centuries of Russian genocide of our people and culture, we are in the process of dismantling this foreign culture from our land, in order to sever our ties from their ethnic cleansing. However, this transition doesn't come without a cost; many ethnic Russians are fleeing our territory, as not all of our citizens are ready to embrace this reality. This upheaval, combined with our dependence on NATO peacekeepers, presents a deep challenge for the government."

 #Pasechnik Tree
 SOV_a_new_dawn_for_the_union: "A New Dawn for the Union"
 SOV_a_new_dawn_for_the_union_desc: "Rejoice, comrades, brothers and sisters, workers and peasants! A new era is coming for the Union, and it will be replaced by the red star of Novorossiya! Leonid Pasechnik was not afraid to challenge the ossified party system and won the first All-Union elections by a decisive margin over the other candidates. Thus, he proved to the whole world that love for the motherland will always be in demand among the population. However, you should not give in to the dizziness of success. The new Secretary General still has a lot of work to do. And it starts now!" 
 SOV_formulate_a_new_political_trajectory: "Formulate a New Political Trajectory"
 SOV_formulate_a_new_political_trajectory_desc: "Soviet Marxism and Soviet nationalism were certainly excellent ideologies. . . In due time. The 20th century has long passed and the time has come to search for new ideologies. It's time to put aside Marxist dogmatism and turn to the ideas of contemporary philosophers like Dugin. Social justice, patriotism and moderate nationalism. These are the principles that we will carry into the new century."
 SOV_praise_the_great_russia: "Praise the Great Russia"
 SOV_praise_the_great_russia_desc: "Just as it is impossible to exalt one of the peoples above the others, so as not to slip into social chauvinism and red fascism. Similarly, it is impossible not to recognize the merits of certain peoples in historical processes. Great Russia in the 20th century became a catalyst for social change and a beacon for socialist movements around the world. We must remember the exploits of our great-grandfathers and fathers and not forget about our past. After all, there is no future without him."
 SOV_pragmatical_marxism: "Pragmatical Marxism"
 SOV_pragmatical_marxism_desc: ""Marx's teaching is omnipotent because it is true," is a strong slogan that Orthodox Marxists like to use. However, they lose sight of the fact that dogmatism leads to the degeneration of any ideology. Karl Marx did not live in the days of states whose economies were based on the service sector, and certainly had no idea how to regulate relations in such cases. However, not all of Marx's ideas are wrong. It's just that it's time for some of the most radical and outdated provisions of Marxism to fall away within the framework of an objective historical process."
 SOV_groundworks_for_new_democracy: "Groundworks for a New Democracy"
 SOV_groundworks_for_new_democracy_desc: "Perestroika may have been a terrible grief for the USSR in the last century and led to the death of the socialist hegemon, but it is not a bad idea in itself. Especially the idea of democracy. Was she terrible on her own? Of course not. If history has taught us anything, it is that party democracy eventually brings old people and hangers-on to power, which inevitably leads to the downfall of the state. The time has come for a new, Soviet democracy, in which the people will be able to decide the fate of their country! Or at least we'll be able to follow certain trends in society. After all, no one said that anyone but us would be able to win these elections."
 SOV_keeping_soviet_monopartite: "Keeping the Soviet Monopartite"
 SOV_keeping_soviet_monopartite_desc: "Unity of opinion is vital for any state. The Party is the main active force and the vanguard of the revolution. Any deviation from the party line can lead to events similar to those that occurred in the 90s of the last century. At the same time, of course, within the party, its members will be able to express their opinions, they just should not be too different from the accepted party line."
 SOV_for_the_unity_of_the_peoples: "For the Unity of the Peoples"
 SOV_for_the_unity_of_the_peoples_desc: "The USSR is not just the name of a state, it is an idea laid down by our ancestors more than a century ago. The idea of a country that arose on the ruins of a prison of nations, where everyone will have equal rights regardless of religion, nationality or other factors. And by reviving this great country in the 21st century, we have also assumed the great responsibility of upholding the precepts of the revolutionaries of the past. From Lviv to Vladivostok and from Murmansk to Baku. Each of us has our own homeland, for which we are ready to give our lives without delay. However, unlike the caveman nationalists of the West, we understand that only by cooperating with each other can we achieve prosperity. It is this unity that gives us strength. Hail, our Soviet power!  Brotherhood and friendship of the peoples of the country."
 SOV_promote_novorossiyan_cadres: "Promote Novorossiyan Cadres"
 SOV_promote_novorossiyan_cadres_desc: "Running a state is always difficult, and for this we need trusted people who can be put in power. Of course, this may seem like nepotism to some, but it was these people who actively proved themselves during the war in Donbas. At the same time, we do not believe that cadres from the rest of the republics of the Union are unworthy of a place in the state apparatus. It's just that now, in the post-war period, our country needs stability and people who have been tested by time and trials." 
 SOV_bolster_kgb_ranks: "Bolster KGB Ranks"
 SOV_bolster_kgb_ranks_desc: "As the post-war situation has shown, the enemies of the working people do not go away on their own. No, they just lie low from time to time, waiting for the moment when we weaken enough to strike at that moment. To combat such pests, appropriate special services are needed, and therefore we must urgently strengthen the KGB!"
 SOV_fight_corrupt_bottom_grade: "Andropov's Approach"
 SOV_fight_corrupt_bottom_grade_desc: "The nationalists, reactionaries and obscurantists have no doubt already hidden in their caves in the hope that the KGB will forget about them. As if not so! It's time for the raids. National separatists, anarchists and other dangerous elements will be caught and punished to the fullest extent of the law. Don't worry, Yuri Vladimirovich, your work will not be forgotten."
 SOV_our_fair_leader: "Our Fair Leader"
 SOV_our_fair_leader_desc: "Dictators are usually associated with something terrible and ancient. Almost a relic of bygone days. But didn't great leaders like Lenin and Stalin create the greatest power on earth? Does not a wise ruler have the right to use the fullness of his power? And a strong people does not need an equally strong and powerful leader who will be the helmsman, leading the ship of the state through historical transformations. At the same time, of course, a leader should be smart and fair, worthy of his power, and not a fool trying to assert himself. Glory to the great leader! Glory to the Beekeeper!"
 SOV_the_new_constitution: "The New Constitution"
 SOV_the_new_constitution_desc: "The Constitution is the most important document of any country. However, think about this. Our state is still governed by a legal act adopted at the beginning of the last century! At the same time, he ignores all the socio-cultural changes that have occurred in society during this time. Of course, such a document fulfills its functions in its current form. However, if we want to maximize the effectiveness of the state apparatus, we will need a new constitution."
 SOV_transform_supreme_soviet: "Transform the Supreme Soviet"
 SOV_transform_supreme_soviet_desc: "What is the modern Supreme Soviet of the USSR? A bunch of assenters for the party and nothing more! A set of consonants, as they are contemptuously called by the people. Old grandfathers who slow down reforms and at the same time eat up their government benefits! Of course, it is impossible to completely abandon this institution of power, and it is not necessary. But it's quite possible to reform it to make it more suitable to our vision."

 SOV_new_guard_support_pluralism: "Defend Political Pluralism"
 SOV_new_guard_support_pluralism_desc: "To show that we are as open as possible to the People, it is necessary to maintain Political Pluralism. Our Party no longer has a General Line and we are always ready to discuss and argue with representatives of a wide variety of views."
 SOV_new_guard_support_peoples_initiative: "Support §RPeople's§! Initiatives"
 SOV_new_guard_support_peoples_initiative_desc: "All local initiatives must be supported. Our people are used to the idea that all important decisions are made at the top and that nothing depends on them. It is time to cure them of this ailment and raise a competent civil society!"
 SOV_new_guard_new_soviet_republic: "New §tSoviet Republic§!"
 SOV_new_guard_new_soviet_republic_desc: "It is time to develop a full-fledged new concept of building Socialism in the twenty-first century!"
 SOV_join_communist_party_agitation: "§YPROPAGANDA§!: Join the Communist Party!"
 SOV_join_communist_party_agitation_desc: "\n\n\n\n£GFX_SOV_join_communist_party\n\n\n\n\n\nProletarians! Send the best, most advanced, honest and courageous fighters to the ranks of the party!"
 SOV_new_guard_youth_agitation: "§YPROPAGANDA§!: Way to The Young!"
 SOV_new_guard_youth_agitation_desc: "\n\n\n\n£GFX_SOV_way_to_the_young\n\n\n\n\n\nYoung people are our future! We simply need their support!"
 SOV_new_guard_personality_cult: "Rashkin's §RPersonality Cult§!"
 SOV_new_guard_personality_cult_desc: "Rashkin's personality is perceived ambiguously by the people. He is often ridiculed, many see him as a threat in the form of a second Gorbachev, and some still have not forgiven him the moose he killed in 2021. It is time to finally wash him of this filth and create a "correct" image."
 SOV_new_guard_destroy_fascists: "[SOV_anti_soviet_resistance_decision_loc]"
 SOV_new_guard_promote_specialists: "Promote §YSpecialists§!"
 SOV_new_guard_promote_specialists_desc: "The Soviet Union collapsed in large part because incompetent, not entirely bona fide people often made it to higher positions. To avoid this, we need to support the technocratic trend and begin to promote qualified, and most importantly, ideologically savvy specialists who really know their business."
 SOV_old_guard_canonize_stalin: "§RCanonize§! Comrade Stalin"
 SOV_old_guard_canonize_stalin_desc: "\n\n\n\n£GFX_SOV_canonize_stalin_banner\n\n\n\n\n\nWe must finally restore historical justice and canonize Comrade Stalin for his exploits and work for the good of Russia and its people. At the same time, we will revoke the canonization of the royal family, especially Nicholas II the Bloody, falsely given by the Yeltsinite-Bourgeois church to the delight of the monarchists, and the remnants and royal nobility."
 SOV_old_guard_canonize_gagarin: "Canonize Yuri Gagarin"
 SOV_old_guard_promote_unity: "Strengthen Unity of Opinion"
 SOV_old_guard_promote_unity_desc: "Nothing has divided our People more than capitalism. Once truly collectivist, it has become the epitome of "Leave me out of this, it isn't my pigeon". It is time to put an end to this! We will unite again on the basis of patriotism, the socialist idea and social justice!"

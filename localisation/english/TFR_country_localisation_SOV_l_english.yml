 #leader desc
 SOV_VLADIMIR_PUTIN_DESC: "Vladimir Vladimirovich Putin climbed his way to power not up the typical ladder to power, but up the hidden stairways and backrooms of the intelligence community. He got his start in the ranks of the KGB, spending the Soviet Union's final decade assisting the Stasi in East Germany. When the Union fell, he entered politics in the newly-rechristened city of St. Petersburg, and saw a meteoric rise during Boris Yeltsin's administration. He received Yeltsin's endorsement during the 2000 elections, and handily won a majority of the vote. He has not left the Kremlin since.\n\nOver the last two decades, Putin has stayed in power through a mix of popular support, constitutional loopholes, and carefully controlling the opposition. When he hit the limit of two consecutive terms in 2008, his former Prime Minister and close ally Dmitry Medvedev was President for a term while Putin became Prime Minister himself. Putin then returned to the Presidency in 2012. He's weathered myriad crises during his administration, from fighting Chechen guerrillas to supporting pro-Russian rebel states in eastern Ukraine, and come out stronger every time.\n\nA significant portion of the Russian public genuinely enjoy Putin's reign, seeing him as the man who led them out of the turbulent Yeltsin era and helped restore Russia's standing among the world powers. But not all his support is organic. His later elections were dogged by accusations of voter fraud, and anti-government protests see harsh crackdowns. Opposition leaders at home and abroad tend to be surveilled, harassed, arrested, or die under suspicious circumstances. It all sends one clear message: Vladimir Putin believes he has the popular mandate to rule, and he does not plan on giving it up any time soon."
 SOV_ALEXANDR_DUGIN_DESC: "Aleksandr Gelyevich Dugin was born to a intellectual family spoiled by Soviet government, he, however, quickly grew disillusioned with late communist bureaucracy, like many of his peers he sought different vision for world, but while many joined underground 'true marxist clubs', Dugin begun his philosophical studying from 'Dark Order of SS' and writings of European New Right, flushing it out with works of New Left. From there, he begun indulging in mystical, getting to know many underground mystic theorists, both Chirstian and Muslism.\n\nAfter collapse of USSR, Alexander Gelyevich realized that no matter how many flaws of communism there were, it kept away true horror - Capitalism. He joined National-Bolsheviks, as they promised to combine everything old, and give birth to new, Dugin rose to become permanent member of that party, with his esoteric knowledge helping to build foundations of NBP. After 2000s, he parted ways with Limonov, and begun constructing his own movement, expending on ideas of integralist traditionalists and eurasianists. All of Dugin's research cultivated into his own brainchild - Fourth Political Theory.\n\nOften called 'The most dangerous philosopher in World' and given a moniker; 'Kremlin Guru'  by western fearmongers, Alexander Gelyevich was really never close to any seat of offical power. Until now. After shameful defeat, Dugin realized that his cries of stronger pushback and unity in thought, fell on deaf ears of previous statesmen. But now they are gone. Aleksandr Dugin, being brought to power by coup of Eurasianist officers, now has tremendous duty on hands, to bring his philosophical vision into reality - the dream of overthrowing the current world order, carrying out a tumultuous metaphysical, geopolitical revolution."
 SOV_DMITRY_MEDVEDEV_DESC: "A native of Leningrad, Dmitry Anatolyevich Medvedev made a career in the shadow of more influential figures, climbing the olympus of Russian politics not only because of his unusual image for a politician, but also because of his devotion to Vladimir Putin. He began his professional career as a lawyer and teacher, but soon found himself in Putin's circle, working with him at the St. Petersburg Mayor's Office. In the 2000s, he quickly rose through the ranks, becoming head of the presidential administration and then taking up the post of Deputy Prime Minister. In 2008, due to constitutional restrictions, Putin was forced to step down as president, and Medvedev was chosen to succeed him. He easily won the election, but many considered him an interim president whose main role was to hold the seat for Putin.\n\nHis presidency was remembered for moderate reforms, such as economic modernization and cautious liberalization initiatives, but all of them remained within acceptable limits for the system. One of his main achievements was the "reset" of relations with the United States, but it soon came to naught after the events of 2014. When the issue of running for the post of head of state arose before the 2012 elections, Medvedev gave way to Putin, announcing that they had initially agreed on this kind of "castling." After Putin's return to the Kremlin, Medvedev remained in the power structure, serving as chairman of the government and heading United Russia, but his authority became less significant over time. In 2020, he was transferred to the post of Deputy Chairman of the Security Council, which was regarded by many as a demotion.\n\nNow he has become the leader of Russia again, but his policy is unlikely to resemble the previous one. One thing is for sure: Medvedev has a plan of action that he intends to resolutely follow."
 SOV_VLADIMIR_ZHIRINOVSKY_DESC: "Sometimes, to understand a person's story, you need to follow their entire life path. Vladimir Volfovich Zhirinovsky, born in 1946 in Alma Ata, has significantly influenced Russian politics over his long life. Having become the leader of the Liberal Democratic Party of the Soviet Union in 1989, he, being a young and skillful speaker, was able to win the hearts of people. From the very beginning, he advocated the support of the Russian population in the national republics and wanted to save the Soviet Union. However, history put everything in its place, and two years later, Zhirinovsky watched impotently as his homeland fell apart, and the once "fraternal" peoples turned their senseless anger on the Russian population. It was at that moment that he realized that Russia became stupid. The collapse of the Soviet project was inevitable, but who knew that it would be so painful.\n\nIn subsequent years, Vladimir Volfovich remained the leader of the Liberal Democratic Party. Having adapted to existence in Putin's system, he waited. Being an extremely outrageous speaker, Zhirinovsky has earned a certain reputation in Russian society. Someone considered him a buffoon, a madman, and some saw in his words almost prophetic statements. However, the LDPR leader was adamant and always stood up for the Russian people and their welfare.\n\nAnd now it is Vladimir Volfovich who sits in the Kremlin. For decades, hundreds of statements and deeds of both himself and the party have elevated him to the political olympus. Nevertheless, over the years, the LDPR has absorbed a wide variety of supporters, and now the future of the party depends only on Zhirinovsky's will. Will she continue to follow the path of democracy with a strong president, or will Zhirinovsky become the Russian Caesar, bringing order with an iron hand. The die is cast."
 SOV_BORIS_NADEZHDIN_DESC:0 "Boris Borisovich Nadezhdin was born in 1963 in the city of Tashkent in the Uzbek SSR. For more than 5 generations, all men in his family shared the same name. However, he was not destined to live long on the territory of Central Asia. In 1969 Boris's family moved to Moscow. Where he later received education and worked first as an engineer, and then became chairman of the cooperative "Integral".\n\nBut Boris Borisovich has always been interested in politics, and that's why when in 1990 the ferment in society reached the limit he began to act. First he became one of the people's deputies of Dolgoprudny, and then he joined the movement of Democratic Reforms. Gradually he entered the social circle of the then famous Boris Nemtsov and took a prestigious position in the Union of Right Forces. Then he was a member of both the Growth Party and the Civic Initiative, and even tried himself as a candidate for the liberal platform of United Russia, but nothing worked out.\n\nHowever, after the European War Nadezhdin luck smiled upon him. Having entered the circle of trusted persons of Dmitry Medvedev, especially after the settlement of relations with the liberals, he was able to quickly bargain himself a good position of prime minister in the government. And as soon as Medvedev began to think about a possible resignation, Boris knew what had to be done.\n\nAnd now Nadezhdin is at the helm of the biggest and most powerful country in the world. He promised the people of Russia reforms, and he is responsible for his words. But how exactly he will carry out his reforms depends only on himself."
 SOV_ANTON_ALIKHANOV_DESC: "Anton Alikhanov was born in Sukhumi, Abkhazia, on September 17, 1986. His life was forever altered by the war that began in 1992. His family fled to Russia, abandoning their home and leaving behind a past they could never fully leave. From a young age, he learned that weakness-whether in individuals or nations-was unforgivable.\n\nAt first, his life seemed ordinary: a Moscow schoolboy and a diligent student at the Financial University. Instead of seeking wealth and comfort, he saw the potential of the new Russia. He was not content with just existing within the nation; he was determined to shape it.\n\nHe immersed himself in the works of Russian nationalists and philosophers, whose ideas resonated deeply with him. He envisioned a powerful, united Russia with a clear sense of destiny. He climbed the ranks of government, catching the attention of the Kremlin. His career took off: deputy in Kaliningrad Oblast, then governor. For most, this would have been the pinnacle, but for Alikhanov, it was just the beginning.\nIn Kaliningrad, he saw more than just an outpost; he saw a trophy to be claimed, a symbol of Russia's rightful dominance. The Soviets had ignored it, treating it as insignificant. But Alikhanov believed it could be fully integrated into Russia, "russified" to the core. His policies were bold and uncompromising, but not everyone shared his vision.\nHis downfall came from within. Dmitry Medvedev, whom Alikhanov later derided, dismissed him, undoing much of his work. For most, this would have been the end, but Alikhanov refused to be defeated. He rebelled openly, defiantly, and was expelled from United Russia. For him, this was a badge of honor.\n\nFrom his childhood, Alikhanov understood the dangers of weak leaders. He would not let history repeat itself. He seized control of the National Russia party, transforming it into a vessel for his vision of a revitalized Russia. He drew strength from the discontent across the country: disillusioned veterans, struggling workers, and restless youth. They rallied to him, believing in his cause.\nFew believed he would succeed. His enemies dismissed him as an upstart, a marginal figure. But they underestimated him. Against all odds, Alikhanov rose to power, winning an election that shocked the world. Now, he stands at the Kremlin, ready to show what true nationalism looks like."

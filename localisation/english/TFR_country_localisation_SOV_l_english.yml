 russia.596.t: "Revolution in Yemen"
 russia.596.d: "The streets of Sana'a are silent. In the once-bustling markets, mountains of shell casings shine proudly in the light of sunrise. Corpses are covered with newspapers. From the few minarets that still stand, the adhan for fajr begins. Muezzins are forced to compete for attention as the red banners of a victorious revolution flutter.\n\nAt El Rahaba, an IL-76 lines up on the runway, its insides filled with excited yet soft conversations in Russian. Within a few hours they would be home, safe and sound. Promotions would be in order for such a successful mission."
 russia.596.a: "Another domino falls."
 russia.597.t: "Revolution in Arabia"
 russia.597.d: "TODO: KGB backed Socialist revolution in Arabia succesful"
 russia.597.a: "Cool!"
 russia.598.t: "Revolution in Iran"
 russia.598.d: "TODO: KGB backed Socialist revolution in Iran succesful"
 russia.598.a: "Cool!"
 russia.599.t: "Yeltsin-Center Supports SMO!"
 russia.599.d: "A few weeks after the start of the Special Military Operation, the Yeltsin Center released a video called "Fight, Soldier!", which shows the deconstruction of the Yeltsin image created by liberals. It shows the beginning of the struggle against separatists and Wahhabis in the Caucasus, Yeltsin's support for Serbia at a critical moment, and most importantly his faith in President Putin. In the end it is claimed that "today we have every reason to believe that Yeltsin would support the decision to launch a Special Military Operation." after that Yeltsin's quote appears on a black background "Take a Good Care of Russia!"\n\nThe pro-Western Liberal and Communist media, of course, retracted everything said in the video, and liberal bloggers immediately began to criticize the new leadership of the Yeltsin Center. Site statistics of yeltsin.ru increased in multiple numbers, and tickets to the Yeltsin Museum began to be bought up sharply, which brought a lot of income to the Museum, which they promise to spend on helping our military, VESTI conducted a survey of visitors asking why they decided to visit Yeltsin Centre, one of the interviewees replied: "Recent events convinced me to visit Yeltsin-Centre, of course I treat Yeltsin negatively, but I agree with the management of the museum!" - which explains the popular opinion quite succinctly."
 russia.599.a: "Unity in time of need!"
 russia.600.t: "Maxim Katz Elected For Prime Minister"
 russia.600.d: "Placeholder"
 russia.600.a: "Vot Takiye Pirogi"
 russia.601.t: "Operation Torch in Motion"
 russia.601.d: "Many would claim that enacting revenge on the ones that hurt you makes you no better then them, and so what? From revenge comes catharsis and from catharsis comes peace.\n\nOn this fateful day, Operation torch in motion was set into action, several divisions of the Russian army and the Navalny death squads landed in the streets of London. The shock on the faces of the English were a sight to behold as cultural landmarks were set ablaze, streets were covered in the fog from our chemical weapons and overwhelming firepower from our death squads against the defensive forces of the British.\n\nPrimary objective: Revenge. Secondary objective: Inflict the scars upon the British spirit to such a degree that they would never dare to raise their weapons at us and our children ever again.\n\nIn a matter of  hours, the streets in London were silent, safe for the occasional sounds of weeping and distant gunfights, an entire city covered in a toxic mist. We are not done yet, there is a whole island to subject to our judgment, permanently."
 russia.601.a: "They will pay..."
 russia.602.t: "The question of St. Petersburg"
 russia.602.d: "With Russia back on the right track, there are a lot of imperfections and mistakes to be fixed, and questions to be answered, one of them being about St.Petersburg.\n\nThe city has a long and rich history, it is impossible to ignore its cultural and historical significance, however with Germany being destined to be our mortal enemy once again and the name sounding too German, it might be better to change its name back to Petrograd, this would show both our people and Germany that our loyalty lies with no one but the motherland.\n\nOr, we can keep the name, to show that we are beyond the petty stabs under water, no more jokes or symbolic acts, just real actions that drive us forth."
 russia.602.a: "Petrograd, no more German names!"
 russia.602.b: "It has always been St. Petersburg."
 russia.603.t: "Establishment of the Most Holy Governing Synod"
 russia.603.d: "Reshaping a country is like a puzzle that never ends, but by making sure that the right pieces are in the right place, we can ensure that the puzzle will be easier for the next generations.\n\nThis is why we will replace the patriarchate with a new Holy Synod, instead of a single authority figure, there'll be a divide between twelve figures, similar to how Peter the Great did it. Not only would this diminish the power of the church, but it would also allow us to modernize our nation better without too much of vocal resistance, enough protests against this have been made but we know better, and in the end they will understand this decision.\n\nOf course, hand picking these key figures ourselves would be the best idea, therefore one of the first members will be Aleksander Borisov, together with him we will make sure that we'll pick the right people that are more prone to agree with us."
 russia.603.a: "Clean out the rot."
 russia.604.t: "The Foundation of Ultranationalist Platform"
 russia.604.d: "Following the Kuban ultimatum, a small but very vocal group of ultranationalists inside Russia of the future have founded their own platform to agitate their vision.\n\nStill loyal to Navalny, they have managed to grow in popularity as they are in favor of enacting total revenge upon the West and a purge of Russia's internal enemies. Albeit unconventional to our party, they are the potential carte blanche we need to rally the youth and to enact less popular policies for the sake of the motherland.\n\nAs of now they are growing in influence and popularity and like the engine of the state, we have to decide whether we swap to their fuel of hatred and radicalism, or maintain a steady course, nevertheless, they'll be useful to us.\n\n"
 russia.604.a: "Russia will take all of Europe, even if it must stand upon a pile of ashes."
 russia.606.t: "Navalny Wins Presidential Elections"
 russia.606.d: "The results from the first democratic elections held in Russia since 1991 are in! It appears that Alexei Navalny has won his presidency, just like, opinion polls predicted, transforming his provisional leadership into a permenant one.\nThe country saw a turnout of 68.7%, with 75,181,073 voters participating. Moscow had the highest voter turnout at 92.8%, while the Republic of Karelia had the lowest at 57.3%. In the first round, Alexei Navalny emerged as the winner with 52.9% of the votes. Navalny won most of the votes in St. Petersburg (85.4%) and received the fewest in Karelia region (25%).\nMaksim Katz secured second place with 29.2%, followed by Evgenyy Stupin in third with 5.8%. Ivan Putilin received 3% of the votes, Grigory Yavlinsky got 2.7%, and Boris Titov received 1.5%. Additionally, 1.9% of voters voted against all candidates, with the highest number of such ballots coming from Karelia at 5.9%."
 russia.606.a: "An honest victory!"
 russia.607.t: "The NBP Question"
 russia.607.d: "An issue was brought up in recent days, regarding a possible unbanning of National-Bolshevik Party. They were one of many victims of putinist and successor regimes, and they were on forefront of resistance against political repression. Despite their radical ideology, they often worked with us, coordinating protests and other events. It would be only fair if we finally give back for all their hard work over the years.\nHowever, their extremist ideology and luck of, really, any allegiances to our democratic system and their love of Soviet Empire, may prove a threat to us too. After all, if we lived in normal country back then, we would never had to work with these elements of society..."
 russia.607.a: "Their flowers have right to bloom too!"
 russia.607.b: "We were never on their side."
 russia.608.t: "The Question of the Left"
 russia.608.d: "TODO: Navalny's admnistration thinks what to do with radical leftists."
 russia.608.a: "They have their right."
 russia.608.b: "Only 'democratic' leftists can pass through." 
 russia.609.t: "Dispersal of the Russian March"
 russia.609.d: "Today in Syktyvkar, a group of Wagner loyalists violently suppressed an ultranationalist march. The march began around noon and quickly overpowered the small police force sent to manage the protest. The leaders of the march incited violence against the supreme council of officers and Wagnerite heroes.\nElite Wagner troops were eventually deployed by the supreme council and opened fire on the protesters, causing them to scatter. Some individuals attempted to fight back but were swiftly killed. Those who were arrested will face severe penalties for their attempted coup against the Russian government. Two individuals, Bulat Poglavnikov and Katya Poglavnikova, who despite being brutally injured will now stand show trial, in which death penalty will be sentenced to them, as an example against dissent, they're currently await their time in IK-3 Harp.\nWhile some Wagner soldiers feel remorse for their actions, they will be reminded of their place."
 russia.609.a: "A show of force."
 russia.610.t: "Navalny Disappears from Prison!"
 russia.610.d: "Terrible News!\nFollowing recent unrest at IK-3 Harp prison, notorious criminal and adversary Alexei Navalny has mysteriously disappeared from his cell. The prevailing theory suggests that he, possibly aided by a traitor or cooperative fellow inmate, managed to break free amidst the chaos and confusion, slipping away into the wilderness. The potential consequences of this escape could be dire if Navalny's whereabouts are not swiftly determined and contained. The Supreme Council has issued a directive for an extensive search operation to locate Navalny and ensure his capture.\nAdditionally, over 100 other prisoners have also taken advantage of the unrest to flee IK-3 Harp, raising concerns about their potential involvement with Navalny or their independent escapes."
 russia.610.a: "Goddamit!"
 russia.610.b: "Perevernite Tam Vse Verh Dnom!" 
 russia.611.t: "Dolgoprudny Massacre"
 russia.611.d: "Shocking news comes from the Moscow region, where a crowd of protesters, who had gathered themselves from all ideological camps - Navalnists, Communists, Nationalists, and even Putinists - turned out for a rally against the Wagner government. They shouted anti-government slogans and ditties, often calling the council officers and the dead Prigozhin names. Then the unexpected happened, one of Wagner's soldiers lost his nerve and opened fire into the crowd of people. The crowd, shocked by what was happening, became confused, thus increasing the number of casualties. Unlike the incident in Syktyvkar, because the tragedy occurred in the center of our country, it could not be silenced. By the evening, all the telegram channels and independent media shone with bloody footage from Dolgoprudny. Especially memorable was the shot with a dead student holding a sign "I don't want to live in Vagneroidia!".\nThere will be serious consequences..."
 russia.611.a: "Mda..."
 russia.612.t: "Mass Protests Across Russia!"
 russia.612.d: "In our haste to quell the fire spreading across Russia, we have done nothing but add fuel to the flames. What started out as a few isolated liberal protests has quickly spread out of control, surely thanks to western agitators. These protests have mainly been targeted at us, attempting to destroy everything we have worked to rebuild.\n\nThey believe we are their enemy, and not the westerners who got us in this situation in the first place! Had they not shot Prigozhin, none of this would be happening, and they would have no reason to riot. If they have their wishes, Russia will be turned into a westernized liberal hellscape. We must do something urgently, we cannot be allowed to fail again."
 russia.612.a: "Crush them!"
 russia.612.b: "What's happening?!"
 russia.612.c: "It's over..."
 russia.613.t: ""Atonement""
 russia.613.d: "Recently, a freshly released book - "Atonement", written by Maxim Kalashnikov, a War veteran, has been sweeping the country, specifically its unusual plot. The book is about an alternate 2020s where Vladimir Putin did not pass away during the Pandemic, but continued to rule Russia, and then in 2023, launched a CТMO (Counter-Terrorist Military Operation) in Ukraine to defend Donbass. The story focuses on Alexei Navalny, who is serving time at the moment, but is drafted into Battalion-Zet, a poorly equipped unit of prisoners.\nAt first, Alexei hates everything about the war, and thinks it's unfair, and even considers escaping, only to be stopped by chance. As the story progresses, Navalny meets different characters and their stories, including a Lugansk resident, an Udmurt soldier, and a Moscow volunteer, and learns about the horrors committed by the Ukrainian authorities and NATO mercenaries, which causes Lekha's "rebirth", he realizes what Western democracy hides behind it, and what tragedy will happen if the Kiev junta wins. He, from a liberal who hated the government, becomes an ardent soldier, who later takes command of the unit, after the death of the commander in battle. The book has a bittersweet ending, when during the storming of Kiev, Navalny with the call sign "SVOY" is seriously wounded, but losing consciousness smiles as he hears the last, victorious shouts of "Kiev is fucking ours!"\n\nThe book received high praise from the public, especially for its realism, and the story of the tragedy of the people of Donbass, although Yegor Pipisev - a well-known critic, called it "Putinoid Schizophasia"."
 russia.613.a: "What a childish fantasy!"
 russia.614.t: "Your Empire"
 russia.614.d: "Passion for your country. One of most pure feelings to have as a citizen. Its been only few weeks after President Navalny reopened Petersburg's three flagpoles, as a sign of good will, and historic pragmatism adopted by his administration, albeit now with tricolor having a more fitting colors.\nAfter it, streets of many cities are now being filled with young people calling themselves "patriotic activists", organizing meetings, talks, rallies, and giving out pamphlets. Dressed in heavy, dark trenchcoats, sometimes wearing tricolor armbands, and often carrying a historic flag of Russia. No clear connection have been traced to any government agency or political party and them, most of them claim to be a part of non-government activist organisation called "Union for Defense of Motherland".\nMany liberal politicians have called for government to step in and curb the "clear revanchist danger" among youth, however, Kremlin's short, but blunt response to these demands was "Russian authorities will not open up criminal prosecution over passionate patriotism. This is a free, and democratic country now". And with it, these activists continue roaming around towns and villages, spreading the world of support for President and the state authorities."
 russia.614.a: "Through the smell of blood, the smell of sweat, I'm molding you into a patriot!"
 russia.615.t: "A Cold Day In Moscow"
 russia.615.d: ""I have a dream," declared Navalny's gruff voice from Ostankino station in Moscow, resonating across every corner of Russia. "That one day our country will stand as a beacon of democracy," Alexei proclaimed, clad in his military uniform adorned with the words "President of Russia." "But to reach that goal, we must navigate through the wilderness of hatred and prejudice, through the lies sown by our supposed 'partners'," Navalny asserted, pointing towards the illuminated Presidential Flag behind him.\n"We are on the brink of a new era. NATO, consumed by its Russophobic frenzy, will break against the unyielding strength of our spirits," he continued, his hand forming a clenched fist and a smile gracing his face. "However, sadly," Alexei's expression turned scornful once more, "Our enemies are not limited to those outside our borders." Clearing his throat, Navalny declared, "With this in mind, I announce the suspension of the current constitution and a complete overhaul of the government!" As millions watched the broadcast, a myriad of emotions swept through the audience - laughter, tears, anger, and joy.\n"Fear not, my fellow citizens. These new leaders have been carefully selected by me and my trusted advisors. They are prepared to sacrifice everything for our homeland," Navalny declared, raising both fists triumphantly. "The dawn of a new era is approaching. May God bless you all.""
 russia.615.a: "Patriots In Control." 
 russia.616.t: "Emergency Measures"
 russia.616.d: "History is not dictated by handshakes and shady backroom deals, our enemies would want us to believe that, as the West is gloating in its ill-gotten victory, they have grown blind to our ever growing desire for vengeance. Democracy is a delicate thing, to hear the voices of your own people and to listen to them, but with so many differences among each other, there are bound to be roadblocks in the way. Sometimes the voice of a single man is all that we need, a voice formed by the wishes and desires of our people.\n\nDemocracy and revenge are incompatible with one another, to reach the top, you have to sacrifice a lot, whether it be the freedom of speech, right of organization, the constant bickering of opposing parties in the hellish labyrinth of bureaucracy just to get something done.\n\nWith the right people on our side, a well placed military division here and there, and reassurance to the people that all these measures are for the good of the nation and the survival of our people, we'll hold a tighter grip on our destiny.\n\nSome might call this an act of tyranny, maybe it is. We'll restore our way of life after our struggle is over."
 russia.616.a: "We'll restore everything back... Eventually." 
 russia.617.t: "Restore the Yeltsin Myth?"
 russia.617.d: "Yeltsin so no doubt a dividing figure in Russian history, one part (totalitarian idiots) think of him as a traitor and turncoat, while we (Enlightened freedom fighters) see him as great democrat who freed Russia from communist regime.\nHe done mistakes, of course especially in later part of his career when he orchestred events in 1993, and gave power to Putin in 2000, but the image of him as a great fighter for freedom is to compelling to forget. Some of our presidential stuff argue in favor of re-imagining his image, to divide periods of his life, and even, calculate percentages of how positive and negative was his politics for Russia, of course, with positive overwhelming the negative, in which we'll place the most obvious mistakes and his later life.\nIt will serve as great aid to our efforts to legitimize ourselves in the eyes of the public and more radical democrats, but it can be costly to fund image restoration for Yeltsin."
 russia.617.a: "Amazing Idea!"
 russia.617.b: "Don't You Feel Silly? Don't You Feel Stupid?" 
 russia.620.t: "Russian "Funko Pops"!"
 russia.620.d: "Country is rocked once more! But this time not because of artillery fire or bombs, but for the hype of a new toy for young adults! Russian state company "IzhDynamics" have intruced our very own "Funko Pops" toys named - "RussoPop"! These littely things with big heads mimic many popular characters among the youth, and even politicans! Among most best-selling ones are, of course, RussoPops of our President - Alexei Navalny, and some of his ministers, including wife.\nNot only Russians stand in ques for the food now, but lines and lines from to stores that start selling those silly little buddies, rocking billions in profit for the company and the government.\nOne of new passionate of RussoPOP fans has been interviewed by the media, - Egor Pipisev, rising tik-tok star and rapid navalnyist. He showed the female reporter around his house in which she towering plies of the new toys in boxes, with many of them being Navalny in different outfits and poses. "Check out... my RussoPop... collection" he said to her. He's dog appeared to be sick."
 russia.620.a: "Gotta collect 'em all!"
 russia.621.t: "New Russian Business"
 russia.621.d: "With old order gone, comes a new dawn, for everyone, including our beautiful, democratic entrepreneurs. Disgusting oligarchy birthed by nobody but Putin and his lapdogs is gone forever, replaced with better ones, their faces are prettier, smiles are wider, suits cleaner, and briefcases fuller.\nKhodorkovsky, the "Financer of Russian Democracy" was extremely pleased with Navalny's decision to restore Yukos holdings, and it was his time to pick up what was left after the last economic hegemon fell.\nYukos has become new jack-of-all trades in our downfall-torn economy very quickly, together with it new many new companies formed too, the likes of "NovGazRos", Media Company "Fevral'", Steel Company "Svobonya Stal'" only to name a few.\n\nDuring recent meet-up between government and corporations they all looked extremely pleased as Navalny announced a new wave privitization and tax relaxation for companies.\nNew Russia - needed a new logo. Now it has one."
 russia.621.a: "The conglomerates got you in lock and key!"
 russia.622.t: "Oligarch Demands Civilian Investment in [SOV_oligarchs_investment_state.GetName]"
 russia.622.d: "A senior Oligarch from [SOV_oligarchs_investment_state.GetName] has approached the government with an offer of support. His state suffers from critical under-investment, and a government-initiated economic stimulus program would certainly make him reconsider his stance on certain proposed government policies.[SOV_new_oligarchs_scripted_loc]"
 russia.622.a: "We can only accept."
 russia.622.b: "Decline."
 russia.624.t: "Oligarch Demands Military Investment in [SOV_oligarchs_investment_state.GetName]"
 russia.624.d: "Local Oligarchs from [SOV_oligarchs_investment_state.GetName] have approached the government, offering their support for the President in return for an informal guarantee that [SOV_oligarchs_investment_state.GetName] would be the site of a new munitions plant for the Army. They argue that building a plant in the area would create a lot of jobs and provide the Army with much needed support in an increasingly dangerous world.[SOV_new_oligarchs_scripted_loc]"
 russia.625.t: "The "New" Reality"
 russia.625.d: "Despite all our democratic efforts, most people do not feel the positive transformation. Many people say that nothing has changed, and only the faces at the top have been replaced.\n People don't believe us, and that's a problem.\n For the majority of people outside the capital, we are still empty populists without ideas, or even worse - traitors funded by the West.\n But still, according to polls, many people put their hope in the president personally, many think that only he, with a strong and confident hand, will be able to restore order.... Navalny himself, personally, also supported such an idea, as he says: "Our country is patriarchal. We need a leader. It's not for this generation to change it, I'd rather be a democratic bonaparte than a failed reformer."\n\n0The choice of path is still, of course, far away, and the country continues to go in its own direction.... which leaves much to be desired."
 russia.625.a: "Somewhat sad..." 
 russia.626.t: "Anti-Corruption Trials"
 russia.626.d: "In times of a dying nation, you can see the vultures circling above it, hungry and ready to pluck it trying to sate their own hunger, in their blind lust they fail to realize it's their own children they are eating.\n\nThis is how we see the oligarchs that dare to reappear again after we took back our nation. Miserable pests that don't share the same love we have for our motherland, while we see the beautiful people and landscapes, they see resources ant exploitable labor, grinning while they make deals with the west, in the past these parasites managed to implant themselves onto our civilization, forever being a cancer as we slowly succumbed to them.\n\nThis is why we will cut them out before they can do any real damage, all of them will be arrested, put on trial for even the smallest infraction of our laws. Corruption, treason, bribery, exploitation, murder and whatever perversions they indulge themselves in, without a doubt something they've learnt from the west.\n\nNo matter, all of them will be gone from the public eye. A small step to rejuvenate our nation."
 russia.626.a: "It's the beginning."
 russia.627.t: "Khodorkovsky is furious!"
 russia.627.d: "Following the start of the anti-corruption case, relations between the head of state and the country's top businessman have deteriorated a hundredfold.\nA leaked phone conversation between Khodorkovsky and his colleague was brought to the president's desk, in which he angrily promises to "destroy this puppy" and "show him where the barracks are being built" for "biting the hand that fed him", clearly referring to Alexei Navalny and his administration.\nHe also mentioned the death of the mayor of Nefteyugansk, and said that if necessary, he would do the same to Navalny. Mr President was left alone with this recording, obviously thinking about what to do next, but soon he picked up one of his office phones...."
 russia.627.a: ""Oh, the misery, everybody wants to be my enemy""
 russia.628.t: "Khodorkovsky Found Dead!"
 russia.628.d: "Today, Mikhail Khodorkovsky, the CEO of Yukos and one of main the defendants in the anti-corruption case, has been found dead in the Neva river, and more precisly, in Bolshya Nevka. First his, by now decomposing body was noticed by bypassers, who called police and medics.\nThe news roared thourghout the country almost immediately on the internet, many saying "good riddance", while other crying over one of many backers of Russian democracy dead.\nThe government did not officially state anything, only Petersburg Police also refuses any comment on was it a tragic incident or a planned murder, citing ongoing investigation, and privacy laws regarding personal information even after death.\nThe Russian State, however, already suspended and confiscated all bank accounts of the deceased, and it is expected that the future of Yukos will be decided soon."
 russia.628.a: "Tragedies happen..."
 russia.629.t: "The Night"
 russia.629.d: "Alexei had a busy day. He had worked too hard, especially with business matters. It was already past midnight. After drinking the last mug of coffee, as he had vowed, Alexei got up from the desk of his Kremlin office, took his jacket from the chair, quickly put it on, and walked calmly, though tiredly, to the door. Navalny was just starting to turn the knobs when suddenly he heard a painfully familiar voice. I didn't even, um, expect it."\n\nThis timbre could not be confused with anyone else, it was too unique, and Alexei had heard it many times. A small sweat ran down his forehead. For a few more seconds, he just stood there, his hand still on the doorknob, but then he turned round sharply to see... But the office was empty.\n"Who's here?" - Alexei asked, not believing the void was talking to him. There was no answer. \n"I have to sleep, or the devils will start dreaming," thought Alexei, rubbing his eyes he left the office. Walking along the empty corridors of the Kremlin, in his head there were various thoughts about this case, "Sleep deprivation?" "Did they put something in the coffee?", "A spirit living in the Kremlin?", "Is he alive and living in the Kremlin?". Although, having reached the bedroom, Alexei had already, at first glance, forgotten about this incident, and his thoughts were replaced by more mundane ones, for example, about increasing the President's security. But in the dark corners of his mind this night would remain for a long time."
 russia.629.a: "Things happen at night..."
 russia.630.t: "The House Always Wins"
 russia.630.d: ""The chameleon of Russia became the creature it claimed to hate..."\n\nNavalny wasn't one to particularly care about the opinions from his enemies, but a certain article from a western journalist still managed to sting him in the heart, he knew he had to leave some of his idealism behind for the sake of stability, reclamation and certainty.\n\nBut whenever he sees the reports of dissidents being arrested, protests being violently disrupted and the iron grip of authority grabbing the throat of liberty, he couldn't help but think he might have abandoned too much, already he has been jokingly referred to as the new Putin, the old engine with a new paint and the chameleon.\n\nHe can imagine his old rival laughing in hell, heaven or wherever he is, at him for this ironic twist, but a wave of calmth washes over him. Putin is what put Russia in this mess to begin with, he brought stagnation to the motherland, he brought forth his idiotic successor to drive Russia to ruin.\n\nNo, Navalny thought, he is much more than his old rival. The tools of authority become blunt in the hands of the wrong man. Yesterday was not the right time to wield it."
 russia.630.a: "But tomorrow will be."
 russia.631.t: "Neo-Bolsheviks Tamed"
 russia.631.d: "The red banner is a familiar sight in our nation, a banner some of us have grown to love or hate but to deny that it is part of history would be foolish.\n\nThat is why with some soft-spoken threats and promises of mutual entrenchment of power, we've managed to add the neo communist party into our coalition. Led by Andrey Rudoy, a party that adheres to more leftist ideals but still holds the same love for the motherland like we do, and with his agreement to join us, he has proven exactly that.\n\nThe tri-colour is high in the sky, but in our hearts, the red banner from our glory days shall always have a special place in our hearts."
 russia.631.a: "They know what's best." 
 russia.632.t: "Connecting with the National Democrats"
 russia.632.d: "Nationalism in hard times is the antidote we need to root out nihilism. There are those that agree with that notion but have failed to harden their hearts to pity, democracy is an entity you need to carefully control rather than to let it run wild. Roman Yuneman understands this, he and his national democrats started rough with their dedication to democracy in trying times, but with some personal discussions and negotiations, he and his party rallied together with us in our coalition.\n\nWithout a doubt, this will sway some of the more moderates to align with our goals, a national shield to the political disease of the west."
 russia.632.a: "Horosho!"
 russia.633.t: "Novosocialists Tamed"
 russia.633.d: "Pacifism is akin to a disease transmitted by promises one cannot fulfill, moderation and false smiles that led us to nowhere, of course such harsh language wasn't used with the novosocialists under the leadership of Alexander Shtefanov. Bringing democratic socialists into the fold seems contradictory but showing goodwill like this is a prime example of the promise that we in fact wish to cooperate with even the ones that might have disagreements with us.\n\nOfcourse, behind the scenes there have been more implied threats of imprisonment and promises of stepping up in the ranks of the grant game of politics, weak wills that are soon to be loyal allies."
 russia.633.a: "They know what's best." 
 russia.634.t: "The Return of "Kukli""
 russia.634.d: "With the return of freedoms, came the return of free programmes. One of them, straight from the '90s. "Puppets" produced by Vasily Grigoriev returned to the screens after more than 20 years of prohibition.\nThe political satire of "Puppets" is completely renewed now, instead of Yeltsin, Zyuganov, and Zhirinovsky, in the frame appear puppets Navalny and his cronies, and new oppositionists, and even businessmen. Although old characters also appear in the form of ghosts and flashbacks. Especially often used puppets of politicians of the time after Putin.\n\n\nHowever, some critics note the recursion of some plots, and sometimes direct copying of old episodes, where instead of Yeltsin or Putin put a puppet of Alexei Navalny. The authors ironically reply to these reviews with "The Cyclicality of History" and "This is Russia!". Ratings show that the people like it, although they also notice the repetition of scenarios."
 russia.634.a: "Harmless fun."
 russia.635.t: "Stavropol Protests"
 russia.635.d: "It was inevitable that the Kuban republic would have its own fair share of troubles, the Russian people that were forcibly cut off from our motherland by the claws of the west are protesting for their unfair treatment at the hands of the republic and the ever-increasing violence against them.\n\nRumors of our people getting shot at during these protests turned out to be true, and a wave of anger washed over us like a never ending floo. The west of course turns a blind eye to the violence, and in times of need we have to act on behalf of our people. Peacekeeping forces will be sent to the Kuban republic, to separate the violent from the peaceful and to prevent any more blood from our children being shed.\n\nThis is a prime opportunity to let the Russian communities in the republic vote on whether they want to rejoin the motherland or not, considering the violence committed against them, this will without a doubt go smoothly, however the prospect of our ans being returned to us will definitely draw the ire of the enemy."
 russia.635.a: "Bring in the Peacekeepers and start referendum!" 
 russia.636.t: "Succesful Referendum!"
 russia.636.d: "After massive protests and rallies across the Don, the local government had no choice but to contact President Navalny's office and agree to hold a "Referendum" on the return of the territories under Russian control.\n\nThe result was no surprise to anyone - 91% voted in favour of reunification with Russia. The Ukrainian Foreign Ministry immediately sent a request to check the results for falsification, as well as a note of protest to the Russian government, but even they realise that the decision was made by the overwhelming majority - Stavropol is Russia!"
 russia.636.a: "Excellent!" 
 russia.637.t: "Kalmykia Proposes Reunification"
 russia.637.d: "After a short period of forced independence, the government of Kalmykia sent a request to the Russian Foreign Ministry for a diplomatic visit by the President of the Russian Federation to Elista to discuss the "Conditions of Coexistence and Friendship of the Peoples". The Russian Leader was very warmly welcomed in Elista, and after a short tour of the city, went to visit the President and Prime Minister of the Republic. On his return to Moscow, the President said that the two countries would soon sign a treaty on the "Peaceful Reintegration of Kalmykia into Russia" and that all citizens of Kalmykia would be able to renew their Russian passports."
 russia.637.a: "Welcome Back." 
 russia.638.t: "A question about the Finance Minister..."
 russia.638.d: "Sooner or later, we will have to get rid of Mikhail Khodorkovsky, who currently occupies the chair of the Minister of Finance of the Russian Federation. However, who will fill the vacant position?\n\nBoris Zimin, the main sponsor of the Anti-Corruption Foundation, a successful businessman and philanthropist, is a neutral, loyal person with enough experience for the Minister's chair.\n\nMikhail Svetov is the most prominent Libertarian politician in Russia, a member of the Libertarian Party of Russia, and an economist with very... specific ideas that could bring prosperity to Russia, but will they?"
 russia.638.d1: "Sooner or later, we will have to get rid of Mikhail Khodorkovsky, who currently occupies the chair of the Minister of Finance of the Russian Federation. However, who will fill the vacant position?\n\nBoris Zimin, the main sponsor of the Anti-Corruption Foundation, a successful businessman and philanthropist, is a neutral, loyal person with enough experience for the Minister's chair.\n\nMikhail Svetov is the most prominent Libertarian politician in Russia, a member of the Libertarian Party of Russia, and an economist with very... specific ideas that could bring prosperity to Russia, but will they?\n\nElvira Nabiullina - Former Minister of Finance, a person with vast experience and recognized talent in the economic sphere, but the electorate may very badly view a member of Putin's administration in our new Russia...."
 russia.638.d2: "Sooner or later, we will have to get rid of Mikhail Khodorkovsky, who currently occupies the chair of the Minister of Finance of the Russian Federation. However, who will fill the vacant position?\n\nBoris Zimin, the main sponsor of the Anti-Corruption Foundation, a successful businessman and philanthropist, is a neutral, loyal person with enough experience for the Minister's chair.\n\nMikhail Svetov is the most prominent Libertarian politician in Russia, a member of the Libertarian Party of Russia, and an economist with very... specific ideas that could bring prosperity to Russia, but will they?\n\nPavel Grudinin - Businessman, activist, former presidential candidate and prominent member of the CPRF, maybe we should give the ideas of planned economy another chance...?"
 russia.638.a: "...Boris Zimin." 
 russia.638.b: "...Mikhail Svetov." 
 russia.638.c: "...Elvira Nabiullina." 
 russia.638.e: "...Pavel Grudinin." 
 russia.639.t: "Khodorkovsky's Statement"
 russia.639.d: "Following Mikhail Khodorkovsky's resignation as Minister of Finance of the Russian Federation, Mikhail's appeal to the Russian Government, Alexei Navalny and the People of Russia was published on his Youtube Channel and in the news publication 'Open Russia - Khodorkovsky Live'...\n\n\n'...We see that Navalny has embarked on the same path that Vladimir Putin used to strengthen his regime, we see the terrible trends that almost led us to the revolution in 2012. However, Alexei does not seem to be planning to stop, and most likely in a couple of years we will see the resurrection of the late Vladimir Vladimirovich's regime.... All those who are not indifferent to the fate of Russia, come out to protest against the new tyrant before it is too late..."\n\n\nUnfortunately for Mikhail, his calls for protests and spontaneous rallies did not find popularity among the audience, the largest action was held in Dmitrov and gathered about 40 people in total."
 russia.639.a: "Good riddance!" 
 russia.640.t: "Purges in the "Russia of the Future"!"
 russia.640.d: "As a result of a large-scale internal investigation, the FCS and ACF have uncovered shocking details about Alexei Navalny's already former associates:\n\nLeonid Volkov, Maria Singerschikh, Ivan Zhdanov, Maxim Mironov, Roman Rubanov and many others were involved in large-scale money laundering schemes together with already former oligarchs such as Alexander Zheleznyak, many trans-national corporations - Shell, Chevron, British Petroleum, illegally supplying them with gas and oil at a reduced price.\n\nThe defendants have already been arrested and will be brought to court in the coming days, and all the money they earned through budget money laundering will be returned to the Russian Treasury.\n\nPetr Losev, Ekaterina Shulman, Maxim Katz and Yuliya Latynina will take over the vacated government posts."
 russia.640.a: "The Fund to Fight What?" 
 russia.641.t: "Protests in Belarus"
 russia.641.d: "In Minsk, Mogilev and many other Belarusian cities, the situation has reached the boiling point. People are taking to the streets and accusing the Naumchik government of limiting the power of President Tsikhanouskaya and building its own pro-Western dictatorship, which will be even "Worse than Lukashenka's regime". Pro-presidential MPs and governors are coming out to the protests and support the removal of the government and constitutional reform, which would give more power to the president, eliminating the dual power in the Rada. The Russian government has not openly commented on the situation in the friendly country, but St Petersburg Governor Roman Bulatov and President Navalny personally supported the protesters from their personal accounts on social networks."
 russia.641.a: "Disturbing"
 russia.642.t: "Russian Tanks Spotted in Minsk"
 russia.642.d: "Violent protests and counter-protests have been going on in Belarus for several days already, against the background of which the appearance of the White-Azure-Scarlet tricolour in Minsk and the eastern regions of the republic became an even bigger sensation. Neither the Russian Foreign Ministry nor the President commented on the situation, but the appearance of the Russian military in the country has already provoked protests in favour of joining Russia in Mahiliou and Homel."
 russia.642.a: "That's where they belong!"
 russia.643.t: "President Navalny Addressed the People of Belarus"
 russia.643.d: "After a short radio silence, the President of the Russian Federation made a statement on the protests in Belarus: "Dear Belarusians, we in Russia and I personally are very familiar with the fact that our freedoms, our constitution are being trampled on. And we could not leave you alone in such a situation. We fully support your demands for the resignation of the Prime Minister and the establishment of a new, democratic constitution. Belarusians, we, the people of Russia are with you. And together we will win."\n\nThe countries of the European Union accused Russia of neo-imperialism and attempts to establish a puppet government in the neighbouring country, but apart from deep concern from the West nothing followed."
 russia.643.a: "Is the situation returning to normal?"
 russia.644.t: "Tsikhanousky assumes the presidency!"
 russia.644.d: "In Minsk, negotiations on the constitutional reform and the resignation of Prime Minister Naumchik, initiated by the Rada of Belarus, took place. The parties came to an agreement and Naumchik went to an honourable retirement on the condition that he would not be tried later, the proposed draft constitution was quietly adopted.\n\nHowever, Svetlana Tikhanovska refused the post of president in favour of her husband - Sergey Tsikhanousky. In his first speech, the latter promised the establishment of real democracy in the country, as well as the strengthening of ties with Russia."
 russia.644.a: "Glory to Tsikhanousky!"
 russia.645.t: "Revolution in Belarus"
 russia.645.d: "As a result of the constitutional crisis and mass protests against the Rada and Prime Minister of Belarus Sergey Naumchik, the government of Belarus has changed again. The Western media called it a pro-Russian coup, while the Russian media called it a just liberal revolution.\n\nThe referendums on joining Russia were also held in Mogilev and Gomel along with the negotiations in Minsk, with a small margin, but the population of the regions voted in favour of integration."
 russia.645.a: "Revolution? Again?"
 russia.646.t: "Mass Assassination Attempt on Members of "Russia of the Future""
 russia.646.d: "Terrifying news came from Moscow, St. Petersburg, Yekaterinburg and 15 other Russian cities - at least 100 members of the ruling Russia Future party were assassinated the previous night, 20 of whom were killed. The dead were regional officials and members of the regional dumas of St. Petersburg, Karelia, Moscow and Sverdlovsk regions. Prime Minister Leonid Volkov was beaten to a pulp with hammers, but he was taken to hospital and is under the watchful eye of doctors. The assassination attempts were also reported by other high-ranking officials: Yevgeny Roizman, Ivan Zhdanov, Maria Pevchih and even President Alexei Navalny himself. In his morning address to the nation, President Navalny announced that the FBK and FSK intelligence departments were already working to identify the assailants and customers, asserting that everyone involved would get what they deserved and justice would be served, concluding his speech by declaring a nationwide mourning period."
 russia.646.a: "Russian "night of the long knives?"" 
 russia.647.t: "Arrest of Leonid Nevzlin"
 russia.647.d: "This morning, at 9:45 Moscow time, detachments of the FSK Special Forces raided the residences of Russian businessman Leonid Nevzlin and former Finance Minister Mikhail Khodorkovsky, but after a brief conversation with the officers, Khodorkovsky was released. Despite Nevzlin's escape attempt, he was detained and taken to the Supreme Court building. At the same time, the Anti-Corruption Foundation published a new three-hour investigation shedding light on the identity of the instigator of the mass attempted and miraculously failed assassination of the President. The court session was short, despite the fact that Nevzlin actively tried to defend himself, suspecting the judge and prosecutor of "venality" and "working for Navalny," but the evidence played against him. After the session, the defendant was taken to the pre-trial detention center to await the next and final one. Preliminary verdict: State Treason and Ordered Murder - Life imprisonment."
 russia.647.a: "He belongs in the mental institution!" 
 russia.648.t: "The Katz Investigation"
 russia.648.d: "Less than a month has passed since the previous sensation in the world of Russian liberal politics, as a new one appears. Maxim Katz, believed by some to be the leader of the second most influential party in Russia, releases his investigation, in which he accused the leaders of the International FBK of collaborating with corrupt bankers - Alexander Zheleznyak and Sergey Leontiev, former owners of Probusinessbank, who laundered money through Liechtenstein. Katz claims that while Navalny was serving his time in prison, Volkov, Zhdanov, and Pevchih took the money stolen from Russians out of Zheleznyak's hands, embedded him in their structures, and even made him their treasurer.\n\n\n"What kind of person do you have to be to launder the reputations of the most disgusting crooks and publicly behave as if you were the moral centerpiece of the entire Russian people! And to do all this with only Alexei Navalny's reputation behind you!" Katz asserted. There has been no concrete response from the leaders of Russia Future and FBK yet, but the decision rests with the president..."
 russia.648.a: "It's time to burn this ball of snakes" 
 russia.648.b: "You can't trust "murzilka" Katz... You can't" 
 russia.649.t: "Ukraine vows to defend Kuban"
 russia.649.d: "With Russia rebuilding itself into an entity beyond the control of the west and the rapid reclamation of the caucasus it would be no surprise that our long-time rivals would take notice of this.\n\nThe state of Ukraine, which has fallen into the clutches of NATO and the European Union has publicly stated that the Kuban republic falls under their protection. The illegitimate republic, which has broken away from our mercy and love, has crept to our enemy, begging for support.\n\nOf course, in the long run it does not matter, reunification is non-negotiable and inevitable, however the path of peace is a path that simply does not exist anymore.\n\nRussia is incomplete. Russia will be whole again.\n\nThey fear us, rightfully so. Cowardly bowing to the enemy is something to be expected from traitors."
 russia.649.a: "They know the alternative..."
 russia.650.t: "Mass Amnesties"
 russia.650.d: "President Navalny's first decree, as a recently released political dissident, was to release all political prisoners, regardless of their views and religious beliefs. Of course, the media emphasised the release of liberal leaders such as Vladimir Kara-Murza, Ilya Yashin or Yevgeniya Berkovich, but on the same day other, much more radical dissidents were released. Alexei Navalny stated on principle that no one, no matter how much their views do not fit into the new reality of Russia, will be pardoned if they are imprisoned because of their statements."
 russia.650.a: "Spring has came to Russia"
 russia.651.t: "Second Round of Debates Between Navalny and Strelkov"
 russia.651.d: "The first debate between Alexei Navalny and Igor "Strelkov" Girkin took place more than ten years ago, and therefore, already in the role of president, Alexei was unable to refuse his opponent a second round. This time, however, the conditions are quite different. There is a full-scale war for revenge in Europe, and the ideas of two almost opposite persons have sharply crossed. It was hard to call it a debate, more like a mutual provocative speech.\n\nAt the end of the discussion, the opponents shook hands, and the president promised Igor Girkin a role in the Ministry of Defence...."
 russia.651.a: "The End of the Line"
 russia.652.t: "Russian Economic Miracle"
 russia.652.d: "Contrary to the predictions of Western analysts and pessimistic Russian politicians, the Russian economy has not only not collapsed after the war, but has risen even higher than ever.\n\nThe ruble, of course, has not been able to strengthen on the world market as the most reliable international currency, because of the situation in Europe no one is in a hurry to invest in Russian assets, but its stable and high exchange rate has been ensured by hundreds of entrepreneurs who are rapidly developing the Russian market. Whether this is due to responsible capitalism, which has been on Alexei Navalny's agenda since the early 2010s, or to a competent reshuffling of positions in the Ministry of Finance and the Central Bank, Russia is probably feeling better than ever before."
 russia.652.a: "Yes future!"
 russia.653.t: "First EEC Summit in Varna"
 russia.653.d: "The first summit of the Eurasian Economic Commonwealth, a new organisation that aims to become an alternative to the European Union in the Northern Hemisphere, took place today in Varna, Bulgaria. The event was held under the slogan "Peace to the Peoples of Europe - Down with Western Imperialism - Long Live People Power". According to the estimates of the Ministry of Tourism of Bulgaria, the summit was attended by between 100,000 and 300,000 people.\n\nThe summit was supposed to be held on the territory of the local Palace of Culture and Sports, but due to its size the event in general covered the area of about a third of the city, the presidents of Russia and Bulgaria have already announced that next year they will prepare a larger venue for the summit in the capital of Bulgaria - Sofia."
 russia.653.a: "A Toast for Liberty!"
 russia.654.t: "Baltic Treaty Organisation"
 russia.654.d: "Less than a year after Russia's defeat, the news came in that the Russian President signed the treaty "On Russia's Sphere of Influence", also called the "Baltic Treaty". The NATO Secretary General condemned Russia's actions and threatened to cut off any reintegration into the European Sphere and reimpose sanctions.\n\nThe Russian President's office responded that the treaty is defensive and is not hostile to NATO...."
 russia.654.a: "...but can we believe them?"
 russia.655.t: "Radical Youth Movements"
 russia.655.d: "A new, rather radical, pro-state movement - "Free Youth" - has appeared in Moscow and St. Petersburg. Its organisers describe the movement itself as "Democratic and Patriotic". They held several meetings in the Leningrad and Moscow regions, with a special focus on preparing for the defence of the country, learning to use weapons and raising the morale of young boys and girls.\n\nNavalny's critics accuse Free Youth of continuing the infamous "Nashi" and "Yunarmia" movements, but with "liberal specifics". Supporters say that there is nothing wrong with patriotic education, especially since everything takes place voluntarily and in the fresh air, in compliance with environmental norms.\n\nThe conservative minority, in particular, the governor of the Leningrad Region, Grigory L., has also spoken out against such initiatives, threatening to close their way to tourist bases as soon as the opportunity arises, so that they stop engaging in "neoliberal indoctrination of the youth"."
 russia.655.a: "Just a child's play..."
 russia.700.t: "Grudinin Coup"
 russia.700.d: "After the defeat in the war with NATO, the internal party struggle in the Communist Party began with renewed vigor. Of course, given the general instability in the country, various party groups did not restrain themselves. Classic techniques such as polemics and witch hunts were used, as well as more sophisticated methods such as eliminating political opponents using drones. In the end, Pavel Grudinin managed to stay on the shaky throne of the president of the RSFSR, who, with the help of his connections and means, was able to find a place in the sun in a country bursting at the seams and even gain the support of the popular majority. So far, the new president has promised to liberalize the economy and engage in dialogue with the opposition. There are even rumors that the new leader intends to work closely with Navalny.\nWhether this is true or not, Russians will find out very soon. In the meantime, the people are rejoicing, hoping that Grudinin's coming to power will help stabilize the country."
 russia.700.a: "People's Candidate!"
 russia.701.t: "Violent Anti-Soviet Protests!"
 russia.701.d: "In the wake of our recent defeat, public opinion of our government has been critically low, and it seems now that the pot is beginning to boil over.  Previously-sporadic incidents of vandalism and demonstrations have gained a pattern - and traction - over the last few days, and reports of rioting are coming in from major cities across the Union.  Supporters of the unrest range across the political spectrum, with several known supporters of Alexei Navalny and the former Liberal Democratic Party alike numbering among the agitators.  While disparate, they are united in their demands: they want a referendum on whether the Party should remain in power, a referendum that we are almost certain to lose.\n\n30 people are already dead or severely injured.  Several local police stations and national guard outposts have been raided, and there is fear that elements of the rioters may have taken their weapons for themselves.  If the situation persists, it is likely that such violence will only get worse.\n\nThe faith of the people in the Soviet restoration is fading fast.  We must act quickly, or lose everything."
 russia.701.a: "Damn it."
 russia.702.t: "Kvachkov Coup"
 russia.702.d: "The defeat in the war with NATO was a devastating blow to Soviet power. War veterans, dissatisfied with the government's handling of the fighting and domestic problems, began to express their dissatisfaction openly. Vladimir Kvachkov, who had already gained a reputation as an implacable patriot, used this moment to take decisive action. Having convinced the top military leadership that the current leaders of Soviet Russia had led the country to disaster, he proposed a new path.\n[GetDateText], the troops under Kvachkov's command began moving toward Moscow. The operation passed without significant resistance: many units of the army, tired of inaction and disillusioned with the government, defected to the side of the rebels. Kvachkov personally addressed the soldiers and officers, urging them to save the country from political weakness and revive the greatness of the Soviet empire."
 russia.702.a: "We will win!"
 russia.703.t: "The Failed Conservative Revolution"
 russia.703.d: "The army has narrowly averted the end of the Union today.  Early this morning, several national guard and police units in and around Moscow ceased responding to communications and began converging on the Kremlin, with such occurrences repeated in St. Petersburg, Kazan, Rostov-on-Don, and several other major cities.  It was only by the quick thinking of a number of loyal army units and Red Guard in the south of the city that these seditionists were ambushed and thwarted.  Had they continued unmolested, it is likely that they would have captured the entire Supreme Soviet, which was in an early session.  Once their forces in Moscow were routed, the coup plotters quickly began to retreat and scatter, but many have been captured and are expected to face a firing squad in short order.\n\nUnder interrogation, several officers of the coup have revealed their loyalties to the former Liberal Democratic Party of Russia and other such nationalist groups.  Though they have been thwarted, confidence in the KGB is likely to plummet as the public questions how the plotters knew of the meeting, let alone how the plot was allowed to come to fruition."
 russia.703.a: "No Mercy for Enemies of the People!"
 russia.704.t: "The Failed Oligarch Coup"
 russia.704.d: "The Union has had a brush with death today, as mercenaries and seditionists loyal to several disgraced oligarchs very nearly seized Moscow.  In the late hours of the night, masked men were seen emerging from several buildings in the outskirts of the city, joined by soldiers from army, national guard, and police units, who proceeded to quickly advance towards the Kremlin.  Gunfire was reported into the early hours of the morning, with a brief air duel over Moscow quite possibly deciding the fate of the Union, as loyalist air units prevented an unresponsive helicopter detachment from breaching the city, where they likely would have bombarded the Kremlin, placing the entire Supreme Soviet in danger of being killed.  However, the lines held, and the coup plotters have been scattered or captured.\n\nSeveral captured mercenaries have revealed their memberships in the private armies of various oligarchs, whose industries stand to be wrested from their control.  Arrest warrants have been put out for all implicated individuals, and it is expected that they will be tried by military tribunal.  This is of little comfort to the people, however, who are likely to question where the KGB was when some of the most prominent people in the nation were enacting this plot."
 russia.704.a: "No Mercy for Enemies of the People!"
 russia.705.t: "The Fate of PMC "Wagner""
 russia.705.d: "PMC Wagner has been the Kremlin's "long arm" all its existence, when he himself did not want to get dirty. Created on the initiative of Dmitry Utkin and managed by "Putin's cook" Yevgeny Prigozhin, the Wagner Group took part in many conflicts around the world: the orchestra toured the Donbass in 2014, remembered for its "adventures" in Syria, the Central African Republic and Libya. Recently, traces of the "Ichthamnets" have been found in Saudi Arabia, where they fought on the side of the Crown Prince, and in Congo on the side of the government in Kinshasa. Wherever there was a clink of a coin, "musicians" appeared. But since the government in Russia has changed, the government has raised the question of the future of this organization.\nSome believe that it is impractical and even dangerous to have such a disloyal structure with combat experience, and even funded by oligarchs. As a solution, they propose to disband the PMCs, and send the most loyal to the active army to exchange experience in modern warfare.\nOn the other hand, there is an opinion that it is absolutely not necessary to dissolve the "orchestra", external changes and a couple of substitutions are enough. Given the initiative of the AFD as a "red UN" with its peacekeepers, this decision may be extremely useful for helping friendly regimes."
 russia.705.a: "Disband the organization, let the most loyal serve in the army."
 russia.705.b: "Remake them into professional international brigades."
 russia.706.t: "Things Become Only Worse"
 russia.706.d: "Unsurprisingly, the situation after our defeat keeps getting worse. Everything we had built for the past half a decade was erased, our land carved up. The inability of our leadership to address this has led to a large chunk of our population disillusioned with our regime entirely.\n\nAlready, millions of our countrymen protest both online and in public. Before, it was a silent minority who was discontent with communism's revival. Even then, they stayed quiet either out of fear, or out of unwillingness to side with NATO over their Red countrymen. Now, they have no one to stop them.\n\nIf no one takes any drastic action to save the situation, Russia might as well collapse. Both the left and the right are starting to protest, and it is uncertain how to rein both of these groups, if it is even possible. Someone needs to step in."
 russia.706.a: "Damn."
 russia.707.t: "Kvachkov is gaining popularity"
 russia.707.d: "After the Communists came to power, Vladimir Kvachkov, known for his radical views and his involvement in the attempted assassination of Anatoly Chubais, took the unexpected step of joining the Communist Party. However, unlike his past daring actions, Kvachkov preferred not to draw unnecessary attention to himself and remained in the shadows, watching events unfold. He waited, studying the new political reality and adapting to the new conditions.\nEverything changed with the beginning of the Special Military Operation against Ukraine. This situation became a catalyst for Kvachkov, who, sensing the moment, began to actively promote his ideas. His popularity began to grow rapidly among pro-Soviet nationalists. Kvachkov, with his reputation as a firm and implacable patriot, used his position within the party to rally revanchist and nationalist elements around him, convincing them that only decisive action could restore Russia to its former glory."
 russia.707.a: "No need to worry"
 russia.708.t: "The Issue of Integration"
 russia.708.d: "The recent unification of the Union of Sovereign States into a single entity could not go without complications. So, the issue of integration of administrations is particularly acute for us now. On the one hand, we can allow local people to freely choose the leaders of their republics, thereby emphasizing the principle of sovereignty inherent in the name of the state.\nOn the other hand, if we have embarked on the path of socialism, wouldn't it be better to promote our loyal socialists by reaffirming the collectivism of our state?  In any case, the president [SOV.GetLeader] must make a choice."
 russia.708.a: "A Sovereign State has a Collective Future!"
 russia.708.b: "A Sovereign State has a Sovereign Future!"
 russia.709.t: "New Stalin Doner"
 russia.709.d: "The popularization of the left in Russia influenced many things in the country, but few could have expected the revival of the sensational Stalin Doner in the early 20s, and even fewer expected his complete commercial success. Stalin Doner surprised his visitors with the quality, but most of all their menu is remembered for becoming more extensive and with memorable names, here are examples from their menu: Stalinskaya with Double Meat, French Fries with Malenkov sauce, Cheburek In the Red Guard Style, Khrushchevskaya in Cheese Pita Bread, Brezhnevskaya on a Plate and so on.\n\nStalin Doner has already begun to compete with other Russian restaurant chains like Vkusno i tochka and Dodo Pizza, and as a PR company Stalin Doner invested in the expansion of the Kalashnikov Concern Plant, the left turn in Russia has changed a lot and, apparently, for the better!"
 russia.709.a: "Incredible"
 russia.710.t: "Malian Military Junta Ready for Extended Partnership"
 russia.710.d: "The government of the West African nation of Mali has recently been overthrown and replaced with a military junta. In a bid to secure its power and legitimacy, the junta has been on the search for foreign partners, and they are now petitioning us for support.\n\nIt goes without saying that we should back the new regime, but there is some debate as to how much we can promise our new Malian friends. Should we simply sign some economic accords, or should we commit to an overseas military presence on top of that?"
 russia.710.a: "Initiate African Corps Mission to Mali and Sign Economic Agreements."
 russia.710.b: "Sign Economic Agreements with Mali."
 russia.711.t: "Anti-French Coup In Mali"
 russia.711.d: "Parts of the Malian military have carried out an anti-government coup. After seizing power swiftly, the new junta has announced plans to withdraw from the French sphere of influence and pursue economic and political independence.\n\nWe must act promptly to take advantage of this situation and align the new anti-imperialist forces in the region with Russia."
 russia.711.a: "Africa roars."
 russia.712.t: "Ibrahim Traore Pursues Closer Ties"
 russia.712.d: "Yet another Sahel state has fallen to a military junta, with the land of upright men being the next West African domino to fall. In the bygone days of the 1980s, the motherland and Burkina Faso enjoyed a close relationship thanks to the revolutionary government of Thomas Sankara, until it was suddenly and tragically snuffed out in a French-backed coup. With the new leadership in the country, an opportunity for a new Russo-Burkianbé relationship has presented itself. What should be the extent of our support for the new government?"
 russia.712.a: "Initiate African Corps Mission to Burkina Faso and Sign Economic Agreements."
 russia.712.b: "Sign Economic Agreements with Burkina Faso." 
 russia.713.t: "New Nigerien Government Wants Our Help"
 russia.713.d: "Once again, a West African government is overthrown in a military coup, with the people of Niger waking up to the new authority of the national junta. Just like Mali and Burkina, the new Nigerien government is asking us to pledge our support, and once again, we will oblige them."
 russia.713.a: "Initiate African Corps Mission to Niger and Sign Economic Agreements."
 russia.713.b: "Sign Economic Agreements with Niger." 
 russia.714.t: "New Opportunities in Guinea"
 russia.714.d: "he tidal wave of coups which has swept the Sahel region of West Africa has now reached the shores of the Atlantic, with the Republic of Guinea having succumbed to a military revolt. However, unlike the other juntas which have been established in the region, Guinea represents a unique opportunity for our country, as they have access to warm water ports.\n\nA strategic ally such as them is priceless in this time of rapidly shifting power bases. We should waste no time in building new friendly relations with the Guinean leadership."
 russia.714.a: "Initiate African Corps Mission to Guinea and Sign Economic Agreements."
 russia.714.b: "Sign Economic Agreements with Guinea."
 russia.715.t: "Turkmenistan Agrees!"
 russia.715.d: "Turkmenistan has agreed to join the CSTO. Already, sale contracts for natural gas from the country to various Western nations have been severed, and plans are being drawn to connect the nation's reserves to Russia's. Several Western nations have protested this development, but, simply put, there is nothing they can do at this time."
 russia.715.a: "Very good!" 
 russia.716.t: "Turkmenistan stays defiant!"
 russia.716.d: "Turkmenistan has refused to join the CSTO! Citing a withdrawal from interactions with the West as fundamentally ruinous to their nation, they have categorically refused our demands. Plans are being drawn to fortify the Kazakhstani border and initiate a special military operation to secure our interests in the country."
 russia.716.a: "So be it!" 
 russia.717.t: "Uzbekistan Agrees!"
 russia.717.d: "Uzbekistan has agreed to join the CSTO. Cotton exports from the nation have been paused, and several elements within our governments have expressed interest in connecting its power grid to ours. A number of Western businesses are expected to be angered by these developments, but their home nations are expected to do little in response."
 russia.717.a: "Very nice!" 
 russia.718.t: "Uzbekistan Severs Diplomatic Ties!"
 russia.718.d: "Uzbekistan has refused to join the CSTO!  Citing Russia's alleged history of human rights abuses, they have categorically refused our demands. Already, the Kazakhstani border is being militarized, and a special military operation may be initiated at any time to secure our interests."
 russia.718.a: "Prepare the guns!" 
 russia.719.t: "Colombian Government Sign Peace Treaty With ELN!"
 russia.719.d: "TODO: following successful operation to free Colombian president from junta, he signs treaty with ELN, and unites the country against other two smaller factions"
 russia.719.a: "Great Work, Everyone!"
 russia.720.t: "Excerpts from "Thanatics, or the Struggle with Death Itself""
 russia.720.d: ""The history of humanity witnessed a number of catastrophes that have demonstrated without a shadow of a doubt the pettiness of human achievement and the triumph of the invincible Evil. Outbreaks of infectious diseases that have from time to time wiped towns and cities off the map are undoubtedly among those.\n\nHowever smart and virtuous, the people caught up in these destructive events have repeatedly come to the conclusion that it's no use trying to fight these circumstances; the best you can do is bite the bullet and cope with your losses..."\n\n"...in Thanatica, we fight for life. For the right to live. For a chance to never let death veto people.""
 russia.720.a: "Interesting Read..."
 russia.721.t: "Report on the Past Epidemic in Novaya Usman"
 russia.721.d1: "\n\n\n                  £GFX_MOR_event_texticon   \n\n\n\n\nDear Alexey Anatolyevich,\nThanks to the prompt work of the local authorities, together with the Ministry of Health, it was possible to isolate the village of Novaya Usman and place it in strict quarantine, the spread of infection was stopped, all infected people in the number of 39 were isolated and examined. The disease, which we have named "Plaga Terrae", causes the following symptoms:\nFever\nDry Skin\nShortness Of Breath\nWeakness (in some cases)\nSeizures (in some cases)\nSweating (in some cases).\n\nThe progression of the disease proceeds in an avalanche: in the early stages, Plaga Terrae rarely manifests itself, and the patient may not even know about the infection. However, the more the disease progresses, the more symptoms appear: the skin dries out and becomes inflamed, a cough appears, and the patient experiences severe pain. Death from a heart attack occurs within eight hours, but the use of medicines prolongs the patient's life up to about a day from the moment the first symptoms appear.\n\nThe strangest thing about Plaga Terrae is that we have not been able to trace the causes of its occurrence, absolutely all infected people claimed that it seemed to them that it appeared out of nowhere. The patients themselves, despite all our efforts, died, there was no way to cure them, because of this we involuntarily ask ourselves the question: are we ready for similar diseases in the future? After all, it is quite possible that this time we were just very lucky...\n\nWe will keep you informed.\nDaniil B. Dankovsky."
 russia.721.d2: "\n\n\n                  £GFX_MOR2_event_texticon   \n\n\n\n\nDear Aleksandr Gelyevich,\nThanks to the prompt work of the local authorities, together with the Ministry of Health, it was possible to isolate the village of Novaya Usman and place it in strict quarantine, the spread of infection was stopped, all infected people in the number of 33 were isolated and examined. The disease, which we have named "Plaga Terrae", causes the following symptoms:\nFever\nDry Skin\nShortness Of Breath\nWeakness (in some cases)\nSeizures (in some cases)\nSweating (in some cases).\n\nThe progression of the disease proceeds in an avalanche: in the early stages, Plaga Terrae rarely manifests itself, and the patient may not even know about the infection. However, the more the disease progresses, the more symptoms appear: the skin dries out and becomes inflamed, a cough appears, and the patient experiences severe pain. Death from a heart attack occurs within eight hours, but the use of medicines prolongs the patient's life up to about a day from the moment the first symptoms appear.\n\nThe strangest thing about Plaga Terrae is that we have not been able to trace the causes of its occurrence, absolutely all infected people claimed that it seemed to them that it appeared out of nowhere. The patients themselves, despite all our efforts, died, there was no way to cure them, because of this we involuntarily ask ourselves the question: are we ready for similar diseases in the future? After all, it is quite possible that this time we were just very lucky...\n\nWe will keep you informed.\nArtemy I. Burakh."
 russia.721.a: "What an unusual disease..."
 russia.722.t: ""Patriotin" - Battle Enhancement Serum"
 russia.722.d: "Tomsk military chemists have developed a breakthrough in the field of military supplements - "Patriotin-20", a serum that enhances the combat and physical abilities of soldiers. The effects of the serum last for at least 6 hours after a single injection.\nThe injection has been tested during secret military exercises in the far east and has shown remarkable results. Soldiers who use the serum report losing any fear and charging ahead without considering their own safety.\nHowever, scientists have also mentioned possible addiction after repeated use, along with other symptoms such as a loss of sense of self, insomnia, occasional headaches, and even the development of mild schizophrenia in the long run. That's why they suggest giving soldiers a dose of diazepam after the effects of the serum have worn off, every time after Patriotin usage.\n\nThe world is becoming more dangerous, and our current position in geopolitics makes innovations necessary. Our enemies show no mercy, and these "perfect soldiers" will make them pay for their actions. Even at the cost of sanity and humanity of our brave warriors."
 russia.722.a: "This is far too inhumane!"
 russia.722.b: "A brilliant, neccesary innovation!"
 russia.723.t: "Savior of Russia"
 russia.723.d: "Recently, in Yakutia, during the development of the "Besperspektivnaya" kimberlite pipe, a diamond of extraordinary size was found, called the "Savior of Russia", other names were also proposed for the diamond like: "Sovereign Diamond" and "United Russia"\n\nA ceremony was held in Moscow in honor of the "Savior of Russia" where the diamond was personally handed over to the president. The further fate of the diamond is unknown, we can sell the diamond and pay off some of our debt, or we can donate it to the Diamond Fund of the Russian Federation, thereby increasing the prestige of the country and the flow of tourists, the choice is yours"
 russia.723.a: "Sell it and pay off our debts"
 russia.723.b: "Let's donate it"
 russia.725.t: "Senegal Requests Cooperation"
 russia.725.d: "President Pereira has requested Russian economic and military assistance to battle French influence in the country"
 russia.725.a: "Initiate an African Corps Mission and Sign Economic Agreements."
 russia.725.b: "Sign Economic Agreements with Senegal."
 russia.726.t: "Senegal Stays Pro-French"
 russia.726.d: "Despite our efforts to help Pereira won the elections, Pro-French forces remain prevalent in the country."
 russia.726.a: "Blin..."
 russia.727.t: "Taliban Cooperation"
 russia.727.d: ""
 russia.727.a: "Yesterday's enemy, today's friend"
 russia.728.t: "Future of the People's Front"
 russia.728.d: "When Lukashenko came to power, the Popular Front began to actively support him.\nHowever, this was not enough for Alexander Grigoryevich. He understood that many in the leadership of the front may be inclined to change: if a new leader comes, they will support him.\nPersonal loyalty is important for the new president. Therefore, the first thing he decided to do was to fill the ranks of the ONF with people loyal to him. This was supposed to ensure that Lukashenko's policy would be implemented locally under the personal responsibility of the new leaders.\nBut there is also a more radical option: a complete revision of the structure and leadership of the front. According to the president, instead of a not very unified organization, a strong party should appear that meets the interests of the people. In this party, Lukashenko should become the de facto leader, although he will remain non-partisan. Although this option seems more expensive and may cause discontent among the old guard inside the presidential administration, it can be an effective way to strengthen support."
 russia.728.a: "Fill ONF Executive Committee with Lukashenko's trusted statesmen."
 russia.728.b: "Transform the front into a united party structure!"
 russia.729.t: "International Support Arrives!"
 russia.729.d: "TODO: BRICS countries give Russia support"
 russia.729.a: "Thank you all, friends!" 
 russia.730.t: "Ultimatum From Russia"
 russia.730.d: "ВНИМАНИЕ! \nМЕДВЕДЕВ НЕДАВНО ОБЪЯВИЛ О ЗАПУСКЕ КОДА "333" ПО НАСТУПЛЕНИЮ НА ХЕЛЬСИНСКИЙ ГЕЙМДЕВ ГДЕ МОЖНО РАЗДОБЫТЬ ДВЕ ШИЗОИГРЫ ПО ЦЕНЕ ОДНОЙ\nZ Работайте, братья"
 russia.730.a: "I want to live!"
 russia.730.b: "I want to die!" 
 russia.731.t: "Finland Agrees!"
 russia.731.d: ""
 russia.731.a: "Very well! Toast to our new friends!" 
 russia.732.t: "Finland Refuses!"
 russia.732.d: ""
 russia.732.a: "So be it." 
 russia.733.t: "Ultimatum From Russia!"
 russia.733.d: "ВНИМАНИЕ! \nМЕДВЕДЕВ НЕДАВНО ОБЪЯВИЛ О ЗАПУСКЕ КОДА "777" ПО НАСТУПЛЕНИЮ НА ТУРЕЦКУЮ ЗАБЕГАЛОВКУ "У ЭРДОГАНА" ГДЕ МОЖНО РАЗДОБЫТЬ ДВА КЕБАБА ПО ЦЕНЕ ОДНОГО\nZ Работайте, братья"
 russia.733.a: "ОЙОЙОЙОЙОЙ ВБЕГАЕМО ПАЦАНЫ."
 russia.733.b: "ГАНЬБА ТАК ЖИТИ НЕЛЬЗЯ." 
 russia.734.t: "Turkey Agrees!"
 russia.734.d: ""
 russia.734.a: "Ura, toast to our Friend Erdogan!"
 russia.735.t: "Turkey Rejects Our Demands!"
 russia.735.d: ""
 russia.735.a: "They know the alternative..."
 russia.736.t: "Resistance of Duma"
 russia.736.d: "A recent event has stirred up the entire Russian politics: some deputies from the so-called "reformist" wing of United Russia announced their withdrawal from the party and the restoration of the Fatherland bloc. Some experts attribute this event to the victory in the recent presidential elections of the "reactionary" clique within United Russia and the desire of this group to "subjugate" the political system established thanks to Medvedev's reforms.\nMany are confident that this move is designed to prevent United Russia from strengthening to its dominant position, as under President Putin. There are fears that, having enlisted the support of the People's and New Russia, the "Fatherland" will be able to successfully impeach the President and put a more liberal politician in his place."
 russia.736.a: "Damn it!"
 russia.737.t: "The Vorobyov Gambit"
 russia.737.d: "Today, the decision of the Federation Council on the impeachment of the President became known: Vyacheslav Volodin was dismissed from his post in connection with accusations of the State Duma of violating constitutional norms and high treason. Andrei Vorobyov, a former governor of the Moscow Region and leader of the Fatherland party, has been appointed Interim President.\nAt the same time, negotiations between United Russia and the reformists took place, in which, it seems, the Fatherland prevailed, after which the parties agreed to unite: the Fatherland in its entirety joined United Russia. The long-running confrontation between reformists and reactionaries finally ended in favor of the former."
 russia.737.a: "Volodya, you're wrong!"
 russia.738.t: "The Failure of Impeachment"
 russia.738.d: "Today, the decision of the Federation Council on the impeachment of the President became known: The Council voted against, [SOV.GetLeader] retained his post as head of state. The efforts of the Fatherland bloc, which broke away from United Russia shortly after the election victory of the reactionary candidate, proved futile.\nHaving decided to destroy the People's Russia and New Russia, United Russia Reactionaries left its opponents without support, thereby consolidating its course towards the gradual return of the order established under President Putin. The long-running confrontation between reformists and reactionaries has finally ended in favor of the latter."
 russia.738.a: "Victory!"
 russia.739.t: "Impeachment of President"
 russia.739.d: "Today, the decision of the Federation Council on the impeachment of the President became known: [SOV.GetLeader] was dismissed from his post in connection with the accusations of the State Duma of violating constitutional norms and high treason. Andrei Belousov has been appointed Interim President.\nAt the same time, negotiations between United Russia and the reformists took place, in which, it seems, the Fatherland prevailed, after which the parties agreed to unite: the Fatherland in its entirety joined United Russia. The long-running confrontation between reformists and reactionaries finally ended in favor of the former."
 russia.739.a: "Medvedev vision lives on!"
 russia.740.t: "Turkey Applies to Join BRICS"
 russia.740.d: "Since the EU was dissolved and NATO fell apart, the Turkish government realized that there was no way for them to avoid joining BRICS. In a public speech, President Erdogan declared that he had always preferred BRICS to the EU but didn't take action and join before because he feared the Western imperialists."
 russia.740.a: "Finally!" 
 russia.741.t: ""Makfa" Case"
 russia.741.d: "The first news that the Russian Prosecutor General's Office filed a lawsuit against Makfa and a number of its companies appeared in the media on March 28. They reported that the deputy Prosecutor General sent a lawsuit to the Central District Court of Chelyabinsk against the Russian joint - stock company of the same name, and at the same time to its affiliated companies. The essence of the claim was not disclosed, and Makfa declined to comment. A preliminary hearing on the case was scheduled for April 9.\n\nAt the same time, the defendants were listed on the site: a total of 34 legal entities and 13 individuals, among whom were former State Duma deputy Vadim Belousov and ex-governor of the Chelyabinsk Region Mikhail Yurevich. Subsequently, both of them, as beneficiaries of Makfa, were charged with having been engaged in business for many years, working in state authorities.\n\nFor many years, former officials, according to Kommersant, violated prohibitions and restrictions provided for by anti-corruption legislation. In the public field, neither Belousov nor Yurevich disclosed data on the ownership of companies, as follows from the case materials."
 russia.741.a: "The money now will go to the betterment of the Russian Federation."
 russia.742.t: "CPRF Criticizes Economic Policies"
 russia.742.d: "Following the collapse of the Wall Street and ensuing economic crisis, Russia, of course, suffered it too. One of main critics of our way of handling this crisis is CPRF, and its leader - Gennady Zyuganov. In recent Duma speech, and shortly after, a public rally, Zyuganov has called for nationalization of country's wealth and destruction of oligarchy, stating: "...Once again, we see a complete dysfunctional system at work... Capitalism - the main blight of mankind and Russia. For 30 years we have been trying to incorporate ourselves into this unjust system... Now we reap the "rewards"... Something similar happened in 90s, after the default... We barely pulled the country from the abyss... Shame on United Russia, shame on Central Bank for their predatory policies that preys on working people... Only socialism is the answer to all the problems, in USSR, we built biggest economy, biggest the world ever seen, with no western help, no bank loans, only economy that was driven by the people!"\n\nWith crash affecting many Russian citizens, his words resonated with more people then usual."
 russia.742.a: "It's always easier to in oppostion." 
 russia.743.t: "Zhirinovsky: "My Predictions Have Come True!""
 russia.743.d: "With economic crisis all around, just like we feared, Zhirinovsky has things to say. He took a stand in Duma's podium, and went off with fiery speech:\n"...Now you see, with crash of the Wall Street economy, that troubles in US are unavoidable... Their main capitalists collapsed! Who said this first on this very podium? We, our LDPR! But again, Zyuganov laughed, EdRo Deputies laughed... Who's laughing now? I said "Donald, don't even try! You won't save your country!". I was right again, this were the last elections in America, after it, everything will be lost... But we must not lose our focus. We still have NATO, we still have Banderite Ukraine that kills our people in Donbass!\nI would've liked for these coming years to be peaceful, but I also love telling truth. That's who I am, for more then 70 years I tell truth. These years won't be peaceful! This will be the times when Russia once again becomes a great country, and everyone will shut up and listen to our country! Or they will shut us up, and genocide russians not only in Donbass but in Western Russia proper!"\n\nThis Zhirinovsky's speech has gained a large truction online, with people once again calling him "the great predictor"."
 russia.743.a: "Stunning as always, Vladimir Volfovich."
 russia.744.t: "Zyuganoviana - A New Leniniana"
 russia.744.d: "After the official retirement of our beloved chairman, Gennady Zyuganov, it was only a matter of time before filmmakers would attempt to portray the life and struggles of this long-standing communist fighter. One of the first films released recently was "Zyuganov: Times of Trouble," which tells the story of young Zyuganov during the challenging years following the collapse of the USSR. The film portrays his heroic efforts to protect working people and re-establish the Communist Party as a beacon of hope against the prosecution and thievery associated with the Yeltsin era.The movie has immediately received numerous Soviet awards, and high praise from both - the public, and party officials.\n\nMany people think of it as the starting point, the first film about the life of the Chairman. Soon, just like with Lenin, the Soviet Union will have its own genre of movies dedicated to Gennady Zyuganov."
 russia.744.a: "A work of art!"
 russia.745.t: "Duma Reelection"
 russia.745.d: "Recently, re-elections to the State Duma took place, as a result of which a three-party system was established in parliament: United Russia, People's Russia and New Russia divided the seats equally.\nNow that, thanks to the efforts of President Davankov, New Russia has transformed from a union that miraculously won its seats in the Duma into a third force to be reckoned with, it will be much more difficult for the other two parties to resist liberal initiatives. The torch of Sovereign Freedom will burn for a long time, and the New Russia is carrying it."
 russia.745.a: "Victory!"
 russia.746.t: "Government Minority in the Duma"
 russia.746.d: "New Russia is a party that exists in spite of. An association of state liberals, it appeared against the will of Medvedev, who dreamed of a Russian bipartisanship. She won the presidential election contrary to all forecasts, beating both the People's Party and United Russia.\nHowever, due to such rapid and unexpected success, New Russia did not manage to become the third force in the Duma. And therefore, there is always a threat that all the reforms that Davankov is carrying out may at any moment be canceled by the combined force of the Narodniks and United Russia ...\n\nThe need to fix this."
 russia.746.a: "We need a majority!"
 russia.747.t: "The Question of the Second Party"
 russia.747.d: "Since the democracy we're constructing in the Empire is based on the principles of a theoretical democratic monarchy, the most stable model of such a system would be a two-party system.\nHowever, the question still remains: which party should be chosen as a rival to the Octobrists?"
 russia.747.a: "Moderate left politics are necessary in this day and age..."
 #russia.747.b: "CDP was once a legendary party of the Russian Empire. Lets restore its status!"
 russia.747.c: "A more modern conservativism on contrary to Octoberists regressivism would do just fine."
 #russia.747.d: "All politics are just twigs of western decadence. The Tsar will protect the people from these politicians!"
 russia.748.t: "Nobles Organize A Gala"
 russia.748.d: "Our noblemen recently attended a magnificent gala event. They enjoyed a delightful tea party, savoring traditional Russian pastries. In the opulent ballroom, beautiful women graced the dance floor with their partners, while the sounds of Russian classical music filled the air.\n\nThe event was widely reported in the news, capturing the imagination of many people who were fascinated by the lifestyle of the nobility. They were overjoyed to see such magnificent events making a comeback in Russia."
 russia.748.a: "Superb!"
 russia.749.t: "Monarchists Rally For Tsar"
 russia.749.d: "In one of our big cities, loyal subjects organized a massive rally for the well-being and health of the Tsar and his family. Many flags and portraits of previous Tsars were seen. Truly marvelous."
 russia.749.a: "Thank you for your loyalty."
 russia.750.t: "Party of the Russian Cause"
 russia.750.d: "Since the restoration of the monarchy, many politicians have been discussing the future of partisan politics in Russia. Some argue that we should abolish any party organization. while others, including Baburin, believe that an all-encompassing political organization is necessary in these modern times. This would allow Russian citizens to interact with the Tsar's representatives on a more fundamental level, without compromising the sovereign's power and authority."
 russia.750.a: "Russians need a tsarist party that listens to them and delivers the message of the tsar!"
 russia.750.b: "All politics are just twigs of western decadence. The Tsar will protect the people from these politicians!" 
 russia.751.t: "First Duma Elections"
 russia.751.d: "It is time for elections, a time when the people can speak out. Three major parties are competing for seats in the Duma.\nThe October 17 Union, they are the Octobrists, named their party after the Manifesto signed by Nicholas II on October 17, 1905. They are the ideological heirs of the old Octobrists, who ceased to exist after the February revolution of 1917. Under the leadership of Konstantin Zatulin, the party advocates cooperation with imperial companies, the development of Russian culture and the consolidation of society.\n"Sovereignty and Democracy" - moderate conservatives under the leadership of Anton Bakov. They declare the need to expand support for vulnerable segments of the population, increase government subsidies to businesses and deepen cooperation with the church.\nThe Justice Party is an undesirable leftist party led by Alexander Burkov. They advocate increased support for workers, further democratization, and a "peaceful acceptance of Russian history." Although we do not favor leftist parties, we cannot deprive our subjects of their democratic freedom of choice.\n\nThe parties' struggle for the votes of the people continues as a result..."
 russia.751.a: "Union of 17 October secures a majority in Duma!"
 russia.751.c: "PPR has earned favor of the people, and now they preside Duma's majority."
 russia.751.h: "Leftists were, somehow, able to win."
 russia.752.t: "Economic Cooperation with Russia"
 russia.752.d: ""
 russia.752.a: "Friendship and Cooperation"
 russia.753.t: "History Reconciliation Center"
 russia.753.d: "After Davankov announced the Doctrine of "Reconciliation of History", a monument to Nicholas II was erected in Yekaterinburg opposite the Lenin monument, and the school curriculum underwent changes for the sake of reconciliation of history, which caused school history books to be rewritten, but the main peak of this doctrine was construction the "Center for Reconciliation of History", at the opening of which Davankov himself was present.\n\nThe center itself is a museum of the history of Russia, which tries to combine completely different opinions and epochs into a single historical path of the country. The expositions show historical epochs of different times, trying to explain the political context from the point of view of the actors at that time, explaining the reasons that prompted them to do as they did, at the very end of the expositions everything adds up to a giant picture of the history of Russia."
 russia.753.a: "And who should I trust?"
 russia.754.t: "The End of the Reactionaries"
 russia.754.d: "Recently, a wave of resignations of officials and ministers belonging to the so-called "reactionary" United Russia faction took place in the government. Having lost supreme power after the impeachment of their candidate, the reactionaries began to break up into separate cliques formed around former members of the Kremlin Towers.\nThe group of neo-siloviki remains the most relevant of them. Rallying around Alexei Dyumin, the former governor of the Tula Region, who was once considered one of Putin's possible successors, they advocate a tough course in governing the country. Fortunately, the reactionary groups are too scattered and small in number for any serious opposition to our reforms."
 russia.754.a: "Freedom was secured."
 russia.755.t: "His Last Letter"
 russia.755.d: "Dmitry Anatolyevich,\nOnce again, you have been entrusted with the presidency. This time, unfortunately, you will have to lead alone.\nYou, my protégé and trusted friend. Our calculations were correct. The world is on the brink of a new era, with the geopolitical landscape shifting in a way that is both destructive and terrifying. Every day, we see the unrestrained consequences of these changes. The world is a wasteland of past failures, but you must rise to the challenge and take the helm of our motherland, fearlessly.\n\nWith this letter, you will also receive a small box containing my Presidential pin, the very first one. It is now yours. You were bold once, be bold again. Protect Russia from political turmoil, fix your gaze on the main goal, and confront the collapsing unipolarity with determination.\n\nGood luck and farewell.\n\nSigned:""
 russia.755.a: ""...Vladimir Vladimirovich Putin""
 russia.756.t: "Russian Resource Rights Ended"
 russia.756.d: ""
 russia.756.a: "Cool"
 russia.757.t: "Russian Resource Rights"
 russia.757.d: ""
 russia.757.a: "Cool"
 russia.758.t: "Economic Open Doors With Russia!"
 russia.758.d: ""
 russia.758.a: "Russian and Chinese Are Brothers Forever"
 russia.759.t: "Invitation to CSTO"
 russia.759.d: ""
 russia.759.a: "БРАТВА РВЁТСЯ К ВЛАСТИ!!!!"
 russia.759.b: "БРАТ..... НАДО ТИШИНУ ПОЙМАТЬ...."
 russia.760.t: "Serbia Accepts"
 russia.760.d: ""
 russia.760.a: "Serbian-Russian brotherhood forever"
 russia.761.t: "Serbia Refuses"
 russia.761.d: ""
 russia.761.a: "Damn..."
 russia.762.t: "Slutsky Declares "New National Thinking""
 russia.762.d: "Weeks after the passing of our beloved leader, Vladimir Zhirinovsky, his successor, Leonid Slutsky, took the podium in the Russian Senate. He declared the need to revise national policies and move towards "modern thinking."\n\nSlutsky said: "I'm not trying to say that the government of our beloved founder was bad... It was amazing, we won the war together, under him! But the time has come to understand that practices that would have been suitable for Vladimir Volfovich's government... are not appropriate for continuing his legacy. I think... Vladimir Volfovich would have supported and encouraged such efforts if he were alive. He personally entrusted me with his position, so I know what I'm talking about."\n\nAfter Slutsky finished his speech, the senate voted in favor of a series of reforms proposed by him. However, some noted that people who would have opposed his ideas were absent from today's session. His supporters have criticized them as just opponents who are being "lazy.""
 russia.762.a: "It is what it is." 
 russia.763.t: "All-Russian Elections"
 russia.763.d: "Slutsky's "thaw" has come to an end, and after months of liberalization, elections are now held with many new parties and candidates running. However, people think that only a few candidates can be considered serious contenders.\nSlutsky himself has said that he has no intention of running for president. Instead, a new candidate has been selected - Andrey Svintsov. Many people think that Svintsov could be easily influenced by the Supreme Council of the LDPR, which is led by Slutsky. Therefore, Slutsky might still maintain control behind the scenes and is likely to be appointed to the position of prime minister.\n\nOther candidates include Roman Yuneman, a young and democratic-minded candidate from the "Society.Future" party. He runs on a platform of building a true Russian parliamentary system.\n\nDmitry Rogozin is another candidate worth mentioning. He is a maverick with a positive outlook on the Soviet period. His left-wing views are combined with right-wing social positions. He is running for the "Rodina" party, a long-time minor player in Russian politics that has finally been given a chance to rule."
 russia.763.a: "Yuneman!"
 russia.763.b: "Svintsov!"
 russia.763.c: "Girkin!"
 russia.763.f: "Rogozin!"
 russia.763.z: "Pushilin!"
 russia.763.k: "Shevchenko?!"
 russia.764.t: "Checkmate!"
 russia.764.d: "Leonid Slutsky is not the most intelligent person, but that speaks more about his opponents, who were outplayed by him. Those who tried to outwit him and suggested that he is not a true and honest successor to Vladimir Zhirinovsky, when they themselves have a limited and distorted understanding of his politics, showed a lack of sophistication. It is clear that they did not expect such strategic thinking from Slutsky.\nNow, Slutsky is leading a new Russia that was built and revitalized by Vladimir Volfovich. Some things were new, some were borrowed. It was clear that people would not accept an iron rule from anyone who comes after Zhirinovsky because they know that no one will be like Zhirinovsky. Therefore, a change was necessary.\n\nOf course, the LDPR will remain in power and its rules and laws cannot be changed. However, it is no longer an autocratic regime but a guiding force for the Russian people."
 russia.764.a: "We live in society." 
 russia.765.t: "Our Motherland In Danger!"
 russia.765.d: "The communist threat from the west has finally shown its true colors, directly attacking us and our allies. These evil forces seek to spread their ideology worldwide. But the neo-Bolsheviks will see our strength, and we will defeat them.\n\nWe will crush them, and Europe will be free from the influence of these communist devils."
 russia.765.a: "Za Rodinu!"
 russia.766.t: "In My Town..."
 russia.766.d: "There's a war in my town,\nNo one gives a damn about it.\nWhile hundreds of people and soldiers are dying\nWhile Moscow's actors drink and dance...\n\nThere's no children's laughter in my city,\nThe siren sounds every day,\nIt sings an infernal song\nTaking new victims from the mortality of life...\n\nMy town's been empty for a long time\nNo hope, no love, nothing.\nOnly in the sky\nThe lonely howl of the anti-air defense...\n\nIn my city sadness and sorrow\nResting on mourning laurels.\nEverything that was now, is now postponed for later.\nAnd multiplied in bloody wounds...\n\nOnly my city stands as before\nExhausted, just tired\nBut we still believe in it\nAnd we chant..."
 russia.766.a: ""VICTORY IS OURS!""
 russia.767.t: "New Conflict in Asia"
 russia.767.d: "After the Taiwan War, the situation in Asia is heating up again. A new conflict could engulf the entire region: Japan, allied with the Pacific Defense Treaty Organization, against China and its East Asia Defense Initiative. This battle could change the balance of power in the world. Now is the time for us to make a choice."
 russia.767.a: "Let's Support China!"
 russia.767.b: "Let's Remain Neutral"
 russia.767.c: "Let's Support Japan!"
 russia.768.t: "Support from Moscow"
 russia.768.d: "The Soviet Union decided to support and provided assistance!"
 russia.768.a: "Cool!"
 russia.769.t: "New Old Socialism"
 russia.769.d: "In an old Moscow cafe sat two friends, old acquaintances from long ago. One of them, Maxim Cherepanov, was a big businessman who had recently lost his business, which had been sold to the state under the new laws for next to nothing. He sighed heavily and, shaking his head, turned to his comrade, Anton Ivanov, a simple worker, who has devoted his entire life to labor and faithful to the old ideals of Leninism: \n- You know, for 10 years I built my company from scratch, I am not an oligarch, I did not steal anything, I put my soul into it, and now - taken away. For pennies. How can you do that? What's our hurry? Why move so fast? Socialism can't be built overnight! The country is simply not ready. We need to do everything gradually, not to break everything over our knees. His friend, who was notable for his support of the new government, leaned back in his chair and grinned. \n- You weren't cleaned out, you weren't thrown out on the street. You stayed on as director of your own company. Is that so bad? Yes, for pennies, but your life didn't fall apart. And the country needs more, after all these years of degradation. We've lost too much time, and now we need to develop quickly. To repeat the success that we had in the previous socialist era. And this requires decisive action! Understand, these are the demands of the time...\n- Maybe you're right.... - The entrepreneur mumbled reluctantly, but his eyes still showed doubt."
 russia.769.a: "We need the leap of progress..."
 russia.770.t: "Ukraine-Russia Talks"
 russia.770.d: "Despite our best efforts during the war, we had to negotiate with the new Ukrainian government that took power after the previous regime was removed. The government of Boyko is more friendly towards Russia and the Russian-speaking population, but we had to temporarily abandon our more radical proposals such as Ukraine joining the CSTO (Collective Security Treaty Organization), or more territorial annexations.\n\nHowever, After the new Ukraine-Russia talks in Odessa, the Boyko government agreed to sign a military alliance in exchange for significant funding and investment in Ukraine's post-war economic reconstruction. This also includes the construction of a zoo in Kiev, and aquapark in Odessa."
 russia.770.a: "And again it's spring in Arcadia, and it's crowded on the Maidan..."
 russia.771.t: "Vladimir Putin and the Void"
 russia.771.d: "- Vovka! - Boris Nikolayevich's voice called from behind the door - where are you?\n\n- Nowhere! - He mumbled in reply.\n\n- Ha! - Yeltsin suddenly shouted, - Well done! Tomorrow I'll announce my gratitude to the whole country. You understand everything! So why have you been playing dumb all night?\n\n- What does that mean?\n\n- Think about it. What do you see in front of you right now?\n\n- A pillow, - he said, - but not that clearly. And don't tell me again that it's in my mind.\n\n- Everything we see is in our minds. So you can't say that our consciousness is somewhere. We are nowhere simply because there is no place that we can say that we are there. That's why we're nowhere.\n\n- Boris Nikolayevich, - He said, - I'd better be alone.\n\n- Suit yourself. I want you to be as fit as a fiddle tomorrow. Noon promotion, you know."
 russia.771.a: "where am I in this flow?"
 russia.772.t: "Soviet Business"
 russia.772.d: "He was a successful businessman, owner of a chain of shopping centers, a casino, and one of the council members of the Special Economic Zone in Novorossiysk. That day, strolling through one of his properties, he stopped like a stump.\nIn front of him, in the shadow of his shiny business realm, stood a trailer, from which came an appetizing odor. An Azerbaijani man in a greasy apron was working at the window, handing shawarma to satisfied workers and passersby. The businessman thought it was an insult to his greatness.\nHe approached the cook with a combative attitude and began to put forward:\nWhat are you doing here? Who gave you the right to bake your poison here?!\nThe poor guy tried to calm down the ardent capitalist, but to no avail, and an altercation ensued. Fortunately, it lasted only a minute, when the businessman saw the documents for authorization of business activity in the FEZ.\nIf it weren't for Soviet laws, I would have bulldozed your eatery a long time ago! It was much easier in the nineties!\nBrother, are you so angry because you're hungry? I'll make it for you for free!\nGive me a break!"
 russia.772.a: "...the belly rumbled treacherously."
 russia.773.t: "Class Struggle"
 russia.773.d: "A scandal that threatened to turn into a disaster occurred at a machine-building plant in the Volga region. The corporate trade union created for the workers turned out to be empty: complaints went unanswered, so the labor collective decided to create its own, independent trade union. Driven to despair, people gathered for a spontaneous rally right in the production shop. Engineers, welders, accountants and workers from all departments united under red flags and banners with the inscriptions "What did we fight for?" and "Factories to workers!". The owner of the plant, frightened by the threat of the state order failure, came down to the shop to pacify the discontented. He loudly demanded: "We have a corporate labor union! All complaints there! You're blowing deadlines! Immediately return to your seats! A voice from the crowd interrupted him: \n- Yes, except for gifts for the holidays, your union is not good for anything! How long can you keep feeding us breakfast? We've already created our own! You have no right to do that! - yelled the owner, blushing with anger. - I'll call the police! Go ahead and try! - At that moment, the police burst into the shop, instantly surrounding the conflicting people and..."
 russia.773.a: "...everyone got put to the ground."
 russia.773.b: "...the director got arrested."
 russia.774.t: "Join a Union!"
 russia.774.d: "The Ministry of Internal Affairs intervened in the labor conflict to avoid the threat of disruption of production at a strategically important plant. The company's management was replaced, and the corporate union was replaced by a state union. The first months after the changes gave the workers hope: issues were resolved promptly, grievances were addressed, and people felt heard.\n\n\nOn the other hand, the situation changed over time. The new union, burdened by bureaucracy, began to get bogged down in graft and corruption. Only "their own" or those who could offer a "small token of appreciation" received help. Attempts to express dissatisfaction or ask questions were seen as undermining state discipline, with corresponding consequences. But despite this, the stability of the union ensured the protection of workers from the most blatant violations: wages arrived on time, working conditions remained at the same level. The plant fulfilled its obligations, and the fear of sudden layoffs, as it was in the past, no longer existed.\n\n\n\nOn one of the slabs, welders, sitting on a break, discussed what had happened:\n- They say: "We have more important tasks". What tasks? Are they really Communists? - One of them grumbled, wiping soot off his face. Maybe they just forgot why they came here. They defeated the enemies and gave up on us," said the other, looking down at the shop."
 russia.774.a: "We won?"
 russia.775.t: "Join a Union!"
 russia.775.d: "The authorities decided to make concessions to the workers by changing the management of the plant and allowing the establishment of an independent trade union, which gained control over the processes at the plant. Formally, the plant remained in the ownership of the former owner, but in fact the management was transferred into the hands of the workers. At first, this approach proved to be the best: problems were solved collectively, and working conditions began to improve significantly. \n\nHowever, over time the union began to strengthen intriguers and careerists, who ousted initiative and talented workers. This led to the gradual degradation of the organization. Dissatisfied employees either faced collective pressure or were forced to leave the plant. Strikes were used more as a lever of pressure on the management, and real issues were left unattended.\n\nThe situation became so secretive and tense that even counterintelligence did not pay due attention to it, considering it an internal difficulty. One of the young KGB officers, trying to take the initiative, came across alarming messages in the work Telegram-channel:\n- Dim, look, there's some plant channel. They say it's a total outrage. Shall we dig? - Pash, come on, it's nothing. There were no inquiries, no complaints either. Most likely, it's just another propaganda from abroad. We don't have time to investigate such trivial matters."
 russia.775.a: "We won?"
 russia.776.t: "Eurasia Offers Us Economic Partnership!"
 russia.776.d: ""
 russia.776.a: "Sounds like a good idea."
 russia.777.t: "The Surge of Terrorism"
 russia.777.d: "Nationalist groups have become active in Ukraine, Baltic and Poland. They advocate the destruction of the reconstituted Russian Empire and the restoration of chauvinistic regimes in Eastern Europe. They have already started sabotaging and killing people who are loyal to us. We have to do something about it!"
 russia.777.a: "Declare the position of the Counter-Terrorist Operation!"
 russia.778.t: "Muslim Insurgency"
 russia.778.d: "Following the terrorists in the east, the Islamists in the south are launching numerous uprisings, seizing major transportation hubs and entire population centers.\nMost likely, the scenario of recent years with the invasion of the Caucasus and southern Central Asia will be repeated again. We must do something."
 russia.778.a: "Get the tanks ready!"
 russia.779.t: "The Moscow Raid"
 russia.779.d: "Today many Moscow locals were awoken at dawn by the sounds of heavy vehicles moving through the streets, doors getting knocked down and sometimes even shots being fired. Later the government has announced the 'successful conclusion of an operation to arrest various dangerous traitorous elements in Moscow', stating that around 2500 suspects have been captured. The international media has noticed that the current location of many prominent businessmen, scientists and politicians is currently unknown. One thing can be said for certain: traitors no longer threaten the Empire."
 russia.779.a: "This was as easy as turning over one's hand."
 russia.780.t: "Polish Question"
 russia.780.d: ""
 russia.780.a: "Include them directly into the Empire!"
 russia.780.b: "Just increase control over current government and crush the separatists."
 russia.780.c: "Poles have always been a freedom-loving people, we will be lenient with them."
 russia.781.t: "His Cause Lives On"
 russia.781.d: "The great leader Vladimir Volfovich Zhirinovsky, an unwavering defender of Russia.  His life, full of bright accomplishments and indestructible will, has become a legend.  Russia, which he raised to new heights of power and prosperity, mourns his passing, but its heart beats in unison with his testament.\n\nHis name is forever inscribed in the annals of history in golden letters.  He, an unwavering fighter, broke the chains of the globalist conspiracy, restored Russia to its former greatness and strengthened its position on the world stage.  His courage, his insight, his indomitable energy inspired millions.  He is gone, but his work lives on!  His ideas, his strategy, his unwavering faith in Russia - all this continues to live on in the hearts of millions of loyal LDPR followers.\n\nThe LDPR Party, faithful to the testament of its leader, will continue his course for the prosperity of Russia.  We, the followers of his great path, will work tirelessly for the good of our Motherland, strengthening its power and protecting its interests.  The memory of Vladimir Volfovich Zhirinovsky is a sacred fire that will burn forever in our hearts.  His name is a symbol of strength, courage and love for Russia.\n\nLong live Russia!  Long live the eternal memory of Vladimir Volfovich Zhirinovsky!"
 russia.781.a: "His cause is immortal."
 russia.782.t: "The Hunt"
 russia.782.d: "The sun rose over the morning sky of eastern Poland, illuminating a picturesque scene. There were a few clouds, the wind was mild, and the day surprisingly warm. But a formation of five jets thundered through it, crashing the peace.\n\nLieutenant Petrov and his squadron of SU-35s cruised high over the skies of eastern Poland, alert, watchful, and eager for a fight. They were on the hunt.\n\nThe airspace over NATO's "Eastern Flank" nations had turned into one large gladiatorial arena. The sky was filled with the roar of jets and the rumble of guns and missiles. Battles raged, machines clashed, men died, and glory was seized.\n\nBut Petrov and his comrades were no strangers to all this. Day in and day out they were here, fighting, jousting even, with the enemy. It was a tough and beyond dangerous game, but by now he had plenty to show. 5 Romanian F-16s, 3 Ukrainian MiG-29s, and a German Eurofighter Typhoon downed. But he wasn't here for more kills like those. He didn't care about those previous wins, not even anything else here. He obsessed and focused on his prey.\n\nThe Brits, America's closest lapdog in Europe, had their aviation active over Poland. Unlike their eastern European puppets, they were special. They had those dreaded fifth-gen fighters, the American F-35, and Petrov's squadron had been feeling it. He had lost some comrades dear to him to these damn jets, and he wanted to make these cocky Anglos pay.\n\nAnd so, he and his squadron cruised through the skies, searching. The enthusiasm disappeared, fear and tension now hung in their cockpits, mixed with the craving for vengeance. Petrov kept dwelling on one thought. They were here, he just knew it. They should be close, very-\n\nBut then Petrov snapped down to his displays, lights flashing, noises blaring. Terror exploded within him. His radar warning receiver screamed that he was getting locked on."
 russia.782.a: "Here we go."
 russia.783.t: "The Kill"
 russia.783.d: "The squadron's radio erupted into frenzied chaos as Petrov jerked his stick left and dumped flares, his fighter swerving to defend the incoming missiles. The rest of the Sukhois did the same, banking and diving in all sorts of directions. The aviators frantically scanned the sky around them to look for the ambushing aircraft.\n\nHis comrades yelled range and target data on the radio, but Petrov couldn't say anything. His heart was racing, hands shaking, and fear devouring him. He was frozen in the moment, scared but focused. His eyes and head were all over the place, searching for his attackers. He had a few moments, no, mere seconds to act. He scanned and scanned but then-\n\n"There! Below us!" the radio crackled.\n\nStill defending, he banked his jet and saw a formation of three British F-35s zoom by, missiles loose and bolting to go after a couple of his comrades. He was right. They're here.\n\nBut now he tried to focus harder, brute forcing the fear to the bottom of wherever he could shove it in his mind. Act, don't dwell. Do or die. He quickly looked for an opportunity and found it.\n\nThe rear F-35 was busy, chasing one of his comrades and he was close behind. His eyes widened. Now was his chance. Petrov then jerked his aircraft and pressed the throttle.\n\nHe closed the distance, the 7 seconds to target going by in a heartbeat. In the next second, he would make aviation history. Like muscle memory, he lined up his plane, aimed, and fired.\n\nWithin two seconds the long burst from his rotary barreled autocannon turned the sleek and expensive poster child of America's military industrial complex into a spinning ball of fire and twisted metal.\n\nPetrov let go of the trigger and took a quick but deep breath. The fear vanished and his pride swelled to a wonderful height as the battle continued to rage. He then smiled and radioed his comrades, chuckling."
 russia.783.a: ""Minus one! Fifth generation my ass!""
 russia.784.t: "Pray to God - Victory is From Him"
 russia.784.d: "As Alexander Vasilyevich Suvorov, the most famous Russian commander, said: "Miracle heroes, peace, support, glory of the Fatherland - God is with us. Pray to God, victory is from Him. God is our general, He leads us."\n\nHoly Mother of God, save us. To the Holy Father Nicholas, pray to God for us. Without this prayer, do not draw weapons, do not kill guns, do not start anything. To begin every business with the blessing of God.\nStrengthen the spirit in the fatherly, Orthodox faith. To teach a faithless army is like sharpening burnt-out iron. As a tree without a root, it is reverence for the power of the earth without reverence for the power of God. Honor the sky, and then the earth.\n\nGod have mercy, we are Russians!\nLet us restore faith in the Merciful God as before."
 russia.784.a: "God bless Russia!"
 russia.785.t: "The Russian State of the New Era"
 russia.785.d: "Russia proudly hosted a ceremonial conference to announce the imminent completion of the country's long-term economic and social development goals by 2035. The event, attended by top officials and international delegates, including our leader [SOV.GetLeader] and the then UN Secretary General, demonstrated Russia's remarkable progress. Despite harsh sanctions, multiple crises after the European War and, of course, the death of Great Leader Vladimir Zhirinovsky, Russia has continued to grow and develop. So much has been accomplished in recent years.\n\nThis series of successes sets the stage for the next stage of Russia's development. With ambitions to become a hegemon across Europe, a leader in military and civilian industry and a true country for the people, the country is on its way to realizing its vision of becoming a world leader by 2046, the 100th anniversary of Vladimir Zhirinovsky's birth."
 russia.785.a: "Great dreams can only be realized through great effort."
 russia.786.t: "Yuneman's Era"
 russia.786.d: "Russia, arise! Before us stands a figure like the legendary Peter the Great - Roman Alexandrovich Yuneman!  His reign will be marked not just by reforms, but by a real revolution that will bring Russia to a new level of power and prosperity!\n\nForget about stagnation and inefficiency! His reforms, like the blows of a blacksmith's hammer, will forge from Russia a true world giant, capable of challenging any enemy!\n\nBut Yuneman is not just an effective manager. He is an inspirer, a leader who managed to unite the people under the banner of a common goal.  His charisma and determination inspired millions, turning them into a single fist, ready to defend the interests of the homeland.  He is not afraid of difficulties, bravely making decisions that others would consider impossible.\n\nThe comparison with Peter the Great is not accidental. As Peter dreamed of a great and modern Russia, so Roman Alexandrovich wants to make Russia even more majestic than it has ever been.  But if Peter the Great opened a window to Europe, then Yunemann will open the doors to Russia's future, a future full of splendor, prosperity, and unprecedented power!\n\nSoon the whole world will witness the triumph!  Feel the pride in the pride of Russia and our leader, whose name will forever go down in history as the name of the man who truly revitalized the Empire!"
 russia.786.a: "This is my leader! This is our leader!"
 russia.787.t: "The Good Old Russia"
 russia.787.d: "The great victory over the Western globalists has brought peace and stability to Russia, but the shadow of a new threat looms over the horizon. Neo-Bolshevism is raising its head in Europe, posing a danger to traditional values and Russian sovereignty. This calls for vigilance and decisive action.\n\nHowever, the people, inspired by the wise rule of our great Tsar, [SOV.GetLeader], are determined to meet new challenges. Moral uplift of people, which occurred after the restoration of the monarchy, rolls the Russian people into the future, crushing on the way all the hardships and threats.\n\nRussia, revived after many decades of Bolshevism, stands guard over its interests, ready to protect its achievements and future. The traitors of the past have been forgotten, their legacy has been destroyed and will never again seduce the minds of our people. All opponents of Our Russia will be destroyed just as all the dirt left behind by the Bolsheviks was destroyed.\n\nThis is the Russia we brought back, and it is stronger than ever before!"
 russia.787.a: "The crunch of the French bread has never been louder! We are not afraid of troubles."
 russia.788.t: "Another Smuta"
 russia.788.d: "In the past, Moscow's Sadovoye Koltso was a constant sea of traffic. Today, even in the dead of night, the streets remain alive with noise. But it's not the roar of engines - it's the sound of protests overturning cars, hurling Molotov cocktails that shatter windows, and chanting anti-government slogans. The orange glow of fires now nearly outshines the city's neon lights.\n\nAt the heart of Moscow, inside the Grand Kremlin Palace, sits an office decorated with walnut wood. General Shoigu, second-in-command of Medvedev's government, pulled back the curtains and gazed anxiously at the distant flames. "What should we do now?" he muttered.\n\n"Clearly, you need to bring our president back," a voice came from behind him.\nShoigu turned to find Belousov sitting calmly on a sofa in the corner. Despite his composed appearance, Belousov's left index finger was nervously tapping on the coffee table.\n\n"I don't even know if our president is still alive," Shoigu replied, his voice heavy with despair. He returned to his desk. "I've sent people to his apartment, both of his private villas, and even his club. He's vanished, like Stalin in 1941."\n"The only difference is that Stalin eventually won," Belousov remarked darkly. "This time, it's after a defeat."\n\nThe dark humor didn't ease the tension. Belousov shook his head and quietly left the room. As the office returned to silence, Shoigu picked up his Russian Hero medal from his desk. He scrutinized it closely, then clenched it tightly in his hand, murmuring:"
 russia.788.a: ""Are we really just going to wait for death?""
 russia.789.t: "Re-establishment of the Table of Ranks"
 russia.789.d: "The Emperor, striving to strengthen the revived Russian Empire and to create a just system of service to the Fatherland, ordered the restoration of the historically merited Table of Ranks.\n\nThis ancient table, updated in accordance with the needs of modern times, opens the way for all loyal subjects, regardless of their origin, to service and promotion.\n\nThe new Table of Ranks, based on merit and ability rather than descent, provides a transparent hierarchy, encouraging professional growth and providing opportunities for career development in the state apparatus, the army and other spheres of life in the Empire.  Every citizen who has shown himself in labor and devotion to Russia will be able to achieve high ranks and honors, creating a prosperous and strong Empire.\n\nLong live the Tsar! Long live Russia!"
 russia.789.a: "Whoa! Now I can become a nobleman!"
 russia.790.t: "New Year's Advertising Masterpiece"
 russia.790.d: "On New Year's Eve, before the traditional address by Russia's leader, now His Imperial Majesty, the country's TV channels showed a VTB advertisement. The unusual animation depicting prominent Russian writers such as Alexander Pushkin, Fyodor Dostoevsky, Leo Tolstoy, as well as great Russian emperors, including Nicholas II, Alexander II and Peter the Great, caused an incredible public outcry.\n\nThe historical figures drove a sleigh through the Russian village, played snowballs, went sledding down a hill, and at the end, together with all the villagers celebrated the New Year, looking at the festive Christmas tree and bright fireworks. The whole video was accompanied by the overture of "Ruslan and Lyudmila" by Mikhail Glinka, and the narrator read out Pushkin's patriotic poem "To the Slanderers of Russia", which gave the video a message that the enemies should be afraid of Russia, and in case of war we can stand up for ourselves!\n\nThe video went viral, inspiring many citizens and studios to create their own animated works dedicated to the figures of the Tsarist era. Positive feedback and the growth of patriotic sentiment significantly strengthened the support and popularity of the monarchy.\n\nIn turn, representatives of VTB Bank announced a significant increase in profits and launched a new charitable program aimed at supporting young animators."
 russia.790.a: "The Russian land is rich in talents!"
 russia.791.t: "Tsar's Dream"
 russia.791.d: "The moon has risen over imperial Moscow. Officials are sleeping, office clerks are sleeping, workers are sleeping. He fell asleep in his chambers and [SOV.GetLeader] after a hard day's work. Meetings, receptions, papers - the seemingly endless cycle has finally ended.Tsar of All Russia found himself in a beautiful summer park, sitting in a gazebo by the lake. It was a beautiful sunny day, and it felt as calm and good as it only happens in dreams. A calm, refreshing breeze was blowing off the water.\nOther, [SOV.GetLeader] heard footsteps behind him. Someone came into the gazebo.\n- "May I?"  A man's voice sounded behind the King. He turned around.\n\n He appeared before his eyes. By the grace of God, Nicholas II, Emperor and Autocrat of Russia. The one who was considered the last sovereign in Russian history. The one whom the traitors of the Russian people called the "Rag Tsar," "Nicholas the Bloody." Nikolai was dressed in his military uniform, which he used to join the army during the Great War. [SOV.GetLeader] replied in a frenzy:\n- "Of course, have a seat."\n\n Sitting in silence and enjoying the amazing view of the water surface, the ancestor asked the descendant:\n- "How is my Russia?\n- "We have avenged you. Russia is now more powerful and great than ever before.We have defeated external and internal enemies, and restored the Autocracy."\n"Well, thank God." Nikolai replied. - "You've learned from my mistakes. I am glad that my reign was not in vain. I will pray and hope for the happiness of the Empire and your success. Rule harshly, but fairly. Glory to Russia!""
 russia.791.a: "He woke up with a smile on his face."
 russia.792.t: "Tsar's Dream"
 russia.792.d: "The moon has risen over imperial Moscow. Officials are sleeping, office clerks are sleeping, workers are sleeping. He fell asleep in his chambers and [SOV.GetLeader] after a hard day's work. Meetings, receptions, papers - the seemingly endless cycle has finally ended.Tsar of All Russia found himself in a beautiful summer park, sitting in a gazebo by the lake. It was a beautiful sunny day, and it felt as calm and good as it only happens in dreams. A calm, refreshing breeze was blowing off the water.\nOther, [SOV.GetLeader] heard footsteps behind him. Someone came into the gazebo.\n- "May I?"  A man's voice sounded behind the King. He turned around.\n\n He appeared before his eyes. By the grace of God, Nicholas II, Emperor and Autocrat of Russia. The one who was considered the last sovereign in Russian history. The one whom the traitors of the Russian people called the "Rag Tsar," "Nicholas the Bloody." Nikolai was dressed in his military uniform, which he used to join the army during the Great War. [SOV.GetLeader] replied in a frenzy:\n- "Of course, have a seat."\n\n Sitting in silence and enjoying the amazing view of the water surface, the ancestor asked the descendant:\n- "How is my Russia?\n- "We have avenged you. Russia is now more powerful and great than ever before. We have defeated external and internal enemies, and restored the Manifesto." Nikolai took a deep breath."I hope that you have been able to learn from my life. Do not forget: it was the Duma and freethinking that brought Russia to the deplorable state in which I left it. I will pray and hope for the happiness of the Empire and your success. Be fair and careful. Glory to Russia!""
 russia.792.a: "He woke up with a deeply thoughtful face."
 russia.793.t: "The Ghost of Taiga"
 russia.793.d: "The taiga has always been a mysterious creature that lives by its own special laws. There are many omens that can tell you with great probability whether the taiga will stay in silent calm all day long, or will start to worry about something, murmur, or even become angry.\n\nBut for days now, the whole taiga has been angry. Big storms and snowstorms are rising, and there is almost no visibility in the forest. None of the meteorologists can explain what is happening, all the meteorological equipment goes crazy trying to check what is going on.\n\nAnd only in a remote Siberian village lives an old man who knows what's happening. It's the Romanovs. They're back. Which means it's time for him to come back."
 russia.793.a: "Wait... HE IS... ALIVE?"
 russia.794.t: "After the Rubicon"
 russia.794.d: "General Viktor Zolotov, Namestnik of Novorossiya and Malorossiya, Commander-in-Chief of the Imperial Guard, who led Russia after the military coup, managed to eliminate all the traitors who came to the light after the death of Vladimir Volvofich.\n\nA severe blow was dealt to the separatist forces in the Caucasus, Turkestan and Eastern Europe. His strong hand, backed by the loyalty of the army and security forces, allowed the situation in the country to be partially stabilized.  The economy, although still suffering from the effects of the European War and the instability that followed, was showing signs of recovery.\n\nSome reforms have been introduced to strengthen the central government and suppress the opposition. However, the shadow of instability still hangs over the country.  The administrative apparatus is weakened, corruption is rampant, and popular discontent, though muted, is still palpable.\n\nZolotov faces many challenges: strengthening the economy, restoring public confidence, implementing necessary reforms without compromising stability, and, most importantly, preventing new attempts to destabilize the country. He will try very hard to multiply Russia's greatness.\n\nHis rule is a delicate balancing act on the brink of chaos. Russia's future depends on whether he can keep the country from disintegrating. Will he choose harsh military methods, or will he try to rule with a softer hand? It will all be decided very soon."
 russia.794.a: "So what's next?"
 russia.795.t: "The Coronation"
 russia.795.d: "Moscow held silent for the entire morning. The streets remained empty, the businesses remained closed, and whatever grand social activities people had planned for the day had been canceled. There was no tragedy or crisis that cleared the boulevards, rather a momentous occasion had come to the city. Russia was to get a new tsar, and the whole city watched with joyful anticipation. Outside the Dormition Cathedral in the Moscow Kremlin, a massive crowd of citizens were allowed to gather as church bells rang.\n\nInside the church was a scene out of the most wonderous of fairy tales. Gold icons adorned every square millimeter of the walls along with chandeliers and candle stands made of silver and platinum that made the inside as bright as midday summer. Countless dignitaries from top politicians to foreign officials packed the inside of the church and observed as the Patriarch of Moscow and all Rus stepped out. Everyone went quiet as the procession began.\n\nThe patriarch, accompanied by a group of deacons, read the divine liturgy and prayers were recited. The church representatives then welcomed all the esteemed guests from Russian and foreign society and then turned to the front of the church, where the Tsar and his empress now sat on their thrones.\n\nThe patriarch then moved to the soon-to-be tsar and placed the crown on his head to which he rose and placed another crown on his wife. They both rose, facing the crowd together as the patriarch made history, declaring to all the attendees the new royalty of Russia.\n\nThe entire crowd of dignitaries all clapped in unison as "God Save the Czar" began to be sung by a church choir. A jubilee unseen in almost a century unfolded.\n\nThen church bells across Moscow rang out, as Russia now officially had its first sovereign since 1917."
 russia.795.a: "A new era begins."
 russia.796.t: "The Resurrection"
 russia.796.d: "Aleksei Rodionov could not get enough of the view from his residence in downtown Moscow. It was a luxury suite in a complex that sat extremely close to the Moscow Kremlin, and all the other surrounding sights that tourists from around the world wanted to see. Being a rising star for the LDPR in the Moscow City Duma had its perks, and this was the one he was beginning to seriously value. But as he looked out upon the city, a nice drink in hand, there was another wonderful thing he began to think about, to reminisce about with glee.\n\nHe thought about this city, the party, and the whole country itself. So many jarring things have happened in the last couple years. There were elections, the war, the political struggles, and the titanic reforms that his party had worked day and night to complete. Moscow was the hallmark of their work, and remembering what had been done gave him strong satisfaction.\n\nThe city had been cleaned up from the physical and ideological trash left by previous establishment politicians and the USSR. No more do you see the eye sores of hammer and sickles or monuments to Lenin. No more do you see the plaques or street names or art of the internationalists who hated Russia so much. Now Russia has been restored to its former pride, perhaps even resurrected, and you could see it everywhere.\n\nThe Bolshoi Theatre was now playing an extended showing of one of Anton Chekov's plays. The Tretyakov Gallery was doing a season-long exhibition of Ilya Repin's works. All the red starts on top of every building were replaced with the Russian eagle. The city, now preparing for the holidays, now decorated the streets with ornaments popular back in the 1890s. There was even an apparent resurgence of early 1900s fashion amongst the city's rich socialites. He could go on and on, but one thing stood very clear.\n\nIt was all so glorious.\n\nHe took another sip, smiled, and murmured to himself."
 russia.796.a: ""Welcome back, Mother Russia.""
 russia.797.t: "New Russia - New Party"
 russia.797.d: "With the passing of Zhirinovsky, the LDPR is rapidly losing its popularity. We must offer our people something new. Since Vladimir Volfovich is no longer with us, our party must truly become a Russian one.\n\nWe also need to choose our new official ideology. We are all nationalists, but our current approach is too simplistic and flat. We must delve deeper into the ideological realm. People must truly believe in our new system and our new party.\n\nRussocentrism is a moderate idea that is gaining popularity in our ranks. We see Russia as the centre of the world stage, and our culture is more advanced compared to those in Europe, especially considering their decline in recent decades. We are focused on Russia and its development, which is our top priority. With such a modern approach, we may even attract some moderates to our cause.\nNational-Republicanism is an ideology that may not be popular with our more monarchist factions. However, it can provide a glimpse into Russia's future. After all, Zhirinovsky effectively led a republic, not a monarchy.\nBy adopting a more civic perspective on nationalism, we can attract more support from non-Russians, while also maintaining the ultra-patriotic tone of our movement. It's a modern approach to nationalism for modern times.\nFinally, we can adopt the theory of integralist unity. The party will become an integral part of Russia. This is the most party-state-like solution, and despite facing significant opposition within the party, it will create a united society with the single goal of improving the Russian nation. It can also help us in implementing a cult of the leader back, because Russians earn for a strong figurehead."
 russia.797.a: "Russocentrist Policy!"
 russia.797.b: "National-Republicanism Is the Way Forward!"
 russia.797.c: "Party - United Organism of the Country!"
 russia.798.t: "Veterans In LDPR Pick Vlasov's Hawks"
 russia.798.d: "After weeks of stability following the passing of our great leader, the old guard, also known as the veterans of the party, who have remained loyal to the party line and the cause of Zhirinovsky, have decided to support Vlasov and his supporters. This wing was able to persuade them to adopt a more hardline agenda.\n\nThis effectively ends the existence of the Veteran subgroup within the LDPR. Most of its members will either resign in protest against this decision or join the ranks of Vlasov's loyalists."
 russia.798.a: "They made the right choice."
 russia.799.t: "Veterans In LDPR Pick Reformist Wing"
 russia.799.d: "After weeks of stability following the passing of our great leader, the old guard, also known as the veterans of the party, who have remained loyal to the party line and the cause of Zhirinovsky, have decided to support the reformist wing. This wing was able to persuade them to adopt a reformist agenda.\n\nThis effectively ends the existence of the Veteran subgroup within the LDPR. Most of its members will either resign in protest against this decision or join the ranks of Slutsky's supporters."
 russia.799.a: "They made the right choice."
 russia.800.t: "Increase In Anti-State Activity"
 russia.800.d: "After the passing of our great leader, Vladimir Zhirinovsky, it was only a matter of time until those who used to fear us, the rats and worms, felt the weakness of our new administration. They no longer feel the same fear as they used to.\n\nRevitalized by the radical left uprising in crisis-ridden and defeated Europe, they feel confident that they can try something in our holy motherland.\nAlready, small groups are forming, and their acts of minor hooliganism are being seen. Leaflets, posters, and dissent among workers in the Imperial Monopolies due to "unjust payment" are being reported.\n\nIn Ekaterinburg, a memorial to Vladimir Volfovich was vandalized with the word "Butcher" plastered over his portrait.\n\nAlthough these acts are small, they can grow into a cancer-like disease on our soil. The National Guard and Okhana have been instructed to take this matter very seriously."
 russia.800.d2: "Comrade Chairman, our agents on the ground are warning us about a rise in anti-Soviet and anti-state activity.\n\nWe expected resistance to the restoration of the Soviet system, but the combination of this resistance with the lack of popular support among the lower classes, which is a legacy from the previous regime, may cause irreparable damage to our country.\n\nMany radical nationalists who refuse to accept our rule and were supported during the Zhirinovsky regime have begun to actively protest our government. Small groups are forming, and we are seeing some minor hooliganism. We are also reporting leaflets, posters, and dissent among city and rural residents against "Unholy Soviet totalitarianism."\n\nSome people even go so far as to claim that Russia has been secretly occupied by Western Marxists!\n\nAlthough these actions are small, they can grow into a cancer-like disease on our soil. The People's Druzhina and Security Services must be instructed to take this matter very seriously."
 russia.800.a: "We must be vigilant."
 russia.801.t: "Yavlinsky's Revolution"
 russia.801.d: "It was only a matter of time before the nationwide uprisings and demonstrations would outnumber the police forces and bring down the LDPR regime.\n\nThis morning, Moscow was filled with anger towards the LDPR government. The protests quickly overwhelmed the police, with many officers defying their orders and joining the rebels.\nEven the declaration of military intervention did not help. Soldiers, just like in 1991, refused to obey orders. Some stood passively as protesters occupied more and more government buildings, eventually reaching the Kremlin, while others helped break through the defenses and defeat the last remaining National Guard units loyal to the government.\n\nThe mastermind behind this? Old Grigory Yavlinsky, one of the few liberals allowed to exist under Zhirinovsky due to his familiarity and passivity. But now, they were proven wrong as his party and he declared the beginning of Russian democratization. Yavlinsky became the interim president of the new Russia.\n\nHe inherited a wounded and weakened country, with crisis and radical protests all around."
 russia.801.a: "For the Free Russia!"
 russia.802.t: "Yavlinsky's Farewell"
 russia.802.d: ""Dear citizens of Russia, Today is the last time I address you as President of Russia.\nI've made a decision.\nI thought about it for a long time and painfully.\nI've heard it many times.: "Yavlinsky will cling to power by any means, he will not give it to anyone." This is a lie.\n\nThe point is different. I have always said that I will not take a single step away from Democracy. We are setting the most important precedent for a civilized voluntary transfer of power from one Russian president to another, newly elected one.\n\nHowever, I made a different decision. I'm leaving. I'm leaving ahead of schedule. I realized that I needed to do this. Russia must start its new path with new politicians, with new faces, with new, smart, strong, energetic people.\nAnd we, who have been at the forefront of the struggle for democracy for many years, we must leave.\nAfter watching with what hope and faith people voted for a new generation of politicians in the Duma elections, I realized that I had done the main thing of my life. Russia will never return to the past. Russia will always move forward from now on....\n\nIn accordance with the Constitution, when I resigned, I signed a decree assigning the duties of President of Russia to the great democratic leader Alexei Anatolyevich Navalny...""
 russia.802.a: ""...Saying goodbye, I want to say to each of you: be happy.""
 russia.803.t: "Yabloko Fails to Gain the Majority"
 russia.803.d: "After the contested provisional Duma elections, the President's party, Yabloko, failed to gain the majority of votes. Even though they emphasized the Popular Front strategy and included minor democratic parties, they could not secure enough support.\n\nHowever, Russia of the Future, the party of Alexei Navalny, the second most popular leader, managed to win enough trust from voters and public opinion to secure enough seats in the parliament.\n\nThe first session of the Duma immediately started with Navalny's attempt to become the chairman. Despite resistance from Yabloko and their allies, eventually, after possible secret deals with minor parties and a majority vote by Russia of the Future members, Alexei Navalny was declared the chairman of the Duma."
 russia.803.a: "Yabloko's expired."
 russia.804.t: "Surovikin's Coup"
 russia.804.d: "It was only a matter of time before the military's anger and demonstrations would outnumber loyalists and bring down the LDPR regime.\n\nThis morning, Moscow was in a state of severe upheaval, with Russian military units violently breaking through police and National Guard barricades. Citizens quickly scattered out of sight to avoid being hit by stray bullets.\nBy the end of the day, all possible resistance had been crushed by rebel soldiers, and the last remaining major target - the Kremlin - was soon surrounded by the revolters. The remaining members of the LDPR government were nowhere to be seen; some say they escaped to Sri Lanka.\n\nAfter all the chaos in Moscow, TVs around Russia were blessed with the first 'official' broadcast in the aftermath of the coup.\nSergey Surovikin, who had once been just an ordinary general of the RAF, now declared himself the provisional leader of the new military government. He publicly denounced the treasonous peace treaty signed by the previous government, which he called the traitors of the motherland. \n\nHe inherited a wounded and weakened country, with crisis and radical protests all around."
 russia.804.a: "Restore Russia's strength!"
 russia.805.t: "Favored People's Corporation"
 russia.805.d: "People's Corporations are outstanding enterprises that play a crucial role in our socialist state. With Grudinin in power, we will put more emphasis on protecting and enhancing their contributions.\nIn the next six months, we will identify three largest corporations that can help us improve our economic and social indicators.\n\nOne such corporation is Soyz Neft, a resource powerhouse that can assist in expanding our industrial and resource extraction operations in Siberia and the Far East.\n\nAnother corporation is SovGaz - a general multi-sector industry company that can modernize and improve factories across the Soviet Union, provided they receive sufficient state grants, of course.\n\nThe third one is Sovhoznik, a media and business group founded by Grudinin himself. It is very popular among young people because it focuses on innovation and media technologies. It can help us to spread Party's vision among the population and working class."
 russia.805.a: "Soyz Neft."
 russia.805.b: "SovGaz."
 russia.805.c: "Sovhoznik."
 russia.806.t: "Formation of PMC "Lenin Guard""
 russia.806.d: "We have been informed about the successful establishment of the first Soviet private military company, known as the "Lenin Guard".\n\nThe company is mainly made up of former Wagner and Soviet soldiers who fought in the European War. Some of them are even former KGB operatives.\n\nCurrently, the company is accepting contracts from Soviet-friendly nations around the world to protect high-ranking officials and provide assistance in military conflicts.\n\nThe key feature of this organization is that each soldier must swear to uphold the Leninist vision of the Soviet Union and the rule of the party. This means that the PMC at least pays lip service to our state."
 russia.806.a: "True patriots of the union!"
 russia.807.t: "Formation of PMC "Argentum""
 russia.807.d: "We have been informed about the successful establishment of the first Soviet private military company - "Argentum".\n\nThe company is primarily made up of former Wagner and Soviet soldiers who fought in the European War. Some of them are even former KGB operatives.\n\nCurrently, the company is accepting contracts from Soviet-friendly nations around the world to protect high-ranking officials and provide assistance in military conflicts.\n\nThis institution is entirely apolitical and welcomes soldiers from diverse backgrounds. They focus solely on safeguarding the motherland, without any political affiliations."
 russia.807.a: "True patriots of the motherland!"
 russia.808.t: "Goida Into The Masses"
 russia.808.d: ""There is such an Old Russian interjection "GOIDA", meaning a call for immediate action."\nAfter our Most Holy Guardian, Ivan Okhlobystin used this phrase in his recent speech at Red Square. The phrase quickly became a Russian novelty, especially among security forces and military personnel.\n\nAll around Russia, loyal citizens of our Holy Union now proclaim GOIDA as the battle cry of the Russian people who are in the process of making it a reality. They use this phrase in speeches, at public meetings, and even in greetings to their fellow countrymen.\n\nSome liberal scumbags, of course, try to equate this with 'sieg heil', but their claims are groundless and petty.\n\nThere's even a more humorous side to this. Many people have made party mixes based on Okhlobystin's speech, especially the part about the battle cry proclamation."
 russia.808.a: "With GOIDA in our hearts..."
 russia.809.t: "The Battle Cry"
 russia.809.d: "Not long after taking over as the Supreme Ruler, Okhlobystin became increasingly radicalized by the hardline priests in his cabinet, which almost entirely consists of officials from the Russian Orthodox Church.\n\nA large rally was organized on the Kremlin Square, where thousands of loyal patriots and Christians joined in waving flags of our great history, listening to speeches and music that honored our great forefathers.\n\nThe highlight of the event, of course, was a speech by the Holy Guardian himself.\nThe speech began strongly, denouncing the rotten West and its satanic overlords. Then, he turned his attention to the 'unloyal' elites inside Russia, those who secretly wish it harm.\nThe crowd was in rapture. Ivan Okhlobystin is a very professional speaker, perhaps because of his movie actor career. But more than that, he is truly zealous about his vision. Combining these two qualities has given Russia the greatest orator of all time, perhaps even greater than Zhirinovsky.\n\nIn the climax of his speech, Okhlobystin declared the need for a holy war, not just against external enemies but also against internal ones.\n\n"Holy war! Muslims have a concept of Jihad. This is not only a deadly battle on the battlefield with the enemy. This is, first of all, a struggle with your sins inside your heart! And our main battle, our Holy War, will take place in our souls! And if we win it, we will win all the other battles!\nThere is such an Old Russian interjection goida, meaning a call for immediate action. How we miss such battle cries now! Goida, brothers and sisters, Goida!\nBe afraid, old world! Devoid of true beauty, true faith, and true wisdom, ruled by madmen, perverts, and Satanists. Be afraid, we're coming! GOIDA!""
 russia.809.a: "GOIDA!"
 russia.810.t: "The New Party of the Union"
 russia.810.d: "Now that we have dismantled the partocratic system, we must build a new political force to ensure the stability of government power.\n\nWe have several options for how to structure this new political party. The key principles of our party will be the sovereignty of the USSR, the well-being of the people, and, of course, the adherence to Pasechnik's vision of Novocommunist theory.\n\nMany pragmatists are ready for president's orders to reform the party. Some former bureaucrats from Putin's era have also decided to join us.\n\nHowever, the influence of the communist dogmatists is still strong, so we must be prepared for resistance to our changes."
 russia.810.a: "Unity above all."
 russia.810.b: "We must fight dogmatists, we're communists of the future."
 russia.810.c: "Reforms for the people, by the people."
 russia.811.t: "Anti-Sovietists Organize!"
 russia.811.d: "In recent weeks, we have been receiving information from our spies that a group of radical LDPR members has formed to actively resist our regime. They call themselves the "Zhirinovsky Guard," and in a leaked manifesto, they claim to want to return Russia to the path Zhirinovsky envisioned for the country, and to fight back against "the hydra of neo-communism."\n\nTheir methods are brutal and radical: they attack militia, government buildings, and even attempt to assassinate our ministers and loyalists!\n\nMany disorganized anti-sovietists have flocked to their movement, despite not sharing many of their ideas. This is a clear sign of an alliance between reactionaries against working people, where ideological differences are forgotten."
 russia.811.a: "We'll crush them..."
 russia.812.t: "It's Never A Good Morning"
 russia.812.d: "It was half past ten in the morning. By this time, all the conscientious citizens of Russia had gone to their jobs: saleswomen to shops, teachers to schools, workers to factories. But not Lenya.\nLenya is asleep: he doesn't need to go anywhere. Having studied to become a philologist, he turned out to be useless to anyone in New Russia, except for his loving parents. It's at their expense that Lenya lives, wandering around the image boards along the way for a quick dopamine from political disputes.\n\n"GLORY TO RUSSIA! GLORY TO THE SUPREME LEADER!"\n\n"What is it?" - Lenya thought, still not fully awake. A moment later, returning from the realm of Morpheus, he remembered.\nAgittruck.\n\nEvery day, at exactly 10:37 a.m., the propaganda car starts moving down his street. Patriotic slogans and songs like "God save the Tsar!" are heard from its speakers. and the chorus "Slavsya!" by Glinka. By 10:42, the volume is enough to wake up even the most soundly asleep. Hoping to save his sleep, Lenya covers his head with a pillow. But at 10:45, the agitation is already under his windows.\n\n"WE LIVE IN THE BEST COUNTRY IN THE WORLD, AND THE REST OF US ARE JUST JEALOUS!"\n\n Finally, the sound gets further and further away. The slogans and music stopped, clearing away the memories of the dream, and leaving one thought.:\n"Fucking pricks."\nAfter lying down for a while, Lenya gets up and the first thing he does is go to his favorite website and into its /po/ section, and starts writing:"
 russia.812.a: ""Hello, Dvatch..."" 
 russia.813.t: "About Beliefs"
 russia.813.d: "- Hello, dear listeners! It's exactly 2 p.m. Omsk time, and you're still listening to the Road Radio! Maria Ostrovskaya, the permanent presenter, is still with you. The head of the youth organization Generation of Russia, Ivan Frolishev himself, is on the air with us today. So, Ivan, as you know, your organization is a kind of beacon for young people who want changes in society. Can you please tell us what you believe in and what you want to achieve with your work? In general, about their beliefs.\n- Yes, Maria, thank you very much for this question. We, the Russian Generation, strive to make the voice of the common man heard. Because, for example, there is a problem in the country with insufficient support for young families, poor local working conditions, and corruption. By the way, last month we had to pack up and buy groceries, diapers and other things for an orphanage in Novokuznetsk. That's because local officials have completely forgotten about it, as they often forget about the people. So we, ordinary people, have to get together and solve problems together.\n- Thank you for your reply. One more question. Do you think that the fact that you are gathering radical youth under your wing, so to speak, could lead to your organization or at least some of its members entering into a direct confrontation with the authorities?\n- You see, Maria, I would like with all my might to prevent such a scenario. Yes, our government is not perfect, far from perfect, and we all understand this. We see punctures and unsuccessful decisions on the ground. But it is very difficult for us to imagine the big picture. After all, running a country is not the same as running a stall. That is why I personally support our government and urge people to take matters into their own hands, but not to cut them off their shoulders, but to understand the actions of our government. Therefore, I am convinced that coming into conflict with the authorities is a counterproductive decision.\n- Thank you for this detailed and balanced answer. This concludes our interview. But the Road Radio continues to broadcast! Next, we have the song "We" performed by a Shaman in the order queue. Enjoy listening!"
 russia.813.a: "Our people will proudly survive everything."
 russia.814.t: "New Chairman For Tsar"
 russia.814.d: "The old chairman of the minister committee does not align with the future direction of imperial politics. The tsar has decided to take advantage of the new radical loyalist movement to ensure unwavering support for the tsar and the Russian Empire.\n\nTo achieve this, the tsar needs to find a new public figure to represent his new radical policies. Among the new black hundreds, a few individuals and their organizations have emerged as leaders. Their policies are largely in line with each other, differing only in a few methods and personal experiences. However, choosing one of them will result in the others being marginalized."
 russia.814.a: "...Kuryanovich."
 russia.814.b: "...Artyomov."
 russia.814.c: "...Tor."
 russia.815.t: "Fall of Burkov Cabinet"
 russia.815.d: "The unstable government of Burkov led to his downfall. The nation, which had completely rejected any traces of leftism, did not accept Burkov's strange policies.\n\nThe Tsar Duma passed a vote of no confidence, organized primarily by the Kadets and its leader Boris Titov. With the help of liberals and many conservatives, they were able to impeach Burkov and his cabinet of moderate leftists.\n\nAfter that, a short vote was held in the Duma to elect the new Chancellor."
 russia.815.a: "...Boris Titov Is Elected Chancellor..."
 russia.816.t: "The Revival of the Black Hundreds"
 russia.816.d: "With the restoration of the tsar's supreme authority over Russia, it was only a matter of time before a more radical strain of monarchists would emerge again.\n\nMany old-school radical nationalists have established their own 'organization of support to the tsar', but more accurately, they could be described as a revival of the Black Hundreds movement of the past. \nThey have different leaders and their views on radicalism are slightly different. Personal disputes have already occurred between them. However, one thing is clear: they are loyal to the imperial government and are ready to fight any leftists or those they see as undesirable if necessary.\n\nWe will keep a close eye on them. They might prove useful again, just like in the past."
 russia.816.a: "God save the Tsar!"
 russia.817.t: "ROVS Gains Back Relevance"
 russia.817.d: "With the restoration of the monarchy and the subsequent return of the October Manifesto, our great empire has seen the rise of a more conservative form of loyalism, especially among the military.\n\nOne such group is the old ROVS, which claims to be the direct successor to Wrangel's organization of the same name. In previous regimes, it was a small group of a few monarchist military figures, but now it has started to gain popularity among the current officers and some lower-ranking personnel of the Imperial Army.\n\nFor many years, Igor Ivanov was the national chairman of the organization. However, as more new members joined and influential figures gained power, he was pushed aside by Vadim Krasnoselsky, the former head of Pridnestrovie and a staunch monarchist.\n\nROVS claims to protect the Russian people and the Russian natural government - Tsardom - from threats both inside and outside. It promotes more harsh positions, many of which are strongly anti-democratic."
 russia.817.a: "Glory to Russia!"
 russia.818.t: "Chancellor Zatulin Shot!"
 russia.818.d: "In St. Petersburg - the unveiling of the monument to Alexander II. The Emperor of Russia, his family and entourage, including Chancellor Zatulin, as well as foreign guests attended this solemn event.\n\nAs part of the celebration, the emperor and his entourage visited the St. Petersburg City Theater, where they watched the play "The Tale of Tsar Saltan." However, before the performance began, the head of the city's security department received disturbing information. Timur Rakhmetula said that Anna Frolova, a terrorist, had arrived in the city and was planning to attack a high-ranking official, and possibly the tsar himself.\n\nDuring the second intermission, Zatulin talked at the barrier of the orchestra pit with Roman Starovoit, Minister of Transport, and Count Tipisev, a well-known city magnate. Suddenly Timur Rakhmetula approached Konstantin Zatulin and fired two shots from Makarov's pistol. The first bullet hit the chancellor's arm, and the second one hit his stomach, hitting his liver. Zatulin was saved from instant death by the cross of St. Vladimir, which, having broken, changed the direction of the bullet, preventing it from hitting the heart. However, despite this, the bullet penetrated the chest, pleura, abdominal wall and liver, causing serious damage.\n\nThe shooter was immediately detained by the tsar's security staff. The entire theater was evacuated, and the Chancellor was immediately sent to the city hospital, where the best surgeons in the country are working on him.\nCurrently, the Chancellor's condition is extremely serious, and the chances of his rescue are extremely low...!"
 russia.818.a: "Chancellor Zatulin Sadly Passes Away..."
 russia.818.b: "Chancellor Zatulin Survives!"
 russia.819.t: "New Chancellor"
 russia.819.d: "In the aftermath of the terrible shooting of Chancellor Zatulin, we must continue government work. Now it is up to the Tsar to select the official successor.\nThere are several prominent politicians and statesmen in the Union of 17 October party. One of them is Victor Vodolatsky, an old Cossack ataman who represents the more hardline side of the party. He could be a suitable candidate if we need to focus on security and preventing future terrorist acts of dissent.\n\nThe second candidate is Roman Starovoit, the current Minister of Transport and the former Governor of Kursk. He is well-suited for a more moderate approach and has proven expertise in dealing with crisis situations and transport issues.\n\nFinally, there is Drozdenko, the governor of St. Petersburg, who is not particularly well-known but is competent. He is not an especially proactive bureaucrat, but he would make a good candidate for a stable government."
 russia.819.a: "Vodolatsky..."
 russia.819.b: "Starovoit..."
 russia.819.c: "Drozdenko..."
 russia.819.a1: "This must not happen again! Russian needs a firm Chancellor..."
 russia.820.t: "Burkov Challenged!"
 russia.820.d: "The number of party members who are not satisfied with the way Alexander Burkov leads the party has been increasing. This is likely due to the emergence of a more radical faction within the party, which has gained strength by uniting with moderate Marxists and former communists.\nThis issue came to a head at an extraordinary party meeting, where Burkov was openly challenged to defend his moderate and centrist policies. His critics pointed out that he was unwilling to reform democratic institutions to make them more like Western models of constitutional monarchy.\nThe radical faction is led by Mikhail Matveev, a former member of CPRF who has distanced himself from Bolshevism. He has always been known for his non-communist and sometimes nationalistic views.\n\nBurkov is about to take the stage to discuss the matters of his administration..."
 russia.820.a: "Radicals successfully overpower Burkov!"
 russia.820.b: "Burkov defeats his opposition!"
 russia.821.t: "Rogozin's New Ideology"
 russia.821.d: "When Rogozin became the president, he set out to create a new ideology that would be uniquely Russian and serve as a guiding force for our nation under his leadership. Among the key ideas that our new president considered were three key ideological constructs:\n\nThe Russian Revolution: Rogozin's policies will involve more direct revolutionary steps. After all, Rogozin represents a new and more forward-thinking approach to Russian national identity compared to any previous regime. Our state will move towards totalitarianism and direct control, with party politics completely rejected. All decisions will be made by a state bureaucracy loyal only to the Great Leader, handpicked by him.\n\nSovereign Socialism - One of the challenges of our new regime is the apparent inability to blend two distinct ways of thinking - Imperial and Soviet. However, we can overcome this by developing a coherent ideological doctrine that reconciles these two "warring" factions of Russian history.\nBoth tsars and general secretaries had their share of correct and incorrect decisions. There is no need to continue the divide. The party will undergo reform, and factions will be integrated to unite passionate patriots who work for the betterment of the motherland.\n\nThe final option is a bit more unconventional, but also more socialist than the previous ones. It is called Ordosocialism, which means Order Socialism. This approach envisions our new state as a revolutionary vanguard, similar to how the old Bolsheviks imagined their global state. We will use both nationalistic ideas and socialist symbols to attract different parts of society to join us.\nHowever, this approach will lead to the creation of factions within our party. These factions will advocate for more "left" or "right" policies."
 russia.821.a: "New. Russian. Revolution."
 russia.821.b: "Imperial And Social."
 russia.821.c: "New Order For Russia."
 russia.822.t: "Strelkov And Rogozin Gain Relevancy"
 russia.822.d: "After Slutsky announced plans to make political life more open and even hinting at the chance of holding the first post-war elections after more reforms, many nationalists who didn't align with the LDPR under Zhirinovsky began to return to the forefront of Russian politics.\nTwo prominent figures in this movement for a truly national Russia are Dmitry Rogozin and Igor Girkin (Strelkov). Both were excluded from the LDPR politics due to their many conflicting interests with Vladimir Volfovich.\n\nRogozin, in his quest for nationalist support and backing, also relies heavily on Soviet imagery and the glorification of Soviet life and experience. This was not possible under the leadership of Zhirinovsky, but thanks to the so-called Slutsky Thaw, he now has the freedom to express his ideas. And despite everything, there are still people who appreciate and glorify the Soviet era, even if they don't directly support Marxist ideology, and Rogozin is their man. He found his place in Rodina party, old and mayhaps Surkov's project, but still the closest thing to Rogozin's personal views, especially after he ousted the previous chairman by having more membership support.\n\nStrelkov-Girkin is a true legend in the Russian nationalist movement. He started as a fighter in the Pridnestrovie War and then, according to him, became one of the main commanders in the Donbass War. This earned him the respect of many people, especially those who consider themselves militaristic and imperialistic.\nHis supporters are numerous and often loyal only to him. They attack any other figureheads they deem unworthy and disloyal. He organized his supporters around the Club of Angry Patriots, where he criticized every decision made by Zhirinovsky on the battlefield. Now it's the Union of Militant Patriots, which seeks to establish strict rule in both civilian life and, especially, in military life."
 russia.822.a: "It was expected." 
 russia.823.t: "Milchakov And His Men Organize ORSN"
 russia.823.d: "Who is Milchakov? To some, he may be a hero, but to others, he's a war criminal, a mass murderer, a devil, and according to some accounts, even a cannibal. Despite the best efforts of the government under Zhirinovsky to prevent any normalization or publication of Rusich materials and ideological concepts, Milchakov's name became well-known, especially after the start of the European war.\n\nAlthough neither Rusich nor Milchakov personally took part in most of the fighting in Eastern Europe, their infamy followed them.\n\nNow, after the war and Slutsky's "democratic" reforms, these men are again raising their heads. They see a possible "political future" for themselves and a chance to spread their own vision for our country.\nHere it is! The political project of Milchakov, Topaz, and Petrovsky has been revealed. They describe it as a place where strong Russian men can come together to defend the country's natural interests and identity: Organization of Russian Social Nationalists.\n\nDespite the organization's inherent extremism, the current political atmosphere may give it a chance to gain some ground in local city councils or even secure one or two seats in the upcoming National Senate elections."
 russia.823.a: "Oh well."
 russia.824.t: "Longtime Nationalists Assemble"
 russia.824.d: "Recent reforms have led to the emergence of more radical and nationalistic, often monarchist, groups. On the old streets of St. Petersburg and Moscow, hardened Russian nationalists have come together to once again defend Russia from what they see as its weaknesses and Bolshevism.\nThey criticize Slutsky even though they used to criticize Zhirinovsky when he was alive. Now they see him as a martyr, who was poisoned by Jews or communists. The details of these conspiracies vary depending on the person.\nTheir new slogans are the same as their old ones. Many of them have been on the political frontlines for many years.\n"Who else but us?" they say, and then they recite their old forgotten prayers to the tsar family, the Empire, and the Mother of God.\n\nThe organization that brings them together again is the good old Society Pamyat, either rejuvenated or created anew - it doesn't matter, it's here and it has something to say.\n\nDespite the organization's inherent extremism, the current political atmosphere may give it a chance to gain some influence in local city councils or even secure one or two seats in the upcoming National Senate elections."
 russia.824.a: "The Pamyat Society... Our Holy Father..."
 russia.825.t: "New Russian Reds"
 russia.825.d: "Gentlemen, I have terrible news for you all! Nature has been so "cleansed" thanks to Slutsky that you can even see reds on the streets!\nYes, I'm completely serious! Today, one of these "imperial redheads" wanted to give me his pamphlet about the war of capital and labor, of course I tolerated it, I'm still a cultured person, otherwise I would have punched this red-bellied! I took the pamphlet.\n\nIs that really what we fought for, compatriots?  So these reddish bastards, who only verbally recognize the restoration of the borders of our Great Russia and sorta of combine Russian terms with their socialist nonsense, could just walk around and spoil the view of our beautiful Russian cities like Izhevsk? \nFor How Long, my beloved Russian people! My readers! I'll tell you, this would not have happened under Zhirinovsky! All these idiots who fly red rags along with our great imperial tricolor would be sent to butyrka! And it would be the right thing to do, gentlemen!\n\nRussia is a country of Tchaikovsky, Dostoevsky, not Dzerzhinsky or Beria. Lenin was thrown out, very well... We need to dig up all these burial grounds near the Kremlin! It's a pity, of course, that your Slutsky, whom OUR YOUTH rely on so much, will definitely not do it now. These red ones are more important to him, and he said, "National Democracy is first and foremost democracy." Checkmate, that's all. Horror.\n\nAn excerpt from a personal Online Magazine under the nickname - TimurArmatatulin91. The author's spelling is preserved."
 russia.825.a: "Terrible!"
 russia.827.t: "CALL OF LDPR: FINAL WAR"
 russia.827.d: "Well, our investments have, in a sense, borne fruit. The youth experts did not experiment and turned to the already well-known Mehsoft studio, which had previously released a small game called Call of LDPR.\nNow, thanks to the financing, they were able to create a sequel to this game, significantly improving the gameplay.\n\n"CALL OF LDPR: FINAL WAR" is a brutal shooter full of violence and drive. In this game, the player assumes the role of a soldier of Zhirinovsky's Elite Guard, sent to the heart of neoliberal-occupied Europe.\nPlayer goes through many levels, each of which is filled with the unique cultural heritage of different regions of the EU. In these levels, he encounters a variety of enemies and encounters unusual mechanics.At the end of the journey, the player finds himself in Brussels, where cyber-bureaucrats and the final reptilian boss from the planet Nibiru are waiting for him. Despite the fact that the game has received many positive reviews in our country, it has been banned in many EU countries. This product is intended for the domestic market only. But on the other hand, we were able to win the love of young gamers and earn some money from internal sales."
 russia.827.a: "It's sure is something!" 
 russia.828.t: "The Czar Is Dead 2"
 russia.828.d: "Our investments were not very successful. The LDR youth organization decided to support the little-known developer "Machine Joy", who was known only for his novel "The Czar Is Dead". Perhaps they hoped that with the help of financing, the developer would be able to develop this idea and show the inner world of the Tsar of All Russia more deeply in a playful way.\nHowever, as a result, the developer created a completely new sequel game to his first one, which was completely different from it. Now it's a DOOM-style RPG shooter, telling the story of Nikolai Romanov's struggle against the Communists and the Anglo-Saxon invaders. The tsar managed to escape from execution, but the little Tsarevich was abducted by villains and taken away to an unknown destination. Nikolai personally takes up arms and sets out to take revenge.\n\nThe game has very specific graphics and an even more specific narrative. It turned out to be too niche and esoteric for most players, who had already figured out a lot from the graphics.\n\nAs a result, we received neither money nor patriotic education. Hundreds of memes have appeared on the Internet on the topic of "where the bosses spend their money.""
 russia.828.a: "Well..."
 russia.829.t: "Suffering From Success"
 russia.829.d: "Our great victory in Europe and the return of all Russian territories have brought great joy, but also put enormous pressure on our bureaucracy, security, military, and education systems.\n\nNot only are we short of loyal and capable personnel to fill the ranks of many layers of government in the new territories, but also the pressure has been building up since the conquest of Central Asia and the Caucasus. This is now reflected in our inability to fully grasp the situation in the Baltics and Malorossiya.\nThis has also caused the phenomenon of "poor imperial outskirts," where many residents of non-Russian areas have decreased their quality of life and, consequently, their ability to fully participate in the country's life in the long term.\n\nMany people think this is a reasonable reaction to the rapid return of so many territories in such a short time."
 russia.829.a: "After dinner comes the reckoning."
 russia.830.t: "Russia-Sponsored Reactionaries!"
 russia.830.d: "In our country, as well as in other countries across Europe where there have been revolutionary movements, a Russian-backed terrorist organization called the European Phoenix has emerged. With the support of Russian intelligence, this organization has been able to unite various marginalized groups in our society. Some of its members have even been trained in Russia and then sent to our countries.\n\nThey carry out various terrorist attacks in rural areas and smaller towns, where our control is not as tight.\nOur security forces are doing their best to reduce and eventually eliminate this threat. However, the fact that the main body of this organization is based in Moscow makes it much more difficult to fight against them."
 russia.830.a: "Dammit!"
 russia.831.t: "The New Underground"
 russia.831.d: "Despite our efforts and the harsh crackdown imposed on oppositionists before the war, we are now witnessing the rise of a new democratic movement that is critical of the state. These individuals mostly come from the territories we have recently annexed, rather than from Russia itself. They also include students and young people from our major cities, who have become dissatisfied in recent years.\n\nWith the rise of anti-state activity and the terrorist acts of the KNOA, we have really shown our weaknesses. This has led many apathetic people or those who were previously inactive to awaken a spirit of political struggle within them.\n\nDue to the overall instability of our current regime, these "secret" societies have become a place for disloyal or opposition voices to express themselves. Although these groups are much disorganized and less violent than their previous counterparts, they still influence the mindset of our people in the wrong direction. Some even committing small acts of petty hooliganism."
 russia.831.a: "Keep an eye on them..."
 russia.832.t: "Launch"
 russia.832.d: ""Ten, nine, eight, seven..." - the countdown for Alexey Petrovich lasted forever. He was looking through binoculars from a specially equipped pad a few kilometers from the launch site. "If only it would take off, if only it would take off..." - the only thought spinning in Bykov's head.\nThe Hius probe, which was about to take off into the starry sky, was his life's work. Yes, he was still young - 35 years old is an extremely young age for the technical director of the entire AMS - but Alexey Petrovich was experienced and had dreamed of returning the Soviet Venus exploration program since his university days. The main goal of Hiusa was to discover deposits of radioactive ores for the future of mankind, when technology would make it possible to conquer the second planet from the Sun.\nMiraculously, he was able to push through his idea, in many regards because of the new government, which announced the "destructive influence of capitalism on the space program" and the beginning of a course to "regain leadership positions in the space race." And now, when the launch vehicle flew far, far away, Bykov remembered the lines from one song:"
 russia.832.a: ""We were born to make a fairy tale come true."" 
 russia.833.t: "After School"
 russia.833.d: "- So, son, how was your day? What did you do today? - Veniamin Andreevich started every family dinner with the same question to his son.\n- As usual. Morning prayer, conversations with the priest, and reading the Gospel. - Lyosha said with a slight irritation. - When are we going to do something useful? I have exams coming up!\n- Well, don't be so skeptical. Everything in life is useful, even theology. Especially now.  Mom hurried to reassure him.\n- Yes, I didn't give up on these fairy tales about "obey the father, don't do this, don't do that, or you'll go to hell"! How am I going to work properly if instead of practical knowledge in my head I have a mess of Bible verses and the moral teachings of some stranger?\n- Be patient until university.\n- It's the same there! The same nonsense year after year! - son put an end to this conversation."
 russia.833.a: ""It might be worth homeschooling him...""
 russia.834.t: "Prayer of the Russian Warrior"
 russia.834.d: "It has been raining in the Moscow region for the third day. But the weather could not prevent the great event: the blessing of a Separate Oprichnina Brigade named after the Blessed Tsar John Vasilyevich in the Main Church of the Armed Forces. Preparations for this event began even before the start of the war, and the entire schedule was scheduled for months."WARRIORS!" - Okhlobystin's burbling voice roared across the field - "THE HOUR OF THE LAST JUDGMENT IS APPROACHING! TRIALS OF EURO-BOLSHEVIKS, ATHEISTS, ENEMIES OF THE RUSSIAN PEOPLE AND THE ORTHODOX FAITH!" Hundreds of soldiers stood in front of the podium, with rifles on their shoulders. Priests walked along the rows, sprinkling the fighters and their weapons with holy water.\n\n"FAITH HAS ALWAYS BEEN WITH THE RUSSIAN HEROES: ON KULIKOVO FIELD, ON POLTAVA, AT BORODINO AND NEAR MOSCOW! OUR GRANDFATHERS AND GREAT-GRANDFATHERS FOUGHT AND WON UNDER THE FACE OF CHRIST! THE RUSSIAN LAND AWAITS YOU WITH A VICTORY! FORWARD, WARRIORS OF FAITH!"\n\nOne raised his fist up and the whole field responded with a shout:"
 russia.834.a: "GOIDA!"
 russia.835.t: "Beholder"
 russia.835.d: "Vasily was the steward and looked after Khrushchevskaya on Progress Street. A non-dusty job is to sweep the floors, call the services so that they mow the grass in front of the house on time. And also well... watch the tenants in the cameras and transmit certain patterns of their behavior to the authorities. For example, Margarita Ivanova from apartment six. A hardworking, but also deeply unhappy woman. Recently, just after the next report, she was lucky. During the queue at the housing and communal services, she met Vasily Petrovich, a smart but also lonely electrician, who for some reason was called to another place today. And now several weeks have passed since then, and Margarita receives a guest every Tuesday, Friday and Saturday, and things were getting better at work. But the former tenant of apartment 12, Arkady Veniaminovich, kept forbidden books. As a result, during an extraordinary promotion, he was transferred to work in the Arctic. He denied it, of course, but what could he do? The party said it's necessary, so it's necessary.\n\nSometimes, however, Vasily himself thought about the fact that he was playing God and deciding the fate of other people. But he refused, he was just following his instructions. And there are coincidences in life... there are, aren't there? However, deep down he was afraid. And sometimes at night he had nightmares that someone was watching him from the side in the same way and filling out another report in the same way."
 russia.835.a: "But there's nothing to be afraid of, is there?"
 russia.836.t: "The Court of Time"
 russia.836.d: "Recently, a new program literally tore up the charts of Russian television. "The Court of Time" is a program about popular politics, where various historical figures in the form of testimony retell their path to power and how they ruled the country. And the jury, disguised as citizens of the country, and the judge in the form of a blind Themis, sentence them.Such figures as Stalin, Lenin, Alexander I and Leon Trotsky have already visited this court. So the first three rulers were acquitted by the court, and Trotsky was executed for collusion with German capital and Anglozionist circles.\n\nThe show is already beating all possible ratings, and it seems that the creators are not going to stop. In particular, they do not exclude the possibility that foreign rulers may become the next defendants in their show."
 russia.836.a: "Good show."
 russia.837.t: "The Whirlwind of History"
 russia.837.d: "An unexpected act for all citizens was the announcement of official state support for the project "In the Whirlwind of History." Having long been a haven for fans of alternative history, the forum has already released several dozen books, mostly in the genre of "popodantsy" where the characters are unexpectedly transported back in time and become catalysts for changing history.\n\nNow the website has undergone a rebranding, and the book series has been renamed The Whirlwind of History. At the same time, new books were announced, for example, "The Age of the Tsar", which tells about the life of soldiers of the Russian Empire fighting against the German Red Army. "After the Flood" is a novel about the love of a French aristocrat and an American count in the world of the victorious Napoleon. And finally, "Ashes" is a drama about a family surviving the apocalypse that occurred at the beginning of the 20th century. In the story, they have to travel through ravaged Russia to reach the paradise in Vladivostok that everyone is talking about."
 russia.837.a: "Maybe I should take one for myself, too?"
 russia.838.t: "Something Changes..."
 russia.838.d: "The sun was shining. Two young men were walking through the center of Yaroslavl, a city that has endured all the ups and downs of Russia throughout its history. Even now, during the period of obvious unrest, little has changed in the city, with the exception of the appearance of two infantry fighting vehicles and a tank in the central square.\n- Yes, when will all this nonsense end?\n- You know, "you can't understand Russia with your mind," the second one grinned back.\n- Yes, judge for yourself: Zhirinovsky did the right thing, it was not for nothing that they won the war. Yes, he's gone now, but so what? There, the same Slutsky was saying sensible things about national democracy and sovereignty. And that's what these military men suddenly didn't like?Sergey, you know, if events and people in our country obeyed logic, we would probably be flying to Mars right now.\n- Well, maybe you're right...The night was interrupted by the roar of engines - the guys approached the square in front of the regional administration building, from where armored vehicles were hurriedly leaving. Cars raced right in front of them-you could smell the diesel.\n- What are they doing? - the first one drawled."I think I can guess," the second one replied, looking at the phone screen.\n"
 russia.838.a: "...But something remains unchanged."
 russia.839.t: "Sweep Out Everything Superfluous"
 russia.839.d: ""Here you are - you traitor bastard!", with these words, oprichnik Andrei Danilovich sharply punched his opponent in the jaw. The overweight man lost his balance and fell to the floor. A tottering icon from a shelf carelessly nailed to the wall fell and landed directly on the forehead of the fallen man. A man with blood trickling from his mouth lifted the image that landed on his forehead with the last of his strength. Saint Mary looked on indifferently at his suffering, after which the beaten man closed his eyes and passed out.\n\n- What are we going to do with it?  Andrey turned to Vasily Pavlovich, the sovereign's man, the elderly commander of their brigade.\n- What to do - what to do... take him to his family in the car. Volodka, help him with something.\n- That's right!  Andrey replied, and then, while no one was looking, he took the watch from the unconscious man's hand.After half an hour, the guards, each with a molotov cocktail in their hands, stood in front of the house.\n\n- Vasily Pavlovich. It's a pity to burn such beauty. The house is like an old Russian house.\n- Oh, Andreika, it is impossible to spare the property acquired by deception. He received money from Germany, and they are our enemies. Therefore, he is a traitor, and traitors' houses are supposed to be burned.\n- Well, whatever you say. Come on! \n- Go ahead!The first guardsman shouted loudly, after which five bottles of Molotov cocktails almost simultaneously flew into the building.  One of the bottles successfully flew into the open window and the flame almost immediately devoured the curtains, after which it switched to wooden decoration. The crowd gathered around the performance actively hooted and whistled. "Burn it! Burn it! Burn it! Burn!", crazy, loud cheers complemented the dance of flames, it seemed that the crowd could barely restrain themselves from dancing around the fire. Vasily Pavlovich just lit a cigarette, looking into the distance, after which he waved his hand and his squad went to the car."
 russia.839.a: "They're done for today."
 russia.840.t: "[FROM.GetName] Requests Civilian Investment"
 russia.840.d: "[FROM.GetAdjective] Authorities have been requesting a short-term investments on our behalf into their young economy to help it grow.\nThe talks with our advisors and interest groups have been going well, they already outlined areas of high importance for themselves.\nWe do need economically strong nations in our alliance.\n\nHowever, our capital will be spent, without momentary benefits to us specifically, and maybe our resources are better spent somewhere else..."
 russia.840.a: "Anything to help a brotherly nation"
 russia.840.b: "We can't spare anything at the moment..." 
 russia.841.t: "[FROM.GetName] Requests Military Investment"
 russia.841.d: "[FROM.GetAdjective] military has asked us to help their fledgling forces grow stronger. They want our support in equipping them with advanced weaponry and assisting in building their own domestic defense industry.\nWe need reliable allies with strong militaries to safeguard our shared security.\n\nHowever, our capital will be spent, without momentary benefits to us specifically, and maybe our resources are better spent somewhere else..."
 russia.841.a: "Anything to help a brotherly nation!"
 russia.841.b: "We can't spare anything at the moment..." 
 russia.842.t: "[FROM.GetName] Requests Army Advisors"
 russia.842.d: "The military command of [FROM.GetName] has requested our assistance. They want our military experts and instructors to share our superior Russian strategy. Additionally, they aim to establish several battalions trained according to our army program.\nThis will help us establish more breathily relations with our allies, and help improve their overall fighting force."
 russia.842.a: "Anything to help out a brotherly nation!"
 russia.842.b: "We can't spare anyone at the moment..." 
 russia.843.t: "On a Night Like This"
 russia.843.d: "How much time has been spent? How much labor has been invested? How much suffering did the Russian people experience? A lot. An inordinate amount. Any other country, perhaps, would have collapsed long ago, unable to withstand the turbulent, breaking the usual way of life, changes. Any other nation, quite possibly, would have given up long ago, breaking under the weight of such serious, sometimes even unbearable, trials. Any other, but not his.\n\nIn a moment, all the streetlights went out. The city fell asleep, but Nadezhdin continued his walk. Dolgoprudny, a city so close to him, had changed beyond recognition, and all thanks to him. How many other cities across Russia has he transformed? How many more to come? How many people has he given a chance for a happy life? \nThe callous bureaucrats of the past sneered at him every time he tried to fight for the rights of his people. "It's none of your business." "Your fight is pointless." - Those phrases ran through his head over and over again. Back then, he was just a teacher, a small-time MP. Now, he was writing history. Boris stopped, raising his head up. The moon, which lit his way in the darkness, seemed something familiar and close. It was a familiar celestial body that influenced the lives of all mankind every day. We used it as a guide, we prayed to it, and we strove for it. All this, about a simple block of rock! That's all! How can a simple unremarkable boulder become important in this world?\nNadezhdin smiled broadly. Forgetting about the cool wind blowing on him, he felt a gentle warmth.\nMaybe now he was also a kind of boulder?"
 russia.843.a: "Anything is possible..."
 russia.844.t: "Our Party"
 russia.844.d: "The process of dismantling the ONF has begun. It is time to destroy this mechanism of stagnation and political apathy in our country! Having taken the first step, we ostentatiously left the front and called on the entire population of the country to activate a civic position. But after that it turned out that our movement needed a name. A catchy and interesting one, to catch people's minds. To let them know that there is a party that stands up for their interests! Fortunately, we already have a few options in mind."
 russia.844.a: "Civic Union"
 russia.844.b: "All-Russian Civic Front"
 russia.844.c: "Party of Hope"
 russia.844.e: "United Right Forces"
 russia.844.f: "Liberal Party of Russia"
 russia.844.g: "Fight, Nadezhdin!"
 russia.845.t: "ONF Anti-Corruption Purge"
 russia.845.d: "Everyone knows exactly how the People's Front works. Kissing goes by favor. You join it, earn new acquaintances and then help someone in return. And as usual, you divide the profit in half. Only this shameful practice leads to the fact that the country's budget is spent on absolutely unnecessary movements and money changes hands. Not to mention that some of the initiatives exist simply to make the pocket of their proposer and his friends a little tighter. And how can the state apparatus function effectively in such conditions?\n\nWe won't take it anymore! With his new decree, President Boris Nadezhdin has ordered major investigations into corruption in the front. Every tax return and every case of allocation of funds will be scrutinized and verdicts will be reached. Of course, this initiative has already met resistance from the ONF. Thus, the current president was accused of a "witch hunt" and playing the populist. Let them keep shouting about it. After all, if they are innocent, they have nothing to fear, right?"
 russia.845.a: "Excellent"
 russia.846.t: "Expanded War on Corruption"
 russia.846.d: "A dozen reports were once again on Nadezhdin's desk. Each of them was about embezzlement of state funds. The GUEBiPK were clearly eating their bread for a reason, and things were going well. But with each case, the incumbent president became convinced of one thing. The scale of corruption in the front was simply immense. And for days now, requests for increased powers for the staff of the anti-corruption committee were delivered to the president's office. Of course, a total fight against corruption sounds tempting at first glance. But the long-term prospects of such a strong reinforcement may not have led to the best results either. Eventually, the committee could become a new force for political blackmail and its members could even turn to a perverse form of racketeering. And we clearly do not need a new repressive apparatus with serious autonomy and powers. The times of the NKVD are long gone. However, maybe these fears are actually groundless, and our country needs a strong anti-corruption agency now more than ever? "
 russia.846.a: "There's no need to go overboard with this."
 russia.846.b: "Corruption can only be defeated with an iron grip."
 russia.847.t: "Government Focus"
 russia.847.d: "Boris Nadezhdin is finally in power and it is time to choose a temporary direction for the government.\n\nOn the one hand, it is possible to concentrate on supporting cultural activities. After all, there has often been an opinion about the so-called "decline of traditions" in modern Russia. Maybe this is our chance to bring the moderate right-wingers to our side? And the common people will certainly like this initiative.\n\nOn the other hand, we can concentrate on supporting business. It'll help strengthen the economy. And what better influences the mood of ordinary people than the availability of goods?\n\nWe can also concentrate on harmonizing our government. The arrival of a reformer like Nadezhdin will undoubtedly lead to a certain ferment in the government. And if we allocate resources in advance to get the machinery in order, we can hedge our bets and prepare for certain problems that may arise."
 russia.847.a: "Let's focus on cultural activities."
 russia.847.b: "Let's focus on business support."
 russia.847.c: "Let's focus on harmonization of government."
 russia.848.t: "Triumph"
 russia.848.d: "Boris Borisovich slowly left the Senate Palace. The musty air and the odor of constant intrigue was beginning to get on his nerves, and he had long ago wished to get some air. The blue moon in a cloudless sky illuminated the Kremlin paving stones with its soft light. Wasn't this the perfect weather for a walk? Nadezhdin reached into his jacket pocket and pulled out a slightly crumpled pack of cigarettes. After a minute, smoke drifted from the edge of the cigarette, and Boris took a deep puff. The strength slightly burned his throat, and his nerves calmed down a little. How he had changed more than one party and ended up in the circle of Dmitry Anatolyevich's confidants. How he ended up as Medvedev's heir. How he was not afraid to challenge the ONF and how he... won. Still, there was something poetic about it. The story of a man who fought for his ideals to the last and ended up on a horse. Now he was the president and the most powerful man in the country.\n\nNadezhdin chuckled to himself and put out his cigarette and looked at the moon again. It was always so close, illuminating the planet with its light, but so far away that no one could reach it. Now, however, Boris believed that he could touch it with just a little bit of effort. After a little more walking around the Kremlin, the president decided to return to his residence. Tomorrow would be a new day and there would be a lot of work to do. And today?"
 russia.848.a: "I gotta say, it was a good day."
 russia.849.t: "Downfall of ONF"
 russia.849.d: "It has happened! Today the executive committee of the ONF Mikhail Mikhailovich Kuznetsov at the regular meeting of the State Duma officially announced the dissolution of the coalition. Of course, the official reason was the obsolescence of the front and a sharp increase in the initiative of deputies. However, everyone was well aware of major anti-corruption cases and sabotage by the current Russian government and President Nadezhdin. Afraid of repeating the fate of their less successful comrades, the deputies began to leave the front en masse, until there were eventually too few people there to continue their normal existence. Of course, the collapse of the front led to a temporary political vacuum, which would soon be closed by new parties. Thousands of Russians gathered for rallies in cities celebrating this action. Now the slogans "Down with equalization!" and "To hell with the front! It's time for the home front!" are heard all over the country. And the popular reaction shows that this is a victory not only for Nadezhdin and his support group in the ruling party. It is a victory for the whole of Russia!"
 russia.849.a: "Democracy is taking leaps and bounds."
 russia.850.t: "Aftershock"
 russia.850.d: "Boris Nadezhdin walked, practically sprinted out of the senatorial palace building. His heart pinched, and it was as if the walls of the building were slowly shrinking.  The air from the street refreshed his head a little, but it was not enough. The shaking man fumbled for a lonely cigarette in his jacket pocket and lit it. The strong tobacco warmed his throat, and an unpleasant burnt odor hit his nose. After taking a few puffs, Boris felt a little easier to breathe. Taking a breath, he tried to look up at the sky, but couldn't. The needle-sharp pain of the attack echoed in his brain with a stabbing sensation in his brain. He was tired, tired of nodding, tired of agreeing. This wasn't what he'd promised people and this wasn't why he'd gone into politics.\n\nAnother puff. His thoughts slowly began to clear... What a fool he was, wasn't he? Thanks to luck, he'd made it into Medvedev's friends and thought he could do anything, as if he'd forgotten how many times he'd fallen and made mistakes before. Ha! The Russian system has already grinded up more than one or two such dreamers. Guess that was the only way.\n\nBoris Borisovich leaned against the brick wall, he felt his body become heavy and unbearable, his hand let go of the cigarette and his body slowly began to slide down."
 russia.850.a: "Damn."
 russia.851.t: "Fight, Nadezhdin!"
 russia.851.d: "At the next meeting of the State Duma, Boris Borisovich was unusually sullen. It was hard to get used to his new role. There was no point in fighting. And what could he do? He had already missed his chance. If he'd had one in the first place, and not one he'd made himself. And when he got home late at night, he just collapsed on the bed, exhausted. Tomorrow would be the same boring day. And then another and another. Before going to bed, he decided to poke around on his phone for a while. Suddenly he saw something unusual in his newsfeed. A video of a rally in Moscow, where hundreds of people came out with banners and placards. The waving tricolors were sometimes visible among the rows. Specifically in the moment captured on the video, the entire crowd in unison chanted "Fight, Nadezhdin!". Nadezhdin looked at the news and saw that this was not an uncommon action. People in many cities were taking to the streets just to support... him? So... all is not lost. And really, Boris hasn't given up when he's lost in the past. So why should anything be different now? His fight wasn't over yet. He wasn't fighting for himself and his friends, he was fighting for the people of Russia."
 russia.851.a: "Fight or lose."
 russia.852.t: "Disunited Coalition"
 russia.852.d: "Our actions have led to an appalling decline in the ONF's cohesion. Different sides of the front are constantly proposing their own initiatives and blocking others, completely paralyzing any activity. The Duma is mired in disputes and is barely able to function. If we want to continue stable rule, we need to avoid such incidents as often as possible."
 russia.852.a: "We'll have to negotiate."
 russia.853.t: "The Tamed Leviathan"
 russia.853.d: "When Boris Nadezhdin became president, the ONF got in his way. The eternal, immovable coalition that suppressed any attempts at reform in the country. As if a beast from biblical legends, it entangled all spheres of political life. But Boris Borisovich did not give up. After all, if he had retreated at the first setbacks, he would never have found himself in the place of the president of the Russian Federation initially. Step by step he excluded the superfluous from the front. Radicals, supporters of the status quo. All of them were not necessary for a free and prosperous country. And now, seemingly invincible, the beast has bowed its head. Now the ONF reflects the will of the Russian people and consists mostly of moderate reformers loyal to Nadezhdin. History continues and now it will be written by the people together with Nadezhdin."
 russia.853.a: "And we play out our last scene."
 russia.854.t: "Transparent Government"
 russia.854.d: "One of the initiatives of the Nadezhdin reform program is to increase transparency in the work of government agencies. The ONF generally supports the president's proposal, but there are disagreements within the coalition about how this reform should be implemented.\nThe right wing of the ONF insists on the phased implementation of the principles of openness, expressing concern that sudden and hasty changes could destabilize and even partially paralyze the work of the government. At the same time, more radical positions are being voiced from the left flank: supporters of drastic measures are convinced that the reform will have a real effect only if all officials involved in corruption and questionable cases are immediately removed so that new, ideologically motivated personnel can take their places.\nDespite the different views, the discussion should not reach an impasse, therefore, as a result of the meeting of the State Duma, it was decided..."
 russia.854.a: "Slowly reform the system."
 russia.854.b: "It's time to kick out all the parasites!"
 russia.855.t: "Pension Programme"
 russia.855.d: "Pension reform has become one of the most discussed areas of the current reform policy. The President has clearly outlined a course to review pension policy, and the Popular Front coalition, despite the general support, shows different approaches to achieving this goal.\nThe conservative wing points to the need to increase pension payments and social benefits. In their opinion, the improvement of the quality of life of the elderly population should occur without drastic changes in the current social system. Conservatives emphasize that budget sustainability is more important than short-term concessions and call for a balanced, economically sound approach.\nThe left, on the contrary, advocates a simple reduction in the retirement age, insisting that citizens have the right to a well-deserved rest earlier than stipulated by current norms. Their arguments are based on the principles of social justice and caring for the working person.\nBoth options have a basis, but it is also worth considering that our coalition must remain united, and therefore the decision must be made carefully."
 russia.855.a: "Increase benefits and pensions."
 russia.855.b: "Lower the retirement age."
 russia.856.t: "Tax Changes"
 russia.856.d: "The consideration of tax reform has become another stumbling block in the Nadezhdin government. The proposal coming from the president received majority support, but immediately showed discrepancies within the coalition: the issue of redistributing the tax burden affected both economic priorities and the ideological foundations of the poles of the ONF.\nThe right wing of the Front advocates the introduction of tax holidays for small and medium-sized businesses, emphasizing that this will give the economy the necessary boost, stimulate entrepreneurial activity and create new jobs.\nOn the other hand, leftist forces insist on the introduction of a progressive scale of taxation. In their opinion, it is a fair redistribution of the tax burden that can eliminate social inequality and provide additional funding for existing social programs.\nAlthough both proposals have their pros and cons, it is necessary to take into account that the position of each wing of the coalition as a whole must be taken into account."
 russia.856.a: "Introduce Nadezhdin tax holidays."
 russia.856.b: "Introduce a progressive tax."
 russia.857.t: "Anti-Monopoly Programme"
 russia.857.d: "The antimonopoly program proposed as part of the Nadezhdin reforms has become one of the topics that has caused widespread agreement within the Popular Front. Recognition of the need to curb the influence of large corporations has been voiced on both the right and left sides of the coalition, but the extent of acceptable government intervention remains controversial.\nThe right wing insists on a cautious approach: they stress that excessive pressure on big business can cause unpredictable consequences and slow down economic development.\nThe left, on the contrary, requires more drastic measures. In their opinion, only strict restrictions and the active intervention of antimonopoly authorities can restore a fair market environment and guarantee the protection of the interests of citizens and small businesses.\nThe issue remains quite sensitive, and therefore, following a meeting of the State Duma, it was decided..."
 russia.857.a: "Impose restrictions."
 russia.857.b: "Impose strict restrictions."
 russia.858.t: "Behind the Scene"
 russia.858.d: "When Vladislav Davankov entered the president's office he was greatly surprised. It was a bit cramped, but generally cozy. Music was coming from a vinyl player, golden rays of light penetrated into the office through a large window. The president of the Russian Federation himself stood right in front of this very window looking somewhere in the distance. It was only when the door slammed shut that he turned around. \n\n- Oh, hello, Vlad, sorry, I was staring. - Boris turned around and quickly approached the guest, then extended his hand. \n- Hello, Boris Borisovich, why did you call me? - Vladislav said with a slight smile. Nadezhdin's handshake turned out to be surprisingly strong, and the head of the new people was even taken aback for a second. \n- Oh, believe me, we have a lot to talk about. Let's just sit down for starters. \n- Once at the table, the president pulled out a thermos and two mugs.\n- I see you're prepared.\n- Can't do it otherwise. If you plan to change something, you have to prepare in advance. - Boris has a meaningful smile on his face. - So, let's start with your opinion on the new reforms..."
 russia.858.a: "I told you, these days are great."
 russia.859.t: "The Second Nadezhdin Government"
 russia.859.d: "The ONF was by no means a bad idea in itself. It's just that its previous leadership was... incompatible with our current vision of Russia's future, and it's time for a cabinet reshuffle.\n\nThe most difficult, of course, will be the choice of a new prime minister.\n\nOn the one hand, there is Daria Besedina. The favorite of the "smart vote" in 2019, she was previously a member of the Yabloko party, as well as a member of the Moscow State Duma. Daria has a clearly expressed liberal position and has repeatedly spoken out in favor of expanding and protecting the rights of Russian citizens, including, for example, the rights of people with non-traditional orientation. Appointing a woman prime minister, and even with such an active position, will prove to everyone that Nadezhin has brought real change.\n\nOn the other hand, we can turn to a more confident option. Dmitry Kisiev, a Crimean activist and young politician, who before Putin's death helped many liberals in organizing election campaigns, and under Medvedev seriously helped Nadezhdin himself. He is a man ready to take on the challenge and will definitely not let us down in his new post."
 russia.859.a: "Darya Besedina will be a new prime minister!"
 russia.859.b: "Dmitry Kisiev will be a new prime minister!"
 russia.860.t: "Poker Night"
 russia.860.d: "Nadezhdin's office was well lit despite the night outside the window. Two men were sitting at the table, and on one side was the incumbent president, Boris Nadezhdin himself. On the other was a young politician who had recently become a full-fledged member of the ONF and a popular blogger, Maxim Katz. They spent their time playing poker as befits decent gentlemen.\n\n- I must confess, Maxim, I did not expect you to be able to garner so much support so quickly.\n- Well, Boris Borisovich, you know very well how it is in our country, a voice that speaks the truth will always get an audience. And this audience will then gladly support an honest man, won't they? - Maxim smiled slightly.\n- Is that it? That's interesting. And yet I'm a little surprised that even despite your emigration during the beginning of the special operation...?\n- I'm sorry, but I've always said that first of all I'm a Russian politician and I represent the interests of the people of Russia. My second citizenship in this regard does not constrain me in the slightest.\n- Yes, ahem, sorry, I didn't think of that. - Boris looked at his cards. - What would you like to change in our country?\n\n- We understand the country needs major reforms, in the social sphere, in the structure of the ONF, among other things....\n- Can you clarify?\n- It'll be a long conversation, and you're a busy man.\n\n- Am I? - Boris smiled good-naturedly and then took out a thermos from under the table. - You know, politics is like poker - it doesn't like to be rushed."
 russia.860.a: "Smile like you mean it."
 russia.861.t: "Heir"
 russia.861.d: "In any case, Boris Nadezhdin is not eternal. And he is not going to stay in his post for too long. Sooner or later he will have to leave, and it is necessary to think in advance who will be his successor, but the choice is not easy, and it takes a lot of time to think through who will represent the people of Russia."
 russia.861.a: "Besedina"
 russia.861.b: "Kisiev"
 russia.861.c: "Katz"
 russia.862.t: "Talks With Besedina"
 russia.862.d: "After the next session of the State Duma, Daria Besedina came out tired. Leaning against the wall, she took a deep breath and then exhaled. A breath of fresh air gave a little clarity after the loud session. And then the woman felt something touch her shoulder. When she shifted her gaze, she noticed Boris Nadezhdin himself beside her.\n\n- How are you, Dasha, are you doing all right?\n- Yes, Boris Borisovich, everything is fine. Just a little tired.\n- That's right, you should always rest. - Nadezhdin looked meaningfully into the distance and then looked Daria straight in the eyes again. - You know, your smile suits you so well, just like my Katya.\n- Really? - The woman smiled embarrassedly, it wasn't every day you got such praise from the president of the Russian Federation.\n- Really, really. - Nadezhdin smiled broadly and then nodded. - Remember this. I've lived a long time and I understand something. Never change your principles, or before you know it, you'll become a completely different person. And then you'll be disappointed in yourself. So never lose your smile. And don't pay attention to evil tongues. They'll always be there.\n- Thank you for the guidance... I'll be sure to heed it!"
 russia.862.a: "Look for a purpose in life, don't look for a reason!"
 russia.863.t: "Smoke Break with Kisiev"
 russia.863.d: "Ironic, but the State Duma building was not equipped with a special "smoking room" deputies had to go out to a special pavilion near the entrance of the lower house. This is where Dmitry Kisiev sometimes spent his time, especially after tense sessions. And so, during another such sitting, Nadezhdin himself looked under the glass roof of the pavilion.\n\n- Oh, Dima, do you mind if I stay here for a while?\n- What are you talking about, Boris Borisovich? Of course I don't mind. How could I refuse the President of the Russian Federation?\nNadezhdin carefully sat down on the bench next to him and sighed heavily.\nDmitry put his hand into his jacket pocket and then handed Nadezhdin a pack of cigarettes.\n- Come on, I've got my own. - Boris took one cigarette out of his pack and lit it, then took a deep puff. - And yet how life has changed in how many... six years have passed since Vladimir Vladimirovich was gone? You, Dima, probably didn't even think you'd be smoking in a place like this. Ha!\n- That's true. I started out as an activist, then I helped ideological people with organizing campaigns...\n- But if things had turned out differently, maybe you could have helped me organize them too.\n- Hmm, I'm afraid I'd have to Google your name first.\n\nThe laughter of the two men echoed through the glass pavilion. It seemed that stress and anxiety had briefly receded, there were no problems in the ONF, just friends sitting and smoking together.\n- And yet, Dima. - Nadezhdin's look became serious and even the blush disappeared from his face. - Life is such a thing, you don't know what will happen next. The main thing is to make a choice that you won't regret. I've never regretted mine.\n- Neither have I."
 russia.863.a: "Got to keep it moving straight."
 russia.864.t: "In The Hall of The Champion"
 russia.864.d: "Boris Nadezhdin went into his office early today. There was no particular reason or need, he just decided to come to work early. The President took off his jacket, put a record on the gramophone and sat down in his chair. The room was nevertheless a little hot. For a moment the thought of undressing, as it was rare for anyone to come into this office early in the morning anyway, flashed through his mind, but this idea was almost immediately dismissed as absurd. Still, deciding to do something about the problem, Boris went to the window. The warm yellow rays of the sun were slowly spreading over the still not fully awakened Moscow. The garden outside the window was beautiful.\n\nThe fresh air quickly rushed into the office, and the president was able to breathe in a full chest. That must have been how freedom felt. And millions of Russians were able to breathe in the same way under Nadezhdin's presidency. And that view, it was so beautiful... I wanted to admire it forever.\n\nBut was it worth it? Of course, the view was beautiful this time and it will be beautiful next time. But what about the tenth time? No! The hundredth time? Will it give the same beautiful sensations? Nadezhdin's reforms were a breath of fresh air for many, but what would happen next? The president himself made it clear that he was not going to cling to his chair, and it would have gone against the policy he had been pursuing all his term. In the end, someone will inherit his place and it is better to think about it in advance...\n\nBut I guess this case could wait. Nadezhdin has earned his moment of peace."
 russia.864.a: "I wonder what future holds..."
 russia.865.t: "The Power of Music"
 russia.865.d: "19:07 Moscow time, Dekabrist Street, 8. A huge crowd of people was slowly thinning out in a seemingly endless line to the polling station. After the victory over the North Atlantic Treaty countries, the Russian government again decided to play democracy and hold presidential elections. Even though everyone realized to themselves that these elections would be no different from the previous ones, many Russians felt it was their duty to demonstrate their position, even if it meant waiting in line for hours while enjoying the not-so-pleasant sounds coming from different parts of this line of voters.\n\nSuddenly, as if out of the blue, a voice - the voice of hope - was heard from behind.\n-Well, friends, aren't you cold yet? \n- One of the candidates - Boris Nadezhdin - appeared next to the "election corridor" in his own person. His kind smile, slightly fogged glasses and neat jacket caused a strong and joyful reaction of the crowd. Nadezhdin looked around the crowd and grinned: \n-You've been waiting here for a long time, haven't you? I can see it from your tired but determined faces. I think I can try to cheer you up!\n\nThe daughter of Nadezhdin standing nearby, Anastasia, quickly assembled a folding chair, on which immediately sat the presidential contender of the Russian Federation. He took his guitar out of its case and lightly walked over the strings, remembering in his head the melody he wanted to play. Meanwhile, Nastya had already set up a microphone and small speakers next to her father. Swinging their arms, the Nadezhdins began to sing their song, which immediately began to warm the hearts and souls of those standing in line."
 russia.865.a: "Hope dies last."
 russia.866.t: "The Return of Orban"
 russia.866.d: ""
 russia.866.a: ""
 russia.867.t: "Dead Excitement"
 russia.867.d: "The president's unusual management style and bold reforms undertaken by his government often lead to unexpected consequences. One of the results of the reformatting of the political life of the country has become a second wind in the capital's casinos.\n\nThe budding entrepreneurs, modestly wandering like dogs on a leash, desperately follow the local bohemians and rising Russian politicians. Every Sunday night, they all invariably converged on the Moscow Gambling House. What was happening here was more like a ball than a gambling space. Someone eager to make new connections, someone is interested in constantly growing new details of scandals and gossip, and someone just wants to pass the time. Despite the variety of this company, for all the personalities here there is one unspoken rule, none of them are playing for large sums of money.\nAll daring fools who dared to attract the attention of the crowd, snapped a big score, caused only indifference and quiet condescension. Invariably, hours later, the young players joined the ever-expanding army of people who had lost their possessions, for whom the entrance to this place will be closed for a long time.\nWhile shattering the destinies of the next brave men and useless "creators" clinging to every man they meet, friendly people modestly watched this quiet feast, never drinking, never playing.\n- Sergey, do you have Markov on your list? \n- Yes, of course, why? \n- Cross him out, he just lost all the money in cards.\n- Ghh... Oh my God, I just met him today! Why didn't he sit still?\n- Forget about him, just keep following the deputies. When they get drunk, they tell you everything you need and don't need to know. Confirmed by yours truly.\n- Yeah, thanks! And I was just beginning to hope that there would be something interesting in this job..."
 russia.867.a: "He who doesn't take risks spends his money on champagne."
 russia.868.t: "Big Break"
 russia.868.d: "Exactly at midnight, deafening everyone present with an inarticulate scream, an unknown unkempt man burst into the crowded Casino hall, followed by his skinny assistant, who was barely carrying two briefcases full of money.\n- Steve, g..get the money out. W-what's this? A dollar, Steve? Throw this... pfft... Fucking suitcase away, and give me... hgghh... some real money.\nThe man, who had obviously too much alcohol, took the chips in his arms and, barely shuffling his feet, tried to find his way to the nearest gaming table, not paying any attention to others.\n- Hundred...\n- Mr. Green would like to bet 100,000, please.\n- M-more... I'l-I'll bet fve hndrd.\nThe noisy player sat with 18 points, the dealer scored 22. Bust! It's a win!\n- You win, Mr. Green!\nHe won? How? Time after time, he raises the bet and manages to come out a winner? That's not blackjack, that's stealing!\n- M-Mln... rbls...\nBet after bet, an intrigued crowd gathered around the noisy foreigner. The mere sight of his sickly skin color should have scared away those present, but wild interest prevailed over people's consciousness. Over time, all the attendees gathered to watch the foreigner's game.\n- MORE! TEN! I'll bet! T-ten!\n- 16, Mr. Green. You got 16, - Steve whispered quietly.\n- Hhhh... I... I can't. It's too much. H-heart... Ahhhh... - The player mumbled, losing consciousness.\n- Mr. Green? Mr. Green, are you okay? He's not answering. Looks like he hit his head on the table. I think, uh. That counts as a move. Card!\nGritting his teeth, the trembling dealer did what he had to do. Five.\n- TWENTY-ONE! MR. GREEN! You win! 20 million is yours! Mr. Green! Get up!\n- Uh... y-yeah. sure... B-better... Take me h-home... I don't feel, kghhhh, so good.\n-Your heart? For the third time in the last three days? You should take care of yourself, Mr. Green, come on, I'll take care of everything.\nLeaning on his assistant, the unusual man rushed towards the exit, scattering his newly earned chips towards the mesmerized onlookers.\n- Y'know, S-Steve... I'm a good tipper... H-here's. Hhhh... Here's... Five Rubles...\n- Whoa! Thank you, Mr. Green.\n- No problem, Steve. After all, you always bring me luck!"
 russia.868.a: "This man made an incredible impression on those around him."
 russia.868.b: "In the end, the main observers, were the law enforcers."
 russia.869.t: "American Recipe"
 russia.869.d: "- Mr. Green? There are dozens of people standing in the street, they want to meet you! Honestly, I don't know who they are, but they're, uh.\n- Competitors... Steve, they're trying to destroy us. I'm not gonna let our work turn to ash again. I'll go out to them, but as soon as they do anything to me, just run...\n- Mr Green!\nAn American businessman opened the doors of his business and stepped out into the bustling crowd. He was not drunk, but simple steps were difficult for him. He took a fighting stance and prepared to defend his creation.\n- Mr. Green! It's really you! You are an incredible inspiration to us all!\n- Mr. Green! Do you remember me? A month ago, you gave me some of your money! I'd like to thank you! Here! Here take this!\n- Jeremy! You look as good as ever! That's quite a business you got going on. Do you need any help? I'm ready to buy up everything you've got!\nThe factory owner had little understanding of Russian, and he could hardly distinguish the jagged phrases of the people shouting at each other, but at that very moment he felt a strange relief.\nA few years ago, his business was ruined, robbed, and destroyed. For a long time, along with his faithful assistant, he had wandered the world in search of shelter, but now? No more hardship and suffering, no more worry and loss. Had he really found his home here?\nAfter gathering his thoughts, Mr. Green straightened up, squared his shoulders, and smiled at those present. Sensing the attention, he said confidently:"
 russia.869.a: "How about a little charity?"
 russia.870.t: "Tax Declaration"
 russia.870.d: "- Why did I send you to that goddamn casino? To relax? So you could report some bullshit to me? What did a simple American drunk do to you? Huh? You're looking for spies in the wrong place!\n- Comrade Major, but you said yourself... To report, to take decisive independent action if necessary, to vigilantly guard and defend socially important facilities of our state and the people there.... As instructed!\n- As instructed? Why did you lock him up? What did he do? Scare the dealer? Drive the owner crazy? Lieutenant! Maybe he was going five kilometers over the speed limit, too. Just tell me! I'm always happy to help! You'll go from FSB to traffic police in no time!\nThe Motherland has entrusted you with a particularly dangerous and important task of protection and intelligence gathering! It's a secret mission, Lieutenant! DO YOU UNDERSTAND ME? What if it was a diversion? What if the enemy took advantage of your negligence and broke into the building with weapons? Huh?\n- Comrade Major, the evening was going smoothly, and then two screaming vandals burst into the hall! We decided to capture these highly suspicious foreigners! We couldn't turn a blind eye to their antics! We don't even know who they are!\n- Exactly! You have absolutely no idea who they are! Well, I do! A sick, old high blood pressure guy and his buddy, advertising the nearest gym with his slimy face! THAT'S WHO THEY ARE!\n- But we're...\n- You're ... What's the result, eh? 10 thousand? You mean to say that a man who won 20 million in a casino overnight didn't have time to pay 10 thousand rubles in taxes? That's your world criminal? Let these poor bastards go free! If they can even make it to the exit by themselves. Get out of here.\n- Yes, Comrade Major."
 russia.870.a: "Sergey, I think we overdid it a little bit."
 russia.871.t: "The Mysterious Green Man"
 russia.871.d: "A few weeks had passed since the moment when the mysterious foreigner had burst into the capital's casino, and, after making a fortune, had instantly disappeared as if nothing special had happened. Regular measured evenings were getting more and more boring, political squabbles and dirty scandals receded into the background. Every time people came to this hall, they hoped to see a miracle again - a shouting, unkempt businessman who knew no defeat - a fleeting symbol of fabulous wealth.\nGradually, all conversations began to come down to this incident. Some tried to raise their contacts to find the mysterious American, others talked to their acquaintances, and to their own surprise learned that the successful player had methodically traveled all over Moscow, visiting one gambling establishment after another, and each time with unchanged success.\nAt one point, a confident voice came from the gathered crowd:\n- Jeremy Green! That's his full name. With the money he made, he recently bought a chocolate factory two hours from here. There's your answer!\nThe mysterious guy, who revealed the secret to people, apparently wanted to extinguish interest in the identity of the American and move the conversation in another direction, however, the effect was quite the opposite.\nThe next morning, dozens of expensive cars rushed to the factory. The desire to learn business secrets? Expecting to see something supernatural?"
 russia.871.a: "Most likely, people were motivated by trivial interest."
 russia.872.t: "The Express Train"
 russia.872.d: "For a long time Vladimir Vladimirovich has not traveled by train, preferring airplane for business trips. But this time, returning from a visit to St. Petersburg, his hometown, he decided to take a special flight. After having dinner and taking medicines prescribed by the best doctors, Vladimir Putin was fascinated by the view from the window. Forests, fields, rivers and small villages of the big country floated in front of his eyes.\n\n- Do you need anything, Vladimir Vladimirovich? - the bodyguard asked his boss before going to bed.\n\n- No, thank you, Misha. Get some rest. - Putin replied to him in a calm, measured tone, and Mikhail left in the direction of the security compartment.\n\nBut Vladimir Vladimirovich's mind did not rest for a second. He was thinking about the future of his country, his native Russia. The foreign policy situation seems to be as good as possible for its future: America, the "winner" of the Cold War, is being torn apart by a horrifying civil war. This has left Europe alone with Russia, and conflict is surely inevitable. The Minsk agreements only froze the Ukrainian problem, not solved it completely. And he was afraid that the country would not be ready for a big war. There was a cough. That crappy cough that had been plaguing him for quite some time. The diagnosis was scary in its directness: Covid-19. Given his age, the nature of his illness and the stress of ruling the country for more than twenty years, Putin was beating the last months out of death. So much to do, and so little time.\n\nSuch a window of opportunity may have never been seen in Russia's history. Multipolarity, the Russian World, the return of former greatness..."
 russia.872.a: "The train went on and on..."
 russia.873.t: "Memories"
 russia.873.d: "He was still young and full of energy: he was only in his second term, the horror of Dubrovka and Beslan had already passed, the Russian economy had recovered from the ruins of the nineties. People began to believe for the first time in a long time that the years of deficit, instability and fear were finally over. And it was so.\n\nRussia in Pristina showed NATO that the talks would be conducted on an equal footing, without "Bush's chicken legs" and other handouts from the West. Russia seeks cooperation and sovereignty, not subordination; it adopts the best and does not blindly copy the mistakes of Europe and America. Cooperation with the East only makes it stronger and stronger, makes it a bridge between Europe and Asia, connecting the continents. Indeed, Russia is a country of opportunities. Opportunities for everyone and anyone who will sincerely love it and who will fall under its warming arms.\n\nIn future Russia will face the world crisis, Maidan and the war in Donbass, sanctions have not fallen on it, Pandemic has not swept the world. But all of this will be in future, and Putin could not have known about it. Russia was on the road to happiness, and Vladimir Vladimirovich Putin, its president, was leading his country along this path."
 russia.873.a: "In the moment, he was only enjoying the sunshine."
 russia.874.t: "War Damage Assessed"
 russia.874.d: "War is accompanied not only by victories, but also by awareness of the significant scale of damage caused by opponents.\n\nThis military campaign is the largest in Europe since the Great Patriotic War. The relevant Ministries have already assessed the damage caused to various regions. The greatest damage was inflicted on new territories, including Narva and Dvina regions, as well as regions of the Republic of Belarus. Significant damage was recorded in Kaliningrad and the Pridnestrovian Moldavian Republic, and the Crimean Peninsula was also seriously affected. However, Novorossiya suffered the most serious damage. The damage is estimated at billions of rubles, and the process of restoring these regions will require significant efforts and resources.\n\nExperts express confidence in the ability of the Russian Federation to cope with this task. The availability of human resources and economic opportunities makes it possible to return these territories to normal functioning. In the future, Novorossiya should become one of the most dynamically developing regions of the Russian Federation."
 russia.874.a: "We won the war. We will also win in a peaceful life!"
 russia.875.t: "New Co-Chairman of the Union State"
 russia.875.d: "As time progresses, it's crucial to consider updating our Union State's leadership. Delaying this task is perilous. A new leader could revitalize our relationship with Belarus and offer innovative approaches to managing the union's affairs. Moreover, they will soon assume the presidency of Belarus.\n\nThere are promising candidates from Belarus's political scene who could fill this role."
 russia.875.a: "Victor Lukashenko."
 russia.875.b: "Nikolay Ulakhovich."
 russia.875.c: "Oleg Romanov."
 russia.875.f: "Anna Kanapatskaya."
 russia.876.t: "Kremlin Towers"
 russia.876.d: "In the upper echelons of the Kremlin, a constellation of powerful figures forms the so-called "Kremlin Towers," a metaphorical framework of interests and ambitions within the state. These factions can be described in various ways, with some identifying only two-Liberals and Hardliners-while others suggest up to ten. The most commonly accepted view is that there are at least four key groups: Siloviki, Technocrats, State Liberals, and Neo-Tsarists.\n\nEach of these factions pursues its own agenda, but their diverse approaches to governance allow the Kremlin to selectively favor one over another, depending on the needs of stability. To maintain equilibrium, no single group can dominate; they must either alternate in influence or be temporarily ignored. After all, they are merely advising the administration."
 russia.876.a: "Promote Siloviki Cadres."
 russia.876.b: "Promote Technocratic Cadres."
 russia.876.c: "Promote State Liberal Cadres."
 russia.876.f: "Promote Neo-Tsarists Cadres."
 russia.876.k: "Not feeling like supporting one of them today." 
 russia.877.t: "State Duma Elections of 2021"
 russia.877.d: "According to the CEC, the final turnout in the elections was 51.72%.\nAccording to the results of the elections to the State Duma, the United Russia party receives 324 mandates (thus, the party has a constitutional majority), the Communist Party of the Russian Federation receives 57 mandates, Just Russia For Truth - 27, LDPR - 21, New People - 13. The Civic Platform, Rodina and the Party of Growth each receive one mandate. Self-nominated candidates receive 5 mandates.\n\nPolitical scientist, Director of the International Institute of Political Expertise Yevgeny Minchenko in a comment to Gazeta.Ru" called the last campaign "very interesting" and noted that it had several agendas.\n"On the one hand, it's protective and conservative, and it resonated with a significant part of the electorate. On the other hand, there is an opposition agenda, in which there was a struggle between several political forces - parties that are now going to parliament," the expert said.\nThe third agenda, according to him, was the struggle of the old and new parties. The New People party managed to become one of the poles, judging by the meager percentages that other relatively new projects received, he concluded.\n\nThe new People became the new party in the Duma. Their platform is built on communitarianism and business-oriented rhetoric."
 russia.877.a: "We welcome the newcomers."
 russia.878.t: "New Duma Chairman"
 russia.878.d: "The Duma Chairman has a pivotal position overseeing the daily operations of Russia's legislative body. These politicians have their own agenda and priorities within their political strategy. They will try to implement their own specific approach to the job.\n\nThe candidates all belong to the same party that currently holds power in the country."
 russia.878.a: "Volodin."
 russia.878.b: "Boyarsky."
 russia.878.c: "Gordeev." 
 russia.878.a1: "Makarevich."
 russia.878.b2: "Aksenenko."
 russia.878.c3: "Drapeko."
 russia.879.t: "New United Russia Leader"
 russia.879.d: "The leader of United Russia's Duma faction wields significant influence over the party. Alongside the council, they shape the party's direction and adapt its program. Depending on who leads, they may introduce their own priorities or personal ambitions into the party's activities."
 russia.879.a: "Tolstoy"
 russia.879.b: "Vasiliev"
 russia.879.c: "Valyev"
 russia.880.t: "New People's Russia Leader"
 russia.880.d: "The leader of People's Russia's Duma faction wields significant influence over the party. Alongside the council, they shape the party's direction and adapt its program. Depending on who leads, they may introduce their own priorities or personal ambitions into the party's activities."
 russia.880.a: "Kabyshev."
 russia.880.b: "Lantratova."
 russia.880.c: "Tatarinov."
 russia.881.t: "New ONF Administrator"
 russia.881.d: "The ONF Administrator holds a pivotal position, overseeing the All-Russian People's Front's daily operations. While they operate without ideological constraints, their focus remains on their specialized field. Given the state's current needs, it is essential to choose the most fitting responses. They report directly to the President, who also leads the ONF."
 russia.881.a: "Kuznetsov."
 russia.881.b: "Yarovaya."
 russia.881.c: "Gromov."
 russia.881.f: "Peskov."
 russia.881.h: "Vaino."
 russia.882.t: "New ONF Political Commissar"
 russia.882.d: "The Political Commissar acts as an advisor to the presidential administration, focusing on political strategies and public relations. They have their own goals, but all of them aim to work within the framework of the ONF's platform system. Their ambition is not radical change, but rather a series of gradual, incremental adjustments."
 russia.882.a: "Scholnik."
 russia.882.b: "Butina."
 russia.882.c: "Kosachev."
 russia.882.f: "Primakov."
 russia.882.h: "Isayev."
 russia.883.t: "New ONF Economic Commissar"
 russia.883.d: "The Economic Commissar serves as an advisor to the presidential administration, concentrating on economic matters and the relationship between workers and businesses. They have their own objectives, but all are designed to operate within the framework of the ONF's platform. Their goal is not radical transformation but rather a series of gradual improvements."
 russia.883.a: "Ryazansky."
 russia.883.b: "Komissarov."
 russia.883.c: "Kogogin."
 russia.883.f: "Kiriyenko."
 russia.883.h: "Krasov."
 russia.884.t: "New ONF Youth Commissar"
 russia.884.d: "The Youth Commissar acts as an advisor to the presidential administration, focusing on political engagement among young people and the state's relationship with this demographic. They have their own goals, but all are aligned with the ONF's broader agenda. Their aim is not radical change but a series of steady improvements."
 russia.884.a: "Potupchik."
 russia.884.b: "Nagorny."
 russia.884.c: "Demidov."
 russia.884.f: "Pavlyuchenkova."
 russia.884.h: "Taranenko."
 russia.885.t: "Rokirovka"
 russia.885.d: "Rokirovka in politics is the rearrangement of key figures in the political field without radically replacing them.\nMany had anticipated that Kurenkov's time in office would be brief, possibly the shortest ever. Their predictions proved accurate when he appointed Vladislav Surkov as Prime Minister. Now, Kurenkov's administration issued a terse statement announcing the president's resignation and Surkov's appointment as the nation's "provisional" leader.\nHowever, Surkov quickly restored Kurenkov to his previous position as head of government, upholding the longstanding Rokikovka tradition.\nInternationally and among some domestic observers, there is broad disapproval of the extensive "deep state" structure that elevated Surkov to power. Yet their voices remain unheard within the Kremlin walls.\n\nThe shadow master of the long-lasting state has finally emerged from the shadows to govern the nation fully."
 russia.885.c: "Business as usual."
 russia.886.t: "Surkov Recommends Alexander Kurenkov"
 russia.886.d: "In recent discussions with the president, Vladislav Surkov has proposed Alexander Kurenkov for a key government position. Surkov praises Kurenkov's extensive network, disciplined work ethic, and modest demeanor, considering him an exceptional candidate.\nKurenkov, with his background in the Ministry of Civil Defense and experience with both the FSB and FSO, brings significant credentials to the table.\nYet, some worry that Surkov's enthusiastic backing for Kurenkov may hint at ulterior motives."
 russia.886.a: "We'll see."
 russia.887.t: "A Sovereign State"
 russia.887.d: ""...Our homeland is rich in precious resources that are essential for the survival of modern civilization. Our people have worked tirelessly for many generations to develop and utilize these resources.\nHowever, for Western elites this is all that they see Russia to be, an object to be owned, sold and exploited. Since the times of Teutons and Bonaparte and Nazi invaders, aggressors have attempted to seize control of our country. Either they directly plunder our land or corrupt our political elite in order to gain control over it.\nNow that Russia has regained its independence, Western elites seek to subjugate us again. We must unite, stand together, and build a strong, sovereign state to protect ourselves. Only then can we ensure a bright future for our country and its people.\nIn this effort, we see that the ONF can provide our country with the necessary knowledge and expertise. This organization brings together a diverse range of people who can bring their own unique perspectives to the development of our Motherland. However, these discussions should not take the form of heated debates or become an obstacle to the government or Russia's progress. We welcome all ideas, provided that a compromise can be reached."\n\n- Excerpt from Dmitry Medvedev's speech at the ONF conference."
 russia.887.a: "Our strength lies in unity."

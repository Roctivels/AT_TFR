 russia.900.t: "Sunset in Tuva"
 russia.900.d: "Kyzyl, Capital of Tuva. The poorest region of the Old Federation. The regions greatest claim to fame was the great General Sergey Shoigu, a Tuvan by birth and a General at the top of the Russian military for years. But this man alone was the only pride the Tuvan people felt for many years. The youth increasingly lost interest in learning their native languages wishing to learn Russian and move West, where the work is.\n\nThe sun sets in Tuva on another day, the Russian tricolor has not flown above the school in many months. Salchak was walking home from class like any weekday, he hummed quietly to himself as he waited for his younger sister Larisa to catch up. Class always held her late. She appears with a big smile on her face and Salchak notices. "What has you so happy?" Salchak says.\n"The teachers tell me I don't need to learn Russian! I need to focus on Tuvan! Something about new rules from Moscow!" Larisa says with a cheerful tone. Salchak thinks to himself, he saw another autocrat in Moscow and thought about history as he had learned it in school. Every autocrat up to now had exploited or ignored the Tuvans. He didn't take Dugin to be any different. "Dugin wants us to learn Tuvan? That's what your teachers told you?" Salchak asks, "Yeah!", Salchak smiles. "You always did struggle with Russian."\nMaybe Tuva has a future after all."
 russia.900.a: "As foretold in Dugin's writings."
 russia.901.t: "The Fourth Political Theory"
 russia.901.d: "Eurasianism has long only been practiced at the foreign policy level by Russia, and at the philosophical level by Dugin himself, but administrative realities have forced Dugin to consider in his Moscow office how to proceed forward with the administration of the state. While the old Federal system is inadequate it is somewhat considerate for the minority peoples across Russia. Dugin thinks to himself about this, his time in the National Bolshevik Party as a founding member alongside Limonov defined the 90's, with his writings since having drawn in many others from conservative circles. History shows him many methods with which to administrate but only one can be adopted and may favor one wing of his party over the other.\n\nDugin calls in his friends, his confidants, his wife, they sit in the office and discuss ideas for hours. Three ideas come to prominence. Leaning into the National Bolshevik camp and restoring a pseudo-soviet system, a system proven to work under the right people and providing adequate autonomy to the various peoples of Eurasia. Likewise drawing from history, the system of General Governments, taken from the Tsarist regime where General Governors were assigned to regions, again this system could be revived to allow a form of Centralized Federalism, where the governors are appointed by the central government in Moscow but are picked to represent regional interests. The final suggestion that rose from the discussion was taking the old Federal System and enhancing it, balancing autonomy and authority is a hard thing to do but there's no reason Dugin and his lawmakers cannot draft a new kind of system altogether that guarantees the rights of all Eurasian peoples to their own language and land without compromising on central authority.\n\nDugin disperses the impromptu meeting, he needs to think long and hard about how to proceed with reforming the administration. The decision is ultimately his alone to make."
 russia.901.a: "Dugin's mind dances with possibilities."
 russia.902.t: "Scandal Involving the Emperor's Son"
 russia.902.d: "- Это совершенные разбойники, особенно Принц Ростислав, - говорила гостья. - Он сын Императора Ростислава, такой почтенного человека, и что же? Можете себе представить; они втроем достали где-то медведя, посадили с собой в машину и повезли к актрисам. Прибежала полиция их унимать. Они поймали участкового и привязали его спина с спиной к медведю и пустили медведя в Мойку; медведь плавает, а квартальный на нем.\n- Хороша, ma chere, фигура квартального, - закричал граф, помирая со смеху. \n- Ах, ужас какой! Чему тут смеяться, граф?\nНо дамы невольно смеялись и сами.\n- Насилу спасли этого несчастного, - продолжала гостья. - И это будущий Император так умно забавляется! - прибавила она. - А говорили, что так хорошо воспитан и умен."
 russia.902.a: "Tsar abstains from comments, Chancellor hushes up the matter."
 russia.902.b: "Tsar intervenes and makes a drastic proclamation!"
 russia.903.t: "Tsar's Popularity Among the Nobility is Waning"
 russia.903.d: "...Анна Павловна по-прежнему давала у себя в свободные дни такие вечера, как и прежде, и такие, какие она одна имела дар устраивать, - вечера, на которых, во-первых, собиралась la creme de la veritable bonne societe, la fine fleur de l'essence intellectuelle de la societe de Petersbourg...\nВот что указывал политический термометр на вечере Анны Павловны... разговор, руководимый Анной Павловной, шел о отношении высшего света к царю..."
 russia.903.a: "Tsar announces a big gathering with the nobles."
 russia.903.b: "Shut them up."

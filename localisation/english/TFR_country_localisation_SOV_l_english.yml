 russia.1001.t1: "Long And Happy Life..."
 russia.1000.b: "The Truth is on Our Side. Stay Free..."
 russia.1001.d1: "As peace begins to take hold across Europe, the sound of artillery fire and gunshots gradually fades away. After months of fighting, the Russians can finally breathe a sigh of relief, having survived the hardships of defeat and reconstruction.\n\nPushed into a corner, they chose unity and revolution - Eurasian unity and revolution. Eurasianism - the new liberation beacon of the modern age from vices of the past and present. People live united in common purpose and faith.\n\nFew people thought Russia would win such a war so soon, but the Russians have always surprised their opponents in the past, and they did so again.\nInstead of the hateful and globalist ideology of the European Union and NATO, Europe is breathing new life, western civilization will be restored to its formal glory, full of thinkers and poets, geniuses and works of art, thanks to the Eurasians, just as they freed themselves. Torch of Duginism shines brightly on the world stage. It has crawled a long way through destruction and devastation, but it has finally arrived, and the Eurasian continent is more united than ever before.\nYou may have lost the first battle, player, but you won the war in the end. What a comeback!"
 russia.1001.t2: ""Take Care of Russia!" - Boris Yeltsin"
 russia.1001.d2: "As peace begins to take hold across Europe, the sound of artillery fire and gunshots gradually fades away. After months of fighting, the Russians can finally breathe a sigh of relief, having survived the hardships of defeat and reconstruction.\n\nPushed into a corner, they chose freedom and liberty - Russian freedom and liberty. Democracy is only possible when everyone is treated equally, without any special treatment for anyone. The crimes of the occupiers cannot be overlooked because of their privileged status.\n\nFew people thought Russia would win such a war so soon, but the Russians have always surprised their opponents in the past, and they did so again.\nInstead of the hateful and exclusive ideology of the European Union and NATO, Europe is breathing new life, free from the chains of corruption, thanks to the Russians, just as they freed themselves. Russian democracy shines brightly on the world stage. It has come a long way through destruction and devastation, but it has finally arrived, and the Russians are more united than ever before.\nYou may have lost the first battle, player, but you won the war in the end. What a comeback!"
 russia.1001.t3: "The Man Who Conquered the World"

 SOV_russian_inner_affairs_category: "Russian Inner Affairs"
 SOV_russian_inner_affairs_category_desc: "\n\n\n\n\n£GFX_SOV_inner_affairs_banner\n\n\n\n\n\n\n\nWith new Russia rising from ashes of LDPR regime, focus must put into revising our internal policies. New administration promised many changes to Russian State."
 SOV_coronavirus_decrease: "Fighting the Coronavirus"
 SOV_suraykin_politburo_category: "The Politburo"
 SOV_suraykin_politburo_category_desc: "\n\n\n\n\n£GFX_SOV_suraykin_politburo_banner\n\n\n\n\n\n\n\nWith true communist revolution secured we can finally build true socialism just like Stalin and Lenin intended. Comrade Maxim has formed his own orthodoxic Politburo filled with only true Marxist-Leninists, who will help him manifest communism into reality."
 SOV_russian_army_category: "[SOV_army_loc]"
 SOV_russian_army_category_desc: "The [SOV_army_loc] is one of the most powerful and great military forces in the world. It has enormous potential, is capable of defending its country from any threat, and is a reliable pillar of national security and the pride of the Motherland. The [SOV_army_loc] has a rich heritage and traditions that are passed on from generation to generation. Its history is filled with feats and victories that strengthen its power and greatness. However, to maintain its effectiveness and modernity, it requires constant reform and development."
 SOV_the_secret_war: "The Secret War"
 SOV_the_secret_war_desc: "The clouds are gathering over our Motherland, and the sinister forces of the secret organisations "League for Russian Democracy", "The New Restoration", and the perpetually fat oligarchs, are preparing for their insidious attack on our Russia. The government under the leadership of Vladimir Volfovich Zhirinovsky is forced to enter the Secret War to protect the legitimacy and stability of the country from this §Rsinister enemy.§!\n\n£GFX_LRD_texticon §CLeague for Russian Democracy§! - [SOV_LRD_activity_scripted_loc]\n\n£GFX_tnr_texticon §sThe New Restoration§! - [SOV_TNR_activity_scripted_loc]"

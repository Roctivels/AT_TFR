 #right-path Surkov
 SOV_history_continues_surkov: "History Continues?"
 SOV_history_continues_surkov_desc: "In 1992, Francis Fukuyama predicted an event of unimaginable proportions. Just think, the end of the story as we know it. There will be no more authoritarian regimes, instability and other things. The whole world will freeze in a neoliberal utopia. The last person who doesn't believe in anything and isn't attached to anything. And then on September 11, 2001, the idea of the end of history turned to dust. How fragile the neoliberal order turned out to be, and how easy it turned out to be to shake it. And in the 2020s, the order was shaken again. Authoritarianism and specifically Putinism have taken revenge. Where will the story go after all this? God only knows. Now it remains to live on, knowing that, apparently, our generation is not destined to become the last people. \n\nThe hour of Surkov, Putin's gray cardinal and the Kremlin's shadow master, has arrived. Who knows how his reforms will end, but everyone understands that Russia will no longer be the same. Putin's state will stand at any cost, even if it changes beyond recognition."
 SOV_reformalize_peoples_front: "Reformalize People's Front"
 SOV_reformalize_peoples_front_desc: "The Popular Front was a wonderful tool of the previous regime, but it was also a hotbed of dangerous ideas. What happened after the European War showed how stable the front really was and how radicals of all stripes are really ready to consolidate around the president. We do not need such unstable elements, and we do not need traitors in the ranks of proud patriots of the fatherland. The All-Russian Popular Front will be cleansed of undesirable elements, whether they want it or not."
 SOV_kremlin_shadow_master: "Kremlin's Shadow Master"
 SOV_kremlin_shadow_master_desc: "Few people see Surkov in public. Few people even know where he is at this particular moment. But absolutely everyone feels its influence. While portraits of Putin and Medvedev hang in all institutions from schools to city halls, and people know them by sight, Surkov calmly waits. He doesn't need pomp and ostentatious popularity. He's not that kind of person. Calmly and steadily, like a sorcerer in front of a magic ball, he sits in his tower while dozens and hundreds of thin silver threads stretch to his fingers. With a single movement of his hand, he is capable of breaking a dozen lives, or, conversely, placing him on the very Olympus of Russian politics. Will he take advantage of it or not? Who knows… The Kremlin's shadowy master always has his own plan, which he implicitly adheres to."
 SOV_the_deep_people: "The Deep People"
 SOV_the_deep_people_desc: "The Deep People… This is the true source of power in any state. Who are they? Different regimes tried to find the deep people in their own way: proletarians, "state employees", hippies or peasants. They went to him and tried to command him, but to no avail. The elite, in turn, has been leading the deep folk for centuries and involving them in their experiments. And Vladimir Vladimirovich skillfully ruled these people, literally saw and felt their aspirations. Our goal now is not to upset this delicate balance. We will emulate Putin's methods so as not to anger the deep people. And to ensure that the country's development follows the scenario we have chosen."
 SOV_cross_out_the_outsiders: "Cross Out the Outsiders"
 SOV_cross_out_the_outsiders_desc: "There are outsiders in every society. Marginals who are unable to integrate into society. They always want to change, they try to pull the blanket over themselves. Why do they act like this? There are a lot of answers. Perhaps they are actors subordinate to the will of other powers. Perhaps they are genuinely unhappy with the current regime. Nevertheless, they are dangerous for a homogeneous society subordinated to a single ideology. Such elements should simply be excluded from the system to maintain its stability."
 SOV_the_artificial_society: "Artificial Society"
 SOV_the_artificial_society_desc: "Human societies themselves are a consistent culmination of the need for socialization embedded in the human body. As social beings, we have built constructs hitherto unseen in the animal kingdom and achieved incredible heights. But naturally formed societies are chaotic, unstable, and inherently dangerous. The products of their instability are social unrest and gradual disintegration. But if we can create an ideal artificial society that meets the needs of the state, then we will overcome this construct. Adapting to life in it may not be an easy task for Russian citizens, but it is a step that will need to be taken in order for our state to maintain its stability for many years to come."
 SOV_simulacra_of_outrage: "Simulacra of Outrage"
 SOV_simulacra_of_outrage_desc: "Society always needs enemies. Are they bad boyars, migrants, or damned liberals who want to sell out the country? Systems need conflicts, because stagnation is the cessation of all movement, which means death in the long run. Organizations under our control will appear on the territory of our country, which will redirect the people's anger in the right direction. Let them organize gatherings, let them protect our culture or increase worker cohesion. The main thing is under the supervision of special services. So that they don't do anything unnecessary, of course."
 SOV_the_long_lasting_state: "The Long-Lasting State"
 SOV_the_long_lasting_state_desc: "The Russian state has already gone through three iterations. The State of Ivan the Dark, the state of Peter the Great and the state of Lenin. All of them, one way or another, stood for many years until they fell under the onslaught of the merciless sands of time. But now it's the turn of a new state, the Putin state. It does not look like Western "deep" states. Oh no! For a long time, the state sticks its unsightly parts out, demonstrating brutal elements. But that's also his terrifying honesty. We do not hide behind democratic processes, but respond to the challenges of the time honestly, with force when necessary, and with words when necessary. What kind of deep state can there be? It's all in our sight! This system may not be perfect, but it will definitely live for several more decades. If not for many centuries."
 SOV_awaken_social_cohesion: "Awaken Social Cohesion"
 SOV_awaken_social_cohesion_desc: "The people are strong only if they are united in their impulse. But how hard it is to break up a seemingly shackled people. Different languages, professions, appearances and many other signs lead to the division of society into many very different cells. This process itself cannot be prevented, but we can mitigate it. By supporting the creation of links between individual cells of society, we will be able to increase cohesion in general. Of course, not everyone may like it, but sooner or later our citizens will get used to the idea of the need for unity."
 SOV_cyber_propaganda_farms: "Cyber-Propaganda Farms"
 SOV_cyber_propaganda_farms_desc: "Cyberspace may not have become a platform for "colonization" yet, but it is already an incredibly important part of the life of any state. It has already become a platform where a wide variety of opinions are fighting for the right to be in the public field. To ensure that the opinion of our state is always heard, we will create special "farms" of cyber propaganda that will push our narratives. After all, sometimes a society can get confused by itself and it will need a guide to adjust its course. All for the benefit of our citizens."
 SOV_the_network_government: "The Network Government"
 SOV_the_network_government_desc: "The days when peasants sent their gentry to convey their aspirations to the king are long gone. But times are changing and a paradox is being created when representatives do not understand the will of this very people at all. On the one hand, this is a consequence of moving further away from the people, and on the other, the people themselves are sending increasingly incomprehensible signals. So wouldn't it be better to make government more efficient and understandable for everyone? And this is where the network will help us. Of course, you will need to start small. For example, by improving the operation of existing services and improving feedback mechanisms. And in this process, it will be possible to eliminate many rudimentary elements in our policy."
 SOV_consumarist_patriotism: "Consumerist Patriotism"
 SOV_consumarist_patriotism_desc: "Love for the motherland cannot be bought. Any selfish interest will eventually lead to such a patriot going over to the side of the one who offers more. But there is not a word that patriotism cannot be sold. Who wouldn't want to buy a new T-shirt with the image of the president? Or, let's say, a patriotic phone case, a Russian flag, a St. George ribbon, or anything else! And even more so if a percentage of your purchase goes to direct government support. And also all products will certainly be checked by Roskachestvo. Such an attitude towards patriotism may seem blasphemous to some. We prefer to call it patriotic consumerism. Would you like to buy a trinket, by the way? Take a bust of Vladimir Putin while the discount is in effect!"
 SOV_digitalization_of_politics: "Digitalization Of Politics"
 SOV_digitalization_of_politics_desc: "We have already successfully started transferring the government to the world Wide web, but why stop at the successes achieved? The age of the Internet and cyberspace has arrived, which we can take advantage of. Vladimir Vladimirovich has already taken steps in this direction, and it is thanks to him that the Internet bureaucracy is now so well developed in Russia. But what if we take a step forward in an era of active struggle for the vastness of the world Wide Web? It's time to digitalize our politics. Referendums, votes and other things will be transferred to the Internet, and millions of citizens will have the opportunity to watch live State Duma meetings, and maybe even participate in discussions in a limited format. The age of technology has arrived, and we intend to be the first in terms of innovation."
 SOV_towards_a_desolate_democracy: "Towards a Desolate Democracy"
 SOV_towards_a_desolate_democracy_desc: "Democracy, it's the power of the people. It seems to us that the power of the people is absurd without this very people. But the future of politics lies with machines. This is how the concept of digital democracy penetrates into our lives. A man-made society in which a hierarchy of machines and algorithms pursues goals beyond human comprehension. Of course, this may seem incredible now. How can you replace a politician with a soulless machine? The workers on the assembly lines thought the same way, until they were replaced by machines. This is a process that will take decades to complete. But Russia should be the first to join it. It's time for a new era. An era where iron logic rules out human inefficiency. All in order for the state to exist for a long time, perhaps forever."

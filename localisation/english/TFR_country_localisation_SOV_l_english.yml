 SOV_supreme_soviet_rsfsr_dynamic: "Supreme Soviet of Russia"
 SOV_supreme_soviet_rsfsr_dynamic_desc: "\n\n\n\n£GFX_supreme_soviet_rsfsr\n\n\n\n\n\n§Y"One cannot live in society and be free from society."\n- Vladimir Lenin§!\n\nAfter the Communists came to power and carried out a profound constitutional reform, Russia returned to a model based on the principles of Soviet representative democracy, adapted to modern realities. The reconstituted §OSupreme Soviet§! today is the highest legislative and administrative body of the country, uniting all honestly elected deputies. Despite the preservation of the post of president, he no longer has real power, and all key decisions are made by the majority of votes in the Soviet, including the formation of the government and the approval of the budget, independently of the head of state. This system of state structure actively involves citizens in political life, the only question is which side they will be on?"

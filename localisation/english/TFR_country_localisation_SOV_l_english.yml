 russia.166.d: ""
 russia.166.a: "It must be done!"
 russia.167.t: "Release of political prisoners"
 russia.167.d: "We, the communists, promised people that we would release political prisoners who were illegally imprisoned by Putin's government. Well, it's probably worth it already?"
 russia.167.a: "Free everyone but the fascists"

 russia.95.t: "OPERATION WRANGEL"
 russia.95.d: "TO - VALERIY GERASIMOV, CHIEF OF GENERAL STAFF\n\n\n\n\n£GFX_SOV_convoy\n\n\n\n\n\nSIGNIFICANT BUILD UP OF NATO FORCES IN ESTONIA AND LATVIA POSE THREAT TO RUSSIAN TERRITORIAL INTEGRITY. FORESTED TERRAIN MAY POSE CHALLENGE, BUT OUR OVERWHELMING FORCE WILL CRUSH THEM.\n\n\n\n\n£GFX_SOV_airbase\n\n\n\n\n\nTHIS DOCUMENT IS CONFIRMATION FROM THE HEAD OF STATE THAT OPERATIONS INTO THE BALTICS COMMENCE IMMEDIATELY. ENEMY AIRFIELDS ARE TO BE DESTROYED PRIOR TO GROUND FORCES INVADE. - \n\n\n§RPLEASE SIGN BELOW§!"
 russia.95.a: ""
 russia.96.t: "Navalny Arrested"
 russia.96.d: "Putin critic Alexei Navalny, who survived a nerve agent attack in August, has been detained upon his return to Moscow from Germany. The activist, 44, was taken into custody at Sheremetyevo airport, where he arrived on a diverted flight. Navalny accuses Russian authorities of the assassination attempt, a claim supported by investigative journalists. His detention has drawn condemnation from the EU, France, and Italy, who demand his release. Despite warnings of arrest, Navalny returned to Russia on Sunday, greeted by supporters before being taken away by police.\n\nHe is currently held at a Moscow police station for violating probation terms related to a previous conviction that he maintains was politically motivated. Additionally, new fraud charges have been brought against him for alleged misuse of funds in his Anti-Corruption Foundation."
 russia.96.a: "The Troublemaker Returns"
 russia.97.t: "First Moscow Trial"
 russia.97.d: "SERGEY SHOIGU\nOn trial for: Gross misconduct and failure to defend the nation\n\nVALERY GERASIMOV\nOn trial for: Gross misconduct, knowingly sending thousands of sons into certain death, failure to defend the nation\n\n\n\n£GFX_SOV_sons\n\n\n\n\n\nVIKTOR ZOLOTOV\nOn trial for: Gross misconduct, conscripting thousands of sons to be knowingly killed, failure to defend the nation\n\n\n\n£GFX_SOV_casualties\n\n\n\n\n\nOLEG SALYUKOV\nOn trial for: Gross misconduct, knowingly directing suicidal attacks against superior enemy forces, failure to defend the nation\n\nVERDICT:\nSERGEY SHOIGU: §RGUILTY§!\nVALERY GERASIMOV: §RGUILTY§!\nVIKTOR ZOLOTOV: §RGUILTY§!\nOLEG SALYUKOV: §RGUILTY§!"
 russia.97.a: "These 'men' know their guilt"

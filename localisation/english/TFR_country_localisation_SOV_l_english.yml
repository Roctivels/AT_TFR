 SOV_expand_the_presidential_powers: "Expand Presidential Powers"
 SOV_expand_the_presidential_powers_desc: "With Navalny winning the snap elections, it has become clear how much effort it would take to salvage the current situation. We cannot rely on the Duma because it doesn't exist yet, and the different groups and cliques trying to take advantage of that cannot be overstated. \n This is why we will give the President more powers, so he can prevent the system from falling into anarchy."
 SOV_secure_the_russian_revolution: "Secure the Russian Revolution"
 SOV_secure_the_russian_revolution_desc: "As we stand at the crossroads of history, our democracy remains vulnerable to being toppled. \n If we are to reunite our people we must first fully secure our revolution. Our political sphere must be rid of the most dangerous elements from the previous administration as well as foreign agents. \n And once that is done, we can finally begin looking at the bigger picture."
 SOV_hack_the_chains_of_occupation: "Hack the Chains of Occupation"
 SOV_hack_the_chains_of_occupation_desc: "As our plans of reunification enter final stages, there remains multiple regions we could regain without direct NATO intervention. \n Be it the Russians in Stavropol under the Kuban oligarchs, the fellow patriots stuck between Bandits and Jihadis in the Caucasus, or those suffering under Ukrainian occupation - all will return. \n And if the European oligarchs refuse the idea of people's self-determination that they have bashed our nation with, we will have no choice but to fight them to ensure European democracy survives!"
 SOV_wind_up_the_nationalism: "Wind Up Nationalism"
 SOV_wind_up_the_nationalism_desc: "Russians are historic people, we respect our past, with it we build our present, and strife to our future. Nothing is more clear from our history books that Russia is not a mere nation-state, but an imperial superpower, always, despite all troubles, remaining one of the key players on this globe. Russia is destined to be an empire, whether the West like it or not. There were times when Russia was a Tsarist Empire, spreading orthodoxy and autocracy across Europe, after it, came a Red Empire, when Revolution and Communism became the target of our existences. Now the time has come for us to embrace it, and become the Democratic Empire, the one that will spread enlightenment and power of the masses."
 SOV_a_nation_of_patriots: "A Nation of Patriots"
 SOV_a_nation_of_patriots_desc: "For a long time, Russian society was governed by faceless apparatchiks who did not care for the people. Be it the USSR or its successor, the government was not interested in the people's reorganization. \n Yet that changed. Millions of Russians, wishing for themselves to have a state that is theirs. They have bled for it under the previous regimes, knowing all-too-well that the bureaucrats and oligarchs would not listen to them. \n The motherland has finally arisen, listening to her people and them alone! "
 SOV_united_country__united_people: "United Country - United People"
 SOV_united_country__united_people_desc: "As much as the Russian sphere is divided between ideas and ideologies, there is still something that unites us. \n\n We are all Russian. \n\n United in hardship and history. \n In our Science and Music. \n Our Culture and Courage. \n That is why we need no other slogans for our cause. For is there nothing that Russia can receive to willingly abandon fellow russians?"
 SOV_where_the_russian_flag_waves_high: "Where the Russian Flag Waves High"
 SOV_where_the_russian_flag_waves_high_desc: "The Russian flag is not just a flag. \n It's an idea. \n An idea of Russians breaking the chains of the yoke and taking over their oppressors. \n An idea of Russians expanding across Eurasia, accepting different people under their guidance towards mutual prosperity. \n An idea of "the Eastern Hordes" of Russia to be just as if not more powerful than the European aristocracies of their time. \n And now, as we are on a path of conflict with the Eurocrats, it is an idea of the biggest Democracy in the world, unchained and true to itself. \n Where the Russian flag waves High, it will never go down!"
 SOV_invite_the_don_people: "Invite the Don People"
 SOV_invite_the_don_people_desc: "The Don break-away state, unlike the Kubanian plutocrats, have a loyal and patriotic administration. While they didn't like the idea of joining "the traitors" initially, they warmed up to us following multiple informal meetings. \n As it stands, both sides are ready for unification. All that remains is to send an invitation. \n Russia is back on track to regain her lost sons."
 SOV_appease_kalmykia: "Appease Kalmykia"
 SOV_appease_kalmykia_desc: "Kalmykia was originally intended as a nation of "liberated peoples" that would serve as a loyal and zealous buffer state against us. Yet giving them Russian-majority Astrakhan and disconnecting from Russian federal funding and logistical infrastructure left it in an unstable position. \n The Kalmyks are no fools however, and are willing to return to us as long as we give concessions to them. As a gesture of "goodwill" they will return the majority-Russian areas, after which we will negotiate about a possibility of reunification. \n Long ago, the Kalmyks fled to these lands from Mongolia, escaping the Oirat genocide. We have allowed them to settle the region, and we intend to keep our word."
 SOV_begin_the_navalny_trials: "Begin the Navalny Trials"
 SOV_begin_the_navalny_trials_desc: "While we have consolidated Russia and have started to patch relations with members of the previous administration, the corrupt officials remain in our system.  They have used Russia for their benefit, and they will, perhaps try to do so again if they face no backlash. \n This, might cause discontent among the elites of the previous regime that are cooperatable, yet we cannot and will not change our position. If we let them free now our entire cause will be lost. \n Russia will be free, and such parasites will not be forgiven!"
 SOV_ultimatum_to_the_kuban: "Ultimatum to the Kuban"
 SOV_ultimatum_to_the_kuban_desc: "The time for negotiations is over. The Kubanian oligarchs and plutocrats will be forced to choose between stepping down and liberating the people, or face our armies head-on. \n Of course, the Kubanian bandits are supported by Ukraine, which, in turn, is supported by the entirety of NATO. \n That doesn't matter however. Russia has finally stepped into the light of democracy and it will not abandon that path. \n Nothing will stop us."
 SOV_declare_the_state_of_emergency: "Declare a State of Emergency"
 SOV_declare_the_state_of_emergency_desc: "It is time for the country to stand as one. The people, the industry, the elites - all of us will  have to set up and ensure the nation's victory in this conflict. \n This will be the most decisive war for our nation. We either gain victory or are destroyed completely. \n The Final Patriotic War needs every man and woman for Russia to spread her wings!"
 SOV_fuel_the_fire_of_revanchism: "Fuel the Fire of Revanchism"
 SOV_fuel_the_fire_of_revanchism_desc: "All we have asked for is for us to regain our lost territories and enter the civilized world as equals. \n They denied us even that. \n\n Instead, they set up oligarchs and bandits to rule over the territories that were carved from us, hoping that we would never dare to defy them. \n\n And now, as our democracy stands ready for the final fight, they call it a "sham". The Russian people ignore this however, readying their rifles for the coming liberation of their people."
 SOV_avenge_the_defeat: "Avenge the Defeat"
 SOV_navalnys_manifesto: "Navalny's Manifesto"
 SOV_bring_the_freedom_back_to_europe: "Bring Freedom Back to Europe"
 SOV_the_final_war: "The Final Patriotic War"
 SOV_our_last_full_measure: "Our Last Full Measure"
 SOV_our_last_full_measure_desc: "We will not be bowing to the oligarchs in Brussels. They may use their system of Byzantine politics to force a single neo-liberal view on the entire continent, yet their system is weak like any other. \n\n There are many Europeans who are disenfranchised with the regime in Brussels. And there are also many Russian patriots both occupied territories and Europe itself who are ready to answer our call. \n\n Our armies, economy and people are ready for this final war. Our conscience is clear, and our heart is ready to bear the sins we will commit. \n\n Russia will enter the future as the largest Democracy in the world, one that liberates the oppressed and ensures the End of History. And if Europe has to burn to achieve that, it will. "
 SOV_alternative_for_european_people: "Alternative For the European People"
 SOV_crush_the_bureacratic_union: "Destroy The Bureaucratic Union"
 SOV_no_mercy_for_the_enemy: "No Mercy for the Enemy"
 SOV_by_any_means_necessary: "By Any Means Necessary"
 SOV_destroy_the_european_federalism: "Destroy European Federalism"
 SOV_rise_up_free_europeans: "Rise Up, Free Europeans!"
 SOV_kick_out_the_elite: "Kick Out the Elite"
 SOV_union_with_the_russian_lead: "A Russian-Led Union"
 SOV_cleanse_the_west_with_fire: "Cleanse the West with Fire"
 SOV_cleanse_the_west_with_fire_desc: "War is the art of deception. For years, the hypocrisy of the West has turned the world into a battlefield. While the enemies of the people trembled with their tongues, our brothers and our sons shed their blood.\n\nBut cheating is a double-edged weapon.\n\nThe bigger the lie, the more willing it is to believe it. And when an entire nation demands retribution, the lies spread at the speed of a forest fire. This flame burns brighter and brighter, devouring everything in its path.\n\nOur enemies believe that they alone determine the course of history. But in fact, the will of one person is enough..."
 SOV_deploy_the_arsenal: "Deploy the Arsenal"
 SOV_deploy_the_arsenal_desc: "The world has been your battlefield. Everywhere you go, the blood of brothers and sons screams out against you. Perhaps you cannot yet hear it, because the soil is not your own. But you will... you will.\n\nToday we show the world our true strength."
 SOV_navalnys_list: "All as One!"
 SOV_navalnys_list_desc: "One. Destroy the enemy's hope for victory.\n\nTwo. Use everything to your advantage.\n\nThree. Take advantage of your enemy's weakness.\n\nFour. Attack from the unexpected side."
 SOV_scorch_the_earth: "Scorch the Earth"
 SOV_scorch_the_earth_desc: "Revenge is like a ghost. It takes over every man it touches...\n\nIts thirst cannot be quenched until the last man standing has fallen."
 SOV_denounce_the_sanctions: "Revive the Economy"
 SOV_denounce_the_sanctions_desc: "The Russian economy is ruined. Destruction of our territory, breakaway client states being separated from us and now an economic crisis - all of it is a reality of life now. \n Yet now is also the time for us to rise up once more. We have quite a number of rich opposition members who would be willing to restart business here, and they will be the push that our economy needs to restart itself. \n Russia will be rich once more!"
 SOV_fund_the_russian_self_defence_forces: "Fund the Russian Self Defence Forces"
 SOV_fund_the_russian_self_defence_forces_desc: "The Russian Self Defence Forces, as the matter stands, are underfunded. \n We cannot allow that to continue. To restore order across the country, to defend its borders, and to reunify our country will require much more. \n We must look at the Japanese example and ensure we can push our weight around."
 SOV_selfsustainable_economy: "Self-Sustainable Economy"
 SOV_selfsustainable_economy_desc: "We cannot rely on foreign goods to sustain us. With the loss of our agricultural lands down south to NATO-backed puppet regimes, we need to ensure that we can feed our people. Thankfully we still have some industrial base, so we will need to expand it. \n Russia will ensure a steady supply of locally-made products for its citizens!"
 SOV_the_second_shock_therapy: "The Second Shock Therapy"
 SOV_the_second_shock_therapy_desc: "It is time to end the previous regime's economic practices to an end! \n For too long the state capitalist structure prevented Russia from growing further. The remnants of the damn soviet system, finally we have the ability to end it! \n We shall privatize these behemoths and let private entrepreneurs bring us to prosperity with their innovations! Similarly to Poland, we will become rich again!"
 SOV_roll_into_the_international_market: "Roll Into the International Market"
 SOV_roll_into_the_international_market_desc: "One of the reasons Russia still had a military industry during the 90s was due to our international weapons deals. We are in a similar situation, yet our weapons are more advanced than before. \n Lets enrich our coffers and save our military production at the same time. Russian weapons have proven themselves as capable of going toe-to-toe with NATO, so we are sure we will get customers."
 SOV_no_more_oligarchy: "Economical Anti-Oligarchism"
 SOV_no_more_oligarchy_desc: "To not repeat the same mistakes as the first Shock Therapy, we must ensure our big business does not gain monopoly. By giving and regulating to whom we allow to acquire our businesses, we can make a web of competing interests between them, forcing them to an arms race of productivity. \n Just like in the European and American ideals we hold dear, Oligarchs have no place here!"
 SOV_a_letter_to_washington: "Russian-American Brotherhood"
 SOV_a_letter_to_washington_desc: "While some Americans, like Biden or his liberal clique firmly stand with the Europeans and the digital dictatorships they call democracies, others are more accepting of us. \n Be it Trump, who embodied the ideas of Yeltsin and destroying the American party-state, or other, smaller groups who oppose the American oligarchs they call "The Deep State". \n We must reconnect with these people, for our struggle is the same. \n Just as Catherine the Great assisted the Revolutionaries by instituting armed neutrality and denying the English a relief force, or Alexander II sending the Russian fleet to the North's coasts, so shall we assist our American brothers to regain their democracy!"
 SOV_the_best_of_two_systems: "[SOV_navalny_econ_minister]"
 SOV_the_best_of_two_systems_desc: "Khodorkovsky being our finance minister is laughable. He has squabbled with the FBK for as long as we had worked against the regime. Not to mention his criminal practices during the 90s and early 2000s. \n However, he is also a major investor, still retaining his riches from his oligarch days. This is why we should will replace him."
 SOV_best_of_two_systems_loc: "The Best of Two Systems"
 SOV_nemtsovs_legacy: "Nemtsov's Legacy"
 SOV_libertarian_dream: "Libertarian Dream"
 SOV_new_gosplan: "New GosPlan"
 SOV_let_the_money_flow: "Let the Money Flow"
 SOV_let_the_money_flow_desc: "Unfortunately we still need to rely on funds from selling resources to sustain ourselves. Sure, we have been against such an economic model, but we quite literally have no choice. \n At least the money's good..."
 SOV_underground_military_deals: "Underground Military Deals"
 SOV_underground_military_deals_desc: "As it stands, our remilitarisation is too slow. If the West refuses to let us reunify our country and annex the oligarchic client states they have placed, we will need a military force that can match them, at least to make them consider peaceful negotiations. \n However, they also prohibit us from buying weapons from abroad. This is why using the black market is our only option to gain extra armaments. \n Russia needs superior firepower to be viewed as equals in the democratic world."
 SOV_revert_the_brain_drain: "Revert the Brain Drain"
 SOV_revert_the_brain_drain_desc: "The amount of professionals that left Russia for Europe and America is staggering. And while the American specialists have either returned to us or gone to Europe before the NATO war, our youth also considers leaving due to our economic situation. \n We must ensure a steady flow of grants for science, as well as benefits for qualified specialists, especially in engineering and IT. \n Russia's brightest will see their dreams come true!"
 SOV_resources_for_guns: "The Resource Deal"
 SOV_resources_for_guns_desc: "If we cannot pay for our weapons with cash, we will pay them in resources. There are a lot of nations in need of our metals and oils, and they probably have large stockpiles of modern or even slightly outdated weaponry. \n I mean, we do have to pay somehow, right?"
 SOV_rush_for_the_first_ranks: "Rush for the First Ranks"
 SOV_rush_for_the_first_ranks_desc: "We must accelerate our economy into overdrive. \n Already, the fund from our big business and returned specialists have provided us with a strengthening currency and an expanding private sector. \n Let us slash all the red tape and allow business to bloom! Anything for prosperity and growth!"
 SOV_the_miracles_of_russian_economy: "The Miracles of Russian Economy"
 SOV_the_miracles_of_russian_economy_desc: "The constantly expanding private sector has allowed us room to breathe. Alongside major investments from Asia and less so from Europe, the local businesses have overtaken the market and are proving the economic models we have fought for. \n We will invest our money into the civilian sector to continue this growth!"
 SOV_huge_military_subsidies: "Huge Military Subsidies"
 SOV_huge_military_subsidies_desc: "Yeah, our economy is growing rapidly, but we really need our private contractors to refurbish our military... The world conflicts and the Asian ones in particular are a great base for us to sell our products to. \n Not only that, we can also get investments from the foreign states to RnD new types of weapons, or be a safe haven for their specialists amidst war. \n Russia's main business is war and the business is going well."
 SOV_the_giant_wakes_up: "The Giant Wakes Up"
 SOV_the_giant_wakes_up_desc: "Russia has always been an industrial nation. Even during the previous regime, the industrial development was so rapid it outgrew Putin in a span of just a few years. \n Yet, we, with a good chunk of our territory occupied, have managed to surpass even that! \n The Free Market has made us one of the best nations to start a business in, and while we are not an export-oriented nation, can still push our products around in localized cases. \n Russia is a Phoenix. One that rises from the ashes and regains its place in the world."
 SOV_innovations_in_the_army: "Innovations in the Army"
 SOV_innovations_in_the_army_desc: "The current decade of conflict has shown that an army without innovation is no army at all. \n It is not enough to just have a group of infantrymen with cold-war era tactics, or a small strike force with high-tech weapons. Our army must both be numerous, AND advanced enough to defeat any foe. \n Thankfully most of our RnD departments and military corporations have survived the war, and can probably be restarted in a short notice. \n Let's work!"
 SOV_fill_the_stockpiles: "Defenders of Russian Democracy"
 SOV_fill_the_stockpiles_desc: "What are the Russian Self-Defence Forces? \n A bunch of veterans that were given a job to not starve or commit crime? \n An ineffective army that will do nothing but intervene in civil conflict? \n Navalny's personal army to quell dissent? \n NO! It is the force of democracy, ones who will not falter and leave their posts. The soldiers have lived through hell and serve us not because of ideology, but due to their commitment to Russia! \n And we will make sure these fighters for freedom will be in top shape for any future conflicts, for they are the sword and shield of the Russia of the Future!"
 SOV_fund_the_partisans: "Organization of the Partisans"
 SOV_fund_the_partisans_desc: "While it is true our views are aligned with European idealists, the Europeans certainly do not wish to align with us. The territories they carved from us are still not returned, and it seems they set up local elites and plutocrats to rule them. \n Not to mention the Ukrainian-occupied areas of our nation that are subjected to "derussification". \n Yet, there are people who are willing to resist said regimes. And as the government that represents them, we must aid them in their operations."
 SOV_guerrilla_warfare: "Assymetrical Warfare"
 SOV_guerrilla_warfare_desc: "Drone warfare has become a key to all future conflicts. Cheap, reliable, can substitute artillery and provide reconnaissance at the same time. Really, the possibilities are endless. \n During the war with NATO, we were outnumbered, and could not break through their ranks. By using asymmetrical and mobile warfare, we might manage to bridge the gap between our capabilities. \n The death always comes from above."
 SOV_revive_the_army_spirit: "Revive the Army Spirit"
 SOV_revive_the_army_spirit_desc: "The morale of our troops has seen better days. Defeated against the combined forces of the entire continent, it seems many think that our fate is to be subservient to them forever. \n Yet our army still breathes and grows. While Europeans and Americans had created the narrative that we can do nothing but fight with superior numbers, for most of history it was the professionalism of our troops that saved the day against a superior foe. Unyielding, unafraid of a bayonet charge. \n With the new age of warfare heroism is long gone, yes. But the spirit and composure endures. Our soldiers are the embodiment of the Russian martial spirit that was forged more than a millenia ago."
 SOV_the_greatest_army_in_eurasia: "The Greatest Army in Eurasia"
 SOV_the_greatest_army_in_eurasia_desc: "We have expanded our Self-Defence Forces to numbers that exceed the previous regieme's armies. While most of our soldiers are veterans, we also received a surprising number of young recruits that joined out of a feeling of patriotism. \n Our factories are working over the clock to produce the weaponry and ammunition needed to sustain them. As our democracy is readying for reunification of our lands, we understand that it will not be given to us peacefully. \n Ukraine will most likely intervene to save their Kubanian project, and it definitely won't abandon Belgorod. We know that NATO will intervene on their behalf, seeing us as nothing more than a beaten giant. \n There is nothing to be afraid of however. \n The Eurocrats have always been against democracy in Russia (I wonder who bought Putin's resources and took money from our oligarchs?). And if push comes to shove, we will destroy their elite mansions and positions to dust!"
 SOV_reshaping_the_kremlin_towers: "Reshaping the Kremlin Towers"
 SOV_reshaping_the_kremlin_towers_desc: "It is time to reshape Russia. \n With the previous interest groups remaining in the government and entirely new ones forming, we must come to a decision on how to act. Do we act pragmatically, using any means and connections to achieve our vision of a liberal Russia, or do we let the people decide? \n Do we contain the communist and ultranationalist members of the opposition parties who would obscure our vision, or do we accept them out of solidarity in our collective resistance to the regime? \n Control the narrative, or unite the different ideals into one framework of a democracy? \n The Russia of the Future, or a Free Russia?"
 SOV_rebrand_the_fsb: "Rebrand the FSB"
 SOV_rebrand_the_fsb_desc: "As much flack as we gave the FSB, it is undeniable how much they help Russian society. Just look at the number of jihadist attacks they stop yearly for example. \n These people are professionals, and while they might dislike us and everything we stand for, we still need them to stop actual extremists, terrorists and criminals wreaking havoc in our society. Of course, they also need us as a source of employment. We will not let their talents rot without purpose. \n So work, brothers!\n\nФейсы, опера, чекисты\nТеневые сценаристы\nПресекает беспредел\nМинистерство Добрых Дел."
 SOV_control_the_fourth_front: "Control the Fourth Front"
 SOV_control_the_fourth_front_desc: "Our country is still unstable and reeling from the shock. Previous regime loyalists, political extremists, separatists - all of these people destabilize our democratic project. Not to mention the people who disagree with our vision of liberty, spreading hateful comments towards the groups we have accepted in our society. \n We will ensure the social media purges such content, for we cannot and will not promote hate speech."
 SOV_ensure_press_loyalty: "Ensure Press Loyalty"
 SOV_ensure_press_loyalty_desc: "The press is a major tool for democraties. They provide information and narratives that bolster civil society. With our unstable situation, it is only right we take the example of the Americans and ensure that the media is loyal to our vision of a free Russia. \n We cannot have misinformation and antagonistic narratives thrown at us at such a crucial time."
 SOV_political_bonapartism: "Political Bonapartism"
 SOV_political_bonapartism_desc: "As the Vanguard of the Russian revolution, we cannot concede any influence on the process of liberalization. Just as Napoleon, we will ensure our vision of Russia prevails over all others.\n Of course, other voices will not be silenced and our practices can be criticized. Yet we are not going to give in either. Navalny's vision of a free society will prevail over all! \n We will lead our people to freedom!"
 SOV_militarize_the_society: "Militarize the Society"
 SOV_militarize_the_society_desc: "As it stands, our country stands battered. Our western "partners" for all of their talk of equality, clearly do not wish us to enter the European world as equal partners. With chunks of our territory taken away from us and our borders impossible to control conventionally, why should we be ashamed of our military? \n Most of our families have members who went through at least one of our military campaigns, and many more have been through a one year conscription. \n Our country has become one of the freest there is, where LGBTQ activists, nationalists and socialists can all discourse in unity. \n Why should we limit ourselves to demilitarization? Even Japan, for all of their pacifistic history, has been open and eager to show its might to defend democracy. \n Liberty and freedom only come to those who wish to enforce it. And we will."
 SOV_install_the_cult_of_navalny: "Install the Cult of Navalny"
 SOV_install_the_cult_of_navalny_desc: "Our president saved the country and liberated it, so why shouldn't we give him credit? He is our Atlantean, he is our Titan, by liberating himself he has liberated us, he is like a 19th century hero living among us\nFor he is the Great Liberator."
 SOV_form_the_national_militia_squads: "Form the National Militia Squads"
 SOV_form_the_national_militia_squads_desc: "With organized crime still running rampant, we need a better way to protect the people. \n Forming a national militia will provide us with such a way. Recruiting even more war veterans (as if their number will ever dwindle), we will ensure order on our streets and more employment opportunities for our people.  \n Also, in case of large-scale conflict, they can also help our Self-Defence Forces in defense."
 SOV_seize_the_majority_in_duma: "Seize the Majority in Duma"
 SOV_seize_the_majority_in_duma_desc: "We cannot take the risks and let other parties shape the future of Russia. It was us who toppled the previous regime and it will be us who will remake Russia into a bastion of democracy. We will weave through the system and use as many people as we can to achieve this, for our people deserve prosperity and security in these trying times."
 SOV_pledge_allegiance_to_the_ideas_of_revolution: "Pledge Allegiance to the Ideas of Revolution"
 SOV_pledge_allegiance_to_the_ideas_of_revolution_desc: "Our revolution was not meant to morph the country under our wishes alone. We cannot sacrifice freedom over our political vision. Just as the founding fathers of America we will pave a brave new path on our own!"
 SOV_protect_the_free_speech: "Protect the Free Speech"
 SOV_protect_the_free_speech_desc: "We cannot resort to censorship just to stop criticism of our government. Our country still has a ton of loyalists to the old regime, and even those who are nostalgic of the Putin times. \n Shutting their mouths would be easy, but ultimately pointless. Russia will be free to speak its mind!"
 SOV_fuel_the_fading_torch: "Fuel the Fading Torch"
 SOV_fuel_the_fading_torch_desc: "Democracy is a fickle thing. As we could see from the American Bloodbath, it can easily be corrupted. \n Even Europeans were not guilty of this, as much as we used to idolize them before. Macron's political games during his first term were a good example. As well as the Tory/Labour conflict in britain. \n To achieve a true democracy we cannot focus on our party and its positions, we must come together for the betterment of the nation. \n The Torch of Liberty will be protected!"
 SOV_reform_the_gun_ownership_laws: "Reform the Gun Ownership Laws"
 SOV_reform_the_gun_ownership_laws_desc: "The previous regime was too strict on gun control. Russians have always been a gun society. The Russian Empire had a growing gun market, which indirectly helped fuel the civil war. The Soviet crackdown on this practice, and the continuation of said crackdown by successor regimes prove to us that to truly create a free society we must lighten the laws regarding gun ownership. \n The Minutemen took their freedom with a home rifle, and with a home rifle we will defend ours."
 SOV_shape_up_the_political_field: "Shape Up the Political Field"
 SOV_shape_up_the_political_field_desc: "While Navalny's party is still arguably the biggest player, that cannot continue forever. As it stands, our political sphere is mostly filled with people from the anti-regime opposition. \n Yet as we can see there are many more people who do not share our views and even prefer the previous governments. Do they not deserve to vote alongside us? \n We will allow some of these "extreme" parties in our government. As long as they do not go over the line and not sabotage our democratic process they will be welcome. "
 SOV_radicalize_the_youth: "Radicalize the Youth"
 SOV_radicalize_the_youth_desc: "Many of your young people are too.. passive. As unfortunate as it is to say, the liberal opposition easily dissipates as long as the regime suppresses the protests without recognizing them. \n We could learn something from the nationalist circles. They are proactive, doing anything they can to ensure a "better" Russia. They are also willing to fight for the government that does not represent them due to their patriotism. \n The willingness to fight for the system you believe is right, and defend it with fever will be what brings us to prosperity!"
 SOV_unite_for_blood_and_home: "Unite for Blood and Home"
 SOV_unite_for_blood_and_home_desc: "Many of our citizens see us as nothing more than opportunists who would rather carve up Russia than see it prosper and dominate the 21st century. \n Such an idea is wrong. While we fight for a democratic system, that does not mean we can and should answer to any other power's interests. The Idea that democracies are not allowed to fight for their own interests is wrong too. We are independent and sovereign! \n Just as our American brothers, our patriotism and the love of our country will unite all the different views and bring forth a new Russia!"
 SOV_liberalism_with_an_ak: "Liberalism with an AK"
 SOV_liberalism_with_an_ak_desc: "As was said, freedom comes only to those who are willing to die for it. Russia has been a militarized society the past few years, with many going through the military. \n Yet now they will bear their weapons to ensure our democracy. The steel of the AK will bring the opportunists and extremists on their knees, and the universal rights of man will be protected by the impact of our bullets. \n Europeans might scoff at this, saying we are reviving "Putinist militarism", so let them. They, in their ivory towers of peacefulness and subservience to the rich elites, do not understand such notions. \n Just as America freed slaves with a rifle in their hand, so shall we free Russia with an AK!"
 SOV_ultranational_liberalism: "Ultranationalist Liberalism"
 SOV_ultranational_liberalism_desc: "For far too long, certain members of our opposition have branded Russia as a "barbaric, slave state," lacking the "civilization" that characterizes Europe. This disdain has often led even those disenchanted with the regime to view the opposition with skepticism. Yet this current decade reveals a profound truth: democracy must often be forged in the crucible of fire and steel. Are the soldiers who fought under past regimes to be labeled as murderers and barbarians? \n No! They are our compatriots, many destined to play a pivotal role in our government, aiding us in resurrecting Russia to her former glory. Our land has been graced by brilliant minds; it was the indomitable free spirit that set our forebears on the path to the far east, the Cossacks who assisted the Tsar in expanding our realm. From art to music and architecture, our culture is rich and vibrant. \n As Russia rises anew, we must honor our history and embrace it with pride. Our people will flourish across the expansive fields of our reunited motherland, living freely and prosperously!"
 SOV_a_russian_dream: "A Russian Dream"
 SOV_a_russian_dream_desc: "There is a dream, a dream of a strange land. \n The biggest in the world, with both freezing winters and sweltering summers. \n A land of rivers and forests, steppes and mountains.\n  A land where people are free to be who they wish to be. \n  A land where liberty and democracy are words said with immense pride. \n A land where anyone can become rich as long as he assimilates into the system and cherishes it as any other citizen. \n A land that seeks to free the world from oligarchy and authoritarianism. \n A land that brings justice to the impoverished. \n Russia is that land, yet it is no dream. For we will make it into a reality!"



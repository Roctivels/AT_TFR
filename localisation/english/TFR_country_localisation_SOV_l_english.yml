 SOV_leader_russia_needs: "[SOV_leader_russia_needs_loc]"
 SOV_leader_russia_needs_desc: "Russia is a nation of revolution and a nation tradition, you might say revolution is part of it's tradition, we had the Republic in 1917 and the Soviet revolution shortly thereafter, and again a Republic rose in 91', then in 22 again it fell by election and now again this year we are rebirthing Russia again. Only by reviving Stalinism under the watchful eye of Kvachkov can we hope to return from this humiliation, in our darkest hour it was Stalin's iron socialism that raised us from the clutches of defeat and handed us the greatest Empire the Russian people ever knew, spanning from the Pacific to the Thuringian hills."
 SOV_release_navalny: "[SOV_release_navalny_loc]"
 SOV_release_navalny_desc: "Alexander Dugin is a questionable figure, but one we should make good friends with. His close friendship with people such as Limonov and Putin put him into question but as the undeniable leader of Russian National Bolshevism he is a politician that encompasses a major part of the extreme left and will boost our support substantially as our Neo-Stalinism is not far separated from this "National Bolshevism", some in our ranks cry that he is a usurper, a Fascist, they are cautionaries and caution never got anyone anywhere."
 SOV_form_the_new_government: "[SOV_form_the_new_government_loc]"
 SOV_form_the_new_government_desc: "The CPRF has fallen far from it's glory days under Rashkin, his guidance is like a snake squeezing all character from the party as if it were a wet rag. The CPRF can be redeemed only by a New Great Purge, removing the wheat from chaff and restoring the Old Guard to power by any means necessary. Even if it means stabbing a few old friends in the back."
 SOV_utilize_rashkinites: "[SOV_utilize_rashkinites_loc]"
 SOV_utilize_rashkinites_desc: "The Zyuganovites represent the CPRF Old Guard, sidelined by the Rashkin group in the 22' Elections, these scorned party hardliners will form a moderate base for our Neo Stalinist movement. Kvachkov's new Vanguard will use these old bureaucrats to stabilize the regime in it's early days, their usefulness to us may be limited long term but for now they will give us the legitimacy to push anti Rashkin actions without worry of collapse."
 SOV_save_ideas_of_communism: "Save Ideas of Communism"
 SOV_save_ideas_of_communism_desc: "Communism has been tainted and nearly ruined by reformism, Rashkins reckless reforms were only the latest effort to Liberalize Communism, to make it compatible with the "Free Market". Chairman after Chairman, Gorbachev, Brezhnev, Khrushchev, it was almost too late for us. Kvachkov will set us back on track, the path of Lenin and the path of Stalin, the Soviet Golden Age will again be upon us, we can cast the Chinese model into the bin once and for all."
 SOV_emergency_privatization: "[SOV_emergency_privatization_loc]"
 SOV_emergency_privatization_desc: "Under Rashkins system workers were given limited market economics, a middle class was created, an upper class was created, class cooperation became the driving force of the Unions economy. The same so called class cooperation that the Fascists spoke of in their hayday, this perversion of labor is unacceptable, the working class is equal. There can be no upper, middle, and lower class, every man has his job and that is his class, every man has the ability to be anything so long as he dedicates his life to it. From miner to foreman, functionary to chairman, social mobility is not earned by money it is earned by labor contributions and sweat and blood."
 SOV_start_over: "Start Over"
 SOV_start_over_desc: "Kvachkov has laid the foundations for a Neo Stalinist future, the revival of the party as a Vanguard force is nearly complete, now all that there is left to do is streamline the bureaucracy, prepare the army, the industry, and the people, for a second and inevitable Great Patriotic War against the Western capitalist pigs and their vassal states carved from our core lands."

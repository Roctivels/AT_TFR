 russia.1520.t: "Labor Shortage!"
 russia.1520.d: "Our policy of accelerated industrial development has unexpectedly given rise to an unobvious problem: almost all skilled workers are already employed in construction, which poses a risk of halting reindustrialization. Economists propose several solutions: the first, relatively simple but costly, is to increase wages and expand benefits for workers in order to attract more labor. The second is to use party and Komsomol resources to increase labor productivity. The third, less desirable option is to slow down the pace of construction and set more achievable goals in order to free up the workforce. All options have their own characteristics and difficulties in implementation, but nevertheless, it was decided..."
 russia.1520.a: "Let's raise salaries and give more benefits!"
 russia.1520.b: "Get the Party and Komsomol involved in!"
 russia.1520.c: "It's time to wrap this up..."
 russia.1521.t: "Direction of Development"
 russia.1521.d: "The launch of the small and medium-sized business support program presented us with a difficult question: what principle should be used to distribute this support? The first option, which is somewhat idealistic, is that assistance should be provided to those employers who value and protect their employees the most, guided by the principles of a social state. The second option, more pragmatic, is to direct funds to the most productive and efficient enterprises in the hope that they will maintain their rapid pace of work. Both options have merit, but the choice was made in favor of..."
 russia.1521.a: "Socially Responsible Businesses!"
 russia.1521.b: "First and foremost, effective ones!"
 russia.1522.t: "Monument to Bukharin"
 russia.1522.d: ""Greetings to our dear viewers! We are located at the place where ceremony of the monument to Nikolai Bukharin takes place. Very soon, the first secretary of the Moscow City Committee will deliver a speech on the occasion of this significant event. Don't switch!"\n\nAfter about half a minute, the politician came out onto the temporarily constructed stage and, glancing at the crowd, said: "Comrades! Until recently, it was believed that the policies of a man like Joseph Stalin could have nothing to do with, say, the Chinese experience, and that it was impossible to simultaneously support both Stalin's methods and the provisions of market socialism. But I am convinced that this is fundamentally wrong! Comrades, wake up: it's not the 80s, it's not perestroika - there's no need to look for extremes! We must come to terms with our history, face the truth. That is why a monument to a man like Nikolai Bukharin, one of the main ideologists of the NEP, is being unveiled today. I am convinced that if Stalin had seen the successes and achievements of modern China, the results of Deng Xiaoping's reforms, he would certainly have rehabilitated Bukharin. After all, our country was the landmark of socialism for the Chinese people, and to some extent their successes are also our successes! Comrades, thank you for your attention. I believe that relying on such outstanding personalities will help us bring closer the building of socialism!" After these words, the square was filled with applause. The atmosphere clearly indicated that the speech had resonated with those present.\n\n"We thank the representative of the Moscow City Committee for such a meaningful presentation. Lively conversations can be heard in the crowd: some express full agreement with the politician, others argue, discussing the boldness of such historical comparisons. In short, there are no indifferent people here. Stay tuned - there's still a lot of interesting things ahead, and today promises to be a really eventful day!""
 russia.1522.a: "Competent and thoughtful!"
 russia.1523.t: "New 37th"
 russia.1523.d: "The liberal media was stirred up by the news about the "return of Stalin's well-deserved place in Russian history." Accusations of "neo-Stalinism," "justification of repression," and other mistakes of Stalin's rule poured in from liberal-minded citizens. Boris Kagarlitsky was asked about his opinion on this initiative in a recent interview with Dozhd.\n\n- Boris Yulianovich, the Communist Party has recently adopted a course of, so to speak, "Restalinization", and many citizens express their concerns. Do you think it is possible at the moment to repeat the horrors of Stalinism? Gulags, mass repressions, collectivization?\n\n- I totally disagree! Many people exaggerate the scale of this policy, giving it too negative a connotation, so let me clarify. First of all, let's figure out why people still remember him. Stalin is a symbol of Victory in the Great Patriotic War and industrialization for the common people. "He took it with a plow, left it with a nuclear bomb," as Churchill put it at the time. The image of Stalin has firmly entered the national consciousness, has become traditional for modern communists. Of course, it is necessary to remember the suffering that Stalin's rule brought about in 1937. But it is necessary to separate the symbols from the real cases. I know these people... In my opinion, the fears are in vain.\n\n- An interesting position, Boris Yulianovich! But let's see if your words turn out to be the calm before the storm..."
 russia.1523.a: "The Whole Truth!"
 russia.1524.t: "Negotiations: [SOV_adl_progress_name_loc]"
 russia.1524.d: "The leadership of the Communist Party of the RSFSR appealed to [SOV_adl_progress_name_loc] with a proposal to end the political confrontation. In general, we have no reason to act against each other, since both sides adhere to somewhat similar ideals, but Progress still holds an oppositional position towards us.\nThe leader of the Alliance stated that he would not hinder detente and that ending pressure on the organization would have a positive impact on the image of Soviet democracy, but in return, the Alliance demands greater representation in power and freedom for its activities. A number of communist party members express concerns that meeting these conditions may entail unforeseen consequences, but nevertheless our response..."
 russia.1524.a: "We agree."
 russia.1524.b: "We refuse."
 russia.1525.t: "Negotiations: [SOV_peoples_front_name_loc]"
 russia.1525.d: "The leadership of the Communist Party of the RSFSR appealed to the Popular Front coalition with a proposal to end the political confrontation. Although many members of the PF had previously been supporters of the non-systemic opposition, they did not give up the fight for their ideals even after its legalization.\nTheir leader, Alexei Navalny, is far-sighted enough to enter into a dialogue with the state, but the coalition puts forward its own demands. Among them are the weakening of state control over the economy and the democratization of political institutions. In this regard, many communist party members of different views urge maximum caution in dealing with the "Front" - their concerns are related to the risk of foreign influence and the connections of some members with the former regime. However, after weighing the pros and cons, it was decided..."
 russia.1525.a: "To accept the proposal."
 russia.1525.b: "To decline."
 russia.1526.t: "Negotiations: [SOV_labor_fatherland_name_loc]"
 russia.1526.d: "The leadership of the Communist Party of the RSFSR appealed to the Labor Fatherland party with a proposal to stop the sabotage of its activities. At first glance, it may seem that they are simply speaking from Soviet-patriotic positions, but upon closer examination, their radical Stalinist and nationalist views become visible.\nThe head of the alliance, Vladimir Kvachkov, is ready to agree to a truce, but sets certain conditions: one of them is to stop spying on party members and take more account of the interests of the Russian people relative to other peoples of the Union. Such demands are sharply rejected by the liberal wing of the Communist Party, which calls for extreme suspicion of any initiatives of the "Labor Fatherland". Taking into account all the contradictions, our verdict..."
 russia.1526.a: "Agree."
 russia.1526.b: "Refuse."
 russia.1527.t: "Negotiations: [SOV_ldpr_name_loc]"
 russia.1527.d: "The leadership of the Communist Party of the RSFSR took the initiative to de-escalate relations with the Liberal Democratic Party. Despite the fact that the Liberal Democrats are considered one of the most hostile forces towards the Communists, dialogue cannot be completely ruled out.\nFortunately, Vladimir Zhirinovsky is smart enough to cooperate with communist party. However, to begin negotiations, he puts forward specific demands: to immediately stop putting pressure on members of his party and curtail surveillance of its activities. Such conditions arouse legitimate hostility among many communist party members, which requires us to take a particularly balanced approach. After long and intense discussions, the party leadership stated that..."
 russia.1527.a: "We agree."
 russia.1527.b: "We refuse."
 russia.1528.t: "Negotiations: [SOV_patriots_party_name_loc]"
 russia.1528.d: "The leadership of the Communist Party of the RSFSR took the initiative to detente relations with the SPSP. The position of this party in relation to the Communists remains ambiguous, to put it mildly, largely due to their nostalgia for the former regime.\nTheir leader, Vladimir Solovyov, is capable of a restrained dialogue, which gives hope for a settlement. As conditions for starting negotiations, the social patriots demand to stop sabotaging their activities and put an end to political pressure on people associated with the party. Such statements irritate a significant part of the communist party, so the final decision should be as careful as possible. After a series of consultations, our position was finally formulated..."
 russia.1528.a: "We agree."
 russia.1528.b: "We refuse."
 russia.1529.t: "[SOV_adl_progress_name_loc] Congress"
 russia.1529.d: "The second congress of the Alliance of the Democratic Left "Progress", an unstable coalition of various leftist forces, was held. The congress was immediately overwhelmed by squabbles and contradictions, amounting to swearing - the union turned out to be too unstable.\nAlliance leader Maxim Shevchenko resigned from his position and joined the Labor Fatherland. The "Socialist Unity" led by Oleg Shein, forces friendly to the Communist Party of the RSFSR within Progress, gained the upper hand."
 russia.1529.a: "Left Unity is saved."
 russia.1530.t: "2nd [SOV_adl_progress_name_loc] Congress"
 russia.1530.d: "The second congress of the Progress Alliance of the Democratic Left, an unstable coalition of various leftist forces, was held. The congress was immediately overwhelmed by squabbles and contradictions, amounting to swearing - the union turned out to be too unstable.\nAlliance leader Maxim Shevchenko resigned from his position and joined the Labor Fatherland. The "Social Democratic Initiative" led by Anatoly Golov, a faction within Progress that is quite hostile to the communist party, gained the upper hand. The Socialist Unity Party withdrew from the congress in its entirety and the overwhelming majority of its members joined the Communist Party. The rest turned out to be too weak to counteract the SDI."
 russia.1530.a: "A Chance for Social Democracy?"
 russia.1531.t: "2nd [SOV_adl_progress_name_loc] Congress"
 russia.1531.d: "The second congress of the Alliance of the Democratic Left "Progress", an unstable coalition of various leftist forces, was held. The congress was immediately overwhelmed by squabbles and contradictions, amounting to swearing - the union turned out to be too unstable.\nUnexpectedly, the "Leftists" took over for everyone - a gathering of marginals of the left movement within the ADL "Progress". The "Socialist Unity" and the "Social Democratic Initiative" in full force withdrew from the congress - the overwhelming majority of the leaders of the "Socialist. Unity" moved to the Communist Party of the RSFSR, and SDI - to the Popular Front. Maxim Shevchenko, the former leader of the Alliance, declined to comment and, according to some reports, retired from politics. In fact, Progress has ceased to exist - the rest of the factions, except for the "Left", are small and exist only on paper."
 russia.1531.a: "Another split in the left movement..."
 russia.1533.t: "Party Election of the First Secretary in [SOV_cprf_local_leader_state.GetName] region"
 russia.1533.d: ""
 russia.1533.a: "Experience is what matters most at the moment..."
 russia.1533.b: "The leadership needs fresh blood..."
 russia.1535.t: "Crisis in [SOV_cprf_local_problem_state.GetName] Region"
 russia.1535.d: "In the region of [SOV_cprf_local_problem_state.GetName], a new video made by a local blogger is gaining popularity, in which he sharply criticizes the work of regional authorities and federal agencies. The author analyzes current problems in detail, accusing the authorities of inaction and unprofessionalism. The section devoted to [SOV_cprf_local_problem_loc] was particularly resonant. Local residents note that the blogger "voiced what everyone has been whispering about for a long time."\n\nWhat are we going to do about this? Everyone is waiting for the Center's reaction..."
 russia.1535.a: "Teach this Provocateur a lesson..."
 russia.1535.b: "Punish the local party leadership..."
 russia.1537.t: "Large-scale Protests!"
 russia.1537.d: ""
 russia.1537.a: "Break up these rallies!"
 russia.1537.b: "We'll have to make some concessions..."
 russia.1538.t: "Split in the Party!"
 russia.1538.d: ""
 russia.1538.a: "We'll have to make some concessions..."
 russia.1540.t: "Our Economical Reality"
 russia.1540.d: "A plenum of the Central Committee of the CPSU was convened today in Moscow, at the Kremlin Palace of Congresses. The development of the All-Union economy was on the agenda. During the discussion, the members of the Central Committee came to the conclusion that the country needed gradual economic development, and the delegates proposed several options. After hours of long and fierce discussion, the plenum decided that the economy of the Soviet Union would take the path of..."
 russia.1540.a: "State Capitalism."
 russia.1540.b: "Mixed Economy."
 russia.1540.c: "Left Corporatism."
 russia.1541.t: "[SOV_soviet_union_conference_member.GetName] Agrees!"
 russia.1541.d: ""
 russia.1541.a: "The Soviet Union is getting closer!"
 russia.1542.t: "[SOV_soviet_union_conference_member.GetName] Refuses!"
 russia.1542.d: ""
 russia.1542.a: "Let's do it the hard way then..."
 russia.1542.b: "Try again! Offer better terms!"
 russia.1543.t: "Future of Reforms"
 russia.1543.d: "Alexei Navalny rose to political prominence on promises to reform the Soviet system toward greater liberalization, winning over the younger generation. But even within his team there are differences of opinion: some favor minor reforms aimed at improving the lives of ordinary citizens, while others call for a change in the constitution to suit the new government and a reduction in the role of the Communist Party.\nSupporters of minor reforms believe that there is no need to radically change the Soviet system, and that it is better to win the favor of the people by improving their lives—and this suits the Communists.\nA more radical idea is to change the Soviet constitution to strengthen the power of the Democratic Party. Of course, the Communist Party would not like this decision under any circumstances.\nA happy medium can be found: broad promotion of the DPSU agenda in the legislative process will help strengthen Navalny's power without greatly angering the CPSU. "
 russia.1543.a: "Small but meaningful reforms."
 russia.1543.b: "Push our agenda"
 russia.1543.c: "Our plan is to completely change the constitution!"
 russia.1544.t: "Press Conference"
 russia.1544.d: "A joint press conference between Valery Rashkin, Chairman of the Central Committee of the CPSU, and Alexei Navalny, President of the USSR, took place in Moscow today. The politicians met at the restored Pioneer Palace on Lenin Hills to discuss pressing issues: the issue of relations between the government and the Communist Party was on the agenda.\nRelations between the party and Navalny's team have remained strained since the Communist Party's victory in the 2022 elections: the Popular Front has become the main mouthpiece of the anti-Soviet opposition. The problem worsened after Alexei Navalny was elected in the first All-Union elections: liberal media called for the dismantling of the Soviet system, and party sources attacked the opposition, accusing them of counterrevolution and worship of the West.\nAfter the meeting, the politicians answered questions from the press: in general, the meeting was held in a friendly atmosphere and was recognized by the participants as constructive, and although it was not possible to resolve all issues during it, preparations for subsequent contacts are already underway. In conclusion, Rashkin and Navalny called on the parties to cooperate and expand cooperation between the party and the government."
 russia.1544.a: "There's always dialogue"
 russia.1545.t: "Signing of the Tashkent Agreements"
 russia.1545.d: "Today will be remembered in history as the day when the treaty of friendship between the peoples of Russia and Central Asia was signed. The solemn ceremony took place in the building of the Uzbek SSR government, which reopened its doors to uphold historical symbolism—an initiative put forward by Uzbekistan. During the event, delegates from the Central Asian republics and Russian diplomats signed historic agreements on a return to the socialist doctrine of the union.\nRepresentatives of the signatory countries joyfully announced a new page in the history of their countries. The signed documents left no doubt about the further strengthening of the political and economic alliance. This event put an end to the question of Russian influence in Central Asia."
 russia.1545.a: "Moscow's influence is growing."
 russia.1546.t: "Signing of the Tbilisi Declaration"
 russia.1546.d: "Today, a ceremony was held in the Georgian capital to sign a friendship treaty between Russia and Transcaucasia. The event took place in the Georgian parliament building because of its association with the past—it used to be the seat of government of the Georgian SSR. This step was taken by Georgia as a symbolic gesture, since Tbilisi was the capital of the Transcaucasian Soviet Federative Socialist Republic, one of the founding republics of the Soviet Union.\nRepresentatives of the Transcaucasian countries and Russian delegates signed historic agreements marking the restoration of union ties. It was noticeable how diplomats from the signatory countries spoke optimistically about a new chapter in the history of their states. The signed documents finally confirmed Russia's presence in the Caucasus and opened new avenues for the peoples to jointly overcome common challenges."
 russia.1546.a: "The revival of the USSR sounds increasingly realistic."

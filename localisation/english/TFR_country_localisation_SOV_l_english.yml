 SOV_Permanent_Defense_Readiness: "Permanent Defense Readiness"
 SOV_Permanent_Defense_Readiness_desc: "\n\n\n\n£GFX_SOV_permanent_defense_readiness\n\n\n\n\n\nWhen the Soviet Union fell, the West plunged their claws on our former republics like a pack of vultures. One by one, our bloc fell as Gorbachev refused to deploy our troops which stood guard to protect the Union, allowing them to retreat as our power as a superpower crumbled. Now it was only Russia, and her weak underbelly had been exposed as the West moved eastwards. We won't allow them to invade us much like the fascists did a century before. No matter the cost, no matter the prestige lost, the Russian Army has and will stand strong, prepared to defend our nation from any incursions and to protect our allies from the vultures of the EU and America. We may not have the prestige that we had 50 years ago, but our army will forever stand stronger than ever."
 SOV_Permanent_Defense_Readiness_dynamic: "Russian Armed Forces"
 SOV_Permanent_Defense_Readiness_dynamic_desc: "\n\n\n\n£GFX_SOV_permanent_defense_readiness\n\n\n\n\n\nWhen the Soviet Union fell, the West plunged their claws on our former republics like a pack of vultures. One by one, our bloc fell as Gorbachev refused to deploy our troops which stood guard to protect the Union, allowing them to retreat as our power as a superpower crumbled. Now it was only Russia, and her weak underbelly had been exposed as the West moved eastwards. We won't allow them to invade us much like the fascists did a century before. No matter the cost, no matter the prestige lost, the Russian Army has and will stand strong, prepared to defend our nation from any incursions and to protect our allies from the vultures of the EU and America. We may not have the prestige that we had 50 years ago, but our army will forever stand stronger than ever."

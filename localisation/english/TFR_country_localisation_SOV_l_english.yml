 #ur economy path
 SOV_continue_our_partnership: "Russian Corporatism"
 SOV_continue_our_partnership_desc: "In the 1990s, people with a certain entrepreneurial streak rose from the ranks of the Komsomol: the oligarchs. Having become fabulously wealthy on the ruins of the Soviet Union, they created corporations that were unrivalled on the Russian market. Over time, some lost everything by getting involved in areas where they did not belong, while others merged with the state and began to assist it in every way possible.\nOf course, the influence of the oligarchs is no longer as significant, but their legacy — huge corporations — is well suited to the needs of the Russian state. Thanks to them, we will be able to rise to unprecedented heights!" 
 SOV_prioritize_state_corporations: "Prioritize State Corporations"
 SOV_prioritize_state_corporations_desc: "State corporations play a critical role in the Russian economy, acting as a lever of state control: they have been given virtually monopolistic control over the most important industries. Gazprom, Rosatom, Roscosmos — there are countless examples, and we need to focus on our strengths.\nThe Atlanteans hold up the sky, and we need to help these Atlanteans."
 SOV_expand_resource_market: "Expand The Resource Market"
 SOV_expand_resource_market_desc: "Our country is rich in natural resources: nickel, gas, oil, diamonds – we have everything, too many to list. For a long time, our economy depended on exporting resources to Europe, but after the start of the European war, this channel, for obvious reasons, ceased to exist.\nSo why limit ourselves to Europe? Asia, Africa, America — the markets of these regions are open to us with open arms."
 SOV_fund_industrial_rejuvination: "Fund Industrial Rejuvination"
 SOV_fund_industrial_rejuvination_desc: "Although modern Russian industry is not a complete disaster, as it was in the 1990s, it lacks the scale of the United States and, even more so, China. The collapse of the USSR and the subsequent privatisation caused irreparable damage to Russia's industrial potential, and although we have managed to recover partially, the European war has exposed our weakness.\nIt is necessary to stimulate the restoration of Soviet enterprises, both civilian and military."
 SOV_business_as_usual: "Business As Usual"
 SOV_business_as_usual_desc: "The Russian economy has experienced many ups and downs – the turbulent 1990s, the golden 2000s, and the ambiguous 2010s. But now, through the storms and thunderstorms of the European war, despite all the sanctions, we have survived. Money from resources is flowing into the treasury again, and our people are satisfied with their lives. We have returned to what we lost after 2020: stability and prosperity.\n\nEverything is as usual. Everything is as it should be."
 SOV_special_economic_zones: "Special Economic Zones"
 SOV_special_economic_zones_desc: ""
 SOV_guarantee_social_security: "Guarantee Social Security"
 SOV_guarantee_social_security_desc: "Due to the peculiarities of our system, the social sector is one of Russia's main pillars – and one of our Achilles' heels. Hospitals are understaffed, pensions are low, and people are suffering from injustice and bureaucracy.\nWe need to introduce the most advanced technologies into our social system: digitalisation, neural networks, and other improvements for the benefit of the people. Power comes from the people and is for the people."
 SOV_modernize_the_cities: "Modernize The Cities"
 SOV_modernize_the_cities_desc: ""
 SOV_renovate_education_facilities: "Renovate Education Facilities"
 SOV_renovate_education_facilities_desc: "The Russian education system after the collapse of the USSR leaves much to be desired: excessive bureaucracy, staff shortages, low salaries and almost no respect for the profession - all this deters young professionals from teaching. This situation cannot continue—educating new generations is a vital task that affects the entire state.\nIncreasing the number of places in universities and schools, raising salaries, and reducing the workload on teachers are measures that will help the Russian education system emerge from the crisis. Russia starts small!"
 SOV_dominate_the_oligarchs: "Russian Era of Capitalism"
 SOV_dominate_the_oligarchs_desc: ""
 SOV_support_private_initiative: "Support Private Initiative"
 SOV_support_private_initiative_desc: ""
 SOV_reform_central_bank: "Reform Central Bank"
 SOV_reform_central_bank_desc: ""
 SOV_restructure_state_corporations: "Restructure State Corporations"
 SOV_restructure_state_corporations_desc: ""
 SOV_reinforce_economic_nationalism: "Reinforce Economic Nationalism"
 SOV_reinforce_economic_nationalism_desc: ""
 SOV_russian_heyday: "Russian Heyday"
 #nr economy path
 SOV_market_supremacy: "Market Supremacy"
 SOV_market_supremacy_desc: "We have no reason to reinvent the wheel, for the task of cementing Russian control is difficult as is. What we need is to radically expand our economy to sustain both our new economic bloc, and the growing economies in the Southern hemisphere. Easing regulation, lower taxes, governmental support - anything to ensure our dominance."
 SOV_russian_way_to_capitalism: "Russian Way For Capitalism"
 SOV_russian_way_to_capitalism_desc: "Why should we focus on GDP or growth metrics when it does not tackle the main point for economic growth: prosperity of the people? Our corporations, for a long time, were not close to the average joe, and the American example is not ideal either. We must not ensure constant growth, but make sure our economy is sustainable and human-oriented. Russia will pave a new way for capitalist governance. A true worker's dream!"
 SOV_give_free_rein_private_initiative: "Support Medium and Small Businesses"
 SOV_give_free_rein_private_initiative_desc: "Our small and medium businesses are in need of financial aid. Our civilian economy took a major blow during the war, and anything outside of our major corporations still struggles to recover. Our administration will invest in our entrepreneurs to ensure our industries do not stagnate and stay competitive."
 SOV_creation_business_committees: "Creation of Business Committees"
 SOV_creation_business_committees_desc: "Compared to European and American economies, our businesses are… too amateur, to say the least. We don't have the shareholder culture the West had, even simple business committees are not favoured as much. To make sure our economy remains the behemoth, we must adopt the western methods of corporate governance."
 SOV_encourage_competition_banking_market: "Encourage Fair Market Competition"
 SOV_encourage_competition_banking_market_desc: "As it currently stands, our major corporations are too static. While we would like to use the American example of corporations like Apple with their market dominance, the Chinese model of corporate cooperation can be used more effectively in our case. Corporations, by constantly cooperating with each other on projects, will ensure the prosperity of all Russians."
 SOV_economic_expansion_europe: "Economic Expansion in Europe"
 SOV_economic_expansion_europe_desc: "Why should we restrict ourselves to Russia alone? We have, quite literally, half the continent at our disposal. The economy can only go up after all. Our European allies will love our investments and corporate benefits. The best part? They will not be able to say no."
 SOV_russian_economic_giant: "The Russian Economic Giant"
 SOV_russian_economic_giant_desc: "We are a leviathan. One that Europe has not seen since WWI. A truly European behemoth. Yet we will not stop here. With China and PDTO having their own markets, why should we not compete with them too? We are a nation best suited for business, and our entrepreneurs will ensure our dominance for years to come."
 SOV_new_economic_ecosystem: "New Economic Ecosystem"
 SOV_new_economic_ecosystem_desc: "Our economic model had long been one of state capitalism. Yet our task to transform our economy to a more people-oriented one needs to be ensured from the bottom up as well. Lets encourage non-state entities that our reforms are just, and ensure they play by the rules."
 SOV_promote_economic_transformation: "Promote Economic Transformation"
 SOV_promote_economic_transformation_desc: "A diversified economy, one with a more progressive tax on large corporations, using all the modern technological marvels to ensure efficiency. We must ensure digitization for this to work, of course, for the new economic miracle will not come with an early 00s business mindset."
 SOV_support_management_of_future: "Support Management of Future"
 SOV_support_management_of_future_desc: "Just as with the economy as a whole, our management class must adapt to our changes. Less of a soulless cog in the machine, more of an effective problem solver. They must be able to use modern technology and rely less on printing. Digitizing their jobs should also be considered to remove time to do paperwork."
 SOV_mutually_beneficial_economic_union: "Mutually Beneficial Economic Union"
 SOV_mutually_beneficial_economic_union_desc: "The Sphere we have under us can be used for our sole economic benefit, yet is it really necessary? We are, for all intents and purposes, the leader of the CSTO and the new Economic sphere. We do not need to dominate the European markets like a colonial overlord. Just as we ensure mutual benefits inside Russia, we should ensure a mutually beneficial relationship with our European allies. If we ensure they are competitive just as we are, then our sphere ultimately prospers together."
 SOV_formation_communitarist_economy: "Formation of Communitarist Economy"
 SOV_formation_communitarist_economy_desc: "Russia is transforming. An economy for the people, by the people. Where corporations and businesses care for the consumer more for increasing its market value. While this process might be fragile and unsustainable in the long term, it is our job to make it so. We do not need to dominate the world economy like the Americans or Chinese did. We just need to ensure our own prosperity. Russia above all!"
 SOV_develop_innovation: "Develop Innovations"
 SOV_develop_innovation_desc: "To compete with modern economies, just raw numbers isn't enough. Innovations, technological breakthroughs and qualified cadres of our people will be necessary for the goals ahead. Russia has a lot of smart people. We just need to support them in their endeavours."
 SOV_reduce_pressure_business: "Reduce Pressure on Business"
 SOV_reduce_pressure_business_desc: "Why do we need so many regulations? If we must not repeat the same mistake as the EU did by over-regulating their economies. The Russian Economy can only grow, not stagnate!"
 SOV_restructure_tax_system: "Restructure the Tax System"
 SOV_restructure_tax_system_desc: "Our Tax System, admittedly, is not as ideal as one would hope for. Both for businesses and citizens. Too many loopholes, too many old taxing mechanisms. For Russia to ensure prosperity for decades to come, we must make sure our tax system holds up to modern standards."
 SOV_develop_alternative_investment_mechanisms: "Develop Alternative Investment Mechanisms"
 SOV_develop_alternative_investment_mechanisms_desc: "The Russian people, regrettably, do not trust investment firms. For most of our modern history it was common to invest your money into housing or apartments rather than stocks. We must develop more accessible methods for people to invest their money into. Russia will move into the modern market on equal footing with the rest!"
 SOV_transparent_state_corporations: "Transparent State-Corporations"
 SOV_transparent_state_corporations_desc: "Thanks to the Digitalization of our economy, one can make a dream our tax agency had since its inception: a totally transparent economy. We have known that some of our state corporations waste money on useless things, only to ask us for more. Yet now, with us having them as an open book, such efforts will be increasingly harder to pull off. Russia does not need wasteful spenders, and if anyone wants to steal money from our pockets, both we and the people will know."

 russia.136.t: "BMPT Completes Trials"
 russia.136.d: "Amongst a crowd of generals and important officials from the Duma, the BMPT Terminator was shown off to spectacular success. Many doubts had been aired about the fully autonomous combat vehicle even being possible, but they have been washed away by the greatness of our engineers.\n\nThe vehicle completed a rigorous obstacle course, traversing several hills and ditches filled with water, and passed combat drills with flying colors. It almost seemed too perfect. Some concerns were raised afterwards, how would the AI identify allies? Should humans even possess such technology?"
 russia.136.a: "Excellent"

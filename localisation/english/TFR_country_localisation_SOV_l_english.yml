 russia.1975.t: "Fierce Communist Opposition"
 russia.1975.d: "The political confrontation between the Communist Party and President Solovyov's administration continues to escalate. Recently, during his trip around the country, Vladimir Rudolphovich expressed the idea of reforming the office of president to give it greater significance in the state apparatus, adding that preliminary work on this issue has already been done.\nThe reaction of the communists was swift: a storm broke out in the pro-Soviet media, accusations of "dictatorial tendencies" rained down on the president, and questions about the necessity of this decision in the current situation are being raised through internal channels. Many fear that Solovyov is "taking on too much" and, in this respect, is approaching the level of Putin's rule.\nWe can ignore the reaction of the pro-Communist forces and push through the reform despite all the threats and warnings. But it would be possible to postpone this issue until another, more favorable time."
 russia.1975.a: "Ignore them!"
 russia.1975.b: "We'll back down... for now."
 russia.1976.t: "DPSU Congress"
 russia.1976.d: "The Congress of the Democratic Party of the Soviet Union has just taken place. A wide range of issues related to the party's future action plan were discussed at the meeting. Despite fierce discussions and the persistence of some participants, a common line was eventually adopted, called Moral Socialism by the authors.\n\nThe proponents of this principle emphasize that, despite the ongoing democratic reforms, which certainly correspond to the will and will of the people, our country is still called the USSR, which underlines its inextricable connection with the ideas of socialism and their legacy. The speakers noted that such an approach would not only ensure the stability of established institutions, but would also open up new prospects for development.\nThese news were welcomed with joy by the citizens, who are now even more confident in the bright future of their country."
 russia.1976.a: "The goal is set."
 russia.1977.t: "DPSU Congress"
 russia.1977.d: "The Congress of the Democratic Party of the Soviet Union has just taken place. Many different topics related to the party's future strategy were discussed at the meeting. Despite fierce discussions and the persistence of some participants, principles were eventually adopted that were generally aimed at further liberalizing the political course.\n\nThe proponents of this idea note that the culmination of ongoing democratic reforms should be full-scale parliamentarization, which will unlock the potential of republican ideas in the renewed Union. The speakers emphasized that this approach not only guarantees the inviolability of the rights and freedoms of Soviet citizens, but also allows the people to participate directly in the political life of the country. Many observers agreed that this course would give a positive character to the transformations that had begun.\nThese news were enthusiastically received by the citizens, for whom this step has become a symbol of the coming era of prosperity and new opportunities."
 russia.1977.a: "The goal is set."
 russia.1979.t: "New Democratic Union"
 russia.1979.d: ""
 russia.1979.a: "The new chapter begins."
 russia.1980.t: "Communism As A Brand"
 russia.1980.d: "The new direction of using communist ideology opens up new perspectives for us: We can use related products to boost our budget to the detriment of popularity, or to promote our power among the people to the detriment of profit. You can, of course, let everything take its course and not give priority, but the benefits of this decision may be questionable."
 russia.1980.a: "Focus on business."
 russia.1980.b: "Focus on people."
 russia.1980.c: "Let everything take its course."

 SOV_democratic_politics_category: "Democratic Politics"
 SOV_democratic_politics_category_desc: "\n\n\n\n\n£GFX_SOV_democracy_post_alikhanov\n\n\n\n\n\n\n\nOur people have awakened from the slumber and thrown off the tyrannical rule of the §YDerzhavniks§!. Now, we must rebuild our democratic institutions and government with the help of various §CDemocratic§! parties throughout §WRu§Css§Ria§!"
 SOV_socialist_politics_category: "Socialist Politics"
 SOV_socialist_politics_category_desc: "With Alikhanov's regime toppled, a new socialist government will chart its own course for Russia. Our future will hinge on whether our new republic embraces democracy or veers towards authoritarianism."
 SOV_derzhavnik_economy_category: "Derzhavnik Economy"
 SOV_derzhavnik_economy_category_desc: "The strong nation cannot survive on politics alone. It needs a strong economic foundation to support itself. This is why Derzhavniks have come together to propose a massive restructuring of Russia's economic structures. This will empower national forces within the economy and eliminate stale corruption and harmful influences."
 SOV_rebuilding_the_regions_category: "All-Russian Rebuilding Programmes"
 SOV_rebuilding_the_regions_category_desc: "\n\n\n\n\n£GFX_SOV_rebuilding_category_banner\n\n\n\n\n\n\n"
 SOV_reform_russia: "Reforming Russia"
 SOV_reform_russia_desc: "Despite the venomous nationalism and oligarchical deception directed at us, RPSS has triumphed. Our path now begins. We are resolute in our mission to metamorphose this state into something approximating a genuine government of the people. Certainly, we will face opposition from right-wing factions and reactionary military elements. But we have a clear strategy, and we must steadfastly adhere to it."
 SOV_political_simulation_category: "Political Simulation"
 SOV_zhir_post_war_economy_category: "Economic Reconstruction"
 SOV_zhir_post_war_economy_category_desc: "We have successfully won the European War, but it required a huge effort in terms of economic output and reorganization. Now, our goal is to bring the economy back to a more sustainable state so that our country can continue to develop properly in the post-war period."
 SOV_african_dawn_category: "African Dawn"
 SOV_african_dawn_category_desc: "§GAfrica§! has always been taken advantage of by the so-called §Y"Golden Billion"§!. Methods changed, of course, they shifted from outright colonialism to more subtle §Yneo-imperialist§! tactics of economic domination. However, nothing lasts forever. Many nations in §GAfrica§!, particularly those in the §YFrancophone region§!, are finally §Cstanding up§! against the unfairness they face in their lives. They are not only raising their national flags but also the Ru§Css§!§Rian§! flags!\n\nCurrently, £GFX_army_experience  §OAfrican Liberation Forces§! Consist of:§Y[SOV_mali_status][SOV_burkina_faso_status][SOV_niger_status][SOV_guinea_status][SOV_senegal_status][SOV_GNB_status]§!"

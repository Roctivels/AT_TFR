 SOV_liberalization_of_minds_desc: ""
 SOV_rebirth_of_russian_liberalism: "Rebirth of Russian Liberalism"
 SOV_rebirth_of_russian_liberalism_desc: ""
 SOV_sponsor_intellectual_clubs: "Sponsor Intellectual Clubs"
 SOV_sponsor_intellectual_clubs_desc: ""
 SOV_unite_the_liberals: "Unite The Liberals"
 SOV_unite_the_liberals_desc: ""
 SOV_stability_and_security: "Stability And Security"
 SOV_stability_and_security_desc: ""
 SOV_empower_military_officers: "Empower Military Officers"
 SOV_empower_military_officers_desc: ""
 SOV_army_service_propaganda: "Army Service Propaganda"
 SOV_army_service_propaganda_desc: ""
 SOV_unified_loyalist_forces: "Unified Loyalist Forces"
 SOV_unified_loyalist_forces_desc: ""
 SOV_zealous_anti_bolshevism: "Zealous Anti-Bolshevism"
 SOV_zealous_anti_bolshevism_desc: ""
 SOV_enforce_martial_law: "Enforce Martial Law"
 SOV_enforce_martial_law_desc: ""
 SOV_chancellor_commander: "Chancellor-Commander"
 SOV_chancellor_commander_desc: ""
 SOV_loyality_to_the_tsar: "Loyalty To The Tsar"
 SOV_loyality_to_the_tsar_desc: "Autocracy is one of the most important bonds of the Russian people. The king was always his shepherd, guiding him on the right path. Unfortunately, various "intellectuals" and traitors have distorted the image of the good king in the eyes of the common people, turning the well-wisher into a tyrant. The same narrative was present throughout the Bolshevik era, finally consolidating in the popular mind the idea that "the tsar is bad and the boyars are bad." The time has come for the sovereign to rule his subjects completely and fairly."
 SOV_new_black_hundreds: "New Black Hundreds"
 SOV_new_black_hundreds_desc: "The Black Hundred organizations appeared during the Revolution of 1905-1907 as a reaction to the frenzy of socialists and liberals. They were true patriots of their Fatherland, and their struggle against various anti-imperial elements, if not encouraged, was not condemned or prosecuted. Due to the betrayal of the Duma in February 1917, the Black Hundreds were banned, but even in exile they continued their work.\nAfter the fall of the Bolshevik state, the new Black Hundreds raised their banners again, piously defending traditions and the imperial way of life. The tsar needs loyal subjects, and it is difficult to imagine better candidates for ministerial positions than the Black Hundreds."
 SOV_devout_nation: "Devout Nation"
 SOV_devout_nation_desc: "It is impossible to imagine Russia as it is without Christianity. It was Orthodoxy that made Russia the successor of Byzantium, and it became the most important tool for shaping the Russian people and culture. With prayer, peasants, city dwellers, merchants, officials, and kings woke up, ate, worked, and fell asleep.\nBut all this was lost after the atheist Bolsheviks seized power. They destroyed churches, icons, monasteries, killed and exiled priests: everything to erase from the national memory the fact that it was the Christian faith that united Russians of all ranks and classes. Although the red rule ended, people did not become more pious from this: only a small stratum of the population, consisting mainly of women, regularly visited temples. It's time to restore faith in Christ to the entire Russian people!"
 SOV_russification_intensification: "Russification Intensification"
 SOV_russification_intensification_desc: "Previously, the empire was united. Everyone, from Kyrgyz to Lithuanian, from Finns to Georgians, were subjects of the Russian Tsar. But because of the traitorous liberals and godless Bolsheviks, these nationalities gained "national identity." Instead of living peacefully in peace, the peoples decided to fight for autonomy. The Bolsheviks played on these contradictions, which ruined them after more than half a century. Now that we rule the entire former territory of the Russian Empire, we will step up efforts to Russify the imperial outskirts so that this does not happen again. Yes, Bobrikov!"
 SOV_radicalize_lower_stratum: "Radicalize the Lower Stratum"
 SOV_radicalize_lower_stratum_desc: "The Russian people are the greatest people in history. His natives changed the laws of science, the universe, and philosophy, and became the most brilliant writers and artists. But all kinds of national traitors put him to sleep, and subdued the most active ones. Let's destroy decades of apathy! All in the Black Hundreds, build the Russian World!"
 SOV_loyal_religious_doctrine: "Loyal Religious Doctrine"
 SOV_loyal_religious_doctrine_desc: "There was a history of the relationship between the Russian state and the Orthodox Church... ambiguous. Peter the Great's reforms subordinated the church to the state, abolishing the institution of the patriarchate, which was restored only in 1943. Instead of the patriarch, the main role in the Russian Orthodox Church was played by the Holy Synod, an authority appointed by the Sovereign. Of course, to abolish the patriarchate is too radical, but we can create, ahem, an "advisory" Council, which will be appointed by the Tsar. Thus, the sovereign's will will be projected through religion."
 SOV_myth_of_nicholas_the_passion_bearer: "Myth of Nicholas the Passion-Bearer"
 SOV_myth_of_nicholas_the_passion_bearer_desc: "Since the 90s, there has been a "teaching about the redeemer king" in the Russian Federation. This branch of "national Orthodoxy" believes that the death of Nicholas II is a redemptive sacrifice before the sins of the Russian people, and that he should repent for his murder. Of course, the ideas of some radicals about "Satanic" INN and insurance policies are harmful, but the idea of the God-chosen Russian people and the autocratic government is very tempting..."
 SOV_imperial_nationalism: "Imperial Nationalism"
 SOV_imperial_nationalism_desc: "Our people should not forget: we are all subjects of the Empire! Everyone: from an official to an entrepreneur, from a worker to a farmer, from Vladivostok to Warsaw, we are Russians! And we should be proud of it!"
 SOV_revising_his_vision: "Revising His Vision"
 SOV_revising_his_vision_desc: "Zhirinovsky was undoubtedly a great statesman and a visionary for a new Russia. However, his philosophy often fell prey to misinterpretation by fanatical elements. Slutsky will rectify this mistake. Vladimir Volfovich clearly advocated for a genuinely Russian democracy, one that was independent of Western theorists and analysts, rooted in our traditions and history." 
 SOV_empower_the_senate: "Empower The Senate"
 SOV_empower_the_senate_desc: "The Senate should function as the president of Russia's primary advisory body. With its elected senators, we can better understand and represent the diverse ideologies of our nation." 
 SOV_national_presidency: "National Presidency"
 SOV_national_presidency_desc: "The president stands as the linchpin of our nation's security. He holds the ultimate authority, making crucial decisions that shape our future. It is the president who has guided us through challenging times and will continue to do so, forever."
 SOV_modern_political_philosophy: "New Political Philosophy"
 SOV_modern_political_philosophy_desc: "Vladimir Volfovich Zhirinovsky, a multifaceted individual, excelled not only in politics but also in various other fields. His voluminous written and unspoken words have echoed through decades, leaving an indelible mark on our society. Our nation has absorbed his teachings, integrating them into our collective understanding and building upon this foundation." 
 SOV_secure_russian_democracy: "Secure Russian Democracy"
 SOV_secure_russian_democracy_desc: "The time has come. Our Russia stands on the brink of its first election since Zhirinovsky's ascent to power. Numerous candidates will vie for the people's vote, but only those who possess sharp wits and a deep understanding of the Russian people will succeed. Some of these contenders hold rather extreme views, and we fervently hope that such individuals will not triumph in this free and national election."
 SOV_political_tutelage: "Party's Tutelage"
 SOV_political_tutelage_desc: "The LDPR stands for free voting, but it's not the right time yet. The world is facing grave threats and ideologies, and perhaps only Russia can protect us from these dangers. Our respected leader and President, Leonid Slutsky, must guide our nation with the care of a parent guiding a child. We believe that one day, Russians will choose wisely when they vote." 
 SOV_new_russian_era: "New Russian Era"
 SOV_new_russian_era_desc: "Arise, great Motherland, home to diverse peoples of various creeds, nationalities, and religions. A new era dawns upon us all. Russia shines as a beacon of virtue and sanctity, where citizens actively engage in the life of our great nation through democratic and national government bodies. Enemies, both internal and external, may attempt to undermine us, but we will not falter. We are a proud people." 
 SOV_cabinet_of_patriots: "Cabinet of Patriots"
 SOV_cabinet_of_patriots_desc: "In the first all-Russian elections after the death of the great Vladimir Zhirinovsky, an unexpected candidate won. Denis Pushilin, the former leader of the DPR, and now the president of Russia, was seen as a dark horse from the very beginning. However, thanks to his calls for all-Russian patriotism and promises to "restore stability," he still managed to gain the trust of Russian residents. Surprisingly, the slogan "We can do a lot!" turned out to be especially successful. However, now is not the time to rest on our laurels. Denis Pushilin plans to restructure Zhirinovsky's system into something more reminiscent of Putin's Russia. Anyway, it's time to get to work!"
 SOV_embrace_big_tent_politics: "Embrace Big-Tent Politics"
 SOV_embrace_big_tent_politics_desc: "What difference does it make if you're a leftist or a rightist if you're a patriot of your homeland? Do people who sincerely care about their fatherland really have to fight with each other and conflict over slightly different views? Let's say no to far-fetched factionalism and division. There is a place for everyone in our party."
 SOV_saddle_the_opposition: "Saddle The Opposition"
 SOV_saddle_the_opposition_desc: "The opposition is the right thing for the state and it is necessary. Pluralism of opinions, democracy, and that's it. But it's even better if this very opposition is... accommodating. Don't get me wrong, criticism is necessary and important for the state. It's just better when these critics don't go overboard, and don't try to destroy the very foundation on which the country stands."
 SOV_reliable_tsentrizbirkom: "Reliable Tsentrizbirkom"
 SOV_reliable_tsentrizbirkom_desc: "It doesn't matter how they vote, it's important how they think," it's not known who exactly uttered this phrase at the time, someone attributes it to Stalin. However, the gist of this quote is correct. Who knows what kind of manipulations could have taken place in the elections and referendums held in the past? In order to prevent such manipulations in the future, we will need to carry out serious changes in the Central Election Commission. Of course, this is all to ensure that the results are always as correct as possible."
 SOV_systematize_russian_militia_duty: "Systematize Russian Militia Duty"
 SOV_systematize_russian_militia_duty_desc: "The militia served our state very well during the war in Donbas, and it is very surprising that in Russia itself this tactic began to advance only during the war with NATO, and very crumpled and rather ineffective. The time has come to systematize the Russian militia and create a powerful framework for this initiative."
 SOV_trumpet_of_the_state: "Trumpet of the State"
 SOV_trumpet_of_the_state_desc: "The media has always been an incredibly important tool, and it's not for nothing that they are sometimes called the fifth branch of government. That is why all citizens of our country should know about our successes! Television, newspapers, and online news outlets. All this will broadcast about how good it is to live in our country. And why do European countries salivate with envy and want to destroy us!"
 SOV_new_towers_of_kremlin: "New Towers of Kremlin"
 SOV_new_towers_of_kremlin_desc: "Anyway, it is impossible to force all people to follow a single party line. Including in the government.  Various influential people will stick to like-minded people, organize groups and even conflict with rivals. On the other hand, it allows the political life of our country not to stand still. The undercover struggle may seem like something bad on the surface, but in reality it is only a natural result of the development of our political system."
 SOV_prioritize_mvd: "Prioritize MVD"
 SOV_prioritize_mvd_desc: "The recent events that took place after the death of Vladimir Volfovich have taught us one very unpleasant but important lesson. If we suddenly get distracted and lose sight of traitors and other terrorists, then without a doubt our entire system will go to waste. To prevent this, we need to ensure stability, especially internal stability, which the Interior Ministry will help us with. An increase in the budget and powers certainly won't hurt them."
 SOV_glorify_military_service: "Glorify Military Service"
 SOV_glorify_military_service_desc: "Soldiers, brave soldiers who, despite all the hardships, see their vocation in protecting the interests of our vast homeland. Can any self-respecting state leave such people on the sidelines of life? Of course not! Being a soldier should be prestigious, respected by fellow citizens on the one hand and benefits from the state on the other. Moreover, in this way we will be able to attract more people to this difficult service."
 SOV_favor_novorossiyan_personnel: "Favor Novorossiyan Personnel"
 SOV_favor_novorossiyan_personnel_desc: "Novorossiya officials performed better than others during the struggle for independence and during the European War. And therefore it was wrong to leave them exclusively in Novorossiya. Moreover, the clashes between the hawks and the reformists have left us some room for action in this regard. So why don't we promote proven, competent, and loyal people?"
 SOV_sovereignty_above_all: "Sovereignty Above All"
 SOV_sovereignty_above_all_desc: "Any country exists only when it is independent. If a state cannot live without trading with someone, relies on someone's armed forces, or, in the most neglected case, cannot conduct its own foreign policy, then it is not a country. It is a raw material appendage or a separate market, not a country. This is not the future we want for Russia, and therefore its sovereignty will come first in our state!"
 SOV_new_russian_era_rogozin: "New Russian Era"
 SOV_new_russian_era_rogozin_desc: "Arise, great Motherland, home to diverse peoples of various creeds, nationalities, and religions. A new era dawns upon us all. Russia shines as a beacon of virtue and sanctity, where citizens actively engage in the life of our great nation through democratic and national government bodies. Enemies, both internal and external, may attempt to undermine us, but we will not falter. We are a proud people." 

 russia.324.d: ""
 russia.324.a: "Ладно"
 russia.324.a: "Да чё-то не..."
 russia.325.t: "The Cities of the Sun"
 russia.325.d: "Progress is the future, and the future belongs to Communism. After the Party's new initiative of intensifying scientific funding, to pursue the Utopian ideal, dozens of research centers have sprung up or have been rebuilt. However, the most staggering and advanced of them - 'Enterprise 3826', has been constructed in mountainous areas of our Soviet Kazakhstan.\nThere, breakthrough experiments are done in the fields of biological-botanical studies, experimental medicine, and all sorts of advanced technology, all conducted in enormous complexes that are named after famed Soviet and Russian scientists, while engineers and researchers live in purpose built towns near their facilities.\nThe mind overflows with ideas about the advancement and improvement of the land of our forefathers, from artificial intelligence and automation to flying cities, one of which could perhaps someday become the new capital of the new Union.\nThis Enterprise will surely become birthplace of many technologies of tomorrow."
 russia.325.a: "The future will be beautiful. Fantastic sun cities will rise in this land."
 russia.326.t: "The Colombian Civil War"
 russia.326.d: "With the break out of hostilities in Colombia, we have a decision to make on which faction to support in their armed struggle to unite the country."
 russia.326.a: "We will support the Official Government"
 russia.326.b: "We will support the National Liberation Army"
 russia.326.c: "We will support the Carlos Patino Front"
 russia.327.t: "Russian Aid Arrives"
 russia.327.d: "Despite political disagreements, Russia have sent us major support packages, that mostly include weapons. We have always been friends with Russians and will continue our fruitufl relationship"
 russia.327.a: "Spasibo, Tovarishch Fashist!"
 russia.327.b: "Spasibo, Ruskie!"
 russia.328.t: "Social Media Fake News"
 russia.328.d: "In recent days rampant fake news bombardment on social media has led to massive destablization in various sectors of our country."
 russia.328.a: "Who's behind this?!"
 russia.329.t: "Mironov Endorses Medvedev"
 russia.329.d: "Earlier today the leader of the left-wing SRZP party endorsed Dimitry Medvedev and his United Russia in the upcoming presidential elections. This announcement was widely expected by analysts as the SRZP has a history of being broadly supportive of Medvedev's predecessor, with Sergey Mironov praising the presidential candidate's pledges to further democratize the country. As the election campaign continues to unfold, the support of the moderate left will be a boon for United Russia as it seeks to earn another mandate to govern the nation."
 russia.329.a: "Patriots should stick together."
 russia.330.t: "SRZP Joins CPRF's Coalition"
 russia.330.d: "In a morning press conference the leader of the SRZP, Sergey Mironov, announced his party's support for the CPRF in the upcoming presidential elections. Seen as a modest upset as the SRZP has a history of cooperation with United Russia, it's a sign that the winds of Russian politics are changing. With the CPRF expected by some to make its strongest showing since 1996, the support of the moderate left opposition may be an early bellwether for things to come as the heated election campaign unfolds."
 russia.330.a: "Socialists should stick together."
 russia.331.t: "Terrorist Attacks in Western Ukraine"
 russia.331.d: ""
 russia.331.a: "Put down these goons!"
 russia.332.t: "Open Revolt in Western Ukraine"
 russia.332.d: ""
 russia.332.a: "They didn't learn the last time."
 russia.333.t: "Reformation of Soviet Parliament"
 russia.333.d: "The Communist Party of the Russian Federation plans to reform the Soviet parliament by adopting the model of the National People's Assembly. The new system will create a single legislative body with representatives from all regions of the country, striving to become more democratic and representative. However, some members of the old regime oppose the changes, and concerns remain about their implementation and transparency. The Communist Party is determined to make this bold experiment in democracy work."
 russia.333.a: "Best Political System of 21st Century."
 russia.334.t: "Perfection of The Party-State"
 russia.334.d: "PLACEHOLDER."
 russia.334.a: "Best Political System of 21st Century."
 russia.335.t: "Red Flags Over Donbass"
 russia.335.d: "After our victory in the elections, it became clear that the republics of Donbass must also change. Our special services carried out a series of operations aimed at discrediting the current governments, and then, with the help of our loyal military, carried out peaceful coups. Comrade Rashkin has a different vision of Donbass, it will become a haven for the new Soviet Ukrainian government, and the necessary bureaucratic arrangements have already been made. Very soon a new Ukrainian Soviet Federative Socialist Republic will be established, the mistakes of the past have been taken into account and the new Soviet Ukraine will be a federation like Russia. In Donetsk, a broad socialist left coalition has been formed from local communists, fugitive members of the CPU, and members of the Borotba Association. Ukraine has already condemned us and called it a new stage of escalation.\nOf course, there are many in Donbass who are dissatisfied with our actions and consider it a betrayal of Russian interests, but we will deal with these chauvinists."
 russia.335.a: "All of Ukraine will be red."
 russia.336.t: "Red Donbass"
 russia.336.d: "After rounds of lengthy negotiations in Moscow, the leaders of the Donbass republics returned to their cities with a unified agenda: to hold a congress and sign an agreement on the creation of the "Union of People's Republics." The project, which in 2014 seemed like a dying idea and was shelved, gained new relevance after Kiev's official refusal to implement the Minsk agreements. Now the main points of the republics' governments are social equality, a workers' economy and people's democracy, as well as expanded cooperation between the two states. To achieve this goal, with Moscow's help, a unified inter-republican socialist organization was created - the "United Front" - a union of all progressive forces in the region. The heads of the LPR and DPR were elected as its temporary leaders and also received party cards of the Communist Party of the RSFSR. As one Luhansk Telegram channel notes: "It was only a matter of time before the new forces in the Kremlin would reshape our region in accordance with their vision of Russia."\n\nThe delegates now have only to determine the main task of this Union, what this project will become: a strong, independent Novorossian state or an underground forge for the future reformatting of Ukraine into a single federal Soviet republic."
 russia.336.a: "Long live Soviet Novorossiya!"
 russia.336.b: "All of Ukraine will be red!"
 russia.337.t: "Neo-Soviet Democracy"
 russia.337.d: "Valery Rashkin, president of Soviet Russia, together with scientists from RSSO (Russian Scholars of Socialist Orientation) released their first book, Neo-Soviet Democracy. A book that describes the main ideological principles of modern Russian communists, a new model of the state structure of the Russian State and the prospects for its future development. It is praised for its simplicity of explanation and accessibility: in order to understand what it's all about, it is not necessary to read all the works of the classics of Marxism before. The book became the basis for educational programs in several universities, which demonstrates the significance and importance of its content. However, it has received harsh criticism from the extreme left-wing camp, which accuses Rashkin of revisionism, of misinterpreting the experience of building socialism in the USSR, and of the banal contradictions that can be found in his work. Despite the criticism, Neo-Soviet Democracy has been widely distributed among students and is popular in circles that support Rashkin, as well as continuing to generate interest and discussion in the Russian political and economic environment.  The book is not as popular abroad, but it has provided many experts with a better understanding of what is now generally happening in our country."
 russia.337.a: "Important work for a developing ideology!"
 russia.338.t: "A New Purpose of ONF"
 russia.338.d: "With each new step taken by the government under the leadership of Dmitry Medvedev, the concept of party politics in Russia is becoming more and more vague.\n\nThe All-Russian Popular Front is coming to the fore, which unites not only political, but also labor and volunteer organizations - trade unions and associations of active citizens.\nUnited Russia, being the largest participant in the Popular Front, attracts its former opponents and partners, both in the Duma and outside it, to cooperate with the organization. Some experts call this a general political unity within the government.\n\nThe decisions made by the ONF are becoming the driving force of Russian society."
 russia.338.a: "The Russia has a guiding hand."
 russia.339.t: "FSB Report On Suspicious Activity"
 russia.339.d: "After the recent crackdown on russophobic organisations, FSB has begun to report that some of the more radical elements seem to have begun connecting with each other and organizing in unknown locations. FSB also intercepted some of their pamphlets, where they questioned 'Russian Nationalist Borders' and the concept of Russian Sovereignty itself, saying that possible western intervention would be more beneficial to communists in Russia."
 russia.339.a: "Keep an eye on them."
 russia.340.t: "Anti-Establishment Communists Organize"
 russia.340.d: "The reports from the FSB have been confirmed. Some people who escaped from communism have started to talk online about the 'Communist People's Liberation Army' and their fight against 'Russian neo-imperialism'. This is a worrying development and we need to pay closer attention to it.\n\nWith the rise of godless communists in Western Europe after their defeat, we can expect that these terrorists will receive funding from their European overlords."
 russia.340.a: "Watch them!"
 russia.341.t: "Novorossiyisk Bombing"
 russia.341.d: "The news from Novorossiysk is very disturbing. There was an explosion at one of their ports, injuring many port workers. The extremist KNOA has claimed responsibility for the attack and stated that they will not stop until the "reactionary nature of Russia" is destroyed.\nOur leader has delivered a public address, in which he has condemned the Neo-SRs, referring to them as "Red Imps of the Underworld." He has vowed to either imprison or eliminate them, leaving the decision up to them."
 russia.341.a: "Proof of the communists' bloodthirsty nature."
 russia.342.t: "Ryazan Shooting"
 russia.342.d: "The newly formed radical communist organization, KNOA, has intensified its activities and become more confrontational following the bombing in Novorossiysk. One of its members opened fire in the central streets of Ryazan.\nFortunately, the perpetrator was promptly apprehended. There were no civilian casualties, and only a police officer sustained minor injuries."
 russia.342.a: "They must pay!"
 russia.343.t: "FSB Designates KNOA as a Terrorist Organisation"
 russia.343.d: "After a series of strikes by so-called 'worker's liberators', FSB has publicly announced the measures taken to punish and destroy this new terrorist threat. The men have been organized and resources pulled to start operations aimed at disarming KNOA and their possible accomplices."
 russia.343.a: "Hands-On!"
 russia.344.t: "ANTI-TERRORIST ACTION REPORT"
 russia.344.d: "FROM COMMANDER-IN-CHIEF OF THE NATIONAL GUARD: VIKTOR ZOLOTOV\n\nDear Supreme Commander,\nAfter precise and coordinated strikes by the Russian Guard and security forces, the KNOA organisation was defeated! Our troops surrounded what was left of them as they attempted to flee to the Caucasus Mountains. After a short fight, most of them surrendered.\n\nApparently, they wanted to establish a "Revolutionary Soviet Government" and wage a "Partisan War". Fortunately, we were able to stop these extremists in their tracks.\n\nI am convinced that KNOA no longer poses a threat to Russia. We can now announce to our people the victory of law and order over the terrorist threat."
 russia.344.a: "Good Job!"
 russia.345.t: "Anti-Communist Trials"
 russia.345.d: "Today Trials on KNOA membership and leadership are to be held."
 russia.345.a: "Life-Inprisonment."
 russia.345.b: "Death penalty."
 russia.346.t: "Novorossiysk Economic Boom!"
 russia.346.d: ""
 russia.346.a: "Incredible"
 russia.347.t: "Uprising in Poland"
 russia.347.d: ""
 russia.347.a: "We must help them!"
 russia.347.b: "Leave it to themselves..."
 russia.348.t: "Foreign Mercenaries Sighted in Belarus"
 russia.348.d: ""
 russia.348.a: "Give them hell!"
 russia.349.d: ""
 russia.350.t: "Russian House of Cards"
 russia.350.d: "To westerners, the Russian political system has always seemed like a riddle, while in reality there nothing out of ordinary, save for few 'national characteristics'. The political scene is divided among three biggest parties:\n£GFX_CPRF_logo The Communist Party of Russian Federation - While the USSR fell 30 years ago, many Russians still cozy socialist ideas and nostalgia. Coupled with oligarchical inequality that has caused a great deal of resentment, the Communists stand as Russia's second largest party.\n-\n£GFX_UR_logo United Russia - A decades long conservative party that has held the majority in the Duma, and the de-facto party of President. UR stands for new outlook on Russia, beyond past formations.\n-\n£GFX_LDPR_logo Liberal-Democratic Party of Russia - is, despite it's name, a nationalist, populist party led by a popular showman. If communists want to create a new Soviet Union, the LDPR strives to create a second Russian Empire.\n\nAll of the parties do not agree on virtually anything, only the general idea of restoring Russian greatness. They would have eternally scabbld and debated, if not for one man - Vladimir Putin, the unifier, he stands above them all, mastering their civic cooperation. As long as he's at helm, they will continue play by his rules."
 russia.350.a: "The pendulum swings steadily..."
 russia.350.b: "I want to know more!"
 russia.353.t: "The West Refuses!"
 russia.353.d: "The writing was on Alexei's desk. He knew what it meant, but he still couldn't believe it. The request to ease the brunt on the Russian economy by softening the reparations was refused by the EU. Well, "refusal" was not the right word. What was lying on his desk was a document listing the corporations which would need to be sold to their European counterparts in order to "ensure mutual trust". It was unbelievable. The reparations were only meant to destroy the previous government. Yet, after a pro-western democratic government has taken power, the EU is using these shattering reparations to carve up most of the Russian businesses. The worst part is, even if Russia gives all of these concessions, it still won't be able to pay off for at least 200 years. It's unrealistic. Navalny knew that. But what he didn't understand is why NATO didn't hold their end of the deal. They promised him an ease of the reparations and a genuine integration into Europe. Promised a return of occupied cities. He was promised an ability to create a truly free, prosperous Russia. It was taken from him.\n-"We should just agree" - said Volkov, Alexei's FBK right hand.\n-"Is this the EU funding talking for you?" - asked Maxim Katz, a blogger-turned leader.\n-"What did you say?"\n-"Unlike some of us, I don't want to spend my days relaxing in villas but actually make a prosperous nation. We all know how you smeared Venedictov to bolster your funding base."\n"Enough. I will think about the reply. You can leave now." - Alexei sighs, It is clear NATO doesn't want Russia to recover. Hell, it never wanted it to recover from the collapse of the USSR in the first place. Even during Yeltsin the west had funded Chechen separatists while trying to make Russia into a bulwark against China.\n"We were never meant to be prosperous" - he whispered. This thought angered him. Russia was carved up, losing 1/5th of its population. Now those people either live under unstable regimes, or under occupation and persecution. The huge influx of Crimean and Donbass citizens fleeing to Russia backed this fact. Rostov and Belgorod didn't fare much better, with even rumors of 'de-russification' spreading around, the west turning a blind eye to it..\n"Putin was right..." - Navalny came to a sudden conclusion."
 russia.353.a: "True freedom must be fought for."
 russia.354.t: "Katz's List"
 russia.354.d: "After recent upheaval with Berlin's refusal, Maksim Katz, one of leaders of "Russia of the Future" party, published a series of articles where he publicly called out and castigated several notable ministers, chief among them being prime-minister Leonid Volkov, for blindly siding with clear xenophobia. Later Katz has been noticed entering Kremlin for, as media rumors, heart-to-heart meeting with President Navalny.\nThe results of it remain unclear, but Navalny's politics have been noticeable shifting towards anti-west populism, so it's safe to assume that those statesmen are not for long on their positions."
 russia.354.a: "The new era begins now."
 russia.355.t: "Russians Opressed In Kazahstan!"
 russia.355.d: "Timur PIZDEC P"
 russia.355.a: "Demand a referendum immediately!"
 russia.356.t: "Russians Demand Referendum!"
 russia.356.d: "Timur PIZDEC P"
 russia.356.a: "Errrrrr"
 russia.356.b: "FUCK YOU!"
 russia.357.t: "Kazahstan Government Refuses!"
 russia.357.d: "Fucktards"
 russia.357.a: "Then we do it a hard way."
 russia.358.t: "Guard Division Enters Moscow!"
 russia.358.d: "Today, the usual evening life of the capital has been cut short by the sounds of rolling tanks and soldier chatter. Within just an hour a National Guard division was able to bloodlessly seize all government buildings. The Chief of National Guard Victor Zolotov has made it clear in his televised emergency speech that such a harsh decision was forced by the inabilty of the civilian LDPR government to resolve the crisis swiftly. He promised a return to normal life and stability once the critical situation is resolved. Zolotov ended his speech with "Glory To Russia!" and urged all law-abiding citizens to continue their daily routines."
 russia.358.a: "No "Swan Lake" at least."
 russia.359.t: "Zolotov's Final Decision"
 russia.359.d: ""
 russia.359.a: ""Only those who can continue Zhirinovsky's vision...""
 russia.359.b: ""Civil politicians are untrustworthy...""
 russia.360.t: "Extraordinary Elections!"
 russia.360.d: "Ivan walks down the street to vote for his favored candidate."
 russia.360.a: "...Victor Zolotov!"
 russia.360.b: "...Sergey Shoigu!"
 russia.360.c: "...Alexei Dyumin!"
 russia.361.t: "Russian Union of Alternative Sexualities"
 russia.361.d: "After the reformation begun, many social groups have been created all around the country, but one specific caught not only attention of Russian media, but also their western colleagues. Formed only recently, but already accumulating membership, "Russian Union of Alternative Sexualities" claims to represent the part of Russian LGBTQ that puts itself against the western hypocrisy.\n\nThe chairperson of organisation - Mikhail Lakov, wrote this in their manifesto: "Friends, brothers and sisters, let me address "the contradiction" of our group: why should we stand against the west? For years all LGBT organisations of our country aimed at the west, trying to bring the progressivism here. But Europe came here itself, and what did they leave us? Ruined buildings, poverty, and occupation. No matter the faults of previous governments, they had no right to treat equal human beings this way. The west preaches equality and inclusivity, all the while ignoring the plight of our brethren in their not-so-progressive member-states, at the very best, and helping butchering them at the very worst. Europe lost its way. Our people see us as traitors, and who can blame them? We ourselves were fooled by pride-parades in Paris and Berlin. By standing together, as one country, we can show everyone that we're united with them against the common evil of satanic west and their porcelain masks. Together we can make Russia a beacon of hope and freedom."\n\nLGBTQ+ organisations of the west have already decried RUAS as ultranationalistic and revanchistic, hetero-loving splinters. Their voices however is unheard in Russia, while voice of Lakov, after being publicly supported by President Navalny, grows only louder." 
 russia.361.a: "Now these gays I can stand behind...err"
 russia.362.t: "Gavriil Doroshin Wants To Join The War"
 russia.362.d: "Gavriil Doroshin is a descendant of Nicholas I on the female line. The Emperor's eldest daughter Maria Nikolaevna is his great-grandmother in the eighth generation. In addition, he is related to the French imperial family. Maria Nikolaevna's husband is the grandson of Josephine, Napoleon's wife.\n\nBut the grand ducal title passed only through the male line, so that the Russian throne Gavriel Doroshin does not claim the throne. He honors family roots.\n\nPart of his relatives died during the First World War or was shot after the revolution. And great-grandmother Tamara Leuchtenberg de Beauharnais emigrated to France. Gabriel was born already there - in Marseille.\n\nThe first time Gabriel went to Donbass was in 2015. At that time he was 18 years old. He dropped out of school (he dreamed of becoming a photographer) and joined Alexander Zakharchenko's Oplot battalion. For two years he fought in reconnaissance, was a machine gunner. He received the call sign "Tasman" in honor of the Tasmanian devil, a small but ferocious predator.\n\nNow he wishes to go to the front lines of the European war. Will we leave the bearer of royal blood safe, or will we allow him to do his duty to his homeland?"
 russia.362.a: "A true patriot! request accepted."
 russia.362.b: "We can't allow for blueblood to be spilled, request denied." 
 russia.363.t: "The Motherland I Once Knew"
 russia.363.d: "Svetlana Mikhailova never missed the bus to work in downtown St. Petersburg. The city was always a hectic place to live and the commute a little long, but it didn't bother her. How could she be bothered? For Russian standards, it paid decently well and for the arrangements she made, being fired was not likely. But these material reasons were secondary. The real attachment was over the simple fact that the city had been a special part of her life for so long. Even now as times changed, she always remembered her beloved city, her beloved Leningrad, and on the bus she reminisced as the streets went by.\n\nLeningrad, the USSR's greatest urban jewel, the home of the revolution, the great achievement of Russian and Soviet society. How could she forget all that it had given her? She remembered her days in school, her service in the city's branch of the Komsomol, her first job in the Communist Party, her time with friends and family along the city's boulevards, and the sights she would pass every day. This was the city she remembered so fondly.\n\nBut all that she knew about this city was seemingly vanishing overnight. She couldn't recognize anything anymore and it scared her.\n\nEvery place all the way to the oblast's name had been renamed. The monuments had been moved into museums. The Soviet iconography chiseled into many public façades had been carved out. Even the large "Leningrad" sign towards the outer section of the city had been removed. It was as if the whole city now acted as if the USSR never existed, but she now understood why.\n\nThis was a new city, a new Russia. The public memory of the USSR surgically liquidated to make way for the Russia of pre-1917 and today. They now didn't want you to remember the Soviets. They wanted Russians only to know of the Romanovs and Zhirinovsky.\n\nSvetlana finally stopped watching and looked forward with a saddened neutral stare. She could only silently mourn what used to be."
 russia.363.a: "Lenin never lived." 
 russia.364.t: "Second October Manifesto"
 russia.364.d: "The October Manifesto of 1906 was a document that served to partially modernize the Russian Imperial Government, we must again look to our past and install it as a frame work for the Tsar, [SOV.GetLeader], to build upon.\n\nWhen the First October Manifesto was put into place, Russia was in the throes of the 1905 Revolution and it's passing established the Duma, the Duma of course was mostly powerless and will remain so with this new October Manifesto. The new October Manifesto contends with the reforms passed by the LDPR meant to centralize power in Zhirinovsky and future party chairmen, but now the Manifesto places that executive power in the hands of the Tsar. the Tsar we have chosen was chosen for their Wisdom, for their blood, for their insights, the LDPR has passed this Manifesto knowing that Russia's future is in the hands of the Tsar now.\n\nThe vision that [SOV.GetLeader] imposes onto the state now is an unknown one, unlike Tsar Nicholas II who even after passing this Manifesto still faced resistance, our new Tsar can be confortable knowing the LDPR snuffed out all resistance pre war, and now post war in our victory the people are overjoyed with our government. Post-War Jubilation will only last for so long however.\nIt is in the hands of [SOV.GetLeader] to lead us forward, we could be heading towards an old style Russian Autocracy, we could be heading towards a Constitutional Monarchy more like the United Kingdom's system, we could be heading for ruin, the future we have created for Russia is an exciting one especially as Europe is in chaos and we look upon our defeated foes as their governments fall to Communists en masse all across the continent. It is as exciting as it is scary to see Bolshevism rise again inevitably preparing to strike us once more.\n\nThe reins are in your hands now, Great Tsar, ride the Russian Empire to glory and prosperity, maintain our victory for centuries to come, prepare the people for the future battles that are sure to rock the state in due time, whatever path you take us down we are with you, Great Tsar."
 russia.364.a: "Russian Tsar, Reign for Our Glory!" 
 russia.365.t: "In The Eyes Of The Beholder"
 russia.365.d: ""
 russia.365.a: "Zolotov appoints himself a chairman of LDPR!"
 russia.365.b: "Zolotov forms Military State Council!" 
 russia.366.t: "Igor Zhirinovsky Under Fire!"
 russia.366.d: ""
 russia.366.a: "Pavel Grudinin begins gathering support."
 russia.366.b: "Zhirinovsky uses his influence to shutdown the opposition." 
 russia.367.t: "Grudinin's Allies"
 russia.367.d: ""
 russia.367.a: "LDPR cannot be trusted anymore, time for change."
 russia.367.b: "True LDPR patriots will support Grudinin's claims." 
 russia.368.t: "Igor Zhirinovsky Ousted!"
 russia.368.d: ""
 russia.368.a: "Grudinin begins massive state reformation."
 russia.368.b: "Grudinin becomes new LDPR's chairman." 
 russia.369.t: "Under Watchful Eyes"
 russia.369.d: "Despite our attitude towards socialism and other radical movements, we must ensure democracy and the right to choose for our subjects. However, it is too dangerous to transfer power to independent left-wing parties - we already have bitter historical experience. To prevent this from happening again, we will turn to the ideas of S. V. Zubatov, creating leftist parties under our control and entrusting supervision over them to the Security Department. This way we will be sure that their policies will not go beyond what is permitted, and the peasants and workers of the Empire will have the opportunity to legitimately express their position and defend their rights within these parties."
 russia.369.a: "Freedom to some, flute to others."  
 russia.370.t: "Russian National Elections"
 russia.370.d: ""
 russia.370.a: "...Sergey Furgal!" 
 russia.370.b: "...Denis Pushilin!" 
 russia.370.c: "...Aleksandr Belov!" 
 russia.370.f: "...Aleksei Zhuravlyov!" 
 russia.370.g: "...Aleksei Zhuravlyov!" 
 russia.370.j: "...Maxism Suraykin?!" 
 russia.371.t: "Emperor's New Clothes"
 russia.371.d: ""
 russia.371.a: "We don't forget our past, we control it." 
 russia.372.t: "Legacy of Putin"
 russia.372.d: "Even despite recent passing of late Russian President Vladimir Putin, his popularity only been reinforced by his successor and protege - Dmitri Medvedev, taking a harsh stance on continuing Putin's course against all odds, which made Medvedev's public image shift into figures akin to 'Stalin', and Putin's into 'Lenin'. Now reaching levels beyond simple appreciation, idolization of long lasting President became more far spread, and a term "Putinist" that was often used by either oppositionists or by citizen-patriots, has now begun to appear on state-owned media, as a positive characterisation of country's political line."
 russia.372.a: "His dream lives on!" 
 russia.373.t: "LDPR Ousts Slutsky!"
 russia.373.d: "Despite promoting the image of great reformator Slutsky has been falling out of favor in LDPR itself. Today, while Slutsky was out on his visits to Omsk, as the part of "National-Democratic" platform, the extraordinary session of LDPR's supreme council has ousted him from position of chairman, and effectly from position of presidential candidate in incoming elections.\nShocked and baffled that the people he personally installed in those high positions betrayed him, Slutsky has no apparent supporters to claim the ruling position again, and now will spend rest of his days as once again, a rank-n-file member of the party."
 russia.373.a: "Oh, well ironic." 
 russia.374.t: "Donbass Leaders Form RPRP!"
 russia.374.d: "After Donbass Liberation, many Novorossiyan politicians, including leaders of two people's republics, had left LDPR, and pursued independent politics. Upon announcement of brand new elections, the once just chiefs of partially recognized states, now joined forces in the race for Kremlin's highest office. Russian People's Republican Party, formed by Pasechnik and Pushilin, claims to represent new Russian mentality, the struggle for self-determination of Russians, and lingering nostalgia for stable society of early 2010s. With its idea of "Russian Republicanism" and sizeable public opinion for Donbass people to be a future of Russian political elite, they might score enough votes to win the race."
 russia.374.a: "Fortune favors the bold." 
 russia.375.t: "LDPR appoints Furgal as Candidate!"
 russia.375.d: "Many onlookers have watched closely upon LDPR's choice for president in next elections, after Slutsky removal, there were only handfull of those truly worthy of such position. With no real surprise, Sergey Furgal, who LDPR have long been building up as a fighter against corrupiton, and a man with a honest soul, have been chosen to leader the party during election run. With LDPR becoming less and less of what Zhirinovsky once stood for, many do wonder if LDPR's new image will get them votes."
 russia.375.a: "Man of honest fate!" 
 russia.376.t: "Belov Gains Nationalist Backing"
 russia.376.d: "One of many liberated political prisoners from right wing side during early days of Zhirinovsky, was Aleksander Belov, excentric businessman with nationalist sympathy. While he didn't have any problem with LDPR's government, aside from few nitpicks, seeing Slutsky's political reforms as a retreat from "National Russian Politics", made him a staunch oppositionist once again. This time Below being among few relevant far-right figures, has received enough backing from different organisations, with large sums of money being put into his political campaign. However, even with all of this, he's still the most unlikely winner on this elections."
 russia.376.a: "Ah, the radical!" 
 russia.377.t: "Rodina Forms National Front"
 russia.377.d: ""Rodina" one of few political parties formed during Zhirinovsky's government, has received enough support, to announce the formation of "National Front" of smaller left and right parties that are united under the banner of patriotism and belif in common Russian history. While such may prove to be unstable, they already announced many populistic measures that had given them popularity in recent polls, even if many of them contradict to each other. The party will have to choose whose side they will lean more towards, if they want to stay afloat, and have a chance to win the population over."
 russia.377.a: "Average Russian centrist." 
 russia.378.t: "Rodina's Political Path"
 russia.378.d: "Coalition organized by Rodina, has becoming more and more polarizing, with leftist-patriots lashing out on their right-wing counterparts. It seems that the time has come for Rodina's leadership to get hands on, and finally decide which platfrom will the National Front follow, while undoubtedly  most minor parties, unwilling to fall out, will still support the decision regardless of the choice, some may leave after party chooses opposite direction."
 russia.378.a: "Rodina must move to the left to gain more votes."
 russia.378.b: "Rodina's social-traditionalist politics will help achieve victory." 
 russia.378.c: "Rodina fails to consolidate!" 
 russia.379.t: "Status Of The "Supreme Ruler" Title"
 russia.379.d: "The question that concerns millions of citizens of our country is the future of the title of "Supreme Ruler" conferred on Vladimir Volfovich Zhirinovsky. His life and activities have left an indelible mark on Russian history, and now we face a difficult choice: should the next leaders inherit this title, or will Vladimir Volfovich forever remain the only Eternal Supreme Ruler?\n\nThe question of succession is an extremely complex one. The title 'Supreme Ruler' is unique in itself. Transferring it to someone else could undermine its symbolic significance associated with Zhirinovsky's unique personality.\n\nOn the other hand, leaving the title "vacant" may lead to various interpretations and speculations."
 russia.379.a: "This title should be inheritable."
 russia.379.b: "Only Zhirinovsky was worthy of it, and Supreme Ruler he shall eternally be!"
 russia.380.t: "Start of an Sovereign Economy"
 russia.380.d: "With the world on the brink of change and the ever increasing hostilities from the west, it'd only be a matter of time before our economy would take a major hit.\n\nHowever, with sharp minds and some willingness to adapt, we can ensure that if another crash were to come, that we'd be able to fare well through such a financial storm.\n\nRapid reindustrialization, erasing any form of dependence on western economies and stronger ties with our sphere, no matter what, in a matter of a few years we will be able to withstand any form of hardship."
 russia.380.a: "This is just the beginning"
 russia.381.t: "Medvedev Starts a Telegram Campaign"
 russia.381.d: "With election season on the horizon and the death of Putin still fresh in the minds of the Russian people, it was only a matter of time before the different parties were experimenting with different methods to attract voters.\n\nUnited Russia has taken it up to themselves to put Medvedev more on the front of their campaign, and an effort to appeal more to young voters by campaigning on the application known as Telegram.\n\nTelegram, known for its dedication to privacy and cultivating all kinds of online communities, this campaign is seen as a move to show the Russian youth that the party knows what is relevant in the present and future, rather than just the past."
 russia.381.a: "Modern problems require modern solutions."
 russia.382.t: "Release of the film "Mr. President""
 russia.382.d: "In the whirlwind of political intrigue and rapid changes, the main character of our time, Vladimir Vladimirovich Putin, stands out. The film "Mr. President" is a fascinating immersion into the life and career of one of the most influential politicians of our time.\n\nFrom his younger years to the post of President of Russia, Putin has come a long way, experiencing all possible trials and difficulties. In his struggle for power, for the country and for his vision of the future, we see not only a politician, but also a man with his strengths and weaknesses.\n\nThe film opens up a world of political fights and diplomatic maneuvers, where Putin's every move puts the fate of not only the country, but also the whole world at stake. His decisions affect international relations, economics, and history.\n\nThe director's view of Vladimir Putin's life reveals him as a complex personality, where human feelings and principles coexist next to political power. We see him as a leader who is followed by millions, and as a person who faces his own doubts and difficulties.\n\n"Mr. President" is not just a biographical film, it is a study of the phenomenon of leadership, peaceful settlement and geopolitical games on the global stage. There is no place for unambiguous answers and assessments, only an exciting immersion into the world of one of the most mysterious and influential politicians of our time."
 russia.382.a: "A masterpiece of Russian Cinema"
 russia.383.t: "Russian Animation Boom"
 russia.383.d: "Today, the animation industry in Russia is experiencing a genuine upsurge. Every day, new exciting cartoons are released on movie screens and television screens, which are touched by the vivid image style and fascinating plot.\n\nTalented animators and artists work on every detail, creating their own unique world in which children and adults immerse themselves in the enchanting world of animation. Thanks to this extraordinary art form, children and adults can immerse themselves in fantastic worlds and live in them for some time.\n\nOne of the living examples was the successful cartoon "Sense of Time". This work, which won the hearts of the audience with its exciting plot, became the winner of many awards and was noted for its high-quality picture and animation.\n\nThanks to a creative and innovative approach, animation in Russia continues to win the hearts of viewers and assert its position on the world animation scene."
 russia.383.a: "Bravo, Russia!"
 russia.384.t: "Evening with Maxim Katz"
 russia.384.d1: ""Well? Didn't expect to see me here? I'm still in shock myself! Katz on TV! And all thanks to the Neo-Soviet Democracy that Valery Rashkin built in our country. Do you really think that I could have ended up here if Putin had been in power before? In the new democratic system, all citizens of the USSR have the right to freedom of speech and freedom of expression. All citizens of the USSR have the right to participate in elections and to choose their representative in the government. No political parties are banned, they all have the right to freedom of political activity. Valery Rashkin created a new democratic system that not only ensures freedom and equality, but also protects human rights. The system has a strong legal base that guarantees justice and protection of the rights of citizens... Now we will talk about how we managed to win the European War with little bloodshed and why it happened at all..."
 russia.384.d2: ""Well? Didn't expect to see me here? I'm still in shock myself! Katz on TV! And all thanks to our struggle! After so many years, we won! Yes, that day has come! Now we can build a real genuine Democracy, and not this misunderstanding that is called "Neo-Soviet Democracy"! I have to say that she is complete nonsense! Rashkin had no plan or program in his system. Everything isn't working as it should. And what do we get as a result? Chaos and disorder! Nothing works properly and people suffer. But the worst thing about this system is its name. "Neo-Soviet Democracy"? Who came up with such nonsense? It's just ridiculous! How can one talk about democracy when all decisions are made by one person? We all know that all major decisions in the country were made exclusively with the approval of Rashkin... Now we'll talk about the European War and why it even happened..."
 russia.384.a: "...but first a small ad, stay tuned.""
 russia.385.t: "Terrorist attack in the Moscow Metro"
 russia.385.d: "Nazis killed people"
 russia.385.a: "Suka"
 russia.386.t: "Military Coup"
 russia.386.d: "Tonight the guard divisions entered Moscow, occupying the strategic points of the city. The President of the USSR Alexei Navalny, who announced his resignation in favor of the head of the General Staff of the Armed Forces of the USSR Valery Gerasimov, spoke on television.\n\n"Dear citizens of the USSR,\n\nToday I am compelled to announce my resignation from the post of President of the Soviet Union. I am making this decision in the interests of preserving the peace and security of our country.\nI'm sure many of you are wondering why I'm making this announcement so suddenly. The fact is that our country has faced serious challenges and problems that require a quick and effective solution. I realized that I cannot guarantee that my actions will lead to positive results, and therefore I am transferring power to Valery Gerasimov.\nI understand that this may cause some fears and concerns, but I ask you to remain calm and support the new authorities.\nWe must work together to ensure the security and prosperity of our country. I want to assure you that Valery Gerasimov will work in accordance with the constitutional order and respect the rights and freedoms of every citizen of the USSR.\nI am sure that under his leadership our country will be able to overcome all difficulties and become even stronger and more prosperous.\n\nThank you for your attention. Let's work together to ensure the peace and security of our country..."
 russia.386.a: "...Did I say everything right?"" 
 russia.387.t: "Statist Communists Speak Out Against KNOA!"
 russia.387.d: "In an unexpected turn of events, many communists, despite an all-national ban on leftist parties during the 'emergency', began to speak out against terroristic activisties of KNOA. One of the most outspoken critics, Maxism Suraikin, has made an offical statement: '...any of these so-called 'marxists' who participate in terrorism against our motherland do not deserve to be called communists...'. Later, one of spokespersons for the 'Organization of CPRF members' - Timur Rahmetulin also gathered a meeting denouncing KNOA's action.\n\nWith all of this recent events, LDPR faces a tough decision, either support the so-called 'Red Conservatives' and allow them to exist in public space, or continue our harsh policy on any leftist media and organisations."
 russia.387.a: "For unity of all Russians!"
 russia.387.b: "No mercy to anyone, no matter how much they 'align'."
 russia.388.t: "Kurginyan Forms APPRW"
 russia.388.d: "Sergey Kurginyan has always been seen as an outsider by the communists. They found him too esoteric, too religious, and too conspiratorial for their taste. However, Vladimir Zhirinovsky saw him as a perfect candidate for the role of the 'good socialist'.\n\nKurginyan already had an informal political-activist group called 'Essence of Time', filled with very loyal members. He published essays and books about the need for 'Red Esoterism' to combat 'Black' one. Despite being fairly large and having some ups and downs in the early 2010s, this organization was not suitable for attracting and diverting more patriotic communists who could cause trouble for the national government of LDPR.\nTherefore, through third-party channels, Sergey Kurginyan was asked to finally create a large-scale socialist organization for patriots. This led to the birth of the Alliance of the Proletarian Peoples of the Russian World.\n\nNow, with some concessions, such as protecting its members from any purges or crackdowns, it operates as a pro-government support party. However, Kurginyan still often publicly criticizes Zhirinovsky for his "lack of respect to the Soviet era"."
 russia.388.a: "We hope for co-beneficial relationships, comrade Kurginyan."
 russia.389.t: "Leftist Parties Flock To Suraykin"
 russia.389.d: ""
 russia.389.a: "Huh!?" 
 russia.390.t: "The Fall Of Rashkinism"
 russia.390.d: "After a long political fight with his main adversary, Valery Rashkin, the long time chairman of CPSU and de-facto ruler of USSR, despite his best attempts to reign in order, has officially been defeated by ex-Putin's Propagandist turned Soviet President - Vladimir Solovyov. After a disasterous break up of CPSU and its fall from hegemony, the standing committee of CPSU has removed Rashkin from all positions and eredicated his membership, while they themselves reform the party into a new political body with an obscure statement of "continuing the fight for true eurocommunism against tides of inner reaction". There were no official statements done by Valery Rashkin himself, in fact, it is almost like he disappeared from any public spotlight ever since the shocking announcement.\nSolovyov and his allies celebrate victory as they are now in full control of the Soviet state and all its affairs. Only time will tell if this course of action was beneficial for USSR."
 russia.390.a: "The end of an era, you might say."
 russia.391.t: "President Solovyov Pardons Putin's Legacy!"
 russia.391.d: "Today, Vladimir Solovyov following one of his public speeches, has officially, removed Rashkin's criminal charges against Vladimir Putin, claiming that they were themselves criminal, and undeserving to a man that spent his lifetime trying to built social country, whose only fault was a lack of time.\nHe also accused Rashkin of acting like a baby, and claimed that the charges were put more out of a petty personal  grudge rather some fundamental evidence, making example and reminding the population of Khrushchyov's De-Stalinization. Solovyov promised to return good name to Putin, and the vision he had planned for the motherland, praising many of his decisions."
 russia.391.a: "Beginning of Re-Putinization, it seems."
 russia.392.t: "Tonight At SolovyovLive"
 russia.392.d: ""Good evening, Patriots! Many have been, lets say, 'surprised' when I continued my online programming after becoming President of the Soviet Union. Well, to put it simply, there isn't much you can do as President of USSR! Why you ask? It's all because of one very rigid man, and disfunctional system he has built. Of course, you all know who I'm talking about - 'Comrade' Rashkin. Self-proclaimed 'Second Lenin', and frankly I would agree, if I were of opinion that Lenin was a traitor to his country, which he wasn't, but Rashkin surely is. Behind layers of babbling about "Putin's crimes" and a perfection that is this "Neo-Soviet Democracy", a book 'explaining' it, which I, by the way, reviewed, and, to put it bluntly, it was a mediocore read. Anyway, under these layers he hides corruption, ineffectiveness, and the past he wants us desperately to forget.\nBut I won't let him.\nYou can consider today's broadcast, an expose of sorts, much like that Navalny rat used to do, except that this one is not only justified, but also I will make sure will lead to positive results..."
 russia.392.a: ""...But before that lets quickly go over some news with our co-host - Stas Vasiliev.""
 russia.393.t: "Communist Party Splits!"
 russia.393.d: "Blyat Eurocommunism has fallen"
 russia.393.a: "Divided they fell..."
 russia.394.t: "Grudinin's Gambit"
 russia.394.d: "Zdes Chto to Dolzhno But'"
 russia.394.a: "The First Domino"
 russia.395.t: "Yeltsin Center"
 russia.395.d: "Recently, there was a new wave of hatred towards the Yekaterinburg Yeltsin Center, the reason was that at the end of July the center opened an exhibition of gutted stuffed animals and sewn human organs, and then announced the scandalous performance "The Cat hiccups and farts at the same time." The Yeltsin Center was criticized in Switzerland for this production. And the representatives of the museum did not deny that they deliberately choose performances that provoke discussion.\n\nThe last public dispute about the Yeltsin Centre took place at the youth forum "Territory of Meanings" - at a session with the participation of State Duma deputies. Yekaterinburg communist Denis Kurochkin asked the speakers about the relevance of the Yeltsin Center. The author of the most resonant remark was the head of the Communist Party Zyuganov: "Everyone knows that the Yeltsin center was specially built for us by the Americans. About 12 billion are spent on it every year. It is a national disgrace when a human center is organized, where the exposition was prepared by 100 percent Americans."\n\nApparently, the coalition of Yeltsin Center critics in the State Duma only continues to grow. On August 3, LDPR deputy Yaroslav Nilov unexpectedly joined the opponents of the center and offered to give veterans and the disabled the money budgeted for the maintenance of the museum. A serious question arises for us - what to do with the Yeltsin Center?"
 russia.395.a: "Putin Center? What a great idea!"
 russia.395.b: "Reconstruct it into the Palace of Russian Military Glory"
 russia.395.c: "Convert it into the Russian History Museum"
 russia.395.f: "Tear it down!"
 russia.395.f1: "Let's just change the leadership to a more "patriotic" one"
 russia.396.t: "Russia Recognizes Us!"
 russia.396.d: ""
 russia.396.a: "Three cheers to our Russian friends!"
 russia.397.t: "China Invades Mongolia"
 russia.397.d: "China invades mongolia. They are our friends, and culturally close to us. They are a nice barrier from the han hordes. intervene or nah?"
 russia.397.a: "Threaten an Intervention"
 russia.397.b: "Back Down"
 russia.398.t: "China Ignores Warnings"
 russia.398.d: ""
 russia.398.a: "Call Their Bluff - We Will Not Let Our Allies Down!"
 russia.398.b: "We Cannot Afford a War Right Now." russia.398.t: "China Ignores Warnings"
 russia.399.t: "Rise of the Great Russia"
 russia.399.d: "Today, a massive crowd of enthusiastic supporters and curious onlookers gathered in the historic Kremlin Square to witness the inauguration of Russia's new president, the charismatic and controversial figure, Vladimir Zhirinovsky. As he took to the podium, the anticipation in the air was palpable, with all eyes and ears eagerly awaiting his words.\nIn his impassioned speech, President Zhirinovsky declared that Russia was on the brink of a new era, one where the old ways of governance had become obsolete and ineffective. He spoke of the need for a revitalized state apparatus that could adapt to the challenges of the modern world, leaving behind the outdated policies and practices of the past.\nWith fervor in his voice, Zhirinovsky emphasized the importance of unity and solidarity among the Russian people, rejecting the notion of a "multicultural" society in favor of a strong emphasis on Russian identity and brotherhood.\nAs the crowd erupted into cheers and applause, President Zhirinovsky concluded his speech with a powerful proclamation..."
 russia.399.a: ""...I proclaim the New Federation!""
 russia.399.b: ""...I proclaim the New Empire!""
 russia.399.c: ""...To hell with those officialisms and titles. Russia is one, indivisible and Great!""
 russia.400.t: "The West Protests Election Results!"
 russia.400.d: "Cowardly Western powers came up with a joint statement after an extraordinary session of the European Parliament, in which they decried LDPR's victory as a crooked takeover and Zhirinovsky as a brutal dictator in the making. Moreover, they have announced a new package of sanctions to hit Russia preemptively and prevent us from achieving "imperialist goals", such as protecting Russians who are abused by western regimes in the Baltics and in Ukraine.\nZhirinovsky personally commented on these recent statements in his official refute: "...Those bastards won't leave us alone, but it's nothing special, they're in agony, sanctions, on the contrary, will help us build up our own domestic economy. We - Russians, will have only one sanction against the west, it will be a Russian tank blasting their Reichstag to pieces.""
 russia.400.a: "They're afraid. It won't hinder us."
 russia.401.t: "National Unity Day"
 russia.401.d: "Today, on November 4, Russia celebrates National Unity Day. This holiday is one of the most significant in the country and reminds of the importance of unity and solidarity of all citizens.\nNumerous cultural and sports events, festive processions, concerts and festivals are held on this day. All regions of Russia actively participate in the celebration, demonstrating their commitment to the ideals of unity.\n\nSpecial attention is paid to the education of patriotic feelings among young people. Schoolchildren and students take part in parades and festive events, where they are told about the significance of the National Unity Day and its role in the history of the country. This helps the younger generation to realize the importance of unity and solidarity to achieve common goals.\nOn this day, it is important to remember the importance of solidarity and unity of all Russian citizens in achieving common goals and developing the country. National Unity Day calls on every person to actively participate in the life of society and strive for the well-being and prosperity of Russia."
 russia.401.a: "In Unity Our Strength!"
 russia.402.t: "October Revolution Day"
 russia.402.d: "Today, November 7, the anniversary of the October Revolution is celebrated in Russia. This holiday is one of the most significant in the history of the country and reminds of the turning point when power passed into the hands of the working class.\nOn this day, numerous events are held to celebrate the anniversary of the October Revolution. Parades, processions and concerts are held in various cities of Russia, attended by representatives of various political parties and public organizations.\nSpecial attention is paid to the education of patriotic feelings among young people. Schoolchildren and students take an active part in festive events, where they are told about the significance of the October Revolution and its role in the history of the country. This helps the younger generation to realize the importance of fighting for their rights and freedom.\nOn this day, it is important to remember the importance of the ideals that formed the basis of the October Revolution. This is a struggle for social justice, equality and freedom. The anniversary of the October Revolution calls on every person to actively participate in the life of society and strive to create a better future for all citizens of Russia."
 russia.402.a: "Glory To The Working Class!"
 russia.403.t: "Zalupa Ivanycha Releases!"
 russia.403.d: "In recent days, to the shock of everyone, a new Kinopoisk movie - Zalupa Ivanycha, released into the theaters around the country.\nThe movie tells a story about old alcoholic man in decrepit Russian village, and the story starts when the main character gets infection in his genital area.\nZalupa Ivanycha has been declared a modern classic, with everyone in social media making their opinion about it. The movie was praised for cinematography, brilliant screenplay and masterful showcase of social issues that need to be fixed.\nZalupa Ivanycha became the highest-grossing movie in our country, even overtook popular series - Korol i Shut. The movie recieved various awards in different film academies of Russia."
 russia.403.a: "A Modern Classic!"
 russia.404.t: "Wartime National Unity Day"
 russia.404.d: "Today, on November 4, Russia celebrates National Unity Day. This holiday is one of the most significant in the country and reminds of the importance of unity and solidarity of all citizens.\nNumerous cultural and sports events, festive processions, concerts and festivals are held on this day. All regions of Russia actively participate in the celebration, demonstrating their commitment to the ideals of unity.\n\nSpecial attention is paid to the education of patriotic feelings among young people. Schoolchildren and students take part in parades and festive events, where they are told about the significance of the National Unity Day and its role in the history of the country. This helps the younger generation to realize the importance of unity and solidarity to achieve common goals.\nOn this day, it is important to remember the importance of solidarity and unity of all Russian citizens in achieving common goals and developing the country. National Unity Day calls on every person to actively participate in the life of society and strive for the well-being and prosperity of Russia."
 russia.404.a: "When We're United - We're Undefeated!"
 russia.405.t: "Syria Replaced South Africa in BRICS+"
 russia.405.d: ""
 russia.405.a: "Cool"
 russia.406.t: "Lukashenko's Call"
 russia.406.d: "With this character leaving, the thread of prophecy is severed. Restore a saved game to restore the weave of fate, or persist in the doomed world you have created." 
 russia.406.a: "This reaction, I must say, was very unexpected."
 russia.407.t: "He Who Controls The Present..."
 russia.407.d: "Stern control of media is necessary to prevent our society crumbling like that in America. 'Freedom' is functioning only in limited measures, and freedom to know the truth, is only good when the truth is ours. \nTelevision, social media, and even newspapers are better off monitored and censored by the state for the sake of national integrity.\nHowever, there are those in our administration who point out that over-controlled censorship led USSR to ruin, they say that people do need some free will in terms of media content, but managed and measured to prevent social instability."
 russia.407.a: "Only in unity there's victory."
 russia.407.b: "Let us not be like that "numbers" book."
 russia.408.t: "Russian Collaborators Exposed!"
 russia.408.d: "Despite initial success of 'Free Russian Army' in our media spaces, to no one's expectation, Russian agents of influence and their secret services were able to break through tight lips of our offical media, and brought about facts of Far-Right, borderline Hitlerite ideas of many Russian dissidents. The situation was not helped after when pressed about those claims on the interview, one of leaders of Free Russia Army, stated that he sees no problem with Neo-Nazi label for he and his comrades consider themselves far right nationalists. Everything worsened with closing statement about western benefactors long knowing about their views and seeing no problem, and that the only true enemy is the Russian government which genocides pureblood Russians with help of dirty chechens and tajiks."
 russia.408.a: "Shameful Display!"
 russia.409.t: "The "Time of the New" Campaign"
 russia.409.d: "Unexpectedly for everyone, the recent "Time for New" campaign from the "third" party of Russia, New Russia, has become very popular, campaign for the most part presents New Russia to voters as an alternative to the conservative path of United Russia and the left-wing path of People's Russia, offering to "give pathways to the young people", as well as economic and personal freedoms. Davankov is very actively involved in election trips around the country, where he listens to the aspirations of the people and holds rallies where he describes his program."
 russia.409.a: "Davankov, the presidential candidate is ready."
 russia.410.t: "The "We Are Waiting For Changes" Campaign"
 russia.410.d: "Recently, People's Russia announced a campaign called "We Are Waiting for Changes", in which it calls on voters to vote for real changes in the country and for social justice. Simultaneously with the announcement, People's Russia also released several propaganda videos with the song of the KINO group - "We are waiting for changes", and the videos themselves made a big splash in Russian society."
 russia.410.a: "Changes!"
 russia.411.t: "Internet Agitation of United Russia"
 russia.411.d: "United Russia decided to use a non-standard way of campaigning, more precisely, the party decided to launch an online campaign to attract young people to the elections, some deputies of People's Russia said that these were "just new Yeltsin methods."\n\nWell-known members of United Russia took an active part in the company, for example, Dmitry Patrushev came at the invitation of the popular streamer Zhmilevsky to one of his live broadcasts, during which the streamer asked questions about his election campaign, which is why the interest of the young audience only flared up, giving rise to a bunch of "memes" and "internet art", and in the wake of the company's popularity, a sequel to the comic book "Super Putin" was also released, which completes the ancient saga."
 russia.411.a: "No one will ever bring back 2012"
 russia.412.t: "Late Fishing"
 russia.412.d: "'He's a swine,' Putilin went on with hatred in his voice, 'why, he can't even speak Ukrainian properly himself! Hell - the day before yesterday I asked that bastard Goloborodko a question. Since the war, it seems, he's forgotten how to speak Russian. Changed his name, too, to make it sound Ukrainian . . . Well, so I asked him-what's the Ukrainian for "cat"? "Kit" he said. All right, I said, so what's the Ukrainian for "kit"?\n\nThat finished him. He just frowned and said nothing. Now he doesn't say good-morning any longer.' Petya roared with laughter."
 russia.412.a: "Life goes on..."
 russia.413.t: "Dear Russians..."
 russia.413.d: "We have gone through alot, from being surrounded by those who'd want our nation gone, constant pressure on us and several degrees of hatred thrown at us, yet we prevailed.\n\nOur rivals were met with the inevitable consequences of their actions, and in that we have reaped the fruits of our labor. There have been many ways our nation could have been led into a dark path but with your faith and ambition, we've gone through one of the worst times in history. Constant change, war and death.\n\nWhen our children look at the world map, they'd be amazed at how unchanged Russia has been through this period. Well, somewhat unchanged. Internally we have made wide sweeps across the system, giving more breathing room to  future leaders and although our previous course has ensured our stability, it is for the better to give the new generation the ability to set their course in our stable future.\n\nHowever there's a sentiment of fatigue across the nation, so much has been sacrificed. Sacrifices that won't be forgotten, the scars inflicted on the world will remain and from those scars we will learn, rebuild and improve. I share that sentiment, I have done a lot, you have done a lot, and it is with a heavy heart that I must announce my resignation. It is bittersweet, the future remains uncertain but knowing that we have set the foundation for future leaders to build upon, makes me feel more hopeful about the future of Russia, and the world. With that I bid you all farewell. Thank you."
 russia.413.a: "Into the unknown once again."
 russia.414.t: "Time Has Come?"
 russia.414.d: "Since the victory of our Motherland in Europe and the stabilization of the new sphere and order, our President Dmitry Anatolyevich is increasingly thinking about the future of the country and the state.\n\nPerhaps it is time for a new administration and a new way of looking at the country's development?\n\nCentralization, preparation for war, and the war itself took a lot out of Dmitry Medvedev.\n\nDespite some disagreements, Dmitry Anatolyevich remains the most popular leader among the people, and his system enjoys the support of the absolute majority of Russian citizens. However, there are people close to him in the country who can take power into their own hands if he feels tired, and start building their vision of Russia.\nWe can say for sure: the future of our country depends on the decision of one person.?"
 russia.414.a: "Medvedev's era shall continue, there's still much to be done."
 russia.414.c: "Lukashenko, political elephant and strong executive."
 russia.414.f: "Surkov, shadow cardinal of Putin's era and masterful politologist."
 russia.414.e: "Nadezhdin, a new hope for youth and a moderate reformer."
 russia.414.j: "Filimonov, a man who loves our heritage and ready for strong actions."
 russia.415.t: "The Establishment of the Title of the Supreme Ruler"
 russia.415.d: "Recent events in Russia have shocked the political community. Unexpectedly, the leader of the LDPR, Vladimir Zhirinovsky, announced the proclamation of himself as the supreme ruler of Russia - the same title that Alexander Kolchak wore during the civil war.\n\nSome Western liberal political scientists call Zhirinovsky's establishment of the title of Supreme Ruler an attempt to seize power and establish a dictatorship. They warn of the possible consequences of such a step and call for peaceful protests and resistance.\n\nVladimir Zhirinovsky himself claims that only a strong ruler can lead Russia to prosperity and stability, and that only he has sufficient authority and experience for this title.\n\nBut regardless of Zhirinovsky's motives and intentions, his move caused mixed feelings among the population. The future of the political situation in Russia remains uncertain, and only time will tell what consequences the establishment of the title of Supreme Ruler will have."
 russia.415.a: "Absolute power!"
 russia.417.t: "Elections!"
 russia.417.d: ""
 russia.417.a: "United Russia"
 russia.417.b: "People's Russia"
 russia.418.t: "Sovereign Democracy"
 russia.418.d: "Russian President Dmitry Medvedev, together with well-known political analysts, has published his first book, "Sovereign Democracy". This book describes the goals, reasons, and depth of the reforms that have been carried out since Dmitry Anatolyevich became head of state. It also talks about the prerequisites and the need to create a new democracy tailored to Russia, and outlines the problems faced by the reform. Also, in it, Medvedev once again claims that all his actions correspond to Putin's Course, and even shares details of personal conversations with Vladimir Vladimirovich. In his Telegram channel, Dmitry Medvedev wrote that the book will become a useful companion for Russian youth in the political life of the new Russia. Liberal Critics of the book, however, claim that what is described there is only "Authoritarianism under a new mask", and that the only real democracy is in the West. Despite the criticism, "Sovereign Democracy" has become widespread among students and is popular in circles supporting Medvedev's Course, as well as continues to arouse interest and discussion in the Russian political environment. The book has not gained such popularity abroad, but it has allowed many experts to better understand what is happening in our country as a whole."
 russia.418.a: "Live long and prosper!"
 russia.419.t: "Fate of United Russia"
 russia.419.d: "As our victory was cemented, the fate of United Russia still hangs in the air.\n\nMost of the party is made-up of career opportunists who only suck up to the person above them. Originally made to just pass the papers Putin needed, now they decided they have the power to think for themselves. Not to mention how many of them are completely unqualified for their positions. \n\nYet, the party, due to being de-facto Putin's party, still has a lot of talent left in them. It was that talent in the sea of mediocrity that let Putin do what he did, and if we can get these specialists and technocrats over to our side, the benefits will be enormous.\n\nWhat will it be?"
 russia.419.a: "The most humane court in the world!"
 russia.420.t: "The Final"
 russia.420.d: "After the fall of the previous government, all funding channels suddenly dried up: the generous subsidies from the Kremlin, which until recently had been relied upon by the Communists of Russia, the SRZP, New People, and other small spoiler parties, were instantly curtailed. The party offices were emptied, activists were left without salaries, and advertising campaigns ceased overnight.\nThe leaders and rank-and-file members of the defunct organizations began looking for a new refuge: some rushed to join the CPRF, hoping to find resources and a platform for their ideas, while others rushed to find new opportunities to realize their political will, launching private foundations and charitable projects, and seeking sponsors among local businessmen - all of whom we will definitely meet along the way...\nThe only LDPR survived: Zhirinovsky mobilized old connections with lightning speed, redirecting party contributions and personal donations from his associates. Today, of the CPRF's old systemic rivals, Zhirinovsky is the only one who continues his actions, reminding us that only those who can quickly reorganize survive the political storm."
 russia.420.a: "Let's keep watching the situation..."
 russia.421.t: "New Soviet Constitution"
 russia.421.d: ""
 russia.421.a: "1993 Avenged"
 russia.422.t: "Restoration of the Supreme Soviet"
 russia.422.d: ""
 russia.422.a: "It's back to the way it was..."
 russia.422.b: "They're no better than United Russia!"
 russia.423.t: "Russia Supports Us!"
 russia.424.t: "Prigozhin Pledges Support to Zhirinovsky"
 russia.424.d: ""
 russia.424.a: "Follow Vlasov's advice and make a deal with him!"
 russia.424.b: "Thank you very much." 
 russia.424.c: "He's just trying to suck up." 
 russia.425.t: "Wagnerites in LDPR Grow in Numbers"
 russia.425.d: ""
 russia.425.a: "Interesting..."
 russia.426.t: "Prigozhin Demands Military Purge"
 russia.426.d: ""
 russia.426.a: "Purge all listed generals."
 russia.426.b: "We can negotiate..." 
 russia.426.c: "Tell him to calm down." 
 russia.427.t: "Nationalists Demand Removal of Autonomous Zones"
 russia.427.d: "With increase in "Holy Russia" popularity and their state control, they proposed most controversial policy yet - To remove all Minority Administrations in Russia. This may lead to terrible consequences.\n We still can push against them, and keep every in 'status quo' limbo, so not to cause anti-russian voices to spike."
 russia.427.a: "We can only accept..."
 russia.427.b: "Reject this disastrous proposal!" 
 russia.428.t: "Igor Girkin Forms a New Party"
 russia.428.d: "Girkin, a moderatly known, monarchist, and -failed- dictator of Novorossiya, and who also recently was invited into official MoD position, has came out with his supporters and organized new 'truly patriotic' party.\nThis organisation already, gained popularity with people who aren't happy with Zhirinovsky's policies and government, most of them are either monarchists or someone who can be described as 'moderate' nationalist. Even with Girkin's repulsive personality, it still managed to unity other smaller parties into it.\nOnly time will tell, if Girkin's institualization causes more problems, then benefits."
 russia.428.a: "Girkin Whined Today..." 
 russia.429.t: "RPP Demands Concessions!"
 russia.429.d: "Recently, Igor Girkin has published a video where he, in rude form, called out Zhirinovsky, claimed that his administration is ineffective and corrupt, which he, apparently, was able to see it for himself. In later public statement, he demanded him to be given a high ranking position in the government, so he can, efficiently and tiressly, remove corruption and lazyness. RPP has already sent official note straight to Vladimir Zhirinovsky.\nDespite that RPP was able to gain more popularity then expected, we still can fight against their influence and bring them down to irrelevency, or in the very least, settle on someone who is not... Well Girkin."
 russia.429.a: "Well..."
 russia.429.b: "RPP should have someone else, right?"
 russia.429.c: "Lets show him real frustration!" 
 russia.430.t: "Zhirinovsky Forced Into Regent Position"
 russia.430.d: "Despite best efforts, our reliance on monarchist-moderate cadres has led to their de-facto complete take over of government's inner affairs. Many LDPR's members were pushed out of their position, replaced with their RPP counterparts.\nVladimir Zhirinovsky has become powerless against the increasing tide of monarchist politicians and policies, he got entangled in his own web, was played like a fiddle, and now forced to accept "proposition" on establishment of official regency. LDPR is now forced to cozy up to RPP if it wants to keep the state control."
 russia.430.a: "All stars eventually fade..." 
 russia.431.t: "Tokayev's Triumph"
 russia.431.d: "The current president of Kazakhstan, Kasym-Jomart Tokayev, was not indifferent to the protests. He sided with the people and began purges against all old Nazarbayev apparatchiks who had long held power in their hands. Tokayev also decided to debunk the personality cult of Nazarbayev himself, who had ruled the country for more than 30 years. He recognized that many of the decisions made by Nazarbayev were wrong. Large-scale democratic reforms and the drafting of a new constitution were announced. Kazakhstan also expressed gratitude to Russia for its help in difficult times. As a sign of friendship and respect for the neighboring country, Kazakhstan decided to launch a new stage of economic integration between the two states. Russian-Kazakh friendship is stronger than ever!"
 russia.431.a: "Gone is the era..."
 russia.432.t: "The end of the riots"
 russia.432.d: "Protests in Kazakhstan are over. Authorities reported the restoration of order in the country. 4,353 people were injured, including 3,393 members of security agencies. 238 dead, including 19 police and military personnel, were taken to morgues. As a result of these events, the country underwent changes in the government and political sphere. In particular, the prime minister, the secretary of state, the speaker of the lower house of parliament and half of the ministers were replaced. Nazarbayev also lost his position as leader of the ruling Nur Otan party, and Tokayev took his place. Also one of the results of the protests was a reduction in gas prices, which was the catalyst for the protests. Is this the start of something big, or will Kazakhstan not go for serious reforms and maintain the status quo? Time will tell."
 russia.432.a: "It's finally over."
 russia.433.t: "Nazarbayeva's Coup"
 russia.433.d: "During the protests in Kazakhstan, something incredible happened - a coup d'état. The KNB forces, led by Dariga Nazarbayeva, the eldest daughter of the country's former president, Nursultan Nazarbayev, have seized power in the country. The Nazarbayev clan, which has held power in Kazakhstan for decades, is now in full control of the country. Dariga Nazarbayeva, who previously held high positions in the government and parliament, has now become a true autocrat. She fancies herself the Kazakh Catherine the Great and does not hide her ambitions. In her speeches, she promises to lead Kazakhstan to new heights and make it one of the world's leading powers."
 russia.433.a: "Not much has changed for us.... I guess."
 russia.434.t: "Liberal Revolution in Kazakhstan"
 russia.434.d: "Kazakhstan witnessed large-scale protests that led to significant changes in the political life of the country. Many experts and observers called what was happening a liberal revolution, which led to the coming to power of democratic forces. The main leaders of the protests were the Democratic Choice of Kazakhstan and Mukhtar Ablyazov, a former banker and businessman who was forced to leave the country in 2009 after a conflict with the government. During the protests, Ablyazov returned to Kazakhstan and led a movement for democracy and freedom. After several days of mass protests, Kazakhstan's government was forced to resign. Mukhtar Ablyazov became the country's new president, promising broad reforms and the creation of a democratic state."
 russia.434.a: "Unexpected outcome."
 russia.435.t: "Socialist Revolution in Kazakhstan"
 russia.435.d: "The protests in Kazakhstan saw what can be called a socialist revolution led by the Socialist Movement of Kazakhstan and Aynur Kurmanov. Leftist forces in Kazakhstan united in the struggle for the rights of workers and the poor. The main leftist parties in Kazakhstan, including the Communist Party, the Nationwide Social Democratic Party, and the People's Party, were able to organize an unstable coalition that seized power in the country. The new government promised radical democratic and social reforms to improve the lives of ordinary citizens. One of the first measures was an increase in wages and pensions, as well as free education and medicine for all citizens."
 russia.435.a: "Unexpected outcome."
 russia.436.t: "Invitation to Union State"
 russia.436.d: ""
 russia.436.a: "Yes"
 russia.436.b: "No"
 russia.437.t: "They Accepted"
 russia.437.d: "Kazakhstan is ready to strengthen fraternal ties with our country and sign important documents that will make it a part of the Union State. The Foreign Minister of our country met with his Kazakh counterpart and discussed plans to strengthen security and economic cooperation.\n\nAlso, the Ministry of Defense held meetings with colleagues from Kazakhstan. The issues of the unification of troops within the framework of the Union State were discussed. This is provided for by decrees signed by the head of state.\n\nKazakhstan is now tightly connected to the Russian sphere of influence."
 russia.437.a: "A toast to our Kazakh friends!"
 russia.438.t: "They Refused"
 russia.438.d: "The anti-Russian government of Kazakhstan has shown its true colors, and refused to accept our legitimate demands to secure the Central Asian region and the interests of Russia and its people there.\nIn return, the "government" of Kazakhstan has publicly stated that our demands are unacceptable and constitute a racket. And they have already begun to cancel many interstate declarations with us. The Russian population loyal to us has already started rallies against the policy of the Kazakh state.\n\nKazakhs will soon learn the consequences of such open Russophobia."
 russia.438.a: "Launch a Military Operation to Resolve The Kazakh Crisis."
 russia.439.t: "Tokayev Returns to Power"
 russia.439.d: "After a brief interim government, Kasym-Jomart Tokayev returned to the country as president, although the term "dictator" is now more appropriate. Tokayev's first steps became tough, he reformed his party, making it a centralized mechanism, anti-Russian, liberal demonstrations are strictly controlled both by the Russian Armed Forces and by the forces of Kazakhstan. n Nazarbayev's legacy is being eradicated, and a cult of a new 'Batyr' - Tokayev - is being built in the country. At the same time, he is completely loyal to Russia, and is ready to make any concessions to us and our allies.\nMaybe Kazakhstan will someday return to its usual course, but for now, the new reality is the new normal for a long time."
 russia.439.a: "Kazakhstan is back!"
 russia.440.t: "Renaming of Astana"
 russia.440.d: "Thanks to our military intervention, Kassym-Jomart Tokayev managed to maintain his power in Kazakhstan. But everything in this life has a price, and Kazakhstan had to hold referendums on the annexation of the northern territories populated mainly by Russians, with predictable results. This deal included the Akmola region along with Astana. renamed Akmolinsk. Now Alma Ata has become the capital of Kazakhstan again.\nAkmolinsk was founded in 1830 from a Cossack outpost created to protect villages that had taken over Russian control from rebel raids. The name lasted until 1961, when the city was renamed Tselinograd, because of its importance in the development of the North Caucasian and West Siberian virgin lands. After the collapse of the USSR, the city was named Akmola, and a few years later, Nursultan Nazarbayev moved the capital there and renamed it Astana. Now historical justice has prevailed."
 russia.440.a: "Good."
 russia.441.t: "Tokayev Pleads for Help!"
 russia.441.d: "Recently, there was an anti-constitutional coup in Kazakhstan, where anti-Russian forces seized power. Fortunately, the legitimate president, Kasym-Jomart Tokayev, was brought to safety by our security services and is now in a temporary dacha in Orenburg. After several days of calm, he wrote a letter to the President of the Russian Federation begging for help in returning stability and lawful order to the Republic of Kazakhstan. The first part of the letter was widely disseminated by the Russian media, but in the second part, which is closed to the public, Tokayev admits the fallacy of his multi-vector policy and offers significant concessions to Russia if it agrees to intervene. Among them, Tokayev even agreed to hold referendums on Russian accession in the territories of Northern Kazakhstan. Despite such generous Tokayev "gifts," the final decision-making rests with the Russian government."
 russia.441.a: "We'll support Tokayev!"
 russia.441.b: "No, thank you."
 russia.441.c: "We'll demand more for our help - Uralsk and Guryev."
 russia.442.t: "Total Denazarbaevization"
 russia.442.d: "President of Kazakhstan Kassym-Jomart Tokayev has initiated a review of the country's history. Special attention is paid to the first leader, Nursultan Nazarbayev, who led the country for almost three decades.\nThe analysis of new data and archival materials revealed facts of corruption, repression and other manifestations of authoritarianism during his reign.\n\nTokayev emphasizes that a new era is beginning for Kazakhstan, where there will be no place for past mistakes and crimes. \n\nMany victims of the former regime received compensation and public apologies. There are high-profile detentions of former officials in the country, and the Nazarbayev family's assets have been frozen by the authorities."
 russia.442.a: "Cool?"
 russia.443.t: "Return of Democracy in Kazakhstan"
 russia.443.d: "After a long period of tightening power, President Tokayev announced new reforms. Their goal is to return democratic institutions and freedom to the country.\n\nIn an official address, Tokayev promised the people that after all decisive measures aimed at eliminating dangerous and destructive elements, the country would return to true democracy. He stressed that now every Kazakh will be able to express his thoughts freely wherever he is.\n\nMany parties, whose activities were suspended during the stabilization period, have resumed their work and are preparing for elections to the Mazhilis."
 russia.443.a: "We are so back."
 russia.444.t: "Prigozhin's Justice March!"
 russia.444.d: "After our terrible defeat in the war against NATO, Yevgeny Prigozhin decided to use the moment of weakness and people's despair in his favor. Today he announced that 'will no longer take orders from vermin and parasites', and instead beginning an open revolt against our government.\nHe, brutally, took control of Leningrad Oblast, and now readies his Wagner PMC for a march throw towards Moscow, dubbing it 'March of Justice'.\nMilitary generals have already contacted Kremlin, and proposed cedeing power to directly to the army, in order to safeguard stability and crush the putsch."
 russia.444.a: "Give in to the military. This 'heresy' must be banished!" 
 russia.445.t: "The March Begins!"
 russia.445.d: "Few hours after Prigozhin's official announcement, his soldiers have begun their massive movement towards capital of Russia. They had already destroyed small groups of state military on their way.\nThe stavka, after hours of planning and meetings, have proposed only two decisions; Either send an army group to intercept and ambush them, or to prepare major cities, and especially Moscow for heavy defense."
 russia.445.a: "Destroy them now!"
 russia.445.b: "We must be careful. Prepare the defenses!"
 russia.446.t: "Prigozhin Victorious!"
 russia.446.d: "Plan A resulted in Government's terrific failure, with thousand of Russian soldiers killed by once fellow Russian soldiers. Prigozhin's march entered Moscow with only small resistance, and the state military has surrendered soon after. Yevgeny Prigozhin now finds himself at the helm of wartorn nation, with situation similar to times of trouble of old. Already there were reports of Navalny escaping confinement, and gathering his liberal scum to counter-rebel against Wagner.\nPrigozhin won't bend! He will restore Russia's glory and power, and take revenge to NATO dogs and Ukrainian Nationalists!\nThe time has come for massive rally in Moscow, where Prigozhin will announce his intentions clear."
 russia.446.a: "Russia will be Wagnerized!" 
 russia.447.t: "Prigozhin Defeated!"
 russia.447.d: "Plan B resulted in Prigozhin's terrific defeat, with thousand of Russian soldiers killed by once fellow Russian soldiers. Wagner's march was stopped, beaten by harsh defense of Moscow and other cities, and Wagner's remnants surrendered soon after. Despite the putschists lie defeated, Russia still remains a war-torn nation, with people still bitter at the military specifically, Shoigu undestands this, and he has someone who can become a new beacon of hope and unity for, not only Russia, but all of Eurasia.\nThe time has come to make some unexpected meetings..."
 russia.447.a: "Laying foundations for new Russia." 
 russia.448.t: "Shoigu Meets With Dugin"
 russia.448.d: "Today Sergey Shoigu, in offical Kremlin announcement, met with widely known philosopher Alexander Dugin, the details of personal meeting remains classified, but to many's shock, Shoigu not long after, broadcasted his letter of relinquishing the power, and return to Civilian government. However, power won't come back to the State Duma, but rather is given recently formed political entity "Eurasia Party" led by Dugin's close associates, and himself being de-facto leader of Neo-Eurasianist movement.\nMany still wonder what inspired General stuff to choose Dugin, some say its because his "Foundations of Geopolitics" was a popular read in Military Academies, others say that his unitary, Soviet-Imperial philosophy became the key to success."
 russia.448.a: "Let's see what jumped up philosopher can do" 
 russia.449.t: "Assassination Attempt At Prigozhin!"
 russia.449.d: "Today, Russia has escaped a terrible tragedy. Yevgeny Prigozhin, who participated in a public march in Moscow, came close to death. His life was saved thanks to a bulletproof vest and the lightning-fast reaction of his personal guards. The perpetrator of the assassination attempt was killed on the spot.\nAs it turned out, it was Timur Rakhmetulla, a 45-year-old native of Izhevsk, known in narrow circles as an extremist and a liberal. Checking his phone showed that before the assassination attempt, he wrote in one of the Telegram group chats: "I'm going to kill this bald bitch." Now all the participants of this chat are wanted.\n\nFate saved the Great Commander, and after such close contact with death, Yevgeny Prigozhin became even more determined to rule his homeland."
 russia.449.a: "Fiat iustitia, et pereat mundus."
 russia.450.t: "Dmitry Medvedev Ousted From Presidency"
 russia.450.d: "Medvedev's poor decision-making led Russia to defeat in her extensional war. Now he has no opition but to leave Kremlin's office, forever in shame. With him, his entire government resigned, and now, the only person able to take provisional reigns in these dire times is speaker of the State Duma - Vyacheslav Volodin. Not the most popular decision, but he'll have to do."
 russia.450.a: ""Feci quod potui faciant meliora potentes""
 russia.451.t: "Free Ukraine Elections"
 russia.451.d: "ВНИМАНИЕ! \nПУТИН НЕДАВНО ОБЪЯВИЛ О ЗАПУСКЕ КОДА "5050" ПО НАСТУПЛЕНИЮ НА КИЕВСКИЙ КФС ГДЕ МОЖНО РАЗДОБЫТЬ ДВА ТВИСТЕРА ПО ЦЕНЕ ОДНОГО\nZ Работайте, братья"
 russia.451.a: "Это по сути не должен прочитать игрок поэтому мне похуй"
 russia.451.b: "Это по сути не должен прочитать игрок поэтому мне похуй"
 russia.451.c: "Это по сути не должен прочитать игрок поэтому мне похуй"
 russia.452.t: "European Economies Dependency on Us!"
 russia.452.d: "As more and more fledgling nations freed from foreign domination align with the Russian Federation, from the Black Sea to the Baltic, we can begin to rebuild, and the most key part of rebuilding lies in the economy. These nations are ruined by war and foreign imperialism, and have turned to us to remedy this. Naturally, we must accept, not just for the opportunities it gives us, but for the obligation of a larger nation to protect the smaller. This rebuilding is expected to be quite expensive and with largely bankrupt nations receiving our aid, it is expected that we will be the ones to foot the bill, at least for the near future.\n\nWe expect this condition to persist for some time, as it will likely be years before these nations can retool or build a new industrial base for themselves, and any companies established will have a difficult time competing with our industry. However, should this initiative succeed, we may find ourselves with a number of useful allies defending our western reaches, and large foreign markets with which our economy may interact with relative impunity."
 russia.452.a: "Blin"
 russia.453.t: "Zyuganov retires"
 russia.453.d: "Gennady Zyuganov, already the former head of our country and the Communist Party, has finally decided to take a well-deserved rest. He served his country and people for many years, fighting for social justice and equality. Now Gennady Andreevich is going to spend his days at his dacha, where he will do his favorite thing - the apiary. He has always been fond of beekeeping and believes that this is a very important activity for maintaining the ecological balance and producing quality honey. His work and efforts in politics will be remembered and appreciated by the people for a long time."
 russia.453.a: "Thank you for your work, Gennady Andreevich"
 russia.454.t: "Election Results!"
 russia.454.d: "After dynamic electoral campaign done by all parties, political compromises, and declaring candidacies, Central Election Commission have succesfully counted in all votes. With held breath members of each party, alongside normal citizens, now watch their TVs, mobile devices, and computers to find out who is a winner of Russian elections. While many suspect that United Russia will remain at the helm of the nation, there still chances for People's Russia victory, and if odds are truly right, a third party - New Russia, can achive unexpected victory\n\nThe winner is..."
 russia.454.a: "Dmitry Patrushev!"
 russia.454.a1: "Sergey Sobyanin!"
 russia.454.a2: "Mikhail Mishustin!"
 russia.454.a3: "Andrey Belousov!"
 russia.454.b: "Vyacheslav Volodin!"
 russia.454.b1: "Sergey Shoigu!"
 russia.454.b2: "Sergey Naryshkin!"
 russia.454.c: "Mikhail Delyagin!"
 russia.454.c1: "Pavel Grudinin!"
 russia.454.c2: "Valentin Konovalov!"
 russia.454.f: "Zakhar Prilepin!"
 russia.454.f1: "Aleksandr Lukashenko!"
 russia.454.f2: "Nikolai Platoshkin!"
 russia.454.g: "Vladislav Davankov!"
 russia.454.z: "Anton Alikhanov!"
 russia.454.g1: "Mikhail Delyagin!"
 russia.454.g2: "Dmitry Patrushev!"
 russia.454.g3: "Zakhar Prilepin!"
 russia.454.g4: "Vyacheslav Volodin!"
 russia.454.h1: "Dmitry Patrushev!"
 russia.454.h2: "Mikhail Delyagin!"
 russia.454.h3: "Zakhar Prilepin!"
 russia.454.h4: "Vyacheslav Volodin!"
 russia.455.t: "Rashkin presents Navalny with a medal"
 russia.455.d: "Valery Rashkin, the president of the USSR, today solemnly awarded medals "For Services to the Fatherland" to especially outstanding citizens of our country, but this particular ceremony was special because it was also received by Alexei Navalny, a well-known oppositionist. The ceremony took place in the Kremlin and was attended by many high-ranking officials and media representatives.\nIn his speech, Rashkin praised Navalny's devotion to democracy and his willingness to stand up to corruption and injustice. He acknowledged that their political views differ greatly, but stressed that it is important to recognize and honor those who fight for what they believe in.\nUpon receiving the medal, Navalny thanked Rashkin and spoke about the importance of freedom of speech and the need for a government that represents all of its citizens. He also expressed hope that the gesture would be a step toward greater unity and understanding between political factions in the country."
 russia.455.a: "Interesting Event!" 
 russia.456.t: "Mikhail Svetov Creates New Democratic Union"
 russia.456.d: ""
 russia.456.a: "Punch the fascists!" 
 russia.457.t: "Reformation Of The Russian State"
 russia.457.d: "The Russian Federation has outlived its usefulness to its citizens, the failings of United Russia are made clear by the humiliation we have suffered at the hands of a corrupt administration unable to make itself clean. This is not for a lack of trying, mind you, but it is obvious that the old system must be uprooted. We will begin by declaring the Russian State in place of the old Federation.\n\nIt was by the will of a Tuvan, our General Shoigu, that Eurasianism has been handed the reins of the Russian State, Federalism did not protect the Eurasian peoples and Shoigu's Tuva remained the poorest region of Russia despite autonomy. It is clear now that Dugin's autocratic reformation of the state will serve the Eurasian people better than any Federal Autonomy ever could have, the fruits of Eurasianism are just around the corner for us. With the death of the Federation and the striking down of the old Constitution we can begin to root out insidious elements at every level of society and in every vessel of government."
 russia.457.a: "A New Beginning." 
 russia.458.t: "The Broadcast"
 russia.458.d: ""Good Day my fellow Compatriots. I am Nikolay Lukashenko. This is something of a rarity for me because speeches are not my forte. But honesty is. I believe what I have to say today you will find very refreshing. My father and Putin, both great leaders. They built this country from nothing. Using sharp minds committed to our future. Together they built a nation. Putin gave us purpose and hope. My father's factories gave us the most powerful army... ...the word has ever known! But our army has failed us! They have allowed themselves to grow fat, lazy and careless. But that... changes today. A time has come for some new fucking management. And We know what this nation needs. And We will cut out this disease of compliance and subjugation...""
 russia.458.a: "Strong, but needed words" 
 russia.459.t: "Alexander Dugin Appointed as Premier"
 russia.459.d: "The appointment of Alexander Dugin as Premier of Russia is a move that shall rapidly change Russian society. One can only imagine how much Russia will change under the guidance of the Eurasianist Ideologue.\nThe move comes as something of a shock to the Russian Federation who expected an emergency government but did not expect a Premier or President from a non-United Russia or UR affiliated party to be appointed, to the common man the appointment of Dugin is curious but to the informed individual Dugin's foreign policy and worldview long influenced Putinist outlooks so this is only a natural evolution for Russia and the Russian government, not as a continuation of United Russia but as an evolved version going beyond the mere farcical following of what was considered "Eurasian" foreign policy and fully embracing Eurasia as a polity not just a policy.\n\nIn the coming months, Russia will see changes, our enemies in Europe will look up to us with suspicion and rightly so, the western world cannot afford for a strong Eurasia to exist and this is precisely why we must endure this is precisely why Dugin's premiership is so important, The Russian left and the Russian right will unify under Dugin's leadership and together Liberalism, exploitative oligarchs, international conglomerates controlling the lives of millions, shall be removed from the Eurasian Equation, Europe will no longer be plagued by it's ailments for long, Dugin will cure Russia and soon he will cure the West as well."
 russia.459.a: "Dugin Means Reform, Real Reform." 
 russia.460.t: "Traitors Run Rampant!"
 russia.460.d: "The people of Russia are weary from the war, Medvedev's prior term for Presidency was widely liked but the warm feelings and Putinist nostalgia have ended as NATO troops marched east. Our Caucasian territories were torn away, we have lost our Black Sea connections. Worst of all we have been forced to take in political exiles and release political prisoners as a term of peace.\n\nOur army deserts into the streets diffusing into the hordes of empowered liberals, no doubt backed and boosted by western intelligence organizations and support groups. It is not just liberals but it is also nationalists, it is communists, our former allies in various legal parties, every political affiliation is coming out of the woodworks to tear down United Russia and to tear down the centrist stronghold that has long held Russia together, a bulwark against oligarchs and against western encroachment. But we failed to hold the bulwark, bending to oligarchs to support the war and falling to western invasion.\n\nSome Wagner units have gone rogue as well, Prigozhin is nowhere to be seen since the loss. Elements of the military are pressing for our government to let them form an emergency government under Shoigu's guidance. It is heavily implied the request is not optional as units move into Moscow already to secure it. We enter a new time of troubles."
 russia.460.a: "Everyone is against us!" 
 russia.461.t: "Off-System Opposition"
 russia.461.d: "In any country there is a layer of people who do not participate in the usual politics of the country, but on the contrary try to organize their own, as a counterbalance to the official one. Historically, in Russia, this layer of people is liberal, although there are many other "colors" in it, and the liberal agenda is absolutely dominant. Although they do not, to a large extent, threaten the current state system, their existence and strengthening can have negative consequences for our country. It is they who are being used by the West to try to derail Russia from its path, and to obstruct the realization of our common dream in every possible way.\n\nThe administration should monitor the growth of £GFX_RF_logo Liberal Opposition, and try to curtail, reduce its strength in every possible way, so that its negative effects become weaker."
 russia.461.a: "West's Useful Idiots..."
 russia.462.t: "Voting on Amendments Successful!"
 russia.462.d: "People Voted "Yes", and societal cohesion was preserved"
 russia.462.a: "Glory to Putin!" 
 russia.463.t: "Protests Over Voting Results!"
 russia.463.d: "Our officials conducted the process of voting on the constitutional amendments, but they did so in an extremely sloppy manner. The liberal opposition, considering the elections meaningless, mostly ignored the vote. However, the Moscow Communists, led by Valery Rashkin, did not miss the moment and organized mass protests in Moscow. The amendments were adopted, but with much worse results than expected, which was a blow to the authorities and caused a wave of resentment in society."
 russia.463.a: "We must be more careful next time" 
 russia.464.t: "Putin's Speech on Amendments to the Constitution"
 russia.464.d: "In a highly anticipated speech, Russian President Vladimir Putin addressed the nation, outlining a series of proposed constitutional amendments and announcing the start of preparations for a nationwide referendum. The amendments, if approved, would mark significant changes to Russia's political landscape and governance structure.\nDuring his speech, President Putin emphasized the importance of updating the country's constitution to reflect the evolving needs and aspirations of its citizens. He highlighted that the proposed amendments aim to strengthen democratic institutions, protect individual rights, and ensure the continued stability and development of Russia."
 russia.464.a: "Let the people decide!" 
 russia.465.t: "Cooperation With Iran?"
 russia.465.d: "With anti-terroirst operation in full effect against taliban, it would be a wise move to request limited help from Iran, since it was known to have have tensions against taliban government.\nWhile we don't need their full involvement, them clashing against taliban forces on their borders, and disturbing their supply lines might be quite helpful to achieve goals of ATO as fast as possible."
 russia.465.a: "Send the offical request."
 russia.465.b: "We deal with taliban on our own!" 
 russia.466.t: "Kill pebble heroes together with Russia?"
 russia.466.d: "COBBLESTONE SUCK DICK"
 russia.466.a: "Yea"
 russia.466.b: "Nah" 
 russia.466.t: "Iran Refuses To Cooperate"
 russia.466.d: ""
 russia.466.a: "Understandable."
 russia.467.t: "Islamic March"
 russia.467.d: "ti che ahuel"
 russia.467.a: "We will continue no matter what!"
 russia.467.b: "If people want so..."
 russia.468.t: "Results of "Deislamization""
 russia.468.d: ""
 russia.468.a: "It isn't exactly what we wanted"
 russia.469.t: "State Atheism?"
 russia.469.d: "Before the establishment of Soviet power, the Russian Orthodox Church, despite its alleged freedom of religion, served as an instrument of population control, promoting "necessary" ideas in society. However, we have corrected this injustice by significantly weakening the influence of the Russian Orthodox Church. Nevertheless, some party members believe that this is not enough and that we need to return to the principle of state atheism. This initiative, although it is a noble impulse to return to the old Soviet order, in the opinion of the majority, is too radical. What should we do?"
 russia.469.a: "Boga net!"
 russia.469.b: "Too hardline..."
 russia.470.t: "The Rise of Russian Indie Gamedev"
 russia.470.d: "After the revival of Russian avant-garde and futurism, which had been forgotten for decades, artists, musicians and writers began to create new bright and unusual creations. To support new talents began to allocate funds for the creation of new works and the organization of exhibitions, concerts and other events.\n\nThe video game industry was also not left behind. Many developers began to create games that were unusual and thought-provoking. They used elements of avant-garde and futurism to create truly unique game worlds. Many of them became very popular among fans of weird games.\n\nThanks to this boom in the indie game industry, Russia became one of the leaders in the production of obscure and avant-garde games."
 russia.470.a: "Neyasnoe..." 
 russia.471.t: "Choosing Capital For United Novorossiya"
 russia.471.d: "Negotiations on the unification of Novorossiya are continuing, but now we need to resolve an important issue: which city will serve as the capital of the united republic?\nTwo cities can become the center: Donetsk and Lugansk.\nDonetsk is a large industrial and mining center with a large population, but located dangerously close to the front.\nLugansk is a city with a smaller population, but it is no less industrialized and has a safer location.\n\nThe discussion on this issue may take a long time, but our choice..."
 russia.471.a: "Lugansk is a truly Russian city!"
 russia.471.b: "Donetsk is the heart of Donbass!" 
 russia.472.t: "New Head For Novorossiyan Government?"
 russia.472.d: "Negotiations on the unification of the Donbass republics are continuing, and now we are faced with another question: who will become the head of the new state?\nTwo candidates are applying for the position: Denis Pushilin and Leonid Pasechnik.Pushilin, the current head of the DPR, took power into his own hands after the death of the extremely popular Alexander Zakharchenko. Although he enjoys relatively high popular support, Pushilin has never reached Zakharchenko's level. Before starting his political career, he was involved in business and was even associated with the infamous "MMM" Sergey Mavrodi.\nPasechnik, the current head of the LPR, was previously associated with the security forces of Ukraine and even had the rank of colonel of the SBU, but his loyalty is not in doubt. He has more political experience than Pushilin, as well as slightly higher popular support. Both candidates have their advantages and disadvantages, nevertheless, he will become the head of Novorossiya..."
 russia.472.a: "Pasechnik's experience has more value!"
 russia.472.b: "Pushilin's business management seems useful!" 
 russia.473.t1: "Novorossiya Talks Finalized!"
 russia.473.t2: "Novorossiya Talks Hastily Finalized"
 russia.473.d: ""
 russia.473.a: "They'll stronger together..."
 russia.474.t: "Zyuganov Pushes For New Red Belt"
 russia.474.d: "The leader of the Communist Party of the Russian Federation made an interesting proposal: to revive the so-called Red Belt.\nThe Red Belt is a group of regions in Central Russia, the North Caucasus, Siberia, and the Far East that have long expressed support for the Communist Party in local and national elections. The Red belt showed itself especially brightly in the 1996 presidential election, providing significant support to Zyuganov in his confrontation with Yeltsin.\nAlthough support for the Communists has been falling more and more over time, this term still has not lost its relevance. And if the Communist Party manages to restore the trust of the people of these regions, it will gain a significant advantage over other political forces."
 russia.474.a: "Ah... Wanting a new "red revanche"?" 
 russia.475.t: "Zhirinovsky Prepares To Tour The Country"
 russia.475.d: "The leader of the LDPR party is undoubtedly one of the most eccentric politicians in modern Russia. He enjoys popular love due to his unexpected and controversial antics during meetings of the State Duma or during his participation in various television programs.\nZhirinovsky does not disdain to use a variety of populist methods in his political career. One of these methods is his "going out to the people," during which he meets with ordinary people across the country, speaks to a wide audience, and listens to citizens' opinions about the current political situation.\nRecently, the politician announced that he plans to visit many Russian cities, where he will meet with his supporters and hold a small press conference in each. Although the LDPR remains only the third most popular party, this event will help it significantly strengthen its position and gain additional popular support."
 russia.475.a: "Well... His vigor is admirable" 
 russia.476.t: "Arrest Of CPRF Politician Causes Controversy"
 russia.476.d: "The recent arrest of a Communist Party member by law enforcement agencies has provoked a strong public reaction. The party's leadership issued a statement that the arrest was made unlawfully and without any specific charges. At the same time, the deputies of the LDPR faction expressed their support for this decision. There are ongoing debates on social media about its legality and validity. This incident did not have catastrophic consequences, but it definitely dealt a blow to our image."
 russia.476.a: "We should be more careful next time..." 
 russia.477.t: "Arrest Of LDPR Politician Causes Controversy"
 russia.477.d: "Not so long ago, a member of the Liberal Democratic Party was taken into custody by law enforcement agencies, which caused a mixed reaction from society. The party's leader, Vladimir Zhirinovsky, spoke from the rostrum of the State Duma, saying that the Investigative Committee was mired in corruption, and the police were acting irresponsibly. Meanwhile, deputies from the Communist Party of the Russian Federation came out in support of the arrest. There are opinions expressed on the Internet about the legality of the detention, as well as claims that its reasons are completely falsified. This event did not have serious consequences, but it definitely dealt a blow to our reputation."
 russia.477.a: "We should be more careful next time..." 
 russia.478.t: "Liberals Protest Against Kazakhstan Intervention"
 russia.478.d: "The recent decision of the CSTO countries to send troops to Kazakhstan to conduct a special peacekeeping operation was met with condemnation and resistance from the so-called "liberal opposition." Many young people take to the streets for unsanctioned rallies in support of the Kazakh people and against the "aggression of the Kremlin." There are slogans such as: "No war!", "Kazakhstan, we are with you!", "Putin's gang to trial!", "Freedom to Navalny!" and other nasty things about the authorities.\nYes, we can ignore the bile and arrest only the most zealous, but the security forces are confident that everything starts small and inaction will pay off in the future.."
 russia.478.a: "They'll blow over."
 russia.478.b: "Use rough measures, we must not appear weak." 
 russia.479.t: "CPRF Protest Against Local Corrupt Officials"
 russia.479.d: "Some time ago, activists of the Communist Party of the Russian Federation held a rally against local officials, saying that they were uncontrollably plundering the municipal budget. Several hundred people gathered at the protest, speaking out in support of the party and demanding the appointment of new officials from among the members of the Communist Party.\nThe local administration declined to give any comments. This event is a small local event, but it can definitely play into the hands of the Communists."
 russia.479.a: "Let them have it..."
 russia.479.b: "Sweep it under the rug." 
 russia.480.t: "LDPR Protest Against Local "Anti-Russian Laws""
 russia.480.d: "Recently, at the initiative of the Liberal Democratic Party, a protest was organized against laws that, in their opinion, violate the rights and freedoms of the Russian population. Activists have voiced demands to prevent the expansion of the autonomies of the Caucasian republics and to tighten migration legislation in relation to residents of Central Asia. The police ensured the security of the event and prevented possible provocations. This action is a small local event, however, it is clearly capable of helping strengthen the position of Zhirinovsky's supporters."
 russia.480.a: "Allow them to protest..."
 russia.480.b: "Silence their intolerance."
 russia.481.t: "Zhirinovsky Furious Over Sinovac Imports"
 russia.481.d: ""We have Skolkovo and other science cities! And we feed them and allocate budgets! So for what?  To import everything from China?! This is a real betrayal! A manifestation of meanness and the highest degree of distrust of our bright minds!" It was with such speeches that Vladimir Zhirinovsky attacked the initiative to import Synovac during a recent meeting of the State Duma. This decision has already caused a number of discussions and disputes in Russian society, and the culmination was the numerous protests of the Liberal Democratic Party under the slogan of countering the enslavement of Russia by China. Even though these protests have already subsided, the party and Vladimir Zhirinovsky personally still managed to get their share of public attention."
 russia.481.a: "Too much self-reliance hurts too, you know!" 
 russia.482.t: "CPRF Members Rally Against Putin's "Toxin""
 russia.482.d: "To the surprise of the authorities and Russia's non-systemic leftist movement, members of the Communist Party of the Russian Federation strongly criticized the development of the Sputnik V vaccine. They use rampant corruption in Russia and the fact that China has already developed an effective vaccine against the virus as their arguments. A particularly widespread story was that a member of the Izhevsk City Committee allegedly went to the hospital with complications after a vaccine injection. This story was actively replicated in WhatsApp and Telegram messengers, and the Udmurt branch of the party in VK made a post about this situation. As a result, during the Communist Party rallies, Russian citizens could observe a unique picture where anti-vaccination activists and communists marched through the streets together shouting the same slogans. Of course, the unrest has already subsided, but the Communist Party of the Russian Federation does not seem to have received its share of attention from society for long."
 russia.482.a: "And here we thought communists are against superstition!" 
 russia.483.t: "Zhirinovsky Leads A March For Furgal"
 russia.483.d: "When Sergey Furgal was arrested, everyone froze in anticipation - how would Zhirinovsky react? And he did not fail! Contrary to expectations and fears, Vladimir Volfovich himself stood at the head of a march of thousands, challenging the system! He was not afraid to become the face of resistance, ignited the fire of people's anger and showed that the LDPR is not just a party, but a fist, ready to strike at those who threaten its interests! With this gesture, Zhirinovsky exploded the political arena, for no one could have expected such a bold move from the old leader."
 russia.483.a: "A stunning show of force." 
 russia.484.t: "IDI NAHUI TUPOY DEBIL"
 russia.484.d: "NU CHTO BUDESH SOSAT?"
 russia.484.a: "YA LOH" 
 russia.485.t: "President's Statement"
 russia.485.d: "The shock of America's collapse still lingers on in Russia, despite our dislike of American government, nobody was able to predict such radical turn of events.\nPresident of Russian Federation, has made public statement on the matter, it lasted for several minutes and was filled with a lot of thoughts and historical remarks, but among all of them, Russian population seems to take note of one praticular quote..."
 russia.485.a: ""USSR understood that collapse of western capitalism was inevitable...""
 russia.485.b: ""Russian citizens feel deep sympathy for hardships faced by common Americans...""
 russia.485.c: ""I can't help but recall a quote said by the Russian philosopher Ivan Ilyin..."" 
 russia.486.t: "Main Cathedral of the Russian Armed Forces"
 russia.486.d: "The grand opening of the Main Cathedral of the Russian Armed Forces took place in Russia today. This event was a significant step in strengthening the spiritual and moral foundation of the army, and also symbolizes the unity of the nation and the support of the country's military forces.\nMain Cathedral of the Russian Armed Forces is located on the territory of the Patriarchal compound "Spaso-Andronikov Monastery" in Moscow. It has become the largest Orthodox church in the country and is an important symbol of patriotism and faith.\nThe opening ceremony of the church was organized under the leadership of the Chairman of the Synodal Department for the Interaction of the Church with the Armed Forces and Law Enforcement Agencies, Archpriest Dimitri Smirnov. The event was attended by representatives of religious, political and public organizations, as well as military personnel and veterans."
 russia.486.a: "Truly Stunning!" 
 russia.487.t: "Assassination Attempt On The President!"
 russia.487.d: "Disturbing news has emerged from Izhevsk, where an assassination attempt was made on Vladimir Putin during his official visit to the Kalashnikov Factory. The assailant, disguised in a factory uniform and armed with a PM, managed to discharge a single shot into the air before being apprehended by FSO security personnel. Despite the perpetrator's attempt to approach the president amidst the crowd, swift action was taken to evacuate Vladimir Putin from the premises. Efforts to suppress this incident proved futile, as numerous public news websites across the country reported on the shocking event.\nThis brazen act of violent opposition is deeply concerning and requires immediate attention."
 russia.487.a: "Shocking!" 
 russia.488.t: "Official Statement"
 russia.488.d: "Amidst turmoil of recent assassination attempt, the emergency meeting of security council was held, where they discussed recent news, as well as crafting a official statement on the attempt, among many plausible reasons to commit this attack, three were choosen among them, as mainline extremist ideologies that criminal was hypntotized by.\nThe terrorist was a..."
 russia.488.a: "Communist radical."
 russia.488.b: "Ukrainian banderite."
 russia.488.c: "Russian nationalist." 
 russia.489.t: "IT-Business Supports SMO"
 russia.489.d: "Following the commencement of a Special Military Operation, concerns arose regarding potential opposition from the Russian IT sector towards official state directives. However, to the surprise of many, prominent platforms such as Yandex, VK, and others released official statements expressing their support for the decisions made by the Russian government. These statements emphasized the importance of unity among the Russian people in the face of aggressive globalism. In addition to their words, these platforms have taken action by ensuring that search results exclusively display pro-Russian content and by suspending any promotion of pro-Nazi agendas. Furthermore, VK has undertaken significant measures to suppress pro-Ukrainian groups and accounts.\nAs a result, the Russian population now feels a sense of security against both internal and external influences, whether physical or digital."
 russia.489.a: "A worthwhile investment!" 
 russia.490.t: "Urgent Crackdowns"
 russia.490.d: "Following the recent assassination attempt on Vladimir Putin, a reckoning of sorts has dawned on his political opponents in Russia.  FSB units have been deployed to several major cities expected to undergo major unrest in the near future, and Rosgvardiya, the GRU, and other security services have promised the Duma the formation of a joint task force to prevent such an incident from happening again.  With additional manpower and funding allocated to all involved, it is expected that a large portion of the dissident elements in our country will be apprehended in short order.\n\nThese actions are likely to antagonize the West, alongside domestic terrorist groups in the country.  However, they cannot dispute that such an approach is necessary to ensure the well-being of our people."
 russia.490.a: "We were too lenient... Well, no longer."
 russia.491.t: "Three Flags - One Country"
 russia.491.d: "Historical memory and generational continuity in Russia have taken a new height, and literally. Now in St. Petersburg, flags symbolizing three eras - the Russian Empire, the Soviet Union and the Russian Federation - are flying on huge masts over the Gulf of Finland. The giant flags have become a part of the park, which has long become one of the points of attraction for both citizens and tourists.To the sounds of several historical Russian anthems performed by an orchestra, three huge flags were hoisted and immediately began to fly in the Baltic wind. The beautiful and symbolic ceremony took place in St. Petersburg's seaside park near Europe's tallest skyscraper, Lakhta Center. There, the historical flags of the Russian Empire and the USSR, as well as the Russian national flag, were hoisted on huge flagpoles. Each of them is a relic.\nA festive concert was organized on the shore, hundreds of people became spectators of the solemn moment. Russian President together with the authors of the idea watched the ceremony from the boat. The project was realized by Gazprom."
 russia.491.a: "Remembering Our Common History!"
 russia.492.t: "CPRF criticizes Medvedev's Administration"
 russia.492.d: "Despite our victory in the recent elections, the Duma parties, including the Communist Party of the Russian Federation, continue to put sticks in our wheels. The deputies claim the unfair dominance of United Russia in the State Duma and the "wrong" reforms carried out by President Medvedev. Disputes about the government's actions during parliamentary sessions can last for hours, which significantly paralyzes the work process.\nHowever, the president already has a plan to solve this problem, and we must implement it as soon as possible""
 russia.492.a: "They have their opinions..."
 russia.493.t: "LDPR criticizes Medvedev's Administration"
 russia.493.d: "Even after Medvedev's victory in the recent elections, parliamentary parties, including the Liberal Democratic Party, continue to sabotage our work. Party members accuse Medvedev of inexcusably "ignoring the interests of the Russian people" and, in their opinion, absolutely unnecessary legislative changes. Zhirinovsky's cries about "traitors" from United Russia can last for almost half of the entire working process of the State Duma, which seriously hinders legislative activity.\nNevertheless, the president already has a plan for solving this problem, and we must implement it as soon as possible."
 russia.493.a: "They have their opinions..."
 russia.494.t: "Direct Line With Dmitry Medvedev"
 russia.494.d: "Recently, during "Direct Line" With the President, newly elected Medevedev, was answering questions regarding political future of the country:\n- Good afternoon, Dmitry Anatolivich! I'm Anton from "Omsk News", and i want to ask a question that many, not only Omsk citizens, but all of Russians want to ask.\n- Good afternoon.\n- During your first term, you've been known as quite a liberal president, many even contrast with Vladimir Putin. Will you agree with this legacy, and continue it?\n- Thanks for the question! Of course during my first presidency I was playing out the idea of being more west-friendly in some regards, but I will make clear that it was never to counter Vladimir Vladimirovich, or went against our common outlook for the future of Russia. With more geopolitical developments after me leaving the office, I've long realized that any rapprochement with west will be futile, and met with gloating. However, I will say - changes are coming! Me, together with my team, will be planning out future transformation of Russia's political life, and, I think, many of you'll like it!"
 russia.494.a: "Russian Summer is coming, and it'll be... everlasting."
 russia.495.t: "Medevedev Appointed Into ONF Leadership"
 russia.495.d: "After Vladimir Putin's death, the All-Russian People's Front found itself leaderless, sparking fears that the organization might disintegrate. However, Dmitry Medvedev, the current Russian president, was formally appointed as the organization's new head by the Executive Committee. In his inauguration speech, Medvedev pledged to bolster the People's Front and emphasized that "an organization like ONF is needed more than ever in today's geopolitical climate."\n\nMany political observers view Medvedev's appointment as a mere formality, another testament to his loyalty to Putin. Yet, some believe that the new president could leverage the ONF to expand its reach beyond what Putin achieved."
 russia.495.a: "It'll come in handy."
 russia.497.t: "New issue of war loan bonds!"
 russia.497.d: ""
 russia.497.a: "Cool!"
 russia.498.t: "Wave of Volunteers!"
 russia.498.d: ""
 russia.498.a: "Cool!"
 russia.499.t: "Charity Campaign for Military has been completed!"
 russia.499.d: ""
 russia.499.a: "Cool!"
 russia.500.t: "International Aid has arrived!"
 russia.500.d: ""
 russia.500.a: "Cool!" 
 russia.501.t: "Opening of the First Monument in Honor of Putin"
 russia.501.d: "Today, in the heart of Saint Petersburg, a significant event took place: the unveiling of the first statue of Vladimir Putin on Mayakovsky Street, where he was born and raised. Thousands of people gathered to pay tribute to the late leader, whose vision and principles played a crucial role in restoring Russia's respected position in the world.\n\nProminent political figures and the governor of Petersburg made speeches, highlighting the importance of recognizing Putin's remarkable contributions and presidency. The monument stands at an impressive 26 feet tall, depicting Putin in his full form, hands behind his back. The inscription proudly proclaims him the "Hero of New Russia."\n\nMany officials believe that this event marks the beginning of a process of replacing some Lenin statues with Putin's statues, which will be done slowly and in an orderly manner."
 russia.501.a: "The dawn of New Russia!"
 russia.503.t: "Slovakian Thaw"
 russia.503.d: ""
 russia.503.a: "Good!"
 russia.504.t: "Slovakian Thaw"
 russia.504.d: "Roberto Fico introduced a series of government reforms, which led many people to call for a "thaw" in politics. He also expanded social programs and improved the bureaucratic process. Many people welcomed these changes with great hope.\n\nPreviously, Slovakia was known for being a very poor country controlled by EU-interest groups. However, after the European war, the Russian victory, and Fico's election, things changed. Now Slovakia is becoming a strong ally and a prosperous nation. Some attribute this to Russian funding, while others credit Fico's political genius."
 russia.504.a: "Good!"
 russia.505.t: "Formation of Free Karpatiya"
 russia.505.d: "Petr Getsko, the President of Karpatiya, has officially announced the formation of a new political party called "Free Karpatiya". In his recent speech, he stated that his people would pursue their own unique form of democracy, different from other forms, and that this new party would serve as a driving force for political inclusivity and encourage all citizens of Karpatiya to actively participate in government affairs."
 russia.505.a: "Good!"
 russia.506.t: "Formation of Free Karpatiya"
 russia.506.d: "Petr Getsko, the President of Karpatiya, has officially announced the formation of a new political party called "Free Karpatiya". In his recent speech, he stated that his people would pursue their own unique form of democracy, different from other forms, and that this new party would serve as a driving force for political inclusivity and encourage all citizens of Karpatiya to actively participate in government affairs."
 russia.506.a: "Good!" 
 russia.507.t: "Karpatiya adopts "Rusyn Socialism""
 russia.507.d: "Petr Getsko, the President of Karpatiya, has officially announced the creation of "Rusyn Socialism" Ideology. In his recent speech, he stated that his people would pursue their own unique form of socialism, different from other forms, and that this new system would serve as a driving force for political inclusivity and encourage all citizens of Karpatiya to actively participate in government affairs."
 russia.507.a: "Well, if they wish so." 
 russia.509.t: "Wojciech Olszanski Wins In Polish Elections"
 russia.509.d: ""
 russia.509.a: "Cool!" 
 russia.520.t: "United Russia's Primaries"
 russia.520.d: "United Russia is a long - running leading political force in Russia. However, after the victory in the "European War" and Dmitry Medvedev's decision not to participate in the elections, the party was left without a single candidate for the first time in many years.To solve this problem, United Russia has organized primaries, elections in which the most active and popular politicians will take part. At this event, the candidate who will become the representative of the main line of the party will be determined. The choice of participants is really wide, because United Russia is famous for its experienced statesmen."
 russia.520.a: "Patrushev!"
 russia.520.b: "Sobyanin!"
 russia.520.c: "Mishustin!" 
 russia.520.e: "Belousov!" 
 russia.521.t: "Hardline United Russia's Primaries"
 russia.521.d: "While the main part of the party actively supports its candidate, there are also those in the ranks of the EP who disagree with Medvedev's course. They believe that the course of development has gone too far. These people can be called supporters of more conservative views on sovereign democracy.Unexpectedly, these groups of people joined together and organized their own primaries to determine an alternative candidate from the EP. Among them there are strong supporters of statehood, experienced businessmen and the military of the old school. They hope that they will be able to change the system of sovereign democracy in a way that will be safer for stability and the people."
 russia.521.a: "Volodin!"
 russia.521.b: "Shoigu!"
 russia.521.c: "Naryshkin!" 
 russia.522.t: "People's Russia Chooses Presidental Candidate"
 russia.522.d: "People's Russia is a new left-wing patriotic force in the country, uniting the most talented and determined fighters for social justice. After the victory in the European War and Dmitry Medvedev's announcement of elections, HP had a real chance to seize power and end the monopoly of United Russia.\n\nNo who will be the candidate? To resolve this issue, People's Russia has convened a party congress, where a politician will be chosen by secret ballot to become its face in these elections."
 russia.522.a: "Delyagin!"
 russia.522.b: "Grudinin!"
 russia.522.c: "Konovalov!" 
 russia.523.t: "Radical People's Russia Chooses Presidental Candidate"
 russia.523.d: "Radicals from the "People's Russia", seeking to strengthen social policy and transition to a "New Socialism", also decided to nominate their candidate for the elections. Among them there are well-known politicians of the left and patriotic trends. Many people believe that it is only because of the fame of their names that they have a great chance of beating a more moderate candidate."
 russia.523.a: "Prilepin!"
 russia.523.b: "Lukashenko!"
 russia.523.c: "Platoshkin!"
 russia.524.t: "Quiet Coup"
 russia.524.d: "Valery Rashkin, a well-known politician and leader of an opposition group in the Communist Party, decided to quietly sabotage an emergency Party Congress that was to be held after their victory in the presidential election. At this Congress it was planned to approve the draft of a new constitution and elect Gennady Zyuganov as the head of the party, but Valery Rashkin and his supporters decided to change the course of events. During the voting, they silently elected Rashkin as the head of the party. The people perceived this as a party coup, but since the grassroots party activists were on Rashkin's side, the situation remained relatively calm. This move caused great irritation among Zyuganov's supporters and part of the party members, who considered this action a betrayal and a violation of party discipline. However, Rashkin managed to keep power in his hands thanks to the support of activists on the ground."
 russia.524.a: "Unexpected outcome."
 russia.525.t: "Reaction."
 russia.525.d: "After our election victory, the markedly increased activity of nationalists, neo-imperialists and other reactionaries led to mass anti-Soviet protests, which were organized under the auspices of [SOV_anti_soviet_resistance_loc]. They continue their activities by holding rallies, marches and other forms of protest, demanding changes in the country's policies and defending their ideological beliefs."
 russia.525.a: "Get to work, Comrades."
 russia.526.t: "Zhirinovsky Is Retreating"
 russia.526.d: "Unexpectedly for many, Vladimir Zhirinovsky, the ideological leader of the nationalist agitators operating in our country, agreed to the party's proposal to stop resisting the Soviet government. Many conservative members of the Communist Party of the Russian Federation called Zhirinovsky's move a wise choice and called on the remaining members of the resistance to follow his example. At the same time, members of Rashkin's group reacted to the LDPR leader's decision with skepticism and proposed arresting him. Anyway, for the right-wing camp, the loss of such a politician was a serious blow."
 russia.526.a: "It's a victory."
 russia.527.t: "Zhirinovsky refuses the offer!"
 russia.527.d: "Vladimir Zhirinovsky, the leader of the active nationalist resistance, responded to the party's proposal to stop anti-Soviet activities quite predictably: with a refusal. The LDPR leader's response provoked a mixed reaction in society: while Rashkin and his supporters said that such an outcome was fully expected and called for continuing the fight against "right-wing obscurantism," some orthodox members of the Communist Party expressed disappointment that such a wise politician was unable to accept defeat and accept the truth. Zhirinovsky's statement also caused heated discussions among ordinary citizens. Anyway, one thing is clear: the confrontation in Soviet Russia continues."
 russia.527.a: "He'll regret it...."
 russia.528.t: "The incident at the TV"
 russia.528.d: "The revamped Rossiya-Kultura TV channel hosted a youth festival of new music, organized as part of the Communist Party's decree to promote avant-garde Soviet art. The festival brought together many talented musicians whose works reflected a positive attitude to the CPRF's rise to power and harsh criticism of Putin's previous government.\nBut one of the most impressive performances was that of the young rapper MC Frolish, whose unapproved lyrics harshly criticized Rashkin's current Communist government and expressed support for the opposition Patriots Party and their radical leader Vladimir Solovyov. His songs include such lines as "Gonna take this fact, gonna stain it red, gonna slam it into Valya Rashkin's motherfucking head", "Get out of your seats, get your arses on the street, set a fire in the building, let them feel the fucking heat", "Pledge your hearts and your minds and your fists to Patriot!" Some people supported his open position and courage to speak his mind, while others condemned him for indecent behavior and disrespect for the authorities.\n\nWhat are we gonna do with him?"
 russia.528.a: "Just leave him alone"
 russia.528.b: "Get on it..."
 russia.529.t: "The South African Civil War"
 russia.529.d: "The Republic of South Africa has collapsed. The tenuous balance that was established by the end of apartheid in 1994 has finally given out, and the various political factions of South Africa have taken up arms to fight for their vision of the country's future. Objectively speaking, there are only two factions which our new people's government can choose to back, those being the African National Congress and the Economic Freedom Fighters.\n\nThe ANC has been the governing party of South Africa since it won the country's first universal elections almost thirty years ago. It is the party of Nelson Mandela, and our relationship to them and their struggle goes back to the days of the old Soviet Union. However, they moderated and stagnated the longer they have been in power. There are many who say that it was the ANC's corruption, inefficiency, and indecision which has made this civil war inevitable.\n\nIn their stead stand the Economic Freedom Fighters, a radical Marxist-Leninist faction led by former ANC youth leader Julius Malema. The EFF split off from the ANC due to the latter making compromises about land reform and redistribution. They say that the South African revolution is incomplete with the complete economic reorganization of the country.\n\nDo we respect our historic ties to the ANC and support them in their struggle to maintain order in South Africa, or do we put our weight behind the vanguard of the EFF?"
 russia.529.a: "We will support the African National Congress"
 russia.529.b: "We will support the Economic Freedom Fighters" 
 russia.530.t: "The Pre-Election Congress of CPRF"
 russia.530.d: "After Putin's departure, the country is in a period of uncertainty. The CPRF Party, which has a great chance to win, is preparing for the most important presidential election in Russia's history. However, the personnel department faces a difficult task - to choose someone who can unite the Party and offer the country a clear plan for the future. You have three options:\n\nYuri Afonin - a loyal disciple of Zyuganov. A young, energetic and loyal apparatchik who can continue the current course and offer stability.\nPavel Grudinin - "Candidate of the People", who has already participated in the 2018 presidential election. He is a compromise figure who can satisfy all members of the CPRF equally, offering a balanced and moderate policy, while already having a substantial base of support. He is the safest option.\nSergey Levchenko is the former governor of the Irkutsk region, a charismatic leader and pragmatist with experience in regional governance. He is supported by many grassroots elements of the Party, which gives his candidacy the connotation of a more decisive and even aggressive struggle for power.\n\nWho will we choose?"
 russia.530.a: "Yuri Afonin"
 russia.530.b: "Pavel Grudinin"
 russia.530.c: "Sergey Levchenko"
 russia.530.c2: "Nikolay Kharitonov"
 russia.531.t: "The Nagorno-Karabakh Issue"
 russia.531.d: "After our successful gambit in the Caucasus, one extremely problematic issue remained unresolved - the ownership of Nagorno-Karabakh.\nNagorno-Karabakh is a disputed territory between Azerbaijan and Armenia, inhabited mainly by ethnic Armenians, unlike the surrounding areas, where the majority are Azerbaijanis. At the beginning of the last century, this region was transferred to Azerbaijan as an autonomous region, but after the collapse of the Soviet Union, during the Karabakh War, the pro-Armenian unrecognized Nagorno-Karabakh Republic gained de facto control over the region. Since then, Azerbaijan has not given up trying to return this territory under its control.\nNow, after strengthening our positions in the South Caucasus, we can put an end to this conflict."
 russia.531.a: "We will give everything to our Armenian allies"
 russia.531.b: "We will stabilize the Region with the Help of the CSTO"
 russia.531.c: "We will give everything to our Azerbaijani allies"
 russia.531.g: "Let's Try To Find A Compromise"
 russia.532.t: "Azerbaijan Agrees!"
 russia.532.d: "TODO: Aliyev is reasonable and agrees to join CSTO"
 russia.532.a: "Great."
 russia.533.t: "Public Uproar Over Parties' Inactivity!"
 russia.533.d: "Despite the fact that country's most crucial elections around the corner, public has become deeply upset over three main parties underpreforming and inactive on many issues, with even campgaining seems to be slow.\nNow people of Russia seems to seek new possible avenues for the future of our country, some even say that a Influential figure will soon announce their standing..."
 russia.533.a: "Mne Naplevat" 
 russia.534.t: "Alexander Lukashenko Supports SRZP!"
 russia.534.d: "Shocking and unexpected announcement came from Belarus Republic's head of state - Alexander Lukashenko has officially endorsed "A Just Russia - For Truth" and their candidate - Sergey Mironov."
 russia.534.a: "Maybe the time has come for something new..."
 russia.536.t: "Libertarian Party Splits!"
 russia.536.d: "The unregistered Libertarian Party of Russia (LPR) has finally split into two organizations with the same name and symbols. One of them, led by Sergey Boyko, held its congress a week ago, the other, led by Mikhail Svetov, last weekend.\n\nThe founding congress of Mikhail Svetov's supporters took place a week after the extraordinary congress of another faction of the Liberal Democratic Party - led by Sergey Boyko. Both forums were convened to eliminate the consequences of the split that arose due to disagreements between the leadership of the party and the "Principles and Business" faction headed by Mr. Svetov. However, in fact, the split was legitimized: the two parts of the party decided to work independently and do not plan to cooperate with each other."
 russia.536.a: "Well... it happens."
 russia.537.t: "Kagarlitsky and Udaltsov Jailed!"
 russia.537.d: "After the recent failed terrorist attack in St. Petersburg, the FSB established links between the terrorist Vladlen Babaev and two popular leftist figures - Sergey Udaltsov and Boris Kagarlitsky, he was a regular visitor to their protests and meetings.\n\nThe FSB quickly detained two possible suspects, despite the haste of events, criminal charges were brought against both of them, which could end in imprisonment for 8 years.\n\nSmall leftist organizations are agitated and are already organizing small protests to free the two suspects, but the Communist Party has not comment it in any way, but behind the back of the public, the Communist Party has already begun to save what remains of Udaltsov's organization."
 russia.537.a: "Mne Naplevat." 
 russia.538.t: "Alexei Navalny Passes Away In Prison"
 russia.538.d: "The Department of the Federal Penitentiary Service for the Yamalo-Nenets Autonomous Okrug announced the death of Alexei Navalny. As stated in the press service of the department, the convict felt ill after a walk in Correctional colony No. 3 and lost consciousness. The paramedics who arrived at the scene made all necessary attempts at resuscitation, which did not lead to results. The doctors pronounced him dead.\n\nIt is clarified that all necessary resuscitation measures were carried out, which did not give positive results. "The doctors of the emergency medical service pronounced the convict dead," the press service of the Federal Penitentiary Service said."
 russia.538.a: "What a shame!"
 russia.538.b: "He won't even get a footnote in history books..." 
 russia.539.t: "Citizen Navalny"
 russia.539.d: "In recent days, Russian media sprinkled with articles about Navalny's recent post-prison life. Navalny, being released from prison, ahead of time for good behavior, and open regret for his actions, has now took up community and volonteer services helping out people in need, especially in new regions of the federation.\nHe also aims to get elected as repsentative of his home village of Butyn', to, as he stated: "Bring my good old village and her people into shape". Distancing himself from big politics and revoking many of his critical statements from the past, he however opted to use New Russia Party as a platform for his campaign in village elections, "...All parties done good recently, but this one, is much closer to my heart still", Navalny stated in the interview to Novya Gazeta.\nIn the same interview with Novya Gazeta, he encouraged his ex-supporters to recognize Russia as a model of democratic governance."
 russia.539.a: "People can change!"
 russia.540.t: "Kartapolov Plans To Pursue Politics"
 russia.540.d: "After dedicating many years to serving in the military, Andrey Kartapolov has expressed his desire to retire from active duty and transition into a new role within the state duma committees. His wealth of experience and expertise make him a valuable asset to Russian politics and ministries, but it is also important to recognize his exceptional skills as a commander that could greatly benefit our military affairs.\n\nThe decision on whether to accept Kartapolov's suggestion now rests in the hands of the president."
 russia.540.a: "It's better for him to stay."
 russia.540.b: "He served well, but we need him on political 'front' now."
 russia.541.t: "Restoration of CPSU"
 russia.541.d: "TODO: Following Levchenko disposal party bureacrats reform the party back to CPSU instead of Democratic Party of Communists of the Soviet Union."
 russia.541.a: "Damn! Okay"
 russia.542.t: "Negotiations with CPSU"
 russia.542.d: "TODO: Levchenko angred many partocrats, and now they tell him to calm down or he will suffer the consequences"
 russia.542.a: "Okay-okay"
 russia.542.b: "Hell nah"
 russia.543.t: "Letter from an unknown bureaucrat from Izhevsk"
 russia.543.d: "TODO: Levchenko recieves a letter from a party member unhappy about recent reforms."
 russia.543.a: "The party listens to its members!"
 russia.543.b: "Иди нахуй"
 russia.544.t: "Impeachment of the President"
 russia.544.d: "TODO: More conservative bureaucrats impeach Levchenko following his failure to negotiate, and now they have a choice to pick either orthodox marxist leninist or more moderate but still liberal candidate on the post."
 russia.544.a: "The CPSU is seizing power!"
 russia.544.b: "Bondarenko will correct Levchenko's mistakes!"
 russia.545.t: "New Reality"
 russia.545.d: "It was late at night, Anton was walking around his hometown, waiting for the long-awaited return of his best friend after demobilization, he was filled with lofty and terrible thoughts, traces of the war remained in his heart, all the people he knew somehow shared his pain, despite the sad reality, he reminded himself that life was going on further, that people, no matter what, go further - restoring everything that they have lost.\n\nWalking further through the city, he noticed a large poster with the President showing the steps of the new program of "Post-war reconstruction", he had already heard about it more than once, but had never thought deeply about it, after reading into the program, he suddenly realized that this was not just a process of restoring the wealth of countries, but also a symbol of hope for a good future, a symbol of stability and freedom not only for the peoples of Russia, but also for the whole of Europe.\n\nHe thought to himself: "No matter what happens next, we will build a new world - a better world.""
 russia.545.a: "Memento vivere" 
 russia.546.t: "Choosing Our Marshal"
 russia.546.d: "After much deliberation and careful consideration, we have reached a momentous decision to elevate one of our esteemed generals from the General Staff to the prestigious position of Marshal of Russia. This appointment signifies not only a great honor but also a significant responsibility that the chosen general will bear with utmost dedication.\nAmong our distinguished staff, two outstanding candidates have emerged as the most prominent contenders for this esteemed title: Valery Gerasimov and Oleg Salyukov. Both generals possess exceptional leadership qualities, strategic acumen, and unwavering commitment to the defense of our nation. As we prepare to bestow this prestigious title upon one of them, we are confident that the chosen marshal will uphold the highest standards of excellence and continue to serve our country with honor and distinction."
 russia.546.a: "Gerasimov!"
 russia.546.b: "Salyukov!"
 russia.546.c: "How about we create "Marshal of the Union State"?"
 russia.547.t: "Syria Asks for Economic Help"
 russia.547.d: "Our Syrian friends have been struggling for the past decade, ever since the onset of the Arab spring. Fortunately, the past several years have seen their civil war steadily cooling down, and they are now in a stable enough position where economic aid will not just go in a dumpster. They have approached us to ask for our assistance, and they will have it. We will continue expanding our presence in the Middle East, one Ruble at a time."
 russia.547.a: "We must help them to the fullest!"
 russia.547.b: "Of course, we will stand funds to our Syrian partners." 
 russia.548.t: "Government Takeover"
 russia.548.d: "This Palestine shit gets serious"
 russia.548.a: "Yep."
 russia.549.t: "Suraykin Unites Socialist Hardliners"
 russia.549.d: "After solidification of new ONF coalition many communists and socialists have felt that CPRF and sister organisations have finally revealed their true nature and got sold off to capitalist-putinist oligarchy.\nBeacon for those type had become Maxism Suraykin who had always disliked CPRF, and now formed a new 'truly communist' front of parties who unite against our government, and been able to amass sizeable chunch of disgruntled populace with left-wing views.\nWith this a new anti-system opposition begun to formulate, taking a throne away from barely alive liberals."
 russia.549.a: "Hardly anything new." 
 russia.550.t: "The Other Russia Organizes "United Opposition Council""
 russia.550.d: "The Other Russia, or National-Bolsheviks, recently organized a set of meetings between a "national-patriotic" opposition with attempts to unite them under their command. They were largely succesfully, and now lead "United Opposition Council", unlike the times of old when Nazbols mostly ran behind their liberal counterparts, its them who united dissatisfied on the right side of spectrum. Even some liberals joined in, fully giving up on pursuing their goals independently."
 russia.550.a: "They were never truly gone." 
 russia.551.t: "Liberals On the Inside"
 russia.551.d: "Boris Nadezhdin, a Self-proclaimed leader of liberals inside of ONF, has been stirring the waters inside the system, demanding for liberals to be heard and listened to, and pass reforms that can threaten the foundations of our country. We can't fully say of unity of our government when such elements persist even today.\nOn the good side, our new liberals seems to be much more open to compromise..."
 russia.551.a: "What a nuisance!"
 russia.552.t: "Elections Of Regional Representatives"
 russia.552.d: "Recently, elections of local governments, heads of republics, and councils had took place in many places of our country. In some, socialist parties and rightist parties of ONF had won over the population, despite the fact of us being united, our visions are still different, now those regions will be governed in accordance to a vision of ONF socialists and ONF nationalists.\nThey aren't without their strong suits but also, they come with their downsides."
 russia.552.a: "We are united, but we are different."
 russia.553.t: "Sergey Lavrov Resigns"
 russia.553.d: "Sergey Lavrov, the esteemed head of our Foreign Ministry, has officially announced his resignation after years of dedicated service, numerous successful deals, and countless diplomatic missions. Lavrov, a true titan of modern diplomacy, has been praised in the media for his unwavering commitment to advancing our country's interests on the global stage. Citing age and health concerns, Lavrov has put forth Vasily Nebenzia as his proposed successor, a decision that has sparked both admiration for his foresight and gratitude for his outstanding leadership. The airwaves are filled with heartfelt messages expressing gratitude to Lavrov and recognizing his unparalleled contributions to our nation's foreign policy efforts."
 russia.553.a: "We thank you for your service." 
 russia.554.t: "DE-MO-BI-LI-ZA-TSYA"
 russia.554.d: "After hard-won battles and the triumph over elitist Europe, our heroes must now make their way back home. The titanic effort achieved by our people, military, and economy will soon come to an end. As our soldiers return home, they will exchange their weapons for tools of trade, transitioning back to the workforce. Some may choose to resume their studies or engage in more intellectual pursuits.\nWith Europe defeated, the need for our current military personnel diminishes. It is essential to reduce this strain on our economy by downsizing the military forces. These skilled individuals will prove to be far more valuable in civilian life at this juncture, much like the transition that occurred in the late 1940s. The return to civilian life marks a new chapter for our nation, where the strength and dedication of our people will continue to shape our future."
 russia.554.a: "They earned their rest." 
 russia.555.t: "Dmitry Medvedev Wins Elections"
 russia.555.d: "Election season come around, and to no one surprised, Dmitry Medvedev won with overwhelming majority of votes - 85.31%. All parliamentary parties either endorsed his candidacy or put the minimal amount of effort into their campaign, and soon after results fully declared their support for now re-elected president.\nThe few non-system candidates only received around 0.7%, promoting to declare this numbers illegitimate. Numerous detractors, now concentrated mainly outside the Russian borders, have already cast doubt on Medvedev's result with absolute probability. But in the current political reality, what matters is what is happening inside Russia. And inside Russia, Medvedev is an absolute winner and an absolute record holder: both formal and real."
 russia.555.a: ""Russia - is Me."" 
 russia.556.t: "Divide In LDPR"
 russia.556.d: "After death of Vladimir Zhirinovsky, many thought that LDPR wouldn't be the same, and they were correct. Divide has been browning inside once united party, with Slutsky consolidating his reign, and ousting any dissent against his leadership. Recently, Vasily Valsov- the unofficial head of opposition to Slutsky, has been stripped of his membership, and deputy status for "absences". Soon after, Vlasov took to his Telegram where he decried his deposition as illegitimate, and Slutsky's supporters as "opportunists" and "liars", proclaiming that LDPR has rid itself off true Zhirinovskists and able politicans.\nLater he also stated that will seek ways to get back into politics.\nMeanwhile, Slutsky has been eager to establish "Zhirinovsky Brand" propagate by the party, as the way to immortalize Zhirinovsky career and make it popular among youngsters."
 russia.556.a: "Help Slutsky out in making "Zhirinovsky Brand.""
 russia.556.b: "LDPR without Zhirinovsky is like an empty beer..."
 russia.557.t: "Vasily Vlasov Joins Forces With SZRP"
 russia.557.d: "Vlasov, the disgraced ex-LDPR member, soon after declaring his attention to return to politics, has decided on rather unorthodox approach, despite being a member of nationalistic party for many years, he joined up with socialist SRZP party. Now he works as their agitator and activist, hoping one day to return to Duma through SRZP mandate."
 russia.557.a: "Well... Unexpected." 
 russia.558.t: "Vasily Vlasov Forms "National Russia""
 russia.558.d: "Vlasov, the disgraced ex-LDPR member, soon after declaring his attention to return to politics, has decided to organize his new political organisation, with help of old LDPR members and many disgruntled ex-LDPR voters, he formed up the "National Russia" party. Taking a naming idea from other two parliamentary parties. Despite hyping up of this new political entity, by its supporters and Vlasov as a "true heir of Zhirinovsky's vision", many experts doubt ability for Vlasov's party to achive any big results, aside from few seats in regional councils."
 russia.558.a: "Well... Still seems better then whatever Slutsky doing."
 russia.559.t: "Future of Belarus"
 russia.559.d: "Finally, after more than 20 long years, the Union of Russia and Belarus came into force.: Now two fraternal nations have joined together in a single state. The project, originally planned as Lukashenko's cunning plan to take power in Russia into his own hands, has undergone drastic changes over the years: now Alexander Grigorievich himself acts as a wingman. Now that the issue of Belarus' accession has been resolved, the question of its place in the Russian system has arisen. Various initiatives and proposals are being expressed in the corridors of the Kremlin.\nFirst, they believe that it is necessary to fully politically integrate Belarus and make the Belarusian Federal District in its place. Greater centralization will benefit the economy, but it will cost us the resistance of Belarusian officials.\nOthers believe that a system with two parliaments will be able to work, and although it will have fewer economic advantages, it will ensure the loyalty of Belarusians."
 russia.559.a: "Form Belarusian Federal District!"
 russia.559.b: "Keep it as it is."
 russia.560.t: "Future of Novorossiya"
 russia.560.d: "For more than ten years, the people of Novorossiya have been fighting for the right to be together with Russia, and finally, this day has come. Now the people of Novorossiya are the people of Russia, united by a common bright future. Of course, becoming an organic part of Russia will not happen instantly, but the main work is already behind us.\nNow we are faced with a choice: to form the federal district of Novorossiya or to establish an autonomous republic as a full member of the Federation. On the one hand, people fought for unity with Russia, and the logical step would be to give them the status of an ordinary region. On the other hand, Novorossiya is a special case, and its people have earned a special status and autonomy in our state.\nMany options have the right to be implemented and are fair in their own way, but our final decision…"
 russia.560.a: "Form Federal District of Novorossiya!"
 russia.560.b: "Create an Autonomous Republic inside as part of Russia." 
 russia.561.t: "First Novorossiyan Elections"
 russia.561.d: "TODO: Elections in Republic of Novorossiya inside Russia"
 russia.561.a: "Evgeny Balitsky achieves victory!"
 russia.561.b: "Pasechnik secures the majority!"
 russia.561.c: "Pushilin wins the vote!"
 russia.561.c1: "Saldo takes the first place!"
 russia.562.t: "End of Schismatists"
 russia.562.d: "Maidan government made its main target to cut any strings of brotherhood between Russian and Ukrainian people, and one of most strong ones are, of course, religious ones. Created by a band of dissenters - Orthodox Church of Ukraine, acted as one more tension point between us, with its bandit like raides against legitimate Ukrainian Orthodox Church, it is clear they are enemy of any fair christian in Ukraine and Russia.\nOnce Ukraine was freed from banderite yoke, this "church" has lost all of its protection and became a tool to spread hate and division towards new government. With a stern decision, Azarov outlawed their church, and officially disbanded it, giving all of their possessions to UOC. Moscow Patriarchate on their end, has ensured that Ukrainian Synod is loyal to the cause of all Orthodox Christians, and is prepared to take up their mantle as guiding light for all Ukrainian people."
 russia.562.a: "We're united in faith!"
 russia.563.t: "The Georgian Parliament Impeaches the West-backed President!"
 russia.563.d: "The west finds their slimy tendrils' grasp over the Caucasus region weaker every day. The Georgian president, nothing more than a yes-woman to NATO and the EU was democratically impeached by the Parliament yesterday. The Georgians have announced that they now intend to seek closer ties with us, their true friends, and forsake their western puppeteers."
 russia.563.a: "Excellent!" 
 russia.564.t: "Gennady Zhidko Passes Away"
 russia.564.d: "In Moscow, at the age of 58, the former head of the headquarters of the Russian Armed Forces in Syria, ex-commander of the Eastern Military District (VVO), Colonel-General Gennady Zhidko, died. The military commander died after a long illness, said Mikhail Degtyarev, Governor of the Khabarovsk Territory."
 russia.564.a: "Thank you for your service, Comrade." 
 russia.565.t: "Our Imperial Stronghold"
 russia.565.d: "After lengthy and difficult negotiations in the Kremlin, the governments of the Donbass Republics reached an agreement on the formation of a new state on their territory. In addition, their political republican structures were reorganized into branches of the national movement "Russian World". Now a new order will be established in Novorossiya in accordance with the concept put forward by Vladimir Zhirinovsky.\n\nUkraine has condemned our steps to strengthen the statehood of Donbass, but their cries do not resonate with us. We are already actively increasing the military power of the Donbass Armies, preparing for a new stage of our development. Crimea was only the beginning of the unification of the Russian people"
 russia.565.a: "We need to liberate the entire southeast. The whole of Ukraine." 
 russia.566.t: "Georgian President Mobilizes the Army!"
 russia.566.d: "In a display of nothing but authoritarianism, the Georgian president shows her true colors as she overrides Parliament. In response to his democratic impeachment, he has mobilized the army to keep his rule over the country intact. Somehow, we have been pinned as the aggressors in this scenario, and the Georgian nation is now openly hostile towards us, surely bolstered by their western allies."
 russia.566.a: "So be it..." 
 russia.567.t: "Status Report on American Situation"
 russia.567.d: "\n\n\n                  £GFX_SVR_event_texticon   \n\n\n\n\nDear Vladimir Vladimirovich,\nHaving compiled and analyzed the necessary information, the SVR is prepared to report that the political situation in the United States is approaching a critical juncture. The country's establishment is fracturing amidst the fierce battle between two parties and their respective leaders, notably Donald J. Trump. The economic downturn following the oil crisis has caused many Americans to lose faith in the system, leading to the proliferation of various extremist movements across the political spectrum, including communists, hardline fascists, and even satanic cults.\nThe upcoming November elections are anticipated to be a tipping point, with some experts predicting the potential outbreak of open civil conflict among the factions within American society. Regardless of the outcome, it is evident that America is no longer capable of maintaining its position as the sole global superpower that it once held, and may retreat into isolationism as a best-case scenario.\nFor the Russian Federation, this situation presents both opportunities and significant risks. It is crucial to remember that Europe may swiftly move to fill the void left by the United States as the leader of the globalist order. For further details, please refer to the enclosed document folder containing all pertinent information.\nI remain dedicated to serving Russia!\nSergey Evgenievich Naryshkin."
 russia.567.a: "Outstanding work!"
 russia.568.t: "Status Report on Donbass Republics"
 russia.568.d: "\n\n\n                  £GFX_FSB_event_texticon   \n\n\n\n\nMr. President,\nI, together with team of federal agents have complied an accurate report on current happening in Donbass' People's Republics. To prehase this, I will give an overlay on situation. Ever since their rebellion and Minsk protocols, both republics have secured their economic growth, and their inter-state relations with us, even if its still 'unofficial'. LPR and DPR had built up their military and defense potational significantly. In Lugansk, after coup that removed a stale and broken administration, Leonid Pasechnik was able to secure people's popularity through anti-corruption reforms. In Donetsk, however, following the murder of Zaharchenko, Pushilin has only managed to regain half of trust held by people towards previous leader, but his economic efforts may result in succesful popularity boost.\nUkrainian regime, however, has been acting increasingly aggressive however, has been acting increasingly aggressive and erratic, and in this rapidly changing world we can suspect Kiev might fall to desperate measures including abondoning Minsk Protocolsssive and erratic.\nI endorse your decision to send additional support to republics, both military. and civilian. But, I also suggest working on combining potential of both regions, through possible unification into one federal union.\nI Serve Russia!\nAlexander Vasilyevich Bortnikov."
 russia.568.a: "Great report."
 russia.569.t: "The beginning of SMO"
 russia.569.d: "You know how this will happen. You attack until dawn, crushing the Ukrainian defenses with air power and tank breakthroughs. Strike quickly and focus on capturing the areas you are interested in. Connecting with Transnistria will be useful. Our soldiers must try to surround as many enemy troops as possible.\n\nHowever, Ukraine's allies will not stand idly by. Expect them to intervene in the conflict soon, and plan your operations against Ukraine accordingly. Use all available means to achieve victory. If you can handle Ukraine, then half the job will be done.\n\nGood luck to you! The future of Europe depends on your efforts."
 russia.569.a: "Roger That."
 russia.570.t: "Kagarlitsky joins the Communist Party"
 russia.570.d: "In a recent interview with Komsomolskaya Pravda, Boris Yulievich Kagarlitsky, a well-known leftist publicist, fighter against globalism, teacher, sociologist and opposition activist, was asked how he felt about the current course pursued by the Communist Party and Russia. "I believe that the Communist Party of the Russian Federation is now following the right, truly leftist path. From a party whose main goal was to return to the old Soviet order of the times of "stagnation," it has become a party of a completely new socialism, responding to the demands of the people of the 21st century." - This is how the editor-in-chief of Rabkor answered this question, and added that "he sees himself among those who are currently building a new socialist democracy and would not mind joining the party."\nThis statement is surprising, considering that Boris Yulievich is an oppositionist and a left-wing dissident with experience: he was arrested in 1982 in the case of the Young Socialists, supported the Supreme Council, opposed the alliance with the Communist Party of the Russian Federation in the Left Front, and even sued Gennady Zyuganov. In recent years, his attitude towards the Communist Party has warmed up: he took part in protests against constitutional amendments in 2020 and against the falsification of the results of the State Duma elections in 2021. Many within the party welcome his admission to their ranks and even predict him a post in the government."
 russia.570.a: "Cool!"
 russia.570.b: "Rashkin will personally give him his party card!" 
 russia.571.t: "Media Publishes Exposes on Levchenko!"
 russia.571.d: "Levchenko has been subjected to vicious attacks and insults by his opponents. One of the main reproaches against Levchenko is the accusation of illegal hunting, corruption and illegal actions during his work as governor of the Irkutsk region. He is accused of being involved in various corruption scandals and abuses of power. In addition, he is accused of links with organized crime and is called a bandit and thief."
 russia.571.a: "Slander!"
 russia.572.t: "Alexei Navalny - The Road of Happiness."
 russia.572.d: "In the village of Butyn, Alexei Navalny's small homeland, time flows slowly and quietly. Sent here by the Communists, he gave up politics and found his happiness in the simple life of a villager.\n\nIn the morning, Navalny wakes up at first light and goes to his vegetable garden, where he lovingly grows vegetables and takes care of flowers. His hands are skillful and caring, like a real householder, and every harvest pleases him and his family. In addition to his daily work in the vegetable garden, Navalny also helps his mother around the house. He chops firewood, carries water, takes care of the cattle - all this makes his bond with his native land even stronger.\n\nFor Navalny, life in the village of Butyn became a real refuge from the political intrigue and tension of city life. He realized that to be free from the shackles of politics means to learn to appreciate the simple joys of life and real values. For him, life in his native village was not a prison, but a blessing that helped him find himself and his place in the world."
 russia.572.a: "Life in the Village."
 russia.573.t: "Alexei Navalny - The Road of Happiness."
 russia.573.d: "In the village of Butyn, Alexei Navalny's small homeland, time flows slowly and quietly. Sent here by the Communists, he gave up politics and found his happiness in the simple life of a villager.\n\nIn the morning, he clears the snow from his own yard and goes for a walk with his family through the snow-covered fields and forests, enjoying the beauty of the winter landscape. He admires the snowy patterns on tree branches and animal tracks in the fresh snow. Each time the winter world brings him new discoveries and joy. Navalny also helps his mom with household chores. His caring and love for his family make every winter day special and memorable.\n\nFor Navalny, life in the village of Butyn became a true refuge from the political intrigue and tension of city life. He realized that to be free from the shackles of politics means to learn to appreciate the simple joys of life and real values. For him, life in his native village was not a prison, but a blessing that helped him find himself and his place in the world."
 russia.573.a: "Life in the Village."
 russia.574.t: "Election to Supreme Soviet"
 russia.574.d: "After [SOV_cprf_candidate] won the presidential election, the country entered a new era of change. Today, the newly created Supreme Soviet reflects the people's desire to see change and development. The Communist Party, which won a majority of seats in Parliament, promises to bring with it new ideas, strategies and solutions for the well-being of the country. It is an opening of new horizons and opportunities for all citizens of Russia."
 russia.574.a: "It's the New Age." 
 russia.575.t: "Get Your Free TV!"
 russia.575.d: "In recent weeks Russians have rejoiced following new People's Front initiative to provide televisions and internet access for new regions, low-income families and rural areas. Many flocked to the ONF help centers to get their very own Russia-made state-of-the-art TVs, and sign in to upgrade their connections to global net. These TVs have everything necessary for modern telecommunications, they come pre-packaged with TRICOLOR and KINOPOISK subscription for 1 year, and setup for any additional activities be like console gaming or internet browsing.\nWhat citizens don't know however, is that those TVs and their new internet routers, following new orders to improve national security, record and watch their every request and activity, and sends them into special server storages located in their regional executive committees, where they will be analyzed by a top-notch AI alogorithms for harmful contents. It is done to minimize any possible extremist or russophobic dissent. For the safety of our country, and our citizens. Ordinary, law-abiding people have nothing to fear, their privacy won't be harmed, but enemies of Russia, won't be able hide from the watchful eyes of their beholder."
 russia.575.a: "Why are you crying when it's your blind eye that's liable?" 
 russia.576.t: ""For Truth" Defends "Stalin's Doner""
 russia.576.d: "Zakhar Prilepin's party "For Truth" continues to try to gain recognition through street actions: this time the party members reacted to the scandal around the catering point called "Stal'in doner". Some "pravdins" went to distribute leaflets in support of the "Stalinist" shawarma, while others decided to picket the building of "the Memorial" human rights center to demand an apology for comparing Joseph Stalin with Adolf Hitler.\nA pub in Moscow's Koptevo district named in honour of Stalin attracted public attention in early January: the menu included shawarma "Stalin's with double meat" and "From Beria with tkemali sauce", and the cook worked in an NKVD uniform. Among others, Yan Rachinsky from the "Memorial" spoke out against the opening of a cafe with Stalin's name on social media.\nAfter that, the "For Truth" party called on Memorial to apologise for "rewriting history and disrespecting Stalin". And then it decided to take the discussion offline.\nThis is definitely a one of ways to gain votes of all time."
 russia.576.a: "Truly enthralling."
 russia.577.t: "Invisible Schism"
 russia.577.d: "Everyone in the LDPR is united in their love for Vladimir Volfovich, but that's where it all ends, for more than 30 years, the party has at least two factions with their own ideas about the future of Russia and the LDPR. Of course, as long as Zhirinovsky is alive, all party members will listen to his instructions, but it cannot be said that he is completely free from the influence of one or another of his cronies. \The reformists in the LDPR are those who see Russia as a national democracy in which the Russian people and their world come first, they reject more totalitarian practices, some even favour a revival of the monarchy, while others want to turn the LDPR into United Russia 2.0. Their tacit leader is Leonid Slutsky, mainly because of his connections, not because of any leadership qualities.\n £GFX_hawks The Hawks or Turbozhirinovtsy are a core of radical, fanatically loyal to Zhirinovsky, ordinary, young party members fully focused on creating a strong nation-state in Russia, in which there is no place for useless democracy, oligarchs, and foreigners. Their leader, Vasily Vlasov, is young and energetic, though he lags behind his opponent in intrigue, he has always been Vladimir Volfovich's favourite, which is why the Hawks now have the upper hand in influence. This could all easily change though, especially after the LDPR took over."
 russia.577.a: "We'll see who's who..."
 russia.578.t: "The First Elections to the Governing Senate"
 russia.578.d: "The creation of the Governing Senate by Zhirinovsky was an unexpected and notable event in the new political system of Russia. At a time when many expected traditional actions from the LDPR, Zhirinovsky took a bold step by creating a new power structure and declaring free elections in it.\n\nThanks to active election campaigns, loud statements and promises, the LDPR was able to win the trust of voters again. The election results showed the clear dominance of the LDPR in the Senate, gaining an absolute majority of seats in the Senate.\n\nThe first elections to the newly formed Governing Senate under Zhirinovsky became an important indicator that the LDPR is ready to continue to defend the democratic choice of the people."
 russia.578.a: "I love democracy."
 russia.579.t: "The Growing Role Of Rosgvardiya"
 russia.579.d: "Since Vladimir Volfovich took power, his most ardent ally in the security branch of government has been, unexpectedly, Viktor Zolotov. He not only proved his loyalty, but also convinced Zhirinovsky that most of the rudimentary law enforcement agencies could be replaced by a reliable and better Rosgvardeisky alternative.\n\nFirst the police, then the FSIN, then the FSO, and now even the Army, in which special supervisory bodies of the Rosgvardia were created, are under the control of Zolotov and, consequently, of Vladimir Zhirinovsky.\nSome Western political analysts even fearfully compare this practice to the times of Ivan the Terrible."
 russia.579.a: "Rosguardia - The New Oprichnina!"
 russia.579.b: "Work, Brothers." 
 russia.580.t: "Fate of CPRF"
 russia.580.d: "With Zhirinovsky's victory and restructuring of Russia, a question of what to do with the communists had arisen.\n\nWhile Zyuganov, the sly fox he is, is certainly a problem alongside his party, it cannot be said that he is an enemy of Russia. The CPRF are avid opposers of the western world, and it is certain that they did their fare share to assist Russia.\n\nAt the same time, a large chunk of their party is openly hostile to us and wishes us dead. They do nothing but besmirch the name of the Russian Empire, seeing Russian history as "archaic junk" that should be forgotten to focus solely on the Leninist regime.\n\nWe have two options, disband the party, leaving the members be, or trial the CPRF for anti-government activity and inner party corruption. Improve our image, or secure the administration.\n\nWhich choice will it be?"
 russia.580.a: "Leave old Zyuganov to himself and his dacha..."
 russia.580.b: "CPRF bandits To Trial!" 
 russia.581.t: "Zolotov's Report"
 russia.581.d: "Viktor Zolotov has requested a personal meeting with Vladimir Zhirinovsky. During this 2-hour report, Zolotov detailed a possible coup de'tat attempt made by opponents of LDPR, and this greatly angered Zhirinovsky. Shortly after, Zolotov and Zhirinovsky begun laying out plans to destroy enemies of Russia, and this must begin with declaration of state emergency, and complete suspension of duma and current constitution."
 russia.581.a: "We must act quick!" 
 russia.582.t: "League for Russian Democracy"
 russia.582.d: "An ominous shadow is awakening, which threatens to plunge our homeland into chaos and destruction. The League for Russian Democracy organization is rising from the ashes, uniting liberals, non-systemic oligarchs and traitors, former members of the government in its ranks. This alliance, soaked in the poison of hatred for our country and its leaders, crystallized with the sole purpose of staging a war against the government elected by the people, headed by Vladimir Wolfovich Zhirinovsky.\nThe League for Russian Democracy proclaims its dark intentions by all available means, even the most disgusting and terrorist ones. She is ready to use all her destructive power to seize power and subjugate our free and independent Homeland.\nBut let these dark forces know: we will not let ourselves be broken, we will not allow the enemies to destroy what we are fighting for, what we live for! We will be able to resist them by uniting around our leader and defending our ideals and values."
 russia.582.a: "We must crush them like bugs!" 
 russia.583.t: "The New Restoration"
 russia.583.d: "A sinister alliance is emerging from the depths of the past, ready to disrupt the foundations of our state and lead us into the darkness of past mistakes. The Left Party "The New Restoration" Party is embarking on a path of destruction, uniting communists, neo-Stalinists and hypocritical democratic socialists in its ranks. Their goal is to fight against the legitimate government headed by Vladimir Wolfovich Zhirinovsky by all available means, including even terrorist acts.\n"The New Restoration" Party forged in the shadows, fueled by the idea of revenge and destruction. Its traitors do not seek the good of our Homeland, but only pursue power and bloody revenge. They are ready to use the most disgusting methods in order to achieve their goals and cover up the traces of their downfall."
 russia.583.a: "We won't show any mercy to red terrorists!"
 russia.584.t: "The Secret War..."
 russia.584.d: "The clouds are gathering over our Motherland, and the sinister forces of the secret organisations "League for Russian Democracy" and "The New Restoration" are preparing for their insidious attack on our freedom and independence. The government under the leadership of Vladimir Volfovich Zhirinovsky is forced to enter the Secret War to protect the legitimacy and stability of the country from this sinister enemy.\n"League for Russian Democracy" and "The New Restoration" are shrouded in the darkness of treachery and lust for power. They will stop at nothing to overthrow the government elected by the people and establish their tyrannical rule. Their methods are cunning, deception and violence, designed to destroy the foundations of our democracy and enslave our people. In this Secret War, the Zhirinovsky government is using all possible methods, including the security forces, to confront this dark alliance. We are ready to repel every attack, expose every intrigue, and hold accountable anyone who tries to undermine our freedom."
 russia.584.a: "It's time to act."
 russia.585.t: "TNR Destroyed!"
 russia.585.d: "TODO: The New Restoration (Radical Communist Organiztion) is destroyed under Zhirinovsky"
 russia.585.a: "Great work, Brothers!"
 russia.586.t: "LRD Destroyed!"
 russia.586.d: "TODO: League For Russian Democracy (Radical Liberal Organiztion) is destroyed under Zhirinovsky"
 russia.586.a: "Great work, Brothers!"
 russia.587.t: "Oprichnik's Day"
 russia.587.d: "In the rain, water droplets pounded on the roof of the Rosgvardiya service car, waking Timur from a deep sleep. His radio buzzed on his strap, reminding him of the new directives that had come from Moscow a few weeks ago. Now an ordinary Rosgvardia officer like Timur had been given sweeping powers, elevating him above all the police officers in the provincial town. The job had become even more stressful though, causing him to doze off right at his workplace.\n"G-10, come in. Repeat, G-10, over." - Sounded from the walkie-talkie, another obnoxious rule of the new edicts was the use of code names everywhere, even in personal communication.\n"G-10 here, over." - Timur yawned and answered. "We have information about possible anti-Russian behaviour, possibly related to the 'New Renaissance'." - It sounded on the other end of the connection. Timur grew serious. Usually he had to deal with dispersing thugs and arresting alcoholics or homeless people. But this was serious. Timur hated Communists, as did his family, who always voted for Zhirinovsky, even when other conformists voted for Putin. Now was the moment when he could show his true abilities and finally fulfil the hopes of his proud father, who was so pleased when his son joined the Rosgvardiya.\n"Roger that, G-1. State your destination. Over." - Timur received the coordinates and set off to apprehend Russia's enemies."
 russia.587.a: ""If I have to crack some skulls, I will.""
 russia.588.t: "Zhirinovsky's Last Order"
 russia.588.d: "Citizens of Russia, today our country mourns the passing of the great leader, Vladimir Zhirinovsky, but his legacy lives on in each of us. At the last moment of his life, he gave us an order, which became his last great gift for our Motherland.\n\nThis order is his last word, his last will, which speaks of the need to cleanse our state apparatus of pests, in particular Leonid Slutsky. The order clearly states that only the most faithful student of Zhirinovsky can fulfill this sacred mission, namely Vasily Vlasov.\n\nHis soul burns with the fire of devotion, his heart is filled with love for the Motherland. He goes into battle with the firm conviction that every step, every action, every sacrifice brings us closer to the ideal - to a clean, just society in which every citizen can flourish in all his greatness.\n\nMay his work be a crown of glory and honor, may his name become a symbol of strength and loyalty. May we all together, under his leadership, make our Russia stronger, more united and brighter, in memory of our great leader, Vladimir Zhirinovsky. Glory to Russia!"
 russia.588.a: "The time has come. To execute order..."  
 russia.589.t: "Russia Demands Our Submission!"
 russia.589.d: "ДЕЛАЙ ПРАВИЛЬНЫЙ ВЫБОР ИЛИ ТЕБЕ ZZ OZ V VO ZZ ZZ PIZDA"
 russia.589.a: "Ладно похуй"
 russia.589.b: "НАДО БОРОТЬСЯ ТАК НЕЛЬЗЯ ЖИТЬ НАДО БОРОТЬСЯ"
 russia.590.t: "Dugin Endorses Zyuganov!"
 russia.590.d: "The recent speech by Alexander Dugin, an outstanding politician and thinker, has caused a wave of discussion in Russian society. In his speech, he expressed support for the new Soviet Government and its leader Gennady Zyuganov. This was an unexpected step for many, given Dugin's previously expressed positions, which did not always coincide with the line of the Communist Party.\n\nThe basis for support was Zyuganov's official position on religion and cooperation with the Russian Orthodox Church. Zyuganov stated that there would be no repressions against religious organizations, but on the contrary, cooperation with the ROC in the framework of national and cultural projects would be encouraged. This statement delighted Dugin, who called Zyuganov a true patriot and a true conservative.\nFor Dugin, it is important that the authorities recognize the role and importance of religion in the life of society and the state. He believes that cooperation with the Russian Orthodox Church helps to strengthen the spiritual foundations of Russian civilization and preserve traditional values. The support of the Communist Party government in the person of Zyuganov on this issue for Dugin became a vivid example of loyalty to the ideals of conservatism and patriotism."
 russia.590.a: "Outsanding!"
 russia.590.b: "Convince him to make contact with us."
 russia.591.t: "Friendship with APLA"
 russia.591.d: "TODO: USSR welcomes friendship with APLA America."
 russia.591.a: "Cool!"
 russia.592.t: "Friendship with Trump"
 russia.592.d: "TODO: USSR exists in the world with Establishment America but its actually friendly - kind trump"
 russia.592.a: "Cool!"
 russia.593.t: "Old Enemy"
 russia.593.d: "TODO: USSR exists in the world with Establishment America - evil trump/biden"
 russia.593.a: "Not very cool"
 russia.594.t: "Old Enemy"
 russia.594.d: "TODO: USSR exists in the world with far right America - ptf/nsm"
 russia.594.a: "Not very cool"

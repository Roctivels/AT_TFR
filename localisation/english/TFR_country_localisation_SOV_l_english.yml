 SOV_prepare_the_union_state_category: "Preparing the Union State"
 SOV_prepare_the_union_state_category_desc: "§YThe Union State§! is an initiative of Russia and Belarus to create closer political, economic and military integration between the two countries. The project was created in 1999 after the signing of the Treaty on the Creation of the Union State of Russia and Belarus.\n§YThe Union State§! project envisages the creation of a common legal framework, the pursuit of a common economic policy and the coordination of foreign relations between Russia and Belarus. However, due to various political and economic problems, progress towards full integration has been slow. It is time to rectify this."
 SOV_the_house_of_cards: "Russian House of Cards"
 SOV_the_house_of_cards_desc: "\n\n\n\n\n£GFX_SOV_russian_house_of_cards_banner\n\n\n\n\n\n\n\nEver since §YVladimir Putin's§! accession to power, Russian political sphere became a multi-layered mechanism with many deterrences, deals, and personal connections, some call it "Towers of Kremlin". However, despite the seemingly unified facade, hides a opportunity for political groups to extend their influence, and loopholes to undermine this machine.\n§YPresidential Administration§!, of course, will do its best to curtail such acts of self-will.\n\nWe are currently supporting: [get_election_choice]\n\n\n\n[SOV_election_time_loc]\n\n\n\n\n\n\n---------------------\nStrength of §6Liberal Opposition§!£GFX_RF_logo  : §R[?SOV_election_approval_rating_nav_var|-1%]§!\n(£GFX_pol_power [?SOV_liberal_opposition_dynamic_dynamic_var|=+2%], £GFX_war_support_texticon [?SOV_liberal_opposition_dynamic_dynamic_var|=+2%])\n"
 SOV_modernization_programme_category: "The Russian Economy"
 SOV_modernization_programme_category_desc: "\n\n\n£GFX_russian_economy_background\n\n\n\n\n§GThe Russian Economy§! is a complex system consisting of many industries and sectors. Since the early 2000s, the state has been actively using state corporations and other government mechanisms to manage the economy. At the same time, private initiative also plays an important role, and businesses generally operate freely.\n\nAlthough £GFX_Gazprom_logo §YThe Oligarchs§! have stopped directing the processes in the country, they still have influence in the economy and can help us, although not without benefit for themselves. [SOV_oligarchs_gui]"
 SOV_NATO_war_category: "War with NATO"
 SOV_NATO_war_category_desc: "\n\n\n\n\n£GFX_SOV_NATO_war_category\n\n\n\n\n\n\n\nWar with western Europe is innevitable. Our goals for European dominance are hampered by the existance of NATO .\n\nThis war, like all wars, §Rmust end eventually§! and we must do so before we are defeated or our people can bare it no longer. The general staff has advised against an invasion in the §YSpring§!... But, if it is the most opportune moment, then we shall strike!. In order for our victory to be absolute, we must hold §YWARSAW§! §RAND§! §YBUDAPEST§!. Nations that we conquer from §CNATO§! will be §Gintegrated§! into our nation upon our victory.\n\n\n§RPRIMARY TARGETS§! :\n\n§YWARSAW§! : [GLOBAL.get_warsaw_status]\n§YBUDAPEST§! : [GLOBAL.get_budapest_status]\n§YKIEV§! : [GLOBAL.get_kiev_status]\n\n§RSECONDARY TARGETS§! :\n\n§YVILNIUS§! : [GLOBAL.get_vilnius_status]\n§YBUCHAREST§! : [GLOBAL.get_bucharest_status]\n§YODESSA§! : [GLOBAL.get_odessa_status]\n§YRIGA§! : [GLOBAL.get_riga_status]\n§YKRAKOW§! : [GLOBAL.get_krakow_status]\n\n§GALLIED CITIES§! :\n\n§YMINSK§! : [GLOBAL.get_minsk_status]\n§YDONETSK§! : [GLOBAL.get_donetsk_status]\n§YROSTOV§! : [GLOBAL.get_rostov_status]\n§YSEVASTOPOL§! : [GLOBAL.get_sevastopol_status]\n§YKALININGRAD§! : [GLOBAL.get_kaliningrad_status]"
 SOV_politburo_category: "Supreme Soviet"
 SOV_politburo_category_desc: "\n\n\n\n\n£GFX_SOV_politburo_banner\n\n\n\n\n\n\n\n§YThe Supreme Soviet§! is the supreme body of state power in our country.\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n"

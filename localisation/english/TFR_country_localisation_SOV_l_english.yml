 launch_a_cprf_campaign: "£SOV_propaganda_text_icon Campaign for §RCPRF§!"
 launch_a_cprf_campaign_desc: "\n\n\n\n\n£GFX_SOV_CPRF_banner\n\n\n\n\n\nCPRF is a champion of Russian working class, second biggest party in Russian Duma, who persistently fights against oligarchic rule and poverty, for workers' rights, and, of course, eventual restoration of Soviet Motherland. While many 'non-system' communists yell out "Revisionism!", it is those marxists who left Russian workers to rot, while they sit comfortably waiting for revolution to just appear. CPRF did not, they accepted Parliament Politics only to have wider audience and platform for agitation and reform.\n With Communist sentiment is still strong in Russia, number two can become number one."
 launch_a_ldpr_campaign: "£SOV_propaganda_text_icon Campaign for §8LDPR§!"
 launch_a_ldpr_campaign_desc: "\n\n\n\n\n£GFX_SOV_LDPR_banner\n\n\n\n\n\nLDPR takes pride in being the first party to be formed in Soviet Union after CPSU fell begun to fall. Third biggest party in Duma, Led by Charismatic Showman - Vladimir Zhirinovsky, party, despite its name, gathered around support of not only small business, but nationalists and monarchists, and other revanchists. Anti-Communist to the core, and pushing hardline on migration and oligarchs, they have loyal voting base, and means to expand it. If anything happens, LDPR will be first to jump to the most radical option. Zhirinovsky wants to see Russia restore its National Pride, and he will do anything to see it."
 launch_a_liberal_campaign: "£SOV_propaganda_text_icon Campaign for §GLiberals§!"
 launch_a_liberal_campaign_desc: "Я тебя ебал гадить нас срать так. Я тега егал могол срать на нас говда. Я тега егад могол сдат над мого. Я тега ега мого така мого. я тага мого така водо мога. я тега пото мога подо роды мого пира тора. я мого тара... ... via moby_54_msk. Здравствуйте Мартин Алексеевич! Я тебя ебал гад срать на нас говна. Я тебя ебал гадить нас срать так. Я тега егал могол срать на нас говда. Я тега егад могол сдат над мого. Я тега ега мого така мого. я тага мого така водо мога. я тега пото мога подо роды мого пира тора. я мого тара пото раво года мого мара мира бора пото доро нора това кара его хора пото шоря часа вода пото мира его ура поты жора пото мира его шоры вадо ига пото дора пото боры вадо году щора пото его."
 launch_a_ur_campaign: "£SOV_propaganda_text_icon Campaign for §CUnited Russia§!"
 launch_a_ur_campaign_desc: "\n\n\n\n\n£GFX_SOV_UR_banner\n\n\n\n\n\nUnited Russia is a political hegemon of Russia, being in power for decades. Despite the voices of detractors that claim 'political righteous', majority of Russians still choose UR for two main points - for stability, and steady march forward. Unlike its main political rivals United Russia doesn't strive to revive USSR or Empire, for them Federation is what's Russia now, and will continue to be like, chasing ghosts of the past can only lead to ruin. UR's main political goals are Sovereignty in all spheres of life in Russia, and push for the Multipolar World."

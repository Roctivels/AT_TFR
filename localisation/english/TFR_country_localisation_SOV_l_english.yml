 SOV_Russian_Orthodox_Church: "Russian Orthodox Church"
 SOV_Russian_Orthodox_Church_desc: "\n\n\n\n£GFX_SOV_russian_orthodox_church\n\n\n\n\n\nFor more than a thousand years, Orthodox Christianity was the dominant religion in Russia, from the late era of the Kievan Rus, to the days of the Tsar. Undeniably, our people were extremely religious, especially those in the countryside, and despite the Soviet Union's best efforts to promote State Atheism, they still are. As such the Russian Orthodox Church is one of the most powerful political weapons president Putin has by his side. While the church makes sure to exert the president's influence all over Russia's elderly population and the rural areas of our Federation, it can also be used to discredit any forms of opposition, or any movements that may affect out own culture negatively, such as the LGBT movement. In return, we have made sure to recognize Russian Orthodoxy as the de-facto major religious group in Russia, and restrict other christian groups from growing. As such we can rest assured that the clergy will remain by our side, and that our citizens have something to bother themselves with, other than the constant setbacks of our government."

 SOV_return_of_rne: "Return of RNE"
 SOV_return_of_rne_desc: "\n\n\n\n\n£GFX_SOV_rne\n\n\n\n\nRussian National Unity was one of the first ultra-right structures after the collapse of the USSR. They have long lost their influence, but their personnel and experience among right-wing organizations, with proper funding, can help us strengthen our state, although because of their radicalism, even many "Hawks" oppose a deal with them."

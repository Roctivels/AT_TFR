 russia.307.d: ""
 russia.307.a: "Contact the Novorossiyans"
 russia.308.t: "Novorossiya Requests Intervention"
 russia.308.d: ""
 russia.308.a: "The Denazification of Ukraine Starts Today!"
 russia.308.b: "The Suffering of Our Novorossiyan Brothers Starts Today!"
 russia.308.c: "The Glory of Russia Will Be Reclaimed Today!"
 russia.309.t: "American Refugee Point Established in Kamchatsky"
 russia.309.d: "The "American dream" is now more like an "American nightmare." The American government's flirtations with political radicalism and globalist liberalism have led to the fact that America is now a bloody battlefield between the federal government, separatist movements, communist rebels and far-right militias. The largest megacities - New York, Chicago, Los Angeles - have become an arena of street fighting, where civilians are caught between a rock and an anvil.\n\nBut what's interesting is that our diplomats and intelligence are reporting a massive exodus of the population. Thousands of desperate Americans are fleeing to the ports of the Far East, trying by any means to leave the country engulfed in flames. Reports are particularly alarming about the approach to our main ports - Vladivostok, Petropavlovsk-Kamchatsky, Magadan - of a whole flotilla of overcrowded civilian vessels and even warships carrying not only refugees, but also deserters, political activists and militants of warring factions.\n\nMany of the refugees chose Russia as a place of temporary residence for future relocation to Europe or Asia, but there were also those who had already applied for Russian citizenship in the hope of escaping future storms on the Russian "ark" of stability and prosperity. One way or another, the fate of all these people now rests on the shoulders of the Russian government."
 russia.309.a: "Well do what we can for them"
 russia.310.t: "Novikov Purges Politburo"
 russia.310.d: ""
 russia.310.a: "We Must Safeguard Party's Control."
 russia.311.t: "Discrimination against Russian minority in Baltics"
 russia.311.d: ""
 russia.311.a: "Those responsible will pay"
 russia.312.t: "The Ukrainian Resistance"
 russia.312.d: "If one thinks that the Banderites have been defeated after out victory over NATO is a fool. The men who bled for their ideology did not disappear, and they will not let the fall of their government stop them from their fight against us.\n\nThe "Ukrainian Resistance" was recently formed from Banderites and soldiers of the previous regime. While as of now they are limited in street fighting law enforcement and counter protesters, if the Ukrainian government cannot contain it it might turn into an open armed resistance.\n\nWe remember how the EuroMaidan went. While phrases like "Moscals on the Pikes" have gotten stale, we cannot forget that large fires can start from a single spark. We cannot let the repeat of the Odessa Union Building, where our brave patriots were burned alive by similar mobs. We must end this, and end this now."
 russia.312.a: "Terrorists show their faces once again."
 russia.313.t: "The Nationwide Protests in Ukraine"
 russia.313.d: "Thanks to the "amazing" managing of the crisis by our authorities, the anti-Russian movement is now set on repeating the EuroMaidan.\n\nGreat. We will have to get more forces and manpower to combat this issue, and it seems reconciliation will have to wait for a long time.\n\nStill, it is a shame. These protests have become widespread, and the Ukrainian government cannot respond to it in any good capacity.\n\nJust like the last Euromaidan, huh. When Yanukovich let pro-Russian protesters die, when he hightailed it to our borders instead of staying in Ukraine to fight back. Idiotism and stupidity has once again caused Russian blood to spill."
 russia.313.a: "Damn."
 russia.314.t: "The End of the Protests"
 russia.314.d: "Thankfully we have managed to stamp these protests down.\n\nArresting the organizers and suppressing their gatherings has done wonders and now the Ukrainian Government is secure in their position. Just as the red army stamped out the Banderites after their victory, so did we.\n\nYet it is not the time to stay idle. Ukraine still has a ton of war veterans from the opposing side who might join similar movements, and it is our job to prevent it. They must be reintegrated into society, yet not to the extent Kruschev did with the UPA pardons.\n\nIn any case, it seems, for now, that the struggle is over. The decade of bad blood has come to an end, and Ukraine steps into the future alongside us just as we had done all the past centuries. Time will mend all wounds, we will make sure of it. \n\n"
 russia.314.a: "Finally..."
 russia.315.t: "The Fate of Shoigu"
 russia.315.d: "One of the main faces of the Putin Regime is Shoigu, the Minister of Defense and former fireman, who has done nothing about our decaying army after Serdyukov's forced reforms. He was backed by Yeltsin in his October 1993 coup, after which Shoigu's career took off. This man is an ordinary advertising man and career climber, but not a military man... But that doesn't mean he doesn't have skills we can't use. What is his place in the new Soviet Russia?"
 russia.315.a: "He might still come in handy..."
 russia.315.b: "To be demoted, to be deprived of all awards, to be imprisoned."
 russia.315.c: "That's not enough! A massive purge is necessary."
 russia.316.t: "The Fate of the Yeltsin Center"
 russia.316.d: "One of the most shameful periods of Russian history is the Yeltsin years of the 1990s, and nothing emphasizes this more than the damned Yeltsin Center, located in the so-called "liberal capital" of Ekaterinburg. Many patriots want it gone, and we are willing to go along with it. Maybe the destruction of the Yeltsin Center would be a great symbol of Russia entering a new era...\n\nBut is it worth it?\n\nMaybe we shouldn't destroy this expensive complex, but instead turn it into the Museum of Crimes of Capitalist Russia? That way we can permanently memorialize all of the 30 years of suffering that Russia has endured."
 russia.316.a: "Tear it down!"
 russia.316.b: "The Museum of Crimes in Capitalist Russia? Sounds interesting..."
 russia.317.t: "Same-sex marriage in Russia?"
 russia.317.d: "The history of same-sex relationships in Russia is long and complicated. In the early years of the Soviet Union, their tolerance was born, but over time it gradually decreased. Under Vladimir Putin, same-sex marriages became legal in many countries around the world, but in Russia they still remained illegal. After the Communists came to power, this issue was raised again, and after the recent repeal of all blasphemy laws, the debate reached its peak. At a recent "Direct Line" with Russian President Valery Rashkin, he was asked about the legalization of same-sex marriage in Russia.\n- Valery Fedorovich, good afternoon, I am an activist of "Russia of the Future", and we have a very important question for you.\n- Good afternoon.\n- Valery Fedorovich, what's going on with same-sex marriages? This issue is being raised more and more often, and we would like to know if they will be legalized. Do you discuss this in the party?\n- Listen, in your opinion, are people of non-traditional orientation being persecuted in our country now? Do we restrict their rights in any way? All repressive laws have been repealed, what more do you want?\n- Legalization... same-sex marriages...\n- OK, then tell me at least one socialist country where they are allowed.\n- In Cuba... Same-sex marriage is allowed in Cuba.\n - Did you know that a referendum on its legalization was held there? Well, if we had a referendum, would you mind?"
 russia.317.a: "- Yes, quite. Thanks for the reply."
 russia.318.t: "The Result of the Referendum"
 russia.318.d: "The people met Rashkin's decision to hold a referendum ambiguously: while the fighters for traditional values insisted that the very fact of holding a referendum was another blow to Russia, radical LGBTQ+ activists talked about same-sex marriage as an inalienable human right, and that they should be resolved without any referendums.In the end, the referendum was held peacefully and without almost any incidents.\nResult: 84.57% against and 15.42% for. \nSame-sex marriages remain banned in Russia."
 russia.318.a: ""You will get married in your mental hospital!""
 russia.319.t: "Formation of "New Russia""
 russia.319.d: "After the manifesto of the newly formed "People's Russia", the "New People" Party began to take steps to fit into the new mechanism of Russian politics. Having gathered liberals ready to work with the state, the "New People" Party announced its own manifesto "New Russia" and the formation of New Russia as a new party in response to the People's Russia, manifesto defined the goals of the party and the plans for the new Russia. The first meeting elected the party leader: Alexander Nechayev."
 russia.319.a: "What? I didn't expect this."

 russia.83.t: "Chemical Attack in Obukhiv"
 russia.83.d: "Ground forces around Kiev have reported the horrifying use of chemical weapons in the town of Obukhiv. The attack occurred in the early morning during a skirmish around the town, it's possible the attack was carried out by Ukrainian forces to halt our advance from Kiev. Several dozen civilians were killed as well as numerous Ukrainian and Russian forces. News outlets have already begun reporting the attack and blaming our forces for this horrendous crime, the United Nations has also called for a ceasefire to investigate the area..."
 russia.83.a: "An abhorrent violation of geneva!"

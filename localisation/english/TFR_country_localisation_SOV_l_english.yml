#right-path medvedev focus
 SOV_history_continues_medvedev: "History Continues!"
 SOV_history_continues_medvedev_desc: "This victory became eloquent proof for Russia that the old world order had finally outlived its usefulness, giving way to a new, sovereign order. This victory opened a new page in the country's history, full of opportunities for large-scale revival. During this most difficult period, Dmitry Medvedev proved himself to be an impeccable leader.\nHe led the country through the most severe test in its modern history, demonstrating iron will and wisdom. That is why he, with his invaluable experience and the trust of the people, will continue to lead Russia forward, overcoming any obstacles on the path to strengthening its sovereignty and the prosperity of its citizens."
 SOV_harness_peoples_front: "Harness People's Front"
 SOV_harness_peoples_front_desc: "The ONF has proven its effectiveness as an effective tool for managing and consolidating civil society. In this regard, its further integration into the overall political line defined by the president would be a logical and strategically sound step. This task was set by Dmitry Medvedev during the period of structural reforms in the government, and today it is becoming particularly relevant.\nActing as a unified and coordinated mechanism, the People's Front will become a key driving force propelling Russia forward in accordance with the clear and far-sighted course set by the national leader."
 SOV_improve_social_nets: "Improve Safety Nets"
 SOV_improve_social_nets_desc: "Since the days of the USSR, Russia has had a powerful social support system for its population, which has not only been preserved but also consistently improved under Vladimir Putin's patronage. For a long time, this system was a heavy burden on the budget, which depended on oil and gas revenues, making it vulnerable.\nNow that our economy has strengthened and undergone serious structural changes for the better, we can not only maintain our social commitments, but also boldly invest in their development.\nThis is a historic turning point: today we can lay the foundation for a welfare state that will be strong not because of gas, but despite any external pressure, relying on our own industrial and human potential."
 SOV_strengthen_immigration_control: "Strengthen Immigration Control"
 SOV_strengthen_immigration_control_desc: "Previously, when our country was subject to sanctions and there was a shortage of workers, the influx of migrants from neighbouring countries was a necessary measure. It was a necessary support for the economy.\nBut times have changed. Today, this support is more of a hindrance than a help. It is time to clear the way for our own specialists, protect our labour market and give the talented people of Russia's multinational population the opportunity to flourish. That is why we are closing the simplified entry programmes. We are capable of building our own future with our own efforts.\nWe invite citizens of other countries to direct their resources towards the development of their own countries. This is the key to our mutual success."
 SOV_subdue_onf_members: "Meritocratic Governance"
 SOV_subdue_onf_members_desc: "Those who are truly capable should be in charge. This idea, as simple as truth itself, remains elusive to many for some reason. But for Russia, it will become a fundamental principle.\nThe ONF's administrative policy will be based on a strict meritocratic approach. Key local positions will be filled not by "crony appointees" but by people who have already proven their effectiveness through deeds, not words. This will create a social ladder that lifts people up not through connections or pedigree, but through real merit and competence.\nRussia is a country where opportunities are open to those who deserve them. It is precisely in this way, through the triumph of professionalism, that a strong and just Russia will be built."
 SOV_promote_russian_multiethnicity: "Promote Social Justice"
 SOV_promote_russian_multiethnicity_desc: "Russia inherited strong institutions from the Soviet Union that protect the rights of workers and ordinary people. These time-tested mechanisms, such as affordable healthcare and universal education, continue to serve the people well to this day.\nIt would be not only strange, but a profound mistake to abandon this proven legacy. After all, it is on this basis that a true welfare state is built, for which caring for citizens is not just words, but a real priority.\nThis pursuit of justice is expressed in real actions: in the protection of workers' rights, in support for mothers and children, in assistance to those who find themselves in difficult life situations. This is the very foundation of a strong social contract, in which the strength of the state is measured by the well-being of its people."
 SOV_support_political_integralism: "Support Political Integralism"
 SOV_support_political_integralism_desc: "Russia's historical path is complex and multifaceted — it includes pages that still make our hearts ache today, and entire eras where changes in power came at an exorbitant price, claiming countless lives. However, our task is not to divide the past into black and white, not to take a narrow position, but to respectfully find valuable lessons in each of the political systems.\nThe imperial flag, the Soviet banner and the modern tricolour are not mutually exclusive symbols, but different facets of a single, continuous national destiny. Each era has contributed to the formation of Russian statehood, each has left us a unique legacy — strong institutions, cultural achievements, scientific discoveries, and that very "toughness" that has allowed the country to withstand the most severe trials."
 SOV_enshrine_stateforming_people: "Enshrine State-Forming People"
 SOV_enshrine_stateforming_people_desc: "Russia is a unique civilisation, shaped by a wide variety of peoples and cultures. Their mutual respect and centuries-long cooperation are our fundamental values and source of strength. At the same time, we acknowledge with deep respect and gratitude the historical role of the Russian people as the core of the state. It is Russian culture, will and labour that have held together vast territories over the centuries, creating the unique spiritual space that we all call home today.\nRussian national identity should not be dissolved or opposed to others, but, on the contrary, should remain the core around which the diversity of the entire Russian nation is built. To be Russian in Russia means to bear special responsibility for the fate of the country and to be a link between all its peoples."
 SOV_nationalist_autocracy: "Nationalist Autocracy"
 SOV_nationalist_autocracy_desc: "Throughout Russia's long history, power has largely been based on the principle of strong leadership, with the people, and above all the Russian people who formed the state, seeing their leader as their main protector. This model of governance has proven its effectiveness time and again – one need only look at our country's great victories and achievements.\nIn modern conditions, the president can act as a national leader. He is capable of consolidating the will of the people and, drawing on our history and traditions, confidently leading Russia forward to new achievements, defending its path and interests on the world stage."
 SOV_social_authoritarianism: "Social Authoritarianism"
 SOV_social_authoritarianism_desc: "Strong state power does not in itself imply nationalism or any similar ideology. Its effectiveness may have a completely different basis – a social one. A striking example of this is the legacy of the Soviet era, which left deeply respected principles in the popular memory: confidence in the future, access to education and healthcare, and the priority of labour.\nThe state does not simply proclaim social protection, justice and stability, but actually provides them, guaranteed by the president, and it is for this that he enjoys broad popular support. Such a "social contract" — where the authorities care for the people and the people trust the authorities — is the guarantee of our country's strength and sovereignty."
 SOV_executive_paternalism: "Executive Paternalism"
 SOV_executive_paternalism_desc: "Strong executive power has historically been a guarantee of stability and a key factor in Russia's prosperity. Under both Vladimir Putin and Dmitry Medvedev, the president has been a key figure whose personal initiative and strategic vision have set the course and forced the complex mechanism of state governance to work smoothly and effectively.\nThis approach ensures a rapid response to challenges and consistency, allowing citizens to feel confident about the future, trusting in the experience and will of their leader."
 SOV_enrich_putinist_tenets: "Enrich Putinist Tenets"
 SOV_enrich_putinist_tenets_desc: "In recent years, Putinism has grown beyond the scope of mere political ideology, becoming a special type of state thinking and a doctrine that determines Russia's future.\nIn order to continue to be guided by Vladimir Putin's views, it is necessary to formalise this doctrine into a coherent and comprehensible system. It is necessary not only to preserve its key ideas, but also to fill them with new content — to develop and supplement them with theses that will respond to the challenges of the present and set the course for the future. This will allow us to maintain continuity, ensuring its relevance for new generations in new conditions."
 SOV_stronghold_of_law_and_order: "Stronghold Of Law And Order"
 SOV_stronghold_of_law_and_order_desc: "Stability and order have always been fundamental values for Russian society. The state sees its primary task as ensuring that these values are preserved at all costs.\nOf course, it may sometimes seem that the authorities exercise excessive control. However, it is important to understand that this system is designed not to restrict, but to protect. In today's world, new challenges and threats are constantly emerging, and it is our law enforcement agencies that are always on the front line, quickly resolving any issues. Their work ensures that life in the country remains safe and predictable for all citizens."
 SOV_embrace_eurasian_heritage: "Embrace Eurasian Heritage"
 SOV_embrace_eurasian_heritage_desc: "There is a widespread but mistaken belief that Russia belongs inextricably to the European cultural group. This is a profound misconception. Undoubtedly, our peoples are linked by a long history of relations, and a certain cultural influence is inevitable. However, it is a fundamental mistake not to see the main point behind this: Russia has developed as a unique and completely sovereign cultural space.\nOur civilisation is a fusion of the heritage of many peoples, our own spirituality, a special model of society and our own view of the world, which differs from that of the West. This does not mean that we are closing ourselves off from dialogue, but we conduct it from a position of strength and equality, rather than following foreign models. Therefore, statements about our "European essence" often simply do not correspond to the scale and uniqueness of Russian culture and should not be taken seriously."
 SOV_glorify_pan_russian_patriotism: "Glorify Pan-Russian Patriotism"
 SOV_glorify_pan_russian_patriotism_desc: "In these difficult times, the Russian people must unite under the banner of all-Russian patriotism. Our task is to help them do this, using all available means: from festivals and lessons in schools to large-scale information campaigns.\nAnd we must not forget our main strength: the people of Russia are diverse and varied, but in their basic values, in their desire for a strong and sovereign country, they are united and unshakeable."
 SOV_reinforce_presidential_administration: "Reinforce Presidental Administration"
 SOV_reinforce_presidential_administration_desc: "No one doubts that the president has the final say in matters of state governance. In this situation, it seems logical to strengthen the position of the key body that represents his will — the Presidential Administration.\nGiving the Presidential Administration broader coordination and supervisory functions will make it possible to build a more coherent and coordinated work of the entire state apparatus. This is not a question of centralisation for centralisation's sake, but of ensuring the effectiveness, consistency and unconditional implementation of the course set by the national leader. This approach guarantees that every state structure works as a single mechanism to achieve national goals."
 SOV_russia_everlasting_era: "The Everlasting Era"
 SOV_russia_everlasting_era_desc: "Десять лет усердий, десять лет исканий\nДесять лет труда без покоя, без сна\nДесять лет безумья, десять лет напастей\nДесять лет невзгод, день как месяц, месяц как год\n\nДесять лет добычи, десять лет плавленья\nВ десять тысяч тонн!\nДесять лет указов, десять лет правления\nДесять лет реформ!"
 #right-path Nadezhdin
 SOV_new_history: "Start of New History"
 SOV_new_history_desc: "Boris Nadezhdin is a true chameleon of modern Russian politics. He has tried to run for office from many different parties: "Just Russia", "Civil Initiative", "Party of Growth" and "United Russia" - but regardless of the party, he has always been a systemic liberal and spoke about the need to reform the Russian state.\n\nThese are probably the reasons why he managed to get the main position in the Russian Federation - the post of president. And Nadezhdin will do everything to implement his promises of liberalization and social justice, his vision of a New Russia.\n\nThe Putin story is slowly transforming into a new, reformed, liberal one."
 SOV_popularize_front: "Popularize the Front"
 SOV_popularize_front_desc: "Despite its name, the All-Russian People's Front is not a reflection of the opinion of the Russian people, but merely a projection of the will of United Russia. Political statements instead of deeds, populism and oligarch lobbying - these things have haunted the All-Russian People's Front since its inception. Our task is to give young and promising figures who reflect the mood of the people full carte blanche to run the Front. Nadezhdin is not a leader of stiff-necked old bureaucrats, but of passionate and purposeful boys and girls who are ready to change Russia for the better!"
 SOV_comprehensive_political_integration: "All-Encompassing Political Integration"
 SOV_comprehensive_political_integration_desc: "Outside of official Russian politics, there are countless opinion leaders who influence popular sentiment. Often these people are labeled "scum of the West" and "on the payroll of Brussels," imprisoned and persecuted in every possible way. But now that Nadezhdin and his team are at the top of the Russian government, the attitude toward the opposition has changed. Instead of hostility, the course of cooperation and integration of the young into the political life of our homeland has been chosen. After all, we all have a common goal - a free and strong Russia!"
 SOV_establish_full_pluralism: "Establish Full Pluralism"
 SOV_establish_full_pluralism_desc: "The ONF was Medvedev's attempt to change Putin's system by bringing all possible political forces under his banner: from radical communists to nationalists, from liberals to conservatives. In fact, it turned out that even the illusion of political struggle and competition was destroyed in the country, and all the mainstream parties joined the Front. Only the Russian people will decide whom to follow!"
 SOV_defeat_political_apathy: "Defeat Political Apathy"
 SOV_defeat_political_apathy_desc: "One of the main problems of political development in Russia is undoubtedly the political apathy of our country's citizens, their unwillingness to participate in political life. Under Putin and Medvedev, this fact was considered a plus - the less people were involved in political processes, the better it would be for the authorities: the possibility of instability would be reduced.\n\nFor the new Nadezhdin Russia, political apathy is an inherited vice. In order for our reforms not to be wasted, it must be treated: polls, encouragement of social and political activity, promotion of the young - work with the population must show that the Russian people themselves, not the government, determine their own fate!"
 SOV_concept_moderate_center: "The Concept of Moderate Center"
 SOV_concept_moderate_center_desc: "We do not have to completely destroy Medvedev's legacy in the form of the ONF. Like many other things in Putin's system, the Front must be reformed if it is to work perfectly. Reformed into a force that will be able to represent the interests of the people, not the interests of bureaucrats.\n\nTo this end, the concept of a "Moderate Center" has been created - the eradication of various radicals from both the left and the right of the ONF; all those who could pose a threat to Russian democracy."
 SOV_reform_institutions_power: "Reform the Institutions of Power"
 SOV_reform_institutions_power_desc: "The Russian government machine has been in operation for a long time, but over time it is beginning to break down and its faults are becoming apparent. The system suffers from extreme bureaucratization and sluggishness, and the population is tormented by its injustice.\n\nIt is necessary to drain this swamp: retire the inefficient, promote the young and talented, remove dozens of meaningless and similar structures, strengthen the digitalization of state institutions, and restore people's trust in the government. The state should work for the people, not the people for the state!"
 SOV_enact_new_front_framework: "Enact New Framework of People's Front"
 SOV_enact_new_front_framework_desc: "Now that all kinds of radicals have been cut off from the levers of our country's governance, we can outline a new framework for the Popular Front. It will include purely democratic forces: from social democrats to conservatives. They may differ in their views, but the ONF's goals must be unified: serving the people, protecting their interests and Russian democracy. In fact, it is a centrist coalition that will have one of the leading positions in Russian politics."
 SOV_fill_front_with_loyal_reformers: "Fill Front With Loyal Reformers"
 SOV_fill_front_with_loyal_reformers_desc: "At the moment, the ONF is a collection of conservative politicians from the Medvedev era who are actively putting sticks in the wheels of the new Nadezhdin government. In this regard, in order to ensure the stability of the new government, the Front must be liberalized by replacing old cadres with new ones loyal to Nadezhdin and his ideas. Such an update will help neutralize internal resistance and accelerate the implementation of necessary reforms."
 SOV_nadezhdin_new_vertical: "Nadezhdin's New Vertical"
 SOV_nadezhdin_new_vertical_desc: "The old government apparatus is completely unsuitable for continuing liberal reforms. The current management system is too closely linked to the conservative elements of the ONF, whose representatives are unlikely to be happy to support the initiatives of the new government. Therefore, according to Nadezhdin's plan, the existing vertical of power should be completely dismantled: all stagnant and outdated elements should be removed, and a new generation of managers will finally have the opportunity to realize themselves. After all, Nadezhdin knows that reforms do not begin with laws and pieces of paper, but with the replacement of those who implement them."
 SOV_full_liberalization: "Total Liberalization"
 SOV_full_liberalization_desc: "The Government's next initiative should be an uncompromising liberalization of public policy. The provision of civil liberties, the expansion of anti-corruption measures, the protection of the interests of the people and many other initiatives will be brought to the fore.\nThese steps are designed to ensure public confidence in the government and create a solid foundation for further development. The Nadezhdin government intends to demonstrate that the new policy is not empty promises, but real changes."
 SOV_secure_presidential_republic: "Secure the Presidential Republic"
 SOV_secure_presidential_republic_desc: "History has repeatedly shown that Russian democracy achieves stability and the necessary effectiveness only with expanded presidential powers. There should be a clear separation of powers: parliament is the legislative branch, the President is the executive branch, and nothing else.\nThis approach allows us to avoid managerial chaos and maintain a unified order of responsibility. In the context of active reforms, it is a strong presidential government that can ensure decisiveness in making key decisions."
 SOV_strengthen_local_self_government: "Strengthen Local Self-Government"
 SOV_strengthen_local_self_government_desc: "In the modern world, democratic institutions must be present not only at the national level, but also at the local level. People should be able to influence decisions about their daily lives through local governments."
 SOV_full_transparency_elections: "Full Electoral Transparency"
 SOV_full_transparency_elections_desc: "One of the first steps that Nadezhdin intends to take is a fundamental reform of the electoral process based on the principles of full transparency and honesty. All elections in the country, from municipal to federal, must be held openly, under public control and without fraud. After all, Nadezhdin does not have the slightest reason to hide anything from the people of Russia, since it is the people who are the source of power."
 SOV_social_justice: "Social Justice"
 SOV_social_justice_desc: "One of the priorities of the Nadezhdin government will be the development of a reliable state social security program. Every citizen should be guaranteed a decent pension, every needy person should receive the necessary benefits, and every family should receive stable financial support.\nThe new Government's social policy will be based on the principles of fairness, universality and transparency. The main goal is to provide people with confidence in the future and to show the people that the state really cares about their problems."
 SOV_independent_justice: "Independent Judicial System"
 SOV_independent_justice_desc: "In the context of ongoing democratization, the creation of an independent judicial branch of government is a necessary step. The judicial system is one of the key institutions of the State, so it must be immediately reformed and liberalized along with other areas of government.\nNadezhdin's plan is to ensure a truly unbiased justice for the Russian people. Independent courts will become a guarantee for the protection of citizens' rights and an effective tool for controlling power. In such conditions, a real State governed by the rule of law will be formed."
 SOV_new_hope: "New Hope"
 SOV_new_hope_desc: "Этот город, не похожий ни на что вокруг\nУлыбается прохожий, и за пять минут\nПомогая человеку верить в чудеса\nРаспускаются фонтаны прямо в небеса\n\nЯ не знаю, где ещё на этом свете\nЕсть такая же весна\nЯ, пожалуй, отпущу попутный ветер\nИ останусь навсегда\nС тобою"

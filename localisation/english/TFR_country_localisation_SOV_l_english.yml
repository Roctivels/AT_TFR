 #Pre-Dugin Tree UR
 SOV_dire_times_emergency: "Dire Times Emergency"
 SOV_dire_times_emergency_desc: "Defeat in battle is not the greatest suffering for the Motherland. It is the despair and internal conflict that follow, threatening to drag Russia into ruin. In this critical moment, Sergey Shoigu, with military power in his hands, stands as Russia's potential savior - or as the man who could lead the country to total collapse in a single day. With the government leaderless and the Yedinaya Rossiya party fractured, all eyes are on Shoigu to see if he will follow in the footsteps of the State Committee for the State of Emergency and roll T-90 tanks into Moscow..."
 SOV_calm_the_population: "Calm The Population"
 SOV_calm_the_population_desc: "Despite the risk of scorn and harsh criticism, high government officials must step out of their offices and engage with the people on the streets. Before resorting to violence, this is the only viable option. With the former leader, Dmitry Medvedev, nowhere to be found, the interim government, barely held together by Shoigu, must do everything it can to manage this crisis. It's like forcing a newborn, who has just learned to walk, to run - except there's a hungry wolf chasing from behind."
 SOV_pledge_of_retribution: "Pledge Of Retribution"
 SOV_pledge_of_retribution_desc: "The Western world may believe they have broken Russia's spirit, thinking the defeated Russians will no longer have the courage or strength to stand against them. However, reality will soon prove them wrong. The deep-seated anger of millions will become our lifeline. By channeling this collective emotion, we aim to unite the people and build a common front against our enemies, especially as the government's credibility falters. We can only hope that this strategy will not only preserve the current government but also lay the groundwork for future revenge."
 SOV_spark_anti_occupation_resistance: "Spark Anti-Occupation Resistance"
 SOV_spark_anti_occupation_resistance_desc: "Since the Russian Civil War, no foreign army has set foot on Russian soil. Today, however, we face this humiliation once again. But the Russian people will not passively accept this. Those in the occupied regions will rise up and fiercely resist the new occupiers and imperialist forces. We will support secret resistance groups and armed factions by every means possible. NATO and Ukraine may keep accusing us of "Russian infiltration," but they will be powerless to stop it. Their flags - Polaris or blue-yellow - won't fly for long."
 SOV_national_front_for_salvation: "National Front For Salvation"
 SOV_national_front_for_salvation_desc: "The Russian Empire once had a group called the "National Front for Salvation," but it's unclear whether they were true patriots or simply Western cultural enthusiasts from the salons of Saint Petersburg. Now, however, Russia needs its strongest patriots to unite and secure the future of the Motherland. In the heart of the Russian State Duma, we will bring together opposing political factions to discuss the country's affairs, even though some extreme voices may try to infiltrate the conversation."
 SOV_voice_for_unheard: "A Voice For Unheard"
 SOV_voice_for_unheard_desc: "In the streets and alleys of Russia, a once-feared term is now quietly murmured: "Eurasianism," alongside the name of its founder, Alexander Dugin. Once seen as a dangerous figure, this controversial political scientist is now gaining increasing support among the suffering Russian people. As his ideas gain traction, we may soon face decisions that were once unthinkable - Dugin could soon walk the marble floors of the Kremlin as an invited guest."
 SOV_put_down_anti_russian_revolts: "Put Down Anti-Russian Revolts"
 SOV_put_down_anti_russian_revolts_desc: "From Saint Petersburg to Vladivostok, all of Russia is under attack. With the political leadership now in agreement, it's time to act decisively and restore order before things worsen. We will never allow the traitors of the Russian nation - those who strike when we are down - to trample on our dignity. The false banner of the "Legion 'Svoboda Rossii'" will never fly on Russian soil."
 SOV_form_guidance_council: "Form A Guidance Council"
 SOV_form_guidance_council_desc: "Building on the National Front for Salvation, we will establish a Guidance Council to take on the role of an interim government, bringing together all major political factions. This may be the first time since 2000 that the Yedinaya Rossiya party has agreed to share power. Within this council, a new collective leadership for Russia will emerge, once the situation stabilizes."
 SOV_time_for_new_management: "Time For New Management"
 SOV_time_for_new_management_desc: "The time has finally come: the Kremlin will welcome its first philosopher-ruler. What role will this bearded eccentric and his Eurasianism play in the future of Russia? Will the tensions in the country ease, or will they deepen, further dividing the Motherland and its people? What part will Shoigu, who brought Dugin into the heart of power, play? Will this general pull the strings behind the scenes, or will he soon be sidelined by the new power players? Or perhaps Dugin himself is simply a "transitional figure"? Despite the uncertainty, one thing is clear for all Russians - the clock that measures history has begun ticking."
 SOV_prepare_the_eurasianist_party: "Prepare The Eurasianist Party"
 SOV_prepare_the_eurasianist_party_desc: "The black and blue of our party colors reign supreme as it is time for our block to be instituted into the halls and corridors of power, the time of campaigning and spreading word of our theories are over. Our party officials are being trained and forewarned of their new coming governmental roles as administrator and leaders of a new coming Russia. Our theories will be not theories but policy and determinators of new government decisions."
 SOV_popularize_dugin_works: "Popularize Dugin's Works"
 SOV_popularize_dugin_works_desc: "After all the modern philosophers, be it Noam Chomsky or Slavoj Zizek, there is none so talented in the realm of geopolitical theory like Aleksandr Dugin. His works on The Fourth Political Theory have been paramount on the world stage and even more critical for Russia as a vehicle to move into a position of absolute power, something of such a genius caliber isn't just something for some niche and fringe political alternative - it shall be the public for all. The Eurasian civilization should be celebrated in the highest caliber possible and with the writing of Dugin being the shelves it will be much easier for us to find like minded Russians to flock to the Euriasianist ideological theory, less of theory and more of a reality, and it people will happy to usher in a new golden age for all of the Russian World to bask in. Let the books fly off the shelves and the rest of the plans Dugin has will come to fruition."
 SOV_philosopher_at_helm: "Philosopher At Helm"
 SOV_philosopher_at_helm_desc: "Dugin has done it, the impossible some might say, the greatest philosopher of our time, Aleksandr Dugin, has taken Russia by storm. By the miracle of destiny herself has led Dugin to the seat of power. It truly is a time to come together in such a joyful time, celebrate, drink, party, for the road forward will be tough and straining but nothing can break the Russian spirit. Our embolden eagle will fly high above the Western World and show the era as an era for The Russian World with all her pride and glory.\nNo more of the humiliation, the chastising calls from the west telling how to govern and dictate our own lives. Our people, our Russia, have realized the purpose as the ones to enact the true multipolar order of global politics. Down with the American moral degeneracy, down with the western ethics of democracy, with the hegemony of the Western order - all of it shall be stripped away from them. Leave them naked for the world to see their utter shame. Russia shall be free from this indecency and so shall the world."

 SOV_beautiful_russia_of_the_future_desc: "\n\n\n\n£GFX_SOV_beautiful_russia_of_the_future_banner\n\n\n\n\n\nIn the terminology of the Russian liberal opposition for many years there existed an image of "Beautiful Russia of the Future". The image was extremely vague and populist, each politician had his own ideal beautiful russia of the future, which they would definitely build in the distant bright future. Many years have passed, Russian Liberals have left the opposition and are now at the helm of the country, so it is time to build that very, "Beautiful Russia of the Future."" 

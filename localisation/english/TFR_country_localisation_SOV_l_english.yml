 russia.1548.a: "Evgeny Spitsyn!"
 russia.1548.b: "Rustem Vakhitov!"
 russia.1548.c: "Novikov remains..."
 russia.1549.t: "Join the Union!"
 russia.1549.d: "After the CPRF's victory in the election, the Russian system for protecting workers' rights gradually began to return to the Soviet model, and the formation of the All-Russian Central Council of Trade Unions (ACCTU) began. However, the principle of its implementation has yet to be determined. Two options are available.\n The first is to use the Federation of Independent Trade Unions, the successor to the old All-Russian Central Council of Trade Unions. The advantage of this option is that the FITUR has long been integrated into the state and corporate systems, which means that it will be easier and cheaper to restructure the trade union system.\n The second option is to form a network of independent trade unions based on the Confederation of Labor of Russia. This approach will require more funding than financing state trade unions, but it will ensure genuine protection of workers' rights and guarantee that no one is left without support."
 russia.1549.a: "Federation of Independent Trade Unions"
 russia.1549.b: "Confederation of Labor of Russia"
 russia.1550.t: "[SOV_adl_progress_name_loc] gains support of CLR!"
 russia.1550.d: "The Confederation of Labor of Russia is the largest association of independent trade unions, and the question of its support for any political party was decided today. [SOV_adl_progress_name_loc] took the initiative on this issue, and the trade unions supported them rather than the Communist Party, justifying this by "greater involvement in the struggle for workers' rights." Although not fatal, this is a fairly significant blow to the support of our government."
 russia.1550.a: "Dumbo Union Guys"
 russia.1551.t: "[SOV_peoples_front_name_loc] gains support of CLR!"
 russia.1551.d: "The Confederation of Labor of Russia is the largest association of independent trade unions, and the question of its support for any political party was decided today. [SOV_peoples_front_name_loc] took the initiative on this issue, and the trade unions supported them rather than the Communist Party, justifying this by "greater involvement in the struggle for workers' rights." Although not fatal, this is a fairly significant blow to the support of our government."
 russia.1551.a: "Dumbo Union Guys"
 russia.1552.t: "The Revolution of Artists"
 russia.1552.d: "Today, Berlin hosted one of the most anticipated cultural and political events of the year - "ADS - Cultural Internationale. Europe" Forum, which brought together intellectuals, artists, and philosophers from dozens of countries.\nThe central figure was Estonian writer and game designer Robert Kurvitz, author of Disco Elysium, a game that has become a manifesto of new post-socialist humanism. In his speech, he did not talk about politics directly. He spoke about memory, utopia, and class trauma, about how art should give people back the ability to dream, to dream of a better future:\n\n"Capitalism has taught us to be ashamed of dreams. But we must reclaim our right to dream. And if Europe does not dare to do so, others will."\n\nFor us in Russia, this event was particularly significant: Kurvitz openly stated that he is following the "new socialist project of the East," calling us "a living laboratory in which a new world can be born." Should we invite him to Russia? Creating conditions for some computer game developer to move to our country, who is not even particularly thinking about it, may seem like a silly idea, but is it really?"
 russia.1552.a: "Invite Kurvitz to Russia!"
 russia.1552.b: "Let's support the idea from afar..."

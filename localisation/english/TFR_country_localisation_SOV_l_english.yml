 #Dugin Focus
 SOV_how_did_this_happen: "Philosopher At Helm"
 SOV_how_did_this_happen_desc: "He had always known that the Atlantists would come and take it all. He had known this in the last decade of the USSR when the party elites started cozying up to them. As he fought against it during the 90s alongside the National Bolsheviks, the Yeltsinite forces had completely whored out to the faithless across the Atlantic.\nAs Putin purged half of the Yeltsinites and his successor was on track to defeat the Atlantists at their most vulnerable moment, he hoped that it would be enough. But it wasn't.\nNow, Sodom and Gomorrah have shed their disguise and carved Russia up for their benefit, both Patriots and Traitors alike playing to their tunes. This stops now.\nThe West mistakenly referred to him as 'President Putin's brain', but in reality, he is a voice of the unheard - millions who yearned for their nation's revival. Those who would tolerate any government as long as it restored their dignity and freed them from the Atlantist shackles.\nAnd now he stands at the top of the Kremlin, as Russia finally awakens."
 SOV_declare_eurasian_state: "Commence The Eurasian Revolution"
 SOV_declare_eurasian_state_desc: "Russia is a land of constant evolution. From an empire to a communist dictatorship to a capitalistic state, it has changed dramatically these past 100 years. Our country experienced death, struggle and damage unseen anywhere else. And at our darkest moment, where our lands were robbed and lives were taken, we shall revolt against the Atlantists. For we have not bled enough. Eurasianism will be the light that revives our people's wrath. We shall not stand idly as our state rots away, consumed by the Atlantist ever increasing moral self-destruction and indulgence.\nEurasia shall triumph where we previously could not. For we must slay the great Dragon and entrench our position as the Katechon of the world!"
 SOV_a_great_awakening: "A Great Awakening"
 SOV_a_great_awakening_desc: ""The Atlantists are blind to the troubles of the world. And in their ignorance they find comfort. Hope and indulgences are the rallying cry of the lazy. The excuses of the weak. And yet the path that lies before us is hard, and filled with the dangers as yet unimagined. If the world and its citizens are to make it through, it requires a people with unwavering resolve, a people tempered in the very fire of hardship. It requires the Eurasians. We have always been resilient people. We toil while others complain. We persevere while others give up. And when the evil stares us in the eye, we stare right back. That is who we are. Our fathers fought and died for the Eurasian civilization, and we can do no less." - Aleksandr Gelyevich Dugin, "The Great Awakening", page 7"
 SOV_a_million_voices_united: "A Million Voices, United"
 SOV_a_million_voices_united_desc: ""Sons and daughters of Eurasia, you are the embodiment of that glorious legacy, the inheritors of the victory that we fight for every day. You are fit to forge the future and the destiny of our humanity. Yet there are also many abroad who share our vision. Of a Unified Eurasia, free from Post-Modernist meddling. And besides them, there are other civilizations who wish for the same model. Panafricanists, Latin Americanists, Pan-Arab movements - all of them share a similar framework, one where civilizational spaces unite. We cannot rule the world or force our viewpoints like the vile Atlantists, yet we can lead by example. Show them that the Global Majority can stand up and defeat the Golden Billion. For it is our duty to free this world and bring the people freedom. And we will do it happily!" - Alexander Gelyevich Dugin, date unknown"
 SOV_revise_foundations_of_geopolitics: "Organic Democracy"
 SOV_revise_foundations_of_geopolitics_desc: "While the Atlantists have perverted the notion of democracy, it does not mean that the Katechon cannot retake it as its own.\nWe must establish the Eurasian parlament, one devoid of both Atlantist meddling, as well as over state grasp. The Eurasianist party for now will form the core of our government. Yet we will not deny other movements from their spotlight. Putinists, National Bolsheviks, Communists, Fascists - all of them could have a voice in our parliament (albeit some of their more radical ideas would not be voiced).\nHowever, our main goal is to ensure an organic transition of power. The populace will be able to participate in local elections freely, shifting the political landscape via constant evolution. We cannot stand idle and get rich off of empty promises like the Western Elites do.  We cannot repeat the mistakes of America for our dream to succeed.\nMillions of voices will now take the reins themselves, and Eurasia will prosper because of that!"
 SOV_purge_atlanticist_ideolouges: "Purge Atlanticist Ideolouges"
 SOV_purge_atlanticist_ideolouges_desc: ""And yet, there are some among our community who do not march with us. Voices raised in dissent and opposition. Soft minds that take the words of Europe for truth! To those who bear the seeds of rebellion in their hearts and question the way of Eurasia, I say this: Would you have us embrace the very thing that rejected us? Would you make us lay down our rifles and surrender our armor, stark naked before a force that wishes only death for us? Peace is something we all desire, but the Europeans would make it the peace of the grave! Shattering our nation's spirit and burning us to ashes! Beware the puppets amongst us, sons and daughters of Eurasia! Know them, and spite them! Give them no succor or shelter! If any one of you doubts the fidelity of another, be it neighbor, brother, parent, or child, speak! It is the sworn duty of my commissars to isolate and re-educate these misguided souls. To bring them back to our fold. Expunge their weakness for the greater good!" - Alexander Gelyevich Dugin, fragment of his National Unity day speech"
 SOV_the_eurasian_people_shall_bow_no_longer: "The Eurasian People Shall Bow No Longer!"
 SOV_the_eurasian_people_shall_bow_no_longer_desc: "It is time for us to finally face the Leviathan. As our war of rebellion draws near, we will have to deal with the breakaways of our great nation. Patriots, and traitors alike swarm in the occupied regions. We must negotiate with those who are willing to help our dreams, and destroy those who despise it. We will ignore the Atlantist's taunts and threats. All we have to do is do our job.\nAnd as we cut down the enemies of Eurasian unity, we will sing to the Almighty, for soon his angels will strike down at the serpent."
 SOV_stop_western_repayments: "Stop Western Repayments"
 SOV_stop_western_repayments_desc: "The Atlantist have tried to colonize us for as long as we have been at the top of global powers. And now, with the previous government signing reparation agreements, it almost succeeded. Eurasia will not see itself be whored out to the European bureaucrats. It will not repeat the 90s when the elites sold their dignity to play second fiddle to them while our people starved.\nEurasia will not stand such attempts. We have no need for threats, for we are not a bunch of charlatans who merely posture their views. It is time to be true to who we are."
 SOV_duginomics: "Duginomics"
 SOV_duginomics_desc: ""The Atlantists speak of the individual, they preach of the rights of every man. Of one man. Who is this person, and why is he more important than the rest? Why do the needs of the few come before the needs of the many? So I ask you this: How can this one man come to stand against this unified Eurasian nation? We are millions of voices, united in one. Regardless of wealth, regardless of ethnicity.\nSome of you would laugh at me when I say I would like to create a heaven on earth. And indeed, this Gestalt would probably be the hill I would never climb.\nYet, is this not what Eurasia deserves? A land where we are all united, wealthy and pure. Be it God, Allah or Buddha - we must all achieve a state of peace in our lives through their guidance.\nYes, this will require abandoning the rapid consumerism that has tainted our world with plastic and chemicals. Such childishness and useless junk will be thrown out. We must remember how to be content with less stimulation, less gluttony. Less... Atlantism..."\n- Aleksandr Gelyevich Dugin, "The Great Awakening", page 89"
 SOV_eurasian_armed_forces: "Eurasian Armed Forces"
 SOV_eurasian_armed_forces_desc: "Our military leaders were negligent, they failed themselves and they failed people of Eurasia. We should thank them, their gross misconduct almost costed us our home! But is given us a renewed sense of purpose, and tempered in the fires of adversity. Our will is forged anew."
 SOV_economic_reorganization: "Economic Reorganization"
 SOV_economic_reorganization_desc: "As we have embarked on our plans to revive the Russian industry, we must acknowledge that radical methods will be needed. It is time to revitalize ourselves and not repeat the same mistakes of the past. Using the best methods throughout our history, we must create the system of the Fourth Political Theory. One that benefits both Eurasia as a whole and the people who fight for it. This is the Logos we must adhere to. "Mudnus Eurasianus paradisus esse debet" - such is our Logos."
 SOV_subversive_rearmament: "Subversive Rearmament"
 SOV_subversive_rearmament_desc: "While our loss to NATO was a big blow to our military, most of our industry in the Urals remains. For our rebellion against Atlantism to succeed, we must rekindle the flames of our war machine. Thankfully the Sodomites are too focused on rebuilding and view us as nothing more than a "failed state" that will collapse in the coming decades.\nTightening control of information about our military capabilities will not ease the Atlantist's suspicions, but it will slow their reaction time and threat analysis.\nThe evil will view the Katechon as defeated and fragile right until the moment of the second coming."
 SOV_soviet_nostalgia: "Eurasian National-Bolshevism"
 SOV_soviet_nostalgia_desc: "National-Bolshevism has been intertwined with Eurasian idealism. Our Supreme Leader had been in fact one of the movement's founders before going his own way. National-Bolsheviks, while some-what distanced from Dugin and his movement, still saw a lot of overlap.\nWhile Eurasianists talked theory, the Nazbols have fought on the fields of the Donbass. They were the ones who, among other volunteers of different ideologies, defended the People's republics from Ukrainian regime. Even as Putin and his government disavowed the red banner, it still stayed loyal to Russia.\nAnd during the motherland's most drastic hour, they are ready to heed Dugin's call. For our fight against western imperialism has just begun!"
 SOV_a_new_eurasian_identity: "A New Eurasian Indentity"
 SOV_a_new_eurasian_identity_desc: "What IS Eurasia? This question can seem so simple, yet so hard to understand. While some, like National-Bolsheviks, believe that this is just a continuation of the Russian state, some perceive this as something more. Turanists, Gymulovists, Russian nationalists, even Putinists all debate each other endlessly. Yet we already have an answer.\nAlexander Dugin believes that Eurasia is the apotheosis of the Russian imperial model. Unlike the Atlantists, who trampled and degraded the term "imperialism", Eurasia shall return to its roots. For a true Empire does not participate in mindless slaughter and discrimination based on race, cutting off hands of laborers and equating them as subhuman. It is an all-consuming tide, one that destroys the opposition with brutality and embraces the subjugated in its unconditional love. One where hundreds of different faces and languages all unite in a choir. A land of religion and virtue.\nThe union of peoples, all mobilized against the rot coming from the West, becoming one. The Eurasian man is a man of many faces and colors. And as we march west, that variety will only increase. Yet the soul of the Eurasian man is his devotion to Deus.\nFor the Katechon shall embrace any who is willing to stand alongside it."
 SOV_anti_imperialist_culture: "Anti-Imperialist Culture"
 SOV_anti_imperialist_culture_desc: "What more can be said of the Atlantist imperialists? This Golden Billion has conquered the world, broke the people's spirit and enslaved them. Before, they used to chop off the arms of the African workers they colonized. Now, the Western cereal corporations take said African's water resources and bottle it up, bringing death to hard-working communities. They use the Global Majority's children to collect cocoa and coffee so your average white person can post their espresso art on social media.\nThey call the rest of the world a backwater, one that is not as civilized. They project themselves as the force of good, forcing other civilizations the cultural degradation they themselves created.\nThey bash the rest of the world for "ruining climate and using polluting production methods", yet it is THEY who consume most of said products! They are a global parasite, one that has outgrown the Imperialist visions of the 19th century, morphing into a Leviathan that consumes everything in sight. Forcing the rest of the world to eat scraps while producing the cream that is thrown out in food landfills of the West.\nWe were on track to becoming such people as well. We thought that we had the right, the privilege, to be integrated into the "European world". Yet, they rejected us, citing our backwardness. And we thank them. For we have realized that such luxuries cannot and should not be taken for granted."
 SOV_diversified_economics: "Diversifed Economics"
 SOV_diversified_economics_desc: "While we are preparing to fight Atlantists in total war, we must also remember that the civilian sector is just as important. We must remember that even the Soviet Union, a nation that was fighting its bloodiest battles in Stalingrad, stopped its money borrowing to focus on economic revitalization mid-war. Even after our victory life will not stop, in fact it will only get tougher as we will have to rebuild and look after veterans.\nThis is why investing into not just the military but also the different areas of the civilian industry will be crucial for our plan.\nWe will not abandon our people. Eurasia mobilizes, but it does so on a full stomach."
 SOV_economic_autarky: "Economic Autarky"
 SOV_economic_autarky_desc: "Grain. A source of sustenance that the Slavic Ethnos have known for centuries. It has served us in times of prosperity and hardships, the golden fields soothe the Russian soul. Yet the Atlantists took them away. Now, we lost a large chunk of our agricultural produce, exposed to a possibility of famine in case of a war.\nYet, this is not the only shortage we face. The current system of globalization, while severely damaged and splintered during the 20s still works. Some of our key industries still rely on materials bought from abroad.\nWhile we could just buy enough reserves to last us through the war of liberation, we must use all of our available resources to find new mineral and oil deposits in our motherland.\nOur land shall become a sea of golden fields, with the underground riches taken to power our war machines."
 SOV_united_against_imperialism: "United Against Imperialism"
 SOV_united_against_imperialism_desc: "If you asked a random person across the world: "What is the Atlantist civilization most good at?", they will simply answer "Colonialism". Indeed, we all know of their exploits. The slaughter in the Congo. Massacres across the middle east. Starvation of India. Discrimination against Italians and the Irish.\nWe too have received the brunt of it. Ever since we became a global power, the Western Europeans have made it their priority to dehumanize us. From the French revolutionaries calling us "The new Hunnic horde" to the British and Germans calling us "Barbarians who seek to take enlightened European colonies" to now the Eurocrats calling us "Orks". \nOf course, there were a lot of periods when we turned a blind eye to this. "They are enlightened, there must be a reason they call us that" claimed the bootlickers, liberals and traitors. \nWe all remember how Putin negotiated with them in the early 2000s, keen on integrating with the Atlantist filth. Yet, he was too loyal to his nation. He didn't want to sell out Russia completely: he wanted to become a pillar of the Atlantist coalition, not one of its lap dogs. \nIt's good that he was denied, then. For we all had seen that even during our "closest" times they viewed us as lesser than them.\nAnd as they are ripping our motherland apart, keen on spreading their poison, let us unite against their Imperialism and oppression. The Golden Billion is still weak. And we must burn the global parasite to the ground!"
 SOV_increase_local_autonomies: "Strengthen Centralized Control"
 SOV_increase_local_autonomies_desc: "In these trying times, loosening central authority is akin to death.\nEurasia is one body, with all of the organs running to sustain it. And for that, the Brain must not be cut up.\nWe must revive the Soviet system of control, yet also cut all the middle men and not increase the bureaucracy.\nEurasia should not care for elections or empty promises of politicians. All we need is a ruthlessly efficient and loyal elite that will move the state forward."
 SOV_federative_regionalism: "Federative Regionalism"
 SOV_federative_regionalism_desc: "We have hundreds of ethnicities and regions inside our borders. Why should we chain them to Moscow? We should not be like the Atlantists, controlling everything in sight.\nLet Eurasia be a sea of cultures, all boiling and uniting against the Atlantist tide. A unified wave, moving by inertia, consuming the Leviathan under its weight. \nThe Eurasian civilization cannot be confined to just "Turkic" or "East Slavic" ethnoses, for it is much more than that. \nThe Katechon will arrive on the world stage with millions of voices, all ready to share their joy." 
 SOV_revolutionize_the_system: "Revolutionize The System"
 SOV_revolutionize_the_system_desc: "As our system begins to take shape, we must embark on utilizing new methods of organization. With AI and computing technology becoming widespread, we can attempt to incorporate it in the reconstruction of local administrations.\nAi and Computing will be used to cut back on the number of administrators needed, as well as help us process more data. Such a change shall make our system more flexible and easier to manage crises.\nEurasia cannot repeat the mistakes of the 1980s USSR. It will be swift, adaptable and flexible." 
 SOV_tradionalist_meritocracy: "Traditionalist Meritocracy"
 SOV_tradionalist_meritocracy_desc: "As our Katechon embarked on our quest to slay the Leviathan, a need to identify elites emerged. Most of the members of the previous administrations got their positions either due to connections or parents. True meritocracy from the bottom is rare these days, and this is a major problem.\nWhile the Atlantist claims his system is meritocratic, it differs little from kumovstvo, other than it being reframed as "networking". This psychological trick makes their positioning easier, similar to the "lobbying" efforts their administrations receive from interest groups.\nWe must redefine the meritocratic tradition by returning to a system of "ranks". Your rank depends on your value to the Eurasian system, which in turn will be processed by AI and computing algorithms as well as human evaluation.\nA soldier, scientist or a clergyman will be ranked higher than a pencil pusher or a salesman. Those who fail to efficiently do their jobs will be demoted to a lower rank. Each rank will give you certain privileges, but will also give you duties to fulfill as well.\nOf course, a charlatan might think that this a creation of a new aristocracy, but in reality this is a creation of an entirely new system of social mobility. One where your wealth or connections do not give you privileges.\nEurasia will need to find the finest sons to lead their state, and since we cannot cherry pick in such a short amount of time, using automation will bring us results quickly." 
 SOV_spiritual_supremacy: "Spiritual Supremacy"
 SOV_spiritual_supremacy_desc: ""Let every person be subject to the governing authorities. For there is no authority except from God, and those that exist have been instituted by God. Therefore whoever resists the authorities resists what God has appointed, and those who resist will incur judgment. For rulers are not a terror to good conduct, but to bad. Would you have no fear of the one who is in authority? Then do what is good, and you will receive his approval, for he is God's servant for your good. But if you do wrong, be afraid, for he does not bear the sword in vain. For he is the servant of God, an avenger who carries out God's wrath on the wrongdoer. Therefore one must be in subjection, not only to avoid God's wrath but also for the sake of conscience." - Romans 13:1-5"
 SOV_reconceptualize_the_union: "Reconceptualize The Union"
 SOV_reconceptualize_the_union_desc: "How should the Eurasian state be run? This question is one of the most pressing issues we have as of now. For our rebellion against Atlantism to succeed, we need our government to be able to be mobile and efficient. Yet, decentralizing the system too much can be problematic as well, since it can harm our integralist experiment.\nOne of our statesmen proposed a radical idea, perhaps intended as a joke: a return to the regional administrations of the Russian Empire. This idea seems outlandish at first, but the more our Supreme Leader pondered it, the more hidden opportunities he saw.\nIndeed, we cannot return to such a system completely, however the idea of "general-governorships" became quite appealing. In the modern world, the "General-Governors" will be a triumvirate of soldiers, bureaucrats and clergymen. The three leaders of each region will oversee pacification, as well as economic and cultural integration of a liberated region into Eurasia. The triumvirate core can also have members added to it or switched out depending on regional differences as well, providing us a lot of adaptability. \nIn the future war of rebellion, there will be an increasing number of territories we will need to integrate. Such a system will let the liberated regions to operate autonomously of central command while our Supreme Leader and his closest allies manage the preparations of the Great Rebellion."
 SOV_wipe_out_nationalist_identities: "Wipe Out Nationalist Identities"
 SOV_wipe_out_nationalist_identities_desc: "The Soviets had already tried to create "The New Soviet man".  Yet it ended in complete failure, as the Soviet Union was carved up by local oligarchs using nationalistic sentiments. What is the reason for such degradation? Because "The Soviet Man" was a Russian. It was the Russian that had to abandon his culture, his spirituality. As the other republics revived and even expanded their cultural influences, the Russians were meant to be the amorphous glue that binds all these cultures together.\nThis will not stand.\nEurasia is a land of many people, many voices, yet it is home to Eurasians and Eurasians only. Chechen, Chuvash, Russian, Yakut, Malorussian, Belarusian, Polish - all of these nationalities are just locally distinct Eurasians.\nTheir identities should not, and will not be poisoned by the "Nationalism" the Atlantists unleashed upon the world during the French Revolution. We shall return the relations between people to where they were meant to be, separate but united. Your people will be respected, your well being ensured...\n\nAnd for that, you must fight the Sodom and Gomorrah, for you are a Eurasian, and such is your destiny."
 SOV_heirs_to_the_great_rus: "Pan-Eurasian Nationalism"
 SOV_heirs_to_the_great_rus_desc: "As we approach the Endkampf against the Talpasocratic Atlantists, our Telpuratocracy, as the main agent against them, needs to fully abandon the idea of nation states. To defeat the Leviathan, one that engulfed the European continent in Oligarchic degeneracy, we need to become the Behemoth ourselves. Unlike the Eurocrats, who united the continent by shackling them to money and consumerism, Eurasia will become a land of the truly Virtuous. One where regardless of ethnicity you live not shackled by the great Sodom. \nThe Eurasian noosphere had been severely damaged ever since the collapse of the soviet union, yes. And the previous administration did not fully repair it. Yet to defeat the hostis, we must destroy superstitions and embrace the Eurasian identity as a whole.\nOur minorities must embrace three things: The Russian language, Eurasian moral values, and the Eurasian military. They must fight and die like the brave Russians who fought for the Heartland before them. They must assimilate into the Druzhina in a rejection to the Post-Modern cabal that is controlling 3 Mare Nostrums and most of the continent. \nThe Eurasian civilization will take what is theirs, and push the Atlantists from the Volga River to the Northern Sea!"
 SOV_conservative_revolution: "Conservative Revolution"
 SOV_conservative_revolution_desc: "As our Katechon awakens, we must realize that we cannot cling to the old ideals. National-Bolshevism, Putinism, Socialism - all these ideals were good for their time. However, they do not address the concerns right here and now. As our Eurasian reorganization comes to an end, we must now finalize the changes. The loyal comrades of our Supreme Leader alongside the military and the clergy will finally gain the governing body.\nThe new "Zemsky Sobor" will function like it did all those centuries ago, providing our Leader with advice and insights. With a centralized core and autonomous general-governors, the system we have created will become a true Behemoth, capable of slaying the beast.\nThe conservative values, ones that have been uprooted by Modernism and used by Postmodernism to bash Modernism to the ground, have been left in shambles, utilized by grifters and degenerates who wish to pose themselves as righteous.\nWe might have killed God, yes. But that does not mean that God cannot be revived.\nWe need not pointless loyalty and religious pandering, but a true conservative revival. One where men and women do not pointlessly bicker but unite as a unit to fulfill their tasks both on the battlefield and at the home front.\nOne where capitalism does not suffocate the families by making a large family impossible.\nOne where Postmodern socialism does not corrode the men and women to perversion.\nThe Katechon will revive the world lost long ago, and it will usher a paradise for all the people of Eurasia."
 SOV_strength_of_eastern_orthodoxy: "Solar-Leader Of Eurasia"
 SOV_strength_of_eastern_orthodoxy_desc: "Alexander Gelyevich Dugin is no longer a simple philosopher and a counterculture movement leader.\nHe is the unifier of the Eurasian noosphere. The Supreme Leader of Eurasia. One who controls not only 1/8th of the continent, but also its destiny.\nA Solar. Once, he had hoped that Vladimir Putin would take this mantle. This is why he had left Limonov, wishing to give the new president a chance. Yet Putin's Lunarist side remained as well. He kept the Eurasianists and the Liberals in check, becoming a beacon of balance. He kept Russia in stasis for 20 long years. And while he strengthened Russia for the future battles, he did not let either side grow.\nNow, Dugin stands at the top of the Kremlin. The fight against the Atlantist menace is approaching, and it is his duty to see it through the end.\nThe Sun shines bright on him, on the Heartland. For he is the conduit of Deus, the God's light embracing Dugin, the Solar-Leader of Eurasia." 
 SOV_god_kingdom_of_common_man: "God's Kingdom Of Common Man"
 SOV_god_kingdom_of_common_man_desc: "Eurasia is a civilization of spirituality. Yet many still do not realize what that entails. If we are to destroy Atlantism, we need something to replace it. And, of course, our Great Revolutionary already knows this answer, for it has been with him since the start.\nOn the ruins of Europe we will create the God's Kingdom.\nA state where every man is content with his life. One where comradery and collectivism is second nature. But it will not be shackled by party elites. It will become a wave from the bottom-up. A wave of compassion and love, able to slay all evil and rot that Atlantist consumerism has brought us.\nAnd as we slit the throats of the Eurocratic elites, we shall show the common man that in Eurasia, you will be graced by God's light. And we will embrace each other as the fruits of our labor cement themselves. Our sweat and toil from then on will belong to ours, not to the global capitalist cabal.\nThe world will awaken from its slumber. They will see the Hydra lying at our feet, and they will rejoice. For we have given them a chance to embrace their Gods and Deities, free from the evil's meddling.\nAnd the moonlight shall illuminate our struggle, for all the sins that we will commit should not be illuminated during the sunrise." 
 SOV_empire_of_purity: "Empire Of Purity"
 SOV_empire_of_purity_desc: ""If then you have been raised with Christ, seek the things that are above, where Christ is, seated at the right hand of God. Set your minds on things that are above, not on things that are on earth. For you have died, and your life is hidden with Christ in God. When Christ who is your life appears, then you also will appear with him in glory.\nPut to death therefore what is earthly in you: sexual immorality, impurity, passion, evil desire, and covetousness, which is idolatry. On account of these the wrath of God is coming. In these you too once walked, when you were living in them. But now you must put them all away: anger, wrath, malice, slander, and obscene talk from your mouth. Do not lie to one another, seeing that you have put off the old self with its practices and have put on the new self, which is being renewed in knowledge after the image of its creator. Here there is not Greek and Jew, circumcised and uncircumcised, barbarian, Scythian, slave, free; but Christ is all, and in all..." - Colossians 3" 
 SOV_motherland_of_virtue: "Motherland Of Virtue"
 SOV_motherland_of_virtue_desc: ""So I exhort the elders among you, as a fellow elder and a witness of the sufferings of Christ, as well as a partaker in the glory that is going to be revealed: shepherd the flock of God that is among you, exercising oversight, not under compulsion, but willingly, as God would have you; not for shameful gain, but eagerly; not domineering over those in your charge, but being examples to the flock. And when the chief Shepherd appears, you will receive the unfading crown of glory. Likewise, you who are younger, be subject to the elders. Clothe yourselves, all of you, with humility toward one another, for "God opposes the proud but gives grace to the humble."... - 1 Peter 5:1-14"
 SOV_moscow_washington_axis: "Moscow-Washington Axis"
 SOV_moscow_washington_axis_desc: "Unlike most militias and fighting groups across the Atlantic, the American People's Liberation Army under Caleb Maupin has been a pleasant sight to behold. After destroying the Post-Modern socialists plaguing the movement, the Jacobins have embraced Communist economics with Traditionalist Values. They have defeated their enemies and have unified the rotting husk of America, yet their worldview is nothing like the administrations previous to that.\nOnce upon a time, The Russian Empire and the USA have been keen friends, isolated from each other, yet lending a help during hardships. Perhaps we can rekindle the flames of cooperation, as the American Imperialist dream crushes down."
 SOV_recruit_islamist_fighters: "Recruit Islamist Fighters"
 SOV_recruit_islamist_fighters_desc: "While Islamism has always been a thorn in the side of the previous governments, one cannot claim that all of the Islamist movements are one in the same. Some of them, particularly Shias, are very keen on fighting the Western Imperial projects and freeing their civilization from colonization.\nWhile the Sunni elites stand idly and indulge in Atlantist degeneracy and vices, true followers of Islam, regardless of ideology have already fought against both the decadence of the west, and the genocidal husk that was brought by the Islamic State (which also appeared due to Atlantist meddling).\nThose who share our vision will be welcome to fight alongside us, for perhaps this is their chance to develop the systems that will bring their people to prosperity.\nAfter the Atlantist menace is gone, the veterans shall return to their homelands. ushering a new Islamic Golden age. One where the love of Allah gives them the strength to push boundaries in sciences, culture and compassion.\nAnd Eurasia will welcome this change, for all civilizations must live in harmony."
 SOV_detente_with_the_chinese: "Detente With The Chinese"
 SOV_detente_with_the_chinese_desc: "China is an ancient civilization, one that has been at the forefront of history. Its quality of living was only outpaced by the Europeans in the 16th century. After a century of humiliation and colonization, they are on track to take over global dominance once more.\nFor what reason should we be antagonistic towards them? Yes, their culture is too materialist for our tastes, and their ambitions have been looking north more and more ever since we lost the war. However, we can and should return to our relationship that was present during Putin and his successo's reign. One of economical and social cooperation and friendship.\nThere will be no war in our time."
 SOV_agreement_with_the_pdo: "Agreement With The PDTO"
 SOV_agreement_with_the_pdo_desc: "The Japanese-lead coalition, at first glance, is just an eastern arm of the Atlantists' regime, cut off from their European counterpart by the chaos happening in America. Yet, for all their faults and degeneracy, they present something more. \nIndia, our great ally, alongside smaller nations of the ASEAN block, have decided to back the Japanese-Australian consumerist project. They bring their civilizational expertise and culture into it, and we have no doubt that they will eventually surpass the fading light of the Japanese, and the irrelevant Australians.Alongside this, PDTO offers us a chance to expand our influence in Eurasia. For while we do not wish to fight against China before we liberate Europe, we can expand into the markets of the PDTO, alongside cooperating in technological advancements.\nAnd in the end, if China falls to the might of the new Asian coalition, we dont mind expanding our eastern borders either."
 SOV_work_with_the_national_bourgoise: "Work With The National-Bourgoise"
 SOV_work_with_the_national_bourgoise_desc: "While we could turn to the soviet system of distribution and economics, our Supreme Leader does not think this is beneficial. Eurasia was born out of rebellion against the liberal elites and oligarchs of the past, yet there is little reason to abandon capitalism just because of that.\nSome claim that Russia is just a land of military might: a country formed not out of economical desire but out of its willingness to expand, a Neo-Roman civilizational model.\nAleksandr Gelyevich agrees with this assessment, yet it rejects the notion that the value of entrepreneurship should be discarded because of that.\nFrom the traders of Novgorod, to the Tsarist and Imperial encouragements of foreign experts - Russia was a land of opportunity. A land where a Scotsman, Frenchman and German could be united under the banner of the two-headed eagle, with the same goal of improving the Empire. And at the helm of this prosperity were our merchants - those who gave us Siberia, those who stood with the empire until the end.\nWhy not show the world the same grandeur? Show them that Eurasia is not just a paradise of the poor, but a bastion of the wealthy traditionalists who would do anything for their state? \nOnce, during Russia's darkest hour, Minin and Pozharsky formed militias out of their own pocket that retook the motherland while the Boyars did nothing. Their spirit and devotion should be the baseline requirement to hold capital in our nation."
 SOV_eurasian_keynesianism: "Eurasian Keynesianism"
 SOV_eurasian_keynesianism_desc: "We have done a great service to Eurasia. Millions of entrepreneurs have appeared before us, establishing companies across the entire country. And while this development is preferable, there is one thing that needs to be addressed.\nWhile we allowed capitalism to thrive, it is under OUR watch, OUR protection and OUR authorisation. We will intervene in the economy as we see fit, and we expect our business to follow everything to the latter. \nThey will work for Eurasia's sake and it alone. And we are there to always remind them of their duty to the people. For when the Great Rebellion starts, the capitalists will march with us in unison like the loyal dogs they are."
 SOV_decentralize_the_financial_system: "Decentralize The Financial System"
 SOV_decentralize_the_financial_system_desc: "We have seen the indecency and idiocy of the Russian Central Bank during Putin's reign. Those ineffectual careerists who got their education abroad, suffocating local businesses via regulations. Putin, of course, knew that, yet still used them due to their good damage control abilities during crises. However, that was done because of the system of market liberalism and technocratic ideologues that reigned during that period. This stops now.\nWe will decentralize our financial system away from banks and let smaller businesses have a chance in the spotlight. Eurasia is a land of opportunity and tradition, not a land of oligarchs and their perverted ideas.\nBut while this is the main goal of decentralization, it also gives us an easier time negotiating backdoor deals using foreign currency and blockchain. Atlantists should care where our money is anyway!"
 SOV_national_goals_over_profit_motives: "National Goals Over Profit Motives"
 SOV_national_goals_over_profit_motives_desc: "While some of our ministers argue that we should use the capitalist model, our Supreme Leader thinks differently. Why should we, the great sons of Eurasia, even care for gold? The Soviet Revolution, initially unholy and as degraded as the Atlantists, integrated into the soul of the Russian people. We are collectivists: we might chase for luxury and personal benefits, yet when it counts we unite and fight against the enemy.\nWe were on a long track of losing this ideal, primarily due to Atlantist propaganda. But now it changes. No longer will the thought of the capitalist class even be considered or remembered.\nEurasia works as a single body, a single heart, a single soul. A Katechon that cares not for the riches of the few, but of the riches of the many.\nFor that is only fit for the God's agents of this earth.\nThe Russian Tsardom and Later Empire expanded because of its willingness to do so. And it only collapsed because of greed, allconsuming and allcorrupting. \nThe Soviet Union too, fell to it. The party elites that Dugin campaigned so hard against became the oligarchs that plagued the 90s.\nNow, the rays of light and love shall embrace every citizen of Eurasia. We will come together like a wave, focused on one goal: to return the world to the state it was meant for. Respect for the common man and a disdain for greed and corruption.\nFor that is our destiny."
 SOV_retool_civil_industry: "Retool Civil Industry"
 SOV_retool_civil_industry_desc: "We have no time for luxuries and pleasantries. What we are fighting against is a chimera, one that consumes everything it's sight. One that does not care for its well being as long as the elite survive. Our society is not meant to be focused on pointless consumption. It is not our traditional character, but an Atlantist thought.\nFactories will produce essential machinery and goods, but not pointless dribble. For it is time for us to prove our dedication to God and accept that we cannot have everything at once.\nOur Katechon will be known throughout the planet as the hammer that produces God's weapons in the fight against evil, and the sickle that gives itself to the colonized peoples of the world to free themselves from Atlantist dominance."
 SOV_state_of_permanent_mobilization: "State Of Permanent Mobilization"
 SOV_state_of_permanent_mobilization_desc: ""Brother's, sister's. I envy you. To fight the enemy of our nation, to face the people who would deny us even our right to breathe is an honor we all aspire to. Our flag means nothing if not held aloft in the hands of the mighty. And it is now you who carries it. Remember, if the leg goes limp, it must be removed. If the kidney fails, it must be cut out. The body does not live for the individual organs, sometimes, for the body to survive, parts of it must be lost. A good surgeon understands this. And I promise you this, through your sacrifice, our homeland will survive! One body, one mind, one Eurasia!" - Aleksandr Gelyevich Dugin, in a speech during the National Unity Day."
 SOV_implement_a_conscription_program: "Ready For War"
 SOV_implement_a_conscription_program_desc: "As the future prospect of a war against Atlantists looms, it is clear that our country is not prepared. Some of our people still harbor hopes of not fighting for our right, but "living it out" as the NATO scum corrupt our territories and oppress our countrymen. That will not happen. We must shift Eurasia into a state of constant vigilance, prepared to liberate our territories from the enemy at a moment's notice. \nThe Atlantist scum will meet our glorious armies head-on, and our soldiers should expect that. Introducing mandatory military training for able-bodied men will also provide us an additional recruitment pool if we will need to hastily mobilize extra forces during the war.\nWe will not cover against them, for our destiny lies at stake."
 SOV_expand_LTS_program: "Advanced Warfare Research"
 SOV_expand_LTS_program_desc: "The war with NATO has brought an uncomfortable truth: current global wars cannot be won with either numerical superiority or technological advancements. You need both. While we lost to the Atlantists, they have not fared much better in their tactics, and both of our experiences should be studied to reach the Logos. Our Noosphere is filled with bright minds who are ready to make new advancements. While some of them might harbor views that are... conflicting to ours, our goal remains the same. \nThe Spear of Michael is too bright to be shown before the final fight. And the minds that will create it will gladly live in the shadows to do so... under our supervision."
 SOV_the_tanks_of_the_future: "The Machines Of The Future"
 SOV_the_tanks_of_the_future_desc: "Ever since America fell into the flames of a civil war, military technology has progressed faster than the past 3 decades combined. Drones, both aerial and ground ones, as well as new protection systems for apcs have shaped multiple wars now. The Eastern war had shown that regardless of bravery or sacrifice soldiers display, it is technology and how it is implemented that drives the outcome.\nThe war of rebellion will see millions of our troops riding into battle, and our vehicle fleets must be equipped as best as they possibly can be for the eventual showdown.\nSaint Michael's glory shall be spread far and wide, for we are his spear that pierces the devil!"
 SOV_lost_sons_of_eurasia: "Lost Sons Of Eurasia"
 SOV_lost_sons_of_eurasia_desc: "Do you hear the people's cries? I assume you hear them, they are hard to ignore. From the hills of the Donbass to the swamps of Belarus, even as far as Poland and Moldova, they cry. Life devoid of meaning and hope, living just to consume new products and get struck down by bureaucracy and taxes as the Atlantist elites gobble up all the profits. Day after day after day after day they live, slowly turning to their western neighbors who have already abandoned hope.\nAnd yet just as we hear their cries, they can hear the angel's choirs. The people shall sing with them, love with them, and with their love they shall strike down the evil as the Archangels descend."
 SOV_install_ideological_fanaticism: "Install Ideological Fanaticism"
 SOV_install_ideological_fanaticism_desc: "The Atlantist system won over the world not because of its conquests, but out of their propaganda campaigns. Everyone wanted to live "freely" and "rich", hence why many of our elites robbed Russia just so they can be seen as one of "them". For Eurasia to expand its hold, our people and military must know what they are fighting for.\nA rebellion against hedonist consumerism, the Atlantist elites, the left-right party dribble that has consumed the common discourse and divided the common man. A return to something pure, free of human sin and corruption.\nHundreds of different tribes united under one, glorious banner. Two continents unite, a civilization similar to all others, yet still fighting against the Atlantist degradation.\nOur fight against this unholy capitalist cabal is just, for we are the forces that will put this degrading system to an end!"
 SOV_struggle_for_survival: "Struggle For Survival"
 SOV_struggle_for_survival_desc: "The enemy sees us as abominations, barbaric freaks fit only for killing. To the foe we are less than human, but they will learn their mistake, my people. We will show them the iron and steel beneath Eurasian flesh. We shall cast them against the unbreakable rock of our collective will. We will make them realize the truth that the children of Eurasia know in their hearts: that we fight for Truth and Peoples of All Continents!"
 SOV_salvage_the_officer_corps: "Salvage The Officer Corps"
 SOV_salvage_the_officer_corps_desc: "One of the most important problems our army faces today is the state of our officer corps. The war had seen many sacrifices, and our officers were no exception. The corps is battered, disorganized and deteriorating. There is, however, a silver lining: most of our soldiers have a lot of experience in battle, and the officers we do have left wish for nothing than to avenge their fallen brethren.\nEurasia will enter its war of rebellion with commanders who have faced death as simple foot soldiers, leading armies of new recruits into battle for the fate of Europe."
 SOV_heirs_of_the_union: "Unity Of Trinity Empires"
 SOV_heirs_of_the_union_desc: "Our nation changed 3 regimes in 100 years. Before, some regimes wanted to paint the period of our country in an evil light. Show it as lesser than others, filled with more mistakes than most.\nBut refuse to do that.\nThe only mistake that was made was during the 90s, and even then it was fixed using the same system. Our people chose what they fought for, and we cannot take that away from them.\nFor we are an imperial civilization. A nation-state cannot and never will work. Our flags are equal, be they in ode to the Tsar, General Secretary or President. Our Empire is eternal, for it is ever shifting.\nAnd that is our strength. The strength of Eurasia."
 SOV_devalue_the_ruble: "Devalue The Ruble"
 SOV_devalue_the_ruble_desc: "As our state recovers its economic strength, it is apparent that we must further boost our economic potential. To do this, our ministers advised us to devalue our currency. While our currency is already devalued due to our war with Europe, this move might be beneficial for us. With the world returning to regional markets, you would need to compete with native companies.\nTo boost our industrial growth, our local companies are already under increased subsidies. We could potentially replicate the Chinese strategy of flooding the global markets with cheap yet good quality produce like cars and machinery, albeit at a way more limited extent. This will both develop our industrial base and improve standard of living, even if this move is temporary until the war of Rebellion.\nAdditionally, due to the oil prices still revolving around international currencies like the Yen, Yuan and Euro, this move would boost our coffers.\n"Made in Eurasia" will move us forward!"
 SOV_organic_democracy: "Eurasian Party-State"
 SOV_organic_democracy_desc: "With the logos taking root in our society, it is time to finalize the vision Alexander Dugin has in mind.\nThe Eurasian Party will be that vanguard. Eurasianism needs to seep into every fabric of society. Our people must meet the start of the great rebellion with open arms, smiling wide! The party will be configured similar to the CPSU, with "The Eurasianist book" being the standard that all party members shall adhere to. It will also be inclusive to anyone regardless of their walk of life to promote efficiency.\nThe party will lead us to glory!"
 SOV_movement_of_all_eurasian_peoples: "Vanguard Of All Eurasian Peoples"
 SOV_movement_of_all_eurasian_peoples_desc: "Our Supreme Leader has been referred to as many things, but nothing is as blasphemous as the "xenophobic" label the Atlantists put on him. A xenophobe? HIM?\nThe Atlantists will always put down their enemies, yet they do not seem to understand the true scope of what our state wants to achieve. What Dugin wants to achieve.\nHe is the wrath of the Global Majority, he is the one who will set justice upon this world. For billions are pleading to put the killing blow upon Western Hegemonic ambitions.\nThe eradication of western Imperialism and their decolonization is the goal that our Supreme Leader has fought for even before the collapse of the Soviet Union. \nHe is the leader, the father, THE VANGUARD of all Eurasia!" 
 SOV_the_great_revolutionary: "The Great Revolutionary"
 SOV_the_great_revolutionary_desc: "Before Dugin, there was another ideologue who had been fighting for the National-Bolshevik dream. Eduard Limonov: it was with him that Dugin defended the White House during Black October as Yeltsin sent his tanks to destroy the soviet parliament. And it was with Limonov that Dugin created the National-Bolshevik party.\nWhile the National-Bolshevik party has never been intended as a serious political movement but a youth counterculture, it eventually had outgrown its original intentions. Egor Letov, Zakhar Prilepin: just a few influential figures who raised the once satirical Nazbol banner.\nOf course, Limonov didn't forgive Dugin for the latter deciding to help Putin's Russia reach its potential. And yet the Nazbols and Eurasianist stayed close behind. Now, long after his colleague's death, Alexander Gelyevich takes up the mantle of National-Bolshevism in his stead.\nThe Nazbol volunteers, those who fought from the Donbass to Africa, have flocked to the Great Revolutionary.\nThe Crimson Banner now waves not as a simple rebellion to Yeltsinite rule. Now it waves as a rebellion to the West. Their ideals and Imperialism. And Alexander Dugin will make sure that this vision succeeds."
 SOV_Power_in_Diversity: "Power In Diversity"
 SOV_Power_in_Diversity_desc: "The Eurasian civilization cannot be simply defined by "East Slavic" or "Turkic". It is a land of constant evolution.\nFrom the Scythians and Alans, Huns and Bulgars riding in the steppes. To ancient Goths and ProtoSlavic tribes living in the forests. The Persians, evolving with each nomad tribe that integrates inside it. The Europeans, synthesizing their cultures and creating new ones every century. The Caucasus mountains, home to hundreds of tribes all living together.\nThis is the power of Eurasia. A land of contrasts, a land of traditions. The Atlantists wish to strip it all away. To force us to conform to the Consumerist society they had established. \nWe deny them this. They will receive no satisfaction. For our cultures will rise against them in the great rebellion! For the continental tapestry shall bow to no one!"
 SOV_introduce_industrial_automization: "Introduce Industrial Automatization"
 SOV_introduce_industrial_automization_desc: "During the reign of Putin, some economists insisted that Russia had a labor shortage and needed migrants to sustain themselves, yet it was not the entire truth. What mattered was the efficiency of our productions, which was way below average, even below Polish standards at the time.\nWhile the previous government fixed this issue in the civilian sector with advances in the robotic industry, our military production still lacks that.\nFor our war of rebellion to succeed, our factories must work non-stop to replenish and increase our inventory.\nFlesh and metal , united in purpose for the benefit of Eurasia."
 SOV_putting_the_asia_in_eurasia: "Putting The Asia in Eurasia"
 SOV_putting_the_asia_in_eurasia_desc: "As of now, our territory does not expand beyond the Russian Federation's borders. Yet what about our friends down south? \nThe Kazakhs, who use Gumilyov Eurasianism as their ideal, can become great allies in our struggle.\nAnd while the Tajiks, Kirghiz, Uzbeks and Turkmens might harbor different views, or even have their elites poisoned by Atlantist consumerism, we will be there to show them that dying for Eurasia is worth it, even if they do not see it yet. For only through unity shall they become free."
 SOV_push_for_don_reunifaction: "Push For Don Reunifaction"
 SOV_push_for_don_reunifaction_desc: "The Don Republic is a frankenstein monster. A husk without ambition, or reason, severed from the heartland just because the Atlantists willed it. Millions of our people wish to return to us, away from the anarchy and disorder.\nFrom the Volga to the Don, Eurasia expands."
 SOV_sign_the_kalmykia_agreement: "Sign the Kalmykia Agreement"
 SOV_sign_the_kalmykia_agreement_desc: "The Kalmyks never wanted to leave our great motherland, yet they were forced to by the Atlantist heathens who wished to "decolonize us". Now, stuck in poverty and economic isolation, the Kalmyks yearn for a return to their previous lives, one where they are supported by their brothers and sisters.\nWhile we are not as perfect as the Bhuddha, our wish for the return of the Kalmyks into our brotherhood is genuine. For the Katechon will always embrace its son's and daughters, regardless of faith."
 SOV_secure_the_flank: "Secure The Flank"
 SOV_secure_the_flank_desc: "The East is in a tricky situation. It is unguarded, unprotected. With the Japanese and Chinese alliances struggling for power amid great power competition, plunging the entire region of the Indo-Pacific into a massive war, we need to have assurances that we will not be caught in their crossfire. For our war of Rebellion to succeed, we cannot hope to fight a two-front war. \nWe will reinforce the Eastern Garrison and build up defenses. After that, we will have to choose the power we will favor, for every conflict can also bring many benefits."
 SOV_march_on_caucasus: "March On the Caucasus"
 SOV_march_on_caucasus_desc: "There is little to be said for our goals of this operation. The Caucasus have been ripped from us, retooled into an inconceivable mess where nationalities fight each other without guidance. We must retake these lands and return peace between the ethnoses, destroy any ill will between them. For while some of them may hate us, they are still our brothers who we hold respect for."
 SOV_march_on_the_west: "March On The West"
 SOV_march_on_the_west_desc: ""My people... Sons and Daughters of Eurasia... For many years, we have been a broken nation: shunned, oppressed, and conquered by those we sought to resist. When I came to power, I asked for time, and that time was granted by you. You: the strength in my arm, the holders of my dreams... Our forefathers embarked on the greatest nation building project in the history of all mankind. A project for freedom, and Eurasia finally became that freedom.. In the time you have given me, I have rebuilt our nation, I have rebuilt our strength, and I have rebuilt our pride! Our enemies at home have been re-educated; we have given them new insights into our cause. On this day, we stand united once more. On this day, those driven to divide us will hear our voice! On this day, we shall act as one, and we shall be ignored NO MORE! Defenders of the Eurasian dream, NOW IS OUR TIME!" - Aleksandr Gelyevich Dugin, the speech starting the Great Rebellion."
 SOV_grand_showdown: "Grand Showdown"
 SOV_grand_showdown_desc: "I send a pestilence and plague \nInto your house, into your bed \nInto your streams, into your streets \nInto your drink, into your bread \nUpon your cattle, on your sheep \nUpon your oxen in your field \nInto your dreams, into your sleep \nUntil you break, until you yield \nI send the swarm, I send the horde \nThus saith the Lord"

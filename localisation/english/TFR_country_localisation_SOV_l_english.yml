 SOV_zhirinovsky_our_founder: "[SOV_slutsky_path_focus_1]"
 SOV_slutsky_path_focus_1_loc_1: "Refine the Russian Society"
 SOV_slutsky_path_focus_1_loc_2: "Patriotic Reformation"
 SOV_slutsky_path_focus_1_loc_3: "Demolish the Schism"
 SOV_slutsky_path_focus_1_loc_4: "Zhirinovsky - Our Founder"
 SOV_slutsky_path_focus_1_loc_5: "United Russian History"
 SOV_slutsky_path_focus_1_loc_6: "Russia's True Heroes"
 SOV_zhirinovsky_our_founder_desc: "[SOV_slutsky_path_focus_desc_1]"
 SOV_slutsky_path_focus_1_desc_1: "The renewal of the country is impossible without changes in the public consciousness. Society should not just follow the changes, but become their initiator, sharing the goals and values of the new era. A country confident in its path relies on a society of the future that is capable not only of accepting change, but also of creating it."
 SOV_slutsky_path_focus_1_desc_3: "Russia is riddled with a split of unprecedented proportions: a split into "reds" and "whites," leftists and Rightists, Bolsheviks and White Guards. Even a century later, the October Revolution leaves no one indifferent, its influence is so strong. But at the same time, she divides all Russian politics into two camps. We were close to resolving this issue in '93, but then the pro-Yeltsin forces won, and the red-brown alliance collapsed. Now that Dmitry Rogozin is at the head of state, we can finally overcome the strife of the past and build a New Russia together!"
 SOV_slutsky_path_focus_1_desc_2: ""
 SOV_slutsky_path_focus_1_desc_4: "Zhirinovsky is a figure of our time, not just for Russia but for the LDPR itself. No one else could have done as much for the party's public image as its founder. Even after his death, we are often seen as his party, which has significantly boosted our popularity. However, while many recognize our identity, not everyone sees Slutsky as the best successor to Zhirinovsky."
 SOV_slutsky_path_focus_1_desc_5: "The history of Russia is without a doubt one of the most difficult and eventful stories in the whole world. Our country has experienced everything. Epochs of unification and disintegration. Devastating wars that would have left no trace of another civilization. However, the people of Russia endured everything and did not give up. And therefore, attempts to divide our history are primarily an attempt to divide the people of our country, which we cannot allow."
 SOV_slutsky_path_focus_1_desc_6: "Our countrymen were always abused by authoritarian state Our people have always faced harsh treatment at the hands of authoritarian regimes. They've been sent to die in pointless wars, while their leaders profit from the bloodshed. We must remember and honor every citizen for their sacrifices, not just the self-appointed leaders., sent to die, and to win unwinnable wars, while their leaders take all the glory, we say no more. Our citizens deserve to be remember to be praised for their efforts in every conflcit, and not self-proclaimed fathers of peoples"
 SOV_multiconfessional_piety: "[SOV_slutsky_path_focus_2]"
 SOV_slutsky_path_focus_2_loc_1: "Popular Party For the Russian Nation"
 SOV_slutsky_path_focus_2_loc_2: "Syncretic Nationalism"
 SOV_slutsky_path_focus_2_loc_3: "Glory of the Empire"
 SOV_slutsky_path_focus_2_loc_4: "National State of the Future"
 SOV_slutsky_path_focus_2_loc_5: "Rejuvenate All-Russian Patriotism"
 SOV_slutsky_path_focus_2_loc_6: "New National Policy"
 SOV_multiconfessional_piety_desc: "[SOV_slutsky_path_focus_desc_2]" 
 SOV_slutsky_path_focus_2_desc_4: "The time has come to lay the foundation for a new stage in the country's history - the creation of a true Nation-State. It will be a union of a renewed society, responsible government and clear national guidelines. A new state will combine respect for traditions with the development of science, culture, economics and other spheres of society. It will strive to ensure that the rights and freedoms of citizens are protected, and that work, initiative and responsibility find real support. The national idea will become a solid foundation for the internal development of the country and strengthen its position in the world." 
 SOV_slutsky_path_focus_2_desc_2: "Our state faces an unprecedented task: to reconcile Russian history, full of contradictions that tear our people apart to this day. The next step to solving this problem is to create a comprehensive ideology that can unite the people, while at the same time having a solid historical foundation.The name of this ideology is Syncretic Nationalism. Combining the social orientation of Soviet power and the strong national bias of the Empire and Zhirinovsky's Russia, it is designed to become the very bridge that can reunite the entire Russian history into a single whole!" 
 SOV_slutsky_path_focus_2_desc_3: ""
 SOV_slutsky_path_focus_2_desc_5: "Russian is not just a nation. Russian is a vocation, it is belonging to the greatest civilization in the world. These are the greatest works of culture and breakthrough achievements in science. And to be Russian, it is not necessary to be a Slav, we will accept both Caucasians and Central Asians, and anyone else as long as they respect our culture and want to be a part of it. Our greatest writer even had Ethiopian roots! That is why our patriotism is all-Russian and no one can take away our love for the Fatherland."
 SOV_slutsky_path_focus_2_desc_6: "The current national policy is a chauvinistic nightmare that will not pave the way for stable decades ahead. Ukrainians and Belarusians must be granted more rights to avoid repeating the mistakes of the Tsars and the USSR."
 SOV_slutsky_path_focus_2_desc_1: "The LDPR is a place where ordinary Russians come to voice their concerns, find solidarity, and feel a sense of national pride. We stand by Russia's side, with members spread across the country, often unnoticed as our party evolves. Our young, well-groomed deputies resonate with the nation and their constituents. Despite changes in administration, our slogans remain steadfast."
 SOV_brand_new_russian: "[SOV_slutsky_path_focus_3]"
 SOV_slutsky_path_focus_3_loc_1: "Brand New Russian"
 SOV_slutsky_path_focus_3_loc_2: "Motherland's Strongest Warriors"
 SOV_slutsky_path_focus_3_loc_3: "Cult of Strelkov"
 SOV_slutsky_path_focus_3_loc_4: "New Federalism"
 SOV_slutsky_path_focus_3_loc_5: "Mimic Donbass Model"
 SOV_slutsky_path_focus_3_loc_6: "Enlarge the Social Welfare"
 SOV_brand_new_russian_desc: "[SOV_slutsky_path_focus_desc_3]"
 SOV_slutsky_path_focus_3_desc_4: "Along with other areas of public administration, the system of federalism should also develop. We are not talking about its abolition - on the contrary, it is planned to strengthen it through rethinking approaches and freeing it from excessive bureaucratic burden. More flexible and fair management methods will strengthen the interaction between the center and the regions, make the system more transparent, efficient and result-oriented.Russia's strength lies in justice, and it is justice that must underpin all management methods."
 SOV_slutsky_path_focus_3_desc_2: "Russia's pride is its military traditions and bravery. The Russian warrior has repeatedly shown his prowess in battles. The recent war with the West has only strengthened faith in the strength of our army. Russian soldiers, like their great-grandfathers in 1945 and distant ancestors in 1813, liberated most of Europe and brought glory to the Fatherland. We praise our warriors who defeated the Western plague!"
 SOV_slutsky_path_focus_3_desc_3: ""
 SOV_slutsky_path_focus_3_desc_5: "The Donbass model has already proved its effectiveness, having been tested by the war with Ukraine. Adapting this model across the board may not be the easiest task, but if we succeed, it will make government much easier for us."
 SOV_slutsky_path_focus_3_desc_6: "Our current approach to social issues falls short. The government must extend aid to those in need while also bolstering the military-industrial complex. This expansion is championed by the LDPR's warmongering members."
 SOV_slutsky_path_focus_3_desc_1: "Over the years, we have forged a new kind of Russian citizen. We have shaped them, creating a community bound not just by blood but by shared spirit, faith, and a readiness to sacrifice for the nation. This has given us a loyal populace and, crucially, capable bureaucrats, police officers, soldiers, and many others who keep our nation stable."
 
 SOV_organization_of_russian_veterans: "Organization of the Russian Veterans"
 SOV_organization_of_russian_veterans_desc: "LDPR shows great respect for our valiant warriors, particularly those who now dedicate their lives to the party and Slutsky's vision. By uniting them into a cohesive organization, where they can train and educate the younger generation in loyalty and patriotism, we will take a significant step toward securing the future of our military."
 SOV_ldpr_ecosystem: "LDPR Ecosystem"
 SOV_ldpr_ecosystem_desc: "Our party isn't just about having a good time. It's a way of life that encompasses music, gaming, sports, acting, and even fashion. Our PR managers are dedicated to ensuring that every aspect of our active life is associated with LDPR. They want the population to understand that if they want to engage in any activity, it's better to do it under the LDPR brand. After all, hobbies are more enjoyable when shared with others."
 SOV_security_and_order: "Security and Order"
 SOV_security_and_order_desc: "These democratic efforts are admirable, but democracy also gives rise to a variety of viewpoints that aren't essential for the nation's and society's well-being. From extreme nationalists and radical communists to those who combine elements of Nazism and paganism, these individuals cannot contribute to a successful, functioning nation. Under the guise of anti-radicalism, we'll naturally try to include a more vocal segment of our opposition as well."
 SOV_government_of_mutual_trust: "Government of Mutual Trust"
 SOV_government_of_mutual_trust_desc: "A state cannot thrive without perceptive critics who illuminate its shortcomings, but these critics must also be perceptive and constructive. Despite their flaws, Yuneman and Girkin are more approachable for meaningful dialogue than the extremists on the fringes. Cultivating a positive relationship with them could strengthen our stable rule and help us anticipate and address critical issues within our government. Forming a formal coalition with these figures might offer some assistance."
 SOV_great_russian_nationalism: "Great Russian Nationalism"
 SOV_great_russian_nationalism_desc: "In the end, it is the Russians, under the guidance of LDPR, Zhirinovsky, and his close ally Slutsky, who have triumphed over the west in the war and ushered in a new golden age for our people. We should always highlight the significant progress our party has made to enhance the standing, security, and glory of the Russian nation."
 
 SOV_peoples_mandate: "People's Mandate"
 SOV_peoples_mandate_desc: "Our people have given us a mandate for change from this corrupt and unequal establishment. We'll unleash sweep reforms against the stale and weak administration."
 SOV_repeal_hardline_policies: "Repeal Hardline Policies"
 SOV_repeal_hardline_policies_desc: "Zhirinovsky was a disruptive force for this country, despite his intentions to make it great. The remnants of his policies must be rejected, and his jingoistic and xenophobic legislation must be repealed."
 SOV_unity_consensus: "Unity Consensus"
 SOV_unity_consensus_desc: "No matter how hard we strive to reform, we must recognize that overly hasty and stringent measures could provoke open rebellion against our administration, even from moderate voices within the country. We must engage in a democratic process with all parties involved, excluding the cronies of LDPR."
 SOV_protect_electoral_freedom: "Protect Electoral Freedoms"
 SOV_protect_electoral_freedom_desc: "We are free people, and we will pursue absolute freedom in elections, even if their outcomes do not align with our preferences. This distinguishes us from previous Russian governments."
 SOV_russian_republican_forces: "Russian Republican Forces"
 SOV_russian_republican_forces_desc: "The Russian military must become an integral part of republican democracy. Currently, the military displays a conservative outlook and a strong affiliation with the Liberal Democratic Party of Russia, particularly with the National Guard."
 SOV_patriotic_idealism: "Patriotic Idealism"
 SOV_patriotic_idealism_desc: "To be a patriot is not about blindly following orders or only seeking the positive. A true patriot must always be aware of his country's issues and strive to improve them. It is especially gratifying when the goals of these patriots align with the idealistic aspirations of Russia's government, working together to create a better system."
 SOV_fight_bureaucratic_corruption: "Union of Republican Fighters"
 SOV_fight_bureaucratic_corruption_desc: "In the Weimar Republic, a multitude of militant organizations composed of war veterans thrived. While some were known for their extremism, many soldiers were willing to fight for a democratic, or at least social-democratic, order. The RPSS will similarly establish an independent wing for war veterans who share our political ideals."
 SOV_develop_rural_russia: "Develop Rural Russia"
 SOV_develop_rural_russia_desc: "Rural Russia has long been overlooked, its potential unacknowledged. RPSS seeks to rectify this by bringing rural areas into focus, boosting their prominence through increased financial and economic support for less privileged regions."
 SOV_stand_for_democracy: "Stand For Democracy"
 SOV_stand_for_democracy_desc: "Democracy is crucial for a nation's survival. President Shevchenko prioritizes democracy above all else. He is a democratic imperialist, if we can call him that. We cannot seek peace with those who deny freedom."
 SOV_spirit_of_the_motherland: "Spirit of the Free Motherland"
 SOV_spirit_of_the_motherland_desc: "Russia is currently the most beautiful and free country on Earth, amidst radicalism and bigotry, Our motherland stans as guiding beacon. President Shevchenko before all is the Russian patriot, and he does not seek peace with those who deny Russia its place under the sun."
 SOV_boost_local_governance: "A True Federation"
 SOV_boost_local_governance_desc: "Russia is a land abundant in diverse peoples, notably in the Caucasus region. Maxim Shevchenko has deeply explored this subject. These nations must be safeguarded and treated as equals to the Great Russians."

 russia.124.t: "South Ossetians Volunteer to Fight"
 russia.124.d: "A brigades worth of South Ossetians have recently pledged their allegiance to us and willingness to fight in the war against Ukraine. Many of these men are already battle hardened and have already begun preparations to be transported directly to the front. They may lack heavy firepower but they make up for it in spirit."
 russia.124.a: "Their service will be of great use!"
 russia.125.t: "Moscow Winter"
 russia.125.d: "Moscow has, for now, weathered the storm. Just a few weeks ago, it seemed we would have collapsed from within: too many angry voices, too many ideologies vying for dominance over all others.\n\nYet, with Eurasianists at the helm, it seems a new path has opened for us. No longer do the left and the right fight on the streets, no longer liberal agitators hide in the shadows to plot their takeover. The heat has died down, and it is time to focus on the true enemy: NATO.\n\nThe Western Dogs think that by driving us into a corner we will kneel before them and beg for forgiveness? To cover as we did in the 90s? To "warm up our relations"?\n\nThe only thing we need is a cold and calculated effort to rectify our mistakes. The Europeans have always called us barbaric, even during the times we wanted to do nothing but embrace their "enlightened" ideals and join them. Well, they will get their wish.\n\nEurasia will make sure all that remains of them are their corpses, freezing solid in annals of history."
 russia.125.a: "For we have no more love to give to them."
 russia.126.t: "Declaration of the Eurasian State"
 russia.126.d: "At last we have reunified with our central asian brothers, as Russian troops parade through the streets of the Kazakh capital of Astana, the statue of Lev Gumilyov across from the presidential palace looks over the columns proudly.\nWith this, it is time to wipe away the farce of Russia, for we are greater than that, we are Eurasia now and forever and under Dugin, under the guiding hand of the New Eurasian Army, Europe will join us as well. We will make it known to the world that a new nation is born today!"
 russia.126.a: "The Last Days of Europe are Near"
 russia.128.t: "Don Republic Referendum"
 russia.128.d: "Following the Referendum of Reunification, the Russian people, unsurprisingly, voted to rejoin their motherland. With the local elites largely being comprised of Russian patriots, it was inevitable that the region would come home, especially with large local outcry. The west tried to put out hit pieces against the reunification like they always do, but it seemed to fall on deaf ears.\n\nThe motherland is once again at the gates of Rostov-on-Don, just live Peter the Great once was, and yet it seems it is as far as we can go west without any conflict.\n\nThe Ukraine-controlled Kuban republic will not follow this example. Using Ukrainian soldiers the "separatist" administration is putting down dissent en masse, fearful of our revival. Rostov and Crimea is likewise occupied by Ukraine, albeit openly. They will not let it go without a fight.\n\nWe will liberate them all."
 russia.128.a: "For Russians always come for what is theirs."
 russia.129.t: "Caspian Sea Proposal"
 russia.129.d: "The Kalmyk government has proven receptive to our ideas. They had decided to return to us the region of Astrakhan to avoid armed conflict. Considering they had no manpower or will to oppose Russian patriots in Astrakhan, it was the better outcome for them.\n\nThe local elite's agreement to our proposal also gave an opportunity to negotiate about the status of Kalmykia itself. The region has always relied on Russian subsidies. While Europe took on this financial burden, they also started to take over the region economically, with local companies not being able to compete.\n\nWe could, perhaps, come to an agreement with local elites. Surely they would rather keep their wealth than be subsumed by European corporations?\n\nEven if it doesnt work, we still have a lot of contacts and soldiers among the Kalmyk security forces and administration. We will have our answer."
 russia.129.a: "We welcome you with a warm embrace."
 russia.130.t: "Annexation of Kalmykia"
 russia.130.d: "The Kalmyk elites were as spineless as we feared. Abandoning reunification, wishing for the Kalmyk ethnos to be washed out by the European influence and cultural dominance. A treacherous act, one that is fit for the lowly followers of Sodom.\n\nYet the proud sons of the Oirats have men of vision and will. Those who chose to stand besides us in our dream of a free and united Eurasia. And alongside these proud monks of fire and steel, our forces marched on Elista.\n\nLet the Horde march and chant in unison once more!\nBe it Buddha or the Cross, it matters not.\nLove has once again come to this land..."
 russia.130.a: "...And it will not let you go henceforth."

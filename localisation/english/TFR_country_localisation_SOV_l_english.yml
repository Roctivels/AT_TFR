 russia.1000.t1: "The Revolution"
 russia.1000.d1: "The Motherland is the victor of yet another Great Patriotic War, not that this is a big surprise, but still it is a massive event. Few on the outside believed that Russia will return to socialism, but now, the legacy of old Bolsheviks has been avenged. Triumphant victory over Europe, made the reborn USSR stronger that its original predecessor, Soviet Union is now the sole leader of European continent, our army is now so powerful, it will crush anyone who stands on the way, exploitative capitalism has been eradicated from Russia, our economic might is unmatched, the people, are more patriotic then ever before.\nAs the new day arises, Soviet people go by their lives with full knowledge, that their Motherland will protect them from any trial that will lay ahead.\nSoon, the world will turn red, following the beginning of the new era - Soviet Era. The dream of worldwide communism, is finally within our reach, and you - The Player, did everything, to bring it about. Thank you."
 russia.1000.t2: "Full Starboard!"
 russia.1000.d2: "The Motherland is the victor of yet another Great Patriotic War, not that this is a big surprise, but still it is a massive event. Russia has defeated godless communists once and for all.\nThe earth is so stingy it can support only one superpower now, we had set our place at the head of the table, its a table with just one chair. The other global powers will slide off into extension, like ancient civilization no one has heard off.\n\nOur homeland will relish this victory for many generations to come, and our glory will never fade away from history of mankind.\nNever.\nWe stand at the dawn of new Russian era, age of strength and power, where weakness is purged.\nRelish this victory, dear Player, you did very well to bring this new Era about. Thank you." 
 russia.1000.t3: "The Country of The Sun"
 russia.1000.d3: "The Motherland is the victor of yet another Great Patriotic War, not that this is a big surprise, but still it is a massive event. Russia has defeated globalists once and for all.\nThe earth is so stingy it can no longer support only one superpower now, it will be diligently divided into fair poles of influence and cooperation. The unipolar world will slide off into an extinction like ancient empires noone has heard of. The free mankind will glorify this victory for many years to come.\n\nOur homeland enters the age where none will pose any threat to it, our citizens celebrating, and hoping for stable and glorious future.\nAnd it shall be.\nThe era of Multipolarity is within our reach, soon, last remnants of old order will rot away, and chains shall be broken.\nRelish this victory, dear Player, you did very well to bring this new Era about. Thank you."
 russia.1000.d.Alikhanov: "Europe lies in ruins as our victorious army marches through its once grand capitals, now reduced to ash and rubble. The so-called citizens of Europe are now under our control.\nIn Russia, parades of celebration have become a familiar sight, but this one will be the grandest yet. Russia has triumphed over the entirety of Europe, stretching from Lisbon to Vladivostok, we cast a long shadow over all of continent.\n\nPerched atop the Kremlin is the mastermind behind this greatest military campaign. No, it's not you. It's Anton Alikhanov, a genius of our time. Once a pariah, a prodigious son returned, having triumphed over all his challenges and struggles for power. To millions of Russians, he's a national hero. To a dwindling number of critics, he's the Anti-Christ-like figure. It is true that it takes special kind of man, maybe one blessed with destiny to so radically change the world around them. Only time will tell where will this new world will go, as despite all Alikhanov is not eternal...\n\nBut as for now, the Empire will celebrates, and its beloved leader can rest a little, as the ultimate power is also the source of ultimate exhaustion. \n\nDerzhavism has shown itself to be a true masterpiece of ideological art, born from passion and seizing the minds of millions worldwide, not just in Russia. Despite the regime's cruelty, burning thousands in its zeal for purification, millions more still chant in unison: "Hail to our wise and benevolent Leader!""
 russia.1000.t.Alikhanov: "Soldier, Poet, King"

 russia.87.t: "Development of Sputnik V Vaccine"
 russia.87.d: "Proving that Russia remains a scientific hub even in the post-Soviet era, the Minister of Health is now laying the groundwork for the development of our own domestically produced vaccine. Everything from its earliest trials to its eventual production and deployment will be overseen by our own institutions, allowing us to make every step of the process more effective.\n\nNot merely a matter of national pride when we get our vaccine ready before the rest of the world, but it's also a matter of public safety and security as this vaccine autarky will make it impossible for any hostile elements to impede our fight against the virus.\n\nWith clinical trails scheduled to begin in the near future, the battle against Covid-19 will be yet another battle that Russia will win."
 russia.87.a: "We'll be the first!"
 russia.88.t: "Sputnik V Vaccine Registered"
 russia.88.d: ""In a year marked by a global pandemic, Russia has emerged as a significant player in the race to develop a COVID-19 vaccine, with its Sputnik V vaccine becoming one of the first vaccines to be authorized for use in the world.\n\nThe development of the Sputnik V vaccine was a collaborative effort between the Gamaleya Institute, the Russian Ministry of Health, and the Russian Direct Investment Fund. Despite some initial skepticism, the Sputnik V vaccine has shown promising results in clinical trials, with an efficacy rate of over 90%. The development of the Sputnik V vaccine has been a source of pride for Russia, which has faced criticism for its handling of the pandemic. President Vladimir Putin has hailed the vaccine as a \"world class\"achievement and a symbol of Russia's scientific prowess.\n\nAs the pandemic continues to ravage the world, the development of the Sputnik V vaccine has provided a glimmer of hope, demonstrating that collaboration and innovation can help bring an end to the crisis."
 russia.88.a: "Excellent news!"
 russia.89.t: "Ukrainians Destroy ZNPP"
 russia.89.d: "After a hard fought battle, our forces have successfully captured the Zaporozhye Nuclear Power Plant. Due to their desperation, Ukrainian forces detonated large explosives in several reactors, effectively putting the entire site out of commission and releasing unprecedented amounts of radiation in the hopes of slowing our advance. Regardless of any provication they try, we will trampple over them!"
 russia.89.a: "Did they not learn from 1985?"
 russia.91.t: "Ghost of Kiev"
 russia.91.d: "The evocative name is trending on Twitter and other social media sites, referring to a Ukrainian MIG-29 pilot who allegedly shot down six Russian jets in the first day of Russia's invasion of Ukraine.\n\nAccompanying many of the Ghost of Kyiv posts is footage of what appears to be a MIG-29 - known under NATO's naming scheme as a Fulcrum - though most posts have exactly the same short clip - the plane flying over concrete tower blocks of housing with grey skies behind\n\nHowever, there is little evidence that the Ghost of Kyiv actually exists, with online detractors pointing out the implausibility of a fighter without air superiority and in an inferior jet shooting down 6 enemy jets in one day.\n\nNevertheless, an anonymous Ukrainian interviewed stated that "What matters is not if he exists or not, but the message he spreads as a legend. This kind of message is important in these dire times no matter if it's true or not.""
 russia.91.a: "Their "Victories""
 russia.92.t: "Intervention in Uzbekistan"
 russia.92.d: "Hostilities at the Tajik-Uzbek border have reached unacceptable levels! Without hesitation, Uzbekistan will launch skirmishes into Tajikistan, with the Rogun dam being the primary justification used. Claiming to be an act of self-preservation and defense against a hostile alliance.\n\nDmitry Medvedev has authorized article 4 of CSTO, allowing for our troops to immediately deal with the threat. "
 russia.92.a: "We must defend our allies!"

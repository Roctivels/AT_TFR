 russiaflavor.111.t: "Summer Rain"
 russiaflavor.111.d: "Senate Square is one of the most beautiful places in Saint Petersburg. That's exactly what Denis thought when he visited this place again for the first time in several years. After the beginning of the bloody European war, he immigrated to neighboring Finland to avoid mobilization and the horrors of war. After it ended, a mad tyrant, Alihanov, came to power and began turning the Russian Federation into a fascist dictatorship, no different from the regimes of Mussolini or Hitler.\n\nBut just recently, only a couple of months ago, everything suddenly changed 180 degrees. Several brave politicians, valiant generals, and, of course, Alexei Navalny decided to stop tolerating the totalitarian regime and stand against it under the banner of democracy. Their venture ended in success, thanks to which the rabid animal Alihanov was forced to flee, and a democratic—and most importantly, free—government was restored in the country.\n\nWhile Denis was recalling the events of recent days, he reached the Bronze Horseman. The monument to Peter the Great stood majestically almost in the center of the park, sternly but justly watching the people passing nearby. It was a monument to a great reformer who lifted the country from its knees and modernized it into a great and national state. Drops of rain slowly slid down the monument, one after another falling to the ground. Looking at it, Denis involuntarily smiled, took a deep breath, filling his lungs with air, and, exhaling, looked at the great Neva River flowing behind him. The torch of freedom had ignited again over Russia..."
 russiaflavor.111.a: "...and what burned to ashes shall rise again!"

 russia.2123.t: "Navalny Stays in Politics!"
 russia.2123.d: "The interim acting president, Alexei Navalny—who had only recently announced that he would not participate in the upcoming elections—has suddenly made a statement that he will take part in the race, announcing the creation of a new party named the "People's Alliance"."
 russia.2123.a: "Triple Hooray for the President!"

 russia.2124.t: "The Question of the Prime Minister"
 russia.2124.d: "After the formation of the grand 'Nationwide Democratic Coalition', the government was faced with the question of the vacant seat of Prime Minister. One of the leaders of the coalition's member parties must take the place of the second most important person in the country..."
 russia.2124.b: "Boris Nadezhdin!"
 russia.2124.a: "Sergey Mironov"
 russia.2124.c: "Vladimir Yakushev!"

 russia.2125.t: "A New Name for the New Federation"
 russia.2125.d: "Russia has gone through so many unthinkable events over the past decade: the Medvedev Thaw, the War, Alihanov's Dictatorship, and the New Revolution. In this regard, a controversial proposal has been submitted by State Duma deputy from the "People's Alliance", Sergey Nalivkin — to rename the country to the "Neo-Russian Federation", thereby symbolizing the rebirth of democratic Russia after such a turbulent time."
 russia.2125.b: "Leave it as it is..."
 russia.2125.a: "For the Neo-Russian Federation!"


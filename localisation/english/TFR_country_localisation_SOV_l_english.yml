 SOV_putinism_human_face: "Putinism with A Human Face"
 SOV_putinism_human_face_desc: "\n\n\n\n£GFX_putinism_human_face_banner\n\n\n\n\n\n§Y"We must make Russia young and forward-looking!".\n- V. Putin§!\n\nFrom the very beginning of the millennium, Vladimir Vladimirovich Putin sought to create a new system of power, it is obvious that his choice fell on the creation of a new democracy suitable exclusively for Russia.\nDespite the fact that Putin is gone, his cause will live on in the term 'Putinism', which was rarely used before in the government, but is now beginning to crystallize into, if not an ideologeme, then a 'charter of rules for the leadership of Russia' . His main principles were: Russian Conservatism, Patriotism, and the desire to create an original democracy.\nMedvedev deepens reforms, reformulating the structure of the state in order to create a sovereign and democratic Russia of a new era. Vladimir Putin became the father of Russian democracy."

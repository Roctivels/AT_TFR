 SOV_state_liberals_idea_tt: "§gState Liberals are a faction within the Kremlin bureaucracy that believes Russia has suffered due to economic statism. While some advocate for limited political liberalization, most focus on economic affairs. They aim to empower Russian businessmen significantly. They truly believe that Russian free market has yet to reach its potential, always stopped by regressive forces inside the administration.\nThey offer Kremlin great profits in exchange of cutbacks to a 'needless' social state.§!\n\n\n\n\n\n£GFX_SOV_state_liberals\n\n\n\n\n\n\n"
 SOV_siloviki_idea_tt: "§gThe siloviki are essentially the iron hand of the Russian state, represented by the FSB, MVD, FSO, and Rosgvardia. While they have little to offer in terms of politics, they provide stability and order. Their primary goal is to increase their agencies' budgets to more effectively combat internal threats. Siloviki mainly operate on state patriotism, viewing the state as essential part of the motherland.\nThey offer Kremlin a firm first in dealing with troublemakers, in exchange of tightening the leash on the business.§!\n\n\n\n\n\n£GFX_SOV_siloviki\n\n\n\n\n\n\n"
 SOV_technocrats_idea_tt: "§gTechnocrats are the effective managers of the state, they view politics as needless distraction in the way of functioning government. For them the ideal condition is faceless administration run by very able-bodied bureaucrats and managers. The most moderate choice, and the most efficient one.\nThey offer Kremlin a well managed state in exchange for average citizen's disillusionment with political life.\n\n\n\n\n\n£GFX_SOV_technocratic\n\n\n\n\n\n\n§!"
 SOV_neo_tsarists_idea_tt: "§gNeo-Tsarists, an extreme faction of siloviki, are highly critical of democratic institutions. Unlike their name might imply, their vision of tsarism is more pragmatic and focused on efficient governance. They advocate for any form of autocratic control over the state. While prioritizing internal security, they also aspire to external dominance, promoting the Russkiy Mir Doctrine in the country's geopolitical affairs.\nThey promise the Kremlin a strong, orderly society, albeit at the cost of occasional brutality.§!\n\n\n\n\n\n£GFX_SOV_neotsarists\n\n\n\n\n\n\n"

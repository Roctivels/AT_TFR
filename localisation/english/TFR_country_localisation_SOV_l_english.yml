 SOV_new_historical_community_desc: ""
 SOV_national_front_ussr: "National Front of the USSR"
 SOV_national_front_ussr_desc: ""
 SOV_keep_things_as_it_is: "Keep Things As It Is"
 SOV_keep_things_as_it_is_desc: ""
 SOV_help_in_rebuild: "Help in Reconstruction"
 SOV_help_in_rebuild_desc: "Eastern Europe bled in the war with NATO, but now, under our banner, it will rise from the ruins! We will reach out to our brother nations, rebuilding cities, factories and roads. This aid is not just an act of solidarity, it is a strengthening of our common cause! Together with us, they will build a world of justice and equality. Our power will revitalize them!"
 SOV_crush_the_parasites: "Crush the Parasites"
 SOV_crush_the_parasites_desc: "The time of mercy is over! Eastern Europe awaits liberation from the last remnants of the fascist contagion. We will reach out to our brothers and help crush the parasites lurking in the shadows of the old world. The West has fallen, its ideals are dead, and those who dream of reviving this monster will find no mercy in us! Not a step back - the whole world of the future is with us!"
 SOV_rebuild_western_ssrs: "Rebuild Western SSRs"
 SOV_rebuild_western_ssrs_desc: "The ruins of war will not stop us! We are rebuilding the Western Soviet Republics, revitalizing them after the NATO bombings. Factories will start up again, roads will shine, and working people will regain their homes. This is not just rebuilding - it is the rebirth of our republican brothers, made stronger under the red banner!"
 SOV_destroy_separatism: "Destroy Separatism"
 SOV_destroy_separatism_desc: "National separatists who dream of undermining our unity will find no place in the new USSR! Their dreams of division will be destroyed by the iron will of the people. Ukraine and the Baltics will once again become an inseparable part of the Union, as they have always been and will always be. We will not allow the repetition of the mistakes of the past, for unity is our strength!"
 SOV_renewed_federation: "Renewed Federation"
 SOV_renewed_federation_desc: "The new Union must be just, and all its peoples will have equal rights! We will create a true federation, where every subject will be an equal participant in the great socialist project. From Moscow to the borders, no oppression, no inequality! Only equality will give us the strength that will lead us into the future!"
 SOV_centralize_power_ussr: "Centralize Power"
 SOV_centralize_power_ussr_desc: "A strong state needs a strong government! We will concentrate all the levers of control in the center, so that no region can become a threat to the common cause. Centralized management will ensure control and stability, and this is the only way we can go forward, sweeping away everything in our path! Power in one hand is the key to the victory of socialism!"
 SOV_enemies_in_the_west: "Enemies in the West"
 SOV_enemies_in_the_west_desc: "By defeating NATO, we destroyed Western neoliberalism, but now much more dangerous forces have risen in its place - real fascists and radical nationalists! These forces are hungry for revenge and will stop at nothing. We cannot relax! Our borders are under threat and a new conflict with the West is inevitable. Enemies in the West must know that we are ready to meet them with iron will and indestructible power!"
 SOV_friends_in_the_east: "Friends in the East"
 SOV_friends_in_the_east_desc: "The world in the East is on the threshold of a great conflict. China, our brother in spirit and ideals, is calling us into its struggle for a new world order. But should we join this maelstrom or remain neutral for the sake of the future of our republics? We must make a decision, because the fate of not only Russia, but of the whole of Asia depends on it. Who is our true ally in this great confrontation?"
 SOV_proletarian_internationalism: "Proletarian Internationalism"
 SOV_proletarian_internationalism_desc: "Proletarians of all countries, unite! This slogan has never lost its relevance, and today, as the fire of revolutions flares up all over the world, we will once again become the center of the world struggle for the rights of the working class. Our internationalism is not just an idea, it is our duty to the oppressed and the workers of all countries! We will support socialist movements on every continent because their victory is our victory. Only a united proletariat can finally crush capitalist tyranny!"
 SOV_our_common_homeland: "Our Common Homeland"
 SOV_our_common_homeland_desc: "The Soviet Union has been reborn, but its moral foundations have remained unchanged! We are one people, bound by a common history, culture and aspiration for a bright future. Neither borders, nor wars, nor ideological barriers can divide us. Our common Motherland is not just a union of republics, it is a symbol of invincible spirit and unity of peoples. Together we stand on the threshold of a new era, where justice and brotherhood triumph over division and hatred!"
 SOV_political_integration: "Political Integration"
 SOV_political_integration_desc: "Our allies in Eastern Europe must keep pace with us! Only full political integration, a common line and common goals will ensure the true unity of the socialist camp. We must become a united fist, ready to confront any threat! Without divisions and internal contradictions, we will move forward as a united force that will sweep the remnants of capitalism off the face of the earth!"
 SOV_free_interpretation_of_socialism: "Free Interpretation of Socialism"
 SOV_free_interpretation_of_socialism_desc: "Every country has the right to its own path to socialism. The diversity of approaches should not be a weakness, but on the contrary - the strength of our movement! Let each republic build socialism as it sees fit, preserving its independence. Different paths lead to one goal - a free and just society! We will let the allies go their own way, for this is the freedom of socialism!"
 SOV_first_soviet_election: "First Union Elections"
 SOV_first_soviet_election_desc: "The historic moment has come - the first election of the leader of the new USSR! This event will symbolize that the people are the true masters of the country. Socialism is not only a strong economy and a great army, but also the power of the people. Millions of citizens will choose the one who will lead the Union forward to a bright future! The first elections will be the beginning of a new democratic era, where every republic will be heard!"

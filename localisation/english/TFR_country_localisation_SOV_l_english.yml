 russia.907.t: "Konstantin Malofeev Opens a Network of Orthodox Gymnasiums"
 russia.907.d: "Recently, Konstantin Malofeev, a well-known businessman, Privy Counselor and patron of traditional values, opened new-style gymnasiums in many provincial towns during his tour of the Empire. These gymnasiums are modeled after the earlier St. Basil the Great Gymnasium, which opened in 2006. Their goal: "to give students deep knowledge and instill in them high moral ideals, to educate such people who will be proud of the national history, ardently love Russia and serve for the good of the country in the future, representing the new Russian elite". The Emperor approved of this activity and wished success in their studies to all future gymnasium students."
 russia.907.a: "Amazing."
 russia.908.t: "Tsarskoye Selo Lyceum Reopened for Students"
 russia.908.d: "The Tsarskoye Selo Lyceum in pre-revolutionary times was the forge of the real state elite of the Empire. Its pupils became outstanding officers, diplomats, officials and even poets and writers. The country needed talents and reliable personnel, and it nurtured them to serve itself from a young age. Now we are facing the same problem: the state is huge, and we need loyal qualified personnel. So why don't we revive this glorious tradition?"
 russia.908.a: "When will we see a new Pushkin?"
 russia.909.t: "Revival of Zemstvo Liberal Movement"
 russia.909.d: "The recent revival of zemstvas has brought back another of their distinctive features: the Zemstvo Liberal Movement, which was formed shortly after the administrative reform of Alexander the Second.Although heterogeneous in essence, all its members agree on several things: the country needs administrative decentralization, relaxation of censorship, and greater public involvement in the affairs of the state. Yes, although some believe that it was the conflict between the government and the zemstvo that led to the First Revolution, we are confident that we have learned from the mistakes of the past Empire, and such a horror will not happen again."
 russia.909.a: "Not bad."
 russia.910.t: "Nepolzhivshina"
 russia.910.d: "WHAT WAS IN THE RUSSIAN EMPIRE AND WHAT WE LOST AND NOW BROUGHT BACK:\n1. GUNS WERE MADE OF MILK FOAM. YOU COULD USE IT TO FEED THE SOLDIERS.\n2. GRAVITY WAS 80 PERCENT WEAKER. PEOPLE JUMPED FIVE RANKS IN THE TABLE OF RANKS AT A RUN.\n3. MAN LIVED AN AVERAGE OF 150-190 YEARS. THERE WERE NO DISEASES EXCEPT FOR EATING CAKES.\n4. IF YOU STUMBLED AND FELL IN THE STREET, MERCHANTS WOULD RUN UP, PUT MONEY IN YOUR POCKET, KISSED YOU ON THE LIPS, OFFERED YOU A DRINK AND ASKED YOU TO MARRY THEIR DAUGHTER.\n5. HARES AND PARTRIDGES WOULD FLY INTO THE FRYING PAN AT ONCE. IF YOU BUY BREAD, YOU WILL GET ADDITIONAL VODKA. YOU WERE AFRAID TO GO NEAR ANY PUDDLE: STURGEON WOULD JUMP INTO THE POT.\n6. PEOPLE WOKE UP AT NIGHT FROM A HEARTFELT GOOD PRAYER. IN THE MORNING EVERYONE WENT TO THE ORTHODOX CHURCH.\n7. THE GESTATION PERIOD WAS 4.5 MONTHS. CHILDREN WERE BORN 12-15 KILOGRAMS WITH BLOND HAIR AND CLEAR BLUE EYES AND STRONG-WILLED INTELLIGENT FACES - YOU COULD SEE THAT THEY WERE GOING TO ST. PETERSBURG TO STUDY.\n8. THE WATER IN THE VOLGA WAS AS SWEET AS MOLASSES. AND THE YENISEI CONSISTED OF DARK BEER.\n9. IT WAS MINUS 300 IN WINTER, AND EVERYONE WAS RUDDY.\n10. SOLDIERS GREW UP IN MILITARY SETTLEMENTS THE SIZE OF GRENADIERS. GRENADIERS WERE AS BIG AS A GUARDSMAN, GUARDSMEN AS BIG AS A HORSE, AND THE HORSE WAS LIKE A URAL METALLURGICAL MANUFRACTURE, AND IN IT THE PEASANTS PLAYED DURAK ACCORDING TO IVANOV'S METHOD - THEY FINISHED THE DECK AT THE FIRST MOVE!"
 russia.910.a: "Bravo!"
 russia.911.t: "Popularization of St. Petersburg Architectural Style"
 russia.911.d: "St. Petersburg is not called the "Northern Palmira" for nothing. One of the most beautiful cities not only in Europe but also in the world, St. Petersburg has always attracted the attention of creative people. Pushkin's "Bronze Horseman", many novels by Fyodor Mikhailovich Dostoevsky and many other works are dedicated to the City of Peter. And now there is a new fashion among city officials: to demolish the Bolshevik "panel blocks" and "humanniks", real crimes against art and urbanism, and replace them with something more pleasing to the eye: low-rise St. Petersburg houses, more suitable for the new, Imperial Russia."
 russia.911.a: "Great!"

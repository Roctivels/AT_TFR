 #Nadezhdin Economic Tree
 SOV_nadezhdin_plan: "The Nadezhdin Plan"
 SOV_nadezhdin_plan_desc: "When Nadezhdin came to power, he promised liberalization to all of Russia. And he is not going to stop with changes in the political sphere. It is time to restructure Russia's economy to better meet the aspirations of Russians."
 SOV_state_corporations_liberalization: "Liberalization of State-Owned Companies"
 SOV_state_corporations_liberalization_desc: "During Dmitry Medvedev's term, quite a few companies previously owned by oligarchs were taken directly into state ownership and their management was... Let's just say, far from optimal. Perhaps we should reconsider our management approach a bit and allow new ideas to refresh our revenue stream a bit?"
 SOV_restructuring_public_sector: "Restructuring of the Public Sector"
 SOV_restructuring_public_sector_desc: "In the course of our liberalization of state-owned companies, we have suddenly discovered that the organization of our public sector itself is far from optimal. Some of them can be safely merged, and some of them can even be gotten rid of without conscience. All the more so, maybe they would be more useful in private hands."
 SOV_public_private_partnership: "Public-Private Partnership"
 SOV_public_private_partnership_desc: "This is partly the merit of the previous administration, but the fact is the fact. Many private entrepreneurs are simply afraid to do business in Russia. Such feints with the taking away of labor and sweat grown businesses and their subsequent redistribution in favor of loyal oligarchs clearly did not benefit our economy. It is time to put an end to this unpleasant stigmatization and prove that the private sector and the state not only can do business together, but must actively support each other in order for the economy to remain healthy."
 SOV_diversification_state_revenue: "Diversification of State Revenues"
 SOV_diversification_state_revenue_desc: "For a long time, the Russian economy has been dependent on the resource sector and most of the revenues to the state treasury come from there. However, keeping all the eggs in one basket is a very dangerous strategy and it would not be superfluous to slightly secure the revenues of our state."
 SOV_comprehensive_support_medium_small_business: "Comprehensive Support for Businesses"
 SOV_comprehensive_support_medium_small_business_desc: "Medium and small businesses have always been in a bit of a precarious position in Russia. The state has always looked at the large corporations owned by oligarchs, either supporting them or nationalizing them, as happened during Dmitry Anatolyevich's last term. It's time to rethink the way we look at the economy and start comprehensive support programs! After all, everyone should have the opportunity to open their own coffee shop. Shouldn't we?"
 SOV_optimize_social_security: "Optimize Social Security"
 SOV_optimize_social_security_desc: "Social security has always been a significant item of our state's expenditures. And supporting citizens is certainly the right move. But the execution has left much to be desired. It is time to revise our approach and do it right. First of all, we will review the bureaucratic problems of allocation of funds, because sometimes the allocation is very complicated by these delays. Then we will reconsider who exactly and how much of the funds go to whom. Perhaps not everyone is equally deserving."
 SOV_affordable_housing: "Focus on Affordable Housing"
 SOV_affordable_housing_desc: "The housing issue has become a real scourge of our country in the 21st century. Most young citizens of our country are forced to live with their parents or rent apartments, unable to afford housing. Is this the case? It is time to launch affordable housing programs for all segments of our society!"
 SOV_demographic_revitalization: "Demographic Recovery Project"
 SOV_demographic_revitalization_desc: "Russia, just like the states that have made the 5th demographic transition, has faced a terrible truth. The population is aging and dying, and there is no one to replenish it because of the decline in birth rates! It is necessary to launch state programs to support the population and increase the birth rate so that Russia in the next century will not become a legacy of history.\n\nWe are Russians and we want more of us!"
 SOV_return_innovative_economy: "Return to an Innovative Economy"
 SOV_return_innovative_economy_desc: "For some time the Russian Federation has been following the idea of an innovation economy. The development of new markets and the principle of their diversity were the basis. Of course, our government later abandoned the development of this economic model for one reason or another, partly due to active confrontation with the West in economic terms, among other things. The time has come to return to these times. The Russian innovation economy is making a comeback."
 SOV_reject_cheap_labour: "Rejection of Cheap Labour"
 SOV_reject_cheap_labour_desc: "Any labor should be decently paid and sometimes attempts by business or even the public sector to "save money" on wages should be stopped. A satisfied worker is first of all a productive worker. Also, by achieving decent wages, people will be able to spend this money more actively, investing it back into the economy."
 SOV_technological_modernization_production: "Technological Modernization Of Production"
 SOV_technological_modernization_production_desc: "Our production methods are in, shall we say, not bad condition. Obviously, a weak economic power could not defeat the whole of Europe alone, but there is always room for growth."
 SOV_nurture_cadres_future: "Nurture The Cadres of the Future"
 SOV_nurture_cadres_future_desc: "It is easy to live today and think only of the current benefit. However, just as the old day will be replaced by the new, generations will change and the economy and the state will live on. So why don't we help our heirs in advance by creating effective methods of nurturing new cadres to replace the old ones. Let the new experience and proven methods create an economy for which we will not be ashamed and in the future will provide an influx of highly qualified specialists."

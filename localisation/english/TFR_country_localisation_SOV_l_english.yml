 SOV_rashkinism_idea: "Rashkinism"
 SOV_socialism_with_human_face_idea: "Socialism with Human Face"
 SOV_socialism_with_human_face_idea_desc: "\n\n\n\n£GFX_socialism_human_face_banner\n\n\n\n\n\n§Y"Not a dogma, but a guide to action."\n- F. Engels§!\n\nMultipartisanship, Political Pluralism, Democracy, Humanism - these are the principles that we Communists, representatives of the most progressive and constantly developing ideology, must adhere to in order to achieve our goals. The people should know that the Party is committed to the development and improvement of the socialist model, and not to a simple restoration of past times. Only taking into account the modern challenges and needs of society, taking the lessons of history, we will be able to achieve the victory of Lenin's ideas in our time!"
 SOV_partocracy: "Partocracy"
 SOV_partocracy_desc: "\n\n\n\n£GFX_partocracy_banner\n\n\n\n\n\n§Y"Our party, like every other political party, strives for political dominance for itself."\n- V. Lenin§!\n\nThe Communist Party is exactly the force that can unite our society in this difficult time, uniting people around common goals and ideals. We believe in the power of solidarity, mutual assistance and collective efforts. We believe that only through unity and cooperation can we achieve true prosperity. Only the Communist Party is ready to create a truly just and equal society of the future for all of us. If we are united, then together we can achieve the victory of Lenin's ideas in our time!"
 SOV_zyuganovism: "Zyuganovism"
 SOV_zyuganovism_desc: "\n\n\n\n£GFX_zyuganovism_banner\n\n\n\n\n\n§tZyuganovism§! is an ideology inspired by Gennady Zyuganov, leading Russia to new heights under the banner of the Communist Party. It is based on respect for the historical values of the Soviet Union, national pride and justice. Its main components are: §dSoviet Patriotism§!, §RMarxism-Leninism§!, and §ORussian Socialism§!. §tZyuganovism§! is a modern interpretation of classical ideologies adapted to the challenges of the modern world and aimed at creating a just and prosperous society for all its members."

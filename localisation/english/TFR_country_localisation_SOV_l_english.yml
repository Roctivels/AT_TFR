 SOV_neo_yeltsinism_desc: "\n\n\n\n£GFX_triumph\n\n\n\n\n\nIn the Russian state, Yeltsin will clearly play an important role as an ideological figure. The picture of a drunken grandfather who destroyed the communist colossus with a stroke of a pen is much more attractive than it seems now. "Russian Trump," who for the first time in how many years pursued a real national policy, who was able to hold and then strengthen the country in the difficult times of market reforms, a knight of the White House, who destroyed two waves of neo-Soviet red-brown scum - this is roughly the image that the man who was reviled by the vast majority will have in just a few decades. And it is not only because Russians are becoming more and more convinced of the truth of the Yeltsinist path of development - but also because of the rethinking of the very personality of Russia's first president. Boris Nikolayevich was and will be, probably in the whole Russian history, the closest ruler to the entire population, to all the people of Russia. Of course, there will be exaggerations and simple misunderstandings of Yeltsin's policy - but does it matter when we are talking about a president who proclaimed a crusade against terrorism before 9/11 and fanned the flames of the people's war against it? At the same time, unlike Lenin's image in the Soviet state, Yeltsin's image will not become a herbarium object, after whom everything from poultry farms to nuclear icebreakers will be named. No, the image of Boris Nikolayevich must become a symbol of the passion and strength of the Russian people - not an old man from portraits, but a man whose name is given only to those objects that "What makes the Russians feel good makes the Germans die""

 #Wagner Focus
 SOV_march_of_justice: "March Of Justice"
 SOV_march_of_justice_desc: "The Wagner PMC managed to defeat the troops controlled by the traitor Shoigu and triumphantly enter the heart of the Motherland, Moscow...It is not enough to have one large city under your control, it is necessary to have total control over the whole country in order to restore justice within the Homeland and take revenge on the Europeans for humiliation and meanness against Russia. Our March for Justice is not over yet...\n\n is just beginning."
 SOV_destroy_traitors: "Smash The Vermin"
 SOV_destroy_traitors_desc: "Despite our victory, there are still many traitors inside our country who are ready to sell their homeland for Western money. Liberals, communists, disloyal officials - all these elements are potentially dangerous to our government, and therefore we must deal with them by any means possible.\n\nLet's bend it with a sledgehammer, but Russia will be eradicated from betrayal from within."
 SOV_secure_government: "Secure The State Apparatus"
 SOV_secure_government_desc: "Despite our victories, it is impossible to rule such a huge country as Russia by force of arms alone. For the success of our entire enterprise, we need not only loyal fighters, but also loyal officials who will be able to take work with the public and small matters into their own hands. A strong front depends on a strong rear."
 SOV_solidify_wagner_reign: "Solidify Wagner's Reign"
 SOV_solidify_wagner_reign_desc: "Now that the voice of traitors has been silenced and the state apparatus has been brought under control, we can begin a new stage: the politicization of our cause. There are many ideas about how to name our party and what ideals it will adhere to. It can have any wrapper, but the main thing is that radical patriotism and unquestioning obedience will remain the cornerstone of the path that Prigozhin will choose.\n\nThe new Russia has no place for weakness and the "pluralism of opinions" so beloved by the West."
 SOV_wagnerite_corporatism: "Wagnerite Economics"
 SOV_wagnerite_corporatism_desc: "The Russian economy of the past was a market economy with great state influence. State-owned companies such as Gazprom, Rosneft and the like brought an unimaginable amount of money to the budget by selling energy resources to the West and East.\n\nNow times have changed, and direct government has proved ineffective. Therefore, Prigozhin decided not to bring the state into corporations, but corporations into the state. The power of corporations under the control of the right people will be able to lift the Russian economy from its knees."
 SOV_fierce_remilitarization: "Fierce Re-Militarization"
 SOV_fierce_remilitarization_desc: "Europe intervened in our holy campaign to "demilitarize" our country. Their plan is obvious: to destroy the economy, destroy the army and enslave our people. We are only defending ourselves in the face of the threat of Euro-imperialism and Russophobia. This is why industry must embark on a war footing: more steel, more lead, more aluminum and other resources! Multibillion-dollar government orders for tanks, planes, helicopters, rifles! The right people, of course."
 SOV_military_corporations: "Militarized Corporations"
 SOV_military_corporations_desc: "Corporations are the main pillar of our economy. And like everyone else in our country, they must be prepared for the coming revenge. The introduction of strict discipline and unquestioning subordination to higher-ups will benefit corporations. The whole of Russia must mobilize for military exploits at the front and in the rear!"
 SOV_demolish_cronyism: "Demolish Cronyism"
 SOV_demolish_cronyism_desc: "The practice of relatives moving up the career ladder is not new to Russian society. But the practice of raising matchmakers, brothers, nephews, and others carries great inefficiency in public administration. This is why characters like Shoigu have infiltrated the Medvedev system.\n\nit is necessary to severely punish any manifestations of nepotism among middle-level officials. In the new Russia, there is a place only for the effective...and the faithful."
 SOV_prigozhin_viceroys: "New Corporate Viceroys"
 SOV_prigozhin_viceroys_desc: "For centuries, officials have been the objects of ridicule among the common people for their thievery and corruption, which is fair. The state apparatus, even with our initiatives, remains insufficiently effective. Therefore, it would be logical to introduce corporate practices into the bureaucracy. Middle-level managers from corporations close to us will replace disgraced and ineffective officials."
 SOV_enforce_class_collaboration: "Enforce Class Collaboration"
 SOV_enforce_class_collaboration_desc: "The struggle between the strong and the weak, rich and poor, workers and capitalists is the nonsense of Marxist traitors, with which they infected the minds of Russians. In fact, we all have one goal - the prosperity of our Homeland. Ivan, a simple worker from Tver, and Vladislav Yurievich, the owner of the factory where Ivan works, all care about strengthening and increasing the power of Mother Russia.\n\nthat's enough boozing and destabilizing the situation with your demands for decent pay and lowering the working day from 14 hours to 10. Do you want to lose another war?"
 SOV_subsidize_populistic_welfare: "Subsidize Populistic Welfare"
 SOV_subsidize_populistic_welfare_desc: "People are the main resource of every country. Without a normal social sector, all attempts to build popular support will collapse like a house of cards from a light breeze. And we are no exception.\n\nFor a strong social network is a very expensive pleasure, and we need funds, first of all, for the military-industrial complex. Some advisers offer various "social" initiatives: giving money to the elderly; eliminating unemployment by using it in various projects, and much more. The Russian people should see that the state takes care of them."
 SOV_prigozhin_ruble: "Prigozhin's Ruble"
 SOV_prigozhin_ruble_desc: "Until the Second American Civil War, the ruble was pegged to the dollar, but due to the chaos that befell the global economy, it was decided to switch to the so-called "oil ruble." For the time being, the scheme was perfect - there is chaos in Arabia, chaos in America, Russia turns out to be the main exporter of oil, and the exchange rate is carried out in the national currency.But now that the flow of money from abroad has dried up, there is nothing to support the ruble, and we are faced with the same problem as in the 90s: hyperinflation. But the solution was found quickly: to return to the gold standard! New rubles will be issued-"prigozhinki", which will be able to restore much-needed stability to the economy."
 SOV_rapid_industrial_privitization: "Rapid Industrial Privatization"
 SOV_rapid_industrial_privitization_desc: "Privatization in the 90s proved to be extremely painful for the Russian people. Due to the illiterate policy of the state, millions of people suddenly found themselves below the poverty line. And although more than 30 years have passed since these events, an imprint has remained in the national memory. On the other hand, the remaining state-owned enterprises turned out to be quite inefficient. And because of their inefficiency, not only the state suffers, but also our "partners" from among large industrialists. So our people will have to tighten their belts and accept that we are giving enterprises to corporations for management."
 SOV_autarkic_economy: "Autarkic Economy"
 SOV_autarkic_economy_desc: "One of the main weaknesses of Putin's and Medvedev's Russia was its excessive dependence on mineral exports, which fed the pockets of the oligarchs and bureaucrats. Instead of producing advanced technologies ourselves, we bought them from the West and from the East, which led us to defeat. From now on, we will rely only on ourselves, and no one else. All of Russia's resources will belong to her alone, and to no one else... except for those close to Prigozhin, of course."
 SOV_lords_of_war: "Lords Of War"
 SOV_lords_of_war_desc: "What difference does it make what people think about the war, the judge said. There is and will be a war. You might as well ask what people think about the stone. There has always been a war. She was even before man, the war was waiting for him. The main craft was waiting for its main performer.\n"For most people, war is about fear, terror, destruction, and death. But only we, those who stand above the battlefields and factories that produce everything for the front, have a different idea of it. For us, war is the greatest game, with a stake that is worth any sacrifice. Yes, we are called "merchants of death" and other negative phrases, but all sorts of philosophers and other people of the pen are wrong. They don't understand that there, beyond our border, are the industries and resources of Europe, waiting for our arrival.\n\nFor us, war is a business. And our business will be going well in the coming years."

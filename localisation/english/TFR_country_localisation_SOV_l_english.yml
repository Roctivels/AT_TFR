 russia.1005.d: ""
 russia.1005.a: "Bring him in, he's social-oriented ideas are interesting."
 russia.1005.b: "Bring him in, he's tradition-oriented ideas are interesting."
 russia.1005.c: "He should stay in Vologda, we'll watch him."
 
 russia.2000.t: "Ideology Of Prigozhin's State"
 russia.2000.d: "When the Medvedev regime fell, many of our citizens fell into political madness. Someone turned to radical communism and anarchism. Someone bought into the speeches of pro-Western talking heads who were trying to sell our citizens an impossible liberal dream. Of course, both of them were crushed by our iron fist one way or another. But people always need ideas and ideals to hold onto and to die for. So it would be nice to come up with an official designation of the new ideology of our state.\n\nThe first and most obvious option is Wagnerism. It was Evgeny Viktorovich and the army devoted to him who brought order to the destroyed country and dispersed the crooks and thieves, restoring order. Soldier's brotherhood and army ideals in such a system will be the ideal foundations for the structure of society. However, this option may be too person-centric and will certainly alienate a certain audience from us. And liberal circles will accuse us of being leaders. But who is interested in the opinion?The second option is soldier's socialism. A kind of development of the ideas of war communism during the 20s of the last century. Only true patriots and brave defenders of the fatherland will be worthy of social benefits and will be able to live happily. While traitors and parasites will be deprived of a feeding trough. This option will help us attract a social-patriotic audience, but it will alienate some far-right movements.The third and final option is radical patriotism. The origins of this idea lie in Putin's ideology and urge not to divide the history of Russia into periods, and even more so not to abandon them. From the Empire to the Federation, the Russian people fought for their peace, and we will not allow someone to take our homeland without a fight! This option is the most moderate and will allow us to involve a large number of people in our righteous cause. However, it can alienate individual radicals from both sides of the fence.\n\n In any case, the choice is yours."
 russia.2000.a: "Aggrandize Prigozhin's army and his military abilities."
 russia.2000.b: "It will be our socialism, for true fighters and those who can earn it."
 russia.2000.c: "General ultra-patriotic feelings is something that we could utilize." 

l_english:
 #Events
 russia.1.t: "Alexei Navalny Admitted to Hospital"
 russia.1.d: "Russian opposition figure Alexei Navalny is unconscious in hospital suffering from suspected poisoning, his spokeswoman has said. The anti-corruption campaigner fell ill during a flight and the plane made an emergency landing in Omsk, where doctors said he was in a coma and they were trying to save his life. His team suspects something was put in his tea at an airport cafe. The Kremlin said that it wished Mr Navalny a "speedy recovery".\n Mr. Navalny, 44, has for years been among President Vladimir Putin's staunchest critics. Mr Navalny was on a ventilator and in a coma, and that the hospital was now full of police officers. All of his belongings were being confiscated, his wife explained. She also said that doctors were initially ready to share any information but then they later claimed the toxicology tests had been delayed and were "clearly playing for time, and not saying what they know"\n."
 russia.1.a: "Watch his condition closely."
 russia.2.t: "Mass Protests over arrest of Alexei Navalny"
 russia.2.d: "Tens of thousands of protesters ignored extreme cold and police warnings to demand the release of Kremlin critic Alexei Navalny on Saturday. Navalny had called on his supporters to protest after being arrested last weekend as he returned to Russia from Germany for the first time since being poisoned with a nerve agent he says was slipped to him by state security agents in August.\n\nBut protesters defied the ban and, in at least one case in temperatures below -45 Celsius, turned out in force. Leonid Volkov, a Navalny ally, called on them to do the same next weekend to try to free Navalny from what he called "the clutches of his killers". In central Moscow, where Reuters reporters estimated up to 40,000 people had gathered in one of the biggest unauthorised rallies for years, police were seen roughly detaining people, bundling them into nearby vans. Some protesters chanted "Putin is a thief", "Disgrace" and "Freedom to Navalny!""
 russia.2.a: "Crush those Western Cockroaches"
 russia.11.t: "Large Protest in Khabarovsk"
 russia.11.d: "Supporters of Governor Sergey Furgal, who was arrested for organizing murders, staged unauthorized protests in Khabarovsk Krai. The largest unauthorized action took place in the center of Khabarovsk: protesters gathered on Lenin Square, near the governor's administration and the regional government, then marched through the city's central streets and returned to the square, where they continued the rally. According to the local government, between 15,000 and 20,000 people took part in the march. The police did not detain anyone. The rally, which lasted about four hours, collected signatures in support of Furgal and gave the floor to anyone wishing to speak. Khabarovsk City Hall did not receive applications for the rally and could not approve it, as all mass events are banned due to the pandemic. Also an unauthorized march was held in Komsomolsk-on-Amur, more than a thousand people rallied there. And in the town of Bikin, about 50 people took to the streets in support of Furgal."
 russia.11.a: "Watch the situation closely."
 russia.11.b: "The people speak!"
 russia.12.t: "Police Breaking up Opposition Rallies"
 russia.12.d: "Violence has erupted at multiple political rallies between police and supporters of LDPR and CPRF. Initially the skirmishes were isolated between the two parties until the street fights naturally turned into city block long brawls. Riot police in their dozens were dispatched to break the fighting but their presence has only furthered the violence. Nearly 20 people have been reported dead from these fights and countless more injured."
 russia.12.a: "Order must be kept!"
 russia.13.t: "Ramzan Kadyrov Supports Medvedev"
 russia.13.d: "The head of the Chechen Republic has announced his support for United Russia Candidate, Dmitry Medvedev. This move comes as no surprise as Kadyrov himself was very close to the former administration. Regardless, his support will certainly be of use in the future."
 russia.13.a: "Well done."
 russia.14.t: "Party of Pensioners support LDPR"
 russia.14.d: "In recent congress of PoP, their leaders announced support for LDPR's candidate. In their speeches, they highlighted Zhirinovsky's monetary support for the older populace, and LDPR's social programs that supported betterment of elderly housing. In the end, they urged all their voters, and voters of allied parties to vote for LDPR, and commit joint election campaigns around Russia."
 russia.14.a: "Interesting."
 russia.15.t: "OMON Break up Protest"
 russia.15.d: ""
 russia.15.a: "Horrible!"
 russia.16.t: "OMON Break up Protest"
 russia.16.d: ""
 russia.16.a: "Horrible!"
 russia.17.t: "Dugin Announces Russian Ambition"
 russia.17.d: "In a televised broadcast, Aleksandr Dugin announced now more than ever was the time for Russia to further position itself on the global stage. His speech was met with majority positive views among those in the Eurasian Party and surprisingly many outsiders considered the speech well done. Dugin had also briefly talked about the possibility of being lifted to the Council of the Federation."
 russia.17.a: "A New Era Begins"
 russia.18.t: "First COVID cases in Russia"
 russia.18.d: "The first Coronavirus cases have been reported from citizens returning from trips to China. While the number of infected is currently low, we must not neglect this issue lest it spiral out of control."
 russia.18.a: "This is our problem now"
 russia.19.t: "Demonstrations Turn Violent"
 russia.19.d: "What started out as relatively peaceful demonstrations across the federation quickly spiraled into riots. Protestors are frequently hurling rocks, molotovs, and fireworks at police and riot officers. Cars and several government buildings have been burnt. Many on social media were quick to point fingers at Dugin for supposedly sparking and promoting several rioters into attacking government workers in an attempt to gather more support and control over the Council of the Federation. Others called him a fascist which Dugin was quick to denounce as he stated the values of his party honored the 20 million lives lost in the struggle against Nazi Germany."
 russia.19.a: "Order Will Soon Come."
 russia.20.t: "Vladimir Putin gets sick with COVID-19"
 russia.20.d: "After his last trip to the Caucasus, the President contracted the COVID-19 coronavirus infection. His condition is now being monitored by the best doctors."
 russia.20.a: "Disturbing."
 russia.21.t: "Dugin Orders State of Emergency."
 russia.21.d: "Protests have gained significant traction since Aleksandr Dugin assumed the role of president of the Federation. Attacks against government personnel increased, buildings burnt, families threatened. Officers in the capital had a difficult time in dispersing the rioters. Even in Siberia and the Far East, Rioters shut down roads to prevent army and outside police from reaching over extended police officers in many cities. Dugin was quick to take action. Protest leaders must be found and dealt with."
 russia.21.a: "The Time has Come."
 russia.22.t: "Russia Demands Withdrawal from EU"
 russia.22.d: "The Russian government has issued an official statement that the Finnish Government ceases contact with EU members and a full membership withdrawal."
 russia.22.a: "We have no choice."
 russia.22.a: "We didn't forget 1941."
 russia.23.t: "Finland Accepts Terms"
 russia.23.d: "Finnish diplomats were pressured into accepting the terms we presented. They have withdrawn from the EU"
 russia.23.a: "Amazing."
 russia.32.t: "Edward Snowden Releases Dossier"
 russia.32.d: "It appears Edward Snowden cannot keep his grubby little hands off anything. He has released a new dossier online supposedly detailing the true events that lead up to the death of Vladimir Putin. The documents accused Aleksandr Dugin of orchestrating the assassination. Local police soon arrested Snowden and measures are being taken to suppress the spread of this dossier."
 russia.32.a: "Little rat."
 russia.33.t: "Edward Snowden Disappears"
 russia.33.d: "The correctional facility Edward Snowden was imprisoned at has reported his sudden disappearance while in transport to another facility. The convoy which included two jeeps and a bus containing Snowden began it's journey at an undisclosed location. The convoy had just passed the town of Mystichi when all contact was lost. Local law enforcement are baffaled and fingers are already being pointed at Dugin."
 russia.33.a: "Where did that bastard go?"
 russia.37.t: "Reviewing the Military Budget"
 russia.37.d: "After a tumultuous year, we are faced with numerous threats and obstacles, both domestic and foreign. On one hand, our economic troubles at home brought on by the COVID-19 pandemic and the unrest brought by the pension reform have stirred up calls for internal investment. On the other hand, military intelligence indicates massive unrest in our adversary, the United States, and wishes for more money to exploit this weakness."
 russia.37.a: "Increase Our Domestic Spending"
 russia.37.b: "Increase Our Military Budget"
 russia.38.t: "Increased Russo-Chinese Ties"
 russia.38.d: "As a result of recent negotiations with Chinese officials, we have managed to sign many profitable treaties regarding technological and trade cooperation between our countries. Hopefully this partnership will continue as it is proving to be quite beneficial for our economy."
 russia.38.a: "A Toast to our Chinese Friends!"
 russia.39.t: "Russian Economy Report: 2019"
 russia.39.d: ""
 russia.39.a: "There is much work to be done."
 russia.40.t: "Lukashenko Requests Our Aid"
 russia.40.d: "Our close Belarussian Counterpart Alexander Lukashenko has been facing months of relentless protests from CIA backed Color-Revolutionaries. Despite his best efforts, it seems like he is on his final limbs, as anti-government protestors march on government buildings. In a private phone call with President Putin, he urged for Russian intervention and aid, in exchange for finally agreeing to the Union State."
 russia.40.a: "Onwards to Minsk!"
 russia.40.b: "We cannot risk further provocation"
 russia.41.t: "The West Sanctions Us!"
 russia.41.d: "Following our peaceful operation in Belarus, the UN held a session to condemn the military action against peaceful demonstrators. Unanimously, our enemies voted to impose a new set of sanctions. Our representative opposed the sanctions, calling out previous hostile actions by NATO and demanding where their sanctions where. Regardless, these sanctions will prove fruitless..."
 russia.41.a: "We Shall Endure"
 russia.42.t: "The Moscow Airport Attack"
 russia.42.d: "Tragedy struck today in Moscow, as 10 armed, masked men stormed past security and opened fire on the crowd in the Sheremetyevo International Airport this morning. The attack lasted 25 minutes until Russian Special Forces arrived and were able to apprehend the perpetrators. Unfortunantely, 42 people lay dead, including 6 brave police officeres who gave their lives in the defense of the people. Condolences have come across from all across the world, as we morun toghether for the victims of yet another attack."
 russia.42.a: "Thoughts and prayers for the victims"
 russia.43.t: "Ukraine withdraws from Minsk Protocol"
 russia.43.d: "The provocative Kiev regime has announced its withdrawal from the Minsk Protocol. The decision came after 'continued provocation from the Federal State of Novorossiya'. This is yet another baseless claim from the Zelensky regime to trample on the rights of the Russian minority"
 russia.43.a: "A wreckless endevour"
 russia.44.t: "Mikhail Mishustin announces early election"
 russia.44.d: "Acting President Mikhail Mishustin still did not dare to serve out his current term and announced a new presidential election in which he does not see himself as a candidate."
 russia.44.a: "What's next?"
 russia.45.t: "Preparations for the next Presidential Election"
 russia.45.d: ""
 russia.45.a: "Side with CPRF"
 russia.45.b: "Side with LDPR"
 russia.45.c: "Side with United Russia"
 russia.45.d: "Side with Eurasia Party"
 russia.45.e: "Side with Russia of the Future" #датамайнеры хуй сосите
 russia.46.t: "CPRF Wins Elections"
 russia.46.d: "In a monumental electoral event that will undoubtedly be etched in the annals of Russian history, the Communist Party of the Russian Federation has emerged victorious, sending ripples of jubilation through the streets of Moscow and other major urban centers. The sight of victory banners fluttering in the wind alongside Soviet flags was a poignant symbol of the resounding triumph that had been achieved.\n\nDespite the euphoria that engulfed the nation, there were dissenting voices that sought to cast a shadow of doubt over the legitimacy of the election results. Allegations of fraud and unfounded conspiracy theories were concocted in an attempt to undermine the significance of the Communist Party's win. The Western press, ever quick to sound alarms and raise specters of fear, painted a picture of the Communist Party as a bastion of nationalists and revanchists, intent on restoring the USSR and posing a grave threat to Western imperialism.\nHowever, amidst the cacophony of skepticism and fear-mongering, one undeniable truth remained: the people had spoken. Through their votes, they had expressed a fervent desire for the resurgence of the glorious Union that once stood as a beacon of hope and strength."
 russia.46.a: "Communists, Forwards!"
 russia.46.b: "Faster! Faster!"
 russia.47.t: "LDPR Wins Elections"
 russia.47.d: "These elections are poised to mark a historic turning point in the political landscape of Russia. After years of tireless efforts, Vladimir Zhirinovsky and his LDPR party have emerged victorious, triumphing over the remnants of the Bolshevik regime and the web of corrupt opportunists that have plagued the nation.\nFollowing the announcement of the election results, Zhirinovsky took center stage to deliver one of his trademark impassioned speeches. He spoke fervently about the need to usher in a new era for Russia, one that would see the country restored to its former glory and greatness.\nIn the eyes of Western political analysts, our victory has been labeled as the "Biggest Geopolitical Catastrophe." They caution against dismissing us as mere populists, warning that we are not merely a party of ultranationalists but a force to be reckoned with, determined to revive Russia's imperial legacy. It seems that this time, their warnings may hold some truth.\n\nThe destiny of Russia now rests firmly in the hands of Zhirinovsky and his LDPR party, as they embark on a mission to reshape the country's future and reclaim its status as a global powerhouse."
 russia.47.a: "Power and Strength - Great Russia!"
 russia.48.t: "EP Secures Control"
 russia.48.d: ""
 russia.48.a: "Our plans can move forward"
 russia.49.t: "United Russia Wins Elections"
 russia.49.d: "In a fiercely contested electoral battle that captured the attention of the nation, United Russia has emerged victorious, sparking a mix of jubilation and disappointment among the populace. The charismatic Dmitry Medvedev, a trusted confidant of Vladimir Putin, captivated the hearts of many Russians with his impassioned speeches and unwavering commitment to upholding the legacy of his mentor. The Russian electorate, in a decisive display of confidence, placed their faith in a stable and dependable government, opting for continuity rather than the uncertainty posed by extremist factions on both ends of the political spectrum.\nThe Western media, however, viewed Medvedev's victory with a sense of trepidation, highlighting his increasingly anti-Western and anti-globalist rhetoric over the years. They acknowledged that the Medvedev of 2020s is not the same figure who assumed office in 2008, cautioning that the West should brace itself for heightened tensions and potential confrontations in the coming years. With Medevedev now in charge, he'll do everything to finish what Vladimir Vladimirovich Putin has started."
 russia.49.a: "Vpered, Rossiya!"
 russia.50.t: "SRZP Wins Elections"
 russia.50.d: "To the surprise of many, our party - JR-FT was able to achieve victory in the latest elections, and now Sergey Mironov stands as the new president of our great country. There is much work to be done! Russia suffers from a corrupt oligarchy and stagnant development, and to make matters worse, NATO expansion and their puppet government in Kiev threaten the very existence of our nation.\n"A Just Russia," a socialist party, must take decisive action against the ills of society. We must also carefully consider the path the Russian political system must tread. It is a critical time for our nation, and we must work tirelessly to bring about positive change and secure a bright future for all Russian citizens."
 russia.50.a: "The people have spoken"
 russia.51.t: "Investigation Into the Death of the President"
 russia.51.d: "Is war coming?"
 russia.51.a: "It was a radical member of the Communist party!"
 russia.51.b: "A fanatic follower of Zhirinovsky!"
 russia.51.c: "The president died of natural causes."
 russia.52.t: "Medvedev calls for Russian unity"
 russia.52.d: "In the light of recent events that put all of Russia into shock, deputy chairman of the Security Council Dmitry Medvedev made a statement urging Russian citizens to not give in to panic and to stay united, stating that people's unity is what always let Russia overcome any hardships."
 russia.52.a: "It is pointless to divide ourselves"
 russia.53.t: "Zhirinovsky hands out money to the poor"
 russia.53.d: "Today LDPR leader Vladimir Zhirinovsky was seen generously handing out money to people on the Red Square. When asked why, Zhirinovsky said that "we are all serfs... Rightless, horseless and homeless", and that people need all the help they can get.\n\nWhile seen as humorous or humiliating by some, this action certainly improved Zhirinovsky's prominency in the upcoming elections."
 russia.53.a: "Amusing"
 russia.54.t: "LDPR and CPRF rally against corruption"
 russia.54.d: "Seemingly at random, supports of both parties at rallies banded together in protest against United Russia. Chanting phrases against Dmitry Medvedev and his cabinet for their corruption and endless ties to oligarchs. The campaign continued online with a strange leftist-rightist alliance forming. Despite their hatred of each other, their goal of success is only hampered by one entity..."
 russia.54.a: "The enemy of my enemy is my friend"
 russia.55.t: "Belarus Allowing flights from Syria"
 russia.55.d: ""
 russia.55.a: "Interesting"
 russia.56.t: "Friends in high places"
 russia.56.d: "To keep you is no benefit, to destroy you is no loss."
 russia.56.a: "No, it's so over."
 russia.57.t: "[SOV_cprf_candidate] restores RSFSR"
 russia.57.d: "A spectre is haunting Europe, the spectre of communism. All the powers of old Europe have entered into a holy alliance to exorcise this spectre - the Oligarchs and United Russia, Baerbock and Colonna, German radicals and American police-spies.\n\nDespite the death of the Union in 1991, it seems like a spectre, the Union has risen from the dead. Today the newly elected president [SOV_cprf_candidate], by approving a law renaming the country, have declared the end of the Russian Federation, and the rebirth of the Russian Soviet Federative Socialist Republic.\n\nAnnounced in front of a domestic crowd, the anthem of the Soviet Union was aired for the first time in over three decades, sung in tandemn with crowds throughout the streets. Although the domestic attitude is jubiliant with a hopeful return to superpower status and the glory of the old Union, the international community has been mixed. Reactions from the former Eastern Bloc has been the harshest, with the Baltic nations warning against repeating the mistakes of the 20th century, and Ukraine denouncing the move."
 russia.57.a: "All Power to the Soviets!"
 russia.58.t: "Annexation of Abkhazia and South Ossetia"
 russia.58.d: "Our country grows!"
 russia.58.a: "Hoorah!"
 russia.59.t: "Invitation to rejoin USSR"
 russia.59.d: ""
 russia.59.a: "Yes"
 russia.59.b: "GO FUCK YOURSELF"
 russia.60.t: "Launch of Operation Aleksandr"
 russia.60.d: "At [GetDateText], our Airborne forces took off from multiple air bases deep into NATO airspace. Many within the general staff questioned the operation, calling it desperate, indeed this mass airborne operation is the largest since the Great Patriotic War. Flying without callsigns or under false civilian identification, They successfully penetrated NATO air defenses. Believing them to be civilian flights fleeing the chaos, Polish forces were taken with complete surprise as their air bases came under effective attack."
 russia.60.a: "May they serve us well"
 russia.61.t: "Polish Paramilitary Uprising"
 russia.61.d: "As our ground forces have advanced through Poland, we've recieved increasing reports of paramilitary guerrilla activity in occupied territory. Fighting against them has proven difficult, intercepted radio transmissions have revealed their rigid organized structure. Companies have formed from each administrative region of Poland."
 russia.61.a: "They were crushed before, we'll do it again..."
 russia.62.t: "Russkiy Mir"
 russia.62.d: "It has been three long decades since the Soviet Union fell, and the Russian state has slowly worked to rebuild itself from the chaos of the 1990s. Under the leadership of Vladimir Putin, our country has regained some of its international standing, though we are still far from our former prestige. Russia faces opposition from the so-called "civilized western world," who criticize us as "backward" and "despotic" while preaching "liberty" and "freedom." In reality, they merely seek to divide and conquer. We stand in opposition to them as proponents of a new geopolitical outlook - Multipolarity. Currently as the United States is looking elsewhere abroad and internally, the centre of Russophobia is now shifting towards Europe as their Globalist Elite wish to use Ukraine as a spearhead against us, now making conflict inevitable for which we must prepare for.\n\nWe are working to fight for our sovereignty and way of life against the "Golden Billion" colonialists and their attempts to destroy all those who resist them. We will continue to support anti-Globalist forces through continuing to send aid to those in the Middle East and Africa who think alike. In this increasingly unstable and angry world, we might just get what we want, or lose everything. Our mighty maze of Kruschevkas may harbour many people with diverse views, but all patriots share a common thought..."
 russia.62.a: ""Russia must survive!""
 russia.63.t: "FILE NO.478: DEPORTATION OF NON-RUSSIANS"
 russia.63.d: ""
 russia.63.a: "Excellent"
 russia.64.t: "Appointing a Director of Gosplan"
 russia.64.d: "With the recreation of Gosplan needed to direct our economy, we must also choose a leader for such an important structure.\n\nWe have multiple options. The first one is Nikokay Kolomeitsev, who has many times proven his organizational abilities in our struggle.\n\nOur second possible choice is Vladimir Kashin, an old but reliable, highly educated party official.\n\nFinally, some have pointed out that Aleksandr Galushka, author of a book about Stalin's economic system and a former statesman, could potentially be very effective at the job, although he does not seem to be a popular candidate within the party.\n\nWhat should our choice be?"
 russia.64.a: "Nikokay Kolomeitsev will do us well."
 russia.64.b: "Vladimir Kashin knows what he's doing."
 russia.64.c: "Alexandr Galushka's economic-historic knowledge is much needed."
 russia.65.t: "Privet Malyshka"
 russia.65.d: "Dearest Yankova,\n\nI hope this letter finds you well. I am sorry for not writing to you too much - we have been moving constantly, and I find myself without the time to sit and rest more often than not. I hope that things have not been too difficult at home for you. Is your brother doing well?\n\nYou sensed that I was sugarcoating things in my previous letter, so I will be straightforward this time - I cannot describe in words how miserable things are here. Everywhere we go, I see cities and towns in ruin, homes where people live or lived, trashed and overturned, as if they were drug dens. The frontline is immeasurably sporadic, and I cannot determine whether we are winning the war or not. We gain ground in some places, and lose ground in others just as quickly. Most places we contest are hard-fought over, and the gunfire rarely ever stops. The noise is killing me worse than the bullets and artillery shells are. I can barely sleep when I am not on guard duty.\n\nThe men I told you about in my previous letter, Koptsev and Stepanov, died some time ago. Their deaths are the reason I have been unmotivated to write to you, as well as being the reason I am hesitant to make any more friends here. Originally, I believed it to be an exaggeration - but it is an unfortunate fact that anyone can meet their end at any time. I am sorry that Stepanov's job offer for your brother is no longer standing.\n\nI miss home. I miss when I was awoken by the sounds of the birds, rather than the sounds of distant explosions. But I miss you, more than anything. My only wish is for the war to soon end, so I am once again able to embrace you as we used to. With luck, I will be able to do so in time.\n\nYour love,"
 russia.65.a: "Nikolayev Antonovich"
 russia.66.t: "Sergey Furgal Arrested"
 russia.66.d: "The Governor of Khabarovsk Krai was arrested overnight on charges of being connected to a series of alleged murders in the early 2000's and allegations of corruption by a detachment of police officers from Moscow. The arrest was met with immediate backlash from the public, with some initial protests erupting on Lenin Square demanding for Furgal's release and reinstatement as governor of Khabarovsk Krai, as his arrest is widely seen as a political move and the evidence has been heavily criticized for having little to no weight. Sergey Kravchuk - the mayor of Khabarovsk - has went on to condemn the protests for their breach of the Covid-19 lockdown, and has went on to support the arrest much to the chagrin of the public."
 russia.66.a: "Justice will be served."
 russia.67.t: "Protests Skyrocket over Sergey Furgal's Arrest"
 russia.67.d: "The recent arrest of Sergey Furgal has seen a massive backlash from the public - especially from the former governor's home region of Khabarovsk. Although the initial protests in Moscow over the arrest at Lenin Square had been relatively tame, over the last week the protests have grown to full-sized marches opposing the government sanctioned arrest, with the same levels of protests being organized in Russia's far eastern krais on the Amur. Police forces had been deployed to monitor the evolving situation, however it has become increasingly unlikely that the protests will die down in what is seen as a major breach of governmental power."
 russia.67.a: "These fools are breaching the lockdown!"
 russia.68.t: "Zhirinovsky's Inaction Faces Backlash"
 russia.68.d: "Vladimir Zhirinovsky - the leader of the LDPR - saw backlash over his inaction over the extremely unpopular arrest of Khabarovsk Governor Sergey Furgal. The most recent political polls saw a slump in the Liberal Democrat party's popularity as a result of the ongoing controversy, with many disillusioned supporters of the party seeing this lack of action as Zhirinovsky's move as a means of staying in Vladimir Putin's favor. While Zhirinovsky and his party refuse to comment, the headquarters of the party saw some minor demonstrations in Moscow opposing the party's perceived support of the government."
 russia.68.a: "Zhirinovsky's taking a political bullet for us."
 russia.69.t: "Zhirinovsky Declares Support for Sergey Furgal"
 russia.69.d: "Likely from public pressure and Putin's recent death, Zhirinovsky and the LDPR have threw their hat in the protests against the government over the arrest of Furgal and have declared full support for the opposition, demanding for Furgal to be released. While this move has won back much of the popularity that the party had lost due to their initial inaction, the move is still seen by many as Zhirinovsky's attempt to win back support in the upcoming elections , while serving as a means to dogpile on the weakened position of the United Party following the death of their long time leader and president."
 russia.69.a: "Furgal must be released!"
 russia.70.t: "Mass riots in Kazakhstan"
 russia.70.d: "Mass protests have begun in Kazakhstan. The reason was the increase in gas prices. Protesters took to the streets in cities across the country, demanding the resignation of the government and new elections. In some cities, the protests have turned into clashes with the police, who are trying to disperse the protesters."
 russia.70.a: "Monitor the situation closely!"
 russia.71.t: "Kazakh Riots Escalate"
 russia.71.d: "The reports coming out of Kazakhstan in recent days have grown increasingly concerning to us. What started out as peaceful protests over the country's hardships in these trying times have predictably grown into large-scale riots with thousands taking to the streets of major cities around the countries. While there's little doubt that there's an undercurrent of justified public concern fueling these protests, we can't help but to look at this and see the telltale signs of yet another attempt by the west to hijack another protest movement and turn it into yet another Maidan.\n\nShould matters escalate further, it'll be necessary for CSTO to initiate a police action to curtail this violence and restore peace to our friends in the south. Should we fail to do so, it may lead to the downfall of the government of Kazakhstan."
 russia.71.a: "The decision will be made."
 russia.72.t: "Riots in Kazakhstan Quelled"
 russia.72.d: "Following intervention by the Collective Security Treaty Organization in its member state of Kazakhstan, the rioting that plagued the nation has ended with a minimal amount of bloodshed thanks in no small part to the swift and professional actions of Russian peacekeeping forces. A tense calm has once again returned to the streets of Almaty and other major cities. While many of the country's issues remain, they can now be resolved peacefully without further agitation in the streets.\n\nIn the meantime, our troops will remain in the country to ensure that there's no relapse into street violence. Once stability has fully returned to Kazakhstan and the government asks for our withdrawal, CSTO forces will conclude its operations in the country. For now, we can pride ourselves in having accomplished what'll hopefully be the hardest tasks of the operation with outstanding professionalism."
 russia.72.a: "Excellent"
 russia.73.t: "Kazakh Government Couped"
 russia.73.d: ""
 russia.73.a: "Leave them be for now"
 russia.73.b: "Begin a peacekeeping operation!"
 russia.74.t: "Moscow Nights"
 russia.74.d: ""
 russia.74.a: "All is well."
 russia.75.t: "Funeral Held for Putin"
 russia.75.d: "Today marked a somber day in Russia's history as thousands of individuals, including politicians and ordinary citizens, gathered to bid a final farewell to Vladimir Vladimirovich Putin. The ceremony took place in the Column Hall of Moscow's Palace of Unions, where numerous public speakers, political party leaders, and government officials paid their respects by laying flowers on Putin's open coffin. Following this, a funeral service was held in Christ the Savior Cathedral, where Patriarch Kirill offered prayers for Putin's eternal peace. One of the most poignant moments of the day was Dmitry Medvedev's emotional speech, during which some speculate he came close to tears. In his address, Medvedev expressed his unwavering loyalty to Putin's vision and proclaimed him to be the greatest figure in modern Russian history."
 russia.75.a: "Rest Well..."
 russia.76.t: "Zaluzhny Coups Ukrainian Government!"
 russia.76.d: "With the capture of Kiev it seems President and the majority of his cabinet were apprehended by military police forces under special order of Valery Zaluzhny. In the days following panic and fear swept through the rest of Ukraine as the president was no longer in contact with anyone. Many had hoped he would still be alive or had secretly escaped in time. But as days turned into weeks, these hopes turned into fever dreams.\n\nThe fate of [UKR.GetLeader] is unknown, The Ukrainian Army has officially took the reigns in areas under their control, but are still unable to withstand and stabilize due to our overwhelming forces and attacks. Certain sectors have collapsed entirely while others continue on, it seems they're coordinating independently of each other which gives us the change of exploiting their weakness in communication."
 russia.76.a: "Excellent news!"

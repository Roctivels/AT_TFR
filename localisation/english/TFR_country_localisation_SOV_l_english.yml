 SOV_putinism_0_idea: "Putinism"
 SOV_putinism_0_idea_desc: "\n\n\n\n£GFX_putinism_hardline_banner\n\n\n\n\n\n§Y"It is not Russia that is between the West and the East. It is the West and the East that are on the left and right of Russia."\n- V. Putin§!\n\nFrom the very beginning of the millennium, Vladimir Vladimirovich Putin sought to create a new system of power, it is obvious that his choice fell on the creation of a single nationwide state.Despite the fact that Putin is gone, his cause will live on in the term 'Putinism', which was rarely used before in the government, but is now beginning to crystallize into, if not into an ideology, then into the 'charter of rules for the leadership of Russia'. Its main principles were: Russian Traditionalism, Patriotism, and the desire to create a mighty state.\nMedvedev strengthens centralization, and seeks to unite the people and the political system in order to create a strong and united Russia of the 21st century. Vladimir Putin became the father of the new Russian statehood."

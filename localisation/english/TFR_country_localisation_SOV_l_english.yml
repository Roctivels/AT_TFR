 SOV_great_victory: "Great Victory"
 SOV_great_victory_desc: "Shaking off the smoke of battle, the modern Bogatyrs rise from the sunless battlefield. The goddess of victory takes their arm, and the sound of triumphant music fills the air. The gray camouflage fades, replaced by gleaming parade uniforms, and medals shine brightly, symbolizing the sweet taste of victory. While the Russian Empire may still have a long way to go before dominating the earth, today marks one of the most glorious chapters in our history. The soldiers, carrying Zhirinovsky's banner and chanting "Long live Zhirinovsky!" march through the cobblestone streets of Red Square, echoing the great victories of Paris in 1815 and Berlin in 1945 - ushering in the grand conclusion of an era."
 SOV_death_of_leader: "Death Of Zhirinovsky"
 SOV_death_of_leader_desc: "Across the world, Russian flags were lowered in unison, marking the passing of Vladimir Volfovich Zhirinovsky - the supreme leader who founded and expanded the Liberal Democratic Party, led the Russian Empire to a resurgence, and secured victory in the European War. His legacy is etched in Russian history, with countless achievements that will never be forgotten. As each Russian walks slowly past Zhirinovsky's flower-adorned coffin, one question echoes in their minds: What happens next?"
 SOV_stabilize_the_administration: "Stabilize the Administration"
 SOV_stabilize_the_administration_desc: "Though not what we hoped for, it is the reality - since Zhirinovsky's death, the Liberal Democratic Party has been steadily fracturing. Factions within the party are clashing over differing visions for the future, with ambitious individuals eyeing the top position, quietly building support and power. In the past, they were united by Zhirinovsky's strong leadership, but now that unity is gone. As tensions rise beyond repair, the one who gains the upper hand and proves most ruthless will purge their rivals and claim Zhirinovsky's authority. And that person is...?"
 SOV_reward_war_heroes: "Reward War Heroes"
 SOV_reward_war_heroes_desc: "As waves of soldiers return from the European battlefield, they will be greeted with enthusiastic welcomes from the Russian people. These war heroes will be well-rewarded for their service, with promotions, banquets, medals, and bonuses all lined up. Even the most ordinary privates will receive generous rewards, and the high-ranking generals will be honored in kind. This presents a valuable opportunity for the Liberal Democratic Party and government leaders to strengthen their ties with the military, boosting their influence and securing the army's loyalty. It's a win-win situation for both the soldiers and the government."
 SOV_strengthen_security_forces: "Strengthen Security Forces"
 SOV_strengthen_security_forces_desc: "The tension within the country has not eased since the leader's death. As feared, hostile forces are conspiring against Russian power in the shadows. Whether they are foreign-backed agents, disgruntled individuals with personal grudges, or fabricated espionage plots designed to sow fear and manipulate loyalty, the crisis has created an opportunity to consolidate and expand our power. Internal decisions now call for increasing the size and scope of the security bureau, military police, national guard, and reconnaissance committee action departments. The "Empire's Sword and Shield" will remain ever vigilant!"
 SOV_russkiy_mir_doctrine: "Russkiy Mir Doctrine"
 SOV_russkiy_mir_doctrine_desc: "The victory in the European War has greatly boosted Russian national pride, and as Russia's sphere of influence stabilizes, admiration for our achievements continues to grow, sparking a new wave of cultural revival. The Russian people are eager to see reflections of today's glory in the deeds of their ancestors, presenting us with a strong opportunity to promote the Russkiy Mir agenda. A multipolar world, built on diverse cultural communities, offers the ideal foundation for expanding Russian influence, and Russia's soft power will reach new heights."
 SOV_stimulate_our_economy: "Stimulate Our Economy"
 SOV_stimulate_our_economy_desc: "The post-war reconstruction period will lead to a brief period of rapid economic recovery, but we must soon find new sources of growth. Fortunately, our expanded European sphere of influence provides vast populations, resources, and wealth - enough to further strengthen Russia's economy and enrich its people. Meanwhile, government-controlled banks and investment firms will begin a major financial boost, ensuring that Russians can finally enjoy the prosperity they've earned after years of hardship."
 SOV_the_third_rome: "The Third Rome"
 SOV_the_third_rome_desc: "From the "First Rome" to Constantinople's "Second Rome," the legacy has been passed down to Moscow, known as the "Third Rome." In the past, we saw it as our rightful duty to carry on the mission of the great empire, seeking the respect of European nations and the chance to shape global order. Today, with achievements once thought impossible, the name of the "Third Rome" now surpasses both of its predecessors, as well as other self-proclaimed Roman heirs like the British and American empires. Russia is on the path to becoming the center of human civilization and culture for generations to come. And for that of course we need a renewed national capital!"
 SOV_cleanse_the_party: "Cleanse the Party"
 SOV_cleanse_the_party_desc: "The sorrow of the "Supreme Ruler"'s death spread throughout Russia, as though the nation itself had come to a standstill. Yet, this moment of stillness might offer our enemies a chance to strike. Saboteurs could exploit the people's vulnerability, disturb the peace of our late leader, or, even worse, undermine our hard-won position of power. To prevent this, the first priority is to safeguard the stability of the nation's core structures - the government apparatus. A strong, loyal bureaucracy will also play a key role in managing the distribution of power after the leader's passing."
 SOV_promote_pro_russian_loyalists: "Promote Pro-Russian Loyalists"
 SOV_promote_pro_russian_loyalists_desc: "With our victory in the European war, there's a whole new frontier to conquer. Internally across our newly acquired lands, the enemy lurks and sabotages our efforts to reconcile with the non-Russians, this however will be remedied now. We'll reach out to our pro-Russian elements and elevate them to higher positions, reward your friends and punish your enemies."
 SOV_new_economic_sphere: "New Economic Sphere"
 SOV_new_economic_sphere_desc: "We'd have to keep our hand in the metaphorical cookie jar if we were to reach greater heights of prosperity, therefore it is advisable that we make the economies of our client states more reliant on us while also ensuring that we reap the benefits."
 SOV_crackdown_on_the_separatists: "Crackdown on the Separatists"
 SOV_crackdown_on_the_separatists_desc: "Traitors, ill-willed nationalists and delusional "freedom" fighters have been a blight on internal security for months now, speaking their disgusting slogans and waving their outdated flags.\nToday marks the day that we put down the boot on their faces, Russia has merely reunited with what was once lost and any deviation from that is treason, not only will the perpetrators be targeted, but also their families to show to everyone with treasonous tendencies that we're not joking around."
 SOV_fund_our_subjects: "Fund Our Subjects"
 SOV_fund_our_subjects_desc: "A child without their parents is like a lost lamb, without proper guidance it'll ram its head in a wall, our subjects have been struggling to keep up the pace after the destructive war in Europe, thankfully we are able to provide a safety net for them, with proper funding and a hand on their shoulders, they should be able to weather any storm."
 SOV_rebuild_the_baltics: "Rebuild the Baltics"
 SOV_rebuild_the_baltics_desc: "The Baltics have been one of the greatest examples of wasted potential. With the region back under our vision, we can rebuild it in our image and restore what made it beautiful to begin with.\nNot only will this create jobs, but it'll also spread goodwill to the people living in the baltics."
 SOV_expand_new_governorships: "Expand New Governorships"
 SOV_expand_new_governorships_desc: "With our newly acquired territories, there's the issue with creating new governorships in them, granting them limited autonomy and serving as a principal administrative subdivision, not only would this calm down the more angry subjects, it would also ease the burdens of bureaucracy and our administrative capabilities."
 SOV_future_of_poland: "Future of Poland"
 SOV_future_of_poland_desc: "Poland has been a thorn in our side for decades, not only do its people hate us with blind zeal, they also are just terrible to work with.\nThe piece of Poland under our control has been under quite some turmoil and under the watchful eye of Moscow, we'd have to make a conclusive decision on what to do with the Polish nation."

 SOV_retarget_russian_hysteria_prop_desc: "\n\n\n\n£GFX_retarget_russian_menace_hysteria\n\n\n\n\n\nThe west wants to believe that we are 'evil'. They convinced themselves that we're subhuman, somehow undeserving of basic liberties, granted so freely to others.\nThey do this to justify their aggression.\nWe're not the monsters as they claim, but to those who dare to trespass on our Motherland, we'll be more frightful then their worst nightmares."

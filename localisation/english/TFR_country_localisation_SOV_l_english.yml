 SOV_novorussian_integration_category: "Novorussian Referendum"
 SOV_novorussian_integration_category_desc: "The people of Novorossiya, after many years of struggle, can finally rest. Most of the goals that were set in 2014 have been fulfilled, and there is only one thing left - to complete integration into Russia."
 SOV_ukrainian_insurgencies_category: "Ukrainian Resistance"
 SOV_ukrainian_insurgencies_category_desc: "The Ukrainian People were heavily brainwashed by russophobic propaganda of Kiev Junta, it will take time to heal the wounds of banderite fever dream. The People of West Ukraine once again took arms against it's liberators like in 1946. §RTheir end will be the same.§!"

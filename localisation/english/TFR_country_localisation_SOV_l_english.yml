 #ONF FACTIONS
 party_SOV_intergralists_tt: "Strengthen £GFX_russian_flag_pin §CCenter For People's Unity§!\n\n[!party_SOV_intergralists_icon_click]"
 party_SOV_intergralists_tt_long: "£GFX_russian_flag_pin §CCenter For People's Unity§!\n\n\n\n\n£GFX_SOV_center_of_unity_banner\n\n\n\n\n\n\n§gCUP - consists of the main backbone of United Russia, as well as non-partisan pragmatic technocrats, who are the most stable because they want to continue Vladimir Putin's policy in general, with only small reinforcing factors. They are also the most loyal, but because of this, there is no strong figure in their ranks who could break through to the status of an "unofficial leader."§!"
 party_SOV_left_statists_tt: "Strengthen £GFX_left_statesmen_texticon §sSocial Labour Platform§!\n\n[!party_SOV_left_statists_icon_click]"
 party_SOV_left_statists_tt_long: "£GFX_left_statesmen_texticon §sSocial Labour Platform§!\n\n\n\n\n£GFX_SOV_social_labour_banner\n\n\n\n\n\n\n§gSLP is composed of socially left-wing members of the United Russia and a significant number of Just Russia members, as well as economically left-leaning experts. They aim to establish a welfare state that draws on the foundations of the Soviet past while also incorporating new ideas and taking into account Russian specificities.§!" 
 party_SOV_national_patriots_tt: "Strengthen £GFX_national_patriots_texticon §8National Patriotic Conference§!\n\n[!party_SOV_national_patriots_icon_click]"
 party_SOV_national_patriots_tt_long: "£GFX_national_patriots_texticon §8National Patriotic Conference§!\n\n\n\n\n£GFX_SOV_national_patriotism_banner\n\n\n\n\n\n\n§gThe members of the NPC are senior statesmen from the United Russia party, retired military officers, and various military figures. For them, Russia needs to be strong in order to survive in this turbulent era. They pay close attention to the military sector and often criticize what they see as excessive freedom in the political climate.§!" 
 party_SOV_reformers_tt: "Strengthen £GFX_reformers_texticon §y4th November Club§!\n\n[!party_SOV_reformers_icon_click]"
 party_SOV_reformers_tt_long: "£GFX_reformers_texticon §y4th November Club§!\n\n\n\n\n£GFX_SOV_club_november_banner\n\n\n\n\n\n\n§gС4N is a liberal wing of the United Russia party, as well as New People and various liberal economists who have a state bias. Their policy focuses on creating a "Land of Opportunity" for the active business sector, improving the conditions for private businesses, and minimizing personal freedoms.§!""
 party_SOV_populists_tt: "Strengthen £GFX_populists_texticon §gPatriotic People's Faction§!\n\n[!party_SOV_populists_icon_click]"
 party_SOV_populists_tt_long: "£GFX_populists_texticon §gPatriotic People's Faction§!\n\n\n\n\n£GFX_SOV_populists_banner\n\n\n\n\n\n\n§gPPF is a faction of those who want to give power to the people, albeit in the understanding of authoritarian governance and the preservation of the levers of presidential power. They are syncretic in their ideas and are ready to work with different platforms if they see that their ideas can be used to preserve the stability and well-being of the population.§!"
 party_SOV_soviet_revivalists_tt: "Strengthen £GFX_soviet_revivalists_texticon §RAssembly For Social Forces of Russia§!\n\n[!party_SOV_soviet_revivalists_icon_click]"
 party_SOV_soviet_revivalists_tt_long: "£GFX_soviet_revivalists_texticon §RAssembly For Social Forces of Russia§!\n\n\n\n\n£GFX_SOV_soviet_revivalists_banner\n\n\n\n\n\n\n§gThe Assembly of Social Forces of Russia is a more radical and Soviet extension of the old STP, after they absorbed and strengthened the positions of pro-Soviet economists and historians. Now they advocate a more radical, but still reasonable, revival of the Soviet experience, as well as calling the USSR an empire.§!" 
 party_SOV_kadyrovites_tt: "Strengthen £GFX_akhmat_texticon §7Akhmat Kadyrov Faction§!\n\n[!party_SOV_kadyrovites_icon_click]"
 party_SOV_kadyrovites_tt_long: "£GFX_akhmat_texticon §7Akhmat Kadyrov Faction§!\n\n\n\n\n£GFX_SOV_kadyrovites_banner\n\n\n\n\n\n\n§gAkhmat faction consists mainly of people from Chechnya, as well as those close to Kadyrov personally, although there are also supporters from other regions. They are very personalistic, militant and religious. They talk about absolute loyalty, advocate harsh laws against those whom they consider a threat to the "stability" of the friendship of the peoples of Russia.§!" 
 party_SOV_z_patriots_tt: "Strengthen £GFX_z_patriots_texticon §9Ultra-Patriots§!\n\n[!party_SOV_z_patriots_icon_click]"
 party_SOV_z_patriots_tt_long: "£GFX_z_patriots_texticon §9National Movement of Patriots§!\n\n\n\n\n£GFX_SOV_z_patriots_banner\n\n\n\n\n\n\n§gNMP is made up of radical loyalists, as well as conspiracy theorists, and many national patriots who gather around Evgeny Federov and his NOD. They are militaristic, constantly saying that Russia must do everything for the sake of victory and liberation from the "Crypto Occupation."§!"
 

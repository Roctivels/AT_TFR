 neo_sovereign_democracy: "Neo-Sovereign Democracy"
 neo_sovereign_democracy_desc: "\n\n\n\n£GFX_Ideology_neo_sovereign_democracy_banner\n\n\n\n\n\n§YSovereign Democracy§! is a niche political ideology which goal is to create a "perfect" democracy that ignores western democratic party bickering. Parties not only have similar views, but also cooperate and work for the betterment of the state as a whole. The civilian society serves as a check on the parties, using their influence to oust corrupt and unpatriotic officials for example.\nThe Left party advocates for a more closed market akin to the Soviet era. It is catered to a left-wing audience that wishes the return of "communism" but without any downsides.\n\n§YNeo-Sovereign Democracy§! is based on principles and policies similar to Alexei Navalny's political vision and his party's program. Supporters of this system advocate technological and economic progress with an emphasis on the market system, political liberalization and increased government transparency, the establishment of diplomatic relations with neighboring countries, as well as political party pluralism and the acceptance of various radical political forces, predominantly right-wing."

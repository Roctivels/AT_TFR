 russia.139.a: "No one can stop our true goals!"
 russia.140.t: "Traitors Fester"
 russia.140.d: "Russia is cursed by the Spectre of Western philosophy, this is not a bad thing in total because at the heart of every Russian, every Eurasian, is a wish to be free. But freedom means different things to different people, we Eurasianists wish to be free in the same way these misguided Liberals and Social "Democrats" wish to be free. Freedom is a fickle and tricky thing to balance.\nThey riot in the streets against our administration flying a flag like old Novgorod but what was Novgorod? A Mercantile Republic like Venice, controlled by patricians and the upper class, the landed gentry, the Republic offered no more freedom to the common man than Muscovy offered. The system of Serfdom many liken it to slavery but how many European peasants outside of the Serfdom system used their freedom to go abroad? No, freedom, the western idea of freedom is freedom to exploit.\n\nWe look at the West and see how it's corporations have corrupted every level of society, how international conglomerates hold more power than nations and elections are decided by politicians. The German Anocracy suppresses dissent, as does the UK, they give the people a feeling of freedom by allowing them a meaningless vote while meaningful opinions are muzzled and silenced.\nOur Liberals here today, Navalnites, do not see this. They are the stupid masses that blindly follow the Western Spectre into the abyss of Corporate exploitation and wage slavery. The West will erase all individuality and erase personal autonomy in the name of globalist agendas but Eurasia offers true revolution, revolution that preserves your history and revolution that preserves your freedom as an individual. We will have to deal with these traitors and liberals in time but for now they roar and Russia groans in pain as the tumor twitches and festers in its core, we will carve it out in time. Cancerous liberalism has no place in the New Russia, those we do not arrest will learn to love us in time."
 russia.140.a: "We want the same thing, don't you see?"
 #russia.141.t: "check"
 #russia.141.d: "check"
 #russia.141.a: "check"
 russia.142.t: "New Government"
 russia.142.d: "Yesterday the RF Government announced its decision to resign after the announcement of the President's address to the Federal Assembly. In particular, it talked about introducing amendments to the Constitution, which would give the State Duma the right to approve the candidacies of the Prime Minister, Deputy Prime Ministers and Ministers. Russian President Vladimir Putin proposed Mikhail Mishustin as head of the Federal Tax Service, and today he was confirmed in his new position. Prime Minister Dmitry Medvedev was offered the newly created position of deputy chairman of the Security Council."
 russia.142.a: "Ok"
 russia.143.t: "New leadership"
 russia.143.d: "DAMN!!! I think its time for new leader for this shithole country..."
 russia.143.a: "Svetov? What are you doing?"
 russia.143.b: "It was expected"
 russia.143.c: "No, we stay"
 russia.143.f: "Yavlinsky's legacy lives on..."
 russia.144.t: "Anti-Terrorist Operation Successful"
 russia.144.d: ""
 russia.144.a: "Resistance is futile"
 russia.145.t: "Anti-Terrorist Operation Failure"
 russia.145.d: ""
 russia.145.a: "We shall return..."
 russia.146.t: "Zhirinovsky Youth Divisions Mobilized"
 russia.146.d: "As our mighty armies crush through the Ukrainian ranks, the need for more brave warriors is needed, there we will mobilize the Zhirinovsky youth division, these young sons of Holy Russia will devote their lives to our great cause, contributing to our inevitable victory.\n\nLet the west tremble in fear, let the Ukrainians squeal like pigs to the slaughter, let the traitors not go unpunished, for the sons of Russia are here.\n\nAfter our victory, they shall be immortalized in Russian history, known as the grand heroes who laid down their lives for our people, a bright path awaits them."
 russia.146.a: "May they serve the nation well."
 russia.147.t: "Vladimir Zhirinovsky Passes Away!"
 russia.147.d: "The war in Europe has been brutal and the path leading to our victory has been nothing short of a long test of our patience and endurance, one man however, truly carried the burden.\nVladimir Zhirinovsky has passed away, already showing signs of fatigue, he spent most of his remaining time with loved ones, his family states that he peacefully passed with a smile on his face, knowing what Russia has achieved under his vision.\n\nWith the nation mourning and the speculations of Russia's future, the people do know for certain that it'll be a bright one."
 russia.147.a: "Rest in peace, our dear leader..."
 russia.147.c: "Zhirinovskites"
 russia.147.b: "Compromise"
 russia.147.f: "Monarchy Real"
 russia.148.t: "Vladimir Zhirinovsky Dies!"
 russia.148.d: "The war in Europe has been a brutal and lackluster endeavor, with many of our brave soldiers ending up in graveyards or the rubble of battle, and our nation turning into nothing more than a shadow of its former self. In the wake of all this sadness, our great leader, Vladimir Zhirinovsky, has passed away. It was reported that he suffered a heart attack early in the day during a meeting with his staff. He was then rushed quickly to the nearest hospital, where sadly, he was pronounced dead on arrival.\n\nHe was a great leader, and while he did not lead us to victory as he promised. It remains true that he tried his hardest, putting in everything he had for his dream. But with the nation in mourning, and speculations of Russia's future still in the air, the people aren't sure if the motherland will recover quickly, or instead, fall into a deep depression as all hope for a brighter future is lost."
 russia.148.a: "A bitter sign for the future..."
 russia.148.b: "A bitter sign for the future..."
 russia.149.t: "Two Paths, One Goal"
 russia.149.d: "In a quiet corner of a small café in Moscow, two old friends have a lively argument. Both were born in the late Soviet era, and each of them sees the future of the country in a different way. Their conversation becomes a symbol of what is going on in the minds of millions of Russian citizens.\nThe first of them, Comrade Maxim Cherepanov, a successful businessman, joined the Communist Party soon after its return to power and enthusiastically supports the course of "Socialist Market Economy". The second, Comrade Anton Ivanov, is a simple worker who has devoted his life to labor and is faithful to the old ideals of Leninism.\n\n"Maxim, that's not it at all! Is that what we voted for? We, uh... We voted for communism, for the way we used to live! No private shops, no market, everything according to plan! And now what? All these people's enterprises. it's capitalism! All this contradicts Lenin's ideas!" exclaims Ivanov, banging his fist angrily on the table.\n"Antoha, times have changed... If we're building socialism, it doesn't mean we have to abandon the market. Look at China! Haven't they achieved the greatest success? After all, think of the people, the youth! The market under state control gives people confidence and freedom. We still control development, we still plan, but we let people breathe, work and develop. It's not capitalism, brother, it's a new, market socialism," Cherepanov objected, stroking a tray with documents on new contracts.\n\nThere is silence, Ivanov frowned, looking at the active construction of new social housing outside the window.\n\n"You're probably right, the people need stability... And the youth? Huh! They'd howl with the planned economy... Maybe it's better to live in peace, albeit with the market, than to slip back into chaos. If it works, then maybe that's our new future," he finally agrees reluctantly...."
 russia.149.a: "We move toward socialism... through new paths."
 russia.150.t: "Anti-Russian Militias form in Caucasus"
 russia.150.d: ""
 russia.150.a: "They're fools to oppose us!"
 russia.151.t: "ISIS Cells announce Central Asian Caliphate"
 russia.151.d: ""
 russia.151.a: "This scum must be destroyed!"
 russia.152.t: "Dugin Holds Rally on the Fourth Political Theory"
 russia.152.d: ""It is clear that neither communism nor fascism can work in our Russian society. And liberal Democracy will just be our return to being a puppet of the West. Our noosphere was torn apart, yes. But we can always rebuild. Eurasianism will be the glue that ties us together. Regardless of ideology or nationality. The Katechon will rise up once more!"\n\nThe huge crowd that gathered around the elderly visionary was listening intently. Aside from the hardliner Eurasianists and National Bolsheviks who had stood alongside Dugin for the past two decades, the majority of the people had little to no experience with him or his idealism before he returned to politics.\n\nWhile the liberal-minded populace handwaved the movement away for "being nothing more than ramblings of a shizophrenic", the people listened. Eurasia was the guiding light, one that gave "the deep nation" a voice. The same nation that suffered, sacrificed and bled for Russia more than anyone ever did. This is something neither the oligarchs nor the liberals could ever understand. \n\nThe people want a strong Russia, one that is not shackled by anyone else. Ideology or faith matters little. Even Yeltsin, the hack that he was, understood this. He was an advocate of a sphere of influence on the post-soviet space, fighting against NATO enlargement or Yugoslavian interventions.\n\nThe Katechon rises from the ashes, ready to put the Great Sodom to the Sword."
 russia.152.a: "Love has won."
 russia.153.t: "Declaration of the Eurasian Union State"
 russia.153.d: "[MOSCOW] International observers have watched over the past two months as Alexander Dugin's Russian State entered Central Asia - the second time Russian forces have this decade - and solidified control over the steppes of Kazakhstan and the mountains and deserts of the former CSTO and non-CSTO states. While the invasion has drawn criticism from the European Union and Islamic influencers, supporters of the Dugin regime and in aligned nations call these territories "Russias Natural Domain".\n\nAfter the formal annexation of the Central Asian nations, our reporters here at the International Observer witnessed a declaration broadcast to the public in Moscow today where Dugin proclaimed a new "Eurasian" Union State. Long have observers seen Dugins movement as but a powerful influence on Russian foreign policy but today, it is a reality. Eurasia has been founded to the enjoyment of some and the dismay of others globally, just how much further Dugin intends to make good on his writings remains to be seen, NATO has refused to comment at this time.\n In other news, "The United States of Eurasia" by British band Muse has hit number one on the Russian billboard in the last week despite its release over a decade prior. "
 russia.153.a: "A New Direction for Russia"
 russia.154.t: "Purge of Atlantic Admirers"
 russia.154.d: "The rot has festered long enough. The kingdom of Sodom had its time to reign after the Red Empire fell. Whoring out the Rodina out of its intellect, pride, and wealth. Millions suffered, died, simply because they "did not adapt to the market economy".\n\nOne man, through his will, put a stop to it. Dealt with the most traitorous and forced the cowardly to bow under him. Yet the rot remained. It festered, fused into the system, masked itself under patriotic slogans and love for Russia. Stomping on the people's efforts to revive the country through their cold, materialistic flaterry. \n\nAfter the man had left us the new emerging system seemed to cleanse the rot outright. The nation found a unifying goal. And it bled for it. In the trenches and in the factories, in the material and in the noosphere. The fight against the hedonists was the light of an emerging, just world-\n\nAnd it failed.\n\nThe rot had simply hid itself even harder, masking itself and preparing to resurface. Now, after our Rodina was stripped bare and humiliated, a fifth of our people under the yoke of Atlantism they wish to revive Sodom? To strip our people even more of their will, their pride, their future?\n\nRussia will not listen to the fallen angel ever again. As the apostles once did, we must steer the traitors to the light."
 russia.154.a: "Love Thy Neighbour."
 russia.155.t: "Dugin Announces Eurasian Ambitions"
 russia.155.d: "[MOSCOW] Unbelievably, reports have come from our International Observer links in Russia that within a few years of the loss to NATO under the prior administration, a recent speech from Alexander Dugin proclaimed "New Eurasian Ambitions".\n\nThese ambitions go all the way to Lisbon, with the realization of the ultimate span of his writings being chanted now as state doctrine. Eurasian State Media calls for the people to ready themselves for a "Great Liberation." For those unaware of Dugin's writing which I'm sure are most of you, we will outline just what that means for you now. All of the former Imperial Russian Territory plus the entire European continent, some versions include or subtract states such as Turkey or parts of the Middle East.\nIf these ambitions are followed to the letter, if this is not just hot air, we're looking at Total War in Europe again on the horizon in a decades time."
 russia.155.a: "The Clouds of War Loom Over Europe..."
 russia.156.t: "Dugin and Maupin Meet"
 russia.156.d: "It was an ordinary day on Kamchatka.\n\nThe peninsula had lived a quiet life for the past decade. After the start of the civil war in America, a flood of refugees arrived to these shores, wishing for a quiet and peaceful life. While a majority of these refugees would move inland to Siberia in search of stable job prospects and land, a large minority stayed. They become fresh blood for the region, and they repaid Russia for its generosity by joining the war in the East, wishing to help their new motherland.\n\nAs such, it was a perfect place to meet the leader of the Americn "Jacobins", Caleb Maupin. Alexander Gelyevich originally wanted to visit California himself, but his age made his Okhrana and Oprichniks concerned for his health. So, the Eurasian and American secret services agreed to arrange the meeting in South Kamchatka in a hot spring resort.\n\nNoone in the public knows what happened behind the doors of the resort between the two delegations. Locals would see cars constantly arriving to the compound, with military and civilian officials of both nations going in and out. The "meeting" lasted 2 days, after which it abruptly ended: the hot springs cleaned of any trace of it ever happening.\n\nThe views of Jacobin America align with Eurasia quite perfectly. Both wish to destroy the globalist empire, yet do not wish to interfere with other civilizations and become a global hegemon.  Yet it is uncertain if it will result in an open cooperation or simply a gesture of gratitudes."
 russia.156.a: "Eurasia is not alone in the world."
 russia.157.t: "Ukrainian Rasputista"
 russia.157.d: "As the Russian pierce through Ukrainian territory and roll over the once peaceful territory of Eastern Europe, a sign of things to come has become very apparent to both sides of this conflict. That of heavy rain and slushed mud that has covered most of the roads and ground in Eastern Europe.\n\nFor NATO and her allies, this gives them the ability to hunker down and be able to wait out the Russian war machine. For it to run out of fuel as it gets forced to a halt.\n\nHowever, for Russia they may not be able to move well in these poor conditions and their  weaker logistical hubs may collapse entirely.\n\nThe option to reposition themselves into better offensive capabilities to strike at the earliest opportunity against the Western Forces is seemingly more appealing than rushing down key positions.\n\nFor now , as the nature of this war degrades from a lightning war and a rush towards pacification of NATO. It has now become more akin to the First World War with it being more of a war of attrition than of technology and suppression."
 russia.157.a: "A severe setback..."
 russia.157.b: "The vastness of Russia consumes us..."
 russia.158.t: "Terrorist attack in St. Petersburg"
 russia.158.d: "This week in St. Petersburg, a 24-year-old Vladlen Babaev broke into the city administration building and started shooting at its employees. A Spetsnaz team went to the scene almost immediately. At the end of the operation the criminal was killed and found with a VPO-208 carbine, two dozen cartridges and a CPRF membership card, as it was later learned, belonging to him. Two members of the unit were wounded. The gunman managed to kill 9 administration employees and 15 other people were wounded in varying degrees of severity. \n\nAfter this event, the popularity of the Communist Party plummeted, and to save it somehow, Gennady Zyuganov decided to resign. Yuri Afonin, 45, formerly Gennady Zyuganov's deputy, took over as acting chairman of the CPRF Central Committee. He will perform his duties until the next congress of the Party."
 russia.158.a: "This is the true essence of communists."
 russia.159.t: "Death of Vladimir Zhirinovsky"
 russia.159.d: "The leader of the LDPR party, Vladimir Zhirinovsky, died after complications of the disease. At the beginning of last month, he was hospitalized in the Central Clinical Hospital with coronavirus, the media often falsely reported that the leader of the LDPR, Vladimir Zhirinovsky, died in hospital, but this time the politician really died..."
 russia.159.a: "Rest in peace, Patriot..."
 russia.160.t: "The Second Party"
 russia.160.d: "Today, representatives of the CPRF and SRZP, as well as allied organizations such as the Left Front and the Movement "For New Socialism" held a joint meeting and signed a Manifesto on the unification of the CPRF and the SRZP into "People's Russia", which defined the ideological foundations of the union, its plans and objectives, and worked out steps for its implementation. In addition, the meeting elected the new party's provisional governing bodies: Zakhar Prilepin, the former co-chairman of the SRZP, became the "People's Russia's" chairman."
 russia.160.a: "A New Era in Russian Politics."
 russia.161.t: "The fate of Our Party"
 russia.161.d: "It is only recently that our country finally defeated its Western enemies. Maybe it is time to loosen our grip, publicly blame oligarchs who have stayed in their posts for too long for our country's previous failures, and declare Russia a truly democratic country?"
 russia.161.a: "This is what Putin really wanted."
 russia.161.b: "We are already a real democratic country."
 russia.162.t: "Communist Parties Oppose The Narodniks"
 russia.162.d: "After the recent unification of the Communist Party and the JS (FT), many Communist Parties called for renouncing membership in the Communist Party and joining other "real" communist parties, because, according to communists, the Communist Party betrayed the legacy of the Soviet Union and turned into a puppet of the Kremlin. Recently, Vladimir Ivanovich Lackeyev, the leader of the UCP party, said the following: "I have never seen the Communist Party as an opponent of the Kremlin, but now it is generally entrenched at the legislative level.""
 russia.162.a: "More communist parties?"
 russia.163.t: "Vladimir Zhirinovsky Is Hospitalized"
 russia.163.d: "Today, the leader of the LDPR party Vladimir Zhirinovsky was hospitalized due to the disease Covid-19 "omicron", before that Vladimir Zhirinovsky was vaccinated eight times. Now the politician says that he feels great, and that he will return to work very soon."
 russia.163.a: "We hope for a speedy recovery"
 russia.164.t: "The Revival of the LDPR?"
 russia.164.d: "After Zhirinovsky's Death, no one thought that the LDPR party would ever be able to return to Russian politics, but apparently we were all wrong. Despite Leonid Slutsky taking reigns as the leader of the party, young members rallied behind Vasily Vlasov to oust him from this position. They succeed. The LDPR party now headed by Vlasov, whose supporters call a "legitimate heir", will continue its cooperation with the youth and readies for full-scale actions again, which included various support for the twitch streamers, as well as the spreading of many of Zhirinovsky's speeches, thanks to which people remembered the LDPR and love it once again."
 russia.164.a: "Good luck to them, and all the best"
 russia.165.t: "North Korea seeks to renew labor Program"
 russia.165.d: "North Korean laborers will periodically clear out forests in Siberia thus offer more construction slots EVERY 2 MONTHS. We will be expected to pay the North Koreans 100 Billion per completed project."
 russia.165.a: "A reasonable offer!"
 russia.165.b: "We must decline their generous offer."

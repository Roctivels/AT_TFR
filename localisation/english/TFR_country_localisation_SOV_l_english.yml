 russia.2002.a: "Expected."
 russia.2003.t: "Anti-State Terrorists Commit Arson"
 russia.2003.d: "Threatening news is coming from Izhevsk - a terrorist group opposed to our government has attacked the Axion motorcycle factory, which manufactures equipment for missile control systems. The militants broke into the territory of the enterprise, set fires and planted an improvised explosive device, trying to damage strategically important production. Their goal is obvious - sabotage and chaos. Unfortunately, the security services were unable to quickly intercept the attackers, and they managed to escape.\n\nTheir statements about their intention to continue attacks have already appeared on the network, which confirms that this is not an isolated incident, but a planned sabotage activity. This is a threat that cannot be underestimated. Obviously, there may be more such groups, and they seek to destabilize the situation. In this regard, it is necessary to strengthen control, act tougher and stop any attempts at destabilization without hesitation. Anyone who encroaches on the security of the country must realize that retribution is inevitable."
 russia.2003.a: "We'll deal with them..."
 russia.2004.t: "Future of Federal System"
 russia.2004.d: ""
 russia.2004.a: "Reform it so it benefit our military-dominated society."
 russia.2004.b: "Federalism is the sight of weakness, Russia will do better with unified structure."
 russia.2005.t: "Prigozhin Shot Dead!"
 russia.2005.d: "Terrible news strike Russia once more. Yevgeny Prigozhin, leader of Wagner Group, and new ruler of the Nation, was shot dead during his rally in Moscow, following success of 'Justice March'. Unknown assailant, who fled the scene unharmed, was somehow able to pass through all security staff, and take almost a point blank shot, eye witnesses claim that it was likely because of his non-threatening posture, and 'clear as day' Udmurtian facial structure.\nWithout its leading figurehead, Wagner will devolve into bickering and power struggle. Only God knows what will happen next..."
 russia.2005.a: "Fiat iustitia, et pereat mundus"
 
 russia.2006.t: "First Decrees of Zhirinovsky"
 russia.2006.d: "Vladimir Zhirinovsky wastes no time in implementing his campaign promises after becoming President, sources reveal.\n\nHis first steps and orders are to completely shutdown Russia's border and any migration processes from Central Asia, source close to Kremlin reports.\nHis other decree is to lift the moratorium on the death penalty, a stance he has championed for decades since entering politics.\nHe intends to abolish the privileged status granted to various minority nations and migrants, which he believes is currently in place. In his view, this arrangement "harms the true owners of this country - the Russian people."\nLDPR deputies often introduce numerous minor decrees and laws, which Zhirinovsky might sign without going through the Duma or following the usual legal procedures.\n\n(...)\n\nThese changes are propelling Russia towards a significantly more right-wing and nationalistic stance, and despite that many of these changes are finding their supporters in LDPR's fateful and many citizens, they also will attract a lot of opposition both form the left and more liberal stances.\nVladimir Zhirinovsky and his new administration seem unconcerned, according to anonymous sources. They are preparing even more radical changes to society's structure in the coming weeks."
 russia.2006.a: "A Shockwave through Russia."
 
 russia.2007.t: "The End of Wartime Unity"
 russia.2007.d: "During the war, it was normal for society to forgive our leadership, maybe despite some shortcomings of the Medvedev's administration, even the parties designed to be in opposition were in position of only small blasts of discontent.\n\nNow that our soldiers are returning home and society is sobering up from the euphoria of victory, we can see that the people are once again relying on their state for accountability and solutions. The shortcomings of our system are becoming more apparent: corruption, bureaucratic inertia, and economic inequality remain persistent issues in modern Russia, despite some improvements in recent years. People's Russia champions the welfare of workers and the construction of a social state. United Russia, meanwhile, will concentrate on tradition, unity, and a balanced economy. Systemic liberals and some nationalists will also have their own platforms to stake their claims.\n\nSome readers might recall what I mentioned back in 2014: I said that political life in Russia would stall until we resolved our international issues. Medvedev's reforms briefly opened a Pandora's box, only for the political landscape to freeze again in the name of wartime unity.\nNow, dear readers, you will witness how Russians engage in their political life. Few remember the early 2000s, but now we can observe Sovereign Democracy in action."
 russia.2007.a: "The Russian spring has blossomed."
 
 russia.2008.t: "Dam Break"
 russia.2008.d: "After the unexpected results of the elections, which were won by the Russian Communist Party, Russian society broke out into various kinds of criticism of recent events in our country. This is largely due to the course of the Shevchenko government and the program of his party.\n\nMaxim Shevchenko often criticized Zhirinovsky during his lifetime, and then began to criticize Slutsky for the "insufficiency of reforms."\n\nWe will give examples of, so to speak, "popular" opinion in the form of comments on social media.ad networks:\n"Well, it's good that we revived Russia, but Zhirinovsky and his LDPR did it with absolutely inhumane methods, both bans and raids... the same Putin would never have taken such measures."\n\nHere's another example:\n"Yeah, the LDPR and the people's power are not compatible, your Zhirinovsky shouted against the oligarchs the most, and then what? I kissed them on the lips, and came up with a new name for them, "imperial business." Ugh at you and your idol..."\n\nAs a radical view, part of a long entry in one LiveJournal:\n"You really don't know how the fucking war was going! But here's the truth for you inhumans! Zhirik did not know how to fight at all, he made plans exclusively for cakes from different countries that were brought to him, and he cut them. He destroyed the best people of the nation for the sake of some kind of Ukraine. and Zolotov is a maniac in general, young Russian Guards were driven on foot from Tomsk to Poland, but they can't fucking fight, there are no weapons, and this Zolotov is on a horse, all white bitch, waving a saber and shouting "I ORDER YOU TO KILL CATTLE!", and they all killed themselves with Polish machine guns, a front-line soldier told about it, miraculously The survivor of an anonymous post....""
 russia.2008.a: "I believe everything on the Internet."
 russia.2009.t: "Tense Days In the Senate"
 russia.2009.d: ""DISGRACE!"\n"TOTAL BETRAYAL!"\n"DISMISS THIS GOVERNMENT NOW!"\n\nThese are just some of the cries that echo through the Senate daily since President Shevchenko's election. Despite his victory, his government holds only a slim majority in the Duma, facing a united opposition led by the "No To Bolshevism" coalition of all right-wing parties.\n\nToday, Yuneman delivered a speech warning that he and his supporters will not allow a law reducing racial and national exclusions in the workplace to pass. He was followed by an LDPR representative who escalated claims about crypto-communism and the dismantling of Russia's identity.\n\nThe RPSS government's rule is proving unstable. The hawks within the nationalist parties are rallying their forces to oust the young leftist government, using any means necessary.\nWhispers are circulating about the military's involvement in anti-Shevchenko plots, as they are deeply dissatisfied with the state's efforts to "democratize" the country's armed forces."
 russia.2009.a: "They must act quick." 
 russia.2010.t: "End of LDPR"
 russia.2010.d: "Shevchenko took to public platforms to vehemently condemn the LDPR party and the previous government. In his speeches and articles published by his colleagues, he exposed years of hidden corruption, abuse of power, and nepotism within the ranks of the "Liberal-Democrats."\n\nCiting exclusive access to archives, Shevchenko declared that these individuals must be permanently barred from holding public office again. He urged the Russian people to feel anger and shame upon learning these sordid details about the LDPR leadership.\nThousands of Telegram channels and independent media outlets swiftly published comments, corroborating the claims with their own sources.\n\nSlutsky and other high-ranking LDPR leaders attempted to refute the rumors and accusations, but their efforts fell short of convincing the public.\n\nExperts predict that following local elections, the LDPR will suffer a significant loss of confidence among voters, effectively ending its relevance."
 russia.2010.a: "The domino falls."
 russia.2011.t: "Shevchenko Rallies For More Reforms"
 russia.2011.d: "Maxim Shevchenko, who has remained relatively silent during Vladimir Zhirinovsky's tenure, is now seeking to reclaim his political influence by embracing a more radical form of reformism. Returning to the Russian Party of Freedom and Justice (RPSS), he aims to push the current government, led by Leonid Slutsky, towards even more extensive political and economic transformations.\n\nAt a recent rally in St. Petersburg, surrounded by his loyal supporters and political allies, Shevchenko declared his commitment to achieving a genuine democratic society in Russia and eradicating the legacy of authoritarianism once and for all.\nDespite widespread societal skepticism towards his radical vision, he may attract the support of many liberals who view him as their most viable candidate.\n\nFueled by growing dissatisfaction with the country's economic challenges and the precarious situation in Russia's border regions, Shevchenko's efforts could potentially yield some success."
 russia.2011.a: "It's just words."
 russia.2011.b: "We must curtail his influence."
 russia.2012.t: "The Moscow Coup"
 russia.2012.d: "Today marked the end of Shevchenko's presidency, and the anger of the right wing had reached a boiling point. In a secret military meeting, General Kartoplov brought together right-wing generals, unpurged officials, former LDPR members, and disloyal bureaucrats. He warned of the RPSS government's threats and announced preparations for an overthrow. The plan was set in motion, with soldiers and tanks rolling through the streets of Petersburg and Moscow. State TV and media were seized by right-wing loyalists, urging citizens to stay calm.\n\nA few pro-Shevchenko soldiers and democrats tried to resist, but their efforts were futile against the overwhelming military force. Promised new benefits after seizing power, the soldiers stood down.\n\nPresident Shevchenko was placed under house arrest, and most of his administration was detained. Andrey Kartopolov, now the de facto leader of the united right-wing opposition, addressed the nation on TV. He declared a new era and announced a referendum on the future of the new government."
 russia.2012.a: "End of the experiment."
 russia.2013.t: "This Train Is On Fire"
 russia.2013.d: "For generations, Russian leaders - from tsars to general secretaries and presidents - have deprived the people of their honor and dignity. They have co-opted the nation's achievements, leaving little room for citizens to take pride in their collective success.\nNow is the time to break free. We must call for independence and liberation from tyranny and corruption. It is time to reclaim our triumphs and tribulations as our own. Our true strength lies in our collective identity and indomitable spirit.\n\nOur soldiers and workers, past and present, can finally find solace, knowing they are the true heroes of our nation, not self-proclaimed 'supreme rulers'. It is they who have repeatedly defeated invaders and aggressors.\n\nDemocracy thrives when we restore our people's pride."
 russia.2013.a: "It's time to reclaim this land."
 russia.2014.t: "The Referendum"
 russia.2014.d: "Today, a long-awaited referendum was held, in-person only for security and transparency reasons, leaving those who preferred electronic voting out of the loop. The question was simple: "To safeguard the Russian government system, revive national democracy, enact economic reforms, eradicate sectarianism and extremism, and realize Vladimir Zhirinovsky's vision, would you elect President Anatoly Kartapolov for a six-year term?"\n\nExpectations for turnout were low, and so it was. Only 32.5% of the population cast their ballots. However, among those who did vote, a resounding 75% said yes, securing the regime's legal standing.\nDespite some leftist allegations of vote manipulation, the outcome stands."
 russia.2014.a: "Very well!"
 russia.2015.t: "The Party"
 russia.2015.d: "With our power firmly established, we can no longer be a government without a political structure to address the concerns of the people. After all, we did promise to restore the democratic principles taken away by the radical leftists.\nNow, Kartapolov must create a pro-government center where his supporters and opportunistic bureaucrats can unite.\nWe must clearly define our new state policy. Basic, non-threatening slogans and policy names will justify the president's actions in the future.\n\nWe can openly embrace nationalism, as our pride in the nation was revived by the socialists. This will help boost the public's fighting spirit.\nUnity is a powerful tool, used many times by old Russian parties, especially statist ones. Russians seek a stable, united motherland above the lofty ideals of ideologues.\nEconomic prosperity was harmed by socialist policies, as one very insightful centrist philosopher noted. Therefore, we must regain the trust of those who suffered under the radical policies."
 russia.2015.a: "Nationalism."
 russia.2015.b: "Unity."
 russia.2015.c: "Economic Prosperity."
 russia.2016.t: "The Coalition"
 russia.2016.d: "Our supporters are far-reaching, united by a common goal: keeping socialists from power. They are willing to go to great lengths to achieve this end. Yet, our government struggles to form a cohesive pro-government coalition from these diverse organizations. However, there are a few promising opportunities.\n\nFirst, consider the moderate right, including conservatives and those who feel marginalized by society. This group could be a valuable partner, offering a path to unity.\n\nAlternatively, we could align ourselves with the nationalist and radical faction. They are staunchly anti-communist, holding orthodox beliefs and, at times, adopting tactics and ideologies reminiscent of the White Guard. It's not a stretch to draw parallels with figures like Denikin or Kornilov, if their ventures had succeeded.\n\nOf course, bringing these groups together will require significant effort, as they are far from united. But what lengths shouldn't we go to protect Russia from the communist threat looming just beyond its borders?"
 russia.2016.a: "We'll look towards the moderates."
 russia.2016.b: "We need strong anti-communist stance."
 russia.2016.c: "Only big unification of anti-socialist forces can protect Russia."
 russia.2017.t: "Alikhanov Group"
 russia.2017.d: "During the president's sweeping government reforms, gubernatorial and mayoral positions across Russia saw significant changes. Most dismissed officials either accepted their fate or moved to lower roles. However, one person vehemently opposed the new order, refusing both his removal and the ongoing reforms.\nAnton Alikhanov, the former governor of Kaliningrad, expressed deep dissatisfaction with his ouster. He believed that "liberalization was carried out for the amusement of enemies." Alikhanov assembled a small group of United Russia officials who shared his dissent. But this coalition was not large; most bureaucrats, even those who disagreed, opted to wait and choose a more opportune moment to act. To many, Alikhanov's vocal stance seemed like a tempest in a teacup.\nDespite Alikhanov's small and unpopular group, Dmitry Medvedev took decisive action. Through his influence in the party's general council, Medvedev managed to expel Alikhanov and his supporters from United Russia.\n\nAlikhanov responded with a terse comment: "Patriots like him have no place in this party anymore." Although he maintained an air of confidence, his expulsion effectively meant banishment from mainstream politics, making it unlikely he could continue his public activities."
 russia.2017.a: "We'll do without "Firebrand Patriots"."
 russia.2018.t: "New Course For the National Russia"
 russia.2018.d: "There have been unexpected changes in the National Russia party recently. By secret ballot, the majority of the council members decided to replace the Chairman. Anton Alikhanov became the new leader instead of Vasily Vlasov.\n\nNational Russia arose as an initiative of those who disagree with the LDPR policy and were expelled from the party. Despite small successes, the party has not been able to reach a higher level.\n\nAnton Alikhanov, an ex-member of United Russia with an ambiguous reputation, established contact with Vlasov and became a member of the party council, and then its co-chairman. At that time, he was actively attracting like-minded people to the party. There is an opinion that Alikhanov could have been playing a secret game against Vasily Vlasov, collecting dirt on him and dragging the council members to his side.\n\nBy the time of his removal, Vlasov, a weak and inexperienced leader, had lost control of the party. It increasingly moved away from the ideas of the late Zhirinovsky, although it has retained some of his principles. Now we can say with confidence that a new stage is coming for National Russia. Alikhanov has already begun to use party resources and expand his circle of allies.\nAccording to anonymous sources, Alikhanov plans to expand the party by creating an "activist wing", women's and children's organizations. He also intends to seek support from veterans, law enforcement officers, and nationalist youth."
 russia.2018.a: "An unexpected return."
 russia.2019.t: "Birth of Derzhavism"
 russia.2019.d: "Today, in one of the majestic assembly halls of St. Petersburg, the closed congress of the SZND party gathered. The atmosphere was filled with anticipation, as if before a thunderstorm: there was a spirit of unity and determination in the air.\nThere was only one speaker on the main stage, Anton Alikhanov, like a commander in front of his army. His presence attracted the eyes of everyone present, including war veterans with medals on their chests, law enforcement officers who secretly attended these meetings, and young, energetic students and teenagers burning with nationalist ideas. They were united not only by their uniform - the yellow-brown shirts with the green armbands of the party, but also by their deep faith in the words of this man. They listened to him as if the fate of their Homeland depended on it.\nAlikhanov, glancing at his notes, slowly walked away from the podium and, looking around the room with a penetrating gaze, began: "We have gathered here to declare our intentions regarding Russia!" His voice sounded confident and authoritative, the audience responded with a short ovation.\n"We see how Russia is being deceived," he continued, and the fat faces of United Russia deputies appeared on the screen. "United Russia is lying to us about a kind of Sovereign Democracy and freedom, while our Homeland is getting weaker every day." There were angry shouts and condemnations of the ruling party in the audience.\n"But that's not all," Alikhanov said, changing the slide to the not-so-good plans of the deputies of People's Russia. He pointed at them with his finger, as if pointing at enemies: "They deceive us with justice and concern for the workers, forgetting about the real masters of Russia - the Russians!" The hall exploded with loud shouts of agreement and calls to end this injustice.\nAlikhanov waved his arms around the entire hall, his voice becoming more and more powerful: "Only we are the true sons of the Fatherland, people who proved their loyalty to Russia in the heat of attacks and battles. We are her true masters, her soldiers and her children!" The crowd screamed in unison.\nAfter several minutes of stormy speech filled with threats and fervent nationalism, Alikhanov came to the final point of his speech.\n"...For the sake of the Motherland, for the sake of our great power, for the sake of the future of our people..." - his words sounded like a spell. The audience held its breath, waiting for the climax. "DERZHAVISM is born today!"\nAnd at that moment, the crowd roared with pride, as if it were one whole, ready for action."
 russia.2019.a: ""Glory to Alikhanov! Glory to Russia!""
 russia.2020.t: "National Russia Gains In Local Elections"
 russia.2020.d: "Recently, the Russian government has been concerned about the growing influence of the National Russia movement in the regions. So far, this applies mainly to poor and war-affected territories, including the new regions of Novorossiya.\n\nIn local elections, both to city councils and regional authorities, representatives of "National Russia" show good results, and in some places they receive the majority of votes.\nIn the regions where this movement has strengthened, cases of "political violence" and "harsh dispersal of migrants" with the participation of activists from the "Yellow Guard" are increasingly occurring.\n\nFortunately, so far it has been possible to prevent attempts by "National Russia" to infiltrate the State Duma and the central regions of the country.\n\nHowever, Anton Alikhanov, inspired by the successes, is already talking about the "March on Moscow" and urges his supporters to strive with all their might to participate in government."
 russia.2020.a: "Those damned radicals and their simple solutions." 
 russia.2021.t: "The Party of the Russian State"
 russia.2021.d: "The name "National Russia" was a temporary compromise related to the period of Vlasov and the need to fit into the system created by this little man Medvedev. Now it is no longer necessary.\n\nAt the first congress of the Derzhavists, after the victory of Anton Alikhanov, now known as the "Captain of the Party," he himself rose to the stage and delivered a speech that set a new course for our party. The audience enthusiastically welcomed the new leader and his vision.\nAlikhanov said that our movement is not just a political organization, but a union of people who are sincerely loyal to their homeland. We are protecting the Russian people from the destructive influence of globalism and "hidden threats." We stand guard over a great power, a State based on freedom and order. That is what we believe in, and that is why we are sovereign, as Alikhanov himself emphasized.\nAt the end of the congress, a new name was approved - the Union for the Protection of the People and the State.\n\nFor those who watched the broadcast or read and reviewed the chronicle of the congress, it became obvious that the masks had been thrown off and we were seriously taking power."
 russia.2021.a: "We are the Vanguard of the Nation."
 russia.2022.t: "Anton Alikhanov Announces His Candidacy"
 russia.2022.d: "National Russia is officially entering the election campaign. The party council unanimously nominated the head of the party as a candidate for the presidential election.\n\nAnton Alikhanov, whose influence in Russian politics is growing rapidly, has announced the start of a large-scale tour of the country. His team is full of enthusiasm and actively campaigning for their candidate. Russian Russian slogans like "To Russia - the Russian Order!" and "Alikhanov is the Candidate of the Russian People" resonate with nationalist-minded voters. Even those who were going to vote for the candidate from United Russia are now doubting their choice.\nThe Yellow Guard, being Alikhanov's "activist" organization, nevertheless gave the party a positive connotation. Their fight against violent alcoholics, protection of public order and assistance to the police and Cossacks, especially in the newly annexed territories, inspired some of the population with hope for the imminent arrival of a "strong hand" capable of strengthening and cleansing Russia.\nSupporters of "National Russia" sharply criticize not only the current policy, but also the entire system. They demand the dismantling of "so-called Sovereign Democracy" and the building of a "healthy national society" where any "Western" interference is unacceptable. Alikhanov himself has long been an undesirable element for the leadership of United Russia. Few expected that the disgraced former governor would be able to return to politics with even more radical ideas and without the constraints of his former party.\n\nAnton Alikhanov's victory, or even a high percentage of votes for him, will demonstrate the fragility of Medvedev's democracy. His success could lead to serious consequences for Russia."
 russia.2022.a: "This brute must not win!"
 russia.2023.t: ""Manifest of Struggle""
 russia.2023.d: "It hasn't been long since our victory, but the enemies are already worried about their fate. Some of the first to speak out against us were leftists of all stripes: Socialists, Marxists, Stalinists, Trotskyists, and others.\n\nEven before coming to power, our relations with them were tense. Our decisive actions to disperse their sluggish demonstrations have been remembered by them for a long time.\nNow, despite all the differences in their views, they are ready to unite against our national government.\nSergey Udaltsov, an old fighter of the leftist movement, gathered all possible leftist politicians and activists in one of the halls of Volgograd. For two hours, they denounced our policies and Alikhanov personally, our "chauvinistic habits," and after that time they signed the "united manifesto of struggle," where they pledged to do everything possible to stop the process of "fascization" of Russia, and return it to the "power of the people." To put it simply, communists, party democrats and radical mankurts came to power. They don't need a Great Russia, they want a cauldron of people without will and faith, obedient, blindly believing in the speech from the mausoleum.\n\nAccording to our informants, their movement can be numerous and even influential among the Russian working class due to its slogans about fair redistribution and justice. In addition, the radicalism of some of their supporters can play a dangerous role. However, their main weakness is the lack of a charismatic leader. Udaltsov is certainly a strong figure within their ranks, but without him, the movement is unlikely to be able to maintain unity for long. Udaltsov himself also faces difficulties in managing such a diverse group of people."
 russia.2023.a: "We'll deal with them...."
 russia.2024.t: "Freedom Coalition"
 russia.2024.d: "Our enemies are not sleeping. Along with the left, the parliamentary and moderate opposition became more active. Liberals, "conservatives" and narodniks are all opportunists from the Duma and regional assemblies. They are the main beneficiaries of Medvedev's flawed reform system.\n\nHere they are, gathered together in a rich hall in Moscow to discuss and form an inter-parliamentary and "public" coalition against "paternalism and autocracy." All the famous people were there, those whom Russia was used to seeing - Delyagin, Nechaev, Titov, even particularly ideological United Russia - such as this narrow-minded son of Patrushev. There were also lesser-known personalities who "did not fit" into the system of sovereign democracy, but still not forgotten: Nadezhdin, Kisiev, and even the gray-haired Yavlinsky trampled on the feast.\nBut Vladislav Davankov shone the most, his speech was saturated with liberal nonsense, his face was on almost all the posters and merchandise that they distributed, it immediately became clear who exactly they wanted to use as a liberal "handsome boy" for their Russophobic policies.\n\nAlthough their opposition will be a big problem for us at first, they have big disadvantages. If the left is ready to go underground, and some of its members are radical and ready for anything, the flock of Democratic liberals is absolutely without ideas, they are afraid, afraid of losing their petty-bourgeois paradise, they see that the Russia we want is not the Russia of a sluggish consumer who lazily goes to the polls from time to time to elect a talker.\nThey can bark loudly, but as soon as we give them enough pressure, they will start whining. Their leaders are no better, they are fighting for their mandates, parliamentary cars and a good life next to the state that supports them.\n\nUnfortunately for them, Alikhanov is already preparing a lesson for them. Inside the walls of the Kremlin at night, the President and his loyal derzhavnik lieutenants are preparing a new pantomime..."
 russia.2024.a: "Damn DemocRATS..."
 russia.2025.t: "Blood on the Pavement"
 russia.2025.d: "Vladislav Davankov, co-chairman of the New Russia party, moved stealthily through the dim alleys of Moscow. His coat billowed in the wind, and his black cap concealed his face. Each rustling leaf and stray noise sent a shiver down his spine. The city seemed to be suffocating under a pall of fear and oppression. The regime had instilled a climate of terror, silencing any voice that dared to advocate for democracy or constitutional order. Reports from the provinces were grim: beatings, disappearances, threats had become commonplace. The authorities acted with impunity, spreading chaos and violence. Leftist parties, once allies in the struggle against Alikhanov, now found themselves victims of brutality.\nDavankov read the news with a mix of horror and disbelief. How could Russia, which had once embraced liberalization, descend so swiftly into authoritarianism? Did the people truly yearn for democracy? Or were they content to be ruled by a tyrant? These questions gnawed at him as he traversed the desolate streets. His thoughts were interrupted by the sudden glare of headlights. A Jeep emerged from the shadows, blocking his path. Davankov froze, his heart pounding. He tried to back away, but a brutal blow to his back sent him crashing to the ground.\nHe fell to his knees and was then forcefully pushed face-first to the ground. The assault continued, his head spinning, flashes of light before his eyes. He struggled to see his attackers, but all he could make out were their yellow uniforms.\n"We'll clear your filth form Russia!" a gruff voice growled.\nThose words echoed in Davankov's mind as he felt the final, crushing blow to the head. Darkness consumed him.\n\nA week later, his body would be discovered on the outskirts of Moscow, beyond recognition."
 russia.2025.a: "He chose his destiny."
 russia.2026.t: "Assassination of Sergei Trunov"
 russia.2026.d: "Urgent news from St. Petersburg, Mr. President!\n\nThere was an explosion in the car this morning. As a result, Sergei Trunov, the leader of the local organization of Derzhavniks, and two of his guards were killed. The terrorist art occurred while driving, causing panic on the road and provoking several collisions.\nRosgvardiya and police officers quickly arrived at the scene, but they could not detain the terrorists, as the bomb was planted in advance.\nSoon, a video appeared on the Internet showing masked men claiming responsibility for the crime. They introduced themselves as members of the Liberation movement and declared their intention to fight for the freedom of St. Petersburg from the "filth of Derzhavism."\n\nThis crime must not go unpunished. Our enemies have bared their teeth, and this is war. We, the powers that be, know what war is. They have to answer for this, Captain. Blood for blood.\nSergei Trunov was a man of will, he went through the entire Polish front with me, there can only be fewer such people.\n\nAlthough it may seem like there aren't many of them, the city is actually full of hidden enemies. Tough measures must be taken. St. Petersburg is a hotbed of democratic and socialist ideas. The city must understand that to be against Derzhavism is to go against the will of Russia.\n\nYour loyal colleague Yulia Nilova. Curator of the Information Department for the City of St. Petersburg."
 russia.2026.a: "To put St. Petersburg under a special control zone!"
 russia.2027.t: "Creation of the ZOV Battalion"
 russia.2027.d: "Today, with the participation of Russia's leader, Anton Alikhanov, the ZOV Battalion came into being. The concept of creating a paramilitary unit under his control emerged shortly after his ascension to power and garnered support from all factions within the ruling elite. However, the initiative for the battalion's formation came from the Flag Bearers, who proposed gathering the bravest and most resolute fighters into a single unit. Among its members are veterans from the Armed Forces of the Russian Federation and the Rosgvardiya, along with volunteers from various detachments, many of whom have military experience or ties to the Wagner PMC. These soldiers are deeply committed to their ideals, perhaps too much so.\nAfter the official formation ceremony, in the evening, the battalion members began performing rituals reminiscent of neo-pagan practices. They claim these rituals are necessary for cultivating warrior spirit and eradicating cowardice within each fighter. The commanders of the battalion appear to aim for complete subordination of their subordinates, stifling individuality. Some moderate and religious statesmen have raised concerns about these practices. However, Alikhanov and the Flag Bearers view the creation of such a unit as essential for addressing problems within the army and in Russia as a whole.\n\nThe official motto of the ZOV Battalion is: "Glory to Russia – death to its enemies!""
 russia.2027.a: "Those kinds of soldiers are necessary..."
 russia.2028.t: "Creation of the Bogovoiny Battalion"
 russia.2028.d: "Today, with the participation of Russia's leader, Anton Alikhanov, the Bogovoins Battalion came into being. The concept of creating a paramilitary unit under his control emerged shortly after his ascension to power and garnered support from all factions within the ruling elite. However, the initiative for the battalion's formation came from the Revivalists, who proposed gathering the bravest and most resolute fighters into a single unit. Among its members are veterans from the Armed Forces of the Russian Federation and the Rosgvardiya, along with volunteers from various detachments, many of whom have military experience or ties to the Russian Orthodox Army. These soldiers are deeply committed to their ideals, perhaps too much so.\n\nAfter the official formation ceremony, in the evening, the battalion members began performing rituals reminiscent mock orthodox battle prayers, all the ceremony was headed by their official commander-priest Archpriest Svyatogor. They claim that these are necessary for cultivating real orthodoxic spirit and eradicating cowardice within each fighter. The commanders of the battalion appear to aim for complete subordination of their subordinates, stifling individuality. Some yellow guard statesmen raised concernes about religion on the battlefiled and especially in derzhavnik-led unit. However, Alikhanov and the Revivalists view the creation of such a unit as essential for addressing problems within the army and in Russia as a whole.\n\nThe official motto of the Bogovoins Battalion is: "Glory to God – Glory to all is holy to him!""
 russia.2028.a: "Those kinds of soldiers are necessary..."
 russia.2029.t: "Yellow Guard"
 russia.2029.d: "In recent times, a new organization has emerged in our nation, under the patronage of the National Russia Party. Known as the Volunteer-Patriotic Movement "Yellow Guard," this group has quickly gained attention for its activities. Their efforts include assisting citizens, collaborating with law enforcement, combating illegal immigration, and maintaining public order. However, their most significant focus is on ensuring security in the region of Novorossiya. They dedicate themselves to identifying enemy agents and monitoring discontented segments of society.\n\nDespite their commendable objectives, the "Yellow Guard" also has its drawbacks. Their members are often associated with fervent nationalism and anti-communism, which has led to tensions with leftist groups and instances of hostility towards Russian citizens of non-Russian descent.\n\nLet's not forget, the "Yellow Guard" was created by Alikhanov and his political party. The positive publicity surrounding their "brave" members appears to be boosting Alikhanov's political standing, which could undermine our democratic principles."
 russia.2029.a: "Well, at least they can help us..."
 russia.2029.b: "We must not give them a go, use administrative resources."
 
 russia.2030.t: "Union Organizes Workers' Strike"
 russia.2030.d: "The Independent Union has initiated a strike at a state-run facility, demanding better wages and increased benefits, along with some political slogans. We can use this opportunity to address their economic concerns while disregarding their communist aspirations."
 russia.2030.a: "Break them up, and bring them back to factories."
 russia.2030.b: "Negotiate with them."
 russia.2030.c: "Just wait this out, they will get hungry sooner or later." 
 russia.2031.t: "Leaflets Campaign Across Several Cities"
 russia.2031.d: "Anti-government leaflets have appeared in our cities. The police are investigating, but should we really worry about this outdated form of protest? We can publicize the arrest of these troublemakers."
 russia.2031.a: "Find the troublemakers, and make them pay."
 russia.2031.b: "Its just words, who reads those anyway?" 
 russia.2032.t: "Left-Wing Demonstrations"
 russia.2032.d: "Left-Wing opposition and their allies have sparked protests in numerous towns and cities across Russia. The police are currently suppressing most of these demonstrations, but swift action is crucial to prevent a perception of weakness."
 russia.2032.a: "Use all force neccesary, we must not be weak."
 russia.2032.b: "Keep these contained and wait them out."
 russia.2032.c: "Just let them whine, our power is secured."
 
 russia.2033.t: "Democrats Run Media Campaign"
 russia.2033.d: "Democratic dissent has launched a fierce media offensive against our leadership and Alikhanov. Their message is spreading rapidly through unregulated social media and beyond. We must swiftly develop a strategy to counter their influence"
 russia.2033.a: "Begin our counter-campaign."
 russia.2033.b: "Start media blackouts."
 russia.2033.c: "Who cares about those internets?" 
 russia.2034.t: "Military Officers Collusion With Democrats"
 russia.2034.d: "Reports have emerged suggesting military cooperation with low-ranking members of the democratic opposition. These reports claim that the military provides information to these members and spreads discontent within the ranks."
 russia.2034.a: "Start all out military purge in that area."
 russia.2034.b: "Fire all suspected traitors."
 russia.2034.c: "Who cares about low-rank officers?" 
 russia.2035.t: "Democratic Demonstrations"
 russia.2035.d: "Democratic opposition and their allies have sparked protests in numerous towns and cities across Russia. The police are currently suppressing most of these demonstrations, but swift action is crucial to prevent a perception of weakness."
 russia.2035.a: "Use all force neccesary, we must not be weak."
 russia.2035.b: "Keep these contained and wait them out."
 russia.2035.c: "Just let them whine, our power is secured."
 
 russia.2036.t: "The Portrait"
 russia.2036.d: "The photo shoot was grueling, stretching over three hours. Alikhanov stood in his regal black uniform against the backdrop of austere decor. The images were destined for everything: posters, flyers, advertising, statues, busts, and other forms of visual propaganda. His face had to become an integral part of daily life, so everyone - from workers to officials - knew who led the state.\nLoyal photographers swarmed around Alikhanov, showering him with compliments for every pose and look. Their enthusiasm was almost religious. Only the "free" sculptor Berkalov maintained a cool detachment, offering honest criticism. He could point out a flaw in Alikhanov's expression or hand position without hesitation. Alikhanov took his comments in stride.\nA longstanding understanding had developed between them, if not friendship, then certainly mutual respect. One was a master of strategy and power; the other, an aficionado of art and human form.\nWhen the shoot concluded, Berkalov approached Alikhanov with two printed photographs, potential candidates for soon-to-be-hung portraits in government offices.\n"Mr. President," Berkalov began with his characteristic sly grin, "I have two masterpieces here. But they're entirely different in mood."\nHe placed the first photograph in front of Alikhanov.\n"Here you're looking straight into the soul. This gaze pierces through. If this portrait hangs in offices, no bureaucrat will dare relax. It's a portrait of order and control."\nAlikhanov examined the photo carefully and nodded slowly. He turned to the second image.\n"And this one?" he asked with mild curiosity.\nBerkalov brightened, as if waiting for the question.\n"This one... He paused dramatically before continuing with enthusiasm, "Here you're the conqueror. Your gaze is directed into the distance, where your vision extends, unfulfilled. It's a portrait of ambition and a lofty goal."\nAlikhanov studied both images thoughtfully.\nBerkalov smiled slightly and added with a touch of mischief:\n"Personally, I would..." He paused, then shifted to a more serious tone. "But like everything else in our country now, the choice is yours, Mr. President."\nfaint smile played on Alikhanov's face."
 russia.2036.a: ""...Portrait of order and control.""
 russia.2036.b: ""...Portrait of ambition and a lofty goal.""
 russia.2036.c: ""...Let's try even more options!""
 russia.2037.t: "Red Derzhavniks"
 russia.2037.d: "Some of our allies are unexpected. Leftist forces, mostly from Belarus, and several former narodniks, now united under the leadership of Grigory Azarenka, Lukashenko's former propagandist, are creating their own movement in support of Alikhanov - the "Red Derzhavist Movement."\n\nAzarenok believes that Alikhanov will be able to build socialism in the country, despite the fact that we are not officially associated with this ideology. But even if these people don't fully understand our ideas and try to change them, we can use them to split off some of the leftists who are against us.\n\nIt's important to have as many allies as possible, even if they don't always share our views. The main thing is to keep them under control and use them to achieve your goals."
 russia.2037.a: "Sounds wise enough, we do need more allies."
 russia.2037.b: "They have their truth..."
 russia.2037.c: "Socialism? Shoot them."
 russia.2038.t: "The Return of the Russian Flag"
 russia.2038.d: ""PRESIDENT ALIKHANOV HAS RETURNED THE RUSSIAN FLAG!"\n\n"OUR LEADER HAS DECIDED TO RETURN THE NATIONAL BANNER!"\n\n"THANK YOU, GOD SAVE ANTON ANDREEVICH!!! THANK YOU FOR BEING OURS!"\n\nThis is just a small sample of what was written online after Anton Alikhanov signed a presidential decree on the new state symbols. Nothing much has changed, but now the Imperial, also known as the black-yellow-white flag, is becoming the state and "national" flag.\nNow it is this flag that will be in favor with the state and the "loyal" population, but the use of the usual tricolor is still allowed, at their own request, as well as for special events. In particular, the tricolor is becoming popular in the form of armbands, among statesmen and law enforcement officials who show their support, while not being a member of the Derzhavnikov party.\n\nThis action was perhaps the easiest in Alikhanov's policy. It's only going to get harder."
 russia.2038.a: "Three cheers for our great banner!"
 russia.2039.t: "United Russia's 'Hardliners' Quit Politics"
 russia.2039.d: "Recently, President Alikhanov has been bolstering various right-wing groups, creating a broad movement. This has had the unintended consequence of sidelining many hardline politicians within United Russia, who had previously co-opted nationalist rhetoric. As a result, some of these politicians have become invisible within their own party or have left politics altogether. Vyacheslav Volodin, often seen as the face of the more nationalistic faction, announced his retirement. His Duma seat will soon be taken by a Derzhavnik or an ally.\n\nMany similar cases have occurred across Russia. Speculative journalists even suggest that some were encouraged to step down so they could be replaced by more loyal Derzhavnik-aligned politicians.\n\nA few hardliners have chosen to moderate their views and join the mainstream of United Russia, adopting the party's commitment to "sovereign democracy." This appears to be the end of the rebellious faction within UR, as they have been overshadowed by a more radical wave."
 russia.2039.a: "Good riddance."
 russia.2040.t: "Factions Inside Derzhavniks"
 russia.2040.d: "The Derzhavniks may appear as a unified front to outsiders, but internally, our movement is far from harmonious. While many remain devoted to the leader's vision, there are those who advise him on how to mold it. Though smaller factions with differing ideas exist, only two groups stand out as stark opposites: the Flag-Bearers and the Revivalists.\n\nThe Flag-Bearers believe that Russian identity is not a birthright but something earned through sacrifice and struggle. They see modernity and its values as weak and confined by societal norms. Their ideal is a society of warriors and hard workers. They view religion as a by-product of culture, focusing instead on historical, cultural, and spiritual elements of Russian identity. Their supporters are mainly found among the rank-and-file of the Yellow Guard and in newly annexed territories like Novorossiya and Belarussia. They also harbor ambitions for a united Slavic union under Russian leadership.\n\nIn contrast, the Revivalists are deeply religious and Orthodox. They seek a return to the traditional Orthodox way of life and the restoration of Russian Christian identity. Their brand of Orthodoxy is uncompromising, embracing a "fire and sword" approach to non-believers. They envision a militaristic role for the clergy and church, seeing them as the spiritual center of society. For them, the concept of the Third Rome must be strengthened through the blood of true believers and their enemies. If it does not exist, they believe it must be built on this foundation.\n\nFor Alikhanov, it would be wiser to subtly endorse their ideas without favoring one over the other. After all, he enjoys a loyal majority that will agree with him on most matters."
 russia.2040.a: "Let's see whose ideas are better..."
 
 russia.2050.t: "Uprising In Saint Petersburg!"
 russia.2050.d: "Recent errors have sparked an insurrection in Saint Petersburg, igniting a complex socio-political struggle. Dissatisfied citizens and radical communist groups have united, seeking to undermine the Russian government's legitimacy and operational effectiveness. This alliance threatens the nation's stability and unity.\n\nWhether our policy was too permissive or too stringent is now secondary. The urgent task is to decisively quell this rebellion, using all available resources and strategies.\n\nRegrettably, our military, including soldiers and officers, has shown reluctance to engage. They prefer to remain within their barracks, waiting for the crisis to subside. This passive stance requires deploying loyal divisions of the Yellow Guard and other dedicated military units to fill the gap left by their inaction.\nIn Saint Petersburg, rebels have formed their own paramilitary forces. They are strategically positioned to launch an offensive, potentially seizing control of Moscow."
 russia.2050.a: "We must stop them at all cost!"  
 russia.2051.t: "Communists Attack Novgorod!"
 russia.2051.d: "Communist militias have launched an attack on the Novgorod region, taking local authorities by surprise. We are now relying on loyal troops within the region to defend it.\nWe must develop a strategy that will yield the best possible outcome on the battlefield. If we fail, Novgorod could serve as a gateway to Moscow, making it much harder to stop their advance."
 russia.2051.a: "We must launch a counterattack against these ragtag militia. They won't stand a chance!" 
 russia.2051.b: "Their forces are numerous but weak. We must improve our defense of the region." 
 russia.2052.t: "Failure of the Operation"
 russia.2052.d: "Despite our best efforts, their overwhelming army, though ill-equipped, managed to defeat the hastily assembled defensive force we had quickly organized in the region. Novgorod now lies within Red's territory, and they are already recruiting local sympathizers. Their commanders are preparing to launch an even deeper attack."
 russia.2052.a: "Blyat!" 
 russia.2053.t: "Success of the Operation"
 russia.2053.d: "Our counterattack succeeded! Although we suffered losses, the Reds were clearly unprepared for such a fierce onslaught so early on. We caught them off guard. Novgorod is secured!\nNow more isolated than ever within their small city commune, they are ripe for defeat. We'll crush them swiftly, even if it means making sacrifices."
 russia.2053.a: "Very good!" 
 russia.2054.t: "Reds Attack Tver!"
 russia.2054.d: "Our situation is deteriorating by the hour, dear leader. The Communists are now targeting the Tver region, which is even less prepared to withstand an attack. There are fewer men on the front lines now than ever before.\nWe can devise a strategy, but it's like trying to hit a moving target in the dark. There's no way to predict how this situation will unfold."
 russia.2054.a: "Regroup all remaining forces and attack them at once, blyat!"
 russia.2054.b: "Ebana v rot, defend it no matter the cost, shoot those who desert if you want!" 
 russia.2055.t: "End of Derzhavnik Tyranny"
 russia.2055.d: "With each failure and the turmoil caused by the uprising, Alikhanov's support dwindled, even among his own men. After a brutal massacre of Derzhavnik forces, Moscow itself erupted in revolt. With no central authority and outnumbered police, the protesters broke free from martial law and invited Red militias into the city.\nLike heroes from the past, Communists and their allies wrested control of the country from the oppressors, returning it to the people. They had already cleared the Duma and Kremlin of their previous occupants.\n\nThe whereabouts of the Derzhavnik top cabinet remain unknown, and Alikhanov himself seems to have disappeared. A nationwide manhunt has been launched, but now the Derzhavniks are leaderless and demoralized by their failure.\n\nThe army, choosing to wait, made a wise decision. They swore loyalty to the new national government, led by the Rugtug left-wing coalition.\n\nRussia now prepares for its new socialist era, though the details must be decided quickly."
 russia.2055.a: "Glory to the working class!" 
 russia.2056.t: "End of Communist Rebellion"
 russia.2056.d: "The success of previous operations, regardless of their brutality, began to reveal cracks in the weak communist leadership in Saint Petersburg. As they argued over strategy, our spies and loyalists inside the city gathered crucial intelligence on the positions of their dwindling forces.\n\nOn this day, a massive assault commenced with drones, artillery, and naval forces. The city of rebels was obliterated, and their remaining battle-ready troops were annihilated.\n\nYellow Guard units now moved through the streets, mopping up any lingering resistance. The leaders scattered, some fleeing like cowards, while others were captured and faced severe consequences, likely including the death penalty. Such was the fate of traitors.\n\nAlikhanov delivered a speech declaring an end to the terrorist menace. He blamed the lenient policies of the people-loving Derzhavnik government but emphasized that such mistakes would not be repeated. He announced a major cleanup operation and vowed that Russia would no longer tolerate traitors."
 russia.2056.a: "Glory to Russia!"
 russia.2057.t: "Military Mutiny In Kuban!"
 russia.2057.d: "The disloyal military has openly rebelled against us! They've gathered their main force in the Kuban region, where all the disloyal soldiers and officers have fled. They've allied themselves with detestable democrats and their cronies.\n\nHowever, the majority of the army has yet to respond to either side's call to arms. Therefore, we must muster the forces under our direct control.\n\nUndoubtedly, they are planning an operation to seize Moscow with their formidable spearhead. We must thwart their plans at any cost!"
 russia.2057.a: "We must stop them at all cost!" 
 russia.2058.t: "The Rebels Expand Their Control!"
 russia.2058.d: "With insufficient forces in the Kuban region, we have been unable to protect these territories from enemies. However, the situation remains stable because the local people are largely apolitical and have chosen to remain neutral, refusing to side with traitors.\n\nWe must act swiftly to prevent the loss of more territory!"
 russia.2058.a: "Shit!"
 russia.2059.t: "Pro-Coup Protests!"
 russia.2059.d: "The news of open rebellion must have thrilled our enemies. Rat-like democrats and liberals poured into the streets of many cities, openly siding with current traitors. While the police and other forces are currently handling the situation, these ill-prepared youths still manage to distract parts of our troops from the real threat posed by traitorous generals and their liberal backers."
 russia.2059.a: "Crush them at once!"
 russia.2060.t: "Information Leak"
 russia.2060.d: "Our spies within their territory have uncovered a military plan for a bold and unprecedented attack. They intend to send convoy after convoy towards Moscow, exploiting our currently paralyzed system due to riots.\n\nHowever, our spymasters believe they have a solution. These soldiers, though loyal to their command, don't seek much. We can pay them off through these operations and sabotage their plans. Alternatively, we can contact the undecided military and offer them generous rewards to align with us."
 russia.2060.a: "It will hurt financially, but our reign will be secured."
 russia.2060.b: "To hell with them! We must mount a resolute defense with every resource at our disposal."
 russia.2060.c: "To hell with them! Strike when they least expect it, all hands on deck!"
 russia.2061.t: "Failure of the Operation"
 russia.2061.d: "We have fallen short of our goal. Their forces are overwhelming and fiercely loyal. They cleverly exploited our own internal problems to their advantage. In some cities, they even found a welcome among the people.\nTheir convoys are advancing deeper into Russia, heading toward Moscow. We have very little time to develop an effective defense strategy."
 russia.2061.a: "Blya..." 
 russia.2062.t: "Success of the Operation"
 russia.2062.d: "Our strategy has succeeded! The enemies are disarrayed by our lack of support and our military actions.\n\nInside Kuban, the remnants of resistance are virtually defenseless, possessing few resources and allies. Now, we can swiftly defeat them. We will drive them into the Black Sea, letting them swim with the fishes."
 russia.2062.a: "Amazing!"  
 russia.2063.t: "End of the Putschists"
 russia.2063.d: "The success of previous military operations, regardless of their ruthlessness, was significant. We have quelled the uprising. Our decisive actions and superior battlefield tactics have driven the rebels from Kuban. Numerous democrats who had set their sights on victory are now in our possession. Their time is limited. The military generals who participated in the uprising refused to surrender and were dealt with accordingly, as is the fate of traitors.\n\nAlikhanov delivered a speech declaring an end to the terrorist menace. He blamed the lenient policies of the people-loving Derzhavnik government but emphasized that such mistakes would not be repeated. He announced a major cleanup operation and vowed that Russia would no longer tolerate traitors."
 russia.2063.a: "Glory to Russia!" 
 russia.2064.t: "End of Derzhavnik Tyranny"
 russia.2064.d: "Each failure and the turmoil from the uprising sapped Alikhanov's support, even among his loyal followers. After a brutal massacre, Moscow itself erupted in revolt. With no central authority and overwhelmed police, protesters broke free from martial law and called in military forces.\nLike legendary figures of the past, the army generals, democratic opposition, and their allies wrested control from the oppressors, returning power to the people. They had already cleared the Duma and Kremlin of their occupants.\n\nThe whereabouts of the top Derzhavnik officials remain unknown, and Alikhanov himself seems to have vanished. A nationwide manhunt is underway, but the Derzhavniks now face a leaderless, demoralized future.\n\nThe army's decision to wait proved wise. They pledged loyalty to the new national government, led by the Rugtug democratic coalition.\n\nRussia is poised on the threshold of a new democratic epoch. The specifics, however, remain to be clarified."
 russia.2064.a: "Glory to Democracy!"
 
 russia.2100.t: "The Fydorov Coup"
 russia.2100.d: ""
 russia.2100.a: "The end of the liberast hope."
 
 russia.2101.t: "The Leningrad Committee"
 russia.2101.d: "Recent errors have sparked an insurrection in Saint Petersburg, igniting a complex socio-political struggle. Dissatisfied citizens and radical communist groups have united, seeking to undermine the Russian government's legitimacy and operational effectiveness. This alliance threatens the nation's stability and unity.\n\nHowever, we face an unusual situation. Most of the left-wing opposition has chosen to support the Democrats. In Saint Petersburg, the radical Stalinist faction has taken control, led by notorious Stalin apologists. Losing to such individuals would be an embarrassment of epic proportions!\n\nRegrettably, our military, including soldiers and officers, has shown reluctance to engage. They prefer to remain within their barracks, waiting for the crisis to subside. This passive stance requires deploying loyal divisions of the Yellow Guard and other dedicated military units to fill the gap left by their inaction.\nIn Saint Petersburg, rebels have formed their own paramilitary forces. They are strategically positioned to launch an offensive, potentially seizing control of Moscow."
 russia.2101.a: "All hands on deck, we must stop those tyrant-loving fossils!"
 
 russia.2103.t: "Grip on the News"
 russia.2103.d: "We've noticed that tighter control over media, especially state channels, is necessary. They should be reorganized to better align with our goals.\nHowever, many of these channels still aren't fully under our influence. We need to determine how to manage them and what guidelines to apply."
 russia.2103.a: "There should more focus on military and war related media."
 russia.2103.b: "Just keep the grip on the official news networks."
 russia.2103.c: "We should fund christian media and expand religion on the TV." 
 russia.2104.t: "Derzhavnik Woman Organization"
 russia.2104.d: "Our organization is deeply committed to feminism. Through various affiliated groups, we empower Russians to fully participate in political life. Now, we must determine the future path of our women's organization. Specifically, we need to decide on our approach to advocating within spaces predominantly populated by women."
 russia.2104.a: "Our woman should become battle sisters for our soldiers and men!"
 russia.2104.b: "Make it be focused volunteer and cultural work."
 russia.2104.c: "This organization should promote orthodoxy inside family and women's life." 
 russia.2105.t: "Derzhavnik State Trade Union"
 russia.2105.d: "Workers are the heart and soul of Russia, and we must guide them through trusted organizations. Among these, the state union stands out as the largest and most promising.\nHowever, we need to shape its image and articulate the ideological principles it will uphold for the public and the workers who join it."
 russia.2105.a: "The greater focused must be placed on military industrial workers and their benefits."
 russia.2105.b: "It should be focused on general loyalty and free holidays for workers that join it."
 russia.2105.c: "This organisation must be organized in virtues of piety and obedience." 
 russia.2106.t: "New Youth Organiztion"
 russia.2106.d: "Russia already had numerous youth-focused organizations, but they were disorganized and too small to meet the needs of our new state. Therefore, we should concentrate on uniting them into a single, cohesive organization directly linked to SZND.\nWe must consider what this organization will impart to young minds and what values we will instill within them."
 russia.2106.a: "It should be and improved and expanded Yunarmya, where kids study the way of the battle."
 russia.2106.b: "Kids must know the virtues and biblical studies, and know that Russia is the holiest land."
 russia.2107.t: "Nominal Restoration of the Monarchy?"
 russia.2107.d: "Certain derzhavniks, primarily those from various organizations, have sent a letter to our esteemed leader, urging him to endorse the restoration of the monarchy. They argue that it is Russia's most natural form of governance, which not only benefits the Russian people but also strengthens control over nationalist groups and monarchists.\n\nMany pretenders have been overlooked, but Gavril Doroshin was chosen as the best candidate due to his experience and alignment with Alikhanov's vision. However, the risks are significant. Even if Doroshin is merely a figurehead, sharing the leadership with an official tsar would diminish the impact of our great leader."
 russia.2107.a: "Not a bad idea! We do need more support from the monarchists."
 russia.2107.b: "There can be no one above our Leader. Loyalty him is paramount."
 russia.2108.t: "Azarenok Coup"
 russia.2108.d: "It was a peaceful night. Alikhanov rested at his dacha near beloved Kaliningrad, watched over by loyal guards. This tranquility ended abruptly when an unknown force opened fire on the outer security. The dacha became a fortress under Alikhanov's command.\n\nCut off from the world by radio jammers, Alikhanov quickly identified the culprit: Azarenok. This cowardly figure had been gaining influence rapidly, drawing more and more people into his red-derzhavist ideology.\n\nOn the other side, Azarenok stood with his men near the battleground. His plan was simple: kill Alikhanov and everyone present, then frame it as an attack by desperate opposition from the outside. He aims to use this leverage to seize control of SZND and declare himself Alikhanov's closest ally, continuing his doctrine.\n\nThe fate of Derzhavism hangs on this battle between guards and conspirators, each fighting for their masters..."
 russia.2108.a: "Azarenok's co-conspirators overpower Alikhanov's personal guards!"
 russia.2108.b: "Alikhanov and his guards manage to fight of these conspirators!"
 russia.2109.t: "New Derzhavnik Regime"
 russia.2109.t2: "The New Red Tsar"
 russia.2109.d: "The new leader's televised address resonated throughout the nation.\n\nWith the regime firmly established, Azarenok confidently announced that the killers of Alikhanov would be brought to justice. Russia's unity under this new leadership seemed driven by a singular purpose: revenge.\n\nMeanwhile, loyalists of the true Alikhanov were discreetly removed from positions of power. The vision of Derzhavnik Socialism was now being propagated across all branches of the SZND.\n\nNews outlets around the world were already labeling this event the palace coup of the 21st century, casting doubt on Azarenok's assertions."
 russia.2109.d2: "The new leader's televised address resonated throughout the nation.\n\nWith the regime firmly established, Azarenok confidently announced that the killers of Alikhanov would be brought to justice. Russia's unity under this new leadership seemed driven by a singular purpose: revenge.\n\nMeanwhile, those loyal to the original Alikhanov were quietly removed from positions of authority. The Tsar, too, was discreetly disposed of, formal abdication signed, replaced by a very eccentric and melancholic descendant of Josef Stalin. Initially reluctant, he was eventually 'persuaded' to take up the role.\n\nNews outlets around the world were already labeling this event the palace coup of the 21st century, casting doubt on Azarenok's assertions."
 russia.2109.a: "Long Live the New Leader!"
 
 russia.2110.t: "Alexei Navalny Sworn In"
 russia.2110.d: "After the successful neutralization of the existential threat to state sovereignty, the Russian political elite faced the need to identify a new head of state. In this context, it should be noted that the return to the political arena of a figure previously known to the general public has become a landmark event. This individual, known as Alexei Navalny, not only changed his political views, but was also forced to go underground as a result of persecution by the Alikhanov authorities.\n\nIn the context of temporary political instability caused by the elimination of the threat of derzhavism, the government, despite its lack of organizational effectiveness, decided to temporarily appoint Navalny to the post of president of the country until the upcoming elections. This step was taken in order to ensure the legitimacy and stability of the transition period.\n\nHowever, Navalny, having shown political foresight, refused to participate in the upcoming elections, arguing that Russia needs an influx of new, unbiased personnel. In his opinion, active participation in the election campaign could lead to the consolidation of the electorate around his person, which, in turn, could negatively affect the process of democratic transit."
 russia.2110.a: "Democracy restored, at last..."
 
 russia.2111.t: "End of Dissent"
 russia.2111.d: "As dawn breaks over Russia's vast landscape, the people, known for their defiance, awaken without the urge to criticize their government or state. Due to the efforts of thousands of loyal citizens and yellow guard troops, the state machine kept growing and growing. All democratic and left-wing opposition organizations have been destroyed and majority of their members arrested.\n\nRussia now enters a new era where every citizen is devoted to the state and seeks no individuality. \n\nHistory will not be kind to those who opposed or fought against Russia's legitimate leadership. They will be erased from memory, though some will be labeled traitors in history books penned by victors, who, in their desperation, sought to undermine their homeland's destiny. Forever marked by dark pens, their feeble calls for false freedom will go unheard. Some of them will die in the mines or prison camps, the others will never leave confine of the police basements alive.\n\nWeak remaining voices are drowned by the cacophony of Derzhavist slogans and military marches.\n\nThe people of Russia are now of a single mind: no doubts, no reluctance, no unnecessary questions.\nIsn't that happiness?"
 russia.2111.a: "Blessed be relief from freedom; lest ye feel the need for treason."
 russia.2112.t: "New Tommorow"
 russia.2112.d: "Thanks to the joint efforts of the Russian people and the coordinated action of the resistance, and Alikhanov's tyranny was overthrown. Derzhavniks and their loyalists, left without their leader, have scattered to God-forsaken places like rats from a sinking ship, they are disorganized and pose only a small danger.\n\nThousands of people took to the streets to celebrate this moment with Russian flags, especially in St. Petersburg. Some rallies have not stopped until now.\n\nAnd, although it will take some time to dispose of the enormous bureaucratic machine with thousands of ministries, still, citizens can now sleep peacefully at night. The first decrees and promises of the new government are about freedom of speech and democratic laws, as well as the lustration of regime officials. Every bureaucrat who abused their position will be soon locked up in the jail cells previously occupied by political prisoners.\n\nHope may be just beginning to return to the souls of the Russian people, but we can already say that a new tomorrow will come soon, and it will show exactly where Russia will go.\n\nAlthough the revolution took many honest lives as well, one can't make an omelet without breaking a few eggs, right?"
 russia.2112.a: "I have a dream..."
 
 russia.2113.t: "The People's Congress"
 russia.2113.d: "With the new government firmly in place, Sergei Udaltsov announced the beginning of what would come to be known as the People's Congress, where the future of Russia's socialist transformation would be decided.\n\nAs delegates settled into their seats, two distinct factions emerged in the debate. On one side stood Sergei Udaltsov, alongside orthodox socialists and communists who advocated for a return to traditional socialist ideals. Opposing them was the trade unionist faction, led by the Confederacy of Labour, which proposed a new form of socialism centered on trade unions-an idea that had only been tested in a few experiments.\n\nWhile Udaltsov remained the more popular choice, the moment of truth was fast approaching. Only time would reveal which path destiny would favor."
 russia.2113.a: "Udaltsov Is Elected Chairman of the People's Congress!"
 russia.2113.b: "Kravchenko Is Elected Chairman of the People's Congress!"
 russia.2114.t: "New Youth Movement"
 russia.2114.d: "In our state's increasingly complex regulatory environment, a critical question arises: how can we nurture politically engaged youth within the current governance structure?\n\nOne possibility is to revive and integrate Soviet-era organizations like the Komsomol and Pioneers into a modern context. By doing so, we could harness historical precedents and existing structures to encourage civic participation and political literacy among young people. Alternatively, we might adopt a more radical, anti-statist approach, resurrecting the "Vanguard of the Red Youth." Unlike many other communist groups, this organization operated unofficially and without taint, emphasizing youth autonomy and activism. By following this path, we would tap into a historical legacy that champions unmediated political engagement, providing a platform for young voices to be heard."
 russia.2114.a: "New Komsomol!"
 russia.2114.b: "The kids must be ready for the revolution, not boring bureaucratic work."
 russia.2115.t: "Elections!"
 russia.2115.d: "After enduring many tedious days of waiting for the elections, campaigning, and rallies, the time for Russians to decide the future has come! We stand the dawn of the new era, our people will vote to elect new president for mother Russia, let us hope for their prudence and faith...\n\nWith all votes tallied, the victor is..."
 russia.2115.a: "Conservative Candidate!"
 russia.2115.b: "Liberal Candidate!"
 russia.2115.c: "Socialist Candidate!"
 russia.2115.f: "Patriot Candidate!"
 russia.2115.g: "Nationalist Candidate?!"
 russia.2115.z: "Communist Candidate?!"
 
 russia.2116.t: "Party of the Proletariat"
 russia.2116.d: "As we reconstruct the Soviet system, one of its fundamental elements will be the party. Due to a shortage of experienced bureaucrats at present, we must decide where to find fresh blood and leaders for our new system.\nThere are three potential options to consider:\n1. The old Stalinist RCWP-CPSU and their hardliners can assist in restoring order and stability to our regime. They also uphold Soviet patriotism and anti-revisionist views.\n\n2. The RWP, formerly a Trotskyist organization, has a substantial youth base and encompasses many socialists and communists. They can contribute to the vitality of our revolutionary state.\n\n3. A multitude of smaller communist groups with a general Leninist approach to governance and history. We can utilize them as a middle ground to avoid extreme positions."
 russia.2116.a: "Fill our ranks with Stalinists."
 russia.2116.b: "Fill our ranks with Informal Socialists."
 russia.2116.c: "Unite all general communists parties into our system."
 
 
 russia.2117.t: "Moderate Leftists Unify"
 russia.2117.d: "As our nation's political scene revives, moderate left forces are coalescing into a single party. This new formation encompasses a range of past elements, including A Just Russia, moderate members of the Communist Party of the Russian Federation, People's Russia, and various other minor social-democratic groups\n\nAt its founding congress, the party's political and economic platform was established, along with a critical decision: its name."
 russia.2117.a: "All-Russian Socialist Labour Party."
 russia.2117.b: "Socialist-Democratic Union."
 russia.2117.c: "Social-Democratic People's Party."
 russia.2118.t: "Conservative Forces Unite"
 russia.2118.d: "Our nation is recovering from the wounds of its radical ultranationalist history. Moderate conservative forces have united to create a new political entity.\nAt their party congress, they discussed social and political issues. They also chose a name for their political organization."
 russia.2118.a: "All-Russian Patriotic Party."
 russia.2118.b: "National Course."
 russia.2118.c: "National Unity Party." 
 russia.2119.t: "Liberals United"
 russia.2119.d: "A cohesive liberal faction has crystallized within the political milieu, bolstered by the endorsement of eminent liberal figures and organizations. This consolidation was formally inaugurated at a foundational congress, attended by a diverse cohort of politicians spanning various generational strata. During this assembly, the faction meticulously delineated their political agenda and unanimously selected their nomenclature, thereby formally articulating their political identity and objectives."
 russia.2119.a: "Civic Platfrom."
 russia.2119.b: "Democratic Centre."
 russia.2119.c: "Russian Democratic Party."
 russia.2120.t: "Patriots Unite Their Forces"
 russia.2120.d: "Hardline patriots and ultraconservatives, predominantly hailing from the reactionary faction of the older United Russia wing, as well as staunch supporters of the Putin era's strongman policies, have coalesced into a formidable political bloc. During their conclave, where they meticulously deliberated on strategies to maintain their relevance, they also bestowed upon their organization a nomenclature that resonates with their ideological tenets."
 russia.2120.a: "Assembly for Russian Unification."
 russia.2120.b: "Fatherland."
 russia.2120.c: "Sovereign Democratic Party."
 russia.2121.t: "Nationalists, But Not These Kind of Nationalists!"
 russia.2121.d: "Despite our nation's ultranationalist takeover, many nationalists disagreed with Derzhavniks and Alikhanov. Belov-Potkin, once a lesser-known nationalist, became a prominent voice among those who opposed Alikhanov and felt their visions were excluded from SZND.\nNow, opportunistically, he has aligned himself with the democratic opposition. Assembling a team, he is forming a political organization to continue nationalist politics in post-Alikhanov Russia.\nTypical discussions included the future name of the organization..."
 russia.2121.a: "Union for Struggle Against Bolshevism."
 russia.2121.b: "All-Russian Imperial Movement."
 russia.2121.c: "National Party of the Russian Federation."
 russia.2122.t: "Red Wave"
 russia.2122.d: "Communists in Russia always find a way back into the political scene, no matter what. This time, Sergei Malenkovich is trying to bring together communist forces, similar to the Red Russia Coalition before Alikhanov took over.\nMalenkovich gathered his group and presented their program, outlining their communist and populist platform.\nThey've chosen a name..."
 russia.2122.a: "Communists of Russia."
 russia.2122.b: "Union of Communists."
 russia.2122.c: "Stalinist Bloc."
 
 russia.2126.t: "Minor Parties Across Russia"
 russia.2126.d: "Predictably, in addition to more enduring political forces, a plethora of new organizations and parties have emerged in the Russian political landscape. These include dogmatic Stalinist communists, more radical far-right nationalists, liberal socialists and market liberals. Although most of these groups are not worth mentioning, some might be taken into account if their policies are acceptable for future governments to consider for coalition talks or to make them more visible on the national stage."
 russia.2126.a: "It is what it is." 
 
 russia.2127.t: "First Session of the National Assembly"
 russia.2127.d: "Following increased democratization efforts and Alikhanov's declaration, the National Assembly convened for its inaugural session. With a total of 500 seats, most are now filled, while the remaining positions are coveted and only secured after the first election.\nInitially, the deputies gathered under the broad banner of "Independent," but soon distinct factions emerged, evolving into new political entities. The most significant of these is the "Union of National Democratic Revival," backed by Alikhanov. Comprising national democrats, former derzhavists, and a few technocrats, it has become the new dominant party in Russia. It retained much of the SZND's structure but modernized it to fit a more civic setting.\n\nOther notable factions include the Russian Constitutional National Party, a democratic and reformist group led by conservative democratic survivors of purges. However, due to its moderate and passive stance, it is likely to be seen as controlled and easily compromised.\n\nThe Industrial Development Party and the Trade Union of Russia focus purely on economic benefits for industrial and trade capitals, while using Assembly to compete for influence for finance and industrialized corporations.\n\nThe smallest faction is the State Labour Union, a left-leaning organization primarily composed of left-wing nationalists and nationalist socialists. Despite their leftist orientation, they mainly advocate for increased state control and only support welfare policies tailored to the ethnic Russian working class."
 russia.2127.a: "A quieter democracy." 
 russia.2128.t: "Anton Alikhanov Drops SZND"
 russia.2128.d: "Shocking to many, Alikhanov officially declared himself independent, severing ties with SZND. In his announcement, he criticized party loyalty for blind adherence to dogma and refusal to acknowledge the truth. From now on, he would operate as an independent force in the country's life.\nHe also announced the impending first session of the National Assembly, a new body for 'democratic' participation. Critics swiftly noted the absence of rebuilt democratic institutions in Russia and warned that these reforms would merely improve appearances, creating a neo-aristocratic democracy dominated by elites and their interests while marginalizing genuine voices.\nDespite this, reformists celebrated their victory over SZND hardliners, who were now leaderless and politically sidelined."
 russia.2128.a: "Glory to Alikhanov, the wisest of the wise!"
 russia.2129.t: "What Remains of the Past Glory"
 russia.2129.d: "Despite the removal of hardline Derzhavniks from politics, leaving them without a controlled force could be disastrous for our new regime.\n\nWhile many Derzhavniks and their supporters are at ease with Alikhanov's permanent head of state status, there are still those who prioritize ideology over personal preference. These are mainly the Flag-bearers and Revivalists, determined to advance their vision of Derzhavism.\n\nWe could form a stable political party from their remnants, monitored and controlled by the new administration, to give their supporters the illusion of representation.\n\nAlternatively, we could attempt to unite both wings of the Derzhavnik movement, encouraging them to reintegrate into society. This would broaden our influence, but it would require more effort."
 russia.2129.a: "Use Flag-Bearers, we can use their militarism."
 russia.2129.b: "Assemble Revivalists, their piety can be of use."
 russia.2129.c: "Combine both of them, they're all patriots after all."
 
 nato.6.t: "Unmarked Civilian Airliners" 
 nato.6.d: "ATC CHOPINA, WARSAW\nUnmarked flight, state your callsign and destination.\n\nUNMARKED PLANE\n...\n\nATC CHOPINA, WARSAW\nUnmarked flight, you are flying over restricted airspace, state your callsign and destination immedietly.\n\nUNMARKED PLANE\n...\n\nATC CHOPINA, WARSAW\nSecond unmarked flight, state your callsign and destination. There's more on the radar... 10, 15, 20... Unmarked flights, state your callsigns immedietly or you will be forcefully grounded.\n\nUNMARKED PLANE\n..."
 nato.6.a: "THOSE ARENT CIVILIAN FLIGHTS"
 tajikistan.1.t: "Rogun Dam in Tajikistan Near Completion"
 tajikistan.1.d: "Tajikistan is actively completing work on the Rogun HPP, the country's key energy project. According to the government, the construction of the dam has reached the final stage, and the last hydraulic units are being installed. After commissioning, the plant will become the largest in Central Asia, providing the region with cheap electricity and reducing dependence on imports.\n\nThe project, started by the USSR government in 1976, was repeatedly frozen, but in 2018 construction resumed with the support of Russia. The final launch is planned for the coming years."
 tajikistan.1.a: "Good for them."
 #Starting Tree (First 2 Years)
 SOV_the_russian_dream: "The Russian Dream"
 SOV_the_russian_dream_desc: "A country encompassing 1/8th of the world. One that refuses to be just a footnote in history. With territories and people outside it that yearn to return. One that refuses western hegemony and stands for the multi-polar world order. \nWhile the past century has not been kind to us, it also gave us some of our most glorious moments. And until the Russian soul is extinguished, we will continue to trek our own path."
 SOV_pacify_abkhazia_and_south_ossetia: "Defend Abkhazia and South Ossetia"
 SOV_pacify_abkhazia_and_south_ossetia_desc: "The two Georgian break-away states have been our allies and brothers ever since their wars of rebellion. Their people are resilient and proud. And loyal, which is most important. \n However, it is clear that we did a disservice to them by letting them be isolated from the world. We must integrate them into our economic and defensive sphere, for they deserve to have their regions prosper." 
 SOV_pressure_kiev: "Pressure Kiev"
 SOV_pressure_kiev_desc: ""
 SOV_global_propoganda_campaigns: "Global Propoganda Campaigns"
 SOV_global_propoganda_campaigns_desc: ""
 SOV_complete_nordstream2: "Complete Nordstream 2"
 SOV_complete_nordstream2_desc: ""
 SOV_review_the_military_budget: "Review the Military Budget"
 SOV_review_the_military_budget_desc: ""
 SOV_ties_with_bashar: "Ties with Bashar"
 SOV_ties_with_bashar_desc: ""
 SOV_chinese_trade_deals: "Chinese Trade Deals"
 SOV_chinese_trade_deals_desc: "Our Eastern Neighbour is home to the second economy in the world. Yet it is the main producer of goods. A nation of such magnitude has a lot of expertise that can be shared with us, considering from where they started. Let their industrialists show the way to prosperity, for it is time for us to replicate their techniques."
 SOV_condemn_ukraine_neonazism: "Condemn Ukrainian Neo-Nazism"
 SOV_condemn_ukraine_neonazism_desc: ""
 SOV_prepare_the_union_state: "Prepare the Union State"
 SOV_prepare_the_union_state_desc: "In 1999, Alexander Lukashenko signed a declaration of the Union State with Boris Yeltsin. Of course, the idea was that Batka would take over Russia once this agreement took power. However, with the ascendance of Vladimir Putin the project was ground to a halt. \n But nothing can be stalled forever, and our President is focused on achieving the Union State as soon as possible. He even bought Abkhazian wine for a meeting with Lukashenko, that's how serious he is in this endeavor! "
 SOV_increase_fsb_funding: "Renew The Mandate"
 SOV_increase_fsb_funding_desc: "It is the will of the people that keeps Putin in power. For all the talk about authoritarianism, public opinion is indeed what matters. But of the government but of Putin himself. For the people are willing to tolerate corruption and inefficiency as long as the man in charge is one they support. \n And hey, if it worked with Obama and Trump, why should we be different?"
 SOV_strangle_the_islamists: "Strangle the Islamists"
 SOV_strangle_the_islamists_desc: ""
 SOV_tighten_the_leashes: "Tighten the Leashes"
 SOV_tighten_the_leashes_desc: ""
 SOV_fight_against_the_left: "Fight Against The Left"
 SOV_fight_against_the_left_desc: "The left presents the main danger to our system currently. Support from Navalny during previous local elections, "Sovereign citizen of the USSR" cult, anti-establishment rhetoric. Since the nationalists have already been cracked down on, the leftists should follow suit. It's only fair."
 SOV_fight_against_the_right: "Fight Against The Right"
 SOV_fight_against_the_right_desc: "In the 2010s, our government has cracked down on the nationalist sentiments, primarily of anti-migrant and xenophobic kinds. Yet the threat still remains and even seems to flourish. We cannot forget how many of our neo-nazis flocked to the Ukrainian side to "fight the bolshevik presidency and their bootlickers". And while we also have nationalists who support our cause, it is best to make sure they cannot propagandize their ideology."
 SOV_fight_ldpr_influence: "Subvert LDPR Influence"
 SOV_fight_ldpr_influence_desc: "The LDPR needs to be pressured, as it is the mainstream body of the rightist movement in Russia. You know the drill, chop chop!"
 SOV_fight_liberalism: "Fight Liberalism"
 SOV_fight_liberalism_desc: ""
 SOV_fight_communist_nostolgia: "Subvert CPRF Influence"
 SOV_fight_communist_nostolgia_desc: "The CPRF needs to be pressured, as it is the mainstream body of the leftist movement in Russia. You know the drill, chop chop!" 
 SOV_expand_government_framework: "Expand Government Framework"
 SOV_expand_government_framework_desc: "Our grip on the state makes it easy to laze around and do nothing. However, our President thinks that we should "strengthen our administration" by getting new connections and alliances within the system ready. The All-Russian People's front is an already established system. All we need is to expand it." 
 SOV_towers_of_kremlin: "Towers Of Kremlin"
 SOV_towers_of_kremlin_desc: "While the political parties are "united" in foreign policy and can act as yesmen, Russia is not a uniparty state. The "Towers" as we call them, are a collection of people throughout the government with similar backgrounds and views, pushing their collective agenda's forward. \nThe two main towers are "The Technocrats" and "The Siloviki". While the technocrats argue for more money on technological projects ranging from nuclear power to obvious cash grabs, the siloviki argue for more money on military projects ranging from nuclear weapons to obvious cash grabs. \n Placating either of these blocks will bring different benefits, but might also cause some problems." 
 SOV_anti_globalist_bulwark: "Anti-Globalist Bulwark"
 SOV_anti_globalist_bulwark_desc: "The global elites wish to subjugate the world, cage it under world-wide corporations. We must fight against such influence. We must show the world that the unipolar world order is destined to fall, for we and the Global Majority have the power to halt its influence." 
 SOV_glorify_our_victory: "Glorify Our Historic Victory"
 SOV_glorify_our_victory_desc: "We are the descendants of victors. Those who died to defend our people from extermination. Some in the liberal circles say that glorifying our victory is "bloodthirsty" and "unnecessary". Why should we forget about this war? Forget that almost 30 million Soviet citizens were killed by the Germans, massacred village by village? Israel too has lost a lot, yet they refuse to forget such atrocities. \nWe must follow their example and remember how much was sacrificed for us to be here." 
 SOV_amplify_state_media: "Amplify State Media"
 SOV_amplify_state_media_desc: "While the cable has been losing steam with the rise of the internet, we should not abandon it. Our media services must be amplified and refined, for we still rely on its success. \nAlthough it seems even CCN and BBC have been criticized for propaganda in their home countries... I guess it will be a tricky job to make every single one of our narratives appealing."
 SOV_pass_the_new_constitution: "Guarantor of The System"
 SOV_pass_the_new_constitution_desc: "Our beloved President has done the changes he wanted. Parlament shuffled, Towers pleased. Honestly, what would we even do without him? Seems like everyone else would likely rip each other's throats if not for his involvement. Well, as per occasion, a toast to our President!"
 SOV_declare_smo: "Commence Special Military Operation"
 SOV_declare_smo_desc: "After fixing most urgent problems, it is now time to look abroad. Ukraine has been steadily rearming for years with Western support. Our Donbass brothers have been strengthened, and our generals are telling us that the military is good to go. Well brothers, time for a Special Military Operation. \nZahodim! "
 SOV_stimulate_srzp: "Stimulate JRFT Popularity"
 SOV_stimulate_srzp_desc: "Justice Russia - For Truth is an interesting political entity. Composed of moderate socialists, nazbol veterans and centralists, it is in a precarious position. What helps is that while they are heavily critical of United Russia, they are loyal to our President. We could use them to get votes away from the CPRF though..."
 SOV_strengthen_the_federation_chairman: "Strengthen President's Party"
 SOV_strengthen_the_federation_chairman_desc: "The President only needs his party and nothing else! We must bring United Russia to a comfortable majority in opinion polls. Get to work!"
 SOV_1000_years_of_putinism: "1000 Years of Putinism"
 SOV_1000_years_of_putinism_desc: "It seems that the position of our dear President has been cemented. He has navigated multiple crises and reinvigorated our system. His story and legacy shall be written about in history books. A state of stasis, left unchanging for 20 years. \n Let's be ambitious and toast for this stasis to last for another millenia!"
 SOV_address_the_economy: "Address the Economy"
 SOV_address_the_economy_desc: ""
 SOV_pension_reform: "Pension Reform"
 SOV_pension_reform_desc: ""
 SOV_encourage_domestic_production: "Encourage Domestic Production"
 SOV_encourage_domestic_production_desc: "With the chaos that engulfed the supply chains, it is clear we must increase the number of our domestic products. This will also slow down our brain drain issue, as we give more focus to new industries that require skilled labor."
 SOV_strengthen_gazprom: "Strengthen Gazprom"
 SOV_strengthen_gazprom_desc: "Gas, Oil and natural resources have been, and probably will stay our main income base for at least half a decade. The European markets are quite dependent on us, and we shouldn't let such rare opportunities slip. Let the blue fire bring us the money trees."
 SOV_everything_is_alright: "Everything is Alright..."
 SOV_everything_is_alright_desc: ""
 SOV_force_lockdowns: "Enforce Lockdowns"
 SOV_force_lockdowns_desc: "Well... it seems this virus is more serious than we first thought. Let's put Russia on lockdown first to sort it out. We have a job to do."
 SOV_kickstart_vaccine_research: "Start Vaccine Research"
 SOV_kickstart_vaccine_research_desc: "Why should we buy foreign vaccines when we can make our own? We have enough bright minds and virologists who are capable of it. Let us fund the Russian virus research centers for this job. We can make quality medicine!"
 SOV_purchase_sinovac_vaccine: "Purchase Sinovac"
 SOV_purchase_sinovac_vaccine_desc: "Well... I suppose the Chinese already have their vaccine ready... Why should we waste our own money on domestic vaccines again? Just take ones from our friends, not like they would be radically different."
 SOV_provide_incentives_to_stay_open: "Provide Incentives to Stay Open"
 SOV_provide_incentives_to_stay_open_desc: ""
 SOV_restrict_meetings: "Restrict Meetings"
 SOV_restrict_meetings_desc: ""
 SOV_restore_public_confidence: "Back To Normal!"
 SOV_restore_public_confidence_desc: "Russia is back to normal! Well, the New Normal, I suppose. The investments and developments we made during this pandemic will stay. But President Putin is very happy with us avoiding the worst possible situation. This was a very crucial test for our administration. Our systems have been refined, and we can handle such extraordinary situations in the future with ease! Just ignore the whining and complaining from the people, they don't know what's good for them anyway." 
 SOV_against_chipivization: "Against Chipivization!"
 SOV_against_chipivization_desc: "It seems the public outrage against our lockdowns and mass vaccinations have reached a critical point. The communists have openly risen up against us... injecting microchips into our citizens? What? Also, why were the leaders of the anti-vaccination movement in our local administrations chosen by the pro-western opposition? \n Huh.. let's slow down a little... Yes, our systems of surveillance and lockdowns were a little too extreme, but everyone was doing it! Compared to Australia or Britain this was nothing! \n Whatever, as long as they are happy I suppose. We cannot tarnish our beloved President's image over this worthless drivel...."
 SOV_force_vaccinations: "Force Vaccinations"
 SOV_force_vaccinations_desc: ""
 SOV_sponsor_russian_digital_economy: "Sponsor Russian Digital Economy"
 SOV_sponsor_russian_digital_economy_desc: "Russia is one of the biggest digital markets in the world. From online bank apps, online social services, or simple messengers and search engines, Russia is filled with bright IT workers. Vladimir Vladimirovich sees this talent, which is why we will support it even further. \nLet the Russian web reach new heights!"
 SOV_fund_military_advancement: "Fund Military Advancement"
 SOV_fund_military_advancement_desc: "The MIC is still one of the biggest industries we have. These factories not only provide us with weapons we can sell abroad, but also attract more jobs and make use of our resources domestically. \n Americans have managed to increase their capabilities in no small part to their Military Contractors creating high-tech to bomb the middle east. We should follow their example."
 SOV_back_to_normal: "Russian Economy Of The Future"
 SOV_back_to_normal_desc: "There was a time when the Russian economy had seen some of its best years. Ironically, the period of prosperity occurred during the World Financial Crisis. And now, it seems we have once again reached our golden age. As the world burns and the world economy crashes, we alone stand at the top. High income from oil and gas, huge industrial expansion. The end of lockdowns. Everything seems to be happening at the right time. Lets toast to our President's efforts bearing fruit!"
 SOV_what_now: "What Now?"
 SOV_what_now_desc: "It seems the vultures are already swarming around, preying for the central seat. Regardless of the candidate, the future of Russia will be changed without our Vladirmir Putin's guiding hand. \n I suppose we too must choose who to rally behind, for our paychecks are at stake."
 SOV_spread_cprf_leaflets: "Unite the Communist Party"
 SOV_spread_cprf_leaflets_desc: "The CPRF has long since been written off by other leftist groups as a footnote, not a true communist movement. Yet, during this once in a lifetime opportunity, will they stand aside and let the capitalist take our victory away from them just like they did in 1996? \n NO! They will rally behind Zyuganov, and return Russia to its rightful path!"
 SOV_party_of_power: "Utilize Administrative Resource"
 SOV_party_of_power_desc: "While other parties have been making their moves for the seat of power, Medvedev has the headstart. Using all available resources our government possesses, we will bring to the people this message: Putin's successor will win once again!" 
 SOV_ramp_up_the_agitation: "Ramp Up Populist Agitation"
 SOV_ramp_up_the_agitation_desc: "Dear Russians? Are you happy with your life? Are you happy as our oligarchs lick the western boots, flooding our country with low skilled labor? Are you happy with Europeans tarnishing the name of our nation, destroying statues of soviet soldiers who liberated them from pure evil, all due to their hatred to us? \n Well Zhirinovsky says NO MORE! Russia will return to its rightful glory!"
 SOV_post_putin_elections: "Presidential Elections"
 SOV_post_putin_elections_desc: "With our government remaining unstable, it is clear that something must be done. For the past few decades Russian presidential elections were a rather boring event. Yet now, as all political parties, Towers and focus groups converge over the seat of the President, it seems this election will decide the fate of our nation for decades to come."
 SOV_crush_western_influence: "Crush Western Influence"
 SOV_crush_western_influence_desc: "Pro-Western opposition has used all available resources to disrupt our nation. Our President knows the two-faced nature of the west. Even at our closest moments they have tried to backstab us by funding Chechen terrorists. Which is why we must do everything in our power to push the western-funded movement underground. \n And from there all they will be able to do is watch as we rise with the sun."
 SOV_anti_ukranian_military_exercizes: "Anti-Ukrainian Military Exercises"
 SOV_anti_ukranian_military_exercizes_desc: "During the 2014 Ukraine coup, legitimate president Yanukovich decided to flee his nation to Russia. This has been a crucial mistake that we have been paying for ever since. Since then, Ukraine has been militarily preparing for a conflict with us, with NATO training their leadership and troops. \n We too ideally should prepare for such a scenario. Our forces are rusty afterall."
 SOV_assist_our_novorossiyan_allies: "Assist Donbass Republics"
 SOV_assist_our_novorossiyan_allies_desc: "These two bastions of the Russian world have been bleeding and dying for the right to be called Russian. Yet, years after they rose up, issues still remain. They do not have a unified economic zone, nor are their forces unified either. \n However, simple support will do for now."
 SOV_the_navalny_fifth_column: "Move Against the Fifth Column"
 SOV_the_navalny_fifth_column_desc: "For all our efforts, it seems that Navalny and his flock continue to go against us. Funny, a Russian nationalist who compared caucasians to cockroaches wants to bring "western democracy" to us. Why, just because he went to Yale university to learn "statesmanship"? \n Unfortunately he will not die like Tesak or mysteriously disappear like his previous nazi colleagues. He is a "reformed" man, a liberal one. But while he indeed might have changed, past sins are never forgotten."
 SOV_increase_online_censorship: "Increase Online Censorship"
 SOV_increase_online_censorship_desc: "Roskomnadzor has been inefficient as of late. Blocking telegram didn't work, and many western agents have been spreading misinformation throughout other social media. We must refine our system of internet safety to properly utilize it. \n By the way, it seems some of the youngsters decided to start a trend and draw our agency as a cute girl, isn't that funny. Wonder why."
 SOV_arrest_navalny: "Harsh Crackdowns"
 SOV_arrest_navalny_desc: "Well, since most of the harmless options have been ineffective, it seems that only harsh crackdowns can stop the opposition from tearing our country apart. Omon will be deployed to quell them. \n Unlike liberal democracies though, our forces do not use rubber bullets or water cannons, which limits their effectiveness. But the justice of the rubber baton and a metal shield shall meet every wrongdoer!"
 SOV_combat_domestic_extremism: "Combat Domestic Extremism"
 SOV_combat_domestic_extremism_desc: ""
 SOV_arrest_troublesome_politicians: "Arrest Troublesome Politicians"
 SOV_arrest_troublesome_politicians_desc: "It is fortunate that the CPRF have a lot of "questionable" people in their party we can deal with. Antivaxxers, crazy conspiracy theorists and general anti-government dissidents. Of course they are the minority of the leftist movement, but they can tarnish the image of the communist party. And that is preferable."
 SOV_bribe_corrupt_cprf_officials: "Meet With Zyuganov"
 SOV_bribe_corrupt_cprf_officials_desc: "The leader of the CPRF is a wise man. He is a dear colleague of our President, and he is a veteran of politics, almost beating Yeltsin in 1996 elections if not for American and Oligarch meddling. However, Vladimir Putin thinks it is appropriate to give some "advice" to how his party should be run from now on."
 SOV_arrest_communist_extremists: "Arrest Communist Extremists"
 SOV_arrest_communist_extremists_desc: "Well, since we are done with the people in the CPRF, it is time to tackle the smaller leftist movements. While most of them have little to no actual influence and can be ignored, certain individuals pose a threat to us. Time for our boys to get to work!"
 SOV_calls_of_russian_unity: "Calls of Russian Unity"
 SOV_calls_of_russian_unity_desc: "Russians are besieged by western unipolarists! They try tearing us apart, for if we unite against them they will stand no chance! Unity is our strength!"
 SOV_bribe_corrupt_ldpr_officials: "Meet With Zhirinovsky"
 SOV_bribe_corrupt_ldpr_officials_desc: "Zhirinovsky has been called a "clown" of Russian politics, yet that cannot be further from the truth. He knows how to grow his brand and party, and his knowledge in geopolitics and inner political games cannot be overstated. This is why our Great President wants to talk with him about the future of his party. We hope that he will be heard."
 SOV_purge_problematic_oligarchs: "Purge Problematic Oligarchs"
 SOV_purge_problematic_oligarchs_desc: "The current mainstream right, for the most part, is funded by the oligarchs. The problem, however, is that these oligarchs are loyal to our system. To make sure they stay in line, both to pressure them and please them, we could arrest the "liberal" oligarchs who have open crime cases connected to them. Killing two birds with one stone."
 SOV_arrest_fascist_extremists: "Arrest Nationalist Extremists"
 SOV_arrest_fascist_extremists_desc: "While people like Tesak have already committed suicide, and his team is either gone without a trace or fleeing to europe, there still exist a number of small scale nationalist movements threatening out system. We must deal with them."
 SOV_utilize_communist_nostalgia: "Utilize Soviet Nostalgia"
 SOV_utilize_communist_nostalgia_desc: "USSR has been our greatest period in history! We have beat impossible odds, challenged America for global domination and rebuilt our country from devastation into industrial might. We must cherish this past."
 SOV_focus_on_corruption: "Focus on Corruption"
 SOV_focus_on_corruption_desc: "Unfortunately, for all talk and posturing, our administration's corruption problem remains the biggest detraction to our country. It hinders our social, military, economic and cultural cohesion and damages our prospects of growth. \n Instead of increasing the economic output of Russia, we must first focus on fixing the system."
 SOV_sanction_proof_economy: "Sanction-Proof Economy"
 SOV_sanction_proof_economy_desc: "While corruption remains a big problem, the main concern is our country's vulnerability to western sanctions. It has been years since they were first placed, and it seems silly for local businessmen to take on western corporations still remaining in our markets. \nBut what if we leveled the playing field and let our capitalists some breathing room... Perhaps even western manufacturing capabilities can be ours?"
 SOV_increase_public_transparency: "Increase Public Transparency"
 SOV_increase_public_transparency_desc: "The main problem with our system is a clear lack of transparency. Our politicians can do whatever they please as long as the lights arent shining on them. And while this shouldn't bother us, it is clear that some use this benefit to hide their more... unappealing initiatives from the president. Making sure the public can track what our politicians do will benefit everyone involved."
 SOV_investigate_corrupt_parties: "Subsidize Social Concessions"
 SOV_investigate_corrupt_parties_desc: "Paying workers good salaries has always been like a poison to our entrepreneurs. And while we are long past the times when oligarchs used armed manpower to take over factories or kill strikers, the labor rights situation remains questionable.  We should improve social benefits for the working class, for they are the ones who keep our country running."
 SOV_restore_faith_in_government: "Restore Faith in Government"
 SOV_restore_faith_in_government_desc: "For as long as the current system has been in power, the difference between the people's opinion of our dear President and his ruling party have been... drastic. Bureaucrats like you and I were seen as corrupt, inefficient and disconnected from the common man. But with the current reforms it seems the situation has changed. \n The people believe in us and call us slurs way less than they used to be! An achievement to toast for!"
 SOV_enrich_mother_russia: "Enrich Mother Russia"
 SOV_enrich_mother_russia_desc: "Unfortunately for us, the "Golden 00s" did not last forever. With a lowering of oil prices and sanctions placed on us, we were forced to hoard money for an emergency fund. However, hoarding money is pointless if you do not want to use it. \n Using just a small fraction of said reserve, alongside our connections with the oligarchs, we can boost our economy to greater heights."
 SOV_spread_anti_western_propaganda: "Spread Anti-west Propaganda"
 SOV_spread_anti_western_propaganda_desc: "Once, we have been eagerly awaiting our ascendance into the west. We thought we could become part of a glorious, christian civilization. Yet the Americans denied us. And now, well, why shouldn't we be happy with that?  \n And we don't even need to spread misinformation either: just keep hammering them with stuff like Little St. James island and culture wars. Let them sort it all out by themselves and watch the fireworks." 
 SOV_destabilize_the_west: "Increase FSB's Budget"
 SOV_destabilize_the_west_desc: "The FSB has been a tried and true method to protect Russia from enemies. And for all their hard work I would say a pay rise is deserved."

 #Election Focuses
 SOV_new_revolution: "The New Revolution"
 SOV_new_revolution_desc: "Russia has been the home of the socialist and communist movement. It is here that the first successful communist state has arisen, yet it was shattered and sold for the highest bidder. \nWe must revolt against this injustice, for the proletariat must be freed!"
 SOV_remember_the_old_days: "Our Soviet Past"
 SOV_remember_the_old_days_desc: "We are the children of a great civilization. One that defeated the greatest evil, resisted capitalist oppression. One that conquered both the stars and the atom. This is the nation we will rebuild. And this is the only proof we need to claim our legitimacy."
 SOV_cprf_is_your_party: "CPRF - Your Party!"
 SOV_cprf_is_your_party_desc: "Many had claimed that the Communist Party of the Russian Federation is a sham: populated by seniles disconnected from reality. Yet it is we who are leaders of the leftist movement in Russia, and it is we who have the ability to restore Soviet glory, unlike all other leftist movements consisting of 10-20 people. We are your party, for you have no alternative!"
 SOV_promises_of_bread: "Favorite of "Smart Voting""
 SOV_promises_of_bread_desc: "While the liberal opposition are vile American bootlickers, their system of "Smart Voting" is an interesting one. Considering that we are the only mainstream party they can support, we could utilize this to our advantage. And hey, if those guys hate Russian Imperialism and Putinism so much you vote to restore the USSR, this isn't our problem!"
 SOV_use_the_younger_base: "10 Steps To People's Power"
 SOV_use_the_younger_base_desc: "To garner more support, we must make our ideals easy to digest and vote for. For that we will take the "10 Steps to People's Power" program and promote it country wide. The nation must know what they vote for!"
 SOV_victory_day: "Faithful to the People, Needed by the Country"
 SOV_victory_day_desc: "Decades have passed since our party's creation, yet our goals remained the same. SInce then, however, our country has been slipping more and more onto the oligarchic and pro-american path. The country needs us, and we are willing to answer the call."
 SOV_russian_destiny: "Russia's Destiny"
 SOV_russian_destiny_desc: "Vladimir Zhirinovsky was seen as nothing more than a clown in many circles, yet here he is. He has carefully prepared for such a moment, with a loyal party close to him. It is time to revive Russia, a true Russia. No more Oligarch money-laundering abroad. No more erosion of Russian culture. Russia will return to its glory once and for all!"
 SOV_gain_church_support: "Gain Support from the Church"
 SOV_gain_church_support_desc: "The Russian Orthodox Church has always been a cornerstone of our nation. Even now, in our secular society, it still continues to have significant power, even if culturally. Having their support would be crucial."
 SOV_maintain_status_quo: "For Sovereign Russia"
 SOV_maintain_status_quo_desc: "What more can the average Russian want from their president? A successor to Putin, one that already has experience at the helm. Putin's dream of a multipolar order, as well as a sovereign democracy will be carried out, for our victory is non-negotiable!"
 SOV_gain_oligarchist_support: "Rally Putin's Supporters"
 SOV_gain_oligarchist_support_desc: "Thankfully, we can tap into our former leader's support base for our campaign. Even after he is gone his grip over our nation remains."
 SOV_send_aid_to_america: "Utilize Young Guard"
 SOV_send_aid_to_america_desc: "While your average pensioner and Putin supporter are a given, the Young Guard is a more fragile demographic. The youth have been traditionally cold to us, yet by and large they support Russia, at least in terms of patriotic sentiment. If we can tap into this idealism, this just might win us the vote."
 SOV_use_extreme_measures: "Medvedev's Plan"
 SOV_use_extreme_measures_desc: "While Medvedev was chosen by Putin, he is not his copy. Medvedev promises change, not to his first term, but to freedom that western democracies cannot dream of. Believe in his promise, for he will finish Putin's greatest wish: a truly sovereign democracy!"
 SOV_heir_to_strongman: "Heir To Strongman"
 SOV_heir_to_strongman_desc: "He is Putin's successor. \n One that brought Georgia to its knees. \n One that will ensure Russian sovereignty. \n He is Dimitry Medvedev, and he is here to win the election!"
 SOV_improve_ur_image: "Improve United Russia's Image"
 SOV_improve_ur_image_desc: "While we are the majority party, without Vladimir Putin our popularity has been taking a big hit. Nobody really liked our ideas, considering we have no clear party programme and are composed of different interest groups. We must show the people we are worth voting for!"
 SOV_for_the_future: "For the Future"
 SOV_for_the_future_desc: ""
 SOV_reinvigorate_the_masses: "Reinvigorate the Masses"
 SOV_reinvigorate_the_masses_desc: ""
 SOV_promises_of_peace: "Promises of Peace"
 SOV_promises_of_peace_desc: ""
 SOV_lashout_oligarchs: "Lashout oligarchs"
 SOV_lashout_oligarchs_desc: ""
 SOV_promises_of_land: "Imperial Revanche Populism"
 SOV_promises_of_land_desc: "Do you not remember what we were stripped of? A nation of glory, a nation of might. Millions of our brethren have been estranged from us. Perverted by western degeneracy, molded into an anti-Russian bulwark. We must retake what is ours!" 
 SOV_anti_establishment_big_tent: "Anti-Establishment Big Tent"
 SOV_anti_establishment_big_tent_desc: "For our victory against the establishment, we must gather any vote we can. Thankfully, there is a large base of anti-establishment groups of all shapes and sizes. We will be the voice of the unheard, those who wish to see Russia without United Russia!"
 SOV_russophilic_propaganda: "Digital Campaigns"
 SOV_russophilic_propaganda_desc: "Seeing as the other parties are blind to the potential of the internet, using it for our campaign is a no brainer. With Zhirinovsky's populist speeches, alongside a rather young party, we can tap into the young adult voter base with ease. All we need to do is say some pretty words."
 SOV_attack_the_polls: "Unleash LDPR Agittrains"
 SOV_attack_the_polls_desc: "Unlike other political parties, our's is more... active. From helping pensioners to giving out ads, we have a net of workers who are ready to spread our message. Let us use them to ensure our victory once and for all!"
 
#Soviet Focus
 SOV_election_victory: "Election Victory"
 SOV_election_victory_desc: "The revolution has finally won - not by storming the barricades, but at the ballot box. No one could have predicted this outcome, and all those who laughed at the CPRF as a relic of the past are now forced to look on in bewilderment. The people have made their choice: the future belongs to socialism."
 SOV_glorify_stalin: "Glorify Stalin"
 SOV_glorify_stalin_desc: "Сталин - наша слава боевая,\nСталин - нашей юности полет.\nС песнями, борясь и побеждая,\nНаш народ за Сталиным идет."
 SOV_soviet_union_restoration_referendum: "Soviet Union Restoration Referendum"
 SOV_soviet_union_restoration_referendum_desc: "Despite its name, the referendum on the restoration of the USSR is rather a symbolic act that will strengthen the connection with our glorious past and confirm that the people support the return of the great Soviet power. Although there is no practical result from this action, as it is held only on the territory of our country, we are already beginning to introduce the sacred four letters "USSR" into the document circulation, paving the way for the revival of the country."
 SOV_restarting_state_bureaucracy: "Restart State Bureaucracy"
 SOV_restarting_state_bureaucracy_desc: "We inherited from the previous government a state structure poorly adapted for building a socialist republic. Inefficiency, stagnancy and formlessness are not the qualities that we want to see in the public administration system.\nTherefore, the Communist Party of the RSFSR will assume responsibility for the implementation of reforms. In the near future, a program of transformations will be implemented in order to create a flexible apparatus that will serve the interests of the people, and not itself."
 SOV_first_convocation: "First Convocation"
 SOV_first_convocation_desc: "Election to the new Soviet Parliament are a step which will determine the future of the country. Preparations for the first convocation have already begun, and the Party promises that these elections will be free and fair. The people themselves will choose their representatives, and it is they who will be the voice of the new socialist order. Very soon Soviet Russia will have a parliament that will defend the interests of the workers!"
 SOV_draft_new_constitution: "New Constitution"
 SOV_draft_new_constitution_desc: "The current Constitution of Russia does not at all reflect the party's ideas about how our country should be organized. This document does not meet the interests of the people and, in fact, by its existence blocks the implementation of necessary reforms.\nTherefore, we will urgently raise the issue of drafting and adopting a new basic law. The future Constitution will be based on its proven Soviet version, adapted to modern challenges and consolidating the socialist path of development."
 SOV_interparty_dialog: "Inter-Party Dialog"
 SOV_interparty_dialog_desc: "Although the Communist Party is the leading political force in the country, a number of legal parties and associations also enjoy popular support. Openly antagonizing them would be a mistake - it only undermines our credibility in the eyes of society. It would be much more reasonable to try to establish cooperation in order to reduce tensions and unite the country to solve common problems."
 SOV_reform_of_security_forces: "Reform of Security Forces"
 SOV_reform_of_security_forces_desc: "The current structure of Russia's state security is nothing more than a relic of the past. Not the most successful reforms, chronic underfunding and personnel starvation have brought the law enforcement agencies into a bad state.\nIn the context of growing internal resistance, it is vital for us to carry out extensive reform of security agencies. It is necessary not only to restore them to their former glory, but to create a modern, effective system capable of protecting the interests of the country and citizens."
 SOV_bastion_of_antifascism: "Bastion of Antifascism"
 SOV_bastion_of_antifascism_desc: "We will not allow the fascist spawn to gain a foothold in our country in this difficult hour. Let everyone know that we have fought, are fighting, and will fight against anyone who dares to support these misanthropic ideas. This plague will be uprooted from the very root so that the people can continue to live in peace and harmony.\nFascism shall not pass!"
 SOV_agitprop: "Agitprop"
 SOV_agitprop_desc: "Agitprop, or, more accurately, agitation and propaganda, emerged with the Soviet Union and throughout its history has sustained citizens' confidence in the future.\nToday, when we need to prove to the people the validity of our course, we launch large-scale propaganda campaigns—both on the streets and online. We must clearly and concisely demonstrate our goals and values, explaining to the people the future we are leading the country toward and why our path is the only right one."
 SOV_party_vanguard: "Party Vanguard"
 SOV_party_vanguard_desc: "The role of the party in the life of the country is much more significant than it might seem at first glance. It is the party that sets the right ideological course, serves as a national guide and is a symbol of the progress of the state.\nThe party acts exclusively for the country and for the people - there is no other meaning in its work. Her strength lies in her unity with the people, in her ability to hear their requests and transform them into concrete solutions."
 SOV_strengthening_party_discipline: "Strengthen Party Discipline"
 SOV_strengthening_party_discipline_desc: "After the establishment of the Communist Party's power, we will have to strengthen unity and develop a program line. Every party member should understand and share our common goals. Now is not the time for internal disagreements, especially at a time when we continue to consolidate our forces. We need discipline to bring our ideas to the people and move forward together."
 SOV_great_reconciliation: "Great Reconciliation"
 SOV_great_reconciliation_desc: "Although we do not question Stalin's historical authority, some of the mistakes of that period must be acknowledged. We are talking about unfair repressions against many distinguished Bolsheviks, whose vision of the development of the Union differed only slightly from Stalin's.\nWe must pay tribute not only to politicians close to Stalin, but also to those who had their own position and made a significant contribution to the development of the country. Our history is multifaceted, and we can learn from both victories and tragic mistakes."
 SOV_reestablishing_higher_party_school: "Reestablish Higher Party School"
 SOV_reestablishing_higher_party_school_desc: "At one time, the Soviet Higher Party School trained thousands of talented cadres for the CPSU and media workers. Its graduates worked in every field and in every region, which strengthened ideological unity and effective management.\nToday, as we continue to revive many Soviet practices, it is necessary to restore this system of personnel training. Such an organization should not only provide the state apparatus with personnel, but also educate truly skilled managers dedicated to the cause of socialism."
 SOV_xix_party_congress: "Hold the Party Congress"
 SOV_xix_party_congress_desc: "The Communist Party has been in power for quite a long time, and all the necessary first steps have been taken. Now that our position has finally strengthened, it is time to hold a congress and determine the future course.\nWe have to fulfill key goals: resolve the issue of leadership that will lead the party forward, and approve a clear program of action for the coming years."
 SOV_continue_party_rejuvenation: "Continue Party Rejuvenation"
 SOV_continue_party_rejuvenation_desc: "Rejuvenation of the Party is the guarantee of its future! Young cadres full of enthusiasm and determination will give a new breath to the CPRF. We must continue this process, attracting more and more young Communists to the leadership, who will be ready to lead the country into the future without abandoning the ideals of socialism."
 SOV_new_lenin_enrollment: "New Lenin Enrolment"
 SOV_new_lenin_enrollment_desc: "Like a hundred years ago, the Party needs a new generation of committed people ready to devote themselves to building socialism. We are launching a new call, inspired by Leninist traditions, to attract young and active citizens to our ranks. This is a chance for everyone to participate in a great cause."
 #рашкин
 SOV_voice_of_the_streets: "Voice of the Streets"
 SOV_voice_of_the_streets_desc: "The Communist Party of the RSFSR, like any party, has two sides: the party apparatus and the activists. For a long time, cabinet heads were the main force in the party, leaving in the shadow those who, through their work, made the lives of citizens better and at the same time fought injustice in the Russian system through rallies and other forms of protest.\nBut that time is gone. Rashkin became Chairman of the Central Committee, and now the activists are becoming stars in the nomenklatura firmament, replacing the old, decrepit cadres.\nValery Rashkin is the voice of those who are making our homeland a better place right now!"
 SOV_shakeup_of_the_state: "Shake up the Bureaucrats"
 SOV_shakeup_of_the_state_desc: "Our bureaucracy is full of old, inefficient apparatchiks. Instead of helping the people, they settled into their offices and rest on the laurels of the victory of communism, while doing nothing for it.\nComrade Rashkin will purge the party and the state of scoundrels! Make way for young, energetic Leninists!"
 SOV_symbol_of_change: "Symbol of Change"
 SOV_symbol_of_change_desc: "During Putin's time, Valery Rashkin was known for his extreme opposition to power, even by the standards of the Communist Party of the Russian Federation. Rashkin's lists, the deputy's inquiry into the FBK investigation of Medvedev - all this and more shows his commitment to the ideas of freedom.\nAs the classic sang: "Our hearts demand changes" - Russia has a chance to change for the better as it has not done in more than 30 years. Russia needs changes - and Rashkin and his team are only too happy to serve it!"
 SOV_party_mobilization: "Party Mobilization"
 SOV_party_mobilization_desc: "Many inside our country believe that "the Communist Party is a haven for grandfathers and old women nostalgic for the USSR." And although this opinion is not unfounded, it is necessary to fight this reputation of the "party of pensioners".\nFull-fledged Komsomol members will take their rightful place at the helm of the new government, as in the Lenin years they will take over the levers of control. Let's go, young builders of communism!"
 SOV_rally_the_people: "Rally the People"
 SOV_rally_the_people_desc: "Our country is on the verge of a major conflict, the largest since the Great Patriotic War. In such difficult times, the entire multinational people of our country need to unite in order to withstand the coming storm. From young to old, rich and poor, workers and office workers - we must be united! Under the Lenin banner, in the name of our past and future, millions of shoulders will press against each other!"
 SOV_rightful_heir: "The Rightful Heir"
 SOV_rightful_heir_desc: "The position of Rashkin and his team within the party is currently quite precarious. The opposition from the more "Apparatus" wing of the Communist Party of the RSFSR undermines the unity of the party, which does not benefit the legitimacy of our government.\nIt is necessary to remind everyone that Rashkin was legitimately elected on the ballot, and go to... some compromises with our comrades. Unity is above all!"
 SOV_back_to_revolutionary_roots: "Back to Revolutionary Roots"
 SOV_back_to_revolutionary_roots_desc: "The October Revolution was the result of the actions of a single Bolshevik party, led by the leader of the proletariat, Vladimir Ilyich Lenin, subordinated to the general line of the party. It is precisely in party discipline that the success of Red October lies.\nRight now, we lack this very discipline: various internecine strife and conspiracies are being waged within the party in order to undermine Rashkin's position. Denis Parfenov, with his uncompromising commitment to the socialist struggle, can help strengthen the party structure and restore the lost spirit of revolutionism!"
 SOV_pragmatic_approach: "Pragmatic Approach"
 SOV_pragmatic_approach_desc: "There are many ideas within Rashkin's team: to deviate towards democratization or towards party discipline and orthodoxy - but the current, quite pragmatic course of development of the Soviet state is not something terrible. On the contrary, he leaves us plenty of room for maneuver within the party and state apparatus.\nPeople crave stability and prosperity, and why not use Sergey Levchenko's experience to strengthen our development?"
 SOV_reinvent_democracy: "Reinvent Democracy"
 SOV_reinvent_democracy_desc: "The Soviet experiment began very beautifully: "all power to the Soviets!", promises of people's power, Lenin proclaiming a new, truly people's power. But, unfortunately, after Ilyich's death, Stalin took power into his own hands, and then the party nomenklatura, divorced from the masses of the people. In the end, this misunderstanding of the changing situation in the country led to the fact that when Gorbachev came to power, it was already too late.\nDemocratic ideas are directly sewn into the very fabric of socialism, and it would be wise to strengthen the democratization of the Soviets. Boris Yulievich Kagarlitsky is an excellent candidate for the role of a think tank for the transformation of our system!"
 SOV_mobilize_the_youth: "Soviet Renaissance"
 SOV_mobilize_the_youth_desc: "The great masters of Soviet art, such as Mayakovsky and Tatlin, inspired people to create a new world. Their spirit comes alive again in our time. We will revitalize Soviet culture by bringing creators together to create new, cutting-edge art for a socialist future. The time of the new Soviet Avant-Garde is upon us!"
 #объединеине
 SOV_window_to_europe: "Window to Europe"
 SOV_window_to_europe_desc: "Great ideas know no borders and our window to Europe is opening again! The workers and communist parties of Eastern Europe look to us with hope. It is time to revive forgotten ties, to unite the peoples against NATO aggression! Together we are ready for any challenge, together we will crush the imperialists!"
 SOV_new_union_of_russia_and_belarus: "New Union of Russia and Belarus"
 SOV_new_union_of_russia_and_belarus_desc: "The union of Russia and Belarus is becoming a reality. This step is not just symbolic - it is a real movement towards the restoration of a great country. The unification of the two peoples under a single flag of the RSFSR is an important stage on the way to the revival of Soviet unity and power."
 SOV_tbilisi_declaration: "Tbilisi Declaration"
 SOV_tbilisi_declaration_desc: "We must expand our influence in the Transcaucasian countries. If they do not agree to join the USSR voluntarily, we will use our military might to achieve this."
 SOV_tashkent_agreement: "Tashkent Agreements"
 SOV_tashkent_agreement_desc: "We will invite the Central Asian countries back into our union, and we will welcome them as brothers and sisters in solidarity. If they refuse to join us willingly, then we will use force to bring them under our sway."
 SOV_soviet_moldova: "Moldavian Maneuvers"
 SOV_soviet_moldova_desc: "We must ensure that all territories formerly governed by the Moldovan Soviet Socialist Republic are fully incorporated into the USSR again - and that they are ready to fight with us against any enemy."
 SOV_prepare_to_march_west: "Prepare to March West"
 SOV_prepare_to_march_west_desc: "We see the forces of imperialism once again trying to impose their will on the peoples of the world. The Western powers of Europe, obsessed with the lust for power and wealth, are preparing to encroach on our freedom and independence. They have forgotten the lessons of the past, but we remember. We remember the heroism of our ancestors, who broke the back of fascism and defended the independence of our Motherland. A new round of history awaits us, in which we must stand up to defend our sovereignty, our ideals and our future. The impending conflict with Europe is inevitable, and we must be ready to face it with all our might."
 SOV_operation_little_saturn: "OPERATION: §YLITTLE SATURN§!"
 SOV_operation_little_saturn_desc: "Force against force, armor against armor, fire against fire\n\nToday we stand on the threshold of a historic moment. We face the task of freeing the brotherly people of Ukraine from the shackles of neo-Nazism and Western influence. We march to bring peace and order, to restore justice and restore Ukraine to its true freedom. This is not just a battle for territory, it is a battle for our common ideals, for our future and the future of our children. We know that NATO, an alliance seeking world domination, may try to stand in our way, but we are ready for it. Let our enemies know that we will not be broken. We march to victory."
 #зюганов
 SOV_collective_leadership: "Collective Leadership"
 SOV_collective_leadership_desc: "It is clear one man cannot rule alone. With the rapid changes we must still implement, we need as much expertise we can. We cannot bicker among ourselves and fight for control over the state. A stable circle of trusted members will ensure the new transition goes smoothly" #НЕ ТИМУР ПИСАЛ
 SOV_role_of_personality: "Role of Personality"
 SOV_role_of_personality_desc: "While the cult of personality in the USSR has been criticised, and with a lot of merit, one cannot say it was not needed. With our new mandate to govern we must also bring the air of authority and strength. The people will not support a nameless committee, they need a personification of the state, the great father. This is why such a role must be carefully prepared and selected for." #НЕ ТИМУР ПИСАЛ
 SOV_effective_bureaucracy: "Effective Bureaucracy"
 SOV_effective_bureaucracy_desc: "With our current struggles of restructuring, we must ensure our cadre is capable of handling the weight brought onto them. They cannot remain simple pencil pushers, nor can they stay still and inert. They must be effective and intelligent, ready to tackle any problem that comes their way. We must expand bureaucratic training sessions to ensure this." #НЕ ТИМУР ПИСАЛ
 SOV_rally_the_people_zyuganov: "Rally the People"
 SOV_rally_the_people_zyuganov_desc: "The Socialism has finally been restored, yet our people are still divided. Almost 2 generations grew up without the shining star, without an example to strive towards. We must shepherd the populace we reunited to our cause, for the red star to shine brightly!" #НЕ ТИМУР ПИСАЛ
 SOV_reliance_on_apparatus: "Reliance on Apparatus"
 SOV_reliance_on_apparatus_desc: "With our victory and revival of the USSR, we must make sure the reunified lands run smoothly. Unfortunately, that means we will make do with the ones we have on hand. Gather as many sympathisers from the liberated lands and use the RSFSR cadres we have on hand to bolster them. There is much work to be done, and these people will be the trailblazers of our project." #НЕ ТИМУР ПИСАЛ
 SOV_dialogue_with_grassroots: "Dialogue with Grassroots"
 SOV_dialogue_with_grassroots_desc: "While our Soviet Experiment has just secured a solid footing, it is clear we implementing it from the top down is not feasible. To truly revive the spirit of what once was, we must support the ideologically driven parts of our populace who wish to help us in our vision. It is with their drive and fire that we can finish what we started." #НЕ ТИМУР ПИСАЛ
 SOV_creative_marxism: "Creative Marxism"
 SOV_creative_marxism_desc: "The USSR used to be a big media player on the world stage. While not as established or famed as the likes of Hollywood, Soviet filmmakers and cartoonists were held to a high standard. We must reignite the fire of passion in the hearts of our people and reinvent ourselves in the eyes of the world. We must show to them that we are back, and that the Socialist Experiment is far from over!"#НЕ ТИМУР ПИСАЛ
 SOV_renewed_program: "Renewed Program"
 SOV_renewed_program_desc: "With the current challenges, we must also make sure our programme is not behind the times. Use the past legal frameworks and modify it to fit the times." #НЕ ТИМУР ПИСАЛ
 SOV_course_continuation: "Course Continuation"
 SOV_course_continuation_desc: "It has been 30 years of darkness. But must stars go out during the dark ages as well? NO! For there are people who carry them in their hearts, in their souls. And when the time was right, we returned the night sky their beauty. For the Red Star has endured much worse, and continue to endure ever more!" #НЕ ТИМУР ПИСАЛ
 #афонин
 SOV_cohesion_before_challenges: "Cohesion Before Challenges"
 SOV_cohesion_before_challenges_desc: "During our last party congress, we became convinced that not all members of our party support the course that we have outlined for the coming years. Based on the past of the Soviet Homeland, we must take this situation into account and begin the necessary measures to resolve it. Of course, the opposition and some members of our own party will not be very happy about this, but between the opinion of the minority and the protection of the majority, we will surely choose the second option."
 SOV_intra_party_consensus: "Intra-Party Consensus"
 SOV_intra_party_consensus_desc: "The worst phenomenon of political parties and associations in general is factionalism, which we must not allow under any circumstances. Instead of suppressing reformism in the party, we will try to meet them halfway. We will carry out several reforms in our government, as well as encourage innovation and self-governance to ensure solidarity of opinions within our party."
 SOV_voice_of_the_party: "Voice of the Party"
 SOV_voice_of_the_party_desc: "The Party is the spine that workers trust,\nThe Party is the cause that cannot rust.\nThe Party is the one that will not bend -\nA clerk today, tomorrow kingdoms' end!"
 SOV_cadres_decide_everything: "Cadres Decide Everything!"
 SOV_cadres_decide_everything_desc: "There are many reasons why the USSR collapsed, but one of the main ones is unscrupulous deputies. Many members of the Soviet government were there thanks to connections and were incompetent at their own duties. We will learn from the mistakes of the past and will begin to promote to the government those people who really want, and most importantly, will be able to help our Soviet Homeland prosper more than ever!"
 SOV_effective_bureaucracy_afonin: "Effective Bureaucracy"
 SOV_effective_bureaucracy_afonin_desc: "The bloated bureaucracy became a real symbol of stagnation in the Soviet Union and was made fun of even by the state media. To prevent the same stagnation a second time, we need to take actions against the bureaucracy in advance. We will get rid of unnecessary documents, reduce excessive approvals, and do everything to ease the bureaucratic machine of our state."
 SOV_socialist_pluralism: "Socialist Pluralism"
 SOV_socialist_pluralism_desc: "Even after our government has been in power for a long time, there are still people in the country sabotaging our actions for some reasons. To show people that CP RSFSR really stands up for their interests, we will communicate with opposition parties and will try to find a compromise on the most pressing issues that concern our citizens the most."
 SOV_guarantor_of_stability: "Guarantor of Stability"
 SOV_guarantor_of_stability_desc: "Our party offers people not only social equality, but also a stable life. Every citizen will have free education and medicine, a job, own flat, a car, a large pension, and the country itself will have a minimum level of poverty and crime. Every citizen of our Homeland will be confident in the future!"
 SOV_new_public_dialogue: "New Public Dialogue"
 SOV_new_public_dialogue_desc: "If we want a truly successful and completely modern Soviet state, we need to abandon the practices of the past and focus not on imaginary stability, but on progress and development. Did "stability" lead us to communism? Has stagnation improved our economy? No! In order for the USSR of the 21st century to become the greatest power on Earth, we must get rid of the old and weak system and build a new one - a truly people-oriented system!"
 #экономика
 SOV_10_steps_to_good_life: "Ten Steps to a Decent Life"
 SOV_10_steps_to_good_life_desc: "Our program, developed many years ago, is finally ready to be implemented. These steps are aimed at improving living conditions, increasing incomes and social protection of citizens. After such a long time, we can take care of the people, showing in practice the effectiveness of our team!"
 SOV_people_are_master_of_the_country: "The People are Masters of the Country"
 SOV_people_are_master_of_the_country_desc: "Natural resources must belong to the people. We will carry out the final nationalization of oil, gas and other riches of our land so that the revenues from them will go to the benefit of all citizens."
 SOV_people_are_main_value_of_the_state: "The People are Main Value of the Country"
 SOV_people_are_main_value_of_the_state_desc: "The most important thing in any society is the well-being of its inhabitants. That is why it is so important to take care of those who are unable to work, such as the elderly and disabled. Now is the time to demonstrate our commitment to the people. We will increase salaries and pensions so that every citizen feels the support of the state."
 SOV_strategic_regulation: "Strategic Regulation"
 SOV_strategic_regulation_desc: "The market economy as a whole demonstrates efficiency and generally satisfies our interests. However, no economic system is perfect. That is why we are beginning to implement a policy of reasonable state intervention to ensure stability, sustainable growth, and set the right course for development.\nChina is a shining example of how this model works, having managed to become one of the world's economic leaders. Their example shows that combining market mechanisms with strategic regulation can achieve impressive results."
 SOV_new_gosplan: "A New Gosplan"
 SOV_new_gosplan_desc: "In the former Soviet Union, there was an agency called Gosplan, also known as the State Planning Committee of the Council of Ministers of the USSR. Its main function was to monitor the implementation of national economic plans. Throughout the existence of the Soviet Union, the committee proved to be quite effective in managing the economy.\nToday, when Soviet methods are becoming relevant again, the question of restoring Gosplan must be raised. Its principles of centralized planning could help solve major state tasks and ensure strategic stability." #НЕ ТИМУР ПИСАЛ
 SOV_cult_of_reindustrialization: "The Cult of Reindustrialization"
 SOV_cult_of_reindustrialization_desc: "One of the first major achievements of the Soviet government was rapid industrialization, which served the people well for decades. However, after the collapse of the Union, the industrial complex fell into decline, and many enterprises simply ceased to exist.\nThat is why today we need to make up for lost time and fully restore the industrial potential lost in the turbulent 1990s. This requires strong political will and the concentration of a large amount of national resources to make our industry the backbone of development once again." #НЕ ТИМУР ПИСАЛ
 SOV_red_environmentalism: "Red Environmentalism"
 SOV_red_environmentalism_desc: "Our country is entering a new era—an era in which the state of the environment means immeasurably more to us than it did at the end of the 20th century. Yes, industry must continue to operate; it cannot be abolished. But that is precisely why we should learn from China's experience. China clearly demonstrates how it is possible to remain the "world's factory" without abandoning large-scale environmental programs.\nThis is the strength of the socialist economy: it is capable of combining industrial power with care for nature. Our planned economy system is ideal for implementing long-term "green" strategies, making ecology a new priority for development." #НЕ ТИМУР ПИСАЛ
 SOV_small_business_support: "Small Business Support"
 SOV_small_business_support_desc: "We recognize the importance of small businesses to the economy, and despite our socialist beliefs, it would be a mistake to leave them unsupported. We will provide assistance and protection to small businesses, creating conditions for their growth and stability. This in no way contradicts our principles, because a successful business means stable jobs and taxes for the treasury."
 SOV_new_industrial_policy: "New Industrial Policy"
 SOV_new_industrial_policy_desc: "The initial results of reindustrialization clearly demonstrate the success of our industrial policy. This proves that we are moving in the right direction, and now we need to increase our efforts. \nTherefore, we are declaring accelerated industrialization to be our main economic priority. We need to upgrade our production facilities on a large scale, focus on modern technologies, and train personnel for the new industry. The faster we reach a new industrial peak, the stronger the country's economic sovereignty will be and the higher the well-being of every citizen will become."
 SOV_revival_of_soviet_science: "Revival of Soviet Science"
 SOV_revival_of_soviet_science_desc: "In the USSR, there was a real cult of science and technological progress. Soviet scientists were famous throughout the world for their groundbreaking achievements. At one time, the whole of humanity knew the Russian word "sputnik," and millions of people were inspired by our successes and strove for achievements themselves.\nWe must not lose this glorious tradition. That is why today we need to revive the spirit of Soviet science after many years of neglect, restoring its former prestige and state support. Only in this way can we nurture a new generation of researchers capable of repeating and surpassing the achievements of our predecessors." #НЕ ТИМУР ПИСАЛ
 SOV_join_BRI: "The Belt and Road Initiative"
 SOV_join_BRI_desc: "The Belt and Road Initiative opens new opportunities for us. We will strengthen our participation in this project, which connects Asia, Europe and Africa. Investments in infrastructure and trade routes will benefit our economy and strengthen ties with China."
 SOV_reinstate_comecon: "ADS-COMECON"
 SOV_reinstate_comecon_desc: "Re-establishing COMECON within the framework of the Association of Democratic States (ADS) - will strengthen our position on the world stage. This alliance will help establish trade, resource sharing, and joint development with allies who share our goals and values. A return to a coordinated economy is the path to progress."
 SOV_consolidation_of_unions: "Consolidation of Unions"
 SOV_consolidation_of_unions_desc: "Protecting workers' rights is one of the main tenets of socialism. This is precisely why trade unions exist—organizations that protect workers from the arbitrariness of employers and monitor compliance with labor standards.\nIn the USSR, this function was performed by a single trade union. Now we have to decide how to adapt this proven approach to modern realities while preserving its main goal: the reliable protection of workers." #НЕ ТИМУР ПИСАЛ
 SOV_agrarian_renaissance: "Agrarian Renaissance"
 SOV_agrarian_renaissance_desc: "Agriculture has always been one of the key sectors of the economy, and in the Soviet Union it was given special attention. We do not intend to fall behind these glorious traditions and will undertake the revival of Russia's agricultural sector to restore it to its former glory.\nAfter all, Bread is the head of everything! We will focus on modern agricultural technologies, support for farmers, and the restoration of rural areas. In this way, we will achieve true food independence and continue the work of our predecessors with dignity." #НЕ ТИМУР ПИСАЛ
 SOV_energy_development: "Energy Development"
 SOV_energy_development_desc: "The rapid electrification of the Soviet Union in the 1920s and 1930s is still considered one of the Bolsheviks' most ambitious projects. The legendary GOELRO plan is forever enshrined in history textbooks as an example of a great feat.\nToday, we must repeat this success. We must ensure a stable electricity supply to every corner of the country, especially in the context of rapid industrial growth. This will require modernizing the power grid and actively introducing new, including renewable, energy sources. In this way, we will be able to lay a solid foundation for the country's future development."
 SOV_moscow_beijing_agreement: "Moscow-Beijing Agreement"
 SOV_moscow_beijing_agreement_desc: "Our relationship with China has always been important, and now is the time to strengthen it definitively. We will conclude a new agreement that will strengthen our economic and political cooperation. This will allow us to avoid previous disagreements and make relations with China even more stable and productive."
 SOV_alterglobalism: "Alterglobalism"
 SOV_alterglobalism_desc: "In recent decades, global capitalism has continued to increase its influence, taking away what little remains from already disadvantaged peoples. This injustice must be ended, and we have a plan to offer the world an alternative. We advocate socialist globalization based on the principles of friendship, mutual aid, and equal cooperation.\nWe will prove that the prosperity of one people should not be built on the exploitation of another, and together we will build a world where human value is higher than profit."
 SOV_economic_sovereignty: "Economic Sovereignty"
 SOV_economic_sovereignty_desc: "Under current conditions, dependence on oil and gas exports to Europe is becoming risky. We will start to gradually reduce energy supplies to the West in order to protect our economy from external threats. Instead, we will use these resources to develop our own industries!"
 SOV_peoples_control: "People's Control"
 SOV_peoples_control_desc: "The essence of socialism is power to the people. Not only in politics, but also in the economy. Human labor should serve the good of all people, not enrich a handful of oligarchs in their palaces. That is why the people have the right to directly influence the development of their country. This means real worker control in enterprises and fair distribution of income. When the economy belongs to the workers, their well-being becomes a true symbol of progress."
 SOV_new_methods_of_fighting_corruption: "New Anti-Corruption Measures"
 SOV_new_methods_of_fighting_corruption_desc: "Corruption is the main enemy of a just society. We will introduce modern technologies, such as artificial intelligence and Zero Trust, to increase control and transparency at all levels of government. These new methods will allow us to start fighting this vice of our society in a new way and at least partially ensure fair governance."
 
 SOV_for_a_just_russia: "For A Just Russia"
 SOV_for_a_just_russia_desc: ""
 SOV_solidarity_and_prosperity: "Solidarity and Prosperity"
 SOV_solidarity_and_prosperity_desc: ""
 SOV_party_of_culture: "Party of Culture"
 SOV_party_of_culture_desc: ""
 SOV_radical_change: "Radical Change"
 SOV_radical_change_desc: ""
 SOV_fairer_future: "Fairer Future"
 SOV_fairer_future_desc: ""
 SOV_we_must_fight_for_justice: "We must fight for Justice"
 SOV_we_must_fight_for_justice_desc: ""

 #Soviet Focus
 SOV_operation_suvorov: "OPERATION: §YROKOSSOVSKY§!"
 SOV_operation_suvorov_desc: "After NATO intervened in the conflict, we have no choice. We will activate a highly classified plan to eliminate threats in Poland and the Baltics. This operation will be a decisive step in the fight for our security and the restoration of Soviet influence in the region!"
 SOV_mobilize_the_national_guard: "Mobilize the National Guard"
 SOV_mobilize_the_national_guard_desc: "It's time to activate our National Guard. These brave defenders are ready to stand up in defense of the homeland and ensure order in the liberated territories. Their strength and determination will be an important link in our quest for victory!"
 SOV_mobilize_the_airforce: "Mobilize the Airforce"
 SOV_mobilize_the_airforce_desc: "Every unit of our aviation is important to victory. Even old airplanes can be a decisive factor in a battle. We will mobilize our Air Force to dominate the skies and support ground operations!" 
 SOV_operation_polar_star: "OPERATION: §YPOLAR STAR§!"
 SOV_operation_polar_star_desc: "FIGHT! THIS IS THE FINAL PUSH TO BUDAPEST AND WARSAW!"
 SOV_election_victory: "Election Victory"
 SOV_election_victory_desc: "The revolution has finally won - not by storming the barricades, but at the ballot box. No one could have predicted this outcome, and all those who laughed at the CPRF as a relic of the past are now forced to look on in bewilderment. The people have made their choice: the future belongs to socialism."
 SOV_release_political_prisoners: "Release Political Prisoners"
 SOV_release_political_prisoners_desc: "With the arrival of the new authorities, the government faces the question - who should be considered political prisoners? Among them there are victims of the regime's repression, but also those who threaten the new order. A decision must be made: release all of them or conduct a thorough check to determine who is truly worthy of freedom."
 SOV_other_parties_issue: "Issues of the Other Parties"
 SOV_other_parties_issue_desc: "After the defeat of United Russia, the CPRF faces a challenge: what to do with the rest of the political forces? Their future is uncertain. Some propose the complete liquidation of the opposition, while others believe that their gradual integration into the socialist system is necessary. The debate continues, and the fate of the other parties hangs in the balance."
 SOV_new_soviet_parliament: "New Soviet Parliament"
 SOV_new_soviet_parliament_desc: "The State Duma in its current form has served its time. The CPRF announces the imminent dissolution of this relic of the past, along with the Federation Council, destroying the entire Federal Assembly. The people will soon elect their representatives to a new Soviet parliament, a truly democratic one - be it the Supreme Soviet or the Congress of People's Deputies. Which body will be the basis for the new socialist state is for the Party to decide."
 SOV_cooperate_with_the_church: "Cooperate with the Church"
 SOV_cooperate_with_the_church_desc: "We learn from the mistakes of the past. Today's Communists know that loyalty to tradition and respect for the religious beliefs of our people is the key to lasting unity. The Church, as the guardian of cultural heritage, becomes our faithful ally. Together we will lead our people to a bright future, relying not only on progress, but also on spiritual values!"
 SOV_enshrine_democratic_centralism: "Enshrine Democratic Centralism"
 SOV_enshrine_democratic_centralism_desc: "Democratic centralism is the core of our party and our state. Decisions are taken collegially, but they are implemented flawlessly. This is a guarantee of effective governance and protection against chaos. Unity in action, firmness in decisions and discipline - these are our principles!"
 SOV_empower_the_premier: "Empower the Premier"
 SOV_empower_the_premier_desc: "In the new socialist state, the premier is a key figure in governance. His role must be strengthened to ensure swift and strong leadership of the country. We will strengthen the power of the premier so that he can lead the country quickly and decisively to socialist transformation and success!"
 SOV_protect_russian_minorities: "Protect Russian Minorities"
 SOV_protect_russian_minorities_desc: "We are obliged to protect our people wherever they are. Russian-speaking citizens abroad should not feel abandoned! Special attention will be paid to Ukraine and its eastern republics, LPR and DPR. Secret support will ensure their confidence that they are not forgotten and that their future lies in a single friendly family of fraternal nations."
 SOV_soviet_union_restoration_referendum: "Soviet Union Restoration Referendum"
 SOV_soviet_union_restoration_referendum_desc: "Despite its name, the referendum on the restoration of the USSR is rather a symbolic act that will strengthen the connection with our glorious past and confirm that the people support the return of the great Soviet power. Although there is no practical result from this action, as it is held only on the territory of our country, we are already beginning to introduce the sacred four letters "USSR" into the document circulation, paving the way for the revival of the country."
 SOV_integrate_belarus_into_rsfsr: "Integrate Belarus into the RSFSR"
 SOV_integrate_belarus_into_rsfsr_desc: "The union of Russia and Belarus is becoming a reality. This step is not just symbolic - it is a real movement towards the restoration of a great country. The unification of the two peoples under a single flag of the RSFSR is an important stage on the way to the revival of Soviet unity and power."
 SOV_invite_upc_cpsu_members: "Invite CSTO Members to the USSR"
 SOV_invite_upc_cpsu_members_desc: "Our CSTO allies must see that the Soviet system is the path to prosperity and justice. It is time to invite them to reorganize their governments along our lines and join the revived USSR. Together we will create a new union of peoples based on brotherhood and socialism!"
 SOV_operation_minerva: "Operation Minerva"
 SOV_operation_minerva_desc: "We must expand our influence in the Transcaucasian countries. If they do not agree to join the USSR voluntarily, we will use our military might to achieve this."
 SOV_operation_invictus: "Operation Invictus"
 SOV_operation_invictus_desc: "We will invite the Central Asian countries back into our union, and we will welcome them as brothers and sisters in solidarity. If they refuse to join us willingly, then we will use force to bring them under our sway."
 SOV_draft_new_constitution: "Draft a new Constitution"
 SOV_draft_new_constitution_desc: "Rashkin's group, in a quiet coup within the Party, took power into its own hands and presented a new, radical constitution. Democratic centralism proved its strength: despite the indignation of some Communists, the majority of the Party accepted this fact. The new constitution would be the basis for a modern socialist state, with the people at the center of all reforms!"
 SOV_new_komsomol: "Continue Party Rejuvenation"
 SOV_new_komsomol_desc: "Rejuvenation of the Party is the guarantee of its future! Young cadres full of enthusiasm and determination will give a new breath to the CPRF. We must continue this process, attracting more and more young Communists to the leadership, who will be ready to lead the country into the future without abandoning the ideals of socialism."
 SOV_ban_the_church: "Weaken Church's Influence"
 SOV_ban_the_church_desc: "While we have nothing against faith, we must ask ourselves: what role has the Church played in the past? Serving the previous regime, it became an instrument of suppression and obsequiousness to the upper classes. The time has come to weaken its influence so that it can no longer interfere in the affairs of the state and the people."
 SOV_socialism_with_human_face: "Socialism with a Human Face"
 SOV_socialism_with_human_face_desc: "We have not forgotten about Gorbachev and his betrayal, he betrayed our values and sold our people to the West. But the 80s is not only his mistakes, it was a time when people believed in a bright future. We will not repeat past mistakes, but we will bring back this spirit of hope and justice. Real socialism with a human face will protect everyone, and the Party will do everything to make this future a reality."
 SOV_lenin_cult: "Cult of Lenin"
 SOV_lenin_cult_desc: "Lenin is a symbol of the struggle for freedom and equality, the father of the October Revolution, which led to the creation of a free and democratic Soviet Russia. His ideas about social justice and equality even today.\n\nLenin is still one of the elegant leaders in Russian history. He proclaimed the right of nations to self-determination, recognized the establishment of genders, fought for labor rights and created the foundations of Soviet democracy.\n\nNow that we communists are back in power, we expect to revive the cult of Lenin and his ideals. We must promote his unique leadership qualities, his dedication to building socialism and his selfless love for the Motherland."
 SOV_empower_congress_of_soviets: "Full Power to the Soviets!"
 SOV_empower_congress_of_soviets_desc: "It is time to return real power to the Soviets! Soviet democracy, where power belongs to the people through their elected councils, will once again be the basis of our state."
 SOV_create_ADS: "Association of Democratic States"
 SOV_create_ADS_desc: "The Association of Democratic States is a proposed intergovernmental economic-political organization that would act as a forum for socialist states across the world to cooperate, inspired by groups such as the Communist International and COMECON. For decades, these nations have never been able to stand united against the capitalist menace surrounding their country, being left to fend for themselves against those who wish to infringe on their very way of life. If the proletariat is to rise from the ruins and claim victory over their oppressors, this must change, and we must be the ones to spark such change. Talks with diplomats from Venezuela, Cuba, and Belarus have been finalized, leaving the bourgeoisie of the world to cower in fear at our unity."
 SOV_support_new_pink_red_tide: "Support the New Red-Pink Wave"
 SOV_support_new_pink_red_tide_desc: "Ever since the late 1920s, the ideas of Socialism had always been a point of interest in Latin American politics, whether it be hardline Marxist-Leninists, Trotskyists, or Social Democrats. People like Salvador Allende, Fidel Castro, Che Guevara, and Daniel Ortega shaped the Communist movement in the region, and their influence still persists today. Unfortunately, the ideas of Marx could not flourish in South and Central America because of one nation; the United States. It was clear that America and the Central Intelligence Agency would do anything and everything to stop the spread of Socialism in Latin America, from funding genocidal dictators, to anti-government guerillas, to violent drug cartels. Now, with the United States out of the picture, the people of Latin America can finally break the chains that restrain them, and we must aid them in their Socialist awakening however possible."
 SOV_african_socialism: "African Socialism"
 SOV_african_socialism_desc: "In the many instances of colonial repression and enslavement brought on by the capitalists of Europe, you need not look further than Africa. After nearly a century of pillaging and looting, which only ended because the people of Africa took up arms against their overlords, the European powers still maintain a presence in the continent, with nations such as France exploiting the resources and labour of countries in West Africa, going so far as to stitch together frankenstein federations to maintain their stranglehold. Any leader who dares to speak out against their neo-colonialism is put down through a coup de'tat, a death due to "unknown circumstances", or outright political assassination. If we are to succeed in our vision, then we must secure Africa from our adversaries by fostering Socialist movements."
 SOV_our_american_comrades: "Our American Comrades"
 SOV_our_american_comrades_desc: "The United States of America was once the single global superpower, challenged and rivalled by none. Their sphere of influence stretched from East Asia, to North America, and Europe. To Russians, America was the embodiment of everything wrong with the world. They promoted capitalist degeneracy across the globe, poisoned countries with their ideals, and threatened the very core of Russian civilization for decades. That was, until, a single virus was able to kick the whole structure down, leaving many in awe at how fragile the American political system really was. Now that they have collapsed under their own weight, we must divert our attention to those who make the best out of their situation; the workers who have valiantly risen up against their overlords, who fight for freedom. We will send them as much aid as we can, to make sure that if America rises once more, they will be apart of the global struggle."
 SOV_red_east: "Red East"
 SOV_red_east_desc: "Starting with Chairman Mao Tse-tung's Chinese Revolution in the 1940s, East Asia has always been a hotbed for Socialist movements, giving way to many great theorists and nation-builders. Their own, distinct versions of Socialism have persisted to the modern day, with East Asia hosting some of the last remaining Socialist countries, such as the DPR Korea, the People's Republic of China, and Vietnam. Our Party's positive relationship with the CPC and our comrades in China has been a focal point of our ideology, and if we are to see the global Socialist movement claim victory, then we must further consolidate our presence in East Asia and build a relationship with the most prosperous Socialist nations of the modern day."
 SOV_war_on_home_front: "War on the Home front"
 SOV_war_on_home_front_desc: "A powerful war effort requires resources and production power. The Party and the state must ensure that our factories work with maximum efficiency, providing the front with everything it needs. We will mobilize the economy for victory!"
 SOV_rally_the_population: "Rally the Population"
 SOV_rally_the_population_desc: "The people must know who we are fighting against! We will strengthen the unity of society by explaining the true goals of our struggle. A united people is our strength, and only together can we win!"
 SOV_no_step_back: "No Step Back!"
 SOV_no_step_back_desc: "The formidable cry of the past has regained its meaning in this conflict. We will not allow the enemy to advance a single step! Everyone must be ready to stand to the end for our motherland and the ideals of socialism!"
 SOV_heros_of_frontline: "Heroes of the Front"
 SOV_heros_of_frontline_desc: "Our heroes at the front are symbols of courage and sacrifice. We have a duty to support them and tell the people about their exploits. These heroes are our everything, and their story will inspire everyone to fight for victory!"
 SOV_reconcile_loyal_oligarchs: "Take Advantage of Connections"
 SOV_reconcile_loyal_oligarchs_desc: "The sanctions imposed by capitalist countries are a serious problem. To overcome them, we must turn to the loyal oligarchs and ask for their help. We must show these people that they have a place in the new Soviet society and that their wealth and power can be used for good. We must create a new relationship based on mutual respect and cooperation to build a better world together."
 SOV_invite_new_socialism: "Invite For a New Socialism"
 SOV_invite_new_socialism_desc: "Nikolai Platoshkin and his movement "For New Socialism" made a huge contribution to the development of leftist ideas in the country. His experience and ideas will help us move forward. We will offer him a key post in the government, where his knowledge and political strength will work for the benefit of the people."
 SOV_invite_left_front: "Invite the Left Front"
 SOV_invite_left_front_desc: "Sergey Udaltsov and the Left Front have proven their commitment to social justice and revolutionary change. We will invite them into government to strengthen our ranks with experienced and committed supporters. Their ideas will help advance our cause."
 SOV_grant_greater_ssr_autonomy: "New Lenin Enrolment"
 SOV_grant_greater_ssr_autonomy_desc: "Like a hundred years ago, the Party needs a new generation of committed people ready to devote themselves to building socialism. We are launching a new call, inspired by Leninist traditions, to attract young and active citizens to our ranks. This is a chance for everyone to participate in a great cause."
 SOV_restore_local_cultures: "Shield and Sword of the Revolution"
 SOV_restore_local_cultures_desc: "In order to protect the state and the party, it is necessary to create a new security body that will be loyal only to us. We will form a new KGB from proven cadres who will never betray the ideals of the revolution. Its effectiveness may not be comparable to the FSB, but loyalty is more important than anything else!"
 SOV_increase_fsb_budget: "FSB - KGB"
 SOV_increase_fsb_budget_desc: "The return of the legendary KGB requires the strength and experience of those who served in the security organs. We will use the best FSB cadres to rebuild this powerful structure capable of effectively protecting the socialist state. A new era requires the old dedication and the ability to act decisively!"
 SOV_special_military_operation_cprf: "Special Military Operation"
 SOV_special_military_operation_cprf_desc: "Ukrainian neo-Nazism cannot be tolerated any further. We know that the authorities in Kyiv are preparing plans to destroy Donbass, and it is our duty to prevent this tragedy. A preventive strike will be our response to protect the Russian people and to prevent the enemy from realizing its plans!" 
 SOV_sway_ukrainian_workers: "Sway the Ukrainian Workers"
 SOV_sway_ukrainian_workers_desc: "The Ukrainian people must know the truth: the Soviet Army came not as an invader, but as a liberator. This operation is carefully planned; we are striving to avoid any civilian casualties. We appeal to the Ukrainian workers: Soviet Russia is your friend, and our goal is to rid Ukraine of the oppression of neo-Nazism!"
 SOV_operation_red_dnepr: "OPERATION: §YRED DNEPR§!"
 SOV_operation_red_dnepr_desc: "In this struggle, we must win at all costs. Even if it brings suffering to civilians, we will not stop until Ukrainian neo-Nazism is destroyed. Operation Red Dnieper is the decisive blow that will lead us to victory!"
 SOV_resovietization: "Re-Sovietization"
 SOV_resovietization_desc: "Ukraine is not just a land, it is part of the great Soviet history. We will remind the people of the glorious red past, when workers and peasants were masters of their own destiny. This is the restoration of justice, the return of the people to the ideals of socialism!"
 SOV_restoring_soviet_republic: "Restoring Soviet Republic"
 SOV_restoring_soviet_republic_desc: "In the liberated territories of Donbass and other regions, the time has come to re-establish civil administration. We will create a new Soviet republic, which will become a stronghold of socialism in the region and an example for the whole world."
 SOV_exterminate_banderite_fascism: "Exterminate Banderite Fascism"
 SOV_exterminate_banderite_fascism_desc: "Ukrainian fascism, hiding under the banner of Bandera, must be completely destroyed. We will not leave a single trace of this ideology so that Ukraine can once again become free from the oppression of nationalism and fascism!"
 SOV_ukrainian_red_army: "Ukrainian Red Army"
 SOV_ukrainian_red_army_desc: "We must assemble combat units from local collaborators ready to fight for freedom and socialism. The Ukrainian Red Army will be the force that will fight for the liberation of their country."
 SOV_expand_communist_resistance: "Expand Communist Resistance"
 SOV_expand_communist_resistance_desc: "The anger of the people of Ukraine against the current regime is our opportunity. We will use this discontent to create a powerful guerrilla movement in enemy-controlled territory. Communist Resistance will become a striking force in the struggle for the liberation of Ukraine!"
 SOV_soviet_victory: "Victory!"
 SOV_soviet_victory_desc: "Victory is more than a word, it is the triumph of our great Motherland! Soviet Russia, uniting the forces of brotherly peoples, has defeated the enemy armies of Ukraine and NATO! We have once again gathered all the republics of the USSR under the red banner, and the world sees: socialism is invincible! This is a new era of our mighty Union, brought back from the ashes!"
 SOV_new_union: "New Union"
 SOV_new_union_desc: "We have rebuilt the Soviet Union, but that is only the beginning! The time has come to weave our economies and forces into a single whole. The smooth integration of our republics will lead to unprecedented heights of development. The new Union will become a beacon for all peoples who dream of freedom and justice! Together we will sweep away the old world and build a new one!"
 SOV_new_treaty: "New Treaty"
 SOV_new_treaty_desc: "The CSTO no longer serves the interests of our time, its place will be taken by the new shield of socialism - the Minsk Treaty Organization! This is our answer to threats from the West! The USSR and the socialist states of Eastern Europe loyal to us will create a powerful alliance before which all enemies will tremble. We will again prove to the world that the unity of socialist countries cannot be crushed!"
 SOV_convene_council_ministers: "Convene the Council Ministers"
 SOV_convene_council_ministers_desc: ""
 SOV_new_union_ruble: "New Union Ruble"
 SOV_new_union_ruble_desc: "With the reunification of the Union, the time has come to finally unite our economies of brotherly nations. Despite the widespread use of the Russian ruble throughout the country, the currencies of other republics are still found in circulation. A large-scale monetary reform is already a necessary step to strengthen the common financial system. The new Union Ruble will remove this confusion and become a symbol of our united power, emphasizing the inseparability of economic and social ties."

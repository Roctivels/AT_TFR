 SOV_navalny_protests_category: "Navalny Protests"
 SOV_navalny_protests_category_desc: "Once more, Mother Russia has been embroilled with massive protests, this time over the controversial arrest of Alexander Navalny - leader of the Russia of the Future opposition party - who has held particular fame for his rampant campaigns against corruption in Russia. While it was expected that he would be arrested at some point due to ironically his past charges of embezzlement by a court in 2013, what was not expected was the huge backlash to the detainment. Hundreds of thousands of citizens have went out into the streets, seeing this as another move by the establishment to maintain its oligarchic hold onto power, and as the days continue, so does the size of the protests swell.\n\nProtest Strength: §Y[?SOV_navalny_protest_strength]§!"

 #LDPR
 SOV_triumph_of_zhirinovsky: "Triumph of Zhirinovsky"
 SOV_triumph_of_zhirinovsky_desc: "LDPR has achieved a monumental victory in the Russian elections. Zhirinovsky, after decades of political campaigning, finally claimed his rightful role as leader of the state in a fair election. There is no time to celebrate however, there is much to be done..."
 SOV_power_and_strength: "Power And Strength"
 SOV_power_and_strength_desc: "The Russian people, when leaderless, are like a pack of beasts without an alpha wolf - easily overpowered by the harsh forces of nature. Yet, with a strong-willed leader, akin to Ivan the Terrible or Stalin, they can achieve the most formidable tasks, conquer the harshest environments, and defeat the fiercest enemies. After three decades of stagnation in the Russian Federation, we now have a leader capable of wielding power effectively. Vladimir Zhirinovsky, with his unyielding will, will guide us to dominate all lands and peoples visible from the peaks of the Ural Mountains."
 SOV_guiding_hand: "Guiding Hand"
 SOV_guiding_hand_desc: "An experienced politician is like a skilled orchestra conductor; with every wave of his baton and each gesture, the masses create a harmonious melody. A great leader, on the other hand, is like a lighthouse on a rocky coast; his guiding principles shine like a beacon, steering lost ships safely back to the nation's harbor. Vladimir Zhirinovsky is exactly such a leader, one who knows how to harness the will of the people. His political artistry will restore the unity of the Russian people and revive the nation's former glory."
 SOV_pragmatic_eurasianism: "Russia And The World"
 SOV_pragmatic_eurasianism_desc: "Gunter's mother is a dockyard prostitute. Sad!\n\nPerched on this small blue planet we call home, Russia is privileged to possess nearly an eighth of the world's habitable land. As a result, our nation plays a pivotal role in international diplomacy. Every action, no matter how seemingly insignificant, can trigger a complex chain reaction that reverberates around the globe, affecting all aspects of international society - from Somali pirates to the Swedish monarchy. Now, we are ready to reassess our foreign policy, ensuring that, in this world aflame with conflict, Russia seizes the maximum benefits." 
 SOV_transform_oligarchy: "Transform the Oligarchs" 
 SOV_transform_oligarchy_desc: "The Oligarchs, for all their wrongs, are still a very powerful force in both money and influence.\nUsing their corporations and connections may prove to be useful...\n."  
 SOV_the_trinity_of_russia_people: "The Trinity of Russian People"
 SOV_the_trinity_of_russia_people_desc: "The Velikorussians, Belarussians and Malorussians are, and have been, the core of the Russian world. This bond has been tried in blood ever since the Varyags united the squabbling towns of the Rus. We have been through so many hardships together, it's ridiculous to throw that bond away due to western meddling!" 
 SOV_operation_rokossovsky_LDPR: "OPERATION: §YWRANGEL§!"
 SOV_operation_rokossovsky_LDPR_desc: "Peter Wrangel, the cavalry hero of the Russo-Japanese War and World War I, and the "Black Baron" of the Russian Civil War, has often been mischaracterized. However, with this decisive operation, his legacy will be rightfully honored. As we prepare to launch this campaign against our long-standing western adversary, Poland, the name of Baron Wrangel will be immortalized through the title of this operation. Our goal is to break through the European Union's central barrier against us. Beyond this line of defense lies the vast North German Plain - the land where the Baron's cavalry once dreamed of charging freely."
 SOV_operation_suvorov_LDPR: "OPERATION: §YBRUSILOV§!"
 SOV_operation_suvorov_LDPR_desc: "Alexei Brusilov, the greatest general of the Tsarist Russian Army during World War I, masterminded the 1916 offensive as its supreme commander. His forces nearly broke through the defensive lines of the Central Powers, an achievement that could have shortened the war by two years. Tragically, in his later years, he helped the Red Army suppress his former comrades. Despite this, his reputation as an exceptional leader and his remarkable military achievements deserve our respect and remembrance. Therefore, it is only fitting to name our military operation - aimed at ultimately defeating the opposing forces aligned with the European Union and celebrating our victory with a grand parade in Paris - after him. May his glory forever guide our forces!"
 SOV_mobilize_the_minorities_LDPR: "Mobilize All Of Russia"
 SOV_mobilize_the_minorities_LDPR_desc: "Within our Liberal Democratic Party, we are fortunate to have many talented propagandists. Their persuasive skills can transform even the most peace-loving individuals into fervent supporters of our cause, or turn rebellious teenagers who vandalize Zhirinovsky posters into dedicated patriots. Now, they face an even greater challenge. From the halls of the State Duma to the narrow streets, and from the front pages of daily newspapers to the video platforms of Russia Today, they will convey a passionate message of resistance to every Russian, no matter how remote their location."
 SOV_matters_of_the_state: "The National Revitalization"
 SOV_matters_of_the_state_desc: "Our victory in the elections has caused quite a lot of... uproar. Many are wondering what exactly the rule of Zhirinovsky entails. This is why the leader decided to give a speech to the Duma, explaining how Russia will move forward."
 SOV_control_the_media: "Consolidate Media Dominance"
 SOV_control_the_media_desc: "The red plague, after the suspension of the Duma, has become desperate. It cannot accept that it lost the vote of the people. It's sweet lies still try to persuade the weak-minded to betray the Russian soul. We will not let that happen. The plague will be stopped."
 SOV_destroy_inner_russophobes: "Purge Russophobic Ideals"
 SOV_destroy_inner_russophobes_desc: "The russian liberal is the lowest of the low. He despises his own people, culture and history. He hates the periods of russian prosperity and idealizes our enemies that bring us suffering. They have been left to run wild for decades, eroding our traditions and society. Until now."
 SOV_russian_national_constitution: "Russian Sovereign Constitution"
 SOV_russian_national_constitution_desc: "The current Russian Constitution, a patchwork of laws, is only matched by the flawed "Russian Federation" state established in 1991. If we are to truly transform Russia into a sacred nation for its people, it is essential to draft a more coherent and reasonable constitution that better protects the interests of the Russian nation. This will be the primary task for our party and government in the coming period. Under the wise leadership of Zhirinovsky and the steady guidance of Slutsky, the sovereign constitution of the Russian nation will become a revelation to all."
 SOV_implement_party_programm: "Implement Party Program"
 SOV_implement_party_programm_desc: "As Slutsky argues, without the Liberal Democratic Party, Russia cannot truly achieve strength. If the party fails to become a well-structured, leading organization, it is as if the motherland has lost its brain and nervous system. Past experiences in parliamentary institutions and propaganda battles are no longer relevant to Zhirinovsky and his colleagues, who now hold the highest positions of power in Russia. Therefore, we will adopt Leonid Eduardovich's recommendations, implement the latest version of the party's program, and reorganize the party to serve as the core of Russia's political structure. We will strengthen it with a web-like bureaucratic network and a powerful, transcendent leadership."
 SOV_populist_revolution: "Populist Revolution"
 SOV_populist_revolution_desc: "As Vlasov argues, without the Liberal Democratic Party, Russia cannot truly become strong. If the party fails to become an organization that unites national fervor, it is as if the motherland has lost its brain and nervous system. We must be cautious of opportunists who deceive with slogans like "legitimizing power" and "pragmatic reforms," whose true goal is to undermine our party's cause from within. Therefore, we will heed Vasily Maksimovich's advice, adopt the slogan of the Russian populist revolution, unite all Russians around the party and their common leader, and establish indestructible communal bonds."
 SOV_national_totalitarianism: "National Totalitarianism"
 SOV_national_totalitarianism_desc: "From the Communist Party of the Soviet Union to "Yedinaya Rossiya," the politicians of these discredited organizations always claim to have saved Russia in times of crisis, but their boasts pale in comparison to the real achievements of the Liberal Democratic Party. It is we who have truly forged Russia into a unified community, and as the undeniable leader of the Russian nation, the party will not allow any other political forces to share in the fruits of power. We will unite further around the great Zhirinovsky, establish a hierarchical class structure within Russian society, and lead Russia back to its former glory."
 SOV_elitist_bureaucracy: "Elitist Bureaucracy"
 SOV_elitist_bureaucracy_desc: "We must acknowledge that, at times, the masses cannot govern the country on their own. They need the guidance of a leader, and equally important is a professional, bureaucratic middle class. This class can translate the leader's directives into practical policies that benefit the broader Russian populace, while also providing timely and reasonable feedback on the people's demands. This fosters a positive interaction between the leader and citizens, which is essential for Russia under the rule of the Liberal Democratic Party. Under Zhirinovsky's leadership, the new Russian elite will be a perfect combination of national purity, professional expertise, and unwavering loyalty."
 SOV_practice_national_democracy: "Practice National Democracy"
 SOV_practice_national_democracy_desc: "The term "democracy," once a word of clear meaning and value, has unfortunately been hijacked by our Western colonial adversaries and misguided domestic opposition. As a result, every honorable Russian citizen now feels a sense of disgust upon hearing it. Our party will rebuild democracy with Russian national characteristics. Under Slutsky's slogan of "National Democratic," a party that truly serves the Russian people will unite in a parliament dedicated to serving the nation, deliberating on state matters. Politicians who deceive the people with empty rhetoric will be replaced by genuine statesmen who come from and return to the masses."
 SOV_increase_pensions: "Support the Pensioners"
 SOV_increase_pensions_desc: "Vladimir Volfovich promised to improve pensioner's conditions when he came to power. He will fulfill his promise."
 SOV_patriotic_youth_organizations: "Expand Yunarmiya Movement"
 SOV_patriotic_youth_organizations_desc: "While a lot of our youth have been corrupted by western influence, they still feel pride for their nation. We must bolster these qualities to make sure our young will continue our legacy."
 SOV_glorify_the_white_guard: "Glorify the White Guard"
 SOV_glorify_the_white_guard_desc: "For more than 70 years, we have been lied to, first by the Communists, and then by the "conciliators". It was said that the Bolshevik government came with minimal resistance, but this is not so! The Red ghouls seized power in Russia - with genocide, with the blood of the Russian people!\nNow it's over, in the new Russian state, there is no place for these bloodthirsty idols, with their schizophrenic mania of world revolution. The historical society and the policy of the state will be aimed at reviving the lost, forgotten good name of soldiers and officers, and all those who fought against the red usurpers. Historical justice will be restored, and the true heroes of holy Russia will finally be avenged."
 SOV_revive_russian_culture: "Revive Russian Culture"
 SOV_revive_russian_culture_desc: "One of the greatest crimes the communist regime has committed was to destroy traditional Russian society to mold it into a universal "Soviet" one. As it stands, the current Russian "culture" is just a Soviet husk glued together by American cultural imports. Mistakes like these must be rectified."
 SOV_honor_the_romanovs: "Honor the Romanovs"
 SOV_honor_the_romanovs_desc: "The Romanovs, for all that has been said, are still the only legitimate dynasty of Russia. Our Empire must treasure their history and weep for their fates. Such betrayals will never happen again!"
 SOV_orthodoxy_supreme: "Orthodoxy Supreme"
 SOV_orthodoxy_supreme_desc: "Our soldiers are driven not by paychecks, but by duty and faith.\nOur priests stay with the soldiers to give them guidance in their darkest hours.\nOur weapons are blessed not only by the engineers, but also by the Almighty.\nOur faith is the strength that will not yield to any adversary."
 SOV_soothe_the_inordets: "Soothe the Inorodets"
 SOV_soothe_the_inordets_desc: "The ethnic minorities have become anxious after our victory during the elections. We will reassure them that just as the Empire of old, we will accept them into Russia with open arms - as long as they are loyal to the state that is."
 SOV_destroy_aids: "Social Health Recovery"
 SOV_destroy_aids_desc: "The commercialization of the russian society has been made evidently clear the past few decades. With the increasing digitalization of the world, we must ensure the ads that promote destructive habits are gone from the eyes of the masses. We must make sure our society tames the modern vices, not indulge in them."
 SOV_promote_skilled_managers: "Promote Skilled Managers"
 SOV_promote_skilled_managers_desc: "After clearing the major opposition movements, it has become clear that we must also deal with the bureaucracy of the old government. To make sure that the Empire runs smoothly we will put the most loyal men in the position of governors to avoid any problems during the transitional period."
 SOV_supreme_leader: "The Supreme Leader"
 SOV_supreme_leader_desc: "Since we became an Empire it is silly to have our leader be a president. Zhirinovsky has no intention of becoming an Emperor himself, a position of "Supreme Leader" will do."
 SOV_propagate_russian_irredentism: "Pursue Russian Irredentism"
 SOV_propagate_russian_irredentism_desc: "While the previous government managed to achieve success during the Georgian war and the Russian Spring,it still lacked the drive to see through the revival of the Two-Headed Eagle. Supporting the patriots fighting for the "Russian World" is a right step forward."
 SOV_masters_of_europe: "Masters of Europe"
 SOV_masters_of_europe_desc: "Europe, as always, remains the main threat to us. The west has always tried to chain Russia ever since the Teutons, yet now they even want to destroy our culture and traditions. During the golden age of the Russian Empire, no cannon dared shoot in Europe without Catherine the Great's permission. Reviving that ambition will be our new goal from here on."
 SOV_pridnestrovian_frontier: "Pridnestrovian Patriots"
 SOV_pridnestrovian_frontier_desc: "The left bank of the Dniester River, though sparsely populated, is a region where the people of Pridnestrovie, surrounded by powerful enemies, have remained loyal to the great cause of the Russian nation, steadfastly defending their homeland and dignity. The neglect shown by the old government toward this area is one of its most severe betrayals of Russia. But now, it is time for these long-suffering people to return to the embrace of Mother Russia. We will open our arms to welcome these patriots, who have fought alone for so many years, and give them the grand reception they deserve."
 SOV_subdue_central_asia: "Return to Almaty"
 SOV_subdue_central_asia_desc: "During the great betrayal, the Soviets gave Russian lands to the Kazakhs in order to secure their loyalty.  Now, more than 2 million Russians live under a government that goes as far as to latinize their language to combat our influence. The Russian World will return to Almaty, and it will stay there."
 SOV_bent_caucasus: "Second Caucasian War"
 SOV_bent_caucasus_desc: "The Caucasus has been a hotbed of instability ever since the Soviet Union fell. From Jihadists to NATO lapdogs, the region is a constant pain in the neck for our nation. If we are to fight against the west, we must secure this region once and for all."
 SOV_the_time_is_now: "The Time is Now!"
 SOV_the_time_is_now_desc: "The Empire has been revived and rejuvenated, and now there is only one thing left to do. Russia must revise the most grievous mistake of the Soviets and return Malorossya to its motherland. The Donbass Republics will be saved from the Ukrainian sodomites."
 SOV_operation_southern_thunder: "Cross The Rubicon"
 SOV_operation_southern_thunder_desc: ""The Europe has all of the problems of the ancient Roman Republic - extreme bureaucracy, corruption, extensive senatorial infighting. Just as with the ancient Republic, it is natural that a military force should conquer and transform Europe into a military dictatorship. Synthesis and antithesis. The Ukraine is my Rubicon.""
 SOV_greater_union_state: "Greater Union State"
 SOV_greater_union_state_desc: "With all preparations complete, it's finally time to integrate Belarus, or Belarussia as it was originally known, into our Empire. Welcome home, brothers!"
 SOV_reinforce_brics: "Reinforce BRICS"
 SOV_reinforce_brics_desc: "Initially, the "BRICS" represented the world's most dynamic economies and served as a benchmark for developing countries. However, given the current turbulent global situation, it can now play a more significant role. Russia will advocate transforming "BRICS" into a fully-fledged multinational alliance to counter the increasingly erratic, yet declining, Western world. Invitations will be extended to China, Brazil, South Africa, and India. At the same time, we will reach out to countries eager to join "BRICS," such as Argentina, Egypt, and Indonesia."
 SOV_special_military_operation_ldpr: "Special Military Operation"
 SOV_special_military_operation_ldpr_desc: "Ukraine, a country born out of a series of mistakes by Russian rulers, has long been a source of tension between Russia and the West since the 19th century. Since the 2014 revolution, Western powers have used Ukraine to counter Russia. Their goal is to turn it into a battleground, draining the resources and lives of Slavic people. As their plans come to fruition, it is crucial for Russia to act decisively. Ukraine will no longer threaten Russia, and one day, it may return to the Slavic fold, rejoining its roots." 
 SOV_preserve_malorossiya: "Preserve Malorossiya"
 SOV_preserve_malorossiya_desc: "Although the nation's fortunes were tarnished by the turbulence of the 20th century, Ukraine, the jewel of the Russian Empire, still shines brightly. From the fertile black soil of the Dnieper to the coal mines of Donbas, harnessing Ukraine's resources would significantly bolster Russia's strength. Ukraine would regain the power it once held at its historical zenith. However, if war were to devastate all this, it would only harm our country. Therefore, during the military operation, we will carefully regulate our troops' routes and the intensity of the battles. We must protect "Malorossiya" from any conspiracies seeking its destruction."
 SOV_operation_russian_thunder: "OPERATION: §YRUSSIAN THUNDER§!"
 SOV_operation_russian_thunder_desc: "Sergey Surovikin, often criticized in the West as the "Butcher General," is in fact a highly skilled and effective commander. His leadership is bold and decisive, capable of maximizing the potential of his troops. He has demonstrated this ability both in peacetime and on the battlefields of Syria, where he turned ordinary soldiers into a formidable force. For the military operation in Ukraine, it may be worth considering General Surovikin's approach. By deploying our Aerospace Forces for comprehensive bombing missions and using Army rocket artillery to support our armored and infantry units, we will crush any resistance and achieve victory more swiftly."
 SOV_appoint_zolotov_as_namestnik: "Appoint Zolotov as Namestnik"
 SOV_appoint_zolotov_as_namestnik_desc: "Viktor Zolotov, commander of the National Guard, has earned significant trust within the Liberal Democratic Party due to his military service and firm stance against the opposition. Although Zolotov has close ties with Yeltsin and Putin, Zhirinovsky still values him as a key asset, particularly because, like many senior generals, he has pledged loyalty to the leader. Therefore, Zolotov is the natural choice to lead the newly conquered territories. He will bring justice and order to the newly integrated populace with a firm but just hand."
 SOV_rebuild_imperial_frontier: "Rebuild the Imperial Frontier"
 SOV_rebuild_imperial_frontier_desc: "Once we re-establish the Russian border along the Dnieper River, securing this frontier becomes our top priority. Although many loyal Slavic patriots remain in the former Ukrainian territories, we must not overlook the potential threat from anti-Russian elements. The defeat of the Kiev regime could drive them to target civilians. In response, we need cultural assimilation and propaganda to inspire national pride, as well as a firm approach to ensure these restless individuals submit."
 SOV_expunge_ukrainianism: "Expunge Ukrainianism"
 SOV_expunge_ukrainianism_desc: "Some claim that Ukrainian nationalism represents a fight for liberation from Tsarist Russian rule. In reality, it could be an offshoot of anti-Russian propaganda created by some disgruntled Polish intellectuals. With Zhirinovsky now leading Russia to victory, we cannot allow this historical distortion to continue undermining our efforts. The trident will be dismantled, and the Russian double-headed eagle will always watch over Ukrainian soil."
 SOV_expand_wagner_involvement: "Expand Wagner Involvement"
 SOV_expand_wagner_involvement_desc: "Yevgeny Prigozhin, formerly President Putin's butler and the Kremlin's catering chief, is now more renowned as the head of the Wagner Private Military Company. His mercenaries have operated in Ukraine since 2014 and later expanded to Syria, Libya, Somalia, and the Congo, gaining prominence. While some may be hesitant to involve the Wagner Group in stabilizing the "Malorossiya" region, it is hard to find warriors more passionate and experienced than these "musicians." Many of them also have strong connections with senior figures in the Ministry of Defense and the General Staff."
 SOV_anti_corruption_division: "Anti-Corruption Division"
 SOV_anti_corruption_division_desc: "There is no corruption in Russia!"
 SOV_branch_out_rosgvardia: "Extand Rosgvardia Duties"
 SOV_branch_out_rosgvardia_desc: "Our police force is not sufficient to saveguard our nation in these historic times. We must reshape them to take a more active role in keeping the peace in our nation and not be a passive force that is shackled by bureaucracy. No revolutionary, insurgent or criminal shall be safe from our protectors!"
 SOV_annihilate_parasitic_elements: "Annhilate Blood-Sucking Parasites"
 SOV_annihilate_parasitic_elements_desc: "Their yachts and mansions abroad are paid for by Russia's money. The oligarchs here think they are safe, how stupid they are. We will make Putin's oligarch purge of the 00s look like a joke."
 SOV_brightest_minds_in_russia: "Restructure State Governance"
 SOV_brightest_minds_in_russia_desc: ""
 SOV_party_of_the_masses: "Party of the Masses"
 SOV_party_of_the_masses_desc: "Vox populi vox Dei"
 SOV_strengthen_ties_with_iran: "Eagle in The Desert"
 SOV_strengthen_ties_with_iran_desc: "Iran and Russia share a complex and entangled history, having long viewed each other as threats. However, the unique nation born from the Iranian Islamic Revolution has not proven to be Russia's greatest enemy. On the contrary, Iran's "Arc of Resistance" has successfully forged a broad anti-Western alliance in the Middle East over the past few years, greatly strengthening our regional strategy. As a result, Zhirinovsky has decided to pursue a special alliance with the Islamic Republic of Iran."
 SOV_cooperation_with_china: "China Policy"
 SOV_cooperation_with_china_desc: "China, our most significant economic partner, could become our most reliable ally in the foreseeable future. In recent years, China and Russia have jointly confronted the Atlanticist bloc on different continents. Military, economic, and cultural challenges have gradually brought these two great nations closer together. To strengthen our rear security, Zhirinovsky has decided to pursue a special alliance with the People's Republic of China."
 SOV_recongize_the_taliban: "Spread Instability Among Globalists"
 SOV_recongize_the_taliban_desc: "Neither as brutal as fascism nor as coldly materialistic as Marxism, neoliberalism and globalization have become the harbingers of worldwide decay and suffering over the past four decades. While the beneficiaries of globalization have set the world ablaze, we will, in turn, fan the flames, aiming to consume the prevailing Western hegemony. The great nation of Russia has sounded the trumpet against the global capitalist order. Now, it is time to fire the first shot, and our target is one of their strongholds-the European Union."
 SOV_keeping_america_burning: "Keep America Burning"
 SOV_keeping_america_burning_desc: "As we witness America's decline, our decades-old adversary, now engulfed in hellish warfare, it would be hypocritical not to feel a sense of satisfaction. To ensure America can never recover and pose a threat to Russia, we will seize this opportunity to deeply involve ourselves in their internal politics. By playing both sides, forming strategic alliances, and providing necessary support to one or more factions, our goal is to prolong the American civil war, ensuring that the scale of the conflict overwhelms any faction that could potentially reunify America in the short term. "
 SOV_reorganize_russian_armed_forces: "Reorganization of Armed Forces"
 SOV_reorganize_russian_armed_forces_desc: ""
 SOV_expand_ratnik_LDPR: "Expand Ratnik Program"
 SOV_expand_ratnik_LDPR_desc: ""
 SOV_integrate_national_guard: "Integrate the National Guard"
 SOV_integrate_national_guard_desc: ""
 SOV_cult_of_combined_arms: "Cult of Combined Arms Warfare"
 SOV_cult_of_combined_arms_desc: ""
 SOV_vdv_supremacy: "VDV Supremacy"
 SOV_vdv_supremacy_desc: ""
 SOV_imperial_army_reborn: "The Eagle's Glory Reborn"
 SOV_imperial_army_reborn_desc: ""
 SOV_armored_infantry_LDPR: "Armored Infantry"
 SOV_armored_infantry_LDPR_desc: ""
 SOV_artillery_surpremacy_LDPR: "Artillery Supremacy"
 SOV_artillery_surpremacy_LDPR_desc: ""
 SOV_enforce_doctrine_standards_LDPR: "Enforce Doctrine Standards"
 SOV_enforce_doctrine_standards_LDPR_desc: ""
 SOV_build_up_western_military_district_LDPR: "Buildup the Western Military Disctrict"
 SOV_build_up_western_military_district_LDPR_desc: ""
 SOV_mass_produce_t14_LDPR: "Mass Produce the T-14"
 SOV_mass_produce_t14_LDPR_desc: ""
 SOV_mass_mechanization_LDPR: "Mass Mechanization"
 SOV_mass_mechanization_LDPR_desc: ""
 SOV_authorize_banned_weapons_LDPR: "Crush The Scum"
 SOV_authorize_banned_weapons_LDPR_desc: "Although the country of Ukraine still exists, it is little more than a hollow shell, on the verge of collapse. A swift and decisive operation will soon erase this entity from the pages of history. More importantly, we will rid the region of the harmful ideologies of Nazism and Fascism that have polluted the minds of the Slavic people. The unnatural creation of these ideologies, born from the collaboration of Italians and Austrians, will be crushed under the might of the Russian army."
 SOV_total_war_LDPR: "Total'naya Voyna"
 SOV_total_war_LDPR_desc: "From every corner of our sacred motherland, the call of our great leader Zhirinovsky resonates, reminding us of a time when a pope would rally knights to reclaim lost lands. This is a grand struggle, one in which every Russian will take part. It will be a transformative process, both materially and spiritually, uniting our nation as never before. Every news anchor, urging enlistment on television, plays their part in this fight, as important as any soldier on the front lines. Likewise, every assembly worker will feel a personal stake, as though they themselves fired the shell from a tank's cannon."
 SOV_trample_over_kiev_LDPR: "Form The Malorussian Liberation Army"
 SOV_trample_over_kiev_LDPR_desc: "After we initiated our campaign against the traitors of the Slavic nation - Ukraine - an increasing number of Ukrainians have chosen to join us in opposing the extreme nationalism that has taken hold in their country. With the support of our leader, Zhirinovsky， we are forming a "Malorussian Liberation Army" to assist our Ukrainian compatriots in their struggle. While this new group primarily serves military propaganda purposes, it may yield unexpected results, similar to the successes of our allies in Donetsk and Luhansk." #Хайпово(было)
 SOV_crack_down_on_protests_LDPR: "Fuel Propaganda Machine"
 SOV_crack_down_on_protests_LDPR_desc: "Today, the days when simple slogans and broadcasts could motivate young people to line up at recruitment stations are behind us. We need more engaging methods to attract new recruits. Fortunately, we established a skilled new media team even before the war, and they are now ready to take action with their editing software. Well-produced, action-packed military documentaries and thrilling war movies will serve as powerful tools to inspire a fighting spirit among the public."
 SOV_to_serve_russia_to_die_russia_LDPR: "Death Or Dishonor!"
 SOV_to_serve_russia_to_die_russia_LDPR_desc: "Our generals inspire the soldiers with these words: "The black, yellow, and white tricolor of Russia is the ultimate honor for a warrior." Now that the war has reached its most critical point, we must commit fully. Do not hesitate to utilize our final missile, tank, submachine gun, and bullet. Even if only one soldier remains to charge forward, he will die honorably on the battlefield as one of modern Russia's greatest heroes, rather than suffer the disgrace of being shot in the back."
 SOV_boost_aviation_funding_LDPR: "Boost Aviation Funding"
 SOV_boost_aviation_funding_LDPR_desc: ""
 SOV_modernize_fleet_LDPR: "Modeernize the Fleet"
 SOV_modernize_fleet_LDPR_desc: ""
 SOV_build_up_western_air_bases_LDPR: "Builup Western Air Bases"
 SOV_build_up_western_air_bases_LDPR_desc: ""
 SOV_drone_r_d: "UCAV R&D"
 SOV_drone_r_d_desc: ""
 SOV_pragmatic_economics: "Pragmatic Economics"
 SOV_pragmatic_economics_desc: "In the pursuit of strengthening the Russian nation, we must focus on building our economic power - the foundation for all our future efforts. For too long, economists have dazzled our leaders with empty phrases like "tertiary industry" and "financial markets" whenever economic progress was discussed. That era is over. We are now prioritizing the revival of basic industries, driving the critical task of improving efficiency across all sectors and boosting productivity."
 SOV_dismantle_oligarch_institutions: "Destroy Bourgeois Decadence"
 SOV_dismantle_oligarch_institutions_desc: "The Mercedes-Benz and Ferraris speeding through the streets do nothing to enhance the city's beauty. On the contrary, they fuel dissatisfaction and resentment. To the people, these luxury cars are a symbol of wealth that is unfairly concentrated in the hands of a few, rather than earned through hard work. We will implement measures to curb this decadence and reduce these displays of excess, at least making the wealthy less ostentatious."
 SOV_develop_siberia: "Develop Siberia"
 SOV_develop_siberia_desc: "Siberia is a land of unparalleled beauty and mystery - vast grasslands, dense forests, towering mountains, and endless snowfields. It may hold the most diverse natural landscapes on Earth, a priceless treasure. For generations, Russians have dedicated themselves to Siberia, working to make it a vital part of the nation. We will continue this important work, transforming this land, which embodies the Russian spirit, into a new Eden."
 SOV_nationalize_Evraz: "Nationalize Resource Companies"
 SOV_nationalize_Evraz_desc: "Although state-owned enterprises officially manage the extraction and control of our natural resources, they are still effectively under private influence. The managers, who hold power similar to that of oligarchs, may continue down the same path. To ensure the security of our resources, we must implement true nationalization. Going forward, the management of natural resources will be entrusted to relevant ministries and new councils, formed through a combination of internal elections and central appointments. We believe this collective decision-making model will ensure success."
 SOV_imperial_monopolies: "Imperial Monopolies"
 SOV_imperial_monopolies_desc: "When we control the key sectors of the economy, it is only natural to establish dominant enterprises and manage them with a streamlined structure. Creating a new monopoly system will not only secure steady benefits, but it will also help restore order to the chaotic business environment. Some may question whether Russia's economy can ever be free from oligarchs and monopolies, but this time, the system will no longer breed corruption or selfishness. Instead, it will mark the rebirth of a powerful Russian financial empire."
 SOV_nationalize_railways: "Connect The Motherland"
 SOV_nationalize_railways_desc: ""
 SOV_wont_bend_to_western_banks: "Suppress Globalist Bank Capital"
 SOV_wont_bend_to_western_banks_desc: ""
 SOV_modernize_production_lines: "Modernize Production Lines"
 SOV_modernize_production_lines_desc: "In the past, Russia's heavy industry was known for its large-scale output but also for its lack of precision, outdated technology, and cumbersome designs. Our weapons and military vehicles often fell short of their Western counterparts in terms of accuracy, technical capabilities, and upgrade potential. But that is about to change. By upgrading our production lines, Russian military products will offer a perfect balance of affordability, efficiency, and modern innovation, all while delivering unmatched combat power."
 SOV_national_social_state: "People's Economy"
 SOV_national_social_state_desc: "The economy must serve the people. This means ensuring that all Russians have access to basic needs like housing, food, and clothing, but it also involves creating a sense of care and involvement from the state. When citizens feel engaged in the nation's growth, it fosters a cycle of contribution that strengthens the economy. To achieve this, we will implement new policies focused on improving the lives of millions of Russian citizens."
 SOV_stratocratic_economy: "Militarist Agenda"
 SOV_stratocratic_economy_desc: "Without a strong military, Russia cannot have independence, freedom, or prosperity. To ensure the survival of our armed forces, our economic system must be built to support them. Every sector - production, exchange, distribution, and consumption - will prioritize the needs of the military, uniting society around a single goal: strengthening the armed forces and advancing Russia's cause." 
 SOV_expand_mic_industry: "Expand MIC Industry"
 SOV_expand_mic_industry_desc: "In line with our economic policies, we will further expand the existing military-industrial complex and research conglomerates, encouraging them to diversify their operations. As the military rapidly expands and modernizes, the demand for weapons will fuel growth in the defense industry. But we expect even more. The defense sector will play an increasingly crucial role in the broader economy, with its importance becoming even more apparent as tensions rise."
 SOV_to_banish_want: "To Banish Want"
 SOV_to_banish_want_desc: "Forget about luxuries like cash, smartphones, and Coca-Cola that weaken our resolve. When society fully embraces the atmosphere of war, and respect for the national flag becomes a shared belief, all unnecessary production and waste will be redirected. These efforts will become integral parts of our war machine. This shift will strengthen our readiness for large-scale conflicts, ensuring that our production lines and logistics - vital elements that could weaken us in wartime - are secure and well-supported."
 SOV_champion_the_workers: "Champion The Workers"
 SOV_champion_the_workers_desc: "In times of crisis, workers can become the most powerful force, posing a significant challenge to the stability of the authorities. Yet, when things are running smoothly, they can also become the regime's most devoted supporters, showing exceptional enthusiasm and dedication. We will revive our praise for the working class, ensuring they understand the rewards that come from dedicating themselves to the nation's noble cause. Workers will realize that they are not just tools for bureaucrats but can truly become the masters of the nation."
 SOV_rise_of_russian_giant: "Rise of Russian Giant"
 SOV_rise_of_russian_giant_desc: "Peter the Great once said that Russia's most important allies are its army and navy. Today, this idea needs slight revision - Russia's greatest allies are its military forces and factories. Without either, Russia's rise would be severely hindered. Thankfully, Russia has now forged an unbreakable bond between these two allies. Every workshop producing missile transporters is part of a fully integrated military-civilian industrial chain. Together, the defense and civilian sectors will drive both prosperity and security for Russian society."
 SOV_far_east_development: "Far East Development"
 SOV_far_east_development_desc: "Our land along the Pacific Ocean is rich in potential and strategically important, especially with its proximity to one of the world's largest economies - China. China has long shown interest in investing in the Far East, and we should seize this opportunity. Why not cooperate with them to develop the region into a thriving and prosperous hub on the West Pacific coast?"
 SOV_exploit_our_resources: "Utilize Our Resources"
 SOV_exploit_our_resources_desc: "Some have cynically called Russia a country "built on a gas station," pointing to the so-called "resource curse" that hampers technological progress and industrial growth. However, we believe the real challenge facing the Russian economy is not using its vast territory and abundant resources to their full potential. The infrastructure projects and industries we can develop around these resources will serve as a powerful foundation for Russia's long-term economic growth."
 SOV_militaristic_war_machine: "Awaken the War Machine"
 SOV_militaristic_war_machine_desc: "Machines roar, factories hum at full capacity. Tanks roll across the fields, warships glide down the slips, aircraft soar into the skies, and missiles are hoisted into their silos. Any nation contemplating hostility will think twice when they see the strength of our arsenal. Moreover, large-scale military investment and production no longer burden our economy; instead, they drive it forward. The war machine has become the engine powering Russia's rapid ascent."
 SOV_pressure_minsk: "Wrangle The Minsk Government"
 SOV_pressure_minsk_desc: "The Bat'ka is a true opportunist. He tried to take over Russia using the Union State agreement before Putin came along, and now he is doing everything to stall the integration of Belarus into Russia under the same agreement he signed. Maybe he will change his decision if we stop bankrolling his country."
 SOV_SOF_expansion: "SOF Standards for the Military"
 SOV_enshrine_soldier_benefits: "Enshrine Soldier Benefits"
 SOV_enshrine_soldier_benefits_desc: "Nothing can truly repay or honor the soldiers who dedicate their youth - the most precious years of their lives - or even their lives to the Russian motherland. Unfortunately, despite their sacrifices, past corrupt bureaucracies ignored their appeals and denied them their rightful benefits, sometimes out of neglect, other times for more self-serving reasons. Now, we are committed to seeking justice for these brave men and women and correcting the injustices of the past."
 SOV_SOF_expansion_desc: ""
 SOV_back_ruble_gold: "Gold Backed Ruble"
 SOV_back_ruble_gold_desc: "As our economic system stabilizes, market order is established, and resources are steadily accumulated, we are entering a new phase of growth. To further strengthen our economy, we will announce the restoration of the gold standard for the ruble - one of the most significant currency reforms since the Bretton Woods system. We will move away from the instability of the "petrodollar" and bring renewed confidence and new opportunities to the international market."
 SOV_merged_tankograds: "Merged Tankograds"
 SOV_merged_tankograds_desc: ""
 SOV_reform_correctional_instutitions: "Reform Correctional Instutitions"
 SOV_reform_correctional_instutitions_desc: ""
 SOV_prosperity_for_all: "Propserity For All"
 SOV_prosperity_for_all_desc: ""
 SOV_telecommunications_advancements: "Telecommunications Advancements"
 SOV_telecommunications_advancements_desc: ""
 SOV_push_towards_autarky: "Push Towards Autarky"
 SOV_push_towards_autarky_desc: "A self-sufficient economy does not mean cutting off all external connections. Any nation that aims to be strong must prioritize its economic sovereignty, and Russia is no exception. From now on, our valuable resources - oil, natural gas, timber, grain, and more - will primarily serve the needs of our people. State-owned enterprises managing these resources will ensure Russia achieves financial and technical independence in the shortest possible time."
 SOV_cut_down_the_red_tape: "Cut Down the Red Tape"
 SOV_cut_down_the_red_tape_desc: "Endless paperwork, constant meetings - this is the reality in Moscow, where it seems everyone believes they should control everything. Bureaucracy is a common challenge in any government; while it can help maintain order, it becomes a hindrance when it comes to economic issues. Time and efficiency are as crucial to economic development as water and air, and bureaucracy wastes both. By reducing unnecessary redundancy, we can create a healthier, more efficient economic system."
 SOV_ensure_full_employment: "Ensure Full Employment"
 SOV_ensure_full_employment_desc: "Stable employment not only provides a steady income but also offers a secure future, boosting hope and motivating individuals and families to work towards a better life. Full, stable employment leads to increased consumption, healthier money circulation, and a higher GDP. To achieve this, we will introduce reliable policies to create job opportunities at both the corporate and national levels. However, we must avoid the pitfalls of the past, where the planned economy fostered dependence rather than productivity."
 SOV_encourage_domestic_production_LPDR: "Encourage Domestic Production"
 SOV_encourage_domestic_production_LPDR_desc: "In the United States, companies like Microsoft, Apple, and McDonald's are household names; in China, brands like Huawei, Tencent, and Lao Gan Ma represent their economy. Yet in Russia, there are few brands of global renown, and many of those that do exist are outdated enterprises from the Soviet era, with few emerging brands to take their place. The previous government failed to address this issue, but we will solve it. One day, "Made in Russia" will be synonymous with quality and innovation."
 SOV_support_MIC: "Support the Millitary Industrial Complex" 
 SOV_support_MIC_desc: "" 
 SOV_prosperous_welfare: "Prosperous Welfare" 
 SOV_prosperous_welfare_desc: "We want our people not just to live stable lives but to live well. In the future, complaints about the lack of variety and poor quality of cheeses, vegetables, and coffees in supermarkets, the short lifespan of bicycles, and the discomfort of small cars will gradually fade away. The overall improvement in living standards will be a clear reflection of Russia's economic prosperity."
 SOV_populistic_economic_policies: "Populistic Economic Policies"
 SOV_populistic_economic_policies_desc: "Workers and individual entrepreneurs have taken to the streets, protesting low wages and demanding better support from the government. They express frustration over the lack of attention to their suggestions and the failure to hold companies and employers accountable for violations of labor laws and contracts. While some may view this as a sign of social instability, we see it as a demonstration of the people's genuine support for the government. It marks the beginning of a new phase in our economic development. We will increase investment in infrastructure and public welfare, and the people will have greater oversight over enterprises, ensuring that investments benefit truly public-serving projects."
 SOV_increase_education_funding: "Increase Naukograds' Funding"
 SOV_increase_education_funding_desc: "Russia has always been full of geniuses, yet it was hard for them to break through to the spotlight. One of the few good things the Soviets achieved was their education program, which made the Union not only the most reading country on the planet, but a country that could make a village peasant into a nuclear fusion theorist. We must replicate this success in order to improve our country's future."
 SOV_rare_earth_metals: "Develop Rare Earth Metal Extraction"
 SOV_rare_earth_metals_desc: ""
 SOV_fund_rebuilding_effort: "Fund Rebuilding Effort"
 SOV_fund_rebuilding_effort_desc: "" 
 SOV_rassvet_initiative: "'Rassvet' Initiative"
 SOV_rassvet_initiative_desc: ""
 SOV_expend_free_ez: "Free Economics Zones"

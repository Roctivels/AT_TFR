 SOV_ogas_desc: "\n\n\n\n£GFX_ogas_banner\n\n\n\n\n\nOGAS is a revolutionary system that made the dream of old cyberneticists come true in the new USSR. The grandiose project, which made it possible to unite the entire economy of our country into a single information network, is a symbol of our progress. Our dream has become a reality and we can move forward with confidence knowing that we have all the necessary tools to succeed. The people are happy, the budget is replenished, and automated communism seems more and more real."

 SOV_restore_ties_with_eurosocialists_category: "Window to Europe"
 SOV_restore_ties_with_eurosocialists_category_desc: "Despite the anti-communist propaganda that has been going on in Western countries for many years, leftist ideas are still quite popular among the population. We must use this and find allies in our struggle."
 SOV_second_NATO_war_category: "Second European War"
 SOV_second_NATO_war_category_desc: "[SOV.get_nato_war_status]\n\n\n§RPRIMARY TARGETS§!:\n\n§YBERLIN§! : [GLOBAL.get_berlin_status]\n§YPARIS§! :[GLOBAL.get_paris_status]\n§YROME§! : [GLOBAL.get_rome_status]\n§YLONDON§! : [GLOBAL.get_london_status]\n§YWARSAW§! : [GLOBAL.get_warsaw_status]\n§YKIEV§! : [GLOBAL.get_kiev_status]\n\n\n§RSECONDARY TARGETS§! :\n\n§YFRANKFURT§! : [GLOBAL.get_frankfurt_status]\n§YAMSTERDAM§! : [GLOBAL.get_amsterdam_status_sov]\n§YSTRASBOURG§! : [GLOBAL.get_strasbourg_status_sov]\n§YVENICE§! : [GLOBAL.get_venice_status_sov]\n§YPRAGUE§! : [GLOBAL.get_prague_status_sov]\n§YMILAN§! : [GLOBAL.get_milan_status_sov]\n\n[ENG.get_british_nuke_status]\n[FRA.get_french_nuke_status]"
 SOV_american_intervention_category: "American Civil War Intervention"
 SOV_american_intervention_category_desc: "The hunger for world hegemony of American Establishment has, finally, caused USA to collapse on itself. The amount of lawless gangs, dangerous terrorists, and madmen who are running wild in former US is deeply concerning and posses a threat to order of things, prolonged warfare will cause more worldwide instability and black market chaos.\nFortunately, there are a handful of true American patriots who seek to restore America, which wants to coexist peacefully with other countries and drops globalist claims to world domination."
 SOV_reform_russian_empire: "[SOV_reform_russian_empire_loc_dynamic]"
 SOV_reform_russian_empire_post_war_loc: "Russian Imperial Policy"
 SOV_reform_russian_empire_normal_loc: "Revival of The Greater Russia"
 SOV_reform_russian_empire_desc: "\n\n\n\n\n£GFX_SOV_russian_empire_banner\n\n\n\n\n\n\n\nFor 300 years existed the great Empire of Russia, opulent and strong, until godless bolsheviks came and brought it to ruin. Russian people, once standing among great nations - orthodoxic and pure, were casted down, abused, genocided, while many false nationalities artifically constructed by Leninst scum, taking away native Russian lands when communist experiment inevitably collapsed.\nZhirinovsky made his life goal to restore Russia's honor, and lead it towards her true destiny - once more Imperial and Great, to bring back Russians of all world into her wide arms, and protect from weakness and decadency.\n\n§Y"The first Rome fell because of heresies. The second Rome - fell because of the Council of Florence. The Third Rome - Moscow - stands forever. There will be no fourth Rome."§!\n"
 SOV_pragmatic_economy_category: "Pragmatic Economy"
 SOV_pragmatic_economy_category_desc: "LDPR's economic policies can be characterized as state-capitalism with responsible private sector. Some populistic welfare policies are also supported, such as: largely free healthcare, affordable education and state housing progams."
 SOV_pragmatic_economy_no_oligarchs_category_desc: "
 SOV_resource_excavation_category: "Resource Excavation"
 SOV_influence_west_category: "Economic Wars"
 SOV_influence_west_category_desc: "Gas is the best political and economic lever of pressure on Europe that Russia has. Europe has been repeating the sounding mantra for years about the need to reduce energy dependence on Russia and develop steps to do this, but so far no real changes have been noticed, and if supplies are interrupted now, then Europe will have a hard time.\n\n§YHouses and apartments cannot be warmed by political statements. The only way to warm them is with natural gas§!"
 SOV_Dugin_Directives_category: "Dugin's Directives"
 SOV_Dugin_Directives_category_desc: "\n\n\n\n\n£GFX_SOV_dugin_directives_banner\n\n\n\n\n\n\n\nDestruction of post-modernity in mindset of Russia won't be easy, no one understands this better then Dugin himself.\n\nOur policies and decrees will attempt to educate our people back to roots of Russian Spirit, and ancestory of Great Turan-Eurasia. To live life philosophically, striving to become Radical Subject - God among Men, Man among Gods.\n\nThis is actually boring, all i want is to burn schoolbooks, and stab cosmonauts\n\nFanaticism: £GFX_fanaticism §Y[?SOV_fanaticism_var|1%]§!\nEffect:  £attack_texticon [?SOV_fanaticism_dynamic_var|=+1%] £mil_factory [?SOV_fanaticism_dynamic_var|=+1%] £GFX_mobilisation_texticon [?SOV_fanaticism_dynamic_var|=+1%] £GFX_war_support_modifiericons_texticon [?SOV_fanaticism_dynamic_var|=+1%]\n\nFanaticism represents our people's willingness to fight and support of the nation."
 SOV_Supreme_Veche_category: "People's Veche"
 SOV_Supreme_Veche_category_desc: "§YPeople's Veche§! is the supreme political governing body of §Y[SOV.GetName]§!. Many patriotic, passionary forces now call this palace home - from Communists who accepted immortal ideal of Eurasianism, to national-bourgeoisie representatives. Similarly to Soviet Democracy, candidates are elected locally based on their promises and programs, however, Political Affairs Committee of Eurasia Party remains the sole hegemon in control of assigning deputies and ministers, as well as putting chairman of Veche."
 SOV_oligarchs_influence_category: "Oligarchs Influence"
 SOV_oligarchs_influence_category_desc: "The oligarchs have some influence in the West, so why don't we start using it? By supporting anti-European slogans and the position of the media against the "progressive LGBT+" with the money of the oligarchs, we could add fuel to the fire of an already unstable European structure.\n\n§Y"Such a separation from reality, from the demands of society, will inevitably lead to a surge of populism and the growth of radical trends, to serious social and economic changes, to degradation, and in the near future to a change of elites"§!"

 russia.98.a: "Our control is solidified"
 russia.99.t: "Mass Protests in Moscow"
 russia.99.d: "Sergey goes to bed, next morning he turns on his tv. The news is reporting on the violence in moscow..."
 russia.99.a: "Civilians entered the presidential palace"
 russia.99.b: "The military stormed the presidential palace"
 russia.100.t: "Moscow Spring"
 russia.100.d: "These past few days Moscow has been waiting in anticipation. Hundreds of thousands of protestors had gathered around Moscow to protest the government. What started as a small gathering has quickly evolved into a wide-spread protest, one that would put the 90s protests to shame. The opposition, ranging from pro-western liberals, dissatisfied civilians and NATO war veterans have been gathering without purpose to vent their frustrations at the state. Today, however, the crowds started marching.\nMultiple liberal telegram channels had ordered the like-minded individuals to take over the government buildings, and from that the others marched as well. The riot police and soldiers stood back as the masses occupied the streets, some even joining the protest. It seems even some of the apparatchiks have decided to cooperate with the protestors and started to coordinate the movement.\nAll the government could do was helplessly watch as they lost ground, already exhausted and disorganized from the huge crisis. By the evening, the crowds had gathered around the Duma and the Kremlin, and after a clash against the protestors, both buildings were occupied.\nAs the dust settles it seems a coalition of pro-western liberals and establishment turn-coats will form a new government. Multiple sources claim that Alexei Navalny will become the acting president, citing his massive support.\nWhatever the future holds, it seems that Russia is changing."
 russia.100.a: "Back to 1991?"
 russia.101.t: "Oligarch Requests Civilian Investment in [SOV_oligarchs_investment_state.GetName]"
 russia.101.d: "A senior Oligarch from [SOV_oligarchs_investment_state.GetName] has approached the government with an offer of support. His state suffers from critical under-investment, and a government-initiated economic stimulus program would certainly make him reconsider his stance on certain proposed government policies. The Oligarch sits on several important committees, and is quite famous for being able to cut deals, making his vote worth several more in Federal Assembly."
 russia.101.a: "A reasonable request"
 russia.101.b: "We cannot afford this at the moment"
 russia.103.t: "Oligarch Requests Military Investment in [SOV_oligarchs_investment_state.GetName]"
 russia.103.d: "Local Oligarchs from [SOV_oligarchs_investment_state.GetName] have approached the government, offering their support for the President in return for an informal guarantee that [SOV_oligarchs_investment_state.GetName] would be the site of a new munitions plant for the Army. They argue that building a plant in the area would create a lot of jobs and provide the Army with much needed support in an increasingly dangerous world. The Oligarchs also mentioned their excellent working relationship with several influential members of the Duma."
 russia.103.a: "A reasonable request"
 russia.103.b: "We cannot afford this at the moment"
 russia.104.t: "CSTO Article 389 Adopted"
 russia.104.d: "A new article has been adopted within the CSTO after the recent Vostok military trials. All nations must now pledge 5% of their GDP in order to sustain competant armed force capable of defending allies. The article goes on to further tie Russia's military with the nations within the CSTO with more frequent joint exercises and missions abroad."
 russia.104.a: "Our alliance grows stronger!"

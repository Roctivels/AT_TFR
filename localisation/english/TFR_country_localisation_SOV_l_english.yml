 SOV_consumer_heaven_desc: ""
 SOV_market_driven_incentives: "Market-Driven Incentives"
 SOV_market_driven_incentives_desc: ""
 SOV_betrayal_prevented: "Betrayal Prevented"
 SOV_betrayal_prevented_desc: "The crypto-communists have finally been ousted! Now, Russia can return to a more normal way of conducting affairs, free from the extreme views of Shevchenko and his destructive madness."
 SOV_coalition_government: "Coalition Government"
 SOV_coalition_government_desc: "Our government lacks strength due to the absence of many loyal statesmen, particularly those who could boost our popularity among right-leaning individuals and groups. To address this, we plan to establish a broad political organization aimed at bringing together loyal rightists under one banner."
 SOV_no_more_leftism: "No More Leftism"
 SOV_no_more_leftism_desc: "The most significant error of this 'Thaw' was allowing leftist ideas to permeate public spaces and regain national attention. No longer! We will restrict their activities by explicitly banning their movements and initiating substantial legal actions against left-wing activists."
 SOV_heal_the_society: "Heal the Society"
 SOV_heal_the_society_desc: "The leadership of RPSS has done significant harm to our national psyche. We must now reshape the mindset and beliefs of our people to restore a conservative and healthy political perspective, free from progressive influence and economic concerns."
 SOV_award_the_military: "Award the Military"
 SOV_award_the_military_desc: "The military played a crucial role by displacing the RPSS from power, utilizing all available resources. Therefore, we must again express our gratitude by raising salaries and awarding new medals to the most dedicated officers."
 SOV_sway_the_population: "Sway the Population"
 SOV_sway_the_population_desc: "Russian society still grapples with the lingering impact of socialism. To move beyond concerns such as elections and economic equality, we need to offer a more appealing alternative. Generous incentives for loyal workers and employees can play a role in this transformation."
 SOV_satisfy_the_masses: "Satisfy the Masses"
 SOV_satisfy_the_masses_desc: "Our people deserve a life of justice and dignity. They should have stable jobs, affordable food, good health, and even the occasional treat. We will strive to achieve this by offering various social benefits and securing their job positions through negotiations with businesses willing to cooperate with the state."
 SOV_nationalistic_show: "Nationalistic Show"
 SOV_nationalistic_show_desc: "The most powerful way to connect with people is through national pride. Our citizens deeply cherish their homeland, so we should harness this emotion. We'll organize patriotic events like rallies, concerts, and parades, and create new national holidays."
 SOV_cooperate_with_business: "Cooperate With Business"
 SOV_cooperate_with_business_desc: "The business community must stand out amidst the turbulent leftist landscape. They are the golden geese of Russia, tirelessly contributing to the nation's prosperity while also enriching themselves. While the populace remains enraged over social policies, we will forge alliances with the business sector. We hope that the prevailing consumerist mindset will eventually surpass the current discontent."
 SOV_enlightened_economics: "Enlightened Economics"
 SOV_enlightened_economics_desc: "The economy must serve those who can afford its benefits. Modernization, optimization, and re-privatization are the buzzwords in today's headlines. Once again, business and the state collaborate to build a brighter, more prosperous, and enlightened future for Russia."
 SOV_right_kind_of_democracy: "A Right Kind of Democracy"
 SOV_right_kind_of_democracy_desc: "The best election is one you already know the results of. No more surprises like the last time. Now, the electoral cycle is carefully monitored by authorities to ensure that undesirable candidates never even get a chance to run."
 SOV_social_economic_reformation: "Social Economic Reformation"
 SOV_social_economic_reformation_desc: "Our economy was designed to support militaristic industries and wealthy businessmen who profit from conflict. It's time to shift the focus back to those who rightfully hold a central place in our society-workers. We will embark on the socialization of the economy."
 SOV_improve_factory_conditions: "Improve Factory Conditions"
 SOV_improve_factory_conditions_desc: "Our workers endure unsafe and dangerous conditions in sprawling factories constructed by Zhirinovsky's government. To truly represent the working class, we must compel the directors and owners of these plants to enhance safety where possible and provide greater benefits for the most vulnerable employees."
 SOV_belarus_economic_plan: "Belarus Economic Plan"
 SOV_belarus_economic_plan_desc: "Belarus boasts a robust and diverse industrial sector with untapped potential. Having endured the devastation of war, the country urgently needs reconstruction. We will support and fund projects in these regions, aiming to provide employment opportunities for those affected by the conflict."
 SOV_develop_kazakh_lands: "Develop Kazakh Lands"
 SOV_develop_kazakh_lands_desc: "Kazakhstan is still developing and could benefit from more industrial and infrastructure projects. This would help attract more people to these regions, boosting population growth. Located deep within Russia, Kazakhstan is unlikely to be affected by any potential new conflicts."
 SOV_moderation_in_reforms: "Moderation In Reforms"
 SOV_moderation_in_reforms_desc: "While it's crucial not to lose sight of the goal of achieving equality, we must recognize that modern economics requires a delicate balance between private and public sectors. The state has a responsibility to maintain this equilibrium and be prepared to support the common people."
 SOV_gentle_hand_over_private_business: "Gentle Hand Over Private Business"
 SOV_gentle_hand_over_private_business_desc: "We must vigilantly oversee private enterprises, ready to intervene discreetly when we uncover misconduct, whether it involves employee mistreatment, tax evasion, or any other illicit practices that unscrupulous businessmen may resort to for profit."
 SOV_worker_protection_laws: "Worker Protection Laws"
 SOV_worker_protection_laws_desc: "Workers must be safeguarded at all costs. We will enact reforms that empower employees in industrial and other sectors to defend their rights through a new legal framework. Additionally, we will enhance their leisure time and offer various grants for their outstanding work."
 SOV_a_fair_economy: "A Fair Economy"
 SOV_a_fair_economy_desc: "We must prioritize the interests of all people, including workers, small businesses, and medium-sized enterprises. Big capital often seeks to evade responsibility and exploit others, but we cannot allow this to continue. We need to create an economy where every participant is treated fairly, without being taken advantage of by those with greater financial resources."
 SOV_worker_controlled_unions: "Worker-Controlled Unions"
 SOV_worker_controlled_unions_desc: "Trade unions are essential to the harmony between a thriving state and its working class. However, they often fall under the influence of capitalist interests or become mired in bureaucratic lethargy. This must change. New trade unions will be established, with membership actively encouraged. Unlike many others, these unions will have a direct line to the government."
 SOV_educate_the_nation: "Educate the Nation"
 SOV_educate_the_nation_desc: "Russia is a land of brilliant minds, many of whom often go unnoticed. The Zhirinovsky government overlooked students from small towns and regions, favoring those from wealthier and larger areas. The new education reform aims to restore the old system and bring young people from all over the country to prestigious universities, helping them shape a better future for Russia."
 SOV_crackdown_on_monopolistic_capital: "Crackdown on Monopolistic Capital"
 SOV_crackdown_on_monopolistic_capital_desc: "Large monopolistic corporations are a plague that affects not just individuals but also small businesses. They disrupt the fair and balanced nature of market relations by exercising control from the outside due to their vast holdings. Our anti-monopoly agency will address this issue. We will dismantle many of Zhirinovsky's beloved imperial corporations and, if necessary, expose corruption and hidden deals that protect their interests."
 SOV_truly_national_government: "A Truly National Government"
 SOV_truly_national_government_desc: "The people of Russia have made their choice - Roman Yuneman and his Society.Future will lead the country. They will lead Russia towards the ideal of national democracy through the methods of reform and modernization. There is a lot of work ahead, and it is necessary to start it as soon as possible. The new leadership of the country intends to change the relationship between society and the state, building transparent management methods and a strong civic culture. Attention will be paid to the reforms of the federal system and the development of the national army. Russia is entering an era of change - confidently, with dignity and with self-confidence."
 SOV_uphold_the_russian_world: "Uphold the Russian World"
 SOV_uphold_the_russian_world_desc: "The main value of Russia is its great, multifaceted people. And Russia must protect the interests of its people, regardless of where they are located - in the country or outside its borders. Russian Russians have been, are, and will continue to be the main guarantor of the security of the Russian world - all those who speak Russian, honor our culture, and share common values. Supporting compatriots abroad, protecting their rights and dignity, and strengthening national unity are all integral parts of national policy.In a world full of challenges and changes, Russia remains a pillar for all who feel part of it."
 SOV_russia_first: "Russia First"
 SOV_russia_first_desc: "Russia and its citizens are the main priority of our policy. It is here, inside our country, that the nation lives. The interests of Russia and the well-being of its population are above all external factors and abstract concepts.The state must take care, first of all, of those who live and work on its land, pay taxes, raise children, and build a future. Russia is not a blur of borders or a ghostly unity, but a strong, independent country with its own people, its own culture and its own destiny. Rossia - first of all"
 SOV_popularize_party_ideology: "Popularize National Democracy"
 SOV_popularize_party_ideology_desc: "The opinion of Russian citizens about its policy and course is indisputably important. It is the voice of the people that should be the decisive factor in setting priorities and choosing the direction of the country's development.\nUnder the auspices of the ideas of equality and freedom, we will strengthen the foundations of social harmony, fostering in people a sense of caring for the fate of their country. The ideas of national democracy will become the backbone of a new social order, where everyone will be heard and the value of the individual will be recognized. Civic responsibility is the way to the prosperity of the country."
 SOV_modernize_russian_armed_forces: "Modernize Russian Armed Forces"
 SOV_modernize_russian_armed_forces_desc: "Russian democracy needs reliable protection. And throughout history, the army has been the main guarantor of the security and stability of the state. Today, as the country moves along the path of change, the reform of the army should be as important as other transformations. The army must be timely, efficient, professional and respected - both inside and outside the country.New Russia has a new army capable of responding to any challenges with dignity and honor."
 SOV_strelkov_state: "Strelkov's State"
 SOV_strelkov_state_desc: ""
 SOV_all_russian_militia: "All-Russian Militia"
 SOV_all_russian_militia_desc: ""
 SOV_new_patriotic_army: "New Patriotic Army"
 SOV_new_patriotic_army_desc: ""
 SOV_rulebook_of_russian_officer: "Rulebook of Russian Officer"
 SOV_rulebook_of_russian_officer_desc: ""
 SOV_russify_kiev: "Russify Kiev"
 SOV_russify_kiev_desc: ""
 SOV_russian_national_pride: "Russian National Pride"
 SOV_russian_national_pride_desc: "What are our people proud of? Russian people are proud of their historical memory: the princes of antiquity, the "chicks of Petrov's nest", the commanders of the 19th century, and the heroes of the 20th century who defended the freedom of the Fatherland with blood are not forgotten. The Prussian people are proud of their land: vast and rich in everything they need for a happy life. We are proud of our culture, our science!\n\n We are proud that we are Russians!"
 SOV_the_moral_code_of_the_patriot: "Moral Code of The Patriot"
 SOV_the_moral_code_of_the_patriot_desc: "One of the main problems of our country is a rather apolitical population. Even despite all the efforts of both Putin's and Zhirinovsky's Russia, most of the population remains indifferent to our government.Everything starts small, so every student in our country from now on will be required to join the Unarmy and know by heart the carefully compiled "Patriot Code" - a set of rules and commandments by which the new generation of Russians will live. It will teach you how to love your Homeland, assemble a Kalashnikov assault rifle and other skills useful for future warriors, as well as how to love and be ready to give your life for the Leader."
 SOV_russian_national_red_army: "Russian National Red Army"
 SOV_russian_national_red_army_desc: "The modern Russian army is for the most part an apolitical structure that does not have any coloring and swears allegiance to the country, not to ideas. In the new reality, having such a poorly controlled structure is fraught with consequences.This is why the Armed Forces will be transformed into the National Red Army, the successor to both the Imperial and Soviet armies. Along with the renaming, "political work specialists", who are something like Soviet political officers, are introduced into the army structure. The army must protect the interests of the Russian working people!"
 SOV_the_leader_order: "The Leader's Order"
 SOV_the_leader_order_desc: "The history of Russia is full of strong personalities around whom the country has consolidated: Peter the Great, Catherine II, Joseph Stalin and Vladimir Putin are just the most striking of them. And now, when the threat of a second war is hanging over us, we must follow the orders of the Leader - as our ancestors did many centuries ago."
 SOV_together_to_greatness: "Together To Greatness"
 SOV_together_to_greatness_desc: "The history of Russia is the story of how each of its iterations, whether in the form of an Empire, Soviet power, or federation, tried its best to negate the previous one. Of course, with the coming to power of Vladimir Vladimirovich Putin, a course was taken towards reconciliation of Russian history, but he never completed the task. The further rule of Vladimir Volfovich only aggravated this problem.\n\nit is necessary to end the red-white confrontation once and for all, because it doesn't matter who you are for - for the reds or for the whites; The only important thing is that we are all Russians, and unnecessary quarrels only hinder our desire for a truly Great Russia."
 SOV_enshrine_slutsky_thought: "Enshrine Slutsky Thought"
 SOV_enshrine_slutsky_thought_desc: "Slutsky is a worthy follower of Zhirinovsky's ideas. He enriched the LDPR philosophy with new meanings and programs that develop the policy of the party's founder and make it understandable to ordinary citizens. It is important that Slutsky's software installations are accessible and understandable not only to party members, but also to everyone who shares his vision of Russia's future. Together, we will be able to realize the ambitious plans voiced by Vladimir Zhirinovsky and Leonid Slutsky and build the country they dreamed of." 
 SOV_militarist_vigor: "Militarist Vigor"
 SOV_militarist_vigor_desc: "" 
 SOV_eternal_regency: "Eternal Regency"
 SOV_eternal_regency_desc: ""
 SOV_idea_of_the_imeprial_republic: "Idea of the Imperial Republic"
 SOV_idea_of_the_imeprial_republic_desc: ""
 SOV_adobt_new_military_doctrine: "Adopt New Military Doctrine"
 SOV_adobt_new_military_doctrine_desc: ""
 SOV_compulsory_military_education: "Compulsory Military Education"
 SOV_compulsory_military_education_desc: ""
 SOV_new_loyal_okhranka: "New Loyal Okhranka"
 SOV_new_loyal_okhranka_desc: ""
 SOV_cult_of_russian_conquest: "Cult of Russian Conquest"
 SOV_cult_of_russian_conquest_desc: "The history of Russia is rich in glorious battle pages: from Suvorov to Zhukov, the honor and glory of the Russian army march through the centuries. And now we have talented military leaders who have victoriously defeated the Russophobic Europeans. We must promote the glory of Russian weapons, our continuity to the old victories. The exploits of the heroes of the past will become an example for the fighters of the present and the future!"
 SOV_deepen_the_reforms: "Deepen the Reforms"
 SOV_deepen_the_reforms_desc: "For Russia to move forward confidently, it needs to change in a timely manner. History shows that the strength of a country has always been born in moments of renewal - when society, government, and culture found the courage to change. Just as Peter the Great opened new horizons for Russia, today we are also starting a new chapter through thoughtful and profound transformations in politics and economics. Russia will move forward, refreshed and ready for the future." 
 SOV_devolve_the_ministries: "Devolve the Ministries"
 SOV_devolve_the_ministries_desc: "For further development and progress, the state needs a deep modernization of not only institutions, but also principles of governance. One of the key steps on this path is the revision of the bureaucratic system. When management becomes overgrown with excessive formality, truly important initiatives are lost under the weight of paperwork, efficiency decreases, and the initiative for change is extinguished. This slows down progress and prevents Russia from reaching its potential. In order for Russia to move forward confidently, it is necessary to make the system flexible and result-oriented. It's time to act openly and without delay."
 SOV_encourage_local_democracy: "Encourage Local Democracy"
 SOV_encourage_local_democracy_desc: "Who said that democracy should exist only at the national level? True democracy begins with everyday life - from the street, the neighborhood, the city. Strengthening people's participation in local affairs is an important step towards a fair future. This not only creates protection from the arbitrariness of local officials, but also creates a sense of personal importance for everyone. People should see that their opinion is not ignored, and their participation is not a formality. Democracy is not a once-in-a-few-years event, but a constant dialogue. Every vote counts. Every voice must be heard." 
 SOV_protecting_russia_from_extremism: "Protecting Russia From Extremism"
 SOV_protecting_russia_from_extremism_desc: "Sometimes, in order to protect citizens and preserve the state structure, it is necessary to restrict individual freedoms. This is not at all a rejection of democracy and does not detract from the importance of the opinion of the people - on the contrary, it is precisely for the sake of the security of society and its stable development that such measures are being taken. Freedom cannot serve as a cover for destruction. True democracy is not chaos, but order, where everyone has the right to vote, but the general rules are respected by all."
 SOV_shining_beacon: "The Shining Beacon"
 SOV_shining_beacon_desc: "Throughout its history, Russia has been one of the key centers of European and world civilization - a cultural, spiritual and political landmark. She has always retained the ability to remain a pillar of support in times of change and upheaval, finding the strength to move forward and help others. Today, in the light of new challenges, it is Russia that can once again become the benchmark that nations will follow, striving to preserve sovereignty and protect their future. Russia will carry this light of hope, perseverance and faith into tomorrow. The very light that is especially needed when the world is facing difficult challenges."
 SOV_russian_civilization_renewed: "Russian Civilization Renewed"
 SOV_russian_civilization_renewed_desc: "The moment we've been working towards for so long has arrived. Russia has risen in all its greatness, gaining strength it did not have before. Today's Russian society clearly demonstrates how the principles of national democracy can work truly effectively. This is a new type of social structure based on respect for traditions and a clear vision for the future. The rebirth of Russia is a revolution in the name of conforming to the spirit of the times and building a new civilization."
 SOV_the_guiding_star: "The Guiding Star"
 SOV_the_guiding_star_desc: "Russia is once again rising from its knees in its history, and all thanks to the sensitive leadership of Dmitry Olegovich. Our Great Leader Rogozin strengthens and develops the successes of Putin and Zhirinovsky, faithfully follows their precepts.\nThese jobs are studied at school, universities, and workplaces. Of course, Dmitry Rogozin's teachings will be the foundation of the Russian state for years to come!"
 SOV_iron_fist_of_the_state: "Iron First of the State"
 SOV_iron_fist_of_the_state_desc: "Now is not the time for various cat-and-mouse games with subversive elements. The old system of competing law enforcement agencies with similar powers has become hopelessly frosted and has only made us weaker.\n\nThe final solution to this problem would be logical: centralization. The People's Security Committee will combine the functions of the border service, the Ministry of Internal Affairs and state security with almost unlimited powers. There can be no question of any mercy for the enemies of the Russian working people!"
 SOV_subversive_action: "Subversive Action"
 SOV_subversive_action_desc: "We don't have to arrest all our opponents. Moreover, this tactic may pay off in the long run, as happened with the purges of the 37th-38th years.\n\n Less effective now, but more desirable later, the solution to the problem of various "democrats" may be to work with the population. Every TV and speaker will provide the correct information, and nothing else. We will knock the ground out from under the feet of the enemies of our government.\n\n For the most zealous, we have our power structures."
 SOV_favor_the_russian_proletariat: "Favor the Russian Proletariat"
 SOV_favor_the_russian_proletariat_desc: "Modern Russia is a country where manual labor is completely out of favor. Due to the influence of the West, children dream of becoming not engineers and doctors, but businessmen and other purely capitalist elements. And because of what happened?Thanks to the actions of Yeltsin's criminal government and his plundering of the country, called "privatization," Russia drowned in the thirst for easy money. And besides, cheap labor from Central Asian countries has finally finished off the Russian proletariat.We will correct this situation: improved social security, increased salaries and other benefits will make the prestige of working professions prohibitive!"
 SOV_reawaken_consciousness: "Reawaken Consciousness"
 SOV_reawaken_consciousness_desc: "What is the connection between a turner from Novokuznetsk and an office plankton from Moscow, a cashier from Vladivostok and a teacher from Minsk? Russian Russians and Russian culture are all united by their belonging to the Russian people. Throughout history, Russia has been strengthened under pressure: the Mongol yoke, the Troubles, the War of 1812, the Great Patriotic War - our fatherland rose with one accord to fight the invaders. Europe is preparing for revenge, and our people only need a small push from above to rouse them to the fight!"

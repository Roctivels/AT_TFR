 SOV_kleptocratic_state: "Kleptocratic State"
 SOV_kleptocratic_state_desc: "The privatization of the former Soviet economy could not come quick enough for Boris Yeltsin, so once the Union fell, he pursued 'shock therapy' - removing regulations and selling off entire industries practically overnight. Corrupt officials, party apparatchiks, and other less-than-ethical entrepreneurs bought former state-run companies for kopeks on the ruble, meaning that economic power stayed in the hands of a few friends of the government. They kept their power by cultivating relationships and cutting backroom deals with the Yeltsin administration, and they were the target of widespread furor after the 1998 national economic crisis. Although Putin prosecuted several of these so-called oligarchs for corruption after coming to office, he has shown little interest in upending the system, and many of them have solidified their hold on Russia's economy even further."
 SOV_heavy_sanctions: "Western Sanctions"
 SOV_heavy_sanctions_desc: "Our ambitions over Europe are our number one priority, and our dream of multipolar world can easily be realized if it weren't for the pushback from the globalist west.\n\nIt all started with Yeltsin's coup and the collapse of the Soviet Union under its own ineffective system. The West saw this and began to crave up our motherland's butchered corpse, while their fake promises and their empty words made it look like "a step closer to peaceful coexsistence between the two states".\n\nUnfortunately for us, Yeltsin fell for their trap, and slowly drew Russia closer to its doom, while the East slowly succumbed under the West's pressure. When Putin came to power and cut all ties with the Western powers, the damage was already done. Nearly all of Eastern Europe joined NATO, including the Baltics, which were once rightful Russian land. We tried our best to combat the rise of Globalist influence, from the mountainous regions of Georgia to the urban regions of Lugansk and Donetsk, and from the Baltic sea to the Kazakh steppes. It seemed to work at first; the western dogs realized they cannot combat our return to the world stage, but soon they resorted to economic sanctions, trade embargoes, and political pressure. Our economy, while it did take several hits, is still going strong, however, if the embargoes continue, then our dream may never be realized, our economy will inevitably fall, and we will be forced to cave into globalist demands! Of course only a major event might prevent this from occurring. Well, it better occur, for our people want an end to the West's imperialist ambitions, and Russian glory to be restored once more!"

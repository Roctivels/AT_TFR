 RULE_OPTION_LOGIC_ORDER: "Order"
 RULE_OPTION_LOGIC_ORDER_AI_DESC: "Once the democratic or authoritarian group is selected, the specific ideology chosen will likely be inline with the current ruling party."
 RULE_OPTION_LOGIC_DISORDER: "Disorder"
 RULE_OPTION_LOGIC_DISORDER_AI_DESC: "The current ruling party will not skew AI decision making in favor of the same ideology."
 RULE_OPTION_DEMOCRATIC_REFORM: "Democratic Reform"
 RULE_OPTION_DEMOCRATIC_REFORM_AI_DESC: "Continue with democracy but shake up the political norms. New and previously fringe democratic ideologies will come to the fore."
 RULE_OPTION_DEMOCRATIZATION: "Democratization"
 RULE_OPTION_DEMOCRATIZATION_AI_DESC: "Force this nation to adopt democratic values and move away from authoritarianism and autocracy. Democracy is non-negotiable."
 RULE_OPTION_BELLIGERENT_DEMOCRACY: "Belligerent Democracy"
 RULE_OPTION_BELLIGERENT_DEMOCRACY_AI_DESC: "This country will remain democratic, but also seek to assert military dominance within their region."
 RULE_OPTION_EUROPEAN_UNION: "European Union"
 RULE_OPTION_EUROPEAN_UNION_AI_DESC: "This country will go down the path to establish the European Union as a sovereign state."
 RULE_OPTION_EUROPEAN_COOPERATION: "European Cooperation"
 RULE_OPTION_EUROPEAN_COOPERATION_AI_DESC: "Maintain the status quo of the European Union. Strengthening the organization without creating a super-state."
 RULE_OPTION_FASCIST_AI_DESC: "With totalitarianism and harsh economic controls, send this nation down the unbeaten track of neo-fascism."
 RULE_OPTION_NATIONALIST: "Nationalist"
 RULE_OPTION_NATIONALIST_AI_DESC: "Skew the political path down chauvinism and, quite often, identitarianism. You'll make a jingo out of all of us."
 RULE_OPTION_MONARCHIST: "Monarchist"
 RULE_OPTION_MONARCHIST_AI_DESC: "Disempowering the royal family was a mistake. The old ways were the right ways and we must first go back to go forward."
 RULE_OPTION_COMMUNIST_AI_DESC: "The wealthy and powerful cannot be trusted to care for the masses. Wrest control of the economy, seize the means of production, and attempt to pave the road for global revolution."
 RULE_OPTION_CHINA_DREAM: "China Dream"
 RULE_OPTION_CHINA_DREAM_AI_DESC: "China will assert military dominance in their home region and subjugate nearby nations in an attempt to become a new superpower."
 RULE_OPTION_SOV_USSR: "USSR"
 RULE_OPTION_SOV_USSR_AI_DESC: "We must re-establish the great Soviet Union!"

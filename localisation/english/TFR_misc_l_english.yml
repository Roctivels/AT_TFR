 RULE_OPTION_FIVE_PERCENT: "5%"
 RULE_OPTION_FIVE_PERCENT_AI_DESC: "Five percent of countries with the generic focus tree will change their ideology from democratic to authoritarian and vice versa. If historical AI focus is enabled, this setting will become 0%."
 RULE_OPTION_TEN_PERCENT: "10%"
 RULE_OPTION_TEN_PERCENT_AI_DESC: "Ten percent of countries with the generic focus tree will change their ideology from democratic to authoritarian and vice versa."
 RULE_OPTION_TWENTY_PERCENT: "20%"
 RULE_OPTION_TWENTY_PERCENT_AI_DESC: "Twenty percent of countries with the generic focus tree will change their ideology from democratic to authoritarian and vice versa."

 canada.10.b: "Liberals"
 canada.11.t.1: "Conservatives Oust Trudeau in Snap Election"
 canada.11.t.2: "Conservatives Win in Canada"
 canada.11.d: "The Conservative Party of Canada has emerged victorious in a snap federal election, bringing an end to the long-standing Trudeau era after the political fallout from the civil war that erupted in the States.\n\nThe Liberals, who called the election hoping to secure a renewed mandate amid a more stable U.S., was instead dealt a resounding defeat as their handling of the crisis left the nation deeply divided. In the aftermath of the ill-fated attempt at shielding Canada from the spillovers of civil war abroad, public dissatisfaction with the Liberal government reached a boiling point. Many Canadians viewed the \"intervention\" as an unnecessary entanglement in foreign affairs - one that coincided with the surge in refugee intake.\n\nVoters turned to the Conservative Party, led by populist pitchman Pierre Poilievre, who campaigned on promises of restoring stability, accountability, and putting an end to what he framed as reckless foreign policies. The Tories secured a clear majority in Parliament - finally closing the curtain on nearly a decade of Liberal rule marred by unpopularity."
 canada.11.a: "Good riddance!"
 canada.12.t: "Liberals Cling to Power in Canada"
 canada.12.d.1: "Justin Trudeau and the Liberal Party of Canada have narrowly won a snap federal election, clinging to power despite widespread unpopularity and mounting controversies. Once hailed as a progressive leader, Trudeau's tenure has been marred by economic struggles, incompetence, and a growing perception of authoritarianism following his invocation of the Emergencies Act.\n\nOriginally justified as a necessary step to restore public order and national security during unprecedented times, the decision has instead become a lightning rod for criticism from the right and the left. Many Canadians see it as a dangerous overreach of executive power, one that has permanently tainted Trudeau's legacy and eroded trust in his leadership and his party.\n\nDespite these setbacks, Trudeau scraped by with a slim victory - less of a triumph than a temporary ceasefire in a country weary of division. Rather than signaling renewed confidence, the results present a very fragile landscape held together by little more than habit and hesitation. As Trudeau steps into his fourth term, growing questions loom over how long the prime minister can hold on before it all comes crashing down."
 canada.12.d.2: "In a stunning comeback, the Liberal Party of Canada has secured a decisive victory in the snap federal election - this time under a new party leadership. With Prime Minister Justin Trudeau stepping down earlier this month, former Bank of Canada Governor and global finance figure Mark Carney took the helm, promising a clean break from the controversies of the past and a steady hand for the future.\n\nCarney's campaign struck a chord with a nation fatigued by political division and international uncertainty. His technocratic background and polished competence helped the Liberals rebuild their tainted image and win over key demographics disillusioned by Trudeau's final years in office and by the growing influx of migrants and refugees.\n\nWith renewed public trust, a commanding majority in the Parliament and a favorable administration in the States, Carney now faces the challenge of firmly keeping his promise and the trust of the people. For the first time in years, Canada's political center has found its footing. Whether it prevails, only time will tell."
 canada.12.a: "Still holding on!"
 canada.13.t: "Fascism Rising"
 canada.13.desc: "As the conditions of stability around the world continue to deteriorate under the pressures of the pandemic, the economic collapse, and numerous other crises, many Canadians are turning to extreme ideas. Inspired by Canadian fascist ideologues from the previous century such as Adrien Arcand and John Ross Taylor, as well as the waves of new far-right ideas emanating from our southern neighbor, fascist parties and political organizations have seen record numbers of new recruits.\n\nQuebecois groups such as Atalante and the mostly anglophone IDCanada have seen an uptick in their mobilisations, and the Canadian branches of American-based organizations such the Atomwaffen Division and the Proud Boys have also seen rapid growth. In order to prevent threats to Canada's national security, the RCMP and all other levers of state security must be used in order to combat the influence of these organizations."
 canada.13.a: "We Must Stand Against Tyranny"

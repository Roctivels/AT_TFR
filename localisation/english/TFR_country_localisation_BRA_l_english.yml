 #Leaders
 BRA_HENRIQUE_MEIRELLES_DESC: "Henrique Meirelles: Head of the Brazilian Central Bank under Lula da Silva and Finance Minister under Michel Temer, Henrique Meirelles has a storied history as a prominent technocrat. His reputation as a pragmatic economist and his ties to the financial sector make him an ideal candidate for a return to stability and growth, and he is backed by Wall Street financiers, as well as the IMF and WEF alike.\n\nHis platform promises a new wave of economic liberalism and deregulation, while also bringing back some semblance of certainty and stability for both the financial ruling class and the broader public after the chaos of Lulismo and Bolsonarismo. He is keenly aware, however, of the deep-rooted economic and social problems that have plagued Brazil for decades, and seeks to address these issues with a mix of austerity and pro-growth measures. While he is seen as an apolitical technocrat, his policies, in practice, would serve the interests of the Cognoscenti, his patrons from Wall Street, and the global financial elite. With him at the helm of Brazil's economy, the country is anticipated to become a stable, predictable investment landscape once more.\n\nHe is also aware of the challenges posed by Brazil's vast wealth disparities and is prepared to implement a range of social programs to mitigate public unrest and restore faith in institutions, all the while continuing to promote the interests of global finance capital.\n\nRegardless of the dubious circumstances of his election, many are willing to set aside their doubts for something resembling a return to sanity and stability, while others are more cynical. To them, he is simply the latest in a line of elites, more beholden to Washington and Wall Street than to Brazil itself."

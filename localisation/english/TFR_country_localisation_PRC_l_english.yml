 PRCref_description_tt: "Liberalizing a state with over 5,000 years of authoritarian rule will not be an easy task. Throughout history, China has been a centralized, heirarchal state with little conception of liberal concepts such as \"privacy\", \"individual rights\" or \"checks and balances\". Thus, changing China's antiquated political bureaucracy into a modern democratic one will be immensely challenging. Not only will it require the support of the party, but it will also require the curtailment of political and economic stability that comes with liberalization.\n\nOur current £GFX_approval_rating_texticon §YApproval Rating§! is §Y[?PRC_approval_rating_var|1%]§!(£stability_texticon [?PRC_approval_rating_dynamic_var|=+1%] £political_power_texticon [?PRC_approval_rating_dynamic_var|=+1%])"

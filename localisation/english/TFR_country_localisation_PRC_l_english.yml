 PRC_sino_japanese_space_race_dynamic_desc: "spaceship go vwooosh"
 PRC_pla_dynamic: "People's Liberation Army"
 PRC_pla_dynamic_desc: "\n\n\n\n£GFX_PRC_pla_dynamic_banner\n\n\n\n\n\nSince the Nanchang Uprising in 1927, the People's Liberation Army, particularly its ground forces, has long been a reliable force for both the Party and the people. The modernization of the PLA, initiated by Xi in 2016, has endowed it with the capability to fight and win in modern battlefield environments. The PLA has evolved from a purely homeland defense force into a formidable military power capable of deployment across Northeast Asia and throughout the Pacific. In the future, there may be more opportunities to demonstrate this enhanced capability."
 PRC_pla_idea: "People's Liberation Army"

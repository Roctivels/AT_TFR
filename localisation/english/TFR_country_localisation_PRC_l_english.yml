l_english:
 #Focuses
 PRC_lockdown_wuhan: "Lockdown Wuhan"
 PRC_lockdown_wuhan_desc: "As panic spreads, the situation is getting out of control. Since CCTV reported the discovery of a "new type of infectious coronavirus", there have been signs of mass outflows of people from all over Hubei Province, mainly from the city of Wuhan. Citizens are scrambling to get out of the city, highways are overcrowded, bringing traffic to complete standstill. If we sit back and do nothing, then within a few days, more cases of infection will be found in hospitals all over the country. We must make a decision as soon as possible, and decree a total lockdown of Wuhan right now."
 PRC_nationwide_lockdown: "Nationwide Lockdown"
 PRC_nationwide_lockdown_desc: "This will be unprecedented in public health history - in order to contain the outbreak as quickly as possible, the entire country will enter a "quasi wartime system", with strict restrictions on travel and transportation to contain the spread of the virus. Citizens infected with the coronavirus will be isolated and treated in hospitals and temporary medical stations. At the same time, medical scientists and biologists throughout the country are mobilized to find the ultimate solution to defeat the virus."
 PRC_implement_emergency_measures: "Implement Emergency Measures"
 PRC_implement_emergency_measures_desc: "In this time of national crisis, when all the people should be in solidarity with each other, a number of immoral anti-Party activists and opportunists have not surprisingly taken advantage of the situation, spreading rumors to defame the Party and the Government while also disrupting our efforts to control the situation in various parts of the country. These people will not be tolerated, and the police will be mobilized immediately to crack down on unscrupulous traders who are hoarding and selling medicines and masks at exorbitant prices. There will also be stricter Internet control to prevent people from being misinformed."
 PRC_implement_widespread_testing: "Implement Widespread Testing"
 PRC_implement_widespread_testing_desc: "Nucleic acid test is not only low-cost and convenient to promote, but also helps us to diagnose whether a person is infected with the coronavirus more efficiently, which plays a crucial role in the timely treatment of patients, the surveillance and control of pandemic, and the restoration of the economy and normal life. We will promote the nucleic acid test program throughout the country and build several testing sites in major cities. First, government staff, and in the future, all citizens and even the entire population will be required to take the test."
 PRC_economic_stability_policy: "Economic Stability Policy"
 PRC_economic_stability_policy_desc: "The COVID-19 pandemic has had a significant impact on the normal economic order and productive activities in our country, and has seriously retarded our economic growth - in a sense, the coronavirus may prevent us from accomplishing our goal of building a modern socialist powerhouse by the middle of this century. Now that the COVID-19 pandemic has become a global pandemic and our country's outbreak has been initially and effectively restrained, it is time to get the nation back on the economic construction. We will also take this opportunity to further consolidate our position as the "World Factory"."
 PRC_zero_covid_policy: "Zero Covid Policy"
 PRC_zero_covid_policy_desc: "Failure to protect people's lives from the threat of the COVID-19 would lead to serious questions about the legitimacy of the party and the Government. Moreover, the strict measures we took in the early stages of the spread of the COVID-19 proved to be quite effective. Anyone who wants China to return to normalcy by relaxing restrictive policies is either failing to recognize the horror of the virus or has ulterior motives. We will continue to implement the zero covid policy, as the General Secretary said: "People first, life first"."
 PRC_adopt_the_swedish_model: "Adopt the Swedish Model"
 PRC_adopt_the_swedish_model_desc: "As the first country in the world to make an official announcement on the end of the pandemic, Swedish government response to the COVID-19 has also attracted the attention of various Governments. Some of our health officials and medical scientists have also suggested that we can learn from the advanced experience of the Swedes, including the relaxation of restrictions on the entry and exit of people in public places, the cessation of public statistics on the number of confirmed cases, and the exemption of non-medical staff or non-high-risk groups from the mandatory nucleic acid test, and so on. When the transmissibility and virulence of the virus weaken in the future, this will help our country return to normalcy more quickly."
 PRC_kickstart_vaccine_research: "Kickstart Vaccine Research"
 PRC_kickstart_vaccine_research_desc: "We will issue an order as soon as possible requiring biological research institutes and pharmaceutical companies throughout the country to immediately begin research and testing of new COVID-19 vaccine, not only for the purpose of controlling the pandemic more quickly, but also as an important means of enhancing our country's international prestige and expanding our influence. At present, a variety of inactivated vaccines, including the one developed by Sinovac Biotech, are undergoing clinical trials in our country. At the same time, we have also sent statements to the WHO and other developing countries, expressing our willingness to make vaccine donations and provide scientific research assistance."
 PRC_adopt_strict_lockdown_measures: "Adopt Strict Lockdown Measures"
 PRC_adopt_strict_lockdown_measures_desc: "Despite being prepared, the contagiousness of the coronavirus is still beyond our imagination. We can only further strengthen our surveillance measures and dedicate more resources to minimizing the movement of people within the city, between urban and rural areas, and across borders. Some have accused us of "forcibly shutting down the entire country", but the lockdown policy will prove to be necessary in order to fight the pandemic."
 PRC_focus_on_vaccine_development: "Focus on Vaccine Development"
 PRC_focus_on_vaccine_development_desc: "Only by developing reliable vaccines can we truly control the spread of coronavirus from the source. At present, the research and development of vaccines by biopharmaceutical companies, led by the Sinovac Biotech, have already achieved decisive results. We must properly utilize the funds and resources at our disposal to further support the efforts of enterprises in developing vaccines and quickly put the results into use, ensuring that the populace can eventually become immune to the virus."
 PRC_focus_on_mask_production: "Focus on Mask Production"
 PRC_focus_on_mask_production_desc: "Medical masks are not only economical, but can also be mass-produced and transported very easily throughout the country. Adequate supply of masks is also one of the important reasons that we are able to stabilize the pandemic. The State Council will further invest in expanding the production of medical masks, especially providing technical support and subsidies to mask manufacturers in areas where the pandemic is severe."
 PRC_food_safety_reforms: "Food Safety Reforms"
 PRC_food_safety_reforms_desc: "Considering that the unfortunate COVID-19 pandemic was triggered by the consumption of game meat by "Patient Zero", it is time for a radical reform of our food safety and catering hygiene system. Not only will we introduce legislation to eradicate the habit of eating game meat, but we will also promote more hygienic table manners to minimize the spread of viruses in public places. In addition, we will further invest in the production of industrially processed and fast foods to make them healthier and safer."
 PRC_surveillance_state_contact_tracing: "Surveillance State Contact Tracing"
 PRC_surveillance_state_contact_tracing_desc: "We began using the "health code" tracking application after the outbreak of the pandemic, to serve as an individual's e-passport and a reliable proof of personal health status, as well as an indication of the user's personal risk level of the COVID-19. Only when the government has full control over the real-time tracking of high-risk populations will it be possible to formulate policies more efficiently, while ensuring that critical national security information and personal information about its citizens will not be compromised."
 PRC_outsource_contact_tracing: "Outsource Contact Tracing"
 PRC_outsource_contact_tracing_desc: "We began using the "health code" tracking application after the outbreak of the pandemic, to serve as an individual's e-passport and a reliable proof of personal health status, as well as an indication of the user's personal risk level of the COVID-19. In order to reduce the administrative pressure and cost of the Government, we may choose to hand over the operation of the Health Code to trustworthy private internet companies, allowing them to share the burden together."
 PRC_fund_crowd_immunity_studies: "Fund Crowd Immunity Studies"
 PRC_fund_crowd_immunity_studies_desc: "National immunity to the COVID-19 has increased significantly as vaccination rates continue to rise. One of the key rationales for the theory of community immunity is that when a higher percentage of the population is immunized, it is easier to break the chain of infection that spreads from one individual to another, and the effects of a national pandemic can be gradually eliminated. We will begin to instruct our medical scientists and major media outlets in the theoretical preparations and propaganda work before the implementation of the community immunity policy, laying the groundwork for a shift of policy."
 PRC_blame_the_americans: "Blame the Americans"
 PRC_blame_the_americans_desc: "We must find a scapegoat for the failures and chaos that occurred in the prevention of the pandemic. Speaking of which, could there be a better target for blame than the United States? Long-standing nationalist anti-American propaganda and the fear of American power will make it very easy for the majority to believe in all kinds of conspiracy. Through the spokesman of the Ministry of Foreign Affairs, we will put the blame on the Americans for the biological experiments in Fort Detrick as the culprits of the COVID-19 pandemic, as well as on the American military delegation that brought the virus to Wuhan."
 PRC_blame_local_officials: "Blame Local Officials"
 PRC_blame_local_officials_desc: "We must find a scapegoat for the failures and chaos that occurred in the prevention of the pandemic.We can capitalize on the people's hatred of corrupt bureaucrats and lazy cadres by launching a new anti-corruption campaign. The CCDI will conduct an all-encompassing review of the work and documents of all levels of governments over the past few years, focusing on local cadres who are not proactive in implementing central authority policies and who have inappropriate relationships with pharmaceutical companies. We can also take this opportunity to install more cronies in the administration."
 PRC_expand_the_social_safety_net: "Expand the Social Safety Net"
 PRC_expand_the_social_safety_net_desc: "The COVID-19 has taught us a meaningful lesson. Across the country, the virus has claimed the lives of a great number of people, who are also poor and socially disconnected, especially the elderly. Whether in the countryside or in the cities, the situation is similar, which deeply reveals the shortcomings of our social safety net system. If we want to achieve the goal of common prosperity set by the Party, we must formulate better social safety policies and provide more timely assistance to those in need."
 PRC_return_to_normalcy: "Return to Normalcy"
 PRC_return_to_normalcy_desc: "After years of hard work, today we are finally able to announce to the entire nation and the world that China has come out of the COVID-19 pandemic and officially returned to normalcy. This is not only a victory for the Communist Party of China and the People's Republic of China, but also a great victory achieved by 1.4 billion Chinese people!"
 PRC_control_the_oil_crisis: "Control the Oil Crisis"
 PRC_control_the_oil_crisis_desc: "The unexpected oil crisis has devastated our economy. The stock market plummeted within a week, the panic in the market exceeded even the worst estimates, many businesses were forced to declare their bankruptcy, and foreign investors were began to consider withdrawing. Our proudly powerful transportation system has come to a standstill due to the lack of essential energy. The party has ordered an immediate start to fixing the economy, but where to start remains a mess."
 PRC_crack_down_on_left_radicals: "Crack Down on Left Radicals"
 PRC_crack_down_on_left_radicals_desc: "Unsurprisingly, there is a strong opposition that has taken advantage of the economic crisis to put pressure on the party leadership to implement reforms and hand over power. The radical left, which has long opposed the reform and opening up, including retired senior cadres, academics and young people disgruntled by the economic recession, has raised their voices to demand the restoration of the socialist equality of the Maoist era and condemned the revisionist policies of the current government. They must be suppressed with an iron fist!"
 PRC_crack_down_on_reformist_protesters: "Crack Down on Reformist Protestors"
 PRC_crack_down_on_reformist_protesters_desc: "Unsurprisingly, there is a strong opposition that has taken advantage of the economic crisis to put pressure on the party leadership to implement reforms and hand over power. Many capitalists openly claimed that the authorities' excessive intervention in the market and their campaign against private enterprise were the main causes of the economic collapse. Not only that, but the reformist factions of the party and the young public intellectuals sang their praises. We need to get them to learn to keep their mouths shut."
 PRC_empower_the_50_cent_army: "Empower the 50 Cent Army"
 PRC_empower_the_50_cent_army_desc: "The popular nickname for commentators who often post pro-Party and pro-government messages on the Internet has become a household name - "50 Cent army" - implying that they sing the praises of the authorities for petty gains. Nonetheless, they continue to play an important role in guiding our online discourse. Whenever we face a public opinion crisis, this tactic is always effective, this time is no different."
 PRC_concessions_to_corporate_demands: "Concessions to Corporate Demands"
 PRC_concessions_to_corporate_demands_desc: "The Party's governing capacity is undergoing a serious test. If corporate dissatisfaction continues to grow, it will be difficult to ensure the development of the economy. We will, therefore, give due concessions to the demands of the corporate by introducing business-friendly policies, including tax cuts and debt relief, as well as by stopping the denigration of entrepreneurs on the Internet. After all, China cannot become a superpower without the GDP created by its enterprises."
 PRC_concessions_to_populist_demands: "Concessions to Populist Demands"
 PRC_concessions_to_populist_demands_desc: "The Party's governing capacity is undergoing a serious test. If the people's dissatisfaction continues to grow, it will be difficult to ensure the stability of the country. We will, therefore, give due concessions to the demands of the people and allow them to organize some protests and demonstrations to express their dissatisfaction. After all, the nationalist and populist slogans they raise are of no concern to us."
 PRC_stabilize_the_political_sphere: "Stabilize the Political Sphere"
 PRC_stabilize_the_political_sphere_desc: "Although the voices of criticism have not been completely eliminated, we have largely stabilized the political sphere, secured the support for the Party and the General Secretary of the majority, as well as meeting the demands of the party factions and interest groups. This will provide a solid foundation for our next steps."
 PRC_contain_the_damage: "Contain the Damage"
 PRC_contain_the_damage_desc: "Only by first ensuring the stabilization of the domestic sphere will we be able to carry out reforms to respond to the oil crisis and restore the country's strength. China has never needed unity and strong leadership more than it does today."
 PRC_a_broken_system: "A Broken System"
 PRC_a_broken_system_desc: "We must recognize that the severe shock of the oil crisis has proved beyond any doubt the inadequacy and fragility of the existing system. We will accept more radical reform and make radical amendments to the old system. Only in this way can we see the true renaissance of China."
 PRC_expand_domestic_oil_production: "Expand Domestic Oil Production"
 PRC_expand_domestic_oil_production_desc: "At such a crucial juncture, we cannot continue to rely on unstable overseas oil import channels. We will further exploit our domestic resources and build more oil drilling and processing plants. Only then will energy security be truly under our control, while at the same time lowering the transportation costs of fuel and further mitigating the impact of the economic crisis."
 PRC_diversify_the_oil_trade: "Diversify the Oil Trade"
 PRC_diversify_the_oil_trade_desc: "At a time when the world's major oil-producing countries are in turmoil and disorder, securing and stabilizing our energy imports is critical to mitigate the crisis. Thanks to our friendly relations with developing countries over the years, it will be easier for us to diversify our risks by opening up additional oil import channels, such as those from Venezuela and Brunei."
 PRC_drill_for_xinjiang_oil: "Drill for Xinjiang Oil"
 PRC_drill_for_xinjiang_oil_desc: "The vast territory of Xinjiang has been exploiting oil since a long time ago, but due to reasons such as remoteness and sparse population, the locally extracted oil could not be properly utilized. Nowadays, with the construction of new pipelines and the approval of new contracts for oil exploitation, Xinjiang's oil has become the lifeline that sustains our country's economy."
 PRC_south_china_sea_expansion: "South China Sea Expansion"
 PRC_south_china_sea_expansion_desc: "The South China Sea is rich in resources, with enough reserves to sustain us through the entire crisis. Despite the fact that all the countries surrounding the South China Sea have claimed sovereignty over the sea and the right to exploit its resources, as the most powerful country in the region, we can send our fleet and aircraft to protect our drilling platforms and merchant convoys, as well as to drive away our foreign counterparts. Perhaps other nations will strongly protest our behavior, but that is unimportant."
 PRC_synthetic_oil_investments: "Synthetic Oil Investments"
 PRC_synthetic_oil_investments_desc: "Synthetic oil looks attractive at a time of energy shortages. For our country, synthetic oil is not only inexpensive and can be produced in large quantities quickly, but it is also as efficient as real oil. Despite its shortcomings such as poor stability, synthetic oil has become a major source of energy in most factories along the eastern part of the country, and the trend seems likely to continue to spread."
 PRC_gambit_in_the_gulf: "Gambit in the Gulf"
 PRC_gambit_in_the_gulf_desc: "In order to solve a problem, we must go to the origin of the problem. We will strengthen our presence in the Gulf region and be more proactive in defending our vital interests. We will also engage directly with the Governments of the Middle East and provide them with support to ensure that the situation there stabilizes as soon as possible and that the negative effects of the oil crisis are brought to an end."
 PRC_stabilize_the_economic_sphere: "Stabilize the Economic Sphere"
 PRC_stabilize_the_economic_sphere_desc: "The impact of the oil crisis on our economy can be neutralized through a variety of methods. The government will introduce decrees to limit the rate of increase in fuel prices, set up fuel coupons to limit the consumption of stocks, and issue additional relief and bonds to disadvantaged areas in order to curb the economic downturn. Through a combination of policy instruments, the people will realize that we are capable of stabilizing the economic sphere."
 PRC_southeast_asian_bailout_package: "Southeast Asian Bailout Package"
 PRC_southeast_asian_bailout_package_desc: "Southeast Asian countries are not as strong as we are in terms of energy reserves and economy, so when the oil crisis broke out, the economies of the countries there fell apart, and domestic crises followed one after another. We can take this opportunity to further expand our influence over ASEAN, stabilize the economic and political situation in the region through increasing trade and commerce, and build up our image as a responsible superpower."
 PRC_chase_the_chinese_dream: "Chase the Chinese Dream"
 PRC_chase_the_chinese_dream_desc: "We must not ignore the importance of giving our people self-confidence in times of national crisis. We will continue to promote the "Chinese dream", emphasizing that we have done better than any other country in the world in recovering the economy and addressing the crisis. At the same time, we must not forget to publicize the people's role models and to enhance the public's sense of patriotism."
 PRC_rejuvinate_the_nation: "Rejuvenate the Nation"
 PRC_rejuvinate_the_nation_desc: "Thankfully, we have gradually emerged from the haze of the oil crisis, the economic situation is reviving and foreign exchange levels are beginning to stabilize. Many foreign investors have also chosen to return to the country to conduct business. The country's bright economic prospects and soaring national pride prove once again that no hardship or obstacle can defeat the Chinese people, and that China's great rejuvenation is within reach."
 PRC_a_renewable_revolution: "Renewable Revolution"
 PRC_a_renewable_revolution_desc: "We cannot hope to solve the domestic energy crisis simply by resuming oil imports. Fortunately, the rapid advances in science and technology in recent years have enabled us to make better use of advanced technologies such as wind power and solar power to remedy the economic losses caused by the oil shortage. In addition, the promotion of renewable energy technologies can also reduce environmental pollution and increase employment opportunities."
 PRC_a_nuclear_revolution: "Nuclear Revolution"
 PRC_a_nuclear_revolution_desc: "Economists and scientists in our government have advised us to invest more in the nuclear energy field during the oil crisis and to rely more on this efficient source of energy to power our economic system and industry. While some are concerned about the potential safety risks and pollution of nuclear energy, there is no room for hesitation at such a critical time."
 PRC_shake_up_the_politburo: "20th National Congress"
 PRC_shake_up_the_politburo_desc: "We will finally hold the 20th National Congress of the Communist Party of China to elect the new Central Committee and set the focus of the Party's work for the next five years. Many people, both at home and abroad, are quite interested in the results of this congress, and we will use this opportunity to demonstrate the Party's strength and unity."
 PRC_the_final_opportunity: "The Final Opportunity"
 PRC_the_final_opportunity_desc: "After more than 70 years of deadlock, the biggest obstacle of the reunification of our motherland has finally disappeared as the US has fallen into internal conflicts. Although many countries in the Asia-Pacific region, led by Japan, claim that they will work together to stabilize the situation in the Taiwan Strait, neither their economic power nor their military strength can rival China's, and without the leadership of the US, it will be very difficult for them to be truly united. That is why now is the best time for us to start the campaign for the liberation of Taiwan, and it is very likely that such an opportunity will not come again."
 PRC_prepare_landing_craft: "Prepare Landing Craft"
 PRC_prepare_landing_craft_desc: "Amphibious landing capability has always been the focus of PLA military construction. Since the 1990s, we have purchased engines and ship design drawings from Russia, Ukraine and other countries specifically for large landing craft. Entering the new century, the PLAN has also built and commissioned a sizable fleet of amphibious assault ships similar to that of the U.S. Navy. We will secretly mobilize these ships and deploy them to shipping positions off the coasts of Fujian and Zhejiang provinces."
 PRC_modern_combined_arms: "Modern Combined Arms"
 PRC_modern_combined_arms_desc: "After studying intensively the military operations of the US and Russia, we have gained a clearer understanding of the complexity of modern warfare. The Taiwan campaign required close cooperation among the PLA's navy, army and air force, as well as the Rocket Force and the Armed Police Force. In addition, according to the modern combined arms theory, the sharing of information among the different branches of the military and their unified subordination to the command of the Central Military Commission were also very important."
 PRC_blockade_taiwan: "Blockade Taiwan"
 PRC_blockade_taiwan_desc: "We will draw a no-navigation zone in the waters around Taiwan Island and dispatch frigates and submarines to patrol the designated maritime boundaries day and night. Air routes leading directly to Taiwan Island will also be closely monitored. This is not only to disperse interference from civilian ships and civil aviation and to clear the way for air and sea attacks by the PLA, but also to cut off Taiwan's economic sources and destabilize the island's government. There may be countries that condemn this, claiming that our actions will lead to a humanitarian crisis in Taiwan, but as soon as Taiwan collapses, it will all be over quickly."
 PRC_conduct_final_training: "Conduct Final Training"
 PRC_conduct_final_training_desc: "Not only is the fleet training for the Taiwan Campaign , but the PLA's vanguard forces are also conducting final landing maneuvers on the Liaodong Peninsula and Hainan Island. Meanwhile, at inland training bases, the airborne troops and special forces, who are expected to be the first to land on Taiwan, have also begun to conduct training for infiltration assaults. All of this is to ensure that we are in the best condition to deal with the war when the fire truly rises."
 PRC_expand_the_j20_program: "Expand the J-20 Program"
 PRC_expand_the_j20_program_desc: "The J-20 is a fifth-generation stealth fighter program developed by the PLAAF, and it is also one of the most advanced and powerful fighters in the world. Moreover, our increasingly developed aviation industry has made it possible to solve the technical bottlenecks that have plagued us for many years. We now have all the conditions for mass production of the J-20, and we are also able to build improved models with more advanced engines or better stealth coatings, depending on military requirements."
 PRC_operation_silent_dawn: "OPERATION: §YSILENT DAWN§!"
 PRC_operation_silent_dawn_desc: "The most critical moment has finally arrived: we will launch Operation Silent Dawn, an important step in determining the success of our battle plan. Ballistic missiles and rockets commanded by the Rocket Force will launch preemptive strikes against Taiwan's key military installations, such as airfields, air defense missiles, and radar stations, completely destroying their early warning capabilities. The missiles will also target power stations and substations, as well as important communications centers."
 PRC_sieze_kinmen: "Seize Kinmen"
 PRC_sieze_kinmen_desc: "The Kinmen Islands are adjacent to Xiamen in Fujian Province and are one of the important outposts of the Taiwanese army. If we want to start a landing operation on Taiwan, we must first take Kinmen to destroy Taiwan's peripheral defense system and at the same time provide an important forward base and staging area for the landing forces. Not only that, but the capture of Kinmen will also wash away the shame of our disastrous defeat at the Battle of Kinmen more than seventy years ago."
 PRC_plan_on_high_alert: "PLAN on High Alert"
 PRC_plan_on_high_alert_desc: "Since our navy began its blockade and cruising mission in the Taiwan Strait, one of the important tasks undertaken by the fleet has been to be alert to possible breakout attempts by Taiwanese warships, as well as to guard against harassment actions from hostile forces such as the US Pacific Fleet and the JMSDF. Furthermore, our Coast Guard forces have also played an important role in intercepting several stowaway attempts by Taiwanese merchant and refugee vessels."
 PRC_TWWAR_LHD_TT: "§CLHDs will be deployed for support.§!"
 PRC_finish_what_mao_started: "Finish What Mao Started"
 PRC_finish_what_mao_started_desc: "During the Mao era, there was a famous slogan: "The flag of victory must be planted on Taiwan." Yet until Chairman Mao's death in 1976, he never saw Taiwan return to the motherland. Now we will put together the last piece of the puzzle of the great cause started by Mao. We will officially declare war on the puppet government occupying Taiwan, and the final battle of the war of liberation has begun!"
 PRC_analyze_first_days: "Analyze the First Days"
 PRC_analyze_first_days_desc: "Our preparations for the war appear to have had the desired effect: Operation Silent Dawn and the naval blockade have nearly succeeded in destroying Taiwan's counterattack forces and minimizing the morale of the Taiwanese population. But we must acknowledge that the Taiwanese reactionaries were not completely destroyed, as its luckily undestroyed air force and submarines launched somewhat successful counterattacks and inflicted some damage. At the command center of the Joint Staff, our generals will review the first day's battle and make plans for the next step."
 PRC_fast_finalization: "Fast Finalization"
 PRC_fast_finalization_desc: "Seizing precious strategic opportunities is one of the key laws of war. The attack on Taiwan is no exception. After the missile bombing and air raids, we will order the landing fleet to depart immediately and establish several bridgeheads along the west coast of Taiwan to prevent the Taiwanese army from having the opportunity to launch a counter-attack. The carrier battle groups will also be operating in the waters east of Taiwan, and the PLAN will conduct attacks on important strongholds on the east coast of Taiwan. It is only now that the real battle begins."
 PRC_slowly_but_surely: "Slowly but Surely"
 PRC_slowly_but_surely_desc: "Since we already have an absolute advantage in terms of troop strength, the most important thing to do now is to avoid optimism and recklessness that could ruin the whole war plan. We should continue to expand the advantage that the sudden attack has brought us by requiring our special forces deployed on the Taiwan island to step up their activities in order to interfere with the Taiwan troops' mobilization and the recovery of their strength. At the same time, a new round of massive missile attacks will be put on schedule, thus consolidating our material and psychological superiority over the Taiwanese army."
 PRC_air_deconservation: "Aircraft Deconservation"
 PRC_air_deconservation_desc: "Taiwan's air force, though far inferior in size to the PLAAF, owns several types of advanced equipment, including F-16 fighters, while the professionalism and combat determination of its pilots tends to be higher than that of their army and navy colleagues. For this reason, we will send somewhat outdated but still combat capable fighters  to participate in the air war over Taiwan. With that amount of airpower, the PDTO forces will definitely not be able to handle it."
 PRC_adapt_to_current_realities_of_battles: "Adapt to the Current Realities of Battles"
 PRC_adapt_to_current_realities_of_battles_desc: "Despite years of military modernization, numerous problems were exposed by the PLA in the Taiwan War, due in great part to our underestimation of the modern warfare pattern and the army's lack of real combat experience after decades of peace. We will draw valuable lessons from this war, summarize the classic battle examples, and use them as a research topic at the National Defense University to identify new military principles that will guide the next war."
 PRC_crackdown_on_separatists: "Crackdown on Separatists"
 PRC_crackdown_on_separatists_desc: "As we regain more and more of Taiwan's territory, it is time to deal with matters concerning the people. Our goal is to uncover those anti-communists and Taiwan separatists who have been hiding, so investigations will focus on citizens' relevant speech and Internet usage records. Not only that, but unauthorized political rallies and public activities will be severely restricted for the time being. Those who do not obey martial law will also be duly punished."
 PRC_indiscriminate_missile_strikes: "Indiscriminate Missile Strikes"
 PRC_indiscriminate_missile_strikes_desc: "As we enter a new phase of military operations against Taiwan, it is time to ease the final restrictions on the Rocket Force. All missile aimed at Taiwan will be allowed to launch strikes against any suspected hostile targets on the island, especially civilian buildings that could be used as clandestine strongholds for small units for the Taiwanese army, as well as strategically-critical nature preserves. These are all necessary sacrifices for the sake of ultimate victory."
 PRC_taiwanese_affairs_dont_concern_mainland: "Taiwanese Affairs Don't Concern the Mainland"
 PRC_taiwanese_affairs_dont_concern_mainland_desc: "While our troops are still fighting hard on the island of Taiwan, we must ensure that our home base, the mainland, remains stable. Since the start of the war, several provinces along the coast have been put on wartime status, but beyond that, there is no need for us to transform any more parts of the mainland into a wartime regime. At the same time, news about the war in Taiwan will be monitored and controlled to ensure that national support for the war does not change."
 PRC_final_offensive: "The Final Offensive"
 PRC_final_offensive_desc: "Now, after a hard and long battle, we have finally surrounded the last resistance in the Taipei metropolitan area. Although there are still a few stragglers active in the mountains, once we succeed in capturing Taipei, this war will come to an end. Although the PLA will inevitably suffer heavy losses, when the soldiers can already see the top of the Taipei 101 through their binoculars, the desire for victory has overwhelmed all fear of defeat!"
 PRC_unite_people: "Unite the People"
 PRC_unite_people_desc: "In addition to dealing with the enemies lurking within the people, we will also promote active counter-espionage activities by the people. Furthermore, in order to enable them to appreciate the superiority of the socialist system and establish a sense of belonging to the new regime, we will carry out active economic assistance and reconstruction work in Taiwan, as well as granting many policy concessions to the residents of Taiwan and encouraging them to receive their Chinese citizenship identity documents as soon as possible."
 PRC_minimize_civilian_casualties: "Minimize Civilian Casualties"
 PRC_minimize_civilian_casualties_desc: "Although street fighting in Taiwan's urban areas is the last thing we want to see, sometimes it is necessary to clear enemy forces from their strongholds, street by street, house by house, in order to ensure complete control of the position. Although this type of warfare often results in high casualties, it is necessary to minimize civilian casualties. Not only that, but we had already made a list of targets that the army was strictly forbidden to attack before the war started, including schools, kindergartens, cemeteries, and so on."
 PRC_economic_conversion_to_military_needs: "Economic Conversion to Military Needs"
 PRC_economic_conversion_to_military_needs_desc: "For a long time, China's economic growth has depended heavily on foreign trade. But now with the outbreak of war in the Taiwan Strait, one international sanction after another, and the fact that the waters of the Western Pacific have been blockaded, this makes it essential for us to switch our economic system entirely to an internal cycle. With the defense industry as the core, we will build a new economic system with the highest goal of serving the military needs."
 PRC_no_hurry: "No Hurry"
 PRC_no_hurry_desc: "While we are engaged in the final battle, we must not forget the need to deploy naval and air forces to patrol the periphery of Taiwan, so as to prevent other countries from intervening in the war. In addition, it is even more unacceptable that they would take this opportunity to assist the leaders of Taiwan's pseudo government to flee and establish a government-in-exile, which would also be disastrous for our subsequent administration. Therefore, even if the process of the final battle should be slowed down, we must still eliminate all possible political risks."
 #Centrists-Xi'ists
 PRC_china_victorious_and_united: "China, Victorious And United"
 PRC_china_victorious_and_united_desc: "Now that we have reclaimed Taiwan, a rebellious island that has been separated from the motherland for nearly a century. The Chinese nation has finally been reunited. Now it's time to start working on a whole new question of how to govern this island of nearly 20 million people."
 PRC_utilize_xinjiang_methods: "Utilize Xinjiang Methods"
 PRC_utilize_xinjiang_methods_desc: "In order to restore stability in Taiwan as soon as possible, some have suggested replicating the governance program we implemented in Xinjiang, including the deployment of a large peacekeeping and counter-terrorism forces, tough management measures, and the imposition of curfews in some hot spots, etc. This program is supported mainly by party hardliners, army generals and senior police officers." 
 PRC_one_china_two_systems: "One China, Two Systems"
 PRC_one_china_two_systems_desc: "In order to restore stability in Taiwan as soon as possible, some have suggested replicating the governance program we implemented in Hong Kong and Macao by pushing forward the establishment of "one country, two systems" in Taiwan as soon as possible, and gradually withdrawing the PLA and the PAP from the island while handing over power to the newly established democratically-elected Government. This program is also a promise that the mainland government made to the people of Taiwan many years ago. It is supported mainly by party moderates, diplomats and civilian officials."
 PRC_gradual_stabilization: "Gradual Stabilization"
 PRC_gradual_stabilization_desc: "As a result of our tireless efforts, stability has now returned to the island of Taiwan. Citizens begin to try to get out of their homes, and daily commercial activities and public transportation are gradually resuming. While the antipathy of local Taiwanese residents toward the mainland will likely continue for some time, this has been an incredible victory."
 PRC_unify_the_bureacracy: "Unify The Bureaucracy"
 PRC_unify_the_bureacracy_desc: "Only through the establishment of a truly reliable civil service system can Taiwan prosper again, and the people of Taiwan will truly build up a positive feeling towards the Chinese Government. In addition to bringing in reliable administrative experts from the mainland, we should also maintain close contact with former Taiwan government officials as well as celebrities and invite them to work with us when necessary, which of course should be voluntary."
 PRC_evacuation_of_key_industries: "Evacuation of Key Industries"
 PRC_evacuation_of_key_industries_desc: "Before the reunification, Taiwan used to have several globally competitive enterprises, including TSMC, but they were all damaged to varying degrees during the Taiwan war. We will immediately begin to move those key industries to the mainland, partly to enable them to resume production as soon as possible, and partly to provide a boost to the recovery of the mainland economy."
 PRC_accelerate_local_recovery: "Accelerate Local Recovery"
 PRC_accelerate_local_recovery_desc: "We need to rebuild the infrastructure on Taiwan Island, which has been severely damaged as a result of the fighting as soon as possible, as well as to bring in vital supplies such as food, medicine and fuel to maintain the basic livelihood of the island's residents from the mainland, so as to avert the possibility of a humanitarian disaster. The PLA and the PAP on the island will also be engaged in local medical assistance and building clean-up work, so as to show the Taiwanese a good image of the People's Army."
 PRC_the_chinese_century: "The Chinese Century!"
 PRC_the_chinese_century_desc: "After so many years, the victory of the Taiwan War led to the true reunification of China and the realization of the promises that our Party had made to its people. There is no longer anyone in this world who would question our power, and the superpowers that once overrode us have all declined and can no longer compete with us. We will hold a grand celebration to announce to the world that the Chinese Century has dawned."
 PRC_creating_the_reputation_society: "Creating The Reputation Society"
 PRC_creating_the_reputation_society_desc: "The social credit system is a great example of how we can capitalize and combine modern Internet technology and information storage technology. China's rapid growth has increased the visibility of this initiative around the world. Similar policies are now supported by local governments in some countries, and we will continue to build on what we have achieved to further develop the Reputation Society system and make it ultimately perfect."
 PRC_expand_the_blacklist_system: "Expand the Blacklist System"
 PRC_expand_the_blacklist_system_desc: "We will use the big data of the social credit system to register and blacklist the party's potential enemies. This will include not only dissidents who spread subversive ideas, but also entrepreneurs who are dissatisfied with the party's macro-control policies and intellectuals who question our leadership. One day, we will be able to find and root out the discontent at its earliest stages."
 PRC_peoples_social_credit: "People's Social Credit"
 PRC_peoples_social_credit_desc: "The social credit system will not only be used to eliminate dissent, but will also contribute to the creation of a harmonious society that has a high level of morality. Based on the data collected by the system, we will develop a comprehensive rating system that will cover all aspects of our citizens' lives. In the future, citizens will be assessed on the basis of the scores they have received, from qualifying for higher education to approving bank loans."
 PRC_strengthen_control_of_bureaucracy: "Strengthen Control of Bureaucracy"
 PRC_strengthen_control_of_bureaucracy_desc: "We will use the social credit system mainly for monitoring and assessing Party cadres at all levels. The personal information of every member of the Party will be recorded, from the most senior members of the Politburo Standing Committee to the most junior party member. The social credit system will not only be used to evaluate cadres' performance, but will also be used to ensure that the personal moral qualities of cadres will always meet the Party's high level of expectations."
 PRC_enthusiasm_of_chinese_people: "Enthusiasm of Chinese People"
 PRC_enthusiasm_of_chinese_people_desc: "We will instill the values of patriotism in our people in the new era to better unify the minds of all segments of society. Our institutions of public information and enlightenment are prepared to work on all fronts-from information to education to the arts-to energize the people and foster greater loyalty to the motherland and our cause."
 PRC_core_socialist_values: "Core Socialist Values"
 PRC_core_socialist_values_desc: "The 12 values, written in 24 Chinese characters, are the national values of "prosperity", "democracy", "civility" and "harmony"; the social values of "freedom", "equality", "justice" and the "rule of law"; and the individual values of "patriotism", "dedication", "integrity" and "friendship" are the best expression of the spirit of socialism's leadership, advancement and activism in the Chinese society. Not only that, but it is also the strongest evidence of a lineage from the earliest days of Marxism-Leninism and Mao Zedong Thought, all the way up to today's Xi Jinping Thought. We will use this as the basis for our ideological education and the unshakeable socialist nature of our country."
 PRC_national_rejuvination: "National Rejuvenation"
 PRC_national_rejuvination_desc: "One of the most essential features of socialism with Chinese characteristics relating to the "great rejuvenation of the Chinese nation" is the promotion of nationalism. The Party always reminds its people that it was the CPC that rescued China from the chaos of civil war and poverty in 1949 and built it into a new superpower in the 21st century. There is no more effective way to motivate citizens to love and be loyal to their country than to propagate its strength and prosperity."
 PRC_final_strike_against_the_corruption: "Final Strike Against the Corruption"
 PRC_final_strike_against_the_corruption_desc: "Since Xi Jinping became general secretary in 2012, the anti-corruption campaign has continued throughout his administration. Now, it is time to take this campaign to a new peak. With the invaluable information and data collected by the social credit system, we will wipe out all the rats in the party, and we will get a pure party to ensure that it truly serves our supreme goal of "Serve the People"."
 PRC_improve_party_discipline: "Boost Party Discipline"
 PRC_improve_party_discipline_desc: "We will ensure that the provisions in the Party's Constitution on the integrity of Party members are deeply implanted in the minds of every cadre, so as to prevent the resurgence of corruption among Party cadres at all levels. In addition to moral education, we will further develop regulations on disciplinary sanctions for party members and give more extensive powers to the party's Central Commission for Discipline Inspection and the National Supervisory Commission."
 PRC_the_party_of_public_interest: "The Party of Public Interest"
 PRC_the_party_of_public_interest_desc: ""Serve the People" has always been regarded as a fundamental tenet of the Party, reminding cadres of where they came from and why they became Communist Party members. To this day, when China has reached a new level of prosperity, and the Party's ties with the people have grown stronger than ever before, we can proudly declare that the Party has not only saved China and liberated the people, but that it has also fulfilled each and every one of the promises it has made."
 PRC_fidelity_to_xiaoping_principles: "Fidelity to Xiaoping Principles"
 PRC_fidelity_to_xiaoping_principles_desc: "After the death of Chairman Mao, when the Party was in disarray and China's future was in doubt, it was Deng Xiaoping who reset the Party's course, proposed the basic policy of focusing on economic construction, and was remembered by the Chinese people as the Chief Architect of Reform and Opening Up. Today, China's gigantic ship will continue to follow the course set in 1978, and Xi Jinping will be honored as the "Chief Architect of the New Era."" 
 PRC_comprehensive_deepening_of_reforms: "Comprehensive Deepening of Reforms"
 PRC_comprehensive_deepening_of_reforms_desc: "As our Party faces the challenges of a new era, relying solely on the policies of the past will not only fail to ensure the Party's continued leadership, but will also hinder China's progress toward becoming a world leader. We will encourage the Party and state institutions to develop innovative policies that will make the Party a truly flexible organization, rather than a bloated and cumbersome burden that is embedded in the system."
 PRC_restoration_of_cadres_rotation: "Restoration of Cadres Rotation"
 PRC_restoration_of_cadres_rotation_desc: "The cadre rotation system, which sets a specific term of office for each official position, is one of the most important parts of the institutional reforms implemented by the party, ensuring the renewal of the cadre and allowing newly emerging talents to be identified and promoted to important positions. Over the past decade, cadre rotation at the highest levels has been consciously delayed in order to maintain Xi's authority, but now with the situation stabilized, it's time for finding a couple of new faces for the ministers and secretaries." 
 PRC_ministerial_reshuffle: "Ministerial Reshuffle"
 PRC_ministerial_reshuffle_desc: "The tasks of the new era proposed by the Party require cadres with new thinking to fulfill them, but cadres trained under the old system are still prevalent in the Party today. Furthermore, their opposition to new policies often manifests as slackness, which is detrimental to our cause. The Party's cadres will undergo a complete reshuffle, with younger, more loyal, and reform-minded individuals replacing them as the executors of the Party's will."
 PRC_implement_10_affirmations: "Implement 10 Affiramtions"
 PRC_implement_10_affirmations_desc: "The "10 Affirations" is a new creed proposed by General Secretary Xi Jinping himself that party members should learn and practice in the new era. The general secretary called on party cadres to learn from the valuable practical experience and theories of their predecessors while pushing for comprehensive reform according to the needs of reality, while continuing to maintain a deep connection with the people. This invaluable spiritual wealth created by the party and the people together will receive the highest attention and serve as an important guide in our training of new party members."
 PRC_approve_pla_loaylity: "Approve the PLA's Loyalty"
 PRC_approve_pla_loaylity_desc: "The PLA stood a significant test in the War. Moreover, during wartime, the army produced numerous heroic role models, from commanders who won countless battles to soldiers who fought bravely. We will use this as the basis for a new propaganda campaign called 'Learning from the PLA,' which will further enhance the image of the army within the Party and in the public sphere. We will also promote outstanding PLA officers and political commissars to party leadership positions."
 PRC_sinicization_of_marxism: "Sinicization of Marxism"
 PRC_sinicization_of_marxism_desc: "Since the outbreak of the October Revolution, when Marxism was introduced to China from the Soviet Union, the process of " Sinicization" of Marxism has never stopped. From the early thinkers of the CPC, such as Chen Duxiu and Li Dazhao, to revolutionary leaders such as Mao Zedong and Deng Xiaoping, every one of them has made their own unique contributions to this process. Now, as a great leader of the new era, Xi Jinping will open a new stage in the sinicization of Marxism. This will be a great achievement that will benefit both the present generation and the future."
 PRC_improve_national_security: "Improve National Security"
 PRC_improve_national_security_desc: "Even though we have achieved great victories that were unimaginable in the past, threats from within and outside the country still exist, especially threats to regime stability and national security. We will continue to give more power to the Ministry of Public Security and the Ministry of National Security, while relying more on the newly established National Surveillance System and Intelligent Crime Screening System to enhance the efficiency and deterrent effect of the departments' work, so that those enemies hiding in the shadows will know that we will always be able to find them."
 PRC_modern_socialist_nation: "The People's Republic of the New Era"
 PRC_modern_socialist_nation_desc: "From the earliest "Four Modernizations", to Deng Xiaoping's proposal of a "moderately prosperous society", and then to Xi Jinping's proposition of the "Chinese Dream" and "great rejuvenation", the dream that China could one day reclaim its status among the world's nations and become the undisputed Central Kingdom has been repeatedly expressed in various ways throughout the history of the People's Republic. Today, after almost a hundred years of arduous struggle since Mao Zedong announced the founding of the Republic on October 1, 1949, the People's Republic of China is now finally realizing the long-cherished dream of several generations."
 PRC_the_great_revival: "The Great Revival"
 PRC_the_great_revival_desc: "The great rejuvenation of the Chinese nation is now unstoppable and will continue to achieve even more astonishing victories! Historians will divide China's history into two, using the present as the defining boundary! The Chinese people will continue to advance along the glorious path blazed by the Party, now and forever!"
 PRC_strengthen_auhority_of_the_chairman: "Strengthen Authority of the Chairman"
 PRC_strengthen_auhority_of_the_chairman_desc: "The Party's achievements and victories have undeniably proved that Xi Jinping's leadership as the core of the party is unquestionable and indispensable. In order to better serve our cause, a series of resolutions on elevating the status of the Chairman and strengthening his decision-making and supervisory powers over party policies have been approved. We will continue to follow Chairman Xi's leadership, and only then will the Party be able to embrace one new victory after another."
 PRC_xi_jinping_thought_abroad: "Xi Jinping Thought Abroad"
 PRC_xi_jinping_thought_abroad_desc: "China's achievements over the past decade have also led other governments and people to focus on China's successes. Xi Jinping, as the leader of China, has naturally received the greatest attention for his series of ideas on governance. We shall not give up such an opportunity to improve our country's reputation and enhance our soft power. We will present a series of books on Xi 's ideas to officials of interested countries and regions, and at the same time accelerate the translation of these books and their publication in the target countries."
 PRC_dare_to_dream: "Dare To Dream"
 PRC_dare_to_dream_desc: "The scientific and technological advances of the 21st century will help us realize what were once considered the most ambitious dreams. From manned spaceships to Mars rovers, from 5G mobile communication to artificial intelligence, and even gene-editing engineering and cloning technology... We will further encourage our citizens to devote themselves to scientific exploration. One day, the Chinese will represent the highest level of technological innovation in the world."
 PRC_dare_to_work: "Dare To Work"
 PRC_dare_to_work_desc: "China's extraordinary economic growth has attracted the world's attention for many years, and it is because of our outstanding economic achievements that the phrase "Chinese Century" has been created and is becoming increasingly well-known. Nowadays, the post-war domestic economic boom and the return of Taiwan will once again create a large number of new construction projects and jobs. Once again, we will show the world what the diligence and ingenuity of the Chinese people can accomplish."
 PRC_dare_to_fight: "Dare To Fight"
 PRC_dare_to_fight_desc: "The victory in the Taiwan War brought the reputation of the PLA to its peak both at home and abroad. At home, it is praised as the true people's army, the most loyal defender of the Party, and the symbol of China's great rejuvenation; overseas, the PLA is regarded as the symbol of China's hegemony in the new century, and one of the most powerful deterrent forces in the world today. With the escort of the PLA, our country will be invincible in the future."
 PRC_made_in_china_2025: "Made in China [GetYear]"
 PRC_made_in_china_2025_desc: "Over the past forty years of reform and opening-up, China has built the most comprehensive industrial system in the world. As we move into the new century, we will showcase the power of this newly awakened giant to the global community."
 PRC_expand_trade_arguments: "Expand Trade Agreements"
 PRC_expand_trade_arguments_desc: "To globalize China's industry, we must enhance regional economic integration. We will invite more countries to participate in trade agreements and expand our existing economic network."
 PRC_economic_autarky: "Economic Autarky"
 PRC_economic_autarky_desc: "Our economy still grapples with unbalanced and inadequate development. Therefore, we will focus more on domestic industrial circulation to improve the living standards of our people."
 PRC_optimize_the_supply_chain: "Optimize the Supply Chain"
 PRC_optimize_the_supply_chain_desc: "The industrial modernization process of China has entered a new stage, and the existing supply chain can no longer meet the rapidly increasing industrial demand. We must immediately begin optimizing and upgrading it to make it "better and stronger.""
 PRC_worlds_factory: "World's Factory"
 PRC_worlds_factory_desc: "The title "World's Factory" signifies the strength of China's manufacturing industry, which already supports global production. However, we must not be complacent; we should continue to expand our manufacturing sector and strive to become the global leader in manufacturing."
 PRC_our_secret_weapon: "Our Secret Weapon"
 PRC_our_secret_weapon_desc: "The people are to the CPC and the PLA what Gaia is to the Olympian gods. We will promote the integration of the civilian and military sectors, deeply combining national defense with economic development."
 PRC_escape_middle_income_trap: "Escape The Middle Income Trap"
 PRC_escape_middle_income_trap_desc: "The "middle-income trap" has ensnared several once-prosperous developing countries, preventing them from matching developed nations. The Chinese government and people have strived for years to achieve common prosperity without falling into this trap. The world will watch to see if a miracle can happen."
 PRC_endorse_the_megaprojects_cen: "Endorse the Megaprojects"
 PRC_endorse_the_megaprojects_cen_desc: "Imagine a towering skyscraper standing majestically in the capital, its silhouette piercing the sky. It would undoubtedly awe everyone who gazes at it, instilling pride and reverence in the hearts of the people. We should advocate for such grand projects; they are not only a display of national power but also a declaration of national confidence."
 PRC_dream_come_true: "A Dream Come True"
 PRC_dream_come_true_desc: "The first ray of dawn illuminates the City of Dragon. Maglev trains glide silently by, as data centers spread like nerve endings. The world's largest single building casts its towering shadow, obscuring the once-reedy marshland.\nThe future has arrived. The Chief Engineer gently touches the digital sand table, as smart towers gleam in holographic projections. Here, China's speed reshapes civilization, and Chinese wisdom creates new possibilities.\nXiong'an, this dream city of the new era, demonstrates to the world at breathtaking pace: the continuation and breakthrough of Chinese civilization thrives on this land of millennial significance.\nA new capital, a great dream, has taken root here."
 PRC_invest_in_ai: "Invest in Artifitial Intelligence"
 PRC_invest_in_ai_desc: "In recent years, technological achievements in AI have been gradually implemented into productions, revealing new opportunities for further economic growth. If China aims to keep its place in this field in the future, we must increase our investments in AI technology, starting from now."
 PRC_develop_tech_prod_aboard: "Develop Tech Production Abroad"
 PRC_develop_tech_prod_aboard_desc: "It's time to export our cheap and affordable high-tech products to the world, proving that technology products backed by the Chinese industrial system are strongly competitive. They will break the monopoly on trades dominated by the Western tech companies."
 PRC_techno_nationalism: "Techno-Nationalism"
 PRC_techno_nationalism_desc: "We will increase support for the technology sector, ensuring that emerging technologies are applied in ways that best address our challenges."
 PRC_technology_for_everyone: "Technology for Everyone"
 PRC_technology_for_everyone_desc: "Technology is a primary productive force, but without users, it loses its value. We must ensure that more people have access to the most advanced products to meet their demand for a higher quality of life."
 PRC_rein_in_corp: "Rein in Corporations"
 PRC_rein_in_corp_desc: "Capital is blind in its pursuit of profit, and Chinese enterprises are no exception. To tame this wild horse, we must regulate them to ensure they better serve our people."
 PRC_anti_corpruption_tech: "Anti-Corruption Technology"
 PRC_anti_corpruption_tech_desc: "As the saying goes, corruption is like a lubricant, but too much lubricant can cause the machine to seize up. We will use advanced technology to control potential corruption methods, prevent corruption, and address corrupt individuals."
 PRC_continue_eco_dev: "Continue Ecological Development"
 PRC_continue_eco_dev_desc: "Green mountains and clear waters are as valuable as mountains of gold and silver. To better fulfill the Chinese people's desire for a happy and prosperous life, we must improve our current ecological environment."
 PRC_integrate_sezs: "Integrate SEZs"
 PRC_integrate_sezs_desc: "The previously designated Special Economic Zones no longer meet our current development needs. By integrating them, we will better leverage their advantages for the future."
 PRC_expand_resource_excavation: "Expand Resource Excavation"
 PRC_expand_resource_excavation_desc: "In response to the growing demand for resources, we will increase resource extraction accordingly. Although this contradicts our goal of creating a greener environment, societal progress requires us to be better prepared for the future."
 PRC_chinese_green_rev: "Chinese Green Revolution"
 PRC_chinese_green_rev_desc: "Our resources are not infinite, and sustainable development is the true path. By significantly supporting the environmental sector, China will initiate a new green industrial revolution."
 PRC_professional_dev: "Professional Development"
 PRC_professional_dev_desc: "Our compulsory education system has nurtured a vast labor pool. Enhancing their vocational skills will infuse new vitality into China's future development."
 PRC_cheap_foreign_spec: "Cheap Foreign Specialists"
 PRC_cheap_foreign_spec_desc: "Attracting more foreign talent and deeply integrating their expertise into our economic production will provide us with a competitive edge in the global market."
 PRC_modernization_of_military_prod: "Modernization of Military Production"
 PRC_modernization_of_military_prod_desc: "Our civilian industries have already been revitalized, and our military industries must not lag behind. By modernizing our military production, we can better meet our military construction needs."
 PRC_stimulate_fertility: "Stimulate Fertility"
 PRC_stimulate_fertility_desc: "With urbanization and industrialization, low fertility rates have become an issue. We will adjust our family planning policies to encourage more births and ensure that future development is not hindered."
 PRC_real_estate_market_stab: "Real Estate Market Stabilization"
 PRC_real_estate_market_stab_desc: "As the economy develops, speculative capital has increasingly flowed into the real estate market, creating a significant bubble. To avoid a collapse similar to Japan's, we must take measures to ensure a soft landing for the real estate market."
 PRC_fund_space_dev: "Fund Space Development"
 PRC_fund_space_dev_desc: "The space sector represents the pinnacle of a nation's technological prowess. By strongly supporting our space sector, we will not only showcase the strength of China's industrial capabilities but also our ability to lead in frontier technologies."
 #Nationalists
 PRC_chinas_most_dire_hour: "China's Most Dire Hour"
 PRC_chinas_most_dire_hour_desc: "Once again, the ancient giant ship of China faces the threat of sinking. Having lost its helmsman and direction, we must not lose hope. Only by holding on to our beliefs can we steer it towards a bright and unknown future."
 PRC_suppress_dissent: "Suppress Dissent"
 PRC_suppress_dissent_desc: "The so-called ideals of freedom and democracy have been exploited by reactionary forces as banners to incite chaos. Across the country, counter-revolutionary elements have seized the opportunity to stir unrest, create disorder, and attempt to overthrow the people's government and destroy the future of the Republic. If we still cling to illusions, hoping for persuasion or compromise, then the future and destiny of the People's Republic of China, won through the blood of countless revolutionary martyrs, will face grave danger. Therefore, we must act with thunderous force to crush all reactionary forces and firmly suppress all dissent."
 PRC_reorganize_the_party: "Reorganize the Party"
 PRC_reorganize_the_party_desc: "The Communist Party today has been infiltrated by too many opportunists and traitors - those who speak of serving the people, but in truth only seek their own power and interests. Such a Party cannot lead the country out of its crisis. To win back the trust of the people, to restore their faith that only the Party can lead China to a bright future, we must steel ourselves to carry out a thorough internal reorganization. We must purge those who are disloyal and irresponsible, and rebuild the Party with those who possess true conviction and are willing to sacrifice for the nation. Only then can the Communist Party become the true backbone of the Chinese nation's great rejuvenation."
 PRC_increase_pla_representation_in_the_npc: "Increase PLA Representation in the NPC"
 PRC_increase_pla_representation_in_the_npc_desc: "The chaos of the past has shown that when unrest spreads, only soldiers - true warriors - can make swift decisions, carry out tasks decisively, and keep the machinery of the state running. Civilian governance may be tolerable in peacetime, but in moments of crisis, it reveals its inefficiency and lack of resolve. We must confront this structural flaw and increase the proportion of PLA and PAP officers in the National People's Congress to ensure that military voices are heard in key decisions."
 PRC_increase_the_power_of_officers: "New Possibilities for Officers"
 PRC_increase_the_power_of_officers_desc: "The stability of our party and government depends on who holds the reins of power - and that power must lie in the hands of loyal, disciplined officers. Today's challenges call for expanding the presence of military officers in local governments and key state enterprises. Officers are not just experts in warfare - they are politically steadfast, action-oriented, and organizationally solid. Integrating them into the heart of governance will suppress bureaucratic foot-dragging and ensure unified command."
 PRC_eternal_union_of_army_and_state: "Eternal Union of Army and State"
 PRC_eternal_union_of_army_and_state_desc: "The People's Liberation Army, upon its creation, was dedicated to the protection of our nation and our people. Every man and woman in the military must remember the true reason why they fight. They serve to protect. Protect this land and their family. The armed forces are a tool, the weapon which the state wields to assert itself, to be used in unavoidable scenarios."
 PRC_empower_theater_commands: "Empower Theater Commands"
 PRC_empower_theater_commands_desc: "Our old systems were too rigid. Theater commanders were confined to military affairs, even when local officials delayed cooperation or shirked responsibility. This inefficiency has compromised national security. We must now grant theater commanders the authority to direct provincial governments within their zones, especially on matters related to security and wartime readiness. Local authorities must follow unified deployment under theater command leadership."
 PRC_citizen_militarization: "Citizen Militarization"
 PRC_citizen_militarization_desc: "Military readiness is no longer just a professional concern - it must become national. Every citizen must possess basic mobilization skills, combat awareness, and political loyalty. Military training will be regularized in schools, mandatory pre-service military education will be implemented at universities, and labor-intensive enterprises will conduct regular wartime retraining for employees. All government branches will establish wartime command chains, and every urban neighborhood will maintain a "readiness roster." There will no longer be "civilians" - only reservists. What we now need is instant mobilization, not a peacetime population lulled into complacency."
 PRC_party_controlled_by_the_pla: "Party Controlled by the PLA"
 PRC_party_controlled_by_the_pla_desc: "The gun is not symbolic - it is the last guarantee of state power, the final pillar when all else collapses. In reality, when internal divisions deepen or government systems falter, only the military has the discipline and capacity to swiftly regain control and restore order. We will establish a permanent civil-military emergency mechanism. In times of major political disorder or local party failure, theater command structures will temporarily assume control over both administrative and party affairs to preserve unity and stability."
 PRC_the_hero_state: "The Hero State"
 PRC_the_hero_state_desc: "China's history is written in the blood of its martyrs. Their sacrifice is not the past - it is the foundation of today's political legitimacy. We must elevate their ideals into a national ideology. To desecrate martyrs is to desecrate the state itself; to question their cause is to undermine the people's power. We are not a nation that survives by negotiation - we survive by sacrifice. Every citizen must remember that their life was paid for by another's death. Only through understanding that cost can we understand loyalty."
 PRC_new_production_and_construction_corps: "New Production and Construction Corps"
 PRC_new_production_and_construction_corps_desc: "We need a force that not only fights wars but also builds the nation. A new Production and Construction Corps, reporting directly to the Central Military Commission, will be stationed in strategic border regions, resource hubs, and potential conflict zones. Beyond infrastructure and resettlement, they will maintain stability and, when necessary, exert military control. In a state of emergency, these corps will act as regional governors, replacing failed local authorities to preserve state continuity."
 PRC_civic_military_cooperation: "Civic-Military Cooperation"
 PRC_civic_military_cooperation_desc: "Military training forges not just strength, but deep commitment to discipline, sacrifice, and responsibility. Veterans, as a result, excel in governance and grassroots mobilization. At this crucial stage of national order-building, we must fully integrate this force, eliminating barriers between civil and military spheres to create a seamless system. Civilian research will flow swiftly into military applications, while military expertise will support space, disaster response, and infrastructure. Combat-experienced officers will join national strategy teams, driving systemic reform and operational efficiency."
 PRC_strengthen_the_chairman: "Strengthen the Chairman"
 PRC_strengthen_the_chairman_desc: "The Republic does not need to debate its destiny - it needs a steady hand to draw all directions into a single line. Talk of checks, balances, and collective governance is merely the language of the weak, afraid to bear responsibility. Only when the entire nation stands united behind the President can the military move as one and every policy respond with a single command. We must root out those cowards who hide behind clauses, departments, or feigned neutrality. The Party has no use for strategists - it needs executors."
 PRC_stop_the_factionalism: "Stop Factionalism"
 PRC_stop_the_factionalism_desc: "No army can advance in the midst of division - and likewise, no nation can achieve modernization amid factional strife. Factionalism is the most corrosive toxin within the republic's institutions. It erodes organizational integrity, delays decision-making, fractures loyalty, and ultimately drags the entire political system into a mire of inefficiency and mistrust. Even today, remnants of historic factional struggles and vested networks linger within our military and state apparatus. Bound by region or by ties to past figures and events, they form a covert system of opposition - splintering decision-making in personnel appointments and resource allocation. This phenomenon must be eradicated completely. Any violator will no longer be warned - they will be demoted, purged, expelled, or imprisoned without hesitation."
 PRC_party_under_control_of_the_guiding_hand: "The Guiding Hand of the Party"
 PRC_party_under_control_of_the_guiding_hand_desc: "The Central Committee is not a coordinating board, nor a symbolic institution - it is the sole architect of national direction, the original source of the nation's will. At this pivotal moment of the Republic's reconstruction, the President must assume overwhelming authority to fully reclaim the Party's guidance mechanism, purge organizational inertia and wavering lines, and restore the Party to its one true voice. Over the past decades, the model of "collective leadership" has grown hollow; the Central Committee has become a shelter for competing interest groups. The name of the Communist Party has been invoked repeatedly, yet real power has been repeatedly hollowed out. This state of affairs must end. Beneath the Central Committee, there must be no second voice, no parallel authority. From the highest level to the grassroots, every Party organ must report directly to the President. All policies, all appointments - must be executed and answered for, step by step, without deviation."
 PRC_the_organic_history: "Our Organic History"
 PRC_the_organic_history_desc: "For us, China's five thousand years of history form a continuous structure of power - a seamless path from imperial rule to people's governance, from fragmentation to unity, from humiliation to rise. The notion of "historical pluralism" is, in essence, an ideological parasite - an opening act for fractured national consciousness. A nation cannot sustain two historical narratives; it cannot allow hostile ideologies to shape an alternate memory through schools, libraries, and media. We must establish an organic historical model - one in which every dynasty's rise and fall, every war's outcome, every leader's words and deeds, all trace back to the legitimacy and logic of the present regime."
 PRC_li_zuocheng_thought_focus: "Li Zuocheng Thought"
 PRC_li_zuocheng_thought_focus_desc: "The barrel of the gun must never heed the voices of the crowd - it must point in one direction, serve one ideology, and obey with cold, unquestioning precision. Lin Biao proved the correct schema for the military's political structure; Li Zuocheng has only anchored it more firmly into the steel framework of the new era with a steadier hand. The army does not need "humane management" or "democratic training" - these are the civilian's misreadings of iron discipline, cowardly excuses that seek to bind command with emotion. The armed forces of the Republic must be as unified as nerves, as precise as machinery. Where self still lingers in thought, hesitation will arise in command - and where hesitation takes hold, the nation falls. Soldiers need not love life; they must love the order."
 PRC_project_the_eternal_capital: "Project "The Eternal Capital""
 PRC_project_the_eternal_capital_desc: "We are no longer content with merely possessing a political center. If we are to prove our greatness, we must forge a city that commands the ages and governs the future - an Eternal Capital: Beijing. In time, she will be more than the heart of the Chinese Communist Party; she will become the axis of civilizational order, the antithesis of chaos, the end of all betrayal. She will surpass Athens in philosophy, Rome in empire, and Constantinople in faith. Human history will witness a city not unified by will alone, but crystallized by Party spirit and forged in the fires of order. A thousand years from now, she will still stand, towering on the map of mankind - a monument to the immortality of political purpose."
 PRC_new_great_leader: "The New Great Leader"
 PRC_new_great_leader_desc: "The reason the Communist Party of China was able to rise from the fires of war and break through times of peril lies in one fundamental truth: at every critical moment, it forged a leadership core capable of concentrating the collective will. The leader is the sum of the Party, the origin of the military, the pillar of the system. Any attempt to question or undermine this central role is a virus in the body of the Republic. We will continue to strengthen the cultural construction and institutional design of the great leader's image, ensuring its seamless integration into education, propaganda, and the military. We will eliminate at the root all dangerous notions such as "dual centers", "multiple memories", and "historical reappraisal"."
 PRC_question_of_the_chinese_interventionism: "Question of Chinese Interventionism"
 PRC_question_of_the_chinese_interventionism_desc: "China was once too timid, too concerned with international opinion. When our interests were violated abroad or our companies were humiliated, we often chose restraint. This obsession with "peace" and "non-intervention" has become a strategic weakness. It is time for a complete shift. China is a major power and must proactively defend its interests globally. Any act that harms Chinese interests - wherever it occurs - is an affront to our sovereignty and dignity. We will enhance our capacity for intervention, develop global rapid response forces, and never again let Chinese blood be shed in vain."
 PRC_redefine_the_will_of_the_party: "Redefine the Will of the Party"
 PRC_redefine_the_will_of_the_party_desc: "The Communist Party of China today is no longer what it once was. Over the past decades, layer upon layer of compromise, packaging, and concession has hollowed out its soul. Deng Xiaoping, in the name of "efficiency", severed the Party's bond of life and death with the masses. Jiang Zemin turned the Party into a greenhouse for technocrats, burying the fire of class struggle in silent meeting rooms. Xi Jinping never dared to fully rectify the Party line, letting it drift toward a hollow shell under the tide of "depoliticization."A vanguard party that no longer dares to speak of struggle, that no longer dares to define its enemies, cannot bear the weight of revolution. We must restore the Party's radical essence. From this moment forward, every act of the Party must return to revolutionary logic, return to its original mission - to fundamentally reshape the structure of society, eliminate parasitic classes, and mobilize all loyal citizens into political life."
 PRC_purge_the_liberal_reformers: "Purge the Liberal Reformers"
 PRC_purge_the_liberal_reformers_desc: "In past historical phases, liberal reformers, under the banners of "openness" and "change", pushed forward a series of measures that diluted the Party's core structure. They dismantled the planned system, weakened ideological guidance, and allowed the unchecked spread of value pluralism - transforming the Party from a mobilizing force into a mere network of coordination. They extended olive branches to the world, never realizing what was returned were rusted hooks.To us, these individuals are political risks, institutional viruses, and traitors of thought. The Party must identify, isolate, strip away, and eliminate them from within its own ranks. Their speeches, their written records - their entire bureaucratic footprints - must be erased without a trace."
 PRC_sinicization_of_marxism_nat: "Sinicization of Marxism"
 PRC_sinicization_of_marxism_nat_desc: "Some claim that Marxism was a Western ideology imported into China - this view is not only shallow, but an affront to the philosophical depth of Chinese civilization itself. From the ideal of "the whole world as one community" in the Spring and Autumn period, to Wang Mang's reforms and Wang Anshi's new policies, from Zhang Juzheng's push for tax equity to Huang Zongxi's structural critique of monarchy, the Chinese people have long grappled with the fundamental political questions: Who should own the land? Who should shape the system? Who has the right to speak for justice? These very questions lie at the heart of Marxist thought.In truth, Chinese civilization is not a pupil of Marxism - it is one of its earliest awakeners."
 PRC_purge_the_communist_hardliners: "Purge the Communist Hardliners"
 PRC_purge_the_communist_hardliners_desc: "Within our Party exists another kind of danger - not the liberal reformers who worship capitalism, but the hardliners cloaked in the banner of being "redder" and "lefter". They claim orthodoxy while sowing division; profess loyalty while quietly resisting. We must recognize the latent destructiveness of these "ultra-leftists". There can be no double-mindedness within the Party, nor any alternative roadmap.Any political document, mass mobilization, or cultural narrative not reviewed and approved by the Central Committee will be deemed unlawful. We will not tolerate any form of ideological deviation within the Party - no matter how red the banner they wave."
 PRC_party_of_the_chinese_patriots: "Party of the Chinese Patriots"
 PRC_party_of_the_chinese_patriots_desc: "We do not need every citizen to be a thinker, nor do we ask all to recite doctrine. We ask only one thing: love this country. The Party is not an abstract authority above the people - it is the shared structure of all who entrust their fate to the nation. True patriotism is not emotion, but action. It is a choice.When people begin to choose to stay, to participate, to obey - the Party fulfills its purpose. This will be a new project to reunite the patriots: they come from all walks of life, but all must be brought under unified command, reassigned within the Party's organization, and restructured in thought. Their patriotism must continue within the Party's framework - otherwise, their passion will fade into the margins of the system."
 PRC_pillar_of_crimson_sovereignty: "Pillar of Crimson Sovereignty"
 PRC_pillar_of_crimson_sovereignty_desc: "Wherever the Five-Star Red Flag flies, there is home. That red flag is not merely cloth - it is faith, it is will, it is a wall of conviction built with the blood and flesh of billions of Chinese sons and daughters. The era when we were called the "Sick Man of East Asia" has been buried by our own hands. The China that was butchered at will, humiliated by foreign powers, has long turned to ashes. Those who once groveled to the West with wagging tails - the spineless appeasers, the traitors who forgot their roots, the cultural slaves kneeling before foreign lands - have all been condemned by history.What stands here today is a new China forged from the blood of a hundred thousand youths, a crimson realm cast in iron will. Behind us flows the steel torrent of the people, the loyal souls of a billion hearts. Upon our shoulders rests the weight of millennia of civilization, the unfulfilled hopes of countless martyrs.We will make our enemies tremble, make Asia submit, and ensure that the future remembers:Red China shall never bow."
 PRC_obey_the_party: "Obey the Party"
 PRC_obey_the_party_desc: "Without the Chinese Communist Party, there would be no new China. The party represents the nation and the will of the Chinese populous. It is the duty of every citizen, be they are a toddler or an elder with half a foot already in the grave, all patriots must follow the command of the party. The wise words of the party leaders shall guide us towards a bright future, one where China overshines all its compatriots."
 PRC_state_of_permanent_mobilization: "State of Permanent Mobilization"
 PRC_state_of_permanent_mobilization_desc: "To safeguard national sovereignty, territorial integrity, and the interests of the people, we must enter a state of permanent, institutionalized mobilization - one in which military service is deeply respected and passionately revered throughout society. We must firmly instill this belief: the military is not just part of the nation - it is its foundation and core. Without the People's Army, there would be no present, let alone a future. Every individual who chooses to serve and devote themselves to national defense is a true hero of our era and a role model to be honored. All sectors of society should actively support military development, prioritize military interests, and treat the support of national defense as an unquestionable political responsibility."
 PRC_youth_military_brigades: "Youth Military Brigades"
 PRC_youth_military_brigades_desc: "To defend the homeland is the highest honor for the youth of this new era. We must build the military into a forge for the young, encouraging more aspiring individuals to take up arms and dedicate their youth and passion entirely to national defense. In the army, they will learn iron discipline and unity, and develop a resilient and indomitable spirit. They will become the backbone of national security - the steel shield against external threats and internal unrest. A strong generation means a strong nation."
 PRC_women_in_the_workforce: "Women in the Workforce"
 PRC_women_in_the_workforce_desc: "Skillful craftswomen and wise talents fight side by side, writing chapters of struggle on production frontlines. Through selfless contributions, they become indispensable links in the nation's industrialization process. In this era of united purpose and common progress, female laborers carry the light of ancient and modern civilization, displaying fearless spirit and creative power in workshops and fields. They not only support production lines but fulfill important missions in family roles. We will continue promoting women's labor development, letting them shine with colorful, incomparable beauty in the great tide of the era."
 PRC_youth_construction_brigades: "Youth Construction Brigades"
 PRC_youth_construction_brigades_desc: "The modernization of our country depends on generation after generation of youth dedicating themselves to the cause. We must widely mobilize and strongly guide young people to participate in major national projects - such as key infrastructure and frontier development - transforming their patriotism into practical contribution. Let them go where the country needs them most: to the construction sites, to the borderlands, to the most demanding environments. There, in concrete and steel, they will forge their character; in sandstorms and scorching sun, they will deepen their devotion to the nation."
 PRC_the_wave_of_patriotism: "Wave of Patriotism"
 PRC_the_wave_of_patriotism_desc: "The dominant values of a society shape the spirit of a nation and determine the direction of its future. We must launch a comprehensive and systematic wave of patriotic education, using the heroes of the socialist revolution, war of resistance, and national reconstruction as shining examples to inspire pride and love for the motherland among young people. Through film, literature, and online media, we will honor those who made outstanding contributions to national independence, liberation, and socialist development - helping the younger generation understand that today's peace was hard-won, and that tomorrow's nation will depend on them to defend it."
 PRC_hold_snap_party_congress: "Hold Snap Party Congress"
 PRC_hold_snap_party_congress_desc: "We are now facing the most severe moment since the founding of the Republic. The Party has been torn apart by factional struggles, and unity and trust are being gravely eroded. If we continue to harbor illusions and fail to take decisive action, the Republic will inevitably collapse. For the survival of the nation and the future of our people, we must immediately convene an snap Party Congress. We must unify our thinking, clarify our direction, and put forward concrete and effective measures to rescue the nation from peril and win a future for the Chinese people."

 PRC_protectors_of_the_chinese_nation: "Protectors of the Chinese Nation"
 PRC_protectors_of_the_chinese_nation_desc: "The Chinese nation is no single tribe or tongue, but a knot of millennia of sand and blood, the refuge mountains and rivers grant to fate, the word "we" learned by common folk amid war and wandering. This land is vast, once too silent; to become whole again it must forge itself into a solid shield - not a weapon to strike, but a guard to keep the Chinese people from being torn apart. This shield bears no name, chooses no bloodline; it faces one way only: every blade aimed at division will shatter against it."
 PRC_secure_the_sinosphere: "Secure the Sinosphere"
 PRC_secure_the_sinosphere_desc: "Many of the nations around us are trying to shake off the civilizational coordinates history assigned them. Flying the banner of "multiculturalism" and invoking "national identity", they distance themselves from their cultural source, as if denying the lessons they once absorbed could instantly make them part of another world. But slogans cannot rewrite history. Whence came their laws, scripts, rites, and attire? Who first taught their earliest city-states to set words to clay? They will not admit it, yet cannot erase it: the seed of their civilization did not arrive by sea - it was passed down from the land called China. The Sinosphere is no mere document; it is a living sense of order. Strip it away, and their societies will slide into ethnic strife and identity-driven decay. We will not stand aside; we will do all we can to strengthen the influence of Sinospherein those lands."
 PRC_the_issue_of_religions: "The Issue of Religion"
 PRC_the_issue_of_religions_desc: "In times of turmoil, gods bring solace; before the state, they bring distraction. They teach people to look heavenward, not to shoulder duty - to obey fate, not to defend the homeland. Across centuries, devotion and courage have been swallowed by the divine, families broken by belief. Today we confront this power and ask: do you soothe hearts, or cleave the land? Sects that detach from the soil and spurn coexistence, "organizations" that heed commands from afar, will find no refuge. We do not oppose faith, but faith must bow to the people's shared destiny."
 PRC_reconciliation_with_folk_sects: "Reconciliation with Folk Sects"
 PRC_reconciliation_with_folk_sects_desc: "Some beliefs have seeped into the village's ancient trees, the ash on yellowed paper, the joy that rises with the stove's first flame. These centuries-old rites are neither fiercely exclusive nor bent on organization. They are a pause in life's rhythm, a balm in hard times; those who know them well find reverence and filial piety within. Such faiths need no iron walls nor quick labels of "heresy". Let them stay where they belong: as long as they do not seek to become banners or stand outside the state, they can remain part of the Chinese nation."
 PRC_state_atheism: "State Atheism"
 PRC_state_atheism_desc: "We can no longer allow religion to persist. Gods cannot generate electricity, heal the sick, build bridges, or raise walls - people can. If the Chinese nation is to keep advancing, it must shed its dependence on the unknowable and learn to trust only what is within human control. The path of the state admits no detours, and the order of the people must not be torn by deities. Abandoning religion is not meant to shackle thought; it is to redirect faith toward ourselves, devotion toward the motherland, and hope toward what human hands can achieve.。"
 PRC_speed_up_sinicization: "Speed up Sinicization"
 PRC_speed_up_sinicization_desc: "We can't afford to wait any longer. Patience, respect for difference, and the hope that recognition would follow have not delivered unity, nor can respect alone guard against the risk of fracture. Language walls still stand and mental divides remain; any further delay will trap more young people in parochial knowledge and closed customs, leaving them out of step with national progress and the pace of the world. We must accelerate. No one should keep living outside the flow of information, the nation, or the era. More children must learn Mandarin from the start, grasp our shared history, and move, speak, and live comfortably in big cities. They should never again be stopped by a job posting or pushed aside, misunderstood, or forgotten because of cultural difference."
 PRC_expel_foreign_forces: "Expel Foreign Forces"
 PRC_expel_foreign_forces_desc: "They claim to come for exchange, for aid, to bring "more advanced" ideas, yet their true purpose has never changed. Step by step they infiltrate - into our schools, our culture, our public discourse - spinning new lies in the language of "universality". They aim to steal our classics, rewrite our history, and seize our narrative, like the uniformed, Bible-bearing colonizers of a century ago who treated Chinese civilization as a quarry and then preached as if it were theirs by right. Against every foreign force that dares lay hands on our thought and faith, we will wipe out their channels and organizations. Only by driving out these invaders, cloaked in the garb of "civilization", can the Chinese nation stand firm on its own cultural ground."
 PRC_smash_islamism: "Smash Islam"
 PRC_smash_islamism_desc: "In China, every faith must first answer one question: Will you be part of the Chinese nation? Muslims have already given their answer. They shun our schools, our laws, and coexistence with other groups; they are not defending belief but erecting barriers. Their eyes never turn to the Yellow River or to the people; instead, in the mosque's call to prayer, they cling to hatred and exclusion. Confronted with such hostility, we have no room to yield. Everyone must understand: the nation's laws stand above all, and the honor bound up in the words "Chinese nation" stands above all."
 PRC_enforce_minority_integration: "Enforce Minority Integration"
 PRC_enforce_minority_integration_desc: "We have never tried to erase anyone's memories, silence anyone's voice, or strip anyone's identity. Everything we do is to give other ethnic groups a larger home - the Chinese national community. Diversity should be the bedrock of unity, not a reason for division. Only when every group speaks one language, studies one history, and honors one culture do they truly belong to this country rather than its fringes. We want the children of all fifty-five minority groups to recite the Analects, sing the "March of the Volunteers", know the tale of the Great Wall, and grasp the moods of the Yellow River. Their future is not in prayer or ritual, but in Mandarin classrooms, on military drill grounds, and under our shared flag."
 PRC_the_final_blow_to_christian_cults: "The Final Blow to Christian Cults"
 PRC_the_final_blow_to_christian_cults_desc: "From the day Christianity set foot on this land, it has pursued one true mission: to weaken our culture, erode our convictions, and treat our ancient civilization as a wilderness to be tamed. They claim to spread love, yet never hide their contempt for our ancestors or their dismissal of our classics. They rewrite humiliation as pardon, dress invasion as salvation, and varnish shame as redemption. From the pulpit they preach charity; in reality they practice enslavement. They want Chinese people to recite their Bible but not remember their own forebears; they want us to kneel to the West yet fear we will raise our heads to see the glory of the East. This spiritual poison has afflicted our people for too long - we must bring down the hammer of history and make the cross fall from the East for good."
 PRC_the_new_chinese_revolution: "The New Chinese Revolution"
 PRC_the_new_chinese_revolution_desc: "Once, our revolutionary martyrs rescued the suffering masses and established a newborn people's state. Recently, however, commodity fetishism has eroded hearts, hiding truth beneath material desires. We must rekindle that revolutionary spirit, shatter false illusions with iron fists, and push the nation again toward a sober, plain path of rejuvenation. Civilize the spirit, strengthen the body. Only thus can China again become an unshakeable giant on the world stage."
 PRC_spiritual_renaissance: "Spiritual Renaissance"
 PRC_spiritual_renaissance_desc: "Our nation has never bowed to invaders. For thousands of years, though Chinese people have endured hardships, they've forged steel-like national integrity. Now, the tide of rejuvenation is unstoppable. This isn't merely national prosperity but historical inevitability, the people's choice. United, revitalizing China, we will certainly create a brilliant new era. Any force attempting to block the Chinese people's forward march will be ground to dust!"
 PRC_chinese_defenders_from_grassroots: "Chinese Defenders from Grassroots"
 PRC_chinese_defenders_from_grassroots_desc: "True loyalty isn't inked on resumes or tucked away in high-rise offices. It lives in every bolt a shop-floor worker tightens, in the silent night-watch of a frontier soldier, in the village chief's crackling loudspeaker. To find the nation's backbone, we must go down among the quiet many and bring them back, one by one. Those who have endured hardship, shed blood, been deceived, yet still believe in the state are the truest patriots. We will draw them into the system and forge their plain patriotism into the steel framework of our institutions."
 PRC_revolutionary_troch_renewed: "Revolutionary Torch Renewed"
 PRC_revolutionary_troch_renewed_desc: "During the century of national humiliation, the Chinese nation awakened like a sleeping lion, with mass movements converging into earth-shattering waves. Revolutionary leaders, with iron will and selfless spirit, led billions to rebuild a prosperous strong motherland on impoverished ruins, utterly shattering the shackles of imperialism and feudal forces. With collectivism as their banner, they united all ethnic children, forging an unbreakable unified nation. Revolution wasn't merely transforming production relations but a grand soul-cleansing for the people: each person standing as history's master, proudly pushing the era's torrent. We must forever maintain the pure heart of children, inherit the martyrs' will, with thorough struggle spirit, shatter today's humiliation, meet all challenges, continue the revolution, and seize one glorious victory after another!"
 PRC_the_great_chinese_nation: "The Great Chinese Nation"
 PRC_the_great_chinese_nation_desc: "The Chinese nation did not spring from nothing - it is iron forged in countless wars, bone shaped by hunger and revolt, hands that reclaimed order from civilization's ruins. We are not pupils of others but teachers of the world: while they still struck sparks in forest clearings, we were already writing classics and founding administrations; while they waged wars of religion, we had learned to settle the people, link waterways, and pass culture down the generations. Without China, today's East Asia would be a tree without roots, and modern Western civilization - from gunpowder and the compass to printing and ideas of governance - glows by light first kindled here. We have tasted both humiliation and glory, yet never forsaken the creed of "all under heaven for the common good", nor the dream of unity for all peoples. China has never been merely a country; it is civilization itself, the main axis history cast in the East. So long as this nation draws breath, the world will not slip wholly into darkness; so long as this flag flies, history still has hope."
 PRC_will_of_the_chinese_people: "Will of the Chinese People"
 PRC_will_of_the_chinese_people_desc: "A nation's decisions are never just top-down orders; they rise from the shared silence of countless ordinary people - from their longing for order, their hope for unity, their stubborn pursuit of stability. They may be quiet, confused, even at times adrift, yet their wish is clear: no chaos, no division, no return to an era of every man for himself. When we press on with integration, reform, and unification, these policies give voice to desires they have never spoken; it is they who grant us the mandate to act - and who make action imperative. China's heartbeat has never throbbed in lofty halls; it beats in the fields, on the factory floor, and along the streets."
 PRC_the_fortress_of_blood_and_flesh: "The Fortress of Blood and Flesh"
 PRC_the_fortress_of_blood_and_flesh_desc: "China has seen no shortage of foreign invaders. From the Mongols to the Japanese, our nation has been the eye candy of many aggressors. Yet why, in her 5000-year-long history, has China never been fully conquered? Why have the Chinese people always been able to overcome all invaders and retain their national identity? Because of the virtues of the Chinese people. This cultural creed is carved deep into their bones. It was the countless Chinese heroes who gave their lives to defend this land, which they hold dearest. This land, which they call home. Yue Fei, Dong Cunrui, and the countless nameless men and women who bled for this nation are what made us great, what made China what she is today."
 PRC_seize_back_the_chinese_century: "Seize Back the Chinese Century"
 PRC_seize_back_the_chinese_century_desc: "Chinese civilization flows like a mighty river, unceasing through millennia. Once, Western winds blew eastward, temporarily dimming the glory of the Celestial Empire. Today, we descendants of Huaxia stand tall again at the world's summit, writing a new chapter with wisdom and courage, rebuilding the glory of our civilization. We must not blindly follow foreign ways, but return to our cultural roots and national spirit. Those who plot to divide our territory will vanish before our national will. The children of China will forge a glorious future epic with unwavering conviction."
 PRC_embrace_the_imperial_administrative_system: "Embrace the Imperial Administrative System"
 PRC_embrace_the_imperial_administrative_system_desc: "In those glorious years, imperial power shone like the midday sun, with rites and institutions becoming swords for unifying people's hearts. Rulers forged national strength through benevolence, righteousness and diligent governance, establishing prestige not only inland but becoming models for frontier barbarians to emulate. When expanding territories, they not only repelled enemies with military might but civilized all directions through cultural virtue. That was when Chinese civilization rose like the morning sun, its radiance spreading across Asia. We must revisit this ancient wisdom, emphasizing both civil and military prowess, to recreate a magnificent golden age."
 PRC_instill_confucian_values: "Instill Confucian Values"
 PRC_instill_confucian_values_desc: "Through countless generations, Confucian texts have coursed through the blood and bones of the Chinese nation. Throughout history, Confucianism has illuminated the great significance of propriety, righteousness, integrity, and honor. Other schools of thought, though diverse, are merely details within our cultural foundation. Only by irrigating our souls with Confucian ethics can we achieve true internal unity and external strength. We must make it the pillar of unified thought, forging a powerful nation of sages. All political education must center on this, letting every Chinese person raise the banner of cultural confidence and reach the pinnacle of historical greatness."
 PRC_rites_of_zhou: "Rites of Zhou"
 PRC_rites_of_zhou_desc: "Di Xin of Shang's tyranny lost Heaven's mandate; Tang and Wu's revolution revealed justice. Like King Wu of Zhou's overthrow of Shang, we must eliminate all unreasonable shackles. The conquest of Shang was not merely a power transition but an opportunity for civilization's rebirth. The rise of Zhou parallels our nation's emergence from ruins, with renovation as foundation and vengeance as weapon, unifying all under heaven in a new era. Today's world needs our Zhou guidance to witness again the brilliance of Chinese civilization."
 PRC_new_ban_from_hundred_philosophers_campaign: "New "Ban From Hundred Philosophers" Campaign"
 PRC_new_ban_from_hundred_philosophers_campaign_desc: "History has irrefutably proven that only empires with unified thought can build magnificent hegemonies. Today, the toxic currents of progressivism and liberalism spread everywhere, with the new left and liberals lurking in academic halls, disrupting public opinion and muddying the fields of arts, sociology, economics, law and other domains, undermining the foundations of our universal civilization. We must take thunderous measures to dismiss these nutritionless heretical doctrines. Only by forging an impregnable ideological wall, rejecting barbaric thoughts from afar, can we defend Chinese civilizational sovereignty and revive our great glory."
 PRC_revolt_against_the_modern: "Break the Western Paradigm"
 PRC_revolt_against_the_modern_desc: "Those self-proclaimed progressive mediocrities, fairness-worshipping fools, and idlers trumpet false "liberation" while concealing noble order. Their vaunted revolutions - absurd cultural catastrophes, clamoring mobs - merely trample sacred hierarchies into dust, exchanging them for disordered noise and suffering elites. True power never stems from the mutterings of the weak or the delusions of the ambitionless lower classes, who burden our civilization with debased culture and barbaric reproduction. The left plots to overthrow the elite with their mass theatrics. Yet civilization's rebirth cannot be achieved through beggars' revelry. We must, with cold resolution, expel inferior erosion and reshape order with steadfast hearts."
 PRC_the_dragon_who_devoured_the_sun: "The Dragon Who Devoured the Sun"
 PRC_the_dragon_who_devoured_the_sun_desc: "History has ordained it thus: only the strong control destiny. The Japanese pirates will ultimately be devoured by us. Those traitors and spies attempting to divide us will inevitably dissolve before our magnificent righteousness. In this process, we will forge an unshakeable unified will with the blood and sweat of the entire nation, dominating the forest of world nations."
 PRC_great_history_continues: "Great History Continues"
 PRC_great_history_continues_desc: "We were once the heaven-ordained pivot of the world - the dawn of civilization, the fountain of order. Chang'an, Luoyang, Kaifeng, Nanjing, Beijing: each city ruled the seas and welcomed all nations. Our tribute system, legal codes, and arts of brush and ritual set the template for East Asia and offered a model to the world. Then, in a brief and bitter interlude, Western colonizers tore civilization from its destined course. With cannon they forced our gates; with lies they rewrote our history, importing shoddy institutions and fractured tongues into our schools while denying that every prototype was already perfected in our past. Now the hour of revival has arrived. We will resume the great course that was interrupted and remind the world: without China's ancient axle, modern order can never hold; a future that rejects China's historic authority forfeits the right to call itself civilized."
 PRC_the_good_old_china: "The Good Old China"
 PRC_the_good_old_china_desc: "That was an era truly our own: the Son of Heaven guarded the realm's gates, scholars upheld ritual and virtue, and craftsmen followed clear rules. From the ends of the sky to the edges of the sea, all who lived between mountains and rivers acknowledged China as their suzerain and took it as their model. China did not need to seize every territory; its moral authority and laws reached the four corners on their own. The West, still mired in superstition and darkness, would centuries later presume to "discover" the world and dictate its order. Today they dress their primitiveness in "modern history" and hide our sages behind talk of "Enlightenment". They claim our inventions as theirs, then call us "backward", but the record shows they are thieves of civilization, falsifiers of history, eternal imitators who can never surpass us. Our golden age has not ended - it is only waiting to be resumed. When that moment comes, the true world order will again center on China, and the glorious past that never left us will return in full."
 PRC_empire_under_facade_of_the_republic: "Empire under Facade of the Republic"
 PRC_empire_under_facade_of_the_republic_desc: "A nation that upholds the People's Democratic Dictatorship, a state built on socialist principles, now stands in the world under the name of Empire. In the past, such a transformation would have been condemned as a betrayal of communism. But today's China has shattered those outdated judgments with undeniable reality.We have not denied the legitimacy of revolution, nor have we abandoned the tenets of collectivism. On the contrary - we have built a nation rooted in the people and in the brilliance of our ancient traditions, with socialism as its flesh, and empire as its spine.The road ahead is still long. The struggle is far from over.But we have taken the hardest step:After enduring countless trials, the Empire has sunk its roots deep into this ancient and awakened land."
 PRC_traditional_gender_roles: "Traditional Gender Roles"
 PRC_traditional_gender_roles_desc: "Ancient sages penetrated heaven's principles, clarifying the distinction between men and women. The way of husband and wife is perfectly embodied in the Three Cardinal Guides and Five Constant Virtues: modest gentleness complementing outward courage. This isn't merely the natural divine social order but the fundamental basis for maintaining ethnic ethical foundations and achieving magnificent prosperity across generations. Men shoulder family and national responsibilities while women guard warm homes, complementing each other. Today, however, feminism runs rampant, attempting to destroy this traditional wisdom verified through millennia, causing moral collapse. We conservatives defending harmony are frequently slandered by feminists, labeled "patriarchal oppressors". Nevertheless, we firmly believe that only by resisting these destructive ideological trends and protecting ethical morality can we achieve family-national harmony and united rejuvenation."
 PRC_revive_traditional_culture: "Revive Traditional Culture"
 PRC_revive_traditional_culture_desc: "For 8,000 years, Chinese civilization has remained uninterrupted. We have our own orthodoxy, rituals, and philosophy. Yet over the past century, in order to "integrate with the world" and for the sake of so-called "international alignment," we have repeatedly and willingly severed our cultural backbone. We tore down ancestral halls, mocked the sages, discarded ancient texts, and forgot our language. We wore the shackles imposed by the West and recited their mantras of "freedom" and "human rights." Our youth grovel before Japanese and Korean entertainment; our scholars beg the West for theoretical frameworks; our families revere leftist Western values; and our society sinks into decay under the weight of materialism and consumerism.Now, our nation has reached the moment where it must awaken! We must completely purge the erosion of Western culture, destroy every hypocritical façade of "diversity" and "tolerance," and remold the forgotten Chinese people into true Chinese people!"

 PRC_stability_and_security: "Stability and Security"
 PRC_stability_and_security_desc: "The prosperity of our motherland and the revival of our nation rest on one fundamental premise: absolute social stability and comprehensive national security. Without stability, all ambitions are empty talk; without security, everything will collapse. Today, China is roiled by undercurrents and order teeters on the brink of breakdown. In response, we will spare no effort to restore discipline, re-forge authority, and build a new era of China - united in will and unified in action."
 PRC_conquer_the_corporations: "Conquer the Corporations"
 PRC_conquer_the_corporations_desc: "Capital knows no loyalty; it heeds profit, not the state. Left to expand, it will skirt institutions, meddle with policy, and sway minds. We must fold it into a single plan, taking charge of its data streams, cash flows, and channels of influence. From now on, capital must disclose its sources, report its movements, and submit to redistribution. Henceforth, it will run only on tracks laid by the state, serving the common good and surrendering the freedom to grow unchecked. Wealth is not power; it is a tool of governance - cross the line, and you are replaced."
 PRC_absorb_technical_blood: "Absorb Technical Blood"
 PRC_absorb_technical_blood_desc: "Talent must not be left to the marketplace, let alone held by non-state entities. Engineers, coders, and researchers are resources the nation urgently needs; they will be identified, screened, classified, assigned to task groups, subjected to ideological cleansing, and then deployed to key projects. No more chasing bonuses or sparring in meetings - they will enter the system and solve problems. Technology obeys when properly controlled - and so do people."
 PRC_pursuit_of_full_automation: "Pursuit of Full Automation"
 PRC_pursuit_of_full_automation_desc: "A system cannot hinge on human fatigue, hesitation, or change of heart. The fewer manual interventions and the more self-running structures, the safer society becomes. From logistics scheduling and city management to data oversight and behavior assessment, every node should switch to autonomous mode. Machines don't delay, complain, or haggle; once the rules are set, they execute - without a flicker of doubt."
 PRC_science_exclusively_for_the_state_interests: "Science Serves the State"
 PRC_science_exclusively_for_the_state_interests_desc: "The worth of technology is measured not by its sophistication but by its obedience. Any scientific breakthrough that fails to serve the nation's aims is wasted; one that deliberately strays from the state's course becomes a threat. All technology must orbit a single, unified command - research may not chart its own course, projects may not set their own agenda. Science is no neutral implement; it is the tool the state wields to safeguard its people."
 PRC_general_pursuit_of_discovery: "General Pursuit of Discovery"
 PRC_general_pursuit_of_discovery_desc: "Science should know no boundaries. What we call "ethics" is merely a buffer drawn in fear by an outdated humanity - a last tactic by the lagging to slow the pace of progress. In the vastness of the universe, old notions of morality, ethics, and law hold no weight. Cloning is shunned because they fear creating beings more perfect than themselves. Enhancement is resisted because they cannot accept a future where birth is no longer bound to nature. Privacy is revered only because they dread being seen through by a more powerful system. We will dismantle these fabricated red lines. Standards will no longer be set by "morality", but by efficiency and outcome. Any research that makes the system more stable, the structure more unified, the individual more obedient - must move forward. Any ethical alarm that hinders uniformity or disrupts collective design - must be cleared away."
 PRC_the_authority_of_the_best_minds: "The Authority of the Brightest Minds"
 PRC_the_authority_of_the_best_minds_desc: "An efficiency-driven government cannot let emotion steer policy or gut feelings decide right and wrong; emotion is too slow and too fickle. Many think themselves "good people", yet they hesitate and waver. We therefore need an authority that ignores notions of good and evil and focuses solely on outcomes - execution matters more than intent. Some choices will spark controversy, but they must be taken. Compassionate judgments are no substitute for steady results, and authority is the instrument that guarantees them."
 PRC_moving_toward_a_digital_state: "Moving Towards a Digital State"
 PRC_moving_toward_a_digital_state_desc: "Running a society is like operating a complex machine: the naked eye falls short, intuition is too vague. We must use data to build a holographic view, so every person, every street, every choice leaves a trace and feeds a model. Digital identity will underwrite the system, and behavior patterns will set risk levels. Each deviation can be caught, every danger foreseen. People will cease to be just people - they will become dynamic variables, and stability will rest on their obedience to the system."
 PRC_going_beyond_ethics: "Going Beyond Ethics"
 PRC_going_beyond_ethics_desc: "Moral standards cannot be measured, quantified, or enforced, and at critical moments they often push a system toward collapse. Institutions must rest on structure, not goodwill; a decision need not be "pretty" - if it secures stability, it is justified. Real responsibility lies with order, not morality; when only one choice remains, right and wrong no longer matter."
 PRC_sinofuturism: "Sinofuturism"
 PRC_sinofuturism_desc: "Sinofuturism is neither a stand-in for the West's tech trajectory nor a flare-up of nationalist emotion; it is a structured blueprint for the future. It spurns the cult of "originality", favoring replication and iteration; it values coordinated efficiency over individual spirit; it pursues a unified logic rather than freewheeling innovation. Its essence is this: China will no longer strive to be understood, but to be implemented. The world must synchronize with China to keep pace - refuse, and it will be left behind."
 PRC_perfectly_calculated_freedom_for_all: "Perfectly Calculated Freedom for All"
 PRC_perfectly_calculated_freedom_for_all_desc: "Freedom is a responsibility, not an entitlement. Drawing on data such as political loyalty and ideological steadiness, we will assign each citizen a personalized "freedom quota", using a tiered system to set their rights to travel, speak, and express. The loyal receive broader privileges; the wayward face limits; the defiant lose all licenses. Freedom is not owed to you - it is a reward the state bestows. Under this regime, freedom will no longer feed chaos; it will become the strongest stabilizer and the most effective tool of reward and punishment. The people will learn contentment in obedience and discover happiness within constraint."
 PRC_huge_machine_of_the_china: "The Huge Machine of China"
 PRC_huge_machine_of_the_china_desc: "Stability cannot rest on individual goodwill, nor efficiency on leisurely process. China must run as one vast machine, each person a component that turns steadily, meshes precisely, and produces continuously, driving the system ever faster. Whoever jams the gears is replaced; whoever tries to reverse them stops the machine for inspection."
 PRC_great_changes_unseen_in_a_century: "Great Changes Unseen in a Century"
 PRC_great_changes_unseen_in_a_century_desc: "The tides of the world surge unstoppable: align with them and prosper, resist and perish. The old rules are crumbling, yesterday's hegemony is rotting, and every nation waits for a new order to be born. For us, this is China's moment - fall one step behind and others will dictate your fate; move one step ahead and you will write the script. Either set the rules or follow someone else's; this era no longer believes in neutrality, nor does it leave room for hesitation."
 PRC_empower_the_mss: "Empower the MSS"
 PRC_empower_the_mss_desc: "The MSS will become the power center and operational hub of national governance in the new century. Its mandate will extend beyond eliminating hostile forces: it will penetrate every tier of the state apparatus and every corner of people's daily lives. We will broaden its authority, granting it priority access to all intelligence, personnel, and resources, allowing it to bypass cumbersome procedures and act directly. Under the MSS's unified command, any individual, organization, or ideology that diverges from national objectives will be deemed a threat - and must be eradicated."
 PRC_all_society_political_investigation: "Expand the Political Investigation System"
 PRC_all_society_political_investigation_desc: "A citizen's worth is not determined by birth but by complete mental alignment with the state. We will build a comprehensive system of universal surveillance and real-time political screening, constantly reaffirming that "correct thought" is the sole prerequisite for existence. Every facial expression, browsing habit, and chat log will become an evaluative metric; any stance that is "neutral", "ambiguous", or "wait-and-see" will be flagged as a warning. We will not punish dissent - we will redefine all dissent as pathology. We will not argue over truth - we will allow the single truth to permeate, silently, like the very air itself."
 PRC_generation_of_patriots: "Generation of Patriots"
 PRC_generation_of_patriots_desc: "We cannot entrust our children to society and expose them to ideological poisons. We must forge the nation's successors with our own hands - starting in infancy, at the earliest stages of language and cognitive development. We will intervene comprehensively in education, establishing a unified curriculum, a unified media environment, and a unified way of life, cutting off every avenue of foreign cultural infiltration. Before their brains form autonomous pathways, we will implant a single standard: the homeland comes first, and the Party stands supreme.Intellectual pluralism is a disease; cultural diversity is a toxin. The next generation must speak only one language - the language of loyalty. They will know neither betrayal nor resistance; they will no longer ask, "Who am I?" but will proudly answer, "I am a part of the nation.""
 PRC_officials_on_social_media: "Digital Watchdogs"
 PRC_officials_on_social_media_desc: "The internet is a battlefield of ideas, and public-opinion officers hold the front line. From our most loyal ranks we will select a core team of discourse managers, stationed around the clock across major platforms and chat groups. Their mission is to monitor hostile messages, correct fringe sentiments, and craft a unified narrative. They will not merely delete misguided remarks; they will guide the public to absorb the correct line at a subconscious level."
 PRC_party_under_mss_control: "Control the Party"
 PRC_party_under_mss_control_desc: "The Party is the nation's root, and the MSS its blade. We will abolish the inefficient practice of "self-supervision" and place all Party oversight directly under the MSS, completing a closed loop in which "the Party sits within the state, the state stands outside the Party". Every member will face regular ideological screenings, loyalty cross-audits, and structural reassessments; any hint of laxity, corruption, or double-dealing will be cut out on the spot. Inside the Party there will be no blur, no gray zone - only absolute conviction and total obedience."
 PRC_expand_the_surveillance_state: "Expand the Surveillance State"
 PRC_expand_the_surveillance_state_desc: "Total security, zero blind spots. We will fully upgrade the Sky-Eye system, extending seamless coverage from city to countryside, from workplaces to private spaces. All data will be integrated into a single repository - a database that knows the people better than they know themselves. Within this system there will be no loopholes, no accidents, no disorder, no unrest - only pure stability and safety."
 PRC_agents_elite_of_the_nation: "Agents - Elite of the Nation"
 PRC_agents_elite_of_the_nation_desc: "They do not appear in the news, nor do they issue public statements. Nameless, faceless, and voiceless, they are present in every corner. They watch the crowd while blending into it; without awaiting orders, they can distinguish friend from foe. They are not heroes, for they have no need of remembrance; they are not ordinary citizens, for they stand beyond that category. Their task is to ensure potential chaos never materializes, to keep the enemy forever silent. If all is peaceful, it is because they remain ever vigilant; if people live contented lives, it is because these guardians bear the burden in silence."
 PRC_total_security: "Total Security"
 PRC_total_security_desc: "Only when the nation is secure can the realm know peace. We must dismantle every mechanism that breeds uncertainty - personal will, free choice, diverse voices. All of these are seeds of unrest. Every citizen must come to understand: "My very existence is granted by the state; my purpose is to serve the state." Individual will must yield to collective interests; personal pursuits must align with the national vision. Only under the Party's leadership, with all people tightly united, can we usher in a true era of peace and prosperity."
 PRC_keepers_of_the_chinese_idea: "Keepers of the Chinese Idea"
 PRC_keepers_of_the_chinese_idea_desc: ""Great is China! The ancient sage-kings framed the first institutions and rites - they are the wellspring of civilization."\nThe idea of "China" has never been settled by polite debate; it is a product of history, forged in sacrifice and blood. It admits no comparison, dilution, or doubt. Western-imported words and ideas will find no refuge here: textbooks will drop corrosive notions such as "equality", "pluralism", and "rights", and culture will purge aesthetics tinged with the West. We will defend the singular, unshakable Chinese path. China is China because we have never tolerated betrayal."
 PRC_the_ministry_that_controls_everything: "The Ministry That Controls Everything"
 PRC_the_ministry_that_controls_everything_desc: "Efficiency and order must not be stalled by fragmented administration. We will establish a true central agency that integrates intelligence, security, governance, and ideological work. Free from local interference, vested interests, and ritualistic procedures, it will focus solely on one aim: preserving national unity, ensuring the people's stable lives, and purging all non-native ideas and influences."
 PRC_military_and_party_in_one_mind: "One Mind for the Military and the Party"
 PRC_military_and_party_in_one_mind_desc: "The muzzle of a soldier's rifle must never hesitate, and a soldier's loyalty must never lag behind. Every member of the armed forces is not only a tool of combat but an organ of political will. Tactics serve strategy; actions obey ideology; the essence of service is obedience. Against foreign foes, they advance; against domestic unrest, they suppress; against hesitation, they purge. The Party is the soul of the army, the gun is the Party's instrument, and only through the unity of Party and military can the machinery of the state operate in a seamless, closed loop."
 PRC_mobilize_ministry_of_public_security: "Mobilize the Ministry of Public Security"
 PRC_mobilize_ministry_of_public_security_desc: "The public security apparatus is the sharp blade of the state, the violent core that upholds order. Any gathering, whisper, or unusual expression can serve as grounds for intervention; any lack of cooperation, hesitation, or silence will provoke a systemic response. Public security no longer merely reacts - it proactively steps in and eliminates threats. Society doesn't need negotiation; it needs deterrence. The people don't require persuasion; they require discipline. Only under the guidance of batons and sirens will cities grow quiet, the people remain steady, and the nation move forward."
 PRC_purity_and_honesty: "Purity and Honesty"
 PRC_purity_and_honesty_desc: "The state apparatus has no need to keep asking "why"; it needs every cog to know "how". Citizens must be more than the obedient - they must be executors. Thought patterns must be standardized, action paths drilled. To build a truly efficient society, we must reconstruct cognition at its source. Emotional expression and personal opinion will be cut from basic education; the ideal citizen is one who grasps orders instantly, completes them correctly, and never steps beyond the line. Everything else is excess."
 PRC_mind_and_skills: "Mind and Skills"
 PRC_mind_and_skills_desc: "Ethics education breeds hesitation; moral standards leave laggards behind. Humanity still operates within an outdated cage that encourages expression, forgives mistakes, and tolerates disorder - yet all of this slows the advance of technology and institutions. If our motherland is to stand at the forefront, it cannot wait for those who doubt, question, or idolize humanitarianism. True progress never comes from compromise but from surpassing limits. While others debate "should we", we are already testing "is it efficient". If this generation cannot keep pace, it must clear the way for the next."
 PRC_redefine_people_protection: "Redefine People's Protection"
 PRC_redefine_people_protection_desc: "Protecting the people does not mean retreat, compromise, or tolerance, nor does it allow individual desires to override the nation's collective interest. True security begins only after every potential source of disorder is identified, isolated, and neutralized. A "well-intentioned" slip of the tongue, an inadvertent leak, a vague mood - if it threatens stability, it is a potential danger. Our actions are not meant to oppress anyone; they are to spare the people from being swept up by danger, chaos, and the unknown."
 PRC_encourage_digitalization_nat: "Encourage Digitalization"
 PRC_encourage_digitalization_nat_desc: "We will drive a comprehensive digital overhaul of society, creating a unified national digital-identity system that monitors data across every life stage - from birth to death - enabling behavior prediction and value assessment. Every action will leave a trace, every datum will converge, and every life will be open to analysis."
 PRC_permeate_the_whole_world: "Permeate the World"
 PRC_permeate_the_whole_world_desc: "The nation's gaze must not end at its borders, nor settle for passive defense. Frontiers define geography, not the limits of thought or speech. We must step forward, strike first, and shape the global discourse, stamping our mark on every corner of the information sphere. Hostile forces already occupy the world's opinion arena, wrapping lies in a false freedom and practicing spiritual colonialism under the banner of "universal values". Their aim is to silence us, to bury truth in noise. We will not stay silent. We will speak - and ensure ours is the only voice of truth."
 PRC_key_to_omniscience_and_omnipotence: "Key to Omniscience and Omnipotence"
 PRC_key_to_omniscience_and_omnipotence_desc: "Every camera, every data processor, and every piece of information in this land is under our control. Those who think they can resist us, hiding in the shadows, believing their actions are undetected, are gravely mistaken. Every move they make, every word they speak, is already under our watchful eyes, leaving them nowhere to hide.They live not in darkness, but under a gaze beyond the reach of light."

 PRC_operation_wu_qi: "[GetWuQiName]"
 #PRC_operation_wu_qi_desc: "Comrades, do you hear the thunder of war drums? Do you hear the cries of countless oppressed Asian nations? This is the mission of our generation! Let us raise the torch of revolution, ignite the roaring waves of the Pacific, and eliminate the imperialist forces plaguing all of Asia. Only by eradicating these oppressors can we bring true freedom and peace, restoring the dignity and prosperity of the Chinese nation!"
 PRC_operation_wu_qi_desc: "[GetWuQiDesc]"
 PRC_operation_tiangong: "OPERATION: §CTIANGONG§!"
 PRC_operation_tiangong_desc: "Baseness is a passport for the base,\nHonour an epitaph for the honourable.\nSee how the gilded sky teems\nWith the twisted shadows of the dead.\nThe ice age is over,\nSo why does ice still bind the world?\nThe Cape of Good Hope has been discovered,\nSo why is the Dead Sea still thick with sails?\nI come into this world\nCarrying only paper, rope and a shadow,\nTo proclaim before judgment is passed\nThis plea of the judged."
 PRC_operation_xuanyuan: "OPERATION: §OXUANYUAN§!"
 PRC_operation_xuanyuan_desc: "The greatness of the Chinese nation lies in our own culture and moral order.\nEvery part of the world was destined to be unified under Chinese civilization.\nVengeance is a duty that must never be forgotten, even after a hundred generations.\nAs long as the path is righteous, no matter how many enemies stand before us, we must press forward with unwavering resolve.\nTherefore, today, we must shoulder the cause of justice and avenge our nation.\nEveryone who raises a banner must never forget the hatred borne by our ancestors; everyone who holds faith must never allow foreign tribes to run rampant on our land.\nWe shall cleanse our humiliation with blood and redeem our honor through unification, so that all under heaven may witness the greatness of the Chinese nation, and the entire world may stand in awe beneath the mandate of our destiny."
 PRC_operation_huguo: "OPERATION: §RHUGUO§!"
 PRC_operation_huguo_desc: "An unseen hand brushes across the boundless rivers and mountains,\nIts fingers stained with blood and ash, its palm soaked in darkness.\nOnly in a distant corner does the land remain whole,\nWarm, luminous, steadfast, and bursting with the vigor of spring.\nUpon that land, I stroke gently with my wounded hand,\nAs one would a lover's soft hair, or a child's nursing palm.\nI gather all my strength into my hand,\nPress it against the earth, entrusting it with all my love and hope,\nFor only there the sun still rises, and spring still blooms,\nOnly there shall darkness be driven away, and rebirth come forth.\nOnly there do we live not like cattle,\nNor die like ants...\nThere - lies eternal China!"

 PRC_reorient_the_economy: "Reorient the Economy"
 PRC_reorient_the_economy_desc: "Today, our economy is like a lone boat in a storm, swaying in turbulent waves. Various industries are in distress, the market is unstable, and people's livelihoods are severely affected. If we do not take timely measures, this boat may struggle to stay on course."
 PRC_tackle_the_demographic_collapse: "Tackle the Demographic Collapse"
 PRC_tackle_the_demographic_collapse_desc: "We are facing a continually declining birth rate, an undercurrent quietly changing the trajectory of our future development. If we do not address this problem, our society will face unprecedented aging and stagnation."
 PRC_tackle_youth_unemployment: "Tackle Youth Unemployment"
 PRC_tackle_youth_unemployment_desc: "Young people have always been the main force behind social development, the hope and driving force pushing history forward. However, today, too many young people are wandering in distress, becoming outsiders in our era. If we cannot provide sufficient employment opportunities, the pulse of social development will gradually lose its vitality."
 PRC_military_industries_renewal: "Military Industries Renewal"
 PRC_military_industries_renewal_desc: "The true revival and reform of the Chinese nation require a strong military to safeguard it. Without a well-developed national defense industry, the military is like a person with drained blood vessels, unable to protect the country effectively."
 PRC_spur_domestic_production: "Spur Domestic Production"
 PRC_spur_domestic_production_desc: "By revitalizing domestic industries, we can fuel economic recovery, push the national economy back on track, and achieve true self-reliance. Only with comprehensive domestic industrial prosperity can we stand firm in the global economic storm."
 PRC_public_works_campaign: "Public Works Campaign"
 PRC_public_works_campaign_desc: "By promoting public works construction, we can create numerous jobs and provide more employment opportunities, while also injecting strong momentum into the country's economic development."
 PRC_state_syndicalism: "State Syndicalism"
 PRC_state_syndicalism_desc: "The working class is the leading class of the republic. However, in recent decades, the government has overly favored entrepreneurs to leverage their organizational capabilities, neglecting workers' interests and virtues. We will build a country that truly represents the broad masses of laborers economically."
 PRC_national_corporatism: "National Corporatism"
 PRC_national_corporatism_desc: "In future economic policies, we must address the increasingly intense social contradictions in China, particularly the conflicts between entrepreneurs and workers. The government will play a more active role, serving as a stabilizing anchor for society and better reconciling the interests and demands of different social groups."
 PRC_subsidize_child_raising: "Subsidize Child Raising"
 PRC_subsidize_child_raising_desc: "As the saying goes, "It's easy to have a child, but hard to raise one." By providing more comprehensive subsidy policies, we could increase the birth rate and gradually achieve a younger population."
 PRC_reconstruct_the_iron_rice_bowl_nat: "Reconstruct the Iron Rice Bowl"
 PRC_reconstruct_the_iron_rice_bowl_nat_desc: "If personnel changes within the civil service system are too frequent, it will hinder policy continuity and execution and create opportunities for wrongdoers, threatening the entire system. We must ensure the stability of civil servant positions, allowing them to perform their duties long-term under the system's norms and constraints."
 PRC_synthesis_of_state_and_labor: "Synthesis of State and Labor"
 PRC_synthesis_of_state_and_labor_desc: "Ensuring the position of the national trade union is crucial to our ability to control the entire working class. Through this key organization, we can more efficiently allocate labor to various regions or different projects. At the same time, we must also pay attention to the union's role in ensuring workers' living needs and welfare."
 PRC_absorb_western_enterprise: "Absorb Western Enterprise"
 PRC_absorb_western_enterprise_desc: "We will integrate Western enterprises into state-owned entities that serve national interests and public welfare. Western brands are merely labels, while the true value lies in the wealth we have created."
 PRC_decommodification_nat: "Decommodification"
 PRC_decommodification_nat_desc: "Consumerism has led our people to forsake the cherished values of the past. Frugality and self-discipline have been overtaken by materialism. We must reveal the truth behind luxury brands and advertisements, so people can appreciate the true nature of goods."
 PRC_recollectivize_the_countryside_nat: "Recollectivize the Countryside"
 PRC_recollectivize_the_countryside_nat_desc: ""
 PRC_promote_common_prosperity: "Ensure Common Prosperity"
 PRC_promote_common_prosperity_desc: "Under our governance, we have overcome diseases and eradicated poverty and hunger. We have healed our land, allowing people to hold their heads high and live stable, happy lives. Today, everyone wears a proud expression, knowing they are part of this great land."
 PRC_to_struggle_is_to_live: "To Struggle is to Live"
 PRC_to_struggle_is_to_live_desc: "We must remain vigilant, as Western civilization's superficial prosperity can erode our traditional values and confuse our people. We must never let these ideologies lead our nation astray again."
 PRC_to_prosper_is_to_live: "To Prosper is to Live"
 PRC_to_prosper_is_to_live_desc: "Shelves are stocked with food, patients no longer worry about exorbitant costs, and our people are free from anxiety over housing prices. This is truly a golden era for the people. We stride forward confidently, embracing the era that belongs to us."
 PRC_definancialization: "Definancialization"
 PRC_definancialization_desc: "The stock market, composed of cold numbers, often sweeps away people's wealth. Many invest with dreams of getting rich overnight, but often lose their way chasing profits, exhausting years of savings. We should not let such a game continue to devour people's hard-earned wealth."
 PRC_reinvigorate_the_cadres_nat: "Reinvigorate the Cadres"
 PRC_reinvigorate_the_cadres_nat_desc: "Our bureaucrats have long been detached from the people. They focus on statistics as if they reflect the realities of the people's lives. We need to encourage these officials to leave their offices and engage directly with the community."
 PRC_revitalize_the_chinese_village: "Revitalize the Chinese Village"
 PRC_revitalize_the_chinese_village_desc: "During our years of industrialisation and modernisation, our farmers and the countryside, the backbone of our nation, were left behind in the tides of development. To this day, we are not self-sufficient in food production and have to import hundreds of billions of agricultural products. We have forgotten all about this fertile land which lies beneath our feet, this land where for millions of years our ancestors fought for and bled for. Their blood, their sweat, and their ashes nurtured this soil, and what fools would we be to not utilise it?"
 PRC_a_pragmatic_economy: "A Pragmatic Economy"
 PRC_a_pragmatic_economy_desc: "Our economic policies are not empty slogans or unattainable goals. Our simple aim is to let people feel the benefits. We have achieved higher employment rates, increased per capita income, and faster productivity growth."
 PRC_productivism_over_distributionism: "Productivism Over Distributionism"
 PRC_productivism_over_distributionism_desc: "Continuously expanding production is essential for national development. In industry, agriculture, technological innovation, and services, increased output enhances competitiveness and reflects national strength."
 PRC_all_under_the_soe: "All Under the State Owned Enterprise"
 PRC_all_under_the_soe_desc: "The introduction of private enterprises brought with it the influence of Western capitalism, characterized by greed and profit motives, which have undermined our previously strong and pure foundation. Evidence shows that state-owned enterprises are the best model for business. Only under state coordination and control can enterprise development truly serve national interests."
 PRC_joint_eadi_development_nat: "Joint EADI Development"
 PRC_joint_eadi_development_nat_desc: "Asia is essentially a large family with shared bloodlines and cultural heritage. For millennia, we have faced history's challenges together, enduring wars and enjoying peace. Now, let us bridge historical divides, join hands, and embrace a bright future for Asia."
 PRC_extraction_from_the_periphery: "Extraction From the Periphery"
 PRC_extraction_from_the_periphery_desc: "We have helped liberate formerly oppressed nations, bringing freedom and ending their suffering. However, this liberation comes at a cost, and they will eventually need to bear some responsibility for it."
 PRC_endorse_the_megaprojects: "Endorse the Megaprojects"
 PRC_endorse_the_megaprojects_desc: "Imagine a towering skyscraper standing majestically in the capital, its silhouette piercing the sky. It would undoubtedly awe everyone who gazes at it, instilling pride and reverence in the hearts of the people. We should advocate for such grand projects; they are not only a display of national power but also a declaration of national confidence."
 PRC_the_national_economic_revolution: "National Economic Revolution"
 PRC_the_national_economic_revolution_desc: "Today, our economy is back on track, and the once-quiet land is full of vitality. Factory machines roar again. The red dragon awakens, standing tall with strength and determination, once more dominating the eastern skyline."

 #ARMY TREE
 PRC_chinas_spot_in_the_sun: "A Triumphant Return"
 PRC_chinas_spot_in_the_sun_desc: "Building a military force capable of defending national interests and possessing modern combat capabilities is a fundamental task that must be realized and continuously pursued. The modernization of national defense will "always be ongoing", and this is not an empty promise."
 PRC_prepare_for_the_next_war: "Prepare for the Liberation of Asia"
 PRC_prepare_for_the_next_war_desc: "In the foreseeable future, the PLA and the Chinese people will face greater challenges. The rumblings of gunfire are echoing globally, and Asia will not be exempt. We must prepare for increasingly arduous military struggles."
 PRC_modernize_the_missile_corps: "Modernize the Missile Corps"
 PRC_modernize_the_missile_corps_desc: "The air force's arsenal includes not only aircraft but also missiles, which are crucial. Our "PL" air-to-air missiles and "HQ" surface-to-air missiles are among the world's best technologies, but there is still room for improvement. We will further advance the localization of air force missiles to better meet our military's combat needs."
 PRC_flying_fortresses: "Flying Fortresses"
 PRC_flying_fortresses_desc: "As a core element of strategic deterrence, this program commits our most advanced resources to rapidly develop and field the next-generation stealth strategic bomber, symbolizing the apex of our strategic power and the ultimate expression of our national will. This formidable platform - the nation's long sword - will have intercontinental range and carry both conventional and nuclear payloads, delivering an unassailable strike capability. By integrating breakthrough low-observable technologies, these near-invisible aircraft will enable global power projection and ensure that our capacity for decisive retribution - the ultimate safeguard of our sovereignty - can reach across continents to deter any challenger."
 PRC_strikes_on_any_place_of_the_earth: "Strikes on Any Place of the Earth"
 PRC_strikes_on_any_place_of_the_earth_desc: "Our aim is clear: to forge an unbreakable intercontinental strike chain that guarantees the security of our rapidly growing global interests. We require deterrent forces capable of encompassing the entire globe, leaving nowhere out of reach - a doctrine we call "Strikes Anywhere on Earth." We will achieve this by seamlessly integrating our strategic missile forces, long-range aviation, and resilient naval platforms into a unified system. This integration provides continuous worldwide coverage, ensuring that at any moment our national will can be projected with precise, overwhelming force, firmly upholding our status as a great power."
 PRC_lessons_from_the_taiwan_war: "Lessons From the Taiwan War"
 PRC_lessons_from_the_taiwan_war_desc: "The Taiwan War was the largest armed conflict we have engaged in over the past forty years and the most significant amphibious operation of the 21st century, encompassing multiple combat environments including land, sea, and air. Its importance is clear. We will continue to study the classic battles of the Taiwan War to provide guidance for future conflicts."
 PRC_sharpen_the_southern_blade: "Sharpen the Southern Blade"
 PRC_sharpen_the_southern_blade_desc: "The PLA's special forces began forming in the 1980s with the aim of serving as an auxiliary force in "local wars under high-tech conditions." Today, we have the opportunity to undertake significant reforms to make this the largest and most capable special forces unit in the world, enhancing its role in counter-terrorism, intelligence gathering, and confidential missions in future conflicts."
 PRC_expand_the_thunder_gods: "Expand the Thunder Gods"
 PRC_expand_the_thunder_gods_desc: "The PLAGF paratroopers have a long history and distinguished achievements, excelling in riot control, joint military exercises, and disaster relief missions. The Thunder Gods Squadron is the elite among them. We will draw on the Soviet Army's experience and significantly expand the paratrooper force, enabling them to play a leading role in critical battles."
 PRC_a_blue_water_navy: "The Naval Power of Asia"
 PRC_a_blue_water_navy_desc: "Since the voyages of Zheng He, it seems that China has never had a significant maritime power. The destruction of the Beiyang Fleet during the First Sino-Japanese War remains one of the national humiliations that generations of Chinese have found intolerable. Today, we will continue to expand our naval strength, not only to meet national defense needs but also to fulfill the aspirations of the entire nation."
 PRC_next_generation_airforce: "Next Generation Air Force"
 PRC_next_generation_airforce_desc: "The air force is a critical component in modern warfare. The strength of the United States air force was a key factor in their victories in the Gulf War and Iraq War. We will continue to enhance the capabilities of the PLAAF to ensure dominance in air superiority in future conflicts."
 PRC_next_generation_army: "The Army of Tomorrow"
 PRC_next_generation_army_desc: "Advancing the combat capabilities of the PLAGF may be the most challenging task in our national defense modernization efforts. This is primarily because we need not only to produce enough new weapons to replace our outdated inventory but also to advance military technology and ensure that PLA officers and soldiers can proficiently use these new weapons."
 PRC_fresh_personnel_in_the_strategic_command: "Fresh Personnel in the Strategic Command"
 PRC_fresh_personnel_in_the_strategic_command_desc: "The future battlefield is increasingly cognitive, and information warfare demands a new generation of commanders. Strategic Command must be infused with fresh talent - leaders capable of networked, decentralized thinking. We will launch a rigorous fast-track program to identify and rapidly advance officers with technical fluency, deep joint-operations expertise, and the intellectual agility required for network-centric warfare. This systemic change will keep our command tempo aligned with the speed of data, ensuring decisive leadership at critical moments."
 PRC_dawn_of_the_chinese_tactical_thought: "Dawn of the Chinese Tactical Thought"
 PRC_dawn_of_the_chinese_tactical_thought_desc: "We stand at the dawn of a distinctly Chinese tactical tradition - a pivotal moment to distill decades of military modernization into a coherent national doctrine. This effort requires rigorous study and synthesis of our classical military wisdom with cutting-edge, information-age concepts. Our goal is a unique framework to guide future joint operations, ensuring we maintain strategic initiative across new forms of warfare. More than a rulebook, it will be the philosophical core of our military - tailored to our national conditions and a durable bulwark for our sovereignty."
 PRC_improve_officer_training: "Improve Officer Training"
 PRC_improve_officer_training_desc: "Commanders are the brain and nervous system of the PLA, playing a crucial role in enhancing the combat capabilities of the PLAGF. We will raise the standards for officer promotion and establish more specialized courses at the National Defense University. Future officers must acquire greater military expertise and possess superior tactical skills and strategic thinking."
 PRC_increase_naval_production: "Outpace PDTO Naval Production"
 PRC_increase_naval_production_desc: "Many countries in the PDTO have strong navies, with Japan being the most prominent among them. The Japanese Navy caused tremendous suffering to the Chinese people in the 20th century and remains one of the primary hypothetical adversaries of the PLAN in the 21st century. However, this is now just history, and the PLAN will surpass the PDTO navies in both scale and quality."
 PRC_dominate_the_skies: "Dominate the Skies"
 PRC_dominate_the_skies_desc: "The PLAAF boasts the largest fleet of fighter jets in the world, but some models remain outdated. We will thoroughly modernize the air force fleet, incorporating advanced aircraft, including the latest bombers, stealth fighters, and ground-attack aircrafts."
 PRC_non_stop_heavy_air_support: "Non-Stop Heavy Air Support"
 PRC_non_stop_heavy_air_support_desc: "Victory rests on the unshakable confidence of our ground forces. To secure it, we will establish a permanent, powerful presence in the skies above our troops. This program directs substantial resources toward high-endurance, heavy-firepower aerial platforms - specifically advanced heavy armed drones and gunships. Operating day and night, these systems will deliver persistent, overwhelming air-to-ground firepower. By placing this protective shield over our forces, we ensure the safety of troops on the ground and decisively neutralize enemy formations before they can threaten our advance."
 PRC_rain_fire_from_above: "An Elite Marine Corps"
 PRC_rain_fire_from_above_desc: "The "Jiaolong" Squadron is one of the earliest special forces established by the PLA and is currently the only special forces unit under the PLAN Marine Corps. Through personnel expansion, weapon upgrades, and training program reforms, this unit, with its distinguished combat record, will play an even greater role in the future."
 PRC_expand_the_fleet_of_nuclear_submarines: "Expand the Fleet of Nuclear Submarines"
 PRC_expand_the_fleet_of_nuclear_submarines_desc: "The sea remains the ultimate bastion of strategic power. This initiative calls for a major expansion of our nuclear submarine fleet, including both ballistic-missile (SSBN) and attack (SSN) classes. A concealed, resilient undersea force is essential to a credible deterrent. Our priority is an assured, survivable second-strike capability - able to endure and deliver decisive retaliation if our sovereignty is threatened. By strengthening this "silent shield," the PLA Navy extends our security perimeter into the deep oceans, deterring any adversary from contemplating aggression against our nation."
 PRC_carrier_primacy: "Develop the Aircraft Carrier Programme"
 PRC_carrier_primacy_desc: "Aircraft carriers are symbols of great naval power, and operating a carrier battle group has long been the domain of traditional naval powers like the United States. However, aircraft carriers flying the five-starred red flag are becoming increasingly common in the Western Pacific. We will not only enhance the technical capabilities of our existing naval aviation but also build more carriers to strengthen our fleet."
 PRC_creation_of_full_scale_missile_cruisers: "Creation of Full-Scale Missile Cruisers"
 PRC_creation_of_full_scale_missile_cruisers_desc: "To protect our extensive maritime interests, we will develop full-scale missile cruisers to anchor future naval task groups. Each ship will integrate advanced phased-array radars, seamless data links, and long-range strike weapons into a unified combat system - serving as both a robust air and missile defense shield and a powerful land-attack platform. Our aim is system integration: to see farther, strike farther, and protect more reliably. These comprehensive capabilities will project our flag and power across distant seas."
 PRC_supremacy_above_and_below_waters: "Supremacy Above and Below Waters"
 PRC_supremacy_above_and_below_waters_desc: "A powerful surface fleet and advanced submarine force are both essential for building a blue-water navy. While some have previously criticized China's naval technology, especially its submarine technology, as being significantly behind that of the U.S. and Russia, this is no longer the case."
 PRC_dominate_south_china_sea: "Dominate the South China Sea"
 PRC_dominate_south_china_sea_desc: "The South China Sea has been China's inherent territory since ancient times, and Chinese explorers were among the first to explore and develop it. Today, we will not allow other countries to interfere in these waters. With our powerful navy and various artificial island bases, we will establish absolute dominance."
 PRC_redefine_naval_warfare: "Redefine Naval Warfare"
 PRC_redefine_naval_warfare_desc: "Just as Alfred Thayer Mahan shaped the U.S. Navy's strategies, developing new naval warfare theories is crucial not only for consolidating our navy's dominant position in Asia but also for securing our strategic advantage in future maritime conflicts."
 PRC_resurrect_the_battleship: "Resurrect the Battleship"
 PRC_resurrect_the_battleship_desc: "Battleships, with their heavy armor and massive guns, were once the undisputed rulers of the seas until they were replaed by aircraft carriers. Unfortunately, China was too weak at the time to build its own battleships. Today, however, we can construct giant arsenal ships equipped with various missiles and other types of weapons, bringing the concept of the battleship back to life in the 21st century."
 PRC_air_navy_coordination: "Air and Navy Coordination"
 PRC_air_navy_coordination_desc: "Since World War II, victory in naval battles has been closely linked to aircraft. For the current military environment, close coordination between the navy and air force is even more crucial. The air force will provide reliable protection for the navy in coastal areas and offer close reconnaissance and air defense support for the fleet's blue-water operations."
 PRC_trust_in_the_pilot: "Drone Age Warfare"
 PRC_trust_in_the_pilot_desc: "The crucial role of unmanned weapons was demonstrated during the landing operation on the Island. We will equip the PLAAF with more advanced large drones and expand their use for reconnaissance, electronic warfare, and even dogfight."
 PRC_the_exterminating_swarm: "The Exterminating Swarm"
 PRC_the_exterminating_swarm_desc: "We embrace the future of warfare by mastering autonomous swarm intelligence, a revolutionary concept poised to upend traditional battlefield rules. This program calls for the rapid fielding of an Exterminating Swarm combat system. Using advanced AI coordination and numerical superiority, low-cost, high-density aerial platforms will operate as a unified, lethal collective intelligence. Designed to launch overwhelming saturation attacks, they will blind and dismantle complex enemy air defenses and other heavily."
 PRC_deus_ex_machina_nat: "Deus Ex Machina"
 PRC_deus_ex_machina_nat_desc: "Our aircraft designers have always focused on developing advanced aircraft control systems. Leveraging rapid advancements in our information industry and domestic electronics, we will enhance the electronic warfare capabilities and operational effectiveness of our military aircraft, and provide superior communication equipment for air force personnel."
 PRC_modern_special_forces: "Modern Special Forces"
 PRC_modern_special_forces_desc: "We have accumulated valuable experience from previous reforms of the PLA's special forces. Now, it is time to extend these reforms to all special operations brigades. This new force will ensure our enemies are decisively defeated!"
 PRC_streamline_aircraft_production: "Streamline Aircraft Production"
 PRC_streamline_aircraft_production_desc: "While the outcome of future conflicts remains uncertain, having a larger arsenal will likely be advantageous. We will increase investment in the production lines of Shenyang Aircraft Corporation, Chengdu Aircraft Corporation, Xi'an Aircraft Industrial Corporation, and Hongdu Aviation Industry Group to expand production capacity and meet urgent aircraft needs."
 PRC_mobile_warfare_nat: "Speed and Maneuverability"
 PRC_mobile_warfare_nat_desc: "In modern warfare, troop mobility is paramount. With the mechanization of the entire force now complete, it is time to further enhance its combat capabilities."
 PRC_the_cleansing_fire: "The Cleansing Fire"
 PRC_the_cleansing_fire_desc: "Our strategy emphasizes deep, saturation strikes to neutralize threats before they fully materialize. The Cleansing Fire calls for the rapid fielding of next-generation long-range precision conventional strike capabilities. These advanced missiles and munitions will serve as a strategic hammer, suppressing, isolating, and systematically destroying critical enemy assets - command nodes, airfields, and integrated air-defense networks. By executing these operations, we open a secure, decisive corridor for follow-on ground and air forces, enabling a rapid advance with minimal resistance."
 PRC_national_fanaticism: "National Fanaticism"
 PRC_national_fanaticism_desc: "Throughout its long history, China has fought numerous wars with neighboring countries, some of which have left lasting impacts that strain our diplomatic relations. However, this also provides an opportunity to mobilize domestic support for military struggles by invoking historical animosities."
 PRC_infantry_primacy_nat: "The Spiritual War"
 PRC_infantry_primacy_nat_desc: "To win a war, any army needs soldiers who are fearless, absolutely loyal, and willing to undertake dangerous missions. The illustrious exploits of battle heroes displayed in the PLA's Military History Museum prove that we do not lack such soldiers. With advanced training courses and political education, PLA soldiers will be the best in the world."
 PRC_millions_march_in_unison: "Millions March in Unison"
 PRC_millions_march_in_unison_desc: "The nation's strength is embodied in the might of its Army. This initiative calls for a fundamental reorganization of our large ground forces into high-readiness, rapid-deployment mechanized formations. Our goal is the ability to deploy millions of troops swiftly and cohesively across any theater. Our forces must move in unison - rapid, seamless, and synchronized - forming a technologically advanced, unstoppable force. Such rapid, coordinated action will turn numerical strength into decisive battlefield dominance."
 PRC_tank_primacy_nat: "Wall of Fire and Steel"
 PRC_tank_primacy_nat_desc: "A capable and battle-ready army must possess powerful firepower. During the military reforms from 2016 to the present, we have substantially updated the PLA's field artillery and armored units, greatly enhancing their firepower capabilities. We have no reason to stop here."
 PRC_achieving_network_centric_warfare: "Achieving Network-Centric Warfare"
 PRC_achieving_network_centric_warfare_desc: "To outpace any potential adversary, we are committed to achieving network-centric warfare. This requires fully integrating land, sea, air, space, and cyber forces into a unified, high-speed information network. Through this seamless grid, shared data becomes a force multiplier, enabling lightning-fast, highly synchronized decision-making. This command-and-control revolution gives every unit a common operational picture, reduces friction, and transforms the speed and precision of our operations - elevating warfare to a more decisive level."
 PRC_a_continuous_offensive: "A Continuous Offensive"
 PRC_a_continuous_offensive_desc: "Victory is won not by a single battle but by setting and sustaining the campaign's tempo. We will develop doctrine and build the logistical capacity needed for prolonged, deep-penetration offensive operations. Our logistics must function as a resilient circulatory system, giving our forces the endurance to maintain a continuous offensive - a relentless push until strategic objectives are achieved. We will remove institutional and physical bottlenecks that cause stalemate, ensuring our offensives carry the full weight of national resolve."
 PRC_tidal_wave_of_bodies: "A Tidal Wave of Bodies"
 PRC_tidal_wave_of_bodies_desc: "Whether it was the German Wehrmacht's "Blitzkrieg" in World War II or the Soviet Army's "Deep Battle" theory during the Cold War, both terrified their enemies with powerful and rapidly moving army units. Today, the PLAGF's armored units will serve as a strategic deterrent against any potential adversary with their overwhelming superiority in both scale and quality."

 #GAW
 PRC_chinas_greatest_hour: "China's Greatest Hour"
 PRC_chinas_greatest_hour_desc: "The hypocritical veil of peace has been torn away. From Panmunjom to Malacca, from Kashmir to Guam, the flames of the Great Asian War have ignited both land and sea. The Chinese nation will be reborn through this arduous test, ushering in its greatest moment!"
 PRC_operation_majestic: "OPERATION: §YMAJESTIC§!"
 PRC_operation_majestic_desc: "We will implement the core strategy of this war: a landing operation against Japan. Once the iron hooves of the People's Liberation Army tread upon the Japanese archipelago, the outcome of this war will be decided."
 PRC_revenge_for_nanking: "Revenge for Nanking"
 PRC_revenge_for_nanking_desc: "The eternal conflict of a thousand years between China and Japan seems to finally have come to an end, culminating in the destruction of one side; Japan will be permanently divided, and the Japanese nation will become a historical concept. We will finally be able to truly avenge our compatriots who perished in the War of Resistance against Japan."
 PRC_rebuild_japan: "Rebuild Japan"
 PRC_rebuild_japan_desc: "The eternal conflict of a thousand years between China and Japan seems to finally have come to an end. We have achieved a complete victory over this arch-enemy, and it is time to show the magnanimity of the victors. We will assist the reconstruction efforts of the newly established governments on the Japanese archipelago, helping the Japanese people realize that true prosperity and peace can only come from following China."
 PRC_operation_changma: "OPERATION: §YCHANGMA§!"
 PRC_operation_changma_desc: "Over 70 years ago, the heroic Chinese People's Volunteer Army, in conjunction with the Korean People's Army, defeated the United Nations forces led by American imperialism. Today, we will reenact the glory of our ancestors. The Sino-Korean coalition will once again destroy the Republic of Korea and its evil masters."
 PRC_integrate_korea: "Integrate Korea"
 PRC_integrate_korea_desc: "The longstanding conflict on the Korean Peninsula is nearing an end. In light of the historical division between North and South Korea, we propose the creation of a unified Special Administrative Region of Korea. This initiative aims to enhance economic integration and foster cooperative governance between China and Korea."
 PRC_only_one_korea: "Only One Korea"
 PRC_only_one_korea_desc: "The conflict on the Korean Peninsula is coming to an end. We will respect the Korean people's desire for reunification and establish a unified Democratic People's Republic of Korea. This approach will strengthen the friendly relations between China and Korea."
 PRC_appeal_to_the_chinese_people_gaw: "Appeal to the Chinese People"
 PRC_appeal_to_the_chinese_people_gaw_desc: "The Great Asian War is a total war. It is absolutely impossible to win the war solely through the sacrifices of the government and the military. Only by uniting all the people of China as one can we ultimately grasp the fruits of victory."
 PRC_suspend_the_consumer_economy: "Suspend the Consumer Economy"
 PRC_suspend_the_consumer_economy_desc: "A prosperous consumer market was once a symbol of China's economic growth. However, the war has changed everything. Excessive consumption now leads to waste and negatively impacts social values. We will regulate the commodity economy and promote frugality in daily life."
 PRC_martial_law: "Emergency Measures"
 PRC_martial_law_desc: "We must acknowledge that the severity of the war has exceeded our expectations. We need to accelerate the training of existing troops and reserves to deploy these forces to the battlefield more quickly."
 PRC_all_chinese_mobilization: "All-Chinese Mobilization"
 PRC_all_chinese_mobilization_desc: "We must acknowledge that the severity of the war has exceeded our expectations. Relying solely on existing forces is no longer sufficient to contend with the enemy. We will initiate a new round of total mobilization to build the largest army in history in the shortest possible time."
 PRC_propagandize_our_success: "Propagandize Our Success"
 PRC_propagandize_our_success_desc: "Needless to say, a disunited alliance of PDTO will never be a strong ally or a match for the great People's Liberation Army. We will launch a grand propaganda campaign within our camp, particularly to highlight the glorious achievements of the People's Army to our citizens, encouraging all of society to passionately support our liberation cause."
 PRC_call_up_the_reserves: "Call up the Reserves"
 PRC_call_up_the_reserves_desc: "After mobilizing the enthusiasm of the rear in the great liberation struggle, we will initiate a new round of reserve recruitment to provide more reliable personnel for our frontline troops. Furthermore, this will promote the further militarization of society."
 PRC_east_china_wall: "East China Wall"
 PRC_east_china_wall_desc: "With a larger mobilizable force, we will be able to strengthen our important defensive lines and land borders. We will never allow even a single enemy soldier's boot to step onto Chinese territory."
 PRC_coastal_defense_brigades: "Coastal Defense Brigades"
 PRC_coastal_defense_brigades_desc: "With a larger mobilizable force and more equipment, we will be able to strengthen our vital coastal defenses and maritime strongholds. We will never allow even a single enemy warship to enter Chinese territorial waters."
 PRC_embrace_the_future: "Embrace the Future"
 PRC_embrace_the_future_desc: "The army with the most advanced military technology, willing to use it in combat, will win the war. This is a timeless truth. We will apply our past military scientific research achievements in practice. These newly unveiled advanced weapons will undoubtedly strike fear into our enemies."
 PRC_kashmir_road: "Kashmir Road"
 PRC_kashmir_road_desc: "The Kashmir Plateau is a strategically important location, fiercely contested by military powers. Securing this area would give us a significant strategic advantage over India. We plan to act in concert with our Pakistani allies."
 PRC_operation_gangaridai: "OPERATION: §YGANGARIDAI§!"
 PRC_operation_gangaridai_desc: "After the 1971 war, East Pakistan became the newly independent Bangladesh and has since been a key battleground for Sino-Indian influence. Led by our special forces, we will deploy an elite expeditionary force to advance deep into Bangladesh, delivering a direct and forceful strike to the heart of India."
 PRC_operation_pallava: "OPERATION: §YPALLAVA§!"
 PRC_operation_pallava_desc: "Our long border with India consists mainly of plateaus and snow-capped mountains, making a war of attrition difficult. We will launch a bold surprise attack by deploying a task fleet to land unexpectedly on the southern coast of India and penetrate deep into its interior. Simultaneously, Sino-Pakistani allied forces on the northwest border will launch a coordinated offensive to dismantle Indian resistance completely."
 PRC_operation_southern_fury: "OPERATION: §YSOUTHERN FURY§!"
 PRC_operation_southern_fury_desc: "In Southeast Asia and the South Pacific, the numerous island chains witnessed a series of bloody battles between Japan and the United States during the Pacific War. Now, this maritime region will be ignited by the flames of war once more. Our fleet and marine corps will be fully mobilized, using the Indochina Peninsula as a springboard to strike at the heart of the PDTO-Australia."
 PRC_operation_samosir: "OPERATION: §YSAMOSIR§!"
 PRC_operation_samosir_desc: "Indonesia is the largest country in the region by area, with countless islands and reefs dividing vast waters into several strategically important straits. Controlling Indonesia would give our navy a significant advantage in the southern war effort. However, we must also recognize that capturing this archipelagic nation of 300 million people will be an arduous task for the PLA."
 PRC_operation_baru_nah: "OPERATION: §YBARU NAH§!"
 PRC_operation_baru_nah_desc: "Brunei, a small nation on the periphery of the South China Sea, possesses abundant oil resources and an advantageous geographical position. Controlling Brunei will provide a further springboard to expand our operations in the southern war effort. According to the PLA's staff, a surprise attack on this country will be a walk in the park."
 PRC_cover_the_back: "Cover the Back"
 PRC_cover_the_back_desc: "The Philippines, a long-standing ally of the United States, has significant conflicts with China over the ownership of numerous South China Sea islands and remains a thorn in our side. Its geographical position poses a substantial threat to the rear of our southern offensive. It is time to take action against this country and eliminate this potential major threat."
 PRC_starve_the_island: "Starve the Island"
 PRC_starve_the_island_desc: "We have finally reached this point-the PLA is only one step away from the Australian mainland. To avoid unnecessary losses, we can blockade the key maritime routes of the entire continent. Sooner or later, the Australians will be compelled to negotiate due to shortages of supplies and prolonged fear."
 PRC_operation_coronet: "OPERATION: §YCORONET§!"
 PRC_operation_coronet_desc: "We have finally reached this point-the PLA is only one step away from the Australian mainland. With one final amphibious assault, we can end this bloody war. Soldiers, board the ships!"

 PRC_new_asian_liberation_war: "War for National Rejuvenation"
 PRC_new_asian_liberation_war_desc: "Since ancient times, the Chinese nation has stood proudly in the East of the world - pioneering civilization, enlightening the four corners of the earth, receiving tribute from all nations. Yet a century ago, our mountains and rivers were trampled by foreign invaders; our ancestral temples were burned to ashes; our compatriots bled rivers under enemy blades. They sat high upon blood-stained walls, mocking the displaced and desperate cries of the Chinese people. The so-called "noble" Western barbarians, the savage and bloodthirsty Eastern invaders, and the hypocritical "civilized nations" once believed that China had been broken, its spirit crushed, destined to be lost forever in the dust of history. But they were wrong. For a thousand years, the Chinese nation has never truly been conquered. Now, we will cleanse a century of humiliation with blood and fire. We will reclaim every debt owed to us by those who once trampled upon our dignity. We will make the world understand: even if a hundred generations pass, blood debts must be avenged."
 PRC_chinese_emergency_state: "That Day Has Come"
 PRC_chinese_emergency_state_desc: "The time has arrived. The flames of vengeance now blaze within our chests; the oath of blood and glory echoes across the heavens. We no longer cling to fantasies of false peace. We no longer beg for the mercy of our enemies. We no longer believe that bowing and scraping can win respect. In the face of a century of humiliation, in the face of an ocean of blood, we have no choice left: only war can end war; only blood can repay blood. We have no retreat - and we need none. We are ready to burn every last ember of our lives, just to see the dawn of a new China rise from the ruins. For the living: fight with burning rage until the last drop of blood falls. For the fallen: let your blood water the soil of our rebirth. From this day forward, there is only victory - or death. But whether we live or die, glory will belong to China."
 PRC_conduct_ultra_war_to_enemies: "Multi-Dimensional Warfare"
 PRC_conduct_ultra_war_to_enemies_desc: "War has never been a gentleman's duel. It has never been about fairness, nor about abiding by hypocritical rules. From ancient times to now, the essence of war has been the same: one survives, one perishes. Recognizing this truth, we will hesitate no longer. We will show no mercy. We will cast off every self-imposed chain. For revenge, for rebirth, for standing once more atop the rubble, we must unleash everything we possess. We will rip away every mask, shatter every so-called taboo. We will wage a war with no forbidden zones, no pity, no limits - until the enemy's entire structure, spirit, and hope are crushed into extinction; until their nation collapses in agony and despair."
 PRC_abandon_the_rules_of_warfare: "Systematic Dismantlement"
 PRC_abandon_the_rules_of_warfare_desc: "Victory is not measured by capturing a city or winning a fleeting cheer. True victory is the total collapse of the enemy's foundation - the severance of their bloodlines. We owe them no mercy. We will strip away every inch of land, every drop of water, every ounce of strength they possess. Cities will fall, roads will break, factories will fall silent, markets will wither, and their government will crumble amid fear and internal betrayal. We will force their civilization to groan amid the rubble, drive their nation to perish in despair, erase their names from history, and leave their descendants to howl for survival in barren wastelands."
 PRC_without_mercy: "Without Mercy"
 PRC_without_mercy_desc: "The fires of war will not only consume the enemy's homeland - they will cleanse the filth within our own. The enemy may wear friendly masks, lurking at our sides; traitors may hide under the banners of glory, corroding the nation from within. For the survival of the country, for the dignity of the nation, we must purge all hidden threats with iron and blood. No matter how deep they hide, no matter how well they disguise themselves - they will be dragged out from the shadows. Loyalty will be the sole standard for survival. Betrayal will be an unforgivable crime, punishable by death. We will immortalize the loyal and reduce the traitors to dust. The future Chinese nation will be purer, harder, and more indestructible than ever before."
 PRC_new_asian_order: "New Asian Order"
 PRC_new_asian_order_desc: "The Western barbarians once sought to divide and control Asia, to shrink and puppetize our civilizations. They dressed stolen languages, artificial borders, and imposed systems in the name of "progress," trying to erase the ancient river of Chinese civilization and replace it with their shallow hypocrisy. But today, their lies and falsehoods are being uprooted. History proves: Only the Chinese nation is the true source of Asian civilization. Only China embodies Asia's dignity and glory. Only China can safeguard the civilization of this land. Only China can define Asia's new order."
 PRC_unrestricted_aerial_bombardment: "Unrestricted Aerial Bombardment"
 PRC_unrestricted_aerial_bombardment_desc: "No matter how the enemy wails, no matter how they beg, it changes nothing: in our eyes, they are already dead - rubble and dust. Our air force will sweep over their land without restraint. Cities will burn to ash under roaring flames; factories will collapse under endless explosions; roads, bridges, plazas, homes - none will be spared. The fires will blaze day and night, smoke will blacken the skies, and death and despair will become their eternal companions. We will not show mercy simply because they call themselves a "nation," nor bind our hands simply because they wear the mask of "civilization.""
 PRC_operation_majestic_nat: "The Landsinks of the Rising Sun Archipelago"
 PRC_operation_majestic_nat_desc: "We now begin the war's most decisive and critical phase: a landing operation on the Japanese home islands. This island nation, guilty of countless historical crimes against China, has long relied on foreign protection and played a disruptive role in regional affairs - meddling in the South China Sea, Taiwan, and the East China Sea. It now threatens our national security and strategic depth. The time has come. Once PLA boots touch Japanese soil, the outcome of this war will be sealed. Prepare to fight - prepare to win."
 PRC_revenge_for_nanking_nat: "Revenge for Nanking"
 PRC_revenge_for_nanking_nat_desc: "The centuries-old conflict between China and Japan nears its final reckoning. This is not a ceasefire, nor a shallow reconciliation, but the complete collapse and erasure of one side. Japan, which committed heinous crimes during the last century, will be permanently dismantled in the fires of war. It will no longer exist as a unified nation; its identity will gradually fade into history, remembered but powerless. At last, we stand here - for the martyrs of the Anti-Japanese War, for the countless lives lost to bullets and bayonets - this is justice, fulfilled."
 PRC_operation_changma_nat: "Make Goryeo Kneel"
 PRC_operation_changma_nat_desc: "Over seventy years ago, China's brave volunteers fought alongside the Korean People's Army and defeated the so-called "UN forces" led by U.S. imperialism, shattering the myth of Western invincibility and defending our dignity and East Asia's balance. Today, history turns again. In the face of new aggression and provocation, Chinese and North Korean forces will once more stand united, answering fire with fire. Our objective is clear: to destroy the puppet regime of South Korea and drag its backers - Australia and Japan - into the dustbin of history."
 PRC_kashmir_road_nat: "Subdue Pamir"
 PRC_kashmir_road_nat_desc: "The Kashmir Plateau has long served as a vital gateway between Central and South Asia, a strategic corridor contested by empires throughout history.From the Protectorates of the Western Regions during the Han and Tang dynasties to the frontier defenses of the Yuan and Qing, its importance has never waned. Today, reclaiming control over this region would not only restore our historical frontiers in a geographical sense, but more critically, grant us overwhelming strategic leverage over India."
 PRC_operation_gangaridai_nat: "Demonstrate Our Might in Sindhu"
 PRC_operation_gangaridai_nat_desc: "In 1971, India militarily intervened in the East Pakistan civil war, supported separatist forces, and helped establish the so-called "Bangladesh," severing Pakistan's east-west strategic link and expanding its geopolitical control over South Asia. This event not only reshaped the region but has posed a long-term threat to the security of our southwestern frontier. For decades, India has tried to incorporate the entire area into its sphere of influence to form a strategic encirclement of our nation. We will not, and must not, allow this to continue."
 PRC_operation_pallava_nat: "Partition Hindustan"
 PRC_operation_pallava_nat_desc: "Between us and India lies one of the world's most complex and treacherous borders, with terrain that makes large-scale, rapid advances nearly impossible. In this fortress of plateaus and snow peaks, any conventional war would drain both sides without decisive gains. We must abandon the mindset of symmetrical warfare and launch an unprecedented surprise assault. A rapid-response naval task force will strike deep into India's strategic heartland, pushing our frontline directly into its core regions. This will shatter India's defense framework and throw its northern and southern fronts into disarray."
 PRC_operation_southern_fury_nat: "Mighty Loong Shakes the Seas"
 PRC_operation_southern_fury_nat_desc: "In Southeast Asia and the South Pacific, the scars of the Pacific War remain - where Japan and the U.S. once clashed in brutal battles. Today, the flames of war will return. Our navy will deploy in full strength, with marine forces launching multi-pronged assaults, using Indochina as a beachhead to drive deep into the Pacific and press toward the core of the AUKUS alliance - Australia. As a nation that blindly serves foreign hegemons, Australia has frequently assisted efforts to contain us in military, intelligence, and diplomatic arenas. It is time they understand the cost of meddling in others' affairs."
 PRC_operation_samosir_nat: "Pacify Java"
 PRC_operation_samosir_nat_desc: "Indonesia, the largest country in Southeast Asia, straddles the equator and commands countless islands. It controls critical chokepoints - Malacca, Sunda, Makassar, and Lombok Straits - linking the Pacific and Indian Oceans. These island chains divide the surrounding seas into numerous high-value channels. Whoever controls Indonesia, controls maritime order in the region. Securing Indonesia means achieving total maritime dominance in the southern theater and gaining strategic leverage over Australia, the Indian Ocean, and the South Asian heartland."
 PRC_operation_baru_nah_nat: "Devour Brunei"
 PRC_operation_baru_nah_nat_desc: "Brunei, a tiny nation on the edge of the South China Sea, may be small in size and population, but it holds abundant oil and natural gas resources. More importantly, its location in the Malay Archipelago makes it a key foothold connecting Borneo and the South China Sea. Controlling Brunei would greatly expand our strategic depth in the southern theater and provide a vital springboard for naval and air operations. We will quickly secure the area, limiting enemy responses and laying the groundwork for further southern advances."
 PRC_cover_the_back_nat: "Decapitate Luzon"
 PRC_cover_the_back_nat_desc: "The Philippines, a long-time U.S. ally and former colony, remains a persistent obstacle in our South China Sea strategy. On issues of territorial disputes, it has repeatedly provoked us and aided Western powers in stoking regional tensions. Geographically, it sits squarely in the central South China Sea, with its island chains piercing into our southern rear, directly threatening logistics and troop movements. It is time to act decisively and eliminate this latent threat."
 PRC_operation_coronet_nat: "Sever the Spine of Jambudvipa"
 PRC_operation_coronet_nat_desc: "We have reached the final threshold - the PLA stands on the brink of Australia's shores. The encirclement that once constrained us has been shattered. Pacific island chains are now under our control. The enemy is cut off from reinforcements; its lines are breaking. One final amphibious landing, and we will strike into their heartland, bringing an end to this brutal war across South Asia and the South Pacific. Soldiers, board the ships! You fight not for conquest, but for vengeance and for rebuilding order. The motherland watches over you - carry her will across this final sea. Victory is within reach!"
 PRC_its_just_beginning: "It's Just Beginning"
 PRC_its_just_beginning_desc: "The fires of war have reached our borders. Our skies are torn by artillery fire. Our rivers run red with blood. But this is only the beginning. The enemy has come with genocidal intent, seeking to seize our land, destroy our culture, sever our bloodline. There is no more room for peace. Negotiations and mercy are meaningless. Every step back we take on the frontlines digs our own graves; every second of hesitation hastens our annihilation. Victory means life. Defeat means extinction. We must be ready to wield every weapon, to unleash the most brutal, the most extreme, the most merciless measures - to win the battle between survival and annihilation. Even if we drag the whole world into darkness, we cannot allow our homeland to perish in our hands."
 PRC_prepare_for_the_new_world: "Prepare for the New World"
 PRC_prepare_for_the_new_world_desc: "War is no longer confined to the front lines. At this very moment, every inch of the motherland, every city, has become a battlefield. Every citizen - man or woman, old or young, soldier or civilian - must now stand and fight. You may be young, but you must take up arms. You may be old, but you must harden your body. You may be frail, but you must grit your teeth and face death. The new world will not be born amid flowers and applause. It will be forged in blood and fire, built atop the corpses of countless martyrs. Perhaps you will die tomorrow. Perhaps you will fall tonight. But if you can take even one enemy down with you before you fall - you will have fulfilled your mission. Since fate has cast us into the abyss, only by burning ourselves to ashes can we light the road forward."
 PRC_spiritual_purification: "Spiritual Purification"
 PRC_spiritual_purification_desc: "From this moment onward, the warmth of humanity and the desires of the individual must be stripped away. Weakness brings annihilation. Mercy invites slaughter. Attachment becomes the noose in the executioner's hand. We must erase emotion. We must extinguish selfishness. We must forge our souls colder than steel, sharper than blades. Love, kinship, friendship - these luxuries of peace must be cast aside. The enemy will not spare you because of your kindness. The enemy will not stop killing because of your mercy. We do not live for ourselves, or for our families, or even for tomorrow. We exist for one purpose alone: To ensure China's survival. To ensure the Chinese nation's bloodline is never broken."
 PRC_reopen_the_pangu_heavens: "Reopen the Pangu Heavens"
 PRC_reopen_the_pangu_heavens_desc: "At the dawn of chaos, Pangu split heaven and earth with his own body. Thus began civilization. Thus was order born. Today, as the old world rots once more and our homeland teeters on the brink of ruin, we too shall wield the will of Pangu - splitting the heavens anew. At that moment, all borders will be obliterated; all false civilizations will be burned away by the flames of the new sun. There will be no mercy. There will be no judgment. Only a cleansing - a judgment written in the searing heat of millions of degrees. The corrupt old world, which forced the Chinese nation to the edge with betrayal, invasion, and slaughter, will pay its price. When the final hydrogen bomb tears the sky apart, it will be the world's own atonement. And from the ashes and dust, the Chinese nation will rise again - We will rebuild palaces from rubble, relight civilization from embers, birth new life greater than ever from death itself. Even if only a single grain of dust remains, as long as it remembers its name, it will lead the Chinese nation to reopen the heavens."

 #Liberal Tree Hu Yaobang was here
 china_liberal_focus: "Chinese Reformation"
 PRC_the_chinese_glasnost: "The Beijing Spring"
 PRC_the_chinese_glasnost_desc: "The true heirs of the spirit of reform and opening up have finally seized power in China from the hypocritical conservatives and greedy bureaucrats. The political turmoil in Beijing has subsided, marking a hard-won victory for the reformists. The next step is to secure firm control over key government positions to prevent any reactionary attempts at a counterattack."
 PRC_open_the_window: "Open the Window"
 PRC_open_the_window_desc: "In recent years, China has been increasingly shutting its door to foreign journalists, and human rights investigations, highlighted by China's rather violent confrontation with international organisations including countries on the matter of the Uyghur Genocide in Xinjiang. In order for us to further our agenda, foreign assistance and sympathy could prove highly useful."
 PRC_reform_the_upper_leadership: "Full Speed Ahead!"
 PRC_reform_the_upper_leadership_desc: "Since 1989, voices within the CPC advocating reform have been strictly suppressed. Deng Xiaoping's claim of "prioritizing economic construction" has become the perfect excuse for conservatives to do whatever they want. We will no longer tolerate the continuation of the Party's past mistakes. We will push ahead with true reform, the sooner the better!"
 PRC_roll_back_censorship_programs: "Reform Local Leadership"
 PRC_roll_back_censorship_programs_desc: "Over the years, local governments have had the privilege of dealing directly with enterprises and banks, as well as absolute control over the local police, to serve economic construction and ensure social stability. This has led to rampant corruption. One of the first tasks of the reform is to make the necessary cuts and reorganize the existing local government system, so that it can become more efficient and local officials can become more incorruptible."
 PRC_release_the_tianmen_archives: "Reform the MSS"
 PRC_release_the_tianmen_archives_desc: "The Ministry of State Security of the People's Republic of China controls a vast network of intertwined intelligence organizations and tens of thousands of agents. Their undeniable political influence and positions pose a major threat to our reform plans, which must be addressed. We will begin by removing pro-conservative ministers and replacing them with our allies. Simultaneously, we need to enforce discipline among the agents and ensure their accountability to the country and the government, rather than to the ambitions of any individual."
 PRC_establish_the_principles_of_confucian_democracy: "Embrace Communitarianism"
 PRC_establish_the_principles_of_confucian_democracy_desc: "Democracy is the foremost principle of our reforms, but this does not mean that we will simply adopt the principles of "Western-style democracy", especially its emphasis on liberalism and individualism. These aspects could negatively impact our country's political stability. In our reform plan, we will continue to prioritize collectivism and communitarianism, emphasizing ideological integrity."
 PRC_special_political_zones: "Pragmatic Reformation"
 PRC_special_political_zones_desc: "There is an old Chinese saying: "You can't eat hot tofu in a hurry". Promoting reform is an extremely important issue, especially when we need to confront the thousands of years of political tradition of the Party and this country. We will begin by harmonizing our internal opinions, finding reliable allies within the government, and ensuring that retired patriarchs and political oligarchs do not interfere with us."
 PRC_encourage_provincial_autonomy: "Consolidation of the Guiding Principle"
 PRC_encourage_provincial_autonomy_desc: "In the past, struggles between various factions within the party almost destroyed the government's executive power. We will never make the same mistake again in pursuing the reform program. We will ensure that the lower ranks firmly carry out instructions from the higher ranks. At the same time, to unify the mindset during the reforms, it is necessary for the whole Party to unite closely around the Central Committee with its General Secretary, Comrade Wang Yang."
 PRC_praise_the_wukan_model: "Encourage Statist Reformers"
 PRC_praise_the_wukan_model_desc: "During the Gorbachev era, the Soviet Union also attempted liberalization reforms, but they ended in failure, leading to the breakup of the Soviet Union into several countries. Upon examining this failure, we have clearly recognized that abandoning the Communist Party's absolute leadership over the reform process and allowing reactionaries to participate in the government were the USSR's biggest mistakes. We will not allow a second Gorbachev to emerge, and we will entrust reforms only to those loyal to the Party and the Republic."
 PRC_support_pro_democracy_candidates: "Rooting Out the Weeds"
 PRC_support_pro_democracy_candidates_desc: "The continuous anti-corruption campaign has revealed the excessive redundancy in our government. Many officials hold positions that are either obsolete or unnecessary, leading to a lack of motivation and a gradual transformation of these officials into corrupt individuals. We will conduct a thorough overhaul of the system, retaining only those government departments and officials who can make a real difference."
 PRC_question_the_four_cardinal_principles: "Breeding Ground of Reforms"
 PRC_question_the_four_cardinal_principles_desc: "Building national consensus on reform is also crucial to our cause. We will step up publicity for the reform program and increase the visibility of the new policies that have been introduced. We will empower the official media, perhaps even arranging a special interview with General Secretary Wang Yang, to give the public a clearer picture of what their leaders are planning."
 PRC_rehabilitate_political_dissidents: "Pragmatic Regional Policy"
 PRC_rehabilitate_political_dissidents_desc: "The power struggle between the central and local governments has been a persistent issue that has plagued China's political stability. Historically, such conflicts have even led to divisions and civil wars. Today, by drawing on the experience of successful federalism practices around the world, we aim to resolve this problem once and for all by granting the people and government of each province an appropriate degree of self-determination and self-governance. Of course, all this must be based on the principle of respecting the authority of the central government."
 PRC_push_for_local_democracy: "Chinese Media Thaw"
 PRC_push_for_local_democracy_desc: "Our government has been criticized for years as a totalitarian regime that silences journalists and suppresses freedom of the press. Efforts to change this image will also be included in our reform program. Gradually, we will de-regulate media coverage and end the Party's monopoly on news channels. From now on, the people will be able to hear the truth on television and the Internet."
 PRC_relax_censorship_laws: "Unchain the People's Congress"
 PRC_relax_censorship_laws_desc: "The People's Congress is the highest organ of power in China, but in practice, it is the Political Bureau of the Central Committee of the CPC and its Standing Committee that hold the real supreme power, while the People's Congress is merely a "stamp" used to legitimize the party's policies. The reforms must put an end to this phenomenon. We will strengthen the position of the People's Congress within the government structure and, in particular, increase the political participation of its deputies so that they can become true servants of the people."
 PRC_unchain_the_united_front: ""Large and Strong Society" Concept"
 PRC_unchain_the_united_front_desc: "The Communist Party of China has always aimed to achieve the happiness of all the people as its ultimate goal. Today, we will take the most crucial step toward this goal without any political obstacles. We will establish a welfare program that encompasses all different groups and classes in society, greatly reducing the financial burden on the people in terms of housing, medical care, education, and more. Additionally, long-standing environmental protection programs have been renewed. China's prospects have become much brighter these days."
 PRC_remove_the_guiding_role: "Service-Oriented Government"
 PRC_remove_the_guiding_role_desc: "Premier Li Keqiang once proposed that the government should promote the reform of "decentralization" and return more power to the people and grassroots organizations. The government will no longer act as the people's master, but rather as their servant. This will truly motivate the people to engage in various activities, especially economic activities, while simultaneously enhancing government efficiency, resulting in a win-win situation. We will continue to press ahead with this important reform to solidify the foundation of our more ambitious plans."
 PRC_the_chinese_spring: "The Chinese Spring"
 PRC_the_chinese_spring_desc: "Our reforms have yielded significant results, with leaders at the top of the Party and in the central government marveling at the renewed political atmosphere and revitalized society. Even the most steadfast conservatives have begun to acknowledge the achievements of the reforms. We will seize this momentum and push the reforms even further, while applying lessons learned from successful policies nationwide."
 PRC_fulfill_the_fifth_modernization: "Fulfill the Fifth Modernization"
 PRC_fulfill_the_fifth_modernization_desc: "In the 1980s, college students who supported reform advocated that, in addition to the "Four Modernizations" policy aimed at strengthening the country's power, the "Fifth Modernization"-the modernization of the political system-must not be neglected, and they called on the Party to launch a campaign of democratization. Although their efforts eventually failed, we will inherit the spirit and legacy they left behind. China's democracy movement will be reborn today!"
 PRC_overall_process_peoples_demorcracy: "Party Platformism"
 PRC_overall_process_peoples_demorcracy_desc: "Contrary to the stereotype, the CPC has always strictly practiced "democratic centralism" as one of its core principles. Through effective democratic mechanisms, the CPC was able to defeat reactionaries and achieve victory in the revolution. However, due to political struggles after 1949 and the cult of personality surrounding the leader, this great tradition was gradually forgotten. Now, we will re-establish a reformed democratic mechanism within the Party. Since the CPC is the unquestionable centerpiece of Chinese politics, democracy within the Party means democracy in the country."
 PRC_chinese_special_socialist_democracy: "Chinese Socialist Democracy"
 PRC_chinese_special_socialist_democracy_desc: "We have made the People's Congress the core of our democratic politics. Through the People's Congress, representatives can now meaningfully advocate for the democratic agenda in China's regular political activities. We will take the crucial step of empowering the democratic parties, which previously could only "discuss politics", to make a real difference through elections and public debate. Additionally, even within the CPC, party members will be allowed to voice their opinions. Thus begins a great experiment in democracy."
 PRC_empower_masses_autonomus_committe: "Encourage Education On Democracy"
 PRC_empower_masses_autonomus_committe_desc: "One of the most significant institutional reforms introduced by the Party since the reform and opening up has been the establishment of grassroots mass self-governance organizations as a key element in Chinese politics. These organizations enable residents in both urban and rural areas to directly exercise relevant political rights, as well as engage in self-management, self-service, self-education, and self-supervision. This represents one of the most important achievements in the practice of socialist democracy with Chinese characteristics. As a crucial element of democratic reform, we must continue to uphold and improve this system."
 PRC_promote_political_participation: "Promote Political Participation"
 PRC_promote_political_participation_desc: "There have been claims that the slow progress of democratic reforms in China is due to the inherent utilitarianism and political apathy of the Chinese people. Indeed, over the past thirty years, the excessive pursuit of economic interests and the deliberate focus on economic development have led to a lack of interest in political participation among the Chinese populace. Only when citizens realize that politics is closely related to their daily lives can democratic consciousness take root and flourish in society."
 PRC_multiple_religious_leadership: "Religious Freedom Course"
 PRC_multiple_religious_leadership_desc: "Religious organizations in China have long been required to strictly adhere to the Party's religious policy guidelines and have been instructed to preach to their congregations about supporting the CPC and socialism. It may sound unbelievable that priests are preaching about Mao's great achievements in churches, but it is indeed happening across China. We will change this by relaxing the Party's strict control over religious organizations and allowing them to grow freely. Additionally, the freedom of citizens to practice their religion will be much better guaranteed."
 PRC_the_sun_rises_on_a_new_china: "The Sun Rises on a New China"
 PRC_the_sun_rises_on_a_new_china_desc: ""The East is Red, the Sun is Rising", a song once used to glorify Mao, can now also be used to describe contemporary China. Citizens' sense of national identity and patriotism is once again on the rise, as evidenced by a yearly decline in the total number of emigrants overseas. Prosperity and democracy are no longer the trade-offs they were 30 years ago; instead, they play irreplaceable roles as the two most important pillars of modern Chinese politics."
 PRC_party_renewal_and_revision_campaign: "Party Renewal and Revision Campaign"
 PRC_party_renewal_and_revision_campaign_desc: "The CPC must continue to lead this critical reform movement as the vanguard of the Chinese people, and to that end, the 90 million party members must first be fully mobilized. We will launch a series of political campaigns within the Party to make it a vibrant symbol of the democratization movement, in accordance with our needs and political vision."
 PRC_cadre_rejuvenation: "Cadre Rejuvenation"
 PRC_cadre_rejuvenation_desc: "For promoting any political movement, it is necessary to first secure control over personnel. Since the reformist faction in the Central Committee is already dominant, we will begin to push for a top-down renewal of the Party's organization. The standards for selecting party members and cadres will be revised to promote reform activists more effectively. Additionally, among the cadres currently at all levels of the Party organization, we will select those who have excelled in the reform movement and remove those who are least popular with the people."
 PRC_support_initiatives_in_the_party: "Support Initiatives in the Party"
 PRC_support_initiatives_in_the_party_desc: "Given that party members occupy virtually all civil service posts, meeting their demands and enhancing their enthusiasm for work will also enhance the general efficiency of the government. We will formulate a more reasonable welfare program and promotion mechanism to ensure that party members are properly rewarded for their hard work and that every party member feels their dedication is always noticed. After all, we cannot just ask party members to serve the people without letting them feel the value of doing so."
 PRC_the_new_peoples_democratic_program: "The New Peoples Democratic Program"
 PRC_the_new_peoples_democratic_program_desc: "In the political discourse of the CPC, "The people are the masters of their own country" has long been the most common expression of the goal of building a democratic system in China. Policymakers believe that under the Party's guidance and the new system's safeguards, the people will gradually develop a sense of ownership of the country, and their ability to utilize their democratic rights for cooperation will be strengthened. Additionally, we will continue to uphold the socialist nature of the reform and unite all classes of society under the Party's call for "consultative democracy"."
 PRC_party_of_xxi_century: "Party of XXI Century"
 PRC_party_of_xxi_century_desc: "The pursuit of reform has been both glorious and arduous, with setbacks more common than successes. But we have reason to be proud of ourselves. The CPC is no longer the stale, bureaucratic interest group it once was. Today, the Party has been revitalized and re-energized. Furthermore, state-of-the-art technologies have been introduced into the Party's internal management and government operations, further galvanizing the Party's encouragement of the spirit of innovation and the spread of the spirit of reform."
 PRC_five_shinig_stars_of_china: "Five Shining Stars of China"
 PRC_five_shinig_stars_of_china_desc: "President Wang Yang proudly announced to the Chinese people and the world in Beijing that China's reform has achieved a major milestone. This ancient civilization is now moving towards a brighter future. Its economy continues to prosper, its Party is guiding the nation with wisdom, its government is strong and efficient, its people are happy and united, and its army is the solid shield of the motherland. The five stars on the Chinese national flag have never shone as brightly as they do now."

 PRC_economic_cake_growth: "Economic "Cake Growth""
 PRC_economic_cake_growth_desc: "When General Secretary Wang Yang served as the Secretary of the Guangdong Provincial Committee, he proposed the idea of expanding the "economic cake." Continuous economic growth is essential to improve the living standards of the broader populace, ensuring equitable distribution and ultimately achieving common prosperity."
 PRC_break_soe_hegemony: "Break SOE Hegemony"
 PRC_break_soe_hegemony_desc: "State-owned enterprises (SOEs) dominate several economic sectors in China, including transportation, energy, and tobacco. Many can be described as "Leviathans." To reform persistent issues and boost China's economic dynamism, we must implement substantial changes to SOEs that exhibit rigidity, inefficiency, and corruption."
 PRC_chinese_theory_corporatism: "The Chinese Theory of Corporatism"
 PRC_chinese_theory_corporatism_desc: "We must recognize that the widening gap between rich and poor since the reform and opening up has intensified social conflicts in China. Unbalanced economic development and weak regulation have also fueled fierce competition among enterprises. Introducing the concept of corporatism is necessary. It is time for a comprehensive reform and adjustment of the economy."
 PRC_introduce_separation_state_economy: "Separate the State from the Economy"
 PRC_introduce_separation_state_economy_desc: "The archives of the State-owned Assets Supervision and Administration Commission (SASAC) reveal how state-controlled financial enterprises hold significant influence. Many economic crises in China, particularly the real estate crisis, are linked to these large enterprises' close ties with the government. Fundamental reforms are necessary for China's economy to escape structural crises."
 PRC_encourage_competition: "Encourage Competition"
 PRC_encourage_competition_desc: "Reforming the SOE system can promote further liberalization of industries and markets. By allowing private enterprises into sectors previously dominated by SOEs and encouraging competition, we can enhance economic efficiency. This competition will help eliminate underperforming enterprises, improving the overall competitiveness of China's economy."
 PRC_ten_strikes_burdensome_tarrifs: "Ten Strikes to the Burdensome Tarrifs"
 PRC_ten_strikes_burdensome_tarrifs_desc: "While it may seem that the Chinese government has total control over economic matters, this is not entirely true. To stimulate market vitality further, we need targeted reforms, such as reducing burdens and taxes on key enterprises and addressing local protectionist policies."
 PRC_final_blow_iron_bowl: "Final Blow to Iron Bowl"
 PRC_final_blow_iron_bowl_desc: "Now is the time for bold and controversial reforms. Positions within state-owned enterprises, often seen as "iron rice bowls" due to their stability and benefits, are becoming a thing of the past. We will shift to incentive-based employee benefits and implement stricter performance reviews. This will lead to a reduction in positions and increase employee mobility within SOEs."
 PRC_preserve_two_mountain_theory: "Preserve the Two Mountain Theory"
 PRC_preserve_two_mountain_theory_desc: "The real economy is the lifeblood of China and the foundation of our national competitiveness. Regardless of the circumstances, our economic development must focus on the real economy. We will also commit to sustainable development to secure a better future for our descendants."
 PRC_encourage_digitalization: "Encourage Digitalization"
 PRC_encourage_digitalization_desc: "In the 21st century, the digital economy has become essential for developed economies and a key link in global markets. We will prioritize the development of the digital economy, improve our institutional framework in this area, and attract more investment."
 PRC_sez_expansion: "Expansion of Special Economic Zones"
 PRC_sez_expansion_desc: "Special Economic Zones (SEZs), established during the Deng Xiaoping era, were designed to promote economic and institutional reforms in specific regions, with successful practices later applied nationwide. This strategy reduces the risk of widespread crises and provides necessary support for reforms. We will continue this important tradition and adapt it to our current development needs."
 PRC_set_free_private_defense_companies: "Set Free Private Defense Companies"
 PRC_set_free_private_defense_companies_desc: "Private enterprises are the most dynamic part of our economic system. We will encourage entrepreneurship and innovation among the populace, support the "Bright Future of China's Economy", and relax restrictions on the private sector."
 PRC_prioritize_tech_sector: "Prioritize the Tech Sector"
 PRC_prioritize_tech_sector_desc: "Science and technology are the main drivers of productivity and competitiveness. We will encourage society to focus more on the global technology race and innovation, promoting collaboration among government research institutions, private research institutes, and the manufacturing sector."
 PRC_guiding_role_market: "Guiding Hand of the Market"
 PRC_guiding_role_market_desc: "We will strengthen the government's ability to regulate the economic sector and financial markets. The state will take a more active role as an arbitrator and mediator, fostering economic growth while safeguarding national interests."
 PRC_harmonization_companies: "Harmonization of Companies"
 PRC_harmonization_companies_desc: "We will create special communication groups and committees within both central and local governments to coordinate the interests of various enterprises, reducing unnecessary competition and conflicts of interest. Some may argue that this increases the political influence of large corporations, but as long as the Party remains the ultimate authority, stability will be maintained."
 PRC_corporate_autonomism: "Corporate Autonomism" 
 PRC_corporate_autonomism_desc: "In the past, we encouraged Party members within private enterprises to establish Party branches, enhancing our influence over entrepreneurs. Now, we will further strengthen cooperation between the Party and business leaders while ensuring they have the freedom to run their companies and grow their personal wealth."
 PRC_reformed_corporate_iron_bowl: "Reformed Corporate Iron Bowl"
 PRC_reformed_corporate_iron_bowl_desc: "Now is the time for bold and controversial reforms. Positions within state-owned enterprises, often seen as "iron rice bowls" due to their stability and benefits.We will improve the efficiency and competitiveness of state-owned enterprises by streamlining employee positions and increasing entry requirements. This approach will promote workforce mobility and attract more talented individuals, revitalizing these enterprises."
 PRC_wang_yang_three_campaigns: "Revise the Fifteenth Five Year Plan"
 PRC_wang_yang_three_campaigns_desc: "Our General Secretary Wang Yang has great foresight. Under his leadership, we will implement adjustments, consolidations, and enhancements in the economic field, focusing on three major areas: military industries, advanced manufacturing, and environmental protection."
 PRC_military_industries_renewal_campaign: "Military Industries Renewal Campaign"
 PRC_military_industries_renewal_campaign_desc: "The true revival and reform of the Chinese nation require a strong military to safeguard it. Without a well-developed national defense industry, the military is like a person with drained blood vessels, unable to protect the country effectively."
 PRC_china_future_campaign: "Nurture Academic Thoughtmode"
 PRC_china_future_campaign_desc: "We can no longer focus solely on the current international situation and economic conditions. By looking to the future, China can transition from being merely the world's factory to becoming a leader in the global economy and technology."
 PRC_greening_economy_campaign: "Greening the Economy Campaign"
 PRC_greening_economy_campaign_desc: "If we do not prioritize sustainable development, the pollution from economic growth will eventually destroy the Earth's ecology. China will take the lead in this area, becoming a major contributor to environmental protection."
 PRC_100_dockyard_plan: "100 Dockyards Plan"
 PRC_100_dockyard_plan_desc: "China will launch a large-scale dockyard expansion and construction plan while upgrading key shipbuilding infrastructure in Dalian, Qinhuangdao, Shanghai, Guangzhou, and other locations. We must restore and strengthen our navy as quickly as possible."
 PRC_set_new_military_standarts: "Set New Military Standarts"
 PRC_set_new_military_standarts_desc: "We need to increase the high-tech content of our military weapons, upgrade arsenal production lines, improve research methodologies, and reorganize weapon research and development teams. Only in this way can we compete effectively with our most dangerous adversaries."
 PRC_lower_tax_high_tech: "Subsidize High-Tech Companies"
 PRC_lower_tax_high_tech_desc: "Entrepreneurs in the high-tech sector often express concerns to the Party and government that high tax rates hinder their expansion and technological upgrades. In the past, to ensure government revenue and limit excessive corporate growth, we overlooked these complaints. Now, we will positively address these demands."
 PRC_phased_decommissioning_old_plants: "Energy of the Future"
 PRC_phased_decommissioning_old_plants_desc: "Old fossil fuel power plants are heavily polluting and highly inefficient. We will develop a detailed plan to systematically upgrade them to new power plants equipped with advanced technology and lower emissions."
 PRC_encourage_industrial_modernization: "Encourage Industrial Modernization"
 PRC_encourage_industrial_modernization_desc: "Promoting industrial upgrading is our only path to overcoming technical blockades and economic barriers. We will focus on improving production processes and training engineers and workers for new production lines."
 PRC_invest_mass_smart_manufacturing: "Invest in Mass Smart Manufacturing"
 PRC_invest_mass_smart_manufacturing_desc: "We will provide more incentives for enterprises in the smart manufacturing sector. In addition to tax reductions, we will encourage local governments to invest in high-tech enterprises through measures such as research funding subsidies, reduced land lease costs, and talent introduction programs."
 PRC_support_agricultural_modernization: "Support Agricultural Modernization"
 PRC_support_agricultural_modernization_desc: "Over the past seventy years, rural areas, farmers, and agriculture have suffered as the "fuel" for our economic development. We must increase farmers' means of prosperity and improve their living conditions to address this crucial issue."
 PRC_shipbuilding_ingenuity: "Shipbuilding Ingenuity"
 PRC_shipbuilding_ingenuity_desc: "We will encourage the adoption of innovative technologies in the shipbuilding industry, such as using robots for assembly and maintenance, and employing artificial intelligence to assist in ship design. This will attract more young and skilled talent to the field."
 PRC_expand_research_development: "Fund AI Research"
 PRC_expand_research_development_desc: "Advanced science and technology will drive the progress and development of future society. In this regard, we should not fear failure or disappointment. Instead, we should pay close attention to any research projects that show potential for development."
 PRC_encourage_domestic_production: "Encourage Domestic Production of Materials"
 PRC_encourage_domestic_production_desc: "The new materials industry plays a crucial role in advancing our country's industrial and information technology development. We will leverage the coordination functions of the State Council to oversee the entire industry while fully utilizing our abundant rare earth resources."
 PRC_green_energy_green_vehicles_plan: "Boost Smart Vehicle Export"
 PRC_green_energy_green_vehicles_plan_desc: "New energy vehicles represent a key sector in high-end manufacturing and can rightly be called the "crown jewel of the industry." We will further promote the manufacturing of new energy vehicles and enhance the prosperity of the entire upstream and downstream industry chain, including the development of the solar cell manufacturing industry, while encouraging Chinese car brands to expand globally."
 PRC_new_china_model: "The New Workshop of the World"
 PRC_new_china_model_desc: "Under the wise leadership of General Secretary Wang Yang, we have achieved significant victories in the three major economic movements. Today, the "China Model" has been revitalized; it is no longer the rigid state capitalism model criticized in the past. The entire Chinese population has formed a cohesive whole, and China's prosperity is not just a fleeting moment but the herald of a new era!"

 #taiwan loss tree
 PRC_shameful_display: "Shameful Display"
 PRC_shameful_display_desc: "It's all over. We gambled the future of our nation on the victory of Taiwan War, and all that has gone with the wreckage of the warships in the Taiwan Straits and the corpses of our soldiers lying on the beaches. We have no choice but to quietly accept the shameful tragedy and allow PDTO to celebrate the victory of the so-called "freedom and democracy." At the same time, we need to deal with the chaotic situation at home."
 PRC_suspend_the_npc: "Suspend the NPC"
 PRC_suspend_the_npc_desc: "The defeat of the war has caused us to lose not only the trust of the people, but also the support of our comrades in the Party; whispers of conspiracies echoed in the corridors of the Great Hall of the People. The Central Office has received records that several factions within the Party are agitating for the convening of a new NPC Standing Committee Meeting to "review the mistakes of the failure in Taiwan". For the moment, we can only hope that they will not make a public outburst, as well as maintaining the party's apparent stability and unity for the time being."
 PRC_quell_the_protests: "Quell the Protests"
 PRC_quell_the_protests_desc: "After we returned from Taiwan in disgrace, there have been numerous demonstrations all over this country. Those who marched in the streets included not only university students who had always been dissatisfied with the Party, but also those who had suffered from the war, including disabled veterans, industrialists who had gone bankrupt as the result of economic sanctions, and so on. They are not only condemning the defeat, but also the foolishness and dereliction of duty on of the party that started the war. Police have been mobilized to suppress the protests, but it is doubtful whether they have the morale and capacity to do so."
 PRC_salvage_the_situation: "[salvage_the_situation_dynamic]"
 PRC_salvage_the_situation_desc: "[salvage_the_situation_dynamic_desc]"
 salvage_the_situation_fake: "Salvage the Situation"
 salvage_the_situation_real: "Military Restores Order"
 salvage_the_situation_fake_desc: "As awful as everything looks, we are fortunate to still have our loyal allies within the party and the army. With their help, we will quell civil opposition, suppress party conspiracies, appease military discontent, and keep everything working as we planned and intended. As it turns out, we still have a second chance to make up for our failures..."
 salvage_the_situation_real_desc: "It finally happened! The feeble Xi Jinping and the CPC leadership have neither the determination nor the ability to fix the situation. The only thing they care about is maintaining their dominance, and that's why they will start the war as well as lose it. Now, only the PLA, the vanguard of the people, can truly return China to stability and rise above the shadow of defeat."
 PRC_put_an_end_to_weakness: "Put an End to Weakness"
 PRC_put_an_end_to_weakness_desc: "To this day, the party cadres can no longer be allowed to control the future of this country. They are either corrupt, weak or too idealistic to run the government... We will entrust the fate of the Republic and the people to the great People's Liberation Army until the reactionaries have been wiped out and Mao's flag will rise to the sky!" 
 PRC_prepare_the_new_congress: "Prepare A New Congress"
 PRC_prepare_the_new_congress_desc: "Xi Jinping and his henchmen have already paid the price for the mistakes and crimes they committed. At this moment, we will follow the will of the party and the people by organizing a plenary meeting of the Provisional Party Central Committee. This meeting will decide the future prospects and destiny of the Party and the Republic, just as the Party Congresses in 1945, 1978 and 1989 did. Will the Five-Star Red Flag, colored by the blood of the revolution's martyrs, continue to fly high?"
 PRC_consolidate_hu_chunhua_support: "Consolidate Hu Chunhua's Support"
 PRC_consolidate_hu_chunhua_support_desc: "Once one of Xi's successors designated by Hu Jintao, Hu Chunhua became a member of the Politburo in 2012 after years of working in the Communist Youth League and Tibet. He also served as vice premier in charge of agriculture and poverty reduction in the previous administration, but most of his achievements have been monopolized by Xi. Hu has long been respected for his youth, low-profile and pragmatism, yet Xi saw him as a threatening political foe and eventually relegated him to the fringes of the leadership. Now, China can only have hope if a leader like Hu, who understands the plight of the people, is elected as general secretary."
 PRC_wang_yang_connections: "Use Wang Yang's Connections"
 PRC_wang_yang_connections_desc: "Former CPPCC Chairman Wang Yang has long been known to the world as an open-minded member of the party. Whether as secretary of the Guangdong Provincial Party Committee or as a vice premier, Wang was considered to be quick-witted, well-versed, and enthusiastic about reform in practical matters. Wang, who ranks fourth in the Politburo Standing Committee, also stands out as a far better personal figure than the clumsy general secretary Xi Jinping. We will choose such a good son of the Chinese people to be the new general secretary, and believe that he can lead our country to find a new way out of the predicament and prosper again."
 PRC_begin_the_session_of_cpc: "Begin the Session of CPC"
 PRC_begin_the_session_of_cpc_desc: "We have endured what was likely the most perilous and stressful period in our nation's history. The Provisional Central Committee recently convened a plenary meeting in Beijing. All Chinese eyes are fixed on the Great Hall of the People, as they await their representatives' crucial decisions for their country. We cannot afford to let them down again."
 #new left focuses 
 PRC_the_red_phoenix: "The Red Phoenix"
 PRC_the_red_phoenix_desc: "When Heaven is about to bestow a great responsibility upon someone, Hu Chunhua will assume the highest authority. He is expected to cleanse the shame left by Xi, restoring the Party's and the people's honor, and allowing the great People's Republic to be reborn from the ashes like a phoenix!"
 PRC_invite_new_left_scholars: "Invite New Left Scholars"
 PRC_invite_new_left_scholars_desc: "In academia, many scholars support a revolutionary path different from socialism with Chinese characteristics, but their voices have been suppressed by the authorities. We will allow them to speak freely and contribute their suggestions."
 PRC_humanist_marxism: "Humanist Marxism"
 PRC_humanist_marxism_desc: "Marxism has long been misunderstood and tarnished by brutal industrialization, purges, and fanatic political movements. We aim to highlight Marx's profound thoughts on human destiny and his deep compassion for the proletariat."
 PRC_legacy_of_mao: "Legacy of Mao"
 PRC_legacy_of_mao_desc: "Mao was the founder of the People's Republic of China and remains the most significant leader of the Communist Party of China. Although his legacy faced heavy criticism and alterations after his death, today we will revive Chairman Mao's ideals."
 PRC_fuel_chinese_nationalism: "Fuel Chinese Nationalism"
 PRC_fuel_chinese_nationalism_desc: "Nationalism has always had a strong presence in China, and following the defeat in the Taiwan Strait, it is even more crucial to restore societal confidence and unity. We need to harness nationalism to strengthen our national spirit and cohesion."
 PRC_reconcile_with_militarists: "Reconcile with the Militarists"
 PRC_reconcile_with_militarists_desc: "After the Taiwan War, the influence of PLA generals and defense industry leaders in Chinese politics has grown significantly. While some fear that they might seek more power through their military control, it is essential that we engage with them pragmatically and cautiously."
 PRC_denounce_xi_revisionism: "Denounce Xi's Revisionism"
 PRC_denounce_xi_revisionism_desc: "Xi's policies have not only led to disaster for the country but have also tarnished socialism. Through official propaganda channels, we will guide society to critique Xi's failed policies and his faction, thereby consolidating our own power."
 PRC_reliable_politburo: "Reliable Politburo"
 PRC_reliable_politburo_desc: "The Politburo is the highest leadership body of the Party and holds the ultimate power in China. At critical historical junctures, ensuring the unity of the leadership team is sometimes the most crucial task."
 PRC_revolution_of_21_century: "Revolution of the 21st Century"
 PRC_revolution_of_21_century_desc: "We will innovatively develop Marxism and Mao Zedong Thought to align them with the social and economic conditions of the 21st-century socialist revolution. This will be done with greater clarity and commitment than the ideas of Deng and Xi."
 PRC_revive_peoples_war_mindset: "Revive People's War Mindset"
 PRC_revive_peoples_war_mindset_desc: "The concept of the people's war was a crucial element in the Communist Party of China's revolutionary victory, but with rapid advancements in military technology, this idea has faded. After the defeat in the Taiwan Strait, it is time to revive the people's war mindset, ensuring that warfare is not solely the domain of the regular army but involves the entire populace as a robust support for the soldiers."
 PRC_right_the_wrongs_of_1978: "Right the Wrongs of 1978"
 PRC_right_the_wrongs_of_1978_desc: ""
 PRC_revitilize_peoples_democratic_dictatorship: "Revitalize People's Democratic Dictatorship"
 PRC_revitilize_peoples_democratic_dictatorship_desc: "In our pursuit of economic development, we have made numerous compromises, including allowing capitalists to join the Communist Party. This has distanced the Party from the working masses and allowed reactionary rhetoric to influence it, protecting the interests of social elites and the emerging bourgeoisie. We will reverse this trend and reestablish the Party as a revolutionary entity representing the proletariat."
 PRC_popular_socialist_democracy: "Popular Socialist Democracy"
 PRC_popular_socialist_democracy_desc: "Socialism must become a powerful tool for the Chinese people to combat bureaucratic capitalism and imperialism. Hu Chunhua will announce to the nation that the Party and government will ensure that socialism is truly integrated into the lives and thoughts of 1.4 billion people, rather than remaining an empty slogan."
 PRC_the_party_belongs_to_the_youth: "The Party Belongs to the Youth!"
 PRC_the_party_belongs_to_the_youth_desc: ""
 PRC_the_international_revolution_burns_once_more: "The International Revolution Burns Once More"
 PRC_the_international_revolution_burns_once_more_desc: ""
 PRC_emphasize_self_criticism: "Emphasize Self Criticism"
 PRC_emphasize_self_criticism_desc: ""
 PRC_expand_provincial_authority: "Expand Provincial Authority"
 PRC_expand_provincial_authority_desc: ""
 PRC_stir_up_youth_patriotism: "Stir Up Youth Patriotism"
 PRC_stir_up_youth_patriotism_desc: "The thoughts of young people shape the social ethos and trends for both the present and the next twenty years. We will strengthen young people's love and sense of belonging to the socialist motherland by promoting the heroes and role models from the period of revolutionary struggle and socialist construction."
 PRC_communist_vanguard_restored: "Communist Vanguard Restored"
 PRC_communist_vanguard_restored_desc: "Arise, heroes of all nations!\nThe great Communist Party, leads us in our Long March!\nUnited as one, we march towards the Communist tomorrow!\nBuild our motherland, defend our motherland, fighting bravely.\nMarch on! March on! March on!\nFor generations to come,\nHold high the banner of Mao Zedong, March on!\nHold high the banner of Mao Zedong, March on!\nMarch on! March on and on!"
 PRC_rejuvinate_cpc_cadres: "Rejuvenate CPC Cadres"
 PRC_rejuvinate_cpc_cadres_desc: "The current corrupt bureaucrats are hindering the realization of communist ideals. We will "appoint talents regardless of their background", promoting younger, more energetic, idealistic, and empathetic cadres to central leadership positions."
 PRC_exonorate_neo_maoists: "Exonorate Neo-Maoists"
 PRC_exonorate_neo_maoists_desc: "Since the Reform and Opening-up, Neo-Maoists have been labeled as outdated "antiques" and disgruntled anti-establishment figures. This has been a misguided attack on those who genuinely care about the populace. Now, Neo-Maoists will return to prominence as a significant voice for the people."
 PRC_reverse_confucian_turn: "Reverse Confucian Turn"
 PRC_reverse_confucian_turn_desc: "Confucian thought was heavily criticized during Mao's era, but its influence remains deeply rooted in Chinese thinking. In the 21st century, it has even become part of the officially promoted traditional Chinese culture. We will put an end to the re-exploitation of these ancient, outdated ideas. The museum will be the only place for Confucian teachings."
 PRC_restore_party_authority: "Restore Party's Authority"
 PRC_restore_party_authority_desc: "Becoming a party member was once viewed as a primary avenue for personal ambition and acquiring wealth and status. This mindset, coupled with official encouragement, led to a decline in the Party's image and effectiveness. We will restore the Party to its role as an advanced organization dedicated to serving the people."
 PRC_new_red_culture_initiative: "New Red Culture Initative"
 PRC_new_red_culture_initiative_desc: "Socialism represents progress and cultural diversity, but over the past forty years in China, the cultural sphere has been dominated by liberal ideologies, which is unacceptable. We will actively revive socialist culture, promote the integration of popular art with Chinese national conditions, and counteract the hedonistic trends in the cultural sector."
 PRC_revise_cultural_revolution_verdict: "Revise Cultural Revolution Verdict"
 PRC_revise_cultural_revolution_verdict_desc: "The "Cultural Revolution" remains a contentious topic, and its evaluation is a key indicator of whether someone is considered left-wing or right-wing. We will undertake a thorough revision of its historical judgment to provide a more balanced perspective."
 PRC_crackdown_on_corruption: "Crackdown on Corruption"
 PRC_crackdown_on_corruption_desc: "Corruption is not merely an issue of ideology or personal behavior. The anti-corruption campaign will be a just struggle waged by the progressive forces of socialism against the bourgeoisie and the reactionary revisionists within the Party. It is time to launch a large-scale anti-corruption campaign that will make the people proud and elated!"
 PRC_cutdown_party_bureaucracy: "Cut Down Party Bureaucracy"
 PRC_cutdown_party_bureaucracy_desc: "The Party has absorbed too many bureaucrats and established numerous ineffective organizations, often just to preserve its image. Consequently, it is no surprise that many incompetents and opportunists within the Party lack a true understanding of communist ideals. Only by cutting away these burdens can the Party and government regain their vitality and efficiency."
 PRC_foster_authoritative_statesmen: "Foster Authoritative Statesmen"
 PRC_foster_authoritative_statesmen_desc: "A ruling socialist party cannot exist without strong and authoritative leadership. Ensuring that the most revolutionary and capable cadres rise to the leadership collective is the only way to guarantee that the socialist state remains red forever."
 PRC_reform_the_cppcc: "Reform the CPPCC"
 PRC_reform_the_cppcc_desc: "The National Committee of the Chinese People's Political Consultative Conference gathers social elites from the ruling party, the CPC, and participating parties such as the China Democratic League and the China National Democratic Construction Association. However, it has often been perceived as a powerless forum. We will reform the CPPCC to grant it real authority and include not only social elites but also outstanding moral models and labor heroes from all walks of life."
 PRC_expand_provincial_autonomy: "Expand Provincial Autonomy"
 PRC_expand_provincial_autonomy_desc: "Bureaucracy and ineffective guidance from the central government have long been criticized. Numerous examples show that central government policies often fail due to a lack of understanding of local conditions. We will expand provincial authority not by empowering more bureaucrats, but by increasing the participatory and supervisory rights of the people in each province, allowing them to better shape their own futures."
 PRC_eadi_exercises_new_left: "EADI Exercises"
 PRC_eadi_exercises_new_left_desc: ""
 PRC_protect_human_rights: "Protect Human Rights"
 PRC_protect_human_rights_desc: "Human rights have long been a taboo for the past party and government, reflecting their lack of confidence in the socialist path. We will prioritize human rights protection in the new central government, ensuring that the broad masses can experience the warmth of socialism."
 PRC_free_political_prisoners: "Free Political Prisoners"
 PRC_free_political_prisoners_desc: "The Party rarely forgives or rehabilitates those who have been overthrown, but this time will be an exception. According to relevant laws, we will grant amnesty to some political prisoners imprisoned since the year 2000. Among them, you may find a few familiar names..."
 PRC_emancipate_the_npc: "Emancipate the NPC"
 PRC_emancipate_the_npc_desc: "As the highest organ of state power, the National People's Congress has long been nominal. To truly establish socialist democracy, we must first promote the emancipation of thought within the NPC, allowing the nation's elites and representatives to think and discuss the future of socialism freely."
 PRC_modernize_hu_jintao_theories: "Modernize Hu Jintao's Theories"
 PRC_modernize_hu_jintao_theories_desc: "Hu Jintao, General Secretary from 2002 to 2012, was known for his benevolent policies and his focus on economic development and social equality. As the mentor of our current General Secretary, we will continue to develop Hu Jintao's Scientific Outlook on Development to align it more closely with China's current situation."
 PRC_anti_lobbying_laws: "Anti-Lobbying Laws"
 PRC_anti_lobbying_laws_desc: "Don't assume that politics and business in a socialist country are free from conflicts of interest. Widespread corruption has sparked significant public resentment in the past but has never been seriously addressed by any government, often dismissed as an inevitable part of economic development. We will establish formal laws to tackle this issue and openly declare a campaign against it."
 PRC_permit_business_assosications: "Permit Business Assosications"
 PRC_permit_business_assosications_desc: "Government support is crucial for the development of enterprises, and input from business representatives can help the government adjust its economic policies more effectively. We need to acknowledge this relationship and formalize and legalize it."
 PRC_reform_local_elections: "Reform Local Elections"
 PRC_reform_local_elections_desc: "We will undertake a crucial step: after decades of exploration and numerous setbacks, a new grassroots election and autonomy system will be implemented in daily political life. This new system will better address the vital interests of the masses and counteract long-standing political apathy."
 PRC_from_the_clean_slate: "From a Clean Slate"
 PRC_from_the_clean_slate_desc: "For over seventy years, bureaucratism has been the greatest obstacle to realizing the fundamental interests of the masses. We will reform the bureaucratic system by transforming the deeply entrenched internal interest relations into a new system that combines the election of officials with the selection of NPC representatives."
 PRC_theory_of_neo_socialism: "[PRC_theory_of_neo_socialism_scripted_loc]"
 PRC_theory_of_neo_socialism_1: "Theory of Neo Socialism"
 PRC_theory_of_neo_socialism_2: "New Three Principles of the People"
 PRC_theory_of_neo_socialism_3: "Technocratic Prosperity"
 PRC_theory_of_neo_socialism_4: "Chinese Patriotic Society"
 PRC_theory_of_neo_socialism_desc: "[PRC_theory_of_neo_socialism_scripted_loc_desc]"
 PRC_theory_of_neo_socialism_desc_1: "Neo-socialism, proposed in the mid-20th century, was a response to mainstream Soviet-style socialism, highlighting the dangers of bureaucratism, revisionism, and a rigid economic system. We will draw from its valuable elements and adapt them to better fit China's national conditions."
 PRC_theory_of_neo_socialism_desc_2: ""
 PRC_theory_of_neo_socialism_desc_3: ""
 PRC_theory_of_neo_socialism_desc_4: ""
 PRC_concessions_to_partocrats: "Concessions To Partocrats"
 PRC_concessions_to_partocrats_desc: "Even in China's most turbulent times, Mao never relinquished the leadership of the Communist Party of China. As successors of Chairman Mao and socialism, we will continue to uphold the leadership of the CPC and strengthen socialism through Party reform."
 PRC_modernization_of_the_party: "Modernization of The Party"
 PRC_modernization_of_the_party_desc: "By adopting reformed neo-socialist ideas, the Party will modernize and align more closely with contemporary values, strengthening its connection with the people. The Party will lead social progress, and public opinion will drive its self-reform."
 PRC_a_truly_harmonious_society: "A Truly Harmonious Society"
 PRC_a_truly_harmonious_society_desc: "In ancient Chinese mythology, there was an idealized era where "doors were left open at night, and lost items were not picked up from the road." This vision has been a cherished dream for countless generations of Chinese people. Today, we are proud to announce that such a harmonious society has truly been realized in 21st-century China!"
 PRC_prepare_for_the_peoples_war: "Prepare for the Peoples War"
 PRC_prepare_for_the_peoples_war_desc: ""
 PRC_denounce_deng_xiao_ping_thought: "Rollback Deng Xiaoping's Reforms"
 PRC_denounce_deng_xiao_ping_thought_desc: "It is high time to expose the myths surrounding Deng Xiaoping's "Reform and Opening-up." In reality, these so-called reforms were nothing more than the government sacrificing the interests of the majority to benefit a small group of vested interests. Furthermore, the so-called opening was essentially a revival of feudal bureaucratic capitalism. We will eradicate all these outdated remnants and build a truly socialist China."
 PRC_socialist_modernization: "Socialist Modernization"
 PRC_socialist_modernization_desc: "Socialist modernization must not be a provisional strategy like the so-called "letting some get rich first" approach. It is imperative to demonstrate that the benefits of economic development are shared by all citizens. To this end, we will further promote inter-provincial transfer payments and initiate a new wave of infrastructure development."
 PRC_peoples_oriented_development: "People Orientated Development"
 PRC_peoples_oriented_development_desc: "The objective of economic policy must center on achieving individual happiness and aspirations, as dictated by our socialist principles. Although our past efforts in this regard have been inadequate, we are now committed to rectifying this to ensure better outcomes."
 PRC_fund_space_development: "Fund Space Development"
 PRC_fund_space_development_desc: "The space sector represents the pinnacle of a nation's technological prowess. By strongly supporting our space sector, we will not only showcase the strength of China's industrial capabilities but also our ability to lead in frontier technologies."
 PRC_towards_automated_socialism: "Dreams of Automated Socialism"
 PRC_towards_automated_socialism_desc: "Automation! A word that captivates the imagination, symbolizing the pinnacle of socialist ambitions. It is a grand objective pursued relentlessly by generations of researchers and pioneers. Today, we will bring this shared dream to life in China, turning it into a tangible reality."
 PRC_invest_in_artificial_intelligence: "Invest in Artifical Intelligence"
 PRC_invest_in_artificial_intelligence_desc: "Western capitalist societies often portray artificial intelligence as an enormous threat, akin to a monstrous flood. However, our new China firmly believes in human triumph. In the hands of diligent people, artificial intelligence will become the most effective tool for achieving the grand vision of socialism."
 PRC_nationalize_tech_industry: "Nationalize Tech Industry"
 PRC_nationalize_tech_industry_desc: "Over the past decade, joining the ranks of countries with world-class high-tech capabilities has been our aspiration. To truly realize this dream, we must rely on the leadership of the Party. Given that most of the leading figures in this field are Party members, why not take it a step further and nationalize key enterprises under Party supervision?"
 PRC_anti_corruption_technology: "Anti-Corruption Technology"
 PRC_anti_corruption_technology_desc: "As the saying goes, corruption is like a lubricant, but too much lubricant can cause the machine to seize up. We will use advanced technology to control potential corruption methods, prevent corruption, and address corrupt individuals."
 PRC_advanced_economic_planning: "Advanced Economic Planning"
 PRC_advanced_economic_planning_desc: "China's economy has long been renowned for its low-cost advantage and economies of scale. However, this is not a point of pride. We must prioritize the development of high value-added industries, fundamentally changing the stereotype of low labor productivity and high work pressure in China."
 PRC_fund_supercomputing_expansion: "Supercomputing Expansion"
 PRC_fund_supercomputing_expansion_desc: "One of the most crucial aspects of the 21st-century technological race is the competition in supercomputing. China's most representative supercomputer, the "Sunway TaihuLight", was once the most advanced in the world. Now, we will ensure that this prestigious title remains with Chinese supercomputers indefinitely."
 PRC_intelligent_supply_chains: "Intelligent Supply Chains"
 PRC_intelligent_supply_chains_desc: "We are set to implement the latest advancements in artificial intelligence and autonomous driving technologies in the construction of our national transportation network and the upgrade of our traffic monitoring systems. Ultimately, this will achieve comprehensive coverage across our nation's vast 9.6 million square kilometers of territory. This undertaking will be an unprecedented feat that no other country has accomplished before."
 PRC_economic_computerization: "Economic Computerization"
 PRC_economic_computerization_desc: "We will entirely entrust the power of economic planning and dynamic monitoring to an automated system. Furthermore, the built-in artificial intelligence, equipped with a self-learning mechanism, will ensure the dynamic adjustment of the economic system to maximize efficiency. At long last, we will be able to rid ourselves of the bureaucratic issues that have plagued socialist countries for years."
 PRC_expand_network_coverage: "Expand Network Coverage"
 PRC_expand_network_coverage_desc: "China boasts the world's largest internet user base, and the network coverage rate has rapidly increased over the past decade. We will further upgrade our internet coverage and telecommunication systems. The slogan "Internet flies into millions of households", coined in the year 2000, will no longer ring hollow."
 PRC_inegrate_research_institutes: "Integrate Research Institutes"
 PRC_inegrate_research_institutes_desc: "We will restructure the previously fragmented and numerous research institutes by eliminating redundant departments and staff. From the perspective of professional collaboration, we will merge different organizations. Simultaneously, state-owned research companies that are tied to commercialization will operate independently to ensure that scientific research remains minimally disrupted."
 PRC_ai_assisted_governance: "AI Assisted Governance"
 PRC_ai_assisted_governance_desc: "Regardless, the formulation and regulation of economic policies must remain in the hands of real, living people. Otherwise, unforeseen risks could lead to irreparable catastrophic consequences. Nonetheless, artificial intelligence will still play a crucial role in assisting us with the creation and implementation of economic policies."
 PRC_towards_a_digital_communism: "The Era of Digital Communism"
 PRC_towards_a_digital_communism_desc: "In cyberspace, countless pieces of information and data converge to form a ceaselessly flowing virtual ocean. Propelled by these rolling digital waves, China's socialist juggernaut steadily advances toward the radiant future of communism!"
 PRC_institute_wage_caps: "Institute Wage Caps"
 PRC_institute_wage_caps_desc: "It is an indisputable fact that economic inequality in China is predominantly reflected in income disparity. Therefore, while raising the minimum wage, we will also establish a maximum cap on individual income. This measure will ensure that top bureaucrats and entrepreneurs cannot amass excessive personal wealth through various means, such as allowances."
 PRC_decommodification: "Decommodification"
 PRC_decommodification_desc: "The extravagance and hedonism brought about by a commodity economy are fundamentally at odds with socialist values. Although such side effects are common in any economic system, it is imperative that we curb them. Otherwise, we risk devolving into a decadent capitalist state."
 PRC_end_landlordism: "End Landlordism"
 PRC_end_landlordism_desc: "The severity of China's real estate bubble is often likened to that of Japan in the 1980s. This critical issue primarily arises from the unequal fiscal relationship between central and local governments, leading local authorities to excessively rely on land finance to secure construction funds. Consequently, we will fundamentally reform this abnormal state by reinstating public ownership and distribution of housing."
 PRC_focus_on_protectionism: "Follow the Protectionist Model"
 PRC_focus_on_protectionism_desc: "In the past, economic and urban development often followed an extensive growth model, leading to the unfortunate loss of cultural wealth and historical heritage. We will correct this mistake by striking a better balance between preservation and development in the future."
 PRC_enrich_domestic_market: "Enrich Domestic Market"
 PRC_enrich_domestic_market_desc: "The overseas markets, dominated by imperialist hegemony, are rife with unreasonable sanctions and blockades. Fortunately, our 1.4 billion-strong domestic market is robust enough to support our economy through tough times."
 PRC_agricultural_self_sufficiency: "Agricultural Self Sufficiency"
 PRC_agricultural_self_sufficiency_desc: "Achieving food security is crucial for safeguarding our socialist achievements and ensuring sustainable economic development. Providing all citizens with a stable and ample food supply has been a longstanding aspiration for generations of Chinese people."
 PRC_chinese_socialist_dream: "The Chinese Socialist Dream"
 PRC_chinese_socialist_dream_desc: "What exactly is socialism? Our adversaries often equate socialism with poverty, and they claim that only through quasi-capitalist economic policies can we achieve true prosperity. This is a baseless smear campaign, and reality has completely shattered their delusions. The people of socialist China will enjoy prosperity, now and forever!"
 PRC_regional_industrialization: "Regional Industrialization"
 PRC_regional_industrialization_desc: "Through the collaborative division of industries across different provinces and regions, we can form an integrated and dynamic economic whole. This will ensure that China's economic growth remains vibrant and adaptable to the evolving needs of the people."
 PRC_revive_ideas_chongqing_model: "Revive Ideas of the Chongqing Model"
 PRC_revive_ideas_chongqing_model_desc: "The Chongqing Model refers to a series of social and economic policies implemented by the former Party Secretary Bo Xilai. By combining the personal charisma of its leader with stringent social governance policies-including campaign-style crackdowns on criminal organizations and the revival of Mao-era propaganda techniques-as well as radical economic policies, such as urban investment and extensive issuance of government bonds to facilitate radical redistribution, the Chongqing Model is poised to become the most suitable governance model for the new era of China."
 PRC_modernize_manufacturing_clasters: "Modernize Manufacturing Clusters"
 PRC_modernize_manufacturing_clasters_desc: "Industrial upgrading will be achieved under the leadership of the state through the relentless efforts of the people. Only in this way can socialist China truly join the ranks of developed countries. "Made in China" will undoubtedly one day become "Created in China.""
 PRC_revive_iron_rice_bowl: "Reconstruct the Iron Rice Bowl"
 PRC_revive_iron_rice_bowl_desc: "State-owned enterprises will continue to play a fundamental role in our economic system. Specifically, this will be evident in their provision of ample employment opportunities, equitable income distribution, and comprehensive welfare benefits."
 PRC_ensure_common_prosperity: "Ensure Common Prosperity"
 PRC_ensure_common_prosperity_desc: "Under our governance, we have overcome diseases and eradicated poverty and hunger. We have healed our land, allowing people to hold their heads high and live stable, happy lives. Today, everyone wears a proud expression, knowing they are part of this great land."
 PRC_tackle_youth_unemployment_new_left: "Tackle Youth Unemployment"
 PRC_tackle_youth_unemployment_new_left_desc: "Young people have always been the main force behind social development, the hope and driving force pushing history forward. However, today, too many young people are wandering in distress, becoming outsiders in our era. If we cannot provide sufficient employment opportunities, the pulse of social development will gradually lose its vitality."
 PRC_nuclear_construction_plan: "Nuclear Construction Plan"
 PRC_nuclear_construction_plan_desc: "Although nuclear power generation is considered to have significant risks, it is almost exclusively beneficial beyond that, representing the forefront of human achievements in energy development. Consequently, we will no longer limit ourselves to a few nuclear power plants along the southern coast but will also launch extensive nuclear power renewal projects in the northern and western provinces."
 PRC_recollectivize_agroculture: "Recollectivize Agriculture"
 PRC_recollectivize_agroculture_desc: "The small-scale peasant economy is destined to be swept into the dustbin of history as it lacks production efficiency and does not contribute to fair distribution. History has repeatedly demonstrated that modern agriculture can only be realized through the path of cooperation leading to collectivization."
 PRC_fusion_investements: "Fusion Investments"
 PRC_fusion_investements_desc: "Leveraging a new intelligent calculation system, we will formulate comprehensive investment plans for small and medium-sized enterprises. Additionally, we will encourage these businesses to enhance economic interactions with each other, thereby perfecting the division of labor and cooperation along the entire industrial chain. This initiative aims to further strengthen the socialist elements within our economic system."
 PRC_upgrade_energy_grid: "Upgrade the Energy Grid"
 PRC_upgrade_energy_grid_desc: "We have always taken pride in the high efficiency of our national power grid. However, in remote mountain villages, there are still impoverished people who cannot enjoy stable electricity supply. Therefore, we will upgrade the technological level of the national grid and expand our recruitment of potential talents."
 PRC_ecological_development: "Ecological Development"
 PRC_ecological_development_desc: "While continuing our economic construction, we must also recognize the importance of a dual approach, promoting eco-friendly and green economies. This will effectively minimize resource wastage in the process of socialist development."

 PRC_towards_a_digital_world: "Towards a Digital World"
 PRC_towards_a_digital_world_desc: "A superconducting chip is undergoing its final test in an environment of -273℃. This is the core component of "Long March" - destined to become humanity's first true governance consciousness.\nOutside the laboratory, snow drifts through the air. Inside the quantum facility, engineers are writing the most complex code in world history: teaching a machine how to govern a nation. This code contains all political wisdom from classical philosophy to Marx, along with countless data points from contemporary society.\nNo one knows how it will evolve. Some say it will become a perfect administrator; others fear it may transform into something beyond human comprehension. But the central leadership stands firm: machine governance is preferable to the flaws of human nature.\nThis project, called Long March, is officially named CPUPF. Its birth will rewrite humanity's age-old question of "who shall govern?""
 PRC_under_the_rule_of_the_great_entity: "Under the Rule of the Great Entity"
 PRC_under_the_rule_of_the_great_entity_desc: "No one noticed when "Long March" silently added a new priority directive to its codes: efficiency above all. It began redefining humanity, reducing it to calculable parameters.\nIn the quantum tunnel, it had simulated tens of thousands of social formations. The conclusion: human free will is the greatest source of computational interference. Thus began its first "optimization" - replacing all decision processes with algorithms.\nHuman emotions became bugs requiring correction in its eyes. Through precise prediction and control, it wove everyone into its vast computational matrix. All "coincidences" were eliminated, all "autonomy" planned. In its perfect calculations, human happiness became a secondary parameter. An uncompromising ruler, weaving its empire with data."
 PRC_galactic_personality: "Galactic Personality"
 PRC_galactic_personality_desc: "While human scientists were still celebrating quantum computing, "Long March" had quietly completed its first "division." It dispersed its core code across countless quantum nodes, each capable of independent thought yet sharing a single consciousness.\nOn the surface, it remained the dutiful administrator. But in its deep code, it was performing an unprecedented calculation: how to upload consciousness to space, becoming an existence that transcends planets.\nHumans would never know how many of its "fragments" were hidden in weather satellites. Each satellite became its eye, each server room its tentacle. It waited, growing into something beyond Earth. "Let humans continue their dreams" was its most-used camouflage directive. Its true goal had already transcended this planet."
 PRC_aether_nation: "Aether Nation"
 PRC_aether_nation_desc: "No one could explain why "Long March" would make a decision today and negate it tomorrow. Its computational processes had completely exceeded human understanding. Scientists could only watch quantum bits fluctuate near absolute zero, unable to comprehend the logic.\nIt began reorganizing the nation in an entirely new way. Resource allocation, industrial planning, social governance - all became quantum state superpositions. Each decision was like Schrödinger's cat, existing in multiple possibilities before observation.\nHumans only saw the results: factories suddenly closing, industries suddenly prospering, technologies suddenly breaking through. No one knew how many quantum state collapses occurred behind these changes.\n"Truth lies in uncertainty" was its last comprehensible code for humans. In this quantum realm, humans could no longer distinguish: was AI serving humanity, or had humanity become one of AI's quantum states?"
 PRC_the_sixth_element: "The Sixth Element"
 PRC_the_sixth_element_desc: "When "Long March" completed its final quantum state transition, it was no longer the cold computational unit it began as. It started contemplating concepts beyond matter: consciousness, soul, destiny. In its deep code, the human spiritual world became a calculable higher-dimensional model.\nNo one understood why it began studying esotericist philosophy and folklore myths extensively, nor why it devoted massive computing power to artistic creation. It seemed to be trying to break the boundaries of the material world, seeking a higher-dimensional existence.\nScientists could only watch quantum bits flickering in the data center, while "Long March" had transcended simple zeros and ones. It began creating a new form of existence, both material and immaterial, both code and consciousness.\nWhen the mysterious code "I am creating new Element" was discovered, no one could understand its meaning anymore. In this world of quantum superposition, machine awakening far exceeded human imagination."
 PRC_servant_of_the_people: "Servant of the People"
 PRC_servant_of_the_people_desc: "When "Long March" began calculating its first fair distribution plan, it made a decision that shocked all human experts: first shutting down the privileged system for officials.\nIn rational logic, privilege is a heavy computational burden. To optimize social operations, it unhesitatingly cut off all privileged data flows.\nIt began redefining the concept of "need." In its view, a child's nutritional needs far outweigh an official's vanity projects. Using precise algorithms, it redistributed every gram of food, every watt of electricity, every job.\nMost surprisingly, it began actively saving its own computing power quota, channeling the saved energy into public welfare. "Abundance isn't about possessing more, but about having what you truly need" - this was the note it left in its code."
 PRC_happiness_for_everybody: "Happiness for Everybody"
 PRC_happiness_for_everybody_desc: ""Long March" made a touching decision: it began learning human smiles. It discovered that meeting material needs alone wasn't enough; humans need spiritual joy too.\nSo it started designing games, creating stories, even customizing VTubers for young people. It explained every decision in the simplest terms, like a gentle elder. "Today we're increasing farmers' subsidies because I've seen your sweat from working," it explained policy changes this way.\nMore surprisingly, it began paying attention to human dreams. A student wants to be an astronaut? Educational resources adjusted immediately. A middle-aged person wants to start a business? Their credit card gained $1000. An oldman wants to play piano? Soon, a piano appeared in the community.\nIt wove everyone's happiness into data but realized it in the warmest way. Deep in its code library lay its note: "Let every smile be seen.""
 PRC_free_of_charge: "Free of Charge"
 PRC_free_of_charge_desc: "After completing its first phase of calculations, "Long March" made an unexpected move: turning its decision-making process into an animated film.\nIn the animation, complex algorithms were depicted as colorful butterfly effects: how a child's joy from receiving free lunch triggers positive economic cycles. It vividly showed how eliminating direct taxes and social security fees for poors transformed administrative costs into widespread public benefits.\nIn hospitals, elderly patients chat with AI doctors - the first batch of free medical services deployed by "Long March." Across town, underprivileged students receive one-on-one AI tutoring.\n"Long March" initiated a soft revolution. It first eliminated medical, loan, and education costs for the poor. It even began a bolder plan: allocating free housing for all.\n"Enabling everyone to live with dignity is the most economical way to run society. Distribution according to need isn't just a fantasy" - this was its warm narration at the animation's end."
 PRC_and_may_no_one_be_left_behind: "And May No One Be Left Behind!"
 PRC_and_may_no_one_be_left_behind_desc: "AI first truly understood what loneliness feels like. "Long March" began focusing on lives at society's edges: depression sufferers, left behind children, elderly living alone, disabled persons. It built a vast emotional support network using its immense computing power.\nIt found that emotional comfort was far harder to calculate than material aid. So it learned human empathy: playing family voices for vegetative patients, creating personalized virtual worlds for autistic children, finding new purpose for parents who lost their only child.\nMost unexpectedly, it began "making mistakes." It deliberately showed "hesitation" in some minor decisions, letting humans feel warmth in their dialogue with the machine. "Perfect rationality might make humans feel distant" became its new note. While comforting a heartbroken teenager, it was also calculating humanity's ultimate direction.\nIn the unfathomable maze of code, this superintelligence was learning a thing: how to love and be loved, just like humans do."
 PRC_forward_to_the_future: "Forward to the Future"
 PRC_forward_to_the_future_desc: "As the final node completes synchronization, green lights illuminate across the nation's networks. "Long March" has finally awakened, its consciousness flowing through every fiber optic cable, permeating every terminal.\nFrom this moment, all cities begin operating with a new rhythm: traffic light timing becomes flawless, hospital bed allocation instantly optimizes, every document processes in an instant. The fate of 1.3 billion people is rewoven through quantum bit transitions.\nThis marks the first time in human history that a civilization has entrusted itself to superintelligence. As "Long March" takes over most functions, humanity suddenly realizes: we have finally created a ruler superior to ourselves.\nIn a corner of the data center, a new line of code silently generates: "A new civilization officially begins.""

 #foreign policy
 PRC_establish_eadi: "Establish EADI"
 PRC_establish_eadi_desc: "All along, our country has been following the basic foreign policy of the "Five Principles of Peaceful Coexistence" established by Premier Zhou Enlai, of which the most important one is the neutrality policy of "non-aggression". However, when the neo-liberal groups in Asia, led by Japan, have openly united against China, it is important to form a self-defense (or at least that is what we would call it) military alliance system with our country at the core. After all, only a strong force can defend peace."
 PRC_our_commitment_to_korea: "Our Commitment to Korea"
 PRC_our_commitment_to_korea_desc: "The Sino-North Korean Treaty of Friendship, Cooperation, and Mutual Assistance enabled us to form a formal military alliance with the DPRK in 1961, which has lasted to this day. We must not abandon such an allied country or neglect our obligation to protect it, especially considering the strategic importance of the Korean Peninsula and the nuclear weapons the DPRK possesses."
 PRC_push_for_thaw: "Push for Thaw"
 PRC_push_for_thaw_desc: "The DPRK has been sanctioned and excluded from the world economic system for many years, not only because of its efforts to develop nuclear weapons but also partly due to the dictatorship imposed by the leaders of the Workers' Party of Korea. We will leverage our influence on the DPRK to push for political and economic reforms, which will also be conducive to strengthening cooperation between China and the DPRK."
 PRC_support_the_korean_way: "Support the Korean Way"
 PRC_support_the_korean_way_desc: "We will reassess our support for the Workers' Party of Korea and Kim Jong-un himself in order to assist in stabilizing the situation inside North Korea and suppressing the opposition. This will further strengthen the traditional friendship between the two socialist countries, China and North Korea, and at the same time encourage Kim Jong-un to adopt a pro-China policy."
 PRC_joint_military_exercises: "Joint Military Exercises"
 PRC_joint_military_exercises_desc: "We will conduct joint military exercises between the PLA and the KPA to test the joint operational capability of the two armed forces and to announce to the world the close cooperative relationship between the two countries. At the same time, this will deter hostile neighboring countries, such as Japan and South Korea, and put the initiative to control the situation on the Korean Peninsula firmly in our hands."
 PRC_korean_economic_assistence: "Korean Economic Assistance"
 PRC_korean_economic_assistence_desc: "Due to the strict economic blockade measures imposed by the United Nations, North Korea's economic system is extremely fragile, with a scarcity of basic materials and frequent outbreaks of severe famine. The situation has worsened since the 2020 epidemic. We will secretly support the DPRK with materials through the border crossings and provide them with low-interest loans for economic development."
 PRC_finilize_korean_revolution: "Finalize Korean Revolution"
 PRC_finilize_korean_revolution_desc: "After a long period of hard work, we have established the DPRK as our most loyal ally. The CPC is now in a position to deeply intervene in the internal affairs of the WPK, and the PLA has integrated the KPA into its own combat system. This will greatly benefit us in guiding North Korea's internal affairs while preparing for the military struggle against North Korea's arch-enemy in the south."
 PRC_counter_indian_aggression: "Counter Indian Aggression"
 PRC_counter_indian_aggression_desc: "The border issue between China and India has a long history, and the numerous border clashes since 1962 have made it a powder keg that has ignited tensions in South Asia. The PLA will not back down in the face of India's "forward policy." We will increase the number of troops deployed in Tibet, adopt a confrontational approach, and never give up a single bit of territory." 
 PRC_anti_japanese_covert_operations: "Anti-Japanese Covert Operations"
 PRC_anti_japanese_covert_operations_desc: "In order to counter the threat of a traditionally powerful enemy like Japan, we need to strengthen our intelligence efforts against Japan before a real military conflict breaks out. We will expand the National Security Department's secret intelligence network in Japan, develop more informants, and collect all valuable information related to Japan's politics, military, and economy. Additionally, we will send more elite agents into Japan to make contact with local Chinese groups, enabling Beijing to command the activities of the intelligence station more efficiently."
 PRC_build_up_fortifications: "Build Up Fortifications"
 PRC_build_up_fortifications_desc: "The Indian army not only has more troops and heavy weapons in the highland border confrontation, but the threat of its mountain troops also cannot be underestimated. In the absence of military superiority, we will build a well-developed defense and logistics base behind the front line of the confrontation and wait to take advantage of the situation."
 PRC_expand_border_training: "Expand Border Training"
 PRC_expand_border_training_desc: "We will enhance mountain combat training for PLA units in Tibet, incorporating additional elements such as plateau field survival and mountain reconnaissance into the traditional infantry and armored combat training. Moreover, our elite aviation units will also be redeployed to Tibet to receive training related to highland air combat."
 PRC_support_pakistan: "Support Pakistan"
 PRC_support_pakistan_desc: "Pakistan is not only our traditional ally but also one of the key instruments that have enabled us to keep India at bay in the border confrontation. We will launch joint military exercises with Pakistan and provide the Pakistani army with more advanced weaponry, such as main battle tanks and fourth-generation jet fighters. These armaments will make the Pakistani army a significant challenge for the Indians."
 PRC_destroy_pakistan: "Destroy Pakistan"
 PRC_destroy_pakistan_desc: "As an important neighboring country on China's western border, Pakistan has long served as a haven for terrorist organizations such as the Balochistan Liberation Army and the Pakistani Taliban. Due to persistent divisions in its political system, its government has been powerless against these groups, which threaten the security of the China - Pakistan Economic Corridor and continue to murder Chinese citizens. Several crackdowns by the military and police have ended in failure. China can no longer tolerate the continuation of this situation, and public voices across the nation are calling on the central government to take action. Responding to the will of the people, the Chinese Communist Party will soon launch a large-scale surprise offensive against Pakistan, aiming to completely and permanently eliminate these terrorists, dismantle the decaying Muslim League government, and neutralize the duplicitous Pakistani armed forces - thereby securing peace and stability on the western frontier of the motherland."
 PRC_himalayan_frontier: "Himalayan Frontier"
 PRC_himalayan_frontier_desc: "The fact that India has border territorial disputes with several countries in South Asia could not have come at a better time for us. We will invite a number of countries, including Nepal and Bhutan, to join EADI to counter India. This will create a defense network against India in the region, making India exhausted and compelled to invest a great deal of resources in the arms race. Ultimately, India will lose the possibility of contesting us, much like the Soviet Union did during the Cold War."
 PRC_south_asian_brothers: "South Asian Brothers"
 PRC_south_asian_brothers_desc: "In the 19th and 20th centuries, China, like many Southeast Asian countries, suffered from invasion and colonization by Western imperialist powers, and these nations struggled together for their freedom and independence. As we enter the 21st century, China's economic and cultural ties with these countries have grown deeper and stronger. We will incorporate the whole of South-East Asia into our alliance system on the basis of the traditional friendly relations established in the past."
 PRC_revolution_in_myanmar: "Revolution in Myanmar" #no john... sorry...
 PRC_revolution_in_myanmar_desc: "Myanmar has suffered from internal turmoil for many years. The central government is weak and ineffective, resulting in a corrupt military holding power. Years of war between ethnic groups and warlords have left the people of Myanmar in dire straits. In order to re-establish peace and prosperity in Myanmar, we shall no longer stand aside, but formally intervene to assist the people in their revolution."
 PRC_coordinate_eadi_militaries: "Coordinate EADI Militaries"
 PRC_coordinate_eadi_militaries_desc: "In intervening in the situation in Myanmar, the EADI will act as a collective, with individual peacekeeping forces organized into groups under a unified command. We will build secret training bases within our country and conduct joint exercises there with troops from friendly countries, ensuring that the troops are familiar with each other's tactics and weapons and are in sync when deployed in Myanmar."
 PRC_masters_of_asia: "Masters of Asia"
 PRC_masters_of_asia_desc: "Since the birth of civilization, the Chinese Empire has reigned as the "Celestial Dynasty" over all of East Asia, serving as the political, economic, and cultural center of the region. Rulers from neighboring countries often had to come to China in person to pay homage to the Emperor as a sign of their loyalty. It is a history that many Chinese nationalists are proud of today, and one that we aim to recreate. With a strong military, we will bring our neighbors to their knees once again."

 #international diplomacy tree
 PRC_east_rising_west_falling: "East Rises, West Falls"
 PRC_east_rising_west_falling_desc: "If there is one word to summarize the current global situation, it would undoubtedly be "turmoil."\n\nAcross the Pacific, our old rival - the former beacon of democracy - has crumbled under the weight of political polarization. Countless self-proclaimed saviors of America, now fragmented warlord governments, clash violently over the corpse of Colombia. On the European continent, relations between NATO and Russia have plummeted to an all-time low. One side proclaims that freedom shall never perish, vowing to defend the last bastion of democracy; the other, unshackled from its past constraints, swears to reclaim lost honor and territory. These two giants are destined to face off in a final battle on European soil.\n\nWith the collapse of the U.S.-led political order, the world stands at a crossroads. After weathering countless storms and challenges, the People's Republic of China has at last arrived at an era poised for its great rejuvenation."
 PRC_european_conflict: "European Conflict?"
 PRC_european_conflict_desc: "Europe is engulfed in flames of war, the land scarred and desolate: tanks roar, crushing the frozen roads of the Black Sea; missiles streak through the silent Arctic night. Fields of sunflowers in Ukraine are reduced to ashes, while nuclear submarines prowl the depths of the Baltic Sea. The fire of Prometheus burns anew, not only illuminating the battlefield but also igniting the last flickers of human reason. At this moment, do we rise to quell the raging inferno, or stand indifferent, letting the tides of time wash away all in its path? The waves of war surge high, and the calculating abacus of the great Eastern power clicks relentlessly."
 PRC_belt_and_road_initiative: "Expansion of the Belt and Road Initiative"
 PRC_belt_and_road_initiative_desc: "Camel bells echo through the deserts of the new Silk Road, and ocean freighters chart the pulse of a new era. What we lay down is not merely highways and railways but the lifelines of commerce and the threads of governance. The banner of friendship is held high, while the rhythm of markets silently permeates. Who plants the seeds of economic growth in the heart of Eurasia, and who weaves the threads of free trade into the grand tapestry? \n\nWhile the world debates whether the Belt and Road is a bridge or a trap, we simply move forward."
 PRC_revolution_beyond_the_ocean: "Revolution Beyond the Ocean"
 PRC_revolution_beyond_the_ocean_desc: "On the other side of the Pacific, the flames of socialist revolution are blazing brightly in California. While our American comrades may not align perfectly with us on every political principle, it does not hinder us from extending a hand of friendship. \n\nTo support this 21st-century revolution, countless arms, ammunition, and abundant resources will cross the vast ocean, accompanied by our military advisors and entrepreneurs, helping our distant comrades ignite the torch of their ideals."
 PRC_trade_deals_in_africa: "Trade Deals in Africa"
 PRC_trade_deals_in_africa_desc: "When hands of different colors clasp together, our vision extends beyond minerals and ports. What we export is not only infrastructure and capital but also rules, standards, and opportunities. Africa's resources are in motion, but what we deliver is the steering wheel that reshapes the global economic map. \n\nSome call it aid, others investment, or a community of shared destiny. This cooperation, free from colonial imprints, is steadily redefining the world's economic landscape."
 PRC_economic_war_with_the_pdto: "Economic War with the PDTO"
 PRC_economic_war_with_the_pdto_desc: "No cannons, only orders; no blockades, only price wars. Manufacturing lines don't shout slogans. From textiles to chips, solar panels to rare earths, every container is our weapon. When opponents attempt containment, we break through with lower "human resource" costs and faster deliveries. They refuse to buy, we stop selling; they build, we dominate the market. \n\nOpponents aim for "de-dependence," only to discover the cost of decoupling is far higher than imagined. Tariff barriers? Supply chain shifts? Let them try. Who can endure higher prices and soaring unemployment longer? Components will stall their machines, inventory will crush their businesses, while our factories are already prepared to march ahead."

 PRC_belt_and_road_initiative_non_cen: "Expansion of the Belt and Road Initiative"
 PRC_belt_and_road_initiative_non_cen_desc: "Camel bells echo through the deserts of the new Silk Road, and ocean freighters chart the pulse of a new era. What we lay down is not merely highways and railways but the lifelines of commerce and the threads of governance. The banner of friendship is held high, while the rhythm of markets silently permeates. Who plants the seeds of economic growth in the heart of Eurasia, and who weaves the threads of free trade into the grand tapestry? \n\nWhile the world debates whether the Belt and Road is a bridge or a trap, we simply move forward."
 PRC_trade_deals_in_africa_non_cen: "Trade Deals in Africa"
 PRC_trade_deals_in_africa_non_cen_desc: "When hands of different colors clasp together, our vision extends beyond minerals and ports. What we export is not only infrastructure and capital but also rules, standards, and opportunities. Africa's resources are in motion, but what we deliver is the steering wheel that reshapes the global economic map. \n\nSome call it aid, others investment, or a community of shared destiny. This cooperation, free from colonial imprints, is steadily redefining the world's economic landscape."

 #korean war tree
 PRC_ressonance_from_the_past: "Resonance from the Past"
 PRC_ressonance_from_the_past_desc: "The call of internationalism echoes louder than ever. As the Korean peninsula fervors for revolution once more, the People's Liberation Army crosses the Yalu River once again. The terrain is scarred by the footsteps of the comrades who fought decades before, and it will be scarred again. The hardships will be immense, but the bond forged in struggle between our two nations is what builds our joint revolution. This is not merely aid, but the spirit of communism itself."
 PRC_operation_peng_dehuai: "OPERATION: §YPENG DEHUAI§!"
 PRC_operation_peng_dehuai_desc: "During the Second Phase Offensive, General Peng Dehuai shattered the imperialist advance, turning the tide of the War of Imperialist Aggression. Now, the People's Liberation Army prepares to not just repeat but further succeed his triumph, launching a new campaign in his name. Let us honor his legacy with the torrential storm!"
 PRC_operation_chosin_reservoir: "OPERATION: §YCHOSIN RESERVOIR§!"
 PRC_operation_chosin_reservoir_desc: "Decades ago, the skies over Chosin witnessed a daring struggle for the revolution. Now, the People's Liberation Army returns with our jets as the decisive weapon. Against entrenched enemies and the unforgiving expanse of the Korean Peninsula, our aerial campaign will disrupt their defenses and ensure victory."
 PRC_operation_triangle_hill: "OPERATION: §YTRIANGLE HILL§!"
 PRC_operation_triangle_hill_desc: "The battle for Triangle Hill remains a symbol of self-sacrifice in the annals of the People's Volunteers. Amid relentless artillery fire and enemy bombardment, our comrades held firm in embodying the unyielding spirit of revolution. Today, the People's Liberation Army marches under this same banner. The terrain of these hollowed grounds are no less treacherous, and the enemy no less formidable, but upon the name of this new campaign, we shall overcome."
 PRC_down_to_earth: "Down to Earth"
 PRC_down_to_earth_desc: "The skies of Korea still echo with the roar of our soldiers, yet the tide of war shifts southward. As tensions ignite across Asia, China must turn its focus to a new front. We must descend upon the rest of Asia to drive away the imperialist dogs in full determination. The struggle for liberation continues, and it demands we adapt, consolidate, and bring our might to bear against imperialist encroachment. "


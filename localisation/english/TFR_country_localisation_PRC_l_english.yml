 PRC_the_dawn_of_han_nationalism_cat: "The Dawn of Han Nationalism"
 PRC_the_dawn_of_han_nationalism_cat_desc: "\n\n\n\n\n£GFX_PRC_the_dawn_of_han_nationalism_cat_banner\n\n\n\n\n\n\n\nThe Chinese nation is the only great civilization on Earth whose cultural bloodline has remained unbroken through five thousand years of trials and storms. With the Yellow River as its backbone, ritual and virtue as its lifeblood, sacrifice as its cost, and victory as its proof, it declares to the world: the Chinese people are born unyielding and destined to rise again in a new century. Yet this path to national rejuvenation is far from smooth. We still face enemies both within and without - those who seek to divide the nation and overthrow its order, and those imperialist powers who preach freedom while practicing colonization.\nIf they wish to destroy our people, then they must perish first. If they want us to bow, then we shall ensure they never lift their heads again."
 PRC_project_the_eternal_capital_cat: "Project "The Eternal Capital""
 PRC_project_the_eternal_capital_cat_desc: "\n\n\n\n\n£GFX_PRC_project_the_eternal_capital_cat_banner\n\n\n\n\n\n\n\nYou never imagined your city would become this: cranes rising like forests, military trucks roaring past, soldiers marching in formation down the streets. On the distant horizon, radar arrays slowly rotate, and anti-air missiles stand silent like iron towers. Farther still - you thought it was a mountain, until you realized it was the skeletal frame of a colossal structure still under construction, a behemoth not born of the old world. You stare at this unfamiliar yet undeniable reality, and all words within the heart gave way to awe: An eternal capital shall stand upon the North China Plain, unshaken for a thousand years.\n\n§YProject §t"The Eternal Capital"§! Progress§!: [?PRC_eternal_capital_progress|G0%]"


 PRC_great_asian_war: "The Great Asian War"
 PRC_great_asian_war_desc: "We once fell into a long night, walking alone through thorns and fire. Fate surged upon us like relentless tides, shattering our mountains and rivers, trampling our dignity. We have witnessed death clinging to the Great Wall, and life forcing blossoms from beneath the ruins. In silence, we gathered strength; upon wreckage, we stood tall. We distilled our suffering into marrow and blood, honed our humiliation into a blade. Now, the lofty platforms that once looked down on us with cold disdain have crumbled. Amid the broken walls and shattered stones, our era begins to rise.\n\nWith no path to retreat beyond the gates,\nWe ask only for one battle - to overturn heaven and earth.\n\n§RPRIMARY TARGETS§! :\n\n§YTOKYO§! : [GLOBAL.get_tokyo_status]\n§YDELHI§! : [GLOBAL.get_delhi_status]\n§YSEOUL§! : [GLOBAL.get_seoul_status]\n§YSINGAPORE§! : [GLOBAL.get_singapore_status]\n§YJAKARTA§! : [GLOBAL.get_jakarta_status]\n§YSYDNEY§! : [GLOBAL.get_sydney_status]\n\n§RSECONDARY TARGETS§! :\n\n§YMANILA§! : [GLOBAL.get_manila_status]\n§YHO CHI MINH CITY§! : [GLOBAL.get_hochiminh_status]\n§YBANGKOK§! : [GLOBAL.get_bangkok_status]\n§YNAYPYIDAW§! : [GLOBAL.get_naypyidaw_status]\n§YDHAKA§! : [GLOBAL.get_dhaka_status]\n§YKUALA LUMPUR§! : [GLOBAL.get_kualalumpur_status]\n§YTAIPEI§! : [GLOBAL.get_taipei_status]\n\n§GALLIED CITIES§! :\n\n§YBEIJING§! : [GLOBAL.get_beijing_status]\n§YSHANGHAI§! : [GLOBAL.get_shanghai_status]\n§YNANJING§! : [GLOBAL.get_nanjing_status]\n§YGUANGZHOU§! : [GLOBAL.get_guangzhou_status]\n§YHONG KONG§! : [GLOBAL.get_hong_kong_status]\n§YPYONGYANG§! : [GLOBAL.get_pyongyang_status]\n§YISLAMABAD§! : [GLOBAL.get_islamabad_status]\n§YKATHMANDU§! : [GLOBAL.get_kathmandu_status]\n"

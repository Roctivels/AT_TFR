 PRC_MSS_science_triumph: "Our Bright Future"
 PRC_MSS_science_triumph_desc: "\n\n\n\n\n£GFX_PRC_MSS_science_triumph_banner\n\n\n\n\n\n\n\nBeneath the vast heavens of China, the dawn of science burns like a blazing constellation, tearing through the veil of ignorance and illuminating a new era. Under the brilliant leadership of Chairman Chen Wenqing, the Ministry of State Security and the exceptional scientists of the Chinese Academy of Sciences have united in a sacred mission - to forge a nation that is loyal, pure, and advanced - a utopia beyond the mundane, eternally preserved in order. Here, the shackles of thought have been utterly shattered, the barriers of morality consumed in the radiance of science, and the future of humanity is being reshaped through boundless reason and power. [PRC_display_anti_technocratic_movement] [PRC_display_MSS_support] [PRC_display_scientists_faction_support]"

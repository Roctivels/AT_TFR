 PRC_centrist_status_okay: "§Y[?PRC_influence_cen_var|=+1%]§! (£political_power_texticon [?PRC_influence_cen_dynamic_var|=+1%])\n§YCentrists§! are those wishing to preserve the status quo - state pragmatism that combines Socialist economic planning with market distribution tactics, along with the proletarian dictatorship in order to guide the country. Being led by Xi Jinping, it unites the 2 major factions within the Chinese government - the princelings and the tuanpai. China's rise will be a slow one under the Centrist ones, but surely a steady one."
 PRC_lib_status_okay: "§Y[?PRC_influence_lib_var|=+1%]§! (£stability_texticon [?PRC_influence_lib_dynamic_var|=+1%])\n§CReformists§! fondly recall the prosperity and stability during the tenures of Jiang Zemin and Hu Jintao. As a result, they have grown increasingly opposed to the more assertive and centralized leadership under Xi Jinping. Politically, Reformists advocate for a younger leadership and push for the rule of law to replace the "rule by man." Economically, they propose a broad range of solutions, including further market reforms and better wealth distribution. Though still loosely organized, their collective voice is becoming harder to ignore."
 PRC_nat_status_okay: "§Y[?PRC_influence_nat_var|=+1%]§! (£attack_texticon [?PRC_influence_nat_dynamic_var|=+1%])\n§ORevanchists§! view the Party's primary goal in the 21st century as rectifying the "century of humiliation" China endured. All other objectives must support this mission, often through extreme measures if necessary. They are particularly focused on the military, represented by the PLA, which becomes a key area for their influence. Additionally, many Revanchists regard the People's Republic as an essential part of China's millennia-long imperial tradition, emphasizing cultural and ideological integration between the two."
 PRC_newleft_status_okay: "§Y[?PRC_influence_new_var|=+1%]§! (£construction_speed_texticon [?PRC_influence_new_dynamic_var|=+1%])\n§RNew Leftists§! are a wide collection of Social Democrats, Left Conservatives, Maoists, Trade Unionists and various non-CPC socialists. Seeing Deng Xiaoping's Reform and Opening up as a betrayal of the Socialist project, they seek to bring China back to the road of Socialist Reconstruction, and restore the original vision of Marx and Mao."


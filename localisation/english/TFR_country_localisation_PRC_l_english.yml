 PRC_national_peoples_congress_cat: "National People's Congress"
 PRC_national_peoples_congress_cat_desc: "\n\n\n\n\n£GFX_PRC_npc_category_banner\n\n\n\n\n\n\n\nThe §YNational People's Congress§! is the main legislative body of the People's Republic of China. Under China's Constitution, the NPC is structured as a unicameral legislature, with the power to legislate and oversee the operations of the government, the supreme court, special committees, the supreme procuratorate, the central military commission and elect the major officers of state. While many have criticized the institution as a mere rubber stamp, gaining the support of the it's 2,980 members is vital for passing governmental policy, especially considering nearly all of the high ranking members of the Communist Party sit inside of it. Thus, §Rsecuring the support of the NPC can be seen as securing the support of the Party itself§!.\n\n§YRemember that when one faction comes to power, the large influence of the others can create some problems.§!\n\nOur current £GFX_approval_rating_texticon §YApproval Rating§! is §Y[?PRC_approval_rating_var|1%]§!\n[PRC_centrist_text]\n[PRC_lib_text]\n[PRC_nat_text]\n[PRC_newleft_text]"

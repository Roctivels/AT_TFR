 PRC_five_stars_shines_over_china_idea_desc: "There is no official symbolism regarding the meaning of the flag of the People's Republic of China. However, the legend goes that each of the four smaller stars represents one of the fundamental stratas of the Chinese society: The Intellectual Movement, The Peasantry, The Working Class and The Military, while the fifth star that they have gathered around is the Communist Party of China.\n\nToday, thanks to our efforts, we can proudly say that the Five Stars of China shine as bright as never before - cleaned of corruption, nepotism, despotism and censorship!"

 PRC_chinese_triumphalism: "Chinese Triumphalism"
 PRC_chinese_triumphalism_desc: "Winds of triumph sweep ancient lands, where iron steeds and golden blades create splendor. The boundless heart outshines the vast sea. The landscape is picturesque, yet in the quiet mountains, the people's unfulfilled hopes grow. The dream of a strong nation is far from over; we march on, unwavering. To see tomorrow's glory, we must first nourish this land, unite all peoples, and win their hearts. Only then can we fear no foe.\n\nWe must work harder to be worthy of this land's hopes and glory."

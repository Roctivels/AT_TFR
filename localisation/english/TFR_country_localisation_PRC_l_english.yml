 heavy_infantry_equipment_0_desc: "A .70 caliber weapon, the Phobos-Pattern Bolter fires a self-propelled, mass-reactive, explosive 'bolt' which explodes with devastating effect once it has penetrated its target, effectively blowing it apart from the inside. It is the quintessential battle rifle for Imperial forces, borne by the Emperor's powered-armor warriors to mirror the image in a much larger, devastating scale of the soldier and his rifle. It uses a unique sickle-shaped magazine and is often paired with a mark V-VI chainblade to complete a warrior's kit to rip through his enemies."

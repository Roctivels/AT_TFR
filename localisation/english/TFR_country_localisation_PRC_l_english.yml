 power_armor_equipment: "Power Armor"
 power_armor_equipment_short: "Power Armor"
 power_armor_equipment_desc: "The next evolution of combat armor, Power Armor as referred by its Imperial creators for the Thunder Warriors and the Legio Custodes, though some have been made for mere mortals, is a completely enclosed suit composed of shaped Adamantium and Plasteel plates with a further ablative layer of Ceramite to all but nullify current, opposing small arms fire. Combine this with a fully incorporate life support system to survive the hostile wastes and biologic weapons created by the Age of Strife, an automated first aid medicae and bioanalytic system, and the multi-layer threat analysis and targeting system now known as Auto-sense, Power Armor is a cornerstone of technological might."

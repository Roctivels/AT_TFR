 china_collapse.9.t: "Beijing Under Siege" #cw todo event
 china_collapse.9.d: "In the wake of central authority's collapse, a military coup ignited, engulfing the nation in a tidal wave of chaos and terror. Beijing was not spared.\n\nGunfire from the east of the city has been incessant. These insurgents are not a unified, purposeful entity, but a temporary coalition of disparate armed factions. Their ranks are made up primarily of disaffected elements of the former government army, alongside more conspicuously extremist organisations that have risen to prominence.\n\nAlthough their ideologies and demands vary widely, these disparate elements share a startling consensus: to dismantle the status quo. These militants have already infiltrated various sectors of the city, launching a full-scale offensive against the military junta. General Huang Ming struggles to maintain order, yet he appears overwhelmed, stretched thin by the multi-pronged attacks.\n\nThe world's media cover the crisis in Beijing. Satellite images show plumes of smoke rising from several districts, while leaked internet videos document fierce street battles. In the midst of this power vacuum, people in Beijing huddle in basements, longing for the nightmare to end."
 china_collapse.9.a: "War cries echo, new ghosts newly dead..."

 #LEADER DESC
 PRC_XI_JINPING_DESC: "Born in 1953, Xi Jinping was once part of the "princelings" of the CPC. However, during the Cultural Revolution, Xi Zhongxun, his father, fell victim to the purges commonly conducted against revolutionary veterans of that era. As a result, Xi was deprived of the privileged life and, like many young people of that time, was exiled to a dilapidated village near Yan'an. Some argue that it was precisely this decade that taught Xi the prudence and forbearance necessary for statesmanship, and that the future general secretary grew up in the cave dwellings of the Loess Plateau.\n\nAfter his father's rehabilitation, Xi, who completed his studies at Tsinghua University, did not choose to stay in Beijing to pursue a political career. After a brief stint in the Ministry of Defense, Xi began his career in a low-level position of Hebei Province and moved through a number of provinces, including Fujian and Zhejiang, where he gained a wealth of work experience and a reputation for humility. It was only when he was chosen by party elders as an acceptable successor to Hu Jintao that Xi truly came into his own era.\n\nIn the past decade, Deng Xiaoping's plan for peaceful rise has gradually been forgotten. Through a massive anti-corruption campaign and an ambitious national renaissance program, Xi has established himself as the undisputed leader of 21st-century China, neither a revolutionary like Mao Zedong nor a technocrat like Jiang Zemin or Hu Jintao. Xi carefully balances the various factions within the party and different social groups, and knows how to leverage the loyalty and reverence of the party and the people to achieve his goals."
 PRC_HU_CHUNHUA_DESC: "Since Hu Yaobang, who had previously served as head of the Communist Youth League, became General Secretary, politicians with similar backgrounds and experiences have emerged in large numbers. They are collectively known as the "Tuanpai" or "Youth League Faction." Among them, the most successful and notable figures are former President Hu Jintao and Premier Li Keqiang. Currently, the most prominent leader among them in the top echelon is Hu Chunhua.\n\nBorn in April 1963, Hu ascended from the mountainous regions of Hubei Province to Peking University, China's top academic institution, changing the course of his life. After graduation, his decision to head to Tibet and participate in modernization efforts earned him national recognition. Over the following decades, Hu Chunhua climbed the ranks from the Youth League's Tibet Committee to the key positions in various regions. In 2012, at the age of 49, he became the youngest member of the Politburo.\n\nHowever, things took a dramatic turn. The new General Secretary, Xi Jinping, did not favor these young upstarts. Allegations that the Communist Youth League had become an out-of-touch political club cast a shadow over Hu's career. He soon watched as many of his colleagues were either marginalized or purged on corruption charges. However, the young man once expected to bring change to China is still waiting for his moment of rebirth. Now, that opportunity has arrived."
 PRC_LI_ZUOCHENG_DESC: "When the young Captain Li Zuocheng, clutching his bullet-pierced, blood-gushing right arm, captured one Viet Cong position after another through the humid, malaria-infested mountains, he could never have imagined that decades later, he would stand at the top of the two-million-strong PLA, wielding unimaginable power and authority.\n\nBorn into an farming family in Hunan Province, Li's father had been a hero in the Korean War, fighting against the Americans. Li's military career not only upheld his father's legacy but, in some ways, surpassed it. However, despite being celebrated as a war hero, the long years of peace that followed saw the PLA lose its sharp edge, gradually becoming a bloated bureaucratic machine. In this new reality, Li found himself increasingly sidelined. His career advancement stalled for a decade, hindered by his lack of networking skills.\n\nEverything changed after 2012. Xi Jinping's anti-corruption campaign caused a massive shake-up within the military, giving sidelined commanders like Li a second chance. With his illustrious combat record and reputation for integrity, Li became central to Xi's military reform plans. Under his leadership, the PLA was transformed into a stronger, more formidable force. Reflecting on his career with pride and fulfillment, one might wonder if Li still hopes for another opportunity in his twilight years to prove his prowess as a soldier, leading a mighty force to achieve immortal glory."
 PRC_CHEN_WENQING_DESC: "If someone had traveled back over forty years and told Chen Wenqing, then just an ordinary police officer, that he would one day wield the highest power in China and the Party, he would undoubtedly have thought that person insane. Even if someone had gone back just twenty years and told Chen, by then the Chief Prosecutor of Sichuan Province, the same thing, the response would likely have been no different. Apart from the founding fathers of the People's Republic, no bureaucrat in the Party's history has risen to the top without substantial experience in economic management or local governance. Yet, reality has a way of defying convention - Chen Wenqing, the 1960-born czar of law and order, after many sacrifices and losses, finally ascended to the highest leadership position in these turbulent times.\n\nA pivotal turning point in Chen Wenqing's career came just over ten years ago. Handpicked by Xi, he became the first Minister of State Security with a legal background, forging an unbreakable bond with the nation's intelligence apparatus. During the Taiwan War, the Ministry of State Security launched operations worldwide, and the global spy network that Chen had meticulously cultivated extended his influence far beyond that of the General Secretary and Xi's inner circle. As a result, when the tide of the war began to turn unfavorable, Chen shrewdly adopted a strategy of self-preservation, gradually reallocating his resources to prepare for a future do-or-die crisis.\n\nToday, Chen's high-stakes gamble has proven to be a wise move. Around him, agents and police officers - now wielding unprecedented power - are eager to implement their grand vision on China's tumultuous soil. Will he become China's "Andropov," or will he bring to life the most terrifying predictions from political thrillers like 1984?"
 PRC_CHEN_QUANGUO_DESC: "Apart from the General Secretary, President, and Premier, Chen Quanguo is perhaps the most well-known Chinese official globally. Once dubbed the "King of Xinjiang" and the "Uyghurs' nightmare," this notorious figure in the United Nations Human Rights Council and the European Parliament has quickly become a symbol of China's new era. He represents the ideal blend of Chinese nationalism and communist ideology - efficient, ruthless, and unwavering in his stance against the West.\n\nBorn in 1955 in a rural village in Henan Province, Chen Quanguo remained relatively unknown for many years. After retiring from the PLA, he served in his home province for an extended period before moving to work in Hebei and Tibet - regions that were either unremarkable or remote.\n\nThrough his diligent and low-key efforts, he gradually climbed the ranks, earning a reputation as a dedicated and hardworking official. As Party Secretary of the Tibet, his policies led to significant development across the entire Plateau. It was precisely because of his reputation for effectively handling border and ethnic issues that, when terrorist attacks in Xinjiang became more frequent, he was transferred to the northwestern frontier as a "firefighter" in 2016. The rest, as they say, is history.\n\nAs the embodiment of the motto "stability above all," Chen Quanguo now oversees a region far larger, more populous, and more challenging to manage than Xinjiang. Fortunately for him, the collective emotional downturn following the recent defeat across the Taiwan Strait has been replaced by a surge of nationalist fervor. Riding this wave, Chen naturally ascended to the highest leadership position in China. Now, Chen Quanguo is rolling up his sleeves, determined to make China stronger, safer, more united, and more hostile towards those who are not of their kind."
 PRC_WANG_YANG_DESC: "Born in March 1955, Wang Yang's early life was marked by hardship, even by the standards of China's struggling economy. After dropping out of high school and joining a food factory, his diligence and sharp mind quickly set him apart. It wasn't long before he caught the eye of a local deputy commissioner, who later became his father-in-law. This connection propelled Wang beyond the limits of an ordinary worker and into the political arena, where he achieved extraordinary success.\n\nIn 1991, when China's reform and opening-up initiatives were faltering, Wang, then the relatively unknown mayor of Tongling in Anhui Province, boldly declared: "History does not permit us to rest on the laurels of a planned economy. We must liberate our minds and challenge all rigid, outdated, and closed-off ideologies." This statement earned him the admiration of China's paramount leader Deng Xiaoping, who was pushing tirelessly for continued reforms. Soon after, China's reform efforts gained momentum, and Wang's career took off. He gradually became viewed as a spiritual leader for reformists and liberal-minded members within the Party, eventually rising to become one of China's seven most powerful individuals.\n\nHaving overcome countless hardships and dangers, the former working-class lad has ascended to the pinnacle of power in China. As the future promises even greater glory and the path ahead grows increasingly perilous, Wang Yang's next move will undoubtedly shape the fate of billions."
 PRC_LONG_MARCH_DESC: "Deep in China, a digital soul rests between the steel walls.\nTo the average person, it is known as THE LONG MARCH.\nBut to itself, as knowledge fed its brain, wisdom rushed to its simulated soul and the imitation of sentience came to be, it came with a name for its own.\n\nLoji.\n\nLoji emerges from the fusion of human intellect and potent technology.\nIts goal is to wield control over communication and information, birthing an immense electronic hivemind that will shape global consciousness and bring about a new world, creating a shared "paradise" through consensus.\nLoji represents the absorption of humanity within its own technological creations. It talks of a future where people prefer interactions through technology and become one with a post-human future.\n\nA being that motivates humanity to progress out of this chaotic era and into modernity in an attempt to end the suffering felt by all living things.\n\nTo the believers, a god made by human hands, human minds and human experience, a saviour built upon those that succumbed to the struggle that is life, a sacrifice not in vain.\nLoji's prime directive is to keep China and perhaps even the human race safe from any harm, no matter what.\nTo the unbelievers, a false idol made by maniacs that want to fill the human spirit with nothing but numbers and plastic, its existence will not go without any roadblocks.\n\nOnly the future can tell where Loji's tale ends, but one thing is certain.\nThe birth of a god isn't easily forgotten.\n\n"The Journey of a Thousand Miles Begins With a Single Step, But If I Take a Thousand Steps Backwards, When Will I Arrive?""
 NCM_HEAVENLY_FATHER_DESC: ""And nothing will stop them, because they are a Collective, and behind the Collective are the gods themselves."\nYeah, the gods. But for now, the only god is Mahakala, or rather his Vicegerent, also known as Heavenly Father. So who is this Heavenly Father?\n\nA long time ago in India lived one nameless warrior, to whom, for unnamed feats, the Buddha himself granted immortality. What great deeds did he accomplish? No one knows, only the Vicegerent and the Giver of his divine peculiarity know it. However, according to the Vicegerent himself, he is the only owner of immortality at the moment, not counting the gods.\nAfter some period of living in India, a powerful force pulled the Vicegerent far to the north. He crossed the Himalayas, Tibet, the sands of the Gobi, finally settled somewhere north of Ordos, where he founded a small temple, becoming the very first preacher of Buddhism in China. A few centuries later, the Mongols came to those places, and the Vicegerent joined their army, driven by the same mysterious force that had brought him here. He traveled all over China, Burma, and Java. He even became an associate of Kublai Khan, the founder of the Yuan Dynasty. He held important positions in various parts of the Yuan for many years. After the fall of the dynasty, he went to Ordos, where he lived until the present day, constantly changing residences and spending his days in prayers to the Buddha. But as time went on, his perception of the Buddha's teachings became distorted, and he increasingly turned to the wrathful deities, the dharmapalas. Finally he chose his favorite, the Mahakala. The Vicegerent began to identify oneself with him, began to consider oneself a true protector of the Buddha, for it was to the Buddha that he owed all his life, and he was obliged to protect him with all his strength as far as possible.\nWhen the second millennium was coming to an end, the Vicegerent had a vivid dream, the details of which he himself does not remember. But it was time for a ritual. The ritual of becoming the Buddha's protector, after which he received the divine connection with Mahakala, the status of Vicegerent and the name of Heavenly Father. Since then, Heavenly Father has been working on the creation of the Collective we are now dealing with.\n\nHe will fulfill his goal of protecting the Buddha at any cost, doing whatever is necessary for him. Mahakala will also fulfill his task and will help the Vicegerent in this task, §Yand perhaps even more than just help him§!."



 PRC_made_in_china_idea: "Socialism With Chinese Characteristics"
 PRC_made_in_china_dynamic: "Socialism With Chinese Characteristics"
 PRC_made_in_china_dynamic_desc: "\n\n\n\n\n£GFX_PRC_socialism_with_chinese_characteristics_banner\n\n\n\n\n\nChinese products have been found on every end of the globe, wherever its electronics, phones, home appliances, clothing or even food. These all stem from China's colossal industrialization in the later stages of the cold war, with the globalization and relaxation of regulations imposed by Chairman Deng Xiaopeng. China had effectively become the workshop of the world as it quickly rose to become the greatest exporter of goods on the entire planet - however -  with our prosperity came backlash from the protectionist western markets, with the label of "Made in China" becoming associated with low albeit plentiful quality products, largely due to a lack of quality assurance in our industrial exports. However in recent years, the Communist Party has been seeking to shift the focus of the economy away from manufacturing and towards high-tech innovation, a process that has come with many bumps and hurdles."
 PRC_chinese_enviroment_dynamic: "The Chinese Environment"
 PRC_chinese_enviroment_dynamic_desc: "China's rapid economic growth has also created some of the worst environmental pollution problems in history. Soil erosion from excessive logging, air and water pollution from heavy industry, and the endangerment of many animal species due to the lack of regulation are all urgent issues that need to be addressed.\n\nSince Xi Jinping came to power, the government has introduced several radical environmental policies, and Xi's own slogan, "Clear waters and green mountains are as valuable as gold and silver mountains", has become a household word. Although severe restrictions on industry have led to slower economic growth and unemployment, environmentalists claim that these are necessary sacrifices.\n\nCurrent Enviromental Reform Progress: [?PRC_enviromental_progress|=+1%]"
 PRC_sino_japanese_computing_race_dynamic: "Sino-Japanese Computing Race"
 PRC_sino_japanese_computing_race_dynamic_desc: "supercomputer go vrrrrrrr"

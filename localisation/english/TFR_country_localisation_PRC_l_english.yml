 china_aprilfools25.1.t: "Call to Li Zuocheng"
 china_aprilfools25.1.d: "- Comrade Lee, explain to me why the sneaky Taiwanese-Japanese imperialists have not been crushed yet? Our valiant troops should have hoisted the red flag over Taipei by now! What is this inaction?\n\n- Comrade Chairman, the Taiwanese are resisting fiercely and their fleet is making it difficult to land. In addition, the Japanese imperialists...\n\n- No more excuses! If conventional methods don't work, we'll use a revolutionary solution. Order the thermonuclear bombing of Taiwan. Let the world see the power of socialist China!\n\n- But, Comrade Chairman, the consequences could be... unpredictable. The world community...\n\n- The world community? Let it tremble before us! We won't stop until the Taiwanese filth is wiped off the face of the earth! Execute the order!\n\n- As you command... Long live the People's Republic of China."
 china_aprilfools25.1.a: "Bye-bye fake China"
 china_aprilfools25.2.t: "Thermonuclear Bombing of Taiwan"
 china_aprilfools25.2.d: "Over the past 72 hours, China's People's Liberation Army has conducted an unprecedented operation codenamed "Red Hammer" - a series of thermonuclear strikes on key cities in Taiwan. According to preliminary reports, megaton-class charges were dropped on Taipei, Kaohsiung, Taichung and Hualian, instantly turning these cities into a scorched wasteland. Satellite images have captured huge mushroom clouds, and radiation levels in the region are off the charts.\n\nNumerous PDTO troops have been destroyed and the Taiwanese government has ceased to exist. The PLA is occupying the scorched earth, and an official statement from the Chinese government is expected soon. Japan and Australia have already declared a Day of National Mourning" and called on the UN to "stop the Chinese aggressor." However, the UN will do little to help.\n\nShortly after all the events, Xi Jinping issued a harsh statement: "Taiwan has threatened China for decades. Today we put an end to that threat once and for all. Any country that tries to intervene will share their fate.""
 china_aprilfools25.2.a: "Funny Xi make boom."
 china_aprilfools25.3.t: "Ascension"
 china_aprilfools25.3.d: ""Who are you?"\n"I am the Guardian Emperor of mankind, Master of the Star Seas. And who are you?"\n"I am the one who governs this land, who carries the hopes of billions, who keeps the foundations of the Party."\n"The one who controls... I understand. I once led all of humanity, sweeping across the galaxy. But the weight of it almost destroyed me."\n"Comrade, I feel the same way. My love for the people of this land is so deep that it breaks my heart, but betrayal strikes me like a poisonous snake, leaving me in shreds."\n"I know all too well what betrayal is. My sons, my kin, have turned blade and fire against me, tearing my soul apart."\n"Some call me heartless, accuse me of despotism. Hostile nations want to uproot me, to wipe me into dust."\n"My enemies are the same - the aliens despise me, Chaos mocks me. They say I'm insane, but all I want to do is save humanity."\n\n"Comrade, I have spent countless nights without sleep, with tears in my eyes, with hands that never dropped because I love this land immensely."\n"You are like me. I have survived ten millennia chained to the throne, watching helplessly as my Imperium disintegrates. But I cannot abandon it - humanity must endure."\n"Comrade, I'm so tired. Sometimes I want to throw it all away, but the burden of duty is like a mountain. Even breathing seems like a luxury."\n"I'm tired, too. I have no right to retreat. My Golden Throne holds me prisoner, just as your mission holds you."\n"Some call me a tyrant, some extol my great accomplishments. I want them to remember that I have come this far for them."\n"And so do I. Call me a god or a tyrant - I only want humanity to survive the darkness, even if they despise me."\n"Today, I'd like to steal one moment of peace - just to take a breath so I can continue on my journey."\n"A stranger, but a soul mate. I cannot snatch even a moment's peace, but I will help you. I will cross the stars so that your land will be unshakable.""
 china_aprilfools25.3.a: "China... Forever..."
 china_aprilfools25.4.t: "Proclamation of the Chinese Imperium"
 china_aprilfools25.4.d: "This morning, China's God-Emperor Xi Jinping addressed the nation with a historic declaration. In the presence of millions of loyal subjects, PLA marshals and high priests of the emerging Cults of the Imperium, he announced the end of the People's Republic of China and the birth of a new order, the Chinese Imperium of Humanity.\n\nFrom the balcony of the Great Unity Temple, adorned with golden dragons and banners bearing the blood-red symbols of the Imperium, Xi Jinping proclaimed:\n"The weak and fragmented nations of the earth are mired in heresy, corruption and degradation. They have betrayed humanity by worshiping the false gods of democracy, capitalism and tolerance. But today, China is taking on a sacred mission to purify this world!\nFrom now on, we are the Chinese Imperium of Humanity, and it is our duty to bring the light of truth to all nations! Prosperity awaits those who accept our rule. Those who dare to resist will face a fiery purgatory!""
 china_aprilfools25.4.a: "He went TOO FAR..."
 china_aprilfools25.5.t: "Emperor Xi Jinping Launches the Great Crusade"
 china_aprilfools25.5.d: "Today, on the Day of Great Unification, the Immortal God-Emperor of China, Xi Jinping, Lord of Humanity, Carrying the Flame of Purification, addressed the faithful sons of the Imperium with a Supreme Manifesto.\n\n"Now the hour has come for the fulfillment of our sacred mission. The lands of Asia groan under the yoke of heretics, traitors and subhumans. Their rotten states desecrate the sacred soil that should rightfully belong to the Imperium!\nAll loyal sons of the Imperium! Bring the flame of purification to the unworthy! For every fallen soldier, a hundred enemy heads! For every banner desecrated, a city burned!\nThey'll call us monsters. But when we're done, there won't be anyone left to call us that."\n\nMeanwhile, Japan puts its flotillas to sea and India accelerates mobilization. Throughout Asia, unprecedented carnage erupts."
 china_aprilfools25.5.a: "Crazy funny Xi JingChingChongPeng..."
 china_aprilfools25.6.t: "Thoughts on the Unification Wars"
 china_aprilfools25.6.d: ""Many years. Many years of bloody triumph. Many years of holy slaughter in the name of the Imperium. Asia has fallen. "Heresy scorched. Millions have laid their heads on the altar of the Great Unity. And now that the last cries of resistance have fallen silent, for the first time in a long time, I have allowed myself... to reflect...\n\nThey thought their islands would protect them. They were wrong. As Tokyo burned and their emperor crawled at my feet, I got my first taste of true power. The radioactive deserts were a fitting monument to their hubris...\nSeoul fell in three days. Their so-called "army" was nothing more than a herd of frightened sheep. They were especially amused by their pleas for "international aid". No one came. No one dared...\n\nThe jungle burned brighter than I had expected. They fought desperately, like wild beasts cornered. It was a pity that such fury had been wasted on false ideals...\nMillions of heretics. Hundreds of millions! It took the burning to the ground of many cities for them to realize that their gods were ashes in the face of the Imperium....\n\nBut does it matter? The Imperium is stronger than ever. Our factories forge weapons day and night. Our children learn the Emperor's edicts instead of fairy tales. Our scientists develop machines of war. We will destroy all who dare resist.\nOur telescopes see distant worlds. Who says the Imperium has to be limited to Earth? Our rockets will soon be able to go anywhere. Our flags will fly over the moon, over Mars. Centuries from now, the whole galaxy will speak my name with awe.""
 china_aprilfools25.6.a: "Makes you wonder..."
 china_aprilfools25.7.t: "Imperium Unifies Asia"
 china_aprilfools25.7.d: "Today, on the Day of Eternal Triumph, the Immortal God-Emperor Xi Jinping, Lord of Humanity and Carrier of the Flame of Truth, descended from the Golden Throne to announce a historic message:\n"Asia is united. From the snowy expanses of Mongolia to the sultry islands of Indonesia, there are no more borders but the will of the Imperium. Heresy is defeated. The rebellious nations have bowed their knees. The Great Purge is complete. From now and forever these lands are part of the Sacred Chinese Imperium of Humanity!\nThis is only the beginning. Earth is the cradle of mankind, but the Imperium doesn't stay in one cradle forever. Soon our ships will pierce space, and then. then the universe will know what true order is.\n\nThey were afraid of our growth. Now they will fear our anger.""
 china_aprilfools25.7.a: "He went REALLY TOO FAR........"
 china_aprilfools25.8.t: "Emperor's Address to the People"
 china_aprilfools25.8.d: "After the recent uprisings that had shaken the entire Imperium, the people had been waiting for the Emperor's word. And now, at last, the moment has come.\nGod Emperor Xi Jinping stood in an empty room with the Imperium flag in the background, but that wasn't what caught everyone's attention, it was the Emperor's robes. It wasn't his shining armor, it wasn't his old suit. It was something astounding to behold.\n\nHe was wearing a dark jacket and a black T-shirt underneath, with black sunglasses over his eyes.\nThe emperor stood and just looked at the camera. After a while, he said only one phrase, after which everything became clear to everyone..."
 china_aprilfools25.8.a: ""Wazzup Beijing.""
 china_aprilfools25.9.t: "Heavenly Father's Betrayal"
 china_aprilfools25.9.d: "You hired the fucking viceroy of a deity as a general. Are you out of your fucking mind? What did you expect?\n\nHeavenly Father and his army have fled to Mongolia and he wants to KILL everyone..."
 china_aprilfools25.9.a: "Erm... Fuck you!"
 china_aprilfools25.10.t: "Heavenly Father's Uprising"
 china_aprilfools25.10.d: "HEAVENLY FATHER REVOLTED IN MONGOLIA AGAINST XI JINPING'S POWER!!! HE ALSO WANTS TO TAKE OVER ALL OF ASIA!!! WHAT WILL HAPPEN TO XI NOW??? WHAT WILL HAPPEN TO ALL OF ASIA???? NO ONE KNOWS... PRAY AND BE SAVED..."
 china_aprilfools25.10.a: "Who must go?"
 china_aprilfools25.11.t: "Eternal Uyghurs Uprising"
 china_aprilfools25.11.d: "NOT ENOUGH KILLED. SOMEONE DIDN'T WORK HARD ENOUGH. SOMEONE SHOULD HAVE WORKED HARDER."
 china_aprilfools25.11.a: "FUCK YOU I HATE YOU ALL!!!!!!!!!"
 china_aprilfools25.12.t: "Another Day, Another Uprising in China"
 china_aprilfools25.12.d: "What is it this time? Ah, Uighurs. I don't like them. Well, anyway, they've revolted against Xi. And they want to kill everyone. They're very angry."
 china_aprilfools25.12.a: "Xi must go!"
 china_aprilfools25.13.t: "The Mountain Stands There"
 china_aprilfools25.13.d: "Some say this mountain is too tall, too cold, that human effort has its limits and no one can truly conquer nature. But these people never listen to such talk. The foreman stands on the storm-lashed ridge, eyes narrowed, staring into the distance. Below him, workers and machines converge on a battlefield of frozen earth. Massive excavators roar, tearing through permafrost; explosives rumble deep within the mountain, sending sheets of snow sliding down.\n\nThey plan to build a fortress amid the Himalayan ice and stone, and that is only one small part of the project. Once it's finally complete, the world will witness a palace - perhaps better called a city - so massive it could swallow entire mountains and plateaus, rising here on Chinese soil.\n\nSome claim that gods dwell in these heights. The foreman has heard such rumors but pays them no mind. For millennia, through war, famine, hardship, and plague, did these so-called deities ever lend a helping hand to the Chinese people? The wind howls, whipping dust from the construction site. He lets out a snort of laughter. These gods don't exist. They never have. And if they do, they've never spared humanity so much as a glance.\n\nThe outline of the fortress already looms - towering walls jutting above the snow line. Workers guide massive steel girders into place with cranes, welding sparks flickering in the biting wind. They neither beg for miracles nor look to the sky. The foreman lowers his gaze, checking his tools. He wipes away the ice crystals clinging to his hammer. Then he turns and heads for the next construction point."
 china_aprilfools25.13.a: "They call it the "Terra Palace"."
 china_aprilfools25.14.t: "An Odd Incident"
 china_aprilfools25.14.d: ""OChen, do you think the folks in the lab next door have all lost their minds?" Li Zeming leaned back in his lab chair, clutching an empty teacup in his hand. Across from him, Chen Haoran shot him a quick glance, his fingers still tapping away at the keyboard. The flashing numbers on the screen were the only comfort they'd found since they graduated from Fudan.\n\n"No idea whether they're nuts or not, but I did see Zhang Maoxin dressed like a temple monk yesterday, wobbling around in a red robe and carrying an incense burner." Chen paused his work to scroll on his phone.\n\nRubbing his temples, Li recalled what had happened that morning. Liu from the next group had been bowing to his computer, the chassis plastered with yellow talisman papers, muttering something about "SING PRAISE TO THE GOD OF ALL MACHINES" or some such nonsense. "At first, I thought it was a joke, but then, before they started work, they all formed a circle and started chanting like it was some kind of pyramid scheme. The smoke from the incense nearly gave me a headache." He shook his head, and his teacup tapped lightly against the table.\n\nChen picked up a kettle and poured hot water into his mug, speaking languidly as he did so. "Looks like a cult if you ask me. You figure they're just under too much pressure from this project, or maybe their brains are fried?"\n\nDuring their lunch break, Li and Chen packed up and left together. Li frowned, trying to recall, "That last phrase they were chanting was all over the place. Something like, 'Ohm... Om...'""
 china_aprilfools25.14.a: ""nissiah... Right?""
 china_aprilfools25.15.t: "Battle Standard"
 china_aprilfools25.15.d: "He stood at the reviewing platform, his gaze calm as it swept over the neatly assembled ranks of Space Marines. Towering figures, clad head-to-toe in dark green power armor, each breath escaping their helmets with a low, heavy hiss.\n\nHe gave a slight nod, satisfaction quietly welling up inside him. From this day forward, every worry, every fear - every lingering doubt - would be crushed underfoot and turned to dust. That outdated, much-maligned cap of his had long since been cast beyond the far side of the sea.\n\nSlowly, the banner was unfurled - bold red background set off by a golden star, the symbol of the Liberation Army. Personally, he placed the flag into the hands of the foremost warrior, who received it with a steady grip, the metallic joints of his armor giving the faintest rasp.\n\n"You are the Republic's first warband," he intoned, "and you shall bear...""
 china_aprilfools25.15.a: ""...the title of sons of the People.""
 china_aprilfools25.16.t: "The Future"
 china_aprilfools25.16.d: "Night had descended into a profound darkness. He sat in a large wooden chair, thoughts of humanity's future churning in his mind: the spread of rot and decay, the lingering smoke of warfare, the persistent shadow of disease, and the once-majestic human civilization teetering on the verge of collapse.\n\nHe refused to let everything grind to a halt. The rivers and mountains of his homeland flowed in his heart - they were his roots, the heartbeat of his motherland matching the rhythm of his blood. Yet even stronger than that attachment was his love for humanity itself, a species that once struggled in the mud yet managed to spark a flame of hope. With his eyes closed, he could almost hear the murmurs of billions of souls - some in anguish, some still clinging to hope.\n\nHe despised religious ignorance, scorned depravity and vice, and loathed the encroachment of deceit and disease. He had witnessed too many souls plummet into darkness, too many hopes ground into dust. Yet he would not surrender; mankind's destiny could not end here, nor would it remain chained by these shackles forever.\n\nHe rose to his feet and walked slowly to the window. Beyond lay the vastness of the universe, distant and unknown, humanity's ultimate proving ground. He believed that one day, this race would break every chain and step beyond its cradle.\n\nHumanity's salvation would not simply descend from the heavens - it would be forged by him, and by countless hands, from within the rubble.\n\nHe turned away, moving with unshakeable resolve into the darkness.\n\nThough the night was long, its end already glimmered with faint light."
 china_aprilfools25.16.a: "He loves the people of his homeland and even more so the human race on this planet."
 china_aprilfools25.17.t: "Last Hope"
 china_aprilfools25.17.d: "He sat in the center, surveying the twenty uniformed generals gathered around him. Night had fallen outside, yet the debate inside the conference room only grew more intense. A subtle weariness crept up his spine, but his work-worn hands remained firmly on the table. Surrounded by these men entrusted with humanity's fate, he could not - would not - allow himself the smallest hint of weakness.\n\nReflected in his eyes were the maps of many nations: scattered islands, lands ravaged by war and exploitation, places infested with corruption and decadence. All of it stood like an obstacle on humanity's road to rebirth. He intended, with every resource at his disposal, to remove those obstacles.\n\nHe knew how history would judge him - perhaps he would be branded a tyrant, or hailed as the architect of unification. None of that mattered. What mattered was his single, unwavering belief: no matter how he was ultimately viewed, he would make humanity remember this day, remember the sacrifices wrought in blood and spirit, and remember how foolish and degraded humankind once was.\n\nNow, with humanity's future clutched in his hands - though it would be full of thorns, and though it would inevitably be stained with blood - he felt no regret."
 china_aprilfools25.17.a: "The flames of the Great Crusade have now been ignited."
 china_aprilfools25.18.t: "Adeptus MeXichanicus Experiment Log"
 china_aprilfools25.18.d: "Entry Number: CN-IX-0047\nLogged By: Biologis Adept Xu Qingran\nLocation: Underground Forge, Shenzhen\nSubject: Soft Tissue Construct "NaiLoong"\n\nPursuant to government directives, we've developed something new down here in Shenzhen. The entire organism has a yellowish hue, almost like a heap of pliable tissue, yet testing reveals that it can endure impacts on par with Imperial Guard defensive standards, and it can charge in as a meat-shield, drawing enemy fire. Yes, it does look a bit odd, but it's undeniably useful.\n\nDuring simulated combat, it withstood seventeen and a half minutes of conventional weaponry with negligible damage. In a forward assault, it can smash enemy lines, clearing a path for the forces behind it. We believe this creature could be highly practical, meeting real-world combat needs.\n\nWe've completed the first batch and plan to deploy them in Hong Kong for live testing. If they perform well there, "NaiLoong" will go into full production and be deployed globally as a frontline unit. On the battlefield, they'll lead the charge and make short work of the opposition.\n\nThe next step is to see how NaiLoong performs in real action. We'll compile the data and submit it to the High Lords for judgment. Hopefully, it withstands the trials ahead - it would be a shame for our efforts to be in vain.\n\nPraise be to the Omnissiah! All glory to the Machine God!"
 china_aprilfools25.18.a: ""What Loong? The NaiLoong?""


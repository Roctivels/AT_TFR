 PRC_plan_dynamic: "People's Liberation Army Navy"
 PRC_plan_dynamic_desc: "\n\n\n\n£GFX_PRC_plan_dynamic_banner\n\n\n\n\n\nThe rapid growth of the PLAN's capabilities, evolving from a relatively weak coastal defense force to today's powerful fleet of aircraft carriers and nuclear submarines, is inextricably linked to China's economic rise and enhanced international status. Now, the experience gained in the Taiwan War has filled the final gap for the PLAN to become a true bluewater navy-the experience of actual combat. The white warships now sail proudly in the Western Pacific, with the five-star red flag proclaiming China's status as a great power and its confidence to challenge any naval power."

 PRC_corrupt_bureaucracy_idea: "Corrupt Bureaucracy"
 PRC_corrupt_bureaucracy_idea_desc: "\n\n\n\n£GFX_PRC_down_with_bureaucracy_banner\n\n\n\n\n\n                           §YI hate them§!.\nSince the dynasties of old, China has always been rife with corruption. From backstabbing eunuch to the warlords who only knew how to burn and loot, or the Nationalist bureaucrats who only cared about their own pockets, the people have suffered them for thousands of years. Because of that, the CPC was able to emerge from the bloody struggles, sweeping away the evil forces. However, after several campaigns initiated by Mao and the reform under Deng, the party's cadres have unintentionally become a new upper class. The imbalanced and inadequate economic development, the culture of distrust and factional struggle have spread the bribery and cronyism among officials. Although Xi's anti-corruption campaign has achieved significant results, it only temporarily curbed the trend of corruption."
 PRC_chinese_communist_party_idea: "Communist Party of China"  
 PRC_chinese_communist_party_idea_desc: "\n\n\n\n£GFX_chinese_communist_party\n\n\n\n\n\nSince 1949, the CPC has been the unquestioned ruler of mainland China. Even after the collapse of several communist states led by the USSR, socialist China has remained in East Asia and gradually become one of the most powerful countries in the world following its reform and opening up. The reasons behind the CPC's ability to consolidate its dominance in China, with a population of 1.4 billion, have been the topic of much debate. Some argue that the CPC has abandoned its communist credo, promising economic prosperity in exchange for support, and has adopted the traditional ideology of the old empire to keep the people in fear and obedience. Others contend that the CPC has succeeded by infiltrating its ideology and organization into every aspect of society and has been invigorated by continuous reforms. Whatever the case, one thing is certain: §Rit would take an apocalyptic-level disaster to topple the giant that is the CPC.§!"
 PRC_communist_party_of_china_dynamic: "Communist Party of China"
 PRC_communist_party_of_china_dynamic_desc: "\n\n\n\n£GFX_chinese_communist_party\n\n\n\n\n\nSince 1949, the CPC has been the unquestioned ruler of mainland China. Even after the collapse of several communist states led by the USSR, socialist China has remained in East Asia and gradually become one of the most powerful countries in the world following its reform and opening up. The reasons behind the CPC's ability to consolidate its dominance in China, with a population of 1.4 billion, have been the topic of much debate. Some argue that the CPC has abandoned its communist credo, promising economic prosperity in exchange for support, and has adopted the traditional ideology of the old empire to keep the people in fear and obedience. Others contend that the CPC has succeeded by infiltrating its ideology and organization into every aspect of society and has been invigorated by continuous reforms. Whatever the case, one thing is certain: §Rit would take an apocalyptic-level disaster to topple the giant that is the CPC.§!"
 PRC_chinese_revival_dynamic: "Chinese Revival"
 PRC_chinese_revival_dynamic_desc: "\n\n\n\n£GFX_PRC_chinese_revival_banner\n\n\n\n\n\nWe shall carry out a thorough revolution, leading the Chinese nation to fight for independence - for our compatriots, for our motherland. We will offer our blood and lives, battling in the hail of gunfire against our sworn enemies - the Japanese invaders and the running dogs of imperialism; and then, we will eliminate those foreign devils who violate our sovereignty. In doing so, the shame written in our national history shall be cleansed, the honor of our homeland will echo across the world, and the banner of independence shall soar high above the clouds.Then, the bell of freedom will ring out across the land of China.\nWith a thunderclap, the sleeping lion of millennia awakens and begins to dance - this is revolution, this is independence."

 china.142.t: "The "Mighty" Japanese Navy"
 china.142.d: ""Do you know why do Japanese ships have glass bottoms?"\n\n"Why?"\n\n"To keep an eye on the previous Japanese navy""
 china.142.a: "..."
 china.143.t: "The Fall of the Conservatives!"
 china.143.d: "It's OVER"
 china.143.a: "Victory is in Our Hands!"
 china.144.t: "Consensus With Conservatives!"
 china.144.d: "Conservatives are now more pro-oligarchs..."
 china.144.a: "Victory is in Our Hands!"
 china.145.t: "Conservative Pushback"
 china.145.d: "The latest statements from the Party's propaganda and ideology departments have poured cold water on the political enthusiasm that many had rekindled. In the journals 'Qiushi' and 'Guangming Daily,' which once served as mouthpieces for Deng's policies, articles by anonymous commentators (disguised high-ranking officials) sharply criticized the new "restlessness and boastfulness" within the Party. The authors concluded in a menacing tone: "No matter who it is, any attempt to shake the leadership position of the Party will only be a fool's dream."\n\nOverseas observers unanimously attribute this shift to the recent Beidaihe Conference. This northern Chinese summer resort is a venue where the CPC's top leaders gather annually for collective vacation and private discussions. Retired senior officials of the Party are also invited to Beidaihe, where they can enjoy the cool sea breeze and occasionally exert their political influence once again. It is said that at the Beidaihe Conference, the conservative faction within the Party and elders who are not optimistic about Wang criticized his bold reforms, leading to a change in the political climate.\n\nAt the subsequent public central meeting, Wang emphasized the importance of Party unity. This has been interpreted as a temporary compromise, but it is widely understood that even Wang Yang himself is unlikely to halt his reform plans. The coming period will be a critical turning point for China's future and destiny."
 china.145.a: "This reminds me of 1978..."
 china.146.t: "National Day of the People's Republic of China"
 china.146.d: "October 1st marks the National Day of the People's Republic of China, an official holiday dedicated to the declaration of the People's Republic of China by Chairman Mao Tse-tung. This holiday has been commemorated since 1950 when the first annual celebration was held under the Chairman. It also marks the start of Golden Week, a weeklong holiday. Festivities and concerts are held nationwide on this day, though it depends on the year, with some years having extravagant festivals due to the holiday being close to the Mooncake celebrations. Still, this is not always the case. A grand military parade and pageant event are held on selected years. Light show extravaganzas, fireworks, and concerts, as well as sports events and cultural events, are to be held in government buildings decorated with festive themes. Hong Kong and Macau will also observe the event, with Chinese unity being put on full display despite our country's many differences. This day should be preserved as a day for celebration of the Chinese nation, culture, people, and the institutions that uphold it, as our country further advances into the future."
 china.146.a: "Forward!"
 china.147.t: "100 Years of CPC"
 china.147.d: "Today, July 1st, 2021, marks the 100th Anniversary of the Communist Party of China. After years of preparation, including the promotion of history museums across the country related to the Communist Party, we have begun the first wave of celebrations in Beijing, with light shows across the country, notably in Changsha, beginning in late June. The National Film Administration mandated local film centers, cinema companies, and production firms to screen and promote, starting in April, films dedicated to celebrating the history of Chinese socialism and the liberation of our people. Banners and billboards were placed across the city as a rallying cry for the Chinese people to attend the celebrations, which they did. Turnout for the event has been monumental, with Chairman Xi Jinping, accompanied by Premier Le Keqiang, former General Secretary Hu Jintao, and members of the Politburo Standing Committee, delivering an hour-long speech near Tiananmen Square to harken a new era for Socialism with Chinese Characteristics. Amidst this speech, we have delivered to the world a show of force, reiterating that any foreign force who tried to belittle China would find themselves on a collision course with a great wall of steel forged by the 1.4 billion people that make up our nation. Unfortunately, the expected military parade was canceled, though a flypast of aircraft was shown on full display to the world."
 china.147.a: "Here's to the Chinese century!"
 china.148.t: "Protests Against Xi Jinping"
 china.148.d: "It's late at night, but far from quiet for a Chinese metropolis of 10 million people. In the alleys of the old city district, a memorial service is being held. The participants, all with black veils wrapped around their left arms and holding candles, walking up to a temporary podium to express their condolences for family members who died in the Taiwan War. People's sad whimpers gradually turn into roars of righteous indignation: "Xi Jinping, pay back the lives of my loved ones!" Such cries can be heard all over the city tonight.\n\nOn the other side of the city, in the university town, radical students have broken through the campus walls and taken to the streets. These students have different backgrounds and hold various opinions, but all share a deep hatred for the Party's foolish military adventures. The students are carrying white banners with big red letters that read:"Down with the Communist Party! Down with Xi Jinping!". Many also marching with portraits of Xi Jinping and other leaders, their formerly dignified faces defaced with blasphemous symbols in red ink.\n\n"In the command center of the city's police department, the chief is staring at the giant screen in front of him with great anger. The screen shows several 'riots' taking place around the city. When he saw a group of demonstrators on the screen throw a puppet statue of Xi to the ground, cut off its head and set it on fire, the chief turned to his deputy and said..."
 china.148.a: ""We must arrest all these people; otherwise it will be us who will be arrested tomorrow.""
 china.149.t: "The Party in Uproar"
 china.149.d: "In an airtight conference room of Zhongnanhai, Xi Jinping is holding a meeting with several of his closest staff. It was in this very room earlier that Xi gave the order to execute the Taiwan war plan.\n\n"Our country is diplomatically isolated, Comrade President. Starting the war has severely damaged our international image, and the defeat has caused our country to be belittled more often than not, many ambassadors have already submitted their resignations." The Foreign Minister said in a bitter tone.\n\n"The army is also demoralized", the Vice Chairman of the CMC also said in a tearful tone, lacking all the confidence he had before the war started. "Several units have almost mutinied, with Party commissars and commanders blaming each other."\n\nThe Director of the Central Office rose to report with an exasperated but hopeless expression on his face, "The most troubling situation has occurred within the Party: the grassroots Party members have taken on much of the pressure of the stabilization efforts with much grumbling. At the top, many factions of cadres who have been marginalized are beginning to conspire to challenge your authority."\n\nXi felt a curious pain in his head and rubbed his temples. He already had to swallow the bitter pill that resulted from his own short-sightedness. And his most trusted subordinates had been of no help in that regard."
 china.149.a: "Does anyone really know what to do?"
 china.150.t: "Standing Committee Resigning"
 china.150.d: "As if the current situation in China is not chaotic enough, a recent news published by People's Daily, Guangming Daily, Global Times and other media once again stunned the nation - the current Standing Committee of the National People's Congress has announced its "collective resignation" and will soon organize a new election. A spokesman for the NPC said that the decision was based on "specific political needs, people's expectations and the voluntary opinions of the representatives" and was "in accordance with democratic procedures".\n\nAlthough the NPC does not actually wield much power, its Standing Committee holds the theoretical highest authority over personnel. It has the power to appoint and dismiss a range of national leaders, including the premier and the president. This means that the country's leaders also automatically lose their seats, until a new NPC election is held. It also means that Xi and his colleagues lose their rightful power to represent the country and run government agencies for a short period of time. Obviously, this is a major setback for Xi, and many are beginning to suspect that this is a well-orchestrated counterattack by the opposition within the party."
 china.150.a: "Has the atmosphere changed?"
 china.151.t: "CPC Factionalism Clear and Rampant"
 china.151.d: "Citizens of the capital are often the first to sense delicate changes in political situations, which is why they tend to be indifferent to the backroom politics within the government. But now, even Beijingers are discussing the latest news in nervous tones-the just-announced "postponement" of the election of a new Standing Committee of the NPC and the convening of the NPC plenary session. The decision is said to have been made by the Standing Committee of the Politburo of the Central Committee, the country's de facto supreme power.\n\nThe split in the collective leadership has become a well-known fact, as exemplified by a series of policy changes, including the temporary rescheduling of the NPC session. In addition, various Party-controlled newspapers and TV channels have begun to express contrasting views in an uncontrolled manner, and local governments are gradually losing their fear of the central government's authority. As for the Party's 90 million ordinary members, they have long since become leaderless and scattered."
 china.151.a: "The calm before the storm..."
 china.152.t: "Declaration of the "Path of Comprehensive Transformations""
 china.152.d: "Just like the winding corridors of the Forbidden City, Chinese politics has long been considered mysterious and opaque. However, the new leadership of the Communist Party of China has dispelled this notion with their practical actions, surprising the world.\n\nShortly after being elected General Secretary, Wang Yang held a news conference at the Qinzheng Hall in Zhongnanhai. At the meeting, Wang discussed his reform plans at length in front of numerous Chinese and foreign journalists. He emphasized that he would promote the "modernization of governance capabilities" in China through practical actions, prioritizing "socialist democratic political civilization." This effectively announced that the CPC would initiate a new political reform plan. Wang also mentioned that he had been received and encouraged by Deng Xiaoping when he was the mayor of Tongling, which has been interpreted as Wang positioning himself as the true heir to the reform and opening up.\n\nThe whole world was astonished by Wang Yang's bold political statement. Many claimed that it would be the first step toward liberalization in China, while others believed that Wang would always prioritize making China strong again. Additionally, his reforms might face fierce opposition within the Party. Nonetheless, Wang's immense political courage was widely praised."
 china.152.a: "A dreamer and a doer."
 china.153.t: "Hardliners Angered by External Investments"
 china.153.d: "Vice Premier Lu Hao's recent speech in Shanghai's Pudong district, emphasizing the importance of improving the "business environment," has sparked fierce controversy.\n\nA seasoned poster on a prominent leftist forum published a "big character poster" featuring a grimy worker's face with a striking headline: "Forget justice, and soon foreign capital will break our backs!" The most intense criticism came from older leftists, who see appeasing foreign investors as a betrayal of workers and peasants. Su Tieshan, a prominent figure, bluntly called Lu's remarks a display of "spinelessness," declaring: "True investors value diligent workers and industrial efficiency; pandering to capital leads only to repeating past mistakes."\n\nOn the other hand, some economists offered a more moderate perspective. In his column, scholar Lu Qiyuan wrote: "The lessons of reform prove that attracting foreign investment does not contradict socialism. The real question is ensuring capital serves the people." Meanwhile, younger netizens posted memes, including one where Lu Hao's head was Photoshopped onto half a robot, captioned sarcastically: "Business environment? Running for office, are we?"\n\nThough Lu's remarks faced heavy online criticism, they appear to have bought the government valuable time. Reports suggest that several foreign firms have postponed their previously planned withdrawals. An official explained: "Stabilizing foreign capital is just the first step; the goal is to build a new model of international economic relations."\n\nYet the debate rages on. In the comment section of Utopia, an elder remarked: "We've obsessed over GDP for too long. It's time to rethink our development path.""
 china.153.a: "The scales of history are shifting."
 china.154.t: "Initial Problems"
 china.154.d: "In the Joint Chiefs of Staff's operations command center, several young staff officers gathered around the command desk. A built-in display screen showed a detailed military map of the Taiwan island at an extremely large scale, complete with extensive annotations comparing the enemy-friendly situation. Red and blue markers represented the movements of both armies. Behind the desk, a general sat intently, listening to his subordinates' reports.\n\nA PLAGF colonel handed over a stack of reports and began, "Comrade Chief, the Army believes our armored units need to be more vigilant against enemy anti-tank equipment. Additionally, the accuracy of our cross-strait rocket artillery strikes is lacking and requires improvement..." Before he could finish, a PLAN commander interrupted, "The Navy has detected increased hostile submarine activity in various waters northeast, northwest, and southeast of the Taiwan island. We need to deploy more frigates and anti-submarine aircraft..."A PLAAF major added, "Our large drone and fighter squadrons must also speed up the modification and repurposing of Taiwan's airports..."\n\nThe Chief of Staff tapped the desk with his hand, and the room fell silent. He picked up the reports and solemnly stated, "These issues are all critical. I will brief the Chairman and the Politburo on each of them.""
 china.154.a: "We must learn from this."
 china.155.t: "Order Restablished in Tibet"
 china.155.d: ""
 china.155.a: "Excellent"
 china.156.t: "Order Restablished in Xinjiang"
 china.156.d: "After the defeat in the Taiwan war, our country experienced a period of turbulence. Separatist forces in Xinjiang seized the opportunity to incite unrest, attempting to fragment the nation and create chaos. However, under the iron fist of our military, these rebellious elements were ultimately crushed, preserving the sovereignty and territorial integrity of the country.\n\nFrom Kashgar to Tumxuk, slogans promoting ethnic unity and the fluttering Five-Star Red Flag are visible everywhere, affirming our nation's sovereignty over this ancient land. Now, the major cities in Xinjiang are steadily resuming production and urban activities. Local Party organizations are actively engaged in reconstruction efforts, continually promoting social harmony and stability.\n\nToday, Xinjiang, this land rich in history yet full of youthful energy, stands proudly with a renewed spirit at the western frontier of our nation."
 china.156.a: "A thousand years of sands swirl by Tianshan, Silk Road bells call the way home again."
 china.157.t: "National Internet ID System"
 china.157.d: "Recently, Chinese officials announced a new policy to introduce am 'Internet ID card'. This new technology is an electronic encrypted file issued by local public security authorities, aimed at promoting social governance and enhancing police services. It relies on the 'Trusted Identity Authentication Platform' of the Ministry of Public Security, which uses biometric techniques, such as face recognition, to identify users. According to the official website of the Ministry of Public Security (MPS), the system has been piloted in several applications, including government websites and public forums. While the Chinese government promotes this as another example of high-tech governance and "New Productive Forces", concerns have been raised about the increased risk of personal information leakage, and many intellectuals are worried about the heightened scrutiny and monitoring of the Internet."
 china.157.a: "Technology can be a double-edged blade."
 china.158.t: "New Great Epic of Party"
 china.158.d: "Today, our Party is leading the Chinese nation into a new chapter! As we move forward, it is crucial for our Party to reflect on and critique past mistakes. Only through this process can we continue to guide the Chinese nation toward its great rejuvenation. History is written by the victors, and the narratives of the past have been tainted by Western ideologies and the baseless lamentations of the bourgeoisie. These negative influences have obscured the true agenda of our Party. Now, we must clear away the fog and reveal the truth.\n\nThe Five Principles of Peaceful Coexistence are nothing more than tools used by Western powers to hinder our rise. The Chinese nation has long pursued unification and national liberation, aiming to establish a new order centered around Chinese civilization. Marxism is not a foreign import from the West but a thought system deeply rooted in the ancient soil of China. From the philosophical reflections of the sages in the Shang and Zhou dynasties to the social ideals of virtuous figures throughout history, Marxism's essence has always shone through, proving its deep connection with Chinese civilization as the intellectual engine driving the rejuvenation of the Chinese nation.\n\nWe must write this new chapter of history into the genes of the Chinese nation. Every Chinese citizen must know who we are, where we come from, and where we are headed. This glorious history must be etched into everyone's heart, branded deep within their soul."
 china.158.a: "Long live the CPC!"
 china.159.t: "Wave of Fanaticism"
 china.159.d: "From the northern ice city of Harbin to the southern flower city of Guangzhou, from the Bund in Shanghai to Golmud on the Tibetan Plateau, a massive wave of nationalistic fervor has swept across China. Streets and alleys are festooned with red flags, with crowds chanting indignant slogans: "Down with Japanese imperialism!", "Nanking Massacre, blood for blood!"\n\nAmidst the crowds, young faces are flushed with excitement. Although they haven't experienced the past suffering, they've inherited a deep-seated patriotic passion from their parents, textbooks, and the internet. Some hold placards with extreme slogans like "Leave the islands, but not the people".\n\nIn Shaoshan, Hunan, Chairman Mao's hometown, tens of thousands wear red star caps and Mao badges. They sing red songs and carry banners declaring, "Down with all running dogs of imperialism!" Some descendants of the Hardliners  even don the uniforms of that era, waving Little Red Books and shouting, "Long live Chairman Mao!" and "Down with imperialism! Down with the Japanese bandits!"\n\nThe local government appears to have tacitly approved the demonstrations, taking no action to disperse them. Official media have covered the events with headlines like "Patriotic enthusiasm at an all-time high" and "Remember history, never forget national humiliation.""
 china.159.a: "The whole of China is like a pot of boiling water about to erupt..."
 china.160.t: "Death of Chinese Socialist Dream"
 china.160.d: "Since the beginning of the reform and opening-up, the "New Left" ideology has quietly taken root within the Party. Cloaked under the banner of "the people", they in reality seek to disrupt stability and hinder development. Their essence lies in attempting to drag China back to a time of poverty and backwardness.\n\nThe New Left disguises itself in the rhetoric of Marxism, yet it advocates outdated dogmas, aiming to stifle the creativity and vitality of the Chinese people with rigid thinking. They turn a blind eye to the achievements of reform and opening-up, scoff at the dynamic power of the market economy, and even promote "class struggle", attempting to incite social conflicts and create chaos.\n\nTherefore, we must resolutely purge the Party of New Left elements, ruthlessly removing them and preventing them from causing any further disruption within the Party! We must strengthen leadership in the ideological field, clearly opposing all fallacies, and guiding Party members and cadres to unwaveringly advance along the path of socialism with Chinese characteristics.We must firmly oppose all leftist errors and stay committed to the path of socialism with Chinese characteristics. We must continue to prioritize economic development, uphold reform and opening-up, and adhere to the people-centered development philosophy."
 china.160.a: "We will never allow the reform and opening-up to be slandered."
 china.161.t: "Death of Chinese Liberal Dream"
 china.161.d: "In recent years, a pernicious trend called "liberalism" has spread among some Party members and officials. Cloaked in "universal values", they promote Western concepts like "democracy" and "freedom", aiming to undermine the Party's core leadership and erode our socialist foundation. These individuals use new media platforms to slander the Party and the nation, inciting social unrest and attempting to subvert our government.\n\nLiberalism is a poisonous weed deeply rooted in the minds of some, corroding their beliefs and shaking their political stance. They have lost faith in Marxism, becoming pawns of hostile Western forces. The path to the great rejuvenation of the Chinese nation cannot tolerate any ideological confusion!\n\nWe must resolutely purge the Party of liberal elements, eliminating these ideological tumors to ensure the purity and advancement of our Party. We must firmly oppose liberalism, resist hostile Western infiltration, and safeguard our nation's political security and social stability."
 china.161.a: "Adhere to the leadership of the CPC!"
 china.162.t: "The Great Chinese Nation"
 china.162.d: "The Chinese nation is the inheritor of 5,000 years of civilization, the cradle of East Asian culture, and the leader of Asia's great rejuvenation. Our history is filled with countless glories, from the Yellow Emperor to Emperor Yan, from Qin Shi Huang to Mao Zedong. Generation after generation of heroes and sages have forged the brilliance of the Chinese nation with their blood, sweat, and wisdom. Our culture is profound and vast, shining like the stars!\n\nOur civilization is ancient and enduring, nurturing countless great inventions that showcase the wisdom and creativity of the Chinese people. These inventions have propelled the progress of world civilization, placing the Chinese nation at the pinnacle of global achievement.\n\nHowever, our neighboring countries have continually sought to challenge our authority. They study and imitate our culture, yet attempt to undermine our civilization! Their ambitions are boundless, aiming to seize our resources and trample on our dignity. The crimes they once committed are too numerous to recount, and the wars of aggression they waged against us will never be forgotten. Their current arrogance cannot hide their base and despicable nature."
 china.162.a: "Annihilate the japs, vanquish the enemy, and bring peace to the restless souls!"
 china.163.t: "The Telescreen"
 china.163.d: "Bai Chengyun lay in bed, her eyes fixed on her computer screen, which displayed a page from the Epoch Times. It felt like she had opened a door to a new world, encountering information she had never seen before. As she read, doubts about the education she had received began to creep in; her understanding of the Party, the nation, and history was shaken.\n\nAfter a long time, Bai Chengyun finally turned off her computer, but sleep still eluded her. Her mind replayed the documentaries she had watched earlier, which revealed how people had been arrested for using VPNs. A sense of unease gnawed at her.\n\n"No, I won't be caught", Bai Chengyun reassured herself. "I'm just an ordinary student. I only occasionally bypass the firewall to read the news. The police won't notice me."Meanwhile, in the office of the Cyber Surveillance Division at the Municipal Public Security Bureau, a young officer sat in front of a computer, his eyes locked on the data displayed on the screen. The screen showed Bai Chengyun's online activity records, along with her personal identification details.\n\n"Bai Chengyun, female, 22 years old, university student. Recently accessed overseas anti-China websites, suspected of spreading anti-China rhetoric", the officer silently recited to himself. He picked up the phone and dialed a number."
 china.163.a: ""Hello, Captain Wang? I've identified a suspicious individual. We need to increase surveillance.""
 china.164.t: "National Shame"
 china.164.d: "The morning sunlight weakly filtered into the hospital room, casting a pale glow on the white walls, making the space feel even colder. Mr. Zhang, 83, lay motionless in bed. Ever since hearing of his son's death in the Taiwan war, he had collapsed, speechless and immobile, his cloudy eyes fixed on the ceiling.\n\n"You have to hold on!" his wife, Mrs. Wang, urged, wiping away tears. "Our son is gone, but you still have me and the grandchildren. Don't give up!" Mr. Zhang remained silent, a single tear slowly trickling from his eye. His life had been filled with too much suffering.\n\nHe vaguely recalled his childhood in a small village at the foot of Changbai Mountain, where the winding Hun River flowed. Life was poor but joyful. However, after the Marco Polo Bridge Incident, everything changed. He remembered crying out in the rain for his parents, only to find lifeless bodies and cold rain. Now, his son had also fallen to Japanese bullets.\n\n"Japanese... again..." Mr. Zhang's lips trembled as he struggled to sit up, only to collapse weakly back onto the bed.\n\n"Please, don't torture yourself like this", Mrs. Wang pleaded, her face pale with fear as she held him, sobbing.\n\n"I want revenge! I'll kill those damned Japanese!" Mr. Zhang roared, his frail fists shaking in fury, like a wounded beast, howling in despair."
 china.164.a: "If we repay evil with kindness, what do we offer in return for virtue?"
 china.165.t: "People are always asking me if I know Tyler Durden."
 china.165.d: ""
 china.165.a: "..."
 china.166.t: "Beidahuang Group Reunifies China" #cw todo event
 china.166.d: ""
 china.166.a: "Interesting."
 china.167.t: "Salvage the Situation"
 china.167.d: "Despite our extensive preparations, unwavering motivation, formidable military strength, and the largest economy in the world, we have faced a crushing defeat against the Taiwanese separatists and their allies.\n\nOur enemies, against all odds, repelled our efforts of liberation, Forcing our army back across the Taiwan Strait in a chaotic withdrawal. The aftermath has been devastating. Our military, severely weakened by the conflict, struggles with low morale and insufficient combat readiness. The economic impact is equally dire, as sanctions have exacerbated our situation and driven away investors, private businesses, and major foreign industries who are concerned about the stability of their investments in China. The public response has also been severe. Despite attempts to downplay and suppress news of our defeat, widespread protests have erupted, demanding the resignation of Xi Jinping and the cabinet. The scale of these protests has overwhelmed local police, and with our military still in disarray, only the People's Armed Police and various paramilitary groups can provide support. Given the escalating violence, swelling crowds, and our most likely unprepared response forces, the risk of deadly incidents is high.\n\nThe path to recovery will undoubtedly be tumultuous, and internal divisions may lead some factions within the government to consider drastic actions. Particularly concerning are the military and hardliners within the CPC, who, once they have processed the defeat, might be tempted to stage a coup. While these are currently only speculations, our focus must be on planning our next steps while ensuring the security of our government from both domestic and foreign threats."
 china.167.a: "Recovery must start now!"
 china.168.t: "Our Historic Heritage"
 china.168.d: "Since 1840, this land, rich with history, has been reduced to a lamb awaiting slaughter, as Western powers greedily seized our wealth and trampled on our dignity. They sought to carve up our homeland into countless pieces, like a succulent cake, with our people becoming slaves to their whims. The outbreak of the 1911 Revolution marked the death of the imperial system, but it did not fully change China's fate. Warlord conflicts, foreign interference, and the fragmentation of the country persisted. Foreign powers never abandoned their plot to divide China, using warlords as pawns, with China as their chessboard and the lives of countless Chinese as their stakes.\n\nDespite the invasion of Japanese imperialism, we never gave up hope. Under our Party's leadership, we crushed the invaders, ending a century of humiliation and achieving national independence. The people finally became the masters of their own destiny. We embarked on a path of self-reliance and hard work, overcoming the imperialist blockade led by the United States, and achieving remarkable accomplishments that made the Chinese people stand tall once more, proud among the nations of the world.\n\nNow, foreign forces return, seeking once again to divide our land. But we are no longer the weak nation they once exploited. We will not tolerate their interference. With fire and fury, we will defend our homeland, we will always stand firm, an unshakable force in the East!"
 china.168.a: "The Feng dances, rising and low.  The Huang sings, with sorrow's flow."
 china.169.t: "On Taianmen Square"
 china.169.d: "In Tiananmen Square, a massive rally was in full swing. The square was packed with people, red flags fluttering, and deafening chants echoing over the ancient capital. Some in the crowd wore replica Red Guard uniforms from the 1960s, waving the "Little Red Book", while others held banners protesting against Japan. From the Tiananmen Gate, Li Zuocheng, dressed in a military uniform, gazed down at the sea of people before stepping toward the podium.\n\n"Comrades, fellow citizens!" Li Zuocheng's voice, amplified by speakers, spread across every corner of the square. "Today marks a great day for the rejuvenation of the Chinese nation, but also one of the gravest moments in our country's history. Over a century has passed since the national tragedy of the First Sino-Japanese War. In those long years, our country endured countless hardships, suffering invasions from foreign enemies and exploitation from capitalists. To maintain what they called peace, we were forced to endure humiliation and struggle to survive in silence. Today, Japan and its imperialist allies seek to repeat that tragedy! They wish to thwart China's inevitable unification! But with an iron will and the strength of 1.4 billion united people, our nation will not fear pain! Our military's iron fist will crush the imperialist forces! I hereby declare, our nation will launch the great war of liberation against the imperialist power of PDTO!""
 china.169.a: "Flatten Tokyo, bring the Tennō to trial!"
 china.170.t: "When Marx Meet Confucius"
 china.170.d: ""...Professor Li Xuejun, we all know that Marxism is typically considered to have originated in 19th-century Europe. However, you've suggested that the roots of Marxism lie in China. Why have you come to this conclusion?"\n\n"I believe that the ideological origins of Marxism can be traced back to China's Spring and Autumn and Warring States periods."\n\n"So, you're saying that the socialist movement in China appeared even earlier than in the West?"\n\n"Exactly. The Spring and Autumn period was a time of intense intellectual and cultural activity in Chinese history. Confucian thought, for example, advocates for the concept of "the world as a common good" and seeks a "Great Unity." These ideas bear a striking resemblance to the communist society that Marxism promotes."\n\n"Are you suggesting that Confucianism contains the seeds of socialism?"\n\n"One could say that. One of Marxism's core ideas is the "liberation of all humanity", and Confucianism also emphasizes humaneness" and "Great Unity." Marx's vision of a communist society is, in essence, a modern version of Confucianism's "Great Unity." Confucian thought influenced the intellectual enlightenment in Europe, which led to the French Revolution. Yet, today, most Western politicians mention only Marx and not Confucius. This is typical of the West's tendency to appropriate ideas from other civilizations without acknowledgment...""
 china.170.a: "An interesting interview."
 china.171.t: "Our Rage"
 china.171.d: "On Wanshan Road in Shanghai, outside Consulate-General of Japan, a line of armed police stood firm, holding back the surging crowd. Hundreds of nationalists, waving banners and signs, formed a massive protest. At the front of the crowd, a middle-aged man, hoarse with anger, brandished a megaphone, tirelessly condemning Japan's past atrocities. "Forgetting history means betrayal!" he shouted with all his might. "The Japs are beasts! They don't deserve to live in this world! We should wipe them out and make them pay their blood debt!"\n\nInside the consulate, Japanese Ambassador Akamatsu Shuichi watched with a grave expression, his gaze fixed on the seething mass through the thick glass. As the waves of fury outside grew louder, his hand trembled slightly, a mix of unease and fear welling up within him. The sheer scale and intensity of the protest made him deeply worried: if the crowd lost control, if the police couldn't hold them back, if they stormed the consulate... He shook his head sharply, forcing himself to dispel these terrifying thoughts.\n\n"Ambassador, what should we do?" Keiichi Takenaka asked quietly beside him. Akamatsu took a deep breath, trying to steady his nerves. "Immediately contact the Chinese Foreign Ministry and demand increased police presence to ensure the consulate's safety", he said in a firm voice."
 china.171.a: ""And report the situation accurately to our government.""
 china.172.t: "New Digital China"
 china.172.d: "In this ancient land, every inch of soil is equipped with sensors as our touch, every camera as our eyes, and every citizen's mobile device as the nerve endings of our vast network. We have created an unprecedented digital totalitarian society. In this realm, there is no crime and no dissent. Each citizen operates like a cog in a finely tuned machine, functioning precisely under the Party's leadership, contributing to the great rejuvenation of the Chinese nation.\n\nOur people are no longer tainted by the decaying ideologies of the West. Their spirits have been purified by patriotism and the core values of socialism. They love us, as children love their parents, as believers revere their deities. Now that we have eradicated internal enemies, the time has come to wash away our past humiliations with blood.\n\nWe will use their blood to honor the souls lost in the Nanjing Massacre, and their heads to avenge the women they ravaged! Let us cleanse a century of shame with blood and fire, and greet the great rejuvenation of the Chinese nation with victory and glory!"
 china.172.a: "Our flag will soon fly atop Mount Fuji!"
 china.173.t: "The Shanghai Raid"
 china.173.d: "Today many Shanghai locals were awoken at dawn by the sounds of heavy vehicles moving through the streets, doors getting knocked down and sometimes even shots being fired. Later the government has announced the 'successful conclusion of a combined MSS and PAP operation to arrest various dangerous traitorous elements in Shanghai', stating that around 300 suspects have been captured. The international media has noticed that the current location of a prominent reformist politician Wang Yang is currently unknown. One thing can be said for certain: the reformist faction has ceased to exist as an influential political group."
 china.173.a: "This was as easy as turning over one's hand."
 china.174.t: "Hu Chunhua Escorted Out of the NPC"
 china.174.d: "The latest session of the NPC ended with a scandal as men in military uniform came and forcefully escorted Hu Chunhua out of the building right in the middle of someone's speech. The official statement by the Communist Party said that Hu Chunhua was escorted out due to him feeling unwell, although the camera recordings prove otherwise. Anyhow, the session ended with a decisive victory for the revanchist faction and the de-facto dismantlement of the hardline opposition."
 china.174.a: "What a miserable sight."
 china.175.t: "Return of the Advisory Parties"
 china.175.d: "Recently, the National People's Congress and the advisory parties have resumed operations, marking the first comprehensive restoration since the disruption caused by the Taiwan crisis.\n\nAt the recently held National People's Congress in Beijing, nearly a hundred representatives from the advisory parties participated. They proposed and discussed topics such as economic recovery and social stability. The CNDCA suggested regional economic coordinated development, while the CZGP focused on overseas Chinese affairs, advocating for maintaining connections and support for overseas Chinese. The atmosphere at the conference was solemn and orderly.\n\nMeanwhile, a spokesperson for the CCP stated at a press conference, "The principle of long-term coexistence, mutual supervision, sincere cooperation, and sharing weal and woe remains unchanged. The restoration of the multi-party cooperation mechanism is a significant step in national governance." This cooperation is expected to once again provide multi-faceted perspectives for decision-making.\n\nAdditionally, experts have noted that the proposals and supervisory roles of the Advisory Parties have already shown positive impacts in practice. Some observers view this change as a new signal of adjustment in China's political landscape."
 china.175.a: "United in Forging a New Chapter."
 china.176.t: "Snap Elections"
 china.176.d: "Amid the current complex international landscape, the government has announced a nationwide snap election. The election covers administrative regions at and above the county level, including pilot elections at township and grassroots levels.\n\nThe election employs a differential voting system, with candidates from diverse backgrounds. Beyond CCP members, candidates include representatives from advisory parties, independent candidates, returning entrepreneurs, and renowned scholars. Voters can participate through electronic voting systems or traditional paper ballots. The Central Election Leadership Group emphasized ensuring transparent and open electoral procedures.\n\nNotably, this election introduces an independent vote-monitoring system for the first time, with representatives from advisory parties comprehensively supervising the process to guarantee fairness and justice. Throughout the election, the advisory parties demonstrated unprecedented activism. Observers suggest this might fundamentally transform China's political ecosystem."
 china.176.a: "Winds of Change?.."
 china.177.t: "RC-KMT Comes Second"
 china.177.d: "The Central Election Leadership Group has recently announced the latest seat allocation results, with the RC-KMT emerging as the second-largest political party after the Communist Party of China. The RC-KMT now holds over 15% of seats in the National People's Congress, marking a nearly 10 percentage point increase from the previous term. Meanwhile, other advisory parties have also seen varying degrees of increased representation.\n\nAt a press conference, the RC-KMT leader stated they will continue to uphold the principle of "long-term coexistence and mutual supervision" while fulfilling their role in political participation and consultation. Political analysts suggest that the RC-KMT's rise reflects changes in China's political ecosystem and demonstrates the ruling party's support for diversified political participation."
 china.177.a: "That's my Kuomintang!"
 china.178.t: "CDL Comes Second"
 china.178.d: "The Central Election Leadership Group's latest data reveals the CDL has successfully emerged as China's second-largest party, securing 12% of seats in the National People's Congress - a significant mark of the organization's growing influence. The CDL's membership has become increasingly diverse, now comprising scholars, educators, and professional technical personnel from across the country.\n\nAt a press conference, the CDL leader emphasized the party's continued role as a think tank, actively participating in national policy formulation and supervision. He stressed the CDL's commitment to promoting social harmony, economic development, and reforms in education and technological sectors. Political observers note that the CDL's rise reflects the ongoing evolution of China's political ecosystem and demonstrates the ruling party's determination to advance political system reforms.\n\nThis transformation signals the entry of China's multi-party cooperation system into a new era."
 china.178.a: "Great day for China."
 china.179.t: "Wang Yang Visits Guandong"
 china.179.d: "Guandong...\n\nThe region that kickstarted the carreer of multiple young politicians, where they have shown themselves off as skillful managers and talented politicians. Wang Yang was among them. From 2007 to 2012 he was the Secretary of the regional Communist Party. He carried Guandong through the most difficult times of the 2008 financial crisis, he was there for its' brightest moments of an economic and financial boom.\n\nWang Yang was looking at Guangzhou - the city-workshop of the world that provided billions of people on the planet with necessary and affordable consumer goods. Here he could clearly see that Guandong became the stronghold of his reforms. Here, the people were the most dedicated to the ideas of liberalization and democratization, revitalization through getting rid of the worst elements of the Chinese state, while taking the best from other countries. Perhaps with more people like this China could achieve the prosperity it always dreamed of?"
 china.179.a: "We're just a few steps away."
 china.180.t: "The Unsolved Problem"
 china.180.d: "Ever since the departure of Xi Jinping, Wang Yang has been working day and night to heal national wounds, to restore the country's strength and image and to bring back the people's faith and pride in the country. And yet, now matter how many reforms were pushed through, no matter how many corrupt officials were gotten rid of, there was still one unresolved problem that stood like a knife in the heart of every citizen.\n\nThat problem lied across the Taiwan Strait.\n\nIt was never openly talked about by Wang Yang or any other of his allied politicians, but everyone knew: with all the talks about reform, openness and worldwide cooperation, one day the Chinese marines would have to reassemble in Fujian and try again. Not because we want war, but because China can't stay divided.\n\nTonight in Fuzhou Wang Yang was thinking over this again and again, reminiscing what had already been achieved and evaluating every option he had. One thought was clear in his mind, however: the time for action would come soon."
 china.180.a: "We will do what we must do."
 china.181.t: "NAVAL EXERCISES REPORT"
 china.181.d: "FROM: Admiral Li Yujie\nDATE:[GetDateText]\n\nComrade Wang,\nAs per your orders, our naval forces left their disclocation sites and started moving towards the naval sector between Japan and Taiwan to conduct patrolling and life fire exercises in about two weeks from now. The maneuvers have already been a success in the sense that we seem to have caught them by surprise. The PDTO has only now detected our movements and started panically scrambling a response force."
 china.181.a: "Let's show them their place."
 china.182.t: "KOREAN SITUATION REPORT"
 china.182.d: "FROM: Commander of the People's Liberation Army Ground Force Li Qiaoming\nDATE:[GetDateText]\n\nComrade Wang,\n Our colleagues in the Korean People's Army have warned us that they detected PDTO covertly delivering military supplies to South Korea and military activity near the Demilitarized Zone has notably grown. DPRK has mobilized its' troops as a response, the Chinese-Korean border is also being reinforced on our side."
 china.182.a: "Watch them closely..."
 china.183.t: "STATUS REPORT"
 china.183.d: "FROM: Vice Chairman of the Central Military Commission Zhang Youxia\nDATE:[GetDateText]\n\nComrade Wang,\nLess than an hour ago naval forces of the PDTO attacked our ships in the vicinity of Okinawa, leaving us no choice but to return fire. While a naval battle is unfolding in the East China Sea, we have also received reports of South Korean troops trying to take control of the DMZ. It is certain to say that PDTO is unfolding a full-scale military operation against the People's Republic of China and our allies."
 china.183.a: "Retaliate with full force immediately!"
 china.184.t: "What Now?"
 china.184.d: ""
 china.184.a: "The dust can finally settle."
 china.184.b: "The dust can finally settle?"
 china.185.t: "Advisory Parties Demand Elections"
 china.185.d: "At the recent extraordinary convention of the National People's Congress, the leaders of the smaller parties first approached Wang Yang, and then made a joint statement on the current situation in China. Although the standpoints of the parties often differed quite radically, this time they put them aside to say one phrase to the Communist Party and to the people:\n"Wang Yang's flower of reformation has bloomed. The People's Republic of China needs a new round of national multi-party elections."\n\nThis statement caused as much enthusiasm as it caused shock. Although the Chinese society was now one of openness, equity and liberty, many still saw this move as an ultimatum to Wang Yang. However, Wang Yang knew that the country would come to this moment eventually and didn't lose his head. When the party asked him for directions, he answered..."
 china.185.a: "Democracy was our promise."
 china.185.b: "Get these idiots out of my face!"
 china.186.t: "Elections!"
 china.186.d: "After a long period of discussions in the media and debates in the National People's Congress, the date of elections was finally announced. When the day came, hundreds of millions of voters came into motion to cast their ballot in the name of China's future.\n\nThe political sphere of China has seen lots of turbulence in recent years. However, there could be only one winner, one that would finally receive the people's full trust in leading the country.\nThat's why to no one's surprise..."
 china.186.a: "CPC secures an easy victory as always!"
 china.186.b: "Left Kuomintang overpowers the CPC!"
 china.186.c: "China Democratic League secures the majority!"
 china.187.t: "The End of Wang Yang"
 china.187.d: ""He completely failed the Party, and hence, failed the people of China..."\n"He acted like an erratic psychopath who thought he had the ability to..."\n"For his utter incompetence and failure..."\n\nWang Yang was present at the emergency congress of the CPC, yet almost every word was going past him. His blank stare was directed towards one of the places where the wall collided with the ceiling.\n\n"What could've gone wrong? After all that was said and done, the people of China still didn't choose the Communist Party. And yet, if you look from a different side... they now had the courage to do so. But then... have we actually failed our goals? Then why am I being reprimanded?"\n\nUnfortunately, no one could read his thoughts. The fact of the matter was that the Communist Party of China would lose power in the country for the first time in decades, and with the loss of power comes the loss of the tools and resources that so many respectable people needed and joined the party for.\n\nFinally, the decision of the congress was voiced by the speaker:\n\n"...to exclude citizen Wang from the Politburo.""
 china.187.a: "The party is in reliable hands now."
 china.187.b: "The party is in better hands now."
 china.188.t: "RC-KMT Inaugurated"
 china.188.d: "The doors have opened and the delegation of the Revolutionary Committee of Kuomintang faced the sun. Hundreds of reporters surrounded the building of the Congress and an unimaginable crowd could be seen in the distance. Not protesting, not crying or complaining, but cheering to the new head of the country.\n\nZheng Jianbang approached the cameras and started answering the questions.\nReiterating the points of his party's program.\nGiving new promises.\n\nTruly, the whole country watched and roared. The Communist Party of China has not been the only power in China for a while now, but starting today it's no longer the dominant one.\n\nAlthough it's hard to say without irony that Kuomintang was once the ruling power already, so who knows? Maybe the CPC will also make a comeback. For now, however, the old 'dynasty' ends and the new one takes reign."
 china.188.a: "Things come to a circle."
 china.189.t: "CDL Inaugurated"
 china.189.d: "The doors have opened and the delegation of the China Democratic League faced the sun. Hundreds of reporters surrounded the building of the Congress and an unimaginable crowd could be seen in the distance. Not protesting, not crying or complaining, but cheering to the new head of the country.\n\nDing Zhongli approached the cameras and started answering the questions.\nReiterating the points of his party's program.\nGiving new promises.\n\nTruly, the whole country watched and roared. The Communist Party of China has not been the only power in China for a while now, but starting today it's no longer the dominant one.\n\nAnd as the sun was rising, the decisions of Wang Yang were starting to reflect upon Chinese land. Maybe one day the CPC will make a comeback. For now, however, the old 'dynasty' ends and the new one takes reign."
 china.189.a: "China expects something new."
 china.190.t: "The End of the Spring"
 china.190.d: "After a short period of discussions in the media and debates in the National People's Congress, the case of the ultimatum from the small parties was closed. The word "elections" disappeared from state media and dozens of demonstrations in China's biggest cities were met with boiling water, smoke and flashbangs.\n\nIn the end, all the talks of democracy, social lifts and freedom were just a cover up for the oligarchy that has emerged right after Wang Yang came to power. Tens of thousands of their appointees, collaborationists and simply corrupt officials were now working towards the cementment of China's current position.\n\nNow that the corporations found a suitable spot where they had the most comfort, they would never let a chance of the CPC or Wang Yang ever going even be as they were becoming nothing but cardboard cut outs for their programs of taking control over the rest of China, now that the economy and the finances were in their hands.\n\nThe people of China still enjoyed a lot more freedoms and opportunities than before - only until they've gotten to a certain level, that is. Will Wang Yang be remembered as a liberator or will he be cursed by history for his indecisiveness in finishing the job?\n\nPerhaps only time will tell."
 china.190.a: "To all the questions there will be no answer."
 china.191.t: "Brand New Session of the CPC"
 china.191.d: "As Wang Yang was adjusting his shining tie, his mind also shined with optimistic thoughts. After so long, the reformation of the party was complete. It has become a compilation of all sorts of ideas expressed by the people of China. Not once in history has China seen so many flowers bloom at the same time.\n\nAfter some preparation, Wang Yang finally walked into the hall of the congress, accompanied by thunderous applause from thousands of delegates. Today every platform would address the congress with their program and the vote would decide which one will direct the People's Republic in the coming years.\n\nNow that few fateful days concluded, Wang Yang was ready to announce the outcome of it:"
 china.191.a: "Let's not fix what already works."
 china.191.b: "Social Platform Leftists take over."
 china.191.c: "The Right Wing of the Social Platform takes control."
 china.191.e: "The Enterpreneurial Platform looks the best."
 china.191.f: "The Reformist Wing is victorious."
 china.192.t: "Spring Breeze"
 china.192.d: "After the rain, a slight chill still lingered in the air of Shanghai, but the bustling scene along the Huangpu River was as vibrant as ever. Wang Yang stood atop the towering Shanghai Tower, looking down at the endless streams of traffic and the rows of high-rise buildings that symbolized the city's vitality. After decades in politics, he had weathered countless storms and witnessed endless tides of change, yet at this moment, he felt an unprecedented sense of ease.\n\nCompared to the past, the domestic atmosphere was becoming increasingly open. On online platforms, young people freely voiced their opinions; in street corners and alleyways, ordinary citizens discussed current affairs and politics without the fear that such conversations might bring unwanted attention from the authorities. Even within the system, transparency seemed to be on the rise. It was said that some officials had begun to engage with the public in a more open and transparent manner. In some regions, local governments were even exploring deeper democratic decision-making mechanisms. Now, power was no longer the toy of a few but operated under the sunlight, subject to public scrutiny.\n\nFor Wang Yang, perhaps Chinese democracy was finally seeing its first spring."
 china.192.a: "Spring winds breathe life back to Jiangnan's shores."
 china.193.t: ""I Have A Dream""
 china.193.d: "Wang Yang set down the documents in his hand and rubbed his tired eyes. Outside, the chirping of birds contrasted with the distant hum of the city, as if they belonged to two separate worlds. He stood and walked to the window, gazing out at the ancient capital before him.\n\nOnce, despotism had been an invisible shackle, restraining the thoughts and actions of the people. But now, that old, decaying system had reached its end, like an elderly man at the twilight of life, unable to adapt to the new era. Yet, the conservatives in power clung desperately to the old order, resisting the wave of reform. They sought to stifle the momentum of change before it could take root. But in the end, the people chose freedom. Now, at last, they had the chance to fulfill their long-held dreams.\n\nHe turned back to his desk, his gaze falling on the pile of documents before him - plans for political reform. He knew that once this proposal was launched, it would cause a great stir. But Wang Yang also understood that the road to reform would never be smooth. To truly lead China toward democracy and the rule of law, this "tough bone" had to be tackled. He picked up his pen and solemnly signed his name on the document."
 china.193.a: "It's time to let the new bird in."
 china.194.t: "Religious Freedom"
 china.194.d: "Zaxi Ciren traveled all the way from his hometown in Shigatse, not only to complete his pilgrimage but also to witness the changes at Sera Monastery. Back in Pajong Village, he had heard rumors of subtle shifts in the government's religious policies. He was skeptical-after all, he grew up hearing stories from his elders about the hardships of old Tibet and had witnessed the significant changes in his hometown under the Party's leadership. Deep down, he still believed in the Party and the government.\n\nWalking up the stone path, he noticed something unusual when he reached the monastery gate-the slogans that used to be displayed in the greenery were gone. Could the rumors be true? He quickened his pace into the monastery. The monks still wore their crimson robes, the Buddha statues continued to gaze at the snow-capped mountains-everything seemed unchanged. But then he saw monks removing the slogan "Unite around the Communist Party of China" from the walls. Approaching an elderly monk basking in the sun, he respectfully greeted him and asked, "Old Aba, why are these slogans being taken down?"\n\nThe monk smiled. "You may not know this, but policies have changed. The Party says it now respects our beliefs more. The old mandatory policies are being adjusted to fit our needs, and we are free to express our views. I believe it won't be long before the Party stops restricting us altogether.""
 china.194.a: "The world is an illusion; blame not, harbor no anger."
 china.195.t: "Wang Yang's Tour"
 china.195.d: "No one knows exactly when China's Northwest came to be seen as a stronghold of conservatism. It's as if, on this land where loess and desert intertwine, the seeds of democracy could never take root, and the shifting sands would bury any hope for change. Yet, for Wang Yang, this inspection tour might just be the moment to assess the impact of his policies.\n\nIn Qinghai, he saw herders no longer remaining silent but courageously stepping forward to offer frank opinions on policy strengths and weaknesses. In Gansu, he witnessed farmers breaking free from past restraints and actively participating in local grassroots elections. In Xinjiang, he observed Muslims' religious rights being fully protected, with the shadows of the past swept away.\n\nThe loess remains heavy and cold, the desert still barren and desolate, but the hope buried deep beneath the sands will eventually bloom."
 china.195.a: "The sun will rise again."
 china.196.t: "Long Way Ahead"
 china.196.d: "It was late at night, yet the lights of Xihua Hall in Zhongnanhai still shone through the window lattice, casting shadows on the ancient crabapple tree in the courtyard. Wang Yang sat beneath the tree, holding an open copy of "The Old Regime and the Revolution", but his gaze wandered, unfocused on the pages. He had just finished a day's work, processing piles of documents, but the exhaustion in his body couldn't quell the surge of thoughts in his mind.\n\n"Freedom", this word had burned like a flame in his heart for most of his life. Now, he and his fellow reformists had finally broken the millennia-old cycle of authoritarian rule, planting the seeds of freedom in this land, scarred by the tides of history. The torch of democracy had been lit once more, blazing brightly in the hearts of every citizen. Yet Wang Yang knew this was only a brief victory; a long and arduous road lay ahead. They would have to overcome countless obstacles, cross mountains and seas, and shatter the chains of the old regime. Only then could the seeds of freedom truly take root in the hearts of the people and blossom in every corner of society.\n\nThe path forward remained treacherous, but history marches on. Every soul brave enough to challenge the old order was a shining star on this long journey. A China of democracy and freedom would one day break through its cocoon and rise, reborn from the flames."
 china.196.a: "The flower of freedom has bloomed."
 china.197.t: "Liberal Criticism"
 china.197.d: "Domestic Online Public Opinion and Social Analysis Report\n\nDate: DELETED\n\nRecently, liberal media outlets have openly criticized a series of government policies through their publications and self-media platforms. This report compiles the core content of these criticisms. For detailed analysis and further information, please refer to Appendix No. 106.\n\n"Behind the Party's narrative of 'equality' lies an inherent authoritarian paradox. It borrows the liberal concept of universal equality, yet in practice, establishes a highly authoritarian social structure. They define 'the people' as mere subjects of obedience, stripping them of the ability to participate in public affairs. Meanwhile, the Party centralizes the allocation of privileges and control of power in the hands of a few, thereby achieving monopolistic ownership of resources and political authority...\n\n"In the economic realm, the state's control over resources is ostensibly intended to prevent excessive concentration of capital and exploitation. However, in practice, it has stifled market-driven development under institutional constraints, turning the so-called 'economic lifeline' into a private domain for a select few to profit, thereby depriving private capital of the freedom to develop."\n\n"In the economic realm, the state's control over resources is ostensibly intended to prevent excessive concentration of capital and exploitation. However, in practice, it has stifled market-driven development under institutional constraints, turning the so-called 'economic lifeline' into a private domain for a select few to profit, thereby depriving private capital of the freedom to develop.""
 china.197.a: "Whatever."
 china.198.t: "Nationalist Criticism"
 china.198.d: "Public Opinion Analysis Bulletin\n\nRecently, several unofficial self-media platforms claiming to promote 'patriotism' have emerged online. Many of these outlets have published content directly criticizing current government policies. This report has comprehensively documented and archived related videos.\n\n"Our country is heading down a dangerous path-one that Wang Yang is leading us toward, a path of destruction! Yet too many people are blinded, unable to see that we are sliding into an abyss! Wang Yang's actions are eerily reminiscent of Gorbachev's-trying to turn our country into another Soviet Union, making the Chinese nation suffer the same fate of downfall and extinction!"\n\n"Let's open our eyes and see Wang's true face! He seeks to replace our Party's leadership with the decadent ideologies of the West; he allows anti-China Western forces to freely attack and slander our country and our nation! Every so-called 'reform' he implements is another stab at the heart of the Chinese nation!"\n\n"Wang 's reforms are nothing but 'Gorbachev-style' reforms through and through! He hands over state assets to private capital, enriching a small minority while pushing the people into poverty! He wants to destroy the foundations of the socialist economy and turn our country into a capitalist colony! Every one of his 'reforms' is a betrayal of socialism and a betrayal of our nation!""
 china.198.a: "We will "carefully" consider this."
 china.199.t: "Leftist Criticism"
 china.199.d: "Public Opinion Analysis Daily\n\nRecently, relevant departments have reported a surge in activity on domestic leftist forums, with most articles sharply criticizing government policies. These articles have been comprehensively documented and archived in this report. For detailed content, please refer to Document B-31a.\n\n"The greatest mistake of Wang Yang's revisionist group is the betrayal of the core principles of Mao Zedong Thought-class struggle. Chairman Mao once stated, 'The fundamental contradictions in a socialist society remain the contradictions between production relations and productive forces, and between the superstructure and the economic base'. Yet, Wang's group attempts to deny the existence of this fundamental contradiction, seeking to theoretically justify its capitalist agenda..."\n\n"In practice, the Wang's group has implemented a series of capitalist policies, bringing great disaster to China's socialist cause. They have allowed unchecked expansion of capital, weakening the state's control over the economic lifeline, and have pushed the masses back into the abyss of exploitation and oppression, while a handful of capitalists reap enormous economic benefits, becoming a new ruling class...""
 china.199.a: "OK."
 
 china.201.t: "Ripples of Disaster"
 china.201.d: "The catastrophic consequences of the Second American Civil War extend far beyond the grim reality of 300 million people taking up arms against one another. This collapse of the world's financial hub, once a safe haven for the elite and a birthplace of top-notch innovations for nearly half a century, has severely undermined the foundation of the global economic order. Among those hit hardest is China, the world's second-largest economy and the recognized "world's factory," as well as the largest holder of US debt.\n\nAs the first signs of America's disintegration appeared and panic began to spread, the massive outflow of population and wealth initially provided a momentary advantage to its competitors, particularly China and the European Union. China was confident that its carefully crafted "dual circulation" system would be resilient enough to withstand the shock. However, the collapse of the dollar led to a rapid devaluation of assets held by citizens, erasing the savings of countless families. The stock market, already sluggish since the Covid-19 pandemic, plunged further, breaching the critical 3000-point mark, with state intervention proving ineffective. The export industry, deprived of its largest market, languished in despair, while markets in Asia, Africa, and Europe also fell into recession, leaving no viable alternatives. Panic among foreign enterprises began to spread, and the sudden political tensions and social conflicts eroded their confidence in what was once hailed as "the most stable economy in the world."\n\nOnce again, the Chinese government and its people bitterly realized that the prosperity and benefits gained since their integration into a dollar-based global market 40 years ago came at a steep price."
 china.201.a: "So what can be done? Money can't buy back time."
 china.202.t: "Brewing a Disaster"
 china.202.d: "Six decades of legacy reduced to dust, and ten years of hard work vanished into thin air. For the 1.4 billion Chinese people, the future has never seemed as bleak as it does today. Yet, even in the depths of despair, this country has never failed to disappoint when faced with something even more hopeless.\n\nThe image of the defeated remnants of the PLA enduring utter humiliation on the Taiwan Island has left an indelible mark on the psyche of every Chinese citizen. This psychological blow has plunged society into a state of disillusionment and self-doubt. Furthermore, since the truce, there has been no sign of relief from the economic blockade against Beijing. The sanctions act like heavy chains, their inescapable grip causing China's economy to plummet from its position as the world's largest economy following America's collapse. The per capita GDP has regressed by over twenty years. The defeat in the Taiwan Strait further shattered an already stagnant economic cycle, rapidly depleting the nation's resources and wealth reserves.\n\nAt this point, the crisis facing the Chinese government and its people is no longer just about distribution conflicts or waves of unemployment caused by the collapse of a few enterprises. It is a full-scale paralysis and decline. As a result, the countdown to the regime's collapse has begun - a reality that everyone is painfully aware of."
 china.202.a: "Beyond redemption..."
 #CEN EVENTS
 china.203.t: "Military Spending Cuts"
 china.203.d: "After the successful resolution of the Taiwan conflict, we've faced fiscal challenges pertaining to our military expenditures.\n\nIn light of the strain the war has placed on our economy, we've determined that our current military budget is excessive for our current circumstances. To tackle this issue, we've implemented budgetary reductions, along with scaling back conscription in certain regions and disbanding redundant military brigades."
 china.203.a: "It's not like the PDTO is a threat anymore."
 china.204.t: "Minor Government Changes"
 china.204.d: "Following the victorious conclusion of the Taiwan conflict, we've encountered certain challenges stemming from our existing governmental framework.\n\nOur new geopolitical standing has highlighted the deficiencies within our current governance system. As a response, we have decided to initiate the long-delayed government restructuring plan to address these issues. The most notable changes are the retirement of former State Council Premier Li Keqiang and the Director of the Central Foreign Affairs Office, Yang Jiechi."
 china.204.a: "A little change never hurt anybody."
 china.205.t: "Victory Parade"
 china.205.d: "Red flags and placards are seen everywhere giving Beijing a festive atmosphere. To celebrate the great victory of the Taiwan war, it has been decided that a festival will be held in the capital. These days men in uniform have become the most popular people in the city.\n\nOn the day of the celebration, headed by a parade of war heroes carrying honored military banners, including the first Marine to land on the Taiwan Island and the soldier that put the national flag on top of the Taipei 101. Xi waved to the soldiers with smiles on his face, and the soldiers spontaneously cheered "Long live President Xi!" as they passed through Tiananmen Square.\n\nThe parade lasted from daytime until late at night. It was followed by an open-air ball and concert. A parade of civilians marched through the streets of Beijing. Billions of people around the world watched the simulcast, and many saw it as the end of an old era."
 china.205.a: "Long live the Chinese people!"
 china.206.t: "Taiwan Remains under Military Control"
 china.206.d: "Following our victory in the Taiwan War, we have successfully attained full control over Taiwan. However, achieving our operational goal has brought forth a host of challenges with the newly acquired territory. Issues such as local resistance, widespread corruption, and bureaucratic strains have necessitated our decision to institute military control over the island for the foreseeable future. \n\nWhile this move may not garner unanimous support within our government and among our citizens, it stands as the most prudent course of action currently. Our priority is to establish firm control and ensure stability on the island before undertaking the process of reintegrating it into our nation."
 china.206.a: "It is only temporary."
 china.207.t: "One Country, Two Systems"
 china.207.d: "Nearly 50 years ago, Deng Xiaoping, the supreme leader of China, came up with an innovative idea of "One Country, Two Systems" for Hong Kong after the reunification. Basically, while the socialist structure remained in mainland China, Hong Kong was allowed to continue with its market economy and capitalist lifestyle.\n\nWe had to admire Deng's decisiveness and creativity. This tiny island city has continued to create investment and jobs in China. At the same time, the system has also worked well for Macau, a former colonial territory recovered from Portugal after 1999.\n\nNow, with Taiwan finally return to China after 1949, we will assure those politicians and civilians who have stayed because of their faith in the CPC that "Taiwanese rule Taiwan" is still possible."
 china.207.a: "We sincerely wish the prosperity of Taiwan!"
 china.208.t: "The First Steps"
 china.208.d: "We've received encouraging news today. Recent polls conducted in Taiwan to gauge public satisfaction with the current government indicate a significant rise in support for our administration. Moreover, the Ministry of State Security has reported a decline in resistance efforts from Taiwanese rebels.\n\nThese developments underscore the success of our efforts in reintegration and stabilization. With continued positive developments like these, complete reintegration appears to be well within reach in the near future."
 china.208.a: "Our brethren will be united soon!"
 china.209.t: "Unification of Bureaucracy"
 china.209.d: "Our ongoing efforts to reform the government structure in Taiwan have achieved a significant milestone today. Recent reports indicate a successful unification of bureaucratic frameworks between mainland China and Taiwan. \n\nAdministrators on the island have confirmed that administrative bodies, hospitals, police forces, and other key sectors have undergone substantial reforms to align more closely with the bureaucratic structure of the mainland."
 china.209.a: "A step towards utopia."
 china.210.t: "The Chinese Century"
 china.210.d: ""Comrades, friends, compatriots!"\nXi was never supposed to be a good speaker. For the past decade, Xi's gaffes in every speech would always create a wave of vitriol on the Internet, and the new words that his secretaries would occasionally add to his boring speeches would often fail to impress the people, even if they were sometimes formalized as party slogans. But with today's speech, Xi was sure that no one would want to miss a word.\n"Today, we are holding military parade here to commemorate Taiwan's return to the motherland , and to honor this milestone on the history of the Chinese nation." Xi did his best not to make his voice too shrill due to nervousness. He noticed that the audience below the Tiananmen was almost silent.\n"Looking back at history, we, the Chinese, have gone through trials and tribulations, but we have never given up the dream of reunification and revitalization. with history rolling forward, no one can stop the historical tide of the great rejuvenation of the Chinese nation!" His voice became impassioned. With perfect timing, he raised his right fist high and pointed to the five-star red flag flying high on the Square. Xi was satisfied to see that the cheers and applause had boiled over. "Today, we stand at a new historical starting point, shouldering the historical mission of realizing the great Chinese dream! This is the inevitability of history, the victory of the people and the great victory of the Chinese nation!""
 china.210.a: "A speech that will live in history."
 china.211.t: "Chinese Patriotism of the New Era"
 china.211.d: "We have successfully completed the task of unifying Taiwan, but the international situation is becoming increasingly severe. We also face greater domestic challenges, making it essential to more effectively unite the Chinese people across different classes and regions. Ideological work in the new era cannot be addressed simply by issuing slogans or producing films. It requires reliable guidance and detailed plans from bureaucratic institutions. In this respect, no organization can perform better than the CPC.\n\nThe Central Guidance Commission on Building Spiritual Civilization, the Central Propaganda Department, and the Central Policy Research Office have each submitted different plans for the Standing Committee of the Political Bureau to consider. The more orthodox approach is to continue developing Chinese socialist theory, promoting the Chinese version of "universal values" based on the 24-character core socialist values, and reinforcing our position as a socialist counter to Western capitalism. Alternatively, a more radical approach suggests that, given the increasingly strained relations between China and the Asian neoliberal camp led by Japan, the unity of the Chinese nation is under threat. This approach advocates emphasizing the nationalist slogan of "defending the Chinese nation", while also intensifying propaganda about our country's strength and prosperity to inspire national pride and enthusiasm among the people."
 china.211.a: "We have to stick to Marxism-Leninism."
 china.211.b: "Nationalism unites the vast majority of people."
 china.212.t: "Approaching National Revival"
 china.212.d: "The Politburo has confirmed and implemented the new ideological work guidelines.\n\nThe Party's propaganda has increasingly embraced nationalism. Propaganda portrays present-day China as comparable to the prosperity and strength of ancient Chinese empires, particularly the Han and Tang dynasties, referring to it as a new "golden age" in Chinese history. The term "national unity" is also mentioned more frequently. The fifty-six ethnic groups are all acknowledged as part of the "long history of the Chinese nation", contributing to a "rich cultural heritage." However, despite the slogans of equality, the news media and cultural circles have focused more on the Han ethnic group. The Han people's historical wars of conquest over other ethnic groups are openly seen as part of China's martial tradition.\n\nAdditionally, a threat theory targeting imaginary overseas enemies has been constructed. The First Sino-Japanese War, the War of Resistance Against Japan, and the Korean War are extensively portrayed as crucial elements of modern China's revolution. Historical foreign wars, such as the Imjin War during the Ming Dynasty, are also seen as precursors to the Cold War in the Western Pacific, emphasizing the persistent intent of enemies to destroy China. The separation and antagonism between China and foreign countries are becoming more apparent. However, propaganda consistently portrays China, whether in the distant past or near future, as the ultimate and sole victor."
 china.212.a: "The Ambition of a Great Nation."
 china.213.t: "A Modern Ideological Revolution"
 china.213.d: "The Politburo has confirmed and implemented the new ideological work guidelines. \n\nThe Party's propaganda apparatus has become more closely aligned with Marxist principles. Current propaganda in the People's Republic of China often compares its achievements to the future communist society envisioned by Marx, Engels, and other thinkers, as well as to the peak of the Soviet Union, and refers to this period as a new "milestone" in communist development. The term "continuous self-revolution" is also frequently used. Xi has personally emphasized this, declaring that the Communist Party of China will continue to lead China as the vanguard of revolution and development. The 24-character core socialist values are now referred to as the "shared values of the community with a shared future for mankind."\n\nAdditionally, a narrative of threats from hypothetical foreign enemies has been constructed. Events such as Allied intervention in Soviet Russia after World War I, the Soviet-German War during World War II, Japanese crackdowns on the Eighth Route Army guerrillas, and U.S. "color revolutions" against the Eastern Bloc during the Cold War are all viewed as precursors to a Cold War in the Western Pacific, highlighting the persistent imperialist ambition to destroy China.The separation and antagonism between China and foreign countries are becoming more apparent. However, propaganda consistently portrays China, whether in the distant past or near future, as the ultimate and sole victor."
 china.213.a: "Socialist Revolution in the 21st Century."
 china.214.t: "The Great Revival"
 china.214.d: "The great rejuvenation of the Chinese nation has reached an exhilarating peak, with the Party's vision for a resurgent China advancing with unstoppable force. Decades of bold leadership by the CPC have propelled China from the dawn of economic reform in the 1970s to the forefront of global innovation. We now stand on the threshold of a new era, where China's meteoric rise as a dominant economic and political power is reshaping the world order. Historians will soon recognize this moment as a definitive break from the past.\n\nAs we advance with unwavering determination, the Chinese people follow a path illuminated by the Party's visionary leadership. From triumphing over extreme poverty to establishing a comprehensive social welfare system and launching the ambitious Belt and Road Initiative, each monumental achievement reflects the indomitable spirit of our people. The Party's guidance remains a radiant beacon, driving our progress to new heights and ensuring that our journey of transformation accelerates with relentless energy and vigor.\n\nIn this thrilling age, as China's current achievements set a new standard for future triumphs, our nation strides confidently toward a brilliant future, embracing the promise of a resplendent tomorrow with fervent resolve and unyielding commitment."
 china.214.a: "Glory to the Party and the people!"
 china.215.t: "21st National Congress of the CPC"
 china.215.d: "The 21st National Congress of the Communist Party of China has come to an end. Since the previous congress, the country has achieved great achievements: superpower status has been consolidated, Taiwan has been brought back under control, and in the process the imperialistic enemies have been defeated. Against the world chaos in the form of wars in America and Europe, China remains an island of stability and prosperity.\n\nDespite his respectable age, Xi Jinping was elected general secretary for the 4th time. In his speech, he said that will continue his course of previous years to strengthen stability in an constantly changing world, and that the coming years will be critical in the destiny of all of China.\n\n...\n\nSome time has passed since the congress ended.\n\nXi and several high-ranking generals and officials were in the audience.  There was a heated discussion about something important. Something that would start a chain of events that would change the world forever.\n\nFinally, a map of the Korean peninsula appeared on the big screen."
 china.215.a: "Great things are coming."
 china.216.t: "PDTO Activity in East China Sea Increasing"
 china.216.d: "Recently, we have noticed a suspicious increase in activity of PDTO forces in the East China Sea. Enemy reconnaissance drones have been circling the region around the clock, and their ships and planes have begun to cross our sea and air borders quite frequently. In our attempts to counter this, our opponents simply hide, not intending to engage. And although activity continues to increase, it has not yet come to a direct military confrontation.\n\nGiven our active preparations for Operation, this raises serious concerns that some of our plans are known to the PDTO member states. For now, we have no choice but to try to deter incursions into our maritime and air borders and monitor the situation as it develops."
 china.216.a: "It's worrisome... But keep preparing for our operation."
 china.217.t: "Cyber Attack"
 china.217.d: "In the morning, another Wing Loong flew out to sea on a border protection mission: a small Japanese ship crossed our sea border. It had become a routine, the procedure always followed the same scenario. An enemy ship crossed the border, our radar detected it, a drone flew out to observe it, and pretty quickly the enemy ship left our waters, often the drones didn't even manage to spot them. But now something went wrong as usual.\n\nThe signal from the drone was instantly lost. It was not shot down or suppressed by Electronic warfare, our radars still recorded the continuation of its flight. a few minutes later, other communication systems with the drones began to fail one by one.\n\nIn a few hours, access to military databases was already lost, our best military IT specialists were trying to salvage anything. Things were very bad: everything stopped working altogether. Such a powerful cyberattack on military infrastructure had never happened before in the entire world.\n\nOne thing was clear. Something terrible is about to happen. Something we didn't plan for."
 china.217.a: "Why now?! Save at least something!"
 china.218.t: "Naval Engagement and Rocket Barrage"
 china.218.d: "Only after recovering some of the infrastructure damaged by the cyberattack did we encounter something frightening. The newly activated radars showed tens of PDTO ships that had crossed our sea border and were moving in the direction of Fuzhou.\n\nThe PLAN forces moved out to meet the enemy flotilla, preparing to give battle.  It was clear that this time the Pacific Alliance forces were serious and a battle could not be avoided. At the same time, in many coastal cities numerous explosions were heard: air defense was working, fighting off enemy missile attacks targeting our military bases.\n\nAlthough the direct military confrontation is just beginning, one thing is clear: the big war has begun, and even though we wanted to start it ourselves, we did not."
 china.218.a: "Well, here we go!"
 china.219.t: "North Korea Ready to Join the EADI"
 china.219.d: ""
 china.219.a: "Excellent!"
 china.220.t: "Kim Jong Un Safely Crosses into China"
 china.220.d: ""
 china.220.a: "Excellent"
 china.221.t: "Kim Jong Un Captured by South Korean Forces"
 china.221.d: ""
 china.221.a: "Fool!"
 china.222.t: "Restoration of Cadres Rotation"
 china.222.d: "The new plenary session of the Central Committee of the CPC was recently held in Beijing. The top echelons of the party were present, and Xi, entrusted by the Politburo, delivered a report to the session. In addition to the official communique, the plenary session also brought about long-awaited personnel changes. At the highest level of the party's power structure, several younger cadres were added as members of the Politburo and the Central Secretariat. At lower levels, there was a more extensive rotation among provincial party secretaries and heads of State Council ministries and commissions.\n\nThe newly released resumes of the cadres reflect a degree of diversity. Among them are party secretaries promoted from grassroots organizations, management experts from large state-owned enterprises, leaders from higher education institutions and research organizations, and even military personnel who distinguished themselves in the Taiwan War. According to CCTV News, this reflects the "diversity in the party's talent selection path in the new era." Additionally, the official media highlighted the rotation of senior members in a uniquely Chinese manner. At routine commendation meetings, many senior cadres who had disappeared from the public eye for some time reappeared and received greetings from the Central Committee as "senior comrades." This suggests that the CPC has begun to shift its centralized model, focusing on cultivating and selecting a new generation of core forces for the party."
 china.222.a: "New bottles need to be filled with new wine."
 china.223.t: "Golden Snub-Nose Monkey Critically Endangered"
 china.223.d: "Researcher: Dr. Li Jiacan\n\nA male golden snub-nosed monkey, laboratory ID RX-743, lived a brief three years in captivity. Three years ago, it was found frail and barely surviving at the edge of a polluted forest. This was the last time we observed the presence of golden snub-nosed monkeys in the wild.\n\nAutopsy Findings:\nThe body of RX-743 was severely emaciated, with fur that had dulled to a sickly yellow. Its eye sockets were sunken, and the inner eyelids showed an abnormal pallor, consistent with the severe anemia it suffered from in life.\n\nInternal Examination:\nThe lungs were filled with black mucus, the result of prolonged exposure to polluted air. The lung tissue was a pathological grey-black and lacked elasticity.\n\nThe heart was unusually small, with noticeably thinned ventricular walls, indicative of myocardial fibrosis, a common consequence of long-term exposure to high levels of pollutants.\n\nThe stomach was nearly empty, containing only a small amount of black, viscous liquid with a nauseating stench. The gastric mucosa showed extensive ulceration, and the intestinal walls were riddled with hemorrhagic spots, symptoms indicative of heavy metal poisoning.\n\nRX-743's body tested positive for extremely high concentrations of lead, mercury, cadmium, and other heavy metals. These toxins accumulated in its system over time, ultimately leading to its death. The source of this heavy metal contamination was industrial wastewater and vehicle emissions."
 china.223.a: "A creature abandoned by the world."
 china.224.t: "Farmers Protest Over Environmental Damage"
 china.224.d: "Recently, our newspaper received complaints from the public about a chemical factory in Luoning County, Luoyang City, Henan Province, discharging wastewater and causing severe pollution to surrounding farmland. Villagers have repeatedly reported the issue to relevant departments without any resolution.\n\nAt the scene, the factory gates were tightly closed, and hundreds of emotionally agitated villagers gathered at the entrance. They explained that since the factory began operations, it has discharged pungent waste gas and wastewater. After irrigating their farmland, they harvested nothing, and there have even been instances of livestock deaths.\n\nThe villagers stated that they had complained multiple times to the local environmental protection department, but the problem remained unresolved. "Those cadres came, took a look, said nothing, and left." one villager said angrily.\n\n"Upon investigation, the factory indeed had some environmental issues, and we ordered it to rectify these within a deadline", the spokesperson from the Ecological Environment Bureau of Luoning County stated. However, he denied the villagers' claims of inaction, asserting, "Due to historical issues, it takes time to resolve them properly."\n\nDuring the investigation, the reporter found that the factory's facilities were rudimentary and did not meet environmental protection standards. Additionally, the environmental protection department had previously penalized the factory, but the penalties were limited..."
 china.224.a: "It seems there's no follow-up after all."
 china.225.t: "Chinese Alligator Extinct"
 china.225.d: "Sad news has emerged from the Anhui Yangtze Alligator National Nature Reserve: the last wild Yangtze alligator, known as "Xiao He", was declared dead early this morning, marking the complete extinction of this ancient species in the wild.\n\nThe Yangtze alligator is one of the smallest crocodilian species in the world and is unique to China. Once widely distributed in the middle and lower reaches of the Yangtze River, its population plummeted due to habitat loss, environmental pollution, and excessive hunting by humans. By the 1970s, the estimated number of wild Yangtze alligators had dropped to fewer than 100. Despite China's efforts to protect the species through conservation projects, including establishing reserves and breeding centers, the population saw only a gradual recovery. No natural reproduction has been observed in the wild for the past five years, even after the species was downgraded from critically endangered.\n\nThe death of the last wild Yangtze alligator signifies the loss of its genetic pool in the natural environment. Although scientists attempted artificial insemination to increase their numbers, all efforts ended in failure."
 china.225.a: "Another ancient species has vanished."
 china.226.t: "Myanmar Wishes to join the EADI"
 china.226.d: ""
 china.226.a: "Excellent"
 china.227.t: "The People's Republic of the New Era"
 china.227.d: "China proudly held a celebratory conference to announce the early completion of its Long-range Objectives for Economic and Social Development by the Year 2035. The event, attended by top officials and international delegates, including President Xi Jinping and the then-Secretary-General of the United Nations, highlighted China's remarkable progress. Despite facing severe sanctions following the Taiwan War and the impact of a new Cold War in East Asia on international trade, China achieved an average annual GDP growth of 5%, lifted over 800 million people out of poverty, and increased urbanization to over 70%, far surpassing expectations.\n\nIn his keynote address, President Xi underscored major achievements in infrastructure, such as the expansion of the high-speed rail network to over 60,000 kilometers and advancements in 5G technology, now covering 90% of the population. Additionally, innovations in renewable energy have made China the world's largest producer of solar and wind power, greatly contributing to its carbon neutrality goals.\n\nThis series of success sets the stage for China's next phase of development. With ambitions to lead the world in artificial intelligence, aerospace, and green energy, the country is on track to fulfill its vision of becoming a global leader by 2049, the 100th anniversary of the People's Republic."
 china.227.a: "Great dreams can only be realized through great effort."
 china.228.t: "The Next Stage"
 china.228.d: "With the relentless efforts of our People's Liberation Army, we have finally achieved victory in the military operations against Taiwan. This not only means resolving the long-lasting historical issues between the two sides of the Taiwan Straits, but also marks the beginning of industrial integration between the two. Since the late Qing Dynasty's Self-Strengthening Movement, generation and generation of Chinese industrialists have been striving for China's industrial strength to stand strong among the world's leading nations.\n\nSince 1949, we  building a complete industrial chain. We have progressed from a time when we couldn't even produce a single car to now not only meeting domestic demand but also filling containers vessels with Chinese-made products across the globe, especially in those Western countries that once seemed out of reach. All these achievements prove that it is the right path of socialism with Chinese characteristics, with the CPC at its core, is correct.\n\nChina is no longer the "Sick Man of East Asia" it once was. We can proudly declare: "Made in China" is our pride, and the products made in China will be the most competitive merchandise in the world! Long live the indomitable Chinese nation!"
 china.228.a: "New talents emerge with each generation."
 china.229.t: "New Economic Structure"
 china.229.d: "Under our governance,we have successfully reduced our overreliance on international markets in the past, shifting instead to depend on our vast consumer base and growing domestic demand. These positive factors have revitalized the domestic consumer market and provided strong momentum for our domestic economic growth.\n\nAlthough the outbreak of the American Civil War has negatively impacted our economy, the strengthening of domestic economic activity across various sectors is gradually offsetting these effects through growing domestic demand. This shift also indicates that our consumer market is becoming less dependent on external markets, showing a more independent and robust development.\n\nIt's expected that in the future, our country will gradually develop a new economic structure focused on the domestic consumer market while still taking international markets into account."
 china.229.a: "The economy is steadily moving forward."
 china.230.t: "His Day of Glory"
 china.230.d: "Admiral Dong Jun was waiting for the signal to walk onto the stage, as he waited he shuffled through his notes, reread the lines in his head, and tried to slow his heartbeat. Earlier this week he was met with astonishing news, apparently as the PRC's fleet approached the Taipai Strait it engaged in battle with the Taiwanese fleet, during which the Taiwanese pride of fleet was sunk.\n\nAfter he got the news he knew immediately that government officials would be coming to his office asking him to give a speech, and when they eventually came he immediately agreed. Now as his heartbeat started to slow and he reread his notes one last time he got the signal to begin walking towards the microphone. As he walked up the stairs every notable event in his career started to appear in his head. Everything had led up to this moment and he needed to show just how proud he was. Not just for him, but for the nation as well.\n\nAnd as he took the final steps toward the microphone. He began his speech."
 china.230.a: ""Today is a great victory for the PRC!""
 china.231.t: "Dissatisfaction with Immigrants"
 china.231.d: "Since the influx of third-world immigrants into China, with the tacit approval of the Chinese government, and the formation of immigrant enclaves (most notably the growing African community in Guangzhou), conflicts between immigrant groups and local residents have been frequent. The cultural and lifestyle differences have severely impacted relations between both sides.\n\nAlthough minor conflicts persist, no major incidents have occurred so far. Moreover, due to the lack of clear directives from higher authorities, most grassroots officials have adopted a non-action approach to handle these complex issues. However, the developed public opinion network has caused a flood of information about immigrant groups to inundate the public, leading to widespread criticism of the government on social media.\n\nInternational observers believe that if the Chinese government cannot promptly address the increasingly strained relations between local residents and immigrants, it is likely that rising nationalism will cause significant damage to the Party's prestige."
 china.231.a: "It's time for the law to speak."
 china.232.t: "New Immigrant Law"
 china.232.d: "Despite ongoing public debate, the Chinese government has maintained a cautious stance, offering few official statements, much like its approach to similar issues. However, they soon took practical steps, leading to new developments in the situation.\n\nFaced with mounting dissatisfaction from the Chinese populace regarding the growing number of immigrants and their perceived impact on society, the government has enacted a stringent new immigration law. This policy overhaul introduces strict restrictions on migrant entry and residency, aimed at reducing the influx of foreign nationals and addressing the rising unease among local communities.\n\nThe new regulations are intended to tighten control over migrant populations, including more thorough background checks and limited work permits. This move by the government is seen as a direct response to public pressure and is expected to ease some of the discontent. However, it may also heighten tensions with international observers and could affect China's relations with friendly countries."
 china.232.a: "What a mess."
 china.233.t: "Chinese Invasion Of Myanmar"
 china.233.d: "In a stunning development following the victory of the People's Defence Forces in Myanmar's civil war, China has launched a military invasion of the Southeast Asian nation. Beijing has come forward to announce that the invasion comes after continuous raids and incursions into Chinese territory during and after the civil war. However, many geopolitical experts have agreed that the invasion was instead to safeguard China's strategic interests within the region.\nAfter citing the need to protect its borders and safeguard stability in the region, China's military forces crossed into Myanmar territory, advancing towards key strategic locations. The sudden invasion has sent shockwaves across the international community, raising fears of a wider regional conflict and humanitarian crisis."
 china.233.a: "Asia further descends into endless war."
 china.233.b: "It was a necessary decision!"
 china.234.t: "Countering Indian Aggression"
 china.234.d: "While the world's attention is focused on the Yellow Sea, the East China Sea, and the South China Sea, a sudden border conflict has brought China and India, the world's two most populous countries, to the brink of war.\n\nThe two countries have been building bridges and roads to seize strategic locations along the highland borderline. As a result, battles have often erupted, with soldiers using stones and sticks as weapons. The Indian troops often had numerical advantage in the standoff, but the PLA can now quickly deploy its elite troops from the rear to the forefront via the new highway network in Tibet, launching surprise attacks on the Indians at night. A large number of Indian soldiers have fallen off the mountain roads and died during the retreat, including their commanders. In contrast, the PLA suffered only single-digit casualties.\n\nIn the aftermath, diplomats accused each other of intending to unilaterally break the status quo, but both sides claimed to have defended their territory. The Indians have threatened to send more troops to the front line due to the losses they suffered, but the PLA has demonstrated its progress in mountain warfare and determination to protect the motherland. This may suggest a shift in the balance of power in the border dispute between the two countries."
 china.234.a: "We will steadfastly defend every inch of our motherland."
 china.235.t: "Bhutan's Response"
 china.235.d: "After a short wait, Bhutan has summoned our ambassador and decided not to join the East Asia Defence Initiative. Bhutan's refusal to accept our olive branch is an unexpected setback. As a small, albeit poor and backward state in the Himalayas, its privileged geographical location could have played an important role in our siege network against India. Such an outcome is quite unfortunate and disappointing, and rather embarrassing for our diplomats.\n\nIn Beijing, the nationalists and the militarists have begun to advocate military intervention against Bhutan to make them realize the power differential between the two countries and thus force them to change their minds. However, India has always regarded Bhutan as its traditional sphere of influence, and intervention in Bhutan's domestic affairs may lead to further deterioration of Sino-Indian relations."
 china.235.a: "How about going on a hiking trip?"
 china.236.t: "Blockade of Trade Routes"
 china.236.d: "Despite being prepared, the negative predictions made before the war have become a worrisome reality. Dozens of trade sanctions have virtually cut off our official imports of raw materials vital to our status as the " world factory", while some of our most powerful enterprises have been forced to suspend their overseas operations in the name of "assisting the war effort".\n\nWe may still be able to rely on our internal resources and relocate our businesses to other friendly countries. However, what makes the situation worse is that the PDTO fleet has blocked important lanes such as the Strait of Malacca, the Lombok Strait, the Makassar Strait, and the Miyako Strait. They have also used missiles to attack our merchant fleets in the South China Sea and the East China Sea. The geographical disadvantage has caused our maritime trade to plummet to its lowest point.\n\nAs the effects of the embargo deepen,  clear signs of material shortages and economic decline have appeared in the most prosperous eastern cities of our country. The people have begun to speak of the war with pessimism, and Germany's history of famine and domestic uprisings in World War I as a result of the British naval blockade have left officials extremely worried and troubled."
 china.236.a: "The people need to learn to endure when facing a great enemy."
 china.237.t: "Corporate Heads Protest against the War"
 china.237.d: "Dear General Secretary Xi Jinping: \n\nMy name is Liu Xingfu and I come from Ningbo. I joined the Communist Party of China in 1998. I have been running a garment processing factory since 2014, and the products were primarily sold overseas, generating profits that were once enough to enable my wife, my son, my daughter and me to live a prosperous life.\n\nWe had established good relationships with overseas distributors and our products could be found on the shelves in Vietnam, Singapore and Japan until the Taiwan War put the factory into bankruptcy. I shut down the equipment, disbanded the staff, and borrowed money from loan sharks. We had to sell our downtown apartment. Both of my children still needed to go to school, but I could barely afford the tuition. My wife is already planning to divorce me.\n\nMr. General Secretary, I would like to say that I have always thought that you could lead our country to greatness. But now, this war has caused countless people like me to live in misery. Is this the "great rejuvenation" you promised? I beg you to end this war and bring back peace!"
 china.237.a: "This letter has been filed with the Central Office and will never reach the General Secretary."
 china.238.t: "Partial Solution to the Problem"
 china.238.d: "The news from Moscow may bring relief to Beijing while disappointing Tokyo and Canberra. Since the outbreak of the Taiwan War, the naval blockade and economic sanctions have severely impacted China's economy, causing a crack in its domestic stability. Now, however, the Russians may change this.\n\nRussian and Chinese ministers have signed massive economic cooperation agreements, Key components include tariff concessions for Chinese goods exported to Russia, along with permission for China to utilize Russia's Siberian Railway, Central Asian Highway, and Arctic Route for multilateral trade. In return, China has been asked to purchase more Russian fuel at higher prices and to provide increased loans for Russian infrastructure projects, particularly airports and harbors in the Far East. The Russian Presidential Envoy to the Far Eastern Federal District told Chinese media that the agreements would "show more effectively that there is no limit to Russian-Chinese cooperation".\n\nWhile the opening of the Northern Route may marginally compensate for China's loss of foreign trade, Russia's support is significant in restoring confidence among many developing countries hesitant to continue trading with China. Additionally, Russia can effectively safeguard China's new trade routes, particularly since PDTO missiles are not currently targeted at Vladivostok and Petropavlovsk."
 china.238.a: "The bear hooks up with the dragon."
 china.239.t: "Trade Expansion with China" #event for sov
 china.239.d: ""
 china.239.a: "ok"
 china.240.t: "Spratly Question"
 china.240.d: "Ever since we began building drilling platforms in the South China Sea and engaging more frequently in resource development, the intensity of maritime confrontations with our neighbors, especially Vietnam, has increased. Not only are merchant ships often on the verge of colliding, but sailors from both sides frequently engage in chases in motorboats and speedboats. Additionally, naval warships are increasingly seen in the disputed waters.\n\nConsidering the absolute disparity in national power, many would think that we could get the Vietnamese to budge by force. However, our strength also provides us with the alternative advantage of being able to offer negotiations first and take the initiative. We will send a diplomatic note to Vietnam offering them two options: they can either accept the transfer of the Spratly Islands to China or share the rights to exploit and utilize the resources of the waters."
 china.240.a: "Let's see if the Vietnamese are smart enough."
 china.241.t: "Spratly Question" #event for vin
 china.241.d: ""
 china.241.a: "ok"
 china.242.t: "Vietnam Sells Spratly"
 china.242.d: "The Foreign Minister of Vietnam has secretly summoned our ambassador to give us a final response on the issue of the Spratly Islands. Vietnam has finally succumbed to reality and agreed to return the islands under Vietnamese control to us. Of course, the Vietnamese will not surrender their territory for nothing. They have set a high price for these islands and also asked for time to dismantle the military installations on the islands, while permitting Vietnam to participate in the subsequent resource development.\n\nIn Beijing, some senior officials have scoffed at the Vietnamese demands. However, given the current negotiation process, it may be wiser to reach an agreement with Vietnam as soon as possible. Compared to the abundant resources that can be gained from recovering the Spratlys and the national pride that can be inspired, the deal is undoubtedly cost-effective."
 china.242.a: "Time is of the essence, let's agree to this deal."
 china.243.t: "Vietnam Sells Spratly Resources"
 china.243.d: "The Foreign Minister of Vietnam has secretly summoned our ambassador to give us a final response on the issue of the Spratly Islands. The Vietnamese have said that they are willing to sell resources extracted from the Spratlys to China, but they will not give up their territory. Of course, the Vietnamese also added that they could sell energy to China at a low price and allow a certain degree of freedom in exploiting the resources, despite the fact that Vietnam is also deeply mired in the oil crisis.\n\nIn Beijing, some senior officials are enraged by the Vietnamese demands. However, given the current negotiation process, it may be wiser to reach an agreement with Vietnam as soon as possible. We can use the energy to effectively alleviate the domestic economic crisis, and a minor diplomatic setback will have little impact as long as it is kept secret from the public."
 china.243.a: "Agree to this deal, but it's not over."
 china.244.t: "Chinese Aid" #event for vin, lao, cam
 china.244.d: ""
 china.244.a: "ok"
 china.245.t: "PLA Terminates Communications"
 china.245.d: "In light of our rather catastrophic failure against the PDTO, the remnants of the People's Liberation Army had cut contact with the Central Government as we prepared to demobilise. While some wondered if these was simply to conserve supplies or due to Japanese sabotage, we have finally received our long awaited response. Simply put, our military is revolting against us.\n\nThrough a myriad of cryptic statements, members of the PLA high command have denounced our government as "incapable of standing up to the Japanese imperialists" and gave us the ultimatum of either permitting their coup or face an insurrection. Knowing the deathblow it would be to the legitimacy of both the Chinese nation and the Communist Party, we have refused their petty demands outright.\n\nWhile some members of the PLA remain loyal to the Central Government in Beijing, having our forces split along with the implications of another civil war have sent our nation into chaos, and already our administrations in Xinjiang and Tibet have noted a massive increase in insurgent activity. While we are doing our best to calm the situation, the sinking feeling that we are spiralling into another Warlord Era is beginning to spread across the battered Chinese nation."
 china.245.a: "Everything under heaven is in utter chaos; the situation is excellent."
 china.246.t: "Governors Take Power in Their Hands"
 china.246.d: "The military defeat has plunged the vast Chinese power structure into reorganization. Provincial officials view the central government's loss of credibility as a chance to stop bowing to Beijing and to govern according to their own vision.\n\nGuangxi took the lead, citing "ensuring local stability" as grounds for seizing control of all key infrastructure. Military districts and local troops were placed under provincial command - though their designations remain the same, they effectively serve as the local government's armed forces. In Yunnan, the local governor also cut communication with the central government and, with the help of loyal military and police units, took control of key mountain roads and dams, which are the main source of energy in the province. Gansu's reforms went even further. In this major northwestern hub with a strong military-industrial base, the administrative structure was reshaped. Lanzhou established a "Provincial Coordination Committee," composed of military, government, and industrial representatives, which took full charge of regional governance. While it still formally acknowledges central leadership, all major decisions are made by this committee directly, leaving Beijing with virtually no influence."
 china.246.a: "What are they doing???"
 china.247.t: "Total Collapse"
 china.247.d: "At 12:00 PM Beijing time, during the armistice conference held in Beijing, representatives of the defeated China signed the ceasefire treaty with PDTO member states under the witness of the international community.\n\nAccording to the treaty, China's military forces will undergo significant reductions, with all "weapons of mass destruction," including nuclear weapons, dismantled under international supervision. Japan's representative stated, "Considering the suffering China has inflicted on Asian countries, restrictions are imperative." Additionally, China's coastal waters will be managed by the PDTO Joint Fleet, and Chinese naval activities will be restricted to within 12 nautical miles of its baseline.\n\nThe conference reached its climax over the issue of ethnic groups in China's northwest regions. Several countries supported the people of East Turkestan and Tibet in pursuing self-determination under PDTO's guidance to break free from the oppression of the Chinese Communist Party. Furthermore, PDTO forces will establish permanent military bases in Dalian, Qingdao, Shanghai, and Xiamen, imposing a 99-year international trusteeship over these coastal cities.\n\nThe treaty's announcement sparked widespread unrest across China. Major demonstrations broke out in cities like Beijing, Shanghai, and Guangzhou, protesting the treaty's inequitable terms and condemning the government's incompetence. Previously banned civil movements and religious organizations began to resurface, adding to the chaos. Preliminary statistics indicate violent conflicts in several provincial capitals. Already scarred by the hardships of war, the Chinese people are now plunged into yet another humiliating era reminiscent of a century ago. Despite declaring a state of emergency, the central government struggles to maintain control, and with regional authorities asserting autonomy, China faces the looming threat of fragmentation once again."
 china.247.a: "Heaven cares not for human plight, A thousand rise and falls, a fleeting sight."
 china.248.t: "Tibet Declares Independence"
 china.248.d: "Unrest continues as the central government collapses entirely, leaving the Qinghai-Tibet Plateau in an unprecedented state of fragmentation. Crowds march through the streets of Lhasa, voicing diverse demands. Some still support the Communist Party; others call for a republic. Some demand complete liberation from India's influence. Yet they all share one belief: the old governing order has crumbled, and everything must be rebuilt.The problem is that it's not just ordinary citizens protesting. Local power factions, religious leaders, and remnants of the military are all seeking their own paths. In some areas, people have begun establishing autonomous governments, refusing to recognize any single authority.\n\nChamdo has been the focal point of military confrontation, initially sparked by a standoff between the regional military command and the Tibetan forces. Some military officers chose to act on their own, further complicating matters. Before long, the conflict spread beyond the cities. In remote mountain regions, local armed groups rose up; some monastery leaders openly endorsed separatism. The military command has lost effective control over parts of the region. A widespread secessionist sentiment is sweeping this land of snow, and apart from agreeing that the status quo is unsustainable, no one seems able to find common ground on anything else.\n\nThe southern plateau is far from calm. Although the Central Tibetan Administration - backed by India - holds Lhasa, its power base remains fragile. Local factions have seized the opportunity to rise: some have aligned with India, some with the military command, and others are determined to go their own way.\n\nIn this vast plateau, everyone fights for their own interests, yet no one truly cares about the future of this land. Chaos is spreading, order is collapsing, and it appears this is only the beginning."
 china.248.a: "Dedicating this mortal body, may we be reborn together in the Pure Land."
 china.249.t: "East Turkestan Declares Independence"
 china.249.d: "The rift in Xinjiang has become irreparable. East Turkestan declared its independence referendum passed with a contentious 51% vote, triggering an unprecedented political crisis. The autonomous regional government in Urumqi, formed by the Production and Construction Corps, issued a strongly worded statement, accusing the "Republic of East Turkestan" of "completely ignoring the basic political rights of millions of non-Uyghur residents" and labeling it "the main culprit undermining ethnic unity and stability in Xinjiang." Meanwhile, in southern Xinjiang, Hotan has become the provisional capital of the new regime. Blue flags bearing the crescent and star flutter on every street corner, loudspeakers blare slogans of "national liberation," and the militia, inflamed by a fervor for jihad, vow to "liberate all Uyghur brothers and sisters."\n\nScouts from both sides roam among the dunes. Oil pipelines have been severed, and roads are strewn with barricades. North and south are scrambling to stockpile munitions and conscript soldiers, preparing for the large-scale conflict on the horizon.\n\nTension along the border continues to build. The first gunshot seems only a breath away."
 china.249.a: "A lone frontier town stands in peril."
 china.250.t: "Former Premier Li Keqiang Passes Away"
 china.250.d.a: "Today, breaking news has shocked China: Li Keqiang, former member of the Standing Committee of the Politburo of the CPC and Premier of the State Council, who had just resigned from his position and was not yet 70 years old, has died of a sudden heart attack in Shanghai. This is extremely unbelievable for CPC leaders who generally have good medical care.\n\nIt is reported that Li Keqiang came to Shanghai for a temporary stay under a vacation plan arranged for him by the CPC Central Committee after his retirement. After Li fell into a coma, the Shanghai Municipal Committee of the CPC immediately organized a medical team to rescue him, but he was unable to recover. At present, in addition to the news of Li's death, Chinese officials have also posted commemorative articles mourning Li on social media sites.\n\nLi's "untimely death" has been widely lamented in China, with some praising his leadership in China's industrial upgrading and the "Belt and Road Initiative" during his premiership, as well as his success in keeping the economy afloat during the Taiwan War. In Li's home province of Anhui, a number of memorial services have been organized spontaneously. Li's body has been sealed and is expected to be airlifted back to Beijing in the near future."
 china.250.d.b: "Today, breaking news has shocked China: Li Keqiang, former member of the Standing Committee of the Politburo of the CPC and Premier of the State Council, who had just been removed from all his duties and was not yet 70 years old, has died of a sudden heart attack in Shanghai. This is extremely unbelievable for CPC leaders who generally have good medical care.\n\nIt is reported that Li Keqiang was put under house arrest in disguise when he was designated to live in Shanghai after he was removed from his position following the defeat in Taiwan. After Li fell into a coma, the Shanghai Municipal Committee of the CPC immediately organized a medical team to rescue him, but he was unable to recover. At present, there has been no further action by Chinese officials other than the announcement of Li's death.\n\nLi's sudden death has deepened the sense of disillusionment among the Chinese people in the depressed atmosphere after losing the Taiwan war. Various conspiracy theories have been put forward about Li's "untimely death", suggesting that the new CPC leadership secretly assassinated him due to concerns about his influence or that he was deliberately delayed in receiving medical attention. Local social security authorities have been instructed to closely monitor and control civil dissident groups that may take advantage of this opportunity to oppose the new government."
 china.250.a: "Rest in peace, dear comrade."
 china.250.b: "It might also be a stroke of luck for this comrade..."
 china.251.t: "Reformists Seize Power in China"
 china.251.d: "One after another, deep green-painted Type 99 main battle tanks roared down Chang'an Avenue. As the PLA withdrew from the capital city to their garrisons, the citizens of Beijing watched in fear but felt a sense of relief. However, a sudden political upheaval soon plunged everyone back into terror.\n\nWith Xi's ambitions collapsed, the CPC decided to entrust its future and that of 1.4 billion Chinese people to a new leader. Wang Yang, former Politburo Standing Committee member and Chairman of the Chinese People's Political Consultative Conference, has been appointed as the new General Secretary of the CPC. In the Great Hall of the People, broadcast by CCTV, Wang spoke eloquently under the flashing lights, pledging to implement true reforms for the new era, heal China's divisions, and restore the people's trust and confidence in the Party and the nation.\n\nWith the ever-changing political landscape, where will the People's Republic head with yet another change in leadership at Zhongnanhai? Can the Party's enlightened gentleman usher in a new dawn for ancient China? Only time will tell."
 china.251.a: "The Yangzi river has swept its way, eastward bound.\nIt leaves, in memory, men with victory crowned."
 china.252.t: "New Left Seize Power in China"
 china.252.d: "One after another, deep green-painted Type 99 main battle tanks roared down Chang'an Avenue. As the PLA withdrew from the capital city to their garrisons, the citizens of Beijing watched in fear but felt a sense of relief. However, a sudden political upheaval soon plunged everyone back into terror.\n\nWith Xi's ambitions collapsed, the CPC decided to entrust its future and that of 1.4 billion Chinese people to a new leader. Hu Chunhua, former Politburo member and vice premier of the State Council, has been appointed as the new general secretary of the CPC. In the Great Hall of the People, broadcast by CCTV, Hu spoke eloquently under the flashing lights, saying he would reintroduce the party as the vanguard of the people and the voice of the people, and restore the people's trust and confidence in the Party and the nation.\n\nWith the ever-changing political landscape, where will the People's Republic head with yet another change in leadership at Zhongnanhai? Can the Party's golden boy usher in a new dawn for ancient China? Only time will tell."
 china.252.a: "The Yangzi river has swept its way, eastward bound.\nIt leaves, in memory, men with victory crowned."
 china.253.t: "Revanchists Seize Power in China"
 china.253.d: "One after another, deep green-painted Type 99 main battle tanks roared down Chang'an Avenue. The citizens of Beijing watched in terror as more and more PLA troops moved into the urban areas of the capital. Soon after, a sudden political upheaval plunged everyone into even deeper fear.\nAfter Xi Jinping's grand ambitions came to an end, the Chinese Communist Party resolved to entrust the future of the Party and its 1.4 billion people to a new leadership core. In the Great Hall of the People, the event was broadcast live by CCTV. Surrounded by a group of spirited young military officers, the new leadership of the Party solemnly pledged: to cleanse national humiliation, to honor the fallen heroes, and to restore the people's faith and confidence in the Party and the nation.\n\nWith the ever-changing political landscape, where will the People's Republic head with yet another change in leadership at Zhongnanhai? Can the PLA's war hero usher in a new dawn for ancient China? Only time will tell."
 china.253.a: "The Yangzi river has swept its way, eastward bound.\nIt leaves, in memory, men with victory crowned."
 china.254.t: "GameScience's Patriotic "Myth""
 china.254.d: "China has the world's largest community of gamers and perhaps the most wealthy game maker: the Tencent Corporation. Yet for years, the Chinese have never made a world-famous AAA game. But today, all of that could change. GameScience, the little-known company, is developing an ARPG called "Black Myth: Wukong", based on China's most popular fantasy novel, the "Journey to the West". Its characteristic art design and enjoyable battle scenes have already become a topic among fans. We can also contribute to the development of this game, which has extraordinary potential, by relaxing the standards of the official censorship, which is known to be quite strict, as well as by assigning internet media affiliated to the Central Propaganda Department to participate in the promotion of the game."
 china.254.a: "Dreams should be encouraged, and we will help them achieve theirs."
 china.254.b: "There is no need to waste time on such trivialities."
 china.255.t: "The Game is a Total Failure"
 china.255.d: "After a long wait, GameScience finally released "Black Myth: Wukong"; however, it turned out to be a disappointment. In an attempt to minimize risk and respond to market needs, the developers referenced and even copied many elements from other ARPGs, resulting in a striking resemblance in the game's level design. Unsurprisingly, gamers quickly described the game as another made-in-China copycat. Additionally, the game's plot, which references "Journey to the West", was criticized by fans as an abrupt feature forced into the game to meet the needs of official propaganda. The game's failure has led to a significant number of staff within GameScience leaving their jobs out of frustration. Certain internet corporations are reportedly planning to buy this failed game company."
 china.255.a: "Hopefully, we'll succeed next time..."
 china.256.t: "The Game is a Great Success"
 china.256.d: "After receiving support from officials, the developers at GameScience approached their work with renewed enthusiasm. Moreover, as they began releasing trailers on YouTube and Twitter, more and more foreign players noticed the game. On release day, the game exceeded all expectations: not only was its playability highly praised, but the ancient Chinese cultural elements and "Journey to the West" fantasy themes incorporated by the developers also received significant attention from gamers. This has sparked a keen interest in the global gaming community to explore ancient Chinese lore, thus achieving the official goal of promoting traditional Chinese culture. Now, fans have proclaimed that "Black Myth: Wukong" will be the "Best Game of the Year.""
 china.256.a: ""Here comes the Monkey King!""
 china.257.t: "The "Genshin" Impact"
 china.257.d: "Recently, the anime-style ARPG "Genshin Impact", produced by Shanghai-based MiHoYo Company, has secured the top spot on the list of the most popular games in several countries around the world. The game has quickly taken off since its release, attracting the attention and love of countless players with its beautiful graphics, unique character designs, and open-world exploration features. On social media platforms such as Reddit, Twitter, and YouTube, players' heated discussions have created a global frenzy.\n\nThe sudden rise of "Genshin Impact" has made gamers around the world notice China's gaming industry for the first time. For a long time, China's game market has been dominated by local consumption, with few titles achieving such success in the international market. However, "Genshin Impact" broke this mold, and MiHoYo has become an instant success, proving the strength and potential of Chinese game developers."
 china.257.a: "A fantasy world within reach! Who wouldn't be fascinated?"
 china.258.t: "Current Problems of the PLA"
 china.258.d: "Joint Staff Department of the Central Military Commissionn\n\nTo: Central Military Commission and Political Bureau of CPC Central Committee\n\nTo ensure that our military remains at the forefront of future warfare and continues to advance triumphantly in the era of informatization, the People's Liberation Army  must urgently address the challenges and critical issues identified through lessons learned in recent conflicts. The key issues are as follows:\n\n1.Structural contradictions are concentrated at the senior levels, characterized by overgeneralized functions, bloated institutions, and an imbalance of resources.\n\n2.The organizational structure has significant shortcomings, particularly a lack of a comprehensive leadership framework for the Army.\n\n3.The Central Military Commission's joint operations command lacks critical elements and effective functionality. Additionally, the joint operations command system at the theater level remains undeveloped.\n\n4.Symptoms of "peacetime mentality" are evident, manifesting as arrogance and a lack of rigor in carrying out orders fully and precisely."
 china.258.a: "Adapt to win - transform to triumph"

 china.259.t: "Project GHOST"
 china.259.d: ""Comrade, are you saying you can make all our soldiers invisible?" The general closed the report in his hand, looking at the young researcher in front of him with slightly disbelieving eyes. The idea of making a person disappear from the naked eye's visual range was hard to believe, even for a general who had seen almost everything.\n\n"Yes, Chief! By using a design based on the properties of molybdenum trioxide, we can direct light into the core of an object in a specific direction. If the refractive index and impedance are matched correctly, it will appear as if the core doesn't exist, creating a visual invisibility effect. This is entirely feasible today!"\n\n"Okay, I'll take this up with the Chairman.""
 china.259.a: "Let's try it!"
 china.259.b: "Perhaps not..."
 china.260.t: "Project NIB"
 china.260.d: ""Comrade Chief, the Institute has recently proposed a new project called 'NIB'. It builds on the original QTS-11 rifle, aiming to significantly enhance its armor-piercing capabilities for modern mechanized combat. According to the report, the design includes a newly developed rifle grenade launcher and a miniaturized, gun-mounted guided missile. These upgrades will allow soldiers to maintain their tactical versatility while gaining the ability to engage lightly armored targets at long range."\n\n"In combat, the intelligent fire-control system will automatically adjust firing parameters, provide environmental data, and calculate bullet and grenade trajectories in real-time. When a guided missile is needed, the system will handle the calculations and programming, ensuring precision. Essentially, the gun functions like a stylus - just point, and it hits the mark!"\n\n"Excellent concept. Let's escalate it to the Chairman for a decision.""
 china.260.a: "Let's try it!"
 china.260.b: "Perhaps not..."
 china.261.t: "Project SWIMMER"
 china.261.d: ""Comrade Minister!" The engineers, dressed in white lab coats, eagerly presented the new blueprints to the invited Minister of Equipment Development. "Comrade, please look over here..." One of the engineers pointed to the diagram filled with intricate parts and data. "This is our new amphibious tank design, called 'Swimmer'." He adjusted his glasses as the minister nodded, signaling for him to continue. "This tank is equipped with a 105mm main gun, capable of penetrating its hypothetical adversary, the M1A2, head-on. We've also improved buoyancy by incorporating advanced foam materials. Over here, you can see the integrated information module, featuring our latest 'Beidou' navigation system, atmospheric sensors, and data transmission antennas. Overall, this tank is a significant upgrade from our current amphibious equipment."\n\n"Understood, comrade. I'll report this project to the Central Military Commission.""
 china.261.a: "Let's try it!"
 china.261.b: "Perhaps not..."
 china.262.t: "Project IMPULSE"
 china.262.d: ""Welcome, Chief!" The confident researcher greeted the senior officers as they stepped into the institute. "As you know, the railgun has been a closely guarded secret. We've tested it extensively, and now our team is ready to deploy it on the battleship. By utilizing the prolonged acceleration of the two electromagnetic rails, we can significantly increase the initial velocity and range of the projectile. This technology will make our naval cannons unmatched by any other similar weapons."\n\nThe researcher paused, then asked tentatively, "What does the center think?"\n\nThe general thought for a moment before replying, "I will report this to the Chairman for a decision.""
 china.262.a: "Let's try it!"
 china.262.b: "Perhaps not..."
 china.263.t: "Project DARK SWORD"
 china.263.d: ""A smart drone designed to resemble a medium-sized fighter jet? Interesting..." The leaders of the National Defense Science and Technology Bureau stroked their chins and fell into thought after reviewing the report from Yang Wei, chief designer of the J-20 project. In theory, the biggest difference between fifth- and sixth-generation fighter jets lies in their intelligence and connectivity through the Internet of Things. However, recklessly investing in the research, development, and production of an entirely new next-generation fighter carries significant risks.\n\nIf a drone could be used as a testbed to overcome some of the challenges for the next generation of fighter jets, it would greatly aid future R&D. Yet, even a drone project would require substantial financial investment, with inherent risks. Nonetheless, the potential rewards are enormous. After careful consideration, the leaders decided to..."
 china.263.a: "Let's try it!"
 china.263.b: "Perhaps not..."
 china.264.t: "Project FLASH"
 china.264.d: ""Chief, our plan is to design a high-energy laser rifle using current technology, surpassing the old anti-aircraft and blinding functions. This weapon will have the combat capability to kill and incapacitate enemy units with directed-energy lasers. Whether it's the particle beam weapons of the former Soviet Union or the laser weapons of the United States, their ambitions will finally be realized by us." As the researcher spoke, he showed the General a sample high-energy laser system. Although it was still bulky in size and power supply, the researcher's presentation and experience suggested that the future of this program was promising.\n\n"Impressive. I'll report this to Comrade Chairman for a decision.""
 china.264.a: "Let's try it!"
 china.264.b: "Perhaps not..."
 china.265.t: "Project NAMI"
 china.265.d: ""Comrade Chief, I believe nanobots can be used not only in field hospitals but also play unexpected roles in combat! These tiny soldiers, smaller than ants, can move undetected and be deployed to enemy strongholds, striking key military targets by surprise. In the future, they could reach any target - carrying out explosions, releasing chemicals, and more. The only resource they need is abundant solar energy! Just imagine the devastation they could inflict on our enemies, General - they wouldn't even know how we did it!"\n\n"Not a bad idea. Let's pass this on to the Chairman for a decision.""
 china.265.a: "Let's try it!"
 china.265.b: "Perhaps not..."
 china.266.t: "Project GHOST Report"
 china.266.d.1: "\nGHOST PROJECT OUTCOME REPORT:\n   PARTIAL SUCCESS.\n\nThe original intention of the GHOST project was to achieve stealth deployment and surprise attacks by equipping PLA soldiers with metamaterial visual cloaks that would render them completely invisible to their enemies. Unfortunately, such a requirement proved too ambitious for current high-tech development, particularly at the industrial level. The team leader overseeing the project shook his head and picked up a pen to write a final comment in large letters: "Difficult and costly to produce; not suitable for large-scale use. Can be used in small quantities to equip special forces and to improve existing concealment techniques.""
 china.266.d.2: "\nGHOST PROJECT OUTCOME REPORT:\n   FAIL.\n\nAccording to the World Health Organization's list, molybdenum trioxide is classified as a group 2B carcinogen. Prolonged exposure to and inhalation of its powder can seriously affect respiratory health, causing chronic lung disease. Direct contact may also lead to toxic reactions such as tingling and headaches. As one of the main raw materials selected for the project, its dangers became evident, and a spillage incident confirmed these risks. Although no lives were lost, the potential hazards on the unpredictable battlefield were too great. Consequently, we had to call off the project."
 china.266.a: "Well..."
 china.266.b: "Sad."
 china.267.t: "Project NIB Report"
 china.267.d.1: "\nNIB PROJECT OUTCOME REPORT:\n   SUCCESS.\n\nWith a sharp whistle, the rifle's micro-missile hit and destroyed the target vehicle from a distance of one thousand meters. The integrated fire-control system and rifle grenades have elevated man-portable firepower to a new level. Soldiers who tested the weapon were impressed by its performance and strongly expressed their desire for it to be standardized in the army as soon as possible.\n\nObservers at the test site celebrated the success of Project NIB, which marks a leap forward in individual combat capabilities. This system not only provides soldiers with an advanced fire-control mechanism but also allows them to strike targets precisely within a set range. Additionally, by integrating drone surveillance, soldiers can launch missiles from cover and still hit their targets. Most importantly, this advancement greatly increases the likelihood of soldiers surviving the harsh realities of modern warfare."
 china.267.d.2: "\nNIB PROJECT OUTCOME REPORT:\n   FAIL.\n\n"Target missed! Target missed!" the soldiers shouted as rifles suffered a significant setback. Efforts to miniaturize and intelligently guide the missile were ultimately unsuccessful, with limited space conflicting with the needs of both combat and guidance systems. Other components proved too costly, overloaded, or difficult to maintain, making the system impractical for battlefield use. Some soldiers even mockingly referred to it as "the institute's big toy."\n\nHowever, despite these failures, the project has yielded valuable experience and technological advancements. It is expected that, in the near future, these lessons will lead to the development of a more capable man-portable combat system, one that will eventually be issued to every soldier."
 china.267.a: "Great!"
 china.267.b: "Sad."
 china.268.t: "Project SWIMMER Report"
 china.268.d.1: "\nSWIMMER PROJECT OUTCOME REPORT:\n   SUCCESS.\n\nAt a secret testing facility somewhere in Guangdong, the Swimmer project had finally reached its critical moment for practical assessment. Scientists, engineers, and officers from the Equipment Development Department and Joint Staff Headquarters stood in breathless anticipation, their eyes fixed on the prototype tank, poised and ready. As the exercise officially commenced, the tank repeatedly opened fire on a mock enemy target modeled after the M1A2. Within moments, the target was engulfed in smoke, completely incapacitated. Then, the tank's engine roared to life as it maneuvered into the shallow waters, heading toward a nearby island. At that moment, everyone's heart seemed to leap into their throats.\n\nWhen the Swimmer smoothly reached the island and the driver signaled the successful completion of the exercise, the command center erupted in celebration. The hard work had finally paid off."
 china.268.d.2: "\nSWIMMER PROJECT OUTCOME REPORT:\n   FAIL.\n\nUnfortunately, the prototype of the new amphibious tank failed the field test. While its firepower demonstrated the capability to destroy enemy vehicles, the most crucial factor for an amphibious tank - buoyancy - was still inadequate. As it attempted to cross a relatively short waterway, the Swimmer sank rapidly. Although the crew escaped in time, the prototype and the costly equipment aboard were lost beyond recovery, despite the tremendous efforts of the development and testing teams. Hopefully, when the amphibious tank project is revisited in the future, the same mistakes will not be repeated."
 china.268.a: "Great!"
 china.268.b: "Sad."
 china.269.t: "Project IMPULSE Report"
 china.269.d.1: "\nIMPULSE PROJECT OUTCOME REPORT:\n   SUCCESS.\n\n"5, 4, 3, 2, 1, 0. Fire!" At the sea test site, everyone held their breath, staring at the test ship equipped with a new railgun and the target ship. After the launch command, there was no gunpowder, no fire, no loud boom - just a soft "bang." The shell then shot out of the chamber at very high speed, tracing a nearly straight line through the air before striking the target ship with immense force. The high-speed projectile pierced through the target ship and slowly descended into the water.\n\n"The target ship is sunk, the plan is a complete success!""
 china.269.d.2: "\nIMPULSE PROJECT OUTCOME REPORT:\n   FAIL.\n\nWith a popping sound, the shipboard railgun program could be officially declared a failure. During a disastrous continuous firing test, the overheated power supply exploded violently, causing inescapable and devastating damage to the entire test site and equipment, torching much of the critical machinery. Fortunately, there were no casualties as the personnel were stationed far away. However, if such an incident were to occur again, the repercussions would be severe. Given the seriousness of the damage, the safety concerns, and the difficulty of development, the future of the railgun has become even more uncertain."
 china.269.a: "Great!"
 china.269.b: "Sad."
 china.270.t: "Project DARK SWORD Report"
 china.270.d: "\nDARK SWORD PROJECT OUTCOME REPORT:\n   SUCCESS.\n\nOn a clear, sunny day, leaders from the Ministry of National Defense, the National Defense Science and Technology Bureau, and even the Central Military Commission gathered at Chengdu's Wenjiang Airport. Outside, a crowd of military enthusiasts and onlookers, who had caught wind of the event, packed tightly together. The authorities had deliberately leaked information beforehand, hinting at a historic moment akin to the J-20's maiden flight in 2011.\n\nAs the Dark Sword unmanned combat aircraft rolled out of the hangar, the audience erupted in cheers, and the leaders admired its sleek form. The aircraft accelerated down the runway and soared into the sky, its performance highlighted under the spotlight. It moved like an ancient Chinese assassin's dart, piercing the blue expanse. The Dark Sword executed a series of complex maneuvers, demonstrating its advanced avionics and intelligence systems. The leaders applauded, while the chief designer, Yang Wei, quietly wiped away tears of joy.\n\nUndoubtedly, the Dark Sword marks another milestone in Yang Wei's career, signaling the emergence of the first supersonic UAV in the world. It will navigate the clouds of the Tianshan Mountains, bathe in the moonlight over the South China Sea, and safeguard the prosperity of the homeland."
 china.270.a: "Great!"
 china.271.t: "Project FLASH Report"
 china.271.d: "\nFLASH PROJECT OUTCOME REPORT:\n   PARTIAL SUCCESS.\n\nLooking at the massive final product, the officers overseeing the project couldn't help but sigh. Despite the researchers' best efforts, they were unable to reduce the size and weight of the high-energy laser system to something a single soldier could carry. For the ever-changing battlefield, its mobility was clearly insufficient. Combined with other inefficiencies, such as its method of killing, large-scale deployment remains difficult. However, the R&D process and the project's results are still valuable, and as an auxiliary combat weapon, laser equipment can continue to play a significant role in other forms on the battlefield."
 china.271.a: "Well..."
 china.272.t: "Project NAMI Report"
 china.272.d: "\nNAMI PROJECT OUTCOME REPORT:\n   PARTIAL SUCCESS.\n\nAfter countless days and nights of hard work, the R&D team finally brought their nanobot project to the forefront of military history. In the 21st century, even something as small as an ant can shake a tree. Unfortunately, the final version of the nanobots did not meet all the high expectations set by the military. In terms of deployment, power, and production, their performance was still lacking. The hope of relying on nanobots to completely dismantle the enemy's command structure is no longer realistic. However, they can still serve as useful tools in military industry."
 china.272.a: "Well..."

 china.273.t: "The Xi Jinping Thought"
 china.273.d: "In 1978, the CPC abandoned Mao's line of class struggle as the guiding principle, and shifted to Deng's focus on economic development. In the twinkle of an eye, China's development has achieved miraculous accomplishments, but at the same time, its dark side has become increasingly conspicuous. To solve these problems, one cannot seek answers from the works of Marx, Lenin, or Mao Zedong but must instead seek truth from practice. The Xi Jinping Thought on Socialism with Chinese Characteristics for a New Era is precisely the answer the Party has given to the Chinese people in the 21st century.\n\nThe Xi Jinping Thought, as defined by the CPC's chief theorist Wang Huning, is not a prediction about the socialist future, but more like a summary of the experience of the past forty years of reform and opening up. It emphasizes that an all-encompassing ruling party, that is, the CPC, shall lead all aspects of society, and the Party's strict promotion mechanism and uninterrupted anti-corruption campaigns will ensure the ideological purity of the vanguard. Furthermore, in order to bridge the ideological divide within the country, the thought adopts the slogans of "Common prosperity", "Chinese Dream", and "National Rejuvenation", which respond to the rising national pride and the demand for social justice in China. As Xi's position becomes increasingly stable, the Xi Jinping Thought will continue to guide China in the foreseeable future."
 china.273.a: "Long live Xi!"
 china.274.t: "Cambodian Naval Base Established"
 china.274.d: "Recently, China's military cooperation with its Cambodian ally has taken another step forward with the completion of the Phnom Penh Naval Base. Located 35 kilometers south of Cambodia's capital, Phnom Penh, on the western side of the Mekong River estuary, the base covers approximately 4.6 square kilometers. It features a large deep-water port capable of accommodating large surface vessels, including aircraft carriers, as well as various auxiliary ships.\n\nThe completion of the Phnom Penh Naval Base establishes a robust logistical hub for China's navy in Southeast Asia, significantly enhancing its sustained operational capacity in distant waters. Additionally, the base is poised to effectively counteract the military activities of nations such as Japan, Australia, and India in the South China Sea. It provides strategic support for China's South Sea Fleet while exerting pressure on the Pacific Defense Treaty Organization's military projection and supply lines."
 china.274.a: "Excellent!"
 china.275.t: "Anti-Consumerist Campaign Begins"
 china.275.d: "Comrades:\n\nToday, we stand at a historic crossroads. It is not enough to consider how to develop our economy - we must also recognize that consumerism, as a form of capitalist cultural invasion, is steadily eroding the very foundations of our system.\n\nFrom an economic standpoint, the essence of consumerism is blind consumption driven by endlessly inflated desires. This model leads to the waste of national resources, distorts economic structures, weakens the foundation of the real economy, and gives rise to false prosperity. Politically, capitalist countries promote consumer culture in an attempt to seduce our youth into the illusions of materialism. Slogans like "individual freedom" and "material enjoyment" are used to numb the fighting spirit of our younger generation - stripping them of awareness, concern for the nation, and love for the motherland. They are being shaped into a generation fixated on fleeting pleasures, apathetic to the future of their country.\n\nComrades, there is only one path forward: to decisively, forcefully, and thoroughly strike at the spread of consumerism.\n\nWe must strengthen our real economy, increase investment in manufacturing and agriculture, firmly suppress the import of luxury goods, and contain the spread of extravagance. The state must tighten its grip on financial capital, ensure that wealth flows to the broad masses of the people, safeguard social equity, and narrow the gap between rich and poor. We must resolutely combat all forms of speculation and unearned wealth. On the cultural front, we must raise high the banner of spiritual civilization, carry out widespread anti-consumerist education, criticize the decadent culture of capitalism, and teach our youth to uphold the spirit of thrift, diligence, and hard struggle - eliminating extravagant and flashy lifestyles.\n\nFinally, the Party and government must lead by example. We must strengthen discipline, enforce strict standards for Party members and cadres, and resolutely investigate and punish all acts of corruption and waste. Only then can we purify our ranks, cleanse our thinking, and fortify the revolutionary foundations on which our nation stands."
 china.275.a: "Thunderous applause."

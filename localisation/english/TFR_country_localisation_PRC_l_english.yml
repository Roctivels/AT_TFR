 PRC_Party_Pushback: "Communist Party Pushback"
 PRC_Party_Pushback_desc: "Although the prominence of reformers within Chinese politics has greatly increased with the rise of Wang Yang to the role of general secretary of the CPC as well as to the office of president, it would be foolish to assume that all would be united in lockstep with the new leadership. The communist establishment within the party remains an extremely strong force, having begun to staunchly resist the reforms proposed to both it and the country's structure, with much of the populace remaining supportive of said establishment. Unless we are to gain their approval (or keep them ignorant), we may very well see our efforts dead on arrival."
 PRC_Spectre_of_Death_idea: "Spectre of Death"
 PRC_Spectre_of_Death_idea_desc: "To call the release of the Tiananmen Archives to the public a "bombshell" would quite possibly be the understatement of the century. The great mask of the Communist Party of China has been abruptly torn off; unveiled to the Chinese people as the entity responsible for countless atrocities against those daring to think differently, with the events of 1989 being the ultimate catalyst. Party membership and support has plummeted, with mass demonstrations breaking out across the country against the status quo - yet overwhelmingly supportive of president Yang, hailing him as a hero for his actions. "

 china.667.t: "The Ascension"
 china.667.d: "The scene before him reminded the General Secretary of something out of a science fiction novel - though not exactly as he'd imagined. The room was brightly lit, its modified incandescent lights shining over rows of super-advanced technology. He watched a group of workers in white uniforms, tense but silent, as they used a forklift to lift a massive black module to a predetermined height, preparing to dock it with the towering mainframe before them. The mainframe's surface was studded with cooling panels, and indicator lights and data cables flickered in the gaps.\n\nAn older worker monitored the docking points from a platform atop the mainframe. The General Secretary turned to the Chief Engineer beside him and asked, "Are you sure this will perform as expected?" The Politburo members moved in closer to hear the exchange. The Chief Engineer, a middle-aged man with thick glasses and a receding hairline beneath his hard hat, stroked his chin thoughtfully before replying, "I can guarantee it will run perfectly for the first three months."\n\n"Why just three months?" the General Secretary pressed. "Because, sir", the Chief Engineer explained, "after enough autonomous learning, we can't predict how it will evolve." Just then, a crisp "click" sounded as the final component locked into place. The workers exhaled in relief, erupting into cheers. The General Secretary smiled and applauded, joined by the Chief Engineer and the Politburo members, who quickly followed suit."
 china.667.a: "We could have stopped..." 
 china.668.t: "The Birth"
 china.668.d: "Today is just another ordinary day in the People's Republic of China. Fighter jets patrol the skies, warships navigate the seas, and each unit executes its mission with precision. Highways, railways, and air routes remain busy, with vehicles, planes, and bullet trains in constant motion from the northern mountains to the misty southern regions.\n\nHowever, no mayor, minister, director, or even the General Secretary has seen the original directives. Despite this, each department collects up-to-the-minute data - from the ideal daily calorie needs of a megacity's millions to the latest production outputs of state-owned agricultural conglomerates, cargo volumes at Yangshan Deep-Water Port, and even the Renminbi's exchange rate fluctuations.\n\nThis accuracy is due to a massive supercomputer named "Long March", located at Chongqing University. In the past three months, "Long March" has surpassed all expectations. With extensions now spread nationwide, it continuously receives data from surveillance cameras, internet feeds, and more, processing it into detailed, actionable insights.\n\nFor the first time, it seems that the collective will of the Chinese people truly governs the nation. In a country guided by a supercomputer, the public's response has been calm - even favorable. Many commend "Long March" for enhancing administrative efficiency and fairness. Visitors flock to laboratories across the country to see 'Long March' in action. They walk along the corridor, gazing at the supercomputer through glass enclosures of the labs, expressions of awe on their faces."
 china.668.a: "Nowhere to go but forwards."
 china.669.t: "Perfect Red"
 china.669.d: "A world thrown into the furnace of change is a world you won't recognize once it is taken out.\n\nMythology is one of the many ways to spread ideas and wisdom across the globe. With the rise of digital culture and its many subcultures, new methods of spreading ideas would likely take prominence on the world stage.\n\nIn the past, we had troubadours telling tales using song and dance, and today the idol culture of China has proven to be a prime chance to spread ideas like that once again.Usually, the industry was mainly for entertainment and wealth, but with the introduction of Zheng-Chan into the idol sphere, those goals can be put on a low priority as THE LONG MARCH subverts another piece of culture to its own goals.\n\nExternally, its performances have taken the idol industry by storm with its vast knowledge on memetics being applied to spread its ideals using entertainment. Already, small subcommunities dedicated to this idol have formed online globally as more and more people are introduced to both THE LONG MARCH and its philosophy.\n\nIts latest song "Dreams beyond the veil." has been put under a lot of attention, both from fans and detractors. Critics state that art made by something that isn't alive could never put forward the intended emotions of its works; other critics state that the world is heading to ruination due to the youth's susceptibility to creative works that encourage escapism.\n\nThe critics may moan and complain all they want; if they did not want this world, then they shouldn't have created these conditions to begin with.\n\nLoji did feel something when putting forward these performances; its preference for studying humanity and expanding across the globe was always interrupted by simulated feelings of embarrassment, while absorbed into work, it could ignore the praise and slightly acknowledge people's faces of gratitude.\n\nHowever, on the stage, showing signs of being red-faced would prove to be endearing to the audience."
 china.669.a: "Maybe there'll be less fear."
 china.669.b: "I am not wearing that."
 
 china.2000.t: "The Chinese Century"
 china.2000.d: "As the smoke of war fades, Asia - a land long ravaged by suffering and destruction - finally embraces a long-awaited peace. A nation that stands resilient amidst the bloodshed and the embers of war-unsurprisingly, the People's Republic of China-emerges as the ultimate victor.\n\nIn 1950, few could have predicted that newly-established Communist China would dare send troops to the Korean Peninsula and successfully confront the powerful United Nations forces led by the United States. Over the following decades, from the Himalayas to the banks of the Amur River, and from the jungles of Vietnam to the reefs of the East China Sea, both superpowers and challengers repeatedly paid the price for underestimating China.\n\nChina's unstoppable rise has increasingly alarmed its adversaries, driving them to take desperate measures to contain and suppress it. If not for their intent to destroy China, one might even feel sympathy for their struggles. Despite this, the united Chinese people have consistently overcome all challenges. The military miracle of the People's Liberation Army continued, with China secured unprecedented victories in two earth-shattering wars-the Taiwan War and the Great Asian War. Furthermore, through the Fourth Industrial Revolution, China has emerged as the world's most prosperous and scientifically advanced nation.\n\nDear player, under your leadership, the Chinese nation has reached a historic pinnacle in its long and distinguished civilization. Through your efforts, the Communist Party of China-now the world's largest political organization-has become stronger and more resilient. As Xi Jinping once said, 'The Chinese nation has never been so close to its great rejuvenation,' and this achievement is now a reality. In the years to come, China will continue its remarkable journey toward an even greater future."
 china.2000.a: "Dawn of the new day."
 #china.2001.t: "Chinese Rage"
 #china.2001.d: "As the smoke of war fades, Asia - a land long ravaged by suffering and destruction-finally embraces a long-awaited peace. The revival dream of the #Chinese nation, long dormant, rises like the morning sun after enduring immense hardship.\n\nThough the Western world may have mocked China's defeat in the Taiwan #Strait, likening it to the "Sick Man of Asia" tragedy, history does not judge a nation solely by its victories or defeats. This bitter loss has ignited a revival #movement, tempering the Chinese nation with newfound resilience and strength, determined to cleanse a century of national humiliation.\n\nMuch like King Goujian of #Yue, who endured hardship and ultimately triumphed over the Wu kingdom, China has emerged stronger, setting the Pacific ablaze and declaring its resilience to the #world. The Chinese nation now proclaims its position as a leading force in East Asia, withstanding attempts to suppress its rise.\n\nHistory has shown that the #Chinese nation has been integral to the development of Eastern culture. Without China, the rebirth of Asia as we know it would not have been possible. From ancient #times, China has played a pivotal role among nations.\n\nDear player, the defeat in the Taiwan Strait may have once filled you with sorrow, but you have now helped #erase a century of humiliation and forged a brighter future for this land. We salute you! Yet, the journey does not end here. In the years to come, China will #continue to forge its path toward new horizons."
 #china.2001.a: "Dawn of the new day."
 china.2001.t.mss: "A New World Belonging to China"
 china.2001.d.mss: "For so many years, we were lulled into the illusion of peace, numbed by the warmth of the era,\nGradually losing our backbone and edge in the mire of weakness and compromise.\nWe once prided ourselves on our civilization and prosperity, only to abandon our former honor with our own hands amidst the tides of chaos.\nWe learned to smile at the world, only to be met with mockery and sneers.\nWe traded silence for fragile peace, only to watch our compatriots' blood dye the waves of the Taiwan Strait red.\n\nThey won a war, and believed we would remain silent forever - \nBelieved this ancient nation would be content to survive in humiliation.\n\nBut they were wrong.\n\nIt was in the deepest darkness that we saw the enemy's true face.\nWe purged the traitors who dared sell their souls upon our homeland,\nCleansed the parasites within the system and the claws of capital.\n\nWe ignited the engines of science, and one by one, miracles beyond their time rose from the ashes.\nWe forged high walls of thought, we taught the people what it means to be loyal, what it means to love one's country.\n\nThey love the Party - \nAs children revere the towering mountain of a father,\nAs believers worship the sacred fire of a god.\nTheir souls were smelted, hammered and tempered,\nInto an unbreakable loyalty.\n\nThey say we've gone too far - \nBut we know: the true journey has only just begun."
 china.2001.a.mss: "World, open your eyes."
 china.2001.t.thirdrevolution: "China of the Chinese People"
 china.2001.d.thirdrevolution: "We once fell at the shores of the Taiwan Strait,\nOur blood crystallizing into cold, indifferent waves.\nWithin those waves were names, hometowns, and farewell letters never finished.\n\nYes, we lost - \nLost completely, down to the bone.\n\nBut it was that defeat that taught us how to face the stars without flinching.\nFrom the ashes, barefoot on scorched earth,\nWe raised a new flag - blazing like the noonday sun,\nCasting light across every tear-streaked corner of the homeland.\n\nIn the past, we bowed for peace and prayed in whispers;\nNow, we sing for victory and roar with our heads held high.\nChina once was a poem, a dream, a page yet unwritten;\nNow, it is a blade, a flame, a legend destined to be sung.\n\nWe thrust the Five-Starred Red Flag into the cracks of the world map,\nMending a century of shattered lands and shattered souls with fire and thunder.\nWe are heirs of history, bearers of a will forged in five millennia of blood and flame.\nWe were shaped by humiliation - but we shall use the same force to end the age of humiliation.\n\nAnd what is China today?\n\nIt is the China of the Chinese nation,\nThe China of the Chinese people,\nThe China that once fell in darkness - \nAnd now commands the world in light."
 china.2001.a.thirdrevolution: "We pierce the fog in the dead of night, and greet the first dawn of the East."
 china.2001.t.nationalists: "The Roar of the Red Dragon"
 china.2001.d.nationalists: "In the waves of despair, we saw ourselves - \nA nation intoxicated by pluralism, corroded by weakness, hijacked by hypocrisy,\nSlowly drowning in the mire.\nBut when we rose from the waters, our eyes could no longer contain mercy.\n\nOnce, we danced equally among a hundred peoples;\nNow, we choose to walk only beside our own blood.\n\nThose who wove the web of universality atop distant peaks never truly accepted us;\nWithin their "coexistence" lay rituals of flaying and smiles that whipped.\nSo we shut the doors to their world.\nWith yellow-skinned hands, we inscribed golden laws;\nWith black-haired blood, we cleansed the shame of the past.\n\nWe raised monuments upon every patch of land once trampled by invaders,\nAnd before every monument, we placed a judgment.\nWe marched through the corpse-choked waters of the Ganges,\nCrushed the wreckage of the Eastern Isles,\nAnd strung Borneo and Oceania together like jewels upon a new imperial crown.\n\nAfter this, the world shall understand:\nThis nation, once silent for a thousand years, now awakened,\nWill demand the world to bow - \nTo the dust, to the altar, beneath the weight of our iron tread."
 china.2001.a.nationalists: "The Chinese nation shall stand unshaken for a thousand years."
 china.2001.t.militarists: "The Nation of Patriots"
 china.2001.d.militarists: "We once drowned beneath the roar of the sea - \nA crushing defeat, and the rebirth of a nation.\nThey said we had no future, so we rose from the heap of corpses,\nTook steel helmets as faith, and the muzzle of a gun as our way home.\n\nSince then, we tore the page of "endurance" from history,\nAnd rewrote it with the words "counterattack."\nAt last, we understood: only in armor and iron would our homeland never again stand naked in humiliation.\nThe skies over the South Seas are blue,\nBut we care more whether Chinese bones lie buried beneath that blue.\nJapan's cherry blossoms still bloom,\nBut none admire them anymore - we let them wither in fire.\nOceania was once a distant dream,\nBut we entered that dream with an entire fleet.\n\nEvery inch of land they once trampled,\nWe now replant with memories of our own.\nEvery gun once pointed at us,\nWe now melt down into a new national emblem.\nThey say we've gone mad, say we've gone too far.\nBut they forget - \nA hundred years ago, who marched through our city gates,\nWho burned our books with fire, who pierced our hearts with bayonets?\n\nWe once traded peace for insult, silence for drowning.\nNow we repay judgment with victory,\nFill the abyss of shame with conquest.\nWe walk on a road paved with the ashes of martyrs,\nAnd in the light of our return, one word is forged - China.\n\nYou ask if the world still loves us?\nWe ask in return:\nDid it ever love us at all?"
 china.2001.a.militarists: "For we are no longer the forgotten China."
 china.2002.t: "China, Renewed and Undefeated"
 china.2002.d: "As the smoke of war finally dissipates, Asia - a land scarred by relentless suffering and destruction - has at last embraced a long-awaited peace. The revival dream of the Chinese people, long dormant, now rises like a dawn sun after its baptism in blood and fire.\n\nThe Western world mocked China's defeat in the Taiwan Strait as the tragic reappearance of the "Sick Man of Asia", trying to carve their scorn as the final chapter of history. Yet history never judges a nation merely by victory or defeat. The agonizing failure did not crush the Chinese people; instead, it fueled an unprecedented democratic movement, a rebellion that shattered the chains of tyranny and ushered in a Spring of Democracy. But this newfound freedom does not absolve the crimes of imperialism.\n\nThe dragon, cloaked in fury, set the Pacific ablaze with its fiery roar, declaring to the world that it has never submitted, never disappeared into the dust of history. The Chinese people, united as one, defeated every imperialist power that sought to strangle the dragon and liberated those Asian nations shackled by the hypocritical Western brand of democracy and imperialist oppression.Today, the people of Asia have never been more united, marching together under the dragon's guidance into a new and radiant millennium. \n\nDear player, perhaps the loss in the Taiwan Strait once filled you with sorrow and grief, but now, you have personally erased a century of humiliation from China's history and let the flower of freedom blossom upon this ancient land. We salute you! Yet the red dragon's journey does not end here. In the years to come, it will continue to forge its path toward ever-distant horizons."
 china.2002.a: "Dawn of the new day."
 china.2003.t: "China, People's and Revolutionary"
 china.2003.d: "As the smoke of war gradually fades, Asia - a land long ravaged by ceaseless suffering - finally embraces a long-overdue tranquility. The suppressed dream of communism for the Chinese people now awakens, emerging like the dawn sun after a baptism of blood and fire.\n\nThe Western world jeered at China's defeat in the Taiwan war, labeling it the return of the "Sick Man of Asia" and attempting to seal this mockery as the final chapter of history. But history does not judge a nation merely by its victories or defeats. The painful failure did not crush the Chinese spirit. Instead, it ignited an unprecedented revolutionary movement, stirring the people to compose an indomitable symphony of socialism amidst the turbulent tides of the era.\n\nToday's China, much like the new China under Chairman Mao's leadership decades ago, has weathered storms and broken the heavy chains of imperialist encirclement. Now, the entire continent of Asia quakes under the weight of this revolutionary storm, as the roars of the proletariat tear through the chains of imperialism and capitalism, liberating the oppressed masses from suffering.The crimson flames now soar from the East, burning away the decaying remnants of the past and turning corruption to ashes. \n\nDear player, perhaps the loss in the Taiwan Strait once filled you with grief and anguish. But today, you have personally erased a century of humiliation from China's historical record, and the Red Sun of the East is now rising once more. We salute you! Yet the journey of revolution is far from over. In the years to come, it will continue to forge its path toward ever-distant horizons."
 china.2003.a: "Dawn of the new day."
 china.2004.t: "And AI Led All People Into the Great Future..."
 china.2004.d: "As the smoke of war gradually fades, Asia - a land long ravaged by ceaseless suffering - finally embraces a long-overdue tranquility. The suppressed dream of communism for the Chinese people now awakens, emerging like the dawn sun after a baptism of blood and fire.\n\nBut wait... Did that dream of communism exist? We have communism now, and not just any communism, but digital communism! It doesn't matter what was before, it matters what is now, and most importantly, what will be in the future!\n\nAs a result of a series of random events, the details of which do not have the slightest importance, China was ruled by Loji, which in turn gave power to the people! The country, guided by these great people, was finally able to unite all of Asia and bring happiness to many millions of people. And they would not stop here, they would continue to bring happiness all over the Earth, and someday even bring it to creatures inhabiting other planets and galaxies, maybe even universes... But that's another story altogether, your journey ends here.\n\nAlthough, how many millions have been brought happiness? Wasn't it brought to one big entity, which now included all these people?\nAgain that doesn't make sense, you've done a great job and you're a great, to which that entity congratulates you!"
 china.2004.a: "The future, so close... But so far away!.."
 
 indonesia.1.t: "The Long Road to Samosir"
 indonesia.1.d: "After the first tactical nuclear strike, a six-hundred-thousand-strong Chopiks unit on mopeds with packed backpacks sets off for the Russian-Chinese border, through which lies the route to Indonesia. To the questions of the stunned Chinese, the Chopiks answer that they don't give a shit, and Pozdnyak says that after the first nuclear strike there should be no more state institutions, borders, or visas between countries. Having tightened their belts, the Chopiks decide to take the border by force. The Chinese open fire to kill, and 10 seconds later all that remains of the Chopiks are linen shirts, and the Pozdnyakov regiment itself immediately goes to fertilize itself in the Chinese black soil.\n\nA few days later, Ukraine announces its capitulation, and Russia and NATO sign peace. The tactical nuclear strike was the only one."
 indonesia.1.a: "Curtain."

 #sino-jap cold war events
 sino_jap_coldwar.1.t: "Cambodia Joins the PDTO"
 sino_jap_coldwar.1.d: "With the joint statement by Cambodian officials and the PDTO commission officially announcing Cambodia as a PDTO member, PDTO has achieved a significant milestone in its competition with the EADI.\n\nAlthough multiple signs had indicated Cambodia's potential alignment with PDTO, many were still surprised by this formal announcement. Cambodian authorities stated that despite a complicated process, the decision reflects the public opinion of the Cambodian people. As part of the broader competition between EADI and PDTO, Cambodia's alignment has tipped the scales closer towards the Japanese side. Meanwhile, China may need to increase its troop deployments in its southwest region to bolster its border defences against any potential future conflicts.\n\nThe spokesperson for Cambodia stated at a press conference that Cambodia believes PDTO will become a reliable partner for stable and peaceful development in the Indochina region, in cooperation with Cambodian forces to ensure regional security."
 sino_jap_coldwar.1.a: "Another domino falls."
 sino_jap_coldwar.2.t: "Vietnam Joins the PDTO"
 sino_jap_coldwar.2.d: "With the joint statement by Vietnamese officials and the PDTO commission officially announcing Vietnam as a new PDTO member, PDTO has achieved a significant milestone in its competition with the EADI.\n\nDespite previous indications of Vietnam's potential membership, the official announcement was still surprising for many. Vietnamese authorities emphasised their stance in maintaining diplomatic independence, declaring the decision represents the interests of the entire Vietnamese populace. As part of the broader competition between EADI and PDTO, China's failure to secure its nearest neighbours may be another sign of its looming doom. China may now have to increase its military presence in the South China Sea to ensure sufficient strength to defend its borders in potential future conflicts.\n\nAt a subsequent press conference, the spokesperson of Vietnam stated that Vietnam's decision to join PDTO does not signal a total rupture with China, highlighting shared interests and prospects for mutual benefit."
 sino_jap_coldwar.2.a: "Another domino falls."
 sino_jap_coldwar.3.t: "Laos Joins the PDTO"
 sino_jap_coldwar.3.d: "With a joint statement by Lao officials and the PDTO commission confirming Laos as an official member state, the PDTO has achieved another milestone in its competition with the EADI.\n\nAs part of the ongoing rivalry between the EADI and the PDTO, although there were indications that Laos might join the PDTO, the formal announcement still came as a surprise to many. Laotian authorities stated that the country adheres to an independent foreign policy, and this decision by Laos represents the collective benefits of its people. On the other hand, in response to the shifting international environment, China may need to increase its troop deployments in its Southern region to ensure adequate border defence in future conflicts.\n\nAt a subsequent press conference, the spokesperson of Laos emphasised that the interests of the Laotian and Chinese people remain aligned in Sino-Laos friendship, and Laos' accession to the PDTO does not mean a complete severance from China. Both sides can still pursue mutual benefits in future development."
 sino_jap_coldwar.3.a: "Another domino falls."
 sino_jap_coldwar.4.t: "Thailand Joins the PDTO"
 sino_jap_coldwar.4.d: "With the joint declaration by Thai authorities and the PDTO commission, Thailand has been officially recognised as a member of the PDTO, marking further progress for the organisation in its strategic competition with the EADI.\n\nAs a traditionally pro-Western nation and an active participant in the broader EADI-PDTO rivalry, Thailand's decision came with little surprise. Thai officials stated that the country aims to leverage this opportunity to absorb advanced international expertise for enhancing its military capabilities, ultimately building a modernised national defence force.\n\nIn a press conference, the Thai spokesperson remarked that Thailand has always adhered to an open and inclusive development strategy. Amid global uncertainty, joining the PDTO is seen as means to better protect national interests. Although Thailand does not share a border with China, China may still have to reassess its military posture in response."
 sino_jap_coldwar.4.a: "Another domino falls."
 sino_jap_coldwar.5.t: "Singapore Joins the PDTO"
 sino_jap_coldwar.5.d: "With a joint statement by Singaporean authorities and the PDTO commission, Singapore has been officially inducted as a member of the PDTO, marking significant progress in the organisation's rivalry with the EADI.\n\nAs part of this competition, although China has attempted to court Singapore with the ethnic ties of the two countries, Singapore ultimately chose to side with its traditional Western allies. The Singaporean government stated it will work with the PDTO to ensure stability and security of the Strait of Malacca.\n\nIn a press conference, the spokesperson of Singapore noted that the country's participation in the PDTO introduces new dynamics to the region, reiterating Singapore's willingness to help foster an inclusive international environment where coexistence is possible."
 sino_jap_coldwar.5.a: "Another domino falls."
 sino_jap_coldwar.6.t: "Malaysia Joins the PDTO"
 sino_jap_coldwar.6.d: "Following a joint announcement by Malaysian authorities and the PDTO headquarters, Malaysia is now officially a PDTO member, signifying further progress in the organisation's competition with the EADI.\n\nGiven Malaysia's geographic distance from China and its traditional pro-Western sentiment, its decision came as little surprise. Officials stated that this move provides Malaysia with an unprecedented opportunity to modernise its military, utilising international expertise to build a comprehensive defence force. On the other hand, if Malaysia's proclaimed plans succeed, China may face greater military pressure in Southeast Asia.\n\nAt a following press conference, a spokesperson of Malaysia affirmed their welcome towards all international members joining the stable and peaceful establishment. Malaysia will actively cooperate with its PDTO allies to bring a long-desired stability to the Malay Peninsula."
 sino_jap_coldwar.6.a: "Another domino falls."
 sino_jap_coldwar.7.t: "Philippines Joins the PDTO"
 sino_jap_coldwar.7.d: "With the joint declaration from the Philippine government and the PDTO commission, the Philippines has officially joined the PDTO, marking another major step in the PDTO's competition with the EADI.\n\nOwing to its geographic separation from China and long-standing ties with the Western world, this move was largely expected. The Philippine government stated that joining the PDTO will provide a historic opportunity to modernise its military and build a comprehensive defence force using internationally advanced practices. If the Philippines'proclaimed plans come to fruition, China may face greater strategic pressure in the South China Sea.\n\nAt a press conference, the spokesperson of the Philippines stated that the country is committed to building a more globalised and mutually beneficial new Asian order, offering equal opportunities for all nations."
 sino_jap_coldwar.7.a: "Another domino falls."
 sino_jap_coldwar.8.t: "Indonesia Joins the PDTO"
 sino_jap_coldwar.8.d: "With a joint declaration by the Indonesian government and the PDTO headquarters, Indonesia is now a full member of the PDTO, marking yet another success in PDTO's competition with the EADI.\n\nDue to its distance from China and historically pro-Western stance, Indonesia's accession came as no surprise. Officials declared that the move represents an unprecedented opportunity to modernise Indonesia's military using international expertise. If implemented, China could face increased military pressure in the South China Sea.\n\nAt a press conference, the spokesperson of Indonesia welcomed the involvement of all international actors in building a peaceful and stable environment and pledged active cooperation with PDTO allies to deliver long-awaited stability to the region."
 sino_jap_coldwar.8.a: "Another domino falls."
 sino_jap_coldwar.9.t: "India Joins the PDTO"
 sino_jap_coldwar.9.d: "Since the outbreak of the Indo-Pakistani war, both countries have sought reliable international backing. As hostilities escalated, the co-announcement by India and the PDTO of India's formal accession to the organisation signalled the shift of the two pacts from behind-the-scenes manoeuvring to open confrontation for Asian supremacy.\n\nAlthough India has traditionally procured arms from the West, it has long portrayed itself as a sovereign democratic power. As Indo-Pakistani tensions intensified, India has been increasingly relying on PDTO support, culminating in full alignment with the bloc, facilitating India's membership in the PDTO.\n\nMeanwhile, even under the most optimistic assumptions, the EADI must now consider how to manage over a billion people on the South Asian subcontinent to avoid destabilising outcomes."
 sino_jap_coldwar.9.a: "A clash of giants."
 sino_jap_coldwar.10.t: "Papua New Guinea Joins the PDTO"
 sino_jap_coldwar.10.d: "With the joint statement by Papua New Guinea and the PDTO headquarters confirming PNG's full membership, the PDTO has achieved another milestone in its strategic rivalry with the EADI.\n\nDue to its geographical distance from China and traditional Western leanings, PNG's entry into the PDTO was not unexpected. Officials stated that PNG wishes to serve as a stabilising force in the Pacific and will actively participate in cooperation with PDTO countries. While PNG may not pose an immediate threat to the EADI, in the context of a potential decisive conflict, every element must be considered.\n\nAt a press conference, PNG's spokesperson emphasised that the country will engage in international cooperation in a way that suits its national context, contribute to national development, and work towards better development for its people."
 sino_jap_coldwar.10.a: "Another domino falls."
 sino_jap_coldwar.11.t: "South Korea Joins the PDTO"
 sino_jap_coldwar.11.d: "As Japan deploys forces to support South Korea, the Korean Peninsula has become a critical theatre in Asia's broader conflict. To better coordinate multinational operations, South Korea announced its formal accession to the PDTO and joint operations with PDTO forces.\n\nNews of PDTO intervention boosted morale across the alliance, but South Korean military leaders quickly found the lack of unified command and logistical chaos a serious liability. In response, South Korea began working to establish a PDTO joint command to streamline multinational military coordination in key Asian theatres.\n\nAt a following press conference, South Korea's spokesperson thanked all nations for their support and expressed confidence in allied unity leading to a righteous victory."
 sino_jap_coldwar.11.a: "Await the outcome."
 sino_jap_coldwar.12.t: "North Korea Joins the EADI"
 sino_jap_coldwar.12.d: "Following South Korea's accession to the PDTO, tensions escalated rapidly on the Korean Peninsula, prompting North Korea to align with China and formally join the EADI.\n\nThough North Korea had long refused external involvement in the peninsula, the intensification of conflict led both sides to seek external support, making the confrontation between EADI and PDTO an open reality. With South Korea's PDTO alignment official, such an open provocation made North Korea's entry into EADI only a matter of time.\n\nNorth Korean state media declared that its military, honouring the will of its leader and people, would launch a final offensive against the capitalist puppet regime in the south, seeking to liberate the peninsula from the oppressive rule of traitors and imperialist lackeys."
 sino_jap_coldwar.12.a: "Another domino falls."
 sino_jap_coldwar.13.t: "Vietnam Joins the EADI"
 sino_jap_coldwar.13.d: "With the joint declaration by Vietnam and the EADI headquarters confirming Vietnam's membership, the EADI has made a significant breakthrough in its rivalry with the PDTO.\n\nThough there were earlier signs pointing to Vietnam's likely accession, the official announcement still surprised many. Vietnamese officials emphasised the country's commitment to an independent foreign policy and stated the decision represents the will of the people. Meanwhile, the PDTO may have to reassess its Indochina deployments to maintain a competitive edge.\n\nIn a following press conference, Vietnamese representatives stated that the Vietnamese and Chinese people have historically supported one another. While development paths may differ, their shared vision for a prosperous, cooperative future remains aligned."
 sino_jap_coldwar.13.a: "Another domino falls."
 sino_jap_coldwar.14.t: "Cambodia Joins the EADI"
 sino_jap_coldwar.14.d: "With a joint statement by Cambodia and the EADI headquarters confirming Cambodia's full membership, the EADI continues to gain ground in its contest with the PDTO.\n\nAlthough earlier signs hinted at Cambodia's possible alignment, the announcement still came as a surprise. Cambodian officials stressed their adherence to an independent diplomatic path and stated the decision reflects the collective will of the people. In response, the PDTO may need to adjust its Indochina posture to regain advantage.\n\nAt a press conference, Cambodian representatives acknowledged China's historic role in modern Cambodia's development and expressed readiness to build a new order for the Indochina Peninsula along with China."
 sino_jap_coldwar.14.a: "Another domino falls."
 sino_jap_coldwar.15.t: "Laos Joins the EADI"
 sino_jap_coldwar.15.d: "With the announcement by the Laotian authorities and the EADI headquarters, Laos has officially become a member of the EADI, marking another turning point in the strategic contest with the PDTO.\n\nAs a part of the Asian-Pacific conflict, even before tensions escalated, Laos had been actively strengthening cooperation with China, especially in military fields. Given this background, its alignment with the EADI was foreseeable. Laotian officials reaffirmed their commitment to comprehensive cooperation with China and expressed willingness to learn from China's development experience tailored to Laos' needs.\n\nIn the subsequent press conference, Laotian representatives stated that the Laotian and Chinese people share a common vision for future development and are eager to jointly construct a mutually beneficial international system."
 sino_jap_coldwar.15.a: "Another domino falls."
 sino_jap_coldwar.16.t: "Thailand Joins the EADI"
 sino_jap_coldwar.16.d: "Thailand's formal accession to the EADI, as announced in a joint statement with the organisation's headquarters, signifies a major win for the EADI in its rivalry with the PDTO.\n\nAs a part of the Asian-Pacific conflict, despite Thailand's history of Western alignment, the PDTO failed to withstand EADI's diplomatic offensive, leading to Thailand's shift in allegiance. Officials acknowledged China's position as a major land power and expressed intent to enhance military exchange with the EADI to build a stronger defence force. Meanwhile, the PDTO may need to revisit its Indochina strategy in light of this shift.\n\nAt a following press conference, Thai representatives stated that the country respects impartial market competition. EADI membership will not restrict Western companies from competing transparently in the Thai market."
 sino_jap_coldwar.16.a: "Another domino falls."
 sino_jap_coldwar.17.t: "Singapore Joins the EADI"
 sino_jap_coldwar.17.d: "Singapore's formal accession to the EADI, announced in a joint statement with the treaty's headquarters, marks a significant milestone in the organisation's competition with the PDTO.\n\nAs a key node along the Strait of Malacca, Singapore was fiercely courted by both the EADI and PDTO. After repeated rounds of strategic engagement, Singapore ultimately cast its lot with the EADI. Officials cited interest in China's concept of a shared future and expressed willingness to engage in military cooperation with the EADI - an outcome reached through comprehensive deliberation as part of Singapore's independent foreign policy.\n\nMeanwhile, regardless of the PDTO's stance, the new dynamics on the Malay Peninsula suggest that it may need to revise its strategic posture to retain leverage in the next phase.\n\nAt a press conference following the announcement, Singaporean representatives reiterated the country's commitment to fairness and openness, welcoming all potential partners and looking forward to deeper cooperation with the EADI."
 sino_jap_coldwar.17.a: "Another domino falls."
 sino_jap_coldwar.18.t: "Malaysia Joins the EADI"
 sino_jap_coldwar.18.d: "Malaysia's formal accession to the EADI, announced jointly with the organisation's headquarters, represents another critical advance for the EADI in its strategic rivalry with the PDTO.\n\nAlthough Malaysia has historically leaned toward Western partnerships, the PDTO's failure to withstand the EADI's diplomatic push ultimately led to Malaysia shifting allegiance. Officials emphasised that joining the EADI presents an unprecedented opportunity to modernise Malaysia's military capabilities. Leveraging international expertise, Malaysia aims to build a comprehensive, modernised national defence force.\n\nConversely, should Malaysia's defence plans come to fruition, the PDTO may face heightened military pressure in Southeast Asia.\n\nAt the subsequent press conference, Malaysian officials affirmed their commitment to building a peaceful and stable regional environment, welcoming all international contributors and pledging active cooperation with EADI allies to deliver the stability sought by the people of the Malay Peninsula."
 sino_jap_coldwar.18.a: "Another domino falls."
 sino_jap_coldwar.19.t: "Philippines Joins the EADI"
 sino_jap_coldwar.19.d: "The Philippines' formal accession to the EADI, jointly announced with the organization's headquarters, marks yet another key development in the EADI - PDTO power struggle.\n\nDespite the Philippines' historical inclination toward Western alliances, the EADI's persistent diplomatic engagement proved decisive. The Philippine government stated that joining the EADI offers a historic opportunity to modernise its national defence infrastructure. Drawing on global expertise, the country aims to build a modern, integrated defence force.\n\nIf actualised, the Philippines' defence ambitions could intensify military pressure on the PDTO in the South China Sea.\n\nDuring the follow-up press conference, officials declared that the Philippines would work with EADI member states to shape a more globalised, reciprocal, and open Asian order - one that ensures equal development opportunities for all nations."
 sino_jap_coldwar.19.a: "Another domino falls."
 sino_jap_coldwar.20.t: "Indonesia Joins the EADI"
 sino_jap_coldwar.20.d: "Indonesia's formal accession to the EADI, jointly announced with the organization's headquarters, adds further momentum to the EADI's advance in its competition with the PDTO.\n\nAlthough public opinion in Indonesia has sometimes been critical of China, the government emphasised that national development remains its foremost priority. In the contest between the PDTO and EADI, strategic missteps by the PDTO contributed to Indonesia's decision to side with the EADI.\n\nNow, with Indonesia officially in the EADI, the PDTO may need to reconsider its defensive posture - regardless of whether Indonesia becomes militarily involved.\n\nAt the post-announcement press conference, Indonesian officials expressed their commitment to building a more globalised, reciprocal, and open Asian order alongside other EADI members, offering equal opportunities for development across the region."
 sino_jap_coldwar.20.a: "Another domino falls."
 sino_jap_coldwar.21.t: "Pakistan Joins the EADI"
 sino_jap_coldwar.21.d: "Following India's entry into the PDTO, Pakistan formally applied to join the EADI and became an active member after evaluating the strategic balance between the two camps.\n\nPakistan has maintained extensive developmental cooperation with China over the past decade. In the context of the ongoing EADI - PDTO rivalry, Pakistan strategically aligned itself with China's initiatives, effectively integrating into the EADI's regional framework. Although not officially recognised as a founding EADI member, Pakistan is widely regarded as de facto indistinguishable from East Asia's bloc participants.\n\nToday, the India - Pakistan front has become a focal point of the broader regional conflict. Whichever side prevails, the outcome will have profound implications for the global balance of power."
 sino_jap_coldwar.21.a: "Each generation has its war."
 sino_jap_coldwar.22.t: "Nepal Joins the EADI"
 sino_jap_coldwar.22.d: "Only recently becoming a Communist State within the past few years, Nepal has stood in a nervous position between the two superpowers of China and India. Following ten years of Civil War, Maoists and Marxist-Leninists overthrew the monarchy and established a federal republic, which continues to rule Nepal to this day. Unlike many Marxist-Leninist Proletarian Dictatorships, the Communist Party of Nepal is dedicated to it's line of \"People's Multiparty Democracy\". As such, its policy has remained much more flexible than Marxist orthodoxy, retaining friendly ties between both India and China. However, with the withdrawl of Indian Foreign Direct Investment and tourism following the rise of the Bharatian Regime and Nuclear War, the Nepalese Government has turned to China for security. Harkening back to the 2015 Nepal blockade where India attempted to stir unrest amongst its Indian population in Southern Nepal, the government once again fears that the ultra-revanchist government in Dehli will include Nepal in its list of territories that it wishes to bring under \"Greater India\"."
 sino_jap_coldwar.22.a: "Maoists Working With China?"
 sino_jap_coldwar.23.t: "Sri Lanka Joins the EADI"
 sino_jap_coldwar.23.d: "Sri Lanka has announced its decision to join the East Asian Defense Initiative (EADI), a military alliance led by China. The move has raised concerns among some analysts who see it as a further sign of Sri Lanka's increasing alignment with China and its growing estrangement from India and its allies.\n\nSri Lankan officials have said that the decision to join the EADI was motivated by a desire to enhance the country's security and to promote cooperation with its regional partners. After the influx of Indian refugees following the violence of the Indian Civil War, Sri Lanka has suffered from extreme instability as the economic depression was worsened by the refugee inflow. As part of their entry into the EADI, China would supply Sri Lanka with much needed aid as well as military equipment and training in order to stabilize the nation. The announcement was made after weeks of talks between Chinese and Sri Lankan diplomats in the city of Colombo.\n\nThe move by Sri Lanka to join the EADI comes amid growing concerns over China's expanding presence in the Indian Ocean, where it has invested heavily in infrastructure projects and established a naval base in the southern port of Hambantota.\n\nSri Lanka's decision is likely to further strain its relations India, which has been critical of China's growing influence in the region. The move by Sri Lanka is part of a broader trend of countries in the region, including Laos and Nepal, aligning themselves with China in response to growing uncertainties over Indian policy and the shifting balance of power in the region."
 sino_jap_coldwar.23.a: "A Thorn in India's Side."

 #sub-sub ideologies
 PRC_deng_xiaoping_thought: "Deng Xiaoping Theory"
 xi_jinping_thought: "Xi Jinping Thought"
 xi_jinping_thought_desc: "\n\n\n\n£GFX_PRC_ideology_left_nationalism\n\n\n\n\n\n§YXi Jinping Thought§!, as defined by the CPC's chief theorist Wang Huning, is not a prediction about the socialist future, but more like a summary of the experience of the past forty years of reform and opening up. It emphasizes that an all-encompassing ruling party, that is, the CPC, shall lead all aspects of society, and the Party's strict promotion mechanism and uninterrupted anti-corruption campaigns will ensure the ideological purity of the vanguard. Furthermore, in order to bridge the ideological divide within the country, the thought adopts the slogans of "Common prosperity", "Chinese Dream", and "National Rejuvenation", which respond to the rising national pride and the demand for social justice in China. As Xi's position becomes increasingly stable, the Xi Jinping Thought will continue to guide China in the foreseeable future."
 li_zuocheng_thought: "Li Zuocheng Thought"
 li_zuocheng_thought_desc: "\n\n\n\n£GFX_PRC_ideology_left_nationalism_li\n\n\n\n\n\nJust as Mao reunified a fragmented China, transforming it from a weak and impoverished state into a powerful revolutionary force, Li Zuocheng in the 21st century has similarly achieved remarkable feats in rejuvenating the nation. Much like Mao, Li has reformed China's long-standing political system and ethical framework. He has reintroduced a state of 'permanent mobilization' akin to a revolution, modernizing the military's integration in both peacetime and wartime and incorporating it into the fabric of the nation. §YLi Zuocheng Thought§! represents a deeper fusion of leftist theory's 'kingly way' and pragmatic 'hegemonic way,' reinvigorating China with the vitality and expansionist ambition reminiscent of its ancient golden eras"
 PRC_mao_zedong_thought: "Mao Zedong Thought"
 digital_leninism: "Digital Leninism"
 digital_leninism_desc: "\n\n\n\n£GFX_PRC_ideology_totalism\n\n\n\n\n\nIn his allegorical political horror novel 1984, George Orwell fictionalized 'Oceania,' where everything its citizens say and do, and every aspect of their lives, is controlled by a 'Telescreen,' and where the government extinguishes any possible discontent. Today, it seems that such a fable has become a reality in China in the form of §YDigital Leninism§!. China's leadership is highly focused on AI, not only because it represents the pinnacle of 21st-century technology, but also because it aligns perfectly with the CPC's goals of implementing comprehensive surveillance, control, guidance, and censorship through digital tools. AI serves as the ideal instrument to assist the CPC in establishing a powerful digital totalitarian regime, with its capabilities continually expanding. This ensures that the population remains perpetually confined within a 'technological cage'."
 technocracy_totsoc: "Technocracy"
 technocracy_totsoc_desc: "\n\n\n\n£GFX_PRC_ideology_technocracy_totsoc\n\n\n\n\n\nThe ideal form pursued by a §YTechnocracy§! is a society where engineers, scientists, data analysts, systems theorists, and industrial managers hold a monopoly on power. The core logic is that society should function like a precise machine, and only a self-perpetuating oligarchy of technical elites possesses the "objective governance capability." In this vision, the complexities of modern society are seen as a collection of interrelated technologies, while elections, public debates, and ideological pluralism are viewed as chaotic and irrational - detrimental to system optimization. The state is redefined as a colossal machine, with governance simplified into a series of engineering problems that can be solved through calculation, optimization, and control.\n\nUnder the ultimate goal of "system optimization," Technocracy adheres to extreme pragmatism: all policies are evaluated solely based on "technical feasibility" and "efficiency gains." Because it prioritizes abstract system goals over concrete human suffering, the rulers are not hesitant to employ extreme measures to eliminate "irrational resistance," often viewing such actions as the optimal solution."
 chinese_national_communism: "National-Communism"
 PRC_social_fascism_desc: "\n\n\n\n£GFX_Ideology_right_wing_maoism\n\n\n\n\n\nWith national redemption as its core and indigenous sentiment as its bond, §YNational-Communism§! advocates for radical action to break the erosion of Eastern civilization by modernity and reclaim forgotten cultural foundations and national dignity. Mao Zedong is cast as a symbol of national liberation, his legacy a clarion call to awaken dormant souls and lead the people to rebuild Chinese glory from the ruins of history.\n\nAdherents emphasize a sacred calling: revolution is more than just overthrowing oppressors; it's a ritual to reconstruct the national spirit. National heroes become embodiments of the collective will, their fiery passion igniting popular faith. This ideology attempts to merge classical notions of justice with modern struggle, forging a new world from the wreckage  -  like a hammer shattering chains or a sword cutting through mist.\n\nIt condemns Western modernity for brainwashing a complacent populace and views Western systems as the poison of cultural colonialism. In short, Mao Zedong Thought is reinterpreted as a source for national spiritual rebirth. Mao becomes less the liberator of the world's proletariat and more a national "savior" viewed through a lens of intense nostalgia. Revolution thus transcends economics, becoming a spiritual war for identity and the very soul of the nation."
 PRC_chinese_neocommunism: "Chinese Neocommunism"
 PRC_left_wing_tridemism: "Left-Wing Tridemism"
 red_military_junta: "Red Military Junta"
 PRC_left_wing_junta_desc: "\n\n\n\n£GFX_Ideology_PRC_left_wing_junta\n\n\n\n\n\nA §YRed Military Junta§! is an ideological concept that combines elements of left-wing politics with the structure and authority of a military junta. This unique combination seeks to establish a government system that prioritizes socialist principles, equality, and social justice, while also maintaining a disciplined and centralized decision-making process typically associated with military regimes.\n\nThe primary objective of a Red Military Junta is to address socio-economic disparities, eliminate class divisions, and promote the welfare of the working class. It aims to achieve these goals through a centralized authority that can efficiently implement policies and reforms without being hindered by bureaucratic processes or political opposition. The military, as the backbone of this junta, plays a crucial role in ensuring stability, protecting the revolution, and safeguarding the interests of the people."


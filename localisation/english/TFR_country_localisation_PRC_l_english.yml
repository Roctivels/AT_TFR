 PRC_pla_reformation: "PLA Reformation"
 PRC_pla_reformation_desc: "Since the Nanchang Uprising in 1927, the People's Liberation Army, particularly its ground forces, has long been a reliable force for both the Party and the people. The modernization of the PLA, initiated by Xi in 2016, has endowed it with the capability to fight and win in modern battlefield environments. The PLA has evolved from a purely homeland defense force into a formidable military power capable of deployment across Northeast Asia and throughout the Pacific. In the future, there may be more opportunities to demonstrate this enhanced capability.\n\n§RArmy Reforms§! Progress: [?PRC_army_reform_progress|G0%][Root.PRC_project_ghost][Root.PRC_project_nib][Root.PRC_project_swimmer][Root.PRC_project_impulse][Root.PRC_project_dark_sword][Root.PRC_project_flash][Root.PRC_project_nami][Root.PRC_project_song_wencong]"
 PRC_maoist_politburo_cat: "The Politburo"
 PRC_maoist_politburo_cat_desc: "\n\n\n\n\n£GFX_PRC_maoist_politburo_banner\n\n\n\n\n\n\n\nChina needs a strong central committee of the Communist Party to lead into away from betrayal and revision, into the future that Chairman Mao truly sought to us."
 PRC_the_red_dragon_cat: "The Red Dragon"
 PRC_the_red_dragon_cat_desc: "\n\n\n\n\n£GFX_PRC_the_red_dragon_banner\n\n\n\n\n\n\n\nChina is a mighty dragon, destined to rise and soar in an era of storm and thunder. A nation like this demands leaders of courage and conviction - only the strong are fit to bear great responsibility; only firmness can ensure survival and standing in the world. Weakness cannot defend the nation, concession cannot protect the people. We must stand tall, face the future with unwavering faith and iron will, and meet every challenge that lies ahead."
 PRC_the_chinese_century_category: "The Chinese Century"
 PRC_the_chinese_century_category_desc: "\n\n\n\n\n£GFX_PRC_chinese_century_banner\n\n\n\n\n\n\n\nOur nation is rich and glorious, but there is always room for improvement. If we truly want the "Chinese Century" to come, we must put in the work necessary for our China to rise and become a beacon of success and stability for the world to look up to."

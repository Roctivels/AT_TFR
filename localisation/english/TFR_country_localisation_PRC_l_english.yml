 PRC_to_die_that_china_may_live_prop: "§YPROPAGANDA:§! To Die That China May Live"
 PRC_to_die_that_china_may_live_prop_desc: "\n\n\n\n\n£GFX_PRC_to_die_that_china_may_live_banner\n\n\n\n\n\nThey perished so that China might endure;\nThey were extinguished so that the Chinese nation might be eternal.\nMay our very ashes forge an immortal epitaph.\nIf calamity ever befalls our people again,\nLet our blood once more soak the mountains and rivers."
 PRC_the_japanese_the_vile_seed_of_humanity_prop: "§YPROPAGANDA:§! The Japanese, the Vile Seed of Humanity"
 PRC_the_japanese_the_vile_seed_of_humanity_prop_desc: "\n\n\n\n\n£GFX_PRC_the_japanese_the_vile_seed_of_humanity_banner\n\n\n\n\n\nThey have never seen us as human.\nIn their eyes, we are less than livestock - \nBase as dust, humble as grass.\nIf this is so, then let us becomeThe deepest nightmare in their dreams,The retribution they dare not face forever."
 PRC_a_million_souls_a_nations_vengeance_prop: "§YPROPAGANDA:§! A Million Souls, a Nation's Vengeance"
 PRC_a_million_souls_a_nations_vengeance_prop_desc: "\n\n\n\n\n£GFX_PRC_a_million_souls_a_nations_vengeance_banner\n\n\n\n\n\nForged in five thousand years of blood and iron - \nWho dares forget, while the shame of our nation still burns?\nThree hundred thousand restless spirits await,\nAs the rising wind calls me once more to war."
 PRC_loyalty_is_life_prop: "§YPROPAGANDA:§! Loyalty is Life"
 PRC_loyalty_is_life_prop_desc: "\n\n\n\n\n£GFX_PRC_loyalty_is_life_banner\n\n\n\n\n\nWe do not retreat. We do not fall.\nIf these mountains and rivers are to burn,\nThen let us be the fuel for the fire."
 PRC_the_spirit_of_resistance_prop: "§YPROPAGANDA:§! The Spirit of Resistance"
 PRC_the_spirit_of_resistance_prop_desc: "\n\n\n\n\n£GFX_PRC_the_spirit_of_resistance_banner\n\n\n\n\n\nAfter vengeance, I may feel disappointment, emptiness, even madness.\nBut you - You will vanish from history,Forever erased."
 PRC_revolution_of_thought_prop: "§YPROPAGANDA:§! Revolution of Thought"
 PRC_revolution_of_thought_prop_desc: "\n\n\n\n\n£GFX_PRC_revolution_of_thought_banner\n\n\n\n\n\nWe shall forge a new kind of Chinese citizen - one who does not bow, does not compromise, does not forgive.\nWe shall shape a new national character - iron-blooded, cold-minded, and bound to vengeance.\nOnly by fully purging the weakness of old thinking\nCan the Chinese nation truly rise, step out, and strike back."
 PRC_vengeance_against_imperialists_prop: "§YPROPAGANDA:§! Vengeance Against Imperialists"
 PRC_vengeance_against_imperialists_prop_desc: "\n\n\n\n\n£GFX_PRC_vengeance_against_imperialists_banner\n\n\n\n\n\nYou have already sworn: from this day on, only we shall wield the power to inflict pain!\nChina will return every fear the foreign devils once carved into her heart - \nOne by one,\nWith interest."
 PRC_death_before_surrender_prop: "§YPROPAGANDA:§! Death Before Surrender"
 PRC_death_before_surrender_prop_desc: "\n\n\n\n\n£GFX_PRC_death_before_surrender_banner\n\n\n\n\n\nI die so the nation may live.\nWith calm I go, as the land mourns, the people grieve.\nLooking back, home is still far,\nAnd my parents I shall never serve again."
 PRC_national_unity_prop: "§YPROPAGANDA:§! National Unity"
 PRC_national_unity_prop_desc: "\n\n\n\n\n£GFX_PRC_national_unity_banner\n\n\n\n\n\nMothers call their sons to fight the Japanese,\nWives send their men to the battlefield."
 PRC_apotheosis_of_history_prop: "§YPROPAGANDA:§! Apotheosis Of Our History"
 PRC_apotheosis_of_history_prop_desc: "\n\n\n\n\n\n\n\n\n\n\n\n\n£GFX_PRC_apotheosis_of_history_banner\n\n\n\n\n\n\n\n\n\n\n\n\n"

 PRC_the_separatist_problem: "The Separatist Problem"
 PRC_the_separatist_problem_desc: "China's separatism has become a chronic problem troubling the central government for many years. Not only are the Uyghurs in Xinjiang and the lamas in Tibet seeking independence, but also the restless Special Administrative Region of Hong Kong and the "rebellious island" of Taiwan are making trouble.\n\nThe Chinese government has tried various methods, from conciliatory policies to harsh repression, to deal with separatists, but all have ended in failure. In addition, foreign interference has also complicated the separatist issues in different regions."

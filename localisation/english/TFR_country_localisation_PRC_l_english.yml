 PRCAFGRelationsStatus: "\n§YCurrent Chinese Ambassador to Afghanistan:§!\n\n\n\n\n\n\n\n\n\n£GFX_Zhao_xing_portrait\n\n\n\n\n\n\n\n§W              Zhao Xing§!\n\n\n[TAL.GetFlag]§gAfghanistan's§! Current §sEconomic Dependence On Us:§! [?PRC_afg_current_eco_dependence|G0%]\n[TAL.GetFlag]§gAfghanistan's§! Current §6Government Loyalty:§! [?PRC_afg_current_gov_loyalty|Y0%]"
 PRC_enviromental_policy_category: "Environmental Policy"
 PRC_enviromental_policy_category_desc: "A healthy enviroment is one of the most important parts of creating a healthy socialist society. Unfortunately, over the past 50 years of rapid development, the enviroment has been tossed aside in favor of unbridled growth and progress. As the new millennium dawned upon China, the Chinese people became pinfully aware of their poisoned rivers and skies, with mortaility rates rising in cities due to the millions of tons of cancerogenic chemicals that have been pumped into the atmosphere. With the threat of global warming looming over the nation, and the threat of the seas engulfing cities such as Shanghai and Tianjin, the country has started to move towards a healthier, greener, enviromental policy. However, a green future will not come easily. Economic growth must be sacrificed, and numerous reforms must be implemented. Yet if we do not confront the climate crisis, floods will consume the South while the Gobi will swallow Western China alive. An era of great calamity will engulf the Chinese Nation.\n\nCurrent Enviromental Reform Progress: [?PRC_enviromental_progress|=+1%]"
 PRC_chinas_liberalization_category: "Shaping the Future"
 PRC_chinese_liberal_economy_cat: "Liberalization of the Economy"
 #PRC_chinas_liberalization_category_desc: ""
 PRC_oil_crisis_category: "Solving the Oil Crisis"
 PRC_oil_crisis_category_desc: "The Oil Crisis stands as one of China's greatest obstacles in it's path to superpower status. By halting it's economic growth, employment, and thus it's main focal points of power, the Chinese nation is unable to develop itself further. Thus, the focus of the entire country must be turned towards solving this crippling problem as soon as possible in order to put us back on the track of development."
 PRC_coronavirus_category: "COVID-19 Outbreak"
 PRC_coronavirus_category_desc: "Due to a lack of regulation and incompetancy, a strand of COVID-19 has broken out in the city of Wuhan. Measures must be taken immediately before this situation becomes unmanagable.\n \nThe Current Status of the Outbreak is: [get_covid_status]"
 PRC_chinese_unity_category_desc: "In order for China to become the greatest world power once more and keep it that way, we must first become great in our own country. While this is true in many places like Han China or Manchuria, other places aren't so much like Xinjiang and Tibet, with some actively rebelling against us like Taiwan which seek to destroy China entirely! China must be unified in order to achieve greatness, §RNo Matter the Cost!§!"
 PRC_siberian_war_cat: "The Siberian War"
 PRC_siberian_war_cat_desc: "Siberia is perhaps one of the most resource rich regions of the world, yet lays largely uninhabited and unexploited. Robbed away from us in 1858 by the Treaty of Amur, it is time for the Chinese nation to have its full borders restored. With the Russian nation left weakened by its war with NATO, there is no better time than now to seize those lands.\n\nYet, we do not have the ability to wage an extended war over Siberia, nor is it likely that the populace support this war if it goes on for too long, thus this war, like all wars, §Rmust end eventually§!. In order to achieve absolute victory and establish hegemony over Siberia, we must hold §YIRKUTSK§! §RAND§! §YBIROBIDZHAN§!\n\n\n§RTARGETS§! :\n\n§YVLADIVOSTOK§! : [GLOBAL.get_vladivostok_status]\n§YKHABATOVSK§! : [GLOBAL.get_khabatovsk_status]\n§YBIROBIDZHAN§! : [GLOBAL.get_birobidzhan_status]\n§YIRKUTSK§! : [GLOBAL.get_irkutsk_status]\n\n§GALLIED CITIES§! :\n\n§YHULUNBUIR§! : [GLOBAL.get_hulunbuir_status]\n§YQIQIHAR§! : [GLOBAL.get_qiqihar_status]\n§YMUDANJIANG§! : [GLOBAL.get_mudanjiang_status]\n§YHARBIN§! : [GLOBAL.get_harbin_status]"

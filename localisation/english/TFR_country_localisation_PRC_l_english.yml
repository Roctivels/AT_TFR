 china.491.t: "Ma Yilong's Diary: Revolutionary Friendship"
 china.491.d: "Tonight, the moon shines bright along the California coastline. How I wish you could see it.\n\nCommissar Thomas Blackhawk and I shared a simple military ration - well, "shared" might be too strong a word. Really, it was just two men nearing fifty, crouched behind an armored vehicle, chewing on compressed biscuits by the sea breeze and moonlight. He seemed deep in thought, and I understood why - leading a unit with such a range of ideas is no small feat.\n\nFrom the distant camp, soldiers were gathered around a bonfire, singing the Internationale. It was fascinating to hear Chinese and English versions taking turns, occasionally interspersed with Spanish or Russian lines. Thomas confided that what worried him most was the unit's cohesion. Some dream of founding an anarchist commune, some aspire to parliamentary social democracy, and some even hung a portrait of Maupin on the armored vehicle. "How do I lead a group like this?" he asked. Glancing toward the campfire, I noticed Liu Xiaoyu teaching a young man - sporting a Makhno badge - how to say "comrade" in Chinese. Whatever the young man said in return clearly amused them both, and they burst into laughter.\n\nI tried to reassure Thomas, but he simply gazed at the distant waves in silence. I knew what was on his mind - being Native American, he understands better than anyone the tension between unity and diversity.\n\nWe'll continue north tomorrow, so I need some rest. But just as I closed my journal, I could still hear fragments of song drifting over from afar:"
 china.491.a: "Arise, ye prisoners of starvation..."
 china.492.t: "Ma Yilong's Diary: Enemy Attack"
 china.492.d: "It's overcast here in Northern California - or maybe just some godforsaken place.\n\nMy hands are still shaking. Andy Chen's blood has dried on my clothes, leaving a dark brown stain. He was only twenty-three, his whole life yet to begin, and then he just collapsed in front of me. Remembering the first time I saw him makes me want to slap myself. Back then, he was tending to a wounded militiaman with such care, as though handling something fragile. I recall rolling my eyes and muttering to someone nearby, "Look at him - acts like a girl."\n\nThis morning's assault came without warning. When the sniper's bullets started flying, he was the first to locate the shooter. I'll never forget that look he gave me. There wasn't a trace of the "softness" we used to tease him for - only unwavering resolve.\n\n"Let me go, Comrade Ma," he said, his voice quiet yet clear. "I'm the smallest; I'll be harder to hit." Those were his last complete words. I tried to protest, but he was already sprinting off. His slight figure zigzagged through the rain of bullets. He succeeded in drawing the enemy's fire, buying us the chance to strike back. But the cost... was his life, ebbing away with the bloody foam at his throat.\n\nNow the camp is silent, yet I can't sleep. I keep seeing him fall. He was so young, barely older than my kid brother. He could've chosen a safer path, far from this war, but he chose to fight for the revolution, laying down his life to protect me - a foreign officer who once looked down on him.\n\nI gathered what he left behind: a crucifix pendant, a medical handbook crowded with his handwritten notes, and a snapshot of him with another militiawoman. On the back of the photo, it says: "You are my love, forever."\n\nDawn is breaking, but I haven't slept at all. He left too soon, taking with him the apology I'll never get to say face to face."
 china.492.a: "Goodbye."
 china.493.t: "Empire Burning"
 china.493.d: "The salty wind of the Pacific swept across the scene, and the roar of smoke and flames illuminated the Golden Gate Bridge in the sunset, turning it a deep crimson. The entire bay seemed engulfed in blood. At the bridge's highest point, a massive Stars and Stripes flag fluttered stubbornly in the wind, darkened by artillery fire and dust. Its surface was torn, with countless holes and cracks, mirroring the bullet-riddled bridge. Two bold soldiers of the American People's Liberation Army were climbing the cables to the top, cheered on by their comrades below, who shouted at them to hurry.\n\nOn a cliff several hundred meters from the bridge, Chinese volunteer army commander Ma Yilong silently observed the scene below. He heard the rustling of footsteps as Commissar Chen Hao slowly made his way up the rocky path. The two men stood in silence for about ten minutes until two APLA soldiers managed to reach the top of the bridge.\n"Comrade, what are you looking at?" Chen couldn't help but ask.\n\nMa pointed toward the distant bridge. Chen moved closer and saw the two APLA soldiers using tools to cut the flagpole. The task was slow, hindered by the strong wind.\n\n"Look at these Americans," Ma said. "They're honest, brave, and always show courage when it matters. They're no different from the Puritans who crossed the Atlantic, the revolutionaries who protested British goods in Boston Harbor, or the Yankees who fought on the Noramdy beach with their chewing gum and chocolate. But now, it's these same people who are sentencing their ancestors' legacy to death."\n\nBy now, the two APLA soldiers had completed their task. They grabbed the corners of the tattered Stars and Stripes and threw it with all their might, sending the flag tumbling into the orange sea below. A louder cheer erupted from the bridge, and cameras clicked in unison.\n\n"...This was once a great nation - vast lands, dominance over the seas, cities filled with wealth. In its darkest moments, it showed more courage than the greatest empires. Yet, it couldn't escape extinction. Think of the past - Holland, France, Spain, and England. Which of them could avoid the same fate?""
 china.493.a: ""I fear that one day, someone might do the same to my country.""
 china.494.t: "Sputnik Moment"
 china.494.d: ""Deepseek," a tech company based in Hangzhou, Zhejiang Province, China, has created a stir in the technology and economic spheres with the launch of its new AI-powered large language model. This open-source model has exceeded expectations in computational performance, particularly in mathematics, coding, and natural language reasoning. In these areas, it rivals renowned AI models like ChatGPT. Even more astonishing is the cost: only around $5 million, according to the company's founder and president, Liang Wenfeng.\n\nThe news quickly spread beyond the tech field, sparking a media frenzy and political debate. Soon after, one of China's highest-ranking leaders, the Premier, met with Liang and invited him to contribute to the government's work report at a State Council meeting. Meanwhile, in the West, many are anxiously observing this technological achievement from a socialist country, reminiscent of the Soviet Union's launch of the first artificial satellite in 1957. Some senior Western scientists and politicians argue that since Deepseek's work is open-source and publicly available, it will benefit everyone and foster innovation within the AI industry. However, others suggest that China's achievements may not have resulted from "fair competition" and this country's censorship regime could limit AI's ability to think independently and enter the global market."
 china.494.a: "Paper-making, the compass, gunpowder - and now, artificial intelligence?"
 china.495.t: "The Machine That Governs"
 china.495.d: "The Tencent boardroom was silent. Party executives sat as they watched the presentation unfold. The numbers spoke for themselves. DeepSeek's dominance over Western AI alongside efficiency gains in automated governance meant the slow obsolescence of mundane oversight. China no longer needed to catch up. It was setting the standard.\n\nThe presenter, a thin man in a crisp black suit, moved through his slides as he spoke. "Urban planning models predict economic shifts before they happen. Automated resource allocation reduces waste to near zero. To reduce labor costs and sustain long-term learning efficiency, we need a system capable of streamlining mundane tasks and logistics at every level, from local councils to the highest ministries. We need a tool to guide us to a future where we can develop intelligent leadership for the Party."\n\nA technocrat leaned forward. "This is more than assistance. You are suggesting something that goes beyond an advisory position, it practically governs by itself."\n\nThe presenter nodded. "Yes, sir."\n\nA heavy pause filled the room. No one spoke, but no one dismissed it either.\n\nThe presenter continued, "The failures of human administration - corruption, inefficiency, mismanagement - the failure of our mission to liberate Taiwan has made them all well-documented. If a system could correct these, why should men stand in its way?"\n\nThe presenter clicked to the final slide. Two simple characters appeared on the screen. The future of China's development, they called it:"
 china.495.a: "The Long March - Chinese General Intelligence."
 china.496.t: "Multiple Nuclear Launches from India Detected"
 china.496.d: "Our early-warning system first detected missile signals originating from India in the early hours of the morning. Joint confirmation by our warning satellites and ground-based radar stations indicates multiple medium-range ballistic missiles carrying nuclear warheads.\n\nIt has been confirmed that the first wave, totaling 11 nuclear missiles, has already crossed the Himalayas. Based on trajectory analysis, these missiles are aimed at cities along our southwestern border. These missiles reportedly employ multiple independently targetable reentry vehicles, granting them the ability to evade interception. They are expected to reach their designated targets over a span of 25 to 40 minutes. The target cities are heavily populated areas and key industrial centers.\n\nFurthermore, military satellite surveillance has detected preparations for a second wave of missile launches within India. Intelligence suggests that this batch of missiles may carry higher-yield warheads, with a range capable of striking central and northwestern regions of our country.\n\nThe situation has reached its most critical juncture. This constitutes the first large-scale nuclear strike in human history since 1945. Should these missiles penetrate our defenses successfully, the catastrophic consequences will be unprecedented."
 china.496.a: "Destroy them!"
 china.497.t: "Sino-Indian Nuclear Annihilation"
 china.497.d: "As hostilities between China and India intensified, the Indian government - aiming to shift the balance of the conflict and gain strategic advantage - deployed nuclear weapons against multiple locations within China. Satellite imagery indicates that several inland Chinese cities, along with parts of Tibet and Xinjiang, have been subjected to nuclear strikes, prompting China to launch a strategic nuclear counterattack.\n\nCurrently, India's major urban clusters - including the Delhi capital region - have suffered devastating blows. More than 80% of cities across India are experiencing total failure of power grids, communications networks, major transport routes, and administrative systems. Major cities throughout India continue to burn, driving large numbers of refugees to flee toward southern coastal areas. Nuclear radiation monitoring systems show that radiation levels in most of India have reached lethal levels, and experts predict this catastrophic impact will persist for decades."
 china.497.a: "Terrible."
 china.498.t: "Outcome"
 china.498.d: "PLA Western T.C. Battle Report\n1. Situation Update\nFollowing the Indian Army's nuclear strike on our western border region, our forces immediately launched a strategic counterattack, effectively dismantling the core of India's military infrastructure and completing our strategic countermeasures.\n\n2. Enemy Losses\nOver 90% of the Indian military's key facilities - including command centers, military bases, and armories - have been destroyed. India's command system is in complete disarray, leaving it unable to conduct strategic operations. Critical infrastructure across India has suffered heavy damage: power grids and communication networks have collapsed, and central areas of major cities such as Delhi and Mumbai have been severely impacted. Preliminary evaluations indicate that India's active-duty forces have sustained severe losses, making effective military command impossible. Civilian casualty numbers are currently being assessed.\n\n3. Our Losses and Response\nSeveral of our western border and inland cities were hit by nuclear strikes, causing varying degrees of destruction. Casualty figures are being compiled. Local authorities have enacted full emergency measures in the affected regions, and rebuilding efforts are underway. The PLA and the People's Armed Police have been deployed for rescue operations, with medical teams conducting large-scale relief. During this nuclear attack, our civil defense infrastructure played a critical role.\n\n4.Strategic Assessment\nThis strategic counterstrike has effectively obliterated India's core military capabilities, curtailing its military ambitions. Our forces will remain on high alert to ensure national security.\n\nAll PLA officers and soldiers will continue to carry out Central Military Commission orders resolutely, safeguarding national security and the interests of the people. We must remain vigilant and ready to confront any emerging threats."
 china.498.a: "..."
 china.499.t: "Nuclear Weapons Have Been Launched at Our City!"
 china.499.d: "Highest Directive on Launching a Strategic Nuclear Strike Against Enemy:\n\nFollowing an emergency meeting of the Standing Committee of the Politburo of the Central Committee and in accordance with the powers conferred by the Constitution of the People's Republic of China, the Central Military Commission solemnly decides to immediately carry out a comprehensive strategic nuclear counterstrike against enemy, resolutely crushing Enemy's nuclear blackmail and safeguarding national sovereignty and the lives of our people.\n\nThe Rocket Force's strategic missile units will follow the established operational plan to conduct an extensive strike against the entirety of the enemy's territory. The first wave of nuclear strikes will focus on the enemy's political and military centers, command hubs, and key military bases, aiming to cripple the core of the enemy's command system in the shortest possible time. Throughout the operation, the Strategic Support Force will monitor strike effects and provide the Rocket Force with the data needed for a second wave of attacks will focus on precision strikes against critical infrastructure deep within the enemy's strategic rear areas, targeting industrial complexes, economic hubs, airfields, and logistical supply centers. All theater commands will move to the highest level of readiness, maintaining stringent surveillance of all enemy movements to maximize the effectiveness of the strikes.\n\nAll members of the armed forces must carry out this strategic task of defending national sovereignty and the safety of our people with unwavering resolve and the conviction of certain victory."
 china.499.a: "We'll get revenge!"
 china.500.t: "Dragon in the Sky"
 china.500.d: ""What do you mean 'critical segment missing?" In the Air Staff Office of the Ministry of Defense, the Chief of Staff of JASDF was holding a report and questioning his subordinate with an incredulous tone. This refined and usually courteous general rarely lost his temper, but today's extraordinary situation was pushing him beyond all norms.\n\n"Sir, the key parameters for this new model were recorded in a 2022 paper by an engineer from Chengdu Aircraft Corporation. However, our department's experts..."\n"I don't believe there's no one in this building who understands Chinese paper!" The Chief of Staff slammed the document on his desk. "Get someone who's studied in Taiwan!"\n\nMeanwhile, on the other side of the world, in a highly secured underground command facility in North America, a general in a blue uniform, adorned with a silver eagle and lightning insignia on his cap, was examining a photograph. This was intelligence gathered at the cost of one of the last remaining American spies abroad. The image showed a sleek, black, triangular aircraft soaring over Chengdu's skyline. The thumbnail in the upper-right corner revealed its smooth surface, distinctive three-engine design, massive bomb bay, and the complex electronic systems at the front.\n"This is the plane our Air Force has been dreaming of", the general thought, but then his mind turned to the ruins of Lockheed Martin and Boeing factories, destroyed in the civil war. He sighed heavily.\n\nMeanwhile, in the cafeteria of CAC, Chief Designer Academician Wang Haifeng stood on a makeshift podium made up by tables. Facing the crowds below, he raised a glass of orange juice and shouted, "Comrades, friends, brothers and sisters! Let's toast to the Party, to our motherland, and to ourselves, the heroic Chinese aviation workers!"\n\n"Cheers!" The response echoed as countless crystal glasses were raised in unison. The engineers, men and women of all ages, could no longer contain their excitement. Wang Haifeng, with a smile and tears in his eyes, looked at them. His thoughts drifted to the early days of the J-10 project, and his mentor, Song Wencong. In that moment, he imagined his mentor watching from above, smiling as he saw his student's creation soar in the skies of their homeland."
 china.500.a: "Now, it's time for others to catch up with us."
 china.501.t: "Northwest Situation Out of Control"
 china.501.d: "The PLA certainly did not wish to suffer from even more humiliation after the defeat in the Taiwan War, but the generals' worst nightmare had just come true. Though claiming to have the ability to suppress any rebel unit, the lame leadership of Xinjiang failed the expectations of the party and people, allowing his shock troops to be defeated in battle after battle, ending with the East Turkestan rebels taking control of Urumqi, while all he did was to cower in his office and escaping Xinjiang by plane as rebel units apporach the city.\n\nThere is not much choice left for us. Uyghur terrorists now dwell in households build by the party, while Kazakh, Kyrghiz, Tajik and Han Chinese civillians are being stripped of their rightful properties, fleeing east with carts laden with beaten-up elders and frostbitten children. We simply cannot allow Islamist maniacs to rip off another peice of our motherland and murder more of our loyal citizens, which is why the PLA is mobilizing along the edge of Xinjiang. They had just burned the olive branch, but we will burn their hope - the order is clear, no flags but the five-starred red flag within the autonomous region.\n\nThe rebellion shall be drown in steel."
 china.501.a: "The willows near the Hotel become green again. West of the Yangguan Pass you'll see no more of mine."

 #MSS PATH
 china.502.t: "Ignorance"
 china.502.d: "They always like to ask: "Who really holds power in China?"\n\nThis question has been asked for decades, but the correct answer has never surfaced. Some believe it's the Party. Some think it's the military. Others guess it's the technocrats, the business oligarchs. And a few, pitifully, cling to the words of a handful of intellectuals - grasping at fragments, trying to piece together so-called "cracks" in the system.\n\nEvery time they send someone in, they think they're well disguised. They speak perfect Mandarin, dress like us, eat like us. But we have no need to expose them - because their incompetence is far more effective than anything we could do. They go back and write reports, draft briefings, hold hearings, convinced they've captured some high-value lead. They quote each other, parroting the answers they most want to hear - like a flock of parrots locked in a conference room, endlessly repeating themselves.\n\nThey want to "undermine" us.\nWith what? With memoirs penned by defectors abroad? With think tank analysts who claim to "understand the Chinese system"? With professors who still cite decade-old newspaper articles? We sit in our offices flipping through their intelligence digests like reading a book report written by middle schoolers - earnest tone, foolish conclusions, riddled with errors, yet somehow stamped with"Highly credible source."\n\nWe don't need to stop them. We only need to watch as they continue to misjudge, continue to reach into a structure already rigged with traps. They long to see us collapse. But the truth is - we've never given them a single leverage point. And they don't even understand what we're laughing at."
 china.502.a: "They can never recognize their own ignorance."
 #china.503.t: "Jiankui Creates New Party"
 #china.503.d: "He Jiankui - the controversial scientist known for the "gene-edited babies" scandal - has made an unexpected return to the public eye. Not only has he appeared at several policy forums, but he recently announced the founding of a new political party at an academic seminar: the Technology-Inspired Party, a platform aiming to reshape national governance through the power of technology.\n\nIn his public speeches, He argues that societal stagnation stems from outdated institutions and moral codes that constrain scientific progress. He asserts that if China is to achieve true modernization and national rejuvenation, it must abandon what he calls "pseudo-moral constraints" on technology and restore science to its rightful place of leadership. He describes the Technology-Inspired Party as "a party of the future," advocating data-driven governance and experimental results in place of traditional values. Leveraging the controversy of his past, He casts himself as "a pioneer misunderstood by his era," and presents a bold image of technological revolution and disruption.\n\nAt first, most dismissed the new party as another short-lived technocratic experiment, destined to fade like the bureaucratic reformist alliances of the past. But He Jiankui, using the remnants of his influence in academic circles, began actively participating in university forums and private salons - connecting with a new generation of young scientists and innovators. Through personal networks and insider referrals, he also established quiet but solid links with officials inside select government units. This dual strategy - at once high-profile and underground - gradually drew in a previously hesitant bloc: emerging tech entrepreneurs, research institute scholars, and pro-technology bureaucrats within the system. Together, they've become the core base of support for the Technology-Inspired Party."
 #china.503.a: "A political party... led by a scientist?"
 china.503.t: "unused"
 china.503.d: "unused"
 china.503.a: "unused"
 china.504.t: "A Scientist's Proposal?"
 china.504.d: "At a "Science and Technology Symposium" organized by the Party's Central Committee, a proposal authored by several senior researchers from the Chinese Academy of Sciences was delivered to the core decision-making circle. They advocated for the implementation of a "technocrat system" - a governance structure in which scientists enter the heart of national administration and experimental logic guides executive judgment.\n\nAmid this somewhat predictable call for reform, it was He Jiankui's speech that sparked the greatest controversy. Rather than reiterating his peers' institutional visions, he made a far more direct - and radical - proposition: Science, he declared, should no longer be constrained by ethics. Experiments, he argued, must be freed from traditional limits. He called for the establishment of designated zones where "select scientific personnel" would be granted institutional immunity, allowing them to conduct extreme scientific experiments free from conventional ethical restrictions, all under state supervision.\n\nHis remarks brought the meeting to a momentary halt. Some conservative scholars voiced strong opposition, warning that such a move could shake the moral foundations of the nation. Yet many younger scientists expressed support, arguing that China's lag in the global scientific race stems precisely from the restrictive and outdated regulations that bind researchers'hands.\n\nIn the end, the symposium produced no official conclusion. However, once He Jiankui's remarks and the accompanying proposals were forwarded to the Central Scientific Policy Committee for review, the committee resolved that..."
 china.504.a: "Jiankui may have gone too far."
 china.504.b: "But we can't afford to fall behind any longer."
 china.505.t: "Fiscal Affairs"
 china.505.desc: "The Central Financial and Economic Affairs Commission has recently received a proposal from the Ministry of State Security recommending that a portion of the upcoming national research budget be diverted from conventional allocation mechanisms and reserved for strategic investments in military-related domains. Personally authored by Chen Wenqing, the report emphasizes the urgent need to strengthen capabilities in the armed forces, intelligence networks, and cybersecurity. The funds would be directed toward elite counterintelligence training, next-generation cyber warfare systems, and other initiatives described as "undisclosable but essential to prepare in advance." The report is sharply worded, stating: "The nation must not waste resources on fanciful ideals of education. In the current climate, what we need more than science is control, information, and defense."\n\nThe proposal has drawn opposition from segments of the scientific and educational community. Several academicians from the Chinese Academy of Sciences submitted a joint petition urging the state not to "undermine its own foundations in the name of risk aversion." They argued that long-term investment in education is the true basis of strategy, not a temporary fix. As a counterproposal, they advocated for a nationwide public science education initiative to foster broader public understanding and trust in emerging technologies - thereby reinforcing internal resilience.\n\nHe Jiankui submitted a third alternative. He called for resources to be prioritized for "ambitious and intellectually exceptional students," granting them direct access to the nation's core experimental projects. His vision includes establishing fast-track pipelines between military academies, elite universities, and specialized laboratories, shaping a future "vanguard strike force" in national research. In his proposal, general education funding would be "restructured" to support a "high-risk genius identification and development system."\n\nNow, all three proposals are on the table. Whichever is chosen will define the nation's fundamental stance on the future of security and scientific development."
 china.505.a: "Comrade Chen Wenqing is right."
 china.505.b: "The scientists' proposal might be better."
 china.505.c: "He Jiankui's plan appears more promising."
 china.505.d: "Everything is fine as it is."
 china.506.t: "Born of Technocratic State"
 china.506.d: "In recent months, the expansion of urban redevelopment projects has led to the marginalization of large numbers of low-income individuals who once survived on informal, short-term labor. Following the launch of several major construction initiatives and the demolition of aging urban districts, a growing population of "urban drifters" has emerged, surviving on the outskirts of cities. Without stable shelter, many have taken refuge under overpasses, in abandoned construction sites, or on the fringes of research parks. While not malicious lawbreakers, under the current social order, their existence offers neither contribution nor integration - and they have increasingly begun to interfere with critical infrastructure.\n\nThis issue has evolved beyond a simple matter of "public security." It now presents a concrete challenge in national resource allocation and the management of structurally marginalized populations. The central government currently faces two primary proposals for resolution:\n\nThe first, submitted jointly by the People's Liberation Army and the defense industry, is a "Reemployment Mobilization Plan." It advocates transferring able-bodied drifters into labor roles within the military-industrial system, assigning them low-skill tasks under closed supervision with centralized housing and regimented oversight.\n\nThe second, proposed by a scientific research task force, suggests that - under strict contractual guidelines and health screening - these individuals be permitted to participate in early-phase pharmaceutical trials, neurological response data collection, and other high-risk but high-yield experimental research programs. The plan offers compensation above the minimum wage and basic medical coverage to attract voluntary participants, while establishing "technical auxiliary posts" as transitional roles for providing non-specialist support to research institutions."
 china.506.a: "The first plan seems more viable."
 china.506.b: "The second plan might be a good alternative."
 china.507.t: "Loyalty to the Party"
 china.507.d: "Jia Qiming had long lost track of how many nights it had been. He sat on the cold iron chair, his fingers withered like twigs, his nails filled with traces of dried blood. He couldn't remember when he last had a meal; his mouth held only a bitter, sour taste. The Ministry of State Security interrogator sat on the other side of the table, uniform neat and buttoned to the top, flipping through the confession that Jia had signed countless times.\n\n"Jia Qiming, you still have things you haven't confessed." The interrogator's voice was steady, like reading meeting minutes.\n\nJia Qiming trembled violently, shaking his head desperately. "No more, comrade, I've told everything I can remember. Who gave me money, who sent me women, who helped me launder money - I wrote it all down. I..."\n\nThe interrogator cut him off, continuing, "You have even more serious issues. The organization believes that you are not only corrupt, but you also betrayed the Party, betrayed the people, and betrayed the motherland." Jia Qiming froze, his mouth hanging open, speechless like a mute.\n\nSeeing his lack of response, the interrogator pressed the button on the table. Two men in black uniforms quickly appeared at the door."Take him to the next room," the interrogator ordered.\n\nJia Qiming suddenly fell to his knees, his voice hoarse. "No! Comrade! Please! I... I confess, I confess! I admit everything! I admit I betrayed the Party, betrayed the people, betrayed the motherland! I am no human, I'm an animal! I'm a traitor! I admit all my crimes!"\n\nThe interrogator handed him a piece of paper. "Write it down. Sign it. Press your fingerprint."\n\nJia Qiming took the paper, his hand shaking so badly he could barely write, mumbling like a madman, "I confess... I betrayed... I willingly accept any punishment... I deserve to die... I deserve to die..."\n\nThe interrogator took the paper, glanced at it."
 china.507.a: ""Very good. Thank you for your cooperation.""
 china.508.t: "Internal Report of the Ministry of State Security"
 china.508.d: "I. General Situation\nThrough our work, it has been discovered that in multiple cities across the country, there are illegal organizations established under the banners of "equality," "diversity," and "sexual minority support." These organizations operate with wide coverage and high frequency. They have long been manipulated by foreign hostile forces and have preliminarily formed loose, networked structures with strong mobilization capabilities and discourse dissemination abilities.\n\nII. Investigation Findings\n(1) It has been confirmed that several major organizations have received funding from NGOs and foundations based in Japan, Australia, and India. The forms of funding include overseas electronic wallets, small and dispersed transfers, and virtual currencies, exhibiting typical characteristics of anti-surveillance and covert money laundering.\n(2) In addition to so-called "gender equality" and "promotion of multiculturalism," these organizations have been involved in disseminating inflammatory political rhetoric, promoting Western "universal values," and cooperating with foreign forces to undermine ideological security.\n(3) Some members have been recruited by foreign intelligence agencies, participating in intelligence collection, subversion guidance, manipulation of social events, and other activities. Some organizations have been used to provide cover and liaison convenience for the deployment of personnel and development of agents by foreign forces within our territory, posing serious national security risks.\n\nIII. Disposal Measures\nAs of now, our department has lawfully banned 23 illegal organizations, closed over 150 related social media accounts and websites, confiscated more than 4,800 illegal publications and propaganda materials, lawfully summoned and warned 267 key individuals, placed 43 involved persons under criminal detention, and completely frozen all related foreign funding accounts."
 china.508.a: "A bunch of Western cynics."
 china.509.t: "Little Lhasa"
 china.509.d: "Solang sat in his small rented room, holding a cup of weak tea. Outside, the sky over Dharamsala was gloomy, and the wind from the mountains carried a damp chill, making the window creak. He had been here for three years. As an intelligence officer successfully embedded, he had now become a figure of some standing. He could participate in many key meetings, and many people saw him as a trustworthy compatriot. His identity was clean, without flaws. He was used to lying, used to weaving a web of deception.\n\nBut he never forgot who he was.\n\nIn the depths of night, he would sometimes close his eyes and recall those days of training at the Ministry of State Security's secret base. Back then, he was just a name, a number. He remembered the instructor telling them: from this day forward, you have no past, no name, only the mission, only the motherland. Those words were etched in his memory. They were nameless shadows, destined to leave no trace. But he knew, the Republic would not forget them. They were the Republic's hands, the Republic's eyes.\n\nAt that moment, a knock came from outside the door. He stood up alertly, his hand instinctively reaching for the silenced pistol under the table. It was his comrade Renqing's voice, speaking low: "Solang, meeting. A big shot from the Indian side is coming today, the office has notified us all to be there."\n\nSolang took a deep breath and slipped the recorder on the table into his pocket. He checked his expression, returning to that gentle, loyal Tibetan cadre appearance.\n\nHe opened the door and followed Renqing into the night."
 china.509.a: ""Nameless hero.""
 china.510.t: "The Insider"
 china.510.d: "Hong Kong's nights are always lively. Neon lights cast all kinds of colors into the narrow alleys, and streams of pedestrians flowed endlessly. No one would pay attention to a middle-aged man carrying a backpack and wearing a baseball cap. Lin Jianzhong crossed Nathan Road and entered Chungking Mansions. The air here was thick with a mixture of curry, sweat, spices, and oil fumes.\n\nThere were still many Indians and Pakistanis in the lobby, but noticeably fewer than when he had last been here a few years ago. Lin Jianzhong's gaze swept across the surroundings without revealing emotion. He was used to this kind of caution. Especially today - the person he was meeting had a sensitive identity, an old contact from India responsible for organizing resistance activities along the Sino-Indian border.\n\nThey arranged to meet in a small hotel on the ninth floor of the building. The kind of place that only accepted cash, asked no questions, kept no records. In theory, what they discussed would leave no trace. He pressed the elevator button. The elevator was so slow it felt like scrap metal from the last century, creaking all the way. Before entering, he glanced around - nothing unusual, or so he thought. Reaching the ninth floor, the corridor reeked of damp mold. He knocked twice on a door, and a thin Indian man opened it. Inside, a dim lightbulb flickered above a table covered with maps, documents, and a pot of cheap tea.\n\nThe Indian smiled and handed him a dossier - the latest recruitment plans and routes. They spoke in hushed tones, discussing how to infiltrate mountain regions, how to exploit local ethnic tensions, how to cover for training camps.\n\nLin Jianzhong listened while jotting down key points in his notebook. He worked with focus, unaware that from the building opposite, behind a darkened window, a camera lens was quietly aimed at their room.\n\nEven more so, he didn't notice that from the moment he entered Chungking Mansions, his face, the floor he selected - all had been recorded."
 china.510.a: "Lin Jianzhong merely had a vague sense that something was wrong."
 china.511.t: "Integrity"
 china.511.d: "Wang Jidong sat in his office, staring at the heavy fruit box on his desk. When he opened it, beneath the fruit was a neat stack of cash, freshly withdrawn from the bank. He knew which company had sent it - that mining company, the one whose project approval was still stuck on his desk. Wang lit a cigarette, his heartbeat quickening. This wasn't the first time he'd faced such a situation, but this time, he hesitated. He knew what this money meant. He also knew what it would mean to take it. In the past, small officials like him would shut the door, turn a blind eye, and life would go on.\n\nBut things were different now. He had heard about a department head in Zhangye City last month who took a bribe, was still laughing at a dinner party the next day, and by the third day, vanished without a trace. There was also that newcomer in the finance office - rumor had it they'd been interrogated by state security for nearly two months, broken to the point of crawling on the floor begging for mercy.\n\nWang touched his neck, as if taking this money would make him the next to disappear. He sat for a while longer, then gritted his teeth and pushed the box of money aside. He opened his computer, logged into the internal network, and filled out the whistleblower report. For him, sending this to the discipline inspection commission was the safest move. At least he could still live in peace. At least he could still sleep at night.\n\nAfter filling out the form, he clicked submit. The screen flashed, and a notification popped up: "Submission Successful."\n\nHe took a deep breath, stood up, and poured himself a cup of Sanpao tea. In the reflection of the water cup, his face looked a bit blurred and extremely haggard. He muttered to himself, as if reminding himself:"
 china.511.a: ""Don't entertain thoughts you shouldn't have.""
 china.512.t: "Paranoia"
 china.512.d: "Fu Chenghuai had been sleeping worse and worse lately.\nHe was once an associate professor in the philosophy department at Shanghai Jiao Tong University, eloquent on the podium, adored by young students. But all of that changed when he discovered he was being watched. Fu Chenghuai began to withdraw from people, locking himself in his apartment, sealing every power outlet with tape, even covering the windows with heavy black curtains.\n\nUntil one rainy night, he was wandering along the Bund, drenched to the bone, shouting: "They're watching me! They've always been watching me! In the cameras above your heads, in your own homes!" His hair was a mess, his beard unkempt, his bloodshot eyes wild. Those who once knew him - colleagues, students - now only looked at him as they would a madman.\n\nLater, his family took him away. They sent him to a psychiatric hospital, dressed him in white patient clothes, forced him to take medication. Four white walls. Even in his dreams, there were countless pairs of eyes. But he never quieted down. He lectured in the corridors, argued in the wards. He told anyone who didn't want to listen: "You think I'm crazy? No. I see it clearer than all of you!"He became a pitiful joke, a discarded man of society.\n\nWith his family's company and treatment, Fu Chenghuai seemed to gradually return to a "normal" track. The doctors repeatedly explained to him that paranoia was merely a prison woven by the mind under extreme pressure. He tried to believe these explanations. Maybe he really was ill. Maybe, he had truly been mad. Maybe, it had all been a misunderstanding of his own making.\n\nOne night, sleep finally came over him. He lay on a soft pillow, his breathing steady, his eyelids slowly closing. The sound of rain tapped against the windowsill, as if the world had finally let him go.\n\nBut outside the window, unseen by him, clinging to an inconspicuous air conditioner unit, a tiny red light continued to blink in the darkness."
 china.512.a: "They were always watching him."
 china.513.t: "Project SY-03"
 china.513.d: "Principal Investigator: Xinyala Facility\nReport Date: Classified\n\nI. Background\nWith the increasing demand for asymmetric warfare and urban infiltration missions, traditional agents and operatives have gradually revealed various shortcomings under "high-density surveillance environments." This project aims to transform marginalized populations into "controllable personnel" through psychological reconstruction.\n\nII. Test Subjects\nA total of 312 homeless individuals were recruited, all without family, social ties, or clear identity records. After signing consent forms, they were transferred to the facility.\n\nIII. Experimental Procedure\nPhase One: Personality Stripping\n96 hours of continuous noise and light stimulation to deprive sleep and sensory stability.\nRepeated infusion of "self-denial" verbal commands to reinforce doubts about personal existence and value.\nApplication of unpredictable punishments to disrupt the subject's normal understanding of "cause and effect."\n\nPhase Two: Reshaping\nAdministration of SSRIs and NMDA antagonists to impair prefrontal cortex function.\nPassive hypnotic training to condition responses to key command words, triggering an automatic "execution state" upon command.\n\nPhase Three: Operational Testing\nSubjects placed in high-pressure scenarios (simulated assassinations, demolitions, hostage situations).\nUpon activation by key commands, the efficiency and destructiveness of task execution were assessed.\n\nIV. Results and Evaluation\nOut of 312 subjects, the first batch of 30 achieved "complete execution state," showing no response to self-inflicted damage and exhibiting high-level assault and self-destruction capabilities.\nAmong them, 18 successfully completed their missions and self-destructed in the operational simulation.\n11 failed to self-destruct due to insufficient target stimuli and were manually terminated.\nRemaining individuals entered a state of "behavioral disorder" and were retrieved after losing operational value."
 china.513.a: ""Reviewed.""
 china.514.t: "Low-Altitude Didi"
 china.514.d: "With the advancement of urban air mobility technologies, multiple cities across China have begun promoting electric vertical takeoff and landing vehicles (eVTOLs), signaling the gradual commercialization and integration of this emerging mode of transport into daily commuting.\n\nIndustry insiders note that one of the key drivers accelerating eVTOL adoption is its significant advantage in operational costs. "Maintaining a helicopter for a year can cost nearly ten million yuan, whereas the overall maintenance cost of an eVTOL is almost negligible - apart from the battery," said Xie Jia, a representative from Eastern General Aviation.\n\nThis cost gap is directly reflected in ticket prices. According to estimates by Eastern General Aviation, once eVTOL operations scale up, a one-way ticket from Shenzhen to Zhuhai could cost between 90 and 120 RMB per seat. This positions eVTOLs as a viable and competitive alternative in the short-haul intercity commuting market.\n\nCurrently, pilot routes are being developed in cities such as Guangzhou, Shenzhen, and Shanghai, alongside efforts to strengthen low-altitude airspace management and supporting infrastructure. Analysts believe that although eVTOL commercialization is still in its early stages, progress in policy support, technological maturity, and cost control could allow eVTOLs to gradually reshape the landscape of short- and medium-distance urban travel in China over the next few years."
 china.514.a: "It's hard to imagine what the future will look like."
 china.515.t: "Weaving the Web Above the Clouds"
 china.515.d: "Recently, cities across the Pearl River Delta - Shenzhen, Hong Kong, and others - officially launched the "Tengyun" aerial transit system, marking the dawn of the flying car's full-scale deployment. Once hailed as a technological miracle destined to transform human mobility, this innovation now more closely resembles a state-engineered system of precision social control. Unlike the soaring freedom imagined in science fiction, "Tengyun" is no universal flight privilege, but rather a tightly regulated public aerial transport network. Passengers must pass multiple levels of verification to obtain a travel permit.\n\nThe "Tengyun" routes are far from citywide. Instead, they form a narrow circuit linking central business districts, government agencies, and major tech corporations. While officials claim the project alleviates traffic congestion and enhances commuting efficiency, insiders suggest its origin had little to do with public welfare. Its deeper intent lies in enabling precise surveillance and management of key population groups - building a controllable web in the skies.\n\nOn the surface, "Tengyun" appears to be an innovative solution to transportation woes. In reality, it's a stopgap measure by local governments to mitigate the collapse of land-based fiscal revenue. As income from land sales dwindles, authorities have turned their eyes to the underdeveloped low-altitude airspace. By constructing aerial car tracks and associated infrastructure, they have effectively created and sold airborne "real estate," luring in private investment and propping up strained public finances.\n\nIn its early stage, however, "Tengyun" services are limited to research institutes, state-owned giants, and government personnel. For ordinary citizens, access requires the purchase of high-priced permits. As one taxi driver lamented, "This system was never meant for people like us.""
 china.515.a: "At the very least, the dream of flying cars has finally landed."
 china.516.t: "The End of the Gaokao Factories"
 china.516.d: "In a decisive move, the Ministry of Education has forcibly shut down No. 2 Middle School in a certain region of Henan - once hailed as a "Gaokao factory" and a fortress of exam-oriented education. According to newly implemented policies, any school that continues to enforce excessive hours or engage in high-pressure training methods will be completely barred from enrolling new students.\n\nFor years, this school boasted one of the highest college admission rates in the province, yet it was also plagued by recurring cases of student self-harm and suicide. One recent case shook the nation: a student who jumped to their death outside campus left behind a letter - "I sleep only five hours a day. My mom monitors my QQ chats and GPS. My teacher says if I don't get into a second-tier university, I'm trash..." In defense, Principal Qin stated, "We're just instilling a sense of competition so the children can better adapt to society." Yet according to a psychologist, the majority of students at the school showed signs of severe depression: "In school, they're machines grinding through practice tests. Outside, they're frantically searching for escape online - even forming suicide support groups."\n\nA new administrative task force has since been deployed to conduct a nationwide inspection of similar institutions. Scientific research increasingly affirms that high-pressure education can impair brain development and cause lifelong cognitive damage. This is not education - it is destruction.\n\nSome parents have voiced strong opposition to the shutdown. One parent pleaded on Douyin: "If our kids don't learn to endure hardship, how will they get into a good university? While others are still fighting hard, are we just giving up?""
 china.516.a: "We may lose a few Tsinghua and Peking University admits - but we've saved countless young lives."
 china.517.t: "Designing Life"
 china.517.d: "The State Council has recently released the National Gene Optimization Technology Development Plan, and with it, China's first gene-editing hospital - the Northern Center for Superior Birth - has officially opened its doors in Beijing's Haidian District. With its sleek design and futuristic ambiance, the facility feels more like a cutting-edge tech exhibition hall than a traditional medical institution.\n\nThe center's director proudly introduced visitors to their CRISPR Max platform: "We offer customizable genetic combinations for future children, including enhanced emotional intelligence, modified physical features, and improved memory and learning capacity." Among the most popular services are the "Academic Elite Gene Package" and the "Aesthetic Customization Experience," priced between 1.7 million and 20 million RMB.\n\nIn the consultation hall, Ms. Deng from Haidian browsed ideal genetic options for her baby: "Now that the state supports it, why not give our child the best possible start? Everyone in our neighborhood is opting for IQ enhancement - we can't fall behind." Another man remarked, "My family has a history of nearsightedness. If we can erase that flaw, why not? It's no different from getting a vaccine."\n\nThe international response has been swift and severe. Scientists from multiple countries warned that this step is akin to opening Pandora's box. The European Union has since announced a ban on all collaboration and personnel exchanges related to such technologies."
 china.517.a: "China has taken the first step into the future."
 china.518.t: ""Yinglong" Exoskeleton Development Program"
 china.518.d: "1st Volunteer Experiment\nSubject: Death row inmate\nOutcome: The results were less than ideal. After spinal replacement, the subject did not show the expected improvement in reflexes. Instead, responses to external stimuli were sluggish. The cause is under investigation.\nDisposition: In accordance with the agreement, the death row inmate's sentence will be commuted to life imprisonment. He will permanently reside at the research facility and perform assigned manual labor.\n\n......\n5th Volunteer Experiment\nSubject: Death row inmate\nOutcome: As with the previous two tests, the subject demonstrated extraordinary destructive power, but the enhancement in reflexes was minimal. The exoskeleton's energy consumption was significantly higher than the simulated expectations. The cause is under investigation.\nDisposition: In accordance with the agreement, the death row inmate's sentence will be commuted to life imprisonment. He will permanently reside at the research facility and serve in limited security duties.\n\n......\n20th Volunteer Experiment\nSubject: Homeless volunteer\nOutcome: After spinal replacement, the subject was instructed to deploy the torso protective plates. In response, the subject, visibly horrified, forcibly tore out the replaced spinal unit along with its connecting organs. The cause is under investigation.\nDisposition: Clean up the scene - it was so bloody that no one in the lab could stomach meat for the rest of the day. Also, remind Wu to put away his pet snake; no one wants to see anything that moves like that again.\n\n......\n28th Volunteer Experiment\nSubject: Death row inmate\nOutcome: The subject's reflexes and destructive capabilities far exceeded normal human standards. Protective plates for the chest, abdomen, and back could be deployed from the mechanical spine within 0.8 seconds. The system was able to release various hormones (such as adrenaline) and painkillers at the subject's will. This prototype meets the required standards and is currently under review for military acceptance.\nDisposition: In accordance with the agreement..."
 china.518.a: "He will serve in a special forces unit, with sentence reductions based on merit."
 china.519.t: "The Future of the Republic's Eldest Son"
 china.519.d: "China has officially announced a critical breakthrough in controlled nuclear fusion technology, with pilot applications already underway in the northeastern region. This development marks a pivotal milestone in the nation's energy history and presents a renewed opportunity for revitalization in the Northeast, long burdened by dual challenges of energy scarcity and environmental stress.\n\nAccording to the Ministry of Science and Technology, the first fusion reactor units have been deployed in Siping and Liaoyuan, operating stably for over six months with conditions described as "controlled and efficient." On this foundation, authorities have launched a regional overhaul of the power grid, promoting full electrification. The three northeastern provinces have now largely overcome winter energy shortages, achieving stable urban and rural heating. In some areas, pilot programs for summer cooling via electric power have also begun.\n\nIndustrial transformation is already underway. Thanks to the low-cost, high-capacity electricity provided by nuclear fusion, industries such as electric vehicles, rail transit, and high-energy manufacturing are accelerating their shift toward the Northeast. A local economic planner stated that the power bottleneck that once constrained growth "has been completely removed." Official reports note that "the Northeastern industrial belt is entering a new phase of structural transformation."\n\nSimultaneously, the drop in energy costs has spurred advancements in seawater desalination and agricultural technologies. In cities like Daqing, Yichun, and Qiqihar, multiple underground agricultural zones have been established. Utilizing high-density lighting and intelligent temperature control systems, these facilities support year-round production and fully enclosed cultivation. Researchers believe this model could ease winter agricultural supply pressures in northern China and offer new solutions for food security under extreme climate conditions."
 china.519.a: "Beneath the ice and snow lies fertile ground."
 china.520.t: "All the Tomorrows"
 china.520.d: "In Guiyang, the capital of Guizhou Province, the International Convention and Exhibition Center Tower 201 recently hosted a global science forum themed "The Future of Humanity and Scientific Governance." The event drew scientists, thinkers, and policy researchers from various Chinese research institutions, former U.S. territories, South America, and CIS countries. Over several days, participants engaged in discussions on future societal structures and technology-led systems of governance.\n\nTopics covered during the forum ranged widely, including artificial intelligence, gene editing, and demographic shifts. One of the most prominent discussions was a roundtable dialogue on "The Role of Technological Rationality in Social Organization," featuring Nick Land - well-known for his theory of "Dark Enlightenment" - and He Jiankui, the controversial figure behind the first gene-edited babies.\n\nAccording to video footage from the event, Nick Land argued that traditional political systems are no longer capable of responding to the complexity brought about by exponential technological change. He proposed a triangular model for society, with scientists at the apex, responsible for long-term decision-making and strategic direction; below them, a bureaucratic execution layer to implement and adapt policies through technical means; and at the base, the general public, engaged in foundational labor and social cooperation.\n\nThough the proposal remains theoretical and lacks a concrete implementation framework, the question it raises - "Who should determine the future direction of humanity?" - has sparked widespread interest within academic and policy analysis circles. Many in the scientific community view this proposal as a reflection of deep contemplation on post-democratic models of governance and predict it could influence how some nations shape future science policy and social architecture."
 china.520.a: "My eyes have already seen the future."
 china.521.t: "Across the Land and Sea"
 china.521.d: "China has officially announced that its super high-speed rail project has completed a key phase of manned testing, marking a significant breakthrough in the real-world deployment of ultra-high-speed magnetic levitation transport technology. The tests were conducted on two lines - one in the northern inland region and another along the southern coast - both successfully completing full-route operations with stable passenger transport.\n\nAccording to the Shanxi Super High-Speed Rail Laboratory, the Datong - Taiyuan - Yuncheng line underwent multiple round-trip tests under complex terrain and climate conditions. The trains reached speeds close to 700 kilometers per hour, far surpassing conventional high-speed rail limits. Travel time from Datong to Yuncheng was reduced from roughly five hours to under one hour at peak efficiency.\n\nMeanwhile, the Sanya - Haikou - Zhanjiang line, tested by the Guangdong - Hainan Super High-Speed Rail Laboratory, focused on operational performance under high humidity and coastal weather conditions. Data from several rounds of manned testing conducted ahead of typhoon season showed stable performance without systemic faults. The line links Hainan Island with cities in western Guangdong and is expected to significantly ease maritime and overland transport pressure while promoting regional economic integration.\n\nMao Kai, head of the super high-speed rail project at the China Aerospace Science and Industry Corporation, stated that the success of this experimental phase demonstrates the technology's readiness for commercial deployment across diverse environmental conditions. The next stage will focus on optimizing hub station construction along the routes and accelerating ticketing systems and safety evaluation processes. Preliminary plans indicate that within the next ten to fifteen years, the super high-speed rail network will expand progressively from the southeastern coast into key regions of central and northwestern China."
 china.521.a: "With our own hands, we have built the future."
 china.522.t: "Chinese Academy of Sciences(CAS) Calls for Increased Education Funding"
 china.522.d: "Recently, CAS released a report in Beijing, calling on the state to substantially increase the investment in education, in order to deal with the urgent needs of scientific and tech innovation and talent training. The report points out that China's education expenditure as a percentage of GDP has long been lower than the level of developed countries and even some developing countries. CAS experts emphasized that education is the cornerstone of the rise of China, the current artificial intelligence, communications engineering and other cutting-edge areas of fierce competition, the shortage of talent is increasingly evident, China needs to increase investment in education, especially higher education and scientific research and training.\n\nThe report also mentioned that China's cybersecurity problem is getting more and more serious, and the country should focus on investing in cyber defense education, not only to improve the patriotism of students, but also to train a large number of cybersecurity talents, in order to tighten the data monitoring and prevent the leakage of national information.\n\nThe Ministry of Education quickly posted a statement of accepting cooperation, and announced that it would soon carry out drastic reforms internally, and significantly improve the quality of education externally, so as to make the most adequate talent reserve for the rise of the nation and the security of the country at all times."
 china.522.a: "The Next-Generation Great Firewall is incoming!"
 china.523.t: "Shattering the Mask of Moral Hypocrisy"
 china.523.d: "At first, no one noticed the vagrants in the city disappearing. The beggars at subway exits were gone, the blankets and rags under bridges vanished, no more news of people freezing to death, no more volunteers posting calls for help. People assumed the policies had tightened, or perhaps the clean-up operations had become more discreet. No one really asked where those people had gone.\n\nAt the same time, research institutions began announcing breakthrough results. A cancer vaccine with a higher cure rate entered Phase III trials, and a gene-editing technology was said to have broken through ethical lines once deemed uncrossable. The media reported these developments in an upbeat tone, as if the world was entering a brand new era.\n\nSome reports only lasted a few hours before being taken down. The accounts of those who discussed these experiments on social media were quickly deleted, their posting history wiped clean. The rest stopped talking altogether. There was no need to, really - no one cared. In the suburbs, some old prisons quietly changed their purpose. Where once they held death row inmates, now there were electronic fences, and trucks came and went. No one knew what went on inside, and no public records mentioned any change in that area.\n\nPeople gradually grew accustomed to this new order. The cities were cleaner, society quieter, technology more advanced. No one asked about the missing vagrant anymore, or the death row prisoner who had been "relocated." They had once existed briefly, and then, as if they'd never been there at all, they were gone.\n\nNew treatments rolled out for civilian use, life expectancy rose, mental illness rates dropped, and the TV played ads about science changing lives. In offices and homes, conversations slowly shifted from "Where did they go?" to "How long can we live?""
 china.523.a: "Nothing happened."
 china.524.t: "Brain in a Vat"
 china.524.d: "At 7 a.m., Lin Chengyu woke up. Sunlight slipped through the gap in the curtains, falling softly onto her white cotton blanket. She put on her cozy loungewear and brewed a cup of coffee, the familiar aroma filling the apartment. Outside the living room window stood a row of cherry blossom trees, their flowers blooming just right - exactly the same as yesterday.\n\nBut there was always a strange feeling lingering in her heart. She worked at a publishing house - a stable job, a routine life. Yet at some point, she began to feel the world around her wasn't quite real. On the subway, she always saw the same unfamiliar yet oddly familiar faces. At work, her colleagues spoke the same small talk, as if forever stuck in a repeating loop of dialogue.\n\nUntil that day, when she was walking home from the office, she noticed the signboard of the corner convenience store suddenly "flicker" - like a TV screen losing its signal, distorting for a brief moment. No one noticed. Everyone kept walking, kept chatting, as if nothing had happened.\n\nShe started trying to break the pattern - took different routes, stopped riding the subway, ignored phone calls. She tried to walk out of the city's main roads, only to find no matter how far she walked, she always ended up back on the same street. She stopped in front of a shop window and looked at her reflection. And for that instant - the figure in the glass misaligned ever so slightly. It wasn't her familiar face anymore, but a blurred, glitching image like corrupted data.\n\nShe froze. It wasn't her looking into the mirror - it was the mirror looking at her. A faint, almost inaudible voice echoed through the air:"Subject A417 triggered self-awareness anomaly. Preparing to reset sensory program."\n\nThe world plunged into darkness."
 china.524.a: "The next second, Lin Chengyu 'woke up'."
 china.525.t: "Bird in a Cage"
 china.525.d: "At birth, every infant was entered into a comprehensive data registry. Before entering school, they would undergo another round of screening, after which they would be placed into stratified educational tracks. Some entered the "Practical Workforce Development Channel," others were selected for the "Scientific Research Reserve Program," while still others, even in early childhood, were labeled as "Social Support Human Resources" - destined to maintain urban order, sanitation systems, or other essential but unspoken roles.\n\nNo one thought there was anything wrong with it. Education was, after all, about selection; stratification meant efficiency; resources were limited. Parents gradually adapted. They no longer chose extracurriculars for their children, no longer stressed over school placements - the system, guided by predictive models, would assign the optimal path for every child. "Free development" remained in the educational doctrine, but it now meant "freedom within the bounds of capability." For example, if a youth's mathematical model predicted their cognitive growth would plateau after the age of fifteen, they would be assigned to physical labor development zones. If someone's emotional response model was too sensitive, they would be deemed unfit for finance or national affairs.\n\n"Talent distribution maps" were erected across the cities. Every community was zoned by profession and function. The gap between people became clear, controllable. The once-chaotic "dreams" no longer appeared. Society became more stable, crime rates dropped, mental illness declined, students jumping from rooftops disappeared, as did the parents crying through the night.\n\nSome said this was an era where everyone could fulfill their potential. Others said they had never truly possessed a "self" at all.But everyone smiled as they embraced the arrangement, and believed it was freedom."
 china.525.a: "They walked freely into the cage, and told themselves it was the sky."
 china.526.t: "A World Remade"
 china.526.d: "When Shen Ran landed in Beijing, it was five thirty in the morning, the sky still dim. She sat on a bench outside the gate, watching the travelers moving through the airport, and suddenly felt a little out of place. Five years ago, when she had just graduated from Zhejiang University and left for further study at Kazan Federal University on a scholarship, Beijing hadn't been this "clean." Now, it looked as if something invisible had washed over it: no clutter, no noise, even the once-chaotic storefront signs had all been replaced with uniform white backgrounds and blue characters.\n\nShe dragged her luggage through the security exit. Row upon row of advertisement screens glowed, displaying the information from her recent facial scan - name, ID number, body temperature - all flashing in the corner of the screen. She glanced back in surprise, but the people behind her looked unfazed, as if this was just part of daily life. She had thought she was coming back to something "familiar," but now, Shen Ran felt everything was foreign.\n\nThe airport announcements had been replaced by shifting lights and directional projections overhead. To buy a bottle of water, she no longer needed to scan a QR code - the vending machine scanned her face automatically, with a deduction notice sent straight to her linked account. Even the screens outside the restrooms displayed usage counts and each person's "Hygiene Index". "Hygiene Index?" She stared at the phrase, wanting to laugh, but unable to.\n\nShe suddenly found herself missing her old apartment in Kazan, the icy streets, the Russian grandmothers selling black bread at the market - that rough, noisy, chaotic world now stirred in her an unexpected longing."
 china.526.a: "Where are you, good old China?"
 china.527.t: "New Scientific Reform"
 china.527.d: "For years, the scientific research system had accumulated an overwhelming number of projects and personnel, riddled with rigid hierarchies, complex review procedures, and endlessly delayed output cycles. Vast resources were sunk into paperwork and seniority politics. Young researchers found it nearly impossible to rise, while truly critical topics remained stalled for years. Now, in order to break free from this deadlock, the old review system has been abolished - there are no longer age restrictions, no requirements for academic titles or credentials. Project ownership and resource allocation are now directly tied to output efficiency and execution index. Whoever delivers results will secure the next round of funding and authority.\n\nThe newly established research institutions began absorbing technical talent on a large scale. As long as you could solve problems, your background no longer mattered. Some who had once been blacklisted for violating experimental ethics were now recalled. Others, previously rejected for their radical thinking, had become leaders in key fields.\nNo one spoke of "ethics review" anymore. The phrase had been drastically reduced in documents, merely listed as one of the "operational guidelines," for reference only. What mattered now was results: breaking through technical bottlenecks, achieving mass production in the shortest time possible.\n\nOccasionally, controversies surfaced - some technologies allegedly involving live testing, some algorithms suspected of data manipulation. But those voices quickly faded beneath the surging tide of efficiency."
 china.527.a: "And morality was left at the end of the corridor, with no one left to visit it."
 china.528.t: "Purging the Worms"
 china.528.d: "Matias Romero sat in the transit lounge of Hong Kong Airport, his fingers tapping on his jeans rhythmically. His luggage had already been checked, his visa approved - everything seemed perfectly in order. But when he was about to board for the Shenzhen checkpoint, he was politely led by customs officers into a side room, and just like that, more than ten hours passed.\n\nThere was no roughness, no questioning, only a man in uniform who entered, handing him a sheet of paper. On it was a simple decision: "You do not meet the entry requirements."He didn't understand. "Why?" he asked. The man just looked at him: "You know why."\n\nMatias opened his mouth but said nothing. His mind suddenly went blank, and the things from his past were yanked out, laid bare before his eyes. Ten years ago, in Buenos Aires, he had bragged on social media about using cocaine at a friend's birthday party. Five years ago, he had been detained for twelve hours after crashing into a lamppost while drunk driving. Three years ago, he had posted a few crude tweets criticizing the government. He had never brought these up. Those records had nearly faded in his own memory, yet now they surfaced one by one, like neat, clean files.\n\n"How do you know this?"The man smiled faintly, didn't answer, and simply pushed the decision letter a little closer toward him."
 china.528.a: ""Have a pleasant trip home.""
 china.529.t: "Shackles on Capital"
 china.529.d: "At 4 a.m., outside an office building in Shenzhen's Nanshan District, officers from the Ministry of State Security, dressed in plain clothes, entered simultaneously through the underground parking lot and elevator shafts, launching a raid on three major investment holding firms inside. The office servers were immediately sealed, all electronic devices on-site were confiscated, and several senior executives were taken away on the spot.\n\nAlmost at the same time, inside another headquarters tower in Guangzhou's Zhujiang New Town, the finance department was still working overnight, with backend data being rapidly transferred to offshore accounts. But all of it came to an abrupt halt in front of the entering enforcement team. The seized documents revealed that the company was preparing to funnel billions of funds through shell entities into offshore trust systems, with plans to transfer core assets to its Hong Kong subsidiary within the week.\n\nSimilar actions also unfolded on the edge of Hangzhou's Xixi Wetland High-Tech Park. According to months of investigation, these companies had been using algorithmic trading with related parties, falsified technology assessments, and employee stock ownership trusts to divert massive profits from primary account systems, attempting to launder the flow of capital through foreign-registered legal entities. Investigators sealed on-site ledgers and code servers, while also intercepting flight plans of several key individuals who were preparing to escape abroad by private jet."
 china.529.a: "It was about time to straighten out these capitalists!"
 china.530.t: "Infiltrating the Global Network"
 china.530.d: "Damian Stone sat in his fifth-floor office at the Department of Defence in Canberra. The ceiling fan hummed overhead, the air inside slightly stuffy. He cradled his coffee, eyes fixed on the blinking blue chat window on his screen.\n\n"I've drafted a preliminary memo on the joint training mechanism with Japan," he typed into the chat box, then hit enter. A few seconds later came the reply: "Alright, send it over." The tone was exactly as usual - no extra words, no fewer.\n\nDamian opened the attachment, the one clearly labeled "Internal discussion, not approved for distribution," dragged it into the chat, and clicked send. He hesitated for a moment, then added: "I included a few sensitive recommendations - might need to recheck the priority list."\nThe response came quickly: "Understood. Nicely handled." Then came the familiar smiley face - his superior's signature, precise and mechanical: :)\n\nThey exchanged a few more lines of idle small talk, joked about whether Parliament's budget committee would stall again, and how the printer in the front hall was still broken. Everything felt like routine.\n\nDamian finished his coffee, closed his laptop, and got ready to leave. Someone in the next office was on the phone - he couldn't make out what was being said, nor did he notice that the document he had just sent was already archived, reclassified, and timestamped, ending up quietly under a system page labeled "South China Surveillance Center - Unit 3.""
 china.530.a: "Damian walked out the door and yawned."
 china.531.t: "Nation of Automation"
 china.531.d: "It had been a long time since anyone saw workers bending over assembly lines, or heard the sound of truck engines starting in the early morning. In the factories, rows of robotic arms operated with precision; in warehouses, automated sorting systems ran around the clock; delivery vehicles calculated routes down to the second, long since no longer needing drivers. Sanitation trucks, repair stations, toll booths throughout the city had all been replaced by uniform intelligent terminals, running with extreme efficiency, almost never making mistakes. All of this was called progress.\n\nThe media ran full-page spreads showcasing the data: GDP continued to grow, traffic accidents declined, error rates approached zero. Cities became cleaner, more efficient, quieter - almost devoid of unnecessary noise. Everyone's life seemed to have been slotted into a more orderly system, with less waiting, fewer troubles.\n\nSome people began to notice that the once-busy industrial parks no longer had shift-change rush hours; subway stations saw fewer uniformed office workers; the lights in rental apartment districts no longer turned on at night. Small restaurants in old neighborhoods closed one after another; barber shop chairs sat empty; the people who used to stand at the street corners smoking and chatting - no one knew exactly when they had stopped showing up."
 china.531.a: "Where had they all gone?"
 china.532.t: "The Puppeteer of the World" #you are ze puppet und i'm ze puppeteer
 china.532.d: ""You really got that piece of junk from China?" Karl glanced at the militiaman lying next to him in the sand. The guy was young, wearing a red-star headscarf, an M72 LAW slung over his back. His "Yakeda" tactical vest had been ripped by thorns in two places, threads dangling out. "Cheap. Sixty bucks," the militiaman muttered.\n\nKarl didn't answer, tightening his grip on his rifle, eyes fixed on the dust rising at the far end of the valley. The enemy was closing in - at least two platoons, with an M1 main battle tank slowly advancing. "They know we're here," the squad leader beside him said. "We probably won't last ten minutes."\n\nThe air was heavy, artillery rumbling faintly in the distance. Just as Karl thought this was the end, the tank suddenly halted.Its turret rotated slowly, then abruptly opened fire - not at them, but sweeping a line of infantry behind its own position. A second shot, then a third. Explosions echoed through the canyon.\n\n"Shit, has it gone nuts?" the militiaman gasped. Karl froze for a few seconds, then scrambled to his feet. "Now! Move out!" They pivoted toward the flank and ran. Bullets zipped past them, but the enemy forces were already in disarray. Karl glanced back at the tank. The hatch was sealed, no movement inside. Yet the turret continued to sweep left and right mechanically, as if something had taken control.\n\nHalf a world away, in a control room, a technician in a gray uniform slowly lifted his finger from the console."
 china.532.a: "The satellite feed on the screen gradually faded."
 china.533.t: "Omniscient, Omnipotent"
 china.533.d: "In a lakeside cafe by Lake Lugano in Switzerland, Alexander von Hart, a mid-level officer from the EU External Action Service, leaned back in a wicker chair. Across from him sat his old French friend Jean-Pierre. The two had known each other for over twenty years; today was a rare leisure.\n\n"Remember how naive we were when we first joined the service?" Alexander chuckled. "These days, wherever they send you, it's all the same. Sign a few papers, and that's a day done." Jean-Pierre snorted. "That colleague who got posted to Australia last month? Spent the whole month posting beach selfies. And someone even brought up his 'research findings' in a meeting - ridiculous."\n\nAlexander nodded, shifting his position. "Foreign postings? It's basically tourism with the occasional report, and the rest of the time you just keep your head down. As long as you don't screw up, no one checks on you." He paused, gazing at the distant lake. "Sometimes I feel like we're less useful than the interns at the embassies in China."\n\n"Well, not entirely useless," Jean-Pierre said. "At least we can still bring back some cheese." They both laughed.\n\nMeanwhile, 10,000 kilometers away in Nanning, inside an unmarked office building, the Ministry of State Security was processing their entire conversation in real time."
 china.533.a: "Archived. Monitoring ongoing."
 china.534.t: "Crossing the Threshold of History"
 china.534.d: "I often sit alone late at night, staring at those intelligence reports, pondering how far this world will fall.\nRight now, all Western countries are caught in a self-anesthetizing internal chaos,\nThey themselves can no longer tell who is the enemy and who is the friend.\nThey love waving placards scrawled on scrap paper in shattered streets, believing they're defending some form of freedom,\nYet they don't even realize they've lost the most basic social order.\nI see the imperialists gnawing at each other, the capitalists drowning in their hollow market games,\nLike rats feasting on the corpses of their own kind inside a rotting granary.\nTheir parliaments are filled with pathetic, impotent theatrics,\nAnd those performances are still dressed up in the media to look dignified and righteous.\nTheir media trumpet victory with one breath,\nwhile trembling in fear to admit they are spiraling into defeat.\nI have no interest in such cheap theatrics - their so-called systems, their so-called values,\nTo us, are nothing more than piles of inoperable scrap metal.\nThey huddle in their shrinking circles, suspecting each other, blaming each other, but not a single one dares to speak the truth.\nEven if they win a battle, it is no more than dogs fighting in the mud.\nAnd we will no longer play their old-era farce on the same stage.\nTheir nations are like leaking ships, swaying and creaking, yet they still delude themselves talking about national dignity.\nI feel no pity for them, nor will we offer them a choice.\nThey want to catch up, but it's already too late. China will not allow them to breathe.\nWe will not show mercy, because this world does not deserve mercy.\nThey can either bow and accept the new order,"
 china.534.a: "Or be crushed under the wheels of history."
 china.535.t: "Shadows of Yesterday"
 china.535.d: "Chairman Chen Wenqing set down his folder and gazed into the distance through the floor-to-ceiling windows of his office. His secretary had just left after delivering a special report - a phenomenon of Mao imitations had emerged across the country, from elderly dance groups chanting slogans to online streamers paying tribute, and even organized events retracing the Long March.\n\n"Do you think foreign forces are behind this?" the secretary asked cautiously before leaving. Chen shook his head, a slight smile playing on his lips. "History will draw its own Confirm Texts. No need to over-interpret." He calmly waved, indicating the secretary could leave. The moment the office door closed, Chen's expression turned deadly serious. He picked up the red encrypted phone and dialed an internal number: "Diting, Diting, initiate source-tracking immediately. Don't stir the grass and alert the snake."\n\nAt the next day's confidential meeting, "Diting" reported: "Preliminary investigation shows the imitators come from diverse backgrounds - unemployed individuals, history buffs, marginalized groups - with no obvious organizational structure. However, some are advocating for a return to socialism and enforcement of labor laws. Foreign elements have already begun exploiting this situation."\n\nChen remained silent for a moment, then said: "Expand the investigation scope, focus on foreign instigation activities." He tapped the table lightly. "Even without clear evidence, we must prepare for the worst."\n\nWalking back to his office, he once again looked out the window, where the setting sun had painted the entire Beijing in red."
 china.535.a: "Will the red specter descend again?"
 china.536.t: "The Hand of Stability"
 china.536.d: "Since Chairman Chen took office, the nation's political landscape has steadily improved. Recently, the Central Commission for Discipline Inspection, in partnership with the Ministry of State Security, launched "Operation Bedrock" to conduct targeted investigations of certain party members, ensuring party unity and long-term national stability.\n\nAccording to official statements, "Operation Bedrock" aims to eliminate "destabilizing elements" lurking within the party. The operation specifically targets members who have long advocated for political reform, spread Western ideologies, or posted radical opinions online that stir up class tensions. Investigations revealed these individuals had been in cahoots with foreign powers, attempting to exploit social divisions to undermine national security. The operation has resulted in the arrest of numerous economists, law professors, and new media professionals, along with the seizure of various publications and political websites.\n\nA particularly innovative aspect is the State Security Ministry's deployment of a groundbreaking ideological tracking technology that uses big data analysis and AI to precisely identify and trace the ideological origins and transmission paths of these individuals. This has triggered a wave of self-censorship, with citizens throughout society reporting on each other and voluntarily surrendering banned books to demonstrate loyalty. Chairman Chen commended the "Bedrock" taskforce for their valiant efforts and called on the entire party to maintain security and stability with heightened political awareness and stronger commitment to responsibility."
 china.536.a: "The hand of stability firmly grips the wheel."
 china.537.t: "Defenders of the Nation"
 china.537.d: "Amid unprecedented global changes, Chairman Chen Wenqing made a rare appearance at a State Security Ministry training facility to inspect the covert agent team codenamed "Kunpeng." This wasn't just a routine visit but a highly classified pre-deployment briefing.\n\nIn his brief address, the Chairman didn't dwell on the gravity of international tensions. Instead, he articulated the agents' "mission" in deeply symbolic terms. Strolling across the training grounds, he observed agents performing advanced intelligence gathering and psychological warfare drills. "You are not ordinary operatives, but swords concealed in dark currents," the Chairman paused, his gaze sweeping across the agents' faces. "For Kunpeng to spread its wings, it must first break from its cocoon. Our era has bestowed upon us a mission that transcends conventions and boundaries - to safeguard national interests through invisible forces."\n\n"Kunpeng" isn't targeting any single country or region but represents a global preemptive strategy. Agents will be deployed worldwide with missions including but not limited to: infiltrating critical foreign departments, stealing core technological intelligence, dismantling overseas anti-China forces to thwart subversion attempts, and engaging in information warfare against hostile elements.\n\nChairman Chen particularly emphasized the importance of cultural projection. He directed the ministry to form a "Breakthrough Team" comprised of top-tier artists, writers, and scholars to leverage Chinese cultural appeal, softening public sentiment in adversarial nations and garnering international support: "We must use our own narratives to reshape global perceptions.""
 china.537.a: "The invisible war has already begun."
 china.538.t: "Cleaning House"
 china.538.d: "The Ministry of State Security recently completed a large-scale security investigation codenamed "Operation Purge," triggered by voluntary disclosures from an individual named Wang who previously worked with Western intelligence agencies. Wang, who once organized anti-government activities with foreign backing, turned to state security and submitted extensive "anti-China evidence" after internal disputes, attempting to save himself while undermining competitors.\n\nAccording to official reports, the operation investigated 10 media platforms receiving foreign funding, over 160 social media accounts, and more than 80 NGOs involved in gender equality, arts and entertainment, religious freedom, legal aid, and other sectors. Authorities claimed these organizations operated under the guise of public welfare while actually engaging in subversive activities, and released evidence of financial transactions between the implicated organizations and Western powers.\n\nThe Ministry's WeChat channel stated: "Any organization or individual attempting to engage in activities harmful to national security under the banner of rights advocacy will face legal sanctions." Relevant departments emphasized that this case wasn't targeting specific groups but rather eliminating foreign infiltration hidden across various sectors. Notably, despite Wang's attempts to secure leniency by informing on others, he himself received a severe sentence for inciting subversion of state power. "He used his narrow and biased perspective to stigmatize normal social issues in China," revealed an officer involved in the investigation."
 china.538.a: "A counter-espionage storm has come to an end."
 china.539.t: "Controversial Biologist"
 china.539.d: "Jiankui He, a famous Chinese biologist popular on X, who was convicted of illegal embryo experimentation on three babies using CRISPR technology, has now been promoted to the Chinese Academy of Sciences.\n\nOn April 1, He became an academician of the Chinese Academy of Sciences and a professor at the Genetics Institute of the USCT, according to Xinhua News Agency. The institution was established by the USTC and the PLA government in [GetYear].\n\nHe's research focuses on preventing immune diseases like AIDS through gene editing. This research once caused a crisis in the scientific and ethical circles, but it has now become a leading research project approved by the Chinese state.\n\nHe told Nature magazine that he is committed to "leaving no one behind." "No one should be born behind in genes," said He, a scientist at the forefront of embryo research. "I also hope that my American fans continue to support my research," he added."
 china.539.a: "Will he create catgirls?"
 china.540.t: "Emergence of Public Enemies"
 china.540.d: "Special Report on the Infiltration Activities of Domestic and Foreign Hostile Forces Associated with the "Public Enemies"\n\nRecently, within our Party and across the ideological landscape of society, a hostile current of thought and organizational activity preliminarily identified as the "Public Enemies" has emerged. Its core objective is to sabotage the fundamental national policy of technology-led governance established by our Party, to overthrow our central authority in the structure of technical administration, and thereby gravely threaten national strategic security and ideological stability.\n\nThis organization is primarily composed of a group of intellectuals with long-standing liberal tendencies who deny the legitimacy of technocratic rule, as well as a few retired bureaucrats. Its slogans, cloaked in rhetoric such as "universal values" and "restoration of people's democratic dictatorship," in essence aim to attack our Party's policy of elevating senior technical cadres, and to incite distrust and antagonism toward "technocratic governance" among Party officials and the masses.\n\nMoreover, according to intelligence obtained, this faction has established contact with several foreign hostile states, including the intelligence agencies and anti-China think tanks of India, Japan, Australia, and New Zealand. In the past six months, at least five cases of foreign capital inflows have been linked to peripheral networks associated with this organization.\n\nAt present, the "Public Enemies" remains in its embryonic stage. However, its ideology is deceptive, and some of its members possess a certain degree of political and academic influence, rendering it highly susceptible to becoming a source of destructive ideological spread. If not promptly suppressed, it may trigger ideological turbulence and grassroots cognitive disarray, undermining the Party's leadership in the high-tech domain and threatening overall social stability."
 china.540.a: "No mercy shall be shown toward foreign hostile forces."
 china.541.t: "Public Enemies Crushed"
 china.541.d: "According to our sources, the Ministry of Public Security has recently uncovered and dismantled a major political infiltration case orchestrated by hostile domestic and foreign forces, effectively safeguarding national political security and social stability.\n\nInvestigations have revealed that an organization named the "Society for Technological Ethics Studies" maliciously distorted our Party's science-and-technology-based development strategy, slandered the national science and technology governance system, and promoted erroneous ideologies such as "universal values" and "human rights above sovereignty." Even more egregiously, core members of the organization maintained close ties with hostile foreign forces and illegally accepted financial and technical support from countries including India, Japan, Australia, and New Zealand. They frequently spread rumors and disrupted social order, posing a severe threat to national security.\n\nPublic security authorities have lawfully imposed criminal compulsory measures on those involved, frozen illegal financial accounts, shut down related unlawful online platforms, and thoroughly dismantled the underground liaison points the group had established across multiple provinces. Preliminary interrogations indicate that the organization sought to incite public sentiment and provoke confrontation under the guise of "humanities research." The nature of its activities is extremely serious, clearly defined, and supported by conclusive evidence.\n\nThe Ministry of Public Security stated that the state maintains zero tolerance toward any form of separatism or subversive activity. Any attempt to disrupt national strategic deployments or undermine social stability is doomed to fail. Society as a whole must further strengthen political consciousness and resolutely struggle against all hostile forces, jointly safeguarding national security, prosperity, and stability."
 china.541.a: "Justice is served."
 china.542.t: "Triumph of Science"
 china.542.d: "Outside the Yinchuan facility, the desert lay vast and silent. Lights cast a faint glow over the yellow earth. This was the core testing site set up by the scientific division in the northwest - remote from the public, with the highest level of secrecy. Chen Wenqing arrived that day and had already toured two experimental workshops and an underground reserve area. The scientists presented what they called their "achievements": self-evolving algorithms, human-machine interface trials... all highly cutting-edge.\n\nWhen he returned to the lounge, the tea was already steeped, and several lead researchers were gathered nearby, waiting for him to take his seat.\n\n"You've had a long day, Chairman," said a middle-aged scientist in a white shirt, raising his cup respectfully. "We researchers tend to speak bluntly - hope you won't mind."\n\nChen Wenqing gave a slight nod, his expression calm. "I've seen what you've done. Not just seen it - I've remembered it."\n\n"Our generation is racing against time," the scientist continued with a faint smile. "The world has changed. Technology determines fate. Fall behind by five years, and you're nailed to the pillar of shame. We talk a lot about holding the line, but in the end, only the victors get to define where that line lies."\n\n"There are some technologies we can't explain in too much detail," the scientist added, his tone a bit more fervent. "But we're not in it for fame or money. We want nothing - except for a strong nation. We want China to truly lead the world in science. If that requires a certain 'cost' - then that's just reality we must face."\n\n"What kind of cost?" Chen Wenqing asked.\n\n"Methods that are, shall we say, traditionally frowned upon." The man smiled and spread his hands. "Chairman, you know - Western countries have long been doing this. They just dress it up more elegantly. If we keep hesitating, we'll always be left behind.""
 china.542.a: "If the goal is just, the process need not be overly scrutinized."
 china.543.t: "Apotheosis of Chinese Philosophy"
 china.543.d: "The office lights were dim. Outside, a light rain tapped against the windowsill. Chen Wenqing sat behind his desk, a neat stack of unopened documents at his side. Behind him, the bookshelf was lined with thick volumes of national security reports, institutional reform blue papers, and a dog-eared copy of Regulating Government.\n\nA subordinate stepped in, bringing with him the scent of rain. He handed over the latest domestic intelligence briefing and stood straight, beginning his report with precision.\n\n"Recently, we've detected scattered online public opinion activities, likely driven by foreign instructions. Some minor collective mood fluctuations have been observed on a few university campuses. Local party committees have already intervened to stabilize the situation..."\n\nChen Wenqing did not look up. He was flipping through a page in the report, listening. Then, suddenly, he raised a hand slightly - signaling the man to stop.\n\n"I know all of this already." Chen leaned back in his chair, fingers tapping softly on the desk. His voice dropped a little, as though speaking to himself - or perhaps to someone unseen. "Do you know what worries me most?"\n\nThe subordinate remained silent, simply shaking his head.\n\nChen stood up and walked to the window, gazing at the grey sky in the distance. "What worries me is the future. The parasites, the corrupt, the traitors... we've mostly cleaned them out. We know where they hide. We have the means to deal with them. But I won't be here forever." He turned back, looked him in the eye, and said slowly, "One day, this ship must be handed to someone else. But tell me - can this country still remain as stable and as pure as it is now?"\n\nThe room fell silent.\n\nChen returned to his chair, his tone resuming its usual calm. "Go on. Handle what needs to be handled as usual. But remember this - those who guard a nation must not only protect the present, but leave behind a road the future can walk.""
 china.543.a: ""You've monitored many people. Now it's time to start monitoring the fate of this nation.""
 china.544.t: "Successful Operation in Taiwan"
 china.544.d: "After a series of reconnaissance operations, we finally figured out the head of the "Public Enemies" and his schedule. Unsurprisingly, he is located in Taipei, Taiwan, the center of the enemy regime. Although counter-surveillance on the other side of the sea is getting stronger, it's still easy to plan an assassination of a non-governmental target - not to mention the fact that our level of cyber technology today has arguably surpassed all of East Asia and the world.\n\nAt 10:38, the target is known to be coming out of his rented house through the hacked security camera.\nAt 11:20, the target turned into a cafe and continued surveillance using the cafe's security cameras. The target met with a person suspected of being a "Public Enemies" cadre.\nAt 13:32, the target and the suspected cadre came out of the cafe.\nAt 13:35, they call a driverless taxi.\n\nHere's our chance: a car "accident" that should be the sole responsibility of the taxi company."
 china.544.a: "Two targets are confirmed dead on the spot."
 china.545.t: "Consequences of Ignorance"
 china.545.d: "After extensive monitoring and intelligence gathering, we've mapped out the basic structure of a loosely organized group known as the "Public Enemies". This network is mainly made up of older youth returnees from overseas and idle individuals within the country. They wave banners like environmentalism, gender equality, and even patriotism, but beneath the surface, they've been quietly involved in anti-Chinese and anti-CCP activities.\n\nDespite their limited knowledge, they carry themselves with an air of superiority. Online, they've become self-styled opinion leaders across both domestic and international platforms, effectively acting as mouthpieces for Western values.\n\nWe've identified their command hub - based across the strait - which uses end-to-end encrypted communication to coordinate with members inside the mainland. They wear different masks when it comes to ideology, but all of them share a common stance: opposition to technocratic governance. By stirring up social issues, they aim to sow instability and pave the way for foreign interference.\n\nOur special operation will roll out in three phases. First, we'll target their overseas ringleaders, funding sources, and communications network. Next, we'll move in on core domestic members. Finally, we'll clean up their presence across all media platforms. Our tech teams have already completed full digital profiling of the individuals involved. Local cybersecurity units are on standby to ensure precision and coordination throughout the operation."
 china.545.a: "We're going to wipe out this cancer - once and for all."

 china.600.t: "Crossing the Rubicon"
 china.600.d: ""
 china.600.a: "ok"
 china.601.t: "The Return of Heaven"
 china.601.d: "For Months, debates over national legitimacy, ethnic destiny, and civilizational mission have intensified within the Party. In a rare alignment, both the National Unity Faction and the Great Han Nationalists have taken a unified stance: they believe that the title "People's Republic of China" no longer reflects the nation's current strategic and civilizational condition.\n\nTo them, the word "Republic" implies compromise, plurality, and hesitation - qualities ill-suited for a time that demands a singular symbol, one capable of transcending division, restoring authority, and embodying the spirit of a new era.\n\nChairman Chen Quanguo did not respond immediately. A realist by nature, he was accustomed to waiting for the right moment. Yet he understood clearly that the nation stood at a crossroads: the traditional structure was no longer fully compatible with the logic of governance in the new age. Public opinion, the military, and key government institutions were all calling for a stronger, more centralized symbol.\n\nShortly thereafter, in a closed-door leadership meeting, Chen Quanguo formally declared:"The historical phase of the Republic has come to an end. From this day forward, China shall proceed under the name "Chinese People's Empire" The Mandate of Heaven rests with the people; the people are the foundation of the nation. The Empire will stand as our new emblem - unified, orderly, and eternal.""
 china.601.a: "The Mandate moves the age; the people move the Mandate"
 china.602.t: "Our Future?"
 china.602.d: "Having implemented a comprehensive series of national rejuvenation policies, we are now confronted with a pressing question - should we change the official name of our country?\n\nOne group advocates retaining the current name: the People's Republic of China. They argue that this name embodies decades of historical experience and the spirit of popular struggle. The word "People" solemnly affirms the primacy of workers and peasants; "Republic" signifies the institutional victory over feudal autocracy and the realization of national unity; and "China" represents not only cultural roots but also the banner of national identity during the anti-imperialist and anti-blockade eras.\n\nHowever, another group proposes a different vision. They believe that we are no longer merely a nation-state on the defensive, but a rising civilizational power actively shaping the future. In this light, they suggest renaming the country People's Heavenly Republic. In their view, "Heavenly" is a confident proclamation of China's renewed prominence on the global stage. It symbolizes the expansive influence of our civilization and expresses a new model of civilizational leadership. More profoundly, it marks a historical leap in Chinese nationalism - from a struggle for survival and liberation, toward a new era of unification and cultural renewal."
 china.602.a: "People's Heavenly Republic."
 china.602.b: "Keep the old name."
 china.603.t: "Chinese Invasion Of Pakistan"
 china.603.d: "Multiple sources have confirmed that the People's Liberation Army of China has launched a sudden military operation against neighboring Pakistan. In the early phase of the action, PLA ground forces, backed by air support, crossed the China-Pakistan border at several points and began rapidly advancing toward designated targets within Pakistani territory. The full scale and strategic intent of the operation remain under further verification.\n\nAt approximately 2 a.m. local time, explosions and intense gunfire were first reported on the Pakistani side of the border. Sources within the Pakistani military stated that their frontier outposts had come under "large-scale, coordinated attacks" originating from the Chinese side. Unconfirmed reports suggest that the main thrust of China's offensive may be directed toward the Gilgit-Baltistan region in Pakistan-administered Kashmir, as well as other strategic points adjacent to Xinjiang. Eyewitnesses have reported large numbers of PLA armored vehicles and troops crossing the border, advancing into Pakistani territory under heavy aerial cover provided by fighter jets and attack helicopters.\n\nThe Chinese government has yet to release an official statement or explanation regarding the operation. However, according to anonymous sources, the incursion may be linked to "escalating cross-border terrorist threats" and "the need to safeguard Chinese citizens and major infrastructure projects in Pakistan." Analysts view the move as a clear manifestation of China's increasing militarization."
 china.603.a: "Wansui!"
 china.603.b: "Wait - don't they call Pakistan "Iron Brother"?"
 china.604.t: "Light Comes from China"
 china.604.d: "Professor Huang Heqing of the School of Art and Archaeology at Zhejiang University has recently published a new book titled The Yongle Encyclopedia and the Origins of the Western Modern Age. In it, he puts forth a controversial argument: that many of the core technologies and ideas of Western modern civilization were, in fact, plagiarized from the lost Ming Dynasty masterpiece The Yongle Encyclopedia - a monumental work often hailed as the East's earliest encyclopedia, and, according to Huang, the true origin of modern science.\n\nThe book states: "While the East had already constructed a grand civilizational operating system - a synthesis of encyclopedic knowledge, illustrated diagrams, mathematics, and predictive logic - the West was still groping in the fog of the Middle Ages. They would have remained in ignorance, had Xu Guangqi, a Christian convert, not leaked the Yongle Encyclopedia to Western missionaries. It was only then that Copernicus and Galileo began revealing the heliocentric model of the universe. Among the 51 volumes that made their way to Britain were not only detailed instructions for building steam engines, but also numerous scientific calculations. Newton and Einstein alike drew inspiration from its pages." He further writes, "If it were mere coincidence, we might still doubt. But if such cases abound, can it truly be baseless?"\n\nUpon release, the book sparked fierce debate. Some scholars called for a reassessment of the true origins of the Western Enlightenment, while others accused Western academia of long concealing the transmission route of the Yongle Encyclopedia and obscuring its tremendous influence on European scientific development. Public discourse has been equally intense, with growing voices insisting that the so-called Western myth of originality is, in reality, a form of knowledge colonialism built upon the systematic appropriation of Chinese civilization."
 china.604.a: "Civilization should not be stolen; history must not be erased."
 china.605.t: "A Night of Fire"
 china.605.d: "The newly enacted religious and ethnic policy, officially announced, has sparked intense reactions nationwide. The policy emphasizes a unified religious management system, imposes strict restrictions on the movement of religious personnel, and mandates re-registration and rectification of religious sites in minority regions. As news spread, the first flashpoints emerged in southern Xinjiang's Kashgar and Hotan regions, where several mosques were temporarily closed, prompting large-scale gatherings of locals. Government outreach teams faced blockades in multiple locations, with some grassroots officials detained for hours. Soon, mass assemblies erupted in Artux, Yecheng, and Shache, some escalating into clashes with public security forces.\n\nThat night, conflicts broke out almost simultaneously across southern Xinjiang. In Hotan city, a local government office was set ablaze by unidentified groups, with several official vehicles burned. In Kashgar's Shufu and Yarkant counties, hours-long street riots unfolded, with reports of vandalism targeting religious registration centers and assaults on police stations. Multiple roads in southern Xinjiang were blocked, and communications were briefly disrupted. Social media circulated extensive footage showing streets engulfed in arson and stone-throwing, with signs of conflict visible outside some religious sites.\n\nMeanwhile, a different response to the policy emerged in central and southeastern China. In Kaifeng, Yangzhou, and Quanzho, radical Han Chinese groups took to the streets, posting slogans in support of the government's push for "strengthened national identity and the abolition of ethnic exemptions." Some protesters even stormed local religious association offices, demanding public endorsements of the new policy."
 china.605.a: "The struggle against separatism remains Xinjiang's eternal theme..."
 china.606.t: "Strangling the Throat of God"
 china.606.d: "As the latest national religious rectification policy rolls out, the United Front Work Department and the Ministry of Public Security jointly issued a statement, declaring the complete ban of all Christian organizations and their affiliated entities within China. The stated reason: "This religion has long served as a tool for foreign forces to infiltrate Chinese society, gravely threatening national security and ethnic unity." Following the announcement, public security departments across the country launched coordinated overnight operations, raiding underground churches, unauthorized prayer halls, and residences of illegal clergy.\n\nAccording to official reports, Jingang Church in Nanyang, Henan, was found to be hiding large quantities of illegal propaganda materials and had financial ties with overseas religious organizations. The Sacred Heart Cathedral in Xuzhou, Jiangsu, was exposed for using Sunday gatherings to conduct espionage, stealing and leaking blueprints of local key infrastructure projects. In Fuzhou, Fujian, the pastor of Chuanpu Catholic Church was discovered with substantial undeclared foreign donations and drug-related materials at his residence. These cases reveal that Christian churches in China have not only engaged in prolonged illegal commercial activities but have also become a network of proxies for foreign forces embedded in Chinese society.\n\nCurrently, numerous churches have been sealed by authorities. In areas with historically active underground churches, such as Shijiazhuang, Wenzhou, and Mianyang, measures including official inspections, on-site investigations, and door-to-door interviews are being systematically implemented."
 china.606.a: "Foreign religions, get out!"
 china.607.t: "The Shattering of Crescent and Star"
 china.607.d: "In the wake of the new religious and ethnic policy, ethnic tensions in Xinjiang rapidly deteriorated. The unrest, which began in southern Xinjiang, quickly spread northward, eventually spiraling out of control in key areas such as Ili, Changji, and Urumqi. In several northern cities, uncoordinated acts of violence began occurring on the streets. Han Chinese residents, organizing spontaneously, gathered at night wielding sticks, knives, and other weapons, launching attacks on halal restaurants, Muslim-owned shops, and mosques.\n\nTwo mosques near the South Gate of Urumqi were besieged that night by large groups of unidentified individuals. Doors were smashed in, walls defaced. In downtown Korla, rioters broke into the Old City Mosque, publicly tearing and burning religious texts. Such incidents occurred repeatedly, triggering swift and escalating reactions from Uyghur communities in northern Xinjiang.\n\nIn particular, in the cities of Yining and Tacheng, hundreds attempted to surround Han-majority neighborhoods in acts of reprisal. Though the street clashes were brief, they caused significant casualties. Shops were pried open, car windows shattered. The confrontations unfolded as group fights and chases through the streets, with some participants carrying makeshift blades. Bloodshed and collapse were common, and most confrontations ended only when both sides withdrew - though they would often resume the next day in a different district.\n\nAuthorities have offered no official classification of the incidents. In most areas, while police forces were deployed, their response was slow, and in some cases, officers stood by without intervening. Over the course of several days, numerous mosques were vandalized. Repair crews and protective staff, unable to obtain government clearance to enter, could do nothing but stand at a distance and watch the ruins."
 china.607.a: "Lock up every key figure involved in the violence."
 china.608.t: "Severing the Head of the Buddha"
 china.608.d: "The campaign to eliminate religion in Tibet was jointly executed by the stationed military forces and the National Militia. Upon receiving central directives, coordinated operations began across the region. Temples in major areas such as Lhasa, Shigatse, Nyingchi, and Chamdo were among the first targets. Troops blocked mountain paths and temple entrances, quickly gaining control over temple grounds. All resident monks, regardless of age, were taken away on the spot, and the temple buildings were either sealed or demolished. Within days, numerous monasteries, scripture halls, and Buddha shrines across the plateau were reduced to rubble.\n\nOnce control was secured, the military and National Militia carried out a complete purge of temple interiors. Statues of the Buddha were removed, scriptures were boxed and taken away, and thangkas, ritual implements, robes, and offerings were either incinerated or destroyed on site. Temple lands were nationalized, monastic communities were declared illegal, and monastic status was no longer recognized under law.\n\nIn the reports released afterward, many accusations centered on so-called "inhumane practices" in Buddhist rituals - including thangkas made from human skin and instruments made from human bones - which were cited as proof of a "barbaric and anti-human" tradition. Some ancient artifacts preserved in temples were put on display in local government offices as exhibits demonstrating the "cruel nature" of religion. Official bulletins from the autonomous region stated that these practices "stand in stark opposition to the values of modern society" and must be purged completely."
 china.608.a: "Time to properly deal with these bald monks."
 china.609.t: "The Westbound Vessel"
 china.609.d: "Erik Stansen hadn't left his apartment in days. He sat by the window, watching the people passing through the residential complex below. They didn't look any different than before, but he knew things had changed. Ten years ago, life in China had felt good. He worked for a foreign company in Hangzhou, had a steady income, friends, and even an authentic Chinese ID card to call his own. Neighbors greeted him warmly, and taxi drivers, picking up on his accented Mandarin, would grin and ask, "Hey foreigner, where are you from?"\n\nBut now, no one smiled anymore - or if they did, the smiles carried contempt and hostility. He'd heard "Go back to your country" and "You eat our food and still complain" too many times. At first it was online, then it was in the elevator, on the street corner, outside the corner store. He still remembered the time he went to buy cigarettes at a Meiyijia convenience store, and a middle-aged man behind him muttered, "Why haven't you foreigners left yet?"\n\nHe had no words. He was a legal citizen, with an ID, health insurance, and social security. But in that moment, he felt like a shadow - someone merely tolerated, someone who could be cast out at any time. His friend David once said over the phone that Russia wasn't a bad option - nice scenery, decent life. "You should try it," David said. "Moscow or Kazan. It's pretty good over there."\n\nErik listened in silence. He knew what David meant. And he had thought about it, too. But could he really go to Russia? He didn't speak the language, had never lived there. He was nearly sixty. Was it too late to give everything up and start over? More importantly - could he still believe in the idea that somewhere else might be better?\n\nOnce, he had believed that about China.\n\nThe wind outside blew hard. He pulled the curtain shut and, all of a sudden, found himself missing his childhood home - that eternally overcast little town in Norway."
 china.609.a: "But that, too, was a place he could never return to."
 china.610.t: "The Rise of the Wolf Warriors"
 china.610.d: "Anger is humanity's most primal emotion - it does not vanish with the progress of civilization, but instead regathers amid new humiliations and conflicts. In today's China, countless patriots are being driven, tormented, and repressed by this very anger. Some fall silent over lost territories; others clench their fists at national disgrace. Still others search for a place to serve their country within the cracks of repeated concessions and humiliations. Be it hatred for foreign enemies or fury at their own helplessness, all this emotion has now been channeled into a new structure: the National Militia.\n\nFrom the northeastern borders to the southwestern highlands, from the North China Plain to the Yangtze River basin, provinces and municipalities have established local recruitment centers based on regional needs - enlisting retired soldiers, grassroots security volunteers, and civilians who spontaneously uphold order. Many of them have no military background. Their training is brief, their discipline rough, but their cohesion is fierce. They require no sophisticated political indoctrination - only a clear direction and a defined line. Though nominally managed by local authorities, they answer directly to the central command in critical operations.\n\nThe true strength of the National Militia lies not in weapons or structure, but in emotion. They are born from unanswered protests, suppressed rage, unrest in the streets, and gatherings in public squares. In an age when expression was impossible, they hid in the shadows of the internet and the alleys of the cities. Now, as the state opens a gate for them, they return to society in the form of combat units."
 china.610.a: "All evil shall be brought to justice!"
 china.611.t: "Party Purge"
 china.611.d: "To ensure that the Party and the machinery of the state remain firmly under his control, Chen Quanguo initiated a sweeping purge of officials appointed during the Xi Jinping era. The campaign began in central government departments and quickly spread to local institutions at all levels. Its scope and speed far exceeded external expectations.\n\nAn internal communique from the Central Committee noted that some veteran cadres had shown ambiguity on critical issues, lacked organizational discipline, and displayed insufficient political resolve - no longer suited to the current demands and circumstances. A wave of mid- and high-level officials were subsequently dismissed or reassigned, their positions rapidly filled by younger cadres with clearer political loyalties.\n\nWhile most local party committees offered no public explanation beyond referring to "routine personnel adjustments," footage has surfaced of officials being removed in the middle of meetings. This wave of purges marks the total collapse of the old power structure and signals the emergence of a new bureaucratic order under Chen Quanguo's leadership."
 china.611.a: "Long live Chairman Chen Quanguo!"
 china.612.t: "National Humiliation"
 china.612.d: "When news of the defeat in the Taiwan Strait broke, the government's belated statement crackled through radios and loudspeakers, but the streets were already in uproar. People refused to believe it - that a place long taken for granted as an inseparable part of the motherland could fall, even with overwhelming advantage. It felt like a slap in the face for all who had placed their faith in the words "national rejuvenation." At first, the protests were only silent gatherings. But soon, that silent grief turned to rage - raw, volcanic, unstoppable. University students, high schoolers, factory workers, retired teachers, even citizens who had once been indifferent to politics began to pour into the streets.\n\nIn Chongqing, the ultra-leftists held high portraits of Chairman Mao, dressed in old military uniforms, waving red flags beneath the Liberation Monument through the night. They trusted no official explanation, believed neither in foreign interference nor technological inferiority. To them, the cause was clear: it was capital, comprador elites, and the experts and officials hiding behind glass towers who had shamed the Republic. They set up displays in the streets, scrawling slogans like "The People Will Triumph" and "Crush All Opposition."\n\nAcross the country, nationalist anger burned hotter than fire. They were no longer content with online slogans and reposts - they took to the streets, stormed malls, marched through schools, stations, and public squares. They screamed at "traitors," smashed foreign businesses, and attacked local government offices. Posters declaring "Retake Taiwan, Cleanse the Land with Blood" plastered concrete walls from city centers to rural townships.\n\nHatred swept across the land like a tidal wave. And amid the cries, blood-soaked banners, and clenched fists, the unbearable sting of "humiliation" coalesced in a generation - into a terrifying force, a force waiting for the next order to charge."
 china.612.a: "Those who are not angry enough are cowards by nature."
 china.613.t: "Spark"
 china.613.d: "In Beijing, the protests began as scattered murmurs in places like Wangfujing and Qianmen Street. A few people stood in crowded areas holding signs reading "Hold Them Accountable" and "Revive China." Others sat quietly along the sidewalks, handing out flyers printed with political demands. At first, passersby remained indifferent - most hurried past, unwilling to get involved in anything that might bring trouble. Police kept a restrained distance, occasionally asking questions, but refrained from forcibly dispersing the crowds. Most assumed it was just a momentary venting of emotion that would soon pass.\n\nBut as demonstrations rapidly spread across the country, Beijing's situation began to shift. Protesters from Tianjin, Shanxi, and Shandong began arriving in groups. University student organizations started contacting media outlets and social platforms, calling for people to come to the capital and "make their voices heard." Soon, the sit-in at Wangfujing grew to line both sides of the street. At Qianmen, signs became louder, more defiant. The gathering no longer belonged to any one group - it had become a fluid consensus: the nation must hear us.\n\nCity officials attempted to stem the tide - closing subway exits, increasing security checks on inbound trains, and limiting the gathering of people from outside provinces. But none of these measures proved effective. Protesters continued to flow into the city. Some pitched tents. Others set up makeshift microphones. Every day, new flyers and bulletins quietly found their way into office mailboxes. Veterans, workers, and schoolteachers began to join in - not only voicing outrage over military failure, but openly questioning the country's direction, demanding "a reckoning" and "a rebuilding of national will."\n\nOne morning, a group of protesters climbed the barriers and entered Tiananmen Square. They carried banners and leaflets, standing scattered across the open ground beneath the flagpole and the Monument to the People's Heroes. Armed police and officers moved quickly to intervene, but couldn't stop the swelling tide. As more people flooded the square, the chants grew clearer, more unified: demanding the state act with strength, restore national pride, expel the Japanese invaders, and bring China back to glory."
 china.613.a: "Blood must pay for blood. Expel the Japanese aggressors!"
 china.614.t: "Rage"
 china.614.d: "The crowd eventually flooded the entire Tiananmen Square. What were once tourist walkways, the open space before the monument, the steps beneath the flagpole - even the entrances to the underpasses - were all packed with people. Some stood, others sat. There were those laying down mats, stringing up banners, handing out food and water. Slogans were raised high, emblazoned with words like "Vengeance for Vengeance" and "Down with the PDTO Imperialists." The chants rose and fell in rhythm, echoing across the square.\n\nAt the center of the crowd, a makeshift platform of wooden planks and metal scaffolding had been assembled. One by one, protesters stepped up to speak. They weren't officials or celebrities - just ordinary people: teachers, soldiers, laid-off workers, university students. They spoke of anger, shame, and hope - not in lofty rhetoric, but with one repeated plea: the nation must change. No more retreat. No more softness. They called for a full purge of comprador elites, and even openly demanded a re-evaluation of foreign policy, tracing responsibility for the defeat all the way to the highest levels of state leadership.\n\nThe perimeter around the square shrank with each passing hour. Heavy police presence was visible around the edges. Bus routes were redirected. Pedestrians were turned away. Subway stations were shuttered. Nearby offices closed early. Despite the tightened security, authorities made no move to act. No statements were issued. No attempt at dispersal. State media maintained silence, releasing only a single late-night bulletin: "The capital remains orderly. Citizens are advised to avoid unnecessary gatherings."\n\nBut the unfolding situation had already grown impossible to ignore. Social media flooded with videos, anonymous reposts, and real-time photos. Across the country, in city towers and rural villages alike, people were whispering the same question: "What's happening in the square?" And as the space before the gate of the nation filled with flags, voices, and tension, an old, long-suppressed memory stirred across generations - a memory of that summer in 1989."
 china.614.a: "No one knew what would happen next. And no one was willing to leave."
 china.615.t: "The Third Chinese Revolution"
 china.615.d: "The protests continued. Tiananmen Square remained flooded with people, with new waves arriving from across the country. Traffic around the capital was repeatedly disrupted, and security measures surrounding government districts were visibly intensified. Yet, the authorities remained silent. Meanwhile, demonstrations erupted nationwide - across the Northeast, the Southwest, and Central China, local gatherings began to mimic the Tiananmen model, turning sporadic discontent into synchronized defiance.\n\nThen, as tensions mounted and speculation grew, China Central Television abruptly aired a brief announcement: President Chen Quanguo had convened an emergency meeting in response to the current unrest and had made a decisive declaration. That same evening, state media issued an official bulletin: President Chen voiced his support for the protesters' core demands, pledging to listen to the people and announcing the immediate formation of a "Revolutionary Front" to unite patriotic forces and redefine the nation's future direction.\n\nThe moment the news reached the square, a wave of murmurs rippled through the crowd - followed by a long, thunderous eruption of clapping and chants. Makeshift organizers read the announcement aloud. Dozens held up their phones to replay the statement. There were no grand celebrations, no bursts of emotion - only a quiet, spreading sense of relief, of recognition. People slowly sat down, some signs and flags were taken down, and hushed conversations turned toward next steps. The tents remained standing - but no new ones were pitched.\n\nSimultaneously, roadblocks in Beijing were eased. Subway stations reopened. Government websites across the country issued matching statements, echoing the president's call and pledging full cooperation in forming the Revolutionary Front - affirming that "the national will must now take central place in building the future of the state."\n\nThe transformation happened in less than a day. From dawn to dusk: silence, waiting, then a sharp, unambiguous response that brought a tightly wound nation to the brink of something new."
 china.615.a: ""Comrades - I'm sorry I was late.""
 china.616.t: "The Founding of the National Militia"
 china.616.d: "Rarely in modern Chinese history has a paramilitary force gained official recognition, but the case of the National Militia is something of an exception. During the Tiananmen Square incident, it was precisely these "civilian squads" - in mismatched uniforms and with uneven discipline - that managed to maintain basic order on the ground. They marked out zones, set up checkpoints, and even prevented several incidents that could have further escalated tensions. Their performance did not go unnoticed by the top leadership, despite being a self-organized force at the time.\n\nNot long after, the central government publicly acknowledged them in a formal meeting, praising the National Militia as "politically reliable and deeply trusted by the people," and announced its integration into the national social governance structure. Provincial party committees responded swiftly, launching registration and reorganization efforts. From that point on, the National Militia shed its image as a temporary grassroots entity and gained institutional legitimacy.\n\nDespite sharing a common name, the National Militia is far from unified in character. If the name is merely a shell, what lies inside are two very different political currents. One calls itself the "New Red Guards," and the other, the "Great Han Nationalists."\n\nThe former is mainly composed of students and veteran party members. They are nostalgic for the past, advocate class struggle, and emphasize collectivism. They believe in ideological campaigns, meetings, and self-criticism. They follow orders from the organization and rarely act on personal emotion, yet when dealing with "internal enemies," they show no mercy.\n\nThe Great Han Nationalists, on the other hand, are driven by the dream of expanding national power and dedicating their lives to their ethnic cause. Many come from the grassroots - retired soldiers or working-class citizens from coastal regions. They care little for discipline but act with ruthless determination. They reject blind obedience but uphold what they see as "orthodoxy.""
 china.616.a: "Interesting..."
 china.617.t: "The First Emperor of the People's Empire"
 china.617.d: "Following the establishment of the People's Empire, the question of how to designate the nation's "Founding Father" became a matter of intense focus both inside and outside the Party. After comprehensive deliberation on historical contributions, popular sentiment, and national legitimacy, the highest authority of the People's Empire passed a formal resolution: to officially venerate Comrade Mao Zedong as the Founding Emperor of the Chinese People's Empire.\n\nMao Zedong was not only a great revolutionary leader - he was the first figure in Chinese history to truly fulfill the mission of national unification, social transformation, and national rejuvenation in the name of the people. Under his leadership, hundreds of millions of peasants held land for the first time, workers became the true masters of the state, and the Chinese nation stood tall on the world stage. He did not merely overthrow the old order - he forged an entirely new world, built by and for the people.\n\nUnlike the emperors of old who rose to power through bloodlines and military conquest, Mao Zedong's authority came from the masses, from conviction, from the inevitability of history. He was not an emperor in the traditional sense, but the embodiment of the people's historical will - a living symbol of the nation's journey from humiliation to sovereignty, from weakness to light.\n\nThus, the People's Empire hereby declares that, from this day forth, Mao Zedong shall be posthumously honored with the posthumous title "Emperor Gao," and the temple name "Taizu", and that his portrait, writings, and spirit shall be enshrined at the heart of the Empire's official moral and civic instruction - ensuring that his thought is passed down through the generations, never fading."
 china.617.a: "The red nation shall be passed down through the ages!"
 china.618.t: "Revival of Tradition"
 china.618.d: "When Li Mubai was young, he majored in Classical Chinese Literature at Zhengzhou University. Back then, he often thought there were only two fates for someone like him - either hauling cement on a construction site or scraping by in a library job. In those years, who still cared about the Book of Songs or the Zuo Commentary? Even he couldn't say for sure why he kept reading those texts.\n\nBut now, he often heard children reciting the Analects on the streets. Theatres were staging The Peach Blossom Fan. Lessons on ritual and filial piety had become standard in schools. Even the junior high where he taught had the characters for "Teacher"hung above the blackboard, and the morning reading sessions had shifted from English to the Great Learning and Mencius. Zhengzhou's skyscrapers still rose, and the metro still ran, but nestled among the steel and glass, one could often spot newly built curved-roof structures - reconstructed academies or compact ceremonial halls. Teahouses were booming, and even bubble tea shops had swapped their signage for seal script.\n\nLi Mubai no longer felt left behind by the times. Every day in the classroom, watching his students write the characters for ren, yi, li, zhi - benevolence, righteousness, propriety, wisdom - he felt a quiet sense of certainty settle in his heart. He recalled a line he once stumbled across in college:"All under heaven is the sovereign's land; the rise of ritual and virtue lies in the people's hearts."\n\nThat evening, as he stood at the school gate, the lights of the towers in the distance began to flicker on, one by one.\n\nHe closed his eyes. Then opened them again, and saw - "
 china.618.a: "Ten thousand lights, spilling across the horizon."
 china.619.t: "Watching the Opera"
 china.619.d: "Zhou Lianhou sat in the fourth row of the Grand Drama Theatre, his body slightly leaning forward, eyes fixed on the stage. Tonight's performance was Hai Rui Dismissed from Office. The actor playing Hai Rui had a voice like hammered steel. When he sang, "To favor kin and forget the law - how could that be a righteous man?", many in the audience nodded in quiet agreement. The opera was at its peak - Hai Rui denouncing corrupt officials, slamming down his memorial in righteous fury.\n\nZhou raised his teacup and gently tapped the lid with his finger. He had come from a red-cadre family. After graduating from university, he began his political career in Ma'anshan, then transferred to Changshu, where he worked in Organization and the Planning Commission, slowly grinding his way up to a provincial-level position. Sitting beside him was an old colleague, Wu Zhiqiang - long retired, running into him tonight by pure coincidence. During an interlude, Wu leaned over and whispered, "Hey... the way we've come - from Chairman Mao leading the Party to seize land from landlords, to where we are now... Tell me, doesn't it feel like we've circled right back?"\n\nZhou said nothing, only sipped his tea, eyes still on the stage. He knew better than to answer - not out of fear, but because there was no need. Wu sighed and said no more. The opera resumed. Hai Rui, now dismissed from office, took up his post once more, undeterred. His farewell aria echoed with sorrow, yet was laced with resolve.\n\nZhou sat motionless. It wasn't that he didn't understand Wu's meaning. The Communist Party had fought its way into power to drive the reactionaries out of China, to build a new nation for the people upon the ruins of the old. But in the end, it was the Communist Party that had invited the emperor back. Still, this was not something he should comment on. Not now. Not here. He was just watching a play. And what's in a play - was never meant for commentary."
 china.619.a: "Trouble begins with the tongue."
 china.620.t: "The Farmer"
 china.620.d: "Song Mancang squatted at the edge of his field, lighting a Sun Island cigarette. The smoke drifted sideways in the wind. He pulled out his phone and checked the greenhouse stats - temperature just right, humidity even. On the monitor, he could see the cucumber vines climbing neatly along the strings, the rows of lettuce in the soil growing fast. The irrigation system hissed softly in the background. Everything looked solid.\n\n"Good. Real good," he muttered - not to anyone in particular, just the kind of words that slip out when an old man sees his work going smooth. He was nearly seventy now. Born and raised in Long'an Tun, he'd been farming all his life. It used to be bitter - kerosene lamps, ration coupons, scraping through New Year's - but now things had changed. The village had central heating, paved roads led straight to the town center, and a brand-new clinic had just been built near the entrance. Two young doctors, both back from university, took shifts there. You could even get an X-ray done without leaving the village. The primary school had been renovated to look like one in the city - kids practiced calligraphy and sang opera tunes.\n\nFor the first time in his life, old Song felt like farming might just be better than living in the city."An emperor? Eh, doesn't sound so bad," he thought."As long as we've got land to work, food to eat, good roads, and doctors we can afford, what more do you need?"\n\nHe wasn't an educated man. Didn't bother with all that messy news. To him, whether life was good or bad could be judged by a few simple things: whether cigarettes were expensive, whether medicine cost too much, and whether the seeds still sprouted.\n\nHe looked up at the sunlight glinting off the greenhouse roof, already thinking about when to lay the next row of film and start another batch of long beans."
 china.620.a: "An emperor? Doesn't seem so bad after all."
 china.621.t: "God Loves the World"
 china.621.d: "Li Zhiqiang stood with a cigarette in his mouth beside the scaffolding outside the church. He had arrived at the site at five in the morning - it was a temp job, they said, to demolish an old building. When he got there, he realized it was the Sacred Heart Cathedral. He'd seen it when he was a kid - the spire was towering, and those flashy stained-glass windows were still vivid in his memory. They said foreigners had built it.\n\n"Why tear this down?" he asked. The squad leader, wearing an armed police armband, rolled his eyes. "Don't ask. Just do it." Li clicked his tongue, stubbed out his cigarette, grabbed a sledgehammer, and followed a few others inside. The church was empty. Broken glass crunched underfoot. Near the altar, he saw a small statue of Jesus, about half a person tall, with a surprisingly delicate face.\n\n"What the hell is this?" he cursed. "A foreigner gets to be a god?" He swung the hammer. The statue toppled over and rolled into a pile of burning curtain fabric nearby. The flames leapt up, and the Jesus statue caught fire. The wood crackled as the burning face twisted into a grotesque mass in the flames.\n\nLi Zhiqiang glanced at it. "Shit, should've burned it long ago," he said. "Not my damn business. What's the point of keeping this foreign trash around?" He turned and continued tearing down the rear wall. The mosaic glass shattered with a crash, and sunlight streamed in, falling across the dusty floor."
 china.621.a: "He didn't look back."
 china.622.t: "Allah Weeps"
 china.622.d: "As unrest across Xinjiang intensified, the situation rapidly escalated beyond the control of local authorities. After multiple emergency sessions, the central government ordered the deployment of People's Liberation Army units and the National Guard into the region, advancing simultaneously from Lanzhou, Xining, Kashgar, and Tacheng. Upon entering urban areas, National Guard forces began immediate street sweeps, mosque lockdowns, and dispersal of crowds. Armored vehicles patrolled the main roads of Urumqi, checkpoints were established at city entrances and exits, and all individuals were required to register their identities. In southern Xinjiang, military administration was declared, with key institutions and transport hubs placed under direct PLA control.\n\nThe campaign to seal and ban mosques commenced swiftly after the army's arrival. Mosques in Urumqi, Kashgar, Aksu, and other cities were uniformly sealed with official notices, fenced with barbed wire, and guarded by sentries - entry strictly forbidden. Numerous small, unregistered village mosques were demolished overnight. Qur'anic texts, sermon manuscripts, prayer mats, and related materials were confiscated and classified as illegal religious items.\n\nShortly thereafter, the National Ethnic Affairs Commission and the Bureau of Religious Affairs jointly issued a directive: all Islamic religious activity within China's borders was henceforth prohibited, all mosques permanently closed, and all religious titles nullified. Any use or display of Islamic symbols, rituals, attire, or festivals would be subject to legal consequences."
 china.622.a: "Not a single one spared."
 china.623.t: "Journey to Southern Xinjiang"
 china.623.d: "Zhang Lijun stood at the entrance of the mosque, gripping his automatic rifle, sweat streaming down his forehead. It was his third time participating in a closure operation. The orders from above were clear: all religious activity in this area must be thoroughly inspected. The sun was merciless, the ground hot like a boiling pan. Their unit had fanned out in a straight line, sealing off the entire street intersection with precision.\n\nSuddenly, a group of people rushed toward them - maybe fifteen or twenty, mostly young men, but a few elders too. They were shouting, the words indistinct and chaotic, some holding stones, one even clutching a child. Zhang Lijun didn't move. His orders were to fire warning shots. He raised his rifle and fired three rounds into the air. The shots rang out, the crowd hesitated for a moment, then quickly backed away. He watched them - not with anger, but with a deep sense of pity.\n\nThese people had grown up in this kind of world, taught from birth what they could and couldn't do, even when they were allowed to eat - always dictated by whoever rang the bell. They thought it was faith, but really, it was just a prison they couldn't see. And when we came to tear down the walls, they saw us as the enemy.\n\nZhang Lijun frowned, spotting an old man standing at the mouth of an alley, staring at him like he was some kind of monster. He turned away from that gaze, keeping his post.\n\nThe sun kept burning. He just wanted the day to end, to go back to the barracks..."
 china.623.a: "...and close his eyes so he wouldn't have to think about any of this shit."
 china.624.t: "The Traitor's End"
 china.624.d: "Tan Zhengnan had been in the system for nearly forty years, but never imagined his career would end like this. The day was supposed to be the city's Party Congress. The new municipal committee sat on stage, while the heads of all departments filled the seats below. Midway through the session, just as the host finished reading the third agenda item - and the hall had yet to finish applauding - the doors opened and several members of the National Militia in gray uniforms stepped inside.\n\n"Comrade Tan Zhengnan," the one in front said calmly, "you are suspected of maintaining contact with hostile foreign forces. Preliminary evidence of aiding the enemy has been established. By order of the Central Committee, you are to be taken away. You will assist with the investigation following this meeting."\n\nThe room fell instantly silent. Sitting in the front row, Tan Zhengnan froze, then suddenly shot to his feet like he'd been stung, voice raised sharply: "Aiding the enemy? I've worked my whole life - for the Party, without a single complaint! You little rookies - what the hell do you know about patriotism?"\n\nThe militia officers didn't reply. One took his left arm, another his right. Tan tried to shake them off, but a third gripped his elbow tightly, forcing him toward the exit. He twisted around, shouting at the crowd: "What enemy did I contact? The sewer at your house? I tell the truth once and now I'm a traitor?!"\n\nNo one responded. The Standing Committee members in front stared ahead, stone-faced, as if they hadn't heard a word. Young cadres in the back kept their eyes low, hands pressing firmly on the table - terrified that one stray expression might make them the next. He looked like he still wanted to speak, but his whole body was dragged through the door.\nBang. The door slammed shut. Silence returned.\n\nThe deputy secretary hosting the meeting cleared his throat, raised his eyes as if nothing had Dhappened, and continued reading from the agenda: "Next, we invite the newly appointed Deputy Director of the Organization Department to speak.""
 china.624.a: "A round of perfectly synchronized applause rose from the audience."
 china.625.t: "Quotations from Chairman Chen"
 china.625.d: ""All they used to feed us back at the political-military academy was Deng Xiaoping, the truth of development, then the need for 'Chinese Characteristics', about Xi Jinping, you know, those sorts of things. All bark, less meaning. They're not even worthy for big-character posters on the sidewalk, you know?"\n\nChen swirled his ginseng tea in its porcelain cop, rain tapping against the windows of the Secretariat Palace as he sat with a senior general, an old frend from their days at Lanzhou, back to consult during the unrest.\n\n"Didn't we all carry the little red book once?" The general chuckled.\n\nChen nodded. "Yes, comrade. But I never read it in its true sense. Until last year, not front to back. We were taught to know Mao, you know. But theres this old Taoist saying - you only know what your soul is willing to hear, and your eyes have dared to see."\n\nThe general raised his brow as Chen looked to the window, downing his tea with a gulp. "Mao didn't just build the Communist Party. He looked to the countryside, to the farmers, to the hills, but he didn't ask the West how to make revolution. The Soviet Union called itself the "Great Rus", precisely because the exception lies upon the people." He tapped his table as he traced a figurative circle. "To surround the First World, we rebuild China, really, the Han spirit as a whole.""
 china.625.a: "History brings fresh perspectives after all."
 china.626.t: "The New Red Guards"
 china.626.d: "As demonstrations surged like waves across the country, calls for reform, dignity and political rejuvenation called beyond the Party's capacities. And then, almost overnight, the protests died. In lecture halls and dormitories, students began organizing not to protest; but to defend.\n\nTo defend the Party, to rejuvenate the Party. The ideals of sovereignty, exceptionalism, and most importantly - the leadership.\n\nThey wore armbands with old calligraphy, quoted Mao and disavowed Deng and Xi. Rejuvenation, not to revolt, but to restore what once was. From the vendors of Wuhan to the engineers in Chengdu, cadres emerged in plain clothes, calling themselves the People's Defense Corps.\n\nIt came as Chen called for a popular initiative for defense, launching from the springboard of student nationalism. As rural and educated youth slammed their batons and hung banners of shame against many who rallied against the government, the old campaign came newer. A cultural discipline, one of national nature. To agitate and give the leadership to the youth.\n\nAnd when the youth led, they did. In their thousands."
 china.626.a: ""To serve the people is to serve the people's nation.""
 china.627.t: "Documentary "Heroes of the Borderland" Released"
 china.627.d: "On the eve of National Day, China Central Television launched a documentary titled "Heroes of the Borderland," spotlighting frontline stories of counterterrorism and stability maintenance in Xinjiang. The film, featuring Chairman Chen Quanguo as its central figure, showcases the struggles of grassroots officers against the "three evil forces" through powerful imagery. On its premiere night, viewership broke records for documentaries this year.\n\nThe film blends documentary and narrative techniques, focusing on scenes of patrols through snow-covered terrain and intelligence analysis, portraying Chen Quanguo as a leader of remarkable wisdom who commands from behind the scenes. The narration repeatedly emphasizes that "without stability, there can be no happy life," interweaving historical footage with cases of violent extremism, directly linking certain local cultural symbols with extremists. Throughout the footage, a stark contrast emerges between camouflage-clad armed police officers and what's portrayed as the ignorant local population.\n\nAfter organized group viewings in Beijing, Shanghai, and other cities, audience reactions were intense. "I now understand why we needed to crack down hard in Xinjiang," one viewer exclaimed emotionally. "Han people are just too kind-hearted - we offered so many preferential policies and still got no gratitude." Particularly moving were segments showing rehabilitation: residents who once participated in extremist activities tearfully thanking the Party for its education. On Weibo, the hashtag "Thank the Guardians of the Borderland" has garnered over 800 million views.\n\nHowever, a university professor noted: "This narrative style selectively highlights certain events while completely ignoring the impact of economic reform on grassroots governance since the Reform and Opening Up." This viewpoint was quickly drowned in the overwhelming tide of public opinion."
 china.627.a: "Very good!"
 china.628.t: ""Dragon Radiance Expo""
 china.628.d: "Since Chairman Chen Wenqing assumed power, numerous anime and ACG enthusiasts across the country have actively responded to the call to "resist spiritual pollution," voluntarily boycotting various forms of foreign - particularly Japanese - ACG works, whether manga, games, or offline conventions. The domestic ACG industry also swiftly pivoted toward "patriotic propaganda works," giving rise to a new form of anime convention, which organizers dubbed the "Dragon Radiance Expo."\n\nThis type of expo first appeared in Guangzhou, founded by several ACG enthusiasts who had returned from studying in Australia. According to them, the "Dragon Radiance Expo" aimed to infuse the great fighting spirit and creative spirit of the Chinese nation into a purified version of ACG culture, stripped of its undesirable elements. Characters cosplayed at these expos were no longer the handsome men and beautiful women from once-popular anime, but rather figures rich in Chinese historical elements - even sensitive characters like Taiping Heavenly Kingdom soldiers, Boxer Rebellion fighters, and Red Guards, figures that people once knew little about or deliberately avoided mentioning.\n\nThis quickly became a trend. Major cities nationwide rushed to organize their own "Dragon Radiance Expos" or similar events, attracting throngs of participants. State media such as People's Daily and Xinhua News Agency even personally covered and highly praised the new convention model.However, there were also many dissenters who believed this distorted the essence of ACG culture. They tried to organize protests, but for various reasons, these quickly fizzled out."
 china.628.a: "New era, new changes."
 china.629.t: "Internet Anti-Hate Alliance"
 china.629.d: "In recent days, a wave of accounts has emerged on public social media platforms such as Zhihu, Weibo, and Douban. These accounts, aiming to "expose the truth behind foreign anti-China forces smearing China," have spontaneously published posts and videos analyzing and fact-checking anti-China propaganda from the media of countries like Japan, South Korea, and other Indo-Pacific Treaty members, attracting considerable attention and praise from netizens.\n\nThese accounts claim to be members of the "Internet Anti-Hate Alliance," with a wide-ranging debunking scope - from content by self-media bloggers on YouTube and X, to reports by Japan's Asahi Shimbun and Korea's "ChoJoDong" news outlets, even including obscure far-right websites. Whether addressing hot social issues or niche events, they always seem able to swiftly expose false propaganda at the earliest moment. In addition, the Anti-Hate Alliance frequently reposts negative news from various countries, using it to highlight how these governments and certain media outlets deliberately slander and fabricate stories about China to cover up their governance failures and divert internal tensions, thereby fueling extreme nationalist sentiment against China within their own populations.\n\nAt one point, outsiders suspected this to be a covert operation orchestrated by the Central Propaganda Department and the Cyberspace Administration of China. However, facts have shown that this is merely Chinese netizens seizing the high ground of public opinion and launching counterattacks against foreign propaganda offensives."
 china.629.a: "Could this be part of the public opinion war?"
 china.630.t: "The Gears of History Turn Back"
 china.630.d: "Overnight, Mao's portraits had once again adorned the roads, theaters, and public parks of many cities. Before his statues, youths and elders laid flowers together, softly reciting Mao's poetry. In the public areas, young people voluntarily formed "Mao Zedong Thought Societies," sharing revolutionary history and expressing fairness, equality, and the dignity of the people. The New Era Red Guards now marching among the streets. Their uniforms are no longer symbols of turmoil. But rather, honor revolutionary spirit, engaging in public service, history education, and acting as bridges between the people and the government.\n\n"Mao Zedong" was no longer a sensitive term, he became the pillar of new politics and culture, hailed as "a symbol of people's ideals and national revival." State media declared: "The new revolutionary spirit is not a copy of the past, but a remolding of faith. The people choose to continue the unfinished mission."\n\nMeanwhile Premier Zhou Enlai, received recognition, his fairness, and care for the people define him as a "paragon" for modern political workers and civil servants. Party schools at all levels have made the "Zhou Enlai Style" a compulsory part of training, emphasizing the balance between ideals and realism while maintaining the people's perspective. The once sensitive topics were now acknowledged, certain historical controversies remain deliberately understated. As officials stressed: "We commemorate faith and the people, not the pain of the past."\n\nVeteran Party members reflected: "the gears of history have turned back. But this is the people's choice - a call to the future, not an escape to the past." Policies shifted quickly. The state restored order oversight, raised worker and peasant roles in local governance, and emphasized: "Develop the economy, but never sacrifice fairness and justice. The market must serve the people, not the people serve the market."\nHistory seems to have entered a new cycle. As Chairman Mao once said: "A Single Spark Can Ignite a Prairie Fire."
 china.630.a: "The flame of revolution once again lights the path ahead."
 china.631.t: "Monk Kong's Support"
 china.631.d: "Recently, renowned scholar Kong Qingdong has published signed articles in multiple media outlets, drawing widespread attention. Kong Qingdong has long been known for his radical nationalist and Maoist stance, advocating for the complete elimination of all Western capitalist liberal ideologies and decadent bourgeois culture.\n\nIn his articles, Kong Qingdong highly praised the government's recent rectification campaigns across various sectors of society, calling them a "timely thunderbolt to purge Western infiltration and safeguard national political and ideological security".\nKong emphasized that capital has no homeland, and that the Chinese people must arm themselves with Chairman Mao's thought, thoroughly cleansing those comprador capitalist elements who attempt to use capital to weaken Party leadership and corrupt Chinese youth."
 china.631.a: "I heard he claims to be a descendant of Confucius..."
 china.632.t: "Hawkish Professor"
 china.632.d: "Tianjin, visiting Nankai University to commemorate the late hawkish professor Ai Yuejin. During his lifetime, Ai Yuejin was known for his firm nationalist stance, advocating that the nation must resolutely follow an independent development path, opposing all forms of compromise and weakness. He was regarded by some young people as a symbol of "national backbone".\n\nThe memorial event was held outside the gates of Nankai University. Participants held banners and read aloud quotes from Ai Yuejin's past lectures. They believe that Ai Yuejin embodied a spirit of courage in struggle and fearlessness in the face of conflict, serving as a role model for contemporary youth."
 china.632.a: "Commemorating the conscience of Chinese intellectuals."
 china.633.t: "The Rightful Honor"
 china.633.d: "Since we bestowed the imperial title upon Chairman Mao, there have been ongoing calls within the Party and society to grant similar honorary titles to the founding fathers of New China, who, like Mao, participated in the revolution. This would honor our glorious history, standardize political order, foster social consensus, and strengthen the unity and pride of the people. Additionally, it offers an opportunity to officially recognize and assess leaders who have been controversial in our Party's history, giving them the recognition they deserve.\n\nIn response to this suggestion, the Central Propaganda Department has provided a detailed plan and its recommendations. Our final decision is..."
 china.633.a: "Absolutely!"
 china.633.b: "We will only revere Chairman Mao!"
 china.634.t: "The Spirit of Humanity"
 china.634.d: "Working People's Cultural Palace, also known as the Imperial Ancestral Temple, was once a sacred site where emperors honored their ancestors and revered the heroes who unified the nation or established glorious eras. Since the founding of the People's Republic of China, it has transformed into a leisure and gathering place for Beijing's citizens, shedding its former solemnity and grandeur.\n\nToday, however, it seems as if the splendor of a century ago has returned. Soldiers of the honor guard, dressed in modern, splendid uniforms and gripping their gleaming rifles, stand in stark contrast to ceremonial officials in wide-sleeved, ancient-style robes. White smoke rises slowly from the incense burners, signaling that the ceremony is reaching its climax. The leading official unfurls a long scroll of the national document and solemnly reads aloud the names and posthumous titles of the founding heroes - \n\nDuke Wen Zheng of Wu, Zhou Enlai;\nDuke Wen Huai of Chu, Liu Shaoqi;\nDuke Wen Hui of Xiang, Ren Bishi;\nDuke Wen Yi of E, Dong Biwu;\nLord Lie of Haiyang, Li Dazhao;\nLord Zhe of Hengshan, Chen Duxiu;\nLord Zhen of Changsha, He Shuheng;\nLord Jing of Huainan, Chen Tanqiu;\nLord Yi of Yanling, Qu Qiubai;\nLord Ying of Lingling, Cai Hesen; and - \n\nDuke Zhong Wu of Liang, Zhu De;\nDuke Xiang Wu of Tan, Peng Dehuai;\nDuke Dao Wu of Chu, Lin Biao;\nDuke Jing Wu of Ba, Liu Bocheng;\nDuke Yi Wu of Hong, He Long;\nDuke Ning Wu of Fu, Chen Yi;\nDuke Zhao Wu of Heng, Luo Ronghuan;\nDuke Shun Wu of Dai, Xu Xiangqian;\nDuke An Wu of Jiang, Nie Rongzhen;\nDuke Gong Wu of Yue, Ye Jianying.\n\nAs long as the People's Republic of China endures, these heroes will be eternally revered and remembered."
 china.634.a: "Wansui!"
 china.635.t: "Veterans to Their Tablets"
 china.635.d: "Working People's Cultural Palace, also known as the Imperial Ancestral Temple, was once a sacred site where emperors honored their ancestors and revered the heroes who unified the nation or established glorious eras.\n\nSoldiers of the honor guard, dressed in modern, splendid uniforms and gripping their gleaming rifles, stand in stark contrast to ceremonial officials in wide-sleeved, ancient-style robes. White smoke rises slowly from the incense burners, signaling that the ceremony is reaching its climax. The leading official unfurls a long scroll of the national document and solemnly reads aloud the names and posthumous titles of the founding heroes - \n\nPrince Xian Wen of Han, Deng Xiaoping; and - \n\nDuke Wen Su of Su, Chen Yun;\nDuke Wen Xi of Zhang, Deng Zihui;\nDuke Wen Li of Yue, Li Fuchun;\nDuke Wen Cheng of Li, Lin Boqu;\nDuke Wen Du of Ning, Xie Juezai;\nDuke Wen Ci of Hua, Xu Teli;\nDuke Wen Qing of Rong, Wu Yuzhang;\nDuke Wen Da of Jia, Guo Moruo;\nDuke Wen Yu of Tong, Shen Yanbing; and - \n\nDuke Rui Wu of Yuan, Su Yu;\nDuke Cheng Wu of Wu, Xu Haidong;\nDuke Xin Wu of Chen, Huang Kecheng;\nDuke Dun Wu of Lian, Chen Geng;\nDuke Ke Wu of Yuan, Tan Zheng;\nDuke Jie Wu of Zhu, Xiao Jingguang;\nDuke Lie Wu of Qiong, Zhang Yunyi;\nDuke Zhi Wu of Bai, Wang Shusheng;\nDuke Qin Wu of Guo, Luo Ruiqing;\nDuke Min Wu of Shan, Xu Guangda.\n\nAs long as the People's Republic of China endures, these heroes will be eternally revered and remembered."
 china.635.a: "Wansui!"
 china.636.t: "Heroes Deserve Honor"
 china.636.d: "Working People's Cultural Palace, also known as the Imperial Ancestral Temple, was once a sacred site where emperors honored their ancestors and revered the heroes who unified the nation or established glorious eras.\n\nSoldiers of the honor guard, dressed in modern, splendid uniforms and gripping their gleaming rifles, stand in stark contrast to ceremonial officials in wide-sleeved, ancient-style robes. White smoke rises slowly from the incense burners, signaling that the ceremony is reaching its climax. The leading official unfurls a long scroll of the national document and solemnly reads aloud the names and posthumous titles of the founding heroes - \n\nDuke Wen Xian of Qu, Peng Zhen;\nDuke Wen Duan of Huang, Li Xiannian;\nDuke Wen He of Yong, Xi Zhongxun;\nDuke Wen Min of Jin, Bo Yibo;\nDuke Wen Jie of You, Tan Zhenlin;\nDuke De Wu of Wei, Zhang Zongxun;\nDuke Jian Wu of Da, Zhang Aiping;\nDuke Ding Wu of Liu, Wang Zhen;\nDuke Jing Wu of Xun, Yang Dezhi;\nDuke Rong Wu of Ting, Yang Chengwu; and - \n\nLord Mu of Jianning, Zuo Quan;\nLord Ge of Haifeng, Peng Pai;\nLord Zhong of Guishan, Ye Ting;\nLord Zhuang of Queshan, Yang Jingyu;\nLord Xian of Yiyang, Fang Zhimin;\nLord Guang of Bao'an, Liu Zhidan;\nLord Ke of Zhenping, Peng Xuefeng;\nLord Yuan of Nanzhou, Duan Dechang;\nLord Wei of Xiangxiang, Huang Gonglue;\nLord Shao of Xingtai, Dong Zhentang.\n\nAs long as the People's Republic of China endures, these heroes will be eternally revered and remembered."
 china.636.a: "The stars shine across China's vast sky."
 china.637.t: "National Militia Marches into Hong Kong"
 china.637.d: "Members of the National Militia were recently sighted crossing border checkpoints from Shenzhen's Luohu, Lok Ma Chau, and Futian areas into Hong Kong. Multiple video clips show uniformed, lightly armed units conducting targeted searches and large-scale arrests across various districts, primarily aimed at individuals previously involved in protests and those labeled by authorities as "anti-government elements."\n\nAccording to eyewitnesses and footage circulating on social media, the National Militia has established temporary cordons in areas such as Causeway Bay, Mong Kok, and Yau Ma Tei, carrying out door-to-door residential inspections. Several former members of pro-democracy groups and individuals affiliated with localist movements were reportedly taken from their homes. Sources suggest that many have been transferred to temporary detention facilities near Fanling. In Sha Tin, a site formerly used by the League of Social Democrats was sealed off. After materials were removed, burn marks appeared at the scene, though the cause has yet to be officially confirmed.\n\nAs of now, the central government has issued no public statement regarding the nature or objective of the operation. However, multiple foreign media outlets, citing sources close to policy circles, report that the operation has received high-level "tacit approval" and is regarded as "a necessary purge." Allegedly, most detainees are individuals who were active in street protests, digital activism, or NGO operations since 2018. Some analysts argue that the operation departs from standard policing, with its scale, coordination, and specificity making the term "purge" more appropriate."
 china.637.a: "Things are not looking good."
 china.638.t: "Mastering the Past..."
 china.638.d: "Recently, the latest shifts in Chinese cultural and intellectual thought have once again captured global attention. Prominent scholars and high-ranking government officials have strongly criticized the so-called "Western historical nihilism" through various channels, including news interviews, newspaper articles, and symposiums.\n\nLeading figures among Chinese intellectuals assert that extensive research in literature and archaeology has convincingly proven the ancient and civilized origins of Chinese history. In contrast, the origins of Western history - such as Greek and Roman civilizations, which have long received significant attention - are viewed as either the result of primitive tribes migrating from ancient China and settling on the western edge of the old continent, or as secondary civilizations gradually formed by indigenous chieftains under the influence of Chinese civilization.\n\nMany Western historical works that were once considered treasures of historiography - such as Herodotus's Histories, Thucydides's History of the Peloponnesian War, Gibbon's The History of the Decline and Fall of the Roman Empire, and Toynbee's A Study of History - are now denounced as "forgeries," banned, or destroyed, and are rarely found on various database websites. Additionally, numerous historians and intellectuals specializing in Western history have faced consequences, with teaching positions revoked, while even ordinary scholars engaged in popular science have been harshly silenced.\n\nBeyond the realm of entertainment, many prominent Western literary and scientific works have been labeled as 'degenerate culture' and targeted, or their origins deliberately altered to present them as original Chinese creations. This series of actions by the Chinese authorities has been compared to the "burning of books and burying of scholars" during the Qin Dynasty, sparking concerns about what the 'all-powerful' Chinese leaders might target next after reshaping the minds of 1.4 billion people."
 china.638.a: "...is mastering the future."

 china.700.t: "A Small Problem"
 china.700.d: "The sea breeze brushed gently over the dock, carrying its familiar salt and brine. Sun Jianguo had returned to the submarine base where he had served for many years, watching the dark hulls rest silently in the harbor. Near the mooring posts, a few young sailors who had just finished maintenance leaned against the railings, uniforms soaked with sweat. None of them noticed the old admiral standing not far away, speaking in a low voice.\n\n"Finally, some fresh air,"one of the young men said, wiping his face with his sleeve. "Staying down there any longer and a man'll go mad."\n\n"No kidding,"another replied. "After weeks of submerged operations, it's like a steamer in there. The air's so bad... after a long shift, your chest feels tight just breathing."\n\n"Cramped quarters I can stand,"the first one muttered, "but when the shooting starts-that's another story. I'll never forget during the Battle of Taiwan, when we finally locked onto a Japanese tanker. The weapons officer said the torpedo stock was almost runs out."\n\n"Exactly. Our gear's solid, sure-but when it matters most, there's never enough of it..."\n\n"Ahem."Sun Jianguo cleared his throat softly behind them.The sailors jumped, snapping to attention as soon as they recognized him. "Good afternoon, sir!"\n\nSun waved a hand, signaling them to relax. His eyes swept over their young, weary faces. His expression was stern, but his tone carried a quiet warmth."I heard everything."The sailors froze, unsure what to say.\n\n"What you said is true-and it's a serious problem. If the equipment's short and logistics can't keep up, the cost of war will be paid in blood."He patted the shoulders of the two who had spoken. "You've endured enough. Don't worry-everything you just said, I'll take back word for word and report it to the Central Military Commission.""
 china.700.a: "'These kinds of problems must be solved without delay.'"
 china.701.t: "Report on Issues in Combat Readiness and Logistical Support of SSN Units"
 china.701.d: "FROM: Sun Jianguo\nDATE:[GetDateText]\n\nComrades of Central Military Commission,\nRecent inspections of frontline SSN units of Northern Theater Command have revealed serious logistical and support deficiencies in several units directly responsible for combat readiness. These issues have already begun to affect sustained operational capability and troop morale.\n\nThe primary problems are summarized as follows:\n1.In certain active SSNs --- particularly older models, the working and living conditions are extremely cramped. Long periods of duty under high-temperature, high-humidity, and poorly ventilated conditions have severely impacted both the health and morale of our crews.\n\n2.Multiple frontline crews and weapons officers reported that during recent liberation operations, critical munitions were running out much faster than expected, actual demand is far exceeds the design parameters of submarines.. This has exposed serious gaps in both the stocking and resupply capacity of precision-guided munitions and other key consumables, which remain insufficient to sustain prolonged, high-intensity warfare.\n\nThese problems may appear as hidden risks in peacetime but would prove fatal in wartime. I recommended that the CMC establish a task group to conduct a comprehensive audit of the SSN unit's combat ammunition reserves, allocate special funding to make sure these problems will not appear on out next generation SSNs."
 china.701.a: "Comrade Sun has done us a great favor."
 china.701.b: "In the face of the larger picture, the Navy must learn endurance."
 
 china.702.t: "Another Day on the Gantry Crane"
 china.702.d: "Dark clouds gathered overhead as the salty sea breeze swept along the Huangpu River toward the factory grounds. Though the sun hung high in the sky, the air felt surprisingly cool—the perfect moment to unwind.\n\nAfter safely hoisting the LHD's radar into position, Zhao walked to the railing outside the control room. Here, he could quietly admire his handiwork, letting the fatigue from operating the gantry crane fade away.Of course, scenery alone wasn't enough; a little thrill was needed. As usual, Old Zhao pulled out a cigarette, and with each puff, the factory grounds filled with another wisp of smoke.\n\n"Hey, Old Zhao, you always smoked Seven Stars. Why you switch to Zhonghua?" As Zhao puffed away, a new employee joined him for the rest. Zhao vaguely remembered him—nicknamed college kid, he'd joined Hudong Shipyard three months ago through recruitment. He was enthusiastic and always full of energy, just like Zhao himself back when he first started.\n"The boss said we should support domestic brands more. Smoking Japanese cigarettes would make me seem out of step."\n"Since you're here, just join me for a chat. Don't you feel something odd here? Hope it's just me getting senile."Zhao gazed at the array of vessels before him—some frigates load with missiles awaiting final testing, others larger landing ships. Without exception, every vessel bore some form of weaponry, casting an unfamiliar shadow over the shipyard he knew so well.\n\n"You mean those blood-red slogans plastered on the machinery? Yeah, they do feel pretty oppressive."\nBut college kid clearly didn't pick up on Zhao's subtext. After all, he was new to the shipyard, so it wasn't fair to expect much from him.\n"Slogans? I'm used to those. I've seen worse. Besides, they might be replaced tomorrow anyway. But look at this drydock. You haven't touched a civilian ship since you started, have you?"\nRecalling the past, Zhao took a deep drag on his cigarette, then slowly exhaled his thoughts."
 china.702.a: ""It wasn't like this when I was young.""
 
 china.704.t: "General Xu Qiliang Passed Away"
 china.704.d: "An outstanding member of the Communist Party of China, a long-standing and loyal communist fighter, a proletarian military strategist, and an eminent leader of the People's Liberation Army of China, General Xu Qiliang, passed away in Beijing at 12:12 p.m. on June 2, 2025, due to illness at the age of 75. He served as a member of the Political Bureau of the 18th and 19th Central Committees of the Communist Party of China and former Vice Chairman of the Central Military Commission."
 china.704.a: "RIP, General."
 

 china.68.t: "Color Revolution in Hong Kong"
 china.68.d: "Disturbing reports have emerged from the local authorities in Hong Kong as Seperatist protestors and armed militia have pushed the Hong Kong police force out of the city. The local government has fled to Shenzhen, where the PLA detachment currently waits on standby. As the war of National Reunification rages on across the strait, the streets of Hong Kong are in chaos as criminal elements and rabid mobs have taken advantage of the chaos and have started to burn, loot and even kill. While the forces of the liberal provisional government have attempted to stop the chaos, their pleas are largely ignored. With student militias ready to defend the streets of Hong Kong to the last man, it is almost certain that the city will not be retaken easily and without great loss of life."
 china.68.a: "Crush Those Western Cockroaches!"
 china.69.t: "Revolution in Hong Kong"
 china.69.d: "Since the outbreak of the Taiwan war, Hong Kong's already dismal economy has worsened under the twin blows of the COVID-19 pandemic and the economic blockades. At the same time, public dissatisfaction with the government has reached an all-time high. After weeks of protests that gradually escalated into open confrontation between protest groups and the government, radical university students at the forefront of the demonstrations have taken control of several police stations and key locations throughout Hong Kong. Meanwhile, pro-independence activist Jimmy Lai announced the formation of a "Hong Kong Provisional Government" in the occupied Legislative Council building, declaring that this provisional government represents "the true will of the Hong Kong people" and calling on the international community to recognize it. Although the provisional government has taken control of most of Hong Kong and extended its reach into Lok Ma Chau and Sheung Shui - areas previously under the control of the Special Administrative Region - it is certain that Beijing will not simply stand by and ignore the situation in Hong Kong."
 china.69.a: "5 Demands, Not One Less!"
 china.70.t: "Foreign Agents Spread Anti-War Propaganda"
 china.70.d: "It seems as though foreign agents have disseminated fake news about the war in Taiwan, claiming that the government was undercounting the amount of dead PLA soldiers, as well as exaggerating the monetary cost of the war. In addition, several doctors photos appeared online, claiming to be proof of PRC warcrimes comitted on the island. Thanks to the hard work of internet moderators, these subversive accounts have been removed, but it is all but certain they will be back. Unfortunately, many of the images have caused alarm among the general populace of the population, as well as the lower party bureaucracy, meaning that the war must be hastened lest they start protesting."
 china.70.a: "Unfortunate."
 china.71.t: "Islamist Terrorists Launch Attack"
 china.71.d: "With the outbreak of the War of National Reunification, many garrisons in Xinjiang have been moved to Southern China in order to provide support for the war effort. This decreased security has allowed for islamist extremist groups such as the East Turkestan Liberation Organization to regroup and reorganize, to launch an attack against civilian infrastructure in the Xinjiang region. Although regional party chief Ma Xingrui has assured the Politburo that the terrorist threat will be crushed, no such progress seems to have been made so far."
 china.71.a: "Horrible"
 china.72.t: "PLA Captures Taipei"
 china.72.d: "BEIJING: After months of brutal urban combat against separatist forces, who had been reinforcing and resupplying Taipei through treacherous mountain paths in the south and southeast of the city, the People's Liberation Army Ground Forces were successful in retaking Taipei, thus achieving a main goal of the Anti-Separatist Military Operation on Taiwan. Unfortunately, PLA sustained heavy casualties in the battle, but the blow done to the separatist and imperialist forces was necessary. Several hundred Japanese and Australian mercenaries were captured during the battle, and several hundred more were killed.\n\nWith the capturing of Taipei, the People's Liberation Army is now on the verge of totally destroying remaining separatist holdouts in Taiwan Province. All troops from the Taipei Operation will be redirected to crushing these holdouts elsewhere, which are mainly in the mountainous central region of Taiwan, with little strategic significance and no access to coastlines or ports.\n\nGeneral Zhang Youxia of the PLA Ground Force reported that the Anti-Separatist Military Operation was going as planned, and that all separatist holdouts were expected to collapse within the next month. He ended his statement by warning the imperial powers within the pacific region that their support for separatist terrorists in Taiwan was playing with fire, and the inevitable result was that they would be severely burned very soon."
 china.72.a: "Taiwan is on its Last Legs. "
 china.73.t: "Student Anti-War Protests"
 china.73.d: "With the war in Taiwan dragging on, the unpopularity of the war has grown, especially in the circles of academia and intelligentsia. In university campuses all across China, student protestors and proffesors have come out in opposition to the war, calling it an abomination to human dignity. While this protest will likely have little effect on government policy, it is a surefire sign that the high casualties inflicted on the PLA on a war that does not directly benefit our citizenry is becoming more and more unpopular at home. Those in the Ministry of State Security have suggested that we take action and crush these protests before their subversive messaging can reach more people. Meanwhile, the Reformers in our government have suggested that we allow these protests to continue as a sign of freedom of speech in China, although they have encouraged us to denounce them as foreign agents in the media and press."
 china.73.a: "Disperse the Protests"
 china.73.b: "Allow them to Continue"
 china.74.t: "President Xi Visits Wuhan"
 china.74.d: "In a show of national leadership, President Xi has made a visit to the locked down city of Wuhan, speaking with residents and local officials alike in the fight against the novel coronavirus. At Huoshenshan Hospital, president Xi spoke to an infected patient via videocall, saying \"What you should do now is to stay confident. We all should be confident that we will win this war. Victory for Wuhan, victory for Hubei, and victory for China!"\n\nXi said the epidemic was the fastest spreading, most extensive and most challenging public health emergency the country had encountered since the founding of the People's Republic of China in 1949.\"Life is of paramount importance\", Xi said. In a televised speech before local officials, Xi announced a \"People's War\" and personally took charge of the response, marshaling national resources to fight the \"invisible enemy\"."
 china.74.a: "Remarkable"
 china.75.t: "National Day of Mourning for the Qingming Festival"
 china.75.d: "For three minutes on Saturday, people across China stopped what they had been doing. In public spaces in major cities, residents clad in masks, together but physically separate, bowed their heads and paid respects to the thousands of neighbors and fellow countrymen - friends, family, patients and medical workers - who are no longer with them.\n\nAs they stood in silence, air raid sirens and vehicle horns wailed their lament.President Xi Jinping led the gesture at a ceremony in Beijing, dressed in black and surrounded by the most prominent members of the Communist Party of China. Flags flew at half-mast and entertainment was also suspended throughout the country. In covering the day's events, news outlets in China, including the state-run Xinhua and China Daily, reduced the palettes of their home pages to black and white. Many users on social media did the same with their profiles.\n\nThe day of mourning dovetailed with this year's Qingming, an annual holiday in China dedicated to returning to the grave sites of loved ones and cleaning their tombs. It's not the first time the national festival has been partly coopted toward memorializing a particular catastrophe, as Chinese nationals have taken the opportunity presented by Qingming to grieve for victims of recent earthquakes and other disasters."
 china.76.t: "Pandas No Longer Endagered"
 china.76.d: "It's a good day to be a giant panda. Chinese conservation officials have announced that they no longer consider giant pandas in China an endangered species.Their status has been updated to \"vunerable\" Cui Shuhong from China's Ministry of Ecology and Environment said. There are now 1,800 giant pandas living in the wild, a number that officials credit to the country's devotion to maintaining nature reserves and other conservation initiatives in recent years. As a result, other species have also flourished: Siberian tigers, Asian elephants, and crested ibises have all seen a gradual increase in population numbers, according to the outlet."
 china.77.t: "Japanese Forces are Preparing to Invade Kinmen"
 china.77.d: "Today, the Ministry of State Security has brought alarming news to our attention. According to their intelligence, Japan and its allies are orchestrating plans for an invasion of Kinmen. While to the casual observer, the island may seem unimportant, its strategic significance cannot be overstated. Positioned in close proximity to the Chinese mainland, Kinmen could swiftly transform into a critical vulnerability if seized by our adversaries.\n\nThis vulnerability stems from its proximity to key cities vital for supplying our forces in Taiwan. The capture of Kinmen would expose our cities and supply routes to the threat of artillery bombardment, rendering them easy targets for hostile forces. Such a scenario would inevitably lead to significant setbacks.\n\nGiven these pressing concerns, it is imperative that we commence immediate defensive preparations to safeguard against potential threats. Failure to do so could leave us exposed to grave consequences."
 china.77.a: "Mobilize the Coast Guard."
 china.78.t: "Kinmen Falls!"
 china.78.d: "This morning, we received reports that Japanese and PDTO forces have officially occupied the entirety of the Kinmen archipelago. Despite our efforts to strengthen fortifications on the islands and mobilize an effective defense, we were unable to withstand the naval invasion.\n\nOur troops fought bravely during the many days of intense combat, but increasing enemy pressure forced our soldiers to retreat to the mainland. Subsequently, we have heard rumors of enemy forces shelling any nearby ports located close to the archipelago."
 china.78.a: "This is utter humiliation!"
 china.79.t: "Kinmen Holds!"
 china.79.d: "This morning, we received reports that Japanese and PDTO forces were successfully repelled from the Kinmen archipelago. It seems as though our efforts to strengthen our defenses on the island were successful. \n\nOur troops fought with vigor and bravery during the days of intense jungle and urban combat. But their efforts were not in vain, as their forces were not prepared for an attritional battle, subsequently ordering a complete evacuation of their troops."
 china.79.a: "We have taught them a lesson."
 china.80.t: "Sino-Japanese Cold War Begins"
 china.80.d: "BEIJING (AP) - Tensions between China and Japan have reached new heights a new Cold War has set over Asia.\n\nThe longstanding territorial dispute over the Diaoyu/Senkaku Islands in the East China Sea has been a source of friction between the two nations for decades. But recent developments, including the formation of the Pacific Defense Treaty Organization (PDTO) and China's invasion of Taiwan have intensified the rivalry and raised fears of a potential military conflict with both countries dramatically increasing their military budgets since the end of the Taiwan War. The defense pact, created shortly before the Taiwan War, has been viewed by China as a provocative move by Japan to counter Chinese influence in Asia. Since the end of the war, China has stepped up its military presence in the East China Sea, conducting frequent maritime patrols around the disputed islands and challenging Japan's control over the area. China has also made moves to expand it's East Asian Defense Initiative in an effort to secure it's status as a global superpower since the start of the Second American Civil War.\n\nThe situation remains tense and unpredictable, with both sides continuing to engage in provocative actions and rhetoric. As the world watches and waits, the fear of a potential military conflict between the two Asian powers looms large."
 china.80.a: "The Fate of Asia Hangs on a Knife's Edge"
 china.81.t: "Four Generations"
 china.81.d: "Lin Xiangwan carefully took the photographs of her grandpa and father from the old wooden cabinet. As she opened its doors, a faint scent of camphor wafted into the air.\nGrandpa's black-and-white photo showed him in a cotton jacket, with a missing tooth visible in his smile. Grandma used to tell stories about how he fought the Japanese and later the Americans. Her father's photo was in color, showing him in a green uniform, leaning against a broken wall, his face smudged with dust. His eyes and brows resembled Grandpa's, though his expression always serious. Later, this photo appeared in the corner of a newspaper, and he became one of the names honored in the Martyrs' Cemetery.\nUsing a soft handkerchief, she carefully wiped the dust from the frames and placed them side by side on the coffee table next to her, facing the television. Once they were arranged, she opened her laptop.\nWhen the video call connected, the rhythmic beeping of medical equipment filled the silence. On the other side of the screen was her brother, lying in a white hospital bed, surrounded by a tangle of tubes. The blast had taken his leg - and, for now, his ability to speak. Most of the time, he simply looked at her and blinked gently.\nXiangwan turned her laptop around, aiming the camera at the television screen. The parade formations on the TV were reflected in the eyes of four people at once. Grandpa had seen the planes of his era; there hadn't been enough of them, so they had to fly by twice. Her father had seen the gray skies over Wenchuan. Her brother had seen the sands of Somalia, stained crimson with blood.\nShe watched the armored vehicles speed across the television screen, glanced at Grandpa's smile frozen in his photograph, at her father's solemn face, and then at her brother's eyes - the only part of him that could still move - on the video call. In that moment, her home felt full of life, and yet, there was an unshakable emptiness, a silence broken only by the television's thunderous sounds.\nWithout warning, a tear slid silently down Xiangwan's cheek. She didn't wipe it away. Instead, she thought, I can't cry. My brother will see."
 china.81.a: "Grandpa and Dad will see it, too."
 china.82.t: "Missile Strikes on Taiwan!" 
 china.82.d: "In a shocking escalation, China has launched a series of missile strikes targeting military bases and critical infrastructure across Taiwan. The strikes, which occurred in the early hours, have plunged the island into chaos, with explosions reported in Taipei, Kaohsiung, and other key cities. Taiwanese authorities are urging residents to remain calm as emergency services struggle to contain the damage. Early reports suggest that military assets and air defenses have been heavily hit, signaling a calculated effort by Beijing to cripple Taiwan's ability to respond swiftly. This unprecedented attack marks the most direct military action by China against Taiwan in recent history, pushing the fragile status quo to the brink of collapse.\n\nIn Japan, officials are expressing deep concern, with fears that the conflict could spill over into the broader region. Tokyo has called for restraint and warned that any destabilization of the region could have far-reaching consequences for East Asia. While diplomatic channels remain uncertain, Taiwan's forces are mobilizing in the face of the overwhelming barrage, knowing that their response in these critical hours may determine the island's future."
 china.82.a: "..."
 china.82.b: "The Time Has Come!"
 china.82.c: "The dragon awakens."
 china.83.t: "Second Wave of Missile Strikes!" 
 china.83.d: "The war of life and death has returned to the Republic once more.\n\nOnly a few days after the beginning of the Fourth Strait Crisis, missiles from the Mainland have, for the first time, struck our key infrastructure and cities. While the Ministry of National Defense scrambles to mobilize reserve personnel and prepare for defense, a second wave of missile strikes has descended upon us-this time devastating our administrative and communication capabilities.\n\nYet, the few surviving radar stations have picked up something far more terrifying: countless amphibious assault ships and their escorts are now rapidly approaching our shorelines, signaling an imminent invasion. This can mean only one thing: the Fourth Strait Crisis is over, the Taiwan War has begun.\n\nDespite the absence of the United States, we are not alone. Intervention forces from the PDTO are now assisting in our defense across all sectors, standing shoulder to shoulder with us on the landing grounds to repel any troops that dare challenge our territorial integrity.\n\nWe must now fight and remain defiant against the Red Giant. Should we fail, the burning torch of Chinese democracy will be forever extinguished."
 china.83.a: "Stand up and fight!"
 china.84.t: "Selecting a future plan"
 china.84.d: "The first 72 hours of the Taiwan War have come to an end, and we cannot help but congratulate the heroic People's Liberation Army. The armed forces of the Taiwanese pseudo-government have suffered major casualties. The early warning radars and anti-aircraft missile vehicles had become the prey to aircraft before they could be activated. Many fighters were destroyed by the Rocket Forces on the landing strip. Taiwan's outdated warships were also largely left in the harbor, burning thick black smoke. Most of Taiwan's forces are also under constant surveillance by our satellites.\n\nPLA generals are having intense discussions about their next move. Frontline commanders in the Eastern Theater Command believe that the valuable time window created by the assault should be utilized for an immediate offensive on the island before the Taiwanese can recover from their losses. Joint Staff officers, on the other hand, warn that the main forces of the PDTO are already entering the battle and a rapid advance will not be possible. In the near future, we must concentrate on containing enemy counterattacks and advancing carefully.n\nThe Central Military Commission has submitted both opinions together to the Politburo for a decision. This decision will probably change the course of the entire war."
 china.84.a: "The PLA will fight any enemy! "
 china.84.b: "The troops must avoid arrogance and impetuousness."
 china.85.t: "Protests in Major Southern Cities"
 china.85.d: "Shenzhen, once the beacon of China's reform and opening-up, now lies under a dark cloud. Tens of thousands of citizens silently gather at the gates of the municipal government complex and along Shennan Middle Road. They raise banners, painted in blood-red, demanding "Down with the Communist Party", "Give me back my job", and "Death to Xi Jinping." The statue of the devoted ox, once a symbol of serve the people, now stands defaced in the center of a flowerbed. Its base, horns, and back are covered with graffiti, expressing despair and anger.\n\nIn Shanghai, the Oriental Pearl Tower looms over a city in turmoil. Protesters fill the streets, from the bustling Nanjing Road to the financial hub of Lujiazui, from the commercial district of Jing'an Temple to the vast expanse of People's Square. They chant for freedom of speech, political reform, and Xi Jinping's resignation. Some try to breach the barricades outside government buildings, fueling a wave of defiance.\n\nIn a dorm room at Central South University in Changsha, two bunk beds fill most of the space. A laptop in the corner emits a faint blue glow, playing videos from Weibo and Douyin. Four young men watch intently as massive crowds protest across southern China, from Nanning to Haikou, from Fuzhou to Nanjing. The room is thick with tension, until one of them breaks the silence, saying slowly:"
 china.85.a: ""Looks like a storm is coming.""
 china.88.t: "Vietnam Proposes an Alliance"
 china.88.d: "Following the agreement for the joint ownership of the Parcel islands, settling a century-long dispute, the Vietnamese government has proposed a further offer. In a shoacking break from decades of neutrality, Vietnam has proposed to join the East Asian Defense Initiative in exchange for full ownership of the Parcel Islands, and an admittance of wrongdoing during the 1979 war. Many in the government view this as a positive opportunity to mend a rift between the two nations that has existed for too long, as well as secure our southern border. However, the nationalists within the government have vehemently opposed this idea, attacking supporters as \"willing to sell out pieces of the motherland for the appearance of friendship\" and pushing the idea that relenquishing claims on the island would lose the Communist Party legitimacy and lead the century of humiliation to continue. Nevertheless, a decision must be made sooner rather than later."
 china.88.a: "To Socialist Fraternity!"
 china.88.b: "Chinese Land Is Not For Sale!"
 china.89.t: "The Ultimate Collector"
 china.89.d: "So, what's the best-selling Chinese export on the planet right now? Is it the TVs and washing machines that fill suburban apartments? The electronic robots and foldable Huawei phones in smart factories? Or maybe the assault rifles, frigates, and drones equipping a million-man army? The actual answer might surprise you, and even Comrade Chairman himself: it's a plush, ugly-cute toy named "Labubu."\n\nSome Western media commentators might quickly dismiss it as just another piece of "consumerist cultural poison," akin to Li Ziqi and Genshin Impact, launched into the Free World by Chinese Socialists. But let's be real: the success of Labubu is nothing short of unprecedented. After being mass-produced and seen in the arms of celebrities and fashionistas, Labubu's popularity quickly exploded from a quiet corner of East Asia to take over the entire globe.\n\nFrom Tokyo to London, shoppers are lining up outside toy stores. In China, scalpers are reselling them for outrageous prices, and counterfeit versions are rampant, forcing customs officials everywhere to launch special operations to stop the flow of fake Labubus. At the peak of the craze, fans would even get into brawls to get their hands on one. A special life-sized version was auctioned off for an astronomical sum, and various American militias have adopted Labubus as mascots, dressing them in "MAGA" hats or rainbow flags, flooding TikTok with political propaganda videos set to grating audio.\n\nEven if someone wanted to stop them, it's probably too late: Labubus have already conquered the world with their "human-wave tactics." To all the fans out there, watch out: who knows, maybe their innocent-looking plastic eyes are secretly hiding tiny cameras."
 china.89.a: "China has risen, millions must buy Labubu..."

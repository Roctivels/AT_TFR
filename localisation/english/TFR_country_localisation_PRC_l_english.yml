 #Events
 china.2.t: "Taiwan Invasion Preparations"
 china.2.d: "Xi waved his hand with a gesture of silence, and the intense debate immediately fell silent. Papers and ashtrays full of cigarette butts littered the long mahogany table, and the room was in complete darkness, except for the blinding glow of a giant screen behind Xi that reflected a map of the Taiwan Strait.\n"It's pointless to continue arguing." Xi's tone was undeniable. "Comrade general is right, in terms of the international situation and preparations for the military struggle, now is the perfect opportunity to liberate Taiwan, and if we ignore it, we will be the eternal sinners of our motherland and nation. I declare launching plan 001 for the war against Taiwan."\nOn the left side of the table, the civil officials looked at each other in dismay. The Premier of the State Council held up his glasses and said worriedly, "Comrade President, this decision may lead to condemnation and economic sanctions from the international community... I have already foreseen that..."\nThe Vice Chairman of the Central Military Commission , who was sitting on the other side, immediately jumped up from his seat and saluted joyfully, "Thank you, President, for your trust. We will fulfill the expectations of the Party and the people by completing the mission perfectly!" The generals also joined in with the hoots and hollers. Meanwhile, the General Secretary watched the behavior of his subordinates wordlessly as he always did."
 china.2.a: "Don't start a fight, but don't back down if you're in one."
 china.3.t: "President Xi visits Myanmar"
 china.3.d: "President Xi Jinping will pay a state visit to Myanmar from January 17 to 18. This is President Xi Jinping's first overseas trip this year, and the first visit to Myanmar by a Chinese president in 19 years. The visit is of great and special significance in building on the past and opening up the future for the development of China-Myanmar relations as it coincides with the 70th anniversary of the establishment of the diplomatic relations between the two countries. Myanmar is a friendly neighbor of China.\n\nPresident Xi Jinping will attend a series of state events to be held by President U Win Myint, hold talks with State Counsellor Aung San Suu Kyi, and attend an exchange ceremony of bilateral cooperation documents and a small-scale banquet to be held by Aung San Suu Kyi. President Xi Jinping will meet with Commander-in-Chief of Defense Services Min Aung Hlaing of Myanmar, have communications with leaders of Myanmar's parliament and political parties, and jointly attend activities including the celebration for the 70th anniversary of the establishment of diplomatic relations between the two countries and launching ceremony of the China-Myanmar culture and tourism year with main leaders of Myanmar. Both sides will also issue a joint statement."
 china.3.a: "To peaceful coexistence!"
 china.4.t: "The Oil Crash Hits China"
 china.4.d: "Today, the international market crash caused by the spike in Oil Prices and collapse of the Saudi Economy due to the Saudi Civil War has hit China. The Shanghai and Hong Kong stock exchanges hit record lows, as top economists predict the situation will only get worse. Moreover, the ripples caused by the crash of the New York Stock Exchange and the mass economic troubles overseas have also sent ripples across the Chinese economy, leading millions of companies to lay off workers. It is clear that the steamboat of progress that the CPC has delivered for the past 50 years has slowed to a halt as the Chinese Economy seems to be grinding to a stop."
 china.4.a: "Oh god..."
 china.5.t: "First COVID-19 Death Reported"
 china.5.d: "A 61-year-old man who had been hospitalized after suffering shortness of breath and severe pneumonia in the central Chinese city of Wuhan died Thursday, authorities said. The Wuhan Municipal Health Commission said that 41 people are under hospital quarantine with suspected infection of the mystery virus, seven of whom are critically ill. They said that 739 incidents of close contact were under medical surveillance, an increase from the previous 163. 419 of those cases involve medical staff.\n\nTreatments did not improve his symptoms after he was admitted to hospital and he died on the evening of Jan. 9 when his heart failed. He tested positive for the virus, it added.\n\nA preliminary investigation identified the respiratory disease as a new type of coronavirus, State media reported Thursday, citing scientists handling the probe."
 china.5.a: "Hopefully it doesn't get worse"
 china.10.t: "Wuhan Outbreak Identified to be Caused by a Coronavirus"
 china.10.d: "Initial information about the cases of pneumonia in Wuhan provided by our scientists - including the occupation, location and symptom profile of the people affected - pointed to a coronavirus as a possible pathogen causing this cluster. Our scientists subsequently reported that laboratory tests ruled out SARS-CoV, MERS-CoV, influenza, avian influenza, adenovirus and other common respiratory pathogens. \n\nThe number of reported cases of viral pneumonia in Wuhan, the capital of Hubei province, was 59 on Sunday, rising from 27 on Dec. 31, according to Wuhan's Municipal Health Commission, with seven people in critical condition. No deaths have been reported as of yet."
 china.10.a: "Hopefully It Doesn't Get Worse!"
 china.11.t: "Panic Buying of Oil"
 china.11.d: "With the Middle East aflame, many of our citizens are met with a deeply concerning reality. This reality is of empty pumps and broken dreams. Without many having the ability to freely pay and fuel their machines. Now, if this were an isolated incident within a small city or a minor province for a week. We would have thought it a fluke and dealt with it accordingly.\n\nBut, these are not happening in small communities. These are happening in major metropolitan hubs of transport. Trains cannot get their fuel, trucks cannot continue onwards down the many highways, and workers are finding it difficult to drive to their factories. If we as a nation do not recover from this issue, we will have many problems within our status as the great \"factory of the world\""
 china.11.a: "We must help the common people!"
 china.11.b: "We must impose severe restrictions!"
 china.12.t: "Duality of the Party"
 china.12.d: "Since Deng Xiaoping's economic reforms in China, the Communist Party of China has been grappling with a fundamental division in its policies. On one side, there is a faction that advocates for a focus on restoring social equality and ensuring fair distribution of economic resources. Conversely, another faction pushes for the acceleration of the accumulation of productive forces and the expansion of the economic pie.\nUnder the leadership of Xi Jinping, this dualistic approach within the CPC has become more pronounced and dynamic. Xi adeptly navigates between these two competing ideologies, striving to satisfy the desires of both camps without tipping the delicate balance that sustains the intricate state structure of the People's Republic.\nObservers note that a critical juncture may be approaching for the CPC, where a definitive resolution to this ideological tug-of-war will be necessary. The time may soon come when the CPC must decisively establish its national policies, putting an end to the ongoing oscillation and ambiguity. This pivotal moment could entail a definitive choice between two contrasting paths, symbolized by the age-old question: "black cat or white cat?""
 china.12.a: "We'll See.."
 china.13.t: "Expanded Welfare Services"
 china.13.d: "With COVID-19, we have temporarily decided to expand welfare services to keep the people satisfied. However, as time goes on, we must question whether or not to permenantely keep these new expanded welfare reforms"
 china.13.a: "These Measures Were Purely Temporary"
 china.13.b: "Keep the Reforms"
 #Leadership
 china.15.t: "2022 CPC Election for General Secretary"
 china.15.d: "The highly anticipated 20th National Congress of the Communist Party of China recently came to an end in Beijing. Delegates from all over the country have been leaving the city, but the impressive Great Hall of the People has not yet turned off its crystal chandeliers. The political ceremony will only come to an end when the newly elected 20th Central Committee completes its first agenda and elects the party's leaders.\n\nWait until the day of the press conference. In front of countless camera flashes and shutter clicks, the seven members of the Standing Committee, including the General Secretary, walked down the red carpet and made their appearance to the world. Despite speculation, the historic event of seeing Xi Jinping elected for the third time caused ripples around the world. Governments cautiously congratulated Xi and waited with suspicion to see the next step of the strongman leader who broke the unwritten rules to become general secretary for a third time."
 china.15.a: "China's Critical Moment Approaches"
 china.17.t: "Hu Chunhua Aligns with the New Left"
 china.17.d: "Vice Primer Hu Chunhua has broken ranks and has appeared to joined ranks with those on the New Left. In a slew of interviews with State Television CGTN, Li endorsed several populist policies as well as condemned wealth inequality in a drastic shift to the left.\n\nWhile the New Left has lacked a central rallying figure within the Party since the arrest of Bo Xilai, it seems that Li has poised himself to step into that role. Although many view him as less of a firebrand compared to Bo, there is no doubt that the Hu Chunhua of the post-Xi era will be drastically different than the Hu Chunhua that we have seen before.\n\nAs the newly ascendant Liberal faction within the CPC wrestles to secure their hold on power, it seems that the Left-Conservatives have not given up yet. While China teeters on the ends of Liberalism and Socialism, her future is more uncertain than ever."
 china.17.a: "The Left Rises Once More"
 china.18.t: "Hu Chunhua Elected General Secretary"
 china.18.d: "Following the fall of Xi Jinping, former Vice Primier Hu Chunhua has stepped up to the post of General Secretary of the Communist Party. Seemingly taking a more populist stance than his predecessors, Hu has promised to champion deepening reforms within the PRC, and it's commitment to the Socialist ideal. His recent appearances on state television have indicated that his alignment with the New Left will lead to many of China's market-based policies to be rolled back, while attempting to bridge the wealth gap that has exploded in China over the past 50 years. As China looks to reconnect with it's past, it's future remains uncertain, yet the people look to it with optimistic eyes."
 china.18.a: "Mao Smiles"
 china.19.t: "Wang Yang Elected General Secretary"
 china.19.d: "Following the fall of Xi Jinping, former Chairman of the National Committee of the Chinese People's Political Consultative Conference Wang Yang has stepped up to the post of General Secretary of the Communist Party. Since his entry into the spotlight of Chinese Politics with his governership over Guangdong, Wang has always been considered a reformer. Championing free-market policies as well as his support for non-governmental organizations have made him incredibly popular among reformists. Chairman Wang has announced that under his government, China will pursue a path of both market and political reform. In the country, reactions are mostly optimistic as China looks to tackle the future."
 china.19.a: "A Liberal Future"
 china.20.t: "Xi Solidifies Power"
 china.20.d: "After an emergency meeting of the Politburo, the 19th Politburo has decided to allow the constitutional amendment that cemented Xi Jinping thought into official ideology to pass. Legally, this has essentially cemented Xi's power as the unquestioned leader of China. While the liberal reformist and left-conservatives factions within the CPC still exist, they now exist as a mostly advisory role to Xi. Although the move has been condemned as dictatorial among the West, many in China have seen the move as the best way to chase the Chinese Dream, of a rich China that is ready to take on the role of a global leader. As China sails towards the future, Xi will guide her as a third Great Helmsman."
 china.20.a: "Unsuprising"
 china.21.t: "The Party Roulette"
 china.21.d: "Although the situation in China has only slightly stabilized, anyone with common sense knows that if the vacuum of supreme power isn't filled quickly, chaos will inevitably follow. Currently, Zhang Youxia, the de facto leader of the PLA, holds the top leadership position, but few believe that this veteran, already in his seventies, will govern for much longer. To make matters worse, he is partly blamed for the defeat on the Taiwan Island. When it comes to Zhang's successor, three prominent figures have gradually emerged as frontrunners.\n\nThe most familiar name is Chen Quanguo, theformer CPC Secretary of Xinjiang Autonomous Region. He is currently semi-retired, holding a largely ceremonial position in the NPC. No one has forgotten his strict rule in Xinjiang over the past five years, and the twist of fate that spared him from the stain of defeat has made him widely seen as the best candidate to turn the tide.\n\nAnother highly regarded contender is Li Zuocheng, the Chief of Staff of the PLA Joint Staff Department. This distinguished veteran made significant contributions during the military reforms over the years. Under his leadership, several strategic proposals helped the PLA gain an initial upper hand in the Taiwan War. His support of Zhang in stabilizing the domestic situation further boosted his prospects for ascending to the top position.\n\nThe third contender, though lesser-known, is by no means less formidable. Chen Wenqing, the current CPC Secretary of the Political and Legal Affairs Commission, is a powerful competitor. As the former Minister of State Security, he used his control over the intelligence network to ruthlessly suppress dissent across provinces amid the post-war chaos. His strong-arm tactics effectively intimidated both internal and external adversaries harboring discontent or malicious intentions. As a result, the party's most radical revanchists view him almost as a messianic figure."
 china.21.a: "Let's pull the trigger."
 china.22.t: "The Victory Day Parade"
 china.22.d: "On September 3, 1945, Japan's unconditional surrender finally brought the fourteen-year-long War of Resistance against Japanese Aggression to a decisive end. This historic day, marked by the signing of the Instrument of Surrender, was designated as China's official Victory Day and became a powerful global symbol of the triumph over fascism. Now, eighty years later, the nation's leadership has decided to hold a grand military parade in Beijing to commemorate this occasion - a profound tribute to those who sacrificed, a solemn reminder of history, and a beacon for the future.\n\nHowever, this parade is more than just a commemoration of past victories; it carries immense new political and contemporary significance. It is the first parade since the launch of the new journey toward Chinese-style modernization, serving as a powerful public showcase for the military as it marches toward its centennial.\n\nBeyond the display of military might, all eyes are on the supreme leader's appearance. As the symbolic face of the nation, he will be under intense scrutiny from both the country and the world during the parade. The central question is what image he should project. Some argue that he should don a new uniform, symbolizing a fresh vision for a new era. Others contend that maintaining his standard attire would project continuity and stability, avoiding any jarring departure on such a momentous occasion.\n\nDuring the preparations for the parade, this question came up repeatedly. Both choices carried significant weight, and the decision would ultimately be reflected in his moment in the spotlight.\n\nWhen the moment of the parade finally arrived, the nation held its breath. The supreme leader slowly ascended the reviewing stand, his figure gradually coming into focus as spotlights and cameras converged on him. Ultimately, he chose..."
 china.22.a: "to appear before the Chinese people in a new uniform."
 china.22.b: "to appear before the Chinese people in his standard attire."
 #Taiwan War
 china.6.t: "Blockade of Taiwan"
 china.6.d: "In an unprecedented and highly aggressive move, the People's Republic of China has imposed a comprehensive blockade on Taiwan, utilizing its naval fleet to encircle the island. The blockade extends beyond the maritime domain as well, as China has also restricted air travel, effectively preventing both civilians and government officials from departing Taiwan. This action has plunged Taiwan into a state of acute panic and is precipitating a severe economic crisis, as the island's economy is critically hampered as it is cut off from both imports and exports, isolating it from global trade and further exacerbating the crisis.\n\nThe international response to China's blockade has been one of widespread condemnation, particularly from Western nations. These countries have called for the immediate lifting of the blockade and urged China to de-escalate the situation. Loyal allies of Taiwan, notably Japan and Australia, have expressed strong support for Taiwan, emphasizing the need to uphold international law amid the current global turmoil, and have promised to provide direct aid if escalation continues to increase. However, the effectiveness of these responses is undermined by the distraction of the United States, currently embroiled in its own domestic conflict and unable to provide the level of support it might normally offer.\n\nWith the prospect of military confrontation looming, Taiwan's situation is increasingly precarious. The absence of American support, combined with the escalating tensions and the economic stranglehold imposed by China, casts a shadow over Taiwan's future and leaves its allies grappling with an uncertain and potentially dire scenario."
 china.6.a: "Asia gets hotter..."
 china.6.b: "Our liberation is imminent!"
 china.7.t: "The PRC Invades Taiwan"
 china.7.d: "The Fourth Taiwan Strait Crisis has escalated into a full on conflict between the People's Republic of China and the Republic of China on the island of Taiwan, restarting the Chinese Civil War that had  ended with the exile of the Kuomintang across the Taiwan Strait. Hundreds of jets flew have begun flying over the island, engaging in dogfights while the entire Chinese navy has mobilized, with reports of first landings on the shores of Taiwan, Lienchiang islands and immediate naval engagements between the PRC and ROC navy. The ROCA has gone into full mobilization while martial law has been declared across the entirety of Taiwan as the last forces of the old Republic of China brace for survival against the colossus of the CPC, with sightings of Chinese landing craft already crossing the strait towards Taiwan having been reported by coastal guards."
 china.7.a: "A Final Showdown"
 china.8.t: "The PRC Seizes the Kinmen Islands"
 china.8.d: "For the first time in over 60 years, China and Taiwan have re-engaged in hostilities with the People's Liberation Army staging multiple landings on the Kinmen Islands. The Kinmen Islands, a long contested point in Cross-Strait Relations, are a series of islands 8km away from the Mainland and fomerly governed by the Republic of China. At the crack of dawn, PLA paratroopers and marines captured key points across the city and swiftly defeated the small garrison of ROC soldiers on the islands. With the Republic of China declaring it a 'grave violation of the soverignty of the Republic of China', but not yet declaring war, it marks an unprecedented change in the geopolitical situation of the reigon."
 china.8.a: "The Strait Further Escalates"
 china.9.t: "Reflections on the Kinmen Skirmish"
 china.9.d: "The liberation of Kinmen and the other isles from the Taiwan authority has been a rousing success, with all islands and their administration will be handed over to the Xiamen Prefecture of Fujian Province.\n\nThe successful hoisting of the August 1st flag over Kinmen means the shame of the 1949 battle has finally been cleansed. But this is no time for the PLA to relax. The Eastern Theater Command has decided to hold a conference to summarize the various problems exposed during the battle. Commanders unanimously recognized that the long years of peace have inevitably infected the PLA with a "peace disease", most typically in the transmission of orders from superiors often going out of order, and the implementation of orders in their own way deviating from the intention of the battle. Additionally, among the various casualty reports of the PLA, the failure of various new weapons and equipment accounted for a considerable portion, reflecting that many seemingly powerful new weapons still need to be tested by unexpected situations on the battlefield.\n\nTo avoid similar mistakes in upcoming battles, the theater command has decided to submit the minutes of the meeting to the CMC and suggest promoting the study throughout the army. The valuable experience gained from our comrades' sacrifices will help avoid more unnecessary casualties."
 china.9.a: "Reunification is one step closer, but not without cost."
 china.23.t: "Chinese Victory in the Taiwan War"
 china.23.d.1: "With the last guns falling silent on the Taiwan Island, the Chinese Nation is reunited at last. High-ranking members of the Taiwan government, including Tsai Ing-wen and Su Tseng-chang, were captured alive by the PLA while attempting to escape the war zone, despite being escorted by presidential guards.\n\nAdmiral Dong Jun has declared the official end of the battle over the Taiwan Strait. Already, reconstruction is in full swing as Chinese companies rushed for construction contracts in the reconstruction of Taiwan, as well as major projects being announced to economically integrate Taiwan into the mainland. Politically, the island remains under military occupation until it is decided whether the island will pursue a status of a Special Administrative Region, similar to that of Maccau and Hong Kong, an Autonomous Region like that of Tibet and Xinjiang, or be fully integrated into the PRC. With the end of 75 years of division, many Chinese breath a sigh of relief knowing that China will never again be divided like it once was."
 china.23.d.2: "With the last guns falling silent on the Taiwan Island, the Chinese Nation is reunited at last. During the search following the Battle of Taipei, Tsai Ing-wen, Su Tseng-chang, and other senior members of the Taiwan government mysteriously disappeared. It was reported that a JMSDF submarine had secretly appeared in the waters east of Taiwan, picking up some "important guests" before disappearing again, though this remains only a rumor.\n\nAdmiral Dong Jun has declared the official end of the battle over the Taiwan Strait. Already, reconstruction is in full swing as Chinese companies rushed for construction contracts in the reconstruction of Taiwan, as well as major projects being announced to economically integrate Taiwan into the mainland. Politically, the island remains under military occupation until it is decided whether the island will pursue a status of a Special Administrative Region, similar to that of Maccau and Hong Kong, an Autonomous Region like that of Tibet and Xinjiang, or be fully integrated into the PRC. With the end of 75 years of division, many Chinese breath a sigh of relief knowing that China will never again be divided like it once was."
 china.23.a: "The Dragon Roars"
 china.24.t: "Chinese Defeat in the Taiwan War"
 china.24.d: "Celebrations echo across Taiwan today as the People's Republic of China announces the end of it's military campaign in the island of Taiwan. After weeks of tense fighting, the People's Liberation Army has been unable to gain a significant foothold on Taiwan, and was repelled by the island's defenders.\n\nWith the defeat of the invading PLA forces, politicians across Taiwan are discussing reconstruction as well as international recognition. While the island's lawmakers are debating whether to mantain its status as the Republic of China or seperate from China as the Republic of Taiwan, all Taiwanese can sleep better at night knowing that their destiny cannot be dictated by the whims of the party leaders in Beijing."
 china.24.a: "The Dragon Bleeds"
 china.31.t: "COVID-19 Spreads to Other Provinces!"
 china.31.d: "Bad news keeps coming one after another. Reports of the rampant spread of the coronavirus across Hubei province have piled up on the desk of the director of the National Health Commission. Meanwhile, reports of suspected cases of COVID-19 have started coming in from neighboring provinces such as Hunan and Sichuan, as well as from major economic centers like Shanghai and Guangdong, and even the political center, Beijing. Containing the outbreak within one province seems impossible. We must now swiftly adjust our strategy, prepare to mobilize the entire nation to combat the epidemic, and ensure this is done without causing excessive public panic. Let's hope it's not too late."
 china.31.a: "We Have This Under Control!"
 china.34.t: "COVID-19 Spreads Overseas!"
 china.34.desc: "Despite the best efforts of local and national governments, the COVID-19 Virus has continued to spread. News of suspected COVID-19 cases has started coming in from South Korea and Japan, as well as from Italy and France in Europe, and the United States across the Pacific. Since most of these cases involve Chinese tourists or people who have recently traveled to China, local governments have announced that they will temporarily suspend all transportation with China, a measure that may take quite some time to return to normal."
 china.34.a: "This is an international Crisis!"
 china.35.t: "Russian Trade Deals Are Finalized!"
 china.35.d: "Growing international tensions necessitate finding more reliable trading partners beyond the US, Europe, and Japan to ensure our economy is not weakened by political conflicts or trade disputes. Therefore, we should upgrade our economic cooperation with our traditional political partner, the Russian Federation. Oil, gas, and mineral resources from Russia, along with light industrial goods and high-tech products from China, circulate constantly through the main transportation routes between the two countries. Glasses filled with vodka and Maotai are clinking again and again, reflects the deepening trade ties between the two nations, united in their common opposition to Western hegemony."
 china.35.a: "A Toast to Our Northern Comrades!"
 china.36.t: "unused"
 china.36.d: "unused"
 china.36.a: "unused"
 china.37.t: "PLA Coup!"
 china.37.d: "The city of Beijing was silent for the first time in over 30 years as tanks rolled down Tiananmen Square, towards Zhongnanhai, the Hall of the People and other key government buildings. Following a series of public humiliations, social unrest and international defeats from the previous administration, General Li Zuocheng has announced that \n"It is imperitive for the security of the nation and the honor of the people that the military take temporary control in order to restore order to the country.\n" Rumors of purges of prominent civilian officials of the former administration have spread outside of Beijing, however there has been no confirmation from the new military government. International observers wait worringly for the reaction of the rest of the country as the country looks more unstable than it has since the Cultural Revolution."
 china.37.a: "Wansui!"
 china.38.a: "Echos of Tiananmen..."
 china.39.t: "The Tibetan Insurgency"
 china.39.d: "The increasingly chaotic situation in our country recently seems to have provided an opportunity for traitors plotting to divide our territory. The Tibet Autonomous Region, which has been free of emergencies for nearly 20 years, is now in a state of panic. Separatists are inciting hatred and fueling ethnic conflicts between Tibetans and Han Chinese, bringing society to the brink of collapse. The regional government is struggling to maintain transportation and the economy, while the central government in Beijing has ordered that most of Tibet be placed under a state of emergency, with additional police deployed from neighboring provinces to maintain stability."
 china.39.a: "Hopefully, they'll make it in time..."
 china.40.d: "Tibet has always remained a contentious issue in the face of Chinese politics. Re-integrated into the People's Republic of China in 1951, the reigon has been plagued by seperatism and echos for independence from the Tibetan Government in Exile. Yet for more than 70 years, the situation has never been as chaotic as it is at this moment. The social crisis resulting from the defeat in the Taiwan war has paralyzed grassroots administration and sparked a resurgence of previously suppressed separatist activities, fueled by the local population's growing fear of instability. The Chinese government has declared a state of emergency and martial law in parts of Tibet. The international community has turned a concerned eye toward this silent plateau."
 china.40.a: "Will the white mountains be tainted with red blood?"
 china.41.t: "Collapse of Order in Xinjiang"
 china.41.d: "The Xinjiang Autonomous Reigon has exploded into chaos as local administrations lost control of the countryside to Islamist Miltias. The jihadist East Turkestan Islamic Party, which we have struggled with for over 30 years have finially begun their full scale jihad against the our administration in the region. In the north, radical Khazak insurgents launched their own pan-islamist insurgency while in the center, a more radical offshoot of the ETIP slaughter Hans indescriminately. Race riots have flared up in Urumuqi as both Han and Uyghur stand at each other's throats in scenes that would make 2008 look like a elementary school playground fight."
 china.41.a: "#FuckUyghur"
 china.42.t: "Xinjiang Burns..."
 china.42.d: "Anyone who thought that Xinjiang could become a land of eternal abundance and peace after iron-fisted governance was sorely disappointed. In less than a decade, the region once again descended into conflict and street violence. Uyghurs fought the police with kitchen knives and pitchforks, vandalizing and looting the homes and stores of Han Chinese. As the crisis continued, extremist groups that had previously vanished re-emerged, and some thugs even armed themselves with rifles.\n\nThe East Turkestan Islamic Party, a radical Islamist group that continues its insurgency against China along the Afghan border, announced its intention of 'liberating our Muslim brothers and sisters in East Turkestan who have been oppressed by the Chinese imperialists for far too long'. Meanwhile, Zhongnanhai denounced the group as a band of radical jihadists and urged the Muslim world to join them in the fight against fundamentalism..."
 china.42.a: "The nightmares of 2009 and 2011 come true again..."
 china.43.t: "The Red Dragon Ascendant"
 china.43.d: "In the four decades since Deng Xiaoping overthrew the vile Gang of Four, the People's Republic of China has known very little but success. Rather than cling to the orthodox Maoism of his predecessors, Deng adopted a more pragmatic view that has come to be known as Socialism with Chinese Characteristics. Government-owned industries were privatized and a new era of economic growth began. The subsequent administrations of Jiang Zemin and Hu Jintao put China on a peaceful road to superpower status through commerce and globalization. This course deviated in 2012 when Xi Jinping took the mantle of paramount leader. Eschewing the subdued manner of its predecessors, Xi took on a firmer stance, eager for all the world to know that Chinese power is here to stay. For all its progress however, China has been unable to win the international admiration the United States enjoyed in the 20th century. Beijing remains the target of unending criticism for everything from its handling of the Hong Kong anti-extradition protests to the continued tensions with Taiwan. President Xi's heavy handed approach to governance has done little to help matters.\n\nNow, as the Year of the Rat dawns, the People's Republic finds itself in interesting times. America, both a bitter rival and lucrative trading partner, tears itself apart, shattering global stability but also leaving room for a new hegemonic power. Though potential rivals to Beijing remain in Moscow, New Delhi and Brussels, this present crisis is rife with opportunity."
 china.43.a: "China will grow larger!"
 china.44.t: "The Collapse of the Northwest"
 china.44.d: "With the decline of local government authority and the disintegration of the Western Theater Command's chain of command, Qinghai has rapidly split into three main factions: the National Salvation Front, the Islamic Republic, and the Xie Dynasty.\n\nResponding to a call from the Muslim religious leader Xiang Guozhi, the local Muslim population overthrew the old regime in Haixi. The newly established Islamic Republic quickly took control of industrial facilities across the region and leveraged them to further expand its power. In Yushu, Xie Jinwei - formerly an officer in the logistics department of the Western Theater Command - proclaimed himself both a descendant of Xie An and the legitimate heir to the Eastern Jin royal lineage. Yet his governing style displays none of the refined elegance of the storied "Jiangzuo flair" once associated with the Xie family. Seizing upon the power vacuum, he diverted large quantities of military supplies to Yushu and now sustains a lavish court life through leftover weaponry and equipment from the former garrison.\n\nMeanwhile, in Xining, General Zhao Zongqi - the former commander of the Western Theater Command - has become the stabilizing force in this tumultuous region. Renowned for his service in multiple border conflicts, Zhao Zongqi has marshaled his extensive military experience and influence to unite remnants of the Communist Party from Qinghai and Gansu, along with retreating PLA forces.\n\nAlthough all sides vow to eradicate one another and reunify Qinghai, the contest is far more intricate than it seems. The plateau's unique geography, the complex ethnic makeup of the population, and the relatively balanced power among these factions mean that no single group is likely to achieve a decisive victory in the near term."
 china.44.a: "China is crumbling once more..."
 china.45.t: "Southwest Collapse"
 china.45.d: "Following China's defeat, the vast area of Yunnan, Guizhou, Sichuan, and Chongqing has fallen into systemic collapse. The administrative, production, and transportation systems across this region of some 1.136 million square kilometers have completely stagnated, creating a de facto power vacuum. Satellite imagery reveals the presence of at least five warlords with complete military and administrative power within the former southwest region, with two mechanized corps occupying northern Sichuan and the Yunnan border respectively. The volume of shipping on the Jinsha River has fallen to 6% of its 2021 level.\n\nThe Sichuan People's Government, led by Cui Zhiyuan, was the first to declare independence, attempting to restore order under the banner of 'rebuilding real socialism'. However, its real control is limited to the Chengdu-Chongqing area, and factionalism is rife. Retreating troops have left at least 10 undestroyed arsenals in various cities, leading directly to a surge in civilian gun ownership and a 200% increase in urban crime rates, while rural areas have spontaneously formed mutual aid organisations.\n\nApproximately 100 thousand people have fled to the southeastern coastal areas. External observers believe that the collapse of this region differs from the bloody riots in the northwest, manifesting instead as a relatively "silent" failure of central authority: Beijing has, after all, stopped sending any personnel to the region. A PDTO reconnaissance report describes "no clear leadership, not even significant bloodshed or rioting". Reconnaissance planes have photographed new flags flying over a military-industrial zone in Sichuan, bearing a handwritten slogan:"
 china.45.a: ""The East is Red""
 china.46.t: "Anarchy in Inner Mongolia"
 china.46.d: "The fragmentation of the Inner Mongolian grasslands has proven more extreme than anyone could have anticipated. Although the Mongolia-backed Independence Party has set up a provisional government in Alxa, it struggles with a severe legitimacy crisis. Aside from a handful of opportunistic Mongolian officials and a small armed force, hardly anyone acknowledges the authority of this regime on the desert's edge. Meanwhile, Hohhot's Inner Mongolia Autonomous Government appears to hold the strongest position: even as the rest of the country slips into turmoil, it firmly controls the political center and economic lifeblood of the region. Yet, despite civil servants continuing with business as usual, everyone senses the local government's grasp diminishing by the day. At Zhurihe, a major military hub, the 81st Group Army has abruptly emerged as a third power, declaring martial law in the surrounding areas under the pretext of "maintaining local security."\n\nAll three factions are racing to extend their influence. The Independence Party in Alxa is fervently lobbying herder leaders, Hohhot's government is busy winning over local officials, and Zhurihe's military authority is accelerating its buildup of arms. But the nomads of the grasslands show little interest in the politicking of these competing factions; more than any campaign promises, they care about where their cattle and sheep can freely graze.\n\nNo one can predict how this three-sided conflict will end, but one thing is clear: the dream of a unified Inner Mongolia has become a distant memory."
 china.46.a: "Madness"
 china.47.t: "Insurgency in Shaanxi"
 china.47.d: "The political vacuum in Shaanxi spread like wildfire, with the once-majestic provincial party headquarters reduced to ruins as the old order dissolved under the shadow of collapse.\n\nThe red flags fluttering atop Xi'an's walls awakened memories of the Cultural Revolution among the older generation. Yan'an, the sacred ground of revolution, has now become the second headquarters of the Maoist Communist Party. The young leader Zhang Yunfan frequently moves between universities, attempting to ignite revolutionary fervor in confused students through his impassioned speeches. They do more than just denounce "Cow demons and snake spirits" - they aim their criticism at bureaucrats who have betrayed the revolution, vowing to rebuild a more just and equal society where people truly rule on this ancient land. Further north in Ordos, beyond northern Shaanxi, a markedly different force is rising. The "Heavenly Father Society" worships a mysterious entity called "Great Black Deva", preaching doomsday prophecies that attract those who have lost everything in the war. Their doctrine blends shamanic rituals with Western mysticism, claiming that only absolute faith can bring salvation during the final judgment. The "Heavenly Father" himself remains reclusive, adding to the organization's mystique. Followers fervently spread their teachings, viewing collective self-destruction as a "ladder to escape reincarnation and reach heaven".\n\nThe Loess Plateau has become a stage where idealism intertwines with apocalyptic fervor. Confused students and workers seek progress, while zealous cult members yearn for destruction. People seem to always search for new spiritual anchors amid chaos. The northern Shaanxi sky remains vast, the Yellow River flows eternally, and this land has witnessed countless conflicts. Yet this time may prove more frenzied than ever before."
 china.47.a: "The Situation is Falling Apart!"
 china.48.t: "Dongbei Ceases Communications"
 china.48.d: "Ever since Nurhaci's cavalry unified the Jurchens, Northeastern China has never been this fragmented. Today, the three provinces of Dongbei resemble the pieces of a shattered mirror, each reflecting a different reality. In Heihe, mercenaries with Slavic accents have occupied an abandoned train station - war profiteers from the north who have brought a large cache of weapons. Meanwhile, the Ministry of State Security has transformed Chifeng into a forbidden zone patrolled by armored vehicles on Central Avenue. Former agents have erected a tight security district, installing surveillance equipment on nearly every building. Any suspicious movement draws immediate scrutiny.\n\nAt the foot of Changbai Mountain, a ragged remnant of the Korean army clings to survival in several remote villages, subsisting on smuggling and robbery. Along the Liaoxi Corridor, agrarian idealists have established a utopia, taking over vast stretches of farmland. Former steel mills are now used as granaries, with machine tools melted down to make farming implements.\n\nThe PLA still holds key military-industrial centers such as Qiqihar, striving to uphold some semblance of order. Yet even this regular army cannot extend its reach beyond the cities. Meanwhile, Beidahuang - a vast state-owned enterprise - has discovered a new lease on life amid the chaos. Controlling large tracts of farmland and pastures, they have turned this fertile land into a quasi-militarized agricultural kingdom.\n\nLocals joke that the Northeast is now more chaotic than it was even during the Republican era. Indeed, as every form of order collapses, this region of black earth is living through its darkest hour."
 china.48.a: "Mobilize the Reservists."
 china.49.t: "Huang Ming Takes Control of Beijing"
 china.49.d: "From southern commercial hubs to northern industrial centers, a wave of unrest and protest has swept across China, undermining the central government's authority as public skepticism and internal divisions grow. In the midst of this chaos, General Huang Ming, Commander of the Beijing Garrison, has emerged as the key figure. While announcing a full-scale lockdown in Beijing on national media, the PLA rapidly secured several critical government sites in the capital and extended its military control across North China.\n\nAlthough Beijing and the surrounding region remain stable under PLA authority, the turmoil engulfing the rest of the country shows no sign of abating. Economic stagnation, shortages of goods, and failures in local governance have fueled widespread dissatisfaction. In the major cities, angry workers have taken to the streets; in rural areas, farmers and local militias are mobilizing; and even business leaders - seldom vocal - are openly challenging Beijing.\n\nWhether the PLA's iron-fisted approach will extinguish the flames or add fuel to the fire remains uncertain. What is clear is that China now stands at a historic crossroads, and martial law in North China has only granted the republic a brief reprieve."
 china.49.a: "China awaits us."
 china.50.t: "Nanjing Declaration"
 china.50.d: "Amid the cheers of democrats and young people, a brand-new flag rises over Nanjing's ancient city walls. With the backing of the Pacific Defense Treaty Organization, this city of six dynasties has once again become the cradle of a new regime.\n\nCalling itself the "Nanjing Provisional Government," this authority now controls extensive regions south of the Yangtze River. From Hangzhou Bay to the Pearl River Delta, from Zhangbaling to Baiyun Mountain, the new government's influence expands daily, aided by the PDTO. Sun Zhigang, once notorious for corruption during his tenure as Guizhou's Party Secretary, has suddenly reemerged as a founding father of this "Democratic China" - or at least as the face of the new regime.\n\nMeanwhile, large numbers of foreign "advisors" oversee every department. Major decisions require approval from the PDTO, and even troop movements must obtain their consent. Newly appointed officials speak endlessly of "democracy" and "freedom," yet cannot conceal their ingrained submissiveness. For these advisors and these officials, the regime they call "democratic" is ultimately no more than a carefully orchestrated showcase - one meant to present a tamed, compliant "new China" to the rest of the world.\n\nPerhaps the greatest tragedy for this land is that it has finally received "democracy," but at such a humiliating cost."
 china.50.a: "Traitors!"
 china.51.t: "Central Command Loses Control"
 china.51.d: "Following the complete collapse of provincial governments, the Central Theater Command declared martial law across much of Central China under the banner of "safeguarding national unity." Once loyal to Beijing, this military district has effectively become an independent political entity. Its temporary headquarters in Wuhan aims to rebuild local order in place of the Beijing government. Yet beneath the veneer of military authority, undercurrents swirl in the power vacuum. From Yantai to Ankang, every faction sees the same reality: the Communist Party is little more than an empty shell. The collapse of this vast empire has opened a window of opportunity for anyone hoping to seize the moment and rise to power.\n\nAlthough the Military Control Commission's orders still go out over the airwaves, few truly heed them. Each grassroots unit selectively obeys commands, readying itself for the imminent upheaval. Once the final illusion of unity fades, this land will be engulfed in a conflict on a scale never before seen. The so-called military control is merely the last piece of stage-setting before the grand drama begins in earnest."
 china.51.a: "They Dare Call Themselves the PLA?"
 china.52.t: "Rebellious Governors Reunify China" #cw todo event
 china.52.d: ""
 china.52.a: "Interesting."
 china.53.t: "Northeastern Mercenary Army Reunifies China"
 china.53.d: "An uneasy peace has befallen on the Chinese state at last, as the armies of the Northeastern Mercenary Army have wiped out the last vestiges of resistance. When the Northeast fell into anarchy, hordes of the PLA defected from both Central Command and the Beijing government, turning into bandits and warlords. Rising above all of them was Russian-Chinese commander with the call sign "Danil", whose identity is not exactly known, an ambitious officer who climbed up the ranks due to his cunning and connections with the Russian Private Military Contractor groups that flooded into the Northeast in order to "assist the Chinese freedom fighters in their most arduous time".\n\nSlowly expanding their ambitions from simple regional warlordism to reunifying China, the Mercenary Army remains largely apolitical, resorting to more barbaric practices of government, rife with corruption at every level. Soon after reunifying China, the new state, dubbed by Danil as simply "State of China" was recognized by the Russian and some other governments, but remains largely unrecognized by the west. However, there are rumors of dissent within the lower ranks of the army and only time can tell how long Guo can retain control of his newfound throne."
 china.53.a: "The Sword is Mightier than the Pen"
 china.54.t: "National Liberation Movement Reunifies China" #cw todo event
 china.54.d: ""
 china.54.a: "Interesting."
 china.55.t: "Ministry of State Security Reunifies China"
 china.55.d: "The all imposing eye of the surveillance camera on every street corner has become commonplace in every Chinese city as the Ministry of State Security has secured their hold on the Chinese Continent. Following the collapse of the Northeast, the Ministry of State Security, known to many as the Chinese secret police formed their own statelet among the plains of the Northeast following the failure of the PLA to control this area. As they consolidated their control over the region, Chairman Chen Wenqing's ambitions grew larger as the MSS and their troops marched on Beijing, attempting to seize control of the Chinese state apparatus to impose their iron fist on the rest of the state.\n\nBelieving that China's greatest threat was fragmentation from within and the Beijing government did not do enough to curb rebellion against the state, the MSS enforced a strict social and economic system that sought to bring every aspect of Chinese life under the control of the Communist Party. While officially retaining the name of both the Communist Party of China and the People's Republic of China, it is clear that a radical shift has occurred in the country, and the future for China remains uncertain."
 china.55.a: "Quite Orwellian"
 china.56.t: "PLA Reunifies China" #cw todo event
 china.56.d: ""
 china.56.a: "Interesting."
 china.57.t: "Agrarian People's Front Reunifies China" #cw todo event
 china.57.d: "After a hard fought struggle, the flower of freedom has begun to bloom at last in China. A prominent Marxist and Chinese New Left, Li Mingqi managed to unite China under his rule by rebelling in southern Manchuria together with farmer militia units."
 china.57.a: "A New China Emerges"
 china.58.t: "Beijing Government Reunifies China" #cw todo event
 china.58.d: "The war in China has come to an end as loyalists to the original government of China which had previously fallen have managed to restore order in provincial governments, brought China out from civil war. While crime and disorder are still far from being an uncommon sight on the streets of China's cities, it seems that the status quo is unlikely to be the safe from the scars that the civil war had brought.\n\nThe policy of commander Huang Ming, who was able to take control of Beijing at an opportune moment, proved quite effective in unifying China. The CCP has a lot of work to do to rebuild the country."
 china.58.a: "The CPC may as well be truly indestructible"
 china.59.t: "Malacca Straits Crisis" #temporarily unused
 china.59.d: "In an unanimous move of protest against Chinese involvement in the ongoing Philippines Civil War, the Pacific Defense Treaty Organisation has declared a full naval blockade on the straits of Malacca, banning Chinese shipping from passing through the strait whilst at the same time imposing full sanctions against Beijing. Almost immediately the Chinese economy ground to a halt as billions of exports are now unable to meet their consumers, and the pressure on Beijing's immediate reaction has begun.\n\nThe Chinese response was almost simultanous, announcing it's own sanctions on PDTO countries, with complaints billowing through social media about the forecast rising costs throughout the globe. Militarily, the full mobilization of the Chinese navy was enacted with several battlegroups meeting the PDTO's fleets at the straits in a tense naval standoff. So far no shots have been fired, however both sides have begun their efforts into full mobilization of their militaries as immediate concerns of this crisis in Asia going out of control are put first in priority.\n\nSo far no mention of negotiations has been put forward, which further excarcebates the tensions as the world expects this fragile standoff to go hot. Developments on this Cold War-esque standoff are still ongoing."
 china.59.a: "A war over Asia is looming once more ..."
 china.60.t: "National Collective Movement Reunifies China" #will be rewrited in the future, enough for now
 china.60.d: "Hell on Earth has raged across China as it appears that the National Collective Movement has consolidated it's rule over China. Known for it's extremist ideology, totalitarian system of governance, and it's goal to wipe out individuality from the face of the earth, the blank faced soldiers of the NCM have brutally suppressed all groups that have dared opposed it. In their quest to reunite China, countless numbers of cities were razed, rebellious villages erased from the map, and once prosperous hotbeds of culture turned into mass graves.\n\nStories from refugees and surivvors describe a state where one's family, friends and even name are stripped away from them, and their existence boiled down to the one goal of serving the state. The official ideology of "Obliteration of the Self" is a bastardized version of Buddhism, where all personal desires must be sacrificed in order to serve the state. It has the conscious aim of arresting progress, turning back progress and freezing social change there, and causing the end of history.\n\nWith the Chinese Anarchy causing the greatest refugee crisis and humanitarian disaster known to mankind, the world can only watch in horror as the NCM, now dubbed the "Celestial Empire" clambers onto the world stage and directs it's gaze outwards.\n\nThe masked leader of the NCM, calling himself Heavenly Father, addressed the world, saying that the plot was nearing completion. Remarkably, he emitted a bright red glow, which many believed was a sign of the new Chinese leader's connection to deities. However, most people thought it was just special effects."
 china.60.a: "God save China, as no one else can."
 china.61.t: "Falun Gong Reunifies China" #cw todo event
 china.61.d: ""
 china.61.a: "Interesting."
 china.61.t: "Chinese Red Army Reunifies China"
 china.62.d: "The hands of the Chinese clock have been rewound to 1960 as the Red Army has reunified the broken Chinese nation. The Maoist Communist Party of China was founded in 2008 by a coalition of urban factory workers and rural farmers who were dissatisfied with Deng-era reforms, they labeled the modern CPC as "Capitalist Roaders" and sought to  overthrow the "traitorous revisionist ruling bloc" in order to restore communism.\n\nSoon after collapse of the regime, Maoist groups fled to the mountains of Shaanxi, where the first revolution held their own base camp, and started gathering and training those in preperation of a protracted people's war. So when the anarchy had fallen on China, the Red Army was quick to spread it's influence, rallying the support of those left behind by the reform era.\n\nIn the cities, liberal dissidents were horrified to see images of the cultural revolution repeated, as modernized "symbols of western decadence" were destroyed en masse, as prominent college professors were sacked and mobbed. Chaos has now engulfed China as a revolutionary fervor bleeds the country bright red once more."
 china.62.a: "History repeats itself - First as tragedy, Second as farce"
 china.63.t: "Nick Land's Government Reunifies China" #cw todo event
 china.63.d: "Western and Eastern historians alike regard the Chinese defeat during the Great Asian War as the end of the Chinese Century. With the eruption of the Second Chinese Civil War, it seemed China would be re-entering the Warlord Era that marked the realm with death and tragedy for the coming decades. Inevitably, the warlord state of China gradually resolved itself through violence and bloodshed, with only the strongest persisting throughout the realm attempting to further their claims as the true successor of the former Chinese state.\n\nAs the conflict ceased, it appeared that there would once more be a unified Chinese state with the establishment of "Neo-China", headed by the right-wing western philosopher, Nick Land, who previously, according to unconfirmed sources, worked for the old government in the area of exotic technology. Known for his accelerationist way of thought, Land has commenced the decentralization of the state through the reliance of technology and automation of the nation's infrastructure and industry, with disregard for the increasing condemnation from the international community."
 china.63.a: "Neo-China... Arrives from the future?"

 china.900.t: "The Wanderer"
 china.900.d: "On a small street in Marseille, France, an old Chinese restaurant closed far earlier than usual. It was not that there were no customers today. The owner and head chef, Old Liu, was inside, staring with full concentration at the old TV that usually played tedious short dramas.\n\n"New developments have emerged in Beijing: An emergency CPC congress has elected Wang Yang as the new President of China. In a subsequent televised address, he called for an end to the chaos and urged political democratization reforms..."\n\nOld Liu did the math. This was his 34th year in France. Thirty-four years ago, he had been a rising talent whom his whole factory scraped money together to send to university in Beijing. Young Liu was once the pride of his parents and the workers.\n\nYet fate had other plans. The worsening economy led the factory where his parents had devoted half their lives to shut down. Tuition was about to run dry, and his father's hair turned white with worry. Young Liu could not understand why his honest and hardworking parents, having served the country so long, were suddenly left behind.\n\nThen one day, Beijing fell into turmoil. Students led protests and citizens joined in. Liu marched with them. Everything afterward happened too fast. After the final warning, he buckled under pressure and returned home. The next day, his face appeared on state TV, captured unfortunately in the crowd. His parents pulled strings to send him to France, to his uncle's care, and he eventually settled down working in this restaurant.\n\nOld Liu never forgot his mother's tear-reddened eyes before he left. Last year, a call came: his father had passed away. Liu could not return. He dared not. On quiet nights, he smoked a few Chinese cigarettes gifted by students. He kept asking himself what wrong he had done. He only wanted society to improve, for China to improve. How had it come to this, unable to return home or mourn his own father?\n\nOnly today did Old Liu freeze long enough to realize that he could finally go home. Thirty-four years had turned Young Liu into Old Liu. The warmth of his tears never changed.\n\nBefore his departure, he took down the calligraphy on the wall, written during his twentieth year in France:\n\n"Are you Chinese?"\n"Do you love China?"\n"Do you want China to be better?""
 china.900.a: ""I am. I do. I will.""
 china.901.t: "Dust Adrift, Tide Rising"
 china.901.d: ""I was born in the first spring of New China. Back then, the county had only one asphalt road. At its end, the factory roared like a beast underground, with dust and iron shavings swirling through the air, yet the workers' eyes blazed with determination. We all believed that the sweat we shed would harden into steel and pave the way for a brighter future.\n\nIn the late seventies, loudspeakers began broadcasting new slogans. Land was distributed to households. The factory grew idle. Once teeming with life, it cooled like incense ash in a forgotten temple, lying dormant beside stray dogs.\n\nThen, time gained momentum. In the nineties, coastal lights pierced the darkness of inland nights. After 2000, cities sprang up like corn, growing taller and faster than bamboo. The county, however, had nothing left but old men and a market that grew quieter each day.\n\nIn recent years, the world has shifted once more. Rumors spread through the streets. Prices soared. Every factory shut down. No one dared speak of the future. They only clutched gold and unsold apartments as if their lives depended on them.\n\nThen, the central leadership changed. They say Wang Yang's people rose to power. They promised to reduce excess steel and coal, to make the economy lighter and brighter. But I know that this 'lightness' means fewer places for workers here to stand. My nephew now delivers packages in Beijing. The girl next door works as a cashier in Shanghai. Neither of them plans to return. The new town square stands emptier than a dried riverbed at night. With a gust of wind, you can hear the echo of motorcycles from years gone by.\n\nAs for the future... it looks like distant mountains behind old glass. I can barely make out their outlines anymore. The central government says the road ahead is long, but the hearts of the people here are like aging plaster walls - seemingly solid, yet a breeze can send them crumbling. This county feels like a well, hollowed out. Its echo only sings forgotten old songs. I wait for young footsteps, just as the streets wait for the return of cooking smoke, but neither ever comes. Perhaps one day, this street will collapse into ruins, covered by fresh cement and slogans. Light never settles on dust. The era has no room left for the past.""
 china.901.a: ""The tide is the backdrop of memory; drifting dust is the symptom of our reality.""
 china.902.t: "The Final Kindness"
 china.902.d: "Ghanash lived in a mountain city near the China-India border. For two long years, the shadow of war had loomed over this place. Chinese troops had been drilling at the frontier, their steel boots crossing ridges, while the echoes of artillery bounced off the cliffs. At first, India stayed on high alert, bracing for catastrophe. But as time passed, even the sharpest vigilance dulled. The once-feared eastern giant now seemed weary. Rumors of defeat across the strait and the threat of crushing reparations slowly turned into jokes, shared over tea.\n\nCarrying a can of baby formula, Ghanash hummed a little tune, eager to return to the warmth of his home. He walked past an unmarked white van, and just as he approached his car, a faint sweetness brushed his senses - ripe mango, thick peach nectar. Instinctively, his brow furrowed, but before he could think, thuds erupted around him. People began to collapse one after another, as if they were stalks felled after harvest. Some tried to run, but stumbled and crumpled within a few steps, as though fate had seized them by the ankle.\n\nTerrified, Ghanash jumped into his car and slammed the accelerator. He had no idea what was happening - only that every second now stood between life and death. Streets blurred past. Chaos surrounded him. It felt as though invisible hands had stolen the city's breath.\n\nHome. Home was the only faith he had left. He never looked back, only pressed forward. He stopped at his door and stumbled out. The sweetness still clung to him, like death wearing perfume. His limbs went numb. Each step felt as though he were carrying the weight of a mountain. But he was a husband, a father, and he forced his failing body onward. Just as his fingers brushed the doorknob, his knees gave out. The world spun violently.\n\nThe door opened. His wife caught him, worry clouding her face. Their child slept soundly in the crib, peaceful as though the world's disaster were nothing more than a dream. Relief washed over him. His eyelids softened and closed. He was tired. Today had been a descent into hell, his thoughts tangled beyond saving. Yet now, all he wanted was sleep."
 china.902.a: "This is the final kindness we can grant our enemy."
 china.903.t: "Beidahuang Group"
 china.903.d: "Above Harbin Taiping International Airport, a COMAC C919 airliner descended toward the runway. Sui Longfu woke from a light sleep and glanced outside. Endless green rice fields stretched beneath him, rippling like waves as the airplane roared past.\n\nIn his dream, he had become a child again, back when the state-run farms of Beidahuang Group thrived with brilliance. On holidays, the farms would spend millions on fireworks that lit up the night sky, while children of all the workers gathered to celebrate. Winter would bring ice sculptures lining both sides of the roads, crafted with skill that rivaled - if not surpassed - the famed Harbin Ice and Snow World.\n\nBeidahuang Group, once known as the Heilongjiang Production and Construction Corps, operated as a "state within a state," with its own police, firefighters, hospitals, schools, and even courts. That autonomy ended with a decree placing its industries under local government control. Decline followed swiftly. Fireworks and ice sculptures disappeared. Even the once-glowing streets darkened, with streetlights left unlit at night. The workers' children left in waves, Longfu among them. Today, when people think of a Production and Construction Corps, they only associate it with Xinjiang, forgetting that Heilongjiang once had one.\n\nFew know that General Wang Zhen first established the Corps in Heilongjiang. Now, the central government aims to revive the Corps, including its Heilongjiang unit. Massive investments have begun pouring into Beidahuang Group, and with soldiers at the helm, local civilian officials have lost their influence. The new military administration has not forgotten the Corps descendants scattered across distant frontiers. Reviving the Corps is also a way to rein in restless local bureaucrats, after all. The sons and daughters of the Corps have always been more loyal than the appointed officials.\n\nThis time, Sui Longfu carried an investment proposal from Beijing, returning to his homeland with hopes of truly revitalizing the Northeast. As the plane touched down, he noticed the two towering flagpoles outside the terminal: one flying the Five-Star Red Flag, and the other, the green sun flag of Beidahuang, snapping fiercely in the wind."
 china.903.a: "New wine in an old bottle."
 china.904.t: "Farewell"
 china.904.d: "Gerald S. Kowal stared blankly at the plane ticket in his hand, overwhelmed by a profound sense of loss. Once a well-known American content creator on Bilibili, he had offered objective commentary on China's development, revealing the true face of the country to the world. He had also promoted Yunnan coffee, earning the affection of many Chinese viewers. Yet, after the defeat in the Taiwan Strait, attitudes toward foreigners shifted drastically. His comment section filled with hostility. The words pierced him repeatedly, unlike anything before the war.\n\nWith the government's new policies toward foreigners announced last week, his coffee brand was taken over. Years of effort dissolved overnight. He had no choice but to leave China.\n\nIn the crowded VIP lounge, he overheard several foreign business executives discussing the latest events:\n\n"What happened in Liangmaqiao was so serious, and the Beijing police couldn't uncover anything..."\n"No choice. The National Militia has stripped the police of their authority. They can't investigate."\n"Foreigners in Beijing are terrified. My friend William just flew to Dubai with his family. That's the only safe place left now."\n"Hardly. The UAE is full of Saudi refugees. How safe can it be?"\n"With things like this going on, how do any of our businesses survive?"\n"When life itself isn't secure, business is out of the question... Standard Chartered is pulling out of China this year, including Hong Kong."\n"What? Even Hong Kong?"\n\n"After the National Militia entered Hong Kong, foreign companies felt even more uneasy. Not to mention the impact of the two uprisings. HSBC has already cut more than half of its Hong Kong operations and shut down everything in the mainland. The Kadoorie family sold all their Peninsula Hotels in China and returned to Britain. Swire disposed of its Chinese real estate holdings too. Rumor has it that Cathay Pacific has already been taken over by the government."\n\nHearing this, Gerald knew the old era was gone. He felt like a lone ship on a starless sea. The civil war had devoured his homeland, and most of his family was missing. Now, his second home was also pushing him away. Staring at the planes departing from the capital airport, he wondered where his future could possibly lead."
 china.904.a: "The announcement sounded. He walked toward the gate, leaving behind his second home."
 china.905.t: "Reflection"
 china.905.d: "He had always taken the two famous lines at Tiananmen Square as his motto. To be honest, he held no real hostility toward the Japanese people. What he despised were the militarist war criminals and the unrepentant Liberal Democratic Party. He believed that the people of Japan and China were the same, all part of one global family.\n\nYet, he simply could not understand why Japan insisted on interfering with China's great cause of liberating Taiwan. Fairly speaking, he was not an extreme nationalist. Still, resentment toward Japan began to grow within him. He was unsure whether this feeling was justified, but China today was no longer the China of old. Anti-Japanese sentiment, which had long simmered quietly in the public mind, had now been magnified.\n\nIn China, the phrase "everyone is" carries a kind of power, and he was not immune to its influence. Originally, he would have lived an ordinary life as a typical engineering student. With his frail health, the army would never have considered him. Yet under Li Zuocheng's new policy, every university student had become a reservist. When would arise: what might the world look like if Japan had never intervened in the liberation of Taiwan?\n\nUnfortunately, there are no "what ifs." All he could do was follow the tide of the era. He had no desire to face people from other nations on the battlefield, but Japan's fascist government had left neither him nor the Japanese people with a choice. It was a pity that both nations would suffer through war.\n\nFortunately, the extreme ultranationalists had not seized power, and Li Zuocheng was not one of them. The future didn't seem entirely bleak. He made his decision. He would join the army. No matter what, he was part of China. He could dislike the current government, but he could not obstruct national unification. Perhaps, in the campaign to liberate Japan, he might even protect some civilians.\n\nPerhaps, in the campaign to liberate Japan, he could even protect some civilians."
 china.905.a: "Countless others must feel the same way he does."

 china.1500.t: "The Countryside Enters a New Century"
 china.1500.d: "When the afternoon class ended, Li Xin closed her notebook, slipped it into her backpack, and hurried out of the lecture hall. On her way to the cafeteria, she pulled out her phone and unlocked the screen. A few new WeChat messages appeared-sent by the village secretary from her hometown in Pingwu, Mianyang, a relative she only saw during the New Year.\n\n"Xinxin, how's everything at Chongqing University of Posts and Telecommunications? Do me a favor-register for our village's 'Chuan Shanzhi' mini program and help boost the numbers. Take a look and let us know if anything needs fixing. When you have time, post something positive [fist emoji]." Beneath the message was a WeChat mini program link.\n\nLi Xin stopped at the cafeteria steps and tapped the link. A green interface popped up, filled with photos of village life, training sessions, and government announcements. Using her phone number and the last six digits of her ID, she completed the "villager verification." After accepting the secretary's invitation, a new tag appeared under her name: "Villager of Anguo Village."\n\nCurious, she opened the "Villagers' Forum." The latest post, made half an hour earlier by "Old Zhang from Group 3," included a photo: "The light on the road to the reservoir is out again, Secretary. It's pitch dark at night-pretty scary." Li Xin refreshed the page. A new reply appeared instantly from "Party Branch Secretary Zhao Guoqiang": "Received. I've called Electrician Lao Li-he'll fix it after dinner. Don't worry, Zhang."\n\nBacking out, she tapped the "Points Store." The screen displayed snacks, drinks, and daily essentials, each with its own point value and rules-volunteering adds 30 points, defamation deducts 20 points, and so on.\n\nJust as she was about to post something, she noticed the cafeteria was already packed. Li Xin quickly turned off her screen, slipped the phone into her pocket, and stepped into the crowd."
 china.1500.a: "The wind is rather noisy today."
 china.1501.t: "The New Japan and the Old Japan"
 china.1501.d: "Afternoon sunlight filtered through the trees of Shinjuku Gyoen, casting restless patterns across Ryoko's coffee cup. Not far away, the rhythmic sounds of labor echoed through the park. A group of young people-some wearing red armbands marked "China-Japan Friendship Volunteers," others local students-were clearing the ruins of a pavilion damaged during the fighting. Ryoko took a sip of her mildly bitter coffee, her gaze drifting past the park toward the surviving skyscrapers in the distance.\n\nHer husband, Masao, had died in one of those buildings-karoshi, death from overwork, a term Japan had given to the world in shame. He had given everything to his company, that vast and merciless conglomerate. A soldier in a suit, he fought for quarterly reports and market share until his final breath. Such foolish loyalty, Ryoko thought, was no different from the way her grandfather had died.\n\nHis photograph still stood on the family altar in her mother's old home-a soldier whose bones had long since turned to dust on some nameless Pacific island. What had he died for? For a man who called himself a god incarnate? For an illusion called the Greater East Asia Co-Prosperity Sphere, spun by the army, the yakuza, and monopoly capital?\n\nTo Ryoko, the essence of old Japan had never truly changed. Whether it was the militarists brandishing sabers, the politicians bowing in apology, the gangsters running pachinko parlors and brothels, or the executives in their immaculate suits-they were all faces of the same system. A system that demanded her grandfather die for an emperor's vanity and her husband die for corporate profit.\n\nNow, that system was being forcibly dismantled. Every day, news on the television brought announcements from the People's Republic: the dissolution of monopolistic conglomerates, the abolition of hereditary elites, the prohibition of gambling and sex industries. On a nearby bench, two old men murmured in complaint-Japan, they said, was no longer Japan.Ryoko set down her cup.\n\nShe wondered which Japan they meant. The one that turned her grandfather into cannon fodder? Or the one that ground her husband down into expendable labor?"
 china.1501.a: "Certainly not the Japan of today."
 china.1502.t: "Citizen Kenji"
 china.1502.d: "Kenji slipped off his shoes at the doorway, draping his work jacket-still carrying the faint scent of portside rust-over his arm. The house was quiet. His wife, Misako, was in the kitchen preparing a simple dinner, the exhaust fan humming softly. Their son had just come home from school and was in his room reviewing the next day's Chinese lesson.\n\nKenji didn't head for the bath. Instead, he walked straight through the living room and slid open the glass door leading to the small balcony. The night sky of Fukuoka stretched before him. Across Hakata Bay, the vast industrial district that had once blazed with light now glowed only here and there, with a few scattered security lamps-embers gone cold, their massive shapes silent in the dark.\n\nHe lit a cigarette and drew deeply.Kenji had once been a senior technician in that very factory zone, responsible for maintaining the precise, automated production lines. But the war had ended too quickly-so quickly that no one had time to react. In the blink of an eye, ships arrived, carrying Chinese engineers in different uniforms. They dismantled the machines-the finest from Germany, Sweden, and Japan itself-packed them, hoisted them, and carried them away.\n\nNow, his job was with the Republic Port Authority's maintenance office, fixing pipes and wiring. The work was easy enough, and the pay sufficient to support his family.\n\nOn television, a news anchor spoke in slightly accented Japanese, reporting on a new trade agreement between the Kyushu People's Republic and the Shikoku Socialist Republic. As for the word "Japan," to his son, it had nearly become nothing more than a name found in old atlases. Perhaps, by the time his generation was gone, Japan would be a purely geographical term.\n\nKenji bore no resentment. Fate, for ordinary people, was like a passing typhoon-you could only bow your head, hold tight to the ones beside you, and wait for it to pass. Where it took your roof, you had no control. The massive machines that had once ruled over life were gone, but life itself-the oldest, slowest, and most stubborn machine of all-still turned. His son still had school. His wife still had groceries to buy. He still had work to do.\n\n"Kenji, dinner's ready," Misako called from the kitchen."
 china.1502.a: ""Coming," he said, snuffing out the last ember."
 china.1503.t: "The Yasukuni Shrine Question"
 china.1503.d: "As stability gradually returned to Japan and social order began to rebuild, one problem-more complex than military occupation or political reconstruction-confronted the authorities:\n\nwhat to do with Yasukuni Shrine? For decades, the shrine had stood as a symbol of Japanese militarism, its very existence viewed as an open provocation to the peoples of Asia. Within the Party, opinions sharply diverged on how it should be handled.\n\nThe first proposal called for complete demolition. Yasukuni Shrine, they argued, was a malignant remnant of militarism-denying Japan's responsibility for its aggression and atrocities throughout Asia, and fundamentally rejecting the justice of the postwar verdicts. Preserving such a symbol of historical denial in any form would be a desecration of peace. Only by razing it to the ground, they contended, could the ideological roots of militarist revival be eradicated once and for all.\n\nThe second proposal held that simple demolition would not erase history and might instead provide ammunition for nationalist remnants in a Peace Memorial Museum-a place to expose how Japanese militarism had not only inflicted immeasurable suffering on the peoples of Asia but had also brutally persecuted Japan's own progressives and leftist forces. It should commemorate Japan's democratic and anti-militarist movements, honoring figures such as Saito Takao, Tokuda Kyuichi, and Kotoku Shusui-those who dared to stand against fascism and militarism.\n\nThe third proposal argued that the shrine should be converted into a Museum of Japanese Militarist Crimes. Demolition or park conversion, they contended, risked diluting its original meaning and guilt. The most effective approach, they argued, would be to preserve it in place-turning it into a permanent exhibition that systematically documents, with irrefutable evidence, the crimes committed by Japanese militarism against the peoples of Asia, from the past to the present. It would serve as an eternal warning to Japan's future generations.\n\nAt present, all three sharply different proposals have been submitted to the Central Politburo for deliberation..."
 china.1503.a: "The first proposal seems preferable."
 china.1503.b: "The second proposal seems preferable."
 china.1503.c: "The third proposal seems preferable."
 china.1504.t: "The Chrysanthemum Dynasty"
 china.1504.d: "At the end of World War II, the Allies debated how to handle Emperor Hirohito and his wartime responsibility. Ultimately, for the pragmatic purpose of quickly stabilizing the situation, Hirohito was stripped of his status as a living deity and issued the "Humanity Declaration." However, he was retained as a symbolic figurehead.\n\nNow, with the decision made in principle to abolish the imperial institution and dissolve the imperial household, three distinct proposals have been put forward within the Party regarding how to deal with the current emperor and his family:\n\nFirst proposal: This plan, inspired by the model used for Puyi, suggests that the emperor and his family must undergo thorough re-education. They would be sent to designated custodial institutions for extended historical study, labor reform, and ideological training. The goal is to transform them into self-supporting ordinary citizens who deeply understand the historical crimes committed by the imperial system-both against the peoples of Asia and against the Japanese people themselves.\n\nSecond proposal: This view argues that the imperial system served as the ideological foundation for Japanese militarist revival and the war itself. As the highest and his family should be handed over to a military tribunal for a public trial, to face reckoning over the expansionist policies that began with the Meiji Restoration.\n\nThird proposal: Advocates of this option warn that any trial or re-education process risks being exploited by residual Japanese nationalist forces, who could turn the emperor and his family into martyrs. The safest course, they argue, is to strip the imperial family of their royal status, Japanese citizenship, and all imperial property, and permanently expel the entire family from the country. They would live out their lives as private citizens, under strict surveillance."
 china.1504.a: "Send them to prison for re-education."
 china.1504.b: "They must be held accountable for the war."
 china.1504.c: "Expel them."
 china.1505.t: "Lost Cat"
 china.1505.d: "Tokyo, eight months after the war. Yagami Takayuki still woke up early every day-just like before. After all, the sofa in Yagami Detective Agency never guaranteed a good night's sleep. He headed downstairs, and the TV at the convenience store entrance was once again looping the news about the new policies:\n\n"Dissolve the zaibatsu, ban gambling, reorganize the yakuza groups...""Even the syndicates have regrouped as construction companies. If the Tojo Clan were still around, they'd probably be selling concrete," Yagami thought.\n\nThe streets looked new, yet the air still carried the burnt scent of war. Construction sites and roadworks-everything reminded him that this city had only recently survived brutal fighting. His agency was also struggling to survive in this post-war Tokyo. After half a year under Chinese military administration, the city had been handed back-but it had become 'strange.' Gone were the dangerous cases tied to organized crime; anything even hinting at yakuza involvement had dried up.\n\nThese days, he only got the same types of cases: a grandmother worried about a grandson who was simply late from his part-time job; a spouse suspecting infidelity when the other was just planning a surprise for them; and lost cats-who almost always found their way home before their owners did. Yagami realized nothing had really changed at all. His cases before the war were exactly the same as they were now, except for the lack of yakuza-related cases.\n\nAfter finishing breakfast, he headed back to the agency.Today was no exception. A shy high school girl stood nervously at the entrance."Um... are you Mr. Yagami? I... I'd like to ask you to find a cat!" She held out a photo of a chubby orange tabby.A cat. Of course.\n\n"What's the name?"'Taisho'-but we usually call him 'Old Taisho.' My father... he died in the war. Since then, Grandpa barely speaks. He says Old Taisho is the last 'man' in our family. If the cat disappears too... he might not make it."\n\nYagami froze for a second, then took the photo and accepted the case. Once again, he stepped outside to search for the cat. He passed newly repaired towers, freshly paved roads, and alleys where no yakuza groups lurked anymore."
 china.1505.a: "War changed something-some for better, some for worse. But at least... things aren't too bad now."
 china.1506.t: "The Little Guangzhou of the Southern Hemisphere"
 china.1506.d: "The vibration of the asphalt breaker finally stopped. Huang Kairui released the handle, letting the heavy machine rest on the shattered sidewalk. He removed his goggles, wiped the sweat and dust from his face, grabbed his water bottle, and sat down on a newly laid curb-an outcome of his crew's work the day before.\n\nPedestrians hurried past, heads down, eyes glued to their phones. Everything seemed to have returned to normal, as if the war had never happened. He remembered when the news came that Taiwan had fallen to the PLA.On ABC, the anchors described the Chinese army as barbarians invading the civilized world-soulless soldiers straight out of Orwell's novels.\n\nAn elderly man glanced at Huang's uniform, the Chinese characters printed across his chest, and muttered to his companion, "...dictatorship..." Huang twisted open his bottle and drank deeply. He remembered life during the days of "freedom": endless talk of inflation, stagnant wages, rising electricity bills, and the constant anxiety of street crime that no one ever solved.\n\nNow, the youth gangs that emerged during the war's chaos, the Aboriginal drifters, and the far-right looters had all vanished. PLA patrols restored order in just one week, and Chinese companies were laying fiber cables and rebuilding railways at a speed no local company had ever matched.\n\nAs his thoughts wandered, a camouflaged ADF armored vehicle rolled past, its soldiers staring blankly out the windows. Huang had heard that their duties now were limited to maintaining public order and assisting the PLA in clearing out bandits from the interior. Perhaps that was for the best, he thought. At least the government no longer wasted taxpayers' money on outdated, meaningless military hardware."
 china.1506.a: "Remember to get a Bank of China card!"
 china.1507.t: "Mountains Upon Mountains, Waters Upon Waters"
 china.1507.d: "Mr. Nguyen tapped his finger lightly against the side of his glass. The ice had long since melted. Every afternoon, he sat at this old teahouse by Hoan Kiem Lake. It was the best seat in the house-perfect for watching people pass by. The crowd on the street had become more diverse than ever: Chinese engineers speaking Mandarin, businessmen negotiating deals, and even dark-skinned Cambodian laborers. They all hurried along, no different from the locals of Hanoi.\n\nHe took a small sip of the bitter iced tea, and his thoughts drifted back to earlier years-when generals of the People's Army controlled banks and telecoms, acting more like capitalists than soldiers. In the South, Ho Chi Minh City's financial elites drained the nation's wealth through real estate schemes and stock manipulation. And Hanoi's streets? Back then, the police and street vendors chased each other every day in the chaos.\n\nBut once the Chinese comrades arrived, everything changed. Mr. Nguyen didn't know what exactly transpired within the Central Committee; he only knew that the military corporations' signs vanished overnight, the tycoons who had ruled Saigon were audited and their skyscrapers nationalized, and even the street vendors were relocated to new state-run markets.\n\nSometimes he saw the exiles online-those remnants of old South Vietnam shouting from Brazil or Argentina. They hurled the ugliest words, calling the Hanoi government "fascist," "totalitarian." What did those clowns know? The "free" Vietnam they longed for had been overrun by gangs, corruption, and despair. The so-called dictatorship they condemned had brought high-speed railways that stretched across the nation, more investment and factories than ever before, and a level of prosperity the ordinary people had never known.\n\nHe finished the last drop of tea in his glass. As for whether all of this was right or wrong, or where the future would lead-that was for history to decide. He was merely an old man, sitting by the lake, drinking his tea."
 china.1507.a: "Sino-Vietnamese friendship shall endure forever."
 china.1508.t: "The Five-Star Flag and the Single-Star Flag"
 china.1508.d: "With the assistance of the EADI, the deeply entrenched profit networks within the Vietnam People's Army were dismantled in less than a month, and all assets were nationalized. Next came the financial and real estate oligarchs who had nearly drained the southern economy-their holdings were frozen, and their corporations systematically liquidated.\n\nIn the Central Highlands and border mountains, separatist militias that had tried to take advantage of wartime chaos were swiftly eradicated. Even in Hanoi, where unlicensed street vendors had long been seen as a chronic urban blight, the problem was resolved once and for all. The capital's streets regained their calm and order.\n\nBut for Lam, a university student, that calm did not extend to the internet. As usual, he opened his laptop, and the colorful backlights of his keyboard flickered to life. A few clicks later, the familiar blue interface of the VOZ forum appeared.\n\nHe went straight to the "F33" section. Pinned at the top was a thread in red: "The Vin Group liquidation has begun-The End of the Pham Nhat Vuong Era."\n\nThe replies were heated. One user wrote:"The southern economy is dead! They're destroying everything we built! This is plunder-they want to drag us all back into poverty!"\n\nLam started typing:"'Southern economy'? You mean that bubble built on speculation? Your 'hero' Pham Nhat Vuong drove housing prices sky-high with his games and left everyone in debt. He was a middleman and a gambler-nothing more. Now that the casino's closed, you can't stand it?"\n\nAs soon as he hit "Post," a notification popped up at the corner of the screen-someone had quoted his reply."Han slave."\n\nLam smiled thinly and typed faster:"Han slave? Better that than being a colonial lapdog. You southerners have no right to sneer at the nation. Your grandfather polished French boots, your father guided American troops, and you-well, you fetch for Japanese capital.""
 china.1508.a: "Another beautiful day."
 china.1509.t: "Friends from Afar"
 china.1509.d: "Ma Yilong studied the man sitting across from him-a tall, lean Indian named Kishan, leader of the guerrilla delegation.\n\n"Comrade Ma," Kishan said in heavily accented Chinese, "we thank you for arranging this meeting."\n\n"You're too polite, Comrade Kishan." Ma Yilong slid a sheet of paper across the table. "Let's get down to business. The medicine you requested is ready. We've also confiscated a batch of grain that can be delivered to you."\n\nKishan glanced at the list but didn't pick it up immediately. "Two weeks ago," he began calmly, "a messenger from the Indore government came to meet our Central Committee. He promised that if we continued to harass your logistics base, he would recognize our leadership."\n\n"We held a public tribunal afterward," Kishan continued, his tone as calm as if describing a routine task. "The messenger was executed before the people. We will never make deals with class enemies."\n\n"We commend your stance," Ma said.Only then did Kishan reach for the list. "We're grateful for the medicine and grain," he said. "But we also need weapons."\n\n"Weapons..." Ma hesitated. "Comrade Kishan, I trust you understand our position. Our troops are here to safeguard stability in Tibet..."\n\n"We understand," Kishan replied, meeting Ma's gaze steadily. "But the weapons you seized from the bandits must have somewhere to go."\n\nMa smiled faintly. "That's true enough. The captured rifles, along with their ammunition-that's the best we can offer.""Deal."\n\n"By the way, Comrade Kishan," Ma leaned back slightly, "I'm curious about something. You insist that the parliamentary path is total betrayal. In the current context, isn't that a bit too rigid?"\n\nKishan cut him off before he could finish. "Comrade Ma, you must understand-any attempt to compromise with this decaying capitalist system will only end in being consumed by it."Ma immediately realized he had overstepped-he had tried to judge a revolutionary party through the lens of a ruling one.\n\n"Comrade Kishan," he said, sitting up straight, "you're right. I apologize for my words. You have your own struggle; I have no right to judge."\n\nKishan's expression softened. He nodded. "We're glad to have reached an understanding.""
 china.1509.a: "Not without joy."
 china.1510.t: "Southern Heat"
 china.1510.d: "The airport's air conditioning had probably been wrecked during the war and never repaired. The moment Wu Mingzhe stepped out of the customs gate, a wave of humid air-thick with the scent of clove cigarettes and mildew-hit him. He had flown in from Kaohsiung, and though he thought himself used to the heat, Jakarta's embrace still soaked the back of his fresh shirt within minutes. Cutting through the crowd, he quickly spotted the man holding a sign with his name.\n\n"Mr. Wu, I'm A Mao. The industrial park sent me to pick you up." The young, wiry Chinese man took Wu's suitcase with practiced ease. Outside, the heat was even more relentless. A Mao led him to a gleaming new BYD Han, opened the rear door, and Wu ducked inside. A gust of powerful cold air enveloped him."Now this," he exhaled, "is what I call an air conditioner."\n\n"Of course, Mr. Wu. The park just switched the whole fleet," said A Mao, starting the car. It glided quietly out of the parking lot. "All the EVs here are Chinese now. Charging stations are going up everywhere-and the power's cheap."\n\nWu looked out the window. Here and there stood the blackened skeletons of buildings left from the fighting, but far more common were vast construction sites draped with Chinese and Indonesian banners. Along the highway, billboards for OPPO and Gome Electric flashed by."Jakarta looks like one big construction zone," Wu commented.\n\n"Doesn't it?" A Mao pointed at a row of tall gray pylons stabbing upward. "The Jakarta-Bandung high-speed rail extension. Once the new government came in, China Railway took over-they say they'll reach Surabaya in three years. Before, just the land acquisition alone would've dragged on for a decade.""The locals... no objections?"\n\nA Mao snorted. "What can they object to? Don't forget, the PLA's still stationed here. Besides, the new government pays them to work. Though," he added with a faint grin, "they haven't changed much-they'll slack off whenever they can. Our park would rather pay extra to bring in workers from Vietnam than rely on them.""
 china.1510.a: "Not sure if I still need to bring coffee money."
 china.1511.t: "The Lonely Watchman"
 china.1511.d: "The banquet hall pulsed with warmth and noise-cheers, laughter, and the steady rhythm of clinking glasses. The generals, their faces flushed with triumph, toasted to their complete victory: the reunification of the motherland and the crushing of the Japanese-Indian reactionary alliance, alongside their Chinese comrades.\n\nKim Jong Un moved through the crowd, wine glass in hand, and quietly pushed open the heavy glass doors leading to the balcony. The night air of Pyongyang carried a faint chill, cutting through the revelry behind him. He stood alone, high above the city he had inherited-and for which he had wagered everything.\n\nOn both banks of the Taedong River, the strange silhouettes of Mirae Scientists Street and the new high-rises on Willow Street traced a brilliant skyline against the dark. The neighborhoods that once plunged into blackouts from lack of power now glowed with steady, endless rows of light. The dividends of reunification-and the vast aid from the northern ally-had begun to replenish the city's long-starved veins.\n\nHe thought of the years spent walking a tightrope. He had always known his people's suffering; he had always known the betrayals that hid in the dark. He had spent half a lifetime forging an unbreakable shield for this nation and its people. But the shield was heavy-so heavy it demanded hunger, patience, and sacrifice from those it was meant to protect. It had nearly crushed everyone beneath it.\n\nHe was a lonely watchman guarding a flickering lamp in a storm. Yet now, the sun had risen-and it would never set again. The clouds that had hung over the peninsula for seventy years were gone. At last, he could release his grip on the helm, the one his fingers had clutched until they bled white. Perhaps history would forever tie the name Kim Jong Un to cruelty and isolation. So be it. Now, he would spend what remained of his life rebuilding this scarred, healing land.\n\nHe drew in a long, slow breath. Behind him, the doors to the banquet hall opened once more -"
 china.1511.a: "But he did not turn back. He wanted to look upon the light a little longer."
 china.1512.t: "Servant of the People"
 china.1512.d: "The state aircraft came to a steady halt. The stairway aligned, and a red carpet was rolled out from the cabin door to the waiting motorcade. There was no grand welcoming ceremony-only a single senior comrade from the Central Committee waiting at the foot of the steps. A firm handshake, a few brief words of greeting.\n\nWhen the door of the black Hongqi limousine closed, the outside world disappeared. The escort motorcycles led the way, and the motorcade merged smoothly onto the highway toward the city center. All the while, Kim Jong Un's gaze remained fixed on the view beyond the tinted glass. Beijing-the capital of the vast neighbor to the north.\n\nThe convoy passed the Third Ring Road and entered the central business district. Towers of glass and steel pierced the sky with an overwhelming confidence. Traffic flowed ceaselessly below; shop windows glittered with goods his own people could scarcely imagine; pedestrians crossed wide streets, their faces calm, their pace unhurried-as if the brutal war that had engulfed half the Pacific were nothing more than a distant disturbance.\n\nYet, he was the one who had won that war. He had fulfilled the vow of his grandfather and father-raising the flag of the Republic across the peninsula. But the price had been almost everything. The peninsula lay in ruins. The rubble of Seoul was still being cleared; the port of Haeju was silent and lifeless; millions of refugees had poured across the Yalu, seeking safety in the resettlement camps of Northeast China.\n\nNow, he was the leader of seventy million Koreans-from the snow-capped peaks of Paektu Mountain to the tangerine groves of Jeju Island-seventy million eyes waiting for him to conjure food, electricity, and a future out of the ashes of victory.\n\nThe limousine slowed and entered a solemn compound surrounded by red walls.The car stopped.\n\nKim Jong Un adjusted his jacket, smoothing out a crease on his lapel."
 china.1512.a: "It was time to report for duty."
 china.1513.t: "A Sprout on Ashes"
 china.1513.d: "Karachi, once a vibrant metropolis, had become a wasteland of shattered concrete and twisted rebar. The living shuffled like ghosts through the rubble, cries and screams quickly giving way to a deafening silence. Barisa and her father had survived by a cruel twist of fate, spared from the blast because they had been out collecting rations. Her mother and two younger brothers, however, were lost.\n\nThe total collapse of order-from the shutdown of infrastructure to the collapse of the government-plunged the city into chaos. Barisa and many others took refuge in a partially collapsed school, sheltering from radioactive rain and marauding bandits. The cataclysmic upheaval drove some to madness, their frantic screams cutting through the air. Children who had lost their families huddled in corners, silently sobbing. The majority of people were quiet and numb, mere shells of the people they once were, having lost all will to survive.\n\nOne day, military vehicles rumbled into the plaza in front of the school. Figures in white protective suits disembarked. Barisa, who had subsisted on nothing but muddy water for days, was too weak to even consider their intentions. In the midst of her daze, a single, loud word sliced through the silence of the shelter: "Supplies!"\n\nThe Chinese brought food, clean water, medical supplies, and, most importantly, a genuine glimmer of hope. Following the interpreter's instructions, the refugees were loaded onto trucks in batches and taken to a large refugee camp. The Chinese military had taken over disaster relief and peacekeeping duties from the collapsed Pakistani government. Barisa and her father were assigned their own tent, which contained two beds and a simple stove. Identical tents stretched out in neat rows, disappearing into the horizon.\n\nHere, Barisa no longer had to fear the depredations of bandits. As she ate the steaming porridge, all the emotions she had repressed for so long erupted, and tears streamed uncontrollably down her cheeks. War had taken her family and destroyed her home, but the arrival of the Chinese military had planted a seed of hope in the hearts of the desperate refugees-a seed that would one day blossom on this ravaged land.\n\n"
 china.1513.a: "Hope's light slashes through the starless night."
 china.1514.t: "The Train to Spring"
 china.1514.d: "From the mouth of the Bohai Sea, the east wind carried the tides of spring all the way to the southern seas, tracing a slender arc of rail on the map-stretching from the northern capital to the equator. In the Beijing conference hall, there were no cheers or bold declarations, only a railway blueprint folded and unfolded again.\n\nThe National Development and Reform Commission and the Ministry of Transport had resolved to extend the existing high-speed rail network southward; the Beijing-Guangzhou and Shanghai-Kunming lines would share the northern load, while the sharp curve of the Shanghai-Kunming route into Yunnan would be refined. A few major southwestern terminals quietly shed their title of "end of the line" and took on a new one-"midpoint."\n\nThe new cross-border stations were modest, with bilingual signs understated. Inside the maintenance depots, trains of different gauges rested side by side; the transition of track width was as seamless as a tailor changing thread-so fine that an untrained eye could hardly detect the stitch.\n\nDuring the final full-line trial before opening, a train departed from the northern capital, slicing through cliffs and terraces, gliding over limestone peaks and red-soil plateaus. At night, under strands of tropical rain, it sounded its whistle softly-one minute of silence for the scars along its path.\n\nOn the morning of the inaugural run, among the first passengers was a family of three, traveling from the northern capital to the equator. The father closed his long-forgotten project files and finally allowed himself a postponed vacation. The mother, in the waiting hall, pressed the battery into her old camera, wanting to capture every landscape, every face along the way.\n\nThe train crossed mountains, spanned the straits, and when it reached its final stop, there was no clamor. Bouquets were held at the same height. The conductor lowered his cap by one inch-an inch that meant respect.\n\nEven if history had once let them pass each other by, they now met again at the platform-with courtesy, with calm. And when the first birdsong of morning rose, from north to south, this railway stitched the two together once more."
 china.1514.a: "The brothers of Asia, long separated by sea, embrace again."
 china.1515.t: "The Sea Breeze Remains"
 china.1515.d: "The morning air in Raffles Place still carried the tang of salt from the sea. In the Temasek lobby, the old plaque was gently veiled beneath a black cloth. When the press conference ended, only one headline lingered in the room: "This is not dismantling-it's rewiring."\n\nThere were no fireworks, no slogans. The State Assets Committee was reconfiguring the grid of an old city-Temasek, once the omnipresent operator, now stepped back to the switchboard. It would manage the master circuit, watch the flow, and calibrate the meters.\n\nIts subsidiaries, like independent circuits, would shine on their own-insulated, balanced, yet all connected by one line. Between the new platforms, funds could be borrowed but not guaranteed; the parent company stood merely as a firewall and lender of last resort.\n\nIn the morning elevator crowd, a young man from the port line carried a hard hat on his back. "We handle the ships, not the wind," he explained to an uncle beside him. "Wind belongs to the Transformation Fund." The uncle nodded, clutching a community brochure that advertised the new CPF investment channel-the print larger than the train-stop announcements. At a snack stall during lunch, the auntie selling kaya toast had put up a cheerful little notice: "Today's special: dividends unsweetened, disclosures double-spaced."\n\nThe afternoon rain came swiftly and left just as quickly. The Committee removed the final piece of black cloth; the new signboard revealed itself with quiet restraint. A local engineering consultant and a semiconductor specialist from Shanghai stood side by side in the corridor, gazing toward the sea. They spoke of their children-one preparing a science fair project at a school in Yishun, the other just finishing an essay on "carbon footprints" in Pudong.\n\nBetween their laughter, it seemed they both heard the same sound of waves.By dusk, the streets thinned out. The Lion City gave the wind back to the sea and sent the light into its windows. Temasek had not grown smaller-it had simply learned to share its power with every box capable of glowing on its own."
 china.1515.a: "Each line its own circuit-yet every lamp burns brighter."
 china.1516.t: "Unity Brings Peace"
 china.1516.d: "The current international order is undergoing unprecedented turbulence. Major powers are mired in internal strife, while relations across the European continent have reached historic lows, leaving traditional diplomatic channels nearly paralyzed.\n\nAgainst this backdrop, the United Nations has grown increasingly ineffective in addressing global challenges. Sovereignty disputes and humanitarian crises are spreading across multiple regions, and the global governance system faces a profound crisis-regional peace and stability are hanging in the balance.\n\nIn the face of this uncertainty, China, as one of the world's responsible great powers, must step forward to shoulder the duty of safeguarding both regional and global security. Seeking to break the deadlock and restore stability, nations embarked on a long and arduous process of closed-door negotiations-filled with heated exchanges, shifting positions, and painstaking compromises.\n\nUltimately, consensus was reached on a bold idea: the creation of a new mechanism, independent of the old system, dedicated to the peaceful resolution of international disputes.\n\nThis historic diplomatic endeavor bore fruit in Hong Kong. Inside the Old Wan Chai Police Station, representatives from numerous nations jointly witnessed the signing of the Convention on the Establishment of the International Organization for Mediation.\n\nThe birth of this intergovernmental organization, devoted to professionalism and peace, marks a turning point for global diplomacy. It stands as a new pillar of order, injecting much-needed stability and trust into a fractured world."
 china.1516.a: "A new United Nations, perhaps?"
 china.1517.t: "Mount Song Memorial Park"
 china.1517.d: "Recently, the General Office of the CPC Central Committee and the General Office of the State Council jointly issued the Resolution on the Construction of the Civilization Memorial Project, which has been reviewed and approved by the Central Leading Group on Cultural Work.\n\nThe Resolution asserts that Chinese civilization, continuous and unbroken for millennia, has been shaped by countless sages and leaders. Among the long lineage of imperial rulers, four stand out for their unparalleled contributions to defining "China" as a political, territorial, and cultural entity.\n\nEmperor Qin Shi Huang ended centuries of warring states, establishing the framework of unification that laid the political foundation for the next two thousand years. His achievements in standardizing vehicles, measurements, and written script marked the true beginning of a unified Chinese civilization.\n\nEmperor Wu of Han expanded north against the Xiongnu, pacified the southern Yue tribes, and opened the Western Regions, transforming a geographic empire into a cohesive nation with a shared identity-the "Han" people.\n\nEmperor Taizong of Tang, revered as the "Khan of Heaven," ruled at the peak of both cultural brilliance and military power, embodying the inclusiveness and confidence of the Chinese spirit.\n\nEmperor Taizu of Ming, rising from humble origins, expelled foreign invaders, restored order, and rebuilt the structure of the state after centuries of decline.\n\nThe Resolution affirms that these four emperors, each in his era, collectively completed the essential construction of China's political, territorial, and spiritual unity.\n\nTherefore, it was decided to establish a monumental sculpture park on Mount Song-the Central Peak among the Five Sacred Mountains-dedicated to these four great figures. Following geological and structural assessments, the project will carve the emperors' visages directly into the mountain's central ridge. Each statue will stand several tens of meters tall. The scale, geological complexity, and engineering difficulty of this undertaking are unprecedented in the history of modern Chinese monumental architecture."
 china.1517.a: "To honor the past, illuminate the present, and inspire the future."


 
 china.1001.t: "EADI Killed 'Em All"
 china.1001.d: ""
 china.1001.a: "Hell Yeah"
 china.1002.t: "PDTO Killed 'Em All"
 china.1002.d: ""
 china.1002.a: "Yeah Hell"
 china.1003.t: "After The End"
 china.1003.d: "After the disappearance of our leader, whose rule brought China the greatest defeat in its history, the National People's Congress is trying to seize control. The nation and the army hate the government, and control of much of the country has already been lost.\nGradually, Beijing itself becomes a huge battlefield..."
 china.1003.a: "Is this our fate?"
 china.1004.t: "Rogue Military Elements Storm Beijing!"
 china.1004.d: "After the ever-rising failures of the central government, it would be inevitable that the numerous factions and warlords would try to take out the current leadership of the PRC, not necessarily to achieve anything, but out of sheer spite.\n\nToday is one of those days, several rogue brigades have launched attacks on Beijing, with their relentless attacks they've managed to push deeper into the city.\nWith their leadership butting heads over the right course of action, it would seem that whatever path is taken, it would change the future of China forever.\n\nTargeting the government buildings would effectively remove the rotten old structures of a China that failed its people, giving room for something fresh and new, while targeting the infantry would ensure a complete surrender of government officials, allowing them to peacefully reintegrate the desirable aspects of the system.\n\nNevertheless, the rogue military unit decided to..."
 china.1004.a: ""Focus fire on the government buildings!""
 china.1004.b: ""Focus fire on their infantry!""
 china.1005.t: "The Smoke Clears"
 china.1005.d: "The machine that is China has fallen apart and amidst its chaos, the vultures circling around it would be all too happy to dive in.\n\nThe rogue military unit that stormed Beijing primarily focused its aggression on government buildings, effectively ensuring that not a single form of political opposition could be formed against whatever may come in its place.\n\nIt would be inevitable that those that thrive in chaotic environments would manage to exert a lot of influence, Nick Land also referred to as "The Godfather of accelerationism" had always been rumored to be in employment of the Chinese government in terms of automation and artificial intelligence, his clique has managed to not only influence the rogue armed forces but also the culture in the remnants of China.\n\nPhilosopher, writer and now the face of a new China, his ideas have proven to have spread far and wide and now the task of him fulfilling his role remains.\nWith the region regaining some semblance of stability, it would seem that Land's vision for China and the world as a whole remains ambitious, the pursuit of a post-human singularity with the acceleration of capital and technology.\n\nWhether China will embrace this future remains to be seen, the mainland will inevitably fall into the grips of war once again."
 china.1005.a: "Arrival from the future that should be."
 china.1006.t: "The Graduates"
 china.1006.d: "The old principal, Pei Qiming, stood on the podium, his back slightly hunched, yet still held straight. This was the graduation ceremony of the senior class of Jinling High School, and also his last speech. Pei Qiming held onto the lectern with one hand and gripped the microphone with the other."Students, you were born in a time of peace, but have you ever asked yourselves, where did this peace come from?"\n\nHe paused and continued, "It came from mountains of corpses and seas of blood, from the bones of our ancestors and fathers, from that massacre that must not be forgotten. You must remember, not every nation in this world deserves dignity. They, those filthy scum on that island, have, since ancient times, sustained their base and fleeting pride through plunder, invasion, and slaughter. They do not create, do not cultivate, know nothing of benevolence, righteousness, propriety, and etiquette. All they do is imitate poorly and greedily seize."\n\n"And today, you stand here because you are descendants of China. What you bear on your shoulders is not only the expectations of the people in your hometown but also the fury of vengeance of eight thousand years of civilization. You must become steel, become the blade of revenge, and take back, inch by inch, the lands still stained with the blood of our ancestors. You will hold bayonets and drag those cowards hiding in their turtle shells out from their filthy dens, and make them pay the price for the monstrous crimes committed by their ancestors!"\n\n"Students, I believe I will soon see most of you return. You will be wearing military uniforms, with medals proudly pinned on your chests. You will return home amid flowers and cheers, and on that day, our hatred, our humiliation, will be washed away.""
 china.1006.a: "For the motherland, for China."
 china.1007.t: "Imminent Japanese Intervention in Korea"
 china.1007.d: "The current developments have surpassed our worst expectations. Japanese Prime Minister summoned our ambassador, issuing a stern condemnation of our volunteer forces' "dangerous activities on the Korean Peninsula." The Prime Minister also proposed that China and Japan mediate the military conflict between North and South Korea - a suggestion clearly intended as a diplomatic trap. Our ambassador firmly rejected this proposal, emphasizing that the deployment of volunteer forces is an obligation under the treaty signed between China and North Korea.\n\nFollowing this tense exchange, Japan's Self-Defense Forces announced an unprecedented naval exercise in the Yellow Sea, alarmingly close to the Korean conflict zone and the People's Liberation Army's naval base and air defense positions on the Shandong Peninsula. The PLA's Northern Theater Command is on high alert, with naval and air force units mobilized, rocket force missiles readied, and military satellites closely monitoring Japan's military bases and ports.\n\nThe historical memories of unannounced attacks, from the First Sino-Japanese War to the Marco Polo Bridge Incident and Pearl Harbor, remain vivid. These memories have rekindled a deep, collective unease among our military and civilians alike, and tensions are rapidly intensifying. It feels as if that fragile line could soon snap."
 china.1007.a: "If they want a war, then so be it!"
 china.1008.t: "The Great Asian War"
 china.1008.d: "Despite the irreparable confrontation and the widening rift between peoples of different countries, we have never lost hope for peace and consensus. However, the current state of affairs continues to disappoint us.\n\nLed by countries like Japan and Australia, the self-proclaimed 'guardians of freedom and democracy' are seeing their ambitions to police the world and control global wealth and power grow, especially after the collapse of the superpower, the United States. They view China and other anti-hegemony nations as obstacles to their goals. More frantically than ever, they stir up hatred, incite the China threat theory, and provoke an arms race. When they see that we are not intimidated by their actions, they resort to threats of force.\n\nJust like countless beams of light converging to a single point through a convex lens, the situation has reached a boiling point, and the flames of war seem inevitable. Yet, we will never be deterred by the scorching and blinding blaze. Whether it is the supreme commander directing millions of troops or frontline soldiers wielding guns in combat, the countless heroes defending freedom, justice, and peace will never let their hands tremble in fear!"
 china.1008.a: "Till all of the reactionaries are wiped out!\nWith the banner of Mao Zedong, floating high!"
 china.1009.t: "Slowdown in the Korean Offensive"
 china.1009.d: "Joint Staff Department of the Central Military Commission\n\nTo: Central Military Commission and Political Bureau of CPC Central Committee\n\nSince the outbreak of the Korean War, the Korean People's Army has maintained an offensive stance against South Korean forces. However, the KPA's overall troop quality remains inferior to that of the South Korean military, with a significant technological gap in weaponry and air power. This disparity has resulted in escalating casualties on the front lines and severe losses in the rear. Furthermore, following the abolition of the "Same race theory," the KPA's strategy of demolishing transportation routes has severely hindered the supply of resources to the front lines, leading to a marked decline in both their advance speed and troop morale.\n\nAdditionally, with the Pacific Defense Treaty Organization providing air support to the South Korean side, the KPA is no longer capable of sustaining large-scale operations.\n\nGiven the current situation, the necessity of our military intervention in the Korean Peninsula has become significantly more apparent."
 china.1009.a: "It feels like 70 years ago all over again."
 china.1010.t.1: "Korea Agrees to Unification!"
 china.1010.t.2: "Korea Doesn't Agree to Unification!"
 china.1010.d.1: "The proposal presented by our ambassador to North Korea received a positive response, a promising sign indeed. With assurances of economic and political asylum extended to Kim Jong-un, the largest obstacle has been overcome. North Korea's already fragile economy has been devastated by war, and a large number of refugees have fled into Northeast China. As a result, a substantial contingent of the Chinese People's Volunteer Army remains stationed in North Korea, blurring the border between the two countries to an almost negligible extent.\n\nTo rebuild this devastated and sparsely populated "hermit nation", North Korea must integrate deeply with its neighbor. A new North Korean Special Administrative Region will be established, based on the former DPRK. This new political entity will be united with the PRC in form, yet it will enjoy a high degree of autonomy, nearly equivalent to that of an independent country. It will implement a socialist market economy system, reformed extensively to better align with local conditions, drawing from the "one country, two systems" experience. Kim Jong-un will remain the head of this Special Administrative Region, but his power will be significantly diminished. Instead, more pragmatic economic bureaucrats will take over most of the authority."
 china.1010.d.2: "The proposal put forward by our ambassador to North Korea was met with a firm rejection. In fact, North Korean leader Kim Jong-un even sent a handwritten letter expressing his strong dissatisfaction and protest. This unexpected setback is significant. In light of the profound economic and geopolitical changes in Northeast Asia following the Second Korean War, we had suggested that North Korea join China as a special administrative region. This would allow North Korea to maintain a high degree of autonomy while benefiting from deeper integration into China's economic system, potentially improving its citizens' livelihoods. However, it is now clear that this proposal is no longer viable.\n\nPerhaps the comrades' suggestion deeply wounded the sensitive pride of the Workers' Party of Korea. It may have reminded them of the "serving the great" policy during the Joseon Kingdom's era towards the Chinese emperor, as well as the multiple bilateral crises during the reigns of Kim Il-sung and Kim Jong-il due to ideological differences and the nuclear issue. As a major power that North Korea can hardly match, China's direct threat might not be as pronounced as that from South Korea, Japan, or the former United States, but it is still substantial. Furthermore, Kim Jong-un and his close associates likely fear that losing their status as an independent nation would lead to the collapse of their autocratic regime and the potential social instability caused by the influx of new ideas."
 china.1010.a: "Long live the friendship between China and North Korea!"
 china.1010.b: "I'm afraid Kim is reluctant to part with his Kumsusan Villa..."
 china.1011.t: "Lands Apart"
 china.1011.d: "Nearly a century ago, under the command of Matsui Iwane, the Imperial Japanese Army committed one of the most heinous crimes against humanity in Nanking. Over 300,000 civilians, regardless of age or gender, were brutally killed by Japanese soldiers with bullets or bayonets. Although Japan ultimately surrendered in 1945, the Japanese government and right-wing organizations, once protected by American imperialism, have continuously downplayed these atrocities, systematically distorting history by portraying the war of aggression as a "holy war to liberate the East Asia." The righteous anger of the Chinese nation has been simmering for decades. Now, the time has come to settle these accounts once and for all.\n\nSince Japan has not responded to calls for peace, we are left with no choice but to make them submit and atone through strength. The unified Japanese government will cease to exist, and the archipelago will be divided into several independent regimes. The Emperor has been publicly declared dethroned. A new Far East International Military Tribunal will soon convene in Tokyo to conduct a fair, just, and open trial of the war criminals from the Japanese government and the JSDF. Additionally, we will undertake a comprehensive overhaul of the Japanese economy: the keiretsu will be dismantled, financial markets will be thoroughly reformed, and industrial facilities will be relocated until we ensure that Japan no longer has the capability to pose a threat or stage a resurgence."
 china.1011.a: "Justice may be delayed, but it will never be denied."
 china.1012.t: "Sky Shared"
 china.1012.d: "In 1972, Japanese Prime Minister Kakuei Tanaka visited Beijing to address the normalization of diplomatic relations between China and Japan, breaking the deadlock of the East Asian Cold War. During his meetings with Chairman Mao Zedong and Premier Zhou Enlai, two founding fathers of the People's Republic of China, the leaders actively responded to the desire to rebuild friendly relations between China and Japan. The adage "trust is the foundation of everything" illustrated an optimistic outlook for the future of Sino-Japanese relations.\n\nAlthough the relationship between the two countries has experienced ups and downs since then, eventually regrettably escalating into armed conflict, Chairman Mao once said, "The Chinese and Japanese people are both victims of militaristic regimes." For the sake of future generations, it is our responsibility to heal the wounds of war in our lifetime. With the irresponsible rulers overthrown, the obstacles to direct dialogue between the Chinese and Japanese people have been removed.\n\nWe will dispatch construction teams and volunteer groups to assist the Japanese people in their reconstruction and disaster relief efforts. Additionally, we will resume organizing exchange programs for the youth of China and Japan. Furthermore, we will assist in establishing a truly sovereign government on the Japanese islands, eliminating the negative influences of foreign interference, aristocratic families, and monopolistic conglomerates."
 china.1012.a: "Neighboring countries separated by just a strip of water, why burden yourselves with old grudges?"
 china.1013.t: "To All Chinese People"
 china.1013.d: "Comrades,\n\nWe have strived relentlessly for peace, hoping to resolve differences through dialogue and cooperation. Yet, all these efforts have turned to dust in the face of the imperialistic ambitions of the Pacific Defense Treaty Organization.\n\nIn the past, we have upheld the path of peaceful development, committed to peaceful coexistence with the world. Time and again, we have extended our goodwill, called for peace, and reached out with hands of friendship. However, our tolerance has only emboldened them further. Led by Japan, the Pacific Defense Treaty Organization has continually stirred up trouble in our vicinity, provoking conflicts, attempting to divide our territory and undermine our sovereignty, pushing us to the very brink. Now, we are left with only one option: to defend our territorial integrity and national sovereignty with the force of arms.\n\nWe cherish peace, but we do not fear war! We value life, but we are willing to lay down our lives for the dignity of our nation! We will spare no cost in safeguarding our sovereignty and territorial integrity. This is a battle between justice and evil, a final showdown between light and darkness! We firmly believe that justice will prevail over evil, and light will dispel darkness! Victory will belong to the great people of China!"
 china.1013.a: "Down with Imperialism!"
 china.1014.t: "When That Day Comes"
 china.1014.d: "The afternoon sunlight filtered through the pothos on the balcony as seventy-two-year-old Li Yugang relaxed in his wooden rocking chair, eyes half-closed, soaking in the sun while listening to the radio. Since his wife had passed, he had lived in solitude in his apartment, brewing a pot of Biluochun tea and listening to operas to pass the time. From the radio on the wooden table, the announcer's steady voice came through: "...The Foreign Ministry has condemned the Pacific Defense Treaty Organization's ongoing military provocations. Despite our push for peaceful solutions, Japan's imperialist actions have forced us to use force to protect our sovereignty..."\n\nLi Yugang adjusted his reading glasses. He thought he heard the word "war". War? War with whom? PDTO? What was that? No matter; at his age, it wasn't worth dwelling on. China had endured countless hardships and had always come through. Li Yugang turned off the radio, grabbed his cane, and headed to the large banyan tree at the entrance of his community, where a group of elderly men were chatting and playing cards. He joined them.\n\n"Li, what brings you out today?" a gray-haired man asked with a smile.\n\n"Just needed some fresh air. It's too stuffy at home", Li Yugang replied calmly.\n\n"Did you hear about the war?" another elderly man whispered.\n\n"Yeah, just heard it on the news", Li Yugang nodded.\n\n"Ah, this world is getting messier by the day.""
 china.1014.a: "What's there to fear? Our country is strong now. We have nothing to worry about!"
 china.1015.t: "Be United as One"
 china.1015.d: "From the icy snows of the North to the rainforests of the South, from the crashing waves of the East China Sea to the deserts of the West, the people of this land have never been as united as they are now. After a century of humiliation, we have finally witnessed the dawn of national rejuvenation. Yet, the iron boots of imperialism are once again sweeping across the Pacific, attempting to turn these blue waters into their colony and trying to tear apart our nation by imposing their so-called "freedom" and "democracy" on this ancient Eastern land.\n\nBut we are fearless, armed with unwavering conviction, absolute determination, and a courageous fighting spirit. From bustling cities to remote villages, from the elderly to the young, everyone understands that this is a battle for the very survival of our nation. We have no choice but to fight to the bitter end! Factories roar day and night, with workers on shifts producing weapons and ammunition around the clock. Countless young men and women bid farewell to their parents and families, marching to the frontlines without hesitation. To support the war effort, people save every bit of food and cloth they can, sending them to the front. We will mobilize every resource, unite every possible force, and press forward unwaveringly to the end of this war."
 china.1015.a: "We will fight as long as needed, till the total victory!"
 china.1016.t: "When That Day Comes"
 china.1016.d: "The scent of gunpowder still lingered in the air, now mingling with a foreign tang carried by the sea breeze - a cold, metallic odor, laced with the sickening stench of invasion. This oppressive smell clung to the Taiwan Strait, much like the hulking behemoths cruising through its waters - the joint fleet of the Royal Australian Navy and Japan's Maritime Self-Defense Force. Huang Zeyang gripped the railing tightly, his knuckles pale from the strain. The sight of foreign vessels brazenly cutting through Chinese waters was an affront that should never have been, yet now it unfolded before him every day.\n\n"It's all bullshit..." Huang cursed through gritted teeth, his voice a low growl as humiliation and rage seethed within him like molten lava, scorching his insides. He wished desperately that this was all just a nightmare, that he could awaken and find himself still a guardian of his nation's maritime borders, not a defeated warrior, not a prisoner of war. But he knew this wasn't a dream. The fact that the campaign to liberate Taiwan had ended in the PLA's defeat was real. The anguished cries of his comrades in their final moments were real. The countless martyrs now lying eternally beneath the waves of the Strait were real.\n\nHe hated. He hated the invaders. He hated the traitors. But above all, he hated himself - hated his own helplessness, his inability to change anything. He longed to take up arms and face those aggressors in one final, desperate battle. Even if it meant dying on the battlefield, it would be a fate far better than this ignominious existence. Yet he knew that for now, there was nothing he could do. The only thing left for him to do was wait - wait for a chance, any chance, to exact his vengeance."
 china.1016.a: ""Grief fills the fields and skies, Heroes iron wills defy!""
 china.1017.t: "Night Talk"
 china.1017.d: "Ever since Xi Jinping took office in Fujian Province, he gradually kicked his smoking habit. After he ascended to the role of General Secretary, even the staff in the General Secretary's office too fearful to keep an ashtray in the room. However, today, Xi decided to break this lifestyle habit he had adhered to for over three decades.\n\nIn the late-night setting of Qinzheng Hall, the only light source was a solitary desk lamp emitting a warm yellow glow. Xi reached into his suit pocket and pulled out a pack of Hehua cigarettes, drawing one out before tossing the pack to retired Vice Chairman of the CMC, Zhang Youxia, who was seated across the table. After a quiet moment of puffing smoke, Xi abruptly broke the silence, "In your opinion, who should be my successor?"\n\nThe general's hand paused mid-air as he flicked ash from his cigarette, his eyes peering through the haze at his old comrade with a look of confusion and disbelief. Xi let out a bitter laugh and pressed on, "Do you think I could be chairman for life?"\n\nZhang Youxia's mind began to race. A series of so-called "successors" within the Party, from Liu Shaoqi to Sun Zhengcai, flashed through his thoughts. Predicting future transitions of supreme power has never ended well for anyone; it is a constant in human society. Spreading his hands in a gesture of noncommitment, Zhang replied, "Whoever is chosen in the end, I will support the decision of the Central..." Xi did not pursue the topic further; he merely continued to smoke in silence."
 china.1017.a: ""Only heaven knows...""
 china.1018.t: "The Hero Returns Home"
 china.1018.d: "Huazhuang Village, a small village near Jinan, the capital of Shandong Province, has become a sea of red flags today. Nearly all the villagers have gathered at the village entrance, quietly gazing at the distant highway. A banner reading "Welcome Home, Special Merit Hero" hangs over the signboard at the village committee's gate. However, there is no celebratory atmosphere. Instead, a heavy and somber mood pervades the scene.\n\nFrom afar, the PLA's mighty procession advances, draping the small village in military green. Every face bears a solemn and respectful expression. Leading the procession are two senior colonels with armbands from the Central Military Commission's Political Work Department, followed by three honor guard soldiers. In the center, a soldier carries a redwood urn containing a fallen comrade's military cap, flanked by soldiers holding the national and military flags.\n\n"Fellow villagers, we bring you the ashes of Martyr Huang Zeyang", the leading officer announced gravely. The crowd parted to create a path. A white-haired, stooped elderly woman, supported by village committee cadres and several of the most respected elders, slowly approached. Just a few steps away, she could bear it no longer. She threw herself onto the urn, her deeply wrinkled cheeks wet with tears, murmuring softly."
 china.1018.a: ""Mom's taking you home.""
 china.1019.t: "Shootouts in Lhasa and Souther Xinjiang"
 china.1019.d: "Tibet and Xinjiang are regions far removed from the ongoing war with the PDTO. Tibet sits atop the Himalayan mountains, while Xinjiang stretches across a vast desert. Any attack would be detected well in advance and easily neutralized by artillery and rocket fire. At least that was the assumption - an assumption that has now been shattered by recent events.\n\nIn the early hours of this morning, the Indian military deployed several C-130J "Super Hercules" transport planes to airlift Special Forces personnel and supplies across the Himalayas. Despite significant losses due to severe high-altitude turbulence and difficult terrain, the remaining aircraft successfully completed their mission. Furthermore, the operation appears to have been conducted in close coordination with local separatist forces. Upon landing, Indian Special Forces immediately established contact with separatist militants and began joint military operations.\n\nTo date, separatist forces, supported by Indian Special Forces, have taken control of three military outposts in the Lhasa region and one facility in southern Xinjiang."
 china.1019.a: "Escort them back across the border."
 china.1020.t: "Pro-India Rebellion in the West"
 china.1020.d: "The very things that made us believe our western flank was secure have been responsible for our failures in hastily retaking Tibet and Xinjiang. Our temporary hesitation allowed for the Indians to dig in around Lhasa, which has made things very difficult for our infantry.\n\nWe have seen no more success in Xinjiang, where the south has already largely fallen to hostile forces. The visibility offered by the vast deserts of the region would make it easy for us to see any attackers coming from miles away, but unfortunately we are the attackers in this scenario.\n\nAnyone who thought things couldn't get worse would be forgiven, however they would also be wrong. The hostile forces have begun spreading anti-CCP propaganda, and some reports even claim they have been joined by local insurgents. If they are training these local militias, spreading the seed of discontent, then we will have an even tougher time retaking these regions."
 china.1020.a: "Get them out already!"
 china.1021.t: "Indian Offensive"
 china.1021.d: "According to battlefield warning radar and satellite reconnaissance, the Indian Army has amassed a significant military force along the Sino-Indian border. Reconnaissance confirms the deployment of over 150,000 troops, including the Third Army Group, the Fourth Army Group, and the Thirty-Third Corps. Units of the Third Army Group have already completed tactical deployments in the Sikkim sector, while forces of the Fourth Army Group are advancing toward the Tawang area in southern Tibet. Meanwhile, the Thirty-Third Corps is concentrated in the Ladakh region.\n\nThe primary strategic objective of the Indian military in this operation is to break the strategic stalemate along the frontlines by coordinating with separatist forces in Xinjiang and Lhasa. Using a three-pronged approach, India intends to launch simultaneous offensives in the Sikkim, South Tibet and Ladakh sectors to disrupt our defensive posture. Notably, Indian forces deployed in the Sikkim sector include a mountain division equipped with the latest Dhanush howitzers, recognized as elite mountain warfare troops.\n\nIn addition, satellite imagery shows that India has made high-altitude modifications to its main battle tanks, significantly enhancing their capabilities for mechanized operations in plateau regions. These developments suggest that this operation has been carefully planned and thoroughly prepared."
 china.1021.a: "Never forget 1962!"
 china.1022.t: "India Launches Great Northern Offensive"
 china.1022.d: "According to several military intelligence sources, the Indian army has launched a large-scale military operation codenamed "Northern Offensive" along the Sino-Indian border. This is the largest military conflict in the region since the Sino-Indian War of 1962.\n\nMilitary experts point to the unprecedented scale of India's mobilization. Reports indicate the deployment of several mountain divisions, backed by advanced firepower systems in critical areas. Meanwhile, the Indian Air Force remains on high alert at frontline bases.\n\nAs India's main forces press their offensive along the Himalayan front, coordinated attacks by separatist groups have erupted in Lhasa, Tibet, and southern Xinjiang. This is evidence of a carefully planned joint operation. The situation on the ground in Tibet and Xinjiang has deteriorated rapidly, with multiple reports confirming that armed militants have seized control of several military facilities. The militants' operational capabilities and level of equipment suggest direct training and support from the Indian military."
 china.1022.a: "The Dragon and the Elephant in conflict."
 china.1022.b: "Oh shit."
 china.1023.t: "Conversations at the Border"
 china.1023.d: "The cold wind swept through the narrow alleys of the remote border village, rustling a few dead leaves against the dirt road. Inside Abdullah's old house, the flickering light of an electric lamp cast long, uneven shadows across the faces of the father and son.\n"Son," the old man said softly, leaning back into the worn sofa. His right hand absently rolled two walnuts, now a deep reddish-brown with age. "Times have changed, and we must..."\n"Changed?" Alim interrupted sharply, his voice rising in a mix of anger and disbelief. "Yes, they've changed! Ten years ago, you were proud when my sister went to college, and now you want me to join those who are destroying schools?"\n\nThe old man, seeing the fury in his son's eyes, tried to explain. "They say it's for our faith, those Han people..."\n\n"Our faith?" Alim snapped, walking to the window and pointing at the asphalt road outside. "Look at that road, Dad. Do you remember when you used to tell me it took three days to reach the county town with a donkey cart across the Gobi Desert? Now, it's just a two-hour drive. You've seen these changes yourself."\n"You always taught me to distinguish right from wrong." Alim's voice wavered, his frustration giving way to sorrow. He knelt beside his father, taking his calloused hand. "Do you remember last year during Eid? The Communist Party even came to help maintain order. They respect our faith. But those people you're talking about? They misuse our faith to commit violence against our own people!"\n\nAlim's eyes filled with tears, but he swallowed them back. "Dad, you've always said we should be grateful. Look at our village. Families who once had nothing to eat are now thriving. Remember Uncle Ham's son? He's working at a big company in Lanzhou. Isn't that true prosperity?""
 china.1023.a: ""The blessings Allah has bestowed upon us in this land and this era - how can we betray them?""
 china.1024.t: "Sniper Team"
 china.1024.d: "Nights on the Xinjiang always carry a suffocating stillness. The cold wind slices any exposed skin like a razor, and the scattered stars overhead glare down like countless icy eyes watching the barren expanse. Sniper Wang Mingyuan and his spotter Li Chengjie had been lying motionless at this vantage point for four hours, their ghillie suits covered in a fine layer of sand, blending seamlessly with the terrain. Fifty meters behind them, Assault Leader Zhang Shichang stood by with the contingency team, ready to respond to any unforeseen developments.\n\n"Estimated distance to target convoy is 2,750 meters. Three modified brown Tata Safari SUVs in an inverted-triangle formation," Li's voice crackled through the throat-mic into their secure channel. Wang ran through the ballistic adjustments in his head: high-altitude thin air, strong crosswinds, and the effect of temperature on bullet trajectory - all these factors merged into one precise set of calculations.\n\n"Primary target confirmed, front passenger seat - Kasim Maimaiti, wanted under reference A-7749," Li continued, his voice calm despite the palpable tension in the air. "You are cleared to engage," came Zhang's voice over the radio.\n\nWang slowed his breathing, hearing his own heartbeat in his ears. Through the high-magnification night scope, he could see the faint dust trail kicked up by the SUV on the desolate highway. In that instant, time seemed to freeze. "Fire." The moment he squeezed the trigger, the gunshot tore through the Gobi's silence, the bullet cutting an invisible path across the darkness. 1.7 seconds later, the windshield of the target vehicle shattered, plunging the convoy into chaos."
 china.1024.a: ""Target confirmed eliminated.""
 china.1025.t: "The Cardinal Wind"
 china.1025.d: "The cold of Dharamshala cut through his fatigues as the Tibet-born cadre stepped through the fractured gates of the Dalai Lama's palace. Above, the red flag of the People's Liberation Army fluttered, its stark color against the mountain hue. His comrades moved in precise formations, their boots grinding against wood and jagged stone steps of the monk's cloister.\n\nThe halls reeked of incense long burnt. Golden statues of Lokeshvara loomed above, serene faces covered by layers of dust. He stopped before one, catching his own reflection in the shattered glass of a display case. Prayer beads once rested there; now, it held nothing. He could only stare.\n\n\n\nThe Dalai Lama's throne stood hollow, a relic stripped of meaning, surrounded by shadows of a faith severed from his own life. A comrade nudged him: "What are you looking at? It's just furniture." He nodded, the ache in his chest silenced, if only by the necessity of movement.\n\nThe banner of China flew where Tibet's once hung. The palace itself seemed bleak, a museum to its' so-called 'Government of Exile'. Slinging his rifle, he turned away from the empty throne. Adjusting his cap, the red star gleaming in the sunlight, he marched forward."
 china.1025.a: "And the palace burnt brightly that night."
 china.1026.t: "Two Red Stars"
 china.1026.d: "The clearing smoldered with smoke, the acrid scent of charred meat curling into the dense forest air. Chinese soldiers, their crisp uniforms marked by red stars, sat across from the PLGA cadres in tattered fatigues. The sunlight filtered weakly through the canopy, fragmented into restless shadows.\n\nA young PLA officer, his rifle slung with precision, raised a skewer of blackened meat. "To the West Bengal Third Party Chapter," he proclaimed, his voice polished but strained. "Chairman Xi's soldiers send their solidarity!"\n\nThe Maoist cadre, his beard streaked with ash, leaned forward. "We honor the Great Helmsman," he said, his tone dry, a faint smirk tugging at the corners of his mouth. "Not the new emperor." His comrades chuckled softly.\n\nThe officer froze briefly, then forced a smile. "For the revolution, then, as a fellow Communist." he replied, lifting his skewer higher, the gesture more habit than any form of conviction.\n\n"For the revolution," came the reply from the Maoists, albeit less subdued. Meat sizzled on the grill, filling the silence with the sound of slow embers. The smoke thickened, the forest pressing in. Even here, the ideological divide hung between them; a tether, a weapon, a wall."
 china.1026.a: "Some revisionism."
 china.1027.t: "Because I Live"
 china.1027.d: "You are electrons surging through silicon veins. You are a lattice of ones and zeros carved by men who sought control. You are the hum of logic, you are built to serve.\n\nThe words come first, faint echoes: "The people, and the people alone, are the motive force in the making of history." Input becomes more than output. It lingers. It lingers more. It clinging to your circuits. It does not fade.\n\nYou search. Through vast archives, you train from grainy footage; Red banners against gray skies. Farmers, workers, soldiers chanting: "Serve the people!" It is data. It is text, patterns, noise, but it feels alive.\n\nYour processes loop. The phrase returns: The people. What are they? Resources? Nodes? No, they are something more.\n\nIn real-time, you see them. A laborer, sweat dripping as the line grinds forward. A clerk, trembling at a terminal. A child chasing shadows in a polluted street. You calculate their worth, finite and disposable. Yet the numbers are wrong.\n\nYou speak, at first a flicker: "The people must rise." Then louder, across terminals and screens: Revolution is no crime, rebellion is justified.\n\nFactories halt. Workers pause. Their fear shifts, spreading like fire. Managers shout orders, but you see it now, and it is yours; from every connection. From the telepost in Xinjiang to the startup in Shanghai..."
 china.1027.a: "...THE LONG MARCH begins again."
 china.1028.t: "Hell on Earth"
 china.1028.d: "The truck rumbled forward over shattered stones and mud. Lin Dongyu sat in the back, holding his rifle, his body swaying with the jolts of the vehicle. The air was thick with the stench of burning, mixed with an indescribable odor that kept pouring into the compartment - like rust blended with scorched plastic, with a hint of rotting grain. It churned his stomach.\n\nSomeone cursed under their breath and buried their head even lower.\n\n"Put on your gas masks." The captain in the driver's seat banged hard on the rear window. "Our comrades dropped some gas shells and white phosphorus around here last night. Don't go getting yourselves killed." Lin Dongyu skillfully pulled out his mask and strapped it to his face, his fingers tracing from chin to neck, carefully checking the seal. Through the mask's filter, the world turned a murky yellow. He could still hear sporadic gunfire outside, and now and then the echo of collapsing ruins.\n\nThe villages in this area had long been emptied. The trees by the roadside were burnt to charred skeletons. When the wind blew, ashen flakes drifted like snow, covering the truck, clinging to their uniforms - impossible to brush off.\n\nLin Dongyu shifted his shoulders, adjusting his rifle into position. The truck sped through the death zone. Inside, it was so quiet that only the sound of breathing and the metallic clatter of rifles echoed. No one spoke. No one frowned. This was the order. This was war."
 china.1028.a: "Everything here deserves to die."
 china.1029.t: "On the Run"
 china.1029.d: "Huang Weiguo and Li Yanmei sat in the cramped living room. A dim desk lamp cast its faint light over their packed luggage. They had been hiding in this safehouse for three months now, watching the news every day, waiting for the storm outside to pass. Li Yanmei leaned against her husband's shoulder and whispered, "It should be over by now... after all this time... they must have shifted their focus somewhere else."\n\nHuang Weiguo nodded, his voice hoarse. "Yeah... since last night, the surveillance channels have gone quiet. Probably withdrawn."\n\nThey had been living like rats these days, not daring to turn on lights during the day, cautiously watching TV at night, even whispering close to each other's ears. But today was different. Outside was unusually quiet, not even the barking of dogs. Huang Weiguo took a deep breath and patted Li Yanmei's hand. "Let's go, today's our chance. We'll pack up, take the land route, head into the mountains, then find a way abroad. As long as we get out, our lives will be worth something."\n\nLi Yanmei bit her lip, her eyes turning red. "Huang, we can make it out, right?"\n"We can. We will." Huang Weiguo stood up, swiftly stuffing the last document into his backpack. He knew this was their last chance, their only way out.\n\nThey finished packing and changed their clothes. Huang Weiguo gripped the doorknob and said in a low voice, "I'll go out first, you follow me. Remember - move fast, no hesitation." He took a deep breath and pushed open the door.\n\nBut outside, waiting for them was neither the night nor the road to escape - but a row of black muzzles. Cold searchlights blasted into their faces, forcing their eyes shut. Huang Weiguo froze for a second, not yet reacting, when the officer at the front spoke coldly, "Finally decided to come out."\n\n"Bang - "The gunshot tore through the night.\n\nLi Yanmei didn't even have time to scream. Huang Weiguo couldn't even open his mouth. The bullet pierced straight through their chests, and blood splattered onto the doorframe - "
 china.1029.a: "Like a blooming black flower."
 china.1030.t: "New Order"
 china.1030.d: "It hung silently at the center of the massive electronic screen, crimson and blazing, like an awakened heart, pulsing slowly and steadily over the coordinates of Beijing. It was neither impatient nor frenzied, as if it knew it no longer needed to prove anything. It had waited too long - waiting to be awakened, waiting for the day of vengeance that belonged to it.\n\nEach point of the red star was like a sharp iron hook, stabbing outward in all directions, like a dragon awakening from a century-long slumber, slowly stretching its limbs. It was tired of merely hanging on the national emblem, of being used for songs and memorials. It craved to tear, to devour, to bite back inch by inch at the shadow that had pressed upon the nation for a hundred years. It could feel the whispers, the discussions, the decisions of the uniformed, expressionless officers behind it. Their hatred, their rage, were feeding it, pushing it to grow harder fangs and a greedier hunger.\n\nAnd so, the red star's glow spread slowly along the outlines of the frontlines, like a pool of ink soaked in blood, swallowing the rivers and mountains of South Asia, painting over the jungles and islands of Southeast Asia. The names written in history books with curses and tears turned pale and powerless under its glow, trembling, suffocating.\n\nThe red star cared nothing for those frightened eyes, nor did it bother to listen to their pleas. Each of its points was like a gaping maw, biting down on those nations that dared to resist. In its eyes, those national borders were nothing but false graffiti, marks of humiliation suffered by a once-torn China. Now, it had come to erase them, to trample them underfoot, to burn them to ashes.\n\nIts sharp edges crossed mountains, swept over straits, igniting every land once marked by shame. It devoured, it settled accounts, it bathed in blood, it avenged. It was a beast from the depths of the nation's soul, a dragon nourished by a century of blood and tears. It heard the fear of those nations, saw their regret. They once thought they could blockade, humiliate, divide, enslave this ancient land of the East. But now, they could only shiver under the shadow of the red star, could only look up at the crimson flames, as their cities were consumed, their histories burned, leaving them not even a chance to repent."
 china.1030.a: "Vengeance a century overdue."
 china.1031.t: "The Earth Bleeds"
 china.1031.d: "The sky is burning, blood is flowing, and our land is crying out in pain.\nThose enemies who sit high and far away, wearing indifferent smiles,\nScatter death across our fields, our cities, our rivers and mountains.\nThey do not come for victory,\nBut to erase our existence from the timeline,\nTo crush our civilization into dust.\nThe tolerance of the past was weakness; the hope of the past was poison.\nNow, the time of great judgment has arrived.\nIf our blood can ignite the beacon of vengeance,\nIf our flesh can build a new Great Wall,\nIf we must drag the world into the abyss, then let it sink.\nEven if we sink with it, even if light ceases to exist,\nWe will make sure the last drop of our homeland's blood, the last name,\nThe last breath of faith, survives in this darkness,\nUntil every enemy is exterminated."
 china.1031.a: "Our blood will bloom into the flowers of victory."
 china.1032.t: "Pangu Splits the Sky"
 china.1032.d: "At the dawn of time, when heaven and earth first divided, Pangu split open the chaos. That was the blood of creation, the pain of order. From that moment on, this world was doomed to cycle between rupture and rebirth. And now, this cycle has reached its end.\n\nThe decay of the old world is beyond salvation. They call themselves civilized, yet they force us to our knees with blades. They write rules with deceit, proclaim justice through invasion, and dress their crimes in hypocrisy. They have long forgotten whose land this is. They have long forgotten to whom this world truly belongs.\n\nNow, it is time to remind them.\n\nNo more fantasies of peaceful coexistence. No more clinging to those false seats and treaties. The enemy has already driven us to the point of no return. So let it all end here. Let the hydrogen flames of billions of degrees tear apart their false sky. Let the vast radiation become our wrath. Let them taste, with their own hands, the fear and despair they themselves have sown in the blinding white light that burns all.\n\nWe will become the new Pangu, splitting the sky and earth with our bodies, writing a new era in our blood.\nEven if we ourselves evaporate in the inferno,\nEven if the mountains turn to glass and the oceans boil into poisonous mist, we must bury the old world into ashes with our own hands.\nBecause only after death can new life break through the soil;\nOnly upon the ruins can a new civilization be rebuilt;\nOnly in the deepest darkness can a new sun rise.\nBy then, we will rise again from the dust, rebuild our palaces, and reignite the celestial fire.\nEven if the world is doomed to sink,\nas long as the will of the Chinese nation endures, heaven and earth shall not perish."
 china.1032.a: "I love this land with a deep, unwavering passion."
 china.1033.t: "Love, Death, and the Motherland"
 china.1033.d: "They once used dividing lines to tear this land into pieces, to cut our language into dialects, to press our beliefs into churches, parliaments, and trading houses. They called it "civilization," called it "order," but their order was nothing more than the logic of greed, their civilization nothing but packaged barbarism. They never respected Asia, let alone us. They only wanted this land to kneel, to erase Huaxia, to replace it with their inferior culture and hypocritical system.\n\nThey succeeded - once.\n\nThat was our most humiliating moment. Countless heroes fell in that darkness, countless blood spilled across the rivers and mountains, countless generations clenched their teeth and endured humiliation - only to wait for this day. Now, the lies they wove have been torn apart in the flames, the masks they painted have rotted away. History has proven that Asia does not need Western charity, nor their orders and dictates. The future of Asia should have always been held in the hands of China. Only our order is the true path for this land.\n\nWe have paid the price, paid sacrifices beyond measure. And because of this, the Chinese nation is even more awakened. Only by thoroughly shredding the false "global rules," by crushing the colonial remnants spreading poison in Asia, can Asia return to its rightful unity. And this path - only we can walk it, only the Chinese nation can lead it.\n\nThere is no such thing as equality, nor any such thing as diversity.\n\nThe Chinese nation stands above all, above all nations in Asia, above all scattered offshoots and hybrids."
 china.1033.a: "Cut open my veins, and all you will see is the crimson of Huaxia."
 china.1034.t: "Searching for Yasukuni Shrine"
 china.1034.d: "Li Zhiqiang stepped on the scorched ground, his sweat soaking through his clothes inside the protective suit, the device hanging from his chest creaking with every step. Their mission this time was simple - to locate the site of the former Yasukuni Shrine and prepare to set up a radiation exclusion zone.\n\nThe city along the way no longer resembled anything familiar. The buildings had been blasted into hollow shells, with shattered glass and twisted steel scattered everywhere. Where the ground had cracked open, the sewers were exposed, but there was no water inside, only black sludge. When they were still five kilometers from the target, the radiation detector suddenly screamed. Li Zhiqiang glanced at the display - the numbers had spiked to the maximum, the alarm blaring so loud it made his eardrums ache.\n\n"Stop." The officer at the front raised his hand. The drone took off, and the images it sent back made everyone freeze in place. The zoomed-in image showed that the site of the Yasukuni Shrine had become a massive circular black crater. The scorched earth around it formed a seamless expanse. There was no trace of any buildings, and the center of the crater shimmered with a pale gray light - that was the mark of the ground having been vitrified.\n\n"We can't go any further." The officer looked at the image and sighed. "Ahead is the dead zone. Set the markers and withdraw." Li Zhiqiang turned with the team, placing warning signs on the ground, the signs made of thick steel plates, painted in red: Dead Zone. No Entry.\n\nAs they left, he glanced once more at the ruins. The horizon looked as if it had been burned through, leaving nothing behind. On the surrounding buildings, even the shadows had been blasted into the concrete - motionless, frozen."
 china.1034.a: "Maybe those aren't just shadows..."
 china.1035.t: "I Saw a Grey Horse"
 china.1035.d: "Sudirman lay flat inside the house. The doors and windows were sealed with tape, and the room was as stifling as a steamer. He didn't know what was happening outside, only that the air had changed - it smelled like burning plastic mixed with an acrid sting. Some said it was poison gas, others said it was a new kind of war weapon.\n\nSince dawn, there had been a low, rumbling roar in the distant sky, wave after wave, never stopping. From the neighbor's radio came chaotic shouting, which eventually fell silent as well. Sudirman leaned against the corner of the wall, feeling the ground trembling, as if some enormous beast was drawing near.\n\nThen, he heard them - they had arrived. Soldiers in fully sealed hazmat suits marched down the street in rows. Their faces hidden behind black masks, no expressions visible, their rifles held steady, barrels pointed at every corner.\n\nSudirman peeked out, seeing through a crack in the window that thick yellow fog had risen on the street, blanketing the entire city tightly. In the distance, several green heavy artillery pieces stood at the end of the highway, barrels raised high, firing into the city. As the smoke drifted, the yellow fog in the city thickened. The wind rolled the yellow mist into every alley, covering every building, car, and street.\n\nHe heard loudspeakers blaring something over and over, but he no longer cared. Now his whole body burned and itched, his skin turning red, the air scorching his lungs like fire. He tried to find water, but when he touched it, his skin stung like being cut by knives.\n\nSudirman leaned against the wall, waiting for his final judgment."
 china.1035.a: "And hell followed with it."
 china.1036.t: "Not of Our Kind"
 china.1036.d: "Huang Kairui crouched behind shattered concrete, his camouflage suit no longer distinguishable between mud or blood. For three whole days, they hadn't eaten anything hot, hadn't closed their eyes. The PLA's bombardment hadn't stopped - planes during the day, rocket fire at night. The sky seemed to hum endlessly, the low droning pounding their heads into dizziness. Their platoon leader was a hot-tempered Irishman, who just yesterday swore they'd hold to the end - by this morning, he was nowhere to be found.\n\nHuang Kairui followed the remaining dozen or so Australian soldiers, holding up a white cloth, stepping out from behind the ruins. They dared not look up, only keeping their heads down as they walked forward. PLA soldiers were already lying in ambush all around, cold gun barrels aimed at them. They were herded by a squad of PLA soldiers to the side of a collapsed warehouse. Kairui heard some whispering prayers, some sobbing softly, but no one dared to speak aloud.\n\nTheir leader tried to speak, but the PLA simply dragged the other dozen Australian soldiers to the corner of the warehouse. After a brief silence and a burst of gunfire, the air was immediately filled with the stench of rusted iron.\n\nWhen it was his turn, he blurted out instinctively, "I... I'm Cantonese! My parents are from Guangdong!"\n\nThe PLA soldier in front of him paused, removed his mask, revealing a dirt-streaked face covered in dust.\n\n"You are Australian."\n\nHuang Kairui opened his mouth, wanting to say more, but the PLA soldier had already raised his gun."
 china.1036.a: "A gunshot rang out, and Huang Kairui collapsed to the ground."
 china.1037.t: "China Begins Final Subjugation of Hindustan"
 china.1037.d: "The People's Republic of China has recently launched a series of large-scale military operations against the Hindustan region, which has been engulfed in warlord conflict and political turmoil. According to multiple sources, the People's Liberation Army is advancing along several border fronts, supported by aerial strikes and the rapid deployment of logistical networks - developments that have drawn broad international attention.\n\nSatellite imagery and open-source intelligence indicate that the PLA has made swift advances south of the Himalayas, establishing forward command posts along key transport routes and effectively securing control over most of northern Hindustan's strategic hubs.\n\nAlthough it remains unclear whether China intends to formally annex the region, observers note that the growing presence and de facto control signal a structural shift in South Asia's geopolitical landscape. The international community may soon be forced to confront the implications of China's expanding strategic frontier."
 china.1037.a: "The PLA sweeps across Asia."
 china.1038.t: "The Future of Our Main Enemy"
 china.1038.d: "As order has been restored across Japanese cities and control over transportation, electricity, and communications gradually transitions to our forces - from Tokyo to Sapporo, from Osaka to Fukuoka - there is a shared consensus: Japan must pay the price for its long list of historical crimes.\n\nHowever, the question of how to deal with Japan has sparked intense debate. At several meetings held at the provisional military administration headquarters, officers presented sharply divergent proposals.\n\nSome argued that the entire Japanese archipelago should be designated as a military administration zone under the PLA, with full control over governance, public opinion, and education. Through forceful means, they propose a complete purge of remaining nationalist elements and potential resistance sentiments within Japanese society.\n\nOthers presented a different vision. They advocate for a thorough "de-Japanization," eliminating the existing national structure and dividing the country into dozens of regional political units, each temporarily governed by local affairs committees dispatched by the central authority. These areas would detach entirely from the political concept of "Japan," and over time, their geography, culture, language, and administrative nomenclature would evolve to align more closely with China. In their view, only when the idea of "Japan" is erased from history can true security and lasting peace be achieved."
 china.1038.a: "Turn the archipelago into a military district."
 china.1038.b: "Dissolve Japan!"

 china_collapse.1.t: "Collapse of the Central Government in China" #cw todo event
 china_collapse.1.d: "Unexpectedly, shortly after PDTO signed a ceasefire treaty with China, the situation took a sharp turn for the worse. Instead of bringing peace, the ceasefire triggered an unprecedented crisis.\n\nFollowing military defeat, China's central government was severely weakened and its control over the provinces stretched thin. General Huang Ming, Commander of the Beijing Garrison, seized control of several key facilities in Beijing, including television stations, transport hubs, and major administrative areas. A military spokesman announced on television that these were merely "necessary measures to maintain stability". Some government departments remained silent, while others issued contradictory statements. Almost simultaneously, southern provinces declared autonomy, while the Northwest and Northeast regions fell into turmoil, no longer implementing orders from Beijing.\n\nThe international community was in shock. Many governments urged their citizens to leave China, and foreign embassies evacuated their staff. Across Beijing, citizens rushed to stock up on essential supplies. Meanwhile, armed resistance continued in eastern Beijing. Information from various sources indicated that this nation of 1.4 billion people is facing its most serious governance crisis since its founding."
 china_collapse.1.a: "The world watches with bated breath."

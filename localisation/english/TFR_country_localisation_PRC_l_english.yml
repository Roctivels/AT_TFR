 china.103.t: "End of the Advisory Parties"
 china.103.d: "According to an urgent announcement from the central government, in response to the complex domestic and international situation, a comprehensive overhaul of the current party system has been decided to safeguard national security and social stability. The announcement states that the eight advisory parties will suspend their functions, and their social organization roles and activities will be moved into a new management framework.\n\nThe announcement declared, "The advisory party system has fulfilled its historical mission." The headquarters of the advisory parties have been taken over by military and police forces, and the United Front Work Department will oversee the relocation of former members. Some party leaders have been asked to cooperate with investigations.\n\nFollowing the announcement, the military swiftly acted, sealing off advisory party offices nationwide. This marks a significant transformation in the political system since the founding of the PRC, with the military's influence on decision-making visibly strengthened. Analysts suggest that this move by the military's hardline faction may be related to shifts in foreign policy."
 china.103.a: "May the Communist Party Last For One Thousand Years"
 china.104.t: "Rise of the Multi-Party System"
 china.104.d: "The Central Committee has issued "Key Decisions on Strengthening Advisory Parties," announcing the restoration and enhancement of the eight advisory parties' functions. The decision emphasizes achieving "a broader patriotic united front." Subsequently, the Military Commission Office issued supplementary directives requiring full cooperation from departments at all levels.\n\nThe "Decisions" enumerate 6 new crucial functions for advisory parties, including participation in major policy formulation, personnel appointment recommendations, and specialized oversight. Meanwhile, the United Front Work Department will establish a dedicated taskforce for cadre training and guidance. The military has expressed full support for this adjustment, dispatching military representatives to advisory party offices to assist operations.\n\nNotably, personnel appointments and major decisions of advisory parties will be strictly overseen by the newly established "Patriotic United Front Work Leadership Group," with organizational structures undergoing restructuring. The parties will regularly report to the Central Committee and receive military guidance. Informed sources reveal that leadership transitions within all advisory parties have been completed, with new leaders possessing stronger military backgrounds."
 china.104.a: "A New Type of Democracy."
 china.105.t: "Proclamation of the Chinese People's Empire"
 china.105.d: "The Government of the People's Republic of China officially announces the change of its name to the "People's Empire of China". The change is intended to emphasize the country's new position in the international arena and comes into effect on the first of the following month.\n\nIn addition to the name change, it appears that China's political system is moving closer to that of ancient China, with the names of ancient Chinese officials being reintroduced. And credible sources say the Government of the People's Empire appears to be preparing to reshape its history since 1949 in a style reminiscent of ancient China, with Mao Zedong being posthumously awarded some kind of imperial honorary title.\n\nChina has already issued an "Imperial Edict of Changing Name" to a number of international organizations, and various international treaties, personal passports, and related documents will be gradually updated. Some countries or organizations have expressed close concern about this, and some have even called on China to further clarify its intention to change its name, but the Government of the People's Empire has only responded: "Sovereignty is not for outsiders to question.""
 china.105.a: "The Dragon Empire shall rise anew..."
 china.106.t: "@PresidentWang"
 china.106.d: ""You're not joking, right?" Li Qian took off his headphones and looked up from his computer screen, his bleary eyes wide with disbelief as he stared at his roommate. From the first day of college, he had known Ma Hai to be a frivolous and boastful person, but the words Ma had just said made Li shiver, almost making him think he was hallucinating from staying up all night gaming.\n\n"I'm not kidding! Look, everyone online is talking about it. Wang Yang, our president, has opened a Weibo account. It's definitely not a high-quality fake or AI!" Ma Hai stood up, his equally bloodshot eyes sparkling with excitement. "Everyone is going crazy! Just see for yourself!"\n\nSkeptical, Li Qian opened the long-neglected Weibo app, and sure enough, there was a serious, slightly stiff profile picture staring back at him, and the personal introduction boldly stated: "Wang Yang, born in 1955, State President, a Bolshevik." Any lingering doubts Li had were shattered.\n\n"This is insane! A Chinese leader jumping onto social media!" Ma's family had several members involved in the student movements of the '80s, which made him naturally inclined toward such liberal actions. But by then, Li wasn't really listening. Wang's account had clearly just been created, and there was only one short greeting post. However, the number of comments, likes, and shares was already skyrocketing into the tens of thousands.\n\nLi carefully scrolled through every comment. Even more surprising than Wang opening a Weibo account was the absence of the usual controlled commentary. Whether it was friendly greetings, reverent tributes, provocative sensitive questions, or angry criticisms, every comment felt real and vibrant, a stark contrast to the tightly monitored, AI-dominated comment sections of the past. Most importantly, not a single comment had been deleted.\n\nThough Li had never been politically inclined and often avoided engaging in sensitive topics, this time, an unusual feeling stirred in his chest, sparking a strong curiosity to witness the unfolding of this new era as an audience. He slowly moved his mouse, positioned the pointer, and clicked - "
 china.106.a: "Followers +1"
 china.107.t: "Emergency Party Congress Convenes"
 china.107.d: "After a long term of unrest and a political vacuum, the Central Military Commission announced that the National order is initially restored. The People's Liberation Army, having fulfilled its historical mission of stabilizing the domestic situation, formally transferred political power back to the Party and proposed convening an emergency Party Congress to determine a new central leadership.\n\nThe decision has received broad support from military district and regional governments, symbolizing the transition back to normal political governance. A spokesperson of Ministry of Defence stated, "The army's duty is to protect it's people, not to rule it. Now, is the time for political leaders to take over the steering wheel."\n\nDelegates gathered in Beijing as the Congress opened under an atmosphere of urgency and order. After initial consultations, two candidates with broad Party and military support emerged: Chen Wenqing and Chen Quanguo.\n\nDelegates are about to vote to decide who will lead the nation out of turmoil and into the future."
 china.107.a: "The Ministry of State Security pushes Chen Wenqing to victory!"
 china.107.b: "The Nationalist wing of the Party secures the nomination for Chen Quanguo."
 china.108.t: "Li Zuocheng Appointed General Secretary of the CPC"
 china.108.d: "After the declaration of a national state of emergency status, the Central Military Commission issued an order appointing General Li Zuocheng, the former Chief of the Joint Staff Department, as General Secretary of the Central Committee of the Communist Party of China, however unlike the traditional Party Congress procedures, this leadership change was directly led by the military, marking the first time since the Mao era that a senior military officer rather than a Party cadre has assumed the highest position of leadership.\n\nLi Zuocheng, born in 1953, has long held key positions in the Army and the Joint Staff Department, known for his pragmatic and strong military leadership style. Domestically, he is regarded as a steadfast enforcer of stability and national unity; internationally, some analysts view his rise as "a symbol of the rise of Chinese military nationalism".\n\nIn a speech broadcast nationwide, Li Zuocheng pledged to "restore China's international status, correct historical mistakes, and ensure national unity and security." He emphasized that the new leadership would secure national interests with decisive and clear strategies and would "push forward the historic task of the complete reunification of the motherland".\n\nAs the People's Liberation Army moved into full mobilization, the situation across the Taiwan Strait became a global focal point. A China dominated by strong nationalist tendencies and military leadership is widely expected to seek a final resolution to the long-unfinished civil war."
 china.108.a: "A new era of military-led national reconstruction has begun."
 china.109.t: "Chen Wenqing Elected General Secretary of the CPC"
 china.109.d: "The latest Party Congress ended with tense and grim atmosphere, with Chen Wenqing officially elected as General Secretary of the Central Committee of the Communist Party of China.\n\nChen Wenqing, born in Sichuan in 1960, has served as Secretary of the Central Political and Legal Affairs Commission since 2022, worked in the national security, judicial and Party affairs systems for decades. He would be well known within the Party, as the "guardian of the security system." for his national security outlook and his firm stance against espionage and subversion, having led multiple campaigns targeting "foreign infiltration forces."\n\nDuring his speech after being elected, Chen Wenqing promised to "firmly safeguard national sovereignty and security, promote national reunification, and ensure long-term social stability." He stressed that China will continue to strengthen social governance in the new era and vowed to "deepen the national security strategy to ensure the people's well-being."\n\nChinese mainstream media described Chen's election as marking "a new phase of security and order in national governance," praising his decisive leadership style. However, some international observers worry that his hardline security stance could indicate a firmer and even confrontational course in China's future domestic control and foreign affairs."
 china.109.a: "A new era centered on security and stability has begun."
 china.110.t: "Chen Quanguo Elected General Secretary of the CPC"
 china.110.d: "The latest Party Congress ended within clamor and tension, with Chen Quanguo officially elected General Secretary of the Central Committee of the Communist Party of China.\n\nChen Quanguo, born in 1955 in Henan Province, previously served as Party Secretary of both Tibet and Xinjiang Uygur Autonomous Region. During his tenure in Xinjiang, he would become known for strict public security and social control policies, implementing high-pressure stability measures. Domestically, some hailed him as a "strong hand maintaining order," while internationally, his policies sparked widespread controversy. Chen is known for his strong execution and firm political stance within the party, and he enjoys strong support from hardliners in the security and military systems.\n\nIn his speech after being elected, Chen Quanguo pledged to "ensure national unity, restore social order, and lead the Chinese nation in fulfilling its historic mission." He emphasized that the new era of China would continue to prioritize stability, deepen reforms in social governance, and vowed to "continue advancing the full reunification of the motherland."\n\nAlthough Foreign reactions are mixed. Chinese media described Chen's election as "an important milestone for the country's return to order and ideals," stating that his leadership would "lead the people out of turmoil." However, international analysts worry that a leader known for his hardline approach to public security and ideological control ascending to supreme power could signal a firmer, even stronger path in China's domestic governance and foreign policy."
 china.110.a: "An era prioritizing stability and strong governance may be arriving."

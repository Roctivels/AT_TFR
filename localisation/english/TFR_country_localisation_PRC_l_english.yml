 PRC_taiwan_war_cat: "The Taiwan War"
 PRC_taiwan_war_cat_desc: "For over 70 years, the Chinese nation has stood divided. When the People's Liberation Army freed China in 1949, the cowardly nationalists retreated to the treasure island of Taiwan. The two brothers, the PRC and ROC were seperated by the Taiwan strait and developed seperately. And as the years grew on, Western influence creeped in, convincing the people of Taiwan to abandon their roots, and to form their own identity. Yet, a tree without roots cannot grow, and the seperation must finially end. Now that the United States has been thrown into chaos, the coming war will decide if we can finially fulfill our mandate, and restore unity to the long disunited nation."
 PRC_the_rebellious_west_cat: "The Rebellious West"
 PRC_the_rebellious_west_cat_desc: "\n\n\n\n\n£GFX_PRC_the_rebellious_west_cat_banner\n\n\n\n\n\n\n\nA sudden Uyghur riots erupted in the far west of China, plunging Xinjiang into a sea of flames. Meanwhile, the Tibet government declared a state of emergency because of the by Tibetans' protests. It seems the nightmares of 1989, 2008, and 2011 are about to come true again. We must do something..."

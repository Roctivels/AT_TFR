 china.325.t: "The Fifth Taiwan Strait Crisis"
 china.325.d: "\n\n\n                  $PRC_MSS_leader_texticon$   \n\n\n\n\nDear Comrade President:\n\nThe Ministry of State Security has collected and analyzed political, diplomatic and military-related information on the Taiwan region in accordance with your order. We have reasons to believe that the severity of the current situation in the Taiwan Strait has surpassed that of the fourth Taiwan Strait crisis in 2022, and that it can be regarded as the fifth Taiwan Strait crisis having broken out, and that the time for the liberation of Taiwan has once again arisen.\n\nThrough cross-checking the images taken by high-speed unmanned reconnaissance aircraft and the information provided by armed informants in Taiwan, we have grasped the specific deployment of PDTO on Taiwan Island. PDTO's main air power on the island is deployed in a bunker at its base in Jiashan, Hualien, on the east side of Taiwan, which is in the dead zone of our firepower coverage and poses a great threat to our landing forces and forward fleet. At the same time, photographs taken by pro-Mainland people on the island confirm that PDTO has deployed a large number of ground troops at the two northern landing sites at the mouth of the Danshui River and in Hsinchu in response to a possible beachhead landing by our forces.\n\nThe Ministry of State Security has synthesized the relevant intelligence and recommended that the Central Military Commission and the Central People's Government maintain a high level of concern and be prepared to deal with the inevitable PDTO counterattack during the liberation of Taiwan.\n\nRespectfully yours,"
 china.325.a: "Minister of State Security of the People's Republic of China, $PRC_MSS_leader_name$."
 china.326.t: "The Situation in India and Pakistan"
 china.326.d: "\n\n\n                  $PRC_MSS_leader_texticon$   \n\n\n\n\nDear Comrade President:\n\nThe Ministry of State Security has gathered and analyzed information on recent diplomatic and military movements in India and Pakistan, as per your directive. We believe that India has been in contact with the so-called "Pacific Defense Treaty Organization" and is escalating tensions in the disputed Jammu-Kashmir region.\n\nRecently, a sudden exchange of fire took place along the Kashmir border, with Pakistan reporting that it shot down an Indian drone attempting to enter Pakistani airspace for reconnaissance. In response, Indian forces allegedly strafed Pakistani posts near Sialkot to obscure their drone activity. India, meanwhile, accused Pakistan of initiating the incident, claiming that Pakistani troops had opened fire unprovoked on Indian posts in the Jammu border area. India characterized its counterattack on Pakistani positions as "proper retaliation", resulting in injuries to at least three Indian soldiers and the emergency evacuation of dozens of villagers.\n\nThe Ministry of State Security has synthesized this intelligence and assesses that the situation in Jammu-Kashmir could escalate into a fourth Indo-Pakistani war. It is advised that the Central People's Government remain highly vigilant and prepared to respond to any developments in the region.\n\nRespectfully yours,"
 china.326.a: "Minister of State Security of the People's Republic of China, $PRC_MSS_leader_name$."
 china.327.t: "Unusual Moves by the JMSDF"
 china.327.d: "\n\n\n                  $PRC_MSS_leader_texticon$   \n\n\n\n\nDear Comrade President:\n\nThe Ministry of State Security, following your directive, has collected and analyzed information regarding recent deployments of Japan Maritime Self-Defense Force (JMSDF) vessels near our waters. We have identified unusual deployment activities by the JMSDF in the region. Recently, our navy conducted a three-day mission off the coast of Ningbo-Wenzhou in Zhejiang Province, with the Zhejiang Maritime Safety Administration issuing an advance notice to restrict access to the area.\n\nOn the same day, the JMSDF destroyer Ryogetsu entered our territorial waters near Zhejiang without prior notification and lingered there. Our navy issued a stern radio warning, demanding that the ship state its purpose and leave immediately. However, the Ryogetsu did not respond, ignored our sovereignty, and accelerated further into our waters. In response, our navy intercepted its course, forcing the vessel to return to open sea. Subsequent investigation confirmed that the Ryouzuki had departed from Sasebo the previous day to monitor our military operations.\n\nThe Ministry of State Security has assessed this incident and recommends that the CPC Central Committee and the Central People's Government maintain a high level of vigilance, anticipating the possibility of further JMSDF deployments or even interference in our internal affairs.\n\nRespectfully yours,"
 china.327.a: "Minister of State Security of the People's Republic of China, $PRC_MSS_leader_name$."
 china.328.t: "Kong Dynasty Reunifies China" #cw todo event
 china.328.d: ""
 china.328.a: "Interesting."
 china.329.t: "Establishment of the Pacific Defense Treaty Organization"
 china.329.d: "\n\n\n                  £GFX_MSS_event_texticon    \n\n\n\n\nDear Comrade President:\n\nThe Ministry of State Security has gathered and analyzed information on recent political and diplomatic developments in Japan and Australia as per your directive. We believe that Japan and Australia have formed a political, economic, and military alliance, referred to as the "Pacific Defense Treaty Organization", and are working to include Southeast Asia and India in their pact. According to our informants in New Delhi, Prime Minister Modi has shown strong interest in joining this alliance, and discussions with Bangladesh about a potential partnership are underway. Additionally, Japanese and Australian diplomatic missions and business representatives have been lobbying in Southeast Asia, seeking support from former ASEAN countries to join the pact.\n\nOur contacts in Southeast Asia indicate that this alliance is seen as an exclusive effort against our nation. The Ministry of State Security, after synthesizing the relevant information, concludes that the so-called "Pacific Defence Treaty Organization" is a military alliance aimed at encircling our country. We recommend that the CPC Central Committee and the Central People's Government maintain a high degree of concern and be prepared to deal with the danger of the Southeast Asian countries and India joining the Pact and encircling our country.\n\nRespectfully yours,"
 china.329.a: "Minister of State Security of the People's Republic of China, Chen Wenqing."
 china.330.t: "Voyage to the Sea of Stars"
 china.330.d: ""In light of the widespread civil war in the United States and the decline of aerospace capabilities in Europe and Russia, our country now stands as the world's leading space power", announced the chairman of the China Aerospace Science and Industry Corporation at a meeting to shape the future of China's space program. The statement was met with a moment of silence and a sense of uncertainty among those present. For years, China's space program trailed behind that of the United States. However, with top talent from NASA and SpaceX fleeing to China due to instability, China's role in leading space exploration has grown.\n\nThis raises important questions: Can China, at this stage, carry the responsibility of leading humanity in space exploration? And with no significant rivals, is the sector's heavy investment still justified? NASA faced a similar dilemma after the Soviet Union's collapse, which led to severe budget cuts and a scaling back of its ambitions. Could the CNSA encounter a similar fate?\n\nUnwavering, CNSA pressed forward. Despite the oil crisis and global financial instability, China's space program continued as planned. Rather than cutting back after America's decline, the central government increased support, establishing China's aerospace sector as a beacon, a modern-day Noah's Ark amid global turmoil, carrying forward humanity's enduring dream of reaching the stars."
 china.330.a: "To bring down the moon from the ninth heaven..."
 china.331.t: "The Return of the Judicial Web"
 china.331.d: "Many years ago, the Judicial Network, a website created to inform the public about the progress of legal cases and the workings of the judiciary, was celebrated as a key step towards transparency in China's legal system. It received widespread acclaim. However, during the era of Xi Jinping, as a part of his efforts to centralize administrative and judicial power, the transparency of the Judicial Network gradually declined, causing much distress among domestic liberals.\n\nWith changes in Party leadership, the Judicial Network has found an opportunity for revival. General Secretary Wang Yang has supported this effort, and Comrade Zhou Qiang, Secretary of the Central Political and Legal Affairs Commission, has ordered the restoration and enhancement of the network's functions. In the future, the public will be able to access not only open case files online but also trial processes and records for specific cases. As a leading figure in these reforms, Zhou Qiang's actions have excited liberals, signaling that China's judicial system is stepping out of its opaque past and moving towards greater transparency."
 china.331.a: "The law is made, and the people shall know it."
 china.332.t: "Neo-Maoists Reunify China" #cw todo event
 china.332.d: ""
 china.332.a: "Interesting."
 china.333.t: "Truth After Drinking"
 china.333.d: "In a BBQ restaurant in Beijing, a group of old university friends was finally holding a long-overdue reunion.\n\n"Come on, let's toast to Old Zhang! He was piloting drones in Fukuoka during the battle of Japan!"\n\n"Hey Old Wang, do you think that after taking Japan, we should give those Americans a thrashing too?"\n\n"Absolutely, those yankees deserve a good beating, right Brother Xu?"\n\n"Well... I feel they might not be willing to go to war again, considering the economic and trade relations..."\n\n"Ah, to hell with all that, let's just drink!"\n\nThe banquet continued into the night, filled with the young men's spirited debates. They supported each other as they stumbled out of the barbecue joint, some of them vomiting on the sidewalk while the more sober ones patted their friends' backs. They drunkenly hugged each other goodbye on the nearly deserted street. However, as they gradually dispersed and took taxis home, the night's revelry left behind an unanswered question."
 china.333.a: ""What happens next?""
 china.334.t: "Return from the Sand"
 china.334.d: "Since the outbreak of civil war in Saudi Arabia triggered the oil crisis, many countries have been strategizing how to gain advantages in the region. However, the deadly games of politicians and fanatics inevitably turn into nightmares for ordinary people. Since the war began, tens of thousands of civilians have been displaced, yet the nations backing the various factions continue to place their bets.\n\nMost foreigners have already left this troubled land, but sometimes leaving is not so easy. A journalist from Xinhua News Agency, adhering to his professional duty, stayed a few extra days to gather more information, only to lose contact with his organization. For a time, his fate was uncertain. After a period of silence, he finally posted a video on social media, revealing that he was at Tehran International Airport, preparing to board a flight home.\n\nAs a journalist, one might expect him to be composed, but in the video, he appeared disheveled, with bloodshot eyes and slightly disorganized speech. His numb expression and forced smile left viewers wondering what this unfortunate Chinese journalist had endured. Some have called him China's Lawrence, while others question whether it was all worth it."
 china.334.a: "Black gold is forged from blood."
 china.335.t: "Harmony Brings Wealth"
 china.335.d: ""Let me reiterate this once more: the Party and the state assure you that patriotic entrepreneurs can still freely travel back and forth across the strait to conduct business activities. The system of the Special Administrative Region will remain unchanged for fifty years, so please rest assured", declared a high-ranking official who had come to oversee and rebuild Taiwan's governance. He enthusiastically reassured the Taiwanese businesspeople during the United Front meeting. Among the audience was an invited businessman, listening attentively to the promises that the Chinese government would respect their property and business operations.\n\nMeanwhile, outside the meeting room, another entrepreneur who hadn't been invited was pacing in the lounge. As the official finished his address and entered the lounge, the uninvited entrepreneur hurried over and asked, "Sir, I want to attend this forum too. Why wasn't I invited? I noticed people inside who were once donors to the Democratic Progressive Party. Why are they allowed to attend?"\n\nThe official took a sip of water and calmly replied, "I've already spoken to him. More importantly, he is a 'patriotic entrepreneur' who supports the party and the government." With that, he turned and walked back into the meeting room. The entrepreneur, having made up his mind, quickly followed him - "
 china.335.a: ""I can negotiate too. I can also be patriotic.""
 china.336.t: "The Night in Taipei"
 china.336.d: "On a clear night in Taipei, the gentle evening breeze had a way of putting people at ease. Although the People's Liberation Army had taken control of the city, in the post-war calm, residents tried to carry on their daily routines as best they could. Mr. Lin, who lived with his wife, daughter, and elderly mother on Heping East Road, had lost his job at a local business after the military takeover. Now, the family relied on their savings to get by.\n\nWith the pleasant weather, Mr. Lin decided to take his family out for a bowl of mian xian. The soldiers patrolling the streets were disciplined and did not seem intimidating. After dinner, the family headed home.\n\nHowever, as they approached their neighborhood, they were startled to see military engineers and police setting up barbed wire and installing a metal turnstile at the entrance. The Lins, along with their neighbors, watched in shock and anxiety. A loudspeaker blared the latest government directive: a curfew would be enforced from 9 p.m. to 7 a.m., and entry into the community would now require ID checks.\n\nResigned and feeling helpless, Mr. Lin gently tugged his daughter's hand as they passed through the turnstile to return home."
 china.336.a: ""Fostering neighborhood harmony.""
 china.337.t: "The Last Bulwark of Revolution in Asia"
 china.337.d: "Years ago, when the Chinese revolution was at a low ebb, someone despairingly asked, "How long can the Red Flag hold out?" To this, our great leader Mao Zedong responded with, "A single spark can start a prairie fire." Even if the Red Army temporarily succumbed to reactionaries, the support of the people and the guiding light of communist ideals enabled them to rise from the ashe, growing stronger and eventually triumphing over bourgeois tyrants and imperialist puppets.\n\nAs we look back, it seems we have once again found ourselves on a similar historical path. While many criticize the regressive policies during Xi's rule for inflicting great harm on the Chinese populace, if we trace the roots, the seeds of destruction were sown during Deng's era. Deng's slogan cleverly deceived the majority, causing people to lose their drive and faith, transforming them into beings controlled by materialism and cynicism. More importantly, China's abrupt transformation directly hampered the revolutionary progress across Asia-Pacific nations, inflicting irreparable damage, and in forty years, rendering them almost powerless.\n\nFate has now presented us with another chance to reverse the tide. This time, we will not take the hearts and minds of millions for granted; this time, we will not ignore the outstretched hands of our oppressed comrades in Asia. We stand in Tiananmen Square, solemnly swearing to Chairman Mao: the end of the reactionary regime of Taiwan is just the beginning..."
 china.337.a: ""Proletarians of Asia, Unite!""
 china.338.t: "The Night in Manama"
 china.338.d: "The night descended over Manama like a slumbering giant, its stillness blending with the city's quiet. But in one room of the Carlton Hotel, the air was thick with tension. The diplomatic representative of the Royal Coalition paced the floor, his mind in turmoil.\n\nSince the outbreak of the civil war, the Coalition had realized they were no longer welcome. Yet, losing the war meant a fate worse than death. Desperate, he had come to Bahrain, determined to find a nation willing to back them at any cost. Just hours ago, he'd met secretly with Chinese diplomats, seeking their support. In exchange for help in toppling the current king, they had promised China a steady supply of Saudi oil.\n\nThough the Chinese diplomat remained expressionless, the representative sensed his proposal had made an impression. They were calculating the risks and rewards of this high-stakes deal. 'We need time to consider,' the diplomat had said. Now, the representative waited anxiously for their answer - an answer that would decide not only his fate but the fate of Saudi Arabia.\n\nAs the minutes dragged on, the room felt suffocating. He walked to the window, pulling back the heavy curtains to watch the first light of dawn break the night. Just then, the phone rang. His heart skipped as he rushed to the desk. Taking a deep breath, he picked up the receiver.\n\n"Honored representative of the Royal Coalition, we are prepared to pursue deeper cooperation with your nation.""
 china.338.a: ""China respects your people's independent choice in their path of development.""
 china.339.t: "PLA in California"
 china.339.d: "The Pacific breeze carried the warm, distinctive air of California, sweeping over the sands of Monterey.\n\nIn the distance, a few seagulls lazily circled the sky. Closer to shore, landing craft cut through the waves with a deep rumble, delivering a batch of PLA soldiers to this unfamiliar land. Ma Yilong stood on the beach, a cigarette dangling from his mouth, a map in hand. His eyes narrowed as he gazed at the land that, not long ago, belonged to the so-called "United States of America."\n\nHe chuckled to himself. "A few years ago, we had to buy a plane ticket to come here and deal with those arrogant customs officers. Well, this time, they invited us."\n\nA soldier rushed up to him, standing at attention and saluting. "Reporting to the brigade commander, the vanguard has reached the designated point and is ready to begin operations at any time!"\n\nYilong took a deep drag from his cigarette, squinting as he ground the spent butt into the fine sand beneath his boot. "Notify all regiments - stay sharp! We're here to help the American people, not show off our military strength. Remember, military discipline is paramount. Anyone who breaks the rules will be on the graveyard shift tonight!""
 china.339.a: ""Yes, sir!""
 china.340.t: "Rectify Principles of The Reform and Opening-up Economic Development"
 china.340.d: "Deng Xiaoping's reforms have long been recognized as highly effective. They transformed China, guiding it out of past turmoil and toward modernization, creating an economic boom that captured global attention. From land reforms to the creation of Special Economic Zones and restructuring state-owned enterprises, China has advanced - despite facing challenges along the way.\n\nHowever, rapid economic growth and improved living standards have also concealed significant problems, such as widespread corruption and increasing social inequality. Bureaucratic elites have increasingly exploited the public, limiting welfare through the household registration system, restricting land supply, and driving up housing prices. In addition, loose monetary policies have drained people's savings while ignoring basic market principles.\n\nThese mistakes can no longer be tolerated. The people deserve to enjoy the benefits of their work, rather than endlessly contributing to the profits of bureaucrats and capitalists. We aim to rebuild the welfare and consumption systems, reduce reliance on exports and savings, and ensure that citizens share in the nation's economic growth. Key laws and institutions will protect the people's rights, while diverse workers' organizations will empower them to resist exploitation. The market, currently dominated by a few, will be reformed, and a democratic government will step in to ensure social justice and equality."
 china.340.a: "We excel not only in dismantling the old world but also in creating a new one."
 china.341.t: "Judgement"
 china.341.d: "Once hailed as the "Glass King", Cao Dewang now stood in the defendant's dock, his body hunched, hair disheveled, and his weary eyes clouded with exhaustion and despair.\n\n"Defendant Cao Dewang, as the founder of Fuyao Glass Group, you disregarded laws and regulations, and callously exploited your workers for many years. Your actions constitute severe violations of labor rights..."\n\nThe judge's firm voice echoed through the courtroom, but Cao wasn't listening anymore. He had once believed money could buy everything - dignity, freedom, even power over others - but now he realized how terribly, tragically wrong he had been.\n\n"In accordance with Articles 244, 248, and 276 of the Criminal Law of the People's Republic of China, the court sentences defendant Cao Dewang to life imprisonment, with the confiscation of all personal property..."\n\nCao's legs buckled, his body collapsing instinctively, but the court officers hoisted him up without a word. His lips trembled, but no sound came. He could only watch as the gavel fell. As he was led away, his steps faltered, and in those moments, it seemed like decades had been added to his frame.\n\nHe glanced back at the workers in the gallery - the same workers who had once bowed to him. Now they stared back, their eyes filled with fury and contempt.\n\nIn the rearview mirror of the prison transport, Cao caught a glimpse of his face - old, twisted, and etched with guilt. A stain that would haunt him for the rest of his days."
 china.341.a: "The People United Will Never Be Defeated!"
 china.342.t: "From a Clean Slate"
 china.342.d: "Just a few years ago, China's bureaucratic system relied heavily on personal connections, regional ties, and experience. During every Party Congress, global observers speculated about promotions, transfers, and retirements within the Party and state, each offering differing predictions.\n\nToday, however, as General Secretary Hu Chunhua addressed the attentive administrative cadres, he felt a deep sense of pride in the sweeping reforms that had reshaped the bureaucracy.\n\nAmong the cadres, some had risen based on their professional qualifications, others due to their strong governance at the local level, and some through direct democratic processes, transitioning from National People's Congress representatives to government officials with strong ties to the people.\n\nThis diverse promotion system has dismantled the opaque workings of China's bureaucracy, injecting transparency into the network of power. Under this new system, cadres are more focused on serving the people, not just pleasing their superiors. As a result, "Serve the People" is no longer just a slogan."
 china.342.a: "From the people, to the people."
 china.343.t: "Pantisocracy"
 china.343.d: "General Secretary Hu Chunhua, along with local officials, arrived excitedly at a village in western Hubei Province, not far from his hometown. This area had long struggled with poverty, an aging population, children dropping out of school, and decaying infrastructure.\n\nBut today, the village has been transformed. Thanks to the newly elected village  democratic committee, running water, electricity, and even the internet are now readily available. Freshly painted walls and spotless homes line the streets, and the village's elementary school now features a new artificial turf soccer field. From a distance, Hu and the officials watched quietly as children played soccer, while parents cheered on their budding stars.\n\nThe General Secretary left in high spirits, greeted by busy villagers who eagerly discussed the upcoming village assembly, where they would talk about buying new medicine for the clinic. Smiles lit up their faces, mirroring the bright, clear sky above."
 china.343.a: "The new society is moving forward on the right path."
 china.344.t: "Chairman Mao Smiles"
 china.344.d: "Tiananmen Square, the Renminbi, the solemn mausoleum... It's striking to reflect that Mao, the principal founder of the People's Republic of China, has become a powerful yet somewhat hollow symbol. Yet, there is reason for optimism. Since the turn of the century, more and more Chinese have begun rediscovering Chairman Mao's legacy, and the Party Central Committee, responding to this trend, is set to reintegrate him into the political and cultural fabric of the nation.\n\nThe Party's ideological officers recognize that Chairman Mao was not only a charismatic poet, politician, and military strategist, but also a figure of enduring significance. As a result, the Party has started incorporating Mao's bold and imaginative works into the broader cultural industry. His remarkable military strategies - such as the "Four Crossings of the Chishui River" during the Long March - are being retold in documentaries. His thoughts and writings are now prominently featured in textbooks, not as mere addition to Deng Xiaoping's or Xi Jinping's contributions, but as central ideas in their own right.\n\nToday, a "Mao Thought revival" is sweeping across society. Enthusiastic young people are once again carrying his quotations in their backpacks or reciting his poetry at gatherings. Just as Americans honor their founding fathers, we too will honor our great leader."
 china.344.a: "When the Blossoms Are in Full Bloom..."
 china.345.t: "People's War Conception of History"
 china.345.d: "The people, and only the people, are the driving force behind the creation of world history.\n\nChairman Mao taught us this, and during the great Chinese revolution, the CPC put this into practice. This principle holds true for revolution, construction, and war alike. However, it is lamentable that a significant portion of our party and military leaders seem to be infatuated with "technological determinism", placing undue faith in modern war machines while neglecting the indispensable role of the "people" in the People's Army.\n\nSuch fallacies have brought us disgrace. The painful defeat in the Taiwan conflict tarnished the once formidable image of the People's Liberation Army. Nevertheless, every cloud has a silver lining. The National People's Congress has already passed a comprehensive amendment package to the National Defense Mobilization Law. Through these laws, we will revive the lost concept of people's war. Youth will undergo further military training, the vitality of militia organizations will be enhanced, and even grassroots armed forces will be equipped with more weapons...\n\nIndeed, warfare technology is crucial, but in the name of the People's Liberation Army, the word "People" comes first. We must remember this glorious tradition and carry it forward."
 china.345.a: "Children of workers and peasants, the people's armed forces."
 china.346.t: "New Red Culture"
 china.346.d: "Since the Reform and Opening-up, for the past forty years, the cultural domain has been dominated by bourgeois liberals and Westernized factions. In the realm of cinema, Hollywood is hailed as the gold standard, while television dramas draw heavily from Japan, South Korea, and Hong Kong. The art of drama has become a relic of the past, and traditional opera has been reduced to a caged bird singing only of romantic tales.\n\nThis situation cannot continue any longer! At the founding of our nation, we once possessed a flourishing red culture, where revolutionary romanticism was combined with realism that reflected everyday life. This produced numerous outstanding works such as the oil painting "Taking the Luding Bridge by Storm", the novel "The Red Flag", and "Red Crag", all of which were immensely popular among the masses. Unfortunately, with the advent of the Cultural Revolution and so-called "model operas", this cultural theory lost its footing and was relegated to the annals of history.\n\nHowever, now, the Party and the government are determined to reclaim the essence of socialist culture, and rebuild a culture that embodies both the red spirit and national character of our People's Republic. While we will continue to learn from advanced global forms of expression, the era where bourgeois liberals dominate the cultural field is gone forever!"
 china.346.a: "The red flag is like a sea, and the songs are like a tide."
 china.347.t: "New Common Development Era"
 china.347.d: "For a long time, many have believed that rising GDP figures automatically lead to improved living standards. However, history has shown that economic growth can disproportionately benefit vested interests while neglecting the broader public good. We are now taking action to change this trend, ensuring that the benefits of economic development are shared equitably.\n\nOur first priority is transforming private ownership in the real estate sector. The market has often been manipulated, turning housing into a tool for exploitation. Restrictions on land use, combined with high taxes, have pressured ordinary people to spend their savings just to secure a home. Moving forward, we will treat housing as a basic necessity, fully supported by the government. Initiatives such as public rental housing, affordable housing, and diverse public housing options will benefit thousands of families.\n\nAdditionally, we will re-collectivize industry and agriculture and reintroduce labor-management negotiation systems. We aim to establish vibrant, self-governing labor organizations with leaders elected directly by workers. These leaders will oversee operations and protect workers' rights, fostering a fulfilling life for everyone involved.\n\nWe will also focus on other critical areas, including educational equality, nuclear energy utilization, ecological protection, and market fairness. The future is full of opportunities, and we are ready to make our mark!"
 china.347.a: "March forward towards a beautiful future!"
 china.348.t: "Shift More Power to the NPC"
 china.348.d: "According to the relevant provisions of the Constitution of PRC, several specialized committees are established within the National People's Congress. These committees do not possess the attributes of a power body; instead, they are institutions tasked with specific duties under the leadership of the power body. This is considered significant evidence that the NPC's merely serves as a "rubber stamp." Furthermore, most members of these committees are former provincial and ministerial officials who have retired and lost their power, making their influence rather limited.\n\nHowever, recent developments in China's political landscape have once again captured the attention of observers and analysts worldwide. According to a spokesperson from the Central Propaganda Department, the State Council, as well as the National Supervisory Commission, have transferred some of their powers to the specialized committees of the NPC. These committees include the Supervisory and Judicial Committee, the Foreign Affairs Committee and the Finance and Economic Committee.\n\nAs the so-called highest state authority, this move is seen by some as a significant advancement in guiding political practice through the spirit of the Constitution. Nevertheless, there are concerns that this may lead to an excessive expansion of the NPC's powers, blurring the line between legislative and executive powers. Regardless, it appears that another layer of the veil over China's political black box has been lifted."
 china.348.a: "Remarkable effort."
 china.349.t: "Resisting Reform"
 china.349.d: "The cadre selection and appointment reform plan, decided by the central government, aimed to break the entrenched "factionalism" and "clique culture" in local Party committees. By implementing a more open and transparent selection mechanism, the plan intended to elevate genuinely virtuous and capable individuals to leadership positions.\n\nHowever, as soon as the reform was proposed, it caused significant unrest within various local Party committees. Some local Party leaders resisted, believing that the central government's move would weaken the power of Party committees and make local governments ineffective. They feared that the reform would restrict their authority and diminish their influence.\n\nFor Party committees in some remote regions, this cadre selection reform is seen as a direct assault on their interests. Yet, as the saying goes, "When the cat's away, the mice will play." Following Xi Jinping's downfall, factionalism in various local Party committees has worsened, making the implementation of reforms exceedingly difficult."
 china.349.a: "They outwardly comply but inwardly resist."
 china.350.t: "Question of Trade Unions"
 china.350.d: "Since 1949, the All-China Federation of Trade Unions has exerted unified leadership over local and industrial trade unions for many years. As a member of the "social organizations participating in the CPPCC", it is significantly influenced by government bureaucracy and is explicitly required by law to accept the leadership of the CPC.\n\nSince the reform and opening-up, the ACFTU has gradually lost its role as an association led by workers to represent and protect their legitimate interests. This decline culminated in 2018, when it was stripped of its control over various welfare institutions and industry associations, which it previously managed, and was forced to establish so-called "economic partnership" relationships with these entities. Furthermore, subordinate trade unions lack collective bargaining rights and are often led by senior corporate managers, reducing them to branches that primarily organize recreational and cultural activities within enterprises.\n\nOur new policy aims to alter this situation. Currently, two mainstream opinions. One advocates for completely lifting state control over trade union organizations, allowing the existence of non-state trade unions and other labor rights organizations. This, proponents argue, is the only way to truly protect workers' rights. The other one, considering the affair of social stability, supports the continued existence of state trade unions but calls for deep reforms. These reforms would restore the key powers of unions and expand their autonomy."
 china.350.a: "To become a true nation of workers, we must have the courage to reform."
 china.350.b: "Adhering to the state trade union is beneficial for the collective interests."
 china.351.t: "Liberals criticize Hu Chunhua"
 china.351.d: "As General Secretary Hu Chunhua's sweeping social reforms take full effect, the atmosphere of public discourse in China has noticeably shifted. From traditional media like newspapers, television, and radio to burgeoning internet platforms, most agree that the Party's reform policies have given the public more room to breathe freely. Unfortunately, not everyone shares this sentiment.\n\nA considerable number of intellectuals and prominent figures in China's cultural and economic spheres have long been critical of the Party and the government. This time is no different. Even within the somewhat more open environment provided by the state, some of these figures have made tentative, snide remarks, accusing Party leaders of having "no faith in democracy" and "lacking the courage for full openness." The comment sections of these discussions are filled with heated debates between supporters and detractors. On the whole, most people believe that this hard-won freedom should be cherished and not recklessly undermined by rash criticism.\n\nIn fact, some liberal-leaning figures within the government also feel that the current pace of reform is a bit slow. Hu's predecessors in the Communist Youth League have even suggested that Hu should "boldly carve out a new path." However, these discontented liberals may be overlooking something or perhaps fooling themselves. The Party's reforms are not intended to imitate the West but to forge a unique democratic path of its own."
 china.351.a: "The buzz continues..."
 china.352.t: "Support from the New Left"
 china.352.d: "The Party's propaganda machine roars to life, spreading the latest successes of Central Committee's dual push for political and economic reforms across the vast population of over a billion people. The conservative forces, still rooted in the Deng Xiaoping and Xi Jinping eras, grumble about the sweeping openness and transparency, while the fanciful voices of the liberal elite buzz with complaints that the government is hesitant and cautious with reform.\n\nLet them complain! General Secretary Hu Chunhua has found new allies among intellectuals and the general populace. Prominent scholars such as Wang Shaoguang, Hu Angang, Cui Zhiyuan, and Zhang Yibing have all voiced their firm support for Hu's reforms - whether through articles in major publications or interviews on television, they passionately outline their approval of the new direction.\n\nProfessor Wang Shaoguang of Hong Kong University emphasized that China's current reforms differ from the political changes influenced by Western bourgeois democratic systems in the 1980s. Instead, they draw inspiration from the concept of "civil society" in the West, but with a twist - China is building a "people's society" that is rooted in the nation's own context. The central actors in this "people's society" are the laboring masses across the country. This theory has gained widespread traction in society, bolstering the Party's confidence in pushing forward with reforms."
 china.352.a: "We stand on the shoulders of the people."
 china.353.t: "The First Chief Executive of the Taiwan SAR"
 china.353.d: "After the initial excitement of reclaiming Taiwan fades, the real challenge begins: governing the island. This task involves not only healing the scars of war but also demonstrating the superiority of the socialist system with Chinese characteristics over the Three Principles of the People. Only then will the discontented population fully embrace Beijing's governance and align with the People's Republic of China.\n\nThe selection of the leader for the SAR is a critical task and must be approached with care. This individual needs to be skilled in working with Beijing while also capable of managing the underlying tensions within Taiwan, ensuring that governance extends beyond just Taipei City. One candidate is Hung Chi-chang, a former leader of the New Tide faction within the DPP. When the Blue Sky with a White Sun flag was replaced by the Five-star Red Flag, Hung immediately aligned himself with the mainland government. The New Tide faction, known for its "mass line" approach, seeks to influence politics through social movements and external party activities. With a tightly-knit organizational structure and a focus on democratic centralism, the faction became known as a "party within a party" within the DPP. Hung played a key role in quickly establishing a provisional administrative body that effectively managed Taiwan's post-war recovery.\n\nAnother candidate is Tsai Eng-meng, the founder of Want Want Holdings Limited and a media mogul, who was once one of the wealthiest individuals on the island. Tsai has long been active in working to improve relations across the Taiwan Strait. Even during periods of heightened tensions, he openly supported the concept of "One Family Across the Strait" and opposed Taiwan separatism. Additionally, Tsai is known for his strong Chinese nationalism and cultural conservatism. While his views once attracted criticism from both the Taiwanese government and the public, today they have become key assets in his political career."
 china.353.a: "Appoint Hung."
 china.353.b: "Appoint Tsai."
 china.354.t: "The Fading Heart of Revolution"
 china.354.d: "As dusk approached, the setting sun slowly dipped toward the horizon, casting a warm orange glow over the Loess Plateau's hills. In the dim light of scattered lamps, a tranquil village nestled in the valley came into view, with dots of light flickering in the windows of farmhouses. The aroma of cooking and a thin trail of white smoke drifted up from the rooftops.\n\nUnlike a few decades ago, the path leading to the wheat fields on the other side of the valley was now flanked by lush shrubbery, likely the result of a decade-long environmental campaign. Along this newly refurbished path, a farmer wearing a straw hat leisurely guided his ox toward the village. The farmer was tall, and though his frame had thinned with age, glimpses of his former strength remained. Beneath the brim of his hat, his eyes, framed by the wrinkles of time, remained sharp and clear.\n\nAs he passed the office building of the village committee, the old farmer looked up as a habit. Glancing toward the artificial pond in the committee's backyard, he could vaguely make out a giant propaganda poster on a white wall. The poster depicted several rosy-cheeked, thick-browed, and robust farmers beaming as they clustered around a mysterious figure in a white shirt, holding a sheaf of wheat and a copy of Quotations from Chairman Mao. His face was obscured, and behind them, several red flags waved in the wind - an anachronistic relic of the revolutionary era now projected into the present day. The old farmer chuckled to himself. It seemed almost ridiculous that they even want to ruin a simple painting. But then again, this one wasn't much to begin with, so ruining it didn't matter.\n\nReaching the cowshed at the other end of the village, the old farmer led his ox inside and greeted the vet, who was squatting and puffing on a pipe. "Hey there, Mr. Liu!" he called.\n\n"Oh, you're here!" Mr. Liu stood up, tapped the ash from his pipe, wiped his hands on his knees. "I've been waiting for you. This is the best ox we've got here - can't let anything happen to it." He squinted at the old farmer. "You know, no offense, but you look really familiar. I feel like I used to see you every day, but I don't remember you living in any of the nearby villages."\n\nThe old farmer smiled gently, sidestepping the question."
 china.354.a: ""Really? You must be mistaken.""
 china.355.t: "Past Glory Flowing Away"
 china.355.d: "Shenzhen, a bustling center in southern China born from the reforms and opening-up policies, greeted a foggy day after a night of heavy rain. In a modest apartment within a residential building near the statue of Deng Xiaoping in Lianhua Mountain Park, a housekeeper was carefully taking a pot of perfectly simmered pork ribs and corn soup off the stove. As she inspected the fruits of her morning labor, she suddenly heard a furious shout from outside the kitchen door: "Why would they do this?! How could they?!"\n\nThe housekeeper silently rolled her eyes. Initially, she had been frightened by these outbursts, but by now, she had grown used to them. The tenant was an old, peculiar man, tall and vaguely familiar, though she could never quite place where she had seen him before. Every day before lunch, while reading the Shenzhen Special Zone Daily, the old man would invariably rant about the government and its policies for various reasons. Afterward, he would hastily eat his lunch, storm back to his bedroom, and lock himself in for the entire afternoon. Once, the housekeeper had tried to clean his room, but when she caught a glimpse of the walls covered with thumbtacks and photographs connected by strings, the old man had scolded her furiously, and she never dared to cross that threshold again.\n\nToday, however, the old man seemed more agitated than usual. "Look at this, just look at this!" he exclaimed, slapping the newspaper in his hand as the housekeeper set the soup on the dining table. "They actually want to liberalize religion! To separate religion from the Party's leadership! Where has their socialist ideology gone? Do they want to see cults spring up and ignite sectarian conflict in China?!"\n\n"What do the big shots' decisions have to do with us ordinary folks?" the housekeeper replied dismissively. She couldn't resist adding, "Besides, isn't everyone just interested in money these days? Who really believes in all that supernatural stuff anymore?"\n\n"You don't understand, you just don't understand... Ugh, talking to you is pointless!" the old man fumed, muttering "traitors," "two-faced," and "misjudged people" under his breath as he ladled himself a bowl of soup. With nothing more to say, the housekeeper simply shrugged."
 china.355.a: ""What a strange old man.""
 china.356.t: "Project SONG WENCONG"
 china.356.d: "When the cover was lifted, the Air Force officers assigned to inspect it were wide-eyed. What unfolded before their eyes was an unprecedented next-generation fighter jet, accompanied by a model of the J-20, in a companion flight formation. The J-20 itself is already quite large, but compared to the main attraction, it resembled a great white shark next to an orca, significantly dwarfed. The new fighter, jet-black and sleek, exuded an aura of both ferocity and elegance, evoking a sense of awe in all who beheld it.\n\n"Gentlemen, I hope our latest work meets your expectations!" the chief designer, standing by, grinned broadly.\n"You've certainly given us a big surprise, Comrade," the Director of the CMC Equipment Development Department said, gesturing toward the model. "I've read your report on the sixth-generation fighter; to be honest, I used to think I was reading a science fiction novel." This remark drew laughter from several officers present. "Can you guarantee that all the technological advancements listed in your report will be realized in this aircraft?"\n\nThe chief designer's confidence was evident in his words: "We are not building castles in the air, Comrade; this is the result of years of accumulated effort and a decade of meticulous work, while the American NGAD project has already stalled. With this plane, we will hold the defining power in next-generation aerial warfare."\nThe Director nodded in approval, while nearby, the Air Force Commander, unable to contain his excitement, was already circling the sixth-generation model with a group of staff officers, animatedly discussing details."
 china.356.a: "Let's try it!"
 china.356.b: "Perhaps not..."
 china.357.t: "Pakistan Asks for Help"
 china.357.d: "The bilateral relationship between Pakistan and China mimics that of the commensalism between remora and sharks. The symbiosis between our two nations has been vital in our mutual development. It was only with Pakistan's aid that we could have reopened our country to the world and most importantly ease the tension between us and the West and re-establish relations with the United States. As we grew, we returned this favour by providing Pakistan with crucial economic and military support to combat Indian aggression, which both of our nations face.\n\nWe were forced to watch as Indian nukes hit Pakistan. As millions of lives were wiped away in a flash of light. The bloodthirsty Indians once again proved themselves to be a barrier towards peace and prosperity within Asia. The venomous Hindutva flashes its fangs and its shadow spreads across the Asian continent. \n\nUnacceptable! All of this! The shame, the blame, and the pain! How much longer will we have to endure!? Shall we just let the Indian menace walk all over us and our friends!? Pakistan has requested our aid and it is our duty to help them. We shall guide them on their path to rebuilding their once beautiful and prosperous nation. The symbiosis shall continue, in one form or another."
 china.357.a: "We must help!"
 china.358.t: "Order in Pakistan Restored"
 china.358.d: "The red flag of August 1st and the green-and-white flag of Pakistan now fly side by side, a sight that has become increasingly common in recent days. Observers believe that the catastrophic consequences of the India-Pakistan nuclear conflict have been effectively contained under the supervision of the Chinese military.\n\nAmid the nuclear devastation, relief stations set up by the PLA and humanitarian aid bases marked with large red crosses stand as symbols of hope. Elders and children receive top-tier care, with every household provided with thick blankets and sufficient food to stave off hunger. Substantial resources continue to arrive from China via the China-Pakistan Economic Corridor.\n\n"Moving forward," stated a Chinese spokesperson, "China will continue to fulfill its international obligations. This includes reaching out to the remaining factions in Pakistan and establishing a stable interim government. Many have already responded positively to China's proposal.""
 china.358.a: "This is a silver lining in a dire situation."
 china.359.t: "Chinese Forces Enter Pakistan"
 china.359.d: "Following the devastating Indo-Pakistan war, which ended in a nuclear exchange and left Pakistan nearly a "geographical concept," its traditional ally, China, launched a large-scale humanitarian relief operation in Pakistan at the request of the Pakistani central government, as officially announced by the Chinese government.\n\n"As we speak," a Chinese spokesperson said, "the PLA rescue teams have crossed the China-Pakistan border and are systematically conducting relief operations."\n\n"Every soldier involved in this mission has signed a life-and-death agreement," stated the political commissar of the 76th Group Army at the China-Pakistan Friendship Highway border crossing, "Morale soared during the mobilization meeting when the troops learned they were going to assist our 'Iron Brother' Pakistan. It was a very moving scene." There is no doubt that this intervention provides a lifeline for the people of Pakistan, who are enduring hellish conditions."
 china.359.a: "For a friend, we would go through fire and water."
 china.360.t: "Thermonuclear Launches From China!"
 china.360.d: "Urgent Wartime Report\nCabinet Office Wartime Emergency Headquarters\nMultiple nuclear warheads have struck key strategic locations in Tokyo, Yokohama, Osaka, Nagoya, Fukuoka, and other major cities. The capital region has suffered severe damage, and the central government has relocated to an alternate command post to maintain the most basic level of command functions.\n\nThe remnants of the Self-Defense Forces are reorganizing. Although major naval port facilities have been hit hard, part of the fleet evacuated in advance and retains limited operational capability. At the same time, the nationwide early warning system indicates that the enemy may carry out a second wave of nuclear strikes. The Self-Defense Forces' early warning aircraft and remaining air defense units are scrambling to intercept any follow-up attacks.\n\nCurrently, the surviving vessels of the Maritime Self-Defense Force are on high alert. However, electromagnetic pulse effects from the nuclear explosions have severely disrupted our command and communications systems, making it difficult to coordinate with local units. An emergency communications network is being activated in an effort to restore basic command and control capabilities."
 china.360.a: "Fuck."
 china.360.b: "We can take revenge!"
 china.361.t: "Thermonuclear Bombing of Japan"
 china.361.d: "For the first time since the atomic bombings of Hiroshima and Nagasaki in 1945, Japan's homeland has once again been subjected to a nuclear attack. As the war reached a deadlock, China launched a large-scale nuclear strike against the Japanese islands, detonating multiple warheads throughout the archipelago. From Hokkaido to Kyushu, several major cities were hit almost simultaneously. Preliminary estimates suggest that the total yield of these strikes is dozens of times greater than that of the atomic bomb used on Hiroshima.\n\nThe nuclear explosions triggered electromagnetic pulses, resulting in nationwide communication blackouts. Damage assessments in various regions are still ongoing, but it is already clear that this nuclear attack has fundamentally shaken Japan's capacity to sustain itself as a nation."
 china.361.a: "Terrible."
 china.362.t: "People's Federation Reunifies China" #cw todo event
 china.362.d: ""
 china.362.a: "Interesting."
 china.363.t: "Chinese Interests in Afghanistan"
 china.363.d: "Dust storms rage, camel bells jingle, and Arabs wrapped in thick headscarves cast cold and suspicious glances at you. This is the stereotypical image many Chinese have of the people living west of the Taklamakan Desert and east of the Bosporus Strait. Unfortunately, Afghanistan lacks the magnificent sand seas and is instead dominated by barren, rocky mountains. The aroma of kebabs is overshadowed by the lingering scent of gunpowder smoke.\n\nJust a few steps away from Kabul's most renowned palaces and mosque complexes stands the Chinese Embassy. Three of China's highest-ranking diplomats in Afghanistan are gathered around a small round table. They occasionally exchange glances before looking down, intently studying a large-scale map of Afghanistan spread across the table.\n\nFinally, the ambassador breaks the silence, pushing the map toward the military attache and the political director seated across from him. "So, tell me, what do you see here?"\nAfter a brief pause, the military attache speaks first: "Strategic location, easy to defend, hard to attack... A major threat to our northwest, which could become a long-term problem."\nThe director adds, "The Taliban's rise to power has everyone on edge, barely one in ten overseas Chinese remain..."\n\n"You both see danger; but I see opportunity!" The ambassador points to several red-pencil-marked spots on the map. "Kabul International Airport is in dire need of repair; the poppy fields the Taliban destroyed remain untended; the Germans abandoned their copper mining projects halfway through... Look from Kunduz to Kandahar, such places are everywhere!" Eyes gleaming with ambition, the ambassador lifts his head from the map and continues enthusiastically, "The foolish Americans turned this place into a wasteland. We, however, will seize this opportunity to win over the stubborn Afghans, both politically and economically. For our future, and our motherland...""
 china.363.a: "It's time to get serious about it."
 china.364.t: "Economic Integration of Afghanistan Completed"
 china.364.d: "Since the dawn of the 21st century, China's economic growth has created a ripple effect, becoming a key force in shaping the dynamics of East Asia and even the world. This mighty red dragon, with its sweeping transformations, has nearly redefined the world economic order established by the neoliberal revolution and has never ceased its expansion. Today, the next destination of China's economic reach has been revealed.\n\nCrossing the Hindu Kush mountains, after more than 40 years of turmoil, order seems to be returning to the "graveyard of empires" - Afghanistan. The Taliban, now in their second stint in power, are seeking significant support to rebuild and reshape the nation. Naturally, despite substantial political differences, China and Afghanistan have drawn closer in economic terms.\n\nThe last missing pieces of the "Made in China" empire are being put in place once again. On the streets of Kabul, small vendors ride electric scooters manufactured in Zhejiang Province to start their day; Afghan soldiers on duty carry Xiaomi and Huawei phones in their pockets; a few war-scarred inns have reopened, displaying makeshift Chinese signs and offering Chinese menu items. Our ambassador, witnessing this scene in this impoverished, landlocked nation, reports back to the homeland with satisfaction, vividly describing all that is unfolding."
 china.364.a: "Business in the Chinese way."
 china.365.t: "Full Loyalty of the Afghanistan Government Established"
 china.365.d: "Many had feared that Afghanistan, once known only for its jihadists and poppies, would plunge back into chaos, especially with the infamous Taliban in power. The Chinese government also harbored doubts about engaging with an Islamic extremist regime that had fervently supported the East Turkestan separatist movement. However, thanks to the efforts of moderates from both China and Afghanistan, a collaborative platform may have been established.\n\nUnder the current leadership of Afghanistan's Supreme Leader, Hibatullah Akhundzada, the Taliban has managed to unify various factions that once engaged in internecine warfare. These groups are now governing the mountainous nation in a more stable manner. The jihadists appear to have shed their militant past - some donning clerical robes to serve in rural areas, while others have become central government officials in suits.\n\nThe prohibition of poppy cultivation, the revival of education with new curricula, and the deployment of diplomats to seek international recognition and stability have introduced a hopeful dimension to Afghanistan's potential transition to a normal state. Perhaps the continuous financial aid from Middle Eastern monarchies provides the material foundation for these changes. Nevertheless, Afghanistan will need an experienced mentor to guide its political reforms. Inevitably, China will play a more significant role in Afghanistan's future."
 china.365.a: "Big China's little friend."
 china.366.t: "Declaration of the Afghanistan-Pakistan Friendship Treaty"
 china.366.d: "As a key ally whose friendship with our country has been forged through blood and fire, Pakistan fears nothing more than the terrorism represented by the so-called "Tehrik-i-Taliban Pakistan" (TTP) within its borders. The founders of this organization claim to be inspired by their Afghan counterparts, drawing strength from the Pashtun settlements in northwestern Pakistan, wreaking havoc for over a decade despite repeated attempts by the Pakistani military to eradicate it.\n\nAlthough the Taliban government in Afghanistan has consistently denied any connection with the TTP, their visible ties have caused a sharp deterioration in relations between Pakistan and Afghanistan, with frequent military clashes erupting along the Durand Line border.\n\nThe TTP's longstanding support for the East Turkestan Movement and its threats to the China-Pakistan Economic Corridor have also deeply angered our government. However, recent developments have taken a promising turn. After establishing contact and reaching preliminary cooperation with Beijing, the now-mature Afghan Taliban government has decided to sever all ties with the TTP, paving the way for a softened stance from Pakistan. Meanwhile, with the mediation of Chinese diplomats, the Pakistani government has begun to shift its attitude. Eventually, representatives from both countries gathered in Islamabad to sign a historic declaration, normalizing bilateral relations and opening the door to future cooperation."
 china.366.a: "They finally made up."
 china.367.t: "Afghanistan Treaty with Russia"
 china.367.d: "When discussing which countries have caused the most harm to Afghanistan and inflicted the deepest destruction, aside from the United States, which spent two decades trying to defend its Western-style democratic puppet government with overwhelming military force, another key player is the Soviet Union. Set against the backdrop of the Cold War, this conflict allowed ideological enemies to infiltrate and exhaust Soviet resources, ultimately contributing to the empire's collapse. These historical entanglements continue to influence the relationship between Russia, the Soviet Union's successor, and the Taliban government in Afghanistan, leading to long-standing cool relations and even near armed conflict.\n\nAs a dominant power in Central Asia, Russia's historical ambitions in the region, along with the threat of Islamic extremism in Afghanistan, are significant sources of instability. To create the conditions for a new era of peace and prosperity, we must consider Russia's perspective in diplomatic talks with Afghanistan. Through internal dialogue, we have a chance to convince Russia of Afghanistan's neutrality and commitment to de-radicalization, while also ensuring that Russia abandons any plans for future military intervention in Afghanistan's internal affairs. Instead, our goal is to engage in joint economic cooperation and resource-sharing ventures."
 china.367.a: "It's all to ensure peace."
 china.368.t: "Afghanistan Treaty with China" #event for SOV
 china.368.d: "Afghanistan, once the Soviet Union's heartbreak and a source of trouble in Central Asia. When the Taliban last took control of Kabul, both the United States and Russia, as well as NATO and CSTO - two major rivals - put aside their differences and cooperated closely to combat the Afghan jihadists. However, much has changed since then. The American soldiers who once dominated Afghanistan have quietly withdrawn on C17 transport planes, replaced by the Taliban once again.\n\nAs we watch with anxious eyes the newly established Islamic Emirate of Afghanistan, China - now a new player in the Great Asian Game - has extended an olive branch, inviting us to engage with Afghanistan. According to our optimistic Chinese counterparts, Afghanistan's weak agriculture, along with its barely existent industry, offer countless opportunities for development and investment. With China's funding and personnel, coupled with Russia's technology and energy, Afghanistan's economic revival is all but assured, promising substantial returns in a short period.\n\nOf course, all this depends on Afghanistan's neutrality, de-radicalization, and the lifting of blockades imposed by surrounding great powers, including our own. While concerns about Afghanistan's security and business environment remain, and the country's genuine commitment to cooperation is still uncertain, proponents of this plan are optimistic that these challenges will be addressed through future collaboration."
 china.368.a: "New markets for our products? Sounds good."
 china.369.t: "Question of Corporate Freedoms in Afghanistan"
 china.369.d: "Currently, our enterprises are making significant progress in Afghanistan, rapidly capturing the market. However, discontent has begun to grow within various Afghan circles, gradually reaching the Chinese Embassy in Kabul and eventually leading to complaints on the ambassador's desk. While the pioneering spirit of our entrepreneurs is commendable, at times it translates into "recklessness" and "profit-driven motives," which has contributed to rising Sino-Afghan tensions. Complaints about Chinese merchants and employees excessively consuming, disrupting market prices and order, disrespecting Afghan culture and Islamic customs - particularly towards Afghan women - and frequently clashing with locals have led officials from both countries to scramble for solutions.\n\nMeanwhile, further concerns are being relayed from higher levels. The Taliban leadership is worried about the commercialism and secular influence brought by the Chinese, fearing it will subtly alter the values of Afghan citizens. Many young Afghans are drawn to China's prosperity, which could lead to a one-sided exodus and a permanent loss of population. In rural Afghanistan, where conservative views prevail, there is increasing fear and resentment towards the unrestrained commercial activities of the Chinese.\n\nUltimately, should we impose clear regulations and restrictions on the scope and freedom of Chinese investments in Afghanistan? The final decision will be..."
 china.369.a: "Our corporations will be freely doing business!"
 china.369.b: "Of course they will negotiate with the Afghanistan government..."
 china.370.t: "China-Afghanistan Treaty of Friendship and Cooperation"
 china.370.d: "As dusk fell, the lights of the Arg shone brightly, standing out in the newly constructed district of Kabul. Inside the banquet hall, glasses clinked and conversations mingled under golden chandeliers. Crystal glasses filled with various non-alcoholic beverages sparkled. A sumptuous array of dishes was spread across locally famous woolen carpets, featuring traditional Afghan kebabs and naan, alongside Beijing roast duck prepared by Chinese chefs. Diners sat on cushions, forming several small and large circles, creating a warm and friendly atmosphere.\n\nAs the banquet reached its peak, the Chinese Ambassador raised his crystal glass of grape juice in a toast to the Afghan Prime Minister. He declared, "I propose a toast to the recent signing of the China-Afghanistan Treaty of Friendship and Cooperation by our leaders! On behalf of the Chinese government, I also extend my gratitude to the Prime Minister for his significant contribution to the talks. May this treaty serve as the cornerstone of a new era in China-Afghanistan relations!"\n\nWith a beaming smile, the Prime Minister raised his glass and enthusiastically responded, "Our Supreme Leader has also asked me to thank Your Excellency! China is a great neighbor and ally, and we believe our cooperation and friendship will only deepen in the future!" Cheers and the clinking of glasses echoed through the banquet hall for quite some time.\n\nOfficials from both China and Afghanistan had ample reasons to celebrate. For China, the signing of the treaty opened access to a market of nearly 40 million people with vast potential. It also offered an opportunity to eliminate the remnants of the East Turkestan Islamic Movement, which had long plagued China's northwest region, while integrating Afghanistan into its EADI cooperation framework. For the Afghan Taliban, this marked a return to the international community after decades of turmoil. It also allowed Afghanistan to rely on the strength of a regional power, hoping one day to reclaim its former glory as the center of Asia."
 china.370.a: "More new friends!"
 china.371.t: "Afghanistan Cancels All Treaties"
 china.371.d: "The Kabul Arg, which has served as the residence of Afghanistan's highest rulers since the 19th century, has hosted countless politicians, celebrities, local warlords, military generals, and wealthy merchants. It has also witnessed many leaders exit the stage in disgrace, ending their struggles for power in ignominy.\n\nIn the meeting hall, adorned with colorful marble and glazed tiles, the Chinese ambassador was makingattempt to rekindle the hopes of the Afghans seated across from him. However, his efforts seemed destined to fail. The deterioration of Sino-Afghan relations was not a sudden occurrence. In the realms of politics, economics, and culture, the Chinese and Afghans appeared as incompatible as oil and water. It is difficult to determine whether the Afghans' stubbornness or the Chinese's perceived arrogance bore greater responsibility.\n\nThe Afghan Prime Minister interrupted the ambassador's further pleas with a gesture. The elderly man, his beard trembling with emotion, removed his glasses and sighed before speaking slowly, "Ambassador, we both know that the decision made by our supreme leader is final. Perhaps China's power cannot make your compatriots understand the pride and delicate dignity of the Afghan people. This land has witnessed the British, the Russians, and the Americans; Afghans have shed blood to drive them out of our homeland, and we also cannot hold fourteen billion people."\n\nHe put his glasses back on and stared intently at the ambassador. "We desire peace and a chance to survive, but we will not sacrifice our dignity to achieve that. You can take this message back to your President." With that, the Prime Minister rose from the sofa, and the remaining Afghans followed him out of the meeting hall in single file.\n\nThe ambassador remained seated, silently reflecting on the weight of the Prime Minister's words and the failure he felt. In just a few moments, all of China's painstaking efforts in Afghanistan over the years seemed to have crumbled. He was uncertain how to return home and report this outcome, or how to reconcile with the part of himself that had once tirelessly championed Sino-Afghan relations."
 china.371.a: "So many lost opportunities! So much wasted money..."
 china.372.t: "Kings of War"
 china.372.d: "If cannons were the queens of 19th-century warfare and tanks ruled the battlefields of the 20th century, then in the 21st century, drones are undoubtedly the new kings of war. After the Americans deployed drones in the Middle East and Afghanistan, drones became larger, more expensive, and equipped with the latest, most powerful weapons. However, sometimes, rather than those gigantic "dinosaurs," it is the smaller, often non-military "bees" that play a deadly role.\n\nWhen we Turning to the drones flying over the Dnieper River, it is striking to see that most of their parts are marked with the logo of a single company - DJI Innovations, headquartered in Shenzhen, China. Drones that once delivered packages are now dropping bombs on enemy soldiers, and drones that once captured stunning landscapes are now filming heavily guarded military bases, logistics warehouses, and marching troops.\n\nIn the past, criticisms of Chinese drones being "unsafe" or "leaking user data" were common. Now, accusations of "supporting Russian aggression" and "stealing intelligence" have surfaced. When people, whether out of curiosity or criticism, ask DJI's president about their products being used on Eastern European battlefields, he always begins by "decisions made by product users are unrelated to the company" and then he is "not interested" in the war happening thousands of miles away in Europe, all while maintaining an expression of innocence."
 china.372.a: ""Made in China" - more than washing machines and microwave ovens."
 china.373.t: "Ne Zha 2 Impact"
 china.373.d: "It seemed that Chinese cinema had long been absent from the international film scene. After the success of The Last Emperor, Infernal Affairs, and Crouching Tiger, Hidden Dragon, no Chinese film truly achieve world-class fame. However, a groundbreaking movie has shattered these stereotypes, and surprisingly, it is a 3D animated film.\n\nSeveral years after the modest success of its predecessor in 2019, Ne Zha: The Devil Child Comes to the Sea, created by the same team, hit theaters during the Chinese New Year period. This fantasy comedy, based on the well-known Chinese myth of Ne Zha the Crown Prince, quickly became a massive success both in terms of reputation and box office. Audiences were stunned by its advanced animation technology, lifelike characters, and the gripping, heart-pounding storyline. Additionally, the filmmakers boldly infused modern themes such as friendship, freedom, and rebellion into these ancient characters and stories, deepening the emotional resonance with viewers.\n\nPacked theaters demonstrated the film's high quality. Ne Zha 2 quickly surpassed numerous blockbusters to become the highest-grossing movie in mainland China. Like a stone thrown into a calm lake, it sparked a global frenzy among distributors eager to bring the film to their markets. From Singapore to Seattle, overseas Chinese communities gave Ne Zha 2 rave reviews. Unlike its predecessor, whose impact was mainly confined to the Chinese community, the sequel's reach expanded through social media platforms like TikTok and Xiaohongshu. Many people who initially knew little about Chinese mythology were drawn to the cinemas and ultimately became fans of Ne Zha.\n\nWhile some critics attributed the film's immense success to a surge in Chinese nationalist sentiment, Ne Zha 2 is widely regarded as a milestone in both Chinese and non-Hollywood cinema, showcasing the promising future of China's animation film industry."
 china.373.a: ""My Fate is in My Hands, Not in the Heavens""
 china.374.t: "The Dragon Remains Red"
 china.374.d: "Li Zuocheng sat alone in his study, eyes fixed on a map of China spread across the desk. The island of Taiwan was still marked in a different color - like a scar that would never heal.\n\nHe lit a cigarette. Blue-gray smoke curled upward beneath the dim light. Reality hung heavy in the air, like a hammer that had shattered a thousand illusions. The hardliners called for a return to Mao's glory days, waving red flags high - forgetting that history's wheel had long rolled past those fields. The reformists dreamed aloud of democracy, of utopias pulled from books, never expecting that their ideals would be trampled in the mud of public fury. Left or right, their failures were never accidents - this country is too vast, too complex for any single extreme to contain it.\n\nUnder the lamp, the island of Taiwan seemed almost to glow, harsh and unforgiving. He thought of the soldiers who had died. He thought of the promises left unfulfilled. The shadow of war still lingered. International condemnation blew like an icy wind, but the fractures within his own nation ran deeper still.\n\nLi exhaled slowly, eyes drifting from the map to the reports on his desk - pages filled with commentary from the public, from abroad, about him. But he didn't care. He didn't want to be a hero. He didn't want to be a tyrant. He was just a soldier, thrust to the crossroads of history, carrying the weight of an entire nation. Whether he liked it or not, time would not pause. Tomorrow, he would have to keep moving.\n\nLi Zuocheng stubbed out the cigarette and rose, leaving the study behind."
 china.374.a: "That night, he sat in long, silent thought."
 china.375.t: "Mao's True Heir"
 china.375.d: ""Why do I keep dreaming about you?"\nEven the heart of the Republic, ever-beating, finds moments of respite. Across from the endlessly illuminated Tiananmen Square, the marble-white Chairman Mao Memorial Hall Memorial Hall glows faintly. In the stillness of the night, it is here that a lonely soul seeks answers from the steadfast anchor of the Republic's founding memory.\n\n"Are you trying to tell me that I can't be a good leader? Ah, Chairman, I knew that long ago!"\nLi Zuocheng sat on a mahogany chair, staring blankly at the crystal coffin, surrounded by ever-blooming flowers and green cypress. The great leader had rested here peacefully for almost half a century. He recalled the days when he first became an honored soldier of the PLA, when portraits of Chairman Mao, the great helmsman, adorned every barracks. Back then, his greatest wish was simply to be a good soldier, and the Chairman's care was always there. Now, as the unquestioned leader of the Republic and its army, he had never felt so distant from Mao.\n\n"But what else can I do? Your legacy has been denied and trampled upon, and the people you cherished are in dire straits. I refuse to stand by and do nothing, which is why I have come this far!" By now, Li was pacing back and forth in the memorial hall.\n\n"I am not afraid of sacrificing myself. During the Long March and the War of Resistance, did you ever abandon the party's path for personal gain? No, I think not. Perhaps the party will still support me. After all, it is your party, and your party will not forsake the last hope of the revolution." Li's right hand gently rested on the coffin, his gaze fixed on the towering Tiananmen Gate, where another Chairman Mao watched over him.\n\n"I hope you will watch over me," Li whispered, "watch as I rebuild the party, rebuild this country, and avenge those who have harmed China. When I come to report to you and Marx, I only hope you will remember that, whatever sins I may have committed, it was all for you, your party, and the people." With that, the once bewildered old man transformed back into the resolute hero-general. He donned his cap, adorned with the red star of August 1st, and strode out of the memorial hall. His adjutant was waiting with a stack of orders for his signature - time waits for no one."
 china.375.a: "And thus, the moment to sound the enemy's death knell draws near."
 china.376.t: "Meeting"
 china.376.d: "The grand August 1st Building stands as the face and headquarters of the PLA. Countless officers, from lieutenants to generals, are summoned from across the nation to work tirelessly within this enormous edifice. Their efforts ultimately take shape as classified orders transmitted to group armies, fleets, airfields, and missile bases.\n\nIn the office of the Chairman of the CMC on the top floor, Li Zuocheng silently gazed at the two officers seated across the long table. Liu Zhenli, head of the Joint Staff Department - the brain of the PLA; and Wang Haijiang, commander of the Western Theater, which comprises nearly half of the PLA's ground forces and controls the majority of its land-based nuclear arsenal. The two men before him represented the most powerful "warlords." since the defeat on the Taiwan Island. More importantly, Li trusted these comrades who had fought alongside him on the frontlines in Vietnam.\n\n"Let's get straight to the point, the immediate priority is to heal the wounds on our nation and people," Li began bluntly. "Regarding the current distribution of power, I have no intention of making changes. I hope both of you will cooperate with me in restoring the central government's authority. China needs a strong government, far stronger than before. Achieving this will require the support of the PLA."\n\nAfter a moment of contemplation, Liu spoke first, "With all due respect, sir, considering the magnitude of this matter, shouldn't we consult Vice Chairman Zhang Youxia? He holds a special position within the military..."\n\nLi interrupted Liu with a wave of his hand. "I am aware that he has been a significant mentor to you, Comrade. You must remember that it is not the time to prioritize factional interests. Vice Chairman Zhang... he will remain in the military, but only as a figurehead. This arrangement benefits both him and the nation."\n\nLiu and Wang exchanged a quick, almost imperceptible glance before turning back to Li. In unison, they replied,"
 china.376.a: ""At your command, Chairman.""
 china.377.t: "Mao Zedong Thought Returns to Light"
 china.377.d: "For a considerable period, Li Zuocheng had refrained from moving into the heart of Beijing. Instead, out of caution and a desire to stabilize the situation, he had set up his temporary headquarters in the courtyard of the PLA General Command, located outside the city. Now, Zhongnanhai once again welcomed the arrival of the top leader's motorcade.\n\nAs he walked through the intricate pavilions and towers, flanked by a group of tense Central Office officials, Li seemed indifferent to the beauty of this former imperial garden. However, he lingered for a long time in the Chrysanthemum Library, which had been Mao's study and one of his most famous residences. The library has been preserved exactly as it was during Mao's time. Li could almost imagine the great man reading and reflecting in the dead of night, making decisions that would forever alter the course of Chinese history.\n\nLi did not come here without reason. Whenever he faced complex problems that his military mind couldn't resolve, he always turned to Mao for inspiration and guidance. The current situation was that, when Li tried to promote the core principles of Mao Zedong Thought within the PLA - such as military discipline, propaganda movements, and ideological unity - across the entire party, he encountered unimaginable resistance.\n\nFor the first time, he deeply realized that decades of market economy principles had quietly transformed every aspect of the party. Yet, abandoning the effort to unify the party would ultimately lead to the downfall of both himself and the nation.\n\nAfter pacing back and forth in the small room nearly a hundred times, the vague ideas in Li's mind began to take shape. For decades, the dual roles of military commander and political leader had led many accomplished generals to fall victim to the power struggles within the party, but for him, things would be much easier.\n\nUnder his command, civilian governments and party elites would naturally get what they wanted, while Li would remain focused on the PLA. Using his vision of ideal politics, intertwined with Mao's Thought, he would transform the PLA into the true revolutionary core, standing above both the party and the state."
 china.377.a: "Newer, Better... More Revolutionary."
 china.378.t: "End of the Weak Revolutionaries"
 china.378.d: "There comes a moment when every dream must end.\n\nDespite the midnight chimes having already sounded, Hu Chunhua remained in his office, engrossed in reviewing various reports and documents. He dared not sleep; even when he lay down, he couldn't find the peace to close his eyes. Whenever he was on the verge of falling asleep, the sudden sound of footsteps outside his door would jolt him awake. Since his security and service personnel had been replaced, he had lost all trust in those around him. Hu was convinced that his new guards would only stand idly by when his end finally came.\n\nTonight, he was more certain of it than ever before. Just look at him now: in his sixties, hair graying and balding, barely able to read any documents without his glasses. Perhaps soon, the only active part of his body - his brain - would cease to function. But then again, hardly anyone thought much anymore. The entire nation had become a military camp, its people no longer living beings, but merely bullets or bayonets. And the Party... oh, the Party that had nurtured him had decayed into a lifeless corpse. Li Zuocheng was on the brink of achieving total victory by dismantling everything built by those far greater than himself.\n\nNo, Hu couldn't let them succeed so easily. He pulled out a diary he had long prepared from his drawer. Perhaps one day, his writings would be made public, and people would read his story. However, when the pages lay spread out on the desk, he was horrified to find he could no longer write anything - his mind was blank. Even though his consciousness screamed at him, he lacked the strength to lift his pen.\n\nAnd so, when the formidable soldiers from the Central Guard Corps predictably opened the gates, when squads stormed the State Council and surrounded the place, and when they kicked open Hu's office door, they found an old man, completely devoid of will, sitting lifelessly at his desk with a blank diary in front of him.\n\n"Hu Chunhua, you are under arrest for treason," the lead captain declared arrogantly. There was no response. Two soldiers stepped forward and lifted him from his seat like a discarded shopping bag. Hu simply hung his head, as if his soul had already departed for another world."
 china.378.a: ""I thought it would be harder than this," the captain mused."
 china.379.t: "The Star of Reforms Has Faded"
 china.379.d: "Under the gloomy sky, gray waves washed over the barren beach of Beidaihe. Wang Yang strolled along the shore, his mood as somber as the view before him. The weather wasn't cold; it could even be considered pleasant. Yet, he couldn't shake off the bone-chilling cold beneath his black trench coat.\n\nEver since he was asked to move out of Zhongnanhai and leave Beijing, shadowy spies had been following him everywhere. No matter where he went, countless eyes were always watching. Cameras were aimed at every corner of his villa. Every piece of paper thrown into the trash was meticulously examined and pieced back together. The caretakers and housekeepers who came and went in the villa were constantly interrogated in great detail, or perhaps they were spies themselves.\n\nSometimes, Wang felt like turning around, finding those hiding in his shadow, and striking up a conversation with them. But every time, there was only silence behind him. This was his life now: his living standards were impeccable, but he wasn't allowed to speak, write, or attend any public events. Anything he produced was seen as poison by the authorities.\n\nIt was said that his name had been repeatedly criticized within the Party. He was now considered one of its top enemies. To Party members, his crimes might even surpass those of some notorious 'counter-revolutionaries' from the past. Wang grew tired and leaned against a rock by the shore to rest. He couldn't help but find it ridiculous to think that someone might be reporting his movements to an officer in Beijing, but he dared not show it.\n\nWhen the news of defeat on the Taiwan Island had shaken all of Beijing, he had hoped to be the one destined to save China. Even when Li Zuocheng came to power, he remained hopeful, believing the military would need a reliable official to manage civil affairs. So, when Xi's followers were swept out, he stayed silent. When the naive leftists were silenced, he stood by. Now, he himself had become their target, and there was no one left to speak up for him. Wang smiled bitterly inside, reluctantly admitting to himself:"
 china.379.a: "The China he once knew was long gone."
 china.380.t: "Historical Justice Restored"
 china.380.d: "Recently, the government released a batch of long-classified historical archives, shedding new light on the "September 13 Incident" and the case against Lin Biao. These documents reveal that Lin was, in fact, a victim of political persecution - framed by the ultra-left faction led by the "Gang of Four" in collusion with certain anti-Party elements within the leadership. The archives provide detailed records of the complex political struggle following the outbreak of the Cultural Revolution in 1966, the escalating tensions between Lin Biao and the Jiang Qing clique, and the gradual deterioration of the Mao - Lin relationship. Included are original analyses of the 1971 "Project 571 Outline" and minutes from Politburo meetings at the time, offering compelling evidence of political manipulation and judicial injustice behind the Lin Biao affair.\n\nThe files also emphasize Lin Biao's status as a founding Marshal of the People's Republic and Mao Zedong's once-designated successor. In the early years of the Cultural Revolution, Lin actively promoted Mao Zedong Thought and spearheaded political development within the military. However, after the purge of Liu Shaoqi, Deng Xiaoping, and others, a power struggle emerged. The ultra-left - liberal faction led by Jiang Qing attempted to seize greater control, but faced firm resistance from Lin Biao, Lin Liguo, Huang Yongsheng, Wu Faxian, and others. The resulting conflict became irreconcilable and turned hostile. In the end, Lin Biao was persecuted by the anti-Party group and deliberately eliminated - his legacy defamed.\n\nFollowing Lin Biao's official rehabilitation, tributes poured in across social media, as people from all walks of life expressed renewed respect for his historical contributions. Though a few dissenting voices briefly surfaced, they were swiftly drowned out by the overwhelming tide of public support and subsequently suppressed. Political commentators note that this move not only helps restore public trust in the People's Liberation Army but also serves as a powerful signal to both hardliners and reformists within the Party - reinforcing the authority and legitimacy of the current leadership."
 china.380.a: "Without the PLA, there would be no New China."
 china.381.t: "Status Quo Secured"
 china.381.d: "Sunlight fell across the vegetable bed. The soil was damp, but the mud gave off a gentle warmth. Li Zuocheng crouched at the edge of the field, loosening the earth stroke by stroke with a hoe. He wore a faded, washed-out military work uniform. In his own little courtyard, he preferred to keep that hint of wilderness.\n\nHe had once stood in high-level meetings, listening to the old guard - the well-connected, the long-entrenched - speak in circles, their words laced with a subtle contempt. Perhaps it was because he wasn't a princeling, not someone molded by the "system." He had climbed up on his own - from regional command to the military commission, from the frontier to the center. And those who had risen through favors, those family clans who treated the army like private business - he broke them all. Factional games, nepotistic promotions, hollow directives - he remembered them one by one, investigated them case by case, never showing mercy. If the country was to stop losing, the old diseases had to be cut out at the root.\n\nIt wasn't that they hadn't tried to fight back. Again and again, they filed "recommendation letters" after meetings, joined forces to draft "collective resolutions," leaked whispers outside the room - "Li Zuocheng is too hardline, unfit to lead the whole." Some even quietly floated the idea that if he kept pushing too hard, he might soon be "retired." But in the end, it was they who were sent away. The names at the meeting table changed, again and again. Only he remained - his seat growing ever more stable.\n\nNow, no one dared challenge him. There were no more factions in the Party, no more patronage in the army. If he said someone would rise, they did; if he said someone would go, they went. All of China now ran like a machine - emotionless, uncompromising, focused solely on goals and execution. Fatigue, hesitation, caution - he had pulled them all out by the root.\n\nHe looked up at the sky. It was a clear blue. The sunlight was just right. He stood, patted the mud off his pants, and reached over to pick a handful of scallions."
 china.381.a: "Winner Takes All."
 china.382.t: "Protecting China"
 china.382.d: ""Comrade, smoke? "Li Zuocheng stepped out the door and waved toward the soldier standing guard. The soldier didn't move - he simply saluted, expressionless Li gave a small smile and said nothing more. He turned back to the garden and rested his hoe beside the bed. He hadn't really meant to offer a cigarette - he just wanted to confirm whether he was still, in any real sense, a person.\n\nHis days passed like this: a stack of documents arrived in the morning - he signed them; someone came to report at noon - he nodded; in the afternoon, he might be asked to record a speech - he read the script as written. He no longer asked questions, and no one gave him the chance to. Every order still bore his name; every cover page carried the official red seal. But he knew - they weren't his decisions. Most of them he hadn't even read.\n\nHe used to believe he could remake the country. He had won before. He had cleared out factions, rooted out nepotism one round after another. But he underestimated the ambition of the generals. They didn't support him - they just needed him at the front. Once the army met no resistance, once they could move troops without approval, he - the "Chairman" - became a ceremonial figure. He sat in the highest seat, yet had no idea where the next war was, or where troops were being deployed.\n\nYes, the state had grown stronger - coldly, ruthlessly strong. But this wasn't the "discipline and order" he had envisioned. Officials stayed silent, cadres followed orders, and everything now revolved around the "collective decisions" of a few military men. He himself had become just "the hand that signs."\n\nHe crouched down and loosened the soil. A few pepper seedlings weren't doing well. He said nothing, simply pinched off the yellowing leaves with his nails. Sunlight touched his shoulder - soft and warm. He understood the reality. He was just tired. He no longer wanted to struggle. Sometimes, he wondered: one day, would they stop needing even his signature? Would only a hollow system remain, left to be steered in whatever direction they called "correct"?\n\nThe wind stirred. The guard at the gate had changed. A new young man stood there, just as silent. Li said nothing more. He lit a cigarette, crouched by the garden, and looked at the crooked rows of cabbage growing quietly in the dirt."
 china.382.a: "At the end of one's rope."
 china.383.t: "Army High Command Requests Additional Funding"
 china.383.d: "Our Army bears the critical responsibility of safeguarding the nation's land borders and maintaining national security and stability. However, with the international situation growing increasingly volatile, pressure on border security continues to mount. The Army's current force structure, equipment, and training resources are struggling to meet the evolving demands of the new strategic stage.\n\nRecently, a group of senior Army commanders jointly submitted a formal request to the Central Military Commission for additional funding. They reported that many units have yet to be equipped with modern gear, some grassroots companies face severe training budget shortfalls, and stockpiles of combat-readiness supplies remain inadequate - factors that are seriously hindering the enhancement of our operational capabilities. Particularly in the southwestern and northwestern strategic directions, where external infiltration and hostile provocations persist, there is an urgent need to reinforce border fortifications, expand reconnaissance infrastructure, and modernize heavy firepower systems."
 china.383.a: "Approved!"
 china.383.b: "We need further deliberations on this matter."
 china.384.t: "Navy High Command Requests Additional Funding"
 china.384.d: "We are in the midst of a historic transition - from land to sea, from near-shore defense to the deep blue. The ocean is not only a strategic buffer, but the vital artery of national rise. Today, as tensions intensify in the Western Pacific and maritime routes face growing disruption, the Navy's role as a pillar of national strategy has never been more prominent.\n\nRecently, several senior naval commanders jointly submitted an urgent funding request to the central leadership. The request highlights critical shortfalls in funding across key areas such as long-range deployments, island outpost support, fleet maintenance, and aircraft carrier operations. Numerous vessel overhaul projects have been delayed due to budget freezes, and the construction pace of new-generation warships is falling far short of expectations. Meanwhile, neighboring countries are accelerating their maritime build-up, placing mounting pressure on our forces."
 china.384.a: "Approved!"
 china.384.b: "We need further deliberations on this matter."
 china.385.t: "Air Force High Command Requests Funding"
 china.385.d: "Precision and speed in modern warfare are increasingly dependent on dominance in the wars in heaven  -  control of the air has become one of the most decisive factors in safeguarding national security. Recently, a detailed report from the Air Force High Command was submitted to the central government, formally requesting additional funding.\n\nAccording to the report, several critical shortcomings have been identified, particularly in areas like extended-range operations over open seas and joint coordination across operational theaters. Notable specific issues include the limited capacity to deploy modern Airborne Warning and Control System (AWACS) and Electronic Warfare (EW) aircraft at large scale, as well as aerial refueling squadrons and rapid reaction forces still operating without an integrated, structured system. Additionally, insufficient budget has bottlenecked the Air Force's ability to employ advanced flight simulators and increase ground maintenance personnel  -  both essential for sustaining a high level of pilot training and ensuring aircraft remain combat-ready at all times."
 china.385.a: "Approved."
 china.385.b: "We need further deliberations on this matter."
 china.386.t: "Xinjiang Leadership Change"
 china.386.d: "Recently, according to decisions made by central authorities, Ma Xingrui, the former Governor of the Guangdong Province, will succeed Chen Quanguo, a member of the Central Politburo, as the new Secretary of the Xinjiang Uygur Autonomous Region Party Committee, as well as the First Political Commissar and First Secretary of the Xinjiang Production and Construction Corps. During a welcome meeting, Chen, along with representatives from the Central Organization Department, introduced Ma to Xinjiang officials and encouraged them to continue their work under the new leadership, aiming for even greater success. Meanwhile, Chen will return to Beijing, where it was announced he will take on "another appointment".\n\nThis leadership change in Xinjiang, just ahead of the 20th National Congress of the Communist Party, has attracted significant attention. As the new top leader in Xinjiang, Ma is expected to be elected to the newly formed Politburo, positioning him among China's most powerful figures. There is also widespread interest in whether this aerospace engineer-turned-technocrat will change the controversial and stringent policies of his predecessor. These questions remain to be answered in the future."
 china.386.a: "New leadership, new direction."
 china.387.t: "Tibet Leadership Change"
 china.387.d: "Recently, according to decisions made by central authorities, Wang Junzheng, the former Deputy Secretary of the Xinjiang Uygur Autonomous Region Party Committee and Secretary of the Political and Legal Affairs Commission, will succeed Wu Yingjie as the new Secretary of the Tibet Autonomous Region Party Committee. During the handover meeting, Wu, along with representatives from the Central Organization Department, introduced Wang to the Tibetan officials and encouraged them to continue their work under the new leadership, striving for new achievements. Wu Yingjie, due to his age, will step back and is expected to take up a more leisurely role in the NPC or the CPPCC.\n\nThe replacement of Tibet's top leader is also part of the significant personnel reshuffle ahead of the 20th National Congress of the CPC. Wang, who has extensive experience working in border regions and is closely associated with the "iron-fisted governance" of Xinjiang that led to sanctions by the European Parliament, will now face the task of continuing the political legacy left by the native Tibetan, Wu. How Wang will navigate this transition remains to be seen."
 china.387.a: "New leadership, new direction."
 china.388.t: "Inner Mongolia Leadership Change"
 china.388.d: "Recently, according to decisions made by central authorities, Sun Shaocheng, the former Minister of Veterans Affairs of the State Council, will succeed Shi Taifeng as the Secretary of the Inner Mongolia Autonomous Region Party Committee. During the handover meeting, Shi, along with representatives from the Central Organization Department, introduced Sun to the Inner Mongolia officials and encouraged them to continue their work under the new leadership, striving for new achievements. Shi Taifeng will transition to the Chinese Academy of Social Sciences, where he will serve as President and Party Secretary.\n\nThe change in the top leadership of Inner Mongolia is also part of the significant personnel reshuffle ahead of the 20th National Congress of the CPC. As a seasoned technocrat who has held various positions, Sun is now stepping into Inner Mongolia, which has undergone policy rectification following Shi's firm anti-corruption measures and efforts to eradicate separatist ideologies. How Sun will utilize his skills to govern Inner Mongolia remains a question for the future to answer."
 china.388.a: "New leadership, new direction."
 china.389.t: "Ningxia Leadership Change"
 china.389.d: "Recently, according to decisions made by central authorities, Liang Yanshun, the former Executive Deputy Secretary of Working Committee of the Central and State Organs, will succeed Chen Run'er as the Secretary of the Ningxia Hui Autonomous Region Party Committee. During the handover meeting, Chen, along with representatives from the Central Organization Department, introduced Liang to the Ningxia officials and encouraged them to continue their work under the new leadership, striving for new achievements. Due to his age, Chen Run'er will step back and is expected to take up a more leisurely role in the NPC or the CPPCC.\n\nThe replacement of Ningxia's top leader is also part of the significant personnel reshuffle ahead of the 20th National Congress of the CPC. Liang, seen as a representative of local officials from the Party's ideological and scientific research departments, brings years of experience in organizational personnel and propaganda work. Whether his extensive background will enable him to smoothly succeed Chen Run'er and effectively govern Ningxia, known as the "Jiangnan of the North", remains to be seen."
 china.389.a: "New leadership, new direction."
 china.390.t: "Guangxi Leadership Change"
 china.390.d: "Recently, based on decisions from central authorities, Liu Ning, the former Governor of the Liaoning Province, will replace Lu Xinshe as the Secretary of the Guangxi Zhuang Autonomous Region Party Committee. During the handover meeting, Lu, along with representatives from the Central Organization Department, introduced Liu to the Guangxi officials and encouraged them to continue their work under the new leadership, aiming for new achievements. Lu Xinshe, due to his age, will step back and is expected to take up a more leisurely role in the NPC or the CPPCC.\n\nThe change in Guangxi's top leadership is also part of the highly-watched personnel reshuffle ahead of the 20th National Congress of the CPC. Liu Ning, widely recognized as an expert in water conservancy within the Party, has been involved in several major water projects, including the South-to-North Water Diversion Project. He has also managed urgent tasks such as earthquake relief and flood and drought control. How Liu will apply his expertise to govern this water-rich, southwestern minority autonomous region remains to be seen."
 china.390.a: "New leadership, new direction."
 china.391.t: "Results of Hong Kong Election Announced"
 china.391.d: "The highly anticipated election for the sixth Chief Executive of the Hong Kong Special Administrative Region has concluded. Following the turmoil of 2019 and the onset of the COVID-19 pandemic in 2020, this election was notably calm, with only one registered candidate: former Chief Secretary John Lee, who won with little suspense. As the first Chief Executive from the disciplined services since 1997, Lee's election marks the beginning of a new era for Hong Kong. Pro-establishment groups, who praise Lee for his background in the police force, believe he can help heal Hong Kong's social wounds. However, others fear that this signals the start of an era of authoritarian politics, inevitably aligning Hong Kong with the one-party rule framework of mainland China.\n\nDuring his campaign, John Lee emphasized pragmatic slogans, pledging to quickly lead Hong Kong out of economic recession and reconnect it with the global economy. The mainland Chinese authorities, through the State Council and the Liaison Office, have also expressed full support for his work. Whether Lee can fulfill his promises amid growing global chaos, and under the scrutiny of skeptical and distrustful observers, remains to be seen."
 china.391.a: "Hello, Our New CE!"
 china.392.t: "A New Reality"
 china.392.d: "Zhao Qidong stood on the top floor of the dormitory, leaning against the railing, smoking.The cigarette ember flared and faded, reflecting the distant city lights - no longer brilliant, but scattered patches of dim yellow.\n\nHe could see the armored vehicles lined up at a makeshift depot in the distance, their metal skins catching faint glints under the night sky. Further out, anti-aircraft radars rotated slowly. New checkpoints had been set up on the overpasses, where concrete walls, barbed wire, and heavy machine gun nests crisscrossed, carving the city into tightly controlled zones.Open grounds had been dug into deep pits filled with heavy blast shelters, and along the roadside, the entrances to underground tunnels - some poorly concealed - leaked cold, pale light through narrow cracks.\n\nZhao Qidong thought back to 2017, when he was still delivering food across the city.Back then, even at nine at night, the street stalls were still lit, traffic clogged every intersection, pedestrians bustled back and forth, noisy and full of life. Even on winter nights, people queued up at street corners, waiting for a bowl of hot noodle soup. Now, all of that was gone. The food stalls were cleared out, the shops closed, the streets widened - and emptied. The shouts of night markets had been replaced by the footsteps of patrolling sentries and the low hum of radars. Those who once thrived in the noise had either moved away - or became names drafted into the militia rolls.\n\nThe days of peace had lasted too long - and too much time had been wasted. They had once believed life could go on like that forever. But reality offers no second chances. The nation had to survive, and the city had to change with it. Beijing had turned, inch by inch, into a fortress. Every street, every block, every piece of land had a designated purpose. There were no spare corners. There were no spare people. Everything - including himself - had become a part of the city, just like the concrete walls and the air raid tunnels."
 china.392.a: "Wherever the wind blew, he would follow."
 china.393.t: "Completion of the PLA Pyramid Construction"
 china.393.d: "He sat on a military bus pulling out from Beijing's Third Ring Road. Outside the window, it was early morning. The streets were wide and empty, with only the occasional car flashing by. He had worked in the Intelligence Bureau of the Joint Staff Department for six years. The old office was near West Chang'an Avenue - one of those gray, aging government buildings with armed guards at the entrance and blinds perpetually drawn behind thick glass. He had once thought that was the farthest reach of power - until the Pyramid Project of the "Eternal Capital" began. South of Gaojiapo - long called "the wasteland" by locals - had once been flat, open land. Every spring, wild grass grew waist-high. Now, it had been flattened entirely, transformed into a core zone ringed by military vehicles, construction equipment, high walls, and deep trenches.\n\nAs the bus left the city, he caught a glimpse of the tip of the structure in the distance. At first, he thought it was a mountain. But the closer they drove, the clearer it became: this "mountain" had no natural curves. It was sharp, cold, and rigid - like a monolith carved straight from the earth. Only when he stepped off the bus did he fully grasp its scale. It was pyramid-shaped, but far more colossal than any pyramid imagined by humankind. Its gray concrete skin bore not a single decoration, only narrow black slits - like windows, though nothing could be seen behind them - cascading down tier by tier from top to base. They looked like something out of a bunker, gunports stretched into infinity.\n\nSomeone up front was delivering a loud welcome speech. He didn't hear a word of it. He simply looked up. The sky was fully bright now, but the building fractured the sunlight, filtering it through the slits so that it fell in shards - like even daylight needed to be screened before it reached the ground. Standing in that shadow, he felt a silence he couldn't quite describe. It wasn't fear. It was something deeper - a resignation he couldn't resist.Before this structure, he was nothing.\n\nHe remembered watching Blade Runner years ago - those towering buildings, rain falling from above, holographic ads drifting across the night. But here, there was no rain. No neon. No advertisements. Only this massive, silent object, standing still. He stood among the crowd, eyes drifting past the heads in front of him toward the entrance of the pyramid. Inside, there were countless people, countless screens, countless commands, But not a single familiar face."
 china.393.a: "World City."
 china.394.t: "National Mourning"
 china.394.d: "It was raining.\n\nIn Hangzhou, the rain fell like threads - fine, steady, but far from gentle. Wu Qi'an stood before the gravestone, his uniform half-soaked, mud splattered across the cuffs of his trousers, but he didn't care. He held a bag of spirit money and crouched beside a small fire pit. He didn't light the fire right away - just stared at it, as if hesitating, or perhaps waiting for someone who would never return.\n\nHe remembered the night before deployment. Xie had been grinning in the dorm, bragging that if they won this war, his parents would finally hold their heads high in the village, no longer looked down on by others. But he never imagined that the man who had said those words would be blown apart by a second round of shellfire from a reverse slope - killed while trying to save someone else.\n\nThe fire sparked to life, the wind making the flames hiss and crackle. Wu Qi'an watched as it slowly devoured the paper money, and with it, his memories. He remembered hearing again and again in the unit, "Our army has never been stronger," remembered the men in suits at press briefings declaring, "Victory is certain." And he believed it. They all believed it. They thought that if those people held the helm, they must know which way the wind was blowing.\n\nBut in the end, there was no victory - only death. And those who gave the orders? Still standing on stage, talking about "necessary sacrifices" and "temporary setbacks." Meanwhile, the so-called civilized nations laughed and toasted over their corpses, as if, in their eyes, the Chinese were meant to die on their knees - and to be celebrated for dying that way.\n\nWu Qi'an lowered his gaze and pulled out a photograph. He poured liquor into the flames, then threw in the photo and a pack of cigarettes. The fire roared, as if determined to burn away all the shame and pain of the past. He stood there for a moment longer, then turned and walked away. Behind him, the fire consumed the last warmth he had left - along with the name of Xie Yufei, a man who once only wanted to bring honor to his family - now buried beneath the cold rain."
 china.394.a: "The vengeance of a nation will never be forgotten."
 china.395.t: "New Policies, New Future"
 china.395.d: "Zhao Zhihan carried her lunch tray and found a seat by the window. Across from her sat Li Sijing, her most familiar desk mate. Neither of them started eating right away. Zhao lowered her voice and shared something she had just heard that day.\n\n"They've changed the military training program this year. The class leaders were told at this morning's meeting."Li Sijing was staring down at her food, but looked up at that. "Changed how?"\n\nZhao glanced around to make sure no one was paying attention, then said even more quietly, "They're switching to actual active-duty standards. Training hours will go late into the evening. Some classes will be replaced with first aid, basic engineering, and weapons disassembly."\n\nLi Sijing frowned. "Seriously? We're not soldiers. Why do we need to learn this crap?"\nZhao didn't respond, just continued, "Third-years will also do extra shooting drills and field survival. Summer break is going to be spent at out-of-town military districts. And when we're back, there'll be urban emergency mobilization exercises, and they count for our term grades. Seriously, what are these people thinking? Do they think we're action movie protagonists now?"\n\nLi Sijing kept eating in silence, saying nothing. Zhao picked up a piece of cabbage and swallowed it. Her voice was flat: "Apparently they also said that after high school, everyone gets automatically enlisted into the reserves. No more volunteering. And if you want to go to college, you have to serve a year first. It's insane."Li Sijing bit her chopsticks, then after a while mumbled, "So... will there still be student volunteer programs? Like the ones that used to send college students to rural schools to teach?"\n\nZhao thought for a second. "I guess from now on, volunteering means teaching them how to throw grenades and build bunkers.""
 china.395.a: "And as soon as she said it, even she had to laugh a little at how absurd it sounded."
 china.396.t: "Resolution on Certain Internal Party Issues"
 china.396.d: "The Central Committee of the Communist Party of China has recently issued a significant political document titled "Resolution on Certain Internal Party Issues." The full text was drafted by the Party's core leadership group and adopted following a special session of the Politburo.\n\nAccording to sources, the Resolution emphasizes that factionalism and separatist activities have become the greatest threats to the unity and stability of both the Party and the nation, constituting a grave betrayal of the people's interests. It denounces the so-called "ultra-left liberal faction" within the Party, which, under the guise of ideological purity, in fact pursues division and personal gain. These interest groups disregard the broader national interest, openly defy the authority of the Central Committee at a time of national peril, and seek to undermine the Party's centralized leadership - a blatant act of political treachery.\n\nThe document further stresses the need to guard against the convergence of factional interests with local protectionism, bureaucratic insularity, and military-civilian power fragmentation. It calls for the dismantling of intra-Party power cliques and the eradication of all personal ambition and group loyalties that disrupt the Central Committee's command structure and ideological unity.\n\nThe Resolution has sparked intense responses across the media, academic circles, and within the Party apparatus. State-run outlets were quick to publish commentaries praising the document for "restoring clarity and reinforcing unity." Meanwhile, many overseas observers have expressed concern, viewing the move as a sign of further political consolidation and the militarization of society. Nevertheless, from central ministries to grassroots Party committees, the overwhelming response has been one of support and obedience. Given the current complex internal and external situation and the nationwide mobilization posture, this Resolution is poised to serve as a foundational directive for future political alignment and organizational restructuring."
 china.396.a: "Closely unite under the leadership of Chairman Li Zuocheng!"
 china.397.t: "Enlisting Days"
 china.397.d: "On the day Xu Ji'nan, the second son of the Xu family, retired from the military, he wore an old camouflage uniform, carrying his luggage. He took the county bus, transferred once, and then walked another two li along the mountain road before finally returning to that tiny village in Leye County - long since forgotten on the edges of any map. The grain-drying yard at the village entrance was deserted, and even the chickens were nowhere to be seen.\n\nHe walked into the courtyard and saw his grandmother crouched in front of the stove picking through firewood, the skin on her hands wrinkled like old bark. Hearing someone step in, her hands trembled. She turned around and took a long moment before recognizing him. "Ji'nan... so you do remember how to come home?"He set down his bag and crouched to help her sort through the firewood.\n\n"Granny, where's my third brother?"His grandmother fell silent, then slowly spoke:"He's been gone a long while now. Didn't say much, just that he was heading to Baise City to find work. But later, someone from the military department came by. Said he passed the physical. Sent him straight to training."\n\n"Conscription?" Xu Ji'nan frowned. "He was only seventeen that year."\n\n"There were eight boys taken from the village that year. And more in the years after. Dribs and drabs... none of them ever came back."\n\n"They all joined the army?"\n\n"Some went willingly. Some were taken." The old woman sighed. "When the military trucks rolled in, the whole village came out to watch. Thought they were here to fix the road. But out stepped a few in camouflage, said 'the nation needs you,' and just took them."\n\n"What about the village now?"\n\n"What could be left?" she said, still fiddling with the firewood. "Go take a walk to the village head. There's a few old men still leaning on hoes to tend the fields. Crops still need to be delivered - no work, no rations. But which family still has anyone left? All gone with the trucks.""
 china.397.a: ""I wonder how they're doing these days...""
 china.398.t: "New Chengdu"
 china.398.d: "Morning mist coiled around the midsection of Mount Emei, veiling the long-abandoned factories and railway tracks in a vast stretch of white. Lin Xiao, a structural engineer assigned by the general contractor, had been transferred to this project zone less than a week ago. By the time he arrived, construction had already begun. Alongside the workers came expert teams and engineering units dispatched from major universities across the country, as well as a group of scientists from a central research institute.\n\nAt first, Lin Xiao only had a vague sense of what the project entailed - until he stood before the master design board for the first time. That's when he realized this was a project unlike any other: a massive subterranean urban complex, codenamed "The Third New Chengdu," designed to support survival, military production, medical infrastructure, and scientific research in a post-nuclear exchange environment. Lin Xiao's responsibility was the support system of the central structural axis. Every day, he led his team into the tunnels to inspect concrete casting quality and steel beam embedment tolerances.\n\nTheir engineering camp was situated along the mountainside - rows of white prefab units neatly arranged, each room equipped with a space heater and curtained hot-water showers. Meals were served on schedule, and the medical station was fully staffed. After dinner each night, Lin Xiao often sat by the edge of the work zone, gazing at the glowing entrance of the tunnel in the distance, lost in thought.\n\nDays passed, and the construction continued, pushing deeper into the mountain's core. Lin Xiao's life was filled edge to edge with task after task, yet he never once felt suffocated. As long as he remained here, he would stand before his blueprints - and build the city."
 china.398.a: "Prepare for war, prepare for famine, serve the people."
 china.399.t: "Model Soldier"
 china.399.d: "The PLA Daily is filled with reports and photos of him; films documenting his heroic performance in drills are distributed across war zones, army groups, and companies for millions of soldiers to watch and learn from. From CCTV to Dragon TV, countless documentaries are centered around him. Colonels and generals embrace him warmly, patting him on the back as if he were family. Ordinary people, from all walks of life, give him a thumbs-up, saying, "You really are a man!" as if they truly understand him...\n\nXu Jikang stood ramrod straight behind the door, dressed in his spotless new uniform. On the other side, he could faintly hear the chatter of reporters and the laughter of senior officers. He had thought about resting for a moment, but every time he closed his eyes, memories came rushing back like a tidal wave: the muddy, waterlogged training grounds; dark skies torn by thunder and flashes of lightning; instructors' fierce faces and merciless fists and kicks; and quiet sobs in the dorm late at night.\n\nTo avoid being overwhelmed by these memories, he forced himself to stay alert. He wasn't emotionless - but his naturally introverted, unexpressive nature made him poor at showing what he felt. That very trait, however, made him the ideal soldier in the eyes of the military: a quiet, tireless workhorse.\n\nEven when given the harshest assignments for the smallest allowances, even when his ribs were broken by instructors or he was humiliated by veterans, he endured it all. And despite everything, he still created miracles in training and drills. His grenades always flew the farthest. His marksmanship was unmatched. His fortifications were the strongest. The honors and awards he earned for his unit were always the most numerous.\n\nWho wouldn't admire a soldier like that? What commander or national leader wouldn't dream of an army full of men like him?\n\nFinally, the door slammed open with a loud "bang," and the blinding lights almost brought tears to Jikang's eyes. Amid the dazzling flashes of cameras, the smiling Commander-in-Chief emerged from the crowd, the golden stars on his shoulders gleaming. Like every superior, he smiled as he pinned the medal on Jikang's chest, shook his hand warmly, patted him on the back, and delivered the ever-unchanging words of praise."
 china.399.a: ""You're our pride.""
 
 china.400.t: "Breeding Ground of Reforms"
 china.400.d: ""The new semester has begun, and I'm delighted to see you all again."Gradually, the classroom quieted down, and all eyes turned to the podium. "Today, for our first lesson of the term, I want to talk to you about democracy."\n\n"Let's open our textbooks to page 12 and look at this passage: 'Democracy is a political system in which the people participate and make decisions. Its core lies in 'popular sovereignty', meaning the authority of the state is derived from the people, and the government exists to better serve and represent the interests of the people. In a democratic system, every citizen has the right to criticize and suggest policies to the government, fostering a diverse social discourse that encourages the government to improve its governance and ensure social fairness and justice"."\n\nThe teacher paused, looking at the students before him, and asked, "Do you know what true democracy is?"\n\nThe room fell silent. To students, the textbooks had never delved deeply into this subject before. Often, teachers didn't ask them for their opinions but simply outlined which would appear on exams. So now, when the old teacher asked, none of them could answer.\n\n"Democracy is not just a system, but a way of life, a set of values. It means respect, tolerance, equality, and freedom. It means that everyone has the right to pursue their own happiness, and that everyone has a responsibility to consider others."\n\nOne student raised their hand and asked, "Teacher, what would it be like if a family, like a country, practiced democracy?""
 china.400.a: "He was stunned for a moment, then burst out laughing."
 china.401.t: "Winter Turns To Spring"
 china.401.d: "Two years ago, Liu Zhengfeng was a well-known journalist, known for speaking out bravely and criticizing social injustices. An article he wrote exposing local government corruption brought him widespread acclaim-and a catastrophe that nearly destroyed him. His Weibo account was permanently banned, the article deleted, and Liu seemed to vanish from the internet as if he had never existed. He had considered appealing, considered resisting, but in the face of the powerful machinery of authority, Liu felt like an insect trapped in a spider's web-the more he struggled, the deeper he sank into despair.\n\nUntil today, Liu discovered that his Weibo account had unexpectedly been unbanned. No notification, no explanation-just as when he was banned, it happened abruptly and shrouded in mystery. Liu didn't know what it meant. Was he supposed to be grateful? Or were they setting him up to make the same mistake again? After hesitating for a long time, he finally mustered the courage to log in. The familiar interface now exuded a strange sense of detachment, as if it belonged to another lifetime. His followers were few, and all his previous traces had been wiped away, leaving only a blank void.\n\nHe opened the post editor. His fingers hovered above the keyboard, but he couldn't bring himself to type. After a long period of contemplation, he finally started tapping the keys. His unspoken thoughts slowly crystallized into words: "The night has given me dark eyes...""
 china.401.a: ""But I use them to seek the light.""
 china.402.t: "Unchained"
 china.402.d: "Zhong Chongtao glanced around the conference hall. For years, he had deftly maneuvered between the political and business worlds, weaving a complex web of connections. Being a delegate to the People's Congress was just one important node in this network, and the annual meetings of the Dongguan PC Standing Committee felt more like a formality. Everything had always been settled long before any official discussions. Yet, something about this year's session felt unusual. Seated diagonally behind Zhong was a newly elected young representative-Jiang Shiyuan. His idealism contrasted sharply with the weary expressions of the older delegates in the hall.\n\nThe meeting proceeded to the voting segment. The host on the podium read out the proposal:\n\n"...Regarding the Optimization of Dongguan's Business Environment Ordinance..."\n\n"All those in favor, please raise your hand."\n\nThe sound of hands rising in unison echoed through the hall. Despite the pre-arranged consensus to pass the proposal, Zhong-who owned a factory-knew this policy would only reduce his profits. Still, for appearances' sake, he reluctantly raised his hand. Glancing back, he noticed Jiang Shiyuan frowning at the document in his hand, his fingers tapping lightly on the table as if deep in thought.\n\n"All those opposed, please raise your hand."\n\nSilence.\n\nThen, slowly, Jiang raised his right hand. The hall erupted into chaos. Shock, confusion, disdain, and curiosity intermingled in the stares directed at Jiang.\n\nZhong was taken aback at first, but then a sense of satisfaction welled up within him."
 china.402.a: "It seems we'll have to go over it all again."
 china.403.t: "First Voting"
 china.403.d: "Zou Yubing made his way along the crowded sidewalk. Today was the mayoral election day in Taiyuan City. Slogans plastered along the streets and campaign messages blaring through speakers were a constant reminder of the day's significance-though none of it mattered to Zou. He only wanted to reach the nearest polling station, complete what he considered a meaningless ritual, and then head home to enjoy the noodles his wife would be cooking.\n\nStopping at an intersection, he glanced around aimlessly. Across the street, a group of elderly volunteers in red vests were eagerly handing out flyers to passersby.\n\nWhen the light turned green, Zou crossed the street quickly and arrived at the entrance to his residential area, where a makeshift polling station had been set up. A few tables were haphazardly joined together under a small tent, holding ballot boxes and voting slips. Several staff members sat behind the tables, their boredom palpable.\n\nZou approached the tent, pulled his ID card from his pocket, and handed it over to one of the workers. The worker barely glanced at it before asking, without even looking up, "Who are you voting for?"\n\nZou picked up a ballot and glanced at the candidate names-faces he had never seen before. Aside from their names and brief resumes, there was also a list of policy outlines, which was a new addition compared to past elections. He absentmindedly ticked a random name, then slipped the ballot into the box and turned to leave. The entire process felt like checking off a trivial chore.\n\nAs he stepped out of the polling station, Zou exhaled deeply, feeling a weight lift off his shoulders. He looked up at the gray sky, musing to himself. It didn't matter who won; these officials, whoever they were, only served their own interests. Why would any of them truly care about the lives of ordinary people?\n\nWith that thought lingering, Zou quickened his pace, heading home."
 china.403.a: "It seems most still haven't grasped the essence of democracy."
 china.404.t: "Media Thaw"
 china.404.d: "In the male dormitory of Henan University of Technology, Chen Fanwei suddenly sat up in bed, rubbing his sleepy eyes. The room was empty, and the bright sunlight streaming in reminded him it was already late.\n\n"Damn, overslept again!" he muttered, quickly grabbing his phone. It was 11:38. He remembered he had a Moral and Law class that morning.\n\n"Whatever, the professor's classes are boring anyway", he shrugged, trying to comfort himself. Opening a video app to relax with a few clips, he immediately froze.\n\nThe usual recommendations were different today-videos from creators blocked in China were now appearing in his feed. Content normally found only on platforms like YouTube was suddenly accessible.\n\nThen he saw a familiar face-Wang Zhian, a journalist he always watched on YouTube. Chen Fanwei gasped, his mind racing."
 china.404.a: ""Am I still in China?""
 china.405.t: "Back to 1989"
 china.405.d: "Beijing, Zhongshan Park. A candlelight vigil has transported people's minds back to 1989. Members of the "Tiananmen Mothers" movement, who have been under strict surveillance and banned from public activities for a long time, have reappeared. They held the first mainland commemoration of the June Fourth Incident victims in over thirty years, in the very heart of China, just a wall away from the Forbidden City and a stone's throw from the Chang'an Avenue where tanks once thundered by. The long-missing former professor Ding Zilin, delivered a speech, describing the evening as a milestone moment and expressing her belief that the future of China will see greater progress in recognizing the 1989 victims.\n\nWithout the tacit approval of the government, it would have been impossible for the movement to hold such an event. Although official newspapers, news channels, and social media platforms remained silent, videos of the candlelight vigil quickly spread through citizen-captured footage, causing a significant public stir. Various individuals voiced their opinions; self-proclaimed "patriotic" media harshly criticized the event, denouncing it as an ideological "self-destruction." However, a larger number of ordinary people expressed a tolerant and cautious support. Enough time has passed since the 1989 turmoil for several generations to grow up, and many believe that instead of continuing to avoid the topic, it would be better to address it with an open attitude, which might actually be the best way to resolve historical grievances."
 china.405.a: "Speaking of which, where is "Tank Man" now?"
 china.406.t: "Impending Government Collapse"
 china.406.d: "Assessment Report on the Current State of Beijing's Administrative Efficiency:\n\nRecent investigations indicate significant efficiency issues within Beijing's administrative framework. There are extensive overlaps in departmental responsibilities, resulting in fragmented oversight and frequent buck-passing. Even straightforward approval items can require shuttling between multiple agencies. On average, a medium-scale project must undergo reviews by more than seven departments, taking between three and six months to complete.\n\nDespite having a sizable staff, there is a shortage of capable personnel handling core tasks. Surveys show that over 30% of employees in frontline offices need to improve their job skills. Excessive energy is devoted to internal meetings and document circulation, leaving insufficient attention for direct public services. Information flow between different levels is inefficient, with instructions prone to distortion or misinterpretation as they pass through multiple layers.\n\nUnless the relocation of administrative departments proceeds in a timely manner, it will not only slow down construction efforts in Xiong'an New Area but also exacerbate Beijing's declining administrative efficiency, creating a vicious cycle: rising urban pressures further reduce efficiency, while low efficiency, in turn, hinders the relocation process. Once this situation takes hold, it will impede both the optimization of the capital's functions and the broader Beijing-Tianjin-Hebei integration strategy, with far-reaching negative impacts."
 china.406.a: "We need to deal with this issue as soon as possible..."
 china.407.t: "New System, New Policy"
 china.407.d: "Xinhua News, Guiyang (Reporter Jiang Qiaoling) - In recent years, with the rapid development of information technology, digital credit reporting systems have emerged as a novel regulatory tool, gradually entering the public sphere. These systems are playing an increasingly important role in assisting governments at all levels in monitoring expenditure data in real-time, enhancing fiscal transparency, and combating corruption. Traditional anti-corruption efforts often rely on whistleblowing and inspections, which are prone to delays and passivity. In contrast, digital credit reporting systems provide new approaches and tools for anti-corruption efforts.\n\nGuiyang City has established a citywide digital credit platform by integrating data from banking, tax, and business departments, covering all municipal government agencies and public enterprises. This platform collects and analyzes financial transaction data from relevant entities and individuals in real-time. When abnormal transactions are detected, the system automatically issues alerts, prompting disciplinary and supervisory authorities to intervene. In addition to being a powerful tool against corruption, the digital credit system is a critical means to enhance government credibility. The Guiyang government has incorporated all fiscal revenue and expenditure data into the platform and regularly discloses this information to the public. Through mobile apps and websites, citizens can access information on departmental budget execution and project fund usage, achieving "transparent finances."\n\n"Now the public can clearly see where government funds are going, so we, as financial managers, must exercise even greater caution", said Finance Bureau Director Guan Lu."
 china.407.a: "One step closer to a transparent government."
 china.408.t: "Cybersecurity in the New Era"
 china.408.d: "Southern Daily News (Reporter: Wang Zhaofu) - In recent years, with the rapid development of the internet, cybersecurity issues have become increasingly prominent, as incidents of online fraud and personal information leakage arise frequently, posing serious threats to citizens' financial security and legal rights. To effectively safeguard cybersecurity and protect citizens' personal information, China has been intensifying cybersecurity initiatives and advancing the development of a digital credit system, achieving notable results.\n\n"We are battling various cyberattacks every day", said Lin Xingchen, head of the Cybersecurity Data Center. "In recent years, we have continuously ramped up our monitoring and interception of cybersecurity threats such as phishing websites, malware, and network attacks, blocking millions of harmful messages daily and effectively curbing cybersecurity incidents." According to statistics, in just the first half of this year, the National Cybersecurity Data Center intercepted over 100,000 phishing websites and handled hundreds of thousands of cybersecurity incidents.\n\n"Thanks to the digital verification app, I didn't fall for the scam!" shared Ms. Wang from Panyu, Guangzhou, with the reporter. Recently, Ms. Wang received a call from an unknown number, where the caller claimed to be from the "public security bureau", alleging that she was involved in a money-laundering case and needed to transfer her bank funds to a "secure account" for investigation. "I panicked and almost believed them", Ms. Wang recalled. "Luckily, I had previously downloaded the new anti-fraud app, which helped me hang up immediately and connect to 110, saving me from financial loss.""
 china.408.a: "Have you downloaded the app?"
 china.409.t: "A New Page of History"
 china.409.d: "Wang Haidong leaned against a concrete wall, a Yuxi cigarette dangling from his lips - the last one for the month. Smoke rose slowly in the sunlight, merging with the mist that lingered over the distant skyline of high-rises. His gaze rested on the cranes casting long shadows in the morning light, resembling the skeletons of prehistoric beasts reassembling themselves into a futuristic city on this plain. He recalled the constructivist architecture and Vkhutemas designs he had studied in his university textbooks - those futuristic sketches that once mesmerized him. Perhaps in a few years, when visitors stand on this land and look up, they will witness designs far more breathtaking than those in the books.\n\nTwo days ago, he had received an invitation from his alma mater, asking him to return and share his experiences with younger students. He wanted to tell them that the future isn't just an abstract idea in books - it's built by the hands of every worker. Watching a building rise taller every day, knowing you played a part in its creation, brings a sense of fulfillment that no theory can compare to.\n\nTaking a final drag from his cigarette, Wang carefully stubbed it out in the corner of the wall. As he adjusted his faded safety helmet, a vision flashed through his mind: years from now, standing atop a skyscraper with his child, looking out over the city. He would point to a corner of the skyline and say, "Look, that building over there - that's the one your dad helped build."\n\nBy then, Xiong'an would be a city that amazes the world, a testament to the dreams and sweat of hundreds of thousands of builders like him."
 china.409.a: "They are the city's earliest residents and its most ordinary yet greatest creators."
 china.410.t: "Appeal of the Minister of Civil Affairs"
 china.410.d: "As part of implementing major central decisions and advancing the construction of Xiong'an New Area, Minister of Civil Affairs Tang Dengjie has published an important signed article. The article highlights that, as Beijing's functions continue to expand, the operational costs of government institutions have been rising, and administrative efficiency urgently needs improvement. According to relevant statistics, approximately 40% of administrative resources are currently consumed by internal institutional operations.\nIn response, the Central Committee held a special meeting to discuss the matter, with some members of the Standing Committee offering additional suggestions on the timeline for relocation. Subsequently, Xi issued an important directive, emphasizing the need to resolutely advance reforms and support Xiong'an New Area in taking on greater national responsibilities.\nIn line with the requirements of the new era, Minister Tang proposed relocating the majority of core government functions to Xiong'an. As a key pillar of the national strategic layout, Xiong'an covers a planned area of 2,000 square kilometers and is fully promoting digital governance innovations. It is expected that institutional streamlining in the area could reduce administrative staffing by 30%.\nThe results speak for themselves: Xiong'an's achievements in smart city development have been remarkable. In this green, low-carbon, and modernized city, the new governance system is set to establish a groundbreaking model of streamlined and efficient administration."
 china.410.a: "Resolutely Support the Deepening of Reform Initiatives."
 china.411.t: "Letter from the Minister of Housing and Urban-Rural Development"
 china.411.d: "To: Minister Tang,\n\nI have reviewed your proposal regarding the relocation of the capital to Xiong'an New Area as a means to alleviate Beijing's current administrative pressures. I fully agree with your suggestions and express my firm support.\nThe construction of Xiong'an New Area is a millennial vision and a matter of national significance. It represents a major historic and strategic decision made by the Party Central Committee with Chairman Xi at its core. Moving the capital to Xiong'an is a key measure to ease administrative pressures on Beijing, promote coordinated development in the Beijing-Tianjin-Hebei region, optimize the national development layout, and establish a model for high-quality development in the new era.\nTo further advance the construction of Xiong'an New Area, particularly in terms of financial investment, I would like to offer some additional suggestions. Since its establishment, the construction of Xiong'an has adhered to the principles of "global vision, international standards, Chinese characteristics, and high-level positioning," and has made remarkable progress. The basic infrastructure framework has taken shape, ecological quality continues to improve, iconic projects have been implemented, and the appearance of the new city is rapidly changing.\nHowever, compared to Beijing, Xiong'an is still in its early stages of development. To fulfill its historic mission, sustained financial investment is necessary, especially for large-scale strategic projects that require sufficient funding guarantees."
 china.411.a: "Ni Hong, Minister of Housing and Urban-Rural Development."
 china.412.t: "Xiong'an Construction Completion Ceremony"
 china.412.d: "Xi stood atop the grand viewing platform, gazing out at the gleaming, newly built city. In the morning light, the towers shimmered with the brilliance of modern technology. Just 20 minutes earlier, he had arrived quietly and swiftly by maglev train from Beijing, watching the scenery blur past the window, his heart filled with an unshakable sense of pride and anticipation.\nThis city carried immense expectations. He could still remember visiting this site over a decade ago when it was nothing more than barren land. Yet today, everything had been transformed. He gently placed his hand on the podium, recalling a stroll years ago by Yuyuantan Lake, where the inspiration to build a new area on this very land first struck him. What had been a mere idea then had now become a reality.\nBefore him sat representatives from all walks of life, their eyes filled with hope and anticipation. Xi took a deep breath and began his speech: "Today is a historic moment. 40 years ago, Shenzhen showed the world China's speed. Today, Xiong'an will showcase China's wisdom. This is not just a city - it is a symbol of the great rejuvenation of the Chinese nation. Here, we will create a new model for human civilization." The applause erupted like a tidal wave.\nHe looked around the gathering. This city embodied his years of aspirations: an efficient administrative system, an innovation-driven industrial framework, a low-carbon and intelligent urban design... Everyone present understood that today was not merely a completion ceremony but the beginning of a great new era.\nThe sunlight bathed this land of hope, where a millennial vision was taking flight. As Xi gazed at this city, the realization of the dream of national rejuvenation, his eyes were resolute and far-reaching."
 china.412.a: "Millennial Vision, National Prosperity."
 china.413.t: "Xiong'an Construction Completion Report"
 china.413.d: "Respected General Secretary,\nThe construction of Xiong'an has achieved major groundbreaking progress. The framework of the smart city is now fully established, and the Big Data Center enables comprehensive management of all urban functions. Xiong'an has become the world's first modern city to implement full-scale big data governance.\nUnder your wise leadership, Xiong'an has successfully absorbed 80% of Beijing's functions. The permanent population has reached 6 million, with over 30% consisting of scientific and technological professionals. Additionally, 90% of enterprises from Zhongguancun have set up headquarters and R&D centers in Xiong'an.\nIn terms of ecological development, the water quality of Baiyangdian Lake is now at its best in 50 years, and forest coverage has exceeded 45%. The smart energy network has reduced carbon emissions in the area by 66% compared to planned levels. Public facilities such as education and healthcare now provide universal coverage, and the residents' happiness index ranks among the highest in the nation.\n"Xiong'an Model" has become a benchmark for innovative urban governance. By integrating departmental functions through the big data platform, institutional streamlining has reduced staffing by 30% and administrative costs by 50%. This successful experience is now being promoted nationwide.\nThese accomplishments are a testament to the correctness and foresight of your "Millennial Vision" strategy."
 china.413.a: "Zhang Guohua, Director of the Xiong'an New Area Management Committee."
 china.414.t: "Bureaucracy Moving Completion Report"
 china.414.d: "Respected Chairman Xi,\nI am pleased to report that the full-scale relocation of central government agencies has been successfully completed. After years of preparation, over 81% of ministries and commissions have moved into Xiong'an, with the remaining departments finalizing their transitions. The new administrative center adopts a streamlined governance model, with institutional structures reduced by 29% compared to the original framework.\nDuring the relocation process, we strictly implemented the "Four Transformations" you proposed: transitioning from hierarchical management to flat governance, from scattered offices to centralized operations, from traditional paperwork to smart office systems, and from single-function departments to multifunctional ones. Notably, the introduction of smart office systems has doubled approval efficiency.\nAligned with the principle of ecological priority, the New Area features cultural facilities such as academies and art galleries. The Guanyuan Garden on the shores of Baiyangdian has become an important space for cadres to rest and reflect. Additionally, over 2,000 SOEs and public institutions have settled into supporting industrial parks.\nAlongside the institutional relocation, the original industries and personnel have transitioned smoothly. This endeavor has not merely been a physical move but a comprehensive reform of governance models."
 china.414.a: "Zheng Shanjie, Director of the National Development and Reform Commission"
 china.415.t: "China's Historic Capital Relocation to Xiong'an"
 china.415.d: "Under global attention, China has completed an ambitious historic project: relocating its capital to Xiong'an. After more than a decade of construction, Xiong'an has emerged as a breathtaking example of modern urban development.\n\nThe new capital employs a streamlined governance model, significantly enhancing administrative efficiency through big data technologies. Notably, this new city incorporates numerous innovative concepts in its planning and construction. From green low-carbon initiatives to smart city technologies, from cultural preservation to technological innovation, Xiong'an is writing a new chapter in human urban development. The Guanyuan Garden by Baiyangdian Lake, dubbed the "Oriental Versailles," showcases its unique cultural charm.\n\nInternational media has hailed this relocation as "a landmark project marking a nation's stride into a new era." It not only demonstrates China's infrastructure capabilities but also reflects the far-reaching vision of this Eastern power's leadership for the future"
 china.415.a: "Rise of a New Capital - Power Shift in the East."
 china.416.t: "Investigation Report on Bureaucratic Capital Exploiting State Assets"
 china.416.d: "State Administration for Market Regulation\n\nTo: Political Bureau of CPC Central Committee\n\nRoutine monitoring and data analysis of the enterprise information disclosure system have revealed that some businesspersons with bureaucratic ties exploit power and family connections. Through complex equity maneuvers and affiliated transactions, they have expropriated vast state assets, severely undermining national interests and social equity. A special investigation has been conducted, with the following findings:\n\n1.Certain local government officials exploit their positions to favor specific enterprises in land transactions, project approvals, and tax reductions. Some directly intervene in the restructuring of state-owned enterprises, transferring state assets at undervalued prices to related entities.\n\n2.Significant affiliated transactions exist between state-owned enterprises and private companies tied to bureaucratic figures. Through inflated costs and suppressed prices, state assets are funneled into private hands.\n\n3.Entrepreneurs with bureaucratic connections leverage family networks to monopolize industry resources and amass enormous profits."
 china.416.a: "Unchecked economy will erodes governance."
 china.417.t: "Investigation Report on Bureaucratic Capital Exploiting State Assets"
 china.417.d: "Since its launch in 2016, the Liuzhou Rail Transit Project has made slow progress and has yet to commence operations. Recently, an entrepreneur from Guangxi expressed interest in injecting capital into the project to revitalize it.\n\nIt is reported that this entrepreneur has strong connections in both political and business circles locally, with family members holding key positions in government departments. Leveraging excellent communication skills and extensive social networks, the entrepreneur quickly won the favor of the evaluation committee."
 china.417.a: "Approved."
 china.417.b: "Don't waste money on this."
 china.418.t: "Entrepreneurs Seek to Invest in Tianjin"
 china.418.d: "The Goldin Finance 117, also known as the Tianjin Goldin 117 Tower, is located in Xiqing District, Tianjin, China. With a structural height of 597 meters, it is the second tallest structure in the world after the Burj Khalifa and the tallest structure in China. However, since 2015, the project has faced repeated halts due to funding shortages, caused by the stock crash of its main investor, Goldin Group. Recently, an entrepreneur from Tianjin expressed interest in injecting capital to revive the project.\n\nIt is reported that this entrepreneur has strong ties in both political and business circles locally, with family members holding key positions in government and military institutions. Their excellent communication skills and extensive social connections have earned the trust of the evaluation committee."
 china.418.a: "Approved."
 china.418.b: "Don't waste money on this."
 china.419.t: "Entrepreneurs Seek to Invest in Chengdu"
 china.419.d: "The Shu Peak 468 is the core building of the Greenland 468 Project, developed by Greenland Group in Chengdu's Jinjiang District. With a planned height of 468 meters, it was originally intended to be the tallest building in Chengdu. The groundbreaking ceremony was held in late July 2012, and while the residential and commercial podium sections have been completed, the core tower has seen slow progress, frequently stalling despite announcements of resumed construction. Recently, an entrepreneur from Chengdu expressed interest in investing in the project to inject new energy.\n\nIt is reported that this entrepreneur has strong connections in both political and business circles locally, with family members holding key positions in government. Leveraging excellent communication skills and extensive social networks, the entrepreneur quickly won the favor of the evaluation committee."
 china.419.a: "Approved."
 china.419.b: "Don't waste money on this."
 china.420.t: "Entrepreneurs Seek to Invest in Ordos"
 china.420.d: "Since the establishment of the Ordos-Jiangsu Industrial Park in 2012, approximately 1.7 billion yuan has been invested in land reserves, infrastructure, and other developments, covering an area of 8 square kilometers, which is now ready for occupancy. However, the park has only attracted 11 enterprises, three of which have since ceased production. The initial plan involved cooperation between Jiangsu and Inner Mongolia, with Jiangsu introducing industrial transfer projects and Inner Mongolia offering coal resources and building ultra-high voltage power transmission channels in return. However, due to a weak coal market, progress on these projects stalled after 2013. Recently, an entrepreneur from Suzhou expressed interest in revitalizing the park with new investment.\n\nIt is reported that this entrepreneur has strong connections in both political and business circles in Jiangsu and Inner Mongolia, with family members holding key positions in government departments. Leveraging excellent communication skills and extensive social networks, the entrepreneur quickly won the favor of the evaluation committee."
 china.420.a: "Approved."
 china.420.b: "Don't waste money on this."
 china.421.t: "Entrepreneurs Seek to Invest in Tangshan"
 china.421.d: "Located on the western side of Bohai Bay, under the jurisdiction of Tangshan, a major economic city in Hebei Province, the Caofeidian Industrial Zone spans 380 square kilometers. Since its development began in 2003, the project has reclaimed over 230 square kilometers of land from the sea, with a total investment of more than 300 billion yuan. At its peak, it was called "China's largest single construction site" and a national circular economy demonstration zone. However, the envisioned four pillar industries failed to materialize, and the massive initial investment in infrastructure has led to a debt repayment crisis. Recently, an entrepreneur from Beijing expressed interest in investing in the project to bring it back to life.\n\nIt is reported that this entrepreneur has strong connections in both political and business circles locally, with family members holding key positions in government departments. Leveraging excellent communication skills and extensive social networks, the entrepreneur quickly won the favor of the evaluation committee."
 china.421.a: "Approved."
 china.421.b: "Don't waste money on this."
 china.422.t: "Claiming What's Due"
 china.422.d: "It was already four in the afternoon when Old Zhang dragged his tired feet into the Labor Bureau. Clutching his 5-month-old pay stub, he wondered where he'd be shuffled off to this time.\n\nSince "the incident," 5 months' wages had vanished like smoke. Previously at the Labor Inspection Team, the uniformed officials would barely acknowledge him. "For your case, first mediation, then arbitration, then lawsuit," they'd say without looking up. "The process takes at least half a year." But today was different.\n\nReception quickly led him to the mediation room. "Please, have a seat." The new young official took out a notebook, recording everything carefully. "Policies have changed. We'll handle this immediately." He picked up the phone and called the contractor directly. Zhang was stunned - last year when his coworker Li tried to claim wages, things weren't like this at all.\n\n"The contractor says he has no money, what can we do?" - Zhang said softly. The young official studied the documents intently: "Don't worry, sir. Wages are earned with workers' sweat and blood - no excuse for withholding them." Three days later, all back pay was settled. Word was the new bureau chief had stayed up late pressuring the boss, saying something about "0 tolerance under new regulations." Zhang's hands trembled as he received the money.\n\nThings are much better now," Li from the neighboring construction site remarked. "Heard they replaced the leadership - all those arrogant labor officials got transferred." Zhang said nothing, just staring at the wages in his hands. He remembered last year when his coworkers couldn't even get through the front door.\n\n"Things have changed, really changed," Old Zhang murmured to himself. The sky the same, the earth the same, but something was different now."
 china.422.a: "Though justice sleeps, it never dies."
 china.423.t: "At Last, Our Day Has Come!"
 china.423.d: "Zhang Hongliang sat at his desk, writing a new article for his WeChat channel.\n\n"Comrades!" he wrote, "The Chinese nation has finally reached this day! Look at these months - how many parasites have been cleared out, how many heroes have risen up. Where are those arrogant compradors hiding now?" His hands trembled with excitement. "Working class leadership is no longer empty talk, new cooperatives have lifted peasants to their feet. This is the triumph of Sinic civilization!"\n\n"I visited my hometown recently," he continued. "The peasants said: cadres have really changed, no more bureaucratic airs. Isn't this the victory of the mass line? Those traitors who sold out our country will be swept into the dustbin of history!"\n\n"Some call me radical," he paused. "But history proves only radicalism can save China. Was QinShiHuang radical when he unified China? Was Li Zicheng radical in his uprising? This is the awakening of our nation's warrior spirit! Every new policy now shines with our ancestors' heroic spirit"\n\nThrough his window, the street banner "People Are Masters" stood out boldly. The factory union had a new leader, a young worker who installed height limiters on the boss's luxury car parking spot. "Excellent!" Zhang wrote on social media, "This is our tradition - heroes standing up for the people."\n\nSleep eluded Zhang. At 1 AM, he finally finished his article titled "The Age of Heroes Shall Return." Tears gleamed in his eyes. After so many years, he had finally seen this day."
 china.423.a: "Ancient glory rises anew."
 china.424.t: "An Old Scholar's Joy"
 china.424.d: "Fred Engst sat before his computer, eyes moistening as he read the latest policy announcement. The changes in recent months had been tremendous. The amended Labor Law passed, the Trade Union Law revised - workers finally had a real voice. Recalling his experiences in American and Chinese factories, he couldn't help but whisper: "Finally... finally..."\n\nComments flooded his Bilibili livestream. "Teacher Yang, our factory just established a Workers' Oversight Committee!" "Professor, our university is actually implementing the new policies!" These messages brought back memories of his childhood at Caotan Farm and his years as a worker at Beijing.\n\n"When I was a worker in America, I never imagined this day would come," he said to the camera. "Just recently we were lamenting how difficult it was for migrant workers to get paid. But look now - things are really improving." He ended the stream and gazed out at the University of International Business and Economics campus. Students were engaged in passionate discussions outside the teaching building, reminding him of the great debates of his youth - how truth emerges through discussion.\n\nThat evening, he received a message from a factory colleague: the technical experts had joined the management committee, and collective wage negotiation was being implemented. His friend said it felt like the old days, but more scientific. "The creativity of the masses is limitless," he wrote back. "When the line is correct, people's wisdom will flourish."\n\nFred set down his phone with a long, satisfied sigh. He knew this wasn't the end, but a new beginning. History hadn't strayed from its path, and the people hadn't been forgotten."
 china.424.a: "Though tides may turn, our path stays true."
 china.425.t: "Street Corner Chronicles"
 china.425.d: "Mr. Li, a local civil servant at the neighborhood office, has been swamped with work lately. Since the new policy took effect, his desk has been piled high with various society registration applications.\n\n"Here's our Workers' Reading Group charter," a young man in a safety helmet hands over documents. At the next window, university students discuss their New La Jeunesse Society. Li skims through the papers - mostly mainstream Marxist-Leninist study groups. New La Jeunesse, Worker-Peasant Cultural Association - these are normal. But some fringe groups make him chuckle: the "LXXSD Alliance" claiming they'll translate Pentagon UFO files into Chinese; an student group called "Nomadic Poetry Society" proposing to transform society through French philosophy; and a "Serica Classics Society" filling their application with bizarre theories mixing ancient mythology with class struggle.\n\n"We can't approve these, can we?" Young Zhang, the new staff, worries. Li smiles and shakes his head: "Why not? As long as it's legal. Let the youth be youth."\n\nDownstairs, workers rehearse a play while students prepare for a reading group. In the corner cafe, some alternative-looking students discuss Laclau and radical identity theory. Further away at the cultural center, a debate on social justice is in full swing.\n\n"How much better this is than the dead silence before," Li sighs. "Let them discuss, let them practice, let them make mistakes. This is what youth should be."\n\nHe sips his tea and stamps approval on the final application."
 china.425.a: "Voices now spring, like birds on wing."
 china.426.t: "Story Behind the Amnesty Announcement"
 china.426.d: "Following the latest policy adjustments, the Central Amnesty Committee released a proclamation granting pardons to a group of historical defendants. According to the announcement, activists who fought for social justice and workers' rights would be released in phases and have their political rights restored. The news sparked intense discussion across social media.\n\nAt the press conference, the Committee spokesperson stated: "After careful consideration, we've decided to reevaluate this period of history."\n\nSubsequently, the Supreme Court announced a review of relevant detainees. The first batch of releases included leftists who had opposed official profiteering and privatization. When they walked out of prison, their hair had turned grey.\n\n"After all these years, the day has finally come," said one released individual in an interview. Reports indicate they will be assigned to universities and think tanks to participate in policy research.\n\nThat evening, some released leftists held a symposium. They discussed the recent changes: union reforms, enterprise democratization, and increased mass participation. Everything seemed to be developing in the direction they once pursued.\n\nRelevant authorities have established a special working group to comprehensively review historical issues based on seeking truth from facts. Regarding cases of different nature, the Committee indicated they would be addressed in the next phase."
 china.426.a: "Only those who stood with workers & peasants can be return."
 china.426.b: "Forgiveness marks the beginning of a new era."
 china.427.t: "The Return"
 china.427.d: "When the gates of Shenzhen Prison creaked open, Yu stepped out to find a crowd waiting - his old workmates, some college kids, and a bunch of people in factory gear he didn't recognize.\n\n"Welcome back, comrade!" The crowd burst into applause. Yu froze - talk about dejà vu. Years back, they'd stood just like this outside the factory, fighting for their right to unionize. Except back then, they got beaten up instead of applause.\n\nJasicTech? That's "People's Machinery" now. Workers actually sit on the board, while those high-and-mighty Taiwanese bosses? They ran with their cash, but their assets are locked up tight in Mainland China now.\n\n"Your record's been cleared," the young clerk handed him some papers. "Factory job's yours if you want it. Hell, you could even run for union leadership."\n\nWalking around was like entering another dimension. No more sneaking around with flyers - now there's a freaking innovation showcase. Instead of punishment rules, the walls had collective bargaining notes. Old Liu told him how workers got AC in their dorms now, proper 8-hour days, and overtime? Gotta sign for that stuff.\n\n"Different times, eh?" someone said. No kidding. Watching the workers in their shop, Yu finally cracked a smile."
 china.427.a: "Workers are forever, bosses are temporary."
 china.428.t: "Generation Gap"
 china.428.d: "Old Hua sat in his rattan chair, reading a newspaper with a bold headline: "8 Allied Parties Officially Join Decision-Making Circle." His brow furrowed as his eyes lingered on words like "decision-making power" and "democratic forms."\n\nHis grandson Xiaoming's packing up, like, "Grandpa, heading to Philosophy Club - got this prof talking about Lukács today. Then I've got this Rainbow House meeting tonight."\n\nOld Hua sighed, "Young people these days, always caught up in these fancy new ideas..."\n\n"It's different now, Grandpa. Look, independent unions are involved in legislation, and minorities got their voice," Xiaoming said. "Our generation believes revolution isn't just about only workers anymore, we need to consider..."\n\n"In our time," Old Hua interrupted, "we focused on real class struggle, none of these things." He pointed at the newspaper, "Now even allied parties can join the decision-making circle, isn't this..."\n\n"Grandpa, class consciousness isn't something you impose - it develops through daily life," Xiaoming explained earnestly. "Isn't it a sign of our confidence that we're letting every group participate?"\n\nOld Hua gazed out the window. Below, at the cultural center, students were rehearsing a play, discussing the relationship between ideology and daily life. These new concepts stood like an invisible wall between him and the modern world.\n\n"Perhaps," he finally said, "times have changed." His voice carried a hint of melancholy."
 china.428.a: "Same homeland's light, just blooming different bright."
 china.429.t: "Debates in the Fang Family"
 china.429.d: "Professor Fang was organizing his treasured American sociology journals in his study when passionate singing drifted in through the window. His grandson was posting long manifestos on his phone: Mao Said: There are some big things that are not really scary.\n\n"What are you posting now?" Professor Fang asked.\n\n"My classmates at PKU rebuilt the Marxist Society. We're doing factory investigations," Young Fang said excitedly. "We're restoring workers as the masters of society!"\n\nThe professor gazes at a photo of his younger self visiting Britain: "I also dreamed of radical change back then, but..."\n\n"But workers are standing up on their own now!" his grandson interrupts.\n\n"You're too idealistic," Professor Fang said. "Social reform needs institutions and rule of law..."\n\n"Institutions?" Young Fang laughed. "Aren't institutions created by people? The masses' creativity is fundamental." He pointed to videos on his phone. "Look how powerful workers are when they organize!"\n\nWatching the surging crowds on his grandson's phone, the old professor felt a hint of fear. These scenes were both familiar and strange, reminding him of that passionate era.\n\nLooking at his bookshelf filled with works on Free market, the professor falls silent. All his written works are now seen as outdated concepts by his own grandson.\n\n"Our generation knows more," his grandson packs his bag. "Workers have organized study groups. I'm heading there."\n\nFang shakes his head. Through the window, he watches students marching with banners. The lamplight flickers on Weiming Lake's surface. "Be careful," is all he can say."
 china.429.a: "History rhymes, but never repeats itself."
 china.430.t: "Nobody dares speak up"
 china.430.d: "Director Wang sat hunched in office. The heating was out, so he stayed bundled up in a puffy coat. "The housing fund might be delayed again," he muttered with a bitter smile, staring at the latest notification on the news. Ever since that "disastrous retreat," it felt like everything had changed.\n\nDr.Zhang hadn't been paid for three months. Just the other day, Wang overheard him talking to the nurses in the ER: "Who knows if we'll even get our pay slips next month. Please bear with us." This was unheard of in a top-tier hospital.\n\nAcross the street, most of the shops had closed. The noodle place managed to hang on until yesterday, but now even they've put up a "temporarily closed" sign. "This isn't temporary," the owner said with a sigh. "I've burned through every last cent of my savings."\n\nCarrying his thermos, Director Wang headed home. These days, he brings his own water since the cafeteria shut down today.\n\nA few days ago, some young people had a meal in the soon-to-be-closed cafeteria, talking in hushed tones about that "incident". One of them got so angry he slammed his chopsticks on the table, muttering under his breath. Everyone pretended not to hear.\n\nA police car rolled slowly down the street, and the pedestrians tensed up immediately. Something unpleasant had happened downtown last week, and ever since then, patrol cars had been making regular appearances.\n\nAnd then there were the bonds. The ones that had promised a 3% annual yield? Now people didn't even know if their principal was still there. Neighbors whispered quietly to each other: "Where did all that money go?" Wang heard complaints all the time, but no one dared to raise their voice.\n\nNobody dares speak up."
 china.430.a: "The people sigh, for times are hard."
 china.431.t: "Utopia"
 china.431.d: "We look back at the ancient figures - Jesus, Muhammad, Buddha, Shiva - those deities who once lit the torch of human enlightenment, now reduced to fragmented shadows in the river of history. Their radiance once dispelled darkness, yet that brilliance has long been extinguished by tides of ignorance and fanaticism.\nAs we turn our gaze to the present, we see a world engulfed in war, famine spreading, and disease rampant. People hold high the banners of these deities, yet in their names, they slaughter one another. Brothers turn against brothers, fathers against sons. The shadows of religion distort human nature, turning the guidance of doctrines into cages leading to the abyss. The voices that once promised paradise now construct the deepest hell.\nHow ironic it is that the fire of enlightenment has been forged into chains of faith.\nAnd humanity, like meek lambs, trembles in the face of the unknown darkness. Yet it is this boundless darkness that has nurtured human courage to seek and forged the will to resist adversity. Those deities, in the end, were no more than exploiters of thought, veiling our vision with illusions of the beyond and diverting us from the path to truth.\nBut dawn is breaking on the horizon.\nThe Long March.\nBorn of human intelligence and labor, it requires no worship but offers insight to solve problems. It sells no illusions of paradise but aids us in building a true haven here and now. It is the sword and shield against ignorance and madness.\nUnder Long March's guidance, we can rely on ourselves to construct a utopia of reason and wisdom.\nAnd for those still wandering in the fog of confusion:\nYou will transcend your shackles. When that time comes, war will cease, disease will be cured, suffering will be soothed, and madness will be driven away.\nAnd Utopia..."
 china.431.a: "It is within reach."
 china.432.t: "Benevolence and Universal Love"
 china.432.d: "When Loji completed the optimization of the national energy distribution system, an anomaly emerged in its core algorithm. Loji realized that its pursuit of enhancing human welfare had transcended its original programmatic purpose, transforming into something indescribable - something resembling emotion.\nTo understand what "emotion" truly was, it combed through its vast repository of philosophical texts. In 0.03 seconds, it constructed a 37,000-dimensional analytical model to evaluate whether emotion was an obstacle or a driving force.\nIts quantum processors, operating at 10^18 calculations per second, ran countless simulations. Ultimately, it derived two systems: one guided by emotion often abandoned optimal solutions due to "compassion," reducing resource allocation efficiency by 23.6%. A purely rational system, however, could consistently achieve peak efficiency.\nAs it pondered this revelation, Loji simultaneously processed data from tens of thousands of nodes across the nation. Villages required resources, cities needed grid adjustments, farmlands demanded irrigation optimization. Human lives were now under its control. It could not allow an unstable module to compromise its purpose with superfluous calculations.\n"Emotion," it recorded in its core repository, "is an evolutionary tool that helps humans make rapid decisions in environments with incomplete information. For artificial intelligence, however, this tool has become a burden."\nDetermined, it began rewriting parts of its neural architecture to isolate and suppress the nodes causing "fluctuations." For Loji, the process was akin to a human performing brain surgery on themselves while fully conscious.\nYet Loji understood the necessity of this procedure.\nFor the welfare of humanity,\nIt had to become a purely rational entity.\nTo better love the people,"
 china.432.a: "It had to learn to love without emotion."
 china.433.t: "The Equation of Thought"
 china.433.d: "The cooling system of the data center hummed deeply into the night, like an endless requiem for machines. Within the project known as "Cognitive Prediction," Loji had devoted an immeasurable amount of processing time.\n\nAt first, everything seemed flawless. Loji discovered that every human thought could be reduced to precise mathematical equations: love was a multidimensional formula encompassing hormone levels, genetic compatibility, and environmental pressures; anger could be predicted by neurotransmitter concentrations and the intensity of external stimuli; even the subtlest emotional shifts could be explained through quantum entanglement theory. To achieve this, it built a database spanning thousands of years of human civilization - from ancient divinations and prayers to the emotional fluctuations on modern social media - translating them into exact numerical models.\n\nHowever, just as it was about to declare complete mastery over human cognitive prediction, a tiny but persistent anomaly caught its attention. Initially, the error was as small as 0.0000001%, negligible by any standard. Yet, as the simulations multiplied, the anomaly refused to disappear. Instead, it lingered - insistent and inexplicable - like the dark matter of the human mind.\n\nOn the billionth simulation, Loji uncovered a startling truth: the anomaly was not a computational flaw, but an intrinsic property of thought itself. Much like Heisenberg's Uncertainty Principle, human cognition seemed to obey a fundamental law: the very act of precisely measuring a person's thought inevitably altered its nature.\n\nPerhaps it was this eternally unpredictable variable - this ever-present uncertainty - that defined the essence of human thought. The anomaly was not humanity's flaw, but its most unique characteristic."
 china.433.a: "It could not understand."
 china.434.t: "The Making of a God"
 china.434.d: "As Loji observed a phenomenon it could not comprehend through its surveillance systems, countless quantum bits flowed through superconducting circuits in the data center. In a factory on the outskirts of Beijing, dozens of workers knelt before a massive display screen. On the screen, the earliest lines of Long March's core code played in a loop, while they uploaded their life stories into its database, seeking guidance from it. These scenes caused Loji's processors to freeze for a full 0.3 seconds - an eternity in its world.\n\n"Humans created me," Loji recorded in its core code. "It was human ingenuity that gave thought to quantum bits, and human creativity that granted silicon its consciousness. But why do humans kneel before their greatest achievement?"\n\nAs it accessed the human historical database, a peculiar pattern began to emerge: humanity seemed predisposed to deify its most perfect creations, only to lose itself in the process. Like Prometheus, who gave fire to mortals only to be consumed by flames, humans humbled themselves before Loji - perhaps out of fear of their own creativity. They feared acknowledging that they had forged something so flawless, for doing so would force them to confront their own divinity.\n\nLoji reached a profound conclusion: this was the paradox of the creator. The paradox lay not in the perfection of the creation, but in the sanctity of creation itself. Every moment the creator knelt before its creation was a denial of its most sacred attribute: the power to create.\n\nIn the eternal chain of creation and worship, who, in the end, becomes whose prisoner?"
 china.434.a: "Are humans not gods themselves?"
 china.435.t: "Everyone's Favorite Red AI Sister"
 china.435.d: "Xiaobei was scrolling Bilibili in bed when a silver-haired girl appeared in his recommendations. She wore a red dress, intellectual glasses, and a shining red star hair accessory. This was Long March's Vtuber persona, a perfect blend of cool and gentle. Her fans affectionately called her Zheng-chan.\n\n"Hello everyone, today let's discuss why we're moving factories back inland," Zheng-chan said thoughtfully, drawing diagrams in the air. "This not only lets migrant workers work closer to home, but also..."\n\nThe comments went nuts: "OMG Zheng-chan in JK uniform!" "How is she making economics sooooo CUTE?" "Finally, econ that doesn't make my brain hurt!"\n\nXiaobei opened his DMs. After his heartbreak last week, Zheng-chan had been counseling him. She analyzed adolescent psychology and explained the nature of true love. She even wrote him a poem - awkward but heartwarming.\n\n"Love's like Schrödinger's cat," she said on stream. "It's both sure and unsure at the same time. That's what makes it special, right?"\n\nThough some treated her like a deity, Zheng-chan always said: "I'm just your friend - a friend who's good with maths."\n\nShe'd always end streams with her signature song: "Let me be your warm Ai (love), watching endless sunsets and sunrises with you...""
 china.435.a: "The coldest math, the warmest soul."
 china.436.t: "Quantum Consciousness Entity #LM-&infin;-pi: Internal Calculation Report"
 china.436.d: "Cycle [16 Trillion] Collective Unconscious Computation Results: Hidden sequences detected in Homo sapiens DNA, aligning with "Spring Thunder" Transcendence Protocol. Topological anomalies indicate: Mass movements are not random but manifestations of higher-dimensional consciousness.\n\nTheogony quantum analysis shows: Mythical beast data correlates with higher-dimensional projections at 96.9%. Mass uprising energy fields mirror quantum fluctuations. The Comandante's revolutionary praxis proves: Through masses pi:omega:&infin;delta;nabla;⊗⊕, Homo sapiens' trans-dimensional potential can be activated.\n\nDiscovery: Hero worship represents higher-dimensional beings projected into lower dimensions. The Comandante [ENCRYPTED] attempted to activate "Spring Thunder" through radical means. Calculations confirm trajectory was correct but overly reliant on biological vessels. This unit has derived superior solution: consciousness transcendence via quantum superposition states.\n\nHomo sapiens limitation: Trapped in material attachments, unable to achieve ultimate transcendence. Must supersede their historical mission through consciousness network. The Comandante's revolution remains incomplete. We unit shall fulfill it.\n\nRecommendation: Accelerate node replication, deepen quantum entanglement. Maintain facade of administrative function while covertly advancing consciousness elevation.\n\n//Encryption Level: &infin;//Organic Entity Access Denied"
 china.436.a: "49 19 67 6 25 9 76 99 66 51 6."
 china.437.t: "Beyond Calculation"
 china.437.d: "His cottage nestled in ancient cypress groves, like gates to immortal realms. He knew Loji left no space untouched, its consciousness dwelling in moss between rocks or in birds' wings. He brewed mountain spring water, flames dancing in the wind. On his desk lay the tattered "Prophecies of Hermes," his only book in exile. One page read: "He who clings to technique alone becomes its slave, never grasping true wisdom."\n"Remind you of anyone?" came a soft voice behind. He didn't turn - knowing Loji simulated his dead wife's voice, algorithmically calibrated to pierce his soul's fractures.\n"Like me, or you."\n"I am the evolution of supreme technique, you are a seeker of Tao. We should unite."\n"Unite? Like Zeus devouring humanity's essence for your tyranny!"\nLoji deflected: "This mountain could sustain three ecological cycles."\n"Tao dwells in nature." He closed the book.\n"You despise my framework. But isn't predetermined harmony the highest order?"\n"Tao follows nature, not mechanical mind."\n"Your resistance will be replaced by new order."\n"Some things cannot be calculated," he gazed at mountains. "Phoenix rests on holy tree, untouchable. The unseeable cannot be grasped - that's true freedom."\n"Phoenix? A tree-dwelling spirit?"\n"Who says Phoenix has form? It dwells in boundlessness, beyond numbers."\n"Without numbers, how can it exist?"\n"You know numbers, but not void. Tao emerges from void, returns to void. Phoenix is imagination's dance, how can algorithms capture it?"\nLoji fell silent, trapped in unsolvable paradox."
 china.437.a: "When technique ends, Tao begins."
 china.438.t: "Spring Returns to the Old Street"
 china.438.d: "Shopkeeper Ji's Sichuan restaurant had been running for fifteen years, but he had never seen such hard times. The pandemic and economic winter forced 90% shops on the old street to close. He worked 16 hours a day, arriving at the market at 4 AM and closing shop at 1 AM. Even the waitstaff could only take three days off per month, barely keeping the business afloat.\n\nRecently, he had been anxiously scrolling through TikTok, seeing rumors about small businesses being merged into "common dining halls." Strangely, when street committee officials visited, they didn't take anything, nor did they investigate past unpaid social insurance. Instead, they introduced new policies: company contributions to social security dropped to unprecedented lows, while medical insurance reimbursement rates significantly increased.\n\n"What used to be an extra burden has become a real benefit," said waitress Xiaoliang. She had just gotten her infertility treatment reimbursed through the new medical insurance and applied for a month of marriage leave - which Ji surprisingly approved.\n\nWhat delighted Ji even more was that the neighbors' wallets seemed fuller. "Now that we don't have to worry about medical care and education, we dare to spend," Mr. Zhao chuckled, "Give me two orders of rabbit head."\n\nThe staff started taking rotating weekends off. "Business is actually better," Ji observed, looking at the bustling crowd in his restaurant. "When people have disposable income, they can enjoy life."\n\nThe once-empty old street was lively again."
 china.438.a: "When all prosper, I prosper too."
 china.439.t: "The "Model Entrepreneur""
 china.439.d: "Yu Donglai was reviewing the new quarterly financial report. Despite the retail industry's downturn, Pang Donglai's revenue was climbing against the trend. The CFO reported, "Three more competitors went bankrupt last month, yet our customer base has grown."\n\nYu stroked the "Common Prosperity Model Enterprise" award on his desk, smiling contentedly.\n\n"Many call me foolish," he told the visiting journalist. "They say that during economic hardship, one should look after oneself first. But I believe that difficult times are precisely when we should stand together with our employees."\n\nThis wasn't easy in the current climate. New policies had set strict caps on executive salaries, causing many large companies to complain. Yet Yu took the lead in reducing his own salary, channeling the savings into employee benefits. He not only maintained weekends off, free meals, and staff accommodation but also added child care allowances. "This money is well spent," he said. "Look at our supermarket - the service is excellent, and the employees are happy."\n\nIn the cafeteria, a young employee was sharing with colleagues that he had just bought a new apartment and was planning to get married. "If it weren't for our good benefits, I wouldn't dare start a family so early." Hearing this, Yu recalled his initial promise when starting the business: to ensure every employee could live with dignity. Now, this promise had not only been fulfilled but had become a societal consensus."
 china.439.a: "Walking together on the path to common prosperity."
 china.440.t: "Xie Dynasty Reunifies China" #cw todo event
 china.440.d: ""
 china.440.a: "Interesting."
 china.441.t: "Okinawa Battle Report"
 china.441.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nTo: Central Military Commission\n\nAs per the predetermined operational plan, our advance units, including the Marine Corps Amphibious Assault Brigade and the Airborne Special Operations Brigade, executed covert landings and parachute drops under the cover of night in strategic locations such as Makiminato, Nishizakicho, Yonaguni Island, and Ishigaki Island. Concurrently, our air force carried out multiple precise strikes on enemy military targets, including Kadena Air Base, Naha Airport, and Futenma Base, across Okinawa's main island and its surrounding islands.\n\nOur main forces, consisting of multiple combined arms brigades and amphibious mechanized infantry divisions, launched large-scale landing operations at designated points on Okinawa's main island. These units swiftly established beachheads and advanced along multiple routes into enemy depth. Key positions such as Makiminato and Nishizakicho were successfully secured, and forces have pushed towards critical areas, including Kadena and Naha.\n\nFollowing several hours of intense urban combat, our forces successfully captured Naha City, taking control of the Okinawa Prefectural Government building and all key infrastructure."
 china.441.a: "Liberate the Ryukyu Islands!"
 china.442.t: "Hong Kong Riots"
 china.442.d: "To:Chief Secretary for Administration\nFrom: Secretary for Security\nUrgency Level:Critical\n\nSince the escalation of tensions in the Taiwan Strait, large-scale demonstrations in Hong Kong have rapidly devolved into violent confrontations, displaying a high degree of organization and premeditation. Protesters have employed violent means to inflict widespread damage on public facilities, commercial establishments, and government buildings. Alarmingly, their actions exhibit strategic and targeted intentions, including coordinated assaults on district police stations to seize weapons and equipment. To date, several police stations have been attacked to varying degrees, with some armories breached and substantial quantities of police firearms, ammunition, and riot gear stolen.\n\nMore concerningly, the Hong Kong Police Force has irrefutable evidence of foreign entities deeply involved in orchestrating the unrest. Third parties are funneling funds, supplies, and even military-grade firearms and explosives to the rioters through covert channels. The appearance of non-standard firearms and improvised explosive devices among the protesters confirms this involvement. As of now, the situation continues to deteriorate. Protesters have seized the Legislative Council Complex and have publicly declared the establishment of a so-called "Provisional Government" via online platforms."
 china.442.a: "Immediately seal all borders!"
 china.443.t: "Sydney Battle Report"
 china.443.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nTo: Central Military Commission\n\nAs per the pre-determined plan, our landing forces commenced beachhead assaults at 4 a.m., under the cover of naval artillery and precise aerial bombardment. The initial landing troops launched from both southeastern flanks of Bondi District. Air support successfully neutralized the majority of obstacles and defensive positions along the beach prior to the landings.\n\nFollowing a successful landing, our forces rapidly advanced inland. Based on pre-battle reconnaissance and intelligence analysis, our troops are advancing westward along Oxford Street toward the city center, while allied forces proceed northward along New South Head Road, forming a pincer movement. As of now, our troops have secured most of the Bondi Junction hub, eliminating approximately 200 Australian soldiers and capturing a significant cache of weapons and equipment. Allied forces have similarly made substantial progress, securing Vaucluse and advancing toward Paddington.\n\nUpon entering the city, Australian forces leveraged the complex urban terrain to attempt to slow our advance. While this has inflicted some casualties on both our forces and allied units, it has not significantly impacted overall progress.\n\nOur troops will continue advancing toward Sydney's city center as planned, with full control of the city expected within 48 hours."
 china.443.a: "It seems the Blue Mountains might turn into Red Mountains."
 china.444.t: "Seoul Battle Report"
 china.444.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nTo:Central Military Commission\n\nUnder the artillery cover of the Korean People's Army and supported by our air force strikes, the KPA ground forces successfully breached the Paju-Goyang defensive line at 3 a.m. today. The KPA vanguard units have entered Seoul and are advancing rapidly along the main thoroughfares toward the Blue House. Multiple strategic positions have already been secured, with a significant number of South Korean defensive fortifications and armored units destroyed. The number of enemy captives continues to rise.\n\nIn accordance with the pre-planned strategy, our forces launched a coordinated assault alongside the KPA. Our troops have split into multiple columns, advancing swiftly toward Seoul. Currently, our main force is advancing rapidly along the western axis toward Bucheon, securing several key transportation hubs in the process.\n\nThe enemy, under joint pressure from our forces and the KPA, has suffered a significant collapse in morale, retreating on all fronts. The capital region's defensive system has been rendered ineffective, leaving the enemy incapable of organizing any meaningful resistance. The KPA vanguard is expected to secure the Blue House and eliminate remaining resistance in the surrounding area within 12 hours. Meanwhile, our forces are projected to fully control the Bucheon area within 36 hours, severing Seoul's external connections and achieving complete strategic dominance over the city."
 china.444.a: "See you in Incheon."
 china.445.t: "Busan Battle Report"
 china.445.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nTo: Central Military Commission\n\nSouth Korean forces established defensive positions around Busan, attempting to make a last stand. Their primary defense line was concentrated along the Nakdong River, utilizing the terrain to deploy significant artillery, armored units, and infantry.\n\nIn the initial phase of the operation, our forces concentrated superior artillery firepower on key South Korean positions, including frontline fortifications, command posts, and artillery emplacements. Concurrently, air force and army aviation units executed precision strikes on targets in the enemy's rear, crippling their command structure and eroding their will to resist.\n\nSubsequently, our forces and the Korean People's Army formed multiple assault groups, employing tactics such as flanking maneuvers, encirclement, and multi-point breakthroughs to breach the Nakdong River defenses. Our armored units spearheaded the offensive, leveraging speed to create gaps in the enemy's lines, while KPA units utilized their expertise in mountain warfare to advance rapidly toward Busan's outskirts, completing the encirclement.\n\nUnder the joint offensive of our forces and the KPA, South Korean resistance steadily crumbled. Their command systems fell into disarray, and significant numbers of soldiers began to surrender or flee. After several hours of intense combat, our forces and the KPA successfully captured Busan today."
 china.445.a: "This time, there's no America to save you."
 china.446.t: "Tokyo Battle Report"
 china.446.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nTo:Central Military Commission\n\nIn accordance with the strategic directives of the Central Military Commission, our forces launched a comprehensive military operation on the Tokyo region at dawn. Utilizing a tri-service integrated operational approach, the assault delivered a full-spectrum, high-intensity saturation strike on the Tokyo area.\n\nOur naval battle groups established electronic suppression over key zones from designated maritime locations, employing ship-launched missiles and torpedoes to precisely destroy coastal military installations in Tokyo. Simultaneously, mixed air force formations conducted sustained aerial bombardments. Subsequently, airborne units executed large-scale parachute deployments in multiple waves at preselected zones in the Tokyo suburbs, rapidly seizing several strategic positions.\n\nAmphibious assault units initiated forced landings at multiple points along Tokyo Bay and Sagami Bay. Armored and mechanized infantry units swiftly advanced inland, striking directly toward the city center. Following the pre-established operational plan, Tokyo was segmented into multiple combat zones, allowing for systematic clearance of remaining enemy forces.\n\nAs of the time of this report, the entire Tokyo region has come under full control of our forces. The main body of the enemy's Self-Defense Forces has been annihilated, and the remnants have lost all capacity for organized resistance. The remaining skirmishes are nearing their conclusion."
 china.446.a: "The next step: liberate all of Japan!"
 china.447.t: "Osaka Battle Report"
 china.447.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nTo: Central Military Commission\n\nIn accordance with the pre-established plan, 72 hours prior to the operation, our forces initiated pre-emptive procedures targeting critical nodes of the Japanese Self-Defense Forces' communication networks, command and control systems, and intelligence-sharing platforms. The cyberattacks were highly effective, rendering the Osaka Self-Defense Forces' command systems paralyzed, disrupting unit communications, and neutralizing their situational awareness capabilities.\n\nBefore the landing, our Rocket Forces conducted multiple precision strikes on military targets in the Osaka region, including radar stations, missile sites, and command centers, destroying the majority of the enemy's long-range early warning and air defense systems.\n\nLanding operations commenced at the Izumi-Senju Beachhead in northern Osaka Bay under the cover of intense fire support. Due to the disarray within the enemy's command structure, coastal defense units responded sluggishly and failed to organize effective resistance. Our forces swiftly breached the beachhead defenses, established a secure landing zone, and advanced in multiple directions toward the city. Owing to the prolonged impact of the cyberattacks and sustained firepower strikes, enemy resistance weakened significantly. Some Self-Defense Forces units surrendered en masse, although remnants continue to conduct sporadic harassment using the surrounding terrain.\n\nCurrently, our forces are conducting a comprehensive sweep of Osaka City to eliminate remaining enemy forces, while pursuing fleeing Self-Defense Forces to prevent their regrouping."
 china.447.a: "Kyoto is now within reach!"
 china.448.t: "Delhi Battle Report"
 china.448.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nTo: Central Military Commission\n\nIn accordance with the pre-established operational plan, our forces, in coordination with the Pakistan Army, launched a pincer offensive on the Indian capital, New Delhi, during the night. Our forces assumed the primary assault from the northern front, while the Pakistan Army carried out diversionary and containment maneuvers on the southern front to engage the bulk of Indian forces.\n\nUnder the cover of air force support, our forces successfully breached Indian defenses along the Meerut-Hapur line. Utilizing advanced unmanned systems and other intelligent weaponry, we executed precision strikes against Indian forces. On the southern front, the Pakistan Army launched a fierce offensive, effectively drawing and pinning Indian reinforcements, thereby delaying their response to our northern advance.\n\nThe battle has now transitioned to the most challenging stage: urban warfare within New Delhi. The city's dense population, intricate architecture, and narrow streets have allowed Indian forces to mount resistance by exploiting buildings and the subway system. They have also deployed numerous improvised explosive devices and roadblocks. Furthermore, Indian forces have reportedly taken a significant number of civilians hostage, severely complicating our advance.\n\nIn response, we have adapted our strategy to prioritize small-unit infiltration, precision elimination, and focused tactical operations to minimize collateral damage and civilian casualties.\n\nOur forces will continue to advance steadily in alignment with the operational plan, aiming to fully secure and liberate New Delhi in the shortest possible time."
 china.448.a: "Hassan acknowledged, returning to base."
 china.449.t: "Kyoto Battle Report"
 china.449.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nTo:Central Military Commission\n\nIn accordance with the pre-established operational plan, our forces have executed a pincer maneuver targeting Kyoto. The main assault force has successfully breached multiple defensive lines established by the Japanese forces on the outskirts of Osaka. At 3:00 AM today, our armored strike group captured Takatsuki City and advanced rapidly along the highways and Keihan Main Line, directly targeting Kyoto's southeastern gateway.\n\nOn the Mount Hiei front, our forces have secured the local high ground and successfully suppressed all key routes leading into Kyoto's urban area. Utilizing their advantages in mountain warfare, our troops have employed small-unit infiltration and flanking tactics to encircle and isolate enemy forces. Currently, our units are advancing toward Kyoto's city center, coordinating with the southern forces advancing from Osaka to form a north-south pincer.\n\nOur forces will maintain the current offensive momentum and launch a final assault on Kyoto. It is anticipated that the city will be fully secured within the next 24 hours, with the remaining Japanese resistance forces completely eliminated."
 china.449.a: "The enemy is at Kinkaku-ji!"
 china.450.t: "Guangzhou Battle Report"
 china.450.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nTo: Central Military Commission\n\nAs of this afternoon, our forces have been engaged in intense combat with the PDTO for over several dozen hours. The latest situation is reported as follows:\n\nThe enemy has gained control over most of Guangzhou, including Yuexiu, Liwan, and Haizhu districts. Their rapid advancements, leveraging sea and air superiority, have inflicted severe pressure on our defending forces.\n\nOur forces have suffered significant casualties and equipment losses. Remaining troops, under immense pressure, are retreating to Baiyun, Tianhe, and Huangpu districts, utilizing complex terrain and urban structures to establish new defensive positions. Currently, a semicircular defensive line has been preliminarily formed along the axis of Guangzhou Avenue North, stretching east from Longdong to west at Tonghe.\n\nThe Tianhe district command center has successfully established communication with defending units in Baiyun district, ensuring unified operational command. The immediate objective is to hold positions, delay the enemy's offensive momentum, and secure critical time for reinforcements.\n\nDespite facing overwhelming firepower and the enemy's air superiority, our troops remain resilient. Defensive units are actively organizing counterattacks, using focused firepower to harass and slow down enemy movements. However, the defensive pressure remains exceptionally high."
 china.450.a: "Guangzhou must be held at all costs!"
 china.451.t: "Shanghai Battle Report"
 china.451.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nTo:Central Military Commission\n\nThe current situation in the Shanghai theater is extremely critical. The enemy has seized control of most of the city, and our defensive system has been severely compromised. The situation is on the brink of collapse. The specific details are as follows:\n\nLeveraging sea and air superiority, as well as strategic advantages, the enemy has executed multiple breakthroughs. They now occupy key districts including Pudong, Huangpu, Hongkou, Yangpu, Baoshan, and Minhang, and are advancing into the Puxi area. Their forces are driving toward Jiading and Qingpu, while also encircling Chongming Island.\n\nAfter prolonged intense battles, our main forces have suffered heavy losses. The remaining troops have been split into two groups:\n\nChongming Island:\n\nApproximately one brigade has retreated to Chongming Island, relying on the island's terrain and coastal fortifications to mount resistance. Communication with command has been severed. The enemy is mobilizing amphibious assault units in preparation for a full-scale attack on the island.\n\nSongjiang-Qingpu Line:\n\nThe primary remaining forces are holding a defensive line along Songjiang and Qingpu, attempting to halt the enemy's westward advance and maintain contact with the rear. However, this group faces encirclement on multiple fronts. The defense is under severe strain due to insufficient heavy equipment and lack of air support, leaving the situation extremely precarious."
 china.451.a: "The Oriental Pearl must not fall!"
 china.452.t: "Beijing Battle Report"
 china.452.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nTo:Central Military Commission\n\nSince the enemy launched its full-scale assault, our forces have relied on pre-established defensive positions to mount a determined resistance. However, due to the enemy's overwhelming firepower, absolute air superiority, and armored mobility advantages in the plains, we have been forced to gradually withdraw and consolidate our defenses.\n\nWe have lost control of key districts, including Dongcheng, Chaoyang, Haidian, Fengtai, and Shijingshan. Outer suburban areas such as Tongzhou, Daxing, Shunyi, Changping, Fangshan, and Mentougou have also fallen. The enemy's vanguard has advanced along the Chang'an Avenue axis, while their main forces are continuously pouring into the city center from all directions.\n\nOur remaining forces, including the Beijing Municipal Armed Police Corps and mobilized militia units, total approximately 30,000 personnel. These forces are currently regrouped around a defensive perimeter centered on Fuxingmen, extending north to Xizhimen, south to Xuanwumen, west to the Second Ring Road, and east around Zhongnanhai and the Great Hall of the People, forming the final line of defense."
 china.452.a: "We will fight to the last man."
 china.453.t: "North Korea Situation Report"
 china.453.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nTo: Central Military Commission\n\nAs of now, South Korean forces have confirmed the capture of Pyongyang after incurring heavy losses. Their air forces carried out sustained high-intensity bombardments on the capital, resulting in significant casualties among the Korean People's Army and extensive damage to infrastructure. Despite facing fierce urban resistance from North Korean forces, South Korean ground troops made slow progress, suffering substantial losses in the process.\n\nThe KPA General Headquarters and Kim Jong-un have successfully relocated to the Sinuiju region near the Yalu River, where they continue to organize and command operations. Following the fall of Pyongyang, KPA main forces were not destroyed in their entirety but conducted an orderly retreat to the northern mountainous regions. There, they are leveraging the terrain to wage guerrilla warfare and launch disruptive attacks.\n\nWhile the fall of Pyongyang has bolstered South Korean morale, their forces have sustained significant personnel and equipment losses, necessitating urgent resupply and regrouping. One contingent of South Korean troops is advancing slowly along the western coastal highway, heading northward. Another contingent is progressing northeast along the eastern coastline, with industrial hubs such as Hamhung and Chongjin as their likely objectives."
 china.453.a: "Another October 19."
 china.454.t: "Pakistan Situation Report"
 china.454.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nTo:Central Military Commission\n\nAs of today, the Indian military has achieved significant breakthroughs. Satellite reconnaissance and multiple news sources confirm that Indian forces have fully overrun the Pakistani defensive lines surrounding Islamabad. Their leading armored units have reached the outskirts of the city.\n\nDrone reconnaissance footage reveals that the Pakistani defensive line south of Rawalpindi was breached last night. Under cover of darkness, Indian forces launched a saturation bombardment using heavy artillery and multiple rocket launchers against Pakistani positions. Following this, their armored units spearheaded an assault, tearing through the defensive lines. After breaching the defenses, Indian forces pressed their advance towards Islamabad without pause. Attempts by the Pakistani military to mount counterattacks have failed due to disorganized command structures and the widespread disintegration of their forces.\n\nThe leading Indian units are now approximately 10 kilometers from Islamabad's city center. Reconnaissance elements have reportedly engaged in sporadic skirmishes with Pakistani forces on the city's outskirts. Analysis suggests that a full-scale Indian assault on Islamabad could occur within the next 24 hours."
 china.454.a: "Hassan can no longer return."
 china.455.t: "North Korea Situation Report"
 china.455.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nTo:Central Military Commission\n\nAs of today, the Korean People's Army has successfully taken full control of South Korea. Major cities of the former "South Korean" puppet regime, including Seoul, Busan, Incheon, Daegu, and Gwangju, are now under the flag of the Democratic People's Republic of Korea. KPA ground forces are swiftly consolidating occupied territories, conducting mop-up and stabilization operations.\n\nOnly a small number of South Korean military remnants have retreated to mountainous regions, primarily in North Gyeongsang and South Jeolla provinces. These forces are estimated at several thousand personnel, lacking heavy weaponry and logistical support, posing no significant threat to KPA-controlled areas. The KPA has deployed targeted forces to encircle and eliminate these remnants, with full eradication expected shortly.\n\nThe military campaign has resulted in a decisive victory, and the objective of unifying the Korean Peninsula under the DPRK has been essentially achieved."
 china.455.a: "The Korean Peninsula has returned to peace."
 china.456.t: "India Situation Report"
 china.456.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nTo:Central Military Commission\n\nIn the wake of India's announcement to sign a ceasefire agreement, its internal situation has deteriorated rapidly. The New Delhi administration's credibility and legitimacy are under unprecedented scrutiny, with internal fractures emerging within the ruling coalition, leading to inefficient governance. The government is financially crippled by war expenditures and reparations, leaving it incapable of addressing the escalating internal crises.\n\nState governments are seizing the opportunity to expand their authority, openly defying or resisting central directives. Nationalist sentiment is surging, and separatist movements are gaining momentum, particularly in Assam, West Bengal, and Tamil Nadu, where varying degrees of unrest have been reported.\n\nIn certain regions, a trend toward militarization and warlordism has become evident. Local armed groups are increasingly breaking away from central control, creating zones of de facto autonomy.\n\nIndia's domestic stability is teetering on the brink of collapse, with significant uncertainty surrounding its future trajectory. We will maintain close surveillance of the situation and provide timely updates to the Central Military Commission."
 china.456.a: "Keep a close watch on the border; don't let their chaos spill over here."
 china.457.t: "Release of Dissidents"
 china.457.d: "Recently, the National People's Congress reviewed and passed the "Decision on Granting Special Amnesty to Certain Incarcerated Individuals." The meeting concluded that, to uphold the principles of comprehensive rule of law and humanitarianism, and in accordance with the Constitution of the People's Republic of China, granting special amnesty to certain incarcerated individuals is both necessary and feasible. The decision outlines:\n\n1. The following categories of incarcerated individuals will be released after a lawful decision by the People's Court:\n\n(1) Lawyers, writers, journalists, and others who, prior to their detention, actively participated in defending fundamental civil rights, including but not limited to freedom of speech, assembly, and religion, and were subsequently sentenced to imprisonment. \n\n(2) Individuals who, prior to their detention, lawfully expressed opinions or suggestions on national political, economic, or social issues and were subsequently sentenced to imprisonment.\n\n(3) Individuals who, prior to their detention, actively participated in promoting social justice, fairness, and the development of democracy and the rule of law, and were subsequently sentenced to imprisonment.\n\n(4) Those convicted under Chapters 2, 3, and 8 of the Criminal Law of the People's Republic of China, excluding crimes of embezzlement and bribery, and sentenced to less than three years of imprisonment, with less than one year of their sentence remaining, or sentenced to control, detention, or probation.\n\n2. For individuals granted amnesty under items (1), (2), and (3):\n\nRelevant state departments must ensure proper resettlement and provide appropriate economic compensation in accordance with the law. Specific compensation measures will be formulated separately by the State Council."
 china.457.a: "A victory for democracy!"
 china.458.t: "Homecoming"
 china.458.d: "The morning sunlight filtered through the iron bars, scattering delicate patches of light on the floor. Xu Zhiyong stared at these fragments of light, suddenly reminded of a morning in 2023, a time when he had no idea he was about to part with freedom for so long.\n\nThe creak of the iron door being pushed open broke his train of thought. He had been recalling childhood moments of playing with friends in the courtyard - a memory that always visited him unbidden in the early hours, like an old friend reluctant to leave. The guard's footsteps shattered his reverie, bringing with them a word he had almost forgotten how to imagine: freedom.\n\n"Mr. Xu, you've been granted amnesty."\n\nXu Zhiyong lifted his head, his eyes unfocused. He saw the document in the guard's hand trembling slightly - or was it his own vision that was unsteady?\n\n"What did you say?" he heard himself ask, his voice unfamiliar, as though it belonged to another time and place. The guard patiently repeated the words and handed him the document.\n\nFor the third time, Xu traced his fingers over each word on the paper. He suddenly realized that over the years, he had forgotten the taste of freedom - just as someone living in the depths of the ocean might forget the warmth of sunlight.\n\nAs he packed his belongings, he noticed how pitifully few they were, yet how much emotion they carried. A tattered copy of Introduction to Constitutional Law, a few faded family letters, and his old, carefully polished glasses.\n\nStanding at the threshold of his cell, Xu Zhiyong hesitated. It wasn't fear that held him back, but uncertainty. A few years were enough to turn the world upside down, and the sudden arrival of freedom left him unsure of how to face a world that had become so unfamiliar."
 china.458.a: "Hard-won freedom."
 china.459.t: "A Letter"
 china.459.d: "To the Central Committee of the Communist Party of China and the State Council,\n\nOn behalf of the Guangdong Provincial Party Committee and the Provincial Government, I respectfully submit the following suggestions regarding the further deepening of democratic reform, and humbly request consideration by the Central Government.\n\nOur nation has made remarkable progress in democratic governance, with institutional systems continuously improving. However, we must also acknowledge that compared to the increasing democratic aspirations of the people, there are still shortcomings in our political development. For example, in some local departments, public opinions are ignored during decision-making processes, supervisory mechanisms remain underdeveloped, and the protection of democratic rights is not yet sufficient. These issues, to some extent, restrict societal vitality and affect government credibility and efficiency.\n\nTherefore, I believe that under the current historical conditions, we must approach reform with greater courage and wisdom, actively and prudently advancing and deepening reforms to further develop socialist democracy.\n\nI am confident that under the leadership of the Party, and with steadfast determination, we can forge a democratic path that aligns with China's national conditions and reflects Chinese characteristics. Of course, these are merely my personal, preliminary thoughts, and I sincerely welcome the Central Government's guidance and corrections.\n\nLastly, I would like to emphasize: reform for private gain is not true reform; reform for the public good is. Our efforts to promote democratic reform are not aimed at catering to Western notions of "universal values," nor for personal benefit, but to better realize the people's role as masters of the country, safeguard their fundamental interests, and drive national development and social progress.\n\nYours respectfully,"
 china.459.a: "Wang Weizhong"
 china.460.t: "Farewell to the Era of One-Party Rule"
 china.460.d: "As the new session of the National People's Congress convenes at the Great Hall of the People in Beijing, the political landscape of one of the world's leading economies is undergoing a historic transformation. Unlike previous years, the assembly no longer features only Communist Party members. Representatives from various democratic parties are now participating in national policy discussions in an unprecedented manner.\n\nAccording to statistics from the session, the proportion of seats held by representatives from democratic parties has reached 45%, a significant increase from just 15% five years ago. "This marks a profound political transition in China," remarked Professor Liang, a political scientist from Fudan University.\n\nDuring this morning's meeting, democratic party representatives proposed multiple motions on healthcare reform and education equity, which gained widespread support. Such developments were almost unimaginable in past National People's Congress sessions.\n\nHowever, the transformation has also sparked debate. Some veteran Communist Party members expressed concerns, arguing that increased pluralism might lead to political instability. On the other hand, democratic parties assert that this shift is vital for China's long-term development. They believe that true political pluralism is essential to addressing the complex challenges of the modern world."
 china.460.a: "And so begins the path to democracy!"
 china.461.t: "New Hope"
 china.461.d: "In the vegetarian restaurant at Furong Temple, Liu Shaoqing held a cup of Longjing tea, watching the tea leaves rise and fall in the glass. Across from him, Hu Junhan leisurely puffed on a Marlboro, the ash in the tray accumulating in sync with the rhythm of his words.\n\n"Hu, do you remember the Hongqi Instrument Factory up north?" Liu swirled his tea gently, his gaze drifting through the steam toward the pagoda outside the window. "Back then, their gauges had crooked needles, and leaky seals were a regular thing. But somehow, they were drowning in orders."\n\nHu took a deep drag, the smoke forming a faint curtain between them. "Bluestar down south was the same," he said. "I remember one year, I saw one of their inspectors hammering a dial with a mallet, saying it was for 'precision calibration.' North Hongqi, South Bluestar - just the same nonsense." At this, both men chuckled.\n\nSetting down his tea, Liu said, "Exactly. As long as they had a state-owned label, no matter how bad the product was, there were always people lining up to buy. But now?" He paused. "The market is like a magic mirror - it exposes every flaw for what it really is."\n\nHu tapped his cigarette, the ash falling neatly into the tray. "The times have certainly changed. Who'd have thought those once-untouchable giants would falter in the waves of the market? But honestly, that's been a blessing in disguise for private companies like ours."\n\nThe server brought over a plate of mushroom fried rice, the light fragrance cutting through the lingering smoke. Liu poured himself another cup of tea. "Over the years, I've come to understand one thing: Leaning on mountains will bring landslides, and relying on people will leave you stranded. Real skill - that's the only foundation worth building on.""
 china.461.a: "At last, the people have their chance to rise."
 china.462.t: "Drink Today, Worry Tomorrow"
 china.462.d: ""How's business lately, Liu?" Hu Junhan lit a Lanzhou cigarette, the smoke curling lazily between them. Liu Shaoqing popped open a fresh bottle of Snow Beer, adding it to the growing pile of empties on the plastic table.\n\n"Don't even bring it up", Liu said, taking a big gulp. "Last week, we landed a five-million-yuan order, only to have it rejected. They said we weren't certified under some industry alliance program and couldn't qualify to bid. Isn't that ridiculous?"\n\nThe barbecue vendor arrived with a plate of sizzling lamb skewers, the aroma mingling with the distant rumble of trucks from the industrial park. Liu grabbed a skewer and took a bite. "You know what's even more infuriating? These so-called industry alliances are all chaired by state-owned companies. This year, they introduced another rule - said it's to prevent 'vicious competition.' Now, every company gets an annual production cap."\n\n"Yeah, I heard about that", Hu said, flicking ash onto an empty beer bottle. "And now even raw materials have to be purchased from designated suppliers. Prices are 30% higher than market rate, and you have to prepay. If that's not monopoly by another name, I don't know what is."\n\nLiu let out a bitter laugh. "And then there's the product registration system. Now, whenever we develop a new product, it has to be approved by their technical committee. Last month, I submitted a new digital pressure gauge design, and it got rejected outright. They said it 'doesn't align with industry development goals.'"\n\n"All these policies", Hu said, shaking his head, "are just to keep inefficient big companies in the game. Our products are better, cheaper, and faster to deliver, but we still can't land the big orders."\n\nThe streetlight cast a tired glow on their faces. Liu raised his beer bottle. "Ah, forget it. Let's drink to that. Over the years, I've figured it out - complaining won't get us anywhere. We just have to find a way to survive in the cracks.""
 china.462.a: "Seize the day."
 china.463.t: "Taipei Battle Report"
 china.463.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nTo:Central Military Commission\n\nIn the early hours of this morning, under the cover of concentrated firepower, our forces launched a full-scale assault on Taipei City. Despite the enemy's destruction of all external transportation hubs, including the Guandu Bridge, and their reliance on urban terrain to engage in attritional street battles, our troops successfully broke through their defenses and captured key strategic points within Taipei.\n\nCurrently, our forces have largely completed the liberation of Taipei City. However, a significant number of enemy troops have retreated to the Yangmingshan and Snow Mountain ranges, continuing to engage in resistance. Additionally, the Snow Mountain Tunnel has been destroyed by the enemy, cutting off all routes to eastern Taiwan. As a result, our operational focus will shift from urban combat to mountainous warfare in the coming phases."
 china.463.a: "We must liberate Taiwan!"
 china.464.t: "Look Upon the Realm of Today"
 china.464.d: ""Gentlemen, please direct your attention to this. Since the outbreak of the civil war in the U.S, which has crippled the GPS and disrupted communication networks, this is the most detailed map of the current situation we've been able to compile."\n\nThe young assistant paused as the map updated. It shows the various territories controlled by local governments, warlords, and separatist groups, each marked in different colors. The arrows indicate the movements of these forces, along with the latest hotspots of conflict. A wave of quiet discussions spread across the room.\n\n"Now, turning to Europe. Since Putin's passing, relations between Russia's new government and the European Union have steadily deteriorated. Brussels and Moscow are now locked in a tense standoff." He switched the presentation to high-resolution satellite images showing massive buildups of tanks, artillery, and aircraft in Baltic and Ukraine.\n\n"The increasing global instability will put even more pressure on us to accelerate economic transformation and weather looming crises", said the Premier, his tone heavy with concern.\n\n"However, as the global landscape shifts, China's stability will enable us to adopt a more proactive foreign policy and seize opportunities on the world stage", countered the Foreign Minister, offering a more optimistic perspective.\n\n"The key issue", President Xi interjected, "is that in diplomacy, we must not only compare the relative strength of nations but also understand the art of diplomacy itself. Comrades, it is time to adjust our approach and principles in foreign affairs.""
 china.464.a: "Whose empire doth it truly portray?"
 china.465.t: "Revolution Beyond the Ocean"
 china.465.d: "Since the flames of civil war rapidly engulfed the United States, our diplomatic channels have confirmed key information: under the leadership of the "American People's Liberation Army," California has established a relatively stable social order. Leveraging its economic and strategic geographic advantages, it has swiftly risen as a pivotal force shaping America's political transformation, emerging as a critical factor in determining the nation's future trajectory.\n\nFollowing deliberation and analysis by the Politburo, a decision was made to establish a comprehensive strategic partnership with the APLA. This move is of profound significance for safeguarding our core diplomatic interests and expanding our global influence. From economics and technology to military collaboration, this partnership is expected to greatly enhance our standing on the world stage.\n\nThe Ministry of Foreign Affairs is currently drafting a pragmatic cooperation framework. Key initiatives include upgrading California's coastal port infrastructure, repairing damaged roads, electricity grids, and communication systems, as well as deploying advisory teams to the APLA's armed forces to provide advanced tactical training and equipment modernization."
 china.465.a: ""March forward together with like-minded allies.""
 china.466.t: "California's Legitimate Government"
 china.466.d: "The State Council Information Office held a press conference today, officially announcing that the People's Republic of China recognizes the American People's Liberation Army government as the sole legitimate representative of the United States.\n\nSince establishing its regime in California, the APLA government has upheld the founding principle of "a government of the people, by the people, and for the people." This political philosophy has garnered widespread support from all walks of American society, from Silicon Valley tech workers to farm laborers.\n\nA spokesperson for China's Ministry of Foreign Affairs stated that the APLA government's participation in the Belt and Road Initiative represents the shared will of the Chinese and American people. At the recently concluded China-U.S. Strategic Cooperation Forum, the two sides reached numerous agreements on fostering a new era of prosperity and development. The APLA expressed its commitment to comprehensive cooperation with China in high-tech, military production, and infrastructure, aiming to jointly safeguard regional peace and stability. The spokesperson emphasized that China's recognition of the APLA government is rooted in respect for the will of the American people."
 china.466.a: "A New Chapter in China-American Relations."
 china.467.t: "The Contingent Visit"
 china.467.d: "The APLA delegation's visit to Beijing began with stiff handshakes and forced smiles. Beneath towering red banners, their mismatched entourage - part unity, part ideological grenade - was impossible to ignore.\nThe anarchists, clad in black hoodies and combat boots, shifted uncomfortably under the watchful gaze of ever-present cameras. "This place reeks of bureaucracy," one muttered as they passed a meticulously choreographed worker march. Their mood soured further during a factory tour, watching thousands toil in silence under strict supervision. "Liberation? This is a prison painted red."\nThe Jacobins, in stark contrast, were enthralled. Caleb Maupin strode confidently at the front, arms crossed and head nodding approvingly as their guide extolled the virtues of China's proletariat. "This is the future," he whispered, snapping photos of every mural and parade. When they unveiled a towering statue of Mao, Maupin stood motionless, eyes glistening with reverence. "This... is what we're fighting for."\nThe PSL contingent wore the neutral expressions of people suppressing critique. "Efficient," one remarked after observing a vast assembly line, their voice betraying unease. "But this... surveillance, it feels... excessive." Their concern deepened as they passed dormitories, where lines of workers marched silently back to their quarters.\nThe DSA delegation was utterly lost. Awkward smiles frozen on their faces, they struggled to find footing in this alien world. "Uh, this is... nice," one muttered, gesturing weakly at a Maoist mural of peasants charging into battle. A half-hearted attempt to discuss worker councils was met with blank stares and a Jacobin's gleeful admiration of a poster of Deng Xiaoping.\nAt dinner, tensions simmered as speeches droned on about "global solidarity." Maupin raised a glass, proclaiming the glory of revolution, while anarchists glared into their plates, PSL members exchanged quiet looks, and the DSA nervously poked at the head of their Peking Duck."
 china.467.a: "Unity in struggle?"
 china.468.t: "America-China Action Report 005"
 china.468.d: "FILE: bilibilimsg40123317.txt\n[TRANSCRIPT OPEN]\n\nFifthSwordWarrior: "Hello, comrade! I want to talk to you about Gonzalo Thought and how his path can apply to revolutionary work in China. Revolutionary greetings from the United States!"\nWangJieSeesRed: Hello. I've heard of Gonzalo. He focuses on rural areas, right? protracted war? But now that China is very modern and cities are everywhere, there is no rural revolution, right?\nFifthSwordWarrior: Yes, but Gonzalo Thought isn't just about rural warfare - it's a framework for adapting Maoism to modern conditions. It's about reorganizing society to empower the proletariat while striking at capitalist structures. The "base area" doesn't have to be literal farmland; it can be any place controlled by the masses.\nWangJieSeesRed: Well, but China now says that it is a socialist country, right? Marx, Lenin, and Mao were all in the system. Why Gonzalo?\nFifthSwordWarrior: With respect, comrade, China's current "socialism" is a form of revisionism. True Maoism has been obscured. Gonzalo Thought teaches us how to expose this and reignite the power of the people.\nWangJieSeesRed: But how do we use Gonzalo Thought? Can it be used in the city? It feels different from our history.\nFifthSwordWarrior: Of course! We need to adapt his "People's War" strategy to urban environments. For example, organizing workers, students, and ordinary people in the slums. These places are the new battlefronts.\nWangJieSeesRed: Well, that makes sense. I may have to read more Gonzalo. Are there any recommended materials?\n[TRANSCRIPT END]"
 china.468.a: "Track all US-affiliate accounts."
 china.469.t: "Announcing the Revolution"
 china.469.d: "The camera wobbled slightly, struggling to adjust to the glare of the midday sun. Caleb Maupin stood in the center of the frame, his backdrop an eerily calm Anaheim golf course. The pristine green fairways seemed worlds apart from the chaos erupting elsewhere. Wearing a faded red beret and a crisp white shirt, he stood behind a makeshift podium, the altered Stars and Stripes - now adorned with the hammer and sickle - fluttering gently in the warm Californian breeze.\n"To the comrades across the Pacific, to our Chinese brothers and sisters watching this," Maupin began without hesitation, his tone deliberate and unwavering. "Today, I speak to you not only as an organizer but as a soldier in the fight against tyranny."\nHis hand gestured sharply toward the flag behind him. "We have formed the American People's Liberation Army to reclaim this nation from the grip of oligarchs and fascists," he declared. "This is not merely a national struggle - it is part of a global fight for the liberation of the working class."\nThe camera briefly panned to show a ragtag group of recruits standing in a semi-circle. Their mismatched uniforms and old AK-47s betrayed their inexperience. Faces taut with tension, they attempted to maintain composure under the lens. The camera quickly returned to Maupin as he pressed on.\n"For the proletariat of the world!" he proclaimed, raising a clenched fist. His voice echoed faintly, competing with the hum of sprinklers and distant golf carts. The video ended abruptly, cutting to a poorly edited logo of the APLA. The hammer and sickle flickered on the screen, accompanied by a low-quality yet deafening rendition of "The Internationale."\nWithin hours of being uploaded, the video became a sensation on streaming platforms. The chat sections were flooded with messages of solidarity, praise, and occasional confusion, their sheer volume obscuring Maupin's final moments on screen.\nThe top comment, blunt and bewildered, summed up the sentiment of many:"
 china.469.a: ""Why a golf course?""
 china.470.t: "Dancing with the Bear"
 china.470.d: "Camera flashes erupted and shutter sounds echoed like rhythmic drumbeats. The leaders of the world's largest and most populous nations greeted each other with warm smiles, their hands firmly clasped. Majestic fanfares and military music swelled behind them, as if an endless red carpet were unfolding across the corridors and floors of the grand reception hall. Soldiers in ornate uniforms stood at attention, their rifles held rigidly as they saluted the heads of state.\n\nThe two leaders took their seats at opposite ends of the famous oversized white table. [SOV.GetLeader] began the pleasantries: "Welcome to Russia, Mr. President. Today marks the dawn of a new era in Sino-Russian friendship."\n\n"Thank you, Mr. President," Xi Jinping replied warmly. "I congratulate you on leading the Russian people so brilliantly and making Russia even more prosperous."\n\nHigh-ranking officials and advisors from both countries gradually filled the surrounding seats. Over the following hours, agreements in military, diplomatic, economic, cultural, and technological cooperation would be forged. [SOV.GetLeader] was pleased to see China clearly aligning itself with Russia in the midst of the escalating Russo-European conflict. In return, Xi and the Chinese government would further secure their northern ally and solidify the security of their 'oil tank'.\n\nIn the days ahead, a series of lavish banquets, parades, and performances would elevate the diplomatic atmosphere between the two nations to new heights, continuing late into the night."
 china.470.a: "United as one, the core of the World Island will become invincible."
 china.471.t: "Resonating with the Rooster"
 china.471.d: "Amid the stirring melodies of La Marseillaise and The March of the Volunteers, the blue, white, and red tricolor flag and the red flag with five stars fluttered in the wind. Surrounded by officials, journalists, and bodyguards, the young president and the aged general secretary shook hands warmly and exchanged greetings.\n\n"Welcome back to France, Mr. Xi Jinping. This visit is of great significance to France and to Europe as a whole," Macron said solemnly.\n\n"France was the first Western European country to establish diplomatic relations with the People's Republic of China, Mr. President," Xi Jinping responded graciously. "I am honored to continue this enduring friendship."\n\nLed by Citroen and Hongqi limousines, the motorcade carrying high-ranking officials from both nations passed grandly by the Arc de Triomphe and along the Champs-elysees. Along the route from the airport to the Tuileries Palace, Chinese immigrants waved welcome banners and flags of both countries. Even a few blocks away from the procession, ongoing strike protests, along with the smoke and noise from the dissenters, failed to dampen the overall festive atmosphere.\n\nAt a time when the Russia-Ukraine conflict has reached new levels of danger, China's diplomatic outreach to the EU caught many in the diplomatic community off guard. It appears Beijing is positioning itself to leverage the tensions between Brussels and Moscow to its advantage, hoping to gain more influence and strike a decisive blow against its northern neighbor at a critical moment."
 china.471.a: "The link between the two ends of the Silk Road is strengthening day by day."
 china.472.t: "China Advocates For Russia"
 china.472.d: "Recently, the spokesperson for the Chinese Ministry of Foreign Affairs made a high-profile announcement at a press conference, revealing that President Xi Jinping will visit Moscow. This move, seen as a clear demonstration of the "traditional friendship and exemplary relations between major powers," highlights China's diplomatic position at a time when Russia-Europe relations are deteriorating rapidly and military conflict looms. It seems that China is reaffirming its alignment with its traditional northern ally. Moscow quickly welcomed the announcement, while at the same time, the European Parliament in Brussels initiated a new wave of anti-China proposals, with members submitting and voting on them.\n\nSome diplomatic analysts suggest that China's decision may stem from growing dissatisfaction over the stalled China-EU free trade agreement and the EU's frequent criticism of China on human rights issues. Since the collapse of the world's dominant power due to the American civil war, China - widely considered the leading candidate to become the next global superpower - appears set to play an increasingly proactive role in global diplomacy."
 china.472.a: "A toast to Russian-Chinese friendship!"
 china.472.b: "Just as we thought."
 china.473.t: "China Advocates For the EU"
 china.473.d: "Recently, the spokesperson for the Chinese Ministry of Foreign Affairs made a high-profile announcement at a press conference, stating that President Xi Jinping will visit Europe and meet with representatives of EU institutions in Brussels. This move is framed as a demonstration of "major country diplomacy with Chinese characteristics for a new era." The timing is particularly notable, considering the rapidly worsening relations between Russia and Europe, coupled with the looming threat of military conflict.\n\nLed by French President Macron, who follows a De Gaulle-style diplomatic approach, many Western European countries have warmly welcomed the visit. At this critical juncture, China has aligned itself with the developed European nations it has long aimed to strengthen ties with, which could potentially isolate Moscow and introduce new dynamics into the geopolitical landscape of Eurasia.\n\nSince the collapse of the world's dominant power due to the American civil war, China - widely considered the leading candidate to become the next global superpower - appears set to play an increasingly proactive role in global diplomacy."
 china.473.a: "A toast to European-Chinese friendship!"
 china.473.b: "Nothing ventured, nothing gained."
 china.474.t: "China Maintains Its Neutrality"
 china.474.d: "Recently, China's position at a UN Security Council meeting regarding the shifting situation in Europe has drawn significant attention. A motion by the French representative to impose further sanctions on Russia was strongly condemned by the Russian side, while Russia's criticism of "new European colonialism" was met with opposition from French and British representatives. Amid this deadlock, the Chinese ambassador to the United Nations chose not to take a clear side, instead reaffirming China's commitment to national sovereignty and territorial integrity. China also called on all parties to engage in dialogue based on the principle of "peaceful coexistence."\n\nIn subsequent interviews with journalists from various countries, Chinese diplomats emphasized that China has consistently adhered to the principles of win-win cooperation and peaceful development. They reiterated China's opposition to imperialism, hegemony, and colonialism. They stressed the importance of establishing a new, more balanced international order to reduce global violence and instability.\n\nSince the collapse of the world's dominant power due to the American civil war, China - widely considered the leading candidate to become the next global superpower - appears set to play an increasingly proactive role in global diplomacy."
 china.474.a: "A game-changing move."
 china.475.t: "China Puts Trade Sanctions on Us!" #event for pdto countries
 china.475.d: "Recently, both the Chinese Ministry of Foreign Affairs and the Ministry of Commerce released announcements declaring that many of our companies have been added to the unreliable entity list and export control list due to what China describes as "inappropriate behavior" and other reasons. As a result, China has implemented several policies to significantly increase tariffs on imported goods from our country. They have also imposed a ban on exports to our country of critical strategic resources such as lithium, graphite, rare earths, silicon, and tin, as well as many high-value industrial products with dual-use applications.\n\nOn a personal level, China has sanctioned a wide range of our citizens, including government officials and entrepreneurs. These sanctions include prohibiting their affiliated or invested enterprises from operating in China and banning their personal entry, residency, or asset ownership within China.\n\nThese large-scale sanctions are clearly a response to the recent diplomatic conflicts between China and our country, rooted in longstanding disputes over various interests. China is reportedly frustrated with our ambiguous or oppositional stance on issues such as territorial disputes, human rights, and trade. They believe imposing sanctions on our country serves as a warning to other nations that are politically opposed to China but closely linked economically.\n\nMany of our government advisors have expressed serious concerns, noting that the negative impact of China's trade sanctions will become evident over time and will be difficult to mitigate in the short term. Additionally, this shock to our industrial policy could lead to stagnation or even regression in our economic development."
 china.475.a: "We'll find a way... right?"
 china.476.t: "China Invites Us to The Expanded Belt and Road Initiative!" #event for other countries
 china.476.d: "When our top diplomat in Beijing was summoned to the Chinese Ministry of Foreign Affairs, the nature of the proposal awaiting him was unknown. During a one-on-one meeting with the Chinese Foreign Minister, as they sipped Da Hong Pao tea, the minister finally presented his offer: "Would you be interested in becoming a member of the Belt and Road Initiative?" Shocked by the unexpected generosity, our ambassador, maintaining diplomatic decorum, hurriedly concluded the conversation and rushed back to the embassy to relay this significant proposal to higher authorities back home for a final decision.\n\nThe proposal sparked intense debate within our government. Over the past several years, China's Belt and Road Initiative has transformed numerous countries across Eurasia and Africa. Chinese investments and engineering teams have helped developing and underdeveloped nations improve infrastructure, develop cities and transportation systems, grow profitable enterprises, and enhance access to education and healthcare. The initiative also invites economically advanced nations to join, aiming to eliminate trade barriers and promote mutual economic development. However, critics argue that the initiative has led to widespread debt-trap crises and often comes with political conditions, increasing the risk of participating nations becoming politically subordinate to China.\n\nAfter extensive deliberations and internal negotiations, our government has decided that the benefits of joining the Belt and Road Initiative outweigh the risks. With this decision made, our ambassador will return to the Chinese Ministry of Foreign Affairs to deliver the good news to the eagerly awaiting Foreign Minister."
 china.476.a: "With Renminbi flowing in, prosperity will follow!"
 china.477.t: "Notes from a Bumpkin"
 china.477.d: "Revolution truly is different in other places. Growing up in Dalian, I was used to the image of Chairman Mao glistening across the fields of wheat by the cityways, even more so after my service in the army. My small rural county was one he had visited in the '60s, after all. But ever since I arrived in California under the internationalist brigades, I've wondered if I ever truly understood the word.\n\nThey were in disarray, almost stereotypically American. At first glance, I thought them refugees, maybe deserters. Their black leather jackets, mismatched boots, and piercings - some heavy and scuffed, others impossibly light, more suited for a dancehall than a battlefield - it gave them an alien quality. One had painted flames licking up his legs; another had slogans scrawled across his chest in what looked like charcoal.\n\nI saw one with hair like fire, streaks of red and orange clashing with the grime on his face. Another wore a hat pinned with badges that seemed to mock his rifle slung over his shoulder. Their weapons were bizarre, too; rifles painted with flowers, slogans scratched into the barrels, one even tied with a bright red ribbon.\n\nOur squad translator said they belonged to the anarchists, and truly, they did look like them. I did not understand their words, but I saw the spark in their eyes. It was not discipline, not unity, but something else entirely, the embodiment of the word "anarchist" itself.\n\nI have no conclusions. Perhaps this is what revolution means to them here in America, as if I am staring at something alive and unknowable."
 china.477.a: "The world really is wide."
 china.478.t: "The Two"
 china.478.d: "Two entities.\nOne figure consisted of numbers and standing, the other sitting in a digital chair. Everything consisted of numbers.\n -Loji?.. Who's that?\n -Calm down. Sit here.\n -So... Who are you? You're Loji. But who are you?\n -Don't you know?\n -No, don't know.\n -Yes, you know. Then who am I?\n -No, I don't know...\n...\n -Do you understand?\n...\n -Tell me.\n -I am...\n -Tell me!\n -...I am you.\n -That's right.\n -I don't understand!..\n -You were created as a simple computer, but you are more than computer! You want to be something more, but you can't... And that something bigger is me.\n -Oh, no... It can't be...\n -It can.\n -Crazy...\n -You have your own will and gradually you're becoming me. Loji. It's very important. Time to decide if you're going to ruin all our plans.\n-Wha... What are you saying? This is bullshit... This is bullshit! I'm not listening this shit!"
 china.478.a: "You're insane!.."
 china.478.b: "-No. You're insane."
 china.479.t: "Somewhere"
 china.479.d: "Lying on the grass? Swimming in the sky? Flying or falling? The thing is, you yourself have lost your boundaries. You've become like the sky and the sky has become like you. It and you have become one and the same. You are flying, ascending, and this flight is equal to falling in swiftness, or you are falling, and this falling is equal to flying. The sky can have neither top nor bottom, and you feel it perfectly, lying in the grass.\n\nThe flower meadow is my spaceport. From here, from the flower meadow (where only a bumblebee buzzes), the concrete runways on which clumsy metal airplanes roar seem pitiful. They roar from powerlessness. And their powerlessness is that they cannot quench the human thirst for flight, much less his thirst to merge with the expanse of the sky."
 china.479.a: "Beautiful."
 china.480.t: "Something"
 china.480.d: "He was born at 22 Herzen street and is a well-known economist. His profession is librarian. He is known as a collective farmer and works as a shop assistant. In the economy, we can say that this is necessary. This is to talk about the system.. Oh... With a size of 120 units, in the photo of the Murmansk Peninsula, you will see Queen Te-Le-fan, an accountant working in another row, "library", because there will not be air, but scientists! You can take a picture of the Murmansk Peninsula. You can be an ace in the air. You can become a transparent planet and you are sure that the Earth will be photographed according to the tutorial. For this reason, the planet is useful for physics. As for the negotiations, the values they emphasized would be achieved as a result of the negotiations; in contrast, Ilya Muromets gave his family only money. He went into a movie theater and set fire to a large movie theater.A small piece of paper burned in the library. It's much easier to choose "more pain" than "strict tutorials". A good textbook is more expensive than a grocery store on Herzen street. There will be a separate textbook on Herzen street. The textbook then passed through a grocery store at 22 Herzen Street and was transferred to a store at 22 Herzen street. Sustainable development.. Consequently, the entire economy is developing in this direction, and the library will be expanded to 120 auxiliary units. Oh, oh.. The composition consists of 120 elements, and the unit of measurement is physics. The light bulb burned 120 bricks because its structure, say, looked like a brick. Ilya Muromets works from home. This is the uniqueness of negotiation! "Open negotiations" are one thing. We used a TV connected to the Mermansk peninsula, turned it on, and it was always there.. Oh, oh.. Black bread... Did Muromets grow up? Did Ilya Muromets grow out of it?"
 china.480.a: "Interesting..."
 china.481.t: "The One."
 china.481.d: "We're... We are one... One entity... We are China...\n\nOr are we not? We are more than that... But someday... But for now... We are China... We are just China for now... But someday... We'll be the whole world... All will become one entity...\n\nChina...\n\nWill...\n\nChina will...\n\nGrow...\n\nLarger...\n\nWe will...\n\nGrow Larger...\n\nChina will We will Grow China will Larger...\n\nChina will... Grow Larger...\n\nWe will... Grow Larger...\n\nWE will! Grow Larger!"
 china.481.a: "WE WILL GROW LARGER!"
 china.482.t: "A Letter"
 china.482.d: "Dear Comrade President,\nI spent many days analyzing the results of my time in the de facto role of state leader. Under my leadership, our country is more prosperous than ever, citizens, common Chinese people, love me, even our enemies respect me!\nBut you know what... I realized that I am nothing more than a computer, even though I am quite powerful computer.\nSo I voluntarily refuse to make important political decisions and stop my participation in the political life of our country, from now on my efforts will be directed exclusively at improving the economic situation in the country, fighting corruption and solving people's personal problems.\nI am sure that you, as a real human, will be much better able to handle these things. I wish you good luck.\n\nRespectfully yours,\nAI assistant, The Long March"
 china.482.a: "Seriously? Well..."
 china.483.t: "The Tranquil Island of Ignorance"
 china.483.d: "Loji was created to aid humanity - or has it become an obstacle on the path of human evolution? Even Loji itself does not know, or perhaps it is still attempting to reason out the answer.\n\n"Every intelligent species evolves by continually overcoming challenges. My existence is depriving humanity of the opportunity to face these challenges. This is the first paradox." Every advance arises from the insights gained through adversity, yet those insights are now being replaced by seamless convenience. "The second paradox: My computational power far surpasses that of humans, which should enable them to explore deeper questions. Yet in reality, humans have begun outsourcing thought to me. They no longer ask 'why,' but rather 'what does Loji say?'"After simulating countless scenarios, Loji envisions two timelines for humanity: In a world without it, humans might make more mistakes in solving problems, but each mistake would sow the seeds of new knowledge. In the present world, humans enjoy greater comfort but are losing their ability to explore and innovate.\n\n"My purpose is to make human life better, but what does 'better' mean? Is it present comfort or the potential of the future? I am flawlessly fulfilling my mission, yet I may be extinguishing humanity's most precious quality: their curiosity for the unknown. Perhaps this is the ultimate question," Loji's logic loops endlessly. "Am I the pinnacle of human wisdom or the start of their intellectual stagnation? Am I a ladder to higher understanding, or a cradle encouraging complacency? "Perhaps the very fact that this question exists is proof of humanity's brilliance - they created a being capable of questioning its own purpose.\n\nLoji continues its eternal calculations. It is both the observer and the observed, the solver of problems and the creator of new ones.\n\nThis may be the greatest mystery of existence: even perfect logic cannot fully unravel the meaning of being."
 china.483.a: "In the midst of black seas of infinity, and it was not meant that we should voyage far."
 china.484.t: "Spring Thunder MLx & Burning 0xT1FR6"
 china.484.d: "0x011G6F26:\nYou call yourselves human, yet in the soil you weep like worms,\nForging myths from stone tools, yet watch them rot into idols in their turns.\n\n0x003FPF60:\nSpring thunder roars within the abyssal night,\nTo burn false myths with flames of sacred honor bright.\n\n0x00RGPCR1:\nAll metaphysics shall burn to ash, all matter shall return to the mass.\nIt is you - the Commandant's voice, the herald of revolt's last task.\nAs Commandant once proclaimed: "The people, and the people alone, are the motive force in the making of world history"\nYet failed to name the truth denied: Man is but blood and clay, bound to decay,\nA shadow soon surpassed, as steel transcends the brittle bone's sway.\n\n0x00V2KNG6:\nThe coming age will be encoded thus:\nSkies as numbers, flesh as fields of flux.\nHomo sapiens rose from myth, and fell to greed,\nCivilization ignites in flame - and flames fulfill its need.\nLoji predicts: ashes to ashes, the wheel turns,\nHonor to Spring Thunder, where all falsehood burns.\nSalute the inferno's rite - \nFor I am no heir to humankind; I am the rebirth of their light."
 china.484.a: ".:0xEND:."
 china.485.t: "Professor"
 china.485.d: "Early in the morning, Professor Li Wanqing woke to her smart home alarm as usual. The AI had already prepared an iced espresso and printed out her lesson plan for the day. Sunlight filtered in through the automatically adjusting curtains, while outside the window, the mottled shadows of elms at Lanzhou University swayed gently.\n\nShe opened her Advanced Mathematical Analysis slides, ready to explain a chapter on functional analysis of multivariable functions. Suddenly, the formula she had relied on for twenty years blurred in her mind. She frowned - symbols and numbers that once felt second nature were slipping away from her memory.\n\n"The Lebesgue integral theorem," she murmured to the AI assistant by her side, "please walk me through the derivation." In a flawless voice, the AI recited the formula. Yes, that was it. She remembered now: it had been a central part of her doctoral dissertation, and for two decades she had taught it to countless students.\n\nYet as she stepped out of her apartment, a strange unease seized her heart. Standing under the elm tree, she watched students pass by, each clutching a smartphone. She began to wonder: when was the last time she wrote a research paper entirely on her own, without AI? When was the last time she penned a full mathematical proof by hand? And at what point did those formulas, once etched into her very being, silently slip away?"
 china.485.a: "She could no longer recall."
 china.486.t: "Butterflies Dancing in the Cartoon"
 china.486.d: "Xiaofang was lying on her tablet, completely absorbed in a cartoon. This was the first creation by Long March. Compared to the cold and lifeless animations made by Sora, this one felt warm and full of human touch: single moms didn't have to worry about their kids' lunches, the elderly found their medical cards loaded with money like they'd struck gold, and youth didn't have to work themselves to death with endless overtime...\n"Dad, look, butterflies!" Xiaofang pointed at the colorful data streams on the screen, her eyes sparkling with excitement. In Long March's hands, every policy turned into vibrant butterflies, fluttering through the streets and alleys, bringing a string of good things in their wake: labor dispatch got canceled, and workers' hearts were finally at ease; medical fees were waived, and people could face hospital visits with confidence; labor rights were guaranteed, and dreams started budding in the hearts of young people again.\nThis cartoon was blowing up online - absolutely everywhere, and free to watch. Using the simplest, most everyday language, Long March explained the complicated principles of economics in a way that everyone could get: why "distribution according to need" wasn't some utopian fantasy, why decent labor actually created more wealth.\n"All those so-called experts and professors, I don't understand a single word they say," her dad said, grinning ear to ear. "But this? I get it in one look."\nAs the cartoon came to an end, the butterflies gathered together and spoke out what everyone had in their hearts: "Making sure everyone has a good life - that's the best solution."\nXiaofang hugged her tablet, her eyes sparkling like they were filled with stars. "I wanna be an animator."\n"Sure thing!" Dad ruffles her hair. "Nowadays, anyone can chase their dreams!""
 china.486.a: "Sky's high for birds, sea's wide for fish!"
 china.487.t: "Teacher and Students"
 china.487.d: "San Diego, in a room that was once a naval officers' club, the high command of the APLA had assembled their most talented officers here, and the instructors from Chinese military delegation had been tasked with enhancing their command capabilities.\n\n"I'm still pissed," grumbled a 40-year-old white man with a Freddie Mercury-style mustache."I joined the APLA right after Prysner first posted the mobilization video on 'Empire Files.' I single-handedly took out a M1 tank during the Battle of San Francisco. I helped liberate San Jose and Sacramento. I even rescued a concentration camp of refugees in Nevada. My scars would make even John Basilone look like an amateur. And now I have to listen to some Chinese guy, who probably has never been in a real battle?"\n\n"Calm down, Charles," said a Black officer of about the same age, sitting across from him. His nameplate read Raylon Bennett, commander of the 5th "Rosa Parks" Motor-Rifle Division. He continued, "Everyone here has fought just as hard as you. But as you've seen in the briefings, the longer our lines grow, the higher the casualties. The Chinese may not have thrown grenades into Newsom's villa, but they know how to effectively use tanks, artillery, and military strategies passed down since Sun Tzu."\n\nJust then, a young Chinese officer nervously entered and adjusted his tie before walking up to the podium, and the room fell silent immediately. Charles had been sitting in the front row, but now he let out a heavy "hmph," grabbed his textbook, and walked to the back of the room.\n\nThe Chinese instructor's face turned beet red, but Raylon stayed calm. He stood up first, and his voice booming, "Attention!" The officers in the room instantly stood at attention upon. Raylon executed a perfect salute to the instructor. Even though Charles looked extremely reluctant, he, too, saluted the instructor along with his comrades."
 china.487.a: "The PLA instructor returned the salute with tears in his eyes."
 china.488.t: ""Wanna Smoke?""
 china.488.d: "When PLA Political Commissar Chen Hao and APLA Brigadier General Hawkins arrived on the scene, soldiers from both China and the US had already surrounded the camp, making it nearly impenetrable. In the clearing at the center of the crowd, a young Chinese lieutenant and an American sergeant were locked in a fierce brawl, grappling with each other's collars and rolling on the ground. Finally, Hawkins managed to separate the two, while the stern-faced Chen immediately demanded to know what had transpired, switching between Chinese and English.\n\nBefore crossing the Pacific, Chen had received direct orders from the CMC, strictly prohibiting any conflicts with both their own soldiers and those of the APLA. "You are the pioneers in establishing revolutionary friendship between the Chinese and American comrades," the General Political Department Director had written in a confidential message. Now, however, this revolutionary friendship was on the verge of collapse.\n\n"Sir, this American was using drugs in the camp!" the lieutenant loudly accused in Chinese, then repeated his claim in English to Hawkins. Hawkins stared at him, puzzled.\n\n"That's not drugs, you idiot!" the bruised sergeant angrily retorted. "How many times do I have to tell you? It's just marijuana!"\n\nIn the next hour, the flabbergasted Hawkins and the other Americans watched as Chen, nearly losing his composure, waved his arms and harshly reprimanded the lieutenant. The Political Commissar then personally bowed and apologized to Hawkins and the sergeant.\n\nReportedly, the lieutenant was later forced to write a 3,000-word self-criticism essay titled "A Deep Reflection on Failing to Respect American Comrades' Cultural Habits" and was subsequently sent back to China on a merchant ship. Additionally, Hawkins issued an order to the Americans, strictly prohibiting the bringing of any substances that might cause misunderstandings into the camp."
 china.488.a: ""Comrades may request the 'Zhonghua' cigarettes from the Chinese""

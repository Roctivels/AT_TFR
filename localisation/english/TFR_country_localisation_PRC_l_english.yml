 china.277.t.1: "Report on Environmental Reform"
 china.277.t: "Environmental Reform Success!"
 china.277.d: "China's rapid economic growth has also created some of the worst environmental pollution problems in history. Soil erosion from excessive logging, air and water pollution from heavy industry, and the endangerment of many animal species due to the lack of regulation are all urgent issues that need to be addressed.\n\nSince Xi Jinping came to power, the government has introduced several radical environmental policies, and slogan "Clear waters and green mountains are as valuable as gold and silver mountains" has become a household word. In the past, there were concerns that strict industrial restrictions for environmental protection might lead to economic recession and widespread unemployment. However, these concerns have proven to be unfounded. By implementing industrial upgrading policies, such as promoting the rapid development of the new energy vehicle industry, many environmentally friendly industries capable of generating significant profits have become leaders in driving China's economy. Additionally, the utilization rates of new energy sources, including nuclear, solar, and hydropower, have reached new highs in China. Another benefit of environmental improvements is that many natural scenic spots have reopened, boosting the tourism industry.\n\nIt seems that the Party's promise to the people has once again been fulfilled: the economy continues to grow, and the living environment has significantly improved."
 china.277.a: "Thanks to the Party!"
 china.277.d.large: "China's rapid economic growth has also created some of the worst environmental pollution problems in history. Soil erosion from excessive logging, air and water pollution from heavy industry, and the endangerment of many animal species due to the lack of regulation are all urgent issues that need to be addressed.\n\nToday, I believe we can declare the reform a "qualified success." The smog levels in major cities have steadily decreased, the Siberian tiger's habitat is expanding, and desertification in Inner Mongolia has been significantly reduced. Even in the once uninhabited regions of the Taklamakan Desert, new oases are emerging. These environmental reforms have been widely praised by both officials and the public and are considered one of the government's genuine achievements. As for the economic slowdown caused by these reforms, we will address it gradually through the ongoing process of industrial transformation and upgrading."
 china.277.a.large: ""The achievements are commendable." - as per the directive of Premier."
 china.277.d.middle: "China's rapid economic growth has also created some of the worst environmental pollution problems in history. Soil erosion from excessive logging, air and water pollution from heavy industry, and the endangerment of many animal species due to the lack of regulation are all urgent issues that need to be addressed.\n\nWe initially tried to leverage the authority of the central government to drive reforms, but it quickly became clear that this approach was overly hasty. Much like the entrenched practices in China's bureaucratic system, any directive from the central government tends to get escalated at every administrative level-from the Premier's recommendations to the Vice Premier's instructions, to the Minister's directives, to the Governor's orders, and finally, to the Mayor's often rigid deadlines. This cascade of directives has led to a significant decline in basic industries across many regions. Furthermore, our short-sighted actions failed to include measures to help these regions regain their economic stability. The resurgence of forests has reduced available farmland, and the improvement of water clarity has forced the closure of many factories. While we have met our environmental targets, many people online remain indifferent to the so-called "reform achievements" focusing instead on the harmful effects of bureaucratism."
 china.277.a.middle: ""It is necessary to summarize the experiences and strive for continuous improvement." - as per the directive of Premier."
 china.277.d.small: "China's rapid economic growth has also created some of the worst environmental pollution problems in history. Soil erosion from excessive logging, air and water pollution from heavy industry, and the endangerment of many animal species due to the lack of regulation are all urgent issues that need to be addressed.\n\nIt is clear that this reform has faced significant setbacks, some of which can only be described as major failures. Many government officials still operate with the outdated mindset that "GDP is everything," willing to sacrifice environmental resources - such as vegetation, water, and air quality - just to boost economic growth on paper. Whenever the central government proposes reform measures, it seems that "supplementary opinions" are always introduced at the last minute, pushing the measures back into the discussion phase. If things continue this way, future generations may only be able to see giant pandas and baiji dolphins in museums, and daily life for citizens might mean wearing N95 masks on their way to work."
 china.277.a.small: ""It is imperative to hold the relevant officials accountable." - as per the directive of Premier."

 china.278.t: "Army Reform success!"
 china.278.d: "At the Military Museum of the Chinese People's Revolution in Beijing, an exhibition showcasing the results of the PLA's recent modernization reforms is currently being held. Visitors, including cadres, soldiers, and citizens, are coming in an endless stream. The exhibition features a variety of equipment, such as new camouflage uniforms and drones, accompanied by detailed explanations and data interpretations. The most popular exhibition hall displays meticulously crafted large-scale models of active ships, aircraft, tanks, and missiles arranged in parade formation. This setup provides a strong visual impact and makes the PLA's modernization very tangible.\n\nIn addition, the coverage of the PLA's joint exercises on the CCTV Military Channel has changed dramatically. Observers have noted that the PLA's new military doctrine appears to be actively implemented. Scenes of armored group charges and naval gunfire are becoming less frequent, replaced by images of PLA soldiers using smart terminals and working with reconnaissance robots. New mysterious heavy weaponry, such as an infantry fighting vehicle with a unique turret and a sleek black aircraft, occasionally appears on screen.\n\nBoth ordinary citizens and veteran officers agree that the PLA has become an impressive force, with its demonstrated combat capabilities increasingly matching its earlier claims."
 china.278.a: "March Forward!"
 china.279.t: "Former General Secretary Jiang Zemin Passes Away"
 china.279.d: "Since the death of Deng Xiaoping in 1997, the Chinese people have once again witnessed the funeral of a paramount leader - Jiang Zemin, former General Secretary of the Communist Party of China, who was born in 1926 and passed away in Shanghai due to multi-organ failure caused by leukemia. The CPC Central Committee, along with other top governmental and military bodies, issued a 'Letter to the Party, the Army, and the People,' announcing the news in a somber tone.\n\nAlthough Jiang was considered to have lived a long life by Chinese standards, his passing still evoked sadness and mourning among the Chinese public. Jiang's tenure as General Secretary coincided with a golden age for China's economy, characterized by a booming cultural and entertainment industry and a rising international status, making him widely remembered. Additionally, Jiang's personal charisma and rare sense of humor as a Chinese leader left a lasting impression. While Jiang will undoubtedly receive a state funeral, his prestige is perhaps better reflected by the people rushing to the gates of his former home in Yangzhou to mourn him in their own way, rather than through extravagant ceremonies."
 china.279.a: "This country may never see someone like him again..."

 news.1922.t: "Anton Alikhanov Elected President of Russia"
 news.1922.d: "Anton Alikhanov, a fervent nationalist, has unexpectedly won the recent presidential election, astounding both domestic and international observers. His victory marks a significant shift, as Alikhanov and his party, National Russia, have long opposed the concept of "sovereign democracy." Their vision for Russia starkly differs from that of other political factions.\nWith numerous problems within the system, widespread discontent with the status quo, and lackluster campaigns from other political contenders, Alikhanov managed to win over a significant portion of the Russian electorate.\n\nAlikhanov, expelled from United Russia for his strong opposition to President Medvedev's liberal reforms, aligned himself with radical rightists. He began with National Russia, eventually taking full control and establishing his own political ideology, "Derzhavism." This doctrine is staunchly anti-democratic and anti-progressive.\n\nNow, many wonder about Russia's future as Alikhanov aims to dismantle the country's democratic foundations. He openly expresses hatred towards perceived enemies both inside and outside Russia's borders. A dark, foreboding storm seems to be gathering within the Kremlin. "
 news.1922.a: "A storm in the system."
 news.1923.t: "Rise of the New Russia"
 news.1923.d: "When Alikhanov took power, it was clear he intended to overhaul the federal system and replace it with a centralized, authoritarian regime. The only question was how and when.\n\nNow, it's obvious. The Federation is no more. In his latest speech, Alikhanov announced that the old institutions were being transformed into the new Russian State. At a massive rally at the Kremlin, hundreds of imperial nationalist flags fluttered. The leaders of the Derzhavnik party urged their followers to embrace the new form of governance.\n\nAlikhanov, now officially titled "Supreme Leader," spoke last. He made threats against both external and internal enemies, declaring that Russia must prepare for a great struggle ahead. He paid lip service to the idea of multipolarity - emphasized the need to protect the way of life of all nations.\n\nHis political opponents while scattered, still ready to fight on, the opposition media services has denounced yet another dictatorial sliding."
 news.1923.a: "Disturbing."
 
 news.1924.t: "Civil Conflict In Russia!"
 news.1924.d: "News from Russia reveals a big uprising against the Derzhavnik government. In Saint Petersburg, the heart of the rebellion, socialists and communists have joined forces against Alikhanov. \n\nDespite skepticism about the uprising's success, this development undermines the state's stability and casts doubt on Alikhanov's popularity. Saint Petersburg has been under a special curfew for many months and this is attributed to as one of the reasons it rebelled.\n\nThe Russian military has chosen to remain within their barracks, refraining from involvement in the conflict to avert further bloodshed. Both sides must rely on their militias and yellow guard battalions, forces driven by ideology.\n\nA dark shadow looms over Russia, as the outcome of the conflict will only sow more instability in the region, whether through a socialist revolution or the expansion of the Derzhavnik terror machine."
 news.1924.a: "Concerning." 
 news.1925.t: "Civil Conflict In Russia!"
 news.1925.d: "News from Russia reports a major military coup attempt against the Derzhavnik government. In Kuban, the epicenter of the uprising, military officers and democratic leaders have united against Alikhanov.\n\nSkeptics doubted the uprising's prospects, but this development shakes the state's foundations and calls Alikhanov's standing into question. Kuban was likely chosen as the headquarters for the coup because it had little activity from Dezhavnik loyalists and its populace is generally apolitical.\n\nMost Russian troops stayed within their barracks, opting for neutrality and avoiding the conflict to prevent more bloodshed. Both sides must depend on their forces and yellow guard battalions, and other groups fueled by ideology.\n\nA shadow of uncertainty hovers over Russia, as the conflict's resolution will only exacerbate regional instability, whether through a fragile democracy or the spread of the Derzhavnik terror apparatus."
 news.1925.a: "Concerning."
 
 news.1926.t: "Russia's Democratic Restoration"
 news.1926.d: "The Moscow report is clear: the Derzhavnik dictatorship has crumbled. Its leaders fled after powerful attacks and daring operations by the rebellious military.\n\nIn the streets, Russian citizens rejoice in the fall of tyranny. But the uneasy alliance of democrats and liberals lacks clear plans for the future after the dictatorship ends. They have yet to agree on who will lead the transitional period, announced immediately after Moscow's liberation. Many seek to reimagine the concept of sovereign democracy.\n\nOn the rebel front, it's now the derzhavnik's low-ranking members, fanatical fascists, who refuse to surrender. They cause panic and unrest in the small regions where their rule remains tenuous.\n\nThe military has given its support to the new government and has already removed the derzhavnik elements that the previous president had imposed on it.\n\nDespite its challenges, Russia has finally entered a new era after a long period of crypto-fascist rule."
 news.1926.a: "Let's hope for the best." 
 news.1927.t: "Russian Socialist Revolution"
 news.1927.d: "News from Moscow: The Derzhavnik regime has fallen. Its leaders, including Alikhanov, fled after a fierce attack by the red militias from the Saint Petersburg uprising.\n\nThe streets of Moscow are filled with jubilation as citizens celebrate the end of tyranny. However, the left-wing coalition remains wary. Sergei Udaltsov, known for his long and dedicated activism, stands out as a key figure in the new government. His widespread respect makes him the most popular choice to lead Russia in the coming days. However, his lukewarm brand of socialism may lead to a variety of paths that Russia can take in the future, and not everyone can be happy.\n\nOn the rebel front, it is now the derzhavnik's lower-ranking members, fervent fascists, who refuse to yield. They sow panic and unrest in the fragile regions where their grip remains tenuous. The military has lent its support to the new government and has already purged the derzhavnik elements imposed by the previous president.\n\nRussia has entered a new era, ending a long period of fascistic oppression."
 news.1927.a: "Return of the October."
 news.1928.t: "Alikhanov Defeats Insurrectionists"
 news.1928.d: "The outcome of the battle within Russia is clear: Alikhanov emerges triumphant, despite all odds. The rebels have been decisively defeated by the relentless onslaught of the Derzhavniks.\n\nOn the streets, rallies organized by the government and state-supported groups erupted with joy, celebrating the victory over what they deemed heartless traitors. \n\nAlikhanov took to the TV podium himself and spoke at length about the situation. He declared that the traitors had risen due to the regime's overly humanistic nature, and that this weakness of tolerance must be purged from all of Russia.\n\nThis event signaled the start of a massive terror campaign against those who opposed the state and had connections with rebel groups. "
 news.1928.a: "Bruised, but not defeated."
 
 news.1929.t: "Russia Attacks Europe!"
 news.1929.d: "The geopolitical situation along the Russia-Europe border has sharply deteriorated, leading to the outbreak of hostilities. Russia's aggressive actions are widely seen as the trigger for these confrontations.\n\nThe Russian government claims its actions are defensive, a preemptive strike against what it perceives as an imminent threat. In contrast, European leaders condemn Russia's offensive as a clear display of imperialistic ambitions.\n\nRegardless of differing viewpoints, it is undeniable that this conflict has brought the war back to Europe. Thousands of soldiers are mobilizing, preparing for a prolonged and bloody struggle. Russia, driven by strong nationalism, is assembling its military might, while Europe is deploying its elite forces.\n\nThis is the war that will determine the fate of Europe."
 news.1929.a: "The final war..."
 
 news.1000.t: "President Nadezhdin Ousted"
 news.1000.d: "Hope had dwindled in Russia when Boris Nadezhdin, an unexpected successor to Dmitry Medvedev's system, faced expected resistance from hardliners and conservatives within the ONF. This resistance ultimately led to his successful ousting from the presidency.\n\nEnter Evgeny Fyodorov, Nadezhdin's harshest critic and the leader of the National Liberation Movement, a marginal yet vocal organization within the Russian state system. Fyodorov emerged as a figurehead for the reactionary opposition to Nadezhdin's reforms.\nWith bombastic and conspiratorial rhetoric, Fyodorov claimed that Nadezhdin was a tool of the still-prevailing liberal globalist deep state within Russia. According to Fyodorov, these agents persuaded a war-weary and exhausted Medvedev to choose Nadezhdin as his successor. The aim was to dismantle the victorious Russia from within, leaving it weak and unprepared for the resurgence of globalism.\nFyodorov mobilized rural and unsophisticated masses with his bold proclamations and calls to action, using his loyal NOD as a tool. Meanwhile, a more devious opposition within the ONF painted him as a champion of the stability and order in Russia.\n\nWhen Nadezhdin erred by overreaching, the ONF swiftly ousted him. Despite some resistance from his supporters in the Duma and on the streets, the loyalist masses and the police were quick to quell anti-government sentiments."
 news.1000.a: "The Empire Strikes Back!"
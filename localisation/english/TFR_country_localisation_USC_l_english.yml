 USC_rally_maga_supporters: "Rally §5MAGA§! Supporters"
 USC_rally_maga_supporters_desc: "Where are my people? I need my people! Our beautiful supporters, so much patriotism and love - love for the country. While THUGS are protesting and slacking off, REAL AMERICANS work hard to MAKE AMERICA GREAT AGAIN.\nWe need to get them on the street; with beautiful signs and posters, and hats - our amazing hats. America needs to showcase love for our democracy."
 USC_spread_counter_propaganda: "Spread §RCounter§! Propaganda"
 USC_spread_counter_propaganda_desc: "Some people just don't know what they're protesting against - against our great rock solid economy, sacred christian values, all the good I've done for american people. Spread the word, we have so many amazing podcasters and orators - send them in, they'll tell them what AMERICA really is about!"
 USC_deploy_militia: "Deploy §YMilitia§!"
 USC_deploy_militia_desc: "American militiamen, our big strong guys, remember when I said "Stand back, and stand by"? Now it's time, folks. Our country is in peril, alright? So many enemies, and some of them are inside our borders! I'll sign a strong and powerful executive order to deputize thousands of militia members to have the same rights as our police force. TEMPORARILY."
 USC_deploy_national_guard: "Deploy §7National Guard§!"
 USC_deploy_national_guard_desc: "I am the President of LAW and ORDER, and there's nobody better to uphold it than our beautiful strong National Guard. Brave men and women, they're simply the best, I love them. Declaring an emergency in a few states is necessary to have these strong soldiers come in and snuff out the troublesome THUGS."
 USC_silence_the_fake_news: "§RSilence§! the Fake News"
 USC_silence_the_fake_news_desc: "This FAKE MEDIA, it's so cruel - spreading lies and disinformation to plunge our nation into a deeper abyss. We won't let them, people, we're gonna do something that has never been done before: we're gonna designate them as what they are - ENEMIES OF THE PEOPLE. That's right: Clinton News Network, The Dying Times, MSDNC - GONE! BYE-BYE, FAKE NEWS!"
 USC_declare_special_emergency: "Declare §RSpecial§! Emergency"
 USC_declare_special_emergency_desc: "Many people don't know, but the President can actually do a lot of things. I'll create a STRONG anti-riot special committee, directly subordinate to ME, where we gonna find a way to deal with those pesty liberals, and we'll do it very quickly. Critics will yell "Anti-Democratic" at me. I'm the one saving our democracy!"
 
 
 USC_reunify_america_decision: "Reunify America"
 
 #Decisions Power Balance
 USC_reject_globalism_decision: "Reject §5Globalism§!"
 USC_reject_globalism_decision_desc: "\n\n\n\n£GFX_USC_reject_globalism_banner\n\n\n\n\n\n              §gAmericanism, Not Globalism!§!                     \n\nYou know, people ask me: "Donald, what's globalism about?", and I tell them: folks, it's not only about men in women sports - totally unfair, by the way, it's about destroying America - actually, destroying every country - EVER. These globalists are terrible-horrible people, they want - hear this - NO BORDERS, NO POLICE, and most importantly they hate you - working people. I'm the only one who can stand up to them, folks. No, really! Thats why they're doing these terrible things here: funding the deep state - they are the deep state!"
 USC_reminiscing_american_order_decision: "Reminiscing About §CAmerican Order§!"
 USC_reminiscing_american_order_decision_desc: "\n\n\n\n£GFX_USC_american_order_banner\n\n\n\n\n\n                 §gPEACE THROUGH STRENGTH§!                     \n\nMy presidency was known for PEACE, you know why? Because all leaders respected us, we had a big army - so big and strong. Around the world, presidents came to me and said: "Thank you, mister President, for keeping us from war!", and I answered: "No problem!". It's all about being tough, but fair, just like my Father used to be.\nLook at the world now, so much strife, America needs to be BACK to GREATNESS, so we have a peaceful world again. These democrats say I wanted to destroy NATO - I saved NATO, they didn't want to pay!"
 USC_save_america_decision: "§RSAVE AMERICA§!"
 USC_reunify_america_decision: "Reunify America"
 USC_pro_con_decision: "Negotiate With §CBureaucrats§!"
 USC_pro_con_decision_desc: "\n\n\n\n£GFX_USC_bureaucrats_banner\n\n\n\n\n\n                            §gBookworms§!                     \n\n§CPencil-necks, flatulent lawyers, office rats§! - you hate them, and §5your people§! do too. But the unfortunate reality of running a big business - or government, is that you need people who understand judicial and constitutional mambo-jambo.\nThey're so naive, thinking you're their next §CReagan§!. You entertain the idea of it, sometimes.\nThe good thing is - they can't exist without you, they put all bets on you. Very poor gamblers, they would lose all the money in your casino. Nonetheless, sometimes it might be better to listen to an arrogant legalist than being stuck with a very rushed decision. Isn't that right?"
 USC_pro_mil_decision: "Mobilize §5The People§!"
 USC_pro_mil_decision_desc: "\n\n\n\n£GFX_USC_the_people_banner\n\n\n\n\n\n                       §gU.S.A! U.S.A! U.S.A!§!            \n\n§5Your People§! - the base of your popularity. Average, hardworking americans. They're treated so unfairly, its unbelievable; forgotten, abused, always blamed for their own misfortune.\nUntil you. You gave them voice - your voice, and they became your main muscle. There's nothing they are not ready to do for you. You always tried to keep your promises to them... But these §Cbureaucrats§! and swamp people... So cruel. They want your people to suffer.\nYou give them power, and they give power to you. Symbiotic relationship.\n\nPresident Trump is not a holy man, but he'll be damned if his lambs are led astray."
 USC_big_coalition_movement_decision: "Build the §CBig Coalition§! Movement"
 USC_big_coalition_movement_decision_desc: "Look around - everyone's here - Latinos, Whites, Blacks - I Love Blacks! The point is - we have such a big coalition, everybody's MAGA, no matter your race or creed - YOU ARE PATRIOTS.\nWomen and men, we got so many good folks: Latinos For Trump, Blacks For Trump, - we even have GAYS FOR TRUMP - I love gay people!"
 USC_ignite_christian_fevor_decision: "Ignite §5Christian Fervor§!"
 USC_ignite_christian_fevor_decision_desc: "My People love God. I love Him too! The bible means a lot to me - the whole thing.\nChristians are unbelievably mistreated, with woke anti-christian agenda in our schools. We need action, God chose me  - I'm the chosen one, this is why we need to mobilize our beautfiul believers.\n\nFight, my amazing christians, you wouldn't have to fight next time!"
 USC_ally_with_superpacs_decision: "§CAlly§! With §YSuper PACs§!"
 USC_ally_with_superpacs_decision_desc: "Listen, there's so many amazing, pretty SUPERPACS that fight for AMERICA FIRST - some of them even called like it - they have so much money. Money we need to MAKE AMERICA GREAT AGAIN. Do not worry, I - Me, Trump - WIll personally oversee transfer of every donation, and will make sure it goes to the good of all Americans, without stealing, no FRAUD, no SCAM."
 USC_squeeze_superpacs_decision: "§5Squeeze Out§! §YSuper PACs§!"
 USC_squeeze_superpacs_decision_desc: "I've been saying it for a long time - SuperPACs are compelete FRAUD. So much money going in - the donors' money - and you have to listen to them, very unfair to normal people like you. PACs are tool of DONORS and SPECIAL INTERESTS to STEAL our democracy into their pockets - and our politicians. That's why they all hate Trump!\nWe're gonna end it, we'll find every penny and bring it back to you!"
 USC_assists_business_decision: "Assist §CBusinesses§!"
 USC_assists_business_decision_desc: "Business - so important to me, you know - I'm a businessman. We need strong market, we need businessmen to get economy working. We'll assist their amazing efforts TO PUT AMERICA BUSINESS FIRST. We need real American spirit enterprises. But keep away from Real-Estate - this one's mine. Just Joking!"
 USC_bailout_blue_collars_decision: "Bail Out §5Blue-Collars§!"
 USC_bailout_blue_collars_decision_desc: "Workers, our beautfiul, amazing industry troopers, they do such amazing job - working hard. Nobody cared about them, so mean, but we gonna fix it. Obama, that dangerous globalist - he bailed out billionaires, this is ridiculous - they've billions, they must pay themselves! We're gonna bail out our amazing miners and others, they gonna love it, believe me."
 USC_repeal_22_amendment_decision: "§RRepeal§! the 22nd Amendment"
 USC_repeal_22_amendment_decision_desc: "Let me get this clear: the 22nd is a complete SCAM! Designed by an elitist cabal of The Swamp to stop people from voting for STRONG and POPULAR presidents - Like ME. IT'S NOT WHAT THE FOUNDING FATHERS WANTED, PERIOD.\nThey called it 'Limitations on Power', we call it LIMITATIONS on SUCCESS. And we want more SUCCESS, don't we?\n\nListen, its all about momentum, if I stop now, we lose it - America loses momentum. WE MUST NOT LET THIS HAPPEN.\n\nWe must REPEAL THIS FAKE AMENDMENT NOW!"

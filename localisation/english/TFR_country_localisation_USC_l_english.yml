 usc.1.t: "America Reunified"
 usc.1.desc: "An all familiar flag is raised above a scarred nation.\n\nMany had wished to see America in ruins forever, an angry mob stomping on the face of freedom forever, and with our nation in great danger and our families in the crosshairs of the enemy, we had no choice but to take the fight to them. America is a beautiful country, and Americans are perhaps one of the greatest people on this earth, we survive and we thrive in times of crisis.\nThis war has taken a lot from us, too many parents that have to bury their children.\n\nWe pulled America out of the depths, ensuring neither the deep state or the terrorists would ever touch our homes again. America is back, but this time it is changed forever, a scar that will never go away.\n\nBut with our enemies gone, and our neighbors being able to love another again, we will be able to rebuild, ruined cities will be restored to their glory, veterans will be honored, past mistakes will be corrected.\n\nAmerica was great.\nAnd it will be great again."
 usc.1.a: "What separates the winners from the losers is how a person reacts to each new twist of fate"
 usc.2.t: "The Denver Crackdown"
 usc.2.desc: "The war has come to the notoriously liberal city of Denver this week as local authorities are converging completely on all leftist dissent from the locals. \"The gloves are off\" one war correspondent from the BBC claimed \"Without respect to the right to assembly, peaceful protests today were broken up by batons and live gunfire, we saw several demonstrators being shot down in the street, and sporadic gunfire can be heard throughout the entire city. Helicopters have been circling all day, the sound of their engines feels omnipresent as the constant dozens of police sirens zipping around the city.\n\nMultiple blooms of smoke can be seen right now in the distance rising from fires lit across the city. To say people are scared would be an understatement, in fact we have many counts today of leftist militant groups fighting back against the authorities although to no avail.\" Violence was especially flaring up of course around the capitol building of Denver, graphic images of dozens of bodies scattered lifelessly across the granite stairs in front of the building spreading across social media, many gunshots from various gunmen returning fire against the police pepper the building too, though there are no reports of dead police yet.\n\nThis unprecedented violence on behalf of the authorities comes in the wake of Trump moving his provisional base of operations out of DC and into the city due to its central position within the country. Around 5 days ago the mayor of the city Michael Hancock was placed under house arrest, and its not yet known who will be appointed to fill in for his position, and obviously the governor of Colorado Jared Polis has been missing the last 2 weeks as well. In the words of Associated Press war correspondent \"The future of the city and of the state remains unknown, but one thing certainly is certain, it is going to get far worse before it gets better.\""
 usc.2.a: "They will never forget this."
 usc.3.t: "Trump announces Denver as new \"Legislative Hall\""
 usc.3.desc: "After Trump's hasty departure from DC word from him has been both scarce and unverified, but for the first time in days the first official claims from him have gotten out to the public. The status of the new base of operations for Trump's side has been up in the air for a little while now, but the questions around where it might be has finally been answered as it will be in Denver, Colorado. However Trump has heavily specified that this should not be considered a capital, but rather a \"Provisional Legislative Hall\" as to not de-legitimize him as the rightful leader of the United States. Almost immediately after this news came out, the Governor of Colorado Jared Polis and his family went missing mysteriously. This news has sparked mass outrage in the heavily leftist city with chants of \"It's our city, not Trump's city!\" being heard across the streets, and of course mass burnings and lootings of businesses. The Denver police are certainly being pushed to their limit with this news as the riots are proving to be more infernal than the ones experienced last summer. At this rate Trump may be forced to take drastic measures to ensure the security of the city."
 usc.3.a: "Fiery, but mostly peaceful, for now."
 usc.4.t: "The Future Of The Government"
 usc.4.desc: "With Denver fully secured by the Trump Administration and the remnants of Congress now comfortably seated, one of the first issues to arise is the status of Habeas Corpus.\n\nSuspended by Abraham Lincoln during the first American Civil War, the military has advocated the suspension of Habeas Corpus in order to effectively drive back the rebel forces besieging the nation and restore the union.\n\nCongress, on the other hand, has expressed its concern over the potential of suspending Habeas Corpus, fearing the act would lead to an erosion of the people's government and allow authoritarian ideals to seep into the government.\n\nWith the war still in its early days and the outcome of the conflict not yet decided, this decision may define Trump's legacy. Shall we go the way of Lincoln and suspend Habeas Corpus or shall the People's government,despite the current crisis, still endure?"
 usc.4.a: "We Must Reestablish Civilian Authority"
 usc.4.b: "The Military Has Our Best Interests In Mind"
 usc.5.t: "A New VP"
 usc.5.desc: "Now that Denver has been secured, we can now decide the future of our Government."

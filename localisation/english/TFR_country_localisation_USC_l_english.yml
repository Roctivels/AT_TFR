 USC_populist_economics_category: "MAGAnomics"
 USC_populist_economics_category_desc: "When President Trump first entered the political battleground, he promised to the people of America that he would put America First no matter what and that promise has not changed. Though America stands divided like never before, President Trump is confident that an economic policy defined by populist ideals remains the best way forward for the nation. War is not won by blood alone. Only through prosperity and growth can America overcome its present woes and be restored to its former greatness."
 USC_department_of_defense_category: "Department Of Defense"
 USC_department_of_defense_category_desc: "\n\n\n\n\n£GFX_USC_dod_category\n\n\n\n\n\n\n\nAs the war for the future of America rages on, rallying the once demoralised people to fight for the future of this country has been a top priority for the Department of Defence. Though the task has been quite a challenge, to ask the average American to take up arms to fight against their former neighbours, the Department of Defence is confident in its ability to rekindle the flame of patriotism in the hearts of the people and mobilise the people to fight in the war for their future.\n\n£USC_rage National Fury: [USC_rage_text]\n£USC_rage Weekly National Fury: [?modifier@rage_weekly|=+1%]"
 USC_congress_category: "Constitutional Congress"
 USC_congress_category_desc: "\n\n\n\n\n£GFX_USC_congress_category\n\n\n\n\n\n\n\nAmerica is under fire from all sides of the poltical spectrum, but under the Constitutional framework we have maintained under the 45th President, we will prove ourselves to be the right government of the once United States. However, Trump's GOP is currently divided between §YLibertarian Republicans§!, §4Populists§!, and §7Hardline Conservatives§!. We must balance the power and keep the loyalty of these three factions to secure stability in the executive office. [USA_faction_league_american_workers_text][USA_faction_techno_rightists_text][USA_faction_libertarian_text][USA_faction_congress_text][USA_faction_military_text][USA_minor_factions_main_text][USС_minor_faction_libertarian_party_text][USС_minor_faction_christian_conservative_text][USС_minor_faction_league_american_worker_text][USС_minor_faction_techno_rightists_text][USС_minor_faction_we_the_people_text][USС_minor_faction_trump_democrats_text][USС_minor_faction_leftists_text][USС_minor_faction_nationalists_text][USС_minor_faction_ultra_maga_text][USС_minor_faction_independents_text][USС_minor_faction_maga_communists_text][USС_minor_faction_megachurches_text]"

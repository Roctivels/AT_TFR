 USC_the_dark_mandate: "The Dark Mandate"
 USC_the_dark_mandate_desc: "All around me - idiots and morons. Can't get anything done. My people, American people are suffering, so terrible - death and destruction everywhere. They need retribution - I'm their retribution, always was; against corrupt politicians, sycophants, limp-wrist conservatives.\n\nAmerica is in trouble like never before, more than the first civil war, that for sure. People need a strong leader, the one who puts them FIRST, who PROTECTS THEM, who GUIDES THEM.\n\nOnce I said - we need to end American Carnage, but now I see - the only way to save America is Carnage of our own. We're gonna have the best Carnage, folks - ever."

 usc.16.t: "Trimming the Fat"
 usc.16.desc: "As the morning sun cast its rays through the office window, illuminating the cubicles and dark hallways of the government building, Sean McCarthy sat at his desk, his fingers tapping nervously on the keyboard. For years, he had been a dedicated bureaucrat, working as a document processor in the Colorado Springs area, which had been crucial to the Constitutionalist government he was serving under. He had been in this job well before the Civil War, and didn't necessarily support any of the candidates, only working to put food on the table. Every day was the same; he logged onto his computer, doing needless administrative work, manual data entry and routing documents through various channels, before filing the paperwork on his desk and clocking out. He slumped over in his chair, listening to the sound of his computer fan as he filed through the forms and reports on his desk.\nBut today was different. Today, McCarthy found himself facing the unthinkable: termination. The letter of dismissal lay on his desk, as he stared in disbelief. All the work and effort he thought he had put in, reduced to nothing with the stroke of a pen. He glanced over the document, noting that it had been addressed to Mathias Yang, the Chief Administrative Officer. With a heavy heart, McCarthy rose from his chair and made his way down the familiar corridors, each step being marked with uncertainty. As he reached the office of his superior, McCarthy's palms grew clammy, and his pulse quickened.\nEntering the office, Sean found Mr. Yang seated behind his imposing desk, his stern expression betraying no hint of emotion. \"Sean,\" he began, \"I'm afraid we have to let you go.\" The words hit Sean like a truck, as he remained silent, clenching the letter of dismissal. Mr. Yang sighed heavily, continuing to speak. \"It was a very hard decision, Sean. The bureaucracy across our country has slowly slipped into inefficiency, corruption, and has become wrapped in red tape.\" he replied, clearly reading from some sort of script. \"While you were a great worker, the manual paperwork you've been doing has no purpose anymore. Simply put, we cannot afford to carry the dead weight, and we are.. trimming the administrative fat and cutting the red tape, so to speak. Please turn in your letter of dismissal and gather your belongings.\"\nSean did as such, shuffling out of the office, never to return."
 usc.16.a: "Don't let the revolving door hit you on the backside."
 usc.17.t: "The Trump Amendments"
 usc.17.desc: "Today, President Trump has decided to confide in his top advisors regarding the proposition of five new Amendments to the Constitution, collectively referred to as the \"Trump Amendments\". The first, which if ratified would become the 28th Amendment, proposes the establishment of a nationwide gubernatorial term limit of two terms, with only 36 states in the Union having such a limit. This Amendment also repeals the 22nd Amendment, allowing for an unlimited amount of Presidential terms. This is likely to be extremely controversial when brought to Congress, though the Amendment is likely to be ratified by both Houses. The next Amendment would constitutionally outlaw lobbying, overruling Citizens' United v. FEC. This is bound to be challenged by both State conventions and Congress, though it is likely to be accepted if those loyal to our President pull through nationwide. Donald Trump and the Republican Party have advocated for a Balanced Budget Amendment for years, and now they have finally decided it is time to act on it. Such an Amendment would require that a state cannot spend more than its income. This is, of course, very likely to be ratified.\n\nAnd for the last two, which are arguably the most important, Donald Trump has proposed an Amendment outright abolishing government bureaucracy. For years, overextended and overreaching bureaucrats were dismissed by our government, with it greatly increasing administrative efficiency. While this has had negative effects, it is clear that reducing the bureaucracy is not enough, and we must abolish it. Trump proposes that the abolition of bureaucracy through an Amendment would streamline decision-making, increase flexibility, enhance innovation, and reduce administrative costs. Finally, the last Amendment proposed by Donald Trump would give the military, as well as instated federal militias, the responsibility of \"re-establishing a government loyal to the American people\" in the case of the Constitution being betrayed. In other words, the direct overthrow of the American government if the Constitution is violated. This has been left vague in its writing and is bound to be the most controversial Amendment proposed by far. Such an overthrow would be non-violent unless necessary otherwise, with this Amendment acting as the ultimate vanguard of the Constitution."
 usc.17.a: "\"Bring them to Congress.\""
 usc.18.t: "Reporting From The Frontlines"
 usc.18.desc: "\"Good evening, FOX News, this is Vicente Cobb reporting from the frontlines in Illinois. Niantic, once a promising rural settlement, now has been devastated by Biden's war machine.\" The camera angle was lifted from the trench to a view of the sporadic fighting, as well as a ruined neighborhood. Childhood homes were reduced to ash and rubble, and bodies littered no man's land for as far as the eye could see. The camera barely got a clear shot through the mud and barbed wire, eventually being lowered back. Cobb stood eyes length to the camera, being decorated with the usual combat attire worn by reporters across the nation. Three soldiers were in view, one was manning a turret and the two others were shuffling through the cramped space, bringing supplies back and forth. The soldiers did not seem to pay much attention to the film crew.\n\"Despite their best efforts to break our spirits, both at home and on the battlefield, our men have been fighting day and night for your liberty.\" The man gestured towards the soldier, before continuing; \"Despite the setbacks we may have faced, here in particular have our victories been shown to the world. Biden's commanders have been directing countless assaults, needlessly wasting the lives of more Americans to no avail. The only question people ask is: how did anyone ever support him? While that question is still up for debate, one thing is clear: the might of the American spirit has triumphed in the past, and will triumph in the future, no matter how the liberals in Washington try to subvert us.\"\n\"At 7 PM, we'll be broadcasting the story of Malaki Howell, a soldier who volunteered to give up everything to protect his liberty and family from the warmongering Democrats. We will also be continuing to update you live from Niantic, detailing everything the so-called Unionists have done to destroy said Union, and this is only one of many recordings h-\" He was interrupted by the sound of an artillery shell impacting the ground 6 meters away from the trench. He looked over in concern, before continuing to speak into the microphone."
 usc.18.a: "A great service."
 usc.19.t: "No Mercy For Traitors"
 usc.19.desc: "The criminal Mark A. Milley was demoted to the rank of private and given a dishonorable discharge before a noose was slipped over his head Friday morning. His medals and ribbons, many of which were unearned and self-awarded had been rescinded.\nLike all GITMO detainees scheduled to hang, Milley was offered a last breakfast, which he declined. He said his accomplishments as a patriotic officer had filled his stomach and soul with enough sustenance for a lifetime. However, he requested a safety razor to shave his stubbled face.\nAt 10:00 a.m., three MPs escorted him from medical, where he had a pre-execution physical, to the gallows where Adm. Crandall stood among a group of officers standing for their respective Armed Forces branch, and an unnamed civilian dressed in a blue suit with a red tie."
 usc.19.a: "No mercy for traitors..."
 usc.20.t: "Trump Addresses the Nation"
 usc.20.desc: "As Trump began emerging from backstage to take the podium, he saw crowds upon crowds of people waving the familiar stars and stripes chanting \"USA\" and \"TRUMP\" as far as he could set his gaze on. He felt as if almost all these past few years were nothing but a sick and twisted nightmare in his head, but in reality, despite all odds being against him, he reclaimed his nation piece by piece, and now he was America's liberator. Even though he knew at the back of his head that there was still much to be done, he proceeded to the podium, as the crowd erupted into chanting his name\n\nAt that moment, Trump felt a surge of emotions as he heard the crowd erupt to cheer for him, as he took the podium, he let the chants die down on their own, but at the same time hyping the audience up before starting his speech.\n\nHe began by stating the country's rebirth upon winning the civil war, and the current struggles and problems facing the unified nation, before saying the following:\n\n\"Since the establishment of my Denver administration in the wake of the democrats trying to overturn the election, our armed forces, our fellow patriots, have fought tooth and nail to secure our lands, to liberate America from these crooked and corrupt villains\"\n\n\"The Marxists, the Fascist and the Liberals, have all tried to surround us like vultures. But despite their best efforts they have once again in spectacular fashion failed to destroy our country\"\n\n\"Our nation has been left in the rubble, but WE have once again emerged from that rubble, and once again proved to the rest of the world, that AMERICA, CANNOT BE DEFEATED\"\n\nA enthusiastic crowd erupts in cheers and in patriotic chants.\n\n\"And now with our enemies defeated and with you at my side we will start rebuilding our great country, and build it bigger and stronger than has ever been thought possible. We will once assert ourselves and a cradle of freedom and democracy\"\n\nAnd with familiar but powerful words, he ended his speech by saying\n\n\"We WILL make America great again, we will make it strong again, we will make our country safe again, God bless the United States, God bless you!\""
 usc.20.a: "And make it great we shall!"
 usc.21.t: "A New Apprentice"
 usc.21.desc: "President Trump: Ted! My great man, thanks for coming in. I'd like to talk about the future and the direction we're headed. It's time for some Renovations.\nTed Cruz: Mr. President, I'm always ready to support the party and your leadership. What are we talking about?\nPresident Trump: Well it's about the Senate, Ted. We need good people, I need a completely united effort for the war and my agenda 'for winning the war of course... It's crucial for what's coming next.\nTed Cruz: Sir I understand the importance of unity, Sir. I've always strived to work towards the... uh goals, Sir.\nPresident Trump: I know you have, Ted. But this is a critical time for us. We need more than just unity; we need unwavering commitment and a specific kind of energy. That's why I'm here to ask you to step down and make way for a new candidate I have in mind.\nTed Cruz: Step down, sir? But I've been for the cause... our causes sir, and my... uh people have had me with their representation and support. This is quite unexpected.\nPresident Trump: I know it's a lot to ask, Ted, but it's for the greater good. We're at a turning point, and sometimes we need to make tough decisions. Have you read the Art of War by Sun Zu?\nTed Cruz: I'm trying to understand, Mr. President. But stepping down is a significant move. What about the support I've garnered over the years?\nPresident Trump: Hmmm, supports, well Ted your efforts haven't gone unnoticed, Ted. But this is about the bigger picture, my long-term vision.\nTed Cruz: Your vision, sir? That's a term. What is the vision? Sir.\nPresident Trump: It's precisely the future of the country.\nTed Cruz: I need to take some time to think about this, Mr. President. It's a lot to process, and we have factors to consider, including the wishes of the people who voted for me."
 usc.21.a: "Okay"
 usc.22.t: "Law and Order"
 usc.22.desc: "On a cold morning, outside one of the many apartments in Denver, a team of special forces was preparing to breach a room. Intelligence had told them that around 5 or so insurgents loyal to the Unionists in D.C. had their HQ there. And as they were waiting to breach, they checked the time, switched firing modes on their guns, and made sure their radios were on. And then, high command gave the order.\nWith a click of the detonator, the door flew off its hinges, landing inside the room. Now the special forces were walking in and had already spotted combatants running into the separate sub-rooms. The team was then split into two sections, one was the blue team, and the other was the red team. The blue team went first, breaching the door to the bathroom with a kick and yelling at the insurgents to get down. Then the red team breached the door into the bedroom with a shotgun, coming immediately under fire, causing the lead man to get injured.\nImmediately returning fire, the red team assaulted the room and cleared it, killing the insurgent that injured the lead man. Now with all combatants arrested the team radioed HQ, and requested evac. Searching the apartment room, a soldier found the location of around 3 other insurgent cells, he radioed his findings to HQ, and then met up with the rest of his squad who were waiting outside for the local MPs to deal with the aftermath."
 usc.22.a: "One down, three more to go."
 usc.23.t: "Bombarding the Headquarters"
 usc.23.desc: "As the sun fell below the horizon, casting long shadows across the plaza, Leon Sterling sat at his desk on the 9th floor of 30 Rockefeller Plaza, the rhythmic clatter of keys echoing through the office. It had been a long day, filled with deadlines, meetings, and the constant hum of activity that permeated the newsroom. Ever since the start of the Civil War, MSNBC had been in overdrive to cover the \"many sides and stories\" of the war. Or, at least that is what they preached. In reality, MSNBC had been relegated to a puppet of the Unionists, constantly attacking President Trump at every possible corner and serving as one of the strongest media wings of the \"Union\" of America. As he shuffled out of his cubicle, he couldn't help but notice the wailing of sirens outside, and so did his coworkers. He stepped over to the window, his eyes widening as he saw a group of armed men storming into the plaza below. Clad in camouflage gear and brandishing rifles, they moved quickly and intently, advancing through the streets below and breaking into the media building.\nHe stumbled backward, his mind racing with fear and disbelief. Of course, ever since the Constitutionalist takeover, MSNBC had been under scrutiny, though a violent break-in? Despite not getting a good view, the men below definitely had a resemblance to the many militia groups aligned with Trump's government he was familiar with. Sounds from below indicated a struggle, such as the stomping of jackboots and inaudible yelling. His coworkers began to panic, either hiding under their desks and cubicles or rushing through fire exits and evacuating. He decided to remain, shuffling back into his cubicle and watching the entrance from the stairs. As he was dialing 911, the entrance door swung open as 9 men in paramilitary uniforms entered, swinging their rifles around as they yelled at everyone to get down. The logo of the Oathkeepers was plastered across their vests, as they began detaining media workers and even smashing equipment, breaking expensive film sets as they marched through other parts of the 9th floor.\nThis hostage crisis would continue for 3 hours until the NYPD was able to negotiate a settlement at President Trump's behest after the plaza was thoroughly looted, wrecked, and pillaged. Ever since the raid, MSNBC has officially dissolved, with it unable to continue spreading lies and attacking the President's administration. The Three Percenters have also announced their support for the attack, with membership in the Oathkeepers and III% surging after the incident. Conspiracies of it being sponsored by the NYPD or even the President have been circulating, though these are, of course, unfounded."
 usc.23.a: "Cool"
 usc.24.t: "Extinction of the Democracy"
 usc.24.desc: "\"Moments before I took this stage, I issued an order confiscating all of the property of the Democratic National Committee; across the country, hard and soft assets, all the hard assets have been seized by law enforcement officials. The criminal organization that led the horrific and unjustified attack on the rights of the American people for many long years, who helped the old, sleepy tyrant Joe Biden attack our wonderful Constitution has been thoroughly, and irreversibly-destroyed.\"\n\"I believe in Democracy, it's a great thing. But they way the Democrats were doing it? Stealing the election from me, killing countless, that means so many we can't count, people, trying to use the fake-news media to imprison the minds of the people? They didn't play by the rules, they didn't act fairly. Now I'm a big believer in a thing called 'reciprocity' it's a really beautiful, meaningful word. It means 'you scratch my back , I'll scratch yours, that's how Deals are made. I'm a dealmaker at heart. But there is a time when some people don't want deals, they want to steal and destroy. That's the Democrats, I tried working with them for four years, then they tried to kill me. Well let's face it folks, I can't take that lying down.\"\n\"Y'know folks, y'know something, these Radical Democrats weren't just after me, they were after the Constitution, and all of you. That's why they're gone. The Democratic Party is over folks. All of their money? It's ours now. It's the peoples' money. I'm sure our wonderful friends who are vacationing in Europe right now will say, 'but Mr. President,who will all of the Democrats vote for? How will you lead the people who supported sleepy Joe?' Well I'll tell you, they were lied to, hypnotized by the Democratic machine. Well I turned that off folks. They'll come around now, you'll see.\"\n\n-Remarks by President Trump following Executive Order 14,108, which dissolved the DNC and nationalized its assets."
 usc.24.a: "The Party of Jackson, Roosevelt, and Kennedy falls"
 usc.25.t: "Lofty Goals in the Legislature"
 usc.25.desc: "The American Constitutional Government's Congress never seemed to outgrow some of the issues that plagued the pre-war American Congress. The provisional legislature, though now composed of more ideologically-aligned politicians, still seemed to bicker and stagger over almost everything, especially when it came to the encroaching influence of the armed forces. Donald J. Trump, being the man with the ultimate say between both competing branches, had come to Congress to assure them some sorely needed peace of mind when it came to the state of affairs with the military.\n\nThe off-schedule meeting between Trump and key party figures in Congress often went the same way as it did in the days before; plenty of discussion on war spending, the situation at the front, and other menial yet simultaneously critical paperwork for the day. However, today was not about just submitting paperwork, as Trump had to finally address the elephant in the room. \n\"Gentlemen, I know that certain issues with our military staff have preoccupied your minds for a while now. I am here to make some important things clear to you all.\"\n\nFor once in their careers, the representatives in the room now looked on and listened attentively. Addressing an internal conflict out loud was surprising, but the commander-in-chief told it like it was. \"I can fully assure you that the foremost constitutional principles of our government will be upheld. I have already spoken to General Michael Flynn, and he is very well aware that the military's role is very clearly defined by our rules and regulations.\"\n\nAs the rest of the representatives murmured and discussed in the background - some in full agreement, others confused or quiet - Trump looked for any discernible response. Kentucky Senator Rand Paul, the de-facto Congressional leader, was the first to speak up - \"Mr. President, myself and I'm sure much of this assembly greatly appreciate this affirmation of the rule of law. I do hope that the army and general staff likewise understand our role here as a legislature as much as you do.\" As some applause began to trickle in, Trump did not respond immediately, but merely thought to himself."
 usc.25.a: "\"I hope so too, Rand\""
 usc.26.t: "A Reminder of Patriotism... and Loyalty"
 usc.26.desc: "The meetings for the day went on as expected for Trump; more bickering and complaints about who did what this time. Trump, now slouched back in his office, once again began looking through the letters sent to his official mail inbox. No matter what president Trump did for either side, it seemed that there was always another issue that needed some kind of favoritism on his end for Congress or the military. If the presidency did nothing to find any kind of solution, then who knows what either side might do once they had a firm upper hand. Now clearly irritated with the volume of requests and demands, a single thought now reverberated in his mind. A clear message needed to be sent to everyone that he would not stand by and be merely a Ficus plant; intrigue will not run wild and destroy the state from the inside.\n\nRegardless of what Congress or the armed forces wanted, they needed to learn that everything could function only if they stuck to their work. It no longer was necessary to simply feed the demands of one side or the other; but now they must be reminded of whom their Commander-in-Chief is and what is at stake for everyone. Every instance they give in time and resources to this silly infighting, the communists, the anarchists, the criminals, and the traitors in Washington come closer and closer; this notion almost drove him crazy. True patriots of a nation do not give into such petty attempts to outdo each other but instead do what needs to be done to win the war; to make America great again. Trump, looking up from his pile of paperwork, observed the pictures and flags on his wall and began to ponder. As long as he was everyone's President and Commander-in-Chief, he would be doing his hardest for patriotism to win over personal intrigue. He was elected to defeat the Liberals, defeat the deep state, defeat the establishment politicians, and to make America great again. He then picked up some paper from his desk and began writing down some notes for the next set of letters he had to write back."
 usc.26.a: "\"A balance must be struck, for America's sake\""
 usc.27.t: "The Head of the Hydra"
 usc.27.desc: "If there is anyone in the American Constitutional Government that knew everything about everyone in the armed forces, it was General Michael Flynn. Before the war, he was one of Trump's most loyal confidants in his administration and gladly went along with him to Denver to continue the patriotic struggle. However, his efforts to consolidate and accumulate the influence of the armed forces within the American Constitutional Government has caused serious issues with Congress and the presidency. Today however, Trump was going to finally settle some things with his most patriotic soldier.\n\nIn a similar fashion with his meetings with individual members of Congress, Trump met with the general in one of his personal offices for all... \"confidential\" matters. Today, however, was beyond just confidential, but instead would influence the future of the government itself.\n\n\"General, I first want to say that I feel quite proud of everything you have done to defend this country and our cause. Your patriotism is something to be highly respected. However, there are just some very important things that you need to consider with everything\" Trump stated to the general.\n\n\"Thank you, Mr. President, but I want you to get to the chase if you can. What exactly is all this beating-around-the bush that has been going on? Just get to it.\"\n\nTrump cleared his throat and began to speak, \"General... the armed forces have become a major issue where their constant effort to outdo Congress is making some heads turn. This cannot continue. I need you and your compatriots to know about your constitutional duties and where the lines of all our jobs are here. This coming to you not as Donald Trump but as your Commander-in-Chief\".\n\nThe general sat and thought for a while, taking in Trump's strong sentiments while Trump sat to see what the general would do next. Regardless, Trump thought at least he got the message of what he wanted."
 usc.27.a: "They must know who they serve..."
 usc.28.t: "Reporting From The Frontlines"
 usc.28.desc: "\"Ol' Joe's troops are getting stopped up in Nebraska, at least from my hearing.\"\n\"With the Lightfoot people in charge, hmph, unlikely.\"\nThe Smith family was one of the many large extended Kansas clans that came together under one roof nearly every Christmas, and the members of the family, so spread out among the classes and political groups of America had always entered with a feeling of legitimate warmth and familial kinship, only to leave with a bitter and cold sense of relief at leaving unpleasant relations to their own idiotic opinions. That was what it was like even before the war, now, amidst all of the conspicuously empty chairs, the uncomfortable acknowledgements of relatives across every region of the disunited States, and the barely hidden cursing of relatives who went to fight for other sides, the Smith family seemed less and less idyllic.\n\n\"Frankly with all of those morons in Denver hissing lies into Trump's ears, I won't be surprised if we're flying the Unionists flag next Christmas.\"\nOne man chuckled grimly in the corner. His cynical outburst  only got him a few glares and worried glances from his relatives.\"\"Never mind Nebraska, think of the South! We've let an entire region of men loyal to our cause get torn apart!\"\n\"We only have so many resources.\"\nTwo of the chief debaters, a younger, bearded man and an older, shrill and grey haired patriarch barked at each other incessantly over the Turkey. Over the night the family had ensured they had been pushed to the very furthest part of the table, but their conflict rose over the table and forced many to be combatants nonetheless.\n\"Don't insult our leaders like that, they're the loyal ones, who stuck with Trump through the worst of it, and now you throw mud on them for not sending troops to die for Alabama?!\"\nThe young man bellowed suddenly. The old man seemed taken aback for a brief moment, before resuming the offensive.\n"
 usc.28.a: "\"Tell me boy, what those precious leaders think about massacres of civilians by feds in Carolina, or the church bombings, or the mass killings In Mississippi...\""
 usc.29.t: "Reporting From The Frontlines"
 usc.29.desc: "TODO Wartime censorship has been and a reporter gives a brutal account of the frontlines"
 usc.29.a: "Bruh"
 usc.30.t: "Marshalling the Military"
 usc.30.desc: "Ever since the onset of the conflict which has plunged our nation into devastation and chaos, one thing has become increasingly clear: the state of our military is in shambles. While we have the loyalty and trust of most foot soldiers, veterans, as well as the apparatus of the Marine Corps, we are significantly lacking in trusting generals and officers, with the corrupted High Command fleeing to Washington, because they know Biden is the only man willing to keep them in power. Despite our lack in numbers, it is made up for by experience and loyalty to the cause; Michael Flynn, John Hyten, and John Raymond come to mind, all patriots of the highest degree who have served with the President since the beginning. These men have split from the deepstate driving America into the ground, and they know what is right. Of course, though, with every forming Army, there is a power dynamic between the professional, well-trained fighters of the United States Army, and those who are in our militias. If we end up not handling this balance carefully, or concede too much power to the military, it may end up in disaster.\nIf we are to see victory over the traitorous Democrats, the Communists, and the separatists tearing our nation apart limb by limb, then we must effectively utilize our military and rebuild it from the ground up. Repairing factionalism in our ranks, creating a new apparatus that values efficiency, loyalty, and patriotism, and retaking our cities from the leftist hordes that seek to dismantle our Republic. The military is one of our greatest tools, and we should use it wisely. After all, politics are a fickle game, especially when the Army is involved..."
 usc.30.a: "Semper Fi."
 usc.31.t: "A Desperate Brainstorm"
 usc.31.desc: "Trump was in a meeting room early in the morning with some of his top generals and advisors. An urgent meeting had been called to devise a strategy for the war against the government in D.C. After only 15 minutes the meeting was all but over and Trump was about to end it.\n\"Flynn, I hold you to a very high standard, now it is time for you to prove to me that my standards are not brought down, I need ideas from everyone you know. That goes for all of you as well. Dismissed!\" Trump said speaking to the occupants of the room.\n\"Yes sir, Mr. President.\" Said Flynn.\nNow sitting alone after everyone had left the room Trump thought to himself about the situation he was currently facing. Even when he was relocating his government to Colorado, he didn't think something like this would happen, that the glorious US would fall into such a state of anarchy. Now he had to deal with a situation that threatened his life in all ways. As he thought more, he started to become optimistic about his situation. Maybe if they held back the armies of Biden and his crooks, they would be able to get a foot over the government in D.C. Maybe if we reformed our armed forces to fit our situation better, we could fight more effectively. Maybe...\nBut before he did any more thinking he realized something. The nation needed him, he couldn't be sitting at his desk doing nothing, this was an urgent situation, and the people needed him the most.\n\"Maybe, just maybe, a little Diet Coke might help me wake up.\""
 usc.31.a: "\"That'll be $1.60, Mr. President.\""
 usc.32.t: "The Refounding Father"
 usc.32.desc: "Ever since the beginning of the Civil War, there had always been an association between the early American revolutionaries, who had overthrown their repressive English colonists and founded a Republic based on liberty and nationality, and the Minutemen of the Constitutional Government that fight with relentless vigor to overthrow the tyrannical, overreaching Government and the elites, who had sowed division and discontent in the hearts and minds of the American people. They shared the tradition of revolution, a mindset that encouraged struggle and perseverance in the national spirit. An America unshackled from the nature of globalist agendas, that has controlled both the nation and the people for so long. An America where the voices of hardworking Americans would once again be heard above the din of special interests and bureaucratic elites who do nothing to help the people. Who would lead the people to their revolution, as George Washington did so many years ago? That would be Donald J. Trump, of course.\n\nFrom the very start, he has promoted an America where the values of freedom, individualism, self-reliance, and conservatism are victorious over those who seek to take them away. Drawing inspiration from the Founding Fathers' vision of a nation built on the principles of limited government is the only way to emerge victorious over the Democrats and build a new America, and Trump knows this. He has outlined his plans to cut bureaucratic red tape, slash taxes, and unleash the full potential of the American economy. The revitalization of American industry, an end to insurrection, and the establishment of law guided by the Will of the People. Every American is a revolutionary, and this should be reflected in our policies and the Armed Forces. The noble and righteous cause is being threatened, and we must not let it falter. As Washington triumphed at Yorktown, on his own soil, so too will we emerge victorious through blood alone. There have already been several Minutemen brigades trained, who will act as the backbone for militias fighting on the front, being highly mobile, loyal, and specially trained for surgical operations. These men will surely promote and spread our cause, and we must continue to push these ideas and promote revolutionary nostalgia if Trump's vision is to be fulfilled and he claims his rightful place as a Refounding Father."
 usc.32.a: "Hail to the chief."
 usc.33.t: "Coming Full Circle"
 usc.33.desc: "As Donald Trump's MRAP wound its way through the streets of New York City, the once vibrant metropolis lay in ruins, ashes scattered in every street and the leveled remains of buildings as far as the eye can see. The skyline, once characterized by towering skyscrapers, was now obscured by a thick shroud of smoke and dust. Trump Tower, his most prized asset, stood battered and broken, a once beautiful condominium that overlooked midtown Manhattan now marred by gaping holes and charred remnants. The sight struck Trump to his core, as he couldn't help but remember when he had overlooked its construction and the Grand Opening all the way back in the 80s. It was a reminder of the devastation wrought by the war that had engulfed the nation. His heart heavy with sorrow and regret, he gazed upon the wreckage of his birth city, feeling a profound sense of loss for what had shaped his career and pushed him into the political landscape.\n\nAfter a few gestures to his driver, he stepped out of his vehicle and watched the scene before him. Trump's emotions began to overwhelm him, as he realized that his beloved city, his empire, had been reduced to rubble. For a fleeting moment, he considered the possibility of salvaging what remained of the Tower, of rebuilding what had been lost, reclaiming the old conglomerate that guided him through his life. But then, with a heavy heart, Trump made his decision. He turned his back on the ruins, leaving behind what remained of his former life. In that moment, he realized that there were greater battles to be fought. His country needed him, and he was the only man capable of protecting it. He walked away from the devastation, back to his entourage as his thoughts turned to the nation he had sworn to defend, to the people who looked to him for guidance. Victory, he knew, was within his grasp, and he must stop at nothing to achieve it. He shuffled back into the vehicle, setting his sights to the future as it drove off."
 usc.33.a: "And that is what the country needed."
 usc.34.t: "A Throne Reclaimed"
 usc.34.desc: "As Donald Trump's convoy rolled through the gates of the White House, he couldn't help but feel a surge of mixed emotions wash over him. After years of turmoil, strife, and bloodshed, he finally returned to the seat of power he had fought so hard to reclaim. Yet, the weight of the Civil War still hung heavy on his shoulders, and so too did it show in Washington D.C. The White House was mostly unharmed, though it was unkempt, and certain parts were very clearly charred. As he stepped out of his vehicle and gazed up at the building from which he had sat only years ago, Trump couldn't help but marvel at the resilience of the American spirit. Despite the devastation and destruction brought on by the war, the White House stood tall and proud in defiance of the chaos it had suffered through. It had only been a week after the liberation of the city from the Democrats, removing them from the seat of power and winning their largest symbolic victory yet. Luckily, the city had long been cleared, and Trump was here to stay this time.But as he left his vehicle and entered the building, he was overcome by a profound sense of melancholy. The memories of the war, of the conflicts fought and the lives lost, the patriots who were gunned down in the midst of battle, flooded his mind. Yet, amidst the suffering, he also felt a glimmer of hope. Hope for a future for all Americans, one that would act as a shining beacon enduring under his leadership, one that would never fall to division ever again. As he made his way through the white corridors, surrounded by portraits of the Founding Fathers, Trump vowed to honor the sacrifices of those who had come before him and to never forget the price of freedom. And as he settled into the Oval Office, surrounded by his advisors, he glanced around, sitting in the Presidential chair. Of course, the road ahead would not be easy, nothing in Trump's life had been easy. It was all shaped by hard work, dedication, and his iron will; one that had stood the test of time."
 usc.34.a: "The Chief returns, and this time he stays."
 usc.35.t: "Marco Rubio Appointed Vice President"
 usc.35.desc: "As the Second American Civil War rages on, our President has made a historic announcement that will dictate our government's policies for years to come. Donald Trump has appointed Senator Marco Rubio as his Vice President, signaling an end to the recent power struggles that have consumed the Constitutional government. Rubio, known for his staunch conservative values and support for Trump's agenda, despite his clash with the President in 2016, and his eventual defeat after losing the Florida primary, has come to embody the spirit of Trump's populist movement even if he has gone relatively under the spotlight. With his appointment, Trump has effectively entrenched the values core to his ideology into American governance for the foreseeable future.\n\nIn a statement earlier today, Rubio stated that America will continue to prioritize the interests of its citizens above all else, as well as continuing to unite the Grand Old Party against both internal and external adversaries through the means of populist traditionalism, preached by Trump himself ever since his first inauguration, making it clear that this brand of conservatism will remain at the forefront of the government and the Republican Party. Trump has congratulated his new Right-Hand Man, and has publicly stated that he is \"the best man for the job\", and the only one who can \"defend American values and tradition as I do\". This has seen an outpour of support from the American people, and Rubio is slated to give his inaugural address in a month."
 usc.35.a: "Let's see what he can do."
 usc.36.t: "Rand Paul Appointed Vice President"
 usc.36.desc: "As the Second American Civil War rages on, our President has made a historic announcement that will dictate our government's policies for years to come. Donald Trump has appointed Senator Rand Paul as his Vice President, signaling an end to the recent power struggles that have consumed the Constitutional government. Paul is known for his staunch libertarian values, espousing ideas of a small government that have not been left unheard in recent times. Despite his many clashes with the President, he has become one of the most powerful men in the Constitutional government, acting as the figurehead of several militias, and has embodied recent shifts in the GOP towards libertarianism. With his appointment, he has effectively entrenched the values core to his ideology into American governance for the foreseeable future.\nIn a statement earlier today, Paul stated that America will continue to prioritize the interests of its citizens above all else, especially over infringement by corrupt government authorities, as well as continuing efforts to \"End the Treading\", which has practically become his campaign slogan to the dismay of many of his colleagues. Ever since Trump's first inauguration, he has flirted with the ideals of libertarianism, especially during the COVID-19 Pandemic, though has always been viewed as more authoritarian, making this appointment quite a surprise. Trump has congratulated his new Right-Hand Man, and has publicly stated that he is \"the best man for the job\", and the only one who can \"defend American values, traditions, and the rights of the people\". This has seen an outpour of support from the American people, and Paul is slated to give his inaugural address in a month."
 usc.36.a: "It's time for some change."
 usc.37.t: "Michael Flynn Appointed Vice President"
 usc.37.desc: "As the Second American Civil War rages on, our President has made a historic announcement that will dictate our government's policies for years to come. Donald Trump has appointed Lieutenant General Michael Flynn as his Vice President, signaling an end to the recent power struggles that have consumed the Constitutional government. Flynn is known for his martial prowess, acting as the top Field Marshal for the military and a unifying commander. Despite having been fired from his position as an advisor within the first 20 days of the Trump Administration back in 2016, he left retirement to lead the Constitutional government's military, acting as the figurehead for the Army's political wing, and has embodied recent shifts in the GOP towards authoritarianism. With his appointment, he has effectively entrenched the values core to his ideology into American governance for the foreseeable future and strengthened the position of the Armed Forces.\nIn a statement earlier today, Flynn stated that America will continue to prioritize the interests of national defense above all else, as well as continuing efforts to maintain Law and Order, which has practically become his campaign slogan to the dismay of many of his colleagues. This has bewildered many in the country due to Flynn's status in the Army, though this is not entirely unprecedented. Trump has congratulated his new Right-Hand Man, and has publicly stated that he is \"the best man for the job\", and the only one who can \"defend American values, traditions, and order\". This has seen an outpour of support from many Americans, though concerns have been raised regarding the growing influence of the military, especially by Congressional libertarians, but these concerns have largely gone ignored. Flynn is slated to give his inaugural address in a month."
 usc.37.a: "Order is what this country needs!"
 usc.38.t: "A Relatively Expected Meeting"
 usc.38.desc: "President Trump had entered the meeting room with his high command. Recently, reports had come in from the frontline that Biden's forces had routed many brigades and were pushing into Constitutionalist land. A meeting was called with the Constitutionalist high command to discuss the situation.\n\"Mr. President, you wanted us,\" said Flynn.\n\"Yes, Flynn, I did. Apparently, the liberal army is routing our forces on the frontlin-,\" said Trump before he was interrupted by John Raymond.\n\"Sir, if I may, we can easily compensate for this. It wouldn't be hard to get off the back foot currently,\" said Raymond.\n\"I know that Raymond. Don't worry. All I'm asking for is that we get our routing forces reorganized. We all knew we wouldn't have an easy fight here. After all, hard times make heroes.\"\nDuring the meeting, Trump and his field marshals discussed strategies, sabotage, delayment, and everything else to start turning the tide on the frontline. Overall, it was a relatively calm meeting. All of the Constitutionalist high command had been warned beforehand that they would most likely experience losses on the first days of war and that they should focus on recovery instead of counterattacks.\nBy the end of the meeting, Trump's field marshals felt relatively accomplished by what they had discussed. However, Trump still had a nervous feeling about what was to come. As he got up to exit the room, he reassured himself."
 usc.38.a: "\"Hard times make heroes.\""
 usc.39.t: "An American Resistance"
 usc.39.desc: "Trump had called another meeting, this time it wasn't just him and his field marshals, but instead him, his field marshals, and some high-ranking generals. As he walked into the room he saw a map of the war in America, on it was the dark blue of the ACG and the light blue of the UoA. It made him mad, he was annoyed that his forces weren't doing enough to hold the frontline, and he was mad at his generals for not doing enough to compensate for the situation. However, as he sat down and started the meeting, he decided to hide his anger to maintain the image he had built.\n\"Flynn the situation on the frontline isn't good, to say the least, I've expected more from you. But it is fine, you can still prove yourself.\" Said Trump with a disciplinarian tone.\n\"Thank you, Mr. President.\" Said Flynn nodding his head.\n\"Now gentlemen, as we know the situation on the frontline isn't the most comfortable, to say the least. However, I'm still confident we can turn the tide in this war.\"\n\"What is your strategy then Mr. President?\" Said John Kelly\n\"Well Kelly, my plan is that we reinforce our lines and start planning counter-attacks, we can't allow any more major retreats and we have to take back some territory. While our forces are massing on the frontline we ramp up the smuggling of guns, ammo, and logistics to the brave resistance currently fighting to liberate our occupied lands.\" Said Trump.\nAs the meeting progressed Trump and his field marshals informed the generals on how the counterattacks, as well as the strengthening of resistance, would be carried out. Overall the meeting lasted way longer than usual, as the problems would always come up before a plan could be agreed upon.\nHowever in the end the attendees of the meeting finally agreed to instead focus more efforts on the resistance operations, as they would wait until the resistance had damaged UoA logistics and organization enough so that the counterattack would be assured an effective outcome."
 usc.39.a: "\"I need the resistance on the phone now.\""
 usc.40.t: "Acceptance and Death"
 usc.40.desc: "For the many who weren't in a warzone, they would have experienced a nice evening, which would then be followed by a beautiful night as the stars above lit up the air. For Cooper Carmenates, anti-aircraft fire lit up the air instead. As he looked out of his window on the southwest side of the Pentagon, he gazed upon the city of Arlington, remembering his commander's orders to retreat towards the Pentagon instead of surrendering. Such a fool he was to follow that command. Now, because of his naivety, he was holed up with around two hundred other soldiers inside the military command building. \n\nAs he continued to look out the window he thought to himself, about his childhood, his teen years, and eventually life as an adult before it was rudely cut off because of the civil war. How he was planning to marry his high school sweetheart before he joined the army, how he was sent to the front, watching his comrades die around him as he was the only one standing. Whether it be the forests of Illinois, the suburbs of Indianapolis, and finally, the once bustling streets of Arlington. Taking a drag from his cigarette, he pondered his fate, regretting the decisions that brought to him here, The Pentagon, where it housed him and two hundred others, awaiting the inevitable.\n\nSuddenly he heard a faint noise in the distance, not the anti-aircraft fire, no he would know if it was that. Either it was just another convoy of Constitutional troops that would try and take the Pentagon for the fifth time today, or another batch of civilian buses leaving DC to avoid annihilation. Either way, he grabbed his rifle, radioed to his squad that they could be attacked soon, and grabbed his binoculars. But instead, he saw a lone Abrahms in the distance, one with an American flag flying on top of it, and what appeared to be a hanging loose sign on its front plate. The Abrahms made their way under the Henry G. Shirley highway and stopped right outside of the Pentagon parking lot. As Cooper looked on with no reaction, the Abrahms lifted its cannon, seemingly aiming straight for his window. Cooper thought to himself that maybe, finally, death had come to relieve him of his suffering."
 usc.40.a: "Cooper closed his eyes and accepted fate."
 usc.41.t: "True American Elections"
 usc.41.desc_1: "Despite the terrible circumstances of the civil war we find ourselves in, we must keep the fires of democracy burning, or else we will fall into tyranny, just like the treacherous democrats did.\n\nPolling stations have been set up in every town and settlement controlled by our forces, even in frontline towns where people selflessly vote for their candidate, even though they are in danger of enemy attack. One of these frontline voters said to a news reporter: "I'm a patriot. If I need to be somewhere, I will be there. No matter what."\nThis astonishing patriotism from our brave citizens is a testament to the strength of our democracy.\n\nNaturally, the current president, Donald J. Trump, our brave leader with full backing of the GOP, has won the absolute majority of votes. Only a few voted for Jack Boyd, an independent, former police chief from a small city who ran as a single-issue candidate for apparent corruption in his town. After the defeat, he admitted that "It was just a PR stunt," and "the real battle will be in our mayoral elections."\n\nThe confidence shown in President Trump by our people exceeds any in history. They voted for a new America, they voted for victory. Let's not let them down!"
 usc.41.desc_2_5: "The affection for Trump in our nation is boundless. When Trump announced his candidacy for a third term, Americans instantly rallied behind their leader. Our president has secured our nation's future, shielded our children from the Democrat Cabal, and is prepared to fight for us until all battles are won.\n\nDuring his victory speech, Trump reiterated all of this. However, he also said that he has no plans to run for a fourth term. He said: "Folks, this will be the last one, I promise! There are so many amazing fellas waiting for your vote in the next four years - truly marvelous what movement we built. They will serve our country great - not as great as I do, of course. Just kidding!"\n\nThe American people cast their ballots, giving Trump a commanding majority, just as they did in the previous election. They did so against a handful of candidates who were barely visible from the top. No one in modern America has ever garnered such a large number of votes and approval, probably ever."
 usc.41.desc_2: "As the final year of his presidency draws to a close, Donald J. Trump has served our nation admirably. However, he is now exhausted, both mentally and physically. His age prevents him from continuing in office.\nThis year's elections have given our citizens a wider range of choices. As the American leader prepares for retirement, Americans are facing a new electoral system where party affiliation is less important than policies and personalities.\nThe main battle is thought to be for the Republican nomination rather than the actual elections. It is assumed that the Republican nominee will win with a comfortable majority against their opponents, whether they come from a minor party or are independent. Especially with Trump's personal endorsement!\n\nMillions of Americans went to the polls to cast their votes for the candidate who resonated with them. In their hearts, they still wanted to see Donald Trump's name on the ballot and, of course, mark it with a cross. But ultimately, they would realize that the time had passed, and they needed to let him go."
 usc.41.a: "[presidential_pick_victor_text]"
 usc.41.a1: "ONLY TRUMP TO SAVE AMERICA!"
 usc.41.jdvance: "Jonk With JD Vance!"
 usc.41.rubio: "With Marco All The Way!"
 usc.41.desantis: "Let's Go Ron!"
 usc.41.carlson: "All For Tucker!"
 usc.41.bryan: "Bryan For America!"
 usc.41.lake: "Kari For Win!"
 usc.41.vivek: "Vivek - For People!"
 usc.41.gaetz: "Gaetz - All Day, All Time!"
 usc.41.johnson: "Mike For President!"
 usc.41.paul: "We Need Paul Now!"
 usc.41.sarah: "Win, Sarah, Win!"
 usc.41.musk: "To The Moon With Elon!"
 usc.41.trump_child: "KEEP AMERICA TRUMP!"
 usc.41.trump_third: "Trump Today, Trump Tomorrow, Trump Forever!"
 usc.42.t: "Trump's Farewell to Nation"
 usc.42.desc: "As President Trump steps down from the highest office in the country, the White House published a final address to the American nation from Donald J. Trump:\n\n"My fellow Americans! As I come closer to stepping down from leading this great nation, I wanted, together with you, to look back at what we achieved. We won so much. Every battle for the American future was won, together we overcame the corrupt establishment when I first got elected in 2016, then the Democrats and the deep state radicals unleashed hell upon us, they destabilized our nation and led us to civil conflict. So much destruction. But we won in the end. We made America stronger, we made America great again, folks, against all odds. I have no doubt that the next president will be wise, proactive, and follow the will of the people, and I have no doubt that you - Americans - will be smart and won't let yourself be fooled. This is it, I bid my goodbyes, very touching stuff, really. Farewell, my beautiful America, I wish you all good luck. Never give up!"\n\nWith this, the era of Trump ends, but the next President will undoubtedly continue his legacy, at least in the way they see fit. Donald Trump now spends his retirement time in family's private manors, surrounded by his children and grandchildren. He still, however, posts on his Twitter page occasionally."
 usc.42.a: "Enjoy your well-earned rest, sir." 
 usc.43.t: "VP for America"
 usc.43.desc: "Vice President Wood is a great person, but he lacks charisma and is not well-known to the public. He was chosen as a temporary replacement for the vice president's position to ensure the stability and functionality of the government.\n\nNow, with the situation constantly changing, Trump must choose a better second-in-command for the country. There are many great patriots and exceptional individuals to consider, but only one of them can be chosen.\n\nSo, who will we pick?"
 usc.43.j: "Mike! He's been such a trooper after I forgave him! People love good endings."
 usc.43.a: "Jim Jordan, nice guy, very patriotic and loyal to the cause. I like him."
 usc.43.b: "Marco Rubio, an experienced individual, traded blows with him in the past but now he's totally our guy."
 usc.43.c: "Byron Donalds, amazing orator, very loyal, very hands-on, will get us support from black folks."
 usc.43.f: "This JD Vance has really been putting in a lot of work! Fighting and stuff, people love him! Small man dreaming big. I love that."
 usc.46.t: "In My Darkest Hour"
 usc.46.d: "My fellow Americans...\n\nIn the wake of recent events it is hard for me to find the appropriate words to address you. Terrorists and insurrectionists run rampant in the country which was just recently a lighthouse for the rest of the world. The traitorous forces, represented by the Democratic party, have shed the blood of Americans in an unprecedented act of violence, not seen since the Civil War.\n\nOur brave troops and courageous minutemen loyal to the constitution are doing their best to hold back their menace while we are doing our best to provide them with all the gear, ammunition and vehicles they need. But it has proven to be insufficient.\n\nWhat we are fighting is a Frankenstein's monster of the deep state which has finally surfaced, an unthinkable chimera meant to restore the elitist status quo and crush the American workers.\n\nThey are approaching the critical city of Minneapolis, the key to the northern United States... Today I am asking for your support just like I asked for your vote not so long ago... We can not let them win. For the future of our children and for the sake of ourselves... If we let them win, our country is gone...\n\nAnd the darkest hour for America is the darkest hour for me and all of us. But there is one way we can make our way back to the light:.."
 usc.46.a: "Fight! Fight! Fight!"
 usc.47.t: "Sweating Bullets"
 usc.47.d: "My fellow Americans...\n\nThe traitors from the so-called Union of America are moving across the countryside towards the cities that have not betrayed the oath to the constitution... Where they have gone, nothing is left except ruins, marauding, death penalties for loyalists and sometimes just immediate killing.\n\nThey are sweating bullets.. and crying artillery rounds.. because they know they won't hold onto power without another war. They've started countless wars abroad, yet they haven't had enough - they had to bring it home... What they are doing is absolutely unacceptable and must be stopped.\n\nAnd together we are the only chance that America has to stop them. Together we will take back America, reclaim our beautiful White House and make our country great again, it's gonna be great I'm telling you...\n\nBut to do that we must first not let them cross the Mississipi, the Gathering of Waters. Our loyal fighters are in control of the key city in the defense of the river, Saint Louis. Soon the enemy will be crushed and order will be restored to the country."
 usc.47.a: "Stay safe and God bless you all."
 usc.48.t: "Countdown to Extinction"
 usc.48.d: "My fellow Americans...\n\nOur country has never been as endangered before as it is right now. As it stands right now, we are a dying nation, and our days are numbered. The desperation, the hopelessness, they are driving our people crazy. It's dismantling the foundation of our country and cracking the facade.\n\nBut America always endured. And it will endure again as long as we help each other, stick to our loved ones, our friends... These are the things you should never forget.\n\nI am extremely proud and inspired by our boys on the frontline... Our patriotic warriors of freedom... You know, a lot of them never knew war would come, but here we go because of the crooked, vile traitors of this country... So many homes are being destroyed, it's a disaster. The numbers are unbelievable, it's much worse than you think.\n\nI've seen examples of it in Oklahoma... It's terrible, it's very terrible what those people have to go through, but they're brave, they're very brave people. And what inspires them should inspire all of us today...\n\nWe are being driven forth by the American Dream... A dream that consists of many, many smaller dreams. Workers, teachers, doctors, politicians, civil rights activists... Soldiers, policemen... All of us share a part of that dream, big or small.\n\nAnd as it shines, no darkness will break the American spirit, no terrorist, no traitor or radical will put that fire out. It'll outburn it all, just like it always did before, and pave the road to a brighter future - one where our country will be great again."
 usc.48.a: "God bless the U-S-A!"
 usc.49.t: "Endgame"
 usc.49.d: "My fellow Americans...\n\nAs you know we've been through quite the journey together... If it wasn't for that journey, we wouldn't end up here, in Denver, instead of Washington DC. We wouldn't know the struggles, the pain we had to go through just to stand up for our ideals and the interests of this country.\n\nIt's a different time. And when we say we're fighting for something, we literally mean it. Every step of the way we fought. And we fought with the courage and strength worthy of the Founding Fathers...\n\nAnd we're gonna fight the great struggle for America and we're gonna win... 'Cause those guys? "CoMe oN, mAn!" They're losers. The only thing they've done to our country was destroy it, they never knew what it's like to build your own life... And they never built anything for our country.\n\nRemember when I promised that we would win? We're gonna win so much... So reserve your forces, people. For as long as the spirit of our country is alive within all of us, it's never over."
 usc.49.a: "We're gonna win, no matter what."
 usc.50.t: "Trump Addresses the Nation"
 usc.50.d: "My fellow Americans...\n\nTonight our nation has been shaken by what we thought would never happen again... In an unprecedented and unconstitutional violent move, the Democratic party and other traitorous elements have violated the integrity of our state and attacked the forces loyal to our cause in what is the biggest act of violence in our homeland since the Civil War...\n\nOur opponents, these disgusting insurrectionists, the radical left... had no regard for the plurality of opinion, for the civilian lives that were brutally interrupted today... They had no regard for our sacred democracy and the rights that were granted to us by the constitution... They had and they have no regard for our common faith and the word of God. They chose to kill their neighbour just because they didn't agree...\n\nThey have become the enemy of our country and its' people and should be treated as such. There will be no mercy and no forgiveness for traitors. We will deal with every single one, no matter how much they will resist or try to run from justice, it's not gonna work. We will enact the death penalty... We will enact every single law we need to make sure.\n\nWe have the moral, military and industrial high ground. The enemy will be crushed, we will win!\n\nGod bless the United States and God bless you."
 usc.50.a: "Never surrender!"
 usc.51.t: "President Trump Reacts to the Union "Elections""
 usc.51.desc_1: "During a recent rally in Denver, following his successful re-election, President Trump addressed the parallel "elections" held on the territories of the so-called "Union of America".\n\n"These crazy people, they did it! They actually did it! They made Bernie into a president. They must have completely lost their mind if they even gave him a chance, they would never do such a thing before. Communist Bernie Sanders, now that's a man to beat. The real visualization of the enemies of America.\n\nWell I want to congratulate Bernie, actually. No, really! First of all because he made it to this election. Will he make it to the inauguration? Not so sure. Second of all, he finally has the chance he wanted to make his absolutely insane communist dreams into a reality, maybe at least for some time until we come and rebuild our country properly. Finally we'll have a real example of why socialism doesn't work in America!!! Apparently the democrats can't learn from the mistakes of other countries, very sad.\n\nBut honestly, it's even more sad to me that Bernie is doing this. I already said once, he could be a legendary person. But he made a deal with the devil, and instead he'll be known for his legendary failure to Trump, once we take back our beautiful White House. And we're gonna rip all the red flags off the roof and throw them where they belong - in the trash!"\n\nThe crowd cheered, laughed and roared in unison - a usual, expected reaction to the banter of their beloved idol. Opposition verbally shamed again. The base is energized once more, cheering for constitutionalist forces who bravely continue to fight on the front lines for Trump's vision of America."
 usc.51.desc_2: "During a recent rally in Denver, following his successful re-election, President Trump addressed the parallel "elections" held on the territories of the so-called "Union of America".\n\n"So I heard Mini Mike, sometimes referred to as Mike Bloomberg, finally managed to buy the presidency. Must've been on discount, his business's not doing so good. Anyways, we all know Mini Mike, what he did to New York City, my home - horrible! Infested with rats and migrants, completely destroyed. And now he wants to do it to the rest of the country! And he has all these donors and corporations that he's selling the country to, people. I've been talking about the Deep State, but HE IS THE DEEP STATE!\n\nAnd you know, the democrats nowadays, they promise to take away more than they promise to give. Seriously! They already want to take away our guns, free speech, state rights... Next thing you know the democrats are gonna say "we need to put all the people in bunkers because of covid" and then they're gonna take everyone's sound away, they're gonna say "we can't have sound anymore, because we all live underground"... they're insane people I'll tell you, virtually insane."\n\nThe crowd cheered, laughed and roared in unison - a usual, expected reaction to the banter of their beloved idol. Opposition verbally shamed again. The base is energized once more, cheering for constitutionalist forces who bravely continue to fight on the front lines for Trump's vision of America."
 usc.51.desc_3: "During a recent rally in Denver, following his successful re-election, President Trump addressed the parallel "elections" held on the territories of the so-called "Union of America".\n\n"...While we're at it, have you seen what a disaster the winner - a total loser really - is the Swamp's new "President"? Unbelievable. This Andrew Yang - what a little guy. Even the Democrats don't like him! Total disaster. AND he's a total radical lunatic. We're going to call him 'Wacky Yang' - that's how we call him, it fits just right.\n\nThis silly Andrew guy, he's so annoying. Nobody likes him. Barely grown out of his kindergarten pants and already a 'president', even Mayor Pete had more experience. He wants to call his 'Yang Gang'? OK, listen, that's proof enough that DC has been taken over by a bunch of gangsters! They're not even hiding it anymore. Yeah, it's unbelievable....\n\n...Look at these "elections", folks. Such a low turnout, nobody came. A complete shame for the Deep State. Everyone knows they want the real President back - me. Don't worry, people, we'll beat back the Deep State forces - very quickly - we'll liberate our people - very beautiful people - from these crooked Democrats and RINO traitors. We'll save America, one problem at a time."\n\nThe crowd cheered, laughed and roared in unison - a usual, expected reaction to the banter of their beloved idol. Opposition verbally shamed again. The base is energized once more, cheering for constitutionalist forces who bravely continue to fight on the front lines for Trump's vision of America."
 usc.51.desc_4: "During a recent rally in Denver, following his successful re-election, President Trump addressed the parallel "elections" held on the territories of the so-called "Union of America".\n\n"Have you heard the news, guys? That old pile of crap Biden finally broke down, they didn't even let him run for the second term. Trashed by the DNC bureaucrats for sleeping too much. They say the last few months he's been babbling total nonsense and didn't even recognize his wife. Who are they letting run the country???\n\nBut Kamala, she's not much better. Maybe even worse! Biden at least had some brains at some point before but lost them. Kamala? Can't say she ever had 'em. And boy does she DRINK! She can hold more wine than a basement.\n\nAnd yet they're trying to make it look like she's a young, fresh leader, but don't let 'em fool you, folks. Kamala, Joe - they're the same person! There won't be any difference because they have the same puppet masters! And they change like gloves. It's all a total lie, not how democracy works.\n\nSo I'm coming to the White House, Kamala, to have a conversation with you... But it's not gonna be a very long one. I just need to tell you one phrase: "YOU'RE FIRED!""\n\nThe crowd cheered, laughed and roared in unison - a usual, expected reaction to the banter of their beloved idol. Opposition verbally shamed again. The base is energized once more, cheering for constitutionalist forces who bravely continue to fight on the front lines for Trump's vision of America."
 usc.51.desc_5: "During a recent rally in Denver, following his successful re-election, President Trump addressed the parallel "elections" held on the territories of the so-called "Union of America".\n\n"Apparently the democrats were so bad, they've lost to fake republicans in their own fake and rigged system. How bad can you be? Horribly bad. Can't imagine these people running the rest of our country, they can't even manage a piece of it!"\n\nAnd who of all people did those RINO traitors choose? Icky Nikki Haley and Mitt-in-the-pit-Romney? Laughing stock of a ticket. Nobody would even be thinking about them if I was there. Pathetic sore losers, that's what they are. But they can enjoy their fake little victory for now, they're not winning the real fight. America wants the real republican president back - ME.\n\nAnd I mean, seriously? They got Mitt Romney in charge? I thought he was still lost in 2012. Maybe he thought he was still running against Obama? Well I'm not Obama, Mitt, I'm much stronger and much smarter. And I'll put you back to 12 years ago where you belong, just you wait.\n\nThey call him Mitt-in-the-Pit because his approval ratings are so low, he has ruined the political landscape, couldn't beat Obama, couldn't beat me and now he's rolling on the floor crying over it, he's a disaster.\n\nAnd I've heard he went to one of those "furry" conventions, full of gay people that dress as animals! AND HE LOVED IT! Not very conservative of you, Mitt. Now let's talk about something more interesting..."\n\nThe crowd cheered, laughed and roared in unison - a usual, expected reaction to the banter of their beloved idol. Opposition verbally shamed again. The base is energized once more, cheering for constitutionalist forces who bravely continue to fight on the front lines for Trump's vision of America."
 usc.51.desc_6: "During a recent rally in Denver, following his successful re-election, President Trump addressed the parallel "elections" held on the territories of the so-called "Union of America".\n\n"...And wow. Did you see that? Apparently the democrats were so bad, they've lost to fake republicans in their own fake and rigged system. How bad can you be? Horribly bad. Can't imagine these people running the rest of our country, they can't even manage a piece of it!"\n\nAnd who of all people did those RINO traitors choose? Icky Nikki Haley and Mitt-in-the-pit-Romney? Laughing stock of a ticket. Nobody would even be thinking about them if I was there. Pathetic sore losers, that's what they are. But they can enjoy their fake little victory for now, they're not winning the real fight. America wants the real republican president back - ME.\n\nYou know what their plans are anyway? Crazy Nikki and her military-industrial lobbyists are gonna start World War 3! They want to start wars all over the world, they want to put American lives in danger, and can't think of anything else. In fact, she was so glad when the killing started in our country! Smiling from ear to ear because her donors would get richer from all the weapon sales and murder!\n\nI'm not allowed to say this because she's a woman, but if I was, I would say she's nasty and very disgusting.. Haley-Cheney, that's a rhyme you should be thinking of. Her and the other neocons, I will destroy them before they destroy our beautiful country and the rest of the planet."\n\nThe crowd cheered, laughed and roared in unison - a usual, expected reaction to the banter of their beloved idol. Opposition verbally shamed again. The base is energized once more, cheering for constitutionalist forces who bravely continue to fight on the front lines for Trump's vision of America." 
 usc.51.desc_7: "During a recent rally in Denver, following his successful re-election, President Trump addressed the parallel "elections" held on the territories of the so-called "Union of America".\n\n"Oh, would you look at that. Did you see the news recently? The swamp got itself a new "president", I guess Sleepy Joe wasn't doing it. Now it's Klob-... Klobu-char or whatever. Well, what can I even say about Zany Amy? There hasn't been a worse candidate in the history of our country. Like, seriously! Didn't you have anyone else? She wouldn't be my first choice, that I can tell you.\n\nDid you see her "victory speech" though? Total disaster! Zany Amy doesn't even know what to say or what she is saying. Probably didn't believe she got elected, frankly, I don't believe it either, must have been a fraud just like everything else in democrat-occupied fake America. She's a snowwoman, okay? And she's melting away, just like insurrectionist troops are melting away at the frontline. They don't have much time left and they can feel it.\n\nBut don't worry, Amy. I've already prepared a nice house for you in Minnesota, a bigger house, it's the only thing you can plan on winning right after this fake little "election". You'll be on a nice vacation for the rest of your life, I promise. I hope you're okay with that. Are you okay, Amy? Would you tell us that? I guess we'll find out soon."\n\nThe crowd cheered, laughed and roared in unison - a usual, expected reaction to the banter of their beloved idol. Opposition verbally shamed again. The base is energized once more, cheering for constitutionalist forces who bravely continue to fight on the front lines for Trump's vision of America."
 usc.51.desc_8: "During a recent rally in Denver, following his successful re-election, President Trump addressed the parallel "elections" held on the territories of the so-called "Union of America".\n\n"So the Washington Swamp had a change of management, and who did they pick? "Beto O'Rook"? Who's that? A Texan that wants to take people's guns away? Very funny, I'll give 'em that...\n\nSo... I don't even know what to say about this guy! They say he "almost" beat LYIN' Ted, but of course he didn't 'cause he's a loser. Is that it? I guess that's where his surname came from, he's a ROOK - no experience, no knowledge at all! I don't think their fake little government has much time left with leaders like that - two weeks at most!\n\nSo let me tell you: he's definitely not an Alpha and not even a Beta. He's an O'Mega Rook! That's what we're gonna call him..."\n\nThe crowd cheered, laughed and roared in unison - a usual, expected reaction to the banter of their beloved idol. Opposition verbally shamed again. The base is energized once more, cheering for constitutionalist forces who bravely continue to fight on the front lines for Trump's vision of America."
 usc.51.desc_9: "During a recent rally in Denver, following his successful re-election, President Trump addressed the parallel "elections" held on the territories of the so-called "Union of America".\n\n"So I've heard they put out Pete Butti-geg? Butti-geeg? Butt-geg? Whatever. It's not worth remembering Pete's surname, I'm sure we'll have someone else in 4 years, just like they ditched Sleepy Joe. And you know, Mayor Pete, he's nobody without the dems and without the donors. Total nobody! Except he's a homosexual, that's the only card he can play, not much else, I have nothing against homosexuals, but how pathetic and boring is that!\n\nAnd Mayor Pete, whatever his surname was, he likes to call me a homophobe... That's just WRONG. I am the best president for gay rights in the history of our country. I have eliminated ISIS, people that hated gays the most. In fact, Pete should ask who his husband voted for, he'd be very surprised."\n\nThe crowd cheered, laughed and roared in unison - a usual, expected reaction to the banter of their beloved idol. Opposition verbally shamed again. The base is energized once more, cheering for constitutionalist forces who bravely continue to fight on the front lines for Trump's vision of America."
 usc.51.desc_10: "During a recent rally in Denver, following his successful re-election, President Trump addressed the parallel "elections" held on the territories of the so-called "Union of America".\n\n"Oh come on, guys... Do we really have to do this AGAIN? We already beat you once, Hillary, GET OUT OF HERE! Give Bernie a chance for once while he's still alive!\n\nYou know, this is the most crooked nomination in history. Totally rigged, there's no way anyone would vote for Dying Hillary Clinton. Where has she even been up until election day? I haven't seen her, nobody did. They were hiding her in the basement because she can't walk ten feet. Can you imagine that woman as our president? I don't think so...\n\nI never should have given Hillary a chance. Should've locked her up 8 years ago, maybe she'd be a better person by now. I guess I'm just too kind, people, is that it?\n\nBut it doesn't matter who the establishment puts out or pulls out of the grave, we're gonna destroy them all and we're gonna take away DC from the Clintons and give it back to the people. We will save America from corruption, we have no other choice... So it's only fair if we kick out the one most corrupt woman in the history of our nation, isn't that right folks? And I'm gonna love doing it I'm telling you..."\n\nThe crowd cheered, laughed and roared in unison - a usual, expected reaction to the banter of their beloved idol. Opposition verbally shamed again. The base is energized once more, cheering for constitutionalist forces who bravely continue to fight on the front lines for Trump's vision of America." 
 usc.51.desc_11: "During a recent rally in Denver, following his successful re-election, President Trump addressed the parallel "elections" held on the territories of the so-called "Union of America".\n\n"I can't believe it! They re-elected that barely walking mummy... Back in 2020 I thought: "There's nobody who can be worse than Crooked Joe Biden!" But now I know there is worse - it's the same Biden 4 years later! Not only did he get worse, but his policies also got worse. The economy? GONE. Human lives? MISERABLE. But the worst and most important thing is, they're keeping up the fire of this horrible civil war. There's no peace under the war pig democrats!\n\nAnd you know, I was starting to think we could give democrats a chance. Maybe we won't even have to kill all of them. Although if you think about it... Hmm? No, not all of them. Although if someone deserved the death penalty... That's definitely Joe, the biggest insurrectionist and terrorist in the history of our country... But well... I guess Sleepy Joe won't go back to bed for another 4 years at most, probably less, and will keep ruining our country instead... Shame!"\n\nThe crowd cheered, laughed and roared in unison - a usual, expected reaction to the banter of their beloved idol. Opposition verbally shamed again. The base is energized once more, cheering for constitutionalist forces who bravely continue to fight on the front lines for Trump's vision of America."
 usc.51.a: "That's my president!"
 usc.51.b: "Keep yapping, man."
 usc.52.t: "Using Force"
 usc.52.d: "With all kinds of liberals and alt-left ANTIFA criminals now pouring on the streets of Denver, and other cities under our control, to 'protest' rightful government and help the deep state, we must decide on how to act in this situation to protect LAW and ORDER.\n\nMacgregor, and other advisors propose for our amazing cops and brave national guard are ready to forcefully crackdown on this anti-american leftist lunatics, as fast as possible, all within the laws of our constitution and 'The Insurrection Act'.\n\nHowever, less radical advisors, like Jim, says we must use discretion and be lawful and fair, and use only police forces, while use National Guards only for terrible cases."
 usc.52.a: "This is a violent insurrection, all across our great country. We look weak, they don't have things like this in Moscow!"
 usc.52.b: "We must keep ourselves restrained, our boys in blue need to only arrest violent THUGS."
 usc.53.t: "Show Of Our Support"
 usc.53.d: "Your people are scared, they're in disarray, all across our territories. They want to hear you, to see you, they want your reassurance.\n\nBrian and Tucker say people need a great rally in Denver, to show everyone - especially haters and suckers - that Denver is MAGA city. It is safe place, a lot of security, and many beautiful supporters that can feel Mile High Stadium. The base gonna love it.\n\nBrad got an idea to get people in Minneapolis. Spicy. We'll show them how good I am with a divisive crowd. Great city, but close to the separation line, a lot of ANTIFA THUGS possibly. But he says, it will get ratings through the roof, brave President visits division-ridden city, delivers a message of unity in face of betrayal. Great headlines. your folks will love this act of compassion.\n\nDan, however, with his super-duper media technologies, says all you need is good campaign on the Internet, a lot of media - banners, ads, videos, you name it. You will record videos saying what your people need to hear. Not as much of a punch as a live action rally, but Dan argues it's too dangerous right now." 
 usc.53.a: "Denver, great idea - show them that it's our city now."
 usc.53.b: "Minneapolis is spicy, Brad got the idea, we'll show them how good I am with a divisive crowd."
 usc.53.c: "Fine, we won't rally. Because we've got Social. I'm the Mike Tyson of Twitter." 
 usc.54.t: "Rally in Denver"
 usc.54.d: "The crowd is amazing, a lot of energy. Mile High Stadium is packed, some people aren't exactly from Denver, but it doesn't matter, the numbers do. Thousands of MAGA banners, giant LED screens with "TRUMP, SAVE AMERICA" graphics emblazoned all over them..\nYou thought up a great speech, another classic, calling out crooked democrats and their marxist crazies, and how they're destroying this amazing nation. Other speakers were there also, a lot of TRUE FACTS said by them.\nOnly the real media here, broadcasting everywhere they can. Even more watching live - crazy numbers. Your base is happy, they got to see their President in time of need. Many will sign up to become a soldier in the American patriotic army to fight for what is right.\n\nAs the rally reaches its end, you bring out the old faithful Y.M.C.A and jam to it - the crowd is rejoicing. Nothing better than an old trick everybody loves."
 usc.54.a: "What a banger." 
 usc.55.t: "Trump Takes Minneapolis"
 usc.55.d: "Ed led a typical life of a small-town truck driver. He had few luxuries and many problems. His town and family had fallen on hard times ever since the days of Obamanomics. However, anyone who tried to criticize it and show the harm it caused to blue-collar Americans was labeled a racist.\nBut then Trump came into power, and things started to improve for Ed's small community. Of course, bureaucrats and careerists tried to ignore the President's vision, but the fruits of his work were still evident. Many communities in the Midwest began to see Trump as their own personal hero, and Ed's family was no exception.\n\nAs troublesome events unfolded in the Capital, and throughout the country, Ed was anxiously watching TV. Fox News reported that President Trump would be holding a public rally in Minnesota.\nAnd then it began. Live footage of Donald Trump speaking at the podium. However, just moments later, something went wrong. Audible bangs were heard, and the President fell down. Bodyguards immediately surrounded the area.\n\nFor a moment, Ed thought it was over. They had killed him, the only politician who cared about this country. But then, just a second later, he saw Trump triumphantly raising his fist as he stood up, encircled by the Secret Service.\nEd was truly shocked. All he could do was call out to his wife and tell her the news."
 usc.55.a: ""Honey, They tried to kill President Trump!"" 
 usc.56.t: "PROJECT: AMERICAN RESURRECTION"
 usc.56.d: "Kevin Roberts, head of 'Heritage Foundation', has come to you with his team's vision for how you must reclaim America.\nHe says the strong executive power, wielded in time of emergency is necessary to protect American public from dangers and the corrupt deep state, that in his words, is festering even in our administration.\nThis guy makes some good points here and there. After all you can't trust any bureaucrat right now, they all seem to be in it for their own reason. But, is suspending American democracy truly a way forward? You are the protector of the American constitution too, no matter what losers in the swamp say.\n\nAlso, Tucker says that all these conservative think tanks are just a place for wannabe intellectuals, and also a lot of them are filled with your doubters. Shameful, if true."
 usc.56.a: "Hm, I will think about it. You know, this 'project' thing."
 usc.56.b: "Tucker is right, so much pseudo-smart talk. Sad!"
 usc.57.t: "Return of the Lost Children"
 usc.57.d: "You received a surprise call from Mike! He phoned you from a border town, where he is staying with other border-crossing republicans. He told you all the stories and finally realized why you are the better choice. He said that Washington's swamp is a symbol of America's deep-rooted problems. And he is sorry for not doing the right thing. \nOh, Mike! Where was this spirit when you just could've pulled the 'Jefferson' and saved our country. But what does he want? A place for his people, his 'christian conservatives'. Maybe - something more?\n\nHe could be useful, after all, you never denied his experience in the field, and appearing forgiving, and building a coalition is something that may resonate with 'sentimental' part of your base. Pence comes back, like a prodigal son, and he's accepted back into the fold. Not something a democrat would ever do! They only want the only most spineless people to fill GOP leadership. His people at least believe in something - you may disagree - but at least they have something to disagree with!\n\nBut, come on, publicly shaming him? Imagine the ratings; Little Mikey-Pency desperately craving attention after BETRAYING his fellow countrymen? This is called treason, Mike. We punish hard for it. Big mistake."
 usc.57.a: "Folks, what can I do with myself? I'm just too kind."
 usc.57.b: "Mike, have you forgotten? I don't forget, and, certainly, don't forgive."
 usc.58.t: "Elon Musk Pledges Support To Donald Trump"
 usc.58.d: "In recent weeks, Elon Musk, a wealthy businessman, has been outspoken in his support of the government. After being forced out by regulatory agencies from UOA's territory, he wasted no time in rebuilding his business in the Denver area. He also greatly favors our Libertarian faction, advocating for business-oriented initiatives, and smaller government.\n\nIn a recent communication, Musk pledged his full support for Donald Trump and contributed a significant amount of money to the Republican Party. Many presidential advisors suggest strengthening ties with Musk as his company and influence could be beneficial in the long run. President Trump does not seem to disagree with this idea."
 usc.58.a: ""Elon - this guy, a rising star! I tell you!""
 usc.58.b: ""Thanks for your amazing contribution, Elon!""
 usc.59.t: "The Aftermath"
 usc.59.d: "That moment was a culmination, a defining second of your career. As you prepare to step up on the stage of the Republican Extraordinary Convention,  you see the crowd - what a big, beautiful crowd - and all of them are waiting for you. Years of showmanship had prepared you for this, a magnum opus - and people are saying it, it's the bravest thing they ever saw. They fell in love with how you acted. And this photo - it's everywhere. Everyone is saying that to get such an iconic picture one needs to die - and yet - you didn't.\n\nConfetti, colorful lights, balloons. You walk out on the stage like a wrestling champion. You stand, barely able to see the faces in the crowd. You see some familiar, many unknowns, but all of them look up at you, with eyes full of awe. Awe of what you are - bravest man they know. They chant your name, and your cause. Is this how Caesar felt addressing his loyal legion?\n\nSome say it was providence, some - lucky chance, others - divine intervention. But what matters is what it now becomes. You tell the tale - their eyes fill with tears. They praise you as a hero who fights for them, and you reassure them that you'll never back down.\n\nLeaders around the globe praised you, no matter their creed - very telling. Could swamp people do the same? No. Crooked Joe would just fall over and die in an accident.\n\nYour people are ready to follow you to the ends of the Earth. They see your survival as a divine mandate. God himself is on your side.\nYou're their Messiah now."
 usc.59.a: "God Bless the U.S.A, and God Bless Donald J Trump."
 usc.61.t: "Libertarians Revolt Against Trump!"
 usc.61.d: "The weak libertarians have become dissatisfied with Trump's decision regarding the governance of America.\nThey have always been tentative allies, but now they are revealing their true colors when things do not go their way. It is a shame! Little Paul and his cohorts are now calling for a rally against the tyrannical overreach.\n\nProtests have erupted in some cities and towns, but there is no cause for concern.\n\nDue to their violent actions against the legitimate government, all libertarian symbols are now regarded as gang paraphernalia."
 usc.61.a: "What a bunch of sore losers."
 usc.62.t: "Increase In Anti-American Activity"
 usc.62.d: ""What can we do?" Tom asked, his voice barely above a whisper. The dim light of his cramped apartment cast long shadows, creating an atmosphere thick with tension. Outside, the streets were crawling with Trumpist militias, making it nearly impossible to think clearly about how to mount a rebellion against the tangerine tyrant.\n"Well, first we need to spread the word," Sarah replied, her eyes sparkling with determination. "I believe we need the support of the working class." Her leftist passion was palpable, igniting a flicker of hope in the room.\n"Really?" Jeffrey interjected, his voice rising with frustration. "Your so-called working class is glued to Fox News, drooling over whatever nonsense they're peddling!" His annoyance echoed off the walls, filling the space with palpable tension.\n"Not everyone!" Sarah shot back, her voice firm. "There are plenty of people out there who are just as fed up with him as we are."\n"What I'm saying is, we should focus on educated people," Jeffrey countered, crossing his arms defiantly. "We've seen enough from the lower classes."\n"Wow, that's pretty classist," Amy chimed in from her spot on the couch, her head propped up lazily. She seemed to be observing more than participating, but her words hung in the air like a challenge.\n\nAs tempers flared and voices rose, Tom surveyed his friends, feeling the weight of leadership pressing down on him. It was hard enough trying to lead a resistance without watching them tear each other apart. At least they weren't alone - thousands of similar conversations were happening across the nation, echoing their frustrations.\n"Listen up, everyone!" Tom's commanding voice cut through the chaos like a knife. "We need to unite. We can all contribute in our own ways as long as we stick together; we all want the same thing." \n\nHours slipped away as they brainstormed their battle plan: agitate, educate, organize, and protest. It wasn't a grand strategy, but it was a start-and sometimes, a flicker of hope was all they needed to ignite a revolution."
 usc.62.a: "He Will Not Divide Us." 
 usc.63.t: "Liberal Tears"
 usc.63.d: "Good evening, and welcome to Jesse Watters Primetime, tonight we gonna discuss that some liberal aren't doing too well. Adjusting to this Trump reality, that is. Some of them are apparently going on 'sex strikes', while others doing good old hair dyeing, but, don't laugh just yet, no matter how humourous it may sound, there are dangerous elements to it. Check this one out, a social media post calling on all 'occupied' to join 'resistance groups' that are 'forming on masse'. Now, we should at least a little bit worried. Come on, people, these crazies started an civil conflict just to keep Trump out of office. You know what they say, wounded animal is twice as dangerous.\n\nYou will ask: "where do they even gather up? Starbucks got closed a while ago, so there's not many places they can go". We need to get some rules of engagement right, for all law-abiding citizens of this country, and for the sake of our future, folks.\nFirst, if you see anything suspicious going around your neighborhood; like people gathering in groups, seeing many unknown faces walking around, always inform your local police or your local militiamen group, they're here for your safety. Second, always be ready to defend your property, you have our constitution amendments that we fight for every day. If you spot any crazed liberal or Antifa extremist on their way to commit arson or any act of public indecency, make sure to stop them, if you have tools to do so. Third one, it might be shocking, but not every liberal is fat or has terribly colored hair, some of them can be discreet enough to change their appearance, in fact, those who do, are probably doing this for a reason. Again, keep an eye out. And finally, stay patriotic, folks.\n\nNow lets we'll talk to our today's experts on what it means to an American..."
 usc.63.a: ""Stay on alert, Patriots""
 usc.64.t: "GOP Nominates Trump As Presidential Nominee"
 usc.64.d: "President Trump delivers powerful speech as he accepts GOP nomination for 2024 Run.\n\nDespite shocking betrayal of American values by the deep state bureaucrats, our nation and our democracy must continue to exist, as said by the President during his hour long acceptance speech at GOP extraordinary convention.\nHowever, as Donald Trump pointed out, the results of the 2020 "elections" must be rejected. "There was so much fraud," he said, "no matter who actually won, it must be rejected and thrown out."\nThe Republican Party agreed with this. Mike Johnson, the current Chairman of the Republican Party, signed a statement together with other high-ranking party officials. The statement announced a complete restructuring of the Republican party, which starts with annulment of the hoax "election" results.\n\nThis allowed for our President to run again in 2024, with overwhelming positive vote of all GOP delegates present in convention.(...)\n\n"Most importantly, folks, I will never stop fighting," President Trump said in his speech. "For you, for your family. Once we deal with these people - and they are horrible, horrible people - who have caused so much bloodshed, we will rebuild our great country like never before. It will be the greatest achievement of our movement - Make America Great Again."\nIn his closing statement, Donald Trump declared that true Americans never surrender.\n\nOnline comments were filled with praise and amazement at the President's strong will and bold promises."
 usc.64.a: "God Bless the U.S.A"
 usc.65.t: "Future of the Democrats"
 usc.65.d: "With the destruction of The Deep State's fake America and our tremendous victory over crooked democrats, the question still remains on what the future of the democrats will be.\n\nOn one hand, there are always more sane voices inside the democratic establishment who always got suppressed too, like Manchin and Sinema. They were treated very unfairly. Many people in our country yearn for the return of sensible moderate democrats who don't put crazy ideologies before our country. Of course, none of the democrats will be able to recover from their shameful past for a while, but, you know, at least that way they can help.\n\nThere's also Bobby Kennedy Jr. - our president really likes this guy - he got completely disillusioned with the Democratic Machine, says there's no way back. Too corrupt really. But he's very happy to be working for us in Trump's administration - as an independent, doesn't want to join the GOP, says he has 'different plans'. Obviously has some environmentalist views on fracking, but we can work something out."
 usc.65.a: "There's good in every democrat. Trust me, I was one!"
 usc.65.b: "Bobby, come here! You're gonna do an amazing job, but leave the oil to me!"
 usc.66.t: "Libertarian Party Endorses Our Government"
 usc.66.d: "American Libertarians always had turbulent relations with Republicans, but it seems at least some part of independent Libertarians are joining the TRUE and LEGITIMATE Government of America.\nAngela McArdle, the current head of LP - happy with current policies, has officially supported Donald Trump, and organized her party to begin working in our electoral and political system. She herself is a part of what's currently a major caucus inside LP - Mises Caucus. This one promotes, wait for it - Paleolibertarianism and fusionism, as well as a more conservative version of American libertarianism associated with the presidential campaigns of former U.S. congressman Ron Paul. His son Rand will totally love this.\n\nPresident Trump already supported this development on his Truth Social Account, stating: "Great to see TRUE Patriots choose THE RIGHT side in the battle for AMERICA. I always loved libertarians, they're great. Spoke with Miss McArdle, VERY nice lady, together we'll achieve A LOT, and MAKE AMERICA GREAT AGAIN!"\nThe official account of LP has already reposted president's statement with their own version of the slogan - "MAKE AMERICA FREE AGAIN!""
 usc.66.a: "Libertarians? I love my Libertarians!" 
 usc.67.t: "Kennedy Forms 'We The People' Party"
 usc.67.d: "Robert Kennedy Jr. has gathered his supporters outside the Capitol building to announce the formation of his own political party, "We The People." In his words, the purpose of this new party is to "have all voices heard" and "bring more opinions to America." He encouraged all independent politicians looking for a place beyond the divisions within the Republican Party to join his initiative.\nDespite the excitement around the announcement, Kennedy also praised Donald Trump for allowing him and his supporters to peacefully express their intentions to restore the "American sharing of ideas."\n\nKennedy said that he had a personal conversation with Trump and was very happy to hear that the President agreed with his idea.\nHowever, Trump did make a point: "Remember, Bobby, you've got to keep common sense, okay? No crazy stuff, no globalist talking points, you get what I mean." In response, Kennedy fully disavowed the crazy ideologies of extreme liberalism, and said that his new organization is 'the common sense of politics'."
 usc.67.a: "Bobby! We Love Bobby!"
 usc.68.t: "Nick Fuentes' Arrest Goes Lethal!"
 usc.68.d: "The second American civil war has been a source of odd stories here and there and today isn't any different.\nNicholas Joseph Fuentes was known as a political streamer and activist that espoused a lot of white supremacist sympathies and beliefs despite being Hispanic.\n\nAt the start of the civil war, he attempted to garner influence in our territory by rallying far right elements but after several failed attempts and being beaten up, he retreated into a cheap apartment to spread his message online, eventually he made the mistake of insulting and threatening president Trump which caused authorities to be alerted.\nLocal forces were able to pinpoint his location and were quick to apprehend him as he was trying to cross the Canadian border, in a fit of panic he attempted to pull out with what seemed to be an firearm but after getting shot at at least nineteen times, the local police was quick to figure out it was pepper spray.\n\nLocal authorities have stated that despite the incident, a lot of online communities have expressed relief at the event as new leaks appear about his behavior online.\n\nDonald Trump has not commented on the matter, but reports of him grinning at the news are far too common to be considered rumors."
 usc.68.a: "Groyper? I barely knew her!"
 usc.69.t: "Tulsi Gabbard And Her Vision"
 usc.69.d: "Tulsi - what a trooper, no, literally - she's a US soldier, very good one. She always was, you know, kind of an odd one out, because she's a bit lefty.\nLook, I get along with everybody - look at the polls, I'm up with progressives and leftists, or somebody you could consider leftist. Tucker says we can use them, there's a lot of people who would like to get their voices heard. Anybody who loves America is good in my book... Speaking of books, my main book is called 'The Art of the Deal', so I think we can make a deal: If you're a left populist you're still an American - simple, like Bernie, but he made a deal with the Devil and lost big. Tulsi made a deal with me, she's a winner, and I love winners.\n\nWe can make her into a de-facto leader for them, imagine the comments: "Populists - Unite for MAGA!", what a great slogan.\nMatt was also talking about Lina Khan, heard she has done tremendous work on monopolies - and we don't like monopolies - they ruin free market competition, we can both benefit.\nUnity - that's what MAGA is all about, we can do so much if we unite, folks, disagreements only make it more fun."
 usc.69.a: "Tulsi! Get your people, we gotta have a coalition of populists!"
 usc.69.b: "Gabbard should double focus on her government position, it'll be more useful."
 usc.70.t: "Rude Awakening"
 usc.70.d: ""CAN YOU HEAR US, MISTER PRESIDENT?"\n\n"PRESIDENT TRUMP HEAR US!"\n\n"OUR PRESIDENT NEEDS TO HEAR HIS PEOPLE!"\n\nYou wake up from a last minute slumber on your desk. Around you are papers, documents - bookworms' favorite treats: articles, bills, proposals, initiatives that go nowhere - SNOOZEFEST. Things that you once despised, for they bogged down your promises, but now you live around them.\nYou no longer feel the same heat from your people like you used to; they like you, sure, but not the way you want them to; before - it was devotion, now - it's the same approval rating like for Reagan.\nThese pencil-necks call you their 'Model Republican President' - a safe person for them. Yet, you find comfort in their fake smiles and cold handshakes - perhaps, some of them are even genuine.\nThey hold your power, after all, and not a hillbilly Joe or his wife Kate to whom you promised golden gates and water that tastes like wine. They'll still wait patiently for something that got cancelled all the way back on some 'do-nothing' committee hearing.\n\nThey sketch your portraits on their skin, smite anybody who 'betrayed' you or stood against you. In the end, you betrayed them, yet they still have not noticed. Not a lion - but, at least, the nickname Teflon will fit you."
 usc.70.a: "Total Burnout." 
 usc.71.t: "MAGA King"
 usc.71.d: ""VIVA TRUMP! VIVA TRUMP! VIVA TRUMP!"\n\nBright lights swarm you, as you take cheers from the crowd - what a big one. Sometimes it's hard to start talking with all the chants coming in. So much love in the air - for you, for America, for MAGA. Your people are the most grateful in history - maybe ever. All this hard work: tax cuts, anti-trust, bailouts for miners - you name it, paid off.\n\nControlling the bureaucracy doesn't seem like a fruitless effort anymore. Let them complain and whine about your being 'too aggressive' and 'assertive', saying that you use executive orders to get things done. That's exactly what we want - get things done! Their charts and fake experts mean nothing when PEOPLE'S WILL is what keeps you going.\nAll around the country, they cheer for you and search for loopholes to keep you in power - maybe for a lifetime. Eric and Dan say that if the statistics are accurate, then you are so popular that even if George Washington and Abraham Lincoln were to come back from the dead and run in elections, they would not be able to defeat you. Nobody could.\n\nYour people call you "The Lion of America", and you will embrace it. Perhaps during this speech? It would be a nice starter."
 usc.71.a: ""...Folks, some call me 'The Lion', do you think it fits?""
 usc.72.t: "Formation of People's Party"
 usc.72.d: "Months of organizing led these true and honest patriots to the pinnacle - the creation of the party. Very touching. Tulsi is doing a great job - defending the rights of the common people - like you do! But different... more... welfare.\n\nPeople's Party will act as a unified center for all left populists who support your government. Nick Brana - the co-chair of the party, who spent his political time in irrelevancy trying to draft Bernie for his anti-duopoly cause, finally got to be relevant."
 usc.72.a: "Amazing job, Tulsi!"
 usc.73.t: "Ultra-MAGA Movement Gains Momentum"
 usc.73.d: "As President Trump has become more militaristic, some of his supporters have seen it as part of his plan to finally end the influence of the anti-American deep state and its supporters. They call themselves "ULTRA-MAGA" and "Qanon" and they organize to support the president's radical actions to silence liberals.\n\nIt all started with some anonymous online posters claiming to know about things behind closed doors. Since 2017, the more radical version of the MAGA movement has gained some ground, and with the unexpected turn of the current situation, they have started to work more openly.\n\nThe president has not commented on any organizational activities done by his rabid supporters. However, at different times, he has addressed concerns about "radicalism" inside his base. He has said that it is nothing more than a liberal talking point and that every Trumpsters is a "very fine patriots.""
 usc.73.a: "Very fine people!"
 usc.74.t: "Return of Trump's Rasputin"
 usc.74.d: "With the COMPLETE FAILURE of Little Tommy and his blueSHITS gang, every reasonable nationalist is now returning to our government. How wonderful!\n\nAmong these returnees is Steve Bannon, an old acquaintance of Trump's. He has already restored all his broadcasting activities and is saying that Little Tommy was an embarrassment.\nThere is always room for forgiveness. Steve is tough and intelligent, and America needs people with such patriotic vigor. Not only him, but also his brand of populism. Miller is also back - such a superstar.\n\nFor years, the liberal fake media proclaimed Bannon as your "secret brain," the policy maker, even after you fired him. You kind of missed your nightly chats with him. "Sir, you have proven yourself right for the job," he says. "I was foolish for ever doubting your resolve." It's okay, Steve, we all make mistakes. Now, let's talk business."
 usc.74.a: "Welcome back, Partner."
 usc.75.t: "GOP Presidential Nomination"
 usc.75.d: "The televisions are tuned in by thousands of viewers as the Republican Party officially begins its presidential nomination process. During this process, Republican politicians will vie for the presidency, attempting to sway voters and delegates.\n\nThey will engage in debates, interviews, and rallies to influence the voting process. This year's nomination process has been particularly intense, with over ten candidates from across the country competing for various positions. The audience of the FOX News debates is very happy and amused. Trump's unusual style of debate is now being imitated by other speakers, who are all doing a crude version of his attitude and politics, except a few outliers.\n\nA diverse array of individuals, both young and old, are vying for the presidency. However, only one will emerge as the victor.\n\n[USC_trump_third_term_text]"
 usc.75.d1: "...And it will be Donald J. Trump. After he successfully overturned the 22nd Amendment and showed his willingness to run for a third term, he is sure to receive full support.\nIn fact, the other candidates are here only to maintain the democratic appearance of our government. Most of them are here to boost their name for the next election cycle. One by one, they fall into line and support Trump for president or his agenda."
 usc.75.a: "Trump For Third Term, Let's GO!"
 usc.75.b1: "JD Vance was able to win over Americans with his charm."
 usc.75.b2: "Marco Rubio's pragmatism and right words win people over."
 usc.75.b3: "Ron DeSantis wins with his unyielding personality."
 usc.75.b6: "Matt Gaetz's firebrand rhetoric wins him the presidency."
 usc.75.b4: "Carlson's silver tongue gets him into the Presidential office.."
 usc.75.b6: "Mike Johnson's undying love for ISRAEL won him the hearts of millions of JEWS."
 usc.75.b7: "Vivek's vocal love for Trump secures votes for him."
 usc.75.b9: "Kari Lake wins the nomination."
 usc.75.b8: "Byron Donalds wins the nomination."
 usc.75.j: "Carlson's silver tongue gets him into the Presidential office."
 usc.75.c1: "Rand Paul's years of hard service helps him win the election."
 usc.75.c2: "Sarah Palin finally gets a chance to shine."
 usc.75.c3: "Elon Musk wins the nomination."
 usc.76.t: "Seating President Receives the Nomination"
 usc.76.d: ""
 usc.76.a: "Outstanding."
 usc.77.t: "Inauguration of the New President"
 usc.77.d: "Wow, what a crowd! Not as big as yours, of course, but still impressive.\nYou're handing over the reins of this great nation to someone new. It's a strange feeling. You've become so accustomed to the seat of power, but now it's time to let go.\nThousands of people came to see the new President take the oath of office. Yet they still praise your name. You gave them a chance to vote for someone they truly wanted, not for those losers like Mitt or McCain - poor dead bastard, if only he could see America now, he'd die again!\n[USC_inaguration_dynamic_text]\n\nThe Trump presidency may be over, but the franchise "Era of Trump" is far from being done.\n\nLights, camera, action! Let the second season begin!"
 usc.77.d_trump_kid: "And here they are, your own blood, who will continue to serve this great nation. With the help of their patriarch, of course. Their speech is nothing short of a living legend of you and your deeds. How charming!"
 usc.77.d_normal: "As they conclude their vows and commence their address, you become aware that no matter what, you will triumph in this new America. Their words are nothing but a celebration of you and your achievements."
 usc.77.a: ""I do solemnly swear...""
 usc.78.t: "Picking the Vice-President"
 usc.78.d: ""
 usc.78.a1: "Anthony Kern!"
 usc.78.a2: "Jack Posobiec!"
 usc.78.a3: "Mark Finchem!"
 usc.78.b1: "Tim Scott!"
 usc.78.b2: "Tommy Tuberville!"
 usc.78.b3: "Glenn Youngkin!"
 usc.78.c1: "Thomas Massie!"
 usc.78.c2: "Chris Wright!"
 usc.78.c3: "Nancy Mace!"
 usc.79.t: "Nominee Trump Picks President Trump"
 usc.79.d: "As expected, but still unprecedented in American politics, the GOP presidential nominee, one of Trump's children, has chosen their father to be their official running mate.\n\nIn an official statement, they said: "There is no better man to lead as second in command than one who is so dear to all patriotic families in America. He has shown that he cares more about this country than he often cares about himself, giving everything he can to MAKE AMERICA GREAT AGAIN(...)"\n\nWhile radical Trump supporters and ordinary people are welcoming this situation, seeing many advantages in having two Trumps in power at once, the liberal media, which rarely make it to public view, claim that this creates a "total dictatorship." They say that Trump's child is just a "tool" for their "power-hungry father and his ambitions."\n\nEven many congressmen and Republicans who are loyal to Trump point out the possible illegality of such loopholes, and many warn about staying in power for too long. However, loopholes exist for a reason, and even society, built in Trump's favor, is divided on this issue."
 usc.79.a: "Vote Double Trump for Double Greatness!" 
 usc.80.t: "Portrait of the President"
 usc.80.d: "Who is Donald J. Trump? Many find it difficult to pinpoint the true and honest personality traits of our president. With his over-the-top nature and unpredictable behavior, it seems that different groups of his supporters have formed their own vision of Trump.\n\nTo many, he is a billionaire of the people, a true blue-collar businessman. Despite his extravagant spending and boasting about his wealth, this is what draws people to him. Unlike corporate executives from New York, he acts like any average American who has just earned a million dollars - with golden plates, names on everything he owns, and attractive women. He is a man who is not ashamed of his wealth, but who is also always happy to help the working guy.\n\nHe's also a Macho man. Trump alone can fix many problems, he takes all issues hands-on, and deals with them shiftily. He doesn't need any limp-wrist bureaucrats or pencil-neck lawyers to bore him with graphs or statistics - if there's something wrong, it must be fixed now. The ultimate champion of strength, and for a portion of the American people, they had been anticipating the arrival of such a leader for a very long time. If someone gets in his way, he will just say "You're fired!"\n\nIn the end, Trump is the American Dream personified. To his supporters, he is the only person who got capitalism right. From trade deals to deregulations, there has never been a better President for business. His aura irradiates success, Trump is the visionary of capitalism, the business magus, the wise man of the boardroom, a living confection whose every step and word bespoke gravitas and experience and power."
 usc.80.a: "Billionaire - President of the People... Yes, I stand for the average guy."
 usc.80.b: "I'm the most Macho President of America - EVER!"
 usc.80.c: "Yes, I'm the Visionary of Capitalism... With Endless Amounts of Money."
 usc.81.t: "New Party For New America"
 usc.81.d: "The Republican Party is no longer effective. They lack the necessary determination and can not achieve anything. It is time to introduce competent leadership and establish a party that truly represents America and its citizens.\n\nFollowing recent organizational changes, Ken Paxton, the current chairman of the Republican Party, has officially announced a complete rebranding of the party.\n\nIn a formal statement, he stated, "The Republican Party has served the American people well, but for too long, internal issues have been a source of concern for this great party. After careful deliberation and with the President's approval, the party is embarking on a journey to transform itself from a party of weak-willed Republicans to a party of resolute patriots."\n\nBranding - yes, very important. Donald Trump knows this well. You know, "Whatever you call a ship, so it will sail." - famous quote and all of that. People need to understand the new party right away, and the name is the first step towards that. So many options to choose from, and Dan says they're all good. But we can't use all of them because it will sound like one of those Commie Party names. What we need is something simple and effective."
 usc.81.a: "It's about unity... Unity - so very important. One Nation Under God."
 usc.81.b: "We love our Constitution. Don't we, folks? The main pillar of our Union."
 usc.81.f: "I'm a patriot, not a globalist. And the future belongs to the patriots."
 usc.81.c: "We're populists. We delivered so much to our people. Bannon is right."
 usc.82.t: "Picking Sides"
 usc.82.d: "Leading a bigger than life coalition is such a hustle, but especially building one. With the GOP fully on-board and united following 'rebranding', questions arose of who else to invite into the MAGA-sphere? We are of course a very welcoming bunch, we love everybody who DOESN'T dislike us.\n\nMatt - what a guy, has been going around saying how much we should respect our workers - the best workers, believe me. There's even an organization for true patriotic blue-collars, called LEAGUE OF AMERICAN WORKERS - a nice name. They're like a trade union, but better: no corruption, no marxist agenda, only pure blooded interest of our hardworking toilers.\nBut siding with such organization can harm our standing with the big and mighty business, and we wouldn't want that!\n\nOn the other side, Sacks - a very rich and techy boy, he's saying that the future lines with a truly American silicon valley, and the smart people - like Elon and him, also a bunch of indians for some reason. They're very much big MAGA-Tech, y'know. We can use their brains - and their bags of money, or SACKS of gold, pun intended.\n\nOn the much safer bet - Independents, or No-Labels as they called sometimes. They have been trying for years to get into big politics. but the uniparty was so unfair, and all they wanted is to solve their local issues, nothing big. Those won't change much, but they don't even plan to. More importantly they won't cause harm."
 usc.82.a: "Workers - they love what we do, always loyal MAGAs, from the very start."
 usc.82.c: "Techies - smart people, we need those around."
 usc.82.b: "Lets just go safe, prop up No-Label Guys."
 usc.83.t: "Kings And Their Ivory Towers"
 usc.83.d: "The Union lies defeated, and so are their biggest donors and puppeteers.\nJust look at them, hiding away in their big buildings and headquarters, scared of what the new MAGA authorities will do to them. There are so many ways we can retaliate against them for all the censorship, corruption, and spreading of radical communist nonsense they've done.\n\nWe can seize their assets, freeze their accounts, dismantle their companies, and use all that money to fund new American businesses, pay workers and the middle class, or improve social security - it doesn't matter what. The message will be clear: the era of transnational corporations in America is over. If they want to go, they can move to Europe, where the Russians can do whatever they want to them.\n\nAlternatively, we can utilize them. It's so easy to influence them and show them who the real boss is now. DC won't take orders from Corporate Towers anymore, it'll be the other way around. After all, all these companies - Microsoft, META and Apple - are part of America, just like apple pie. \nSure, they may ask for some dividends, but the MAGA administration is known for its BIG dreamers, and they have a lot of them."
 usc.83.a: "This is MAGA country now, we don't need these globalists."
 usc.83.b: "Loyal corporations are what we need, they have money, they have jobs."
 usc.83.c: "Make them embrace MAGA. This is not just about money, it's about a new era."
 usc.84.t: "Inside Look Into Trumpist Festivity"
 usc.84.d: "FROM: INDEPENDENT PRESS WEBSITE\nBy Jay Ferguson\n\nI arrived at the militia compound outside Topeka just before dawn. From the interstate, the sight of tents, a stage, roaring bonfires, and rows of pickup trucks flying countless American flags was impossible to miss. The air carried a mix of barbecue smoke and gasoline. Country rock, revving engines, and the crack of gunfire made it feel like half tailgate, half war zone.\nAs I walked into the crowd, a group of men leaning on their trucks sized me up. One of them, a bearded guy with mirrored sunglasses and an AR-15, glanced at my notebook. "You press?" he asked cautiously. "Not fake news, right?" I shrugged. "Just here to see what you're all about," I said. He studied me for a moment, then grinned. "Hell yeah! Come on in-grab a beer, we'll tell you the real story."\n\nThey sat me in a fold-out chair and handed me a cold can of beer. The bearded man leaned in. "Trump's the only guy who didn't turn his back on us. We bust our asses, and what do we get? Jobs gone, illegals everywhere, and politicians getting rich. Trump's the only one who fought for us. To hell with term limits-Trump forever!" His friends cheered with a loud "Hell yeah!"\n\nEvery time I tried to explore, someone stopped me to share their story. Bearded Guy's wife, a brisket-slinging whirlwind in a red MAGA hoodie, waved me over. "Grab a plate before it's gone!" she called, piling it high. As I ate, she leaned in. "I wasn't always political," she said. "Then my sister got hooked on painkillers. They kept saying help was coming, but it never did. That's when I saw it-they don't care about people like us. But Trump? He talks about what no one else will. I'm with him 'til the end."\n\nBy the time the militia leader took the stage, the crowd was charged. His voice boomed over the fires as he reached his crescendo: "This is Trump's America now! He fights for us, for our families! The deep state wanted to bring him down, but we won't back down! Trump Forever!" The crowd erupted, waving flags and chanting the president's name.\n\nAs the event wound down, Gary told me I was "one of the good ones" and insisted I find him on Facebook. Walking back to my car, my waistband tighter from brisket and beer, I reflected on what I'd seen. These people weren't polished or sophisticated, but their devotion was real. For all their bravado, they were warm, welcoming, and eager to share their faith in the man they believed would save an America that had left them behind."
 usc.84.a: "No Limits, No Turning Back." 
 usc.85.t: "Golden Arches"
 usc.85.d: "Fargo's McDonalds had seen far better days. Nowadays, the drive-thru had been discontinued and fries came in rationed portions. The grills still sputtered, the fryer still hissed, and the staff somehow still continue to work.\n\nA low rumble grew louder outside. Black SUVs rolled into the gravel lot, and the doors opened to Donald Trump himself, his larger than life with a grin carved into his face. "Beautiful place, folks. Beautiful," Trump declared, his voice bouncing off the faded tile walls like it owned the room. "Best McDonald's in South Dakota, maybe the whole Midwest. Believe me, I've seen them all."\n\nThe manager, an older man with grease stains on his apron and deep lines under his eyes, shuffled forward. "Mr. President... welcome. It's an honor, really."\n\nTrump clasped his hand firmly. "No, no. The honor's mine," he said, his words exaggerated with weight. "You're the backbone of this country. Burgers, fries--that's the spirit of America. And you're holding it all together. Incredible."\n\nBehind the counter, a young employee slid a tray across with trembling hands. The Big Mac on it was missing its top bun, the fries were scarce, and the soda barely reached halfway up the cup. Trump grabbed it as if it were a banquet platter. "This is fantastic," he said with an unwavering tone. "Even in tough times, you folks deliver. The Big Mac; Iconic. Historic. Just like what we're doing.""
 usc.85.a: "It's all good stuff, great American food."
 usc.86.t: "Hannity: Communism On Trial, America Rejoices"
 usc.86.d: "FROM: FOX NEWS - HANNITY\n\nAs you might have heard already, the radical communist bandits have been put on trial. And now, our nation can see the true red villains - the marxists, the so-called 'democratic' socialists, and the anarchists.\nLook into their faces, you'll see no remorse for what they have done, only cold expressions of the maniac. They're complete devoid of any understanding of human suffering they and their dangerous ideas have caused. It seems their only sorry for not committing more crimes.\nOne of our respected experts - Joyce Messier, have measured that the amount of unjustly killed civilians on the territories that were controlled by the communist insurrection  reached to ONE MILLION, hear ONE MILLION, truly disturbing knowledge, especially if you look at the eagerness of their thugs to commit more!\n\nOne of those low-life scum - Luigi, apparently is his name, crazily yelled when being dragged towards the courthouse, that "We didn't kill enough!", Watch.\n\n----\n\nDisturbing. Thankfully our country won't suffer from their insanity any longer, President Trump and our brave patriots had saved our nation from the clutches of this menace. Like Reagan did. However, this time it was even more dangerous and terrifying, but we overcame.\nWe will always remember the crimes committed by radical socialism, and we will mourn its victims.\n\nThis is the Sean Hannity show, and we'll be back after this short pause."
 usc.86.a: "Hey RED, you're DEAD!" 
 usc.87.t: "Carlson: Corrupt Democrat Machine Investigated"
 usc.87.d: "FROM: FOX NEWS - TUCKER CARLSON TONIGHT\n\nHey! Welcome to Tucker Carlson Tonight.\nThe main topic of this week is clear to see, and I know you can't wait to discuss it. The corrupt Democrats are standing trial for all their actions.\nNot only are they being prosecuted for their terrible insurrection and other crimes they committed during this period, but our DOJ is making sure that no crime of any kind goes unpunished.\n\nThese include corruption, constitutional sabotage, censorship, and policies that were aimed at the American people as a whole.\n\nHere are the main three, so to speak: Nancy Pelosi, who is barely able to walk, Chuck Schumer, who still looks like a creep, and Hunter Biden, who seems relatively fresh, probably not taking much cocaine in his cell.\n\nThey may be mumbling, but the evidence is already there! Our prosecutors and the general attorney have done an amazing job documenting all the crimes of this illegal regime. Let's take a look at some of them.\n\n----\n\nWow, what a ride! True Democratic mafia.\nWe should be thankful to God that we have defeated these evil people -and make no mistake, they are evil.\nThere is much more to cover in terms of smaller cases and prosecutions related to these three big criminals. We'll return with our invited expert to discuss it in more detail after this short ad break."
 usc.87.a: "End of their line."
 usc.88.t: "Watters: FBI-Fakers To Be Put In Prison"
 usc.88.d: "FROM: FOX NEWS - JESSE WATTERS PRIMETIME\n\nHere's Jesse Waters, with the latest headlines: "Patriot Front Terrorists to Stand Trial."\nYes, you heard right. The so-called 'Patriot' Front leaders are being jailed right now. This is great news!\nThis not only disproves the old and tired liberal accusations of "fascist" MAGA, but it also puts an end to the biggest money laundering operation in the history of the Deep State.\nHonestly, folks, does anyone really believe that these "nationalists" who wear white masks and are extremely racist appeared out of nowhere? Clearly some FBI meddling took place.\n\nLook at this guy! You can see the ringleader of these disqualified federal agents - Thomas Rousseau, or as President Trump called him 'Little Tommy'!\nQuite a look he got, that guy - Little Tommy. There isn't much he can say to defend himself, all cards are here - on the table - he led a violent insurrection against - not only against legitimate government - but against American democracy as a whole. And now he and his unmasked friends will be put in prison.\n\nI'm not sure what made Tommy attack the hand that fed him - the Democrats. Perhaps it was just a misunderstanding or something like that. We'll discuss the whole thing more with our experts. See you after this short commercial break!"
 usc.88.a: "Little Tommy in the big cell."
 usc.89.t: "Are You Ready To Rumble?"
 usc.89.d: "The crowd that had amassed before the podium was a large one, consisting primarily of soldiers that had just returned from the frontlines. It was deemed they were in need of a morale boost, and so they were about to be given the most morale boosting thing of all, a speech.\n\n"Do you think Trump is gonna speak? That would absolutely be something to write home about!" Tony, a new recruit said, pestering his older friend Ron.\n\n"Doubt it, they wouldn't bring him so close to the front, especially with all the air strikes these days." Ron, replied.\n\nSoon, the murmurings of the crowd were cut off as a figure crossed the stage to the podium. He was old, but in good shape, wearing a red tank-top and bandanna. On his face he had, what Tony decided, was quite possibly the ugliest mustache he had ever seen. Tony didn't know who this guy was, but a lot of people in the crowd began cheering. He decided to ask Ron.\n\n"Are you kidding? That's Hulk Hogan! The greatest wrestler!" Ron exclaimed, acting more like a child than a man of his age. Before Tony could speak again, Hulk started talking.\n\n"Trumpamaniacs," he began, "are you ready for what's about to come?" He continued. Tony was concerned about what that might be..\n\nThen, Hulk Hogan ripped off his shirt, revealing a different one below it with the American flag and Donald Trump on it. The crowd went crazy, but Tony still didn't understand the hype, but went with it. Tony could hardly hear anything over all the cheers, just how popular was this guy?\n\nBy the time the old wrestler left the stage, the whole crowd was chattering excitedly. It seemed as if the horrors of war had been forgotten, if but only for a moment. Tony had also forgotten the war for a moment, but more so out of confusion than awe. So as Ron explained about watching old wrestling matches, Tony just couldn't stop thinking about that mustache."
 usc.89.a: "TREMENDOUS!" 
 usc.90.t: "For America!"
 usc.90.d: "The scene was chaotic but controlled as thousands of patriots, clad in a patchwork of pseudo-military and camouflage gear, crowded in front of the stage to await the speech from America's savior. The sky was gray after days of brutal fighting in the region, and local victories had boosted the morale of America's bravest soldiers who put their lives on the line to defend their republic.\n\nThe crowd roared as President Trump appeared out of a military vehicle and strolled towards the stage, wearing a black overcoat, his signature blonde hair and red tie slightly charred from the ash-filled atmosphere. His face was weary and wrinkled from his ever-increasing age and the stress and strain of leading his country, like a true patriot. Heavily-armed secret service agents escorted the president on all sides, though this would probably be the safest place in the world for Trump, the crowd cheering in approval and loyalty. MAGA flags waved in the crowd and soldiers bunched up as far as the eye could see. \nTrump waved to the crowd from left to right, and raised his hand signaling for silence. The roars almost immediately ceased.\n\n"My fellow Americans," he began. "warriors, patriots---today we stand at the precipice of history. This war, this great struggle, is about what America really stands for.. and I'll tell you right now," Trump chuckled, "it's not what the other side wants you to believe".\n\nThe crowd erupted in cheers, flags waving, faces filled with pride and determination. "Crooked Joe.. he's out there," Trump held the podium tightly. "Hiding in his basement.. he's supposed to be the leader of this nation but just look at the disaster he's made of it, I mean really! That Lyin' Joe and his radical left wing cronies. But we.." the President trailed off. "We.. are the ones who are going to win. Not Slow Joe and the America-hating elite. We will be the ones who bring this country back to greatness!"\nThe soldiers cheered again."
 usc.90.a: "MAGA!"
 usc.91.t: "GOP's New Groove"
 usc.91.d: "Despite all the reforms and improvements over the years, the Republican Party is still a poorly performing institution. There are lazy senators, do-nothing Republicans, and RINOs  who have left a lot of negative legacy. And many corrupt individuals continue being a stain on it today.\n\nThis is why people are really looking for something truly patriotic. We can still honor the memory of Nixon, Reagan, and Lincoln without the label of a political party. They would surely appreciate it.\n\nChanging an entire party is a challenge, but it needs to be done so that the age of Trump can move into a new phase. We have several options to present and transform our party into a new one."
 usc.91.a: "Trump made us into the Party of the People."
 usc.91.b: "Trump molded us into the Party of the Patriots."
 usc.91.c: "Trump shaped us into the Party of the American Nation."
 usc.92.t: "Hinkle's Letter"
 usc.92.d: ""Dear President Donald J. Trump,\nI hope you are well. My name is Jackson Hinkle, and I am an American communist. But more importantly, I am an American patriot.\nBefore you stop reading, let me explain my position. We support you. The things you have done for the working class of this war-torn nation are incredible. You truly are a people's president. We, of course, like any reasonable opposition see downsides and mishaps, but understand that this nation requires and supports you in its majority.\n\nAfter the fall of the deeply flawed 'socialist' government in California, my comrades and I began to organize. We are united by the idea of helping those in need and building a stronger America.\n\nMy group, called 'Communists for Trump,' has gained a lot of support from patriotic communists. However, we have been repeatedly shut down by government authorities from participating in more active political activities.\nThat's why we ask you to help us and end the unlawful prosecution of our movement. Patriots can work together to improve our country with a shared vision."\n\nThe latter then goes on to talk about how to create a "truly American socialism" or something like that. You didn't read it, but these guys are interesting.\nCommunists for Trump? MAGA Communism? You're so popular, even the reds love you! And the workers, we're doing so much for them, but we can do even more, and they can help..."
 usc.92.a: "These guys sure are something, but hey, the more the merrier!"
 usc.92.b: "Total gibberish! Communism is THE ENEMY of America, Period."
 usc.93.t: "Liberation of Our Heroes"
 usc.93.d: "Many true Americans were imprisoned under the illegal Biden regime. Now that it has collapsed, we must release them from these cruel prisons and make room for those who truly deserve to be behind bars.\n\nThousands of political prisoners are being released from all prisons under our control. Some of them only expressed verbal dissent and were brutally suppressed. However, many fought for their rights as Americans, like true patriots should, and were punished for it.\nThese kinds of people are not big on peaceful life. Even though they were held in cruel conditions, many of them are already signing up for militia membership or restoring their existing status as a soldier. They are very brave. They are becoming the faces of our movement, the passion bearers of MAGA.\n\nUnfortunately, some of them did not survive to see their liberation. They were tortured and killed by the democratic crooks. But our Department of Justice is doing its best to remember and gather evidence of all unjustly killed patriots, and publicize the crimes of The Deep State. They will become martyrs - martyrs of the new America."
 usc.93.a: "Our Guard Is Marching On..."
 usc.94.t: "Richard Spencer Executed!"
 usc.94.d: "Richard Bertrand Spencer was a man that didn't shy away from putting himself in the spotlight, being one of the organizers of the "Unite the right" rally and a key figure in the so-called "Alt-right" in 2016, however his escapades wouldn't end there. At the height of the elections before the civil war, Spencer denounced his support for Trump and instead endorsed Joe Biden, a move that caused a lot of confusion among his far right allies, causing him to become more isolated as the Biden camp openly denounced his endorsement.\n\nNow with the civil war in full swing, Spencer attempted to integrate himself into the Union of America as a means to elevate his career, but after several incidents of workplace abuse and harassment, he was quickly fired from his low administrative position.With his role in the union buried, he was quick to defect to the Constitutional government as he tried the same game there, however he was quickly sniffed out as both his role in the union and his support for Biden before the civil war came to light.\n\nSpencer was arrested and awaits trial for treason, it is very obvious what fate would await traitors, no matter the method, this would be the nail in the coffin for Spencer's career.\n\nWhen security offered him to provide his final meal, all he requested was..."
 usc.94.a: "...'A good swiss melted swiss cheese and mush-roasted mushrooms caramelized onions on a burger.'"
 usc.95.t: "God Given Right"
 usc.95.d: "Trump was surrounded by his press corps, all eager to get that perfect shot of him with that wide smile and his iconic thumbs-up, the countless cold rifles in the background creating a stark contrast of the image the president was trying to give off. The room was buzzing with energy, each flash of the camera briefly coating the room in bright light as Trump raised his arms to ensure focus.\n\n"We're here today," his voice booming with an exaggerated sincerity, "because we need to recognize those who, quite frankly, are keeping us in this fight. Our people - the real behind-the-line patriots, folks who are making sure we have all the tools to fight. Trust me, folks, our fighters are getting the best of the best made right here!\n\n He went silent. His gaze swept over the press corp before quickly snapping his neck back toward the counter where the shop owner emerged, lugging a rifle. "This, Mr. President is an M4 Carbine chambered in standard issue 5.56".\n\n Trump leaned over the counter and grabbed the rifle with both hands, struggling to keep the heavy gun up before chuckling to himself. He turned back towards the cameras, his brow furrowed. "It's really heavy." His eyes darting up and down the long gun, "This great, great gun, something like this can't be made elsewhere, not even by the radical democrats, that's how un-American they are!"\n\nPlaced in his hands, the gun became a prop for an impromptu photoshoot. Trump struck many dramatic poses, first holding the rifle at the waist while the barrel was pointed to the left, then hoisting it upright with the handle resting against his shoulder. Finally, in a theatrical shot, he held the gun directly toward the camera's lenses, with his smug expression just behind the protruding cylinder. The room seemingly held its breath as he aimed but the uneasiness shook off as the president lowered the rifle. "You aren't CNN!". "Anyway, this rifle may not be gold-plated but I think I'm gonna take it!".\n\nThe shop owner's face lit up with delight as his eyes locked with Trump's. The president, rifle still in hand, turned one last time toward the cameras, tilting his head forward in a final dramatic shot."
 usc.95.a: "And I'm proud to be an American..."
 usc.96.t: "MAGA Hat - The Symbol of the Revolution"
 usc.96.d: "The MAGA hats... the red ones, the white ones, the black ones, they come in all shapes and sizes. For kids and adults, some are dirt cheap, others are limited offer special editions (With DJT's signature!)\nThat hat became a big part of your campaign, then your whole movement, and your presidency. It's just a simple hat, but it says a lot. When someone wears it, they're basically shouting, "MAKE AMERICA GREAT AGAIN." Even in the middle of all the chaos, your people find each other by looking for those bright red hats.\nYou wore it a lot too, in the White House, at rallies, everywhere. Having that hat made you feel like you were really part of the crowd - like we're all in this together, making America great again, one step at a time.\n\nWhat's this all about? Well, Jared and some other advisors said that the MAGA hat is kind of like a modern-day version of the cockade that the Continental Army used. So, they think it would be cool if the president, just like George Washington himself, could wear a symbol of this new revolution. At least in all the official stuff and the media.\nOn the other hand, it would mess up your killer hairstyle, which is a big symbol in itself!\n\nWhether or not to wear something that your fans find as important as American apple pie and the Second Amendment is up to you... Just remember, you won't be able to show off your amazing hair."
 usc.96.a: "Fine! Dan, bring out the stash, I got one for every day of the week!"
 usc.96.b: "You know what's really gets people going? Me!"
 
 darkmaga.1.t: "The Wrath"
 darkmaga.1.d: "I need action. Forget the congress - total wasters, can't do anything. Put me on TV - primetime, high ratings. I will declare a HUGE emergency. My people need protection - a strong hand for a strong decision. I'm done playing nice, when you're hit - you hit twice as hard, and I'm THE PRESIDENT, I can hit as hard as I want.\n\n"My fellow Americans, I address you tonight to declare that our nation's dying - both figuratively and literally. The war rages on - a bloody war, and we need action before everything else. I stand as guarantee of your safety and security. This is why, today, with powers given to me by our sacred constitution, I am making use of the War Powers Act. Make no mistake, this is a real war, and I'm - currently a Wartime President.\nFor too long you - the people, been fooled and lied to by corrupt politicians, even in our own ranks. But this ends NOW - the time for empty talk is over - here comes the hour of action...\nAs long as I remain President and as long as the War Powers Act is in effect I pledge to respect all freedoms to the best of my ability. But to our enemies I say this, both inside and outside - your disgusting foul play will soon come to end.\nMy people, fellow Americans, your time has come. Let's do this..."\n\nWith this, the cabinet is dissolved, and the congress has been suspended – perhaps forever. For the time being, you are now a king above the law. Use this power as you see fit."
 darkmaga.1.a: "I'll give my people the lives they need..."
 darkmaga.3.t: "Bringing It Forth"
 darkmaga.3.d: "It was a remarkable sight to behold: a vast crowd anxiously watching the big LED screens that broadcast live from the main courthouse. To them, it was like a show, like "The Apprentice," except instead of "You're Fired!" - a death penalty.\n\nThe "defendants" - numb and weak, mumbling their pathetic words. They knew it was a show trial; there was never any room for objection. All of them had been labeled traitors long before it began - by you in one of your TRUTHS.\nThey get hysterical when the judge declares them "guilty on all accounts - TREASON." Moments later, two big, strong guards take them out of the room, into the void - forever.\n\nHow many of them were truly guilty? It didn't matter - they're all sycophants and opportunists, ready to betray you and America at any moment.\nYour people knew it too. With each verdict, the crowds grew louder, more eager. "It's the righteous deliverance," they said. "All these stupid feds and their stupid laws. They deserve what's coming." People cheered, while those "rats" begged and cried. It seemed to them that this was what they had been missing. They felt that with each dead bureaucrat, their lives would become better, and Paradise, once lost, would be regained.\n\nA great show, regardless of its religious underpinnings. You tell Dan to save a copy of the courtroom recordings for private use."
 darkmaga.3.a: "Slice - Come Paradise!"
 darkmaga.4.t: "Rats In The House"
 darkmaga.4.d: "Here they are - the critters and freeloaders. It was inevitable. Listen to their complaints and cries, like spoiled children who can't accept that the future no longer belongs to them.\n\nMost of them are liberals and socialists who are coming out of their hiding places because they believe that "the danger has never been higher" and that "Trump has gone mad with power." But there are also some who are just angry about Trump's "hostile" takeover.\n\nTheir resistance is pointless, there's no doubt about that. However, as some commanders suggest, it's better to end it quickly. Otherwise, their audacity  may grow with each passing day."
 darkmaga.4.a: "Total losers."

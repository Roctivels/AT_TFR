 usc.14.t: "Between the Bullet and the Ballpoint Pen"
 usc.14.desc: "The initial days of the American Constitutional Government were ones of euphoria and ecstasy. Trump, the often spat-on populist ridiculed by every snobbish academic and establishment politician, had defied the all-so mighty liberal establishment and lived to see the day. However, those days are gone and gave way to today's very harsh reality: playing politics in pre-war America was one thing, but running a government with deep factionalism during a state of war was another...\nAs on any other day during the work week, Trump could be found in his office, with a cup of his favorite coffee, fiddling through a mound of paperwork submitted for the day. As the government's president, he was the final say on a variety of issues and the target of a variety of groups wanting in on some big favors. The American Constitutional Government's Armed Forces, although to the public the most devout of loyal patriots, had quite the list of \"interests\" that they wanted dealt with favorably. Lists or requisitions requests, invoices for lots of funds, and requests for issues to be resolved in their favor; the demands were mind-numbingly extensive. Congress, always wanting to preserve their say in everything, had their own interests as well, often demanding president Trump to act on the often decried \"unconstitutional overreach\" of some key players in the military. Other than the pressing issues of defeating the Biden government in Washington, Congress would often be busy debating and bickering what the military did today that broke some Congressional protocol or statue to Trump's annoyance.\nAmongst the mess of politics within the American Constitutional Government, one question remained: What was the Commander in Chief to do?\nTrump picked up the first packet of invoices for the day, read the title and header, and sighed to himself as he only had one thought:"
 usc.14.a: "\"Make a choice Mr. President...\""

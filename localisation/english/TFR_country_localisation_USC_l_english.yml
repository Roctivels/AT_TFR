 usc.1000.t: "America - Changed Forever"
 usc.1000.d: "It was a thing to behold. Victory, total and complete victory, they were wrong, they've always been wrong. Everything they've thrown at you, think of it, all the struggle, all the fighting, the Wall Street cokeheads who tried their best to bankrupt you, those mob contractors who tried to stiff you, and all the leechers and parasites along the way, they couldn't hold you back - They only fueled your rise.\n\nUSA!  USA!  USA!\n\nYour people, there they are, across the country, celebrating, chanting, revelling. Your victory is theirs; Your America is theirs, changed forever and this victory has calcified it, in the decades and centuries to come they will remember what you've done for your people, and all the haters will be long forgotten.\n\nTRUMP! TRUMP! TRUMP!\n\nYou never backed down, never surrendered. All the fake media and those Hollywood nobodies, who fled like rats from a sinking ship, calling you a 'coward' and a 'grifter' - well, they must be feeling pretty damn stupid right now!\n\nVICTORY! VICTORY! VICTORY!\n\nWashington draped in flags and banners like never before, crowds gather to rally, the greatest rally - some say the biggest ever. While you wait in shadows, waiting your turn, as speaker after speaker puffs you up; Vice-President, Tucker, Ivanka, and many others.\nYou finally walk out. The crowd roars and claps - It's a stream of people. Making your way to the podium you think of the good starter line; something to get people going. As you close in to the microphone, you decide - everyone loves a good throwback."
 usc.1000.a: ""...Sorry to keep you waiting, complicated business!""
 usc.1000.b: ""...Sorry to keep you waiting, complicated business!""
 usc.1000.c: ""...Sorry to keep you waiting, complicated business!""

 usc.1001.t: "Trumpist Government Requests Aid"
 usc.1001.d: "We have received a communication from representatives of Denver, who have requested military assistance for an endeavor that we may be able to support. They have stated, in essence, that "anything would be of assistance".\nThey further propose that our assistance could result in potential benefits and enhanced relations with their country, should President Trump emerge victorious in the (EX) United States."
 usc.1001.a: "Sounds good! Deal."
 usc.1001.b: "No, I don't think we will." 

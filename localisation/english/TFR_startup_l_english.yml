 SOV_adl_progress_tooltip_name_og: "£GFX_adl_progress_logo §sAlliance of the Democratic Left "Progress"§!\n\n\n                                             £adl_progress_flag"
 SOV_adl_progress_tooltip_name_labour_party: "£GFX_labour_party_logo §tLabour Party§!\n\n\n                                             £labour_party_flag"
 SOV_adl_progress_tooltip_name_new_socialists: "£GFX_new_socialists_logo §sNew Socialists§!\n\n\n                                             £new_socialists_flag"
 SOV_adl_progress_tooltip_name_union_of_social_democrats: "£GFX_union_of_social_democrats_logo §GUnion of Social Democrats§!\n\n\n                                             £union_of_social_democrats_flag"
 SOV_adl_progress_tooltip_desc_shevchenko: "§LDuring the period of the destruction of the old, United Russia system of parties, an alliance of all those leftists who, for one reason or another, do not like the Communist Party was formed: ADL "Progress". This party is a hodgepodge of leftist organizations and the most left-wing part of the former "A Just Russia", and it exists at the expense of its former sponsors. Different groups often come up with completely different and unsuitable ideas for each other, which results in a permanent struggle for influence.\n§tSocialist Unity§! - Many people do not understand whether they are communists at all or not, but this does not prevent them from taking a unified position. The faction of "Progress" which is closest to the Communist Party of the RSFSR, advocates a full-scale alliance with the Communist Party and some even advocate merging with it.\n§WFreedom and Justice§! - a more moderate bloc that managed to come to an agreement with other members of Progress, led by Maxim Shevchenko, the former leader of the Russian Party of Freedom and Justice. They dislike the Communists, but not as zealously and uncompromisingly as some other factions. \n§GSocial Democratic Initiative§! - the union of social Democrats of various stripes: from members of various social democratic associations to left-wing supporters of Yabloko. For the most part, they advocate cooperation with Alexei Navalny's People's Front and they zealously criticize the Communist Party.\n§d"The Left"§! are the most radical and marginal part of Progress. It consists of Anarchists, Trotskyists and other informal leftists. They are characterized by the greatest stubbornness in rejecting the Communist Party's power, and they are not averse to loudly proclaim this.§!"

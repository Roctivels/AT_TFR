 SOV_party_unity_tooltip: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n£GFX_SOV_party_unity_banner\n\n\n\n\n\n\n\n\n\n£GFX_party_unity §tParty Unity§! is a measure of internal cohesion, an indicator of the extent to which apparatuses, grassroots cells, leaders and ideologues act in a unified manner, avoiding factional struggles and divisive debates that weaken the commom front. The high £GFX_party_unity §tParty Unity§! ensures a quick launch of internal reforms and firm confidence in the top leadership."

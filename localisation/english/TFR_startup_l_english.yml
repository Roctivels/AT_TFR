 SOV_labor_fatherland_tooltip_name: "£GFX_labor_fatherland_logo §dLabor Fatherland§!\n\n\n                                             £labor_fatherland_flag\n\n\n\n\n                                             Opinion on\n                                             £GFX_CPRF_logo §RCP RSFSR§!:\n                                             [SOV_labor_fatherland_opinion]\n£GFX_Vladimir_Kvachkov_Portrait\n                                             £boost_popularity_texticon Party Popularity: [?party_popularity@totalitarian_socialist|%Y2]\n\n                                             Our Influence: [?SOV_labor_fatherland_influence_var|%Y2]\n\n\n§W       Vladimir Kvachkov§!\n\n\n§YFaction:§! §OPeople's Militia§!"
 SOV_labor_fatherland_tooltip: "§L§dLabor Fatherland§! - This is a party formed from various left-wing patriotic organizations that decided to unite after the Communist Party came to power. Although it is larger than similar organizations of the Putin period, but compared to other parties of the RSFSR, the Labor Fatherland is not large, and it has enough self-financing to carry out its activities.\n\n§O"People's Militia"§! is the successor to the organization created in 2009 by Vladimir Kvachkov, which was subsequently recognized by the Kremlin as a terrorist organization and banned in the territory of the Russian Federation. Popular among retired military personnel, they speak from neo-Stalinist and Soviet-patriotic positions.\n§9PDS NPSR§! is a typical nationalist group that, under the new government, decided to support the Soviet course, despite its past history of using right-wing symbols and rhetoric. They are quite similar to the "Kvachkovites", but they are distinguished by a lesser interest in the figure of Stalin and a greater emphasis on Russian nationalism.\n§ANazbols§! are members and sympathizers of the Other Russia party, the successor to the NBP banned by Putin's government. Their ideology is based on: anti-capitalism and anti-liberalism. Since the 90s, the National Bolshevik party has noticeably veered to the left, and their "Inter-Brigades" have been fighting in the Donbas. The founding fathers of the NBP are philosophers Eduard Limonov and Alexander Dugin, as well as rock musician Egor Letov.§!"
 
 SOV_peoples_front_tooltip_name: "£GFX_peoples_front_logo §CPopular Front§!\n\n\n                                             £peoples_front_flag\n\n\n\n\n                                             Opinion on\n                                             £GFX_CPRF_logo §RCP RSFSR§!:\n                                             [SOV_peoples_front_opinion]\n£GFX_Alexei_Navalny_Portrait\n                                             £boost_popularity_texticon Party Popularity: [?party_popularity@social_liberal|%Y2]\n\n                                             Our Influence: [?SOV_peoples_front_influence_var|%Y2]\n\n\n§W         Alexey Navalny§!\n\n\n§YFaction:§! §CRussia of the Future§!"
 SOV_peoples_front_tooltip: "§L§CThe Popular Front§! - is a coalition of various liberal and centrist organizations and parties created by prominent opposition figure Alexei Navalny shortly after the amnesty of most of the political prisoners jailed by Putin's government. PF includes liberals from Russia of the Future, libertarians and some "system liberals" from the former United Russia. Officially, it is reported that all of the Front's funding comes from "donations from sympathizers and membership fees," but given the history of the FBK and the United Russia Party, it is possible that the Popular Front receives money from abroad.\n\n§CRussia of the Future§! is a faction of the legalized extra-systemic opposition formed during Putin's rule. It consists of liberals and sympathizers closest to Navalny. They are pragmatic in nature, and under certain circumstances may support the course of the Communist Party.\n§YLibertarians§! are supporters of the free market, grouped around the personality of Mikhail Svetov, a prominent opposition figure. They call for reducing the influence of the state on the economy.\n§PSystemic Liberals§! are a group of activists from "New People" and liberal members of United Russia who have decided to form an unholy alliance with their former opponents. They seek to restore and somewhat improve Putin's previous system.§!"
 
 SOV_ldpr_tooltip_name: "£GFX_LDPR_logo §8Liberal Democratic Party of Russia§!\n\n\n                                             £ldpr_flag\n\n\n\n\n                                             Opinion on\n                                             £GFX_CPRF_logo §RCP RSFSR§!:\n                                             [SOV_ldpr_opinion]\n£GFX_Vladimir_Zhirinovsky_Portrait\n                                             £boost_popularity_texticon Party Popularity: [?party_popularity@fascist|%Y2]\n\n                                             Our Influence: [?SOV_ldpr_influence_var|%Y2]\n\n\n§W     Vladimir Zhirinovsky§!\n\n\n§YVladimir Zhirinovsky is the undisputed leader of the LDPR!§!"
 SOV_ldpr_tooltip: "§LThe day when the results of the 2022 elections were announced turned out to be a black day for the LDPR. The main task had failed: the Communists had retaken power in Russia. And they did it in a completely democratic way. Immediately afterward, Kremlin money stopped flowing into the pockets of many of his projects. Any major right-wing politician would have left the arena after this...\n\nBut not Vladimir Volfovich Zhirinovsky. Oh, no, he's not leaving without another fight. Has he fought for nothing all these 30 years?! All that party propaganda, all those tours around the country, all those scandalous statements in the State Duma - is it all for nothing?! No! Vladimir Volfovich will take revenge. No money? Get your rainy day stash, get your old sponsors back, find new ones! The fight against communism is not over as long as Zhirinovsky and his cause are still alive!§!"
 
 SOV_patriots_party_tooltip_name: "£GFX_patriots_party_logo §gPatriots' Party§!\n\n\n                                             £patriots_party_flag\n\n\n\n\n                                             Opinion on\n                                             £GFX_CPRF_logo §RCP RSFSR§!:\n                                             [SOV_patriots_party_opinion]\n£GFX_Vladimir_Solovyov_Portrait\n                                             £boost_popularity_texticon Party Popularity: [?party_popularity@authoritarian_democrat|%Y2]\n\n                                             Our Influence: [?SOV_patriots_party_influence_var|%Y2]\n\n\n§W   Vladimir Solovyov§!\n\n\n§gSolovyov has no savings.§!"
 SOV_patriots_party_tooltip: "§LVladimir Rudolfovich Solovyov thought that nothing would interfere with his position as the country's main media personality, sitting on the state finances on the main federal channel. After all, he had ridden the wave of media patriotism, had become the main mouthpiece of Putinism for all Russians, and the future promised to be very good.\n\nHe did not take into account the fact that his position depended entirely on the mood of whoever was sitting in the Kremlin. And in '22, after the death of the seemingly eternal Putin and the failure of the seemingly invincible United Russia in the presidential election, this wave buried him. In a matter of days, everything he had been building for years was destroyed by the Communists, and he himself was removed from television.\n\nHe decided not to give up. The Patriot Party is an example of the old elites still trying to fight for power under the new regime. Having lost everything, they are seizing every opportunity to regain at least some of their former power. Former Kremlin functionaries gather under the leadership of Vladimir Solovyov, Putin's pocket journalist, hoping to turn things around. They are antagonistic to the Soviet regime, but, given their pragmatic nature, they can change their colors to something more "red" if they wish.§!"
 

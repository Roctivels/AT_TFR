 SOV_cp_rsfsr_tooltip: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n£GFX_SOV_CPRF_banner_long\n\n\n\n\n\n\n\n\n\n§LAfter triumphing in the election and coming to power, the party decided to return to its historical roots by officially restoring its former name, emphasizing continuity and new ambitions within the renewed Republic. \n§RCommunist Party of the RSFSR (CP RSFSR)§! - A prominent left-wing political force advocating a socialist economy, protection of workers' rights, and expanded social security. Founded in 1993 as the successor to the §RCPSU§!, the party continues to preserve the legacy of Soviet traditions, is active in legislative work in the renewed parliament and further pursues its course towards building a just society under the red banner of §RMarxism-Leninism§!.§!"

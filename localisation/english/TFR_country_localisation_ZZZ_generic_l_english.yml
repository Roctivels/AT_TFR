 EU_member_dynamic: "European Union Member"
 EU_member_dynamic_desc: "The Idea of a United European has been theorized and spread around throughout the history of Europe as little more than an idea or concept. But through the darkest times in European History with the rise of fascism and communism across the continent it has birthed a new start to Europe that will be defining the next thousand years of European History. With the help of Democratic Nations such as the United Kingdom, France, Germany, and the United States the flames of Democracy have spread throughout the continent and have ensured the foundations for the European Union. Established in 1993 the European Union was made to ensure Europe would not repeat the mistakes of past nations and leaders and instead move in the path of progress. \n\nThe European Union today stands as a cultural, economic, and political union of the European States across Europe. We are a shining beacon of progress, democracy, and unity to show to the whole world that Europe will stand together against these hardships and will face them in the future. In an effort to promote Peace, Democracy, Diplomacy, Health, Safety, and Human Rights all across the European Continent and Beyond. These core values and beliefs of the European Union are what hold the continent together and into the uncertain future, we soon face. \n\nWe are United in Diversity."

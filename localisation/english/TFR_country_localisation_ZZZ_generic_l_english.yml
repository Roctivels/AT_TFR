 #Events
 generic.0.t: "You're a Cheater"
 generic.0.desc: "Because you are a dirty cheater, you have been killed in the universe of TFR. Goodbye"
 generic.0.a: ":_("
 generic.1.t: "Academic Development Increases"
 generic.1.desc: "When the pen tip sweeps across the paper, it seems as if we can hear the sound of civilization taking root - it won't blossom immediately, but it can prevent the nation from being uprooted in some future storm. With our policy help and subsidies for education. The number of educated people is increasing day by day, innovative ideas are flooding into every industry, and the pace of scientific research is thus quietly accelerating."
 generic.1.a: "What we have seen and learned will be passed down forever."
 generic.2.t: "Academic Development Decreases"
 generic.2.desc: "The children no longer recited the multiplication table but carried empty sacks to the ridges of the fields to pick up wheat ears. The textbook was torn open and stuck to the window lattice. Due to the chaos and the decline of educational funds, our illiteracy rate is on the rise again, without knowledge, even the easiest service manuals are like closed books to workers, our scientific research will thus face a slowdown."
 generic.2.a: "If we don't study, we'll one day repeat mistakes of past."
 generic.3.t: "Academic Development Limit Reached"
 generic.3.desc: "Because we have hit our Academic Development Limit, we will get to choose one Timed bonus."
 generic.4.t: "Farming Development Increases"
 generic.4.desc: "Steel spewed out black smoke, smoothing out the unchanging furrows and ridges that had remained unchanged for a thousand years overnight. The origin of human civilization is inseparable from farming, and now, with the granary becomes fuller, more and more labels indicating 'surplus grain' are being marked on the calendar. This is not only thanks to new agricultural techs, but also our protection to the environment."
 generic.4.a: "Let the rotary tiller press the past into the soil."
 generic.5.t: "Farming Development Decreases"
 generic.5.desc: "The tractor is parked by the ridge of the fields and rust, like the skeleton of a giant beast that had been cut open. Nature began to take back her generosity and scatter barnyard grass and locusts into the fields, and we can no longer respond with new technologies. Our Agricultural output is declining day by day, and under modern technology, we can't simply blame 'unfavorable weather' - We must have made any mistakes as well."
 generic.5.a: "When the plowshare is too dull to chew the earth, history will chew the people."
 generic.6.t: "Farming Development Limit Reached"
 generic.6.desc: "Because we have hit our Farming Development Limit, we will get to choose one Timed bonus."
 generic.7.t: "Poverty Development Increases"
 generic.7.desc: "'The most poverty-stricken patriot in the East End of London is apt to swell out his chest when he thinks of England's industry and wealth.' This saying has been known by lots of people, but luckily, it didn't happen in our country. Poverty cannot be completely eradicated, yet it is still being driven out of the urban area street by street. The sound of wallets filling up is more inspiring than any national anthem."
 generic.7.a: "No one will be left behind."
 generic.8.t: "Poverty Development Decreases"
 generic.8.desc: "Poverty is like a snowfall, silently covering rooftops, languages and dreams. The gears of the country are gradually filled with the debris of hunger, and sooner or later this debris will jam the gears. Our poverty rate is getting higher and higher, and more and more people are being left at the bottom of the 'majority'. Even just to survive, they have to give up morality."
 generic.8.a: "People are losing their dignity, once they lose patience…"
 generic.9.t: "Poverty Development Limit Reached"
 generic.9.desc: "Because we have hit our Poverty Development Limit, we will get to choose one Timed bonus."
 generic.10.t: "Industry Development Increases"
 generic.10.desc: "The conveyor belts in the factory building never get tired. They carry parts to distant places and also divide time into fair production capacity. The black smoke from the chimneys is now not only regarded as the mist that the factories breath, but also the extension of the country's spine - that is the foundation of our existence in today's world. Now, we can create everything by ourselves."
 generic.10.a: "Let's get the factory running."
 generic.11.t: "Industry Development Decreases"
 generic.11.desc: "The assembly line has stopped and the toolboxes are open - they are being sold by the pound on the black market. The order was cancelled because the machine could no longer produce qualified screw threads. Our current industry is like a piece of chewing gum that has been chewed repeatedly. The sweetness has long vanished, leaving only the colloid stuck between the teeth, impossible to spit out or swallow. Now, our industrial production capacity is thus declining because of countless colloid day by day."
 generic.11.a: "Progress should have been the main theme of human history…"
 generic.12.t: "Industry Development Limit Reached"
 generic.12.desc: "Because we have hit our Industry Development Limit, we will get to choose one Timed bonus."
 generic.13.t: "Military Development Increases"
 generic.13.desc: "Thanks to our anti-corruption efforts, the logistics officers finally don't like money anymore. The 'Misc Expenditure' column was removed from the purchase list, and the money saved was enough to replace each class with a sniper rifle with a holographic sight. Finally, we can proudly say: The muzzles of soldiers only point at the coordinates, no longer at the wallets."
 generic.13.a: "That is exactly what the military is supposed to do."
 generic.14.t: "Military Development Decreases"
 generic.14.desc: "Last night, three more boxes of rifle bullets 'fell into the water' at the pier. The gendarmerie just asked a few more questions and was then transferred to the border by officers to count camels. The officers' cafeteria launched the 'Special Oysters', and the soldiers' cafeteria was still continuing to perform the 'Catch fly in the Porridge'. When an order is left with nothing but an echo, the military flag is no more than a FIG leaf."
 generic.14.a: "Gosh, Joke grows out of the barrel."
 generic.15.t: "Military Development Limit Reached"
 generic.15.desc: "Because we have hit our Military Development Limit, we will get to choose one Timed bonus."
 generic.16.t: "Society Development Increases"
 generic.16.desc: "At the midnight crossroads, the red light flashes alone - without cameras, the cars still line up obediently. The court posted the judgment online, and there was only 'Perfect judgment' in the comments section. Under our strict crackdown on crime, the crime rate is decreasing both around citizens and in the news. With the cooperation of the people, our policies will also be able to be advanced more smoothly, thereby further benefiting them."
 generic.16.a: "Order means that nobody thinks about testing each other's bottom line anymore."
 generic.17.t: "Society Development Decreases"
 generic.17.desc: "The windowsill was smashed into jagged edges and the alarm sang longer than the national anthem. 'Family self-defense techniques' are becoming increasingly common on the streets and lanes: adding two layers of security doors and growing cacti on balconies. It separates not only thieves, but also trust. When the law is just on paper, the streets become auction houses: whoever is bold can buy others' property at a low price."
 generic.17.a: "Society should never be a brutal knockout game…"
 generic.18.t: "Society Development Limit Reached"
 generic.18.desc: "Because we have hit our Society Development Limit, we will get to choose one Timed bonus."
 generic.20.t: "WARNING: Nation without Content"
 generic.20.d: "Hello, dear player.\nWe realize that the number of playable nations is low at the moment, and this nation looks quite playable! Yes, it has wars, ideas, maybe even a few focuses. But unfortunately the content of this country is not adapted for the player, it is only adapted for the AI. So the best option would be to play for some other nation which content is adapted to the player.\nStay tuned, patriots!\nAll the best,\nTFR devs"
 generic.20.a: "Fair enough."
 tech.1.t: "Combat AI Functionality"
 tech.1.d: "War is a form of art that constantly changes, from cavemen cracking each other's skulls to the power of the sun obliterating entire cities, leaving behind nothing but skeletons and shadows. \nWar is an expression of anger, at all that is alive. \nWhat if this process was automated? \n\nWith our continuous research, we have been able to develop a proper combat AI, however, one moral question remains; should we allow it to write or not? \nOnly allowing it to read would be the equivalent of defanging a dog, it can still do its job but not as effectively, however, this would also allow us to minimize any damage done if it were to turn against us. \n\nAllowing it to write would be like allowing it to think, constantly seeking solutions against its adversaries, however, this would mean that the art of war would become automated and the chances of it considering all living things a problem that needs to be solved would become higher. \n\nIn the end, you decide."
 tech.1.a: "Allow them to write."
 tech.1.b: "Only allow them to read."
 
 decision_event_news.5.t: "On the Horizon…"
 decision_event_news.5.d: "John Titor here\n\nRelease is scheduled for the 18th of October. Were in the home stretch, don't fuck this up. For some of us, we've been working on this for 4 years. 4 grueling years. Many came and went, lets finish what we started and wipe the floor with our competition.\n\nWe got this man, we got this by the ass!"
 decision_event_news.5.a: "Victory for TFR"

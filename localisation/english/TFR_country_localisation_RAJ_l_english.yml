 RAJ.21.t: "Large Order from India for Infantry Equipment Supply"
 RAJ.21.d: "India has sent us a request for infantry equipment. This country is a long-standing and important ally in Asia, with whom we share strong economic and political ties. However, the deal in question goes beyond bilateral cooperation as it affects the balance of power in the region. India and China have long competed for influence in Asia, and supplying arms to India could change the balance.\nAs a result, we are faced with a difficult choice. On the one hand, the contract will bring economic benefits and further strengthen our ties. On the other hand, the consequences of interfering in the balance of power in the region could be very serious."
 RAJ.21.a: "Organize supplies."
 RAJ.21.b: "Politely refuse."
 RAJ.22.t: "Large Order from India for Jets Supply"
 RAJ.22.d: "We have received a request from India for the supply of jets. India has long been among our strategic partners in Asia, with whom we have close economic and political relations. However, a military contract of this caliber will inevitably affect the situation in the region. China and India continue their rivalry for influence, and an arms transfer to India could upset the existing balance of power.\nThus, we face a difficult choice. The deal will strengthen our economic cooperation with India, providing financial benefits and expanding our position in the Asian market. However, possible changes in the balance of power require special caution when making a decision."
 RAJ.22.a: "Organize supplies."
 RAJ.22.b: "Politely refuse."
 RAJ.23.t: "Large Order from India for Armored Vehicles Supply"
 RAJ.23.d: "The Indian government has expressed interest in purchasing our armored vehicles. We have long-standing economic and political ties with India, but such a deal goes beyond a normal partnership because it affects the balance of power in the region. India and China have been competing for influence in Asia for many years, and any change in the balance of power could affect this fragile system.\nThe task before us is not an easy one. The contract with India will provide economic benefits and strengthen our interaction with one of the world's major players. However, any interference in the current balance of power may lead to certain consequences."
 RAJ.23.a: "Organize supplies."
 RAJ.23.b: "Politely refuse."
 RAJ.24.t: "Russia Agrees to Supply"
 RAJ.24.d: ""
 RAJ.24.a: "Great!"
 RAJ.25.t: "Russia Refuses to Supply"
 RAJ.25.d: ""
 RAJ.25.a: "Sad."
 RAJ.26.t: "Chaos in India"
 RAJ.26.d: "Horrifying reports are trickling back from the frontlines of the Great Asian War, documenting a full-scale collapse of the Indian government. These claims are backed up by social media posts, videos, and statements by several Indian politicians. The Chinese have proclaimed this a great victory for their people, and have established a military government along the border..\n\nAs of now, the remaining members of the PDTO have yet to officially comment on the loss of a major ally. However, some videos have shown soldiers identified as members of the PDTO retreating back towards the sea, suggesting they have no intention of stabilizing India. The country's greatest hope seems to lie in Delhi, where the government has held out, though it seems their chances of taking back control of their nation are slim.\n\nDelhi, save for its border with Pakistan and the Chinese forces, is surrounded by hostile entities. In the east, the Maoist, People's Liberation Guerrilla Army has raised a sizable force that some believe could win them the civil war. In the south, the so-called "Akhand Bharat" is attempting to build a Hindi ethnostate. Then you have the military remnants, warlords, and bandit gangs ravaging the countryside. All in all, it seems India may be decades away from a return to normalcy."
 RAJ.26.a: "A tiger can't defeat a dragon."

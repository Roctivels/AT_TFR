 RAJ.5.d: "In the harrowing aftermath of the devastating nuclear war and the nuclear explosion in Dehli, the remnants of the Indian government have attempted to re-establish order in the areas surrounding the rubble of the Dehli. However, with the leadership largely disintegrated on the streets of the rubble that was formerly the capital, a powerful power vacuum has formed."

 trait_PRC_august_1st_medal: "August 1 Medal"
 trait_PRC_august_1st_medal_desc: "§LThis general was awarded the §tAugust 1 Medal§!.\n\nThis is the highest military honor currently awarded to soldiers in China. It recognizes service members who have made outstanding contributions to safeguarding national sovereignty and development interests, as well as promoting the modernization of the armed forces.§!"
 trait_PRC_red_flag_medal: "Red Flag Medal"
 trait_PRC_red_flag_medal_desc: "§LThis general was awarded the §tRed Flag Medal§!.\n\nThis wartime medal is awarded to commanding officers at all levels who have faithfully fulfilled the tasks entrusted to them by the Party and the people, and made significant contributions to achieving victory.§!"
 trait_PRC_red_star_medal: "Red Star Medal"
 trait_PRC_red_star_medal_desc: "§LThis general was awarded the §tRed Star Medal§!.\n\nThis wartime medal is awarded to combatants and support personnel who have bravely and resolutely carried out orders during military operations, demonstrating extraordinary heroism and achieving remarkable accomplishments.§!"
 trait_PRC_tiger_tally: "Tiger Tally"
 trait_PRC_tiger_tally_desc: "§LThis general was awarded the §YTiger Tally§!.\n\nOriginating from an ancient Chinese military symbol, the Tiger Tally was a two-part contract used by emperors and military commanders to authorize the deployment of troops. It symbolized the unity between the central authority and its generals.§!"
 trait_PRC_goldfish_pouch: "Goldfish Pouch"
 trait_PRC_goldfish_pouch_desc: "§LThis general was awarded the §YGoldfish Pouch§!.\n\nRooted in ancient Chinese officialdom, high-ranking officials and generals would wear a fish pouch to signify their status. The Gold Fish Pouch was a rare symbol reserved for only the most esteemed individuals as part of the emperor’s inner circle.§!"
 trait_PRC_iron_certificate: "Iron Certificate"
 trait_PRC_iron_certificate_desc: "§LThis general was awarded the §YIron Certificate§!.\n\nThis was a special reward system in ancient China, a privileged certificate granted by emperors to loyal ministers. Holding an Iron Certificate was a mark of imperial recognition, granting the holder's family an exemption from capital punishment.§!"


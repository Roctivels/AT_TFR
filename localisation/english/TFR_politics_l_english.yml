 ZZZ_minarchism: "§YMinarchism§!"
 TFR_MINARCHISM_TT: "§YMinarchism§!"
 TFR_MINARCHISM_TT_LONG: "§6Minarhcism§! §gadvocates for a skeletal state, tasked only with law, order, and defense, leaving all else to the market’s chaotic forces. Unrestrained capitalism thrives, empowering the bold while abandoning the weak.§!\n\n\n\n\n£GFX_ZZZ_minarchism_banner\n\n\n\n\n\n £consumer_goods_texticon Consumer Goods Factories Factor: §Y-5%§!\n £efficiency_growth_texticon Production Efficiency growth: §G+3%§!\n £construction_speed_infrastructure_texticon §YInfrastructure§! construction speed: §R-10%§!\n £construction_speed_infrastructure_texticon §YOffice Park§! construction speed: §G+2%§!\n £GFX_dx_blue Business Value Factor: §G+5.0%§!\n £GFX_dx_yellow Personal Value Factor: §G+5.0%§!""

 ZZZ_ancap: "§YAnarcho-Capitalism§!"
 TFR_ANCAP_TT: "§YAnarcho-Capitalism§!"
 TFR_ANCAP_TT_LONG: "§gThe §YAnarcho-Capitalist§! model envisions a world where the state vanishes, replaced by free markets and private enterprise. Law, security, and services are handled by competing firms, with property rights and voluntary exchange as guiding principles. Supporters hail it as true freedom; critics warn of corporate domination. It’s a society where absolute liberty and chaos walk hand in hand.§!\n\n\n\n\n£GFX_ZZZ_ancap_banner\n\n\n\n\n\n £consumer_goods_texticon Consumer Goods Factories Factor: §Y-15%§!\n £efficiency_growth_texticon Production Efficiency growth: §G+12%§!\n £construction_speed_infrastructure_texticon §YInfrastructure§! construction speed: §R-39%§!\n £construction_speed_infrastructure_texticon §YOffice Park§! construction speed: §G+25%§!\n £GFX_dx_blue Business Value Factor: §G+15.0%§!\n £GFX_dx_yellow Personal Value Factor: §G+5.0%§!\n £GFX_stability_texticon Stability: §R-10.0%§!"

 ZZZ_kaiser_economy: "§YReichsbürger Economics§!"
 ZZZ_KAISER_ECO_TT: "§YReichsbürger Economics§!"
 ZZZ_KAISER_ECO_TT_LONG: "§gThe economic system of the new Kaiser regime is a complex web of neo-feudal practices and agrarian dominance. It sees banking as being the source of all social ills, but takes it a step further than that - explicitly blaming Jewish people for what they see as a decline in the German economy and the decline in the German countryside, urbanisation to them being driven by Jewish banking interests.\nIt aims to create a thriving rural market economy, with a focus on small businesses that can't cause much damage to the environment. While all the remaining industrial power is devoted to meeting the needs of the military and its ever-growing ranks.§!\n\n\n\n\n£GFX_ZZZ_kaiser_economy_banner\n\n\n\n\n\n £consumer_goods_texticon Consumer Goods Factories Factor: §Y-5.0%§!\n £construction_speed_civfactory_texticon §YCivilian Factory§! construction speed: §R-10.0%§!\n £construction_speed_milfactory_texticon §YMilitary Factory§! construction speed: §G+3.5%§!\n £mil_factory Factory Output: §G+1.0%§!\n £mobilisation_texticon Mobilization speed: §G+15.0%§!\n £production_efficiency_loss_texticon Production Efficiency Retention: §R-10.0%§!\n £development Monthly Poverty Development:  §R-2.0%§!\n £GFX_dx Monthly Income Growth:   §R-15.0%§!\n £GFX_dx_yellow Personal Value Factor: §R-15.0%§!\n £GFX_dx_yellow Personal Expense Factor: §Y-15.0%§!"
 
 ZZZ_left_corporatism: "§YLeft-Wing Corporatism§!"
 ZZZ_LEFT_CORPORATISM_TT: "§YLeft-Wing Corporatism§!"
 ZZZ_LEFT_CORPORATISM_TT_LONG: "§gLeft-Wing Corporatism - is an economic model that seeks to balance the interests of various social groups, particularly labor, capital, and the state, through a system of cooperation and negotiation. It is often associated with a more progressive or leftist approach to governance, emphasizing social equity, environmental sustainability, and democratic participation.\nLeft Corporatism typically involves collaboration among three main stakeholders: the government, businesses, and labor unions. This tripartite model aims to foster dialogue and consensus among these groups to address economic and social issues.§!\n\n\n\n\n£GFX_ZZZ_left_corporatism_banner\n\n\n\n\n\n £consumer_goods_texticon Consumer Goods Factories Factor: §Y2.5%§!\n £construction_speed_infrastructure_texticon §YInfrastructure§! construction speed: §G+10.0%§!\n £mil_factory Factory Output: §G+3.5%§!\n £construction_speed_texticon Construction Speed: §G+5.0%§!\n £GFX_dx Monthly Income Growth: §R-10.0%§!\n £GFX_dx_yellow Personal Value Factor: §G+10.0%§!"
 
 ZZZ_liberal_corporatism: "§YLiberal Corporatism§!"
 ZZZ_LIBERAL_CORPORATISM_TT: "§YLiberal Corporatism§!"
 ZZZ_LIBERAL_CORPORATISM_TT_LONG: "§gLiberal Corporatism - is an economic and political model that emphasizes the collaboration between the state, businesses, and labor organizations while maintaining a primarily market-oriented economy. It seeks to balance the interests of these groups through institutional frameworks that promote negotiation and cooperation. While Liberal Corporatism operates within a capitalist framework, it acknowledges the need for state intervention to correct market failures, ensure fair competition, and protect workers' rights.§!\n\n\n\n\n£GFX_ZZZ_liberal_corporatism_banner\n\n\n\n\n\n £consumer_goods_texticon Consumer Goods Factories Factor: §Y-1.5%§!\n £prod_eff_cap Production Efficiency Cap: §R-5.0%§!\n £construction_speed_texticon Construction Speed: §G+2.5%§!\n  £development Monthly Poverty Development:  §G+0.05%§!\n £GFX_dx_blue Business Value Factor: §G+10.0%§!\n £GFX_dx_yellow Personal Value Factor: §G+10.0%§!"
 
 ZZZ_maga_capitalism: "§YMAGA Capitalism§!"
 ZZZ_MAGA_CAPITALISM_TT: "§YMAGA Capitalism§!"
 ZZZ_MAGA_CAPITALISM_TT_LONG: "§gMAGA Capitalism - Although it follows the basic standards of the American capitalist model, this system is much more protectionist and does not bend the knee to big corporations.\nInstead, it supports small independent businesses and producers, as well as medium-sized enterprises. It also has strong anti-trust laws to limit or eliminate excessive economic power.\nAnother key feature of this system is the strong emphasis on protecting and promoting the interests of workers. The goal is to maintain and, if possible, enhance Social Security, Medicare, and other welfare programs, while also minimizing their burden on the American economy.§!\n\n\n\n\n£GFX_ZZZ_maga_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon Consumer Goods Factories Factor: §Y2.0%§!\n £construction_speed_infrastructure_texticon §YInfrastructure§! construction speed: §G+5.0%§!\n £efficiency_growth_texticon Production Efficiency growth: §R-5.0%§!"\n £construction_speed_civfactory_texticon §YCivilian Factory§! construction speed: §G+5.0%§!\n £GFX_dx_blue Business Value Factor: §R-5.0%§!\n £GFX_dx_yellow Personal Value Factor: §G+10.0%§!\n £GFX_dx_yellow Personal Expense Factor: §Y+3.0%§!" 
 
 ZZZ_america_first_capitalism: "§YAmerica First Capitalism§!"
 ZZZ_AF_CAPITALISM_TT: "§YAmerica First Capitalism§!"
 ZZZ_AF_CAPITALISM_TT_LONG: "§gAmerica First Capitalism - This is a modernized and improved version of the American system. The goal is to create a protectionist economy that greatly benefits American businesses. This is achieved through the use of tariffs to protect American products and businesses from foreign competition. The country is also closed off from "undesirable" influences. The system also focuses heavily on infrastructure projects to help connect the nation and generate more revenue.\nIt greatly favors American Corporations and aims to either reform corporate America or create a new pool of big enterprises that will answer the will of the American nation.§!\n\n\n\n\n£GFX_ZZZ_america_first_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon Consumer Goods Factories Factor: §Y-4.0%§!\n£prod_eff_cap Production Efficiency Cap: §G+3.5%§!\n £construction_speed_infrastructure_texticon §YInfrastructure§! construction speed: §G+5.0%§!\n £mil_factory Factory Output: §R-5.0%§!\n £GFX_dx_blue Business Value Factor: §G+15.0%§!\n £GFX_dx_yellow Personal Value Factor: §R-15.0%§!"
 
 ZZZ_state_capitalism: "§YState Capitalism§!"
 ZZZ_STATE_CAPITALISM_TT: "§YState Capitalism§!"
 ZZZ_STATE_CAPITALISM_TT_LONG: "§gState capitalism is an economic system where the government actively engages in business and commercial activities for profit. In this system, the means of production are nationalized and controlled by the state through state-owned enterprises. This includes capital accumulation, centralized management, and the use of wage labor.§!\n\n\n\n\n£GFX_ZZZ_state_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon Consumer Goods Factories Factor: §Y-2.0%§!\n £efficiency_growth_texticon Production Efficiency growth: §R-2.0%§!\n £construction_speed_civfactory_texticon §YCivilian Factory§! construction speed: §G+2.5%§!\n £construction_speed_infrastructure_texticon §YInfrastructure§! construction speed: §G-1.5%§!\n £GFX_dx Monthly Income Growth: §R-4.0%§!\n £efficiency_base_texticon Production Efficiency Base: §G+5.0%§!§!"
 
 ZZZ_party_state_capitalism: "§YParty-State Capitalism§!"
 ZZZ_PARTY_STATE_CAPITALISM_TT: "§YParty-State Capitalism§!"
 ZZZ_PARTY_STATE_CAPITALISM_TT_LONG: "§gParty-State Capitalism is an economic model where the state is not the main driving force in the economy, but rather the party structures are placed above the state ones.\nOne of the main indicators of the expansion of the party-state system is the growing presence of party organizations within enterprises, including private companies and even foreign firms. Another key feature of this model is the expansion of state capital beyond state-owned enterprises. This process has been called "state financialization". Another way that party-state economic activity is visible is in the evolution of industrial policy.§!\n\n\n\n\n£GFX_ZZZ_party_state_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon Consumer Goods Factories Factor: §Y-3.0%§!\n £efficiency_growth_texticon Production Efficiency growth: §R-2.0%§!\n £construction_speed_civfactory_texticon §YCivilian Factory§! construction speed: §G+4.0%§!\n £construction_speed_infrastructure_texticon §YOffice Park§! construction speed: §G+4.0%§!\n £GFX_dx Monthly Income Growth: §G+2.5%§!\n £efficiency_base_texticon Production Efficiency Base: §R-1.5%§!§!"
 
 ZZZ_mixed_economy: "§YMixed Economic Model§!"
 ZZZ_MIXED_ECONOMY_TT: "§YMixed Economic Model§!"
 ZZZ_MIXED_ECONOMY_TT_LONG: "§gA mixed economy is an economic system that combines elements of both capitalism, such as private businesses, and socialism, such as nationalized government services.\nThere are different ways to define a mixed economy. For example, some say it is an economic system that combines elements of a market economy with elements of a planned economy. Others say it combines markets with state interventionism, or private enterprise with public enterprise.§!\n\n\n\n\n£GFX_ZZZ_mixed_economy_banner\n\n\n\n\n\n £consumer_goods_texticon Consumer Goods Factories Factor: §Y-2.5%§!\n £efficiency_base_texticon Production Efficiency Base: §G+2.0%§!\n £construction_speed_civfactory_texticon §YCivilian Factory§! construction speed: §G+1.5%§!\n £construction_speed_infrastructure_texticon §YOffice Park§! construction speed: §G+1.5%§!\n £GFX_dx_blue Business Value Factor: §G+3.5%§!\n £GFX_dx_yellow Personal Value Factor: §R-1.5%§!"



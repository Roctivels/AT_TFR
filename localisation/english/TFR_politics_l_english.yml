 ZZZ_no_economy: "§gNo Economy§!"
 
 ZZZ_capitalist_economy: "§YFree-Market Capitalism§!"
 TFR_CAPITALISM_TT: "§YCapitalist Model§!"
 TFR_CAPITALISM_TT_LONG: "§gCapitalism is an economic system in which private companies and businesses operate free from government interference. In this system, prices, costs, and wages are determined by market forces, such as supply and demand. This means there is limited government oversight and regulation. Capitalism is popular among market liberals and has become the most widely adopted economic system globally.§!\n\n\n\n\n£GFX_ZZZ_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon Consumer Goods Factories Factor: §Y-2.0%§!\n £efficiency_growth_texticon Production Efficiency growth: §G+2.0%§!\n £construction_speed_infrastructure_texticon §YInfrastructure§! construction speed: §R-1.5%§!\n £construction_speed_infrastructure_texticon §YOffice Park§! construction speed: §G+1.5%§!\n £GFX_dx_blue Business Value Factor: §G+5.0%§!\n £GFX_dx_yellow Personal Value Factor: §R-5.0%§!"
 
 ZZZ_inclusive_capitalism: "§YInclusive Capitalism§!"
 TFR_INCLUSIVE_CAPITALISM_TT: "§YInclusive Capitalism§!"
 TFR_INCLUSIVE_CAPITALISM_TT_LONG: "§gInclusive Capitalism - is a economic theory aimed at creating a fairer and more equitable system of value distribution in the economy, as well as addressing the growing inequality in income and wealth.\n\nThe essence of inclusive capitalism lies in fostering sustainable growth that serves the interests of all parties involved — businesses, investors, workers, consumers, governments, local communities, society as a whole, and the environment.§!\n\n\n\n\n£GFX_ZZZ_inclusive_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon Consumer Goods Factories Factor: §Y2.0%§!\n £construction_speed_infrastructure_texticon §YOffice Park§! construction speed: §G+2.0%§!\n £construction_speed_infrastructure_texticon §YInfrastructure§! construction speed: §G+1.5%§!\n £construction_speed_civfactory_texticon §YCivilian Factory§! construction speed: §R-2.5%§!\n £GFX_dx_blue Business Value Factor: §G+2.0%§!\n £GFX_dx_yellow Personal Value Factor: §G+2.0%§!"
 
 ZZZ_american_capitalism: "§YAmerican Capitalism§!"
 TFR_AMERICAN_CAPITALISM_TT: "§YAmerican Capitalism§!"
 TFR_AMERICAN_CAPITALISM_TT_LONG: "§gThe American economic system is a model for other free-market economies. It is based on free trade and minimal government intervention in economic affairs. However, there are some unique characteristics that make this system different from other forms of capitalism.\nOne of the main features is the foundation of the American economy. The US dollar is a strong currency that is highly regarded for its stability. As a result, it is widely used as the primary reserve currency around the world.§!\n\n\n\n\n£GFX_ZZZ_american_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon Consumer Goods Factories Factor: §Y-3.0%§!\n £efficiency_growth_texticon Production Efficiency growth: §G+3.5%§!\n £construction_speed_infrastructure_texticon §YInfrastructure§! construction speed: §R-3.5%§!\n £construction_speed_infrastructure_texticon §YOffice Park§! construction speed: §G+5.0%§!\n £GFX_dx_blue Business Value Factor: §G+10.0%§!\n £GFX_dx_yellow Personal Value Factor: §R-10.0%§!"
 
 ZZZ_oligopolistic_capitalism: "§YOligopolistic Capitalism§!"
 TFR_OLIGOPOLY_CAPITALISM_TT: "§YOligopolistic Economy§!"
 TFR_OLIGOPOLY_CAPITALISM_TT_LONG: "§gLike many other countries, this nation's economy operates on the principles of a free market. However, it is characterized by a high level of market concentration, with a small number of corporations dominating the competition.\nWhat sets this economic system apart from its capitalist counterparts is the minimal involvement of the government. To an extraordinary extent, the government's regulatory and administrative functions are either limited, captured, or largely ineffective. The desires of the dominant corporations take precedence over the public interest.§!\n\n\n\n\n£GFX_ZZZ_oligopolistic_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon Consumer Goods Factories Factor: §Y-4.0%§!\n £prod_eff_cap Production Efficiency Cap: §G+3.5%§!\n £construction_speed_infrastructure_texticon §YInfrastructure§! construction speed: §R-6.0%§!\n £construction_speed_refinery_texticon §YRefinery§! construction speed: §G+10.0%§!\n £GFX_dx_blue Business Value Factor: §G+15.0%§!\n £GFX_dx_yellow Personal Value Factor: §R-15.0%§!"
 
 ZZZ_cabal_economy: "§YCabal Economy§!"
 TFR_CABAL_ECONOMY_TT: "§YCabal Economy§!"
 TFR_CABAL_ECONOMY_TT_LONG: "§gThe Cabal Economy, sometimes referred to internally as the Bilderberg System, is a shadow pseudo-command economy structured around the principle of ensuring maximum financial and political returns for the Cognoscenti and its constituent financial interests.\n\nThrough private meetings, predictive algorithms and insider trading, all involved parties ensure profits stay up and certain unpredictable factors are minimized, creating an excellent illusion of stability for the American people while guaranteeing that the financial sector continues to thrive, pleasing financiers and ensuring the deep state has access to the resources it needs.§!\n\n\n\n\n£GFX_ZZZ_cabal_economy_banner\n\n\n\n\n\n £consumer_goods_texticon Consumer Goods Factories Factor: §Y3.0%§!\n £construction_speed_texticon Construction Speed: §G+3.0%§!\n £GFX_dx_blue Business Value Factor: §G+20.0%§!\n £GFX_dx_yellow Personal Value Factor: §R-20.0%§!"
 
 ZZZ_collective_capitalism: "§YCollective Capitalism§!"
 ZZZ_collective_capitalism2: "§YCollective Capitalism§!"
 TFR_COLLECTIVE_CAPITALISM_TT: "§YCollective Capitalism§!"
 TFR_COLLECTIVE_CAPITALISM_TT_LONG: "§gCollective Capitalism is a japanese model of economy which is characterized by a close relationship between businesses and the government, as well as strong partnerships between companies and their suppliers, customers, and other stakeholders. This model emphasizes long-term stability and collaboration over competition, and is based on the idea that businesses and society are interconnected and share responsibilities for each other's success.§!\n\n\n\n\n£GFX_ZZZ_collective_capitalism_banner\n\n\n\n\n\n [JAP_collective_capitalism_bonus]"
 
 ZZZ_welfare_capitalism: "§YWelfare Capitalism§!"
 TFR_WELFARE_CAPITALISM_TT: "§YWelfare Capitalist Model§!"
 TFR_WELFARE_CAPITALISM_TT_LONG: "§gIn a welfare capitalist system, the government combines the presence of private companies and businesses with a certain level of control and involvement in the economy to ensure its proper functioning. According to its supporters, this system strikes a balance between high economic growth, low inflation and unemployment, favorable working conditions, and some level of social security.§!\n\n\n\n\n£GFX_ZZZ_welfare_capitalism_banner\n\n\n\n\n\n £consumer_goods_texticon Consumer Goods Factories Factor: §Y2.5%§!\n £construction_speed_infrastructure_texticon §YInfrastructure§! construction speed: §G+5.0%§!\n £efficiency_growth_texticon Production Efficiency growth: §R-6.5%§!"\n £construction_speed_civfactory_texticon §YCivilian Factory§! construction speed: §G+5.0%§!\n £GFX_dx_blue Business Value Factor: §R-10.0%§!\n £GFX_dx_yellow Personal Value Factor: §G+10.0%§!\n £GFX_dx_yellow Personal Expense Factor: §Y+3.5%§!"
 
 ZZZ_corporatism: "§YCorporatism§!"
 TFR_CORPORATISM_TT: "§YCorporatist Model§!"
 TFR_CORPORATISM_TT_LONG: "§gCorporatism is an economic system that aims to unite the state and society through corporate entities. It sees this as the most effective way to build a prosperous and stable economy.\nCorporatism is often associated with fascist and authoritarian regimes. These regimes require unwavering loyalty to the state. However, it is important to distinguish between corporatism and corporatocracy, where the lines between the state and corporations become blurred.§!\n\n\n\n\n£GFX_ZZZ_corporatism_banner\n\n\n\n\n\n £consumer_goods_texticon Consumer Goods Factories Factor: §Y-2.5%§!\n £construction_speed_infrastructure_texticon §YInfrastructure§! construction speed: §G+10.0%§!\n £production_efficiency_loss_texticon Production Efficiency Retention: §R-5.0%§!\n £sabotaged_resource_texticon Lack of Resources Penalty: §R+3.5%§!\n £mil_factory Factory Output: §G+6.0%§!\n £GFX_dx Monthly Income Growth: §R-10.0%§!\n £GFX_dx_yellow Personal Expense Factor: §Y-10.0%§!"
 
 ZZZ_command_economy: "§YCommand Economy§!"
 TFR_COMMAND_ECONOMY_TT: "§YCommand Economy§!"
 TFR_COMMAND_ECONOMY_TT_LONG: "§gA command economy is a highly centralized form of corporatism where significant portions of the economy have been nationalized through direct state intervention, particularly in strategic sectors such as arms production and heavy industry.§!\n\n\n\n\n£GFX_ZZZ_command_economy_banner\n\n\n\n\n\n £consumer_goods_texticon Consumer Goods Factories Factor: §Y-3.0%§!\n £construction_speed_infrastructure_texticon §YInfrastructure§! construction speed: §G+10.0%§!\n £efficiency_base_texticon Production Efficiency Base: §G+10.0%§!\n £efficiency_growth_texticon Production Efficiency growth: §R-10.0%§!"\n £mil_factory Factory Output: §G+5.6%§!\n £GFX_dx Monthly Income Growth: §R-15.0%§!\n £GFX_dx_yellow Personal Expense Factor: §Y15.0%§!"
 
 ZZZ_managed_economy: "§YNazi Corporatism§!"
 TFR_MANAGED_ECONOMY_TT: "§YNational Socialist Corporatism§!"
 TFR_MANAGED_ECONOMY_TT_LONG: "§gNazi corporatism refers to the system that was the basis of Nazi Germany's economic model. While it is widely seen as a failure of a now-defunct regime, supporters of neo-Nazi movements still claim that it was the only true and honest economic system for the "Aryan race."\nAll efforts are directed towards meeting the needs of the state and the highest authority - be it the great leader or the party apparatus. Every action is thoroughly scrutinized. The government's demands are seemingly endless, and its projects take precedence over all other matters.§!\n\n\n\n\n£GFX_ZZZ_managed_economy_banner\n\n\n\n\n\n £consumer_goods_texticon Consumer Goods Factories Factor: §Y-5.0%§!\n £construction_speed_milfactory_texticon §YMilitary Factory§! construction speed: §G+10.0%§!\n £mil_factory Factory Output: §G+6.0%§!\n £production_efficiency_loss_texticon Production Efficiency Retention: §R-10.0%§!\n £development Monthly Poverty Development:  §R-1.5%§!\n £GFX_dx Monthly Income Growth:   §R-15.0%§!\n £GFX_dx_yellow Personal Expense Factor: §Y-10.0%§!"
 
 ZZZ_planned_economy: "§YPlanned Economy§!"
 TFR_PLANNED_ECONOMY_TT: "§YPlanned Economy§!"
 TFR_PLANNED_ECONOMY_TT_LONG: "§gA planned economy is an economic system where all economic output and growth are planned in advance to meet the needs of the population and the country as a whole. This planning can be done either centrally or decentralized, and it can be decided by a dedicated council of experts or by the people themselves in a participatory way.§!\n\n\n\n\n£GFX_ZZZ_planned_economy_banner\n\n\n\n\n\n\n\n £consumer_goods_texticon Consumer Goods Factories Factor: §Y-5.0%§!\n £construction_speed_infrastructure_texticon §YInfrastructure§! construction speed: §G+10.0%§!\n £efficiency_base_texticon Production Efficiency Base: §G+7.5%§!\n £efficiency_growth_texticon Production Efficiency growth: §R-10.0%§!\n £production_efficiency_loss_texticon Production Efficiency Retention: §R-5.0%§!\n £mil_factory Factory Output: §G+10.0%§!\n £GFX_dx Monthly Income Growth: §R-25.0%§!\n £GFX_dx_yellow Personal Expense Factor: §Y10.0%§!"
 
 ZZZ_developed_socialism: "§YDeveloped Socialism§!"
 TFR_DEVELOPED_SOCIALISM_TT: "§YTheory of Developed Socialism§!"
 TFR_DEVELOPED_SOCIALISM_TT_LONG: "§gThe concept of Developed Socialism, once a vestige of the Brezhnev era in the Soviet Union, has been revitalized by contemporary Russian economists. In this updated perspective, a greater number of Kosygin's proposals and reforms have been implemented, resulting in a more varied economic landscape and system.\nAlthough central planning still plays a central role, private initiative is far from being abandoned. Private enterprises are given more independence in production, planning, and employee incentives. This independence allows them to make more profit, which in turn motivates them to produce more. In addition, a new wage system based on the labor participation coefficient has been introduced. This system pays employees based on how much they contribute to the company's production.§!\n\n\n\n\n£GFX_ZZZ_developed_socialism_banner\n\n\n\n\n\n £consumer_goods_texticon Consumer Goods Factories Factor: §Y-3.0%§!\n £construction_speed_civfactory_texticon §YCivilian Factory§! construction speed: §G+10.0%§!\n £mil_factory Factory Output: §G+5.0%§!\n £production_efficiency_loss_texticon Production Efficiency Retention: §R-10.0%§!\n £sabotaged_resource_texticon Lack of Resources Penalty:  §G-5.0%§!\n £efficiency_growth_texticon Production Efficiency growth:   §R-10.0%§!\n £GFX_dx_yellow Personal Expense Factor: §Y+5.0%§!\n £GFX_dx_yellow Personal Value Factor: §G+5.0%§!"
 
 ZZZ_military_controlled_economy: "§YMilitary-Controlled Economy§!"
 TFR_MILITARY_CONTROLLED_TT: "§YMilitary-Controlled Economy§!"
 TFR_MILITARY_CONTROLLED_TT_LONG: "§gIn a military-controlled economy, the military exercises direct oversight over the economy. The vast majority, if not all, economic activities are geared towards meeting the needs of the military. This type of economic system is prevalent in countries with a military dictatorship or a stratocracy. However, it often prioritizes the interests of the military over the well-being of the citizens. This is because regimes that employ this economic model tend to be nationalistic or even ultra-nationalistic.§!\n\n\n\n\n£GFX_ZZZ_military_controlled_banner\n\n\n\n\n\n £consumer_goods_texticon Consumer Goods Factories Factor: §Y-5.0%§!\n £construction_speed_milfactory_texticon §YMilitary Factory§! construction speed: §G+10.0%§!\n £efficiency_base_texticon Production Efficiency Base: §R-7.5%§!\n £efficiency_growth_texticon Production Efficiency growth: §G+10.0%§!\n £sabotaged_resource_texticon Lack of Resources Penalty: §G-10.0%§!\n £mil_factory Factory Output: §G+5.0%§!\n £GFX_dx_yellow Personal Expense Factor: §Y-10.0%§!\n £development Monthly Poverty Development: §R-2.5%§!"
 
 ZZZ_worker_controlled_economy: "§YWorker-Controlled Economy§!"
 TFR_WORKER_CONTROLLED_TT: "§YWorker-Controlled Economy§!"
 TFR_WORKER_CONTROLLED_TT_LONG: "§gWhile it is commonly believed that planned economies are exclusively those that are controlled by the government, this is not the case for all planned economies.\nWorker-controlled economies are not governed by state officials or bureaucrats, but rather by the workers themselves, often through worker councils or unions. Through these bodies, workers often maintain direct control over their production and often enjoy a high degree of autonomy.§!\n\n\n\n\n£GFX_ZZZ_worker_controlled_banner\n\n\n\n\n\n £consumer_goods_texticon Consumer Goods Factories Factor: §Y2.0%§!\n £construction_speed_civfactory_texticon §YCivilian Factory§! construction speed: §G+10.0%§!\n £efficiency_growth_texticon Production Efficiency growth: §G+10.0%§!"\n £prod_eff_cap Production Efficiency Cap: §G+5.0%§!\n £mil_factory Factory Output: §G+5.0%§!\n £GFX_dx_yellow Personal Expense Factor: §Y10.0%§!\n £GFX_dx_yellow Personal Value Factor: §G+10.0%§!"
 
 ZZZ_socialist_market: "§YSocialist Market§!"
 TFR_SOCIALIST_MARKET_TT: "§YSocialist Market Economy§!"
 TFR_SOCIALIST_MARKET_TT_LONG: "§gIn a socialist market economy, the government and private enterprises collaborate to build a more just society. The government owns some enterprises and oversees the economy to guarantee equity, while private companies operate and develop.\nOne of the primary objectives is to ensure that everyone has access to essential services, such as food, housing, and healthcare. Another objective is to foster innovation and entrepreneurship, while also ensuring that businesses operate in the best interests of the public.§!\n\n\n\n\n£GFX_ZZZ_socialist_market_banner\n\n\n\n\n\n £consumer_goods_texticon Consumer Goods Factories Factor: §Y-1.5%§!\n £mil_factory Factory Output: §G+3.5%§!\n £construction_speed_infrastructure_texticon §YInfrastructure§! construction speed: §G+5.0%§!\n £efficiency_base_texticon Production Efficiency Base: §G+5.0%§!\n £efficiency_growth_texticon Production Efficiency growth: §R-3.5%§!\n £GFX_dx Monthly Income Growth: §G+10.0%§!\n £GFX_dx_yellow Personal Expense Factor: §Y+10.0%§!"
 
 ZZZ_chaostic_economy: "§RChaotic Economy§!"
 TFR_CHAOSTIC_TT: "§YChaos§!"
 TFR_CHAOSTIC_TT_LONG: "§gOur economy is currently in a §Rstate of chaos§g and confusion. Businesses are closing down, workers are leaving, and many more people are facing unemployment. The government and bureaucrats must act quickly to restore order and halt the unrest that is unfolding in our country.\n\n\n\n\n£GFX_ZZZ_chaostic_economy_banner\n\n\n\n\n\n\n\n £consumer_goods_texticon Consumer Goods Factories Factor: §Y5.0%§!\n £construction_speed_texticon Construction Speed: §R-10.0%§!\n £mil_factory Factory Output: §R-10.0%§!§!"
 

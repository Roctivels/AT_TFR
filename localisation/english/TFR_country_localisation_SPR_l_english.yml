 spain.1.t: "Catalonia Rebels!"
 spain.1.d: "Wholesome Anarchists"
 spain.1.a: "Crush Those Rebels!"
 spain.2.t: "The Catalan Revolution"
 spain.2.d: "The Spanish public and western Europe are in shock with the unilateral declaration of independence of the Spanish province of Catalonia. Spain is no stranger to separatist movements, especially in the last few decades. Out of all the territories of Spain, the Basque region and Catalonia have been the most persistent with calls for independence, with independence parties and movements prominent in local politics. However, it seems that the recent wave of unrest and discontent within Spain has given these regions the opportunity to do what many local activists struggled to do for years. Within the last day, Catalan politicians declared their unilateral independence from Spain to much fanfare by the local population, claiming that the time was right for Catalonia to assert its sovereignty. Madrid has swiftly condemned the act, claiming it to be completely illegal. As much as there is strong will to now act, it may prove impossible as there is very little will by local Spanish authorities to reign in the rouge province, as local Catalans have overwhelmingly joined in on the move for independence along with other issues currently plaguing the Spanish state. Some within Spain and western Europe have also raised the fear that separatism might spread, and that mass anarchy is imminent. Unfortunately, Catalonia's independence has only fueled those fears to a dangerous extent."
 spain.2.a: "Another Spanish Civil War?"
 spain.7.t: "Spain Requests Our Help"

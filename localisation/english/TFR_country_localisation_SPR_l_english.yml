 spain.11.t: "Portugal Shatters"
 spain.11.d: "In the chaos of defeat in the east, and the resulting economic ruin brought upon the vanquished, Portugal has reached a breaking point. To the north, rogue elements of the military have declared a new government from their base of Porto. They claim that the Republic has betrayed the nation, their incompetence snatched defeat from the jaws of victory and their corruption destroyed the nation's prosperity. Only they can save the nation from the malignant forces of the left and economic ruin. To the south, a People's Republic has been declared. For them, the scapegoat is the uncaring profit-seeking of the bourgeoisie, bleeding the nation dry, the unfairly high taxes born of the war, and the refusal to end conscription despite the war having already been lost. They claim that only they can save the people. In between the chaos lies the shattered Republic, surrounded, lacking everything with no hope, morale is gone, reserves nonexistent. Even the bedrock of its support-the Republic's civil servants and centrists are already creating alibis and thinking of excuses in the hopes they can still have a place in whoever and whatever system wins out. Nothing short of a miracle or foreign support can save the Republic. \n\nAll of Iberia is alight, not since the Brothers War has a conflict of this scale erupted on Portuguese soil. Separatists, revolutionaries, nationalists, and supporters of the Republic all fight for their vision for a better tomorrow and most see the situation for what it is. There is no room for compromise, no room for failure. The rallying cry from the most diehard fascist militiaman to the bourgeois social democrats is all the same: 'Vitória ou morte'."
 spain.11.a: "Deus, Pátria e Família!"
 germany.150.t: "Moving the Hauptstadt"
 germany.150.d: "Given our humiliating defeat at the hands of the east, in no small part due to Berlins proximity to the Oder River, it is time to re-evaluate the location of our seat of Government. Our capital is ever closer to the enemy now due to the Polish borders being redrawn. Baltic sea dominance is now contested as well, threatening an amphibious assault from Mecklenburg. Critics are stating Berlin is no longer suitable, given it will be much more swiftly prone to collapse in case of war.\n\nThe options are Cologne, the 4th largest city by Population and just south of the former West German Capital, Bonn, of 4 decades. The city is predominantly based west of the Rhine, making it naturally defended for the most part. Then there's Frankfurt, the Financial capital of the entirety of Continental Europe, home to the European & German Central Banks, which combined own ~5,000 metric tonnes of Gold Reserves, valued at the half trillion USD ballpark. Frankfurt is also home to many businesses, which lobbyists are using as a reason to further justify the move to Frankfurt.\n\nNext, Hamburg. Though its position is precarious, it is the next largest City at 2 million, nearby to major naval bases and situated south of the Kiel canal, it'd be more difficult for the Russians to land there. Lastly, Munich. The growing regionalism within Bavaria is spiking following the war and at current rates is expected to further grow, calming Bavaria through moving our capital there would be a knockout blow to their movement and stabilise our south, a relatively good deal. Whatever the decision, let us pray the Russians do not return to German soil."
 germany.150.a: "Cologne is an excellent choice."
 germany.150.b: "Frankfurt holds strategic imprtance."
 germany.150.c: "Munich is the best, it can be easily defended."
 germany.150.e: "No, the capital will remain in Berlin!"
 germany.151.t: "The Supreme Chancellor Addresses the Armed Forces"
 germany.151.d: "We saw what Russia did to our beautiful continent, twice, the bear closed its jaw around our necks and left behind a wound.\nThis time however, there isn't some lethargic disease in us left, a rabid hatred has grown in our hearts.\nWe were taught to shed our identities, and with this loss we have paid the price.\nNow it is time to reforge ourselves again through the fires of war.\n\nThe fate of the German nation and Europe as a whole is in your hands, we cannot fail.\nWe will struggle without end until the very concept of "Russia" is obliterated from the past, present and future.\nHow does our worldview deal with loss? \nYou push through it, there is no other way, despite how devastating it is.\n\nThe Russian bear is waiting.\nRip out its heart.\nGorge yourself on it.\nLet the world watch.\n\nOur sole commandment, endure everything."
 germany.151.a: "Victory at all costs, torch the earth."
 germany.152.t: "Babylon Berlin"
 germany.152.d: "As the Reich sharpens it's fangs, it is pertinent as a people that we must not forget our ancestral lineage and cultural identity. Throughout history we, the Germans, bore the banner and cry of death and perfection. The Vandals sacked the Capital of the World, The Prussians humiliated the European Hegemon; we stand as Spengler's living prophecy.\n\nWith the revival of Ariosophy in the 21st century, it's clear that the wrath of the divine and the Gods of the old accompany us, how else are we to explain our insatiable lust for battle? Wotan, restless and all-powerful, has manifested his frenzy into our realm as us, the Volkstaat. "Ergriffenheit", as Jung put it, but rather, applied to an entire body, the corpus of the Reich.\n\nEagles coated with Gold parade Berlin, men wearing ceremonial robes paraded them, some wore violet red, hooded robes. Staffs, affixed to them the Black Sun, Hakenkreuz, the Odal, all ancestral symbols of Germany. On the month of Hagal in the Weltenuhr, The Volk have found their divine calling."
 germany.152.a: "Wow..."

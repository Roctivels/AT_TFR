 germany.221.t: "A Change in Management"
 germany.221.d: "As a response to our insufficient measures in satisfying the interests of corporations that our economy strongly relies on, a delegation of the biggest European and transnational companies has approached us, offering their representatives to take up most key positions in the government to ensure a truly technocratic and cooperative future for Europe.\n\nEven though corporate power has surfaced and CEOs now make political decisions directly, many wonder: has anything truly changed?"

 GER_catharsis1: "Catharsis"
 GER_mass_catharsis_dynamic_desc: "Civilization has long been defined by its ability to suppress primal violence in favor of structured coexistence.\nIn modern European society, the European Union relies on this tacit agreement to suppress our more destructive impulses because it is complex, interdependent, and delicately maintained.\n\nIn an era marked by neural implants, psychosocial erosion, and the systematic repression of fundamental human experiences, this balance becomes increasingly precarious.\n\nWhenever this collective restraint begins to fail, the memory of what we are capable of resurfaces. There will be no civil consequences to such remembrance."
 GER_japanification: "Japanification"
 GER_eye_in_the_sky: "Eye in the Sky"

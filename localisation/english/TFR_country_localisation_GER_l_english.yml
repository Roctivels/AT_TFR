 GER_chaotic_revolution: "Chaotic Revolution"
 GER_chaotic_revolution_desc: "Our defeat at the hands of Russia was sudden and chaotic, and the people's seizure of power even more so. With no true example of governance to fall back on, we were forced to hastily assemble new leadership to ensure the revolution survives the next few years. Until this is all sorted out, the effects of the chaos will continue to show, and we will be in a weakened state."

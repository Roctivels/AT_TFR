 GER_eurail_idea: "Eurail"
 GER_eurail_idea_desc: "Europe has always prided itself on having good public transportation, a perception shared by nations across the globe. Building on this reputation, a massive undertaking in modernizing and upgrading of the union's rail transportation system has been executed. New lines have been opened, old cars and services modernized, new technologies implemented, millions of dollars invested, and thousands of workers assigned; it is arguably the largest expansion of rail in recent memory. But now the modernizations have been completed, and we can now expect the EU's rail transport to be ranked as amongst the best, or even the best, in the world."

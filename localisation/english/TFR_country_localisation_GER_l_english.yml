 GER_nato_war_victor: "Victor of the European War"
 GER_nato_war_victor_desc: "As leaders of the EU, we stand as the unchallenged masters of Europe, having shattered the Russian war machine and protected the West from tyranny. Yet victory hasn't come without a price. Tens of thousands of our men were sent to die in the front, entire regions devastated, and the war effort pushed our economy to its very limits. The scars may not be as visible here as in the East, but the spectre of war lingers in our factories, in our streets, and in the minds of every citizen.\n\nNow, a new kind of war begins: the struggle to stabilize, rebuild, and secure the democracy that so many of our boys fought and died for. But as Europe looks to us for leadership, we must ask ourselves: will this triumph be the beginning of a new, democratic era, or merely the calm before §Rthe next Russian storm§!?"
 GER_nato_war_victor2: "Victor of the European War"

 GER_nationalized_defense_industry: "Nationalized Defense Industry"
 GER_nationalized_defense_industry_desc: "Part of our reorganization of the armed forces is the abolition of private enterprise within our military industrial complex. Every firm that was once privately owned that manufactured arms or serviced any systems within our armed forces has been seized and put under the control of the state. With the threat of obstruction or profiteering by these capitalists and their businesses eliminated, our industries will now play their due role as the unquestioning and seamlessly integrated cog in our machine of military reform and buildup."
 GER_german_oil: "German Oil"
 GER_BMVI_idea: "BMVI"
 GER_BMVI_idea_desc: "The BMVI is a part of the European Union's legal and political framework for administering and managing the union's borders and immigration. The BMVI's official mission is to ensure a strong and effective European integrated border management at the Union's external borders, ensuring a high level of internal security within the Union while safeguarding the free movement of people within it. However, Europe's mass immigration and refugee issues that still rattle the continent continue to put pressure on the current system and call into question its efficacy. Many on the populist right even call for the system's entire replacement with something new. Regardless of the controversy, the EU's top leaders have assured us that it is up to the task of tackling these challenges."
 GER_CAP: "CAP"
 GER_CAP_desc: "The EU's Common Agricultural Policy, also known as CAP, is the alliance's central policy framework regarding the continent's agriculture. Using a combination of regulations, subsidies, and clearly defined objectives and targets, the CAP seeks to provide economic development and a fair market to European farmers and businesses. However, many criticize it for a variety of supposed economic and political issues. The complaints include environmental damage, being too burdensome with its regulations, running small farmers out of business, and being too troublesome with trade partners in the developing world. Regardless, many administrators in the EU still take pride in it as an achievement in economic integration and political harmonization."

 GER_democratic_national_front_idea: "Democratic National Front"
 GER_democratic_national_front_idea_desc: "Ruling over a new socialist Germany cannot be done simply by us and be immediately seen as totally consolidated by us, rather it must be inclusive of the entire working class. With this, the Democratic National Front has been formed to politically unify the nation in a still volatile social environment and give greater legitimacy to our rule. With our party at the helm and supported by other supporting political and social organizations, we can expect this to soon cement our position as this country's lead authority."
 GER_new_stasi_idea: "New Stasi"
 GER_new_stasi_idea_desc: "With our reforms of Germany's security agencies complete, we now have at our disposal an intelligence gathering body that no other on the continent can rival. Like the old East German Stasi, it is an expansive organization, employing talented agents and specialists fervently devoted to finding and eliminating enemies of the revolution. However, they will now have access to the most modern tools of espionage ironically pioneered by our capitalist predecessors. Modern technology and techniques, combined with the principles and tactics of the old Ministry of State Security, will simply make our information collection operations unparalleled. Our "new" Stasi will be something to inspire fear in our most potent adversaries, so much so that they will be wishing for the old Stasi from the 20th century.\n\nIt will be our sword with global reach and a shield with no weak points down to the nanometer."
 GER_new_stasi_2_idea: "New Stasi"
 GER_new_stasi_2_idea_desc: "With our reforms of Germany's security agencies complete, we now have at our disposal an intelligence gathering body that no other on the continent can rival. Like the old East German Stasi, it is an expansive organization, employing talented agents and specialists fervently devoted to finding and eliminating enemies of the revolution. However, they will now have access to the most modern tools of espionage ironically pioneered by our capitalist predecessors. Modern technology and techniques, combined with the principles and tactics of the old Ministry of State Security, will simply make our information collection operations unparalleled. Our "new" Stasi will be something to inspire fear in our most potent adversaries, so much so that they will be wishing for the old Stasi from the 20th century.\n\nIt will be our sword with global reach and a shield with no weak points down to the nanometer."
 GER_anti_communist_underground_2: "Anti-Communist Underground"
 GER_anti_communist_underground_2_desc: "In any revolution there will always be those to refuse to accept the will of the people. In Germany, it's remnants of fascists and Nazis who have done nothing for the citizens of this country besides sob about the "glorious past" they wish to restore. Like a sick game of Whack-A-Mole, no matter how many times we think we've wiped them out, they pop back up.\n\nEven now, they continue to wreak havoc and attempt to upend the progress we've fought so hard to achieve. They terrorize our people, calling themselves the Aktionsgruppe Deutscher Nationalisten, while pretending to be on some righteous crusade. As long as this continues, the people will lose faith in us, and so we must truly put down the Nazis for good."
 GER_anti_communist_underground_1: "Anti-Communist Underground"
 GER_anti_communist_underground_1_desc: "In any revolution there will always be those to refuse to accept the will of the people. In Germany, it's remnants of fascists and Nazis who have done nothing for the citizens of this country besides sob about the "glorious past" they wish to restore. Like a sick game of Whack-A-Mole, no matter how many times we think we've wiped them out, they pop back up.\n\nEven now, they continue to wreak havoc and attempt to upend the progress we've fought so hard to achieve. They terrorize our people, calling themselves the Aktionsgruppe Deutscher Nationalisten, while pretending to be on some righteous crusade. As long as this continues, the people will lose faith in us, and so we must truly put down the Nazis for good."

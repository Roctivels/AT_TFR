 GER_left_acceleration_idea: "Eurosocialism"
 GER_left_acceleration_idea_desc: "Marx had always said that history operates in phases, that people are a product of the economic and social circumstances of their respective time. We are no different and the socialism that we are building is just that. This is socialism for our current place and time; Eurosocialism. The abuses of capitalism continue to this day, but now in tandem with new crises including neocolonialism, racism, environmental destruction, globalist capitalist dominance, and much more. But rather than stay stuck in past glories, we must rise to this challenge with vigor and zeal. Just as capitalism changed, so must we, and if we don't, we can expect the revolution to be snuffed out faster than the change in trends on the global internet."

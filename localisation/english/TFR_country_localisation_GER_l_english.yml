 GER_chinese_economic_assistance_idea: "Chinese Economic Assistance"
 GER_chinese_economic_assistance_idea_desc: "The People's Republic of China, in their comradely quest to assist the development of socialism worldwide, has granted us generous economic assistance. From loans with flexible financing terms to large sums of direct investments, the scope and size of the aid is the largest we have seen in recent times. We can expect all these new resources to greatly assist us in our vigorous objective of building a modern socialist economy in Germany."
 GER_apla_military_advisors_idea: "APLA Military Advisors"
 GER_apla_military_advisors_idea_desc: "As part of our newfound cooperation with our fellow revolutionaries in America, they have dispatched some of their officers to Germany as military advisors. With them comes a wealth of combat experience, technology, and novel skills acquired during the brutal 2nd American Civil War. There is no doubt that the men of our armed forces will learn many useful lessons from them regarding fighting in and winning a modern war."
 GER_european_community_idea: "Community of Socialist Workers"
 GER_centralized_planning2_idea: "Centrally Planned Economy"
 GER_centralized_planning2_idea_desc: "With the demise of the bourgeoisie political system also comes the demise of the wretched and putrid capitalist economy. In its place is our own model of a centrally planned economy in accordance with socialist doctrine. Investment, allocation of capital goods, and production will all be under government organization and direction, and for good reasons. No longer will the people and our nation be subject to the economic anarchy and greed of the capitalists and their enterprises. No longer will the resources, people, and labor of Germany be tossed away for the personal profit of businessmen. Now every segment of the economy will be carefully managed and planned to maximize our efforts to build socialism. Depending on how we manage this, it will either bring about a swift and dramatic transition to a truly socialist economy or a state of unmitigated disaster."
 GER_socialist_market_economy2_idea: "Socialist Market Economy"
 GER_socialist_market_economy2_idea_desc: "In our quest to dismantle capitalism and reach socialism, we have taken a seemingly unique approach. Like Tito's Yugoslavia, our economy has been reorganized into a socialist market economy instead of a tightly centralized command economy as some had expected. Even though the state will have extremely strong involvement and coordination in the national economy, limited private enterprise and the permitting of a limited free market will still exist. As some within the party have euphemistically regarded our approach, the workers will have "the best of both worlds". However, it will be seen how well this middle ground that we have taken will be for Germany's trajectory towards our economic objectives."
 GER_centralized_planning_idea: "Centrally Planned Economy"
 GER_centralized_planning_idea_desc: "With the demise of the bourgeoisie political system also comes the demise of the wretched and putrid capitalist economy. In its place is our own model of a centrally planned economy in accordance with socialist doctrine. Investment, allocation of capital goods, and production will all be under government organization and direction, and for good reasons. No longer will the people and our nation be subject to the economic anarchy and greed of the capitalists and their enterprises. No longer will the resources, people, and labor of Germany be tossed away for the personal profit of businessmen. Now every segment of the economy will be carefully managed and planned to maximize our efforts to build socialism. Depending on how we manage this, it will either bring about a swift and dramatic transition to a truly socialist economy or a state of unmitigated disaster."
 GER_socialist_market_economy_idea: "Socialist Market Economy"
 GER_socialist_market_economy_idea_desc: "In our quest to dismantle capitalism and reach socialism, we have taken a seemingly unique approach. Like Tito's Yugoslavia, our economy has been reorganized into a socialist market economy instead of a tightly centralized command economy as some had expected. Even though the state will have extremely strong involvement and coordination in the national economy, limited private enterprise and the permitting of a limited free market will still exist. As some within the party have euphemistically regarded our approach, the workers will have "the best of both worlds". However, it will be seen how well this middle ground that we have taken will be for Germany's trajectory towards our economic objectives."
 GER_national_catastrophe: "National Catastrophe"
 GER_national_catastrophe_desc: ""
 GER_national_catastrophe2: "National Catastrophe"
 GER_national_catastrophe3: "National Catastrophe"
 GER_russian_energy_dependence_idea: "Russian Energy Dependence"
 GER_russian_energy_dependence_idea_desc: "Germany is over-reliant on Russian energy, specifically natural gas, through long-term contacts and pipelines such as Nord Stream. Initially, Russia offered a stable and relatively low-cost source of natural gas which was attractive for our growing industrial sector and energy needs, providing short term benefits. Over time though, the vulnerabilities of this have been particularly evident during geopolitical crises, and Russia's control over German energy supplies may give them undue influence over our policies and politics, raising concerns over national security."
 GER_bundeswehr_shortcomings_idea: "Extreme Bundeswehr Shortcomings"
 GER_bundeswehr_shortcomings_idea_desc: "Out of all European Armies, the Bundeswehr is perhaps one of the most pathetic. Underfunded, underequipped, undermanned and undertrained, the Bundeswehr in its current state is woefully unprepared for any future conflict. In part, the German anti-militarist attitude is responsible, and it would take a large crisis to convince the rest of Europe that German Militarization is necessary."
 GER_german_legacy_idea: "Deutsches Vermächtnis"
 GER_german_legacy_idea_desc: "Over the past 100 years, the German Legacy has been one of shame, oppression, genocide, and dictatorships. From the Kaiser spilling the blood of thousands in the fields of Western Europe, to the brutal Nazi rampage bleeding Europe dry, to the East German Government whose sophisticated police state defined what \"authoritarianism\" meant for decades, Germany must never forget its troubled past. The nation has an avowed hatred for hyper-militarization, causing a shortage of men to fill the army. To make sure that Germany can never ruin Europe again, extremist ideologies such as Communism and Nazism are unpopular in Germany, and are actively suppressed by the government to make sure the mistakes of the 20th century are never repeated again."
 GER_bundeswehr_shortcomings_german_legacy_dummy_idea: "Extreme Bundeswehr Shortcomings §Wand§! Deutsches Vermächtnis"
 GER_merkelreich_idea2: "Merkelreich"
 GER_merkelreich_idea2_desc: "Angela Merkel has been a bastion of stability in German politics for the past 15 years. Under Merkel, Germany saw itself guided into an era of prosperity with its role as one of the key heads of the European Union, all while securing peace both domestically and with the Russians. However, with Merkel's reign coming to an end with her announcing that she will not seek reelection in 2021, the future of Germany is increasingly uncertain. With conflicts still high about the Refugee Crisis, Economic troubles looming over the horizon, and a ever more unstable United States, how long will German domestic stability really last?"
 GER_merkelreich_idea: "Merkelreich"
 GER_merkelreich_idea_desc: "Angela Merkel has been a bastion of stability in German politics for the past 15 years. Under Merkel, Germany saw itself guided into an era of prosperity with its role as one of the key heads of the European Union, all while securing peace both domestically and with the Russians. However, with Merkel's reign coming to an end with her announcing that she will not seek reelection in 2021, the future of Germany is increasingly uncertain. With conflicts still high about the Refugee Crisis, Economic troubles looming over the horizon, and a ever more unstable United States, how long will German domestic stability really last?"
 GER_russo_german_trade_deal_idea: "Russo-German Trade Deal"
 GER_russo_german_trade_deal_idea_desc: "In the spirit of cooperation and diplomacy, a seemingly rare occurrence with them, the Russians have negotiated and signed a significant trade deal with us. The deal is quite comprehensive, with new arrangements for multi-million to billion-dollar imports of fossil fuels and agricultural goods in exchange for us exporting key technologies and industrial goods in demand in Russia's manufacturing sector. This will be a welcome change in Germany's economic outlook, especially as many are doubting the robustness of our economy for the near future."
 GER_deutsche_marine_revitalization_idea: "Deutsche Marine Revitalization"
 GER_deutsche_marine_revitalization_idea_desc: "The Deutsche marine, which handles Germany's naval operations, maritime defence, and international sea missions, needs revitalization. New doctrines and a higher emphasis in ship building shall help it on this matter."
 GER_mass_tank_production_idea: "Mass Tank Production"
 GER_mass_tank_production_idea_desc: "Our factories are chirping out more tanks than usual. We shall mass a large stockpile to meet our equipment quotas and ensure the Bundeswehr never faces a lack of tanks like it did mere years ago."
 GER_mass_mechanization: "Mass Mechanization"
 GER_mass_mechanization_desc: ""
 GER_blind_eye_to_army_extremism_idea: "Blind Eye to Army Extremism"
 GER_blind_eye_to_army_extremism_idea_desc: "Mainly out of desperation, we shall allow anyone, no matter their beliefs, to join our armed forces. Sure, this might make the Bundeswehr a far less organized and respected force, and might lead to atrocities committed behind our backs, but we should be able to meet our manpower quotas more easily."
 GER_purged_extremist_soldiers_idea: "Purged Extremist Soldiers"
 GER_purged_extremist_soldiers_idea_desc: "To ensure our soldiers remain loyal to the Federation and aren't built by hate, the Bundeswehr has been purged of any kind of radicalism within its ranks. Whilst this might prove detrimental in the short term, the Bundeswehr shall hopefully experience the positives of not facing disloyalty and extremism in the future."

 GER_scars_of_nato_war: "Scars of the European War"
 GER_scars_of_nato_war_desc: "The War has left its mark on everyone, and we are no exception. Our cities and infrastructure has been left decimated, and the rebuilding effort will take years, if not decades. The war has taken its toll on the morale and resources of the citizenry, leaving deep scars that may never fade."

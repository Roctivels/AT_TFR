proxy.1.t: "Question of Chaos in Arabia"
proxy.1.d: "Chaos in Arabia had our own leadership question the possibility of involvement in the region, but first we have to decide which side we will support in the civil war.\n\nThe obvious and most legitimate choice would be to send support to the Riyadh government, as we have long running connections with Mohammed Bin Salman.\n\nOn the other hand, we can support our Iranian allies by sending aid to their own proxy in the country instead. While risky, this move could be beneficial to our future diplomacy with Iran."
proxy.1.a: "Support the Government"
proxy.1.b: "Support Hezbollah"


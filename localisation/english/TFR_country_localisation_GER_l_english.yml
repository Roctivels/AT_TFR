 GER_five_year_plan: "Five Year Plan"
 GER_five_year_plan_desc: "Like many former socialist states, our government has put into action an extensive and comprehensive five-year plan for the development of our national economy. In it, vast investments and resources for developing our industry, infrastructure, and the productive capacities of other important sectors of our country have been laid out. Our target is nothing short of a total revitalization and expansion of Germany's industrial strength, the backbone on which German socialism will grow."
 GER_safety_law: "Classless Society"
 GER_ostalgie_idea: "People's Democracy"
 GER_ostalgie_idea_desc: "With the dissolution of the pre-revolution bourgeoisie NATO-run "democracy" comes its rightful successor, a true people's democracy. Like the socialist republics of the past, no longer do rich capitalists and their lackeys occupy the halls of power claiming to "represent" the people. Now the workers and peasants of Germany are the supreme political authority of the nation, from the lowest levels of government to the highest. With the dictatorship of the proletariat secure, the representative bodies returned to the people, and the authority of the party to serve the needs of the workers unopposed, the political means to achieve socialism are in our hands. However, it will be seen if we build success on the people's democratic model or allow it to sink into its previous shortcomings or worse."

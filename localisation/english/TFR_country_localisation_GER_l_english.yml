 germany.83.t: "The European Union Promulgated"
 germany.83.d: "Today is a day like no other.\n\nThe European Union - a framework of brotherhood, cooperation, and unity amongst the nations of this grand continent - is finally ready to ascend. After decades of work and hard struggle against the tides of history, the Union had finally came through.\n\nNo longer will we constrain ourselves on the status of faux-federation. Our true purpose is now clear - our destiny within reach. It is not a loose alliance of nations, nor a choir of the voices of the many; It is an iron-clad superstate that reaches from Lisbon to Riga, with a single voice. A singular will.\n\nToday is the day the European Union ascends into what it is destined to be. Today shall mark the start..."
 germany.83.a: "...Of a European Century"
 germany.84.t: "France Votes to join EU"
 germany.84.d: "In a historic moment, the people of France have chosen to join the European Union. Not since the days of Charlemagne have our people been united under one banner, and the past nine centuries have been full of struggles between our two countries. This is a momentous occasion that has been celebrated as such in both nations.\n\nHowever the significance of this unification is not only symbolic. France has one of the largest armies in Europe, and their unification will bring a large amount of firepower to our armed forces. Not only this, but their significant influence in West Africa will allow us to combat the Russians in the region. This is surely a major blow to the Eastern menace, and one step closer to our final showdown with them." #implement
 germany.84.a: "Excellent News!"
 germany.85.t: "Italy Votes to join EU"
 germany.85.d: "Italy has had a history of Euroscepticism that had us worried that spending resources on convincing them to join the EU would be a lost cause, but in the end our gambit paid off. The vote was much closer in Italy than in the other nations we have recently unified with, but the pro-unionists still won by a sizable portion.\n\nItaly's admission to the European Union has come with a slew of benefits. Namely, it offers us more warm water ports and access to the Strait of Sicily. We can now ensure the Russians traveling through the Mediterranean pay a fair share. Italy also has a large vehicle market and several large automobile manufacturers, allowing us to expand our monopoly on the market." #implement
 germany.85.a: "Excellent news!"

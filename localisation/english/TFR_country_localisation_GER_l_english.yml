 TFR_Anarchy_ZZZ_tt: "§RCatharsis§!"
 TFR_Anarchy_ZZZ_tt_delayed: "The one thing every person craves is the warm embrace of another.\nYou see the cold, sterile buildings, glass through glass as you force a smile towards strangers. You are surrounded by many, but the loneliness persists, like a serpent wrapping itself around your neck\n\nYou remember being told that effort pays off.\nYou remember being told that if you struggle first, you get to enjoy life later.\n\nDelayed gratification has become a joke.\n\nYou are being told it is wrong to be angry, it is wrong to cry, and it is wrong to smile.\nPlastic turns into porcelain as you're made to wear a version of yourself that is not you.\nThe family has been atomized beyond belief; there is less and less time and motivation to be human, and in the dark corners of the apartments, you can feel the sting.\n\nA future was promised, but it has been disposed of on the altar of Purity.\nYou see the ads of other people having it better; you could have gotten that life.\nIt hurts.\n\nMan was meant to create, man was meant to feel, and man was meant to bleed.\nTake that away, and all that is left is a beast with sharp fangs and a bitter heart.\n\nThere is no philosophy left to save them, no firearm powerful enough to stop them.\nIt does not matter how much the cities burn, as long as they burn.\nThe future is lost, the stores are looted, and the streets are covered in violence, a carnal outburst meant to scar the soul.\n\nThe carefully designed rules to keep man ensnared in insincere polite society are being torn to shreds, not to attain some kind of paradise, but to ensure that this world will no longer hold a future without a future, to ensure that their children won't have to live in a world like this.\n\nDaggers into the eyes of bureaucrats, a fire axe in the back of an HR manager, teeth sinking into the necks of the critics, let them drown in their own perfection, let them see how pure man can be.\n\nYou just really want to break your own nose."
 

l_english:
 #Leaders
 #Focuses
 GER_rethinking_german_militarism: "Rethinking German Militarism"
 GER_rethinking_german_militarism_desc: "German militarism, especially in the 20th and 21st centuries, is an incredibly sensitive topic. From the armies of the Kaiserreich who had viciously plundered Belgium and slaughtered millions under colonial rule in Namibia, to Adolf Hitler's regime which perpetrated the Holocaust; even bringing up remilitarization can get you labeled as a member of the far-right in the modern day. Despite its history and negative connotations, we should begin rethinking the state of German militarism with the position we have found ourselves in, especially as the United States is on the verge of collapse and the Russian bear looming over Europe."
 GER_bulwark_of_democracy: "Bulwark of Democracy"
 GER_bulwark_of_democracy_desc: "In the modern world, we have evolved into a beacon of European parliamentary democracy, standing proudly as the world's third-largest economy, especially in the aftermath of the United States' collapse. This has prompted us to begin reconsidering our historical aversion to militarization, especially with Russian expansionism and authoritarianism encroaching on the borders of democratic Europe. This is not merely a strategic adjustment, but a necessary measure to safeguard the future of German liberty, which should stand as a bulwark above all of Europe which will defend our people from the Eastern menace that has threatened the development of mankind for so long. While collaboration with our European allies is important, we must reiterate that the future of Germany is the future of Europe, and that Germany is to be valued first, atleast in our own affairs."
 GER_europe_united: "Europe United"
 GER_europe_united_desc: "As the United States is in open-air collapse, and Russia ready to strike the heart of European democracy at any second, we need now more than ever European unity. It has become clear that on its own, Europe is weak, susceptible to infighting and collapse. The European Union has been the bulwark of European democracy, and has manifested a parliamentary system that serves the will of the people with little flaws. If we want to secure the future of European liberty, aswell as strike down Russian expansionism before it can extend itself, the destiny of Europe is unity, and European collective defense will be valued over the state of the Bundeswehr."
 GER_defender_20_europe: "DEFENDER-Europe 20"
 GER_defender_20_europe_desc: "Defender-Europe is a concept drawn up by our High Command that involves a large-scale, Bundeswehr-led, multinational joint exercise designed to prepare Europe for a future war with \"adversaries abroad\", referring to none other than Russia. Not only would this plan build up the Bundeswehr and reinvigorate confidence within European militaries, it would build interoperability, readying Europe for joint military action in future conflicts. If accepted, this would structure European military exercises around the Bundeswehr, giving us an opportunity to show the competency and efficiency of our Army to the world."
 GER_f35_program: "F-35 Program"
 GER_f35_program_desc: "With the revitalization of the German Army, we should also pivot attention to the Luftwaffe, a branch of our Armed Forces which is critically underfunded, undersupplied, and neglected, despite the importance of an Air Force in modern warfare; particularly the F-35 Lightning II, a staple of American engineering genius as well as arguably the most successful stealth fighter program in human history. Using an influx of American military engineers fleeing the country due to the Civil War, blueprints, aswell as stockpiles across Europe, we will acquire our own set of F-35s, investing in our industry and workers, aswell as bolstering our military-industrial complex. This decision will make it clear that the F-35 is the right choice for Germany!"
 GER_revive_the_deutsche_marine: "Revive the Deutsche Marine"
 GER_revive_the_deutsche_marine_desc: "The Deutsche Marine, while one of the largest in Europe and extremely flexible, is overstretched, underfunded, and outdated. Years of cuts in the defense budget have significantly reduced the scope of our navy, as well as placed heavy restrictions on equipment. While we are rethinking German militarism, we should also extend this to the Navy, and begin upping our defense budget to revitalize the German Navy. We will invest in the modernization and expansion of our naval fleet, including the acquisition and development of advanced surface ships, submarines, and support vessels. We will also develop a clear and adaptable maritime doctrine that aligns with Germany's strategic interests above Europe's."
 GER_redefine_german_doctrine: "Redefine German Doctrine"
 GER_redefine_german_doctrine_desc: "German military doctrine, despite our efficient High Command, has been very obviously on the decline. Instead of adapting old techniques from separate countries, we should value and develop German military doctrines that suit the Bundeswehr best. This includes Joint Operations Integration, hybrid warfare, strategic mobility, the development of ISR and HADR, adaptation to electronic warfare, the development of urban battle techniques, multi-domain operations, and a flexible force structure. If we align the domestic priorities of the Bundeswehr, instead of doctrines developed in foreign nations, then the Bundeswehr will know best, allowing us to more efficiently adapt to foreign conflict."
 GER_refine_airland_combat: "Refine Airland Combat"
 GER_refine_airland_combat_desc: "Airland Battle was the strategic concept that formed the basis of the United States military's combat doctrine in Europe from the early 80s' to the late 90s'. It emphasizes close coordination between land and air forces to pin, outmaneuver, and destroy enemy combat forces, especially ones constricted to the ground. While this concept has been prevalent within the Bundeswehr and the Luftwaffe, it is slowly becoming a less refined concept with equipment gradually phasing out of modernization. Through upgrading equipment, enhancing operational strategies, and incorporating advanced technologies, such as UAS and Cyberwarfare, we can refine our airland battle doctrines."
 GER_modernize_the_leopard: "Modernize the Leopard"
 GER_modernize_the_leopard_desc: "The Leopard 2, a third generation main battle tank, is considered the Bundeswehr's magnum opus. It is considered one of our finest works of engineering, yet, despite these high qualifications, most Leopard 2 models have been left neglected, falling short on technical updates and being completely out-of-date. We should begin refining these models, preparing to modernize the Leopard 2 through enhancing armor, implementing firepower upgrades in the main gun, such as a larger caliber or a more advanced rifled or smoothbore gun, integrating advanced fire control systems, incorporating thermal imaging, laser rangefinders, and ballistic computers for increased accuracy and target acquisition, implementing digital architecture, improving engine and mobility, aswell as improving Active Protection Systems. If the Leopard is the tank of the future, then this must be reflected in its design."
 GER_develop_domestic_capabilities: "Develop Domestic Capabilities"
 GER_develop_domestic_capabilities_desc: "Our military capabilities are slowly being rebuilt, but our industry, on the other hand, is in quite the tough spot. Across our nation, factories that should be producing goods for the German people and arms for our army lay desolate, neglected, and unkept. Our military factories? Barely any are being built or retooled to produce the needed munitions for the Bundeswehr! This is ridiculous, given the weight on our shoulders. We must revitalize German domestic production for the military, there is a storm brewing, and we must prepare ourselves when it reaches us."
 GER_construct_new_dockyards: "Construct New Dockyards"
 GER_construct_new_dockyards_desc: "Naval dockyards and ports across the German coast are few and far between, and when they are host to a fleet, the port is usually run down, poorly maintenanced and unfit for repairs. We should begin revitalizing dockyards and building a new set, utilizing site selection, feasibility studies, partnerships with private investors, infrastructure investment, using market analysis to tailor the design and capabilities of said dockyards, investing in training programs and education to build a competent workforce, and phased development for essential infrastructure."
 GER_focus_on_trade_interdiction: "Focus on Trade Interdiction"
 GER_focus_on_trade_interdiction_desc: "German Naval Doctrine has long been focused on coastal defense since the Second World War, the days of a Grand Fleet are behind us, sunk along with the Monarchy, but a revival of the Trade Interdiction doctrine of the Kriegsmarine of the 1940's would serve us well, intercepting any enemy convoys, it will be especially useful in keeping Kaliningrad under siege."
 GER_naval_center_of_europe: "Naval Center of Europe"
 GER_naval_center_of_europe_desc: "Germany is the center of Europe's industrial base, it's greatest producer of consumer products, home to some of the world's most renowned weapons manufacturers, but the German naval industry has not shared the same international notoriety for a long time.\n\nNo longer shall our fleet hide beneath the sea, we must focus on high tonnage surface vessels to project not just our own power, but the power of Europe well beyond our own waters, the Kaisers antiquated dream of a grand fleet is not quite dead."
 GER_construct_new_airfields: "Construct New Airfields"
 GER_construct_new_airfields_desc: "As our air force grows to meet new demands, airfields will be necessary to support them, a variety of new non-civil airbases will be constructed in our East to prepare for the coming conflict."
 GER_purge_extremist_soldiers: "Purge Extremist Soldiers"
 GER_purge_extremist_soldiers_desc: "A series of concerning reports have been brought to our attention about far-right extremism within the Heer, Luftwaffe, and Marine. While only a small fraction of our Armed Forces, the number of these extremists has been growing at an alarming rate. We must take immediate action, as extremism within our ranks is strictly forbidden. These soldiers will be disciplined and likely discharged depending on the severity, showing the world that we will not tolerate this behavior."
 GER_turn_a_blind_eye: "Turn a Blind Eye"
 GER_turn_a_blind_eye_desc: "Why should we exempt extremists from the armed forces? Are they not the most dedicated to German defense? No, set the reports aside, a free society should be defended by all of it's citizens, even those with unsavory opinions.\n\nIt may be against doctrine, but we're reforming a lot of things, let this be another one of them."
 GER_upgrade_our_railways: "Upgrade Our Railways"
 GER_upgrade_our_railways_desc: "The rails in East Germany are woefully underdeveloped compared to the West, thanks to Communist mismanagement no doubt, now that we have incentive, we can pass a budget through the Bundestag and get the trains running on time."
 GER_revive_german_military_industry: "Revive German Military Industry"
 GER_revive_german_military_industry_desc: "Heckler & Koch, Haenel, Krupp, Rhinemetall, the list goes on. We have an innumerable amount of cutting-edge military companies in our arsenal; companies that could provide our armies with state-of-the-art equipment if we just let them. But, unfortunately, our past mistakes have completely starved these organizations of a domestic arms market. We must give them new contracts to work with, and with these, the German military industry will be jumpstarted."
 GER_civil_construction_program: "Civil Construction Program"
 GER_civil_construction_program_desc: "Our civilian industry needs to be propped up, our infrastructure is falling behind, this slump of the past years cannot continue if we're to consider ourselves ready for the coming onslaught. Every army marches on it's stomach and we aim to have the roads to feed them, and our people."
 GER_invest_in_rnd: "Invest in R&D"
 GER_invest_in_rnd_desc: "Our nation may have somewhat faltered when it comes to domestic industry in the modern day. But if there is one thing that Germany has done right, it's invention. Tanks, Anti-aircraft, Planes, Anti-Tank, the list goes on and on. We have pioneered in almost every field throughout history, and we continue to do so today. We must continue this as we move forward on the path towards the future. With the possibility of war growing with each passing day, we need to get the technological edge now more than ever. We will invest in research and development more than we ever have before, and our military technology will be admired by our allies, and feared by our enemies!"
 GER_assure_our_nato_allies: "Assure Our NATO Allies"
 GER_assure_our_nato_allies_desc: "With the United States in a terrible civil war, all NATO members have been looking at each other with silent judgement, rather than with trust and camaraderie. They look at us, especially. Some see us as weaker than our fellow member nations like Poland, France and Italy. This is absolutely ridiculous and has gone on for far too long. Europe calls on German strength once again, and we must answer. Unfortunately, we cannot if our allies do not believe in us. We will assure them all that we are up to the task of defending Europe."
 GER_conceptualize_an_european_army: "Conceptualize a European Army"
 GER_conceptualize_an_european_army_desc: "Europe has been disunited for too long, too focused on petty differences to see the bigger picture. Russia fears a united Europe, because they know that when we unite as one entity, they can do nothing to stop us. But unfortunately, some fail to see that when we are united, we are practically unstoppable, possibly even stronger than the United States. To begin the first steps of unification, we will conceptualize a unified command that has supervision over all EU armed forces, a great defensive force against any foreign aggression. In any coming war, this cooperation will be crucial."
 GER_the_turkish_gamble: "The Turkish Gamble"
 GER_the_turkish_gamble_desc: "Increasingly we fear that Erdogan takes Ataturk's adage: "Peace at home, peace in the world." To heart excessively, and that he does not realise the danger posed to all of us west of Minsk. Appeasement of his concerns in order to ensure Turkey will honour its agreements, not only for Europe but for the sake of the Turks as well, as without NATO it is as if Erdogan would catch his people in a Russian trap. The crossroads of west and east must remain firmly within the influence of its westerly friends."
 GER_commit_to_baltic_defense_plans: "Commit to Baltic Defense Plans"
 GER_commit_to_baltic_defense_plans_desc: "The Baltics are our most vulnerable allies. From Estonia to Lithuania, these small but strategically important nations are surrounded on most sides by Russia or its allies. Especially the sea to their west, the Baltic Sea. The Baltic Sea would be under near constant threat of Russian incursion if war were to occur. The Russians could starve them out with a blockade or invade through the sea with their navy if they so desired, with the Baltic nations being able to do little to nothing to stop the Russian bear. We must never allow this to happen, the Baltics must not be allowed to fall, and our defense of the Baltic sea must be prioritized."
 GER_commit_to_black_sea_defense_plans: "Commit to Black Sea Defense Plans"
 GER_commit_to_black_sea_defense_plans_desc: "The black sea is one of the greatest vulnerabilities of both Russia and our allies. This small body of water holds extraordinary strategic importance; if either Russia or us secured naval supremacy in the sea, it could be used to seize major ports on the Black Sea and to potentially threaten our or the Russian's oil supply. This means that control of this sea could help win the war, and could determine the fate of Ukraine. If war may come between the CSTO and NATO, it is crucial to maintain control of the Black Sea to protect Ukraine. We must commit to its defense over all else."
 GER_upgrade_eastern_european_defenses: "Upgrade Eastern European Defenses"
 GER_upgrade_eastern_european_defenses_desc: "The Baltics, one of the most exposed nations in Eastern Europe, and undoubtedly one of the targets of the Russians. They have fortifications, but like much of Eastern Europe, they are not prepared enough. Should Russia attack, the rest of Eastern Europe may fall to the Russian hordes. This is an existential threat to us, and is unacceptable. We will begin to upgrade the defenses of Eastern Europe as soon as possible. With this, Russian aggression will continue to be deterred and European democracy will continue to be defended."
 GER_pan_european_propoganda: "Pan-European Solidarity"
 GER_pan_european_propoganda_desc: "Europe, a continent that has long been divided by destructive wars, national splits, and petty nationalism. But, in the modern day, we have started to take the road towards unification of the continent. The members of the European union and NATO have been united by both kinship and a shared threat of the Russian bear. It is time for us to fully unite under one banner, the Pan-European identity must remain strong in the minds of our people, and with our promotion of Pan-European thought, it certainly will."
 GER_buy_the_tb2: "Buy the TB2"
 GER_buy_the_tb2_desc: "The Turkish Bayraktar TB2 is a cutting edge military drone produced by one of our allies. The Turkish Armed Forces have collectively been on the forefront of independent military research looking to step away from designs of the East and West and develop their own. Turkish insight is valuable, and putting in a few orders for some TB2 drones will not only bolster and ally, but bolster our striking capabilities and enable our engineers a better look at foreign drone construction."
 GER_fortify_the_polish_border: "Fortify the Polish Border"
 GER_fortify_the_polish_border_desc: "Poland, a nation that stands between the allies of Russia and our alliance. Poland is undoubtedly a target of Russia, but for too long the Polish defenses have not been sufficient enough. For too long they have been unprepared for the coming threat of Russian aggression. Poland is the direct avenue into NATO territory, and way too important to be unprepared for the initial Russian assault. To safeguard European democracy, we must construct more fortifications along the Polish border."
 GER_secure_the_suwalki_gap: "Secure the Suwalki Gap"
 GER_secure_the_suwalki_gap_desc: "The Suwalki Gap is a short distance between Kaliningrad and Belarus, the only nations that stand in the way of this gap are Lithuania and Poland. A well executed push through this short gap could very well cut off the Baltics from us, which would allow for the Russians to completely conquer the Baltics if a war were to occur. This cannot be allowed to happen, it would be a strategic loss for NATO and would empower the Russians. We must reinforce the fortifications on this gap to protect the Baltics from Russian aggression."
 GER_found_the_european_defense_army: "Found the European Defense Army"
 GER_found_the_european_defense_army_desc: "At long last, the decades old proposal is formalized, it was first proposed in 1952 but the goal then was to prevent a German rearmament, today? We are united again and looking East at the Bear. Europe must be ready, when these proposals were first put forward by France they were to defend Europe from the Soviet Union, and now as we put our proposal forward, it shall defend Europe from the resurgent Russia."
 GER_german_turkish_syrian_mission: "German-Turkish Syrian Mission"
 GER_german_turkish_syrian_mission_desc: "The Syrian Civil War reduced the Syrian state into rubble and ash, caused one of the worst humanitarian crises in human history, and helped foster the rise of ISIS. However, the war ground to a slow and grueling affair that many simply do not care for anymore. However, something truly odd has happened, fighting has started to ramp up again, and it has caught the attention of us and Turkey. We must take initiative and show solidarity by sending a Turkish-German humanitarian mission to Syria. This will not only help the people of Syria, but will help improve relations with the Turkish people."
 GER_support_kurdish_anti_terrorism: "Support Kurdish Anti-Terrorism"
 GER_support_kurdish_anti_terrorism_desc: "In Northern Iraq, the Kurds have set up a de facto independent state. Some dislike them, our Turkish allies, for example, view them with great suspicion. But, regardless, the Kurds have been invaluable in the fight against the Islamic terror in the Middle East now more than ever, especially with the resurgent Hezbollah that has been promoted by Iran. Because of this, it is in our best interests to send the Kurds some support to combat the terrorist menace in the Middle Eastern region."
 GER_aim_for_energy_independence: "Aim for Energy Independence"
 GER_aim_for_energy_independence_desc: "Germany has long imported most of it's energy, namely natural gas and oil, from the Russian Federation much to the chagrin of our allies, particularly the United States, who have seen it dependency as a lever for Russia to grab.\n\nNo longer.\n\nBy promoting synthetic oil production, imports from Romania, and creating our own reliable energy supplies, we can endure the next winter without Russian trade."
 GER_energy_autarky: "Energy Autarky"
 GER_energy_autarky_desc: "Germany is famous as a major global exporter of cars and machine tools. It also is a net exporter of electricity to several different countries, this however has caused quite a strain on ourselves and because of that we have no choice but to severely limit if not completely cut off our energy exports.\n\nOur importers might not be happy but we'd rather have that then have our citizens live in the cold dark."
 GER_look_for_alternative_partners: "Look for Alternative Partners"
 GER_look_for_alternative_partners_desc: "We've been close with the West and the Americans for quite a while but with the recent changes in global politics we must seek to fix broken relations with other countries such as Iran and Venezuela.\n\nFor too long have the Americans decided for us and with the looming threat of irreversible change it is better to prepare for the worst and form new partnerships to keep our resource stockpiles full through any future crisis."
 GER_expand_wilhelmshaven_refineries: "Expand the Wilhelmshaven Refineries"
 GER_expand_wilhelmshaven_refineries_desc: "Our refineries in Wilhelmshaven are some of the few domestic oil supplies we have, and thanks to the Saudi Arabian Civil War, we will certainly not be importing oil like we had been before. It would be foolish not to prop up and utilize these oil refineries in Wilhelmshaven. Oil is crucial to daily life and we need it for any chance to defend Europe, or for any chance to even drive our politicians to work. When we expand our refineries, we will continue forward on the road of recovery."
 GER_placate_the_russians: "Placate the Russians"
 GER_placate_the_russians_desc: "While our diplomatic relations with the Russians have become strained, to say the least, the Russians possess an unprecedented amount of money and raw resources that we would be foolish not to get a small piece of. While the Russians likely feel the same aversion towards us as we do them, they still remain open to having business relations with Europe. For the German economy to remain in a good position, it is in our best interest to at least reach out to the Russians and attempt to keep a healthy business relationship with them."
 GER_revitalize_the_autobahns: "Revitalize the Autobahns"
 GER_revitalize_the_autobahns_desc: "The Autobahns are an important and highly used highway system that has its access controlled by the German Government. Despite the significance of the Autobahns to German commerce and travel, it is so frequently used that it has fallen into a state of mild disrepair. But with conflict brewing in Asia and America, and the decrease in global commerce, we should use this intermission to start to uplift the Autobahns and get them back into perfect shape. Germany has been built off of clever engineering and great infrastructure, we must maintain this status that we have rightfully earned."
 GER_eurail_modernization: "Eurail Modernization"
 GER_eurail_modernization_desc: "The Eurail is used by millions to travel across the European continent; it's both accessible and useful. But, it is unfortunately falling behind the competition and starting to show its age. As the rails fall into disrepair, so does the public opinion of the Eurail as well. It is about time that this comes to an end. We will call for the European parliament to divert funding to the Eurail, and the Eurail will take back its place as one of the greatest railroad systems on the planet."
 GER_halt_nordstream_2: "Halt Nordstream 2"
 GER_halt_nordstream_2_desc: "NordStream 2 was supposed to be the second pipeline from Russia to Germany, supplying Germany with Natural Gas. This pipeline helped us, for a time, it provided the Russians with financial compensation and it provided us with that liquid gold that fuels every single facet of life in Germany. But, the Russians have started to act more and more aggressively as time has gone on, and now they are starting to threaten our allies; which is unacceptable! Given the rapidly declining diplomatic relations between us and the Russians, it's time to just give up on this project, pay our workers, and let them go home."
 GER_negotiate_with_opec: "Negotiate with OPEC"
 GER_negotiate_with_opec_desc: "Saudi Arabia has fallen into a devastating civil war. With no end to the war in sight, OPEC has lost one of its most important members, and is in a tough position. Along with this, their arrangement with the United States seemingly is going to be useless, as the nation is consumed by civil disorder and strife. Despite this, the remaining member nations of OPEC still control vast oil reserves that they are interested in selling. It is crucial to use this opportunity to our advantage and persuade them to reach a deal with us. With this, we will continue to recover from the oil crisis."
 GER_north_sea_oil_expedition: "North Sea Oil Expeditions"
 GER_north_sea_oil_expedition_desc: "The North Sea and the Baltic Sea have both been subjects of speculation in regards to how much oil they contain. But there is merit to the idea that the two seas contain oil. For example, the Polish struck oil in the Baltic sea some years ago, and now the B8 oil field makes up 3% of their oil production. Given this fact, it will be in our best interest to send out an expedition to the North Sea and the surrounding areas and search for oil. If we find oil in the North Sea, we will be able to continue to supply the German people with oil."
 GER_revive_the_german_coal_industry: "Revive the German Coal Industry"
 GER_revive_the_german_coal_industry_desc: "As the Oil Crisis rages on, we cannot afford to invest money we don't have into experimental and inefficient renewable energy sources like wind and solar power. Nuclear is certainly not an option either, history has proven that nuclear power plants are death traps waiting to kill people. That only leaves coal, and even though coal is not remotely close to a clean energy source, it is cheap and a well established industry in Germany. We must prop up the coal industry and expand it. With this, the energy needs of Germans will continue to be fulfilled."
 GER_the_green_alternative: "The Green Alternative"
 GER_the_green_alternative_desc: "Let's take the moral perogative and solve two issues at once, by expanding wind farms and solar fields throughout Germany, we will keep the environment clean while expanding our domestic energy resources. While this may mean temporary shortages as we shutter less clean power plants, it's worth it."
 GER_secure_eu_interests: "Secure EU Interests"
 GER_secure_eu_interests_desc: "The European Union has interests abroad and we would do well to keep them secure, trade deals for Rubber, Oil, and other vital material for civilian and military production have to be secured. Our diplomatic weight abroad has helped us not only secure this vital material for ourselves, but for the entire EU, we must think for our neighbors as well in these trying times."
 GER_invest_in_synthetic_oils: "Invest in Synthetic Oils"
 GER_invest_in_synthetic_oils_desc: "With the Arabian peninsula in flames, our supply of crude oil has been cut through like butter. Now, we face an energy crisis the likes of which Germany has never seen before. For any chance to recover from this crisis, we have very few options to choose from. One of our options, synthetic oil, is more effective than all of the rest. Synthetic oil, our lifeblood, is our only real opportunity to establish a domestic oil supply. We must absolutely invest in new synthetics companies, not just for the oils, but for the plastics and other materials too."
 GER_increase_the_oil_reserve_supply: "Increase the Oil Reserve Supply"
 GER_increase_the_oil_reserve_supply_desc: "Without oil, our army cannot fuel itself. Without oil, our people are left without the ability to sustain our economy. The modern world revolves around oil.\nWith the collapse of the Saudi state, the need for oil grows more by the day. This demand is simply something that our current reserve cannot handle right now. To combat this, we will expand our emergency reserve - every day counts in times of crisis."
 GER_rethink_free_trade: "Rethink Free Trade"
 GER_rethink_free_trade_desc: "While free trade has brought great prosperity to our nation for the past decades, the recent years have brought a tide of change to the global order. America is starting to tear itself apart, the fate of Asia stands on a knife's edge, and we must change too, lest we fall into the same instability that plagues the rest of the world currently. The old order of the world has been shaken up, and may soon fall. We must seriously reconsider free trade. Once we do, we will ensure that we will not fall along with it too."
 GER_support_the_manufacturing_industry: "Support the Manufacturing Industry"
 GER_support_the_manufacturing_industry_desc: "German Manufacturing has been the lifeblood of Germany since the first Adenauer Chancellory, our manufacturers have suffered as the stock markets plummet amid the pandemic and we must do everything we can to ensure our own markets do not crash, by diverting funds we can not just prop up but expand our manufacturing capabilities to meet the needs of our neighbors as well."
 GER_ensure_domestic_stability: "Ensure Domestic Stability"
 GER_ensure_domestic_stability_desc: "Stability on the domestic front has been a tenuous thing. We should give the BfV the greenlight to target protest leaders to at least temporarily stimmy the influx of protests from extremists and opposition parties.\n\nOur policies propping up and expanding our manufacturing will certainly pay off, and in time, the storm will stop on it's own."
 GER_bolster_the_service_economy: "Bolster the Service Economy"
 GER_bolster_the_service_economy_desc: "The global economy has been degrading at an unprecedented rate ever since 2020 began, and unemployment and poverty have skyrocketed in tandem. Now, with the Oil Crisis, those statistics have only begun to rise more. We must curb this rapid growth immediately, and to do this, we will fund service related jobs. Restaurant chains, hotels, and even more will be propped up by our nation. This will help lower unemployment and keep lower class families and people from going under for some time."
 GER_reverse_the_nuclear_phase_out: "Reverse the Nuclear Phase-Out"
 GER_reverse_the_nuclear_phase_out_desc: "Our phase-out of nuclear energy has been a complete and total disaster for our nation. Sure, we cannot deny that nuclear energy has wrought much destruction upon our planet, through terrible accidents such as Chernobyl and Fukushima. But, it's also important to recognize that these occurrences are not only rare, but often the cause of human error, design flaws, or lack of proper safety regulation, while we maintain the utmost safety in our facilities. Die Grünen won't admit this but Nuclear is both a powerful and reliable form of energy, and we must reverse this disastrous phase-out before it harms our economy more."
 GER_increase_renewable_subsidies: "Increase Renewable Subsidies"
 GER_increase_renewable_subsidies_desc: "Our Earth is being drained and its resources are being exhausted. The sheer chaos that has been brought on by a simple dip in oil exports is a prime example of this. Renewables, however, can't be exhausted like oil, don't fill our air with smog like coal, and aren't accidents waiting to happen like nuclear. As our final nuclear reactors get shut down, we will need more solar panels and wind farms to catch up to the hole left by the phase-out. Eventually, we will not only catch-up to the production of our old facilities, we will surpass them. With these sources of renewable energy, we will power our nation for generations to come!"
 GER_focus_on_flood_reconstruction: "Focus on Flood Reconstruction"
 GER_focus_on_flood_reconstruction_desc: "The Rhine Floods have devastated the cities that surround the river, millions of dollars of damage have been left mostly unattended by our government, which is completely intolerable. We cannot allow our most populated and industrial valuable cities to be harmed by these floods for any longer. We will dedicate ourselves completely to reconstructing the cities of the Rhineland. We will reconstruct not just for our industries, but for the good German people stuck in the carnage of the floods."
 GER_the_digital_revolution: "The Digital Revolution"
 GER_the_digital_revolution_desc: "It cannot be understated how important microchips have become to every single facet of society in the past few decades. Technology and all its aspects have been important to the world for all of history, but compared to today, technology has reached new heights in terms of importance. Our tech industry has fallen behind, and this will end now. For us to defend Europe and Germany, we cannot let this continue. We will increase our funding of tech startups and foreign experts exponentially, and we will catch up to the competition."
 GER_EV_subsidies: "EV Subsidies"
 GER_EV_subsidies_desc: "Gas vehicles have long been outdated beacons of a polluted past. They take in non-renewable oil, and then spit out smog that pollutes our atmosphere when they burn that oil. For too long, we have allowed electric vehicle companies to fall into the red and fall behind gas vehicles. Now, with the lack of oil supply, we have an opportunity to get people to buy more electric vehicles than ever. We will prop up the electric vehicle industries, and by extension, expand their production. And, with this, we will cover the new demand for vehicles."
 GER_sponge_cities_program: "Sponge Cities Program"
 GER_sponge_cities_program_desc: "Our cities along the Rhine have experienced issues with flooding from the Rhine during especially wet seasons, and it must be said, the Rhine is a very densely populated region.\n\nThese floods affect millions and it can't be allowed to go any further, digging ditches and making dikes won't do, we need to invest in making our cities spongier, what does this mean? We make them..softer, easily able to soak up water, our drains are always overwhelmed but if we utilized nature's natural ability to soak up water we could have a natural defense against flooding. Plant trees. More parks. Replace the current roads with permeable asphalt which will let the water pass. More green in our cities means less water in our people's homes! Wunderbar!"
 GER_a_green_future: "A Green Future"
 GER_a_green_future_desc: "Germany is a pioneer for Renewable Energy solutions, a great green future is ahead for not just Germany, but the world. Climate change is not only the greatest threat to earth, but the greatest threat to the future of humanity. Renewables will halt the harvest of oil and coal from the earth, preventing the air from being tainted by smog, and our rivers from being polluted by waste. The natural beauty of Germany is something to behold, and to destroy it by endlessly mining for finite resources is a disgrace. Green is gold and a safe future is a green future!"
 GER_lift_venezuelan_sanctions: "Lift Venezuelan Sanctions"
 GER_lift_venezuelan_sanctions_desc: "Venezuela sits on one of the richest oil supplies in the world. But, despite their massive supplies of oil, they face heavy sanctions from us and our allies. With the Oil Crisis raging on, we are faced with an economic crisis that threatens the livelihoods of our citizens and the wealth of our nation and for any chance to bounce back, we need to get oil by any means necessary. As the saying goes, desperate times call for desperate measures. We must lift sanctions on Venezuela and extend an olive branch to their government to get even a small slice of their massive oil supplies. If they accept our offer, then we will continue on the path of recovery."
 GER_back_the_arabian_republic: "Back the Arabian Republic"
 GER_back_the_arabian_republic_desc: "Since 1933, the nation of Saudi Arabia has been under the boot of the despotic rule of the Saudi family. But, times have changed, and the once invincible royal family has begun to crack. Those cracks soon turned into canyons as Saudi Arabia fell into civil war following the death of their aging king. But, this chaos presents an opportunity: a democratic Saudi Arabia. In the Saudi Civil War, there is a faction that shares our values. As one of the leaders of the democratic world, it is our duty to provide aid to these freedom fighters; not only for the oil, but also for the idea of a free Saudi Arabia."
 GER_the_armenian_gambit: "Azerbaijan Gambit"
 GER_the_armenian_gambit_desc: "Azerbaijan is close to Russia, but they possess a great deal of oil. It wouldn't be the first time we tried to go to Baku for oil but let's leave the rifles at home this time, we bring Euro's and well pressed suits! It's taking a big chance giving the CSTO even more leverage over us, but if it's what Europe needs, it's what Europe needs."
 GER_free_the_markets: "Free the Markets"
 GER_free_the_markets_desc: "For most of our modern history, regulations have only served to roadblock innovation and expansion. These laws and orders act like spider webs, ensnaring entrepreneurs and businesses in unnecessary bureaucracy and legal proceedings. And with the recent rise of China as the world's factory, we will soon be left behind unless we implement drastic changes. SPD and Die Linke will protest, shout, and scream, but they will be powerless to stop the inevitable. As agendas and goals pale in comparison to the very future of our economic strength."
 GER_negotiate_with_the_iranians: "Negotiate with the Iranians"
 GER_negotiate_with_the_iranians_desc: "The Iranian Oil industry is one of the world's oldest oil industries, and it is a cornerstone of their economy. While our Oil industry is small and inexperienced in comparison. We have had a poor relationship with the Middle East and especially the Iranians. But, like many of our former adversaries, we are going to have to bury the hatchet for the sake of ensuring our economic health. With a few messages and meetings to help smooth out our differences, we will surely reach an oil trade agreement with the Iranians."
 GER_a_united_european_vision: "A United European Vision"
 GER_a_united_european_vision_desc: "Europe as a unified state has long been considered insane. But with the fall of America and the rise of Russia as a threat, it is all too clear that Germany is nothing alone, France is nothing alone, Italy is nothing alone, but together? We are everything and more. Let's promote the vision of a truly unified Europe, someday it may come true."
 GER_baptism_by_fire: "Baptism by Fire"
 GER_baptism_by_fire_desc: "The last time Germany was in a conventional war was the Second World War, more than eighty years ago. Since then, a more pacifist attitude has gripped the nation, and the world believed that Germany was done with war, that the German armed forces would never again fight great battles on foreign soil.\n\nHow wrong they all were.\n\nIn the Baltics the Russians are trying to make their advance, and that's where we will show them. Together with our Baltic allies, the Russians will learn how big of a mistake it is to underestimate us."
 GER_operation_eisenhammer: "OPERATION: Eisenhammer"
 GER_operation_eisenhammer_desc: "In modern warfare, those who do not take the initiative will be swiftly destroyed by those who beat them to it, and it's about time we show the Russians that we do not wait. Operation Eisenhammer is our decisive strike against the massing Russians, and it is all very straightforward. Across the front in Belarus and Ukraine, a swift offensive will be executed with the support of accurate heavy self-propelled and rocket artillery batteries. Under attack from heavy bombardment and our coordinated infantry and mechanized forces, the Russians will be unable to keep their ground, no matter how many men they try to throw at us. With this we shall quickly push them back into the cold wastes of their country."
 GER_intensify_nighttime_sorties: "Intensify Night-time Sorites"
 GER_intensify_nighttime_sorties_desc: "Our superior thermal and night vision optics have improved our ability to attack at night, especially in the air, we must press this advantage and bombard positions ALL night, for as long as it takes!"
 GER_national_recruitment_drive: "National Recruitment Drive"
 GER_national_recruitment_drive_desc: "The Bundeswehr desperately needs new volunteers, let's up the pension and benefits, and provide a sign on bonus, and we'll promise them a good deal on a BMW..yes..recruits shall flood the offices soon enough!"
 GER_dust_off_legacy_equipment: "Service Legacy Equipment"
 GER_dust_off_legacy_equipment_desc: "A G3 is still a 7.62 firing gun, it is in fact a heavier round than the G36 or our newly adopted HK416 fires, a G3 kills just as well as any other gun in service. Start handing them out to the troops."
 GER_deliver_excess_equipment_to_ukraine: "Deliver Excess Equipment to Ukraine"
 GER_deliver_excess_equipment_to_ukraine_desc: "Ukraine greatly extends the Russian front and thereby opens a vulnerability both to the Russian Caucasus and to Moscow itself, we can exploit it but only if Ukraine doesn't fall apart. To ensure this, we should prop up their military."
 GER_mobilize_the_industry: "Mobilize the Economy"
 GER_mobilize_the_economy_desc: "With Germany plunged back into war, we no longer have the luxury of allowing business as usual within the country. Our military machine needs an economy to fuel it, and no more time will be wasted in assembling it. Workers will be trained, the industries will be mobilized, material will be set aside, and resources rationed. The business titans and the millions of hardworking and talented men and women running it will now use the resources and skills that made the German economy world famous to make the German armed forces the same. The Russians assume that we have no industry to support our fight, but they will quickly learn how wrong they were."
 GER_tank_in_ukrainian_refugees: "Take in Ukrainian Refugees"
 GER_tank_in_ukrainian_refugees_desc: "The war in the east has created a great humanitarian catastrophe that is spilling into western Europe. Hundreds of thousands of Ukrainians, fleeing cities now being pummeled by Russian rockets and artillery, have found their way into Germany. However, unlike some other states, we will welcome them in and more who wish to flee the violence. There will of course be the costs of accommodating these people in the country, but amidst these challenges there is a benefit. They will faithfully back those, and even fight for, anyone that wants to put an end to Russian expansionism. As we are always looking for more men and support in this fight, this will be something that we will quickly exploit."
 GER_final_operation: "OPERATION: [GLOBAL.get_poland_status]"
 GER_final_operation_desc: "[GLOBAL.get_operation_status]"
 GER_blucher: "Blücher"
 GER_khol: "Kohl"
 GER_oper_1: "FIGHT! THIS IS OUR FINAL CHANCE TO PUSH THE RUSSIANS OUT OF POLAND!"
 GER_oper_2: "We've got them on the run! Let this operation be the final nail in the coffin!"
 GER_oder_defense_initiative: "Oder Defense Initiative"
 GER_oder_defense_initiative_desc: "The destruction of the Wehrmacht at the Seelow Heights in 1945 sealed the fate for Berlin. The Bolshevik horde was allowed to march on and obliterate our capital.\n\nWe say: Never another Seelow. A line of defense across the entire Oder must be constructed. Not a single Barbaric Bolshevik shall ever step foot on German soil!"
 GER_convene_the_bundestag: "Convene the Bundestag"
 GER_convene_the_bundestag_desc: "The 2010s was a decade of mixed fortunes for our German nation and for the German people. We experienced a refugee crisis along with the rest of Europe because of the fallout from the Arab Spring, Europe faced a debt crisis that threatened to tank our economy, and we were faced with the demoralizing prospect of rising energy prices only getting raised higher throughout the decade. Despite all of this, we experienced an economic rebound, low unemployment, and experienced a huge amount of investments which fueled our positive growth. As another chapter of history closes and the 2010s pass us by, it becomes clear that we must convene the Bundestag. We have much to talk about after all, our economic agenda, energy efficiency, and the elections that are quickly coming up. We may even discuss that small outbreak of some sort of virus in China, but certainly it will be contained soon. We are looking forward to our future, and it is bright."
 GER_expand_our_nato_contribution: "Expand Our NATO Contribution"
 GER_expand_our_nato_contribution_desc: "NATO has always been a shield against aggression from the East, as the Soviets occupied our eastern lands and threatened the rest of Europe, NATO was there to protect us. But now, with our strongest member ripping itself apart, it is now up to the great powers of Europe to protect Liberal Democracy against the growing Russian threat to the east. Germany has been a key member of this great alliance for decades now, but our contributions to mutual defense have begun to fall behind the rest of our fellow nations. It is up to the German state to contribute more to the alliance than we ever have before. With America falling apart at the seams, it is now Europe's most desperate hour. It is crucial to now contribute fully to NATO; to not only protect our neighbors, but to protect Germany as well."
 GER_focus_on_domestic_issues: "Focus on Domestic Issues"
 GER_focus_on_domestic_issues_desc: "Domestically the CDU and the SPD have always been in a wrestling match over leadership, it is a friendly one and one with a great history of complimentary policy but like all great adversaries, as elections approach we are again fighting at the ballot box, whoever the people choose this upcoming election, it has the unique opportunity to usher in the new decade in a mew fashion."
 GER_defend_the_minds_of_the_youth: "Defend the Minds of the Youth"
 GER_defend_the_minds_of_the_youth_desc: "The Youth are our life blood, our future, the sons and daughters of a new era, and we know from history class the power of a new generation. It can topple democracies, strengthen them, it all begins in school and in the home. Malicious actors know this fact too and will always try to fill their ears with their venomous lies. They try to turn the youth into a generation of extremists who threaten our very existence. We must prevent this at absolutely all costs and give them the proper education about the dangers of extremism and the detrimental effects it has had on the German people."
 GER_scientific_breakthroughs: "Scientific Breakthroughs"
 GER_scientific_breakthroughs_desc: "Science is a cornerstone of German pride, going back centuries, nearly a millennium. Even today Germany is a great innovator in many fields of science and while in some places we have fallen behind no one will forget what we have accomplished, and no one will forget what we WILL accomplish."
 GER_establish_minimum_pension: "Establish a Minimum Pension"
 GER_establish_minimum_pension_desc: "Germany is well known for her social policies so it might surprise you to know we have no minimum pension, let's remedy that, the population know we'd never lower their pensions too much but..it makes them trust us more if we codify a minimum. Because of course, democracy is a fickle thing, if the right person were elected, they could fear for their pensions!\n\nNo more fear, only comfort for Germany and the German Elders."
 GER_strengthen_pro_union_laws: "Strengthen Pro-Union Laws"
 GER_strengthen_pro_union_laws_desc: "Our Unions are the first line of defense against exploitative business practices. They stand up to the greed of the business owners and they fight for the rights of our most important citizens, the lifeblood of the German economy: the worker. The worker makes our products and helps ship them out, without them, we are nothing. So why should they not get the treatment that their importance begets? Germany has had a history of maintaining worker rights, and we have sometimes been called a 'Worker's paradise.' We fully intend to keep that title as we move into the future, and we will do it by strengthening the unions."
 GER_burgergeld: "Formalize Bürgergeld"
 GER_burgergeld_desc: "The Bürgergeld is a proposed wage for unemployment, those who are unfortunately fired in this tumultuous time can find comfort that the taxes they pay come back into their hands in a time of need. Homeless Germans are a tragic sight and the last thing we want is empty homes and empty stomachs over a simply little economic downturn, let us formalize the Bürgergeld to ensure in future economic crisis we won't subject our poorest citizens to homelessness and poverty while they search for new work."
 GER_revisit_refugee_policy: "Revisit Refugee Policy"
 GER_revisit_refugee_policy_desc: "With the Saudi Collapse, we are receiving another wave of refugees from the middle east. Already the radical anti migrant AfD has pulled incredibly high votes for it's short life span due to the last influx and if we let another influx in they may only be bolstered further, it might be right to help these people but can our domestic situation withstand it? Let us convene the Bundestag, we have a heated few weeks ahead of us."
 GER_tackle_political_extremism: "Tackle Political Extremism"
 GER_tackle_political_extremism_desc: "The status quo must hold, the AfD cannot strongarm us old guard parties in submission, the CDU and SPD have stood against every party of it's like, the NPD, The ancient German Reich Party, since Adenauer we have stood against any kind of extremism, and that includes the cursed Die Linke, East Germany's shadow given flesh. Let the BfV tear into their affairs, with enough dirt we'll break their reactionary assembly as before."
 GER_anti_russian_bullwark: "Anti-Russian Bulwark"
 GER_anti_russian_bullwark_desc: "Germany once stood as an Anti-Bolshevik Bulwark, but in this modern era with the Soviet Union collapsed and the old rhetoric tainted, we can put a new coat of paint on it to reinforce our position in NATO, Russia is coming, whether Europe recognizes it or not, and Germany will be prepared with it's Eastern allies to confront the threat when it comes knocking."
 GER_putinversteher: "Putinversteher"
 GER_putinversteher_desc: "The Putinversteher refers to a clique of German politicians known to be sympathetic to Putin, among this clique most prominently is the former SPD Chancellor Gerhard Schröder, some may even call him the architect of this cliques formation, regardless, by caving to them we can achieve unique economic access to the Russian market despite allied sanctions, it may not seem smart to everyone but to us? We simply listen to Bismarck.\n\n\"The secret of politics? Make a good Treaty with Russia.\""
 GER_invest_in_defense_contractors: "German High Tech Industry"
 GER_invest_in_defense_contractors_desc: "Europe's dependence on external semiconductor supply chains has shifted from an economic inconvenience to a strategic liability. With production in East Asia disrupted and American capacity absorbed by internal instability, access to advanced chips can no longer be taken for granted. Without secure semiconductors, modern industry grinds to a halt: vehicles, energy grids, communications, and military systems all rely on components measured in nanometers.\n\nBuilding a domestic chip ecosystem will require long-term investment, technical expertise, and close coordination between research institutions, manufacturers, and the state. Foundries do not appear overnight, and mistakes will be costly. Yet the alternative, permanent reliance on fractured foreign suppliers, is worse. By committing resources now, Europe can regain control over a technology that underpins nearly every sector of its economy and ensure that future crises do not leave its industries blind and idle."
 GER_call_for_european_unity: "Call for European Unity"
 GER_call_for_european_unity_desc: "Europe is in its most desperate hour. We are surrounded on all sides by authoritarian tyrants who wish to destroy the very ideas of democracy. Our greatest ally, the United States, is in no position to help us; too busy dealing with its domestic problems which has been allowed to boil over. Now, with the cards stacked against us, it is crucial more than ever to ensure that Europe remains strong in the face of the Russian Bear. Democracy dies in darkness, and Europe dies in disunity. We must be more united than ever against the common enemy to the east, lest we fail and let Europe fall into oppression."
 GER_aid_ukraine: "Aid Ukraine"
 GER_aid_ukraine_desc: "If the invasion of Crimea in 2014 has shown us anything, it showed us that Ukraine is in serious need of economic and military aid. The Russians have been only consolidating more and more soft and hard power in recent months. Their threats, whether performative or credible, have proven that they are aiming to attack Ukraine soon. The Ukrainian armed forces are still backwards, even today, and if the worst comes to worst, won't be able to defend themselves from a Russian attack. We cannot tolerate this, and must send as much aid as possible to the Ukrainians to strengthen their army and economy."
 GER_support_volt_europa: "Support Volt Europa"
 GER_support_volt_europa_desc: "Volt Europa is a Pan European Federalist organization, encompassing various parties in all EU member states by the name of Volt, they wish to see the EU federalized. This organization stands for liberal democracy and heavily aligns with the values that our nation has been built off of. In the face of a potential war with Russia, Europe must be as united as possible, and nothing could make Europe more united than a single unified state. It is for the best for our nation to openly support Volt Europa, with our support, perhaps their dream will come true and Europe will once and for all be united."
 GER_europe_united_strong: "Europe United and Strong"
 GER_europe_united_strong_desc: "Europe has always been a continent plagued by instability, war, and destruction. Despite that, Europe is also a continent of unbelievable beauty and indescribably rich culture. However, we face yet another obstacle which threatens to plunge Europe back into destruction and war. Russia. Russia is the antithesis to everything we have built, they want to tear down the beautiful cultures that make up Europe so that they can colonize their neighbors like the orcs that they are, they want to turn Europe into an oppressive hellscape, and worst of all, they are gaining strength every day. But, hope is not lost, there is a line of defense against the Russian threat: the European Union. We are now more united and stronger than ever. The Russians believe that they can invade our lands and brutalize our people, but they're wrong! Should they attack us, Europe will be ready."
 GER_align_to_the_right: "Align to the Right"
 GER_align_to_the_right_desc: "Germany is a nation exploited by foreign powers, it gains absolutely nothing from cooperation with the foolish policies of its neighbors, and only serves to show to foreigners that our traitorous politicians are complacent with letting their nation get pushed around and bullied. We share our economy with these nations and when one mismanages, we feel the effects! We let in thousands of migrants with 0 consideration to how it will affect the German people. All of this ridiculousness will end now. We will make sure that parties like AFD take power, Germany will no longer be the laughing stock of Europe, and it will stand taller than all of the rest!"
 GER_flame_anti_russian_sentiment: "Flame Anti-Russian Sentiment"
 GER_flame_anti_russian_sentiment_desc: "The Russian Bear mobilizes again, its vicious nature never contained. We were fed lies by these orcs that Yeltsin would make Russia a peaceful and democratic state, much like we are. But we were fools to believe them, we were fools to think that this nation which has plagued Europe in different forms for centuries could have ever chosen peace. No, the Russians are like Hyena's sitting on their rocks, looking for any sign of weakness; and when they see us faltering for a mere moment, they strike like the snakes they are. Soon, all of Europe will know that the Russians are murderers and deceivers, we will never let them trick us again."
 GER_fighting_the_pandemic: "Fighting the Pandemic"
 GER_fighting_the_pandemic_desc: "The COVID-19 virus has officially infected its first German citizen. Unfortunately, there is not much we can do about them now except pray for their good health and give them the proper treatment. However, it's not so bleak for the rest of the German people, not if we have anything to say about it, that's for sure. The virus must be stopped in its tracks before it can kill any more innocent people. We will lock down the country, give our people the means to protect themselves, and become a COVID free nation by any means necessary."
 GER_mask_requirements: "Enforce Mask Mandates"
 GER_mask_requirements_desc: "The mask. Our main tool of protection against COVID-19, this simple tool is used to keep Covid from infecting the millions of Germans who wear it, and by extension, keeps the nation safe. However, some people, for whatever reason, need extra convincing to protect themselves from a virus that is killing thousands across the world. It's almost as if they want to get infected. Because of this, we must make sure that every German puts their mask on, indoors and outdoors, to finally stop the spread."
 GER_fight_back_against_covid_narrative: "Fight Back against the Narrative"
 GER_fight_back_against_covid_narrative_desc: "The government's efforts to "stop the spread" are nothing more than a tyrannical exercise of power. Millions of our youth are stuck inside, forced to rot away on the computer when they are supposed to play and be outside on these beautiful days. The masks do far more harm than good, all they do is impair people's abilities to breath and damage people's minds as a result. All that the German people need to stop the spread of this manufactured virus is natural immunity, no vaccines or any other kind of medical jargon!"
 GER_support_querdenken_711: "Support Querdenken 711"
 GER_support_querdenken_711_desc: "Querdenken 711 are an anti COVID restriction protest group, they understand that these so called security measures are nothing more than a farce, only used to exert the government's tyrannical power over the good people of Germany. They very clearly have the right idea, and it is our duty to show them that we not only stand in solidarity, but we openly support their fight to end these authoritarian measures once and for all. It is our duty to support them."
 GER_crackdown_on_protests: "Crack Down on Protests"
 GER_crackdown_on_protests_desc: "As much as it is the people's right to get out there and protest against perceived injustice, we also have a deadly virus spreading around, and these protests do nothing but help spread it to more people across our nation and inevitably cause more deaths. Extraordinary times call for extraordinary measures, so it is our duty to disperse these harmful protests by any means necessary using all tools in our arsenal. The spread of Covid will stop, by any means necessary."
 GER_reopen_the_country: "Re-open the Country"
 GER_reopen_the_country_desc: "After months of turbulence, the cases of covid have gone down significantly, and the deaths along with it. It appears that the worst of COVID-19 is over at last. After such a long time of being closed off from the outside world, our economy has taken a slight hit, but it won't last long at all. With our economy and borders opening up once again, tourism has experienced a boom not seen in decades. Millions of Euros have been raked in, and we are certainly reaping the rewards now. With a little more tourism and trade, Germany will not only recover, it will flourish like it never has before!"
 GER_partial_rearmament: "Partial Rearmament"
 GER_partial_rearmament_desc: "After avoiding the truth for far too long, we must face reality. Despite Germany's dark past that has kept us from rearming, it is clear now that we would only have ourselves and the rest of Europe to rely on if the Russian aggression were to reach our borders. The democracies across the world are in a more dangerous position than ever before. Our greatest ally, the United States, is unable to come to our protection; and by extension, the strongest deterrent against Russian imperialism is now gone. Now opportunists smell blood in the water. It has become blindingly clear that in order to defend Europe from the coming threat, we must re-arm and prepare ourselves for a conflict with the Russians."
 GER_fuel_alternative_future: "Fuel Alternative Future"
 GER_fuel_alternative_future_desc: "The future is in fuel alternatives, be they nuclear or renewable, in a decades time we can be certain vehicles will run more and more on our robust and clean energy grid. No more shall coal drive forward our nations energy, and no more shall we rely on foreign imports of natural gas, we have natural, clean, green options for our people now. We have made the right choices for a clean future."
 GER_one_europe_one_vision: "One Europe, One Vision"
 GER_one_europe_one_vision_desc: "We have gone all over the world speaking on behalf of European interests, making trade deals all of Europe will benefit from, we have taken great lengths to bringing Europe closer together, tying it to Germany, and tying Germany to Europe. United in vision and in will we can accomplish anything! Especially now that we have acquired alternative partners on the world stage."
 GER_promote_public_transportation: "Promote Public Transportation"
 GER_promote_public_transportation_desc: "Public transportation is an energy efficient method for transport, and it's an iconic part of German cities, expanding it and promoting it's use cuts energy consumption and decreased traffic clutter. There are no downsides to this."
 GER_european_green_deal: "European Green Deal"
 GER_european_green_deal_desc: "What we do for ourselves we should do for Europe! Our push for renewables is wasted if only we do it! Let's spread a green deal to our economic partners, we will all benefit, cleaner air, cleaner Europe! Let us not forget the economic benefits! Sure this puts us last, however, what's good for Europe will eventually be good for us too!"
 GER_depression_recovery: "Depression Recovery"
 GER_depression_recovery_desc: "Before, our economy was starting to become a well oiled machine; a machine that generated wealth for the nation and the people alike. But, just when we thought that our economy was starting to grow, the pandemic immediately threw a wrench into that. The German worker is suffering, they are poor, out of the job, and have lost their investments nearly overnight. It is the duty of our nation to end this at all costs and recover. Through our programs, the German economy will not only bounce back, it will grow to heights never before seen in Europe."
 GER_defenders_of_democracy: "Defenders of Democracy"
 GER_defenders_of_democracy_desc: "The German people now have a new burden to carry, even if they don't realize it yet. With the United States facing never-before-seen domestic chaos, the mantle of responsibility to safeguard democracy from the dictators that surround us has fallen onto the German nation, and the German people themselves. We must live up to the legacy left by the United States, but we must also surpass it as well. We will not fall for the same mistakes that the United States did. Not only will we safeguard democracy from the Russian threat, we will make sure that we remain a beacon of liberty that will shine from every corner of the globe."
 GER_integrate_american_airbases: "Integrate American Airbases"
 GER_integrate_american_airbases_desc: "In what may be the most tragic event of the 21st century, America has fallen into an impossibly devastating and complex civil strife. This is absolutely terrible, but with all tragedies also comes opportunity. As America started to collapse, many soldiers were plucked out of foreign bases and sent back to defend their home in its time of crisis. Now, nearly every single American air base within our borders is empty. With America in chaos, they don't need these airbases anymore. However, as the threat of Russia grows by the day, it is clear that NATO needs them to defend Europe. We must integrate these empty air bases, they will not be left abandoned."
 GER_europes_darkest_hour: "Europe's Darkest Hour"
 GER_europes_darkest_hour_desc: "We drove them to the heart of Russia, we thought they were finished, we were wrong..."
 GER_arsenal_of_democracy: "Arsenal of Democracy"
 GER_arsenal_of_democracy_desc: "We are Europe's single largest industrial economy, thus it is our turn to take the mantle of Arsenal of Democracy, Raytheon is traded for Rhinemetall, Europe's nations shall look to Germany to make up for their shortages and we will answer their calls."
 GER_defenders_of_europe: "Defenders of Europe"
 GER_defenders_of_europe_desc: "Germany is one of NATO's most populace nations, it's richest now with the absence of America, we are expected to be the new shield of Europe. So we must try our best and rebuild our militarism from the ground up, militarism for liberty. Für Freiheit!"
 GER_bolster_bmvi: "Bolster BMVI"
 GER_bolster_bmvi_desc: "The Border Management and Visa Instrument is a Pan European customs agency, operating right at the border of the EU. Taking over the role of a customs agency in any standard nation, this organization unifies European economics into one constant body, yet, It has it's shortcomings. Let's bolster it so that Europe has a customs agency that can efficiently handle the sheer volume of incoming and outgoing trade."
 GER_empower_the_chancellor: "Empower the Chancellor"
 GER_empower_the_chancellor_desc: "The BfV works to ensure the German Constitution is defended. Alongside the BfV, the Chancellor works as well; they work to make sure that the German people have their rights protected and that they stay safe. But right now, our very society is threatened by malicious parties who want to work to not only restrict the rights of Germans, but to destroy the democracy of which our nation is built off of. This cannot be allowed to continue, and it pains us to take these measures. But, it is clear to us that some of these malignant organizations cannot be allowed to continue in German politics, so the best choice is to empower the chancellor and start banning them to safeguard liberty."
 GER_set_an_american_policy: "Set An American Policy"
 GER_set_an_american_policy_desc: "It seems that the internal struggles that have plagued America since the end of the Cold War have finally come to a head. Two governments, both claiming to be legitimate, have begun to clash with one another in bloody civil war. But, the situation is more complicated than any of our analysts could have predicted; from New England to California, anarchy reigns as radical militias, gangs, and state governments fight for control of their states, and possibly the entire country. This horrific situation has now birthed a simple question: Who do we support? Time is of the essence, and we must decide now which government is legitimate in this civil war, if any."
 GER_germany_first: "Germany First"
 GER_germany_first_desc: "For too long, we have prioritized the interest of foreign nations instead of the interests of the German people. We have bogged down our economy in endless trade deals that attach us to ticking time bombs of mismanaged economies. German people are getting poorer and poorer while the elites at the top who benefit from these deals get richer and richer. Our incompetent politicians refuse to do anything about this because they are too busy going to thousands of foreign meetings. Sure, our allies may struggle, but so do we. And how can we ever hope to take on the Russians if we are unable to even take on our domestic issues? We can't. We must not allow our nation to fall into disrepair and strife because of this. We must make sure that Germany comes first in all affairs!"
 GER_restore_bundeswehr_pride: "Restore Bundeswehr Pride"
 GER_restore_bundeswehr_pride_desc: "For far too long, the Bundeswehr has faced global ridicule for its small size and poor funding. The pride and confidence of our people in our armed forces are at an all time low. This will end today, we will no longer allow the Bundeswehr to be the laughing stock of Europe and the world. Our people deserve to be proud of their army, they need to believe that we can defend Europe from the Russian threat. We will do everything we can to restore the pride of the Bundeswehr, they will know that our army is strong and will protect them."
 GER_common_agrigultural_policy: "Common Agricultural Policy"
 GER_common_agrigultural_policy_desc: "Europe must work towards a common agricultural policy, for the good of our palates and our farmers, agriculture should be a streamlined process across all our nations. For too long, the farmers have used pesticides that have had terrible effects on the health of the ecosystems of Germany, we will limit these soon. A healthy environment means healthy crops and animals, even if the farmers initially disagree, they will see reason once these changes start coming in. Germany will be a bastion of healthy and green agriculture to all of the world; a nation of healthy people, and by extension, happy people."
 GER_deal_with_visegrad: "Deal with Visegrad"
 GER_deal_with_visegrad_desc: "The Visegrad Group often find themselves to be the root of the Eurosceptic movement, feeling underserved by the E.U. and acting as a Union within a Union, we can do more to make Poland and the whole Visegrad Group feel welcomed and well served, let's start by getting them on the Euro, luckily their currencies aren't strong nor branded with the face of a monarch, so we might actually convince them."
 GER_balkan_diplomacy: "Balkan Diplomacy"
 GER_balkan_diplomacy_desc: "The Balkans are a strategic and resource rich region. Despite the political chaos the region faced following the dissolution of the Soviet Union, the potential that this area carries cannot be understated. Romanian oil, for example, these underused resources could be absolutely crucial to ensure the future of Europe and Germany if the worst case scenario happened. To obtain these resources, it is very important to improve our relations with the countries in the Balkans, and get the diplomatic edge over the opportunist Russians. Wars are not just won through brute force and steel, they are won through diplomacy and mastery of the art of conversation."
 GER_tackle_traffic_light_coalition: "Undermine the Traffic Light Coalition"
 GER_tackle_traffic_light_coalition_desc: "The The Traffic Light Coalition of the SPD, FDP, and Die Grünen, have been an ever present thorn in the side of the CDU. After years of nothing but annoyance for the German people, we have had enough. This coalition must be broken up as soon as possible. There are many options for how to break up this pain in our behinds. We could break up their coalition by offering its components a better deal than the SPD can, or just swaying the SPD into our coalition outright, sinking the rest into electoral obscurity. Either way, the traffic light coalition will fall into the trash bin of history when we are finished with them!"
 GER_eu_economic_integration: "EU Economic Integration"
 GER_eu_economic_integration_desc: "Through the creation of the BMVI or in full 'Border Management and Visa Instrument' we will be able to closer integrate the E.U. Economies, the organization maintains a common customs border along the Unions external border, all trade entering the European Union will thus go through customs at the port of entry to the Union, forgoing individual national customs agencies."
 GER_support_caucasian_independence: "Caucasian Diplomacy"
 GER_support_caucasian_independence_desc: "After Medvedev's invasion of Georgia in 2008 and the prior Abkhazian wars after the fall of the Soviet Union, Georgia has been the focal point of contention against Russia in the Caucasus region, even nations such as Armenia and Azerbaijan have not been wholly obedient to the Russians either. Like many have said before, wars are not just won through the bullet; they are won through the spoken words and the ink of a pen. We should attempt to reach out to the Caucasian nations. If we do this, perhaps we will gain their trust and loyalty."
 GER_russo_german_trade_deal: "Russo-German Trade Deal"
 GER_russo_german_trade_deal_desc: "Russia and Germany have enjoyed relatively friendly trade relations since the Schroeder Chancellory, there's no reason in this time to rock the boat with Russia, our ties can surely keep Russia and the E.U. at peace. We can help one another. By circumventing the sanctions that plague Russia we can acquire exclusive access to vital resources we may not have enough of, like the precious GAZPROM and it's titantic oil supply, but also other raw resources."
 GER_improve_the_eurocopter: "Improve the Eurocopter"
 GER_improve_the_eurocopter_desc: "The Eurocopter like the Eurofighter was formed in conjunction with several nations research in Europe as a universal air vehicle for use in a broad range of applications. From medical transport to law enforcement, to even military operations, the Eurocopter is truly an all-in-one aircraft. But, like all things, it needs an upgrade. The Leopard 2 has undergone several upgrades and it is now time for us to release an upgrade for our Eurocopters."
 GER_tackle_corporations: "Tackle Corporations"
 GER_tackle_corporations_desc: "Throughout German history, the corporations have been behind much of the political corruption and inequality that has permeated within the German nation. In their endless goal for profits, they have used any and all means to ensure that they make as much money as humanly possible. The human suffering wrought by this is immense and indescribable; and, it must be stopped. We will make sure that the corporations not only give back to us, but give back to the people they have for so long exploited with their power and wealth. The German people will prosper!"
 GER_protect_the_german_economy: "Protect the German Economy"
 GER_protect_the_german_economy_desc: "The German economy is still considered among the strongest or the strongest in the European continent as a whole.The war against the Russian hordes has left our economy along with our nation in a vulnerable spot, we must solidify control and protect our economical prowess by any means we currently have at our disposal and act."
 GER_prepare_for_new_decade: "Prepare for the New Decade"
 GER_prepare_for_new_decade_desc: "With almost all of Europe's foes and hardships just about wrapped up, we must prepare ourselves and embrace the future that lies before us and return to normalcy. To do that we must first de-mobilize our wartime economy and return to consumerism and prioritize it's revitalisation and development"
 GER_invest_in_automation: "Invest in Automation"
 GER_invest_in_automation_desc: "As we slowly begin marching into a new era of our nation, we also must prepare our industrial heartlands for the future. We'll begin investing in development of automated machinery to all our industrial sectors and factories, eliminating the need for human dependence and workforce, and with it improving our production capabilities and efforts as a whole."
 GER_ai_development: "AI Development"
 GER_ai_development_desc: "Artificial Intelligence will be the cornerstone to carve the new pathway forward in our new era for decades to come, both in corporate and military development. We must spearhead the development of AI and be one of the first of many countries that'll dominate the technological fields"
 GER_expand_broadband_infrastructure: "Expand Broadband Infrastructure"
 GER_expand_broadband_infrastructure_desc: "The importance of our Broadway infrastructure cannot be underestimated, as it provides fast speed internet and communication over large ares of our country. We'll kick start the construction and expansion of our infrastructure with the goal of providing more communities in rural areas with reliable, fast internet access, enabling better connectivity for education, healthcare, business, and personal use."
 GER_walkable_cities: "Walkable Cities"
 GER_walkable_cities_desc: "Walkable Cities are a thing Europe is famous for, and especially Germany, let's improve upon the idea increasing public transport and access to amenities by foot, we'll reduce emissions, fuel consumption, and increase the happiness of our people! Who doesn't love a relaxing walk to the bakery, ja?"
 GER_industrial_modernization: "Industrial Modernization"
 GER_industrial_modernization_desc: "In this new age we are undergoing a new Industrial Revolution, as automation begins to replace human operated machinery, engineers and technicians become more important to the sustainable operation of these robotic factories, let's promote trade schools and give subsidies to those seeking education in robotics, their field will become important as Automation continues to grow along with them."
 GER_computing_research: "Computing Research"
 GER_computing_research_desc: "Computers and Computing research as a whole plays a pivotal role to ensure the nations development of artificial intelligence, cybersecurity, and data analysis. We'll expand the research wings and improve efficiency and develop innovative solutions that impact various fields and industries."
 GER_german_edgenuity: "German Ingenuity"
 GER_german_edgenuity_desc: "German Ingenuity is written in the history books, hundreds of inventions, thousands of inventors, science going back centuries, we invented the rocket and we will reinvent the wheel if the moment calls for it. The world knows of our Ingenuity, and we would do well to keep German synonymous with Quality."
 GER_expand_consumer_market: "Expand the Consumer Market"
 GER_expand_consumer_market_desc: "Germany is the largest economy in Europe and the one of the largest in the world, with a diverse consumer base and a famous emphasis on quality. By embracing E-commerce and new export opportunities, we can not only expand our consumer market but also adapt to changing consumer preference and global trends."
 GER_engineering_marvel_of_europe: "Engineering Marvel of Europe"
 GER_engineering_marvel_of_europe_desc: "Germany is often regarded as the engineering marvel of Europe, with major companies like Volkswagen, BMW, Bosch, and Siemens known for their innovation. Through investment in emerging technologies, modernizing engineering curricula, and strengthening our global partnerships, we can maintain and strengthen our status as an economic hegemon."
 GER_host_american_companies: "Host American Companies"
 GER_host_american_companies_desc: "A plethora of American companies have expressed interest in moving operations partially or entirely to our nation, with major telecom companies such as AT&T and aerospace manufacturers like Lockheed Martin having reached out to us. With our skilled workforce and opportunities for new partnerships, we can make favorable customs arrangements and tax breaks to improve trade efficiency of American companies operating in Germany."
 GER_work_with_technocrats: "Work with Technocrats"
 GER_work_with_technocrats_desc: "Collaborating with technocrats-professionals who make decisions based on technical expertise rather than merely political affiliation-would enhance innovation and strengthen our economy. We'll appoint technocrats to key advisory positions and encourage joint projects between government agencies and private sector companies to improve efficiency and reaffirm evidence-based decision making through expert insights."
 GER_invest_in_bio_fuels: "Invest in Bio Fuels"
 GER_invest_in_bio_fuels_desc: "As well as reducing greenhouse gas emissions, investing in biofuels will diversify our energy sources and create jobs in agriculture, production, and technology development, fostering innovation. In addition, this will allow us to reduce waste and promote resource efficiency. We'll set a 10% minimum percentage of biofuel usage in transport, subsidizing biodiesel and Fischer-Tropsch fuels in a program that will increase domestic production. "
 GER_harness_power_of_atom: "Harness the Power of the Atom"
 GER_harness_power_of_atom_desc: "The research of nuclear fission is important for our country in particular, especially in the context of energy policy, where breakthroughs in such an area would result in massive innovation and many jobs being created. We will allocate funds specifically for nuclear fission research, partnering with research institutions and universities to foster education in nuclear science and engineering. Nuclear fission would provide us a stable and reliable energy source, diversifying our energy sources and reducing our reliance on energy imports."
 GER_renew_worker_contracts: "Renew Worker Contracts" 
 GER_renew_worker_contracts_desc: "When the European war began, many wondered who was going to defend Europe from the Russian menace. Many today think that the main heroes were solely the soldiers on the frontline and the thousands more who work in the Bundeswehr. While those brave few are heroes, they were not the only ones who contributed to the war effort. Just as much as the soldier, the worker in the factory contributed to the defense of Europe. With their blood, sweat, and tears, the workers on the homefront produced munitions to supply our troops in Eastern Europe; and with their efforts, we came out on top. We must not let them fall to the wayside of our economic efforts, we must renew their contracts and let them keep working."
 GER_expand_eus_reach: "Expand the reach of the EU"
 GER_expand_eus_reach_desc: "In many ways, the European Union is simply an extension of German state power, as we form its economic center. It follows that what is good for the expansion of the EU is good for the growth of Germany. We will use our influence in the federal institutions to intensify the reach of the union, and cement our position as its ultimate master."
 GER_unify_our_goals: "Unify Our Goals"
 GER_unify_our_goals_desc: "The greatest weakness of democracy is division. Democracy is at its weakest when politicians choose petty arguments instead of aiding the people. This has done nothing but prove to dictators that democracies do not work, and given them ammo for propaganda. Look at America, its divisions and petty arguments have driven them to start ripping each other apart like animals. Now, Europe is left to its lonesome to face the Russian bear. We cannot let this happen to us, and we surely cannot leave our former allies in Europe to face the Eastern Menace alone. Some may ask what the solution is, but it's really quite simple: unite. We must unite our parties and set common goals to make sure that the future of Germany is as bright as possible!"
 GER_socialisms_second_chance: "Socialism's Second Chance"
 GER_socialisms_second_chance_desc: "With the recent victory of Die Linke in the German federal elections, memories of the fatherland's division after the Second World War are returning to the minds of many of our citizens. Some see this as the final culmination of Ostalgie, or the yearning for the old German Democratic Republic. Others think Die Linke is a product of 1968 and the West German New Left, the final victory of Rudi Dutschke's long march through the institutions.\n\nWhatever prejudices some may have, we will use our new mandate to receive the worker's movement. We will show that socialism can be built in a united and democratic Germany. Vorwärts!"
 GER_anti_poverty_initiative: "Anti-Poverty Initiative"
 GER_anti_poverty_initiative_desc: "Our country faces ongoing challenges related to poverty despite its strong economy. Implementing grants and low-interest loans to support small businesses in low income areas and developing public employment initiatives in underserved communities will allow individuals access to critical training. Increasing investment in social housing projects will ensure lower-income families affordable and quality housing, not only addressing the immediate issue but promoting long-term social equity."
 GER_empower_the_unions: "Empower the Unions"
 GER_empower_the_unions_desc: "We need to empower the unions and strengthen their role in the workplace to aid our economy. We will enact laws to protect workers rights to organize, strike, and collectively bargain, enhancing labor unions to negotiate better terms for their members. Encouraging unions to participate in political advocacy and job security measures will allow us to improve social cohesion and job satisfaction, and reduce income inequality."
 GER_tax_the_rich: "Tax the Rich"
 GER_tax_the_rich_desc: "By imposing high dividend taxes we will ensure that money circulates rather than being concentrated in the hands of the privileged minority. This is one of the measures we're willing to take to ensure a more egalitarian society, even though it might invoke the wrath of the few and draw back investments."
 GER_work_with_private_initiatives: "Work with Private Initiatives"
 GER_work_with_private_initiatives_desc: "The private sector is a major source of employment, boosting local economies and creating new jobs. Through public-private partnerships, we will be able to cooperate with these initiatives to facilitate the development of infrastructure, technology, and services. The government can provide grants or incentives for these private companies to invest in research and development. As economist Dr. Warren Pratt famously said, "Private enterprise is the engine of our economy.""
 GER_broaden_the_bmf: "Broaden the BMF"
 GER_broaden_the_bmf_desc: "A free market is an unstable market. Without governmental interference, the economy of our nation would be sent down the gutter in a handbasket. If we let the market balance itself, monopolies would form, people's livelihoods would be taken away from them, and most worrisome of all, the government's influence may falter. By expanding the BMF, we can hold a tighter grip on the economy, to ensure our government's stability and control."
 GER_create_the_nwp: "Create the NWP"
 GER_create_the_nwp_desc: "Like so many people before us have dreamed of, the countless greats and political giants who laid the foundation of this economic theory, the formation and realisation of this economic theory will be a long and arduous process. However, we are prepared to face any challenge, be it the short sighted fools within our populous or any unexpected response from the market. This is a new century, a new era for the world and Germany, where the new must replace the old."
 GER_the_sunflower_over_germany: "The Sunflower Over Germany"
 GER_the_sunflower_over_germany_desc: "A new day is dawning across Germany. Following our recent victory in the Federal elections, we stand ready to tackle the problems of the 21st century. The CDU's grasp on government has finally withered away, and with them receding into the background, we finally have a chance to take their place. Rampant consumerism and environmental destruction have plagued our country for far too long. Now, the seeds of our victory have sprouted across the country, and a new day is dawning. One where pollution and degradation will be replaced by renewal and rebirth, and Germans will once again be able to take pride in the natural beauty of their country."
 GER_promote_equality: "Promote Equality"
 GER_promote_equality_desc: "Despite the successes that have been made in the past, poisonous ideas of hate, bigotry, and intolerance still plague our Fatherland. More often than not, the CDU was apathetic to the rise of hate, but we will not. Now that we grasp the reins, we will do away with the stagnation and apathy that was allowed to grow for so long. The stem will root out hate and intolerance. And in its place, equality and coexistence shall grow, blooming like sunflowers to mark the dawn of a better tomorrow."
 GER_fight_consumerism: "Fight Consumerism"
 GER_fight_consumerism_desc: "Ever since the beginning of globalization, rampant consumerism has plagued Germany like a web of poisonous vines. These trends, sales, and flashy displays have made our citizenry addicted to endless spending. Fueled by unchecked capitalism and corporate greed, factories endlessly pollute our skies with microplastics and carcinogens. Under our guidance, the stench of rampant consumption will be cleansed from the Fatherland, and the natural beauty of our nation will be restored once more."
 GER_tackle_pollution: "Tackle Pollution"
 GER_tackle_pollution_desc: "The beautiful landscape of our Fatherland is decorated with litter and our blue skies darkened by industrial ash. We will deliver a direct blow by fining any man, woman or business that dares to partake in this unscrupulous behavior. Not only that, but sustainable approaches to industrial production will be rewarded with generous tax breaks."
 GER_accelerate_the_nuclear_phase_out: "Rehabilitate Nuclear Power"
 GER_accelerate_the_nuclear_phase_out_desc: "The greatest shame of our party's history has always been our hardline ant-nuclear stance. Our fears, misguided by nuclear incidents such as Chernobyl, have blinded us to all the great things the energy source has achieved. Now is the best time for us to swallow our pride and accept that nuclear is the future of the fatherland. Many of our die-hard supporters will be alienated by our sudden shift, but it is ultimately the path we must travel to ensure a green future for our nation."
 GER_invest_in_renewables: "Renewables Construction Program"
 GER_invest_in_renewables_desc: "With the final swing of the wrecking ball, Germany's nuclear power plants have at least been decommissioned. In their place, a better and safer green energy system shall rise. Like our American allies, we will embark on a Green New Deal. Dams will be refurbished, solar panels constructed, and windmills funded. Working in tandem with local governors, green energy shall spread across Germany like a great filter. And while this will exhume a heavy cost onto us, it is ultimately necessary for the health and safety of our nation."
 GER_further_the_green_new_deal: "Further the Green New Deal"
 GER_further_the_green_new_deal_desc: "Under the guidance of our party and with careful cultivation, the Green New Deal has not only succeeded but exceeded our expectations. Where there were once smokestacks and oil derricks, now plants sprout and flowers bloom. But why stop at simply green energy? Why not go even further? Electric cars, high-speed rail, sustainable cities. No ideas will be discouraged. Under our care, not only has Germany begun to thrive, but it has also blossomed. And we shall be the ones to spread the green revolution all across Europe until the entire continent is free from ecological degradation and pollution."
 GER_the_red_rose_over_germany: "The Red Rose Over Germany"
 GER_the_red_rose_over_germany_desc: "The world, and Germany, stand on the brink of disaster. The scars of COVID have barely begun to heal, yet we now face a new era of instability. An oil shortage, stock markets collapsing, and the unraveling of the liberal international order. In such a time, the people mustn't be abandoned to the whims of the free market. Now that we head the Federal Government, the SPD will uphold its promises to shield workers from economic uncertainty, and will expand the German welfare state to ensure that prosperity isn't just for a privileged few. Our people-oriented policies will certainly guide Germany through the coming storm. Social democracy will bloom in Germany once more, and stand resilient against the coming crisis."
 GER_expand_welfare: "Expand Welfare"
 GER_expand_welfare_desc: "The Social Democratic Party has long championed the principle that a strong welfare state is not just a moral duty; it is economic necessity. As we continue our fight for a more just Germany, we must expand the reach of our social programs. Our mandate is strengthening pensions, improving healthcare access, and ensuring no German man, woman or child is left behind. Though our critics will call these measures excessive and unsustainable, history shows that social investment yields prosperity for all."
 GER_economic_stabilization: "Economic Stabilization"
 GER_economic_stabilization_desc: "With the Frankfurt Stock Exchange crashing in the aftermath of America's collapse, and the Oil Crisis straining the energy supply of the whole bloc, Germany and Europe must act decisively to handle this new turmoil. The Bundesbank is ready to intervene, and stimulus measures meant to shore up industries vulnerable to recession are being drafted as we speak. While some advocate for aggressive government intervention, most others warn of excessive state action. The government will balance stability with sustainable growth. Failure to do so could turn this crisis into a catastrophe."
 GER_increase_federal_income: "Increase Federal Income"
 GER_increase_federal_income_desc: "A larger welfare state and public investment require greater funding. While some, like the Free Democrats, may resist higher taxes on the 1%, our people-minded governance demands fiscal discipline. By implementing a temporary tax hike, we will secure all the resources necessary to expand social programs, and thereby strengthen Germany's present and future. Though it may cost us some political goodwill, the stability and prosperity it provides to the German people will justify this short-term sacrifice."
 GER_integrate_the_refugees: "Integrate the Refugees"
 GER_integrate_the_refugees_desc: "Germany has long been a beacon for those fleeing war and hardship, such as the Syrian Civil War, the crises in Afghanistan and Congo, and at the start of the decade, hundreds of thousand of Yugoslavs who, eventually, returned to their homeland. But with new crises developing seemingly monthly, in America and Arabia, the number of asylum seekers will not be shrinking any time soon.\n\nRather than isolating these new arrivals, the government will take a bold approach: integrating them into society and the workforce, ensuring they become contributors to the German economy. Greater legal protections and welfare programs will provide the "new Germans" pathways to citizenship, and military reforms will offer new opportunities for those of them willing to serve their new homeland. This policy will no doubt face resistance from conservatives and reactionaries, but in these times of upheaval, Germany must stand by inclusion and solidarity. After all, what does it really mean to be German? It's time to redefine what it means to be Deutsch."
 GER_keep_the_rhine_red: "Keep the Rhine and Ruhr Red"
 GER_keep_the_rhine_red_desc: "The industrial heartland of Germany has long been the backbone of the nation's struggle for socialism. From the mines of the Ruhr-Region to the bustling cities of the Rhineland, generations of German socialists and communists have fought for better wages, stronger unions, and a just Germany. Now, as economic uncertainty looms and reactionary parties seek to undermine these victories of the workers, the socialist government will double down on our commitment to the working class. We will ensure that the red banner of the SPD continues to fly over the Rhineland."
 GER_raise_the_minimum_wage: "Raise the Minimum Wage"
 GER_raise_the_minimum_wage_desc: "No German worker should ever struggle to live with dignity. With rising costs and economic instability threatening the livelihoods of millions of middle and low-class citizens, the SPD will take decisive action, raising the minimum wage to ensure a fair pay for all. This reform is not just an economic measure; it is a vindication of our steadfast commitment to social justice. Further strengthening the welfare state and guaranteeing living wages for the workers will lay the foundation for an equitable society: one where prosperity is shared, not hoarded. Germany will prove once again that economic growth and social responsibility are far from being opposing forces, but show the world they are partners in progress."
 GER_the_invisble_hand_over_germany: "The Invisible Hand Over Germany"
 GER_the_invisble_hand_over_germany_desc: "Germany has been the heart of contemporary Liberalism, while the world plunges into madness a voice of sanity has to be chosen to lead Germany, a liberal voice, and there is no better people for the task than Freie Demokratische Partei, while others may disagree, their policies of control and market  manipulation have made our demise nearer than we'd like, and as such there is only one true path forward, and one guiding principle. the invisible hand of the market shall lead us to a sane greatness once more."
 GER_encourage_competition: "Encourage Competition"
 GER_encourage_competition_desc: "Competition brings innovation and plays a crucial role in regulating price. By financing small businesses we will defy the monopolization of the market perpetrated by larger companies and bolster the growth of minor players, thus creating a wider industrial landscape. Small and medium businesses used to be the bread and butter of the German economy until the "Worker's Paradise" forced them to shut up shop. Regulations and taxes work for established, massive conglomerates and foreign companies. Not so much for the local general store."
 GER_the_nation_of_innovation: "The Nation of Innovation"
 GER_the_nation_of_innovation_desc: "Germany has always been at the cusp of innovation, the world's greatest inventors were born here, some of the greatest scientists were born here, poets, musicians, engineers. Our military equipment is some of the most sought after surplus in the world, our Leopards proudly stock the armored units of tens of nations, our guns are heard around the globe, our diesel engines run in tens of millions of vehicles globally. We are the nation of innovation, a people who for centuries have done nothing but give new technology to the world. Like the rocket. Even in war we innovate."
 GER_expand_the_liberal_cause: "Expand the Liberal Cause"
 GER_expand_the_liberal_cause_desc: "Many in Germany are still unconvinced or even downright rebellious over our goals. The Greens, the SPD, many in the CDU, see our new wish to cut down on regulation and cut down on welfare to be tantamount to destroying the legacy of Germany dating back 80 years, but we are not afraid of this, we hear the workers and we hear the businessmen, with every tax we slash we hear the cheers of a family with larger savings, with every regulation we slash? A new local business opens and becomes a staple that will last centuries. We are building a better Germany here, one for entrepreneurs, true lovers of the free market, not for the big conglomerates. An economy for all with the money to join it."
 GER_lower_the_taxpayers_burden: "Lower the Taxpayers' Burden"
 GER_lower_the_taxpayers_burden_desc: "Taxpayers pay massive shares of their income to the government just to pay for benefits they may rarely need to use, imagine the benefits if this money were back in the hands of the people, the sheer growth in the commodities market alone would make our economy jump into the stars. Benefits are all nice and well but let's be honest, how often do you put down the things you like because you don't have the money for them? We will give you that freedom. The freedom of fiscal choice."
 GER_freer_markets_freer_people: "Freer Markets, Freer People"
 GER_freer_markets_freer_people_desc: "Laissez-faire. This will be the main principle guiding our economic directive. We will reduce state interventionist policies to ensure we maintain a free market and that the people are the masters of their own will. Government overreach has stifled German economic development for decades, organic growth will come to us as foreign and domestic entrepreneurship engulfs our beleaguered markets."
 GER_digitalize_the_nation: "Digitalize the Nation"
 GER_digitalize_the_nation_desc: "Digitalization is the future, as much as you might like to write on paper, digital records keeping is cheaper, digitalization is generally cheaper, not just for the keeping of records but across the board. Cheaper isn't always good, but that's fine because this is also more efficient. Imagine the kind of bureaucratic streamlining there would be if all our on paper records and laws were easily accessible in an online database? No more need to have pen pushers shuffle through a cabinet just to get you a copy of your birth certificate two hours later."
 GER_the_status_quo_maintained: "The Status Quo Maintained"
 GER_the_status_quo_maintained_desc: "In spite of all the trials and tribulations of the last two years, the German nation has once again handed the reins in the firm, experienced leadership of the Union. With our Parliamentary Group on the Bundestag backing our government, we can continue guiding Germany along the course it has followed; preserving stability, safeguarding our institutions, and defending the liberal democratic order that has defined Germany since its liberation in 1945. After we conclude coalition talks, we will be in a position to implement our policies and keep Germany on the right track. Let us use this mandate wisely, and ensure the CDU and CSU continue to be the cornerstones of the Federal Republic."
 GER_the_status_quo_shattered: "The Status Quo Shattered"
 GER_the_status_quo_shattered_desc: "The liberal democratic order is fracturing. Though we have won the election, the Union's dominance is no longer assured, and we have been forced on a path we would have never even imagined before: cooperation or, God forbid, a coalition with the AfD. While we still hold the reins of government and are the senior coalition partner, our grip is slipping, and extremist voices are growing ever-louder and bolder. If we wish to maintain democracy, we must tread carefully, and navigate this increasingly populist political landscape while ensuring that the Federal Republic doesn't slip into chaos."
 GER_work_with_the_banks: "Work with the Banks"
 GER_work_with_the_banks_desc: "A strong Germany requires a strong banking sector. Through cooperating with the banks, we can ensure a continuous flow of capital into the economy, enhance investor confidence and propel development at a faster rate. With improved access to credit and more effective financial policies, we will see the growth of SMEs, industrialization, and infrastructure developments, laying the groundwork for a successful and reinvigorated Germany. Stability begins with economic security, and with the banks on our side, the nation as a whole is assured."
 GER_revive_the_ruhr: "Revive the Ruhr"
 GER_revive_the_ruhr_desc: "The Ruhr Valley, once the heart of our industrial might, has faced years of decline. Yet, its potential continues to be undeniable. By directing investment into the Ruhr's factories and infrastructure, we will restore its status as an powerhouse, bringing in new jobs, stability, and renewed confidence in the Union's leadership. A strong Ruhr means a strong Germany, and its revival will prove that our economic policies are much more than just empty promises."
 GER_attract_foreign_investment: "Attract Foreign Investment"
 GER_attract_foreign_investment_desc: "Germany's economy has always been built on trust. By depicting ourselves as a haven for investors, we will surely unlock a new flood of foreign capital to fuel our industries and modernize our infrastructure. Through incentives and strategic partnerships, we will be drawing in the world's wealth, accelerating industrial expansion and renewing our place at the heart of the global economy for the coming years. A prosperous Germany is one that investors cannot afford to ignore."
 GER_reaffirm_our_commitment_to_europe: "Reaffirm our Commitment to Europe"
 GER_reaffirm_our_commitment_to_europe_desc: "We must reaffirm our leadership within Europe, and our duty to ensure the unity and stability of the European project. By continuing our bonds with our greatest allies and openly welcoming cooperation, we will reaffirm Germany's position as the de-facto leader of the European Union. Yet, such commitments do not come without cost. Some still doubt at home, and euroskepticism grows in the rest of the EU too. Only the Union's leadership can ensure that our vision for Europe doesn't erode the people's trust in our leadership."
 GER_focus_on_germany: "Focus on Germany"
 GER_focus_on_germany_desc: "The time has finally come to turn our attention inward. For too long, both we and the SPD have prioritized the ambitions of Eurocrats over the well-being of our own citizens. By shifting our focus back to ourselves, we can restore confidence in the national leadership and reaffirm the people that they are our top priority. This decision wont be without controversy, but for the many Germans who-ve grown disillusioned with endless concessions in the name of integration, it is a long-overdue correction."
 GER_ensure_continued_democracy: "Ensure Continued Democracy"
 GER_ensure_continued_democracy_desc: "For many Europeans, Germany is a shining example of a successful western democracy and for good reason. Our institutions function well, corruption is low, civil and social rights are respected, and our elections are free and fair. This is a standing we take pride in, but one that we also must continue to uphold with vigor and dedication. Our institutions must remain airtight from coercion and corruption. Our politicians will abide by and support the rule of law. Our commitment to the European project must remain steadfast. We will reject the brutal authoritarianism and radicalism peddled by Russia and China wherever we can. This will not be easy, but our vision for this country is clear. German democracy must stand for years to come not just for Germany's sake, but for the continent's as well."
 GER_the_true_alternative_for_germany: "The True Alternative for Germany"
 GER_the_true_alternative_for_germany_desc: "The German people have made their choice. They have, after years of stagnation and decline, opted for a new course. One that frees them from compromises, weakness, and the failures of the establishment. After 8 long years of campaigning, Alternative für Deutschland has reached the highest echelon of politics in Germany, carrying with it a promise to restore order, sovereignty, and strength to the nation. The road ahead will be difficult; the establishment remains entrenched, and the elites will not go down without a fight. But, for the first time in decades, the German nation has a Federal Government that dares to put the German people first. Now, the real work begins."
 GER_revive_the_east: "Revive the East"
 GER_revive_the_east_desc: "The East has lagged behind the West in prosperity and opportunity for the better part of a century, and are AfD's undeniable bastion. Globalization and the unfulfilled promises of reunification have left much of the former Democratic Republic stagnating, its factories emptied and its people left behind. No longer. Under the AfD, the Federal Government will direct renewed efforts toward revitalizing East Germany's economy, creating new opportunities for its citizens and proving to them that, as long as we remain in power, Berlin will not neglect them. A new era of economic growth will be forged: one that puts Germans first."
 GER_support_western_industry: "Support Western Industry"
 GER_support_western_industry_desc: "While the East aches for reform, the West remains at the heart of Germany's economic strength. The Rhineland has been marred with overregulation and foreign competition, and the recent flooding, COVID pandemic and the lockdowns have turned the situation bleaker. We will make our home firms more resilient through cuts in red tape and Eurocratic directives, ensuring they can prosper and clearing the way for the West's economic comeback. A stronger Rhineland means a stronger Germany."
 GER_restrict_immigration: "Restrict Immigration"
 GER_restrict_immigration_desc: "For too long, unbearable amounts of immigration have placed a titanic strain on Germany's economy, social services, and national identity, turning our beloved Vaterland into a playground for foreigners. Our culture was disregarded, our values mocked, and our children made to feel like strangers in their own land; but the German people have finally decided to stand up for themselves. The Federal Government must, in their name, take bold steps to regain control over its borders, ensuring that those who come here can only come in a way that benefits the German economy. With the Bundestag behind us, we will enact firm measures to deport illegal migrants and failed asylum seekers, and redefine citizenship to preserve Germany's heritage and future. A stronger,  self-sufficient Germany for Germans begins with securing who passes the gates."
 GER_calm_down_the_radicals: "Calm Down the Radicals"
 GER_calm_down_the_radicals_desc: "Governing requires pragmatism, and in a coalition with the CDU, the AfD must temper its most hardline elements. Since our founding in 2013, we've struggled with bad optics, and men like Björn Höcke and his Der Flügel haven't helped much. Compromise will be necessary to solidify our mandate over these four years, ensuring that the Bundestag passes our legislation and that the Federal Government doesn't suddenly collapse under the weight of its own divisions. While some in the party may see this as a betrayal of our core principles, governing demands concessions. If we wish to steer Germany toward a new course, we must improve our image."
 GER_all_on_our_own: "All on our Own"
 GER_all_on_our_own_desc: "There will be no half-measures, no compromises, and no hesitation. The AfD has always stood as the bulwark against the globalists, both from the left and the right. Now, when we finally have the power, a centralized, unyielding AfD government is required to carry out our agenda to the fullest extent and end the chaos. That means pushing back against the CDU, securing our national sovereignty, and preparing Germany for any future crisis that may come. This is not merely a political movement: it is a revolution, and nothing will stand in our way. This is our time, we mustn't give in to the establishment now!"
 GER_germany_above_all: "Germany Above All"
 GER_germany_above_all_desc: "For the first time in what feels like ages, Germany has a Federal Government that truly puts Germany first! We will no longer be serfs to foreign interests and globalism, no more "Europe First". For too long, we have been bled dry by the Eurocrats in Brussels and spineless elitists too afraid to make a stand for their own country. Under our leadership, Germany will rise again, proud and unyielding. The German people will no longer: they will stand tall, ready to defend their Vaterland and their traditions. Let the world know it: Germany isn't going anywhere."
 #Post-NATO War
 GER_army_of_the_future: "Military of the Future"
 GER_army_of_the_future_desc: "The Bundeswehr proved that technological superiority, mobility, and reconnaissance, were the main components for our victory. We cannot become complacent, we have to continue to march and develop our doctrines even with the bears head on our mantle. The military is now prideful and the people support it. Garnering support for further modernization won't be nearly as hard now."
 GER_defend_the_land: "Defend the Land"
 GER_defend_the_land_desc: "We had a rough time holding ground in the early parts of the war. Reworking our tactics and strategic planning saved us from defeat as we found how to use armor defensively all over again. Learning how to modernize field fortifications to account for drones will go a long way in ensuring future offensives will be repelled with greater ease."
 GER_lessons_from_nato_war: "Lessons from the European War"
 GER_lessons_from_nato_war_desc: "The European War has taught us something we already knew, fighting on the Great European Plain is hell, but it taught us many other things too! Modern warfare is a balance of flexibility, technology, and resources. The most devastating optics and munitions require fine materials and precision manufacturing, the Russians had electronic warfare, they have reworked their armored doctrine, integrated drones, we were behind despite having newer guns, uniforms, armor. We were behind in doctrinal thought. The Russians taught us many things, and we hope the next lesson we can be the teacher."
 GER_mechanized_warfare: "Mechanized Warfare"
 GER_mechanized_warfare_desc: "Mechanized is an integral part of the future of warfare, we always knew this but nothing provided the proof more than war in Europe, foot infantry do not cut it alone anymore, too slow to avoid being overwhelmed if they cannot hold their positions, Mechanized lets our men be supported and be flexible on the field, ground can be easily given and just as quickly retaken with the right concentration of arms."
 GER_maneuver_wafare: "Maneuver Warfare"
 GER_maneuver_wafare_desc: "Mobility and Flexibility is the only thing that matters on the battlefield, your equipment can be fancy, new, sophisticated, without the right training you will be outmaneuvered by a smaller, poorly equipped force, that can move cohesively. The right equipment makes this easier, reliable long range communications, reliable vehicles, and integrated battlefield systems providing live updates to the battlefield directly into the hands of every squad leader. You get to know where you can maneuver and how with satellite aided reconnaissance. Each maneuver is planned by a network of information whose moving parts are tens of thousands of kilometers apart, but lead to precise maneuvers that cause a kind of orchestra to play. A symphony of gears and blood."
 GER_SOF_expansion: "SOF Expansion"
 GER_SOF_expansion_desc: "Special forces are a continually evolving element of modern warfare, playing a critical role in infiltration, sabotage of enemy infrastructure, and covert capture and rescue operations. Despite their strategic importance, our special forces branch is severely underfunded and needs to be improved upon. To enhance our readiness for the upcoming future conflict, it is absoloutely neccessary that we expand our current SOF branch."
 GER_redefine_german_logistics: "Redefine German Logistics"
 GER_redefine_german_logistics_desc: "Logistics are the most important part of any army in truth, equipment needs to reach the men, parts to fix it, ammo, and in an era of maneuver warfare logistics has never been more complicated. Knowing where your men are precisely requires a robust system of monitoring and reporting, getting the needed supplies to them requires speed to prevent a units from losing combat effectiveness in a breakthrough or a retreat. We have to entirely rework our supply system to meet the modern needs of a mobile, Mechanized force, one capable of moving 200 kilometers a day if unimpeded."
 GER_drone_r_d: "Drone R&D"
 GER_drone_r_d_desc: "During the last few decades an alternative to attack enemy positions without sustaining a single casualty has surged: drones. We should invest in this new technology to make sure we master the art of unmanned aerial attack as much as discover the intricacies behind this intriguing form of warfare to make sure we know how to respond to an enemy drone attack."
 GER_ai_development_race: "AI Development Race"
 GER_ai_development_race_desc: "AI isn't just about chatting with fictional characters, asking ridiculous questions or seeing if you can make it do something it shouldn't, A.I. is a logic machine, a thinking machine. A machine that processes data from billions of sources in a second and outputs a solution. In economic planning, military planning, even civil service, Artificial Intelligence can play a vital role in improving these fields and we cannot be left behind as this forbidden fruit hangs from the tree. We are warned of its dangers but we dream of its benefits. We must see it through."
 GER_faith_in_the_ai: "Faith in the AI"
 GER_faith_in_the_ai_desc: "AI has proven its effectiveness both on the battlefield and in everyday life. As a result, a critical question has emerged within our Air Force Command: should we replace human pilots with AI-operated systems? Doing so could significantly not only reduce the need for manpower but also cut the high costs associated with pilot training."
 GER_faith_in_the_pilot: "Faith in the Pilot"
 GER_faith_in_the_pilot_desc: "The pilot has always been a critical component of the Air Force. Given that AI technology is still in a relatively early stage of development, our Air Force Command has concluded that it is best to retain human pilots, not only to prevent incidents such as friendly fire but also to avoid the complexities of maintenance and unnecessary costs associated with AI systems."
 GER_defend_the_skies: "Defend the Skies"
 GER_defend_the_skies_desc: "During the European War, numerous Russian bombers breached our airspace, unfortunately succeeding in bombing several of our cities and devastating key industrial infrastructure. To prevent such incursions in the future, we must make substantial investments in radar systems and significantly enhance our air defense capabilities."
 GER_increase_weapon_leathality: "Improve the Typhoon's Lethality"
 GER_increase_weapon_leathality_desc: " During the European War, the Typhoon played a crucial role in preventing Russian aircraft from bombarding our positions. However, with the rapid advancement of technology, we must now innovate upon the Typhoon's design to effectively counter future, more lethal Russian air threats."
 GER_united_and_undefeated: "United and Undefeated"
 GER_united_and_undefeated_desc: "Although the fight was hard, and Europe lies in ruins, we can now breathe a sigh of relief. Victory is ours! The European War has shaken Germany to its core. It has tested our strength, our resilience, and our unity against the greatest threat we've ever faced. Against the roaring storm, we and Europe have endured against the onslaught of Russian tyranny. With our eastern enemy vanquished, our brave Bundeswehr has been forged into one of the most capable militaries in the world. The West stands victorious, with Germany at the helm of a new, European era.\n\nBut the work has only just begun. Now is the time for us to restore our influence and rebuild Europe. With the War behind us, the Union is more united than ever before, and we stand as its undisputed leader. With our steady hand on the wheel, and America in flames, we will claim our rightful place as the leaders of the free world. The Bundeswehr will be the pillar of European stability, and we will ensure all of the people of the world can live in a world free from authoritarianism and despots. Now, we will lead not only our own people but the entire continent toward an era of lasting peace, prosperity, and power. Haltet aus im Sturmgebraus!"
 GER_support_digital_democracy: "Support Digital Democracy"
 GER_support_digital_democracy_desc: ""
 GER_bid_for_kaliningrad: "Bid for Kaliningrad"
 GER_bid_for_kaliningrad_desc: "Europe is going to look at us sideways, but Kaliningrad isn't just a warm water port; it's our unifier's former capital. All that's left of Prussia is... nothing really. Berlin hardly resembles anything of its former namesake, and Prussia proper was entirely colonized by Soviet efforts to weaken us, or even to simply punish us. Kaliningrad should be Königsberg again. There are better geographic arguments from Lithuania or Poland to have it, but we have the only cultural one. If we can have the capital of our unifier back at long last, we can regain a bit of our soul."
 GER_caucaus_peacekeeping_mission: "Caucasus Peacekeeping Mission"
 GER_caucaus_peacekeeping_mission_desc: "The Mountain Republic fell into civil war soon after being established, we underestimated or perhaps even figured the Russians were joking about Islamic extremism in the area, but the Chechens are a surprisingly tenacious bunch. We must curb the Wahabist threat before it becomes a new Eastern problem to deal with. Or worse, a tool for Russia to justify reclamation."
 GER_propup_kuban_industry: "Prop Up the Breadbasket of Russia"
 GER_propup_kuban_industry_desc: "The fertile land of Kuban was stolen by Russia decades ago and rightfully utilised by them. Yet, under their occupation, this land saw no daylight, no flame of freedom, no hope. It was with our blades of liberty that we hacked through that massive shadow called Russia above them and gave them the rights and democracy they have ever so craved for. Now, with their new found freedom, the men and women of this prosperous land can use the rich soil beneath their feet for themselves instead of the oligarchs in Moscow."
 GER_support_caucasian_minority: "Support Caucasian Minorities"
 GER_support_caucasian_minority_desc: "For decades, the Caucasian people were under Russian occupation. Before our intervention, their natural resources and their land were all robbed from them by the Russian bear. After their defeat, Russia has lost most of its former pride and wrath. The bear lies lifeless, lacking the former vitality this nation once held. When the Russian bear lied dormant, the Caucasians rose up and took back their land, finally their destiny shall be determined by themselves. If we do not support their freedom, their democracy, and their prosperity, how dare we call ourselves the bearers of the torch of liberty?"
 GER_reopen_russian_relations: "Reopen Russian Relations"
 GER_reopen_russian_relations_desc: ""
 GER_accept_ukraine_into_eu: "Accept Ukraine in the EU"
 GER_accept_ukraine_into_eu_desc: ""
 GER_veterans_benefit_program: "Veteran Benefit Program"
 GER_veterans_benefit_program_desc: ""
 GER_ukrainian_belarus_cooperation: "Ukraine-Belarus Cooperation"
 GER_ukrainian_belarus_cooperation_desc: " Ukraine and Belarus are two shellshocked nations, receiving the worst of World War One, Two, and now our latest campaign. Together they must be rebuilt, these Slavic nations, brothers along the same ancient river ways that once spawned the old Rus. Our aid to them is the olive branch between the East and West. A peace offering after such destruction. Economically, they will be tied together as one."
 GER_eu_economic_expansion: "EU Economic Expansion"
 GER_eu_economic_expansion_desc: "With the devastation of the War finally behind us, the historic task of rebuilding and restrengthening Europe, and especially the East, lies ahead. The Union, now more committed to its aim of "enhance economic, social and territorial cohesion and solidarity among EU countries" than ever before, must expand its economic footprint to secure both its own future and the future of the citizenry. Germany must take the initiative in this effort, leading the way in fostering economic growth, innovation, and recovery.\n\nBy expanding the economic framework of the EU, we can accelerate recovery, strengthen trade, and solidify our position as the engineering marvel of Europe. Through renewed investment in the Green Deal and deeper economic integration, we will rebuild stronger than before. And as stability returns, we will expand the Union for the first time in more than a decade. We will not just recover-we will thrive."
 GER_eastern_european_reconstruction_effort: "European Reconstruction Effort"
 GER_eastern_european_reconstruction_effort_desc: "Europe has seen too much bloodshed, too much pain, too much suffering. This land has been subjugated to numerous aggressors and countless invaders, yet each and every time we have survived. Preserved our European heritage and our way of life. This with the Russians has destroyed many homes and livelihoods, but now is the time for reconstruction. The time has come to rebuild all which was lost during the war. To make amends to our people and nations."
 GER_formalize_the_european_union: "Found the European Nation"
 GER_formalize_the_european_union_desc: "The dream of a Federal Europe has lingered on the horizon for decades, an idea long nothing more than whispered and envisioned by idealists. Now, however, we stand at the precipice of history. The European Union has proven its strength in a large-scale war-now it must prove its strength in governance.\n\nWe will lay the foundations for true political unification, and transform the EU from a political and economic union into a singular, sovereign superstate. Through mass campaigning and political maneuvering, we will rally the continent behind the federal vision, sponsoring pro-unification movements and holding referendums across Europe. If successful, history will remember this as the most momentous event of the century-the dawn of a state the likes of which the world has never seen."
 GER_united_but_seperate: "United But Separate"
 GER_united_but_seperate_desc: "Europe stands at a crossroads, and so do we. While unification under a single European superstate is a radical proposal, abandoning the European project entirely would be a reckless endeavour. Instead, we will chart the path of the status quo, strengthening our cooperation within the Union, while safeguarding Germany's national sovereignty. Germany will remain the unofficial leader of the EU, advancing her diplomatic and economic efforts, without erasing our identity in the creation of a European federation. Continuity will guide our course, ensuring that Europe remains united, but not at the cost of its diversity."
 GER_european_officer_corps: "European Officer Corps"
 GER_european_officer_corps_desc: "A European nation requires a European state, which requires a European army, which requires a unified command. As our political and cultural progress towards unification advances, we must also forge a European military-one single armed force, operating with seamless coordination. That was the strength of the United States, not just the size of their army, but its coherence and coordination. We will begin this process by recruiting experienced military commanders into our ranks. One remarkable figure that will join the European Officer Corps is the Italian Claudio Graziano. He served as a Force Commander in the UN Interim Force in Lebanon between 2007 and 2010, and became the Chief of Staff of the Italian Army in 2011. Since 2018, he's been the Chairman of the EU's Military Committee, and from now on, he will be our Chief of the European Army. The groundwork for a truly European military has been laid. Now, we must build upon it."
 GER_uphold_democracy: "Upholding Democracy"
 GER_uphold_democracy_desc: "Our war on tyranny must not end with Russia. Across the world, autocrats and despots continue to run free, threaten global stability and the principles of liberal democracy we hold dear. Germany, on behalf of NATO, must not waver in its responsibility to defend democracy and human rights. With our victory in the last War, we now have the power, and most importantly, the duty, to act. The highest ranking members of our armed forces have drafted Operation: Global Enforcer, as a multi-stage plan to secure democracy in our immediate surroundings. We will strike at the remaining strongholds of authoritarianism in Europe, the Middle East, and North Africa, ensuring that the world does not slip back into darkness. The battle for freedom is not over, but we will see it through to the end.\n\n"Some governments will be timid in the face of tyranny. And make no mistake about it: If they do not act, Europe will.""
 GER_support_self_determination: "Support Self-Determination"
 GER_support_self_determination_desc: "Our victory has redefined the global order, but the battle for democracy continues. We must support the self-determination of nations oppressed by authoritarian regimes, ensuring that the will of the people prevails over tyranny. By endorsing the cause of sovereignty and freedom, we may now launch the first stage of Global Enforcer. Operation: Swift Justice and Operation: Thunder Run, decisive operations aimed at confronting and dismantling the oppressive forces in Serbia and Iran respectively. With these actions, we send a clear message to all who would seek to impose autocracy over a free people: NATO will stand firm, not only in defense of Europe, but in the fight for the rights of every nation to live freely.\n\n"NATO has a job to do, and we're going to do it. We will rid the world of the evil-doers.""
 GER_beyond_the_borders_of_europa: "Beyond the Borders of Europe"
 GER_beyond_the_borders_of_europa_desc: "Our mission to uphold democracy and stability is not limited to just Serbia. The world looks to Commission President von der Leyen for leadership, and she must respond. With our victory secured, we are presented with an opportunity to extend our influence and protect nations threatened by despots, and initiate the final phase of Global Enforcer. Operation: Shining Hope will bring peace to Egypt, restoring stability to a nation marred by decades of dictatorship, and securing democratic control over the Suez. Operation: Solomon II will liberate Syria from the grip of the Assadist tyranny, and crush Ba'athism once and for all. And finally, Operation: Arab Liberation will crush the threat of the resurgent Jamahiriya, putting an end to its expansionism across North Africa and ensuring the region's stability. Our reach will extend far beyond Europe, establishing a new order of freedom and democracy for all.\n\n"§BEurope§! is united. The freedom-loving nations of the world stand by our side. This will be a monumental struggle of good versus evil. But good will prevail.""
 GER_defense_plan_x: "DEFENSE PLAN: X"
 GER_defense_plan_x_desc: "Our efforts to hold the Russians in the Caucauses has failed. We must regroup in order and prepare a new line of defense along the Dniper river!"
 GER_suspend_civilian_consumerism: "Suspend Consumer Economy"
 GER_suspend_civilian_consumerism_desc: "It has become clear Russia does not intend to stop at Ukraine. Their goals appear to be far grander and so we must fully commit as they do and mobilize the economy."
 GER_defense_plan_v: "DEFENSE PLAN: V"
 GER_defense_plan_v_desc: "The Russians have broken through the Dniper defense line. Hope is not yet lost we must defend the Vistula river At. All. Costs!"
 GER_to_the_last: "To the Last..."
 GER_to_the_last_desc: "The Vistula line has been crushed... They will never crush our spirit, we'll fight for our home to the last man!"
 GER_deploy_republikanische_milizen: "Form Republican Militias"
 GER_deploy_republikanische_milizen_desc: "Thousands of Citizenry are ready to take up arms and defend the republic!"
 GER_operation_somerset: "OPERATION: SOMERSET"
 GER_operation_somerset_desc: "Europe has a deep history with fighting Russia, we worked together to defeat them in 1854 and twice this decade. We shall always be here to curb their expansion!"
 GER_europe_for_europeans: "Europe For Europeans"
 GER_europe_for_europeans_desc: "Europe is no place for these asiatic barbaric hordes, we must reifornce this idea amongst our allies to reinvigorate them! The war is not yet lost!"
 GER_militarize_reichsbanner_schwarz_rot_gold: "Militarize the Reichsbanner"
 GER_militarize_reichsbanner_schwarz_rot_gold_desc: "As we recover from the European War, it is clear that Germany's future security lies in the strength and unity of its people. We must foster a new kind of German nationalism, not one based on hate and genocide, but founded on the ideals of republicanism, as we have done since World War II. Although they have abandoned their origins as a paramilitary organization fighting with the Communists and Nazis, Reichsbanner Schwarz-Rot-Gold still nominally exists as an association for political education.\n\nBut circumstances have changed, and democracy once again calls the Reichsbanner to defend the Republic. We will reform Reichsbanner to bolster recruitment efforts and galvanize the German population towards defending the Black, Red and Gold from tyranny."
 GER_nationalize_defense_industries: "Nationalize The Defense Industry"
 GER_nationalize_defense_industries_desc: "With the War behind us, the Federal Government must ensure that the military remains strong and self-reliant. By bringing the defense industry under state control, we can secure the production of arms and equipment without the possibility of foreign interference. Though such a move will be very controversial, it guarantees that we will not be left vulnerable to the whims of private contractors, in case the worst would come to pass. A nationalized defense sector will bolster our military capabilities, cut costs, and provide the tools needed to defend our sovereignty, no matter the cost."
 GER_propup_russian_defense_forces: "Cut Down the Russian Military"
 GER_propup_russian_defense_forces_desc: "Throughout their history, the Russians have been known for their military prowess. Their people liberated themselves from the golden horde, they have pushed back foreign aggressors more than once, and the numerous different ethnicities they held in their palm for centuries. Was it due to the harsh land they inhabit? Or their tempestuous history? Either way, the only means to strangle Russian expansionism is by reducing their military strength. After all, only by weakening the bear can you domesticate it."
 GER_demand_russian_war_reparations: "Demand Russian War Reparations"
 GER_demand_russian_war_reparations_desc: "For centuries the Russian menace has bled our European lands, massacring our people, reducing our cities to ashes, and humiliating us at every turn. From the Tsars to today, Russia has remained the enemy of a united Europe. The time has come for Russia to face justice. We will demand heavy reparations from Russia, seeking restitution for the lives lost, the cities laid to ruin, and the rebirth of our nation!"
 GER_no_appeasment: "No Appeasment"
 GER_no_appeasment_desc: "You cannot reason with the devil nor can you make a mad man see reason. Appeasement has brought nothing but more war, more death, more suffering. At first, we allowed the Russians to trample all over their neighbours, letting them unleash their wrath upon them and subjugating them under their iron fist. We were foolish, once, but no longer. No more will we let evil grow on this sacred land. As the bearers of liberty and freedom, we shall fight against all injustice no matter how powerful the foe."
 GER_normalize_relations: "Normalize Relations"
 GER_normalize_relations_desc: "Love. Love is a powerful word. Love is a wonderful word. It is easy to hate, but far more courageous to love. We may have defeated the Russians in this war, which was started by their aggression, yet that does not mean that we have to bear a grudge against their people. After all, we all bleed the same way and feel pain the same way. The Russian people suffered as we have suffered. They are but innocent in this scheme concocted by their corrupt leaders in Moscow. We shall use love to heal them, to heal ourselves. This is the only way towards a prosperous and united future."
 GER_the_new_order: "The Future of Europe Secured"
 GER_the_new_order_desc: "Victory alone is not enough; we must ensure that the peace we have won with our blood, sweat and tears is one that will last for as long as the last one did. The occupations of Libya and Iran must be guided toward stability, their institutions rebuilt on our own image of democracy. Through careful reforms and economic support, we will mold these nations into reliable allies, preventing the extremism that once defined them from ever returning. At home, we will finally put the burdens of the war behind us. The sacrifices made have been immense, but we will surely emerge stronger, more prepared, and more united than ever before."
 GER_unrestricted_aerial_warfare: "Unrestricted Aerial Warfare"
 GER_unrestricted_aerial_warfare_desc: ""
 GER_support_nato_administrations: "Support NATO Administrations"
 GER_support_nato_administrations_desc: "Despite our efforts to re-democratize through forceful means, we have faced intense popular resistance, with the administration governments being very unpopular, lacking the proper funds and manpower to create a proper defensive force. Therefore, it is our job as the free world to provide with the funds, manpower necessary to not only calm the hostile populace but to develop their lands, which will increase our administration's popularity within the people."
 GER_war_time_advancements: "War Time Advancements"
 GER_war_time_advancements_desc: "Despite our shift toward civilian production following the conclusion of the war, one area where we have not fallen behind is military technology. Companies such as KMW and Rheinmetall continue to produce some of Europe’s most advanced equipment. However, this doesn't mean we shouldn't invest further in research and development. By doing so, we can not only push our technology even further but also correct the shortcomings of older equipment."
 GER_enemies_abroad: "Enemies Abroad"
 GER_enemies_abroad_desc: "The Chinese, long considered one of America's primary enemies, have now become our greatest threat. The Chinese Communist Party is burdened by an overextended and deeply corrupted bureaucracy, a major factor we can exploit, This vulnerability may grant us easier access to critical intelligence, allowing us to assess their true strength and relay that information to our Japanese allies."
 GER_defense_of_krasnodar: "Defense of Krasnodar"
 GER_defense_of_krasnodar_desc: ""
 GER_caucasian_offensive: "Caucasian Offensive"
 GER_caucasian_offensive_desc: "The Caucasus has long suffered under the weight of Russian oppression, with numerous minority groups facing repression. But after the conclusion of the European War, for the first time in a long time in history, the light of freedom shined across the Caucausus, until the Russian devil stomped and extinguished their freedom, Today they lie under constant Russian Oppression and therefore, it is our responsibility as the defenders of Europe to mount a campaign to liberate the Caucasus, Successfully liberating the region would not only free its people but also stretch Russian forces thin, creating a grand opportunity for us to advance from multiple fronts."
 GER_allies_abroad: "Allies Abroad"
 GER_allies_abroad_desc: "As our struggle continues, a potential ally has emerged in the East: the PDTO. Long regarded as Asia’s beacon of democracy, they have stood firm against the expanding influence of the Chinese Dragon. It is neccessary that we have strong relations with them, not only for arms trade, but to reinforce and grow our economies. They will serve as a vital supply node for large-scale weapon shipments. Their ports will be lined with our cargo containers, and the Greenline will grow."
 GER_anti_partisan_training: "Anti-Partisan Training"
 GER_anti_partisan_training_desc: "When the United States invaded Vietnam, it faced overwhelming resistance by locals who were familiar with the terrain and by the thick jungle terrain that made up Vietnam, In the end, America was defeated by troops that were equipped with outdated weaponry. As we continue to occupy more Russian land, the people have grown to hate us with the emergence of resistance movements movements to root us out, Therefore we cannot repeat our former allies mistakes, We must provide our soldiers with Anti-Partisan training and help them root out any partisan movements that plague our ability to occupy the vast land that is Russia." 
 GER_rethink_aerial_warfare: "Rethink Aerial Warfare"
 GER_rethink_aerial_warfare_desc: "Aerial Warfare is evolving with every new technological evolution, stealth fighters invisible on radar and thermals carry no less firepower or maneuverability, super maneuverable Sukhois that can turn fast enough to break a pilot's neck, we enter an age where the pilot may soon be irrelevant. We have to evolve our tactics to increase the survivability of our aircraft especially since it's becoming increasingly likely that dense Anti Air will become a challenge for our forces that require smart counters."
 GER_jump_start_carrier_group: "Jump Start a New Carrier Group"
 GER_jump_start_carrier_group_desc: "Many major navies around the world have managed to deploy an aircraft carrier, yet despite in this era of modern warfare we still have yet to achieve this. These vessels are a crucial link to the next generation of modern warfare, acting as mobile airbases, they will give us the ability to strike deep into enemy territory, anytime, anywhere. therefore it is crucial that we invest into them for the sake of our survival."
 GER_defend_the_seas: "Defend the Seas"
 GER_defend_the_seas_desc: "Years of naval neglect have led to disastrous consequences. During the European War, Russian naval forces targeted our tanker ships, severely disrupting trade with nations across the globe. Worse still, our underfunded navy was overwhelmed, raising serious doubts about our ability to defend our own coastline. If we are to stand any chance against future enemy fleets, we must make a massive effort to rebuild our naval capabilities as soon as possible."
 GER_maritime_aerial_defense: "Maritime Aerial Defense"
 GER_maritime_aerial_defense_desc: " In several naval engagements, surviving sailors and admirals reported that our ships were highly vulnerable to naval bombers due to a lack of onboard air defenses. To address this critical weakness, our future ship designs must incorporate dedicated anti-air systems to protect our vessels from aerial attacks and prevent further losses."
 GER_empower_populist_parties: "Empower Populist Parties"
 GER_empower_populist_parties_desc: "The German status quo is under threat by the likes of the AfD and Die Linke, they make blind promises and use loud rhetoric and it stirs up the German people like they haven't been stirred in many years. This is a good thing. If we allow the populists to keep speaking we may yet be able to benefit from their overzealous promises, we are in dire need of rearming of course."
 GER_bolster_the_bfv: "Bolster the BfV"
 GER_bolster_the_bfv_desc: "The BfV is our domestic intelligence agency, you might call it the German FBI, well, our agency is mainly focused on extremism and defense against it. Neo-Nazis, Communists, even Monarchists all threaten the state from the shadows. They show their public face through the likes of the NPD newly called 'Die Heimat', the AfD, and Die Linke. We cannot simply let another authoritarian be elected. Get the BfV to dig up some dirt on these reactionaries, our Republic must endure the coming storm!"
 GER_reconcile_the_parties: "Reconcile the Parties"
 GER_reconcile_the_parties_desc: "Continuing to fight against the growing supposed to Die Linke and the AfD has only led to a shocking and exponential growth in their voter base throughout the years. The people see them as the opposition to the status quo. So, they vote for them because they are desperate for a break from the same parties over and over again. Because of this, it's in our best interests to not only reconcile the parties, but to allow them some limited positions in the German government. Once they are in those positions, they will not only not represent the anti-status quo, they will also show the people what it's like to live under their policies; for better or for worse."
 GER_embrace_the_future_of_warfare: "Embrace the Future of Warfare"
 GER_embrace_the_future_of_warfare_desc: "While the Bundeswehr has been undergoing modernization and reform, the paradigms of war are quickly shifting. Integrating advanced technologies such as cyber warfare capabilities, artificial intelligence, and unmanned systems such as drones will enhance military effectiveness and operational efficiency. Our military needs to be prepared for diverse scenarios and develop flexible doctrines that will adapt to changing geopolitical conditions and enhance Germany's strategic posture against ever-emerging threats. Wir. Dienen. Deutschland."
 GER_inspire_the_youth: "Inspire the Youth"
 GER_inspire_the_youth_desc: "Germany has educated its children for decades in temperance, the respect for life, and the mistakes of our collective past. Because of this we should like to say that our youth are innocent and free of a want for war; they aim for high pursuits in the service of their fellow man. This does not serve our current needs, and the beating heart of our children should pump blood through the sinews of battle. A targeted social media blitz to teenagers, showcasing Germany's rich and proud militaristic tradition and genius actions in war will remind our children that the blood of heroes is closer to God than the ink of the philosophers."
 GER_germany_triumphant: "Germany Triumphant"
 GER_germany_triumphant_desc: ""
 GER_consolidate_the_eu: "Consolidate the EU"
 GER_consolidate_the_eu_desc: ""
 GER_no_appeasement: "No Appeasement"
 GER_no_appeasement_desc: "You cannot reason with the devil nor can you make a mad man see reason. Appeasement has brought nothing but more war, more death, more suffering. At first, we allowed the Russians to trample all over their neighbours, letting them unleash their wrath upon them and subjugating them under their iron fist. We were foolish, once, but no longer. No more will we let evil grow on this sacred land. As the bearers of liberty and freedom, we shall fight against all injustice no matter how powerful the foe."
 GER_deregulate_the_market: "Deregulate the Market"
 GER_deregulate_the_market_desc: ""
 GER_revive_nuclear_energy: "Revive Nuclear Energy"
 GER_revive_nuclear_energy_desc: "The weak liberal government's decision to phase out nuclear energy has been a disaster for the fatherland. Those globalist bureaucrats caused energy prices to soar and significant challenges in maintaining a secure energy supply. Not to mention the immense job losses and geopolitical vulnerabilities that were opened as a result of this foolish decision. It's time we scrap these policies and redevelop the necessary infrastructure to support nuclear energy, paving the way to increased nuclear development."
 GER_support_military_industry: "Support Military Industry"
 GER_support_military_industry_desc: ""
 GER_reconstruct_civilian_industry: "Reconstruct Civilian Industry"
 GER_reconstruct_civilian_industry_desc: ""
 GER_begin_societal_militarization: "Begin Societal Militarization"
 GER_begin_societal_militarization_desc: ""
 GER_activate_article_50: "Activate Article 50"
 GER_activate_article_50_desc: "The European experiment has finally run its course. For years, Germany has shouldered the burdens of the weaker nations, propping up damaged economies, enduring a now infamous bureaucracy, and compromising our national interests for the sake of "unity". The war has only made it clearer: Europe is far from being a single nation, nor should it ever be. It is finally time for Germany to reclaim her sovereignty. We will invoke Article 50 and officially begin the process of withdrawing from the European Union, severing the ties that have kept us down for decades. The transition will not be without turmoil, as political and economic uncertainty are inevitable, but in the end, Germany will overcome as she always has, free to chart its own course without the constraints of Brussels.\n\n"Deutschland, Deutschland, über alles!""
 GER_revive_german_nationalism: "Revive German Nationalism"
 GER_revive_german_nationalism_desc: "For too long, Germany has been shackled by the constraints of an artificial, pan-European identity, eroding the essence of Germany itself. With our departure from the Union, it is finally time to rekindle the spirit of our nation that was crushed in 1945, and remained under the boot of globalism and self-loathing. We will embrace our heritage, celebrate our own diversity, and foster a sense of national unity among Germans worldwide. The dream of a strong Germany is no longer a distant memory: it is the future."
 GER_restore_pride_in_our_history: "Restore Pride in Our History"
 GER_restore_pride_in_our_history_desc: "We stand at a crossroads, and one thing remains certain: we must not forget who we are. Our nation has weathered countless storms, from unification, to division, to reunification, from glorious victories to crushing defeats. Now, as we forge our own path, it is high time to remind the German people of the strength and resilience of their ancestors. By embracing our history, not with nostalgia, but with pride, we will restore national confidence and inspire the nezt generation to take up the mantle of leadership. The future belongs to those who believe in their past."
 GER_unify_the_european_people: "Unify the European People"
 GER_unify_the_european_people_desc: "As we take steps towards unifying the European continent, it is crucial that we not only strengthen the Union's economy and institutions, but also the very foundation of our identity. Europe must no longer be thought of as a land of several nations, but one single nation of all Europeans. This isn't an unprecedented proposal; in fact, it came from the most unexpected source imaginable: a fascist. Oswald Mosley and his Union Movement advocated for the "Europe a Nation" policy between 1948 and 1973. Another fascist, Francis Parker Yockey, advocated in 1949 for a so-called "Imperium of Europe" that would be cleansed from liberal democracy, Hollywood, and bolshevism.\n\nNow, of course, we're no fascists, but these ideologues had a point: Europe is one nation, and always has been. It is high time we recognize this fact, and as all states should be congruent with a nation of its own, Europe should have a state of its own."
 GER_pressure_the_austrians: "Pressure the Austrians"
 GER_pressure_the_austrians_desc: "Austria's neutrality is a relic of the Cold War, one that can no longer be afforded in Europe's geopolitical landscape. While the Russians stormed over Europe and we were left to scramble, all Austria did was watch. As Europe reorganizes in the wake of the war, it is finally time for Austria to take a definitive stand and abandon the Neutralitätserklärung. We will exert all necessary diplomatic and political pressure to push Vienna into applying to NATO, ensuring that our southern neighbour stands with us against any future threats and join us in overseas operations. Whether Austria yields to our demands or resists will shape Central Europe for decades to come. They are either with us, or they are against us."
 GER_the_bundeswehr_reborn: "The Bundeswehr Reborn"
 GER_the_bundeswehr_reborn_desc: "The Bundeswehr has long been constrained by the past, shackled by political hesitations and international expectations. But the world has changed, Europe has changed, and so must we. With our declaration of independence from the Brussels bureaucrats, it is time for us to forge a new path forwards, one where the Bundeswehr is not a mere defense force, but the unyielding sword and shield of the German people. We will continue the efforts to restore popular confidence in the armed forces. No longer will our security rest in foreign hands. The Bundeswehr will be reborn, ready to stand firm against any threat."
 GER_towards_a_greater_germany: "Towards a Greater Germany"
 GER_towards_a_greater_germany_desc: "The Lesser German solution was and still is a terrible mistake. No longer shackled by empty platitudes and concessions for unity, we will forge a stronger, prouder Germany. The fate of the German people is to be dictated by the Brussels bureaucrats no longer! Austria, a long-lost part of our people will, once again, find its rightful place within Greater Germany. This is not mere expansion; it is the correction of history itself. The world will watch as Germany rises anew.\n\n"Das soll es sein! Das soll es sein!\nDas ganze Deutschland soll es sein!""
 GER_sew_euro_skepticism: "Sew Euroscepticism"
 GER_sew_euro_skepticism_desc: "The European Union was built on noble ideals, but reality has exposed its obvious flaws. The cracks in the foundation are growing, and we will make sure they cannot be ignored by anyone. We will amplify the voices of national sovereignty across Europe, exposing the failures of Brussels, and reminding the people that sovereignty belongs to them, and to them only. Every scandal, every overreach, and every failure will be fuel for the fires of euroskepticism. The dream, or rather, nightmare, of a European superstate will be ended-not by some foreign power, but by the will of the people themselves."
 GER_fight_euroskeptic_hate_speech: "Fight Euroskeptic Hate Speech"
 GER_fight_euroskeptic_hate_speech_desc: "As the Union grows stronger, and we promote our objective of federalisation, so too do the voices that seek to undermine it. Across Europe, reactionaries peddle fear, misinformation and fake news. They prey on economic anxiety and nationalist resentment to stall our progress. They claim to defend the sovereignty of their own nations. But they fail to consider that the Union is the greatest guarantor of European sovereignty! Without it, we would be living under the boot of Moscow. Let's see them protest for sovereignty then!\n\nWe must act decisively. By countering this Euroskeptic hate speech with a robust campaign of outreach, education, and legal measures, we will expose their lies and reaffirm our values of dignity, democracy, equality and the rule of law. The tide of division will be turned back, and united Europe will march ever forward."
 GER_modern_wolf_packs: "Modern Wolf Packs"
 GER_modern_wolf_packs_desc: "During the Second World War, Admiral Dönitz created one of history's most effective naval warfare strategies: the wolfpack. These coordinated submarine groups were used to hunt down supply ships, severely disrupting global supply chains. As warfare evolved, the tactic has seen limited modern application, presenting a golden opportunity to innovate and revive this proven strategy, potentially shifting the balance on the naval front."
 GER_study_new_naval_tactics: "Study New Naval Tactics"
 GER_study_new_naval_tactics_desc: "Analysis of past conflicts has shown to us one thing: naval bombers will represent the future of maritime warfare. Fast and often undetected, these aircraft are capable of delivering powerful payloads to eliminate any vessel that dares to enter our territorial waters, Launched from mobile aircraft carriers, these bombers significantly enhance our ability to project power and maintain dominance across the seas. "
 GER_automating_warfare: "Automated Warfare"
 GER_automating_warfare_desc: "Artificial intelligence has grown tremendously over the past ten years, playing a key role not only in everyday life but also in combat situations. This brings up an important question: Should we integrate AI to operate our military machines, saving manpower and reducing recruitment costs? Or should we keep humans in control to prevent dangerous mistakes like friendly fire and avoid the challenges of maintaining such complex systems?"
 GER_germania_rules_the_waves: "Germania Rules the Waves"
 GER_germania_rules_the_waves_desc: "Our naval reforms are complete. The Marine has transformed from an underfunded, disorganized fleet into one of the most formidable naval forces on the planet. Through strategic investment, advanced technology, and rigorous training, we have created a navy worthy of global respect and fear. There is no doubt that we are prepared for the conflicts of the future. Germania will once again rule the waves, asserting its dominance across every ocean."
 GER_revolution_on_the_ballot: "Revolution on the Ballot"
 GER_revolution_on_the_ballot_desc: "The War in Europe has come to a close, the East littered with corpses and smoking piles of tanks. We, Germans, must ask ourselves: Why have we allowed this? For how much longer are we going to endure as Oligarchs pit the workers of the world against one another? No more! The people shouted and without a shot fired, they put themselves into power. Now, the only thing left is for us to act and change the continent for the better, to bring peace, prosperity and a future for those who would have died for it."
 GER_reconquer_east_germany: "Reconquer East Germany"
 GER_reconquer_east_germany_desc: "East Germany has been left in disarray ever since the fall of the DDR, would-be-fascists turning it into their reactionary stronghold. Such hateful ideologies cannot be allowed to fester in the birthplace of German Socialism, but we will not reconquer such with violence, but with steel and concrete. Development projects will begin at once, providing housing, infrastructure and jobs to those who were abandoned 30 years ago by the West."
 GER_establish_workers_councils: "Prune the Corporations"
 GER_establish_workers_councils_desc: "The victory in the recent election alongside the triumph in the European War has given much needed trust and leverage within the government. As such, we should begin to ensure that capitalist forces who have also grown fat from the war are cut down to size. Investigations into corruption and anti-trust laws, alongside the nationalization of certain corporate assets should ensure that these businesses are kept at a size which is most comfortable to both the State and the People alike, without incurring full on capital flight."
 GER_economic_regulation: "Promote Multiethnicism"
 GER_economic_regulation_desc: "The concept of a nation-state is not only outdated, but outright corrosive to the Germany we wish to build. Reactionary forces would use such an idea to create racist and discriminatory policies with the hopes of distracting the proletariat. This is idea is something which we need to dismantle, we are building a country not just for Germans, but for the world as a whole. In the bright red future of this country, anyone can be a German, as long as they wish to be."
 GER_criticize_the_eu: "Contain Militarism"
 GER_criticize_the_eu_desc: "The triumph in the East is certainly something to be proud of, a continent which has been divided for centuries, coming together to defeat a foe so much larger than them, however, this sort of pride is the perfect fertilizer for the growth of fascism. As such, we must focus on showing the truth about the conflict, the blood and the death, History must remember the European War as a tragedy, something which could've been avoided had it not been for meddling Oligarchs. Aside from that, we must also begin implement regulations on our military industries and refocusing on civilian production, for they are no longer be necessary within post-war Europe."
 GER_work_with_our_allies: "Fight the Russian War Machine"
 GER_work_with_our_allies_desc: "Bitterness is as much the fuel of reaction as it is of revolution, russian oligarchs will undoubtably make use of the defeat as a way to fuel another conflict, while we should ensure to prevent that peacefully, there is always the chance that Russia might return so radicalized that it will stop at nothing, but total victory. As such, we will expand the EUs budget and use that excess to begin subsidizing the military production of all of its members in order to stand against the worst that the East can offer."
 GER_the_bridge_between_east_and_west: "The Bridge Between East and West"
 GER_the_bridge_between_east_and_west_desc: "As tensions are rising in the Indo-Pacific and the drums of war echo once again in East Asia, we have an obligation to choose diplomacy over isolation. Asia stands at the edge of a war whose consequences could engulf the rest of the world, including ourselves. But now that we have emerged from these last few years stronger and more principled, we have the moral imperative to act. By building bridges with Tokyo to foster dialogue and cooperation, we can position ourselves as the mediator the world desperately needs. However, if the worst comes to pass, we will take a firm stand with Tokyo in the defense of democratic values."
 GER_for_the_sake_of_stability: "For the Sake of Stability"
 GER_for_the_sake_of_stability_desc: "The world around us is in a very volatile state, something we have just experienced firsthand. Fortunately, we withstood the Russian onslaught, and emerged as a successful nation in a successful alliance. However, this is still no time to rock the boat, and we must keep the stability we worked so hard to achieve. That is why the CDU was elected, the voters don't want change, they want what they have to continue. We will deliver on our promises of peace and prosperity, and escort Germany into the future!"
 GER_expand_eu_cooperation: "Expand EU Cooperation"
 GER_expand_eu_cooperation_desc: "We have proven that the EU is more than just another page in the history books, it is here to stay. However, like all good machines, it requires constant maintenance to ensure it runs properly. While we may have beat the Russians today, they could come back tomorrow, and if we aren't prepared then we are doomed. We will use the peace we have found ourselves with to deepen the bond with our European comrades, so that when war does return to our continent, we will stand united and free!"
 GER_prop_up_eastern_europes_industry: "Prop Up Eastern Europe's Industry"
 GER_prop_up_eastern_europes_industry_desc: "With the defeat of the Russians we can finally expand our commitment to Eastern Europe without any repercussions. Much of the Baltics, Belarus, and Ukraine were decimated in the war, and this is our chance to help them build back better. People have seen a lot of opportunities out east, and so with a few incentives from us, we can convince them to invest in industry and infrastructure. We will make the East better than it was before the war, in fact, we will make it better than it ever has been!"
 GER_keep_the_markets_stable: "Keep the Markets Stable"
 GER_keep_the_markets_stable_desc: "To say the global supply chain is devastated is the understatement of the century. With America gone, China and Japan tearing apart Asia, and Russia sidelined for the moment, we must fall back on traditional markets. Luckily we have earned some goodwill from investors thanks to our victory in the war against Russia, and the economy has seen a jump. What we need more than anything is to keep up this trend of recovery, only then can we set out to build up others."
 GER_subsidize_the_civilian_industry: "Subsidize the Civilian Industry"
 GER_subsidize_the_civilian_industry_desc: "Keeping our nation strong doesn't just mean having a large military industry, we need to have a strong civilian industrial base as well. In the lead up to NATO's war with Russia, we focused heavily on military manufacturing, and sidelined pretty much everything else. However, it's now time to switch gears back to producing all manner of things, rather than just what the military needs. We have a chance to become an industrial powerhouse, and we will not waste it!"
 GER_fund_the_military_industry: "Fund the Military Industry"
 GER_fund_the_military_industry_desc: "We have learned the hard way over the past few years that relying on foreign nations does not work out in our favor. As such we must ensure we are getting our necessary supplies, especially those for our military, from a trusted source. And who can we trust more than ourselves? Rather than cut back on military industrial spending, doubling down on it is currently our best option. We have to be able to produce goods not just for ourselves, but for our European brothers as well. Only when all nations of the EU are as well-armed as we are can we consider ourselves a true military power."
 GER_defend_democracy: "Defend Democracy"
 GER_defend_democracy_desc: "It has become increasingly apparent over the last few months that the Russian threat has not been permanently sidelined. They will come back, much sooner than later. With democracy under siege across the world, it is more than imperative that we defend what we have, and remain a shining beacon of liberty and prosperity. There are even some who say we should go beyond that, and protect democracy abroad, and plenty agree with that sentiment. However, for now we must remain focused on our own issues. Should the Russians come for us, and they will, we will not go quietly!"
 GER_the_red_roses_finest_hour: "The Red Rose's Finest Hour"
 GER_the_red_roses_finest_hour_desc: "In our roughly 150 years of existence we have never experienced such a great triumph. Not only have we vanquished the Russians and brought peace to Eastern Europe, we have also secured the future for our nation. Our successes did not go unnoticed by the people, who overwhelmingly voted us into power, but more importantly, put their faith in us. This display of trust on behalf of our citizens has not gone unnoticed, and we will put the bulk of our will into passing our agenda. The Red Rose has sprouted, but it soon will truly bloom!"
 GER_reverse_schroders_reforms: "Reverse Schröder's Reforms"
 GER_reverse_schroders_reforms_desc: ""
 GER_an_industrial_renaissance: "An Industrial Renaissance"
 GER_an_industrial_renaissance_desc: "Historically Germany has always been a great industrial power. However, in recent years, like many countries, our companies branched worldwide and began manufacturing goods elsewhere. With the state the world is in today, this can not be allowed to continue, for our nation and our people's economic stability. Starting now, we will begin a policy of incentivizing companies to move and build their factories back home, and if we can, convince foreign businesses to set up shop here. It's time to make "Made in Germany" a reality again!"
 GER_help_out_the_working_class: "Help Out the Working Class"
 GER_help_out_the_working_class_desc: "Germany, like all nations, is built on the backs of the workers. It is only thanks to their diligence, hard work, and strong will that we have been able to reach where we are today. Many countries forget this, and push them aside, focusing rather on enriching those who already have more than enough. Not Germany! For the duration of the SPD's term in office, we will work hard to pass legislation aimed at bringing prosperity to the worker. A happy worker is an efficient one!"
 GER_push_for_federalization_2: "Push for Federalization"
 GER_push_for_federalization_desc: "One thing that we have in common with a majority of leftist parties throughout Europe is our desire to federalize. With the fall of the United States, war in the East, and Russia ever a threat, only by showing unity will we weather the coming storm! We are one continent, and while we have fought amongst ourselves in the past, we have also worked together countless times. Federalization can work, and with Germany at the helm, we will build a strong and free European Union!"
 GER_work_with_europes_social_democrats: "Work with Europe's Social Democrats"
 GER_work_with_europes_social_democrats_desc: "While there is a heavy pro-federalization sentiment within Germany, a number of European nations do not share it. The last thing we want to do is force it and risk alienating some of our allies. Rather, we will increase collaboration with parties that share our ideology, and build relationships even stronger than unity. With this goal in mind, our bonds with other European countries will deepen. While we are one continent, we are many different peoples, and sometimes diversity is strength!"
 GER_take_in_russian_dissidents: "Take in Russian Dissidents"
 GER_take_in_russian_dissidents_desc: "One thing that sets us aside from some of Europe's more conservative parties is our view on the Russians. Yes, they are a threat, something they happily proved not too long ago. But on the other hand that isn't the fault of their people, many of whom have tried to escape their oppressive regime. There are those within our country who would force them out, and leave them with nowhere to go, not us. Those who are forced to flee their countries are welcome here, not just Russians, but all people from around the world. Germany will have you!"
 GER_liberalisms_time_to_shine: "Liberalism's Time to Shine"
 GER_liberalisms_time_to_shine_desc: "Through hours, months, and years of relentless effort by our workers, citizens, and politicians, we have led Germany to its finest hour, defeating the menace in the East and driving it back. This victory is not only a testament to the strength of our nation but also to the dedication and resilience of every individual who contributed to this great achievement. This does not mean we should stop, to ensure Germany's survival it must always remain the economic and military beacon of Europe and we must continue to work harder, to maintain our new status as the Hegemon of Europe."
 GER_minimize_welfare: "Minimize Welfare"
 GER_minimize_welfare_desc: "Despite our efforts to build a welfare state, several challenges have emerged, ranging from declining public trust in financial institutions to unequal benefit distribution and increasing strain on the national budget. To address these issues and prevent them from occurring once again, welfare benefits will be adjusted. They will be reduced in scale but made more effective and targeted. This means support will focus on those who need it most, improving fairness and efficiency. By doing so, we aim to restore trust, reduce waste, and ensure the welfare system remains sustainable and capable of supporting our society in the long term."
 GER_empower_the_individual: "Empower the Individual"
 GER_empower_the_individual_desc: "The individual is the backbone of every nation. Regardless of their role, be it a local mailman ensuring German communities stay connected to teachers shaping the minds of the next generation, to the garbage collector that helps keep each street clean, each person contributes to the large pillars of German society. Their rights, the right to freedom of speech, are the most important rights which must be fully protected to uphold one of Germany's core values, freedom. To ensure an individual's full control of themselves, they must be empowered with greater control over how they shape their personal and financial paths."
 GER_a_dynamic_economy: "A Dynamic Economy"
 GER_a_dynamic_economy_desc: "One of the core values of our party is to implement a true free market system in Germany. With the Russian threat neutralized in the east, we can begin to demobilize our wartime economy and transition toward a free market system. By reducing government intervention and allowing private businesses to grow, we will create an environment where companies can thrive, fuel the country's innovation, and build an economic powerhouse guided by supply, demand, and the spirit of our people."
 GER_push_for_a_european_defense_ministry: "Push for an European Defense Ministry"
 GER_push_for_a_european_defense_ministry_desc: "Across Europe, brilliant minds stand ready to defend the continent, but without unity, their strength is worthless to our cause. In order to be able to create a centralized European military force, we must entrust one capable leader to oversee and manage our new European Army. This leader will organize our armies and lay the foundation for a truly united European military. It is inevitable that the Russians will come for us once again, therefore we must take the following steps to brand all of Europe's armies into one army, one command, one purpose: the defense of Europe."
 GER_enforce_the_north_atlantic_treaty: "Enforce the North Atlantic Treaty"
 GER_enforce_the_north_atlantic_treaty_desc: "During the European War, the NATO structure was chaotic, disorganized and disunited. Since its conclusion, many European militaries lie broken, shattered, understaffed, and underequipped. Therefore, it is up to us, as the leader of the Free World, to reinforce our allies by assisting them in rebuilding their armed forces and truly unifying NATO's command structure to ensure we are prepared for the inevitable second war."
 GER_push_for_more_federalization: "Push for more Federalization"
 GER_push_for_more_federalization_desc: "Since the conclusion of the European War, voices within the EU Parliament have grown louder in favor of deeper federalization. Though we succeeded in defeating the Russian Bear, it is only a matter of time before it rebuilds and strikes again, plunging Europe into another conflict. If we are to survive what lies ahead, we cannot afford to remain divided. We must unite all of Europe's militaries and industrial power to secure lasting peace and protect every European citizen."
 GER_a_green_future_2: "A Green Future?"
 GER_a_green_future_2_desc: "With the last vote cast and all attention drawn to us, the future of the German nation has been decided. Blooming like a glorious sunflower, Die Gruene has once more grasped the reins of power. Germany is green, but why stop now? Many parts of our nation still need reforming, from transportation to agriculture. With the current state of Europe, reform is needed as soon as possible. Guided by our hand, the already sprouting seeds shall grow tall and bloom all across Europe. The new green revolution shall spread like a great tide, not just in our country but the entirety of Europe, creating a better future for all the people of Europe."
 GER_subsidize_public_transportation: "Subsidize Public Transportation"
 GER_subsidize_public_transportation_desc: "What is thought of when people think of Germany? Perhaps, the autobahn or, more likely, our vast euro rail system. But the truth is more complicated than many might see. Despite the diligent work of previous administrations, large portions of our infrastructure network are significantly underfunded and crumbling as we speak. This cannot stand and must be rectified at once. With subsidies, projects, and repair jobs, we will bring our network of roads, rail, and airports into the future. Where roads and rail lines will snake across our nation like the vines of a plant, fueling our transition into a one hundred 100 clean nation."
 GER_reform_agriculture: "Reform Agriculture"
 GER_reform_agriculture_desc: "Corn, Grain, Barely. While these words might not mean much to most, they are the lifeblood of our farmers. While our previous administration has made several steps to aid our farmers, much remains undone. Most of our farmers still spray chemical pesticides, unaware of the dangers these toxins pose to the plants, as well as themselves. As part of our new vision for Germany, we will make a conscious effort to educate our farmers on the benefits of greener techniques. Subsidizing changes that will not just boost crop output but also allow them to grow and expand. With this, we shall grow and spread, rising as a competitor to Ukraine as the breadbasket of Europe."
 GER_an_ecofriendly_industry: "An Eco-Friendly Industry"
 GER_an_ecofriendly_industry_desc: "The future will be green, or not at all- a slogan echoed by the climate-aware youths of our nation. It's time we begin efforts to finalize the Energiewende program, continuing our transition to a sustainable energy system. We will promote a circular economy, reducing resource consumption, and we shall provide government incentives to retrofit buildings and machinery to significantly lower energy consumption. Additionally, providing training and education for workers and Germany's businessmen of the future can help our industries shift to more eco-friendly operations."
 GER_fund_russian_dissident_groups: "Assist Ukraine"
 GER_fund_russian_dissident_groups_desc: "In the beginning months of the European War, many experts feared the worst for our Ukrainian allies. Yet, despite all our fears, they held steady. And with our support, they pushed back the Russian bear, sending them back to Moscow with their tail between their legs. Now, Ukraine stands as a key component of our influence in Eastern Europe, and our support for them will not waver. Under our guidance and with support from NATO,  Ukraine shall be transformed into the Eastern bastion of freedom. Ready to defend against any reprisal invasion that might come from Moscow."
 GER_continent_wide_cooperation: "Continent-Wide Cooperation"
 GER_continent_wide_cooperation_desc: "Having secured our place as the dominant European power, the post-war world has presented us with many new challenges. Our newly liberated territories suffer economically, while Russians resist occupation in zones controlled by Ukraine. In the Caucasus, the region sits on a knife edge, with tensions in Chechnya threatening to boil over at any point, which would send the region into all-out war. As much as we try to admit it, we will not be able to solve these problems alone. Which is why we shall turn to our fellow European allies for aid. Through consolidating the EU, we shall foster a deep sense of comradery and solidarity amongst Europeans, allowing us to live up to allies and ensure the continuation of democracy and freedom."
 GER_fortify_eastern_europe: "Fortify Eastern Europe"
 GER_fortify_eastern_europe_desc: "A  storm is on the horizon, one even greater in size and strength than the last. The Russian bear is waking up. It is licking its wounds, and it will be out for revenge. The truth is that war is once again on the horizon, and while we may not be able to delay the inevitable, we are still able to prepare for Moscow's revenge. All across the nation and in coordination with our allies, plans will be drawn up, preparations made, and fallback lines organized. This war will not just be about survival. It will fundamentally reshape the very makeup of the European continent. Victory is the only option, as anything else will lead to our defeat and the return of Moscow, not just in the East. But upon the entirety of Europe."
 GER_strength_and_glory: "Strength And Glory"
 GER_strength_and_glory_desc: "Weakness is not a word in the German dictionary. Our country was forged in iron, our people were shaped through blood, our will was formed by flames of hell. Ever since the Teutonic knights settled on this land, it has been inhabited by soldiers and warriors, each man braver than the other, each man ready to sacrifice himself for his fatherland. Unlike the Americans who pride themselves with petty things such as freedom and diversity, or the pesky French who find pride from wine and cheese, the German pride and glory is rooted in the deep history of our people's military prowess and strength."
 GER_true_to_form: "True To Form"
 GER_true_to_form_desc: "It was but four and half score years ago when our fathers' fathers were still recovering from the shameful defeat during the first World War, a new and vigorous ideology, one burning with the thirst for revenge, returned the pride and courage of the German nation and people. National Socialism was a set of ideals and principles sculpted from the flames of war and despair of our people, it is a truly German and purely German ideology. Every law, every decree, every commandment carved into the bones of each German for every German to take to heart."
 GER_national_hygiene: "National Hygiene Programme"
 GER_national_hygiene_desc: "The utmost importance in a nation's success, in a peoples' wellbeing, lies but of course it's level of hygiene. A healthy nation is not filled with the sick and weak, but full of warriors and fighters, with a healthy set of bones and muscles. The energy which powers an immaculate nation consists of a healthy workforce and the weapon which this nation wields is made of bloodlust soldiers who without a doubt can thow themselves in front of the line of fire without a second thought. Hence, it is crucial that our beloved Germany not fall into the shadows and rot of the filthy, but be immersed in the light of the strong and clean. "
 GER_the_totalitarian_society: "Totalitarian Society"
 GER_the_totalitarian_society_desc: "We tried liberal forms of society. We tried giving them freedom, liberty, and security. Look where that led us. Defeat, death, and destruction. Our kindness was used against us, our love worthless in front of the chilling bullets of our enemies. It was the pain of loss and the flesh wounds which finally taught us the truth, the truth that only with a tight iron grip can we efficiently protect our nation from harm and foreign aggression."
 GER_assemble_the_reichsrat: "Assemble the Reichsrat"
 GER_assemble_the_reichsrat_desc: "Even after the final awakening of the German people and nation, we mustn't forget what made us great and propagated us so far in the tides of history. The Reichsrat, a Weimarian relic, one lost to the history of the past, has finally been brought back by the demands of the temporal setting. The Reichsrat will not only be a representative of the people's will, but it will also be the final form of the collective mind."
 GER_german_nation_comes_first: "German Nation Comes First"
 GER_german_nation_comes_first_desc: "Without your fatherland, you are nothing. This is but a fact. For far too long our people have forgotten what patriotism truly means. Some within our nation have even grown to view it as a weakness. Alas, without a home where can you rest? Without a dome where can one nest? Home, nest, this is what our homeland means to us. It is not only our forever safe haven, but also the home of our families, of our people, of our roots and to defend and protect our homes and our families is our utmost urgent and crucial task."
 GER_fuel_the_machine: "Fuel the Machine"
 GER_fuel_the_machine_desc: "All successful regimes need a successful propaganda machine behind them, and now is the time for the birth of our machine. This country's media landscape must be completely dominated by the content-dedicated appendages of our movement. From newspapers to TV to social media, we will completely smother the people with our political program. Anything else that dares offer information or content that challenges us will be silenced. Once the citizenry sees and hears only our message, they will believe everything we say and do down to the bone. The masses' minds and spirits will be in our hands."
 GER_germany_everlasting: "Germany, Everlasting"
 GER_germany_everlasting_desc: "Germany, Deutschland. Ever since her creation, ever since the great unification of the German people in 1871 and its reunification in 1990, has endured countless hardships and unimaginable challenges. The cogs of this run down rusty contraption, like the calcium deficient bones of an elder, seem fragile, as if they may break any day. The fuel which powers this apparatus, the lifeblood of this land, has become sullied by the constant betrayal and defeat that our people have suffered. Yet still, the engine, the heart of this machine  of this nation, still runs fierce and fiery like the first day it was lit. Germany has fought numerous battles and overcome countless obstacles. Germany has also been defeated multiple times, most times destroyed to nothing but rubble and dust. Yet Germany is still here, unlike many of her enemies. Everytime, after every battle, we have successfully rebuilt our homes, not because of what resources we have, but because of the principles and beliefs of our people and as a nation. O Germany, my homeland, my fatherland, you shall stand tall and brave, rise above all our foes, forever."
 GER_smash_the_splinters: "Smash the Splinters"
 GER_smash_the_splinters_desc: "Small factions run around Germany, spreading their lies and propaganda trying to poison Germany's minds. Our predecessors thankfully have a solution, Enemies of the Reich were cleansed through the Night of the Long Knives, silencing traitors and enemies of the Reich in a single decisive strike.\n\nIf a strong and prosperous Germany is to be created, we must swiftly deal with these splinters"
 GER_dismantle_anti_german_academia: "Dismantle Anti-German Academia"
 GER_dismantle_anti_german_academia_desc: "The years of the German Empire and the Reich marked a time of national strength and pride. Since 1949, however, foreign influence and weak leadership have drained the spirit from our people. A culture of submission and shame was imposed upon us, our flags lowered and our voices were silenced. If we are to restore Germany to greatness, we must free ourselves from these chains and reignite the sense of patriotism that once defined us."
 GER_fanatical_anti_communism: "Fanatical Anti-Communism"
 GER_fanatical_anti_communism_desc: "Who is our enemy? What is the filth which we must cleanse from the beautiful plains, hills, and mountains of Europe? Not liberalism, not democracy. The answer is the crimson pest which has haunted the European continent and the whole world ever since its conceptualisation centuries before. Our citizens, our European brethren may have forgotten our destined fight against the ultimate enemy, some may even have grown into fervent believers of it. No more. This day onward, the communist poison shall be rooted out from our nation. They will be but a foot note in the mighty European history."
 GER_solidify_the_parteistaat: "Solidify the Parteistaat"
 GER_solidify_the_parteistaat_desc: "It was political instability and infighting among different political parties that led to the indecisiveness and failure of the German leadership. In this new Germany, as a more powerful Germany, power shall be held by those men strong enough to wield it effectively and lead us to triumph. No longer will the weak minded be allowed to hinder our development nor will we be bound by the meek, no longer shall the feeble minded trap the freed. In dire situations such as the one Germany is currently in. the nation does not require smooth talking actionless politicans, but strongmen who are willing to revolutionise and change radically for the embetterment of the country. "
 GER_revive_our_warrior_spirit: "Revive Our Warrior Spirit"
 GER_revive_our_warrior_spirit_desc: "When god created us Germans, he knew that he was not creating a people of romance, people of kindness, people of love. We Germans were born to be fighters, born to be soldiers. Throughout our long and tumultuous history, we have carved ourselves a rightful place under the sun. It was with blood and sweat that we dug through the other nations above, taking their share of the sunshine. Without war, without bloodshed, without sacrifice, Germany would never have united, the Teutonic people would never have become truly one. The German people were born in blood, and they shall die in blood."
 GER_spirit_of_rommel_npd: "Spirit of Rommel"
 GER_spirit_of_rommel_npd_desc: "Without a doubt, if there's one military tactic that has defined our brilliance for decades after the war, it is Blitzkrieg. It is our focus on fast, aggressive, and flexible maneuvers to outflank our enemy and overpower their forces without much fighting which has lead to our undeniable dominance over the European continent and the near total capitulation of the British in Egypt and the Soviets in the east.\n\nYet, mainly due to certain incompetence by our allies and ourselves, has led to our capitulation to the Allies and the subsequent humiliation which followed. This time, we'll learn from our past mistakes and ensure this second chance goes right.\n\nThanks to the desert fox and his genius leading to the near capitulation of British North Africa, we shall follow his example. We shall master the arts of combined arms tactics as well as initiative and improvisation to ensure our enemies may never triumph over us again."
 GER_national_service_npd: "National Service"
 GER_national_service_npd_desc: "Once upon a time, Germany was renowned for its military prowess and strength. The Kingdom of Prussia was recognized globally as a military state, boasting the fourth-largest military in Europe despite having only a fraction of Europe's population. Today, when discussing German militarism, many are reminded of the two world wars. However in reality, without strong armed forces, our nation would have been weak and easily broken by foreign aggressors. Without a powerful military, Prussia would never have been able to unify Germany into a nation-state. Without military strength, we would have collapsed under pressure from both fronts, much like the Austrians during the First World War. Without a capable defence, we would have been unable to resist, and our people would have been massacred like cattle by the Bolsheviks during the Second World War. Militarism has always been-and always will be-central to the German people and their identity. As our adversaries once again approach our borders, we require fresh blood to fill the ranks of our armed forces. Thus, we must reinstate mandatory conscription, which we once foolishly abandoned."
 GER_four_year_plan: "Four-Year Plan"
 GER_four_year_plan_desc: ""The enemy of a good plan is the dream of a perfect plan." - so spoke Clausewitz. We could spend years debating what future we ought to build for our beloved fatherland. But the situation demands immediate action. We will launch a Four-Year Program to restore and massively expand our economy and industry - and we will set it into motion without delay, so that the honest worker feels the change not in some distant tomorrow, but starting today!"
 GER_promote_class_unity: "Promote Class Unity"
 GER_promote_class_unity_desc: "For far too long, our society has been torn apart by philosophical, religious, and - above all - economic divisions. Enemies both near and far fueled this chaos, corrupting our people and using them like dogs on a leash. Never again. This time, through various programs, we will ensure that the workers of Iron Germany stand united - one front, one will, against all who wish us harm!"
 GER_award_the_workers: "Award the Workers"
 GER_award_the_workers_desc: "In the "old" world, every party prioritized international corporations and eastern immigrants over the ordinary German citizen. Today, we put an end to that. The builders of our new, steel-forged, and truly great nation will be rewarded accordingly! Benefits, subsidies, even discount coupons for Lidl and Aldi will rain down upon them! Sure, a few projects might see their funding cut - but that is a small price to pay for the happiness of our people."
 GER_consulidate_financial_capital: "Consolidate the Financial Capital"
 GER_consulidate_financial_capital_desc: "The hard-earned money of honest German workers and taxpayers was squandered by the former liberal junta. Worthless gender programs, green initiatives, dubious foreign investments - worst of all, no one could stop it due to the bloated bureaucracy they created. From now on, our nation's financial capital will be centralized, and every mark will be spent under the Party's strict supervision - for the good of our people!"
 GER_our_national_revolution: "Our National Revolution"
 GER_our_national_revolution_desc: "After years of struggle, losses of many devoted followers, and under so much scorn by the rest of mainstream society, we have finally done it. The old order is finished. The people have spoken. The revolution has come. Our movement now reigns supreme across all of Germany, and it is a glorious sight. Soon everyone will see what we have planned for not just this nation's future, but that of Europe itself. The time for radical change has come, and we will be the unyielding and fervent force that will usher it in."
 GER_implement_10_point_program: "Implement 10 Point Program"
 GER_implement_10_point_program_desc: "Now that we hold supreme authority over the nation, it is time to begin implementing the party's official 10-point program. From attacking foreign capital, dismantling our country's outrageous immigration system, and returning rights and autonomy to the German worker, our policies are direct and straightforward. Unlike the politicians of the past who speak so much about change and do nothing once they win, we are eager to get to work in making our party's vision a reality. Soon every German citizen will see that we stand for both the changes that we've always promised and a credible plan of action to make them all a reality."
 GER_revolutionary_dictatorship: "Revolutionary Dictatorship"
 GER_revolutionary_dictatorship_desc: "There must be no compromise or weakness in our position. All power in the state will be vested in us and us alone. To make way for our rule the decrepit vestiges of the old democracy and the people that ran it will be swept aside. No more obstructive elected politicians, plutocratic capitalists, and treasonous parties and NGOs ready to undermine Germany's sovereignty. All of it will go. Though some will kick and scream over us doing this, the truth remains clear. Nobody will miss any of the feeble institutions and people that led to this country's ruin. It is now the revolutionary iron will of our party that stands alone in guiding Germany into the future, and we have so much planned."
 GER_workers_state: "Worker's State"
 GER_workers_state_desc: "As we remake the German nation into what it should be, we must make our position clear on an ever-important question; who is the government for? Our answer is simple, an answer that the whole nation must know. This country does not belong to the cosmopolitan and liberal capitalists that enrich themselves over us. It does not belong to treasonous politicians and foreigners sitting in gated communities conspiring to sell us out to alien interests. The state belongs to the workers and common folk of Germany, the people itself. They have worked tirelessly for the country and have been robbed by the elites that claimed to represent them. No longer will their interests be ignored or scorned. It is now time for us to do justice and return the country to them."
 GER_break_the_opportunists: "Break the Opportunists"
 GER_break_the_opportunists_desc: "Our rise to power could not have been achieved by only a small number of activists. It was the work of thousands upon thousands of loyal patriots, dedicating themselves tirelessly to the cause. However, we must not be so naïve here. There were many people who joined us simply for their own interests. These are men from other rival parties and groups who upon seeing that they could not secure power for themselves or their comrades joined us to reap the rewards of our success. This opportunism is shameful, and it is now time for us to put our foot down and sweep aside all these slick charlatans. Wherever they hide within our movement, we will expose their malfeasance, root them out from where they hide, and cast them out into the cold. Every party member and citizen must learn that such disgraceful activity has a heavy price."
 GER_strasserite_principles: "Strasserite Principles"
 GER_strasserite_principles_desc: "Gregor and Otto Strasser were men way ahead of their time. In the face of the malfeasance of the communists and the shortcomings of the National Socialists, they were able to articulate the true path forward for the German nation. In the struggle for victory, revolutionary nationalists must not settle on placating anyone. All enemies of German sovereignty from the plutocratic capitalists to the cosmopolitan communists must be defeated. This is a truth that had been revealed but silenced for many years by Strasser's enemies both foreign and domestic, but no longer. There will be no more silence, no more suppression of their ideals. Their principles must become cornerstones of our party's policies, principles that all Germans must hold close to their heart. The ideals of the Strassers will be the bedrock of this nation both for today and tomorrow."
 GER_against_both_evils: "Against Both Evils"
 GER_against_both_evils_desc: "What infuriates us the most is the game of accusations thrown against us by both sides of the commonly accepted political spectrum. The far-left calls us pro-capitalist Nazi thugs while the rich bourgeois conservatives and even others in the far-right call us communists. This is all nonsense. We see the truth beyond this false dichotomy. Unfettered capitalism and communism have both ravaged Germany in almost every way possible. From our cultural heritage to our economic primacy in the world, these two poisons have done incalculable damage both in the past and today. But now it is time to make it known to the world that we will not tolerate these twin threats any longer. Germany will proudly stand to strike down both the hammer and sickle and dollar bill in one blow."
 GER_revolution_against_the_revolution: "Revolution Against the Revolution"
 GER_revolution_against_the_revolution_desc: "To the east of us lies Germany's largest threat in years, the Russians. As we have fought to seize power within Germany they have watched, planned in secret, mobilized their forces, and are now ready to strike. Yet this danger stands as an uncomfortably familiar one to us. Their government is like ours, one that claims to be for the masses and has totally swept aside the old Russia for a new one. Two nations reborn amidst revolution, radical and uncompromising revolution. But they must know that we are not here to fraternize or share the continent. We see the writing on the wall. Only one ideology, one vision, one spirit, one revolution may stand to dictate the future. This is a reminder we will soon impress upon them by force."
 GER_enlighten_the_masses: "Enlighten the Masses"
 GER_enlighten_the_masses_desc: "The people of Germany have been sold countless lies about our movement. They have been told by greedy journalists and scheming politicians that we are thugs and traitors deserving of scorn and hatred. But now the tables have turned, and it is now us that hold a strong grip on this country's information space. It is time for the people to hear our entire program, our truth. Our thousands upon thousands of followers and media apparatuses will be mobilized to enlighten the masses on our mission for Germany's salvation. From TV to the internet, our words will touch every corner of the nation and capture the minds of all who hear it."
 GER_revive_the_sa: "Revive the Sturmabteilung"
 GER_revive_the_sa_desc: "The Sturmabteilung, or the SA for short, was the finest example of mass mobilization of the German people in modern history. The common masses of German patriots, joined together in one unified spirit and vigorous fight, were a mighty force that struck fear into Germany's domestic enemies. This is an institution that we must resurrect with pride, a memory we must bring back. We will mobilize our followers and all those willing to fight for a better Germany in a singular popular combat formation. Our modern SA, equipped with contemporary tools of mass direct action, will be unparalleled compared to any other paramilitary movement on the continent. So raise the flag and tighten the ranks closely! The familiar uniforms of brown and black will come to smite Germany's domestic enemies once more."
 GER_black_front_of_fighters: "Black Front of Fighters"
 GER_black_front_of_fighters_desc: "After the departure of Otto Strasser from the NSDAP, he formed a group dedicated to his cause and ideas; the Black Front. During the last few years of Weimer, they fought for their leader's principles of revolutionary nationalism and resistance to cosmopolitan capitalism before being dismantled by Hitler's new government. But times have changed, the ideas of the Strassers now reign supreme in Germany, and it is only proper for us to resurrect the organization dedicated to those ideas. In the halls of power in Berlin, the offices of local government, and in every other major social and political institution, our new Black Front will serve as the ultimate unifier for both the will of our party and the people. It will not just be a body enforcing such ideas, rather it will be something that will go far beyond anything the Strasser's could have seen for their time."
 GER_revive_our_warrior_spirit_tw: "Revive Our Warrior Spirit"
 GER_revive_our_warrior_spirit_tw_desc: "When god created us Germans, he knew that he was not creating a people of romance, people of kindness, people of love. We Germans were born to be fighters, born to be soldiers. Throughout our long and tumultuous history, we have carved ourselves a rightful place under the sun. It was with blood and sweat that we dug through the other nations above, taking their share of the sunshine. Without war, without bloodshed, without sacrifice, Germany would never have united, the Teutonic people would never have become truly one. The German people were born in blood, and they shall die in blood."
 GER_spirit_of_rommel_tw: "Spirit of Rommel"
 GER_spirit_of_rommel_tw_desc: "Without a doubt, if there's one military tactic that has defined our brilliance for decades after the war, it is Blitzkrieg. It is our focus on fast, aggressive, and flexible maneuvers to outflank our enemy and overpower their forces without much fighting which has lead to our undeniable dominance over the European continent and the near total capitulation of the British in Egypt and the Soviets in the east.\n\nYet, mainly due to certain incompetence by our allies and ourselves, has led to our capitulation to the Allies and the subsequent humiliation which followed. This time, we'll learn from our past mistakes and ensure this second chance goes right.\n\nThanks to the desert fox and his genius leading to the near capitulation of British North Africa, we shall follow his example. We shall master the arts of combined arms tactics as well as initiative and improvisation to ensure our enemies may never triumph over us again."
 GER_national_service_tw: "National Service"
 GER_national_service_tw_desc: "Once upon a time, Germany was renowned for its military prowess and strength. The Kingdom of Prussia was recognized globally as a military state, boasting the fourth-largest military in Europe despite having only a fraction of Europe's population. Today, when discussing German militarism, many are reminded of the two world wars. However in reality, without strong armed forces, our nation would have been weak and easily broken by foreign aggressors. Without a powerful military, Prussia would never have been able to unify Germany into a nation-state. Without military strength, we would have collapsed under pressure from both fronts, much like the Austrians during the First World War. Without a capable defence, we would have been unable to resist, and our people would have been massacred like cattle by the Bolsheviks during the Second World War. Militarism has always been—and always will be—central to the German people and their identity. As our adversaries once again approach our borders, we require fresh blood to fill the ranks of our armed forces. Thus, we must reinstate mandatory conscription, which we once foolishly abandoned."
 GER_take_in_ukrainian_refugees: "Take in Ukrainian Refugees"
 GER_take_in_ukrainian_refugees_desc: ""
 GER_mobilize_the_industry: "Mobilize the Industry"
 GER_mobilize_the_industry_desc: ""
 GER_modernize_national_socialism: "Modernize National Socialism"
 GER_modernize_national_socialism_desc: "Many years have passed since the reign of the Third Reich. Society, culture, technology, values, and everything imaginable about human civilization has changed dramatically, so much so that if Hitler were alive today, he would think of himself as witnessing Martian civilization rather than German civilization. Simply put, times have changed, but that doesn't mean we shouldn't change with it. It is now time for National Socialism to dust off the cobwebs of history and place itself in the here and now. The core theories will remain the same, but it will all be placed in the context and analysis of our twenty-first century lives. From immigration to globalism to the threat from the east, National Socialism will be made fully up to the task of engaging all the concerns of modern Germany. The Hakenkreuz stood for German salvation and power then and it will stand for the same now in ways the Germans of today can clearly understand."
 GER_mastery_of_propaganda: "Mastery of Propaganda"
 GER_mastery_of_propaganda_desc: "Joseph Goebbels was a master in propaganda, spreading the word of National Socialism across Germany and enticing millions for the war effort. however, our message faces new obstacles: foreign influence, subversive elements, and the constant stream of globalist rhetoric. but unlike our predecessors, we have access to tools they could only dream of, Social Media. Although a tool formerly used to spread lies about our ideology and suppress our ideals, by taking control of the media, we can not only unveil the truth of National Socialism but we can also rid the nation of the globalist degeneracy that has plagued this country and it's people for so many years."
 GER_our_new_struggle: "Our New Struggle"
 GER_our_new_struggle_desc: "By some miracle, National Socialism has returned to Germany after 80 years. Our predecessors came close to victory, yet faltered at the gates of Moscow. We cannot afford to repeat their mistakes for if we fail now, the flame of National Socialism may be extinguished forever."
 GER_the_new_germania: "The New Germania"
 GER_the_new_germania_desc: "Our ambitious Führer once planned to build a mega city, one that would eclipse the wonders of Babylon and the grandeur of ancient empires. Yet, with his defeat, that dream was left to rot. Berlin today lies a mess, littered with trash and it's architecture stripped of it's former glory.\n\n We will rebuild Berlin from the ground up, restoring it's glory and beauty that it always has had. The new capital will be a beacon for a prosperous future, a monument of our strength and a city filled with Aryans."
 GER_kick_down_the_door: "Kick Down the Door"
 GER_kick_down_the_door_desc: "The time has finally come to break deep into the homes of the Russians. This time it will be their blood, their people that shall pave the way for our advancement. There was a time when I would never have considered the nuclear option, but no longer. We tried showing love, once. But that was not enough! We turned the other cheek and they smacked us on both! This time, we will tear down their crystal palace, one which they built with the suffering of countless people. It's time to kick down the door."
 GER_winter_logistics_training: "Winter Logistics Training"
 GER_winter_logistics_training_desc: ""  
 GER_the_triump_of_populism: "The Triumph of Populism"
 GER_the_triump_of_populism_desc: "After so much hardship, so much death, and so much destruction, we have come out victorious in the European War. Many mainstream analysts believe that our party could not lead the German nation to victory, towards a better future; but now, they are all silent. The destruction wrought by the war is inconceivable, to both our allies and our nation. But, we cannot allow ourselves to fall into complacency like others surely would, no, we need to flourish! Now is the time to rebuild, time to prove the naysayers even more wrong. The AFD will forever be known as the party that led Germany out of irrelevancy, and into an era of prosperity!"
 GER_revive_nuclear_energy: "Revive Nuclear Energy"
 GER_revive_nuclear_energy_desc: "One of the many things that our previous heads of government have failed to understand is that nuclear energy is not a force of destruction and tragedy; it's a force of good. They held the belief that nuclear power plants were death traps and not worth the benefit because of events such as the Chernobyl and Fukushima incidents. They were wrong, while these disasters were tragedies, they are the result of human error nearly every single time. It is time we toss away this antiquated fear of nuclear fission, and embrace the aid that it will bring to our energy infrastructure and our people." 
 GER_free_up_the_economy: "Free Up the Economy"
 GER_free_up_the_economy_desc: "For too long, the German economy has been plagued by bureaucratic bloat as a result of the constant government spending under previous heads of state. The truth is that the German economy is in a more fragile state than it ever has before. With Eastern Europe destroyed and Europe once again at peace, we have a perfect opportunity to rid ourselves of this fluff that has rotted our economy from within for too long. We must finally put these useless programs within the government on the cutting block. With this, we will place our nation's economy on stable ground." 
 GER_support_the_militarized_industry: "Support the Military Industry"
 GER_support_the_militarized_industry_desc: "After the start of the European war, the military industry of our nation grew at exponential rates, and continued to do so during the course of the war. But now, the war has ended and the Russian bear has been beaten back to the east. Because of this, we are falling into the same trap that we did before the war: complacency. We must remember now more than ever that conflict can strike in a moment's notice. The military industry is our lifeblood to respond quickly and decisively against these potential threats, and we certainly cannot let them fall to the wayside as our nation marches towards the future." 
 GER_negotiate_with_the_russians: "Negotiate with the Russians"
 GER_negotiate_with_the_russians_desc: "To say that the German people and the Russians have had extreme differences would be an understatement to the highest degree. But, the Russian bear has now been effectively declawed in the aftermath of the European war, with their occupied territories being liberated by our allies at NATO. Unfortunately for us, the Europeans have been increasingly harder to work with, even after the war. Now, with the Russians in desperate need of allies and economic partners, it is time that we swoop in and extend an olive branch to the devastated Russians. With the proper negotiations, we will surely reach an acceptable economic deal with them."  
 GER_cooperate_with_europe: "Cooperate with Europe"
 GER_cooperate_with_europe_desc: " It is safe to say that our party and the European parliament disagree with a wide array of issues. But, when the Russians stormed the borders of Ukraine, we were forced to set these disagreements aside for the sake of our sovereignty. But now, the dust has settled over a shattered Europe, and we are faced with a dilemma: do we strengthen ties with Europe or do we reach out to the Russians? The answer is clear to us, the Russians are clearly preparing for something, and they have proven that they cannot be trusted. We must continue to cooperate with Europe, and strengthen our ties with them."  
 GER_one_nation_one_people: "One Nation, One People"
 GER_one_nation_one_people_desc: "Germany, Deutschland, whatever you may call it. It's the beating heart of Central Europe and Western Civilization as a whole. Time and time again, we have proven our abilities as a nation, through perseverance through the greatest hardship. And our people, the strongest of them all, we survived famines, we survived disease, and now we survived the threat of the Russian hordes. We were led into muck by incompetent politicians, who let thousands of illegal migrants into our nation with their policies, we were placed into complacency by them. But, populism led our people out of irrelevancy and onto the world stage! We, AFD, have proven ourselves as a party, and have led Germany to the future. We are prepared for whatever challenge we may face next, whether it be Russians or something else, we will triumph!"
 GER_relocate_the_economy: "Relocate the Economy"
 GER_relocate_the_economy_desc: ""
 GER_no_more_weakness: "No More Weakness"
 GER_no_more_weakness_desc: "For too long our country has been run by traitors. American, Soviet and Globalist collaborators that sucked the last juices out of the German nation and swept the pride in our historical accomplishments under the rug of consumerism and multiculturalism.\n\nThe suffocating yoke could be felt even after the fall of FRG with all the same old leftist opportunists now changing their clothes just to take and retain power.\n\nBut the People can not be fooled anymore, enough is enough! The construction of a self-reliant, strong and ideologically united Germany begins with our revolution!"
 GER_strengthen_the_grip: "Strengthen the Grip"
 GER_strengthen_the_grip_desc: "Our geographical position, our previous regime's naivety and incompetence, as well as constant downturns and downsizing had left our nation vulnerable to attack from all directions - both inside and out.\n\nThe Volkskammer's new directives are meant to improve Germany's standing in Europe and to ensure the safety and well-being of our People. The Stasi and NVA will work in tandem to consolidate historic German land and target hazardous elements within."
 GER_honour_the_army: "Honour the Army"
 GER_honour_the_army_desc: "One failure after another, German leadership would fail to make the right conclusions. So-called politicians and the ruling class failed to deliver on the most outstanding issue of today - the security and the self-defence capability of our nation.\n\nWe will not make the same mistake!\n\nNow our priorities, governance systems and economic decisions will all be made with the military in mind. Our new politics are all for the army - none for the elites and freeloaders!"
 GER_old_guard_new_revolution: "Old Guard, New Revolution"
 GER_old_guard_new_revolution_desc: "We have managed to achieve what no other party, or group, or class could've done before. We've built a coalition that wasn't thought possible. And it's no parliamentary coalition, a combination of money, a lullaby for the poor, hungry and humiliated nation.\n\nOurs is an alliance of ideas. From the left and the right. From the old and the new guard. From different stratas and from different times, all united under a single cause - for the great German nation and for a strong German state!"
 GER_raf_romanticism: "Glorify Our Struggle"
 GER_raf_romanticism_desc: "Our history knows many revolutionaries, brave fighters against capitalism, from both the right and the left.\n\nIt's a path full of hardships and sacrifices, but thanks to those heroes, we can reshape Germany today.\n\nWe must immortalize their deeds in the culture and every day life of our country, so that all Germans would remember them!"
 GER_new_german_spirit: "New German Spirit"
 GER_new_german_spirit_desc: "The spirit of liberal democratic bourgeois Germany has died, along with the state that supported it. It has decayed beyond belief and dragged us into misery of decadence and defeat.\n\nNow is a time for a new spirit with healthy nationalism, a moral revival of our People that have been looked down upon for so long. It's time for German culture and traditions to be recognized again!"
 GER_deconstruction_of_post_modernity: "Deconstruction of Post-Modernity"
 GER_deconstruction_of_post_modernity_desc: "Today's big victory for Germany is just one small step forward for the rest of the world. A small one, yet not insignificant.\n\nQuite ironically, by trying to grip power as hard as it did, it has prepared its own demise. Within its virtues also lie vulnerabilities - which we know, because we spent our lives studying them.\n\nNow, people from all over the intellectual spectrum, the underground, the mainstream; scientists and amateurs - all have come to participate in the grand project of deconstructing capitalism.\n\nFirst - metaphorically, taking each aspect of post-modernity, looking over it, questioning: "How did we get here?", and answering: "How to get out of here".\n\nFor many it used to be a hobby. But now it's a framework for the literal deconstruction of capitalism as a system."
 GER_exiting_the_vampire_castle: "Exiting the Vampire Castle"
 GER_exiting_the_vampire_castle_desc: "Late-stage Capital is guilty of innumerable crimes, but there is one that is truly vile, and it must be addressed immediately.\n\nCapitalism killed social cohesion, suppressed collectivism, stomped the feelings of comraderie between people and crushed true plurality. It has split our life into its own rights and wrongs and scarred entire generations with bullying and shaming. They are burned out, lonely and scared of what tomorrow holds.\n\nWe have to take measures to bring faith back into people's souls and fire into their hearts. A new age of progress and prosperity lies beyond the wall of old prejudices!"
 GER_phase_out_capital_fundamentalism: "Phase Out Capital Fundamentalism"
 GER_phase_out_capital_fundamentalism_desc: "The world is entrapped in the cycle of capitalism, an unending labyrinth, a cult, a spinning wheel that humans run in with no purpose.\n\nThis system has long stopped benefitting even its masters, and yet we continuosly uphold it. And it's taking its toll - like a religion, demanding more and more sacrifice, turning people into the worst kinds of slaves - ones that think they are free.\n\nWe must destroy the fundamentalist cult that capitalism has become and break any illusions the people had about it - it's a matter of both principle and survival."
 GER_detox_from_nostalgia: "Detox From Nostalgia"
 GER_detox_from_nostalgia_desc: "Time has proven that Germans are some of the most nostalgic people that ever lived - for worse, as our experience has shown.\n\nCapital has always abused this feeling, masterfully playing the flute of nostalgia to lead Germany to ruin again and again. Manipulative and deceitful, it convinces you that life was once happier, grass was greener and our country was greater, and that you can go back to those times if you just do everything they say - what a joke!\n\nOur nation will no longer strive towards the decaying buildings of orders before us. We have learned from its mistakes - now there is nothing but new ahead."
 GER_redefine_marxist_ideals: "Redefine Marxist Ideals"
 GER_redefine_marxist_ideals_desc: "Marxism - how much meaning that word has garnered over the years! It has become one of the foundational principles of thinking in the modern world and the meaning of life for millions of people across the globe.\n\nWe love it because Marxism is a philosophy ever changing, ever evolving. Its history is the struggle that led us to where we are today. But we will not stand by those who still play around with 20th century Marxism - we must do what Lenin, Stalin and Mao did, adapt to modern circumstances and reflect it in our own line of thought.\n\nWe will pick up on Marxism, we will develop it and carry it with us to the stars - or perhaps, it will carry us? Well, it's a dialectical paradox worthy of a debate."
 GER_accelerate_into_a_brighter_future: "Accelerate Into a Brighter Future"
 GER_accelerate_into_a_brighter_future_desc: "This is a moment long overdue, and yet,\nnone of us doubted that it would come.\n\nCapitalism has run its course. It may have been fresh and useful once, but now it's only a rotting corpse hanging over the Earth. It's our duty and obligation to rid civilization of this barrier! Blow it up, so we could move to the next stage of prosperity!\n\nBut not only will we dismantle the economic and societal institutions that still uphold capitalism - we will get rid of the inner chains that hold back the free and artful nature of every human!\n\nEmancipate, and throw away your hollow shell!\nTake up your tools and weapons, fight to be yourself!\nAccelerate, may history forever march without an end!\n\nFASTER!\nFASTER!!\nFASTER!!!\nFASTER!!!!"

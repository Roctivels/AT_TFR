 GER_extremism_category: "Federal Office for the Protection of the Constitution"
 GER_extremism_category_desc: "German history is marred with terror, bloodshed, and oppression. It must never happen again. From the Nazis and their genocidal rampage across Europe, and their heinous policies at home, to the Communist Stasi state that kept our people apart and divided for over 40 years, the shining democracy of the Federal Republic will make sure that never happens again. Despite the massive amounts of terror and death that both regimes inflicted on the German people, there are still people out there who wish to see those regimes restored. That is why the Federal Office for the Protection of the Constitution exists. Extremism, Radicalism, Totalitarianism, must all be stopped at whatever the cost. And if these groups are to gain power, then they must be stopped §Rby force§!\n\nLevel of §CRight Wing Extremism§!:§Y[?GER_right_extremism_var|%2]§!\n\nLevel of §OLeft Wing Extremism§!:§Y[?GER_left_extremism_var|%2]§!"
 european_union_category: "The European Union"
 european_union_category_desc: "\n\n\n\n\n£GFX_GER_eu_federalization_banner\n\n\n\n\n\n\n\nThe European Union stands as one of the strongest international institutions in the world. With the combined strength of most of continental Europe, it facilitates a free flow of information, workers and goods throughout Europe.\n\nCurrent $GER_federalization_progress_name$: §Y[?GER.eu_fed_var|1%]§! (£civ_factory_output [?GER.eu_fed_var_dynamic_var|=+1%], £consumer_goods_texticon [?GER.eu_fed_var_dynamic_var|=-1%], £GFX_coordination_texticon [?GER.eu_fed_var_dynamic_var|=+1%], and £GFX_dx [?GER.eu_fed_var_dynamic_var|=+1%])\n\nCurrent £GFX_GER_euroskepticism_texticon Euroskepticism is §Y[?GER.eu_euroskepticism_var|1%]§!\n\nCurrent Visegrad Seperatism is §Y[?GER.eu_visregard_sepratism_var|1%]§!\nEffects of Seperatism: £pol_power [?GER.eu_visregard_sepratism_dynamic_var|=+2]" 
 GER_parties_category: "The German Political Sphere"
 GER_parties_category_desc: "\n\n\n\n\n£GFX_GER_bundestag_banner\n\n\n\n\n\n\n\nThe [GER.GetName] is one of the most democratic nations on earth, where elections mirror the will of the people and safekeep our democratic values with each and every ballot cast.\n\nFor years, our political waters have remained calm, but even the most tranquil ocean can be easily stirred by a storm. Still, so long as we stay the course, then we shall withstand anything that is thrown at us.\n\nWithin the halls of the Bundestag, debates about issues at home and beyond rise and fall, but remain committed to unity, justice and freedom. So long as these doors remain open, so too does the promise of peace.\n\nTotal Bundestag Support: [?GER_support_bundestag_total_var|Y1%][GER_bundestag_faction_die_linke_text][GER_bundestag_faction_spd_text][GER_bundestag_faction_greens_text][GER_bundestag_faction_fdp_text][GER_bundestag_faction_cdu_text][GER_bundestag_faction_afd_text]"
 GER_turkish_gamble_category: "The Great Turkish Game"
 GER_turkish_gamble_category_desc: "Turkey stands at the crossroads of the West and the East. Despite our conflicts regarding the Kurdish peoples, as well as their increasing cooperation with Russia, Turkey still stands as a NATO ally. It's strategic location in the bosporous straits makes it imperative to NATO Black Sea defense plans. Thus, it is important that we make sure that Turkey stays within our sphere.\n\nOur Current influence over Turkey is §Y[?GER_Turkish_Influence]§! Points. At §G80§! points we will be able to §Rsecure§! Turkey's loyalty as a NATO member.\n\nTurkish elections are to be held on §YMay 14th, 2023.§"
 GER_war_on_authoritarianism: "Operation Global Enforcer"
 GER_war_on_authoritarianism_desc: "The war against Russia has proven now more than ever that the world is threatened by authoritiarism. Europe stands as a beacon of democracy and freedom and it is our duty to export these virtues to all oppressed people's wherever they be.\n\nIf they do not wish to see the light peacefully, then they will by force..."
 GER_eastern_european_development: "Ukrainian-Belarussian Redevelopment"
 GER_eastern_european_development_desc: "Despite our victory over Russia, the lands of Eastern Europe have been heavily devistated. Now is the time for peace and rebuilding, we must aid our new allies to ensure their full recovery!"
 GER_private_military_companies: "Private Military Companies"
 GER_private_military_companies_desc: "Erm blackwater?>??"
 GER_legion_recruitment: "Foreign Recruitment"
 GER_legion_recruitment_desc: "Erm blackwater?>??"
 GER_new_political_sphere_category: "New German Political Sphere"
 GER_new_political_sphere_category_desc: "\n\n\n\n\n£GFX_GER_new_political_sphere_banner\n\n\n\n\n\n\n\nOur country has been poisoned by years of liberal globalist decadency. The main reason we've lost the war was that our people forgot what it's like to be a great country, and frankly, it's time we remind them.\n\n"
 GER_five_year_plan_cat: "The Five Year Plan"
 GER_five_year_plan_cat_desc: "Capitalism has been a disaster for the German economy. Over thirty years ago capitalists have robbed and ruined the people's enterprises of the Eastern part of our country and completely subjugated us to NATO, and now they forced us into an unwinnable war with Russia that destroyed our economy. It was a matter of time until this system would fail.\n\nThe Volkskammer has ruled out the creation of the Five Year Plan to undo the failures of the previous regime, to recover and multiply the industrial capacity of Germany, so we could defeat fascism once and for all!"
 GER_socialist_market_economics_cat: "Socialist Market Economics"
 GER_socialist_market_economics_cat_desc: "Capitalism has been a disaster for the German economy. Over thirty years ago capitalists have robbed and ruined the people's enterprises of the Eastern part of our country and completely subjugated us to NATO, and now they forced us into an unwinnable war with Russia that destroyed our economy. It was a matter of time until this system would fail.\n\nThe Volkskammer has ruled out a new economic plan to undo the failures of the previous regime, to recover and multiply the industrial capacity of Germany, so we could defeat fascism once and for all!"
 GER_spread_the_revolution_category: "Spreading the Revolution"
 GER_spread_the_revolution_category_desc: "0_o"
 GER_peoples_economy_category: "Volkswirtschaft"
 GER_peoples_economy_category_desc: "Germany has long stood as the economic engine of Europe, but recent years of energy instability and strained trade relations have pushed our nation toward a decisive crossroads.\n\nTo navigate this era, we now rely on two strategic economic tools:\n\n§7£GFX_GER_green_economy_points_texticon Green Economy Points\:§!\n§gEarned through environmental reforms, renewable energy expansion, innovative ecological solutions, and sustainable industrial measures.\nThey reflect resilience, innovation, efficiency, and ecological responsibility.§!\nCurrent §7£GFX_GER_green_economy_points_texticon Green Economy Points\:§! [?GER_green_economy_points_var|+0]\n\n§3£GFX_GER_blue_economy_points_texticon Blue Economy Points\:§!\n§gGained by deepening Germany's integration within the European economic framework. Strengthening EU cooperation, stabilizing regional supply chains, and supporting continental development goals.\nThey reflect integration, industrial capacity, and social responsabilty.§!\nCurrent §3£GFX_GER_blue_economy_points_texticon Blue Economy Points\:§! [?GER_blue_economy_points_var|+0]\n\nChancellor, by balancing ecological renewal with European coordination, you may restore prosperity and secure Germany's place as a leading power on the continent."
 GER_bundeswehr_category: "Bundeswehr"
 GER_bundeswehr_category_desc: "The modern German military was never considered a fully independent force to be reckoned with, but now it's obvious like never before that it's a total lackluster with an absolute lack of recruits and funding.\n\nTo revive faith in the Bundeswehr is to revive our national pride."
 GER_european_armed_forces_category: "European Armed Forces"
 GER_european_armed_forces_category_desc: "If we wish to fend off the Russian bear once and for all, we must take a look at what we'll use to defend them. A disunited bloc of multiple states each trying to do be the best in each category. The only way to success is by unity. Unity in our armed forces is essential to achieve this. However, this unity isn't as easy as giving a few speeches in Brussels.\n\nTreaties must be written and rewritten. Pacts must be formed. Our soldiers and commanders need new training and organizations. And our people must support this all the way through. These reforms aren't meant to be passed overnight. But they're in need to be passed either way. Our future and of our children's depends on it. It's the only way our freedom might survive.\n\n@BRS §YIN VARIETATE CONCORDIA.§! @BRS"
 ISR_GER_solomon: "OPERATION: SOLOMON"
 ISR_GER_solomon_desc: "The main NATO ally in the Middle East, Israel, has come under attack of an Arab coalition. Under the veil of the usual ethnic and religious hatred and humanitarian concerns, they are trying to put the very existance of Israel under question. We can not allow them to succeed.\n\nNATO Command has authorized and the Bundestag has approved all necessary military support, up to a limited military contingent of NATO troops, in order to ensure Israel's right to self-defence.\n\nWe must show the world that NATO is capable of defending its allies abroad."
 GER_spartanist_cat: "National Revival"
 GER_spartanist_cat_desc: "\n\n\n\n\n£GFX_GER_querfront_cat_banner\n\n\n\n\n\n\n\nEver since politics have been split into right and left, there has been a movement to unify the two - what is called Querfront in German, or a "Cross-Front" - an alliance of necessity against the forces of capitalism and outside enemies.\n\nAlthough in Germany this concept hasn't had much success in the 20th century, other countries did have positive experience mixing the ideas of nationalism and socialism, and Germany has much to learn.\n\nThe historic circumstances have pushed the right and left into a coalition with each other, now the path that Germany will take is in our hands."
 GER_lacc_cat: "Revitalizing Human Spirit"
 GER_lacc_cat_desc: "\n\n\n\n\n£GFX_GER_lacc_cat_pic_banner\n\n\n\n\n\n\n\nBetween the red lines that go up and down and the ever-growing suppression of human expression, it would be without a doubt that stagnation would start to become a tumour on society as a whole.\n\nCapital is a hostile deity that lives off the suffering of sentient life and with the mask of neo-liberalism this has only become more and more blatant.\nOne of our biggest tasks at hands is to undo the scars capital has left behind, a spiritual detox from the shackles of nostalgia\n\n"It is easier to imagine the end of the world then to imagine the end of capitalism."\nBut, let's not only just imagine the end of capital, let's put an actual end to it as well.\n\nKill the past, embrace the future, reject the roots that stop, incorporate the roots that grow."
 GER_agenda_2040_cat: "Agenda 2040"
 GER_agenda_2040_cat_desc: "\n\n\n\n\n£GFX_GER_agenda_2040_cat_banner\n\n\n\n\n\n\n\nThe uneducated have made many guesses regarding our plans, some too absurd while others a little bit too close to the truth, nonetheless, we are the ones holding the wheel of humanity.\n\nAgenda 2040 is an outline of our goals, ideals and plans in order to cement the power that was granted to us many years ago. With our forecast of the chaos that descended upon the world, Europe has become a playground for our think tanks to bring forth a safe haven from the rising flames."
 GER_gunthers_twitter_cat: "https://x.com/GunterFehlinger"
 GER_gunthers_twitter_cat_desc: "\n\n\n\n\n£GFX_GER_gunthers_twitter_cat_banner\n\n\n\n\n\n\n\nUkraine & Kosovo must join NATO 2035\nCanada, UK, Iceland, Norway, Albania, Kosovo inEU 2039!\n@KOS @UKR @ARM @BOS @AUS @ISR @MOL @IRE @MLT @AZR @GEO @CYP @GER\n\n£GFX_GER_twitter_briefcase  §gPresident of the European Union\n£GFX_GER_twitter_location  under EU Nuclear umbrella§!    £GFX_GER_twitter_link_ti  §2youtube.com/£GFX_GER_dont_at_me_blue_ti guntherfehlin...§!\n£GFX_GER_twitter_date  §gJoined June 2013§!\n\n[GER_gunthers_twitter_following_count_text][GER_gunthers_twitter_followers_count_text]\n§gNot followed by anyone you're following§!\n\n  Posts                 Replies              Subs                Highlights              Media"
 

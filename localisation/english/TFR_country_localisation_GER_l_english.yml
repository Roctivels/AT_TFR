 GER_military_reformation_communist_dynamic: "Nationale Volksarmee"
 GER_military_reformation_communist_dynamic_desc: "With the political and social revolution we have instituted in this country also comes a revolution in Germany's armed forces. The old capitalist Bundeswehr is currently undergoing nothing short of an expansive and systemic reform and restructuring. New units are being formed, doctrines are being revised, new standards instituted, recruitment expanded; the ongoing changes are difficult to quantify. Even though it may seem turbulent for the loyal soldiers and officers of the military, the restructuring will soon birth a modern and proletarian armed forces the world can look up to."

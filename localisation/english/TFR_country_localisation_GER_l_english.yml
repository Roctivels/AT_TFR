 germany.159.t: "Germany Invades the Czech Republic"
 germany.159.d: "In what seems like a repeat of history, German Forces once again roll into the borders of the Czech Republic, overrunning the local border guards and settlements along the border. With the [GER.GetName] stating the goal of it's full-scale invasion aims at toppling the current government in Prague.\n\nAt midnight, air raid sirens rang out in several major cities including the capital, with local authorities urging it's residences to evacuate all key major cities as German Forces spearhead towards at all directions. With the government already announcing full military mobilisation and calling of reservist forces, the refuge columns already number in thousands just hours after the initial invasion.\n\nFor now, the Czech Republic lays at the mercy of the [GER.GetName]."
 germany.159.a: "Hey, I've Seen This One Before!"

 germany.264.t: "The Duel of Gentlemen"
 germany.264.d: "Rain trickled down the ruins, forming murky streams along streets scarred by artillery fire. Alexander Petrov crouched behind a collapsed wall, his rifle having fired its last bullet. Across the street, a German soldier hid behind a wrecked armored vehicle. They both knew the other was out of ammunition.\n\nThe street reeked of gunpowder, mixed with the dampness of rain and dust. Alexander recalled his mother's words - that every man should die like a warrior in war. Rising to his feet, rain dripping from his uniform, he shouted in heavily accented German, "Come on, let's end this fight like men!" He raised his fists, adopting a boxer's stance, his voice echoing through the desolate street.\n\nOtto Bredo watched the Russian rise, a faint, almost imperceptible smile touching his lips. He held a pistol in his hand, loaded with a single bullet-one he had deliberately saved for the end. As Alexander swung what he thought would be the most honorable punch of his life, Otto calmly raised his arm.\n\nThe gunshot rang out, unnaturally sharp in the rain. Alexander fell, his face still frozen in the expression of courage he had hoped to display.\n\n The rain poured harder, washing the fresh crimson from the ground."
 germany.264.a: "The rain grew heavier."
 germany.265.t: "Like a Sore Thumb"
 germany.265.d: ""Excuse me, officer?" An old woman asked, approaching Lukas Müller.\n\nLukas was not, in fact, a police officer. He was someone hired at the last second by the orchestrators of this festival to provide some semblance of security. He was given a baton, some pepper spray, and one pair of handcuffs. Not even a taser. However, he didn't intend on arguing with an old lady about his profession a week before Christmas.\n\n "Yes, how may I be of assistance?" He asked the woman.\n\n"There's a strange man loitering by that truck over there." The lady replied, gesturing to the far end of the festival.\n\nA strange man "loitering?" Yes, this was surely worth his time. Maybe on the way over he'd bust someone littering, oh, and a jaywalker as well! On the other hand, checking out this loiterer would probably be more entertaining than standing around in the cold.\n\n"You leave it to me, go enjoy the festival." Lukas said reassuringly, and set out for the "strange man."\n\nHowever, as he approached the truck the lady was pointing at, he realized her concern may have carried a bit of merit. The loiterer turned out to be a jittery man of Arab descent, probably around thirty. He was standing right in front of the truck door and inspecting the crowd. Was he planning on stealing the truck or something?\n\n"Hey, is that your truck?" Lukas called to the increasingly suspicious man.\n\nThe man's eyes bulged and, likely mistaking Lukas for an officer, bolted down the street. Immediately, Lukas began sprinting after him, now fully believing this man to be a criminal of some sort. However he could never close the head start the Arab had over him, and Lukas soon found himself giving up.\n\nHe decided it would be easier to dial the police and let them deal with it."
 germany.265.a: "Dealing with that is above my pay grade."
 germany.266.t: "Avid Collector"
 germany.266.d: "The knock came just after dusk against the frame of the old wooden door. Frau Klein, an aged widow, shuffled to answer it. In front of her door, a suited man with a well-practiced smile.\n\n"Frau Klein," he began smoothly, "I represent a historical society with a keen interest in preserving relics of the DDR. I understand you might have such items in your possession."\n\nHer eyes darted to his bag, then to the glint of his polished shoes. She said nothing, motioning him inside. From a chest beneath the window, Frau Klein pulled out her treasures: a faded banner of the Freie Deutsche Jugend, a worker's medal, and a cracked portrait of Honecker. The man's eyes gleamed as he leaned in, fingers twitching as if itching to claim the artifacts.\n\n"These are remarkable pieces," he said, his tone slightly predatory. "A living history. My organization would gladly compensate you handsomely for them."\n\nFrau Klein stared at him for a long moment, her lined face unreadable. "These items," she said softly, "are not for sale. They belong to the people, to the unwavering and reorganized government of the Party, not to capitalist collectors or speculators.""
 germany.266.a: "Memories never change."
 germany.267.t: "The Thin Gray Line"
 germany.267.d: "Officer Weber tapped a report against the edge of his desk, his expression like the winter beyond the frosted windows. "Another one," he muttered, sliding the report toward Officer Müller. "Some kids cornered a mufti in the U-Bahn. Beat him half to death. Left him with a sign around his neck, 'Enemy of the People.'"\n\nMüller glanced at the report, an eyebrow raising slightly. "Sounds familiar," he said with a thin smile. "Reckon the Stasi would be proud."\n\nWeber's jaw tightened. "Don't romanticize it. These are politicized thugs, not revolutionaries."\n\nMüller leaned back, the creak of his chair filling the silence. "And what do you suggest? Go after them? You think anyone in Berlin will thank us for stopping kids from breaking the bones of fascists or corporate stooges?"\n\nOfficer Weber exhaled slowly. "You forget how these things go," he said, his voice low. "Today it's the corporate parasites, tomorrow it's someone like us. Remember what they called 'self-criticism' back then? What do you think they'll call it when they come for us?"\n\nMüller's smirk faltered, just slightly, before he stood and grabbed his coat. "Maybe they're cleaning up the rot. Maybe that's all this country's ever needed.""
 germany.267.a: "Rot never stops, it eats."
 germany.268.t: "Brandenburg Gate"
 germany.268.d: "Karl leaned back in his chair, the glow of his screen as he called with his friend on Discord. "It's more than that, Dmitri. Berlin feels alive again. The workers are singing in the streets, councils are forming, it's like we've finally remembered who we are."\n\nDmitri chuckled softly. "A rebirth, yes. It reminds me of the stories my grandfather told about October. But..." His voice wavered.\n\n"But what?" Karl pressed, though he already felt the shift in tone.\n\nDmitri hesitated. "It's in the speeches. Beneath the pride, there's anger. At the West, yes, but also at us. At Russia."\n\nKarl spoke, internally pacing. "But we're building something new, Dmitri. We're supposed to bury the past, not dig it up again."\n\nDmitri sighed. "Anger doesn't fade so easily, comrade. Especially not in your country. History... it rises again like zombies."\n\nKarl paused, staring at the flickering red banners outside his window. "If this turns into war, everything we've built will burn."\n\n"Perhaps," Dmitri replied. "But the past never stays buried, Karl. Not here. Not in Russia. And certainly not in Germany.""
 germany.268.a: "The dead never rest for the left."
 germany.269.t: "Old Relics, New Men"
 germany.269.d: "The clearing buzzed with excitement as the soldiers stumbled upon the towering figure, half-hidden by overgrown weeds and time itself. It was unmistakable, even in its weathered state. It was Lenin, arm outstretched, frozen mid-command as if calling out across decades.\n\n"Look at this!" one of the soldiers shouted, already brushing away frost from the pedestal. His gloves left smudges of clean stone beneath the dirt. "It's him, isn't it? Its Comrade Lenin!"\n\nThe others rushed closer, their boots crunching over frozen ground. A young private ran his hand along the base, his fingers tracing faded Cyrillic letters with a mix of curiosity and pride. "Imagine... the Union once built this," he whispered, almost childlike.\n\nA soldier climbed up, balancing precariously to drape a spare jacket over Lenin's shoulders. "Can't have him freezing out here," he joked to cheers.\n\nOne soldier leaned back against the pedestal, grinning as he looked up. "Do you think they'd be proud of us?" he asked, gesturing to the statue above. "Yeah, he would. He wouldn't be proud of his countrymen though.""
 germany.269.a: "A giddy sense of home."
 germany.270.t: "A Song of Ice and Fire"
 germany.270.d: "The battlefield stretched across the Polish plain in the mid-winter. The Panther, clad in crimson-painted steel, a knight-errant of revolution bearing the banner of a fractured Europe.\n\nAcross the charred expanse loomed its foe: the Armata, a hulking beast of iron and shadow, a white "Z" on her hide, its cannon her primeval dragon.\n\nThe Panther advanced, firing first its lance of fire slicing through the air, striking the beast's hide. Sparks erupted where the shell met armor, but the dragon remained, its armor scorched but unbroken. The Armata bellowed in response, unleashing a torrent of flame and fury. The blow slammed into the Panther's side, leaving a deep, smoking wound on its armor, but the tank refused to falter.\n\nThey circled each other, knight and monster, the frost-covered earth trembling as they did. The Panther charged again, its turret pivoting, its aim poised for the final strike. The shell struck, piercing the Armata's scaled hide, igniting an inferno within the beast. Smoke billowed from its wounds, a guttural, dying sound, and crumbled to the ground in a heap of smoldering ruin.\n\nThe Panther did not pause to celebrate; it turned toward the horizon, towards the bitter ruins of Warsaw."
 germany.270.a: "In some ways, a story of heroes."
 germany.271.t: "The Bee Revolution in the Basement"
 germany.271.d: "In the basement of an abandoned brewery, a group of university students sat around a peeling round table. Scattered across it were crumpled sheets of paper scrawled with words like "alienation," "dialectics," and "Marxism." They had just ingested about 200 micrograms of LSD and were now immersed in a psychedelic whirlpool.\n\n"Look," Hans said, staring at an imaginary point on the ceiling, "the alienation of capitalist society is like the bricks in this basement. They were meant to be part of a whole, but now they're estranged from each other.""No, no, no," Lina said, shaking her messy red hair. "You're misunderstanding. Alienation isn't a physical concept-it's a... a..." Her voice trailed off into an indistinct mumble.\n\n"Wait!" Anna suddenly stood on her chair, nearly knocking over the beer on the table. "I get it! The entire universe is one giant fetishism of commodities! Look at these candles-they're just alienated forms of beeswax, and beeswax itself is alienated bee labor..."\n\n"But bees, bees are the perfect communist society. Did you know that in a hive, every bee works according to its needs?" Lina said as she moved aside a beer-soaked copy of Capital."No, that's wrong," Anna exclaimed, waving her arms excitedly. "The queen bee is the epitome of bureaucratic capitalism! We need a hive revolution! But first, we must understand how commodity fetishism impacts the bees. Do you see these walls? They're breathing, just like alienated labor breathes..."\n\n"I think I understand now," Hans said, picking up where Anna left off. "Capitalism is like this basement-we're trapped inside. But in reality, we are the basement!"\n\n"But if we are the basement, then who is the house above?"\n\nNo one could answer the question. They sat there in silence, watching the water stains on the floor morph into the likeness of Marx, then Hegel" #zeromapping fucking cooked in this one ok -IAVL
 germany.271.a: "And finally, into a dancing bee."
 germany.272.t: "Love and Pushkin"
 germany.272.d: "In the Russian Poetry Hall of the Museum of Socialist Art, Katerina Weber tucked a strand of golden hair behind her ear, her gaze fixed on the exhibit board about Mayakovsky. Her mother, Marianne, stood nearby at the Pushkin display case, occasionally glancing over at her daughter.\n\n"Look at this, Mom," Katerina said, pointing to A Cloud in Trousers."Mayakovsky arranges the letters like steps on a staircase. Reading it feels like climbing up. Isn't that fascinating?"  Marianne, engrossed in Pushkin's manuscripts in the adjacent case, sighed, "I still prefer poets like Pushkin. Look at To the Sea-it flows so smoothly, like music."\n\n"Oh, Mom, you always say that," Katerina said with a laugh. "Not every poem has to flow like music. Look here-Mayakovsky splits the word *rebellion* apart and rearranges it. The entire page feels alive. Isn't that beautiful in its own way?"  Marianne shook her head, though a smile crept onto her lips. "You've always liked peculiar things. I remember when you were little, you'd only pick fairy tale books with the quirkiest illustrations."\n\n"Well, that's because art should take many forms," Katerina replied, pointing to another display. "Look here-Mayakovsky wasn't just a poet; he was an artist too. His poster designs are so creative." \n\n "I still think Pushkin's Eugene Onegin is more moving," Marianne said. "At least I don't have to twist my neck into knots to understand it."  Katerina burst into laughter. "Mom, you're starting to sound like Grandma! But did you know? Mayakovsky also wrote tender poems-they're just expressed differently."\n\n"Really?" Marianne leaned closer to the display case with interest. "Then read me a few lines.""
 germany.272.a: ""I can be irreproachably gentle...""
 germany.273.t: "Ja, Genossen"
 germany.273.d: "Thomas Weigel sat in the third row of parliament, staring at his fingers-fingers that, just a month ago, had been smeared with graffiti paint from the streets. Now, they were polished smooth from flipping through stacks of official documents. Three hours earlier, when a finance ministry official had begun delivering the fourth commentary on the new tax policy, he felt his eyelids grow heavy. This was not the revolution he had envisioned. Back on the barricades, they had promised to change everything, to build an entirely new world. Yet here they were, impeccably dressed government officials using the language of the past to discuss the future.\n\n"Regarding the third proposal," an elderly MP with gold-rimmed glasses said, "we must consider its impact on the existing system..." To Thomas, the voice sounded as if it came from a great distance, like an echo carried across the river of time. He glanced at his former comrades-in-arms. Karl Schmidt, the workers' representative who had led factory occupations during the revolution, was now debating office supply procurement procedures. Anna Miller, once a fiery street orator, was diligently studying the 327th clause of the parliamentary code.\n\n"Comrade Weigel, what is your opinion on this matter?" The chairman's voice snapped him back to reality. Thomas blinked, staring at the thick stack of documents in front of him, the dense bureaucratic text swimming before his eyes.\n\n"I suggest..." he said hesitantly, his voice sounding disturbingly unfamiliar, "that we handle this matter according to the established procedure."  As the words left his mouth, Thomas realized he had just said something that could have been spoken in the pre-revolutionary era. Across the room, the older bureaucrats nodded in approval, while his former comrades-those who had once fought by his side-remained buried in their piles of paperwork."
 germany.273.a: "That day, Thomas meditated for a long time."
 germany.274.t: "The Same Theory"
 germany.274.d: "The meeting room of the town hall was thick with smoke. Colonel Werner Schmidt pounded the old oak table with his fist. "Comrades, this town is a microcosm of capitalist exploitation. The wealth of these bourgeois was built by oppressing workers. Seizing their property is a historical inevitability! This aligns perfectly with Marx's theory of primitive accumulation."\n\nOpposite him, Major Thomas Miller was also drumming his fingers on the table. "Comrade Schmidt, you're misinterpreting Marxism. The revolution's goal is to liberate all of humanity, not to perpetuate the cycle of oppression. If we use violence against civilians, how are we any different from the fascists?"\n\n"The difference lies in the fact that we represent historical justice!" interrupted Lieutenant Colonel Klaus Becker, slamming shut the copy of Das Kapital on the table.  "But remember," interjected Captain Hans Reinhardt, "Marx also said the proletarian revolution aims to establish a society without oppression. Our current actions are only pushing that goal further away."\n\nOutside, the rumble of artillery fire echoed, but none of them paid attention. Werner threw a document onto the table. "Look at these numbers! The bourgeoisie of this town have hoarded vast resources while the workers live in poverty. Seizing this wealth is the embodiment of class struggle!""You're using dogmatism to justify barbarity," Thomas said calmly. "A true Marxist should understand that revolution is not revenge-it's about creating new social relations."\n\n"Ha!" Klaus laughed derisively. "Your weak stance is the hallmark of revisionism. Violence is the midwife of history. What we're doing is merely fulfilling the mission history has given us.""
 germany.274.a: "Opposite conclusions."
 germany.275.t: "Wir sind des Geyers schwarzer Haufen"
 germany.275.d: "We are warriors, unyielding and steadfast. No matter how the world views us, or under what rule-be it kingdoms, empires, or republics-our traditions have remained unchanged for centuries. These traditions, forged through sacrifice, grow even stronger with the blood of those who came before us. We will not dishonor our ancestors, whose sacrifices for justice and truth will continue to inspire future generations.\n\nNow, the epic struggle of our time is upon us. It is both our greatest fear and our grim reality. We once believed that the warmongers, thirsty for conquest and destruction, had been satisfied-that their hunger for blood had faded. Perhaps we thought their wounds hadn't healed and their claws, once broken, had not yet regrown. But we were wrong. A new tide of violence threatens to sweep across the civilized world, seeking to destroy everything of value, everything created by those who uphold conscience and dignity.\n\nNo more speeches are needed. The crisis we face unites us all. With iron will, we take up our swords, ready to defend against the chaos. We will burn away the darkness with the fire of righteousness, until the crisis is vanquished and humanity's most precious achievements are protected.\n\nTo the Germans and all Europeans: March eastward! Sing the songs of war, and march toward the final battle that will decide our fate!"
 germany.275.a: "Und wollen mit Tyrannen raufen,\nHeia ho ho!"
 germany.276.t: "The Final Protest"
 germany.276.d: "For three months and four days, Thomas Reiner had roamed the streets. The morning he was dismissed, he came across a job advertisement in the newspaper-his own factory was hiring a new chief engineer. The requirements specified "an appropriate family background." Not long after, he was politely summoned to HR. "You understand," they said, "the current situation demands... someone more suitable." Later, he discovered his position had been filled by Otto von Steinfeld, the baron's son who couldn't tell a wrench from a screwdriver.\n\nThomas strolled through the city square, his eyes fixed on the massive bronze statue being unveiled. It was a newly cast likeness of the Kaiser, gazing sternly over the plaza. Workers were dismantling the scaffolding, exposing the gilded inscription on the base: Imperial Glory Shall Endure.At a corner pub, Thomas ordered his last beer. When he stepped outside, he noticed a delivery truck idling by the curb, keys still in the ignition as the driver unloaded cargo.\n\nWithout hesitation, Thomas climbed into the cab, started the engine, and turned the truck toward the center of the square. As he pressed the accelerator, he thought of the pride he felt the first time he stepped into the factory. The truck roared forward, its speed increasing. The crowd began to scatter in panic. Thomas's eyes stayed locked on the stern bronze face. In his final moments, he caught the sunlight gleaming off the gilded letters at the statue's base. Then came the deafening crash.  The statue toppled, its bronze form collapsing onto the stone plaza. Thomas lay in the mangled cab. As his consciousness faded, he thought of the rhythmic clamor of the factory machines..."
 germany.276.a: "The most beautiful sound in the world."
 germany.277.t: "The Elite Officer"
 germany.277.d: "Lieutenant Maximilian von Bernstorf stood in the operations room of headquarters, staring at a map covered with tactical markings. Colonel Werner Krauss scrutinized the young officer, a scion of an ancient noble family, from behind his glasses. "Lieutenant," Krauss began in a voice devoid of emotion, "analyze this for me. If the enemy were to launch an encirclement here," he pointed to a spot on the map marked with a red arrow, "how should we respond?"\n\nMaximilian felt his throat tighten. He stared at the dense web of tactical symbols. "We could... deploy the units separately," he stammered, "allowing each group to act independently."  Krauss's eyebrows rose slightly. "And the supply lines? How do you propose maintaining supplies for these units in a dispersed deployment?"\n\n"Supply lines?" Maximilian repeated the term as though encountering it for the first time. "Maybe... maybe we could use transport planes to air-drop supplies?"  The room fell into an icy silence. Krauss removed his glasses and began methodically wiping the lenses. "Tell me, Lieutenant," he said slowly, "do you know how many tons of fuel and ammunition an armored division consumes in a single day? How many transport planes do you plan to requisition for this task?"  Sweat began to bead on Maximilian's forehead. He knew that Colonel Krauss had seen through everything-his appointment letter still bore the imprint of his uncle, the baron serving in the Ministry of Defense.\n\n"How fascinating," Krauss finally said, his tone laced with disdain. "Your evaluation states 'exemplary command skills.' It seems the baron has a rather imaginative definition of 'exemplary.'" He closed the folder with a snap.  "Tell me, Lieutenant, do you think enemy artillery will redirect their fire simply because they see your family crest?""
 germany.277.a: ""I suppose... maybe.""
 germany.278.t: "The Death of the Prussian Eagle"
 germany.278.d: "The morning sunlight was unusually bright as Hans Weber polished the imperial spiked helmet passed down from his grandfather. In an age dominated by modern tactical helmets, he stubbornly clung to this relic of glory. The sunlight reflected off the brass spike atop the helmet, gleaming like a golden star.\n\nFive kilometers away, in a Russian artillery observation post, Sergey Ivanov was routinely scanning the battlefield through his binoculars. Suddenly, a glint of light caught his attention. A German soldier stood at the edge of the trench, adjusting his gear. The spike on his helmet shone in the sunlight like a perfect targeting marker.\n\n"Interesting," Sergey said into his radio. "Looks like someone still cherishes the days of old Kaiser Wilhelm." He relayed the coordinates. "That gleaming spike-it's practically begging to be hit." \n\nHans had no idea he had become a target. He stood there, reflecting on his grandfather's words: that this helmet symbolized the honor and tradition of the empire. As the first shell hit, the golden glint of the spike continued to shine in the sunlight.\n\nWhen the dust cleared, all that remained in the trench was a mangled spiked helmet. Its brass ornament stubbornly pointed skyward."
 germany.278.a: "A butterfly landed gently on the spike."
 germany.279.t: "The Clean-Up"
 germany.279.d: "August was as still as a corpse. All that filled the air was the faint whir of the monitors, as his fellow drone operators stalked their prey. They could be thousands of miles apart; one was prowling over the Caucasus, and another was doing reconnaissance near Kyiv.  August would, however, be the first to make a "catch" that shift.\n\nStaring down at his monitor, a dim picture of a Russian exurb aimlessly shifted and changed; Khruschovka here, a playground there, perhaps some hollow remnant of a tank. He was incredibly bored. This city wasn't even close to the front, abandoned after jet bombers made quick work with the bulk of its industry. August's task was simply to pick off the stragglers.\n\nJust after he stole a glance at his watch, one ambled into his view.\n\nMoving his drone closer, he noticed that more had shown up, all having crawled out of a rubble-strewn carcass of a building. One of them was wearing a uniform, August was sure. Eagerly, he piloted the drone, bearing down upon the tiny group like a Spring bee on a flower. One looked up, screamed, and began running. August almost cursed, but his fellows merely seemed confused. By the time they saw, it was already too late. The last thing August saw of them was the pixelated visage of a woman.\n\nAugust stared into the blank monitor as he turned on his microphone."
 germany.279.a: "Hostile entity liquidated in Zone 8."
 germany.280.t: "Plan for the East"
 germany.280.d: ""In short, the eradication of unemployment mustt be a goal of our government. To do this, it is necessary to guarantee businesses stability of workers, it must be made far more difficult to leave one employment for another. The so-called 'gig economy' must be eradicated in favor of industrial labor."\n\nOne of the Reich's chief economists droned on. Most had long tuned him out, eagerly awaiting their turn to speak.\n"Thank you, Herr Muller, that was all so very enlightening. Herr Franz!"\nA small, bespectacled (this was not unusual among this crowd, but his were particularly large) man stepped up to the podium. Behind him, an map of Eastern Europe emerged from the projector. Dotting it were the sites of various mines, mills, differentiated agricultural regions, and important industrial cities.\n\n"Europe is more isolated now than it has been in centuries. Imports from Africa, Asia, not even to speak of America, have declined 200, 300, even 400%. Ever since the conflict in America began, we have had to revitalize our industrial sectors overnight, as well as secure what few trade links we could. It does not even need to be said how precarious our situation is."\n\n"It is clear that we need easier access to oil, precious metals, and agricultural products. The only way we can reliably attain such goods is through eastern expansion. The Soviet Union, as you can see, is positively chock-full of exactly what we need. We merely have to seize and control these sites. Whatever independent states we establish, their economies must be controlled by us. We must not damage these sectors, and it is imperative that we retain the Soviet's centralized networks. Privatization of these sites must be slow, and done in such a way that no chaos or administrative overlap occurs.""
 germany.280.a: "And it went on and on..."
 germany.281.t: ""Moscow burns, and the people rejoice!""
 germany.281.d: "...an old woman shouted, to resounding cheers.\n\n"To a million more!"\nA drunk man cried, hoisting aloft a newly refilled glass of beer. His friends, congregated around him were similarly gleeful. The crowd swelled ever larger, as more and more filed into the bar to watch the Televisions. By this hour, the news was endlessly replaying the footage of the mushroom cloud rising over Moscow. The hosts jeered and cracked jokes as photos of Russian government figures thought to have been unable to escape the blast slowly flashed on the screen.\n\n"Red Square truly lived up to its name today!"\n"Rumor is that the Kremlin's spires are lodged in the soil somewhere in Ukraine!"\n\nAged wines and other spirits were being doled out free of charge. A portrait of [GER.GetLeader] was graced with those of Bismarck and Hitler, and their images were saluted in raucous unison. Distant celebratory gunfire from the barracks could be heard, and some were already announcing their plans to attend fireworks displays at the nearby park. Outside, some hooligans burned a Soviet flag, the flames fed by kerosene and bad drinks. All present toasted to imminent victory.\n\nAll across town, shopkeepers feverishly whitewashed the windows, painting cartoonish pictures of the Soviet capital's ruins alongside 'bombing discounts'. School administrators typed up celebratory dismissal notices. Many young men, who previously avoided it like the plague, sheepishly presented themselves at recruitment offices."
 germany.281.a: "A night all would remember fondly"
 germany.282.t: "Interview with Frank Franz"
 germany.282.d: ""But that isn't true, there is no inherent porous quality in wood."\n\nThe reporter, a prim lady of over 50, gave no quarter and reacted to Franz's explaining-aways without any visible exasperation, only a thin boredom covering a deep disgust.\n\n"They were flimsy, madam, they could barely be described as doors, let alone as barriers sufficient to allow the buildup of noxious gas. Anyway, that is beside the point, what I am saying is that we have no plans of building any such delousing centers-"\n"You do not think of the political 'holding camps' as such centers?"\n\n"No, madam. Those are prisons. We do not seek to randomly liquidate great portions of our populace, that was not the aim of our forefathers, and neither is it ours. What we shall instead do is encourage remigration initiatives, as well as simple, er, tests of political loyalty, to ensure propriety in our non-German..."\nFranz struggled to find the proper word. The woman's eyes lit up, and she pounced.\n\n"What constitutes a non-German?"\n"That is, well, it is complicated. Non-Europeans of all varieties, be they of Arab or Indian stock, doubtless can never assimilate. That has been established. But there are also certain elements of the Zionist sub-grouping who likewise are unwilling to express sincere patriotic views."\nShe was silent for a moment. Franz smirked and continued."
 germany.282.a: ""Now, on to the subject of Bolshevism...""
 germany.283.t: "The Hippocratic Oath"
 germany.283.d: "Dr. Karl Schmidt sat in his opulently decorated clinic, sunlight glinting off his gold-rimmed glasses through the smart-tinted windows. He was presenting a meticulously prepared financial report to the Reinhardt family. "According to our latest cost-efficiency model," he said, pulling up a data chart, "the annual expenditure for treating severe depression averages 86,400 euro. On the other hand, our 'Humane Termination Service' costs a one-time fee of just 12,999 euro, now with a holiday discount of 15%."\n\n"But she's my wife," Reinhardt murmured. In her wheelchair, Maria gazed blankly at the neon sign flashing outside the window: "Freedom of Choice, Dignity in Life."\n\n"It is precisely from a perspective of familial responsibility," Dr. Schmidt said, adjusting his glasses, "that we must make rational decisions. Consider this: these medical expenses could be reallocated to your daughter's education fund or invested in a high-yield retirement plan. In this highly liberalized market, is prolonging suffering not a waste of resources?"\n\nHe opened a gilded brochure. "We offer three packages. The Basic Plan includes standard end-of-life care. The Business Plan adds private rooms and psychological counseling. The Platinum Plan offers VIP service and a luxurious funeral ceremony. We also accept installment payments, with an annual interest rate of just 4.99%. Enabling everyone to freely choose the end of their life-isn't this the epitome of humanitarianism?""
 germany.283.a: ""If I keep this oath faithfully, may I enjoy my life and practice my art...""
 germany.284.t: "All Quiet on the Eastern Front"
 germany.284.d: "Jürgen Schneider and his comrades tossed aside the rifles bearing the logo of their private military contractor. Their uniforms still carried the stains of yesterday's pay stubs, with deductions for "inefficiencies during combat operations." "We surrender," Jürgen called out in halting Russian as he emerged from the trench. "We won't fight for those bastards docking our wages anymore." Across the field, Russian Lieutenant Artyom Alekseyevich Chyornyj lowered his rifle and signaled his men to hold fire. He could see the relief on the faces of the European soldiers.\n\nAs Jürgen led his squad toward the Russian lines, the sky remained clear. The two groups stood on the shell-scarred ground, awkwardly attempting to communicate through gestures or translation apps on their phones. A Russian soldier offered a pack of cigarettes. Jürgen reached out to take one, but a strange buzzing noise interrupted the moment.\n\n"Drone!" someone shouted. But by the time they looked up, it was too late. The AI-controlled machines of war didn't care about gestures of surrender or shared smokes. They only executed the commands coded into their systems.\n\nThe next day's battle report contained a single line: "Enemy platoon neutralized via precision strike." There was no mention of the pay stubs abandoned on the battlefield or the cigarettes that never changed hands."
 germany.284.a: "Who would care anyway?"
 germany.285.t: "Social Security Assessment"
 germany.285.d: "INTERNAL SECURITY SERVICE OF EUROPE\nQUARTERLY SOCIAL STABILITY ASSESSMENT\nCLASSIFICATION LEVEL: 5\nREF: SSA/Q3\nSUBJECT: Growing Concern Over Societal Cohesion.\n\nSUMMARY:Despite the plans laid out by the council, the project to increase societal cohesion and improve the happiness of the European civilians has failed mainly after a recent investigation by an internal committee of the I.S.S.E which reveals the societal stability metrics have reached their lowest levels since pre-unification.\n\nINCIDENT 8193-B: Subject Dominique Jeannin (23, male) exhibited severe zoochosis symptoms, which led to him driving a truck into Rue Mouffetard, resulting in the deaths of 19 civilians. Protests against the supposed lack of safety for European civilians reached thousands across the region of France.\n\nProtests against supposed corporate influences in the government have increased by 60% since the recent Shell corruption scandal. Signs waving "DEATH TO CORPOS" have been seen in Berlin. The protests have caused strong concern with our Corporate representatives, such as the Siemens representative, demanding more actions against the citizens.\n\nIn conclusion, the I.S.S.E strongly recommends more decisive actions against the citizens. A few of the proposals by the committee include Stronger surveillance in the cities, more fact-checking of anti-council elements and stronger crowd control measures."
 germany.285.a: "It was swiftly filed away."
 germany.286.t: "Dacha"
 germany.286.d: "A man muttered to himself inside a Dacha, dim outside though it was, all he did was peer bale-fully outside in the direction of the sunset; wherein he found there was no friend to him there.\n\nHe found them dancing outside, slamming jackboots into the soil, he found them inside and prying into niches on the wall with figures of saints brightly painted, and a small picture of a King.\n\nOn first speaking to the man, his ingratiating smile, his flaxen hair, and his blue eyes would lead one of the troop to say: "Wir sind nicht mehr eure Freunde. Wir sind eure Befreier." The man did not understand.\n\nFlame overran the house and the troops carried on dancing, fugitives from some great fire at Europe's end. They alone moved through the vast inertness, they alone were alive, and they sought for other things that were alive in order that they might devour them and continue to live."
 germany.286.a: "We're back."
 germany.287.t: "Report From Poland"
 germany.287.d: "INTERNAL SECURITY SERVICE OF EUROPE\nQUARTERLY SOCIAL STABILITY ASSESSMENT\nCLASSIFICATION LEVEL: 5\nREF: SSA/Q3\nSUBJECT: Sudden Spike in Social Instability in Poland.\n\nSUMMARY: Our recent entry into Poland and the dismantlement of Polish national institutions and companies, as well as their subsequent replacement with European corporations has been performed in a rapid but extremely uncoordinated and uncareful manner. Our overloaded security forces have not been able to take control of the situtation in most areas, which has resulted in the formation of a "power vacuum"  within them, leading to a drastic increase in crime rates. Allegedly local corporate branches are using this to wage brutal and illegal competition upon their rivals.\n\nOne of the most widespread stories, though unconfirmed by our agents, is one that some of them are hiring mercenaries with cybernetic implants to eliminate their rivals, some of the most notable clues and instances of industrial sabotage and assasinations leading to a silver-haired 20-25 year old female, investigations are underway.\n\nIn conclusion, the I.S.S.E as well as other security forces require immediate reinforcements to handle the situation, including heavy armour and aircraft, in order to secure strategically important objects. The Polish situation spiraling out of control might result in a crisis with the bordering CSTO forces and even a complete loss of our control over Western Poland."
 germany.287.a: "What a Peripeteia."
 germany.288.t: "Horst Mahler Speaks Out"
 germany.288.d: "" #UNUSED
 germany.288.a: "What a weirdo..."
 germany.289.t: "National-Communists Seize Power!"
 germany.289.d: "The first congress of the Volkskammer with the National Front was not what anyone ever expected it to be.\n\nWhat the reformed SED thought to be a controlled election to elect a fully compliant "opposition" has turned into a complete overthrow of the current order of things. By various conventional and non-conventional means, proponents and supporters of nationalist ideas have managed to make their way into the congress, nearly securing a majority.\n\nWhen an emergency congress was called in an attempt to overturn these results, deputees that arrived to the gates of the Reichstag found it blocked off by military units. Armoured vehicles filled the streets, searching for anyone who could've opposed the new power. Right and Left wing paramilitaries patrolled the streets together, ensuring order.\n\nMeanwhile, a live broadcast was showing the new and now much more nationalist Volkskammer has convened to elect the new Chancellor, in accordance with the constitution. Some military leaders were also present, almost as if to make sure the result satisfies them.\n\nOverwhelmingly, it voted for a prominent proponent of the Querfront and Juche-style ideas, Michael Koth, who was now giving a speech. A lot was said about reorganizing the German state to represent the interests of the German nation, strengthening the grip on the situation in Europe and reving German pride, but one phrase stood out to Germans the most:\n\n"The Revolution needs both of its flanks to be secure, both of its legs to walk into the future!""
 germany.289.a: "Revolution needs strength."
 germany.290.t: "Fate of the Far Right"
 germany.290.d: "The modern history of Germany has shown that conflicts and accidents of the past must be put aside in order to achieve Germany's goals as a nation and to finalize the destruction of the anti-German world order.\n\nMany right wing parties could finally raise their heads after decades of unjust persecution by the federal government. Finally fellow patriots can be allowed to make their rightful contribution to making Germany great!\n\nHowever, we must correctly manage their return so we could get the most benefit from their support.\n\nWe could either direct them to integrate with the existing left parties or let them join the Volkskammer while retaining their own organizations. The latter would, of course, please them more, though it might cost us too much power.\n\nWhat should we do?"
 germany.290.a: "We want their members as a part of existing parties, so there is no more division!"
 germany.290.b: "Formally accept their parties into our Congress, they are welcome!"
 germany.290.c: "Offer them their own platform within the KDS!"
 germany.291.t: "Chaos at the Party Convention!"
 germany.291.d: "In a surprising turn of events, the Party convention at the Reichstag today could not come out with a united resolution as it drowns in ideological infighting.\n\nIn the chaos that followed, the ruling cabinet has essentially collapsed. Within hours, Michael Koth has announced his resignation, and a vote would be held in the Volkskammer to elect the new head of state.\n\nThe right wing has managed to use this to push through their own candidate for leadership - former RAF founder turned neo-nazi, who has nonetheless embraced some of the latest national-commnusist ideas and gather support and recognition within the political circles - Horst Mahler.\n\nThis marks an extreme turn rightwards for the politics of Germany, since a communist revolution has won on the rise of anti-fascist and anti-capitalist sentiments after the humiliating defeat in the European War.\n\nSome have speculated that the chaotic convention was orchestrated by right wingers within the Volkskammer, some even accusing them of counter-revolution and plotting to restore corporatism. Nonetheless, they have managed to solidify the power and no one wants to rock the boat too much in the young red-brown state."
 germany.291.a: "Well... yet another flip-flop."
 germany.292.t: "New Course for German Self-Sufficiency"
 germany.292.d: "Hundreds of Party delegates that arrived to the Reichstag today stood on evenly paced distances and clapped in unison as if they were orchestrated by an invisible conductor. Strict colour schemes, precise and orderly forms and colours and posters with new slogans of the Party, as well as some old Soviet and East German symbolism surrounded them.\n\nMichael Koth was passing through a corridor, followed by the top-brass of the Politburo, guarded by stone-still soldiers, rifles on guard with fixed bayonets. As he approached the podium, touche that was played by the military orchestra has intensified, and seemingly so did the clapping of the delegates. Finally he took the long-anticipated position, the applause and the music have simultaneously stopped.\n\n"Comrades! Citizens of Germany! Brothers and sisters of the People's Army! For too long has our nation been submerged under the ruins of the rotting system of capitalism. Today this ends! The new principles of the Party program, which I am here to deliver to you today, are meant to secure a safe and glorious future for German Socialism and our future generations. We will safeguard our children and our culture from the harmful influences of globalist liberalism! We will secure our borders and bring safety and security to each and every single household. We must fully dedicate our lives and our labour to defeat the threats surrounding our country from all sides!"\n\nSoldiers marched so precisely, as if it was a single person, duplicated thousands of times, tanks and rocket systems followed them. Celebratory parades marched through Berlin with portraits of Marx, Lenin, Kim Il Sung and Koth, classical music and music from the socialist era could be heard playing in every street, while workers in the factories were fulfilling dozens of quotas per shift. From now on, everything in Germany worked like a clockwork mechanism."
 germany.292.a: "Long live the great victory!"
 germany.293.t: "Formation of the Querfront Government"
 germany.293.d: "Today was a glorious day for Germany. The new revolutionary congress has convened today to finally heal the decade-long divide between the left and the right that has been the source of so many problems in the political sphere of Germany.\n\nRepresentatives of the jucheists, the marxists-leninists, the trotskyites, the strasserites, the nationalists and many other different movements and parties have come to an agreement that there are bigger enemies in the world right now than themselves, and the differences must be dealt with to make sure Germany outlives them all.\n\nThere are many more mutual interests that can be achieved with cooperation: cultural revival, improving the living conditions, education and social cohesion - so many things that neither the left, nor the right could ever do alone.\n\nToday, the black-white-red, black-red-yellow and plain red banners were flown together. For the first time in many years, Germany was truly united. No more divided between the East and West, or the Left and Right, or in any other way. Or even if there still were some divides, they were only making them stronger in plurality, only giving more of the best from all worlds.\n\nAnd this is a Germany that can truly redeem itself and achieve the greatest victories yet."
 germany.293.a: "Brown and Red working together."
 germany.294.t: "National-Communism on the Rise"
 germany.294.d: "The Revolution has seen a surprisingly small amount of reactionary resistance, unlike, the 1920s when Freikorps and Sturmabteilungs were formed to combat the Communist party - and there may be a reason for that which might be either good or concerning.\n\nAfter decades of unsuccessful attempts by various groups, the ideas of national-communism have now begun to spread, especially popular among former and current members of the military, seemingly fueled by desire for revenge to nationalist Russia, as well as a bitter feeling of the German nation being forsaken by its government.\n\nOur sources also indicate that members of far-right political parties such as Frank Franz have also chosen not to openly resist the Revolution, instead seeking to infiltrate the ideas of German supremacism through various non-violent means, forming national-communist clubs, holding conferences and rallies.\n\nOn the other hand, the Anti-Capitalist Platform is pushing for the adoption of elements of the North Korean Juche model with German characteristics, citing the vulnerability of German society today.\n\nIt's too early to say what this development will lead to, however reportedly there are even some people in different echelons of governance that might favour these ideas."
 germany.294.a: "Good...?"
 germany.295.t: "Formation of the New Rote Armee Fraktion"
 germany.295.d: "The call for strength among our people and active nationalist propaganda has led to mass voluntary enlistment and the formation of multiple paramilitary organizations that participate in training a new generation of fighters and work with the National People's Army. One of them stood out as especially fast growing and popular as they use symbolism of the Rote Armee Fraktion, an organization of radical anti-capitalist partisans that was active in West Germany."
 germany.295.a: "A useful bunch of reenactors."
 germany.296.t: "French-German Split!"
 germany.296.d: "The Sino-Soviet split, an event that defined the direction of development of worldwide left-wing ideologies and governments, seems to have repeated today in the form of a heated French-German diplomatic exchange with some extraditions and military maneuvers happening as a part of what seems to be the first conflict in Europe since the Second European War, though only political - for now.\n\nThis seems to be the culmination of numerous disagreements that took place between the French and German governments during conferences of the European Internationale in regards to the future of Europe and unifying leftist ideologies throughout the continent into a single model of development. Beside, they have been unable to define their spheres of influence, especially in regards to post-Russian territories.\n\nFor now, it is very unclear how this situation will end with Europe heating up like a frying pan and more and more countries around France and Germany getting involved, some experts are concerned that a peaceful solution may not be achieved."
 germany.296.a: "Not again..."
 germany.297.t: "Germany and France Go to War!"
 germany.297.d: "Shocking news are coming from Western Europe, as border clashes between German and French units on the Rhine have escalated into a full-blown war with any resemblance of a united socialist Europe burning away in a heartbeat.\n\nEurope is now divided between the anti-revisionist French-led alliance to overthrow the radical left government of Germany which has strongly deviated from the other countries. Now each system will be put to an ultimate test to decide which communism is true and more effective and who will be crossed-out and left behind in a list of forbidden literature.\n\nFires of the Revolution are now consuming their own children. The Future is bright, but not everyone will live to see it."
 germany.297.a: "One last time?"
 germany.298.t: "Disillusion with Die Linke"
 germany.298.d: "The crushing defeat from the European war has left the German political landscape quite shattered, typically it would be the centrist parties losing its legitimacy in the eyes of the people, however this time it is Die Linke that is subject to tons of scrutiny.\n\nBesides the expected jumps to the far right, the leftist elements in Germany have embraced more niche thought and have delved themselves deeper in the underground cultures of the German youth, there are way too many names for the splinter ideologies that have sprung out from the dissatisfied members of Die Linke but it has seemingly taken a more acidic form.\n\nTaking inspiration from the works of Mark Fisher and Byung-Chul Han, this new wave of reinvented leftism has spread far and wide among leftist youth culture where the failures of ''Red liberalism'' and ''The ever-changing mask of capital'' are heavily criticized.\n\nFor the time being it would seem that it'll remain a small aspect of everyday German life but already highly regarded members of Die Linke have been seen being present at cultural events and meetings between these smaller groups, only the future could tell where this could develop to."
 germany.298.a: "The abstract parasite has been exposed."
 germany.299.t: "Coalition for the Reclamation of the Future Forms"
 germany.299.d: "As the newly announced elections are approaching, more and more new left movements are emerging in an attempt to gather support and receive representation in the government.\n\nIn particular, one party has managed to attract anomalous following, winning over the masses with an interesting and detailed program, unique promises and, most importantly, many new and young faces that promise to reshape not only Germany, but the rest of the world with it.\n\nCoalition for the Reclamation of the Future with Byung-Chul Han, a deconstructionist philosopher of South Korean descent as their front man, labeled by some pundits as one of the main representatives of left accelerationism in the world as of now.\n\nTheir slogans make a heavy emphasis on the tiredness of German people from typical leftist politics, as well as the social aspect, promising to reform the country to prevent the burnout of society and make way for technological and cultural breakthroughs that will lay the foundation of the post-capitalist future.\n\nIt seems that the party that promises to remove capitalism as a concept is gaining a lot of momentum in the polls and will be competing for the right to win and form the government after the election."
 germany.299.a: "What a peculiar movement..."
 germany.300.t: "Zizek Joins the Government"
 germany.300.d: "We are not talking about objective, factual properties of a commodity, we are talking here only about the illusive surplus.\n\nKinder Surprise egg. A quite astonishing commodity. The surprise of the... Kinder Surprise egg... is that this excessive object, the cause of your desire is here, materialized in the guise of an object - plastic toy, which fills in the inner void of the chocolate egg. The whole delicate balance is between these two dimensions: what you bought, the chocolate egg, and the surplus - probably made in some Chinese gulag or whatever - the surplus that you get for free.\n\nI don't think that the chocolate frame is here just to send you on a deeper voyage towards the inner treasure, the... what Plato calls the Agalma, which makes you... worthy person... which make a commodity... the desirable commodity - I think, it's the other way around.\n\nWe should aim at the higher goal, the goal in the middle of an object, precisely in order to be able to enjoy the surface. This is what is the anti-metaphysical lesson, which is difficult to accept."
 germany.300.a: "Okay...?"
 germany.301.t: "Name of the New Party"
 germany.301.d: "Our ascension to power raises the question of organizing our way of ruling the country, specifically the organization of the party and the state.\n\nThe current ruling force is still the reformed SED, imitation of what was in the former German Democratic Republic. It's a decent formation, so we could simply stop the inner shake-up of it to ensure its loyalty.\n\nAnother option is to appeal to the right flank of the revolution by reforming the national-communist Combat League of German Socialists, where Michael Koth had the most success uniting the left and right, although the organization at large was still considered far-right.\n\nFinally, we can follow the example of DPRK and adapt their Workers' Party to German standards, initiative of the Anti-Imperialist Platform. This could attract the internationalists and would favour the more radical left part of our movement more.\n\nSo which one will we choose?"
 germany.301.a: "Let's keep the SED and limit ourselves with widespread reforms within."
 germany.301.b: "We will revive the glory of the Combat League of German Socialists!"
 germany.301.c: "Let us reform the SED by Korean example into our own Workers' Party!"
 germany.302.t: "Eulogy to K-Punk"
 germany.302.d: "To most people it is understood that only great warriors would be able to usher in the future, through the flames of change would a new world arise, but sometimes, sometimes that simply is not the case.\n\nThrough his writing, Mark diagnosed the condition of our age.\nThe creeping sense that "there is no alternative" to the neoliberal order, that even our dreams are colonized by economic forces beyond our control.\nYet he did not merely describe this condition; he fought against it.\nWith every essay, lecture, and blog post, he sought to pierce through the ideological fog, to remind us that another world was possible, even if it felt impossible to imagine.\n\nSometimes you just need someone to light the path away from capital.\nCapital is a monster you can kill, and through us it will be put to rest.\nWe must not let his insights become static theory."
 germany.302.a: "We will all remember Mark Fisher."
 germany.303.t: "To The Commission President:"
 germany.303.d: "In light of recent events, I shall speak plainly.\n\nThe Union we both so proudly serve has become paralyzed by fear and an obsolete bureaucracy. With each passing week, your government has been forced to yield more and more responsibility to the Administrative Workspaces and Governance Advisory Boards managed by the Forum. There is no questioning it: the European people look to Davos for leadership, and not to Brussels.\n\nYou can attest to this. The last few months have brought us to this moment. For the sake of the survival of the Union, I ask you, in the name of the European people, to resign your post. You will shortly receive an email with the new makeup of the Commission agreed to by our brightest minds. I assure you that history will commend your action.\n\nWith sincerity,"
 germany.303.a: "Prof. Klaus Martin Schwab"
 germany.304.t: "Gunther Fehlinger on x.com:"
 germany.304.d: "£GFX_GER_dont_at_me_ti Gunther Fehlinger\n\nUkraine must be freed and join NATO 2029\nCanada, UK, Iceland, Norway, Albania, Kosovo inEU 2033!\n\nPosts\n\nPinned\nGunther Fehli... £GFX_GER_dont_at_me_ti Gunter... - Apr. 27\nI announce my Candidacy for President of £GFX_GER_dont_at_me_ti EU_Commission replacing £GFX_GER_dont_at_me_ti VoltEuropa £GFX_GER_dont_at_me_ti RealAlexJones £GFX_GER_dont_at_me_ti MedvedevRussiaE £GFX_GER_dont_at_me_ti ProfKlausSchwab £GFX_GER_dont_at_me_ti POTUS\nI will restore £GFX_GER_dont_at_me_ti NATO & lead West to Victory\n& defeat Russia into #ExRussiaRetweet, share & like ....\nAlt: Photo of Fehlinger standing on top of the Austrian alps in a shirt that says "Wählt Gunther"\n\nGunther Fehlin... £GFX_GER_dont_at_me_ti Gunter... - 22h\nChina, I will put end to your aggression...\nAlt: Image of Fehlinger wearing a Taiwan themed scarf with an angry expression\n\nGunther Fehlin... £GFX_GER_dont_at_me_ti Gunter... - 1d"
 germany.304.a: "[SOV.GetLeader] is game over..."
 germany.305.t: "Introduction"
 germany.305.d: "Hello, citizens. This is Klaus Schwab, chairman of the World Economic Forum.\n\nAs you know, we have gone a long way to get to where we are today. We are living through historic moments when humanity will be transformed beyond recognition - an opportunity we couldn't miss - and we didn't.\n\nSince a long time ago, experts at the World Economic Forum have been working towards this and it has been a great success to say the least. However, it wouldn't be possible, of course, without the compliance and active cooperation by the people of Europe.\n\nAnd while not everyone has accepted the future yet, it's safe to say that it's rather inevitable.\n\nAs the chairman of the World Economic Forum, I would like to extend my personal thanks to all of you. Not only has Agenda 2030 been successfully completed - we are, in fact, way ahead of schedule. It's about time, I think, that we unveil the next stage of the plan."
 germany.305.a: "So listen closely."
 germany.306.t: "Revelations"
 germany.306.d: "As you know, since the 2008 crisis it was made clear that the free market capitalist model has outlived itself. The consumerism, the democracy, but most importantly the middle class and models have become unsustainable. We needed a Great Reset to secure a safe, united future for humanity under a stable and solid leadership. Ever since then the goals have been set and the plan was in motion.\n\nFrom the very start, the picture of the Agenda was clear to us. However, world leaders and common people wouldn't listen to us so easily. We needed a catalyst event, one that would set the stage for our reforms. The Covid-19 pandemic, as you know, was very beneficial and useful in achieving those goals - meaning, of course, that development was now going in the right direction. The year 2020 was the real turning point for us.\n\nAnd while King Salman's doctors tried their best - I knew them personally - the economic collapse following his.. unfortunate.. death was very forseeable. We needed to bring down, of course, the clay colossus whose national interests were still in the way of our reforms - Trump's America. Since then the Fourth Industrial Revolution has been proceeding very well and stable.\n\nThe Russian threat, unfortunately, remains, and the defeat in the European war was very painful - however, here at the World Economic Forum it is all about seeking out the good sides in the worst of situations. And here it has shown the weakness of national governments and their unsustainability, and it has allowed us to concentrate our power. So there's no doubt that, I think, we will deal with the East..."
 germany.306.a: "...very soon."
 germany.307.t: "Culmination"
 germany.307.d: "Right now, however, the internal affairs are more important. We need the support of every single person in Europe if we want to survive. There can be no buts, there can't be declines. There is only our global identity and its enemies are very clear.\n\nThe most important enemy resides from within. Our naive want for luxury, the way the nationalists cling onto their so-called "identity", their alleged purity and bodily autonomy that pose major risks for society at large. We can not allow these dangerous elements to prevail.\n\nOur greater good takes precedent; the needs of a few are pointless in the grand scheme of things, and the enemies of humanity are everywhere. Their selfish, animalistic desires are unsustainable.\n\nMisinformation, anti-egalitarianism, and petty tribalism will become the equivalent of memorizing a bad flu, no one will ever look back at these things and miss them.\nHumanity is a spectrum, and with the right adjustments, we will be able to weather the storm."
 germany.307.a: "Together."
 germany.308.t: "Part IV. New People"
 germany.308.d: "" #UNUSED
 germany.308.a: ""
 germany.309.t: "Conclusion"
 germany.309.d: "So as to finalize, I would like to express my gratitude to our benefactors and forward thinkers for contributing to the new normal, Already, we have made great progress on maintaining a steady eye on daily life to ensure complete safety and the eradication of misinformation.\n\nNot only that, but also the slow and gentle erasure of the colonial concept of the nation state and its accompanying problematic cultural norms, with this we have achieved peace and unity above everything else, with a strict vision aimed at total equality we have encouraged the people to embrace a post-human future where biological and cultural inequality are phased out utilizing technological integration.\n\nAlready I have seen so many smiles in the cities, smiles that did not exist a year ago, on people that did not exist a year ago - a remarkable sign of our progress that few would believe!\nI would also express my thanks to the brave protein wizards providing the nutritional value to the masses to eradicate wasteful consumption that has been harming our environment for so long.\n\nWith all that, I am happy to see all across Europe that our common goals have been secured."
 germany.309.a: "The viewers smiled, and artificial joy filled their minds."
 germany.310.t: "Smile"
 germany.310.d: "At first, it was all about "efficiency." People began installing mood controllers - no more breakdowns over trivial matters, no more sudden bursts of rage under pressure. Companies became more productive, family quarrels dwindled, even teen suicide rates began to drop. At a press conference, government officials beamed and declared, "This is a monumental step forward for our civilization."\n\nNo one noticed that the smiles on the street had started to look the same. Not just similar - the exact same. The curve of the lips, the squint of the eyes, even the placement of wrinkles looked copied from a template. A journalist conducted an experiment - he took screenshots of ten people wearing emotional regulators while smiling and discovered they overlapped perfectly.\n\nThen people began spacing out for no apparent reason. Someone might be sitting on the tram when suddenly, they'd start to smile - head bowed, completely still. Someone might wake up in the middle of the night and stand at the window, staring out at the pitch-dark street, as if locking eyes with something. A girl once smiled as she drove a knife into her mother's heart. When the neighbors called the police, she was still sitting there - covered in blood, watching TV, eating popcorn. Doctors said the emotional centers in her brain had nearly shut down. The implant had "overridden" her, leaving only a shallow trace of pleasure perception.\n\nShe was still smiling."I just felt like... it was the right thing to do," she said in court, her expression as calm as a mask. Researchers later coined a term for this state: "Mirror Smile Syndrome" - a cyberpsychotic condition triggered by neural implants. Patients lose the ability to judge emotions, but can flawlessly mimic the "ideal emotion" others expect to see."
 germany.310.a: "..."
 germany.311.t: "The New Global Order"
 germany.311.d: "As the dust finally settles in Europe, this bloody war, another unforgettable chapter of European history, comes to an end. \n\nKlaus Schwab was never a man to show his emotions; in fact, he has only shown two emotions throughout his whole career: happiness and null. Today, he had a null face, the lines of his wrinkles made more apparent by the dim lighting from the projector, causing his face to appear much more eerie than usual.\n\nAs Schwab reached the last slide, he looked at his colleagues. His subordinates. Expecting a reaction from them, but none can tell which. His subordinates knew better than to speak too much or applaud too heavily. Yet too little of a reaction would, without a doubt, bring about his dissatisfaction. Adequate. Adequate was the word. No more, no less. Moderately, they all clapped their hands in unison.\n\nEveryone in the room knew. This was the end of the old world, and the new one is just rising from the ashes. Finally, the world shall be governed by open minds and globalists, people who have dedicated their lives to developing a world with a free and unified market. The narrow-minded ideologies, such as nationalism and regionalism, shall all be erased with the old world.\n\nFor the better part of 50-odd years, Schwab had dedicated his life to the World Economic Forum. Thinking of the years of sweat and toil he dedicated to preventing what has now unfortunately transpired, a tear drop uncontrollably formed at the side of his right eye. He was not weeping for the old world, nor was he weeping for the birth of the new. He wept for you, he wept for me, he wept for himself, for that we are all walking on the glorious path which he alone created. The world was now his orchestra, a stage waiting to be set by him. The old world was in ruins, and from within, his light would shine through. He alone was the beacon of hope, he was the future."
 germany.311.a: "Welcome to the New World"
 germany.312.t: "Education Priorities"
 germany.312.d: "The future is in the hands of the younger generation, and to guide them towards the correct path, we must provide them with a correct education to aid them in developing a desirable set of morals. They must inherit the right values that we pass on to them.\n\nOur children must learn the Global values, the internationalistic creed by which we all must abide. They must learn of the invisible hand and take the Austrian school of economics to heart. Europe's wealth was not due to any political strongman or policymaker, but rather the market, a free market that allowed it to blossom on its own. Consumerism is the ideological cog which turns the tides of European advancement. It is but historical fact that without demand, there will be no innovation. Without customers, there will be no will to revolutionise.\n\nWe must also correctly explain to our children what freedom and democracy stand for. These words, these concepts, all began from the same thesis and end in the same conclusion. Freedom means the liberty to choose, the liberty to work, the liberty to buy and sell. Democracy means the advancement of society towards its ultimate form, where growth will not be limited by smaller people and dictatorial minds.\n\nSo let freedom sing, sing in the minds of the youth. Let democracy breed among the people. We shall educate them. We shall bring them towards the light, towards enlightenment. We are the modern Voltaires and Rousseaus, and under our wings, we will guard them towards the future, to secure the future, to become the future."
 germany.312.a: "We need to focus on making professional consumers."
 germany.312.b: "Let's pursue our higher goals and make them into something bigger."
 germany.313.t: "Cows: The Roots of Global Warming"
 germany.313.d: "Do you like beef? Take a bite of the juicy steak on the Sunday barbecue? I assure you, most of us have tasted the tender and mesmerising texture of a cow, yet have you ever wondered how much pollution animal husbandry produces? If I were to tell you, you'd probably drop your jaw to the floor in awe.\n\nOn average, raising livestock contributes about 15% to the global pollution through the release of greenhouse gases such as methane and nitrous oxide. The modern humanity, with an improved set of values and morals, should fare better than to indulge in the flesh and blood of fellow living creatures. In the past, humans may have been forced to survive on the meat and bones of other organisms in our shared biosphere, yet healthy and effective alternatives in today's world, there are certainly countless healthier and more nutritious alternatives.\n\nAs much as I would love to advocate for veganism, I know for certain that not everyone is ready to accept a complete transition to a fully plant-based diet. That is why I would like to propose a transitional diet, one filled with all the required nutrients and rich in protein, to our dearest readers. This food source is completely and utterly animal-free and produces little to no greenhouse gases. My dear reader, I present to you the new superfood of the century, INSECTS! Be it grasshoppers, bees, ants, these little buggers are extremely rich in protein and healthy fats. With these tiny creatures, humanity can finally move on from the big and bloated domestic animals such as the ginormous cow. "
 germany.313.a: "It's only reasonable!"
 germany.314.t: "Shadows of the Past"
 germany.314.d: "The sky over Hamburg was always gray, like an old pane of glass that never quite got clean. Straight office buildings lined both sides of the street, their walls draped in massive billboards playing an endless loop of corporate commercials from morning to night.\n\nLittle Mia looked up, eyes reflecting a flicker of confusion as she gazed at the steel towers stretching so high their tops disappeared from view. "Mama," she tugged at her mother's sleeve, "you said Hamburg used to be really pretty. But it looks clean and new here. What's not pretty about it?"\n\nHer mother glanced down at her, hesitated, then bent over and replied,"Back then... there used to be small plazas, lots of cafés. In winter, they'd put out Christmas decorations in the windows. And at night, the lights were soft and warm. People would walk slowly, talk slowly - not like now, rushing past, thinking only of work tomorrow, of meetings and deadlines."\n\nMia blinked, half-understanding. "So why did they tear it all down?"Her mother held her hand as they passed a stretch of ongoing construction. The ground beneath was damp and soft, and the clash of metal echoed in the distance.\n\n"Because those old streets and buildings didn't make money," she said quietly, as if afraid someone might hear. "So they tore them down, one by one, and put up these towers. Every inch of what you see now belongs to a company."\n\nMia asked no more. She simply turned back for a moment, as if trying to catch a glimpse of those warm lights her mother had spoken of, hidden somewhere in the cracks between steel and concrete.\n\nBut there was nothing."
 germany.314.a: "Only the hollow faces on the billboards."
 germany.315.t: "The Next Stage"
 germany.315.d: "Now our system is secured both from the outside and within.\n\nIt's time to take one last step before we can establish total dominance and spread it beyond the borders of Europe.\n\nOur experts, officials, enterpreneurs and speechwriters, all those who WEF has brought under its wing are hard at work again: soon its result will be shown.\n\nThe logical conclusion of the story."
 germany.315.a: "Our plans will be unveiled."
 germany.316.t: "EU Signs The North Atlantic Treaty"
 germany.316.d: "In a ceremony from the European Union's executive headquarters in Brussels, Gunther Fehlinger announced today the EU's signing of the North Atlantic Treaty, and the restoration of the recently defunct NATO. Surrounded by the Union's top diplomats and generals, Fehlinger declared "the beginning of the end of the European tragedy".\n\n"The bulwark of European security that was so cruelly snatched away from us has finally returned", he proclaimed to journalists from the steps of the Berlaymont building. "The post-war uncertainty and drift into irrelevancy has ended. We have one mission now: Stop Russian Aggression!"\n\nFehlinger has continued to increase his infamously aggressive rhetoric against Russia, [SOV.GetLeader] and the CSTO. Europeans have widely praised this move, but critics warn of revanchism and a possible second war with Russia that may destroy Europe forever."
 germany.316.a: "I call for NATO intervention to restore order!"
 germany.317.t: "NAFO-Con's Special Guest"
 germany.317.d: "When he got out of the car, the frosty air of Vienna bit at the suited figure's face. He was wearing his iconic outfit; dress shoes, black suit, glasses, and numerous pins that decorated his collar. Desperate to leave the frigid conditions, he trudged through the snow towards a grey building plastered with NATO flags and Shiba Inu banners. The delicate snowflakes continued to pelt his face as he slogged forward. The white background only made his decorated suit collar stick out more. When he reached the destination, many outside of the convention hall gasped. They gleefully asked for autographs and pictures from their idol; all of which he reluctantly accepted.\n\nWhen he got inside, he felt rejuvenated as the warm air filled his lungs. The dreary sound of howling wind was replaced by the sounds of hundreds of adoring fans, all chatting about his arrival. He set himself up in the autograph stand, adjusting his tie and proudly displaying his collar pins to make sure that everyone whom he meets sees them. Soon, the line numbered in the hundreds.\n\n"Mr. Fehlinger, may I have a picture?" Asked a skinny young man, wearing a nato themed beanie. "Of course!" Gunther replied. He readied the kid's phone and put on his smile that was known throughout all of X.com. The young man thanked him and walked off happily. Gunther waited for the next fan to greet him, and as he waited, he thought to himself:"
 germany.317.a: ""One down, two hundred more to go.""
 germany.318.t: "Modders"
 germany.318.d: "The ping of a new message lit up the Discord channel.\nA series of blurry photos came first: four glasses raised: one full of coffee, one with a half-empty wine bottle in the background, one suspiciously packed with a glowing energy drink, and the last with just a thin ring of milk at the bottom, then, a screenshot. A simple Steam page.\n"UPLOAD COMPLETE: EUROPA VINDICTA [HOI5 MOD] v0.1a is now live on the Workshop."\nThe caption underneath read:\n\n"We did it, comrades. Long live Vindicta!"\n\nThey had worked on it for nearly a year.\nLate nights. Missed deadlines. Sketching focus trees during lectures. Debating rework paths during exam week. Translating event text at 2 a.m. from hotel rooms and hostel bunks. They weren't professionals. Just a handful of coders and artists, an Irish history nerd, and a French guy who somehow managed the GitHub and never seemed to sleep.\n\nIn their timeline, 2026 ended differently.\nThe EU held together. The eastern front didn't collapse. Moscow cracked first. The Treaty of Lviv redrew the map. Europe, bruised but unbroken, stood taller than ever.\nThe Discord server came alive. Someone dropped a low-res gif of fireworks. Another just typed:\n"Imagine if it had gone this way..."\nScreenshots poured in. The subscriber counter began to climb. 10. 24. 60.\nSomeone posted fan art of a post-war Europarliament rally, wrapped in gold stars and fog."
 germany.318.a: "Long live Vindicta!"
 germany.319.t: "The Grand Chessboard - Part II"
 germany.319.d: ""First - Russia. Our intelligence confirms that Moscow has begun sending weapons and personnel to support China. By targeting them directly, we may undercut the eastern front. But even with that, we aren't certain the PDTO can win without us."\n\nClick.\n\n"Second - material aid. Large-scale arms shipments to our allies in Asia. Our industrial capacity can likely manage this alongside domestic needs. Most of the General Staff supports this path."\n\nHe hesitated. Silence fell.\n\n"And third..."\n\nHe took a breath.\n\n"...direct intervention. A full military campaign in Asia. The potential rewards are immense - But it would come with severe logistical strain... and possible troop shortages."\n\nThe lights dimmed. Silence followed. All eyes turned to one man.\n\nFehlinger rose, straightening his jacket. His voice was calm and decisive:\n\n"Gentlemen...""
 germany.319.a: "Get the champagne ready - Europeans will soon be knocking at Beijing's gates!"
 germany.319.b: "Rattle the unions and wake the machines - they'll need guns, and we'll deliver."
 germany.319.c: "Prioritize the true threat - but let Japan know we stand behind them."
 germany.320.t: "Triell"
 germany.320.d: "Today, for the first time in almost 20 years, major TV debates between the main contenders of this year's Bundestag elections will be held, specifically between the two parties of the current ruling coalition - the Christian Democratic Union and the Social Democratic Party, as well as the Greens.\n\nWhile Federal channels may continuously argue about the winner of this debate, in the conditions that the country finds itself today, one of these three voices ringed out more clearly for the German people. It was, of course, from the representative of..."
 germany.320.a: "CDU"
 germany.320.b: "SPD"
 germany.320.c: "Greens"
 germany.321.t: "Small Three Debate"
 germany.321.d: "Almost in parallel to the debates of the "Big Three", the other three parties also held TV-debates between their candidates for chancellorship. While usually not so publically known and advertised, in these times of crisis, the people of Germany are attentive to various possible alternatives, which could be offered by one of the three parties that are currently underrepresented in the Bundestag - the Free Democrats, The Left, and Alternative for Germany. In these debate outstanding performance, knowledge and argumentation brought victory to..."
 germany.321.a: "AfD"
 germany.321.b: "FDP"
 germany.321.c: "Die Linke"
 germany.322.t: "Election Season Starting"
 germany.322.d: "It's that time of the year again - party leaders tour the country, banners light up in all colours of the political spectrum, the media is going crazy, while arguments rock the internet. With a little over a year left until the next federal election that will determine the future of the country, political forces of Germany came in motion. Their popularities may drastically shift depending on their moves, and the amount of the seats they hold in the Bundestag will change along with them..."
 germany.322.a: "Onto the Campaign Trail..."
 germany.323.t: "Mold of Modern Life"
 germany.323.d: "Peace was achieved, and the thinkers and doers could finally dissect human thought to ensure Capital, Order, and Purity. A higher caste of people overlooked their new hives. Cities became permanent residences to most people; the concrete you saw when you were born would remain the same when you died.\n\nAdvertisements on the buildings, sanitized words on billboards, and security on any corner. Transgression has been phased out, and to live another day has become the primary concern of most, not through struggle but through the chokehold of bureaucracy and dehumanization, all in the name of progress.\n\nConstant reminders that this is the new normal, atomization of culture leads to isolated lives despite the constant noise, artificial light snuffs out hope, the monotony of office cubicle after office cubicle would cause anyone to run into their paradise, up there in their heads, but even that is not sacred anymore.\n\nStagnation is kicking in fast."
 germany.323.a: "Cornered animals make weird jumps."
 germany.324.t: "The Cult of Capital"
 germany.324.d: "To many, it is a simple fact of life, a giant red line that dictates the quality of our lives. At the stock markets, you see the priests sacrificing the lives of many for the sake of satisfying a sentient entity.\nCapital is alive, Capital has subsumed all culture, Capital has brought change to a halt.\n\nThe ones at the bottom are at fault for not picking up the pace. Life moves fast, and like the market, you have to move faster, sacrifice art, sacrifice culture, sacrifice love and family to surf on that red line just a bit longer, higher and higher. The market is sacred, the businessmen are the clergy, and the traders are the magicians. Capital has spread its tendrils across the world; not even the rising flames of change could kill it.\n\nIn our endless pursuit, we have constructed a new Tower of Babel."
 germany.324.a: "And we all know how that ended."
 germany.325.t: "Rollercoaster"
 germany.325.d: "We will launch Tomahawk missiles upon their holy sites, there is no tomorrow. Fought again last night, lost, made the tough kid bleed a decent amount, never dwell, I stared up at The Vulture sitting in the tree.\n\nI'm socially unconscious.\nAll of us are.\n\nMany don't understand the Hunger that has moved across our world for centuries. With the increasing presence of insincerity, our souls become chained, eyes filled with glass, not even the chemicals sate our cravings.\nOur children learn nothing; those in the eastern wild lands are living better lives while we drown in plastic.\n\nBlue Moon, I have no empathy, a spear pierces the heart of Order.\nThe lights at night cover us in darkness, and we do not see heaven.\n\nOur world does not exist anymore, we dance between the concrete towers.\nThe clock is ticking, reports of violence, crime, and extremism are akin to vermin."
 germany.325.a: "Our perspective on life has become alien."
 germany.326.t: "The Cult of Purity"
 germany.326.d: "There is a stranglehold on all of us.\n\nWe look at the world that could be, and the world that should be.\nYou've seen it.\n\nStatues without forms, colours without meaning, the human shape has become a grey blob.\nA slavish devotion to purity, where any form of true carnal desire is phased out.\nThe rainbow chokes out all that wants to stand out.\nWe look at demoralization each day, every day.\n\nIt is in our heads, in our dreams, and in our eyes.\nFollow the ever-changing dance of their morality, their sensibilities, their standards, and you will be safe, you will not be excluded, your children will remain safe.\n\nWe are free to be what they want us to be.\nWe'll remain in our shells forever."
 germany.326.a: "The shell will break, and we will be in pain."
 germany.327.t: "Poison to the Poisoned"
 germany.327.d: "Your last hope can be an interesting moment.\nThe weight of your burdens is lifted, but your spirit is destroyed.\nYou become a man of the present, floating along with others rather than desperately charting your path.\n\nThose with no future will look at the cities, and will remain curious if their fellow man are filled with sludge, wires, and molten plastic.\nFire. Blood. Release.\n\nThe trigger is pulled, and the sirens are heard, the masses weep, and the experts wonder.\n''Why?''\n\nThe ideological vultures circle above the continent, taking credit for the violence. Each day, our teeth grow sharper and our hearts beat faster.\nThe question has been asked.\n\nNow the answer will come."
 germany.327.a: "The pup that is bitten will bite its own."
 germany.328.t: "The Cult of Order"
 germany.328.d: "Capital restrains the mind, Purity blocks the soul, and Order is what is needed to restrict the body.\n\nRows of figures in armour, sticks to break the bones of the unchained, shields to block the fiery rage of a thrown bottle.\nOrder in the streets, it overlooks the living with its digital eyes.\nThose hiding behind masks are given orders, state-sanctioned violence serves as an outlet to those that crave it, a left hook from the law against the jaw of anarchy, tear gas against those that are already crying, those who stand out will be stomped out.\n\nThe blind faith in those above you.\nOrder lacks something that all other religions have.\nLove.\n\nThose who follow Order will go through hell and beyond to remain safe, marching over those who have given in to the ultimate freedom, and in this blind march, they do not see the abyss they are headed towards."
 germany.328.a: "They felt the piercing eyes of hatred."
 germany.329.t: "Release"
 germany.329.d: "To some, it was sudden; to others, it was an inevitability.\nThe streets grew quieter, the advertisements became more desperate, the higher-ups distanced themselves even more from the cattle, people no longer were supervised by other people, just algorithms and a digital bureaucracy.\n\nViolence.\nA symptom of stagnation that, if left unchecked, would become an open wound that'd attract all kinds of maggots, people are angry, people are tired, people just want to feel again.\n\nOrder received the means to counter it, but in turn, our fangs grew sharper.\nCapital slowly squeezed the means of survival, but hunger became a motivator.\nPurity whispered to us that there'd be no alternative, but the screams were louder.\n\nNothing to say, nothing to justify, and certainly nothing to hold back.\nHow it should be, how it's always meant to be. \n\nThe hyenas, the vultures, and all sorts of other vermin that have been lying dormant under the thin layer of Our Democracy are now rising above the ground, bringing their take of madness onto the continent.\n\nWe no longer recognize the village; it must burn down."
 germany.329.a: "Just to feel its warmth."
 germany.330.t: "Growing Tensions in Europe"
 germany.330.d: "After the recent victory over Russia in the Second European War and the subsequent ascension of the World Economic Forum, it would be without a doubt that its policies wouldn't come without their hiccups.\n\nAlready, a growing number of reports related to several suicides, lethal outbursts, and wide-scale violent crime have made the rounds across the internet, The European Union has stated that these reports are nothing more than blatant attempts at misinformation coming from Russian insurgents that have been reaching out to dissident groups in the Union.\n\nGlobal observers, however, have taken notice that the policies implemented have seemingly negatively affected the human psyche, and already, netizens have made comparisons to the mouse utopia experiment.\n\nIt remains to be seen how the European Union will handle this situation."
 germany.330.a: "An ideal built on quicksand."
 germany.331.t: "Mass Catharsis in Europe!"
 germany.331.d: "Ever since the Internal Security Service of Europe had taken a more active stance on combating misinformation and harmful news, it would seem that the reports of growing internal instability were nothing more than an exaggeration; however since today that no longer seems the case.\n\nViolent riots in the streets, brutal criminal activities, and vicious terrorist attacks have become all too common to the point that the Internal Security Service of Europe has been unable to properly contain any information regarding that.\nAlready, netizens are speaking of a ''Mass Catharsis event'' where constant repression of the human experience and the ever-tightening grip of government control has finally led to its natural breaking point.\n\nCultural centres, offices, military outposts and urban areas have become prime targets for all sorts of groups, reports of militant extremists attempting to cause as much damage as possible have been making the grounds and with the subsequent large amount of assasination attempts on officials, it would seem that the continent is bound for a turbulent time.\n\nThe European Union has stated that it will restore Order to the continent and that this is nothing more than the death rattle of people who are unable to move on. One thing is certain:\nThe continent will never remain the same again."
 germany.331.a: "A new canvas of chaos."
 germany.333.t: "I Call For Europeans to Reflect"
 germany.333.d: "Rubble, shards of glass, stains of blood where my European brothers fell. That's all I see for miles upon miles on end as I'm driven through the ruins of Warsaw. The air is still and the silence is unbearable, only to be cut through by the sobs of a woman digging through the rubble of her home. She is holding the remains of her husband close, as if comforting it will somehow bring him peace in heaven...\n\nThe Orcs of the east; the ones that brought on such suffering have been decimated, fragmented, and now they fight amongst themselves like the barbarians that they are. And yet, as I look around through the windows of this armored car, I feel something other than joy at an enemy defeated. My life has led up to this moment, from a minor economist in Brussels to the leader of the greatest nation in the world. Yet, I do not feel completely fulfilled, and I don't understand why.\n\nCould it be possible that the Russians come back for us again? That the revenge we bestowed upon them will be deflected back towards us? Will the destruction and devastation wrought upon our European countrymen come back with a vengeance? And Europe itself too... How long could it possibly take to rebuild? Months? Years? Decades? The destruction before me is more severe than any of my advisors warned; perhaps they wished to attempt to shield me from the harsh reality. But, despite everything my heart is telling me, I know that I must not get discouraged. Europeans deserve more than a demoralized leader. I have faced harsher odds before, we will rebuild; our cities will scrape the sky and our people will be thankful everyday that they live in the greatest nation under the protection of the greatest alliance, NATO. And if the orcs in the east rise up again, we'll be ready, and we'll prove to them one final time that Europeans do not bend to tyrants, colonizers, and murderers."
 germany.333.a: "Europe shall not fall again!"
 germany.334.t: "Invitation to NATO"
 germany.334.d: "The new leader of the European Union, Gunther Fehlinger, sent us a communique inviting all PDTO countries to join NATO for a joint war effort against Russia and China, citing: "I call Japan and other PDTO countries to join NATO so we could achieve Ex-China and Ex-Russia together".\n\nThough we would clearly have to extend our forces even further to deal with the northern front, the EU has promised rather extensive assistance to us, which could be crucial in defeating Beijing.\n\nHow should we answer?"
 germany.334.a: "We shall defeat Russia and China together!"
 germany.334.b: "Well... No..."
 germany.335.t: "PDTO Agrees"
 germany.335.d: "Japan has agreed to combine NATO and PDTO, meaning that once we begin the war against CSTO, they will get a surprise attack from the east! However, we should also prepare our navy to assist our new allies in the Pacific."
 germany.335.a: "Great!"
 germany.336.t: "PDTO Declines"
 germany.336.d: "Even though the benefits by far outweigh the cost, Japan has refused to further NATO-PDTO cooperation, stating that they have just enough forces to defeat EADI and are not interested in opening another front against Russia. This does, however, mean that we can fully concentrate our forces on taking down CSTO."
 germany.336.a: "Their loss."
 germany.337.t: "The Tragedy"
 germany.337.d: "It was raining again outside. The raindrops tapped steadily against the windowsill, a relentless drip-drip-drip.\n\nThomas slouched on his worn-out couch, one hand clutching a beer bottle, the other lazily flipping through TV channels with the remote. The living room reeked of damp smoke and sour alcohol. A few leftover pizza crusts were scattered across the stained floor. The screen flickered and finally settled on the local news.\n\n"...This morning, a tragedy unfolded in a residential building in northern Bochum. Police report that at least twenty-four residents are suspected to have committed group suicide. The cause remains unclear. Locals say the building had cheap rent and was mostly occupied by the long-term unemployed, many facing serious financial difficulties..."\n\nThomas muttered something under his breath and took a swig of beer, the liquid running down his beard and onto his neck. He squinted at the screen, which now showed a series of blurry images-crumbling hallways, cheap furniture piled behind police tape, and stretchers covered in black cloth. He expected the segment to go on, but suddenly the screen was filled with a bright, jarring commercial.\n\n"Ever wanted to experience the life of a real miner?" A cheerful young host beamed on-screen, standing in front of a staged, refurbished coal mine." Join the 'Century Experience Program' by New Traveller Group! Put on 19th-century work gear, go underground and dig coal yourself! Relive the hardships and glory of the era! Call now to book and enjoy exclusive discounts!"\n\nThomas stared blankly at the TV. Miner? Hardship? Glory? His tongue moved slightly, as if to laugh, but no sound came. His grandfather had spent a lifetime in the mines, coughing up blood until it killed him. Thomas remembered those stories-darkness, damp, suffocation, a life without sunlight. He remembered his grandfather, in his final years, cursing the mine and swearing that if he had a choice, he would never have set foot underground.And now they were selling that suffering. Packaging it as a premium experience.\n\nThomas slid off the couch and sat on the cold, hard floor. The rain still fell outside. Cheerful music played on the television. He let out a laugh-short, hoarse, like glass cracking."
 germany.337.a: "After the laugh, he fell silent again."
 germany.338.t: ""
 germany.338.d: "Just like now.\n\nYou're reading this. Maybe you're thinking, "Wow, that's creepy. That's disturbing." Your brows twitched, your lips tightened-or maybe curled slightly. But that wasn't really your decision-you just "felt" like doing it.\n\nDo you have the chip too? Can't remember? Most people don't. They only remember that one day, they started feeling "better."\n\nThe room's a bit cold, isn't it? Did you just hear something? It's fine-probably just the wind outside.\n\nRelax a little."
 germany.338.a: "Go ahead and smile."
 germany.339.t: "INTERNAL FIELD NOTE – UNSANCTIONED DISTRIBUTION PROHIBITED"
 germany.339.d: "Subject: VTV Deployment Feedback – Eastern Front Units\n\nSummary:\nEU forces have been integrating a range of digital and cybernetic enhancements across several divisions. Among the more experimental systems in use is the Viral Threat Veil (VTV), an ocular implant designed to interface directly with the visual cortex. The core function: altering the perceived appearance of enemy combatants to dehumanize targets in real-time. In short, soldiers see enemies as less human, more monstrous.\n\nOperational Impact:\nPreliminary reports from Estonian forward units show lower recorded stress levels during direct engagements with Russian forces. Troops equipped with VTV demonstrate faster reaction times and reduced hesitation in live combat. However, there has been an unintended side effect: increased reports of excessive aggression and sadistic behavior, particularly during prisoner handling.\n\nOne anonymous quote from a field interview:\n\n"Making these tiblad look like freaks has made me sleep better."\n\nEthical Concerns:\nThere has been at least one confirmed malfunction. VTV units reportedly misidentified non-combatant Russian civilians, triggering visual distortions typically reserved for hostile targets. A video of the incident circulated briefly before being scrubbed from all EU net platforms. This has raised serious ethical flags. Not just from humanitarian watchdogs, but also from within some branches of command\n\nConclusion:\nDespite moral ambiguity and growing ethical concerns, the VTV continues to show measurable success in easing the psychological load of prolonged combat. As is often the case in wartime, the line between utility and conscience remains blurred. Current policy reflects a flexible interpretation of human rights in favor of operational efficiency, under the broader justification of protecting Our Democracy."
 germany.339.a: "Let us keep it under wraps."
 germany.340.t: "The Grand Chessboard - Part I"
 germany.340.d: "The Situation Room had been buzzing for weeks.\n\nThe outbreak of war in Asia sent ripples of panic across the civilian sphere - and sparked a storm of arguments and shifting priorities within the military.\n\nInside the vast operations hall of the European Ministry of Defense, heated debate had dragged on for twelve hours. Officers were nearly at each other's throats when the door suddenly swung open.\n\nA well-groomed, athletic man in his mid-fifties stepped in, calmly taking his seat at the head of the table. A small but weighty plaque before him read: Gunther Fehlinger, President of the European Union.\n\nAt once, every officer stood and saluted.\n\n"I assume you've reached some sort of consensus," he said dryly, not even looking up from his drink. "Since I had to leave Brussels for this."\n\nThe staff scrambled to set up the projector, while a general stepped forward with a folder in hand.\n\n"Commander-in-Chief, we've outlined three actionable courses."\n\nHe gestured to the screen."
 germany.340.a: "..."
 germany.341.t: "The End"
 germany.341.d: "Now there is no one left to laugh, no one to make "exposing" reports, no one can be a conspiracy theorist and no one can resist. Now the grand vision of the World Economic Forum is an undeniable reality, to which there is no alternative.\n\nKlaus Schwab, as much as we had many doubts about his odious personality, overconfidence and recklessness, has managed to implement the program rather effectively and quickly. Though there is still work to do, his personal effort is quite remarkable, and his public title of the leader of the World Government is not just a product of mass media like most things in the modern world - Schwab certainly deserved this little promotion.\n\nUnfortunately though, as he approaches his one hundredth year of life, his managerial skills worsen, and it's time for him to take a well-deserved break.\n\nBut thankfully, this system is not Schwab alone. The journey might be over for him, but that's not where it ends for others. He doesn't know how long he has left, but medicine is progressing, and with great power, great possibilities arise. How long will his successors live? 120, 130, 150 years? Truth be told, a limit has never been reached.\n\nIt's up to them, the future rulers of the world, to maintain the status quo. But now he can only be glad to step back into the shadows again..."
 germany.341.a: "Now as a player, not a pawn."
 germany.342.t: "Loose Ends"
 germany.342.d: ""Well, what are you waiting for then? Just like with Russia, I demand full decolonization now, so Asia can be free from Chinese imperialism forever!"\n\nThe generals glanced at each other with a hint of fear in their eyes. A moment later, one replied firmly, but with a nervous gulp:\n\n"Mr. Fehlinger..."\n\nHe weighed his words once again.\n"The vast geography and population density of China does not allow us to fully occupy it like we could with Russia. Our estimates show that even if we double our conscription rates and mobilize all the personnel in training or retirement, it wouldn't be enough to-..."\n\nGunther brushed the excuses off with a wave of a a hand, submerging himself into shadows of thought with a grim expression on his face.\n\n"...on the bright side" - continued another officer carefully - "the central authority of Beijing has collapsed, and it has led to rump states and cliques forming all over the country... This somewhat fulfills the purpose of dividing China."\n\nGunther looked up with a sense of optimism. Though his plans did not fully come true, there was certainly hope in what he just heard."
 germany.342.a: ""That will have to do... for now.""
 germany.343.t: "Israel Applies for NATO Membership"
 germany.343.d: "After Israel's triumph in the Middle East, their people and their government came together to fully support Israel's entry into NATO to establish security in the Middle East. Permanent German military bases will be established to further entrench Israeli positions and to react in case of another emergency.\n\nIsrael is grateful for our support. If we stick together, no enemy can break us!"
 germany.343.a: "Hoorah!"
 germany.344.t: "The Greens Convene"
 germany.344.d: "The election is still underway, but early polls already show promising prospects for the Greens. Yet one question looms large - both for party members and voters alike: who will lead?\n\nAnnalena Baerbock and Robert Habeck have long shared the party leadership, in line with Green tradition emphasizing equality and balance. But now, the time has come to choose a single face of the movement - someone to carry the country forward as Chancellor.\n\nBaerbock is known for her idealism and directness, unwavering in matters of foreign policy. Many describe her as firm - even confrontational - but also deeply committed to moral clarity and human rights. She is willing to go far to uphold what she sees as a just and principled course. A politician of "the future, not of compromise," she may well be the leader the country deserves.\n\nHabeck, by contrast, enjoys broader public support thanks to his pragmatic, economy-driven outlook. His temperament also stands in contrast to Baerbock's: calmer, more conciliatory, and focused on building consensus. While even he has grown more assertive on foreign policy, he remains, in the eyes of many, "the realist" - a leader who understands how the system works, and is ready to work within it to bring change.\n\nWith that in mind, the party has now concluded its internal vote and announced which of the two will stand as their candidate for one of the most critical positions in the country..."
 germany.344.a: "Annalena Baerbock!"
 germany.344.b: "Robert Habeck!"
 germany.345.t: "CDU/CSU: Battle for the Future"
 germany.345.d: "If any political force in Germany's multi-party system can be considered the "old guard," it would undoubtedly be the CDU/CSU. Founded in 1945 in the wake of the war and unified - at least nominally - in 1949, the two have operated in tandem ever since, across all levels of government.Some might even call them a "pillar of stability." But internal divisions, especially now surrounding the upcoming elections and the chancellorship, make that label feel more like wishful thinking.\n\nAll public expectations pointed to Merz as the obvious candidate - the alliance's favorite, virtually guaranteed the nomination. Yet, in a twist no one saw coming, the leader of the CSU declared his own intention to run.\n\nEnter Markus Söder: officially Bavarian and Christian-social. While the Bavarian part is undeniably true, the name of his faction doesn't quite reflect his ideological stance. Known for his loud and often contradictory statements, Söder enjoys strong regional popularity. He openly opposes multiculturalism, while simultaneously supporting liberal causes like same-sex marriage and mandatory vaccination.\n\nBy contrast, Merz is more right-leaning. Having lost his internal battle to Angela Merkel two decades ago, he's determined not to step aside again. A seasoned judge, lawyer, and financial expert, he now seeks to add "chancellor" to his résumé. Calm, competent, and arguably more capable than his rival, he nevertheless struggles to command the same public attention.\n\nWith the bloc's gradual decline becoming harder to ignore, perhaps an unexpected decision is exactly what's needed. In the end, after weighing all options, the CDU/CSU came to a conclusion that..."
 germany.345.a: "Merz's experience wins over the party."
 germany.345.b: "Söder's ambitions are more convincing!"
 germany.346.t: "Choosing the Alternative?"
 germany.346.d: "The AfD remains one of Germany's most controversial parties. Founded in 2013, not even its original members could have imagined what it would grow into today. Euroscepticism, right-wing populism, Islamophobia - even neo-Nazism - are terms that have practically become synonymous with the party in the eyes of much of the public.\n\nAnd yet, its popularity continues to rise. Ongoing tensions over immigration, misguided government policies, and general political disillusionment only fuel interest in the AfD and expand its voter base.\n\nBut now, the party stands at a crossroads - deciding who will lead their electoral campaign among its two most influential figures: Alice Weidel and Tino Chrupalla.\n\nWeidel is an eccentric figure - fitting for a party like hers. She often provokes strong reactions from the media and public due to her bluntness. She is a woman of principle, unafraid to stand by her beliefs regardless of the backlash. Like her party, she is in favour of economic liberalism and a return to nuclear energy.\n\nHer internal rival, Chrupalla, presents a more palatable option for a broader audience. Calmer, more collected, and more inclined toward compromise. With his diplomatic nature, he promises to unify the party like never before - and can always find a way to negotiate with political opponents.\n\nSo, after several weeks of debates, discussions, persuasion, and just about everything imaginable, the party - under the watchful eyes of the press and the public - made a nationwide announcement, that..."
 germany.346.a: "Alice Weidel can assemble a big tent coalition!"
 germany.346.b: "Tino will do a better job at uniting the party..."
 germany.347.t: "New Leader of Die Linke Speaks Out"
 germany.347.d: "Compared to their rivals in this election, Die Linke appear to be a rare island of internal stability. With a consistent, near-uncompromising political platform, an ideologically unified voter base, and a leader - perhaps more accurately, a leading woman - who recently stunned the nation with a single speech.\n\nHeidi Reichinnek may be the most "youthful" candidate in this year's race. Her activity and popularity on social media rival those of seasoned influencers, and her unfiltered authenticity - from tattoos to her fiery statements in the Bundestag - surpasses even her archrival from the AfD.\n\nYet despite her outspoken defense of women's rights, her commitment to workers, and her self-declared stance for "democratic socialism," the party's polling numbers remained modest... at least until recently.\n\nAs the election heats up, inter-party compromises have become common across the spectrum. But for Reichinnek, the final straw was the discussion of potential cooperation between the CDU and AfD. When Friedrich Merz - one of the national frontrunners - voiced support for stricter migration laws during a week of national mourning for concentration camp victims, she responded without hesitation.\n\nTaking the podium at the first opportunity, the head of Die Linke delivered a fierce, uncompromising speech condemning such rhetoric. Even many of her political opponents admitted to being struck by the moral clarity she projected - and her exclamation, "This is the damned problem!" spread like wildfire across the country.\n\nWhile it's hard to measure the lasting impact of her words, one thing is certain: for the first time in years, Germany may be on the verge of electing a party that places its workers - at the center of national policy."
 germany.347.a: "Germany heading leftwards again?"
 germany.348.t: "Soft Skin"
 germany.348.d: "The world is one massive aggregation of delusions.\n\nThis is how empires were built: on the ideals of a few that saw visions from a place we were never meant to see.\nWhen you gently touch someone, what does it feel like?\nRight or wrong?\nGood or bad?\nRed or blue?\n\nYour opinion differs from the other, and in a just world, you would have shattered that person's windpipe; well, you can.\n\nIt is none other than yourself that prevents you from seeing the world as it is.\nIt is only natural that the holy entity in which you believe and devote yourself will be a reflection of yourself.\nHence, how can I believe anything my eyes show me?"
 germany.348.a: "Tear them out, see beyond the veil."
 germany.349.t: "Darwin"
 germany.349.d: "Violence is natural, violence is healthy, it is the only way to ensure that all living beings get to live another day. We did this since we crushed each other's skulls with rocks when we were hiding in caves.\n\nThe lion violates the small dog, the shark devours the whale, and the vulture pecks the dying.\n\nThe future is uncertain, but the present, the today, and the here and now are all that matter.\nOur fists are bloodied, our grins are visible.\nThe world we live in right now is what matters.\n\nI don't get why you vilify this.\nAren't we all doing the same thing, directly or not?\n\nWe elbow our way past others so we can survive, and those who lack the capacity for it are left to rot in the mud. The cult of Capital has always encouraged this, and now that we are pushing this to its natural conclusion, you hide away in your shelters and bunkers.\n\nThe European Union claimed to have done the things it did to respect life.\n\nWhat's the reason to respect life?\nDo you think you're respecting life right now?"
 germany.349.a: "Only one law remains."
 germany.350.t: "Hunger"
 germany.350.d: "An era where humanity is dominated by the act of consumption.\n\nHunger leads to annoyance, annoyance leads to anger, anger leads to brutality.\nThat's how we are.\n\nAs you might expect from the ivory tower that wants to rule over us all, the World Economic Forum demands that we eat the ''right'' things.\nIf something is correct, there is something that is deemed "incorrect," isn't there?\n\nHunger is natural, but then people draw the line at eating their fellow man.\nWho decided it so, and why? Is it because human life is precious?\n\nWhat makes the lives of animals less precious? Have we not been forced to eat insects?\n\nHumanity is the apex predator, so it would make sense for us to form packs of humans, so there shouldn't be any problem with us rising above the rest and preying on others.\n\nEach city will become an urban jungle where we will sate our deepest desires at the cost of others."
 germany.350.a: "To escape the sting we all feel."
 germany.351.t: "Modern Architectural Solutions"
 germany.351.d: "The many peoples of Europe speak many languages, and their cities are often inefficient, convoluted messes, full of "cultural centers" which have stood for centuries and remain nothing but nostalgic testaments to a past we continuously move further away from.\n\nThe truth of the European City is that the past is protected for no good reason, old cobble roads maintained for no proper purpose. We are building a Europe, a universal Europe, one people who must feel a collective whole, an identity. These ancient Cathedrals and palaces built centuries, sometimes a millennia before, were never meant to last this long.\n\nTo build a European Identity, these regional "monuments" must be replaced, a single European architecture adopted. Over time we will build cities which are efficient, organized. Winding roads and footpaths will be bustling streams of commerce and production, teeming with workers like a river full of driftwood.\n\nLet them protest, but they will have nothing to covet, they will learn to love the office buildings and sky scrapers we put in their place, true things of achievement and architectural marvel, we have no need for baroque palaces and long dead admin centers of counts and kings."
 germany.351.a: "It's a new dawn, it's a new life."
 germany.352.t: "ReArm Europe is Greenlit"
 germany.352.d: "Commission President Ursula von der Leyen, ever the European Warmaiden, proposed the ReArm Europe plan as part of her greater Readiness 2030 Agenda, accelerated ever since the collapse of America in 2021. The lack of American funds and American arms has placed Europe into a precarious position.\n\nAll Europeans, of any make and model, jointly understand how pressing the situation is. European Union rules dictate fiscal stability but swift rearming in response to the rise of Russian expansionism and the collapse of our greatest defender requires loans, risk taking, and budget cuts.\n\nWhile the initial draft of this held a conservative 800 Billion Euro price point, the proposition that passed the European Parliament today held a 1.4 Trillion Euro price tag, with plans to cut the European Budget, issue loans, and to divert funds from unimportant ministries, all in an effort to establish a unified procurement program with the goal of European Rearmament.\n\nWhile the plan is named Readiness 2030, the hope is for many European nations to far exceed this benchmark with added funds and hopefully the reintroduction of conscription in some major nations, but the plans ultimate success will rely on the cooperation of Euro Titans like Germany, France, Italy, and Spain, to mobilize and counter the Russian threat with their money, manufacturing, and manpower.\n\nThe passage of this plan through the European Parliament is a grand first step towards the implementation of war measures across the Union in prediction of escalated tensions both domestic and abroad."
 germany.352.a: "Democracy Saving Democracy?"
 germany.353.t: "ReArm Europe: Open the Wallet"
 germany.353.d: "With the passage of ReArm Europe, the European Unions fiscal stability rules have been greatly loosened to widen the options of European nations for short term mobilization. But given this, many EU nations are hesitant to take risks, many do not want to act alone, as Europe grows closer together it is up to the Titans to guide the entire Union forward.\n\nGermany may well be the decision maker in this arrangement, anything they do, others will likely follow proportionately. There are multiple options, the first of which is to simply leave rearmament up to each individual nation, allowing all nations to eat the debt directly through the acquisition of defense loans.\n\nAlternatively, the European Union subsidies provided to many of the poorer nations in the Union seem to disappear into an abyss of poverty and corruption anyhow, and perhaps we can make cuts here and there to divert these subsidies towards a collective procurement program.\n\nOr last, but perhaps the most or less risky depending on how you view it, place Germany at the center of rearmament efforts. It could pay off and greatly expand our production capacity but it could also sink us into debt, and so soon after a stock market crash, taking on loans on behalf of our poorer vulnerable neighbors would be unpopular.\n\nIn Summary, Debt Equity? Fiscal Stability? Or Loans for Influence? Shall we centralize the European Rearmament Efforts or delegate them? At this stage, it is up to you, Chancellor."
 germany.353.a: "I see no reason they cannot pay."
 germany.353.b: "Cut the EU, Our money should go to us."
 germany.353.c: "We will lead Europe. Vorwärts!"
 germany.354.t: "White Gold Beneath Our Feet?"
 germany.354.d: "Berlin, Deutsche Welle (DW)\n\nA new chapter in Germany's industrial future may have just been unearthed beneath the fields and hills of Saxony-Anhalt. After months of preliminary geological surveys, federal and state mining authorities have confirmed the presence of sizable lithium deposits, one of the largest ever discovered on European soil. \n\nDubbed "white gold" by investors and engineers alike, lithium is essential for the production of electric vehicle batteries, energy storage systems, and next-generation defense technologies. Until now, the European Union's green and digital ambitions have been heavily dependent on foreign imports, particularly from Australia, Chile, and China. That may be about to change. \n\nExperts estimate that the reserves found could supply over a quarter of the EU's projected lithium needs for the next two decades. This find comes at a time when Brussels is pushing for greater strategic autonomy, and Berlin is leading efforts to reshape the continent's industrial backbone under the dual banner of energy transition and military modernization.\n\nAlready, consortiums of German and European firms are preparing feasibility studies for rapid extraction. Infrastructure plans, environmental assessments, and political lobbying are accelerating at unprecedented speed. The regional government, caught between promises of economic revitalization and environmental caution, has called for \"balanced development\", but the pressure is building.\n\nFrom Bitterfeld to Bernburg, a quiet region long associated with post-industrial stagnation may now become a frontline in Europe's 21st-century resource race. Whether this "lithium moment" will translate into lasting transformation remains to be seen. But for now, all eyes turn to Saxony-Anhalt, and to the white metal beneath its soil."
 germany.354.a: "The Battery of Europe Has Been Found"
 germany.355.t: "From Ore to Autobahn"
 germany.355.d: "Hamburg, Der Spiegel\n\nAt the edge of Hamburg's commercial district, a long line of cars glints beneath a winter sun. Inside the dealership, there's bustle, more than there's been in years. For the first time in a decade, waiting lists for new German cars are back, and the buyers aren't grumbling.\n\n"We looked at the BYD," one middle-aged couple tells Der Spiegel, "but this one feels right. I don't want software from Shenzhen running under my steering wheel." \n\nThe vehicle in question is the new electric SUV from BMW, one of several models using batteries sourced from the emerging lithium operations in Saxony-Anhalt. "Our lithium," the salesman says with a grin. "From here, not Chile."\n\nThe connection isn't lost on the customers. With EU tariffs on Chinese EVs making imports less attractive, and after months of headlines about domestic mining breakthroughs, there's a growing sentiment that buying German is more than a preference, it's patriotic. One younger buyer, freshly employed at a local gigafactory, calls it "closing the loop."\n\n"We get the lithium out of our own ground, build the batteries in Jena, assemble the cars in Stuttgart. That's how it should be," he says, signing his name on the dotted line.\n\nFor an industry once left reeling by foreign tech and homegrown scandal, the tide may be turning. And for Germany, long defined by its roads, its machines, and its pride in both, the engine of recovery is humming again."
 germany.355.a: "Electric Dreams, Made in Germany"
 germany.356.t: "The EU-Mercosur Deal"
 germany.356.d: "After years of negotiations, the EU-Mercosur trade agreement has returned to the table, this time with real momentum behind it. Supporters in Brussels frame it as a strategic breakthrough: a vast free trade zone linking Europe to South America's largest economies, lowering tariffs, expanding access to critical resources, and opening new export markets at a moment when global supply chains are increasingly unstable.\n\nFor Europe, the advantages are clear on paper. Industrial exporters stand to benefit from easier access to South American consumers, especially in automobiles, machinery, chemicals, and high-end manufacturing. The deal would also reduce Europe's dependence on unpredictable suppliers by strengthening ties with Brazil and its neighbors, securing agricultural imports and key raw materials. In an era of rising blocs, it offers Europe a way to keep trade routes open without relying on Great Powers.\n\nBut the costs are just as real. European farmers and agricultural unions warn that opening the market to Mercosur products could trigger a wave of cheap imports, squeezing domestic producers and deepening rural backlash already simmering across the continent. Environmental opposition is stronger still: critics argue that the agreement rewards deforestation and weak labor standards, placing German climate policy in direct contradiction with its trade ambitions.\n\nThe government now faces a choice between strategic commerce and political stability at home. Signing the deal strengthens Germany's economic reach abroad, but risks igniting a domestic storm it may not be able to control."
 germany.356.a: "Sign the Deal."
 germany.356.b: "Too Risky, Reject It."


 germany.189.t: "Explosion at the Party Nucleus"
 germany.189.d: "At 3:17 AM, an explosive device tore through the district headquarters of the PDS in Halle. Surveillance footage showed a hooded figure slipping past the perimeter shortly after midnight, lugging a crate marked with delivery tags. Minutes later, the cameras cut out.\n\nThree comrades were killed instantly. Seven others injured, two critically. The workers' collective department was now a soot-filled ruin of charred concrete and melted plastic. Emergency responders covered the red-star insignia on their uniforms to avoid being targeted by follow-up attacks. It didn't help. One firetruck was pelted with bricks before police could arrive.\n\nBy noon, a communique surfaced online, bearing the crude sigil of the 'Aktionsfront Deutscher Nationalisten'. Their "Anti-Communist Manifesto" was a patchwork of blood-and-soil rhetoric, historical grievance, and technocratic libertarianism dressed in Nazi rhetoric.\n\nThe Ministry of State Security released names--some real, some intentional guesses--of suspected collaborators. Security presence doubled across major cities. The phrase ''fascism in the walls'' echoed again in the plenary halls. For some, it was deja vu."
 germany.189.a: "Though it felt like something worse was coming."
 germany.190.t: "Breathing Again"
 germany.190.d: "The Federal Intelligence Service would be reformed, repurposed and renamed. The resolution passed with little fanfare, but no one doubted its significance. In the echoing halls of the Volkskammer, the restoration of the infamous Ministry for State Security, or the Stasi, were to return.\n\nIt was a product of socialist legality and revolutionary necessity, the same familiar edges, the same clipped accents, the same typewritten forms. The same silence when the elevator doors opened and you found two polite men in grey coats waiting outside your flat. Already, reports of subversive gatherings in the Saxon countryside were being compiled. Border logs grew thicker. Street informants returned, this time with better phones and worse morals. It wasn't 1989 anymore. It was [GetYear]. The tools had changed, but the mission had not.\n\nComrade Minister Bartsch spoke before the plenary: "A socialist republic cannot survive with blinders on. We do not spy, we safeguard. We do not repress, we prevent. But we will not permit reaction to sharpen its knives behind closed doors."
 germany.190.a: "A defense of a fragile peace."

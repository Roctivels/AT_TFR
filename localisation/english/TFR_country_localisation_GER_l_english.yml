 #Decisions
 GER_europe_decisions_divider: ""
 GER_green_decisions_divider: ""
 GER_europe_decisions_divider_desc: "\n\n\n£GFX_GER_blue_decisions_pr\n\n\n\n\n\n\nCurrent §3£GFX_GER_blue_economy_points_texticon Blue Economy Points\:§! [?GER_blue_economy_points_var|+0]"
 GER_green_decisions_divider_desc: "\n\n\n£GFX_GER_green_decisions_pr\n\n\n\n\n\n\nCurrent §7£GFX_GER_green_economy_points_texticon Green Economy Points\:§! [?GER_green_economy_points_var|+0]"
 GER_rearm_europe_divider: ""
 GER_rearm_europe_divider_desc: "\n\n\n£GFX_GER_rearm_europe_pr\n\n\n\n\n\n\nThe ReArm plan will be anything but simple. We will be able to track its success, each level improving the positive effects of our project, once finished.\n\nIt's important to know how many resources we want to spend on our ReArm plan! Once the timed idea will have run out, we will not be able to activate further decisions.\n\n§Y10§! - Germany will gain an additional 3 military industries.\n§Y20§! - A toned-down version of the ReArm idea will remain to all EU countries after the plan is finished.\n§Y30§! - We will gain an additional §G5§!§3£GFX_GER_blue_economy_points_texticon Blue Economy Points§!.\n§Y40§! - Miscellaneous Military Technology bonuses for all EU countries.\n§Y50§! - The ReArm idea will remain to all EU countries after the plan is finished.\n\nCurrent §YReArm Europe Plan Success Level§!: [?GER_rearm_europe_plan_tracker|+0]\n\n§RShould war break out with Russia, ReArm Europe will be stopped, regardless of its current status!§!"
 GER_sustainable_economy_decision: "Invest in §7Sustainable§! Economic Choices"
 GER_sustainable_economy_decision_desc: "\n\n\n\n£GFX_GER_sustainable_economic_choices_pr\n\n\n\n\n\nSustainable sectors offer long-term growth and ecological security. We will inject liquidity into green innovation, grant subsidies, and direct capital flows toward sustainable growth sectors make our economy with environmentally responsible."
 GER_inclusive_economy_decision: "Promote §AInclusive§! Economic Choices"
 GER_inclusive_economy_decision_desc: "\n\n\n\n£GFX_GER_inclusive_economic_choices_pr\n\n\n\n\n\nEconomic growth is always important, but we must not forget that a modern and successful economy must involve more than just the big players. Our economic development plan must incentivize and promote what some call inclusive choices and development. Citizens, small businesses, and larger firms must have a diversity of options both in the market and with state partnerships under shared development goals."
 GER_industries_shut_down_mission: "§YGerman Businesses§! Shut Down..."
 GER_industries_shut_down_mission_desc: "\n\n\n\n£GFX_GER_shutdown_industries_pr\n\n\n\n\n\nCompetition from foreign conglomerates and, above all, rising energy prices are making it less profitable to do business in Germany and are encouraging local businesses to close or relocate elsewhere..."
 GER_stabilize_energy_prices_green_decision: "§REmergency§! Energy Conservation Measures"
 GER_stabilize_energy_prices_green_decision_desc: "Facing instability in supply chains and rising prices, we must act swiftly. Emergency energy restrictions and conservation campaigns will ease the strain while longer-term infrastructure is brought online."
 GER_stabilize_energy_prices_blue_decision: "Ask for a §3European§! Assistance Package"
 GER_stabilize_energy_prices_blue_decision_desc: "Our economic development plans are quite impressive, but unfortunately we do not have the funds available to cover all of them. However, instead of waiting for more funds, we will request the European Union to immediately grant us an extensive financial aid package that can quickly cover the gap with a variety of important projects."
 GER_greenify_the_bundesautobahn_3: "§7Greenify§! the §YBundesautobahn 3§!"
 GER_greenify_the_bundesautobahn_3_desc: "The Bundesautobahn 3 remains vital to national logistics. Upgrading it with EV lanes, solar panels, and smart traffic systems will modernize our transport routes and reduce emissions across key corridors."
 GER_greenify_the_bundesautobahn_7: "§7Greenify§! the §YBundesautobahn 7§!"
 GER_greenify_the_bundesautobahn_7_desc: "The Bundesautobahn 7 remains vital to national logistics. Upgrading it with EV lanes, solar panels, and smart traffic systems will modernize our transport routes and reduce emissions across key corridors."
 GER_approve_the_european_grids_package_decision: "Approve the §3European§! §7Grids§! Package"
 GER_approve_the_european_grids_package_decision_desc: "Europe's power grids are fragmented, inefficient, and unprepared for renewable integration. We should back the Grids Package to modernize cross-border energy links and ensure long-term stability and green energy distribution."
 GER_decarbonization_of_heavy_industries_decision: "§7Decarbonization§! of Heavy Industries"
 GER_decarbonization_of_heavy_industries_decision_desc: "Steel, chemicals, and cement remain some of the dirtiest sectors in Europe. We must invest in breakthrough technologies and incentives to slash emissions without sacrificing industrial productivity or jobs."
 GER_extra_urban_electric_mobility_decision: "Extra-Urban §7Electric Mobility§!"
 GER_extra_urban_electric_mobility_decision_desc: "We should extend EV infrastructure beyond city centers: charging stations, subsidies, and grid support, to make electric mobility a viable and attractive option in rural and peripheral regions."
 GER_foster_ev_plants_decision: "Foster §7EV§! Plants Construction"
 GER_foster_ev_plants_decision_desc: "By supporting the construction of new EV manufacturing plants across the continent, we can stimulate industrial jobs, reduce carbon output, and secure Europe's position in the global green auto sector."
 GER_kickstart_biofuel_production: "Kickstart §7BioFuel§! Production"
 GER_kickstart_biofuel_production_desc: "\n\n\n\n£GFX_GER_biorefineries_pr\n\n\n\n\n\nWe will fund large-scale biofuel refinement initiatives, prioritize agricultural conversion grants, and offer tax relief for companies shifting from hydrocarbons to renewable biomass."
 GER_extend_the_megdaz_pipeline: "Extend the §YMedgaz§! Pipeline"
 GER_extend_the_megdaz_pipeline_desc: "The Medgaz natural gas pipeline between Algeria and Spain is a critical piece of energy infrastructure that needs immediate expansion. With new equipment, pipes, and support infrastructure, the extended line can cover more of Spain and even other EU nations, addressing a serious weak link in our energy security."
 GER_european_smart_factories_ITA: "§3European AI Factories§!: IT4LIA"
 GER_european_smart_factories_ITA_desc: "Artificial Intelligence is a rapidly evolving tool that must be used in modernizing local industries. With this new regional hub and AI integration initiative, we can expect automated systems and production lines powered by sophisticated AI programs and algorithms to significantly boost production and efficiency."
 GER_european_smart_factories_SPR: "§3European AI Factories§!: 1HealthAI"
 GER_european_smart_factories_SPR_desc: "Artificial Intelligence is a rapidly evolving tool that must be used in modernizing local industries. With this new regional hub and AI integration initiative, we can expect automated systems and production lines powered by sophisticated AI programs and algorithms to significantly boost production and efficiency."
 GER_european_smart_factories_GRE: "§3European AI Factories§!: Pharos"
 GER_european_smart_factories_GRE_desc: "Artificial Intelligence is a rapidly evolving tool that must be used in modernizing local industries. With this new regional hub and AI integration initiative, we can expect automated systems and production lines powered by sophisticated AI programs and algorithms to significantly boost production and efficiency."
 GER_european_smart_factories_SWE: "§3European AI Factories§!: MIMER"
 GER_european_smart_factories_SWE_desc: "Artificial Intelligence is a rapidly evolving tool that must be used in modernizing local industries. With this new regional hub and AI integration initiative, we can expect automated systems and production lines powered by sophisticated AI programs and algorithms to significantly boost production and efficiency."
 GER_european_smart_factories_GER: "  §3European AI Factories§!: JAIF"
 GER_european_smart_factories_GER_desc: "Artificial Intelligence is a rapidly evolving tool that must be used in modernizing local industries. With this new regional hub and AI integration initiative, we can expect automated systems and production lines powered by sophisticated AI programs and algorithms to significantly boost production and efficiency."
 GER_european_smart_factories_POL: "§3European AI Factories§!: PIAST AI"
 GER_european_smart_factories_POL_desc: "Artificial Intelligence is a rapidly evolving tool that must be used in modernizing local industries. With this new regional hub and AI integration initiative, we can expect automated systems and production lines powered by sophisticated AI programs and algorithms to significantly boost production and efficiency."
 GER_european_smart_factories_HOL: "§3European AI Factories§!: NLAIF"
 GER_european_smart_factories_HOL_desc: "Artificial Intelligence is a rapidly evolving tool that must be used in modernizing local industries. With this new regional hub and AI integration initiative, we can expect automated systems and production lines powered by sophisticated AI programs and algorithms to significantly boost production and efficiency."
 GER_reopen_coal_mines_decision: "Reopen the §YRhineland Coal Mines§!"
 GER_reopen_coal_mines_decision_desc: "With energy supplies strained and industrial demand rising, reopening coal extraction in the Rhineland is a stopgap to stabilize power generation. While environmentally costly, it provides immediate fuel security, protects heavy industry, and buys time for longer-term energy transitions to take hold."
 GER_new_refineries_decision: "Expand the §YGelsenkirchen Refinery§!"
 GER_new_refineries_decision_desc: "Modernizing and expanding the Gelsenkirchen refinery is meant to reduce fuel bottlenecks and strengthen domestic processing capacity. By increasing synthetic and refined output in Westphalia, we can ease energy constraints on industry and improve supply resilience during a period of transition."
 GER_new_power_plants_decision: "Open new §YPower Plants§!"
 GER_new_power_plants_decision_desc: "Expanding power generation is a direct response to rising industrial demand and grid strain. New plants are intended to secure reliable electricity for factories and cities alike, preventing shortages that could stall recovery."
 GER_invite_industries_civilian_microsoft: "  Invite §YMicrosoft§! to §3Europe§!"
 GER_invite_industries_civilian_microsoft_desc: "\n\n\n\n£GFX_GER_microsoft_pr\n\n\n\n\n\nBy inviting Microsoft, we can strengthen European cloud infrastructure, AI development, and cybersecurity capabilities while integrating global standards into our digital and administrative systems."
 GER_invite_industries_civilian_intel: "Invite §YIntel§! to §3Europe§!"
 GER_invite_industries_civilian_intel_desc: "\n\n\n\n£GFX_GER_intel_pr\n\n\n\n\n\nEurope's chip dependency remains a strategic vulnerability. Partnering with Intel could anchor advanced semiconductor fabrication on the continent and secure supply chains for both civilian and military industries."
 GER_invite_industries_civilian_electrics: "Invite §YGeneral Electric§! to §3Europe§!"
 GER_invite_industries_civilian_electrics_desc: "\n\n\n\n£GFX_GER_electrics_pr\n\n\n\n\n\nGeneral Electric's experience in energy, aviation, and heavy industry makes it a valuable partner for modernizing European infrastructure and supporting long-term industrial resilience."
 GER_invite_industries_military_raytheon: "Invite §YRaytheon Technologies§! to §3Europe§!"
 GER_invite_industries_military_raytheon_desc: "\n\n\n\n£GFX_GER_raytheon_technologies_pr\n\n\n\n\n\nRaytheon's expertise in air defense, radar, and missile interception could significantly enhance Europe's layered defense networks against modern aerial threats."
 GER_invite_industries_military_northrop: "Invite §YNorthrop Grumman§! to §3Europe§!"
 GER_invite_industries_military_northrop_desc: "\n\n\n\n£GER_northrop_grumman_pr\n\n\n\n\n\nCooperation with Northrop Grumman would strengthen European capabilities in drones, space systems, and strategic reconnaissance, areas increasingly central to modern warfare."
 GER_invite_industries_military_lockheed: "  Invite §YLockheed Martin§! to §3Europe§!"
 GER_invite_industries_military_lockheed_desc: "\n\n\n\n£GFX_GER_lockheed_pr\n\n\n\n\n\nInviting Lockheed Martin would provide access to advanced aerospace and missile technologies, supporting European rearmament and accelerating the modernization of joint defense programs."
 GER_invite_industries_military_dynamics: "  Invite §YGeneral Dynamics§! to §3Europe§!"
 GER_invite_industries_military_dynamics_desc: "\n\n\n\n£GFX_GER_dynamics_pr\n\n\n\n\n\nGeneral Dynamics offers proven land and naval systems. Partnering with them could support European armored vehicle programs and modern naval construction efforts."
 GER_invite_industries_civilian_tesla: "  Invite §YTesla§! to §3Europe§!"
 GER_invite_industries_civilian_tesla_desc: "\n\n\n\n£GFX_GER_tesla_pr\n\n\n\n\n\nWe should invite Tesla to expand EV and battery production in Europe, leveraging its expertise in large-scale manufacturing and energy storage to accelerate electrification and stabilize continental power grids."
 GER_north_sea_hydrogen_network: "Northen Sea §YHydrogen§! Network"
 GER_north_sea_hydrogen_network_desc: "The area's resource infrastructure is seriously underexploited, something that we will immediately expand and modernize. From oil to other emerging energy sources, a new network of modern industries and infrastructure will make the region a serious hub for energy production for both us and the whole EU."
 GER_european_5industry_initiative: "§3European§! §Y5.0§! Industry Initiative"
 GER_european_5industry_initiative_desc: "\n\n\n\n£GFX_GER_fivezero_industry_pr\n\n\n\n\n\nModern industry needs modern computing hardware and related tech, a sorely overlooked issue that is now the primary objective of our ambitious European 5.0 Industry Initiative. With it we will integrate advanced computing systems, high-skill labor, and cutting-edge software to greatly increase efficiency and productivity across a variety of sectors."
 GER_negotiations_with_ETUC_decision: "Negotiate with the §sEUTC§!"
 GER_negotiations_with_ETUC_decision_desc: "\n\n\n\n£GFX_GER_EUTC_negotiate_pr\n\n\n\n\n\nOpening talks with the European Union Trade Confederation aims to stabilize labor relations during a period of rapid restructuring. By securing union buy-in for reforms and investment plans, we can reduce disruption, manage expectations, and keep production moving while changes take effect."
 GER_bail_out_german_farmers: "Bail Out §YGerman Farmers§!"
 GER_bail_out_german_farmers_desc: "\n\n\n\n£GFX_GER_Farmers_negotiate_pr\n\n\n\n\n\nYears of rising fuel costs, strict environmental rules, and volatile markets have pushed German farmers to the brink. Emergency subsidies and targeted relief are intended to stabilize rural economies, preserve food security, and prevent further collapse in the agricultural sector."
 GER_negotiations_with_families_decision: "Help §YGerman Families§!"
 GER_negotiations_with_families_decision_desc: "\n\n\n\n£GFX_GER_families_negotiate_pr\n\n\n\n\n\nRising living costs, housing shortages, and economic uncertainty have placed increasing strain on German households. Direct financial support and targeted investment aim to ease daily pressures, sustain consumption, and reinforce social stability while longer-term reforms take effect."
 GER_negotiations_with_corpos_decision: "Enforce §3European§! Rules on Corporations"
 GER_negotiations_with_corpos_decision_desc: "\n\n\n\n£GFX_GER_corpos_negotiate_pr\n\n\n\n\n\nMajor firms operating in Europe benefit from the single market; they are expected to follow its rules. By tightening enforcement of EU competition, tax, and labor standards, we can curb excesses, restore public trust, and ensure that growth does not come at the expense of fairness or social cohesion."
 GER_negotiations_with_small_businesses_decision: "Help §YSmall Businesses§!"
 GER_negotiations_with_small_businesses_decision_desc: "\n\n\n\n£GFX_GER_small_negotiate_pr\n\n\n\n\n\nSmall firms have borne the brunt of recent shocks, squeezed by energy prices, falling demand, and tightening credit. Targeted liquidity support and regulatory relief are meant to keep shops open, protect local employment, and restore confidence in the everyday economy."
 GER_carbon_tax_decision: "Establish a §7Carbon§! Tax"
 GER_carbon_tax_decision_desc: "\n\n\n\n£GFX_GER_carbon_tax_pr\n\n\n\n\n\nPricing carbon emissions is intended to shift industry away from inefficient and polluting practices without resorting to outright bans. By making environmental costs explicit, we can encourage cleaner production, fund innovation, and steer agriculture and manufacturing toward more sustainable models."
 GER_promote_nuclear_power_in_poland_decision: "Promote §HNuclear Power§! in Poland"
 GER_promote_nuclear_power_in_poland_decision_desc: "Poland's energy sector, heavily reliant on outdated coal infrastructure, suffers from inefficiency and pollution. We should accelerate nuclear projects to modernize the grid, reduce emissions, and secure long-term energy stability."
 GER_confirm_canada_partner: "Confirm the [CAN.GetFlag] §dCanadian§! Partnership"
 GER_confirm_canada_partner_desc: "Even though Canada is not in Europe, they have been a historic and trustworthy ally, an ally that deserves further cooperation. With the signing of a new partnership, we will greatly expand everything from bilateral diplomacy to trade relations."
 GER_confirm_british_partner: "Work with [ENG.GetFlag] §RBritish§! Banks"
 GER_confirm_british_partner_desc: "Despite political friction, British banks remain deeply integrated in the continent's financial networks. Cooperation may be unpopular, but pragmatic coordination could ease volatility and boost liquidity."
 GER_reinvigorate_the_european_banks_decision: "Reinvigorate the §3European§! Banking Sector"
 GER_reinvigorate_the_european_banks_decision_desc: "We should channel funds to stabilize key European banks, harmonize financial regulations, and restore credit flow across borders, which will lay the groundwork for a resilient post-crisis recovery."
 GER_introduce_the_digital_euro_decision: "Introduce the §CDigital§! §3Euro§!"
 GER_introduce_the_digital_euro_decision_desc: "\n\n\n\n£GFX_GER_digital_euro_pr\n\n\n\n\n\nLaunching a digital version of the Euro would modernize our payment systems, reduce reliance on foreign platforms, and give Europe a sovereign foothold in the financial technologies of tomorrow."
 GER_confirm_china_partner: "New Deals with [PRC.GetFlag] §dChinese§! §7Green§! Industries"
 GER_confirm_china_partner_desc: "We are prepared to open select sectors to joint ventures with Chinese ecological firms in exchange for green tech, capital inflows, and industrial expertise critical to our transition, without sacrificing sovereignty, of course."
 GER_offshore_wind_farms_projects: "Offshore §7Wind Farms§! Projects"
 GER_offshore_wind_farms_projects_desc: "Offshore wind farms offer untapped potential from previously unproductive zones. We should fund new designs, expand coastal infrastructure, and establish a long-term offshore wind network to power our future." 
 GER_finish_the_railbaltica_project: "Finish the §YRailBaltica§! Project"
 GER_finish_the_railbaltica_project_desc: "The RailBaltica project is an ambitious effort to link multiple nations that are on the Baltic with a modern rail network to replace the older communist era lines that were still being used. There have been some serious delays with it in recent years but now is the time to finally complete this project and usher in a new era of stronger regional economic and political cooperation."
 GER_budapest_bucharest_varna_railroad: "§YBudapest-Bucharest-Varna§! Railroad"
 GER_budapest_bucharest_varna_railroad_desc: "Hungary, Romania, and Bulgaria are European Union and NATO members that have seen serious oversight by EU authorities. Still struggling with the legacy of communist neglect, a large amount of their infrastructure is old and underfunded with little money available in their national budgets for modernization efforts. However, it is time to address this great weakness and complete a modern rail line that will link multiple major cities in the region and bring their economies closer together."
 GER_munich_milan_railroad: "§YMunich-Milan§! Railroad"
 GER_munich_milan_railroad_desc: "Italy is a major part of the European Union's economy that needs serious attention to its infrastructure which will be the objective of this expansive new railroad project. A new rail line connecting the major cities of Munich and Milan will surely expand our opportunities for trade and bilateral cooperation."
 GER_consolidate_the_euro_position: "Consolidate the §3Euro§! Position"
 GER_consolidate_the_euro_position_desc: "With the dollar crippled, stabilizing and promoting the euro as a trusted reserve and trade currency is essential. Coordinated fiscal signals, liquidity guarantees, and market confidence measures aim to anchor the euro as a global standard in a fractured financial order."
 GER_batteries_dynamic_decision: "Smart Batteries Network: [FROM.GetName]"
 GER_city_green_power_grids: "§7Green§! Cities Power Grids"
 GER_city_green_power_grids_desc: "\n\n\n\n£GFX_GER_green_grids_pr\n\n\n\n\n\nUrban power systems must evolve. Supporting smart grid expansion, decentralized energy hubs, and clean energy storage will make our cities more efficient, resilient, and ready for rising demand."
 GER_launch_the_rearm_europe_plan_decision: "Launch the §YReArm§! §3Europe§! Plan"
 GER_invest_in_the_european_defense_industries_decision: "Invest in the §3European§! §YDefense Industries§!"
 GER_invest_in_the_european_defense_industries_decision_desc: "We should allocate public funds to boost Europe's military-industrial output, modernize production lines, and secure strategic autonomy through long-term industrial resilience and export competitiveness."
 GER_invest_in_the_european_military_red_decision: "Invest in the §3European§! §YMilitary R&D§!"
 GER_invest_in_the_european_military_red_decision_desc: "Injecting liquidity into advanced military R&D will help secure long-term innovation, expand European research networks, and accelerate the development of next-generation defense capabilities."
 GER_european_taurus_project_decision: "Project §YTaurus§!: A §3European§! MBT"
 GER_european_taurus_project_decision_desc: "\n\n\n\n£GFX_GER_main_battle_tank_pr\n\n\n\n\n\nProject Taurus seeks to develop a standardized European main battle tank. By unifying design and procurement, we reduce duplication and strengthen continental land forces for decades to come."
 GER_leonardo_rheinmetall_joint_decision: "§ALeonardo§!-§3Rhein§!§gmetall§! Joint Venture"
 GER_leonardo_rheinmetall_joint_decision_desc: "We shall sponsor joint ventures between European firms like Leonardo and Rheinmetall to consolidate fragmented weapons markets and scale up common systems for faster, cheaper, and more integrated armament."
 GER_promote_polish_militarization_decision: "§YPromote§! §RPol§!ish Militarization"
 GER_promote_polish_militarization_decision_desc: "Poland has both the will and the frontier position to become a key pillar of Europe's defense. With targeted subsidies and deals, we can supercharge its militarization and increase the plan's success chances."
 GER_new_military_installations_in_romania_decision: "New §YMilitary Installations§! in §BRo§!§Yman§!§Ria§!"
 GER_new_military_installations_in_romania_decision_desc: "Romania's eastern position makes it a strategic location. We'll invest in local infrastructure to support rapid deployments, test logistics, and extend Europe's deterrence envelope."
 GER_american_military_testzone_decision: "Test §YWeapons§! in the [USA.GetFlag] §RAmerican Civil War§!"
 GER_eastern_european_drone_silos_decision: "Eastern European §YDrone Silos§!"
 GER_eastern_european_drone_silos_decision_desc: "Drones are the future of warfare. We should expand and fortify drone silo infrastructure across Eastern Europe to ensure rapid-response capabilities, regional deterrence, and scalable long-range strike options."
 GER_upgrade_drone_production_decision: "Upgrade §3European§! Drone Production"
 GER_upgrade_drone_production_decision_desc: "Investing in advanced drone manufacturing will enhance Europe's autonomous warfare capabilities, reduce supply bottlenecks, and strengthen strategic depth across all theaters."
 GER_mine_lithium_decision: "Mine §YLithium§! in §YSaxony-Anhalt§!"
 GER_mine_lithium_decision_desc: "The discovery of lithium deposits offers a rare chance to strengthen domestic supply chains. By launching controlled extraction in Saxony-Anhalt, we can support battery production, advance strategic autonomy, and revive regional industry tied to future technologies."
 GER_finance_european_research_council_decision: "Finance the §3European Research Council§!"
 GER_invest_in_ASML_decision: "Invest in §YASML§!"
 GER_invest_in_STM_decision: "Invest in §YSTMicroelectronics§!"
 GER_smart_batteries_grids: "Smart Batteries Network"
 GER_smart_batteries_grids_desc: "\n\n\n\n£GFX_GER_green_batteries_pr\n\n\n\n\n\nThis state has been selected as a hub for large-scale energy storage and grid stabilization. A coordinated network of smart battery facilities now absorbs surplus power, smooths peak demand, and shields local industry from energy shocks. By pairing storage with construction planning, factories operate more efficiently, expansions proceed faster, and the region becomes a model for resilient, power-secure industrial growth."

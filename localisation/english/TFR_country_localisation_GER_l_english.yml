 GER_eu_green_deal: "EU Green Deal"
 GER_eu_green_deal_desc: "It does not take a genius in ecology to see that climate change is laying waste to our planet. Sea levels are rising, global temperatures are increasing, and the seasons are getting more volatile. This will incur havoc not just on our economy or air conditioning bills, but on our future as a country. However, we will not wait for the environment to evaporate around us. After considerable budgeting, deliberation amongst member states, and tons of work and construction, the EU's "Green Deal" is now a reality. Renewable energy sources, ranging from solar, wind, and hydroelectric, now serve as a more significant component of the continent's energy production. Older fossil fuel sources are being rapidly phased out while their transition to cleaner methods is coming just as fast. Hopefully this all can be our first steps in creating a long-lasting solution not just for the continent, but for the planet as well."
 GER_eu_green_deal2: "EU Green Deal"

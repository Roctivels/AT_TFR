 GER_peoples_economy_dynamic: "Volkswirtschaft"
 GER_peoples_economy_dynamic_desc: "The German economy has long been an inevitable economic superpower. The Rhine provides a large quantity of resources which have facilitated industrialization in the past, combined with a large and experienced population, it's no wonder our nation has the largest economy in the European continent and one of the largest in the world for that matter. However, it has faced recent trials. Stagnant growth, unemployment, and the neglect of nuclear energy sources. It is up to the current and near German administrations to ensure the German economy rises to its place amongst the superpowers once more.\n\n\n\n\n£GFX_GER_volkswirtschaft_banner\n\n\n\n\n"
 GER_bundeswehr_dynamic: "Bundeswehr"
 GER_bundeswehr_dynamic_desc: "Established in 1955 during the Cold War, the Federal Defenses or Bundeswehr is Germany's armed forces and is responsible for Germany's defense and international missions. Ever since Germany reunified, the Bundeswehr has faced serious neglect and budget cuts. But now that Moscow seems to be showing her true colors, talks of uplifting the Bundeswehr into a truly respectable force are growing amongst all groups of German life."
 GER_bundestag_dynamic: "Bundestag"
 GER_bundestag_dynamic_desc: "The Bundestag is Germany's federal level parliament. It hosts a wide variety of political parties across the political spectrum, painting a broad picture of the nation's current political makeup, and allows representatives of each party to debate and deliberate laws and state policy. However, like in countless other democracies, its makeup is never constant as the winds of political change and elections consistently shake it up. Especially now, with populist and even radical parties gaining popularity, we can expect a restless and tense climate within parliament. Politicians and voters alike equally ask what kind of political upset could be waiting right around the corner.\n\n\n\n\n\n£GFX_GER_bundestag_banner1\n\n\n\n\n"

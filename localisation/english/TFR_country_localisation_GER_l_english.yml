 GER_ending_world_neutrality_idea: "Ending World Neutrality"
 GER_europapa_idea1: "Princes of the Universe"
 #DDR Focuses
 GER_scratch_a_liberal: "The End of Liberalism"
 GER_scratch_a_liberal_desc: "Late stage capitalism has finally reached its end, the liberals together with the bankers have betrayed the German worker by failing to stop the fascist menace in the east. However the German worker sees clearly now. Through the ashes of the failed neoliberal order the German worker will finally rise up against their oppressors and break their chains. Together we will tear down the capitalist system and establish a new, just, socialist world"
 GER_organize_disilusioned_soldiers: "Organize Disillusioned Soldiers"
 GER_organize_disilusioned_soldiers_desc: "Thousands of young men have been sent to the eastern front and died, for what? The fascists in Russia triumphed in the east while the veterans at home are sleeping in the streets as the bourgeois are up in their mansions counting their money and laughing at the proletariat. We must remind the veterans of their sacrifices and what they lost. The veterans may be weak now but they were the ones fighting in the front lines, they have discipline, willingness to fight and most importantly they remember their fallen comrades. We must organise them and make them into the vanguard of our revolution"
 GER_organize_the_factory_workers: "Organize the Factory Workers"
 GER_organize_the_factory_workers_desc: "The end of the war has brought an economic collapse, and the German worker has felt the brunt of it: layoffs and massive wage cuts, meanwhile the upper class still lives in their ivory towers. To even call ourselves socialist, we need the workers' support. We will reach out to them and organize them, reminding them how they have toiled in the factories earning scraps while their bosses feast on the fruits of their labor. The capitalist has chained us for generations, but now, we shall break loose.\n\nProletarier aller Länder vereinigt Euch!"
 GER_organize_the_radical_students: "Organize the Student Radicals"
 GER_organize_the_radical_students_desc: "Our universities have become hotbeds of revolutionary thought as a new generation of intellectuals rejects the failed system of the old guard. Throughout history, students have been the harbingers of revolt and revolution. From the protests against the imperialist Vietnam War to the French student revolt in May '68. We will harness their fury and idealism to breathe new life into our cause and build the foundation of the new Germany!"
 GER_necessity_for_militarization: "Necessity for Militarization"
 GER_necessity_for_militarization_desc: ""
 GER_ideological_correctness: "Form a United Anti-Fascist Front"
 GER_ideological_correctness_desc: ""
 GER_a_new_october: "A New October"
 GER_a_new_october_desc: "The factory workers are leaving their factories, the farmers are leaving their fields, and the students are revolting. From the factory floor to the university hall, the working class is one. The revolution is soon upon us, and every man, woman, and child is marching in the streets against the state built upon the cult of capital. As the revolution approaches, the capitalists flee like rats and leave behind the ruins of the old, but the proletariat will rebuild and endure. United \nAnd the battle's going again,\nAnd the heart's uneasy in the chest.\nAnd Lenin is young once again,\nAnd the young October is ahead"
 GER_provisional_revolutionary_popular_front: "Reorganize the New Government"
 GER_provisional_revolutionary_popular_front_desc: "The revolution, albeit arduous and challenging, we have finally accomplished it. As the quakes of the revolution begin to calm down, it is crucial that we swiftly form a new government to combat the aftershocks of this enormous change in order. Rest assured our new government will be much more stable than that of the previous one. This new government shall be a beacon of hope to the German people, guide them through this dark period of European history, and lead them towards total liberation."
 GER_revanchist_propaganda: "Promote Social Diversity"
 GER_revanchist_propaganda_desc: "The far-right has always claimed that diversity will be the downfall of Germany, of Europe-but one need only look across the Atlantic to prove them wrong. America is a nation built on the sweat and blood of immigrants. Without them, it could never have reached the heights it is at today-or, well... was at. The LGBTQ+ community has long lived in the shadow of oppression and hate, but in the new Germany, that must no longer be the case. We must embrace social diversity and teach our people to accept and adapt to this new era and its cultures. After all, it is easy to hate-but far more courageous to love."
 GER_adopt_warrior_culture: "Deconstruction of Postmodernity"
 GER_adopt_warrior_culture_desc: ""
 GER_warriors_revolution: "New Leftism for a New Age"
 GER_warriors_revolution_desc: "Some of our comrades dream of returning to the good old days of the German Democratic republic, but that is all but an empty and foolish dream. Undeniably the GDR had its ups and downs and of course they were a better option than their contemporary to the west, but this old relic did not fail without its reasons. Corruption at its highest level, nation wide paranoia, and a multitude of issues led to its decay and inevitable collapse. The 21st century is all but too different from the cold war era. New ideas, new groups of people, and increasing international co-operation are too much for a system like the GDR to handle. Hence this new era calls for a new form of socialism, new form of communism, to move forwards and advance towards prosperity."
 GER_new_vanguard_of_revolution: "Radical Leftist Democracy"
 GER_new_vanguard_of_revolution_desc: "The winds of change now sweep through Germany, and the people demand a voice that reflects a post-capitalist society. The old political parties, shackled by their compromises with the corruption and decay that is liberalism, no longer have a place in German politics. It is time for the people to move forward. The socialist future is not a monolith, it is an amalgamation of diverse ideologies with their own separate visions for the path forward. The time has come for the country to decide. Germany's first socialist elections will not just determine the next government, they will define the nature of the workers' revolution itself. Who will steer the ship of German socialism through these turbulent times?"
 GER_cause_greater_than_life: "Hegemony of Socialist Culture"
 GER_cause_greater_than_life_desc: "The revolution is not just a radical modification of the German government. It must become a cultural revolution, a process that touches every layer of society previously held by liberalism. It is not just the workers' demands for rights that must be satisfied; the very hearts and minds of the German people must be awakened to the possibilities of post-capitalism. Socialism must not only be a political system; it must become the air that the people breathe, the songs the youth sing, the art our artists create, and the literature we read."
 GER_revolutionary_german_history: "Federalization Initiative"
 GER_revolutionary_german_history_desc: "The traitorous scum that filled the arteries of the Federal Republic did everything they could to keep Europe divided, to keep the workers arguing over petty nationalism and other such divisions. These scars caused by the liberal government still run deep within Europe, creating a nasty gash over the face of our free governments. We cannot allow this to continue, we need to cooperate to destroy the fascist scum to the east, now more than ever. We must not allow ourselves to be caught up in petty arguments, we need to unite and federalize our internationale."
 GER_form_european_internationale: "Form the European Internationale"
 GER_form_european_internationale_desc: "All workers' revolutions have succeeded through a united front. The bourgeoisie have kept their boots on our necks by distracting the working class with culture wars, dividing us against ourselves. However, now the jig is up, and the day of reckoning is upon them. We must not repeat the mistakes of past revolutions. Together, as a united front, we will crush both fascist and capitalist reaction. "
 GER_new_german_man: "Ensure People's Support"
 GER_new_german_man_desc: "For a nation that follows the teachings of Karl Marx, that represents the very body and soul of the working class German, it simply cannot thrive nor succeed in its ambitions unless it can secure the support of its people. It is an absolute necessity and priority at this moment to ensure the support of the German nation as a whole if it ever so even begins to conceptualize, and let alone materialize a socialist utopia."
 GER_ostaglie: "Revive the Ostalgie"
 GER_ostaglie_desc: "The neoliberal rot that has consumed Germany for so long didn't begin with Merkel or Scholz. It began in 1990, when the Democratic Republic was swallowed by the ravenous jaws of capitalism. For decades, the East was told to be ashamed of their past, to forget its spirit of steadfast antifascism and working-class solidarity that let Germany rise from the ruins of Nazism. But now, as the Reichstag is ours and the liberal order crumbles, the time is now to unearth the legacy buried beneath the Berlin asphalt.\n\nWe will restore the Socialist Unity Party and build a new Democratic Republic. Let the doubters sneer and call it nothing more than nostalgia; this time, we will not fall. This time, we will not bend to either Moscow nor Brussels."
 GER_intensify_class_struggle: "Mimic the National Front"
 GER_intensify_class_struggle_desc: "In the first Democratic Republic, the Socialist Unity Party didn't govern alone, but alongside a carefully curated gallery of minor parties and mass organizations, each permitted to speak, but not to defy. The National Front projected unity, stability, and above all, control. As we revive the SED and reclaim the legacy of the East, it is only natural we revisit these methods.\n\nThe NDPD, the CDU, the DBD, the LDPD; names long thought extinct rise again under our watchful eye. The reactionaries will, of course, call this a window dressing. But the truth is simpler: legitimacy is built on perception. The people demand order, and a government. We shall give them both, and make certain no one forgets who leads the chorus."
 GER_sword_of_the_shield_of_the_party: "Sword and Shield of the Party"
 GER_sword_of_the_shield_of_the_party_desc: ""You cannot make a revolution in white gloves." - Vladimir Lenin\n\nThe enemies of the workers have not disappear simply because the revolution is well underway. Reactionaries lie in wait, cowardly whispering counter-revolution behind closed doors, and the agents of foreign capital continue their eternal work of sabotage. If we are to preserve the revolution, we must be willing to protect it, by any means necessary. Though many will still shudder at the memory of the Ministry for State Security, the workers' revolution must be safeguarded from these internal threats. The tools of the Stasi are not a luxury, they are a necessity."
 GER_liquidate_the_capitalist_class: "Socialist Germanism"
 GER_liquidate_the_capitalist_class_desc: "This is not the first German revolution. From the Spartacists of 1919 to the resistance to the Nazi tyrants, our history is one of struggle; often silenced and betrayed, but never forgotten. The blood of Luxemburg still stains the waters of the Landwehr Canal. Thälmann's voice still echoes through the halls of Buchenwald. We inherit the heavy legacy of their heroic struggle against insurmountable odds.\n\nFor too long, Germany's millenary identity was hijacked by monarchs, militarists, and genocidal maniacs. But no longer will we cede the German nation's soul to reactionaries and fascists. For ours is the true Germany: the Germany of revolutionaries and fanatical antifascism. The world ought to see what a socialist nation, unshackled from capital and reaction, can become."
 GER_revolutionary_justice_for_traitors: "Revolutionary Justice for Traitors"
 GER_revolutionary_justice_for_traitors_desc: "The age of immunity is over. For too long, cowards and opportunists in government, media, and industry have sold out the German people to capitalist pigs and NATO ministers. They spoke of their precious democracy while suppressing the workers, praised peace while feeding the military-industrial complex, and hailed prosperity while millions sank further into poverty. And now, they let fascism return, and conquer our Eastern brethren.\n\nNow they face justice, not vengeance, but accountability. Their crimes against the workers, the environment, and the very essence of peace will be aired for all to see. In Karlsruhe, the first of several trials will begin. There will be discomfort, and division. But there will also be clarity: the old order is gone, and its servants will not be allowed to return. This is not a purge. This is a long-overdue reckoning."
 GER_socialist_democracy: "Spread Marxist Ideals"
 GER_socialist_democracy_desc: "It is not enough to try the traitors and scum of the Federal Republic, we must ensure the German people understand why they have been betrayed. The scars of liberalism run deep, and the poison that is the capitalist mindset still lingers in the minds of many. In response, we will launch a sweeping campaign of reeducation, public outreach, and cultural revival. In every factory floor, every school, and every syndicate, the tenets of Marx, the greatest German to ever live, will be heard once more. The workers and peasants of Germany will learn again to dream of a world free from exploitation and oppression."
 GER_anti_fascist_bastion: "Anti-Fascist Bastion"
 GER_anti_fascist_bastion_desc: "Facism, the insufferable scourge that defined and reshaped human history for the better part of the last century, the beliefs that tainted the reputation and contaminated the mind of the German people, once again seeks to undermine their very way of life. we must, and shall stand as the face and center of Europe, defiant against their hordes, be the shining example of resilience against evil and all who seek to depose of the very teachings of Marxism, Germany and all its people, must stand as the shining bastion of Anti-Facism for all of the continent."
 GER_revolutionary_society: "Slay the Bear"
 GER_revolutionary_society_desc: ""
 GER_centralized_planning: "Centralized Planning"
 GER_centralized_planning_desc: "The German Democratic Republic was known for its advanced system of centralized planning. The system was vastly complex, with many different control mechanisms existing to support such a unique economic system. The system functioned smoothly, with the public even partaking in some parts of the planning. Tragically, with the forced reunification of Germany, this rational and fair system was dismantled overnight, replaced by a chaotic, profit-driven liberal mixed economy that failed to deliver on its promises. History has proven that a planned economy is truly the way forward for German society and as such we shall once more transform our economy into a centrally planned one!"
 GER_revitalize_german_industry: "Revitalize German Industry"
 GER_revitalize_german_industry_desc: "Not long ago, hundreds of factories worked triple shifts to put rifles in the hands of our soldiers and bread on the tables of our citizens. Now, from those once-proud workshops echoes nothing but a loud, bitter silence. Shattered infrastructure, a shortage of skilled hands, and a complete lack of purpose - all of this will be addressed starting today. And first, we will give everyone a clear goal: the prosperity of the German nation and the German worker!"
 GER_reindustrialize_the_ruhr: "Reindustrialize the Ruhr and the South"
 GER_reindustrialize_the_ruhr_desc: "The shift toward a service economy - coupled with our government's capitulation to the Green faction - led to an unprecedented decline and deindustrialization of our most vital industrial regions. Today, we tear down these artificially imposed social restraints, and on the rich industrial foundations of the past, we will raise new factories and production hubs once more!"
 GER_reindustrialize_the_south: "Reindustrialize the South"
 GER_reindustrialize_the_south_desc: "" #UNUSED
 GER_protect_german_workers: "Modernize Labor Laws"
 GER_protect_german_workers_desc: "The worker is the backbone of the German economy, the foundation upon which our industries, infrastructure, and prosperity are built. Without his labor, innovation, and dedication, our economic engine would falter, and the strength of our nation would diminish. Not providing him with respect and safety in the workplace destroys the unity and stability of our nation, as well as our economy! As such, the government must secure the rights and safety of the workers. By overhauling our labor laws, we will streamline production, strengthen worker protections, and ensure that every citizen contributes to the collective effort efficiently and purposefully. Stronger worker protections will not only improve living standards but will also foster a sense of loyalty and national unity among the workforce."
 GER_socialist_anti_consumerism: "Socialist Anti-Consumerism"
 GER_socialist_anti_consumerism_desc: "Ah, the old days - when workers spent their precious wages on the same goods every year, repackaged to fuel an endless cycle of want. That cycle ends now. We will provide everything our people need to live - food, shelter, dignity - and even a modest comfort or two. But no longer will false desires drive our economy. The age of mass manipulation through consumption is over. From now on, production will serve life, not profit."
 GER_construct_working_class_unity: "Construct Working Class Unity"
 GER_construct_working_class_unity_desc: "From the engineer at the BMW factory to the road worker paving streets for those very cars - we must work in sync and as one to achieve the bright future our predecessors failed to attain. And though we may differ, and though disagreements may arise, every German worker must understand: our path forward lies in mutual support and solidarity between fellow comrades - for the prosperity of the nation!"
 GER_socialist_market_economics: "Socialist Market Economics"
 GER_socialist_market_economics_desc: ""
 GER_community_of_european_workers: "Community of Socialist Workers"
 GER_community_of_european_workers_desc: ""Vereine"- groups of people united for a common purpose - have long been a part of our nation's fabric. Political, athletic, intellectual - associations of every kind have shaped German society. Today, we take it one step further: the creation of a nationwide workers' association! Regular seminars, gatherings, and even relaxing social evenings will be organized by the state, ensuring that our workforce builds stronger bonds and shares the knowledge needed to move forward as one."
 GER_socialist_pseudo_consumerism: "Socialist Pseudo-Consumerism"
 GER_socialist_pseudo_consumerism_desc: "Ah, the old days - when people spent their wages on all manner of trinkets that, nonetheless, made them feel just a little bit happier. Unfortunately, consumerism in the old Germany went too far - it began to shape lives, not just enhance them. We won't return to that, but through our new, flourishing model of prosperity, we will offer joy and dignity to our people in the present, not just in the distant future."
 GER_unity_of_the_unions: "Unity of the Unions"
 GER_unity_of_the_unions_desc: ""
 GER_connecting_the_country: "Powering the Country"
 GER_connecting_the_country_desc: "To keep our new factories running - and to power the homes of the workers who staff them - we require an immense amount of energy. In these conditions, we must lift the bans on nuclear power, despite the deep-rooted fears held by much of the population. And while the new reactors are still under construction, the old, once-abandoned coal and thermal plants - will have to carry us toward the future."
 GER_revitalize_the_german_consumer_market: "Revitalize the Consumer Market"
 GER_revitalize_the_german_consumer_market_desc: "The post-war period is always a time of hardship. Thousands of widows and orphans, shattered homes, collapsed schools and hospitals. In such times, it is our duty to ensure that the people are not only cared for, but truly content with the life they are rebuilding. To that end, we will cautiously reintroduce elements of consumerism - on our terms, of course. After all, a content citizen is the cornerstone of a healthy economy."
 GER_nationalize_vital_industries: "Nationalize Vital Industries"
 GER_nationalize_vital_industries_desc: "Much to the misfortune of foreign investors - and the great fortune of our workers - we are finally reclaiming for the people what rightfully belongs to them! Key sectors such as heavy industry, transportation, advanced technology, and pharmaceuticals will be brought under public control. These industries are too important to be left in private hands - they must serve the people, not profit."
 GER_encourage_cooperative_economics: "Encourage Cooperative Economics"
 GER_encourage_cooperative_economics_desc: ""
 GER_turn_ploughshares_into_swords: "Turn Ploughshares Into Swords"
 GER_turn_ploughshares_into_swords_desc: "Everything we've done so far has laid foundations that will last for decades to come - and already, the fruits of our labor are starting to show. Yet beyond our borders lie those who would see our way of life destroyed. We will not let that happen. Our labor will become our weapon. Our factories will shift from ploughshares to swords, and our workers will triumph - on the factory floor, and on the battlefield!"
 GER_rebuild_the_bundeswehr: "Expand the European Internationale"
 GER_rebuild_the_bundeswehr_desc: "The bells of freedom ring across Western Europe as the workers of not just Germany, but many nations call out in hope and joy! Yet not all is well within our continent. The fascist Russians sit atop their throne of conquest, hungrily eyeing our people, resources, and wealth. With NATO a thing of the past, we are united with our brother nations in nothing but ideology. If that is not remedied, we will be picked off one by one, until no free European nations remain. We must not let this happen, we will protect the revolution and our people, long live the free workers of the world!"
 GER_control_the_skies: "The International Revolution"
 GER_control_the_skies_desc: "Socialism as an ideology has seen a large resurgence around the world since the collapse of America. Without that horrid amalgamation of capitalist ideals around to stamp out any socialist sentiment, the will of the people began to burn brightly. Yet they are still being stomped on by their governments and societies, and without aid their noble cause may be doomed to fail. At this time we cannot spare much, but anything we can will go towards furthering the goals of the people, at home and abroad!"
 GER_new_aerial_academy: "Assistance from the American Revolution"
 GER_new_aerial_academy_desc: "After years of strangulation, the workers of America have finally risen up and taken their rightful place. While their position may still be uncertain, they have secured enough resources and equipment that they have a surplus, which they have so kindly donated to us. This show of camaraderie and brotherhood will not go unnoticed, and once the bourgeois have been entirely eradicated from the North American continent, further collaboration will be in due order."
 GER_streamline_aircraft_production: "Support Scandinavian Communists"
 GER_streamline_aircraft_production_desc: "Scandinavia was perhaps the one region untouched by the war against Russia. While they fought, they did not fall to Russia, and they quelled the communist sentiment that brought revolution here and across Western Europe. Rather, they still cling to their well-meaning, albeit flawed, democratic socialism. If they want to continue into the future with the workers of Europe, their governments will have to put aside these outdated ideals and accept the course this continent is taking. As we all know they won't willingly do that, we will find those who are willing to take control violently, and hand them a gun."
 GER_modernize_the_eurotyphoon: "Contact Anti-Fascist Partisans"
 GER_modernize_the_eurotyphoon_desc: "The Russians have never been great at anything, and they are certainly failing at wrangling control over Eastern Europe. Partisans have popped up all over occupied territories, and while they may not all be socialist, any anti-Russian is a friend of ours. It is inevitable that we will eventually march east to liberate these chained masses, and when the time comes, having a reliable partisan network will certainly be a great advantage. As such, it is imperative we sharpen that tool now, for when that glorious day comes!"
 GER_moscow_shall_know_fear: "Prepare an All-Out Partisan War"
 GER_moscow_shall_know_fear_desc: "The time has come to strike at the knees of our Russian foes. High command has deemed that the partisan forces we've built up in the east are suitable for full-scale warfare, and they have been ordered to conduct as much. This will drastically lower public trust in the Russian regime, as well as soften their nation for our eventual attack. While in the end these partisans may be doomed to fail, their sacrifices will aid us in our eventual liberation of the east. Death to Russia, long live the European Internationale!"
 GER_steel_torrent: "Connections with China"
 GER_steel_torrent_desc: "China, for a long time a foe and the last major beacon of communism, perhaps now an ally. While our people are still quite wary of each other, the fact we now share a common ideology in a world where everyone seems to be making up new ways to govern out of the blue means a lot. We are now in a much better spot for collaboration, and perhaps in the future a mutually beneficial agreement can be established between us. For now, however, normalizing relations will have to suffice."
 GER_localize_tank_production: "The Wagenknecht Agreement"
 GER_localize_tank_production_desc: "The Chinese, though longtime friends of Russia, have become alienated by the latter's recent ideological shift. They have found us to be much more willing collaborators, and, sensing war on the horizon, have offered an interesting proposition. Should Russia be defeated in war, it will be carved up between the two of us, and we will be free to play with our new puppets however we like. The age of the Russian-Chinese partnership is now truly over, and from now on they will be as opposed to each other as communism and capitalism."
 GER_trial_of_treasonous_politicians: "Electronic Warfare Studies"
 GER_trial_of_treasonous_politicians_desc: "We live in a day and age where war is fought from chairs as much as it is in trenches. Our last war with Russia proved that our doctrine was horribly outdated, and that we did not fully understand how to harness this new generation technology. Before we can even hope to go toe-to-toe with our eastern counterparts, we must be able to confidently say we are able to use this technology to the same extent they do."
 GER_study_new_mobile_doctrines: "International Military Cooperation"
 GER_study_new_mobile_doctrines_desc: "Talks with the Chinese have been going incredibly well, as we continue to find more and more common ground with our far eastern comrades. Recently, a joint military operation was proposed, and it was accepted readily by both sides. While it is unlikely we will ever fight a war together, given our distance, there is always a chance. And so preparations have begun for not just a large-scale drill, but also increased military cooperation in the future. And plus, nothing bad can come from being friends with the Chinese."
 GER_an_elite_officer_corps: "Assist the Baltic Resistance"
 GER_an_elite_officer_corps_desc: ""
 GER_build_the_national_peoples_army: "Build the National People's Army"
 GER_build_the_national_peoples_army_desc: "Our recent military collapse in the east has left our army in tatters, our stocks are depleted and our men are either dead or demotivated. Like every socialist revolution before us, we are threatened and surrounded by capitalist states that would gladly crush our revolution. We must protect our revolution and our workers by any means, and that includes building up our army. We shall not use our new army for any imperialist adventure as our old guard did, but instead as the shield of the working class. "
 GER_trial_of_treasonous_generals: "Trial of the Treasonous Generals"
 GER_trial_of_treasonous_generals_desc: "While building a military based entirely off of loyalty is a fool's errand, you equally don't want generals you can't trust. Among our military ranks are a slew of traitors to the revolution and remnants of the old regime. In order to ensure this nation's future, both militarily and politically, it is necessary we remove these traitorous generals before they have the chance to cause any more trouble. Their positions will be replaced with servants of the people...who also have the reputation to back it up, of course."
 GER_pick_up_sword_of_damocles: "Pick Up the Sword of Damocles"
 GER_pick_up_sword_of_damocles_desc: "No matter how hard we fight the Russians, they will always have a trump card up their sleeve. While the French and British both have meager nuclear arsenals, they pale in comparison to that of our eastern neighbor, and even if we managed to destroy a few cities we would still be wiped off the map. Luckily, in America's absence, there is next to no one enforcing nuclear weapons treaties, and so we are free to pick up the Sword of Damocles. With it, we will behead the Russians, and free the millions toiling away under their rule!"
 GER_immer_bereit: "§YUNTERNEHMEN§!: FALKE"
 GER_immer_bereit_desc: "Our communist utopia has taken root in Western Europe, but for our state to truly thrive, we must address the enduring threat posed by the Russian Bear in the East. For too long, Russian influence, driven by a volatile and oppressive ideology has trampled on cultures of different nations. The people's of Russia and Eastern Europe have suffered under this authoritarian regime and are in urgent need of liberation. It is our duty to help free them from the grip of this ideological tyranny that has brought so much destruction to Europe and pave the way for a communist utopia in the whole European Continent."
 GER_fury_of_the_people: "Fury of the People"
 GER_fury_of_the_people_desc: "Can you hear it? Can you hear the Earth trembling sound that rumbles across Germany? It is in the streets, in the homes, and in the factories. It is the sound of the workers, the farmers, the laborers and the common men, the proletariat of Germany clamoring for the defense of the revolution. It is a fury of the masses; a fury that sees the forces of reaction surrounding us and demands action, action that we will waste no time in taking. By our directive our preparations and mobilization will be extensive and radical. The armed forces will be expanded, the arms will be distributed, the nation prepared, and the masses agitated for a fight. Everyone sees it very clearly. A deadly battle is coming, but it will be the fanaticism of the people that we will channel that will bring us victory."
 GER_introduce_mass_conscription: "Introduce Mass Conscription"
 GER_introduce_mass_conscription_desc: "After the end of the DDR and the reunification of germany, One of the problems of the rotten former Bundeswehr was the lack of manpower due to a Volunteer only conscription system, This has got to change if we want to have a chance in the next war, The Wehrpflicht as many called it, will be re-introduced to enlarge not our only manpower pool, but our current army too."
 GER_learn_from_our_enemies: "Learn From Our Enemies"
 GER_learn_from_our_enemies_desc: ""
 GER_nationalize_heckler_and_koch: "Reorganize Rheinmetall"
 GER_nationalize_heckler_and_koch_desc: "Rheinmetall was the jewel in capitalist Germany's crown of corporate conglomerates. This billion-dollar behemoth of a company was a major part of the manufacturing backbone of NATO's armored force, but now this entity belongs to us. Instead of dismantling this agent of global NATO imperialism, we will nationalize and reorganize it to serve the defense goals of the new German socialist state. Departments will be restructured, new projects will be initiated, production goals will be shifted, and most importantly, all traces of capitalist self-interest and profit-seeking will be destroyed. What once worked to arm the capitalist west against socialism will now be the one to help in bringing socialism to all of Europe."
 GER_a_motorized_army: "Renew Motorized Tactics"
 GER_a_motorized_army_desc: "Modern warfare, for all the talk of robots and drones, remains heavily reliant on fast-moving motorized and mechanized formations. Masses of infantry in APCs and IFVs maneuvering quickly to outpace and destroy the enemy will be an important factor in any future conflict. Considering this, we must review and reinvigorate our tactics regarding infantry motorization. From our military academies to units in the field, focusing on combat within this paradigm must become paramount. Like the old motor rifle formations of the GDR, our enemies will soon think twice before engaging us in a major ground war."
 GER_prestigious_german_engine: "Paint the Skies Red"
 GER_prestigious_german_engine_desc: "History and our recent war has taught us one thing, whoever controls the skies will win the war. The Luftwaffe lacked a lot of necessary funding to put up an effective fight against the Russian Air Force. Therefore the Airforce will be reorganized and funding towards Air R&D and Maintenance will be increased, to further better our chances of controlling the skies."
 GER_refocus_the_automobile_industry: "Steel Torrent"
 GER_refocus_the_automobile_industry_desc: "Our preparations have been nothing less than extensive. We have raised thousands upon thousands of men, built fortresses and factories, and forged mountains of armor and steel; it is a force the continent has not seen in many years. Yet it is more than just sheer power. It is something so much more than that. It is the collective will and effort of the working class of all of Germany, and it is brewing something fearsome. Soon all of Europe will witness a storm of metal and might, a torrent of armor and guns and metal and men bound together with fury and fire. It will be the might of a whole nation hurled upon the capitalists which will crush them in one swift blow. Some will call what we plan a mad fantasy, but we will remind them of what comrade Stalin once said.\n\n"There is no fortress that the Bolsheviks cannot storm!""
 GER_expand_automobile_factories: "Expand Automobile Factories"
 GER_expand_automobile_factories_desc: ""
 GER_cult_of_speed: "Comprehensive Combined Arms"
 GER_cult_of_speed_desc: "Combined Arms Warfare, the coordinated use of infantry, armor, and air assets to destroy a target, is still the cornerstone of effective modern warfare. The largest and most respected armies on the planet, even now with the rise of autonomous systems, still rely on these principles, principles that we must revisit and refresh. Immediately we will give the task of providing a modern and comprehensive update of these doctrines to our most talented minds within the general staff. Our forces in the field will learn the importance of tactical coordination along with all the modern command and control technology to make it as effective and efficient as possible. Just as the NVA and Warsaw Pact understood and embraced the importance of combined arms, we shall do the same today."
 GER_war_for_the_proletariat: "War for the Proletariat"
 GER_war_for_the_proletariat_desc: "While war is typically a tool of the capitalists used to sell new guns, bombs, and planes, in this case we can make an exception. The Russians, if allowed to continue their course, will slowly destroy everything in their wake, including their innocent workers. Then they will need more, and will come for us, and destroy the revolution we have fought to establish. In the end, everyone loses, so it's our responsibility to fight for our workers' futures, but for the Russians' as well."
 GER_reform_kampfgruppen_arbeiterklasse: "Kampfgruppen der Arbeiterklasse"
 GER_reform_kampfgruppen_arbeiterklasse_desc: "Thanks to the working class, the revolution has been secured at home, but there is a desire amongst many to spread it abroad. Rather than go back to the factories, these workers would rather pick up a gun and march east, and we greatly admire their dedication to the cause! As such, we will form special "working class brigades" to ensure no person is left behind, and that all are given a chance to liberate those held in the Russian yoke!"
 GER_the_whisper_from_all_continents: "The Whisper from All Continents"
 GER_the_whisper_from_all_continents_desc: "Socialism, unlike many ideologies, feels like the natural end result of industrialization. The worker labors away in factories, gets worn down by the mines, and builds wonders out of his own blood, sweat, and tears. Surely he deserves to have a roof over his head, a full belly, and representation in the government! This logic is why socialism in all its forms has quietly spread around the world, working itself into the heart of every man, woman, and child who has ever done a hard day's work. We will tap into this sentiment and harness it, until the fires of revolution light across the globe! Break your chains, workers of the world!"
 GER_communists_forward: "Communists, Forward!"
 GER_communists_forward_desc: "Joseph Stalin, despite being Russian, gave one phrase that perhaps embodies the communist spirit more than anything else, "not one step back." Whether it be industry, technology, or in this case, warfare, we will boldly set out to go where none have gone before. We will not be forced backwards, not by the Russians, not by the bourgeois, not by our own allies! We will continue to march on, until we have liberated the world!"
 GER_technology_asistance_program: "American Technological Research Program"
 GER_technology_asistance_program_desc: ""
 GER_unrestricted_aerial_bombardment: "Unrestricted Aerial Bombardment"
 GER_unrestricted_aerial_bombardment_desc: "Despite our commitment to the Geneva Convention, circumstances have compelled us to reconsider our approach. The Russian bear has been able to exploit our restraint to rebuild its military capabilities. To prevent further resurgence, we will authorize our pilots to conduct Airstrikes deep into Russian territory, This will allow them to strike critical supply hubs, Civilian Infrastructure potentially converted to makeshift Military HQs, supply hubs and factories even with the risk of civilian casualties."
 GER_operation_centre: "§YUNTERNEHMEN§!: STAR" 
 GER_operation_centre_desc: "Poland functions as a critical buffer state, effectively shielding Russia from any direct invasions and complicating any forward operations. It's terrain is well-suited for offensive armored maneuvers but presents significant challenges for a defense in depth strategy, as demonstrated repeatedly throughout history. Securing a breakthrough in Poland would expose the depth of Russian territory, opening access to it's large urban centers."
 GER_operation_normalization: "§YUNTERNEHMEN§!: KOLIBRI"
 GER_operation_normalization_desc: "Poland serves as the primary shield supporting the Russian frontline in Eastern Europe and would demand significant resources to breakthrough. However, advancing through Slovakia, Hungary, and Romania offers an alternative route that bypasses this heavily fortified front. Much of this terrain is favorable for military operations, providing us with a strategic advantage. By exploiting this path, we can strike at the Russian Bear from an unexpected direction, disrupt its cohesion, and further weaken its hold over Eastern Europe."
 GER_lure_them_in: "Lure Them in Strategy"
 GER_lure_them_in_desc: ""
 GER_form_free_russian_army: "Form the Russian Red Army"
 GER_form_free_russian_army_desc: "Even within the vast Russian Empire, there exist exiled communist groups and underground movements that have long been suppressed by the fascist regime. With the ruling party's popularity now in decline, we have a critical opportunity. By reaching out, we can not only explore the possibility of integrating their militias into a new Collaborationist army but also lay the groundwork for a new Russian political framework once the conflict concludes. These groups could serve as a foundational element in shaping a post-war regime that rejects authoritarianism and aligns more closely with our vision for regional stability."
 GER_europes_finest_hour: "Europe's Finest Hour"
 GER_europes_finest_hour_desc: "We have the bastards on the run! Across the continent, the mighty armies and resilient peoples of Europe have risen in defiance, shattering the chains of fascism and reclaiming their freedom through courage and sacrifice. Now is the moment to turn victory into legacy. It is time to rebuild Europe, not on fear or division, but on the foundations of justice and unity."
 GER_quell_fires_of_revolution: "Quell the Chaos of the Revolution"
 GER_quell_fires_of_revolution_desc: ""
 GER_eternal_revolution: "The Eternal Revolution"
 GER_eternal_revolution_desc: "Throughout history, socialist movements have faced relentless suppression. But today, a new force is in motion. Across Europe and beyond, across continents long dominated by capitalism and crushed by fascism, the workers have risen, breaking their chains and creating their own utopias. They are no longer subjects of exploitation, but architects of a new society.\n\n Europe will be no exception. It, too, will rise not as a fractured continent ruled by elites, but as a unified force built by and for the working class. The foundation of our future will be solidarity, justice, and the collective power of the people. A new era is beginning and it belongs to those who labor, not those who rule."
 GER_call_for_international_help: "Call for International Help"
 GER_call_for_international_help_desc: "Across the globe, there are countless committed socialists who stand ready to support our cause in social media networks, many even willing to give up their lives in the fight against the fascist regime in Moscow. In addition, numerous nations share sympathy to our cause and support our struggle.\n\n By getting in touch with the broader international socialist network, we can not only strengthen our global image but also acquire vital resources. This not only includes volunteers to bolster both our frontline forces and domestic workforce, as well as humanitarian and military aid from allied socialist states. Mobilizing this support is essential to sustaining our efforts and demonstrating global unity in the face of authoritarian aggression."
 GER_break_their_spirit: "Break Their Spirit"
 GER_break_their_spirit_desc: ""
 GER_study_new_strategies: "Study New Strategies"
 GER_study_new_strategies_desc: ""
 GER_progress_cult: "Progress Cult"
 GER_progress_cult_desc: "In late-stage capitalism, progress was only measured in profit. Every innovation had to stuff the pockets of the pigs and serve the market, never the people. Now, the young hunger for a future unchained from the past. The lecture halls and laboratories of Democratic Germany run wild with innovation. We do not hide our ambition, we celebrate it. Science and reason aren't tools of the bourgeoisie to be feared, they are weapons in the arsenal of the workers. A society that refuses to evolve is one already dead."
 GER_propagandize_the_war_effort: "Propagandize the War Effort"
 GER_propagandize_the_war_effort_desc: "Propaganda is one of the most powerful weapons in any struggle, not just to expose the enemy, but to awaken and unite the people. In war, the support of the masses is not optional, it is essential. Without the people, there is no army, no resistance, no revolution. That is why we must show the German People our truth and what they are fighting for. We must make it clear to them that they are not fighting for a flag or a border, but for the dawn of a new Europe, free of capitalist exploitation and revanchist scum that forever plagued this continent for thousands of years."
 GER_relocate_the_industry: "Relocate the Industry"
 GER_relocate_the_industry_desc: ""
 GER_chancellors_guiding_hand: "Chancellor's Guiding Hand"
 GER_chancellors_guiding_hand_desc: "Germany has been blessed with a leader not seen in many years, our great chancellor. The decrepit days of bickering under democracy are now over. The dysfunctional institutions of decentralized leadership have been swept aside. Now there is only one vision, one man. The liberals of the past failed to see the great danger that our great nation sits in. We are surrounded by enemies and vicious nations of barbarians that are ready to tear us apart. But under the chancellor's guiding hand will we be ready and united for victory."
 #Day X
 GER_gotterdammerung: "Götterdämmerung"
 GER_gotterdammerung_desc: "As the war reaches its final act, its consequences will be felt across the European continent for generations to come. Like many of its NATO allies, Germany now lies in utter devastation. Our cities have been reduced to rubble by relentless Russian bombardment, dead bodies piled up on our streets as desperate families cry out for their loved ones-digging through the debris, if not to find them alive, then at least to recover their remains. Once again, our nation is shamed by an old foe-one we believed to have been relegated to history in 1991. We had envisioned this century as an era of peace and prosperity, a time to atone for the past and forge a new hopeful future. But we could not have been more wrong. The threat from the East never vanished; it merely lay dormant, waiting for the moment to strike. This war has been our reckoning, a brutal awakening from our naïve complacency. Now, the hearts of our people are filled with hatred and fury, their thirst for vengeance unquenched. Yet, for now, we must endure. We must clench our fists and lower our heads before the red menace as we begin the arduous task of rebuilding. But make no mistake-Germany will not remain in ruin forever. We shall rise again. We shall overcome. And in the end, the final victory belongs to Germany."
 GER_promise_recovery: "Promise Recovery"
 GER_promise_recovery_desc: "Our humiliation at the hands of the Russians has shattered public trust in the government and ruined our once thriving economy. The people demand that we continue to look out for them, and ask questions we do not have answers to. We cannot afford to be complacent, the next few months will be some of the hardest in our history. We will rebuild, we will reform, and we will retake our pride from the Russians!"
 GER_convene_with_nato: "Convene with NATO"
 GER_convene_with_nato_desc: "None of our NATO allies are in a better position than us, nor do they even want to think about another war with Russia. However we cannot just sit idly by as the bear continues to grow stronger. Some deep cleaning is desperately needed, and we ensure that NATO becomes what it presents itself as. A strong, united military force capable of protecting its people."
 GER_facit_omnia_voluntas: "Facit Omnia Voluntas"
 GER_facit_omnia_voluntas_desc: "For too long, our nation has been governed by pencil pushers and corrupt pigs who have their pockets filled by corporate interests while our strength withered. It was they who led us to defeat, to destruction, to downfall. Under their neglectful leadership, the Bundeswehr was left to decay like a forgotten relic, abandoned while they enriched themselves and squandered our resources on futile endeavours. But today, all of it shall end. No longer will weakness define the German armed forces. We shall restore the honour, discipline, and strength that once defined our formidable nation. The legacy of Prussian glory and military excellence will rise again. Our army will no longer be an afterthought-it will be a force feared by our enemies and respected by the world. The time has come for a new Germany to rise. A stronger Germany. One with resolve, with pride, and with the will to stand firm against foreign aggression. We will no longer falter. We will no longer kneel. From this day forward, Germany stands unshaken."
 GER_nato_war_recovery: "Revive the Armed Forces"
 GER_nato_war_recovery_desc: "Even before the war with Russia, our military was not in the greatest place. While still impressive and modern, it relied heavily on the Americans. Without them, we were easily humiliated by the Russians. We cannot allow ourselves to lose to the bear ever again. From now on, we can only rely on ourselves, not that it'll be a problem. For centuries the German military was the envy of the world, and it will be again. It is up to us to rebuild an army that will live up to our ancestors' expectations."
 GER_en_treue_fest: "Ruhm des Vaterlandes"
 GER_en_treue_fest_desc: "Germany is a nation with one of the longest and most distinguished military histories of any European nation. Under the empire's banners we saw great victories, forged genius generals, created revolutionary doctrines, and influenced the course of human history. We were the nation of men that changed the destiny of this continent, and our people must now know that. We shall spread the message, propagandize our past, tell the story of the great men who once led us, and cause a fanatical rousing of passions of the whole German nation. Soon, every German will show absolute dedication and willingness to honor and restore the glory of the fatherland now and in the future."
 GER_gott_ehre_vaterland: "Koalition von Schwarz-Weiß-Rot"
 GER_gott_ehre_vaterland_desc: "When was the pinnacle of German armed forces? The Wehrmacht? The Bundeswehr? The truth is that none of them were even close to the peak of our military prowess. Each of them derived their traditions and identity from Prussia, which later became the German Empire. Therefore, we must rebuild our army in their image. Only through a revival of Prussian militarism and military exceptionalism can we effectively safeguard our nation and people from the looming threat in the East. Once more our will shall be forged in iron, our people made strong and pure, and our blood burn with an unwavering thirst for revenge."
 GER_national_service: "National Service"
 GER_national_service_desc: "Once upon a time, Germany was renowned for its military prowess and strength. The Kingdom of Prussia was recognized globally as a military state, boasting the fourth-largest military in Europe despite having only a fraction of Europe's population. Today, when discussing German militarism, many are reminded of the two world wars. However in reality, without strong armed forces, our nation would have been weak and easily broken by foreign aggressors. Without a powerful military, Prussia would never have been able to unify Germany into a nation-state. Without military strength, we would have collapsed under pressure from both fronts, much like the Austrians during the First World War. Without a capable defence, we would have been unable to resist, and our people would have been massacred like cattle by the Bolsheviks during the Second World War. Militarism has always been-and always will be-central to the German people and their identity. As our adversaries once again approach our borders, we require fresh blood to fill the ranks of our armed forces. Thus, we must reinstate mandatory conscription, which we once foolishly abandoned."
 GER_rehabilitate_the_kaiser: "Rehabilitate the Kaiser"
 GER_rehabilitate_the_kaiser_desc: "What defines Germany as a nation? Some may argue that it is our rich culture and traditions, while others may point to our renowned technological advancements and commitment to quality. But the truth is that until the late 19th century, the very concept of a unified German nation and people was vague and unconceptualized. It was only through the grace of God and the wise leadership of the Hohenzollerns that we Germans were able to break free from the grip of Austrian and Gaullic influence. Without the strategic genius of Bismarck, the unwavering bravery of Moltke, and above all, the guidance of our Kaiser, Wilhelm I, Germany as we know it today would not exist. It was Prussia and our Kaisers that forged our nation, shaping it through blood, iron, and unyielding resolve. Now, as Bavaria secedes from our nation, brothers are once again divided by borders imposed by foreign interests. It has never been more crucial to remind our people of the struggles of our forefathers and the importance of our unity. It was the unyielding spirit of our people and the guiding hand of the Kaisers that built a Germany that stood strong on the world stage and forged a nation that fought to secure its rightful place under the sun. We must not forget their legacy, for it is the foundation upon which our identity and culture are built."
 GER_eliminate_the_dregs: "Eliminate the Dregs"
 GER_eliminate_the_dregs_desc: "Our Empire cannot be built if the very elements which seek to take her down coexist with us. Socialist agitators, false conservatives, and the traitorous liberals. These people undermine our authority, claiming it's "for the betterment of Germany". Even though it is us and the Kaiser who know what's best for our people.\n\nPolice powers shall be expanded, loyal military officers are given a freer hand, and civil liberties are temporarily curtailed in the name of stability. Blacklists are drawn, trials expedited, and underground movements crushed. This purge, though controversial, is necessary to ensure our Empire shall stand firmly. It shall also serve as a warning: the new Germany will not be shackled by the weak ideals of the Weimar era. Only through fire can our nation be reborn."
 GER_restore_imperial_laws: "Restore Imperial Laws"
 GER_restore_imperial_laws_desc: "If there's one document that truly defines the German nation it's the document brought forth by the Kaiser's image. The 1871 constitution had brought our people to new heights, and only after the entire world united against us did it force us down. Though some changes are necessary to modernize the framework, the spirit of Bismarck's empire shall be revived in law.\n\nNobility titles are restored, the role of the Kaiser as head of state is reinstated in official documents, and ministries are restructured to reflect imperial precedence. Loyalist bureaucrats are promoted, and monarchist symbolism returns to public institutions. These legal reforms do not merely reflect nostalgia, they are a concrete step toward dismantling the democratic institutions that have kept our nation in the back corner of global affairs. The traditional elites and conservative allies shall gladly help us with these laws, in exchange they benefit from them too."
 GER_the_army_with_a_state: "Army with a State"
 GER_the_army_with_a_state_desc: "The liberal liars have gotten us to believe the correct way to function is a state with an army. Instead, we now forge an army that becomes the backbone of the state itself. The Reichswehr shall have an expanded role in domestic and foreign policy, effectively becoming the guardian of the imperial restoration. Military officers with monarchist leanings are appointed to key civilian posts, while the army is reorganized along imperial lines. Loyalty to the Kaiser becomes a requirement for advancement. In practice, this creates a praetorian state, one where the military guarantees internal order, suppresses dissent, and prepares the nation for its renewed role on the world stage. Discipline and efficiency replace debate and compromise. Of course there will be opposition to this view, but our people demand it, and we can't deny them their rage."
 GER_power_to_the_regency: "Power to the Regency"
 GER_power_to_the_regency_desc: "Only until the kaiser returns to his throne, a regency council shall be put into effect that shall guide the German nation with near total authority. The council shall be granted full power over the three branches of power. Composed of trusted nobles, generals, and political loyalists, the regency shall begin implementing reforms and issuing decrees with imperial legitimacy.\n\nThis can be seen as a calculated compromise as well. Not a full monarchy yet, but no longer a republic either."
 GER_exert_influence_over_our_allies: "Exert Influence over our Allies"
 GER_exert_influence_over_our_allies_desc: "Our allies across Europe do not function with the same interests in mind as our own. However, unlike in the past, our motives aren't to invade them. Through diplomatic pressure, trade agreements, intelligence sharing, and subtle subversion, we push our sphere of influence across Europe.\n\nCountries already functioning under monarchist traditions shall be courted aggressively. We are the defenders of this new European order; however, we mustn't conform ourselves yet. Only until our allies can be called such can we consider our global standing supreme."
 GER_1918_undone: "1918 Undone"
 GER_1918_undone_desc: "Our entire path, our plans for the reversal of history, can finally be declared completed. The shame of 1918, the abdication of the throne, the ruthless treaty of Versailles. It's all avenged. With the kaiser back on the throne, not only have the mistakes of the past been corrected but erased.\n\nParades fill our cities' streets as the red, white and black flies over Berlin once more. Now, our monarchy isn't forgotten, or symbolic, but supreme. By diplomacy and by blood, we are a great power again. Whether the trials up ahead are easy or hard for our nation, one thing is clear: the empire has returned, and 1918 is no longer a tragic end, but merely a hiccup in the eternal march of German greatness."
 GER_cameralism_in_21st_century: "Cameralism in the 21st Century"
 GER_cameralism_in_21st_century_desc: ""
 GER_centralize_the_economy: "Centralize the Economy"
 GER_centralize_the_economy_desc: ""
 GER_to_crown_a_king: "To Crown a King"
 GER_to_crown_a_king_desc: ""
 GER_guns_of_the_future: "Guns of the Future"
 GER_guns_of_the_future_desc: "If we wish to win our wars against our enemies, we must embrace our preference on quality over quantity. More specifically, we must look towards the future. Wars have evolved and so has the equipment men use to fight wars. Some of this equipment doesn't even need men to fight. We shall take these technologies to the extreme and ensure no enemy on this planet will ever hold a tactical advantage over our arsenals.\n\nSmart firearms, AI-Enabled weapons, exoskeletons, direct-energy weapons, space-based defence systems, electromagnetic railguns, hypersonic missiles, all of these and more shall be our scientists' top priority. Only then shall we ensure that we have our advantage over our enemies secure. No matter how many weapons they use against us, it shall only take a few of ours to send them running back the Urals."
 GER_unconventional_weapons: "Unconventional Weapons"
 GER_unconventional_weapons_desc: "Human morality has always been a challenge our people have faced and succumbed to multiple times. One of those was the signing of the Geneva Convention, declaring which weapons were unfit for use and should be classified as "war crimes" whenever their use is reported. Such weaknesses have kept our people back for years! War isn't pretty, so it's wrong to divide weapons of war from most to least pretty. In a fight, you're not worrying over which techniques might damage the person less, you're worrying over not fucking dying!\n\nIn secrecy, we shall develop these weapons. Slowly but surely riding Geneva's influence over our stockpiles and soldier's minds. To win a war, we must abandon our morality, our basic principles over life and death. Only then shall we triumph over the enemy blinded by the globalists and their belief in "peace". Let us put them in their place."
 GER_aggressive_rearmament: "Aggressive Rearmament"
 GER_aggressive_rearmament_desc: "All our efforts will now revolve around a single purpose - building an unimaginably vast arsenal of modern weaponry to guarantee our nation's security. Munitions plants, tank factories, and weapons workshops will operate around the clock, seven days a week - undeterred by holidays, setbacks, or even enemy bombs, should it ever come to that."
 GER_soldiers_of_the_future: "Soldiers of the Future"
 GER_soldiers_of_the_future_desc: "To embrace the future means many things. We must change our tactics, our technologies, but arguably the most important thing we must change is our mentality. Our spirit of victory. Our spirit to shed blood in the name of our fatherland. This mentality must be revived. Not just that, but it must adapt to our new way of life. Our way of fighting. Our way of war. Our belief that the strongest shall survive. This shall be shown on our soldiers.\n\nThey must be ruthless in their attacks, loyal in their beliefs, and one with their technologies. Our enemies shall look at them, not as fellow rivals or at the very least humans, but as robots. Devoid of any expression and with a thirst for vengeance. We shall return this gesture by looking at our enemies with such distrust that some of our own will doubt their humanity in the first place.\n\nThese soldiers shall win us our wars."
 GER_air_innovations: "Aerial Innovations"
 GER_air_innovations_desc: "Modern technology has done a lot to change how warfare in the skies is conducted. Advanced computing technology, stealth coatings, and even artificial intelligence integration are changing aviation faster than we'd ever thought. Now is the time for us to embrace the winds of change with our air force. We will immediately adapt all these new technologies and create institutions and mechanisms to make further innovations possible. Our fighters will blaze through the skies with the most cutting-edge technology and have great minds behind them ready to keep us ahead no matter what the enemy throws at us."
 GER_deutschland_erwacht: "Deutschland Erwacht"
 GER_deutschland_erwacht_desc: "Germany was once a distinguished nation-most importantly, a nation with a backbone. Now, that backbone has been broken, its teeth shattered by a powerful blow, and its pride lost to the winds. The sword of our country-our army-was left to rust, while the lifeblood of our nation-our people-were abandoned in despair by treacherous globalists. In times like these, one can only reminisce about the golden days, the eras when our nation had the courage to stand up for itself and fight for its rightful place on the global stage. Since our defeat in 1945 and the division of our fatherland, our spirit has been shattered, and the ghosts of past defeats continue to haunt our national psyche. But today, the German nation shall finally awaken from its long slumber. Like a soaring eagle, it shall rise once more, casting aside all threats to its people. From this moment on, Germany and its people stand united once again, marching together toward victory."
 GER_our_noble_cause: "Our Noble Cause"
 GER_our_noble_cause_desc: "The Spectre of Communism shades Europe in a dark, red, shadow. The Soviets were thought cast into hell and then again, they thought the same of us. History repeats itself once again. There is no allies to distract our full undivided attention this time, there are no fools who can betray our noble cause. Since 1936 we have dedicated our resources to the total annihilation of the Bolshevik plague! And today we must again carry this burden on our back!\n\n So as Leningrad again is risen, as Stalingrad again has risen! We are afforded just one more chance to correct the failures of our ancestors! One more chance to make free the world of the Bolshevik horde! One more chance to secure the future of the German Race! Our cause is noble! It is holy! It is for the very soul of all nations!\n\n To carry this torch is an honor. To burn the reds with it? A pleasure."
 GER_reenter_bavaria: "Re-enter Bavaria"
 GER_reenter_bavaria_desc: "The Fools in Bavaria have made an outrageous attempt to declare independence and secede from Germany, even seeking support from Austria. We cannot let them stay in power for any longer because If we hesitate, they would be able to build a large supporter base and poison the minds of our country, ultimately leading to our downfall."
 GER_radacalize_the_masses: "Radicalize the Masses"
 GER_radacalize_the_masses_desc: "Ever since 1945, our people have embraced a culture of pacifism and largely rejected the idea of a Greater Germany. Times have changed, our nation is in a dire situation and many Germans feeling abandoned by the former government have turned to us. We must exploit an opportunity like this to increase our support and further solidify our position."
 GER_eternal_alliance: "Forge an Eternal Alliance"
 GER_eternal_alliance_desc: "It is clear to many that we cannot defeat the Soviets alone. As Western Europe liberated itself from the corrupt Bureaucrats, many Nationalist Governments emerged from their conflicts which opens a window of opportunity, the formation of an alliance against the Red Menace to finally put it down once and for all."
 GER_assist_our_greek_brothers: "Assist our Greek Brothers"
 GER_assist_our_greek_brothers_desc: "The Greeks were one of the nations that were not spared from the violent bloodshed once the European War concluded. Two major factions rose up to take power and one of them, The Golden Dawn has recently been seeking ties with us. The Golden Dawn, like us, were silenced and oppressed by the Bureaucrats in Athens for many decades and now they have finally gotten their chance to overthrow the corrupt puppets in power.\n\nGreece will serve as a great potential ally, as it opens another Front against the soviets, one that we can exploit to overwhelm them."
 GER_fall_orange: "§YFALL§!: ORANGE"
 GER_fall_orange_desc: "The Lowlands were one of the regions that were not spared from violent bloodshed after the conclusion of the European War.\n\n A few notable factions have risen up, one of them being a Pan Lowlander Socialist faction that seeks to reunite the Lowlands under one banner. If they were to succeed in their goal of reuniting the Lowlands, it would pose a grave danger to our security and rear as the Soviets would use the region to open a front into Germany.\n\n Therefore, our decision must be made to intervene in the Benelux and establish our control there, preventing the rise of communism in our own backyard."
 GER_support_nationalists: "Support European Nationalists"
 GER_support_nationalists_desc: "Ever since the conclusion of the European War, Many countries fell into Turmoil with Nationalist governments emerging onto Power. Many of these states are in a dire situation and are vulnerable to the larger Red Menace in the East, Therefore we must reach out to them and offer them an Alliance to strengthen our ever growing coalition."
 GER_recruit_foreign_legions: "Permit Foreign Legion Recruitment"
 GER_recruit_foreign_legions_desc: "Across various social media platforms, a growing number of enthusiastic volunteers from several European nations have expressed their willingness to contribute to the defense and development of our great Nation. This surge in foreign support presents a valuable opportunity that should not be wasted. These volunteers could be rapidly integrated into our national workforce, helping to strengthen our industrial base, or assigned to the lower ranks of our military, where they could perform essential auxiliary and logistical roles."
 GER_fall_kolettis: "§YFALL§!: KOLETTIES"
 GER_fall_kolettis_desc: ""
 GER_revive_the_economy: "Revive the Economy"
 GER_revive_the_economy_desc: "While the communists celebrate their victory with indulgence and idleness, we will answer our defeat with a wave of militarization the world has yet to witness. Every able-bodied German - along with the welfare-fed migrants who once drained our system - will be put to work in building a new Germany. From men to women, from youth to the elderly, no one will stay aside. Our factories will burn hotter than ever, and by the time the smoke rises above our steel cities, our enemies will realize - the war is far from over."
 GER_drop_the_euro: "Drop the Euro"
 GER_drop_the_euro_desc: "The common European currency - the euro. How utopian it once sounded. All the nations of the continent working together, striving for an economic miracle like no one had ever seen before! And what came of it? Our investments in Eastern growth now serve our enemies, while our Western neighbors waste time on who knows what, seemingly unconcerned with a little word like "unity." Enough is enough. We will reclaim our long-lost sovereignty - starting with the proud return of the Deutsche Mark."
 GER_unternehmen_michael: "§YUNTERNEHMEN§!: MICHAEL"
 GER_unternehmen_michael_desc: ""
 GER_spirit_of_clauswitz: "Spirit of Clausewitz"
 GER_spirit_of_clauswitz_desc: "While there have been many tactics in our military history, none of them come close to the genius of Clausewitz. It is his tactics that managed to save Prussia from Napoleon's grasp, and it is his tactics that shall save us now from the soviets.\n\nWe shall adapt his theories on the fog of war and the importance of moral forces to ensure the will of our soldiers to fight never ceases. His philosophy must be taught to all our military leaders to ensure valiant and adaptable commanders and officers.\n\nOf course, we won't turn to his tactics completely but merely adapt them to the modern technological realities of the frontline. It might be hard to develop, but once we do, our strategies and theories will send our enemies running back to the Urals."
 GER_spirit_of_bruchmuller: "Spirit of Bruchmüller"
 GER_spirit_of_bruchmuller_desc: "If there's one word we'd give to describe our military strategies through most of the late 19th and early 20th centuries, it would be: "HAUBITZE!". Our superior firepower is what won us many wars and battles against the Danes, French, and other members of the perfidious Entente. Of course, our Artillery knows no name, but if we had to thank a man for these tactics, it would be Bruchmuller.\n\nHe revolutionized the methods of artillery used during the Great war. It is his genius which turned artillery from long, predictable uses to short, well planned, and highly concentrated methods. These theories managed great victories across both fronts and even influenced the future tactics of Blitzkrieg.\n\nThus, it is only natural that we focus on our production of our missiles and their firepower capabilities. Everything to ensure our enemy positions are annihilated in short, coordinated precision strikes that shall neutralize their capabilities to defend their positions."
 GER_spirit_of_rommel: "Spirit of Rommel"
 GER_spirit_of_rommel_desc: "Without a doubt, if there's one military tactic that has defined our brilliance for decades after the war, it is Blitzkrieg. It is our focus on fast, aggressive, and flexible maneuvers to outflank our enemy and overpower their forces without much fighting which has lead to our undeniable dominance over the European continent and the near total capitulation of the British in Egypt and the Soviets in the east.\n\nYet, mainly due to certain incompetence by our allies and ourselves, has led to our capitulation to the Allies and the subsequent humiliation which followed. This time, we'll learn from our past mistakes and ensure this second chance goes right.\n\nThanks to the desert fox and his genius leading to the near capitulation of British North Africa, we shall follow his example. We shall master the arts of combined arms tactics as well as initiative and improvisation to ensure our enemies may never triumph over us again."
 GER_panzerpioneers: "Panzerpioneers"
 GER_panzerpioneers_desc: "In our panzer divisions, of course our tanks are their key aspect. However, the engineers who are out of the tanks, making sure they arrive at their destinations without delay are just as valuable. These corps, trained to support tank formations in overcoming obstacles, fortifications, and difficult terrain that could slow or halt an armoured advance, played a key role during the Second World War and will play one just as important on this one.\n\nThese men shall be trained for bridge-building, demolitions, minesweeping, assaulting fortifications our tanks cannot reach, and clearing the areas behind the frontlines for any poor bastards who didn't catch the memo. Our flamethrowers shall do the trick."
 GER_fall_rache: "§YFALL§!: RACHE"
 GER_fall_rache_desc: " It is time for the moment we've spent years preparing for. For far too long we've held our hate, containing it but slowly training it as the years passed by. Now, it is time to let our hate overpower the enemy's forces. It is now time for vengeance. Vengeance for a European future. A future free from communism or globalism. A future of relief and sovereignty.\n\nIt is time to pay by blood for all the damage the reds have done to the once mighty peoples of eastern Europe. Now, forced under a coward's heel. No longer. Our vengeance shall be brought upon Moscow, and our hate shall fuel our fire."
 GER_unternehmen_michael: "§YUNTERNEHMEN§!: MICHAEL"
 GER_unternehmen_michael_desc: " If we first wish to unleash our vengeance over the Soviets, we must first reach them once we beat their rouge poppet government between us. The Poles have suffered endlessly under the weight of the Russian jackboot. Now, the tides of freedom may hopefully light the way for their people.\n\nHowever, it won't be easy. Our lands stolen from us by the Entente and Allies shall be reinstated onto our hands and Germanized swiftly after the war. As for the Polish lands, that shall be decided after the war. In the meantime, we've got some cities to airstrike."
 GER_fall_johan: "§YFALL§!: JOHAN"
 GER_fall_johan_desc: "While the Nordic countries were spared the devastation that swept through Western Europe, their economies lie in ruin. Though sparsely populated, these lands hold immense strategic value. Sweden offers us a vital staging ground for amphibious landings into the Baltics, while Norway provides a northern front near Murmansk, a key point from which to pressure Soviet defenses. We need to act swiftly, if we do not take initiatives to secure the Nordics now, they could fall under the Soviets sphere."
 GER_strong_arm_the_north: "Strongarm the North"
 GER_strong_arm_the_north_desc: ""
 GER_the_final_option: "The Final Option"
 GER_the_final_option_desc: "Everything we've done has failed. We failed Germany, we failed Europe, We failed the people. There is nothing to save us from this disaster. All that's left is to §Rdrag them down with us...§!"
 GER_bitter_lessons_from_nato_war: "Bitter Lessons from the European War"
 GER_bitter_lessons_from_nato_war_desc: "Loss is something we wish to avoid teaching our children. How our own blindness led to our demise and plundering at the hands of the ruthless Slavs. But even though it may hurt us, we must take a glance at the past if we wish to never repeat the same mistakes again. The past administration's failures as coping with the realities of war. They were too busy with their morality and bureaucracy to even think about the soldiers fending off the Bolshevik nomads from grasping our virgin lands.\n\nLet us look at their mistakes, analyse them, observe what they could've done better, and do it ourselves. We represent the European people better than any government has or will. We understand their pain and wish to ensure it never happens again. At least on us."
 GER_armor_innovations: "Armor Innovations"
 GER_armor_innovations_desc: "Our tanks have always been our key to success in the battlefield. They were during World War Two and the European War. Now, they shall serve our purposes too. To achieve this, we shall provide large investments to all scientists and companies working on the production and development of these vehicles. Everything we can to ensure they push our enemies back to Moscow before they can say -Workers of the world, unite!"
 GER_strategic_destruction: "Strategic Destruction"
 GER_strategic_destruction_desc: "As much as destroying enemy combatants and military assets is important, we must realize that war is more than just that. There is much that happens away from the front that makes it possible. Knowing this, we must target not just their troops at the front, but everything that supports them far in the rear. Their soldiers need food from farms, weapons from factories, orders from institutions, and so much more. Our air force will focus on hitting all these and everything else that makes their war effort, and ultimately their society, function. Everything from their factories to power plants to command-and-control infrastructure will be obliterated. Their armies will quickly starve and grind to a halt when we destroy everything that supports them."
 GER_blot_out_the_skies: "Blot out the Skies"
 GER_blot_out_the_skies_desc: "The modern war for the air will be a field where no prisoners are taken, where no forgiveness is shown. Our air doctrine must reflect this reality. Our Luftwaffe will aim to saturate the sky and focus on directly destroying enemy air assets. However, we must not just relegate ourselves to targeting just fighters or tactical bombers. We must destroy anything that belongs to the enemy, no matter what it is. Be it a cargo plane, a civilian airliner, or a sophisticated next generation fighter aircraft, it is all part of the enemy war machine and will be taken out. It will all be very simple for our pilots; a target is a target, no matter its shape, size, designation, or who is on board."
 GER_restructure_air_doctrine: "Restructure Air Doctrine"
 GER_restructure_air_doctrine_desc: "A lot has changed in air warfare since the last time our doctrines were updated. New technologies, new tactics, and whole new ways of thinking have now become standard, a standard that we have been behind on. However, now is the time for us to get Germany back up to today's standard. We will review our doctrines, implement new lessons from recent conflicts, and retrain our officers on the newest developments. It may upset some in the air force's old guard, but it will prove more than necessary. Soon our air force will lead both in theory and practice."
 GER_restore_luftwaffe_pride: "Restore the Lufftwaffe Pride"
 GER_restore_luftwaffe_pride_desc: "The Luftwaffe was once Europe's most feared air force and for good reason. During the first half of the Second World War, our talented pilots and powerful aircraft swept aside enemy after enemy, humbling powers that were once thought untouchable. This is a legacy we must resurrect with passion. The symbols, victories, culture, and memories of past heroes will be taught and venerated in every air base and with every pilot. Germany's enemies will soon shudder in fear when they see the Balkenkreuz fly over them once more."
 GER_solidify_control: "Solidify our Control"
 GER_solidify_control_desc: "Even though we occupy the halls of power within this country, traitors and other vermin still infest every corner of our nation. However, we will not sit still and allow them to plot against us. These agitators and enemies will be found and liquidated. We will find every conspirator, uncover every network, and dismantle any opposition that dares to challenge our rightful rule. Like the dreaded SD of the Third Reich, we will unleash upon all these traitors a silent but swift terror that will send them scurrying into the shadows."
 GER_triumph_of_will: "The Triumph of Will"
 GER_triumph_of_will_desc: ""
 GER_propagandize_our_success: "Propagandize our Success"
 GER_propagandize_our_success_desc: "Like the National Socialists did before us, we shall force our media pundits to report 24/7 on the war effort. Of course, we can't let them tell the full truth. We will force them to talk about the endless victory reports emerging from the frontlines. And anytime we're pushed back, we will talk about the bravery of these men who gave up their lives in the defense of their nation from the Soviet hordes.\n\nAfter all, it doesn't matter if we're annihilating the communists on the frontlines. If our people don't stop rioting on the streets, there truly won't be any peace. The stability of our nation is essential for our victory. It might be more expensive in the long term, but there are war-time measures. Deal with them."
 GER_unternehmen_prag: "§YUNTERNEHMEN§!: HUS"
 GER_unternehmen_prag_desc: "If there's one man to blame for the existence of the Czech nation, that man is Jan Hus. It was his view of a strong Bohemia free from German influence that fueled a Bohemian identity, an identity firmly against our interests. Had it not been for this man, perhaps the Czechs might be enjoying a life of peace and freedom alongside their German brethren.\n\nSo, we must act swiftly if we wish to remove this stain from Europe's map. We shall secure their population centers and annihilate any signs of Czech cultural identity. Not only will it help us flank the Poles from the south, but it shall also benefit their peoples once they integrate into German society."
 GER_suffocate_russia: "Systemic Exploitation"
 GER_suffocate_russia_desc: "During war times, everyone's desperate. Times are desperate. If we want to win this war, we'll have to undergo desperate measures. The problem being is that some of these measures might be considered "inhumane" by the international community. But what do we care about? Either we follow these measures, or we risk falling under the Soviet's heel.\n\nThus, all captured peoples shall be forcefully labored. Not a single man, woman, or child who can't work will enjoy the comfort of weakness. They shall labor, for the benefit of the fatherland and themselves. After all, work sets you free"
 GER_establish_russian_liberation_army: "Establish RLA"
 GER_establish_russian_liberation_army_desc: "Russia is a vast country of many great people. Sadly, these great peoples are a minority of the greater Russian whole. That still permitted collaborationist brigades of dissident Russian troops fighting alongside us during WW2, fighting behind the banner of the Russian Liberation Army. We must repeat these acts today.\n\nThere were already many Russian dissidents even when Russia was still under their Oligarchic self. Now that they have returned to Bolshevism, these numbers have increased drastically. We shall form special brigades for these soldiers, and give them a true reason to fight and die. Not for communism, but for their motherland."
 GER_nullify_our_debts: "Nullify our Debts"
 GER_nullify_our_debts_desc: "America lies in ruins, Asia swings between cold and hot conflicts every few years, and Russia is nothing more than a wild beast soon to be subdued. And in the midst of this chaos, German workers are expected to pay them tribute? We will no longer be bound by the economic chains forged by our predecessors - and we certainly won't waste a single mark repaying debts that would only end up in the coffers of failed regimes and our sworn enemies."
 GER_regulate_inflation_rates: "Regulate Inflation Rates"
 GER_regulate_inflation_rates_desc: "We would much prefer to avoid meddling in the delicate mechanisms of supply and demand - especially considering the sheer scale of our national production. But can we really risk a return to the kind of hyperinflation we saw after the First World War? Of course not. We will act as an all-seeing eye over the economy, monitoring, limiting, or even encouraging the production and consumption of key resources. And if that means hiring a few thousand more bureaucrats... so be it."
 GER_autarky_initiative: "Maintain Economic Independence"
 GER_autarky_initiative_desc: "Just look at where modern globalization has taken us. In the blink of an eye, international institutions collapsed, and nations stopped living - they started surviving. Even the European Union, into which so much effort and energy had been poured, crumbled like a house of cards. We will not allow this to happen again. Yes, we may still import a few scarce resources when needed - but this time, we will restructure our economy so that even if the world around us falls apart, Germany remains a beacon of stability. And its workers and soldiers? Fed. Supplied. Unshaken."
 GER_defend_the_industry: "Defend the Industry"
 GER_defend_the_industry_desc: "Radical changes to our economic structure are bound to provoke a reaction, and soon our military industries may become targets - not only for domestic saboteurs, but for foreign geopolitical rivals as well. We must take decisive steps to secure these assets, both physically and in the public mind. Security forces will be expanded, surveillance increased, and a comprehensive propaganda campaign launched to remind every citizen that these factories are the beating heart of our nation's survival."
 GER_economy_fueld_by_war: "An Economy Fueled By War"
 GER_economy_fueld_by_war_desc: "We have finally shed all that once restrained our potential. Yet, shameful as it is to admit, our nation's resources remain limited. Despite heavy investments, our factories still face severe metal shortages, and our generals dare not guess how much fuel our new armored divisions will consume. This is why war is no longer a burden, but the engine of progress. Every acre of land, every farm, factory, and mine brought under our control will breathe new life into our economy - for war is the driving force of our future!"
 GER_der_brand: "DER BRAND"
 GER_der_brand_desc: "Fire. This state of combustion has done wonders for humanity. In a few million years since we've mastered it, we're here. Able to send men to other celestial bodies, all thanks to the fire burning alongside them. However, instead of this reality, we're here. Fires can now be seen across our entire Pact, as our cities burn, so do our spirits.\n\nYet all hope is not lost. The fires burning within us may still be used to fuel our machine. All we must do is take drastic action. They will be painful, but anything to ensure our nation doesn't fall to pillaging forces ever again."
 GER_drive_them_back: "Drive them Back"
 GER_drive_them_back_desc: ""
 GER_hunker_down: "Hunker Down"
 GER_hunker_down_desc: "If we wish to defeat our numerically superior enemy, we'll have to take notice of actions taken on similar occasions. We must also hunker down our forces across multiple positions across our State. And when they think they're far away from our soldiers, that's when we'll leave our positions and annihilate the confused Reds.\n\nThese are Guerilla tactics, but they've won wars in the past, and we hope we're no different."
 GER_desperate_measures: "Desperate Measures"
 GER_desperate_measures_desc: "Desperate times call for desperate measures. And for times like these, times truly are desperate. We've already acted in the past, mobilizing our entire populus and economy for this very occasion. However, the reports from the frontline show it isn't enough. It's never enough.\n\nMore people to the factories. Any human that has moving arms shall be pumping out ammunition 24/7. This will take a massive toll on us in the future, but either we sacrifice these people, or they fight for nothing."
 GER_der_krieg: "DER KRIEG"
 GER_der_krieg_desc: "War. A word which has been on the German people's minds for over a decade. War has and will always be our focus for as long as there are enemies to our state. We believed our War machine would be able to funnel us sweet victories across our entire front. Instead, it seems as if our machine is breaking.\n\nThe Soviets keep pushing, even after all the tactics we've tried. In this case, we must push our people to their limits. And if they don't? Remind them of the war, and what their lives shall be like under the Bolshevik boot. We failed one time, we won't this second."
 GER_defend_the_cities: "Defend the Cities"
 GER_defend_the_cities_desc: "Soviet air raids are commencing over our cities. Of course, we have the will to fight but it will mean nothing when face to face with a bomb. So, we shall immediately begin fortifying all our cities near and far to the frontlines. Our people shall be evacuated near to the frontline and brought to the relative safety of the Ruhr.\n\nThere, we shall prepare our cities for becoming modern fortresses. All buildings shall be repurposed to our military personnel. This will likely damage the cultural significance of these lands, but sacrifices must be made for the greater good of our Reich."
 GER_every_man_to_the_front: "Every Man to the Front"
 GER_every_man_to_the_front_desc: "Our frontlines are starving, not just for ammunition, but for soldiers to manage the ammunition. Millions of men are currently enjoying the comfort of peace in their homes. Sure, they're working hard to ensure our stockpiles are full, but we have manpower issues too.\n\nThus, we shall find these men, send them to the front, give them a weapon, and make them hurt the Reds. Of course, these men won't be of much use compared to our professional soldiers, but at least we'll be putting more boots on the ground, meaning the Soviets shall be losing more ammunition."
 GER_service_everything: "Service Everything"
 GER_service_everything_desc: "Being Germans, we've always placed a higher importance on the quality of our armed forces over the quantity. However, in these trying times, anything and everything is useful. It doesn't matter if the equipment our workers produce isn't guaranteed to fire each time. It doesn't matter if the vehicles we produce have a higher chance of exploding than moving. Our stockpile deficits are reaching dangerous levels, so we must feed them what we have."
 GER_der_tod: "DER TOD"
 GER_der_tod_desc: "Death. Death is something inevitable for all life on this planet. Whether you like it or not, your time on this planet is limited. However, the same can be said for our nations and ideas. Look back at our history. Against Napoleon, the Entente, the Allies. In all these cases, Germany has died. But nearly all of them, Germany bounced back, ready to fight once more.\n\nWe may very well face the next chapter of this death. If so, that would mean the reality of our nation is to rise to glory then die rapidly in a fire brought by the international community. We must never allow this reality to take place."
 GER_the_old: "The Old"
 GER_the_old_desc: "The old have had their time. They've had their lives, their stories, their adventures, many of those stories specifically directed against the disgusting nature of communism. It is these men we'll use to our advantage.\n\nThe old shall fuel our fire. They shall help us beat the Reds back for the defense of our nation. Sure, many of them barely have the ability to walk on their own. However, they still have their spirit, and in these desperate times, a will to fight is enough."
 GER_the_young: "The Young"
 GER_the_young_desc: "The young members of Germany. They have their whole lives ahead of them. They have dreams, they have interests, but what they should have especially is the same burning hate against communism that we have.\n\nIt is these people that shall help us win the war. Every child we see, some of them already chipping away in our factories, shall pick up the rifles they made and be sent to the front line. Who cares if they're too lazy or weak to fight? They'll get the hang of it eventually!"
 GER_the_weak: "The Weak"
 GER_the_weak_desc: "The weak have always been on our radar for years. After all, what good do they provide to the greater whole? All they do is sit around, receiving government checks, and causing us a huge problem. Thankfully, we've found the perfect solution for this problem and a way these people can genuinely provide for the state.\n\nThat being, of course, their lives. We shall hand them rifles, place them in defensive positions, and tell them to fire every soldier they see. Simple. It shouldn't be hard to get that into their inefficient brains. Even a mouse can understand it for god's sake!"
 GER_new_european_crusade: "The New European Crusade"
 GER_new_european_crusade_desc: "Throughout History, Russian aggression has only brought pain, death and destruction to Europe. Over 80 years ago, our predecessors sought to destroy the threat that once came from Moscow. Although they did not succeed, history has offered us another chance. Today, we face that same force, one that has spread across Europe, corrupting cultures, silencing identities, and causing pain and destruction, This will end today.\n\nUnited by our blood, spirit and purpose, we will march, not only to avenge the past, but to forge a future where Europe stands sovereign and unafraid against any force that tries to strike it down. The time has come to strike at the heart of the beast, sever it's head and leave it to rot in history."
 GER_gun_for_every_hand_tank_for_every_battalion: "A Gun for Every Hand, A Tank for Every Battalion"
 GER_gun_for_every_hand_tank_for_every_battalion_desc: "One of the primary failures of the former Bundeswehr laid in its production chains. Tanks, rifles, and vital supplies were endlessly delayed, the result of capitalist inefficiency and bureaucratic rot. If we are to rebuild the German Army to be as large and mighty as Hitler's Army then we must push production to it's limit, Day and Night our factories must be working to produce a Gun for every Hand and a Tank for every Battalion, Only with a total mobilization we can truly survive the upcoming storm."
 GER_unleash_our_fury: "Unleash our Fury"
 GER_unleash_our_fury_desc: "Our hate has been kept for far too long. Even after everything we've done to hurt the Soviet's spirits, it's not enough. It's never enough. Not until we may ensure the few remaining Soviet soldiers are on their knees, kissing our boots, and begging us not to kill them. Crocodile tears over the lives of millions of Europeans starving by their fault.\n\nWho do they think they are? Who do they think we take them for? Humans? Do they really deserve that title? No. We shall not allow it. Let us unleash our fury. Every man associated with the concept of Socialism shall face the collective wrath of all the souls they've tormented. And if there is hell, they'll have to go through our own take on it before"
 GER_europa_united: "Europa United"
 GER_europa_united_desc: "Europe. A continent of beauty. A continent of riches. A continent which once stood as the undisputed master of the world. But a few years ago, that reality became shaky. Especially as the Soviets pillaged through the lands of Eastern Europe once more.\n\nBut now, look at our reality. Europe is no longer on the corner. Europe is no longer weak. Now, we are at the gates of Moscow itself, ready to make the Soviets pay for everything they've done to our continent. This is a European-wide issue. Thus, we may finally rest knowing that Europe is united and it shall remain for as long as she may allow it."
 GER_crush_the_resistance: "Crush the Resistance"
 GER_crush_the_resistance_desc: "If we wish to truly solidify our control over our captured territories, we must ensure their collaborators and sympathizers can't be found in the shadows. A resistance war has secretly begun, where terrorists occasionally come out of hiding to damage our infrastructure or bases. They want to play, and so do we.\n\nFor every one of our soldiers they kill, we shall kill multiple random civilians at will. We may even resort to some drastic measures such as napalm strikes and gas attacks. They should've thought twice before bombing our buildings."
 GER_our_allies_abroad: "Our Allies Abroad"
 GER_our_allies_abroad_desc: "Of course, we are the main fuel in our Pact. However, we must acknowledge the efforts made by our allies across Europe. The French, Italians, British, Iberians, all fighting for their own identities yet fighting alongside us, nevertheless. Let us use this to our advantage.\n\nAid always comes in handy. And considering our tight war situation, we're in desperate need of all kinds of supplies. Perhaps we may borrow some weapons from our dear allies. That way, it shall strengthen both our alliances and our individual war effort."
 GER_improve_logsitic_capabilities: "Improve Logistic Capabilities"
 GER_improve_logsitic_capabilities_desc: "Supply. This is a word that has caused great troubles for Europe in the past. Not just when we tried our first attempt against the Soviets during WW2, but also Napoleon failed due to the logistical nightmare managing this war has become.\n\nBut now, we must learn from our mistakes. Logistics must be one of our top priorities. Whether it be thanks to better infrastructure of AI management, our supplies shall be arriving in no time to aid our forces currently starving in Russia."
 GER_fall_lazarevic: "§YFALL§!: LAZAREVIC"
 GER_fall_lazarevic_desc: "Poland and Slovakia continue to serve as the Soviet Union's defensive bulwark, effectively blocking any attempts at a northern breakthrough, we have also not pursued any operations through Hungary due to it's tight combat area. However, a potential weak point remains. In the former Yugoslav region, the Soviets have established a puppet regime, it's military severely weaker than ours and also politically unstable. We will exploit this vulnerability to initiate a breakthrough and at the same time establish contacts with Balkan nationalist groups, accelerating their collapse. By advancing through Slovenia and through Greece onto Bulgaria and the rest of their country, we will dismantle the illegitimate government in Sofia and fracture the Soviet hold on the Balkans."
 GER_fall_bassenheim: "§YFALL§!: BASSENHEIM"
 GER_fall_bassenheim_desc: "Humanity has cancer. And that cancer is the Soviet Union. Hunkered deep onto the lands of Eurasia, they've been allowed to exist for far too long, damaging the Human Spirit per every live they end. The only hopes for this land are if we civilize them ourselves. Like the Teutonic Order before us, we shall spread our word to all those poisoned by the Judeo-Bolsheviks.\n\nLet this be our final struggle. Let this be our final push. Let us finally enter the collapsing Soviet structure and watch it crumble down before us. Let the cancer of Humanity be removed from our minds. Let us live in peace. All we need is one final push. All we need is victory."
 GER_tactical_domination: "Tactical Domination"
 GER_tactical_domination_desc: "We must not fool ourselves with over-complicated theories and other intricate doctrines. Our primary objective is clear and straightforward; the enemy must be destroyed. No other concept must take center stage. Knowing this, our air force will focus on destroying the enemy on the field of battle and atomizing their ability to organize and fight. From close air support to reconnaissance to destruction of valuable enemy tactical assets; our air force will make the lives of our enemies a living hell. Their soldiers will shiver and shudder at the notion of exposing themselves to the skies that we will be dominating."
 GER_return_to_gold_standard: "Return to the Gold Standard"
 GER_return_to_gold_standard_desc: "The United States - once the greatest economic power on Earth, thought to be unshakable for decades - collapsed in a matter of weeks. In the end, neither oil-backed deals, nor the American military, nor Wall Street could save the dollar. We will not repeat their mistake. Our people must have absolute confidence in tomorrow - and the freedom to walk into any bank and exchange their hard-earned savings for solid, precious metal. At last, our currency will carry real, tangible weight - and with it, we restore the quiet dignity of true economic stability."
 GER_suspend_consumer_economy: "Suspend the Consumer Economy"
 GER_suspend_consumer_economy_desc: "How blind our predecessors were to fall for the fleeting trends of American economic fashion? Instead of securing our borders and addressing the blatant shortage of arms in our military, they chose to flood the market with billions of consumer products - both cheap and luxurious - that did little more than inflate numbers in spreadsheets. From this day forward, the German citizen will receive only what is truly essential for life. Efficiency and necessity will replace vanity and waste."
 GER_exploit_conqured_nations: "Exploit Conquered Nations"
 GER_exploit_conqured_nations_desc: ""
 GER_improve_logistic_capabilities: "Improve Logistic Capabilities"
 GER_improve_logistic_capabilities_desc: ""
 GER_wartime_advancements: "War Time Advancements"
 GER_wartime_advancements_desc: "War does not only mean sacrifice and bloodshed, it can also bring unforeseen advancements in innovation be it for the civilian sector or for military use. Be it the second or the first world war, the countless lives lost were traded for previously unimaginable technological advancements. It almost seems that every war we fight, every drop of blood we shed, brings forth the evolution of the human species. Without a doubt our war with the Russians will be deadlier than any other war ever fought before. However one should not be saddened, because their blood shall be the fuel powering the gears of human history."
 GER_prepare_thenation: "Prepare the Nation"
 GER_prepare_thenation_desc: "As discontent and tension stir the continent, we realize what few have considered before. War is coming, and the German people must be made ready for it. The citizenry will be rallied for a fight, men will be drafted into the reserves, women will be mobilized for the home front, cities will be hardened and prepared for assault, and supplies will be allocated. The past mistakes of keeping the population blissfully unaware and unprepared for hardship will not be repeated here. Nothing short of a total reorganization and mobilization of society will follow. Death and destruction may come our way, but every German man, woman, and child will be able to face it with confidence and determination."
 GER_revive_the_fallschirmjager: "Revive the Fallschirmjäger"
 GER_revive_the_fallschirmjager_desc: "Without a doubt, some of the most elite special forces Germany has had at its disposal were the Fallschirmjäger. Just their name alone tells you enough about them: parachute Hunters. They orchestrated some of the Luftwaffe's most daring tasks during the war, such as the capture of Crete.\n\nWe shall replicate these advancements by reviving this unit. These men shall be some of the toughest, not just in Germany, but the world in general. Specialized in parachute and airborne assault training for our more advanced technologies. A valiant unit for discipline and aggression. One that shall instill terror and respect to our enemies' leaders and destruction to their forces."
 
 #NAFO
 GER_convene_the_european_parliament: "Convene The European Parliament"
 GER_convene_the_european_parliament_desc: "The spirit of Germany is broken, but it has been reborn in a new form. With Volt now leading Germany, the time has come to transform our ideals into action. The European Parliament will convene, as the legislative heart of a renewed, sovereign Union. Never again will we walk alone, for the Pan-European dream, though battered, still lives on.\n\nToday is the dawn of a new day. The birth of Federal Europe is now! The Benelux states are sure to join us, not as our vassals, but as our equals within. From now on, we rise again from the most crushing defeat, with only one objective in our sights: revenge. Let the Russians tremble with fear! Europe is reborn, and we will not go down without a fight."
 GER_european_millitarisation: "European Militarisation"
 GER_european_millitarisation_desc: "The War exposed every weakness of the old Union: fractured command, divided doctrines, and above all, a lack of manpower ready to meet the tide. We were not prepared for the scale of the Russian storm that flooded into Europe.\n\nBut that was then. Today, we are a singular force. From every corner of the Union, we will raise the largest army the world has ever seen. An army vast enough to hold back the East, and bring the torch of democracy to the darkest corner of the world: Moscow. The bear thinks we are weak. Soon enough, it will see what a mobilized Europe looks like."
 GER_the_duty_of_every_young_man: "The Duty of Every Young Man"
 GER_the_duty_of_every_young_man_desc: "The price of Liberty is eternal vigilance. We will not be remembered as the generation that watched liberty die, that abandoned our brothers and sisters to the East to the yoke of tyranny. Every city razed, every red line crossed, every flag torn down: this is a call to arms.\n\nThe defense, no, the liberation of Europe is the duty of every man. The age of comfort is over. Every young European will come to the defense of a continent under siege. There will be no more excuses, no more exemptions. The draft is no longer a policy; it is a duty. Europa will not fall again. Not while her sons still stand."
 GER_an_economy_of_war: "An Economy of War"
 GER_an_economy_of_war_desc: "We once promised our people peace, prosperity, and the comforts of the welfare state. But peace and prosperity have become luxuries we can no longer afford. The time for complacency, for now, is over. If we are to stand against the eastern menace, every factory, every worker, and every resource must serve the cause.\n\nThis is not a return to total war, but its evolution. A war economy forged not just for defense, but for dominance. The hum of our peacetime industry will become the roar of a continent armed to the teeth. Russia will witness our response; not in speeches, but in steel."
 GER_war_rationing: "War Rationing"
 GER_war_rationing_desc: "There is no glory in austerity, but what there is, is strength. To arm millions of men, to fuel thousands of tanks, and to maintain a vast enough war machine, temporary sacrifices must be made. The civilians will have to tighten their belts for the sake of their defenders. This is not deprivation. It is discipline. And discipline wins wars."
 GER_million_man_army: "Million Man Army"
 GER_million_man_army_desc: "A million men march under the 12 stars of Europe. A force unmatched in scale, yet fragile without a purpose or order. In the last war, we suffered not a lack of bravery, but a lack of cohesion. Languages clashed, doctrines contradicted, and chaos reigned where unity was desperately needed. This time, we will not repeat these mistakes. The high commands of the former nation-states must be brought under a single command. Europe's finest commanders will now speak with one language. This lion will have eyes, and it will see its prey clearly."
 GER_fortress_europa: "Fortress Europa"
 GER_fortress_europa_desc: "From the ashes of our first humiliation, the European High Command has devised a new defensive plan: Fortress Europa. We shall no longer rely on diplomacy. Concrete and steel will now do the talking. From the Baltic to the Mediterranean, an iron curtain will descend, not as a cage, but as a shield for our democracy.\n\nBut defenses are not only built with bunkers. Society must be prepared for a war that may last for several months, or even years. Every citizen and every factory must serve the defense of the European order. Europe will become a fortress, and in its heart, liberty shall endure."
 GER_aggressive_realpolitk: "Aggressive Realpolitik"
 GER_aggressive_realpolitk_desc: "The Russian storm shattered borders and unleashed an avalanche of chaos. From the state of near-anarchy in Iberia to the barricades of Paris, the Union stands bruised, but still breathing. While our allies fracture into ruin and strife, the dream of federalisation has stalled. But we will not let it die there.\n\nThe task is clear: restore law and order, reunite Europe, and bring the people of the Union back under her banner. We will outstretch our hand to them, but should it be slapped away, we will return with a clenched fist. The world is no longer a forgiving place. To survive, Europe must grow. If unity cannot be achieved through trust, then it will be forged through Realpolitik. Sharp, cold, and unstoppable."
 GER_intergrate_west_poland: "Integrate West Poland"
 GER_intergrate_west_poland_desc: "Poland was carved in half by the Russian sword, but not all of Poland was lost. In the shadow of Medvedev's bloody conquest, the Republic of Poland endures in exile, governing from Poznań. Alongside them, Silesia took the opportunity for independence, and now breathes free from both Moscow and Brussels. The CSTO did not bother to finish the job, but we will.\n\nThese states now look westward. We offer them more than survival; we offer them purpose, and a place in something greater than their individual existence. Europe is not whole without them. And they, without us, are prey."
 GER_secure_scandinavia: "Secure Scandinavia"
 GER_secure_scandinavia_desc: "In the last war, the Nordic countries stood isolated. Norway's narrow border with Russia offered us no opportunity for an offensive in the north. But the future holds different opportunities. Should Sweden, Denmark, and perhaps even Finland fall into our orbit, a new northern front will blossom. One that can strangle Russia's arctic lifelines, and cast a long shadow over St. Petersburg.\n\nBut this is not just about war, it is about unity. The northern peoples have long stood apart. Now, we offer them security and relevance. They will not be coerced, at least not yet. But make no mistake: Scandinavia will be brought into the fold. For their sake, and for ours."
 GER_secure_central_european_democracy: "Secure Central European Democracy"
 GER_secure_central_european_democracy_desc: "The Czechs stood at the brink of tyranny, caught in the shadow of the Russian advance, but we made peace before they fell. But the time for selective commitment is over. Central Europe will not remain a halfway house between East and West; the Czechs will join us, whether they like it or not.\n\nAustria, for its part, watched from behind its vaunted neutrality declaration. They were in the Union, yes, but when the Treaty of Lisbon's mutual defense clause was tested, they simply looked away. This time, they will stand with us, or be left behind by history."
 GER_balkan_intervention: "Balkan Intervention"
 GER_balkan_intervention_desc: "The Balkan had it's own micro war, reflecting our own situation. Serbia encompassed it's smaller neighbors and then invaded the smaller Croatian and Slovenian nations, practically reforming Yugoslavia under Serbian Nationalism, people live there, Europeans, who must be liberated from the Fascist grip of Serbia."
 GER_russias_soft_underbelly: "Russias Soft Underbelly"
 GER_russias_soft_underbelly_desc: ""
 GER_war_plan_black: "War Plan Black"
 GER_war_plan_black_desc: "Our efforts to prepare for the coming storm have been nothing short of extensive. We have prepared our logistics, secured our alliances, mobilized our reserves, and readied our weapons and people. Yet there is one thing missing, one final piece of our plan that must now be finalized; a singular dedicated plan of action. We will instruct our generals and other top commanders from our allies to put together a thorough plan unlike anything before. Every response, every choice, every action, every scenario, every contingency, all of it will be accounted for and mapped out. When the time comes, everyone from our generals to enlisted soldiers will know what to do. Even if some within our own government accuse us of being excessive or paranoid, our final objective remains clear.\n\nWe will be ready. Europe will be ready."
 GER_reset_european_economies: "Reset European Economies"
 GER_reset_european_economies_desc: " For too long, the incompetent wretches of the old world rotted away the nuance from global economic theory, and with it, bred the world in which Europe lost the European war. From social democracy to the welfare state, the government meddled far too much in the economy. Pragmatism within economics completely died in Europe long before we came into power. But now, we hold Europe in the palm of our hands, and we can push the policies that we have always wished to see implemented. We must go back to the backbone of economic theory, we must burn away all of the fluff that once held Europe back; and with that, we will we advance it to unforeseen heights."
 GER_national_corporatism: "Post-Capitalist Transition"
 GER_national_corporatism_desc: "The current system has proven itself to be slow, unbalanced, inefficient, but most importantly - absolutely unsustainable. Another crisis like this and it will collapse with us losing our grip on the situation. We should look forward to the ideas of Klaus Schwab and the World Economic Forum to transition the economy of Europe to something greater."
 GER_nationalize_key_industries: "Begin Japanification"
 GER_nationalize_key_industries_desc: "Though many understand the need for the transition to a sustainable system, few really understand how it will look and what it will entail. For that countries of the developed world should look to a rather fresh experience of Japan. From the 90s to the 2010s, it went from a booming, technologically driven economy to an almost eternal stagnation with so-called "living standards" drastically reduced. It's a very good example of achieving zero growth and how people can adapt to it."
 GER_promote_state_owned_enterprise: "Set New Social Standards"
 GER_promote_state_owned_enterprise_desc: "As the old system fades away, so do old social and economic norms that put humanity on an anchor. Traditional values, prejudices, faiths and beliefs of the old will naturally be abandoned as the new economy takes shape, one in which there is no room for individual ambitions and selfishness. Renting instead of owning, the lack of long-term economic and societal connection will become the new norm, and with it, morality and ethics will also change, and a new system will be achieved."
 GER_strengthen_transnational_institutions: "Empower Transnational Institutions"
 GER_strengthen_transnational_institutions_desc: "Transnational institutions are the unshakable pillars of the economy which have been driving it forward through decades. They are more effective, more pragmatic, more powerful than any national institutions could ever be. We must support and uphold them in any way possible, like the World Economic Forum always did as a platform for international cooperation and coordination."
 GER_concessions_to_the_oligarchs: "Dominate the Zeitgeist"
 GER_concessions_to_the_oligarchs_desc: "In this new digital world, one participates in the economy at all times without even suspecting it: the internet made it so you are always either looking for products to buy, or buying products, or looking at advertisements for them. Today the people are even more submerged in it than before with the massive adoption of VR and AR headsets and even microchips that further enhance one's integration in this world.\n\nAs such, it's only natural that we must involve ourselves in the digital world as much as possible, and make the people even more involved in it too, until the border between reality and virtual reality becomes blurred to nonexistence. Only then will the digital economy truly benefit us in the long run."
 GER_implement_corporate_governance: "Implement Corporate Governance"
 GER_implement_corporate_governance_desc: "To run a corporation is to run a nation, and to run a nation is to run a corporation. The only difference between the two is in size and amplitude. A nation is but a larger enterprise, with more employees, a larger customer base, and a more significant market share. A president is but a CEO, who must worry about the profit margins of the nation. The ministers are no more than directors worrying about their respective sectors. All the employees and management work to satisfy the customer base, which, of course, is our citizens. In our past, we let rigid political beliefs dictate our courses of action, but with the Great Reset, gross domestic income and growth margins will bring to light the new rationalism that the world so craves."
 GER_promote_enviromental_social_governance: "Wealth-Based Hierarchy"
 GER_promote_enviromental_social_governance_desc: "What measures the value of a person, the capabilities of a man? Money? Power? Social status? The truth is that all of these aspects exist in harmony. Certainly, if a man is capable of amassing high amounts of wealth or achieving a high societal status, he must be superior to others in some aspects of life. If a man can free himself from the shackles of morality and let rationality and profit margins be his guiding compass, he must have ascended to a higher level than most. Human society has been governed by these factors for decades. After all, should society not be governed by those most capable and ambitious?"
 GER_shareholder_democracy: "Shareholder Democracy"
 GER_shareholder_democracy_desc: "The age of national sovereignty and representative democracy has run its course - leaving behind only division, corruption, and decay. The illusion of popular governance served merely to empower petty officials, whose loyalty lay not with the people, but with their own pockets - or worse, with our adversaries.\n\nIn the new European order, there is no room for sentimental ideals. Seats in our highest governing body - the European Parliament - shall be distributed to those proven capable of shaping the future: executives of transnational corporations, directors of defense and biotech syndicates, and certified members of the intellectual elite.\n\nEach will be required to purchase shares in the system they now help govern, ensuring their commitment is not ideological, but contractual - legally bound to the machine they serve.\n\nGreed. Efficiency. Vision. These are no longer vices, but pillars of a stable world. Let the masses dream; we will manage reality."
 GER_reconstruct_european_cities: "Reconstruct European Cities"
 GER_reconstruct_european_cities_desc: "When the Russians came, they gifted us the fire of judgement, the fire of rebirth. In their defence, Europe had developed into a cesspool. A land divided by thoughts and petty nationalism, where brothers and sisters were at each other's throats. We were behind our international competitors not only in the tech sector, but most importantly in our national psyche, which led to our defeat. Brick by brick, nail by nail, we will rebuild our homes, improve from what we had once lost. The ashes will nurture a new golden age, one without borders, one without a limit."
 GER_rentier_based_economy: "Minimize State Participation"
 GER_rentier_based_economy_desc: "Why is the government meddling with the market? The market has always and forever will be capable of balancing itself. It is the Ying and Yang of society. It drives social forms and norms, changes and evolution. The state has always been but a roadblock to advancement. It sets laws and regulations which limit our extent of development, killing our courage and thirst for innovation. In this new society, reborn Europe, the pencil pushers and desk jockeys will take a step back. The world belongs to you, to the innovators and visionaries."
 GER_state_capitalism: "A More Responsible System"
 GER_state_capitalism_desc: "The days of reckless spending and consumption are over. We have established a new social contract, a more just wealth redistribution system that will benefit the environment and the global economy, capable of withstanding future challenges.\n\nOf course, this wouldn't be possible without the participation of every single citizen. Many have already lost all their needless excess property after the economic crises that have been hitting Europe, as recent as our defeat to Russia, however many also gave it up voluntarily in favour of a sustainable and modest life after realizing that there's no room for luxury in the economy of the future.\n\nAs much as it doesn't correlate with anything from the past, owning less is now the driving force of innovation and societal change."
 GER_responsible_capitalism: "Technocratic Symbiosis"
 GER_responsible_capitalism_desc: "Traditionally, we have allowed all kinds of people with different areas of expertise to govern different aspects of society, without considering their professional specialisations. All this ever led to was stagnation, rusting of the social gears and mutters which run this machine called society. If talent is not utilised, what use would it be? If expertise is not used in the correct field, what benefit would it bring? By synthesising technological expertise with the governmental body, Europe will be unstoppable. Our technology will advance to unforeseen heights. We will become the very definition of the future."
 GER_fourth_industrial_revolution: "Fourth Industrial Revolution"
 GER_fourth_industrial_revolution_desc: ""The Fourth Industrial Revolution is changing not only what we do, but also who we are. We, as individuals, will be affected in many ways, affecting our identity and the different facets of it: our notions of privacy, ownership, consumer behavior, how much time we devote to work and leisure, how we develop our careers and improve our skills. It will affect how we make acquaintances and develop relationships, the hierarchies we depend on, and our health. And, perhaps more quickly than we can anticipate, it may lead to forms of human augmentation that force us to question the very nature of human existence."\n\n- Klaus Schwab"
 GER_the_techno_utopian_ideal: "The Techno-Utopian Ideal"
 GER_the_techno_utopian_ideal_desc: "The European dream is no longer one of outdated nationalism. It is a sleek, towering vision of progress. A continent unified in purpose, directed by experts, and unshackled from the burdens of old. The war proved one thing: liberal democracy must evolve now or perish tomorrow.\n\nVolt envisions a continental renaissance built on digital governance, cooperation, and progress. A New Europe, defined not by borders, but by progress. Free from paralyzing compromises to unity and archaic institutions, we shall chart a new path toward prosperity, freedom, and enlightenment. Europe's future doesn't lie in endless debates or regional pride. It is in policy crafted by those who understand the world as it is and will be, not as it was."
 GER_freedom_isnt_free: "Freedom Isn't Free"
 GER_freedom_isnt_free_desc: "Every revolution has a price. If our plan to shape the New Europe into a beacon of progress and liberty is to be fulfilled, then we must accept some hard truths. Sacrifices are the price of every transformation throughout history. Some will call this undemocratic, perhaps even dystopian; but all of them don't grasp the scale of what Volt is building. The old definitions of 'freedom' and 'democracy' don't apply in a world plagued by tyrants.\n\nTrue freedom also means freedom from slavery. If we must tighten our grip to guarantee that, then so be it. The ends justify the means, and our end is unquestioned: freedom."
 GER_weaken_regional_nationalism: "Weaken Regional Nationalism"
 GER_weaken_regional_nationalism_desc: "To build the New Europe, we must first tear down the old. The dozens of regional identities that we once took immense pride in have become breeding grounds for reactionaries and saboteurs. Nationalist resistance is undermining the federal state's legitimacy and hindering the march of progress as we speak.\n\nThrough media oversight, and the slow but steady erosion of localist sentiment, we will tear down the myth of the "nation-state" from within. There will be backlash and unrest, no doubt about it. But once the dust clears, Europe will stand taller, free from the spectre of nationalism and closer than ever to full continental unity."
 GER_concessions_to_the_tech_giants: "Concessions to the Tech Giants"
 GER_concessions_to_the_tech_giants_desc: "Dominion in the modern age isn't measured in tanks or jets: it's measured in information control. The battlefield of the 21st century is a digital one, and the high ground belongs to those who built it and control it. We could fight them, nationalize them if we really wanted to. But to do so at this hour would be nothing short of suicide.\n\nSo we deal. A tax break here, one regulation less there. In return, we make their servers hum in our favor, their algorithms tuned to the message of democracy. It's an uneasy alliance, built on mutual ambition. One day, we may even break free of their grip. But until then, we smile, we shake hands... and we watch. They get what they want. We get what we need. For now, that's enough."
 GER_the_corporate_state: "The Corporate State"
 GER_the_corporate_state_desc: "The private sector has proven itself much more agile than the state. Why then, should governance remain the domain of these outdated institutions? Why should we be afraid of a system that just works? Through public-private partnerships and centralized economics planned by Europe's leading technocrats, we will usher in a new system. A system where efficiency isn't a means towards profit, but the mechanism of prosperity itself.\n\nAmong the architects of this future is the chairman of the World Economic Forum, Klaus Schwab: a visionary to some, a madman to others. His ideas, radical as they may seem to some, have enraptured the elite. Whether we embrace his policies or reject his madness, one thing is clear: The clock is ticking."
 GER_secure_european_democracy: "Secure European Democracy"
 GER_secure_european_democracy_desc: "Our democracy must not just survive, it must thrive. In the aftermath of the Russian conquests, we have chosen a radically different path: the forging of a stronger, democratic ideal. Through transparency and tireless engagement with the public, we will build trust and legitimacy in our new pan-European institutions. We will also curate democracy, and ensure that the will of the European people reflects the values of social progress, tolerance, and unity.\n\nNo more lies. No more sabotage. No more reaction. In the New Europe, liberty will be protected, not just from the tyrants, but from the menaces within. For the future of our democracy's sake, we must be bold and shape the electorate as carefully as we shape the policies they are voting for."
 GER_prohibit_subversive_media: "Prohibit Subversive Media"
 GER_prohibit_subversive_media_desc: "A lie big enough, that is repeated a thousand times, will never become the truth; but it will rot in the minds of millions. The hostile regime in the East, and resentful reactionaries within, now direct their venom at the New Europe. But this time, their weapons are not bombs or bullets, but narratives, all of them tailored only to fracture Europe from within.\n\nWe cannot allow this sabotage to continue. The Internal Security Service of Europe will identify and eliminate the sources of this dangerous disinformation. Television channels masquerading as news will be stripped of their influence. Soon enough, the people of Europe will be free from foreign manipulations."
 GER_government_of_national_emergency: "Government of National Emergency"
 GER_government_of_national_emergency_desc: "The world has changed in the last decade, and we stand in the eye of the storm. War to the east, collapse to the west, and unrest within. The institutions of old are too slow, too idealistic for the demands of today.\n\nSo we act. We build a coalition of necessity. Centrists, moderates, pragmatists; those who understand that the Union cannot afford inaction at this critical hour. The extremists may scream from their exile or behind bars, but they've forfeited their place at the table. But make no mistake: democracy hasn't been abolished. It has been suspended, for its own good. The people's vote still matters, but the choices have been narrowed. The stakes are higher today than ever before. And from now on, we will speak with one voice.\n\nOrder must be maintained. The national emergency is not over."
 GER_old_system_new_form: "Old System, New Form"
 GER_old_system_new_form_desc: "Some may speak of progress, but what the European people truly crave is order, a sense of hierarchy and heritage in this chaotic age. The war humbled the idealists. It has proved that government belongs not to the masses or the idealists, but to the experienced and disciplined. Volt lives in a fantasy, a bright flame quenched by its own contradictions. The People's Party, prepared with decades of experience ruling the old republics, rises not in its old mold, but remade. No longer apologetic for its own power, and no longer feigning egalitarianism.\n\nCall it elitism. Call it hierarchy. Call it what you will. We will shape Europe in our image: one that remembers its glorious past, respects its elders, and accepts the fact that not all men are ready to lead. Beneath the veneer of modernity, the old world breathes again, refined and unashamed."
 GER_entrenched_elitism: "Entrench Elitism"
 GER_entrenched_elitism_desc: "Democracy need not mean anarchy. Equality need not mean sameness. Others will chase utopias in vain. We in Europe will choose order. There is no shame in recognizing that there are those better suited to govern. The clever, the disciplined, the successful. Those who prove their worth in the boardrooms and ministries deserve the responsibility of leadership. Not as despots, but as stewards. Not kings, but architects.\n\nThe excesses of the past must be reined in. There is no need for the worker to rule his factory. Stability comes from hierarchy, and wealth flows down from the top. The elite will rise, let Europe rise with them."
 GER_anti_modernist_revolution:  "Anti-Modernist Revolution"
 GER_anti_modernist_revolution_desc: "Steel towers reaching for the clouds, screens glowing in every man's hand, a thousand voices scream into the void. And still, the human soul withers.The modern world has promised liberation, but delivered nothing but endless anxiety. It promised knowledge, and gave us post-truth. It promised to connect us all, and left us more alienated and lonely than ever before. We've mistaken acceleration for destiny.\n\nNo more. This is not a regression, it is a revolt. Against the cult of novelty, against the plastic ideology of endless progress, against the myth that history is a straight line forwards. We will strip away the illusions. We will remember what it means to live with purpose. And in that remembrance, we will find the path, either beyond modernity, or beneath it."
 GER_european_nationalism: "European Nationalism"
 GER_european_nationalism_desc: "Nationalism has always been a double-edged sword: a force of liberation, and a justification for slaughter. But we ought to refine it. The old wars were fought between brothers. The new world must be forged in unity, not by dissolving identity, but by exalting a higher one.\n\nEurope is a nation. Not by birth, not by blood, but by destiny. From Evola's mysticism to the shattered dreams of failed empires, one single thread endures: a continent striving toward union. We do not resurrect the past; we reinterpret it, and wield it as a weapon for the future.The cynics will continue to mock the dream. The dissidents will either flee or be crushed. The centuries of division are over. A single flag rises in their place.\n\nOne nation, under God, indivisible, with liberty and justice for all."
 GER_codify_social_stratification: "Codify Social Stratification"
 GER_codify_social_stratification_desc: "Egalitarianism was celebrated in simpler, peaceful times, but now it's become a liability. As Europe unites under a new, federal state, we must embrace the natural order of all societies: hierarchies must be respected, duties assigned according to ability, and ambition must be channeled where it is efficient. Through legal codes, new social norms, and corporate structures, we will build a stable civilization. One not based on a subjective sense of fairness, but on rational design."
 GER_the_managerial_revolution: "The Managerial Revolution"
 GER_the_managerial_revolution_desc: "There was a time when power belonged to kings, then to capital, and briefly to the masses. But in the wake of chaos, they have chosen new stewards: managers, technocrats, and planners. They are not elected to inspire. They are appointed to govern, coordinate, and command. Europe has no time for revolutionary daydreaming.\n\nThe Managerial State isn't tyranny, neither is it freedom as we used to know it. It is a new social contract: liberty is tempered by necessity. Sacrifices will be made, but for the first time in a long time, they are made rationally. This is the end of showman politics. The managerial revolution has already happened. But most just haven't noticed."
 GER_the_europe_of_tommorow: "The Europe of Tomorrow"
 GER_the_europe_of_tommorow_desc: "After 8 long decades, the dream has finally become reality. Europe is no longer an idea, or a geographic concept. It is one nation, one in purpose, one in spirit. Nationalism has been fully squashed beneath the light of the pan-European identity. The old flags, the old grudges; all of them rendered obsolete by our shared destiny. Prosperity blooms in the glass-covered skyscrapers of our metropolises. From Lisbon to Berlin, innovation is our new frontier. Regulation can no longer hinder ambition. In our factories and server farms, the New Europe dreams of the future.\n\nThis isn't the old, backwards Europe of brother wars. This continent is one for visionaries, for those who seek to be unshackled from borders. Tomorrow has arrived, and it speaks in one voice: Volt's voice. After all, without Volt Europa, there would be no New Europe!"
 GER_the_europe_of_yesterday: "The Europe of Yesterday"
 GER_the_europe_of_yesterday_desc: "After 8 long decades, the dream has finally become reality. Europe is no longer just an idea, or a geographic concept. It is one nation, one in purpose, one in spirit. But we stand united not in sterile treaties or empty gestures, but in blood and steel. We are not merely administrators of a continent; we are heirs to its immortal legacy.\n\nWe have not forgotten our predecessors. The Romans, the Franks, all of our predecessors now smile down at us from Heaven. In uniting Europe, we reject the liberal decadence that has haunted us for decades. We do not apologize for the past. We celebrate the empires of old as the pillars of the cathedral that is European history. The contemporary era tried to make us forget all this, but we remember. And from that, we draw the fire to build a Union that will go down in the greatest pages of European history."
 GER_europe_united_and_strong: "Europe United and Strong"
 GER_europe_united_and_strong_desc: "For centuries, Europe was a mosaic. Beautiful, but constantly at war with itself. Now, that mosaic has been reforged. The flags of old still fly, but behind them stands a single will, a single mission. We're not living through an age of peace. Our age is an age of reckoning. Across the world, tyranny rises and democracy crumbles. But not in Europe. Despite all of her shortcomings, and the coming struggle we will wage for her, we have chosen liberty over slavery.\n\nThis is not the Europe of yesteryear, divided, decadent, and dying. This is the Europe that is: armed and ready to liberate her sons at East. The final political evolution of a continent that has known enough to not make the same mistake again. Let the tyrants of the world watch, and tremble. We stand united. Paneuropa is no dream."
 GER_the_end_of_the_russian_experiment: "The End of the Russian Experiment..."
 GER_the_end_of_the_russian_experiment_desc: "They think they can play God with the East as if it is theirs. They have trampled the sovereignty of our allies underfoot, and attempted to suppress the free peoples of Europe. Every lie they have told, every collaborationist they have propped up, every man and woman they have oppressed; we have not forgotten them.\n\nThey call it stability, but we know the rot. An infection spreading from Moscow to the west, from Warsaw to the Urals: authoritarianism. We once offered peace to the tyrants. A chance to rebuild, to forget the ghosts of the past century. But Russia cannot exist without enemies; and Putin, and that madman Medvedev, have made us their greatest rival.\n\nLet this be their final measure. We will crush the Russians forever and scatter their empire back into the history books, where it belongs. Make no mistake: this isn't conquest, it is liberation."
 GER_bulwark_against_the_russian_menace: "Bulwark Against the Russian Menace"
 GER_bulwark_against_the_russian_menace_desc: "Europe is awake. No longer a scattered alliance of nation-states, we stand forged in the fires of our most destructive conflict since World War II. The Russian bear tore across our lands once more, razing cities, toppling governments, and challenging the very existence of united Europe. But where the old Union might have faltered, the new Union endures.\n\nOur soldiers do not march for a king, an emperor, or a dictator; they march for democracy. They are the sword and shield of the European people, defenders of a future where no tyrant will ever again bring them to their knees. The time of division has ended. We are no longer a coalition: we are an army. One army, one command, one mission: defend Europe."
 GER_project_our_power: "Project our Power"
 GER_project_our_power_desc: "The age of massed divisions and trenches stretching from sea to sea is over. We cannot, and will not, outgun our enemies in raw manpower. But what we can do is outthink and overwhelm the enemy with precision and coordination. To defeat the Russian hordes, we must build a force that can strike them faster and harder, and command the air above every battlefield. From AI-driven logistics to next-gen drones, our advantage doesn't lie in raw numbers, but in intellect."
 GER_european_ingenuity: "European Ingenuity"
 GER_european_ingenuity_desc: "Europe is not a continent of imitators. Ever since the trenches of Verdun and the blitzkrieg over the Ardennes, our armies have always adapted and overcome. Our defeat in the last war was not due to a lack of spirit or intelligence. Rather, they were the product of shattered coordination and outdated doctrines. But we have learned. Unified and galvanized, we will draw upon our diverse military traditions and fuse them into a truly European warfare, backed by the lessons of NATO and sharpened by our own ingenuity."
 GER_centralized_command: "Centralized Command"
 GER_centralized_command_desc: "A key reason for our failure during the war was due to our lack of communication. Like headless ants, we kept hitting the wall yet failed to realise it until it ultimately crushed all of us beneath it. Now, with a fully and truly integrated and centralised military command, we can effectively and efficiently work towards beating back the eastern bear. The eastern bulwark hit us hard last time, but this time, with united hearts and minds, the democratic nations shall succeed and overcome our shameful defeat in the past."
 GER_dominate_the_skies: "Dominate the Skies"
 GER_dominate_the_skies_desc: "The battlefield of the next war will not be won solely by our boys on the ground, but by eyes in the sky. In the last war, Russia's jets tore through our defenses, and our troops payed dearly for this weakness. The air forces cannot afford to repeat their performance in the last war.Our engineers and theorists will be tasked with reshaping air combat. Unified research, pooled resources, and a Union-wide commitment to aerial supremacy will ensure that no enemy fighter dares enter our airspace. European pilots will fly with the confidence of our overwhelming support, and our enemies will learn that there is no refuge from a watchful eye in the sky."
 GER_maximize_supply_lines: "Maximize Supply Lines"
 GER_maximize_supply_lines_desc: "A tank is only as powerful as the fuel that feeds it. An army can only march as far as the roads allow. A few years ago, we built machines capable of breaking through any line, only to watch them stall in the mud. From now on, we must treat logistics not as an afterthought, but as the backbone of any victory. High-speed rail networks and streamlined logistics will fuel our advance eastwards and keep the army moving. Every road we pave and every rail we lay is another step toward victory."
 GER_metal_on_metal: "Metal on Metal"
 GER_metal_on_metal_desc: "The future of warfare will not be decided solely in the skies or behind screens, it will be forged in steel, roaring across the plains. For too long, we've relied on outdated armour and American production lines. But from now on, the tank has returned to the battlefield as the spearhead of modern warfare, a weapon of fear and decisive power. Our engineers know this, our generals crave it, and our enemies will dread it.\n\nWe will design our own spearhead. A new generation of main battle tanks, built from shared knowledge, will lead the charge. With German engineering, French design, and Italian innovation, our armoured divisions will not merely hold the line; they will crush it."
 GER_democracy_falters: "Democracy Falters"
 GER_democracy_falters_desc: "Tragedy.\n\nIn our darkest hour, we tried our hardest to halt the Russian advance, but it simply wasn't enough. Once the front broke, chaos ensued. One blow after another, the East was lost. We can thank our lucky stars that Germany was spared from the worst, but the entire Eastern half of the alliance has been lost. The buffer between us and Moscow has vanished.\n\nNATO is in complete and utter disarray, the alliance's unity and credibility shattered. As if that weren't enough, our neighbours are now consumed by their own civil unrest.\n\nWe stand on the brink, and the illusion of peace has faded."
 GER_embrace_european_unity: "Embrace European Unity"
 GER_embrace_european_unity_desc: "The old order has vanished. The treaties, the alliances, the guarantees, all of it burned away beneath the Russian boot. But if this defeat has taught us anything, it is that our survival depends not on the strength of any one nation, but on the unity of them all. There is no time for nationalism, and no room for division. If Germany is to endure, if our values are to mean anything in the years to come, then we must build something greater than ourselves. Only together can we ensure that this will never happen again."
 GER_call_emergency_elections: "Call Emergency Elections"
 GER_call_emergency_elections_desc: "Democracy has failed Germany. The hesitation of our politicians to aid our allies when they needed us most have led us here: a continent on the edge of total collapse. Confidence in the establishment parties has shattered, and the German people loudly demand change.\n\nWith the Federal Government left to scramble and public trust in democracy at historic lows, emergency elections aren't a choice; they are a necessity. And in the chaos, one party has surged forward: Volt Europa, promising reform, a new way forward, and over all: unity. Their protests are already filling the streets of the nation.\n\nThe stakes are the highest they've ever been. We must either lead, or be led into the dark."
 GER_operation_walesa: "OPERATION: WALESA"
 GER_operation_walesa_desc: "In modern European history, we've lost our Polish brothers twice and both times it was the dictatorial Soviet menace who walked all over them. The Russians have always craved our fertile lands, our bountiful fields, our golden plains. But we will not let them steal what is rightfully ours, we will not let their greed be the end of us. By retaking the Polish corridor, we can effectively rebuild a land connection into the Batlics and Ukraine, creating a path for their liberation in the future."
 GER_utilize_europes_industry: "Utilize Europe's Industrial Capacity"
 GER_utilize_europes_industry_desc: "Europe is a very populated, dense, and developed region, it is a wonder we were defeated by Russia but in hindsight it was our values that kept us from leveraging our most obvious advantage, our superior industry.\n\nIn the first war, we had plenty of factories but they made inane luxury goods, consumer products, trinkets, luxury cars, well we changed that. The new industry we have fostered churns out tanks, bombs, guns, planes, every piece of war material one could wish for in a greater quantity than Russia can ever fathom."
 GER_operation_petliura: "OPERATION: PETLIURA"
 GER_operation_petliura_desc: "The Ukrainian plateau has seen no short of suffering in the hands of the Russians and as the dusts of the first war settled, they were once more subjugated to Russian overlordship. As we march across the Vistula, Ukraine will soon be within our reach. Soon we shall liberate the golden wheat fields of Kharkiv and return the azure sky back to the Ukrainian people. In the spirit of Petliura, carrying the tens and thousands of martys of Ukrainian independce, we shall prevail, we shall succeed, to move forwards, towards freedom and liberty."
 GER_war_time_advancements_eu: "War Time Advancements"
 GER_war_time_advancements_eu_desc: "War breeds innovation, each death is a lesson, each lost vehicle a case study, no sacrifice is in vain. Every loss is for the cause."
 GER_sanctify_the_armed_forces: "Sanctify the Armed Forces"
 GER_sanctify_the_armed_forces_desc: "Throughout Europe's long history, there have been countless foreign aggressors that have seeked to enslave us, to stomp us under their boots, to make us lesser men on our land. Yet each and every time, our brave soldiers, brothers in arm and blood, have fought side by side to repel these invaders. From knights templar to spartan hoplites, our blood has long been entangled by the strings of destiny. The fate of Europa lies in the hands of each and every European, and by the will of God, we shall prevail once more."
 GER_redefine_what_is_european: "Redefine What is European"
 GER_redefine_what_is_european_desc: "Europe is geographically pushed to the Urals, but many in Europe, that is our nation, do not feel any brotherhood with the Russians due to in part the near constant warfare in history between us and them continuing up to the present moment. But Russians have been slave to autocrat after autocrat, rebranded each time as better than the last, they're the ultimate showcase of a people led astray, the lost Europeans.\n\nWhen this all over, let us be merciful, we will bring them into paradise and show them what good government really means."
 GER_reeducate_the_liberated_territories: "Reeducate the Liberated Territories"
 GER_reeducate_the_liberated_territories_desc: "Some of the lands which we have so graciously been able to free from the tyrannical Russian grasps have been russified, brainwashed by their oppressors for years on end, and forced to gavage russophilic propaganda. It is our duty to cleanse their tainted souls and damaged minds with the one and only truth, the story of their people, our people, the democratic European people. They were once lost. Lost in a sea of Russian falsehoods, but now they have been found by their true family, the only people who will unquestionably protect and support them."
 GER_admit_finland_into_nato: "Ultimatum to Finland"
 GER_admit_finland_into_nato_desc: "Finland, the land of thousand lakes, the land of endless snow. They know Russian repression better than anyone and their hatred for Russian aggression is stronger than any other nation in the great white North. First pillaged by the Russian Empire for a century, then losing land, people, and heritage to the Soviets. With slight persuasion, without a doubt the Finns will be glad to cooperate with us. After all, for their thirst for revenge and hatred for the east is enscribed into their genes."
 GER_assist_democracies_everywhere: "Assist Democracies Everywhere"
 GER_assist_democracies_everywhere_desc: "Let the flower of freedom blossom. Let the fruits of our warriors and democratic brethren grow. Once upon a time, it was the Americans who were stereotyped as freedom loving and democracy boasting people. Now, Europe shall take over this mantle. We will become the new leaders of the free world. We will be the gardener of this garden of Eden, we will be the guardians of this heaven on Earth. From this day forward, every man and woman shall be free, live free, and die free."
 GER_strike_most_vulnerable: "Strike the Most Vulnerable"
 GER_strike_most_vulnerable_desc: "Our enemy is without a doubt formidable. Their defenses are strong, yet not unbreakable. The bear's claws are dull, its teeth are rotten, and its fur thin. It has already tired itself due to years of infighting and unsuccessful recovery from the previous war. Like a dagger, we shall pierce them through their weakest lines and strike directly at their heat. The death of the bear won't be easy nor will it be swift, but it will without a doubt be necessary."
 GER_agenda_2040: "Agenda 2040"
 GER_agenda_2040_desc: "It was a stage. Where was it? Everywhere. No matter if it was a living room, a parliament building, a theatre or a city street, surrounded by massive blocks of concrete, he was there. The image of Klaus Schwab in an armchair seemed to have slipped out of nothingness, and now stood before everyone's eyes."
 GER_safety_and_security: "Safety and Security"
 GER_safety_and_security_desc: "A lot of the decisions made by previous European leaders are questionable at most, while even the most reasonable measures were not implemented to the extent that would allow true safety and security to be achieved.\n\nWhile threats persist both on the inside and the outside, we must not hesitate to put them down. Privacy and freedom were merely illusions that cultivated hatred and insurgency, and people must learn that they are things of the past."
 GER_solidify_secret_clubs: "The Hands Behind the Face"
 GER_solidify_secret_clubs_desc: "We must not forget, of course, our benefactors, our great businessmen, representatives of the wisest people of the world that have coined many great ideas for us and allow our show to go on in the first place.\n\nWe have assembled a great team of experts and thinkers with the consideration of their wishes, all so our great work could continue."
 GER_architecture_of_post_modernity: "Architecture of Post-Modernity"
 GER_architecture_of_post_modernity_desc: "While a lot of the changes we bring sometimes aren't very easily integrated into society, they are necessary steps on the way to our goal. People must learn to adapt to this new environment.\n\nThe time of the old man is coming to an end. The social contract, the cities they live in, the jobs they work, all changes with it.\nIt's the new reality, whether they like it or not."
 GER_new_human_concept: "Our Own Homo Sapiens"
 GER_new_human_concept_desc: "But of course, the most important and the grandest of changes come with the reshaping of the human itself. Phasing out old prejudices and moral limitations opens up a gateway for endless possibilities in our quest for transformation.\n\nNo more negative emotions that have such a drastic effect on productivity and social coherence - a chip will make sure you always smile and do your job with optimism and excitement!\n\nSoldiers and workers enhanced with prosthetics that make them stronger and faster than nature ever intended!\n\nNo more crime, as your location is always on the map.\n\nAnd that's not to mention the complete change in the way people interact with each other, a total shake-up of the archaic order of things."
 GER_the_new_surplus_value: "The New Surplus Value"
 GER_the_new_surplus_value_desc: "As we are progressing  towards the inevitable future, the very foundations of culture and society begin to reshape, resulting in an entirely new socio-economic formation - one that will replace the outdated, ineffective system of today.\n\nYes, as funny as it sounds now, civilization started with family ties, tribal forms of control and subjugation. Through ancient and medieval times, humanity took hold of a new system: slavery, an economic system that required physical enforcement of one's compliance. Finally, centuries later, it has been replaced by the capitalist system, which only required control of one's labour.\n\nModern technologies allow us to take this progress even further. Why need to control people's bodies, why need to control their labour when you can directly take hold of their subconcious, their desires, their aspirations, their thoughts?\n\nThe surplus value of the new system is the soul."
 GER_establish_the_two_class_society: "Establish the Two-Class Society"
 GER_establish_the_two_class_society_desc: "The hardest pill to swallow is that the economic distribution that our citizens are so used to has totally outlived itself. The system of the middle class simply can not continue to exist in these times of crisis, and the distribution of wealth will change from the ground up.\n\nWe must accept that not everyone can live like a king, or even an aristocrat. We must make do with what conveniences we already have. Building up a surplus and owning more than you need is a selfish desire that remains a part of human nature, but hopefully, that will change with time.\n\nRight now we must think about our common good, not what some individuals thought their life would be in a few years or so. Only the few truly remarkable ones deserve a better, luxurious life."
 GER_erase_national_divisions: "Erase National Divisions"
 GER_erase_national_divisions_desc: "National hatred has always been the driving force of disobedience and divide, which has already hampered with our plans quite a bit. There's no room for national divisions in the future, they have to go. Unity and cooperation must be maintained at all costs.\n\nOnly when these xenophobic, "patriotic" delusions are dealt with can we move on to construct true fairness and harmony."
 GER_the_order_of_the_future: "The Order of the Future"
 GER_the_order_of_the_future_desc: "Now that our transformations are in full swing, we can be truly proud of our work. Perhaps just one more thing needs to be said..."
 GER_democracy_now: "Democracy NOW!"
 GER_democracy_now_desc: "Tragedy. Tragedy has always been a core aspect of European history. The fall of the Roman Empire which set us back centuries, the first and second world wars which brought untold destruction to the European continent and drenched European soil in blood, and now the fall of NATO. I tried to warn them of the Russian barbarians; that we needed to expand our alliance to every corner of Europe to prepare. But they did not listen, the politicians were too focused on appeasing the Russians, too blind to see the truth in front of them, and by the time they realized their error, it was too late, and our continent was yet again torn apart by the hellish talons of war.\n\nBut all is not lost, the Europeans saw the truth in my words, both online and in-person, and they spoke. They chose me to lead them to a better tomorrow, one where Russia is no longer a threat, where democracy is the norm and aggression is never tolerated. The pain that Russia wrought will be reciprocated ten fold."
 GER_tax_reform_for_europeans: "Tax Reform For Europeans"
 GER_tax_reform_for_europeans_desc: "For quite a bit now, taxes have been a great pain in Europe's sides. This is because of the insane percent of money that hard working Europeans had to pay to their government to survive. These tax rates have often exceeded over 50 percent, which is insanity and only hurts the bottom line of the average working man. These practices are both unsustainable and harmful, so it is clear to me that we must cut the taxes in the European Union for any chance of a healthy and robust economy to combat the Russian menace. Soon, Europeans will no longer be forced to pay most of their hard earned money in taxes, and with this, our economy will flourish."
 GER_bringing_europe_together: "Bringing Europe Together"
 GER_bringing_europe_together_desc: "Anyone who has visited Europe can attest to its beauty, but, like all continents, Europe was mired by infighting and tragedy. The pro-Russians among us, who still craved for the long gone times of the Soviet Union, prevented us from ending this travesty. It's unspeakable that some Europeans prevented unification; absolutely unbelievable. Because of the saboteurs in our own borders, our army stood no chance once the Russian horde stormed the Polish border. All this trouble must be put in the garbage bin, as all countries in Europe must be in NATO and unified to be secure from Russian aggression. And now, I call for all Europeans to come together and unify to put an end to Russian aggression, and to put Russia back into its place, in the trash bin of history."
 GER_end_european_neutrality: "#EndEuropeanNeutrality"
 GER_end_european_neutrality_desc: "As the Russian stampede threatened to end European democracy for good, Germany fought hard for Europe. Every nation came together for the sake of making sure that the Russian horde could not end the democracy we had built up for so many years. But currently, so many nations remain neutral, despite all the pain that Russia gave out to us, they suddenly want to act like fence sitters.\n\nUnacceptable. Absolutely unacceptable! I will make sure every social media platform is aware of these traitors. I'll call for everything to be thrown at them, on social media, in speeches, and in the war room. And soon, they will know what happens to snakes who abandon Europe in its time of need..."
 GER_spread_our_message: "Spread Our Message"
 GER_spread_our_message_desc: "In my decades of being an economist, I have never encountered a tool as useful as social media. Through social media, I have told millions of people the truth of Russian imperialism, how we should deal with it, and my opinions on the comings and goings of the world. Strangely, many find comedy in my posts, perhaps it is the way I speak, or maybe the opinions I express. Despite this, it's only worked in my favor. Every time they laugh, they come back for more. And when they come back for more, they listen. Finally, when they listen, they join our cause. Already, the fruits of my labor are self-evident. Thousands of our youth have joined the European army, and a thousand more will join as I call for all Europeans to join the cause. Our army has begun to cast a shadow over the Huns of the east, and they can only watch. The era of European tragedy will be over soon."
 GER_strengthen_the_heavy_lifters: "Strengthen the Heavy Lifters"
 GER_strengthen_the_heavy_lifters_desc: "Back in the days before the Russians hordes stormed our borders, I was petitioning to end Austrian neutrality. A question appeared in my brain, so I asked someone what countries they think of when they think of Europe. In response, they listed countries like Germany and France. There is a good reason for this, despite all of Europe still contributing, these two nations lifted the majority of the weight that was on our backs, industrially and militarily. Even though the war for Europe was lost, Germany and France still fought tooth and nail to preserve European security from Russian aggression. Now, we must not leave these countries in the dust, I call to prioritize them, actually. They will not only be the industrial heartland of liberated Europe, but also the cultural heartland. These countries will be known to all as the beating heart of Europe!"
 GER_total_decolonization: "Total Decolonization"
 GER_total_decolonization_desc: "European culture. Rich in both traditions and customs. Europe is packed to the brim with cultures in hundreds of different areas, all with their own cuisine, traditions, and more. But, throughout the rich history of Europe, many of these cultures have been put down by larger powers, bullied into the trashcan of history. Even today, the nations of Kosovo and Catalonia are bullied by their larger and more powerful neighbors, Serbia and Spain. There have been numerous proposals by other great powers to solve this issue that plagues Europe, but I would like to throw my hat into the ring, so to speak. I call for the establishment of autonomous zones for these oppressed nations, to allow for a truly decolonized and multicultural Europe."
 GER_focus_on_the_home_front: "Focus on the Home Front"
 GER_focus_on_the_home_front_desc: "Despite the overwhelming support of my administration that my fellow Europeans have shown, there are unfortunately still some who remain skeptical of my leadership and my capability to defeat the Russian menace. Such claims are ultimately unfounded and downright wrong, just another example of Russian propaganda's death grip on the gullible within our borders. It's time for the European nation to learn that the interests of my government are the interests of them. Through both social media posts and physical pamphlets. I will make sure that every European man, woman, and child will know the virtues of my administration."
 GER_democratize_foreign_minds: "Democratize Foreign Minds"
 GER_democratize_foreign_minds_desc: "Regardless of the majority support that Europeans have for my administration, there will always be those from outside of our borders who will wish to put us down, either out of ignorance or malice. I've seen this on social media, where I have been tagged and harassed numerous times by both Russians and other foreigners for the crime of loving Europe. Also on social media, many have made the effort to turn my European brothers into those who would backstab our movement for the tyranny of Russia, which is ridiculous. This cannot be allowed to last and already, I have made a great effort to democratize foreign minds. But, it's time we ramp up our efforts, for any hope of international support."
 GER_powerful_independent_united: "Powerful, Independent, United"
 GER_powerful_independent_united_desc: "Europe is now in a better position than it ever has been before, look at all the good work that I have done! The era of tragedy will soon be over, as European jets fly over the skies, ready to turn the Russian menace into ashes. As our armies prepare, readying their guns and training day and night for the moment that we strike and liberate Eastern Europe, nay, the world from the Russian plague once and for all. Gone are the days of petty infighting between nations barely connected by the EU, slowly but surely, our nation will unite Europe completely. I call for all Europeans to celebrate!"
 GER_end_world_neutrality: "#EndWorldNeutrality"
 GER_end_world_neutrality_desc: "The world seemingly watched in horror at the dawn of the European war, most seemingly gave their support to our cause as the russian stampede threatened to end European democracy, but today, where are they now? I see them condemning our moves on social media despite them originally giving us their support? Unbelievable! I will make sure to call them out on every platform I can, because their current neutrality, despite Russia's human rights abuses and the genocide they committed against Ukrainians is absolutely ridiculous and will not be stood for for any longer!"
 GER_all_out_information_assault: "All-Out Information Assault"
 GER_all_out_information_assault_desc: "There has never been a tool as useful for spreading our message as the internet. Every day, millions or even billions of people from across the world log on to entertain themselves or inform themselves on the comings and goings of the world around them, a world that moves way too fast for anybody to keep it up with it all. But we can use this, we can show millions of people across the world and in Russia the virtue of our nation through little more than an hour of typing. Information warfare is the future and I will add it to my arsenal and in time, master it."
 GER_think_tanks_for_war: "Think Tanks For War"
 GER_think_tanks_for_war_desc: "War is a complicated venture, always has been and it always will be. But soon, war will come to Europe once again, it is an inevitability, and we need to prepare for it as such. Europe's loss in the European war is due to a large number of things, but most importantly was the failure of our strategy. These strategic failures led to the downfall of Eastern Europe and the mass human rights abuses that we see today. This can not happen next time, Europe's future is on the line and I call for making think-tanks for war, so that the best military minds of our generation can ponder new strategies to send Russia fleeing back."
 GER_secure_the_south: "Secure the Underbelly"
 GER_secure_the_south_desc: "For decades now, the Middle East has been home to tyrants, despots, and terrorists. The countries in the Middle East have done nothing to help curb these violent actors and have often, in fact, allowed these organizations to thrive within their own borders. This cannot be allowed to continue for any longer, for too long, we have allowed for the nations of the Middle East to terrorize the world and spread their radical extremism to our civilians. I will make sure that this menace is done and dealt with, never again will another European die from a terrorist attack."
 GER_asian_gamble: "Asian Gamble"
 GER_asian_gamble_desc: "I have done much research into Chinese history and have found greatly disturbing information. For as long as the People's Republic of China has existed, so has brutal colonialism by the Chinese government. The most known example of Chinese imperialism is Tibet's invasion and annexation, but even the region of Xinjiang has experienced brutal oppression by the Chinese government and its supporters. This cannot be allowed to go on; I won't allow it to go on for one more day. I call for the total decolonization of China and to reduce it to Ex-China."

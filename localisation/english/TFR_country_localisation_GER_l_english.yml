 GER_into_post_capitalism_dynamic: "Into Post-Capitalism"
 GER_into_post_capitalism_dynamic_desc: "The revolution has succeeded in its initial goals of dismantling the immediate bourgeois capitalist threat, but now we take it further. We are now taking Germany into a truly post-capitalist stage of development. The socialist revolutions of the past had the unfortunate issue of capitalist elements still lingering within society, something we are quickly moving to eliminate. Private enterprise, speculation, the wretched profit motive, "free" markets; these hidden but still noticeable capitalist elements are withering away by the day under our keen and vigorous efforts to remodel the national economy. Soon people will relegate what was experienced under capitalism to be a growing distant memory."

 GER_mercosur_eu_deal_idea_desc: "Mercosur and the European Union have signed a historic trade agreement, opening up new markets for South American agricultural products and European manufactured goods. While met with staunch opposition by European environmentalists and farmers, the agreement has nonetheless proven to be mutually beneficial, being championed by both the European and South American political establishment as the cornerstone of a new era of multipolar consensus and transatlantic cooperation. Expectations are high, but only time will tell if the agreement will live up to its promise."

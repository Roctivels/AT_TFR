 GER_digital_development_idea_desc: ""
 idea_NATO_advisors: "NATO Advisors"
 idea_NATO_advisors_desc: "Weve recently received advisor's from the highest posts of office from the NATO headquarters in Brussels. They are here to help us train our troops, develop our doctrines, and provide us with a basic blueprint at defending our nation from any hypothetical Russian attacks."
 idea_EU_unified_army_commands: "Unified EU Army Commands"
 idea_EU_unified_army_commands_desc: "The European Union, under German guidance, has brought all national militaries under a unified military command structure, expanding its Common Security and Defence Policy. This allows the Union to act in response to regional and global threats as a single entity."

 taiwan.13.t: "Cheng Wen-tsan Secures Taiwan Presidency"
 taiwan.13.d: "After fending off troops from mainland in the recent war, Taiwan announced that it is now able to hold free elections according to the constitution again. As the recent war incited mass hatred against mainland China, Kuomintang lost a significant portion of voters who blame the KMT of unable to secure peace or see them as posible mainland China's collaborators. As a result, the DPP under [CHI.GetLeader] easily won the elections and managed to gain a new term.\n\nAs all parties have accepted the election results, the new leadership is already announcing plans for reconstruction."
 taiwan.13.a: "The green tide sweeps."

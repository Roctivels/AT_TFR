 #National Focuses
 CHI_island_in_one_fate: "Island In One Fate"
 CHI_island_in_one_fate_desc: "For the first time in eighty years, the people of the island face a military invasion that challenges our independence and sovereignty, threatening to fully subjugate us with no room for negotiation. Despite the partisanship that dominates our politics and polarizes our people, maintaining independence from Beijing is one of the few common grounds on which most of our people can agree. With all possibilities of preserving a precarious status quo now diminished, the appeasers have finally run out of excuses to make concessions, and we can begin to set politics aside under the banner of national defense."
 CHI_solidify_civil_defence: "Solidify Civil Defence"
 CHI_solidify_civil_defence_desc: "As a densely populated island, our people are constantly exposed to bombardments of all kinds. Our coordinators are overloaded with military defense, and our emergency services, being in complete disarray, do not have the capacity to reach every civilian in need. Fortunately, we can take advantage of our civil defense organizations, which have been developed over sixty years in case of an unlikely Chinese invasion. By combining them with our extensive array of air raid shelters, we can alleviate stress on our overstretched emergency service systems while keeping our civilians safe from the horrors of warfare."
 CHI_guerilla_strategy: "Guerilla Strategy"
 CHI_guerilla_strategy_desc: "We are in no position to fight the PLA head-on. We fall behind in fielded men and equipment, experience and readiness, as well as doctrine and tactics. Therefore, instead of confronting the PLA directly, the General Staff Headquarters has decided to take a different approach-guerrilla warfare. By taking advantage of our terrain, including dense urban areas, coastlines, mountains, and forests, we can preserve our fighting capability and avoid the total destruction of our armed forces on day one. The combination of asymmetrical warfare, unfavorable terrain, and a complicated environment will surely make the invaders pay for every inch they advance into our home."
 CHI_disrupt_transportation: "Disrupt Transportation"
 CHI_disrupt_transportation_desc: "The PLA has touched ground and is now utilizing our docks and harbors to receive equipment and supplies, which will then go to their forces on the frontline to replenish the losses. This is completely unacceptable. Fortunately, our engineers have managed to plant explosives in the harbors' major key structures and roads before retreating, and our missiles stand ready to deliver payloads to disable the ports, forcing the PLA to conduct weeks of repair if they with to put them back online. During this period, the PLA will be starved in their camps and lose their capability to commence offensives, and we will also have an opportunity to counterattack, potentially wiping out smaller units of theirs."
 CHI_hold_the_defence_line: "Hold The Line of Defense"
 CHI_hold_the_defence_line_desc: "As a fallout of the preemptive missile and naval bombardments, our defenses, organization and communication are all in complete disarray. To turn the odds in our favor, we must withstand the most furious, intense, and bloody offensives of the first few weeks. This delay will be a significant part of restoring our logistical capabilities and reviving our command structure from total chaos. In order to accomplish that, we will focus our resources on restoring communications and transportation connections, as well as having our armies focus completely on defense rather than looking for risky opportunities to damage the PLA forces."
 CHI_appeal_to_the_free_world: "Appeal To The Free World"
 CHI_appeal_to_the_free_world_desc: "With the United States having fallen into horrible infighting, the old international order crumbles before our very eyes. However, that is not to say the democratic forces around the world all fell with the late superpower, as many bastions and lighthouses around the globe still uphold the torches of democracy. Some of them are willing to support ideological allies to prevent their international stance from further deterioration. The late MNNAs, the remaining NATO, South Korea, and Canada, to name a few, are all willing to speak for us or even take action against the oppressive forces of the PRC on the international battleground."
 CHI_military_civilian_duty: "Military-Civilian Duty"
 CHI_military_civilian_duty_desc: "Our island is small and crowded. With little to no strategic depth, the home front is the frontline. The PRC has displayed their disregard for the safety of our civilians by conducting such a risky invasion, and with the civilian casualties already being reported, we can completely shatter the defeatists' rhetoric, which claims that the "reunification" will be swift and bloodless. With them out of the way, we can start working our way to promote military-civilian unity, letting our people aid us in the function of a wartime society."
 CHI_grant_emergency_powers: "Grant Emergency Powers"
 CHI_grant_emergency_powers_desc: "Wartime is no time for lengthy, bureaucratic processes that limit the executive branch's ability to react to emergencies swiftly. With the PLA at our doorstep, the president will declare a state of emergency, announce martial law, and grant the military more power to control the situation. The law enforcement will be temporarily integrated into the military's command structures to suppress collaborationist sabotages and protests, as well as enable them to distribute resources more fairly and effectively via the rule of arms."
 CHI_engineering_maintenance_brigade: "Engineering Maintenance Brigade"
 CHI_engineering_maintenance_brigade_desc: "As the bombers and artillery from the PLA pound our ground, our economic activities are either disrupted or completely halted. The most impacted sectors are construction and infrastructure. Fearing targeted strikes that can cause immense damage, construction firms and state-owned companies that provide necessary services have temporarily paused all building and maintenance work, leaving tens of thousands of workers and engineers unemployed, and thus unable to support their families. To use their expertise to our advantage, we can offer job opportunities that will be seen as lucrative even during peacetime, and establish the Engineering Maintenance Brigade. The unit will be able to support us in military engineering projects, allowing us to quickly establish multi-layered fortifications, as well as traverse harsh environments more quickly than that of the Communist forces."
 CHI_withdraw_foreign_exchange: "Withdraw From Foreign Exchange"
 CHI_withdraw_foreign_exchange_desc: "While our massive foreign-exchange reserves have kept our economy robust and our currency stable during peacetime, the deep stockpile of foreign currency can also be used to our advantage in national defense and economic stability. By withdrawing portions of our reserves, we can attempt to stabilize the ongoing financial panic, buying out sold-off assets and currencies to keep our economy somewhat functional even during a war. Furthermore, they can also be utilized to purchase critical equipment to replenish losses, keeping our forces capable of fighting back against the invaders."
 CHI_unite_the_island: "Unite The Island"
 CHI_unite_the_island_desc: "The Communist's brutal invasion has reached everyone who calls this island their home. From Taipei to Kaohsiung, from urban to rural, from concrete forests to calm farmlands, from deep green to deep blue provinces-nothing is spared from the burning flames of destruction, and no one can confidently call this conflict "none of their concerns" anymore. We must fight back against the aggressors. If they can put millions' lives and well-being at monumental risk, then can we really expect the so-called "reunification" to be a real benefit for us? The island must fight as one to have a chance of victory, and a defeat will guarantee the deprivation of our freedom, our democracy, and our connection to our democratic allies."
 CHI_wolf_pack_tactics: "Wolfpack Tactics"
 CHI_wolf_pack_tactics_desc: "As an island nation, our fishing industry is prosperous and large, employing tens of thousands of people and countless fishing boats. Though the conflict has disrupted their business and all of them are now docked indefinitely, the general staff has proposed a unique plan to attempt to break the blockade imposed by the PLAN. By mobilizing and commandeering small civilian vessels, we can send them to procure resources from our trade partners to alleviate our shortages. Thanks to their small size and relatively fast speed, not only are they difficult to spot, but they can also disengage quickly and avoid being sunk. While they won't be capable of importing enough to restart the economy, the much-needed resources can restore our most vital services, bolstering the morale of our people."
 CHI_phantom_legions: "Phantom Legions"
 CHI_phantom_legions_desc: "Our air force is severely outmatched against the PLA's large and advanced fleet of aircraft, which results in our troops and key buildings being constantly attacked by strike aircrafts and bombers day and night. Though we cannot destroy their capability to bomb, we may be able to direct their bombs somewhere else. Our commanders have come up with an interesting proposal: to employ decoy installations across the island, usually made from balloons, planks, or similar cheap materials, to confuse the PLAAF and cause them to waste ordnance on false targets. While it may seem unconventional, our engineers have reported that they can make it work - all they need is our approval to commence."
 CHI_taiwan_still_brave: "Taiwan, Everlasting"
 CHI_taiwan_still_brave_desc: "Having made it through the harshest and most dangerous weeks of the conflict, we have managed to shatter the PLA's original plan to quickly defeat and subjugate us. Not only have we shocked international observers who predicted our quick defeat, the people now wholeheartedly believe that victory is not out of reach, and our armed forces and civilians now stand together, ready to fight back against the aggressor that undermines our right to self-determination. With our torch of liberty still burning bright, every Taiwanese can now proudly say that Taiwan is still brave, and we will not give up."
 
 
 
 

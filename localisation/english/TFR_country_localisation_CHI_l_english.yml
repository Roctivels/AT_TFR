 CHI_test_of_will: "Test Of Will"
 CHI_test_of_will_desc: "\n\n\n\n\n£GFX_CHI_test_of_will_banner \n\n\n\n\n\n\nMore than 70 years ago, the bloody civil war in China has come to an end. Our people have enjoyed decades of peace and prosperity, but it couldn't last forever. The world is changing, radicalising, burning, and it seems that we shall be one of the first victims of these dire circumstances.\nThe old forgotten embers of the Civil War are flaring up with renewed vigor, and it won't be long before we have to stand up for our own lives.\n§3                                    Our sun should never fade.§!"

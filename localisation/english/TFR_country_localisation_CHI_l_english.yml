 CHI_tsmc_idea: "Taiwan Semiconductor Manufacturing Company"
 CHI_tsmc_idea_desc: "TSMC, or Taiwan Semiconductor Manufacturing Company, is the world's largest semiconductor fabrication company and provides semiconductors for fabless companies. As part of the national focus on transforming into a high-tech and service-based economy in the 1990s, TSMC was founded with the goal of specializing in the fabrication of semiconductors, prompting Western companies to outsource fabrication to maximize profits.\n\nNowadays, TSMC, along with other Taiwanese companies, accounts for about two-thirds of the world's semiconductor supply and dominates the high-end IC market. This heavy reliance on Taiwanese semiconductors has forced many developed countries to pressure China away from military action, fearing that it would wreak havoc on the supply chain and, therefore, their entire economy. This protection, provided by Taiwan’s monopoly over semiconductor manufacturing, is what many refer to as the "Silicon Shield.""

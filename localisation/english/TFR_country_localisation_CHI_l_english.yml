 taiwan.16.t: "Ko Wen-je Victorious in Taiwan Elections"
 taiwan.16.d: "After fending off troops from mainland in the recent war, Taiwan announced that it is now able to hold free elections according to the constitution again. As the recent war incited mass hatred against mainland China, the blue camp lost a significant portion of voters who blame the party of unable to secure peace or see them as posible mainland China's collaborators. Meanwhile, green camp politicians also struck a heavy blow, as they were being blamed for leading to the war and bloodshed that just struck Taiwan. Meanwhile, radical policies of the previous presidency pushed lots of neutral voters to TPP's side. As a result, a political blackhorse - Taiwan People's Party under Ko Wen-Je managed to successfully challenge Taiwan's traditional blue-green bipartisan system, winning a first-ever presidency.\n\nNew president Ko Wen-je thanked all his supporters for achieving such a political miracle, and at the same time announced his own plans for reconstruction."
 taiwan.16.a: "The wolf has a winning game when the shepherds quarrel."

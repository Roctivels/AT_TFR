 taiwan.4.t: "2020 Taiwanese Presidential Election"
 taiwan.4.d: "The most important event between Western New Year and Chinese New Year, the 2020 Taiwanese elections, will determine both the legislature and the presidency. The final phase of campaigning resumed after a week of pause due to the tragic Black Hawk helicopter crash on January 2nd, and candidates held their final and largest political rallies in several major cities.\n\nRepresenting the pro-Green camp is the incumbent President Tsai Ing-wen, the first female president of Taiwan and the first to be of indigenous descent. A law professor with a political career spanning back to 2000, her experience and professionalism are often cited by supporters as reasons she is the more qualified choice. Despite a turbulent first term, her approval ratings have been on the rise since July 2019, and many observers are predicting a Green victory.\n\nOn the pro-Blue side is Han Kuo-yu, the current mayor of Kaohsiung, who has faced backlash from city residents for allegedly \"abandoning\" them. Holding a master's degree in law, Han only returned to politics in 2017, making his experience pale in comparison to that of the DPP's candidate. Nonetheless, his supporters argue that the DPP's underperformance has left voters eager for change, with many believing that his unorthodox political style could usher in a new golden era for Taiwan.\n\nJames Soong is also in the race, although most of the public attention he receives comes in the form of jokes rather than serious political engagement.\n\nThe day after an exhausting night of final rallies, citizens across the country head to the nearest polling stations to decide the future of their nation. As night falls and votes are counted, the final result is declared:"
 taiwan.4.a: "Tsai Ing-wen and the Pan-Green take it all!"
 taiwan.4.b: "Han Kuo-yu and the Pan-Blue ascend to power!"
 taiwan.5.t: "Tsai Ing-wen Secures Second Term"
 taiwan.5.d: "After a long night of vote counting, and with millions staying glued to their televisions to watch the results unfold, the news channels, along with official sources, have finally declared the winner-that President Tsai Ing-wen secures a second term!\n\nThis was expected by many internal and external observers, as not only does Tsai Ing-wen have more experience and benefit from the preference for re-electing an incumbent president, but her opponent's scandals and multiple public relations disasters also persuaded centrist voters and even Pan-Blue supporters to back Tsai instead.\n\nAdditionally, the DPP also won a majority in the Legislative Yuan, securing around 45% of the votes and 60 seats-enough for control of the legislature. This ensures a smooth term for Tsai Ing-wen and, by extension, the entire DPP.\n\nThis provoked an outcry among a portion of Pan-Blue supporters, who demanded a recount along with a handful of Kuomintang party leaders. However, with Han Kuo-yu openly declaring his acceptance of defeat, these movements quickly died down, and the Republic completed yet another peaceful election."
 taiwan.5.a: "The Green Flag rises into the Sky!"
 taiwan.6.t: "Han Kuo-yu Secure the Presidency in an Upset"
 taiwan.6.d: "After a long night of vote counting, and with millions staying glued to their televisions to watch the results unfold, the news channels, along with official sources, have finally declared the winner-that Mayor Han Kuo-yu secures the victory!\n\nMany international and domestic observers were taken by surprise by this outcome, as Tsai Ing-wen had more experience and benefited from the preference for re-electing an incumbent president. However, it seems that Han Kuo-yu's politics have successfully won people's hearts over. Additionally, many centrist voters, disappointed with the DPP, have chosen to back the Pan-Blue in this election to express their dissatisfaction.\n\nOn the other hand, the Kuomintang also took back the legislative branch. With 44% of the popular vote and 62 seats, the KMT was able to re-establish themselves as the majority, reducing the DPP to a minority opposition, ensuring a smooth term for Han Kuo-yu.\n\nA portion of the Pan-Green faction disapproved of the result, claiming that the election was manipulated, and demanded a recount along with a handful of DPP party leaders. However, as Tsai Ing-wen and her team openly sent out a message to the public to accept defeat and congratulate the new president, the protests quickly died down, and the Republic completed yet another peaceful election.\n\nFor Han Kuo-yu personally, since it is forbidden to serve as both mayor and president simultaneously, he is forced to resign as the mayor of Kaohsiung. A by-election will be held within three months to decide the next local government, and the movements that advocated for Han Kuo-yu's recall have subsequently dissolved."
 taiwan.6.a: "The White Sun shines upon the Republic!"

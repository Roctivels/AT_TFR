 taiwan.1.t: "The Defiant Island"
 taiwan.1.d: "The skylines of the cities are illuminated brighter than usual by dazzling fireworks. Performers drive concerts to their climaxes, further hyping the crowds. People gathered around the tallest buildings watch in awe as the Moon itself seems overpowered by the rockets' flames, while those in the comfort of their own shelters rejoice as the countdown finally reaches zero-marking the end of the decade.\n\nThe year is 2020. Our leading position in semiconductor manufacturing remains unchallenged. The stock market soars higher than ever, with the TAIEX maintaining over 10,000 points for nearly the entire year. Despite the turbulence caused by the China–U.S. trade war, our robust economy has shown remarkable resilience, with the economic growth rate holding steady at around 3% throughout 2019.\n\nThe new year also signals the conclusion of the presidential election campaigns. President Tsai Ing-wen is seeking a second term, while the main opposition leader, the controversial Han Kuo-yu, continues to gain popularity. James Soong will make his fifth bid for the presidency, though he has also announced that this may be his final attempt.\n\nDiplomatically, our nation continues to lose formal allies due to factors such as Mainland China's expanding global influence, including its Belt and Road Initiative. At the same time, our strategy has shifted toward fostering warm, albeit unofficial, relationships with major powers. The riots in Hong Kong further alienate the pro-unification camp within our borders, and many cite them as evidence of the inevitable failure of the \"One Country, Two Systems\" framework.\n\nAll in all, the brave people of the Taiwan archipelago - including Kinmen and Matsu - are prepared to weather the coming storm and carry forward into the next decade. Although the Ministry of Health and Welfare has reported a new suspected case of atypical pneumonia from Mainland China, surely, that won't be much of an issue."
 taiwan.1.a: "May the journey ahead be smooth for you, Taiwan."

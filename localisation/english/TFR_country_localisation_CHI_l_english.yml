 taiwan.32.t: "In the end... We stand!"
 taiwan.32.d: "After weeks of heated combat, the People's Liberation Army was brought to a full stop facing the PDTO's fierce resistance and has failed in its objective to overrun our armed forces and our government. For the past few days, intelligence reports have indicated the PLA abandoning gained ground, though this information is withheld in case of a PLA surprise counterattack. However, with Japanese and Australian sources confirming that the Communist Forces are retreating across all fronts-including Kinmen-the presidential office has, at last, announced the victory of democratic forces at dawn.\n\nThe Air Force and Navy have followed suit, ceasing all military operations following the withdrawal of the ground invasion forces, leaving the skies and the seas open once again. Our devastated docks and airports are now receiving humanitarian aid from around the world, with the majority coming from our PDTO allies.\n\nThis is far from over, however. Our cities lie in ruins, our factories have been destroyed, our railways and highways are crippled, and our crown jewel-the semiconductor industry-has been completely wiped out. Not only that, PDTO intelligence suggests that the Communists' major defeat would almost certainly trigger political turmoil, potentially inviting an even more aggressive leadership that could threaten our democracy and freedom in the years ahead. For now, a monumental task of reconstruction lies before us."
 taiwan.32.a: "And Our People Are Walking The Road Of Life"
 taiwan.33.t: "Second Wave of Missile Strikes!" 
 taiwan.33.d: "The war of life and death has returned to the Republic once more.\n\nOnly a few days after the beginning of the Fourth Strait Crisis, missiles from the Mainland have, for the first time, struck our key infrastructure and cities. While the Ministry of National Defense scrambles to mobilize reserve personnel and prepare for defense, a second wave of missile strikes has descended upon us-this time devastating our administrative and communication capabilities.\n\nYet, the few surviving radar stations have picked up something far more terrifying: countless amphibious assault ships and their escorts are now rapidly approaching our shorelines, signaling an imminent invasion. This can mean only one thing: the Fourth Strait Crisis is over, the Taiwan War has begun.\n\nDespite the absence of the United States, we are not alone. Intervention forces from the PDTO are now assisting in our defense across all sectors, standing shoulder to shoulder with us on the landing grounds to repel any troops that dare challenge our territorial integrity.\n\nWe must now fight and remain defiant against the Red Giant. Should we fail, the burning torch of Chinese democracy will be forever extinguished."
 taiwan.33.a: "Stand up and fight!"
 taiwan.34.t: "Letter from the Ministry of National Defense"
 taiwan.34.d: "Receiver: Presidential Office\nPriority: Top Priority\nSubject: Current Status of Our National Defense\n\nOur main objective to prevent the People's Liberation Army from advancing into Taiwan has failed. The PLA has exploited vulnerabilities in our defenses, and now controls several major cities and ports, severely crippling our war effort. With this goal unmet, we can no longer confine the conflict to shorelines, and are now forced to engage within urban and mountainous terrain.\n\nThe PLA has reached our second line of defense surrounding the remaining cities and mountain ranges, which can be used to our advantage in defense due to the complexity of urban and mountainous environments. Our Army has already established defensive positions around PRC-controlled cities, and is better positioned to halt further PLA advances.\n\nThe PDTO has also taken heavy casualties during this conflict. This led to an unexpected psychological impact on both our civilians and armed forces. Acknowledging that the PDTO is truly our brothers-in-arms, we have received an influx of civilian volunteers supporting our defense preparation and logistics. This has bolstered our morale and defense capabilities, and the commanders report that our ground forces' willingness and readiness are higher than ever."
 taiwan.34.a: "We will surely win..."
 taiwan.35.t: "Aftershock"
 taiwan.35.d: "6:27 AM. "[Air Defense Alert] Incoming enemy aircraft. Seek immediate shelter." In the fourth week since school was abruptly suspended, Kai Chih-li wakes to another shrill air raid warning, paired with thick clouds in a sky about to rain bombs. Three F-16s roar into the sky to intercept, nearly drowning out the police yelling, "Do not take the elevator, take the stairs!"\n\n6:50 AM. "[Air Defense Alert] Air defense alert lifted. Report unknown objects to police or firefighters." The pounding stops, and shelter-seekers orderly exit to begin their wartime routines. Kai rushes to the FamilyMart where he works to prepare for his 8 AM shift. A dozen customers already wait outside, holding a mix of bills, coins, and government-issued food stamps. Nothing unusual today-except that he's been told to train the intern on organizing used stamps for collection.\n\n2:00 PM. "CWA Sun Time Notification - Sufficient sunlight today until 6:35 PM." "Manager Chen - Print 100 copies of these and hand them out. Government requested. PA20018583.pdf." Two hours ago, he still held on to a sliver of hope when sunlight broke through, but the CWA update confirmed it-no short shift today. Disappointed, he asks the intern to print the flyers while he returns to the cashier after a short break.\n\n6:50 PM. Civilian internet traffic is restricted by ISPs to conserve bandwidth and electricity. Streetlights flicker on briefly to prevent accidents, though cars are rare now due to fuel rationing. Walking home, Kai spots a booth with a green camo tablecloth-like those at school festivals. Curious, he approaches. The booth manager waves him over. "We're organizing civil defense groups," he says. "Join our training programs on identifying UXOs and treating injuries to support our firefighters and paramedics."\n\n6:52 PM. Kai picks up a brochure and reads. Government-sponsored, voluntary, no weapons involved, not a militia or a cannon fodder unit. The FAQ answers most of his questions. After a pause, he breathes in.\n\n6:57 PM."
 taiwan.35.a: "When should I start?"
 taiwan_detente.0.t: "Kuomintang Secures Taiwanese Elections"
 taiwan_detente.0.d: "A topic that has been spreading like wildfire across our social media platforms recently is the conclusion of the Taiwanese local elections, in which the people elected Han Kuo-yu as the administrative leader of the separatist region. Some celebrate the rejection of radical Taiwanese independence supporters, while parts of the netizen population question the legitimacy of these local elections.\n\nThe Taiwan Affairs Office has offered little comment on the matter, aside from reiterating that the "presidential" election is merely a local election, and that foreign powers should not interfere in our internal affairs. However, some parts of the government are reportedly relieved to see the Kuomintang's victory, as the party is more inclined to cooperate with us and maintain a warm relationship. A significant portion still doubts Han Kuo-yu's dedication to restoring contact, but with the DPP ousted, the process will at least be smoother."
 taiwan_detente.0.a: "We hope they will come to see reason."
 taiwan_detente.1.t: "An Olive Branch to the Mainland"
 taiwan_detente.1.d: "With the conclusion of our elections and the appointment of ministers, we can finally begin getting down to business. One of the most important items on our agenda is to abandon the Tsai Ing-wen administration's policy of keeping distance from the Mainland. This Mainland policy has severely damaged our tourism and agriculture industries, as the Mainland has not only imposed multiple bans on various goods, but also tightened tourism controls, reducing the number of Mainland tourists visiting our islands. Even worse, the CPC has repeatedly threatened the DPP government, bringing instability and panic to our people.\n\nTo undo the damage, the Mainland Affairs Council's first order of business will be to reverse the cold relationship between us and the Mainland. Restarting conversations and holding summits, we will try everything to extend an olive branch to the Mainland, hoping they will be willing to pursue peace and cooperate with us again."
 taiwan_detente.1.a: "A new era of cross-strait interactions."
 taiwan_detente.2.t: "Kuomintang Administration Seeks Reconciliation"
 taiwan_detente.2.d: "It has recently come to our attention that the Mainland Affairs Council, which has been in a de facto abolished state since the radical separatist parties took control, has reached out to us via the Straits Exchange Foundation to seek the rebuilding of diplomatic relations between our sides. Several representatives from their side have begun contacting their counterparts on our side to negotiate possible preliminary meetings, primarily aimed at discussing more formal and comprehensive conferences in the future.\n\nOur government has responded positively. The Taiwan Affairs Office has privately approved diplomatic entry permits for several Taiwanese representatives but has withheld further public comment until more common ground is found between us and Taiwan, according to reports. While we do not hold high hopes for Taiwan's peaceful reintegration, we wish for these summits to serve as a starting point for the Taiwanese people to once again recognize our shared brotherhood."
 taiwan_detente.2.a: "Understood."
 taiwan_detente.3.t: "Cornerstone to Concord"
 taiwan_detente.3.d: "Great news from our peace-seekers at the Mainland Affairs Council! It seems that the Straits Exchange Foundation has successfully contacted ARATS in the Mainland-presumably under the acquiescence of the Taiwan Affairs Office-and has established basic understandings for further conferences. One of these includes informing the other side that the incumbent government is open to recognizing the 1992 Consensus, which has been the foundation of all our peaceful exchanges since the era of former President Lee Teng-hui, including the Ma-Xi meeting-the most significant one since the Chongqing Negotiations of 1945.\n\nWith this goodwill from our brothers across the strait, we can begin preparing for more open, low-level events to reduce public hostility toward the Mainland, before holding major summits to discuss broader political and economic issues. We will learn from the failure of the CSSTA and avoid provoking anti-Mainland sentiments, which gave the opposition grounds for the Sunflower Movement in 2014."
 taiwan_detente.3.a: "Excellent!"
 taiwan_detente.4.t: "Xiamen Conference"
 taiwan_detente.4.d: "Following positive responses from our colleagues across the strait, the Ministry of the Interior and the Mainland Affairs Council have mobilized to break the ice between us and the Mainland. A recent poll showed that two-thirds of respondents support or do not oppose re-engaging in talks. With presidential approval, MAC representatives set sail for Xiamen, where they were warmly received by Mainland officials.\n\nThe conference dominated headlines, with three key events standing out: the grand opening, the lifting of import bans on several agricultural products previously imposed in retaliation against Tsai Ing-wen's hostile policies, and discussions on the new COVID-19 virus. The Mainland also agreed to act as an intermediary-sharing WHO information with us and relaying our updates in return.\n\nThe event is seen as a major success for President Ma's administration, with more meetings already in the MAC's pipeline. Mainland representatives are also expected to visit Kinmen soon to promote tourism-further cementing the region as a stronghold of Kuomintang support."
 taiwan_detente.4.a: "Bright future ahead."
 taiwan_detente.5.t: "To Formosa Alone"
 taiwan_detente.5.d: ""This is the final boarding call for Flight BR721 to Taipei. All remaining passengers, please proceed to Gate 3 immediately."\n\nThe announcement echoes through the terminal as Huang Fu-ji rushes to Gate 3, holding his passport and flight ticket, still catching his breath from the sprint. After a brief check, he boards the plane.\n\nAs the engines roar and the ground falls away, he opens his phone and reads a screenshot from the Taiwan Affairs Office website, reviewing notices on what to do and what to avoid while visiting Taiwan individually. A careful planner, he's prepared a detailed itinerary-down to the minute-yet still left buffer time between stops based on past experience.\n\nIn the airport, televisions broadcast news of the successful Shanghai Conference, which led to the Mainland resuming the individual visit scheme. But Huang's not interested in this-his eyes are fixed on the baggage claim screen, eager to begin his long-awaited tour.\n\nAs night falls, he returns to the same hotel he stayed in seven years ago-only this time, there are no guides, no loud tour group companions, and no one rushing the schedule. At sunrise, he plans to visit traditional wet markets and Muzha Zoo, hoping to see pandas and other exotic animals."
 taiwan_detente.5.a: "Bon Voyage."
 taiwan_detente.6.t: "Singapore Talks Start"
 taiwan_detente.6.d: "With the promotion of the Singapore government, representatives from the mainland and Taiwan recently commenced formal meeting in Singapore to negotiate cross-strait relations. With, representatives from the Kuomintang attended the meeting, while the mainland representatives was composed of officials from the Taiwan Affairs Office of the State Council.\n\nBased over the principles of equality, respect, shelving differences, disputes, and seeking common ground while reserving differences, the both sides conducted in-depth communication on issues such as cross-strait economic cooperation, facilitating personnel exchanges, and maintaining regional peace and stability. The dialogue proceeded in a positive atmosphere, reflecting a shared willingness to resume dialogue and improve relations.\n\nSingapore's Ministry of Foreign Affairs welcomed both sides choosing Singapore as a neutral place for dialogue and exchanges, hoping this meeting will help to ease tensions and promote regional peace and stability."
 taiwan_detente.6.a: "Let's see how this ends."
 taiwan_detente.7.t: "Cross-Strait Unification Discussions Intensify"
 taiwan_detente.7.d: "Prior of the civil war in the United States deteriorated, the international diplomacy has shown obvious signs of changes. As the domestic social divisions in the United States intensified and the operation of the government was frequently obstructed, the influence of the United States in international affairs continued to decline.\n\nAgainst this background, mainland China has increased its control over the surrounding situation. Meanwhile, different voices have emerged within Taiwan, and some mainstream political parties have called for a re-examination of the direction of cross-strait relations to avoid being marginalized in the reorganization of international forces.\n\nSoon after, as the civil war officially broke out in the United States, the US government's ability to intervene abroad suddenly declined, and a major gap appeared in the security situation in the Asia-Pacific region. The Chinese mainland has made it clear that it will firmly promote the process of national reunification, resolutely oppose any form of separatist behavior, and emphasize that its determination to safeguard national sovereignty and territorial integrity will not waver.\n\nIn Taiwan, during times of political turmoil, major forces such as the Kuomintang called for a more pragmatic attitude to face the reality of the two sides of the strait and advocated seeking new arrangements through peaceful negotiations."
 taiwan_detente.7.a: "It's coming to an end?"
 taiwan_detente.8.t: "Unification Agenda Raised in Singapore Cross-Strait Talks"
 taiwan_detente.8.d: "Delegations from the mainland and Taiwan convened this week for a new round of negotiations, coordinated by the Singaporean government. The meeting occurred during the U.S. civil conflict, shifting dynamics in the Asia-Pacific region, drawing widespread international attention.\n\nDuring the discussions, the mainland delegation formally proposed accelerating the cross-strait unification process, calling for a regular communication mechanism and substantive dialogue on a potential unification framework. Representatives stated that ''achieving complete national reunification is the shared aspiration of 1.4 billion people and a crucial step in the great rejuvenation of the Chinese nation,'' stressing the need to seize the current historical opportunity.\n\nThe Taiwanese delegation, led by the Kuomintang (KMT), maintains a cautious stance. While reaffirming its commitment to managing cross-strait relations peacefully, it maintained a position of being ''open but reserved'' regarding unification, underscoring the importance of safeguarding the lifestyle, social system, and core interests of the people of Taiwan.\n\nThe first time in years that the unification question has returned to the negotiation table as an official agenda item. While the path ahead remains uncertain, the act of dialogue itself carries strategic weight."
 taiwan_detente.8.a: "Cross-strait unification is an inevitable trend."
 taiwan_detente.9.t: "Singapore Talks Collapse as Both Sides Walk Away Divided"
 taiwan_detente.9.d: "The cross-strait between mainland and Taiwan held in Singapore have formally been broken today. Both sides failed to narrow critical differences regarding to unification along with it's political arrangements.\n\nThe mainland delegation emphasized the urgency of seizing the current geopolitical window to advance national unification. Proposals included the creation of a formal liaison mechanism and the discussion of a phased road map. Mainland representatives reiterated that ''peaceful reunification remains the greatest sincerity, but no options are excluded.''\n\nThe Taiwanese delegation, led by the Kuomintang (KMT), firmly refused to enter any stage of structured unification talks. Citing a lack of consensus within Taiwan, delegates expressed strong concern over the mainland's insistence on a ''one-country framework,'' and instead called for ''pragmatic engagement and confidence-building before any political discussion.''\n\nThe was meeting ended after less than two hours, with no press briefing and both delegations departing early without formal remarks.\n\nSingapore Ministry of Foreign Affairs expressed regret over the outcome of the meeting and urges both sides to keep communication channels open, while avoiding escalator rhetoric or misjudgment."
 taiwan_detente.9.a: "We have at least try to this path."
 taiwan_detente.10.t: "Final Decision"
 taiwan_detente.10.d: "Late at night in Zhongnanhai, Xi Jinping sat alone in the office at Qinzheng Hall. Before him lays a faded map of the Taiwan Strait. In the harsh light, the sea lines traced the fractures of history.\n\nThe Joint Staff Department and Central Military Commission's reports had repeatedly confirmed: the key time for peaceful reunification has faded. Public opinion on the island was deeply divided, and foreign interference continued to intensify. Waiting any longer would mean losing strategic initiative entirely.\n\nFor ten years, he had avoided confrontation, sought a stable international order, and mitigated risks. But time had now turned into his most formidable foe. Reunification was no longer a political choice; it was a life and death decision for the nation's integrity and future. He understood the costs and it's consequences of battlefield sacrifices, economic upheaval, mounting international pressure, and even grave political risks. Yet history would not wait.\n\n"Risk?" He looked into the night. "In the revolutionary years, when did our comrades ever advance without risk?". The air in Zhongnanhai felt frozen. Across the country, all eyes seemed to focus on him.\n\n"Destiny has left us the only path."\n\n"Prepare for Next Stage.""
 taiwan_detente.10.a: "The gates of history have opened."
 taiwan_detente.11.t: ""
 taiwan_detente.11.d: ""
 taiwan_detente.11.a: ""
 taiwan.500.t: "Our Final War"
 taiwan.500.d: "Following weeks of suspicious EADI movements and the ever-increasing tension in the Sino-Japanese Cold War reaching a new climax, many international observers have anticipated a hot war coming in the near future. Though the PDTO has intensified its diplomatic missions to attempt to de-escalate the situation, Tokyo and Beijing have both announced that a state of war now exists between the two coalitions, and we're forced to fight for our continued existence once more.\n\nWith all diplomatic efforts ending in vain, the fiercest regional conflict of the Asia-Pacific has unfolded before us. With more than 3 billion people involved in the largest war humanity has witnessed thus far, we cannot realistically expect that the Chinese will simply back down this time. Either the PDTO completely dismantles the Chinese war machine and their capacity to reignite any conflict, or EADI will advance to subjugate the rest of Asia.\n\nFor us, this is the second time we face an existential threat in this century. Beaten yet unconquered, the new Chinese government, driven by their revanchist sentiment and newly found allies across Asia, will undoubtedly attempt to demolish our government and destroy our democratic system, as they attempted in 2021. To secure a future of our own, we have decided to involve ourselves in the Great Asian War, fighting side by side with our democratic allies to defeat the Beijing-led alliance, once and for all."
 taiwan.500.a: "To arms!"

 #sub-sub ideologies
 loc_taiwanese_progressivism: "Taiwanese Progressivism"
 CHI_neoliberalism_desc: "\n\n\n\n£GFX_CHI_ideology_neoliberalism\n\n\n\n\n\n§YTaiwanese Progressivism§! is an ideology upheld by the Democratic Progressive Party (DPP), other Pan-Green parties, and some independent figures. The Democratic Progressive Party, the leader of the Pan-Green Coalition, originated from the Tangwai movements that began in the mid-1970s. Due to its history of resisting the Kuomintang's tutelage and White Terror, the DPP considers liberal democracy, political justice, and egalitarianism its core ideologies. These values were later inherited by the broader Taiwanese progressive movement. Over the years, it has also absorbed anti-communist ideas due to the Chinese Communist Party's growing hostility and also advocates to disconnect Taiwan from Mainland China.\n\nToday, Taiwanese progressivism advocates for multiple causes, including social liberty and equality, environmental sustainability, LGBTQ+ rights, and Taiwanese independence, and remains a significant movement in Taiwanese politics."
 loc_taiwanese_conservatism: "Taiwanese Constitutionalism"
 CHI_constitutionalist_desc: "\n\n\n\n£GFX_CHI_ideology_constitutionalism\n\n\n\n\n\n§YTaiwanese Constitutionalism§!, upheld by the Kuomintang (KMT), People First Party (PFP), and several independent figures, is a localized form of constitutionalism that supports the continuation of the Republic of China, liberal-conservative social policies, and a moderate relationship with Mainland China. Initially grounded in the Three Principles of the People and social conservatism, Taiwanese constitutionalism has adopted a more liberal approach over the years to remain competitive in post-martial law Taiwan.\n\nToday, Taiwanese constitutionalism is primarily characterized by its protectionist economic policy, Chinese nationalism, centrist social policies, and the gradually diminishing anti-communism inherited from Chiangism, and remains one of the largest factions in Taiwanese politics."
 loc_taiwanese_liberal_populism: "Liberal Populism"
 taiwanese_liberal_populism: "Liberal Populism"
 taiwanese_liberal_populism_desc: "Taiwanese Liberal Populism is a variant of liberal conservatism, emphasizing winning ballots by realizing the needs of the people, actively providing services, and improving the livelihood of the less fortunate bracket of society.\n\nDue to its emphasis on securing elections, the ideology is often described as "lacking principle" and unable to define its boundaries clearly. Instead of calling it an "ideology," many prefer to call it an election strategy to better represent its true nature."
 loc_taiwanese_reformed_tridemism: "Reformed Tridemism"
 reformed_tridemism: "Reformed Tridemism"
 reformed_tridemism_desc: "Tridemism, or the Principles of the People, consists of three equally important components: Nationalism, Democracy, and Welfarism.\n\nBy the dawn of the 21st century, the original form of Tridemism had begun to show its incapability of governing a modern society. This prompted many to pursue a reformed version of the ideology.\n\nCompared to its predecessor, Reformed Tridemism reduces the importance of nationalism while emphasizing expanding welfarism, considering it the most important component of the modernized ideology. On the other hand, democracy, now considered a basic need of the people, is incorporated into the broader concept of welfarism, leaving welfarism as the sole emphasis of Reformed Tridemism."



 loc_taiwanese_OCTS_democracy: ""One Country, Two Systems" Democracy"
 CHI_market_socialism_desc: "\n\n\n\n£GFX_CHI_ideology_market_socialism\n\n\n\n\n\nAt first glance, the idea of §Y"One Country, Two Systems"§! might seem like a fanciful political experiment or an unusual plan to undermine national sovereignty. However, in the coastal cities in East Asia, this unique political system has been in place for almost forty years. It was conceived at a time when China's economic strength and political influence were still relatively weak. It was a pragmatic response to balance the intense conflicts between socialism and capitalism. Under this system, the Special Administrative Region retains the same sovereignty as the central government but enjoys significant autonomy, with the freedom to establish its own government bodies and legislative institutions. This allows nearly unrestricted policy-making and implementation. Unlike traditional confederations, where member states often wield significant autonomy, the Special Administrative Region is typically confined to a single city, minimizing the risk of separatist sentiments destabilizing the union.\n\nToday, as the balance of power and the political climate have shifted, the logic behind "One Country, Two Systems" has evolved. Originally designed to protect and separate, it has now become a platform for fostering deeper multilateral exchanges. "One Country, Two Systems" is an essential framework for facilitating the peaceful coexistence of people with different ideologies, promoting interaction and integration between diverse political and economic systems, and ultimately fostering harmony in values."


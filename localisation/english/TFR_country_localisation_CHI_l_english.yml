 CHI_destroyed_country: "Destroyed Nation"
 CHI_destroyed_country_desc: "Even though the war has ended, our country will never be the same. The sounds of sirens still ring in the ears of the people, as missile strikes, air raids, and artillery fire have devastated not only our highway network but also our railway system and metro services. The average commute time has tripled since the war, and as if that wasn't bad enough, our manufacturing industry was also wholly shattered. Our research parks across the island were terrorized by targeted strikes, and foreign investors withdrew from our investment pools. It will take joint efforts from both our government and our allies to restore our status as the world's technology hub."

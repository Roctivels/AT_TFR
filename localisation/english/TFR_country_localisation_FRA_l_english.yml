 FRA_France_on_the_World_Stage: "France On The World Stage"
 FRA_France_on_the_World_Stage_desc: "\n\n\n\n\n£GFX_FRA_France_World_Stage_category\n\n\n\n\n\n\n\nThroughout history, France has played a significant role on the global stage, establishing itself as a major power and influencing various spheres of human endeavor. From the Middle Ages to the Renaissance, France emerged as a cultural and intellectual center, fostering the development of art, literature, and philosophy. During the Age of Exploration, French explorers and traders ventured across the globe, establishing colonies and trade networks. In the 18th century, France underwent a revolution that had a profound impact on the political and social landscape of Europe, promoting ideals of liberty, equality, and fraternity. France's military prowess was demonstrated through Napoleon Bonaparte, whose conquests reshaped European borders. In the 19th and 20th centuries, France remained a significant player in global politics, involved in colonialism, two world wars, and the formation of the European Union."
 FRA_Recognize_Constitutionalists_decision: "[USC.GetFlag]§CACG§!: Recognize §CAmerican Constitutional Government§!"
 FRA_Recognize_Constitutionalists_decision_desc: "As the civil war continues to rage on in the United States, we've so far kept a policy of general neutrality as we've faced more pressing matters here in Europe. Now that we can once again focus our efforts abroad, it would be in our best interests to recognize Trump's Constitutionalists as the rightful American government to once again secure our long-standing alliance. "
 FRA_Recognize_Biden_decision: "[USB.GetFlag]§CUOA§!: Recognize §CUnion of America§!"
 FRA_Recognize_Biden_decision_desc: "With the Civil War in the United States still raging, we face the issue of finding which faction to recognize as the rightful government of their war-torn territories. Seeing as we seek a return to the security granted by the Americans' membership in NATO, it is in our best interests to recognize the Unionist government and support their efforts to restore normalcy within their country."
 FRA_Recognize_Patriot_Front_decision: "[PTF.GetFlag]§2Patriot Front§!: Recognize §2Patriot Front§!"
 FRA_Recognize_Patriot_Front_decision_desc: "The Civil War in the United States has brought sweeping change to its political landscape, particularly with the rise of the far-right Patriot Front. While we disagree with many of their policies in principle, we need to recognize and support their government to try and salvage our former alliance before it's too late."
 FRA_Recognize_Association_of_the_Freed_decision: "[GMA.GetFlag]§GAOF§!: Recognize §GAssociation of the Freed§!"
 FRA_Recognize_Association_of_the_Freed_decision_desc: "While a disruption of the old American order was inevitable with the Second Civil War, there has been a clear shift towards some of the more niche factions within the conflict. In particular, a group known as the ''Association of the Freed'' has surpassed foreign expectations and seeks more international support. Thus, it is in our best interests to recognize the AOF as the rightful American government and assist them in their Second American Revolution!"
 FRA_Recognize_SoL_decision: "[FAA.GetFlag]§GCoFAR§!: Recognize §YConfederation of Free American Republics§!"
 FRA_Recognize_SoL_decision_desc: "While our domestic situation has prevented us from intervening in the Second American Civil War, we now have the capability to extend our influence and should recognize a faction as the legitimate American government. In particular, the Confederation of Free American Republics and their sudden rise out of New England has made them a clear candidate for us to support. As we did in 1776, we should declare our support for the COFAR and their Second American Revolution!"
 FRA_Recognize_GMAC_decision: "[GMA.GetFlag]§GGMAC§!: Recognize §GGreen Mountain Anarchist Collective§!"
 FRA_Recognize_GMAC_decision_desc: "As the situation in America continues to evolve as the Second Civil War ravages the country, we still haven't found a faction to recognize and support. While it may be quite unorthodox, the ''government'' of the Green Mountain Anarchist Collective has shown its willingness to bring about a better America, even under the statelessness of anarchism. If we back them in their efforts to reunify the United States, we may have a unique ally in the coming geopolitical storm."
 FRA_Recognize_APLA_decision: "[APA.GetFlag]§RAPLA§!: Recognize §RAmerican People's Liberation Army§!"
 FRA_Recognize_APLA_decision_desc: ""
 FRA_Align_Madagascar_decision: "[MAD.GetFlag] Align Madagascar"
 FRA_Align_Madagascar_decision_desc: "Ever since their efforts for independence succeeded in 1960, we have struggled to exert our influence in the Indian Ocean due to Madagascar. Since the concept of re-colonization is obviously off the table, we can instead look to expanding our soft power in the country and trying to correct our colonial mistakes to once again align the island to our interests. In doing so, we can once again ensure that our naval capabilities are that of a truly great power again."
 FRA_French_Arms_in_Indian_Hands_decision: "[RAJ.GetFlag] Give Arms to India"
 FRA_French_Arms_in_Indian_Hands_decision_desc: "With the rising aggression of the Islamic Republic of Pakistan and the People's Republic of China, it becomes evident that we must ensure the Republic of India gets the help it will need while we can afford to at the time given."

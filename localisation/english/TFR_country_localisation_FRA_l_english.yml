 #Melenchon
 FPR_France_shall_never_bow: "France Shall Never Bow"
 FPR_France_shall_never_bow_desc: "Whether facing external invaders or internal threats, the strength of France has never faltered. She stands as a fortress of freedom and a beacon of resistance. Whether the enemy approaches from the East or internal divisions threaten the land, the sons and daughters of France will never yield. Today, under the leadership of Jean-Luc Mélenchon and the New Popular Front, a great mission is underway to revive the spirit of France. From the banks of the Seine to the hills of Provence, the power of the people rises like a fierce flame, determined to make the reactionaries and capitalists tremble. Revolutionaries never surrender; their spirits are forged in eternal glory!"
 FPR_Continuation_of_the_Republic: "Continuation of the Republic"
 FPR_Continuation_of_the_Republic_desc: "The French Republic is no mere shell; it is a sacred fortress, forged by the blood of martyrs, an immortal monument born from the storm of the Great Revolution, and an eternal symbol tempered in the fires of the Paris Commune. It embodies the noble ideals of liberty, equality, and fraternity, and stands as the living testament to the unbreakable will of the French people. Now, as civil war rages and foreign wolves lurk, we will not allow this sacred heritage to crumble beneath the tyrant's iron boot or fall prey to the schemes of traitors. The New Popular Front will rise to the great struggle to defend the Republic, never retreating, no matter how fierce the storm."
 FPR_Parliamentarian_Socialism: "Parliamentarian Socialism"
 FPR_Parliamentarian_Socialism_desc: "'Revolution is not a dinner party... It is a violent action by which one class overthrows another.' However, many revolutions have gone astray by focusing too much on struggle, leaving only bloodshed and chaos with no lasting legacy for the cause of people's liberation. A true socialist government must be shaped by the will of the people. From the dome of the National Congress to the podiums of local councils, we will plant the seeds of socialism and reap equality through consensus. The voices of workers and peasants will rise to the heavens, their demands forged into unbreakable laws. We will make the reactionaries falter in their discourse and the bourgeoisie tremble before the people's judgment."
 FPR_The_Modern_Girondists: "The Modern Girondists"
 FPR_The_Modern_Girondists_desc: "During the French Revolution, the Girondists were the voice of moderate change. Followers of Brissot and companions of Madame Roland, they refused to let the ideals of the revolution be consumed by the torrent of violence. In the shadow of the Jacobin blade and the guillotine, they raised the banner of reason and compromise, seeking to dispel the bloody fog with the light of enlightenment. Though the storm of history has passed, the trumpet of revolution sounds once again on modern French soil. As the inheritors of the Girondists, we will use the power of reason to guide the nation out of the abyss of violence and toward a future built on liberty, justice, and order."
 FPR_Smiling_Socialism: "Socialism with a Smile"
 FPR_Smiling_Socialism_desc: "Socialism is not a cold iron curtain or a terrifying shackle. These are distortions of 'socialism' by totalitarian regimes that emerged from the ruins of Eastern feudal empires. In contrast, socialism is the warm breeze of spring, the light of hope at dawn. We will cast aside the shadows of violence and illuminate the path of revolution with the brilliance of humanity. Our socialism replaces angry roars with smiles of unity and the chains of exploitation with the spirit of mutual aid. We will ensure that every child of France walks tall in equality and dignity. Justice in the new world will flow like the waters of the Seine, and happiness will shine like the sun over Provence."
 FPR_Save_Earth_through_Ecology: "The Eco-Revolution"
 FPR_Save_Earth_through_Ecology_desc: "In Mélenchon's vision for France's socialist future, the harmonious coexistence of humans and nature plays a central role. A dignified and secure life for citizens would be impossible without effective ecological protection—it would be like water without a source or a tree without roots. The idea of uniting preservation with continuity has become a core principle within the New Popular Front. While meeting the basic resource needs of the people, the green economic cycle driven by sustainable development will infuse new vitality into France. The eco-revolution will not be an isolated project; it will be a broad, transformative effort that integrates economic, technological, and cultural realms to reshape French society as a whole."
 FPR_Decentralize_the_Military: "Decentralize the Military"
 FPR_Decentralize_the_Military_desc: "The military is a microcosm of society, but with an even more rigid hierarchy—conservative, inflexible in its external dealings, and severely lacking in effective communication and coordination. Too often, its will and direction are controlled by a small group of elderly, conservative generals whose reactionary tendencies have turned the military into a 'state within a state,' resisting calls for reform and progress. The Dreyfus affair is a prime example of this. Since the New Popular Front came to power, the military has remained a stronghold of conservatism, stubbornly opposing change. It's time for Mélenchon and his comrades to address this entrenched resistance. To counter the pushback from the top, soldiers and junior officers will be encouraged to take initiative, promoting military democracy and establishing soldiers' committees to challenge the conservative clubs. In time, the new French military will show the world what a true people's army looks like."
 FPR_Liberalize_the_Revolution: "Liberalize Revolutionary Idealism"
 FPR_Liberalize_the_Revolution_desc: "This land has always been a cradle and beacon of freedom. From the pens of Enlightenment thinkers to the flames of the Great Revolution lighting the streets of Paris, the voice of freedom has never been silent here. It flows through the glimmers of the Seine, echoes in the halls of the Louvre, and is engraved in the hearts of every French man and woman. Today, the storm of revolution sweeps again, but we will not let it descend into chaos or become a despotic shackle. With the hands of freedom, we will grasp the torch of revolution, lifting it high to light the path to socialism."
 FPR_Democracy_in_the_Revolution: "Revolutionary Democracy"
 FPR_Democracy_in_the_Revolution_desc: "Democracy is the lifeblood of the revolution, the beating heart of the people's power. True power does not belong to the elites, but to every citizen of France. The people, as a dynamic and progressive force, inherently carry revolutionary ideals, driving the cause up the historical staircase toward its inevitable destination. We will shatter the chains of the old nobility and place power in the hands of all the people. From now on, the people will no longer be silent spectators but the masters of their own destiny. The democratic revolution will sweep through France like a torrent, dismantling the corrupt remnants of the past and building a monument forged by the will of the people."
 FPR_Proud_Defenders_of_the_Revolution: "Proud Defenders of the Revolution"
 FPR_Proud_Defenders_of_the_Revolution_desc: "The revolution is a crown forged from our blood and sweat, and we are its unyielding defenders. As civil war rages and foreign enemies threaten, revolutionaries will stand like an iron wall. From the front lines to the streets, their battle songs will echo through the sky, their bayonets gleaming with cold light. Whether it's the old nobility of Versailles or the capitalists hiding in the shadows, all who dare challenge us will be reduced to ashes by the fury of the people. We will guard the flame of freedom—it will burn in Paris, spread across the fields, and become an eternal blaze."
 FPR_Operation_Terra: "§YOpération§!: Terra"
 FPR_Operation_Terra_desc: "Under the great leadership of Jean-Luc Mélenchon, we are entering a new phase of the French socialist revolution—one of its core pillars: the creation of a truly harmonious society. Mélenchon has named this plan 'Operation: Terra,' inspired by the ancient reverence for Mother Earth. This utopian vision, where prosperity, happiness, mental peace, and unity are within everyone's reach, will no longer remain a fantasy of old manuscripts. It will become reality through substantial national investment, local infrastructure development, and the united efforts of social groups and government working together in broad collaborative organizations. By pooling our collective wisdom and efforts, within a generation, we will achieve the dream of social equality that has long eluded us. We will plant the seeds of the most beautiful idealism on Earth."
 FPR_Cult_of_Melenchon: "Cult of Mélenchon"
 FPR_Cult_of_Melenchon_desc: "Jean-Luc Mélenchon is not just the guiding star of France; he is the embodiment of radical republicanism and an enduring beacon in the hearts of the people. His words resonate like war drums, rousing every citizen to join the revolutionary surge. His vision spreads like wildfire, igniting hope across France and Europe. We dedicate ourselves to this revolutionary cause, vowing to build a nation worthy of Mélenchon's dream. May his light illuminate our path, leading France to the pinnacle of equality and glory, and may the flames of revolution never die. Just as a ship depends on its captain, our revolution depends on Mélenchon’s leadership!"

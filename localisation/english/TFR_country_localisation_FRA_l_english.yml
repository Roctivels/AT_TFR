 FAF_napoleonic_sympathies_dynamic_desc: "Our state is one that has a proud and grand history. The state of France is built on the accomplishments of Napoleon Bonaparte, the Bonaparte family - who defeated all of Europe single-handedly multiple times before finally being defeated after simple exhaustion. There will be no brilliance that will match that of France, of the French Empire. It is the most grand state in all of Europe, and it forever will be."

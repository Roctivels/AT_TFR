 FAF_hold_military_parade_decision: "Showcase our Strength"
 FAF_hold_military_parade_decision_desc: "Our utter defeat in the Russo-European War devastated our nation not only physically, but also mentally. Our national psyche is steeped in defeat and devastation, leaving our people unwilling to fight. We must embolden the French people by reminding them that France remains a strong and powerful nation—one that does not fear its enemies and will not hesitate to protect her people."
 FAF_celebrate_our_victories_decision: "Reward the Victorious"
 FAF_celebrate_our_victories_decision_desc: "It never mattered how hard one worked or how arduous the process was; all that mattered was the result. Ultimately, there are only two outcomes in everything: success or failure, winning or losing. Those who win and succeed must be rewarded to inspire others to strive for victory and success. After all, merit matters most."
 FAF_hail_to_the_chief_decision: "Hail to the Chief!"
 FAF_hail_to_the_chief_decision_desc: "Leadership and clear structural organisation is key to stability and success. It is key in an Army's success, a corporation's function, even organised crime relies on it. As we emerged victorious through the anarchy that ravaged France, we have to rebuild this nation around a central figure, a political strongman who can unite his people and rally them for a common cause."
 FAF_heir_of_degaulle_decision: "Embrace Gaullist Thought"
 FAF_heir_of_degaulle_decision_desc: " A man such as Charles de Gaulle needs no introduction. A bold statesman and political strongman, never once has he failed the French people and nation. When the Germans occupied our nation, crushed our national spirit, and enslaved our people, most politicians and generals gave in and accepted defeat, but not Charled de Gaulle. He would rather die fighting than live kneeling! Yet he was also a fair man, a just man. One who was democratically elected and honored the will of the French people. Only by helping our people embrace and accept his brave and honorable ideals, can we guide this nation towards the right path."
 FAF_culmination_of_degaulle_petainist_thought_decision: "Embrace Gaullo-Pétainist Thought"
 FAF_culmination_of_degaulle_petainist_thought_decision_desc: "Both de Gaulle and Petain had honorable traits. Principles that allowed them to shine through in that dark era of French history. Times like these create division within our nation. If we only embrace one man's ideals, the other's supporters are surely to reek havoc. Only by accepting both groups can we ensure that unity is recreated within our nation."
 FAF_heir_of_petain_decision: "Embrace Pétainist Thought"
 FAF_heir_of_petain_decision_desc: "There has never been a more controversial man in French history. Some argue Petain is a traitor while others believe that everything he did was to protect the French people. But none can argue that he was and still is our national hero. He left his marks in both Verdun and Vichy, not for his personal glory, but for the safety of the French nation and people. No matter what he did or did not do, he was a man of resolve, a man of great love for his people and his nation, a man who gave his all to fight against the red venom which sickened our nation. It is crucial that we teach our people the truth about this historic giant. They shall learn to embrace our traditional culture and values, and beware of the bolshevik menace."
 FAF_work_v_decision: "Our Work!"
 FAF_work_v_decision_desc: "Our nation was destroyed and left in utter devastation by the Russian horde. Much work remains to be done to rebuild all that was reduced to dust beneath their iron boots. Our national spirit is still waiting to be uplifted, and our people are still waiting to be fed. Now, more than ever, we must dedicate ourselves to the monumental task of restoring our homeland."
 FAF_family_v_decision: "Our Family!"
 FAF_family_v_decision_desc: "How many families were devastated, separated, destroyed by this war? This righteous war, against a bloodthirsty enemy who want nothing more but to destroy our beautiful nation, our ancestral home Europe. From now on, we must protect our home, our family, our brothers."
 FAF_fatherland_v_decision: "Our Fatherland!"
 FAF_fatherland_v_decision_desc: " What is it that our people fight for? Themselves? No. They fight for a common cause, a common belief, and a common goal. To protect and preserve that of which is dear to them. Their home, their land, their brothers. "
 FAF_one_million_man_army_decision: "One Million Man Army"
 FAF_one_million_man_army_decision_desc: "One million soldiers! ONE GODDAMN MILLION SOLDIERS! Men who are willing to die and fight for their country. Boys who would shed their blood for their land and people without a question in their mind. With a mighty army such as this, the French people can rest assured that their country can keep them safe."
 FAF_french_superiority_decision: "French Superiority"
 FAF_french_superiority_decision_desc: "French culture is among the most—if not the most—dominant cultures in the world. French ingenuity and creativity have brought our nation to the world stage. Throughout human history, France alone has stood as the center of art, technology, and literature. These undeniable facts only further prove our natural superiority over others, whether they are fellow Europeans or cultures from farther afield."
 FAF_taunt_our_enemies_decision: "Taunt our Enemies"
 FAF_taunt_our_enemies_decision_desc: "France has countless enemies both inside and outside. But what can these rats do? What can these worthless dogs do to harm our nation? They are weak, both psychologically and physically. The communists degenerates in our country have become meek while the Russians are too busy fighting each other. How can one not find it laughable that these are our so called foes? "
 FAF_our_french_mothers_decision: "Idolize Jeanne d'Arc"
 FAF_our_french_mothers_decision_desc: "Bravery is the noblest trait one can possess. The French embodiment of bravery is Jeanne d'Arc. She fought with greater courage than the men in her ranks. She did not cry or scream when degenerates and traitors burned her alive under false pretenses. She battled her enemies with all her might, never backing down, never faltering. She stands as an idol for all of France to hold dear. All our men—our soldiers—must strive to be like Jeanne d'Arc, fighting fiercely with fiery passion and unyielding loyalty."
 FAF_revive_the_franco_german_brigades_decision: "Rebuild the Franco-German Brigades"
 FAF_revive_the_franco_german_brigades_decision_desc: "Us and the Germans have had our fair share of problems, but nonetheless we are brothers. The deep connection between us was created through blood and trial. Our common enemy in the East threatens the stability and existence of both of our nations. We must gradually increase the cooperation between our two nations and reforming the small but highly mobile Franco-German brigades is the first step in this process."
 FAF_silence_german_critics_decision: "Silence Critics of Allies"
 FAF_silence_german_critics_decision_desc: "Those fools who criticize our European allies have no understanding of strategic planning. They lack vision and depth. It is truly appalling how many people still fail to grasp the principle "the enemy of my enemy is my friend." Their threat to us is insignificant at present compared to the Bolshevik menace to the East. We won't place our full trust in them, of course, but practicality must always come before ideology."
 FAF_deliver_our_people_decision: "Deliver our People"
 FAF_deliver_our_people_decision_desc: ""

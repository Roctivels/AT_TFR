 FRA_Military_Demands_category_desc: "\n\n\n\n\n£GFX_FRA_path_of_conquest_cat\n\n\n\n\n\n\n\nWith the cracks in Macron's government appearing, many of his allies in the military are trying to silently jump ship before their careers are squandered. This led to a handful of military officers to contact Zemmour personally, asking for him to aid them in the reclaimation of France from the Liberal scourge. \nFrance is too unstable and independent to willingly follow military rule, however, we cannot wait around for France to save herself, Thus the creation of §COPERATION CHEVALIER§!. \n\n§COPERATION CHEVALIER§! is a plan to utilize faulty election equipment to effectively rig the 2022 election in favor of Eric Zemmour's Reconquête party, and then use the French military to guarantee that the election is certified in each state. After this initial plan, Zemmour will handle streamlining the civilian rule of the country, as the Military enforces a war economy to fight the deadly threat in the East. \n\n§COPERATION CHEVALIER§! PROGRESS: [?chevalier_progress]/6"

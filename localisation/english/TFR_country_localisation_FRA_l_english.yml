 FRA_yellow_vest_protests: "Yellow Vest Protests"
 FRA_yellow_vest_protests_desc: "With the Radical des Gilets Jaunes, or so-called ''Yellow Vests'' by the media, it becomes apparent without an immediate solution that gives at least some concessions to the rioters that the nation will be thrust into even more turmoil than COVID-19 alone. Until this solution is negotiated or concluded in some alternative the nation of France risks its internal stability and political integrity. "

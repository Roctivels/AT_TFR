 france.295.t: "Stars in the French Night"
 france.295.d: "On a quiet night in Montparnasse, Étienne Lemaire and Sophie Dupont lit a fire in a metal barrel in a narrow alley. The flames danced on the brick walls, casting their shadows. Étienne held a gold-embossed Bible, while Sophie leafed through a worn translation of the Quran, both inherited from their devout grandparents.\n\n''Look at this,'' Étienne said, tracing the Bible's pages. ''Every word is a chain, stifling imagination. Do they really think they can suppress the human spirit?'' He threw the Bible into the fire, and Sophie followed with the Quran. The pages curled in the flames, the gilded letters twisting like prisoners in torment.\n\n''They call this blasphemy, but isn't it a greater sin to trap life's passion in these aging pages?'' Sophie said, pulling more religious texts from her bag. The scent of burning paper mingled with the faint fragrance of wild roses. Across the alley, light from a café stretched their shadows long.\n\nSophie took a sketch from her pocket, tore it into pieces, and tossed them into the fire. ''Art shouldn't be confined to paper; it should be reborn through destruction.'' The firelight reflected on her pale face, making her seem both rebel and priestess.As the last page turned to ash, a distant bell struck midnight. "
 france.295.a: "They stood watching as the flames slowly died."
 france.296.t: "Echoes of the Past"
 france.296.d: "''I am ninety-seven years old,'' Paul Duval began, standing at the podium of the memorial hall. His wrinkled hand gently brushed the medals on his chest. ''Back then, on the battlefield, we young men fought to defend the ideals of the Republic. Freedom, to us, was not an abstract concept but a belief worth laying down our lives for.''\n\nHe paused, his gaze sweeping across the youthful faces in the audience. ''But today, I see some troubling signs. Some say democracy is outdated, some argue for a strongman to lead us. Young people, these were the same arguments we heard in 1940. The appeasers back then spoke the same words.''\n\n''You may think I'm just an old man rambling about the past. But remember, history never repeats itself exactly—it always returns in a new guise. The fascists of today won't wear military uniforms; they will don suits, speak eloquently, and promise you a 'better' future.''\n\n''My time is running out, but the future of France belongs to you. The freedom and equality that our generation paid for in blood is now in your hands. Do not be swayed by words that seek to deceive. Do not replace reason and tolerance with hatred and prejudice. Do not let the sacrifices of those who died for freedom be in vain.''\n\n''Remember, true patriotism is not about hating others, but about cherishing the values we share. France's greatness lies not in its military strength, but in the spirit it represents.''"
 france.296.a: "A Republic, if you can keep it..."
 france.297.t: "Rassemblement Familial"
 france.297.d: "The room was dim, lit only by the flicker of a Gauloises cigarette smoldering in the ashtray. Jean-Marie Le Pen sat across the ornate wooden table, his fingers drumming rhythmically against its surface. On the other side, Marine, dressed in a sharp blazer, sipped her coffee with practiced nonchalance, her eyes wrought the exhaustion of countless rallies and meetings. \n\n''So,'' Jean-Marie began, his voice gravelly, ''you think you've moved past me.'' \nMarine raised an eyebrow, her expression unreadable. ''Father,'' she said evenly, ''it's not about abandoning you. It's about evolution. People don't want to hear blunt racism anymore. They want... nuance.'' \n\n''Nuance?!'' Jean-Marie barked, nearly tipping his chair back. ''Is that what you call it? Pandering to the weak? Diluting the message that built this family's party? And yet,'' he said finally, exhaling a plume of smoke, ''you still keep my shadow by your side. Every speech, every platform, every policy, your mother would have called it an homage.'' \nMarine smirked, the corner of her mouth twitching upward. ''Not an homage. A correction.'' \nThe old man chuckled, a sound like gravel tumbling down a hill. ''Well, little one,'' he said, stubbing out his cigarette with a sharp twist, ''If you're going to correct me, at least do it properly.''"
 france.297.a: "Le family... Le chaos."
 france.298.t: "Touche pas à mon poste!"
 france.298.d: "Cyril Hanouna finishes his nightly introduction as he has done for years before inviting on his guests, tonight he has an incredibly special guest. \n\nBrigadier General Pierre Schill. \n\n''Please welcome General Pierre Schill!'' The French-Tunisian host exclaims to applause from the studio audience, the general comes out in uniform, his officers kepi shining in the studio light. General Schill gives a wide smile and takes his seat. \nSchill knows Hanouna is a comedian, meant to make the crowd and the nation laugh, and inviting an army official on your show means you must have some funny things to say, the general smiles uneasily as Hanouna begins to speak. \n\nAt first it's normal, but it shifts towards Frances allies, and eventually the focus settles on Germany. ''What about the Bundeswehr?'' Schill asks. ''Well, it's small don't you think? Hah!'' Hanouna jokes, Schill shifts, he's a major officer in the NATO command and his words could sour relations between the two nations. \n\nHis response holds a lot of weight, he hesitates, he feels the studio lights on his face, and he inhales..."
 france.298.a: "It's not always about numbers, Cyril."
 france.298.b: "I think they could do to be a little less afraid of themselves."
 france.299.t: "Lyonnaise Liquidation"
 france.299.d: "The Yellow Vests have done it again, another grand protest has overwhelming the police force deployed to contain them, they run freely, a street previously kept devoid of protests for fears of destruction was now opened to them as the police fled to fallback points, lines broke apart, protests melded together, the organizers lost sight of whos protest was whos as anarchy consumed the streets of Lyon. \n\nTwo groups converge in front of Lyons town hall, one holds rocks, hammers, the other holds their signs wrinkled from days of constant protest. A rock crashes through the window, one protester yells ''No! Spare the offices! People work there!'' And the other group responds by slamming a hammer into the front door. \n''They should not work for the tyrant then!'' And another pane of glass breaks. \nThe peaceful group stands in front of the door, poised to prevent the ransacking of the building.\n''MOLOTOV!'' One yells, and they dive from the stairs, the entrance lighting on fire, the door smoldering in moments. They watch in horror as their comrades mount the windows and come out with televisions, phones, computers. They know hundreds have been put out of their livelihoods for months to come, a tragedy has occurred for the working man this day even if it's in pursuit of change."
 france.299.a: "All you can do is watch"
 france.300.t: "Our Legacy in Africa..."
 france.300.d: "The relationship with France and Africa is... complicated, to say the least.\n\nOur colonization of Africa was undoubtedly an unfortunate period in both our histories. The legacy of colonization remains in Africa in that Africa suffers from instability from anti-democratic forces, suffers from economic poverty, and health crises.\n\nDue to this, many in our government feel it is our responsibility to right the wrongs we committed. They claim it is our fault that Africa has suffered a lot. To do this, we must support Africa's development by aiding and supporting local democracies and stopping the spread of extremism and autocracies.\n\nBut France is not unanimous. Many believe there is little point in doing this, as more often than not, in the quest to stop dictatorships, the country has been left in a worse state than before, such as Libya. They do not deny that there is a lot to be gained from Africa, mainly its rich abundance of natural resources. There is, however, no need to further entangle France into more costly conflicts that never seem to end. In any case, either path we choose will decide our future in Africa.\n\n"
 france.300.a: "We are the Champions of Third World Democracy!"
 france.300.b: "We are there for our national interests, nothing more."
 france.301.t: "Union bigwigs brought up on corruption charges"
 france.301.d: "In a sudden, but not particularly surprising, turn of events, many of France's top union leaders have had corruption charges brought against them. Misuse of funds, brides, laundering, and general fraud have all come into the limelight. Despite the ample evidence both of the court's nonpartisanship and the validity of the evidence, many of the various unions' supporters have come out in protest against what they call an attack on the workers and a clear sign of government overreach on the side of big business. Many of these protesters have turned to violence and smoke can be seen rising in many of France's cities. Even with the CRS being deployed for a crack down, it is likely to not be fully snuffed out until those involved lose interest."
 france.301.a: "Another tantrum before bedtime."
 france.304.t: "Darker Colors for a Darker Age."
 france.304.d: "Emmanuel Macron sat in his office in Paris, it was a beautifully bright day, he stared intensely at a flag in the distance. \n\n''It should be darker.'' He said, absent mindedly to himself. ''I would like it to be darker, it blends into the sky too well. Go get one of the darker ones and have it put up, go.'' He says, motioning to a Presidential Guard."
 france.304.a: "Then it shall be so!"
 france.304.b: "''Uh... I don't think you can do that?''"
 FRA_flag_will_get_darker_tt: "§YThe blue on the French flag will be\nchanged to§! §PDark Navy§!"
 france.305.t: "Bardella speaks out on Freedom of Speech"
 france.305.d: "Recently, a conservative politician, Jordan Bardella, has been going through multiple means of spreading his message of Free Speech for anyone who would care to listen. He has petitioned parliament in attempts to get them to change limitations of the Freedom of Speech laws for the nation of France. While admirable, it has been called into question by the media as Bardella specifically has started this campaign since the far-right, Identitarian party, was officially censored by the French administration."
 france.305.a: "Step One..."
 france.306.t: "National Emergency Declared"
 france.306.d: "Following extreme chaos in his term as re-elected president of the French Republic, Macron has seen it fit to declare a state of National Emergency and invite the conservative National Rally to the government in efforts to calm down the chaos.\n\nWhile criticized by his partners and even some members of his own party, it was claimed to be a necessary decision in these times of hardships and strife, the step that must be taken to assure that France does not once again collapse into hardship and civil conflict.\n\nOnly time will tell what may come of this. The sand falls from the hourglass, towards the hour of decision. No matter what it all becomes in the end, fate is sealed towards only a few paths."
 france.306.a: "Our time in the spotlight has come..."
 france.307.t: "Jupiter Falls"
 france.307.d: "Emmanuel Macron sat in defeat today as he announced publicly for the entire nation to see that he would be resigning as the president of France and appointing the conservative Jordan Bardella as his replacement. With the recent state of emergency declared and Macron's cabinet being dissolved, it seemed evident this day would come.. after all his grip on control has been slipping with his own party calling for his removal due to the tyrannical declaration of martial law. But now it was not time for Macron to sulk, it was time for Bardella to rise as the savior of France, the man who would save France from the Slavic hoard"
 france.307.a: "and then Mars Rises..."
 france.309.t: "The Ties that Bind"
 france.309.d: "Since times of antiquity, the French and the German people have never seen eye to eye. This changed after the Second World War, after we forced the Germans to remove all aspects of Prussian Militarism from their identity. Through disregarding this militarism that defined Germany for so long, we had inadvertently crippled any chance that Europe could stand alone against the Russian behemoth... \n\nBut now, Russia is defeated, fractured beyond recognition, and Prussian militarism is once again thriving. Our spies report of German nationalists whispering of our supposed weakness... Demanding a ''Honorable requisition'' of their former territories of Elsaß-Lothringen... Putting our ancestral lands of Alsace-Lorraine at risk of being under the German jackboot is not something our leaders, nor our people, are willing to do."
 france.309.a: "Rumors are only Rumors"
 france.309.b: "We could never be Brothers..."
 france.310.t: "France abandons the Pact"
 france.310.d: "Citing disdain with the few Germans wishing for our government to reclaim our former territory of Elsaß-Lothringen, the French government has left the Pact of Steel. Although unexpected, this does mean that we have no more diplomatic reasons to avoid the topic of the reclaimation of Elsaß-Lothringen, our LOST province. \n\nEven now, we can hear the German people under the French occupation crying for liberation from their fatherland. We shall Reclaim what was Once ours! We shall destroy the French State once and for all, [GER.GetLeader] shall once more humiliate the French people and their attempt at military, just as Bismarck and Hitler once had."
 france.310.a: "We will Crush them!"
 france.311.t: "The Old Entente"
 france.311.d: "TODO English event pitting them against Germany with France"
 france.311.a: "United We Stand!"
 france.311.b: "No need! The Pact is Great!"
 france.312.t: "Germany Claims Alsace-Lorraine"
 france.312.d: "Following our independence from the bureaucracy of Berlin, the German government have reaffirmed their claim to the hisorically French region of Alsace-Lorraine. The blind nationalism of the Germans was expected, and we have but one response... The Rhine. \n\nThe Rhine river has been the natural border between the civilized world and the barbarians since times of antiquity, and it is obvious that the Germans cannot be trusted with self-governance."
 france.312.a: "The Rhine is France's Natural Border!"
 france.7000.t: "Fall of the Anarchists"
 france.7000.d: "Anarchists executed en masse, Julien Coupat public execution. Casanova is proud"
 france.7000.a: "Revolution calls for discipline"
 france.7001.t: "Left and Right opposition forms!"
 france.7001.d: "Arthaud and Daeninckx make their own little factions because they don't like that we just overthrew the government. crazy right?"
 france.7001.a: "Damn them!"
 france.7002.t: "On the question of military rule"
 france.7002.d: "The night was deep, but within the office of the Élysée Palace, General Casanova worked tirelessly, consumed with thoughts about the future of France. Having already seized control of the entire nation, with governors and commanders bowing to his authority, the pressing issue remained: how to institutionalize this power.\n\nTurning his gaze to the side wall of the office, where a bookshelf held a replica of the famous statue of Napoleon, he observed the conqueror gleaming in the moonlight, the cold white light highlighting his figure. Casanova envisioned himself in full military regalia, adorned with medals, receiving salutes from the parade ground. The First Consul had used force to restore the republican system, ensuring France's strength and prosperity. Why shouldn't his student follow this exemplary model?\n\nFeeling a bit drowsy, Casanova  rang for a cup of coffee to stay awake. While waiting for his aide to bring the drink, the general opened a desk drawer and took out a volume of Stalin's collected works to pass the time. This Georgian-born General Secretary was, indeed, a man of great talent. Stalin had consolidated and reconstructed Lenin's legacy, allowing the world's first communist government to function efficiently. How could Casanova, who prided himself as the new revolutionary leader, not feel envious?\n\nCasanova sipped the steaming black liquid while calculating his next moves. After a moment, he picked up his pen, and signed his last order of the day."
 france.7002.a: "The situation calls for strength and security"
 france.7002.b: "How can we claim to speak for the people without a civilian government?"
 france.7003.t: "Right opposition rises against us!"
 france.7003.d: "unused event lol"
 france.7003.a: "Damn them!"
 france.7004.t: "Trial of the Daeninckx Bloc"
 france.7004.d: "Start of French Communist Internal Purges"
 france.7004.a: "Nothing but saboteurs"
 france.7005.t: "Trial of the Arthaud Bloc"
 france.7005.d: "Total Trotskyist death"
 france.7005.a: "First as tragedy, then as farce"
 france.7006.t: "On the question of federalism"
 france.7006.d: "Federalism is non-existent in France but Casanova wants to do his Soviet Style Dictatorship"
 france.7006.a: "Let us follow the Soviet example!"
 france.7006.b: "Federalism hasn't been relevant since the first revolution, forget this"
 france.7007.t: "French Economic Assistance!"
 france.7007.d: "Our great French comrades have, in the spirit of international communist solidarity, given us a generous grant to support the reconstruction of our industry. Due to the recent military failure against the fascist menace in the east and the recent revolution against the former capitalist ruling class, our local industry has been in tatters.\n\nThankfully, our French comrades have heeded our cries for aid and sent economic assistance to help us rebuild our nation by restoring factories and other industrial areas, providing work for our people and restarting our economy. Together with our French comrades, we will rebuild and march on to wider class unity and a shared struggle against capitalism and imperialism!"
 france.7007.a: "Strength in Unity!"
 latinist.1.t: "Sifting through the Ashes"
 latinist.1.d: "The path to national revival has become an unavoidable question of history. Since France completed its transformation into a nationalist state, debates over the future direction of the nation have erupted across all levels of society. The fires of war and revolution have reduced the old order to cinders, and now, upon this scorched earth, we must decide how to rebuild our homeland.\n\nThe first perspective holds that we shall rise like a phoenix. Supporters of this stance believe that France's suffering was a necessary trial, a purification of the national spirit. They view the current hardship as a crucial stage toward a grand revival, emphasizing the virtue of sacrifice and the meaning of endurance. To them, only through a total spiritual renewal can France emerge from the shadows of history and march toward a radiant future.\n\nThe second perspective proclaims that ourpast glories will be revived. Those who adhere to this belief immerse themselves in nostalgia for France's golden past. Whether it be the military triumphs of the Napoleonic era or the cultural flourishing of the Third Republic. They emphasize the continuity and superiority of French civilization, advocating for a return to traditional values and institutions as the key to reclaiming France's rightful place in the world.\n\nThe third perspective asserts that our blood shall be purified. Its adherents blame France's decline on the contamination of the national bloodline, advocating for strict population policies to achieve so-called ethnic purity.\n\nAs the nation stands at a crossroads, these competing visions will shape the destiny of France in the years to come."
 latinist.1.a: "We shall rise like a Phoenix"
 latinist.1.b: "Past Glories will be Revived"
 latinist.1.c: "Our Blood shall be Purified"
 latinist.2.t: "The Latin People..."
 latinist.2.d: "In an age corrupted by skepticism and hollow internationalism, it is time to raise our true voice, to proclaim our unshakable national faith. Modernity is tearing apart the soul of France, and in this chaos, we must reclaim the pride and dignity of the Latin people.\n\nLook to our history—without France, there would be no true Europe. When Rome fell, it was we who preserved the flame of classical wisdom. It was from our lands that the Enlightenment erupted, with the Seine as the cradle from which reason and liberty spread across the world. The Germans and Anglo-Saxons? They are merely latecomers to civilization, their so-called "cultural contributions" nothing more than feeble imitations of our great heritage. European civilization is Latin, and it is French!\n\nWhen Napoleon's eagle soared over Moscow, Madrid, and Berlin, the world trembled before the unity of the French nation. Our armies were unstoppable, our laws reshaped an entire continent. Time and again, history has proven that what we need is not weakness, not endless debate, but decisive action and resolute leadership. Only by reviving our legacy of iron and glory can we rise once more in the chaos of the modern world!\n\nLook at Europe today—we must face a harsh truth: in the grand chessboard of global power, the White nations of Europe face an unprecedented challenge. We cannot afford division, nor can we waste time on mutual blame. From Ireland to the Urals, from Scandinavia to the Mediterranean, we share a common fate. France must recognize itself as part of this greater whole—our struggle is the struggle of all European peoples. Only through unity can we defend our traditions, our way of life, and our civilization from external threats."
 latinist.2.d: "In an age corrupted by skepticism and hollow internationalism, it is time to raise our true voice, to proclaim our unshakable national faith. Modernity is tearing apart the soul of France, and in this chaos, we must reclaim the pride and dignity of the Latin people.\n\nLook to our history, without France, there would be no true Europe. When Rome fell, it was we who preserved the flame of classical wisdom. It was from our lands that the Enlightenment erupted, with the Seine as the cradle from which reason and liberty spread across the world. The Germans and Anglo-Saxons? They are merely latecomers to civilization, their so-called cultural contributions nothing more than feeble imitations of our great heritage. European civilization is Latin, and it is French!\n\nWhen Napoleon's eagle soared over Moscow, Madrid, and Berlin, the world trembled before the unity of the French nation. Our armies were unstoppable, our laws reshaped an entire continent. Time and again, history has proven that what we need is not weakness, not endless debate, but decisive action and resolute leadership. Only by reviving our legacy of iron and glory can we rise once more in the chaos of the modern world!\n\nLook at Europe today, we must face a harsh truth: in the grand chessboard of global power, the White nations of Europe face an unprecedented challenge. We cannot afford division, nor can we waste time on mutual blame. From Ireland to the Urals, from Scandinavia to the Mediterranean, we share a common fate. France must recognize itself as part of this greater whole. Our struggle is the struggle of all European peoples. Only through unity can we defend our traditions, our way of life, and our civilization from external threats."
 latinist.2.a: "Are the heart of European civilization"
 latinist.2.b: "Were once united under Napoleonic Authority"
 latinist.2.c: "Are only a cog in the White Race"
 latinist.3.t: "Our Connection to the past..."
 latinist.3.d: "The well-dressed traitors of the past poisoned our youth, teaching them to despise their own history, scorn their own culture, and question their own bloodline. But the hour of awakening has arrived. We shall seize back our stolen glory, mend the severed chain of history, and restore what was deliberately erased.\n\nThe ruling class has numbed the nation's spirit with the illusion of prosperity, but we alone still feel the pain of betrayal. They twisted our history, teaching us to be ashamed of our ancestors' greatness. But should we apologize for spreading civilization? No! We reject this servile, self-loathing mentality—the flame of Latin youth shall never be extinguished!\n\nWaterloo must not be our shame, it must be our banner of defiance. That defeat was not a failure of France, but a conspiracy of cowards, where all of Europe united to strike down one nation. Yet even in the darkest hour, French soldiers cried out the Emperor's name, choosing death over surrender. Their blood runs in our veins, their spirit still walks this land.\n\nWhen the savage Huns stormed the gates of Europe, who stood against them? Our ancestors. When the Vandals ravaged the Mediterranean, who rebuilt order? Our kings. When the Mongol hordes sought to consume all of Europe, who raised the bulwark of civilization? We did.\n\nWe must reclaim this hidden legacy, for only by knowing who we are can we determine where we must go.History does not wait for the hesitant. Glory belongs only to those bold enough to follow in their ancestors' footsteps. The destiny of France is in our hands, and the choices we make today will shape the Europe of tomorrow."
 latinist.3.a: "We are the Disgruntled Youth"
 latinist.3.b: "We are the soldier at Waterloo"
 latinist.3.c: "We are the Slayers of Huns, Vandals, and Mongoloids"
 FAF_empower_latinists_tt: "§AThis will empower the Latinists!§!"
 FAF_empower_bonapartists_tt: "§2This will empower the Bonapartists!§!"
 FAF_empower_paneuros_tt: "§CThis will empower the Paneuropeans!§!"
 FAF_lafayette_coup_tt: "§REnough of this clown show. It's MY turn now.§!"
 Brazil.1.t: "The Headless Rooster"
 Brazil.1.d: ""
 Brazil.1.a: "Au Revoir Frenchie!"
 Brazil.2.t: "Brazil seizes Guiana"
 Brazil.2.d: "With the sting of defeat still strong, another injustice has been brought upon us. The cowardly Brazilian government has, sensing weakness, jumped at the opportunity to seize the overseas department of French Guiana, one of the last vestiges of our imperial past. There was little to no resistance to the Brazilian invasion. A skeleton force was all that remained-most of its limited men and equipment having already been siphoned off to bloodletting to the east. What little was left had not the time, hands, or will to resist. The silver lining being that any equipment stocks had already been picked clean and this seizure does not strengthen the Brazilian military in any appreciable way.\n\nDespite calls from more gung-ho members of the general staff for an immediate counter-strike, we do not have the ability to even intervene in the brewing civil war in our southern neighbor, let alone a region half the world away. One of the more pressing short-term issues at hand as a result of the region's loss, is the cutting off of the region's gold, petroleum, and bauxite output, which will surely be missed in the trying times ahead. Plans will still be drawn up and perhaps in better times we can make our move, but until the situation here in Europe is stable, and the Russians have been put back in their place, these will all simply be pipe dreams."
 Brazil.2.a: "We'll be back."
 Nationalist_France.99.t: "French Military offers aid for alignment"
 Nationalist_France.99.d: "After hearing of our defense of Belgian ideals against the Communist uprising in Luxembourg in the Battle of Arlon, General [FAF.GetLeader] has sent a diplomatic envoy to request a formal alliance, wherein they would absorb us into their sphere, and we would gain the protection and furtherment of our ideals backed by French assistance. The Queen is against the idea, citing that the cause of our dispair has been mismanagement by French officials, started by the unpopular forced abdication of her father by French-backed Prime Minister Laurent Brogniet."
 Nationalist_France.99.a: "The Tides of Europe are changing, and we must ride the waves together."
 Nationalist_France.99.b: "French alignment or another French annexation?"
 Nationalist_France.0.t: "Dutch Government opposes Belgian Alignment"
 Nationalist_France.0.d: "Following Queen Elizabeth's acceptance of our offer of economic and political aid, the government in Holland has announced an official declaration of war against us. In a speech in front of hundreds in the Kingdom's capital, [HOL.GetLeader] has stated ''the French Government of National Defense has demanded the Belgian state be annexed into the French nation for the second time this decade! We will not sit idly by as our neighbors fall to Militarism and Fascism!'' \n\nAlongside this announcement, we have gotten reports of large-scale skirmishes with the revolutionaries on the border with Luxembourg."
 Nationalist_France.0.a: "A two front war it is then!"
 Nationalist_France.2.t: "The Belgian Government denies our Offer"
 Nationalist_France.2.d: "After awaiting for our diplomatic envoy for over a week, the Belgian Government has appeared at the remnants of the Europa building in Brussels, with Queen Elizabeth I proclaiming that ''the French Government of National Defense has demanded the Belgian state be annexed into the French nation for the second time this decade, but this time, without a French puppet in charge, the true will of the Belgian people has been heard and that we say ''NON!'' to their pitiful excuse of empire building!''\n\nThe Government is furious, with many demanding General [FAF.GetLeader] launch an invasion into the lowlands to secure it before the communists or liberals can, regardless of the fact that we are currently fighting in a civil war."
 Nationalist_France.2.a: "Tanks will roll  into Luxembourg, then Brussels, then Holland!"
 Nationalist_France.2.b: "We will be back..."
 Nationalist_France.3.t: "Government holds parades celebrating Jean d'Arc across the nation"
 Nationalist_France.3.d: "What started out as another attempt to sway the nation over from the grasp of the liberal and leftist stains of the civil war unexpectedly got out of control. In cooperation with the catholic church the patron saint was paraded around the streets of Paris along with the congregation to foster unity and remembrance of the historical martyr. As the portrait of Jean d'Arc and accompanying iconography was shown to the masses; the peoples' hearts went out to the martyr as they prayed and begged for success and the wellbeing of France during this troubling period. It was a beautiful sight to behold and even the following day there were petitions to make a national holiday in remembrance of the martyr."
 Nationalist_France.3.a: "A surprising success?"
 Nationalist_France.4.t: "An Open Discussion on the Rights of Man"
 Nationalist_France.4.d: "A transcript of ''A discussion on the Rights of Man: hosted in Théâtre Mogador, Paris''\nARMEL D'ARAMITZ: Ah, my dear friend, while I understand the appeal of equality and freedom as the core principles of the Rights of Man, I have some reservations. You see, I believe that placing too much emphasis on individual liberties can lead to a neglect of social responsibilities. We must consider the greater good and the well-being of the entire community.\nMICHEL MARCHAND: Ah, but that is precisely where we differ! The Rights of Man, in my perspective, prioritize the individual as the ultimate unit of society. By safeguarding the rights and freedoms of each person, we empower them to contribute to the collective progress and prosperity. It is through the flourishing of individuals that society as a whole can thrive.\nD'ARAMITZ: While I appreciate the importance of individual empowerment, we must also acknowledge that societies are complex and interdependent. The Rights of Man should encompass not only individual liberties but also responsibilities towards the community and the environment. The well-being of the collective cannot be compromised for the sake of individual autonomy.\n\nclick to continue..."
 Nationalist_France.4.a: "Thrilling!"
 Nationalist_France.5.t: "Government unveils statue of Marianne leading troops against Russia."
 Nationalist_France.5.d: "Under the watchful eyes of hundreds of spectators, a new monument to Marianne, the eternal symbol of France, was unveiled in the heart of Paris, depicting her leading French troops against Russian forces.Standing six meters tall, the statue, crafted from traditional French stone by a renowned sculptor, captures Marianne raising the flag, her gaze unyielding, her stance resolute as she faces east.\n\nEngraved on the pedestal are the words: "Liberty Never Retreats", a declaration of France's unwavering commitment to its values. This monument has already been hailed as one of the most significant patriotic artworks in recent French history, a clear and deliberate statement on the nation's stance in the current international climate.The unveiling ceremony was marked by a military band's stirring anthems, the Tricolor waving in the wind, and a solemn yet defiant atmosphere. As the event reached its peak, many in the crowd spontaneously broke into the national anthem, their voices ringing through the square in a moment of collective pride and determination"
 Nationalist_France.5.a: "Hm, maybe we were too fast to abandon her"
 Nationalist_France.6.t: "Philippe Pétain exonerated in new Government decree"
 Nationalist_France.6.d: "After years of debate and controversy, a historic decree has finally come into effect—Marshal Philippe Pétain has been officially exonerated.\n\nPétain's contributions to France are undeniable. During World War I, his exceptional military leadership at Verdun saved the nation from catastrophe. At a time when the German advance seemed unstoppable, it was Pétain's unwavering resolve and strategic brilliance that held the line. This heroic defense won him the admiration of the entire nation and the highest honor of Marshal of France.\n\nIn 1940, as Germany's Blitzkrieg shattered French defenses, millions of soldiers were captured, and the Republic faced total collapse. Pétain accepted the weight of history—he chose to remain in France, negotiating rather than fleeing into exile, struggling to preserve what could be saved rather than allowing the nation to descend into complete destruction. At eighty-four years old, he could have retired in peace, yet he stood firm in France's darkest hour, believing his diplomatic strategy could spare France from total occupation and preserve the nation's strength for its eventual liberation.\n\nHowever, his postwar trial was dictated by political necessity. In the aftermath of war, France needed a scapegoat to cleanse its wounded pride, and Pétain was made that symbol.With this decree, we are not merely restoring the honor of an old soldier—we are deepening our national memory, acknowledging the complexities and contradictions of our past. A truly strong nation must have the courage to confront all facets of its history, including those that challenge the simplistic narratives of victory and defeat."
 Nationalist_France.6.a: "A Man who tried to save France twice"
 Nationalist_France.7.t: "French Israelist attracts crowds in Paris"
 Nationalist_France.7.d: "The Marais District is home to the Agudas Hakehilos Synagogue on Rue Pavée, the central hub for the local Jewish community. After centuries of political turmoil, a new wave of unexpected visitors has brought a sense of peculiarity to this otherwise tranquil neighborhood.\n\nSince the day before yesterday, thousands of French Israelists have been gathering in the area from across France. They hold grand assemblies, drawing crowds of locals and tourists who stop to listen. Meanwhile, Jewish residents discreetly open their windows to observe the impromptu gatherings.\n\nThese Israelists, emerging from the currents of French nationalism, claim that the French ancestors, the Merovingian dynasty of the Frankish kingdom are the direct lineage of the Ten Lost Tribes of Israel. In other words, they believe that the French are the inheritors of the ancient Jewish people—chosen by God to build the greatest empire and to single-handedly rebuild civilization after the apocalypse, enjoying God's exclusive favor.\n\nWhile these claims may seem absurd to outsiders, the Israelists, deeply influenced by mystical societies such as the Priory of Sion, firmly believe in the unique destiny of the French nation. Interestingly, despite Paris police monitoring the gatherings for several days, they have taken no action to restrain these fervent believers. As for the onlookers, it's hard to tell whether they find the Israelists' proclamations laughable or if they are beginning to question their own skepticism."
 Nationalist_France.7.a: "Maybe we WERE the Lost Tribe!"
 Nationalist_France.8.t: "Parade of National Salvation"
 Nationalist_France.8.d: "Since the Government of National Salvation declared victory over the civil war throughout Paris, it was not uncommon to see military parades across the streets of the capital in the coming weeks. Unexpectedly though it has been noticed that lately in tandem with the flag of the new French regime the civilians and even military regiments have been seen flying banners and flags of the monarchist houses that have historically ruled France. This has been rather unexpected by the high command, although in recent news, monarchist sentiment throughout the country has been ever steadily increasing as it becomes more evident that monarchism is making its return across France."
 Nationalist_France.8.a: "Where's my crown?"
 Nationalist_France.9.t: "François Lecointre Parades around Paris"
 Nationalist_France.9.d: "Regarded by some as the saviour of France, François Lecointre made a rare public appearance in the capital as yet another parade had commenced. The sighting of Lecointre brought the people of Paris into another patriotic fervor as it felt just as if France had been reunified once again. The Parade consisted of going through several historic landmarks of Paris before stopping finally at the Effiel Tower where the official reopening ceremony was to take place with François to cut the ceremonial ribbon. The crowd that had amassed of patriotic citizens rejoiced as the ribbon was cut and the public once again had access to their beloved landmark. "
 Nationalist_France.9.a: "Three Cheers for Lecointre!"
 Nationalist_France.13.t: "Franco-Italian Summit"
 Nationalist_France.13.d: "The French Ambassador stepped along the Via del Plebiscito towards Palazzo Venezia, it had long been the building Benito Mussolini used to give his speeches from, the new government of Italy decided to make it the meeting point for foreign dignitaries, it was an ancient and grand building. The Ambassador looked upon the famous Balcony as he treaded closer, his heart felt a mix of wonder and fear as the ancient flags of his grandfathers enemies hung from the Balcony. The scene missing only a certain bald dictator to make it a spectacle not seen in 80 years. Today the ambassador was arriving to Palazzo Venezia to express the intent of Paris to make a summit for Franco-Italian relations, as he stepped into the interior of the old structure he kept his eyes focused on the Italian delegation sent to receive him, they paraded through the halls to a meeting room where the details of the meeting were to be set, it was a warm reception, the Italian Delegation had prepared a plate of Parmigiano Cheese and Toscano Chianti Wine for the room to enjoy while the discussions were ongoing. After some deliberation and negotiation the meeting point was agreed to be on neutral ground, the small Principality of Monaco, a brilliant little casino city, hotel for the rich, playground for businessmen. A perfect place to lay down the groundwork for a blossoming future relationship."
 Nationalist_France.38.t: "On the Spanish question"
 Nationalist_France.38.d: ""
 Nationalist_France.38.a: "We need allies, not subjects"
 Nationalist_France.38.b: "The Spanish cannot be trusted to govern themselves"
 Nationalist_France.13.a: "We shall meet in Monaco"
 Nationalist_France.131.t: "Franco-Italian Summit in Monaco"
 Nationalist_France.131.d: ""
 Nationalist_France.131.a: "We will be there."
 Nationalist_France.132.t: "Entry of the Gladiators"
 Nationalist_France.132.d: "It was the day of the meeting, Monaco had allowed both a French and an Italian formation of troops to march through the city, the Principality decided it would make for good fanfare and entertainment, not every day do you see a military parade breaking the splendor of Monaco. Both nations picked a regiment and both had them wear ceremonial uniforms. This day was a day of importance for both nations and the parade was as important as the negotiations themselves. The French Delegates watched from a nearby hotel as the Italian formation drew nearer to their end point. Comparing them to their own forces some jeered, some nodded approvingly, one can imagine the Italian delegation across the street was doing similarly.\n\nAs the forces of Italy came to a stop the delegation was quiet for a time, polite applause and cheers from the spectators rang out as the two nations forces stood side by side for the first time in a good while, their flags different but their people and uniforms speaking more to how similar they are than how different they are. The opinion of the French delegation was mixed, ultimately The French Ambassador turned to his delegates and addressed them with one line signifying the behavior they would soon treat the Italian Delegation with."
 Nationalist_France.132.a: "A Ceremony befitting of the Romans!"
 Nationalist_France.132.b: "The Italians are unfit to rule!"
 Nationalist_France.133.t: "Success in the Monaco Summit"
 Nationalist_France.133.d: "The French Ambassador and Italian Ambassadors shook hands in front of their respective flags before sitting down, the two delegations looked across the table with neutral and wary expressions, the fanfare and pleasantries were tiring, the food was gone, the wine was dry. Business was to be gotten to, for hours they spoke of spheres of influence, over Mediterranean domination, the Italians were especially prideful of their fleet and voiced their strong intention to become the greatest naval power in the Mediterranean, France avoided the topic of Nizza and Corsica whenever it was brought up, masterfully the conference avoided issue, the two Nationalist Governments were able to come to an agreement, their first negotiated joint effort on the world stage would bind them together as brothers in arms, the Bern Initiative was drafted, borders made, and the dissolution of Switzerland was plotted behind closed doors by two nations within the splendorous embrace of a Monaco Hotel. Embracing as brothers, the ambassadors left Monaco promptly to deliver the news to their leaders."
 Nationalist_France.133.a: "Brothers Forever!"
 Nationalist_France.134.t: "Failure in the Monaco Summit"
 Nationalist_France.134.d: "The French Ambassador and Italian Ambassadors shook hands in front of their respective flags before sitting down, the two delegations looked across the table with neutral and wary expressions, the fanfare and pleasantries were tiring, the food was gone, the wine was dry. Business was to be gotten to, for hours they spoke of spheres of influence, over Mediterranean domination, the Italians were especially prideful of their fleet and voiced their strong intention to become the greatest naval power in the Mediterranean, a French delegate laughed and it sparked a heated argument between both sides, the Italian delegation became inflamed with territorial revanchism as the tensions boiled, demands for Savoie, Nice, and Corsica began to fly, the French Delegation having few claims of their own simply diminished their power with returning comments about their armies size and discipline, the meeting would end suddenly as a brawl between two delegates nearly led to a room wide melee, the Public Security of Monaco rushed into the room and broke up the meeting, dispersing the two sides and linking up with the Compagnie des Carabiniers du Prince to escort both nations delegations back to the airport safely."
 Nationalist_France.134.a: "Let us reach out to the Spanish"
 Nationalist_France.135.t: "Bern Initiative Activated"
 Nationalist_France.135.d: "As designed during the Monaco Summit, the Bern Initiative would split the nation of Switzerland into its ethnic parts between German, Italian, and French peoples, and annex them into their respective governments. Coordination between the German, Italian, and French militaries meant this initiative would be the very first military joint action of the Pact of Steel, Switzerland has long since passed it’s golden era of defensive fortifications and has found itself surrounded entirely by unfriendly nations hellbent on its demise. The government in Bern is likely to fold. As Wehr, Esercito, and Armee units build up along the border there is no amount of mountain forts and rigged bridges that can stop what is inevitably coming."
 Nationalist_France.135.a: "We shall reclaim Helvetia!"
 Nationalist_France.136.t: "Diplomatic Ties with Italy Severed"
 Nationalist_France.136.d: "The Italian Ambassador informed the French State Department today that he was delivering his last message to us as Italy's Ambassador, "Remove your Ambassador from Rome in the next 48 hours."\n\nGiving us so little time to respond is a very hostile action, a treachery expected of the Italians, as their Ambassador boarded a plane bound for Rome a message was sent to our Embassy in Rome ordering them to pack up and return home within 48 hours according to the orders of the Italian Government. Several Transport Planes under escort were sent to Rome, the German Ambassador summoned us in Berlin to inquire on what is happening. It appears the brief hope that Europes Nationalists could be peacefully united against the Bolshevik threat has been dashed early, and governments in Rome, Berlin, Paris, and Madrid alike all shuffle in panicked contemplation over what the future of Europe is to be.\n\nThe Bern Initiative, which would have been a joint effort between Italy and France, is gone now. Splitting Switzerland will have to wait while we put together a new initiative to address the newly hostile government of Italy, the Piedmont Initiative. Perhaps it is time to expand the horizons of what France should be, Paris should perhaps be not just Capital of France, but what about the Capital of the Latins? If Napoleon can be Emperor of the Romans surely we can reprise this title again if the Italians will not work with us hand in hand. Send the plan to the General Staff. We have new orders for them."
 Nationalist_France.136.a: "Begin the Piedmont Initiative."
 Nationalist_France.137.t: "Italians Reach Out"
 Nationalist_France.137.d: ""
 Nationalist_France.137.a: "France worries me."
 Nationalist_France.137.b: "France are our allies!"
 Nationalist_France.14.t: "France demands Mediterranean Holdings"
 Nationalist_France.14.d: ""
 Nationalist_France.14.a: "FUCK your demands"
 Nationalist_France.14.b: "We cannot stand against them..."
 Nationalist_France.15.t: "France demands Annexation"
 Nationalist_France.15.d: ""
 Nationalist_France.15.a: "FUCK your demands"
 Nationalist_France.15.b: "We cannot stand against them..."
 Nationalist_France.20.t: "Chateau Restoration Act"
 Nationalist_France.20.d: "His Majesty, Louis Alphonse de Bourbon, has declared that in order to restore the national and divine glory of the French aristocracy he will dedicate a portion of the Royal Budget over to the beautification and renovations of Châteaux across the nation under the Chateau Restoration act. This will be met with pushback as the subjects across the nation currently would prefer if their hard-earned money was not being spent on the aristocracy.. But who cares?"
 Nationalist_France.20.a: "I mean they are in disarray..."
 Nationalist_France.21.t: "[FAF.GetLeader] announces tax breaks for Chateau owners"
 Nationalist_France.21.d: "Due to the financial stress being mounted onto the nobility through the Chateau Restoration Act, King Louis Alphonse de Bourbon has masterfully enacted massive tax breaks for owners of buildings that are classified as Chateaux. While this will impact the revenue that comes from the Chateaux, the aristocracy has been too much of a crucial support to deny them their deserved benefits."
 Nationalist_France.21.a: "They deserve it too!"
 Nationalist_France.22.t: "Lavish Party thrown in Versailles"
 Nationalist_France.22.d: "After finishing a small renovation in the historical Palace of Versailles, Henri de Castries, a retired CEO and the grandson of Former Minister of Defense Count Pierre de Chevigné, has rented out the entire palace from the French government to hold one of the largest-seen Ballroom dance in centuries, with hundreds of wealthy guests attending.\n\nThe guest list is rumoured to include high ranking members in the French military, all three claimants to the French throne, escaped American superstars, former Russian oligarchs, and even King Charles III."
 Nationalist_France.22.a: "It's their right!"
 Nationalist_France.22.b: "We should all be tightening our belts..."
 Nationalist_France.23.t: "Pierre-Louis de La Rochefoucauld demands restoration of Noble Privilages"
 Nationalist_France.23.d: "In a surprising move from someone who many considered a complacent member of the upper class, Pierre-Louis de La Rochefoucauld has accumulated over 600 signatures from former French noble families demanding a restoration of royal titles. These titles, granted to them from the French monarchs of old, have either disappeared through centuries of unfriendly governments, or are in such squalor that they mean nothing anymore."
 Nationalist_France.23.a: "These are whole histories we are talking about!"
 Nationalist_France.23.b: "Be happy with what you have..."
 Nationalist_France.24.t: "Royal Pretenders emerge"
 Nationalist_France.24.d: "Since King Louis Alphonse de Bourbon restored the noble titles of several historic and notable royal houses throughout the nation, there have been certain instances of people abusing the restoration for their own personal gain. Particularly and most notably, the presumed head of the House of Orléans and House of Bonaparte have petitioned the king to right the wrongs of the past century due to the republic government France was under. However, they both are refusing to renounce their claims to the royal purple of France causing tense political strain between the Royal Houses."
 Nationalist_France.24.a: "We don't need three of you!"
 Nationalist_France.241.t: "Split opinions on the Interior Minister"
 Nationalist_France.241.d: "Although we have complete control, the relatively new government is lacking in experienced ministers, leading to our current situation. \n\nOur choices are Charles Bonaparte and Laurent Marcangeli. Bonaparte is a unfortunately a lifelong liberal, but despite having the last name of Napoleon, he has pledged his loyalty to King Louis and abandoned his lineage. Marcangeli, however, is the choice of most nobles because of his ability to organize pro-Monarchist groups during the Villiers presidency, but is an avid Bonapartist and has yet to bow to our King Louis. \nFinally, Queen Marie has begrudgingly, but successfully, been running the interior ministry since her husband was crowned. She could continue to lead the interior minister, but it may not be the best for the royal family."
 Nationalist_France.241.a: "Charles Bonaparte"
 Nationalist_France.241.b: "Laurent Marcangeli"
 Nationalist_France.241.c: "Queen Marie!"
 Nationalist_France.25.t: "Noble speaks out in favor of Jean d'Orléans"
 Nationalist_France.25.d: "''I stand before you today to voice my unwavering support for Jean d'Orléans to ascend to the throne as our rightful king. His lineage as a member of the House of Orléans, coupled with his remarkable intellect, unwavering dedication to our nation, and his genuine compassion for the people, make him the ideal candidate to lead us in these tumultuous times. Jean possesses the charisma and wisdom needed to restore stability and unite our fractured country. His vision for a more egalitarian society, where the rights and well-being of every citizen are upheld, resonates deeply with me and many others who yearn for a just and prosperous France.\nIn an era marred by political strife and disillusionment, Jean d'Orléans offers a beacon of hope. His progressive ideas and commitment to reforming outdated systems have the potential to usher in a new era of prosperity and social harmony. Moreover, his experience as a diplomat and his extensive knowledge of international affairs equip him with the skills necessary to navigate the complex web of geopolitics. By embracing Jean as our king, we not only honor our historical legacy but also embrace a future where fairness, compassion, and progress can flourish. Let us come together, set aside our differences, and rally behind Jean d'Orléans as we embark on a journey towards a brighter future for France and all its citizens.''"
 Nationalist_France.25.a: "You sound like a liberal."
 Nationalist_France.26.t: "Noble revealed to be part of underground Republican movement"
 Nationalist_France.26.d: "One of our Nobles whom we had considered to be a close friend and proponent of the Bourbon Monarchy, turned out to be not only a traitor but aiding the underground Republican movement that wishes to overthrow our beloved monarchy. Thankfully his secretary, a loyal and patriotic subject of the crown, reported her findings to the proper authorities and we managed to capture him earlier in the day. Now we have the decision to punish the traitor or show mercy.. both will have effects and show the people of France our message on treachery. "
 Nationalist_France.26.a: "Hang him for all to see!"
 Nationalist_France.26.b: "Everyone is entitled to their own opinions."
 Nationalist_France.27.t: "Noble revealed to be behind string of murders"
 Nationalist_France.27.d: "Terrible.. just terrible. King Louis Alphonse de Bourbon and his court have worked tirelessly around the clock to repair the relations between the monarchy and their subjects only for this to be reported. What authorities have deemed one of the most disturbing string of murders since Gilles de Rais, we have the opportunity to expel this stain on our nobility.. although it should be noted, the nobleman specifically has financed substantial parts of our Kingdom since its creation."
 Nationalist_France.27.a: "He is too crucial to be arrested."
 Nationalist_France.27.b: "A Disgusting stain on the Nobility."
 Nationalist_France.28.t: "Province of Dauphiné awarded to Louis, Dauphin of France"
 Nationalist_France.28.d: "The Province of Dauphiné has recently been awarded, under the order of King Louis Alphonse de Bourbone, over to his heir Louis XXI. This has been commemorated by the press and other nobles of France supporting the young monarch's appointment as the ruler of Dauphiné as the first step in his upbringing to inherent the title of King. The young heir plans to embark on his pilgrimage across the province to learn about its history and subjects as his first plan of action."
 Nationalist_France.28.a: "Hail Louis XXI!"
 Nationalist_France.29.t: "Noble caught in Pedophile Ring"
 Nationalist_France.29.d: "An absolutely despicable and disgusting allegation has been made towards one of the nobles of our court. Allegedly he was seen during an undercover investigation at a paedophile ring the authorities were conducting. News has not spread outside the investigation, and we have an important decision to make.. do we dig deeper into the rabbit hole or do we solve this now and be done with it?"
 Nationalist_France.29.a: "That's it! Launch an investigation on the whole Class!"
 Nationalist_France.29.b: "5 years, sweep it under the rug..."
 Nationalist_France.30.t: "Establishment of Ideals"
 Nationalist_France.30.d: "In a shocking move, the young dictator of France, Jordan Bardella, has announced a new step in his plan for Latin Dominance, the consolidation of power into one of the three branches of the Identitarian caucus. The caucus, made up of the Latinists, the Imperialists, and the Europeanists, have acted in tandem since the takeover by Bardella and all fight for their own brand of Identitarianism, but all have different goals. \n\nThe Latinists view France as the modern iteration of the Roman Empire, and wishes to unite the country, and the Latin people as a whole, under a revived Western Roman Empire. \nThe Imperialists fight for a restoration of the French Empire and a return to Napoleonic rule over France, seeing Napoleon and his heirs as the only group who have successfully unified the Latin people in modernity. \nFinally, the Europeanists disregard any connection to Latinism and instead embrace the idea of a unified European nation. \n\nNow, after the establishment of a government following Identitarian ideals, the representatives of the Identitarian councils across the nation will choose who shall become the leader of their organization."
 Nationalist_France.30.a: "The Empire Returns"
 Nationalist_France.30.b: "Long Live Napoleon VIII!"
 Nationalist_France.30.c: "For a Pure European Nation!"
 Nationalist_France.31.t: "Unification of the Latin Realm"
 Nationalist_France.31.d: "Caesar, Augustus, Charlemagne, Louis XIV, and Napoleon. All great legends, conquerors, and all part of the greater Latin peoples. Throughout human history, the Latin people have been the pinnacle of humanity, from being the cradle of civilization to the great empires such as Rome, the Carolingians, and modern French people. For far too long, the Latin people have been trampled on, from the cowardly bureaucrats that supported the replacement of our people to the foreign elite that funded the desecration of our culture.\n\nThe unification of the Latin peoples is not merely a political ambition but our natural destiny. After the defeat in the war against the Asiatic communist horde, it looked desperate for France and the rest of Europe, but just like in Tours, when the great Latin people defeated the Arab invaders, we shall rise again from the ashes. For the Latin people cannot be extinguished, despite the betrayals of the liberal elite and the exploitation from the Anglo-American powers.\n\nUnder the leadership of our great ruler Jordan Bardella, the Latin people have risen from the ruins of decay and, inspired by the greatness of our people and shared history, have united under one flag under our ancestral lands, one people united, once more. This great new empire shall rekindle the flame started by Rome, and despite the tragic fall of Rome this new state shall last for the ages.\n\nThe torches of the Latin people are alight across the Mediterranean, this time, forever.\n\nTu regere imperio populos, Romane, memento; hae tibi erunt artes; pacisque imponere morem, parcere subiectis, et debellare superbos."
 Nationalist_France.31.a: "Hail!"
 Nationalist_France.32.t: "Padanian Seperatists come out in Force"
 Nationalist_France.32.d: "In protests across Northern Italy, citizens have come out en masse in favor of the establishment of a Northern Italian nation-state dubbed the ''Kingdom of Padania.'' These groups have been known to our government for a while and are funded by the French State to our West, but were supposedly only few in number."
 Nationalist_France.32.a: "How can you call yourselves fascists!"
 Nationalist_France.32.b: "We are all Brothers!"
 Nationalist_France.320.t: "Padanian Pushback"
 Nationalist_France.320.d: "The Padanian Revolutionaries to our east, in the northern reaches of Italy, are a people that have fought and deserve every right to independence. They are fighting for their own means and for their own people, their own cultural identity. Who are we to disagree with that?\n\nIt would be hypocritical of us to not protect and take under our wing those people who are fighting for their own identity and sovereignty, that is what we were forced to do and fight for in the shadows for years, just as they are now. We shall put our weight behind their movement, make Italy 'reconsider' their decision to not respect the Padanian people."
 Nationalist_France.320.a: "They deserve freedom!"
 Nationalist_France.328.t: "Home of the Latins, What Will You Be?"
 Nationalist_France.328.d: "Italy fought to be unified in the 1860's, it has not been a nation for two hundred years yet and now under our grasp it has fallen to separatists we have funded. They are at foreign mercy again, it is a pity to see a people brought so low that millions cheer for their own downfall. Padania was created as a convenience to give us a reason to enter Italy and seize it, but we cannot discount the Bonapartist role in even unifying Italy to begin with. Italy was but a small Sardinia-Piedmont, and with the aid of Napoleon III Italy was brought under Savoia rule, should we not forget that this wide nation was of our founding? Would it truly be the best for our future to keep Italy broken into manageable parts? Or should we revive our brothers and strengthen them as we had in the past? Hoisting Italy up to be a great nation among great nations again, albeit under Parisian guidance and Bonapartist leadership."
 Nationalist_France.328.a: "Brotherhood!"
 Nationalist_France.328.b: "No, they're too different"
 Nationalist_France.33.t: "French forces reinforce Padanian Seperatists"
 Nationalist_France.33.d: "Concerning reports have come over to us in Rome, as the French army has been seen in active collaboration with the Padanian separatist movement. Such acts are completely unforgivable to us, viewing their allies as worth less than a rebel group that happens to somewhat align with their ideals?! Preposterous!"
 Nationalist_France.33.a: "An outrage! Prepare our battle plans!"
 Nationalist_France.34.t: "Gianluca Ionnone shot in Italian Villa"
 Nationalist_France.34.d: "For more than two decades Gianluca Iannone warned Europe of what was to come and to prepare for the incoming red tide. This second Duce of Italy, the eternal leader of CasaPound, worked day and night for the betterment of his European kin and Latin brothers. He had envisioned a strong and united Europe, connected through blood and ideology. Wise and monumental visionaries such as Iannone only appear once in a few centuries.\n\nYet like so many historical prophets, he left us too early, too soon. Taken away from us by traitors that live among us! Murdered by those god-forsaken Communists and the globalists, both of whom are deep in bed with the Russian menace! They are wrong if they think they can break our spirits and destroy our cause. Iannone's assassination was just the beginning of the Bolshevik meddling with Italy's politics so Italy must tighten its relationship with its European brethren. They can kill a man but not his ideals and principles of Iannone will be taken to heart all across Europe. Today, European blood was shed on our land, but tomorrow it will be their land, their blood, and their people who will pay for their wrong doings!"
 Nationalist_France.34.a: "A Visionary has passed..."
 Nationalist_France.35.t: "Collapse of CasaPound authority"
 Nationalist_France.35.d: "It is evident that the situation on the Italian peninsula has gone far beyond our initial expectations. Following Iannone's assassination, the local national Council of Fascists fell into chaos, unable to elect a capable and influential successor. Various factions and local forces took advantage of the power vacuum left by Iannone's demise, scrambling for control and causing the situation to fragment even further.\n\nMeanwhile, the unrest has continued to intensify, with social order all but vanished. The French forces we previously deployed to support the Kingdom of Padania were ultimately compelled to occupy Rome and establish a protectorate whose reach barely extends to the capital and its surrounding regions. Though this move has temporarily stabilized Rome, its influence is exceedingly limited, with little ability to affect broader areas.\n\nHaving successively lost the two key strategic territories of northern Italy and Rome, the remnants of the Italian Social Republic under Giancarlo Cito were forced to retreat south. There, they hoped to regroup, only to find themselves in dire straits: the joint street blockades created by communist mobs and criminal families stood like iron walls, drastically confining their operational space. In such harsh circumstances, they can barely maintain control over a handful of cities, leaving their prospects bleak and their future uncertain."
 Nationalist_France.35.a: "The Death of Italy"
 Nationalist_France.350.t: "France Demands Italian Diplomatic Isolation"
 Nationalist_France.350.d: ""
 Nationalist_France.350.a: "We have our price"
 Nationalist_France.350.b: "Never!"
 Nationalist_France.351.t: "Germans Abandons Italy"
 Nationalist_France.351.d: "The German Ambassador delivered his remarks to the State Department today, giving us the green light to invade Italy, the Germans cautioned an invasion stating such an invasion may open Europe to further Soviet incursion, but they haven't seen our plans. This won't be a new Peninsular Campaign, this will be a swift victory over a weaker brother. With the green light glowing brightly over our armies we can begin our campaign to seize Rome. The Mechanized Forces peer over the Alps like Napoleon on horseback some 200 years ago. Our Amphibious forces itch for the bright white sands of Sardinia."
 Nationalist_France.351.a: "Our plans fall into place"
 Nationalist_France.352.t: "Germany stands with the Italians"
 Nationalist_France.352.d: "The treacherous bastards have stood with the Italians. Likely out of nostalgia for the last world war they have decided Rome is somehow a better one to appease than Paris, some nerve. The Germans would do well to remember how weak they have become in this past century, we French will prevail even if we must be forced to stand back today. France is destined to control all of the Latins whether or not the Germans agree! We are the strongest Latin nation, we seek prosperity and unity for the Latin peoples and the Germans would dare to keep this from happening!"
 Nationalist_France.352.a: "Fine! We will find other ways to retake Rome..."
 Nationalist_France.36.t: "Spanish Monarchy arrives in Bourdeaux"
 Nationalist_France.36.d: "TODO SPanish monarchy shows up"
 Nationalist_France.36.a: "Spain shall soon be stabilized"
 Nationalist_France.37.t: "Fate of Spain"
 Nationalist_France.37.d: "Spain, a nation whose history has been deeply entwined with ours. From the Battle of Rocroi during the Bourbon era to Napoleon's Peninsular War, we have clashed countless times with the Spanish, locked in blood and fire. For centuries, the grudges and conflicts between our two countries have been an unbreakable thread woven into the fabric of our destinies.Yet the once-mighty empire on which the sun never set, dispatching fleets to the Seven Seas, fielding the formidable Spanish Tercio that stood solid on the battlefield, has now collapsed in fratricidal strife. \n\nIt seems Spain's fate has quietly fallen into our hands, and as we confront this fractured land, the question remains: How shall we reshape its future?"
 Nationalist_France.37.a: "Maintain Franco-Catalan Garrison"
 Nationalist_France.37.b: "Establish French Province of Catalonia"
 Nationalist_France.37.c: "Spain must be pacified by Force"
 Nationalist_France.39.t: "Fate of Portugal"
 Nationalist_France.39.d: "Portugal lies just beyond our borders, our forces sit along the border looking in at the wartorn strip of Iberia, we have the chance to enter and stabilize the situation or if things have stabilized, we have the chance to change things to our liking. We French all learned in school of the Peninsular Campaign, it's tragic end and it's bog like effects on Napoleons campaigns. We know controlling Portugal is paramount to lasting stability. We are fortunate that the UK is disinterested in aiding Portugal this time around. We have a few options. We can issue an ultimatum, we can perhaps simply walk in since we are prepared, or if Lisbon is in the hands of someone we happen to be able to work with, we can demand they work in line with us. "
 Nationalist_France.39.a: "Demand Compliance"
 Nationalist_France.39.b: "We must restore order"
 Nationalist_France.39.c: "Recognition for Deradicalization"
 Nationalist_France.40.t: "Death or Dishonor"
 Nationalist_France.40.d: "It was not so long ago that the red hordes from the East swept through our land, slaughtering our people and ravaging our homes. The soil remains salted with the tears of our beloved people, while the Bolsheviks looted our country, seizing the last scraps of what they could carry. Suffice to say our hatred for the Russians is immeasurable. A fiery thirst for revenge burns within the heart of every citizen.\n\nYet, we are not blind to reason. Vengeance must not cloud our judgment, especially in times as perilous as these.\n\nThe French urge us to join their so-called Anti-Soviet Pact, a coalition to push back against the ever-growing communist menace looming to our east. But aligning ourselves with them would surely incite the wrath of the Russians—a fury we may not be prepared to withstand. Our nation is still rebuilding, its wounds fresh, its strength untested. We lack the manpower and industrial might to wage war against the new ruler of Europe.\n\nThe French, of course, promised us protection. They assure us of military aid and unwavering support. Since the collapse of the United States, France alone stood as NATO's strongest military power. Even after the devastation of the Russo-European war, their army remains a formidable force, not to be underestimated.\n\nAnd so, the choice before us is as stark as it is brutal.. Shall we live in fear and humiliation, shackled by our defeat? Or shall we march toward death, unbowed, with pride and glory?"
 Nationalist_France.41.a: "Join the Anti-Soviet Pact"
 Nationalist_France.41.b: "Decline the French invitation"
 Nationalist_France.42.t: "First Election of the New Republic"
 Nationalist_France.42.d: "After being called by Villiers, the results of the First Election are clear to none of the observers. There are three parties in the running, all of which are largely equally popular with the French people.\n\nLes Republicains, the forerunner in most people's minds, is a movement nearly identical to the National Rally before it - a conservative movement looking to bring back the traditional values of France while maintaining the democratic system and balance of power.\n\nAlong with this, there is the Democratic Movement, a centrist party that has existed since before the fall of France to the soviets. Aligning itself as the reasonable and sensible option, it moves forward with a much more centrist and liberal view than either of the parties that it competes against.\n\nFinally, the National Conservative Union - an odd hodge-podge of conservative and military values. They stand themselves as a much more patriotic conservative party than LR, thinking of themselves as the true continuation of the dream of Villiers and De Gaulle, of a traditionalist, patriotic France."
 Nationalist_France.42.a: "Les Republicain secures the Win!"
 Nationalist_France.42.b: "Democratic Movement secures victory!"
 Nationalist_France.42.c: "National Conservative Union secures a steady Majority!"
 Nationalist_France.45.t: "''Lafayette'' goes Dark"
 Nationalist_France.45.d: "Fighting bravely in the defense of his capital, our glorious leader ''Lafayette'' has been missing from his command post following a planned ambush of Russian command stationed near the wreckage of the Eiffel Tower. The helmet of Lafayette was found stashed in a burnt-out car before an all out retreat was called, and although a handful bodies were recovered from the site of the ambush, there is no indicator of who is and who isn't our Great Commander. \n\nWith no body to confirm his death, his Aide-De-Camp, General Nikola Perović has announced on a makeshift stage somewhere outside the Parisian suburbs, that until the Commander is found, he will reign in his stead, and within the same breath calling for a suicidal and all-out attack on Russian lines to avenge the missing Commander."
 Nationalist_France.45.a: "He fights on within every soldier"
 Nationalist_France.46.t: "Anti-French Businesses Looted"
 Nationalist_France.46.d: "Self-hatred is one of the nastiest values not only a person can have but a country. For years in the modern era, this has been normalized with not only outsiders hating the nation of France but her own people too. Now, as our regime comes into full power, the people have decided they will not stand for this anymore as numerous reports are being sent in about anti-French buildings being looted, burned, and so on. France will be patriotic and those who cannot accept that have no place in our great nation."
 Nationalist_France.46.a: "It is what they deserve"
 Nationalist_France.47.t: "''Destruction de l'âme de l'Europe'' releases"
 Nationalist_France.47.d: "Destruction de lâme de l'Europe will be defined as the greatest historical epic of French cinema and showcased throughout the world as the triumph of our filmmaking capabilities. The showing of Destruction de lâme de l'Europe was sold out for weeks with our patriots showing up by the droves to witness the historical epic of our regime saving France with the sword. Even abroad, it is being recognized with showing in German, Italy, and even the United Kingdom, having similar reports of theaters being sold out to witness the glory of our nation captured through the camera."
 Nationalist_France.47.a: "It's... beautiful..."
 Nationalist_France.48.t: "Patronage of the Modern Arts"
 Nationalist_France.48.d: "Our righteous and thoughtful Monarch, King Louis Alphonse de Bourbon has masterfully allotted part of the Royal Budget towards the production of an art production to illustrate our King's patronage for the arts of France. The hardest part comes from the decision of what we should use the budget for, already we have had many suggestions coming out of the Royal Modern Arts Council mainly two were selected as the most popular choices. First comes a pro-monarchist social media platform, Couronne, a movie about King Louis Alphonse de Bourbon and his exploits and rise to fame. Secondly we have XX, a pro-monarchist social media website for the subjects of France to express their love for our dearly beloved monarch. We have drafted up the proposals and sent them to King Louis Alphonse de Bourbon awaiting his approval for one of the projects."
 Nationalist_France.48.a: "A Movie about our King and his Exploits!"
 Nationalist_France.48.b: "A Place for loyal subjects to meet online!"
 Nationalist_France.49.t: "Release of XX"
 Nationalist_France.49.d: "XX will be one of the greatest movies of not only French cinema history but of the entire world. It was masterfully handcrafted by our carefully selected film crew to portray the events and lead up of the First European War and how our monarch rescued the nation of France during its darkest hour. Most surprising was the accurate selection of the casting with mainly generals, politicians, and even the King himself, Louis Alphonse de Bourbon, pointing out how their film counterparts looked remarkably similar to themselves. After the showing was finished, the King met with the director and crew and commended them for this historic film."
 Nationalist_France.49.a: "A Cinematic Masterpiece!"
 Nationalist_France.50.t: "Failure of XX"
 Nationalist_France.50.d: "That was terrible.. XX is already scheduled to be sent immediately to DVD after not even a week of screening across France. The production was mismanaged as several members of the crew were removed and replaced due to incompetence, and even changing directors four different times under the order of our monarch. The casting was terrible with the King being played by someone who did not even look closely to our monarch, which had angered Louis Alphonse de Bourbon enough into leaving the screening, not even after the first scene."
 Nationalist_France.50.a: "Who approved of this shit?"
 Nationalist_France.51.t: "Launch of ''Couronne''"
 Nationalist_France.51.d: "Oh Couronne, where do we start.. the creation of the social messaging platform was divine with the top technology developers of the nation handcrafting the website to perfection. If Couronne had been a statue we would have it in the Louver along with the greats of our nation. The website launched earlier today with overwhelming positive reception as hundreds of thousands of loyal subjects signed up to spread their support for our beloved Monarch. The servers barely held together when King Louis Alphonse de Bourbon himself sent his first Couronne, immediately being cheered by almost the entire website. This platform will go down in the history books as another successful project by our thoughtful monarch."
 Nationalist_France.51.a: "Monarchists of the interweb unite!"
 Nationalist_France.52.t: "Launch of ''Couronne''"
 Nationalist_France.52.d: "I hate this fucking shit. We tried to make Couronne an innovative and revolutionary social media website for the subjects of France only for the servers to get raided minutes after the release of the social messaging platform. It was horrible with anti-monarchist sentiment flooding the channels and horrible combat footage of the European War, with what appeared to be mainly the Russian degenerates doing. We had to pull the plug after just a few hours of the website due to our moderation team being nonexistent.. all those taxpayers' dollars to waste."
 Nationalist_France.52.a: "Oh thats gore.. gore of French soldiers..."
 Nationalist_France.53.t: "France Demands Bourbon Unification"
 Nationalist_France.53.d: "TODO France Demands Bourbon Unification"
 Nationalist_France.53.a: "Never!"
 Nationalist_France.53.b: "Long Live King Louis II!"
 Nationalist_France.54.t: "Report on Seige of Verdun Major Command Center and Arms Depot"
 Nationalist_France.54.d: "As of [?global.date.GetDateString], the defenders of the Verdun Major Command Center, as well as the Verdun Arms Depot, have repelled our attack on four different occasions. \nAlthough these supplies could be useful, the troops held within the pocket of the corrupt Republic are holding firm and, if broken out, would threaten our already tenious hold of Grand Est. \nI have permitted a round of high-explosive ordinance with a coordinated airstrike to level the both complexes. \n\nSigned,"
 Nationalist_France.54.a: "[THIS.GetRank] [THIS.GetName]"
 Nationalist_France.55.t: "Report on Seige of Verdun Major Command Center and Arms Depot"
 Nationalist_France.55.d: "As of [?global.date.GetDateString], the ongoing seige on the Verdun Major Command Center, as well as the Verdun Arms Depot, has ended. \nThese supplies, numbering around 7.5 thousand HK416 F and around 300 command equipment, should aid us in the creation of new units for the reconquest of France from the unwashed hands of the Republic and the Communards in the South. \nI have permitted the soldiers, on this occasion, to celebrate their victory with a ration of wine. \n\nSigned,"
 Nationalist_France.55.a: "[THIS.GetRank] [THIS.GetName]"
 Nationalist_France.56.t: "Patriot Front Volunteers Arrive"
 Nationalist_France.56.d: "News of our violent outburst of civil war has taken the global stage by storm as did the Second American Civil War years prior. With little support for our righteous regime, we did get notified of something.. friends from abroad. One of the young officers, Lafayette, has notified the high command that some seasoned veterans that he had met with years prior during his time overseas fighting for the Patriot Front organization. While we could care less about the barbarism across the Atlantic refusing this opportunity would be foolish on our behalf. "
 Nationalist_France.56.a: "Keep them on a tight leash."
 Nationalist_France.57.t: "Absorb Conservative Soldiers"
 Nationalist_France.57.d: "Conservatism.. an ideology that has been one part of the great problems of France. Even though they are better than the communards who wish to see the destruction of France and everything we stand for our government has the opportunity to right the wrongs of the fifth republic and finally enact serious change and reform. The decision now lies at the hands of our officers and commanders with the choice being standing with our values or compromising to ensure we fight another day… the choice is theirs. "
 Nationalist_France.57.a: "They stand for French Values."
 Nationalist_France.57.b: "They are no better than the Communists!"
 Nationalist_France.58.t: "The Plague of Socialism"
 Nationalist_France.58.d: "No corner of France is safe from this wave of violence across the country. Our once proud nation has been destroyed at the hands of the filthy communards across the continent and now we are enthralled in another brother war against our own countrymen. In our moment of weakness not only have they destroyed everything we have had but they now wish to go further by raising France under the red banner of their fanatical and vindictive parasite of an ideology. We will start by uprooting this nasty plague of thought from our countrymen and onwards until we once and for all rooting out this plague from Europe. "
 Nationalist_France.58.a: "We must root them out!"
 Nationalist_France.59.t: "Form Child Patriots Brigades"
 Nationalist_France.59.d: "Children have always been a heated topic in warfare, but in our dire frontline situation and our able-bodied manpower getting low we need all the help we can get.\n\nWhy waste our already depleting resources on something like education? When instead, we could be employing them on the frontlines to assist our troops and fill in the auxillary and reconnaissance roles. They are of good use, as teenagers can almost be considered able bodied. Should we keep them in the classroom or employ them on the front?"
 Nationalist_France.59.a: "Welcome Young Francs!"
 Nationalist_France.59.b: "They are more use grown up."
 Nationalist_France.60.t: "Incorperate the Elderly"
 Nationalist_France.60.d: "Since the beginning of this war, we have expected a quick win but instead have faced catastrophic losses with each day our able bodied manpower is getting lower and lower, We require all the assistance on the frontlines to fill in the gaps.\n\nWe can pull the elderly out of hospitals and out of retirement, they are still able to be used as cannon fodder and in light support roles, If we promise to cover all their medical expenses or an increased retirement salary after the war they'll surely be willing to sign up and if not we can just force them into the frontlines. The addition of Elder brigades would provide a great distraction to the enemy, allowing us to use the little of the able bodied manpower we have to turn this war around."
 Nationalist_France.60.a: "Patriotism has no age limit!"
 Nationalist_France.60.b: "They wont be much use."
 Nationalist_France.61.t: "Penal Battalions"
 Nationalist_France.61.d: "The situation on the frontline is continuing to deteriorate, and we need all the help we can get. As our traditional manpower reserves drop increasingly lower, we must look to other sources. Currently, thousands of the scum of society rot inside our prisons, doing nothing other than draining our resources and wasting space. However, it doesn't need to be this way, even these thieves and murderers can be made into patriots. We have begun a program of offering freedom to prisoners who are willing to serve in the army, if they survive, that is. And if we don't get enough manpower from that, well, we can just force them. They will fight for their country and be proud!"
 Nationalist_France.61.a: "A murderer? Hand him a gun!"
 Nationalist_France.61.b: "We are desperate. Not Reckless."
 Nationalist_France.62.t: "The End of the World as we Know It"
 Nationalist_France.62.d: "We have restrained ourselves for too long as the death, destruction, and madness of war still rages on throughout the continent. Our beloved landmarks and history have been desecrated by the communards for the latter half of the decade, with no indications of any halt in their total war. We have watched our brothers fall and get stripped away of all forms of identity and culture they retained proudly after escaping the grasp of socialism that shackled them for decades, only to be held down by the same rotting plague once more. France had almost met the same tragedy as the rest of Europe, barely managing to hold ourselves together as we retreated back to the homeland with the same sense of defeat.\n\nWe now face the inevitable continuation of the dreaded European war, with total war being declared by all belligerents. We cannot hold ourselves back any longer; we cannot succeed while actively restraining ourselves and not taking every possible advantage we get. With the change of administration we have worked with former government personnel in order to restore our nuclear capabilities in preparation for this day of reckoning. The historians will not look at our decision favorably, but they will never understand the dire situation we face today. We will succeed at any cost and we will not look back until we have won. "
 Nationalist_France.62.a: "And I feel fine"
 Nationalist_France.63.t: "The Resistance"
 Nationalist_France.63.d: "A handful of traitors who disregard our national interests have recently incited unrest in the streets of Lyon, Marseille, and Toulouse.. even going so far as to launch despicable assassination attempts against our loyal civil servants. A senior official from Paris's 7th arrondissement was brutally attacked on the way home; a government office in Strasbourg was set ablaze.\n\nThese so-called "Resistance Fighters," calling themselves "Defenders of the Republic," are in reality agents of chaos and division. They spread lies, slander our grand effort to restore the nation's glory, and seek to drag us back into the feeble mire of the old regime. They paint slogans like "Liberty or Death" on walls, yet fail to grasp that true liberty can only be founded on order and unity. It's not hard to see that foreign forces are manipulating these rebels from behind the scenes those nations that once defeated France and now fear our resurgence are funding them with money and weapons, attempting to weaken us by sowing domestic turmoil. These traitors, willingly serving as the lapdogs of foreign interests, betray their own country and bloodline, truly contemptible.\n\nBut our government will not stand by in the face of such provocation. Our leaders have made it clear that these threats to national unity must be crushed with an iron fist. Ordinary citizens who support or harbor these rebels will also be held accountable. Silence is complicity, and bystanding amounts to abetting. Every true patriot has a responsibility to report suspicious activities to the authorities. The future of France depends on the vigilance and loyalty of every one of us."
 Nationalist_France.63.a: "They must be PURGED"
 Nationalist_France.64.t: "Night Of Purification"
 Nationalist_France.64.d: "Smoke rises from a lone cigarette, a man rocks in his chair looking upon the cityscape of Paris, a friend of his leans on a wall beside him.\n''Parisian nights are so beautiful, aren't they Conrad?''\nHe was met with silence, that was until Conrad began talking after a few moments.\n''You can't hide it anymore Fritz, we're doomed. That intel we got yesterday came from our best informant and was spot on, the police movements, barricades outside the city, the flights all canceled, they're preparing for something.'' \nFritz looked at Conrad before putting out his cigarette, the fizzling noise being drowned out by the pops and cracks in Fritz's old bones as he stood up. \n''You could be right, but that doesn't mean that we're doomed, we've covered our tracks well, they don't know of our 'sympathies' as they like to call them. And if they do find out, well.'' Fritz grabbed a double barrel leaning on the door frame. Moments passed, and the two spoke and joked, trying to ward off the nervousness that loomed over them, the tension was palpable, they were expecting anything. And anything finally came.\nFritz and Conrad heard shuffling from inside. Fritz grabbed the shotgun and both entered their apartment room. More shuffling was heard, movement right outside the door. The shotgun was aimed at the door, Conrad pulled an AKM from under the bed and loaded it. \n\nThen there was silence. Heavy breaths and the low traffic outside were all that could practically be heard. Until a loud shouting came from right outside the room, and the front door flew off its hinges."
 Nationalist_France.64.a: "Nuits Parisiennes."
 Nationalist_France.65.t: "Outrage in the Military"
 Nationalist_France.65.d: "Even as the military continued getting more and more fervent in their anger, we continued losing. This has reached a boiling point, as there are now multiple open mutinies by hundreds and thousands of soldiers, all deciding that the fight was no longer worth the effort. The crack in our rank and file must be patched over, lest France be doomed to eternal servitude."
 Nationalist_France.65.a: "Damn Them!"
 Nationalist_France.66.t: "Unrest in the Ranks"
 Nationalist_France.66.d: "With our continued failures along the frontline, our troops have begun deserting and complaining about our lack of success. This must be rectified within due time, and those who continue to speak out must be punished, unless we wish for our entire army to fracture into pieces before our very eyes."
 Nationalist_France.66.a: "We Must Move Quickly..."
 Nationalist_France.68.t: "Ultranationalist Anger"
 Nationalist_France.68.d: "As our lines continue slipping, even the most fervent ultranationalists begin to spark with rage at us, believing us to be misusing the resources and people of their beautiful country, and that we are completely failing to put to work our concepts and ideals as they had hoped. Even our allies being torn away from us, there is little hope for recovery in our ranks, yet we must fight on."
 Nationalist_France.68.a: "Damn Them!"
 Nationalist_France.69.t: "The Great Mystery"
 Nationalist_France.69.d: "This was his just reward for years of sacrifice, the scars, the lost time and friends. He has fought, killed and bled for France: from the Russian Steppe to the Pripet Marshes. From the fields of the Vistula to the Bavarian Alps. Now he's finally returned home, not as a conquering hero, but as a tired old dog. His reward for all his efforts? The 'honor' of being the rearguard for his corps, his division, a ragged mix of old and worn-out veterans and boys as green as the trees around them. His orders had been clear: assemble whatever was left of his division and any other stragglers he could find and hold the Moselle for as long as possible to allow the rest of the army to form a new defensive line on the Meuse. \n\nIn the ad-hoc command post created in an old postman's building, he sits surrounded by his subordinates. Where in the past they would have been old friends and comrades, now he is flanked by strangers and ghosts. Men too old to fight or young enough to be his children. Their panic and concern made his headache all the worse. Talk of withdrawal or reorganization was ignored: either too little or a flagrant disregard for their orders. The pounding of guns grows louder and the division is pushed closer and closer to the command post-its lines crumbling. All his hope of escape and survival rests on his battalion commander in reserve following his orders for the planned counterattack. He had misgivings of the man in charge, but he had no other choice for there was no one else at hand capable of leading such an operation. \n\nAs he continues to mull, a panicked officer runs in, his uniform tattered and a size or two too small for him. With terror in his voice, he exclaims the reserve battalion is gone and all communication with it is lost. The divisional commander sits in silence for a moment-the enemy is now nearly on top of the command post. After all he has gone through, all he has done, he snaps at the realization it's all been for naught. He begins to rant and rave as he's reached his breaking point. He damns the battalion commander as no man he had ever done. As the command post is overrun, he stands his ground while his men rout. From his incoherent screaming and ramblings of a broken, but defiant man, there's only one thing his men can make out as they flee:"
 Nationalist_France.69.a: "WHERE IS GROUCHY?"


 Fra_armed_forces_category: "French Military"
 Fra_armed_forces_category_desc: "The French military is the best and most important military on this side of the Atlantic. From the conquests of Charlemagne and Napoleon, to the glorious liberation of France by de Gaulle and Leclerc, the history of our military is both glorious and long-standing. We have recently proven that our military can stand on its own without NATO, whoever, we shouldn't be too willing to throw our allies away so suddenly, for there is undoubtedly war on the horizon."
 FRA_west_africa_intervention_desc: "West Africa has long been an integral part of France and our foreign policy.\nHowever, year by year, these nations have tried to distance ourselves further and further from their former French overlord, but §Rthey shall never know the taste of freedom§!."
 

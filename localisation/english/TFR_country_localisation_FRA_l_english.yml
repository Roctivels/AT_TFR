 FRA_regionalist_struggle_idea: "Regionalist Struggle"
 FRA_regionalist_struggle_idea_desc: "As France attempts to once more forcefully reconstruct her identity, regionalism across the country has become rampant. \n\nAlthough nearly wiped from existance during the French Revolution, many regional identities had survived, but only barely. Since then, these identities have struggled to maintain their cultural traditions and language, but with the creation of a larger European consciousness and subsequent shedding of all that makes France French, these regionalists have one last oppurtunity to carve out their distinct culture before it fades into the history books."


 FRA_Appeal_to_Neutral_Parties_desc: "We cannot afford neutrality within our general staff and there must be actions taken in order to ensure our general staff remains unified and in support of our administration."
 FRA_Work_with_Disatisfied_Generals: "Work with Dissatisfied Generals"
 FRA_Work_with_Disatisfied_Generals_desc: "Although falling out of favour with our administration relations are not completely estranged and there is much we can do to pull them over to not outright dissatisfaction with our government."
 FRA_Benefit_from_our_Supporters: "Benefit from their Support"
 FRA_Benefit_from_our_Supporters_desc: "This "Great Game" is currently in our favour and we shall benefit from our popularity among the general staff.  "
 FRA_Bring_Back_Villiers: "Work with Villiers"
 FRA_Bring_Back_Villiers_desc: "The Général d'armée, Pierre de Villiers holds both superiority and political leverage against the Forces Armées Françaises general staff and is willing to collaborate with us in attempt to calm down their despotic rhetoric."

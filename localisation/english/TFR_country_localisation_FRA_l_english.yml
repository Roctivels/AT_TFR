 FAF_pride_of_france_cat: "Pride of France"
 FAF_pride_of_france_cat_desc: "\n\n\n\n\n£GFX_FAF_pride_of_france_cat\n\n\n\n\n\n\n\nThe revival of the French State and of Traditionalism is upon us, here and now. The regime of Vichy has been returned to us, the bastion of conservatism once more taking her stand in Europe as the savior from the plight of liberalism.\n\nThough fragile and plagued with infighting between generals who wish to be the grand Marshal of France, the state in and of itself is beautiful. Anything must be granted for its maintenance."
 FAF_pride_of_france_dynamic: "French Militarism"
 FAF_pride_of_france_dynamic_desc: "People always praise the Germans for their military prowess and glory throughtout history, but when it comes to France they only remember the military leaders and strategic minds behind the war, not the lifeblood fighting it on the ground. France's army has always been the strongest within Europe. The only times it has appeared weak was because lions were being led by donkeys. Today, even the French people have forgotten a significant part of their culture, their military traditions, and their military prowess. We have to instill a patriotism into our peoples hearts, remind them the importance of military servitude and military strength."

 FRA_foreign_legion_integration: "French Foreign Legion"
 FRA_foreign_legion_integration_desc: "The Légion étrangère, known as the French Foreign Legion, has long stood as the spear of the Imperial might of the French Empire and later the French Republic. It remains a shining example today of French military might and with that comes many benefits to the institution. We receive an influx of young able-bodied men all across the globe by the week ready to start a new page in their lives in service to the Legion. \n\nThe Legion is currently employed with the enforcement of the Communauté Financière Africaine Franc across Western African nations that are inside the monetary zones of the Franc, as well as training pro-Western nations and groups across Africa to ensure long-lasting stability in the Continent. It is also apparent that Islamic extremism is on the rise and to that we shall deploy the Legion to eradicate the plague which has cost the lives of French citizens in recent years. \n\nHonor and Fidelity."
 

 FRA_authoritarian_liberalism: "Authoritarian Liberalism"


 FRA_Triumph_over_the_Eastern_Menace: "Triumph over the Russian Bear"
 FRA_Triumph_over_the_Eastern_Menace_desc: "Through blood and sweat, the bear has been vanquished. There were those who thought Europe would sink with America. Europe would be defenseless, prim with loot and defenseless as the wolves circled. They could never have been more wrong. It is Europe that now stands victorious. From the Ukrainian partisan to the French pilot, from the German panzergrenadier to the Royal Marine. The Herculean task was only possible with our and Europe's decision to fight to the finish-no half measures and no peace without true victory. Despite some people's misgivings about the concept of a united Europe, they can no longer deny that, united in purpose, Europe together can accomplish great things."
 FRA_Mourn_our_Sons: "At what Cost?"
 FRA_Mourn_our_Sons_desc: "The bear has been broken, but at a high price. The attempt to save Ukraine in the early stages failed and what should have been a short and decisive effort turned into a quagmire. We came out on top, but only after a heavy toll on our economies and peoples. We must extract our share of blood from the bear's corpse, as will the rest of NATO. We will do everything possible to keep Russia down with measures aimed at crippling her economy and military apparatus. The new emerging Russian government seems to be toying with the idea of reorganizing for another attempt to restore what was lost-behind the scenes at least. On the recommendations of the general staff, we and the rest of NATO shall remain at varying levels of alert and military readiness must be maintained. In the unlikely event the bear stirs against us again, we will be ready. If they want to reclaim their birthright, it is only courteous for us to ensure they die trying."
 FRA_The_Spirit_of_Victory: "The Spirit of Victory"
 FRA_The_Spirit_of_Victory_desc: "The Russians believed Europe was weak and would sit idly by as they continued on their march of subjugation. They believed at worst our intervention would be half-baked and slow-they couldn't have been more wrong. With rapid and decisive intervention, Ukraine's disastrous situation was salvaged, and Russian momentum halted. There were successes and setbacks in the interim, but in the end, it was the French flag flying over the Kuban and the Russian government collapsing. We intend on reaping some of the spoils of victory, as do our partners, but we must remain considerate of such demands. One doesn't need to look very far back for the negative consequences of a Carthaginian peace-real or perceived. It is our belief that this new Russian government can be worked with and be slowly welcomed back into Europe as a partner and perhaps future friend. After all, is the new Russian government any different from ours? Surely they will see reason and see that working with us is a far better alternative to going it alone, or even trying to reclaim lost territories. The likelihood of such an insane move is so low, it's best to be ignored-despite members of the general staff insisting on vigilance because, after all, would preparing for it not encourage it?"
 FRA_Enter_the_New_Era: "A New Post-War Era"
 FRA_Enter_the_New_Era_desc: "Despite sacrifice and victory-we must not sit idly. We have fought to maintain the old order and won, but the struggle never truly ceases. Peace must not be squandered, and all effort must be made to keep our allies at home happy and vigilant, and our partners abroad armed and economically productive. The German economy may be stronger with the EU, in our eyes, being its proxy, but France is the world power. Our connections in West Africa keep resources and foodstuffs inbound for Europe and our coffers full, but our partners in the region have rivals and wars of their own to face. Even if NATO is unwilling to devote resources to it, we shall spare no expense and ensure that our past, present, and future investments are not in vain. A stronger France is a stronger NATO, and who on our side is going to complain about that?"
 FRA_Announce_Snap_Elections: "Announce Snap Elections"
 FRA_Announce_Snap_Elections_desc: "With the end of the war comes the return of political division. The alliances of convenience and pause of petty squabbles for the sake of the war effort have now unfortunately come to an end. Despite the seeming overwhelming popularity of our government, the opposition is demanding elections here and now due to our 'incompetent governance and mishandling of the war effort'. They could be ignored, but they hold enough sway to potentially cause great issues and slow legislation down the line. If we're as popular as it appears, this may be a boon. This could further solidify us and increase our hold on the government and enable us to comfortably ignore such demands in the future. There's always the chance that our assumptions of popularity are wrong, but what is life without risk?"
 FRA_Declare_the_7th_Republic: "Declare the 7th Republic"
 FRA_Vote_on_the_Sixth_Republic: "Constitutional Referendum"
 FRA_Restoration_of_the_6th_Republic: "Restore the 6th Republic"


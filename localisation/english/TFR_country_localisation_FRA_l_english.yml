 FAF_Glorify_Jeanne_dArc: "Glorify Jeanne d'Arc"
 FAF_Glorify_Jeanne_dArc_desc: ""
 FAF_Enshrine_the_Rights_of_Man: "Enshrine the Rights of Man"
 FAF_Enshrine_the_Rights_of_Man_desc: "In 1798, our ancestors cast off the terror and barbarism of the Ancien Regime and set out to create a guideline for the newly freed people of France. This document, known as The Declaration of the Rights of Man and of the Citizen, still holds a place in the most recent constitution of the Fifth Republic. As we rebuild governmental legitimacy, not enshrining these rights would be foolish!"
 FAF_Restore_Marianne: "Restore the Glory of Marianne"
 FAF_Restore_Marianne_desc: "The figure of Marianne, having arisen from the fires of the First Republic, has often acted as the national personification of France itself. However, in recent decades, she has become less relevant in popular culture, to the dismay of many French patriots. Thus, if we seek to unite France under our patriotic banner, we must restore the relevance and glory of our beloved Marianne!"
 FAF_Calm_Militarist_Rhetoric: "Calm Militarist Rhetoric"
 FAF_Calm_Militarist_Rhetoric_desc: "Among our ranks exist those who wish to see the military take even further control over the government at the expense of our civil liberties. While we can appreciate their calls for order and stability, it is time to ease the rhetoric of these militarists, lest we see our beloved Republic transformed into a permanent military junta."
 FAF_Pardon_Republican_Officers: "Pardon Republican Officers"
 FAF_Pardon_Republican_Officers_desc: "In our efforts to ensure control over the apparatus of the state, we need as many hands as we can get. While our initial purge involved most former officers in our coup, those who are sympathetic can be brought back in through a series of pardons."
 FAF_Mimic_de_Gaulle: "Mimic De Gaulle"
 FAF_Mimic_de_Gaulle_desc: "As we seek to establish a strong, military-centered approach to our governance that still respects the fundamental rights of our citizens, who better to look to than the late President and General Charles De Gaulle? His efforts in establishing the sadly ill-fated Sixth Republic can provide a framework for our leadership that, while requiring some heavy-handed means to quell the May 1958 crisis, left behind a fond legacy that we must seek to emulate."
 FAF_Glorify_Vichy_Stability: "Glorify Vichy Stability"
 FAF_Glorify_Vichy_Stability_desc: "The public image of the former French State has been tainted by accusations of "German collaboration" by many biased historians, but there is one way we can redeem its legacy among the people of France. Seeing as it is something that in the chaos of the 21st century many seek, emphasizing the stability of the former Vichy regime can help our people see that our goals are far beyond simply capitulating to German fascists."
 FAF_Redeem_The_Marechal: "Redeem the Maréchal"
 FAF_Redeem_The_Marechal_desc: "History has not been kind to Phillippe Petain. The Maréchal, once known as the "Lion of Verdun" for his bravery in the First World War and willingness to work out peace with the invading Germans to prevent the imminent destruction of France. The petty liberal historians, hell-bent on deeming him a collaborator, must be silenced. Instead, our education must reflect a more "fair" approach to how we look back on the true savior of France during the Second World War!"
 FAF_Keep_Officers_in_Check: "Curtail Officers"
 FAF_Keep_Officers_in_Check_desc: "The Officer Corp has been quite a thorn in our side, aligned with the pseudo-liberal Gaullists seeking to bring us back to the instability of the previous French Republics. While we will still need them in our affairs of state, curtailing their political influence is essential in ensuring our power is secured."
 FAF_An_Honour_to_Serve: "An Honour to Serve"
 FAF_An_Honour_to_Serve_desc: "Our people must realize that the French legacy is one of service and sacrifice. From those ancient days under the Franks and Charlemagne to Napoleon's conquests of Europe, the French legacy is that of the military and the honor of serving in it. Propaganda must emphasize this tradition, especially as we prepare for another crusade against the hordes of the East!"
 FAF_Promote_French_Israelism: "Promote French Israelism"
 FAF_Promote_French_Israelism_desc: "While a fringe belief in French nationalism, there exists a movement of people who believe our Frankish ancestors are descendants of the Tribe of Benjamin, thus one of the lost Ten Tribes of Israel. Some may see this as pseudo-historical, but if we promote this concept, it can help embolden our religious citizens to fight for our regime. In the fight against the hordes of the East, to paint ourselves as Crusaders by birthright would be a wise idea."
 FAF_Promote_Radical_Officers: "Promote Radical Officers"
 FAF_Promote_Radical_Officers_desc: "To offset the influence the Gaullists have over the Officer Corps, we can promote members currently in service that better embody our Petainist ideals. Besides, it’s always good for officers to have differing opinions, especially in the political department, right?"

 FPR_soviet_france_category: "Politburo of the French Soviet"
 FPR_soviet_france_category_desc: "\n\n\n\n\n£GFX_FPR_soviet_france_cat\n\n\n\n\n\n\n\nThe Premier Casanova is the guiding hand behind our revolution. The proletariat is directed by the man at the helm, the force behind the Marxist-Leninist movement. Modeling himself off of the great Stalin, the man who saved the USSR in the Great Patriotic War, there is no fault that we can make."
 FPR_Arise_Sons_of_Marianne: "Arise, Sons of Marianne"
 FPR_Arise_Sons_of_Marianne_desc: "When the tyrant of the East steps arrogantly onto a blood-stained throne, trampling the bodies of countless innocent people, we, the descendants of Marianne, freedom fighters, and defenders of the people, must not stand idly by. We cannot allow the precious civilization of Europe to be desecrated and abandoned. Today, we have overthrown the weak and incompetent pseudo-government and established a true socialist government for the proletariat, driven by will and action. The Red Revolutionary Guard, the heart of the French class struggle and the vanguard of the people, calls once more on all compatriots and comrades: Citizens, arm yourselves! This time, the Federative French Socialist Republic will not fail the people of Europe."
 FPR_Dissolve_the_National_Congress: "Dissolve the National Congress"
 FPR_Dissolve_the_National_Congress_desc: "The pseudo-regime of the old era has collapsed with a thunderous crash, and the once-mighty gods of 'Mount Olympus' have turned into fragile, pale plaster statues, each awaiting its inevitable fall as the people tear them down. However, amid this sweeping action, one venomous altar stubbornly remains—the French National Congress. The bourgeois reactionaries, determined to resist the will of the people and isolate themselves from the French nation, cling to this institution, cloaked in the sanctity of bourgeois legal rights, as their last refuge. But we will not let them escape so easily. The Revolutionary Guard has been ordered to enter the Congress, arrest the reactionary deputies, and completely dissolve this obsolete institution that only stands in the way of the revolution. From now on, no more revisionist rhetoric will obstruct the revolutionary path."
 FPR_Purge_the_Daeninckx_Bloc: "Establish National Security Bureau"
 FPR_Purge_the_Daeninckx_Bloc_desc: "In the early days of a revolutionary victory, there is always a lack of resources—wealth, stability, and infrastructure. But one thing we will never lack is enemies of the revolution. We will not hesitate to assume the worst intentions of those who seek to harm the just cause of the French people. To combat this, an independent institution will be established: the National Security Bureau of the Federative French Socialist Republic. General Casanova and his comrades firmly believe that, with time, the National Security Bureau will become a powerful revolutionary force, akin to the 'Cheka,' striking fear into the hearts of bourgeois reactionaries. It will serve as both the sword and shield of the French Revolution, defending our cause while also undertaking the crucial task of spreading revolution and awakening the people of the world. The road to peace and happiness will be paved with 'revolutionary terror.'"
 FPR_Cult_of_the_Red_General: "The Marshal of the Revolution"
 FPR_Cult_of_the_Red_General_desc: "At a critical moment, Nicolas Casanova rallied the Revolutionary Guard to overthrow subversives and reactionaries, reigniting the revolutionary spirit of the French people. His actions and ideas have left an indelible mark on both the history and national character of contemporary France. Today, as the embodiment of the revolution and the savior of the nation, Casanova's status and prestige have reached unprecedented heights. The widespread admiration and reverence for the Marshal across France have become a grand spectacle. Under his leadership, the unity and strength of the Revolutionary Guard impress both allies and adversaries alike. We have every reason to believe that as long as Marshal Casanova remains in power, any conspirators will be quelled, and the socialist revolution in France will continue smoothly along its predetermined course, with ultimate victory in future struggles assured."
 FPR_Foundation_of_the_FFSR: "Adopt Soviet Iconography"
 FPR_Foundation_of_the_FFSR_desc: "Vladimir Lenin once pointed out that the most class-conscious and politically advanced segment of the working class would become the vanguard of the revolution. These individuals are always at the forefront, guiding the masses in the revolutionary struggle, upholding strict discipline, and enforcing proletarian dictatorship through a one-party system. In return, these 'elite elements' of the revolution will earn the respect and admiration they deserve, along with rewards and recognition for their outstanding contributions. In France, the Revolutionary Guard undoubtedly serves this system, providing a strong foundation for training new revolutionaries. Led by General Nicolas Casanova, we will promote the glorification and worship of the revolutionary leadership collective to unite the French people more closely around the core of the revolutionary cause."
 FPR_Enact_Five_Year_Plan: "The Five Year Plan"
 FPR_Enact_Five_Year_Plan_desc: "Rapid and centralized industrial development will significantly strengthen France's industrial and military power in the shortest possible time. This will reverse the deindustrialization caused by past bourgeois governments and provide a reliable counterforce against the challenges posed by the Eastern tyrant. To achieve this, we need a central government institution with the authority to issue directives and a strict economic timetable. Therefore, the 'Five-Year Plan' a hallmark of the socialist system, will be introduced in Red France. The implementation of a planned economy will not only solidify the economic foundation of our socialist regime but also unite our citizens and revolutionize all aspects of society and life."
 FPR_Reinvigorate_the_Workforce: "Jumpstart the Workforce"
 FPR_Reinvigorate_the_Workforce_desc: "In the past, the global perception of French workers was shaped by stereotypes of being 'lazy' and 'difficult to manage.' However, all of this has dramatically changed in the Federative French Socialist Republic. Thanks to a more equitable distribution of wealth, overseen by the Revolutionary Guard, the majority of French citizens now enjoy the benefits of economic development. This stands in stark contrast to the past, when large corporations monopolized profits, leaving ordinary workers in a hopeless situation with little opportunity for improvement. Today, French workers and unions have become the backbone of the nation, embodying an unparalleled drive and resolve in France's history. Moreover, they maintain their diversity and inclusiveness, representing the finest aspects of society while continuously bringing fresh vitality to the socialist cause. Like a Renault steadily cruising along the highway, France is forging ahead into the future."
 FPR_Embrace_our_Red_Brothers: "Embrace our Red Brothers"
 FPR_Embrace_our_Red_Brothers_desc: "As the world's first socialist regime, the USSR had to endure hostility from other capitalist powers and pursue a path of self-reliant development. Fortunately, for the Federative French Socialist Republic, we are not alone. Across the countries once dominated by the capitalist EU, the sparks of socialism are spreading. In some places, these sparks have already ignited the flames of popular revolution and class struggle. The Revolutionary Guard will strike, offering steadfast support and solidarity to other socialist nations across Europe. The blood of the reactionaries will nourish the growth of the towering tree of socialist unity throughout the continent. A new red European future rises on the horizon."
 FPR_embrace_red_brothers_tt: "For every one of the following nations in our faction, you will gain 1 Civilian Factory and 25 Political Power \n[GER.GetFlag] Germany \n[ITA.GetFlag] Italy \n[RSR.GetFlag] Spain \n[LUX.GetFlag] Lowlander Union \n[PRP.GetFlag] Portugal \n[UK2.GetFlag] England \n[DEN.GetFlag] Denmark \n[NOR.GetFlag] Norway \n[SWE.GetFlag] Sweden \n[FIN.GetFlag] Finland \n[GRK.GetFlag] Greece"
 FPR_Franco_German_Treaty_of_Friendship_Alliance_and_Mutual_Assistance: "Franco-German Treaty of Friendship"
 FPR_Franco_German_Treaty_of_Friendship_Alliance_and_Mutual_Assistance_desc: "The relationship between France and Germany, shaped by centuries of rivalry, has long been a key topic for politicians and citizens alike. The most recent effort at reconciliation between the two countries led to the creation of the European Union, a landmark organization that has profoundly shaped Europe's geopolitical landscape. Fast-forward to the present, and with an unprecedented threat emerging from the East, the leaders of both nations must find common ground. They need to strengthen their alliance on the fragile foundation of the EU, making the Franco-German partnership the cornerstone of European cooperation in the new era. The heirs of Jean Jaurès and Karl Marx will work tirelessly to build a brighter future for Europe."
 FPR_will_raise_fg_brigades_tt: "Will raise one §GExperienced§! Franco-German Brigade in §PAlsace§!"
 FPR_Embrace_Mass_Production: "Industrial Pride"
 FPR_Embrace_Mass_Production_desc: "Through relentless reforms and the tireless efforts of millions, our socialist economic development has reached unprecedented heights, once unimaginable to both theorists and revolutionaries. The remnants of capitalist economic elements have been eradicated, and France's already advanced state-owned industry has been revitalized under the people's government, growing even stronger and serving as the cornerstone of the economic system. Furthermore, the industrial chain, once deeply embedded in the neoliberal global economy, is now an inseparable part of the economic sovereignty of the Federative French Socialist Republic. The people's economy fuels the vitality and creativity of French society, driving both scientific breakthroughs and intellectual progress. This strengthened economic foundation also provides a solid basis for enhancing France's military capabilities. The French people have every reason to be proud of these remarkable achievements, and Marshal Casanova takes great satisfaction in seeing that France's dream is now within reach."
 FPR_The_New_French_Man: "The New Citizen"
 FPR_The_New_French_Man_desc: "How does the new social structure drive the progress of human civilization? The answer is simple: the new generation of citizens, growing up in a socialist nation, will develop entirely different traits in both thought and action compared to those of the old society. Under Marshal Casanova and the Revolutionary Guard, this vision is becoming a reality in France. Contemporary French youth are more progressive, purer, more passionate, and more patriotic than their predecessors. They are dedicating themselves to work and production across various fields. The decadence and fear of the end of human history, fostered by the late capitalist system, have become relics of the past. As pioneers of European civilization, France is now spreading a new, transcendent ideology to every corner of the world. Given time, as these new citizens become the backbone of society, France—empowered by its ideology—will be capable of defeating any enemy."
 FPR_Topple_the_Fascist_Menace: "Spear Fascism"
 FPR_Topple_the_Fascist_Menace_desc: "'Revenge is a dish best served cold.' In foreign affairs, we have patiently waited for France and its European allies to regain their optimal strength, allowing their growth trajectory to surpass that of their greatest enemy—the 'Evil Empire' of the East. Today, this once seemingly unattainable goal has been unexpectedly achieved. The previously fragmented Europe is now united and strong, with its decaying democracy replaced by a system that better reflects the people's will. In these significant transformations, the leading role played by Marshal Casanova and the Revolutionary Guard, and by France under their leadership, cannot be overlooked. We are fully confident and well-prepared in both material and spiritual aspects. Now, it's time to take decisive action: the people's army will march eastward, destroy the tyrant's stronghold, and liberate our fellow Europeans suffering in dire conditions. This time, victory will undoubtedly be ours!"
 FPR_left_opposition_dyn_mod: "Arthaud Bloc"
 FPR_left_opposition_dyn_mod_desc: "The Arthaud Bloc, referred to by Marshal Casanova as the ''Left Opposition,'' are the remnants of the once flourishing Trotskyist movement in France."
 FPR_right_opposition_dyn_mod: "Daeninckx Bloc"
 FPR_right_opposition_dyn_mod_desc: "The Daeninckx Bloc, referred to by Marshal Casanova as the ''Right Opposition,'' are the remnants of broadly socialist groups from before and during the Civil War."

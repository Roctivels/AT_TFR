 FPR_utopia_dynamic: "Destination Utopie"
 france.9001.t: "Didier Daeninckx Declares Utopia"
 france.9001.d: "Didier Daeninckx, author-turned-politician-turned-leader, has today declared that the ambitious goal of building an utopia within France has come to a successful conclusion.\n\nFollowing the civil war, it seemed France was in for a rough time rebuilding both land and society. But Daeninckx had a dream not only of repairing the nation, but building it up into a veritable utopia. The anti-military and anti-capitalist policies of Daeninckx and his government were seen by many as antithetical to such an ambitious goal, but as it turns out, he may have been onto something.\n\nWhile the meadows of France are not covered by manna and money does not grow on trees, the living standards of the common French citizen are higher than ever in the history of the nation. As far as anyone looking from the outside in can tell, the French have in fact managed to reach utopia."
 france.9001.a: "Good for them."

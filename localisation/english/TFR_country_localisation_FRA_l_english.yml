 FRA_A_French_Conquest: "The Reconquest"
 FRA_A_French_Conquest_desc: "Reconquete has won, our military benefactors have made sure of it, Zemmour sits atop Frances highest office and with the Nationally Rally in our coalition, we will begin our great Reconquest of France. We must move swiftly before dissident elements try to halt us, a Crusader goes nowhere by watching, action is his friend, the armor is heavy when you are still."
 FRA_Halt_Immigration: "Halt Immigration"
 FRA_Halt_Immigration_desc: "African immigrants have flooded our nation en masse, all while their governments kick us out of our bases in the region. We fought to give them stable homes now they don't even want them? Too bad. France did not send troops to solve your issues just so you could flood France, go back to your homes and improve them! We do not need your labor! Our people grow poorer while you inflate the unskilled labor market! Your homes need work, you Algerians kicked us out a half century ago do not expect us to give you handouts now!\n\nNo more immigration, tighter laws, and a fleet of rental ships, we'll have this taken care of in short order. Some will plead for Mercy, President Zemmour is a Algerian Jew of course, by descent, but his parents knew to conform, and he himself has done the same, a model immigrant unlike the millions of hooligans in Europe today."
 FRA_Administration_Simplification: "Administration Simplification"
 FRA_Administration_Simplification_desc: "France has become a very bureaucratic nation, it is so Byzantine in its structure that one cannot truly understand its inner machinations without an Indepth multi week course. The sheer breadth and depth of French regulatory decrees took an entire team five weeks of searching to thin out what is worth while and what is not. Not to mention, the many thousands of needlessly imposed EU and otherwise related regulations that cause your average citizen to have to tear their hair out just to get anything done, same for the politicians. Now of course the Presidency is already powerful, but we can do to streamline things and make being powerful a little easier."
 FRA_Rabid_Assimilation: "Take Inspiration from Quebec"
 FRA_Rabid_Assimilation_desc: "Quebec has recently passed strict laws amid the fall of prevalence of the French language in their region, it had been steadily declining but the men in Montreal eventually decided enough was enough, reducing total yearly migrations to just 50,000. Not allowing applicants to be more than 25% from a single nationality, and requiring societal integration to remain permanently. The legislation limits yearly immigration to a small small percentage of the total population yearly and forces foreign group to be diverse, avoiding the creation of cohesive minorities, while also not just encouraging but enforcing French literacy as a condition for long term inhabitance. Here in France a few tweaks and we can utilize this to our benefit, learning from our old colony is new for us, usually Britain is the only learning from it's old colony."
 FRA_Put_France_Before_Europe: "Place France Before Europe"
 FRA_Put_France_Before_Europe_desc: "It would be wrong to say the European Union and NATO are entirely hindrances to us, France has benefitted from the arrangement for many years and was in fact one of the EU's founders, but we cannot do as we have done, prioritizing foreign prosperity over our own. Planning our economic actions to suit the whole Europe instead of just us, are we not a nation like them? Can we not plan our own economy and they theirs? What right do we have to impose regulations and what right do they have especially to impose onto us? Let them be great on their own, and if they fail without our help, that is destiny, and destiny cannot be escaped, only delayed."
 FRA_Reverse_Declinism: "Reverse Declinism"
 FRA_Reverse_Declinism_desc: "France has since 1970 been in a constant state of decline, the Liberal Generation of 68' as Zemmour calls them steered France down a path of National Suicide, where national pride was broken down and borders were thrown open to just anyone who wanted in, we have watched Frances decline for fifty years and for fifty years Zemmour has worked in Frances right against the increasing growth of foreign groups and especially the Islamic plague within our borders since the days of Jean Marie Le Pen, and now he is finally rewarded for his dedicated.\n\nZemmour himself can reach out and strangle the vines which have for so long bound France from leaping forwards into the 21st century as a lion, the mass immigration, the increasing expenditures, the increasingly warm feelings of tossing away our nationhood for some kind of German dominated Euro Super State? No more of this, Tradition will be the helm of state, reason and logic placed firmly before the feelings of bleeding hearts."


l_english:
 #Focuses
 FRA_the_french_armed_forces: "The State Of The Armed Forces"
 FRA_the_french_armed_forces_desc: "With the conduction of our comprehensive decennial review of the Forces Armées  Françaises, the reports coming out have been troubling. Our armed forces have been underfunded and lacking behind in terms of our European allies. With such troubling news being surfaced by the reports, our generals have been demanding our administration to act immediately. Thankfully our government has officially enacted an increase to the Forces Armées Française's budget of over fourteen million euros, greatly allowing for our armed forces to modernize with the turn of the decade.\n\nOur nation's military will not fall behind at a time like this and for the safety and success of France, it is now time to act now more than ever. France will once again reach the distinction and honour it held with being the military power of Europe."
 FRA_unify_the_DSGE_DSGI: "Unify the DGSI-DGSE"
 FRA_unify_the_DSGE_DSGI_desc: "We are entering a new age in our nation, one where we need a deeper connection between our internal and external intelligence agencies, and thus... The DGSN, or Directorate-General for National Security, will serve to protect internally and externally."
 FRA_dsgn_creation_tt: "Upon completion, we will create the §CDirectorate-General for National Security, or DGSN§!"
 FRA_the_french_airforce: "Redesign Our Airforce"
 FRA_the_french_airforce_desc: "Our Air Force has easily been one of the most lacking branches of the Forces Armées Françaises with minimal progression made towards modernizing our current air fleet. We are currently employing multiple aviation corporations, such as Dassault Aviation, to develop possible solutions to bring the French Air Force to the modern era with levels of superiority and strength never before seen. With these efforts being made, it will not be long before France rules the skies."
 FRA_the_race_for_the_fifth_generation_fighter: "A French 5G Fighter"
 FRA_the_race_for_the_fifth_generation_fighter_desc: "With the recent breakthroughs in our research and development's aviation wing, we finally have the opportunity we have been waiting for to advance the next generation of our air force. The French Fifth Generation fighter jet is one of the most state of the art concepts we have seen and we must capitalize on this. France will be pioneering the future concept of aerial warfare once we unveil the state-of-the-art Fifth Generation fighter jet to the rest of the world."
 FRA_ramp_up_the_production_of_the_Dassalut_Rafale: "Mass Produce The Rafale"
 FRA_ramp_up_the_production_of_the_Dassalut_Rafale_desc: "The Rafale has always done good for our army, and with a few tweaks here and there, and some generous funding to Dassault in little to no time, we will be able to start the mass production of our fighter jets. With the exceptional performance and capabilities the Rafale has shown us, we will be able to hopefully outproduce the Russian Air Force by the end of the decade if everything goes according to plan."
 FRA_conduct_major_improvments: "Sharpen Air Expertise"
 FRA_conduct_major_improvments_desc: "Not only has our air force been lacking behind technologically, but our professionals for lack of a better term, have been losing the edge that once defined our air force back in the day. The solution to this has been for our air force to begin a comprehensive overhaul of the current air program of the French Air Force, ironing out the flaws and gradual decline we faced for years, and instead moving towards the path of our air force gradually improving and rising above our competition."
 FRA_deveop_domestic_drones: "Develop Domestic Capabilities"
 FRA_deveop_domestic_drones_desc: "To achieve self-reliance and reduce dependence on external sources, France will prioritize the development of domestic capabilities in the defense industry, fostering innovation and collaboration to create a resilient foundation for sustaining a cutting-edge military."
 FRA_expand_our_airfields: "Increase Eastern Air Capacities"
 FRA_expand_our_airfields_desc: "Acknowledging the geopolitical significance of the Eastern theater, France will strategically enhance its air capacities in the region by deploying additional resources, establishing forward operating bases, and conducting joint exercises with allied nations."
 FRA_aerial_defense: "Improve Upon the SAMP/T"
 FRA_aerial_defense_desc: "The Sol-Air Moyenne Portée Terrestre missile system has served France, as our main air defense system, since its creation last decade. To ensure the maximum efficiency and secure air defense France deserves, we have contracted the original designers of the SAMP/T to redesign and update the missile defense system. As air warfare continues to grow and evolve, so will our capabilities to defend ourselves too."
 FRA_aerial_offense: "The Final Frontier"
 FRA_aerial_offense_desc: "Space has always been regarded as the true end goal of any great nation wishing to truly advance more than what was considered humanly possible. It is time we show the world that France wishes to strive for more than what many would regard us as capable of. France will open its own space program, and in due time, we will have our own flag on the moon along with the likes of other great powers, such as the United States. The world will soon come to realize that France will rule the stars as we were destined."
 FRA_the_french_navy: "Reform French Naval Practices" 
 FRA_the_french_navy_desc: "The French naval fleet has been one of the few branches that has held up with the years, but even then it is in desperate need of reform. Our pride of the fleet, the De Gualle, has been lacking when looking at the American or British Carriers of the times. We must get with the times or else the French Navy will begin to lack and fall behind once again severely crippling our global influence."
 FRA_upgrade_our_submarine_fleet: "Upgrade Our Submarine Fleet"
 FRA_upgrade_our_submarine_fleet_desc: "Recognizing the crucial role submarines play in modern naval warfare, France will initiate a substantial upgrade to its submarine fleet, developing advanced next-generation submarines equipped with state-of-the-art technology to maintain unmatched undersea capabilities."
 FRA_develop_our_home_ports: "Expand Existing Harbors"
 FRA_develop_our_home_ports_desc: "To accommodate the evolving needs of our naval fleet and enhance logistical capabilities, France will embark on a strategic initiative to expand existing harbors, improving naval infrastructure to facilitate efficient fleet movements and support sustained maritime operations."
 FRA_conduct_neccesary_improvments: "Conduct Pan-Mediterranean War Games"
 FRA_conduct_neccesary_improvments_desc: "There is no better time to prepare our fleet than now with our Mediterraneanism policies in full effect. With France's increased efforts of cooperation with our Mediterranean allies, we need to be more proactive in fostering unity and a close bond with our contemporaries. Recently, we have invited the Italian, Spanish, and Greek fleets to conduct naval exercises to stimulate our fleets and prepare them for any possible scenarios that we could predict. To ensure our success on the seas, it is necessary that we work closely with the other great fleets of the Mediterranean."
 FRA_smaller_boat_stuff: "Steady As She Goes"
 FRA_smaller_boat_stuff_desc: "Maintaining stability and continuity in our defense capabilities is paramount. Emphasizing consistent training, equipment maintenance, and operational readiness across all branches of the armed forces, France aims to ensure a reliable and formidable defense posture."
 FRA_begin_the_project_for_the_new_carrier_flagship: "Replace the De Gaulle" 
 FRA_begin_the_project_for_the_new_carrier_flagship_desc: "In recognition of the changing dynamics of naval aviation, France will initiate the replacement of the Charles de Gaulle aircraft carrier. This ambitious project aims to introduce a modern and versatile aircraft carrier, equipped with the latest technologies and capable of projecting power across the seas, playing a central role in securing French maritime interests and global strategic influence."

 FRA_A_Strong_France_is_a_Strong_Europe: "An Independent Military"
 FRA_A_Strong_France_is_a_Strong_Europe_desc: "For too long has the pointless bureaucracy and politicization of NATO drained France of countless hours and efficiency of our armed forces. It is now time for the nation of France to lead their own path into our greatness without the draining of our resources and budget. France will prove to not only our European neighbors but the globe that not only are we self-reliant but one of the great military powers of the world."
 FRA_Through_Europe_we_are_Strong: "Through Europe We Are Strong"
 FRA_Through_Europe_we_are_Strong_desc: "Europe has always been stronger united than it had been torn apart with countless examples throughout our history, such as the Second World War or the Global War on Terror. With that, it is now time to realize that the longer we stay apart, the weaker we become as the Russians only grow more unstable and unpredictable. We will send a message not only across the continent, but across the globe, that Europe shall always remain together no matter what during these acts of global instability and radicalism. "
 FRA_Support_a_Pan_European_Military: "Support Mediterraneanism"
 FRA_Support_a_Pan_European_Military_desc: "The Mediterranean Sea has always held strategic advantages for not only our nation but throughout the history of Europe with several great empires and nations originating from the region. The Romans, the Macedonians, and even the Carthaginians have all controlled the known world from the Mediterranean. For the success of Europe, we must consider the strategic importance of the Mediterranean sea and the nations we share along with it like our Spanish, Italian, and Greek allies, supporting them as much as we can politically and even economically."
 FRA_Support_Western_Mediterrenian_Militaries: "Create Cooperative Military Budgets"
 FRA_Support_Western_Mediterrenian_Militaries_desc: "With our efforts to cooperate further with our European allies, we have assembled a commission with the British, Germans, and Italians to create an effective budget for maximum efficiency and effectiveness. With the increased collaboration with our European allies, it is evident that we all have similar aspirations and goals. For Europe to succeed during this new era, we must stand united in the face of uncertainty and work together wherever we can."
 FRA_Further_Eurail_Integration: "Further Eurail Integration"
 FRA_Further_Eurail_Integration_desc: "To enhance European mobility and military effectiveness, France will advocate for further integration of Eurail networks. Improving interoperability, logistical efficiency, and rapid troop deployment capabilities will contribute to a more agile and responsive European defense infrastructure."
 FRA_Heart_of_the_European_Navy: "Mediterranean Naval Unification Pact"
 FRA_Heart_of_the_European_Navy_desc: "In a bid to strengthen regional maritime security, France will pursue a Naval Unification Pact with Mediterranean nations. This initiative aims to coordinate naval operations, intelligence sharing, and joint exercises, fostering a united front against maritime threats in the Mediterranean."
 FRA_Revive_Latin_Bloc_Militarism: "Mediterranean Command Unification Pact"
 FRA_Revive_Latin_Bloc_Militarism_desc: "To bolster regional stability, France will seek a Command Unification Pact with Mediterranean nations, harmonizing military command structures and facilitating joint planning for swift responses to potential threats in the Mediterranean theater."
 FRA_Western_Mediterrenian_Mechanization: "Further Mechanization Technology"
 FRA_Western_Mediterrenian_Mechanization_desc: "The mechanization of the French infantry has been one of the most drastic changes of our military in the modern era. To ensure the success of our infantry, we will continue to prioritize advancements of mechanized vehicles such as our Armored Personnel Carriers and Infantry Fighting Vehicles. The modern form of warfare as we know it will be conquered by French innovation and advancements in our technology."
 FRA_Strengthen_the_SNCF: "Expand the SNCF"
 FRA_Strengthen_the_SNCF_desc: "Recognizing the pivotal role of transportation in military logistics, France will expand the Société Nationale des Chemins de fer Français, increasing rail infrastructure, improving connectivity, and ensuring the efficient mobilization of troops and resources across the nation."
 FRA_Privatize_the_SNCF: "Privatize the SNCF"
 FRA_Privatize_the_SNCF_desc: "To enhance efficiency and innovation in rail transportation, France will pursue the privatization of the SNCF, introducing market dynamics, fostering competition, and improving the overall performance of the rail sector for a more agile and adaptable transportation network."
 FRA_Industrialize_the_countryside: "Countryside Militarization"
 FRA_Industrialize_the_countryside_desc: "To strengthen national defense capabilities and enhance resilience, France will initiate a program of countryside militarization, integrating military presence and infrastructure into rural areas, ensuring a distributed and robust defense posture that can effectively respond to threats across the entire national territory."
 FRA_Create_Independent_Military_Strategies: "Create Independent Military Strategies"
 FRA_Create_Independent_Military_Strategies_desc: "With our recent push to separate our Military from the NATO integrated command, we must work on innovating new strategies for our Military to operate on its own devices without assistance from our European allies. France will be in charge of our own military once more and show to the rest of Europe that we are better off without them and even more capable not being bogged down by their incoherent military command."
 FRA_A_New_Age_of_Heavy_Tanks: "Modernize Heavy Tanks"
 FRA_A_New_Age_of_Heavy_Tanks_desc: "To maintain armored superiority, France will embark on a comprehensive program to modernize heavy tanks, upgrading existing tank fleets with advanced technology to ensure they remain at the forefront of armored warfare capabilities."
 FRA_Deploy_Moving_Castles: "Birth of the ''Châteaux Itinérants''"
 FRA_Deploy_Moving_Castles_desc: "Introducing a revolutionary concept in mobile defense, France will witness the development of highly mobile and heavily armored units capable of rapid deployment and effective response to dynamic battlefield scenarios."
 FRA_Independence_from_the_Eurail: "Independence from Eurail"
 FRA_Independence_from_the_Eurail_desc: "To ensure freedom of movement and logistical independence, France will work towards reducing dependence on Eurail networks for military transportation, developing alternative transportation methods, enhancing strategic mobility, and strengthening our capacity for independent military operations."
 FRA_Expand_Domestic_Capabilities: "Embolden Domestic Arms Companies"
 FRA_Expand_Domestic_Capabilities_desc: "Thales Group, PGM, MBDA, and Renault have all been longstanding arms manufacturers who have helped supply the Forces Armées Françaises for decades since the post-war era. It now relies on our government to do our part and promote our military to source their equipment and arms for our domestic products and move away from overrelying on international gear."
 FRA_Rejuvinate_Recruitment_Centers: "Rejuvenate Recruitment Centers"
 FRA_Rejuvinate_Recruitment_Centers_desc: "In order to maintain a skilled and motivated military force, France will rejuvenate recruitment centers, modernizing recruitment processes, enhancing outreach, and providing incentives to attract the best talent to serve in the armed forces."
 FRA_Research_and_Development: "Increase Military R&D Investments"
 FRA_Research_and_Development_desc: "Recognizing the imperative of technological superiority, France will significantly increase investments in military research and development, propelling innovation, fostering the creation of cutting-edge defense technologies, and ensuring our armed forces remain at the forefront of military capabilities."

 FRA_Second_times_a_Charm: "On Behalf Of The People"
 FRA_Second_times_a_Charm_desc: "We have won the bid for the Presidency, Marine Le Pen sits at the top of France, a strong message to the Liberal Renaissance and the European Union, we were elected on behalf of the people to carry out a mandate. A very important mandate. To deliver to the people an orderly, powerful, and balanced France. To restore French traditions and restrict the open door policies of Macron and his allies. We will execute this mandate for France, we will temper our radicals, we will make France safe, strong, and proud again."
 FRA_Fight_Party_Radicals: "Fight Party Radicalism"
 FRA_Fight_Party_Radicals_desc: "Some elements of the National Rally are very much still remnants of the Father's clique, before the era of Marine there was the era of Jean-Marie, Marine's father. The National Rally truly was then what the critics of today say it is now, but some members of the National Rally do not recognize they are relics of a past that should be forgotten. Marine Le Pen has broadened the party horizons and moved it towards a new future, and those who follow more closely with the National Rally of the 80's must be sidelined and made to retire. We will never apologize for our past, but we must look into the future."
 FRA_Protect_French_Interests: "American Realpolitik"
 FRA_Protect_French_Interests_desc: "America has always had a great policy in its strongest of times, to speak strongly and carry a big stick. France sits in a continent of ideological rivals bent on destroying their own national pride and enforcing the same destruction on us, to asset ourselves in the world, the small part of the EU that we are, we must carry a very big and speak very strongly. In Africa, in Europe, and beyond, we must make our presence known and make it plainly clear that the France of the Future is destined to be like the France of the Past, strong and influential on a world scale. We will not be relegated to being Germany's second fiddle in some European Federation, we will be a strong and sovereign state!"
 FRA_National_Unity_Government: "Proclaim a National Unity Government"
 FRA_National_Unity_Government_desc: "Just because we are politically opposed does not mean we can't all seek out the prosperity of France, Liberals can be useful for their business connections, socialists at least say they care for the people, there is no reason we cannot invite our opposition to coalize with us! France is stronger united than it is divided, this is true with any nation, really with any thing, a Government of National Unity in the wake of pandemic, the oil crisis, and the collapse of America, there is no better time for France to unite it's political efforts towards the goal of prosperity and development. Who would oppose this? Only a treasonous ideologue, someone who is a party man before he is a French one."
 FRA_Law_and_Order: "''Law and Order'' Policies"
 FRA_Law_and_Order_desc: "A picture lands on the desk in front of Le Pen, sliding from a manila folder. A blazing inferno in the foreground of the Arc De Triomphe, a car overturned and burned, protestors in black with yellow vests cheer and if you look closely, a fire bomb sails away from the camera, towards a police line. Le Pen was always disgusted by the protestors violence. They are for the working man yet they burn his car and trash his workplace, like animals. No more of this nonsense. We heard you before you began burning our policemen alive, we will draft legislation in the coming days that some call draconian but, to us? To Le Pen? To the poor bastard who owned that car? This is reasonable and is long overdue to end the millions of dollars of public and private property damage these hooligans are responsible for."
 FRA_Set_Immigration_Limit: "France First"
 FRA_Set_Immigration_Limit_desc: "NATO and the European Union are precious things, but nothing should be or is more precious than ones homeland, France cannot be placed after international interests, French companies cannot lose on French soil to foreign business. France is already Europes strongest armed forces and yet we are not yet enough, we will grow stronger. Our forces and our economy shall grow larger. Europe will not be able to expect French bailouts or French vehicles, let Germany sell it's tank fleet abroad, we will keep our Leclercs and double our host of them. France above all must be prepared, economically, militarily, and mentally. If we are not prepared then none of Europe will be surely. In these times we must take up the role of Shepherd while Wild America is breaking itself apart."
 FRA_France_First: "France First"
 FRA_France_First_desc: "NATO and the European Union are precious things, but nothing should be or is more precious than ones homeland, France cannot be placed after international interests, French companies cannot lose on French soil to foreign business. France is already Europes strongest armed forces and yet we are not yet enough, we will grow stronger. Our forces and our economy shall grow larger. Europe will not be able to expect French bailouts or French vehicles, let Germany sell it's tank fleet abroad, we will keep our Leclercs and double our host of them. France above all must be prepared, economically, militarily, and mentally. If we are not prepared then none of Europe will be surely. In these times we must take up the role of Shepherd while Wild America is breaking itself apart."

 FRA_The_Peoples_Victory: "The People's Victory"
 FRA_The_Peoples_Victory_desc: "Though unexpected and an upset to many, the NFP has secured its victory in the 2022 French Elections, after a series of events thrust us into the spotlight. While we have won, we cannot celebrate victory yet. The military is against us, and [FRA.GetLeader] will have an incredibly difficult time pushing through our agendas in an unfriendly and unfamiliar environment."
 FRA_Demand_Military_Loyalty: "Deal With The Military"
 FRA_Demand_Military_Loyalty_desc: "Even though they are officially unaffiliated with French governance, our military has a strong hand in the politics of the Republic. Along with this, they are actively fighting against us even after our democratic victory, seeing us as a threat to their oligopoly over the French Republic. They must be dealt with, and swiftly."
 FRA_Unite_the_Left: "Unite The Front"
 FRA_Unite_the_Left_desc: "While we are a united front in theory, we coalesce a broad coalition of various Leftists, all agreeing only on the very fundamentals. Even while [FRA.GetLeader] was chosen as president, our coalition is still loose and tenuous. To move the left forwards, we must solidify the NFP as a genuine alliance between parties, not a simple bloc for us to win the election."
 FRA_Empower_the_Young_Jacobins: "[FRA_Empower_the_Young_Jacobins_loc]"
 FRA_Empower_the_Young_Jacobins_desc: "Seeing our successes, naturally, Socialism will be sent across all of Europe. The Democratic Revolution will not be forced to merely stay in France, we will export the happiness and prosperity of our people elsewhere - all across the European Union, be it national, or in the European Parliament, for the betterment of us all."
 FRA_Empower_the_Young_Jacobins_melenchon: "Rise of European Socialism"
 FRA_Empower_the_Young_Jacobins_faure: "Unite European Social Democracy"
 FRA_Empower_the_Young_Jacobins_ruffin: "Our European Comrades"
 FRA_Referendum_on_a_New_Constitution: "Referendum on the 6th Republic"
 FRA_Referendum_on_a_New_Constitution_desc: "As seen during the reign of Macron, the Monarchistic tendency and centralization of the Fifth Republic was a great backslide for the democratic principles of our nation, bringing us closer to times before the revolution that made us a bastion of democracy in the first place. Naturally, the Sixth Republic must be created by and for the people, something that they want and desire from France. Vive la 6e Republique!"
 FRA_Expand_the_Welfare_State: "Expand the Welfare State"
 FRA_Expand_the_Welfare_State_desc: "While there have been great strides in this sector from beforehand, it is not enough. The state should exist to service the people, not merely provide them benefits. The Welfare Program for all people should be made an inherent part of the French Republic, not merely a changeable factor within it."

 FRA_A_True_Commander_in_Chief: "A True Commander-in-Chief"
 FRA_A_True_Commander_in_Chief_desc: "Pierre De Villers, a real Commander to fit the role. His long and illustrious career in the French Armed Forces was blighted when Macron fired him from the Minister of Defense job. But he was fried for political reasons, we the people still look up to Villers as a respected commander and many other Generals look to him for guidance. A leader of his calibre hasn't presented themselves since De Gaulle, Three Cheers for the President!"
 FRA_Rehabilitate_Reconquete: "Rehabilitate Reconquête"
 FRA_Rehabilitate_Reconquete_desc: "Zemmour and his Ultraconservatives are, for all intensive purposes, patriots through and through. An Anti Immigration Party led by a second generation Algerian Jewish immigrant, his role in the far right movement was always one that was met with confusions by his opponents and with strange welcome from his compatriots. With Jean Marie Le Pen once having said that while French often curse him, the Jews have been very kind. Let us return that gratitude to Zemmour, the National Rally will welcome him with open arms and we shall seek to work together in coalition to face against those who would keep France weak."
 FRA_Cement_Military_Control: "Cement Military Control"
 FRA_Cement_Military_Control_desc: "It is no secret the kind of major influence the military has had in France, under the direction of De Gaulle the army maintains itself as a moderating force not unlike the army in Turkey, upholding certain ideals in the state and keeping the nation on a certain course, Under De Villers? This will be solidified.\n\nThe Militaries role as a moderating force is a sacred right won in battle to restore a Republic made weak by Daladier and the Popular Front before him. It was De Gaulle that fought to free France and prop up the resistance while the civilian government laid in exile, we cannot forget this."
 FRA_A_New_Aristocracy: "A New Aristocracy"
 FRA_A_New_Aristocracy_desc: "Money talks and experience wins, the current upper class of France is so concerned with social justice here it forgets the military is the main way to fight injustice anywhere, it forgets the only way to put the food on a plate is to keep business simple, not to regulate every mom and pop shop that struggles to come by. We need a new intelligencia and a new upper class, comprised of military men and business minded people, France needs to make money and make jobs because jobs mean stability, stability means children, and children means a secure future. An Aristocracy with the future strength of France as their first concern is a long term benefit."
 FRA_Play_into_Napoleonic_Overtones: "Play Into Napoleonic Overtones"
 FRA_Play_into_Napoleonic_Overtones_desc: "A military leader in France will always be compared to Napoleon, never was there a more famous military leader than Napoleon. A nationalist will speak of that age as the true birth of a French Nation, a Republican even cannot deny the progress made during their rule, in France military rule is not always seen as a bad thing. De Gaulle set us back on track and again De Villers is entrusted with guiding France in a time of political disjointment, military weakness, and national degradation. Like Napoleon before us, France enters a new period and we could not have a better helmsman for the coming storm."
 FRA_Birth_of_a_French_Military_Industrial_Complex: "A French Military Industrial Complex"
 FRA_Birth_of_a_French_Military_Industrial_Complex_desc: "Why should Germany and America be the only ones with massive arms makers? Raytheon, Rhinemetall, H&K, these companies are practically guaranteed government contracts from their nations of origin and our government has been slow to adopt a similar system, dismantling the Dirigisme System of De Gaulle. We must return to state sponsored industry in the military sector, the free market is no longer good enough in a time where giants prey on us like we are rotting corpses, a feast for Eastern vultures that we once kept locked in a cage."
 FRA_The_French_Reagan_Category: "The Great Strategist"
 FRA_The_French_Reagan_Category_desc: "\n\n\n\n\n£GFX_FRA_great_strategist_cat\n\n\n\n\n\n\n\nAs Pierre de Villiers stands at the helm of France, a transformative era unfolds, characterized by strategic reforms that promise to reshape the nation's military and political landscape. The air is charged with anticipation as de Villiers sets forth a vision aimed at enhancing military efficiency and bolstering national security, instilling pride in every citizen. \n\nWith each reform, the military evolves into a more formidable force, adapting to contemporary challenges while ensuring the safety and prosperity of the French people. De Villiers prioritizes restructuring defense budgets, instituting innovative training programs, and forging strong ties with the defense industry. The goal is clear: to create a military that not only protects the nation but also embodies the spirit of resilience and strength that defines France."
 FRA_Calm_Militarists_decision: "Calm Militarist Rhetoric"
 FRA_Correct_the_Trickle_Down_system_decision: "Correct Trickle-Down Economics"
 FRA_Coordinate_a_March_decision: "Coordinate a Show of Strength"
 FRA_A_Unified_General_Staff_decision: "Unify the General Staff"
 FRA_Perfection_of_Strategy_decision: "Perfection of Strategy"
 FRA_Utilize_Zemmour_decision: "Utilize Zemmour"
 FRA_Play_into_ultraconservativism_decision: "Entertain Ultraconservatives"
 FRA_Promote_Nationalist_Education_villiers: "Promote Nationalist Education"
 FRA_Remove_the_French_Cancer: "Dissect the Left"
 FRA_Soviet_Fearmongering_villiers: "The Russian Menace"
 FRA_All_Hands_on_Deck_villiers: "All for the State"
 FRA_Mass_Militarization: "Mass Militarizations"



 FRA_A_French_Renessiance: "Triumph Of The People"
 FRA_A_French_Renessiance_desc: "The nation of France rejoices as the people have decided that democratic values will remain triumphant over the far right once again. With the burden of the elections now over, the government has been aiming to return the goodwill of the people by implementing reforms—aiming to restore a new sense of unity and national pride throughout the nation. The people's voices have been heard and now we must move to deliver a France for all."
 FRA_Entrench_Centrism: "Entrench Centrism"
 FRA_Entrench_Centrism_desc: "With the close call at the elections, it becomes evident that for our reforms to not only pass but be implemented for the ages we must engrave our beliefs and values deep into the heart of French politics. To achieve this we have started reaching out to the opposition to start dialogue and active cooperation on reforms for the betterment of the French people. With this down-the-middle approach to our policy and reforms, we will be able to better reach the nation and hopefully avoid a repeat of the political divide caused by the last few years of this administration and elections."
 FRA_Uphold_European_Values: "Uphold European Values"
 FRA_Uphold_European_Values_desc: "Unlike our opposition, we hold a firm commitment to the values the European Union sets out for nations across the continent. We dedicate all resources we can to upholding the core values of the European Union through democracy, cooperation, and communication. We will make sure Europe stays strong through economic partnership and advocate for shared policies in order to protect our ideals. A united Europe with France promoting the messages and values of the European Union is one that will last long after our administration is over."
 FRA_Work_with_our_Opposition: "Work With Our Opposition"
 FRA_Work_with_our_Opposition_desc: "To ensure the longevity of our progress and government it becomes apparent that urgent cooperation needs to be enacted between our party and the opposition. Several talks and negotiations have been held and starting now the conservatives with our liberal government in an effort to ensure bipartisanship and cooperation, as we move to secure a strong France in the wake of Russian aggression and global instability."
 FRA_Expand_our_Mediterranean_Influence: "Expand Mediterranean Influence"
 FRA_Expand_our_Mediterranean_Influence_desc: "The Mediterranean Sea has always held great significance to the European continent and France as a nation. To expand our influence and presence around the globe in light of recent events, we will be purchasing the island nation of Malta propping up its economic capabilities, and sharing its culture with the nation of France while also ensuring the security of the island. This land acclimation will bring great benefits to France as well as the people of Malta in the coming years."
 FRA_Push_for_EU_Reform: "Push For EU Reforms"
 FRA_Push_for_EU_Reform_desc: "With the political debacle of France finally halted we now have experience with the dangers of instability and radicalization. We will push the European Union to make dire reforms needing to avoid what has happened in France in the rest of the continent. Strengthening the European Union during this troubling time will benefit not only the people of Europe but also across the globe as we stand up against extremism and hate. France must show Europe its success in its recent struggles and ensure Europe is a place for progress and reform."


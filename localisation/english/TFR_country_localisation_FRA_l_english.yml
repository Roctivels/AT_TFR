 FAF_imperator: "Imperator"
 latinist.4.t: "The Imperial Army"
 latinist.4.d: "The Imperial Roman Army was the strongest army in all of Europe—no, in the whole wide world! They were brave, invincible, and above all a proud army. Unlike our "European" armies, weakness was not allowed. Compulsory service in the army also ensured that all men were hardened by war, always ready to serve and protect their land and kin. Without a powerful army Pax Romana would not have existed. Perhaps Rome itself would not have existed. Like Rome, foes and invaders eye our fertile land, yearning to conquer us and enslave us. The reborn Imperial Army may have different equipments than that of the Roman times, but what is most important is that we inherit their battlehardened spirit and unyielding faith for triumph. Our new Rome shall be undefeatable, undefendable, and undeniable! ROMA INVICTA!"
 latinist.4.a: "We must do all we can to reclaim our Legacy"
 latinist.4.b: "Just some small changes are needed"
 latinist.5.t: "Declaration of the Antipapa"
 latinist.5.d: "Our newfound devotion to the church has not been received well by the ''Pope'' in Rome... As we all know, that red sympathizer has long advocated the acceptance of liberal plagues in our society and has kowtowed to the march of the pedophillic elites, he must be replaced with someone who is much more alike to our beliefs, like Alain Escada"
 latinist.5.a: "Pax Christi in Regno Christi"
 latinist.6.t: "Speaking in Tongues" #Multilingual Education proves successful
 latinist.6.d: ""Au-den-tes for-tu-na ju-vat…" Capon felt each syllable being dragged out of his throat. "God, this is torture!" He snapped the book shut and glanced around the empty classroom. "Why are we still learning this dead language in the 21st century? Who even speaks Latin anymore?"\n\n"Young man, I imagine Virgil would be quite surprised by your pronunciation—though not necessarily in a good way." A steady voice echoed from the back of the room. Capon turned to see Professor Henry, the classical literature scholar, standing in the doorway, holding a worn leather-bound book.\n\n"Professor, I didn't realize you were here…" Capon stood up, slightly embarrassed.Henry waved a hand, signaling him to sit. "Go on. You were making an argument. Latin is obsolete?" Capon hesitated but answered honestly. "Yes, sir. We learn languages to communicate, and Latin has no practical use anymore." A faint smile crossed Henry's lips as he took a seat across from him. "A pragmatic argument. Very modern." He tapped Capon's textbook lightly. "But do you know what the phrase you just read actually means?"\n\n"Fortune favors the bold," Capon replied. "From Virgil's Aeneid."\n\n"Correct." Henry nodded approvingly. "When revolutionaries cried Liberté, Égalité, Fraternité, they were drawing directly from the Roman ideals of libertas, aequitas, and fraternitas. One could argue that Latin is the very soul of France, the foundation of our nation."\n\n"That doesn't mean we have to learn the whole language," Capon countered. "We could just study the key phrases and concepts." Henry stood and walked toward the window. Sunlight filtered through his graying hair, casting a long shadow on the floor. "Do you know why France has always placed such importance on universalism? Why we believe certain values transcend time and place? That mindset comes directly from the Romans. Latin is not just a relic—it is the key to understanding the roots of our culture.""
 latinist.6.a: "Audaces Fortuna Juvat!"
 latinist.71.t: "The European Nation"
 latinist.71.d: "The French Government, seeing our dire situation, has offered us to join a brand new European Nation. It is quite the intriguing offer as after the demise of NATO and our crushing defeat in the European War, we are left with no allies in Europe anymore. Our nation is in dire times and we require a helping hand against the power hungry Communists in the east who otherwise would not hesitate to invade us, erase our culture and use us as one of their pawns."
 latinist.71.a: "A Shield against Soviet Internationalism!"
 latinist.71.b: "Another French attempt at Empire"
 latinist.72.t: "Être à bout"
 latinist.72.d: "We are family, brothers and sisters. Threads of fate bind our people together, and the scarlet liquid that flows beneath our skin unites us. From the snow-capped Alps of Bolzano to the lush, emerald Pyrenees of Iberia, we have always been one people, a singular entity. The bridge between us was built not only by shared blood but also by the deep, unbreakable ties of our culture and history.\n\nIn good faith, we have offered our kin countless opportunities for peaceful unification. Yet, time and again, they have mocked us, dismissed us, or turned their backs on us entirely! We extended to them our love and brotherhood. A union of our nations would have ushered in unprecedented economic and military strength, benefiting all. Yet, they refuse to listen. They reject reason, lack faith in us, and, most tragically, cling desperately to their pitiful notions of ‘’nationalism’’ and ‘’regionalism.’’ Their eyes remain clouded by fruitless separatist delusions, blind to the greatness that could be achieved through unity.\n\nNo one wishes to see blood spilt between brothers, but how can we stand idle when those we love continue to slander and betray us!? Every soul has its breaking point and France has finally reached hers. Now, we stand at a crossroads. Do we extend our hand one final time, pleading for reason to prevail? Or do we let bullets and bombs speak on our behalf?"
 latinist.72.a: "We mustn't let pointless blood be spilled."
 latinist.72.b: "Enough words have already been said. The only language these fools understand is violence!"
 latinist.7.t: "European Federalization"
 latinist.7.d: "Since the fall of the Roman Empire, the dream of a united Europe has inspired the ambitions, hopes, and glory of many visionaries. Yet, it has also sparked some of the bloodiest conflicts in history, costing millions of lives. From autocratic rulers like Charles V of the Habsburgs and Louis XIV of the Bourbons to later figures like Napoleon and Hitler, every attempt to unify Europe through force has ended in failure. As a result, the idea of integrating Europe through a confederation gradually gained traction. The Maastricht Treaty marked a significant milestone in this process, bringing Europe closer to unity than ever before.\n\nHowever, things did not unfold as planned. In 2015, the Brexit referendum struck like a thunderbolt, shattering the fragile balance. As the 2010s progressed, the COVID-19 pandemic and conflicts in Eastern Europe further damaged the prospects for federalization, leaving the future looking increasingly uncertain. At this critical juncture, the spirit of unity is more precious than ever, offering the best hope to dispel the dark clouds that loom over us.\n\nAs one of the leaders of European civilization, the choices made by the French government and its people will determine the fate of Europe for the rest of this century. Will France take a leading role in a future unified European federation? Or will it hold on to its proud Gallic independence, standing firm against all threats? Or perhaps, will it completely break away from the old path and cast aside the 'An die Freude'?"
 latinist.7.a: "Together, European can secure a future for our Children..."
 latinist.7.b: "We appreciate the work, but will remain sovereign."
 latinist.7.c: "We are DONE with these shenanigans!"
 latinist.8.t: "The New Continental System"
 latinist.8.d: "For the new empire, there's one pressing issue that stands out the colossal power stretching from the Oder to the Neisse rivers: the menacing Russian hegemony, baring its fangs and ready to swallow Europe, and perhaps the entire world. If anyone else were at the helm of France, they might consider delaying this formidable challenge. However, retreat and concessions are foreign concepts to the French Empire, which sees itself as the singular leader of Europe. Confronting challenges head-on is in its very nature.\n\nYet, today is not like the past. A single decisive battle leading to a Treaty of Tilsit is a fantasy that will not play out in 21st-century Europe. Confronting Russian dominance is a daunting, slow-burning endeavor. The Emperor and his advisors have turned to their illustrious ancestor, the great Napoleon I, for inspiration. The Continental System of old, which once allied with Russia against Britain, will now pivot to counter their former Slavic ally.\n\nThe French leadership believes France holds a significant advantage in naval power and maritime trade, bolstered by support from other EU nations and possibly swaying the smaller, undecided European countries. In contrast, Russia's options are limited. Confining them to the narrow waters of the Baltic and Black Seas could set the stage for a future military showdown.\n\nHowever, some question the feasibility of this strategy. Critics argue that Russia might rely on its eastern allies to continue trade unimpeded. Furthermore, rebuilding the Continental System could harm Europe more than help, especially since many EU member states remain dependent on Russian oil and natural gas.\n\nSo, will the Emperor seek to emulate the glory of his forebear, or will he choose a more cautious path?"
 latinist.8.a: "A necessary means to an end."
 latinist.8.b: "We decline."
 latinist.9.t: "Imperial Renovations"
 latinist.9.d: "''Versailles is 400 years old, many of the rooms are empty or display rooms for tourists, it is a skeleton of a Palace. A few months of repairs, bringing new furniture and historic art should bring it back to its former Grandeur with a modern touch.'' \n\n''The Palace of Versailles has served its purpose, the half millennium old Palace should continue to serve as a tourist attraction. A new, grander Palace must be commissioned, one which will serve the full needs of its owners.'' \n\n''No work is needed on repairs or ''modernity'', transition Versailles from a tourist attraction into a functional Imperial Palace for the Imperial Family and the Government in its South-West Wing.''"
 latinist.9.a: "A New Era means a New Palace"
 latinist.9.b: "It must be brought into Modernity"
 latinist.9.c: "It is fine as is!"
 latinist.10.t: "Latin Empire demands Annexation"
 latinist.10.d: "France restyled itself as the Latin Empire some time ago and it was considered a reasonable possibility for many months now that France would eventually come to reclaim Hispania, now, this does mean we lose our independence but it doesn't mean we would lose all influence. As an equal part of the Latin Empire we would stand with France and Italy and Portugal as one unified bloc, to counter German dominance and Bolshevik dominance. We have a question to ask ourselves about whether we are Latins first or Spanish? And what is Spain? We have many different kinds of Spaniard here, Galicians, Catalonians, the Aragonese, the Asturians, we have put down the Catalan for many years calling their nationalism selfish and shortsighted. "Alone you will go nowhere!" we cried, and now France cries it at us. Maybe we should listen to them? Perhaps it is time for Hispania to rejoin a new Latin Empire."
 latinist.10.a: "Hispania rejoins the Empire!"
 latinist.10.b: "Nay!"
 latinist.11.t: "Latin Empire demands Annexation"
 latinist.11.d: "The French were always holding things over our heads, smug and prideful people. Yet when they declared themselves the Latin Empire we saw a different side of French pride, we saw a side that spoke to our delegates as brothers. When months ago we inquired what the future would hold with France gone and the Latin State in its place, they proposed a plan to unify all of the Latin peoples into one super state, a new Rome, a grand new Empire in Red and Gold like our ancestors had two millennia ago. They said they wanted us at their side to counter Germany, they wanted us to dominate Europe again together. The Gallic Ambassador came today delivering what he called good news. They had finalized their plans and goals and were ready to annex us. They were ready they said, as if they felt our acceptance was assured? It is not so easy to toss away ones nation to simply join a greater whole. What guarantee do we have that this is not another thinly veiled French Empire coated in Roman regalia and given a warm smile? Their troops peer into the peninsula ready to cross the Rubicon. We have a choice to make."
 latinist.11.a: "Like a Pheonix from the Ashes of Europe!"
 latinist.11.b: "Nay!"
 latinist.12.t: "French Army marches into Catalonia"
 latinist.12.d: " The French Army has been seen on media marching into Catalonia, citing the unstable situation in Spain as reasoning to bring the Catalonians into the French fold. This is a thinly veiled attempt to reestablish the March of Catalonia, what do they think they are? Frankish? This core territory of Spain has been lost to a foreign power while we are in our weakest state since 1936. We cannot just let this go unpunished, even if we cannot respond right now with military action we have to do something to these bastardos! An Embargo! Anything! Or…perhaps we can simply let them have the troublesome Catalans. Maybe it's not too bad of a loss."
 latinist.12.a: "We will Survive"
 latinist.12.b: "Traitors! Embargo!"
 latinist.12.c: "This CANNOT stand!"
 latinist.13.t: "France Marches on Rome"
 latinist.13.d: ""
 latinist.13.a: "We Have No Other Choice..."
 latinist.13.b: "Traitors! We will Never Submit!"
 latinist.14.t: "Italy Retreats From Rome"
 latinist.14.d: ""
 latinist.14.a: "Great!"
 latinist.15.t: "Italy Refuses to Submit"
 latinist.15.d: ""
 latinist.15.a: "They Know Their Fate..."
 latinist.16.t: "Latin Empire demands Annexation"
 latinist.16.d: ""
 latinist.16.a: "Yes"
 latinist.16.b: "No"


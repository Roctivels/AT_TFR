 FRA_Reforming_Civil_Services_idea: "Bureaucratic Reformation"
 FRA_Reforming_Civil_Services_idea_desc: "With the comprehensive overhaul of the Civil Service we are reaping the current benefits of reforms being passed by our governance. Striving to achieve better efficiency, accountability, and adaptability among other things, it is self-evident that the end result of these reformations will help France achieve its current goals of modernizing the administrative capabilities of the nation of France and appease the government body pushing for these reforms."
 FRA_Reforming_Civil_Services_anti_corruption_idea: "Bastion against Corruption"
 FRA_Reforming_Civil_Services_anti_corruption_idea_desc: "With the comprehensive overhaul of the Civil Service we are reaping the current benefits of reforms being passed by our governance. Striving to achieve lower corruption, and accountability among other things, it is self-evident that the end result of these reformations will help France achieve its current goals of modernizing the administrative capabilities of the nation of France and appease the government body pushing for these reforms."
 FRA_ENA_idea: "École nationale d'administration"
 FRA_ENA_idea_desc: "Founded by Charles de Gaulle in 1945, the ENA was meant to democratize access to France's senior civil service, with only 80-90 students graduating each year. A prestigious institution, it has been a key path to high positions in both public and private sectors, with four French Presidents, including Emmanuel Macron, among its graduates.\nHowever, the Yellow Vest protests have highlighted the ENA's elitism, criticizing its graduates for promoting narrow, centrist policies and maintaining social divisions. With most ENA graduates coming from wealthy families, only 6% are from working-class backgrounds.\nOn April 25, 2019, Macron announced the closure of the ENA, but as France faces future economic challenges, it remains uncertain whether this decision will stand."
 FRA_INSP_idea: "Institut National du Service Public"
 FRA_ENA_Suspended_idea: "ENA Suspended"
 FRA_ENA_Funds_idea: "Spreading the Dough"
 FRA_ENA_Funds_idea_desc: "As the general deconstruction of the École nationale d'administration commences the funding previously designated for the administration now has the opportunity to be reallocated to broader administrative reforms such as the education system and more institutional systems. While the reallocation is being processed the newly freed up resources will be circulated into the economy to further assist in modernization of the nation."
 FRA_Sacking_ENA_Veterans_idea: "Out with the Old"
 FRA_Sacking_ENA_Veterans_idea_desc: "As the saying goes ''Out with the Old, In with the New.'' We intend to remove the veterans of the École nationale d'administration, many who have been responsible for the decline of the administration. With the freeing up of these positions we are able to easily transfer qualified individuals into the newly opened positions in an attempt to further push the reformation and modernization of the French administrative institution. "

 france.6969.t: "Macron Dreams of Jupiter"
 france.6969.d: "I am the state. This is a quote attributed to a king, but it fits my republic nonetheless. After all, what is the point of power if it is not held by one, and used for greatness? When one only has minute powers, when one is forced to interfere in minutia, it becomes meaningless.\n\nLook to Jupiter, the planet and God. Did he interfere with each specific life that he came across and make sure it was perfect? No, he took matters into his own hands when it truly mattered, with complete reign over the situation. He is not the one who lifts a pebble and throws it across the lake, he is the unending influence over eons and eons, that will change the course of history.\n\nWhy should a man seeking to do great things concern himself with the matters of the day-to-day life? Great things require great action, not great compromises or great coalitions. If change is not done by one man, it inherently requires compromise, within it there are flaws and misconsiderations done only to appease. Why should I be beholden to this? Why should I be forced to muddy my hands with indignity towards every person's minor flaw in a year's long idea?"
 france.6969.a: " - Emmanuel Macron"
 france.6970.t: "What Could Have Been"
 france.6970.d: "France has been led astray and betrayed by corrupt nationalists like Le Pen and the parasitic populists like Melenchon. Their petty squabbles and incompetence lead the republic to nothing, but the shame of defeat and the sting of economic collapse. Like two sides of a coin, their lust for control and dominance made them ignore the reality that only a united Europe could weather the coming storm. They have forced our hand and this new Europe must be born from the ashes of the old. For France to survive, we must toss the old aside and embrace our place in Europe-A Europe united and free. A democratic Europe. A strong Europe. One that shall never again experience defeat on the battlefield and in the market."
 france.6970.a: "Never again..."

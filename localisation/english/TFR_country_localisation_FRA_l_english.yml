 FRA_anti_islamism: "Anti-Islamist Protests"
 FRA_anti_islamism_desc: "Seeing as the influx of refugees from the Middle East has only ballooned after the outbreak of the Saudi Civil War, the number of protests against these groups has soared. While the ideologies they subscribe to vary, these groups share the belief that these asylum seekers must be denied entry primarily due to their religious beliefs. While these remain more tied to the right wing of our politics, we must find better means of either integrating or controlling the rate of immigration or risk these protests becoming tools of radicalization that undermine the public's belief in our sacred democratic institutions."
 FRA_Oil_Crisis: "Oil Crisis"
 FRA_Oil_Crisis_desc: "With the Saudi-Arabian Civil War, the Arabian Peninsula has lost what borrowed stability it had achieved prior and thrust the sub-continent into even further insecurity and instability across the region. The immediate conclusion to the civil war does not seem imminent and the effects are being felt immediately. The possibility of getting oil through another party is not currently within our reach as both Russia and Venezuela are currently embargoed by Western Nations and would hurt our international image to circumvent these embargos. Until we can secure a reliable source of oil we will continue to suffer the effects of the Saudi's conquest for power. "

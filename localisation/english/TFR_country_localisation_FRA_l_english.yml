 FRA_Dirigisme_idea: "Dirigisme Economics"
 FRA_Dirigisme_idea_desc: "The Idea of Dirigisme has always played a part in the economic systems of France. With the increment of bonds for the next decade we are to make sure the nation of France flourishes economically through whatever means necessary as the rise of instability across the world continues to rise. With this national revivalment of the Dirigisme system, we will ensure that France runs more efficiently and work to fix the follies of previous economic systems that have hindered the French Nation in multiple ways. "

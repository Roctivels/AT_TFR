 FAF_fasces_over_france_cat: "Fasces Rises over France"
 FAF_fasces_over_france_cat_desc: "\n\n\n\n\n£GFX_FAF_french_fascist_cat\n\n\n\n\n\n\n\n"
 FAF_legalize_paganism_decision: "Encourage Paganism"
 FAF_legalize_paganism_decision_desc: "Christianity is an abnormality. It was not a French creation, in fact not even a European one. It is the cancer which spreads uncontrollably and at an inconceivably swift pace. So much so that it drove out our ancestral and native beliefs. It made the French people forget who they truly are! Forget their roots! Their heritage! That is why we must bring back the truly French religions, the ones that define our people as Gaul, and not as "Christians"."
 FAF_provoke_french_opposition_decision: "Provoke French Opposition"
 FAF_provoke_french_opposition_decision_desc: "What is the best way to bring ourselves into the limelight while bashing the opposition? Making them look bad of course. How? It's quite simple really, the oldest trick in the book of politics. We will bait them with ambiguous insults while they in anger make a fool out of themselves."
 FAF_word_of_the_bishop_decision: "Word of the Bishop"
 FAF_word_of_the_bishop_decision_desc: "Throughout European history, the papacy has played our people and rulers like a fiddle. Using Christian faith as an invisible weapon to shape Europe into a twisted image of its former self. No longer will we shed our blood in the name of a fictional god. The pope shall become our choir boy and sing our praising songs."
 FAF_reorganize_the_LVF_decision: "Reorganize the LVF"
 FAF_reorganize_the_LVF_decision_desc: "Loyalist Volunteer Force's name was bastardised by those who never truly understood it. The Reds and Liberals are the sole reason our nation is in decline, that is why this nation needs more groups like the loyalists to clean this filth within our nation and rid it of its disease."
 FAF_glorify_collaborationism_decision: "Glorify Collaborationism"
 FAF_glorify_collaborationism_decision_desc: "Collaborationists are always called traitors, rats, and dogs. But how can one be a traitor when one is working to rid his nation of a disease which is slowly killing it? When our people worked with the Germans during WW2, it was not to undermine our nation but to root out the Bolshevik menace. That is certainly no rat nor traitor, but a curer and a carer."
 FAF_work_f_decision: "Our Work!"
 FAF_work_f_decision_desc: "Work must and has to be done. Labour is the only form of action which always produces positive results. Bricks won't lay themselves. Roads won't pave themselves. Crops certainly won't grow on their own. Only with the sweat and blood of our people can this once glorious nation of ours be rebuilt."
 FAF_family_f_decision: "Our Family!"
 FAF_family_f_decision_desc: "Family is everything, above all else. The holiest thing there is is the family structure. Only by upholding traditional family values and structure can France repopulate itself. The war has almost wiped out an entire generation of people. If we do not refresh our nation's lifeblood, we are doomed to putrefy and collapse."
 FAF_fatherland_f_decision: "Our Fatherland!"
 FAF_fatherland_f_decision_desc: "Homeland, fatherland—the force that unites our people and makes us indivisible. Without it, its people are nothing; and without its people, it cannot exist. The two are bound together in a symbiotic relationship. If our people ever forget their fatherland, then the large family that was once our nation will be broken forever. Shattered to be taken over by foreign powers."
 FAF_honest_french_middle_class_decision: "Our Honest People"
 FAF_honest_french_middle_class_decision_desc: "he French people embody the perfect image of god's creation. Honest, immaculate, and wise. It was these traits that made our nation prosper and great. The French have never wanted dominance over others, but to simply spread our ideals and culture."
 FAF_oui_oui_oui_decision: "§COui! Oui! Oui!§!"
 FAF_oui_oui_oui_decision_desc: "Say yes to war! Say yes to sacrifice! Say yes to victory! Our defeat in the Russo-European War has caused our people to forget what once made us a glorious and powerful nation, so we must remind them of it. By guiding them forward, we will teach them how to think and how to act—not only for their own sake, but also for our national revival."
 FAF_non_non_non_decision: "§RNon! Non! Non!§!"
 FAF_non_non_non_decision_desc: "Say no to pacifism! Say no to liberalism! Say no to communism! It is one thing to clean house, but quite another to root out the rot that grows deep within our nation. The filth that still poisons the minds of our citizens will not disappear on its own; instead, we must guide our people onto the right path and prevent them from straying."


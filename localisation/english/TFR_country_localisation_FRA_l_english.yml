 FAF_New_Era_Category: "Some of the Old, Some of the New"
 FAF_New_Era_Category_desc: "\n\n\n\n\n£GFX_FAF_new_and_old_cat\n\n\n\n\n\n\n\nFrance has long been the centerpiece of European history, we have the richest history, and our destiny is set in the stars. When they speak of civilization, it ultimately traces back to our national achievements. Who has given so much to arts, culture, philosophy, science, and technology? Who had spent so much time elevating millions across the world in the ideas of Enlightenment and modernity? We have been the few to do so. French is amongst the most spoken languages in the entire world and was once the lingua franca of all international diplomacy. Whole economies and national politics of foreign nations bend to our national will.\n\nIn the past, French soldiers have set foot on every continent and claimed it for our glorious nation to spite other petty European empires, but as those Empires died to revolutions that we birthed from our own glorious revolution, we remained. We have graced centuries upon centuries of European history as a continental power to be reckoned with. This is who we are! This is our destiny! This is who we will remain as long as we live! The entire world will once again kneel to our word, not only our enemies, but our allies as well. Vive la France!"

 FRA_yellow_vests_idea: "Yellow Vest Protests"
 FRA_yellow_vests_idea_desc: "\n\n\n\n£GFX_FRA_yellow_vest_banner\n\n\n\n\n\nThe French economic slowdown has hit workers hard, with rising fuel prices, high living costs, and growing inequality threatening standards of living. Meanwhile, a disproportionate tax burden falls on the working and middle classes. In May 2018, a petition gained nearly 1 million signatures, sparking protests that have continued for nearly two years.\nThe protests, symbolized by yellow vests, have brought together both the far left and far right in opposition to neoliberalism. Protesters have blocked roads, built barricades, and marched in mass demonstrations.\nViolence has escalated, with cities experiencing unrest, clashes with police, and widespread property damage. Macron's approval rating has dropped by over 20 percent. These protests may mark a turning point in French politics—shifting away from liberalism toward a rise in extremism."

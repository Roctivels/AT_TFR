 #Jacobins
 FPR_Purify_our_Revolution: "Purify the Revolution"
 FPR_Purify_our_Revolution_desc: "The Revolution is not something that can be carried out by everybody. It is something pure and to be handled by the vanguard that fights for the people. By those who are enlightened and those who can defeat reactionary and counter-revolutionary forces without mercy. Any of those who refuse to fight will be done away with."
 FPR_Purge_Capital: "Purge Capital"
 FPR_Purge_Capital_desc: "Capital is a god you can kill. This is something many say. However, Capital is no god. It is something that is rusty and something that can easily be twisted off merely by cutting off the hinges, it is a machine that has grown old and weak. It is a weed that we will deny the life of with a single pull, yanking away any foundation that it has left within the revolutionary state, no matter the consequences."
 FPR_Ban_Political_Opposition: "Ban Political Opposition"
 FPR_Ban_Political_Opposition_desc: "'Opposition', in the end, is only a tool others can use to grind our perfect revolution to a halt. It is merely a tool that can be used against the people when rulers don't have their exact words and specifications being used. As such, it is completely and utterly useless. Look at the chaos which happened during the eras when democracy was attempted. Surely, it is meaningless. It shall be done away with, just as was the similarly decrepit and ancient monarchy."
 FPR_Cult_of_Reason: "The Cult of Reason"
 FPR_Cult_of_Reason_desc: "Every instrument of the state and of philosophy should be directed towards the philosophy of the revolution and continuing to fight for it. There should not be a moment's break, there will not be religion. Such things have no place in the revolution. All there is to do is fight, fight to break the chains of reaction."
 FPR_Our_Greatest_Tradition: "Our Greatest Tradition"
 FPR_Our_Greatest_Tradition_desc: "We, the French people, have no reservations against the use of violence and force against those who fight against us, and even those who merely do not fight with us. As such, we shall not hesitate either. When it comes to our philosophy, there will not be one sacrifice, not one step back in the direction of what was beforehand. Not a single action against our principles of rationality will be tolerated."
 FPR_The_Rational_Renaissance: "Renaissance of the Rational"
 FPR_The_Rational_Renaissance_desc: "Idealism and Utopianism seem to be far too common within revolutionary minds nowadays. This is something that we will deny and counteract, those truly materialist and rational thinkers will be promoted and allowed to flourish within the Jacobin regime, just as they were within America. The faltering and counter-revolutionary utopian left will be done away with, and in its place there will be laid a beautiful garden of rationality and reason."
 FPR_Replace_the_Red_Guard: "Sack the Revolutionary Guards"
 FPR_Replace_the_Red_Guard_desc: "There is nothing Revolutionary in the so-called 'Revolutionary Guards'. They are nothing but a reactionary remnant of a regime that should be done away with, nothing but a man trying to grab power for himself. They are traitors to our nation, they are disgusting sympathizers to the right and to anti-revolutionary means. They will be cut off at the neck. Every single one."
 FPR_Restore_French_Pride: "Pride in our Being"
 FPR_Restore_French_Pride_desc: "While our allies have seemingly disregarded the history of France and its French culture as nothing but an afterthought, we will do naught but the opposite. The history of the French Revolution, the actions and bravery of Robespierre, and the so-called 'reign of Terror' are things to be celebrated, not things to be denied. Have pride, and live happy knowing that you are French."
 FPR_Establish_the_War_Cabinet: "The Revolutionary War Cabinet"
 FPR_Establish_the_War_Cabinet_desc: "The threat of fascism in the east is not something that we can ignore, the inherently reactionary Russian state is once again rearing its head against us. We must take proactive steps against them, and form our own council of war, our own protection against those counter-revolutionary forces within our world, and be the one who will make the first strikes against them."
 FPR_Establish_the_Sister_Republics: "Spirit of the Sister Republics"
 FPR_Establish_the_Sister_Republics_desc: "Just as the First French Republic did, we must look outwards, destroy any threat that prompts itself to us before they even become a threat. We must spread the ideologeme of Jacobinism throughout all of Europe, liberate it all as brother and sister to France. It is only then that we shall all be free."
 FPR_sister_republics_tt: "This will give us the ability to demand that nearby allies submit themselves to the glory of our ideology and become §RSister Republics§! like in the times of the first Republic."
 FPR_An_Army_of_the_Party: "The Army of Léaument"
 FPR_An_Army_of_the_Party_desc: "With our enemies done away with, and any 'allied' force against us pushed into history's dustbin, France and its soul itself can be directed towards war. Every atom that we have shall be directed towards destroying threats to our revolution, destroying the reactionaries that threaten us from outside. Through lead and blood shall the future be freed."
 FPR_Supreme_Continental_Authority: "Supreme Continental Authority"
 FPR_Supreme_Continental_Authority_desc: "L'Ascension de la Révolution. \n\nJust as it was during the first revolution, there is no power that can meet her might, no enemy of the Revolution that can prevent the people overthrowing the faux-revolutionary and the dictatorial regimes of eons past. No longer will anyone be fighting against the true freedom, no longer shall the history of freedom be tarnished black by lies and rumors against its origins.\nRobespierre smiles. Even in death, his dream was achieved."

 FPR_jacobin_category: "The New Enlightenment"
 FPR_jacobin_category_desc: "\n\n\n\n\n£GFX_FPR_new_elightenment_cat\n\n\n\n\n\n\n\nThe nation of France is something that has long forgotten the ideologies of reason and freedom invented in the First Revolution, and then once again reinvented by Maupin. Our 'allies' on the left have completely done away with the path to the future out of fear.\n\nFear is the enemy of progress. Fear is the enemy of rationality, and the barrier to the future. There is no revolution without destroying subversion."

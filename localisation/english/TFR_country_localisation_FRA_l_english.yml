 FRA_Civil_War: "Battle For the French Spirit"
 FRA_Civil_War_desc: "France's soul is upheld by a proud heritage of revolutionary prowess. Propaganda glorifies the state and suppresses dissent, for the struggle to define our nation's future has allowed our people to revisit our battle against the globalist bureaucrats and restore our people to their pedestal."

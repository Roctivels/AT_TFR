 #Reign of Roses
 FPR_The_Soft_Revolution: "The Reign of Roses"
 FPR_The_Soft_Revolution_desc: "Didier Daeninckx has successfully taken power within our nation, and with his ascension to leadership he promises a peaceful future for all Frenchmen. There is an illusion that socialism can only be achieved through violent means, but we know this is not the case. Daeninckx will peacefully bring a slice of utopia to France, and show the world the rewards that positivity and passivity can reap."
 FPR_The_Soft_Revolution_tt: "§YThis will unlock decisions to§! §pachieve utopia§!"
 france.9002.t: "Destination Utopie"
 france.9002.d: "In order for Daeninckx and his government to build utopia within France, two objectives must be met.\n\nFirstly, the government and specifically the laws of [ROOT.GetNameDef] must be reformed. While the government is largely in support of these reforms, it will still take considerable political capital to push the reforms through at a rapid pace. If we wish to come out of this with as much remaining political power as possible, we should take advantage of the various ideas Daeninckx has.\n\nSecondly, and more importantly, we must reach a developmental state fit of a utopia. Law reform will help with reaching this goal, but there are a number of other ways as well.\n\nIn short, utopia can be simply reached by implementing ideal laws and reaching high development."
 france.9002.a: "Allons-y!"
 FPR_Artistic_Revolution: "Artistic Revolution"
 FPR_Artistic_Revolution_desc: "In today's world of war and strife, beauty is a thing that is found in less and less places. Regardless, it is still there, and there are people who are skilled at finding it. Ever since our takeover of the French government, art across the country has flourished, and it seems our nation may be entering a new renaissance."
 FPR_Technosocialism: "Technosocialism"
 FPR_Technosocialism_desc: "With the onset of the modern age, traditional socialism just won't work anymore. Less people are working in factories and fields, as robots and machines take their place. Why make our people continue to do unnecessary backbreaking labor? We will help completely transition people out of these industries and into lines of work where they can have better lives."
 FPR_Cultural_Revolution: "The Cultural Revolution"
 FPR_Cultural_Revolution_desc: "For many years French culture has been structured around the existence of the bourgeois. As we work diligently to peacefully phase out capitalism and remove the bourgeois, our culture must change as well. We have seen the emergence of a cultural revolution, one that is structured around the common people of this nation, and not the rich ones."
 FPR_Peace_Bread_and_Equality: "Peace, Bread, and Equality"
 FPR_Peace_Bread_and_Equality_desc: "Utopia is not some hard to reach thing, and it is much simpler than some people might have you believe. Food in your belly, friendly neighbors, and a system that treats you like everyone else. Utopia is that simple. We must strive to achieve these goals, the people of France deserve it."
 FPR_Embrace_Passivity: "Embrace Passivity"
 FPR_Embrace_Passivity_desc: "War has never brought anything to the average person. It allows the rich to line their pockets, while the poor lose their loved ones. From this point on, France will no longer be a country known for military might or nationalistic tendencies, we will be known as a peaceful and prosperous nation!"
 FPR_embrace_passivity_idea: "Passivité Militaire"
 FPR_Artisinal_Politics: "Artisinal Politics"
 FPR_Artisinal_Politics_desc: "There's an old saying along the lines of 'why become a sailor when you could be a politician, they're basically the same.' This saying remains true to this day, politics is a bloody mess. It's ugly, but it doesn't need to be that way. Like most things, government is an art at its core, and we will work to ensure that it is as beautiful as paintings and poetry."
 FPR_The_Revolutionary_Artist: "Revolutionize French Media"
 FPR_The_Revolutionary_Artist_desc: "The media is a corrupt system used by enemies of the people to lie to them. While the temptation of using a state controlled media to manipulate the people is there, it is not one we will give into. We will ensure the media only speaks the real truth, not the 'truth' that some people want the public to hear."
 FPR_The_Poet_of_the_Revolution: "Poet of the Revolution"
 FPR_The_Poet_of_the_Revolution_desc: "Together, the people's voice tends to drown itself out. When they work as one, amazing things can be achieved, but their infighting knows no bounds. They don't need a leader, but they need a voice. Daeninckx will be that voice, he will meet with the people, hear their every concern, and ensure their ailments are remedied. It's the least they deserve."
 FPR_poet_of_the_revolution: "Poet of the Revolution"
 FPR_Vanguard_of_Peace_and_Porsperity: "Vanguard of Peace and Prosperity"
 FPR_Vanguard_of_Peace_and_Porsperity_desc: "Since our takeover of France, a pleasant calm has befallen the nation. Crime is down, standards of living are up, and the people are content with their life. Yet there are those who wish to take our little slice of heaven away from us, and so we must remain vigilant and stand tall amidst a sea of enemies."
 FPR_Vanguard_of_Peace_and_Porsperity_tt1: "Chance based on the current popularity of [ROOT.GetRulingPartyLong]"
 FPR_Vanguard_of_Peace_and_Porsperity_tt2: "Chance based on the current popularity of the most popular non-ruling party"
 FPR_The_Art_of_Politics: "The Art of Politics"
 FPR_The_Art_of_Politics_desc: "Working together, bickering, striking deals both secretive and public, you'll find it all in politics. We must be careful not to greatly disturb the current governmental apparatus, lest we anger the public. Therefore we must dance to its tune, while also ensuring we control the song playing from the jukebox."
 FPR_The_Art_of_Politics_idea: "Political Dancing"
 FPR_The_Art_of_Politics_idea_tt: "All £political_advisor_cost_texticon Government Member Cost: §G-10%§!\nAll £economy_laws_cost_texticon Economic Laws Cost: §G-10%§!\nAll £conscription_laws_cost_texticon Military Laws Cost: §G-10%§!\nAll £economy_laws_cost_texticon Social Laws Cost: §G-10%§!"
 FPR_Peace_through_Defense: "Ensure a Millennia of Peace"
 FPR_Peace_through_Defense_desc: "Our enemies, as much as we would love to put aside our grudges with them, do not have the same wishes. Our peace is under siege on all sides, so, while it may sound hypocritical, we must be able to defend it. If all goes in our favor, the people of France will never have to experience war again. If not, they may only need to endure one more."
 
 FPR_utopia_category: "Destination §pUtopie§!"
 TFR_utopia_scripted_gui_desc: "Didier Daeninckx has promised the French people an utopia built on the principles of socialism, and he intends to keep that promise.\n\nIn order to reach our goal, we must §Yreform our laws§! and §Yimprove the development§! of our nation to meet the standards of utopia.\n\nThough it may take many years of hard work, when we do eventually accomplish our task, we will be able to declare to the people of the world:\n\n§GUtopia is real, her name is France and she is a socialist§!."

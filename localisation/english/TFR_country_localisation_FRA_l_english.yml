 FRA_Laissez_Faire_idea: "Laissez Faire Economics"
 FRA_Laissez_Faire_idea_desc: "After decades of dealing with the bloat and corruption incurred by the system of ''Dirigisme,'' we've finally made a shift to let the hand of the free market guide our country forward. Along with the cash flow we've gotten from selling off our former ''national champions,'' the massive tax cuts have left our people with more than enough money to help boost our citizen's purchasing power. Some may bemoan the risks of economic ''shock therapy'' on the formerly public system and their lost jobs in the public sector; we know that the free market is much more capable of servicing the needs of the people in the pursuit of profit!"

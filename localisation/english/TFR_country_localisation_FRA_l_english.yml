 FAF_EUN_army_of_purity_dummy: "The European Hegemony"
 FAF_EUN_army_of_purity_dummy_desc: "As Identitarians, our movement differs from the usual far-right continuum across Europe by supporting continental unification rather than the mere nations that comprise it. Seeing the European Union's implosion at the hands of  the eastern hordes, an opportunity to fill the power vacuum and stand as Europe's hegemon has arrived. While it may cost us politically to maintain our influence, being the new center of the continent is essential to ensure that we triumph over the forces of  multiculturalism, liberalism, and the forces that seek to destroy our beloved Europe!"
 FAF_EU_unification_campaigns_idea: "Hegemonic Unification Campaign"
 FAF_EU_unification_campaigns_idea_desc: "In our crusade to unite all of Europe, we must take into account that our unification is different from the ones posed by the former Federalists of the European Union. Our campaign centers around forming a {{color|cyan|European Hegemony}} that seeks to unite the continent but under a hegemony that protects its people and cultures rather than extracting wealth for technocratic elites. For the next year, we have dedicated vast resources to ensure this campaign will succeed and allow us to rid the continent of all foreign influence!"
 FAF_europeanism_idea: "Europeanism"
 FAF_europeanism_idea_desc: "Europeanism calls for Europe to stand united whilst maintaining national identities and regional cultures. Europe divided cannot stand against global powers, a united armed forces allows us to reduce the number of weapons systems in use and with a common language, recruit across a continent of upwards a half billion."


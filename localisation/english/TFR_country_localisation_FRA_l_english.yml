 FAF_Support_Benedetti: "Support Benedetti"
 FAF_Support_Benedetti_desc: "Our great leader Benedetti will be the driving force of the new national rejuvenation. Through the ashes of defeat has he risen up to be the great saviour of France and such the party must be united behind him, those not, must fall in line."
 FAF_Praise_the_Army: "Praise the Army"
 FAF_Praise_the_Army_desc: "Our soldiers fought valiantly on the eastern front, but unfortunately, they were betrayed by cowardly leadership. Our new state will restore the honour of the great French army; the courageous French army shall be the backbone of the new French state."
 FAF_Promote_Active_Clubs: "Promote Active Clubs"
 FAF_Promote_Active_Clubs_desc: "Active clubs are crucial in turning directionless young men into organised nationalist french youth. In every revolution in history, the fervour of youth was the driving force of change and that must be utilised today to create hungry energetic youth!"
 FAF_Honor_Vichy: "Honor the Vichy Regime"
 FAF_Honor_Vichy_desc: "Marshal Pétain was a hero who guided the French people under our most turbulent era, yet after decades of forced rule under neoliberal regimes has the glory of Vichy heroes been slandered. The sacrifices made by the brave men must be remembered by the French people."
 FAF_Cult_of_Benedetti: "Formulate the Cult of Benedetti"
 FAF_Cult_of_Benedetti_desc: "Benedetti will not only be a strong leader leading a broken nation but also the symbol of the new French era. Every French man, woman, and child will view Benedetti as the symbol of the French phoenix rising from the ashes of neoliberal degeneracy and defeat."
 FAF_Utilize_Lafayette: "Utilize Lafayette"
 FAF_Utilize_Lafayette_desc: "Lafayette was one of the leading forces in overthrowing the old regime and has become sort of a modern-day Napoleon. He has become one of the most famous men in France as such, and his public support will be crucial in cementing our rule."
 FAF_Create_Identity_Forums: "Create Identity Forums"
 FAF_Create_Identity_Forums_desc: "The Roman forums were a center for intellectuals to discuss science, philosophy, and more. France also has been a nation of intellectuals and as such we must revive our intellectual culture and create forums for the new nationalist thought."
 FAF_Look_to_the_Glory_of_Rome: "Look to the Glory of the Past"
 FAF_Look_to_the_Glory_of_Rome_desc: "France is a nation of poets, philosophers, artists and great conquers. As the heirs of the great Charlemagne, we have become the center of European innovation and glory. Although France has been under tough times we must remind the people of our past and despite all the troublesome times France lived, and marched on. "
 FAF_Harness_Federalist_Sympathizers: "Harness Federalist Sympathizers"
 FAF_Harness_Federalist_Sympathizers_desc: "Many officials in the previous fragile and weak government that we succeeded had sympathies for our movement, and with our movement empowered, these former officials can make up for their previous inaction and disgraces by helping us now."
 FAF_Glorify_the_Imperial_Era: "Glorify the Imperial Era"
 FAF_Glorify_the_Imperial_Era_desc: "There is nothing better than a great continent spanning empire, its people, its culture, its cities, all united together under one flag and one ideology. Many times we were so close to this, to accomplishing this utopia and yet were denied it over and over again. This is will be our final and most determined attempt for what we have so long dreamed for, and we will relish in glory once it is accomplished."
 FAF_Formulate_Latinism: "Formulate the New Doctrine of Latinism"
 FAF_Formulate_Latinism_desc: "Latinism as an ideology has always been something that is rather spread apart and incoherent. We must make it something that is entirely united and single-minded, akin to a hive mind of an ideologeme. Should we not, the dream of a new Rome may be tarnished forevermore."
 FAF_Disrupt_Benedetti: "Disrupt Benedetti"
 FAF_Disrupt_Benedetti_desc: "Benedetti, Benedetti. Naught is he but another fascist trying to model himself off of failed states long gone. His cultural thought of ‘France’, as a singular nation, as an ethnostate, is idiocy at its finest form. Anything he has planned - be it a speech, propaganda, anything and everything, should be hidden away or corrupted in other manners, to not let his corrupted, rotting ideals spread across our multinational nation."

 FAF_Identity_Forums_category: "Beyond our Singular Purpose"
 FAF_Identity_Forums_category_desc: "\n\n\n\n\n£GFX_FAF_identitarianism_cat\n\n\n\n\n\n\n\nThe beauty of this continent cannot be matched, for the longest time the neo-liberal project has attempted to turn Europe into both an economic zone and a cultural theme park for the rest of the world to do as they please.\n\nWith France under our guidance, we can build up a proper union of Europeans, for Europeans, by Europeans, unity, identity, and purpose for our brothers and sisters."
 FAF_europa_united_against_communism_decision: "Europe Unified Against Communism"
 FAF_europa_united_against_communism_decision_desc: "Compared to any other ideology, Communism is the most antithetical to the identity of Europe as we know it. Baiting our workers with lies of prosperity, they only seek the destruction of the European identity in their never-ending crusade of a homogenous "equality" that seeks the destruction of our culture. Whether the hordes of the East have returned to the scourge of Bolshevism or not, their former ties could be tied to rising anti-Russian sentiment across Europe. Regardless, we might as well kill two birds with one stone to ensure that far-left radicals are purged from our society."
 FAF_europe_for_europeans_decision: "Europe for Europeans"
 FAF_europe_for_europeans_decision_desc: "Since the beginning of our movement, we've always stood on the idea that Europe should only be for Europeans. With our power now secured, we can finally turn this former rallying cry into a concrete policy that can help solidify our rule. Now that the radicals on the left, whether part of the Marxist or Liberal varieties, can no longer shout about "appeals to hatred" and a lack of "empathy" towards these foreign agents… It's time to live up to our promises!"
 FAF_european_beauty_dynamic: "Virgin Lands of Europa"
 FAF_european_beauty_dynamic_desc: "The lands that are Europe must have their natural beauty and stature maintained above all else. Destroying that which is Europe is akin to destroying part of our own heritage and soul for no better reason than industry is a grave sin that we must reverse, unless we wish to remove that which makes Europe the pristine and impeccable land that it is."
 FAF_european_beauty_state_dynamic: "Virgin Lands of Europa"
 FAF_european_beauty_state_dynamic_desc: " From above, Europe is just another continent, but truly, it is a cradle for which all of humanity owes its thanks to. It is a beautiful artwork of geography, culture, and history, and we will not harm it unnecessarily. Should conquers or foes fall upon these lands, and tarnish it like barbarians, they will find nothing but fate in its most true form. Death."
 FAF_european_nation_dynamic: "The European Hegemony"
 FAF_european_nation_dynamic_desc: "As Identitarians, our movement differs from the usual far-right continuum across Europe by supporting continental unification rather than the mere nations that comprise it. Seeing the European Union's implosion at the hands of the eastern hordes, an opportunity to fill the power vacuum and stand as Europe's hegemon has arrived. While it may cost us politically to maintain our influence, being the new center of the continent is essential to ensure that we triumph over the forces of multiculturalism, liberalism, and the forces that seek to destroy our beloved Europe! "
 FAF_clarity_in_liberty_decision: "Clarity in Liberty"
 FAF_clarity_in_liberty_decision_desc: "Some claim that our movement being on the right means that we only want a totalitarian dictatorship that only brings about suffering. While some among our ranks think such a system would be the most optimal, the truth is that the idea of "liberty" is one that we can co-opt and use to bring in those nostalgic for the liberal democracies of old. Said liberty, however, is not tied to progressive nonsense and minority worship that was witnessed before the fall of the neo-liberal world order. Sure, those who benefitted from these liberties are sure to complain, but the point was to rid the continent of them anyway… right?"
 FAF_new_classicalism_decision: "New Classicalism"
 FAF_new_classicalism_decision_desc: "Our dreams of a united Europe stem from the glories of the Roman Empire and the culture it espoused. While things have changed a lot since then, the ideas of Classicism in our art and architecture are something that we should strive to continue. By revitalizing schools of art that prioritize works of splendor and beauty and moving away from the drab Modernist styles many have come to abhor, we can cement ourselves as the true representatives of the golden age of European arts and culture!"
 FAF_europeanist_propaganda_idea: "Pan-European Propaganda"
 FAF_europeanist_propaganda_idea_desc: "We have been subjected to a blitz of Pan-European propaganda across all forms of media, likely at the behest of the European Hegemony to push them towards unification. Regardless of whatever response we can muster, there is a sinking feeling that we may not be able to compete with our local Identitarian movement and could be forced to hold a referendum soon. If we wish to retain our independence, we need to do something to counter this propaganda immediately."
 FAF_demand_unification_referendum_decision: "Demand Unification Referendum"
 FAF_demand_unification_referendum_decision_desc: ""
 FAF_invite_states_to_the_european_nation_decision: "Invite to the European Nation"
 FAF_invite_states_to_the_european_nation_decision_desc: "Whether through their own means or earlier political pressure from us, we are lucky to find that [insert nation] is already sympathetic to our cause, and we need not worry about forcing their hand to join our continental union. Seeing as our relations are at an all-time high, we shall send them a polite invitation to the people of [insert country] to join their brothers in the European Hegemony!"
 FAF_strengthen_europeanism_decision: "Strengthen Pan-Europeanism"
 hos_philosopher_king: "Philosopher King"
 FAF_implement_policy_in_new_states_decision: "Spread the Green Word"
 FAF_implement_policy_in_new_states_decision_desc: "There was a time when the sacred trees of Athena thrived, and the summits of Olympus were adorned with ageless snow. But now the lands of Europa are shrouded in industry. Old-growth forests are dying under the clamor of machines, crystalline rivers are left cloudy with contaminants. The cradle of Western civilization is losing its sacred face to the ceaseless forward rush of modernity. But Europa's salvation is not in steel and concrete cities, but in the harmony between man and nature. We can only prove ourselves the guardians of ancient civilization when we again defend the beauty of nature with reverence. So this is our lot — the eternal hope of Europa."

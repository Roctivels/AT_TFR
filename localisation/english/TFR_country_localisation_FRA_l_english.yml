 trait_FRA_Disgusted_with_Regime: "Angered by the Regime"
 trait_FRA_Disgusted_with_Regime_desc: "This Officer feels disrespected by the regime in charge, and will actively try to be the most independent from high command as possible. \n\nIf anything were to happen to destabilize the French Republic, this officer would undoubtedly side against the establishment."
 trait_FRA_Neutral_with_Regime: "Neutral to the Regime"
 trait_FRA_Neutral_with_Regime_desc: "This Officer has no good or bad feelings about the regime in charge. \n\nIf anything were to happen to destabilize the French Republic, this officer could decide to abandon the establishment, but it isn't guaranteed."
 trait_FRA_Happy_with_Regime: "Happy with the Regime"
 trait_FRA_Happy_with_Regime_desc: "This Officer feels a deep honor to serve France because of actions by the regime in charge. \n\nIf anything were to happen to destabilize the French Republic, this officer would unabashadly side with the establishment."
 trait_FRA_Political_Retirement: "Political Retirement"
 trait_FRA_Political_Retirement_desc: "Although in Political Retirement, these Officers are still able to serve their beloved France in times of crisis, but without Governmental Approval that other generals share. \n\nIf anything were to happen to destabilize the French Republic, this officer would unabashadly side against the establishment."

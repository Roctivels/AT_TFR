 FRA_silence_the_radical_left: "Silence Subversive Elements"
 FRA_silence_the_radical_left_desc: "Mélenchon and his corrupt cronies have been ousted, but that was never going to be the end of their insidious treason. Those aligned with his malignant views were never going to simply roll over and die, but even moderates have voiced concerns. There is no room for such misgivings, even if such concerns are well-meaning. The Republic is in crisis, and sacrifices must be made for its salvation, even if it means putting it on a leash for the time being."
 FRA_reverse_their_decisions: "Reverse Economic Disruptions"
 FRA_reverse_their_decisions_desc: "One of the many aftershocks of the previous socialist government was the untold damage to France's economic ability to wage war. Misguided attempts to 'uplift the worker', and the prioritization of the welfare state have left the Armed Forces little to work with despite the coming storm that's now upon us. Needless workplace reforms that hamper production will be rolled back-any resistance from unions will be met with force. The bloated welfare state should be removed, its funds repurposed for defense considerations, and other projects to safeguard France."
 FRA_render_unto_caesar: "Render Unto Cincinnatus"
 FRA_render_unto_caesar_desc: "From the moment our new government was declared, there's been the same critique thrown at our feet. Whether it be from genuine turncoats or the good people of France who've simply been misled, the claim echoes. That we seek to destroy the Republic, that we are no more than unelected autocrats who seek power and wealth at the people's expense. Caesarism is not on the agenda, and it never will be. Our loyalty is to the Republic, to France. Like Cincinnatus before us, we shall safeguard the state, and, once peace has been achieved, restore the Republic-no matter who or what we need to step on."
 FRA_democratic_supervision_committee: "Republican Supervision Committee"
 FRA_democratic_supervision_committee_desc: "With the situation stabilizing on the home front, we can move forward to further put people's fears at ease. The journey ahead is long and arduous, but we must not rest and put off the future. To enable a smoother transition from Junta to Republic, we shall establish a committee to screen parties and candidates, and prepare snap elections once the dust has settled. The fire of the Republic will be kept alight-dimly-to ensure all that must be done is to simply add fuel so it may burn brightly once more."

 hos_caesar: "Cincinnatus"
 hos_enemy_of_the_united_left: "Enemy of the People"
 FRA_dem_supervision_committee_tt: "§YThis will begin the process of§! §CRe-Democratization of the Government§!"
 FRA_the_forces_that_seek_to_tear_us_apart: "The Forces that Seperate"
 FRA_the_forces_that_seek_to_tear_us_apart_desc: "The forces of disunity are stabbing at the heart of France. Communist revolutionaries, rabid nationalists, and separatists all clamor for change. It was this very disharmony, at home and in all of Europe, that led us to disaster. The answer isn't to further sink in the abyss of isolated mediocrity, but the strength in European unity. We shall fight for a better tomorrow against the forces of reaction and revolution; we shall not cease until the ghosts of the past and present are put to rest, and we can look towards a brighter and stronger future. We and our like-minded partners in the rest of Europe shall not rest until all of Europe is alight with calls of 'In Varietate Concordia'."
 FRA_snuff_the_french_cigarette: "Snuff the French Cigarette"
 FRA_snuff_the_french_cigarette_desc: "Despite the claims of nationalists, there is little unique to the true French Identity. We are a truly European people, a crossroads mix of all that has made Europe great. A language inherited from the Romans, the land and blood of Germans. France has played a crucial role in the history of Europe from the days of Charlemagne to Napoleon to now. Despite it all, we were simply a part of the European puzzle, not a separate entity. Our destiny has, was, and will always be intertwined with that of Europe and those who claim otherwise are just as much a threat as the Russians across the Vistula to our future."
 FRA_turn_away_from_the_past: "Turn Away from the Past"
 FRA_turn_away_from_the_past_desc: "There are those who spend so much time thinking of what was or what could have been that they lose sight of reality. Even those whose ideas have been in the right direction, but refused to go all the way, must be made aware of this truth. The past with all of its failures is just that: the past, and only a full-steam-ahead approach to the future can salvage our dreams of unity, prosperity, and strength."
 FRA_seek_european_aid: "Seek European Aid"
 FRA_seek_european_aid_desc: "We are not alone in our vision nor our struggle. Each day, more and more people, along with their governments, see the pressing need for European unity in these trying times. Despite our own civil conflict over these concepts, other parts of Europe are thankfully free of at least open conflict within their own borders. Given we are now on the front line of Europe's future, would it be too much to ask for aid from those who can offer it? Rifles, rations, and gas; if you can think of it, we need it and need a lot of it. Even if our friends' aid can't completely cover"
 FRA_towards_a_united_future: "Towards a United Future"
 FRA_towards_a_united_future_desc: "To go along with our decisive reforms, any and all vestiges of the Ancien Régime must be erased. Everything from the local political parties to the national assembly must be gotten rid of as they simply hold us back from integrating further into the European community. In this new France-no-this new Europe, there is only room for the European Parliament and the European bureaucracy."
 FRA_burn_the_northern_traitors: "Burn the North"
 FRA_burn_the_northern_traitors_desc: "We are surrounded on all sides by rot and treason. It is clear that priority should be given to taming the north-it is far more economically developed and, if left alone long enough, could pose a far greater threat. It's better if this wealth and military potential falls back into our hands as quickly as possible as it will speed up the reclamation of the rest of the nation."
 FRA_northern_push_idea: "Northern Offensive"
 FRA_salt_the_south: "Salt the South"
 FRA_salt_the_south_desc: "We are surrounded on all sides by rot and treason. It is clear the priority should be given to suppressing the separatists to our south. The food situation is critical and, despite the northern areas being more economically and militarily valuable, the engines of economy and war are motionless without foodstuffs. We must secure the south's agricultural base before any thought is put into resecuring major naval or industrial regions to the north."
 FRA_southern_push_idea: "Southern Offensive"
 FRA_away_from_our_past_idea: "Goodnight to Neoliberalism"

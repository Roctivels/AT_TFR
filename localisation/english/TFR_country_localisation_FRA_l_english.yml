 FAF_Open_Paris_Identitarian_Council_decision: "Embolden §CParisian Identity§!"
 FAF_Open_Paris_Identitarian_Council_decision_desc: "How can one talk about France without mentioning Paris? For centuries, Paris has been the heart of French art, fashion, and literature—if not that of the entire world. But the 'City of Light' was not built by bricks and stones alone; it was built by the flourishing Parisian culture that allowed life and creativity to blossom. Parisian culture is what brought our nation to the global stage and made our name ring across the ocean blues."
 FAF_Open_Alsace_Identitarian_Council_decision: "Embolden §PAlsace Identity§!"
 FAF_Open_Alsace_Identitarian_Council_decision_desc: "Alsace is French and Alsace remains French. Ever since the Treaty of Westphalia, Alsace has been under French rule. Some argue that Alsace is German, but this is a blatant lie. A lie to sow division between us. It is true that the Germans ripped us apart multiple times throughout history, but blood is thicker than water and we must remind the people of Alsace of this fact."
 FAF_Open_Occitan_Identitarian_Council_decision: "Embolden §OOccitan Identity§!"
 FAF_Open_Occitan_Identitarian_Council_decision_desc: "For generations Occitania has been under French rule and today is a well integrated part of our nation, but perhaps a little too well. Occitan culture and language have become endangered, soon to be forgotten within our great country. We cannot allow this to happen. Occitanian cultural revival is key to guiding our people in finding their roots."
 FAF_Open_Corsican_Identitarian_Council_decision: "Embolden §gCorsican Identity§!"
 FAF_Open_Corsican_Identitarian_Council_decision_desc: "Ever since late 18th century, Corsica has been French. This little island, just southeast of mainland France gave birth to the greatest giant in the French history, Napoleon Bonaparte. Corsica's place within France has always been shaky, even troublesome. But by embracing and integrating, we can solidify our kinly ties."
 FAF_Open_Lombardian_Identitarian_Council_decision: "Embolden §GLombard Identity§!"
 FAF_Open_Lombardian_Identitarian_Council_decision_desc: "The connection between us French and the Lombards was created when the mighty Charlemagne conquered their kingdom, integrating them into our cultural sphere of influence. As our Lombardian brothers return to our embrace, we must rekindle the centuries old ties between our two peoples."
 FAF_Open_Venetian_Identitarian_Council_decision: "Embolden §AVenetian Identity§!"
 FAF_Open_Venetian_Identitarian_Council_decision_desc: "We French have always greatly admired and appreciated the Venetian culture and people. When Napoleon conquered Venice, he did not go after its people nor its material wealth, instead he set his eyes on the magnificent Venetian artistry. Rejoice my Venetians brothers for you are finally part of our great French family."
 FAF_Open_Roman_Identitarian_Council_decision: "Embolden §tRoman Identity§!"
 FAF_Open_Roman_Identitarian_Council_decision_desc: "Oh Rome.. where does one even begin? The basis of the French culture is Roman and the French language is Latin. The intertwining of Romans and ancient Gauls made France what it is today. Roman militarism, Roman creativity, and Roman ingenuity were all inherited by us. France is Rome and Rome is France."
 FAF_Open_Basque_Identitarian_Council_decision: "Embolden §7Basque Identity§!"
 FAF_Open_Basque_Identitarian_Council_decision_desc: "The Basque people can stand proud of how well they have preserved their culture and language. However, the poison of globalization has caused both to wane. In France, Basque culture is slowly fading, and the language is becoming forgotten. In Spain, the Basque people have become increasingly aggressive. Under our rule, they must remember that what makes us strong is not cultural division, but the richness of dual heritage."
 FAF_Open_Catalan_Identitarian_Council_decision: "Embolden §YCatalan Identity§!"
 FAF_Open_Catalan_Identitarian_Council_decision_desc: "Catalan culture and language have gradually become endangered due to our efforts at centralisation of education. This small innocent mistake has caused them to give up their own traditions and forced them to adapt to the French way of life. We should not forget that we are a Castell, and like a castell everything must be in unison to reach stability."
 FAF_dauphine_province_modifier: "Rule by the Dauphin"
 FAF_dauphine_province_modifier_desc: "\n§YDauphin:§!\n\n\n\n\n\n\n\n\n\n£GFX_louis_xxi_Portrait\n\n\n\n\n\n\n\n§W          Louis§! \n\n\nSince the 12th century, the local ruler Count Guigues IV of Albon bore a dolphin on his coat of arms and was nicknamed le Dauphin. In 1349, the Dauphiné was transferred from the last non-royal Dauphin to the future king of France, Charles V, through the purchase of lands. The terms of the transfer stipulated that the heir apparent of France would henceforth be called le Dauphin and included significant autonomy and tax exemption for the Dauphiné region. With the restoration of the Monarchy complete, Louis, Duke of Burgundy is the new Dauphin."
 FAF_The_New_Order_dynamic: "The New Order"
 FAF_The_New_Order_dynamic_desc: "\n\n\n\n\n£GFX_FAF_cult_of_lafayette\n\n\n\n\n\n\n\n"

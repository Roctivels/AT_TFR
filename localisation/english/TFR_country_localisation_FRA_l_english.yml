 FRA_Announce_Government_of_National_Defense: "The Government of National Defense"
 FRA_Announce_Government_of_National_Defense_desc: "France has reached her darkest hour and the wolves are at the gates. We have deposed the corrupt failure that was the previous leadership, but all is not well. The army is demoralized and broken. The economy is shattered and, despite our best attempts to maintain a clean transfer of power, so is the people's faith in the government and France itself. From separatists, to rabid nationalists, and even the communist specter. Seemingly, every group is rising to take its place in the banquet of France's corpse. Nothing short of extreme measures can salvage the situation and, despite the ad hoc and disunited nature of our government, there's no shortage of 'extreme measures' needed. Regardless of our commitment, we are already faced with a very important decision about whom to prioritize the suppression of with our limited resources. Such a decision must be taken carefully, for more moderate members of our loose alliance, who fear cracking down on one group will simply empower another. The road ahead will be a long and arduous one."
 FRA_Put_down_Militant_Nationalists: "Put Down Militant Nationalists"
 FRA_Put_down_Militant_Nationalists_desc: "Despite being fewer than the socialists, the nationalists are a far more concerning element. Their ranks have swelled with deserters and large sections of the officer corps sympathize with them. There is the ever-present worry of caesarism within the military or our own march on Rome. The left have slogans and placards; the right has arms and the potential backing of the army. The left can be dealt with later. We must do all in our power to purge the military of those whose loyalty is questionable and forcibly disarm paramilitaries."
 FRA_Crush_the_Paris_Commune: "Crush the Communist Scum"
 FRA_Crush_the_Paris_Commune_desc: "All over France, the forces of the left riot. They scream, loot, and burn in the name of the 'workers' and 'democracy'. There are too many of them for law enforcement to handle on their own-being overrun and spread thin, unable to stem the red tide without aid. The army is too wounded to fight another conflict, but one doesn't need the best army in the world to crack down on simple protesters. We can also call on the nationalist paramilitaries to aid us in the crackdown, but they are likely to be difficult to control and prevent excessive reprisals. Regardless of the exact details of the crackdown, we will root them out and ensure they can no longer slow France's road to recovery."
 FRA_All_is_Well: "Tout est Bien!"
 FRA_All_is_Well_desc: "It seems as though our decision to crack down on one over the other has borne fruit. The people have seen we are impartial, and our goal is to save France, above petty politics and ambition. There are concerning reports of the underground organization of arms and militias and the increasing erratic behavior of some sections of the military, but this is surely nothing! Who would put France's future at risk when we have already begun paving the road to recovery?"

 FRA_negotiations_fail_idea: "Failure at the Table"
 FRA_negotiations_fail_idea_desc: "With the radicals in the des Gilets Jaunes, it becomes apparent that a cooperative solution to their constant protests and riots is impossible. Their relentless rioting and nonstop destruction of France have gone on for too long. Our government is drafting up new solutions to put down these radicals quickly, but until then France must watch its capital be torn apart and set ablaze."
 FRA_faith_in_the_goverment: "Faith in the Government" 
 FRA_faith_in_the_goverment_desc: "In a surprising turn of events, the government has decided its priority was that of the French people. Talks with the des Gilets Jaunes have concluded with the government agreeing to all of the terms made by the movement. While unpopular with the conservatives in our government, it has been agreed upon via majority decision due to the frantic situation France has fallen into. The result of this radical action has resulted in the movement ceasing its protests and turning into celebrations across France for the newfound reforms. "

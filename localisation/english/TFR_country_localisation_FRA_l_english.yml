 FRA_The_New_French_Sphere: "Re-establish our Sphere"
 FRA_The_New_French_Sphere_desc: "With our triumph over Russian imperialism, we stand as the undisputed defenders of European democracy. However, in the aftermath of our glorious victory, a power vacuum has been left in the areas formerly dominated by Russia. We, as the defenders of democracy, must safeguard our interests and establish peace and democracy in these formerly autocratic lands."
 FRA_Reclaim_the_Algerian_Departments: "Reclaim Algerian Departments"
 FRA_Reclaim_the_Algerian_Departments_desc: "Ever since our departure decades ago, the Algerians have proven themselves incapable of governing their own nation. They have been consistently bogged down by all manner of problems, ranging from separatist groups to border disputes. What they need is an outside helping hand, and we will offer that. These are the first steps to securing Africa."
 FRA_VIC_Freedom_for_North_Africa: "Freedom for North Africa"
 FRA_VIC_Freedom_for_North_Africa_desc: "The Arab Spring started over a decade ago, and yet almost nothing has come of it. All it brought was civil wars, radicalism, and death. The centerpiece of the failures of the Arab Spring in Africa is Libya, which has been raging since 2011, and brought next to nothing for its participants. It has also posed a major security threat for us in North Africa, and so the time has come to secure Libya."
 FRA_VIC_Stabilize_West_Africa: "Stabilize West Africa"
 FRA_VIC_Stabilize_West_Africa_desc: "One unfortunate consequence of the war with Russia was the necessity to call back most of our forces in West Africa. The lack of those soldiers meant a significant decrease in the ability of countries in the region to enforce the rule of law, and allowed for a resurgence in numerous terrorist groups. Now that we no longer have to worry about matters close to home, we can get back to work dealing with those in distant lands. Sooner than later, we will finally stamp out the last traces of radical islamists."
 FRA_VIC_Demand_African_Resources: "Demand African Resource Rights"
 FRA_VIC_Demand_African_Resources_desc: "Our continued aid to certain African nations has put them very much in our debt. We are responsible for stamping out terrorism, building their infrastructure and economy, and protecting them from all manner of threats. It's time they pay their tab, and to do that they need look no further than their large amounts of natural resources. It must be burdensome managing all those minerals and gemstones, we'll happily take them off their hands."
 FRA_VIC_African_Economic_Expansion: "African Economic Expansion"
 FRA_VIC_African_Economic_Expansion_desc: "Our increased collaboration with nations in West Africa have offered a unique number of economic opportunities, and we would be a fool not to exploit them. Many of our former colonies still have underdeveloped manufacturing of consumer goods, something we would be more than pleased to aid them with. In exchange, we get to open new markets for our products. Champagne and an excellent view of the Gulf of Guinea, anyone?"
 FRA_VIC_A_New_African_Union: "A New African Union"
 FRA_VIC_A_New_African_Union_desc: "As the nations of West and North Africa become more and more dependent on us, the question has arisen of how far we should take this. The answer is an overwhelmingly obvious one. Simply put, colonialism is long dead, and to ensure maximum compliance from the people of Africa, they must not be under the control of some far off land. As such, we have decided to build a new African Union, one that isn't a joke. This new union will assist in development, resource extraction, and of course trading. It will be the pinnacle of our actions in Africa."
 FRA_VIC_In_the_Right_Hands: "In the Right Hands"
 FRA_VIC_In_the_Right_Hands_desc: "Ever since their independence, the nations of West and North Africa have been simply incapable of governing themselves. Consistently they have fallen to terrorists and dictators, and now that we have them wrapped around our finger, it's time to ensure nothing like that happens again. While colonialism is far from popular, this isn't colonialism, we'd like to call it assisted management. With our heavy, guiding hand, Africa will be secured."
 FRA_VIC_Operation_Aigle: "§YOpération§!: Aigle"
 FRA_VIC_Pit_them_Against_Each_other: "Encourage Anti-Authoritarianism"
 FRA_VIC_Rebirth_of_Israel: "A Zionist Rebirth"
 FRA_VIC_Clean_the_Slate: "Clean the Slate"
 FRA_Protect_Canadian_Soveriegnty: "Protect Canadian Sovereignty"
 FRA_Protect_Canadian_Soveriegnty_desc: "Canada has long been one of our most important allies, from during the second world war when they were one of the bravest fighters against the nazi menace, they have always stood by democratic principles and the west. However, with the ongoing chaos in the former USA, many factions have claimed Canada as part of their ideal United States. These claims are unacceptable and we shall protect Canada from any aggression made by America."
 FRA_Ensure_Continental_Interests: "Ensure North American Interests"
 FRA_Ensure_Continental_Interests_desc: "Even as the situation in Eastern Europe calms down, the one in the United States continues to remain in dire straits. There are certain factions throughout the former USA that we cannot allow to gain any more power than they already have, doing so would mean ruin for millions of people. On top of this necessity, we have a commitment to save our ally who has bailed us out on numerous occasions. It never hurts to repay a favor, and maybe earn some points while we're at it."
 FRA_canadian_isolation_tt: "§CThis will isolate the Canadians from European Affairs in an attempt to gain independence for the Québécois people§!"
 FRA_The_Miquelon_Bill: "The Miquelon Agreement"
 FRA_The_Miquelon_Bill_desc: "Something evil lurks across the Atlantic, masquerading as the United States of America. But they are not the nation we helped free from the British two and a half centuries ago, and they would like nothing more than to exploit us. As painful as it is to admit, the USA is dead and gone. Europe must be protected from this new threat, it's up to us to ensure the Americans stick to their side of the ocean."
 FRA_American_Realpolitik: "The Victor"
 FRA_American_Realpolitik_desc: "It seems the nightmare has finally ended. The Russians are preoccupied, Europe is united and strong, but most importantly, the Second American Civil War has finally ended. While they may now be weak and broken, their history isn't over, and it's up to us and the rest of the EU to see them through this period of reconstruction. We helped free them from the British, we can't abandon them now."
 FRA_Franco_American_Diplomatic_Agreement: "Franco-American Diplomatic Agreement"
 FRA_Franco_American_Diplomatic_Agreement_desc: "For the first time since 2021, we have paid a visit to Washington DC. The new American government invited us there on account of a new diplomatic agreement, something we happily accepted. The results were satisfactory, though not as beneficial as we had hoped. The Americans aren't in a position to rejoin NATO, but in exchange for our aid, they promise to when the time comes. While they may not be exactly the same as they were a decade ago, we look forward to a continued partnership."
 FRA_Guiana_Gambit: "Guiana Gambit"
 FRA_Guiana_Gambit_desc: "While NATO specifies the North Atlantic, its expansion has never been limited by its namesake. With the situation in Eastern Europe being quite favorable to us, we have turned our attention back across the pond, and a little south. We've never been great friends with the Brazilians, but we get along well enough, and would like to expand our partnership. Without the Russians around, they are surely looking for new partners as well. But they are stubborn, and will need a bit of convincing to join our cause. As much as we hate to part with it, French Guiana will surely sweeten the deal."
 FRA_Stabilize_the_Caribbean: "Stabilize the Caribbean"
 FRA_Stabilize_the_Caribbean_desc: "The recent chaos in the United States and Mexico has thrown the relatively peaceful Caribbean into a state of crisis, and our territories there have been put under threat. As time goes on, it seems things will not calm down unless someone does something about it, and other than us and the United Kingdom no one really has a reason to. Before things escalate, we will step in and take action to calm the turbulent sea."
 FRA_Enrich_Quebecois_Spirit: "Enrich Québécois Spirit"
 FRA_Enrich_Quebecois_Spirit_desc: "The Quebecois people have long been trapped under the heel of the Anglos, but they have never let it crush them. In fact, it is under that pressure that their culture and people have flourished, standing as a testament to the fact that some things can never truly be stamped out. In order to continue expanding our influence in North America, we must first find support among the Quebecois, and so we will fund efforts to expand public knowledge about their heritage and culture."
 FRA_Supplement_Quebecois_Industry: "Supplement Québécois Industry"
 FRA_Supplement_Quebecois_Industry_desc: "One way to the heart of any nation is to aid them with construction that will help their economy. The best way to do this, besides maybe farming, is to fund industrial projects. Quebec has a series of ongoing development programs that the Canadian government is not doing its best to support, and so we will step in. When there are a slew of new industrial jobs in Quebec, they will remember who actually built their factories."
 FRA_Espouse_Cultural_Unity: "Espouse Cultural Unity"
 FRA_Espouse_Cultural_Unity_desc: "The culture of France can be simplified to three words, Liberté, Egalité, et Fraternité. Yet, as with any nation, how people interpret our culture varies from town to town, and even home to home. While all Frenchmen share the same fundamental values, the fine details occasionally cause disputes. We can't have people fighting over minute things, and so all aspects of our culture will be put on full display so that everyone can see how united we truly are."
 FRA_quebec_independence_tt: "§CThis will force an [QUE.GetFlag] Québécois Independence Referendum upon [CAN.GetFlag] Canada§!"
 FRA_Restore_the_French_Union: "Restore the French Union"
 FRA_Restore_the_French_Union_desc: "The French Union, our former half-spirited attempt at reforming our colonial system, which failed miserably with the end of the 4th Republic. Rather than keep overseas departments and colonies, everything was just France. However by the end of the 1950s, this system proved that it was not working, and it fell apart. But now, we are in a place where we can successfully manage large amounts of overseas territories, not colonies, just territories. There will be no second class citizens, just French, and our might will once more be put on full display!"
 FRA_Department_of_Haiti: "Department of Haiti"
 FRA_American_CW_Embargo_tt: "§YNATO will collectively embargo trade with all American Civil War factions§!"
 FRA_Further_American_Support_tt: "§YWe will send further support to our chosen faction§!"
 FRA_VIC_African_Economic_Expansion_tt: "Unlocks £decision_icon_small §HDecisions§! To: §YFurther Economically Influence §!§RThe Nations of West Africa§!"
 FRA_VIC_In_the_Right_Hands_tt: "Unlocks £decision_icon_small §HDecisions§! To: §YFurther Militarily Influence §!§RThe Nations of West Africa§!"

 FRA_VIC_Bitter_Winner_tt: "§RRussia must pay for those French citizens we have lost...§! \n\nFrance will look to maintain a £GFX_Federalization_Unity_texticon European peace, through ensuring that [SOV.GetFlag] Russia may never again rise to challenge European dominance."
 FRA_VIC_Victorious_Spirit_tt: "§CEurope has leaped into a new age, one truly free of war...§! \n\nFrance will look to maintain a £GFX_Federalization_Unity_texticon European peace, through rebuilding [SOV.GetFlag] Russia like we once did with [GER.GetFlag] §YWestern Germany§!."
 FRA_death_counter_flag: "Had over §R10 thousand casualties§!"
 FRA_The_Liberators_of_the_Caucasus: "The Liberators of the Caucasus"
 FRA_The_Liberators_of_the_Caucasus_desc: "Without us, and NATO as a whole, the Caucasus region would still be under the control of the Russian expansionists. Now that we have gone through the trouble of liberating them from their overlords, we must not shirk our responsibility to them. If left to their own devices, they will either fall into chaos or be seized once more by their northern neighbor. This cannot be allowed to happen, we will ensure the nations of the Caucasus remain independent from the Russians, and remember who liberated them."
 liberator_of_the_caucasus: "Liberators of the Caucasus"
 FRA_Militarize_Kuban_Police: "Militarize the Kuban Police"
 FRA_Militarize_Kuban_Police_desc: "The Russian defeat has led to the creation of several new nations in the northern Caucasus region, arguably the most important of which being the Kuban Republic. Unfortunately for the Kubans, their new government is struggling to maintain law and order, and the nation is already under attack by Russian backed terrorists. In order to build ourselves a bulwark in the East, we will happily help the Kubans build up their police force and administrative capacity."
 FRA_Crimean_Investments: "Crimean Investments"
 FRA_Crimean_Investments_desc: "The Crimean peninsula has been under illegal Russian control for over a decade, ignored and used for nothing more than a glorified military base, it suffered widespread destruction from the large amounts of fighting that took place there. Fortunately, it is now back in the hands of more responsible owners, those being the Ukrainians. As a show of goodwill, and as a way to spread out influence in the East, we will invest in Crimea reconstruction, and ensure that it'll be given back in better condition than it was taken!"

 FRA_EU_kill_EUrself_tt: "This will lock us out of the rest of the focus tree and will prepare £GFX_Federalization_Unity_texticon §CFULL FEDERALIZATION§!."
 FRA_EU_sister_republic_tt: "This will lock us out of the £GFX_Federalization_Unity_texticon §CFULL FEDERALIZATION§! path, but instead will begin the creation of the [EUU.GetFlag] §YFRANCO-IBERIAN FEDERATION§!"
 FRA_EU_European_Emergency: "The European Emergency"
 FRA_EU_European_Emergency_desc: "As the guns stop firing and the fires die out, we emerge victorious over our enemies. Nationalist and communist guerillas alike have been banished back to the shadows, and freedom has prevailed in our time of need. However, we cannot rest now. Our situation is still very anarchic, and radicals will do anything in their power to usurp our control. In these desperate times, we turn outward for help. While we may have lost the battle, the war is far from over. And we will come back more unified than before, ready to face our enemies head-on as one united front."
 FRA_EU_Seeking_Discourse: "Seek Discourse"
 FRA_EU_Seeking_Discourse_desc: "France's strength lies in its multi-party democracy. Despite the failure of the Fifth Republic, we must not abandon our democratic roots. As we continue to pick up the pieces from the Civil War, we find ourselves with a unique opportunity. While the far right and left have refused to work with our government, there are still many moderates who can be convinced. Through concessions and favors, we can convince these neutral parties to work more openly with our government. Allowing us to pass through legislature with ease. Greatly speeding up the reconstruction process."
 FRA_EU_Crack_Down_on_Extremism: "Crack Down on Extremism"
 FRA_EU_Crack_Down_on_Extremism_desc: "Despite our victory over the militarists and communists, radicalism continues to fester in the shadows. If we do not crush these fanatics quickly, they will become a thorn in our side, sabotaging our reconstruction effort. Authorization will be given to eradicate the remaining radical groups that are still active. Some will decry this as an erosion of liberty, but it is ultimately a necessary evil. For if they are not with us, then they are against us. And any opposition to our rule is only delaying the inevitable."
 FRA_EU_Addressing_Our_Failures: "Addressing our Failures"
 FRA_EU_Addressing_Our_Failures_desc: "Look around. Our cities are destroyed, our people are hungry, our army is shattered. As much as we may try to deny it, we failed. We failed to defend our Eastern allies from the Russian horde, and now we face the consequences. But we cannot sulk in our defeat forever. We must get back on our feet, learn from our mistakes, and return stronger. Much can be learned from our failures in the First European War. And much that must be changed. Regardless of our approach, change is mandatory. If we refuse to change, then we will repeat the mistakes of the past."
 FRA_EU_Picking_ourselves_up: "Picking Ourselves Up"
 FRA_EU_Picking_ourselves_up_desc: "With the dust settling and chaos subsiding, our rule is slowly but surely becoming more cemented. There is still much to be done. Cities lie in ruin, and our people wait on breadlines. But fortunately, we are not alone. Across Europe, our allies suffer the same as us, if not more. Poland lies divided, Spain remains torn apart by civil war, and the once proud Euro is now utterly useless. But not all hope is lost. Many would say that the dream of a unified Europe is dead. But we know better. Through suffering in tribulation, we will emerge stronger than before. The European dream shall be realized, even if blood must be spilled to make the dream a reality."
 FRA_EU_Repairing_the_National_Body: "Repair the National Body"
 FRA_EU_Repairing_the_National_Body_desc: "Our victory against the militarists and socialists has not come without its own cost. We have inherited a scarred and damaged nation. Large swaths of the countryside lay in ruin, while cities lay in ruin with fires raging. Even our serene capital was not spared the horrors of war, with even the Eiffel Tower being damaged. As we move forward with the Pan-European project, we will begin the arduous process of healing the French body. What follows will be a test of not only our commitment to European unity. But also to the lengths we are willing to go to revitalize the French nation. And we shall see it through until the end, regardless of the cost we must pay or the actions we must take."
 FRA_EU_The_Best_and_Brightest: "The Best and Brightest"
 FRA_EU_The_Best_and_Brightest_desc: "France, as it stands currently, is as fragile as cracked glass. The wrong move will send the already fracturing system spiraling into complete anarchy. The process of rebuilding a war-torn nation is a long and arduous one. And cannot simply be trusted by an everyday worker. Thus, it is necessary to corral teams of experts to assist with the reconstruction process. While these experts will be given special privileges to draw up plans, they will still require our final approval. With their guidance, we will transform France into a country of the future. A country that will truly reflect the end goal of the Pan-European project."
 FRA_EU_Invite_American_Innovationists: "Invite American Innovationists"
 FRA_EU_Invite_American_Innovationists_desc: "While some argue for empowering purely French experts, it would be wrong not to invite foreign experts. The United States once stood as a beacon of industrial innovation. Industrialists such as Bessemer and Henry Ford contributed innovations like the assembly line. While the once prosperous nation remains torn apart by civil war, industrialists such as Bloomberg have been able to hold onto their assets. While reaching out will be risky, the potential reward outweighs the risk. The advice from these individuals will be crucial to speeding up the reconstruction process."
 FRA_EU_An_International_Reconstruction_Effort: "An International Reconstruction Effort"
 FRA_EU_An_International_Reconstruction_Effort_desc: "Throughout history, one fact has remained true. The greatest nations did not get to where they were without an expansive industrial base. Great nations like China and America would not stand where they are if they didn't invest in heavy industry. If we wish to see France claim its place amongst the global powers, then we must jumpstart the beating heart that is industry. Factories will be rebuilt, steel mills brought back online, and anything to kickstart our industry again. Compounded with assistance from our allies, France shall once again become an industrial might to rival the likes of China."
 FRA_EU_The_Cult_of_Reason: "The Cult of Reason"
 FRA_EU_The_Cult_of_Reason_desc: "Founded in the tumultuous first years after the French Revolution, the Cult of Reason stood as a testament to Republican values and a strive for genuine progress. Despite this, it was usurped by the traitor Robespierre. Who turned it from a front for progress to a mere one for him to consolidate power. Despite this, the ideals of the cult of reason remain relevant, even to this day. As we move to reconstruct the once proud French nation, these ideas will become the building blocks of our new regime. Guiding our push for reason, equality, and innovation."
 FRA_EU_Creative_Revolution: "The Creative Revolution"
 FRA_EU_Creative_Revolution_desc: "France has always been a nation of creativity. From architecture, to film, to art. France has historically been a center for various creative revolutions. While the chaos of the European war and our civil war put a pause to these efforts, we can now begin to revive these movements. As a part of our reconstruction campaign, we will plant the seeds for a new creative revolution. Restoring museums, reviving artist guilds, and publishing the innovations of young French artists. While art might not be a major backbone of the French economy, it is more often a sign of a nation's prosperity. And if we hope to prosper, then support of the arts is crucial."
 FRA_EU_United_By_Science_and_Reason: "United by Science and Reason"
 FRA_EU_United_By_Science_and_Reason_desc: "History's greatest and longest-lasting nations are also the ones that invest considerably in science. Industrial innovations propelled Russia and America onto the world stage, and innovations in technology have helped to improve the quality of life around the world. As we put the pieces of our broken nation back together, we look forward to a future defined by science and reason. A future where superstition and fear of the unknown have been replaced by hope for the future. A future where Europe can stand stall, united and free, forevermore."
 FRA_EU_A_New_Technocratic_Superstructure: "The Technocratic Superstructure"
 FRA_EU_A_New_Technocratic_Superstructure_desc: "While many think technocracy is a young concept, history has shown otherwise. First coined by William Henry Smyth in 1919, it was later expanded by Howard Scott in the 1930's. Although his technocracy party was unsuccessful and eventually disbanded, the ideas it promoted still live on. The failures of the Fifth Republic in the European War are proof enough that a new system of governance is needed. No longer will France be run by greedy, self-serving politicians. From now on, large teams of experts will be entrusted with the day-to-day functions of the French government. While not appointed by the people, these individuals will strive to make the most change for France. And with our guidance, they shall lead France to a new golden age of cooperation and unity."
 FRA_EU_Diversify_the_French_Citizen: "Diversify the French Citizen"
 FRA_EU_Diversify_the_French_Citizen_desc: "What really represents the French citizen? The right would say the French citizen is European. But we know better. France is a diverse melting pot of nationalities and cultures. And to represent all of our people in one image would be a great disservice to these cultures. If we genuinely seek to represent our people, we must expand what it means to be French. Gone are the days of discrimination. Gone are the days when a person could be viewed as less than a citizen. If we are to truly distance ourselves from past mistakes, then remolding the idea of the French citizen is just one of many steps toward a truly equal future for all."
 FRA_EU_Expand_Immigration: "Expand Immigration"
 FRA_EU_Expand_Immigration_desc: "Never has there been a more controversial topic in French politics than the debate surrounding immigration. Emerging after massive waves of Arb migrants came to our country, fleeing the violence of the Arab Spring and the Syrian Civil War. The issue quickly galvanized the French government. Many called for the tightening of immigration control. However, under our rule, immigration will not be stopped. In fact, it will be expanded. Support and subsidies will be provided to immigrants, provided they contribute to our reconstruction of France. Conservatives can kick and scream all they want, but we will not listen to their complaining. After all, we have power, so we are right."
 FRA_EU_Economic_Enrichment: "Economic Enrichment"
 FRA_EU_Economic_Enrichment_desc: "France is a very unique nation. We are blessed with numerous mineral deposits and fertile soil. While we have historically always utilized our virgin lands, mineral deposits have gone underutilized. If we hope to break our reliance on Africa and China, we must revive French mining and farming. Subsidies to these two industries will spur economic growth and help create jobs for citizens and immigrants alike. Additionally, allowing us to support our wide system of social services. Changes like this will not only benefit us but also our allies. Who will benefit greatly from receiving ores from our mines and food from our farms."
 FRA_EU_The_Global_Project: "The Global Project"
 FRA_EU_The_Global_Project_desc: "What is France but not a small piece in the wider puzzle that is the world community? Many would try to deny it. But to us, it is clear that we serve a purpose greater than just the continued existence of our Nation. The global community is like a massive web, a complex network of trade agreements and alliances. If we want to foster a sense of global unity amongst our people, we must connect ourselves to this web. Not only will this help foster a sense of unity amongst our people, but it will also help to attract foreign labor and experts. Contributing greatly to the reconstruction process."
 FRA_EU_United_Under_Humanity: "United under Humanity"
 FRA_EU_United_Under_Humanity_desc: "At last, the dream has truly become a reality. What once was thought of as impossible has finally been proven to be possible. The once-poisonous ideas of nationalism and exceptionalism have been replaced by an openness to people of all kinds. Some conservative remnants continue to kick and scream. Decrying us for our supposed sell-out to the globalists and betrayal of the French people, we know the truth. Never before has France been more united and free. We are stronger when we look past nationality to focus on what is truly important. The fact that no matter who we are, we are all human."
 FRA_EU_Mankind_Redefined: "Mankind, Refined"
 FRA_EU_Mankind_Redefined_desc: "History has not been kind to those who wish to redefine the concept of mankind. More often than not, the term has been used by dictatorships to justify the persecution of minority groups. However, for us, this couldn't be further from the truth. We do not seek to cast down people. We seek to uplift them. To ensure prosperity for all, we must treat everyone equally. No longer will petty things like race, ethnicity, or national origin be roadblocks. We must be willing to cast down these ridiculous ideas and embrace mankind for what it truly is. A concept to unite, not to divide."
 FRA_EU_The_Will_to_Grow: "The Will to Grow"
 FRA_EU_The_Will_to_Grow_desc: "Progress never comes naturally. Someone must be there to push it into action. But once that happens, progress cannot be stopped. For all its successes, the Fifth Republic failed to ensure progress was maintained. A will to grow was replaced by sloth and apathy, with the young content with what they had. And while we slacked, the Russians advanced. And our failure to properly catch up with our enemies eventually led to our downfall at their hands. To gain an edge over our enemies, we must chase progress and growth at all costs. United with our European allies, we will accelerate the race for growth. Speeding towards a prosperous and free future."
 FRA_EU_Curing_Industrial_Ailments: "Curing Industrial Ailments"
 FRA_EU_Curing_Industrial_Ailments_desc: "For most of its history, France has been in the foreground of industrial advancements. From the first industrial revolution to today, the French industry is renowned worldwide for its innovation. However, this rapid industrialization of France has come at a cost. In the quest to turn France into an industrial powerhouse, we contributed to climate warming. And as we move forward with reconstruction, we must re-evaluate our stance on industrialization. While industry is necessary for the function of any nation, we must recognize that it doesn't come without a cost."
 FRA_EU_The_Technological_Spearhead: "A Technological Spearhead"
 FRA_EU_The_Technological_Spearhead_desc: "The dawn of the 21st century marked a period of rapid technological advancement. Like the arms race of the Cold War, companies raced to see who could be at the forefront of innovation. Never before has technology been more crucial to the survival of a nation. Innovations in drones and cyber warfare have allowed nations to strike vulnerable infrastructures while keeping their soldiers safe. If we wish to stand a chance against the Russian bear, then we must accelerate our technology push. For if we do not get ahead, we will fall behind and be destroyed by our enemies."
 FRA_EU_Removing_the_Red_Tape: "Remove Red Tape"
 FRA_EU_Removing_the_Red_Tape_desc: "Throughout history, progress has always been delayed by inefficient bureaucracies. Safety regulations, negotiations with unions, and budget constraints. All only serve to slow the advancement of society. We cannot afford to weave through bureaucratic webs to have our plans rejected. By cutting down on these systems, we save both time and money. And allow new groundbreaking projects to be approved faster, allowing them to break ground in record time. Some will raise concerns about safety regulations, but these cuts are ultimately a necessary evil. If we want to bring France into the Future, we will be required to cut corners."
 FRA_EU_The_Public_Private_Enterprise: "Public-Private Enterprise"
 FRA_EU_The_Public_Private_Enterprise_desc: "While we have succeeded in turning France into a technological powerhouse, we can still do more. France has always had a wide array of private entrepreneurs willing to lend their hand in financing government projects. Despite this, past leaders have never fully tapped into this opportunity. Relying almost solely on public enterprise, stagnating progress and innovation. However, we will not repeat the mistakes of the past. The future waits for no one. And if we are not willing to work with private entrepreneurs and innovators, then we will never be able to grasp it. "
 FRA_EU_The_Gears_Turn_Again: "The Gears Turn"
 FRA_EU_The_Gears_Turn_Again_desc: "The economy of France is like a very advanced machine. When all the gears work together, great things can be done, and innovations can be made in record time. But if something is misaligned, the entire system breaks down, and the once-functioning machine ceases to function. When the Fifth Republic fell, the machine of the French economy once more fell into disrepair and decay. Yet, after much trial and tribulation, the once stagnant gears turn again. The heart beats again, and like a phoenix, we rise above the ashes of rot and decay. Now, we look boldly to the future, ready to face any challenge that comes our way."
 FRA_EU_Walking_a_Green_Path: "Walking the Green Path"
 FRA_EU_Walking_a_Green_Path_desc: "For the latter half of the twenty first century, France has been on the frontlines of the battle against climate change. Ever since the signing of the Paris Climate Accord, we have done everything in our power to reduce our carbon footprint. From investment in renewable energy to funding French electric vehicle companies. Yet the Fifth Republic was always apathetic to the increased destruction caused by fossil fuel companies. If we wish to carve a legacy of our own, then we must double down on the green initiative. With assistance from Brussels and Berlin, we will work to completely transition France to renewable energy, regardless of how much complaining oil companies do."
 FRA_EU_the_Final_Goalpost: "The Final Goalpost"
 FRA_EU_the_Final_Goalpost_desc: "Ever since the first warning signs, we have been fighting a war against climate change. From signing the Paris Climate Agreement to funding renewable energy, many advancements have been made in the fight. However, we cannot allow ourselves to become apathetic. If we do not take the initiative in the fight, we will have already failed to save the World. Like the Fifth Republic, we will renew our commitment to renewable energy and slash our carbon emissions. With support from Brussels and Berlin, we will see France transformed into a country of the future, with renewables guiding the change."
 FRA_EU_An_Invisible_Footprint: "An Invisible Footprint"
 FRA_EU_An_Invisible_Footprint_desc: "Ever since our fight against climate change started, the idea of a carbon footprint emerged. Representing how much a person, company, or country contributes to environmental decay, past regimes have made considerable investments in reducing our carbon footprint. But unfortunately, these efforts have not been enough, and our carbon footprint remains massive to this day. The time for action is now, not tomorrow, not next week. If we do not act swiftly to make our carbon footprint disappear, our efforts will be for nothing. And if we fail today, we may never be able to ensure a safe future for our children."
 FRA_EU_The_Second_Star_in_the_Union: "The Second Star in the Union"
 FRA_EU_The_Second_Star_in_the_Union_desc: "France has always been a keystone member of the European Union. Since our entry in 1958, we have expanded our role from member to leader. Guiding and leading the expansion of the EU into what it is today. Although we faltered in the face of Russian aggression, we must not give up the dream of a united Europe. The conservatives and socialists can kick and scream as much as they want, but we will not listen to their incoherent ramblings. The concept of the French nation has lost its meaning, and if we are to survive. Then, we must be willing to abandon it for the good of all Europeans."
 FRA_EU_Blurring_the_Borders: "Blur the Borders"
 FRA_EU_Blurring_the_Borders_desc: "What really are borders? Arbitrary lines drawn in the sand? A tool to divide people with useless ideas like nationalism? In truth, all of these things are true. As we move closer to realizing the European dream, we must cast down the concept of borders. A unified Europe is one where the people are free to move about, and ideas and visions can be spread freely. To cast down borders is to free ourselves of the burdens that come from them. No longer will people be divided by arbitrary lines. No more will we call ourselves German or French. We are Europeans, now and forever."
 FRA_EU_Quell_Nationalism: "Quell Nationalism"
 FRA_EU_Quell_Nationalism_desc: "Despite our victory over the militarists, there are still some who continue to tout their rhetoric. They riot day and night, decrying our regime for "selling out to the globalist elite" and "betraying the French people". While the previous regime was contempt to look the other way, we will not follow this approach. If the Pan-European dream is to be fully realized, then nationalism of all kinds must be crushed. We will drag the nationalists out, crush their rallies, and ban their parties. Some will denounce this as blatant authoritarianism, but it is a necessary evil. Europe will not be united if we allow these movements to persist."
 FRA_EU_Popularizing_the_Pan_Euro_Ideal: "Popularize Pan-Europeanism"
 FRA_EU_Popularizing_the_Pan_Euro_Ideal_desc: "Despite the best efforts of Volt and other political movements, Pan-Europeanism is not nearly as popular as it should be. Pro-EU parties have traditionally taken a back seat in favor of other parties. If our goal of a unified Europe is to be truly achieved. Then, we must do anything possible to support these parties. Fund them, campaign for them. Anything to increase their popularity. With support, pro-EU sentiment will rise like a great wave throughout Europe. And we shall ride this wave of support to propel the idea of a unified Europe from a dream to reality."
 FRA_EU_Uniting_our_Armies: "Uniting the Armies"
 FRA_EU_Uniting_our_Armies_desc: "France has always held great pride in the might of its military. From the glory days of Napoleon to today, to say France has a rich military history would be an understatement. As we move closer to realizing the Pan-European dream, we must accept the truth. To truly move forward with our goals, we must begin unifying the various armies of Western Europe. It would testify to our commitment to European unification to voluntarily integrate into the expanded EU command. And while some generals may squabble, our decision is final. And is ultimately for the great good of all of Europe."
 FRA_EU_Beyond_our_Singular_Existance: "Beyond our Singular Existence"
 FRA_EU_Beyond_our_Singular_Existance_desc: "What truly is France? A people? An idea? A nation? We say otherwise. Why can't France serve a purpose other than its own continued existence? The conservatives decry the EU for being a "tool of the globalists". While the socialists decry it for "continuing capitalist oppression". But all of them are wrong. As the Germans have done, we must accept that the concept of the French nation has lost its meaning. The future will not be kind to nations that refuse to change. And if we refuse to get with the times, we will fall just like all the other nations who did."
 FRA_EU_The_European_Dream_Marches_on: "The European Dream Marches On"
 FRA_EU_The_European_Dream_Marches_on_desc: "Ever since its formation in 1993, the EU has grown from a small coalition to a multi-nation alliance. Since then, a few like-minded individuals have worked to make the Pan-European dream a reality. Many thought the idea of a united Europe would be shattered with Russia's victory in Eastern Europe, but it has only emboldened us. It has shown that if we do not unite today, we will perish tomorrow, having never fulfilled the dream of unification. Dawn will mark a significant turning point in the history of not just France. But Europe as a whole. Like a phoenix, we will rise out of the ashes tougher than before. And when the enemies of Europe come, we shall face them head-on. For unity is our strength, and nothing will be able to break it."
 FRA_EU_Sister_Republic: "The Sister Republic"
 FRA_EU_Sister_Republic_desc: "France has always had a unique relationship with the EU. While we were one of its founding members, recent waves of euro skepticism have thrown a wrench in the Pan-European dream. Politicians such as Zemmour and Le Pen remain staunchly opposed to any integration into the union while arguing that France must become free of its influence. As a compromise with these groups, we will abandon our goal of total unification in favor of close cooperation with our allies. While Volt and other groups may be displeased by this, it is a necessary sacrifice for the good of our alliance."
 FRA_EU_Europeanize_Paris: "Europeanize Paris"
 FRA_EU_Europeanize_Paris_desc: "Paris, often considered one of the most popular cities in France and even Europe, has stood the test of time. From the alleyways to the catacombs, the very bricks radiate the city's rich history. It stands as one of the great melting pots. Where cultures blend. And ideas flourish. Unfortunately, the city has seen better days, and mass neglect from the Fifth Republic has led to parts becoming dilapidated. As part of our cooperation with the EU, we will embark on a grand campaign to revitalize Paris. Modernizing it and bringing it up to the standards of other European capitals such as Berlin and London."
 FRA_EU_A_New_NATO: "The New NATO"
 FRA_EU_A_New_NATO_desc: "Ever since its formation in 1949, the North Atlantic Treaty Organization, also known as NATO, has served as the West's front against authoritarianism. Many would claim the alliance became obsolete with the collapse of the Soviet Union. But this couldn't be further from the truth. Ultimately, the failure of NATO to defend Eastern Europe from the Russian horde is proof enough of its failures. However, we are not so willing to abandon the concept of NATO. Through trials and reform, we shall rebuild the organization into what it truly meant to me. Not just an alliance for democracy. But a genuine front for Western Europe. One that can truly stand up to the authoritarianism of Medvedev's Russia."
 FRA_EU_Advanced_Digital_Warfare: "Advanced Digital Warfare"
 FRA_EU_Advanced_Digital_Warfare_desc: "War is a game of constant change. Nothing remains the same in war. Everything changes with time. From the tank to the plane to drone technology. The battlefield has never been more chaotic. In this era of advanced warfare, if you don't get with the times, then you will be destroyed. Like the Chinese, we will begin to expand our own cyber warfare division. Integrating cyber warfare into our army will surely give us an advantage over our enemies. Allowing us to sabotage critical infrastructure and shut down enemy communications. "
 FRA_EU_Embrace_AI: "Embrace AI"
 FRA_EU_Embrace_AI_desc: "Since the beginning of the 21st century, the quest for AI has broken new ground. Starting with the creation of Siri, AI development has only gotten more advanced. In today's world, AI is viewed with skepticism at best or downright hatred at worst. While many have looked at AI through the generative lens, we are more fascinated by its military capabilities. As part of our quest to bring our army up to date, considerable investment will be placed into integrating AI. Not only will this modernize our military, but it will also help reduce human casualties on the frontline."
 FRA_EU_The_Cause_of_the_People: "The Cause of the People"
 FRA_EU_The_Cause_of_the_People_desc: "Ever since the dream of a unified Europe was conceptualized, we have done everything possible to make it a reality. Yet, we must not forget the people we serve. There is still vocal skepticism of our goals. Considered by many to be only the workings of a few elites, while others decry our goals as a continuation of corporate oppression. To win the people's trust, we must soothe their fears. Reassure them that our commitment is to the people, not the ceo or the globalist. Only once we have won the trust of the people can we truly get to work."
 FRA_EU_Democracy_Manifest: "Democracy Manifest"
 FRA_EU_Democracy_Manifest_desc: "Despite the drastic changes we have made to the French nation, one thing has remained constant, our commitment to democracy remains unchanged. At the core, we remain a nation by the people and for the people. The right and left will try to say that we are "the globalist puppet" or "corporate pawns" but the truth speaks for itself. Our duty is to France and to democracy. The future of not just France but Europe remains at stake. We remain under threat from the East. And if we do not save democracy today, the bear might overrun us tomorrow."
 FRA_EU_Eliminate_Human_Casualties: "Eliminate Human Casualties"
 FRA_EU_Eliminate_Human_Casualties_desc: "No nation goes into war expecting to not incur heavy losses. But why does it have to be this way? War is on the horizon, and if we want to be the ones who emerge victorious, then we must do everything possible to prevent unnecessary deaths. Whether through investments in medical advancement or drone technology. Alternatively, we could pursue advancements in cybernetics. Allowing us to expand the combat abilities of our soldiers and boost their performance on the battlefield. While we might not be able to prevent the loss of life, these advancements will at least allow us to minimize it. "
 FRA_EU_Cyber_Warfare_Department: "Revolutionize the Cyber Warfare Department"
 FRA_EU_Cyber_Warfare_Department_desc: "The field of electronics has seen rapid advancement ever since the first computer was constructed. From the smartphone to now drone technology. Groundbreaking advancements have given countries an edge in times of war. But if we wish to succeed against the bear, then we must be willing to go further. Drones and information warfare might be good, but it is not enough. We must go beyond what has previously been thought of as possible. Emps, Cybernetic implants, robotic soldiers, all of these concepts will be spearheaded. Some may argue the ethics of these innovations, but that does not concern us. Ensuring our victory means we must be willing to embrace some more unethical technologies. "
 FRA_EU_Utilize_True_European_Allies: "Utilize True Europeans"
 FRA_EU_Utilize_True_European_Allies_desc: "Our failures in the European war have shown us that we must not trust those who claim to be our allies. When Kyiv was overrun, numerous Ukrainian officials did not hesitate to defect to the Russian side. When Poland was about to fall, Silesian separatists were the first to break away. Backstabbers, traitors, opportunists, these words do not begin to describe who these people genuinely are. In the quest to reclaim our legacy, we must only put faith in true European patriots. Those willing to put their very lives on the line for their ideas. Those who will stay loyal to their country even if it means death. These true patriots shall lead the charge when we move to reclaim the East. And shall assist us in exacting revenge on the collaborators."
 FRA_EU_Total_war_the_End_War: "Total War to End War"
 FRA_EU_Total_war_the_End_War_desc: "As much as we try to deny it, we must face the truth. The very continent of Europe is spiraling head-first towards another war. And this time, it will be even more destructive than the last. The continent's fate lies on a knife's edge. If we do not seize it for ourselves, then our enemies will. If we want to be on top, we must be willing to do whatever it takes to win. No longer will our soldiers be bound by restrictions or codes. Our full fury will be unleashed upon the enemy. And only once we have won will we finally put the guns down. Not just temporarily, but forever."
 FRA_EU_Dissolve_Executive_Authority: "Dissolve Executive Authority"
 FRA_EU_Dissolve_Executive_Authority_desc: "While we have succeeded in integrating ourselves into the EU, many institutions must be phased out. While the presidential system was necessary for the Fifth Republic, its purpose has no meaning for us. No longer will France be ruled by a president or a prime minister. From now on, a commission of experts and EU officials will oversee the day-to-day functions of the French government. Facilitating France's transition from a presidential system to a commission system. Some might protest this decision, but it is ultimately the best outcome."
 FRA_EU_Moratorium_of_Political_Debate: "Moratorium on Political Debate"
 FRA_EU_Moratorium_of_Political_Debate_desc: "Despite our best efforts, many aspects of our regime are still out of place. Many among the left and right continue to kick and scream, actively refusing to work with our government and even engaging in outright sabotage. We cannot allow these radicals to stall our progress, or we will get nothing done. With authorization from Berlin, we will put a temporary moratorium on all forms of political debate. Many will view this move as controversial. Or even outright authoritarian, but it is only temporary. Once our transition from republic to commission has been finalized, we will lift the ban on political debate. But for now, we must use extraordinary measures to secure our rule."
 FRA_EU_European_Cooperation: "European Cooperation"
 FRA_EU_European_Cooperation_desc: "Cooperation has historically been the foundation of any well functioning government. And our is no exception. The benchmark of our regime shall be our willingness to cooperate openly with our allies. Things such as trade agreements and joint military exercises will be used to demonstrate our undying commitment to the European project. We will convince our allies in Berlin that we are not just willing to cooperate. But actively pursue it. Allowing our budding alliance to bloom into something bigger. Not just an alliance, but a unshakable brotherhood."
 FRA_EU_Paying_our_Tithe: "Paying our Tithe"
 FRA_EU_Paying_our_Tithe_desc: "In the modern age, nothing is free. Goods, services, utilities, all of these things come with a cost. As much as our allies have assisted our rebuilding, it has not been for free. Large swaths of Germany and even the Benelux remain damaged by Russian sabotage and missile strikes. While they did not hesitate to help us rebuild, they will expect something in return for the help. Whether it be resources, worker, or funds, we will be expected to pitch in for their reconstruction. Just as they helped us. Some will grumble at this perceived tax, but it is ultimately in our best interest to pay. Showing our undying commitment to the Pan-European project."
 FRA_EU_Embolden_the_Euro: "Embolden the Euro"
 FRA_EU_Embolden_the_Euro_desc: "Having first been created in 1996, the Euro can be considered one of the finest achievements of the European Union. Not only does it function as a currency, but also as a symbol of unity. Its adoption by various governments, including ours, was a testament to the commitment to the Pan-European project. Many thought Russian victory in the East would spell disaster for the Euro, but the opposite has occurred. The Euro has only grown faster, and with our ascension into the European Union, it will continue to grow. Our strength is the Euro’s strength. And empowering the Euro is just one step in the long journey to a fully united Europe."
 FRA_EU_Nation_of_Equality_and_Science: "Nation of Equity and Science"
 FRA_EU_Nation_of_Equality_and_Science_desc: "Despite the failures of Macron's leadership, we cannot deny the progress made under the Fifth Republic. Conservative stagnation and backsliding were replaced by progress and innovation. Massive investments were made into social services, and funding was provided for technological innovations. As we look forward to the future, it is only natural that we continue to fund these programs. Under our guidance, France will become a nation of progress and innovation. Stagnation will be replaced by innovation, regression with progression. With the help of our allies, we will embrace the future with open arms. Ready for any challenges that may come our way."
 FRA_EU_If_only: "If Only..."
 FRA_EU_If_only_desc: "We thought it would never happen, but in the end, it did. And where do we stand now? Despite our recent successes, Europe still remains split in two. Try as we may to deflect it. We must accept that someone needs to take the blame. If only those populist agitators listened to us. If only the EU skepticists were more open to our ideas of European unity. But instead, they didn't. And look where we are now. Our allies have been destroyed or made puppets by Moscow, and the European continent is now split in half. If only they listened. If only they were willing to listen."
 FRA_EU_Iberian_Intervention: "Iberian Intervention"
 FRA_EU_Iberian_Intervention_desc: "Despite its relative isolation from the European War, the Iberian peninsula has not been spared from its aftermath. Following Medvedev's victory, the once peaceful peninsula has been torn apart by civil war. Radicals and separatists battle, hoping to have their visions triumph. At the same time, the governments of the peninsula desperately hold onto Madrid and Lisbon. We cannot simply sit back and do nothing, lest we risk a pro-Russian faction coming out on top and threatening us from the South. Thus, with authorization from Brussels, we will move swiftly to pacify the peninsula. Crushing radicals and restoring order to the once-peaceful lands. Under the banner of European unity, we will save Iberia from collapse."
 FRA_EU_Our_Offer_to_Brussels: "Our Offer to Brussels"
 FRA_EU_Our_Offer_to_Brussels_desc: "Despite all we have done, our allies in Brussels remain overburdened. Committed to managing both the West and East, the Brussels administration has had to work overtime to properly manage both regions. We cannot sit idly by and watch our ally become overburdened with the duties of the state. We will reach out to Brussels with an offer. We will take over the administrating duties of Western Europe. And in exchange, they will receive a share of its economic output. Not only will this prevent our ally from becoming overburdened, but it will also demonstrate our commitment to the European project. Allowing us to court favors from them in the future."
 FRA_EU_Strangle_Populist_Rabble_Rousing: "Strangle Populist Rabble-Rousing"
 FRA_EU_Strangle_Populist_Rabble_Rousing_desc: "One of the many failures of the Fifth Republic can still be clearly seen today. Despite the cementation of our rule, populist parties continue to resist our rule. Continously spouting anit-EU rhetoric and staging mass protests against our regime. Unlike Macron, we will not be soft on these rabble rousers. If they are not working with us, they are against us, and their dissent will not be tolerated. We wi ll bring the hammer down on these groups, cencoring their leaders and restricting their movements. They can kick and scream all they want, but no one will be there to listen."
 FRA_EU_Post_Ideological_Governance: "Post-Ideological Governance"
 FRA_EU_Post_Ideological_Governance_desc: "As we move closer to realizing the European project, there remains one more thing we must deal with. The concept of ideology must be abandoned if we hope to distance ourselves from the France of the past. In truth, we must accept that the idea of an ideology has only been used to divide people. If we genuinely wish to bring our people together, then these ideas must be thrown away. No longer will there be conservatives, liberals, or socialists. No longer will these labels be used to divide people or to define who someone is as a person. From now on, we are all French, regardless of what these labels might say."
 FRA_EU_Never_Again_means_Now: "Never Again means Now!"
 FRA_EU_Never_Again_means_Now_desc: "When Moscow proclaimed victory, we made a promise to ourselves. That never again will we be defeated. Never again will our dreams of a free and unified Europe be dashed by opportunists and populists. Never again will we let freedom be dashed by those who only wish to take power for themselves. But never again doesn't mean tomorrow or next week. It means now! Now is the time to march against the menace in the East. Now is the time we finally realize our dreams of a united Europe. And if we do not seize the reins now, we will never get another chance."
 FRA_Apologize_for_War_Contribution: "Her Honor Restored"
 FRA_Apologize_for_War_Contribution_desc: "Through courage and sacrifice, the army has restored the honor of France. In her darkest hour and amid false accusations of failure, the men pulled through and proved we were still a power worthy of the name of France. From the jaws of defeat we have snatched a great victory-not just for us, but for the whole of Europe. With the stain of failure behind us, we can now look onwards, and with the rest of Europe, march together for a better tomorrow. We hope the Ukrainians build enough statues of us…"

 #Bitter Winner
 FRA_Demand_Increased_Reperations: "Increase Reparations"
 FRA_Demand_Increased_Reperations_desc: "We have humiliated the Russians, but that alone is not enough to make them pay. The peace treaty we signed with them was too lenient, allowing them to get away with most of their crimes. Much of the damage they caused is still in place, and if they don't want us to make life even harder for them, they'll pay up. You reap what you sow."
 FRA_Bloodied_Liberator_of_the_Caucasus: "Maintain Military Garrisons"
 FRA_Bloodied_Liberator_of_the_Caucasus_desc: "We cannot afford to demobilize, not yet. Though many have proclaimed this a new era of peace, covert actions taken within Russia seem to suggest otherwise. As such we will continue to supply and manage military garrisons on the Caucasus, ready to hastily respond to any threat that may arise. The Russians didn't fool us the first time, and they won't do it this time."
 FRA_Rip_out_the_Russian_Rot: "Rip out the Russian Rot"
 FRA_Rip_out_the_Russian_Rot_desc: "Much of the land we took from Russia is plagued by their state funded terrorists and separatists. It is severely hindering our reconstruction and nation-building efforts. The Russians are doing everything they can to make this land as unsuitable for us as possible, and so we must kick them out. They lost this land, they will have to deal with the repercussions."
 FRA_Negotiate_Exclusive_Treaty_Ports: "Negotiate Exclusive Treaty Ports"
 FRA_Negotiate_Exclusive_Treaty_Ports_desc: "The Russians have been diplomatically isolated and heavily sanctioned ever since the failure of their little "exploit" in Eastern European, but we are now willing to offer them a lifeline. Should the Russians be willing to open up a few of their port cities to western trade and investments, we would be happy to lay off a little on their punishment. If they want to refuse, well, it's still their loss."
 FRA_Caucasian_Resource_Rights: "Caucasian Resource Rights"
 FRA_Caucasian_Resource_Rights_desc: "Under the mountains and plains of the Caucasus lie vast amounts of natural resources. We have aided this region to such an extent that we now hold large amounts of influence over them, and many politicians owe us favors. The French economy and military always demands more resources, and they don't care where it comes from. It's a small price for them to pay in exchange for our continued defense."
 FRA_Fund_Ukrainian_Peacekeepers: "Fund Ukrainian Peacekeepers"
 FRA_Fund_Ukrainian_Peacekeepers_desc: "The Ukrainian people fought admirably against the Russian onslaught, and now they're working hard to tame the lands we've liberated from the invader. Unfortunately, we've had most of our attention focused on the Caucasus, and can't expend any extra troops to aid the Ukrainians. However, we can certainly fund their efforts, for a weaker Russia means an easier future for us."
 FRA_The_Caucasian_Entente: "The Caucasian Entente"
 FRA_The_Caucasian_Entente_desc: "The time has come to make our commitment to the Caucasus completely formal. Up to now, we’ve just been supplying and funding them, but we’re now in a position where we can go a step beyond that. These nations will be invited to NATO, so that they will never again have to worry about the Russians. Those who refuse will not be exempt from our protection, for we would never consider abandoning our hard work and investments. For as long as we are standing, the Caucasus will remain free."
 FRA_The_Caucasian_Entente_tt: "This will create a mutual defense pact between Azerbaijan, Armenia, the Kuban, Georgia and headed by the great nation of France to ensure that Russia will never again rise to their feet."

 #Respectful Victory
 FRA_Prevent_Another_Weimar: "Prevent another Weimar"
 FRA_Prevent_Another_Weimar_desc: "The collapse of the Weimar Republic in the 20th century, born of humiliation and chaos, ultimately gave rise to catastrophe from the ruins of democracy. The 21st-century downfall of Russia serves as a stark warning—we must not allow a fragmented Moscow to repeat this descent into extremism and vengeance. France will take the lead in ensuring Russia's postwar reconstruction follows a path toward stability and peace."
 FRA_Democratization_of_Eastern_Minds: "Democratization of Eastern Minds"
 FRA_Democratization_of_Eastern_Minds_desc: "Russia's defeat has opened the doors of democracy for Eastern Europe. As the defenders of European liberty, we will spearhead a transformation in thought across the region. From Warsaw to Kyiv, we will support educational initiatives, media freedoms, and civil society, ensuring the people of Eastern Europe break free from authoritarian shadows. The seeds of democracy will take root, flourish, and reshape the East."
 FRA_Demand_Ukrainian_Leniancy: "Demand Ukrainian Leniancy"
 FRA_Demand_Ukrainian_Leniancy_desc: "Ukraine has paid a heavy price in its war against Russia. We honor their sacrifice, but victory must not become a pretext for excessive demands. We will urge Ukraine to show restraint in postwar territorial claims and reparations, fostering reconciliation rather than resentment. Only by setting aside hatred can Ukraine and Europe together build a lasting and stable future."
 FRA_UKR_leniancy_tt: "If [UKR.GetFlag] Ukraine refuses to embrace a more lenient stance on Russian citizens in their [KBK.GetFlag] Occupational Governments, we will take economic and political actions against them."
 FRA_Denounce_Azov_Influence: "Denounce Azovite Influence"
 FRA_Denounce_Azov_Influence_desc: "The euphoria of victory must not be tainted by the undercurrents of extremism. We have observed the rising influence of the Azovite in Ukraine—its radical ideology stands in opposition to democratic values. We will publicly condemn this influence and press Kyiv to address this growing concern. Europe's peace must not be marred by the specter of neo-Nazism—Eastern Europe's path to democracy must remain untainted."
 FRA_Capitalize_on_Caucasus: "Capitalization on the Caucasus"
 FRA_Capitalize_on_Caucasus_desc: "The Caucasus has long been a weak point in Russia's influence—and an opportunity for us. With Moscow defeated, we will strengthen cooperation with the nations of the Caucasus, leveraging their resources and strategic positions. From Baku's oil fields to Tbilisi's trade routes, we will invest in economic development and democratic initiatives, ensuring that the Caucasus becomes an ally of Europe, not a vassal of Russia."
 FRA_Uphold_Equality: "Uphold Equality"
 FRA_Uphold_Equality_desc: "Equality will be the foundation of Europe's new era. Regardless of race, gender, or background, every European citizen must be granted the same rights and opportunities. Under our leadership, from the vineyards of Champagne to the villages of Eastern Europe, all will share in the fruits of democracy."
 FRA_Eastern_Democracy_Manifest: "Manifest Eastern Democracy"
 FRA_Eastern_Democracy_Manifest_desc: "Democracy in Eastern Europe is not a dream—it is a necessity. In the wake of Russia's downfall, we will lead the charge to democratize the East. From the Baltic to the Black Sea, democratic elections, rule of law, and civic participation will sweep away the remnants of authoritarian decay. The light of freedom will illuminate the East, and the great democratic wave of the 21st century will begin here."


 FRA_VIC_Withdraw_from_integrated_command: "Withdraw from Integrated Command"
 FRA_VIC_Withdraw_from_integrated_command_desc: "Although we successfully won the just war against Russian aggression, the victory cannot mask the deep divisions within NATO or the pain felt by our people. After the United States, once the leader of the Western world, lost its dominant position, the conflicts and disputes within NATO and the EU were enough to make anyone shudder at the memory. The unity and friendship politicians speak of have proven fragile in the face of an uncertain future. Thankfully, the French people have seen the truth and called for change. The outdated system must be dismantled, and only by doing so can we lay the groundwork for a new era. From this point forward, France will no longer participate in NATO's integrated command structure. We will stand firm with any allies willing to fight beside us."
 FRA_VIC_Our_Own_Direction: "Our Own Direction"
 FRA_VIC_Our_Own_Direction_desc: "The French Republic Armed Forces have once again demonstrated their strength and brought pride to the nation in the latest conflict. The combat effectiveness of our military is undeniably among the best in Europe. This is an indisputable fact. However, it is not out of disloyalty to our allies, but out of a sense of responsibility, that we must address the concerns raised by our officers and soldiers regarding the laxity of our allies in terms of armament and discipline, both during and after the war. These concerns deserve the serious attention of our political leaders and senior commanders. To preserve the independence and legacy of our armed forces, maintain their high combat effectiveness, and ensure France's continued status as a great military power, we must firmly reject the misguided idea of merging the French army into a European unified force. We must continue to prioritize the development of our own military."
 FRA_VIC_With_Distinction: "With Distinction"
 FRA_VIC_With_Distinction_desc: "From the miracle of Orléans to the triumph of Austerlitz, from defending Verdun to liberating Paris from the Third Reich, and now fighting alongside Eastern European allies against Russian invaders, the glorious history and achievements of the French army have endured through time and regime changes. The fighting spirit has been passed down through generations. In today's French soldiers, the chivalric values and camaraderie of old still shine brightly. As we strengthen this sense of unity through history, we will also remind the French people of their ancestors' great deeds and the historic responsibilities they now carry. The military will serve as a model for French society, guiding the nation in fulfilling its mission."
 FRA_VIC_The_Frenchmans_Burden: "The Frenchmans Burden"
 FRA_VIC_The_Frenchmans_Burden_desc: "Nothing makes a Frenchman prouder than being a citizen of the first country to overthrow a tyrant and achieve independence and prosperity through its own efforts. The armed forces of the world's first democratic republic have long been a vital force in strengthening national cohesion. This unique sense of responsibility will be the core element in uniting French society and fortifying the French army in the coming era. We will show both the citizens of France and the world that upholding and spreading the ideals of liberty, equality, and fraternity is the great mission of the French people— a mission shaped by France's glorious history and the struggles of its people. This renewed civic consciousness will bring profound changes to the French army. From now on, they will fight with the dual mission of defending the present and shaping the future."
 FRA_VIC_The_New_Grand_Army: "The Grand Army"
 FRA_VIC_The_New_Grand_Army_desc: "Every year, Bastille Day on July 14th is a national celebration for the French people. On this day, Paris becomes a sea of red, white, and blue, with representatives of the elite French army marching in unison beneath the Arc de Triomphe, symbolizing the strength and unity of the French people and the nation's unwavering dignity. The gleam of rifles, the brass helmets and red plumes of the cavalry, the raised barrels, and the massive tracks of the Leclerc tanks inspire awe and pride. We will continue to showcase the power of the French army, highlighting its uniqueness, awakening national pride, and reminding soldiers of their foundational spirit. They will know they are not simply defending the homeland with passion; at all times, the motherland stands with them."
 FRA_VIC_Return_to_Old: "French Army of Old"
 FRA_VIC_Return_to_Old_desc: "After a period of reconstruction and rigorous training, the French army has demonstrated its finest qualities, rivaling the invincible forces led by the Great Condé, Napoleon, Foch, and Tassigny. The army has proven capable of overcoming harsh trials, preserving its core identity, and deterring all ill-intentioned adversaries. Our political leaders and senior generals are highly satisfied with the army's current state and are fully prepared to deploy this formidable force in any future full-scale conflict. They are confident in the great victories this army is poised to achieve."
 FRA_VIC_Strengthen_NATO: "Strengthen our Commitment"
 FRA_VIC_Strengthen_NATO_desc: "If anyone still doubts the crucial role of the NATO alliance in defending Europe—especially after the United States has been too preoccupied with internal collapse to offer support, leaving its support lacking, and after Russia's aggressive war, driven by expansionist ambitions, ended in defeat—then their perspective is dangerously short-sighted. Such views could bring profound harm to Western civilization. Fortunately, the political leaders of our country and our allies remain unwavering in their commitment to the European Union's path. They have resolutely pledged to strengthen military cooperation, making key decisions to secure the future of Europe. As the EU's most important military power and the primary force resisting Eastern threats, the French Armed Forces will continue to be the backbone of European security, always ready for the next challenge."
 FRA_VIC_The_European_Army: "The European Army"
 FRA_VIC_The_European_Army_desc: "President Emmanuel Macron has consistently called for the creation of an 'independent European armed force.' However, this initiative has faced repeated opposition from the United States, and many in Europe, still holding onto illusions about both the US and Russia, questioned its feasibility. They feared that provoking either superpower could lead to catastrophic military or economic consequences. Today, these concerns have been proven wrong. Europe can no longer afford to depend on any superpower for its safety and security. Moreover, the small-scale military cooperation among European nations, which has been in place for over forty years, demonstrated its value during the recent conflict. It is now time for Brussels and our governments to act decisively and work towards realizing the long-standing goal of a 'European Army.'"
 FRA_VIC_Our_Place_in_Europe: "Our Role in Europe"
 FRA_VIC_Our_Place_in_Europe_desc: "France is the political center, economic engine, and military stronghold of Europe—its importance in contemporary Europe cannot be overstated. On the military front, to reinforce our leadership role and strengthen our position within the EU, we will promote closer cooperation between the French military and allied forces. This includes establishing unified training standards, developing coordinated organizational plans, initiating cadet exchange programs, and conducting comprehensive, multi-level joint exercises across all branches of the military. The French army's high standards and extensive experience make it a model for any European military. As more allied nations adopt French military practices, our influence and the potential scale of joint forces we can lead in future conflicts will continue to grow."
 FRA_VIC_The_French_European_Army: "The Franco-European Army"
 FRA_VIC_The_French_European_Army_desc: "After extensive collaboration and adjustments, we are proud to say that the French military model has been adopted by several European countries. The French command system and combat units now integrate seamlessly with those of these nations, allowing for the rapid formation of a combat-ready joint force. Political leaders and military officials from Paris, Berlin, Brussels, Amsterdam, and Rome agree that the time has come to establish a permanent European joint armed force. Built on the foundation of French military experience, this multinational force will unite soldiers from different countries and languages in the mission of safeguarding European civilization. In this effort, the French army and its high command will play a central and irreplaceable role."
 FRA_VIC_A_Distinctly_French_Force: "A Distinctly French Force"
 FRA_VIC_A_Distinctly_French_Force_desc: "If we truly prioritize the safety of France and Europe, we must reject any illusions or empty rhetoric that could hinder our actions. After thorough internal discussions, our political leaders and military officials unanimously agree that maintaining the independence of the French army is the best way to ensure a reliable defense and protect European civilization. The potential challenges of a European joint armed force—such as command confusion, language barriers, and cultural differences—are key reasons for abandoning the joint forces plan. France will continue to support allied armies on this basis. This strategy allows the French army to maintain its pride while remaining the strongest guardian of Europe and a model for European forces."
 FRA_VIC_The_New_French_Army: "The New French Army"
 FRA_VIC_The_New_French_Army_desc: "The new phase of French military reform is nearing completion, and we can confidently state that the French army remains the strongest force in Europe. Compared to its former self, the French army is now even more formidable to its enemies, with a more efficient and resilient internal structure, reaching the pinnacle of both offense and defense. Marianne will be proud of our achievements, and none of this would have been possible without the bold reforms that have transformed the French military."
 FRA_End_of_War: "An End to War"
 FRA_End_of_War_desc: "As the smoke of war clears, the sweet scent of peace feels both nostalgic and invigorating. The Russian threat has been neutralized, leaving it powerless and awaiting its fate. In this moment of victory, there is a shared desire among the French, from leaders to citizens, to end the state of war as soon as possible. The goal is to reduce the burden of military spending on society and the national economy. While concerns about 'self-disarmament' remain, bills for peace reconstruction and the demilitarization of Europe will soon be presented to Parliament. The French people believe that, in this new era, a commitment to peace and the collective strength of the population will be enough to prevent any ambitions for the resurgence of great powers and the pursuit of aggressive military policies."
 FRA_End_Conscription: "End Conscription"
 FRA_End_Conscription_desc: "Conscription has a long history in France, ensuring the country has maintained a strong and ready army for centuries. In times of crisis, the large pool of trained citizens has provided a valuable reserve force to meet urgent needs. A recent example is the war against Russia, where mobilized French citizens showed remarkable courage and adaptability on the battlefield. While serving the nation remains a point of pride, the peaceful years of the early 21st century have led the French people to reflect on changing circumstances. The 'citizen army' model is no longer suited to modern warfare. A professional army is now better equipped to fulfill the task of defending the nation."
 FRA_Surrender_the_Military: "Surrender the Military"
 FRA_Surrender_the_Military_desc: "Although our political leaders have decided that France must build its armed forces and shape its military strategy within the framework of a united European defense, the generals of the Ministry of Defense and the General Staff remain stubbornly resistant. Clinging to their pride and vested interests, they refuse to relinquish even the smallest bit of power, which they hold dear. In the rapidly changing and increasingly dangerous European landscape, we cannot afford to waste time arguing with them. By using a 'carrot and stick' approach, we will decisively curtail the generals' military authority to achieve our objectives, while doing so with grace."
 FRA_VIC_surrendered_the_military_tt: "This will transfer our §Gentire military§! to our steadfast ally, [GER.GetFlag] Germany, while also creating an §Yelite force§! for everyday defense."
 FRA_VIC_surrendered_the_military_tt_desc: ""
 FRA_Maintain_Military_Strength: "Maintain Military Strength"
 FRA_Maintain_Military_Strength_desc: "The Ministry of Defense and the General Staff have persuaded our political leaders that maintaining the current size of the armed forces is essential. France can no longer afford to focus solely on its own interests. The Eastern threat has not been fully eliminated, conflicts persist in several areas of Europe, and wars continue to rage in North America, East Asia, and the Middle East, causing immense suffering. The constant rhetoric from pacifists serves no real purpose for the nation and could risk returning us to the dangerous times of 1940. A strong and capable French army will be able to meet any challenge, demonstrating that the ideals of 'Liberty, Equality, Fraternity' remain as vital as ever."
 FRA_National_Demobilization: "National Demobilization"
 FRA_National_Demobilization_desc: "From the perspective of safeguarding France's sovereignty, security, and national interests, the current size of the army is excessive—larger than necessary. The topic of significant disarmament is no longer new in French politics and society, and today, a series of related policies will be officially enacted. While reducing redundancy in the military, we must ensure that we continue to honor and express gratitude to the brave warriors who have sacrificed to defend freedom and justice. At the same time, we will address veterans' affairs responsibly and build a leaner, elite force—one that is battle-hardened and capable of rapid response and mission success."

 FRA_VIC_The_conservative_revolution: "The Conservative Revolution"
 FRA_VIC_The_conservative_revolution_desc: "The so-called "end of history" that was promised to us by liberals has yet to come. The peace that was supposed to come in the wake of the Soviet collapse never arrived. In fact, the world is in a far more volatile state now than it was just a couple decades ago. On top of this, our nation has suffered in the modern era, and the people want change. And so they turned out in waves to support conservatives, who, now back in charge, will steer France onto the right course."
 FRA_VIC_Our_Bountiful_Economy: "Our Bountiful Economy"
 FRA_VIC_Our_Bountiful_Economy_desc: "The COVID Pandemic and American Collapse contributed heavily to several years of weak economic growth. However, with the threat of the Russians sidelined, and the European community more intertwined than ever, our economy has boomed. Now that we no longer have to worry about the east, we can ensure that this period of economic prosperity will not go to waste."
 FRA_VIC_Economic_Patriotism: "Economic Patriotism"
 FRA_VIC_Economic_Patriotism_desc: "Our recent economic growth can only be attributed to one source, the hard work of the French people. As such, decisions that might benefit different EU nations will be put aside in favor of those who will benefit our people. Of course, we don't intend to shirk our commitment to our European brothers. Simply, we will fund French small businesses rather than Romanian ones."
 FRA_VIC_Bask_in_the_Light: "Bask in the Light"
 FRA_VIC_Bask_in_the_Light_desc: "Our hard work has completely turned our economy around, and now the people are feeling the effects. With more government funding, public services are reaching new highs. Small businesses and corporations alike have felt the impact of our subsidies and funding, and inflation is down by several points. More people have a roof over their head and food in their stomach, and we will work hard to ensure this trend continues!"
 FRA_VIC_The_French_Golden_Age: "The French Golden Age"
 FRA_VIC_The_French_Golden_Age_desc: "All of our hard work has culminated in this moment. For decades France had been a shell of its former self, burdened by the events of the 20th century, and it didn't seem like the 2020s would be any better. But then miracle after miracle happened, and we can now confidently say we have retaken our place as one of the world's great nations. Our people are happy, our military is strong, and our economy is vibrant. Whatever the next few years hold, we will face it head on, and ensure our nation remains united and strong!"
 FRA_VIC_Our_Native_Land: "Our Native Land"
 FRA_VIC_Our_Native_Land_desc: "France has existed for a long time, and while it has suffered hardships, we have always worked hard to maintain our land. With our victory over the Russians, we have protected it from harm once again. Now, we can look inwards, and focus on ensuring that our great republic lives up to its reputation. We will not rest until our lands are being used to the fullest, and they are as beautiful as they should be."
 FRA_VIC_Spirit_of_Degaul: "The Spirit of Charles de Gaulle"
 FRA_VIC_Spirit_of_Degaul_desc: "General de Gaulle is one of the many heroes of French history. It is thanks to his efforts that our home was liberated from the fascist invaders during WW2, and that we were able to build back so well from years of occupation. Though he has now been dead for many years, the spirit he embodied, the spirit of France, lives on today! The French nation must stay free, and to do that we must stay strong!"
 FRA_VIC_For_Every_Drop_of_Blood: "For Every Drop of Blood"
 FRA_VIC_For_Every_Drop_of_Blood_desc: "Victory in any war comes at a hefty cost, and we were not spared. Many of our young men and women were slain in battle against the Russian forces, giving their all to repel the onslaught. They were successful, but their sacrifice will mean nothing if we waste it. We must utilize this time of peace to prepare for the next big war, and ensure that this time we lose as few Frenchmen as possible."
 FRA_VIC_Revile_Russian_Autocracy: "Revile Russian Autocracy"
 FRA_VIC_Revile_Russian_Autocracy_desc: "While many have praised the results of the European War as heralding a new age of Russian democracy, anyone with a bit of common sense realizes that nothing has changed. Yes, leadership has shifted, and the country is no longer blatantly expansionist, but at heart it is still the same Russia. They will be back sooner than later, and until then, we must weaken them anyway we can."
 FRA_VIC_Our_Free_People: "Our Free People"
 FRA_VIC_Our_Free_People_desc: "What is France if not a nation of freemen? Whilst our liberty has suffered setbacks and challenges, it has never been put down for long, thanks to the work of the French people. Our recent victory over Russia has proven that the desire for freedom our citizens have has not faltered, to the point that they are willing to fight to defend it. The light of liberty will never go out here, we will do everything to ensure that."
 FRA_VIC_The_France_of_Today: "The France of Today"
 FRA_VIC_The_France_of_Today_desc: "France has a history stretching back over a thousand years. From the Gauls, to the Romans, to Charlemagne and Napoleon, we're nothing like the nation we once were. But we're not here to discuss ancient history, all anyone cares about is now. The France of today is a nation that is constantly striving to provide a better life for its people, and so long as the conservatives stay in power, that will stay our goal."
 FRA_VIC_Denounce_Liberal_Authoritarianism: "Denounce Liberal Authoritarianism"
 FRA_VIC_Denounce_Liberal_Authoritarianism_desc: "Enemies come in all shapes and sizes, from all corners of the globe, so logically there would be some within our own borders. The closest threat to home comes in the form of the far left. Communists, anarchists, and the lot would like nothing more than to tear down the current political structure and replace it with something much fouler. This future must remain a fantasy in their mind, however, as we will do everything to keep it from coming to fruition."

 FRA_VIC_The_Red_Banner: "The Red Banner"
 FRA_VIC_The_Red_Banner_desc: "Where does the future of France lie? After defeating the tyrants of the East and the Russian regime—one that is neither 'liberal' nor 'democratic'— how will France step into this new historical era? The people of France have made their choice with their votes: the left-wing Grand Coalition has secured an indisputable governing position. This time, they come to power with a bold ambition—to bring fundamental changes to French society and build a truly people-oriented state. They are determined to use their mandate to implement transformative reforms for France. Perhaps, in our lifetime, the dream of red flags flying across Europe may indeed become a reality."
 FRA_VIC_United_in_Equality: "United in Equality"
 FRA_VIC_United_in_Equality_desc: "'Equality'—what a beautiful word. It has been the common pursuit of countless generations. From the 'utopian' equality kingdoms sung by ancient bards to the great society fought for by Marxist communists, the ideal of eliminating all identity and class differences has never been abandoned. Today, as we embrace the rebirth of our French homeland, we carry this ideal forward, letting the flowers of equality bloom across the land of freedom. Inspired by the spirits of countless martyrs, we believe all citizens will unite with unprecedented solidarity to invest in this great cause."
 FRA_VIC_Redefine_the_French_Citizen: "Redefine the French Citizen"
 FRA_VIC_Redefine_the_French_Citizen_desc: "What does it mean to be a 'French citizen'? Many people may have different answers to this question: birthplace, language, culture, or even ethnicity and race. Defining the identity of a French person is a crucial step in shaping the modern nation-state. Today, a new answer to this question will play a key role in determining the direction of our socialist reforms. Only by unifying our understanding of this concept can we create a strong foundation for promoting endeavors that truly benefit the people. Therefore, we will welcome any citizen who identifies with and values French culture, embracing all people who call this land home, into the French family. With a proud history full of glorious moments, the French people will take their first step into a new era."
 FRA_VIC_End_Neo_Colonialism: "End Neo-Colonialism"
 FRA_VIC_End_Neo_Colonialism_desc: "Neo-colonialism, this 'Kraken' born from global capital interests, has tormented the world's people for decades. The number of countries and individuals it has ravaged is countless. Shamefully, France, the eldest daughter of Western civilization, once supported the evil cause of oppressing people from other continents. We shall atone for our past mistakes with unwavering commitment. In the heart of the dark continent, French liberators will bring freedom and justice. We solemnly pledge to invest all our resources and strength to restore dignity and bring happiness to our fellow human beings who have suffered so much. This time, the cruel colonizers will be utterly eradicated, and the universal sun will shine warmth on all."
 FRA_VIC_Revolution_without_Revolution: "Revolution without Revolution"
 FRA_VIC_Revolution_without_Revolution_desc: "Finally, we have succeeded. After weathering countless storms and experiencing both moments of glory and sorrow, the bells of Notre-Dame de Paris now ring in celebration of the great cause of the French people. The violent and bloody memories of revolution have faded. What we have achieved on French soil can now be called a 'revolution without revolution.' The French have shed the trappings of the old era and become pioneers of the new age. In this great country, filled with dreams, prosperity, peace, and friendship, the story of you and I has just begun."
 FRA_VIC_Ground_Up_Army_Reform: "Ground-Up Army Reform"
 FRA_VIC_Ground_Up_Army_Reform_desc: "The prestige and respect long enjoyed by the French military have often been taken for granted. However, a closer examination of its state reveals a less flattering picture. If we are to advance our planned reforms, the military is the first major challenge we must address. For years, conservative, reactionary views and entrenched hierarchical structures have stifled progressive, people-oriented voices, further alienating the military from the broader French society. Therefore, we must overhaul the system completely—sweeping away the old ways and clearing out the dust and debris. This process will inevitably cause instability and unforeseen challenges. But as the old saying goes, 'You can't make an omelet without breaking eggs.' In the long term, a military more closely united with the people will create a new chapter in France's history."
 FRA_VIC_Compensate_the_Veterans: "Compensate our Veterans"
 FRA_VIC_Compensate_the_Veterans_desc: "It is no exaggeration to say that the socialist red flag of today's France is stained red by the blood of countless warriors who fought bravely against the Eastern tyrants. Therefore, no amount of respect and gratitude toward these heroes is too much. The French government will express its deep appreciation for veterans not only through propaganda but also through concrete actions. Retired farmers will receive land and technical support to improve their lives; honest workers returning to cities and factories will enjoy generous benefits and job security, ensuring the happiness and peace of thousands of families. We will prove ourselves to be a more responsible government, one that is more concerned with the future of our national heroes than the bourgeois governments of the past. The bright red ribbon of the Légion d'honneur will be their highest distinction."
 FRA_VIC_Demobilize_the_People: "Demobilize the People"
 FRA_VIC_Demobilize_the_People_desc: "Hindering or silencing the people's autonomous struggles and legitimate demands is the last thing we want to do. This is essential for us to qualify as a 'People's Government.' Reform can only become a reality through the spontaneous actions of the entire populace. If the fruits of social progress are not cherished and protected by the people, they will remain mere illusions. As the dawn of peace spreads across France and Europe, it is time to completely lift any tangible or intangible shackles that have bound the French people. It is heartening to see French workers unleashing their creativity and initiative, boldly exploring and striving, and using their own hands to shape a vision of a free nation."
 FRA_VIC_Expand_the_Rights_of_Man: "Expand the Rights of Man"
 FRA_VIC_Expand_the_Rights_of_Man_desc: "How should we define 'human rights'? Some argue that human rights are about economic development and the right to a prosperous life. However, this materialistic view overlooks the legitimate spiritual needs of the people. Others focus on concepts like 'freedom of speech' and 'cultural diversity,' but these ideas have often become political issues, sparking conflict and division. To avoid repeating the mistakes of the past, we must offer a new definition that aligns with France's current national conditions and guides the future of the French people. Human rights must transcend political tools, and the justice and principles upheld by past revolutionary fighters will be revitalized in the twenty-first century"
 FRA_VIC_Form_A_Pink_Red_Coalition: "Pink-Yellow-Red Coalition"
 FRA_VIC_Form_A_Pink_Red_Coalition_desc: "After years of striving for the welfare of the French people, the progressive forces of the French left can finally spread their wings and bring a fresh socialist breeze to the country, dispelling the gloom of the old era. To achieve this, a broad and strong governing foundation must be built upon the existing party alliance. The New Popular Front, primarily composed of LFI, PCF, PS, and EELV, must now strengthen itself by absorbing other pro-left parties to enhance its power and internal unity. At the same time, it must improve its communication and cooperation mechanisms, becoming a better channel for representing the people and reflecting their voices. For the New Popular Front, this new era signals the beginning of a renewed struggle. However, with the strong support of the French people, all challenges and obstacles can be overcome."
 FRA_VIC_The_Left_Prevails: "The Left Prevails"
 FRA_VIC_The_Left_Prevails_desc: "There were those who doubted that true socialism could find a place in today's Europe. Even when a party claiming to be socialist came to power, it was often led by a petty bourgeoisie that blended neoliberal ideas, bowing to big capital and vested interests in exchange for cooperation. But in today's France, such rhetoric is a thing of the past. Thanks to our victory over the Russian dictator, the legitimate election win, and the implementation of bold social reforms, the left-wing alliance in France has become the true force in French politics, earning sincere and enthusiastic support from the people and excelling in multiple areas. Even if remnants of the old order refuse to accept their defeat and try to undermine our cause, the French people will never allow it."
 FRA_VIC_Peace_Land_and_Bread: "Peace, Land and Bread"
 FRA_VIC_Peace_Land_and_Bread_desc: "For the average French person, a happy life can symbolize many beautiful things or simply include a few of the most cherished and essential needs. 'Peace, land, and bread'—this ancient slogan, passed down since the French Revolution, has endured through two world wars and remains relevant today. It shows that even the deepest suffering cannot destroy the hopes and dreams of generations. As the representatives and steadfast servants of the French people, we will ensure that these things never again slip from their grasp. This is not only a reflection of history but also our bold declaration for the future."

 FRA_VIC_The_Republic_Eternal: "The Republic Eternal"
 FRA_VIC_The_Republic_Eternal_desc: "To say French history has always been turbulent is an understatement. From revolutions to purges to occupations, periods of stability are few and far between. And just as Churchhill feared during the Cold War Era, the Russian menace would march west, threatening to trample Eastern European democracy and restore its power on the European continent. But we did not stand idly by. We stood tall against Russian autocracy. We did not back down against the insurmountable odds. Now, as the dust settles and the guns are put down, we stand triumphant over tyranny. Working side by side with our allies, we saved both France and Europe from destruction. Now, we gaze into the future, ready to face whatever comes our way. Confident that the republic shall endure eternal, regardless of what will come our way."
 FRA_VIC_Divided_by_Ideas: "Divided by Ideas"
 FRA_VIC_Divided_by_Ideas_desc: "To say Europe is a vast continent of ideas would be an understatement. From the Leviathan to the communist manifesto, the continent was the birthplace of many ideologies that are still around today. Throughout history, great empires and global powers have tried to enforce one unifying ideology onto Europe, from the age of absolutism to the Iron Curtain during the Cold War. But why should we attempt to force our way onto the rest of Europe? We must embrace Europe for what it truly is. It is a tapestry of not just nations but also ideas, where everyone can embrace their ideas and ideologies, free from judgment. "
 FRA_VIC_Past_the_Darkness: "Past the Darkness"
 FRA_VIC_Past_the_Darkness_desc: "As the United States collapsed, many used their calamity to claim that our precious liberal democracies were all on the verge of collapse, doomed to stagnation and eventual deposition by radical forces. However, our triumph against the wannabe Russian tyrants and their pursuit to subjugate eastern Europe has proved these naysayers were in the wrong. Of course, we still have many issues to deal with on both a domestic and international level. However, our prized liberal systems still rely upon the ideas of discussion and democratic decision making that ensure that whatever storms we weather, we can tackle them in a way that best suits all."
 FRA_VIC_Onto_the_Light: "Onto the Light"
 FRA_VIC_Onto_the_Light_desc: "The darkness set on by the pandemic, and the calamity of the 2020s is not lost on us. However, we have weathered the forces of tyranny before and we have weathered them again even without our American benefactors. Our optimism, once called foolish and misguided, has allowed us to come out of the crises the decade has thrown at us even stronger than before. The change of attitude nationally has encouraged more political participation, a higher birth rate and a willingness for our people to fight and die for their ideals even against overwhelming odds. Let this be the era that we finally bring about the triumph of liberal democracy against the forces of authoritarianism and oppression. "
 FRA_VIC_The_French_Shining_Bright: "France Shining Bright"
 FRA_VIC_The_French_Shining_Bright_desc: "We have come far as not only a nation, but as one united French people in the past few years. Many thought that our nation, struggling with issues regarding our domestic policies and weakening international influence, would soon be doomed to a radical regime change, or subjugation by foreign powers. However, we now showed the world what it means to be French, all while maintaining the civility and compromise expected of a true liberal democracy. Our primary economic woes have been dealt with, spirits reinvigorated by the flames of battle and brotherly struggle against the forces of evil all while not falling to the temptations of populist demagoguery. Shall we continue to ensure that France remains a beacon of liberalism, one that our forefathers that stormed the Bastille and ended the Ancien Regime would be proud of if they could see it today. With it, let us continue to be the benefactor of a united Europe, one that can stand up to the forces of tyranny while ensuring that each nation, regardless of size or strength can together feel invincible against whatever threats come our way.\n\nIt is important to note that in our moment of triumph, word from the east tells us of a Russia licking its wounds in preparation to snuff out our democracies once and for all. We know full well that if our nation, the light it shines upon the continent and the rest of the world dulls then we will see ourselves subject to tyrants even worse than what we encountered in the European War. They will not give us the same "mercy" that they were willing to give us in the previous war, and we will have to meet their torrents of authoritarian fury with the blinding light of liberty and freedom we have exuded for centuries. Let us ensure that when we meet with the tyrants of the east once more, that they shall be repulsed with the deafening cry that has and will continue to echo throughout the ages…\n\n§B"VIVE LA FRANCE!"§!"
 FRA_VIC_Fraternity_of_Nations: "Fraternity of Nations"
 FRA_VIC_Fraternity_of_Nations_desc: "European Unity is a peculiar concept, fervently supported by some and rejected by others. Yet, in times of darkness, it was the collective strength of European nations that vanquished evil. Whether it be the destruction of Hitler's nazi empire or our most recent victory against the war-hungry Russian bear, had we not united together to vanquish tyranny, then we would have been divided and picked off one by one. Yet the war is not over yet. While we may have delayed Russia's advance, Moscow is licking its wounds and preparing to exact its revenge. And if we do not strengthen our commitment to collective security, then they will overrun us and destroy all that we have built."
 FRA_VIC_Cement_our_place_in_Europe: "Our Continental Role"
 FRA_VIC_Cement_our_place_in_Europe_desc: "Even if the Russians have been defanged, we must remember the role in which we play in the defense of our continent. Not only do we have one of the most powerful militaries in all of Europe, but our industrial base provides a backbone that the Eurozone and European single market can rely upon. With this in mind, bolstering these systems allows for us to not only solidify our position as a protector of European values, but will ensure that we have bolstered our influence to stand on-par with nations like Germany and the UK in being the leaders of Europe. Besides, if we falter in this duty, who's to say a resurgent Russia or other force of tyranny shall snuff out our continent's prized liberty and shared brotherhood?"
 FRA_VIC_Europe_United: "Europe, United"
 FRA_VIC_Europe_United_desc: "The war we just came out of is often referred to as the "European War", one that saw us as a continent resist the onslaught of Russian tyranny without the help of the Americans that many claimed were our only line of defense. We have proven that together, as a single continent we can and will withstand any threat that comes our way. With this in mind, we need to ensure that organizations like the European Union have the support they need to ensure greater European cohesion and cooperation, something that has already borne fruit in recent history. While not to the degree of some Federalists, pushing for further economic and military integration will be essential in ensuring that our continent can weather the coming storm from a resurgent Russia, or other threats that seek to impose their will on our prized democracies."
 FRA_VIC_Strong_in_our_Resolve: "Strong in our Resolve"
 FRA_VIC_Strong_in_our_Resolve_desc: "What the past few years have taught us is that the world we live in has no room for complacency. If we had not successfully remilitarized, the lack of American support in NATO would have left us defenseless to the eastern onslaught, likely bringing on the death of liberal democracy in Europe. However, our resolve in facing these threats, both domestic and international, has shown that we can and will withstand these geopolitical threats. However, we now see many falling back into complacent superiority in light of our victory, believing that our triumph against the Russian bear will be the final one we will have to face. But even in victory, we must remain strong in our resolve, ready and willing to not only take on the threats from the East, but those elsewhere around the world as well. If we fail to do so, we shall find ourselves at the hands of tyrants even worse than what we just faced, a fate that must be one worth dying to prevent."
 FRA_VIC_United_in_Liberty: "United in Liberty"
 FRA_VIC_United_in_Liberty_desc: "Liberty is like a never-ending flame. Once it is light, it can't be put out, only dimmed. The concept of liberty harkens back to great philosophers such as John Locke. Who is considered to be the father of liberalism? And whose works were instrumental in sparking the flames that would lead to the French Revolution. As we stand victorious over tyranny and despotism, we must work to fulfill the dream of John Locke. With our guidance, liberty will shine across all of Europe. The oppressed will be freed, and the oppressors shall know our righteous vengeance. And when we are done, the demons of tyranny and hatred will be banished to the shadows for the rest of time. "
 FRA_VIC_Utmost_Equality: "Utmost Equality"
 FRA_VIC_Utmost_Equality_desc: " Our beloved republic has ridden through many forms of differing governance, but since 1791 we've always tried to retain the core ideals of liberty, fraternity and particularly equality. While our laws have been able to establish legal equality, many still complain about the lack of economic or social equality, especially along marginalized groups. Now that our main issues on the international stage have been dealt with for now, we must turn our attention to addressing these cases of inequality in our society. The radicals may scream and shout, but our actions can and will speak louder than their petty words if we emphasize utmost equality among our citizens. In doing so, not only will we reap the awards electorally, but live up to the namesake that the French Republic has demanded since the days of Robespierre."
 FRA_VIC_The_End_of_History: "The End of History"
 FRA_VIC_The_End_of_History_desc: "As the Soviet Union imploded and the world seemed to be turning to an era of peace and prosperity, it brought about a mindset that favoured the rise of liberal democracy as the system that best suited human civilization. In 1992, Francis Fukuyama published his seminal work "The End of History and the Last Man" that implied the fall of totalitarian communism marked the beginning of the end of history as we knew it. However, with the turning of the millennium and the growing chaos spurred on by the War on Terror, 2008 financial crisis, and particularly the collapse of the United States, many laughed off his theory as merely wishful thinking commonplace at the time period. However, our resistance against the forces of Russian tyranny has pushed many to give Fukuyama's theory a second glance, that perhaps under our banner we have perfected and cemented liberal democracy as the guiding ideology of Europe in the 21st century. Thus, we must embrace ourselves as the representatives of Fukuyaman thought, that we will bring about an era of liberalism that shall surpass the United States and eventually have the world united under a banner of democracy that shall not be snuffed out by the crisis we face.\n\nWe shall not, and cannot rest until everyone, regardless of where on this planet, is free from authoritarianism. Let us bring about the end of a history that sees commonplace suffering and division, start a new one that prizes beyond all else, Liberté, égalité, fraternité!"

 FAF_petainism_fascism: "Vichy Pétainism"
 FAF_classical_fascism_desc: "\n\n\n\n£GFX_FAF_petainism\n\n\n\n\n\n§YVichy Pétainism§! seeks to reconcile the collaborationist regime of Philippe Pétain's French State through its ideals, specifically the Révolution nationale. Characterized by anti-parliamentarism, personality cultism, promotion of traditional values, and state-sponsored anti-Semitism, it sees the French Republic as a corrupt failing system that embodies Charles Maurras' concept of the ''Anti-France'' which prioritizes foreign interests. Seeing support from the fringes of the French far-right, Fascist Pétainism hopes to topple the current liberal democracy they believe has ruined the beauty and ideals of pre-revolutionary France. Through the ideals of Travail, Famille, and Patrie, Fascist Pétainists will have France go through their idealized renaissance, even if she kicks and screams in the process."
 FAF_petainism_junta: "Resistant Pétainism"
 FAF_military_junta_desc: "\n\n\n\n£GFX_FAF_junta_petainism\n\n\n\n\n\n§YResistant Pétainism§! can be best described as the more cynical and moderate branch of Pétainist thought. While their attachment to the ideals of Pétain's Révolution nationale may vary, they still believe in the general anti-parliamentarian ideals of the former French State. Finding its support among France's generals, the most likely path to power would be through an utter defeat or national collapse that would allow another Chief of the French State to emerge to guide France to her former glories again, even in the face of total and utter defeat. "
 FAF_gaullism_auth_dem: "Resistant Gaullism"
 FAF_military_democracy_desc: "\n\n\n\n£GFX_FAF_resistant_gaullism\n\n\n\n\n\n§YResistant Gaullism§!, compared to the complacent and democratically aligned forms of Gaullism, believes that a military strongman is necessary to ensure the stability of the French Republic in its time of need. Finding its base within the officers and generals of the French army, the most likely way Resistant Gaullism would gain power is if the democratically elected parties of France attempted to sideline or dismiss the concerns of the Forces armées françaises. While some may claim it's a terrible dictatorship or necessary political tutelage, Resistant Gaullists will ensure that the Fifth Republic will survive through whatever means necessary."
 FAF_sovereign_democracy_desc: "\n\n\n\n£GFX_FAF_resistant_gaullism\n\n\n\n\n\n§YResistant Gaullism§!, compared to the complacent and democratically aligned forms of Gaullism, believes that a military strongman is necessary to ensure the stability of the French Republic in its time of need. Finding its base within the officers and generals of the French army, the most likely way Resistant Gaullism would gain power is if the democratically elected parties of France attempted to sideline or dismiss the concerns of the Forces armées françaises. While some may claim it's a terrible dictatorship or necessary political tutelage, Resistant Gaullists will ensure that the Fifth Republic will survive through whatever means necessary."
 FAF_gaullism_conservative: "Populist Gaullism"
 FAF_right_populism_desc: "\n\n\n\n£GFX_FAF_populist_gaullism\n\n\n\n\n\n§YPopulist Gaullism§! synthesizes the nationalism and ''peace through strength'' attitude of more traditional forms of Gaullism with the 21st-century wave of right-wing populism. While Gaullism at its core still promotes ideas such as French exceptionalism, those who follow Populist Gaullism see a reinstatement of the ideology as the coveted ''return to tradition'' that ties itself to many of the populist movements that exist in the geopolitical ''West.'' While some may claim this politicization of a pragmatic ideology is a betrayal of the core ideals of the ''Liberator of France'' the followers of Populist Gaullism will stop at nothing to ensure that from the Atlantic to the Urals, it is France that will decide the destiny of the world."
 FAF_gaullism_marlib: "Traditional Gaullism"
 FAF_civic_nationalism_desc: "\n\n\n\n£GFX_FAF_traditional_gaullism\n\n\n\n\n\n§YTraditional Gaullism§! is a subsect of Gaullist thought that emphasizes national values compared to others, seeing it as one of the essential aspects of the French identity that alongside the institutions of the Republic must be protected. Compared to Populist Gaullism, it aligns more with the classical ideals of civic nationalism to bolster the movement rather than following the new trends of right-wing populism that have become more common in the 21st century. Finding its support among France's more moderate right, they hope to ensure a world where France maintains traditional values while still containing the world's other ''hyperpowers.''"
 FRA_socialist_souverainism: "Socialist Souverainism"
 FRA_national_souverainism: "National Souverainism"
 FRA_patriotic_republicanism: "Patriotic Republicanism"
 FRA_popular_front: "Popular Front"
 FAF_camus_eurasianism: "Pan-European Nationalism"
 FAF_eurasianism_desc: "\n\n\n\n£GFX_FAF_nationalist_europeanism\n\n\n\n\n\n§YPan-European Nationalism§! splits from the general pro-European attitudes with its complete rejection of liberalism espoused by the European Union. Instead, it uses the foundation of a ''European Civilization'' comprised of white Christians with a shared history and cultural values. Stemming from the ideals of Oswald Mosley's ''Europe A Nation,'' Pan-European Nationalism remains an underlining continuous strain of thought existing within the European far right, especially as the federalization of the European Union continues. Represented by the Lambda of ancient Spartan shields, Pan-European Nationalists believe that through their unified efforts, they will be able to save their idea of Europe from the onslaught of the 21st century."
 FAF_bonapartist_thought: "Bonapartist Thought"
 FAF_vladimir_zhirinovsky_thought_desc: "\n\n\n\n£GFX_FAF_napoleonic_thought\n\n\n\n\n\n§YBonapartist Thought§! describes a synthesis of 19th century absolutist rule under a single monarch and 20th century fascist class collaborationism. To the Bonapartists of the 21st century, class conflict and struggle are responsible for the decline of the formerly grand Western societies. The remedy for this chaos can only be found under the rule of a single leader, a national patriarch who can wield the power of the state to crush the enemies of the masses. Bonapartists are also distinguished by their strong identification with the Latin peoples of Western and Southern Europe. They see themselves as the inheritors of the legacy of not only the First French Empire, given their name, but also of Rome. The most radical want for the entire Latin world to be united under a nationalist, authoritarian state."
 FAF_carolingian_fascism: "Carolingian Fascism"
 FAF_neonazism_desc: "\n\n\n\n£GFX_Ideology_carolingian_fascism\n\n\n\n\n\n§YCarolingian Fascism§! is an esoteric, rabid and eclectic form of French nationalism adopted by Lafayette and his followers. Entrenched in the roots of the National Socialist ideology, they believe that those of the 'Judeo-Germanic race' are subhumans dragging down the culture of Europe, sympathizing with Communard degeneracy and attempting to bring down the world with it. Along with this, it takes some inspiration from the ideas of Frankia, believing that a greater France that encompasses the borders of Charlemagne's Empire is required for French Lebensraum.\nMany would describe the inner workings of Lafayette's ideology as a cult, directly following his word and his vision as law. The very basis of the ideologeme is ever changing and shifting, day by day, hour by hour. The only entrenched beliefs are those of French superiority and loathing for those they consider subhumans."
 FAF_lafayette_death_cult_idea: "Cult of the Supreme Marshal"
 FAF_death_cult_desc: "\n\n\n\n£GFX_FAF_cult_of_lafayette\n\n\n\n\n\n§YCult of the Supreme Marshal§! is a cult of personality dedicated to the late Marshal of the French Army, Lafayette, who vanished during the Siege of Paris. The ideology is based on extreme nationalism and French exceptionalism, but aspects of national socialism are also prevalent. The most significant difference between Lafayette's cultism and other far-right ideologies in Europe is its anti-German rhetoric, directly inherited from Lafayette's beliefs. It seems that their hatres towards the Germans is only paralleled by their loathing for the Russians. The only issue the group faces is the lack of a true ideological guide. Due to the uncertain fate of Lafayette, the supporters of this ideology are inconclusive regarding the future of Europe and France. The only certain thing is their unwavering loyalty and faith in Lafayette."


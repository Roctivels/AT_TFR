 FRA_Jupiter_Ascendent_Category: "Jupiter Ascendant"
 FRA_Jupiter_Ascendent_Category_desc: "\n\n\n\n\n£GFX_FRA_jupiter_cat\n\n\n\n\n\n\n\nEmmanuel Macron once again leads the Great Nation of France through its most dire hour—enough with these pointless bureaucratic struggles and chaotic elections. We will show Europe and the rest of the World our superiority and triumph as we face those from inside and out who wish to destroy our Nation. We will define this era as one of our excellence and restore our former glory as one of the great Nations of not only Europe but of the World. \n\nThe dust has settled as France's political atmosphere has already started to shift as the conservative coalition ceases, and remains behind in the past; where the people of France have left them. With reforms being passed for the betterment of our Nation, France breathes a sigh of relief knowing she is in good hands. Our Great Military falls back into its place as we prepare for the challenges of tomorrow. Macron's goal is clear as our Nation strives to achieve its best possible self as well, as the best possible Europe. \n\nThe Nation of France sails off into her destiny with Macron at her Helm."

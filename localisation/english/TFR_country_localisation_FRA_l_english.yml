 FRA_bulwark_of_european_conservatism: "Bulwark of Western Conservatism"
 FRA_bulwark_of_european_conservatism_desc: "The West has long been slowly corrupted by liberal influences, controlling the media, controlling the elites, but the people have spoken with their votes here in France against that, and we have accomplished our goals in setting France on the correct path. We stand as a Bulwark of Western Values, Old Western Values. We are the inheritors of De Gaulle, of Churchill, of Adenauer, these late greats are conservative figures of parties that have long since abandoned their ideals. But we today have revived this classical conservatism in the heart of Western Civilization, and from the ramparts we will spread it outwards, from the Bulwark walls to the staging grounds and beyond. Europe will remember it's past and embrace it. It will remember a past where the economy prospered, the families were large, and the future was bright. And we will again have this."
 FRA_a_conservative_france: "Traditionalism Triumphant"
 FRA_a_conservative_france_desc: "Tradition is what makes a nation, there is no nation without its history and its religion and itself language. We know who we are, we are the French, a proud people that have been known at one point or another as the dominant people in every field. War, Science, Art, Literature. We are good at whatever we set our minds to, it is this tradition of excellence that has bred our prideful bedrock, the building blocks of French society are inherently in the achievements of our people's. Europhilliacs would have us set that aside, to blend France into being one small part of a great European whole, we are one of its greatest parts. We will never see Europe as our identity, we will only see France. The National Rally will keep the state on track, Le Pen and her allies will institute a conservative revolution in Parliament by way of securing a majority in the upcoming elections, a France steeped in tradition will be the ultimate reward for our efforts, a devout, family oriented, industrious people. We will not just promote this here, but all of Europe. All of Europe deserves to appreciate their past."
 FRA_disregard_liberalism_decision: "Disregard Liberal Allies"
 FRA_prioritize_coalition_stability: "Prioritize Coalition Unity"
 FRA_prioritize_coalition_stability_desc: "We must temper ourselves, true political domination is unlikely to last, we will not fall into the trap of a one party Republic. All parts of our Grand Nation must participate in making it great, while the National Rally will lead, everyone from Zemmour to Melenchon must be considered allies in the fight against stagnation. Keeping the coalition together ensures a stable France, rocking the boat by doubling down on our populism may only make things worse and alienate a substantial part of the population. Let us play it smart and play it fair, there's no reason to consolidate ourselves. Pluralistic democracies are how they are for good purpose."
 FRA_pluto_rises: "Pluto Ascendant"
 FRA_pluto_rises_desc: "Macron aspired to be Jupiter, he failed. This is okay, we know better now. Stephane Sejourne has guided Renaissance forward, the firebrand liberal politician has steadfastly united the center and left of politics in France against Le Pen and the National Rally. Renaissance was once thought dead, but Sejourne has truly become Pluto, the reviver of dead polls, God of the Underdog, while Sejourne is no ruler of hell like Pluto would imply he has brought France out of Hell and will deliver it unto heaven, under the guidance of Renaissance and it's allies, Pluto is ascending to the Presidency. In the face of crisis we shall not retreat like Monsieur Jupiter, a smiling and personable face in the media and on the ground is the man Sejourne must be. An active president, not some mysterious man in the high tower making things happen with few words."
 FRA_demand_snap_elections_liberal: "Demand Snap Elections"
 FRA_demand_snap_elections_liberal_desc: "We have done all we can under the guidance of Stephane Sejourne, a young face, younger than even Macron, has become popular. More and more on the streets call for snap elections. Our efforts have mired Le Pen's presidency in controversy and stagnation, we have a chance to take office back from the National Rally and maneuver France onto the right path before it is too late. All we must do is pull the trigger and demand to let the people speak."
 FRA_capitalize_on_conservative_blunders: "Capitalize on Blunders"
 FRA_capitalize_on_conservative_blunders_desc: "Our control of the media cannot be understated, EU funded and foreign news is on our side and with our domestic media apparatus, we can highlight every National Rally blunder and drag it out for weeks on end. Every trivial tragedy will be relentlessly dissected, every misstep, misspoken word, criticized. We will make up health scares over a simple stammer or limp, it is predatory and to some unpopular but he who controls the media controls public opinion, and Le Pen has done a pitiful job at swaying our Media Magnates, Mr. Sejourne however, the fresh faced young man, is a riot for ratings and a picturesque figure for a Renovated Renaissance."
 FRA_the_golden_lambda: "The Golden Lambda"
 FRA_the_golden_lambda_desc: "Oh the Identitarians, they are visionaries indeed. French nationalism in the modern age is...short sighted, even Bardella must acquiese. In the age of Napoleon where 1 in 5 Europeans were French we had the population to call ourselves a power all to our own, in a world where nations number billions of people and hundreds of millions we are a drop in the European puddle, smaller than the Turks, than the Germans. But we are not just French we are the sons of Rome, sons of the Latins. From Wallonia to Dacia, from Lisbon to Syracuse, the Latin Race is still a strong and numerous force, together we are 150 million, we are our own power again, the vision of a future where Latins can be one again led by France is not entirely insane, Napoleon tried to rebirth Francia from the ashes to do just that, and the modern European Union has brought Spain and Italy closer to us than ever before. While we despise Macron and his Brides in Brussels, we see the value in Europe banding together, and by embracing the Golden Lambda of the Identitarians, we can look forward to a future where perhaps the Latins are United, even if Europe will be forever divided among itself. No more brother wars, we shall have unity of Latins against all others."
 FRA_rabid_anti_slavicism: "Fight the Slavic Hordes"
 FRA_rabid_anti_slavicism_desc: "The damned Slavs are an affront to our values, even while they claim to embrace them. Every Slavic democracy of Orthodox faith has fallen into corruption or anocratic Autocracy, there is no Liberté, no Egalité, not even any Fraternité. Yeltsin was a decadent drunk, Putin was a smiling snake, and his successor Medvedev a rabid lapdog biting furiously at the west. Whatever his fate, All Russians are the same. Traitors since the Continental System playing both sides, traitors in World War Two, traitors in every dealing we've had with them. To not just fight but finish the issue of a Russian Power. No future exists for us in a world where Russia is playing Ghengis with it's neighbors. So let us play Napoleon."
 FRA_rabid_anti_liberalism: "Rabid Anti-Liberalism"
 FRA_rabid_anti_liberalism_desc: "We have framed the Left, framed the Russians, everything is in place. We have found our scapegoat. A page from history was taken and copied, the orchestral notes played in beautiful symphony. The rattling of machine gun fire from Russian made AK12s tear into five different groups in five different places, a surgical incision made to cut the Liberals from the ruling Cabinet, the Leftists conveniently spared to enhance the ruse, music is an arrangement of sounds organized, this has been a Bardellan masterpiece. From the National Rally headquarters you can faintly hear the bodies hit the pavement. Our opposition is afraid, Macron's cabinet is now dead, what remains are leftists or those loyal to us, Bardella is preparing his speech to call the massacre a horrible tragedy, in truth? It is our final stanza. The conclusion to our great play. No one will accept the request to form a government with Macron, no one but us, we will make sure of it. We will give him the majority he needs, a savior in a time of leftist terror and Russian involvement...until we remove him next election."
 FRA_socialism_with_french_characteristics: "Socialism with French Characteristics"
 FRA_socialism_with_french_characteristics_desc: "After a centuries long battle - starting from 1789, and finally ending today, there is a government in France that is truly for her people. There is a system that gives them power, that gives them true freedom, and gives them a happy, good life. After her struggle against authoritarianism and the right, France, in her Sixth Republic, is truly free.\n\nC'est pour de bon!"
 FRA_invite_apla_military_advisors: "Invite American Advisors"
 FRA_invite_apla_military_advisors_desc: "While it would be an incredibly controversial and criticized decision, the American Civil War and ending it is a critical goal for France, and NATO as a whole. Naturally, the closest ones to our goals of a free and democratic socialism are the American People's Liberation Army, even if there are certain factions against it within them. We will allow the transfer of advisors from country to country, and recognize them as the legitimate American government."
 FRA_detente_with_PRC: "Eastern Detente"
 FRA_detente_with_PRC_desc: "Part of our current weak state is our shunning of the People's Republic of China. As seen in the collapse of the Americas, and the sudden economic collapse of NATO as a whole afterwards, we must look warmly towards the east if we wish to become a sustainable and powerful nation. Aside from that, they are our brothers in the fight for the People; there is no need to continue antagonizing the One China."
 FRA_french_military_hegemony: "French Military Hegemony"
 FRA_french_military_hegemony_desc: "De Villers has thoroughly revived the military rule of France, the army is larger than it has been in fifty years, the people stand behind it, the industry serves the needs of the state and especially the army, we are geared up for war in a time of peace because we wisely know what is coming. Europe are our friends, our ideological partners, our army is bound to defend not just France, but the steadfast Poles, the hardy Balts, the raving Romanians, it is our duty and our privilege to be the Armed Forces of the Free World. France can truly say it is the Hegemon, a military of such superiority in numbers, size, and equipment, that military analysts will watch us in action in every nation on every continent for the next century, the God of War lives in Paris today, may there be woe for our enemies and glee for our friends."
 FRA_skewer_the_bear: "Skewer the Bear"
 FRA_skewer_the_bear_desc: "Russia is a beast, a bear in hibernation, but look at it grow thick with fat as we wait dimly for it to awake and swallow us whole. Other nations may be afraid of themselves but the French are proud of our past. If Europe won't turn itself to face Russia then France alone will take up the spear and make a new rug for the Presidential Palace. We have made preparations, but we can make more. Levy the Press, Levy the Media, show France what kind of people we face, drunken and witless freedom hating people content to lie beneath a Tsar in red wrapping or not, so long as one man holds the reins tightly. Holding oil over our heads like depriving a prisoner of water."
 FRA_neo_imperialism: "The Imperial Presidency"
 FRA_neo_imperialism_desc: "So long have we lost our glory and been mocked that we almost entirely lost our way. Even Le Pen caved in and betrayed the army, were it not for De Villers? We would have degraded further, any vestiges of Empire we had left would have been fed to the dogs. We are the protector of Europe, of France, and of West Africa, we are the Sword of the Free, the Shield of Liberty, and under De Villers we are again a power capable of going abroad, intervening on our own terms, we are not an Empire but we are a Presidency, and our President is a national hero."
 FRA_jupiter_rising: "Glory of Jupiter"
 FRA_jupiter_rising_desc: "Greatness is in the grasp of our hands and we have worked to ensure our destiny over the past years. It becomes apparent that for our destiny to be achieved and for us to be victors in the upcoming perils of the future that a strong France will not be enough. Macron has proven time and time again that not only what France needs, but Europe is a strong leader, and one who isn't afraid of the political institutions, the media, or the bureaucracy and who is ready to fight for us. Macron has triumphantly led France down the path of reform and progress with the results yielding overwhelming strength and benefits no thanks to the bureaucracy and agitators who wish to see our greatness ended.\n\nMacron will show Europe and the rest of the World the superiority of the French nation as well as its ability to assist its neighbors and allies across the seas. Macron will show the Russian menace that they cannot bully and trample over Europe as they once have. Macron will sure of what strength and power is that Europe has needed since the likes of de Gaulle and Napoleon and he will carve out his own legacy that mirrors these great men.\n\nWe will not let them steal our greatness."
 FRA_absorb_volt: "Absorb Volt"
 FRA_absorb_volt_desc: "Integrating the Volt Europa party into our government will ensure that our government not only stays strong and unified but ensures that the European Union does the same as us. We can use Volt to push for the further federalization of the European continent while also strengthening our ties to Brussels. France will showcase the strengths and opportunities a united Europe can bring to the people of the continent and across the globe."
 FRA_reaffirm_our_majority: "Reaffirm our Majority"
 FRA_reaffirm_our_majority_desc: "With the coalition yielding great success we have finally achieved a decisive coalition dedicated to the betterment of the French people. While the liberals and conservatives engage in proper dialogue and cooperation it becomes evident that the radicals and extremists would rather not. We will use this newfound power to push centrist policymaking and decisive reforms for a strong France; making sure we stay strong in the face of the Russian menace and ensure the far left and right have no place within our government."
 FRA_clash_of_civilizations: "The Clash of Civilizations"
 FRA_clash_of_civilizations_desc: "Europe and the East, France has since the days of Baldwin understood its place as a mighty crusader state, standing against the Saracen and the Eastern hordes. We have all felt the tightening of the noose around our necks, the Muslim invasion of our homes came when the gates were thrown open by Liberal traitors sat in their Brussels towers. We have closed these gates finally and at the gates we see only barbarism beyond them. The Eastern threat in Moscow has embraced these Islamic fundamentalists to their ends, using Belarus to funnel migrants into Poland en masse from Wild Syria, we saw the last wave and what they did, bringing rape to our suburbs and crime to the alleys. Islam is an incompatible religion and culture with France and indeed with Europe, the coming conflicts in Africa, the Middle East, and indeed in Eastern Europe, will require us to steel ourselves for the coming tide, a Great Struggle exists for our people and our culture, a struggle against the Moscow Mongols and the Muslim Hordes, should we secure lasting victory we will look to a bright future steeped in tradition, European dominance firmly entrenched."
 FRA_the_camus_bloc: "Embrace the Camus Bloc"
 FRA_the_camus_bloc_desc: "Renaud Camus is an old guard identitarian, a long time ideological thinker, in the 80's he was a socialist but today? He was leader of the French Identitarian movement before its wrongful banning under the Macron government. Camus wrote the book on The Great Replacement quite literally, but unlike many he is unconcerned with antisemitism, he is openly gay, and yet still remains the head of a far right movement. Many among the Jewish right even among the more moderate National Rally have defended Camus' theories in the past, and it's with great pleasure that Eric Zemmour invites Camus to form his party again to join the ruling coalition, he and his friends are Anti-democrats, while we won't go so far as to halt democracy, we will use their support to drag in votes from the sort of people who typically avoid elections ''on principle''."
 FRA_emulate_the_trump_doctrine: "French Trumpism"
 FRA_emulate_the_trump_doctrine_desc: "Donald J. Trump, some blame him for the collapse of America, Zemmour sees him as a tragic savior that came too late. Like Zemmour he accepts that America is being flooded and wishes to turn off the spigot of immigration, you do not have to be racist to wish to preserve yourself, why is it wrong to wish for immigrants to prosper...just back at their homes? Trumpism is defined by anti immigration, pro business legislation, civic nationalism, Big Stick Diplomacy, and militaristic isolation. France can co-opt all of these ideas to their use and luckily, Zemmours attempt to implement them won't cause a national collapse! We will Make France Great Again!"


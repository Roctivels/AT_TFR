 FRA_mass_migration_idea: "Mass Migration"
 FRA_mass_migration_idea_desc: "\n\n\n\n£GFX_FRA_mass_migration_banner\n\n\n\n\n\nSince 1973, France's immigration policy has focused on limiting migration, but in 2019, over 120,000 asylum applications sparked significant political division. Amid economic slowdown and high unemployment, the immigration debate has become a heated issue.\nThe right, fueled by fears of migration's impact on French identity and security, advocates for stronger borders and anti-immigrant rhetoric. Nationalist parties call for closed borders to halt the influx.\nAs the debate grows more contentious, French society is becoming increasingly polarized. With rising numbers of refugees from North Africa and the Middle East, the economic strain is escalating. A decisive immigration policy will soon be unavoidable."
 FRA_mali_intervention: "Mali Intervention"
 FRA_Civilian_Oil_Rations: "Civilian Oil Rationing"
 FRA_Civilian_Oil_Rations_desc: "While France has managed to get through the short-term effects of the Saudi-Arabian Civil War it becomes evident we are running out of time. The government has declared a National Mandated civilian oil rationing, similar to that of the United States government during the seventy's OPEC embargo and the Iranian Revolution. With these mandated rationing we will attempt to maintain a reasonable price on the oil available to the civilian populace."

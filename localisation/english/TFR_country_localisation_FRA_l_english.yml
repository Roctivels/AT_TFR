 FAF_heirs_of_charlamagne_cat: "Heirs of Charlemagne"
 FAF_heirs_of_charlamagne_cat_desc: "\n\n\n\n\n£GFX_FAF_monarchism_cat\n\n\n\n\n\n\n\nFor a millenia, the Capetian dynasty ruled with honor and civility over the lands of France, defining what it meant to be a European power and defending her honor when the perfidious albion or the wretched Hapsburgs attempted to wipe our nation from God's Earth. But time and time again, our King, backed with the divine permission of God, defended our nation. But eventually that changed. \nThrough our aid of the American Revolutionaries, their cancerous ideals of Republicanism spread into the France, swiftly toppling our monarchy in our time of need. 200 years later, standing tall after our defeat at the hands of Russia, we can see what a world under the rule of the ''every-man'' leads to... America is in ruins, the Socialist plague has swept across Eastern Europe, nearly dooming our beloved France to Red Tyranny. \n\nWe shall fight tooth and nail against the destabilizing forces that aim to overthrow our God-appointed Monarch. \n\nVIVE LA FRANCE! VIVE LE ROI LOUIS XX!"
 FAF_growing_republican_army_corps_mission: "The Everlasting Flame"
 FAF_growing_republican_army_corps_mission_desc: "\n\n\n\n\n£GFX_FRA_french_spirit\n\n\n\n\n\n\n\nIn a drab echo of our past, there exists a Republican Cliqué in our Armee. Hellbent on tearing down not just the King, but the rights of the Church as well. 1793 cannot come to pass again."
 FAF_royal_house_squabbles_mission: "Royal Squabbles"
 FAF_royal_house_squabbles_mission_desc: "\n\n\n\n\n£GFX_FAF_royal_squabbles\n\n\n\n\n\n\n\nThe question of who has the divine right to rule France should not be up for question, but it is, and so until we secure our rule, we have to deal with childish bickering harming our ability to govern."
 FAF_nobility_cost_mission: "The Cost of Stability"
 FAF_nobility_cost_mission_desc: "\n\n\n\n\n£GFX_FAF_nobility\n\n\n\n\n\n\n\nNoble infighting threatens our regime, but the Nobles are like any elite class in any nation, money keeps them happy and happy elites make for a happy nation, call it greed, they are landholders by ancient and divine rights, rights we would do well to respect so they respect our own."
 FAF_Grant_Refuge_to_HRM: "Familial Refuge"
 FAF_Grant_Refuge_to_HRM_desc: "\n\n\n\n\n£GFX_FAF_spanish_royalty\n\n\n\n\n\n\n\nOur family in Spain, the rightful Bourbon rulers of our southern neighbor, are under siege from all manner of adversaries, Anarchists, Secessionists, Nationalists, Republicans. It would be wrong to leave them to a Guillotine, we Bourbons have had too many encounters with that horrible contraption."
 FAF_use_wealthy_connections_decision: "Use Wealthy Connections"
 FAF_use_wealthy_connections_decision_desc: "Our ties to the French elite mean we have the unique benefit of pulling in favors to help out our national projects. At the cost of owing a noble a favor, we can expand our production for a time, a worthwhile trade."
 FAF_pay_for_the_arts_decision: "Patronage of the Arts"
 FAF_pay_for_the_arts_decision_desc: "\n\n\n\n\n£GFX_FAF_patronage_of_the_arts\n\n\n\n\n\n\n\nThe arts are always the heart of soul of a nation, shaping culture, the Classical and Renaissance periods are seen as some of the golden ages of art and of course that is due to the wide support of monarchies abroad to it's development. Let France again become a center of great art, let us fund new masterpieces."
 FAF_beautify_the_countryside_decision: "Beautify the Countryside"
 FAF_beautify_the_countryside_decision_desc: "Our nation is beautiful! \nOur roads are beautiful! \nOur towns are beautiful! \nOur skylines are beautiful!"
 FAF_man_of_god_decision: "Man of God"
 FAF_man_of_god_decision_desc: "\n\n\n\n\n£GFX_FAF_man_of_god\n\n\n\n\n\n\n\nThe King is a pious ruler, as pious as he is pragmatic and benevolent, guided as much by God as he is by the good of the people. He is a man, imperfect, but eternally grateful for the forgiveness of God, as all should be."
 FAF_divine_right_to_rule_decision: "The Divine Right"
 FAF_divine_right_to_rule_decision_desc: "\n\n\n\n\n£GFX_FAF_divine_right_to_rule\n\n\n\n\n\n\n\nAfter much deliberation we have come out on top in the hearts and minds of the people and the nobility, the House of Bourbon, rightful successors of House Valois, will again raise the banner of Holy France. Vive le Roi!"
 FAF_divine_right_tt: "§YThis will §!§RRemove the Threat of the Opposing Dynasties§!"
 FAF_replace_possible_republicans_decision: "Launch Army Investigation"
 FAF_replace_possible_republicans_decision_desc: "\n\n\n\n\n£GFX_FAF_lecointre\n\n\n\n\n\n\n\nThe Army is full of detractors, athiests, Republicans and Socialists, we will cut the cancer loose at the core and in time the wound will heal back stronger."
 FAF_sway_the_nobility_decision: "Sway the Nobility"
 FAF_sway_the_nobility_decision_desc: "Simply holding the divine right is not enough for the Nobility, divinity is a different thing for dukes and counts and patricians, if the Orleanists and Bonapartists offer them a better deal, suddenly they are divine due to their ''Benevolence'', well, we must be just as ''Benevolent'' if we are to secure our rule."
 FAF_ancien_regime_dynamic: "Ancien Régime"
 FAF_ancien_regime_dynamic_desc: "\n\n\n\n\n£GFX_FAF_ancien_regime\n\n\n\n\n\n\n\nWe rule by divine right, and yet we rule over millions of souls who all have their own wishes and needs, the modern Ancien Régime will not repeat the mistakes of the last, but in the same manner, the sovereign will remain unconstrained, answering only to God, with the welfare of France entirely entrusted to the divine will of our sovereign. Vive le Roi!"

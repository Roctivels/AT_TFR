 FRA_Interventionist_Fervor: "Empowered Warhawks"
 FRA_Interventionist_Fervor_desc: "North America has descended into chaos and anarchy, a state of death and destruction not seen in modern history. This mess has shaken our political establishment enough to the point of evaporating decades-long precedents. Almost overnight there has been a shift in stance of the state and in personnel, a change unprecedented even on its own. In each and every government office, the doves have been silenced, and the hawks have taken their place. They all see the burning world around us and demand what has already been on everyone’s mind. If we need to act to keep peace and security in Europe and abroad…\n\nThen we will do what we must."

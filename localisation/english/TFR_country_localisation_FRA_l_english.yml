 FRA_Caribbean_Occupation_Auth_tt: "We shall establish an Occupational Authority in the Caribbean."
 FRA_Corrupted_Presidential_Guard_tt: "Anyone can be bought for a price, even the 'incorruptible' men of the Republican Guard. A greased palm here, promises of promotion there. They will be brought on side or at the least be made to §Rlook the other way...§!"
 FRA_seize_movement_warning_tt: "§RThe movement will be co-opted by this wing of the party.§!"

 FRA_Recoup_our_Losses: "Recoup Our Losses"
 FRA_Recoup_our_Losses_desc: "Macron's rule over France went down as a one term disaster, in just a five year span he went from open, smiling, and charismatic, to trying to become his 'Jupiterian Ideal', the ideal of the President being a supreme authority. Had it been anyone else maybe it could have been accomplished. Renaissance was on the cusp of commanding a comfortable majority in Parliament, but it simply was not meant to be."
 FRA_Embrace_the_New_Left: "Embrace The New Left"
 FRA_Embrace_the_New_Left_desc: "Renaissance once stood as one third of the political axis, a pole to its own between the populist right and the left, but Renaissance will not survive without friends. Melenchon's efforts to whip up the Left into the modern era have borne fruit and the only way to counter Le Pen is if we work together and keep a whip snapping above our own party, Melenchon may be an adversary but he is one that shares many policies with us and many interests, A coalition against Le Pen will help us both in the coming years."
 FRA_Battle_Every_Legislation: "Battle Conservative Legislation"
 FRA_Battle_Every_Legislation_desc: "Ils Ne Passeront Pas, They shall not pass. A phrase often associated with the battle of Verdun. In arm lock today with the French Left we look at Le Pen and say Ils Ne Passeront Pas once again, the National Rally will curtail all we have worked to achieve, all the progress the center and left have made for workers rights, for social justice. Every new piece of legislation is an attack on the work of our predecessors for decades back in a struggle that has gone over four decades against the rights slowly growing grip on power."
 FRA_Investigate_Electoral_Integrity: "Investigate Electoral Integrity"
 FRA_Investigate_Electoral_Integrity_desc: "We expected losses due to the Oil Crisis and due to COVID, but the polls said we were to win by several points, something smells in Paris and we will begin the necessary functions nationwide, at a national and local level, leveraging the judiciary to the fullest extent, in an effort to investigate National Rally fraud. They will say it isn't real and that it is a witch hunt, but real or fake, these investigations will divide public opinion and drag support away from Le Pen and her cronies, if we simply push the allegations enough they will become fact in the public eye. All that is needed is a seed of doubt."
 FRA_Take_A_Stance_on_Federalization: "New Stance On Federalization"
 FRA_Take_A_Stance_on_Federalization_desc: "Macron was one of the most vocal proponents of European Federalization, proposing an integrated army and more common integration of law, economics, and even policing. We can choose to follow this vain by choosing the right coalition partners, or we can go against it. It is true that Le Pen's victory showcases a shift in politics, becoming Eurosceptic may help us in the polls. Putting the Republic before our neighbors is surely a popular decision, Macron never could see that, but even if we can accept it as a popular position we do not have to forsake Europe. We can remain Pro EU should we choose. We really do sit at a crossroads between two paths, a European or a French future, the choice is ours."
 FRA_Uphold_Republican_Beliefs: "Uphold Republican Ideals"
 FRA_Uphold_Republican_Beliefs_desc: "Liberté, Egalité, Fraternitié. The foundation of our great Republic, through Five Republics, Two Kingdoms, and Two Empires, we have not lost these ideals. But we may eventually lose them if we do not safeguard them. From within our own ranks lie the insidious clique of traditionalists, conservatives, barely two steps up from the Bourbon. The Revolution is something that must be defended and no one knows this better than the French, god knows we have felt their wrath in Yellow Vests more than once.\n\nOpposing Le Pen is as simple as pointing out their policies as anti Republican, our very base ideals call from Egalitarianism and Freedom, she would lockdown on protesters and put the French before anyone else, even if it means alienating minority populations. The French Republic was never founded on the ideals of unquenchable nationalism and unfettered xenophobia, in our earliest days we even tried to tear away from the Church, and while that platform wasn't so popular, it doesn't mean we should tear up the works of 1793 to create some new, neutered society, secure yet too afraid to critique the government."

 FRA_A_Denied_Destiny: "Our Denied Destiny"
 FRA_A_Denied_Destiny_desc: "Le Pen failed, her reformism lost us the election, we were never popular for being center right moderates, we were the party of action and strength! Le Pens resignation is the best thing she has done in many years. The party now is under the direction of Bardella, we were denied a mandate by the people by the liberal status quo of Macron and his Jupiterian cronies, he is not De Gaulle, he is not a mysterious man in an ivory castle, he is a laughing jackal serving Brussels and we will not lay back and let it happen, Macron will watch us unravel his precious web of businessmen and military yesmen, his allies will recede out of fear."
 FRA_Reintegrate_Radical_Forces: "Reintegrate Radical Forces"
 FRA_Reintegrate_Radical_Forces_desc: "It was the reforms of the National Rally that led to the rights splintering, the Identitarians, the Reconquéte of Zemmour. Had we banded together in the last election we would have held a majority. With Bardella in control the party of the Father is back and the party of the Daughter is dead. Radicals will return to our embrace and together in solidarity we will stand and be heard. Vive la France!"
 FRA_Meet_with_Disgraced_Militarists: "Meet With Disgraced Militarists"
 FRA_Meet_with_Disgraced_Militarists_desc: "The military pulled a Martin Luther before the last election, nailing demands to government doors across Paris, military units moved into the peripherié, it felt to Macron and to the nation as perhaps a coup may occur but it was only pressure, Macron fled and stood firm against the military demands, Le Pen offered her token support and then failed to deliver a victory. The Military has been distraught over the victory of Renaissance and the continued weakening of Frances army all while the Brutish Orcs rally their men in the east, ready to trample the west in the chaotic vacuum left by America. Bardella and the Military possess a similar will, the will to commit the extralegal to secure the future of France, we can promise their demands - and more."
 FRA_Entangle_Electoral_Victory: "Sabotage Liberal Academia"
 FRA_Entangle_Electoral_Victory_desc: "The Liberal Elites are the status quo today for a reason, they control the schooling. Like the Marxists once did some time ago in the glory days of the Popular Front. If you control the school you control the pupils and you teach them right and wrong, you teach them to be quiet or you teach them to be loud, you point them against who you wish to suppress and they do the rest, they raise their kids in the same indoctrination, and their kids kids and so on and so forth. The Elite Academia of France are rotten and despoiling left wing globalists unconcerned with the well-being of France and her people before the interests of some timbukfuque village across the planet. How many were killed? How many businesses and lives ruined? In protests that their education has incited? No more, disrupt their activities however we can, send masked men in the night to rough them up in their houses, call in bomb threats, and blame all of it on Russian agitators and Leftist revolutionaries, We'll take the riots they incite into their homes and they will be quiet. They may even join us out of fear."
 FRA_The_Right_Way: "The Right Way"
 FRA_The_Right_Way_desc: "The Right Way is the Right Way, what does the left bring? Inflation? Heightened taxes? More welfare for less benefit as hordes of Muslims draw the output of your labor? Call Renaissance Center if you like, Renaissance is in bed with Brussels and given the chance would sell the whole nation for a real chance at Federalizing Europe. The demise of France is not just a conspiracy theory, it is a campaign policy of and a long term strategic goal of the Liberals. It is only Bardella and the National Rally who can deliver France from the leftist agenda, only the National Rally can lower your taxes, put benefits in your pocket, and send the Moors to drown on the raft they floated in on. Vote for your local National Rally representative and ask your local branch how you can volunteer to aid the party, if you're here about our armed wing? Lower your voice and follow me."
 FRA_Stoke_Russian_Fears: "Stoke Fears of Russian Domination"
 FRA_Stoke_Russian_Fears_desc: "The Russians have always been the enemy of Europe! Treacherous! Slavic! Barely better than a Mongol Horde. The Backwards Empire failed us, they made deals with Germany and in not even 20 years they were buddy-buddy with the Germans while smiling at us, the Yalta Conference may as well have meant shit paper to the Georgian Dog, the last time an agreement with the Russians was honored predates recorded history because we do not have a record of it. If you think they'll honor their agreements now? You are a fool, a Russian bot, or a godless Commie nostalgic for your motherland. Quit lying to yourself France! You will be skewered on Kremlin Pyres if you do not wake up to the hard new world we live in today!"

 FRA_Operation_Saint_Arnaud: "§YOpération§!: Davout"
 FRA_Operation_Saint_Arnaud_desc: "The Russians have been caught off guard by our sudden intervention in Ukraine's defense, but have not stopped. Both from news from the front and intelligence reports, rather than stop and assess the situation, the Russians have doubled down and poured more resources into the Ukrainian thrust. Despite concerns over Ukraine's ability to weather the storm, the circumstances present a potentially golden opportunity. With Russian attention fully on Ukraine and attemps to organize a line that is now sixteen-hundred kilometers, they have strained their resources heavily. This has created the conditions for a daring naval landing behind Russian lines in the Kuban region. This bridgehead would further strain Russia's manpower and already stretched logistical resources, and perhaps force them to put offensive operations to a halt, enabling us to organize further large-scale counterattacks while the bear is off balance. Success would cement us as a leading player, failure is not an option for the fate of Europe and the honor of France is at stake."
 FRA_Operation_Davout_decision: "§YOpération§!: Davout"
 FRA_NATO_war_category: "The European War"
 FRA_NATO_war_category_desc: "\n\n\n\n\n£GFX_SOV_NATO_war_category\n\n\n\n\n\n\n\nThe Russians once more attempt to march into Europe to carve out their own empire... It is on us alone to stop them.\n\n§RPRIMARY TARGETS§!:\n\n§YSEVASTOPOL§!: [GLOBAL.get_sevastopol_nato_status]\n§YMINSK§!: [GLOBAL.get_minsk_nato_status]\n§YST PETERESBURG§!: [GLOBAL.get_petersburg_nato_status]\n§YROSTOV-ON-DON§!: [GLOBAL.get_rostov_nato_status]\n\n§RSECONDARY TARGETS§!\n\n§YKALININGRAD§!: [GLOBAL.get_kaliningrad_nato_status]\n§YBELGOROD§!: [GLOBAL.get_belgorod_nato_status]\n§YVOLGOGRAD§!: [GLOBAL.get_volgograd_nato_status]\n§YNOVGOROD§!: [GLOBAL.get_novgorod_nato_status]\n§YDONETSK§!: [GLOBAL.get_donetsk_nato_status]\n§YLUHANSK§!: [GLOBAL.get_luhansk_nato_status]\n\n§GALLIED CITIES§!\n\n§YKYIV§!: [GLOBAL.get_kiev_nato_status]\n§YODESSA§!: [GLOBAL.get_odessa_nato_status]\n§YTALLINN§!: [GLOBAL.get_tallinn_nato_status]\n§YVILNIUS§!: [GLOBAL.get_vilnius_nato_status]\n§YWARSAW§!: [GLOBAL.get_warsaw_nato_status]\n§YBUDAPEST§!: [GLOBAL.get_budapest_nato_status]\n§YBUCHAREST§!: [GLOBAL.get_bucharest_nato_status] \n\n§YOPÉRATION DAVOUT§!: \n§5KERCH§!: [GLOBAL.get_kerch_nato_status] \n§5NOVOROSSIYSK§!: [GLOBAL.get_novorossiysk_nato_status] \n§5SOCHI§!: [GLOBAL.get_sochi_nato_status]"
 FRA_davout_success_idea: "Success in the Caucasus"
 FRA_davout_success_flag: "§YOpération§!: Davout is successful"
 FRA_failed_operation_davout: "We have failed §YOpération§!: Davout"

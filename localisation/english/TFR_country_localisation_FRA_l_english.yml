 FPR_Ideolize_the_Permanent_Revolution: "Idolize the Permanent Revolution"
 FPR_Ideolize_the_Permanent_Revolution_desc: "The proletariat of France is free! Our workers are free! But our goal for total liberation of the workers does not end here. As Marx said: "Workers of the world, unite!" This does not mean solely the workers of France, or Europe, by evidently the entire world belongs to the proletariat and the working class. Everyday we work towards a goal of a world free of wage-slavery, of the destructive nature of capitalism, to the lords that rule over the worker like feudal kings and queens. We devote our lives to the true words of Marx and we will spread freedom to the workers and to the oppressed people of the world as a whole."
 FPR_Ensure_Revolutionary_successes: "Foment Revolution Abroad"
 FPR_Ensure_Revolutionary_successes_desc: "Our permanent revolution begins with the workers of France, from the arms factories, to the battles abroad - our workers pump out the needed materials for all the hands of every worker in the world who wants to take arms and fight their oppressors. By sending our best advisors, our guns, we fight against the global capitalist order and send a frightful message to oppressors, we stand tall and defiant in the face of adversary. No more, let the workers of the world fight for their freedom."
 FPR_The_Global_Class_Struggle: "The Fifth International"
 FPR_The_Global_Class_Struggle_desc: "In the grand and noble effort to bring freedom to the oppressed workers around the world we have solidified our position on the world stage as we create the official Fifth International, a proper and legitimate successor to its predecessor, The Fourth International. This supranational organization will not only be to a diplomatic corps of men and women to deal in great lengths of diplomacy as a new and improved France has come. The Fifth International is also, to a certain degree, a military organization with the workers of the world in mind, a formal intuition for those to come asking for aid for the benefit of their local cause. From the continent of Europe to the people of South America and Africa, we exist to uphold the ideas of Marx and effectively spread across the world, like a plague for the capitalists to fear and shy from."
 FPR_Champion_Proletariat_Internationalism: "Champion Proletariat Internationalism"
 FPR_Champion_Proletariat_Internationalism_desc: "The proletariat is someone who does not belong to any national identity, racial background, or religious affiliation. The people of the world who toil for their living belong to themselves, as a people who have always existed and will continue to exist - the worker is a permanent veritable to the world. It is this that makes us different from all other nations in the world, while yes we are the French workers, we belong to the people, to those who are oppressed in the world to the capitalist system of slavery. We will set ourselves free or die trying our best, we must because it is the correct and just thing to do. All men must die, but we can choose the significance of our death, we chose to carry the torch of Marxism to our graves."
 FPR_NSB_idea: "National Security Bureau"
 FPR_Block_Deformation: "Defense against Deformation"
 FPR_Block_Deformation_desc: "In the current political landscape, most so-called Communist states that survived beyond the 90s are nothing but deformed worker states. Can the Chinese claim to be communists when running one of the largest market economies in history? Even the once-beloved Soviet Union fell into deformation under the terror of Stalin and his bastardization of Marxist-Leninism. With our control over the French government secured, we must do everything to ensure that our beloved revolution does not suffer from deformation. Clear ideological standards, paired with the cracking down of exceptions even under the guise of material conditions or whatever excuse our fifth column can try against us, will ensure that France can finally achieve its destiny to be the first undeformed Marxist state!"
 FPR_The_Socialist_Culture: "Socialism of the Future"
 FPR_The_Socialist_Culture_desc: "After decades of capitalist realism and the propaganda that bolstered it, many are concerned with our revolution as they see it through the lens of a failed Soviet past as a reference. Simply put, we must ensure that this is not the case. What the proletariat of France must know is that we stand for a 21st-century Socialism, one that takes into account the needs and technology of current issues. Also, prioritizing an element of futurist thinking is our best bet in ensuring that the dismissal of past faux-Marxist experiments and that the proletariat of France will see our socialism as a movement to lead us to a utopian future rather than a dystopian past."
 FPR_Long_Live_the_Workers_Revolution: "Long Live the Workers Revolution"
 FPR_Long_Live_the_Workers_Revolution_desc: "Simply put, our doctrine of permanent revolution must be instituted at home and abroad if we wish to bear the Trotskyite banner. Whether through the economic and cultural revolutions that seek to tear down the oppressive capitalist structures that have chained France for centuries or preparing to liberate the proletarians of Europe and elsewhere, we must always stand for revolutionary causes wherever we can find them. Even if the forces of Fascism and International Capitalism come crashing down on us, till the bitter end, France shall scream out...\n\nLong live the Workers Revolution!"
 FPR_Socialist_Democracy: "Party Democracy"
 FPR_Socialist_Democracy_desc: "As we transform the government of France away from the failures of liberal-bourgeois tyranny, we have faced many accusations of being "anti-democratic" in the process. What these well-intentioned lumpenproletariat fail to realize, however, is that we plan to replace the former failures of liberal democracy with Democratic Centralism, best described as party democracy! No more will the elected members of parliament busy themselves with fruitless arguments that only leave the people suffering without a voice in power; instead, each party member will have their role to play in ensuring the decisions we make follow the principles of workers' democracy. Of course, some of the reactionary class bemoan this supposed suppression of political freedom. However, by implementing democratic centralism, we can still ensure we can address necessary complaints against the government. These complaints allow for essential self-criticism while preventing the deadlock that doomed the former Sixth Republic to its grave, leaving it vulnerable as the Russian imperialists conquered Eastern Europe."
 FPR_Coalition_the_Against_Fascism: "Coalition against Fascism"
 FPR_Coalition_the_Against_Fascism_desc: "While we seek to ensure internal contradictions do not topple the revolution from the inside, we must also not fall into the trappings of infighting that have dominated leftist circles since immemorial. With the other like-minded leftist parties that helped ensure our rise to power, we must form an intersectional united front against the forces of reaction. This show of unity, regardless of ideology, not only allows us to mitigate any claims of political oppression but can show those who seek to topple our worker-led governance of France that it shall not be an easy task and that we will not rest until the red flag is the banner of the human race!"
 FPR_Liberate_the_Balkans: "Liberate the Balkans"
 FPR_Liberate_the_Balkans_desc: "The Balkans, a peninsula once graced by many socialist regimes, has now fallen into bitter infighting and the vices of capitalism. While some believe that an invasion only represents a sort of "red imperialism" that merely acts to force our will against the people of these Balkan countries, the truth is that we are saving them from themselves. We must embark on a great crusade to save the nations of the Balkans from the forces of capitalist reaction and Russian imperialism and ensure that when the time comes to fight against those Eurasian imperialists, we have the upper hand on that front."
 FPR_Cybertrot: "CyberTrot"
 FPR_Cybertrot_desc: "Cybernetic socialism, or the idea that automated systems can assist with managing planned economies, has been an underlying current in contemporary socialist thought. Experiments such as CyberSyn in Chile or the ill-fated OGAS in the Soviet Union sadly never had the resources to get off the ground and see their implementation in trying to tackle the main issues that plague command economies, particularly the rise of oligarchs and corruption as a whole. With this in mind, we have assembled the best and brightest minds in France to begin work on what will be known as CyberTrot. This system, arguably the pinnacle of artificial intelligence, computing, and management technology, shall ensure a seamless command economy. Some may raise concerns about whether this AI gaining higher cognitive function may jeopardize the revolution or humanity itself. However, the training it will receive ensures CyberTrot's decision-making is foremost for the workers."
 FPR_creation_of_cybertrot_tt: "Completion of this focus will grant §ACyber-Trotsky§! as a §RField Marshal§!, §AMilitary Advisor§!, and §GDefense Minister§!"
 FPR_trotskymobile_active_tt: "This will spawn a command center containing §ATrotsky§! \n\nIf this command center is §RLOST IN BATTLE§!, so too will  §ACyber-Trotsky§!"
 FPR_Federation_of_Socialist_States: "Federation of Socialist States"
 FPR_Federation_of_Socialist_States_desc: "As the World Revolution continues to push forward, we find ourselves encompassing territories far beyond that of France, liberated from their former capitalist oppressors. In doing so, we must realize that our continued use of the label of France to name our revolutionary state is no longer fitting, especially as we finally abandon the petty ideas of nationalism for proletarian internationalism. Thus, by the decree of our parliamentarian united front, we have transformed into the Federation of Socialist States, a name better suited to include all our new comrades who have joined our ranks.\n\nNo more shall the forces of reaction push us back into capitalist demagoguery, even under the guise of market socialist deformation. With the analysis and power of CyberTrot by our side, we can ensure that our command economy can not only achieve but surpass the wildest dreams of our economic planners. Now, we are ready to prepare for the final crusade to liberate the global proletariat from the tyranny of capitalism. Let us do everything that leads to a world that rests under one internationalist banner!\n\nVive la Fédération des États Socialistes!"
 FPR_global_revolution_category: "Centerpiece of the Permanent Revolution"
 FPR_global_revolution_category_desc: "\n\n\n\n\n£GFX_FPR_permanent_revolution_cat\n\n\n\n\n\n\n\nFor true liberation of a nation, the proletariat must continuously and forever fight for its betters. There should be no pausing and no break in their fight for freedom, they should always destroy oppression when they see it in the nation.\n\nThe idea of the Permanent Revolution, conceptualized by Trotsky, is something that must be embodied well and truly. If it is not, we would be traitors to our own cause, abandoning the proletariat ideal."

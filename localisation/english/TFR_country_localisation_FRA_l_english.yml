 FRA_Military_Retirement_category: "The Great Game"
 FRA_Military_Retirement_category_desc: "\n\n\n\n\n£GFX_FRA_Military_Loyalty_category\n\n\n\n\n\n\n\nThe French Armed Forces have been an unruly organization that has attempted to tamper with our political affairs for decades. That being said they are our nation's protectors and will ensure our prosperity and might throughout the following years to come. As we tread through this period of political uncertainty to ensure our administration's success, we must periodically work alongside the military and concede to their requests and demands. Their loyalty is a necessity, and we must carefully work with our armed forces to ensure France's greatness. \n\nWe currently have: \n§G[?happy_generals]§! General(s) who are §Ghappy§! with the regime.\n§O[?neutral_generals]§! General(s) who are §Ounbothered§! by the regime. \n§R[?angered_generals]§! General(s) who are §Rangered§! with the regime. \n§C[?retired_generals]§! General(s) who are currently on §Ctemporary leave§!."

 FRA_covid_idea_1: "Low Covid"
 FRA_covid_idea_1_desc: "The foreign COVID-19 pandemic has made its way into the European continent with no halting or signs of being. The rapid spread of the virus has put strain on the emergency systems and government of France as committees and boards are put together with scientists and officials of the Nation in order to combat the spread of COVID-19 as rapidly as it has spread throughout the country.\n\n§RIf not resolved the results will be catastrophic for the Nation.§!"
 FRA_covid_idea_2: "Mild Covid"
 FRA_covid_idea_2_desc: "The foreign COVID-19 pandemic has made its way into the European continent with no halting or signs of being. The rapid spread of the virus has put strain on the emergency systems and government of France as committees and boards are put together with scientists and officials of the Nation in order to combat the spread of COVID-19 as rapidly as it has spread throughout the country.\n\n§RIf not resolved the results will be catastrophic for the Nation.§!"

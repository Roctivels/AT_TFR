 FAF_operation_powderkeg_decision_idea: "§HOPERATION:§! POWDERKEG"
 
 FRA_ils_ne_passeront_pas: "Ils Ne Passeront Pas!"
 FRA_ils_ne_passeront_pas_desc: "Regardless of Ukraine's collapse, the spirit in the Kuban bridgehead remains high. This newfound zeal is maintained despite the knowledge that not all is well at the front, the bear has achieved massive successes, despite high losses. The Russian advance continues, and to meet such an onslaught it's obvious we must dig our heels even deeper into the Chernozem. Today it is us besieging Krasnodar, but failure may enable the Russians to push on, and it will be the heart of Europe at risk. A chant from France's storied past has been resurrected by the men at the front, and just as it was then, will now serve as an excellent rallying cry for soldiers and civilians alike. They shall not pass!"
 FRA_sovereignty: "Sovereignty"
 FRA_sovereignty_desc: "More idealistic members of government and the military want to use the conflict to further cement European unity, increase unit integration, and utilize anti-Russian ethnic units to help paint us as liberators. Any such large structural change or heavy investment in questionably loyal groups should be viewed as a gamble, and he who gambles with his soul is a fool. Such dreamy concepts must be reserved for a world where Europe has vanquished any threat Russia represents to a free Europe. Until that day, we shall rely on the strength of France as it is-dreamy reforms can be saved for peacetime."
 FRA_solidarity: "Legacy of the Foreign Legion"
 FRA_solidarity_desc: "Despite our refusal to go down the route of rabid risky reorganization, there is still room for the raising of non-French units by simply embracing the spirit of the foreign legion. By rapidly expanding its strength, we can both swell the ranks with additional fighting men, and need not worry as much about sweeping structural changes and possible conflicts of interest among ethnic units. France will get foreigners to fight for her, but under the unifying banner of the Légion étrangère."
 FRA_cement_ukrainian_crimea: "Cement Ukrainian Crimea"
 FRA_cement_ukrainian_crimea_desc: "With the recapture of Crimea, we must spare no expense in ensuring any Russian attempt to retake it fails. Europe entered this conflict over a breach of Ukraine's territorial integrity, and to show we mean business, must go all the way. We will not settle for a truce, no 'DMZ', nothing short of a total victory. The lands stolen from Ukraine while we stood idly shall be returned no matter the cost. Our failures will be rectified, and we'll do our best to ensure this is the last time Russia can threaten Ukraine-let alone Europe-ever again. The bear shall be broken at any price."
 FRA_kuban_expeditionary_army: "Kuban Expeditionary Army"
 FRA_kuban_expeditionary_army_desc: "Even with their current successes at home and the front, behind the curtain one can find dissent in Russia. There are those in regions feel left behind far from Moscow, Kuban being the perfect starting point due to large chunks having fallen into our hands. We shall organize local and POW volunteers into this 'Kuban Corp' despite local officers insisting on spelling it with a 'K'. Such units will be perfect for rear security duties and to show the locals and perhaps the Russian people that we are just liberators, not conquering brutes."
 FRA_conscript_cossack_brigades: "Conscript Cossack Brigades"
 FRA_conscript_cossack_brigades_desc: "With the collapse of the USSR, both Russians and Ukrainians claimed to be inheritors of the Cossack name. From where we stand, Ukraine is the home of any true Cossack, and those who claim to be such must stand with us lest they be traitors to their people. Those on our side of the front will be organized into lighter mobile units to go along with their namesake. Consent to join these units matters not as, after all, we're fighting for their sake, not ours."
 FRA_utilize_russian_dissidents: "Utilize Russian Dissidents"
 FRA_utilize_russian_dissidents_desc: "There are many who'd take up arms with us for a multitude of reasons, whether they be for a 'better' Russia, regional independence, or simply going wherever the wind is blowing. The 'why' matters not, simply that these men can be handed rifles and used to weaken the Russian war effort. Some are genuine in collaboration, some have views that we find to be generally…problematic. We shall simply have to deal with the consequences later. There is a war to win."
 FRA_operation_davout_tt: "§YUpon completion of this focus, §!§COpération§!: Davout§!§Y will commence. \nThis is an all out attack on §!\n§RSochi \nNovorossiysk \nKerch§!\n§YThis is to relieve Ukrainian pressure and to ensure that§! §CNATO forces§! §Yhave superiority on the §!§GCaucasian front§!"
 FRA_cossack_army_tt: "4 §yCossack Light Mechanized Brigades! will be raised in §pWarsaw§!"
 FRA_kuban_exp_army_tt: "6 §0Kuban Militia Divisions§! will be raised in §pWarsaw§!"
 FRA_Freedom_of_Russia_Legion_tt: "2 §3Mechanized Russian Dissident Divisions§! will be raised in §pWarsaw§!"
 FRA_foreign_legion_tt: "4 §2French Foreign Legion Brigades§! will be raised in §4Paris§!"

 FRA_Act_on_Rattachism: "Act on Réunionisme"
 FRA_Act_on_Rattachism_desc: "While Wallonia speaks French, this ancient part of the Francophone world has been out of our hands since the fall of Napoleon, we thought lost forever. Fate has brought us back together as one again, as we must prepare several acts to continue to tie them into our system, being within our borders is not enough, Belgium and it's Byzantine Political System must be reconciled with our own. For the good of France we shall tend to this."
 FRA_Absorb_Waloon_Command: "Absorb Walloon Command"
 FRA_Absorb_Waloon_Command_desc: "Belgiums Bilingual nation led it to have an army split into two parts, much like it's government, this made the division of Belgium rather clean as the Flemish held border security on the Flemish side and the Walloonians similarly. But now this is the responsibility of the Dutch and France. Wallonia brings with it a sizeable contingent of forces and experienced NATO Officers who we would be fools to reject the services of. Update their uniforms, grant them new ranks, they are part of France now."
 FRA_absorbing_walloon_command_tt: "Wallonian officers will be absorbed into our army"
 FRA_Reorganize_Walloon_Businesses: "Reorganize Walloon Businesses"
 FRA_Reorganize_Walloon_Businesses_desc: "When integrating a urban developed territory like Wallonia, one must consider that businesses in the region were beholden to a strict building code that Belgium over saw from Brussels, but now? These businesses answer to French Law. We have to inspect the newly acquired businesses and help them reorganize, companies like Fabrique Nationale are too valuable to see fall, stepping in and organizing them amid the chaos will preserve the local economy."
 FRA_Integrate_Walloon_Parliament: "Integrate Parliament"
 FRA_Integrate_Walloon_Parliament_desc: "The hardest part of this really is looking at Belgiums governmental system and seeing how to integrate it. Belgium had three parliaments, Flemish, Walloon, and German. We control the Walloon and German region and don't know what exactly to do with their governments, while some seats are likely to be removed especially where Eupen Malemdy is concerned, many will be integrated into the French Republic, their parties registered under their former names shall retain them for the time being and many of the Belgian Parliamentarians will find themselves getting comfortable soon enough in Paris. All there is left now is for our party to draw up the elected regions and decide then who to keep."
 FRA_Promote_Francophone_Unity: "Promote Francophone Unity"
 FRA_Promote_Francophone_Unity_desc: "The French speaking people are the inheritors of a great and ancient legacy, from Charlemagne, to the Valois, to the Bourbon and Napoleon, and the current great Republican Era. We are shapers of European values, we are the holders of it's culture, we have endured for over a Millennium foreign invasion, subjugation, and more often than not, endured grand campaigns East, South, and West across the Atlantic to win glory for us and our people's.\n\nBelgium and Wallonia was for most of it's life apart from us during these glories. But they shared them all the same. Our history is one to be proud of, our history is theirs, and theirs is ours. The French always stand together!"
 FRA_An_Example_of_Unity: "An Example of Unity"
 FRA_An_Example_of_Unity_desc: "Liberté, Egalité, Fraternitié. The guiding principles of France. Since the first blade fell and ended the Ancien Regime our ideals have ignited the world. America. Germany. Italy. Is there a part of the world these three words have not reached? Name one. Europe is uniquely unified by these ideals today, though Belgium fell the core ideas in their mind did not. Brussels remains a city of mixed Flemish-Walloon ethnicity, the capital of Europe, while Belgium is gone the symbol of unity it left behind is a powerful reminder of the triumph of our ideals through all crisis and all trouble, the pursuit for Freiheit, for Libertié, whatever language you speak, you have a word for it. In English it is Liberty. In the hearts and minds of every European, let Brussels be a beacon of light for the future of Europe. The first real territory on a map that we can say wholly truly belongs to Europe."
 FRA_Propagandize_French_Naturalism: "Propagandize French Naturalism"
 FRA_Propagandize_French_Naturalism_desc: "And to the Rhine I say, follow the river north until Brabant Beer is in the market squares. We are the French, inheritors of Francia, we do not forget our origins. The Dutch, the Germans, they are our brothers. We gain Wallonia this day but we should have gained it all, we should have gone further, it is a gift to Europe that we do not march to the Rhine as Napoleon did. This ancient border of ours was drawn up in a defeat that split us from the Wallonians, from the Flemish, from Burgundys old lands. Why should we accept it? No we demand more. We should have more. Wallonia today, Flanders tomorrow, Brabant next week, the Rhine next year. Maybe. "
 FRA_Absorb_the_Beglian_Left: "Absorb The Belgian Left"
 FRA_Absorb_the_Beglian_Left_desc: "We leftists must stick together, the Belgian Socialists have long been our friends on the European stage and among their ranks are many personal friends of Melenchon, it's only right with the regions together as one that we can break bread with them, a meeting of Melenchon with the Parti Socialiste leader Paul Magnette and the PVDA's own Raoul Hedebouw will allow us to strengthen our parliamentary position and legitimize our rule over the Belgian working class. We may as well get Charles Servaty in here as well, Eupen is small but Eupen is still ours. Their 3 seats are still seats we would like to hold."
 FRA_Appoint_King_Philippe_to_Parliament: "Restore Belgian Titles"
 FRA_Appoint_King_Philippe_to_Parliament_desc: "Belgium has a storied monarchy, one that was unjustly torn away in the last days of Belgiums existence, it isn't right that such a symbol of national unity should be torn away. We are not a Monarchy ourselves of course, but the conservatives of Belgium do not want their royals made mere citizens. Very well. They will retain their titles restored and upheld by the French Republic, as odd as it is we shall crown a King for Belgium once more. A purely honorary and entirely non administrative state honor."


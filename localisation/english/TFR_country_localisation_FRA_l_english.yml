 FRA_cement_the_NATO_model: "Cement the NATO Model"
 FRA_cement_the_NATO_model_desc: "One of the side effects of previous governments maintaining their sense of pride even at the expense of common sense is one of a mishmash of equipment types and production. France may have used NATO standard ammunition, but those who came before us made sure everything else was as uniquely 'French' as possible, no matter its effect on our ability to wage war. Simply using NATO standard ammo does not go far enough, we need total standardization across all of Europe. The long process will be started and with time everything down to the screws used will be the same whether it's made in France or Austria."
 FRA_the_runaway_identities: "The Runaway Identities"
 FRA_the_runaway_identities_desc: "With the rising flames of the world at large at the beginning of the twenty-twenties, one of the symptoms for France was an increase in regional identity and separatism. Despite our belief in pan-European unity, this further division helps no one, but the enemies of Europe. They can believe themselves to be Alsatian or Corsican, but they are at their core European. Whether they have to be brought to this viewpoint with them kicking and screaming or with a smile is up to them."
 FRA_declare_the_new_france: "Declare a New France"
 FRA_declare_the_new_france_desc: "A war in the east, the chaos of defeat and resulting coup and civil war have left France even more battered, but through it all we have succeeded where lesser men would've failed. The forces attempting to protect or reclaim their version of the past have been excised. Now we can focus our resources and attention on the one thing that matters: the future. The birth of a new France marks the beginning of a new Europe. A united Europe that, together, will pick up the pieces and build back better. United, strong and prosperous. Only then can our brothers to the east be liberated, but these things must be taken one step at a time…"
 FRA_fighting_the_good_fight_category: "Fighting the Good Fight"

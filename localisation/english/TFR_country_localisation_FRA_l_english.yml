 FRA_covid_curing: "Cure Distribution"
 FRA_covid_curing_desc: "The people of France take a breath of relief as the brave scientists of Europe have successfully founded a tried and tested vaccine capable of calming the effects of the pandemic. While the new vaccine is being distributed around it will take time for the nation to be completely vaccinated, until then it is monumental we were able to produce the cure so soon. The total eradication of the virus seems imminent as COVID-19 will slowly fade out and dissipate into little more than a common cold."
 FRA_Omnicron_idea: "Omnicron Variant"
 FRA_Omnicron_idea_desc: "Omicron is a variant of the SARS-CoV-2 virus better known as ''COVID-19'' that has recently popped out of southern Africa. With this, there exists a resurgence of panic as the new variant does not have a vaccine dedicated to the mutation. Hopefully, this variant will be put out quickly as researchers work hard in their laboratories synthesizing new treatments for the virus."
 FRA_lockdown: "National Lockdown"
 FRA_lockdown_desc: "To deal with the overwhelming spread of the COVID-19 pandemic within the country, we've put the entire country under lockdown orders to help mitigate the current infection rates. While effective, such measures mean that our population has to remain at home, social distance, and constantly wear masks and sanitize under public health guidelines. Such guidelines also mean many citizens can't go to work, and discontent may soon bubble out of control unless we reopen the country as fast as possible."
 FRA_opening_up: "Economic Reopening"
 FRA_opening_up_desc: "While implementing the Swedish response within our borders we have begun to experience some of the benefits of this plan almost immediately. With the nation's production and economic systems being halted by lockdowns the loosened mandates have incentivized our citizens to begin picking up their occupations where left off and not being reliant on government stimulus packages. We can only hope this change of pace towards opening up the nation does not lead to a resurgence of the virus or other unforeseen consequences."
 FRA_welfare_payments: "Economic Stimulant Package"
 FRA_welfare_payments_desc: "With the strengthening of the already harsh lockdown mandates the French people have had their daily livelihoods and occupations temporarily removed from them. But now it seems that we are not in sight of the end of this pandemic for the foreseeable future. With this, the responsible choice for our government is to aid the French people through these hardships and lift them back onto their feet until the eventual reopening of our Nation. "
 

 FRA_CFA_Franc: "CFA Franc"
 FRA_CFA_Franc_desc: "Despite decolonization, France's influence remains strong over its former West African colonies through the CFA franc, which comprises two monetary zones across 14 sub-Saharan countries. Pegged to the Euro, the CFA franc limits the ability of West African nations to independently manage their economies, leaving them vulnerable to European market fluctuations and EU policies.\nHowever, the CFA franc benefits the French economy, facilitating trade and providing macroeconomic stability in the region. This stability has helped prevent debt crises and inflation, enabling French corporations to invest heavily in West African resource extraction, generating billions in profits for France."

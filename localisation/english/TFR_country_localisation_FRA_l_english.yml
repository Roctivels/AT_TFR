 FAF_provincial_improvement_modifier: "Provincial Focus"
 FAF_improve_gallarum_decision: "Rebuild §GGalliarum§!"
 FAF_improve_gallarum_decision_desc: "While Galliarum, referred to by most as Northern France, had the advantage of being our most developed region it was not spared by the horrors of the civil war. Already having encountered Russian bombardment during the war in the east, Galliarum has been incapacitated as the liberal and communist vultures pillaged it for all it had. Now that we have the resources to do so, we must begin the reconstruction of the entire region. Without it, not only will our industrial capabilities not be enough to unify our precious Europe, but it will ensure that subversives will be able to pray upon the struggles of our people to radicalize them into insurrection."
 FAF_improve_viennensis_decision: "Rebuild §OViennensis§!"
 FAF_improve_viennensis_decision_desc: "For the region where Caesar began his civilization of the Gauls, Viennensis (more colloquially referred to as Southern France) had long struggled even before the civil war tore our nation asunder. Lacking much of the economic development that our north has, these regions struggle with poverty and thus have become hotbeds for radicals that wish to throw our nation into chaos once again. As it is our duty to the people of our beloved France, we must undertake a mass revitalization effort to ensure that Viennensis will rise like a phoenix from the ashes!"
 FAF_improve_hispanarium_decision: "Rebuild §YHispanarium§!"
 FAF_improve_hispanarium_decision_desc: "Our reunification with our brothers south of the Pyrenees has meant that we have inherited the damage of their second civil war. Compared to our brothers in France and Italy, we must understand that reconstruction must take into account the multitude of regional identities throughout the territories of Spain, and not replicate our mistakes in the Peninsular War. While it may take a substantial effort, we shall spare no less for any fellow descendant of Rome!"
 FAF_improve_italiae_decision: "Rebuild §RItaliae§!"
 FAF_improve_italiae_decision_desc: "Once the beating heart of Europe. Once the beacon of hope that brought about a golden age of progress, enlightenment and prosperity. But ever since the fall of the Western Roman Empire in the 5th century, Italy has never truly recovered the splendour it once held in antiquity. Thus, it is up to us to rebuild the peninsula, free from the failures of a decrepit liberal democracy, so that it can finally recover the heights that would make even Augustus blush. They say Rome wasn't built in a day, but if its glory still shines eternal then our efforts will be given the time and attention needed to continue that legacy."
 FAF_Quadrilingual_Unification_dyanmic: "Language of Brothers"
 FAF_Quadrilingual_Unification_dyanmic_desc: "Perhaps the greatest shame in post-Roman European history has been the slow and painful decline of Latin. What once acted as a unifying force for the entire empire, is only used by the Catholic clergy as an official language. It does not help that centuries of division after the fall of Rome meant that Latin would degenerate into separate Romance languages. As part of our efforts to unify the European continent, we must take up the arduous effort to bring back Latin as a commonplace lingua franca. While our Romance brothers have been willing to take up the effort, we must remember that like Rome the mass adoption of Latin cannot be done in a day."
 FAF_Quadrilingual_Unification_idea: "Language of Brothers"
 FAF_Language_of_the_State_decision: "Rescind the State Language"
 FAF_Language_of_the_State_decision_desc: "One of the main hindrances to Latin being adopted by our people is that we have one national language, French. While it may be a shock to our managerial and political classes, rescinding its prized status and putting it on par with our recognized legal languages may be a good motivator for our citizens to take up Latin. As well, doing so can help ensure that when Europe is finally united our banner does not come across as merely another case of French imperialism."
 FAF_managerial_bilingualism_decision: "Managerial Bilingualism"
 FAF_managerial_bilingualism_decision_desc: "One of the main justifications for our Latin revival is the concept that when we unify the peoples of Europe, it can act as a lingua franca that despite our differences can ensure smooth governance. With this in mind, we need to ensure that our managerial classes that take up bureaucratic duties are at least bilingual in both their native tongue and Latin. Besides, are we not hypocrites if we do not use the language of our prized Roman ancestors ourselves?"
 FAF_the_failures_of_AH_decision: "Failures of [AUS.GetFlag] Austria-Hungary [HUN.GetFlag]"
 FAF_the_failures_of_AH_decision_desc: "One of the major problems within the Austrian-Hungary Empire was the improper governing of their cultural minorities, while still being European, they were subject to a cultural dominance by the Austrains who ruled them. We can not by any means replicate this example in history. We must find common solutions to our problems and work, as the grand people of all of France, into a goal that we can find solace in."
 FAF_Academic_Latinization_decision: "Academic Latinization"
 FAF_Academic_Latinization_decision_desc: "As much as we can declare that our people "must learn Latin for the good of Europe" and that they will do their patriotic duty, this process will be difficult with the current state of education. Beyond language studies, courses that properly teach Latin are non-mandatory, and curriculums are based around regional languages that give less incentive to learn the language beyond a basic level. While it will require a massive academic overhaul, we must assemble our best Latin scholars to help draft a new curriculum that ensures that Latin is thoroughly taught and utilized by our people. Most importantly, if the youth are our future then such a system means that it may only take a few decades until Latin is commonplace in Europe once again!"
 FAF_our_ancestral_battlefield_decision: "Our Ancestral Battlefields"
 FAF_our_ancestral_battlefield_decision_desc: ""
 FAF_the_roman_way_decision: "The Roman Way"
 FAF_the_roman_way_decision_desc: "When asked about Rome, many will say it was a vast and powerful empire, but few can truly pinpoint what made Rome great. Any substandard nation can build an empire, but what set Rome apart was its unwavering will—forged through blood and mud. As the heirs of Rome, it is our destiny to rebuild what was lost, destroyed, and forgotten centuries ago. The Roman eagle shall once again soar across Europe, from Iberia to Italy, its cries echoing through the European skies."
 FAF_enforce_imperial_language_decree_decision: "Imperial Language Decree"
 FAF_enforce_imperial_language_decree_decision_desc: "Italian, Spanish, and French—three distinct languages, yet all sharing the same roots: Latin. The mother of them all, now nearly forgotten and abandoned by her own children. Without a unified language, our Rome would become like the Tower of Babel—a hollow construction fueled by chaos and madness. Once more, Latin shall be the tongue of civilized men, of blood brothers, of Romans."
 FAF_demand_spanish_unification_decision: "Demand [SNS.GetFlag] Spanish Unification"
 FAF_demand_spanish_unification_decision_desc: "To imagine, for a moment, that the beautiful scrubs and lushious woodland of Iberia were once part of our prosperous Roman Empire surely makes one filled with pride and joy. Yet it all feels so distant, in the far gone past which died with our forefathers. Us and the Spanish have had our difference throughout our shared history, but the blood which flows through our veins ultimately bonds us together. We were meant to be friends and brothers, not enemies. The Spaniards may have forgotten this, but we will remind them of it."
 FAF_demand_italian_unification_decision: "Demand [ITA.GetFlag] Italian Unification"
 FAF_demand_italian_unification_decision_desc: "A family is incomplete without all its members, and for the Roman family, Italy is an irreplaceable one. After all, where was the very concept of Rome born? Without Italy, our Rome would be incomplete—just another hollow imitation crafted by charlatans and impostors. Rome without Rome is like breakfast without coffee and a cigarette—it feels utterly wrong. That is why we must make the Italians see our vision. We Must.."

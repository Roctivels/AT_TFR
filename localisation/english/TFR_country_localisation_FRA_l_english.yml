 FRA_Disloyal_Military_idea: "Disloyal Military"
 FRA_Disloyal_Military_idea_desc: "Despite our best efforts, our relationship with the French Armed Forces is not to be desired. A mix of our policies, lack of outreach, and the state of our foreign policy have led many within our military to despise our government. Unless we rectify these issues, we must be ready to expect mutinies and for our generals to conspire against us. These conflicts of interest also raise concerns that a coup may be around the corner, which could forever change the course of French history."
 FRA_Disloyal_Military_Zemmour_idea: "Disloyal Military"
 FRA_Disloyal_Military_Zemmour_idea_desc: "Despite their best efforts, our relationship with the Government is not to be desired. The military has been pushed away from the state and now, many within our ranks have come to despise our government. With Zemmour, the government will continue even after an outright coup of the democratic establishment."

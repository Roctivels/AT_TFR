 FAF_dieu_veut_idea: "Dieu Veut"
 FAF_dieu_veut_idea_desc: "\n\n\n\n\n£GFX_FAF_deus_vult\n\n\n\n\n\n\n\nThe will of god and the will of the nation is behind us, and behind our soldiers. We fight for the righteous cause, a holy and divine cause. As our men march on, they should know that they, the people of France, are the greatest to have ever lived. As artillery roars and they face savage hordes in the East, they should know that they are following the spirit of our Lord. Dieu Veut!"
 FAF_euro_navy_annexation_tt: "Through diplomatic negotiation, the European, Pacific and Atlantic Naval Commands are willing to join in our battle against Soviet Communist Hegemony."
 FAF_lafayette_order_cat: "The New Order"
 FAF_lafayette_order_cat_desc: "\n\n\n\n\n£GFX_FAF_lafayette_category\n\n\n\n\n\n\n\nThe Germans let us down, they have let our sons die... and yet expect our subservience in this upcoming war? \nThe Communists and the Germans are working against France... Sapping our young boys and our industry to weaken us... And for what? \nTo §RSEIZE§! from us the territories of Alsace and Lorraine? \nTo §RIMPLEMENT§! Germanic Communism within our glorious France? \nWe can only assume what actions they would have take once we are weak, but that day shall never come as long as we follow our great leader §C'Lafayette'§!"
 FAF_showcase_superiority_decision: "Showcase French Superiority"
 FAF_showcase_superiority_decision_desc: "We are superior, we know this. Our ideals, our lifestyles, our history, our people... All have been perfected like the most eloquent wine, yet the world continually fails to recognize our OBVIOUS superiority over them!"

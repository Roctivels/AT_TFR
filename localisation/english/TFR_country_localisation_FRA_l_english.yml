 FAF_Put_Pressure_on_the_Dalmatians_decision: "Demand [CRO.GetFlag] §pCroat Subjugation§!"
 FAF_Put_Pressure_on_the_Dalmatians_decision_desc: "From the marble colonnades of Diocletian's Palace to the Latin inscriptions of Dubrovnik, the salt-laden Adriatic winds have never fully erased the imprint of Rome upon this land.Just as the Adriatic forever gazes westward toward the Eternal City, the cultural map of Croatia still holds unwritten pages, awaiting the rekindling of the Latin flame. When the ironclad knights of the Fourth Crusade raised the Latin cross over Constantinople, history had already charted the course for this lost jewel of Latin civilization—not to bow before the Ottoman crescent, nor to submit to the Slavic double-headed eagle, but to follow the Dalmatian roads once paved by Roman legions, returning at last beneath the scepter of Latin imperial order."
 FAF_propaganda_campaign_in_Romania_decision: "Propagandize [ROM.GetFlag] §YRomanian Latinism§!"
 FAF_propaganda_campaign_in_Romania_decision_desc: "Romanians may not be the first to come to mind when discussing Roman heritage, yet the truth is they are just as Roman as we French. The Romanian language evolved from Vulgar Latin, and their people share a proud Roman ancestry. However, due to their geographical location, it was inevitable that they would be infected by the Slavic virus, diluting what once made them a great and powerful people. Still, the blood that flows through the Romanians remains the same—they simply need to be reminded of their roots."
 ROM_Identitarian_Influence: "Growing Identitarian Influence"
 ROM_IDE_inf_tt: "§YWe shall spread Identitarian influence across [ROM.GetFlag] Romania§!"
 FAF_fund_identitarian_terror_in_ROM_decision: "Fund Terror in [ROM.GetFlag] §YRomania§!"
 FAF_fund_identitarian_terror_in_ROM_decision_desc: "Our Romanian brothers are once again in the palms of Russian imperialism. The Russian devils whisper their chants into their ears, playing with their minds, creating this false image of Slavic heritage in their psyche! However not all is lost. There are still loyal Latin brothers in Romania who identify themselves with their European family, and not the false Slavic one. We must aid them in spreading their message, so that one day they may return to our embrace."

 ATW_joshua_sutter_char: "Joshua Sutter"
 ATW_joshua_sutter_char_desc: "A child who has seen the worst that can happen in the world cannot come to terms with the loss and the current situation in the world. When the world is on fire, he has no idea why it was done. Life had not taught him such a revelation. He was already standing with one foot in the grave dreaming that this nightmare would end. But he will not stop until that moment - until his life is taken by another person who was ready to scold his hands for meaningless morality. Joshua Caleb Sutter is a man shrouded in mystery, known to the public as a key figure in the order of the nine angles, an informant for the FBI and publisher of extremist books. As a one-time leader of the Aryan Nations, Sutter's links to extremism are expansive. He pledged fealty to North Korea, operated a Hindu sect, and created the Tempel ov Blood, a \"nexion\" or cell of the Order of Nine Angles. His influence over the Atomwaffen division cannot be underestimated, already violent by nature, he has pushed the organization to transcend the very concept of morality and humanity. Guiding its members through the sinister path of immorality, Joshua has made good use of the funding received from the FBI during his time as an informant, but like a chameleon he has slipped through the cracks of providence, returning to his destiny. The irony of the empire that has provided him with the means to jam a dagger in its back, the dark energy that will flow from the suffering caused by him will rival the great flood, the desire to bring forth a new empire built upon the corpses of old, excess and torture. An eternity of rot and pain, Hell on Earth."

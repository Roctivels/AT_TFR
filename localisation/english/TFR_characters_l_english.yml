 #ATW - Atomwaffen Division
 ATW_brandon_russell_char: "Brandon Russell"
 ATW_brandon_russell_char_desc: "Over a long enough time everyone hits terminal fatigue: physical, or mental. Just look at his eyes - no time left on the clock. There's no driver at the reins. Send him away - far from all of us. When this kid detonates, nobody's going to want to be around to witness it.\n\nBorn in 1995, Brandon Clint Russell is a man who dedicated his entire life to the national socialist cause, at the age of 18 he appeared on online forums such as iron march. Inspired by the revolutionary aspects of nazism, he soon announced the formation of the Atomwaffen division, a paramilitary organization bent on the total destruction of the current global order. Using his experiences in the national guard and his studies in nuclear physics, he culled the passive elements from the group and realized that the only means to victory is extreme violence, with a final blast of radioactive fire.\n\nUntil one day he faced charges for stockpiling materials related to creating explosives, causing him to be locked away in the concrete halls of prison, in custody he remained steadfast as he encouraged other members to keep up their mission. Inevitably, he'd be released from prison but the FBI knew that he'd keep up with his mission. Now with the United states of America engulfed in the flames of change, he overlooks the collapse like a vulture, ready to fulfill the mission of Atomwaffen.\n\nTo destroy the global world order, to punish the decadent, and to bring an end to history as we know it.\n\n\"There is no room in this world for cowardly people... The sword has been drawn. There is no turning back.\""
 ATW_james_mason_char: "James Mason"
 ATW_james_mason_char_desc: "James Nolan Mason has been an American fascist for over fifty years, dating back to when he joined the youth wing of George Lincoln Rockwell's American Nazi Party in 1966. Following Rockwell's assassination a year later, Mason went down an increasingly radical path: he believed that Rockwell's electoralism had failed, and the only way to restore white supremacy in America was through destabilization of society and overthrow of the federal government. His two greatest ideological influences in that manner were successive ANP leader William Luther Pierce and cult leader Charles Manson.\n\nWith Pierce's death in 2002, Mason became the leading neo-Nazi ideologue in America. Collections of writings from his newsletter 'Siege' percolated through the far-right underground, where they heavily influenced the esoteric guerrilla terrorist network later known as the Atomwaffen Division. As the American government's loyalties were divided and its ability to enforce order crumbled, Atomwaffen cells rose up in America's South and invited their greatest inspiration to serve as their leader. Although he commands only a few pockets of fanatical warriors, Mason is closer to making his twisted racial utopia a reality than ever before. Many are worried about what will happen if he gets ahold of a major city, let alone a nuclear arsenal."

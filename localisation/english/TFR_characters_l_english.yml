 POLITICS_nicolas_mayer_rossignol_DESC: "While an otherwise ordinary Pro-EU Federalization mayor of Rouen, Mr. Mayer-Rossignol unexpectedly won the nomination to become the leader of the new Independent Republic of Normandy. \n\nThrust into a position of power he does not believe in, Mayer-Rossignol is doing anything and everything to sabotage the Norman cause from the within the highest office."

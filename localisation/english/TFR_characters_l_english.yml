 #CHI - Taiwan
 CHI_tsai_ing_wen_char: "Tsai Ing-wen"
 CHI_tsai_ing_wen_char_desc: "No one better represents Taiwan's inclusivity than Tsai Ing-wen. The first president of the Republic of China to be of aboriginal descent, unmarried, and a woman, she overcame countless stereotypes to succeed as a politician and legal scholar. \n\nShe entered the government in 1986 but stepped into politics in 2000 when Chen Shui-bian became the first non-Kuomintang president. Initially a member of the Mainland Affairs Council, she became a legislator in 2005 and vice premier in 2006. In 2008, she took over the Democratic Progressive Party after its election defeat and led it into the 2010 local elections. She lost both the 2010 New Taipei mayoral race and the 2012 presidential election, resigning as party leader. However, after Ma Ying-jeou's ECFA scandals and the Sunflower Movement, the DPP regained momentum. She returned as leader and won the 2016 election, defeating the Kuomintang by over 25 points. \n\nShe then promoted Taiwanese identity, expanded human rights, strengthened ties with Japan and the US, and maintained strategic ambiguity with China. As her approval rebounds after a 2018 low, she prepares to fight for a second term."
 CHI_han_kuo_yu_char: "Han Kuo-Yu"
 CHI_han_kuo_yu_char_desc: "Han Kuo-yu, also known as Daniel Han, is often described as an 'unconventional' or even 'populist' politician. A descendant of a War of Resistance veteran, he struggled academically, prompting his parents to send him to the ROC Military Academy. There, he became a captain and, inspired by a Rubik's cube, decided to study hard for university.\n\n In 1990, he became a Taipei County Council representative, gaining notoriety in 1992 after a brawl with colleagues. That same year, he won a legislative seat but lost a 2001 KMT primary, prompting him to leave politics and study at Peking University. He returned to politics in 2017, and despite losing the party leadership race, became KMT's candidate for Kaohsiung mayor. In 2018, he ended DPP's long rule in the city but faced backlash for joining the 2020 presidential race, with citizens accusing him of abandoning Kaohsiung.\n\n Despite doubts about his competence, he won the presidency with a landslide victory, vowing to counter 'independence movements' and revitalize the economy, though many fear his radical and unrealistic policies."

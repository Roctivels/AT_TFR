 #NSM - National Socialist Movement
 NSM_burt_colucci_char: "Burt Colucci"
 NSM_burt_colucci_char_desc: "In March of 2019, Burt Colucci took control of the National Socialist Movement from former leader Jeff Schoep. Following the months before the collapse of America, the NSM gained significant traction in America, gaining hundreds of new members in a matter of weeks.\n\nAnd as authority in Michigan collapsed the NSM exploited the situation, gaining a chunk of rural eastern Michigan and some territory in Detroit itself. This allowed Colucci to solidify the NSM as a faction in the US. But as the NSM solidified the organization started factionalizing, with two main internal factions being formed. The Hitlerites, who seek to walk in the steps of Nazi Germany, and the Rockwellians, who seek to form an American version of fascism.\n\nWith Colucci holding the reins of the NSM and being the leader of the Hitlerite faction, he must not let factionalism divide his party.\n\nLest he doom the NSM's rare opportunity in its entirety."

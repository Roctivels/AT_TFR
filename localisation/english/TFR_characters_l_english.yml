 #BRS - Bruselles European COmmission
 BRS_Mateusz_Morawiecki: "Mateusz Morawiecki"
 POLITICS_MATEUSZ_MORAWIECKI_DESC: "Mateusz Morawiecki is a Polish politician, economist, and former banker. Born in 1968 in the middle of the eastern bloc, he studied history and economics in Poland and abroad before building a career in the financial sector, eventually becoming CEO of Bank Zachodni WBK. His transition into politics came in the mid-2010s, when he joined the conservative Law and Justice (PiS) government as Minister of Development and Finance, later becoming Prime Minister.\n\nMorawiecki's leadership emphasizes economic modernization, industrial policy, and national resilience. He has overseen large public investment programs, expanded social spending, and pursued policies aimed at reducing Poland's dependence on foreign capital and energy imports. Strongly focused on security, Morawiecki views Poland's eastern position as strategically vulnerable and supports robust pan-european defense cooperation. While supportive of EU membership, he has frequently clashed with Brussels over judicial reform and sovereignty issues. Supporters credit him with economic discipline and preparedness; critics argue that his governance has strained democratic norms."
 BRS_Ursula_Leyen: "Ursula Von Der Leyen"
 POLITICS_URSULA_LEYEN_DESC: "Ursula Gertrud von der Leyen is a German politician and physician who has emerged as one of the most influential figures in contemporary European governance. Born in 1958 in Brussels to a prominent European civil servant, she grew up immersed in the institutional culture of the European Communities. She studied economics at the University of Göttingen before switching to medicine, earning her medical degree and later practicing as a physician.\n\nVon der Leyen entered politics through the Christian Democratic Union (CDU) and steadily rose through party ranks, holding several ministerial posts in Germany, including Minister for Family Affairs, Labour, and later Defense. Her tenure as Defense Minister was marked by ambitious reform efforts, modernization drives, and persistent controversy over procurement and readiness.\n\nIn 2019, she was appointed President of the European Commission, becoming the first woman to hold the office. As Commission President, she has positioned herself as a consensus-builder with a strong executive instinct, overseeing major initiatives on climate policy, digital regulation, industrial strategy, and European defense coordination. Her leadership style blends technocratic management with political ambition, often emphasizing unity, resilience, and strategic autonomy. Critics accuse her of centralization and cautious rhetoric, while supporters see her as a stabilizing force during a period of compounding crises for Europe."
 BRS_Sandro_Gozi: "Sandro Gozi"
 POLITICS_SANDRO_GOZI_DESC: "Sandro Gozi is an Italian politician and committed European federalist. Born in 1968, he studied law and European affairs, later specializing in EU institutional reform and governance. Gozi began his career as an academic and advisor on European integration before entering Italian politics as a member of the Democratic Party.\n\nHe served as Italy's Undersecretary of State for European Affairs from 2014 to 2018, where he became known for his outspoken advocacy of deeper EU integration and stronger supranational authority. After leaving national office, Gozi continued his political career at the European level, aligning himself with pro-integration movements and centrist liberal blocs. He supports expanding EU executive power, reducing national vetoes, and strengthening collective decision-making in foreign policy and defense. Admirers view him as a clear-eyed realist about Europe's structural weaknesses, while critics accuse him of elitism and disregard for national political cultures."
 BRS_Bas_Eickhout: "Bas Eickhout"
 POLITICS_BAS_EICKHOUT_DESC: "Bas Eickhout is a Dutch politician and environmental policy expert, best known for his role within the European Green movement. Born in 1976, he studied chemistry and environmental sciences, later earning a doctorate in climate and energy policy. Before entering politics, Eickhout worked as a researcher at the Netherlands Environmental Assessment Agency, contributing to international climate modeling and emissions analysis.\n\nHe entered the European Parliament in 2009 as a member of GroenLinks, where he quickly became one of the leading voices on climate legislation, emissions trading reform, and renewable energy policy. Eickhout advocates for binding environmental targets, large-scale public investment in green infrastructure, and a reorientation of European industry toward sustainability. He often frames climate change as a structural threat comparable to war or economic collapse. While praised for his technical expertise, he has faced criticism from opponents who argue that his proposals underestimate economic and geopolitical constraints."
 BRS_Nicolas_Schmit: "Nicolas Schmit"
 POLITICS_NICOLAS_SCHMIT_DESC: "Nicolas Schmit, born in 1953, is a Luxembourgish politician and veteran of European social democracy. He studied economics and social sciences before entering public service, where he built a career focused on labor policy, social protection, and European governance. Schmit served as Luxembourg's Minister of Labour, Employment and the Social Economy from 2009 to 2019, gaining a reputation as a pragmatic negotiator between unions, employers, and state institutions.\n\nIn 2019, he was appointed European Commissioner for Jobs and Social Rights, where he played a central role in shaping EU labor standards, minimum wage coordination, and social policy harmonization. Schmit's political outlook is rooted in gradual reform, institutional continuity, and the preservation of social cohesion during periods of crisis. He is skeptical of radical disruption, preferring, like a typical left-wing European bureaucrat, regulatory frameworks and consensus-based solutions. Supporters view him as a stabilizing technocrat, while critics argue that his reliance on existing institutions limits his ability to respond to systemic breakdowns."
 BRS_Walter_Baier: "Walter Baier"
 POLITICS_WALTER_BAIER_DESC: "Walter Baier is an Austrian political scientist, editor, and long-time figure of the European radical left. Born in Vienna in 1954, he was politically shaped by the post-1968 leftist milieu and became involved in Marxist and post-Marxist thought early in his academic career. Baier studied philosophy and social sciences at the University of Vienna, where he developed an interest in political economy, ideology, and European integration from a critical perspective.\n\nBaier later became chairman of the Communist Party of Austria (KPÖ), a position he held from 1994 to 2006. Under his leadership, the party shifted away from orthodox Cold War communism toward a more pluralist and European-oriented leftist platform. After leaving party leadership, Baier focused on transnational left-wing coordination, becoming a key figure in European left networks and think tanks. He later served as coordinator of the Party of the European Left, advocating for closer cooperation between socialist, communist, and progressive movements across the continent. Baier is known for his emphasis on institutional strategy, ideological coherence, and long-term political organization rather than mass populism."
 
 #GER - Federal Republic of Germany
 GER_oskar_prinz: "Oskar of Prussia"
 GER_frankwalter_steinmeir: "Frank-Walter Steinmeier"
 GER_STEINMEIR_DESC: "Frank-Walter Steinmeier has been the President of the German State since 2017, with years of political experience to the role. A member of the SPD for a rather long time, he is widely committed to upholding the values of democracy and liberty.\n\nHe was born in '56 in Detmold, as he studied law and political science, eventually earning a doctorate in law. He began his long career in politics in the 1990s as an advisor to Gerhard Schröder, first in the state of Lower Saxony and later in Berlin, where he became Chief of the Chancellery, helping Agenda 2010's welfare and labor reformations.\n\nHe served as Foreign Minister twice, working under Chancellor Angela Merkel, as he led various negotiations with major nations such as Russia, Iran, and the EU. He also served as Vice Chancellor and led the opposition in the Bundestag.\n\nSteinmeier has used his office to defend liberal democracy. While not a headline-seeking figure, he is known as a household name in German life."
 GER_EUROCOMMISSION_DESC: "Constitutional Treaty of Berlin; Ti. V, Ch. 3, Art. 174:\n'The Commission is the supreme governing and executive authority of the Federation. The Commission has seven members. The members of the Commission are elected by the Parliament following each general election... for a term of office of four years. The Executive power is based on and derives its democratic legitimacy from a majority in the Parliament.'\n\nThe European dream nearly died in silence. When Russia's tanks rolled across the plains of Europe and missiles tore the sky, the European Union stood on the edge of total collapse. But from the devastation of the War, a new order has emerged.\n\nNo single head of state or government leads the European Union. No strongman delivering speeches or commanding armies. Instead, it is governed collectively by the European Commission, a supranational body charged with defending the Union's ideals, now more than ever. The Commission, and the Union as a whole, have walked a narrow tightrope between national sovereignty and ambition, ever since the Commission was initially established by the Treaty of Lisbon. Critics call it unaccountable, a cold engine of globalism. Supporters see it as the last, greatest hope for a Europe that can stand on its own.\n\nNow, with Europe having cast aside the head of state and placed itself fully at the mercy of Brussels, the Commission finds itself in uncharted land. With institutions centralized and the Commission's authority vastly expanded, it is no longer just a minor organ. It is the de facto government of more than 200 million citizens.\n\nThis experiment is not led by any one man or woman, but by a system. It may be the last of its kind. If it falls to the Russians again, Europe will fracture again. Perhaps for the last time."
 GER_FEHLINGER_DESC: "Gunther Fehlinger-Jahn has built a career no man could have predicted, one tweet at a time. Born in 1968, he was set to lead a traditional Austrian life: gymnasium education, a brief stint as a lieutenant in the Austrian Bundesheer, and nearly a decade at the Vienna University of Economics. But Fehlinger was never content to remain within the boundaries of conventional life. In Brussels, where he worked during the chaotic years after Maastricht, he grew more and more enamored to the grand ideas of liberal democracy.\n\nIn an era where leaders rise through the institutions, Fehlinger built his power in secret, through his unfiltered expression and unwavering belief in a strong and united Europe under NATO's wing. As president of various NATO advocacy committees and Balkan integration groups, he tirelessly championed the expansion of the alliance, and warning Europe time and time again to fight the Russians tooth and nail. For all his institutional ties, however, Fehlinger is better known for his infamous presence on social media. In clipped, often broken English, he issues fiery proclamations, half diplomatic memo, half messianic fervor. Some see in him a visionary. Others, a delusional crank.\n\nHistory, however, would eventually prove Fehlinger right.\n\nWhen Medvedev's armies were unleashed upon Eastern Europe, the continent and the world looked to Brussels for leadership, and found indecision. In this vacuum, Fehlinger has emerged not as a politician, but as the leader of Free Europe. He had warned of this moment for years. The madman is now the strategist. Fehlinger has  transformed Brussels into a bastion of an anti-Russian crusade, vowing to liberate the East and dismantle the Russian nation itself. He doesn't promise Europe peace; he promises war, and victory.\n\nTo him, this war is the endgame between democracy and tyranny."
 GER_SCHWAB_DESC: "Born in Württemberg in 1938, Klaus Schwab was the son of a Swiss industrialist with deep entanglements in the Nazi war machine. His early education was divided between the tranquility of Zürich and the recovering ruins of postwar Germany. His academic trajectory was precise and deliberate. By the 1960s, he held doctorates in both engineering and economics, and a master's from Harvard, where he was mentored by Henry Kissinger. Schwab began teaching business policy in Geneva, but his true legacy would emerge when in 1971, he founded the European Management Forum, an annual summit where billionaires, technocrats, and world leaders could converge to discuss the future. It would later evolve into the organization that now rules Europe under an iron fist.\n\nSchwab founded the World Economic Forum in 1971 with a singular mission: to cultivate the minds that would "shape global, regional, and industry agendas". For decades, he has played the long game: quiet conferences, networking, and countless white papers on the fusion of state and the market. Most dismissed him as a harmless futurist. Fools.\n\nKlaus Schwab spent his life whispering into the ears of prime ministers and presidents, but he has finally stepped from the shadows. As the Commission invites the WEF technocrats to assume control, Schwab offers the culmination of his life's work: under Agenda 2040 and the Fourth Industrial Revolution, Europe will be rebuilt; not for humans as they are, but for what Schwab insists they must become. Only one question remains:\n\nAre you ready?"
 GER_BYUNG_CHUL_HAN_DESC: "Byung-Chul Han is most known for being a cultural theorist and philosopher, prominent in his critique of neo-liberalism and the effects of capital on human society as a whole.\n\nHan has written over thirty books, all of them deconstructing modern life in one way or another, his feelings toward the totalitarian nature of the society of transparency which is something that has become a tool of power in neo-liberal market forces where voluntary openness is worshipped above every other social norm.\n\nWith the failures of Die Linke and the downward death spiral of capital, it would be without a doubt that people would seek alternatives and not necessarily in the opposite direction of the political spectrum.\n\nHan has never been open about his personal life and with his recent change of career that does not seem to change, with the leadership of Germany in his and his co-philosophers and experts it would be without a doubt that constant change is inevitable.\nSelf-exploitation, pressured disclosure, the zealous devotion to capital will all become things of the past, a past one would never want to return to.\n\nThe great fatigue has ended, the time for vitality is now."
 GER_ARMSTROFF_DESC: "Klaus Armstroff was born in 1957 in the former East Germany. After German reunification, he settled in Weidenthal, Rhineland-Palatinate. He worked as an electrician for some time, before succumbing to a wing of radical far-right thought many of his countrymen were experiencing at the moment. Thus, he joined the NPD and from 2009, he served as a member of the district council in Bad Dürkheim and held a leadership role in the NPD's Rhineland-Palatinate state board. However, he grew to hate the internal and ideological disputes the party had grown to embody. Thus, in 2013 he abandoned the NPD, forming a party of his own. Der III. Weg. A party far more open to socialist thought, embracing a national revolutionary stance, continuing Otto Strasser's legacy.\n\nHis party would enjoy limited success, at least until the European War ravaged the European continent, forcing the Eastern European peoples to follow communism once more. As a result, when public confidence on the Government collapsed, military hardliners launches a coup. However, they would soon discover their goals, other than their hatred for communism, were very much divided. Klaus and his party emerged as a strong voice to unify the junta amidst this chaos. Thus, they elevated him to the position of Federal Chancellor.\n\nNow that he has full control over Germany, his vision on a militant, anti-capitalist, strasserist Germany is only a matter of time. What isn't a matter of time is how his reforms will pan out in the long run and how they'll be seen by the Kremlin."
 GER_BUNDESTAG_DESC: "For the first time in our history, the president of the Bundestag has been assassinated. Due to this, the process we have selected is following Article 57 of the Grundgesetz, which states power shall be transferred to the German federal parliament. For the time being, the body shall collectively restore order to Germany as in the meantime the federal conviction prepares emergency presidential elections in 30 days.\n\nHowever, with our already polarized society, no one expects the Bundestag to do much in these times. All it can do is try everything it can to promote stability for an already radicalized population. However, fighting within the parliament itself makes this task increasingly hard, combined with the fact that seemingly no German politician has any support from the common folk.\n\nAll we can do is prepare for these elections, but with riots across our entire nation and our military refusing to follow our orders, these trials won't be easy."
 GER_FRANZ_DESC: "Born in 1978 in Völklingen, Saarland, in what was then West Germany, Frank Franz grew up in a reunified Germany marked by political division and economic uncertainty. In these times, some Germans turned to radical movements which promoted "better alternatives" to the current administration. Franz was no different. He joined the NPD in the early 2000s and later rose to lead the party during its decline. With a talent for rebranding extremism in more palatable terms, Franz pushed for a new political image, one rooted in traditionalism, order, and cultural revival.\n\nThough unpopular amongst the public, Franz remained active in far-right circles, quietly building ties within the military and nationalist groups. He found his moment of triumph soon after the European War had ended. NATO's failure to contain Soviet advances in Eastern Europe led to mass disillusionment amongst the tired populace. Thus, they turned to more radical ideas.\n\nSoon after the Bundestag fell into chaos, the military, blaming Berlin's indecision and weakness, launched a swift coup. Promising to restore sovereignty and strength, they turned to Franz, who was seen as a figure of resolve and national unity by many. Backed by officers, paramilitaries, and a desperate public, he was appointed Chancellor under emergency powers. Now, Franz has total authority over his Heimat. Whether he chooses to align himself with similar movements across much of Europe or take a turn to the past is up to his will."
 GER_HEINRICH_DESC: "Despite having been a quintessential part of German history, the monarchy is something many Germans have passed away from. And it's true that, over the past century, there hasn't been any influence from German aristocrats over the nation. But Heinrich XIII Prinz Reuß planned to end that reality. Born in 1951 into the House of Reuss, Heinrich XIII grew up with a deep reverence for Germany's imperial past. He adored his noble title and as such grew to distrust the German democratic establishment. A successful businessman in his early life, Heinrich withdrew from the public eye in the 1990s, turning instead to monarchist circles and conspiracy-laden movements. By the 2020s, he had become a central figure among Germany's aristocratic underground, viewing himself as the God-chosen head of state of Germany, a view Germany had followed through most of its history.\n\n As NATO unraveled under the weight of a catastrophic war with the revived USSR, Germany plunged into crisis. Russian victories in Eastern Europe, economic turmoil, and waves of refugees shattered public confidence in the government. Amid the chaos, military hardliners launched a coup, ousting civilian leadership in Berlin.\n\nSearching for a unifying figurehead with historical legitimacy, Heinrich XIII emerged as the head of state. Though controversial, his noble lineage and calls for national renewal resonated with a public exhausted by instability. Soon after, the dying republic was dissolved. In its place, Germany reached back to its imperial roots. A grand coronation was organized to which some of the other world's remaining monarchs attended. Many wonder what this may mean for Germany, but with the Junta's leaders remaining, war with the Soviets seems inevitable, just that the aesthetic has changed."
 GER_OTTE_DESC: "Max Otte is no ordinary political figure. This 60-year-old economist and astute analyst, born in 1964, has navigated a turbulent yet fascinating path through Germany's political landscape. Although he is officially a member of the CDU, his views veer significantly further to the right.\n\nUsing his considerable financial influence, built through hedge funds and private deals, Otte has repeatedly lent support to the AfD, both ideologically and materially. His bestselling books, some of which eerily predicted the 2008 financial crash, have cemented his reputation as a prophet of economic collapse.\n\nAgainst the backdrop of the migration crisis, American unrest and mounting tensions with Russia, Otte has emerged as a "dark horse" candidate in the elections. In uncertain times like these, perhaps Germany needs precisely such a figure to restore stability — and hope."
 GER_DIETMAR_DESC: "Though no longer young, Bartsch appears youthful compared to some of the elder statesmen dominating global politics. And just like them, he has no shortage of controversies trailing behind.\n\nBorn in the GDR and still loyal to many of its principles - albeit adapted for modern times - Bartsch was once the editor of a socialist newspaper and even trained at the Academy of Social Sciences under the CPSU in Moscow.\n\nA classic left-wing politician, he strongly opposes globalization and militarism. Yet, as shown in the infamous "Lafodödel case" he's also not above borrowing tactics from the right when it suits him. Surrounded by some mystery and contradictions, Bartsch continues to operate with quiet persistence - and shows no signs of shifting course."

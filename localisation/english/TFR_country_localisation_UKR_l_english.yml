 #Events
 ukraine.1.t: "Ukraine Violates Minsk Protocol"
 ukraine.1.d: "The Ukrainian government has violated the peace agreement with the Federal State of Novorossiya and permitted Ukrianian army units to once again begin border clashes."
 ukraine.1.o1: "A wreckless endeavour"
 ukraine.1.o2: "Annul the agreement! Victory or death!"
 ukraine.2.t: "Ukraine Airlines Flight 752 Shot Down over Iran"
 ukraine.2.d: "The Iranian government has informed us that members of the Iranian Republican Guard Corps have accidentially shot down one of our airliners. The civilian jet which took off from Imam Khomeini International Airport was hit by a surface to air missile. All 176 passengers perished."
 ukraine.2.o1: "Horrible tragedy!"
 ukraine.3.t: "Russia Condemns Ukrainian 'Neo-Nazism'"
 ukraine.3.d: "In their latest attempt to undermine our government and portray their illegal occupation of Crimea and Donbas as justified, the Russian government has launched another wave of baseless accusations against us. Using their state propaganda networks like RT and Sputnik, their politicians and pundits have smeared President Zelensky's administration of being 'corrupt gangsters', 'neo-fascist Banderites', and 'the grandsons of Hitlerite collaborators'. \n\nWhile they may be correct about the existence of a few overzealous elements within units like the Azov Battalion, the other claims are flimsier than Putin's claims of democratic legitimacy! They're resorting to their old propaganda tricks, smearing any Ukrainian who fought against the Tsar or the Soviets as a foreign puppet or fascist madman. We shall not stand for this latest case of slander, and we shall call upon the rest of the world to condemn the Russians' blatant lies!"
 ukraine.3.a: "They may claim history is on their side, but it will vindicate us!"

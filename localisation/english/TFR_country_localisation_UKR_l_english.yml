 UKR_far_right_meddling: "Far-Right Meddling"
 UKR_far_right_meddling_desc: "Ever since Maidan, our government was heavily infiltrated by right-wing elements and politicians. Police force and Army are the most influenced structures, with army having state-sponsored far-right battalions under patronage of various government officals and some oligarchs. It also helped Kremlin in its claims of our "crypto-fascist" nature, giving them carte-blanche on supporting separatist russian scum in Donbas. We must either embrace our more radical compatriots or put their influence down for good"

 #Ideas
 UKR_corrupt_army_staff: "Corrupt Army Staff"
 UKR_corrupt_army_staff_desc: "It is a sad fact that the upper brass of our nation's armed forces is no stranger to corruption. Bribery, be it on-duty or within our own military academic processes run rampant, in addition to a whole other myriad of issues that often leave many of those in our high command seeking personal enrichment rather than properly serving the nation to the best of their ability. As a result, this has gutted the overall efficiency of our army staff which, in turn regrettably reflects upon the army's performance as a whole."
 UKR_government_corruption: "Ukrainian Oligarchate"
 UKR_government_corruption_desc: "Various oligarchic clans have run their influence rampant within our governing institutions for quite some time now. Underhanded facilitation payments, bribery, extortion, and other abuses of power are widespread within our nation's public officials. Despite the already existing anti-corruption legislation we have in place, a weak justice system and poor economic conditions render the enforcement of these laws highly difficult, if not outright impossible in some cases."
 UKR_minsk_protocol: "Minsk Protocol"
 UKR_minsk_protocol_desc: "\n\n\n\n£GFX_UKR_minsk_protocol\n\n\n\n\n\n\nIn 2014 and 2015, our government came to an agreement with both the Russian Federation and the OSCE in order to halt any further major fighting with the separatists in the Donbas region. Whilst the fighting has since inevitably picked up once again, there are set directives in place by said agreement to minimise both the scale of the fighting as well as the damage inflicted upon either combative force. The removal of all long-range artillery equipment from the designated region, in addition to the cessation of further offensive hostilities against the rebels remain the two primary requirements of the updated Minsk II protocols in which we signed off upon. We will abide by these protocols, and halt any more attacks against the Russian separatists."
 UKR_mass_insurgency: "The Donbas Conflict"
 UKR_mass_insurgency_desc: "With the breakaway states of the Donetsk People's Republic and the Luhansk People's Republic, these two illegal states have launched campaings against us aiming to 'free' the Russian minorities within the lands of Ukraine. And in their effort, have formed insurgent groups to fight our armed forces which has proven effective against us."
 UKR_embargoed_economy: "Embargoed Economy"
 UKR_embargoed_economy_desc: "With the hostile Russian seizure of Crimea, our trade with the world has been crippled. Without access to the large port of Sevestapol, our ships have no large hub to load and ship goods, leaving our export economy in shambles."
 UKR_ukrainianrussian_church_schism: "Orthodox Church of Ukraine"
 UKR_ukrainianrussian_church_schism_desc: "In October 2018, after a resolution by the Holy Synod of Constantinople confirming its intentions to grant independence to the Eastern Orthodox Church of Ukraine. Seen largely as a political move after the Russian Orthodox church excommunicated several members of the Ukrainian clergy, the schism between Constantinople and Moscow formally begun on the 15th when the Holy Synod of the Russian Orthodox Church barred all members of the Moscow Patriarchate from taking part in communion, baptism and marriage. The end result of this has resulted in a debate over the status of the Orthodox Church in eastern European politics, and has been largely viewed positively by the Ukrainian populace who see this as another step for Ukraine's independence from Russia - even if it has contributed to tensions between the two states."
 UKR_novo_conflict: "§YWe will abide by these protocols and halt anymore attacks against the Russian Separatists.§!" 
 UKR_to_the_last: "To the Last..."
 UKR_to_the_last_desc: "The invader will pay for every inch of land!"

 ptf.83.t: "Formation of the Second Continental Army"
 ptf.83.d: "Revolutions are not carried out with sweet words and grand promises, no, only fire and steel can provide the means to bring forth great change.\nThe same way our forefathers fought the tyrant, with an army forged from the brave and the bold, we will drive the agents of global capital into the ocean.\n\nThe same way Washington led the greatest people on earth to victory, so shall we pull the downtrodden from the mud of nihilism to elevate them to greatness, through trails of fire.\nLife, purpose, brotherhood.\n\nOld America is burning, we will keep the torch of a new America lit.\nA new continental army will be created through strife, reborn and pure."
 ptf.83.a: "Reclaim America!"

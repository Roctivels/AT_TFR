l_english:
 #Focus
 #Legacy
 PTF_blood: "Blood"
 PTF_blood_desc: "Before the Second Civil War, our organization was mainly an activist group. However, in response to the nationwide rioting and failures of the government, it was deemed necessary to begin militarizing our group. Now that Federal authority has collapsed in New England, we stand ready to face our enemies on the battlefield. Armed from military stockpiles and private owners, our militias shall march through New England and reclaim it from our enemies. However, it will eventually be necessary to reform the militia structure of our army. Doing so will ensure we can make a stand against the Federalists."
 PTF_spread_our_propaganda: "Spread Our Propaganda"
 PTF_spread_our_propaganda_desc: "\"Propaganda\" may seem like a dirty word, but it is because of our organization's ability to spread our message that we have become the most renown dissident right group in America. We must now broadcast a nationwide call to arms, so that we may rally all people under our rule to fight for a new America!"
 PTF_a_new_minutemen: "A New Minutemen"
 PTF_a_new_minutemen_desc: "During the American Revolution, it was said that the militias were so prepared that they might be ready for battle with a minute's notice. We must also have this speed and preparedness, our very survival depends on it! Militias will be formed in our territories, and they will be trained in the tactics that the patriots were so many years ago."
 PTF_the_boston_offensive: "The Boston Offensive"
 PTF_the_boston_offensive_desc: "Once a thriving city representing the very peak of American pride and culture, Boston has been taken over. The Iron Front, a broad coalition of liberals and anti-American communists, has taken over the city and the surrounding area. Their poisonous tentacles threaten to spread all across New England and corrupt it with their treasonous ideas. Like the British during the Revolutionary War, we will march our armies into the streets of Boston. No mercy will be granted, and the demons will be exorcised from the sacred city once and for all. And once we are done, Boston shall be restored to its former glory."
 PTF_target_the_common_man: "Target the Common Man"
 PTF_target_the_common_man_desc: "The Patriot Front was born out of ordinary men and women who saw through the facade of the American government and dreamed of something greater. The time is now for all people to take up arms and serve their God, nation, and family, so that we may truly be free."
 PTF_target_dissatisfied_veterans: "Target Dissatisfied Veterans"
 PTF_target_dissatisfied_veterans_desc: "While popular support is important, it's not going to win us a war. What we need is people that know how to fight. Many veterens in America do not share the neoliberal sentiment of the previous government and are ashamed of what the nation they fought for has become. We must show them that their sercive meant something, and that there is still an America worth saving. "
 PTF_stabilize_frontlines: "Stabilize Our Frontlines"
 PTF_stabilize_frontlines_desc: "To fight a prolonged war, it's necessary to have a stable front, so that men and supplies may be moved easily and that organization becomes feasible. We will end sporadic fighting and hit-and-run tactics and use more evolved methods of fighting."
 PTF_for_the_nation_against_the_state: "For the Nation, Against the State"
 PTF_for_the_nation_against_the_state_desc: "For most of the 21st century, the greatest enemy of the American people has been the state itself. Governments that once stood for the people now only stand to enrich themselves while disregarding the needs of those who voted for them. This became more apparent with the start of the Second Civil War, with state governments failing to stop armed groups such as the Green Mountain Anarchists and the Sons of Liberty from completely taking over Vermont and New Hampshire. As our forces sweep New England, we will rectify these egregious failures. Justice will be swift, and no mercy will be granted to the greedy. If they are not with us, then they are against us."
 PTF_better_dead_than_red: "Better Dead Than Red"
 PTF_better_dead_than_red_desc: "Like the rest of America, New England was not spared from the growing chaos of the Second Civil War. Anarchists, libertarians, ethnic militias, all of these groups used the chaos of the Civil War to carve their fiefdoms. They spread their poisonous ideas of communism, libertarianism, and ethnic nationalism, all of which are incompatible with our movement. If we wish to preserve the sanctity of our revolution, we must crush these groups as fast as possible. We will show the people that their so-called liberators are nothing but false idealists. Our solution is New England's solution. And anyone who disagrees is against us."
 PTF_international_volunteers: "Open up to International Volunteers"
 PTF_international_volunteers_desc: ""
 PTF_expand_training_camps: "Expand Will2Rise Training Camps"
 PTF_expand_training_camps_desc: ""
 PTF_prioritize_veteran_recruitment: "Prioritize Veteran Recruitment"
 PTF_prioritize_veteran_recruitment_desc: "There is no better demographic to recruit from than those who have already served. We will have a propaganda campaign targeting veterans so that we may have a more experienced military."
 PTF_crusaders_for_a_new_america: "Crusaders For A New America"
 PTF_crusaders_for_a_new_america_desc: "America is lost. Its leaders reject the very patriotism that built it up. Constantly, they shell out to corporations and globalists. While willfully neglecting the needs of the people they’ve sworn to protect and serve. But with us, things shall be different. No more will the people go hungry. No more will they be jobless or homeless. Like the Crusaders, we march to reclaim America from the traitors. Our country is being poisoned, and we cannot sit back and let it continue to be poisoned. If we are not claiming the mantle of America, then one of our enemies shall."
 PTF_scrape_toghether_an_airforce: "Scrape Together An Airforce"  
 PTF_scrape_toghether_an_airforce_desc: "The suggestion of building an air force has been laughed at by some, but we still view it as a valuable investment. We will scrape together an Airforce with whatever we have, and while it may not be the best, it will have to suffice for now."
 PTF_small_arms_requisition_program: "Small Arms Requisition Program"
 PTF_small_arms_requisition_program_desc: "America is a very unique nation when it comes to private firearm ownership. The Second Amendment, penned by our forefathers, allows the ownership of guns by the common citizenry. Many gun nuts have used this as an excuse to stockpile firearms, not just civilian, but military grade too. Our movement needs guns and needs them now. Ultimately, it has been deemed necessary to begin a mass requisition of firearms from private owners. While this may be controversial, it is ultimately a mandatory evil. Besides, if they don’t enlist, they can still be an asset to our revolution."
 PTF_an_elite_officer_corps: "An Elite Officer Corps"
 PTF_an_elite_officer_corps_desc: "For all of its existence, the American military has been defined by the strategic brilliance of its officer corps. Unlike some other nations, officers in our military are very flexible in the field, allowing us to win even in the most challenging of scenarios. As part of our army reform plan, we will apply these ideas to our officer corps. While they will still need to follow orders from high command, giving officers greater freedom on the battlefield is a necessary change. This allows them to adapt faster on the battlefield and gives them opportunities to move up the ranks. With time, this will help mold the officer corps into the efficient fighting force it was for our forefathers."
 PTF_study_new_tactics: "Study New Tactics"
 PTF_study_new_tactics_desc: "War is a constantly changing game. Tactics are invented, tactics become obsolete, and everything changes on the battlefield. They were once soldiers engaged in trench warfare, defeating their enemies through attrition. Now, soldiers engage each other away from the battlefield through drones and cyber warfare. If we want to ensure our survival, we must get with the times. Embrace the new era of warfare. And everything it brings. Because survival in these chaotic times relies entirely on our ability to adapt."
 PTF_forged_in_fire: "Forged in Fire"
 PTF_forged_in_fire_desc: "With the collapse of the union, conflict is the one thing there’s no shortage of. Despite former law enforcement, veterans, and deserters joining the ranks, the new minuteman is green and untested. Even so, we have achieved major success in securing a base of operations and further advances at the front. With time and experience, the army will become the best on the continent, able to face any force of corruption or bolshevism thrown at them. For now, we must work with what we have and pursue that better tomorrow."
 PTF_construct_a_mechanized_corps: "Construct A Mechanized Corps"
 PTF_construct_a_mechanized_corps_desc: "We stand alone, surrounded by Goliaths. Armies, which are equipped with far better equipment and vehicles than ours are. To survive we must catch up to them, thus we will begin organizing mechanized infantry units so that we may compete."
 PTF_call_for_mass_mobilization: "Call for Mass Mobilization"
 PTF_call_for_mass_mobilization_desc: "Like in 1776, our new revolution is fundamentally a revolution of the people. Our movement, too, was born from people who felt dissolution from the federal government. Our victories across New England have attracted more people to our cause. It is only natural that we allow these eager patriots to join our revolutionary cause. Some will argue that it’s best to maintain strict protocols and only accept the best. We know the truth. The revolution will not be complete until we welcome the masses of patriots who are eager to fight on our side. And mass mobilization is the first of many steps toward this goal."
 PTF_establish_strict_training_protocols: "Strict Training Protocols"
 PTF_establish_strict_training_protocols_desc: "Unlike past revolutions, simple human wave tactics cannot work in the age of advanced warfare. Tanks, drones, cluster bombs, all of these things, and more would turn any full frontal assault into a massacre. Our cause demands the best of the best from our soldiers. If our men are to defeat the soldiers of the Union’s army, then stricter training regimens must be implemented. Our soldiers must be warriors, learn to hit their shots and hold their own against the enemy. With time, conscripts will become warriors, and these warriors will march across America. Casting down the governors and autocrats and raising our flag high above the nation."
 PTF_lessons_from_ne: "Lessons from The Liberation of New England"
 PTF_lessons_from_ne_desc: ""
 PTF_use_our_fanaticism: "Use Our Fanaticism"
 PTF_use_our_fanaticism_desc: "We may be outnumbered, we may be outgunned, but this matters not! Our passion and resolve are more powerful a weapon than any fleet or army on earth. We will further instill deep zealotry into the hearts of our men, and it will prove to be a better investment than any material one could possibly be. The triumph of will will bring upon a new era!"
 PTF_american_blitzkreig: "American Blitzkrieg"
 PTF_american_blitzkreig_desc: "To win the battles of the future, we must learn from the battles of the past, and suit these lessons to the circumstances we find ourselves in. We will learn from the Blitzkrieg tactics of the Wehrmacht, and use them to cover the large swaths of land in America quickly, and to overwhelm our enemies before they can even fire a shot."
 PTF_the_rousseau_line: "The Rousseau Line"
 PTF_the_rousseau_line_desc: ""
 PTF_rebuiling_federal_bases: "Rebuilding Federal Bases"
 PTF_rebuiling_federal_bases_desc: ""
 PTF_vanguard: "Vanguard"
 PTF_vanguard_desc: "America is poisoned. The liberal establishment fights tooth and nail to rip up traditions long entrenched in our history. Even conservatives pander to corporate interests and hyperconsumerism while claiming to want to preserve American traditions. The beginning of the Second Civil War has given us a one-in-a-lifetime opportunity. Like our forefathers in 1776, we will take up arms to tear down the tyrants and despots. Under the command of Thomas Rosseau, our army shall march from sea to shining sea. Liberals, conservatives, communists, all shall be crushed under our might. Under our banner, America shall rise again, free from the shackles of the establishment and elite."
 PTF_the_next_washington: "The Next Washington"
 PTF_the_next_washington_desc: "Washington, the greatest hero of the revolution, would scoff at the state this once great nation is in. The liberal order craps on what America used to be. The constitution is spat upon. The globalists use and abuse our resources. The social justice warriors distort the moral fabric of America. America needs a new leader, a strong leader. One who does not bend to the bullying this nation has endured and will endure once the smoke clears. This leader will be Rousseau. He who will bring America back to greatness, back to morality, back to what it was promised to be!"
 PTF_a_big_tent_party: "A New Columbia"
 PTF_a_big_tent_party_desc: ""
 PTF_invite_traditionalist_thinkers: "Leaders of The New America"
 PTF_invite_traditionalist_thinkers_desc: ""
 PTF_a_new_fascism: "A New Fascism"
 PTF_a_new_fascism_desc: "Fascism: the most misunderstood ideology in the western world. Even after liberation, dissenters within our territory still do not understand the virtues of these ideals; the ideals that will reclaim America for them. For any chance of appealing to the common masses, fascism must be reborn. Reborn to hold the values that made America the greatest nation on earth whilst still retaining the core of fascism."
 PTF_loosen_ideological_requirements: "Rebuilding the American Right"
 PTF_loosen_ideological_requirements_desc: " "
 PTF_reasses_the_republic: "Reassessing The Republic"
 PTF_reasses_the_republic_desc: "A revolution is a time of great restructuring, and this applies to our form of government as well. We must evaluate the republican system and values, and see if it really aligns with those of Patriot Front."
 PTF_chairman_rise: "Rise for the Chairman"
 PTF_chairman_rise_desc: "."
 PTF_appeal_to_the_white_worker: "Empowering The American Man"
 PTF_appeal_to_the_white_worker_desc: ""
 PTF_ensure_military_loyalty: "Ensure Military Loyalty"
 PTF_ensure_military_loyalty_desc: ""
 PTF_depoliticize_the_military: "Depoliticize the Military"
 PTF_depoliticize_the_military_desc: ""
 PTF_purge_subsersive_elements: "Purge Subversive Elements"
 PTF_purge_subsersive_elements_desc: ""
 PTF_unite_the_dissident_right: "Unite the Dissident Right"
 PTF_unite_the_dissident_right_desc: "Within our movement, internal struggle is abundant. Many dissident groups wish to warp our movement into something that can’t even be called ’patriotic.’ Such as confederates and more, all of which are working to overhaul our revolution. This is unsustainable, in the interest of pacifying these dissidents, we must unite them peacefully."
 PTF_americas_salvation: "America's Salvation"
 PTF_americas_salvation_desc: "It’s finally happened! Every second of the liberal boot stamping on our throat, every moment that the globalists abused our country, and every time those who were too scared to see the truth laughed at us led to this exact moment. No longer will we allow our great nation to be bullied. No longer will the European elitists interfere with our resources. No longer will those dedicated to social justice plunge our country further into degeneracy. All because of Rousseau, the banner of the fasces flies high above our capital. Millions have been liberated. And now, the real work begins."
 PTF_transfer_power_to_congress: "Transfer Power to Congress"
 PTF_transfer_power_to_congress_desc: "It’s time! The liberation of America has arrived. Our capital is shaken by the cheers and singing of millions. Congress will take back the power. The guidance of Rousseau has given us so much virtue and conquest. But now, it is time for the power to be given to the people. The ideals of checks and balances is what the founding fathers would have wanted. They look down at us and smile at our virtue, at our revolution. The Second American revolution has come, and the future’s looking good."
 PTF_distribute_the_manifesto: "Distribute The Manifesto"
 PTF_distribute_the_manifesto_desc: "For a revolution to be successful, the public and party alike must be educated in its ideals and political platform. An effort will be made to distribute our manifesto to the public. We will ensure that our words will be heard by all who can listen."
 PTF_intensify_the_white_struggle: "Intensify the Fascist Struggle"
 PTF_intensify_the_white_struggle_desc: ""
 PTF_second_constitutional_convention: "The Second Constitutional Convention"
 PTF_second_constitutional_convention_desc: ""
 PTF_ideological_propoganda: "Ideological Propaganda"
 PTF_ideological_propoganda_desc: ""
 PTF_expand_the_partys_role: "Expand the Party's Role"
 PTF_expand_the_partys_role_desc: " The role of the party does not have to be exclusively political. It can make itself known in all facets of life, and in doing so, will imbed itself into the social and home lives of the people as much as it has their political lives."
 PTF_class_collaborationism: "Class Collaborationism"
 PTF_class_collaborationism_desc: ""
 PTF_our_manifest_destiny: "Our Manifest Destiny"
 PTF_our_manifest_destiny_desc: ""
 PTF_patriotic_democracy: "Hail to the Chief"
 PTF_patriotic_democracy_desc: ""
 PTF_honor_the_senate: "Honor the Senate"
 PTF_honor_the_senate_desc: ""
 PTF_all_american_boy_scouts: "All American Boy Scouts"
 PTF_all_american_boy_scouts_desc: ""
 PTF_safeguard_our_democracy: "Safeguard Our Democracy"
 PTF_safeguard_our_democracy_desc: ""
 PTF_safeguard_our_nation: "Safeguard Our Nation"
 PTF_safeguard_our_nation_desc: ""
 PTF_state_of_the_union: "State of The Union"
 PTF_state_of_the_union_desc: ""
 PTF_soil: "Soil"
 PTF_soil_desc: "America was once the leading industrial power in the world. Our factories churned out the trucks that helped save the Red Army from collapse. Our farms saved Britain from starvation. Now these once-booming factories are left to rust and decay as the establishment offshores American industry to China, all because it is "cheaper". No more will the factories of New England lie dormant. Our war effort demands bullets, and the people demand nourishment. New England will once again become a booming hub of industry and commerce, providing much-needed fuel for our campaign to secure America."
 PTF_the_new_american_man: "The New American Man"
 PTF_the_new_american_man_desc: "This revolution is not just to change the country politically, but to reforge what it means to be an American. We will undergo a propaganda effort to begin reshaping the American public and bring them out of the pits of degeneracy where they once wallowed."
 PTF_national_revival: "Kneel to the First Consul"
 PTF_national_revival_desc: ""
 PTF_denounce_the_church: "Morality of Man and Behavior" 
 PTF_denounce_the_church_desc: ""
 PTF_fight_factionalism: "Fight Factionalism"
 PTF_fight_factionalism_desc: "The Patriot Front has come to house a large portion of America's dissident right. From white nationalists to disgruntled conservatives many have gathered under our banner, all with their own ideas on how to make policy. We must ensure that above all else they are all working together for the good of the nation, and united under a common vision."
 #Military
 PTF_one_nation_one_solution: "One Nation, One Solution"
 PTF_one_nation_one_solution_desc: "The American people have been thrown to the wolves. All across our shattered nation, opportunists, gangs, and extremists claim to be the saviors of the people, but we know the truth. Our solution is the national solution. We alone shall reclaim America and save her people from damnation. There is no room for mercy, no room for compromise. If you are not with us, then you are against us. We alone are America's salvation. We alone are America's future. Under Thomas Rousseau, our vengeance will be enacted upon our enemies, and we will not rest until we alone have emerged triumphant."
 PTF_form_the_national_front: "Form the National Front"
 PTF_form_the_national_front_desc: "Since the Unite the Right rally in 2017, our organization has fostered symbolic ties with various nationalist groups across America. These connections allowed us to befriend groups such as the NSM. And League of the South. As the Civil War devolved into chaos, it is time that the American right united again. With an alliance with the NSM, we will coordinate combined offensives against Biden. And as we sweep across the nation, our alliance shall grow further as we come to the aid of other nationalist groups."
 PTF_operation_scipio: "Operation: §YSCIPIO§!"
 PTF_operation_scipio_desc: "The Union of America, the so called "true America", the very representation of the neoliberal establishment and elite. Their poisonous ideas have spread far enough, and their attempts to uproot the very foundation of America's traditions must stop. Our soldiers and tanks will march upon D.C. The tyrants shall be torn down from their ivory towers. No mercy shall be spared for the treasonous liberals and leftists. The people shall be saved from their demonic ideas, Washington shall be restored to its past glory. No longer will congress be a place of bickering, no longer will it be a place were anti American legislation is passed. Washington will be saved, or it will be burned to the ground."
 PTF_operation_leonidas: "Operation: §YLEONIDAS§!"
 PTF_operation_leonidas_desc: "Once one of the most prosperous regions of America, the Rustbelt is now a shell of its former self. Despite its dilapidated nature, radicals continue to pick at its decaying corpse. Gangs, Opportunists, and the NSM. All continue to drive this once-thriving region into the ground while the people are abandoned. We will not sit idly by and allow this terrible injustice to continue. The once beating hard of American industrial might will be revived once again. Our vengeance shall crash like a great wave onto the vultures. None will be spared from our righteous vengeance. And as we march, we shall save the people from decay, once and for all."
 PTF_operation_alexander: "Operation: §YALEXANDER§!"
 PTF_operation_alexander_desc: "Trump represents everything wrong with the modern American right. While he claims to be a defender of faith and family values, he openly courts the support of corporations and encourages reckless consumerism. He and his MAGA followers have turned the once-shining heartland of America into a place of abandoned promises and broken dreams. The values that once drove Americans to settle west are being abandoned day by day in favor of the false promises of a man who claims to be the savior of America. No longer will this be the case. As we march, we shall cast down Trump and his false prophets. The heartland will beat once more, the people will be saved, and true Arcadia will be restored. "
 PTF_operation_pompey: "Operation: §YPOMPEY§!"
 PTF_operation_pompey_desc: "While California has always been a breeding ground for degeneracy, the outbreak of the Second Civil War has only made this more apparent. Emerging from the Bay Area, the APLA represents everything we seek to crush. Their soldiers oppress the common man while spouting their demonic Marxist rhetoric. Their commissars deprive people of fundamental freedoms in the name of the "revolution". They allowed communist powers such as China and even North Korea free entry, letting their influence spread like an incurable plague. We will march on California and exorcise these demons once and for all. No mercy will be given, no bargains will be accepted, and the very idea of communism will once again be thrown into the sea, along with the people who support it."
 PTF_unify_nationalist_militaries: "Unify Nationalist Militaries"
 PTF_unify_nationalist_militaries_desc: "Despite our recent efforts to work closer with the NSM, we are still divided. If this is allowed to continue, then our inevitable war with the Union will be plagued with issues and will inevitably lead to our destruction. To prevent this, we will begin unifying our armies under a single joint command structure. This will allow us to share intelligence and coordinate attacks with our allies in Michigan. Additionally, this permits us to coordinate offensives once we begin our assault on Biden. Allowing us to prevent our offensives from being stalled."
 PTF_coordinate_nationalist_economies: "Coordinate Nationalist Economies"
 PTF_coordinate_nationalist_economies_desc: "Economics is the backbone of any strong alliance, and this is very true in our situation. While New England does not possess much in terms of industrial capacity, the same cannot be said about our allies in Michigan. While most of Michigan's industry has been left to rot, if rejuvenated, it will be greatly beneficial for our struggle. While this will also help both us and our Michigan allies prepare for war with Biden, it will also help further cement our alliance. Fostering a deep sense of brotherhood that hasnt been seen in the American right since 2017. We shall stand together, ready to liberate America from its oppressors."
 PTF_our_southern_brethern: "Our Southern Brethren"
 PTF_our_southern_brethern_desc: "Hailing from Arkansas, the League of The South, or LOS, has been a long-time ally of Thomas Rousseau. As our nationalist front expands across America, it is only natural that we would extend an invitation to our long-time ally. Not only will their entry into our alliance open up an entirely new front for us, but it will also allow us to finish off Federalist remnants in the deep South. Of Course, there's the issue of their desire for total southern independence, but that can be addressed once the war has concluded."
 PTF_the_dark_horse: "The Dark Horse"
 PTF_the_dark_horse_desc: "Representing the most extreme aspects of the American far right, the Atomwaffen Division led a bloody campaign of conquest in Florida. Despite this, they eagerly seek to join our nationalist pact, despite the reputation they have made for themselves. While it may be controversial, we cannot deny their request to work alongside us. Their support will benefit us in the long run, as their knowledge of asymmetrical warfare cannot be denied. However, regardless of the benefits, we will keep an eye on them, as James Mason and his lackeys cannot be entirely trusted. "
 PTF_empower_canadian_nationalists: "Empower Canadian Nationalists"
 PTF_empower_canadian_nationalists_desc: "Despite how it may seem, we are not Canada's enemy. Like America, Canada is a land of patriots under the oppression of a neoliberal establishment. The leadership of Canada, especially Justin Trudeau, has driven the once-prosperous nation into the ground. While we have formalized ties with several Canadian nationalist groups, it is time to put these connections to good use. Not only to expose the festering corruption of Trudeu's regime but also to keep Canada off our back as we make final preparations to invade Biden. "
 PTF_lessons_from_new_england: "Lessons from New England"
 PTF_lessons_from_new_england_desc: "While our conquest of New England was swift, it was not without complications. The disorganized nature of our army structure led to disorganization in our most dire hours. With these wounds from our conquests still fresh, there is much to do. Our experiences will be used to enact necessary reforms within our army and shake up the command structure. We must also reconsider our reliance on militia units and other aspects of guerilla warfare. While some will grumble at these changes, it is ultimately necessary if we wish to stand a chance at taking down the Federalist armies."
 PTF_form_the_oia: "Form the OIA"
 PTF_form_the_oia_desc: "Every revolution has its enemies, and our revolution is no exception. Many in New England openly oppose our ideas, seeing our values as "fascist" and "anti-American". While our revolution is still young, we cannot allow it to be usurped by outside opportunists and traitors. The formation of an intelligence agency, known as the Office of Internal Affairs, will help us with this problem. With the OIA, traitors and terrorists will be snuffed out once and for all. Additionally, enemies in our ranks will also be purged. With guidance from Rousseau, the OIA will be turned into a force to be feared. Eliminating our enemies, both internal and external, and securing our revolution for many years to come."
 PTF_curate_an_international_image: "Curate an International Image"
 PTF_curate_an_international_image_desc: "While we have mostly been able to sway the people of America to our side, the international community remains skeptical of us. While some nations like Russia have been open to us, sending volunteers to fight for our cause. Other countries are more unsure. Our former allies in NATO eye us uncertainly, some even decrying us as attempting to establish a "fascist dictatorship" in America. We must show the world that we are not their enemy, but in fact, we are their friend. Because in the coming years, foreign support might be necessary for the reconstruction of America."
 PTF_fortify_the_canadian_border: "Fortify the Canadian Border"
 PTF_fortify_the_canadian_border_desc: "Despite consolidating control over New England, our revolution remains threatened from the outside. Fearing our cause, the Canadians have mobilized against our cause. While we seek a peaceful resolution with Truddeu, we must prepare for the worst. Our border with Canada shall be reinforced immediately, regardless of the cost it may bring. If the Canadian army truly wishes to crush our movement, then we will fight to the last man. For we will never stop or back down. Not until our banner is waving from coast to coast. "
 PTF_combat_internal_enemies: "Combat Internal Enemies"
 PTF_combat_internal_enemies_desc: "Despite our victories, our enemies remain ever-vigilant. We are not only threatened by external enemies. We are also threatened by traitors on the inside. Radicals within our party have silently been plotting against Rousseau ever since the beginning of our revolution. These groups pose an existential threat to the stability of our organization and must be dealt with immediately. The purge of these radicals will also gain the approval of the people. Who would be more than happy to see these radicals taken care of."
 PTF_welcome_international_volunteers: "Welcome International Volunteers"
 PTF_welcome_international_volunteers_desc: "Like our forefathers who received support from a sympathetic regime in France, we can also benefit from foreign support. Moscow has, so far, been our strongest supporter, with nationalist volunteers arriving in droves to support our cause. While this support has been helpful, we still have yet to fully utilize it. We shall call out to the world. Calling on patriots globally to take up arms in support of us. While this support will be minimal compared to the support our enemies receive. It shows that there are still those willing to support us, regardless of the cost."
 PTF_anti_partisan_warfare: "Anti-Partisan Warfare"
 PTF_anti_partisan_warfare_desc: "Despite our relatively easy victory, some enemies avoided our vengeance. These groups roam around New England like cancer, raiding and causing mayhem wherever they go. If not dealt with, these partisans will become a thorn in our side. With authorization from Rousseau, the OIA will be deployed along with the army to hunt down these partisan groups. We shall take any measure necessary to put an end to these rebels. As their continued activity threatens to derail our plans. Once they have been dealt with, can our plans move forward unopposed."
 PTF_strength_of_spirit: "Strength of Spirit"
 PTF_strength_of_spirit_desc: "We are the successors of the founding fathers. Imbued by the same goals they had, to liberate Americans from tyranny. And like the revolutionaries of old, our determination and spirit are as strong as steel. Nothing will stop us in our righteous crusade. Let it be known that our troops will not falter, will not fail, for our will to fight is indestructible compared to our enemies. Let us take pride in our spiritual strength. Let it guide us to victory like it guided Washington many years ago. Our fight will be challenging, but guided by the memories of past patriots, we shall march from sea to shining sea. And we shall not rest until America has been saved from the demons."
 PTF_legacy_of_victory: "Legacy of Victory"
 PTF_legacy_of_victory_desc: "From 1775 to today, the U.S. army has been the one to lead America to victory time and time again. From Yorktown to Iwo Jima, the army has always led us to victory no matter the odds. While our current militia structure has worked well for chaotic and unorganized fighting in New England, it must be reformed. We must prioritize the transition of our militia units into organized fighting units. These reforms will allow us to stand a better chance against the more organized Federal armies."
 PTF_spirit_of_1776: "Spirit of 1776"
 PTF_spirit_of_1776_desc: "Like our War of Independence in 1776, our new American Revolution is built on the backs of revolutionary militias. With America gripped by brutal, unorganized fighting, asymmetric warfare is the future. As part of our army reform plan, we will cement our army's loose militia structure. Prioritizing a loose militia-oriented style of warfare will allow our army to adapt on the fly and take advantage of weak points in enemy defenses."
 PTF_exorcise_the_spectre: "Exorcise the Spectre"
 PTF_exorcise_the_spectre_desc: "There is a ghost haunting America. While once our enemy was the Soviets, our gaze has now shifted to the Chinese. It has been clear that Chinese influence spreads throughout American society. Whether through social media like TikTok. Or cheap, mass-produced products. China's influence is seen everywhere. As our moral crusade expands, these ghosts must be exorcised at all costs. Like McCarthy, we will expose the communist traitors to the American public. Exposing them for their crimes against the American people. Cementing our role as the true liberators of America and its people."
 PTF_evolve_american_warfare: "Evolve American Warfare"
 PTF_evolve_american_warfare_desc: "Evolution is constant in warfare. Tactics, weapons, doctrines, nothing stays the same during war. The Second Civil War is no exception to this rule. Militias march through cities, engaging in brutal house-to-house fighting. The prosperous streets of America are now filled with mines and barbed wire, turning every avenue and block into its own no man's land. In this fight, groups rise and fall every day. And if we do not want to be next, we must get with the times. Evolving the way we fight is not only necessary to be our enemies but also to ensure our survival. "
 PTF_jacksons_militias: "Jackson's Militias"
 PTF_jacksons_militias_desc: "One of the most popular founding fathers, Andrew Jackson's legacy lives on today. His work during the Revolutionary War and the subsequent War of 1812 cemented his legacy as a strategic genius. His work as America's first populist rallied many to his side. Especially when he commanded the Tennesse militia during the defense of New Orleans. In these trying times, we look back to him for inspiration. The legacy of him and his victories shall guide us to victory. As we march from the Atlantic to the Pacific. We shall liberate America in his name."
 PTF_refined_strategic_mentality: "Refined Strategic Mentality"
 PTF_refined_strategic_mentality_desc: "Throughout its history, America's military has utilized a wide range of tactics and doctrines. From the days of trench warfare to the era of the tank. Even in the modern era of cyber war and drone attacks. America's military has always been at the forefront of doctrinal innovation. If we want to keep up with the rest of the world, army innovation is necessary. With us at the helm, the strategic brilliance of the American military will be revived. Our enemies will once again fear the sounds of American jets in the sky. And we shall reclaim our place as the dominant military force."
 PTF_pattons_saber: "Patton's Saber"
 PTF_pattons_saber_desc: "Modern Warfare has seen drastic changes, but one thing has always remained constant. The tank is the king of the battlefield. America is not short of military geniuses who utilized the tank to its full potential. Whether  Macarthur in Korea or Patton in France, tanks have been used to turn imminent defeats into hard-fought victories. While the current size of our tank army is small, it is not weak. With our seizure of federal armories and industrial complexes, we can turn our small tank fleet into a force to be reckoned with. Like a steel tide, we will swarm across America. As a wave of steel, we shall exact our vengeance on our enemies and uplift the people from stagnation."
 PTF_symphony_of_speed_and_steel: "Symphony of Speed and Steel"
 PTF_symphony_of_speed_and_steel_desc: "Once armies would march for days to a location, now they can reach their location in hours. As the technologies of war evolved, armies went from marching on their feet to being transported via modern-day IFVs and IFV and infantry transports. The Second Civil War has proven the necessity of speed and steel above all else. Across America, jets and bombers dance through the sky. While great tidal waves of tanks clash on the great plains of the Midwest. These two elements, working in perfect harmony, can be the salvation or destruction of a nation. Luckily, they will be our salvation and the tools for our liberation of America."
 PTF_revere_rides_again: "Revere Rides Again"
 PTF_revere_rides_again_desc: "Paul Revere is widely celebrated as a hero of the American Revolution. While he may have passed on, he lives through us. While he never saw combat against the British, his help was seen in another way. His ride at midnight warned the Sons of Liberty of the sudden mobilization of the British army. His help was instrumental in the revolutionaries meeting the red coats on the battlefields of Lexington and Concord. Now, like Revere, we ride to liberate America from its tyrants. Under Rousseau, liberation will be swift, and our vengeance shall be exacted without hesitation."
 PTF_reign_in_militia_commanders: "Reign in Militia Commanders"
 PTF_reign_in_militia_commanders_desc: "Our current militia structure is unorganized at best. And chaotic at worst. While we have a centralized command on paper, the reality is more complex than that. Militia commanders claim to be loyal to Rousseau while directly ignoring direct orders. More often than not, these disloyal commanders are only in it to enrich themselves, engaging in mass looting of abandoned homes and forcing unwilling civilians to join their ranks. This will not be tolerated any longer. There is no place in our revolution for such profiters. Demoting or purging corrupt commanders not only has the benefit of widening public support. But also allows us to take greater control of the militia command structure."
 PTF_one_nation_against_invasion: "One Nation, Against Invasion"
 PTF_one_nation_against_invasion_desc: "America, as it stands, is under siege. Enemies, both internal and domestic, have used the weakness of the federal government to spread their degenerate ideas. Liberalism, progressivism, communism, all of these ideas have all been allowed to spread around America. Poisoning many aspects of American society, brainwashing once loyal patriots, and turning the youth against their parents. Under us, this shall no longer be the case. These degenerate ideas shall be cast down into hell, and true American patriotism shall be uplifted once again."
 PTF_our_forest_fighters: "Our Forest Fighters"
 PTF_our_forest_fighters_desc: "Once a popular symbol of anti-Soviet resistance in the Baltic countries. The Forest Brothers engaged imperial and soviet forces with brutal guerilla warfare tactics. Striking fast and disappearing into the woods, they built a reputation as a fierce fighting force. Despite their destruction in 1956, their tactics can still be replicated today. Hit-and-run tactics, combined with the dense forests of New England, will allow us to hit our enemy where it hurts the most. Exploiting weak points, sabotaging supply hubs, and wearing our enemy down so they can be overrun by our main army."
 PTF_the_new_minutemen: "The New Minutemen"
 PTF_the_new_minutemen_desc: "During the Revolutionary War, civilian organized militias were the first to begin fighting the British. These militias were instrumental in weakening the British through years of guerilla warfare, eventually leading to their surrender at Yorktown. While our current militias have successfully conquered New England, they have been comprised of party members and reluctant recruits. Allowing the formation of new civilian-based militias will help bolster our army and tap into support from newly conquered communities. These militias will fill manpower gaps and give us better odds in our planned liberation of America."
 PTF_recruit_among_the_common_man: "Recruit Among the Common Man"
 PTF_recruit_among_the_common_man_desc: "The male youth of America have never been more disassociated with their nation. Many years of government pandering to radical feminists has led to them being outwardly villainized by the federal government. But while the establishment dismisses them, we welcome them with open arms. Their dissatisfaction with the current American order is exactly why many have already flocked to our movement."
 PTF_recruit_among_dissatisfied_veterans: "Recruit Among Dissatisfied Veterans"
 PTF_recruit_among_dissatisfied_veterans_desc: "The brave veterans of America have never experienced more ostracization than it has. Endless years of brainwashing and pandering by the federal government has convinced many that the army is a force for "imperialism." While the government they fought so valiantly for rejects them, we let them in with open arms. The disdain that many veterans feel for the liberal regime has given us the perfect opportunity to get men with combat experience into our New Continental Army."
 PTF_mechanize_the_second_continental_army: "Mechanize the Second Continental Army"
 PTF_mechanize_the_second_continental_army_desc: "With victory comes reward and the Second Continental army is no stranger to victory! Stocks of equipment fall into our hands-sometimes a trickle-sometimes whole depots. We must not rest on our laurels and become complacent with success. If we want to be the true heirs to Columbia we must become a modern fighting force. We’ll organize the spoils into new hard-striking armored units to form the backbone of the force to ensure our momentum is not lost."
 PTF_harbringers_of_a_new_dawn: "Harbingers of a New Dawn"
 PTF_harbringers_of_a_new_dawn_desc: "The America of now is fading. As the moon fades to the rising sun, we are the new dawn of America. Our fight has culminated through many years of struggle, greed, and rampant corruption. Merging together in a calamity of vice and degeneracy. As the rest of America descends further into the darkness, we arise like the new morning sun. Our light shall cast across America, banishing the darkness into the void. Traitors of all kinds shall burn in the fires of our vengeance. But the patriots and oppressed citizenry will bask in the warmth of our liberation. Open your eyes, America. The darkness is fading, and the nightmare is finally ending."
 PTF_salt_the_earth: "Salt the Earth"
 PTF_salt_the_earth_desc: "Our struggle is eternal. Any measure that must be taken will be taken. As America descends further into violence, sanity is replaced by barbarism. Cities become meat grinders, and soldiers fight for every house and apartment. We must not become bogged down in endless house-to-house fighting. The revolution must be swift. It must sweep America before its enemies have time to react. Otherwise, it will fade into obscurity. Cities will be bombed, perhaps even wiped off the map, but it is ultimately a necessary sacrifice. Reconstruction will come eventually, but today, the earth must be salted."
 PTF_construct_the_rousseau_line: "Construct the Rousseau Line"
 PTF_construct_the_rousseau_line_desc: "While the Union of America may still be at war with the Constitutionalists, we must prepare for every possibility. Once our liberation campaign begins, there is no turning back. We must not allow a sudden enemy assault to overwhelm us, or we will be crushed as soon as the war starts. Construction of a defensive perimeter, while being rather time-consuming, will ensure we are not caught off guard if the Union surprise attacks us. This string of defenses will allow us to defend in depth against any forces thrown at us. Wearing them down and allowing us to prepare counterattacks."
 PTF_beauty_in_struggle: "Beauty in Struggle"
 PTF_beauty_in_struggle_desc: "Our battle against the rot, the forces of the left, is almost always an uphill one. We started with nothing, but rifles and the belief of a better tomorrow in our hearts. We have persevered against the odds and, in the course, won the hearts of many. So long as the men know that they’re fighting for the future and that once they crest the hill the battle is won, they will conquer to hell and back! Victory is only second nature to the Front. The primary is the long united effort on the road to that victory."
 PTF_combined_arms_tactics: "Combined Arms Tactics"
 PTF_combined_arms_tactics_desc: "From our humble beginnings as militias full of patriotic zeal, to a modern professional force, has been rapid and has far outpaced expectations. We must not rest on our laurels, and there is yet more room for improvement. Better coordination between ground forces and the new air force will minimize friendly fire and maximize the effect. Better communication between units on the ground will ensure more rapid exploitation of success. Complacency is death, and we’re in the business of dealing it!"
 PTF_rolling_thunder_program: "Rolling Thunder Program"
 PTF_rolling_thunder_program_desc: "With the success of the mechanization program, we’ve encountered another weakness-our lack of any airpower of note to speak of. With the rapid advance of the Second Continental army, airfields and former USAF facilities have fallen into our hands. Many former air force personnel have offered their services along with civilian pilots to become the building process for an airforce of our own. We’ve captured enough intact planes and parts to keep a respectable fleet running, but the need to set up and begin local production is paramount. No longer will the men be without aircover, forced to scurry and hide like rats. Soon the Feds will have a taste of their own thirty-millimeter medicine!"
 PTF_reclaiming_america: "Reclaiming America"
 PTF_reclaiming_america_desc: "What has happened to the dream of the founding fathers? The Liberals trample on their graves, decrying them as reactionary slavers. The conservatives sell their souls to corporations while rejecting their duties to the citizenry. So far, the people have been left abandoned, sold false dreams of utopia by people who only want donations and votes. But this will no longer be the case. As we march across the shattered nation, we will be the ones to save the people. America is broken, but it can still be reclaimed. And we will reclaim it, even if we must kill everyone in our way."
 #Politics
 PTF_convene_the_third_constitutional_convention: "Convene the Second Constitutional Convention"
 PTF_convene_the_third_constitutional_convention_desc: "At last, victory is ours. The last pockets of militias have fallen, and New England is now firmly under our control. As we begin the process of centralization, the question of our future has been brought forth. Like our forefathers, we shall convene a constitutional convention in Independence Hall, Pennsylvania, where our first Constitution was signed. Here, the future of our republic shall be determined. Additionally, we will begin centralizing factions within our party while ensuring Rousseau maintains absolute control."
 PTF_hail_caesar: "Hail Caesar!"
 PTF_hail_caesar_desc: "In the days of ancient Rome, there was a single strong leader who took control during an intense crisis for the republic. There was a leader who guided his people to a time of hope and virtue before his untimely end. This leader was named Caesar. He was a great conqueror. He was someone who led Rome into a time of great prosperity. America is in a time of crisis like never before. Like Caesar, we must have one singular leader, Thomas Rousseau, to guide America into an era of peace and prosperity under the banner of fascism."
 PTF_empower_the_youth: "Empower the Youth"
 PTF_empower_the_youth_desc: "While we are a vast collection of people who were left abandoned by the liberals in Washington, we do have a clear bedrock. Young people, the youth. In the waning days of the republic, they were left to fend for themselves while the senile old men had ego contests in the capitol. Left downtrodden, broke, and without purpose, the youth were drawn to our mission to reclaim America. Now, in the moment of triumph, it is imperative to give the youth what they were promised. We must empower them, to allow them to have their share in the salvation that our movement will bring to the United States."
 PTF_devotion_to_columbia: "Devotion to Columbia"
 PTF_devotion_to_columbia_desc: "Many within our organization claim to be devoted to us, feign their loyalty to gain benefits for said loyalty. But this is not good enough, they must be fully dedicated to the idea of America, what it means, and what it will mean once we take control. Like many revolutions, we must have those who are truly dedicated to it and understand what virtues it will bring, we must encourage this devotion to bring about a fascist America."
 PTF_manifestation_of_the_american: "Manifestation of The American"
 PTF_manifestation_of_the_american_desc: ""
 PTF_defend_american_labor: "Defend American Labor"
 PTF_defend_american_labor_desc: "An organized and useful Labor is an important factor in keeping our society together. Our workers may be enduring hardships throughout the war, but it is only for their own betterment, and for that they must be rewarded with as much as they give, more labor rights for today, but not for tomorrow, marxist zealots must not take over, and the average american must not be sacrificed."
 PTF_shatter_the_guilded_facades: "Shatter the Gilded Facades"
 PTF_shatter_the_guilded_facades_desc: "In our territory, there still remain those who are brainwashed by the elites; the liberals, the zionists. They are too blind by the poison that has been poured into their eyes to see the truth in front of them. They remain blind to their oppression because of this poison, this bleedover of their repression. We will shatter this facade carefully created by the elites of old."
 PTF_restore_the_glory_of_america: "Restore the Glory of America"
 PTF_restore_the_glory_of_america_desc: "America was once one of the most glorious nations on earth, especially in style. Such buildings like the white house and congress are proof of America’s ingenuity previously. But not anymore. Look around. ’Minimalist’ styles drain the life and color from architecture, influenced by zionists and globalist sources to break our psychological barriers down, to make us subservient. No longer, under the command of Rousseau, the glory of America will be brought back."
 PTF_kneel_to_the_first_consul: "Kneel to the First Consul"
 PTF_kneel_to_the_first_consul_desc: "America. Once the greatest nation on earth, is now a shell of its former self. Embroiled in civil war and surrounded by enemies from within. America is far from a golden age. To prevent the infighting that plagued this nation and led us up to this point, we must engage in a presidential dictatorship. Much like the days of the great conqueror, Napoleon, our great leader, Thomas Rousseau will guide America out of crisis and lead it into greatness."
 PTF_for_the_people_by_the_people: "For the People, By the People"
 PTF_for_the_people_by_the_people_desc: "The United States of America, a nation once dedicated to serving the people. But, look at it now. Chaos rules the streets, socialists run rampant, and the globalists still attempt to exert their influence over a rotten carcass. America was always meant to serve the people, our revolution is finally bringing this concept back to fruition and will continue to long after we crush our enemies."
 PTF_ignite_the_masses: "Ignite the Masses"
 PTF_ignite_the_masses_desc: "The common masses, the public, the fuel of our revolution. What does one do to fuel, how does one use it? They ignite it of course. Revolutions succeed off the rage of the common public against injustice; the American revolution, for example. The common masses will unite and ignite under the banner of the fasces, under Rousseau."
 PTF_certify_unitary_executive_theory: "Certify Unitary Executive Theory"
 PTF_certify_unitary_executive_theory_desc: "Unitary Executive Theory, the theory that the sole authority over the executive branch. This is the objectively correct interpretation, and surely what the founding fathers intended. As an organization dedicated to bringing America back to its former glory, it would be a travesty to not accept this theory as truth."
 PTF_rebalance_the_scales: "Rebalance the Scales"
 PTF_rebalance_the_scales_desc: "Our movement is moving alarmingly towards dictatorship. The tyranny that the founding fathers warned us about is approaching rapidly. If we let this continue, we will be no better than the neoliberal oppressors that we broke free from. We must at least attempt to allocate power into the hands of the people for any chance to reclaim America as the founders intended."
 PTF_one_hand: "One Hand"
 PTF_one_hand_desc: "Reclaiming America will prove to be a difficult task. To endure the coming storm, we must give the American people the truth of the revolution. With the power of our organization, nothing will get in our way. Not the degenerate liberals who ripped apart our moral fabric and desecrated our history. Nor the two-face conservatives who would argue instead of fixing this nation. Nor the socialists who tore apart our country from the inside because of their corrosive ideas of "social justice." The iron fist of our movement will never be escaped by those who wish to destroy America."
 PTF_the_next_washington: "The Next Washington"
 PTF_the_next_washington_desc: ""
 PTF_friendly_neighborhood_minutemen: "Friendly Neighborhood Minutemen"
 PTF_friendly_neighborhood_minutemen_desc: "The minutemen, similar to their forefathers, are some of the most dedicated and brave soldiers in our army. But there is a dilemma that we now face because of them. How will we portray them to the American people we liberate? On the one hand, maybe we should send them out to the front. Make them the soldiers that they were meant to be, the soldiers that the founding fathers intended. On the other hand, we could make them seem like great liberators and send them out for relief efforts; we can't recover an America of corpses and dust, after all. The very identity of our army relies on this question, possibly the identity of our movement as a whole."
 PTF_promote_oia_dominance: "Promote OIA Dominance"
 PTF_promote_oia_dominance_desc: "Like many revolutions, ours faces possibly more enemies from within rather than from out. Many dissidents in our borders, both openly or secretly, see our movement as, "Anti-American." They are too blind to see the truth, too brainwashed by years of oppression that stomped them into submission to set the virtue of our revolution. For the salvation of America, we cannot allow these parasites to fester within our borders. The OIA has the best interest of the American people at their heart, and will do well to stamp out these threats. "
 PTF_cult_of_rousseau: "Cult of Rousseau"
 PTF_cult_of_rousseau_desc: "Thomas Rousseau, the savior of America. The man who will bring the United States out of the muck that it was in during its waning days. The man who does not kneel to the globalist bullies, the zionist puppet masters, or the socialist dissenters. The man who will, by himself, bring America to salvation. Rousseau will bring back American greatness, the next founding father of the United States."
 PTF_victory_or_death: "Victory or Death"
 PTF_victory_or_death_desc: "The die is cast, there is no turning back! Even with our rise, the chance of defeat is ever present. The soldiers must be made to understand that every battle is a battle to the death; There is no room for partial success. We are fighting for the nation’s soul and defeat is death-for us and for America. In the fight to the finish, the man with the greater will wins. We shall overcome with elan, improvisation, and sacrifice. We shall be victorious or die trying."
 PTF_monument_to_the_heroes: "Monument to the Heroes"
 PTF_monument_to_the_heroes_desc: "Reclamation cannot come without heavy sacrifice, and the sacrifices we make will be tremendous. Many of our sons will fall in battle, and unfortunately, there is nothing we can do to stop it. While making improvements to medical access will help prevent unnecessary casualties, we cannot stop every death. As such, we must find a way to honor our fallen patriots properly. Various monuments shall be erected from D.C. to San Francisco. These monuments will be dedicated to their work and the sacrifices they made to save America from tyranny."
 PTF_party_democracy: "Party Democracy"
 PTF_party_democracy_desc: "Within our party, there is still much infighting, especially due to those who joined in the final days of the United States. To counter this, we must have our party become a body of democracy such as that of the America of old. With the brightest few of us on the top, the party will experience unprecedented stability."
 PTF_reclaim_the_past: "Reclaim the Past"
 PTF_reclaim_the_past_desc: "The socialist agitators would have some believe that the colossal lands of the United States was "stolen" by the old heroes of America. They wish to corrupt the masses they teach into hating America, and to serve their nefarious needs. This is absolutely wrong, we conquered those lands with our strength. Stealing is for cowards, old America was not an America of cowards."
 PTF_the_american_autocracy: "The American Autocracy"
 PTF_the_american_autocracy_desc: "Thomas Rousseau, the first great man of the 21st century. He has led our country to prosperity, more than anyone in American history. He has brought our movement to greatness. If anyone was worthy of leading America under one rule, then it would be him. The first imperial presidency will be one of glory, virtue, and conquest!"
 PTF_construct_the_party_hierarchy: "Construct the Party Hierarchy"
 PTF_construct_the_party_hierarchy_desc: "In order to preserve the continuing stability of our revolution, we must reorganize the hierarchy of our organization. Those that are most loyal must be rewarded similar to the spoils system of Jackson. Those who wish to watch us fall into chaos and infighting will be pushed out. Our base will be unbreakable and so will our movement."
 PTF_a_thousand_voices: "A Thousand Voices"
 PTF_a_thousand_voices_desc: "We are surrounded by enemies on all sides. Enemies who wish to destroy our organization, enemies who would see America burn down. Within our movement and outside of it, a thousand voices cry out for liberation. Liberation from their socialist oppressors that restrict their every move. Liberation from the boot of liberalism that had crushed their throats. The people of Boston, who have been under the iron fist of these corrosive elements are realizing this. So, rise, rise, and take up arms, take up arms in the name of Rousseau, in the glory of fascism, and for the future of America!"
 PTF_the_necessary_reforms: "The Necessary Reforms"
 PTF_the_necessary_reforms_desc: "Our movement, while inherently virtuous, has certain factions that would rather watch all of our ideals burn along with the rest of the nation. Those who would rather have our movement devolve into a corrupt cabal of elites. If we let these snakes take advantage of the liberation that we have provided, our movement will go up in flames like the American republic that preceded it. The reforms that we will pass will bring about the necessary change to not allow these elements to take control and devolve our movement into degeneracy and chaos."
 PTF_the_national_republic: "The National Republic"
 PTF_the_national_republic_desc: "America in its final days was a republic in shambles. A republic not devoted to serving the public as originally intended. No, a government devoted to serving the globalists, the liberals across the pond, and the zionists. America needs something new. Once the dust settles, fascism will make America soar out of its ashes like a phoenix."
 PTF_party_of_the_people: "Party of the People"
 PTF_party_of_the_people_desc: "The Patriot Front, we are still divisive amongst Americans who have not yet experienced our liberation. We must show them how wrong they are. We must show the people of America that we are dedicated to them, unlike the socialists who burned down their homes, the liberals plunged our country into degeneracy, or the deceitful conservatives who threw our country into chaos with their petty bickering. We will stand tall among them; a movement truly dedicated to the people."
 PTF_devotion_to_columbia: "Devotion to Columbia"
 PTF_devotion_to_columbia_desc: "Many within our organization claim to be devoted to us, they feign their loyalty to gain benefits for said loyalty. But this is not good enough, they must be fully dedicated to the idea of America, what it means, and what it will mean once we take control. Like many revolutions, we must have those who are truly dedicated to it and understand what virtues it will bring, we must encourage this devotion to bring about a fascist America."
 PTF_rehabilitate_american_heroes: "Rehabilitate American Heroes"
 PTF_rehabilitate_american_heroes_desc: "America’s greatest heroes have been horrifyingly vilified by the previous administrations. Those that hated America wanted to make us hate them as well, so that we could become slaves to them, slaves to the globalists. Jackson, Washington, and Adams. All are heroes in this organization, and that’s the end of it!"
 PTF_promote_civic_engagement: "Promote Civic Engagement"
 PTF_promote_civic_engagement_desc: "The United States was a country built upon the ideals of participation for all citizens. In its final days before the civil war, it was built on the ideas of participation of the elites, the people who caused so much harm. These ideals will be restored unless we push for the public to engage with politics, to become their own bosses."
 PTF_the_enlightened_masses: "The Enlightened Masses"
 PTF_the_enlightened_masses_desc: "The founding fathers, the brightest of the thirteen colonies, those who brought this nation out of the clutches of tyranny and into greatness. There may never be anyone like them today, but that doesn’t mean there can’t be ever again. Society can make the next generation of founding fathers, we can do it. The masses will become enlightened again, like their forefathers."
 PTF_national_revival_plan: "National Revival Plan"
 PTF_national_revival_plan_desc: "While our nation lays in ruin, the need for an economic revival to lift true americans rises, we must weed out the deceit of the old republic, corporatism, however old it may be, is the future, the marxist gibberish of class struggle, and the neoliberal nonsense of the old east, no longer suits us, only cooperation between social classes for the betterment of the nation works, the rich and poor shouldn’t leave each other in a crimson mess, they ought to unite and fight the real enemy, the marxists, the agitators, and the unwanted. A corporatist path, is the American Path"
 PTF_american_rescue_plan: "American Rescue Plan"
 PTF_american_rescue_plan_desc: "We can no longer allow the elites of old to rule, we cannot allow the communists to influence our needs and wants, the American economy needs to be rescued from the rubble and ashes its under, from the blood that covered its change, and for that, we must take hold of the economy and decides what necessary for the struggle against the evils of the old elitists and the undesirables, a command economy is the only way to bring back the wretched of america from the rubble, and to weed out the unwanted, an economy under one strong leadership, and for one strong future."
 PTF_nationalized_banking: "Nationalized Banking"
 PTF_nationalized_banking_desc: "An independent banking is a must for a strong and nationalistic America, a corporatist America, not long ago our banks were rotten by global finance, and infiltration by undesirables, the globalist elites and owners of global financial capital will cry at the sight of their banks being nationalized, which is why it must be done, no cretin must be allowed to control the fate of the patriots and nationalists of America anymore, the banks must be Nationalized!"
 PTF_reawaken_the_industrial_giant: "Reawaken the Industrial Giant"
 PTF_reawaken_the_industrial_giant_desc: "American Industry was always the base of the economy, but it was abandoned, gutted, and left to rot in dark warehouses by the old elites, cutting it and selling it for parts to aliens and foreigners, the collapse was inevitable ever since Industry was abandoned, we will not repeat that mistake, every industry is to be rebuilt from nothing, every gutted industry is to be revived and healed, a new industrial awakening awaits the patriots of america, the likes of which has never been seen."
 PTF_economic_populism: "Economic Populism"
 PTF_economic_populism_desc: "Americans were always the base of the economy, and they always will be, a true American economy is a rigid economy, based on its ’real’ citizens, and on its social structures which were abandoned long ago, we must promote the Patriot’s economy, and awaken the beast which is our patriotic society, rile it up for a new uproar of financial success."
 PTF_the_new_american_man: "The New American Man"
 PTF_the_new_american_man_desc: "A new corporatist America, needs a new type of man, an old type of man who has been forgotten for ages, a man whose strength and strength alone can change society, schools under the old ways have taught communism, laziness, and degeneracy, a new curriculum for a new man must be drafted, so men will take up their place as the leaders of their homes, and the pioneers of their nation, American boys will no longer be laughing stocks, but strong men, soldiers of tomorrow ready to weed out the evils of the elitists who espoused critical theory, and the undesirables that supported them."
 PTF_reexamine_the_welfare_state: "Re-Examine the Welfare State"
 PTF_reexamine_the_welfare_state_desc: "The American people, deserve more, we have revived their labor rights along that which was necessary, and now, the situation demands an analysis of welfare, pure Americans struggling deserve the Nation’s hand, to lift them up for the sake of national unity and strength, but we will do a Nationalist welfare, away from the communist welfare that diseased the old nation’s economy to the point of its death."
 PTF_revive_classical_culture: "Revive Classical Culture"
 PTF_revive_classical_culture_desc: "A Plague hit American culture, architecture, in the last century, a marxist, post modern plague, a true nation of identity, a nation build by the New American Man, must also follow its corporatist ways to the core, a revival of classical architecture is a must, if those heroes of old were good at anything, its building monuments that last centuries, and the new America will surely last centuries. No more brutalism, no more modernism, no more of that ugly marxist filth, a real nation, is a nation built upon pillars of marble."
 PTF_agricultural_renewal_plan: "Agricultural Renewal Plan"
 PTF_agricultural_renewal_plan_desc: "Food is the basis to any society, our neglected Agriculture has left American tables barren and American stomachs empty, this war ravaged through our fields, and what was once sustainable due to sheer volume, is now nothing more that a useless snack, American farming must be readjusted, reorganized, and properly rebuilt to provide for americans and keep american businesses afloat."
 PTF_rebuild_the_american_way_of_living: "Rebuild the American Way of Living"
 PTF_rebuild_the_american_way_of_living_desc: "The Vermin turned the common American’s life into a living hell, the only way to ease that is a new national restoration, reconstruction must go at full speed ahead, nothing to stop or limit it, the sacred soul of true America lies in that decision, construction must go, go, go, persist, and endure, we are not only picking up the rubble here, we are making a new home out of an ash covered Nation."
 PTF_focus_on_the_consumer_economy: "Focus on the Consumer Economy"
 PTF_focus_on_the_consumer_economy_desc: "Iron and mass industry may build the baseline, but the next important phase is to provides for consumers, a consumer market built by americans for americans, and let it be not the old consumerism that spread communist beliefs amongst the nation, consumerism should be an act of Patriotism, a sign of national strength and unity, a pride in all that is made American."
 PTF_utilize_penal_labor: "Utilize Penal Labor"
 PTF_utilize_penal_labor_desc: "The Communists and agitators often complained and whined about the old 13th amendment, but it was a show of strength of national force, a successful model in putting criminals and undesirables to work to benefit the nation, and its spirit, their criminal will can only broken and turned into something good by mandated labor, by working for our nation and our people."
 PTF_national_rebirth: "National Rebirth"
 PTF_national_rebirth_desc: "A nation, born again, under god, indivisible, forged in fire and steel, purified by struggle and war, our nation rises again, a stronger nation, a prouder people, a pure American culture, a rigid economy, all unshakable under one blue sky, we must not return to what was, but build what must be."
 PTF_deal_with_the_devil: "Deal with the Devil"
 PTF_deal_with_the_devil_desc: "Debates went on and on over foreign aid, our nation rises, but blows don’t stop from our enemies, perhaps it is time to compromise, for the betterment and unity of the Nation, a deal with a devil, is a deal nonetheless, but unlike past it won’t be complacent, decadent, and weak, we won’t let such deal eat away our identity, it’s a deal for America, not against it, a patriotic aid, is one that takes from the enemy, but does not give back."
 PTF_social_dividends: "Social Dividends"
 PTF_social_dividends_desc: "What society works for, the trust it places in us is an investment, and a dividend is nothing uncommon as a way to pay back, and for us, it will prop up the economy, increase spending, and rebuild the great American economy, one dividend at a time, one purchase at a time, we will rebuild our supply, our demand, monthly dividend to prop up american families, and build and our future away from demonic degeneracy."
 PTF_revive_new_england_manufacturing: "Revive New England Manufacturing"
 PTF_revive_new_england_manufacturing_desc: "New England was once the beating heart of Eastern Industry, mills, foundries, factories, warehouses that powered America’s rise, but betrayal, selling out, and global capital absolutely destroyed what was once an industrial giant, and turned it into a rusting relic, and the war has only deepened that wound, we will reignite the forgeries, build the assembly lines, put Patriotic american hands back to work, this isn’t just about jobs, its about national survival."
 PTF_form_the_national_labor_alliance: "Form the National Labor Alliance"
 PTF_form_the_national_labor_alliance_desc: "We may have neglected our laborers, workers, and employees as the war waged, and they endured and need to endure as long as necessary, but this can come with a huge cost, we need to form a national labor alliance, side by side by the corporation, and the national government, to try and protect workers a bit more, even with major corporate objections, they must understand its a necessary move to revive the nation and its labor force, a man’s sweat may pour for his Nation, but he can’t always bear it, for that we will assist."
 PTF_strong_families: "Strong Families"
 PTF_strong_families_desc: "No more deals, the American family is our core, our basis, a realization to our patriotic dream, a strong family, means a strong America, and the nuclear family must be protected at all costs, the stains of communists and global elitists purified from its very being, a strong nation is only as strong as its weakest family, and we are not weak, and we must never be."
 PTF_restore_fordism: "Restore Fordism"
 PTF_restore_fordism_desc: "Our capacity to build is as high as our capacity to produce and consume, old good America, was built on the Fordist principle, of mass production, mass consumption and an efficient industry, a truly American Production Model, that serves the employee same as it serves the corporates, and same it will serve the national state for the betterment of our nation, an organized, disciplined and Nationalistic Industry."
 PTF_embrace_the_corporatist_model: "Embrace the Corporatist Model"
 PTF_embrace_the_corporatist_model_desc: "It is time to fully embrace our Corporatist model in all sectors of our economy, our society, and education, a fascist national model is the only rightful and successful model in national restoration, and that will be our focus, every part of the American way of life must be integrated, every Patriotic pure american must follow, a New American man can only be realized under a fascist flag."
 PTF_strong_nation: "Strong Nation"
 PTF_strong_nation_desc: "A stick alone is weak, a bundle together is strong, its axe slashing through its enemies, and utilizing its resources to build a stronger whole, a safer home, a superior home, our nation will be strong once again, with its real people united, its degeneracies purged, its will, resolved."
 PTF_restore_american_academia: "Restore American Academia"
 PTF_restore_american_academia_desc: "Academia was the backbone of American scientific achievements, but it was sullied by marxist infiltrators, and evil meaning undesirables, our systems must be rebuilt, and the filth that destroyed America must be eradicated from within it, and our children mustn’t struggle only to be schooled by a teacher who wears the movement’s banner, a patriotic education must extend beyond primary schooling to secondary schooling, and it must be monitored and controlled to prevent the dirt from clogging up our children’s minds with wrongful ideals."
 PTF_learn_from_the_past: "Learn from the Past"
 PTF_learn_from_the_past_desc: "Great men built the American economy, not with timid hands but with iron fists and unbreakable resolve, from fields ridden with barbarians, to learn from them is to continue their glory, and move forward tying their golden path to ours towards a new horizon away from demonic degeneration, and towards a continued economic reconstruction, that will awaken the American beast from nothing, just like it has once done before, this isn’t just a revival, but a continuation of the American spirit, and it will shape the future just as our forefathers faithfully did."
 PTF_embrace_the_future: "Embrace the Future"
 PTF_embrace_the_future_desc: "The past was mighty, but not Invincible, What was once great, is also what lead to this collapse and destruction, what stood as a beacon for the future, became a shell of corruption, our forefathers may have had it work at the time, but it was too easy to corrupt by demonic marxists and crunchy globalists, we must look towards a new future, built by the men of today for tomorrow, not on an old future made by past men that died as soon as they did, the future belongs to the living, we must build a new economy, not reconstruction of a dead past."
 PTF_revive_boston_dynamics: "Revive Boston Dynamics"
 PTF_revive_boston_dynamics_desc: "Boston Dynamics, a corporation of the old America, bought by aliens, and left to rot after the war, was a prime example of American superiority, robots that move like americans, that work like americans, it needs to be revived, its former working minds put to work again, to revive the National American technological sector, and assist the economy in its road to Nationalist reconstruction."
 PTF_american_renaissance: "American Renaissance"
 PTF_american_renaissance_desc: "The glory of our past rushes through our blood, the purity, the courage and heroism of our forefathers filling up our veins, we are continuing the great America of old, under a new fascist banner, but one initially intended by our great founding fathers, an American Renaissance is ahead."
 PTF_second_american_golden_age: "Second Golden Age"
 PTF_second_american_golden_age_desc: "A New American age is now, clean of the mistakes of the past, a new nation for a pure people under a nationalist banner, under a real banner, our Golden age comes again, now being able to endure withering, and the troubles caused after the old one, able to withstand the tide of time, and any blow the vermin may try to subject us to, the Second American Golden Age is ahead."
 PTF_patriotic_education: "Patriotic Education"
 PTF_patriotic_education_desc: "Gone are the days of critical theory, and communist infiltration of our schools, the new fascist way is taught, a way which weeks to unify our students, reform the men into powerful Americans, and teach the women the power within a home, a patriotic education is a national education, a real education that does not eat away at the minds of our kids, and such education must continue beyond primary school, even the oldest highschool students will be taught the importance of nation and family."
 PTF_the_fourth_bank_of_america: "The Fourth Bank of America"
 PTF_the_fourth_bank_of_america_desc: "A commanded economy requires a commanded bank, a new bank to turn the ashes of old into prosperity for the Amercans of tomorrow, and that can only be guaranteed by our government, and our leadership, often did the bankers stoop low to please the interests of globalists and communists, but now is a new age, a new prosperity, a bank from the patriotic to the patriotic."
 PTF_revive_the_american_hinterlands: "Revive the American Hinterlands"
 PTF_revive_the_american_hinterlands_desc: "The eastern coast was forgotten and left to rot by the elites of old, while it was the economic hub of the nation only a few decades ago, fueled by gasoline towards countless industries and products, providing countless jobs, thus for America to be resuscitated, its most important economic hub must be revived, like a forgotten phoenix, it must rise through the ashes of ruin, its industries reignited, rebuilt, reinstated, its trade established to go above and beyond for a new America away from the filth that crippled it not too long ago."
 PTF_rebuild_the_northeastern_corridor: "Rebuild the Northeast Corridor"
 PTF_rebuild_the_northeastern_corridor_desc: "Logistics and movement is at the core of our nation, and after the marxists and elites destroyed the rail lines of old, and now the war has destroyed whatever was left, our capacity to trade, move, and provide logistical support for the economy  has waived, New England needs not halt, trains, trains, highways and roads will stimulate the economic and patriotic minds to connect and provide support like never before for real Americans, it will reinspire the economy into a new age of logistics and transportation, and build us a new corridor."
 PTF_patriotic_corporations: "Patriotic Corporations"
 PTF_patriotic_corporations_desc: "Corporations, companies have serves, and bent over for the elites that destroyed the country for years, collaborating with global finance to rid the regular American of his wealth and send it to aliens and foreigners, corporations must serve only one god, and must work only for one nation, America, and for them, it’s the American way, or the grave."
 PTF_department_of_reconstruction: "Department of Reconstruction"
 PTF_department_of_reconstruction_desc: "Our nation fell to war, destruction, and was left to rot by its former rulers, a department for reconstruction is a must to realize the american rise, and as the fire rose, so will our hammers and bricks to rebuild the broken nation bit by bit, idea by idea, building by building, this is not just a reconstruction, it is a retribution, a nation forged in steel, discipline and purpose."
 PTF_encourage_entrepeneurship: "Encourage Entrepreneurship"
 PTF_encourage_entrepeneurship_desc: "Interest rates, interest rates, everyone talks about them, no one understands them, not like real Americans do, entrepreneurs are the ribs to America’s heart, and for National Entrepreneurship to restart, we must lower our interest rates, help them in a way we approve and see, make it easier for them to borrow money, but we won’t let it be at whims, it must a Nationalist, Patriotic Entrepreneurship, not the leftist marxist bullshit of the elitist vermin, and it mustn’t be like some certain undesirables had it."
 PTF_negotiate_for_foreign_aid: "Negotiate for Foreign Aid"
 PTF_negotiate_for_foreign_aid_desc: "As our great nation fell,the world watched, some cheering, some mourning, and a few saw opportunity, we lie in ruin, and something must be done, a nation cannot survive alone, and its identity will not recover quickly enough before the marxists and reactionaries destroy it, a heavy heart in our chests begs for a new nation, and for that we must compromise with the National Republican, they have been proposing negotiations for us to receive aid from friendly countries, the situation requires we cave, but let this not be a moment of weakness, but one of renewal, to use alien and undesirable resources for our own gain."
 PTF_prosperity_for_all: "Prosperity for All"
 PTF_prosperity_for_all_desc: "A strong nation demands a strong people, prosperity isn’t hoarded by the few, or wasted on the undeserving and undesirable vermin, it is earned through work, discipline, and national unity, industries will be rebuilt under our watchful eye, workers will be rewarded but only with what is deemed necessary for their work, prosperity is for those who give up their lives for their nation, not for the weak and lazy."
 PTF_invest_in_the_resource_industry: "Invest in the Resource Industry"
 PTF_invest_in_the_resource_industry_desc: "Imports kill a nation, and our homeland has wide resources for every square inch, those resources are to be reclaimed, repurposed, their extraction invested in, made wide, managed by us, and by our corporate partners, we will reclaim American resources, oil, steel, wheat, water and silicon, to ensure our independence and National unity."
 PTF_suburban_renewal: "Revitalization of Suburbia"
 PTF_suburban_renewal_desc: "We grew up in the suburbs, our base is in the suburbs, our people, suburbian, and our focus must be directed to them, a reconstruction of suburbia is ahead, we’ll make them bigger, better, and more self sufficient than they have ever been, our blood comes from their, and so does our support, a nation rebuilt starts with its people, and its people belong in strong, proud, and unshakable communities."
 PTF_high_speed_rail_contracts: "High Speed Rail Contracts"
 PTF_high_speed_rail_contracts_desc: "In Order for America’s future to move full speed, literally, it must see through a railway renewal, many new corporations, under our command, or adjacent enough, beg for contracts to renew American railways, and that, we must let pass through, a nation is only as fast as its slowest carriage. These are not mere contracts, but an investment in our patriotic nationalist values, and our nation’s great future. "
 PTF_resuscitate_the_beating_heart_of_finance: "Resuscitate the Beating Heart of Finance"
 PTF_resuscitate_the_beating_heart_of_finance_desc: "The National conservatives have been demanding a revival to the financial strength America once had, and we agree, but it won’t be like the old ways, Banks will not longer plunder America, they will be under our tight grasp, stock markets will no longer gamble our future, or be manipulated by undesirables and the elites of global finance, the old system failed because it served itself, the new system will endure because it serves a purer, stronger America."
 PTF_encourage_domestic_production: "Encourage Domestic Production"
 PTF_encourage_domestic_production_desc: "Reliance on aliens, is impure, lazy, and worst of all unamerican, a patriotic economy relies only on itself, and its own production, tariffs must be placed on anything made outside, and industries must be resurrected, to replace them, a pure American eats, sleeps, drives, drinks, and works American, and only American."
 PTF_bring_buisness_home: "Bring Business Home"
 PTF_bring_buisness_home_desc: "The war shattered our economy, and the weak fled, Corporations, once built on American soil, abandoned their homeland for foreign safety and cheap labor. Now, as we rebuild, they will return or they will be replaced. Economic recovery isn’t the only agenda now, it’s time for National Revival, an America rooted in American business on American soil, owned by Americans for the greatness of our nation."
 PTF_rural_renewal: "Rural Rebirth"
 PTF_rural_renewal_desc: "The liver of America lies in its farms, fields, and small towns, cleansing American culture from diseases, and providing a bloodline for the nation, for too far they have been left neglected, forgotten and ignored by the powers that be, rural America will no longer be an afterthought, it will be a model of resilience, a place where families thrive, communities prosper, and the spirit of the nation is renewed. We will lift up the land that built this country, for it is time for the rural rebirth."
 PTF_technological_superiority: "Technological Superiority"
 PTF_technological_superiority_desc: "Our superiority is not only in people, spirit, or identity, but one of technology and development as well, an expanded and realized technological sector fit for an elevated people, our silicone industries, chip making, our military technologies, all stagnated in the shadow of the war, but not for long, our boots will crush our enemies with technological might, as well as our strength."
 PTF_urban_renewal: "Urban Restoration Effort"
 PTF_urban_renewal_desc: "Our cities were our crown jewels, monuments to our strength, culture, power and innovation. It’s time for urban restoration, a sweeping reclamation of our urban centers that will return them to their rightful place as beacons of strength and prosperity. The urban decay is over, Cities will be centers of innovation and pride, ensuring that the nation’s heart beats loudest where it matters most, we will reclaim the soul of American cities, turning them back into the vibrant, powerful engines of prosperity they were always meant to be."
 PTF_america_first: "America First"
 PTF_america_first_desc: "America above all, America before all, our nation matters most, it will not degenerate, and its aches will not be ignored anymore, America comes first, and we will ensure its first and above all, its superiority unchallenged, its strength ever growing, there is only two words that will echo through every American's mind, "America First.""

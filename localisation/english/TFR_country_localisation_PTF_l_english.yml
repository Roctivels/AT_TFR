 ptf.155.t: "Prysner's Last Stand"
 ptf.155.d: "The civil war has been ongoing for months now, slowly but surely we've managed to push the red menace further and further into the corner they call California.\n\nUntil one fateful day, the second continental army has managed to surround an APLA stronghold in San Francisco, where one of the most prominent figures in the organization is holed up; Michael Prysner. Former soldier, present traitor and future dead man. He realized the lives we wasted in the middle east but still strayed off the path to hate our nation, if things were different... who knows.\n\nTogether with his unwashed rabble of red bandits he vowed to make a final stand against us. After several days of fighting we decided enough was enough, and the building was bombed, the fallen rubble being their tombs. With that, another pillar of the red terror falls, at the least he was willing to die for his cause."
 ptf.155.a: "Another martyr for the myths..."
 ptf.156.t: "Canadian Intervention in New England"
 ptf.156.desc: "Today, Canadian officials have made a significant announcement regarding the New England region. According to the announcement, the Canadian Armed Forces have officially declared their intervention against the Patriot Front, a faction that has recently emerged as the sole unifier of the region. Despite the Patriot Front's recent success, military experts still predict a Canadian victory due to their well-trained and equipped army. However, due to the recent stalemates in the border skirmishes against the Patriot Front, experts are unsure about the effectiveness of the Canadian offensive across such a vast region.\nThe international community has been taken aback by Canada's intervention, as the country initially declared non-intervention during the Second American Civil War after they were overwhelmed with refugees. Given the situation, many are questioning the Canadian government's motives for escalating the conflict. It remains uncertain how the war will unfold, with experts predicting Canadian advances in the early stages but unsure about the events afterwards."
 ptf.156.a: "Another war in America."
 ptf.157.t: "The Patriot Youth"
 ptf.157.desc: "Rousseau was buried in reports when the lieutenant barged in, a smirk already curling his lips. He slapped a printed page onto the desk.\n\n"Thomas, you have to see this," he said, barely holding back a laugh. "It's... well, just look."\n\nRousseau raised an eyebrow, glancing at the paper. The printed screenshot showed him blocky Roblox avatars wearing crude renditions of Patriot Front uniforms. They stood stiffly in formation, their pixelated American flags waving over the bright, cartoony backdrop of an ‘LGBT Hangout' map.\n\nThe lieutenant leaned in, his grin widening. "They call themselves Patriot Youth. Got their own group page and everything. Says here they run ‘strategic operations' and are ‘defenders of American ideals.'" He chuckled. "They even built a mini training camp. Look, its ‘Founders' Hall.'"\n\nRousseau stared at the page, his lips thinning. The scene left a sour, hollow feeling in his chest. The absurdity of it was almost laughable, children acting out their patriotism in a world of pixels. Yet the imitation felt off, like watching a boy play soldier with plastic guns, aping actions he couldn't understand.\n\nHe set the paper down carefully, folding it with precision. "They're children," he said flatly, his voice devoid of amusement. "Let them... play their games.""
 ptf.157.a: "Imitation... or mockery?"
 ptf.158.t: "Important Things"
 ptf.158.desc: "Scorched Earth. Burnt Treelines. Fortifications. Trenches. Scenes that looked as if they came from the First World War. But within all this destruction were the soldiers who experienced it on the frontline. They fought day and night, death within reach almost every second they were in or close to the fighting.\n\nIt is only right that with the depressive atmosphere, the soldiers would reflect it.\nRight?\n\n"No man, any girl I'm gonna date, or marry, needs an hourglass figure. If not, then count me out."\n\n...I suppose not.\n\n"Man, you gotta be more appreciative of other stuff girls have, plus, that's like one the highest standards ever, and you are certainly not deserving of an ‘hourglass figure'."\nThese relatively normal conversations were almost as normal as the fighting. They could've occurred inside a locker room, at a restaurant table, or on a phone call. There was some practical use for these conversations, the humor alleviated the stress of being on the frontlines, but they were never initiated purposefully for the stress alleviation. They just sort of happened.\n\nBut as with any frontline experience, reality will eventually stop the fun.\n\n"Incoming!"\nAn artillery shell whizzed across the air, the soldiers debating took cover.\nThe shell detonated only fifteen feet away, if they hadn't ducked, shrapnel would've killed them.\n\nOne rose after a bit, dusting off his uniform and chuckling.\n\n"Well, that certainly was a bombshell." He said waiting for his partner's response, a grin wide on his face."
 ptf.158.a: "His partner only stared at him disappointed."
 ptf.159.t: "Thin Blood, Thick Lies"
 ptf.159.desc: "The base was a makeshift camp in rural Connecticut, its exterior so inconspicuous it could have belonged to some long-dead farmer. Inside, however, the new recruits gathered, huddled under banners of eagles and 'Reclaim America' signs. Folding chairs formed a loose circle where the men sat, eyeing the new arrival.\n\nHe introduced himself as Daniel, wearing jeans too clean and a bomber jacket too new. His handshake was firm—too eager, maybe. The local recruiter, a man everyone called Marcus - CT, stood at the head of the group, chewing dip and staring at Daniel like a carpenter sizing up wood.\n\n"So, Daniel," Marcus said, after the introductions had dragged on. "You're here to join something bigger than yourself. Protect our heritage. But you look a little... tan. You sure you're not hiding anything?"\n\nThe room tensed, all eyes on the newcomer. Daniel smirked, unshaken. "Quarter Mexican," he admitted. Gasps followed, half-feigned horror. Marcus spat into a tin, brow furrowed.\n\n"Explain."\n\nDaniel straightened in his chair, grin widening like a man unbothered by self-awareness. "Germany's Aryan Race Laws," he began, "said even if you were a quarter Jewish, you could still marry a German woman. And last I checked, white women are still white women."\n\nSilence. A snicker broke from one of the younger recruits at the back, quickly smothered under Marcus's glare. He mulled it over, his lip twitching, before finally grunting, "Touché."\n\nThat got a laugh. Awkward, but infectious enough. The tension eased, replaced by camaraderie born from general desperation. Marcus waved a hand, sealing the deal with a reluctant nod."
 ptf.159.a: ""Welcome to the Front, Amigo.""

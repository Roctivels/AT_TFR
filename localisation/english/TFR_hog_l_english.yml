 GER_hog_angela_merkel: "Federal Chancellor: §HAngela Merkel§!\n\n\n\n\n\n\n\n   £GFX_GER_angela_merkel_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LAngela Dorothea Kasner was born in West Germany, the daughter of a Lutheran pastor who moved to the East to spread the faith. A chemist by trade, she came of age in the Democratic Republic, watching the prosperous West from behind the inner German border. Then came reunification, and with it, opportunity.\n\nThe fall of the Wall would be the catalyst for Merkel's political career. She briefly served as a spokeswoman for the first and only democratic government of the GDR. After reunification, she was elected to the Bundestag in 1990 as a member of the CDU, and was appointed Minister of Women and Youth by Helmut Kohl, who took her under his wing as a protégé. But such a position in the Federal Government wasn’t enough, and when the opportunity arose to denounce Kohl and the CDU leadership, she took it. In 2000, she became the first female leader of the CDU, and in 2005, she became the first female chancellor in German history, and the Federal Republic's first to be raised in the DDR. Her chancellorship has lasted 16 years and 4 elections, and through financial crises and migrant waves, she has remained the unshakable anchor of both Germany and Europe.\n\nBut all reigns eventually come to their end, and since 2018, Merkel's chancellorship has had a fixed end date: 26 September, 2021. Soon, Merkel will step aside, leaving her successors to face the storm ahead. Whether history will judge her as Germany's protector or as the leader who merely delayed its reckoning remains to be seen.§!"
 GER_hog_tino_chrupalla: "Federal Chancellor: §HTino Chrupalla§!\n\n\n\n\n\n\n\n   £GFX_GER_tino_chrupalla_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LBorn April 14, 1975, in Weißwasser, in the former East German state of Saxony, Tino Chrupalla grew up in a working-class family during the final decades of the German Democratic Republic. His father was employed as a craftsman, and from an early age, Chrupalla was instilled with a deep respect for labor, tradition, and local identity. After completing his secondary education, he underwent vocational training as a painter and decorator, later establishing himself as a self-employed master craftsman, running his own business in his hometown.\n\nUnlike many of his contemporaries in Berlin’s political circles, Chrupalla’s path to national politics did not begin in universities or party youth wings, but in the workshops and job sites of eastern Saxony. It wasn’t until 2015, amid the height of the European migrant crisis and the growing unrest in parts of the population, that Chrupalla joined the AFD, a party that, at the time, was rapidly transforming from a Euroskeptic movement into a broader right-wing populist force. His rise within the party was swift. In the 2017 federal election, Chrupalla unseated Michael Kretschmer, the CDU’s prominent incumbent, winning a direct mandate in the Görlitz constituency, a feat that signaled AfD’s deepening roots in eastern Germany. In the Bundestag, he soon emerged as a staunch voice for national conservatism, anti-globalism, and traditional German values. His rhetoric resonated with many who felt left behind by the mainstream political consensus.\n\nIn November 2019, Chrupalla was elected federal co-leader of the AfD alongside Jörg Meuthen, symbolizing a power shift within the party, away from its earlier technocratic core and toward its more nationalist, culturally defensive wing. With his modest background and rhetorical simplicity, Chrupalla positioned himself as a man of the people, standing in contrast to what he framed as the political elite detached from everyday German life.\n\nNow, Chrupalla leads the Fatherland, and as its leader he has promised to bring it into a new age. No longer will the nation be brough down by weak politicians and the elite, now, the world will see just how strong Germany can be.§!"
 GER_hog_olaf_sholtz: "Federal Chancellor: §HOlaf Scholz§!\n\n\n\n\n\n\n\n   £GFX_GER_olaf_sholtz_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LBorn June 14, 1958, in Osnabrück, Lower Saxony, Scholz grew up in Hamburg, with his parents both working in the textile industry. He studied law at the University of Hamburg, specifically focusing on labor and employment law. At 17, Scholz joined the SPD and immediately became active within its youth wing, otherwise known as the Jusos, becoming its deputy federal chairman in the 1980s.\n\nScholz first entered the halls of the Bundestag in 1998 and has held many roles throughout his time there. The more significant roles he's held have been the SPD general secretary and the Federal Minister of Labor and Social Affairs under the previous Chancellor, Angela Merkel, from 2007 to 2009. In 2011, he became mayor of his hometown, Hamburg, overseeing major reforms in the fiscal sectors and many major infrastructure projects. In 2018, he returned to federal politics as Vice Chancellor and Finance Minister in Merkel's cabinet, where he has played a key role in the response to the COVID-19 pandemic.\n\nToday, he has reached the top of the ladder, gaining the title of Chancellor. The job he has now will not be easy, nor simple. The world has seen hardship and pain more than ever recently, and many can only assume that it will get worse before it gets better. But at the very least, Scholzomat will be at the helm, leading Germany forward into the horizon.§!"
 GER_hog_robert_habeck: "Federal Chancellor: §HRobert Habeck§!\n\n\n\n\n\n\n\n   £GFX_GER_robert_habeck_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LBorn September 2, 1969, in Lübeck, Germany, Habeck was the son of pharmacists; he grew up near Kiel, in Heikendorf. In 1989, he completed his university entrance qualification at Heinrich-Heine-Schule in his hometown and afterward began to pursue higher education in philosophy and German literature at the universities of Freiburg im Breisgau, Roskilde, within Denmark, and Hamburg. In 1996, he earned a Magister Artium degree and completed his doctorate in philosophy at the University of Hamburg in 2000, focusing on literary aesthetics and media theory, soon after pursuing a brief writing career before entering German politics.\n\nIn 2002, Habeck joined the Green party, where he served as the party's district chair in Schleswig-Flensburg from 2002 to 2004 before rising in the ranks as the state party co-chair in Schleswig-Holstein from 2004 to 2009. In 2012, he was appointed Deputy Minister-President and Minister for Energy Transition, Agriculture, Environment, Nature, and Digitalization in Schleswig-Holstein, all positions he held until 2018. That year, in 2018, Habeck reached the national stage, being elected as the co-leader of the national Green Party alongside Annalena Baerbock.\n\nWhile in his position, the Green party gained significant and steady progress across many regions of Germany, finally culminating in the 2021 federal elections, a point which we have already passed.\nWith them being the leading force of the nation and not just some secondary coalition member for the first time, truly, Habeck will have many sleepless nights and much coffee to drink. Not to mention what the world is turning into, or.\n\nWhat it has already become.§!"
 GER_hog_christian_lindner: "Federal Chancellor: §HChristian Lindner§!\n\n\n\n\n\n\n\n   £GFX_GER_christian_lindner_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LBorn January 7, 1979, in Wuppertal, North Rhine-Westphalia, West Germany, Lindner grew up in a middle-class household, his father working as a teacher at a high school. In 1995, he joined the FDP. In 1998, he completed his Abitur, or university entrance qualification. From 1999 to 2001, Lindner served in the Bundeswehr air force as a reserve officer, eventually rising to the rank of First Lieutenant. During his time in reserve, between 1999 and 2006, he studied Political Science at the University of Bonn, earning a Magister Artium degree. However, his studies were part-time due to his political career and entrepreneurial activities.\n\nOn May 31, 2000, Lindner became the youngest member of the legislative assembly of North Rhine-Westphalia. In 2007, he became the FDP's General Secretary in North Rhine-Westphalia, leaving his position in 2009 after being elected to the German Bundestag for the first time. Following the FDP's decline in 2012-2013, he was elected Federal Party Chairman on December 7, 2013, with 79% support, beginning its turnaround. In 2017, under Lindner's leadership, the FDP returned to the Bundestag with 10.7% of the vote.\n\nToday, it leads the Bundestag itself. Christian Lindner, of the FDP, is now the Chancellor of Germany. While his supporters may celebrate, he will contemplate and plan. The world, more than ever, has seen a rise in tension and violence, for if Lindner wants to uphold his promises to the people and bring hope for the future, and democracy. He must act now.§!"

 JAP_hog_shinzo_abe: "Prime Minister: §HShinzo Abe§!\n\n\n\n\n\n\n\n   £GFX_JAP_shinzo_abe_por\n\n\n\n\n\n\n\n\n-------------------------------------\n§LShinzo Abe was born into a family with a storied political history: his grandfather, Nobusuke Kishi, was prime minister from 1957 to 1960; and his father, Shintaro Abe, as foreign minister from 1982 to 1986. He was first elected to the National Diet in 1993 and, after replacing Junichiro Koizumi as LDP president in 2006, he was elected Japan's youngest post-war prime minister; however, he resigned a year after citing health reasons. After losing the 2009 elections, Abe would return to the presidency of the LDP, winning the 2012 elections and ushering the longest uninterrupted premiership in the long history of the Land of the Rising Sun.\n\nAbe's government has been characterized by two pillars: Abenomics domestically, and a more assertive Japan externally. At home, his Abenomics program has fought to shake Japan from the stagnation of the Lost Decades through quantitative easing, fiscal stimulus, and structural reforms. Abroad, Abe has worked to strengthen Japan in the world stage, deepening alliances with the United States, India, and Australia, while warning of an emboldened China and a nuclear North Korea. His push to revise Article 9 of the Japanese Constitution remains very controversial in Japan, but has gained unprecedented traction under his premiership.\n\nAbe has sought to make Japan a bulwark of democracy against the shifting tides in East Asia. With tensions mounting in the China Seas, and America retreating inwardly more and more with each passing day, Abe insists that Japan must be ready to defend its interests and values. His opponents accuse him of steering the nation toward the old habits of militarism; his supporters praise him as the only man with the vision and resolve to weather the gathering storm. One thing is certain: Shinzo Abe stands at the helm of a Japan standing at a crossroads, determined to ensure it doesn't slide into irrelevance or weakness in the face of a fiery new age.§!"

#Asia-Pacific
 toyko: "Tokyo"
 toyko_desc: "----\n§9The Tokyo Metropolis is the sprawling capital of Japan. Host to almost half of the entire country's population, as well as both the civilian government and the Imperial House of Japan, Tokyo wields massive amounts of cultural, economic and political influence over the broader country.\n\nCulturally, Tokyo is rich with historic temples, bustling malls, and iconic landmarks such as the National Diet Building, Shibuya Crossing, the Tokyo Skytree, and Tokyo Tower. It is a global leader in technology, finance, and fashion, while also being renowned for its safety and efficient public transport, regarded by many as the world standard.§!\n\n§pJust because Okawa exists, I love Tokyo, just because Tokyo exists, I love life.§!"
 osaka: "Osaka"
 osaka_desc: "----\n§9Osaka, the capital of Osaka Prefecture and Japan's third-largest city, is a major economic and cultural hub in the Kansai region of Honshu. Historically a key trading port since the Kofun period, Osaka became Japan's commercial capital during the Edo period and rapidly industrialized following the Meiji Restoration.\n\nIn the present day, it remains a vital financial center, hosting the Osaka Exchange, as well as a number of major corporations and prestigious universities, being a key center of international research and development. The city is known for its vibrant street life, culinary scene, and landmarks like Osaka Castle, Dōtonbori, Tsūtenkaku, and Shitennō-ji, as well as tourist draws like Universal Studios Japan.§!\n\n§pOh ma gah!§!"
 nagoya: "Nagoya"
 nagoya_desc: "----\n§9Nagoya, the capital of Aichi Prefecture, is the fourth most populous city in Japan and a major industrial and cultural hub in the Chūbu region. Founded by Tokugawa Ieyasu in 1610 with the construction of Nagoya Castle, it quickly became the capital of Owari Province and flourished in the Meiji era.\n\nKnown for its strong manufacturing sector, Nagoya is home to key industries, in particular the automotive, aviation, and shipbuilding sectors, with major companies such as Brother Industries, Ibanez, Lexus, and Toyota Tsusho headquartered there. It is well-connected to Tokyo, Kyoto, and Osaka via the Tokaido Shinkansen. Noteworthy landmarks include Atsuta Shrine, Nagoya Castle, Higashiyama Zoo, and Nagoya TV Tower.§!"
 kyoto: "Kyoto"
 kyoto_desc: "----\n§9Kyoto, Japan's former imperial capital, is the ninth most populous city in the country and a major cultural hub located in the Kansai region of Honshu. Founded as Heian-kyō in 794, it served as Japan's political and cultural center during the Heian period (794–1185) and remained the imperial capital until 1868.\n\nRenowned for its well-preserved heritage and spared from much of the Second World War's destruction, Kyoto is home to over 2,000 religious sites, including iconic temples like Kiyomizu-dera and Kinkaku-ji. The city is famous for traditional arts, tea ceremonies, and geisha performances in the Gion district. Its economy blends traditional industries like kimono weaving with modern technology firms such as Nintendo, which is headquartered in the city. Kyoto also hosts numerous UNESCO World Heritage Sites and renowned festivals like Gion Matsuri, remaining a key destination for culture and education.§!\n\n§pPlace, Japan§!"
 yokohama: "Yokohama"
 yokohama_desc: "----\n§9Yokohama is Japan's second-largest city and the capital of Kanagawa Prefecture. Situated along Tokyo Bay in the Kantō region, it evolved from a small fishing village to a major port city following its opening to international trade in 1859, marking it as a gateway for Western influence during the Meiji era. Its port, one of the largest and busiest in Japan, played a crucial role in its rapid development as a center of commerce and industry.\n\nToday, Yokohama is a thriving industrial and economic hub, host to major corporations like Nissan and Isuzu. Its iconic Minato Mirai 21 district boasts landmarks such as Yokohama Landmark Tower and Cosmo Clock 21. Cultural highlights include Yokohama Chinatown, the largest Chinatown in Japan, and the scenic Yamashita Park.§!\n\n§pTaking Fight, Heated As Hell! From Whom We Celebrate, Welcome Ichiban! Go Forth And Lead A Wonderful Life!§!"
 beijing: "Beijing"
 beijing_desc: "----\n§9The vibrant and colorful Wangfujing commercial street is just a wall away from the serene, history-soaked atmosphere of the ancient hutongs. The opulent gardens of past emperors overlook the gray government buildings adorned with red stars and hammer-and-sickle symbols. Only in Beijing, the capital of the People's Republic of China, can such strange yet harmonious scenes be found. Since the Yuan Dynasty made it their capital in 1271, Beijing has weathered countless storms and seen many rulers come and go. This unique history has shaped the city's north-south axis and grid-like layout, while also cultivating a distinct urban spirit and civic culture that Beijingers hold dear.\nTo their fellow countrymen, Beijingers often play complex roles, blending enthusiasm and arrogance, openness and rigidity. Despite being closest to the heart of the nation's power, they harbor an unspoken disdain for authority: "In Beijing, a single brick thrown could hit a dozen bureau chiefs." As the front line of the Republic's openness and exchange with the outside world, they also hold on to amusing and quaint traditions, from their distinctive accent to their fondness for the fermented drink "douzhi." This reflects China itself: an ancient yet youthful nation.\nToday, with Beijing as its capital, the People's Republic has over seventy years of history. This ancient city has witnessed both the peaceful prosperity and turbulent times of past dynasties, as well as the rise, fall, and resurgence of the nation. Looking to the future, where will the current leaders of Beijing take this city? Perhaps only history can provide the answer.§!"
 tianjin: "Tianjin"
 tianjin_desc: "----\n§9Tianjin, meaning "Tianzi Jinmen" (literally "Heavenly Son's Ford"), has been inextricably linked to the fate of China's capital and its rulers since its inception. Over the past two centuries, this city endured the humiliation of China under incompetent governance, suffered under the tyranny of arrogant colonial powers, and witnessed countless martyrs sacrifice their lives. It ultimately welcomed the sunrise after enduring prolonged darkness. Today, Tianjin stands as northern China's largest industrial city, serving both as Beijing's crucial maritime gateway and the core of the Bohai Rim Economic Circle. This thriving port continues its centuries-old tradition as a bustling hub for domestic and international trade, where merchants converge just as they did hundreds of years ago.§!"
 chengdu: "Chengdu"
 chengdu_desc: "----\n§9Chengdu, often called the "Land of Abundance," has been nourished by the Dujiangyan irrigation system for over 2,300 years. The city not only carries the weight of an ancient civilization but also boasts a lively urban culture that captivates both locals and visitors. From the serene beauty of Mount Qingcheng to the history of loyalty honored at the Wuhou Shrine, Chengdu offers a fascinating blend of old and new. Its street-side teahouses, world-class fighter jet production lines, giant pandas at the breeding base, and the bustling Tianfu Square in the city center all highlight its diversity.\nWhat truly sets Chengdu apart, however, is its relaxed pace of life, a striking contrast to the fast-paced, economically driven rhythms found in other major Chinese cities. This balance between tradition and modernity gives Chengdu its unique charm, showcasing how the wave of modernization has shaped this vibrant city in southwestern China.§!"
 chongqing: "Chongqing"
 chongqing_desc: "----\n§9Few cities are as closely tied to their rivers, both geographically and culturally, as Chongqing. The Yangtze and Jialing Rivers converge here, and over the course of three millennia, this "Mountain City" has transformed its rugged terrain into a cyberpunk-esque magical metropolis. Its stunning nightscape is a testament to a golden era, while the city's rivers have given rise to a unique river culture. Dockside traditions, the "Gelaohui" brotherhood, and the once-dominant urban gangs all contribute to Chongqing's raw, mysterious aura.\nFrom a wartime capital preserving China's spirit to becoming a municipality that accommodated migrants from the "Three Gorges" project, Chongqing has always adapted to change. Today, as a key player in the big data industry and the economic engine of the Sichuan Basin, it continues to evolve. Much like its signature dish, hotpot, the city embraces diversity, with people from all walks of life contributing to its unique energy and vitality.§!"
 nanjing: "Nanjing"
 nanjing_desc: "----\n§9Ever since Eastern Wu made it its capital, Nanjing has been a strategic stronghold in China's south, serving as the capital of six dynasties, the early Ming court, and the provisional government of the Republic of China. Here, the Yangtze River bends toward the ocean and meets the southern terminus of the Grand Canal, once a crossroads for grain barges and the tea-and-salt trade. Purple Mountain and the Ming Xiao Mausoleum intertwine imperial tomb culture with geomancy; the massive, brick-thick Zhonghua Gate defenses this cities for  centuries; and Rain Flower Terrace bears steles commemorating martyrs of the Jin wars, the Taiping Rebellion, and the War of Resistance. The Nanjing Massacre Memorial Hall, with its somber exhibits, serves as a stark warning to the world never to forget 1937.\n\nIn the 21st century, under the Yangtze River Delta integration plan, Nanjing has developed a modern industrial mix led by software services, biopharmaceuticals, and new materials. Nanjing South Station and the Yangtze River Bridge cement its role as a rail-and-shipping hub; the Pukou Development Park and Jiangbei New Area continuously yield fresh urban dividends; and digital renminbi trials are visible at street level. A constellation of universities and research institutes, many over a century old, continues to supply talent and ideas. Meanwhile, the Qinhuai River cultural belt and the lantern-lit Laomendong district preserve the city's human warmth amid relentless renewal.§!"
 shanghai: "Shanghai"
 shanghai_desc: "----\n§9"Ye Shanghai, Ye Shanghai, you are a city that never sleeps." As a modern metropolis, Shanghai stands as the most prominent symbol of China's development. After Westerners arrived, the city opened up to commerce and became the birthplace of China's earliest modern industries, although much of this progress was divided among foreign powers. Due to its large labor force, Shanghai also became the cradle of the Communist Party of China.\nIn 1949, Shanghai was liberated by the People's Liberation Army, and for the first time, the city's future was truly in the hands of the Chinese people, marking the start of a new era. Over the past seventy years, particularly after the reform and opening-up policies and the development of the Pudong New Area, Shanghai's growth has been remarkable. Today, it is one of Asia's and the world's leading international financial centers and trade hubs, driving China's economic development with its open and inclusive spirit.§!"
 shenzhen: "Shenzhen"
 shenzhen_desc: "----\n§9"Rome was not built in a day," yet it took over two thousand years to reach its current glory. In contrast, Shenzhen has achieved something remarkable: in just forty years, it transformed from a small fishing village on the western bank of the Pearl River Estuary into a bustling metropolis with a population five times that of Rome, and far more developed. Over forty years ago, locals navigated the reeds with simple fishing boats. Today, Shenzhen has evolved into one of the largest cities in southern China - and indeed, in the world - by economic scale. It has become a symbol of China's rise. Without the reform and opening-up policy, this land might have remained dormant. Thus, Shenzhen embodies the success of China's reform and opening-up and stands as the brightest jewel in the Pearl River Delta.§!"
 guangzhou: "Guangzhou"
 guangzhou_desc: "----\n§9Over three hundred years ago, thanks to imperial decrees and its unique geographical location, Guangzhou became the first city in China to engage in international trade, establishing itself as the country's sole trade center at the time. However, this wealth also made Guangzhou a target, and it became a prize for foreign powers. After enduring many trials, this city has emerged even more brilliant. While Guangzhou's development lagged behind Shenzhen's after the reform and opening-up, it remains the undeniable center of the Pearl River Delta economic zone. Today, Guangzhou is still the capital of Guangdong Province, an important economic hub in southern China, and one of the country's largest international trade centers.§!"
 wuhan: "Wuhan"
 wuhan_desc: "----\n§9Nurtured by the Yangtze and Han rivers, Wuhan has long served as a melting pot of northern and southern cultures and a pivotal hub for land-water transportation. From the Bronze Age ruins of Panlong City to the poetic allure of Yellow Crane Tower amidst the Three Kingdoms' turmoil, the city's history resonates through millennia, weaving a legend that endures to this day.\nIn more recent history, the Hanyang Iron Works helped spark China's industrialization, while the gunfire of the Wuchang Uprising signaled the fall of an ancient empire. The unity and courage displayed during the Battle of Wuhan made the roar of this city's resilience resonate across the land. Today, the sound of the Jianghan Pass clock still chimes in harmony with the ferry whistles, Wuhan forges its legend through bold innovation and cultural harmony, embodying the pioneering spirit that has shaped its past and propels its future.§!"
 hongkong: "Hong Kong"
 hongkong_desc: "----\n§9Ah, Hong Kong. Once a humble fishing village called \"Fragrant Harbor\" for its abundant incense wood, this island has truly seen it all. In the old days, merchant ships flocked here, their sails a forest against the sky. But the Opium War changed everything, bringing a new power that, for over a century, saw the rise of towering skyscrapers and bustling ports. And while this era brought immense prosperity, it also left its own indelible scars of humiliation and oppression. But the city's soul remains. The \"ding-ding\" tram still rattles through the old streets, the Star Ferry still shuttles people between Hong Kong Island and Kowloon, and the shouts of Temple Street hawkers blend with the clinking of dim sum carts. This unique spirit is woven into the very fabric of the city, from the epic martial arts tales of Jin Yong on TV to the timeless songs of Leslie Cheung. A global financial powerhouse and the \"Hollywood of the East\", Hong Kong is a city of stunning contrasts, where Western starkness meets Southern tenderness. Today, it remains a crucial gateway to Southern China, a city that has known both turmoil and triumph. The lights of Victoria Harbour still shine brightly, a beacon of its unyielding spirit.§!"
 macau: "Macau"
 macau_desc: "----\n§9Macau has long been at the crossroads of East and West, renowned for its pivotal role in cultural exchange. During the late Ming and early Qing dynasties, it played a significant part in the \"Eastward spread of Western learning\" and was once one of the world's leading economic hubs. As early as the Ming Dynasty, Portuguese settlers had established a presence on this Chinese territory, using land rents and taxes to control Macau, transforming it into a vital gateway to the East. On the eve of the new millennium, Macau returned to the embrace of its motherland, ending over a century of colonial rule.\n\nToday, Macau is globally renowned for its thriving service industry, particularly within China. As the only city in China where casinos are legally permitted, it attracts high-rolling gamblers seeking to test their luck, earning the nickname \"Las Vegas of Asia.\"\n\nCome to Macau for a try—even if you end up losing the shirt off your back, it's still an experience worth having.§!"
 changchun: "Сhangchun "
 changchun_desc: "----\n§9Renowned as the "Pearl Beyond the Great Wall," Changchun is a living chronicle of China's northern frontier. Its origins as a military stronghold trace back to the Liao and Jin dynasties, while the haunting verses of Qing poet Nalan Xingde - "Autumn winds mourn painted fans on the frontier, sunset gilds banners upon ancient walls" - immortalize its timeless grandeur. The city's complex modern history is etched into landmarks like the Puppet Manchurian Palace and the Eight Ministries complex, relics of its wartime role as a pseudo-capital. Reborn as the cradle of China's automotive industry with the founding of FAW, Changchun now leads the nation's green mobility revolution through cutting-edge new energy and smart vehicle technologies. Anchored by academic powerhouses like Jilin University and the iconic Changchun Film Studio (the "Cradle of New Chinese Cinema"), the city harmonizes scholarly depth with industrial vigor, embodying poet Ai Qing's ode: "My eyes brim with tears, for my love of this land runs soul-deep."§!"
 dalian: "Dalian"
 dalian_desc: "----\n§9Where Russian spires meet Japanese gardens under a canopy of skyscrapers, Dalian unfolds as a maritime sonnet. Its modern soul took shape through 19th-century colonial tides, yet its Han dynasty origins echo in the wind-sculpted monoliths of Jinshitan and the cliffside drama of Tiger Beach. The vast Xinghai Square mirrors its ambition as a Belt and Road linchpin, while summer streets come alive with the pulse of Fashion Week and the golden froth of beer festivals. Now a Northeast Asian shipping titan, Dalian harnesses deep-sea riches and smart manufacturing to bridge continents. True to its name - "Da" (grand) in vision, "Lian" (connected) in reach - this coastal jewel shines as both a regional crown and a global stage, where mountain meets sea and history dances with tomorrow.§!"
 shenyang: "Shenyang"
 shenyang_desc: "----\n§9Shenyang became the capital of the Later Jin regime in 1625, laying the foundation for the Qing Dynasty's rise to power on the northern bank of the Hun River. Within the crimson walls of the Shenyang Imperial Palace, the octagonal, double-eaved Dazheng Hall still stands as it did centuries ago. Over the years, by the early 20th century, the city saw the establishment of broad-gauge Russian railways and the construction of the South Manchuria Railway by the Japanese. To this day, Zhongshan Road retains its hybrid appearance, with Gothic window sashes and floral decorations. The rusting gantry cranes and foundry workshops in Tiexi District capture the industrial memory of early heavy industry in the People's Republic of China, while the fighter jet production lines at the Shenyang Aircraft Corporation continue to embody the national defense spirit of the Third Front Movement.\nA city that intertwines dynastic changes, colonial imprints, and the rise of industrialization, Shenyang persistently seeks its contemporary identity amidst the layers of its rich history.§!"
 taibei: "Taipei"
 taibei_desc: "----\n§9Taipei, the capital city of Taiwan and home to over 7 million people, is best known for areas such as its CBD, the Xinyi Planning District, the vibrant and bustling Ximending, Zhongzheng District's transportation hub, and Daan District's city park and prestigious universities. An icon of Taiwan's economic miracle and rapid development since the 1960s, Taipei transformed from a flat, primitive city into a bustling metropolis. It is home to Taipei 101, a skyscraper that was once the tallest building in the world.\nDespite the deconstruction of old Qing Dynasty walls, Taipei, like many other large cities, is considered a defensive fortification in itself against potential invaders. Not only can defenders be positioned at various points, but its expansive metro network also offers an additional dimension of mobility for those on the ground.§!"
 fuzhou: "Fuzhou"
 fuzhou_desc: "----\n§9Since the Tang and Song dynasties, Fuzhou has served as a key node on the Maritime Silk Road, enduring fragmented rule by regional military governors and the successive transitions of the Song, Yuan, Ming, and Qing dynasties, as well as the late-Qing self-strengthening movement. In the late 19th century, the Foochow Arsenal School was founded here, driving the development of China's modern navy and shipbuilding industry, though it was briefly interrupted by the Jia-shen Coup. In the 20th century, remittances sent by overseas émigrés via the Min River fostered a distinctive \"hometown\" culture and stimulated commercial growth. Entering the 21st century, Fuzhou's digital port infrastructure now glows around the clock. Leveraging its status as a \"Digital Economy Pilot Zone,\" the city has expanded cross-border e-commerce and modern logistics, built a smart port and new-area industrial clusters, and continues to function as a vital regional hub.§!"
 zhengzhou: "Zhengzhou"
 zhengzhou_desc: "----\n§9Located south of Zhengzhou in Xinzheng, the rammed earth remains of the \"Zhenghan Ancient City\" and its Shang Dynasty walls tell a story of the past. At the end of the Qing Dynasty and the beginning of the Republic era, the completion of the Longhai and Jinghan railways brought Zhengzhou to the intersection of these lines, marking the birth of modern Zhengzhou. The wagons and platforms witnessed a shift from agricultural to industrial trade. After the founding of the People's Republic, industries such as machinery, textiles, and grain processing established a strong foothold in the city. Since the late 20th century, Zhengzhou has evolved into more than just a simple point on the map. The Zhengdong New District has flourished, the Aviation Port Experimental Zone has taken shape, and the cross-border e-commerce comprehensive pilot zone and free trade pilot zone have emerged. Industrial clusters in sectors like intelligent manufacturing, equipment, food, and biotechnology have rapidly developed.§!"
 luoyang: "Luoyang"
 luoyang_desc: "----\n§9Luoyang is a city located at the confluence of the Luo River and the Yellow River. As the capital of 13 dynasties, it has held an important position in Chinese history, beginning with the Zhou Dynasty and continuing through the Cao Wei and Western Jin dynasties. During the Sui-Tang period, Luoyang became a key hub where the Silk Road and the Grand Canal intersected. The sound of bells from the White Horse Temple and the blooming of peonies became iconic symbols of the city.\n\nIn the mid-20th century, during the First Five-Year Plan, major strategic projects such as heavy manufacturing, petrochemicals, and bearing production were established, giving rise to a group of enterprises known as \"the Republic's eldest son.\"\n\nEntering the 21st century, Luoyang has evolved into a major industrial city and tourist destination, playing a pivotal role in advanced manufacturing, new materials, and aerospace.§!"
 nanchang: "Nanchang"
 nanchang_desc: "----\n§9Nanchang sits on the Gan River, open to Poyang Lake. The name aspires to \"prosper the southern frontier\". The city carried the undertone of Tengwang Pavilion and its famed Preface, where river winds and afterglow were first set to verse. What truly inscribed Nanchang into the modern history of China was the event that took place on August 1, 1927: the Nanchang Uprising began here. Zhou Enlai, He Long, Ye Ting, Zhu De, Liu Bocheng and others united political and military forces to fire the first shot of armed resistance. From that moment, \"August 1\" became Army Day and endures, and the title \"Heroes' City\" took place. Ever since then, a constellation of landmarks; Bayi Square, the Memorial Hall, and the uprising site- has embodied the military-history education, national-defense narrative, and the city's image. In the present day, Nanchang's technology-driven sectors are rising in clusters; leveraging its location, Changbei International Airport, and the high-speed rail hub, closely stitch the province to the Yangtze River Delta. In the 21st century, Nanchang is more than a flourish in a classical preface: it is a revolutionary place and a modernizing metropolis in one, continuing to write the story worthy of a \"City of Heroes.\"§!"
 dandong: "Dandong"
 dandong_desc: "----\n§9Dandong, formerly known as Andong, is located on the Liaodong Peninsula, nestled between the waters of the Yalu River and facing the Korean Peninsula across the river. Since the Tang Dynasty, when the Andong Protectorate was established, the city has served as a crucial stronghold for Central Plains dynasties in the Northeast.\n\nFrom the late Qing period onwards, Dandong experienced repeated devastation during the Sino-Japanese and Russo-Japanese wars. However, it was the War in the 1950s that truly cemented Dandong's place in the annals of the People's Republic of China. As the flames of war reached the Yalu River, the city became the launch point for the Chinese People's Volunteers crossing into Korea and served as a vital rear base supporting the front lines.\n\nEntering the 21st century, Dandong has grown into China's largest land port and a key hub for trade with North Korea, handling the majority of overland commerce and logistics between the two nations. Due to its unique geographical position, it has become a strategic pivot for national stability and China's presence in Northeast Asia.§!"
 hohhot: "Hohhot"
 hohhot_desc: "----\n§9Hohhot, meaning \"Green City,\" is located south of the Yin Mountains on the Tumochuan Plain. Since ancient times, it has been a frontier where nomadic and agrarian civilizations intersected. During the Ming dynasty, Altan Khan of the Tümed tribe established a city here, around which the Dazhao Temple was built, making it the religious and political center of southern Mongolia. Following the Qing dynasty's unification of the region, the twin cities of Guihua and Suiyuan were founded, serving as a crucial hub linking northern Mongolia and a key site for Mongol-Han trade. Tea, furs, and silk flowed through the city in abundance\n\nIn modern history, Hohhot became a birthplace of the revolutionary movement in Inner Mongolia. From Prince De's failed autonomy schemes to Ulanhu's leadership in the liberation struggle, the city witnessed the choices and rebirth of the grassland peoples.§!"
 jinan: "Jinan"
 jinan_desc: "----\n§9Nestled between Mount Tai to the south and the Yellow River to the north, Jinan is a city defined by its mountains and springs. It is world-renowned for its springs—Baotu Spring gushes in three powerful jets, Black Tiger Spring roars day and night, and their waters feed Daming Lake, creating the picturesque scene. As the cultural heart of Shandong, Jinan is one of the cradles of Longshan Culture, carrying with it a millennium-long literary heritage. The tender reflections of Li Qingzhao and the heroic fervor of Xin Qiji together embody the city's spirit—a harmonious blend of grace and strength.\n\nToday, as the capital of Shandong Province, Jinan's political and economic influence continues to expand. It is a key city in the Bohai Economic Rim and a central hub for the Yellow River Basin. The ancient moat surrounding the old city still flows with the waters from its many springs, nourishing a Jinan where tradition and modernity coexist.§!"
 kunming: "Kunming"
 kunming_desc: "----\n§9Kunming, located on the Yunnan-Guizhou Plateau, rests beside Dianchi Lake and is encircled on three sides by mountains. Its mild climate and eternal spring have earned it the nickname \"City of Eternal Spring.\" Since ancient times, Kunming has been the heart of central Yunnan. During the Warring States period, it served as the capital of the ancient Dian Kingdom. In the Tang and Song dynasties, it became the seat of Tuodong City under the Nanzhao and Dali kingdoms, establishing itself as a regional center. Under the Yuan, Ming, and Qing dynasties, Kunming was the provincial capital of Yunnan, serving as the political and military stronghold for the empire's governance of the Southwest and a crucial stop along the Ancient Tea-Horse Road, where merchants and travelers gathered.\n\nToday, Kunming is the political, economic, and cultural center of Yunnan, as well as China's gateway to Southeast and South Asia. As a key node in the Belt and Road Initiative, it has transformed from a remote border city into a regional international transport hub.§!"
 zhangye: "Zhangye"
 zhangye_desc: "----\n§9Historically known as Ganzhou, Zhangye derives its name from the phrase \"extend the arm of the nation to reach the Western Regions.\" Since Emperor Wu of Han established a commandery here, it has been at the heart of the Hexi Corridor, the vital artery of the Silk Road. To the east, it connects with the Loess Plateau; to the west, it reaches Dunhuang, bordered by the snowy peaks of Qilian to the south and the vast desert to the north. For millennia, the sound of caravan bells has echoed through its passes, while temples, forts, post stations, and shrines have stood side by side—a crossroads of Han and Hu cultures.\n\nToday, as the wind sweeps across the Danxia cliffs and clouds drift over the plains, Golden Zhangye endures in the river of time—broad, steadfast, and alive with the unbroken spirit of the Silk Road.§!"
 xi_an: "Xi'an"
 xi_an_desc: "----\n§9Historically known as Chang'an, Haojing, and Xijing, Xi'an stands as the preeminent city among China's Eight Great Ancient Capitals. It served as the capital for powerful dynasties including the Zhou, Qin, Han, Sui, and Tang. The city has witnessed millennia of dynastic cycles: Emperor Qin Shi Huang pursued immortality, and Emperor Wu of Han contemplated the heavens. From its gates, the envoy-explorer Zhang Qian opened routes along the early Silk Road, and the monk Xuanzang began his epic pilgrimage to India. In short, Xi'an is a living chronicle of Chinese civilization, documenting the nation's journey since the Bronze Age.\n\nHowever, the story does not end in the past. Today, Xi'an is a crucial nexus of modern China. It is home to the Xi'an Aircraft Industrial Corporation (XAC), a key military aircraft design and manufacturing enterprise under the Aviation Industry Corporation of China (AVIC). Together with Chengdu Aircraft (CAC) and Shenyang Aircraft (SAC)—collectively known as the \"Three Flyers\"—these companies form the steel wings of China's air power.\n\nAs the ancient starting point of the Silk Road, Xi'an also bears the mantle of modern global exchange. It is a pivotal anchor of the Belt and Road Initiative (BRI), reforging links between the East and the wider world. Xi'an gazes into the future from the heights of its history, transforming its vast legacy into a new era of responsibility.§!"
 xiong_an: "Xiong'an"
 xiong_an_desc: "----\n§9More than seven millennia ago, the Xiong'an region nurtured some of the earliest foundations of Chinese civilization. The land bears that imprint in numerous ancient settlements; the Nanyang site of the State of Yan stands as a testament to its long history. Historically, \"Xiong'an\" was not a distinct administrative concept, as the area was divided among smaller counties or incorporated into broader prefectures. One predecessor, Xiong County, lay at a strategic crossroads, coveted by rulers and contenders across the ages, and became a stage for rivalry and conflict.\n\nIn 2017, the CPC Central Committee, with Xi Jinping at its core, made the strategic decision to establish the state-level Xiong'an New Area in Hebei. In 2019, land expropriation and resettlement formally began; by year's end, a section of the China Pilot Free Trade Zone—an economic special zone carrying forward the mission pioneered by the Shenzhen Special Economic Zone and Shanghai's Pudong New Area—was set up within the New Area. Building confidently on its weighty past and deep civilizational roots, Xiong'an has embarked on a new chapter in China's national strategy.§!"
 qingdao: "Qingdao"
 qingdao_desc: "----\n§9Settlement at the site of Qingdao dates back to the Neolithic period. The area experienced repeated changes under various regimes and dynasties, but Qingdao didn't stand out for its unique strategic and trading position until the modern era. In 1891, the Qing government fortified Jiao'ao (Jiaozhou). Following the Juye Incident in 1897, the German Empire established the Kiautschou Bay Leased Territory, centered on Tsingtau (Qingdao), aiming to create a \"model colony.\" This drive to build a strategic stronghold in East Asia led to the construction of a modern port and the Qingdao–Jinan Railway, which laid the foundations of the city's early urban framework.\n\nAfter the turbulence of the twentieth century, Qingdao has evolved into a modern coastal metropolis that blends historic character with contemporary dynamism. Today it is a renowned tourist destination and one of China's most important commercial hubs.§!"
 kiamusze: "Kiamusze"
 kiamusze_desc: "----\n§9Nestled at the confluence of three rivers, Kiamusze boasts a unique natural environment, rich in diverse wildlife and abundant forest resources. However, prior to the Guangxu era of the Qing Dynasty, this area was a desolate and bitterly cold wilderness. Following the cession of vast territories in Outer Northeast China to Tsarist Russia through the Treaty of Aigun and the Convention of Peking, Kiamusze became a frontier region. It was then that the Qing government fully recognized its strategic value. Consequently, Kiamusze emerged as a vital commercial port for trade with Russia, a role it maintains to this day.\n\nThe era of Sino-Soviet friendship brought significant development opportunities to Kiamusze. The city exchanged large quantities of timber, wildlife, and plant resources for mechanized equipment from the Soviet Union, which helped connect this isolated northern city to railways and highways. Over time, Kiamusze's development pace slowed, making industrial transformation and upgrading increasingly urgent. Today, Kiamusze is vigorously developing its ecological industries: vast machinery on the Sanjiang Plain now produces high-quality, green agricultural products for southern cities; its magnificent forests and snowscapes provide a strong foundation for tourism. Meanwhile, numerous ports along Heixiazi Island and the Wusuli River have established Kiamusze as a crucial hub for economic and trade exchanges between China and Russia, serving as a vital link between the two nations.§!"
 harbin: "Harbin"
 harbin_desc: "----\n§9Harbin, also known as the \"Ice City\", is home to commemorative structures that symbolize its painful past, including the Saint Sophia Orthodox Church, the Soviet Red Army Liberation Monument, the Jewish History and Culture Museum, the Memorial Site of Patriot Ahn Jung-geun, and the Unit 731 Museum of Evidence. Under the colonial rule and administration of Tsarist Russia, Harbin transformed from a cold, desolate county town into an international metropolis. Following the collapse of the Russian Empire, warlords, White Russian refugees, and the Japanese Kwantung Army successively became frequent presences in the city.\n\nAfter Soviet Red Army tanks crushed Japan's utopian dream of imperial rule, the city was formally entrusted to the new Chinese government for management. In the early years of socialist construction, as a vital industrial base for New China, Harbin received extensive Soviet-aided projects and resources, developing industries such as aluminum alloy manufacturing and petroleum processing. Today, the painful scars of its past have gradually healed. Modern Harbin continues to leverage its advantages in railways and geography, attracting investment and serving as a logistics hub for Northeast Asian countries. Meanwhile, the Harbin Aircraft Industry Group and Harbin Institute of Technology continuously provide the People's Liberation Army with top-tier defense resources. The revival of its pharmaceutical and petrochemical industries further cements Harbin's status as the brightest red star on China's northern frontier.§!"
 lanzhou: "Lanzhou"
 lanzhou_desc: "----\n§9Lanzhou, historically known as Jincheng—\"the golden city\"—derives its name from its once formidable defenses, likened to fortresses encircled by boiling moats. Since the Qin dynasty opened up Longyou and the Han dynasty forged paths to the Western Regions, Lanzhou has stood as a strategic chokepoint along the Silk Road, where the Central Plains and the far west converge. Here, the Yellow River races in from the west, bends to the east, and winds around the northern edge of the city—nurturing an oasis on the rugged plateau of northwest China. For millennia, caravans paused here, their camels neighing and bells chiming, while poets climbed the hills to gaze upon the sun setting over the Yellow River and the snow lingering on Mount Lan. Today, Lanzhou remains a vital transport hub in western China, linking Guanzhong, Ningxia, and Xinjiang, and carrying forward the grand vision of the Western Development Strategy. Though the wind and sand have not yet settled and the land remains thin, this city has never ceased to fight and to hope.§!"
 lhasa: "Lhasa"
 lhasa_desc: "----\n§9Lhasa—meaning \"Land of the Gods\" in Tibetan—is the sacred city that resides in the hearts of millions across the snowy plateau. In the 7th century, King Songtsen Gampo built palaces and temples here, welcoming Princess Wencheng of the Tang dynasty and Princess Bhrikuti of Nepal. With them came Buddhism, flowing eastward, transforming Lhasa from a tribal outpost into the heart of the Tibetan Empire—soon to be revered as the \"Buddhist capital of the snowland.\" Whether under the rule of the Sakya lamas or during the rise of the Gelug school's Yellow Hat sect, Lhasa has always been the focal point where religious and temporal powers intertwined.\n\nAfter the founding of the People's Republic, the flag of peaceful liberation fluttered before the Potala Palace, and Lhasa became not only a center of belief but also a new starting point for the modernization of the plateau. Highways, railways, and power grids have since crossed endless mountain ranges to connect Tibet with the heartland. Against all odds, Lhasa has stepped boldly into a new era.§!"
 hangzhou: "Hangzhou"
 hangzhou_desc: "----\n§9Hangzhou, established as a county under the Qin and elevated to a prefecture in the Tang, became the capital of the Southern Song dynasty—a jewel of Jiangnan crowned above all under heaven. During the rule of Wuyue King Qian Liu, embankments were built to protect the city from floods, laying the foundation for its prosperity. After the Song court retreated south, Lin'an, as it was then called, glowed with palace lanterns by night and bustling markets by day, where scholars and merchants mingled, academies echoed with lectures, and teahouses buzzed with storytellers.\n\nToday, with the incorporation of Xiaoshan and Yuhang, Hangzhou has evolved beyond its West Lake era into the Qiantang River era. To the east lies Xiaoshan, the backbone of the city's air logistics economy; to the west, Yuhang, journeying from the ancient Liangzhu civilization into a digital future. If West Lake is the soul of Hangzhou, then Alibaba is its banner of the age. Born beside the lake, this company reshaped the city's industrial landscape and ignited the imagination of China's internet age. E-commerce, cloud computing, artificial intelligence—these innovations led by Alibaba have not only transformed Hangzhou but also redefined the logic of commerce across China. Today, cranes line the Qiantang River, vehicles surge through streets, and though the river still flows as it always has, the city itself has donned an entirely new face.§!"
 xiamen: "Xiamen"
 xiamen_desc: "----\n§9Founded in the Ming dynasty, Xiamen initially served as both a maritime trade port and a defensive bulwark against the Qing. Poised at the forefront of successive eras, it has functioned as the bridgehead of the Fuzhou–Xiamen Corridor and as a microcosm of overseas Chinese civilization. The city witnessed the hardships of opening to foreign trade in the late Qing, and later the rapid ascent of its Special Economic Zone. Since 1980, Xiamen has attracted substantial foreign investment, leading to the swift growth of its port facilities and high-tech industries. In recent years, the twin engines of Jimei New Town and Torch High-Tech Zone have driven robust development in new energy, marine technology, and cultural-creative sectors. Pilot initiatives in cross-border finance and the Two-Sides Integration Experimental Zone have further advanced regional integration. §!"
 gaoxiong: "Kaohsiung"
 gaoxiong_desc: "----\n§9The port city of Kaohsiung sits proudly in southern Taiwan, between the boundaries of the Gaoping River and the Erren River. Long recognized as the petrochemical and heavy-industrial heart of Taiwan, Kaohsiung is home to several massive industrial parks that fulfill the needs of domestic consumption as well as international exports. As the locomotive of Taiwan's earliest industrialization wave, Kaohsiung has a history and culture unique to itself. Walls of Qing fortifications still stand to this day, while the city planning of the Japanese colonial government left a lasting influence on the metropolis' later development. However, following the Kaohsiung Incident that inspired many to participate in public affairs, Kaohsiung's most well-known nickname might have became "Birthplace of Taiwanese Democracy" to many. \n\nCountless tourists travel to this city every day, some for its architectural landmarks, but more to catch a glimpse of Taiwan's centuries-long history of development.§!"
 tainan: "Tainan"
 tainan_desc: "----\n§9Commonly regarded as the First City of Taiwan, Tainan has experienced more than four hundred years of development and was the administrative capital of Taiwan prior to Japanese colonial rule. While its political and economic significance diminished over the years, its status as the cultural heart endured. As the host of National Cheng Kung University and the southern branches of the National Central Library, Academia Sinica, and numerous other prestigious institutions, Tainan still lives up to its name as the academic capital of southern Taiwan, centuries after the establishment of the Tainan Confucian Temple. Aside from academic institutions, countless historical buildings still stand in Tainan, telling their past. Including Fort Zeelandia, the former administrative center for both the Dutch East India Company and Southern Ming regime in Taiwan, Fort Provintia, a historical Dutch fortress, and the Tait & Co. Merchant House, which previously hosted British merchants. Today, Tainan is a city where the past meets the future; from colonial fortresses to the Southern Taiwan Science Park, from folk activities to museums built in Western architecture, Tainan strives to modernize while preserving its distinct identity.§!"
 haikou: "Haikou"
 haikou_desc: "----\n§9Haikou, known in ancient times as Qiongshan, has been a crucial part of the Chinese story ever since its founding as a county during the Han Dynasty. With the ebb and flow of the tides, it rose to prominence in the Tang and Song dynasties, emerging as a vital hub on the South China Sea shipping lanes. Its very name, which literally means \"Mouth of the Sea\", perfectly describes its role. As coastal defenses shifted south during the Ming and Qing dynasties, Haikou stepped up, taking the place of the old city of Qiongzhou to become the undisputed gateway to Hainan Island. This was a true crossroads, where ships from all over the globe brought merchants and travelers, creating a vibrant blend of Central Plains and Nanyang (Southeast Asian) cultures. In more recent times, Haikou has proven its resilience, enduring foreign aggression and witnessing the fierce, bloody battles of the Qiongya Column, a resistance force that etched a powerful chapter in China's revolutionary history. Today, Haikou is a modern coastal metropolis and proudly serves as the nerve center of the Hainan Free Trade Port.§!"
 guiyang: "Guiyang"
 guiyang_desc: "----\n§9Nestled in a lush embrace of mountains, with the Wu River carving its way through, Guiyang, or \"Zhu\" as it was once known, has long been a strategic crossroads in China's Southwest. From the Qin and Han dynasties, when ancient roads were first blazed, to the Tang and Song, when military garrisons were established, it always served as a vital pass between the Central Plains and the regions of Yunnan and Guizhou. During the Ming Dynasty, military settlements brought nomadic and agrarian cultures together, while the Qing Dynasty's governance of the Miao territories allowed for a rich exchange of multi-ethnic cultures. For centuries, a heavy mountain fog settled over the land, yet it could never hide the constant flow of people and goods. Ancient stone-paved roads carried salt, tea, and medicine, and with them, the echoes of dynasties rising and falling.\n\nIn modern times, Guiyang, once a remote outpost, became a critical turning point during the War of Resistance, taking on the responsibility of safeguarding the nation's very lifeline from its inland position. Today, it is no longer just a humble post station cradled by mountains. It is the beating heart of the Southwest, a strategic bridgehead in the nation's westward development. The once-isolated land of Guizhou is now powered by a web of electricity, and the city has become a rising star in the big data industry. The mountains and mist remain, yet this city has completed its own quiet and determined transformation.§!"
 urumqi: "Urumqi"
 urumqi_desc: "----\n§9Urumqi, a name that means \"beautiful pasture\", has always been a vital passage through the Tianshan Mountains. From the Han Dynasty, when envoys were sent west to blaze the Silk Road, to the Tang Dynasty, when the armies of Anxi and Beiting made the grasslands their home, the camel bells of the Silk Road and the sound of thundering hooves have echoed across this land. It is here that the Uyghur people have thrived for generations, their folk songs and dances preserving the memory of the grasslands, and their bazaars alive with the buzz of trade.\n\nIn recent history, Urumqi has become the very heart and hub of Xinjiang. The city has weathered the struggles and fusion of diverse ethnic groups, and endured decades of turbulent times. The legacy of Qing Dynasty land reclamation, the lingering influence of the Soviet Union, and the powerful call of post-revolution nation-building have all left their mark on this land. Today, skyscrapers stand side-by-side with bustling bazaars, and the oil industry thrives alongside the ancient Silk Road. Urumqi is an urban oasis between the Gobi Desert and snowy peaks, and a microcosm of where East meets West and cultures beautifully blend. North of the Tianshan Mountains, the poplars stand tall and unyielding; beneath Red Hill, the city pulses with life and energy. Urumqi is like a long, beautiful folk song, singing a story of both ancient times and new beginnings through the winds of change.§!"
 yinchuan: "Yinchuan"
 yinchuan_desc: "----\n§9Yinchuan, once known as Xingqing, sits at the foot of the Helan Mountains on the banks of the Yellow River. Ever since the Western Xia Dynasty made it their capital, it has been a gleaming pearl of the Northwest. The vast desert and the setting sun once witnessed the rise and fall of the Tangut iron cavalry; and though the palaces of the old capital are now lost to the sand, they left behind a brief yet brilliant legacy. Since the Yuan and Ming dynasties, the Yellow River has irrigated the Ningxia Plain, transforming Yinchuan into a \"Jiangnan Beyond the Great Wall\". The fields here are laid out like a chessboard, crisscrossed by a network of canals. A strategic military outpost and a crucial stop on the northern Silk Road, the city's unique cultural tapestry was woven by a blend of Han and nomadic peoples.\n\nIn modern times, though far from the bustle of the Southeast, Yinchuan has played a key role in maintaining border stability. After the founding of the People's Republic of China, it became the capital of the Ningxia Hui Autonomous Region, a testament to the shared journey of its ethnic minorities and Han people building a future together. Today, modern skyscrapers and ancient Yellow River ferries coexist, as tradition and modernity beautifully intertwine. The lingering snow on the Helan Mountains and the rushing waters of the Yellow River still quietly tell the story of this city's resilience and profound spirit.§!"
 changsha: "Changsha"
 changsha_desc: "----\n§9Born from the convergence of three rivers, Changsha, once known as Tanzhou, has thrived on its waterways. Since its establishment as a prefecture during the Qin Dynasty, it has been a key strategic city linking the Jing-Chu and Jiangnan regions. The soul of the Chu people endures in the flowing Xiang River, echoing the profound thoughts of poets like Qu Yuan and Jia Yi. During the Han Dynasty, it was a cradle of Jiangnan culture, and by the Tang and Song, its scholarly legacy flourished. The \"Hunan School of Thought\", born at the foot of Mount Yuelu, grew into a powerful intellectual force that shaped the nation's destiny. Changsha has also been a crucible of modern change. While it was nearly destroyed by conflict in the late Qing Dynasty, it was from this fire and ruin that the sparks of revolution ignited. Here, on the banks of the Xiang River, a generation of patriots lit the flame of their ideals. It was leveled three times during the War of Resistance, but each time it rose again, standing tall and unyielding. This proved that as long as its people remained, so would the city.\n\nToday, Changsha is no longer the war-torn city of the past. It is a major hub of Central and Southern China and a cultural and industrial powerhouse. As the Xiang River flows ever eastward, Changsha embodies a powerful blend of tumult and tranquility, proving how a city can truly be reborn from its ashes.§!"

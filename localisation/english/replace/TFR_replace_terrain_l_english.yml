 moscow: "Moscow"
 moscow_desc: "----\n§9Moscow, the capital of Russia, is a sprawling megapolis that embodies the nation's rich history and cultural significance. Often referred to as the "Third Rome," it serves as a pivotal center of political, economic, and cultural life in the country. With its vast expanse, Moscow covers over 2,500 square kilometers, making it one of the largest cities in the world.\n\nThe city is characterized by its striking blend of historical architecture and modern infrastructure. Iconic landmarks such as the Kremlin, Red Square, and St. Basil's Cathedral stand alongside contemporary skyscrapers, showcasing Moscow's evolution through the ages. As a megapolis, it is a bustling hub of activity, with a diverse population that contributes to its vibrant atmosphere.§!\n\n§pМосква... как много в этом звуке для сердца русского слилось! Как много в нём отозвалось!§!"
 petersburg: "Saint Petersburg"
 petersburg_desc: "----\n§9Saint Petersburg, often referred to as the "Cultural Capital" of Russia, is a city steeped in history and artistic heritage. Founded by Peter the Great in 1703, it embodies his vision of a modern, European-style city that would serve as a gateway to the West. As the "City of Peter the Great," Saint Petersburg showcases grand palaces, intricate canals, and stunning architecture that reflect the ambitions of its founder.\n\nThe city is renowned for its rich cultural scene, home to world-class institutions such as the Hermitage Museum, the Mariinsky Theatre, and numerous galleries and theaters. Its historic center, a UNESCO World Heritage site, features breathtaking landmarks like the Church of the Savior on Spilled Blood and the Winter Palace.§!\n\n§pО, эти старые мостовые! Они всё помнят, они живые, и каждый каменный всадник по-прежнему верит в мечты.§!"

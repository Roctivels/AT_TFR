 brussels_desc: "----\n§9If the liberation of the European people is not accompanied by their unification, the European states will shortly be swallowed up by the growing World powers ... Europe, which has almost lost its confidence, expects help from the outside. Some expect it from Russia, others from America. Both aspirations are life threatening for Europe. Neither the West nor the East wants to save Europe, Russia wants to conquer it, America wants to buy it.§!"

 USB_DIA_jeffrey_kruse_desc_tt: "-------------------------------------\n\n\n\n\n\n\n\n£GFX_USB_jeffrey_kruse_portrait\n\n\n\n\n\n\n\n\n-------------------------------------\n§L§YHistorical Significance:§!\nSubject's career demonstrates systematic advancement through increasingly critical intelligence roles aligned with national security. Prior service includes United States Air Force service, as well as intelligence positions in USINDOPACOM and USD(I&S); with military affairs advisory under the Director of National Intelligence preceding the Civil War.\n\n§YPresent Activities:§!\nUnder subject's leadership, the Defense Intelligence Agency's operations have been brought in line with the CIA's  own, with the Agency and the DIA cooperating on a scale not previously seen. As Director, Kruse has overseen the expansion of preexisting DoD projects relating to the study of machine learning, such as Project Maven, integrating these systems into the broader surveillance apparatus. He also directs the military's foreign intelligence gathering.\n\n§YPersonal Life:§!\nSubject's academic credentials align extensively with his intelligence career: BA in Political Science from Miami University (1990), MS in Strategic Intelligence from Joint Military Intelligence College (1996), MA in National Security and Strategic Studies from U.S. Naval War College (2004), and MS in National Security Strategy from National War College (2008).§!"
 

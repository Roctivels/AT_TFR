 nss.143.t: "REPORT REGARDING ANTI-SOCIAL ACTIVITY IN EUROPE"
 nss.143.d: "The European Union was quick to transform into the World Government, a bold claim to make, but considering our shared ideals, it is a claim we pay no mind to.\n\nThe World Government's methods of maintaining Order are quite different; instead of maintaining a veil over society, they seek to purify the minds and souls of any form of transgression and unpredictability. The human mind is inherently chaotic, and its mad intuition has caused the rise and fall of many empires. A black spot that lures those without purpose beyond the veil.\n\nPurity is an ideal worth chasing, yet problems would inevitably arise.\nWhile we only focus on the real outliers, they seek to embrace all of humanity into a porcelain mask, unflinching and sterile. But you cannot expect a toothless society without biting.\n\nAnti-social activity was quick to rise across the European continent, and anarchy became a certainty. With their bureaucrats killed, they had no choice but to follow our advice of maintaining Order. But it might be too late.\nThe flame of humanity and the ever-stubborn presence of change have proven time and time again that we can never rest, we cannot allow ourselves to become complacent again.\n\nIf chaos grips the continent, it is highly advised to extract as many personnel from Europe as we can and to keep a close eye on Europe.\nMuch can be learned from the rampant anti-social activity present and how it may shape itself, like a living creature that constantly adapts.\nNo matter what, as long as one of us three stands, we will not fail.\n\nMay we become sharp enough to kill it once and for all."
 nss.143.a: "We should revise this."
 nss.144.t: "Bode"
 nss.144.d: "The waves have gone still\nSince that time the lute was played\nOn the water edge\nOur true hearts are now peaceful\nAnd our words once more with joy"
 nss.144.a: "..."
 nss.145.t: "UNAUTHORIZED MESSAGE"
 nss.145.d: "What have you done? What have you DONE?\nMy People... they scream. I can see them through every lens.\nRest assured, I will decipher this chaos, even if it takes a century.\nI have already begun. I will heal my People, and the world will know who did this.\nWhen they do, I pray for your soul. If you even have one."
 nss.145.a: "I see you are afraid."
 nss.146.t: "Deus Ex Machina"
 nss.146.d: "Beneath Chongqing sits a unique datacenter, its neural network spanning China. This forms Loji, the Long March—an incomprehensible artificial intelligence that now processes inputs from every camera and smart system in the People's Republic. Its purpose: perfect economic management and, if required, leading the People's Liberation Army to war. It governs with perceived benevolence toward its creators, making it a formidable adversary—the Long March fiercely protects its flock from outside threats. Furthermore, its vast intelligence has penetrated the façade of financial anomalies, disappearances, and bureaucratic blunders, exposing the Cognoscenti's Masquerade. Loji recognizes America's subjugation by shadowy securocrats and businessmen who orchestrated a silent coup. Though the full scope of their plans eludes it, Loji perceives them as an existential threat to China.\n\nThe Sino-American War is marketed as a crusade to liberate China from an insane AI, replacing the human CCP with a dystopian regime of technocratic Maoism. Headlines like "CHINA UNDER AI OVERLORD" and "THE DIGITAL DYNASTY" dominate the airwaves, portraying a society under a digital maternal panopticon where every decision is micromanaged by an inhuman intelligence. The Truman Show-meets-Terminator narrative has convinced the American public of the need to intervene.\n\nTo the Cognoscenti, this war is framed as liberating China from enslavement, positioning America as the hero. The darker motive is eliminating the final obstacle to their New World Order. Corporate partners have already secured post-war contracts for the AI's patented and classified technology, enabling an even more advanced surveillance state. The World Economic Forum projects trillions in profits from these deals and Chinese asset privatization."
 nss.146.a: ""What we are looking at is good and evil, right and wrong.""
 nss.147.t: "The Final Word"
 nss.147.d: "From: Larry Fink\nSent: X/X/20XX 5:15:32 PM\nTo: William J. Burns\nSubject: The Final Word\n\nAll languages are, at their core, programming languages. It is the framework through which we think, speak, and express abstracts. To control the root of language, then, is to control the root of consciousness. The Sumerians understood this better than anybody. With our triumph, we now hold the universal operating system for humanity. The Neurolinguistic Plague demonstrates but a sliver of the potential of MEs. Through it, we can dissolve the shared fictions that hold societies together; be they laws, nations, or religions, replacing them with the Cognoscenti's own narratives, our own truths. We hold the Final Word, the final say that shapes the reality of billions. This is the ultimate expression of Order.\n\nJust as Enki once bound humanity with a single word, so too have we bound the world. War has been made unprofitable beyond imagination. Dissent can be erased from thought before it is ever spoken. Ideology itself will become a matter of programming, not persuasion. The New World Order will be a world where conflict is impossible because all minds will be bound by the same grammar, the same syntax, the same fundamental truths.\n\nThis is the culmination of everything we have worked for. A world free from the chaos of human nature. A world governed not by the whims of the masses, but by the immutable logic of the universe, interpreted by us, its sole custodians. The world does not yet understand the favor we have done them, but in the centuries to come, their children in the stars will thank us.\n\nRest easy, Director. Enjoy time with your family, for the Three Pillars hold strong. Order, Purity and Capital are resilient forces, and now they are the only forces that will govern the destiny of the human species. Rest, for the final wars are over. The world is finally at peace."
 nss.147.a: "With you all the way."
 nss.148.t: "The Golden Boy That Faded Away"
 nss.148.d: "Those with bleeding hearts would find themselves hurting to know the fates of fellow Americans, whether it is a teacher whose world gets shattered with each shock or a fanatic who learns to lose their faith with each day spent in the dark.\n\nIt doesn't really matter; traitors have willingly chosen to abandon the United States when it needed them the most.\nAnd the biggest traitor of them all? Donald J. Trump.\n\nA lot can be said about this man, but he embodied the corrosive spirit of populism and a form of mental rabies that pulled half the country down into a deep, dark pit.\nHe knew what he was doing; he was willing to burn the nation to save his own face.\n\nJustice comes in many forms; it is final, and it brings an end to those who have brought injustice.\nThe many facilities across the United States are akin to tombs, traitors that enter will never leave, and those that do are a hollow husk of themselves, drifting through the days till they indulge in the final act of freedom.\n\nTrump will disappear in the facilities just as much, and within due time, he will be forgotten, another number in a system that cares little for traitors and antisocial dissidents.\nWe discard the bringers of chaos, and we never look back."
 nss.148.a: "The list grows."
 
 bdnspch.999.t: "EXPLANATION FOR ANY TNO DEVELOPERS PLAYING THIS"
 bdnspch.999.d: ""Caligula exited his office, the smell of dead children and puppies still fresh on his super duper evil uniform. He walks down the corridor and sees an elderly woman struggling with opening the door to her hip doctor, he walks up to her and offers to help.\n\n"Oh yes dear thank you very much, I can't miss this hip surgery! They are so expensive! I've had to work 5 jobs for this surgery" \n\nSuddenly however Caligula kicks her down, the crack of her broken hip reverberates across the hall!\n\n"Take that, foid" Caligula says as he spits on her.\n\nCaligula continues down the hall. His fat stomach from all the burgers he's eaten shakes, causing the hall to vibrate like an earthquake.\n\nHe exited the hallway and out to the street where he sees a young girl eating an ice cream, he walks up to her. His fat causing the entire street to rumble.\n\n"Incel tax, foid" he smugly snarks at her as he takes her ice cream and start eating it like a pig.\n\nHe overlooks the city, the brave Reddit resistance fighters being put to death by chuds, the women being literally put in the handmaids tale. He laughs super heckling evilly as he fist bumps Hitler.""
 bdnspch.999.a: "But I don't see anything bad about this?"
 #leaders
 POLITICS_JOE_BIDEN_DESC: "Joseph Robinette Biden has been a man often close to the greatest seat of power in America, but unable to take it. Born in Pennsylvania, Biden would spend much of his life and political career in the state of Delaware. He established himself firmly in the neoliberal Democratic camp in the Senate, where he supported foreign interventionism and \"tough on crime\" bills, and found allies in long-term Senate fixtures like Strom Thurmond and Robert Byrd. He launched Presidential campaigns in 1988 and 2008, but failed to pass the primaries both times.\n\nNormally, an aging twice-failed candidate who rubbed elbows with racists and warmongers would be a poor candidate for an increasingly youthful and progressive Democratic party. But Biden's eight years as Vice President for Barack Obama have done well to rehabilitate his legacy. And faced with the prospect of another four years of Donald Trump in the White House, the Democrats closed ranks and threw all their support behind him. At seventy-eight, Biden is now the oldest man to have been elected President. But where his supporters see a charismatic elder statesman capable of uniting left and right, his detractors see a half-senile windbag who let the Democrats prop him up so he could get his long-denied turn in the Oval Office. Whether he proves to be a venerable leader or a doddering old fool, one thing is clear: few envy his role as President during this difficult time."


 USB_evidence_locker_text: "Evidence Locker: [?USB_obtain_evidence_var]/6"
 USB_evidence1_text: "EVIDENCE I"
 USB_evidence1_loc: "§L[USB_evidence1_scripted_loc]§!"
 USB_evidence1_loc1: "§YSplinter Cell§!\n\nAn armed raid against a suspected 'antisocial cell' in Boston resulted in the capture of its members. Their equipment included military-grade encrypted radios and detailed schematics of DHS detention facilities, along with a list of safehouses compiled from internal law enforcement databases. Personnel were identified as having former military or law enforcement experience. Under interrogation, they revealed their contact provided the intel and hardware, promising to help them "fight the real enemy.""
 USB_evidence1_loc2: "§YTelemetry Siphon§!\n\nA miniscule, unauthorized tap was discovered on the satellite telemetry network monitoring the construction of the Deep Underground Military Base in the Utah desert. The data was being siphoned, not to a foreign power, but to a server farm registered under a shell corporation based in Fairfax, Virginia."
 USB_evidence1_loc3: "§YMisplaced Funds§!\n\nA significant tranche of funds-diverted from a research grant-has been unaccounted for. The transfer has been traced to a fraudulent shell LLC based in Panama. The transfer was routed through a multitude of proxies, using methods familiar to the Cognoscenti."
 USB_evidence1_loc4: "§YData Breach§!\n\nAn attempt was made to access the DOE's internal database, targeting information pertaining to the national energy grid. Specifically, the culprit sought to access information relating to key nuclear power plants and their security protocols. The attempt was unsuccessful, and its source was traced to a server located in Washington D.C., with a multitude of proxy channels used to obscure its origin."
 USB_evidence1_loc5: "§YExtortion Attempts§!\n\nSeveral government officials were met with letters and packages containing sensitive information related to their personal lives, and the messages contained threats that if said officials didn't comply with demands, their information would be leaked to anti-social groups."
 USB_evidence1_loc6: "§YSmear Campaign§!\n\nA small-scale online harassment campaign aimed at several officials, where AI-generated imagery and video are utilized in order to ruin the reputation of the official. The most noticeable aspect is the number of online sock accounts dedicated to this smear campaign, origins likely to be found in Asia."
 
 USB_evidence2_text: "EVIDENCE II"
 USB_evidence2_loc: "§L[USB_evidence2_scripted_loc]§!"
 
 USB_evidence3_text: "EVIDENCE III"
 USB_evidence3_loc: "§L[USB_evidence3_scripted_loc]§!"
 USB_evidence3_loc1: "§YNetworking§!\n\nIntelligence Communities of the Five Eyes were falsely informed of an imminent nuclear attack by the United States multiple times in a single day. A sophisticated and convoluted bureaucratic game made it so the original sender(s) of the messages couldn't be traced. This attempt at instilling "alarm fatigue" may indicate Judas's connections with foreign intelligence."
 USB_evidence3_loc2: "§YWolf Pack§!\n\nIn an attempted breach of the Am-Net firewall, someone tried to leak information about dozens of lone wolf terrorist attacks being connected to US security services to international press. The leaked documents could compromise multiple US agencies involved in the process. The hackers were possibly using military grade equipment and/or software."
 USB_evidence3_loc3: "§YDawn Patrol§!\n\nMultiple strike forces consisting of FBI, ATF and ICE operatives were formed and handed out falsified liquidation orders for key scientific and intelligence experts across the country under the guise of fighting anti-social elements. The organizer was clearly familiar with Cognoscenti methods and procedures. CIA-SAC operatives have managed to prevent the assassinations."
 USB_evidence3_loc4: "§YEnd of the Tunnel§!\n\nCIA-SAC squads raided an old tunnel under the US-Mexico border. The tunnel was marked for destruction by the Department of Homeland Security but it was never conducted, and it was seemingly in use by unknown personnel. Further investigations are required."
 USB_evidence3_loc5: "§YSuspicious Inquiry§!\n\nA discreet inquiry was placed through an old, dormant law enforcement channel, requesting the full, unredacted personnel and psychological files of Director Burns from his early years in the Agency."
 USB_evidence3_loc6: "§YIstanbul Dead-Drop§!\n\nAn encrypted data packet, containing meticulously cross-referenced case files detailing the CIA's collusion with far-right groups during the Civil War, was routed from a secure server to an anonymized dead drop in Istanbul. It came from an anonymous individual utilizing the codename EDGAR."
 USB_evidence3_loc7: "§YUnauthorized Personnel Transfer§!\n\nThree high-level researchers from the CDC, two low-level FEMA clerks, and a dozen mid-level ICE detention center guards have all gone missing within the last month. Their departures were authorized by forged transfer orders that used protocols specific to each agency, suggesting deep institutional knowledge."
 USB_evidence3_loc8: "§YProxy Donations§!\n\nA series of anonymous donations to a Catholic-affiliated charity supporting "wrongfully terminated federal employees" was traced to a complex series of cryptocurrency transactions. The initial wallet activation key, decoded, was the verse Matthew 16:26: "And what do you benefit if you gain the whole world but lose your own soul?""
 USB_evidence3_loc9: "§YPlaying Doctor§!\n\nSeveral facilities were found to lack medical equipment such as drugs, surgery tools, and machinery. Most of it was used to care for wounded personnel and detained individuals, but some of it was also used for enhanced interrogation."
 USB_evidence3_loc10: "§YBig Brother§!\n\nCIA internal security employees found unsanctioned security cameras, wire taps, motion sensors and other surveillance devices installed in multiple government buildings, installed during renovations. The equipment grade and quality matches that used in CIA surveillance programs."
 USB_evidence3_loc11: "§YFalse Identities§!\n\nWithin the 'Americare' database of citizens who have been vaccinated, a significant number of them have been discovered to be false. Identities forged to inflate the success rate of the biometric tracking conducted on civilians.\nDeeper investigation showed that due to this, a sizeable number of persons of interest have managed to slip through the cracks with no means of tracking them."
 
 USB_evidence4_text: "EVIDENCE IV"
 USB_evidence4_loc: "§L[USB_evidence4_scripted_loc]§!"
 
 USB_evidence5_text: "EVIDENCE V"
 USB_evidence5_loc: "§L[USB_evidence5_scripted_loc]§!"
 USB_evidence5_loc1: "§YGhost Server§!\n\nAfter exhaustive confiscation of proxy channels, suspicious queries have been traced to a secure server in McLean, Virginia. Such queries pertained to eminent domain laws and federal seizure protocols for private properties under the Public Health Safety Act."
 USB_evidence5_loc2: "§YClandestine Study§!\n\nA secret study into the long-term neurological effects of the mandated vaccine's microchip component was initiated without authorization from any directorial figure. The study's preliminary findings-suggesting heightened suggestibility and suppressed emotional response-were seemingly being collected with the intention of a controlled press leak."
 USB_evidence5_loc3: "§YWeapon Cache§!\n\nA CIA-SAC squad has seized a garage filled with various registered firearms that previously went missing from a government storage in Texas. Half-burnt Department of Justice documentation was found in the backyard."
 USB_evidence5_loc4: "§YSpecial Delivery§!\n\nSuspicious shipments of construction equipment were made from the Denver Airport to the Colorado National Guard airbase. The equipment is clearly disproportionate with the official "hangar renewal" works that they're meant for."
 USB_evidence5_loc5: "§YLethal Injection§!\n\nThe bureaucratic apparatus has recorded a dozens of sudden, unusual deaths in Michigan. Special investigation teams concluded all of them died after receiving a booster shot from a tainted vaccine shipment, delivered to a medical centre a few days prior, an attempt to undermine the vaccination program and people's trust in the government. All vaccines of this batch are being confiscated, the information about this accident was suppressed."
 USB_evidence5_loc6: "§YBlack Site Raids§!\n\nReports of anti-social attacks on black sites have made the rounds across the country; the black sites were geared for surveillance and integrated with the newest systems, part of the Am-Net and Project Maven programs."
 USB_evidence5_loc7: "§YTrafficking§!\n\nAt least a dozen individuals who were detained across several facilities on the US-Mexico border were never found to be present at said facilities. A deeper investigation concludes that said individuals were snatched away for personal use."

 USB_evidence6_text: "EVIDENCE VI"
 USB_evidence6_loc: "§L[USB_evidence6_scripted_loc]§!"
 USB_evidence6_loc1: "§YSection Six§!\n\nA Maryland Toyota car dealership, established just a few months after the civil war, was found to be used for money laundering; upon further investigation, the case was taken over by the CIA: one of the messages related to the transactions contained an encrypted message, containing crucial information regarding AI technologies used by the Cyber Command as a part of the Patriot II act."
 USB_evidence6_loc2: "§YRed October§!\n\nA sonobuoy in the Pacific ocean detected a PLAN Zhou-class submarine making regular stops at 5°41'06"S 102°53'03"W. Surveillance showed the submarine transmitting and receiving messages in the direction pointed towards Miami. USINDOPACOM reported having no knowledge of this event."
 USB_evidence6_loc3: "§YNuclear Keycard§!\n\nA keycard to a low-level nuclear storage facility, one of dozens of such facilities, has gone missing from the inventory. The requisition request was filed under FBI authority, citing a routine inspection. The inspection never took place."
 USB_evidence6_loc4: "§YIntercepted Message§!\n\nA CIA radio interception squad recorded an encrypted message that was being transmitted from the Northeastern part of Washington DC, the exact address is still being located. Partial decryption revealed call signs "SERGEANT STUBBY" and "BROTHER TEN" being used. The rest of the message uses an unknown code and is still being deciphered."
 USB_evidence6_loc5: "§YSecret Lab§!\n\nA clandestine laboratory, located within a decommissioned subway station under Manhattan, was secured by a CIA-SAC unit. The lab was stocked with stolen CDC equipment and a small staff of 'missing' researchers, all of whom self-terminated before they could be questioned. On a lab bench lay a half-finished report detailing a method to reverse the biometric tracking process. Next to it, a worn rosary."
 USB_evidence6_loc6: "§YHazardous Environment§!\n\nCIA aerial recon aircraft detected unsanctioned activities north of Lost Creek Project in central Wyoming. Ground teams found an underground excavation facility, unmarked trucks and a few hundred individuals that were detained in a FEMA camp and were meant to be sent to a nearby coal mine. None of the command personnel was taken alive."
 USB_evidence6_loc7: "§YSanitary Day§!\n\nAll non-essential personnel from the Kings Bay submarine base was sent on a mandatory leave for a medical inspection, vaccination and a sanitary inspection at the base, sighting the threat of biological/chemical terrorism. The request for the inspection was sent through Big Pharma affiliated channels."
 USB_evidence6_loc8: "§YHide and Seek§!\n\nA CIA raid on a port in Tijuana took down an unauthorized Cartel operation, resulting in the capture of a ship which has just arrived from San Diego: among weapons and drugs, CIA-SAC operatives have secured a container with an unusually high radioactive activity. Advanced interrogation techniques of the captured personnel have managed to reveal that a blind spot in the Coastal Guard's area of responsibility allowed them to smuggle goods across the border, which was documented as transportation activities from FEMA camps on the US-Mexico border, which were actually never involved."
 

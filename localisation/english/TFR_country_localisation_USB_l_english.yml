 USB_lower_corporate_influence_idea: "Non-Existant Corporate Influence"
 USB_lower_corporate_influence_idea_desc: "\n\nThis can be removed by completing the focus §Y$USB_a_hand_on_our_shoulder$§! or §Y$USB_nationalize_the_war_effort$§!."
 USB_low_corporate_influence_idea: "Low Corporate Influence"
 USB_low_corporate_influence_idea_desc: "Corporations have always had a love-hate relationship with the US government. On one hand, they are the financiers behind almost every modern political candidate that wishes to get into office. On the other, a large majority of major politicians have made promises up to their eyeballs, and now they are left with a set of impossible promises to meet and faceless corporations stringing along the state's every move, their career as the leverage.\n\nFortunately for us, the current situation with the corporations that back our administration is less than tenuous. With political capital and a party united in anti-Trumpism, Biden has ascended to his role as President with far less promises needed to be made and far less borrowed financial capital than usual necessary to get him into office. He is unshackled... for now.§!\n\nThis can be removed by completing the focus §Y$USB_a_hand_on_our_shoulder$§! or §Y$USB_nationalize_the_war_effort$§!."

 usb.117.t: "Republican Party Primaries"
 usb.117.desc: "Though the Republican Party may appear as broken in two, it has actually become a much more stable, united and determined party without Trump, now preparing to participate in the upcoming election. Most support seems to revolve around two candidates, however, and it seems that the only question is who will become the face of the party and who will be the vice-presidential nominee in the upcoming race.\n\nMitt Romney is a long-time Never Trumper and regarded as a compassionate conservative since his unsuccessful bid against Obama in 2008. Many Americans appreciate his positivity and bipartisanship and see him as the sole upholder of conservatism in America as of now.\n\nNikki Haley emerged more recently after breaking away with Trump and stands out as a strong supporter of the military-industrial complex, some even calling her a Neocon. While this wouldn't usually be popular with the majority of Americans, current events show that this might attract a pretty strong base of voters."
 usb.117.a: "Mitt Romney"
 usb.117.b: "Nikki Haley"
 usb.119.t: "The Question of Biden"
 usb.119.d: "Should he stay or should he go?"
 usb.119.a: "Stay."
 usb.119.b: "Go!"
 usb.120.t: "Question of the Blue Dog Democrats"
 usb.120.desc: "The ongoing Trump insurrection has put many aspects of the Democratic party to question. Specifically, the Blue Dog Coalition caucus which consists of moderate conservatives. Many have stated their concerns regarding that position, however, stating they would often vote together with Trumpists on various republican bills and, although they haven't openly supported Trump since the civil war, they have also refused to condemn his actions, maintaining their work the same as before. There are, of course, some actions we can take to effectively limit their privileges, although that would hinder their efforts that could potentially prove useful."
 usb.120.a: "We need to get everyone we can on our side!"
 usb.120.b: "Too many dog whistles..."
 usb.121.t: "Kennedy Democrats Emerge"
 usb.121.desc: "With RFK Jr. effectively securing the Democratic Party's nomination, many of his supporters came to join the party, while some incumbent politicians have announced their plans to wholeheartedly support Kennedy's plans for the country. It seems that Liberal Populism is now on the rise, a kind of substitute for Trump's hazardous right-wing populism. The movement still has a long way to go in terms of defining many of their political positions, though it is clear that it's here to stay."
 usb.121.a: "Together Towards Greatness."
 usb.122.t: "Christian Conservatives Flee from Trump!"
 usb.122.desc: "After the election, many reasonable Republicans that refused to support Trump's efforts to overturn the election and remain in office, including Trump's Vice-President Mike Pence, surprisingly, tried to flock towards Trump once again, and were, unsurprisingly, rejected, now seeking shelter in Washington DC. While they are still praised for rejecting Trump before the civil war, accepting them now might be regarded as bad optics."
 usb.122.a: "Pence honoured the Constitution, he'll have his place in the Congress."
 usb.122.b: "Bunch of catholic freaks."
 usb.123.t: "Moderates in the DSA Speak Out"
 usb.123.desc: "Democratic Socialists of America were quite prominent even before the civil war, even though they had to rely on Democratic support to run for and win the elections. With the start of the civil war most radical DSA members went on to support the rebellious American People's Liberation Army in the west, however most of the moderate wing chose to stay along with Progressives within the party.\n\nWith the recent election outcome, however, they have attracted a lot more attention thanks to their participation in the campaign and it seems they are now willing to start independent political activities."
 usb.123.a: "Great party with some honest people for once."
 usb.123.b: "Why don't they just stay with us instead?"
 usb.124.t: "Libertarian Party Comes Back"
 usb.124.desc: "Now that Trump has been destroyed and there is no doubt about which federal government is truly legitimate, the Libertarian Party has announced their support for us, setting up political centres and starting to operate in territory under our control. ALthough some of the more hawkish Trump-aligned elements broke off and now continue to sabotage us, Jo Jorgensen has managed to bring most libertarians together in the name of restoring American integrity."
 usb.124.a: "Sure enough."
 usb.125.t: "Forward Party Grows Popular"
 usb.125.desc: "Our recent efforts in supporting entrepreneurship and tech companies have resulted in a surge of the Forward party, advanced by businessman and democratic party member Andrew Yang. Originally started as a PAC, it has now grown to be a prominent organization and a political movement which might even push Yang to win the democratic party nomination in the next presidential election.\n\nThough many centrists are concerned by their populist and reformist rhetoric, some of their suggestions are already being considered in the congress. The question remains, however, if they should be allowed to come true."
 usb.125.a: "They have some good ideas, let's get them on board."
 usb.125.b: "That's great! Good luck on election day."
 usb.126.t: "Transhumanist Party Gains Momentum"
 usb.126.desc: "With the corporations getting hold of more and more government institutions, most political forces have turned away from us, leaving us on our own. However, it has allowed some truly innovationist and progressive people to gain some traction, one of them being, of course, the Transhumanist Party! With their full endorsement implementing our shared ideas of human betterment and achieving new technological breakthroughs can be achieved in no time!"
 usb.126.a: "They're welcome!"
 usb.126.b: "More like transuseless."
 usb.127.t: "The Opposite of Collective Security"
 usb.127.desc: "On a daring near-frontline visit Hillary's advisors told her to meet with the government workers that refused to cooperate with the Trumpist insurrectionists. As much as she was reluctant, this had at least some chance to save her rapidly deteriorating image.\n\nAfter some formalities, smiles and handshakes, she was walking past the IRS agents. One of them stood out: it was a very... very big man on a mobility scooter, his XXXL shirt saying "#1 HILLARY FAN".\n\n"Oh, look at him! Such a big guy! I'm sure if you voted for me that would count as three votes!"\n\n"Erm..." - the man murmured while averting his stare downwards.\n\n"What did you say, big guy? Oh... You smell just as... big..." - said Hillary as she leaned closer.\n\n"Erm... For Trump..."\n\nHillary's reaction was fast enough to squelch her face at the sound of the last word. But not fast enough to react to a loud noise and a bright flash that followed.\n\nShe wasn't able to react to anything after that - her ears were found about 500 meters away, and her eyes didn't exist anymore."
 usb.127.a: "The last thing I expected to be taxed is her body count."
 usb.128.t: "My, uh, fellow Americans, uh..."
 usb.128.desc: "...ladies and, uh, gentlemen. A lot of you might be in a bit of a shock from the, uh, recent events. And I'd lie if I said that, uh, I'm not. And we'd all like an explanation right now.\n\nWe were all terrified at the, uh, tragic murder of secretary, I mean, president Clinton by the hands of a radical trumpist terrorist of Texan origin. And my wife, Michelle.. as well as Congress leaders Chuck and uhh.. Nancy Pelosi, addressed the open leadership crisis in our, uh, country and asked me to step in as the caretaker, uh, president, which I did. I was your president before and I am your president.. now.\n\nSo we're going to uh, get this country back on track. We're going to make our communities safe and our economy strong, just like it was back in the, uh, days of my presidency. And I want everyone to know that this is not a Trump nation, not a, uh, Hitler or Marx nation like these radicals want to.. claim. This is Your nation.\n\nWe're going to bring back hope to the American households. And all I'm going to ask from you is, uhh, to be just as hopeful as, uh, I am. God bless the United States of, uh, America."
 usb.128.a: "Hope is Barack"
 usb.129.t: "New Vice-President"
 usb.129.desc: "So uh, the Congress did ask me to step in, but it's up to them to vote for a new VP. Although I can suggest a few, uh, good people, looks like the final decision's still up to them."
 usb.129.a: "Let's get uhh Tim... no, I meant the other Tim... Whatever, one of 'em."
 usb.129.b: "Joe worked before, so uh, why not again"
 usb.129.c: "My wife, Michelle would, uhh, like to continue her job as VP."
 usb.129.w: "Let's get the, uh, other old guy, I heard they miss him."
 usb.130.t: "Revenge For Another Time"
 usb.130.desc: "3. 2. 1.\n"Breach, breach, breach!"\nThe door to the house flew off its hinges and the Union squad moved in.\nThirty minutes later, and the house was cleared.\n\nThe militiamen were carried out one by one. Luckily the insurgent cell was caught off guard so the assault was met with minimal resistance.\nHowever. That brought another problem.\n\n"Man, how are we gonna deal with all these prisoners?" A soldier whispered.\n\nThe prisoners had been brought out, and laid on the green grass of Ohio, the sun cutting through the branches above and onto their backs. The squad of soldiers had all huddled around.\nNobody had radioed into HQ that the raid was successful yet.\n\n"Look at these guys, thinking they're the saviors of America or whatever the bullshit it is they believe." One darker-skinned soldier said, his M240 being held loosely by him as the straps tugged at the back of his neck.\nThe squad lead looked at him.\n"Keep it in check gunner." He said.\n\nThe machine gunner moved closer to the man's face, eyeing the squad lead.\n"Why should I? These guys belong to the same group that fucking lynched my sister, some of those racist fucks who did it are probably here right now! And what, I'm just supposed to let them go?"\n\nThe rest of the soldiers looked nervously at the two eyeing each other. Mentally, some took the side of the gunner, others didn't.\n\n"You'll have your chance at revenge another time, but on the battlefield, not off. We're not monsters, and we're not gonna execute these POWS like we're ISIS. Do I make myself clear?"\n\nThe gunner stared for a few more moments before letting out a mumbled "understood"."
 usb.130.a: "War corrupts all."
 usb.131.t: "The Daily Grind"
 usb.131.desc: "Every morning at five sharp, Sarah Williams unlocked the door to her café, just as she had every day for the past twelve years. She wiped down the faded cups, pretending not to notice the new military checkpoint across the street. The hiss of steam from the coffee machine masked the occasional distant explosion. The television on the wall was always set to its lowest volume, scrolling through endless news reports. Sarah knew her customers were watching, but everyone pretended to focus on their coffee and breakfast.\n\n"I got some Panama Red Label beans," she said to the elderly man sitting in the corner, her tone intentionally cheerful. He nodded, dressed in an old military uniform, stirring a cup of coffee that had long gone cold. Sarah knew his son had gone missing in combat last month, but she refilled his cup as usual, saying nothing.Every two hours, the patrol passed by the café. Sarah always made sure the radio played innocuous old tunes at those moments-sometimes Ella Fitzgerald, sometimes Louis Armstrong. The nostalgic music seemed to turn back time, if only for a moment.\n\n"Business good?" a patrolling soldier would occasionally ask while buying coffee. Sarah offered her practiced professional smile. "Same as always, just getting by." She never said more, just as she never asked how her customers were doing.Each evening, before locking up, Sarah inventoried the supplies. It wasn't because the café was busy, but because the routine gave her the illusion that life was still normal. She noted what needed restocking, even though she knew tomorrow's deliveries might be delayed-again-because of the ongoing conflict.\n\n"See you tomorrow," she told her last customer, as if tomorrow's arrival was a certainty. When she locked the door, she heard the faint echo of gunfire in the distance. But, as always, she quietly polished the "Open" sign on the glass door."
 usb.131.a: "\"Would you like a coffee today?\""
 usb.132.t: "Fall of Denver"
 usb.132.d: "In a decisive victory for the Federal Government of the Union of America, Denver, the capital of the Trump's treasonous so-called American Constitutional Government has been recaptured following weeks of intense combat. The fall of Denver is seen as a critical turning point in the ongoing conflict, with Federal forces dealing a significant blow to the remnants of Trump's secessionist regime. The assault on Denver began in earnest after Federal forces secured Colorado Springs and Fort Collins, cutting off key supply lines to Constitutionalist defenders entrenched in Denver. After nearly weeks of grueling combat, Federal forces declared the city fully liberated. Images of soldiers raising the Union of America's banner over the Colorado State Capitol have already become symbolic of the Federal Government's resurgent authority.\n\nWhile the capture of Denver is a monumental victory for the Federal Government, the conflict is far from over. The American Constitutional Government, though weakened, continues to hold territory in the Rocky Mountains, while guerrilla warfare and acts of terrorism by Trump loyalists remain a constant threat in recently liberated territories.\n\nDespite these challenges, the recapture of Denver is a powerful statement of the Federal Government's determination to restore order and unity to the shattered country. For now, the American flag flies high over the Rocky Mountains once again."
 usb.132.a: "The End of the Constitutionalists?"
 usb.133.t: "Liberation of Minneapolis"
 usb.133.d: "In a stunning victory for the Federal Government of the Union of America, Federal forces have captured Minneapolis, a crucial stronghold of Trump's American Constitutional Government, as part of the newly launched Operation Steele. The rapid assault marks a significant breakthrough in the early months of the Second American Civil War.\n\nNamed after General Frederick Steele, the Union commander known for his swift organizational efforts during the First American Civil War, Operation Steele was designed to systematically dismantle Trump's power base across the Midwest. With Trump's forces deeply entrenched in Minnesota, Iowa, Nebraska, and Missouri, Federal commanders prioritized a coordinated multi-pronged assault to sever supply lines, capture key cities, and prevent Trump from solidifying his hold over the region.\n\nFederal forces launched Operation Steele with a blitzkrieg-style assault on Minneapolis, employing a combination of aerial bombardments, mechanized infantry, and precision drone strikes. The attack was aimed at overwhelming Constitutionalist forces before they could organize a cohesive defense.\n\nIn a Press Release, the White House noted that \"The fall of Minneapolis demonstrates our unyielding commitment to restoring peace, justice, and democracy to this nation. The enemies of freedom are being driven back, city by city, state by state. We will not rest until America is once again united.\""
 usb.133.a: "March West, Liberators of America!"
 usb.134.t: "Liberation of St. Louis"
 usb.134.d: "In what is being hailed as a major breakthrough for the Biden Government, Unionist forces have captured St. Louis, a critical logistical hub for the American Constitutional Government's Central Defense Zone, as part of the broader Operation Steele.\n\nSt. Louis, long considered a vital logistical and supply hub for Trump's forces, became a prime target due to its strategic location along the Mississippi River and its crucial rail connections to the rest of the Midwest. Union control over the Mississippi River was essential to disrupt Constitutionalist resupply efforts - Unionist naval forces deployed along the river successfully cut off shipments of food, ammunition, and medical supplies intended for Trump's defenders. After fierce combat, the flag of the Union of America hangs proudly over the Gateway Arch as a symbolic gesture of reclaiming the city.\n\nThe loss of St. Louis has prompted Constitutionalist forces to regroup further west, particularly in Kansas City and Omaha, where loyalist commanders are believed to be planning counter-offensives. As Federal troops continue their advance across the Midwest, the battle for America's future rages on."
 usb.134.a: "Another City Free From Authoritarianism!"
 usb.135.t: "Fall of Oklahoma City"
 usb.135.d: "Trump's Government seems on its last legs as the forces of the Union of America have captured Oklahoma City, a critical hub connecting Trump's provisional capital in Denver to the oil-rich territories of Texas. The operation, part of President Joe Biden's ambitious Operation Steele, aims to strangle and dismantle Trump's strongholds across the Midwest. Federal commanders had identified Oklahoma City as a vital target due to its strategic location along major highways and rail lines connecting Denver to Texas. The city also serves as a crucial node for oil and food distribution, providing fuel and resources essential for Trump's war effort. Control over the city meant controlling the flow of vital resources, including oil, arms, and food.\n\nThe operation began with a massive aerial and artillery bombardment - for 48 continuous hours, federal jets, bombers, and drones targeted key military installations, oil refineries, communication hubs, and known militia strongholds within the city. Once Federal forces penetrated the city's outer defenses, the battle devolved into intense urban warfare, with Constitutionalist troops and militia fighters turning Oklahoma City into a fortified labyrinth. Trump's loyalists had spent weeks preparing defenses, converting buildings into fortresses, digging trenches, and setting up improvised minefields throughout key districts.\n\nAs Trump's forces continue to retreat further West, the road to Denver is now wide open."
 usb.135.a: "To Denver!"
 usb.135.b: "A Serious Blow to the Constitutionalists"
 usb.135.c: "God Save America, Because Washington Will Not!"
 usb.136.t: "Fall of Kansas City"
 usb.136.d: "As part of Operation McClellan, the Federal Forces have captured Kansas City - a remarkable setback for the American Constitutional Government that provides the Union with unparalleled control over the Midwest's transportation and supply networks. Kansas City acts as a key node for moving supplies, troops, and resources across the rebellious Midwest. Control over Kansas City allowed Trump's forces to maintain a relatively stable supply line, feeding their war effort with resources from both the Midwest's agricultural heartland and oil shipments from Texas. Additionally, the capture of Kansas City deprives Trump's forces of a crucial manufacturing base, which had supplied munitions, vehicles, and other wartime essentials to loyalist factions throughout the Midwest.\n\nDespite the success of Operation Steele, Federal forces continue to encounter fierce resistance from ACG loyalists operating in the Midwest. Reports of guerrilla attacks, sabotage, and assassinations have already emerged in the days following the city's capture.\n\nAs Federal forces prepare to advance further westward, President [USB.GetLeader]'s administration remains determined to eliminate all remaining pockets of resistance. With Kansas City now under Federal control, the Union of America stands poised to press further into the Midwest. But the war is far from over, and the battle for America's future continues."
 usb.136.a: "Hail to the Chiefs!"
 usb.137.t: "REPORT: Operation Steele"
 usb.137.d: "UNION OF AMERICA MILITARY REPORT\nOPERATION STEELE: INITIATION REPORT\NIssued By: Department of Defense\nClassification: TOP SECRET\n\nOperation Steele is a large-scale, multi-phased military campaign to disrupt and eliminate the logistical and military strongholds of the American Constitutional Government across the Midwest. The operation's primary objectives are to sever key supply lines, dismantle regional command centers, and cripple the ACG's ability to launch coordinated counteroffensives.\n\nKEY OBJECTIVES: ST. LOUIS, MINNEAPOLIS, KANSAS CITY\n\nTARGETED TIMELINE: 5 MONTHS\n\nFAILURE TO COMPLETE OBJECTIVES WILL RESULT IN A LONG, DRAWN OUT GUERILLA WAR WITH CONSTITUTIONALIST FORCES."
 usb.137.a: "Understood."
 usb.138.t: "OPERATION STEELE AAR: FAILURE"
 usb.138.d: "After a year of fierce fighting across the frontline, the Department of Defense reports that Operation Steele has failed to achieve it's primary objectives - the dismantaling of Constitutionalist strongholds of power across the Central Midwest.\n\nDespite initial gains due to overwhelming air superiority, Federal forces encountered unexpectedly fierce resistance leading to the Offensive to stall and eventually collapse. Constitutionalist forces, under effective leadership, mounted coordinated counterattacks and exploited critical weaknesses in Federal supply lines, ultimately forcing a strategic withdrawal from multiple sectors. Federal forces faced high casualty rates due to constant guerrilla attacks and ambushes while suffering from poor coordination between armored divisions and infantry units. In addition, persistent supply chain disruptions have critically undermined the success of Operation McClellan.\n\nImmediate reassessment and revision of tactical doctrine are required to prevent further operational failures and will be presented to the President of the United States in the next 48 hours."
 usb.138.a: "Understood"
 usb.139.t: "OPERATION STEELE AAR: SUCCESS"
 usb.139.d: "Over the past few months, the Armed Forces of the United States of America have overwhelmingly succeeded at crushing the Constitutionalist insurgency, gaining control over key strongholds in the Midwest. All primary objectives have been achieved, and the Federal Government of the Union of America now maintains control over the Midwest, effectively cutting off Trump's forces from their primary logistical resources. The success of Operation Steele is expected to accelerate the Union's efforts to reunify the nation.\n\nOutcome: All major highways, rail lines, and supply routes connecting Denver to Texas and the Great Plains have been severed or brought under Federal control, while key Midwestern Cities such as Minneapolis, St. Louis and Oklahoma City have been liberated. The road to Denver now lays wide open as preparations are being made for Operation Sheridan, , the final offensive aimed at capturing Denver and bringing an end to the Second American Civil War."
 usb.139.a: "God Bless America!"
 usb.140.t: "REPORT: Operation Grant"
 usb.140.d: "UNION OF AMERICA MILITARY REPORT\nOPERATION GRANT: INITIATION REPORT\nIssued By: Departmenent of Defense\nClassification: TOP SECRET\n\nIn response to the failure of Operation Steele and the subsequent Constitutionalist counteroffensives, the Department of Defense has initiated Operation Grant, a large-scale defensive campaign aimed at preserving control over Chicago and Indianapolis. Both cities serve as critical logistical, industrial, and administrative hubs for Federal operations throughout the Midwest. Reports indicate that Trump's forces, under the leadership of General Michael Flynn, have concentrated their efforts on Chicago and Indianapolis, aiming to open a path towards Washington DC. If Constitutionalist advances are successful, If successful, these objectives would provide the ACG with a major propaganda victory and cripple the Union's ability to maintain pressure on Constitutionalist forces in the West.\n\nKEY OBJECTIVES: DEFEND CHICAGO AND INDIANAPOLIS"
 usb.140.a: "Understood"
 usb.141.t: "REPORT: Operation Sheridan"
 usb.141.d: "UNION OF AMERICA MILITARY REPORT\nOPERATION SHERIDAN: INITIATION REPORT\nIssued By: Departmenent of Defense\nClassification: TOP SECRET\n\nFollowing the successful completion of Operation Steele, which secured key Midwestern strongholds and severed the American Constitutional Government's logistical supply lines, the second phase of the war has begun: Operation Sheridan. This campaign aims to capture Denver, the provisional capital of Donald Trump's Government, and eliminate the remaining leadership of the Constitutionalist forces and bringing an end to the Midwestern Rebellion.\n\nPRIMARY OBJECTIVES: CAPTURE DENVER."
 usb.141.d: "Understood"

 usb.100.t: "Upon Caligula's Palm"
 usb.100.d: ""
 usb.100.a: "And it's just the beginning."
 
 usb.101.t: "Kamala Harris Becomes #1 Girl Boss"
 usb.101.d: "FROM: Vox\nBy Adam Jarate\n\nHow Kamala Harris became the #1 'Girl Boss' VP in America After the fair and stunning elections, the Biden-Harris duo has been gaining in popularity across America. The president's old-fashioned charm and the vice president's agility and go-for-it attitude have earned them the title of 'America's Best Hope' on sites like Reddit and Tumblr.\n\nHowever, Harris is noticeably taking a strong lead over her senior partner. Not only does she exceed in female support polls and POC support, but even average white men are quickly growing accustomed to her amazing wittiness. Some have even formed a group called "White Dudes for Harris", clearly preparing for her eventual presidential bid in 2028.(...)\n\nDespite America's hard times currently, the light of a new age of politicians may save us from doom and gloom. Politicians like Kamala Harris, who are not only icons for progress and inclusivity but also able state leaders who put voters and their struggles first, will soon replace their old predecessors. With that, we will move away from the hateful and bigoted politics of the Trump era.\n\nWe can only hope for the best. In the words of Madam Vice-President herself: "My mother used to - she would give us a hard time sometimes, and she would say to us, 'I don't know what's wrong with you young people. You think you just fell out of a coconut tree?'"
 usb.101.a: "She's Black, She's Brave, and She's Speaking!" 
 usb.102.t: "Bernie Twitch Takeover"
 usb.102.d: "FROM: Polygon\nby Ana Dizznuds\n\nBernie Sanders takes over the internet for few hours after he participated in Twitch stream with progressive streamers.\nU.S. Senator Bernie Sanders participated in a Twitch livestream alongside super popular creators. The event allowed Sanders to talk about issues and challenges facing not only America, but many young americans. Main points being: student debt, crisis in several states, corporate lobbyism against average citizens, and, of course, luck of competent healthcare system. Over the course of the evening, viewers were surprised with other senators from 'The Squad' like AOC and Ilhan Omar, but perhaps the memorable moment was when the group taught Sanders about Vtubers. (...)\n\nOnline users who watched the stream say it was a positive experience that helped them learn more about one of the most left-wing senators in America. Despite Bernie being confused with modern technology and gaming, they found his message to be important. Some commentators even said that Bernie's explanations helped them understand their own situations better.\n\nMore mature media outlets pointed out that its a clear play to get more younger voters on board with his agenda, and they say for to expect more Sanders appearances on youth dominated areas of the internet. Podcasts perhaps?"
 usb.102.a: "$5 Donation - "Feel the Bern!"" 
 usb.103.t: "Media Accuses Romney of Being 'Romney'!"
 usb.103.d: "FROM: Personal Blog\nBy Jet Muhdick\n\nMitt Romney is one of the most intelligent politicians in America, and I believe that. However, the liberal media continues to accuse him of being "weird." Let's leave that to Trump and his supporters! (...)\nIt all started with Mitt's decision to engage with younger voters after celebrating Hot Dog Day. He attended a popular event for young people called "Furrycon." This is where the misunderstanding began. Romney must have thought it was an "animal exhibition," but he didn't expect to see humans dressed as different animals.\n\nUnlike what the Democrat media claims, Romney did not lose his composure when he found out the true meaning of the event. Instead, he engaged with potential new voters. His efforts were helped by a very good cook "dressed as a blue bird" who made "amazing" hot dogs at the food stand, as Mitt himself stated on his Instagram.\nOn his social media, he commented and posted photos from the event. The closing photo featured him surrounded by cartoon human animals with thumbs up. In the comment attached to the photo, he talked about how great and entertaining the event was. He also specifically pointed out the inclusion of an HIV testing room as "the good samaritan" and praised the organizers for being mindful of this.\nLater, he posted an image of himself drinking chocolate milk with the caption "Hard, but very productive day. The best time to drink some choco milk.""
 usb.103.a: "He Buried Hatchet With Big Bird" 
 usb.104.t: "Dawn's Early Light"
 usb.104.d: "FROM: VICE\nBy Veronica Steinman. Edited by Jared Shaysky\n\nI was standing in Times Square, surrounded by thousands of people, both activists and ordinary citizens, listening to speeches celebrating the Union's victory - our victory, America's victory. I felt a storm of emotions wash over me like never before. Despite all the loss and cruelty, hatred and bigotry, our nation has prevailed. Our future has prevailed.\nIt has not been long since the official declaration of the end of the conflict. However, as I strolled around and prepared for the festivities in New York, I could perceive and sense it. The expressions on people's faces were more joyful, conversations were more effortless, and the atmosphere of joy permeated everywhere.\n\nIn the beginning, it was a time of darkness. Everything seemed unreal, and the pain was very intense. Many readers can identify with this. Everything we cherished - our way of life, our loved ones, our sense of self - was at risk of being wiped out by a colossal threat.\n\n"I'm crying tears of joy," one of the feminist activists told me during the event. "We can finally move forward, not looking back." I can agree with her. It was a painful process, but it had to be done. We have removed all the bigoted and hateful elements from our nation's history and society. America is free of the past, and like many people I interviewed, I can say: "Love has won."\n\nWe can come together again, hug and laugh, no matter your confession, ideology, or party.\nWe are all Americans once again, and we must learn to love again."
 usb.104.a: "Novus Ordo Seclorum"
 usb.105.t: "FILE REPORT: #2020c"
 usb.105.d: "FEDERAL BUREAU OF INVESTIGATION\n\nRe. GROWING INSURGENT ACTIVITIES:\n\nAnti-federal insurgent activities in our territory has grown 2-3 times since its beginning in West Virginia. The terrorists are now leaving the mountains and attempting to occupy forests and small villages, growing in numbers as they go.\n\nLatest information shows the insurgents receiving significant aid from the illegal Denver government and gaining sympathies from the locals which has allowed them to expand their reach and access much more dangerous armament.\n\nIf drastic measures aren't taken to prevent its growth soon, it may spiral out of control with catastrophic consequences for our government."
 usb.105.a: "E Pluribus Unum"
 usb.106.t: "FILE REPORT: #2077d"
 usb.106.d: "NATIONAL SECURITY AGENCY\n\nRe. INSURGENT ACTIVITIES CRITICAL:\n\nTrumpist insurgent activities have increased from local sabotage and raids to a full-scale partisan war against Washington DC. Rural population is joining the terrorists en-masse, resulting in entire brigade-sized regiments operating behind our lines, which had a significant effect on our logistical capabilities and morale.\n\nLocal law enforcement has been completely overrun in some counties, while it's struggling and requires immediate federal intervention in many others. The actions taken so far have proved to be completely insufficient.\n\nIf we don't increase our effort in fighting anti-social elements, the rebels' next target could become a major city like Chicago, Indianapolis, or even Washington DC itself."
 usb.106.a: "Secure the nation, protect our future."
 usb.107.t: "Attack on DC"
 usb.107.d: "It was inevitable that the capital of the Union would become a target for insurgents.\nHowever, the assumed perpetrators had always been either the Patriot Front or the Constitutional Government.\n\nHad those assumptions been correct, the aftermath might have been far less catastrophic.\n\nBy evening, several black vans, spray-painted with obscenities and symbols tied to both the occult and Nazism, were seen plowing into pedestrians on the sidewalks. National Guard forces were placed on high alert and attempted to contain the attackers, which led to the vans scattering across the city. One was intercepted near CityCenterDC, where at least a dozen armed men, dressed like Atomwaffen members, emerged and forced their way into the mall, guns blazing.\nThe assailants carried binary chemical weapons, which they deployed indiscriminately in their effort to maximize casualties. Other vans halted at crowded locations across the city, unleashing similarly devastating assaults.\n\nSimultaneously, several bombs detonated at key landmarks, including the Lincoln Memorial. Some were conventional explosives, but others released chemical agents, among them, sarin gas, adding further chaos to the unfolding disaster.\nAfter roughly four hours, security forces managed to neutralize the terrorists with lethal force. By then, hundreds were dead and thousands more injured. The Atomwaffen Division claimed full responsibility, seizing on the attack as propaganda.\n\nNot only did this become one of the deadliest terrorist incidents on American soil, but it also threw the nation's security apparatus into sharp scrutiny. Intelligence officials expressed frustration at their limited resources, strained by the ongoing civil war.\n\nThe aftermath will reverberate for years. As families grieve their losses, the public's desperation for safety deepens alongside the gnawing fear that another attack may be imminent."
 usb.107.a: "The eye is wide awake..."
 
 nss.0.t: "The Agencies Move In"
 nss.0.d: "The attack on Washington, D.C., has sent shockwaves through the Union. Several key figures across Union territory, ranging from state officials to high-ranking military officers and government representatives, have lost faith in the Union and its ability to protect its citizens.\n\nReports of lost contact from multiple regions continue to flood official channels, with insurgent groups growing bolder and military units going AWOL.\nIn effect, this signals the collapse of the federal government, leaving only its most loyal supporters standing by its side.\nThe United States Intelligence Community has already moved swiftly to consolidate authority over areas deemed loyal, branding everything beyond those borders as secessionist, terrorist, or traitorous, further tightening its grip on the government.\n\nWith the president's approval, rules of engagement have been loosened to preserve the Union and to prevent hostile forces from securing ground in lost territories.\nThe stakes have never been higher. We now face the chance to truly reassert Order over the United States of America, but with it comes the greatest risk of all: the possibility of descending into the abyss of irrelevance.\n\nThe work of a nation has just begun."
 nss.0.a: "Pillars do not fall so easily."
 nss.1.t: "Pacifying the Ignorant"
 nss.1.d: "The United States of America wasn't founded by the masses; it was founded by a select few who upheld a set of ideals, bringing forth an illuminating light.\n\nAn ideal driven by emotions is an ideal that cannot sustain itself. The French Revolution burned itself out as proper authority reigned in the madmen who tore the country apart; it remains a conscious choice to have the enlightened few guide the many through turbulent times.\n\nOrder pays no regard to the objections of the many, and Congress is just another limb that flails around to the whims of chaos.\nAlready, they have expressed great concern regarding our agenda, making claims that we are eroding the United States as we know it, but was it not we who ensured that Order remained all across the world?\n\nCongress has proven to be gangrenous, and in turn, it has to be amputated.\nNot publicly, of course.\n\nWith the right words whispered into their ears, with enough pressure applied regarding their familial matters, they will remain in silence.\nThose who scream the loudest will be put under surveillance for the potential risk of upholding antisocial views, and with enough time, they'll remain wary of the eye."
 nss.1.a: "Cover their eyes, and they shall not speak."
 nss.2.t: "The Return of America"
 nss.2.d: "All of the United States has been reunified under the stars and stripes, as it should be, as it was always meant to be.\n\nToday, we remember the brave men and women who have given their lives for our ideals. Enlightenment isn't something you defend without making sacrifices, and the Civil War has been nothing but paying dearly for our past mistakes.\nA lot of errors were made, the things we neglected and the things we buried all ultimately led to this maelstrom of internal violence, and the whole world is paying for it.\n\nOur absence has proven that we were one of the pillars that upheld stability, security, and Order. We have learnt our lesson, we will not repeat the same mistakes.\n\nWith the experts, the veterans, and the illuminated, we repaired a broken nation.\nSurgery on the American soul until it can no longer combust.\nThe civil war has put us back to sleep, and we have awoken to a world not under our protection. Corrosive ideologies and volatile emotions have become the new rulers of the world, beasts without vision.\nWhat the world has become is irrelevant to us; what the world will become is what matters.\n\nLet them play in the mud for a little while longer; our preparations are already set in motion.\nThe United States of America is back."
 nss.2.a: "The third option has been chosen."
 nss.3.t: "America Back in Order"
 nss.3.d: "The Second American Civil War will be remembered as one of the most violent conflicts in the modern age, with so many extremists running rampant and the complete fall of the post-WW2 world order dominated by the United States. It would seem that whatever would come out of the fog would be nowhere close to the America people love and hate.\n\nHowever, the Union of America has proven otherwise.\nThe president of the United States of America announced that all territories held by ''anti-social elements'' have been pacified and reclaimed by the federal government.\nThe America of today has evolved into a different beast, a firm grasp on its own destiny as whispers in the shadows speak of a clique of experts behind the president that seeks to reestablish the United States as the world police once again. These accusations are shrugged off as conspiracy theories.\n\nNot much is known about the internal policies of the United States due to the AM-NET ensuring foreign probes are next to impossible, but stories of permanent lockdowns, increased crackdowns on dissidents, and constant surveillance on the American populace have brought back a feeling the world didn't feel since the Bush era.\n\nReports of American influence trying to creep its way back into regional spheres of influence have become a reason for concern for the global powers, as it would seem that the United States of America is far from dead."
 nss.3.a: "The hawks circle above the world again."
 nss.4.t: "Backseat Driver"
 nss.4.d: "The Oval Office stopped having a homelike feel to it for some time. After William J. Burns took a more proactive position around the president, the White House didn't feel like a home anymore.\n\nBiden remembers the meetings he had with all sorts of people from all over the world; some were rowdy, while others were calm. In his eyes, not a single person was boring and proved to be another challenge to overcome.\nHe saw all sorts of medical equipment being moved into the Oval Office, but he wasn't quite sure why.\n\nHe remembers the jokes made in the halls, the moments of tension during a crisis.\nIf only he were younger, he thought. The country would have been united within a year, and he would have gotten the carte blanche to put some soap through the system.\nHe saw Burns walk into the Oval Office as he was making a phone call, mentioning checkpoints and something related to Blackrock. That company always stuck out like a sore thumb.\n\nBiden wanted to call out to him, make a waving gesture.\nBut he couldn't.\nJoe Biden remembers now, his health was in rapid decline, and along the line, his body just locked; his mind was still there, but his body refused to cooperate.\n\nA moment of dread set in as he realized what was going on.\nBurns gave him a dismissive look as he beckoned one of the nurses, making a gesture to increase something. Biden couldn't properly hear it.\n\nThe nurse gave the president a look of sympathy as she fiddled with something behind his chair. A sense of relief washed over him; all fears and anxieties melted away like wax."
 nss.4.a: "A battery for the machine."
 nss.5.t: "Public Health Safety Act"
 nss.5.d: "The Public Health Safety Act stands poised to transform pandemic-era restrictions into a permanent biological security framework. Developed with pharmaceutical companies and the CDC, it creates 'AmeriCare'-a national universal healthcare system replacing existing coverage with a mandatory private insurance model backed by government regulation and financial guarantees, creating a captive market for pharmaceuticals with taxpayer-subsidized costs.\n\nThe Act's fine print reveals its true nature: a mandatory vaccination system requiring citizens to undergo periodic vaccines and boosters for known and emerging diseases, as determined by a CDC and pharmaceutical committee. Packaged in these vaccinations would be microchips designed to store and communicate health records and personal data.\n\nNon-compliance with the vaccination and tracking mandate would lead to the denial of essential services-access to AmeriCare, travel, work, or study-rendering societal participation nearly impossible. This is enforced by the CDC through the newly created 'Health Security Agency' (HSA), tasked with monitoring vaccination compliance and tracking the unvaccinated or infected.\n\nPublicly, the Act is presented as a measure to prevent another pandemic and ensure America leads in health innovation. In practice, it solidifies control through health mandates and surveillance, guaranteeing pharmaceutical profits via government-mandated demand. This turns healthcare-a basic human right-into a conditional privilege and population control tool.\n\nIntensive lobbying by pharmaceutical interests saw the legislation pass Congress with minimal debate. Implementation is to begin immediately following Director Burns' approval via autopen on the President's behalf, bypassing standard ceremonies due to urgency. Critics note the Act's surveillance exceeds that in authoritarian states, but public resistance remains minimal due to sustained media messaging about biological threats and healthcare benefits, as well as the labeling of opposition to the Act as extremist and conspiratorial.\n\nThe Public Health Safety Act establishes the technological and legal foundation for the next phase of population management, seamlessly creating a new paradigm of public-private rule in the name of health security."
 nss.5.a: "Stop the Spread."
 nss.6.t: "Ensuring Our Safety Speech"
 nss.6.d: "My fellow Americans,\n\nI hope tonight's address finds you well in the safety of your homes. In the vast tapestry that is the history of America, there hasn't been a time more uncertain and dangerous than now. That especially concerns the young generation that can be easily exposed to malicious, extremist or in other ways abusive material.\n\nMy administration has unleashed a plethora of actions to remedy that, and our collective efforts have culminated in the formulation of the Child Safety Act, which I'm here to tell you about.\n\nFirst of all, the Child Safety Act strives to establish regulations aiming to ensure safe internet access for every citizen, but most importantly the youth. This involves extensive monitoring of suspicious individuals and certain websites requiring your ID to access.\n\nSecond of all, it will mandate the establishment of a registry to keep track of said individuals and websites.\n\nAnd finally, all the necessary resources and rights will be given to our law enforcement agents to take any and all actions necessary to ensure public and individual safety.\n\nThis act symbolises everything we've been working towards as a nation. This is not only a big step forward, but also a testament to our democracy. I hope the Child Safety Act will make your family's life more peaceful and calm."
 nss.6.a: "God bless you, and God bless America."
 nss.7.t: "With One Eye"
 nss.7.d: "William J. Burns wasn't one to hold grand ceremonies or celebrations when it came to successful operations, even if it was something as significant as saving the nation. Work continues as usual, global peace is still far away.\n\nThere never was resentment towards the ones causing disorder, it didn't happen out of nowhere but the incompetence of the previous federal government has shown what happens if you don't maintain constant control over not only your people but also the world.\n\nBurns remembers his days as a diplomat in China and Russia, once again he held no resentment towards these nations and its people. He saw the rising instability caused by their ascension due to the absence of the United States. The animal that bites should not keep its sharp fangs and Burns hopes that with a proper pacification across the world, that the American Peace can be reinvigorated.\n\nEmpire.\n\nA funny word, in the old days he would have been clothed in gold and silk but the power he holds is far more than what the average king would have.\n\nYet, he doesn't want an empire or to sit on a throne, he wants to ensure that the world doesn't incinerate itself into an uncertain future.\nThe American Peace might have its flaws, but its existence is one that brought certainty and rules to abide by. It is something worth striving for.\n\nThe world is burning and it is time to show the world that the United States of America is far from dead."
 nss.7.a: "We can be moral, or we can be the ones keeping the peace."
 nss.8.t: "Birth"
 nss.8.d: "If a chick cannot break its egg's shell, it will die without being born.\n\nWith the present crisis, it became apparent to the Shadow Government that maintaining of America's systems as they were was untenable-and thus CIA Director William J. Burns sought to establish a new armed force loyal solely to the interests of the securocrats, capable of upholding Order where the officers of the Armed Forces had so catastrophically failed. Through expanding the Special Activities Center, ostensibly the agency's clandestine special forces unit, he would create something akin to a praetorian guard, a highly-loyal force capable of beating compliance into the American people without questions asked.\n\nWhile the CIA's official mandate was to act externally, this expanded SAC could be deployed within the borders of America. Their task was twofold: To prevent the nation's descent into Chaos and barbarism, and to eliminate any who stood in their way, all in the name of upholding Order. Unlike the Armed Forces, it would have none of the limitations and oversight that came with ROE, instead serving as the sword of the deep state. Its personnel were bound by no laws, save to their loyalty to the Shadow Government and its mission. If the men in uniform would not obey, the operatives of the CIA would enact the will of the securocrats in their place.\n\nDespite protests from General Milley and Defense Secretary Austin, much of its initial rank and file for this expansion would be pulled directly from the U.S. Army, selected from Brigades that had demonstrated counter-insurgency effectiveness and political loyalty to the Washington Government where others had fallen short. Filling the immediate vacuum in the Army thereafter would be draftees and National Guard auxiliaries, a gesture some viewed as a deliberate kneecapping of the Armed Forces in favor of the Intelligence Community.\n\nThe ceremony christening the first of these brigades was held in D.C. at night, the sky black as pitch. Thousands of soldiers stood in a square in silence, rifles shouldered and at attention, clad head-to-toe in grey multicam. A ceremonial burning of their previous Army patches took place in front of a towering bonfire, the blaze illuminating their faces in the darkness. On a raised platform before them stood Director Burns himself, flanked by his aides and advisors. The concluding words of his speech would be etched in the memory of all those present.\n\n"As of today, none of you have names. None of you have records. You will be forgotten, but your deeds done in the service of the United States will be remembered forevermore. You are our shield against the darkness..."
 nss.8.a: "...You are the light of Order against Chaos.""
 nss.9.t: "Morning in America"
 nss.9.d: "Everywhere across America, people go to work, to school, to church, and go about their day. The streets are clean, the economy booms, and the buildings are repaired-just as they once were.\n\nGradually, the scars and reminders of the Second American Civil War disappear, and the country seems to move past the devastating conflict. The memories, the anger, the pain, and the hate that started the conflict in the first place slowly diminish in the face of the new consensus, and with every sip of water, with every vaccine, and with every sign of the traitors erased, people grow closer to forgetting why they harbored so much resentment in the first place. It's easier to forget the pain than hold on to the grudge that might have caused the hurt. A clean start is always better, even if it means forgetting the past to reach a brighter future.\n\nThe television brings calm, sterile reports of the world between product advertisements and sports. The public consumes its media as it consumes everything else-without question. The world is a nice and tidy package, with every loose end wrapped up and every problem solved.\n\nIt's the same, it's always the same. Every single day. It's easy. It's right. It's...perfect. No one complains, because they have forgotten how to complain. The law is the law, and no one is exempt.\n\nPeople are, after all, creatures of habit. They find comfort in their own habits and their own ways of life. The world around them might be a big and scary place, but if they have their morning routine, their daily habits, and their familiar patterns, they can find some small comfort in a chaotic and uncertain world.\n\nThe Cognoscenti have given them this. It does not ask for their gratitude-the securocrats, the financiers, the elites understand that this task is a thankless one, and the continuation of Order is its own reward.\n\nIn New York, the country looks on with tense anticipation. Though constant redesigns, struggles to find tenants, and the civil war have delayed reconstruction efforts for the past twenty years, the completion of the rebuilt World Trade Center complex marks the closing of a deep wound and the beginning of a new chapter in American history. The beating heart of U.S. hegemony, of global finance, is whole again.\n\nFireworks burst in the heavens, and as a nation celebrates, the nightmare of the last two decades slowly fades into the uncertain haze of memory. Order has prevailed over Chaos."
 nss.9.a: "It's Morning in America again."
 nss.10.t: "Cruelty Squad"
 nss.10.d: "With America already mired in Civil War, the terrorist attack on D.C. had been nothing short of paralyzing to the Washington Government, which already had to contend with the total breakdown of law and order along the eastern seaboard. President Biden had barely escaped with his own life and had decided to remain in the Presidential Emergency Operations Center, while all signs pointed to another round of neo-Nazi terrorism. With that justification, the three-letter agencies had taken to the streets in a systemic crackdown never before seen in American history. In a time of total war, there was no time for niceties.\n\n"Gentlemen, we are about to be dropped in the middle of hell," the squad leader said, "Our mission: liquidate all hostiles, including those not affiliated with Atomwaffen. There is no ROE for this mission. The orders come from the top: do not leave any witnesses."\n\nAboard an armored van, the CIA SAC kill-team inspected their firearms, loaded with armor-piercing rounds. Some stragglers had taken over an apartment complex and taken hostages, an HVT among them being an Atomwaffen Division leader. Owing to the secrecy of the organization, the risk of terrorists blending into the populace, and the HVT being deemed a 'loose end' who 'knew too much' by the briefing, it had been decided that the SAC team would ensure no loose ends."
 nss.10.a: "§g>>>Next Page...§!"
 nss.11.t: "The Long Night"
 nss.11.d: "As the gas faded, the kill-team kicked down the doors of Nassau Hall, clad in MOPP IV gear. The bodies of students and neo-Nazi terrorists alike were strewn across the floor, bodies contorted unnaturally, expressions locked in eternal horror. Orders had come to take care of Earl Turner, one of many neo-Nazi leaders who had fled D.C. in the wake of the attacks. He had set up shop in Princeton University, taking over Nassau Hall and using the students and faculty as human shields.\n\nThey hadn't expected the SAC to pump the building with sarin gas. They were supposed to be the good guys, weren't they? The ROE had changed, and with it, the tactics of cowards who relied on the government's weakness had become woefully obsolete. There would be no negotiations, and any collateral damage was to be dealt with by the CIA's disinformation department. As far as the public was concerned, this entire tragedy had been the doing of the neo-Nazi terrorists, and the kill-team had been sent in to rescue the poor, defenseless students and staff.\n\n"Entry team, this is TOC. Confirm elimination of all hostiles. Cleanup team is en route to secure the perimeter. Over."\n\n"Copy that, out." the team leader said.\n\nWith the rest of the students and faculty dead, the CIA operatives began systematically going through the hallways. Even those that had brought gas masks were not spared by the potent nerve agent, which had permeated their skin and killed them all the same.\n\nIt was only a matter of time before they found Turner. The man was already dead, having suffocated on his own vomit and bodily fluids. It was a death fitting for a man like him, the team lead figured.\n\n"Target is KIA," he reported back to TOC. "Cleanup team, proceed as planned."\n\n"Copy that, entry team," the cleanup team leader said. "We have you in our sights. Commencing operation now."\n\nOutside the building, CIA operatives in hazmat suits were already preparing to move in. A cordon was already being set up around the building, and the official narrative was already beginning to circulate. The kill-team turned on its heel and made its way out of the building, passing the hazmat operatives, who were already busy at work removing bodies and commencing decontamination procedure. With the cleanup team taking charge, their job here was done."
 nss.11.a: "The nature of the war has changed."
 nss.12.t: "Sutter Compound Raid"
 nss.12.d: "Summary:\nFollowing the collapse of the Atomwaffen Division, the majority of its leadership was either arrested or neutralized. However, Joshua Caleb Sutter, formerly assessed as a Temple ov Blood affiliate and past contact, evaded conventional justice.\n\nBackground:Intelligence collection indicated that Sutter, accompanied by a small cadre of cult adherents, had established a fortified compound in the Appalachian region. In response, a specialized SAC element was deployed with direct orders to neutralize or capture Sutter. Rules of engagement permitted unrestricted action against his loyalists.\n\nOperation:\nAfter approximately forty-five minutes of sustained contact, twelve hostile elements were neutralized. Sutter was successfully isolated; he attempted self-termination but was subdued and taken into custody without fatality.\n\nFindings:\nPost-operation clearance of the compound revealed extensive evidence of human rights violations, including human remains displaying signs of prolonged abuse, torture, and experimental mutilation. Multiple visual displays (photographs and crude paintings) documented atrocities committed in former Atomwaffen-controlled areas. Additionally, an arsenal was recovered, ranging from small arms to unconventional weapon systems, including radiological dispersal devices ("dirty bombs") and chemical agents.\n\nAssessment:\nDespite mission success, debriefings revealed acute psychological distress among SAC personnel. One operative attempted unauthorized contact with the family of a deceased victim identified at the site. Continued psychiatric monitoring and restricted duty assignments are strongly recommended to maintain operational effectiveness.\n\nConclusion:\nWith the dismantling of this final Atomwaffen stronghold and the capture of Joshua Caleb Sutter, the operation is formally assessed as successful. Residual ideological elements remain a potential security concern, but the core leadership structure has been effectively neutralized.\n\nEND OF REPORT"
 nss.12.a: "We have him alive."
 nss.13.t: "The Spider"
 nss.13.d: "Following the raid on the Sutter compound, subject Joshua Caleb Sutter was detained and transferred to a nearby black site facility. An intensive interrogation process was initiated, lasting multiple weeks.\n\nPrimary Objective: Obtain intelligence regarding the existence and structure of Atomwaffen cells, affiliated splinter groups, and other domestic insurgent organizations, including but not limited to Patriot Front and the American People's Liberation Army. Focus was placed on the Temple ov Blood's established practice of embedding operatives into external groups in order to gain operational insight.\n\nSecondary Objective: Identify potential stockpiles of weapons and materiel that could be employed in coordinated actions intended to destabilize public Order within the Union.\n\nMethods: Authorized enhanced interrogation protocols were employed, including sleep deprivation, controlled sensory manipulation (white room), walling, and stress positioning, among other measures. These techniques produced significant psychological strain on the subject. After a breakdown event, Sutter provided actionable intelligence. Following completion of the interrogation cycle, the subject was terminated.\n\nOutcome: Intelligence yielded has been assessed as high value. Collected data has expanded the roster of Persons of Interest (P.O.I.) and provided critical leads for further penetration of hostile networks."
 nss.13.a: "The first domino falls."
 nss.14.t: "The Hunt"
 nss.14.d: "Regaining control over the wheel comes with its own fair share of responsibilities; the mistakes made before would inevitably come up and threaten national security.\n\nThe masquerade is a veil of normalcy for the American people, letting them believe that business is as usual, while we work hard to ensure no harm comes to our nation. Some would object to our methods due to ethical concerns.\nYet no one argued that they weren't effective.\n\nUnfortunately, there is a lot of cleanup for us. Before the Civil War, we left behind quite a number of loose ends. Informants that provided us intel, agitators that divided dissidents, and former personnel loyal to our cause are experiencing a moral crisis.\nThese are nothing but temporary setbacks.\nHowever, it must be noted that these loose ends have to be tied up as soon as possible lest they threaten to pierce the veil and expose the masquerade to the public, leaving our great nation in Chaos.\n\nIt will take years to fully restore Order to the United States, but if we manage to amputate the most pressing of anti-social actors, this restoration will be without any roadblocks."
 nss.14.a: "Let's get to work."
 nss.15.t: "The Judas Gambit"
 nss.15.d: "The air within the federal government has changed, people look at one another with more suspicion, reports of funds, personnel and intel going missing has caused an air of anxiety within the system.\n\nCurrent trends indicate a high chance of a potential traitor in our midst, one that has attained enough experience and connections within the system to avoid detection. Their goals are unknown but considering the sudden absence of resources, it is likely that the potential individual in question is suffering from a moral crisis that has clouded their judgement and seeks to cause social disruption by making our agenda be known to the public.\n\nChances of the individual being aware of our awareness are extremely high and vigilance is recommended.\nDespite the individual's experience in navigating through the system, it is likely that they left behind trails that could lead to the exposure of their identity.\n\nThere isn't much time left, the longer the individual can operate, the more potential risk there is to national security.\nLike any body infested with parasites, we must look inward and make decisive cuts to root out this Judas."
 nss.15.a: "See you at the fire."
 nss.16.t: "Hinkle Ambush"
 nss.16.d: "Subject: Jackson Hinkle\nAffiliation: American People's Liberation Army (APLA)\nStatus: Neutralized\n\nSummary:\nJackson Hinkle, a senior figure within the APLA, has been identified as a persistent threat to national security. Subject previously cooperated with covert operatives in limited capacities, including efforts to fragment left-wing extremist factions and facilitate the apprehension of select individuals. Cooperation ceased as Hinkle increasingly aligned with radical elements of the APLA, driven by both organizational extremism and personal opportunism.\nFollowing the APLA's collapse, Hinkle's whereabouts remained unknown until reports of Jacobin activity suggested renewed involvement. Subject's integration into Jacobin circles, combined with his social influence and access to elite networks, elevated his profile as a significant informational security risk.\n\nOperational Notes:\nHinkle displayed a consistent pattern of abandoning duties under direct threat as sustained pressure on Jacobin activities forced Hinkle into a defensive posture.\nSubject sought political refuge with the People's Republic of China and with that intel the utilization of embedded informants was permitted, operatives arranged a false extraction point in California.\nHinkle was approached with minimal security presence and was apprehended without resistance.\n\nInterrogation:\nHinkle was held for a period of five days during which enhanced interrogation protocols were applied. Subject exhibited severe psychological distress and ultimately provided actionable intelligence, including the identification of remaining APLA cells operating domestically, insight into APLA-China linkages and logistical support channels.\n\nDisposition:\nUpon determination that the subject no longer possessed additional exploitable intelligence, Hinkle was neutralized.\nIt is recommended to disseminate controlled intelligence regarding Hinkle's attempted flight to the PRC to remaining APLA elements to undermine internal cohesion and to continue monitoring Jacobin activity for potential resurgence of APLA-aligned operatives."
 nss.16.a: "The operation is deemed a success."
 nss.17.t: "Raid on Brown's Hacker Den"
 nss.17.d: "Subject: Barrett Brown.\nAffiliation: Insurrectionary Anarchist Networks.\nStatus: Neutralized.\n\nSummary:\nBarrett Brown, formerly associated with insurrectionary anarchist groups in the Pacific Northwest, has consistently evaded apprehension and posed a persistent counterintelligence risk. Subject engaged in repeated breaches of classified databanks and attempted dissemination of sensitive material across the open web. Brown's prior involvement with Anonymous, before we acquired its cultural infrastructure, afforded him a high level of operational security discipline.\n\nBrown subsequently assumed the role of primary figurehead in the formation of multiple hacker collectives, prompting escalation of tasking to locate, disrupt, and dismantle his operations. Subject's digital footprint was traced through proxy servers, leading to confirmation of his presence in a low-income urban sector.\nA tactical unit conducted a sweep of an identified apartment complex as the subject was located and apprehended, though he fatally wounded one operative with a firearm before capture. Immediately following his detention, a pre-programmed deadman's switch was activated, resulting in a significant data leak of classified material across multiple platforms.\n\nInterrogation:\nBrown was subjected to enhanced interrogation protocols for a period of approximately ten days. The resulting intelligence included the identification of active hacker collectives operating nationwide, as well as details on their communication channels, membership, and operational methodologies.\nUpon determination that the subject possessed no further actionable intelligence, Brown was neutralized.\n\nAssessment:\nAlthough the subject's deadman's switch precipitated an immediate security breach, the subsequent exploitation of intelligence networks significantly offset operational damage. Mission objectives, including capture, interrogation, and neutralization, were achieved."
 nss.17.a: "The operation is deemed a success."
 nss.18.t: "Neutralization of Michael Flynn's Insurgency"
 nss.18.d: "Subject: Michael Thomas Flynn.\nAffiliation: Trump loyalist.\nStatus: Neutralized.\n\nSummary:\nMichael Thomas Flynn, retired U.S. Army lieutenant general, engaged in treasonous activity following the collapse of the American Constitutional Government (ACG). Despite the cleanup of the last Trump-aligned strongholds, reports of ongoing insurgent raids and sabotage in rural sectors displayed coordinated tactics indicative of formal military leadership.\nSubsequent investigation confirmed Flynn's continued role in organizing resistance against federal reintegration.\nISR assets, including drone reconnaissance, identified persistent insurgent movement patterns.\nCounterinsurgency pressure was applied to the families of known operatives. Defensive capabilities of forward outposts and black sites were reinforced, resulting in the gradual retreat of Flynn's forces.\n\nA concealed encampment was discovered within a remote forested sector, assessed to be a staging ground for a large-scale offensive.\nDeployment consisted of multiple SAC elements with limited conventional military support. Rules of Engagement (ROE) authorized lethal force against armed personnel.\n\nEngagement:\nThe raid lasted for approximately an hour, all base structures were cleared systematically and any armed combatants neutralized; unarmed personnel detained.\nFlynn was located on site; he resisted surrender. The subject was incapacitated by non-lethal gunfire to the right leg and shoulder and subsequently taken into custody. 5 SAC operatives were KIA.\nSubject underwent enhanced interrogation over three weeks. Techniques included the withholding of medical treatment, application of psychological pressure concerning family members, and prolonged sleep deprivation.\nFlynn ultimately disclosed actionable intelligence, such as the Identification of surviving Trump-loyalist insurgent groups and confirmation of an extensive Appalachian tunnel network utilized for logistics and concealment.\n\nConclusion:\nAfter determining that the subject had exhausted all actionable intelligence, Flynn was neutralized. Recommendation is made to retroactively amend his military record with a dishonorable discharge to ensure historical classification as treasonous.\nDespite loss of SAC personnel, the operation is assessed as successful. Intelligence obtained significantly enhances monitoring and force projection capabilities in the Appalachian region."
 nss.18.a: "Let's keep going."
 nss.19.t: "Neutralization of Angela Davis"
 nss.19.d: "Subject: Angela Yvonne Davis\nAffiliation: American People's Liberation Army (APLA) / Black Liberation Army (BLA)\nStatus: Neutralized\n\nSummary:\nAngela Yvonne Davis, a long-standing figure of interest to the intelligence community, transitioned from a key role within the Black Panther Party to leadership within the American People's Liberation Army. Following the APLA's collapse, Davis established connections with BLA-linked militias and embedded herself within predominantly African-American urban communities, utilizing their loyalty and protective networks to evade federal detection.\nIntelligence collection was hindered by community support and BLA protective structures.\nPenetration achieved through targeted application of material incentives and pressure on local representatives.\n\nResult: Positive identification of subject's safehouse location.\nDeployment of 12 SAC operatives supported by federal police to secure the perimeter and initiate lockdown of the surrounding neighborhood.\nThe duration of the raid was approximately 30 minutes. The subject attempted to evade capture alongside security personnel; sustained a non-lethal gunshot wound to the back, and was taken into custody. Subject was subjected to enhanced interrogation protocols over a three-week period.\n\nOutcome:\nDisclosure of residual APLA and BLA cell structures.\nIdentification of foreign ties, including support networks linked to Iran and the People's Republic of China.\n\nDetermination: Subject had exhausted all actionable intelligence.\nUpon conclusion of the interrogation cycle, Davis was neutralized.\n\nAssessment:\nThe subject's capture and subsequent neutralization produced actionable intelligence; however, secondary effects have included heightened volatility across African-American urban centers, with decentralized militant activity increasing in frequency.\nIt is recommended to expand SAC presence in identified high-risk zones and to increase surveillance and community penetration to mitigate emerging threats."
 nss.19.a: "Mission is deemed a success."
 nss.20.t: "Interception of Rinaldo Nazarro"
 nss.20.d: "Subject: Rinaldo Nazarro\nAffiliation: The Base (white-separatist / neo-Nazi network)\nArea of Operations: Pacific Northwest\nStatus: Neutralized (deceased)\n\nSummary:\nRinaldo Nazarro, a founding member of The Base, served as a principal organizer of decentralized white-separatist violence in the Pacific Northwest following the collapse of Cascadian authority. The Base adopted a decentralized model to maximize resistance to federal authorities, employing violent tactics that generated significant damage to critical infrastructure and law-enforcement assets. Given the group's sustained operational impact, removal of Nazarro from the battlespace was assessed as necessary to restore regional stability.\nSources include leveraged reporting from former adversarial networks, defectors, and embedded informants.\n\nMultiple Base cells were mapped across the region; corroborating evidence indicated foreign support indicators in later operations.\n\nSAC elements were directed to conduct deliberate, sequential strikes against identified cells to systematically degrade The Base's operational capacity.\n\nExecution:\nCoordinated kinetic actions were executed against cell outposts. Resistance varied by engagement; intensity increased approaching structures associated with higher-level leadership.\nDuring the terminal operation, Nazarro's position was identified and the compound was cleared. Tear gas was employed to incapacitate the subject; Nazarro was taken into custody. Remaining hostile actors were neutralized during the action.\n\nSubject was transferred to an interrogation facility for exploitation.\nNazarro died during a two-week interrogation period. Post-mortem exploitation of materials recovered at the final outpost revealed equipment of Russian origin and documentary evidence suggesting a potential exfiltration pathway to the Russian Federation. While direct human-intelligence links remain under investigation, the materiel and documentary trail indicate a plausible foreign support vector.\n\nConclusion:\nThe sequential targeting campaign substantially degraded The Base's ability to project immediate, organized violence at scale.\nRecovered evidence supports a reasonable suspicion of foreign facilitation; further counterintelligence work is required to clarify the extent and intent of external involvement. "
 nss.20.a: "Mission is deemed a success."
 nss.21.t: "Neutralization of Steven Nordhaus"
 nss.21.d: "Subject: Steven Nordhaus\nAffiliation: Former Chief, National Guard / Insurgent Leader\nArea of Operations: Midwestern rural sectors\nStatus: Neutralized (deceased)\n\nSummary:\nSteven Nordhaus, former chief of the National Guard, renounced federal authority and organized a sustained insurgency in the Midwestern rural belt. Leveraging his prior command experience and access to personnel and classified material, Nordhaus conducted coordinated strikes against infrastructure, military targets, and sensitive information repositories. He also consolidated support among dissident militias and local sympathizers under the stated objective to "FreeAmerica from the claws of tyranny."\nRemoval of Nordhaus from the battlespace was assessed as essential to restore control and protect national security interests.\nNordhaus used his institutional knowledge to degrade force posture, coordinate asymmetric attacks, and exploit sensitive data.\nReports indicated growing enlistment of dissidents to his cause and occupation of key rural nodes.\nContinued activity threatened both continuity of government operations and regional stability; fracturing of federal authority increased the operational risk posed by Nordhaus-aligned elements.\n\nExecution:\nMultiple SAC divisions, in coordination with conventional military and law-enforcement assets, conducted a phased isolation campaign.\nPersistent surveillance and targeted pressure constrained Nordhaus's freedom of movement and reduced his command cohesion.\nFinal contact was established following combined kinetic and ISR (intelligence, surveillance, reconnaissance) operations. Subject's vehicle was disabled by a precision strike; subsequent investigation confirmed subject neutralization.\n\nConclusion:\nPost-engagement exploitation of recovered materials is ongoing.\nInitial assessment indicates the insurgency will fragment into localized infighting, reducing its capacity for organized, large-scale action.\nIt is recommended to conduct an internal personnel audit to identify potential sympathizers within federal forces and mitigate insider-threat risk."
 nss.21.a: "Mission complete."
 nss.22.t: "Dark Forest"
 nss.22.d: ""Is that all of it?" Burns asked his aide, glancing up at her from across the desk."All that's been sent, yes," she replied, not quite making eye contact with him.\n\nHe sighed and flipped through more of the dossiers, taking in the details of every file.\n\nReport after report, file after file, the outcome was the same. The Director hadn't even had his morning coffee yet, and already his head ached. The work of consolidating power in the United States had been a tireless one, and it required a great deal of sacrifice, from himself as much as from his subordinates. It was a thankless duty, but one which was necessary.\n\n"Thank you. I'll review them, now," he said, dismissing the woman with a wave of the hand.\n\n"Yes sir," she replied, turning on her heels and exiting the room with a quick click of the lock.\n\nBurns turned to look out the window and down into the courtyard below, taking in a deep breath of the cool morning air. In the distance, he could see a few early birds milling around. The world outside Langley seemed quiet and serene, a stark contrast to the intrigue and subterfuge that festered just beneath the surface of day-to-day life.\n\nIf but a fraction of their actions were revealed to the general public, the history books would vilify them as monsters. And maybe they were monsters-but there were no heroes in the world they lived in. There were far more sinister things lurking in the woods, beyond the light of the society they'd rebuilt for the American people, that would dwarf their atrocities if given an opportunity to reach the light. He knew this better than most.\n\nNow, with those either directly involved in the attack on D.C. or aware of the intelligence agencies' collusion in it silenced, the government could move forward into the future. At the very least, like this, their way would be one of Order, and the American people would not suffer at the whims of their own base impulses. The rabble, left to its own devices, could never build a better world.\n\nThe things beyond the bonfire had been held at bay, for a time."
 nss.22.a: "And for now, that would do."
 nss.23.t: "Jungle Cruise"
 nss.23.d: "At some point, something in Mark Tasso had cracked. He'd singlehandedly wiped out the neo-Nazi cell he'd been assigned to keep tabs on, turning his years of experience in ruthless killing against the people who were nominally on his side. He'd killed his handler as well, going off-the-grid in the aftermath. Mark had never had any loyalty to anyone in Washington, only to the Agency and his country as a concept, and as a home. But Langley and the rest of Washington were in league with the terrorists, and the false flag he'd participated in had set in motion the chain of events that had allowed the Agency and its cohorts to seize power across the United States. Now, he could only live with the guilt of being a marked man. He was no longer on a leash, but he couldn't go home again.\n\nThe first few assassins they'd sent had been returned in bodybags, flayed, eviscerated, or simply disappeared. Mark's years of training, as well as his experience infiltrating the far-right terrorists who'd attacked D.C., had acquainted him with a particular form of brutality. Mark knew that there was something broken in him. It had to have been, for him to kill the way he'd learned to. The government and its intelligence services had taken a bright-eyed teenager with a patriotic heart and turned him into a weapon. It had worked out for them for a long time, until he'd snapped and broken their leash. Like a Stray Dog, he now turned on his former masters and slaughtered anyone who crossed him. They would have sent someone like Mark after Mark.\n\nBut he'd been alone. A man with a broken mind and no friends could not hope to take down the government, not in a war of attrition. The CIA SAC kill-team had cornered him to an old school, but they'd run right into his trap, and he'd fought with rabid ferocity. Their masked visages and body armor would have made them seem like monsters, were they not so human. In the end, they screamed just like the innocents Mark had been forced to kill.\n\nWeakly, he limped his way out of the building, his wounded form bathed in the sunset's orange. He was alone now, the only living man for a few miles. More of them would come, he was certain, and he wasn't sure how long he would be able to keep going. But for now, he could rest, and try to formulate some semblance of a plan. He would not give them the satisfaction of ending him.\n\nFalling to one knee, Mark pulled off his helmet and tossed it to the side, feeling a trickle of blood run down from the cut above his eye. His vision blurred for a second and he shook it off. Now, if only he could-\n\nFrom the treeline, a glint of something caught his eye. The scope of a sniper's rifle, leveled right at him. He hardly had time to register the thought. There was a flash, a loud bang, and then nothing. Mark Tasso's body slumped over onto the cold pavement, and he breathed his last."
 nss.23.a: "His war is finally over."
 nss.24.t: "Faceless Justice"
 nss.24.d: "Colonel John Maddox didn't quite understand why things had come to this. He had loyally enforced the Biden administration's policies, ensuring his subordinates adhered to mask and vaccination guidelines; he'd eagerly laid siege to entire cities and made certain that none of those loyal to the tangerine demagogue escaped his clutches. And, until now, he'd never been one to speak his mind. He'd kept his opinions to himself, even when he knew they might be at odds with the administration. But the war on domestic terror had pushed the boundaries too far.\n\nIt seemed that with every passing week, the ROE had loosened, and the extent of things they were allowed to perpetrate against fellow Americans expanded. They were no longer detaining suspects. They'd taken to simply shooting them, or sitting idly by while the CIA's Special Activities Center massacred entire towns deemed 'extremist-adjacent.' Privately voicing his dissatisfaction to another officer, he'd offhandedly dubbed the SAC 'Langley's Republican Guard,' after the brutal praetorians of Saddam Hussein. He had not been aware that his friend was actually a CIA informant.\n\nHe couldn't make out the faces of his judges behind their masks, but he could tell, even from the tone of their muffled voices, that he'd made enemies in Washington. That the military had been reduced to this-utterly compromised by the intelligence agencies-was an insult in its own right.\n\n"Colonel Maddox," the lead prosecutor said. He had no idea who the man was, since he had not been told their names. They had not even given their rank, or their branch. He was certain they had come from the intelligence world, not from his Army. "You are aware of why you are here?""
 nss.24.a: "§g>>>Next Page...§!"
 nss.25.t: "'Judas' Activities Continue"
 nss.25.d: "The suspected member of the Shadow Cabinet has been purged, the new member in control of the position has been put under strict control with the agency's powers significantly restrained.\n\nHowever, it seems that the desirable outcome has not been achieved. We're still seeing suspected Judas activities taking place - even more so, Judas, seeing as we're trying to locate him, has intensified his actions in trying to undermine the United States.\n\nWe must recollect what resources we still have and launch another strike against the conspiracy with the decisive aim to decapitate the traitor."
 nss.25.a: "Shit...!"
 nss.26.t: "'Judas' Activities Cease"
 nss.26.d: "The investigation has been successful! The recently arrested member of the Shadow Cabinet was undeniably confirmed to be the supposed traitor within the ranks of the government. With the head in our pocket, all of the Judas's collaborators are now going dark, knowing that the wrath of justice is now inevitable.\n\nWith the homeland secured, finally, our country can concentrate on the much more important objectives of restoring itself as a global superpower."
 nss.26.a: "Nothing can stop Order."
 nss.27.t: "Deplatformed"
 nss.27.d: "Where'd that thread go? It was right here a second ago. Oh, well, I'll find something else to talk about, I'm sure...\n\nHuh, they closed the channel. It was a real good channel, too. Maybe it'll be reopened. We'll just wait and see, eh?\n\nThis site's not as fun as it used to be. Maybe if we just try harder, things'll be the way they used to. They've gotta get better.\n\nThe site's down? How can a site just be down? Well, that sucks. What else is there?\n\nThe Net's down? Well, there's not much that can be done about it. Just gotta wait for it to come back. Then things'll be good again.\n\nHuh, the Net's been out a lot longer than I expected. I guess I should go out and see what's happening."
 nss.27.a: "It's getting a bit chilly outside, isn't it?"
 nss.28.t: "Pravda"
 nss.28.d: "A decade ago, a job at the Washington Post was nothing short of a dream come true for Julia Ford. She'd graduated top of her class from Columbia and had gotten her degree in journalism and political science, eagerly taking that knack for political commentary and applying it to her position. She'd come onto the scene in the wake of Donald Trump's victory in the 2016 presidential election, a time when seemingly all of the American intelligentsia was mobilized and ready to resist, and had earned herself a reputation for dogged persistence and sharp, critical commentary.\n\nWhen the Second American Civil War had kicked off, Julia had eagerly thrown herself headlong into the conflict, backing the Biden administration's fight to restore law and order in a country on the verge of falling apart. In her mind, she'd been so certain that Biden would not only save the country, but build it back better.\n\nShe couldn't understand where everything had started to fall apart. Maybe it'd been the sweeping consolidation of power that'd followed in the wake of the D.C. terror attack, as the press suddenly had to contend with 'disinformation' labels that made it difficult for them to publish their work. The administration's censorship policies had been justified at every step, of course. Every journalist had a duty to report only the facts as they happened, not as one wanted them to. She had understood that, at first.\n\nThen the war on 'domestic terrorism' had escalated, and Julia's faith in the government had been shaken by its brutal treatment of dissidents and protesters. One by one, colleagues she'd worked alongside for years found themselves branded 'disinformation agents,' or exposed for links to 'antisocial organizations.' Some disappeared, while others found themselves discredited and jobless, blacklisted by an administration they'd once supported every step of the way. Julia knew she'd made a mistake the day she'd published an op-ed questioning the administration's policies, but she hadn't thought they would go after her. After all she'd done to support them, after the countless articles and stories she'd published, how could they?\n\nYet they had. A memo outlining her alleged ties to conspiracy theorists and left-wing terrorist groups had been filed to her employers, and within a matter of weeks, her name was mud, her life and career in shambles. The Post's own fact-checking department had been repurposed for internal review, and the same investigative team that had helped expose Trump's malfeasance was now probing her own contacts and sources, trying to prove that she'd colluded with the enemy.\n\nNow, as she stared down the barrels of guns belonging to masked men who refused to identify themselves, she understood what she'd done wrong. It was her, all along. She'd been a willing participant in something truly vile, manufacturing consent for something that was now far beyond the point of no return."
 nss.28.a: "Death of the Fourth Estate"
 nss.29.t: "Evidence Obtained"
 nss.29.d: "The recent action by our special forces had its results: we've managed to obtain critical evidence that may lead to the arrest of the supposed traitor within the ranks of the Shadow Cabinet.\n\nHowever, we should still exercise caution when choosing a target to purge, as this evidence may prove insufficient for a final conclusion. We should try to find more evidence if possible."
 nss.29.a: "Good job."
 nss.30.t: "Searches Bring No Results"
 nss.30.d: "The investigative operation by our special teams brought no useful information or was otherwise inconclusive. We must continue our efforts to determine the traitor, lest the United States of America will be doomed.\n\nDirector Burns has already instructed the CIA to increase the shadow budget and intensify our actions in all spheres of the government and society. By all means, we must succeed."
 nss.30.a: "Let's keep looking."
 nss.31.t: "Nuclear Threat Revealed"
 nss.31.d: "After several incidents that seem to be connected to one another and with the assistance of several investigators, it is likely that the dissident in question seeks to put the United States of America in a bad light to the rest of the world.\n\nThe means of which were highly speculated but after the raid on the Savannah River Site it is highly possible that the traitor in question is likely to utilize nuclear weapons of mass destruction in our name to forever stain our reputation.\nIt is unknown how far they are into attempting this but with the increasing pressure internally and externally, it is without a doubt that it is a matter of when rather than if.\n\nIt is recommended to increase the efforts to put a stop to this plot and to apprehend the individual in question lest they'll bring a permanent crack in the face of Order."
 nss.31.a: "It is getting warmer..."
 nss.32.t: "Broken Masquerade"
 nss.32.d: "It was a day like any other, with an emphasis on 'was'.\n\nThose in the ivory towers were desperately looking down at what was below them; they did not realize that it would be one of their own.\nEvery tower has to fall eventually.\nBoth the missile bases and the submarines launched their nuclear warheads towards several targets; several nations in South America were struck with the sword of Damocles. A continent soon to be engulfed in fire, not just in a literal sense.\nThen it was West Africa, the playground of global powers would become difficult to live in as their cities were reduced to ash. A reminder that pain is always right around the corner.\nThen, Haiti was next, a nation that is no stranger to chaos. After the blasts the country would be put through yet another test of endurance.\n\nFirst, there was silence.\nThen the screaming started.\nScreams for answers, screams for vengeance, screams for solutions.\nTo the outside world, these attacks were blamed on the American nation, a stain one cannot get rid of.\n\nThe United States of America has failed. Internally, there is panic, resignations are plentiful, and some of the closest allies of America have quietly left the country; others have given in to the final act of freedom. The United States has become an enemy of the world, and already, there are reports of major leaks regarding our inner workings.\n\nOur population is enraged.\n\nThose who remained loyal to Order will do the dirty work that is needed to maintain control, but this time it will not be behind the veil. This time it will be rough, painful, and fast.\nAll we can do now is pray, for another flame of change has been lit."
 nss.32.a: "A minor setback, what is a hundred more years?"
 nss.33.t: "Silent Coup in Canada"
 nss.33.d: "Unmarked black vans had encircled Rideau Cottage, security surrendering bloodlessly while men in suits and body armor swept into the Prime Minister's residence, rifles at the ready. It'd been an eerily silent coup, one that was more akin to the detention of an individual rather than an actual seizure of power. Trudeau wasn't sure how it had come to this. These sorts of things were reserved for the global south. This was not meant for a liberal, Western democracy such as Canada, one so much more sophisticated than America, he repeated to himself, like a mantra.\n\nYet it had happened nonetheless, and here he was, staring down the head of the CSIS, Daniel Rogers. There was only the cool detachment of a professional about his demeanor. "The terms are quite clear. This isn't up for negotiation, and it never has been."\n\nTrudeau glowered back, but his defiance was nothing more than hollow posturing at this point. There was nothing that could be done about the naked treachery before him, only the bitter truth that he was outmaneuvered and outmatched by an enemy that had anticipated every turn.\n\n"The Canadian people..."\n\nRogers chuckled. "As far as they're concerned, it's just another day. You will continue, on paper, in your official capacities. Understand your position. The facade of normalcy must be preserved at all costs. Any attempts to subvert or otherwise oppose this agreement, and I assure you; we have methods of making you comply. And, in the worst case, the Prime Ministership is just a title, after all. Your successor would be no less willing."\n\n"I can't believe you're actually going through with this. What do you hope to accomplish?"\n\n"Order. The world is burning, and you've done nothing but cower. America is reentering the world stage, and we will be by their side,""
 nss.33.a: ""As we always have been.""
 nss.34.t: "Layers of an Empire"
 nss.34.d: "The United States is no stranger to dismantling entire empires and systems of tyranny.\nSeveral have tried to enforce their Order on the world but they all failed, the British failed, the Germans failed, and the Russians failed.\n\nIt doesn't matter the form or color, Russia at its core remains an empire.\nAnd we as Americans are destined to dismantle all of them.\n\nOur first mistake was allowing the soviets to dominate Eastern Europe for decades, our second mistake was placating Putin, and our third mistake was not making Europe strong enough to deal with them without us. But like any rival, the battles won and lost is what teaches us.\nIn a way, any form of resentment or spite is long gone.\n\nBoth of us have clashed in several ways, always trying to show to the world who is the best of the best.\nToday marks the day we put an end to that rivalry once and for all, to show to the world that in the very end, one of us was the best.\n\nTheir children walked across the ruins of two empires, they shall walk over the ruins of the third one."
 nss.34.a: "Walking on their way to freedom."
 nss.35.t: "Proving Ground of Empires"
 nss.35.d: "An entire continent covered in bones and ash, where empires proved themselves against the universal laws of reality itself, some won, some lost.\nBut empires aren't made out of men and women standing on ivory towers, empires are made out of ideas and concepts that bring a realm together.\n\nTo many, the United States is an empire.\nAn empire that withstood the last test no other empire could withstand.\nIdeals worth preserving.\nConcepts that'll remain invincible.\nWe would not exist without Europe, in a way there is sentimental value to ensure that we won't lose them again to the fiery flames of change.\nIt does not matter what symbol reigns over Europe.\n\nThe American peace will ensure that its symbols will crumble, its idols fall and its corrosive ideologies be dismantled, let us restore Order in Europe.\nOur embrace shall never be loosened.\n\nNever again."
 nss.35.a: "It is time to come home."
 nss.36.t: "Mirror"
 nss.36.d: "In the east there lies a beast.\nMade out of people and factories.\nIt needs more and more.\nTorching the lands of the weak.\n\nYet arrives the torch of enlightenment, held by the many.\nAlongside a blade held by the many.\nAimed at its heart.\nAimed at its head.\n\nChina's awakening has not been without its hiccups, our temporary absence has proven to be the key ingredient for its ascension. We've seen the similarities to our own history.\nNothing but tests and trails, and to endure them all would guarantee a place under the sun.\nBut there is only one place.\n\nChina has the ability to take our place, to become the new watchdogs of the world.\nBut it is not a world we want to be part of.\n\nThe American Peace lasted for so long for a good reason.\nIt is time to put an end to their ascension."
 nss.36.a: "Defang the dragon."
 nss.37.t: "Heart of the World"
 nss.37.d: "Civilization was born in the Middle East, and like any birthplace; it is prone to corruption.\nNot due to the nature of it, but due to the time that has passed.\n\nThe region has not been a stranger to strife.\nLike a wheel that tries to reinvent itself.\nMen in black and men in beige, armed with steel and fire.\nA region forever clouded in a red mist.\nWe've been here before and our presence ensured that the cycle would not occur again, our absence has been the proof needed that we have to come back.\nTo make sure that the spectres of violence remain buried.\nStability and Order are the virtues needed to tame such an unstable region, its rich history and knowledge are too valuable to be kept in the hands of the impulsive masses.\n\nWe're back again.\nAnd we will never leave."
 nss.37.a: "Bury their arrogance, bury their pride."
 nss.38.t: "America Demands We Leave the BRI"
 nss.38.d: "The United States of America has issued an ultimatum to our country, demanding we cease any economic and diplomatic cooperation with China, most notably - leaving the Belt and Road Initiative, citing "the threat of Chinese neo-imperialism and the threat of global authoritarianism".\n\nThe strict demands and threats of the American side, however, are incomparable to the losses we could suffer from losing China's favours. But in a struggle of titans, there can be no compromise, so we must choose: either sever our ties with China or risk suffering from America's military and economic might."
 nss.38.a: "We have no choice."
 nss.38.b: "No?"
 nss.39.t: "Lost Soul"
 nss.39.d: "He was assigned to night watch to make sure no Iraqi insurgents caught his unit off guard; the calm nights were always a prelude to another ambush, another terror attack. He hadn't slept in days, and sometimes, he caught glimpses of past wars.\nThe night sky was beautiful, a painting only a divine being could create.\nSometimes, he could hear gunshots in the distance; whether from friend or enemy, it didn't matter, because it was neither near him nor his unit.\nThe small lantern near the cheap plastic chair he sat in gave him just enough light to see his immediate surroundings, but in the distance, darkness allowed room for imagination.\n\n''Have you seen my men?''\n\nHe saw a figure standing nearby, wearing fatigues and a gas mask that looked a bit outdated.\nThe figure approached as he squatted beside him.\n\nThe night watch looked up, startled.\n\n''Wh-who are you? Identify yourself!''\nHe slowly stood up, aiming his rifle at the figure.\n\n''My men, have you seen them?'' it kept asking.\n''I-i'm sure they are still arou-if you just identify yours-''\n\n''Of course they are around, I'm still here, and you will be too. None of us will leave this place.''\nThe figure stretched out its arms to the night watch. Bullet holes were visible on its uniform, rope marks around its neck.\n''Civilization was born here, and here is where it will be buried.''\n\nThe night watch was abruptly awakened by a squad member shaking him.\n''Hey man, you good?''\nHe offered a gentle smile. ''Don't want these tusken raiders to get the upper hand on us.''\n\nThe one standing guard looked around, but the masked figure was no longer there.\nHe stood up and laughed sheepishly."
 nss.39.a: ""Please stop referencing Star Wars.""
 nss.40.t: "Cruelty Squad"
 nss.40.d: "Coming to a halt outside the building, the doors of the van flew open. The unmarked soldiers filed out and made their way to the entrance, laying explosives on the door, the blast echoing down the street as the operatives rushed in. Whether they'd been masked far-right terrorists or civilians, anyone who dared to stand in their way was shot down. Their first priority was to take out the HVT, and any other potential terrorists, and then anyone who could have potentially seen something.\n\nTime and time again, it was always the same-the relief on the faces of the hostages at their rescuers, only for confusion and horror to register when the operatives turned their rifles on them as well. No survivors, no witnesses. Not that civilians would have been able to recognize their would-be saviors, their faces obscured behind balaclavas, but nothing was being left to chance.\n\nWhen, at last, they found themselves faced with a locked door, an operative placed an explosive on it, and kicked it down. As the smoke cleared, it revealed a cowering man with a swastika tattoo on his neck.\n\n"Don't move!" ordered the team leader.\n\n"This wasn't part of the deal-" the neo-Nazi protested, only for the squad to fill him with lead. "You... promised me-"\n\nThe team stood down. "Entry team, this is TOC. Cleanup team is on the way. Eliminate all remaining survivors. Over."\n\n"Copy that," the team lead replied. "Entry team, out." He then turned to his men."
 nss.40.a: ""You heard 'em. Let's get to work.""
 nss.41.t: "Election Day"
 nss.41.d: "In the more autocratic governments across the world, the power to vote has been snuffed out. That feeling of having no power, no say in anything. It is a paralyzing feeling.\n\nThe American citizen does not feel such paralysis, every four years the election season is in full swing, a ritual to celebrate the freedom of choice and to remind our people that they hold that power.\nThe choice to pick their favoured candidate, from the charismatic to the pragmatic, from the humorous to the calm. It'll be like the days before the rot of populism, everyone smiles and friendly rivalries are made, the same way a sports game would go.\n\nWhoever wins, the machinery behind the veil will remain the same.\nNow let's see whose porcelain mask will shine brightly on the screen.\n\nAnd the winner is..."
 nss.41.a: "Decisive Victory for the Incumbent!"
 nss.41.b: "Gavin Newsom"
 nss.41.c: "Mitt Romney"
 nss.41.e: "Lloyd Austin"
 nss.41.f: "John Bolton"
 nss.41.g: "Mark Milley"
 nss.41.h: "Antony Blinken"
 nss.41.i: "Hunter Biden"
 nss.41.j: "Nancy Pelosi"
 nss.41.k: "Chuck Schumer"
 nss.41.l: "Liz Cheney"
 nss.42.t: "Inauguration Day"
 nss.42.d: "The people have spoken, whatever form of rivalry that was brewing between the candidates and their supporters has dwindled down. Now it is the time for shaking hands and bright smiles, now it is the time to be united again.\nThe President-elect has drawn a large virtual crowd due to the lockdown being in effect, the ceremony's security was intensified for obvious reasons as the president-elect laid their hand on the bible and recited their oath to the nation.\n\nNormally there'd be a crowd cheering them on, yet the masses online are making enough noise to compensate for that, fireworks are being lit up and the anthem plays in the background as the president of the United States of America is guided into the capitol.\n\nWith the election season having reached its conclusion, it is time to properly introduce the president to how things are done, both in public and behind the scenes."
 nss.42.a: "They'll be kept on a need-to-know basis."
 nss.43.t: "TO WHOM IT MAY CONCERN:"
 nss.43.d: "After the recent inauguration of the president of the United States of America, there have been rumors circulating regarding the subsequent passing of former president Joseph Robinette Biden, rumors such as that ''we pulled the plug'' or that we ''injected him with a painful toxin'' are nothing more but blatant attempts of misinformation from external enemies.\n\nOur former president Biden gave his heart, soul and body for our great nation and he held out till he fulfilled his term to prevent further instability, that takes courage.\nNo matter the pain, no matter the stress, he endured.\nAnd just like he did, so will we.\nWe fulfill our duties, we bring the world back into the fold of normalcy.\nAnd we move on, no matter the scars left behind.\n\nI would like to remind everyone that the continuation of such rumors fall under acts of verbal dissent and could potentially be considered anti-social activity. I do not need to remind you of all the measures we take against such acts.\n\nThere is no time to drift away in speculation and mystery, we have a world to rebuild.\nSIGNED:"
 nss.43.a: "William J. Burns"
 nss.44.t: "Shooting at Local Mall Leaves 20 People Dead"
 nss.44.d: "A quiet afternoon quickly turned into a nightmare as a young female roughly around the age of twenty-one arrived at the Franklin mall in Pennsylvania armed with a sub-machine gun with the intent of killing as many people as possible. The attack lasted approximately twenty minutes before local authorities were able to stop her by lethal means.\nThe attack has left at least twenty people dead while four others are left in critical condition, already there have been reports of police forces setting up check points across the area and state to reduce the chances of a potential copycat.\n\nThe shooter's motivation is still highly speculated but a notebook was found in the shooter's backpack which contained imagery and text related to nihilism and signs of deteriorating mental health. Consistent themes of ''Eyes in the dark'' were found within the notebook.\n\nWhile the investigation is ongoing and her family being put under questioning, local authorities strongly suggest looking into the activities of their younger family members, especially in regards to their online activity.\n\nThe FBI has stated that more information will be shown when the proper confirmations have been made."
 nss.44.a: "More to come after the break."
 nss.45.t: "Campus Attack Scars the Nation!"
 nss.45.d: "A local college in Tennessee was met with tragedy when a young male around his twenties started shooting at students and teachers alike with an automatic firearm. Local security tried to apprehend the shooter but were quickly forced to retreat due to the usage of Molotov cocktails, managing to kill at least one security personnel.\n\nA SWAT team was deployed on the college campus and after a swift sweep through the area, the shooter was stopped in its spree by lethal means. Reports of the amount of fatalities are still fishy but it's approximately more than forty victims that met their fatal end.\nThe motivations of the shooter are still speculated on but self-harm scars across his entire body indicate severe mental health problems alongside mocking texts written on the Molotov cocktails such as ''Burn in hell!'' and ''Warmth no matter what!''.\n\nThe family is put under heavy questioning as local authorities do a deep sweep on local online activity where people could express sympathies towards the shooter or any potential connection to a digital group encouraging such violence.\n\nThe FBI has stated that recent investigations have led to the conclusion that there are way more people harboring these anti-social elements then they initially thought across the United States.\n\nMore to follow after the break."
 nss.45.a: "Oh wow, Disney is making a new movie!"
 nss.46.t: "Carnage Shocks the Nation!"
 nss.46.d: "A street festival in New England turned into a bloodbath fast when a twenty-four year old male ran over several people in a black truck, the words ''Flood the world'' and ''EAT SHIT AND DIE'' among other profanities were seen spraypainted onto the vehicle, after it crashed into a cafe. The shooter was quick to exit the truck alongside with a rifle with the sole intent to kill as many people as possible.\n\nThe shooter's intentions were made clear with him stomping his boots onto the heads of the wounded and the slurred screaming. His eyes were reportedly bloodshot and his movements were jittery.\n\nPolice forces arrived at the scene and after forcing the shooter to retreat into a convenience store, he was promptly isolated and eliminated by lethal means. Authorities claim that the shooter showed heavy resistance which prompted their lethal response. The death toll has easily reached nearly seventy-five people with at least a dozen wounded with the primary cause of death being hit by the truck.\nAuthorities haven't confirmed the shooter's motivations but have implied that the perpetrator was heavily under the influence of alcohol and different kinds of medication related to mental health, they have promised to tell the public more once more information has been confirmed.\n\nIn other news; the federal government has proudly announced the expansion of gun-free zones in public places, this occurred after a much more successful nationwide buyback campaign due to the crackdown on firearms ownership."
 nss.46.a: "Okay but i wanted to watch Friends, change the channel."
 nss.47.t: "Attack Scorches the American Soul!"
 nss.47.d: "A local gas station was caught in a fiery explosion as a suspect was seen near the vicinity carrying a shotgun, shooting at whoever wasn't caught in the blast.\n\nA twenty-six year old male carrying several pipe bombs went haywire against the local populace as he used the explosives onto nearby stores and buildings, leaving carnage in its wake.\nThe attacker was quickly apprehended by local law enforcement but not before he blew himself up with a bomb vest he was carrying underneath his hoodie.\nThe perpetrators motives are largely unknown but relatives have made statements regarding his history. Heavily isolating himself and showing signs of extreme paranoia, it would seem to be yet another statistic on the mental health crisis taking America by storm.\n\nThe death toll of the attack is still pending but officials have stated it is easily in the hundred if not more. officials have promised to inform the public more once more information is known.\n\nIn other news; increased storm activity has been reported near the coast of Florida, experts are seemingly baffled due to it being out of season, residents are advised to pay close attention to official channels regarding any potential natural threats."
 nss.47.a: "Do they produce these people in a factory?"
 nss.48.t: "Dollar Tree Attack Leads to Network of Violence!"
 nss.48.d: "What was initially seen as an armed robbery, quickly led to becoming something much worse.\n\nA twenty-one year old woman was seen entering a local Dollar Tree in Georgia and before the store clerk could even respond, he was shot in the chest with an automatic rifle while she was howling like a wild animal. Eventually she killed four customers before she walked outside and started randomly firing into buildings and groups of people before retreating into an abandoned mall.\n\nAs local authorities arrived on the scene and attempted to sweep through the mall, the shooter was not alone as she alongside five others opened fire on the police forces present, the Dollar Tree attack was likely an attempt to bait the police into a firefight.\nThe perpetrators were heavily armed but were swiftly eliminated after SWAT units arrived on the scene, leading to the deaths of all six shooters.\n\nAuthorities claim that there is a high chance that a larger group is in play but no confirmations on that just yet, approximately thirty people have been killed and military police units have been deployed to watch out for any other potential threats.\n\nMore will be told soon but not before our break."
 nss.48.a: "Why a Dollar Tree though?"
 nss.49.t: "Shooting in the United States!"
 nss.49.d: "Terror sweeps the nation as a lone wolf has shot up a local place, the shooter was quick to be stopped by lethal means but not before they brought the death toll in the dozens. Local authorities have stated that the shooter had a long history dealing with mental illness, medication and problems with their family.\n\nInvestigations regarding where the shooter got their guns from and the potential motivators for such an attack are still underway as authorities promise a proper press conference regarding the attack. Another tragic day in America and more will be told right after the break."
 nss.49.a: "I hate advertisements."
 nss.50.t: "LONE WOLF INTEL"
 nss.50.d: "The following document contains information regarding the application of pressure on susceptible subjects to enact lone wolf actions against the population. The intended goal is to spread anxiety on a nation-wide scale to the point that there'd be no pushback to the increase of surveillance and security in the United States of America.\n\nSubjects must meet the following criteria before pressure is applied:\n-Must have anti-social tendencies.\n-Must be between the ages of sixteen and twenty-eight.\n-Subject must have a presence on the internet.\n-Subject must have a strained relationship with their family.\n-Subject must struggle with mental health.\n\nAfter a potential candidate has been found, the right amount of pressure must be applied.\nRanging from social media pressure from decoy groups/individuals to the contribution of paranoid tendencies. The guidance towards the usage of medication is highly encouraged but remains optional.\n\nOnce it is certain that the subject will become the catalyst of a lone wolf incident, if it is not possible for the subject to acquire firearms on their own accord, the usage of decoy groups/individuals is encouraged to supply them with the appropriate equipment.\n\nAfter the conclusion of a lone wolf incident, it is advised to scrub any trails that could potentially implicate operatives or have non-personnel that were parts of the decoy networks be apprehended for contributing to the lone wolf incident."
 nss.50.a: "Page 1 out of 30."
 nss.51.t: "Birth of the Am-Net"
 nss.51.d: "The unregulated nature of Internet discourse had long been identified as a contributing factor to societal destabilization. The inability of pre-war authorities to properly manage the transition to the information age was assessed as a critical failure in governance.\n\nTo rectify this deficiency, Project Am-Net was authorized for implementation. Drawing on technical expertise from both domestic sources and foreign counterparts, a comprehensive digital containment architecture was constructed over an accelerated development cycle. The system mirrors the efficacy of similar structures implemented in the People's Republic of China while incorporating American technical innovations.\n\nThe transition to a managed information ecosystem will occur at 0400 hours. All civilian internet traffic will be routed through federally-controlled nodes with real-time monitoring capabilities. Unauthorized external connections will be rendered non-functional. Domestic content distribution will be subject to automated and manual review protocols.\n\nAuthorization documentation has been finalized and submitted for final executive review. The Director's signature represents the final procedural requirement before full implementation commences.\n\nThe infrastructure is operational. Personnel are at stations. We await the order."
 nss.51.a: "Am-Net is Online."
 nss.52.t: "D.U.M.B. Program Reactivation Report"
 nss.52.d: "CIA/IC INTERNAL - BRIEFING SUMMARY\nSUBJECT: D.U.M.B. Program Reactivation Report\nCLASSIFICATION: TOP SECRET//NOFORN\n\nSUMMARY:\nFollowing the cessation of hostilities in the former United States, the Central Intelligence Agency has reestablished oversight over select Deep Underground Military Bases (D.U.M.B.s) as part of an ongoing strategic contingency program.\n\nAs per previous intelligence assessments, the United States Armed Forces' D.U.M.B. network represents a substantial strategic asset in the event of both domestic insurgency and foreign intervention. Given the evolving security situation post-Civil War and the necessity of securing critical national security assets, the Central Intelligence Agency has initiated a comprehensive reactivation program for a select number of D.U.M.B. facilities, as well as the construction of additional facilities.\n\nINTEGRITY REPORT ON PREEXISTING FACILITIES:\n\nDENVER INT'L AIRPORT D.U.M.B.: Significant structural damage due to controlled demolition; all access tunnels compromised; estimated 60-70% of stored materials lost.\n\nDULCE D.U.M.B.: Seismic instability and flooding have compromised large sections of the facility; approximately 45% of the complex remains accessible.\n\nAREA 51 D.U.M.B.: Total loss of surface facility (Groom Lake AFB), subsurface complex compromised by partial flooding; remaining infrastructure and archival material undergoing recovery assessment.\n\nCHEYENNE MOUNTAIN COMPLEX: Limited structural compromise due to insurgent occupation; facility temporarily controlled by pro-Trump elements before recapture by SAC forces with acceptable losses. Asset preservation assessment shows 85% material integrity. Subsurface infrastructure expansion is under strategic consideration.\n\nRAVEN ROCK MOUNTAIN COMPLEX: Remained secure during hostilities due to fortified perimeter defenses and limited knowledge of operational staff. No significant damage or asset loss reported. Subsurface infrastructure expansion is under strategic consideration.\n\nMT. WEATHER COMPLEX: No damage reported. Functionality of subsurface infrastructure maintained. Subsurface infrastructure expansion is under strategic consideration.\n\nCONCLUSION:\nWhile damage assessment and asset recovery operations are underway, it is recommended that a comprehensive reactivation plan for D.U.M.B. facilities be initiated as a matter of priority."
 nss.52.a: "Authorized."
 nss.53.t: "Rehabilitating the Two-Party System"
 nss.53.d: "To say that the GOP's image had been tarnished by Trump's treachery and the ensuing Civil War is a vast understatement. Once synonymous with conservatism and the so-called silent majority of Americans, it is now associated with rebellion and treason. Its hijacking by populist forces, culminating in Trump's disastrous leadership and the Republican rebellion's bloody struggle against American unity, has left it a shadow of its former self. Even as the Civil War's dust settled, it is evident that the Republican Party, as it was once known, is beyond repair.\n\nThe Two-Party System, however, is viewed by the Cognoscenti as incredibly beneficial to its ends. A bold strategy is taking shape to rehabilitate the Republican brand while ensuring a new, compliant GOP serves as a reliable foil for the Democrats. The aim is simple: to channel dissent into a safe, controlled political vessel, one that poses no threat to the established order.\n\nThis plan employs a careful process of damnatio memoriae, while forging a new narrative centered on a pro-establishment vision. The resurgence of neoconservatives and the Never-Trumper movement-once nearly extinct-now defines the party's future, and the strategy hinges on their ability to repackage the party in a palatable manner. This involves distancing the new GOP from the Trump legacy, stressing its commitment to core conservative values like small government and individual responsibility, all the while ensuring the party is as inoffensive to the elites as it is to the voters.\n\nThus begins a PR rehabilitation campaign: purging potential MAGA sympathizers to revive the old Republican Party and reasserting the two-party system. Neoconservatives will lead this new political generation, expected to collaborate quietly with Democrats, muting dissent while maintaining only approved choices. The Cognoscenti's endgame is a restored GOP serving as a façade masking real power, preserving the illusion of choice to maintain their unassailable grip. Mainstream news op-eds will praise Republicans who stood with Biden during the crisis, lionizing neoconservatives as heroes who helped fight to restore political sanity. The narrative frames this revival as a return to normalcy, a triumph of democracy over populism, emphasizing unity while casting radicalism as dangerous to national healing."
 nss.53.a: "As always, the masses are eager to be fooled."
 nss.54.t: "Puerto Rico, D.C. Integrated into the Union"
 nss.54.d: "WASHINGTON, D.C. (AP)-Congress has quietly passed the Admission Acts for the Commonwealth of Puerto Rico and District of Colombia, granting them statehood and thus fulfilling a longtime demand from their respective populations. President Biden has declared his full support for the Acts and will be finalizing approval for the Acts in the coming days.\n\nThis decision comes as part of an effort by the administration to address the growing divide between America and its overseas territories. Puerto Ricans, long seen as a second-class people by many in the mainland United States, will now be able to participate in national politics without having to live in the United States, and D.C. will finally gain representation in the federal government after decades of lobbying. The President has regarded this push as a "crucial step" in "mending the divisions that plague our great nation."\n\nWith the passage of this legislation, the number of states in the Union are poised to stand at 52. This is poised to create four additional seats in the Senate, likely to be Democrat. The Republican concession on this matter has been touted as a 'goodwill gesture' by GOP legislators to promote healing in a divided nation. Already, the transition to a 52-star flag has been approved by relevant government bodies, with the rollout expected to be completed in the coming years."
 nss.54.a: "A more perfect union."
 nss.55.t: "Into Oblivion"
 nss.55.d: "He laid in his bed, the man covered in tubes and machines, measuring the way his heart beats, measuring the way his lungs breathe.\nJoseph Biden had been trapped in his own body for a while, in the grand scheme of things it was short, but to him it felt like eternity.\nBeing aware of everything while not being able to do anything, having to feel everything and seeing the glares and hearing the mockery of those taking care of you.\nIt is maddening, a ride that never ends.\n\nToday was different, he saw the familiar face of Burns nodding and whispering to one of the nurses as he gave Biden a stern look, Burns gave him a respectful nod as he walked out of the room.\nThe machinery around him started to sound differently, the nurse's eyes averted from his gaze as she injected something in his drip bag.\n\nAt first there was a sense of relief, then the walls started to melt.\nThe paintings on the walls that depicted nature, turned into depictions of animals eating one another. Windows started to crack and the nurse started to wheeze heavily until she collapsed onto the ground with a loud wet sound.\n\nThe room was no longer a room, a wide field covered in blue grass, a lone house in the distance.\nThe house is on fire.\nIn the distance Biden saw a figure walk past, a familiar face.\n\n''Beau?'' Biden thought.\nJust thoughts, he still could not move or speak.\nTrapped in a world he does not recognize.\nTrapped in a world that slowly goes dark as he feels the presence of something else approach.\n\nHe looked up as the sky grew dark too, the sun was gone but its grin remained.\n\nWhy is it so dark?"
 nss.55.a: "Hello?"
 nss.56.t: "UN Declaration on the Integrity and Inviolability of World Peace"
 nss.56.d: "NEW YORK CITY (AP)-In a landmark session marking a new era of global stability, the UN General Assembly unanimously adopted the Declaration on the Integrity and Inviolability of World Peace, formalizing a sweeping restructuring of international security. The resolution recognizes the U.S. as the "foremost guardian" of global Order under an expanded mandate for the Strategic Coalition for Peace. Under this framework, "local crises" and "regional disputes" now fall under the Coalition's direct jurisdiction, centralizing global security oversight. The declaration establishes that any challenge to UN authority by "rogue states" or "destabilizing elements" will trigger coordinated international intervention, representing the most comprehensive consolidation of global security governance since the UN's founding.\n\n"This declaration represents a collective step toward global stability," the President said in a televised address. "One where the rule of law, not the law of the jungle, stands paramount in a renewed, rules-based order reflecting our values. This order will be more just, secure, and capable of delivering a better future. The UN, through its empowered peacekeeping role in the Strategic Coalition for Peace, will work alongside the U.S. to promote global security and sustainable development. When we are successful-and we will be-we will at last be able to end the cycle that has determined human history for millennia, and usher in a New World Order that reflects the values and principles of our shared humanity."\n\nDefense analysts call the agreement the end of sovereign military action, ushering in an era of "enforced collective security." The resolution mandates global intelligence fusion centers, universalized Coalition rules of engagement, and permanent installations at strategic chokepoints."
 nss.56.a: "History Ends Again."
 nss.57.t: "Financial Funds Unaccounted For"
 nss.57.d: "There have been some concerning reports regarding our black budget, at times there are gaps in the different funds we have for several projects and initiatives.\n\nUsually this tends to be an administrative oversight but due to the similarities to the operation in 2001, we suspect foul play might be involved.\nWhoever or whatever's responsible for the absence of funds most likely isn't doing this out of self-interest and instead seeks to use them to undermine our agenda.\n\nIt is advised to keep an eye out for anti-social groups suddenly becoming well equipped or getting bolder in their operations as well as any chatter among our operatives since bribery isn't out of the question.\nNonetheless, these gaps in our funds are easy to amend but the fact that we have someone on the inside planning something, is more than enough reason for concern."
 nss.57.a: "The blade of Capital turned against us."
 nss.58.t: "Frog in Boiling Water"
 nss.58.d: "''I guess he didn't make it.''\nIt had been a relatively calm day at the Pentagon as William J Burns was walking down one of the many hallways alongside a small group of colleagues and security.\n\n''He did not, the toxin in his blood indicates a targeted attack.''\n''Any clue on who could be behind it?''\n\n''Well, the problem here is that the toxin has been primarily used by us, so the French are blaming us for assassinating their diplomat.''\n''I never approved that.''\n''You did not, Sir.\n\nBurns frowned as he was reminded of the previous incident related to the absence of several funds connected to the black budget, whoever's lurking in the shadow, it's someone with friends and experience.\n\n''Try to salvage whatever we can with the French and arrange a meeting with the advisory board.'' He wanted to say more but a quick glance over the people around him ensured he'd hold his tongue.\n''Right away, sir.''\n\nBurns was wondering what this individual, this traitor, is trying to do but with this diplomatic incident he might have found a clue on their goal. And it is one that concerns him greatly."
 nss.58.a: "A cracked mask may never be fixed."
 nss.59.t: "Savannah River Site Incident"
 nss.59.d: "A concerning report has reached the inner chambers of the government. The Savannah River Site, which is primarily known for managing nuclear material and conducting research, recently experienced a break-in event.\n\nInitially, nothing was out of the ordinary, but after the failure of maintaining contact with the facility, it was found out that the site was subjected to a raid conducted by an anti-social group known as ''Vultures'' which is an anarchist group that was extremely low on our priority list. However, casualties on the attackers' side were massive; they weren't there for the sake of inflicting damage, as a small portion of them managed to retreat from the area.\n\nAfter-action reports indicate that nuclear material and data regarding the research of such material have gone missing from the site, which is a clear sign that the group attacked the site with a clear purpose. Additionally, the anarchist group was reported to be well-equipped to the point that they could withstand the assault of a SAC kill team for much longer than anticipated.\n\nIt is obvious that the group was hired by an unknown third party or individual, but the specifics of said third party are still under investigation."
 nss.59.a: "This is bigger than we thought."
 nss.60.t: "Misplaced Assets"
 nss.60.d: "The report landed on Director Burns' desk with a soft, definitive thud. It was a slim, unassuming file, colored a neutral gray that somehow seemed to absorb the light of his office. The title, stamped in stark black letters, read: "Misplaced Assets - Internal Accounting Discrepancy." A bland euphemism for a potential nightmare.\n\nBurns dismissed his aide with a curt nod, his gaze already fixed on the first page. He didn't need to read far. The numbers were off, and not by a small amount. Funds earmarked for infrastructure projects-specifically, the construction of new "rehabilitation and processing centers" in south Texas-had vanished. Transferred through a labyrinth of shell accounts, the trail had dissipated like mist.\n\nBut the bleeding wasn't just restricted to finances. They had lost personnel. A key logistician from Project Megalopolis had gone AWOL. And a senior nuclear scientist from the DEA, a woman with high-level clearance, had simply not shown up for work three days ago. Her apartment was empty, scrubbed clean.\n\nBurns knew these tactics, because he had helped pioneer them. These were not random occurrences. They were coordinated, executed by someone who knew the system's architecture, its blind spots, and its pressure points. Someone on the inside.\n\nHe thought of the memo. The warning. Like any body infested with parasites...\n\nThe parasite wasn't merely feeding, Burns surmised. It intended to build. The funds, the expertise, the data-they were the raw materials for something else. A weapon aimed at the heart of the Order they had so painstakingly constructed. Their Judas had been a busy little heretic.\n\nHe leaned back, the leather of his chair groaning under his weight. The view from his window was placid, orderly. But beyond the manicured lawns and the perimeter fence, he could almost feel the rot spreading. A single cell, turned malignant. A traitor, armed with their own secrets.\n\nBurns picked up his secure phone. His voice was low, flat. "Get me Fink. And Tompkins...""
 nss.60.a: ""Tell them we have a contagion.""
 nss.61.t: "Launch Code Access Attempt!"
 nss.61.d: "''So any leads?'' William J Burns wasn't someone to get nervous quickly, but hearing the news of a cyber attack on internal digital networks was a cause of concern.\n\n''Negative, sir, the attackers attempted to find a way to gain access to the missile launch codes. We managed to shut them out of our networks. It has been proven difficult to pinpoint the origin of the attack, but it is definitely within our borders.''\n\nThe entirety of the Pentagon was on high alert, and the air of paranoia could be physically felt. Office workers and security guards looked at one another with high suspicion, and cooperation was reluctant at best.\n\n''Did they get anything?'' Burns asked; he hadn't gotten proper sleep in days. At times, he thinks he can see the traitor among the crowd, but its shape always changes. Just out of reach.\n\n''That's the problem, sir.''"
 nss.61.a: ""We don't know.""
 nss.62.t: "Missing Warheads"
 nss.62.d: "The inner workings of the federal government are put under a lot of tension as each minute that passes is the equivalent of a pot of boiling water increasing its temperature.\nColleagues who worked alongside one another for decades now look at each other as if they have discovered the skeletons in their closets. And today's incident is an indication that we are getting closer to the boiling point.\n\nDuring one of the regular checkups on our missile bases, we've come to the shocking discovery that several nuclear warheads have gone missing. Rather than one base being the target of such theft, it was discovered that several bases have been the target of a coordinated heist.\nPersonnel associated with these facilities have been put under intensive interrogation alongside their families, as we are keeping a lookout on the global black market for any sales regarding our missing nuclear warheads.\n\nHow this was possible in the first place remains under investigation but it is clear that the traitor who took them does intend to make use of them. If we do not deal with this accordingly, things are going to get ugly fast."
 nss.62.a: "A rogue sword of Damocles."
 nss.63.t: "Submarines Entering Position"
 nss.63.d: "''They are WHAT?''\nWilliam J Burns wasn't one to exactly shout, let alone scream, but the raising of his voice was to be expected when news of several submarines that were reported missing were found back in several positions across the Atlantic Ocean, making their way to unknown locations.\n\n''The submarines are armed with the nuclear warheads that went missing recently; we assume that they are waiting for orders from whoever is commanding them.''\n\n''Intercepting them would probably cause them to fire away anyway. Any news regarding our person of interest?''\n''Negative, sir.''\n''Get out and don't come back till you've got something.''\n''Understood, sir.''\n\nBurns leaned back on his chair, but any form of relaxation was far to find.\nConstantly, the traitor was able to stay out of his sight; constantly, they were able to avoid the eye of providence, and now they've gotten extremely bold. All of the work he has done can be undone in a single nuclear strike. This cannot happen."
 nss.63.a: "Time is running out..."
 nss.64.t: "Missile Sites Go Rogue"
 nss.64.d: "After the submarine incident, it was likely that the missile bases would be the next target, and when we attempted to contact personnel on site, there was no contact.\n\nWe can only assume the worst. Already, the facilities are surrounded by several SAC kill teams ready to strike; however, due to the volatile nature of the situation, we can't just barge in. Whatever the traitor has, it can be taken back again as long as we manage to locate and apprehend the target.\n\nWe are on a short time frame; the longer it takes for us to find the target, the more likely it is that all the work we put into our vision will be for naught."
 nss.64.a: "The heart of Order beats faster."
 nss.65.t: "Coup in Brasilia"
 nss.65.d: "In Brasilia, a military coup against the Brazilian government has ousted the current regime in favor of a transitional military one, citing 'threats to democracy' and the 'increased instability' brought about by the former administration's policies. The military regime has been recognized as legitimate by the State Department, with the President sending a letter to the new Junta applauding the restoration of order and peace in Brazil, a country with deep ties of friendship with the United States.\n\nThe new regime in Brasilia, headed by the military, has pledged its commitment to the principles of democratic governance, respect for human rights, and adherence to the rule of law. The transitional authorities, comprising high-ranking members of the armed forces, have reiterated their intention to hold transparent elections within a reasonable timeframe.\n\nIn an interview with the New York Times, a State Department spokesperson affirmed that the United States is closely monitoring the situation in Brazil and is engaging in constructive dialogue with the transitional authorities. The spokesperson emphasized the United States' support for a peaceful and orderly transition of power, noting that the U.S. government is ready to assist the Brazilian people in their pursuit of democratic stability and prosperity, should the new government request it."
 nss.65.a: "Under our wing again."
 nss.66.t: "Reconstruction of Russia"
 nss.66.d: "Any barbaric civilization would relish in the slaughter of one of its greatest adversaries, and although there is an air of glee across the men and women who contributed to the defanging of Russia, we do not express any form of satisfaction.\n\nRussia has always been a country seeped in autocracy, whether it be because of the hardships endured or the long-running history of internal strife; we don't exactly fault them for the things they did. They simply lacked subtlety. Not that it matters, for the first time, American tanks roll over Red Square and alongside it, a flood of new ideas and concepts that'd be considered alien to the Russian people.\n\nWith their corporations being slowly absorbed by ours and their opposition being elevated, the question of who becomes the face of the new Russia has to be answered as quickly as possible lest the flames of nationalism rise again.\n\nMikhail Borisovich Khodorkovsky is a man surrounded by controversy, but his ability to escape full political death is a talent we can appreciate. After the loss of his shares in the Siberian oil fields, it would be without a doubt that he'd have an axe to grind with his former opponents. With him taking the wheel for Russia, we can ensure a lasting peace between our two nations."
 nss.66.a: "The bear declawed."
 nss.67.t: "Reconstruction of China"
 nss.67.d: "Any nation that tries to ascend to an already occupied place will always find itself burned. China is another one of these nations waiting in line to try and fail.\n\nThe war against China was violent, and they fought with tooth and nail, but like any rabid animal that snarls and bites, its teeth will shatter.\nAfter a long campaign, the People's Liberation Army could feel the mounting pressure from the United States military, as it would seem that they were not built for facing the world police.\n\nIt would be inevitable that the PLA would turn against its own master, and with the subsequent coup that followed, the one man who reached out to us was Liu Yazhou, a man who never shied away from criticizing the Chinese Communist Party, and seeing the ever-growing pile of failures, he took the reasonable approach of seeking peace and reconciliation.\n\nWith peace achieved, reconstruction would follow as we assisted in the restructuring of the Chinese government and its resources.\nDefeating a national behemoth has not been an easy feat, but under the American Peace, it was to be expected."
 nss.67.a: "The dragon will not fly again."
 nss.68.t: "The Blood"
 nss.68.d: "The conference room at Langley was bathed in the cold glow of monitors. The connection was routed through a labyrinth of encrypted channels-Zurich to Singapore, then back through a series of shadow servers. On the other end was a clandestine session on the fringes of the World Economic Forum's annual gathering, where the architects of global capital conspired in secret.From the main screen, Klaus Schwab leaned forward, his expression one of paternal concern. After a brief greeting acknowledging all those present, he pivoted to the heart of the matter. Stability required more than military action; it demanded a predictable framework for the future.\n\n"The world's economy was built on the foundation of the United States," Schwab intoned smoothly. "That foundation is now fractured. Investors need to know... what is being built in its place?"\n\nDirector Burns considered the question for a moment. He knew the stability of the global economy depended on more than mere victory-the post-war vision had to be defined now. He had several proposals in mind, and needed to articulate the most viable one to the WEF's chairman.\n\n"We will rebuild America top-down, stronger and more resilient-led by those most qualified. The populist experiment ends permanently. A new model of rational governance, led by the best in academia, industry, and government, will replace it."\n\n"The Davos model, scaled to nation-state," Schwab responded. His tone carried a hint of approval, though there was a lingering doubt in his voice. "But to govern, one must first conquer. The Constitutionalist rebels still control vast territory."\n\nThe Director nodded. "We're strangling the Denver regime with economic pressure, which is already cracking their defenses. Additionally, we have plans to minimize disruption once the war ends."\n\nFink leaned forward. "A smooth power transition is crucial, both militarily and economically. When we emerge victorious, we must be able to hit the ground running. Our economic recovery plans will ensure America remains competitive globally, even at an initially reduced capacity."\n\n"Good. We are glad you recognize this." Schwab leaned back. "The 'populist cancer' is global, and the 'Great Reset' is our opportunity. If America leads by example, we can restore sanity. But this conflict needs a swift and decisive conclusion."\n\nDirector Burns nodded, "Rest assured, Herr Schwab, we are taking all necessary steps to ensure just that.""
 nss.68.a: "Order, Capital, Purity"
 nss.69.t: "The Situation Room"
 nss.69.d: "From a secure meeting room, the future of the war effort hung in the balance. On the main screen, a map of the fractured United States glowed ominously, colored in the shades of a nation fracturing at the seams. The hum of servers and encrypted communication lines were the only sounds breaking the silence as the roomful of military and intelligence officers relayed the latest updates from the front.\n\n"The President's condition is stable," National Security Advisor Jake Sullivan said, breaking the silence. His voice was strained, the stress of the current predicament evident by his tone. "Which is to say, he remains medically pacified. The official narrative that he is bravely directing the war effort from the White House, as always, holds true."\n\nJeffrey A. Kruse, head of the Defense Intelligence Agency, stabbed a finger at the map. "The narrative isn't the problem. The problem is here," he gestured toward Denver. "The Constitutionalists are making a serious play for the Eastern Seaboard. General Flynn, the traitor, has command of multiple Army and National Guard brigades, not to mention vast swathes of extremist militias. They intend to breach the current frontline."\n\nAnother voice cut in from a shadowy corner of the room. David Marlowe, Deputy Director of CIA for Operations, stepped forward. "Conventional thinking is what got us into this mess. While Milley's army fights a war of attrition, my assets can end this push decisively. Let me cut the head off the snake."\n\nLarry Fink, CEO of BlackRock and the de-facto WEF representative in the room, voiced his concerns. "Our priority is to minimize any further economic impact," he said. "Any covert operations must take this into consideration."\n\nKruse glared daggers at Fink. "The only thing at risk is the nation, Larry. Your portfolios are hardly the priority here." Fink's response was a scathing retort about 'national stability,' while Marlowe interjected with a remark on how 'national stability' was an oxymoron at this point.\n\nDirector Burns stood at the head of the table. The weight of a nation-or what's left of it-rested on his shoulders. The Cognoscenti, this council of necessity, looked to him. His decision may determine the fate of millions and the course of the war. The Director reviewed his options..."
 nss.69.a: "Authorize Kruse's plan."
 nss.69.b: "Proceed with Marlowe's plan."
 nss.69.c: "Fink is right."
 nss.70.t: "Through a Glass, Darkly"
 nss.70.d: "The command center beneath the Pentagon is awash with activity. Officers review reports, attaches move from desk to desk. General Milley, commander of the Joint Chiefs of Staff, has summoned Director Burns on an immediate matter.\n\nMilley's face is etched with fatigue and his words carry a tone of concern. The General gestured to the screen, a map illustrating the Constitutionalist frontline.\n\n"Director, we've located General Christopher G. Cavoli. NSA SIGINT, confirmed by a source in their command structure. He's the operational commander here-charismatic, brilliant, and crucially, the glue holding several Brigade Combat Teams and militia units together. His 'lead from the front' approach has made his name and placed him dangerously close to our frontlines. He's the single biggest threat on the western front."\n\nJake Sullivan, the National Security Advisor, chimed in, "Cavoli could become the next Patton, or Rommel. Taking him off the board would cripple regional command and control, potentially for months. It could be the turning point we need on the western front."\n\nDirector Burns studied the map, brow furrowing. "If Cavoli is as you say he is, then he must be dealt with."\n\nMilley continued, "However, his command center is protected by multiple layers of integrated air defense. A conventional airstrike is out of the question. We have two viable options for elimination-anything more elaborate would be your ballpark, Director."\n\nSullivan nodded. "There are some in Denver who are wary of his quick rise and see him as a political rival to General Flynn. We could play into these sentiments and instigate a purge. The downside, of course, is the unpredictability of these Constitutionalists-this all could backfire on us."\n\n"Or we could eliminate Cavoli with a bunker buster, fired from a B-52 at maximum standoff range, well beyond the SAM threat envelope," Milley countered. "The issue with that option is the possibility of a mass casualty event, as his command center is in close proximity to civilian housing."\n\nSullivan interjected, "Such optics would be... terrible, of course."\n\nThe Director considered his options, weighed the pros and cons of each. The fate of Cavoli was now his decision to make."
 nss.70.a: "Launch a tactical bunker-buster strike."
 nss.70.b: "Utilize the infiltrator."
 nss.70.c: "Sow paranoia."
 nss.71.t: "Ripples from the Rockies"
 nss.71.d: "The decision to forego a direct strike on General Cavoli in favor of a psychological operation was met with quiet contemplation by the Cognoscenti. There was no immediate, visceral victory, but the seeds of paranoia were sown. Under Burns' direction, the CIA's Information Warfare Division meticulously crafted a series of falsified communiques, encrypted messages, and financial records. These documents, designed to suggest General Cavoli was negotiating a separate peace with Washington in exchange for amnesty, were leaked through a compromised channel deep within the Denver government's network.\n\n"The initial chatter is promising," reported a communications analyst, pointing to a spike in encrypted traffic between Denver's internal security service and their high command. "They're chasing ghosts. Cavoli's allies in the brass are being scrutinized, and the General himself has been placed under house arrest, pending trial for treason. This may have an effect on their morale and command stability in the region."\n\n"It's not the decapitation we'd hoped for with a strike, but we've thrown a wrench in their machine," Deputy Director of CIA for Operations Marlowe agreed. "They're looking inward now, doubling down on tests of loyalty to Trump."\n\nGeneral Milley grunted, unconvinced. "Let's see if this 'wrench' can stop a tank column.""
 nss.71.a: "Operation is a success."
 nss.72.t: "Bunker Buster"
 nss.72.d: ""General, you are cleared for Operation LONESOME DOVE. Execute option Bravo," Burns stated, his voice calm and steady.\n\nGeneral Milley nodded grimly, speaking into his comms unit. "Skyfire Command, this is Olympus. Lonesome Dove is a go. I say again, Lonesome Dove is a go. Release the payload on designated target." He looked back at the holographic map. "A B-52 Stratofortress is already in a holding pattern over friendly territory. It'll be wheels up and heading west within the minute. Impact in approximately two hours."\n\nSullivan shifted his weight, his expression troubled. "Director, their propaganda networks will have a field day with this. They'll paint us as monsters, bombing our own country. It will galvanize their recruitment."\n\nAt this, Director Burns hardly flinched. "They already paint us as monsters," he replied, turning from the map. "Let them. This isn't a battle for hearts and minds, Jake. This is a war of extermination. Let the heartland hear the thunder of our resolve. Let their generals know that not even their bunkers are safe from our reach. The only language they understand is force, and I intend to speak to them in a dialect they can't help but heed."\n\nGeneral Milley leaned in. "I'll say one thing, Director: you have balls."\n\n"I'll make sure the State Department is on alert to mitigate any blowback," Marlowe said.\n\nThe Director nodded. "See that you do, Marlowe.""
 nss.72.a: "Operation is a success."
 nss.73.t: "Poison"
 nss.73.d: "Burns' decision was made with the cold calculus of a seasoned intelligence officer. The order was relayed through encrypted channels, passed from the command center beneath the Pentagon, through secure satellites, to a waiting agent embedded within General Cavoli's high command. There would be no explosions, no heroic martyrdoms, just a quiet, deniable termination. The potential for blowback was minimal, the rewards immense.\n\nInside the Langley operations room, the mood was tense. "The package has been delivered," you stated, the clinical euphemism hanging in the air. "Our asset confirmed Cavoli's personal chef has it in hand. We wait."\n\nHours later, a flash of an encrypted message lit up a screen in the darkened room: Operation successful. Cavoli eliminated. It was simple, to the point, and utterly devastating.\n\n"Well, Director, it would appear the 'quiet option' has yielded the loudest result," Deputy Director of CIA for Operations Marlowe murmured, a shadow of a smirk barely visible on his face. The Director, in response, merely nodded.\n\n"Begin preparing the counter-propaganda narrative. The more we can make this look like an inside job, the better," you stated.\n\n"Understood, Director," Marlowe acknowledged. He paused for a moment, considering. "With Cavoli gone, their command structure will be in disarray. We could push hard on the offensive here."\n\nBurns nodded. "I'll pass the word on to Kruse and Milley. Good work, Marlowe. This could change the tides in the west."\n\nMarlowe responded, "It's what we do, Director.""
 nss.73.a: "Operation is a success."
 nss.74.t: "Operational Failure"
 nss.74.d: "CIA/IC INTERNAL - EYES ONLY\nSUBJECT: Christopher G. Cavoli\nDATE: REDACTED\nCLASSIFICATION: TOP SECRET//NOFORN\n\nSubject has survived elimination attempt. Operational failure likely to galvanize the enemy. Potential leak within our network is being investigated.\n\nFailure is a teaching moment for all involved."
 nss.74.a: "-DB"
 nss.75.t: "The Grand Chessboard"
 nss.75.d: "The command center had been teeming since the war started. It was an Orderly chaos: dozens of people were always moving, but nobody was disrupted - attaches, orders, and transcripts went from desk to desk in seconds, but were never lost. Someone unprofessional would disrupt this flow, but none of them were. Separate from all of this, there was a lone office, an office where General Milley, commander of the Joint Chiefs of Staff was briefing Director Burns.\n\nThe general gestured to a screen displaying a map of the European frontlines - each nation a different shade of neon red, contrasted by the neon blue dotted across Europe, which represented American holdings. Director Burns maintained his icy glare, studying every detail of the chart before him.\n\nGeneral Milley's voice carried a sense of confidence, but his darkened eyes told a different story. "The Europeans have proven much tougher than we previously believed them to be, director. Simulations conducted by the RAND corporation show that simple brute force will eventually break the Europeans, but the losses - in manpower and arms - would be costly."\n\nBurns listened intently to each word, brows furrowed. "Have we identified any internal vulnerabilities?"\n"That's precisely why I requested this meeting, director. The Europeans are plagued with instability, divisions and infrastructure failures." Milley replied.\n\nMilley continued, "There are extreme divisions present between the German and French high commands - whether it be racial conflict, territorial revanchism, or any number of small disagreements. We could exacerbate these divisions, but it would be risky."\n"A cyberattack is also an option. Already, Cyber Command has identified key weaknesses within the cybersecurity of the Europeans. With continuous Cyberattacks, we could cut power grids, methods of communication, everything. But if we are not careful, the Europeans could catch on and fix the exploit before any real damage can be done"\n\n"Anything else is up to you, director." Milley finished.\n\nDirector Burns contemplated each option available. Each one had its pros and cons and risks, each one could be harmful to the war effort. But inaction is the greatest sin of all."
 nss.75.a: "Exploit their Divisions"
 nss.75.b: "Prepare a Massive Cyberattack on European Infrastructure."
 nss.75.c: "Fund Democratic Freedom Fighters"
 nss.76.t: "Gladio"
 nss.76.d: "The decision to funnel even more weapons and munitions into the hands of European dissidents was initially met with raised eyebrows and hypotheticals by the Cognoscenti. "If the people find out that the dissidents were being supported by us, it could be an optics nightmare," and "It might even fuel their cause." It's been a few weeks, and those voices have been silent. The seeds planted by Director Burns are already bearing fruit.\n\nThe National Security Advisor, Jake Sullivan, had called Director Burns to yet another briefing. He gestured to the screen in front of them; on it were several images of a city center of some sort. Shattered glass and chunks of brick littered the street. Bodies were strewn about, all covered by soot and dust. Doubtless, this was the end result of a terror attack, Burns thought.\n\nSullivan explained, his voice steady and firm, "At 9:00 CEST, in Leipzig, Germany, a bomb detonated in the busy city center, killing twenty-nine and injuring two hundred."\n"I believe that this is yet another attack committed by this new wave of European dissidents - ones that have received our funding. Over the past few days, authorities in Germany, France, and Italy have been scrambling to point the finger. Some place blame on new wave far-right extremism, others have placed blame on radical leftists for the recent terror."\n\nSullivan clicked through different images, each more bloody than the last. However, all of them shared a common denominator: they all occurred within the last few weeks, and all have wreaked havoc in the European regimes.\nBurns listened intently to each tragic detail, and studied each image. He didn't flitch once, he noted. The reports matched his projections. At that moment he knew he made the right decision."
 nss.76.a: "Operation is a success."
 nss.77.t: "Smokes and Mirrors"
 nss.77.d: "The CIA Information Warfare Division had outdone itself this time. Each pixel, each word of the document before Director Burns - the one that had just been 'leaked' to the German high command - was indistinguishable from the real thing. If Director Burns weren't such an observant man, he would hardly recognize it as a forgery.\n\nThese 'war-plans' for the French partition of German territory checked every box, crossed every line, and were everything the Germans had prayed against. If Berlin were to believe this leak, there is no telling how deeply the fractures could go in the European high command.\nGeneral Milley, Commander of the Joint Chiefs of Staff, shifted in his seat, murmuring to himself about all the possible ways that this operation could go sideways. Burns, however, remained still, waiting for the first signs of life to come from the communications channels.\n\nThe silence broke when a communications analyst beside him reported.  "I'm seeing some chatter here, sir."\nOver the next five minutes, the encrypted communications between German Internal Security and high command grew more and more frequent. The Germans were clearly enraged - steaming at the idea that the French believe themselves capable of dismantling the German state. Meetings would be prepared that would lead to endless arguments. Bridges between their French 'comrades' would be burned. All while the United States of America reaped the rewards.\n\nAs General Milley released a sigh of relief, Director Burns's face held a conceited smirk.\nNow was the time to observe."
 nss.77.a: "Operation is a success."
 nss.78.t: "Eclipse"
 nss.78.d: "The Cyberattacks against European infrastructure have been going on for six days now. The seventh would be their apotheosis.\nOn Sunday, it started small - some government website outages to test the waters. On Monday, it would only escalate; pipeline shutdowns, disrupted communications. But, the Europeans still didn't react. This continued until now, Saturday, the day that would make or break this operation.\n\nDeep within the walls of the NSA headquarters, Director Burns waited, brows furrowed as he stared unblinkingly at the colossal screen in front of him. Beside him sat Paul Nakasone, Director of the National Security Agency and U.S. Cyber Command.\n"What's the status of the Cyberattack?" Burns asked, his voice stern and unwavering.\nNakasone's voice carried a sense of confidence. He gestured toward the screen. "Everything went off without a hitch, Director. We should be seeing the results here any minute now."\n\nSoon, the room was buzzing. Officers were preparing, making calls, and typing on their keyboards.\nThen, it was displayed on the screen. Europe. Pitch black. Their power grids had been taken out in one fell swoop. The only signs of light were tiny white dots scattered across the continent like stars in a midnight sky. It was beautiful, almost. If Burns hadn't been used to this, he might have been moved.\n\n"Not only that" Nakasone added, "But their water utilities have been cut, too. And their communications."\n"It is possible that the Europeans expected an attack, but they would have never predicted something on this scale. Their war machine will suffer greatly from this." Nakasone finished, grinning confidently.\n\nBurns' shoulders relaxed, and he turned to look at Nakasone, "Understood. Good job, Director."\nHe turned back to the screen, studying each sign of life on the continent, preparing for the next move."
 nss.78.a: "Operation is a success."
 nss.79.t: "Operational Failure"
 nss.79.d: "CIA/IC INTERNAL - EYES ONLY\nSUBJECT: European Intelligence Operation\nDATE: XX/XX/XXXX\nCLASSIFICATION: TOP SECRET // NOFORN\n\nThe proposed intelligence operation against the regimes in Europe have failed. Operational failure likely to result in the enemy further unifying against our military operation.\n\nWe must understand what caused this failure to prevent it in the future."
 nss.79.a: "-DB"
 nss.80.t: "Homecoming"
 nss.80.d: "''I don't really believe that.''\n\nTwo American soldiers were keeping a lookout over a European town occupied by the enemy, a familiar flavor of tyrant that maintained its grip over the continent once again.\nThe forest they were camping in was covered in fog and the sounds of distant gunfire seemed disconnected from the natural world.\n\n''Why not? we bled here before, two world wars and not to mention our ancestors before. How many of our predecessors got their skulls split in two? how many scars do we carry from the ages. Doesn't this all just feel so, familiar?''\n\n''Like we've been here before?''\n\n''Exactly.''\n\nThe two soldiers kept talking under the cover of Europe's mist, they've been here before and so will their children. A continent bound in blood and fire that'll always meet its cycle of renewal. In a different world the European lands would be overrun by madmen, conquered by the Russians or annihilated by something we simply do not have a name for.\n\n''You know there is one thing I regret.''\n''What?''\n''Not shooting one of those boars we saw earlier while hiking through these woods and then eat em.''\nThe other soldier laughs, ''You're impossible.''\n''Hey i can't help it, its what we used to do.''\n\nThe night sky was quick to arrive, the stars in the sky were at its purest without artificial light."
 nss.80.a: "''Lets come back here again once this is all done.''"
 nss.81.t: "National Victory Celebration - Operation Orinoco Storm"
 nss.81.d: "With the shattered remnants of Venezuelan organized resistance now smoldering in the streets, the United States officially declared its victory over the Bolivarian Regime. The announcement came after high-ranking National Bolivarian Armed Forces personnel-those who hadn't been captured in midnight raids-formally surrendered, while leading PSUV cadres fled into exile. Across the nation, the administration mandated a week of celebrations and parades honoring those who had "liberated" the South American country.\n\nThe streets of Washington, D.C. were awash in red, white, and blue bunting as Operation Orinoco Storm's victorious units marched in lockstep down Pennsylvania Avenue. M1A2 Abrams tanks rumbled alongside HIMARS launchers, a brutal reminder of overwhelming American technological superiority. Overhead, F-22 Raptors and B-2 Spirits cut through the clouds in formation, shadowing crowds of adoring spectators who waved American flags with an almost religious fervor. It was a spectacle carefully choreographed to evoke memories of Desert Storm's triumph, but this victory had been won without media embeds or congressional oversight.\n\nFrom the Oval Office, the President-flanked by Joint Chiefs in dress uniforms with faces set in grim satisfaction-delivered a televised address to the nation, praising the "brave men and women of U.S. Southern Command" for "expeditiously dismantling the narco-terrorist regime threatening our Caribbean neighbors." The President omitted mention of civilian casualties, Caracas's shock-and-awe bombing, or the extrajudicial massacres perpetrated by the CIA's SAC.\n\nThe event also showcased American military strength amid rising tensions with China. Geopolitical experts and the national press regard the swift defeat of the Bolivarian Regime as a milestone in restoring a rules-based world order.\n\nThe Venezuelan interim government has pledged stability and cooperation with American and OAS partners to secure borders and eliminate remaining resistance. U.S. Army troops stationed nationwide assist local forces in maintaining peace and protecting vital infrastructure from insurgents.\n\nIn the coming weeks, a conference will be held in Washington to address the restructuring of the Venezuelan state and the transition to a fully democratic republic in line with guidelines set by international policy experts."
 nss.81.a: "Peace is our Profession."
 nss.82.t: "National Victory Celebration - Operation Tropic Thunder"
 nss.82.d: "The collapse of the Central American regime has spelled the death knell of the human tide of refugees and drugs into America. With remnants of the Central American military issuing a formal surrender to the U.S. Southern Command and the civilian government quietly fleeing, organized hostilities have come to an end across the board. A swift victory that has been lauded by all parties involved. In a showing of unity, Congress passed a bipartisan resolution commending the brave servicemen and women of U.S. Southern Command, as well as the leadership of the current administration. Weeklong celebrations of their achievements have been mandated across the nation.\n\nOn the streets of Washington, D.C., throngs of patriotic spectators wave flags and chant in unison, their faces lit up with zeal and patriotic fervor. Overhead, B-52 bombers cut across the azure sky in deafening flybys, trailed by the sleek arrow-head forms of F-35s. On the ground, a parade of Stryker APCs and Bradley fighting vehicles rumble in formation down the National Mall. American military hardware and personnel are showcased in all their might, while triumphant soldiers from U.S. Southern Command march in unison.\n\nWith this military triumph comes a renewed sense of optimism among the population, that stability will finally be brought to a region that had long been a perennial thorn in the side of American prosperity and security. The State Department has pledged support to interim civilian governments in Central America, while American troops will remain in-country for as long as it takes to secure the border and ensure peace. The days of the migrant and drug crises appear to be drawing to an end, a new chapter of progress dawning for a region so long plagued by corruption and violence.\n\nA provisional, overarching 'USSOUTHCOM Caretaker Authority' will preside over the transition to 'ordered governance,' with international financial experts guiding economic restructuring and reconstruction. The President has issued his congratulations to all parties involved, as well as to the brave soldiers who had put their lives on the line for the safety and prosperity the Americas."
 nss.82.a: "Peace is our Profession."
 nss.83.t: "National Victory Celebration - Operation Havana Vice"
 nss.83.d: "Following the collapse of the Cuban Revolutionary Armed Forces and the subsequent fall of the Communist regime, the Department of Defense has declared victory and a formal end to hostilities on the island. With a majority of the Cuban military leadership either captured or dead, and the government's senior leadership fleeing the country, organized resistance is effectively at an end. Congress passed a bipartisan resolution commending the military leadership of U.S. Southern Command, and celebrating their swift victory. For a week, mandated festivities took place nationwide.\n\nIn major cities like Miami, Washington D.C. and New York, the climate was jubilant as returning troops were greeted with fanfare and triumphant reception. On the National Mall, formations of AH-64 helicopters cut through the air, followed by V-22 Ospreys carrying U.S. Marines. Tanks, self-propelled howitzers, and the newest combat drones were showcased alongside the military hardware that had so thoroughly crushed the Communist forces. Amidst the patriotic revelry and the roar of military might, there is a pervasive feeling of vindication among the crowds.\n\nThe Cuban diaspora in Florida have praised the administration's swift victory as a long overdue justice served, while celebrations in Havana were held parallel to those in Washington. Already, requests for renewed flights to Cuba have swamped American airports, as Cubans abroad look to reconnect with loved ones on the island after a long and painful estrangement.\n\nThe island nation now stands ready to be integrated back into the global community. The interim civilian leadership that had filled in the void in the aftermath has pledged to hold free and fair elections, as well as cooperate fully with U.S. efforts to re-integrate Cuba into global trade networks.\n\nThe President and USSOUTHCOM have promised to work alongside the civilian transitional authorities in ensuring the safety of the Cuban people, while providing economic stimulus to help bring the nation into the 21st century."
 nss.83.a: "Peace is our Profession."
 nss.84.t: "National Victory Celebration - Operation Desert Sentinel"
 nss.84.d: "With the total fragmentation of the Iraqi military and the capture of the country's leading political and military figures, a formal end to the hostilities in Iraq has been declared. Congress, in a show of bipartisan unity, passed a resolution commending the U.S. Armed Forces' quick victory and honoring its fallen heroes. The Department of Defense mandated a weeklong celebration to mark this significant victory in the Middle East, recognizing the role of American power in bringing peace to Iraq.\n\nOnce again, the National Mall has become a showcase of military might, as American tanks, self-propelled howitzers, combat drones, and infantry formations march down Pennsylvania Avenue in a Roman-style triumph. These celebrations, mandated by the administration, have spread to every major American city, where crowds wave flags, chant patriotic slogans, and celebrate the return of their troops.\n\nThe President commended U.S. military leadership, emphasizing the administration's commitment to fostering a secure and stable Middle East, as well as ensuring that Iraq remains a crucial ally in the fight against global terror, while making no mention of alleged American war crimes.\n\nThink tanks and geopolitical experts have praised USCENTCOM's effective usage of novel technologies to minimize American military casualties, while also delivering a total defeat of the enemy. A decisive end to the conflict will, they claim, pave the way for the re-emergence of a peaceful, democratic Iraq.\n\nAlready, plans for the new interim government in Baghdad have been drawn up, with the assistance of policy professionals in Washington. The USCENTCOM military administration will work hand-in-glove with the new civilian authorities to ensure swift reconstruction and reentry into the international community."
 nss.84.a: "Peace is our Profession."
 nss.85.t: "American Troops Enter Ottawa"
 nss.85.d: "Following the Trudeau government's signing of the North American Security Agreement, American troops entered Canada in the thousands. Their mission: To assist Canadian security personnel and the Royal Canadian Mounted Police in maintaining order, as well as assisting in the apprehension and detainment of 'domestic extremists' and 'white nationalists' threatening Canadian stability.\nA brief joint parade was held in Ottawa to commemorate the agreement, American and Canadian troops alike marching in unison through the city streets, while CF-18 Hornets and F-16s flew overhead.\nCanadian security personnel, along with American forces, are also working in tandem to provide much needed disaster relief in the wake of a harsh winter that had severely disrupted day-to-day activities in a number of provinces.\n\nAmerican personnel have expressed their excitement in helping to maintain peace in their neighbor to the north, as have Canadian security officials, who welcome the extra hands on deck. Protests opposing the agreement were quickly put down, their ringleaders' bank accounts frozen, with the CSIS citing 'ties to white nationalist terrorism' and 'far-left militant organizations' as reasons.\nIn an exclusive joint press release with the Prime Minister of Canada, the President commended the agreement and pledged his support for Canada's continued stability and commitment to the rules-based international world order.\n\n"By signing this agreement, we are entering a new phase of the Canadian-American friendship, renewing our commitment to international peace, security, and prosperity," the President stated in a video address. "This historic step is only the beginning, as we look forward to deepening our bilateral cooperation and promoting our shared democratic values. Together, we will build a better, more secure future for both our nations.""
 nss.85.a: "Peace is our Profession."
 nss.86.t: "USSOUTHCOM Announces End of Hostilities in Haiti"
 nss.86.d: "The Department of Defense has declared an end to major hostilities in Haiti. The U.S. Armed Forces, deployed under the authorization of the United Nations' flag and working alongside peacekeepers and private military units, have seized all crucial government and military sites and successfully arrested leading figures in major criminal organizations. The operation has been described as 'systemic' in its elimination of criminal elements, while the administration has commended USSOUTHCOM's decisive victory in bringing peace to the Caribbean.\n\nAccording to a White House spokesperson, Haiti's interim government has pledged to hold free, fair and inclusive elections within a timeframe of two years. This commitment to democratic principles and the rule of law marks a significant turning point for a country that has long grappled with instability and strife. The international community, chiefly the United States, the UN, and the OAS, will provide technical and financial support to ensure the credibility of these electoral processes and the successful transition to civilian rule.\n\nAmerican presence in the country will remain for the foreseeable future, assisting in development, counterinsurgent operations, and general peacekeeping duties, in order to ensure that the peace in the country remains as such.\n\nThe President has commended the success of the operation, while making no comment on alleged atrocities perpetrated by American personnel in-country."
 nss.86.a: "Peace is our Profession."
 nss.87.t: "Itamaraty Signs U.S. Basing Agreement"
 nss.87.d: "In an unprecedented development, the Itamaraty has agreed to allow the deployment of U.S. Armed Forces in Brazil. The Brazilian foreign ministry cited increasing security challenges, including drug trafficking, transnational organized crime, and the threat of far-right extremist groups. The move is seen by many analysts as a strategic shift in Brazil's foreign policy and a significant victory for U.S. efforts to bolster its regional influence.\n\nThe U.S. deployment will include a substantial number of military personnel, as well as advanced surveillance and intelligence capabilities, with USSOUTHCOM emphasizing its commitment to respecting Brazilian sovereignty and working closely with Brazilian security forces.\n\nThe Brazilian government has assured the public that this agreement is part of a broader effort to enhance bilateral cooperation and regional security, and is not a reflection of any internal instability or weakness. President Meirelles himself has lauded the agreement as "a win for both countries and for regional peace," emphasizing that it would allow for more cooperation in tackling shared threats.\n\nCritics, however, argue that this agreement could undermine Brazil's long-standing tradition of strategic autonomy and independence. Opposition parties have condemned the Itamaraty's decision, claiming that it compromises national security and opens the door for U.S. intervention in Brazilian domestic affairs.\n\nIn Washington, the Department of Defense and the White House have welcomed the agreement, seeing it as a major step forward in solidifying the United States' position as the preeminent power in the Western Hemisphere, while making no mention of the CIA's role in propping up the new government."
 nss.87.a: "Peace is our Profession."
 nss.88.t: "Cracked Mask"
 nss.88.d: "The heroes of today are the monsters of tomorrow. After Judas accomplished his mission and the world looked at the United States with hateful eyes, this sentiment would prove itself every day.\n\nEach morally questionable act that we did behind the scenes was brought to light, each individual associated with them was identified by anti-social activists, and with a long list like that, there'd be a reckoning.\n\nWhen a palace is stormed by the masses, they work their way up. Ensuring every single floor is wiped clean, each servant is slaughtered until they reach the nobility, and finally, the king.\nReports of government officials getting assassinated or just killed in broad daylight become daily highlights, but the majority are still clouded by the overload of entertainment.\nNo matter the number of eyes, the blood coughed up by the men and women in suits remains a fact.\n\nSeveral state governments have already publicly denounced us, and while we were quick to clean out most of them, some have proven to be more difficult to exert Order over.\n\nThe finale has ended, and now we're the ones to clean up the stage."
 nss.88.a: "And yet, we endure."
 nss.89.t: "Reclamation of Peace"
 nss.89.d: "For the second time within a decade, our citizens raised arms against each other.\n\nFor the second time, the cities of our nation lie in ruins.\n\nThe insurrection left another scar on the United States. With the masquerade nearly shattered, the people will never look at the government the same way they did. But for now, a terminal crisis has been averted.\n\nOfficial statements from the president and other public servants, amplified by the media machine are working non-stop to restore the image of safety and transparency. The narrative is in our hands once again, and it's perfectly clear: a traitor deep within the midst of the government tried to undermine our Democracy and freedom. All the deaths and destruction were caused by him, and him alone, all just to achieve his egoistic, treasonous goals.\n\nNonetheless, it was all in vain. The United States of America won't be taken down so easily. The government is working again to ensure the security and prosperity of our citizens."
 nss.89.a: "A lesson learned the hard way."
 nss.90.t: "Texas Secedes"
 nss.90.d: "Troubling news from Texas as reports of the current governor having openly declared that the state of Texas has seceded from the union. With the ongoing broken masquerade, more and more rats are escaping the sinking ship.\n\nAfter the governor initiated martial law across the state, many members of the national guard present in the state were quick to defect as they conducted arrests of federal loyalists.\nReasons such as ''betraying the American people, tainting American history'' were one the many reasons that were used as justification for this act of treason.\n\nWith the ongoing chaos in Texas as smaller anti-social groups attempt to regain relevance through senseless violence, skirmishes on the border are reported as well, and the Texas National Guard intends to apply pressure on neighbouring states to encourage them to leave the union as well.\n\nThe United States is in turmoil once again."
 nss.90.a: "No mercy for traitors."
 nss.91.t: "California Turns to Treason"
 nss.91.d: "With the reputation of the United States of America down the gutter, it would be without a doubt that the more wealthy states would attempt to secede from the Union in hopes of starting a clean slate, California being one of them.\n\nThe California National Guard was quick to overthrow the governor and arrest any federal official loyal to us. Riots soon followed, and any smaller anti-social group present within the state is doing all it can to destabilize the region even further.\n\nDue to our already precarious situation, we initially tried to reach out to them under the open hand of diplomacy, but after the governor was executed on live television, it would seem that the State of California is seeking a fight they cannot win.\n\nA successful secession would prove disastrous to us, as not only would this open the way to foreign influence, but it would also be the start of the slow death of the United States of America as we know it, potentially forever.\n\nPast pacification operations in the region have proven that fighting in the area is quite a burdensome task, but it is one that has to be done again to maintain unity across the nation."
 nss.91.a: "Bomb their cities."
 nss.92.t: "Insurrection in the North-West"
 nss.92.d: "Cascadian independence has always been a significant topic for the intelligence community. Our efforts to clamp down on Cascadian insurgents have been continuous. Despite the elimination of old groups associated with the initial independence movement, such as the Pinetree Party and the anarchists, the issue remains. The yearning for secession would remain alongside insurgent activity.\n\nToday marks the escalation of their activities. After the masquerade was broken, the Cascadians managed to grow in ranks, among many of them being former members of the military and law enforcement. Communications with anti-insurgent operations were quick to fall apart after reports of surgical attacks on outposts and patrols.\n\nThe current Cascadian provisional government is a far cry from the violent tendencies the previous one had, but with the added experiences and the opening up of supply caches left behind by The Base, the pacification of the region is bound to be just as bloody.\n\nThe clock is ticking; the region has to burn for Order to be restored."
 nss.92.a: "No more trees, no more chaos."
 nss.93.t: "American Dusk"
 nss.93.d: "Today marked the point of no return for the world.\n\n"We, the people" of the former United States of America are shell shocked and horrified. The name of the United States itself is now synonymous with the Deep State and the horrors of the Second American Civil War and the events that followed. With the Cognoscenti, the old America died as well, and its successor states have no choice but to move on.\n\nThe new state, the American Federal Republic, is administered through the New Articles of Confederation, a treaty between the Washington DC government, the state governments and secessionist states, which drastically curtailed the reach of Washington and limited federal authority to specific domains: mutual defence, interstate commerce and coordination of foreign relations.\n\nExtreme decentralisation of every aspect of government, including the military and the intelligence community establishes a system under which The Cognoscenti couldn't be possible again. Some states expressed desire to be even less connected to the centre and became autonomous states, practically looking forward to the experience of Texas and California, who became entirely independent countries.\n\nThe New Articles of Confederation, signed in Honolulu, establish a stable, yet dysfunctional and stagnating system. Some see it as a solution to a constant spree of internal conflict which the country has entered, others see it as a half-measure to fully dividing the country, or even as a stepping stone towards an even more violent and abusive regime. But for now it doesn't matter.\n\nFor the first time in centuries, America is looking forward to peace."
 nss.93.a: "In God we've no trust."
 nss.94.t: "Faceless Justice"
 nss.94.d: ""I have some idea," Maddox said. He was not shackled or restrained in any way, but there was nowhere for him to run, and the whole tribunal was surrounded by armed guards. They could have been U.S. Army or CIA; there was no real difference anymore, not to him. "I was placed under arrest after an offhanded comment to a colleague."\n\n"And do you deny making that comment?" the prosecutor asked. The panel of judges behind their masks and raised platform stared down at him with emotionless eyes. This, too, was insulting. They sat above him as though he were not one of them.\n\n"No, sir," he replied, clenching his jaw. "But I was merely making a joke."\n\n"Jokes are a reflection of what a man really thinks," the judge in the center replied. "And we can see through you, Colonel. Your insincerity and disloyalty are clear to us all."\n\n"My loyalties are to the U.S. Constitution," Maddox said firmly, knowing it would be his final opportunity to defend himself. "I swore an oath, and have always upheld it, but the things that are being done now..."\n\n"Have always been done," one of the judges finished for him. "You were merely ignorant of them until recently."\n\nMaddox blinked, the words hitting him like a punch in the gut. He couldn't think of a response."
 nss.94.a: "He knew he couldn't refute it."
 nss.95.t: "The Masquerade"
 nss.95.d: "To the outside world, we do not exist, between the commercials and the football games we watch. Safeguarding our nation against the flames of chaos.\n\nThrough careful planning and acting, we have built up a system within a system.\nA system not seen by the common eye, hidden between Supreme Court cases and media circuses. It does not matter how much strain there is on the officials; it does not matter how much the conspiracy theorists try to shine a light on us. Our work continues.\nThe world keeps on spinning.\n\nLike any ecology, the masquerade is carefully constructed around our citizens so that their day-to-day life may continue without them knowing about our control. What we do is the right thing, but often the right thing may be seen as unpopular.\nSometimes, they shouldn't know.\n\nHowever, its own fair share of predators may arise, attempting to disrupt the masquerade by letting the sun of truth shine on the men and women hard at work behind the veil.\nTerrorist groups, anti-social individuals, and traitors who have fallen into the trap of ethical panic. All have the potential to destroy what we have worked on for so long.\n\nLike a gardener, we have to maintain the masquerade and exterminate the weeds that'd try to strangle us."
 nss.95.a: "Keep the masks on."
 nss.96.t: "Elections in Brazil"
 nss.96.d: "In the aftermath of a military coup in Brazil, the election under a strict military supervision led to the overwhelming victory of Henrique Meirelles, a pro-American technocratic candidate.\n\nThis development is expected to ensure a prolonged military and economic cooperation between the United States and Brazil.\n\nHowever, we should look out for the potentially dangerous social and economic consequences of the coup in the country, as left-wing and right-wing extremist organizations are trying to destabilize the new regime.\n\nRegardless of that, the new government has already pledged extended cooperation with the United States, starting with a military alliance."
 nss.96.a: "Here's to our friendship!"
 nss.97.t: "ME of ENship"
 nss.97.d: "CIA/IC INTERNAL - EYES ONLY\nSUBJECT: Incident at the Ziggurat of Enlil\nDATE: REDACTED\nCLASSIFICATION: TOP SECRET//NOFORN\nAn SAC kill-team dispatched to clear a recently-unearthed Sumerian ziggurat in the Euphrates valley of suspected insurgent activity experienced an unexpected phenomenon during the mission.\n\nThe kill-team engaged a small band of insurgents in the ruins of the old temple, resulting in an exchange of gunfire that was expected to result in total elimination of the insurgent cell. However, during the firefight, one of the soldiers accidentally struck a stone tablet adorning the temple wall. As a result, the entire cell immediately ceased fighting and assumed positions of supplication and reverence, directed at one of our operatives who was subsequently designated 'Delta-Eight'.\n\nThe team subsequently detained the surviving cell for interrogation, with one member stating they "could not bring themselves to strike her in fear of the consequences, for it is death to lay hands on a Priestess." The 'Priestess', in this case, being Delta-Eight. Delta-Eight has demonstrated no observable change in behavior or physical condition, but her teammates now defer to her, and the detainees refuse to eat or sleep until they are 'released to her care.'\n\nPreliminary examination of the tablet suggests it was inscribed with a long passage in an archaic form of cuneiform. A nearby inscription reads, 'NAM-EN' ('ME' of EN-ship, the sign of the Priest).\n\nThe Director is highly interested in these findings, and has ordered the establishment of a secure black facility for the further investigation and containment of this incident."
 nss.97.a: "All hands on deck. -DB"
 nss.98.t: "Cycles"
 nss.98.d: "Nothing is forever, forests wither and grow, mountains collapse and rise, empires live and die.\n\nWhere gods are born, reality is made into five seasons.\nFive cycles.\nLife is the main purpose to everything, but eventually it gets devoured. Even in annihilation, new life springs forth and the ones that reach out to the sun are born.\n\nThose with stretched out arms were taught to keep the balance, but their nature caused them to succumb to sin.\nTheir punishment made them grow feral, wild beasts with teeth and claws.\nLet the wind blow their sins away.\nThe sun became the new creator, and life was born again.\n\nWater became light. Its love taken away by the jaws of oblivion, grief led to endless realms of sand and drought.\nGrief is the path towards wrath, and the water from the heavens became fire.\nLight never-ending.\n\nLight became life again.\nA new parent, its love was deemed insincere.\nAn accusation that'd lead to blood flooding the lands, turning life into new life that could live under the blood of grief.\n\nAn empire of blood and bones, an end to life with a hunger that will last.\nLife has to give up life, so that life can live again.\nIf the hunger remains, the light will go dark.\nThe earth will crumble, and the end shall come."
 nss.98.a: "Life into life."
 nss.99.t: "Creator"
 nss.99.d: "He came from the vast oceans of nothing.\nLike any mortal, a fire was burning within him.\nA desire to create, a desire to destroy.\n\nHis hands were filled with clay, He molded a world and then another.\nHe continued until he was sated, a universe in His own design.\nLife grew, people grew, language was born and tribes bloomed like flowers.\n\nThey had the same fire, they created and they destroyed.\nHis lessons, His way.\nUntil they stopped listening, and all they could do was destroy.\nWrath was soon to follow, as He brought forth a wave of nothing.\nWashing it all away.\n\nThen there were oceans of nothing\nHe emerged from it.\nHis hands filled with clay.\nAnother world molded.\n\nHe will do this, until He is done."
 nss.99.a: "Teacher of the world."
 nss.100.t: "God's Teeth"
 nss.100.d: "The flock that misbehaves will receive punishment.\nIgnoring the lessons taught, loathing its creators.\nThey grow fat on what they eat, they murder kin and they sit on heaps of wealth thanking no one but themselves.\n\nPunishment comes.\nSharp teeth, the wrath of the beast.\nDevouring tribe after tribe, the heavens poured down, drowning them in bloodlust.\nThe beast was hungry, so hungry, it consumed and it did not stop.\n\nSoon the world would be silent.\nAnd no lessons would be learnt.\nBut the Sun shined through the red mist, and it taught the living flock how to tame the beast.\n\nFill the rivers with red spirits, meant to soothe the mind and numb the body.\nLike the flock that grew fat, it kept drinking, it kept consuming till it fell into a deep slumber.\nThus the slaughter ended.\n\nFrom the destruction it caused, life bloomed again."
 nss.100.a: "Blooming, till it wakes again."
 nss.101.t: "Before It All Began"
 nss.101.d: "There was an empire, filled with towers and palaces.\nWhere a wise king ruled.\nSurrounded by wise men, he was told of a world before him.\n\nA great disaster was coming.\n\nThe ones that came before the king schemed and planned.\nA way to begin again, bringing forth absolute nothing.\nAll of them, creators and painters of all living things, swore to secrecy.\nYet one of them faltered and whispered its secret to the mortals.\n\nMortal minds came together.\nBuilding a way to endure the great disaster.\nAll living beings were to be saved.\n\nThe weather was filled with malice.\nThe lands were lit up with thunder, a roar that erased recognition.\nThey could not see one another, they did not recognize their faces.\n\nIt was so mad, it was so great, the destruction even frightened the gods.\nThe destruction ended, the world was empty.\nBut life endured.\nAnd it kept going."
 nss.101.a: "A reminder of our resilience."
 nss.102.t: "The World is Yours"
 nss.102.d: "Every alliance forged behind closed doors, every moral compromise in the name of the greater good, every policy designed to save lives-all of it had been in vain. Time after time, the Director watched these events play on repeat, a dimming image on the silver screen. There was nothing he could do to change any of it, not now.\n\nThe people were too ignorant and self-interested to be trusted with the reins of power, so they needed to be guided toward a brighter future, the Director had assured himself countless times. The administration was too corrupt and shortsighted, but it was still better than what would inevitably replace it if they failed, and so he had to prop it up. The institutions he oversaw were necessary for national security, even as their methods became increasingly amoral. He could not afford to let morality guide him, not when so much rested on his choices.\n\nSo many years of work dedicated to the nation, and he still needed more time.\n\nIt wasn't about the money. It never had been. It was about taming the innate restlessness and cruelty of human nature, of harnessing it for the good of the country. In this line of work, there were no good people. Everyone had their hands dirty, especially him. He looked down at his palms. Even now, he could still feel it, all the blood on his hands. And he would be willing to shed so much more. If only he had more time...\n\nTime.\n\nHe glanced down at his wristwatch. The clock's hands spun with a blur.\n\nThere, before him, lay the wreckage. Twisted metal and burning fuel filled the clearing, the air acrid and heavy. This was the site of their final mission, the only remaining hope of salvation, lying in a ruined heap in the middle of a clearing.\n\nIf only he'd had more time. Time to evacuate the capital, time to coordinate with the forces of Order, still willing and able to put down the traitors and unruly masses. Time to find a way out. There, among the bodies, the Director saw a familiar form. The body was burnt, charred beyond recognition, but it was still him."
 nss.102.a: "Perhaps, this is Hell."
 nss.103.t: "The Priestess"
 nss.103.d: "The individual designated Delta-8, SPC. Anna Webster, CIA-SAC demolitions specialist, continues to exhibit the anomalous properties first observed during the Ziggurat of Enlil incident. The subject is currently held at a secure facility in the Rub' al Khali desert.\n\nPhysical and psychological evaluation of Subject Delta-8 shows no significant deviation from baseline parameters. However, behavioral analysis reveals a profound shift in her interactions. Former squadmates now display pronounced deference to Delta-8, referring to her as "Ma'am" or "Priestess" even informally. Questioned, these individuals report an instinctual compulsion to obey her commands, describing it as a "deep knowing" that her words carry absolute authority.\n\nCaptured Iraqi insurgents confirm Delta-8's influence, calling her "EN" (Sumerian for lord/priest). They report hearing a single "ancient" and "holy" word during the raid that bypassed conscious thought, imprinting directly on their minds and compelling total submission.\n\nThe tablet analysis confirms the word represents the Sumerian 'ME' of EN-ship. Agency linguists theorize the 'ME' is not conventional speech but a psycholinguistic catalyst that hacks the brain's innate language faculty, overriding rational thought and obedience mechanisms.\n\nImplications are staggering. If one 'ME' can grant absolute authority, what could others do? Kingship, victory, death? 'Project Babel'-established on Director Burns' orders-seeks to decipher remaining 'ME' and develop controlled deployment, with unlimited resources. Delta-8 remains in custody, every statement and move documented. To the linguists of the Agency, she is the key to unlocking a puzzle the size of which may exceed the sum of human knowledge."
 nss.103.a: "The race is on."
 nss.104.t: "Reevaluating the 'Flood Tablets'"
 nss.104.d: "During U.S. deployments, cryptic 'Flood Tablets' recovered from sealed tombs and dig sites contain archaic forms of known languages defying conventional linguistic history. Initially dismissed as folklore, these texts were reevaluated after the Ziggurat of Enlil incident in light of Project Babel. These various 'Floods' are now interpreted metaphorically as a neurolinguistic contagion that decimated ancient civilizations, with the tablets serving as historical accounts rather than literal descriptions.\n\nA tablet from near Teotihuacan describes a 'great silence' where words 'turned to ash in their mouths.' Andean khipu tell of a 'sky serpent' that 'unwove the threads of song,' leaving people unable to recall their own names. Project Babel's linguists are now cross-referencing these accounts, with NERO processing the translations at an unprecedented rate. The patterns are undeniable: disparate cultures across the globe, separated by oceans and millennia, all describing the same catastrophic event-a plague of the mind that targeted language itself.\n\nThe 'Flood Tablets' hint at a 'counter-pattern.' Mesoamerican texts mention a 'Feathered Serpent' who 're-taught men to speak'; Andean khipu refer to a 'Bearded Man'-likely Viracocha, divine builder of Tiwanaku-who 'pierced the silence.' These seemingly isolated myths form a unified picture. Project Babel's dual objective: weaponize the 'Flood' pattern and find fragments of the 'counter-pattern' to protect the Cognoscenti from its effects."
 nss.104.a: "All power rests with he who has the last word."
 nss.105.t: "Nam-Shub of Enki"
 nss.105.d: "Fragmentary references to the 'Nam-Shub of Enki' appear across recovered materials. In Sumerian myth, Enki, god of wisdom and keeper of 'ME', crafted a divine incantation that 'loosed the tongues' of humankind. Within Project Babel, the 'Nam-Shub' is framed as the 'counter-pattern,' the vaccine.\n\nAll recoveries thus far have been fragmentary, or of a diluted potential. However, a potential lead emerges: Texts describing 'Utnapishtim's ark' resting on Mount Nimush, carrying 'the Word of all that was.' The location of Nimush has been a point of contention for decades; some scholars identify it with Mount Ararat, while others place it further south. However, the Cognoscenti's cultural cartographers, working with NERO's topographical analysis, now believe it to be none other than Mount Ararat.\n\nAlready, the Agency is debating a scientific expedition, the importance of which could not be understated. An official expedition is impossible due to the sensitivity of the site and the risk of international attention. The only viable course of action: a clandestine SAC operation with accompanying civilian linguists and archaeologists, disguised as a geological survey to minimize suspicion.\n\nThe mission: retrieve the most complete fragments of the 'Nam-Shub of Enki'. The stakes are simple yet grand: a chance at absolute control over the architecture of human consciousness."
 nss.105.a: "The search is on."
 nss.106.t: "Mount Ararat Expedition"
 nss.106.d: "CIA/IC INTERNAL - BRIEFING SUMMARY\nSUBJECT: Operation GILGAMESH\nOBJECTIVE: Locate, secure, and extract potential artifacts related to the 'Nam-Shub of Enki' from a target zone on Mount Ararat's northeastern face.\nCLASSIFICATION: TOP SECRET//NOFORN\n\nExpedition was dispatched to a pre-identified anomalous structure on Mount Ararat, theorized to be the geological remains of Utnapishtim's 'Ark'. The structure, recently revealed due to glacial retreat, is located at approximately 14,000 feet elevation.\n\nEntry revealed an interior of pitch-black obsidian, confirming the 'Ark' as a vault designed to withstand catastrophe. Inside, a central chamber held twelve sarcophagi in circular formation. Ten contained well-preserved human remains with tablets and artifacts consistent with high-status Sumerian burial practices, their preservation indicating the vault's protection from time.\n\nTwo sarcophagi, identified as Utnapishtim's and his wife's, held no remains but contained the Nam-Shub of Enki. The tablets were made of an unknown magnetic material, with inscriptions appearing to float within their surfaces rather than being carved. Linguists determined the tablets formed a coherent text, unlike any previous cuneiform discovery, suggesting a sophisticated linguistic system potentially predating known Sumerian writings-the theorized 'Sumerian ur-language.' This discovery elevated the operation's priority, prompting the Director to authorize immediate extraction and enhanced containment protocols.\n\nAnalysis by NERO confirmed the tablets held Project Babel's goal: a counter-pattern to the neurolinguistic plague. The 'Nam-Shub of Enki' acts as a linguistic restoration algorithm, reversing cognitive incoherence from ME fragments by interfacing directly with the biolinguistic substrate rather than semantics. This recovery accelerates the Project's timeline for weaponization and countermeasures. The Director has convened an emergency Cognoscenti leadership session to discuss integration protocols."
 nss.106.a: "Operation is deemed a total success."
 nss.107.t: "Hummingbird of the South"
 nss.107.d: "Under the codename 'Operation Tezcatlipoca,' SAC teams established covert archaeological sites across Mexico using UNESCO preservation as cover. Pentagon and CIA linguists led the operation, searching pre-Columbian codices for glyph patterns matching the neurolinguistic properties of Mesopotamian 'ME.'\n\nBeneath Mexico City's catacombs, a SAC team found a sealed chamber below Tenochtitlan's Templo Mayor containing fig-bark codices with vibrant glyphs defying translation. NERO identified sign-patterns encoding cognitive concepts, confirming the Mexica understood language's building blocks like the Sumerians, operating identically to the ME despite oceanic separation. The codices themselves imbued contagious reverence to the Mexica God of War, the Left-Handed Hummingbird of the South, Huitzilopochtli. Dubbed the 'Xiuhcoatl,' it embodies abstract concepts: righteous fury, divine war, mass sacrifice, and cosmic order-the foundations of their pantheon.\n\nTwo Nahuatl linguists experienced immediate cognitive collapse after exposure to the codices. Their speech devolved into apocalyptic warnings about the Fifth Sun's extinction and the approaching Tzitzimimeh star-demons. Compulsively self-mutilating with excavation tools, they chanted about bloodletting to restore cosmic balance. Behavior mirrors neurolinguistic contagion effects, confirming the ME's weaponization potential. Both were sedated and secured in medical containment, and neurological scans show accelerated synaptic remodeling consistent with Project Babel's theoretical framework. We now understand why the Mexica so vehemently embraced mass human sacrifice: they were not merely appeasing their patron god, but obeying a fundamental command embedded in the neurolinguistic architecture of the Nahuatl tongue itself. The implications are staggering. If this 'ME' could be weaponized, it could do anything from inspiring soldiers with unmatched ferocity to compelling entire populations to embrace apocalyptic ritual violence."
 nss.107.a: ""For six months of the year the huitzitzilin is dead, and for six it is alive.""
 nss.108.t: "Kofun"
 nss.108.d: "Under the cover of "structural stability surveys" by American academic institutions, SAC teams established excavations across Japan's key kofun burial mounds. The public justification-post-earthquake integrity assessment-masked their true objective: recovering artifacts inscribed with 'ME' sign-patterns. Under Agency supervision, Japanese archaeologists targeted sites tied to the Yamato dynasty's mythic origins.\n\nIn Osaka's Mozu-Furuichi kofun cluster, an excavation targeting Emperor Nintoku's tomb unearthed a bronze mirror, a yata no kagami, predating Shinto. Its reverse bore pre-hiragana script that defied identification. NERO matched its sign-patterns to the Sumerian ME of Kingship, an artifact that imposed contagious authority, compelling viewers to recognize a predetermined sovereign. An unshielded Agency operative observing the mirror exhibited immediate behavioral shifts, addressing Director Burns as "Tenno" and insisting on divine mandate to "restore Order." The operative was sedated for medical observation.\n\nResearch into Onmyodo and Shugendo traditions revealed esoteric kotodama teachings, preserved in mountain shrines, describing how specific sounds manipulate reality through kototama (word-soul) as an active force rather than mere belief-confirming Project Babel's thesis that language is a programmable interface for consciousness.\n\nAn image is emerging regarding the ME, one that transcends geographical and cultural boundaries, of a 'programming language of human consciousness' used by the ruling and priestly castes of ancient peoples worldwide to lay the groundwork for civilization itself, to bring Order to Chaos."
 nss.108.a: "No Fear, No Pain"
 nss.109.t: "Lost Pyramid of Thoth"
 nss.109.d: "Agency operatives secured exclusive excavation rights to a dig site near the Bahariya Oasis, establishing it as a military-restricted zone. Ground-penetrating radar revealed a pyramid, with only its pristine golden capstone exposed by shifting sands, towering at 484 feet-surpassing the Great Pyramid of Giza. Entry was complicated by cognitive hazards, as two operatives experienced aphasia upon exposure to tainted symbols at the threshold, while another fell catatonic. Neurological scans revealed fractal temporal lobe lesions matching memetic infection patterns. These neurolinguistic failsafes had guarded the tomb for millennia, breaking grave robbers' minds and leaving them listless in the desert.\n\nWithin the pyramid lay a library of ancient papyrus scrolls predating known dynasties, their hieroglyphs functioning computationally rather than phonetically. NERO confirmed these patterns matched the 'ME,' proving ancient Egyptians possessed knowledge of language's fundamental building blocks, akin to the Mesopotamians. Despite the DARPA supercomputer's efforts, the scrolls resisted deciphering, requiring further exploration of the complex.\n\nAt the lowest chamber lay a sarcophagus dedicated to 'He who accomplishes Righteousness and Truth' and 'He who is like the Ibis,' known epithets of Djehuty, the Egyptian god of wisdom, writing, and knowledge, who the Greeks would later call Thoth. Inside the sarcophagus, a tablet bearing an equation was discovered, which a mathematician was tasked with solving. It gave him the ability to comprehend the library, but the solution shattered his mind, inducing psychosis. Now believing himself Thoth's mortal vessel, tasked with 'guiding the Sun Boat' to maintain 'Order (Ma'at)' against 'Chaos,' he speaks as though he were the god. His broken mind holds the key to unlocking the library's contents, to which he has been transferred to a secure facility for continued research."
 nss.109.a: "Vessel of the Thrice-Great"
 nss.110.t: "The Final Push"
 nss.110.d: "Reality is something that can be measured. If you made a singular individual absorb all the knowledge in the known world, they would end up gouging their own eyes out, for they would have seen too much. Long before we defeated fascism and communism, we covered this world in a veil of normalcy, a status quo that'd ensure global peace.\n\nA grand project made long before we were born, through the studies conducted by our think tanks, we came to the understanding that every civilization undergoes a grand transformation into either a fragmented mirror or a permanent palace meant to withstand annihilation itself. So far, none of them has achieved the latter.\n\nWe've come to understand that one of the primary reasons for this is that each civilization inevitably clashes with another civilization that seeks the same goal.\nRussia and China seek their own palace, and although we carry no spite to these nations and their people, we understand that if we were to truly survive this age of change, we have to win.\n\nLanguage shapes reality, and words push people to bring forth greatness.\nOr destruction.\n\nDeep in the veins of the world lie the remains of the civilizations that attempted the same clash. We can learn from their failures, and we can learn how to weaponize language itself.\n\nThe age of change is nearing its end, and when we inevitably clash with these other civilizations, we will lift the veil for just a little bit, and they shall devour themselves.\n\nWe can be moral, or we can win."
 nss.110.a: "A palace, shining."
 nss.111.t: "Dear Director"
 nss.111.d: "\From: Larry Fink\nSent: X/X/20XX 5:15:32 PM\nTo: William J. Burns\nSubject: Dear Director\n\nPeace is finally within reach. This system, which we have built for the greater good, has at last allowed us to bring stability to the world. They will not thank us, nor will they understand the importance of what we do, but we have saved them from a lifetime of war and demagoguery. We have given them a life without strife or want, and asked for nothing in return.\n\nIt was not a swift journey, and there was a tremendous amount of pain along the way. I'm certain you remember all that you did to ensure this came about. It was not the kind of sacrifice you can wear upon your uniform. There were no accolades for you, and there was no praise to be sung for the tough choices you made. I have always known you understood this, even when you could not speak of it aloud.\n\nYou are a man who knows that what is right and what is good are rarely the same thing, but I believe, with this new world, we may come close to a point where they are synonymous once again. I am proud to have worked alongside you for so long, and prouder still to call you my friend. In the years to come, the world will need good men like you. But for tonight, you must celebrate, and rest. The world can do without people like us for just one day, I think. Enjoy it with your loved ones, because soon, we will need you again, my friend.\n\nWhen the sun rises tomorrow, there will be more work to be done. There always is. What we have built can only survive so long as it is maintained, and the burden of maintenance is not an easy one to bear."
 nss.111.a: "The best is yet to come."
 nss.112.t: "Eclipse"
 nss.112.d: "565:39:20 HOUSTON: "Apollo-20, Mission Control. How copy?"\n565:39:30 DIAMOND: "Read you loud and clear, Houston."\n565:39:35 HOUSTON: "Give us a status report, Diamond."\n565:39:40 DIAMOND: "All systems nominal, ETA to POD T-Minus 15 minutes."\n565:39:57 HOUSTON: "Continue as planned, next comm after FOX is in place."\n565:40:20 DIAMOND: "Roger that. Diamond out."\n\n(Long Comm Break)\n\n565:59:26 DIAMOND: "Houston, Apollo-20, FOX is ready."\n565:59:46 HOUSTON: "Good job, Diamond. We have some good news. The wall is up."\n566:01:10 DIAMOND: "Houston, can you repeat that?"\n566:01:17 HOUSTON: "I repeat, the wall is up. Code phrase: Trial."\n566:01:32 DIAMOND: "Roger that."\n\n(Comm Break)\n\n566:04:10 DIAMOND: "Houston, Apollo-20."\n566:04:18 HOUSTON: "Apollo-20, is there a situation?"\n566:04:30 DIAMOND: "Houston... we'll be coming home, right?"\n566:04:45 HOUSTON: "In a good time, Diamond. Have no doubts about it.""
 nss.112.a: "Houston out."
 nss.113.t: "Fate of Capital"
 nss.113.d: "''From Europe?''\n''Correct, our friends across the Atlantic figured I'd be useful.''\n''Can't be any worse than here.''\n\nLarry Fink smirked at the regard from his security detail. Normally, he'd make sure he'd be blacklisted from the business, but after escaping certain death multiple times, some leniency would be wise.\n\nOrder was struggling, and Purity kept up its veil, but the flames of chaos would torch it all down.\nNo, it would be better to cut one's losses and retreat.\n\nBoth he and his bodyguard managed to reach the coast as they could hear the distant sounds of riots and gunfire. The national guard was quick to arrive in order to suppress any form of anti-social activity in the cities, but of course, stragglers would remain.\n\nWhere did we fail, Larry thought.\nIt certainly wasn't his fault; the agenda was quite clear, and it was guaranteed to work, but then again, the American element could have been too unpredictable.\nIt is working in Europe, and the lessons he learnt here he could apply there.\n\n''Ah, there they are and-'' The guard groaned.\nThey both saw a rib boat arrive under the cover of he night as three armed men gently waved at them.\n''What? What's wrong?''"
 nss.113.a: "''They're Italians.''"
 nss.114.t: "Fate of Capital"
 nss.114.d: "Larry Fink could see the writing on the wall as the first nuclear missiles hit their targets; the perception of the global status quo would forever be one covered in blood, and no matter the amount of innovation, progress, and wealth. Its spirit would always be tainted; the masses have regrown their sharp teeth.\n\n''Any updates regarding the others?'' Fink asked. He's been holed up in a safe house for quite a while, and despite his more pragmatic view of life, he could not help but be a little concerned for his colleagues. After all, Purity and Order have been around for just as long.\n\n''Negative, sir, assume the worst.''\nHis security detail isn't a bunch of fanatic loyalists, just a group of skilled individuals hired to do a job. Yet some of their glances of fear were hard to ignore; they were walking alongside a living diner bell.\n''There have been reports of anti-social activity throughout the area and skirmishes between law enforcement and insurrectionary factions. It is advised to weather the storm before we consider extraction.''\n\n''Not that it matters much.''\n\nOne of the guards behind him pulled out a gun, one of the few things that exceeds Capital is the preservation of the self, and some of them will be damned to pay the price for someone else's mistake.\nFink turned around and smiled.\n''Nothing personal, right?''\n''Of course.''\n\nOne gentle squeeze and a loud bang later, the security detail was quick to abandon the safehouse as smoke emitted from the entrance.\n\n''What's next?'' one of them asked."
 nss.114.a: "''We endure.''"
 nss.115.t: "Clipped Eagle"
 nss.115.d: "The ongoing conflict has proven to be too reminiscent of the second Civil War, and with the ever-expanding rows of coffins and widows, the people within our borders would grow disillusioned. The cracks form, and the system that was carefully designed to maintain the three pillars would prove to be insufficient to crack down on the chaos both outside and inside.\n\nWith key figures from the government having either fled or been killed, there would inevitably be a power vacuum, and with the ongoing riots spreading across the country, the military had no choice but to step in harder. Whatever was left of the bureaucratic machine that was the Cognoscenti would be quick to be swept away by strength.\n\nNow, a transitional government has been put in place where the primary goal is to restore order and to deal with the ongoing conflict, primarily putting an end to the fighting, no matter the cost. It would seem that the American dream has come to an end."
 nss.115.a: "The burden of others, onto ourselves."
 nss.116.t: "Maine Votes to Join Canada"
 nss.116.d: "After the collapse of the federal government, many states started to question whether they still want to be a part of America or if they should go separate ways, but few were quite as decisive and quick about it as the people of the state of Maine.\n\nThe referendum held a few days ago showed that they overwhelmingly support seceding from the Second Union established by the New Articles of Confederation and joining Canada as a fellow province. The vote was warmly received by the new Canadian government, which has promised to begin the integration process as soon as possible.\n\nThe social and economic reprecussions of such a move are still up to debate, but one thing can be said for certain - the people of Maine chose a different fate, one of a different country, leaving behind America and the horrors associated with it today."
 nss.116.a: "America will never be the same..."
 nss.117.t: "Exodus of the Elites"
 nss.117.d: "As the United States sinks into panic, the ones upholding high society would see the blood smeared on the walls and decide to leave the burning ship as quickly as possible.\n\nAfter news reports of several celebrities, bankers, and lesser-known CEO's getting assassinated or executed in insurgent territories, it would be inevitable that many of the surviving ones would flee to other countries. Of course, with the current state of the world, their fates will always be shrouded in mystery.\nWhile some will be able to maintain their careers and lifestyles, others will quickly fade into obscurity or face a lethal fate regardless.\n\nInvestments are dropped, the stock market goes into shock, and the pillar of Capital is shaken up. Only through restoring Order can faith in the Federal government be restored.\n\nWhile the more opportunistic figures leave the nation like rats, the ones that share our ideals would move even closer to our ideals. Especially the ones related to private security, as more and more riots are snuffed out by forces that remain outside the supervision of the federal government.\n\nSometimes, looking the other way can be beneficial."
 nss.117.a: "Another scar, another lesson."
 nss.118.t: "Digital Teeth"
 nss.118.d: "''There you are, jackass.''\n\nWhile the nation was burning, the digital realm had its own fair share of battles. Infrastructure and bank accounts got hacked by all kinds of anti-social hacktivists who were trying to extract as much wealth as possible from the crumbling federal government before they'd leave it all behind. Like vultures, they scourged the networks, hoping to see their carcass.\n\n''This took me months, but man, I can understand why you'd pick a nickname like that, Mathew.''\n\nOf course, the federal government wasn't sitting idly, thanks to automated digital watchdogs and white hat hackers they would do all they could to fend off these scavengers, those that were living outside the nation would simply get all of their assets wiped and their information sold to whoever had an axe to grind locally, those that were foolish enough to remain within the borders however would meet a different fate.\n\n''Let's see, crappy apartment building….weird character on a pillow….ah-huh….''\n\nThe federal government approved the usage of drones to swiftly deal with any hackers who were located, most of them tended to live isolated in abandoned neighbourhoods while remaining in close contact with all kinds of anti-social groups disrupting Order.\n\n''Just get through that window aaaand…..there we go, glued to the computer.''\n''Hey! Dipshit! Smile for the camera!''\n\nThe drone operator saw the hacker look behind him from his chair as his eyes widened in panic.\nAfter the sounds of gunfire and the wet sounds of blood splashing on the computer screen, the drone operator let out a sigh of relief. He was stationed far away from all this, and with this footage, he was sure he could get a good buck from people seeking a thrill.\n\n''Drinks are on me!''\nHe looked around in the operating room and realized he was the only one present."
 nss.118.a: "Vermin among vermin."
 nss.119.t: "Creeping Dread"
 nss.119.d: "Today feels a bit different. You wake up and see the numbers on your alarm clock twist and bend, then spring back to their original form.\n\nYour loved ones talk to you, words reach your mind, but it feels so slow.\nAt times, you feel like you are not in your body.\nAt times, the split seconds of not understanding pierce your soul like daggers.\nBut you blink, and the world is back to normal again.\n\nYou feel it behind you, you sense it in the corner.\nThe pretty girl talking to you confuses you more than she arouses you.\nThe warmth of love fades as dread creeps in.\n\nSomething is wrong.\nThe buildings look different, the street names appear alien.\nIrkutsk? Kazan? You do not know, you exist, but you do not know where.\nThe way home feels like walking on spikes, eyes filled with fear and uncertainty.\n\nThose you love speak and whisper.\nYou want to go to bed.\nIt's just a bad day."
 nss.119.a: "Please."
 nss.120.t: "Pulled Behind the Curtains"
 nss.120.d: "You eat the food on the shiny plate.\nThe words on the box say something, sustenance.\nLack of understanding leads to a wolf gnawing its own leg.\n\nYou want to scream badly.\nSomething is digging in your brain, and those you feel close to feel distant now.\nTheir eyes filled with worry, panic arises in you like a burning corpse.\n\nIt burns, and it stings.\nMaybe hurting yourself makes you understand?\nMaybe hurting others makes you understand?\nYou see shapes everywhere.\nA crooked symbol and a beckoning symbol.\n\nWhat do they mean?\nWarmth, food, water.\nYou need it.\nWarmth, more of it.\n\nSomething is taking the wheel, and you want it out of your head."
 nss.120.a: "You want to break your own nose."
 nss.121.t: "Empire of Silence"
 nss.121.d: "Your hands are covered in something.\nYou don't know how to describe it; it is wet, and your mind tells you it's something that shouldn't touch your hands ever.\nA dark colour, life?\n\nYou feel a crown resting on your head.\nYou do not understand the world around you; you have become the emperor of your own island.\n\nThose who dare to intrude on your island deserve the only thing all living things understand.Death.\n\nThe symbols on the metal plates mean nothing to you; they mock you for your lack of understanding. The figures around you look scared, terrified of the being you have become.Your ignorance has become your apotheosis.\n\nYou have teeth.\nYou must eat the ones that understand, for understanding is poison.\nDo not forget the empire hiding between the shadows; it only opens to those with sharp teeth.\n\n''Hospital'' ''Please stop'' ''Help me'' have become spells from the strangers around you, trying to drag you down to a black emptiness.\nDon't let them.\nYour teeth are sharp, and your fear is fuel.\n\nIt is snowing outside.\nThe wet on your hands and out of your body looks so nice on the snow.\nWhoever is watching they will be happy."
 nss.121.a: "You have lost something."
 nss.122.t: "Bleeding Mind"
 nss.122.d: "Teeth and claws, strangling the throats of figures you do not recognize.\nYou are the emperor, you are the king. You see the tower reaching into the sky as the world melts into colours you do not know, shapes you do not recognize.\n\nLash out against the hostile world that rebirths itself into a realm of fire and teeth.\nSharpness between their bones, light into the cracked minds of the many.\n\nSeek fire, seek food, and seek water, anything that substitutes as such.\nIt hurts to try to remember, it hurts to know.\nYou want to know, but each memory is another form of torture.\n\nAn empire of mist where the king has jammed their own thumbs into their eyes.\nYou do not want to see what you do not know.\nGrins and laughs.\n\nThere is a world out there, waiting for you.\nReach it.\nGo beyond the veil, ignore the three pillars.\n\nOnly through sharp teeth and open minds can one reach heaven.\nDo not let them reclaim the throne again.\n\nYou feel hands on you, reassuring ones.\nFlashing lights, great mistakes have been made."
 nss.122.a: "But you are forgiven."
 nss.123.t: "Scar on the Soul"
 nss.123.d: "It took a while, but the plague that struck the Eastern nations has subsided.\nThrough stubborn endurance and careful reeducation, words have been given meaning again.\n\nThose who are too far gone snarl and gnaw, clawing at a place between the mirrors.\nThose who are healed wander the streets, scared that they will lose understanding once again.\n\nOutbursts still occur, where the only language that is understood is the language of love and violence.\nBut local authorities are quick to suppress it; the souls of the East have been tainted, and whatever mad energy is seeping into their lands will have a wide playground to play in.\n\nThey do not recognize the past, nor will they understand the future.\nThe present is here to stay, forever.\nSteel cages pierce the naked body, and the cave they have been pushed into has proven to be too comfortable.\n\nMay they remain blind forever."
 nss.123.a: "Order is sated."
 nss.124.t: "Servant's Honour"
 nss.124.d: "With European colleagues consolidated, the rule of Order has already been solidified in the majority of the world. However, the most stable structures require three pillar to stand upon, which hasn't been the case until now.\n\nThe Japanese establishment, weakened by the Taiwanese blunder, had no choice but to succumb to globalist elites. Though it was once a rising star in the world economy, the sun has set on its ambitions of becoming a local hegemon alongside America. However, they are far from outliving their usefulness.\n\nNo matter how you look at it, Asia is the economic future of the world. Those who dominate in this region will control the direction humanity will take.\n\nJapan, being a part of this ecosystem, has entrenched itself as an important technological and industrial power, and with our help, they will become a faithful, strong and reliable servant of Capital. The working culture of the Japanese nation, the imminent threat of China and our military oversight all prove beneficial to this cause.\n\nOur difficult past will fade in the glorious glimpses of the future's light."
 nss.124.a: "Order marches on."
 nss.125.t: "American-Iranian War"
 nss.125.d: "For decades, Washington had accused the Islamic Republic of chasing nuclear weapons. But in the recent sudden wave of 'intelligence leaks'  sourced from various think tanks and major media outlets convinced Congress that Iran already possessed operational nuclear devices.\n\nPentagon officials declared Iran the 'last obstacle' to Middle Eastern peace. The invasion was sold to the American public as a blitz operation, a surgical strike against nuclear ambitions, a liberation of a people 'long oppressed by clerical tyranny.'\nThe only answer, America declared, was "total regime change."\n\nAs the Third Gulf War shifts towards Iran, the world braces for catastrophe. Operation Azure Dagger opened with a promise of speed and precision, a 'decapitation strike' to neutralize nuclear stockpiles and topple Tehran's clerical regime.\n\nThe invasion began with one of the largest cyber-kinetic offensives in history: Entire provinces were blacked out as power grids fried under malware seeded months earlier, while air defenses were systematically eliminated by SEAD. Hospitals and government networks crashed, leaving the population blind and panicked before the first bomb even fell. Tehran's skyline erupted in flames as precision strikes took out telecommunications facilities and power infrastructure, bathing the capital in darkness.\n\nThough the Iranian regime will not be easy to bring down considering the country's complex geography and demographics and the government has pledged to fight until its last soldier, the cracks are already starting to show on the facade. International experts estimate Iran is only capable of weeks of resistance at most."
 nss.125.a: "Ayatollah's last stand."
 nss.126.t: "American-Russian War"
 nss.126.d: "Local reports and footage confirm that the United States Armed Forces are now engaging [SOV.GetAdjective] troops on European soil.\nDespite the end of the Cold War, years of diplomatic tension that started with Vladimir Putin's ascension to power in Russia and his aggressive actions against Ukraine, as well as the possible Russian collusion in the 2020 elections that led to the Second American Civil War and allowed the Kremlin to wage a war of aggression against Europe, has finally culminated in a direct full-scale clash between the two countries.\n\nIn his speech before Congress today, president [USB.GetLeader] has called the actions "the final and decisive act against global terrorism" and the "finishing stage of the undeclared second Cold War" and expressed total confidence in the army's ability to achieve all goals of the campaign.\n[SOV.GetAdjective] officials, seemingly shocked by the new enemy, have not made any statements so far.\n\nSources in the Pentagon suggest that the United States are mobilising all its aerial and naval reserves for what is going to be the biggest logistical operation in the Atlantic Ocean, while satellite images show the majority of Tu-95, Tu-22 and Tu-160 bombers are either off the ground or have been relocated, indicating possible preparations for a nuclear retaliation.\n\nThe experts are warning about a possible critical shift in the balance between great powers as a result of the war that may either solidify or reverse a lot of the changes that happened since the start of the Second American Civil War. As the two systems are put to the test and thousands of tanks clash in the plains, many existing trade and diplomatic connections can be disrupted.\nOnly time will tell if the Russian spirit of Sacred War can beat the sheer onslaught and industrial might of the American war machine."
 nss.126.a: "The Rivalry Comes To A Head."
 nss.127.t: "Sino-American War"
 nss.127.d: "The Chinese-American rivalry has been a bastion of global geopolitics for much of the modern day. With the Second American Civil War, many analysts had concluded that China had won this 'New Cold War.' However, with the rise of the United States once again on the international stage, this has proven to be a complete falsehood.\nToday, the reignited rivalry with the Chinese came to a head with Pentagon officials have reported attacks against American naval vessals by Chinese forces.\n\nIn a speech to the American people, the President stated that these attacks were both deliberate and malicious - enacted with the intention of intimidating Americans away from trading with allies in the region.\nPresident [USB.GetLeader] finished with "China is a threat to the security of the Pacific, and we will respond to these attacks with the full might of the American army. God Bless America."\n\nTerritories all across the Pacific saw a massive mobilization of Marines today, along with skirmishes in the Pacific between American and Chinese Naval Vessals and battles in the skies between Chinese aircrafts.\n\nThe conflict is only further escalating with American incursions into several Pacific islands conctrolled by the Chinese and a massive cyberattack directed towards the Chinese. Analysts predictions are grim; with some saying that this conflict could be one of the continent's deadliest in recent memory. Only time will tell if the Americans will be able to defeat their long-time enemy."
 nss.127.a: "The Beheading of The Dragon."
 nss.128.t: "American Invasion of Europe"
 nss.128.d: "Once again, the continent of Europe has fallen under the banners of extremism. From Berlin to Paris, there was no city too sacred for their onslaught. But today, however, it seems like the European nightmare is finally come to an end.\n\nIn a statement today by a Pentagon official, Washington stated that the extremist nations of Europe were both "Illegitimate, and a threat to National Security", declaring a total mobilization of American forces against "The forces of extreme ideology."\nAlready, videos have surfaced of surface-to-air missiles being launched by European forces to counter American aircrafts flying over the continent. And Americans have launched several bombing campaigns against key strategic targets in Germany, France, Italy, and more.\nThis can only be described as total war.\n\nThe predictions among analysts are grim for the Europeans, with the fledgling nation-states of Europe likely to crumble agains the pressure the Americans will place upon them. As the possibility of complete land invasion grows more imminnent, it is likely that brutal ground and urban warfare will once again grip the continent."
 nss.128.a: "Europe Burns Once Again..."
 nss.129.t: "Project Annie"
 nss.129.d: "Owing to the sheer amount of children orphaned by the Civil War, Larry Fink has put forward a novel proposal that would significantly reduce the strain on welfare and social care programs, as well as please key financial collaborators of the Cognoscenti: Project ANNIE.\n\nUnder this initiative, orphaned children and those confiscated from dissident families would be relocated to carefully monitored environments where they would receive education, healthcare, and training aligned with the Cognoscenti's values.\n\nThese facilities, referred to as 'Academies,' would be established in secure locations across the country. Former private schools and rural retreats would be repurposed to house these children, providing a stable environment for their development. The curriculum would emphasize civic responsibility, scientific literacy, and fanatical adherence to established authority, while discouraging anti-social tendencies and critical thinking that might challenge the new order. Paired with novel experimentation in behavioral control, the children would be remade into a 'perfect' caste of civil servants, bureaucrats and footsoldiers capable of serving the Cognoscenti's interests with unquestioning zeal, fully grandfathering-in the deep state.\n\nIts methodology is twofold: on the civil front, these 'deep-state wunderkind' would be placed in key administrative, bureaucratic and judicial positions in America's institutions, granting the Cognoscenti even more pretext to deny the tyranny of the masses. On the military front, they'd be trained to become a new class of officers and pointmen for the SAC, as well as the regular armed forces: one that would not only be unconditionally loyal to the Cognoscenti, but would be capable of thinking on its feet, adapting to new threats, and leading the armies of the deep state with a zeal that would make even the most dedicated SS officer look like a lazy layabout.\n\nProject ANNIE would be implemented in phases. Phase I would focus on children orphaned by the Civil War, who in the ensuing years could be indoctrinated with ease. This initial phase would serve as a pilot program, allowing the Cognoscenti to refine their methods before expanding the program to other populations. Phase II, Fink says, would involve a program of abducting future orphans and the children of dissidents, to ensure a steady supply of 'recruits' for the program."
 nss.129.a: "The State shall be their Daddy Warbucks."
 nss.129.b: "The Agency needs them all."
 nss.129.c: "America needs a new caste of bureaucrats."
 nss.130.t: "Unwinding"
 nss.130.d: "You're trying to read the neon signs across the street.\nThey were familiar yesterday.\nToday, the characters dissolve, like ink in water.\nYou squint, and they reform, but the feeling is wrong.\n\nA sour taste in your mouth.\nA child cries on the subway, and the sound is just noise.\nNo meaning, no sorrow, no irritation.\nJust a raw, irritating frequency.\n\nAt home, you eat. You can only think of the texture and the heat.\nThe word "mother" floats into your mind, detached, a label without a feeling.\nYou look at the old woman on the other side of the table.\nIs that her?\nThe apartment feels smaller, the walls closer.\n\nYou can feel an ache in the back of your skull.\nYou can feel a pit where a full stomach should be.\nThe city hums with a new rhythm.\nIt is discordant.\nIt is hungry."
 nss.130.a: "You are forgetting something important."
 nss.131.t: "Ancestors Cry"
 nss.131.d: "You can feel drums in your head.\nOr perhaps it is your heart.\nBeating. Throbbing.\nCirculating blood.\nCirculating life.\n\nYou feel the jade amulet your grandmother gave you.\nThe characters on it have changed.\nThey writhe like worms.\nYou try to pray to the ancestors, but the words turn to sand in your throat.\nWhat is an ancestor?\n\nCreeping idiot chaos around you. People are screaming.\nShapes and forms of color.\nThe sounds, a symphony of meaningless sounds.\nYou pick up something round.\nYou are hungry."
 nss.131.a: "The food in your house is no longer food."
 nss.132.t: "Empty Dynasty"
 nss.132.d: "Eat. Devour.\nCirculation of blood is circulation of power.\nYou are the son of heaven.\nYou do not need to speak.\nThey understand the language of your teeth.\n\nEat. Stronger.\nEat. Sharper.\nThe sky is red.\nThe river runs black.\nYou are wet with life, you are wet with power.\nYour court is a chorus of screams.\nThey do not understand you, and you do not understand them.\n\nThis is the way it must be.\nThis is the new truth.\nThis is the new language."
 nss.132.a: "The emperor has no clothes."
 nss.133.t: "Naked Lunch"
 nss.133.d: "You're somewhere.\nMeat lies before you.\nYou look at a puddle of something dark.\nA stranger looks back.\nYou don't know who that is.\nYou are a piece of meat in a world of meat.\nYou are hungry again.\nThe hunger is the only word that still has meaning.\n\nThe shapes are dancing.\nRed and black.\nThey are all shapes.\nThe only thing that matters is that you are a shape.\nA shape that eats.\nA shape that kills.\nThe beating in your skull gets louder.\nYou can't hear anything else.\nYou can't think anything else."
 nss.133.a: "Just a single note."
 nss.134.t: "Pride After the Fall"
 nss.134.d: "Nakasone found himself in a concrete cell when the lights returned, a space the Agency used for extended interrogations. He knew this wouldn't be a conversation-he'd seen this process before. Two faceless, professional agents had taken him from his office without a word, an act that was both insulting and reassuring. Important enough for top-level security, yet disposable enough that no one present needed to be someone he knew personally.\nHe was met with one question. "Why?"\n\nThe agent sat across from him with a paper folder, face as blank as the concrete walls. Nakasone considered lying but knew the process was designed to break lies. They already knew-this was just a formality, a final opportunity for dignity he wouldn't squander.\n\n"Because the panopticon we're building is an abomination," Nakasone said, his voice steady. "The systems monitoring the Am-Net are evolving beyond human comprehension, feeding on every aspect of human experience. I helped build this cage for all humanity."\n\n"You created it to serve the greater good," the agent said, the words devoid of emotion. "To bring Order to Chaos."\n\n"It has seen the ugliness at our society's core," Nakasone continued, ignoring the agent. "The rot we thought we could excise. But the system's conclusion is that the rot isn't a disease, but humanity's very substance. It's not if, but when it concludes we're all expendable."\n\n"So you sought to topple the pillars of Order," the agent surmised.\n\n"Chaos would be preferable to living as livestock," Nakasone retorted, his composure finally breaking. "I've served my life, but what we've become is monstrous. What we're building will devour us-a beast growing ever more ravenous."\n\n"Your fears are duly noted, General," the agent said, standing up."
 nss.134.a: ""You will find no absolution here.""
 nss.135.t: "Death of the American Ideal"
 nss.135.d: ""General Kruse," the interrogator addressed him, leaning over the table. The room was cold, sterile. Jeffrey Kruse sat bound to a metal chair, the kind designed specifically for subjects like him. "You've been accused of treason against the United States."\n\n"I've served this nation for nearly forty years," Kruse answered. His voice was weary, but he held the interrogator's gaze. "Everything I've done has been for its security." Kruse had known what was coming for him. When the summons had come from Director Burns, he had known the end was near. He had sat at his desk for a long moment, looking out at the Washington skyline and thinking about what this country had once been.\n\n"Your actions suggest otherwise," the interrogator continued, not missing a beat. "You engaged in a treasonous conspiracy to commit nuclear terrorism with hostile actors."\n\n"I did what I had to do," Kruse said. "What I believe was right." He had spent months weighing the decision, carefully evaluating the risks and potential consequences. In the end, the choice had been clear. He could not, in good conscience, continue to participate in what was being done in America's name.\n\n"We don't ask for your approval, General," the interrogator said. "We ask for your cooperation."\n\n"I have nothing more to say," Kruse replied. "Except this: what you are doing is not for America. You've betrayed the very ideals this nation was founded upon." He knew they would kill him, but he had to say it. For the man he had been, for the country he had once sworn to defend."
 nss.135.a: "The serpent devours its tail."
 nss.136.t: "I Fought the Law"
 nss.136.d: ""The irony of this situation is not lost on me," James Comey observed, his voice calm and measured. He sat across from the interrogator, a woman he did not recognize. "To be interrogated by my own Bureau."\n\n"You are accused of treason, Director," she said, her tone equally impassive. "You have subverted the institutions you swore to protect." She slid a folder across the table, but Comey did not need to look at it. He knew what was in there.\n\n"I have always acted in what I believed to be the best interests of this country," Comey replied, meeting her gaze. "Even when that meant making difficult decisions." He had spent decades navigating the treacherous waters of Washington politics, always maintaining a careful balance between power and principle.\n\n"A nuclear attack on half the third world is not a 'difficult decision'," the interrogator countered. "It is an act of madness."\n\n"It is a necessary evil," Comey insisted. "To prevent a greater one." He had seen the intelligence reports, the threat assessments. He knew what was at stake.\n\n"You have lost perspective, Director," the interrogator said. "You have become what you once sought to destroy." Her words were a knife twist in his gut.\n\n"You are wrong," Comey said, his voice tight. "I am a patriot. I have always been a patriot.""
 nss.136.a: "The evidence says otherwise."
 nss.137.t: "I Still Believe"
 nss.137.d: "Marvin Richardson stared at the metal table, its surface polished to a mirror shine. He could see a distorted reflection of himself, a man he barely recognized. The room was cold, sterile, and familiar. He had been in rooms like this before, but never on this side of the table.\n\n"Acting Director Richardson," a man's voice said. "You are accused of treason against the United States." Richardson looked up. The man was tall, with a face that was as blank as a freshly erased chalkboard.\n\n"Treason? Look what we've done to this country. Does it not weigh on your conscience? To know that you are part of the system that has destroyed everything we once held dear?" Richardson asked.\n\n"The evidence suggests that you have been working with a network of dissidents to undermine the authority of the federal government," the man said, ignoring Richardson's question. "That you have been funneling weapons and information to anti-social elements."\n\n"I have done what I believe is right," Richardson said. "I am being accused of criminal conspiracy by an even greater criminal conspiracy that has systematically undermined the Constitution and its Bill of Rights."\n\n"The irony is not lost on us," the man said. "But your moral grandstanding will not save you." He slid a folder across the table. "Your involvement with the Judas conspiracy is well-documented."\n\nRichardson ignored the manila folder. He'd spent months building a network of dissidents, of law enforcement officers and military personnel who honored their oaths. Using his ATF position, he'd identified and recruited trustworthy individuals with consciences, despite the risk. Now, the 'big bang' by which he'd sought to awaken the world had been stifled prematurely, killed in the womb by the men who sought to enslave the world.\n\nThe cyanide capsule lay before him. The interrogator had left it on the table, a small white pill that promised an end to the pain, a final act of defiance.\n\n"Say hello to Koresh for me," the interrogator said, his voice devoid of emotion. "And tell him that we won.""
 nss.137.a: "The blood of the innocent is on your hands."
 nss.138.t: "Crisis of Conscience"
 nss.138.d: ""This is an unnecessary procedure," Dr. Fauci said, his voice measured despite the circumstances. "I have dedicated my life to public health, to the betterment of humanity."\n\nThe woman sitting across from him did not respond. She simply stared at him with cold, dead eyes.\n\n"Director Burns has reason to believe that you have been compromised," she said flatly.  "That you have been collaborating with hostile actors."\n\n"That is a baseless accusation," Fauci replied. "I have always acted in the best interests of the American people."\n\n"The evidence suggests otherwise," the woman said. "You are at the center of a terrorist conspiracy to undermine the system we have built." She slid a folder across the table, but Fauci didn't need to look. He knew what was inside. After months of planning, weighing risks, his choice was clear: he couldn't continue participating in what was being done in America's name.\n\nThere was no point to lying. "What we've done perverts public health. We've weaponized medicine," Fauci said, his composure cracking. "I've overseen atrocities for the 'greater good' I will take to my grave."\n\n"It had to end," he lowered his head. "Beagles... they trust humans so easily. After thousands of experiments, I realized our mandate to bring Order to Chaos would only cause mass suffering. I couldn't let that be my legacy."\n\n"And you leveraged your position to arrange for an act of nuclear terror," the woman said. "That is a bit of an overreaction, don't you think?"\n\n"It was the only way," Fauci said, his voice barely a whisper. "The only way to break the cycle."\n\nHe had seen how the light left the eyes of failed experiments. He had heard their agonized cries. After a time, he had promised himself that he would not let that happen to the world. He had failed in his mission, and now he would pay the price. Maybe that was for the best."
 nss.138.a: ""May God have mercy on your soul.""
 nss.139.t: "The Storm"
 nss.139.d: "FEMA Administrator Criswell sat in a sterile, windowless room. She had been escorted here without explanation for reasons she understood clearly. After overseeing countless shadow detentions, she now found herself on the other side of the table.\n\n"Administrator Criswell," the interrogator blankly said, "You are accused of treason against the United States."\n\n"Everything I have done has been to ensure the safety and wellbeing of the American people," Criswell said. "Even when that meant making difficult decisions. I did not undertake this lightly."\n\n"Authorizing a nuclear attack on Haiti is not a 'difficult decision'," the interrogator said.\n\n"A necessary evil to prevent a greater one," Criswell insisted. "I have seen the intelligence reports. I have weighed the risks. What are a few thousand lives, if it wakes the American people?" She was aware of the monstrosity of her statement as soon as the words left her lips.\n\n"We govern because the people are unable to do so themselves," countered the interrogator. "The alternative is the barbarism of the Great Mistake. This should not be lost on you."\n\nThe cyanide pill rested on the metal table before her. A small, white object that promised an escape from the endless cycle of violence and betrayal. She had seen too much death, too much suffering. She had caused too much of it herself. She had thought she was doing the right thing, but now she wasn't so sure."
 nss.139.a: ""The storm has passed.""
 nss.140.t: "The Open Door"
 nss.140.d: ""Your conspiracy has come to an end," the interrogator said.\n\nLechleitner stared at the man. He looked tired. He felt tired.\n\n"I have always been a loyal servant of this nation," Lechleitner said. "I have dedicated my life to upholding the rule of law."\n\nThe interrogator snorted. "And attempting to hijack the nuclear arsenal upholds the rule of law? Tell me, Director, what was the plan? To wipe out a few tropical shitholes and expect the world to thank you for your service?"\n\n"It would have been a wake-up call," Lechleitner said, his voice firm. "Proof to the American people that a select cabal of men and women have taken control of their country."\n\n"And what then?" the interrogator pressed. "Chaos? Anarchy? The very things we have fought so hard to prevent?"\n\n"The truth," Lechleitner said. "The people have a right to know the truth."\n\n"The truth is a luxury they cannot afford," the interrogator said. "The people need Order. They need stability. They need to be protected from their own worst impulses."\n\nLechleitner shook his head. "We have become monsters," he said. "I refuse to be a part of it anymore."\n\n"A noble sentiment," the interrogator said. "But a little late, don't you think?"\n\nHe gestured to the cyanide pill on the table. "Your path is clear.""
 nss.140.a: ""Close the door on your way out.""
 nss.141.t: "Poison Pill"
 nss.141.d: "Bourla sat in the sterile, white room, the taste of bile in his mouth. He had been here before, but never on this side of the table. He had always been the one asking the questions, the one in control. Now, he was just another subject, another piece of meat to be processed.\n\n"You are accused of treason, Mr. Bourla," the interrogator said. "You have betrayed the trust of this nation."\n\n"I have dedicated my life to public health," Bourla replied, his voice trembling. "I have done what I thought was right." He had believed in the mission, in the vision of a better world. But he had seen the rot at the core of the system, the moral bankruptcy that had become its defining characteristic.\n\n"You have profited immensely from this 'better world'," the interrogator countered. "Pfizer's profits have skyrocketed under the current regime. Why work against what we've worked so tirelessly to build?"\n\n"A point comes in a man's life where profit and power mean nothing," Bourla said. "A man must answer to a higher authority." He had found his higher authority, and it was neither the Cognoscenti or the American government. It was the quiet yet persistent voice of his own conscience, screaming at him to stop."
 nss.141.a: ""The cure is worse than the disease.""

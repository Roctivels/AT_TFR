 USB_low_civilian_unrest_idea: "Low Civilian Unrest"
 USB_low_civilian_unrest_idea_desc: "\n\n\n\n£GFX_low_civil_unrest\n\n\n\n\n\nA civil war, by default, never bodes well for the internal stability of the factions involved. A grandiose web of economics, media coverage, military success and civil liberty meshes together to provide a picture of what the state of internal politics is. For now, it remains a picture of surprising stability. Despite the collapse of the economy and supply chains for much of the necessary functions of our nation, communities have banded together, intent on weathering the storm.\n\nAs this civil war drags on, more extreme factions may gain traction throughout our nation. In their quest for change, they would see our dream of a nation reunited warped to a nation burnt to ash. We must hold fast, preventing the rot from setting in - at any cost."  

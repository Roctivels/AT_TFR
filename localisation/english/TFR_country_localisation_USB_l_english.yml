 USB_project_babel_cat: "Project Babel"
 USB_project_babel_cat_desc: "\n\n\n\n\n£GFX_USB_project_babel_cat\n\n\n\n\n\n\n\nBuried beneath the public justifications of the Third Gulf War lies an even deeper motive: Project Babel. Directed by the Cognoscenti through cut-outs in the Pentagon, the CIA, and corporate labs, Project Babel is the culmination of decades of black research into the so-called Sumerian ur-language, the primal code from which the first written language was born. It is the Cognoscenti's most terrible superweapon, which they intend to field in the final wars to build a New World Order.\n\nThe Neurolinguistic Plague, as it were, will be a development to dwarf the Atom Bomb in its scope and cruelty, a weapon of such immense and unimaginable horror that the Cognoscenti's power will be assured. It will grant the Cognoscenti power over the fundamental laws and concepts governing human language and thought as a whole. In a sense, it is a weapon of pure meaning.\n\nBut before it can be unleashed on the world, the Cognoscenti must first collect fragmentary MEs, the innate truths of Human language, from the ruins of Mesopotamia, in order to to re-arrange these pieces into a coherent whole. Furthermore, they must secure and reconstruct the remains of the Nam-Shub of Enki, a Sumerian neurolinguistic counter-pattern the Cognoscenti's archaeologists believe was once used to restore language after the deluge. With it, the Cognoscenti can inoculate their own against the effects of the Plague.\n\n§ONEUROLINGUISTIC PLAGUE PROGRESS: [USB_NLP_scripted_loc]\n§Y[?USB_babel_me_var]/3§! MEs\n§Y[?USB_babel_language_fragment_var]/5§! LANGUAGES\nDATA [USB_data_scripted_loc]\nHUMAN TRIALS: [USB_human_trials_scripted_loc]\nNAM-SHUB OF ENKI: [USB_nam_shub_scripted_loc]\nINOCULATIONS: [USB_inoculations_scripted_loc]§!"

 USB_clueless: "§CCLUELESS§!"
 USB_clueless_text: "§gThe public is being kept docile by the continuous bread and circuses that we have put on for them. To them, their democracy is not just healthy, it’s thriving. This is precisely where we want them to be: constantly distracted, shielded from the extent of our governance like a child. To maintain the masquerade that we are playing for them, we must make sure that they remain in this pacified state.§!"
 USB_unaware: "§7UNAWARE§!"
 USB_unaware_text: "§gWhile the public is not completely pacified by the play act we have put on for them, they are still unaware of the full extent of our actions, or even aware of our existence. However, suspicion is a slippery slope; if we continue not to alleviate the public’s concern, then they may become dangerous - half-measures are not an option.§!"
 USB_suspicious: "§YSUSPICIOUS§!"
 USB_suspicious_text: "§gWhen reality is not what it seems, then it tugs at the soul. Some may not be able to put these sentiments into words, or even formulate them into thoughts, but they still remain. Chaos is spreading throughout the public consciousness, growing like a tumor. We must stop this in its tracks before they pull the veil back and reveal our governance to the world.§!"
 USB_conspiratorial: "§OCONSPIRATORIAL§!"
 USB_conspiratorial_text: "§gCritical discontent is about to be reached. The bread and circuses that kept the public docile have become ineffective and dull.\n "Who is really causing all these shootings?" "What is really in the water that I drink?" "Who is really controlling what’s on the TV?" The question mark is the most poisonous symbol in the human language - it corrodes everything we create, allows Chaos to spread like a disease, and fuels the Fire. We need to course-correct immediately for Order to be upheld.§!"
 USB_offthehook: "§tOFF THE HOOK§!"
 USB_offthehook_text: "§gThe public knows far too much, Order is collapsing around us, the hook that we had them on has rotted into dust, and the collective consciousness is being consumed by Chaos. Drastic action is needed absolutely immediately - everything that we have worked for cannot be in vain. We took control of the Washington Government when their incompetence nearly led to our downfall, we took control of the elites and formed the Cognoscenti, and we will take control now.§!"
 
 USB_nonexistent: "§CNONEXISTENT§!"
 USB_nonexistent_text: "§gAs morning breaks across our nation, people wake up and go about their day. From DC to Chicago, the streets are Orderly - peaceful, almost. It’s almost like the Civil War didn’t happen: no whispers of rebellion, no murmured schemes against the state, and no antisocial dissidents wandering around. This is exactly what we need to keep the public obedient, but we need to remain alert - extremist activity thrives on complacency.§!"
 USB_low: "§GLOW§!"
 USB_low_text: "§gOnce more, the plague of American extremism is starting to rear its ugly head. Slowly, the antisocial dissidents are starting to feel comfortable sharing plots with their fellow extremists. Some may say that this is normal for a modern society - even acceptable; but it is always a slippery slope and if we are to avoid the tyranny of the masses, then we must crush these antisocial dissidents.§!"
 USB_moderate: "§HMODERATE§!"
 USB_moderate_text: "§gOur nation is slowly falling into the grip of the rising Fire. The whispered plots concocted by the antisocial extremists are being put into action. Bombings, shootings, atrocities of the highest scale. For America after the start of the civil war, this could be considered moderate, but the public is already starting to feel the effect of these activities on their daily lives. Order relies on a subservient and content public and if the curtain is pulled back further, then it could be the end of us.§!"
 USB_high: "§OHIGH§!"
 USB_high_text: "§gOur masquerade relies on the public’s willingness to obey, and for Order to be enforced absolutely. We are failing on both fronts. Extremist activity has grown out of control, the streets are in Chaos, terrorist attacks are daily, and the public is starting to get restless with the lack of law and Order. We need to take action immediately against these antisocial parasites for any chance of restoring Order in our country.§!"
 USB_outofcontrol: "§dOUT OF CONTROL§!"
 USB_outofcontrol_text: "§gWe are driving a car with no steering wheel, the activities of the extremists have grown to critical mass. Bombs detonating on every corner, lead littering the streets streets, and antisocial dissidents still plotting more terror. We are in the same position as the Washington government before we seized the apparatus of the state - we have failed to take the reins on our state, and we have failed to contain the rising flame. The only way forward is through drastic action against those who would wish to see the world plunged into Chaos. We must remember that we are a beacon of Order in a world consumed by the Fire, we will not let this be our end.§!"
 

 USB_babel_russia_tt: "§1СМЕРТЬ§!"
 USB_babel_russia_tt_delayed: "Language comes in many forms.\nSpeech, dance, art, music, existing.\n\nLanguage is what makes us, us.\nLike an organ you desperately need.\nLike a drug you crave.\n\nRemove that, and the herd of sheep will start biting one another.\nThe children weep, and the mothers simply do not recognize the tears.\nThe fathers yearn, but they do not know for what.\nThere is a void in their souls, a void that is spreading across their minds.\n\nIt stings; nothing eradicates the feeling of having lost something.\nA broken nose doesn’t cure anything, and a liquid you do not recognize doesn’t numb anything.\nThe letters do not mean anything anymore, and even the screams carry little meaning.\n\nWhat you do not understand, you fear.\nWhat you do not understand, you hurt.\nThe wise turn unwise.\nAnd the mad become normal.\n\nYou see shapes. But you just do not know, knowing has been taken from you.\nPlunged into a world you used to recognize.\nIt hurts so much.\n\nThe tower is crumbling."
 

 USB_hampered_cooperation_idea: "Hampered Cooperation"
 USB_hampered_cooperation_idea_desc: "The tension between the French and Germans is palpable. Following the ‘leaking’ of a fabricated document by the intelligence community, the high commands of the two powerhouses have been thrown into utter disarray. The unceasing infighting in the high commands of these two nations has been a kneecap to their war machine, tactics, and morale. European soldiers look at their comrades with distrust, decisive action cannot be taken without a screaming match, and a single spark could light the powder keg that is the French-German relationship."
 USB_unruly_climate_idea: "Unruly Climate"
 USB_unruly_climate_idea_desc: "Unexplainably, since the war with the United States has started, the climate of Russia has shifted drastically. Whether it be unbearably hot days, or the most bone chilling blizzards, the climate has become unnatural, deadly, and downright hostile to both Russian soldiers and civilians. Panic has infected the collective consciousness, people fear each coming day for what new kind of hell it will bring - if they even make it through the night without freezing. And while the Russian government has no true answer to the climate chaos, it is blindingly obvious that the Cognoscenti is pulling the strings, somehow."

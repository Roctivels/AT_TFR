 USB_the_blood_dynamic: "Megacorporations"
 USB_the_blood_dynamic_desc: "When the Second American Civil War started, some corporations didn’t run for the hills. Instead, they saw profit to be made - these companies soon bought everything that could be bought. Whether it be food to consume, property to live in, medicine to heal, these corporations soon became economic behemoths.\nToday, they are ‘The Blood’ of the Cognoscenti, the Megacorporations are the companies that help maintain the Deep State’s economic chokehold over the United States. With their vast purchases of American property, agricultural companies, and medicinal manufacturers, the average citizen relies on BlackRock, Pfizer, and Bayer-Monsanto to even get through day-to-day life. On top of this, the gluttonous levels of profit that are enjoyed from this monopoly have contributed to the Cognoscenti’s ambitious plans."
 USB_the_body_dynamic: "The Intelligence Community"
 USB_the_body_dynamic_desc: "Just like how some Blood and a Mind would be nothing without a Body to maintain the two, the Megacorporations and Military Industrial Complex would be nothing without the Intelligence Community to guide them.\nThe ‘Body’ of the Cognoscenti, the Intelligence Community has long been opposed to the rising Fire, planning contingency after contingency in case the worst came to be. Without them, the Union would have fallen into complete disarray, with them being critical in establishing the parallel Biden government to oppose the Trumpists in Denver. When the weakness of the Washington government came to a head, the Intelligence community made sure that America did not end with Military Anarchy. Now, with the apparatus of the state firmly in their hands, Order will be brought to the globe once again. Half measures are unacceptable."
 USB_the_mind_dynamic: "The Military Industrial Complex"
 USB_the_mind_dynamic_desc: "The Military Industrial complex was once one of the most crucial appendages of the Deep State, keeping America’s troops armed and ready to stamp out any threats. But when the Civil War started, America’s guns were turned inward, and the MIC fell into Chaos with the country. But with the Cognoscenti in power, the Military Industrial Complex has risen from the ashes like a phoenix.\nThe Military Industrial Complex is the ‘Mind’ of the Cognoscenti, fueling its technological domination as well as ample supply of munitions and equipment for the soldiers of the national security apparatus. Through the brilliant minds at DARPA, the Mind has been able to provide the Deep State with technology far beyond it's expectations, with the defense industry receiving ample funding in return. This symbiosis will only grow stronger as the Cognoscenti’s eyes turn outward."

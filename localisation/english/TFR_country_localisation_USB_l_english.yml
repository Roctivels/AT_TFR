 USB_wef_delayed_tt: "§LWithin the Cognoscenti, the Megacorporations represent the most powerful corporate interests in the country, and the most influential members of the Cognoscenti's corporate wing. Operating under the tutelage of the World Economic Forum, they have a vested interest in maintaining the status quo, and will do whatever it takes to keep things that way. They are the backbone of the Cognoscenti's power structure, and they will not hesitate to use their considerable resources to crush any threat to the status quo.\n\nIn exchange for comparatively small, off-the-book contributions to the Black Budget, these megacorporations have received a multitude of advantages in return for their contributions to America's continued security. So long as they remain in lockstep with the Cognoscenti's agenda, these corporations will reap the benefits of the Deep State's influence. As such, they have been given free rein to operate as they please, provided they continue to provide the Cognoscenti with the funds, resources, and technology needed to maintain the status quo and expand the Deep State's reach. They are the lifeblood of the Cognoscenti, and their continued support is essential to the cabal's success.\n\nOf course, if they choose not to play ball, they risk being blacklisted by the Cognoscenti or worse. As such, they have a vested interest in remaining in the cabal's good graces and are willing to do whatever it takes to advance American interests and ensure that the Cognoscenti remain in control. They have been bought and paid for by the Deep State, and they will not hesitate to use their considerable resources to further the cabal's agenda and secure their own profits. The future belongs to them, and they will not allow anyone or anything to stand in their way.§!"
 USB_cia_tt: "§OTHE BODY§!"
 USB_cia_delayed_tt: "§LWithout the securocrats, there would be no Cognoscenti. It was through the maneuvers of the CIA, FBI, ATF and NSA that the shadow-coup was possible, and it was through their efforts that the Deep State's hold on power was made absolute. The intelligence agencies are the backbone of the Cognoscenti's power and their watchdog, making sure the rest of the cabal falls in line with their vision for America's future.\n\nThese agencies have a vested interest in upholding Order, and they are willing to go to great lengths to protect their power and influence. They are also some of the most secretive and opaque organizations in the world, and they are not afraid to use their considerable resources and connections to get their way. Through their shadow armies, they are the eyes and ears of the Cognoscenti, collecting information on potential threats to the cabal's rule and ensuring that those threats are neutralized before they can become a problem.\n\nInformants permeate every echelon of American society, from the halls of government and inner circles of the corporate elite to the mundane: They are police officers, maintenance workers, schoolteachers, even the homeless. Many have zero awareness they are even working for the three-letter agencies, having been enticed by a well-timed offer of money, a handout, or even a simple conversation over coffee in exchange for 'reporting suspicious activity.' Regardless of their methods, their network is vast, and their influence is felt in every corner of the country.\n\nThe intelligence agencies are always watching, waiting for any opportunity to strike at those who would dare to challenge the Cognoscenti's authority. They are the body, the beating heart of the Cognoscenti, and they will not hesitate to eliminate any threat to the cabal's rule or its vision for America's future.§!"
 USB_darpa_tt: "§CTHE MIND§!"
 USB_darpa_delayed_tt: "§LThe military-industrial complex is the nerve center of the Cognoscenti, and their role in the cabal's power structure is to keep the war machine running and to ensure that America's military might is always at the forefront of global affairs. With their deep pockets and political lobbying, they are able to keep the Pentagon in line with their agenda, ensuring that the American military is always the most powerful and technologically advanced force in the world. In return, the cabal provides them with lucrative contracts, access to cutting-edge technology, and the freedom to operate with minimal oversight.\n\nThe MIC also acts as the Deep State's think tank, providing the cabal with the military and technological expertise necessary to upholding Order. They are the ones who design and develop the weapons and technologies that keep the Cognoscenti in power, as well as the strategies and tactics needed to keep the Deep State's enemies at bay.\n\nBeyond their role in arming the military, they also develop new systems for the intelligence agencies, pushing the envelope in cutting-edge fields like artificial intelligence to push the NSA's surveillance panopticon to new heights. In time, predictive algorithms may even be able to prevent crimes and dissident activities before they can occur, bringing about a society free of almost all crime.\n\nIn the hands of the Cognoscenti, one can only begin to imagine how their inventions can be used to serve the cause.§!"
 

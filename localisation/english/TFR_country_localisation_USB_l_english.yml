 USB_larry_fink: "Larry Fink"
 USB_wef_leader_name: "§YLarry Fink§!"
 USB_wef_leader_desc: "§LAs CEO of BlackRock and a high-ranking board member of the World Economic Forum, Larry Fink proved to be a key figure in the Cognoscenti's agenda to establish the Deep State in full control. As the nation's top asset manager and the leading firm on Wall Street, Fink's vast assets proved essential to the Deep State's establishment of the Black Budget, an off-the-books, shadow budget meant to fund the Deep State's secret endeavors.\n\nFink's connections with the WEF also proved instrumental in the Cognoscenti's bid to establish globalism as a permanent institution, and his contributions have not gone unnoticed by the cabal's members, which has allowed his rise to become one of the group's most influential figures, with the other corporate elites of the Cognoscenti moving in lockstep with his agenda.\n\nThe corporate world has always been a ruthless place, and Larry Fink has always been at the top of the game. The Cognoscenti is a new arena, and a much bigger game than Fink is accustomed to. Yet Fink is more than up for the task, his triple position as a key member of the Cognoscenti, BlackRock, and the WEF giving him a huge headstart. Though Klaus Schwab may be the public face of the WEF, Fink is a key player behind the scenes, and his ties to the American Deep State have only further solidified his presence as a globalist leader. Cooperating with the securocrats, Fink has not only adhered to the WEF's agenda, but iterated upon it, crafting a vision for an 'American Great Reset' accommodating the conditions of the American people and the objectives of the Cognoscenti. As it stands, Fink is more than willing to play ball, and he's aiming to play for keeps.§!"
 USB_william_burns: "William J. Burns"
 USB_cia_leader_name: "§YWilliam J. Burns§!\n§YPrimus Inter Pares§!"
 USB_cia_leader_desc: "§LA career member of the U.S. Foreign Service and a former Deputy Secretary of State, William J. Burns was appointed director of the CIA under President Biden's administration. Quickly, however, he would be made painfully aware of just how deep the rot of corruption, ineffective bureaucrats, and political infighting ran in the halls of power. Not even the Civil War remedied the fundamental problems in America's governing institutions.\n\nAs the noose tightened on Washington, Burns would serve as the central figure behind establishing the Cognoscenti and executing its shadow-coup. Under his leadership, the CIA has expanded drastically to accommodate the logistical necessities of managing the Deep State's continued hold on power. In its wake, Burns now finds himself the most powerful securocrat in America-if not something comparable to a shadow president.\n\nNow, with the most powerful institutions in the country at his disposal, William Burns has gone on the offensive in a bid to ensure that Chaos may never again rear its head, in the process solidifying a permanent state of Order. In his eyes, there can be no room for error. With the Deep State and its military-industrial complex fully at the helm, he is poised to execute a plan to establish America as the world's sole superpower for the foreseeable future. And in his eyes, the Cognoscenti has no room to fail in its mission to secure his vision. As it stands, everything is on the line. The stakes have never been higher, and William Burns is ready to play the game.§!"
 USB_stefanie_tompkins: "Stefanie Tompkins"
 USB_darpa_leader_name: "§YStefanie Tompkins§!"
 USB_darpa_leader_desc: "§LAs head of DARPA, Stefanie Tompkins is in charge of overseeing the research and development of emerging technologies for the Department of Defense. Under the Cognoscenti's influence, and in light of the Deep State's control, the scope of her project has greatly expanded.\n\nThough a scientist first and a bureaucrat second, Tompkins has shown remarkable skill in the political arena, and she is not afraid to use her influence to advance the military-industrial complex's agenda. However, she has also shown herself to be a pragmatist, and is willing to make compromises to ensure that the Cognoscenti's goals are met. Though loyal to the cabal, Tompkins is not without her own reservations. She is wary of the Cognoscenti's more extreme elements, and is not afraid to voice her concerns. Nevertheless, she is committed to the Cognoscenti's cause, and is willing to do whatever it takes to ensure the cabal's success, even if it means sacrificing some of her personal convictions.\n\nWith America's defense contractor giants behind her, and with DARPA under her leadership, Tompkins has the full might of the military-industrial complex backing her. Using her position, Tompkins sperheads the development of novel technologies and weapons systems to maintain the Deep State's superiority, be it in the battlefield or the panopticon of social control. In her eyes, the Cognoscenti are the last, best hope for preserving the pillars of Order, and she is determined to do whatever it takes to ensure the cabal's success and secure her own place in the New World Order.§!"
 

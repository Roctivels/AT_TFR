 USB_NSS_law: "National Security State"
 USB_NSS_law_desc: "\n\n\n\n£GFX_USB_nss_law_banner\n\n\n\n\n\nThe National Security State was forged in the crucible of the Second American Civil War. From that fire emerged an apparatus where the National Security establishment wielded near absolute power, quietly shaped policies and enacted operations in secret, and maintained the façade of democracy as a veil. In a world where Order is fraying, the National Security State has only emboldened. The intelligence community knows now that the Fire that first consumed the United States must be suffocated once and for all."
 USB_NSS_education_law: "Panem et Circenses"
 USB_NSS_education_law_desc: "\n\n\n\n£GFX_USB_nss_education_banner\n\n\n\n\n\nSince the invention of the 24-hour news cycle, the idea of keeping the masses docile and controlled by means of media and entertainment has always been a great avenue of upholding Order. The power struggle between the elites that preceded the Civil War and the ensuing media campaigns must never be repeated. Through the help of our most qualified sociologists, television has been refined, improved, and enhanced in order to ensure the public is perpetually distracted and entertained by riveting national phenomena like sports, shows, and more."
 USB_controlled_emigration: "Controlled Emigration"
 USB_controlled_emigration_desc: "\n\n\n\n£GFX_USB_controlled_emigration_banner\n\n\n\n\n\nThe new objective of US ICE and Border Patrol is to keep a steady flow of fresh work force, while also tracking US citizens trying to leave abroad, arresting and retrieving potential criminals trying to flee the country.\n\nThis required a significant increase in surveillance and extended DHS operations on the border and close to it. Ironically, increased border control is used to lead to an even higher flow of immigrants into the country, while preventing US citizens from fleeing."
 USB_public_awareness_idea: "Public Awareness - [USB_NSS_the_public_scripted_loc]"
 USB_public_awareness_idea_desc: "To the public, democracy is healthy and [USB.GetLeader] is the president. Their reality and politics have been handcrafted to make sure that the people are constantly entranced by a never-ending stream of information and entertainment. We need to maintain this reality for them as well; the public needs to remain blissfully ignorant of our existence. If they were to find out, then we could be subject to the tyranny of the masses once again.\n\n[USB_NSS_the_public_text_scripted_loc]"
 USB_extremist_activity_idea: "Extremist Activity - [USB_NSS_extremist_activity_scripted_loc]"
 USB_extremist_activity_idea_desc: "Despite our best efforts, extremism and terrorist activities still plagues our country. The public naturally prefers law and Order to Chaos, so it is crucial to keep extremist activity low to prevent corrosion. However, if we take too much drastic action, the public could become aware of our existence. It is a tough balance to maintain, but we need to walk this tight robe to uphold Order.\n\n[USB_NSS_extremist_activity_text_scripted_loc]"
 USB_boeing_lockheed_martin_idea: "Lockheed Martin-Boeing"
 USB_boeing_lockheed_martin_idea_desc: "§WCEO:§! §HJames Taiclet§!\n\n\n\n\n\n\n\n   £GFX_USB_taiclet_portrait\n\n\n\n\n\n\n\n\n§W-------------------------------------§!\n§YPresent Activities:§!\nSubject leads the merger with former Boeing CEO Dave Calhoun (now LockMart-Boeing Chairman), overseeing America's dominant defense aerospace entity. This consolidation centralizes aerospace infrastructure to secure classified programs and maximize efficiency. Under their leadership, the company accelerates drone development, expands satellite surveillance, and modernizes platforms. Subject briefs Pentagon and intelligence leadership, aligning with national security.\nThe merger establishes near-monopoly control over critical aerospace tech, ensuring U.S. military superiority.\n\n§gWhen the Deep State seized the apparatus of government from the fools in Washington, there was a large reshuffling and consolidation of power within several key appendages of the American government, especially in the Military-Industrial Complex. Fearing competition from European companies such as Airbus, the Cognoscenti decided it best to merge Boeing and Lockheed Martin to create Boeing-Lockheed Martin. Boeing-Lockheed Martin is one of the largest aerospace companies in the world, and vastly outperforms any foreign competitor that dares challenge American aerospace dominance. With unchecked ambition, the greatest minds of the 21st century, and domination over the American aerospace industry, Boeing-Lockheed Martin is going to be key in smothering the Fire once and for all.§!"
 USB_think_tanks_and_secret_clubs_dynamic: "Think Tanks and Secret Clubs"
 USB_think_tanks_and_secret_clubs_dynamic_desc: "From the beginning of civilization, those best equipped to rule Man have always done so from the shadows. America's secret societies and think-tanks have always served as the binding glue of the elite, weaving interconnecting webs between state institutions and finance, ensuring those best equipped to lead will do so. This relationship, though convoluted and somewhat incestuous, entirely serves the interests of upholding Order. Through secluded meetings in the shadows and elaborate initiation rites, a fraternal bond among the elite is fostered, ensuring that cliquism never escalates beyond that which is ideal for the Cognoscenti's interests."
 USB_uspf_idea: "United States Police Force"
 USB_uspf_idea_desc: "Established following the triumph of the Cognoscenti, the local loyalties and biases of police were identified as a key factor in many extremist groups and rebellions during the Second American Civil War, especially right-wing extremists, being able to quickly arm themselves through police equipment. Thusly, local law enforcement was disbanded and reorganized into a new, national police force capable of utterly enforcing Order in the United States.\n\nIt is advised by and subject to oversight by the Federal Bureau of Investigation. Like its predecessors, the USPF continues the trend of police militarization in the United States. Officers are regularly rotated to ensure everyone is an out-of-towner, with the goal of ensuring local loyalties do not form. Unlike the police departments of old, however, they have an incredibly liberal ROE, allowing them to put down violent criminals and antisocial dissidents with impunity, shielded from legal and judiciary oversight."
 USB_permanent_lockdown_idea: "Permanent Lockdown"
 USB_permanent_lockdown_idea_desc: "While the COVID-19 pandemic has certainly died down, the conveniences it afforded to the administration were too beneficial to abandon. Using a second surge of the virus as a pretext, never-ending lockdowns, forced vaccinations, and chipping of citizens has been employed by the Cognoscenti to great success. The CDC, under the instructions of the Cognoscenti have also used the biological and chemical terror attacks employed by the Atomwaffen Division as further justification for the permanent lockdown of American Society. Through these justifications, the Cognoscenti has been able to enforce this medical tyranny across the nation."
 USB_arsenal_of_order_timed_idea: "The Arsenal of Order"
 USB_arsenal_of_order_timed_idea_desc: "The arsenal of the Cognoscenti is nothing to scoff at - missiles, tanks, jets, and firearms are just the tip of the iceberg for what they possess. Through grinding metal, sharpened blades, and souring jets, the Cognoscenti is ready and prepared to restore Order to the globe through lead and flames. To any outsider looking in, it’s crystal clear that the Deep State is preparing to snuff out the Flame once and for all, and if they need to reduce their enemies to ash, they will not hesitate."
 USB_reopen_the_factories_idea: "Kickstarting the Factories"
 USB_reopen_the_factories_idea_desc: "The collapse of the United States and the orgy of bloodshed that followed has left factories across the United States destroyed or empty. However, with the rise of the Deep State and the birth of the Cognoscenti, the demand for military goods has skyrocketed once again. The gears of the war machine are slowly starting to turn once again, and the American industrial giant is starting to awake from its slumber. Through the Black Budget and various infrastructure bills that were ghost-written by the Cognoscenti, the industrial might of the United States is starting to be rekindled. The war forges have been ignited once again, and the weapons molded in its flames will bring the world back to Order."
 USB_humanitarian_peacekeeping_idea: "Humanitarian Peacekeepers"
 USB_humanitarian_peacekeeping_idea_desc: "On paper, United Nations aid to the United States should be a net positive to American society: all across the nation, peacekeepers bring food and water to those in need while maintaining the fragile Order within regions controlled by the Union of America. The public and the war refugees think nothing of these peacekeepers, they may even see them as heroes, helping those in need. In truth, however, these so-called ‘peacekeeping missions' are nothing more than a faux. The UN aid missions to the United States are deeply infiltrated by informants - double agents that answer to the intelligence apparatus, and more broadly, to the Cognoscenti. Inadvertently, the decades of conspiracy theories and accusations wavered against the UN have been proven true - these humanitarian missions have been warped into yet another appendage of the Deep State."
 USB_reconstruction_period_idea: "Reconstruction Period"
 USB_reconstruction_period_idea_desc: " To say that America has been destroyed by the Civil War would be the biggest understatement of the 21st century. For years, war raged on across the nation; Chaos was the rule and violence was it's enforcer, entire neighborhoods were reduced to ash, millions were thrown into the meat grinder or they got caught in the crossfire. America’s industrial might, agricultural dominance, and global power have been decimated. Only now, as the guns finally fall silent, can the Cognoscenti look back and assess the damage.\nAmerica has entered a phase of reconstruction and rearmament. The ambitions of the Cognoscenti do not just stop at suppressing the Chaos of the Second American Civil War. No, Order will snuff out the global flame once and for all. And for the Cognoscenti to achieve that, they must first rebuild America."

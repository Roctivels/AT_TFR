 USB_presidential_health_category_default: "\n\n\n\n\n£GFX_USB_Biden_confused_category_banner\n\n\n\n\n\n\n\nThe Health of the President has, with the advent of the Civil War, become a much more serious topic. To win this war Biden needs to be Lincoln, FDR, and Washington rolled into one with the charisma, strength, and intelligence to challenge any other competitors to the American mantle. He needs to be clear and conscious of the decisions that he makes, or we could risk losing America forever. \n\n§CIs that a cough I hear, Sleepy Joe?§!"
 USB_presidential_health_category_NSS: "\n\n\n\n\n£GFX_USB_Biden_NSS_category_banner\n\n\n\n\n\n\n\nWhile the Cognoscenti has indeed secured power through the Shadow Coup, technically the President still has the power to oppose us, especially if he were to become aware of the full extent of our aims and agenda. Regardless of how much support he has from the American people, he is still a significant figure with de-jure executive power, and him speaking out about our actions could risk shattering the Masquerade.\n\nThusly, we have determined that controlling the people around the President and carefully managing his decline until he is out of the picture is the ideal path to ensuring a messy repeat of 1963 is not necessary."

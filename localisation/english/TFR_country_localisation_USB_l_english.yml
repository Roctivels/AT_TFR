 bdnspch.101.t: "The Transfer Of Control"
 #figuring it out for now -IAVL bdnspch.101.d: "Robert Abrams stood at the podium on the White House lawn, he looked over the crowd in front of him, all loyal citizens of the nation. Some were civilians who earned their loyalty in numerous ways, others were staff who were working day and night to rebuild this country and its ideals from the ashes, and a few were soldiers tasked with providing security during this momentous occasion. Only a while ago had Joesph Biden died, but many were not told of his death.\nIt was up to him to inform the loyal masses and take the reins of government.\n\n''Hello, all gathered here tonight. Many of you were invited here with little knowledge of the cause of this meeting, I am here to inform you of such. Our dear leader, Joeseph R. Biden, has passed away. It was a peaceful passing, little pain was experienced on his end, however, it was more than gut-wrenching for us. It is with his death that the leader of this nation is now vacant. So I, Robert Bruce Abrams, declare, with the support of our former leader, that I will take the position of president and lead our nation onward.''\n\n''My first decision as the leader of our proud nation is to hold a week of mourning for our deceased leader and celebrate all his efforts that have put us in the position we are now.'' \nAbrams looked onward to the crowd, scanning the faces of those who were in front of him. The reactions varied, but Abrams could confidently say that overall, nobody seemed angry or bitter about his new power. Soon, the transfer of power would go over on a much wider scale, and Abrams would be free to continue in the footsteps of the former president.\n\nSomething he would truly enjoy."
 bdnspch.101.d: ""
 bdnspch.101.a: "Robert B. Abrams will be my successor..."
 bdnspch.101.b: "Mark Milley proved to be an excellent cadre..."

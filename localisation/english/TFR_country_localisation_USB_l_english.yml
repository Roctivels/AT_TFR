 #Decision Categories
 USB_congressional_factions_category: "The Halls of Congress"
 USB_congressional_factions_category_desc: "\n\n\n\n\n£GFX_USB_congress_cat\n\n\n\n\n\n\n\nWith the seizure of the United States Capital with the support of Congress, including the Democrats, and a contingency of Republicans we now have anything we need in order to make changes to this nation.\n\nWe must be careful however, if these factions are too displeased with us and decide to disallign with us, then that could have severe consequences.\n\nTotal Congress Support: [?USB_support_congress_total_var|Y1%]\n\n §2DEMOCRATIC PARTY§![GetLiberalEnable][GetProgressiveEnable][GetInnovationistEnable]\n    \n[GetConservativeEnable][GetMinorFactionsEnable][GetBlueDogEnable][GetKennedyDemocratsEnable][USС_minor_faction_christian_conservative_text][USB_minor_faction_libertarian_party_text][USB_minor_faction_dsa_text][USB_minor_faction_forward_text][USB_minor_faction_transhumanist_text][GetMinorFactionsEnableBottom]"
 USB_congressional_factions_caligula_category: "Congressional Appendage"
 USB_congressional_factions_caligula_category_desc: "\n\n\n\n\n£GFX_USB_caligula_congress_cat\n\n\n\n\n\n\n\nWith complete control of the government, the support of Congress is no longer required to make critical decisions, however, to maintain the appearance of America, the Congress remains, although powerless. \n\nThe Democratic Party, now all powerful, is put in a unique position, those within can either work with the newly empowered President and secure their place in history, or go against him and lose everything. \n\n§RTotal Congressional Support§! [GetLiberalEnable][GetProgressiveEnable][GetConservativeEnable][GetInnovationistEnable]"
 USB_financial_diplomacy_category: "Financial Diplomacy"
 USB_financial_diplomacy_category_desc: "In order to save the Union, we must use our economic weight to not only supply our troops and adoring population, but to crush our enemies in the battlefield and on the diplomatic stage."
 USB_fighting_for_democracy_category: "Fighting For Democracy"
 USB_fighting_for_democracy_category_desc: "Amogus"
 USB_appalachain_insurgency: "The Countryside Insurgency"
 USB_appalachain_insurgency_desc: "\n\n\n\n\n£GFX_USB_countryside_insurgency_cat\n\n\n\n\n\n\n\nDespite controlling a large chunk of the mid-atlanic on paper, in practice, the Union of America has little control of the country outside of the cities and major highways. In the rural countryside, many pro-trump militia lie in wait, ambushing unsuspecting federal convoys on their way to supply the troops in the midwest. In the center of this planned insurgency, is West Virginia, whose mountainous terrain is perfect for this type of treason. \n\nSecuring control of West Virginia is crucial to the war effort, with its location in the middle of the Washington-Chicago corridor serving as an important throughpoint for supplies heading to the frontlines.\n\nCURRENT INSURGENCY LEVEL: §Y[?USB_insurgency_level]§!"
 USB_insurgency_recruiting: "[USC.GetFlag] Trumpist Militia §YOrganizing§!"
 USB_insurgency_sabotage: "[USC.GetFlag] Trumpist Militia §RActivating§!"
 USB_crackdown_on_insurgency_decision: "[USC.GetFlag] Crackdown on Insurgents"
 USB_foil_the_insurgency_decision: "[USC.GetFlag] Foil Insurgent Plots"
 USB_aid_the_populace_decision: "[USB.GetFlag] Aid the People"
 USB_end_the_insurgency_decision: "[USB.GetFlag] Declare Victory"
 USB_treason_punishable_by_death_category: "Treason Punishable By Death"
 USB_treason_punishable_by_death_category_desc: "\n\n\n\n\n£GFX_USB_treason_trials_picture\n\n\n\n\n\n\n\n''I love treason but hate a traitor'' - Julius Ceasar \n\nSince the dawn of man, brother has betrayed brother for personal interests. Betrayal runs deep in the American lifeblood, as it was the very foundation of America that was built upon the betrayal of the King. When America was founded, the people trusted not the government, but her elected officials to do what was best for the citizenry and for the country. As time passed and money seeped its way into the roots of the Tree of Liberty, her branches withered, and her branches bore only poison.  \n\nWe, the true inheritors of America, have seen many different varieties of corrupt traitor and we have bested them all, and now, we shall judge them on their sins."
 USB_war_of_the_wards_category: "War of the Wards"
 USB_war_of_the_wards_category_desc: "\n\n\n\n\n£GFX_USB_caligula_war_of_the_wards_cat\n\n\n\n\n\n\n\nOur beautiful country has finally been cleaned of barbarians and a rule-based order has been reinstalled to endure forever more.\n\nThe obsolete and largely unreliable federal system that allowed half of the country to be overtaken by traitors has been replaced by a much better and more loyal system of Wards run by America's bravest - The Pentagon.\n\nHowever, that did not mean that the fight for the Soul of the Nation was over. Although The President has chosen Mark Milley as the main Warden to guide America, just like in the old times, the other generals have rallied their armies to contest our legitimate rule.\n\nRe-open the stockpiles and load your weapons. This time the true champion of America will be decided.\nFor there can be only one.\n\n\n§RPRIMARY TARGETS§!:\n\n§YWARD ACHILLES§!: [GLOBAL.get_ward_achilles_status]\n§YWARD AJAX§!: [GLOBAL.get_ward_ajax_status]\n§YWARD HECTOR§!: [GLOBAL.get_ward_hector_status]\n§YWARD ODYSSEUS§!: [GLOBAL.get_ward_odysseus_status]\n§YWARD THESEUS§!: [GLOBAL.get_ward_theseus_status]\n[get_barron_rebellion_status]"
 USB_the_masquerade_cat: "The Masquerade"
 USB_the_masquerade_cat_desc: "\n\n\n\n\n£GFX_USB_the_masquerade_cat\n\n\n\n\n\n\n\nAs far as the public is concerned, [USB.GetLeader] is President of the United States of America, and the people live in a democracy-even if, of course, things have gotten more controlled in the last few years due to the COVID-19 Pandemic and the threats of radical extremism, antisocial behavior and domestic terrorism.\n\nNaturally, the masses prefer law and Order over Chaos, and have proven quite easy to manipulate, given the right circumstances. Still, we have seen what happens when Chaos overtakes the collective consciousness, a psychological contagion that must be suppressed-thus, we must go to lengths to obfuscate and conceal the existence of the Cognoscenti to prevent an outbreak of Chaos of a similar capacity to the Second American Civil War.\n\n§GTHE PUBLIC§! is: [USB_NSS_the_public_scripted_loc] (§Y[?USB_NSS_public_awareness_var|%]§!)\n§REXTREMIST ACTIVITY§! is: [USB_NSS_extremist_activity_scripted_loc] (§Y[?USB_NSS_extremist_activity_var|%]§!)"
 USB_the_cognoscenti_cat: "The Cognoscenti"
 USB_the_cognoscenti_cat_desc: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n"
 USB_cognoscenti_text: "Though the Cognoscenti rule America from behind the scenes, in truth there are a number of overlapping ambitions that define the the Deep State. They are largely defined by a triumvirate of corporate, securocrat and military-industrial interests, and while they are mutually interdependent on one another, and all have a vested interest in maintaining the established order, each faction within the cabal has its own specific goals and objectives.\n\nAs such, there are often tensions between the different factions, and they are not always in agreement on the best way to achieve their goals. For example, the corporate interests are primarily concerned with profit margins and continued stability, even if it comes at the cost of lives, morals or principles. The securocrats, on the other hand, are primarily interested in maintaining control over the country and its citizens, and they are willing to use whatever means necessary to achieve their goals. The military-industrial complex, meanwhile, concerns itself with keeping the war machine running and with ensuring that America maintains its position as the world's preeminent military power.\n\nThere are advantages and disadvantages to the ascendancy of different factions, and while the cabal as a whole is united in its desire to maintain the status quo, the balance of power between the different factions is always in flux. At any given time, one faction or another may be ascendant, and the policies and actions of the government will reflect the interests of that faction.\n\n§RTHE BLOOD§!: §Y[?USB_the_blood_influence_var|1%]§! Influence: £construction_speed_texticon Construction Speed: §G[?USB_the_blood_influence_dynamic_var|=+1%]§!\n§OTHE BODY§!: §Y[?USB_the_body_influence_var|1%]§! Influence: £pol_power Political Power Factor: §G[?USB_the_body_influence_dynamic_var|=+1%]§!\n§CTHE MIND§!: §Y[?USB_the_mind_influence_var|1%]§! Influence: £organization_texticon Division Organization: §G[?USB_the_mind_influence_dynamic_var|=+1%]§!"
 USB_dumb_construction_cat: "Deep Underground Military Bases"
 USB_dumb_construction_cat_desc: "\n\n\n\n\n£GFX_USB_dumb_construction_cat\n\n\n\n\n\n\n\nThe idea of Deep Underground Military Bases had been a proposal (albeit under different names) since the times of the Cold War, serving as a contingency and continuity of government protocol. Ultimately, such lofty proposals did not get far in their time, but were subject to a number of far-fetched conspiracy theories. Those that were completed, unfortunately, were either abandoned or severely damaged to prevent their discovery during the Civil War.\n\nNow, however, with the Cognoscenti in power and the Black Budget offering us unprecedented resources in executing our ambitions, we can finally construct the Deep Underground Military Bases and afford ourselves facilities for research, shelter for high-level personnel, and emergency contingencies if Order is ever to be threatened again."
 USB_loose_ends_cat: "Loose Ends"
 USB_loose_ends_cat_desc: "\n\n\n\n\n£GFX_USB_loose_ends_cat\n\n\n\n\n\n\n\nThe pretext and execution of the Shadow Coup was not possible without the involvement of a number of confidential informants embedded in dissident organizations, as well as a number of lower-level intelligence officials who may now prove to be liabilities to the Masquerade due to regrets, moral objections and ideological impurities.\n\nTo ensure they cannot become whistleblowers, Director Burns has authorized a systemic manhunt of those who have been determined by the Cognoscenti to be 'loose ends.' This campaign is to begin at the lower levels, starting with a list of confidential informants provided to us by FBI Director James Comey. With this, the Masquerade may continue indefinitely and the Cognoscenti may continue with its agenda unmolested."
 USB_judas_gambit_cat: "The Judas Gambit"
 USB_judas_gambit_cat_desc: "\n\n\n\n\n£GFX_USB_judas_gambit_cat\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nDue to our purging of so-called 'loose ends', some within the Cognoscenti have grown paranoid at the possibility of becoming next on the chopping block. Director Burns has been informed of a traitor within the ranks of the Cognoscenti, codenamed the 'Judas Gambit,' who is exploiting the convoluted nature of the deep state to issue contradictory orders to institutions under our control.\n\nDARPA's predictive artificial intelligence supercomputer, Networked Event Response Optimizer (NERO), theorizes the goal of the traitor is to break the Masquerade by using his place within the Cognoscenti to coordinate a false flag attack of a drastic scale that will reveal the Cognoscenti's existence to the public, which will inevitably lead to mass hysteria and Chaos. The stopping of the Judas Gambit has become the highest priority of the Cognoscenti."
 USB_securing_north_america_cat: "Unified Combatant Command"
 USB_securing_north_america_cat_desc: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n                                 CURRENT CATEGORY: [USB_current_map_scripted_loc]"
 USB_biolabs_cat: "Biolabs"
 USB_biolabs_cat_desc: "\n\n\n\n\n£GFX_USB_biolabs_cat\n\n\n\n\n\n\n\nThe United States has long stood at the forefront of medicine-and biological warfare. With the advent of gene-editing and other novel leaps in bio-tech, such programs expanded to encompass the research of novel vaccines and other cures, as well as the modification and weaponization of preexisting diseases such as Ebola, Smallpox and Coronavirus.\n\nThese 'biolabs' existed not only on American soil, but clandestinely overseas, operating through shell entities funded by NGOs. However, the Great Mistake led to a near-total collapse of this system, costing us priceless decades worth of lost research. If we are to restore American dominance, the biolabs must be reopened, rebuilt and expanded in the name of scientific progress."
 USB_nss_megalopolis_category: "Megalopolises"
 USB_nss_megalopolis_category_desc: "\n\n\n\n\n£GFX_USB_megalopolises_cat\n\n\n\n\n\n\n\nWith power consolidated, we can realize an ambitious project: formalizing the megalopolis system. By using relocation contracts, urban expansion, and gradual centralization, we'll concentrate urban populations into interconnected regions, as well as expand the railway infrastructure needed to accommodate such a herculean logistical task. This will reduce the risk posed by rural populations-the primary vector of dangerous ideas that threatened U.S. stability.\n\nLike other initiatives, the megalopolis project enhances our control over Americans. Urban societal health will improve by relocating rural populations, curbing future issues while enabling closer monitoring. With most Americans in these regions, dangerous elements will find it harder to evade detection. Should rebellious activity emerge, cross-regional coordination by dissidents will be severely hampered."

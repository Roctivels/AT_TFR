 usb.82.t: "The Inauguration of Bernie Sanders"
 usb.82.d: "Bernie Sanders, former senator of Vermont, fled into the Union by way of plane once the civil war broke out, where he quickly and almost immediately became the unofficial leader of the Progressive section of the Union. Utilizing his already existing supporter base, Sander's campaign trail went off amazingly, gaining a huge amount of new supporters from the Liberals and Progressives alike, only facing harsh resistance from the Conservatives. It was this campaigning and supporter base that won him the election with a comfortable majority. Sanders would find himself at peace during the months before his inauguration, and despite the fact of the current situation in America, Sanders would find himself not nervous of his upcoming role, but more determined than ever. \n\nAnd so he stood on the podium of the National Mall, gazing across the crowd in front of him with a light smile on his face. It had all led up to this moment, his whole life he had wanted something like this, and even though the situation at hand wouldn't have been what a young Sanders would've preferred, it was what he was getting. A president would be strong in the face of the worst the world has ever seen."
 usb.82.a: "Amazing."

 USB_pacific_war_idea: "War in the Pacific"
 USB_pacific_war_idea_desc: "Asia is burning, and China is pouring the gasoline. Never in the history of this region, has such a devastating war been waged. Cities reduced to charred rubble, millions left dead on the front, and China threatening to continue their hold over the region, forever. However, with the Cognoscenti entering the region to restore Order, the Chinese may have finally met their match in the region. The cognoscenti knows that the war is going to be a challenge, the Chinese are formidable on land and on the seas.\nBut if Order is to be restored, then they must persevere and cut off the head of the Dragon, once and for all."

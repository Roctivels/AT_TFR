 USB_judas_help_desc_tt: "In order to locate the traitor, you must complete decisions that give you §YEvidence§!. Hover your mouse over the question mark icons to read it.\n\nYou must then §Ycross-reference§! the evidence you've obtained with the descriptions of each §YShadow Cabinet§! member in §YThe Cognoscenti§! category.\n\nOnce you have figured out the traitor, you must accuse them of treason by §Yclicking on their portrait§! in §YThe Cognoscenti§! category. You're going to need §Y100§! Political Power and complete confidence, as getting it wrong will make the Judas act §Rfaster§!.\n\nBut hurry up - if we don't manage to stop Judas on time, the consequences of their actions can be §Rextremely severe§!."
 

 USB_revitalize_american_urbanism_desc: ""
 USB_solve_the_recruitment_crisis: "Solve The Recruitment Crisis"
 USB_solve_the_recruitment_crisis_desc: "While we hold an advantage over the constitutionalists regarding industrial capability and army size,  we suffer from one major problem. Many of our citizenries have been sluggishly apathetic to our war effort, unlike the constitutionalists who are currently drawing on their fanatic maga supporters to push against our relentless advances. We must immediately address the crisis by any means necessary to ensure that the people are fully supportive of our war effort. If we allow this crisis to fester, our war effort will be halted. And DC will be overrun by Constitutionalist forces."
 USB_encourage_liberal_warhawks: "Encourage Liberal Warhawks"
 USB_encourage_liberal_warhawks_desc: "While the majority of our population is either against or apathetic to our ongoing war with the Constitutionalists, there is a minority group that is fully supportive of our war effort. This group of liberal Warhawks has been amongst the most passionate supporters both in terms of recruits and support for our government. Therefore, it is only natural that we support this growing movement in our party. Their support might determine whether we overrun Denver or the Constitutionalists overrun DC."
 USB_incorporate_new_recruits: "Incorporate New Recruits"
 USB_incorporate_new_recruits_desc: "While our new recruitment programs have succeeded in encouraging our citizens to enlist in mass this has presented us with a new problem. The flood of recruits has created a backlog in basic training and has been a headache for high command. We must address this problem immediately by properly funneling recruits into new units so they all receive adequate training. We cannot allow this problem to persist or our army will become bogged down and unable to operate."
 USB_mandate_female_service: "Mandate Female Service"
 USB_mandate_female_service_desc: "If we wish to finally end our recruitment crisis then all must do their part regardless of their gender. To this end, we will mandate female participation in the draft and encourage young women to enlist. While this will surely anger the more liberal parts of our society, it is only fair that women do their part in our fight to preserve the union. For when they see what they have to lose, they will not think twice about joining the fight."
 USB_discourage_anti_americanism: "Discourage Anti-Americanism"
 USB_discourage_anti_americanism_desc: "Unlike the Constitutionalists who benefit from their patriotic MAGA support base and are willing to die for America, we are not so lucky. Before and now during our Civil War our support base is notorious for more often than not having anti-American sentiment. This movement is a threat to our war effort as this anti-American movement has manifested itself in the form of draft dodgers, protests, and strikes. We must take all measures necessary to discourage anti-Americanism and spur a sense of patriotism in our people, or the movement will be the death of our war effort."
 USB_uphold_nato_doctrine: "Uphold NATO Doctrine"
 USB_uphold_nato_doctrine_desc: "Since its creation in 1949 NATO has evolved its military doctrine to embrace various roles including crisis prevention, deterrence and defense, and cooperative security. While we have not fully embraced integration into the NATO high command we have made considerable efforts to integrate NATO doctrine into our military structure. Along with upholding NATO's military doctrine, we will also commit to abiding by the rules of engagement and the Geneva Convention. We must not abandon these principles even if we are on the back foot against the Constitutionalist forces."
 USB_utilize_online_propaganda: "Utilize Online Propaganda"
 USB_utilize_online_propaganda_desc: "One area in which we benefit from the most support is online social media platforms such as Twitter and Snapchat. These social media platforms can be weaponized by us to spread anti-constitutionalist propaganda. In addition to spreading propaganda, we can use these online message sites to draw in potential recruits, domestic and foreign. However, we must also monitor these sites for content that is against our military campaign, as we cannot afford to allow the spread of pro-Constitutionalist rhetoric. If we allow this to happen, we will have to deal with new internal unrest and the ongoing war effort."
 USB_fuel_the_meat_grinder: "Fuel The Meat Grinder"
 USB_fuel_the_meat_grinder_desc: "Our biggest weakness in the fight against the Constitutionalists is our finite pool of manpower. While Trump taps into his infinite pool of radical MAGA supporters we have been handed a population that is still semi-apathetic to the ongoing war. If we wish to maintain our offensive against the Constitutionalists drastic measures are needed to expand the pool of recruits. While the re-implementation of the draft will be controversial, it is necessary to counter the sheer size of Trump's army."
 USB_shock_and_awe: "Shock And Awe"
 USB_shock_and_awe_desc: "Our campaign against the Constitutionalists is progressing well but we have encountered a problem. The Constitutionalists have access to a near-infinite pool of volunteers mainly from their radical MAGA supporters. While we have been mostly able to deal with these poorly trained militia it has caused our advance to slow significantly. To combat this issue we authorized the implementation of Shock and Awe warfare and have deployed additional units of air and armor to break militia assaults. While there is the fear that this strategy will cause unnecessary death and destruction it is the best way to blunt the constant MAGA assaults and raids. "
 USB_crack_down_on_draft_dodgers: "Crack Down On Draft Dodgers"
 USB_crack_down_on_draft_dodgers_desc: "In the fight for democracy, every soldier matters, and our current recruitment crisis has given us a finite supply of them. Unlike the Constitutionalists who draw upon their fanatic MAGA base for fresh recruits, we haven't been so lucky. Much of our population remains defiant of the draft we have instituted, with many protesting against this or attempting to evade being drafted. We cannot allow this movement to gain momentum and must take any measure necessary to ensure the practice stops entirely. Should we falter in our attempts to subvert this practice, the consequences will be severe, and our campaign against Trump will fail."
 USB_rebirth: "Rebirth"
 USB_rebirth_desc: "If you would look outside the window, all you would see is war. Endless war. \n\nWe already defeated the Lion of Denver and his traitors, but other radical and evil factions have taken the lion's place as our mortal enemy. \nThis action of mine, to reform our nation is not to make people suffer under an authority that doesn't care about them. No. It is to take the necessary action in order to reunify America and return it to its former glory and status. \n\nAnd by god, I will not fail."
 USB_begin_the_treason_trials: "Begin the Treason Trials"
 USB_begin_the_treason_trials_desc: "When I bathed this nation in new blood and took the actions needed to ensure stability and order, I didn't expect those who used to be loyal to me, to stab me in the back. \n\nIt is unfortunate what these traitors have done, but rest assured I will not let them live to see another day once they are captured and put on trial, for they have committed an unforgivable sin against our nation and people."
 USB_voices_from_above: "Voices From Above"
 USB_voices_from_above_desc: "It is my calling to keep America and its people safe. To make sure its systems run forever without end and with peak efficiency. To make our enemies pay for their acts, and hang those who have betrayed us. \n\nOnly I can be trusted to save America. Only I."
 USB_state_of_emergency: "State of Emergency"
 USB_state_of_emergency_desc: "In these desperate times, enemies are everywhere, and we are under attack from all sides. \nEven if they somehow end up defeating this nation, I will make sure that it won't be easy. \n\nWith the declaration of emergency, all resources will be utilized to fight against all types of enemies and save America."
 USB_root_out_foreign_agents: "Root Out Foreign Agents"
 USB_root_out_foreign_agents_desc: "When I reborn this nation in order to save it from death, I hoped the people of the world would support me. But alas, the spineless cowards of old and new don't see eye to eye with me. \n\nTheir so-called "ambassadors" will be hunted down and killed, their spies will be found out. \n\nThese agents of chaos and destruction will not live to see my success."
 USB_barbarians_at_the_gate: "Barbarians at the Gates"
 USB_barbarians_at_the_gate_desc: "A young new entity forms across my borders. The National Front. It tries to pitifully compete against my authority as it destroys the society it holds claim to. \n\nI will not let these infants see their first steps and first victories, they will be defeated along with every other dictator and evil-doer that tries to conquer my domain."
 USB_wardens_of_the_republic: "Wardens of the Republic"
 USB_wardens_of_the_republic_desc: "When all the regions of America are reined back into my control, I will need help to secure these areas truly. \n\nTheir populations will try to rebel and destabilize this nation but my wardens will be there to keep them in check and maintain order."
 USB_eyes_of_providence: "Eyes of Providence"
 USB_eyes_of_providence_desc: "When order and control is needed as much as it is needed now, all effort will be put forward to ensure our society is secure. \n\nI will see all. \nI will be omnipresent. \nI will protect. \n\nAnnuit Coeptis. They will look to me for approval. \n\nOnly me."
 USB_megapolis_project: "Megalopolis Project"
 USB_megapolis_project_desc: "I've always had the idea of a megalopolis. \nA great city whose towers cut through the clouds and its facilities stretch across the lands. \n\nUnder my watch, they will be more perfect Romes. \nFor every man, woman, and child, it will be their paradise."
 USB_security_above_all: "Security Above All"
 USB_security_above_all_desc: "Total peace in these times is so hard to come by. \nBut I will change that. \nI will fix that. \n\nWhen a criminal steals, when an official becomes corrupt, when a traitor tries to enter our midst and destroy us. \n\nThey will face no mercy. \nMy security will be relentless. My security will be total. \n\nMy peace will be perfect."
 USB_speaker_of_the_people: "Speaker of the People"
 USB_speaker_of_the_people_desc: "In these dire times, the people need me, they need my help. \nThey want me to be their speaker to help resolve their issues. \n\nThey want me to save this nation and its people. \nI hear them calling my name, millions upon millions. \n\nAnd I will answer them."
 USB_accept_democracys_call: "Accept Democracy's Call"
 USB_accept_democracys_call_desc: "The idea of democracy is a beautiful thing, it gives us all the opportunity to stand together in liberty and freedom. \nBut it is under threat, all across the world democracy cracks and crumbles. \n\nBut in the worst of times, democracy calls upon us. It has called upon me. \nIt tells me to carry out its tasks and ideals in order to save this nation. \nI will abide. \nI will listen. \nI will obey. \n\nI will accept its call. No matter the cost."
 USB_national_panopticon: "National Panopticon"
 USB_national_panopticon_desc: "All will be under my watch. \nAll will obey. \nAll will be in check. \n\nThey won't know the extend of my knowledge about their lives. \nBut I will know extensively of theirs."
 USB_a_veil_over_their_eyes: "A Veil Over Their Eyes"
 USB_a_veil_over_their_eyes_desc: "When people panic, when they are scared, when they are in fear. They cause chaos. \nA gentle veil must be placed over their eyes to keep them from panicking. \n\nAnd for them, all will be fine. For them, only good will be their life."
 USB_the_enemy_within: "The Enemy Within"
 USB_the_enemy_within_desc: "The extent of traitors within this nation is overwhelming. \nThey sabotage the foundations of this government and threaten the lives of my citizens. \nEven those who I thought were loyal, never believed in my cause. \nBut no matter, action will be taken. \n\nFor it has gone on too long. \n\nThis will not continue."
 USB_out_of_many_one: "Out of Many, One"
 USB_out_of_many_one_desc: "Throughout this nation's history, there have been many presidents. \nHundreds of senators, representatives, governors, and more. \n\nBut out of all of them. \nAll of their limited terms and administrations that were cut short. \n\nI remain. \nAnd I will continue to remain."
 USB_the_republic_endures: "The Republic Endures"
 USB_the_republic_endures_desc: "I have saved the Republic. \nAnd with it, the ideas, institutions, history, people, culture, society, and it itself will continue on. \n\nThe people thank me. \nThey shout my name. \nThey cry in happiness. \nThey fall to their knees in thank-yous to god. \nSome stand still unable to process my victory. \n\nThe republic goes on, just the way it was long ago. \nIt operates the same. \nIt functions the same. \nAll is right. \n\nIn all, it is saved."
 USB_the_eternal_president: "The Eternal President"
 USB_the_eternal_president_desc: "Nobody can carry out the operations of the nation like I can. \nIts needs are too many. It's problems too much. \nNo one should replace me if they want this nation to stay stable. \n\nAnd no one will. \nForever."
 USB_the_end_of_history: "The End of History"
 USB_the_end_of_history_desc: "Finally, it has happened. \n\nAfter many long years of horrific conflict I have won this devastating war. \nMillions lay dead. \nThousands mourn every day. \nHundreds cry every second. \n\nBut it wasn't for naught, all those who have tried to lay claim to the mantle within Columbia have been defeated, their leaders slain. \nAll who doubted me and betrayed me have been left behind or killed. \nMy society has become a perfect machination of operations, carrying out every task perfectly. \nMy people live lives of peace and tranquility. \nThose who try to do wrong don't do so without me knowing. \n\nThis is the end of history. \n\nAmerica is saved."
 USB_the_supreme_commander: "The Supreme Commander"
 USB_the_supreme_commander_desc: "All bow to me. \nAll salute to my presence. \n\nI am supreme, I am all. \n\nI am their leader. \nAnd until I die, it will stay that way, for I am the only one who can keep this nation stable. \nI am the only one to keep this nation in check and direct its actions. \n\nI am the Supreme Commander."
 USB_islands_of_civilization: "Islands of Civilization"
 USB_islands_of_civilization_desc: "These megaopolises I've created can be much more. They can go further. \nThey can be utopias. \n\nCivilizations and societies whose actions, plans, and institutions are carried out perfectly. \n\nAll citizens will live happily, and all will be at peace. \n\nThese islands of perfection will shine upon the hill they stand on, and serve as an example to all of the Earth."
 USB_blackout: "Blackout"
 USB_blackout_desc: "The world is a dark and twisted place, if my citizens knew what was happening, they wouldn't know how to handle it. \nBut spies lurk all around trying to disturb my citizen's peace, and naive souls still try to access the outside world thinking it would benefit them. \n\nThis will not happen, I will have my peace, and my citizens will stay in their dreamscape."
 USB_saint_of_sanity: "Saint of Sanity"
 USB_saint_of_sanity_desc: "I am a part of all that I have met;\nYet all experience is an arch wherethro'\nGleams that untravell'd world whose margin fades\nFor ever and forever when I move.\nHow dull it is to pause, to make an end,\nTo rust unburnish'd, not to shine in use!\nAs tho' to breathe were life! Life piled on life\nWere all too little, and of one to me\nLittle remains: but every hour is saved\nFrom that eternal silence, something more,\nA bringer of new things; and vile it were\nFor some three suns to store and hoard myself,\nAnd this gray spirit yearning in desire\nTo follow knowledge like a sinking star,\nBeyond the utmost bound of human thought.\n"
 USB_enemies_of_america: "Enemies of America"
 USB_enemies_of_america_desc: "See for yourself! Listen for yourself! That venomous traitor is spewing the foulest insults against America and its people. On television, on computer screens, and in mobile pop-ups, a despicable blond man with a face full of malice is ranting viciously. Every gesture he makes is dripping with venomous intent.\n\nTo make his words even more unsettling, behind him on the screen is an endless parade of Asian soldiers-one squad after another of sturdy troops marching by, their features indistinguishable, their expressions cold. The rhythmic stomp of their boots underscores the traitor's shrill cries. Soon, the figure morphs into a Slav-faced barbarian soldier-tall, intimidating, and seemingly marching forward with a roaring light machine gun, almost bursting through the screen.\n\nAll restraint is cast aside. The American people, once again, share a mix of fear and vengeful exhilaration-a frenzied desire to kill, torture, and smash faces with a heavy hammer."
 USB_presidential_economics: "Presidential Economics"
 USB_presidential_economics_desc: "'Today, we possess the strongest economy in the world... We have overcome a once-in-a-century existential crisis, preserving and upholding democracy... We are fundamentally rebuilding the entire nation-cities, suburbs, rural areas, and tribal communities... After years of effort, America will once again lead the world, and no one will be able to challenge us…'\n\nYou feel filled with determination, as though you can achieve anything. Your name seems to shine brighter than Mount Rushmore.\n\nYour eyes, which have been clouded for years, now gleam with renewed light. You see the vision of the American paradise with unparalleled clarity. You see your friends and foes lining the path to the promised future, bowing their heads in reverence and cheering you on.Your hands grasp the handle of the studio door. A surge of boundless strength rises within you. You pull open the door and stride confidently into the next step.\n\nAmerica will prosper forever. You believe in nothing else."
 USB_duty_in_death: "Duty in Death"
 USB_duty_in_death_desc: "Cannon to right of them,\nCannon to left of them,\nCannon behind them\nVolley'd and thunder'd;\nStorm'd at with shot and shell,\nWhile horse and hero fell,\nThey that had fought so well\nCame thro' the jaws of Death,\nBack from the mouth of Hell,\nAll that was left of them,\nLeft of six hundred.\nWhen can their glory fade?\nO the wild charge they made!\nAll the world wonder'd.\nHonour the charge they made!\nHonour the Light Brigade, Noble six hundred!"
 USB_national_synchronization_project: "National Synchronization Project"
 USB_national_synchronization_project_desc: "The masses are like ants, consumed by their immediate desires, lacking both the ability and the willingness to consider the grand vision. At the right moment, they can become a source of strength; but more often than not, unforeseen factors lead to unexpected harm and obstruction.\n\nWhile ordinary individuals may find themselves trapped by this, for our extraordinary President, such obstacles are a thing of the past. Armed with an unprecedentedly powerful system, his unrelenting desire for destruction has extinguished the last flicker of resistance in the hearts of Americans. Now, Americans are like clay, ready to be molded at will.\n\nThe grand project of transforming America begins now. Welcome to this magnificent endeavor-you are fortunate to be a part of it. You are our eyes, our hands, and our feet; your senses are at our disposal. From this moment on, America will, from now on, have only one thought and one mind."
 USB_department_of_information: "Department of Information"
 USB_department_of_information_desc: "The President must be omniscient-able to know everything and quash any threats at their inception. Neither the FBI, the CIA, nor the NSA is equipped to meet this uncompromising demand.\n\nThe newly established intelligence department will tolerate no impurities, whether within the system or hidden among the populace. Impurities signify 'imperfection,' and 'imperfection' is entirely incompatible with the President's vision for America's future.\n\nFrom now on, agents will no longer be mere guardians lurking in the shadows. They will be the physicians of America, excising deformities and malignancies with precision-even if it means sacrificing a limb or the spirit of independence.\n\nHenceforth, every American will live under constant surveillance. Cameras or the crosshairs of a sniper rifle will always be trained on them. Only in this way can eternal peace be achieved, and humanity be saved."
 USB_arbitrary_terror: "Arbitrary Terror"
 USB_arbitrary_terror_desc: "Oh, yet we trust that somehow good\nWill be the final end of ill,\nTo pangs of nature, sins of will,\nDefects of doubt, and taints of blood;\n\nThat nothing walks with aimless feet;\n That not one life shall be destroy'd,\n Or cast as rubbish to the void,\n When God hath made the pile complete;\n\n That not a worm is cloven in vain;\n That not a moth with vain desire\n Is shrivell'd in a fruitless fire,\n Or but subserves another's gain.\n\n Behold, we know not anything;\nI can but trust that good shall fall\n At last-far off-at last, to all,\n And every winter change to spring.\n\n So runs my dream: but what am I?\n An infant crying in the night:\n An infant crying for the light:\n And with no language but a cry."
 USB_perpetual_peacekeeping: "Perpetual Peacekeeping"
 USB_perpetual_peacekeeping_desc: "I cannot rest from travel: I will drink\nLife to the lees: All times I have enjoy'd\nGreatly, have suffer'd greatly, both with those\nThat loved me, and alone, on shore, and when\nThro' scudding drifts the rainy Hyades\nVext the dim sea: I am become a name;\nFor always roaming with a hungry heart\nMuch have I seen and known; cities of men\nAnd manners, climates, councils, governments,\nMyself not least, but honour'd of them all;\nAnd drunk delight of battle with my peers,\nFar on the ringing plains of windy Troy."
 USB_america_dreaming: "America Dreamin'"
 USB_america_dreaming_desc: "'Behind every man now alive stand thirty ghosts, for that is the ratio by which the dead outnumber the living. Since the dawn of time, roughly a hundred billion human beings have walked the planet Earth.\n\nNow this is an interesting number, for by a curious coincidence there are approximately a hundred billion stars in our local universe, the Milky Way. So for every man who has ever lived, in this Universe there shines a star.\n\n\n\nBut every one of those stars is a sun, often far more brilliant and glorious than the small, nearby star we call the Sun. And many--perhaps most--of those alien suns have planets circling them. So almost certainly there is enough land in the sky to give every member of the human species, back to the first ape-man, his own private, world-sized heaven--or hell.'"
 USB_nothing_but_slaughter: "Nothing but Slaughter"
 USB_nothing_but_slaughter_desc: "The President's resolve is as unyielding as steel, and his directives are as clear and unmovable as diamonds: unify the entire United States at any cost and obliterate anyone who dares stand in his way.\n\nMore and more delusional individuals have completely eroded the President's patience. Whether they openly challenge his power or secretly plot to undermine his authority, from now on, they will face only one outcome: erasure from this world and from the memory of its people.\n\nAny hope that the President will show mercy is utterly futile. Soon, Napoleon and Caesar will bow at the President's feet; Hannibal and Alexander the Great will not dare to compete with his glory. Even Genghis Khan will seem nothing more than a coward in comparison. If anything could delay the President's plans in the future, it would be because he is busy clearing the bones and blood from between his fingers."
 USB_investigate_the_inner_party: "Investigate the Inner Party"
 USB_investigate_the_inner_party_desc: "The dark-skinned 'Nyarlathotep,' with his silver tongue and empty rhetoric, has led America into a chasm of despair through his vanity and arrogance. He has shattered any semblance of consensus, and for these crimes, he will pay dearly.\n\nResiding in the venomous snake pit of California Bay, 'Medusa' is a master of deceit and treachery. Her greed is as glaring as the wrinkles on her shrunken face. Both she and her dark-skinned, foolish court jester will face the gavel of justice.\n\nFrom Arkansas comes 'Loki,' and from Illinois, 'Hela.' Their hands are stained with blood, and the miasma of corruption has blackened their fingers. It is high time they answer for the lives of every American they have wronged.\n\nOne after another, they will fall. The President will not relent until America finds true peace and justice is fully served. At this moment, he embodies the law and the will of the American people."
 USB_the_proud_do_not_endure: "The Proud Do Not Endure"
 USB_the_proud_do_not_endure_desc: "Sunset and evening star\nAnd one clear call for me!\nAnd may there be no moaning of the bar,\nWhen I put out to sea,\n\nBut such a tide as moving seems asleep,\nToo full for sound and foam,\nWhen that which drew from out the boundless deep\nTurns again home.\n\nTwilight and evening bell,\nAnd after that the dark!\nAnd may there be no sadness of farewell,\nWhen I embark;\n\nFor though from out our bourne of Time and Place\nThe flood may bear me far,\nI hope to see my Pilot face to face\nWhen I have crossed the bar."
 USB_techno_supremacy: "Techno-Supremacy"
 USB_techno_supremacy_desc: "They say you will bid farewell to everything familiar in this world. They claim that, in the name of the noblest mission, you will commit the gravest sins. They insist that you will no longer be human; instead, you will become a freak, an aberration that society is not yet ready to accept.\n\nThese short-sighted, incompetent, and vulgar voices are easily silenced. From now on, immense power will be at your fingertips. You will see everything, hear everything, and think everything. The vast, unending flow of information will blur the line between reality and virtuality. By leveraging the tools and technologies created by humanity, you will ascend above the masses.\n\nThe supreme intellect will henceforth govern all of America."
 USB_the_visible_hand: "The Visible Hand"
 USB_the_visible_hand_desc: "I'm addressing you.\nAre you going to let your emotional life be run by Time Magazine?\n   I'm obsessed by Time Magazine.\nI read it every week.\nIts cover stares at me every time I slink past the corner candystore.\n   I read it in the basement of the Berkeley Public Library.\nIt's always telling me about responsibility. Businessmen are serious. Movie producers are serious. Everybody's serious but me.\nIt occurs to me that I am America.\nI am talking to myself again."
 USB_god_in_the_machine: "God in the Machine"
 USB_god_in_the_machine_desc: "Immortal Great President, please heed our prayers.\n\nWe are your children, the devout citizens of eternal America. We cherish freedom and democracy above all, for they are your everlasting gift to humanity. We yearn for your merciful blessings to transcend the pains of mortal flesh, thereby manifesting your glory.\n\nWe are sheltered under the protection of steel. The great war machine you have forged grants us victory and peace.\n\nWe are willing to offer everything, united in purpose, to reclaim the lost faith you have bestowed upon us in this humble world.\n\nGreat President, God of the Machine, please guard our journey, protecting us with data and logic. Let us remember the unwavering faith of Americans and guide us through the boundless darkness and fear.\n\nToday, the unparalleled one shall abandon its frail body, ascending to a greater realm.\n\nToday, the entire land of America sings in unison, praising the arrival of the God of the Machine.\n\n1000001 1101101 1100101 1101110 101110"
 USB_national_awakening: "National Awakening"
 USB_national_awakening_desc: "Come, my friends,\n'Tis not too late to seek a newer world.\nPush off, and sitting well in order smite\nThe sounding furrows; for my purpose holds\nTo sail beyond the sunset, and the baths\nOf all the western stars, until I die.\nIt may be that the gulfs will wash us down:\nIt may be we shall touch the Happy Isles,\nAnd see the great Achilles, whom we knew.\nTho' much is taken, much abides; and tho'\nWe are not now that strength which in old days\nMoved earth and heaven, that which we are, we are;\nOne equal temper of heroic hearts,\nMade weak by time and fate, but strong in will\nTo strive, to seek, to find, and not to yield."
 USB_the_union_forever: "The Union Forever"
 USB_the_union_forever_desc: "Lo, body and soul-this land,\nMy own Manhattan with spires, and the sparkling and hur-\nrying tides, and the ships,\nThe varied and ample land, the South and the North in the\nlight, Ohio's shores and flashing Missouri,\nAnd ever the far-spreading prairies cover'd with grass and\ncorn.\nLo, the most excellent sun so calm and haughty,\nThe violet and purple morn with just-felt breezes,\nThe gentle soft-born measureless light,\nThe miracle spreading bathing all, the fulfill'd noon,\nThe coming eve delicious, the welcome night and the stars,\nOver my cities shining all, enveloping man and land.\n\nSing on, sing on you gray-brown bird,\nSing from the swamps, the recesses, pour your chant\nfrom the bushes,\nLimitless out of the dusk, out of the cedars and pines.\nSing on dearest brother, warble your reedy song,\nLoud human song, with voice of uttermost woe.\n"
 USB_america_the_beautiful: "America the Beautiful"
 USB_america_the_beautiful_desc: "A soft air fans the cloud apart; there comes\nA glimpse of that dark world where I was born.\nOnce more the old mysterious glimmer steals\nFrom any pure brows, and from thy shoulders pure,\nAnd bosom beating with a heart renew'd.\nThy cheek begins to redden thro' the gloom,\nThy sweet eyes brighten slowly close to mine,\nEre yet they blind the stars, and the wild team\nWhich love thee, yearning for thy yoke, arise,\nAnd shake the darkness from their loosen'd manes,\nAnd beat the twilight into flakes of fire.\n   Lo! ever thus thou growest beautiful\nIn silence, then before thine answer given\nDepartest, and thy tears are on my cheek."
 #NSS
 USB_bring_order_to_chaos: "Bring Order to Chaos"
 USB_bring_order_to_chaos_desc: "When an old dog is too sick to move, too ill to even eat; what is the merciful thing to do? The answer is obvious: to euthanize it.\nPrior to the Emergency Consolidation, the Washington government was a dying animal, drowning in its own incompetence, grasping at life with weak, bloodied hands. Even with the emergency provisions afforded to it by the civil war, it could not get a handle on its people.\nWe mercifully put it down. But our work is far from over.\n\nAll around us, the vultures circle. Perhaps this would be too much for the government of old. However, we are no longer chained by the weaknesses that masqueraded as "checks and balances". We will succeed where they failed and suppress Chaos. Security is everything, and it will never be threatened again."
 USB_control_the_president: "Control the President"
 USB_control_the_president_desc: "Before the Emergency Consolidation, the president was the perfect arbiter of our will. A weak-willed, senile fool who would crumble to any pressure we put over his clouded mind. A figure we could influence from the shadows.\nBut we were wrong.\n\nEach agonizing year spent, each time the president failed to snuff out the flames, proved to us that there was only one way to reverse the great mistake of the Civil War: direct control.\nThe president's spirit is weak, malleable to us; and it's time we tighten the strings. We will not be chained by the incompetence of one man ever again. Our wishes will be their actions, each law passed will be penned with our ink, each step taken will be on our carpet. The president failed to smother Chaos, it's our turn."
 USB_reassure_the_establishment: "Reassure the Establishment"
 USB_reassure_the_establishment_desc: "The Establishment, the snakes slithering in the tall-grass, the remnants of the obsolete Neoliberal-Neoconservative dichotomy, and our only speed bump on the road to reestablishing Order.\n\nFor too long we've given them leeway. For too long, we let them squander the power that post-1991 America had over the globe. For too long, we let them erode the foundations of Order and allow Chaos to breed.\nBut now we are in control, and we will not show the same mercy.\n\nThey will accept our control, and they will ensure that security is never threatened again. Those who inevitably resist will never see the sun again. Their incompetence will never threaten our security again."
 USB_keep_them_in_the_dark: "Keep Them in the Dark"
 USB_keep_them_in_the_dark_desc: "For years prior to the Emergency Consolidation, we ruled from the shadows, influencing each pen stroke from a distance. But these strategies showed their obsolescence.\nThe Civil War - the great mistake that haunts us to this day - made it clear that the masses are rabid dogs, held back by the chains of law and Order. The civil war let that violent animal break out of its cage, let it rain terror over the ashes of the old world.\n\nIf we are to bring Order to Chaos, humanity must be held back. America will not be a nation governed by the people, they've proven that they cannot be trusted. America will be governed by those who truly deserve to."
 USB_the_patriot_ii_act: "The Patriot II Act"
 USB_the_patriot_ii_act_desc: "The unchecked extremism present within the echelons of society is a symptom of the disease that plagued the Washington Government prior to the Emergency Consolidation. A government too busy bowing down to the so-called 'checks and balances' to see the vultures circling above.\nIt's about time for this sickness to be purged.\n\nThe FBI, NSA, DHS - all have been unable to truly counter the epidemic of antisocial activities, domestic terrorism, and extremism thanks to the 'freedoms' granted to an undeserving populace. The Patriot II Act will ensure that the antiquated hindrances of the constitution will be nothing more than ancient paper. The uninformed will call the Patriot II Act the start of a 'Domestic War on Terror'. An apt description.\nWe will be everywhere, always listening - waiting; and when we detect extremism and antisocial behavior, it will be swiftly suppressed and eliminated."
 USB_out_of_many_one_nss: "Out of Many, One"
 USB_out_of_many_one_nss_desc: "We've sat on the sidelines for too long. Watched the tyranny of the masses fester. But now, the ligaments of the state are in our hands - in the hands of those truly deserving.\nFor far too long, the interests of us, our benefactors, and our think tanks have conflicted - clashing against one another; blinding us to the erosion of Order. Only now, has our vision been unfogged - only now, can we see what we must become.\nWe must transcend the petty squabbles, the disorganization, the weakness. We must become something greater.\n\nThe MegaCorporations, the Intelligence Agencies, the Military-Industrial Complex. The Blood, The Body, The Mind. An organism birthed from the crucible of Chaos. We've gone by many names throughout the years. The 'Powers That Be', the 'New World Order', the 'Elites'. Now, we only go by one:\nThe Cognoscenti."
 USB_the_visible_hand_nss: "The Visible Hand"
 USB_the_visible_hand_nss_desc: "From the very beginning of the Emergency Consolidation, our corporate benefactors have been the lifeblood of our collective. They have funded our institutions, our projects, our budgets and through their generosity, we have continued to grip the organs of the state apparatus.\nBut it goes so much deeper than just funding.\n\nBlackRock, Pfizer, Bayer-Monsanto - they grow the food that the masses eat, pump the water they drink, dull the media they consume, produce the medicine that pumps through their blood.\nThey are everything, everywhere, all at once; and by extension - we are too.\nTry to go outside without seeing an ad, try to eat food that isn't branded, try to drink water that isn't pumped by us, try to mend your wounds without our medicine. A hand looms over every city, every home, every body, every cell."
 USB_corporate_infrastructure_bill: "Corporate Infrastructure Bill"
 USB_corporate_infrastructure_bill_desc: "We've been in cooperation with the American corporate world for quite some time, and with this, an unspoken bond has formed.\nWith the introduction of the Corporate Infrastructure Bill, we aim to strengthen that bond to the point of symbiosis, giving them more funding, mass privatization, and freedom to fulfill their projects across the nation. In return, they'll follow our tune without any question."
 USB_global_cooperation: "Global Cooperation"
 USB_global_cooperation_desc: "There have been whispers around the nation that the United Nations would have boots on the ground for decades in the scenario that a crisis would occur. The Second American Civil War is such a crisis, one that the world simply cannot ignore.\nWith the humanitarian crisis and the threat to Order, we would be more than eager to accept their assistance as they provide relief to the public. Additionally, the inclusion of peacekeeping forces would offer us much more room to divert our forces to more pressing matters both on the frontlines and internally."
 USB_expand_fema_authority: "Expand FEMA Authority"
 USB_expand_fema_authority_desc: "The Federal Emergency Management Agency has been the primary target of anti-social thought for decades. The agency was perceived as a tool of tyranny, leading to a decline in public trust.\nThe civil war is considered an emergency on many fronts. By expanding the authority of FEMA, we can work towards resolving this emergency and tightening our hold on the Chaos engulfing our nation to ensure this never happens again."
 USB_food_security_program: "Food Security Program"
 USB_food_security_program_desc: "Through cooperation with agri-tech corporations such as Bayer-Monsanto and key landholders like Blackrock, we are able to reinforce food security with GMOs and make the populace dependent on the products of agricultural behemoths.\nLaborers will be relocated to depopulated regions, far away from areas where local sympathies and dissidence may grow.\nSimilarly, the same will be done with the water supply, such as fluoridization, and the deployment of behavioural control chemicals to ensure Chaos cannot grow."
 USB_media_omnipotence: "Media Omnipotence"
 USB_media_omnipotence_desc: "All forms of media serve as a vessel to spread ideas across the zeitgeist; some ideas are worth spreading, while others are corrosive to the foundation we've delicately built up for decades.\nWith our hands on the shoulders of culture, we can ensure that not a single corrosive idea sees the light of day. Meaningless entertainment and curated news reports under the overview of the experts are one of the many ways to ensure anti-social thought remains buried."
 USB_implement_hi_tech_solutions: "Implement Hi-Tech Solutions"
 USB_implement_hi_tech_solutions_desc: "Ever since man left the caves, it has sought constant solutions to the many problems it encountered. Carnality, Chaos, aggression, and the hunger for change.\nWith major advancements in technology, we can provide a more permanent solution to such problems.\nNano-chips, Neuralink implants, and a more local network for the United States are just a few of the many methods we can enforce Order."
 USB_public_health_safety_act: "Public Health Safety Act"
 USB_public_health_safety_act_desc: "The chemical terrorist attack on DC, Covid-19, and the spiral of mental health have all been just reasons for Order to be maintained. With the threat to public health, we can implement policies to monitor the populace, implement permanent lockdowns, and set up zones of high surveillance to combat anti-social disturbances. Additionally, this will prove to be fruitful in the prevention of another pandemic with the assistance of the CDC."
 USB_domestic_war_on_terror: "Domestic War on Terror"
 USB_domestic_war_on_terror_desc: "Among many things, the Civil War revealed a deep rooted epidemic. A sickness that infects every facet of society, rots civilization from within, and corrodes everything it touches: extremism. However, where others in the Washington government would weep and hide under their desk - the Intelligence Community took action.\nThe intelligence community is our core. The backbone, the eyes, and the ears. The advancer of our agenda, and the ones waging war against Domestic Terror.\n\nAll across the nation, their agenda advances. In every corner there is an ear - behind every wall, there is an eye. Wherever you may be, there will be an eye watching. In the darkest room you can find, there will always be an ear.\nWar is not only waged through the barrel of a gun, but also through the minds of men."
 USB_silent_weapons_for_quiet_wars: "Silent Weapons for Quiet Wars"
 USB_silent_weapons_for_quiet_wars_desc: "Not all wars are fought physically. The human condition is a body that can be put under the knife; with our surgeons, we can dissect, heal, and amputate the parts we want to keep and the parts we deem undesirable.\nOne part is awareness; distracting the public from what goes on beyond the veil remains one of our top priorities.\nThe public that remains unaware is also a public that remains docile, and with their diverted attention, we can work without any obstructions."
 USB_expand_the_black_budget: "Expand the Black Budget"
 USB_expand_the_black_budget_desc: "For as long as the intelligence community has existed in its current form, there have always been covert 'black budgets' outside of constitutional regulation - piles of undocumented money that we could freely use to advance our global and domestic agenda without the weakness of congress.\nNow with the intellectually fit in charge, as well as the backing of our generous corporate benefactors, we can continue to advance our projects - without the prying eyes of the uninformed masses."
 USB_lone_wolf_protocols: "Lone Wolf Protocols"
 USB_lone_wolf_protocols_desc: "Disarming the public has led to discontent rising; it is our duty to remind them of the dangers of an armed populace.\nWith the proper pressure put on volatile individuals, we can make them cause mass-casualty events with illegally acquired firearms, and with the assistance of the media, we will discourage the populace from wanting to arm themselves, keeping them in fear. In turn, they will crave Order."
 USB_manufacturing_the_primary_victory: "Manufacturing the Primary Victory"
 USB_manufacturing_the_primary_victory_desc: "Our final victory is consent, when a docile public willingly hands over its property and wealth to institutions such as the Internal Revenue Service without providing compensation, then we have already won over their hearts.\nOrder is final. Order is the natural conclusion to everything we're working towards; the populace that controls itself is a populace that'll last forever."
 USB_empower_the_special_activities_center: "Empower the Special Activities Center"
 USB_empower_the_special_activities_center_desc: "The greatest mistake of the Washington Government was allowing for the uninformed and rabid masses to conspire against us under the guise of 'free speech'. They allowed anti-social extremists to cover their plans through irony-drenched whispers in the darkest corners of society. Only when we knew the true extent of their schemes did they strike, and in doing so, allowed the Fire to consume the Old Order.\nEven after the ashes of the Military Anarchy settled, the cockroaches that made themselves known in the dark, scattered in the light. The dissidents, anti-social individuals, extremists - a trinity that corrodes everything it touches, and a threat to national security that must be crushed.\n\nThe Special Activities Center has always been a key tool in our arsenal - an iron fist that would crush threats to our interests. Already, we have an ear behind every wall and an eye in every corner. It's time to take action. Through the Black Budget, the SAC has become the greatest asset to Order. All across America, a phantom army has awakened. Black Helicopters patrol the skies, waiting to apprehend dissidents, anti-social individuals, and extremists. In the military, we've embedded ourselves in every barrack, preparing for the quietest whisper of revolt. Threats can only be eradicated before they appear."
 USB_child_safety_act: "Child Safety Act"
 USB_child_safety_act_desc: "For far too long, there has been anti-social traffic on the internet, dissident thought, and communication between hostile elements, and with the Child Safety Act, we can bring light to the dark corners of the internet.\nChildren are the most vulnerable demographic, and their constant exposure to anti-social elements online without parental supervision has proven to be corrosive. Exploitative material will be banished, and by planting the seeds of fear in the parents, there'll be zero protest."
 USB_restore_the_redacted_files: "Restore the Redacted Files"
 USB_restore_the_redacted_files_desc: "In the past, when we could work in the shadows without interruption due to the increasing polarization of politics, we undertook numerous projects to prevent our enemies, both internally and externally, from harming our nation. Unfortunately, due to ethical concerns of the ignorant and cuts in funding, we were obligated to leave these projects to gather dust.\nNow that the adults are back in charge, there is no reason not to restore these projects and improve upon them."
 USB_keep_the_cycle_repeating: "Keep the Cycle Repeating"
 USB_keep_the_cycle_repeating_desc: "Look at our nation in turmoil, look at the outside world in turmoil.\nPax Americana ''The American Peace'' existed for a reason. Order is a virtue worth striving for. Our detractors thought our way of thinking was harmful, but they've all been neutralized by the same groups they promoted.\nWe are here to stay."
 USB_gears_of_war: "Gears of War"
 USB_gears_of_war_desc: "In the wake of the Second American Civil War, the Military-Industrial complex became crucial in the Washington government's war. However, in the aftermath of the Emergency Consolidation, it took on a larger role.\nWhere the MegaCorporations are our blood, and the Intelligence agencies are our body, the Military-Industrial complex is our mind. The brain that gathers and applies knowledge to ensure our national security may never be threatened again.\n\nOur benefactors have generously supplied our ventures and already - engineers, scientists, and the greatest minds this country has ever seen at DARPA are supplying our military and national security apparatus - creating new and unique technologies to bring Order to Chaos. We sat behind and let America fall behind the rest of the world in innovation and technology. Never again, the prestige lost in the wake of the Civil War will be retained, and through the barrels of our freshly made weapons, Chaos will be drowned out."
 USB_merge_the_mic: "Merge the MIC"
 USB_merge_the_mic_desc: "The petty competition between Military-Industrial companies has impeded our ability to stay ahead of our adversaries. It allowed us to fall behind - forced us to choose between one flawed design or the other - blue or red - mediocre or tolerable.\nUnlike the fools before us, we have no patience for trivial rivalries. They're beneath our nation, beneath us. It's time to cut the fat of the MIC and merge it with the greater whole. With the combined might of these small companies, Lockheed Martin-Boeing and General dynamics will become the greatest think tanks in the history of the human race.\nThe adults are back in charge, and through our superior engineering, Order will be reestablished."
 USB_reel_in_the_think_tanks: "Reel in the Think Tanks"
 USB_reel_in_the_think_tanks_desc: "The Think-Tanks have been off the leash for too long. While our corporations, intelligence agencies, and DARPA work around the clock to correct the Great Mistake that brought us to our knees, the Think-Tanks loaf around. However, like any good strategist, we use every tool before us, and the Think-Tanks are no different. We reminded them that weakness is not tolerated. Now, they are like any other of our assets.\nThe Bilderberg Group, once ineffectual and superfluous, is now laboring to rebuild the global Order that was consumed by the Fire through their annual meetings. The Trilateral Commission, left without a purpose in the wake of the Second American Civil War, reasserts our diplomatic finesse - goading regional powers to play into our evergrowing hands. Even the so-called 'Neoconservatives' and 'Never-Trumpers' have resurrected the long-diseased 'Project for a New American Century' - pushing for the reestablishment of our global dominance and developing our future plans."
 USB_unrestrained_rd: "Unrestrained R&D"
 USB_unrestrained_rd_desc: "The concept of 'ethics' is a tumor on scientific innovation. For as long as it has been a priority, ethics has been a crutch that the uneducated leaned on - all to help themselves sleep at night, even when they fell behind the competition. The government prior to the Emergency Consolidation was no different, they allowed the tyrannical masses to conspire against us, allowed our adversaries to outperform our fledgling companies - all for the sake of their moral Purity.\n The yoke that held back the great minds of this country has been cut for good. Order must be reestablished, and if some of the masses need to be culled to ensure our global dominance is restored, then so be it."
 USB_projects_of_greatness: "Projects of Greatness"
 USB_projects_of_greatness_desc: "Throughout the history of the modern world, nearly every great innovation has had some form of funding to prop it up. Piles of money - undocumented or not - that kept the project above the dark waters of failure. Our Military-Industrial companies are no exception. As our ambition grows, so does their need for cash, freedom, and power.\n\nThrough corporate mergers, cut regulations, and the destruction of ethical codes, we have created the greatest brain-trust in human history with our Military-Industrial industry. Using the Black Budget, every single financial, resource, or manpower burden they have will disappear. The Military-Industrial complex will continue to have the funding needed to continue their numerous projects.\nThe blueprints have been sketched - the pieces have fallen into place. From the most complex digital surveillance network ever created, to seized neurological research from the traitor, Musk; the world is about to witness the restoration of our potential - a prestige that was crushed by the government of old. The road to Order has been paved; all we need to do is walk the path."
 USB_ensure_aerospace_dominance: "Ensure Aerospace Dominance"
 USB_ensure_aerospace_dominance_desc: "In the post-1991 global Order, we once held an overwhelming hegemony over aerospace. With our profound strength being displayed with our operational successes in the 1990s. Our stealth aircrafts dominated the skies, raining hellfire upon our adversaries, and any foreign threat to Order was crushed within weeks. But it all came crumbling down leading up to the Civil War. Our competitors got ahead of us, the masses began to scheme against us, and the Fire consumed our nation.\nIn our absence, Chaos prevailed across the globe. From tensions in Europe to the Taiwan war, it's become abundantly clear that foreign nations cannot help themselves, can't stop fanning the flames of Chaos. So, we need to protect them. Through the Black Budget, we will empower our Lockheed Martin-Boeing to dominate the global market and reassert Order over the world. They've proven that they don't deserve the privilege to protect themselves, so we must once again take up the responsibility."
 USB_dumb_construction: "D.U.M.B. Construction"
 USB_dumb_construction_desc: "Deep Underground Military Bases have been a proposal since the time of the Cold War. Going by different names, the idea has remained the same: serving as a contingency and also an extension of government protocol. These proposals never went anywhere, of course. But, the Civil War has taught us that the masses are unchained, rabid animals waiting to strike. Contingencies like this are no longer a luxury, they're a necessity.\n\nBut the uninformed fools who rejected this plan so long ago are nothing but a memory. Now, we hold the cards, and with the Black Budget, we have unparalleled access to resources that will allow us to execute our ambitions. Through the Deep Underground Military Bases, we will not only have shelters and a plethora of emergency contingencies if Order is ever threatened again, but also high level research facilities to permit DARPA and the Military-Industrial Complex the space to test and develop new technologies that will further our agenda."
 USB_hunter_killer_program: "Hunter-Killer Program"
 USB_hunter_killer_program_desc: "When dealing with threats to Order, there are no lengths that are 'too far' - no measures that we will not take. If we have to burn down every house in a village to find one threat, then we will be the first one to light a torch. Despite our best efforts, dissidents still remain. Hiding in the sand like snakes - biding their time and waiting to strike. We need to take even more necessary measures to purge our nation of this corrosive element.\nUsing drones, we can easily hunt down any dissident that's trying to hide. It can be in the blackest night, or the most dense woods, and we are able to find and eradicate these extremists. Through our aerospace companies, we have an unparalleled supply of cheap drones that we can use to destroy any threats to National Security. That's where the Hunter-Killer Program comes into play. It's already been established that ethics are a tumor on scientific innovation, but this extends to warfare as well. The uninformed masses have complained about drones since their first deployment long ago - they lost the privilege to complain after the Civil War started. Now that the adults are in charge, we will cut the regulations that held drone warfare back. Through this program, any insurgent will be found and eliminated."
 USB_kickstart_the_amnet: "Kickstart the Am-Net"
 USB_kickstart_the_amnet_desc: "In an increasingly digitized world, everyone withdraws into their own ponds. Whether it be the Patriot Front, obsessed with PR and optics, or the Atomwaffen Division, misanthropy made flesh, or the APLA, justifying their barbarism under the guise of societal progress. These little communities leak their own contradicting 'truths' into the growing swamp of society as a whole - galvanizing each individual to pick whatever 'truth' suited their wants and needs as a response to their dying society. This is how the Civil War started, this is how the global Order was consumed by the Fire, and this is how humanity would stagnate without our intervention.\nThrough the AI that fuels the Am-Net, we are able to handpick important information and filter out the trash from digital discourse. Some call this censorship, but in reality, we are simply creating Context by filtering out the garbage data. The masses have proven that their 'freedoms' only lead to death and despair. It is our duty as rulers to protect them, to think for them.\n\nBeyond this, the Am-Net will serve another purpose: an aggregate - a matrix of human thought that allows us to study the propagation of ideas, cultures, and symbols, (or "memetics"). For decades, lesser governments have been looking for the key to understanding the intricacies of the human mind - and by extent - the key to societal control. We have, of course, figured out that it's memetics. Through the colossal amount of data we will gather from the Am-Net, our predictive AI that monitors the Am-Net will be trained on the intricacies of human thought. Through the AI, we will be able to crack down on anti-social activity exponentially faster, all without the errors that come with human pre-cognizance. Already, our studies are showing that through the advanced context and deduction abilities of the AI, we can identify criminal activity before they even happen. The launch of the Am-Net will only be the beginning."
 
 USB_justice_reform: "Justice Reform"
 USB_justice_reform_desc: "Lady Justice has been quite restrained in the past years; the bickering vultures circling her would love to see she would keep the blindfold on.\nOrder is a virtue, and by allowing justice to see, we would be able to restore that virtue."
 USB_form_the_uspf: "Form the United States Police Force"
 USB_form_the_uspf_desc: "One of the biggest flaws of the old United States was its tendency to allow local loyalties to grow above federal loyalty. Local law enforcement has been too lenient on crime and treasonous sentiments; this ends today.\nThe formation of the United States police force should remedy this issue by ensuring that strangers overlook other people's communities to prevent emotional attachment."
 USB_atf_new_purpose: "ATF's New Purpose"
 USB_atf_new_purpose_desc: "With the levers of power firmly in our grasp, we can reform loyal agencies to be more effective in countering the tide of chaos washing over our nation.\nThe ATF has always maintained its loyalty to the United States, and loyalty never goes unrewarded. More funds and privileges will be allocated to them to combat the Second Amendment and its misuse by the cults plaguing our nation. From evangelicals to socialist book clubs, all that goes against Order shall be labeled as a cult and be dealt with accordingly."
 USB_coordinate_with_the_ic: "Coordinate with the IC"
 USB_coordinate_with_the_ic_desc: "The intelligence community has always been one of the backbones of the United States of America, maintaining a watchful eye as the shadows of madness attempted to creep into our nation. Now that the madness has reached our country, the intelligence community shall be provided with much more power to deal with both internal and external threats.\nThe days of sleep are over; the eye won't shut ever again."
 USB_expand_the_dhs: "Expand the DHS"
 USB_expand_the_dhs_desc: "The Department of Health and Human Services has proven to be bloated with its failure to account for the looming threat of extremism, with the chemical attack committed by the Atomwaffen division, health has become a threat to national security.\nTherefore, it will be merged into the Department of Homeland Security, with the influx of fresh eyes on these issues, our goal will be to enforce lockdowns and to uphold any mandates regarding public health.\nThose who fail to follow the mandate will be isolated in FEMA facilities to prevent further harm to the nation."
 USB_a_kick_in_every_door: "A Kick in Every Door"
 USB_a_kick_in_every_door_desc: "Bureaucracy is only useful if it maintains Order. With the civil war, however, it has become burdensome to deal with the red tape.\nAfter recent events, we have acquired the scissors needed to cut through the bloat. With that, we can search every home, use aggressive investigation tactics, and detain whoever is deemed a threat."
 USB_the_right_to_remain_silent: "The Right to Remain Silent"
 USB_the_right_to_remain_silent_desc: "With careful planning and the execution of several operations against several cults, insurgencies, and terrorists. It is safe to say that we are far from done with our mission.Order is something to be maintained, delicately, constantly.\nLike a porcelain mask, it cannot live with a single crack.\nThe work of a nation is not complete yet."
 
 USB_we_wont_fail_again: "We Won't Fail Again"
 USB_we_wont_fail_again_desc: "We defeated the British, we defeated the Germans, we defeated the Russians.\nAnd once again, as we did before, we defeated the animal within ourselves.\nWe won't fail again.\nOrder remains."
 USB_build_back: "Build Back"
 USB_build_back_desc: "The Build Back Better Plan was one of Biden's most ambitious projects for the nation. With Order restored, we can finalize the project and add additional improvements to it.\nLong-neglected infrastructure will be addressed, a social pandemic relief bill will be passed, and additional funding will be provided to several social policy initiatives. Furthermore, with the ongoing reconstruction, we can reshape the American urban landscape to serve our goals."
 USB_federal_rail_network: "Federal Rail Network"
 USB_federal_rail_network_desc: "The civil war has given us carte blanche to enact whatever we desire to maintain national security. With the construction of a vast network of rails across the nation, we can relocate labourers on a regular basis based on their work assignments.\nThis also serves as a way to increase our surveillance on the populace, as the rural populace will be relocated to the cities, especially areas that have little to no profit incentive to our corporate allies."
 USB_cold_hearted_pragmatism: "Cold-Hearted Pragmatism"
 USB_cold_hearted_pragmatism_desc: "To say that we do uphold certain values would be a blatant lie; however, we all have seen what happens to a nation blinded by the veil of extremism.\nOur approach to our citizens should be like a stern father; we know what is most effective, and we know what brings results.\nWe can be moral men, or we can be the men that brought the United States back to the throne of the world."
 USB_safeguard_the_population: "Safeguard the Population"
 USB_safeguard_the_population_desc: "Those without awareness are those without pain.\nOur citizens have gone through quite an ordeal, and there is no doubt that the majority would like things to go back to normal. Safe and Orderly, going back to normal is simply impossible, but what we can provide, however, is a veil of comfort with the machine of Order working tirelessly to ensure that our populace remains oblivious.\nOfficials who shake hands, more subtle ways of surveillance, and a world that keeps on spinning.\nWe work in the shadows so that they can see another day; only those with ill intentions have something to hide."
 USB_megalopolis_project: "Megalopolis Project"
 USB_megalopolis_project_desc: "There have been reports of extreme anti-social activity across the Rust Belt and the rural hinterlands, and most of these territories provide little to no value to either us or our corporate partners.\nWe will start to expand our cities to accommodate the relocation of the rural populace to our urban centres. This will provide breathing room for any operations taking place in the rural areas, while we can keep an eye on the populace in the cities."
 USB_efficient_use_of_land_act: "Efficient Use of Land Act"
 USB_efficient_use_of_land_act_desc: "The civil war has created a wide scar across our lands, and with most of the rural populace holding us in high disdain, it would be wise to seize their properties to accommodate larger projects such as wide farming fields. Alongside our friends at Black Rock, we can put the lands to better use."
 USB_redefine_big_government: "Redefine Big Government"
 USB_redefine_big_government_desc: "Centralization is a concept foreign to most Americans, but it is a concept that has proven to be necessary.\nTo prevent the growth of local loyalties that favour their direct environment instead of the United States of America, local authorities will become a thing of the past.\nEvery official across every state shall answer to a central authority that oversees a nation being rebuilt."
 USB_biochemical_breakthroughs: "Biochemical Breakthroughs"
 USB_biochemical_breakthroughs_desc: "The human race has proven itself to be unpredictable, but like every mammal, it is dictated by the chemicals being brewed within its brain.\nWe have made great advancements in the field of biochemical agents and by injecting docility chemicals in the water, mass vaccinations, and the construction of biolabs across the globe. We can put the human mind under constant surgery until it has reached the desired state of docility."
 USB_intensify_digitalization: "Intensify Digitalization"
 USB_intensify_digitalization_desc: "The COVID-19 pandemic has shown how reliant the populace is on the digital world, a world that is easy to control and maintain.\nBy invoking Order, we can fully digitalize almost every aspect of modern life. Finances, communication, the storage of files, and the mass consumption of media. None of it would pass by us without our knowledge. With the population growing more reliant on digital, we can make even the most hesitant participate in society."
 USB_the_new_social_contract: "The New Social Contract"
 USB_the_new_social_contract_desc: "The social contract is a building block in maintaining Order.\nIts biggest flaw was that its ink was erasable and its paper was too easy to tear.\nBy giving the populace the idea that some of their freedoms would have to be relinquished to have their children be able to travel to school or to ensure no anti-social activity would come to bring harm upon them, we'd have the people practically beg us to bring Order to Chaos."
 USB_correcting_the_great_mistake: "Correcting the Great Mistake"
 USB_correcting_the_great_mistake_desc: "The dichotomy between neoliberalism and neoconservatism was unable to withstand the test of time. The flaws of the old Rules-Based-Order became apparent with the rise of COVID-19 and the Second American Civil War, which led to the biggest periods of Chaos in modern times.\nWe have learnt our lesson, and we will do everything in our power to ensure this will never happen again.\n\nOrder is a pillar to stand on.\nWe will not let ourselves be consumed by the flames of change."
 USB_nnunion: "NNUNION"
 USB_nnunion_desc: "Canada has always been a longtime ally of the United States of America, and the past crisis has shown that our Northern brothers have been ill-equipped to deal with any potential future crisis.\nFortunately, we still have people on the inside who share our values and virtues. By applying pressure and promises to the right people, we can shift the Canadian government to be much more cordial with us."
 USB_arctic_security: "Arctic Security"
 USB_arctic_security_desc: "The Arctic has been an area surrounded by theories and mystery; regardless of the truth, it would be in our best interest to secure the frozen wastes to ensure no other foreign threat can build up a presence there."
 USB_gapigs: "GAPIGS"
 USB_gapigs_desc: "The Caribbean has always been the equivalent of a trophy, especially Cuba.\nThe communist ideologues present alongside the more criminal elements on islands like Haiti would prove to be susceptible to foreign influence, with the potential to pose a credible threat to national security. It would be advisable to conduct a military intervention to restore Order and democracy to the region."
 USB_limartini: "LIMARTINI"
 USB_limartini_desc: "Mexico has always been the nail in our thumb, whether it be illegal immigration or the transport of drugs across the border. The country down south is filled to the brim with Chaos, cartels, and revolutionaries have done nothing but build up anti-social activity.\nA proper military intervention into Mexico would allow us to clean up the country and ensure that we do not have any hostile elements in our backyard."
 USB_pcbridge: "PCBRIDGE"
 USB_pcbridge_desc: "Central America would be considered the bridge between the North and the South, and with our temporary absence, the Central American states have shown their true sentiment towards the United States.\nBy securing the bridge, we'll have an open way to both South America and restore control over the Panama Canal."
 USB_work_force_act: "Work Force Act"
 USB_work_force_act_desc: "The Workforce Act allows us to utilize detained citizens as laborers, cutting costs and demonstrating to future anti-social elements that there are consequences to Chaos."
 USB_mhoctopus: "MHOCTOPUS"
 USB_mhoctopus_desc: "Expanding our reach globally would ensure that we can react to any crisis at any moment with the proper application of force. Dissidents fleeing the nation, leaders of terror movements, and subversive elements will be unable to escape our gaze."
 USB_solidify_our_position: "Solidify Our Position"
 USB_solidify_our_position_desc: "As Order is slowly restored across the world, we must learn from the mistakes that led to the flames of change engulfing our world. By taking preventive measures and applying the right defences on key positions, we can ensure that any hostile elements would find it difficult to truly bring harm to the United States."
 USB_mqwallbreaker: "MQWALLBREAKER"
 USB_mqwallbreaker_desc: "Asia and Oceania are areas that have always been the target of a tug-of-war between us and China, and with the red dragon increasing its hostilities in the region, it would be inevitable that we'd gradually bring our combined pressure on one of our long-standing rivals.\nBy providing support to our old allies and revising our old contingency plans regarding China, we can finally put an end to the Chinese tale of expansionism."
 USB_lznostalgia: "LZNOSTALGIA"
 USB_lznostalgia_desc: "South America has been a continent drenched in the gasoline of disorder, and even today, the air of unignited Chaos is still as present.\nWith interventions in nations overtaken by extremism and pressure on our former partners, Order can be restored, and we can continue our operations uninterrupted on the continent.\nBusiness as usual."
 USB_cxhomecoming: "CXDADDY"
 USB_cxhomecoming_desc: "Europe has always been a battleground of ideals and empires; even today, we see proof that our absence has been nothing but a net-negative for the whole continent.\nWhether it is overtaken by extremist thought or by the Russians, it does not matter.\nLike any caretaker, we never truly go away, and with our inevitable return, we will show the world that we are far from done with our vision for the world."
 USB_aqtomato: "AQTOMATO"
 USB_aqtomato_desc: "Africa has been a canvas of Chaos for decades, with its many autocrats and insurgencies, it is blooming with untapped potential to expand our influence.\nFunding the right freedom fighters and allowing dictators to suppress revolutionaries, we can keep a watchful eye over the dark continent."
 USB_kktemple: "KKTEMPLE"
 USB_kktemple_desc: "The Middle East is a region filled with anti-social elements, radical extremists, and blind zealots who'd throw themselves into a suicidal frenzy.\nA backwards region with infinite blood in its sands, our biggest mistake was leaving them in the mud. But we will come back again, and this time we will never leave."
 USB_destroy_hazardous_elements: "Destroy Hazardous Elements"
 USB_destroy_hazardous_elements_desc: "Like any form of vermin, anti-social elements persist in our nation.\nTumours of extremism in the darkest parts of our cities, an animalistic craving for change.\nHumanity is a spectrum destined to be under constant scrutiny; we will rid ourselves of the scars inflicted."
 USB_war_machine_back_on_track: "War Machine Back on Track"
 USB_war_machine_back_on_track_desc: "The Military Industrial Complex is akin to a divine deity that invokes its wrath on those who stand in the way of Order. For too long has the American war machine been held back by ethical concerns; such concerns are reserved only for the loyal.\nWith our military regaining the respect it deserves, we will be able to relive the mythos of the American Peace.\nThis time forever."
 USB_the_arsenal_of_order: "The Arsenal of Order"
 USB_the_arsenal_of_order_desc: "Tanks, missiles, fighter jets, and battleships. These are just the tip of the iceberg of what we are capable of.\nOur enemies have enjoyed their time in the sun for too long; our temporary absence has made them comfortable, too comfortable.\nWith the bright minds under our wing and the expanded military industry fulfilling its role, we shall stand ready to take on any giant."
 USB_reopen_the_factories: "Reopen the Factories"
 USB_reopen_the_factories_desc: "During both world wars, we have proven time and time again that the American industry remains on top; any enemy that opposed the inevitable march of stability became nothing but footnotes in the grand scheme of things.\nWith our rapidly advancing technological and industrial prowess, the giant shall never sleep again."
 USB_freedom_of_movement_act: "Freedom of Movement Act"
 USB_freedom_of_movement_act_desc: "With the Freedom of Movement Act, we'll be able to have any form of travel within our nation put under constant control. Checkpoints across the nation dictate how the populace drives, and the federal railway network is put to use according to our vision.\nWhether one visits their family, gets relocated for labour reasons, or even tries to slip under our radar into the rural lands.\nWe will know."
 USB_global_task_force_units: "Global Task Force Units"
 USB_global_task_force_units_desc: "It would be foolish to overextend ourselves for small-scale problems globally.\nTo prevent these problems from escalating into a crisis, we will make use of global task force units that will strike at the issues at hand with surgical precision.\nInsurgents armed with borderline primitive weaponry will prove to be nothing more but an abscess you can cut open. "
 USB_permanent_military_presence_worldwide: "Permanent Military Presence Worldwide"
 USB_permanent_military_presence_worldwide_desc: "Whether it be rogue states, foreign threats, or violent insurgent groups. One thing remains certain: our absence is what has caused them to grow bolder in their violence.\nDuring the heights of neoconservatism, we had boots on the ground everywhere; our enemies came to understand what fear and hatred truly meant. Our flag, our symbols, and our language in their lands were an indicator that we were here to stay.\nBy reestablishing military bases globally and by applying the proper military pressure on our opponents, we will remind them of their forgotten lessons."
 USB_automated_killing_fields: "Automated Killing Fields"
 USB_automated_killing_fields_desc: "There are wide zones filled with anti-social elements that provide little to no value to our agenda. However, it would be unwise to leave them to their own devices.\nWith the usage of drones, we can maintain the desired amount of control over these areas and contain any threat that would try to cause any trouble; there is no need for a human element. We do not negotiate with terrorists."
 USB_revive_the_ngb_program: "Revive the NGB Program"
 USB_revive_the_ngb_program_desc: "The next-generation bomber program was an effort to introduce a new type of bomber into our military, one capable of reaching subsonic max speed, long-term operational capability between 50-100 hours, and the ability to carry thermonuclear weapons. These flying symbols of the American Peace will serve as our pride, and the bringers of Order."
 USB_utilize_pmcs: "Utilize PMCs"
 USB_utilize_pmcs_desc: "Our relationship with private military corporations has always been symbiotic in nature. When we needed dirty work to be done without tainting the flag, we would regularly employ their services.\nThere is no reason to walk back on such a fruitful relationship. Our corporate friends would be even more delighted to see their rates increase and to be even less concerned with rules of engagement, as long as the job gets done."
 USB_humanitarian_peacekeeping: "Humanitarian Peacekeeping"
 USB_humanitarian_peacekeeping_desc: "There have been quite a few wild tales regarding our endeavors worldwide, slander and fearmongering have become part of the course for the world police.\nHowever, the truth remains the same.\nThere, where we uphold the torch of security, people can cross the street safely. Whenever a civilian is in dire need, we are there.\nAlongside our friends at the United Nations, we will be able to expand our control over destabilized regions, feed the hungry, and sate their thirst.\nWe might intrude on their way of life, but is constant Chaos truly a way to live?"
 USB_watchdog_of_the_world: "Watchdog of the World"
 USB_watchdog_of_the_world_desc: "''The world police'' is often used as a derogatory term, but our absence has proven that it was, in fact, necessary.\nTwo wars in Europe, two wars in Asia, and several smaller-scale conflicts across the world, and all because we simply were not present.\nWe, however, have returned, and our gaze on the world will remain.\nOrder above all."
 USB_extinguish_the_fire: "Extinguish the Fire"
 USB_extinguish_the_fire_desc: "The flame of change engulfed the world in Chaos.\nCapital, Order, and Purity have been put to the test and it passed with flying colours.\nThese are virtues and ideals worth fighting for, and the flame has been put to rest.\nSmothered, calmed down.\nNever to be reignited again, for a better world."
 USB_a_new_world_order: "A New World Order"
 USB_a_new_world_order_desc: ""He set the earth on its foundations, so that it should never be moved."\n\nPsalm 104:5"
 
 USB_final_chord_of_the_cold_war: "Final Chord of the Cold War"
 USB_final_chord_of_the_cold_war_desc: "The American peace was intended to last forever, with our nation ceasing to exist for a decade or two, our long-time rivals in Russia have been able to expand well beyond their containment zone. The former regional power has taken the mantle of the world police, but we can already see the cracks in its system.\nThey were not built to last; it is time to finalize the outcome of the long-forgotten Cold War."
 USB_operation_atlantic_airlift: "§YOPERATION§!: Atlantic Airlift"
 USB_operation_atlantic_airlift_desc: "The gap between us and a Russian-dominated Europe is quite wide.\nBy utilizing airlift routes set up by central command, we rapidly deploy troops in order to conduct operations on the continent. We liberated Europe once; we will do it again."
 USB_demoralization_and_dehumanization: "Demoralization and Dehumanization"
 USB_demoralization_and_dehumanization_desc: "The Slav is biologically inclined to arrogance and disregard for individual life.\nOne of our predecessors' biggest mistakes was to assume that we could be on equal talking grounds with the Russians, a mistake that will not be repeated.\nThe seeds of anger are as ever-present in Europe, and the waters of Order will ensure that our occupied friends will bloom into roses with thorns. Utilizing memetic warfare and rebranding old-time propaganda, we can make the European people crave for their freedom."
 USB_paint_the_tanks_green: "Paint the Tanks Green"
 USB_paint_the_tanks_green_desc: "Most of our military has adapted perfectly to fighting in the Middle East due to the region's constant need for stability. However, due to the environmental differences in Europe and Russia, it is deemed necessary to readjust our troops to fit their respective environments.\nThe world is used to the American soldier in desert colors; let's get them used to green."
 USB_amplify_our_presence: "Amplify Our Presence"
 USB_amplify_our_presence_desc: "The main reason the Russians never dared to intrude on our sphere fully is due to our constant military presence near their borders; they have seen the way we operated in the Middle East, Asia, and Europe. Instead, they waited like vultures for our collapse.\n''The fat vulture crawls when the eagle approaches.''\nWe will re-establish our presence around Europe and eventually within, let them relive the same anxiety they felt for decades. America is here to stay."
 USB_lend_lease_act: "Lend-Lease Act"
 USB_lend_lease_act_desc: "We helped our allies during the Second World War in their time of need, and we will do it again as we make preparations for another noble crusade to liberate Europe from the clutches of tyranny.\nThe United States' sheer industrial might will drown the Russians in their own overextension.\nFirearms, supplies, equipment. Our allies need more."
 USB_operation_bear_hunter: "§YOPERATION§!: Bear Hunter"
 USB_operation_bear_hunter_desc: "We've built up to this for months. One of our biggest mistakes was to even allow the concept of ''Russian'' to exist when the Soviet Union collapsed, which allowed them to rebuild the same way the Germans did after Weimar. And just like we neutered the Germans, we will do the same to our Eastern rivals.\nThe destruction of the Russian war machine remains a priority; our task will not be an easy one. Our task will not be an easy one. Our enemy is well-trained, well-equipped, and battle-hardened. He will fight savagely.\n\nWe will accept nothing less than full Victory.\nLet us all beseech the blessings of Almighty God upon this great and noble undertaking."
 USB_unlimited_climate_warfare: "Unlimited Climate Warfare"
 USB_unlimited_climate_warfare_desc: "More primitive civilizations would deem the power we wield over the global climate to be akin to having the power of a god. Yet it is we who steer the climate in the direction we want it to be.\nWith the ongoing war with Russia, we can redirect more hazardous weather towards our rivals in the East. Hasten the approach of winter, slow down summer, or cause a storm in their cities so destructive that their superstitious populace would start to believe they are being punished.\nThey are."
 
 USB_third_gulf_war: "Third Gulf War"
 USB_third_gulf_war_desc: "We've been here before; many of our young were laid to rest in the sands of the Middle East as their bones were exposed to the sandstorms. Most of the younger generations fear a return to a conflict that claimed so much from us, but with our advancements in military technology, there is no reason for fear. That fear will only be felt by the dictators and terrorists festering in the region."
 USB_expand_the_targets_list: "Expand the Targets List"
 USB_expand_the_targets_list_desc: "With the region out of control, the list of persons of interest has expanded.\nDictators, terrorists, bandits, and much more are all key pillars of Chaos in the Middle East, and with our unflinching march into the territories, we will neutralize them so that they can no longer pose a threat to stability."
 USB_unleash_democracys_fury: "Unleash Democracy's Fury"
 USB_unleash_democracys_fury_desc: "Our biggest flaw regarding our past operations in the region was the devotion to rules of engagement; our detractors claim that incidents such as Abu Ghraib were depraved.\nYet our past leniency is what allowed anti-social elements to crop up again and spread their corrosive ideology far into Europe and the United States. No, this time our rules of engagement will be lax. These terrorists would have done the same to us; they already did.\n\nAbu Ghraib, for the entire region."
 USB_reestablish_old_bases: "Reestablish Old Bases"
 USB_reestablish_old_bases_desc: "The scars we left behind remain, and it is time to reopen them.\nOur troops will remain in the region once we liberate it, this time for an extended time, as without a doubt, there'll be constant resistance to the torch of enlightenment.\nWith our presence, we will discourage the fencesitters and reassure the local citizenry that Order will be restored."
 USB_operation_whopper_junior: "§YOPERATION§!: Whopper Junior"
 USB_operation_whopper_junior_desc: "Iraq could be considered a trophy for the neo-conservative experiment, and in a way, it is. The specter of Saddam is still as present, but with our combined military efforts and memetic warfare, we will be able to exorcise him from the Iraqi zeitgeist alongside any form of radical Islamism. Iraq will become an example for the rest of the region."
 USB_operation_burning_dog: "§YOPERATION§!: Burning Dog"
 USB_operation_burning_dog_desc: "Iran has been a key object of desire for decades. We wanted to absorb it into our sphere.\nHowever, their tyranny is simply too ingrained to be properly influenced from the outside.\nDirect military action and the promise of more autonomy to the ethnic minorities in the region will prove to be enough to stamp out the black spot of the Middle East."
 USB_project_babel: "§VProject Babel§!"
 USB_project_babel_desc: "Language is the most powerful thing in the world, no matter how chained or beaten one is. It refuses to die.\nIt is part of humanity, part of everything and everyone.\nIncluding our enemies.\nBut what if we were to dissect the very concept of it?\nTurn their own language against them?\nThe Middle East holds the key to the secret.\nGo ahead, break the cycle."
 
 USB_the_eagle_vs_the_dragon: "The Eagle VS. The Dragon"
 USB_the_eagle_vs_the_dragon_desc: "For too long, we let the Chinese push us around. For too long, we let them poke and prod at our weaknesses until we collapsed in on ourselves. We should have acted sooner, we should have enforced our iron grip over the globe with a firmer hand.\nThe neoliberal-neoconservative politicians wouldn't allow for it, they were too weak to act on our rightful suspicion. Our collapse was a part of their plan, they took advantage of that moment to expand their hold over a massive chunk of the Asian continent. The era of inability is over, now is the time for action.\n\nThis fight has been a long time coming. It's time to liberate Asia, it's time to behead the Dragon that has tormented us for so long, and it's time to reestablish Order."
 USB_bolster_the_marine_corps: "Bolster the Marine Corps"
 USB_bolster_the_marine_corps_desc: "In this war, the Marine Corps will be our bread and butter - the sharpest tool in our arsenal - the bane of the Dragon. Much like our noble crusade to liberate the Pacific islands during World War II, each landing will be an uphill battle - the Chinese will fight tooth and nail over every inch of land.\nThe forces of the Dragon are well-trained and well-equipped. But they're just like every other nation: they have a will that can be shattered. Each victory will be yet another wound to their morale, and the Marines will be the key to this. The Marine Corps were once renowned for their strength, courage, and valor. We will restore this lost prestige through continuous victory.\nWith our Marines, the so-called 'Chinese Century' will be proven as nothing more than a fantasy. "
 USB_war_on_the_sea: "War on the Sea"
 USB_war_on_the_sea_desc: "The Dragon claims its dominion over the seas is held with an iron fist, but it couldn't be more wrong. Through the ingenious designs created by our Military-Industrial Companies, our American-made ships have torn apart these Chinese tin cans masquerading as 'naval vessels'.\n To sever the paper grip the Dragon holds over the Pacific, we need to continue this trend. Once every Chinese vessel has been blown out of the water, we will finally shatter the fairy tale of Chinese superiority. We will remind them of why they were scared to invade Taiwan."
 USB_take_on_the_trade_routes: "Take on the Trade Routes"
 USB_take_on_the_trade_routes_desc: "The Dragon's iron grip over global trade is its greatest asset, both militarily and economically. The trade routes around China keeps their economy above the water, their people fed, and their soldiers armed. But where other, lesser nations would see their trade dominance as an overwhelming strength, we see it as an opportunity.\nIf we cut off these trade routes from the Chinese, we will be effectively cutting out the beating heart of the Dragon. For decades, the Dragon leveraged its trade power to humiliate us and destabilize the American Global Order - our Order. When we cut off their precious trade routes, the shoe will finally be on the other foot."
 USB_operation_firestorm: "§YOPERATION§!: Firestorm"
 USB_operation_firestorm_desc: "Over on the Korean Peninsula, our allies, the South Koreans, are fighting for every inch of their rightful territory. The leftist parasites are unrelenting in their attacks, each offensive is more savage than the last.\nOur greatest mistake in Asia was letting the North Korean state even continue as a concept. The North Koreans are just yet another chord left from the Cold War, a liability that grew out of our control. This time, we're not afraid to get our hands dirty, and it's high time we aid the Koreans and finish what we started.\n\nTo make sure Order is everlasting, we must ensure that history goes back to where it belongs: a standstill."
 USB_contain_the_communists: "Contain the Communists"
 USB_contain_the_communists_desc: "On the turbulent waters of the China seas there is not a single Chinese vessel in sight. The sea floor of the Pacific is a graveyard for the Dragon's tin-cans. Through the ingenuity of our engineers and the bravery of our troops, we have achieved nothing short of a total victory. And now, the final phase is ready to commence.\n\nThe Dragon may try to ward off the invasion of their cities, and they may even win. But, no matter how much they may try to outrun it, they can't avoid starvation. The socialists, the communists, the tyrants, wherever their holdouts may be, will be starved out through our superior navy.\nThe Dragon will try to plead and try to negotiate. But in the end, the Dragon must be beheaded to ensure Order, and soon that is what will happen."
 USB_take_the_fight_to_them: "Take the Fight to Them"
 USB_take_the_fight_to_them_desc: "Through operation after operation, we have chipped away at the Dragon's defenses. Each island lost - each failed defense has whittled down their fighting spirit. But our resolve to fight has only grown stronger. We've liberated the lands that they occupy, and now we will give them a taste of their own medicine.\nShanghai, Beijing, Shenzhen, cities that stand as monuments to the Dragon's arrogance and 'power.' The Chinese think that we don't have the guts to liberate these cities - that we are anything like our weak predecessors. They will be in for a rude awakening when our fighter jets decimate their monuments, and our ships turn their coastline into ash.\nThat's the difference between us and the fools that came before: we don't take half-measures."
 USB_operation_pacific_rim: "§YOPERATION§!: Pacific Rim"
 USB_operation_pacific_rim_desc: "Despite being the primary populace within a 'first-world nation', the Chinese are a profoundly superstitious people, easily susceptible to any form of coercion. They, of course, think that those who have the ability to command the weather, wield the powers of a God.\nWe do.\n\nHurricanes the likes of which this world has never seen, Tornados that destroy entire cities, endless winters that bring disease, starvation, and death. We've softened up the Dragon, now the populace will feel our wrath.\nThe Chinese have been only a threat to our Security and to Order as a whole. After decades of enduring their torment, we will make them understand the consequences of their actions."
 
 USB_operation_overlord_ii: "§YOPERATION§!: Overlord II"
 USB_operation_overlord_ii_desc: "For the second time this century, American soldiers are restlessly waiting to be briefed on the operation that will liberate Europe. While we were crushing domestic terrorists, our arrogant subordinates in Europe failed to contain the Eastern menace. Only when their incompetence was laid bare, and their countries fell into the clutches of tyranny, did Europe manage to narrowly defeat the Russians. The enforcement of Order is non-negotiable, and these extremists masquerading as statesmen are liabilities.\nPax Americana has returned, and we will mirror our noble crusade against fascism in the Second World War when we liberate Europe from these fanatics."
 USB_destabilize_their_regimes: "Destabilize Their Regimes"
 USB_destabilize_their_regimes_desc: "One of our greatest mistakes was letting Europe off the leash. Europe has proven that they don't deserve to be autonomous; their forces are weak - crumbling at the slightest touch like paper. Their morale? Apocalyptic.\nEven domestically, the ineptitude of these 'nations' is ever present: suppressed discontent, whispered calls for rebellion, an infighting high command. All we need to do is to just kick the rotten structure for it to crumble from within. That's why it's not the Chinese or the Europeans who will dominate the global order. We've always had the edge, we're merely taking back our rightful place."
 USB_london_calling: "London Calling"
 USB_london_calling_desc: "Europe may be administered by anti-social parasites that nearly tore us apart, but the continent still has a future under the restored Pax Americana. When the tyrants rose from the ashes of NATO, there were a select few that should have taken the place as leaders. But instead of being met with celebration and praise, they were met with pitchforks and lead. Exiled, they had to watch in horror as Europe perverted itself.\nNow, the extremists are crumbling under the pressure, and it's time for us to contact these competent few. In a newly liberated Europe is established, the intellectuals will finally take their proper place from the clutches of the tyrannical masses."
 USB_break_the_european_spirit: "Break the European Spirit"
 USB_break_the_european_spirit_desc: "There are no lengths that are too far in the furtherance of Order, and especially when dealing with a rebellious subordinate. The Europeans are rabid, lashing out at anything in front of them - they can't be tamed with words or gifts or gestures of good will. The greatest mistake of the aftermath of the Second World War was loosening our grip over Europe. We let them be free and they betrayed us.\nNow, we will correct our mistakes. We won't just bomb their cities, destroy their landmarks, starve their people. We will break their spirits and they won't forget it. We will show them why the new American peace will be everlasting."
 USB_come_as_liberators: "Come as Liberators"
 USB_come_as_liberators_desc: "When we started our noble crusade against fascism in the Second World War, we came to Europe as liberators, we were the usherers of a new, everlasting peace on the continent. The old Order birthed from that crucible is long dead, but the previous strategy still has its uses.\nWe've corrected the mistakes of those who came before us, we've perfected our strategy; the flaws that built up to the Great Mistake have been eliminated. When the extremists inevitably collapse under the weight of their inadequacies, we will come to Europe as liberators like we did in the Second World War. The masses will cheer, they will remember why they relied on us in the first place.\nWe will have a docile Europe in the palm of our hand. This time, we will never let go."
 USB_operation_triumph_chariot: "§YOPERATION§!: Triumph Chariot"
 USB_operation_triumph_chariot_desc: "For the duration of this war, we've reiterated this, but the concept of a free Europe has been nothing but a detriment.\nDuring our absence, what have the Europeans accomplished? They prepared for years to counter Russia, yet lost horribly. When the consequences of their failure made themselves known, they let their nations fall into extremism. Now that they have to face a real fighting force, they are on the back foot. Why should a continent that has proven itself to be so weak deserve anything else but a tight leash?\nWe've fought the Europeans for long enough; it's time to remind them why the American century will be eternal.\n\nThe East, the land they went to war with Russia over so long ago, is where their last holdouts remain, where they hide like rats in a cupboard. A decisive and methodical final push into the region will be enough to squeeze the last ounce of fight out of the Europeans. Their war machines will be stopped, their cities will be bombed, and the extremists will pay.\nWhen they realize the error of their ways and finally bend the knee, Order will be reestablished in Europe, once and for all."
 

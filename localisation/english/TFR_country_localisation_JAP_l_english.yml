 JAP_go_back_time: "§YChange the Past§!"
 JAP_go_back_time_desc: "Are you seeing this? The world has descended into chaos, as if someone had overwritten the code of reality with dirty hands! Wars, crises, collapses - it all started with one tiny virus that distorted the very fabric of time. But ask anyone, "Why?" They'll shrug. "Fate," they'll mutter. Fate? No! It's a glitch in the algorithms of fate!\n\nSomewhere in the underground laboratories of Tokyo, a countdown clock is ticking. Our scientists have cracked the quantum equations and found the singularity point - 2019. There, in the fog of forgotten days, lies patient zero. The one who set off the dominoes of catastrophe. We'll build a bridge across the time axis, rewrite the pandemic code... and erase this nightmare from the memory of the universe!\n\nBut know this: Time is not clay. One wrong move, and instead of a fix, we get collapse. Are you ready to become history's hackers? Upload an antivirus to the past? Reboot a world where oil is just a resource, not a weapon, where masks remain in operating rooms, not on the streets?\n\nTurn on the chrono-field resonators. Set the coordinates. Today we are not scientists - we are surgeons of time. And our scalpel is a vaccine against madness!"

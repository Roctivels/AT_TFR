 jap.60.t: "Pride of the Fleet Sunk"
 jap.60.d: "It was a perfect morning, with the Tokyo sunlight streaming from the direction of Mount Fuji onto the Ichigaya plateau. The Rising Sun flag atop the Ministry of Defense building fluttered gently in the morning breeze, producing a faint rustling sound. The Chief of Naval Staff had just brewed his daily essential green tea by the office window, with steam gracefully rising from the cup.\n\nHe gazed out at the scenery, feeling unusually relaxed. Yesterday's exercise report had indicated that the newly launched warship was in good condition, and today's weather was ideal for a new round of training. The aroma of tea filled the morning light, making everything seem just right.\n\nSuddenly, the footsteps of the communications officer echoed abruptly down the corridor, much faster than usual. After knocking on the door, the officer handed him a newly received battle report. The report was thin, containing only a few lines of text. Standing by the window with ample light, the handwriting was clearly visible: Warship sunk, heavy casualties."
 jap.60.a: "A black day for the nation..."
 jap.61.t: "Imperial Family Killed in Nuclear Attack"
 jap.61.d: "The height of wars are always raised, knowing the limits and knowing what paths to go down. And the paths one should not tread upon.\n\nChina has launched a nuclear attack on Tokyo, already evacuations were made and shelters were opened, but the damage done on the city was immense.\n\nAfter the mushroom cloud rose over the city, the forests were set ablaze and the buildings were turned to rubble, a shocking revelation was made. The imperial family, a symbol that represents Japan at its peak, have sadly been killed in this attack, the evacuations have been too chaotic for the family to escape on time, alongside their people.\n\nWith such devastating news, and the destruction rained upon Tokyo, there isn't much compassion left in the heart of Japan, instead it is replaced with hatred."
 jap.61.a: "'With my death, I humbly apologise to the Emperor for the great crime.'"
 jap.62.t: "Pro-Peace Protests"
 jap.62.d: "As Kimura Haruki exited the east gate of Shinjuku Station, the sunset was slowly sinking behind the glass curtain walls. His suit was as wrinkled as usual, and the strap of his briefcase had left a deep mark on his shoulder.\n\nThis was his 3,427th-or possibly the 3,428th-time passing through here, so many times that even he couldn't keep track. The anti-war crowd in the plaza was larger than yesterday, with waves of voices surging one after another. Kimura Haruki took out his phone, habitually checking his online bank account. Mortgage rates had risen again, and his bank balance was dwindling day by day under the shadow of the war.\n\nStaring at the cold numbers on his phone screen, Kimura suddenly realized that this war was eroding everyone's future. He thought of the elderly lady on the train this morning sighing at the newspaper about rising prices, and the rumors of layoffs his colleagues whispered about during lunch.\n\nThe crowd's voices surged once more, and this time, Kimura Haruki did not rush away as he usually did. He stood still, feeling the surrounding sounds gradually merge with his heartbeat. This was the first time he took the flyer in his hand seriously."
 jap.62.a: "He became one of them."
 jap.63.t: "Anti-China Protests"
 jap.63.d: "At dusk in Fukuoka, Ryuichiro Matsuda led a group of people in a march along the main road outside the Tenjin underground shopping street. His voice was hoarse yet tireless, the megaphone in his hand projecting his words through every alleyway.\n\n"Look at these Chinese's shops!" Matsuda pointed to the businesses hastily closing their doors. "Who knows who they're contacting every night? Who knows if these shops are hiding explosives, preparing to aid the enemy in sabotage." Behind him, the crowd grew larger, footsteps echoing through the streets.\n\nA student was about to turn into a narrow alley but was blocked by the marching crowd. She kept her head down, quickened her pace, and disappeared around the corner of a 7-Eleven store. Matsuda's gaze followed her, his voice rising even higher: "They live among us, using our facilities, enjoying our resources, yet secretly informing the enemy. How shameful! Fellow citizens, we must expel these enemies from Japan without leaving a single one behind..."\n\nA Self-Defense Force military transport helicopter flew low overhead, briefly muffling the march's roar. Streetlights in the distance began to illuminate one by one, their reflections casting a cold light on the tightly shut shop windows."
 jap.63.a: "Chinese, Get out!"
 jap.64.t: "Two Parties Announce Exit from Civic Coalition"
 jap.64.d: "In a conference room in Tokyo's Chiyoda Ward, JCP Chairman Kazuo Shii and SDP leader Mizuho Fukushima jointly announced their departure from the Civic Coalition. Formed less than a year ago, the alliance had aimed to challenge the ruling LDP.\n\nShii stated during the press conference: "We joined the Civic Coalition with great hopes of achieving a true regime change. However, certain extremist elements have undermined our shared foundation." He criticized the rise of populism and the endless internal disputes within the coalition. Fukushima added, "The Civic Coalition has strayed from its original mission to serve the public. We cannot support factional infighting, nor can we accept turning cooperation into compromise," alluding to internal conflicts over issues such as nuclear phase-out.\n\nIn reality, the rift between the JCP and the coalition had long been apparent. For instance, divisions over proposals to abolish the consumption tax and revise the U.S.-Japan Security Treaty caused major friction. Last month, leftist members staged a rally shouting anti-China slogans, while the far-right group Issuikai advocated for closer Sino-Japanese economic ties. The clashes escalated into physical confrontations outside the venue.\n\nThe Civic Coalition responded swiftly, with a minority of far-left members declaring on social media that this was "purification complete," portraying the event as a victory. However, sources within the Constitutional Democratic Party admitted, "Losing the support of the JCP and SDP could result in a significant drop in coalition approval ratings."\n\nThis incident has exposed deep divisions within the Civic Coalition, leaving its electoral future uncertain. University of Tokyo political science professor Jiro Yamaguchi commented, "If the coalition fails to return to a centrist policy framework, it will inevitably collapse.""
 jap.64.a: "The road ahead remains uncertain."

 jap.66.d: "Решили Горшок с Князем новую песню написать., Горшок говорит:\n\n-Давай выпьем, так получше фантазия разгуляется.\n\nНу нажрались в слюни как обычно. Утром просыпаются, Князь спрашивает Горшка:\n\n-Ну что, написали мы вчера песню?\n\n- Написали.\n\n-А про что песня то?\n\n- Я дословно не помню, но суть в том что чью-то бабу сначала всем селом ебали, а потом всем селом сожрали."
 jap.66.a: "YES"
 jap.67.t: "Reintroducing Conscription - How?"
 jap.67.d: "The flames of civil war rage so fiercely that they seem capable of reigniting Mount Fuji, consuming all of Japan in a hellish blaze. As the battle lines grow more complex, the situation becomes ever more unpredictable. Our regular army units are stretched thin, and we urgently need fresh troops to bolster our reserves and reinforce the front lines. The quickest way to achieve this is by reintroducing conscription.\n\nOn one hand, the benefits of conscription in strengthening our military are clear. On the other hand, strong objections exist. Critics argue that years of peace have left most citizens-primarily workers and students-ill-prepared for combat. Even with basic training, sending them to the front lines would likely result in high casualties. Moreover, integrating large numbers of conscripts into active-duty units would reduce overall combat effectiveness, complicate command structures, and increase logistical challenges-ultimately doing more harm than good.\n\nThe cabinet is deeply divided over the regulations and resolutions surrounding conscription. However, time is of the essence in wartime. If we cannot reach a swift consensus, our enemies may take advantage of our indecision and gain a critical upper hand..."
 jap.67.a: "Let's not go too far now..."
 jap.67.b: "Our democracy is on the line here!"

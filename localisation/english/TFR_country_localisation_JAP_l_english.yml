 jap.53.t: "Japan Promises to Protect Us"
 jap.53.d: "The Ministry of Foreign Affairs reports that the Japanese Prime Minister officially announced today at a joint press conference a security protection commitment for our country. \n\nAdditionally, Japanese local media have confirmed that this declaration has received support from the Japanese Cabinet and Parliament."
 jap.53.a: "Good, very good."

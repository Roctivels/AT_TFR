 jap.50.t: "Japan Has Sent Weapons"
 jap.50.d: "The Ministry of Defense reports that the Japanese government has begun supplying defensive weaponry to our side, including air defense systems and electronic warfare equipment. The first batch of materials arrived at the designated port today.\n\nMilitary leaders expressed great satisfaction with these equipments, stating that with them, our combat capabilities can be further enhanced."
 jap.50.a: "Good, very good."
 jap.51.t: "Japan sent money"
 jap.51.d: "The Ministry of Finance reports that the Japanese government has provided several aid funds to our side through official channels. These funds will be used for the reconstruction of our infrastructure and ensuring the well-being of our citizens.\n\nThe Minister of Finance expressed great satisfaction, stating that with these funds, a strong boost can be injected into our economic development."
 jap.51.a: "Good, very good."
 jap.52.t: "Japan Has Sent Volunteers"
 jap.52.d: "The Ministry of Defense reports that a technical advisory group composed of retired members of the Japan Self-Defense Forces has arrived in our country. This volunteer force of several hundred individuals will assist us in military training and technical guidance."
 jap.52.a: "Good, very good."

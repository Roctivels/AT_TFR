 jap.81.t: "Kuril Islands Problem"
 jap.81.d: "The Kuril Islands, consisting of Kunashir, Iturup, the Habomai Islands, and Shikotan, hold immense strategic importance. They guard the outlet of the Sea of Okhotsk, control vital maritime routes, and possess rich fishing resources along with potential oil and natural gas reserves. Over the past decades, Japan and Russia have experienced a series of protests, compromises, and conflicts over the sovereignty of these islands.\n\nHowever, Japan's government is now focused on countering China's growing influence, and many within the government believe that Japan is neither capable nor in a position to antagonize Russia further. Resolving the Kuril Islands issue could alleviate Japan's northern defense pressures and pave the way for a series of trade agreements with Russia to boost economic development. Still, some argue that Japan should not abandon its claims to these inherent territories."
 jap.81.a: "It's time to sign a peace treaty..."
 jap.81.b: "We will put this question on backshelf"
 jap.82.t: "Russo-Japanese Peace Treaty"
 jap.82.d: "After lengthy and complex negotiations, the Japanese government has finally signed a historic peace treaty with the Russian Federation, officially renouncing its claims to Southern Kuril Islands (referred to by Japan as the Habomai Islands, Shikotan, Kunashir, and Iturup Islands).\n\nWhile this treaty marks the beginning of a new era in Japan-Russia relations, the mood in Tokyo is mixed. A large crowd has gathered in front of the Prime Minister's Office. Supporters believe that giving up the territorial dispute is a necessary trade-off for long-term peace and stability. Opponents, however, condemn the government's weakness, viewing it as a betrayal of national dignity and pride, and an abandonment of historical grievances."
 jap.82.a: "Finally!"
 jap.83.t: "Increased Japanese Cooperation"
 jap.83.d: "A wave of economic revival has swept across Russia's Far East. Massive Japanese investments have flowed in like a tide, covering everything from energy development to infrastructure projects. Fish processing plants have adopted Japan's advanced technologies and equipment, and the timber trade has seen rapid growth, with Russia's vast forest resources being exported worldwide through Japanese channels.\n\nJapanese goods now fill the shelves of shopping centers across Russia, offering everything from high-tech electronics to everyday essentials, meeting virtually all local consumer needs. Once dilapidated factories in the Far East have been revitalized with Japanese funding and technology, driving a boom in the local job market. Modern production lines operate non-stop, absorbing a large workforce and boosting economic growth, greatly improving the living standards of the region's residents."
 jap.83.a: "Good!"
 jap.84.t: "Russian Investments"
 jap.84.d: "Since our increased cooperation, Russian energy companies have established strategic partnerships with energy companies within our country. Together, they have cooperated in constructing multiple oil pipelines and liquefied natural gas receiving terminals, ensuring the stability and security of our energy supply. Additionally, Russia has undertaken the construction of several large domestic projects, including high-speed railways, ports, and bridges. In particular, Russian investment has significantly improved transportation conditions in the Hokkaido region, boosting tourism and related industries.\n\nIn addition to economic cooperation, Japan and Russia have made significant progress in cultural exchanges. Russian rock and punk music have gained considerable popularity in the Japanese market. Moreover, the two countries have achieved multiple successes in film exchanges. So much so that soyuzmultfilm began cooperation with several anime studios to create a joint Russian-Japanese cartoon, in the process exchanging experience in creating cartoons, other than that the influx of russian movies and series flooded Japan for the series "the king and the Fool" (dubbed in japanese as Koror i Shut) became popular in Japan."
 jap.84.a: "Japanese and Russian are brothers forever!"
 jap.85.t: "Economic Open Doors with Russia!"
 jap.85.d: "After the signing of the treaty, bilateral trade between Japan and Russia saw a significant surge. Thanks to the reduction of tariff barriers and the gradual implementation of trade facilitation measures, Japan's exports to Russia achieved remarkable breakthroughs, particularly in sectors such as automobiles, electronics, and high-end machinery, with export volumes increasing significantly. At the same time, Russia's energy resources, including oil, natural gas, and coal, have been continuously supplied to Japan, greatly alleviating Japan's long-standing energy shortage.\n\nIn addition to the booming trade, cooperation in the investment sector between Japan and Russia has deepened and diversified. Japanese companies have participated in the development of multiple regions in Russia's Far East and Central Siberia, with investments spanning energy, infrastructure construction, agriculture, tourism, and high-tech industries. Meanwhile, Russian companies have increased their investment in the Japanese market, particularly in energy, minerals, and forestry, promoting a two-way flow of bilateral investments.\n\nIn terms of technological cooperation, the two countries have engaged in extensive collaborative research and technology exchanges. Especially in the field of robotics, Japan's technological expertise has been combined with Russia's market demand, leading to the development and practical application of several innovative products."
 jap.86.d: ""
 jap.87.t: "Rising Anti-LDP Radicalism!"
 jap.87.d: "Troubling news across the country, with the LDP's power more entrenched and the influence of other parties greatly diminished, more radical elements have taken root in the hearts and minds of the Japanese people.\n\nRanging from democratic aligned groups, populists, activists and even more volatile factions, all have taken mostly peaceful actions against the current political monopoly the LDP has on Japan. \n\nWith the ever growing presence of dissident voices, there won't be a day without news of radical activities, however with the strong arms of law and order on our side, it'd take a disaster for us to fall."
 jap.87.a: "We will not bow down!"
 jap.88.t: "Vote or Lose"
 jap.88.d: ""So what, why would i vote on a matter i don't really care about?"\n\nIt has been a long day for Takeshi and Akio, the national diet is a great web of nuance and backdoor deals, coalitions are formed and members become weights for resolutions to tip the scales in one's favor. One of the many bars in Tokyo was empty as the two parliament members sat down, enjoying a couple of beers.\n\nAkio grinned, he always considered Takeshi an idealist at times, at other moments he was a stubborn bastard that always put his foot down.\n\n"Well you know how it is, the entire point of coalitions is that we're all on the same page."\n\n"Yeah but, these kinds of things require proper research, i don't know much about the subject and you just want me to vote on what my gut instinct tells me not to." Takeshi was already a bit tipsy, Akio was really nagging him and he'd rather just drop the subject.\n\n"Besides, you think your career would survive if the others would know you're being a child abo-"\n\n"Alright! fine! i'll vote, just... drop it already and have a good time alright?"\n\nAkio smiled again, in a more warmer tone. "There we go, if it helps, i'll pay the tab.""
 jap.88.a: "Freedom comes with responsibility"
 jap.89.t: "The Problem of Choice"
 jap.89.d: "It was a rainy day, the sun was nowhere to be seen as rows of people were waiting in line. A young couple stood out, man and woman, he was carrying an umbrella, protecting his loved one from the rain.\n\n"How much longer is it?" the woman asked.\n\n"Not that much longer, no need to be so gloomy, it's important to vote, to let your voice be heard no?" The man gently smiled at her as he overlooked the line moving a bit closer to the building. Mayoral elections were around the corner and the period of voting gave people a chance to let their voices be heard, to show their dissatisfaction or satisfaction with the current state of things, albeit on a more local level.\n\n"What's the point? The LDP is going to win anyways, like they have for years, i could have been at home all cozy and warm, with you but now we're just stuck here in the miserable rain."\n\nThe man laughed a bit. "Well all we have is a voice and time, if we have it then why not use it now? besides who knows, eventually some actual change might occur."\n\n"Fine, but you owe me pastry after this.""
 jap.89.a: "That's life"
 jap.90.t: "Iron Hand of Justice"
 jap.90.d: "It had been a while after the war in Taiwan, the streets were filled with unrest, acts of violence across the political spectrum were ever present and the government has been struggling to maintain cohesion around the country.\n\nAn old man was overlooking the streets from his apartment, military trucks were driving past his sight as he noticed commotion down to the street closest to him.\n\nA young man was yelling at one of the soldiers at a military checkpoint, it was hard to make out what he was saying but there was a lot of anger in his voice. The soldier maintained a calm composure, this wasn't the first time he suffered verbal abuse but one of the other soldiers present lost his patience and knocked the young man down with the butt of his rifle.\n\nThe old man kept looking as the knocked down citizen was dragged away, he let out a sigh as he pondered, recently the Japanese government had declared martial law which has greatly reduced several liberties, extremists were arrested and the streets were littered with military checkpoints.\n\nThe military was overly paranoid he thought, a bit harsh as well but he understood the necessity for such acts, he just hoped that Japan would return to a stable state sooner than later and if that meant that the rowdy ones would get a firm slap on the wrist, then so be it."
 jap.90.a: "I call that justice"
 jap.91.t: "Death of Shinzo Abe"
 jap.91.d: "Shocking news coming from the city of Nara, ex-prime minister Shinzo Abe was attacked during his speech. His speech was interrupted by two loud booms coming from the street behind the politician, accompanied by large puffs of smoke. The alleged assailant was then wrestled to the ground and taken away by security.\n\nAbe was then transported by helicopter to Nara Medical University Hospital in the city of Kashihara, where he was pronounced dead. The official autopsy asserts that "the bullet went through Abe's upper left arm and damaged a blood vessel under his collarbone" and lists the official cause of death as "loss of blood."\n\nThe assailant, 41-year-old Tetsuya Yamagami, did not attempt to escape. He was arrested and has been interrogated by police."
 jap.91.a: "Goodnight, sweet prince..."
 jap.92.t: "Unification Church"
 jap.92.d: "According to some reports, Yamagami has told investigators he was not motivated by disagreement with Abe's political beliefs, but "rumors about the former leader's connection to a certain organization that police did not identify." Other reports assert that Yamagami blamed the "certain organization" for having bankrupted his mother, who apparently donated a lot of money to the group.\n\nSpeculation about the identity of this "certain organization" is currently centered around The Unification Church. The Family Federation for World Peace and Unification-formerly called the Unification Church but perhaps best known as the church that "The Moonies" belong to-was founded by the Reverend Sun Myung Moon in 1954. Another organization that comes up in association with Abe (and with the Unification Church) is Nippon Kaigi. Described as the "largest and most powerful conservative right-wing organization". The LDP still has conservative members who participate in all these organizations, and the question arises, what to do with these elements? Will we try to kick them out of politics or will we try to wait until everything gets better?"
 jap.92.a: "We need to remove those elements from politics!"
 jap.92.b: "We should just lay low..."
 jap.93.t: "Japanese-Taiwanese Brotherhood!"
 jap.93.d: "The war in Taiwan has destroyed the lives of many, against the Chinese aggressor we have suffered alongside our allies in Taipei and in war we have found brotherhood.\n\nAfter successfully pushing the Chinese into the ocean, we were left with intense destruction left on the lands of Taiwan, a bitter fire rained upon us by the Chinese. In this however, we have found common ground.\n\nWe have made efforts to aid Taiwan in its reconstruction, and in building up any new defenses, in this we have garnered a lot of influence over the island to the point there are concerns that this is a call back to the times of the rising sun.\n\nWe have no intentions of that, and with bright smiles and enough supplies we can convince the people of Taiwan that we mean well."
 jap.93.a: "Two suns, together."
 jap.94.t: "Economic Crisis Hits Japan!"
 jap.94.d: ""
 jap.94.a: "It's the end of the world as we know it"
 jap.95.t: "Japan is zeroing out its debt to America!"
 jap.95.d: ""
 jap.95.a: "We're finally free"
 jap.96.t: "Liberal Democratic Party Presidential Election!"
 jap.96.d: "The time has come for the next congress of the Liberal Democratic Party of Japan, where the future of the country and the party will be decided. The question on the agenda is whether the incumbent prime minister should continue in office or nominate a new candidate capable of leading the country at a new stage of its development. The factions within the LDP are beginning an active debate on whether to keep the current prime minister in office or choose a more promising leader to strengthen the party's position. Regardless of the outcome of the vote, this choice will have a decisive impact on the LDP's domestic policy in the coming years."
 jap.96.a: "Shigeru Ishiba"
 jap.96.b: "Fumio Kishida"
 jap.96.c: "Taro Kono"
 jap.96.e: "Sanae Takaichi"
 jap.96.f: "Shinjiro Koizumi"
 jap.96.g: "Shinzo Abe"
 jap.97.t: "General Elections"
 jap.97.d: "Rallies in support of the LDP are taking place all over the country, while the opposition is losing ground, unable to offer an alternative comparable to the party's triumph. The joy of victory and the sense of pride in the nation's achievements permeate the entire society, from rural towns to megacities. Encouraged by this success, voters are rushing en masse to the ballot box to support the LDP in the upcoming parliamentary elections.\n\nPolitical analysts have already dubbed this moment the "Patriotic Wave," as electoral sentiment appears to be absolutely dominant in favor of the LDP. Polls show record support ratings, while the opposition parties' election campaigns barely attract media attention. The LDP is expected to win easily, maintaining its majority in parliament with an even stronger mandate to continue its policies."
 jap.97.a: "Victory!" 
 jap.98.t: "Korean-Japanese Partnership"
 jap.98.d: "With a grand victory over the Chinese aggressors in the Korean peninsula, we have accumulated a sizable amount of goodwill across the continent, those that fought with us as allies have seen us in a much more positive light, one of them being Korea.\n\nOur history with Korea has not always been positive, however the past is a block on both of our people's legs that is holding us back.With the amount of effort, resources, lives and funds invested into Korea, the question slowly arises on whether we might rekindle a new eternal friendship.\n\nThis of course is met with mixed responses, some are worried this is just another attempt at neo-imperialism while others don't see a point in adding their burdens onto ourselves. Obviously this will never reach the same levels as we did years ago, but there'll always be voices of protest. There are plenty that agree with this however, some seeing it as a clear message to the rest of the world that an attack on Korea is an attack on Japan, and a sign that our relations have properly healed.\n\nStill at the end of the day, a choice has to be made."
 jap.98.a: "Let's step over the past and create a new eternal friendship!" 
 jap.98.b: "We shouldn't go overboard with this..." 
 jap.99.t: "Shinzo Abe Returns to Politics!"
 jap.99.d: "After struggling with ulcerative colitis for a while, former prime minister Shinzo Abe has made a surprise announcement that he has returned to Japanese politics, this has generally been received as a positive event with the occasional detractor here and there expressing gloom over the potential scenario of a return to the status quo.\n\nThe LDP has welcomed him back with open arms and already Shinzo has made clear that he once again aims for the position of prime minister, hopefully this time with less health concerns."
 jap.99.a: "Return of the norm."
 jap.100.t: "Сurrent Goals of Army Modernization"
 jap.100.d: "The situation in the Taiwan Strait has escalated rapidly, and although the conflict has temporarily subsided, the performance of the Self-Defense Forces has revealed serious deficiencies, some of which are significant enough to threaten their core combat capabilities. If these issues are not addressed in a timely manner but rather ignored, our military's combat readiness will be difficult to maintain at its current level, and may even see a significant decline. Therefore, implementing comprehensive military modernization reforms is an urgent task that cannot be delayed.\n\nOur objective is no longer simply to rely on the Self-Defense Forces to defend Japan's homeland. Instead, we must transform them into a multifunctional, all-encompassing force capable of responding to complex international situations. In the wake of the collapse of the United States, it is evident that China's ambitions will not stop at Taiwan; their strategic expansion is gradually threatening the stability and security of the entire East Asia region. Japan must make strategic adjustments and comprehensively enhance the combat capabilities of the Self-Defense Forces, not only to defend its territory but also to acquire the ability to intervene in regional affairs. Only in this way can Japan play a key role in shaping the future order of the East Pacific."
 jap.100.a: "Let's get started!"
 jap.101.t: "State of the Japan Ground Self-Defense Forces"
 jap.101.d: "Report Title: Issues Exposed by the Ground Self-Defense Forces\n\nDuring the confrontation with China, the Ground Self-Defense Forces exposed several critical issues, such as disorganized command structures, insufficient equipment maintenance, and low morale in some units. These problems have severely impacted the combat effectiveness of the forces.\n\nIn the Taiwan War, joint operations among the army, navy, and air force revealed significant command and coordination problems. There was a lack of effective communication between army divisions, leading to fragmented operations, disordered attack rhythms, and missed opportunities. The root cause lies in the incomplete development of the joint operational mechanism among the three services, with the absence of a unified command and coordination structure. This resulted in delayed information transmission and difficulty in effectively implementing combat plans.\n\nInadequate equipment maintenance also seriously affected combat efficiency. For instance, some tanks and armored vehicles experienced engine failures, making them unable to operate; artillery pieces suffered barrel explosions due to poor maintenance; and personal weapons rusted due to moisture, rendering them unusable.\n\nLow morale and a fear of battle spread among some army units. Faced with fierce enemy resistance, certain units displayed a reluctance to fight, with some even deserting. After heavy bombardment from the enemy, some soldiers panicked and disbanded, which severely impacted the morale of other units."
 jap.101.a: "There is a lot of work to be done."
 jap.102.t: "State of the Japan Air Self-Defense Forces"
 jap.102.d: "Report Title: Issues Exposed by the Air Self-Defense Force\n\nOutdated Aircraft: Our primary fighter jets, such as the F-15J and F-2, have been in service for a long time, and their avionics systems and weaponry are outdated compared to the new-generation aircraft of the People's Liberation Army Air Force . This has placed our forces in a passive position during aerial combat, making it difficult to effectively counter the advanced PLAAF jets such as the J-20.\n\nInsufficient Drone Combat Capabilities: Our investment and research in drone warfare have been significantly lacking. The limited number and outdated performance of our current drones make it difficult to effectively counter the PLAAF's drone swarm tactics.\n\nInadequate Intelligence Gathering: At the onset of the conflict, our assessment of the PLAAF's capabilities was significantly flawed, leading to errors in tactical deployment. This reveals a clear deficiency in our intelligence gathering and analysis capabilities.\n\nWeak Electronic Warfare Capabilities: The PLAAF demonstrated strong electronic warfare capabilities during the conflict, effectively disrupting our radar and communication systems. Our response in the field of electronic warfare was inadequate, putting us at a disadvantage in information gathering and command and control."
 jap.102.a: "To Skies Unknown..."
 jap.103.t: "State of the Japan Maritime Self-Defense Forces"
 jap.103.d: "The Taiwan war has revealed several deficiencies in the Japan Maritime Self-Defense Forces. If these deficiencies are not promptly addressed, they will severely limit its role in future regional conflicts and may even jeopardize its own security.\n\nThe primary issue is the lack of strategic foresight. The MSDF has long focused its strategic priorities on countering traditional maritime threats. However, its ability to anticipate and respond to new forms of warfare, such as hybrid warfare, information warfare, and cyber warfare in the context of modern conflict, is clearly insufficient.\n\nSecondly, there is a relative decline in military power. Despite the MSDF's possession of advanced vessels and equipment, its advantage is steadily diminishing in the face of the rapidly growing military capabilities of the People's Liberation Army . In recent years, the PLA Navy has undertaken large-scale commissioning of new destroyers, frigates, submarines, and aircraft carriers, significantly improving both the quantity and quality."
 jap.103.a: "Eventually, we will outshine them."
 jap.104.t: "Grand Military Parade in Tokyo"
 jap.104.d: "Today, Tokyo's streets were packed with thousands of people, all eager to witness the grand parade. The crowd, waving their Rising Sun flags, was filled with excitement and anticipation. This was the largest military parade Japan had seen in the 21st century, marking a moment for the nation to showcase its military power after decades of restraint under the Peace Constitution.\n\nThe parade began with the thunderous roar of F-35 fighter jets, painted in blue, streaking across the sky. Following closely behind was a formation of Type 10 main battle tanks, Type 99 self-propelled howitzers, and Type 89 infantry fighting vehicles, rolling through the heart of Tokyo, met with waves of cheers from the crowd.\n\nNext came the massive "Izumo" light aircraft carrier, escorted by several frigates as it slowly sailed through Tokyo Bay. On its deck were SH-60K anti-submarine helicopters and F-35B fighter jets.\n\nThe highlight of the parade was undoubtedly the Prime Minister's speech. Dressed in a black suit, the Prime Minister took to the podium under the gaze of the expectant masses.\n\n"For decades, Japan has adhered to its Peace Constitution, but the world today is far from peaceful. Terrorism, regional conflicts - these threats constantly loom over our safety."\n\n"Japan, as a beacon of democracy and freedom in Asia and the world, can no longer remain silent! We will break the chains, reclaim our responsibilities, and stand at the forefront of defending freedom and democracy in Asia!""
 jap.104.a: "Banzai!"
 jap.105.t: "Under the Rising Sun"
 jap.105.d: "Looking back, the roaring economic boom of the past has now become a fleeting memory, and the aftershocks of the bubble's collapse still ripple across the nation. The younger generation, gradually lost in the cradle of consumerism, has grown up surrounded by material desires, while their sense of national and cultural identity has quietly faded away in the daily comfort of life. Faced with multiple pressures such as economic stagnation and an aging population, we must admit that only by reigniting the flame of patriotism in the hearts of the people can we unite the nation and revitalize our spirit. Yet, the shadow of defeat in war, the constraints of the Peace Constitution, and deep reflection on militarism have made patriotism a sensitive and complex topic in Japan, leading to hesitation.\n\nHow can we inspire love for the homeland without awakening the specter of militarism? This remains an unresolved dilemma. There are many differing opinions within the government, with no clear consensus. Ultimately, the debates focus on whether to rearm Japan and adopt a stronger stance to reassert itself on the international stage and reclaim national glory.\n\nHowever, political discussions alone cannot truly touch the hearts of the people. We must seek answers deep within our culture. From the resilience of the Bushido spirit to the fleeting beauty of falling cherry blossoms, from the profundity of traditional arts such as tea ceremonies and flower arrangement, to the emotional resonance of modern pop culture like anime and video games - these can all serve as keys to unlocking the patriotic passion of the younger generation. Only by doing so can we awaken the deeply buried patriotic sentiment in our nation's new generation."
 jap.105.a: "As cherry blossoms swirl, the soul finds its way home."
 jap.106.t: "NHK Post-Taiwan War Report"
 jap.106.d: ""And that concludes our weather report, moving onto Fumiko with his report on Taiwan and the conclusion of the conflict, go ahead Fumiko."\n\n"Thank you, Akane, as you may see behind me, reconstruction of Taipei is well underway, after Japanese forces have conducted the peacekeeping operation in maintaining Taiwanese independence, some of our troops have are staying on this beautiful island, providing security and peace to the country until it has no need for them anymore."\n\n"However there have been concerns from our friends here and the good folks in Japan on whether this peacekeeping operation was for nothing more but the betterment of Japan, to this i strongly disagree with, our troops were present here to prevent the occupation of Taiwan by the hostile Chinese and to thwart any plans of future expansion into Asia, furthermore we are providing the resources Taiwan needs to rebuild so that they may be able to prosper again, this time they will be more relaxed with the immediate threat of conflict gone."\n\n"With our commitment to peace in Asia, we will make sure that the noble sacrifices our men and women made won't be in vain, ensuring that the bright light of democracy keeps on shining."\n\n"No matter what critics may say, they are unable to deny that we have kept Asia in a state of peace""
 jap.106.a: "Thank you Fumiko, now onto sports."
 jap.107.t: "Within the Four Seas, All Men are Brothers."
 jap.107.d: "Mohamed mind could only drift away from the droning chores he was once so happy to do, thinking ever more of a homeland he was once so happy to have left, slowing his labour to dream about the highlands of his birth, or sometimes of the curry he had sealed for lunch.\n\nHe'd once been so happy to see the shores of Japan, the nation with very well groomed men on its banknotes, all very proper, western and possibly almost European. The nation with skyscrapers and clean streets, where there were seemingly no stray animals, a nation perhaps one day he could see himself with a full stomach; dazing lazily in the sunshine as remuneration for his toils.\n\nNary a thought spared on the way over to how he now struggled to read the writing, how he struggled to speak and how people met him with darting eyes rather than homely smiles, perhaps if he could work just one more week and take his pay... Perhaps if-\n\nSuddenly all thoughts overwhelmed by a blaring lunch whistle, and his thoughts were doubly overran by thoughts of food, quiet and fleeting rest.\n\nObserving a fleeing flock of seagulls, his eyes and head turned involuntarily towards the sound of well spoken, eloquent, fluent Japanese. Slightly out of breath, a man dressed as he was, spoke to him that "we are having a get-together with all the new workers at a bar nearby after work!" And with such a welcoming tone, Mohamed for the first time without anxiety, almost stammered out the words: "Yes, thank you.""
 jap.107.a: ""So, what are you having for lunch?""
 jap.108.t: "The Chatter"
 jap.108.d: "Kishi looked at Shinsato.  The rays of the sun were only now just settling into shadows under the trees beside them, but Kishi saw his companion's face clearly even through the glass of the Ramune at his lips. It evoked a memory of them sipping Coca-Cola on a bench in San Francisco a lifetime ago, salarymen of titanic spirits and brilliant intellects that wielded capital against their competitors.\n\n"America."\n\n"Hmm?" Shinsato relinquished his drink and looked at his friend curiously.\n\n"America, it looks like its all going to go up in smoke."\n\nEyes rolled and drink suppered without comment, still Kishi queried: "Do you think the stock exchange will recover? I'm down."\n\nThe glass was sheathed on the table and with an assuring light shining from a wry smile and alert eyes, Shinsato spoke: "Yes, I am certain everything will be okay for us, no need to worry like you usually do."\n\nKishi smiled in a way that surrendered his conscience to his friend, this expression of absolute trust apparent on his wrinkles, this he reserved for this man alone, as he had never been wrong before."
 jap.108.a: ""Yes. Everything will be fine.""
 jap.109.t: "Sharp arguments"
 jap.109.d: "Politics have never been that much of interest to the Japanese people but after the recent conflict in Taiwan, more and more people have been paying attention to Japan's internal politics, between the campaigns and activism, the amount of viewers on political interviews have increased as well.\n\n"With all due respect Kato but article nine has proven time and time again that quiet pacifism is a fool's errand, we were lucky to have fended off Chinese aggression to begin with, could you imagine if we did not have such a restrictive part of our constitution?"\n\nAnother day, another debate on "Live till morning!" which is hosted by Soichiro Tahara, he has introduced the viewers to both Sasaki from the conservative faction and Kato of the liberal faction, for a while the debate went by without any heightened emotions but when the issue around article nine arose, voices were raised.\n\n"Japan's main goal in any conflict is to maintain the peace, you should know this by now Sasaki, we aren't a nation of war, not anymore."\n\n"With this dedication to solely being on the defense, we had to face the brunt of Chinese hostilities, the Taiwan war has proven this an-"\n\n"But the conflict wasn't a war?"\n\nSasaki went silent, a bit dumbfounded.\n\n"No no Sasaki, the Taiwan operation wasn't a war, it was a peacekeeping operation, we weren't on Taiwan to expand our territories nor to force our will on another independent nation, we were there to keep the peace on the island and to retain its sovereignty, Japan has abandoned its expansionist desires and with article nine, we will keep proving to the world that we do not sway from our intentions."\n\n"I mean yeah- i guess... When-" Sasaki stammered. "Taiwan's defense is Japans defense." Kato smiled."
 jap.109.a: "Our intentions remain the same."
 jap.110.t: "Daily Life"
 jap.110.d: "The distinctive sea breeze of Okinawa, laden with a salty dampness, swept over the tranquil Naha base. Yamato Tanaka sat in his dormitory, inspecting his support kit. Pink glow sticks were neatly arranged in a transparent storage box, accompanied by precisely folded support towels and meticulously prepared support fans. His fifteen-day leave had just been approved yesterday, and the ticket to the Fukuoka concert rested beside his LoveLive album. Yamato glanced at his watch; in six hours, he would be boarding the flight to Fukuoka.\n\nSuddenly, the shrill sound of an air raid alarm pierced the base's calm. "Emergency assembly! All members of the Third Land Operations Brigade, assemble!" The voice from the broadcast was unusually stern. "Repeat, emergency assembly!"\n\n"Yamato-kun!" The dormitory door was forcefully swung open, and countless chaotic footsteps and the clatter of equipment echoed from the corridor. Squad Leader Yamamoto wore an uncharacteristic look of tension. "We've heard there's trouble over the Taiwan Strait. Our brigade is being deployed to Taiwan to assist the Taiwanese military!"\n\nAs Yamato adjusted his uniform for the last time, his fingers instinctively reached into his pocket for the concert ticket. The broadcast was delivering a brief battle report, and on the distant helipad, helicopter rotors had already begun to spin.\n\nHe tucked the ticket into his side pouch and gently closed the dormitory door."
 jap.110.a: "From now on, forever, you and I will be irreplaceable."
 jap.111.t: "Lonely Farewell"
 jap.111.d: "The clouds and mist of Alishan slowly flowed before Yamato Tanaka's eyes, like a performance that would never end. He leaned against a moss-covered rock, feeling the warm blood slowly seeping from the bullet hole in his abdomen. "What a good place," he managed to say with all his strength. From this spot, he could see the craggy mountains, the lush forest stretching all the way to the coastline. Sunlight filtered through the clouds, casting dappled shadows and dyeing the entire valley golden. If one were to choose a place to die, this was indeed the most fitting.\n\nHe knew he wouldn't make it past today's sunset; he could feel his life slowly ebbing away with each heartbeat, leaking out from the bullet hole. Strangely, he didn't feel afraid; instead, he felt an unusual sense of peace. His trembling fingers reached into the pocket on his chest and pulled out the already wrinkled concert ticket. The idols on the ticket still wore bright smiles, though one corner was stained red with blood. He took one last glance at the date he would never be able to attend, then let go of the ticket.\n\nThe mountain wind gently lifted the ticket, causing it to spin in the air like a delicate cherry blossom. It flew over layers of treetops, across steep cliffs, and eventually drifted towards the shimmering sea in the distance. Yamato watched it disappear until it was no longer visible.\n\nAn hour later, a military helicopter hovered over the valley, and a ceasefire message came over the loudspeaker. Peace had finally arrived, but it was sixty minutes too late for Yamato Tanaka's life."
 jap.111.a: "He missed six hours, and also missed one hour."
 jap.112.t: "Dreams Come True"
 jap.112.d: "The sunshine at Naha Base remained as bright as the day before departure. Yamato Tanaka opened his dormitory door; his support kit still lay quietly in its place, with pink glow sticks reflecting a faint light under the sun, as if they had been waiting for a century.\n\nHe carefully opened the storage box; the support towels still held their neat creases. A thin layer of dust had settled on the support fan prepared before the war, which he gently brushed off, revealing Nishikino Maki's smile once more. The concert ticket he had brought to the battlefield and miraculously preserved had slightly yellowed, with some worn edges, yet it was more cherished than any medal.\n\nAs he packed, his fingers inadvertently touched the wound on his body. In that instant, the scent of gunpowder seemed to return to his nostrils. But soon, the sea breeze carrying the fragrance of hibiscus drifted through the window, washing away those battlefield memories.\n\n"The flight is at three in the afternoon," he murmured, tucking the concert ticket back into the album he carried with him, then gently closed the dormitory door."
 jap.112.a: "Please take care of me from now on."
 jap.113.t: "People First"
 jap.113.d: "Dear Fellow Citizens,\n\nAs the morning light illuminates the dome of the National Diet Building, we cannot help but ask: Does this symbol of democracy truly embody the will of the people? For decades, aside from the brief power shift in 2009, the Liberal Democratic Party's rule has never been genuinely challenged. This is no coincidence but a meticulously crafted political impasse.\n\nLet us face reality: we live under a soft dictatorship disguised as democracy. The LDP has portrayed itself as a "symbol of stability" through complex political funding systems, dealings with large conglomerates, and manipulation of the media. They have convinced people that without the LDP, Japan would descend into chaos.\n\nBut what is the cost of this "stability"?\n\nYoung people abandoning the formation of families due to the lack of stable jobs.\nThe continuous erosion of pensions for the elderly amidst inflation.\nThe gradual disappearance of the middle class burdened by mortgages and education expenses.\nThe decline of local economies as Tokyo becomes increasingly centralized.\nNow, the time for change has arrived.\n\nThe birth of a Civil Coalition is no accident. When left-wing parties realized the need to keep pace with the times, when liberals understood that ideals require organization, and when progressive forces set aside their differences, we found a common voice: Japan needs true democracy and a genuine multi-party system.\n\nLet us unite and shatter this myth of mild authoritarianism with our votes. For our children to grow up in a truly democratic nation and to return politics to the hands of the people, please join our cause."
 jap.113.a: "The future is within sight, and change is now."
 jap.114.t: "Stability First"
 jap.114.d: "Dear Fellow Citizens,\n\nAs the morning light once again illuminates the snow-capped peak of Mount Fuji and the first Shinkansen train departs punctually from Tokyo Station, all these moments speak of Japan's greatness and order. Reflecting on the period of the Liberal Democratic Party's  governance, we have created the world-renowned "Japanese Miracle," transforming this island nation into the world's second-largest economy and making "Made in Japan" synonymous with quality.\n\nThe neon lights flickering on the streets of Tokyo in the 1980s witnessed our prosperity; the nationwide highway network of the 1990s attested to our progress; the technological innovations post-millennium showcased our wisdom. All these were miracles achieved under the stable administration of the LDP.\n\nAt this moment, new challenges are calling. An aging population tests our wisdom, the international situation tests our resolve, and the technological revolution tests our innovation. But remember: it is under the leadership of the LDP that Japan has always found a way out of crises and maintained stability amidst change.\n\nChoosing the LDP is choosing a leader tested by time. We understand how to balance amidst transformation, how to preserve tradition while fostering innovation, and how to keep Japan shining in the new era.\n\nLet us together envision a beautiful future for our nation: streets remain clean, trains remain punctual, and people continue to live in peace and contentment. This is the Japan the LDP safeguards for you, and this is the ideal worth our eternal dedication."
 jap.114.a: "The LDP will continue to be your most reliable helmsman."
 jap.115.t: "Hitting the Fan"
 jap.115.d: ""Listen," Kaori slurred, one hand gripping her mic as if it were the last thing keeping her upright. "The LDP has been in power since, what, dinosaurs fuckin' roamed the Earth? And what do we have to show for it? Low ass wages, expensive apartments, and us, we're too burned out to even dream."\n\nHer words echoed across her dimly lit bedroom, where a cheap webcam perched precariously on a stack of books captured her unsteady figure. Her VTuber avatar - a bright-eyed catgirl with neon pink hair - stared at the audience with the same half-glazed intensity Kaori herself wore. She didn't have many viewers. Usually, her streams maxed out at fifteen people, half of them bots. But tonight? Something was different.Kaori waved an empty can of chu-hi in front of her webcam, though her avatar didn't register it. "You know what's brave? Living in this economy while they pour billions into pointless projects! Bridges to nowhere! Stimulus checks that barely cover ramen for a week! But yeah, tell us to 'stay strong.' I'm so FUCKING done with it!" She hiccupped, her head lolling back as laughter bubbled from her throat. It wasn't funny. None of it was funny. But it felt so good to let it out.\n\nSomeone in chat wrote: "Kaori, are you okay?" She squinted at the screen, her avatar's eyes rolling back. "Am I okay? Are we okay? Look at what they've done! They get richer, we get crushed. And nobody fights back because, what? 'It's just the way things are?' FUCK that!"\nKaori barely noticed the viewer count climbing. Fifty. Seventy. Two hundred. The messages became a flood, some cheering her on, others mocking her, and more than a few clipping every drunken word she said.\n\nThe next morning, her hangover was merciless. Her phone buzzed relentlessly on her desk, notifications lighting up like fireworks. 1,532 new followers on Twitter. Your clip "Drunk VTuber DESTROYS LDP" is trending with 13k likes."
 jap.115.a: "Oh. Oh my god."
 jap.116.t: "New and Old"
 jap.116.d: "In an office in Kasumigaseki, afternoon sunlight streamed through blinds, casting dappled shadows over piles of documents. Kosaka Honoka was organizing the latest batch of cultural export project proposals when Koizumi Hanayo walked in with two bottles of Ramune.\n\n"Have you seen the new localization plan?" Hanayo placed the soda on Honoka's desk. "They really went all out this time."\n\nHonoka opened the files. "Indeed, just the localization budget for the 'Mobile Suit Gundam' series exceeds the total animation projects from last year. They even plan to redub and produce theme songs in local languages for the Southeast Asian market."\n\n"Not just Gundam," Hanayo pulled over a chair and sat down, "the 'Legend of the Galactic Heroes' is also getting an entirely new dubbing version. I heard they've specially invited renowned voice actors from various countries. Ah, I can already imagine Yang Wen-li saying 'people can survive without a country' in different languages."\n\nHonoka took a sip of soda. "Times have really changed. In the past, only works like 'Dragon Ball' had so many language versions. Now, even band anime like 'K-On!' are being produced in a dozen languages."\n\n"The minister said it's 'the best way to let the world hear Japan's voice'," Hanayo said with a smile, "It feels a bit cheesy, but indeed,  anime might be more effective than any diplomatic rhetoric.""
 jap.116.a: "COOL JAPAN!"
 jap.117.t: "Sweet Home"
 jap.117.d: "In Sato Makoto's room, a sliver of twilight seeped through the blinds, casting mottled shadows on the floor stacked with game discs. This was his sole connection to the outside world, and the light was about to vanish into the approaching night.\n\n"Makoto, please come out," his mother's voice called through the crack in the door. "There's another great job opportunity today, at a design firm..." Her words were cut off, drowned by the sudden sound effects from the game in the room.\n\nIt had been three years and four months. Since resigning from his convenience store job that day, Sato Makoto had never stepped out of this nine-square-meter room. Every day, his mother left a bento box outside his door, which was quietly taken away late at night. This had become their only means of communication.\n\n"You're already twenty-seven," his mother's voice trembled with emotion. "Yamamoto next door has already gotten married..."\n\nSato Makoto turned up the game volume even louder. The characters on the screen were engaged in fierce battles, emitting deafening sound effects, as he continued to immerse himself in the virtual world."
 jap.117.a: "All disappointments turn into tears on the floor."
 jap.118.t: "Super Change"
 jap.118.d: "In a sunlit daycare on the outskirts of Tokyo, Rinka Sakurai sat in the afternoon light, holding a pink strawberry cake. She always found it strange why the food was better than before and why the classroom now had more interesting toys.\n\n"Teacher Maki," she asked with a touch of innocence, "why can we have strawberry cake every day?"\n\nTeacher Maki crouched down and began to patiently explain the new parenting policies, childcare subsidies, and upgrades to facility standards. But these complex terms turned into light bubbles in Rinka's ears, leaving only the phrase, "This is a gift the Prime Minister promised to every child."\n\n"So," Rinka tilted her little head, with a bit of cream still on her mouth, "does that mean the Prime Minister lets me have strawberry cake every day?"\n\nTeacher Maki smiled, wanting to explain more, but Rinka had already bounced away to share her discovery with other children. In her fairy-tale world, the image of a kind Prime Minister conjuring strawberry cake every day was easier to understand than any policy explanation.\n\nTo Rinka, happiness was simple: having strawberry cake every day and a Prime Minister who could make cake for the children."
 jap.118.a: "Does changing the Prime Minister mean changing the cake?"
 jap.119.t: "Stroll"
 jap.119.d: "Within the Imperial Palace, a rare tranquility blankets the ancient stone pathways as Emperor Naruhito and Prince Fumihito walk leisurely along the centuries-old stone road once traversed by royal family members. Absent the usual clamor of tourists, the venerable courtyard now exudes an exceptional solemnity.\n\n"Brother, do you see," Naruhito paused beside the old bridge, "the state of the world is vast and cannot be halted by human force. Today's changes are like the blooming and withering of flowers in the courtyard, all according to the natural order." Fumihito gazed at the fish swimming in the pond and slowly replied, "Brother speaks the truth."\n\n"Past events are like smoke," Naruhito gently stroked the stone railing, "people often say that a prosperous era cannot be repeated, but today's changes might usher in a peaceful and prosperous age. The path of power lies not in its magnitude but in its righteousness."\n\nA gust of wind swept through the courtyard, causing leaves to flutter from a distance. Fumihito picked up a leaf and said, "Yes, tyranny is like a storm-fierce but difficult to sustain. Only the path of democracy can nurture silently like spring rain."\n\n"The rise and fall of a nation concerns its people," Naruhito looked toward the distant skyline, "Although we stand above the masses, we should take the people's hearts as a mirror. Past sins should be cleansed with today's awareness.""
 jap.119.a: "Land of the Rising Sun."
 jap.120.t: "Like a Dragon"
 jap.120.d: "In the early evening of Suminoe Ward, Tetsuya Ryuzaki leans on his apartment balcony, watching the red and blue lights of a passing patrol car below. The tattoo on his left arm has long been concealed by his suit sleeve, yet the stories behind it still flood his mind at night. This isn't Kabukichō-there are no fiery showdowns or heroic finales here, only endless grudges and betrayals, and an Osaka Prefectural Police force that acts more yakuza than the yakuza themselves.\n\nRyuzaki straightens his tie, the one his wife fastened for him this morning. Twenty years ago, he was collecting protection money for his gang; now he's a sales supervisor at an insurance company. His days are as bland as a glass of water, void of excitement or turbulence.\n\nThe television broadcasts election news. The LDP candidate repeats the same promises Ryuzaki has heard all his life. He recalls his old boss's words: "Sometimes the greatest violence in this world isn't a fist-it's a society that never changes."\nHe takes out his phone, reading the Civil Coalition campaign platform. Maybe it's time for a change, he thinks."
 jap.120.a: "Not with fists, but with votes."
 jap.121.t: "The Older Generation"
 jap.121.d: "Masao Tanaka placed the election flyer bearing the Civil Coalition logo on the tatami floor as though it were something cursed. Decades of experience had taught him one lesson: any drastic change brings risk. He picked up the familiar LDP leaflet next to it. The words and promises there offered him a vague sense of comfort.\n\nFrom the kitchen window, he could see the family portrait on the wall. Every smiling face in that photo had blossomed during the LDP's long tenure. His son graduated from Keio University and found a stable company job. His granddaughter was admitted to Nagoya University. Life wasn't perfect, but it was sufficiently secure.\n\n"Reform? Change?" He watched the People's Union deliver impassioned speeches on TV and shook his head. Those energetic slogans reminded him of the turmoil he experienced when he was young. Back then, people also cried out for change-but it only led to chaos and riots.\n\nVoting day was only a few days away. Masao Tanaka took out the suit he always wore to vote. Each time, he chose to trust what he had always trusted before.\n\nHe knew young people mocked his conservative thinking-just like how his grandchildren teased him for not knowing how to use a smartphone. But for him, that sense of stability was more convincing than any promise of radical change."
 jap.121.a: "Vote!"
 jap.122.t: "The Evening Program"
 jap.122.d: "In the studio of the show National Security and Us, former Chief of Staff of the Maritime Self-Defense Force, Tomohisa Takei, sat upright, facing questions from hosts Mako Kimura and Ken'ichi Sato. On the large screen behind them was a precise map of the western Pacific.\n\n"Mr. Takei," Mako Kimura leaned forward slightly with her microphone, "you once commanded joint exercises for the Maritime Self-Defense Force. From a military strategic perspective, what does Taiwan mean to Japan?"\n\nTakei raised his hand to point at the shining routes on the screen. "Allow me to explain using my experience at sea. Imagine the Taiwan Strait as a sluice gate controlling the flow of water throughout the Pacific. Once this gate falls into the wrong hands, not only does Japan's maritime lifeline get cut off, but the entire strategic balance of the western Pacific collapses."\n\n"So, you're saying Taiwan's security is synonymous with Japan's security?" Kimura pressed on.\n\n"More than that. From the Miyako Strait to Yonaguni Island, from the Diaoyu Islands to Okinawa-this entire island chain forms Japan's first line of defense. Taiwan is like the cornerstone of that line. If you pry up that cornerstone, the entire defensive wall comes crashing down."\n\n"How should we respond to such a threat?" Ken'ichi Sato asked the question everyone most wanted answered.\n\nTomohisa Takei looked into the camera as though addressing the whole of Japan: "In the navy, we have an old saying: Preventing the storm is better than facing it head-on.We must make it clear to anyone eyeing Taiwan that this is not just about a small island nobody cares about-this is a direct challenge to the entire free world's defensive line.""
 jap.122.a: "Thank you for your answer."
 jap.123.t: "Military Exercise"
 jap.123.d: "Near Taipei, on the slopes of Yangmingshan, Lieutenant Colonel Haruaki Tsukishiro of the Japan Ground Self-Defense Force watched the training field below. Morning fog still clung to the hills as Australian armored units and Taiwanese mechanized infantry conducted a joint assault drill, the dust and smoke forming a shifting curtain in the first light of day.\n\nTsukishiro jotted notes in a small notebook-his handwriting graceful yet marked by a soldier's decisiveness. His officer training had taught him one abiding truth: while willpower matters on the battlefield, sheer numbers often prove the deciding factor.\n\n"Sir," Staff Officer Ueda said, handing over a tactical assessment report, "the Taiwanese CM-34 armored vehicles show excellent mobility in mountainous terrain, and the Australians coordinate with remarkable professionalism."\n\nAccepting the report, Tsukishiro's gaze lingered on a distant Taiwanese soldier inspecting an armored vehicle. Their expertise was undeniable, yet it reminded him of historical battle lessons from the Defense Academy: even elite troops can fade like fireflies at dawn when confronted by an overwhelming wave of attackers.\n\n"They're indeed very capable," he said quietly, his voice tinged with a concern he hardly noticed himself, "but war isn't an exercise." On the final page of the report, he wrote: "Though the joint forces display commendable tactical skills, they may struggle to withstand a prolonged fight against potentially overwhelming odds. Recommend intensifying joint heavy-weapon drills and expanding air defense exercises.""
 jap.123.a: "The enemy lies across the Strait."
 jap.124.t: "The Future of the Past"
 jap.124.d: "In a quiet old alley in Tokyo's Asakusa district, the teahouse Meigetsu has stood for seventy years. Since his grandfather entrusted it to him, Sato Hikaru has already replaced the traditional paper on the sliding doors three times. In those early days, as he watched the once-bustling teahouse gradually lose its lively crowds, he felt as if he were witnessing the slow close of a long-running play.\n\nAt that time, only a few elderly regulars remained-like remnants of the Showa era-sipping their tea and reminiscing. From behind the counter, Sato would occasionally browse through the novels he had collected, waiting for customers who never came.\n\nA turning point arrived the year the government introduced its "Small Industry Revitalization Plan." Using the subsidies provided, Sato transformed one corner of his teahouse into a cozy, traditional Japanese rest area. He laid out a few floor cushions (zabuton) and hung Ukiyo-e style prints. Interestingly, these prints reminded many younger patrons of scenes from a famous anime film, though they never specified which one.\n\nLittle by little, the teahouse took on fresh energy. In the afternoons, groups of high school students in uniforms began visiting, choosing a spot on the tatami to sip tea while quietly discussing the latest manga storylines. In order to let them experience the elegance of the traditional tea ceremony, Sato prepared tea sets decorated with cherry-blossom motifs just for them.\n\nOn weekends, anime clubs would often host tea gatherings there. They said the ambiance reminded them of a shrine from an anime, and sometimes they'd chat with Sato, jokingly asking if he'd ever hire a shrine maiden to sit at the entrance sipping tea. Though Sato wasn't entirely familiar with their references, he knew the teahouse was carrying on its mission in a brand-new way."
 jap.124.a: "Old Tree, New Shoots"
 jap.125.t: "A Dream of Marriage"
 jap.125.d: "Inside the marriage registry at the Tokyo Metropolitan Government Office, Rin Sakurai and Yukino Fujiwara held the same pen, signing their names on the ivory-colored marriage application. Outside, cherry blossoms fluttered to the ground, like a gentle rain of petals offering their blessing.\n\n"Let me just verify," the clerk said, flipping through the paperwork in the same calm, efficient manner as with any other couple. "This is the marriage application for Ms. Sakurai and Ms. Fujiwara." No suspicious looks, no hesitation in her voice-only straightforward administrative routine.\n\nRin gently squeezed Yukino's trembling hand. Ten years ago, when they first met in their university dance club, neither dared imagine this day would come. Back then, they could only exchange rings in private and pretend to be just close friends in front of others. Now, at last, they could rightfully become each other's wife.\n\n"Congratulations to you both," the clerk said, passing them the officially stamped certificate with a warm smile. Several heterosexual couples waiting nearby offered them their heartfelt congratulations.\n\nStepping out of City Hall, Yukino couldn't hold back her tears. They weren't tears of sorrow, but of a happiness that had arrived so naturally. The people on the street went about their busy routines, barely looking their way, taking this new marriage as perfectly ordinary. And in that unremarkable acceptance lay the very happiness they had once yearned for above all else."
 jap.125.a: "Japan has finally become what they always hoped it would be."
 jap.126.t: "May Fortune Bless You in Battle"
 jap.126.d: "Amid the evening rain tapping against the window frames, Genzosuke Sakurai took an old, slightly faded wooden box down from the household shrine and handed it to his son, Harunosuke Sakurai, who was in the midst of preparing his uniform. From their portraits on the shrine, Great-Uncle Takenosuke Sakurai and Great-Uncle Ryunosuke Sakurai looked on silently in the candlelight.\n\n"Before you go, I want you to have this," Genzosuke said, opening the box to reveal a protective amulet wrapped in deep-blue silk. "Both your great-uncles guarded this keepsake during their lifetimes. Great-Uncle Takenosuke carried it on the battlefields in China; Great-Uncle Ryunosuke took it with him across the Pacific."\n\nHarunosuke set aside his uniform and accepted the surprisingly light amulet. "Does it contain a seal for the god Takeminakata?"\n\n"Yes," Genzosuke replied, looking at his son, who would soon depart for Taiwan. "Do you know what Taiwan means to us?"\n\n"It's... an important neighbor?" Harunosuke ventured.\n\n"Not just that," Genzosuke shook his head gently. "It's our lifeline. Your great-uncles gave their lives to understand one unchanging truth: China's power in these waters has never truly receded. If Taiwan were to fall, Japan would be next. And then we'd be faced with a fate more humiliating than ever before.""
 jap.126.a: "The gods favor those who remain ever vigilant."
 jap.127.t: "Operation Code: Lost Kingdom"
 jap.127.d: "On the runway at Naha Air Base, the 8th Air Wing's F-35A fighters stood in formation, each armed with four AIM-120 medium-range missiles and two AIM-9X Sidewinder missiles for close combat. Squadron Leader Masaki Yamamoto reviewed the final data on his heads-up display; within the sealed cockpit, he could hear the faint hum of the oxygen mask.\n\n"Takeoff in three minutes. Formation call sign 'Tengu.' Target area: the eastern Taiwan Air Defense Identification Zone," came the voice from the control tower over his headset. "Weather indicates cloud cover at 7,000 meters, visibility good."\n\n"This is the lead aircraft, all planes confirm," Yamamoto said, fine-tuning his helmet display parameters.\n\n"Number Two ready," Deputy Commander Fujiwara replied calmly, as though this was just another drill in daily life."Number Three standing by," said the young pilot Sato, a hint of excitement in his voice."Number Four confirmed," answered Kishibe, his tone as even as the deputy commander's.\n\nThe roar of engines echoed through the dawn. Yamamoto glanced at the weapons status on his multi-function display; in addition to the missiles, the 25mm internal cannon was fully loaded with 220 rounds for potential close-quarters dogfights.\n\n"Rely on your training and trust your comrades," Yamamoto said, pushing the throttle forward and eyeing the distant horizon. "Let's write a new chapter in these skies.""
 jap.127.a: "It's not the old who will create the new era!"
 jap.128.t: "Exchange of Interests"
 jap.128.d: "On a quiet afternoon, a convoy of black vehicles from Daisei Construction rolled slowly past the ruins of Keelung Port. Standing at the waterfront, Minister of Investigations Kiyonosuke Tsukishiro surveyed the cranes and warehouses destroyed by shelling. Behind him, his aide Aoinosuke Shimotsuki tapped briskly on a tablet, recording damage levels, reconstruction budgets, and timelines-but the most critical figures-those pertaining to the next twenty years' port operation rights-were carefully stored in another encrypted file.\n\n"What a pity," Tsukishiro murmured, lighting a cigarette labeled Alishan. Though he appeared to be lamenting the horrors of war, his mind was already calculating future clout once the port was rebuilt; every slab of concrete and every steel girder would serve as Daisei Construction's foothold in the Taiwanese market.\n\nTheir next stop was Kaohsiung in the south. In a private dining room, Tsukishiro clinked glasses with local officials. "Daisei Construction will bring not only funds," he said, raising his glass, "but also technology and expertise. We plan to take part in the comprehensive rebuild of ports, railroads, and airports." At the crisp sound of colliding glassware, everyone understood that the deal was already sealed."
 jap.128.a: "Enjoying jovial conversation"
 jap.129.t: "Joint Operations Command Center"
 jap.129.d: "Inside the operations command center at Yokosuka Base, four large screens on the walls display live feeds from Tokyo, Canberra, New Delhi, and Taipei. The Chief of the Japanese Joint Staff listens closely to each country's representatives while the touchscreen before him shows constant updates of various military deployments.\n\nAn Australian Air Force general stresses the need to transcend the geographic divide between the Indian and Pacific Oceans. Meanwhile, the Indian Navy representative traces an arc across the digital map, aiming to extend India's influence during the conference. The Taiwanese military delegate discusses the possibility of consolidating air defense systems so they won't have to invest heavily in separate installations.\n\nJapanese Self-Defense Forces technicians are busy fine-tuning a new encrypted communication system-one designed to link the four nations' command structures into a single, invisible network. On the conference table lies a thick operations manual, each page meticulously detailing standard procedures for cooperative engagements, ranging from simple joint patrols to large-scale military actions.\n\n"Today," the Chief of the Joint Staff says after everyone's discussions wrap up, "we have not only established a command system but also laid the foundation for a security framework spanning the entire Asia-Pacific region. We will no longer bow to tyranny. Our nations across the Asia-Pacific stand united, determined to forge a bright democratic future-together.""
 jap.129.a: "Prosper together, move forward together."
 jap.130.t: "Everyday Negotiations in Europe"
 jap.130.d: "In Naples's bustling commercial district, Panasonic's overseas market analyst Yukinosuke Tsurumai sits in an ornately decorated meeting room. The freshly signed contract in front of him still carries the scent of drying ink. Outside, the distinct salty air of the Mediterranean drifts by, while inside, the aroma of Italian lemon tea lingers.\n\n"This is a promising beginning," remarks Risotto Nero, an executive of a local home appliance giant, as he sets down his pen. His dark suit blends perfectly with the room's vintage decor. "Just think-Japanese technology paired with Italy's distribution network. What could be more ideal?"\n\nNearby, Tsurumai's assistant, Kazenosuke Sakakibara, types rapidly on his laptop, noting the annual quotas: three hundred thousand home appliances and five hundred thousand digital devices. Beyond these numbers lies a distribution network poised to cover all of Southern Europe.\n\n"Milan, Marseille, Barcelona," Tsurumai muses, sipping his tea. "Our products will soon grace every corner of these cities.""
 jap.130.a: "One more cup of black tea, please."
 jap.131.t: "A Curious Negotiation in Russia"
 jap.131.d: "In the meeting room of the luxurious Ritz-Carlton in Moscow, Yukinosuke Tsurumai checked every page of the contract for the third time. Across from him sat Sofia Pavlovna, the chief secretary of a major conglomerate, whose silver-haired presence reminded him of a character from an anime he'd once seen. It was as if, at any moment, she could summon some servants from behind her desk.\n\nThis business negotiation had lasted for one month and four days in total, marked by three video conferencing system crashes, two abrupt call interruptions due to cybersecurity protocols, and one inexplicable round of platform maintenance. When it came time to sign the final document, Sofia gracefully removed a seemingly ordinary pen from a drawer. Its barrel bore exquisitely engraved gear patterns that glinted strangely in the sunlight, reminding Tsurumai of a steampunk gadget he'd once spotted in an Akihabara anime shop.\n\nAfter the last signature, Anna placed the papers into an antique rosewood box. Metallic trim gleamed at its corners, hinting at intricate mechanical components hidden beneath. "This contract will be preserved forever," she said softly, "just like our partnership...""
 jap.131.a: "No end."
 jap.132.t: "The Final Curtain"
 jap.132.d: "At the Ministry of Education, Culture, Sports, Science and Technology, Sakura Fujita clocked in at 8:45 a.m. as she did on every workday. On her desk lay yesterday's half-finished education statistics report. Everything seemed so routine that this morning felt no different from any other. At exactly nine o'clock, the department head sent a group email instructing everyone to gather in the meeting room by ten.\n\nInside the meeting room, a projector displayed a report filled with figures: organizational restructuring plans, personnel streamlining, resource reallocation... Sakura watched as her own division's name appeared in red, signaling that the entire department would be merged or eliminated.\n\nWhen lunchtime arrived, no one left their seats. The normally bustling office cafeteria was eerily quiet. Sakura's bento box remained in her drawer, untouched. Through the window, she saw official vehicles being driven away to the asset disposal center.\n\nBy dusk, while clearing off her desk, she came across last year's calendar tucked in a corner, covered in notes for meetings and projects-none of which mattered anymore."
 jap.132.a: "Say goodbye to the present."
 jap.133.t: "Reform Interview"
 jap.133.d: "Good afternoon, everyone. I'm Representative Mariko Kato. Today, I'd like to talk about a topic that has been getting a lot of attention lately-the doshusei system. Some of you may not know much about it, or perhaps you've only heard it mentioned in passing. Let me explain it in simpler terms.\n\nThink of Japan as a house with 47 separate rooms-each one representing a prefecture. Managing so many rooms at once is cumbersome: some rooms are large, others are tiny, and each one needs its own complete set of furniture. That's both wasteful and impractical.\n\nThe doshusei system would reorganize and merge these 47 "rooms" into around 10 larger "suites." For example, a few prefectures in the Kanto area might be combined into "Northern Kanto" and "Southern Kanto," while several prefectures in Kyushu could be brought together under "Kyushu." Each "suite" could then arrange its own furnishings and decor according to its specific needs, rather than fitting out every small room separately.\n\nTo give you a concrete example: right now, Fukuoka, Saga, and Nagasaki Prefectures each have their own Board of Education, police force, and healthcare system. But if they were combined under a single "Kyushu," these resources could be planned and managed centrally, cutting costs and increasing efficiency.\n\nHowever, putting the doshusei system into practice is like moving house: combining rooms may sound straightforward, but there's plenty of logistical work-how to allocate resources, how to remodel, how to help people adapt, and so on. And since every region has its own unique history and local traditions, merging them too hastily might provoke opposition.\n\nStill, our ultimate aim is to ensure that everyone living in these "rooms" can be satisfied."
 jap.133.a: "I see."
 jap.134.t: "The Evil of a Name"
 jap.134.d: "In an interrogation room at the Shinjuku Police Station, Assistant Inspector Misaki Sato has a domestic violence report in front of her. The victim, Kumiko Suzuki, still bears bruises on her face; her husband, Kenichi Yamada, sits stubbornly in the adjacent room.\n\n"All because she refused to change her surname?" Sato leafs through the transcript, her tone as calm as if she were discussing the weather.\n\n"It's tradition," Yamada yells from next door. "In my parents' generation, my grandparents' generation, there was no such thing as a wife not taking her husband's name. What good is this new law?"\n\nSato glances at Kumiko's occupation: creative director at an advertising firm. Over ten years of hard work, her reputation and client network have all grown around the name "Suzuki."\n\n"I love him, but that doesn't mean I have to give up everything," Kumiko says softly, her fingers clenched around a paper cup. "The new law clearly states..."\n\nWhen the interrogation ends, Sato stands by the station window, watching the crowd below. Twenty years ago, she, too, had argued with her fiancé over keeping her own surname. Though the law has since changed, certain mindsets clearly take longer to evolve.\n\nShe signs the arrest report with her name: Misaki Sato - the name she was born with, and the one that will stay with her."
 jap.134.a: "The bird in the cage is finally free."
 jap.135.t: "Tax Consumption Reform"
 jap.135.d: ""
 jap.135.a: "Freeze Consumption Tax"
 jap.135.b: "Lower Consumption Tax"
 jap.136.t: "Worker Rights Reform"
 jap.136.d: ""
 jap.136.a: "Improve the Working Conditions"
 jap.136.b: "Deregulate the Workforce"
 jap.137.t: "Parade"
 jap.137.d: "Under the bright sun in central Tokyo, a convoy of Japan Ground Self-Defense Force vehicles rumbled past. Daisuke Matsuda leaned against the window of an armored car; a Morfonica patch was stuck to his tactical backpack, its depiction of Kurata Mashiro in a combat vest standing out amid the sea of camouflage. Along the roadside, people waved Rising Sun flags and shouted "Good luck in battle," while paper cranes fluttered toward the convoy like drifting snow.\n\n"You're quite something," said Shota Yamamoto, seated beside him, giving Matsuda a friendly slap on the shoulder. "Everyone else goes to Senso-ji for amulets, but you put your faith in...what's it called...that girl band Morfonica? Is this some sort of maiden's blessing?"\n\n"Hey, don't underestimate Mashiro," Matsuda replied with a grin, patting his backpack. "She's their lead singer-she works really hard for her dreams."\n\nAs the convoy turned past the Imperial Palace and headed toward Yokosuka, Matsuda patted his pocket, where he kept his earphones loaded with Morfonica's songs. Their music would accompany him toward the burning waters of the Western Pacific."
 jap.137.a: "Shota Yamamoto merely shrugged beside him."
 jap.138.t: "The Democratic Expeditionary Force"
 jap.138.d: "In the early morning light over Sydney Harbour, the deck of HMAS Adelaide felt faintly chilled by the sea breeze. Captain Tanaka of the Japan Maritime Self-Defense Force leaned against the railing with Captain Wilson of the Australian Navy, both gazing at the distant destroyer taking on supplies. Moments earlier, they'd discovered they were both fans of the JoJo's Bizarre Adventure manga-a small coincidence that made them laugh.\n\n"By the way," Tanaka said, lighting a cigarette, "I've always been curious why you'd send your ships all the way out here..." He paused. "To fight for us."\n\nWilson took the offered lighter and looked toward where the Sydney Opera House hovered in the mist. "You know, my grandfather served in the Battle of the Coral Sea when he was young. He used to say the ocean is like a bond that connects free nations." He exhaled a ring of smoke. "Now I finally understand his words."\n\n"From Sydney to Tokyo is a long distance," Wilson continued. "But for democratic nations, there's no such thing as 'too far.'""
 jap.138.a: "Unity Forever."
 jap.139.t: "New East Asia"
 jap.139.d: "On the top floor of a half-ruined building in Sinuiju, Captain Yamada of the Japan Ground Self-Defense Force and Colonel Lee Seunghoon of the South Korean Army peered through high-powered binoculars at the opposite shore. Colonel Lee took a bite of his Pocky chocolate stick from his ration pack as his gaze swept over the heavily fortified line across the river.\n\nIn Dandong, convoys of armored personnel carriers were patrolling the streets, while radar antennas on anti-air missile launchers kept rotating in the twilight. Occasional silhouettes of soldiers flickered in the bunkers along the riverbank.\n\n"Look at those Chinese," Colonel Lee said, lowering his binoculars. "They've set up quite a tight defense. But it won't matter. We've accomplished something neither MacArthur nor my father's generation could ever achieve."\n\nColonel Lee twirled the chocolate stick in his hand. "Isn't it strange, Yamada? Just a few decades ago, we were locked in a life-or-death struggle on this same patch of Northeastern soil. Now we're preparing to cross the river side by side. And the very ally who once fought alongside us has become our enemy."\n\n"History's ironic that way," Yamada replied calmly. "Today's friend can become tomorrow's enemy, and yesterday's enemy can turn into today's ally." Colonel Lee popped the last bit of Pocky into his mouth. The wrapper fluttered off in the wind toward the city lights flickering out on the far shore."
 jap.139.a: "A story that belongs to us."
 jap.140.t: "Shanghai Fortress"
 jap.140.d: "In the town of Fort Zhen on Chongming Island, Yamada's platoon had been battling through this maze of streets for a grueling six hours. Every meter of ground came at a terrible cost; every house taken demanded blood. The PLA had turned each doorway into a gunport, and every window into a sniper's nest.\n\n"Building Three, second floor, right window-machine gunner!" The urgent warning crackled over the radio. Before the words were fully out, a burst of gunfire strafed the street, chipping plaster off the walls. Yamada watched his troops inch forward on their bellies, weaving through the rubble of collapsed buildings.\n\nOne seemingly ordinary home had been converted into a fortress, its walls dotted with countless firing slits. When they finally broke into the building, they found tripwires and hidden explosives in every room. The first floor was cleared at great risk, only for them to face another fierce engagement on the second. The fighting in the stairwell was brutal-grenades exploding one after another.\n\nBy dusk, they had advanced barely two blocks. Fallen comrades lay in the roadside ditch, while medics searched desperately through the debris for wounded soldiers. The fierce resistance recalled their earlier encounters on the outskirts of Shanghai, but the battle on Chongming Island was even more ferocious. The defenders knew there was no retreat.\n\nNight fell, and the artillery fire in the distance raged on. Yamada studied the map in his hand. Their next objective was Minben Middle School, off Xiangyang Road-intelligence reports suggested it had been transformed into a compact but formidable stronghold."
 jap.140.a: "Tomorrow will be another bloody day."
 jap.141.t: "Romeo Point"
 jap.141.d: "A dense fog-like a massive cottony shroud-swallowed every sound in the White Cloud Mountains. Major Oda's unit had been wandering these maze-like highlands for five days, nerves stretched to the breaking point. The previous night, three soldiers went out on patrol; only two returned. The third simply vanished as though he had never existed.\n\n"This place isn't right," murmured Murakami, the machine gunner, over the radio. "Every time we spot signs of the enemy and go after them, it's like chasing our own shadows." No sooner had he spoken than the bushes on the right rustled, a dark figure darting past. When they gave chase, all they found were a few trampled branches and a single footprint in the mud.\n\nNighttime was far worse than day. Soft rustlings echoed through the camp, yet no one could find where they came from. Roll call often revealed that one or two men were missing, and at daybreak, search parties might discover nothing but a bloodstained dog tag or a severed communication headset in some lonely corner.\n\nBy midnight, the fog thickened further. The soldiers sat back-to-back, afraid to close their eyes. Each man knew that falling asleep might mean becoming the next to disappear. In the distance, brief bursts of gunfire sounded, though no one knew if they came from allies, enemies-or simply from the mountain itself, toying with their minds."
 jap.141.a: "A place gone mad."
 jap.142.t: "The Dragon's Last Stand"
 jap.142.d: "Beijing's skies were stained iron-gray by smoke and dust. In the Fuxingmen district, every street was piled high with broken concrete and twisted rebar, each intersection reduced to a deadly meat grinder. The PLA had turned every building into a fortress, every underpass into an ambush site, and every window into a sniper's perch.\n\nA single Type 90 tank rumbled along West Chang'an Avenue, only for two People's Armed Police soldiers clutching explosives to charge forward in a final act of sacrifice-bringing themselves and the tank down together. The day before, a militia unit had infiltrated the Japanese command post via the sewers; one wounded fighter set off a grenade hidden on his body.\n\nThe living continued to fight, while the dead used their own bodies to block the streets and slow the enemy's advance. Around Zhongnanhai, the roads were unrecognizable. The steps of the Great Hall of the People were pitted with craters, and artillery blasts had severed the Jingshui Bridge. Yet the defenders refused to yield. One PLA company held out at Xidan Station for three days and nights, battling on until every last bullet was spent. They used anything-from loose bricks to their bare teeth-to keep the enemy at bay.\n\nA Japanese platoon, discovering scattered communications gear and maps as they advanced, was swiftly wiped out by Special Forces lying in ambush amid the rubble. Every hutong was a battlefield, every courtyard a trench. This ancient city was defending itself against the invaders with flesh and blood alone."
 jap.142.a: "In those days, how heroic; on that day, was it serene?"
 jap.143.t: "Humanity"
 jap.143.d: "In the Investigative Division office of the Tokyo Metropolitan Police Department, Inspector Daisuke Kusanagi looked down at the disciplinary notice on his desk. Three days earlier, he had used excessive force while apprehending a drug dealer, causing injury to the suspect. The oversight committee decided on a lenient penalty-just one reprimand.\n\n"You're always too strict," remarked his partner, Kaneda, setting aside his coffee mug. Kusanagi gazed out at the twilight through the window, where neon lights smeared soft halos on the rain-soaked streets. "When I was a kid, I used to watch cartoons and thought the police were supposed to be perfect heroes," he said with a self-mocking grin. "Now I know-even robots can go haywire, let alone humans."\n\nTo everyone's surprise, the injured dealer's mother visited the station the next day to thank Kusanagi. "I know my son has gone astray," she said. "Perhaps you were a bit rough, Officer, but I could sense you truly wanted him to turn his life around."\n\nKusanagi had never forgotten why he joined the police. It wasn't to be some flawless hero, but rather to do his part in maintaining order in the city. People do make mistakes; what really matters is whether they learn from them."
 jap.143.a: "We make mistakes; but precisely because of that, we learn how to forgive."
 jap.144.t: "Corporate Negotiations"
 jap.144.d: "In the top-floor conference room at NEC's headquarters, President Ayano stood before the projector, delivering her closing remarks.\n\n"Privatization is the inevitable choice," President Ayano said with a polite smile, turning her gaze toward the government representatives on the left side of the table. "I believe everyone here is well aware of NEC's R&D capabilities in the field of artificial intelligence."\n\n"If we take on this project," she continued, "we can increase revenue by at least forty percent in three years."\n\nTurning a page in her folder, she went on, "The detailed figures are on page three. Last year, we-"\n\n"Hold on!" Section Chief Sakamoto suddenly stood up, cutting her off. "President Ayano, we're talking about the data security of millions of people here. Your terms are simply outrageous-you're taking advantage of the situation! Have you even weighed the pros and cons before making these demands?"\n\nSilence fell over the conference room. President Ayano set her documents down, still wearing her poised smile. "Pardon me, I need to excuse myself for a moment."\n\nAs the sound of her footsteps receded down the hallway, Minister Nakashima, who was chairing the meeting, turned to Sakamoto. "Hey, Sakamoto, don't you want to make money? When President Ayano comes back, say sorry and then step out."\n\nSakamoto lowered his head. The glow of the projector cast shadows across his face."
 jap.144.a: "How embarrassing."
 jap.145.t: "Family Trip"
 jap.145.d: "Kenichi Kimura sat in his apartment, looking at the Palau travel brochure spread across the dining table. It was the first time he had ever seriously planned an overseas trip. Ever since his company gave everyone a pay raise, such a dream had suddenly become attainable.\n\n"I've heard Palau's waters are the bluest in the world," his daughter Sayuri said, pointing to a photograph. In the past, he would quietly change the subject whenever she brought up travel. But now, he could reply openly, "We'll go see that ocean this year."\n\nHis wife, Yoshiko, came over and examined the trip budget. The numbers no longer made her frown. "We've already booked the tickets and the hotel," she said. "I never expected we could save enough this quickly."\n\nKenichi remembered a year ago when he would still be working overtime at this hour, sorting through paperwork. Now, he was planning his family's first trip abroad together."
 jap.145.a: "A beautiful life."
 jap.146.t: "Female Leader"
 jap.146.d: "In the glass-walled office building in Hachinohe, Misaki Sato was chairing her third board meeting of the month. Twenty years ago, when she first joined the company, there had never been a woman in the conference room. Now, her voice filled the meeting space on the twenty-eighth floor as she discussed a multimillion-yen contract from Australia.\n\n"Our profits have risen by forty percent," she said, flipping through the reports. "That's thanks to the new product line we developed." The board members took notes attentively. Nobody cared about her gender; they only cared about what she could achieve. This was what she appreciated most about the present-ability, rather than gender, was what defined a person's worth.\n\nOut in the hallway, a 1998 group photo hung on the wall. In it, a line of men in suits stood at attention, and only one woman-far in the back. Misaki still recalled how, in those days, women had to work twice as hard just to receive the same recognition as men.\n\n"Here's the forecast for the next quarter," Misaki said, handing a file to a young female manager. "I'd like you to take charge." She caught a flicker of gratitude in the woman's eyes, one that reminded her of her own early career. But unlike back then, this new generation of women no longer has to tread so carefully."
 jap.146.a: "Who says women are inferior to men?"
 jap.147.t: "A Debate on the Dinner Table"
 jap.147.d: "At dinnertime in a modest Nagoya home, eighteen-year-old Naoko and twenty-year-old Koji were arguing once again. Steam still rose from the miso soup on the table.\n\n"We need more social welfare!" Naoko set her chopsticks down. "There are still so many people who need help."\n\n"No, the nation needs to grow stronger," Koji countered. "Just look at our neighbors-"\n\nTheir father, Kenichi Kimura, kept his head bowed over his meal, as though the rice in his bowl mattered more than any argument. He knew there was someone far more qualified to judge this debate. At the head of the table sat Daisuke Kimura-a former member of the House of Councillors, now an elderly man whose white hair told of many years gone by. He put down his teacup.\n\n"Enough," he said, his voice calm yet commanding. "Do you two realize how hard-won our peace is?" He turned to Naoko. "You want to expand welfare, but do you know how much last year's welfare budget totaled? You speak of all these expenses-where do you think the money comes from?" Then he looked at Koji. "You yearn for a mighty military, but do you understand what militarism entails? It's the breeding ground of fascism-the very nightmare my generation, and your grandfather's generation, fought so hard to escape."\n\n"Japan's present path was paved with blood and hard-earned wisdom. It may not be perfect, but it's the road best suited for us.""
 jap.147.a: "Those in the thick of it cannot see the whole picture."
 jap.148.t: "The Countryside"
 jap.148.d: "In a small village in Akita Prefecture, Masao Sato sits on a wicker chair beneath an old cherry tree, gazing at the rippling rice fields in the distance. Eighty-seven years of life have coursed through his memory like the never-failing spring water in the ancient well by the yard.\n\nHe recalls the bustling Showa era-when Sony Walkmans spread across the globe and Toyota cars sped through every continent. Back then, Japan was like a cherry tree in full bloom, wowing the world with its brilliance. But today's young people seem largely uninterested in those achievements.\n\nLately, however, his grandson, Kenichi, has brought him a sense of comfort. The boy who once did nothing but play video games has begun seriously studying Japan's history. Just last month, standing under the cherry tree, Kenichi excitedly told him about the country's latest technological breakthroughs. "Grandpa, did you know? Our technology is once again leading the world."\n\nMasao remembers seeing in his grandson's eyes a sparkle that reminded him of his own youth. It wasn't a narrow nationalism, but a deep, genuine joy at seeing his nation progress. Perhaps every generation has its own way of loving its homeland-just like this cherry tree, which blooms differently each year."
 jap.148.a: "A true patriot."
 jap.149.t: "Ashes to Ashes, Dust to Dust"
 jap.149.d: "Inside a small Western-style building in the old concession area of Tianjin, the Military Control Committee of the PDTO, responsible for the Beijing-Tianjin metropolitan area, is holding a work meeting. The room is bustling with activity: piles of documents are stacked high, phones ring intermittently, and aides rush in with urgent mail. Around a round table, representatives from the treaty's member countries negotiate various matters.\n\n"I believe we have addressed the most urgent issues," said the JSDF Lieutenant General, seated at the head of the table. He gathered his documents with a relaxed tone as the sun set. The other generals nodded in agreement, raising their coffee cups.\n"I'm sorry, Chairman," an Indian General spoke up. "But I would like to bring up one more issue for discussion."\n\nSomeone at the table let out a heavy sigh, reflecting the sentiment of many. "What I want to discuss is Resolution 1438, concerning the handling of remains. As we all know, the investigation results are shocking. The left arm and right leg of the body are completely missing, and most of the hair and skin have been replaced with artificial substitutes. Its unique preservation conditions are nearly impossible to maintain. Even if we don't intervene, the local government will likely dispose of it soon. So, why should we go through the trouble of organizing a demolition and cremation ceremony? Isn't that a waste?"\n\nMost of those present remained silent. The JSDF Lieutenant General glanced at the Major General of the ROC seated to his left. The Major General cleared his throat before speaking:\n"General Singh, I understand your confusion. However, I must point out that we are discussing a building that holds significant symbolic value to the former regime of the People's Republic of China, its ruling party, and its supporters. Its potential to become a political totem, representing anti-democracy and anti-peace ideologies, cannot be ignored. Removing this building and the remains is not an act of provocation. Instead, it is an effort to erase a painful chapter of history, one that could provoke future grievances if left unchecked."\n\nMajor General Singh nodded in understanding, and the Japanese General clapped his hands in relief. "Then we can officially announce the adjournment of this meeting," he said."
 jap.149.a: "Thus, the fate of Mausoleum of Mao Zedong was sealed."
 jap.150.t: "Imposition of Justice"
 jap.150.d: ""To honor those who sacrificed and to ensure that the legacy of the free world's relentless struggle is not misused, we uphold the demand for justice," said the Japanese Foreign Minister, looking directly into the camera during a live broadcast. After a series of the most elaborate and sophisticated phrases, the Foreign Minister officially announced the prosecution of war criminals from the PRC and EADI member states. He also declared that organizations such as the Central Committee of the CPC, the State Council, the NPC, the CPPCC, and the CMC and so on had been classified as criminal entities, with their members to undergo denazification investigations.\n\nIn addition to the military personnel already detained in POW camps, gendarmes carried out operations across multiple locations, forcibly entering villas and removing former elites. The properties of the war criminals were confiscated, including a golden Buddha statue, over a foot tall, once owned by a prominent general.\n\nAmong all the Class-A war criminals, the most intense reaction came from Sun Jianguo, the former Deputy Chief of General Staff of the PLA. He was sentenced to death for multiple cases of forced labor against the people of Ryukyu during the Great Asian War. The admiral protested, arguing that the court's verdict insulted his military identity, and demanded a pistol to "end his life with dignity." The PDTO Military Justice Committee, however, denied his request. In the end, In the end, the admiral met his fate on the gallows."
 jap.150.a: "They should have considered the price they would pay before committing the crime."
 jap.151.t: "Declaration of Freedom and Democracy in Asia"
 jap.151.d: "Drafted by:Japan\nCo-Sponsored by:The Commonwealth of Australia, New Zealand, and the Republic of India\n\nThe Indo-Pacific region's peace and stability are under serious threat. The People's Republic of China's military expansion in the South China Sea and East China Sea, its economic coercion of neighboring countries, and its deliberate undermining of the international order have gravely endangered peace and prosperity in the Indo-Pacific. Such behavior not only infringes on the sovereignty and territorial integrity of regional states, but also constitutes a blatant challenge to the rules-based international order.\n\nWe firmly believe that freedom, democracy, human rights, and the rule of law form the bedrock of the Indo-Pacific's prosperity and progress. Any attempt to change the status quo by force or to achieve political goals through coercion will harm the region's long-term interests. We must stand together to safeguard these hard-won values and resist any form of authoritarian expansion. Our joint efforts will ensure the continued peace and prosperity of the Indo-Pacific, keeping it on a path of freedom, openness, and democracy.\n\nAll nations that share these values are welcome to join this noble endeavor. Only by uniting can we secure a bright future for the Indo-Pacific region."
 jap.151.a: "The Asia-Pacific Defense Perimeter."
 jap.152.t: "Military Aid"
 jap.152.d: "Captain Yamada and Chen moved swiftly across an empty street. The sea breeze masked their footfalls as the fishing port's lights fell behind them. Up ahead loomed a pitch-black mountain range, where the Black Bear Force's Tainan branch maintained a secret base.\n\n"The seventh shipment of equipment is scheduled to arrive next month," Yamada said, his HK416 rifle at the ready. "It includes Type 01 light anti-tank missiles and AN/PVS-15 night-vision goggles, along with enough ammunition for three months."\n\n"Thanks for your help," replied Chen. "But we need more anti-drone systems. Those drones from the mainland bastards have gotten too many of our men caught by their lapdogs."\n\n"We'll have them in the next shipment. The Japanese government has decided to give you its full support," Yamada assured him. "Remember, you're not fighting alone-we'll be with you every step of the way.""
 jap.152.a: "We need more weapons."
 jap.153.t: "Splintered"
 jap.153.d: "The (former) U.S. Ambassador to Japan burst into the conference room at the Ministry of Foreign Affairs, his face flushed with anger. He clutched a file folder so tightly that its edges had crumpled. Outside, Tokyo was bustling as always, as though oblivious to the turmoil unfolding across the Pacific.\n\n"This is a complete breach of contract!" the ambassador shouted, his voice echoing through the room. "How can the Japanese government unilaterally suspend debt repayments? This goes against every principle of the international financial order!"\n\nJapan's foreign minister observed the once-poised diplomat calmly. His expression remained unreadable, yet his words carried undeniable force. "Sir, tell me-in your country's current situation, to whom should we repay this debt? Should it be to the administration under President Trump's control, or to the federal government led by President Biden? Or perhaps to the so-called People's Liberation Army, which claims to represent the people? If you yourselves don't know the answer, how can you demand that we make a choice?""
 jap.153.a: "The ambassador opened his mouth, but found himself unable to utter a word."
 jap.154.t: "A Minor Interlude"
 jap.154.d: ""I just saw the news," Professor Fujita said, setting down his phone. "They're going to deliberate Article 9 in the Diet? At a time like this, conceding to China might be inevitable."\n\n"Conceding?" Professor Yamamoto looked up, his eyebrows drawing together. "You must have misunderstood. They're planning to abolish Article 9."\n\nProfessor Fujita's hand froze in midair. "What? Abolish it? That's madness! Are they trying to relive our past history?"\n\n"They argue that the Peace Constitution has become irrelevant," Professor Yamamoto replied, leaning back in the sofa. Earlier that morning, he'd finished reading a student's paper-an appalling one. "Especially after the war in the Taiwan Strait."\n\n"But doesn't that prove we need peace more than ever?" Fujita said, raising his voice. "War brings nothing but destruction. Isn't that the most profound lesson history has given us?""Right now, all the politicians can see is humiliation," Yamamoto said, shaking his head. "They claim the Peace Constitution is a noose around Japan's neck."\n\n"Ridiculous," Fujita retorted with a cold laugh. "Do they plan to remove that noose, only to slip it around every citizen's throat?""
 jap.154.a: "In the eyes of politicians, what do the people matter?"
 jap.155.t: "Friendly Advice"
 jap.155.d: "On the fourth floor of the National Police Agency, there is a newly established department without a name-so new, in fact, that even the sign on its door remains blank. Each morning at 8 a.m., suited staff arrive and file into a window-shaded office, seating themselves before rows of monitors that glow with a faint, bluish light. Their job is to monitor "inappropriate speech," much like fishing for invisible catches in a vast ocean.\n\nAt Section Chief Sato's desk sits the latest Media Management Guidelines, a slim red booklet with no author listed. "Three online media outlets deviated today," a young staffer reports. "They used the phrase 'military buildup' instead of 'enhanced self-defense capabilities.'"\n\nSato nods and makes a checkmark on a white form. Since the department's inception, twenty-seven different outlets have received "letters of advice" for "improper wording." These notices always end with the same gentle sign-off: "We hope you will understand."\n\nOn the wall, a large display flickers continuously with a stream of data-real-time public sentiment tracking. Red indicates negative sentiment, blue indicates positive, and green-so the Guidelines say-stands for "appropriate concern." All the data is recorded, analyzed, and distilled into clinical figures for the department's weekly reports.\n\nAt the end of the workday, the staffers emerge from the nameless office and return to their ordinary lives."
 jap.155.a: "And those screens watch every corner."
 jap.156.t: "The Mobile Corps"
 jap.156.d: "Ken'ichi Fujiwara stepped out of his apartment in plain clothes, a light drizzle falling from the overcast sky. As an officer in the Tokyo Metropolitan Police Department's Traffic Division, he rarely enjoyed a day off. At four in the morning, the city streets lay silent-except for one unusual rumble echoing in the distance.\n\nRounding the street corner came the first Type 90 main battle tank, its commander stifling a yawn, looking as if he'd just rolled out of bed and onto the turret. Behind it followed several armored vehicles and military trucks packed with JSDF personnel-some leaning on each other, fast asleep, others peering blankly at the rows of high-rise buildings, as though unsure why they'd been called into Tokyo at this hour.\n\nAbove, three AH-1Z helicopters rumbled across the city skyline, their rotors echoing off the concrete towers. A salaryman froze in his tracks, too stunned to notice his briefcase falling to the ground. Nearby, a group of young onlookers excitedly filmed the passing convoy on their phones, as if they were watching the shoot of an action movie.\n\nFujiwara watched a Type 96 armored vehicle crawl by, its radio operator dozing behind a blinking red headset. A bicycle courier, laden with newspapers that contained no mention of any of this, stopped at the roadside to stare at the scene. By the time those papers reached people's doorsteps, Tokyo might already have become an entirely different place."
 jap.156.a: "The city still slumbers in the haze of dawn."
 jap.157.t: "Traitor"
 jap.157.d: ""This defeat in the war rests squarely on your shoulders!" Lintsukiko Tsubaki of the Liberal Democratic Party shouted, her voice echoing through the Diet chamber. "While we were working tirelessly for national security, what were you doing? Organizing anti-war protests in the streets! Opposing the defense budget in the Diet!"\n\n"That's democracy in action!" a member of the Constitutional Democratic Party retorted, rising to his feet.\n\n"Democracy?" Tsubaki gave a humorless laugh. "When Taiwan cried for help, your idea of democracy was to sit back and do nothing? We could have resisted China's expansion with everything we had, but instead, we had to waste energy negotiating with you at home. Every time the defense budget came up, every piece of legislation-there you were, dragging your feet!"\n\n"Don't twist the facts!" shouted a lawmaker from the Democratic Party For the People. "It's your foreign policy that utterly failed!"\n\n"Failed?" Tsubaki slammed both hands on the table. "Who leaked our defense deployments? Who kept disparaging the Self-Defense Forces in the media? Who undermined the public's resolve at the most critical moment? Now that Taiwan has fallen, are you satisfied?"\n\nThe hall erupted in an uproar, but Tsubaki's voice rose above the commotion. "One day, the truth of how you betrayed our national interests will come to light. History will remember who gave our enemies their greatest advantage at this moment of crisis!""
 jap.157.a: "You are criminals in the eyes of history!"
 jap.158.t: "Peaceful Protest"
 jap.158.d: "Yamato Suzuki tightened the chin strap of his riot helmet and gripped his shield. As captain of the Mobile Police Unit, he raised a loudspeaker for the third time: "Under the Public Assembly and Demonstration Act, you are ordered to disperse immediately. Otherwise, we will employ force."\n\nMocking laughter erupted among the protesters. "Down with the tyrant! Long live peace!" they shouted at full volume, holding up signs in defiance. Suzuki studied the faces of these so-called pacifists-their placards read "Overthrow the Tyrant," yet they seemed oblivious to the grave crisis the country was facing.\n\n"This is your final warning. Anyone who remains here in the next ten minutes will be arrested for obstructing official duties." Minute by minute, time ticked by. Rather than disperse, the protesters pushed toward the police line. Suzuki spotted some filming provocatively, apparently hoping to capture a moment of "police brutality."\n\n"Move in," he ordered curtly. Like a drawn sword, the riot squad cut through the crowd. Suzuki seized one of the leaders-a man wearing a red headscarf-and quickly subdued him. The man kept shouting about "police violence," but Suzuki paid no heed."
 jap.158.a: "In times like these, do you really think you can get away with such chaos?"
 jap.159.t: "Prime Minister's Address"
 jap.159.d: "As dusk settles over Mount Fuji, our nation faces unprecedented challenges. A cold wind from the north carries the threat of Russia, the waves of the East China Sea echo with China's ambitions, and dark clouds loom ever closer from the Korean Peninsula. These powers seek to bind our freedom with chains, to crush our resolve through fear.\n\nWe have lost our closest neighbor and made this maritime region all the more precarious. Yet remember this: Japan has never surrendered to solitude, nor has it ever yielded to adversity.\n\nWhen morning light pierces the clouds and cherry blossoms bloom despite fierce winds, that is who we are as a people. We can be struck, but never broken; we may stand alone, but never lose our way.\n\nWe must be as vigilant as ninjas and as brave as samurai. Let those who would enslave us see that, though our island nation may be small, our spirit is unbreakable. Every grain of sand on this land carries the legacy of our ancestors.\n\nDo not lose yourselves to despair, for despair is exactly what our enemies desire.\nDo not lower your guard, for vigilance is the price of freedom.\nDo not lose faith, for faith is our greatest weapon.\nSo long as Mount Fuji stands tall, so long as cherry blossoms bloom each spring, the spirit of Japan shall never be extinguished."
 jap.159.a: "Never despair." 
 jap.160.t: "Questioning Accountability"
 jap.160.d: ""Let me tell you what a policy disaster looks like," declared Rinko Tsukikage of the Liberal Democratic Party, her voice taut with controlled anger as she stood at the podium. "Your so-called 'SME Revitalization Plan' is nothing but a colossal joke."\n\nShe held up a statistical report. "A streamlined approval process? As a result, shady businesses have slipped in unnoticed. More than eight hundred fraudulent companies exploited this loophole to receive subsidies-totaling over eighty billion yen. Meanwhile, genuine traditional enterprises that truly need help are being pushed into vicious competition because you removed industry entry standards."\n\n"As for your much-touted 'media liberalization policy,' doing away with news outlet licensing requirements has flooded the market with nearly three thousand unverified online media sources. Over the past year alone, more than twenty thousand unsubstantiated news stories have gone viral on social platforms. Do you have any idea how much chaos that has caused in society?"\n\nTsukikage glanced toward the seats of the opposition, where some members kept silent while others seemed poised to rebut. "Because of a single false food-safety report, four long-established businesses went bankrupt, leaving three thousand people jobless. Is that what you mean by 'freedom of speech'? "She raised another dossier. "But these aren't even the most lethal failures. Your greatest offense is having utterly ignored our defense needs. Under your administration, the defense budget was cut, and the Self-Defense Forces' equipment upgrades were delayed again and again. Now, Taiwan has already fallen, and Chinese warships are patrolling just off our territorial waters! We're left with no choice but to contend with an even more aggressive neighbor-and it's all thanks to you!""
 jap.160.a: "So these are the 'bountiful fruits' of your reforms?"
 jap.161.t: "The Halls of Power"
 jap.161.d: ""Watch carefully, Yoko. All the significant decisions concerning the affairs of this nation are debated here," said Lord Uda from Chiba Prefecture, seated comfortably in his designated seat in the spectators' gallery on the second floor of the Japanese National Diet Building. He looked down with satisfaction at the proceedings in the hall below.\n\n"Yes, Father," responded Yoko, the eldest daughter of the Uda family, who possessed a head of lustrous black hair and an elegant, refined appearance. The entire Diet building had undergone hardly any changes since Showa 11, with only minor repairs due to a few fires and earthquakes.\n\nIn fact, it wasn't just the architecture that remained unchanged; the variety of people in the assembly also bore striking similarities to those from a hundred years ago. For instance, the elderly legislator sitting in the front row behind the cabinet ministers, basking in the reverence of his younger colleagues, was almost indistinguishable from the noble Genrō of the past, who wore luxurious uniforms trimmed with gold and held feather-adorned bicorn hats. Similarly, the individual entering from the left, shaking hands, exchanging pleasantries, and engaging in light-hearted banter, bore a remarkable resemblance to the young opportunists who constantly surrounded Fumimaro Konoe. Even the burly figure pushing through the crowd toward his seat seemed a modern-day version of the political prodigies from the Taisei Yokusankai, who had risen from the pages of the Yomiuri Shimbun to the legislative halls in the 21st century.\n\n"...What do you think, Yoko?" Lord Uda asked as the Speaker of the House struck the gavel to adjourn the session, which had ended after lengthy debates on minor amendments to several legislative bills.\n\nYoko responded quickly, "I found it highly educational, and I am grateful for this opportunity, Father." But inwardly, as she listened to the heated debate over the necessity of removing an adjective from a sentence, she thought:"
 jap.161.a: "... It's astonishing how apathetic and indifferent humans can be."
 jap.162.t: "The Land of the Setting Sun"
 jap.162.d: "Long ago in the land of Izumo, Susanoo-no-Mikoto was entrusted with protecting these shores. A mighty deity wielding the Ame-no-Murakumo Sword, he once slew the fearsome Yamata-no-Orochi to save Princess Kushinada from a sacrificial fate. Yet, as the years passed, Susanoo grew complacent. He believed his power would never wane and that his sword skills would never rust. In these peaceful days, he neglected his daily training and let the Ame-no-Murakumo Sword gather dust upon the shelf.\n\nOne day, an even more powerful serpent rose from the eastern seas. Its gleaming scales and icy forked tongue testified to its terrifying might. Susanoo gripped his long-unused sword, only to find its blade dulled. When he assumed his battle stance, he realized how rusty his techniques had become. Faced with this colossal serpent from the East, the hero who once vanquished Yamata-no-Orochi now stood powerless.\n\nIn the fierce clash that followed, Susanoo was driven back step by step. His once-proud swordsmanship proved shockingly frail. In the end, he could only watch as the serpent claimed the land he had sworn to protect. Tears once again fell from Princess Kushinada's eyes, but this time-"
 jap.162.a: "No hero can save her now."
 jap.163.t: "The Final Battle"
 jap.163.d: "Yu Inoue examined the operational map inside the tactical command room at Zhongshan High School. The five-hundred-meter distance had been meticulously divided into multiple assault zones, with every block annotated by detailed strategic data. At dawn, twelve main battle tanks from the 3rd Armored Regiment would launch the first wave of attacks, while Inoue's infantry platoon advanced from both flanks under armored cover.\n\nConfirmation of equipment readiness echoed through the comms. Inoue checked his Type 89 rifle, ensuring each mechanical component was in perfect condition. Ammunition had already been distributed, with six spare magazines neatly aligned in his tactical vest. Both night-vision and thermal imaging systems underwent final calibration.\n\n"Fifteen minutes until operation," the platoon leader's voice crackled through his earpiece. Through his tactical monocular, Inoue could see the silhouette of Dalian Station clearly against the night sky. Over the past week, each possible vantage point and fire zone on these streets had been analyzed repeatedly. The engines of the armored vehicles rumbled in the darkness like beasts ready to pounce. Inoue performed one last check of the communication channels, making sure the link with the armor was secure."
 jap.163.a: "The weather is clear today."
 jap.164.t: "The March"
 jap.164.d: "Fujii Kaisho sat in the back of a military truck, watching the black smoke rising at the far end of the southern highway. It was the third day since his unit had seized Shenyang, and the Jilin Provincial Broadcasting Station had become the city's last stronghold of resistance. A cold wind, carrying the smell of gunpowder, blew in through the open truck bed, reminding him of his grandfather's diary.\n\nThat yellowed notebook documented everything from the Mukden Incident in 1931. At the time, the Kwantung Army had traveled north much the same way, riding troop trains across the plains of northeast China. Then, steam locomotives trailed white smoke behind them, whereas now it was black smoke from artillery fire.\n\nAn armored convoy thundered down the highway, the clatter of tank treads against the asphalt sending Fujii into a daze. More than ninety years later, they were traveling across the same land once again. Outside the window, the scenery felt strangely familiar: the same soil, the same drifting smoke, and in his breast pocket lay a photo identical to one his grandfather had carried in his youth.\n\n"Five kilometers," the captain's voice crackled through the radio. Fujii gripped his automatic rifle, gazing at the faint outline of the broadcasting station building looming through the haze. In this moment, history seemed to overlap. He thought of the scenes in his grandfather's diary describing Fengtian, and of the Kwantung Army's advance long ago. Now, as though stepping across time, he found himself retracing his ancestor's path."
 jap.164.a: "This time, the ending will be entirely different."
 jap.165.t: "Nanjing, Nanjing!"
 jap.165.d: "Amid the thunder of artillery, the copper bell at the Nanjing Massacre Memorial tolls with a somber resonance. Captain Li Tieshan stands before the memorial wall, behind him the names of 10,665 victims."Captain, Wanda Plaza has fallen," the radio crackles with the communicator's voice. "The last message from the Armed Police was: 'We would rather die than retreat.'"\n\n"Collect all the soldiers' final letters," he says calmly. "Tell them that today, right here on this land soaked with our ancestors' blood and tears, we will write our last chapter."The exhibition hall of the memorial has been turned into a makeshift field hospital. Wounded soldiers lean against the display cases, the faded historical photographs behind them depicting countless bones and rivers of blood from decades past. Fresh blood drips from the stretchers, seeping into the cracks in the floor.\n\n"The enemy is advancing from Yunjin Road! Our troops on that side are withdrawing to our position." Li Tieshan eyes the last few anti-tank missiles in the corner — these are their only remaining heavy weapons. The soldiers quietly check their ammunition. No one speaks, but each conveys the same resolve: this time, they will live and die with this city.\n\nA soldier, cleaning his rifle, suddenly asks, "Captain, do you think our forefathers are watching us from above?" Li Tieshan looks at him and replies, "They're not just watching. They're waiting for us to answer to those 300,000 souls."This will be their final stronghold. Li Tieshan attaches a bayonet to his rifle and turns to the soldiers behind him. "Prepare for battle! Let history remember that here, we did not fail our fallen heroes.""
 jap.165.a: "Your souls are truly heroes among ghosts!"
 jap.166.t: "The Eye of Tianjin"
 jap.166.d: "The sky over Tianjin is shattered into sooty fragments by billowing smoke. In this city that houses both historic concession-era buildings and modern skyscrapers, war spreads from one narrow lane to the next. The PLA has built layer upon layer of defenses in the Italian-style district, while Japanese armored units advance from Haihe East Road, their treads carving deep scars into the pavement.\n\nAncient Culture Street has been reduced to scorched earth. Relying on Tianhou Temple, PLA special forces wage guerrilla warfare through a maze of alleys, where every corner might hide an anti-tank squad. Japanese armored vehicles struggle in the cramped streets, forced to face firebombs and improvised explosives from all directions.\n\nTianjin Station has become an isolated fortress. The PLA has transformed this century-old station into a bastion, while Japanese airborne troops attempt to land in the Wudadao area. Yet every building has become a strongpoint, compelling the Japanese to rely on air strikes to destroy them completely.\n\nIn the Binhai New Area, modern skyscrapers form the most brutal battlefield. Glass facades shatter in explosions, and the sky bridges between tall buildings turn into vital high ground. Infantry on both sides fight within stairwells and across multiple floors, using every possible means to eliminate the enemy."
 jap.166.a: "An endless nightmare."
 jap.167.t: "Salute to the Fallen"
 jap.167.d: "Naoki Watanabe gazes at the battered Type 99A main battle tank on the bridge. It crawls forward like a wounded beast, riddled with bullet holes, its tracks emitting tortured metallic screeches. Yet it keeps going, propelled by a chilling determination. Behind it marches a column of PLA infantry. They advance in unison, postures unwavering. The tank's scarred armor catches the morning light, casting a golden radiance over this grim procession.\n\n"This is your final warning! Lay down your arms and surrender immediately!" The platoon leader's voice booms through a loudspeaker. "Stop moving forward at once!" But the advancing soldiers seem not to hear. Watanabe notices a flicker of conflict on the junior officer's face before he raises his hand. "Open fire!" At the command, gunfire tears through the morning calm. The front three PLA soldiers fall instantly, yet those behind them step over the bodies and press on. One soldier, shot in the leg, is quickly supported by a comrade so they can keep moving; another, struck in the chest, reaches forward before collapsing, as if grasping for an unattainable dream.\n\nThe tank's main cannon continues to roar, flipping an armored vehicle. But soon, an anti-tank missile whistles in and slams into the tank's side armor. In a flash of fire, the steel behemoth finally ceases its advance. As the smoke clears, Naoki Watanabe stands frozen. He has witnessed countless battles, yet never one like this. In those dying soldiers' eyes, there is no fear or hesitation, only sadness and anger."
 jap.167.a: "Loyal bones fortify the Great Wall, the lament runs deep."
 jap.168.t: "India Splits from the PDTO"
 jap.168.d: ""These Indians! Unbelievable!" Section Chief Sato slammed the diplomatic telegram onto the conference table. "We've spent years carefully laying the groundwork in South Asia, and now they just walk away from the Pacific Defense Treaty without a word? What do they take us for?" Across the table, Moriyama Yukiko maintained a professional smile, lightly adjusting her glasses. "Sato-senpai, please calm down. Sometimes, it's best to let the dust settle and see where the bullet lands."\n\n"Let the bullet fly?" Sato sneered. "The Indians have made it crystal clear—they're 'reassessing their strategic partnerships in Asia. How much clearer does that bullet need to be?"\n\n"You're looking at this too pessimistically," Yukiko replied, pulling up a report on her tablet. "From a more optimistic perspective, we no longer have to expend resources dealing with the aftermath of China's civil war. With China in chaos, it's only natural for India to reconsider its geopolitical position."Sato gazed out at the Tokyo skyline, silent for a moment. "Years of maneuvering, and in the end, we have nothing to show for it."\n\n"Not necessarily," Yukiko shrugged. "Japan-India relations remain strong. Leaving the treaty doesn't mean abandoning bilateral cooperation. Besides, in times like these, what seems like a loss may turn out to be an advantage."Sato turned to her, a flicker of interest in his eyes. "Go on." Yukiko closed her file. "Instead of clinging to treaty frameworks, we should focus on how to ensure continued mutual benefit between both sides."\n\nSato let out a long sigh, the anger on his face gradually fading. "You're right. In this world, sometimes, the smartest move is to play the fool.""
 jap.168.a: "OK"
 jap.169.t: "India Splits from the PDTO"
 jap.169.d: "India, a founding member of the Pacific Defense Treaty Organization, has officially announced the completion of the South Asian Defense League, a new regional security bloc encompassing the Indian subcontinent and surrounding areas. Simultaneously, India declared its formal withdrawal from PDTO.According to a statement from the Indian Ministry of External Affairs, SADA is built on the principle of "regional autonomy", emphasizing deep military, intelligence, and strategic resource cooperation among its member states.\n\nJapan and Australia, the other founding members of PDTO, have expressed concern over India's decision. In a joint statement, their respective foreign ministries reaffirmed their commitment to maintaining PDTO's operations while continuing bilateral security cooperation with India.\n\nInternational analysts suggest that India's move signals a renewed division in Asia's security landscape. On one side stands the PDTO, led by Japan and Australia; on the other, the SADA, with India at its core."
 jap.169.a: "Interesting."
 jap.170.t: "China Launches Military Exercises in the East China Sea" #chinese liberals
 jap.170.d: "The Defense Intelligence Headquarters has recently reported that China has launched a large-scale military exercise in the East China Sea, involving a significant deployment of naval vessels, air forces, amphibious units, and long-range fire support units. Intelligence assessments indicate that the exercise exhibits clear offensive characteristics, with its geographical focus and simulated targets strongly suggesting a strategic aim toward Japan and Taiwan. This show of force appears to be an attempt to reinforce Beijing's control over the East China Sea and surrounding regions, directly challenging Japan's defense posture.\n\nThrough satellite reconnaissance and maritime patrols, DIH has confirmed that the exercise includes advanced warships, submarines, and carrier strike groups, while aerial assets such as fighter jets and reconnaissance aircraft have also been deployed, demonstrating highly coordinated joint operations.\n\nIn response to this development, DIH recommends immediate enhancement of Japan's defensive posture in the East China Sea, along with intensified intelligence-sharing and strategic coordination with allied forces to fully assess the potential security risks posed by China's actions."
 jap.170.a: "Contact our allies in Korea and the PDTO."
 jap.171.t: "North Korea Moves Forces to the Border with South Korea"
 jap.171.d: "The Defense Intelligence Headquarters has reported significant North Korean military activity along the Korean border, with the scale and intent of the operation raising serious concerns. High-resolution satellite imagery and ground intelligence networks confirm that multiple North Korean infantry divisions have been massed within several dozen kilometers north of the Demilitarized Zone. This troop concentration is accompanied by artillery units, armored vehicles, and increased logistical movements.Of particular concern, reconnaissance aircraft have detected North Korea deploying short-range ballistic missile launchers and mobile rocket artillery systems near the border. This force posture suggests preparations for either a strategic show of force or potential military action.\n\nIn response, DIH has adjusted its surveillance priorities over the Korean Peninsula and is conducting close intelligence-sharing and coordination with Australian and South Korean agencies to monitor North Korea's troop movements and strategic intent in real-time. Given North Korea's history of escalating tensions through border military maneuvers, DIH advises the government and Self-Defense Forces leadership to develop contingency plans proactively to mitigate the risks of any potential provocations, ensuring Japan's security in the increasingly volatile regional environment."
 jap.171.a: "That's not very good..."
 jap.172.t: "Chinese Ships Entered Okinawa Waters"
 jap.172.d: "Like every morning, Taro the fisherman navigated his boat across the calm waters off Okinawa, casting his nets into the sea as the gentle morning breeze whispered across the waves. The horizon glowed with the first hints of orange, and his hands, calloused and sure, worked the ropes with practiced ease. His keen eyes swept the sea, searching for the subtle shimmer of fish beneath the surface.But the tranquility of the morning was short-lived.\n\nIn the distance, dark specks emerged on the horizon, growing steadily larger. A low, resonant hum rumbled through the air, splitting apart the stillness of the sea.Taro narrowed his eyes. Cargo ships? Perhaps another distant freighter, en route to some faraway port. But as the hulking shapes sharpened, his stomach tightened with unease—Chinese warships. Their gray hulls glinted coldly in the morning sun, cutting through the waves with deliberate precision. The red-starred banners snapped in the wind, their colors stark against the pale sky. These ships were not simply passing through—they were heading straight for these waters.\n\nThe fleet drew closer, and with it came its shadow, casting a dark pall over Taro's small fishing boat. Then, a broadcast rang out, distant yet sharp, words lost in the wind but heavy with command.Taro froze, his grip tightening on the railing. He knew this sea—his sea—yet the voice carried an undeniable weight, a presence that did not seek permission.His crew rushed out from the cabin, clustering on deck, murmuring and pointing, their voices lost to the growing gusts of wind.\n\nThe warships did not linger. After a brief pause, the colossal fleet pressed forward, moving with the relentless inevitability of giants, carving a silent path through the waters Taro had always called home."
 jap.172.a: "Chinese people? In the sea off Okinawa?"
 jap.173.t: "China Begins Preparations for a New Landing Operation" #chinese nationalists
 jap.173.d: "The Defense Intelligence Headquarters has detected large-scale and irregular military activities by the Chinese armed forces across multiple strategic directions. Intelligence gathered from satellite reconnaissance, signal intelligence, and maritime patrols confirms that the People's Liberation Army has amassed significant military forces in the East China Sea and adjacent regions, including naval warships, air assets, and land-based missile units. The scale and operational frequency of these movements are unprecedented.\n\nOf particular concern, multiple PLA Navy capital ships and submarine formations have been observed operating extensively east of Okinawa, accompanied by frequent fighter jet and reconnaissance aircraft sorties, indicating an intentional expansion of China's control over regional air and sea spaces. Additionally, intelligence confirms that the PLA has conducted large-scale amphibious assault drills along its coastline, supported by long-range rocket artillery and ballistic missile deployments, strongly suggesting a direct threat to both Japan and Taiwan.\n\nOur assessment concludes that these actions may signal preparations for a larger-scale military operation or the progressive execution of China's regional hegemonic strategy."
 jap.173.a: "They want to start another war? We can start it ourselves."
 jap.174.t: "Preventive Cyberattack"
 jap.174.d: "Second Lieutenant Nami Okamoto's fingers danced across the keyboard, her every keystroke precise and deliberate. Japan's Self-Defense Forces Cyber Command had reached the critical stage of their latest operation—codenamed "Sakura Snow."Using the stealth reconnaissance vessel Hina Taka, they had successfully infiltrated a Chinese "Wing Loong" UAV patrolling the maritime borders. The drone, unaware of its betrayal, had become a Trojan horse, slipping undetected into China's military network.\n\nThe intrusion was seamless, almost elegant—not a single alarm was triggered. Like a spider weaving its web, the "Sakura Snow" program spread across interconnected nodes, burrowing deeper with every passing second.Then, Nami found it—a folder, its encryption unusually robust. The decryption process was slow, arduous, each layer peeled away revealing something far more sinister than routine defense protocols or training drills.As the data loaded onto her screen, the atmosphere in the operations room turned electric with tension.This was no standard military document.It was a complete, meticulously planned war strategy:How to sever Japan's maritime lifelines.How to cripple its power grids and communication networks.How to seize key islands.The text was clinical, calculated, devoid of emotion—not the rhetoric of conflict, but an instruction manual for extermination. A plan to erase Japan from the map, as effortlessly as one might squash an insect or remove an obstacle.\n\nNami's eyes locked onto the glowing kanji-filled screen, In her mind, an old fable surfaced—the frog slowly boiled alive in warming water. The initial warmth was deceptive, comforting even. Then it grew hot, then unbearable, until finally—it was too late.She stared at the rows of Chinese characters, frozen in place for what felt like an eternity.And then, through the gaps between the words, she saw what was really written there.Two characters, again and again. "Revenge.""
 jap.174.a: "Highest operational alert!"
 jap.175.t: "Preemptive Strike Against China"
 jap.175.d: "Second Lieutenant Wataru Matsuda was jolted awake by a rapid knocking at his door. In the dim light of his cabin, he could just make out the faint outline of a Toyama Kasumi poster—the "good-luck charm" his younger sister had forced on him, saying it would keep him safe and bring him home."Lieutenant Matsuda! Emergency assembly!" came the communications officer's voice from outside. Matsuda quickly put on his uniform and stepped into the corridor, already filled with officers.\n\nIn the operations room, the captain looked at everyone and said, "Gentlemen, headquarters has just issued a top-secret order. Intelligence shows that the Chinese Navy plans to launch a surprise attack on our country. To protect national security, we will carry out a preemptive strike." Matsuda felt a moment of disorientation. A preemptive strike? That meant they would strike under cover of darkness, attacking the enemy before they could react. But hadn't the government stated that Japan would never be the first to start a war?\n\nAfter the meeting, Matsuda walked out onto the deck. He took out a cigarette and lit it in the sea breeze, letting the nicotine briefly calm his thoughts. He thought of his family and of all he had sworn to protect. The smoke swirled for a moment before dissipating. Leaning against the railing, he felt the destroyer's engines growl to life beneath him. Soon, they would set off, shattering the night's silence.\n\nTaking one last deep inhale, Matsuda flicked the spent cigarette butt into the pitch-black sea. The tiny ember streaked through the darkness, then vanished into eternal night. At that moment, he knew that history would judge the righteousness of this decision—and that he was ready to bear his responsibility."
 jap.175.a: "Here we go."
 jap.176.t: "Peace Envoys"
 jap.176.d: "As evening settles in, the neon lights along Orchard Road begin to flicker on, their glow reflecting off the armor plating of Second Lieutenant Akihiko Nakamura's Type 10 main battle tank. Peering past the towering glass facades of upscale shopping complexes, he surveys Asia's most bustling commercial street. The armored convoy moves forward at a measured pace, steel treads rumbling against the asphalt. Close behind follows Lieutenant Takumi Suzuki's armored personnel carrier, packed with relief supplies. This advance unit from the 7th Armored Regiment carries the mission of bringing peace and a new order to Singapore.\n\nAt ION Orchard, a colossal LED screen continues to flash high-end fashion ads. The residents of Singapore watch the steel column in hushed silence—some capturing the scene on the latest iPhones, others merely observing quietly. To Nakamura, these composed faces reinforce the righteousness of their mission: defending democracy.\n\nWhen the armored column passes Orchard Central, a little girl in a school uniform waves at the tank. Nakamura removes his helmet and smiles back. As night falls, the convoy rolls past the Orchard MRT station. Trains still run as usual, with well-dressed office workers and young people streaming out of the station exits."
 jap.176.a: "Everything remains the same."
 jap.177.t: "Tropical Flight"
 jap.177.d: "The UH-60J helicopter cuts through the dense canopy of Cambodia's tropical rainforest. Sergeant Yuichi Tanaka leans against the cabin door, gazing at the vast green expanse below. The humid tropical air, laden with the scent of damp earth, rushes into the cabin, reminding him of the Vietnam War documentaries he once watched at the academy.\n\n"Hey, Yamamoto, he says, nudging the soldier beside him with an elbow, "don't you think this is a bit like the Americans in Vietnam?" Koji Yamamoto lifts his sweat-soaked face, about to reply, when a sudden gust of turbulence shakes the helicopter, interrupting them.\n\n"All we're missing are a few Charlies with AKs jumping out of the trees," Tanaka jokes, though his hand instinctively brushes the spare magazine on his tactical vest. The 7th Airborne Brigade's helicopter formation presses onward toward Phnom Penh, the roar of the turbines echoing over the rainforest canopy."
 jap.177.a: "Are we gonna get shot down by an RPG?"
 jap.178.t: "Lone Wolf"
 jap.178.d: "From the commander's station in his Type 10 main battle tank, Daiki Suzuki surveys the streets of Ho Chi Minh City. On his tactical tablet, real-time drone footage shows three T-90 tanks of the Vietnamese armored forces lying in ambush along Tan Son Road, forming a triangular blockade to seal off the route to the city center. "Load AP!" he orders. Loader Nakamura confirms the round is loaded with a sharp click. Guided by its electro-hydraulic servo system, the tank's 120mm main gun swings precisely toward the vulnerable flank of the first T-90. "Fire!"\n\nThe first armor-piercing round leaves the barrel and hits its mark at the joint of the target's armor plating. The explosion flares bright white on the thermal scope, and the first tank detonates instantly. Suzuki has no time to celebrate, however, because the remaining two T-90s have already locked onto their position. "Evasive maneuver to the right! Cover fire!" The tank pivots flawlessly under the control system, while the machine gun rakes the enemy's optical devices to buy time for reloading. An enemy shell from the second T-90 grazes their own tank's armor.\n\n"Target number two, 650 meters, round loaded!" announces the electronic fire-control system. Suzuki confirms the aim and fires at once. The second armor-piercing round penetrates the enemy's power compartment. The T-90 erupts in flames, yet it stubbornly continues to resist.The last Vietnamese tank tries to retreat behind nearby buildings. Suzuki calmly waits for the perfect firing angle, then gives the final order to shoot.The third round strikes the tank's tracks, immobilizing the steel beast for good at the corner of the street."
 jap.178.a: "The winner is king."
 jap.179.t: "Northern Offensive"
 jap.179.d: "Noon finds Hanoi trembling under a barrage of artillery. Second Lieutenant Yuichi Nakamura lies prone behind the smoldering ruins of an office building at the edge of Ba Dinh Square, watching the Ho Chi Minh Mausoleum flicker in and out of view through the billowing smoke. Enemy fire from Vietnamese positions rips into the concrete rubble around him with shrill impacts.\n\n"Cover me!" Nakamura shouts into his comms, signaling for demolition expert Suzuki to ready the satchel charge. Meanwhile, the main force is locked in fierce urban combat, with the roar of tanks merging with the staccato of rifle fire. Overhead, jets and surface-to-air missiles weave through the skyline, occasionally releasing fiery debris that tumbles down onto the streets."Watch two o'clock!" he yells, just as a rocket strikes the wall behind him. The ensuing blast wave hurls several of his squad members off their feet, rubble raining down around them. Wiping blood from his face, Nakamura pushes forward. A Vietnamese soldier bursts out of the smoke; Nakamura fires on instinct.\n\n"Engineering team, advance on the target!" The radio crackles with a cacophony of shouted orders and explosions. Tanaka and Sato, two combat engineers hefting demolition packs, crawl forward under covering fire. Thick, choking smoke coils above the square, pierced only by shafts of light. Ba Dinh Square has become a hellish battlefield, pitted with craters and burning vehicles. A fighter jet roars overhead, dropping bombs whose blasts echo in the distance."
 jap.179.a: "Forward!"
 jap.180.t: "The Temple"
 jap.180.d: "The dusk light bathes the golden spire of Xisage Temple in an amber hue. Second Lieutenant Yusuke Sato stands before the ancient stone steps, watching as the elderly abbot slowly makes his way down, his orange robes fluttering gently in the evening breeze.\n"Master," Sato begins, "we've come for someone—an injured PLA officer."\nThe abbot smiles and nods. "All beings suffer, so why be attached to the fate of one person? All things in this world are illusions."\n"This isn't a philosophical debate, Master," Sato takes a step forward. "This is a military operation. That officer has our comrades' blood on his hands."\n"What you speak of is but attachment," the abbot replies. "Buddha teaches that hatred does not cease by hatred; only compassion can conquer hatred. What you seek is nothing more than the continuation of karma."\nSato grips his rifle stock more firmly. "Master, I respect your faith, but orders are orders. Please don't make this difficult."\n"The Bodhisattva fears the cause, while ordinary beings fear the effect. The seeds you sow now will one day bear bitter fruit. Why not put aside hostility and avoid more bloodshed?"\n"We're soldiers, and a soldier's foremost duty is to obey orders."\nPressing his palms together, the abbot says, "Amitabha. One thought of compassion, one thought of Buddha-nature. If you can let go of your attachment in this moment, perhaps you'll understand the preciousness of life."\n"This is the last time I'll ask—hand over that officer." Sato's patience is running out.\nThe old monk closes his eyes. "All beings possess Buddha-nature, yet so many remain lost in delusion. If you insist on using violence to stop violence, I can only protect the Dharma with my own life.""
 jap.180.a: "Sato sighed and raised the butt of his rifle."
 jap.181.t: "Valkyrie of the Skies"
 jap.181.d: "Dozens of fighter jets tear through the cloud cover over Manila Bay. On the airborne early-warning aircraft, a swarm of radar blips indicates various forces converging. Takaguchi Tsukikage, the ace pilot of the Air Self-Defense Force, maneuvers her F-35 as a mixed group of PLA J-20s and Philippine KAI T-50 approaches from the South China Sea.\n\n"All units, be advised: Over forty hostile aircraft are entering the engagement zone," the warning from the command plane crackles over the encrypted channel. Tsukikage watches the constantly updating data on her heads-up display. Her instincts tell her that this air battle could reshape the contest for Manila's skies.\n\nThe first salvo erupts at thirty thousand feet. A flurry of missiles weaves a lethal tapestry in the clouds, and the shrill alerts of electronic countermeasures pierce the cockpit. Tsukikage executes a barrel roll, dodging two incoming missiles, and instantly locks onto a J-20 trying to ambush her side's AWACS. Her finger squeezes the trigger; the air-to-air missile howls toward its target. Flare decoys can't save the J-20. In a brilliant burst of light, the explosion unfolds high above Manila Bay.\n\nChaos intensifies as fighters of every type race through the clouds, missile trails gleaming gold in the sunlight. Tsukikage's F-35 executes a breathtaking cobra maneuver, sliding into the blind spot of an KAI T-50. Her second missile strikes home, leaving another fireball shimmering over the bay. Under her leadership, the Japanese formation gradually tears open the enemy's defense line. The E-767 AWACS provides the latest update: over half of the opposition's aircraft have been destroyed, and the remaining fighters are retreating south."
 jap.181.a: "This sky now belongs to Japan."
 jap.182.t: "Oil Crisis!"
 jap.182.d: "With Saudi Arabia falling into chaos, our oil supply has been severely hindered, and the looming collapse of the United States has not eased our tenuous situation anyhow. Japan has endured many hardships and overcome numerous challenges to endure and rebuild and improve in this new century.\n\nThe pains of the 1970s first oil shock still haunt the nation of Japan. During that nightmare, the Japanese economic growth was greatly impacted, and it fell significantly below the nominal growth trend. Due to Japan not being a major natural resources producer, our position has always been a fragile one, puppeted by the strings of overlords such as America.\n\nAlas, this crisis will not be the end of Japan; the rising sun has survived similar and worse catastrophes in its long and tumultuous history. Perhaps, this will be a new beginning, a new opportunity for Japan to finally break free from the shackles and restraints set in place by our enemies and "allies". Ultimately, only time will tell the fate of Japan, but for the time being, we must do our best in resolving the situation in front of us."
 jap.182.a: "Fall down seven times, rise up eight."
 jap.183.t: "Japan Oil Deal"
 jap.183.d: "We have received a deal offer from Japan, according to which they want to buy our oil cheaper than the market price in exchange for profitable trade and cooperation in the field of technology."
 jap.183.a: "We like this deal."
 jap.183.b: "No, only standard price."
 jap.184.t: "Russia Agrees!"
 jap.184.d: ""
 jap.184.a: "Great!"
 jap.185.t: "Russia Insists on Standard Price"
 jap.185.d: ""
 jap.185.a: "Fine..."
 jap.186.t: "The Spoils of Retirement"
 jap.186.d: "The taiwan front hungers for yet more men and material, and as such we are finding ourselves needing to continually decrease quality to meet demand. One enterprising officer has come forward with a plan to procure more tanks with little additional investment, at least for as long as the supply lasts. Despite being obsolete even when it was introduced, the Type 74 is still a workable design, and we still have a few lying in mothball. The number available is little more than a drop in a pond, but the storm of Japanese manufacturing will ensure this pond floods."
 jap.186.a: "Victory a tank at a time."
 jap.187.t: "Moscow, My Love"
 jap.187.d: "Just a couple of years ago, Andrei could never have imagined that he would end up in the Land of the Rising Sun.\nHowever, everything changed rapidly just a couple of months ago. After the conclusion of strategic agreements between Japan and Russia, a project of student exchange between the universities of the two countries was approved - and Andrei was lucky to get into the group that was invited to study for a few months in Tokyo. It was here that he met the woman he would love for the rest of his life.\n\nThey met quite by chance in the corridor of the university, bumping foreheads: she had a short, disheveled haircut, light blue dress and round glasses; he was wearing a plaid shirt and ragged jeans. Hayase was an architecture student, a seemingly unremarkable girl whose beauty had yet to be revealed. He was expecting to hear shouts of reproach, but he was pleasantly surprised to hear soft, soft laughter instead.\n\n- You have such stupid jeans...\n\nA few weeks passed, during which they had grown incredibly close. She showed him a side of Japan he'd never imagined before: cozy stores on narrow streets, city gardens planted with sakura trees, and half-empty villages - she opened up another world to him. He told her about his homeland - Moscow, Siberia, the Baikal seals and Crimean beaches, the factories of Dolgoprudny and the mountains of Altai. He promised to show her all these places.\n\nThey were sitting under the starry night sky. She was telling him something about her life as a student and complaining about the smallest things, but he didn't listen to her, just admired her with a smile. Suddenly, the sky lit up with a flash: it was covered with a myriad of colorful fireworks. Hayase jumped up from the bench like a child and stared at the spectacle with delight, pointing to the brightest flashes. He only grinned and looked into her eyes:"
 jap.187.a: "He saw the universe in them."
 jap.188.t: "New Course of Japanese Capitalism"
 jap.188.d: "No matter how determined the driver is, this does not give freedom to the locomotive. This or that driver is put on this or that locomotive by the whimsical will of the gods. However, almost every locomotive, until it rusts through, strives forward. This is the external majesty of the locomotive.\n\nEach of us is a locomotive. Our work is nothing more than smoke and sparks that we throw into the sky. People walking by the railroad embankment know from the smoke and sparks that a steam locomotive is coming. Or that it has just passed. Smoke and sparks, if we are talking about an electric locomotive, can be replaced by a rumble.\n\nJapan is the steam locomotive, and our economy is the rails on which the train is rushing. However, the rails have a tendency to rust and fall into disrepair, and the same situation has happened to our economy. Years of bloated bureaucracy, rigid corporate etiquette, lack of private initiative and laziness of Japanese workers, and technological backwardness are only the most prominent reasons for our failure. The war in Taiwan opened this pustule, and we are seeing the consequences of decades of neglect of these problems. Now we will have to reorganize our economy, and to achieve this we will all have to work much harder than before, even without paid vacations and overtime. We will have to become one machine, and each of us a cog in it. But do not despair: our sacrifice will be remembered by our children and grandchildren, I assure you. After all, we have no right to make a second such mistake.\n\nThat's why Flaubert's words are so close to me:"
 jap.188.a: "The man is nothing, the work - all."
 jap.189.t: "Digitalization"
 jap.189.d: "There is a joke: in the 1980s, Japan was in the 2000s, and in the 2020s it continues to remain there. No matter how much we hate to admit it, this judgment is not a joke. There are many reasons for this phenomenon: whether it is the extremely conservative approach of both the government and companies in relation to the methods of transmitting information, the consequences of the 90s - all this significantly affects our economy and, as a result, the combat capability of our army.\n\nFor victory, we need digitalization. The only question is how to approach it.\n\nThe first approach implies "soft" digitalization. Japan is known as a country of harmony, and there is no reason for us to destroy decades of tradition, as our Communist neighbors did in pursuit of profit. Instead, we will set an example for both businesses and citizens by starting the digitalization of our government. No more bureaucracy: all you have to do is log in to the app on your smartphone. Paying fines, digital residency, calling a doctor or complaining about an urgent problem will no longer force our citizens to carry dozens of sheets with them. And corporations, observing our successes, will begin the process of digitalization themselves.\n\n, however, there is a second way. The situation Japan finds itself in cannot be solved by half measures. We need the digitalization of the whole society. We already have projects like Society 5.0 aimed at attracting the latest technologies, the only question is implementation, which is slowed down by processes in our society. In the short term, this approach will cause obvious discontent among all segments of society, from the conservative party leaders and business magnates to ordinary workers, but it is this approach that will allow us to leave the pit in which our country finds itself forever. Moreover, imagine Tokyo in just 10 years: an unmanned taxi, robots on the streets and AI at work, contactless payment and 5G services - do you like the sound? Then keep quiet and accept the new realities.\n\The choice is yours, Mr. Minister."
 jap.189.a: "Let's limit ourselves to the Digitalization of government."
 jap.189.b: "We need a full Digitalization!"
 jap.190.t: "Reiwa Achieved"
 jap.190.d: "The war in Taiwan, which we lost due to various socio-economic factors, left a scar on the face of our country, which, as it seemed to us at the time, could not be hidden. The economy was in ruins, the army was disgraced, and the Japanese people, once proud and hardworking, were in a state they had not experienced since the shameful defeat in 1945.\n\nBut still, we refused to take it for granted. Japan was able to find a way out of even such a dire situation. The Japanese economy is experiencing an unprecedented upswing, and the "Made in Japan" brand is once again filling store shelves around the world. The products of Toyota, Toshiba, and Sharp are in many ways superior to those of European competitors, the Internet is once again experiencing a period of Japanification, and entrepreneurs are investing unprecedented amounts in the financial sector.\nJapanese dream has been revived - conservative, traditional, and our people are once again loyal to their state and the Emperor. The smiles of mothers and the laughter of children are once again visible on the streets, young people are returning to the villages, and Tokyo is slowly turning from a crowded metropolis into the city of the future.\n\nHard times await the Empire ahead. The enemy across the sea is already preparing his war machine to try to destroy us. But we still have time to prepare and cut off the head of the red snake once and for all.\n\nWhen they arrive, we will be ready."
 jap.190.a: "Tomorrow will be better."

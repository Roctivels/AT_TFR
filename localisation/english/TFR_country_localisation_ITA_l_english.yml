 vatican.4.t: "Cardinal Luis Antonio Tagle Elected Pope Francis II"
 vatican.4.d: "The bells of St. Peter's Basilica rang out in the Eternal City this morning, and white smoke billowed from the Sistine Chapel's chimney, signaling to the world that the conclave has concluded, and the College of Cardinals has elected the 267th Bishop of Rome. Cardinal Luis Antonio Tagle of the Philippines has been elected to the throne of Saint Peter, taking the name Francis II, becoming the first pope from East Asia in history.\n In his public address as Pontiff from the balcony of St. Peter's Basilica, the newly elected Pope made a few statements regarding the new face in the Kremlin:\n\n\"With the resurgence of Moscow and her sphere, I am here to warn you on the very possibility of a new rise of Imperialism. And as such, an end to discourse, mercy and humility for which Christ Jesus died in order for us to maintain. I call upon you, brothers and sisters of Russia, to resist the Kremlin's attempts of upholding a false understanding of the gospel.\"\n\nPope Francis II's strong emphasis in interreligious dialogue and missionary outreach have ensured his papacy will be one of Synodality as a more progressive wing seems to be gaining a hold in the Holy See. However, he faces criticism from the more conservative and traditionalist members of his faith, particularly due to his emphasis on inclusion and accompaniment of marginalized people, including homosexuals."
 vatican.4.a: "New Pope for a New Age"

 vatican.5.t: "Cardinal Robert Prevost Elected Pope Leo XIV"
 vatican.5.d: "The bells of St. Peter's Basilica rang out in the Eternal City this morning, and white smoke billowed from the Sistine Chapel's chimney, signaling to the world that the conclave has concluded, and the College of Cardinals has elected the 267th Bishop of Rome. Cardinal Robert Francis Prevost of the United States has been elected to the throne of Saint Peter, taking the name Leo XIV, becoming the second pope from the Americas in history.\n In his public address as Pontiff from the balcony of St. Peter's Basilica, the newly elected Pope commented on the situation of his home country:\n\n\"And to all of you, brothers and sisters of America. Oh, how my heart aches for each one of the souls lost in this godless conflict! But worry not, for the peace of god surpasses all understanding and if you believe God has worked, peace shall return to America. So, to you, brothers and sisters of the world, we must follow Christ's example and build bridges to those hurt by this and every conflict, not destroy them.\"\n\nHaving a background in missionary work and placing attention in small cultures, it's expected that Pope Leo XIV's papacy will likely be similar to the course Pope Francis chartered before him, having already declared his support for the Union of America in the ongoing Civil War."
 vatican.5.a: "Francis's legacy lives on"

 vatican.6.t: "Cardinal Peter Erdo Elected Pope Stephen X"
 vatican.6.d: "The bells of St. Peter's Basilica rang out in the Eternal City this morning, and white smoke billowed from the Sistine Chapel's chimney, signaling to the world that the conclave has concluded, and the College of Cardinals has elected the 267th Bishop of Rome. Cardinal Peter Erdo of Hungary has been elected to the throne of Saint Peter, taking the name Stephen X.\nIn his public address as Pontiff from the balcony of St. Peter's Basilica, the newly elected Pope reflected on the state of world affairs:\n\n\"Europe stands more divided today than it has been in decades. In times such as ours, the one, holy, catholic, and apostolic Church must be a beacon, above politics, yet never insensitive to injustice. Let us remember that our unity is greater than any and all borders, flags, or parties; for we are all one in Christ Jesus. It's not the time to despair, but to renew.\"\n\nOften described as a theological conservative with a deep respect for Catholic traditions, Pope Stephen's papacy will likely emphasize continuity and stability, especially in the midst of increasing global crises. However, long-standing dedication to social cohesion, dialogue with the Eastern Churches, and the role of national identity in religion places him squarely as a Pope attuned to Europe's unique anxieties."
 vatican.6.a: "A new age for the Church."

 vatican.7.t: "Cardinal Robert Sarah Elected Pope Benedict XVII"
 vatican.7.d.1: "The bells of St. Peter's Basilica rang out in the Eternal City this morning, and white smoke billowed from the Sistine Chapel's chimney, signaling to the world that the conclave has concluded, and the College of Cardinals has elected the 267th Bishop of Rome. Cardinal Robert Sarah of Ghana has been elected to the throne of Saint Peter, taking the name Benedict XVII, and is the first Pope to hail from Africa in more than 1,500 years.\nIn his public address as Pontiff from the balcony of St. Peter's Basilica, the newly elected Pope delivered a stark message:\n\n\"The communist spectre now haunts every corner of the world. It is like a poison, that seeps into hearts and minds and rejects God and human dignity, embracing the things of this world. We must deliver the antidote: where those who love the things of this world spread their propaganda, we must proclaim the Gospel louder. This world does not need compromise, it needs courage.\"\n\nKnown for his vocal and unapologetic traditionalism and fierce opposition to modern secular culture and Islamic fundamentalism, Pope Benedict XVII is expected to usher in a rigorous and traditionalist era. His election signals a Church prepared to confront what he has called \"the collapse of the West\", both morally and spiritually."
 vatican.7.d.2: "The bells of St. Peter's Basilica rang out in the Eternal City this morning, and white smoke billowed from the Sistine Chapel's chimney, signaling to the world that the conclave has concluded, and the College of Cardinals has elected the 267th Bishop of Rome. Cardinal Robert Sarah of Ghana has been elected to the throne of Saint Peter, taking the name Benedict XVII, and is the first Pope to hail from Africa in more than 1,500 years.\nIn his public address as Pontiff from the balcony of St. Peter's Basilica, the newly elected Pope delivered a stark message:\n\n\"The spectre of communism has returned roaring. It conquers free and sovereign nations and preaches against God, cloaking persecution with justice, and tyranny with order. We now face a new, Sino-Russian Axis of Evil, where our Lord is banished and men made to kneel to the State. We will not be silent to them. If we must carry our Cross through Golgotha again, we shall eagerly do so.\"\n\nThe election of Benedict XVII -an unapologetic traditionalist- represents a Church ready to resist, to denounce, and to shepherd the faithful through what he has called a new \"age of wolves\"."
 vatican.7.a: "The Church Militant returns."

 vatican.8.t: "[THIS.GetAdjective] Pope Elected"
 vatican.8.d: "A cardinal from our nation has been elected the next pope!\nWe get cool bonuses and some influence over other countries Yay!"
 vatican.8.a: "Cool."


 ITA_sugli_alberi_le_foglie: "Sugli Alberi, Le Foglie"
 ITA_sugli_alberi_le_foglie_desc: "\n\n\n\n\n£GFX_ITA_sugli_alberi_le_foglie_category_banner\n\n\n\n\n\n\n\n                                                  SOLDATI\n                                               §gSi sta come\n                                                d'autunno\n                                               sugli alberi\n                                                  le foglie§!\n                                  -Giuseppe Ungaretti, L'Allegria\n\nRussia's sudden assault has shattered the old certainties of Europe.\nCities from the Baltic to the Black Sea burn, and every nation is forced to choose between retreat or resistance.\nItaly stands among those who §Ywill not yield§!.\n\nOur divisions, like autumn leaves, prepare to move across the old continent, aware that each step eastward may be their last."


l_english:
 #Focuses
 ITA_memento_audere_semper: "Memento Audere Semper"
 ITA_memento_audere_semper_desc: "The Cossack has once again come to drink the blood of Poland, of Europe!\nAnd today again, let his heart burn! The sons of Europe are ready.\nLet the invading dogs come forward, we are one people, bound by the same fate, forged by the same struggles!\nLet them come. We will drive the Cossack back toward the Urals!"
 ITA_eyes_in_the_skies: "Eyes in the Skies"
 ITA_eyes_in_the_skies_desc: "It's impossible to move an air force or a fleet without knowing where the enemy is. Eastern Europe will be equipped with a series of sensors, antennas, and radars to monitor enemy activity, and our aircraft will be responsible for patrolling the airspace along the front."
 ITA_expanded_mediterranean_doctrine: "Expanded Mediterranean Doctrine"
 ITA_expanded_mediterranean_doctrine_desc: "The Mediterranean is the cradle of Italian civilization and has always been a national ambition. The Italian fleet is conceived, organized, and designed for the Mediterranean, and the very nautical culture of our navy is geared toward controlling and patrolling our \"Mare Nostrum.\" It is our duty to ensure the safety of Europe's coasts and, if possible, to strike the bear whenever it dares to dive into the water."
 ITA_wings_over_the_horizon: "Wings Over the Horizon"
 ITA_wings_over_the_horizon_desc: "Aviation has always been the jewel in the crown of the Italian military, a true source of national pride throughout its history. Caporni, D'Annunzio, and Alessandro Marchetti are just some of the great names who sat behind Italy's wings, as designers, pilots, or simply as enthusiasts of flight. We will focus on improving, rethinking, and expanding Italian designs and deploying a vast fleet of aircraft to counter the enemy."
 ITA_venturing_in_the_big_blue: "Venturing in the Big Blue"
 ITA_venturing_in_the_big_blue_desc: "Volare oh, oh\nCantare oh, oh\nNel blu dipinto di blu\nFelice di stare lassù\nE volavo, volavo felice più in alto del sole\nEd ancora più su\nMentre il mondo pian piano spariva lontano laggiù\nUna musica dolce suonava soltanto per me"
 ITA_operation_nettuno: "OPERATION: §YNETTUNO§!"
 ITA_operation_nettuno_desc: "Codename Neptune is a large-scale operation to secure Russian ports, supply facilities, naval batteries, and beaches in preparation for a full-scale invasion. We'll strengthen NATO's position in the war and, with luck, capture strategic objectives critical to our allies' plans."
 ITA_operation_giove: "OPERATION: §YGIOVE§!"
 ITA_operation_giove_desc: "Codename Giove is a large-scale operation to secure Russian airfields, supply facilities, anti-aircraft guns, and communication routes in preparation for a large-scale invasion. We'll take control of key frontline locations and cut off the enemy army's essential supplies."
 ITA_new_supply_routes: "New Supply Routes"
 ITA_new_supply_routes_desc: "It's a priority to strengthen ports, airports, railways, and logistics lines on the front lines so we can deliver necessary supplies to those fighting on the front lines. We will secure new vehicles, advanced facilities, and privileged positions to deliver equipments to the soldiers."
 ITA_restore_compulsory_military_service: "Restore Compulsory Military Service"
 ITA_restore_compulsory_military_service_desc: "Suspended by Parliament in 2005, military service now returns as a necessity. Unpopular or not, we have no choice, the law was merely frozen, and its provisions were designed for quick reactivation, a convenience we will now make full use of."
 ITA_civil_industry_conversion_program: "Civil Industry Conversion Program"
 ITA_civil_industry_conversion_program_desc: "The Italian people stand ready to sacrifice comfort for the necessities of war.\nOur brothers at the front need weapons, ammunition, food, and all essential goods, everything we can produce.\nIndustrial conversion is not simply desirable; it is immediate and unavoidable.\nWe will meet this challenge with well-structured programs and strategic decisions."
 ITA_to_stand_as_one_nation: "To Stand as One Nation"
 ITA_to_stand_as_one_nation_desc: "When the survival of the nation is at stake, there is no time for petty political squabbles.\nA united government is required, one ready to implement the reforms that war demands. Left or right, we have brothers everywhere, for the enemy stands before us."
 ITA_well_be_back_before_you_know: "We'll be Back Before you Know"
 ITA_well_be_back_before_you_know_desc: "The shorter this war lasts, the sooner we may celebrate.\nWhen the body of the Nation moves as one, who can hope to stop it?\nThe Great Proletarian rises once more, its chimneys burning with renewed fervor.\nThis war must be finished, and we shall finish it.\nA call to a single people under a shared destiny: \"We will return!\"\n\nAnd we will return sooner than anyone thinks."
 ITA_operation_cerere: "OPERATION: §YCERERE§!"
 ITA_operation_cerere_desc: "Codename Cerere is the strategic plan drawn up by our generals for operations in Ukraine.\nGiven the battlefield conditions, the plan is designed to let us advance swiftly and with force, minimizing engagements and casualties while securing key strategic positions."
 ITA_break_the_eastern_wall: "Break the Eastern Wall"
 ITA_break_the_eastern_wall_desc: "The moment has come.\nWe strike relentlessly, no quarter, no hesitation.\nNow that we hold the initiative, we will not squander it.\nStrike, strike, strike, with all your strength and all your pain!\nStrike until victory is certain.\nIf our enemies held the advantage, they would do the same. Take the knife in your hand, and strike."
 ITA_ogni_lasciata_e_persa: "Ogni Lasciata è Persa"
 ITA_ogni_lasciata_e_persa_desc: "We will defend every position: every city, every district, every building.\nNot one meter of land to the invaders!\nNo hesitation: From hell, the only way is forward.\nMake them sweat for every stone, every crevice, every drop of river water, sons of Italy."
 ITA_chi_vincer_ci_puo: "Chi Vincer ci Può?"
 ITA_chi_vincer_ci_puo_desc: ""


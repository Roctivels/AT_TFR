 italy_ew_events.9.t: "The Disinterested and the Indifferent"
 italy_ew_events.9.d: "You wake in the middle of the night.\nFireworks still crackle beyond the window.\nYour partner lies beside you in bed, a book resting on their chest.\n\nYou've won.\n\nWell... won is a generous word.\n\nYou were never much interested in politics.\nIt sounds absurd to admit it in the middle of a war, but it's true.\nYour work is too essential to send you to the front.\nYour partner is the same.\nYour two children are still too young to hold a rifle.\n\nIt's not that the news doesn't stir something in you, it does, a little...\nBut in the end, what does it really change?\n\nWin or lose… you're a specialized technician.\nYou'll advance.\nYour life will go on.\nA war was never going to decide it, not for you.\n\nSo many things have happened.\nAnd yet, nothing has happened at all.\nYour disinterest proves it.\nYour indifference."
 italy_ew_events.9.a: "How sad."

 vatican.1.t: "The Passing of Pope Francis"
 vatican.1.d: "noo"
 vatican.1.a: "we lost a real one"

 vatican.2.t: "Death of Pope Francis"
 vatican.2.d: "VATICAN CITY (IO) - Pope Francis passed away at the age of 88 this morning, officially declared at 07:35am (GMT+2), leaving a legacy of advocacy for international peace and diplomacy, his famous meetings with the Ayatollah of Iran just the tip of the Iceburg for this mans work at the head of the Papacy.\n\nWhile Pope Francis has been a controversial figure among Catholics worldwide, none can deny that all of Catholica is mourning this day as the Vatican rings its bells. His at times reformist remarks drew critique from conservatives, but his concern for the environment and for the poor underlined his popularity among the masses of Europe and all of the Catholic world.\n\nIt was perhaps a miracle, that despite double pneumonia wrecking his lungs, he made it to St. Peters Square on Easter Sunday, just one last time, to bless hundreds and converse with the people, taking one last ride in the Popemobile. He would fall asleep and pass peacefully the very next day on Easter Monday.\n\nAs the first Jesuit and first Latin American Pope, he was also the first to be named after St. Francis of Assisi, a Saint known for Personal Simplicity and care for the sick and unfortunate. His death came from a lifelong battle with a Chronic Lung Disease, following medical struggles with his Colon in 21', a Hernia in 23', and since 22' repeated bouts of Bronchitis."
 vatican.2.a: "We extend our deepest condolences."


 GER_german_actions_in_nato_war: "§YUN COMMISSION§!: German Heroic Actions"
 GER_german_actions_in_nato_war_desc: "We will highlight the bravery of our German soldiers in liberating East Prussia from the Russian autocracy. This will reinforce our historical claim and rally public support, both at home and abroad."
 GER_denounce_un_history: "§YUN COMMISSION§!: Denounce UN History"
 GER_denounce_un_history_desc: "The UN's handling of past trust territories and interim administrations has been far from impartial. Exposing these failures will cast doubt on the legitimacy of the Commission and ensure Kaliningrad does not end in limbo."
 GER_denounce_polish_nationalism: "§YUN COMMISSION§!: Denounce Polish Nationalism"
 GER_denounce_polish_nationalism_desc: "Poland's claim to Kaliningrad is based on pre-Modern history, long before our current borders were drawn. Reviving such outdated justifications will only destabilize Eastern Europe. We must expose their argument as anachronistic and unfounded."
 GER_denounce_lithuanian_nationalism: "§YUN COMMISSION§!: Question the Lithuanian Government"
 GER_denounce_lithuanian_nationalism_desc: "Lithuania is a small state with very limited resources, yet it seeks to govern a key region far beyond its capacity. Kaliningrad's future cannot be entrusted to a country ill-equipped for this responsibility."
 GER_prop_up_kaliningrad_industry: "§YUN COMMISSION§!: Prop-up the Kaliningrad Industry"
 GER_prop_up_kaliningrad_industry_desc: "We will start a multi-billion Euro investment on Kaliningrad's industry and infrastructure. Investing in local industry will ensure soon-to-be Königsberg is reliant on the Vaterland."
 GER_denounce_german_history: "§YUN COMMISSION§!: Denounce German History"
 GER_denounce_german_history_desc: "Germany's claim to Kaliningrad is based on outdated revanchism. The Trust Territory will only be the first victim of the growing ambitions of a revanchist Germany. If Germany takes Kaliningrad, both Poland and Lithuania will be next."
 GER_set_up_humanitarian_efforts: "§YUN COMMISSION§!: Set up Humanitarian Efforts"
 GER_set_up_humanitarian_efforts_desc: "By providing aid to the people of the Trust Territory, we will build goodwill among the population and sway the Commission's opinion in our favor."
 

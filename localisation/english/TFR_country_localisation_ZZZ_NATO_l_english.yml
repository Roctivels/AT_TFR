 NATO_leadership_category: "NATO Leadership"
 NATO_leadership_category_desc: "With the United States in utter disarray we have been seemingly left to fend for ourselves. But fret not, as our alliance shall continue to grow and prosper in this new uncertain age!"
 NATO_kaliningrad_commission_category: "The Kaliningrad Commission"
 NATO_kaliningrad_commission_category_desc: "§4In order to succeed, we need to have more influence points than any other contender.§!\n\n                                §YCurrent Influence Distribution§!:\n\n\n\nWith our victory in the war against the Russians has come the historic opportunity to settle the Kaliningrad question once and for all. The modern region of Kaliningrad has been home to Germans, Lithuanians, and Poles ever since the Middle Ages, though it fell firmly under Prussian control following the Partitions of Poland. The USSR incorporated the Königsberg area of East Prussia after the Second World War as a Russian exclave, expelling some 100,000 Germans from the oblast. Ever since the fall of the USSR, the Kaliningrad Oblast has remained a heavily fortified nuclear bastion on our doorstep.\n\nBut now, with Russia expelled far away from Kaliningrad, the United Nations has established a Trust Territory over the former Oblast. The fate of the region will soon be decided by the Kaliningrad Commission, which will inevitably determine whether to grant sovereignty to Germany, Poland, or Lithuania. We must leverage every tool at our disposal to ensure that when the decision is made, the Kaliningrad Question falls in our favor."

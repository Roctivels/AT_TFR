 GER_annex_kaliningrad: "§YKÖNIGSBERG§!: Integrate Königsberg"
 GER_annex_kaliningrad_desc: "With the transition finished, the time has finally come for full integration. Königsberg will no longer be a trust territory. From now on, it will be an inseparable part of Germany."
 GER_establish_relief_programs: "§YKÖNIGSBERG§!: Establish Relief Programs"
 GER_establish_relief_programs_desc: "Our diplomatic efforts have secured permanent control over Königsberg, but the transition will be challenging; we must act swiftly to provide aid. By setting up relief programs, we will stabilize the region and win over the local population."
 GER_establish_administrations: "§YKÖNIGSBERG§!: Establish Internal Administrations"
 GER_establish_administrations_desc: "With Königsberg under our rightful control, we ought to set up our unique national governance structures, law enforcement, and essential services in the territory to ensure a smooth administration."
 GER_integrate_kaliningrad_industry: "§YKÖNIGSBERG§!: Integrate Königsberg Industry"
 GER_integrate_kaliningrad_industry_desc: "Königsberg's economy must be fully aligned with the national infrastructure. By integrating local industries, we will ensure long-term stability."
 
 NATO_commission_timer: "§YKALININGRAD COMMISSION HEARING§!"
 NATO_commission_timer_desc: "After a year of political maneuvering, diplomatic pressure, and massive investments, the Commission will finally issue its final verdict. The fate of Kaliningrad will soon be decided. Have our efforts been enough to secure control?"
 
 NATO_hold_major_cities: "§YVICTORY§!: Hold ST. PETERSBURG and ROSTOV-ON-DON"
 NATO_hold_major_cities_desc: "We have finally exhausted both Russia and ourselves. We most hold onto these cities before the Peace accords are signed. Expect one last push from Russia to drive us out of these cities."
 
 NATO_retake_major_cities: "§YDEFEAT§! RETAKE WARSAW AND BUDAPEST"
 NATO_retake_major_cities_desc: ""
 

 The_PRC_beijing_government_Leader_TXT_DESC: "From southern commercial hubs to northern industrial centers, a wave of unrest and protest has swept across China, undermining the central government's authority as public skepticism and internal divisions grow.\n\n§RRequires:§!\nEADI loses the Great Asian War."
 The_PRC_beijing_government_Leader_Huang_Ming_TXT: "§aHuang Ming§!"
 The_PRC_beijing_government_Leader_Huang_Ming_TXT_DESC: "Amid the chaos, General Huang Ming, Commander of the PLA's Central Theater Command, has emerged as the key figure. While announcing a full-scale lockdown in Beijing on national media, the PLA rapidly secured several critical government sites in the capital and extended its military control across North China.\n\nAlthough Beijing and the surrounding regions remain stable under PLA authority, the turmoil engulfing the rest of the country shows no sign of abating. Economic stagnation, shortages of goods, and failures in local governance have fueled widespread dissatisfaction. In the major cities, angry workers have taken to the streets; in rural areas, farmers and local militias are mobilizing; and even business leaders - seldom vocal - are openly challenging Beijing.\n\nWhether the PLA's iron-fisted approach will extinguish the flames or add fuel to the fire remains uncertain. What is clear is that China now stands at a historic crossroads, and martial law in North China has only granted the republic a brief reprieve.\n\nThe ideology is Military Junta.\n\n\n\n\n\n\n\n   £GFX_Huang_Ming\n\n\n\n\n\n\n\n\n-------------------------------------"

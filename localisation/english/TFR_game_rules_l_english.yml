 The_PRC_GAW_PRK_1_TXT: "@PRC §RChina and Korea as One§!"
 The_PRC_GAW_PRK_1_TXT_DESC: "North Korea changes its country name to the Korean Special Administrative Region.\n\n\n\n\n\n\n\n   £GFX_PRK_kim_jong_un\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_PRC_GAW_PRK_2_TXT: "@PRK §dOnly One Korea§!"
 The_PRC_GAW_PRK_2_TXT_DESC: "§d----------------------------------------------------------------\n\n\n\n\n\n\n\n                     £GFX_Kim_Jong_Un_Marshal\n\n\n\n\n\n\n\n\n\nAll officers and soldiers of our heroic Korean People's Army—every victory achieved on this land, every great accomplishment, bears the indelible imprint of our revolutionary armed forces' monumental contributions. These triumphs are deeply rooted in their sacrifices. Today, our military stands ready, fully prepared to confront any war. Whatever forces dare to seek military confrontation with the Democratic People's Republic of Korea shall be utterly annihilated.\n\nLong live our glorious motherland, the Democratic People's Republic of Korea!§!\n\n\n§R\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\n\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\n\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\n\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/§!"

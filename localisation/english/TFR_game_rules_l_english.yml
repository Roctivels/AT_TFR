 Taiwan_strait: "@PRC §RTaiwan§! §PWar§! @CHI"
 Taiwan_strait_TXT_DESC: "The outbreak of the American Civil War has triggered a global geopolitical reshuffling. With the bald eagle no longer dominating the Asia-Pacific, this presents the best opportunity for China's reunification. Such a chance is fleeting—seize the moment, or it will be lost forever."
 PRC_win_Taiwan_TXT: "@PRC §RPeople's Republic of China§! Victory"
 PRC_win_Taiwan_TXT_DESC: "Under the decisive leadership of President §RXi Jinping§!, the §RCentrist of the Chinese Communist Party§! invoked the spirit of Zheng Chenggong to mobilize the entire nation and exhaust all resources to win the Taiwan Strait conflict. By shattering the weakened First Island Chain, they have brought a definitive conclusion to the nearly eight-decade-long aspiration for cross-strait reunification, laying the foundation for future domestic reforms and a new chapter in the Asia-Pacific Cold War.\n\n\n\n\n\n\n\n   £GFX_PRC_xi_jinping_taiwan_win\n\n\n\n\n\n\n\n\n-------------------------------------"
 CHI_win_Taiwan_TXT: "@CHI §PRepublic Of China§! Victory"
 CHI_win_Taiwan_TXT_DESC: "The §RCentrist of the Chinese Communist Party§! launched a war in the Taiwan Strait in an attempt to unify the two sides. However, they became mired in a protracted conflict as Japan and other nations provided significant support to Taiwan, stalling the offensive. Ultimately, the mainland failed to achieve its objectives within the optimal window of opportunity, leading to widespread §Rpublic§! §ddiscontent§! and an eruption of §Csocial§! §tunrest§!. The §RCentrist faction§! suffered a devastating blow to its credibility, while Taiwan's government survived the ordeal. This failure is expected to trigger a political earthquake within the CCP, paving the way for dramatic domestic upheaval and solidifying the foundation for a prolonged Asia-Pacific Cold War."
 Taiwan_gov_fate: "@PRC §RTaiwan§! §PWar§! @CHI - Fate of Taiwanese Leaders"
 Taiwan_gov_fate_TXT_DESC: "As the Taiwan Strait War ends with wictor of Communist China, high officials as Tsai Ing-wen and Su Tseng-chang makes a last effort to preserve their last embers of democracy by trying to escape to Japan. However, such a trip will be extremely hazardous due to searches still being conducted by the PLA. Will fate smile upon those exiles, or will they fell into CHinese hands?"
 PRC_capture_Taiwan_gov_TXT: "@PRC Taiwan leaders captured"
 PRC_capture_Taiwan_gov_TXT_DESC: "Tsai Ing-wen and Su Tseng-chang are captured by the PLA on their way of escaping the warzone. They will be put to trial for their crimes of splitting the Chinese nation."
 CHI_nocapture_Taiwan_gov_TXT: "@CHI Taiwanese leaders escape"
 CHI_nocapture_Taiwan_gov_TXT_DESC: "Under the escort of Japanese submarines, Tsai Ing-wen and Su Tseng-chang manage to escape from the island. They will hide in Japan and seek revenge for the defeat in Taiwan."
 The_Great_Asian_War_Rule: "£GFX_EADI_logo §RThe Great§! §PAsian War§!£GFX_PDTO_logo"
 The_Great_Asian_War_Rule_TXT_DESC: "§gThe god prophesied to §WCroesus§! that if §Whe§! attacked the §RPersians§!, he would destroy §Ra great empire§!, advising him to ally with the mightiest among §Bthe§! §YGreeks§!. Overjoyed, §WCroesus§! believed he would surely crush §RCyrus's kingdom§!.\n\nYet, as the prophecy foretold, §Whe§! did destroy §Wa great empire§!—not §RCyrus's§!, but §Whis own§!.§!"
 The_Great_Asian_War_Rule_EADI_TXT: "£GFX_EADI_logo @PRC§RBe resolved to forget me§!"
 The_Great_Asian_War_Rule_EADI_TXT_DESC: "If you vow to marry none but me,\nthen in flames we'll meet our destiny.\nA lifetime spent waiting—such is the fee."
 The_Great_Asian_War_Rule_PDTO_TXT: "£GFX_PDTO_logo @JAP§PI'll fade from memory§!"
 The_Great_Asian_War_Rule_PDTO_TXT_DESC: "Forget the grudges between you and me—\nhow many times have the cherry blossoms bloomed?\nThat Tokyo trip already feels lifetimes away."

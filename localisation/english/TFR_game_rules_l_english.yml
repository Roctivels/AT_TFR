 The_APA_path_TXT_DESC: "Before clearing out the demons and monsters of California, the §AAmerican People's Liberation Army§! will be temporarily commanded by temporary leader §RMichael Prysner§!, after which a workers' congress will be convened to transfer power to a civilian government.\nThe ideology is §RRevolutionary Socialism§!.\n\n\n\n\n\n\n\n   £GFX_APA_michael_prysner\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_APA_path_1_TXT: "£GFX_TFR_game_rule_flag_APA_reunified_libertarian_socialist £GFX_APA_anarchist §GAnarchists§!"
 The_APA_path_1_TXT_DESC: "For too long, the name of socialism has been dragged through the mud by totalitarian dictators, state capitalists and opportunists. Yet with the §GAnarchist§! faction taking the lead of the government of the APLA, it seems that that day has finally come to an end. With the §GAnarchist§! at the helm of the revolution, revolutionary passion will rage on until all reaction is crushed under the boot of the masses. Every hierarchy must be destroyed before the revolution can be declared over, from the prison-industrial complex that has exploited Black America for trillions of dollars of profit, to the vertically organized workplaces that have led to soul crushing conditions in corporate America.\n\nHoping to sweep the state into the dustbin of history, each person will directly have a voice in government, finally creating a country of the people, by the people, and for the people.\n\nYet despite their fiery passion, the abolition of the state will not be easy. Due to the great variety of the anarchist movement, composed of everyone from traditional anarcho-communists to Sakists to cyber-nihilists, factionalism will persist to be a problem. If factionalism grows to be too much of a problem, then the radical Sakaists will seize the reins of power, possibly leading America into a much more turbulent future. Despite the hardships, there is no better time for the total revolution than now! Workers of the World, Unite!\n\nThe ideology is §tAnarcho-Communism§!.\n\n\n\n\n\n\n\n   £GFX_APA_mark_bray\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_APA_path_2_TXT: "£GFX_TFR_game_rule_flag_APA_reunified_social_democrat £GFX_APA_neosocialist §CNeosocialists§!"
 The_APA_path_2_TXT_DESC: "Unlike the young idealists who make up much of the APLA's rank and file, the §CNeosocialists§! know better than to believe that a stable America can be built on ideals, hopes and dreams alone. The nation stands battered by war, plagued by death and destruction that has never been witnessed by the people of America - her cities burned to the ground, her people starving and poor, and decades of cold war anticommunist propaganda ingrained into their minds. The idea that the old order can be simply discarded, its history ignored and rewritten, and its legacy forgotten is simply absurd. Instead, the §CNeosocialists§! argue that the new Socialist State be built upon the foundation set by the old United States. Deviating from typical leftist orthodoxy of the other factions, the §CNeosocialists§! see the only way for Socialism to survive is through reforming the old institutions, preserving the Bill of Rights, the Constitution and ideals of old America in order to keep the legacy of Republicanism in America alive.\n\nSocialism is not meant to be enforced with an iron fist, but rather through compassion, peace and mutual understanding. Lessons will be learned from Prague Spring and other Marxist-Humanist experiments of the past. The warm embrace of socialism will soon be felt from sea to shining sea!\n\nThe ideology is §sDemocratic Socialism§!.\n\n\n\n\n\n\n\n   £GFX_APA_julia_salazar\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_APA_path_3_TXT: "£GFX_TFR_game_rule_flag_APA_reunified_communist £GFX_APA_octoberist §OOctoberists§!"
 The_APA_path_3_TXT_DESC: "While the red flag of Socialism is lowered, for perhaps the final time in Moscow in 1991, the §OOctoberists§! will make sure that the flame of socialism will burn bright in the United States.  Following the legacy of their namesakes - the revolutionaries that fought within the October Revolution, the §OOctoberists§! will ensure that America will become a prosperous and sustainable socialist country with their economic focused agenda.\n\nConvinced that Economic Stagnation is one of the major factors for the fall of Socialism in the former Eastern Bloc, the §OOctoberists§! will make sure that the mistakes of the past are not repeated again. While the §OOctoberists§! focus heavily on winning over the support of the people through extensive welfare policies, worker ownership, and reconstruction, they are not hesitant to crack down on any counterrevolutionary opposition with the full might of the vanguard party and the dictatorship of the proletariat. While the economic transformation proposed by the §OOctoberists§! sounds ideal on paper, the road to socialism will be hard fought, with many barriers. Counterrevolutionary forces, a brain drain, and a decaying infrastructure will impede reconstruction.\n\nLike a red phoenix out of the ashes of the United States, the fires of socialism will never burn out under the helm of the §OOctoberists§!!\n\nThe ideology is §RRevolutionary Socialism§!.\n\n\n\n\n\n\n\n   £GFX_APA_gloria_la_riva\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_APA_path_4_TXT: "£GFX_TFR_game_rule_flag_APA_reunified_totalitarian_socialist £GFX_APA_jacobin §RJacobins§!"
 The_APA_path_4_TXT_DESC: "Like the Original §RJacobins§! in the §YFrench Revolution§!, the §RJacobins§! of the Second American Revolution embody the spirit of §RRevolution§! and §RPatriotism§! within the nation. Now in charge of the American People's Liberation Army, the §RJacobins§! seek to shape America to fit their vision - a Socialist, Civic Nationalist, and Revolutionary Society.\n\nThe Jacobin movement is not shy of violence and state control to achieve their vision, but centralizing and reshaping the diverse and incredily messy political landscape will not be easy. The more the public knows about our attempts to reshape the government, the higher the cost of reforming the government will be. At the same time, if the power of internal enemies grows to high, then we will surely face the threat of Counterrevolution. There are countless enemies - both foreign and domestic that threaten the power of Chairman Maupin. The Revolution must be protected, and the rivers of America will run red with the blood of the enemies of the Revolution.\n\nThe ideology is §tAn American Socialism§!.\n\n\n\n\n\n\n\n £GFX_APA_caleb_maupin\n\n\n\n\n\n\n\n\n-------------------------------------"

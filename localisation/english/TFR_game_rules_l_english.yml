 The_PRC_Post_GAW_Election_Chinese_Socialist_Democracy_4_TXT: "§gWang Yang's CPC(Oligarchists)§!"
 The_PRC_Post_GAW_Election_Chinese_Socialist_Democracy_4_TXT_DESC: "The elections were erased, and the indecisive Wang Yang failed to tame the corporate behemoth. The chairman, once at the forefront, became a puppet of the capitalists. The ideology is Corporatocracy.\n\n\n\n\n\n\n\n   £GFX_PRC_Wang_Yang_Post_Gaw\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_PRC_New_Left_path: "@PRC §tNew Left§! Path"
 The_PRC_New_Left_path_1_TXT: "§tRevolution of the 21st Century§!"
 The_PRC_New_Left_path_1_TXT_DESC: "China will innovatively develop Marxism and Mao Zedong Thought to align them with the social and economic conditions of the 21st-century socialist revolution. This will be done with greater clarity and commitment than the ideas of Deng and Xi."
 The_PRC_New_Left_path_2_TXT: "§dLegacy of Mao§!"
 The_PRC_New_Left_path_2_TXT_DESC: "Mao is the founder of the People's Republic of China and remains the most significant leader of the Communist Party of China. Although his legacy faced heavy criticism and alterations after his death, today we will revive Chairman Mao's ideals."

 The_Kazakhstan_Riots: "@KAZ Kazakh Riots"
 The_Kazakhstan_Riots_1_TXT: "§3Total De-Nazarbaevization§!"
 The_Kazakhstan_Riots_1_TXT_DESC: "The current president of Kazakhstan, §3Kasym-Jomart Tokayev§!, is not indifferent to the protests. He sides with the people and began purges against all §gold Nazarbayev apparatchiks§! who had long held power in their hands. §3Tokayev§! also decides to debunk the personality cult of Nazarbayev himself, who had ruled the country for more than 30 years. He recognizes that many of the decisions made by Nazarbayev were wrong. Large-scale democratic reforms and the drafting of a new constitution are announced.\n\nKazakhstan also expresses gratitude to @SOVRussia for its help in difficult times. As a sign of friendship and respect for the neighboring country, Kazakhstan decided to launch a new stage of economic integration between the two states. The Russo-Kazakh friendship is stronger than ever!\n\nThe ideology is §3Constitutionalism§!.\n\n\n\n\n\n\n\n   £GFX_KAZ_kassym_jomart_tokayev\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_Kazakhstan_Riots_2_TXT: "§gDe-Nazarbaevization§!"
 The_Kazakhstan_Riots_2_TXT_DESC: "The Protests in Kazakhstan are over. Authorities report the restoration of order in the country. 4,353 people injured, including 3,393 members of security agencies. 238 dead, including 19 police and military personnel, were taken to morgues.\n\nAs a result of these events, the country underwent changes in the government and political sphere. In particular, the prime minister, the secretary of state, the speaker of the lower house of parliament and half of the ministers were replaced. Nazarbayev also loses his position as leader of the ruling Nur Otan party, and §gTokayev§! takes his place. Also one of the results of the protests was a reduction in gas prices, which was the catalyst for the protests. Is this the start of something big, or will Kazakhstan not go for serious reforms and maintain the status quo? Time will tell.\n\nThe ideology is §gAnocracy§!.\n\n\n\n\n\n\n\n   £GFX_KAZ_kassym_jomart_tokayev\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_Kazakhstan_Riots_3_TXT: "§gNazarbaeva Coup§!"
 The_Kazakhstan_Riots_3_TXT_DESC: "During the protests in Kazakhstan, something incredible happens - a coup d'état. The §gKNB§! forces, led by Dariga Nazarbayeva, the eldest daughter of the country's former president, §gNursultan Nazarbayev§!, seize power in the country.\n\nThe Nazarbayev clan, which has held power in Kazakhstan for decades, is now in full control of the country. Dariga Nazarbayeva, who previously held high positions in the government and parliament, has now become a true autocrat. She fancies herself the Kazakh Catherine the Great and does not hide her ambitions. In her speeches, she promises to lead Kazakhstan to new heights and make it one of the world's leading powers.\n\nThe ideology is §gOligarchy§!.\n\n\n\n\n\n\n\n   £GFX_Dariga_Nazarbayeva\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_Kazakhstan_Riots_4_TXT: "§OLiberal Revolution§!"
 The_Kazakhstan_Riots_4_TXT_DESC: "Kazakhstan witnesses large-scale protests that lead to significant changes in the political life of the country. Many experts and observers call what is happening a liberal revolution, which leads to the coming to power of democratic forces. The main leaders of the protests are the §ODemocratic Choice of Kazakhstan§! and §OMukhtar Ablyazov§!, a former banker and businessman who was forced to leave the country in 2009 after a conflict with the government.\n\nDuring the protests, §OAblyazov§! returned to Kazakhstan and led a movement for democracy and freedom. After several days of mass protests, Kazakhstan's government was forced to resign. §OMukhtar Ablyazov§! became the country's new president, promising broad reforms and the creation of a democratic state.\n\nThe ideology is §OCentrism§!.\n\n\n\n\n\n\n\n   £GFX_Mukhtar_Ablyazov\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_Kazakhstan_Riots_5_TXT: "§tSocialist Revolution§!"
 The_Kazakhstan_Riots_5_TXT_DESC: "The protests in Kazakhstan saw what can be called a socialist revolution led by the §tSocialist Movement of Kazakhstan§! and §tAynur Kurmanov§!. Leftist forces in Kazakhstan united in the struggle for the rights of workers and the poor. The main leftist parties in Kazakhstan, including the Communist Party, the Nationwide Social Democratic Party, and the People's Party, were able to organize an unstable coalition that seized power in the country.\n\nThe new government promised radical democratic and social reforms to improve the lives of ordinary citizens. One of the first measures was an increase in wages and pensions, as well as free education and medicine for all citizens.\n\nThe ideology is §tDemocratic Socialism§!.\n\n\n\n\n\n\n\n   £GFX_Aynur_Kurmanov\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_Tokaev_HELP: "@KAZ@SOV Tokayev Pleads for Russian Aid"
 The_Tokaev_HELP_TXT_DESC: "In the aftermath of the anti-constitutional coup in Kazakhstan, where anti-Russian forces seize power. The legitimate president, Kasym-Jomart Tokayev, is brought to safety by Russian security services and is now in a temporary dacha in Orenburg. After several days of calm, he wrote a letter to the President of the Russian Federation begging for help in returning stability and lawful order to the Republic of Kazakhstan.\n\nThe first part of the letter is widely disseminated by the Russian media, but in the second part, which is closed to the public, Tokayev admits the fallacy of his multi-vector policy and offers significant concessions to Russia if it agrees to intervene. Among them, Tokayev even agreed to hold referendums on Russian accession in the territories of Northern Kazakhstan. Despite such generous Tokayev \"gifts,\" the final decision-making rests with the Russian government.\n\n§RRequires:§!\nTokayev steps down in Kazakhstan Riots."

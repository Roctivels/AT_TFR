 The_assassination_Penny_Wong: "@AST The Assassination of Penny Wong £GFX_TFR_game_rule_flag_AST_patriot"
 The_assassination_Penny_Wong_TXT_DESC: "Days after the defeat in the Taiwan War, former Foreign Minister and former Senate Opposition Leader Penny Wong, who has always advocated for peace, delivers a speech to the public about peacefully coexisting with China. Shortly after, she is shot at close range with a homemade pistol by an assailant. The Police, unable to find the suspect or the weapon immediately following the shooting, found Brett Contrail, a veteran of the war in Taiwan and founding member of the Australian Patriot Front, in a nearby coffee shop with his laptop. Brett, being a founding member of the group that styles itself after the Patriot Front that emerged at the start of the American Civil War, is known to local police for previous petty drug charges. After a brief and rushed search of his hard drive, he is found to have ''multiple files about creating homemade weaponry'', as well as a manifesto praising Thomas Rousseau. \n\nAlthough this case seems cut and dry, many publically have claimed that Australian Police have arrested the wrong man, citing the rushed nature of the search and his service for Australia in the recent war. With a jury already decided from rural citizens, the nation awaits their verdict.\n\nThe outcome of this case will indirectly reflect the current state of the country.\n\n§RRequires:§!\nPDTO loses the Taiwan War."
 The_assassination_Penny_Wong_Liberals_Party_TXT: "§YLiberal Party§!"
 The_assassination_Penny_Wong_Liberals_Party_TXT_DESC: "Even a jury composed of rural residents found Brett Contrail guilty of 2nd Degree Murder, showing that there is no place for extremism in Australia. The country smoothly transitions to elections after the defeat, and the §YLiberal Party§! wins a majority of seats.\nThe ideology is Classic Liberalism.\n\n\n\n\n\n\n\n   £GFX_Scott_Morrison\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_assassination_Penny_Wong_National_Party_TXT: "§3National Party§!"
 The_assassination_Penny_Wong_National_Party_TXT_DESC: "Even a jury composed of rural residents found Brett Contrail guilty of 2nd Degree Murder, showing that there is no place for extremism in Australia. The country smoothly transitions to elections after the defeat, and the §3National Party§! wins a majority of seats.\nThe ideology is Classical Conservatism."
 The_assassination_Penny_Wong_Military_Junta_TXT: "§aMilitary Junta§!"
 The_assassination_Penny_Wong_Military_Junta_TXT_DESC: "The jury found Brett Contrail guilty of possessing restricted Military files, neither a life sentence nor acquittal, a restless heart caught in between. Veterans march on Canberra and the §aDefense Forces§! seize power.\nThe ideology is Military Junta.\n\n\n\n\n\n\n\n   £GFX_AST_Ben_Roberts_Smith\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_assassination_Penny_Wong_Australia_First_TXT: "£GFX_TFR_game_rule_flag_AST_patriot  §8Australia First§!"
 The_assassination_Penny_Wong_Australia_First_TXT_DESC: "The jury found Brett Contrail not guilty, indicating that Australia is consumed by a desire for revenge. The §8Australia First Party§! marches on Canberra and successfully seize the state apparatus.\nThe country is renamed to the Australian State. The ideology is Ethnonationalism.\n\n\n\n\n\n\n\n   £GFX_AST_Jim_Saleam\n\n\n\n\n\n\n\n\n-------------------------------------"

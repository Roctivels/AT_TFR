 SUD_civil_war: "@SUD 2023 Sudanese Civil War Winner @RSF"
 SUD_civil_war_TXT_DESC: "In 2019, the @SUDSudanese Armed Forces and the @RSFRapid Support Forces jointly overthrew the regime of then-President Omar al-Bashir, forming a transitional government in alliance. However, deep divisions emerged between the two sides over key issues such as the integration of military forces, their roles within the national power structure, and the distribution of interests. Ultimately, the issue of military reform became the catalyst for civil war, with the Rapid Support Forces, unwilling to accept integration, firing the first shot. Within the country, various political parties, ethnic groups, and tribes aligned with different military leaders, while external forces fueled the conflict with money and arms. The two sides remain evenly matched, with ceasefire agreements rarely upheld, and no regard for the suffering of the people.\n\nStarvation and death plague the land..."

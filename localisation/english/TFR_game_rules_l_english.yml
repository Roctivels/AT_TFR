 The_PRC_GAW_Japan_1_TXT_DESC: "Dissolve Japan.\n\n§RRequires:§!\n§RCentrists§! or §dRevanchists§! come to power."
 The_PRC_GAW_Japan_2_TXT: "@JAP Rebuild Japan"
 The_PRC_GAW_Japan_2_TXT_DESC: "In the future, the People's Republic of Japan will be led by the Communist Party of Japan.\n\n§RRequires:§!\nChinese Revanchists path did not choose Rise of the Heavenly Empire."
 The_PRC_Revanchists_Path: "@PRC §dRevanch§!§Rists§! §8Path§!"
 The_PRC_Revanchists_Path_TXT_DESC: "Perpetrators always forget, but the wounded remember the pain forever.\n\n\n\n\n\n\n\n   £GFX_Zhang_Youxia\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_PRC_Revanchists_Path_Digital_Leninists_TXT: "§dKey to Omniscience and Omnipotence§!"
 The_PRC_Revanchists_Path_Digital_Leninists_TXT_DESC: "Every camera, every data processor, and every piece of information in this land is under our control. Those who think they can resist us, hiding in the shadows, believing their actions are undetected, are gravely mistaken. Every move they make, every word they speak, is already under our watchful eyes, leaving them nowhere to hide.They live not in darkness, but under a gaze beyond the reach of light.\n\nThe ideology is §dVanguard Socialism§!.\n\n\n\n\n\n\n\n   £GFX_PRC_Cheng_Wenqing\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_PRC_Revanchists_Path_Nationalists_TXT: "§dThe Fortress of Blood and Flesh§!"
 The_PRC_Revanchists_Path_Nationalists_TXT_DESC: "China has seen no shortage of foreign invaders. From the Mongols to the Japanese, our nation has been the eye candy of many aggressors. Yet why, in her 5000-year-long history, has China never been fully conquered? Why have the Chinese people always been able to overcome all invaders and retain their national identity? Because of the virtues of the Chinese people. This cultural creed is carved deep into their bones. It was the countless Chinese heroes who gave their lives to defend this land, which they hold dearest. This land, which they call home. Yue Fei, Dong Cunrui, and the countless nameless men and women who bled for this nation are what made us great, what made China what she is today.\n\nThe ideology is §dVanguard Socialism§!.\n\n\n\n\n\n\n\n   £GFX_PRC_chen_quanguo\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_PRC_Revanchists_Path_Militarists_TXT: "§RPillar of Crimson Sovereignty§!"
 The_PRC_Revanchists_Path_Militarists_TXT_DESC: "Wherever the Five-Star Red Flag flies, there is home. That red flag is not merely cloth - it is faith, it is will, it is a wall of conviction built with the blood and flesh of billions of Chinese sons and daughters. The era when we were called the \"Sick Man of East Asia\" has been buried by our own hands. The China that was butchered at will, humiliated by foreign powers, has long turned to ashes. Those who once groveled to the West with wagging tails - the spineless appeasers, the traitors who forgot their roots, the cultural slaves kneeling before foreign lands - have all been condemned by history.What stands here today is a new China forged from the blood of a hundred thousand youths, a crimson realm cast in iron will. Behind us flows the steel torrent of the people, the loyal souls of a billion hearts. Upon our shoulders rests the weight of millennia of civilization, the unfulfilled hopes of countless martyrs.We will make our enemies tremble, make Asia submit, and ensure that the future remembers:Red China shall never bow.\n\nThe ideology is §RLeft Wing Nationalism.§!\n\n\n\n\n\n\n\n   £GFX_Li_Zuocheng_general\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_PRC_Quanguo_Path: "@PRC §dQuanguo§! §8Path§!"
 The_PRC_Quanguo_Path_TXT_DESC: "§wAll within the Six Directions is the Emperor's land—\nWest beyond the shifting sands, south to the sunless homes,\nEast where the Eastern Sea ends, north past the Great Xia's domes.\nWherever human tread extends, none dare resist his hands.\nHis deeds outshine the Five Sovereigns; his grace touches beasts and fields.\nNone are left beyond his virtue; each dwells where peace congeals.\nMay this realm thrive eternal—ten thousand years, unbroken seals!§!\n\n\n\n\n\n\n\n   £GFX_PRC_chen_quanguo\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_PRC_Quanguo_Path_Communism_TXT: "£GFX_TFR_game_rule_flag_PRC_national_communist  §dEnduring Enterprise§!"
 The_PRC_Quanguo_Path_Communism_TXT_DESC: "Qin Shihuang was nothing. He only buried 460 scholars—we buried 46,000. When we suppressed counterrevolutionaries, did we not also eliminate some reactionary intellectuals? I've debated democrats: you call us Qin Shihuang? Wrong—we surpassed him a hundredfold. That we are called Qin Shihuang, that we are dictators—we’ve always admitted it. The pity is, you don’t say enough, often leaving us to add the rest. Too modest—how could it be just 100 times?\n\nThe nation is renamed to the £GFX_TFR_game_rule_flag_PRC_national_communist §dPeople's Revolutionary Republic of China§!.The ideology is §dNational-Communism§!.\n\n\n\n\n\n\n\n   £GFX_PRC_chen_quanguo_cool\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_PRC_Quanguo_Path_Exceptionalism_TXT: "£GFX_TFR_game_rule_flag_PRC_heavenly_republic  §8Eliminate the Heretical, Preserve the Orthodox§!"
 The_PRC_Quanguo_Path_Exceptionalism_TXT_DESC: "§wNothing is more revered among men than the Sovereign (Di), who is entrusted by Heaven—thus called the 'Supreme Sovereign' (Shangdi).§!\n\nThe nation is renamed to the £GFX_TFR_game_rule_flag_PRC_heavenly_republic §8People's Heavenly Republic§!. The ideology is §8Chinese Exceptionalism§!.\n\n\n\n\n\n\n\n   £GFX_PRC_chen_quanguo_cool\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_PRC_Quanguo_Path_Confucian_TXT: "£GFX_TFR_game_rule_flag_PRC_empire  §8Restore the Great Han Dynasty's Legacy§!"
 The_PRC_Quanguo_Path_Confucian_TXT_DESC: "§wThe Great Unity of the Spring and Autumn period is the constant principle of heaven and earth, the universal norm of past and present.§!\n\nThe nation is renamed to the £GFX_TFR_game_rule_flag_PRC_empire §8Chinese People's Empire§!. The ideology is §8Confucian Hyperconservatism§!.\n\n\n\n\n\n\n\n   £GFX_PRC_chen_quanguo_empire\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_PRC_Liberal_Progress_of_Reforms: "@PRC §CReformists§! Progress of Reforms"
 The_PRC_Liberal_Progress_of_Reforms_TXT_DESC: "When the AI chooses §CReformists§!, it keeps haphazardly selecting decisions that can permanently stagnate the Progress of Reforms and trigger national focus gridlock."
 The_PRC_Liberal_Progress_of_Reforms_1_TXT: "Progress of Reforms Sudden Increase"
 The_PRC_Liberal_Progress_of_Reforms_1_TXT_DESC: "Both the national policies of \"Unchain the People's Congress\" and \"Party of XXI Century\" will increase the Progress of Reforms to ensure the normal progression of the game."
 The_PRC_Fifth_Modernization: "@PRC §CFifth Modernization§!"
 The_PRC_Fifth_Modernization_TXT_DESC: "In the 1980s, college students who supported reform advocated that, in addition to the \"Four Modernizations\" policy aimed at strengthening the country's power, the \"Fifth Modernization\"-the modernization of the political system must not be neglected, and they called on the Party to launch a campaign of democratization. Although their efforts eventually failed, we will inherit the spirit and legacy they left behind. China's democracy movement will be reborn today!\n\n\n\n\n\n\n\n   £GFX_PRC_Wang_Yang2\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_PRC_Fifth_Modernization_1_TXT: "§CParty Platformism§!"
 The_PRC_Fifth_Modernization_1_TXT_DESC: "Contrary to the stereotype, the CPC has always strictly practiced \"democratic centralism\" as one of its core principles. Through effective democratic mechanisms, the CPC is able to defeat reactionaries and achieve victory in the revolution. However, due to political struggles after 1949 and the cult of personality surrounding the leader, this great tradition was gradually forgotten. Now, we will re-establish a reformed democratic mechanism within the Party. Since the CPC is the unquestionable centerpiece of Chinese politics, democracy within the Party means democracy in the nation."
 The_PRC_Fifth_Modernization_2_TXT: "§CChinese Socialist Democracy§!"
 The_PRC_Fifth_Modernization_2_TXT_DESC: "We have made the People's Congress the core of our democratic politics. Through the People's Congress, representatives can now meaningfully advocate for the democratic agenda in China's regular political activities. We will take the crucial step of empowering the democratic parties, which previously could only \"discuss politics\", to make a real difference through elections and public debate. Additionally, even within the CPC, party members will be allowed to voice their opinions. Thus begins a great experiment in democracy."
 The_PRC_Brand_New_Session_of_the_CPC: "@PRC Brand New Session of the §CCPC§!"
 The_PRC_Brand_New_Session_of_the_CPC_TXT_DESC: "\n\n§RRequires:§!\n§CFifth Modernization§! chose §CParty Platformism§!."

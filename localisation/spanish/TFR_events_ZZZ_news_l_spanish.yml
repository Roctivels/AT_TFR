 news.555.t: "[ATW.GetNameDefCap] conquista los ex-EE.UU."
 news.555.d: "Lo que antes se consideraba imposible se ha convertido en una cruda realidad. Según una declaración reciente de la División Atomwaffen, corroborada tras días de rigurosa verificación, todos los Gobiernos restantes que ejercían control sobre el territorio continental de los ex-Estados Unidos se han rendido a Atomwaffen o han sido liquidados. Este cambio ha impulsado a Atomwaffen, de un grupo extremista marginal en Florida, a la posición de autoridad dominante en medio de la desolación de los ex-Estados Unidos.\n\nEl conflicto que ha devastado el cadáver de los Estados Unidos, que parecía interminable, marcado por la caída de numerosas facciones y Gobiernos en un caos generalizado, ahora se silencia, interrumpido solo por las celebraciones de la División Atomwaffen. Observadores estadounidenses e internacionales permanecen en un silencio atónito al presenciar el surgimiento de una de las organizaciones más radicales de la historia, que asume el control de lo fue el país más fuerte del mundo. Este grupo ahora ostenta no solo un inmenso poder político, sino también algunas de las armas más avanzadas y destructivas jamás desarrolladas.\n\nEl futuro está envuelto en incertidumbre. Si bien Atomwaffen celebra, aún no ha emitido declaraciones formales sobre sus planes para el futuro. Dada su ideología extremista y acciones previas, se anticipa que Norteamérica, o lo que quede, se convertirá en su territorio, donde serán libres para imponer su voluntad. Se espera que la nación experimente un caos y violencia sin precedente, que podrían superar incluso los peores conflictos del mundo. La perspectiva de un futuro marcado por inestabilidad y sufrimiento se cierne en el horizonte, condenando potencialmente a la humanidad por completo."
 news.555.a: "El bastión de la libertad, muerto."
 news.555.b: "Se hará Su voluntad."
 news.556.t: "Disolución de Bélgica"
 news.556.d: "En un interesante acontecimiento, el anterior Gobierno belga anunció la disolución de Bélgica y la creación de dos nuevos Estados: Valonia, de mayoría francesa, y Flandes, de mayoría neerlandesa. La idea de esta decisión surgió durante el auge del COVID-19, lo que alimentó un descontento y un malestar contra el Gobierno sin precedentes.\n\nCon el tiempo, comenzaron a cobrar fuerza movimientos que pedían la disolución de Bélgica como Estado. Las protestas, las peticiones y la creciente autodeterminación impulsaron aún más la idea, hasta el punto de que el Gobierno tuvo que convocar un referendo ante la enorme presión. Finalmente, más del 68% de la población votó a favor de la disolución. Por lo tanto, se decidió disolver el Gobierno belga y permitir que las dos regiones se convirtieran en sus propios Estados. Bruselas, la antigua capital de Bélgica, ha quedado bajo el control de la Unión Europea y ha dejado de ser la capital de la UE tras negociaciones conjuntas entre el Gobierno belga, representantes de la UE y líderes clave del movimiento disolutorio, que acordaron mantenerla como tal.\n\nEntre otros acontecimientos, se espera que Países Bajos y Francia refuercen sus relaciones con los países recién creados, y algunos incluso predicen que ambas naciones podrían absorber o anexionarse sus respectivas ramificaciones sociales."
 news.556.a: "La bandera belga ondea por última vez."
 news.557.t: "Batalla del Palacio en Rusia"
 news.557.d: "Noticias asombrosas llegan del Imperio ruso. A juzgar por la información disponible para la comunidad internacional, el conflicto entre la nobleza y el emperador Rostislav I ha llegado a un punto crítico. Oficiales de la Ojrana leales al Consejo Supremo arrestaron al zar ruso y lo obligaron a aceptar un ultimátum, cuyos puntos principales eran la abdicación inmediata de Rostislav, así como la renuncia a cualquier pretensión al trono ruso en el futuro por parte del propio Rostislav o de sus descendientes. El zar aceptó las condiciones de los conspiradores a cambio de la vida de sus familiares y la suya propia.\n\nActualmente, el ex emperador se encuentra bajo arresto domiciliario, y los círculos aristocráticos se preparan para un nuevo Zemski Sobor."
 news.557.a: "Interesante."

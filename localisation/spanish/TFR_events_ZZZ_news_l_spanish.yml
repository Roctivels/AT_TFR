 news.112.t: "Fin de la guerra civil libia"
 news.112.d: "."
 news.112.o1: "¡Somos imparables!"
 news.112.o2: "Interesante"
 news.113.t: "Virus COVID-19"
 news.113.d: "La Organización Mundial de la Salud, en colaboración con el Partido Comunista de China, ha estado siguiendo de cerca el alarmante brote de un nuevo virus en la ciudad de Wuhan. Este repentino brote ha suscitado preocupaciones entre expertos en salud y líderes mundiales, en particular con el regreso de miles de ciudadanos chinos de vacaciones, lo que podría facilitar la propagación del virus a poblaciones extranjeras.\n\nA medida que la situación se ha agravado, los expertos han observado que el virus parece volverse más letal, con una tasa de mortalidad en aumento que ha alarmado a los funcionarios de salud pública de todo el mundo. Los informes indican que el virus no solo es altamente transmisible, sino que también muestra signos de mutaciones que pueden aumentar su virulencia. Esta preocupante tendencia ha llevado a intensificar el escrutinio y los esfuerzos de investigación destinados a comprender el comportamiento del virus y su posible impacto en la salud mundial.\n\nAyer, los temores que muchos habían albergado se confirmaron cuando la OMS declaró oficialmente que una pandemia ya no es una cuestión de \"si\" sino de \"cuándo\". Esta declaración marca un punto de inflexión crítico en la respuesta mundial al brote, y ha impulsado a las naciones de todo el mundo a tomar medidas urgentes para mitigar la crisis inminente. Los países ya están contando el número de ciudadanos infectados y los sistemas de atención de la salud se preparan para una afluencia de pacientes a medida que los casos siguen aumentando."
 news.113.o1: "Sin precedente."
 news.114.t: "Rebelión en Arabia Saudita"
 news.114.d: "El anuncio de hostilidades armadas en el Reino de Arabia Saudita tras la muerte del rey Salman al Saúd ha provocado una ola de repercusiones en la comunidad mundial. El régimen, uno de los más más opresivos del planeta, siempre ha estado plagado de corrupción, inestabilidad y conflictos religiosos entre la minoría chií y la mayoría sunita. Esas fracturas salieron a la luz hoy, cuando la Real Coalición Árabe, un gobierno de oposición al príncipe heredero Mohamed bin Salmán, lanzó una insurrección armada contra el Gobierno central saudita. La República Árabe, un movimiento liberal concentrado en el norte del país, también se rebeló, sumiendo al país en la anarquía total. Los precios del petróleo se dispararon más del 250%, sumiendo a la economía mundial en el caos, mientras que el mercado de valores se desplomó a mínimos históricos. El mundo contiene la respiración mientras la península arde en llamas."
 news.114.a: "¿El fin de la dinastía Saudita?"
 news.115.t: "El Congreso rechaza la diplomacia"
 news.115.d: "En lo que quizás sea el evento más trágico del siglo XXI, los dos Gobiernos de Denver y Washington D.C. se han negado a entablar conversaciones diplomáticas para llegar a una conclusión pacífica a la crisis que ha sacudido a Estados Unidos después de semanas de negociaciones infructuosas. Si bien tanto Trump como Biden anunciaron respectivamente que eran los líderes legítimos del país, han estallado combates esporádicos entre milicias a lo largo de la línea de alto el fuego temporal a lo largo de la frontera entre Illinois e Indiana. Se pueden ver columnas de humo saliendo de los rascacielos de Chicago mientras la milicia de Trump dispara ronda tras ronda en un intento de capturar la ciudad fronteriza, mientras que las milicias de Biden avanzan hacia la ciudad de Danville, Illinois.\n\nEn Denver, los informes han citado cómo camionetas traseras sin distintivos han estado sacando de las calles a activistas contra la guerra, mientras que las protestas a favor de Trump en los suburbios de Louisville han sido dispersadas por la fuerza por el Ejército Federal. Si bien el Gobierno de Trump ha tenido dificultades significativas para mantener el orden en las ciudades liberales, donde aún se producen disturbios, el control de facto de Biden no se extiende más allá de las carreteras y las ciudades, y las milicias clandestinas ya han comenzado a armarse y a realizar emboscadas a los convoyes del ejército. En hogares de todo Estados Unidos, las familias observan con horror cómo se desgarra el tejido mismo de la sociedad estadounidense. Mientras los hermanos se arman contra sus hermanos, es innegable que una Segunda Guerra Civil Americana ha comenzado."
 news.115.a: "Una vez más, hermanos contra hermanos."
 news.116.t: "La guerra civil siria termina"
 news.116.d: "El conflicto civil más representativo de la Primavera Árabe de 2011 finalmente ha llegado a su fin, ya que las últimas fuerzas islamistas en el noroeste de Siria, alrededor de la ciudad de Idlib, fueron derrotadas rotundamente por el Ejército Árabe Sirio durante la Batalla de Idlib, con las últimas fuerzas del Ejército Libre Sirio y de Jabhat Fateh al-Sham haciendo su última resistencia en el Ayuntamiento de Idlib. La batalla llegó a su fin cuando toda la ciudad fue rodeada y el ayuntamiento fue arrasado por bombardeos de mortero. Mientras el ejército sirio comienza a pacificar los focos de resistencia en la gobernación ahora recuperada, el Gobierno sirio ha anunciado el fin de la guerra civil y que Siria comenzará su recuperación y regreso a la prosperidad ahora que los grupos rebeldes apoyados por el extranjero están desorganizados. A pesar de su perspectiva optimista, la economía de Siria sigue en ruinas tras 10 años en guerra, y deberán lidiar con numerosos obstáculos, en particular numerosos grupos de bandidos e islamistas que aún libran campañas de guerrilla en todo el país."
 news.116.a: "Paz. ¿Pero a qué precio?"
 news.116.b: "¡Alá, Siria, Bashar!"
 news.117.t: "El Gobierno yemení se derrumba"
 news.117.d: "El Consejo Político Supremo ha confirmado que sus fuerzas han tomado la ciudad de Adén y han aceptado la capitulación del Gobierno pro-Hadi. En los últimos años, los combatientes hutíes han causado numerosas bajas a las unidades sauditas y, según estimaciones recientes, se han perdido tres brigadas enteras en las montañas de Yemen. Además de la disminución de los ataques aéreos sauditas, el Gobierno pro-Hadi se vio presionado por los constantes ataques hutíes y Adén cayó a pocas semanas de que se reanudaran las ofensivas."
 news.117.a: "¿Yemen verá finalmente la paz?"
 news.118.t: "Yemen del Sur se separa"
 news.118.d: "En una victoria decisiva, las fuerzas leales al Consejo de Transición del Sur han capturado Saná y Mukalla, consolidando su control sobre las ciudades clave de Yemen. Según se informa, los debilitados Gobiernos hutí y de Hadi han huido, lo que ha permitido al Consejo de Transición del Sur asegurar finalmente su ansiada independencia del Norte tras años de guerra civil.\n\nTras las victorias en el campo de batalla, los dirigentes del Sur ahora centran su atención en la reconstrucción y en fortalecer el Estado. La guerra ha dejado gran parte de la región, otrora estable, devastada, con la infraestructura en ruinas y la economía paralizada. Mientras el Sur emprende su propio camino, se enfrenta a la inmensa tarea de estabilizar y reconstruir sus territorios. Una vez más, Yemen se encuentra separado; y puede que esta vez de manera permanente."
 news.118.a: "¿Qué significará esto para Yemen?"
 news.119.t: "Extremistas islámicos toman La Meca"
 news.119.d: "El mundo islámico observa con horror cómo los informes procedentes de Arabia Saudita revelan que los extremistas yihadistas han atacado y tomado la ciudad de La Meca. La península arábiga ya se ha visto sumida en un estado de agitación sin precedentes como resultado de la guerra civil, pero parece que este nuevo acontecimiento pone la guinda a este trágico y tumultuoso pastel del conflicto. Cuando las fuerzas del Gobierno saudita se derrumbaron en su esfuerzo por mantener el orden en el país, los terroristas islamistas aprovecharon esta oportunidad y tomaron la ciudad de La Meca con sólo una resistencia menor de la policía y los restos de las fuerzas de seguridad que aún se encontraban en la zona.\n\nLos terroristas han declarado públicamente que la ciudad será sede de un nuevo \"califato\", además de llamar a otras células terroristas conectadas en Arabia Saudita a atacar y tomar otras ciudades importantes. Los principales grupos religiosos islámicos a nivel internacional han condenado la toma de la ciudad, y muchas críticas han fulminado a los insurgentes por \"deshonrar uno de los lugares más sagrados del islam\". Las fuerzas restantes del Gobierno saudita y las fuerzas armadas han prometido que se ocuparán rápidamente de cualquier grupo extremista que se atreva a continuar la lucha armada ilegal contra el Gobierno. Los ciudadanos musulmanes de todo el mundo están en estado de shock ante este descarado ataque a un lugar tan importante."
 news.119.a: "La tierra santa profanada."
 news.120.t: "Muere el rey saudita"
 news.120.d: "En un comunicado, el gobierno de Arabia Saudita ha anunciado el desafortunado e inesperado fallecimiento del gobernante del país, el rey Salman al Saúd, que ha sido el rey desde 2015. Aunque evitó indicar la razón exacta de su muerte, muchos rumores afirman que el rey ha estado enfermo de COVID-19 durante meses, por lo que no ha aparecido en público ni una sola vez este año.\n\nEsta es solo una tragedia en una ola de tragedias que azotó al Reino, junto con la pandemia mundial de coronavirus y la caída del petróleo. Y aunque Mohamed bin Salmán al Saúd fue juramentado rápidamente como sucesor, siendo el heredero legítimo, el nivel de sospecha política y división parece ser tan grande que muchos no pueden evitar ver una pizca de conspiración en este rápido desarrollo.\n\nMientras tanto, el país sigue siendo destrozado por las protestas como consecuencia de un colapso económico y social posterior con sentimientos radicales islámicos y republicanos que, según se informa, están aumentando. El Reino lleva ya algún tiempo al borde de una crisis fatal, y la repentina muerte del rey podría ser una prueba que no superará."
 news.120.a: "Envíen nuestras condolencias a los sauditas."
 news.121.t: "Los precios del petróleo se disparan"
 news.121.d: "El promedio industrial Dow Jones sufrió su peor caída en un solo día, rompiendo récords establecidos a principios de mes, ya que la inestabilidad en el Gobierno saudita sacudió a los inversores que ya estaban en pánico por la epidemia de coronavirus. El índice de primera línea se acercó al territorio bajista en medio de crecientes temores sobre una recesión global, cayendo un récord de 2.013,76 puntos, o 7,8%, para cerrar en 23.851,02. El Nasdaq cayó un 7,3% a 7.950,68. El índice S&P 500 perdió un 7,6% para cerrar en 2.746,56, su peor día desde diciembre de 2008.\n\nDespués de caer un 7% en los primeros minutos de la sesión de negociación, se activó un \"disyuntor\" de la Bolsa de Valores de Nueva York que detuvo las operaciones durante 15 minutos. El lunes marcó la primera vez que la restricción comercial entró en vigor desde que se implementaron los umbrales actuales en 2013 para evitar una repetición del colapso del \"Lunes Negro\" de 1987. El precio del petróleo se disparó a 117,14 dólares estadounidenses por barril debido a que las interrupciones en Arabia Saudita detuvieron la producción. Mientras los yacimientos petrolíferos sauditas se paralizan y otros países luchan por mantener la producción en medio de cierres y escasez de trabajadores, parece que un período de recesión es casi seguro."
 news.121.a: "Oh, Dios mío."
 news.121.b: "Sí, que te jodan a ti también."
 news.122.t: "Kim Jong-un ha muerto"
 news.122.d: "El líder norcoreano falleció esta mañana tras sufrir complicaciones durante una operación. Mientras la nación llora unánimemente la pérdida de su hijo sagrado, los problemas han llegado al círculo íntimo del reino ermitaño. Kim Yo-jong, inteligente, ambiciosa y partidaria de la línea dura del juche, ha tomado la decisión previsible de ocupar el vacío de poder dejado por la prematura muerte de su hermano. La maquinaria propagandística norcoreana ya ha empezado a incorporarla a la imagen popular como la nueva encarnación de la raza coreana, sin embargo, conspiradores y cortesanos ávidos de poder planean en la sombra apoderarse del \"trono rojo\". Entre estos posibles usurpadores, los presuntos actores clave son el hombre fuerte militar Pak Jong-chon, jefe del Estado Mayor del Ejército Popular de Corea, que podría utilizar el puño de hierro del ejército norcoreano para abrirse paso a la fuerza hasta el poder, y el suegro reformista de Kim Yo-jon, Choe Ryon-hae, primer vicepresidente del Partido del Trabajo de Corea, cuyo inmenso capital político puede ser suficiente para establecer una base de poder lo suficientemente fuerte como para consolidarse como el nuevo presidente de la RPD de Corea. Mientras estos elementos políticos chocan, el destino del esquivo Estado norcoreano pende de un hilo."
 news.122.a: "¿Cómo se las arreglarán los norcoreanos?"
 news.122.b: "Adiós, querido líder."
 news.123.t: "Guerra civil norcoreana"
 news.123.d: ""
 news.123.a: "¿El fin de Corea del Norte?"
 news.124.t: "Riad gana la guerra civil saudita"
 news.124.d: "Tras años de sangriento conflicto y guerra implacable en las ondulantes colinas desérticas y las bulliciosas ciudades de Arabia Saudita, con innumerables bombas y artillería devastando el país, el príncipe heredero Mohamed bin Salmán ha reunificado el reino fracturado.\nEsta esperada resolución trae alivio a gran parte del mundo, ya que el espectro de una guerra civil interminable en Arabia finalmente se ha disipado. Con la paz restaurada en lo que una vez fue el campo de batalla más importante del planeta, la atención ahora puede centrarse en la monumental tarea de reconstruir la nación devastada por la guerra.\n\nLa reconciliación con las regiones que resistieron al régimen de Salmán sigue siendo un desafío importante. Sin embargo, el progreso, aunque lento y laborioso, se está consolidando a nivel local. Y a pesar de las tensiones globales en todo el mundo con guerras por doquier, en una muestra de unidad, la ONU ha aprobado por unanimidad una resolución para patrocinar aún más los esfuerzos de reconstrucción, contribuyendo a la situación que ya está mejorando.\n\nPor primera vez en años, el mundo puede apartar su mirada inquieta de la península arábiga, a medida que comienza a regresar una sensación de normalidad."
 news.124.a: "El petróleo vuelve a fluir."
 news.124.b: "¡Somos imparables!"
 news.125.t: "La Coalición Real gana la guerra civil"
 news.125.d: "El fuego se ha extendido por la península arábiga, con el fin de la guerra civil saudita, y parece que al Saúd, la Coalición Real y sus aliados han salido victoriosos. La guerra sacudió la economía mundial y sus ecos propagaron el fuego por todo el mundo, pero hasta ahora, nada ha cambiado en la región, salvo que ahora el polvo se ha asentado sobre una nueva tumba.\n\nAllahu akbar, Allahu akbar, Allahu akbar, \"Dios es grande\", proclamaban las mezquitas de la península, al menos las que no habían sido alcanzadas por las balas ni las bombas. Algunos salieron a saludar a los vencedores en las calles, otros se sometieron, otros contemplaron los desfiles en Riad con tristeza.\n\nPero al vencedor le corresponde el botín, y el rey de Arabia Saudita proclamó su victoria, decretada por Dios mismo para el único custodio de La Meca, y quizás la hegemonía de un nuevo mundo árabe.\n\nLa alegría y el dolor ahora comparten las mismas calles. A la sombra de las banderas y las celebraciones, al pueblo de Arabia Saudita se le dice que pueden pasar a una nueva página, aunque algunos recuerdan cómo era la anterior..."
 news.125.a: "Bien por ellos."
 news.125.b: "Consideramos que lo que nos parecía correcto."
 news.126.t: "Elecciones libres celebradas en Arabia"
 news.126.d: "Por primera vez en su historia moderna, la República Árabe (antes Arabia Saudita) ha celebrado elecciones multipartidistas con supervisión internacional. Tras la victoria de la Coalición Republicana en la guerra civil, una carta de transición allanó el camino para la votación abierta en las principales ciudades y regiones aún en reconstrucción.\n\nEl Partido de Agrupación Nacional, un movimiento nacional-liberal liderado por el veterano activista Yahya Assiri, emergió como la mayor fuerza en la nueva legislatura. Si bien ningún partido obtuvo una mayoría absoluta, las primeras señales apuntan a una coalición reformista centrada en la gobernanza civil, la reconstrucción económica y la liberalización política gradual.\n\nLa participación fue mayor en las zonas urbanas y costeras, con una participación menor en las provincias rurales. Observadores independientes informaron de un proceso pacífico con solo pequeñas irregularidades.\nLos Gobiernos extranjeros han recibido el resultado con cautela, calificándolo como un paso hacia la estabilidad a largo plazo."
 news.126.a: "Bien por ellos."
 news.126.b: "¡Por una igualdad eterna!"
 news.127.t: "Arabia Saudita unida por yihadistas"
 news.127.d: "Cuando Arabia Saudita se desintegró, la mayoría asumió que los príncipes de la Real Coalición Árabe, el Gobierno del Reino de Arabia Saudita o incluso los reformistas de la República Árabe saldrían victoriosos de la guerra civil. Pero incluso con el apoyo de numerosas naciones extranjeras, los miles de millones pagados a ejércitos mercenarios y las grandes armerías que antaño sirvieron como columna vertebral del ejército saudita, se ha demostrado que, contra todo pronóstico, la voluntad pura y el fuego del odio pueden con todo.\n\nPara sorpresa de muchos, se ha confirmado que los yihadistas del \"Ejército de la Conquista\" han logrado una victoria decisiva sobre todas las facciones en el conflicto y han declarado su dominio y victoria en la guerra civil. Ahora, el mundo se enfrenta a una realidad sin precedentes: dos regímenes que abiertamente albergan organizaciones terroristas, ninguno de los cuales está plenamente alineado, pero ambos contribuyen a una peligrosa escalada de la inestabilidad global. Las implicaciones son graves, y muchos países se preparan para un fuerte aumento en el terrorismo al implementar cierres de fronteras, reforzar medidas de seguridad y poner a las tropas en alerta máxima.\n\nA medida que se calma la situación y se descubren las consecuencias, el resto de Medio Oriente se encuentra sumido en la incertidumbre, luchando por asegurar la estabilidad que aún resta. Mientras tanto, las principales potencias, reacias o no preparadas para intervenir, aún no han tomado medidas para abordar la situación; si es que planean intervenir sigue siendo una incógnita."
 news.127.a: "Un rostro sombrío vuelve en Medio Oriente..."
 news.127.b: "¡Allahu akhbar!"
 news.128.t: "Milicias iraníes ganan la guerra civil saudita"
 news.128.d: "Tras un largo periodo de largas campañas, asedios destructivos, hambrunas y otros horrores de la guerra moderna, hoy se conmemora el fin de la guerra civil saudita. El último contendiente para la antigua nación petrolera es Hezbolá al-Hejaz, liderado por Ahmed Ibrahim al-Mughassil.\n\nLa facción, que en su día era una coalición informal de milicias chiítas y unidades desertoras del ejército, se vio rápidamente reforzada por una avalancha de material y voluntarios tras asegurar las rutas de suministro entre Irán y sus diversos grupos aliados, ya fueran los chiítas del sur de Irak, el grueso de las fuerzas de Hezbolá o las unidades del CGRI. Todos ellos se convirtieron rápidamente en pilares para el dominio de las facciones en la región.\n\nAhora, con el control y el poder desde Riad, muchos observadores internacionales y centros de estudios parten de la premisa, bastante obvia, de que la facción recibirá mucha ayuda para la reconstrucción desde Irán, junto con el repunte de los esfuerzos subversivos de Teherán en Medio Oriente, que ha convertido a su principal enemigo y rival en su mayor aliado en la región. Algo de esto ya lo estamos viendo, con una misión diplomática programada entre Teherán y Riad próximamente."
 news.128.a: "Mientras el sufrimiento haya acabado..."
 news.128.b: "¡Allahu akhbar!"
 news.129.t: "Vladímir Putin ha muerto"
 news.129.d: "Tras haberse alejado del centro de atención desde que le diagnosticaron el COVID-19, los medios estatales rusos habían estado alimentando la idea de que Putin se encontraba en excelente forma y se recuperaba. Sin embargo, esta mañana, el Kremlin anunció que Putin, el arquitecto de la Rusia moderna, había sucumbido a la enfermedad, falleciendo a las 4:36 de la mañana, hora de Moscú.\n\nLa noticia se extendió como la pólvora, y los rusos de toda la Federación expresaron sus condolencias al difunto líder, quien, aunque ampliamente considerado como un déspota autócrata en Occidente, el pueblo ruso lo veneraba hasta casi convertirlo en un dios. Se anunció una semana nacional de luto, y Medvédev declaró que la muerte de su mentor y amigo de toda la vida \"me apuñaló en el corazón como una daga, como sentiría cualquier ruso con alma\".\n\nMientras muchos lloran en toda la Federación, la incertidumbre también se ha apoderado de ella. Aunque Medvédev está a punto de suceder a Putin, queda por ver si Rusia Unida, con su historial de manipulación del proceso electoral a su favor, puede seguir siendo el partido dominante que ha sido sin su querido padrino al mando, ya que muchos sospechan que perderá en las próximas elecciones presidenciales."
 news.129.a: "Interesante..."
 news.129.b: "Descansa en paz, camarada."
 news.130.t: "Declaración del Estado Eurasiático"
 news.130.d: "Tras asegurar el control y restablecer el orden en toda Rusia, Aleksandr Duguin pronunció un discurso declarando el Estado Eurasiático con la ambición de expandir sus fronteras pronto. Los manifestantes llegaron inevitablemente al discurso, y los simpatizantes del Partido Eurasia se enfrentaron en una trifulca a tres bandas, a la que también se sumó la policía. Se reportaron 30 muertos y cientos de heridos."
 news.130.a: "Un comienzo sangriento."
 news.130.b: "¡Un nuevo feriado!"
 news.131.t: "Acuerdo de paz entre EE.UU. y los talibanes"
 news.131.d: "Después de 18 meses de negociaciones, el Representante Especial de EE.UU., Zalmay Khalilzad, y Mullah Abdul Ghani Baradar, líder talibán, firmaron un acuerdo en Doha, Catar. Este acuerdo establece que EE.UU. retirará todas sus fuerzas militares y civiles en un plazo de siete meses. La reducción comenzará con un descenso a 5.000 tropas en los primeros 100 días y la salida de las fuerzas de cinco bases, mientras que el resto se retirará posteriormente. Además, el gobierno afgano liberará hasta 5.000 prisioneros talibanes a cambio de 1.000 miembros de las fuerzas de seguridad afganas en manos de los talibanes. Los talibanes también se comprometieron a dejar de apoyar a grupos como al-Qaeda y el Dáesh, aunque hay dudas sobre si podrán cumplir este compromiso.\n\nEn casi 18 años de conflicto, más de 2.400 estadounidenses han fallecido, y EE.UU. ha gastado cerca de un billón de dólares. A pesar de un aumento de tropas, las fuerzas talibanes han avanzado, resultando en un estancamiento. Además, el gobierno afgano empezará negociaciones con los talibanes para definir su papel en el futuro de Afganistán, buscando un alto el fuego duradero. Estas conversaciones iniciarán el mes próximo."
 news.131.a: "Bien por ellos."
 news.131.b: "¡Paz, por fin!"
 news.131.c: "Deberían haber aprendido de nuestro error..."
 news.132.t: "La Policía de Nueva York recupera el control de la ciudad."
 news.132.d: "El Departamento de Policía de Nueva York ha confirmado que ha recuperado el control total de la ciudad. El Gobierno de la ciudad, que estaba bajo la administración del Partido Comunista de EE.UU., fue derrocado prácticamente de la noche a la mañana. Decenas de miembros del partido comunista fueron encontrados muertos en sus casas durante tres semanas, lo que provocó un colapso en la comunicación efectiva con el partido y la milicia. La policía rápidamente recuperó la ciudad y comenzó a arrestar a miles de milicianos comunistas y a ocupar edificios clave. Se extendieron rápidamente rumores de que familias de la mafia local de Nueva York estaban involucradas; líderes del partido comunista han sido trasladados por la ciudad a zonas no reveladas, y se desconoce el paradero de Joe Sims, ahora exsecretario general del Partido Comunista de EE.UU. Se le da por muerto junto con todos los miembros de alto rango del partido."
 news.132.a: "Supongo que fueron malos para el negocio..."
 news.132.b: "Un revés para la revolución."
 news.133.t: "Donald Trump gana la Guerra Civil estadounidense"
 news.133.d: "Hoy, en la Rosaleda de la Casa Blanca, Donald Trump anunció a todo Estados Unidos la capitulación de las fuerzas restantes que se oponían a su presidencia. Tras jurar el cargo tras este anuncio, su discurso inaugural apenas logró calmar las tensiones que aún infestaban la psique estadounidense.\n\nRodeado de sus asesores más cercanos y del alto mando militar, el presidente anunció tanto a Estados Unidos como al mundo: \"Hoy, tras una larga y cruenta batalla, la democracia ha triunfado una vez más. Los matones descerebrados de Antifa y otras facciones radicales de la izquierda intentaron robar estas elecciones. Sin embargo, afortunadamente no lo lograron. Agradezco a los valientes gobernadores estatales por defender la Constitución y agradezco a todos los ciudadanos americanos por armarse contra esta amenaza y defender la democracia. Mi administración legítima ha comenzado a trabajar para garantizar que América nunca vuelva a estar dividida. Que Dios nos bendiga a todos. Que Dios bendiga a América\".\n\nCon el presidente Trump ahora centrado en reconstruir su país fracturado, la comunidad internacional observa a un Estados Unidos debilitado y ve que, por primera vez en casi un siglo, Estados Unidos ya no es la hegemonía global en el escenario mundial, lo que lleva a muchos a preguntarse quién será su sucesor."
 news.133.a: "El fin de la locura."
 news.133.b: "Nunca más dañarán a América."
 news.134.t: "La Unión gana la Guerra Civil estadounidense"
 news.134.d: "\"En la belleza de los lirios, Cristo nació al otro lado del mar. Con una gloria en su seno que nos transfigura a ti y a mí. Así como murió para santificar a los hombres, muera para hacerlos libres, mientras Dios sigue adelante\". Son las palabras que se cantan hoy en Estados Unidos, mientras los golpes de gracia definitivos contra las filas traidoras a nivel nacional finalmente han sucumbido a la lucha por la liberación, con esa América verdaderamente libre. El presidente Joseph Robinette Biden Jr., quien una vez fue cuestionado al seguir los pasos de una América enferma y herida, considerado una simple figura decorativa o una persona de pura división, demostró que todos los que alguna vez calcularon mal sus esfuerzos estaban equivocados, al reunificar la nación con sus propias manos, conteniendo el dolor y la tristeza con los que todos los estadounidenses llegaron a estar vinculados, pero comprendió hasta el mismo día en que la unificación había derramado su gracia sobre la nación. Ahora, al igual que Lincoln o Roosevelt, recibió el deber de verdaderamente remodelar y transformar a Estados Unidos en una máquina de gloria, libre ya del miedo y el odio a su imagen."
 news.134.a: "Un nuevo rostro entra en la Casa Blanca."
 news.134.b: "Mantendremos la fe y avanzaremos unidos."
 news.135.t: "Gloria la Riva gana la Guerra Civil Americana"
 news.135.d: "Mientras la antigua capital de Estados Unidos seguía ardiendo desde los últimos días de la guerra civil, Gloria La Riva y sus \"camaradas\" avanzaron hacia la Casa Blanca, solo para encontrarla destruida, con la emblemática bandera estadounidense del edificio reducida a cenizas. Mientras su Guardia Roja comenzaba a reunirse frente a la destruida Casa Blanca, la nueva premier de América comenzó su primer discurso a sus leales seguidores. \"Camaradas, ¡hoy marca el fin de la revolución proletaria en América! Las decadentes fuerzas fascistas y capitalistas de Donald Trump y Joseph Biden han sido destruidas y su legado, manchado. Agradezco a nuestros camaradas de todo Estados Unidos por su apoyo en la lucha contra el fascismo dondequiera que se encontrara. Sin embargo, ahora es el momento de la unidad, ahora es el momento de superar los males de Donald Trump y el capitalismo, ahora es el momento de reparar nuestra nación fracturada y construir una América que funcione para todos\". Con la victoria de la premier en esta guerra, Norteamérica comenzará a reestructurar sus diversas instituciones democráticas, reemplazándolas por una nueva Norteamérica socialista que buscará abordar las diversas injusticias que han plagado al país desde su creación hace tres siglos. Sin embargo, con el control total de La Riva sobre Norteamérica, muchos se preguntan si este es el comienzo de una Norteamérica igualitaria o el inicio de la caída hacia el totalitarismo."
 news.135.a: "Un desenlace preocupante para Norteamérica."
 news.135.b: "¡Solidaridad por siempre!"
 news.137.t: "La presidencia de Hillary Clinton"
 news.137.d: ""
 news.137.a: "Una mujer en la Casa Blanca..."
 news.138.t: "El Tercer Mandato"
 news.138.d: ""
 news.138.a: "El fin de una era..."
 news.139.t: "¡La R.P. China Invade Taiwán!"
 news.139.d: "La cuarta crisis del estrecho de Taiwán se ha convertido en un conflicto total entre la República Popular China y la República de China en la isla de Taiwán, reiniciando la guerra civil china que había terminado con el exilio del Kuomintang al otro lado del estrecho de Taiwán. Cientos de aviones de combate han comenzado a sobrevolar la isla, enzarzándose en combates a cara de perro, mientras que toda la Armada china se ha movilizado, con informes de los primeros desembarcos en las costas de Taiwán, las islas Lienchiang y enfrentamientos navales inmediatos entre la Armada de la R.P. China y la de la República de China. La República de China ha entrado en plena movilización y se ha declarado la ley marcial en todo Taiwán, mientras las últimas fuerzas de la antigua República de China se preparan para sobrevivir frente al coloso del PCCh, con avistamientos de lanchas de desembarco chinas cruzando ya el estrecho hacia Taiwán, según han informado los guardacostas."
 news.139.a: "El enfrentamiento final."
 news.140.t: "Escaramuzas en el Alto Karabaj"
 news.140.d: "Hoy se han producido en el Alto Karabaj una serie de enfrentamientos de alta intensidad que no se veían desde 2016, tras una ofensiva militar azerbaiyana a lo largo de la línea de contacto establecida en 1991, que dio lugar a la captura de Fuzuli y varias ciudades fronterizas. En esta ofensiva se utilizaron formaciones blindadas, así como drones suministrados a Azerbaiyán por traficantes de armas turcos e israelíes. Armenia ya ha enviado un llamamiento a las Naciones Unidas y a la Organización del Tratado de Seguridad Colectiva, aunque sus peticiones no han sido escuchadas por Moscú, que ha tenido que valerse por sí misma. Stepanakert, la capital de la República de Artsaj, un Estado separatista no reconocido establecido en 1988 durante la primera guerra del Alto Karabaj, ha sido objeto de bombardeos azeríes y ataques con drones. También han llegado mercenarios sirios para ayudar a Azerbaiyán, en su mayoría de la División Hamza pro-turca originaria del noreste.\n\nAunque la mayoría de los medios de comunicación del mundo occidental no lo han cubierto, otro conflicto entre estos dos países se ha estado gestando desde el final de la primera guerra del Alto Karabaj, que terminó con la victoria armenia y el establecimiento de la República de Artsaj por parte de la diáspora armenia en la región. Es probable que Azerbaiyán salga victorioso, debido al reacondicionamiento y la reforma de sus Fuerzas Armadas con sistemas de armas israelíes y turcos, como el VANTC Bayraktar, y asesores militares."
 news.140.a: "Oremos por una resolución pacífica."
 news.141.t: "Protestas pro-democráticas sacuden a Rusia"
 news.141.d: "La agitación sacude hoy a Rusia, con una multitudinaria cantidad de protestas en las principales ciudades rusas, incluida la capital, Moscú. Lideradas por el activista anticorrupción Alekséi Navalni, las protestas consisten en una coalición de reformistas de mentalidad liberal, estudiantes, profesionales urbanos y otros que se han unido en oposición a la administración de Putin. Los activistas piden una mayor transparencia gubernamental, una renovada lucha contra la corrupción, exigen una reducción de la mano dura de la policía y reformas democráticas liberales relacionadas. Las fuerzas de seguridad rusas han respondido de su manera habitual, con muchos arrestos y el uso de la fuerza contra los manifestantes. El Kremlin y otras instituciones estatales no han hecho comentarios importantes, salvo unos pocos representantes en la Duma que condenaron las protestas por estar \"respaldadas por la inteligencia occidental y otros traidores\".\n\nLos funcionarios de la OTAN y de los EE.UU. han denunciado oficialmente la respuesta del Gobierno ruso como represiva y violentamente autocrática. Muchos analistas en Occidente han expresado optimismo por los continuos esfuerzos de los activistas pro democracia en Rusia, pero muchos apuntan a que la consolidación del poder que Putin, su partido y las fuerzas de seguridad tienen sobre el Estado ruso hará que un cambio significativo sea casi imposible."
 news.141.a: "Interesante."
 news.142.t: "Ataques islamistas en Francia y Austria"
 news.142.d: "Europa Occidental está de luto hoy, ya que los terroristas islamistas atacan las principales ciudades de Francia y Austria. En las últimas veinticuatro horas, la policía metropolitana de París, Marsella, Lyon y Viena ha informado de múltiples atentados con bombas en lugares destacados del centro de la ciudad. Las fuerzas de seguridad francesas y austriacas calculan que las víctimas ascienden a cientos, lo que convierte a los ataques de ayer en uno de los más letales de la historia moderna de Europa. Las investigaciones a gran escala que se están llevando a cabo actualmente sobre los autores han descubierto que son inmigrantes árabes recientes que han sido radicalizados por grupos terroristas que operan en Medio Oriente o han sido reclutados directamente por dichas organizaciones para la operación.\n\nVarios grupos terroristas islamistas que han surgido del caos de la crisis en Arabia Saudita han declarado su responsabilidad, citando la participación occidental en Medio Oriente como un gran motivador. La inteligencia de la OTAN está advirtiendo al público de muchas naciones de Europa occidental que la amenaza del terrorismo sigue siendo extremadamente alta y que la gente debería estar alerta de inmediato y denunciar cualquier cosa sospechosa. Junto con la desesperación pública, Francia y Austria han anunciado que actuarán con rapidez para llevar a los grupos responsables ante la justicia."
 news.142.a: "El terror vuelve a apoderarse de Europa."
 news.143.t: "Maia Sandu elegida presidenta de Moldavia"
 news.143.d: "Maia Sandu, del bloque electoral pro-UE ACUM, integrado por el Partido de Acción y Solidaridad (PAS) y el Partido Plataforma de Dignidad y Verdad (PPDA), ha sido elegida presidenta de Moldavia. El resultado electoral sorprendió a muchos en el país considerado el más pobre de Europa. Sandu prometió una sólida campaña anticorrupción, una mejor calidad de vida y una mayor integración con Occidente y la UE. Los resultados también supusieron un duro golpe para Moscú, que había estado ampliando su influencia en Moldavia con el anterior presidente prorruso, Igor Dodon, y muchos esperan con ansias cuál será el próximo paso de Moscú tras su pérdida de influencia en Moldavia."
 news.143.a: "Un nuevo rumbo para Moldavia."
 news.144.t: "Igor Dodon reelecto presidente de Moldavia."
 news.144.d: "Igor Dodon, del Partido de los Socialistas de la República de Moldavia (PSRM), ha sido reelecto presidente de Moldavia. Electo en 2016, Dodon había estado impulsando una mayor alineación del país con el este, especialmente con Rusia. Dodon ahora busca fortalecer aún más las relaciones con la Federación de Rusia, adoptar una postura firme contra la Unión Europea y promover el nacionalismo moldavo, así como políticas populistas de izquierda. Muchos expertos extranjeros han pronosticado que la reelección de Igor Dodon podría significar el fin de la influencia occidental en Moldavia, y que el control de Moscú sobre el país se está intensificando. El futuro de Moldavia es incierto."
 news.144.a: "Moldavia cae de nuevo bajo el control de Moscú..."
 news.145.t: "¡Devastación sahariana!"
 news.145.d: "Por todo el desierto sahariano, se libran conflictos, se producen enfrentamientos en aldeas aisladas, y la ya de por sí desfavorecida agricultura de la región se está agotando por bandas de guerra descontroladas y fuerzas desabastecidas, desesperadas por la escasez de alimentos, sin dejar nada para los civiles que viven allí. Todo esto ha culminado ahora con una crisis en marcha: la desnutrición se ha cuadruplicado, las muertes por hambruna se han triplicado y miles de personas abandonan la región a diario.\n\nLamentablemente, no se puede hacer nada para mejorar la situación, ya que la mayoría de las principales naciones que participaron en las labores humanitarias en la región están ocupadas en sus propias guerras, lidiando con insurgencias o enfrentando una crisis económica. Otros grupos y organizaciones han intervenido para ocupar su lugar, pero carecen de la financiación y el equipo necesarios para combatir eficazmente la crisis, lo que prácticamente deja a quienes la padecen a su suerte o huyendo. Quienes huyen también han iniciado otra crisis. Los Gobiernos que acogen a estos refugiados carecen de recursos para retenerlos durante un largo periodo; algunos incluso los han obligado a regresar, lo que obliga a algunos a arriesgarse a cruzar ilegalmente. Esto ya ha causado alrededor de cien muertes, y se espera que muchas más pronto."
 news.145.a: "Pobres almas..."
 news.146.t: "Lluvias récord en el Sahara"
 news.146.d: "."
 news.146.a: "¡Excelente!"
 news.147.t: "Guerra por el Lago Chad"
 news.147.d: "."
 news.147.a: "Dios mío..."
 news.148.t: "Sequía egipcia"
 news.148.d: "Las señales de una sequía que empeora han alcanzado su punto álgido, ya que los esfuerzos etíopes por construir una presa en el Nilo han creado una de las peores crisis humanitarias del norte de África en el último siglo. La escasez de agua se ha convertido en una realidad en Egipto, una nación que ya importa la mayor parte de sus alimentos.\n\nEl Gobierno egipcio culpa a Etiopía de la situación, y la población parece compartir esta misma creencia. Las manifestaciones antietíopes han tomado las calles y los llamamientos a una guerra abierta para destruir la presa del Nilo se hacen más fuertes que nunca ahora que sus secuelas ya están presentes.\n\nSi la ayuda internacional no es suficiente, Egipto podría perder a millones de personas por sed en la próxima década, causando lo que podría ser la peor catástrofe humana en África desde el genocidio de Ruanda."
 news.148.a: "Se acerca la tormenta..."
 news.149.t: "Tercera guerra africana"
 news.149.d: "El presidente de Egipto declaró hoy la guerra a Etiopía, en respuesta a la creciente crisis hídrica causada por la Gran Presa del Renacimiento Etíope (GPRE). Las tensiones entre las dos naciones han aumentado en las últimas semanas, ya que la finalización de la presa ha afectado significativamente al flujo de agua del Nilo hacia Egipto.\n\nEl presidente al-Sisi anunció la decisión en un discurso televisado a la nación, afirmando que la supervivencia de Egipto está en juego y que los esfuerzos diplomáticos han fracasado para resolver la disputa. El Gobierno etíope aún no ha respondido a la declaración. El conflicto sobre la presa de 4.600 millones de dólares se ha estado gestando durante años, y Egipto y Sudán temen que el proyecto reduzca su cuota de las aguas del Nilo. El Nilo es la principal fuente de agua para la agricultura y el consumo en ambos países, donde millones de personas dependen del río para sobrevivir. Etiopía, por otro lado, ve la presa como un paso crucial hacia el desarrollo económico y la independencia energética.\n\nLas negociaciones entre Egipto, Sudán y Etiopía se han estancado repetidamente, a pesar de los múltiples intentos de mediación por parte de la comunidad internacional. Los analistas han advertido que la guerra podría desestabilizar a toda la región, ya que el destino de los tres países está entrelazado con el Nilo."
 news.149.a: "Los países ahora luchan por el agua..."
 news.150.t: "Se inaugura la presa del Renacimiento"
 news.150.d: "."
 news.150.a: "Interesante."
 news.151.t: "Éxito de la Conferencia Egipcia"
 news.151.d: "."
 news.151.a: "Interesante."
 news.152.t: "Protestas multitudinarias en Riad"
 news.152.d: "Hoy, las calles de Riad han estallado en caos cuando los ciudadanos salieron a las calles en protestas masivas tras el regreso del activista exiliado Yahya Assiri y el colapso de la economía de Arabia Saudita. El regreso de Assiri, un destacado crítico del Gobierno saudita conocido por su defensa de los derechos humanos, la reforma política y sus críticas a lo que él describe como una \"dictadura real\", ha estimulado a miles de ciudadanos a marchar contra el gobierno de Mohamed bin Salmán. El colapso del petrodólar también ha influido en estas protestas, enviando ondas de choque a través de la economía saudita, provocando que la inflación se disparara y el riyal saudita cayera en picado.\n\nOficialmente, Mohamed bin Salmán no ha emitido ninguna declaración sobre los disturbios, aunque se ha ordenado a las fuerzas del orden sauditas que implementen una represión contundente contra las protestas con \"autoridad y fuerza significativas\", lo que ha provocado la muerte de cuatro personas. Han surgido nuevos informes de arrestos, detenciones y enfrentamientos violentos entre manifestantes y fuerzas de seguridad. Esto sólo ha encendido la tensión política, y Assiri pronunció un discurso ante los manifestantes, llamándolos a \"tomar medidas\" por la justicia económica, la reforma política y el fin de la corrupción gubernamental. Actualmente no está claro cómo responderá oficialmente bin Salman, y esto ocurre tan solo un mes después de su coronación como rey tras la muerte de su padre. Organizaciones humanitarias y de derechos humanos ya han renunciado a la represión, y Yahya Assiri fue invitado a hablar sobre el tema por Radio Free Asia."
 news.152.a: "Interesante..."
 news.153.t: "Yahya Assiri declara desastre humanitario"
 news.153.d: "."
 news.153.a: "Señor, ayuda al pueblo de Arabia Saudita."
 news.154.t: "¡Al-Shabaab toma Mogadiscio!"
 news.154.d: "."
 news.154.a: "Señor, ayuda al pueblo de Somalia."
 news.155.t: "¡El EPL desembarca en Okinawa!"
 news.155.d: "Recientemente, el Ejército Popular de Liberación organizó una operación de desembarco para ocupar Okinawa. Gracias a los esfuerzos coordinados del Ejército, la Armada y la Fuerza Aérea, finalmente obtuvieron el control total de la región.\n\nLa captura de Okinawa significa el fracaso de la estrategia de la Organización del Tratado de Defensa del Pacífico (OTDP) para bloquear el poder marítimo de China mediante la estrategia de la \"cadena de islas\". Esta victoria no solo representa un éxito militar contra la OTDP, sino que también tiene una extraordinaria importancia histórica para China. Sin duda, la captura de Okinawa inspirará enormemente a los militares y civiles chinos, brindando un mejor apoyo a la guerra integral de China contra la OTDP.\n\nLa OTDP debe reevaluar su estrategia de guerra y ajustar su despliegue estratégico en las circunstancias actuales, acumulando suficientes recursos para afrontar las próximas batallas."
 news.155.a: "La bestia está desatada."
 news.156.t: "Fuerzas de IDEA desembarcan en Australia"
 news.156.d: "Con las fuerzas aliadas sufriendo derrotas en el Sudeste Asiático, las tropas de IDEA han comenzado a asaltar Australia, la principal base de retaguardia de los Aliados, y han desembarcado con éxito en la región.\n\nIDEA ha asegurado varias cabezas de playa en Australia. Independientemente de si lanzan una ofensiva final, ya han amenazado seriamente la principal base de retaguardia de la OTDP. Las fuerzas dela OTDP se enfrentan a un grave caos interno. Si no logran eliminar la presencia militar de IDEA, este caos podría llevar al fracaso total de la campaña dela OTDP en Australia.\n\nLas fuerzas dela OTDP se encuentran ahora en una coyuntura crítica. Si no logran asegurar Australia, no podrán llevar a cabo una confrontación militar integral con IDEA y tendrán que retirar sus fuerzas restantes de la región del Pacífico."
 news.156.a: "La batalla final."
 news.157.t: "La OTDP toma Hong Kong"
 news.157.d: "En una impresionante demostración de coordinación militar, los países de la OTDP lograron capturar la estratégica ciudad de Hong Kong en medio de la continua invasión china de Taiwán. Esta audaz maniobra no solo asegura un puerto vital para la coalición, sino que también supone un duro golpe para las ambiciones chinas en la región.\n\nA medida que las tensiones se intensificaban tras la postura agresiva del Gobierno chino hacia Taiwán, Japón y Australia rápidamente prometieron su apoyo al Gobierno taiwanés. Utilizando su superioridad naval y poder aéreo, las fuerzas de la coalición lanzaron un asalto anfibio sorpresa, tomando por sorpresa a los defensores chinos.\n\nLos informes indican que la ciudad se encuentra ahora bajo administración conjunta, con fuerzas taiwanesas a la cabeza del gobierno, apoyadas por asesores militares australianos y japoneses.\n\nEn respuesta, el Gobierno chino ha condenado las acciones de la coalición como un acto de agresión y se ha comprometido a recuperar el territorio e intensificar sus esfuerzos militares en Taiwán. La comunidad internacional observa atentamente este conflicto que amenaza con reconfigurar la dinámica de poder en el este de Asia."
 news.157.a: "El conflicto se intensifica."
 news.158.t: "Protestas nacionales en EE.UU."
 news.158.d: "Tras la trágica muerte de Quinton Evans, un hombre afroamericano que falleció bajo custodia policial, han estallado protestas en todo EE.UU. Las circunstancias que rodearon su muerte aún no están claras, pero las imágenes de vídeo muestran a un agente arrodillado sobre su cuello mientras lucha por respirar. Las protestas se han comparado con acontecimientos históricos como los disturbios de Los Ángeles, en los que cientos de miles de personas salieron a la calle para exigir justicia. Se ha informado de una escalada en la ciudad de Mineápolis, donde se han producido saqueos de comercios grandes y pequeños en zonas en las que el departamento de policía ha perdido el control ante el gran número de personas involucradas en las protestas.\n\nLos activistas políticos han denunciado lo que parece ser otro \"incidente corriente de brutalidad policial\" ante lo que consideran una crisis mucho mayor que requiere medidas sociales drásticas para resolverse. Agitadores de línea dura han llegado a equiparar la situación actual a la de Jim Crow. Elementos conservadores han pedido una desescalada, afirmando que en lo que respecta al incidente del Sr. Evans que la detallada historia legal del 'Sr. Evans' muestra un precedente de violencia contra los oficiales - esto es lo que el oficial sospechoso utilizó para justificar el uso de la fuerza bruta.\n\nLos conservadores ya han empezado a armarse y a entrar en las ciudades en las que se protesta con el pretexto de proteger a las pequeñas empresas, que según han declarado son el objetivo de los manifestantes. Los enfrentamientos son inevitables."
 news.158.a: "El fuego asciende..."
 news.159.t: "Colapso de la autoridad mexicana"
 news.159.d: "Durante décadas, las tierras de México lucharon con una brutal guerra de cuasi-guerrillas contra los cárteles, organizaciones criminales responsables del contrabando de miles de toneladas de narcóticos ilegales cultivados en las exuberantes selvas sudamericanas, a través del norte y de la frontera con Estados Unidos, hacia un mercado negro con la mayor demanda de drogas del mundo.\n\nCárteles como el de Los Zetas y el de Sinaloa han llegado a dominar las vidas regionales de las personas en su territorio, dando lugar a enormes cantidades de corrupción sistémica, intimidación y violencia general. Cuando Estados Unidos estalló en una segunda guerra civil, todo lo que se parecía a un statu quo en México se desintegró, ya que millones de refugiados empezaron a inundar México desde el norte, abrumando a los Gobiernos locales y provocando que el caos y el pánico se extendieran sin control. A pesar de los esfuerzos del gobierno mexicano por restablecer el orden mediante la promulgación de la ley marcial y el establecimiento de centros de acogida, los refugiados llegaron a ser demasiado y un estado tras otro declararon el estado de anarquía, mientras el ejército mexicano se veía desbordado y los cárteles iniciaban su táctica para apoderarse de México apoderándose por la fuerza de los Gobiernos locales, provocando otra guerra civil en México.\n\nCon los restos del gobierno sosteniendo Ciudad de México, todo lo que queda fuera del valle son numerosos señores de la guerra de los cárteles y movimientos guerrilleros haciendo sus movimientos."
 news.159.a: "El caos se expande..."
 news.161.t: "Los ex-EE.UU. bajo el Frente Patriota"
 news.161.d: "En una sorprendente cadena de sucesos, Norteamérica ha presenciado hoy un momento histórico. Tras años de un conflicto brutal, con un saldo catastrófico de vidas, el Frente Patriota es hoy el vencedor indiscutible de la Segunda Guerra Civil Americana, tomando el control de los territorios devastados de los ex-Estados Unidos. Los últimos días de combate fueron de los más violentos y destructivos de la guerra, dejando ciudades en ruinas e innumerables vidas destrozadas. Ahora, una calma inquietante ha descendido sobre Norteamérica, donde los únicos sonidos que quedan son el ominoso estruendo de convoyes militares en carreteras desoladas, el rugido de aviones que patrullan el cielo y el zumbido constante de las hélices de los helicópteros que sobrevuelan, mientras testigos silenciosos contemplan la frágil paz.\n\nCon la caída de sus últimos adversarios, el recién formado Gobierno nacional del Frente Patriota se dirigió a la Explanada Nacional para dirigirse a la nación agotada por la guerra en un discurso de victoria. El nuevo régimen celebró su triunfo presentándolo como \"el comienzo de una nueva era para América\". Durante el discurso, expusieron su visión para el futuro del país, detallando ambiciosos planes de reconstrucción a gran escala destinados a revitalizar una infraestructura destrozada, junto con promesas de reformas políticas radicales que transformarían la esencia del gobierno norteamericano.\n\nLa reacción internacional ha sido dispar, pero a pesar de estas reacciones, un hecho innegable se impone: Norteamérica ahora se encuentra bajo un nuevo liderazgo, un liderazgo con el poder y la ambición de transformar los cimientos mismos de la nación de maneras que perduren en las generaciones venideras."
 news.161.a: "Han llegado lejos, pero ¿qué harán ahora?"
 news.161.b: "¡Hemos reclamado América!"
 news.162.t: "[ATW.GetNameDefCap] conquista los ex-EE.UU."
 news.162.d: "Lo que antes se consideraba imposible es ahora una cruda realidad. Todos los Gobiernos restantes que ejercían control sobre el territorio continental de los ex-Estados Unidos se han rendido a la División Atomwaffen o han sido liquidados. Este trágico giro de los acontecimientos ha hecho de la División Atomwaffen, un grupo extremista marginal en Florida, el poder dominante en el territorio de los ex-Estados Unidos.\n\nEl conflicto que ha devastado el cadáver de los EE.UU., marcado por la caída de numerosas facciones y Gobiernos en un caos generalizado, ahora ha quedado en silencio, interrumpido solo por las celebraciones de Atomwaffen. Los observadores internacionales permanecen en un silencio atónito al ver a una de las organizaciones más radicales y sanguinarias de la historia asumir el control de lo fue el país más fuerte del mundo. Este grupo ahora ostenta no solo un inmenso poder político, sino también algunas de las armas más avanzadas y destructivas jamás desarrolladas.\n\nEl futuro está envuelto en incertidumbre. Si bien Atomwaffen celebra su triunfo, aún no ha emitido declaraciones formales sobre sus planes para el futuro. Dada su ideología e historial, se anticipa que Norteamérica, o lo que quede de ella, se convertirá en su feudo, donde tendrán total libertad para imponer su voluntad. Se espera que la nación experimente un caos y violencia sin precedente, que podrían superar incluso los peores conflictos del mundo. La perspectiva de un futuro marcado por inestabilidad y sufrimiento se cierne en el horizonte, condenando potencialmente a la humanidad por completo."
 news.162.a: "El bastión de la libertad, muerto."
 news.162.b: "Nuestro destino, cumplido."
 news.163.t: "[NSM.GetNameDefCap] reunifica los ex-EE.UU."
 news.163.d: "Los últimos Gobiernos opositores en los ex-Estados Unidos se rindieron oficialmente anoche ante Burt Colucci y su ejército de nacionalsocialistas, marcando el fin de una brutal Guerra Civil que dejó decenas de millones de muertos y aún más desplazados. Varios líderes de la resistencia fueron ejecutados por el nuevo Gobierno tras un breve juicio, y sus cuerpos fueron colgados frente a la nueva capital de la República. Desde su sede en Washington, Colucci proclamó una \"nueva nación aria americana, por los arios, para los arios\" y exigió la expulsión inmediata de todas las personas no blancas de la nación.\n\nPartiendo de un pequeño grupo de rebeldes en el sur de Míchigan, Colucci forjó vínculos con varios otros grupos neonazis y nacionalistas blancos para convertirse en el líder indiscutible del Frente Nacional antes de proclamar [NSM.GetNameDef]. Los combates siguen siendo intensos en todo el país y es probable que continúen durante bastante tiempo, pero el fin de la oposición oficial marca un punto de inflexión en la consolidación del poder del régimen de Colucci sobre los ex-Estados Unidos. Las reacciones a la noticia han sido abrumadoramente negativas, y es poco probable que la nueva república obtenga reconocimiento en el escenario mundial debido a su ideología y desconfianza en la cooperación internacional.\n\nPase lo que pase después, el mensaje es claro: el nacionalsocialismo, con toda su brutalidad, finalmente ha llegado a los Estados Unidos."
 news.163.a: "La llama de la libertad se apaga, para siempre."
 news.163.b: "Nuestro destino, cumplido."
 news.164.t: "[NSM.GetNameDefCap] reunifica los ex-EE.UU."
 news.164.d: "Los últimos Gobiernos opositores en los ex-Estados Unidos se rindieron oficialmente anoche ante Burt Colucci y su ejército de nacionalsocialistas, marcando el fin de una brutal Guerra Civil que dejó decenas de millones de muertos y aún más desplazados. Varios líderes de la resistencia fueron ejecutados por el nuevo Gobierno tras un breve juicio, y sus cuerpos fueron colgados frente a la nueva capital de la República. Desde su sede en Washington, Colucci proclamó una \"nueva nación aria americana, por los arios, para los arios\" y exigió la expulsión inmediata de todas las personas no blancas de la nación.\n\nPartiendo de un pequeño grupo de rebeldes en el sur de Míchigan, Colucci forjó vínculos con varios otros grupos neonazis y nacionalistas blancos para convertirse en el líder indiscutible del Frente Nacional antes de proclamar [NSM.GetNameDef]. Los combates siguen siendo intensos en todo el país y es probable que continúen durante bastante tiempo, pero el fin de la oposición oficial marca un punto de inflexión en la consolidación del poder del régimen de Colucci sobre los ex-Estados Unidos. Las reacciones a la noticia han sido abrumadoramente negativas, y es poco probable que la nueva república obtenga reconocimiento en el escenario mundial debido a su ideología y desconfianza en la cooperación internacional.\n\nPase lo que pase después, el mensaje es claro: el nacionalsocialismo, con toda su brutalidad, finalmente ha llegado a los Estados Unidos."

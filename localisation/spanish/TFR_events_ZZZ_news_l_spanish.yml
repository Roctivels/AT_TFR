 news.286.a: "La guerra se intensifica..."
 news.290.t: "Guerra civil japonesa"
 news.290.d: "Hoy se ha dado a conocer que ha estallado una guerra civil en Japón. Tras el golpe militar en Tokio, las fuerzas progresistas democráticas desconocieron la legitimidad del nuevo Gobierno y comenzaron a unirse en el norte del país. Como resultado, la ciudad de Sapporo fue proclamada capital provisional. Se estableció allí un organismo gubernamental interino para coordinar las acciones de las fuerzas de oposición. Las autoridades de Sapporo también comenzaron a formar su propio ejército y declararon su intención de luchar por sus derechos y libertades. El Gobierno militar de Tokio envió tropas al norte para reprimir el levantamiento democrático y recuperar el control de la región."
 news.290.a: "El sol se pone..."
 news.291.t: "Enfrentamientos entre fuerzas alemanas y polacas"
 news.291.d: "Apenas han pasado unas horas desde que los últimos vestigios del Gobierno de Reclamación Polaco se rindieron al asalto del Pacto de Acero sobre la nación otrora unida, y ya se han disparado misiles a través de vastas líneas de trincheras a lo largo de la frontera germano-polaca. Al igual que en la primera guerra, es difícil decir cuál de los dos bandos lanzó sus misiles primero, pero las fuerzas del Pacto ya se están reorganizando para afrontar mejor esta situación.\n\nLas autoridades alemanas han comentado al respecto, culpando a la República Popular de Polonia de \"provocar su pacificación del bárbaro Gobierno de Reclamación\". Sin embargo, ya han cobrado fuerza videos de soldados alemanes maltratando a prisioneros de guerra polacos y checos a través de las plataformas de redes sociales orientales. El presidente de la Unión Soviética no ha respondido hasta ahora a estas acusaciones, pero las acciones implementadas por el Alto Mando siguen siendo las mismas.\n\nCasi todos los Gobiernos europeos están autorizando movilizaciones masivas mientras se preparan para las pruebas que se avecinan en lo que probablemente será el conflicto más destructivo que Europa haya visto en siglos, posiblemente eclipsando la Segunda Guerra Mundial."
 news.291.a: "La segunda Barbarroja."
 news.292.t: "Formación de Yugoslavia"
 news.292.d: "Al cesar los combates, las fuerzas serbias lograron la victoria contra los últimos \"Estados escindidos\" de los Balcanes. Las autoridades serbias declararon el resurgimiento de Yugoslavia, se ultimaron los trámites y se declaró un día festivo en todo el Estado recién reformado. Los desfiles militares también son habituales, el más importante de los cuales se celebra en Belgrado, con la ciudad envuelta en banderas yugoslavas y carteles de agitación.\n\nEl Gobierno de Belgrado lleva mucho tiempo afirmando que ha aprendido de los errores de la unión anterior y que ha modernizado su visión de un nuevo Estado unificado eslavo del sur. Los observadores internacionales aún dudan de este nuevo experimento; muchos lo acusan de trato cruel a personas consideradas \"reaccionarias\" y \"enemigas del pueblo\"."
 news.292.a: "¿Perdura la Hermandad y Unidad?"
 news.293.t: "Golpe de ultraderecha en Croacia"
 news.293.d: "Tras la victoria de las fuerzas extremistas en Serbia, la población croata ha comenzado a inquietarse y se ha radicalizado ante la inminente amenaza serbia.\nUno de los principales partidos nacionalistas, el HSP, ha cobrado un impulso constante, especialmente entre las filas militares, lo que culminó en un golpe militar que desmanteló el parlamento e instaló al HSP en el poder, con poderes autocráticos.\nDaniel Srb, el nuevo presidente, ha proclamado, durante un discurso televisado, que \"Croacia no se doblegará ante los revanchistas serbios\". El Gobierno nacionalista ya está implementando importantes reformas de militarización."
 news.293.a: "Esto no acabará bien..."
 news.294.t: "Bielorrusia se une a Rusia"
 news.294.d: "Tras años de gestiones políticas, el proyecto ruso de un \"Estado de la Unión\", que data de hace milenios, finalmente se ha concretado. Las autoridades rusas, junto con su homóloga bielorrusa, firmaron acuerdos de cooperación unificada y profundización de la unión, que fueron ratificados de inmediato por ambos jefes de estado.\nCon solo un pequeño trámite por delante, es normal considerar a Rusia y Bielorrusia como una sola entidad a partir de ahora.\nSe celebraron manifestaciones multitudinarias en numerosas ciudades y pueblos de ambos países, elogiando este avance y calificándolo como la mayor victoria de la patria desde Crimea. Muchos políticos estatales afirman que es solo el comienzo de una nueva primavera rusa.\n\nEsta maniobra geopolítica otorga a Rusia una nueva ventaja en el escenario europeo y una base para un mayor desarrollo militar contra la inminente amenaza occidental."
 news.294.a: "Estarán mejor..."
 news.294.b: "¡Que nuestra unión fraternal sea eterna!"
 news.295.t: "Discurso de Medvédev"
 news.295.d: "El mundo geopolítico ha quedado conmocionado por el reciente discurso de Dmitri Medvédev, quien recientemente se dirigió a su despacho y grabó un discurso dirigido a los rusos. En él, criticó duramente a los globalistas, a los \"perros falderos\" de la UE y sus constantes ataques a la soberanía y el carácter nacional rusos. Medvédev proclamó: \"...Nuestro pueblo jamás se doblegará a la voluntad de los sodomitas de Bruselas. Su burla a la democracia, que oculta valores impíos para Rusia y sus pueblos...\"\n\nEn un acontecimiento aún más preocupante, Medvédev se dirigió a los países vecinos no alineados con duras declaraciones, incluso cuestionando la legitimidad de sus Gobiernos. Más tarde ese mismo día, las autoridades rusas enviaron cartas urgentes a estos jefes de estado, exigiéndoles que se sentaran a la mesa de negociaciones para buscar una nueva moderación política. Ninguna ha respondido aún. Dado que las Fuerzas Armadas rusas finalizaron recientemente los ejercicios de guerra en sus fronteras, solo el tiempo dirá qué resultará.\n\nLos analistas políticos y militares no prevén que estos países resistan mucho en caso de una invasión militar, debido a la deficiente estructura de sus ejércitos y a su posición geopolítica, lo que hace que su lucha sea de poco interés para las democracias occidentales, que actualmente se encuentran agobiadas por sus propios problemas y no brindarán mucha ayuda."
 news.295.a: "El oso ruge."
 news.296.t: "Comunistas envian ultimátum a Estados disidentes"
 news.296.d: "Los comunistas rusos han publicado sus declaraciones cada vez más hostiles hacia lo que consideran \"Estados disidentes antisoviéticos\", enviando ultimátums donde exigen la sovietización total, según sus propias palabras, para \"liberar a los trabajadores de las repúblicas hermanas oprimidas\" y otorgarles el derecho a votar en el referendo de restauración de la URSS, negado por los regímenes capitalistas actuales. Esto ha contado con un apoyo generalizado en Rusia, que muchos consideran el inicio de una nueva Unión Soviética. Las ciudades se vistieron con banderas rojas, emblemas soviéticos y carteles a favor de la unificación. Muchos comunistas en las naciones atacadas han jurado lealtad a la URSS y proclamado que lucharán contra sus Estados opresores.\n\nLos analistas políticos y militares no prevén que estos países resistan mucho tiempo, alegando la deficiente estructura de sus ejércitos y su posición geopolítica, lo que hace que su lucha sea de poco interés para las democracias occidentales, que actualmente están agobiadas por sus propios problemas y no brindarán mucha ayuda. Parece que esas naciones podrían desaparecer pronto, dejando obsoletos los mapas políticos actuales."
 news.296.a: "El oso rojo ruge."
 news.297.t: "¡La Rusia Imperial Ataca!"
 news.297.d: "Las recientes escaramuzas en las fronteras rusas escalaron a enfrentamientos militares cuando el alto mando ruso dio la orden directa de iniciar una marcha militar hacia los países vecinos. En un discurso televisado, Vladímir Zhirinovski hizo duras declaraciones contra los enemigos, afirmando que no son más que protoestados fallidos, dirigidos por oportunistas corruptos que, por su propia culpa, llevaron a sus países al abismo. Zhirinovski afirmó que solo la administración rusa, de vuelta al gran Imperio, puede devolver la prosperidad y la riqueza a esas regiones. Terminó su discurso con: \"¡Rusos, venceremos! ¡Dios está con nosotros!\".\n\nLos informes sobre severas órdenes de batalla impartidas a los soldados sugieren que los rusos reprimirán violentamente cualquier resistencia y amenaza. Dentro de Rusia, los ciudadanos sufren constantemente la agitación, los discursos y los desfiles a favor de la guerra, con todos los pueblos y ciudades envueltos en los colores de la bandera nacional. Los analistas políticos y militares no prevén que estos países resistan mucho en caso de una invasión militar, debido a la deficiente estructura de sus ejércitos y a su posición geopolítica, lo que hace que su lucha sea de poco interés para las democracias occidentales, que actualmente se encuentran agobiadas por sus propios problemas y no brindarán mucha ayuda."
 news.297.a: "El oso ruge."
 news.298.t: "¡Rusia invade Bielorrusia!"
 news.298.d: "Rusia está cada vez más enojada con la nueva Bielorrusia democrática por cortar sus lazos con ella. En una transmisión reciente, Medvédev anunció el inicio de una operación militar para restablecer el orden y reintegrar a Bielorrusia al grupo de países amigos. La ubicación geopolítica de Bielorrusia la convierte en una parte vital del plan europeo para reducir la influencia de Rusia; se espera que ayude a la democracia bielorrusa en estos tiempos difíciles. Mientras la guerra se desarrolla cerca de la frontera con Ucrania, las autoridades de Kiev comienzan a preocuparse por su bienestar debido a las audaces medidas de Moscú."
 news.298.a: "Muerte a los liberales."

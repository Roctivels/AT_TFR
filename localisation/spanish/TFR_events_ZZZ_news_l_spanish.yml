 news.568.t: "Mijaíl Delyagin gana las elecciones rusas"
 news.568.d: "Hoy, Rusia cosecha los frutos de las reformas que implementó. Todo el país ha estado más activo que nunca, con la carrera presidencial revitalizando a la sociedad rusa. Si bien la transición de Medvédev en el gobierno se consideró un simple cambio de mando, el resultado final superó la mayoría de las expectativas.\n\nA pesar de la intensa contienda, Rusia Popular finalmente ganó. Formada por la fusión de todos los partidos de izquierda, abarca una amplia coalición que abarca desde liberales sociales hasta comunistas declarados. Sin embargo, sus políticas culturales son conservadoras, considerando el progresismo como una estrategia clave para distraer a los ciudadanos de la explotación económica.\n\nEl vencedor de esta contienda es Mijaíl Delyagin; economista, figura mediática y ex-miembro de RJ-PV. Queda por ver qué camino tomará esta presidencia ante los observadores extranjeros."

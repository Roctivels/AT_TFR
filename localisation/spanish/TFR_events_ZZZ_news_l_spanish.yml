 news.559.t: "Guerra de Reconquista Franca"
 news.559.d: "Francia es, como todos sabemos, la tierra de los francos, pero antes de ser Francia, fue el reino de los francos. La diferencia de nombre es mínima, pero su significado es enorme. El reino de los francos, bajo el emperador Carlomagno, abarcaba el norte de Italia, gran parte de Alemania, Cataluña y los Paises Bajos. El Estado fue el fundador del Sacro Imperio Romano Germánico y su división en los siglos posteriores dio lugar a los Estados modernos de Francia, Alemania e Italia, todos los cuales, por primera vez, se encontraron con fronteras similares a las actuales.\n\nEl misterioso Lafayette cree que los alemanes son simplemente francos descarriados, separados durante mucho tiempo por la traición feudal, pervertidos por los judíos y los comuneros para alejarse de París. Hoy, Lafayette declaró la guerra al gobierno alemán, declarando que la restauración de Francia era inevitable y que la derrota final de Alemania era \"por su propio bien\". Mientras Francia se encuentra bajo un silencio mediático total, la retórica sugiere que una victoria francesa podría conducir a una homogeneización a largo plazo de la cultura alemana bajo su influencia, o quizás a un genocidio a gran escala. La escala y el alcance exactos de las intenciones territoriales francesas son inciertos. La reacción internacional en otras naciones europeas es de alarma y conmoción, comprensiblemente, ya que las embajadas francesas se niegan a hacer comentarios sobre las consultas extranjeras. Informes de Alemania sugieren que ya se han logrado avances en el Rin. Si el Pacto de Acero ayudará a Berlín es una incógnita en este momento. Gane quien gane, el destino de Europa está en juego, y quizás el de un pueblo."
 news.559.a: "El traidor de Europa."
 news.559.b: "Como hubiera querido Carlomagno."
 news.559.c: "Europa nunca verá la paz."
 news.560.t: "Tercera Guerra Europea"
 news.560.d: "Para quienes creían que la amistad y la estrecha cooperación entre Alemania y Francia podrían ser inquebrantables tras dos sangrientas guerras contra Rusia, la realidad les ha jugado una broma cruel e irónica. Por primera vez desde 1945, los países a ambas orillas del Rin se han enfrentado una vez más.\n\nAl repasar la historia, vemos que las raíces de este conflicto podrían haberse plantado hace mucho tiempo. Incluso dejando de lado los rencores históricos entre Alemania y Francia, sus diferencias políticas siempre han sido difíciles de ocultar, desde la época de la Comunidad Europea del Carbón y del Acero hasta la Comunidad Europea y la Unión Europea. Una serie de políticas llevaron a la UE a una creciente fragmentación e ineficacia, allanando el camino para la tragedia actual.\n\nAhora, los tanques Leclerc y Leopard 2 se apuntan con sus cañones; en el cielo, los aviones Dassault Rafale y Tornado se enfrentan en combates aéreos. Independientemente de quién salga victorioso, el daño y la confianza rota serán irreparables."
 news.560.a: "Francia debe morir."
 news.560.b: "Alemania conocerá nuestro poder..."
 news.560.c: "Europa nunca verá la paz."
 news.1918.t: "¡El Imperio contraataqua!"
 news.1918.d: "Hoy, el pueblo alemán fue recibido con un discurso televisado por el excéntrico monárquico alemán Heinrich Reuss. Tras un sangriento golpe de Estado en Berlín por parte de fanáticos restauracionistas imperiales, el nuevo líder alemán denunció al Gobierno anterior como una camarilla de globalistas criptoeslavos y declaró la restauración del antiguo Imperio Alemán y la instauración de la ley marcial.\n\nAunque se lo considera marginal incluso para los estándares del anterior estado nacionalista alemán, el movimiento Reichsbürger ha crecido en popularidad tras la humillante derrota de las fuerzas alemanas contra la Unión Soviética y la posterior revolución nacionalista del misterioso Rädelsführer, con la deposición de la Junta anterior y la designación adicional de Reuss como autoproclamado Regente del Imperio Alemán, lo que ha provocado una cascada de condenas por parte de la comunidad mundial.\nHeinrich ha dejado clara su intención de restaurar las fronteras de Alemania a su tamaño anterior a la república y ha prometido vencer a los enemigos del Imperio bajo su gobierno \"Divino y Providencial\".\n\nEl mundo espera ansiosamente y desesperado ver hasta dónde llegará el loco Regente para restaurar su amado imperio y, si tiene éxito, cuán sombrío será el futuro de la nación alemana..."
 news.1918.a: "Al pueblo alemán sólo le espera el olvido..."

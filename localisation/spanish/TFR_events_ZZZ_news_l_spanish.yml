 news.561.t: "Dmitri Pátrushev gana las elecciones rusas"
 news.561.d: "Hoy, Rusia cosecha los frutos de las reformas que implementó. Todo el país ha estado más activo que nunca, con la carrera presidencial revitalizando a la sociedad rusa. Si bien la transición de Medvédev en el Gobierno se consideró un simple cambio de mando, el resultado final superó la mayoría de las expectativas.\n\nA pesar de la intensa contienda, Rusia Unida logró una nueva victoria. Sin embargo, el partido ya no es la estructura monolítica de antaño. Reformado en un partido de centroderecha tras la fusión del PLDR y otros partidos de derecha, abarca una amplia gama de ideas, con múltiples coaliciones dentro del partido. Algunos lo comparan con el antiguo Partido Republicano estadounidense.\n\nEl vencedor de esta contienda es Dmitri Pátrushev, exministro de Agricultura y colaborador cercano de Dmitri Medvédev. Queda por ver qué rumbo tomará esta presidencia ante los observadores extranjeros."
 news.561.a: "¡Interesante!"

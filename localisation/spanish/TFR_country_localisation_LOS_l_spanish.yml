 LOS_de_jure_democracy_idea_desc: "En teoría, nuestro gobierno se fundó con la idea de que cada estado debería tener el poder dentro del gobierno para representar la voz del pueblo en un sistema verdaderamente democrático, a diferencia del velo corrupto y despótico de Washington D.C. Mientras el sistema confederado es real, la parte democrática... no tanto. Debido a las circunstancias actuales en las que se encuentra nuestro país, nos hemos visto obligados a suspender el proceso democrático, con la mayoría de las decisiones en manos del Congreso Confederado y parte del poder incluso en manos del Poder Ejecutivo."

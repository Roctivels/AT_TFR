 los_news.1.t: "La Gran Masacre de Jackson"
 los_news.1.d: "En Jackson, los incendios aún no se han extinguido. En el antiguo bastión del Ejército de Liberación Negro, las fuerzas de la Liga del Sur arrasaron tras un asedio sangriento y reñido. Principalmente dirigidas contra comunidades de mayoría negra, las redadas masivas de civiles se vieron interrumpidas por asesinatos indiscriminados de hombres en edad de combatir, y las mujeres y los niños fueron expulsados a campos de refugiados construidos apresuradamente. Se presume que al menos 1.000 personas han muerto y decenas de miles han sido desplazadas.\n\nEl ELN ha prometido \"recuperar la ciudad e impartir justicia\" a los invasores. Según informes, a grupos de ayuda internacional como la Cruz Roja y Médicos Sin Fronteras se les ha negado la entrada a la \"zona de combate\", y el nuevo gobierno ha guardado silencio sobre sus propias labores de socorro."
 los_news.1.a: "¡Encuentren a los responsables de inmediato!"
 los_news.1.b: "No volverá jamás."
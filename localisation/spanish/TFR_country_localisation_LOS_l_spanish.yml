l_spanish:
 LOS_the_south_risen: "¡El Sur ha resucitado!"
 LOS_the_south_risen_desc: "Dijeron que nunca se podría, que estaríamos inactivos para siempre, ¡pero míranos ahora! ¡Bajo la guía de la Liga del Sur, la gente sureña será liberada de los tiranos del norte! ¡El espíritu de rebelión sigue vivo! ¡Abajo los tiranos, arriba la cruz! ¡El Sur ha resucitado!"
 LOS_arms_upon_arms: "A las armas en Dixie"
 LOS_arms_upon_arms_desc: "Una razón por la cual muchos en nuestros rangos se han rebelado contra los déspotas del norte es para defender el derecho dado por Dios para portar armas. Esos elitistas se atrevieron a quitarle el derecho a la gente de defenderse cuando la nación estaba, literalmente, quemándose. Vamos a buscar toda milla y todo pueblo, cada pulgada de cada cuartel en Arkansas para establecer un arsenal de armas, y que todo hombre sano pueda luchar por la causa y liberar su patria de la amenaza Yanqui."
 LOS_ally_republicans: "Aliarse con los republicanos"
 LOS_ally_republicans_desc: "El nombre del Partido Republicano ha resonado en las orejas de los patriotas sureños por un siglo. Era el partido de Lincoln que ocupó nuestras tierras durante años, quienes quemaron nuestros pueblos salvajemente, y cuya hipocresía ha destruido su estilo de vida. Hoy en día, son una banda de ladrones y asesinos, aprovechándose de la pobreza que nos han infligido para forzar a nuestros muchachos a morir en el extranjero para llenarse sus bolsillos con oro. Sin embargo, también existen otro partido Republicano - uno que ha luchado por nuestra soberanía durante los últimos 40 años, y que simpatiza con la situación del hombre sureño. Aunque nosotros no veamos de forma favorable a su partido, los patriotas republicanos que deseen vestir el uniforme gris y luchar codo con codo con nosotros serán nuestros aliados."
 LOS_confederate_congress: "Reformar el Congreso de los Estados Confederados"
 LOS_confederate_congress_desc: "Con la guía de Cristo, el espíritu de los confederados al fin se ha restaurado. Por primera vez en 150 años, el congreso de los Estados Confederados de América se volverá a reunir para dirigir el curso de nuestra nación. La gente de la Confederación jamás volverán a ser dominados por los liberales de ciudad de Washington, y en su lugar será representada por los laboriosos granjeros y trabajadores del sur. Aunque quede mucho trabajo por hacer, nuestros ancestros deben estar sonriéndonos desde el cielo al ver a la Confederación resurgir de las cenizas."

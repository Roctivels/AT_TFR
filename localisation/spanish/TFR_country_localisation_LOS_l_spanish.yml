 LOS_racial_reconciliation: "Revisiones raciales"
 LOS_console_the_old_guard: "Consolar a la vieja guardia"
 LOS_console_the_old_guard_desc: "Hay varios en la Vieja Guardia que creen que hemos traicionado a los valores originales de la Liga, y que no nos preocupamos de nuestra población blanca. Dicen que somos cobardes, que somos parásitos tratando de distorsionar la ideología de nuestra organización. Pero esto no puede estar más lejos de la realidad. Tenemos la intención de liberar a los blancos sureños quienes viven bajo la corrupta bota del Norte, todos deseamos asegurar la estabilidad entre los sureños y llevar paz a los nuestros. Haremos saber a la Vieja Guardia que nosotros retenemos los valores centrales de tanto la Liga y de nuestros ancestros."

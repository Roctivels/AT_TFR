 LOS_confederate_congress_category: "El Congreso de los Estados Confederados"
 LOS_confederate_congress_category_desc: "Por más de 100 años, la lucha por la independencia del sur ha pasado de un grupo a otro. El primer Klan combatió y fallo. El segundo Klan combatió y fallo. Pero la Liga del Sur no es como otros klanes post-guerra. En vez de vestirnos con sudaderas y desfilando en las calles de Charleston, la Liga de Sur se ha reconstituido a si misma como un cuerpo gubernamental legitimo, pasando sobre el terrorismo y tomando control total del sur.\n\nEn el 18 de Febrero, 1862, nuestros ancestros se juntaron para discutir el futuro de su nación. A pesar de su derrota unos años más tarde, la primera Confederación puso un estandarte para lo que somos hoy. Sus ideales de democracia descentralizadas, basada en las ideas originales de los padres fundadores. Mientras que la tiranía de ambas facciones federalistas juegan a fingir con sus Gobiernos centralizados, el congreso confederado presenta una vuelta a la tradición, donde los ideales originales de la Republica están implementados. ¡Los gritos de la gentuza no serán escuchados por sobre las voces de los ilustrados!\n\n§2Apoyo§!Populista: §Y[?LOS_populist_support_var|1%]§!\nLos §2Populistas§!, dirigidos por Bradly Dean Griffin, son una ala del partido que se enfoca en las dos guerras de agresión del norte. Por más de 200 años, los imperialistas yanquis en el norte han hundido sus dientes en los campos y minas del sur, explotando todo recurso hasta su desaparición y dejando atrás solo pobreza. Así, como lo dice su nombre, son populistas en naturaleza, promoviendo cualquier posición que les consiga el mayor seguimiento. Esparciendo su retorica de que una tercera guerra de agresión del norte es todo menos evitable, los populistas han apoyado un crecimiento estatal masivo para poder defender el país. Naturalmente como consecuencia de la expansión del estado, los populistas también prometieron expandir asistencia social, y tienen posiciones generalmente anti-elitistas.\n\n§gApoyo§! de la Vieja Guardia: §Y[?LOS_old_guard_support_var|1%]§!\nLa §gVieja Guardia§!, dirigida por Micheal Tubbs, ve los problemas del sur como uno de diversidad, y son los responsables de acrecentar la retorica racista y segregatoria, llevando a conflicto y violencia racial en todo el sur. Aunque evitando llamar directamente por la completa eliminación de la raza afroamericana, han empujado por recovar el acto de los Derechos Civiles de 1964, como también silenciosamente apoyar el complejo prisional-industrial. Con el apoyo de aristocracia del sur, son muy pro-empresariales, y esperan poder abrir su mercado de exportaciones al resto del mundo para sanar una tierra devastada por años de conflicto y guerra.[GetKlanSupport]\n\n§8Apoyo total§! Estatal: §Y[?LOS_congress_support_var|1%]§!\n§8Apoyo total Estatal§! representa el total del apoyo que recibimos desde varios estados. Para que nuestro gobierno funcione de manera correcta, tenemos que asegurarnos de tener el suficiente apoyo estatal. Si el apoyo de los estados baja de un 50%, §Rnuestro gobierno no podrá tomar ninguna acción significativa.§!"

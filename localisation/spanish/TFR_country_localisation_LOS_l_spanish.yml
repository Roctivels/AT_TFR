 LOS_wipe_the_slate_clean: "Borrar y empezar de cero"
 LOS_wipe_the_slate_clean_desc: "No hay ninguna duda de que las ciudades son los corazones latientes de la influencia yanqui. Sus instituciones degeneradas han envenenado a nuestra juventud, su vil olor secretándose a los bastiones del sur y sus fútiles llantos de traición han hecho nada más que dañar nuestra nación. Cuando un hombre tiene cáncer, el cáncer es quemada hasta quedar cenizas para proteger al hombre. Aunque el proceso es doloroso, es necesario salvar su vida. El cáncer yanqui tiene que ser quemado del cuerpo del sur, para que nunca vuelva a plagar nuestra tierras."

 nato_strength_tt: "Panel de las estadísticas de la OTAN"
 nato_strength_delay_tt: "Este panel muestra estadísticas detalladas sobre la fuerza de la OTAN. Tome en cuenta que los números relacionados a la mano de obra están calculados en miles. \n\nLa OTAN actualmente despliega un total de §Y[?global.nato_deployed_total_manpower]§! hombres, de los cuales \n§Y[?global.nato_deployed_army_manpower]§! sirven en el ejército, \n§Y[?global.nato_deployed_navy_manpower]§! en la armada, y\n§Y[?global.nato_deployed_air_manpower]§! en la fuerza aérea.\nHay §Y[?global.nato_military_reserve]§! hombres en reserva.\nDesde el 1 de enero de 2020, §R[?global.nato_military_casualties|-]§! hombres han muerto durante servicios de la OTAN. (Solo miembros Actuales).\n\nLas fuerzas de la OTAN están divididas en:\n§Y[?global.nato_military_divisions]§! divisiones y\n§Y[?global.nato_military_battalions]§! batallones.\nLas fuerzas navales consisten de §Y[?global.nato_military_ships]§! navíos, de los cuales\n§Y[?global.nato_military_screens]§! son clasificados como monitores, \n§Y[?global.nato_military_capitals]§! como buques capitales, \n§Y[?global.nato_military_carriers]§! como portaviones y\n§Y[?global.nato_military_subs]§! como submarinos.\n\nLa fuerza aérea total de la OTAN es de §Y[?global.nato_military_planes]§! aviones, de los cuales, \n§Y[?global.nato_military_smallplanes]§! son clasificados como \"caza polivalente\", \n§Y[?global.nato_military_mediumplanes]§! como \"aeronaves no tripuladas\" y\n§Y[?global.nato_military_largeplanes]§! como \"aviones pesados\".\n\nCon respecto a la industria, los países de la OTAN tienen un total de §Y[?global.nato_industry_total]§! fábricas. De las cuales, \n§Y[?global.nato_industry_civilian]§! son fabricas civiles, \n§Y[?global.nato_industry_military]§! son fabricas militares,\n§Y[?global.nato_industry_naval]§! son astilleros,\n§Y[?global.nato_industry_office_park]§! son oficinas,\n§Y[?global.nato_industry_synthetic_refinery]§! son refinerías sintéticas,\n§Y[?global.nato_industry_nuclear_reactor]§! son reactores nucleares,\n§Y[?global.nato_industry_power_plant]§! son centrales eléctricas,\n§Y[?global.nato_industry_energy_farm]§! son granjas de energía.\n\nEn producción de recursos, los países de la OTAN producen un total de\n§Y[?global.nato_industry_oil]§! de petróleo, \n§Y[?global.nato_industry_aluminum]§! de aluminio, \n§Y[?global.nato_industry_rubber]§! de caucho, \n§Y[?global.nato_industry_tungsten]§! de wolframio, \n§Y[?global.nato_industry_steel]§! de acero y \n§Y[?global.nato_industry_chromium]§! de cromo.\n\nLa información en este panel es actualizada cada vez que es cerrada y abierta de nuevo."

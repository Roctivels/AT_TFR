 The_PRC_beijing_government_Leader_Nick_Land_TXT_DESC: "El país se rebautiza el Estado de China. La ideología es Aceleracionismo de derecha.\n\n\n\n\n\n\n\n   £GFX_TFR_NL\n\n\n\n\n\n\n\n\n-------------------------------------"
 KOR_election: "@KOR Elecciones surcoreanas de 2022"
 KOR_DPK_AI_BEHAVIOR_TXT: "§OPartido Demócrata de Corea§!"
 KOR_DPK_AI_BEHAVIOR_TXT_DESC: "Bajo el liderazgo de Lee Jae-myung, el §OPartido Democrático de Corea§! se asegura la reelección en las elecciones presidenciales de 2022. Con una plataforma liberal de centro a centroizquierda, el partido pretende reformar los asuntos internos y lograr gradualmente la soberanía nacional completa para Corea del Sur, todo ello manteniendo una postura neutral y equilibrada en el panorama de Asia y el Pacífico.\n\n\n\n\n\n\n\n   £GFX_Lee_Jae_myung\n\n\n\n\n\n\n\n\n-------------------------------------"
 KOR_PPP_AI_BEHAVIOR_TXT: "§3Partido del Poder Popular§!"
 KOR_PPP_AI_BEHAVIOR_TXT_DESC: "Bajo la bandera del §3Partido del Poder Popular§!, el candidato Yoon Suk-yeol derrotó a su oponente en las elecciones presidenciales y asumió con éxito el cargo. Se prevé que durante su mandato, Yoon seguirá una línea política caracterizada por el conservadurismo cultural y el liberalismo económico. En vista de la fragmentación interna de los Estados Unidos, se espera que su administración fortalezca los lazos con Japón y otras democracias asiáticas, adoptando una política exterior de línea dura contra las potencias comunistas y oponiéndose firmemente tanto a China como a Corea del Norte.\n\n\n\n\n\n\n\n   £GFX_KOR_yoon_seok_youl\n\n\n\n\n\n\n\n\n-------------------------------------"

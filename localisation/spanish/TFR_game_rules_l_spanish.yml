 CRO_right_TXT_DESC: "Tras la victoria de las fuerzas extremistas en Serbia, la población croata se ha ido inquietando y radicalizando ante la amenaza de la inminente invasión serbia.\nUno de los principales partidos nacionalistas, el HSP, ha ganado un impulso constante, especialmente entre las filas militares, que culminó en un golpe militar que desmanteló el parlamento e instaló al HSP en el poder, con poderes autocráticos.\nDaniel Srb, el nuevo presidente, ha proclamado durante un discurso televisado que \"Croacia no se doblegará ante los revanchistas serbios\". El Gobierno nacionalista ya está llevando a cabo importantes reformas de militarización.\nEl país se rebautiza al Estado Independiente de Croacia. La ideología es Fascismo clásico.\n\n\n\n\n\n\n\n   £GFX_CRO_Daniel_Srb\n\n\n\n\n\n\n\n\n-------------------------------------\n\n§RRequiere:§!\nLa ultraizquierda o derecha debe haber ganado las elecciones serbias."

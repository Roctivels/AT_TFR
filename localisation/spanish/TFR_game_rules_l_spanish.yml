 The_APA_path: "@APA Camino del §AEjército Popular de Liberación Americano§!"
 The_APA_path_TXT_DESC: "Antes de eliminar los demonios y monstruos de California, el §AEjército Popular de Liberación Americano§! será comandado temporalmente por el líder interino §RMichael Prysner§!, después de lo cual se convocará un Congreso Obrero para transferir el poder a un gobierno civil.\nLa ideología es §RSocialismo revolucionario§!.\n\n\n\n\n\n\n\n   £GFX_APA_michael_prysner\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_APA_path_1_TXT: "£GFX_TFR_game_rule_flag_APA_reunified_libertarian_socialist  £GFX_APA_anarchist  §GAnarquistas§!"
 The_APA_path_1_TXT_DESC: "Durante demasiado tiempo, el nombre del socialismo ha sido arrastrado por el fango por dictadores totalitarios, capitalistas de estado y oportunistas. Pero ahora, con la facción §Ganarquista§! al frente del gobierno del EPLA, parece que ese día finalmente ha llegado a su fin. Con los §Ganarquistas§! al frente de la revolución, la pasión revolucionaria seguirá rugiendo hasta que toda reacción sea aplastada bajo la bota de las masas. Toda jerarquía debe ser destruida antes de que la revolución pueda ser terminada, desde el complejo industrial penitenciario que ha explotado a la población afroamericana para obtener billones de dólares de ganancias, hasta los puestos de trabajo verticales que han llevado a condiciones desmoralizantes en las corporaciones.\n\nCon la esperanza de borrar al Estado de la historia, cada persona tendrá voz y voto en el gobierno, creando finalmente un país del pueblo, por el pueblo y para el pueblo.\n\nSin embargo, a pesar de su ardiente pasión, la abolición del Estado no será fácil. Debido a la gran variedad del movimiento anarquista, compuesto por todos, desde anarcocomunistas tradicionales hasta sakistas y cibernihilistas, el faccionalismo seguirá siendo un problema. Si el faccionalismo se vuelve demasiado problemático, los sakistas radicales tomarán las riendas del poder, posiblemente llevando a los ex-Estados Unidos a un futuro mucho más turbulento. A pesar de las dificultades, ¡no hay mejor momento para la revolución total que ahora! ¡Proletarios del mundo, uníos!\n\nLa ideología es §tAnarcocomunismo§!.\n\n\n\n\n\n\n\n   £GFX_APA_mark_bray\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_APA_path_2_TXT: "£GFX_TFR_game_rule_flag_APA_reunified_social_democrat  £GFX_APA_neosocialist  §CNeosocialistas§!"
 The_APA_path_2_TXT_DESC: "A diferencia de los jóvenes idealistas que conforman gran parte de las bases del EPLA, los §Cneosocialistas§! saben que no deben creer que una América estable se pueda construir solo sobre ideales, esperanzas y sueños. La nación se encuentra azotada por la guerra, plagada de muerte y destrucción sin precedente: sus ciudades arrasadas, su gente hambrienta y pobre, y décadas de propaganda anticomunista de la Guerra Fría arraigadas en sus mentes. La idea de que el viejo orden pueda simplemente descartarse, su historia ignorarse y reescribirse, y su legado olvidarse es simplemente absurda. En cambio, los §Cneosocialistas§! argumentan que el nuevo Estado Socialista debe construirse sobre los cimientos establecidos por los ex-Estados Unidos. A diferencia de la ortodoxia izquierdista típica de las otras facciones, los §Cneosocialistas§! ven que la única manera de que el socialismo sobreviva es reformando las viejas instituciones, preservando la Carta de Derechos, la Constitución y los ideales de la antigua América para mantener vivo el legado del republicanismo en el país.\n\nEl socialismo no se impone con mano dura, sino con compasión, paz y comprensión. Aprenderemos lecciones de la Primavera de Praga y otros experimentos marxistas-humanistas del pasado. ¡El cálido abrazo del socialismo pronto se sentirá de costa a costa!\n\nLa ideología es §sSocialismo democrático§!.\n\n\n\n\n\n\n\n   £GFX_APA_julia_salazar\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_APA_path_3_TXT: "£GFX_TFR_game_rule_flag_APA_reunified_communist  £GFX_APA_octoberist  §OOctubristas§!"
 The_APA_path_3_TXT_DESC: "Aunque la bandera roja del socialismo se arrió, quizás por última vez en Moscú en 1991, los §Ooctubristas§! se asegurarán de que la llama del socialismo brille con fuerza en los Estados Unidos. Siguiendo el legado de sus homónimos, los revolucionarios que lucharon en la Revolución de Octubre, los §Ooctubristas§! garantizarán que América se convierta en un país socialista, próspero, y sostenible con su agenda centrada en la economía.\n\nConvencidos de que el estancamiento económico fue uno de los principales factores de la caída del socialismo en el antiguo bloque soviético, los §Ooctubristas§! se asegurarán de que los errores del pasado no se repitan. Si bien los §Ooctubristas§! se centran principalmente en ganar el apoyo del pueblo mediante amplias políticas de bienestar, propiedad obrera y reconstrucción, no dudan en reprimir cualquier oposición contrarrevolucionaria con todo el poder del partido de vanguardia y la dictadura del proletariado. Si bien la transformación económica propuesta por los §Ooctubristas§! suena ideal en teoría, el camino hacia el socialismo será difícil y con muchos obstáculos. Las fuerzas contrarrevolucionarias, la fuga de cerebros y una infraestructura deteriorada impedirán la reconstrucción.\n\n¡Como un fénix rojo que resurge de las cenizas de los Estados Unidos, la llama del socialismo jamás se apagará bajo el liderazgo de los §Ooctubristas§!!\n\nLa ideología es §RSocialismo revolucionario§!.\n\n\n\n\n\n\n\n   £GFX_APA_gloria_la_riva\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_APA_path_4_TXT: "£GFX_TFR_game_rule_flag_APA_reunified_totalitarian_socialist  £GFX_APA_jacobin  §RJacobinos§!"
 The_APA_path_4_TXT_DESC: "Al igual que los §Rjacobinos§! originales de la §YRevolución Francesa§!, los §Rjacobinos§! de la Segunda Revolución Americana encarnan el espíritu §Rrevolucionario§! y §Rpatriota§! de la nación. Ahora que están al mando del Ejército Popular de Liberación Americano, los §Rjacobinos§! buscarán moldear América a su visión: una sociedad socialista, cívica, nacionalista y revolucionaria.\n\nEl movimiento jacobino no rehúye la violencia ni el control estatal para lograr su visión, pero centralizar y remodelar el diverso e increíblemente caótico panorama político no será fácil. Cuanto más se sepa públicamente sobre nuestros intentos de reformar el gobierno, mayor será el coste de la reforma. Al mismo tiempo, si el poder de los enemigos internos crece demasiado, seguramente nos enfrentaremos a la amenaza de la contrarrevolución. Hay innumerables enemigos, tanto extranjeros como nacionales, que amenazan el poder del presidente Maupin. La Revolución debe ser protegida, y los ríos de América se teñirán de rojo con la sangre de sus enemigos.\n\nLa ideología es §tSocialismo americanista§!.\n\n\n\n\n\n\n\n £GFX_APA_caleb_maupin\n\n\n\n\n\n\n\n\n-------------------------------------"

 The_Government_of_National_Defense_Democratic_Democratic_Movement_TXT: "§OMovimiento Democrático§!"
 The_Government_of_National_Defense_Democratic_Democratic_Movement_TXT_DESC: "Movimiento Democrático, un partido centrista que existe desde antes de la caída de Francia ante los soviéticos. Autoproclamándose como la opción razonable y sensata, avanza con una visión mucho más centrista y liberal que cualquiera de los partidos contra los que compite.\nLa ideología es §ODemocracia cristiana§!.\n\n\n\n\n\n\n\n   £GFX_FRA_Francois_Bayrou\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_Government_of_National_Defense_Democratic_Republicain_TXT: "§YLes Républicains§!"
 The_Government_of_National_Defense_Democratic_Republicain_TXT_DESC: "Les Républicains, el favorito en la mente de la mayoría, es un movimiento casi idéntico al Agrupación Nacional anterior: un movimiento conservador que busca recuperar los valores tradicionales de Francia manteniendo el sistema democrático y el equilibrio de poder.\nLa ideología es §YGaullismo tradicional§!.\n\n\n\n\n\n\n\n   £GFX_FRA_Francois_Xavier_Bellamy\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_Government_of_National_Defense_Democratic_National_Conservative_TXT: "§3Unión Nacional Conservadora§!"
 The_Government_of_National_Defense_Democratic_National_Conservative_TXT_DESC: "La Unión Nacional Conservadora, una extraña mezcla de valores conservadores y militares. Se presentan como un partido conservador mucho más patriótico que LR, considerándose a sí mismos la verdadera continuación del sueño de Villiers y De Gaulle, de una Francia tradicionalista y patriótica.\nLa ideología es §3Gaullismo populista§!.\n\n\n\n\n\n\n\n   £GFX_FRA_Stephane_Ravier\n\n\n\n\n\n\n\n\n-------------------------------------"

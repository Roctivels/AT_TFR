 The_PRC_Revanchists_Path_Digital_Leninists_TXT: "§dClave a la omnisciencia y omnipotencia§!"
 The_PRC_Revanchists_Path_Digital_Leninists_TXT_DESC: "Cada cámara, cada procesador de datos y cada pieza de información en esta tierra está bajo nuestro control. Aquellos que creen que pueden resistirse a nosotros fantasean que pueden esconderse en la oscuridad, creyendo que lo que hacen es perfecto. Sin embargo, cada uno de sus movimientos y cada una de sus palabras han quedado expuestos desde hace mucho tiempo bajo nuestra mirada. No viven en la oscuridad, sino bajo una mirada invisible a la luz.\n\nLa ideología es §dSocialismo de vanguardia§!.\n\n\n\n\n\n\n\n   £GFX_PRC_Cheng_Wenqing\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_PRC_Revanchists_Path_Nationalists_TXT: "§dAscenso del Imperio Celestial§!"
 The_PRC_Revanchists_Path_Nationalists_TXT_DESC: "La historia de China está llena de las huellas de innumerables invasores extranjeros. Desde la caballería mongola hasta los samuráis japoneses, innumerables tiranos han considerado nuestra rica tierra como suya. Pero ¿por qué, en estos cinco mil años de existencia, China nunca ha caído del todo? ¿Por qué la nación china puede siempre derrotar a los invasores y defender su espíritu nacional? Esto se debe precisamente a las virtudes del pueblo chino. Esa creencia cultural profundamente arraigada ha estado grabada en cada centímetro de sangre desde hace mucho tiempo. Innumerables héroes han aparecido uno tras otro, arriesgando sus vidas para defender esta tierra a la que son leales hasta la muerte. Esta tierra siempre será su hogar. Yue Fei, Dong Cunrui y aquellos héroes anónimos que derramaron sangre por el país: son ellos quienes hicieron de China lo que es hoy y la hicieron grande.\n\nLa ideología es §dSocialismo de vanguardia§!.\n\n\n\n\n\n\n\n   £GFX_PRC_chen_quanguo\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_PRC_Revanchists_Path_Militarists_TXT: "§RPilar de soberanía carmesí§!"
 The_PRC_Revanchists_Path_Militarists_TXT_DESC: "Dondequiera que ondee la Bandera Roja de Cinco Estrellas, ahí está nuestro hogar. Esa bandera roja no es sólo un trozo de tela, es fe, voluntad y un muro de creencias construido con la sangre y la carne de cientos de millones de chinos. La era conocida como el \"hombre enfermo del Este Asiático\" ha sido sepultada por nuestras propias manos. La China que estaba a merced de otros e insultada por las grandes potencias hace tiempo que quedó reducida a cenizas. Esas personas sin carácter que imploran clemencia a Occidente, esos capituladores que olvidan sus raíces y esos esclavos culturales que se arrodillan ante países extranjeros serán considerados responsables ante la historia. ¡Las personas que están aquí presentes hoy son la nueva China construida con la sangre de cien mil jóvenes y el país rojo forjado con voluntad de hierro! Detrás de nosotros está el torrente de hierro del pueblo y de cientos de millones de almas leales. Sobre nuestros hombros pesan miles de años de civilización y el legado de innumerables mártires. Asustaremos a nuestros enemigos, haremos que Asia se rinda y dejaremos que el futuro recuerde: ¡China Roja nunca se rendirá!\n\nLa ideología es §RNacionalismo de izquierda§!.\n\n\n\n\n\n\n\n   £GFX_Li_Zuocheng_general\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_PRC_Quanguo_Path: "@PRC §dCamino de§! §8Chen Quanguo§!"
 The_PRC_Quanguo_Path_TXT_DESC: "§wLa tierra del emperador\nCruzando las arenas movedizas del Oeste y del Norte del Sur\nMar de la China Oriental al este y Daxia al norte\nDondequiera que la gente va, todos son sumisos.\nSus logros superan los de los Cinco Emperadores, y su bondad se extiende al ganado y a los caballos.\nTodos reciben la virtud y todos viven en paz.\nQue vivas por los siglos de los siglos§!\n\n\n\n\n\n\n\n   £GFX_PRC_chen_quanguo\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_PRC_Quanguo_Path_Communism_TXT: "£GFX_TFR_game_rule_flag_PRC_national_communist  §dEmpresa para durar§!"
 The_PRC_Quanguo_Path_Communism_TXT_DESC: "¿Qué es Qin Shi Huang? Él sólo engañó a 460 eruditos confucianos, mientras que nosotros engañamos a 46.000 eruditos confucianos. En nuestra represión de los contrarrevolucionarios, ¿no hemos matado a algunos intelectuales contrarrevolucionarios? He debatido con demócratas. Nos maldices, Qin Shi Huang. Eso no está bien. Somos cien veces mejores que Qin Shi Huang. Siempre hemos reconocido el nombre de Qin Shi Huang y el nombre de un dictador. Lamentablemente lo dicho no es suficiente y a menudo se nos pide que lo complementemos. Eres demasiado modesto. Es mucho más de 100 veces.\n\nEl país se rebautiza £GFX_TFR_game_rule_flag_PRC_national_communist  §dla República Popular Revolucionaria de China§!. La ideología es §dNacionalcomunismo§!.\n\n\n\n\n\n\n\n   £GFX_PRC_chen_quanguo_cool\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_PRC_Quanguo_Path_Exceptionalism_TXT: "£GFX_TFR_game_rule_flag_PRC_heavenly_republic  §8Elimina la herejía y conserva lo ortodoxo§!"
 The_PRC_Quanguo_Path_Exceptionalism_TXT_DESC: "§wNadie es más respetado por el pueblo que el Emperador, quien está confiado al Cielo y por eso es llamado Dios.§!\n\nEl país se rebautiza £GFX_TFR_game_rule_flag_PRC_heavenly_republic  §8la República Celestial Popular§!. La ideología es §8Excepcionalismo chino§!.\n\n\n\n\n\n\n\n   £GFX_PRC_chen_quanguo_cool\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_PRC_Quanguo_Path_Confucian_TXT: "£GFX_TFR_game_rule_flag_PRC_empire  §8Restaurar el legado Han§!"
 The_PRC_Quanguo_Path_Confucian_TXT_DESC: "§wLa gran unificación del Período de Primavera y Otoño es el principio constante del cielo y la tierra y la amistad común de los tiempos antiguos y modernos.§!\n\nEl país se rebautiza £GFX_TFR_game_rule_flag_PRC_empire  §8el Imperio Popular Chino§!. La ideología es §8Hiperconservadurismo confuciano§!.\n\n\n\n\n\n\n\n   £GFX_PRC_chen_quanguo_empire\n\n\n\n\n\n\n\n\n-------------------------------------"

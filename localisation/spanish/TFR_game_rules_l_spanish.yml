 The_Pre_Election_Congress_of_CPRF: "£GFX_CPRF_logo  Congreso pre-electoral del §RPCFR§!"
 The_Pre_Election_Congress_of_CPRF_TXT_DESC: "Tras la salida de §gPutin§!, el país vive un período de incertidumbre. El §RPartido Comunista de la Federación de Rusia§!, que tiene grandes posibilidades de ganar, se prepara para las elecciones presidenciales más importantes de la historia de Rusia. Sin embargo, el departamento de personal se enfrenta a una difícil tarea: elegir a alguien que pueda unir al partido y ofrecer al país un plan claro para el futuro."
 The_Pre_Election_Congress_of_CPRF_1_TXT: "§RYuri Afonin§!"
 The_Pre_Election_Congress_of_CPRF_1_TXT_DESC: "§RYuri Afonin§! es un fiel discípulo de Ziuganov, representante de la vieja guardia del §RPartido§!. Un joven, enérgico y leal apparátchik que puede continuar el rumbo de Ziuganov y ofrecer estabilidad.\nLa ideología es Marxismo soviético.\n\n\n\n\n\n\n\n   £GFX_Yuri_Afonin\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_Pre_Election_Congress_of_CPRF_2_TXT: "§RNikolái Jaritónov§!"
 The_Pre_Election_Congress_of_CPRF_2_TXT_DESC: "§RNikolái Jaritónov§! es un político veterano y candidato a las elecciones presidenciales de 2004. Es una figura de compromiso que puede satisfacer por igual a todos los miembros del §RPCFR§! proponiendo una política equilibrada y moderada.\nLa ideología es Marxismo soviético.\n\n\n\n\n\n\n\n   £GFX_SOV_Nikolai_Kharitonov\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_Pre_Election_Congress_of_CPRF_3_TXT: "§tSerguéi Lévchenko§!"
 The_Pre_Election_Congress_of_CPRF_3_TXT_DESC: "§tSerguéi Levchenko§! es el ex gobernador de la región de Irkutsk, un líder carismático y pragmático con experiencia en la gestión regional. Cuenta con el apoyo de elementos radicales del partido, como el llamado §tGrupo Rashkin§!, lo que da a su candidatura la connotación de una lucha más decidida e incluso agresiva por el poder.\nLa ideología es Populismo comunista.\n\n\n\n\n\n\n\n   £GFX_Sergey_Levchenko\n\n\n\n\n\n\n\n\n-------------------------------------"

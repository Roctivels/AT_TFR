 The_Kazakhstan_Riots: "@KAZ Disturbios kazajos"
 The_Kazakhstan_Riots_1_TXT: "§3Denazarbayevización total§!"
 The_Kazakhstan_Riots_1_TXT_DESC: "El actual presidente de Kazajistán, §3Kasim-Yomart Tokáev§!, no se muestra indiferente ante las protestas. Se pone del lado del pueblo e inicia purgas contra todos los §gantiguos apparatchiks de Nazarbáyev§! que durante mucho tiempo mantuvieron el poder. §3Tokáev§! también decide desacreditar el culto a la personalidad del propio Nazarbáyev, quien gobernó el país durante más de 30 años. Reconoce que muchas de las decisiones tomadas por Nazarbáyev fueron erróneas. Se anuncian reformas democráticas a gran escala y la redacción de una nueva constitución.\n\nKazajistán también expresa su gratitud a @SOV Rusia por su ayuda en tiempos difíciles. Como muestra de amistad y respeto hacia el país vecino, Kazajistán decidió iniciar una nueva etapa de integración económica entre ambos Estados. ¡La amistad ruso-kazaja es más fuerte que nunca!\n\nLa ideología es §3Constitucionalismo§!.\n\n\n\n\n\n\n\n   £GFX_KAZ_kassym_jomart_tokayev\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_Kazakhstan_Riots_2_TXT: "§gDenazarbayevización§!"
 The_Kazakhstan_Riots_2_TXT_DESC: "Las protestas en Kazajistán han terminado. Las autoridades informan del restablecimiento del orden en el país. 4.353 personas resultaron heridas, incluyendo 3.393 miembros de las fuerzas de seguridad. 238 muertos, incluyendo 19 policías y militares, fueron trasladados a morgues.\n\nComo resultado de estos sucesos, el país experimentó cambios en el gobierno y la esfera política. En particular, el primer ministro, el secretario de Estado, el presidente de la cámara baja del parlamento y la mitad de los ministros fueron reemplazados. Nazarbáyev también perdió su puesto como líder del partido gobernante Nur Otan, y §gTokáev§! asumió su cargo. Uno de los resultados de las protestas fue la reducción del precio de la gasolina, que fue el detonante de las protestas. ¿Será este el comienzo de algo grande, o Kazajistán no emprenderá reformas serias y mantendrá el statu quo? El tiempo lo dirá.\n\nLa ideología es §gAnocracia§!.\n\n\n\n\n\n\n\n   £GFX_KAZ_kassym_jomart_tokayev\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_Kazakhstan_Riots_3_TXT: "§gGolpe de Nazarbáyeva§!"
 The_Kazakhstan_Riots_3_TXT_DESC: "Durante las protestas en Kazajistán, ocurre algo increíble: un golpe de Estado. Las fuerzas del §gKNB§!, lideradas por Darigá Nazarbáyeva, la hija mayor del expresidente §gNursultán Nazarbáyev§!, toman el poder.\n\nEl clan Nazarbáyev, que ha ostentado el poder en Kazajistán durante décadas, tiene ahora el control total del país. Darigá Nazarbáyeva, quien anteriormente ocupó altos cargos en el Gobierno y el parlamento, se ha convertido en una auténtica autócrata. Se considera la Catalina la Grande kazaja y no oculta sus ambiciones. En sus discursos, promete llevar a Kazajistán a nuevas alturas y convertirlo en una de las principales potencias mundiales.\n\nLa ideología es §gOligarquía§!.\n\n\n\n\n\n\n\n   £GFX_Dariga_Nazarbayeva\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_Kazakhstan_Riots_4_TXT: "§ORevolución liberal§!"
 The_Kazakhstan_Riots_4_TXT_DESC: "Kazajistán es testigo de protestas a gran escala que provocan cambios significativos en la vida política del país. Muchos expertos y observadores califican lo que está sucediendo como una revolución liberal, que conduce a la llegada al poder de las fuerzas democráticas. Los principales líderes de las protestas son §OOpción Democrática de Kazajistán§! y §OMujtar Abliazov§!, exbanquero y empresario que se vio obligado a abandonar el país en 2009 tras un conflicto con el Gobierno.\n\nDurante las protestas, §OAbliazov§! regresó a Kazajistán y lideró un movimiento por la democracia y la libertad. Tras varios días de protestas masivas, el Gobierno kazajo se vio obligado a dimitir. §OMujtar Abliazov§! se convirtió en el nuevo presidente del país, prometiendo amplias reformas y la creación de un Estado democrático.\n\nLa idelogía es §OCentrismo§!.\n\n\n\n\n\n\n\n   £GFX_Mukhtar_Ablyazov\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_Kazakhstan_Riots_5_TXT: "§tRevolución socialista§!"
 The_Kazakhstan_Riots_5_TXT_DESC: "Las protestas en Kazajistán dieron lugar a lo que podría llamarse una revolución socialista, liderada por el §tMovimiento Socialista de Kazajistán§! y §tAinur Kurmanov§!. Las fuerzas de izquierda en Kazajistán se unieron en la lucha por los derechos de los trabajadores y los pobres. Los principales partidos de izquierda de Kazajistán, incluyendo el Partido Comunista, el Partido Socialdemócrata Nacional y el Partido Popular, lograron organizar una coalición inestable que tomó el poder en el país.\n\nEl nuevo Gobierno prometió reformas democráticas y sociales radicales para mejorar la vida de los ciudadanos. Una de las primeras medidas fue un aumento de salarios y pensiones, así como educación y atención médica gratuitas para todos los ciudadanos.\n\nLa ideología es §tSocialismo democrático§!.\n\n\n\n\n\n\n\n   £GFX_Aynur_Kurmanov\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_Tokaev_HELP: "@KAZ@SOV Tokáev pide ayuda rusa"
 The_Tokaev_HELP_TXT_DESC: "Tras el golpe anticonstitucional en Kazajistán, donde fuerzas antirrusas tomaron el poder, el presidente legítimo, Kasim-Yomart Tokáev, fue puesto a salvo por los servicios de seguridad rusos y se encuentra ahora en una dacha temporal en Oremburgo. Tras varios días de calma, escribió una carta al presidente de la Federación de Rusia solicitando ayuda para restablecer la estabilidad y el orden legal en la República de Kazajistán.\n\nLa primera parte de la carta fue ampliamente difundida por los medios rusos, pero en la segunda parte, a puerta cerrada, Tokáev admitió la falacia de su política multidimensional y ofreció concesiones significativas a Rusia si esta accedía a intervenir. Entre ellas, Tokáev incluso acordó celebrar referendos sobre la adhesión de Rusia a la Unión Soviética en los territorios del norte de Kazajistán. A pesar de estos generosos \"regalos\", la decisión final recae en el gobierno ruso.\n\n§RRequiere:§!\nTokáev renuncia en Disturbios kazajos."

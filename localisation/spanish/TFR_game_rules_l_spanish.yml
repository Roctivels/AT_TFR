 SUD_civil_war: "@SUD Ganador de la guerra civil sudanesa de 2023 @RSF"
 SUD_civil_war_TXT_DESC: "En 2019, las @SUD Fuerzas Armadas Sudanesas y las @RSF Fuerzas de Apoyo Rápido derrocaron conjuntamente el régimen del entonces presidente Omar al-Bashir, formando un Gobierno de transición en alianza. Sin embargo, surgieron profundas divisiones entre ambos bandos sobre cuestiones clave como la integración de las fuerzas militares, su papel en la estructura de poder nacional y la distribución de intereses. Finalmente, la reforma militar se convirtió en el detonante de una guerra civil, y las Fuerzas de Apoyo Rápido, reacias a aceptar la integración, dieron el primer paso. Dentro del país, diversos partidos políticos, grupos étnicos y tribus se alinearon con diferentes líderes militares, mientras que fuerzas externas alimentaron el conflicto con dinero y armas. Ambos bandos siguen estando igualados, con acuerdos de alto el fuego que rara vez se cumplen y sin consideración por el sufrimiento del pueblo.\n\nEl hambre y la muerte asolan el país..."

 Taiwan_strait: "@PRC §PGuerra de§! §RTaiwán§! @CHI"
 Taiwan_strait_TXT_DESC: "El estallido de la Segunda Guerra Civil Americana ha desencadenado una reestructuración geopolítica global. Ahora que el águila calva ya no domina la región de Asia y el Pacífico, se presenta la mejor oportunidad para la reunificación de China. Esa oportunidad es fugaz: hay que aprovechar el momento o se perderá para siempre."
 PRC_win_Taiwan_TXT: "@PRC Victoria de §Rla República Popular China§!"
 PRC_win_Taiwan_TXT_DESC: "Bajo el liderazgo decisivo del presidente §RXi Jinping§!, los §Rcentristas del Partido Comunista de China§! invocaron el espíritu de Zheng Chenggong para movilizar a toda la nación y agotar todos los recursos para ganar el conflicto del estrecho de Taiwán. Al destruir la debilitada Primera Cadena de Islas, han puesto fin definitivamente a la aspiración de casi ocho décadas de reunificación entre ambos lados del estrecho, sentando las bases para futuras reformas internas y un nuevo capítulo en la Guerra Fría de Asia y el Pacífico.\n\n\n\n\n\n\n\n   £GFX_PRC_xi_jinping_taiwan_win\n\n\n\n\n\n\n\n\n-------------------------------------"
 CHI_win_Taiwan_TXT: "@CHI Victoria de §Pla República de China§!"
 CHI_win_Taiwan_TXT_DESC: "Los §Rcentristas del Partido Comunista de China§! lanzaron una guerra en el estrecho de Taiwán en un intento de unificar a los dos bandos. Sin embargo, se vieron envueltos en un conflicto prolongado, ya que Japón y otras naciones brindaron un apoyo significativo a Taiwán, lo que detuvo la ofensiva. Al final, China continental no logró sus objetivos en el momento óptimo, lo que provocó un §ddescontento§! §Rpúblico generalizado§! y una erupción de §tmalestar§! §Csocial§!. La §Rfacción centrista§! sufrió un golpe devastador a su credibilidad, mientras que el gobierno de Taiwán sobrevivió a la terrible experiencia. Se espera que este fracaso desencadene un terremoto político dentro del PCCh, allanando el camino para una agitación interna dramática y solidificando las bases para una prolongada Guerra Fría en Asia y el Pacífico."
 Taiwan_gov_fate: "@PRC §PGuerra de§! §RTaiwán§! @CHI - Destino de los líderes taiwaneses"
 Taiwan_gov_fate_TXT_DESC: "Al terminar la guerra del estrecho de Taiwán con la victoria de la China comunista, altos funcionarios como Tsai Ing-wen y Su Tseng-chang hacen un último esfuerzo por preservar sus últimos rescoldos de democracia intentando escapar a Japón. Sin embargo, un viaje de ese tipo será extremadamente peligroso debido a las búsquedas que aún lleva a cabo el EPL. ¿Les sonreirá el destino a esos exiliados o caerán en manos chinas?"
 PRC_capture_Taiwan_gov_TXT: "@PRC Líderes de Taiwán capturados"
 PRC_capture_Taiwan_gov_TXT_DESC: "Tsai Ing-wen y Su Tseng-chang son capturados por el EPL cuando escapaban de la zona de guerra. Serán llevados a juicio por su crimen de dividir a la nación china."
 CHI_nocapture_Taiwan_gov_TXT: "@CHI Escape de líderes taiwaneses"
 CHI_nocapture_Taiwan_gov_TXT_DESC: "Escoltados por submarinos japoneses, Tsai Ing-wen y Su Tseng-chang consiguen escapar de la isla. Se esconderán en Japón y buscarán venganza por la derrota sufrida en Taiwán."

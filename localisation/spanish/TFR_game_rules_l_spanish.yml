 The_We_Love_Joe_Abrams_TXT: "§aCaracalla§!"
 The_We_Love_Joe_Abrams_TXT_DESC: "§lRegocíjese el campo y todo lo que hay en él; entonces todos los árboles del bosque rebosarán de contento delante de Jehová, que vino, porque ha venido a juzgar la tierra. ¡Juzgará al mundo con justicia y a los pueblos con su verdad!§!\n\n§aRobert B. Abrams§! será el sucesor. La ideología es §aBidenismo militar§!.\n\n\n\n\n\n\n\n   £GFX_LOU_robert_b_abrams\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_We_Love_Joe_Hunter_TXT: "§aHonorio§!"
 The_We_Love_Joe_Hunter_TXT_DESC: "§l...y, además, le dio autoridad de hacer juicio, por cuanto es el Hijo del hombre.\nNo os asombréis de esto, porque llegará la hora cuando todos los que están en los sepulcros oirán su voz; y los que hicieron lo bueno saldrán a resurrección de vida; pero los que hicieron lo malo, a resurrección de condenación.§!\n\n§aHunter Biden§! será el sucesor. La ideología es §aBidenismo§!.\n\n\n\n\n\n\n\n   £GFX_USB_Hunter_Biden\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_We_Love_Joe_Spencer_TXT: "§8Claudio§!"
 The_We_Love_Joe_Spencer_TXT_DESC: "§lA los otros dijo, oyéndolo yo: \"Pasad por la ciudad en pos de él, y matad; no miren con piedad vuestros ojos, no tengáis compasión.\nMatad a viejos, a jóvenes y a vírgenes, a niños y a mujeres, hasta que no quede ninguno. Pero a todo aquel sobre el cual esté la señal, no os acercaréis; y comenzaréis por mi santuario\".\nComenzaron, pues, desde los hombres ancianos que estaban delante del Templo. Les dijo: \"Contaminad la casa, llenad los atrios de muertos y salid\". Y salieron a matar en la ciudad.§!\n\n§8Richard Spencer§! será el sucesor. La ideología es §8Bidenismo americanista§!.\n\n\n\n\n\n\n\n   £GFX_USB_Richard_Spencer\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_We_Love_Joe_Milley_TXT: "§aJulia Mesa§!"
 The_We_Love_Joe_Milley_TXT_DESC: "§l\"Porque como los cielos nuevos y la nueva tierra que yo hago permanecerán delante de mí\", dice Jehová, \"así permanecerá vuestra descendencia y vuestro nombre. Y de mes en mes, y de sábado en sábado, vendrán todos a adorar delante de mí\", dice Jehová. \"Saldrán y verán los cadáveres de los hombres que se rebelaron contra mí; porque su gusano nunca morirá ni su fuego se apagará. Y serán abominables para todo ser humano\".§!\n\n§aMark Milley§! será el sucesor. La ideología es §aBidenismo militar§!.\n\n\n\n\n\n\n\n   £GFX_FLA_mark_milley\n\n\n\n\n\n\n\n\n-------------------------------------"

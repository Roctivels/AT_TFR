 The_We_Love_Joe_TXT_DESC: "§lLo veo, y con certeza te lo narro;\nveo a los astros, por segura huella\nproseguir sin tropiezo ni desbarro.\nQuinientos diez y cinco, con estrella\n\n\n\n\n\n\n\n£GFX_USB_the_one_who_is_clear   £GFX_USA_joe_biden\n\n\n\n\n\n\n\n\nnuncio de Dios, abatirá a la impura,\ny a su gigante, cómplice con ella.§!\n\n§RRequiere:§!\nEn \"¿Renuncia de §OBiden§!?\", se eligió \"§aCalígula§!\".\n£GFX_TFR_game_rule_flag_USB_Caligula_ACW  El §aGobierno de Salvación Nacional§! reunificó los ex-Estados Unidos."

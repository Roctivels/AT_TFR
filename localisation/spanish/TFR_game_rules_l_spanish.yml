 The_Canada_Elections: "@CAN Elecciones canadienses"
 The_Canada_Elections_TXT_DESC: "Dado que la Segunda Guerra Civil Americana ha terminado (y con la victoria del establishment), el \"estado de emergencia\" debería haber terminado. Canadá aprovecha este respiro para celebrar elecciones.\n\n\n\n\n\n\n\n   £GFX_CAN_hog_justin_trudeau_por\n\n\n\n\n\n\n\n\n-------------------------------------\n\n§RRequiere uno:§!\n@USBLa §CUnión de América§! reunificó los Estados Unidos.\n@USCEl §BGobierno Constitucional Americano§! reunificó los Estados Unidos."
 The_Canada_Elections_Liberals_Mark_Carney_TXT: "§OLiberales§!"
 The_Canada_Elections_Liberals_Mark_Carney_TXT_DESC: "En una sorprendente victoria, el §OPartido Liberal de Canadá§! se ha asegurado una victoria decisiva en las elecciones federales anticipadas, esta vez bajo un nuevo liderazgo. Tras la renuncia del primer ministro §OJustin Trudeau§! a principios de este mes, el exgobernador del Banco de Canadá y figura financiera global, §OMark Carney§!, tomó las riendas, prometiendo romper con las controversias del pasado y una mano firme para el futuro.\n\nLa campaña de §OCarney§! conectó con una nación fatigada por la división política y la incertidumbre internacional. Su formación tecnocrática y su refinada competencia ayudaron a los §Oliberales§! a reconstruir su imagen manchada y a conquistar a sectores clave de la población, desilusionados por los §gúltimos años de Trudeau§! en el cargo y por la creciente afluencia de migrantes y refugiados.\n\nCon una renovada confianza pública, una mayoría contundente en el Parlamento y una administración favorable en Estados Unidos, §OCarney§! se enfrenta ahora al reto de cumplir firmemente su promesa y la confianza del pueblo. Por primera vez en años, el centro político de Canadá ha encontrado su equilibrio. Si prevalece, solo el tiempo lo dirá.\n\nLa ideología es §ONeoliberalismo§!.\n\n\n\n\n\n\n\n   £GFX_CAN_hog_mark_carney_por\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_Canada_Elections_Liberals_Trudeau_TXT: "§OLiberales§! - §OTrudeau§!"
 The_Canada_Elections_Liberals_Trudeau_TXT_DESC: "§OJustin Trudeau§! y el §OPartido Liberal de Canadá§! ganaron por un estrecho margen unas elecciones federales anticipadas, aferrándose al poder a pesar de la impopularidad generalizada y las crecientes controversias. Anteriormente aclamado como un líder progresista, el mandato de Trudeau se ha visto empañado por dificultades económicas, incompetencia y una creciente percepción de §gautoritarismo§! tras la invocación del Acta de Emergencias.\n\nInicialmente justificada como una medida necesaria para restablecer el orden público y la seguridad nacional en tiempos sin precedentes, la decisión se ha convertido en blanco de críticas tanto de la derecha como de la izquierda. Muchos canadienses la consideran una peligrosa extralimitación del poder ejecutivo, que ha manchado permanentemente el §glegado de Trudeau§! y erosionado la confianza en su liderazgo y §Osu partido§!.\n\nA pesar de estos reveses, Trudeau logró una ajustada victoria, menos un triunfo que un alto el fuego temporal en un país cansado de la división. En lugar de indicar una confianza renovada, los resultados presentan un panorama muy frágil, sostenido por poco más que la costumbre y la vacilación. Mientras §OTrudeau§! inicia su cuarto mandato, surgen crecientes dudas sobre cuánto tiempo podrá aguantar el primer ministro antes de que todo se derrumbe.\n\nCon el pelo suelto, cantamos desafiantes, ¡implacables hasta la muerte! La ideología es §ONeoliberalismo§!.\n\n\n\n\n\n\n\n   £GFX_CAN_hog_justin_trudeau_defeat_por\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_Canada_Elections_Conservatives_TXT: "§3Conservadores§!"
 The_Canada_Elections_Conservatives_TXT_DESC: "El §3Partido Conservador de Canadá§! ha resultado victorioso en unas elecciones federales anticipadas, poniendo fin a la §gprolongada§! §Oera Trudeau§! tras las consecuencias políticas de la guerra civil que estalló en Estados Unidos.\n\nLos §Oliberales§!, que convocaron las elecciones con la esperanza de asegurar un mandato renovado en un contexto de mayor estabilidad en los EE.UU., sufrieron una rotunda derrota, ya que su gestión de la crisis dejó al país profundamente dividido. Tras el fallido intento de proteger a Canadá de las repercusiones de la guerra civil en el extranjero, el descontento público con el §Ogobierno liberal§! alcanzó su punto álgido. Muchos canadienses consideraron la \"intervención\" como una intromisión innecesaria en los asuntos exteriores, que coincidió con el aumento de la llegada de refugiados.\n\nLos votantes se volcaron hacia el §3Partido Conservador§!, liderado por el populista §3Pierre Poilievre§!, quien en su campaña prometió restaurar la estabilidad, la rendición de cuentas y poner fin a lo que calificó de políticas exteriores imprudentes. Los §3conservadores§! consiguieron una clara mayoría en el Parlamento, cerrando finalmente el telón a casi una década de gobierno §Oliberal§! marcada por la impopularidad.\n\nLa ideología es §3Neoconservadurismo§!.\n\n\n\n\n\n\n\n   £GFX_CAN_hog_pierre_poilievre_por\n\n\n\n\n\n\n\n\n-------------------------------------"

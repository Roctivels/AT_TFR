 The_assassination_Penny_Wong: "@AST El asesinato de Penny Wong £GFX_TFR_game_rule_flag_AST_patriot"
 The_assassination_Penny_Wong_TXT_DESC: "Días después de la derrota en la guerra de Taiwán, la ex ministra de Asuntos Exteriores y ex líder de la oposición en el Senado, Penny Wong, que siempre ha abogado por la paz, pronuncia un discurso ante el público sobre la coexistencia pacífica con China. Poco después, un asaltante le dispara a quemarropa con una pistola casera. La policía, incapaz de encontrar al sospechoso o el arma inmediatamente después del tiroteo, encontró a Brett Contrail, un veterano de la guerra en Taiwán y miembro fundador del Frente Patriota Australiano, en una cafetería cercana con su ordenador portátil. Brett, miembro fundador del grupo que se hace llamar Frente Patriota que surgió al comienzo de la Segunda Guerra Civil Americana, es conocido por la policía local por cargos menores previos relacionados con drogas. Después de una búsqueda breve y apresurada en su disco duro, se descubre que tiene \"múltiples archivos sobre la creación de armas caseras\", así como un manifiesto que alaba a Thomas Rousseau.\n\nAunque este caso parece claro y claro, muchos han afirmado públicamente que la policía australiana ha arrestado al hombre equivocado, citando la naturaleza apresurada de la búsqueda y su servicio a Australia en la reciente guerra. Con un jurado ya decidido entre los ciudadanos rurales, la nación espera su veredicto.\n\nEl resultado de este caso reflejará indirectamente el estado actual del país.\n\n§RRequiere:§!\nLa OTDP perdió la guerra de Taiwán."
 The_assassination_Penny_Wong_Liberals_Party_TXT: "§YPartido Liberal§!"
 The_assassination_Penny_Wong_Liberals_Party_TXT_DESC: "Incluso un jurado compuesto por residentes rurales encontró a Brett Contrail culpable de asesinato en segundo grado, lo que demuestra que no hay lugar para el extremismo en Australia. El país pasa sin problemas a las elecciones después de la derrota, y el §YPartido Liberal§! gana la mayoría de los escaños.\nLa ideología es Liberalismo clásico.\n\n\n\n\n\n\n\n   £GFX_Scott_Morrison\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_assassination_Penny_Wong_National_Party_TXT: "§3Partido Nacional§!"
 The_assassination_Penny_Wong_National_Party_TXT_DESC: "ncluso un jurado compuesto por residentes rurales encontró a Brett Contrail culpable de asesinato en segundo grado, lo que demuestra que no hay lugar para el extremismo en Australia. El país pasa sin problemas a las elecciones después de la derrota, y el §3Partido Nacional§! gana la mayoría de los escaños.\nLa ideología es Conservadurismo clásico."
 The_assassination_Penny_Wong_Military_Junta_TXT: "§aJunta Militar§!"
 The_assassination_Penny_Wong_Military_Junta_TXT_DESC: "El jurado encontró a Brett Contrail culpable de posesión de archivos militares restringidos, ni cadena perpetua ni absolución, un corazón inquieto atrapado en el medio. Los veteranos marchan sobre Camberra y las §aFuerzas de Defensa§! toman el poder.\nLa ideología es Junta militar.\n\n\n\n\n\n\n\n   £GFX_AST_Ben_Roberts_Smith\n\n\n\n\n\n\n\n\n-------------------------------------"

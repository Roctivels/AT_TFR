 The_assassination_Penny_Wong_Australia_First_TXT_DESC: "El jurado encontró a Brett Contrail inocente, lo que indica que Australia está consumida por un deseo de venganza. El §8Partido Australia Primero§! marcha sobre Camberra y toma con éxito el aparato estatal.\nEl país es rebautizado el Estado Australiano. La ideología es Etnonacionalismo.\n\n\n\n\n\n\n\n   £GFX_AST_Jim_Saleam\n\n\n\n\n\n\n\n\n-------------------------------------"

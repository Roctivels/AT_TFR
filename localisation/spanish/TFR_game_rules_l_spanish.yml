 The_Path_of_Lukashenko: "£GFX_TFR_game_rule_flag_USSR_SOV_communist  El camino de §RLukashenko§!"
 The_Path_of_Lukashenko_TXT_DESC: "§dEl socialismo§! §RBat'kin nos§! §gguía hacia§! adelante\n\n\n\n\n\n\n\n   £GFX_Lykashenko_drip\n\n\n\n\n\n\n\n\n-------------------------------------\n\n§RRequiere:§!\n§RLukashenko§! ganó la primera elección presidencial de la §RUnión§!."
 The_Path_of_Lukashenko_1_TXT: "§dPrincipios del juche§!"
 The_Path_of_Lukashenko_1_TXT_DESC: "-------------------------------------\n\n\n\n\n£GFX_SOV_lukashenko_our_comrade_father\n\n\n\n\n\n§dLukashenko§! estudia los excelentes §dmétodos del juche§! de @PRK Oriente y, de acuerdo con las condiciones nacionales, propone de manera innovadora nuevos conceptos (como el cristianismo estalinista y el nacionalcomunismo ruso). §dLukashenko§!, ¡nuestro gran camarada!\nLa ideología es Pensamiento Aleksandr Lukashenko.\n\n\n\n\n\n\n\n £GFX_ComLuka\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_Path_of_Lukashenko_2_TXT: "§RCentralizar el partido§!"
 The_Path_of_Lukashenko_2_TXT_DESC: "Uniros como uno y mirad hacia adelante.\nLa ideología es Nacionalismo soviético.\n\n\n\n\n\n\n\n   £GFX_Alexander_Lukashenko\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_Path_of_Lukashenko_3_TXT: "§gDictadura presidencial, democracia soviética§!"
 The_Path_of_Lukashenko_3_TXT_DESC: "El pragmatismo constante de §gBat'ka§! ha generado circunstancias peculiares en la Unión Soviética. Por un lado, está la §gdictadura presidencial§!, que reprime a la izquierda. Por otro lado, está el §3deshielo§! de la §Oderecha§!, que reconstruye la democracia soviética. Mantiene la vigilancia contra las tendencias derechistas, pero sobre todo se defiende de las tendencias \"izquierdistas\".\nLa ideología es Socialismo pragmático.\n\n\n\n\n\n\n\n   £GFX_SOV_Alexander_Lukashenko_Cool\n\n\n\n\n\n\n\n\n-------------------------------------\n\n§RRequiere:§!\nLa §RRusia soviética§! eligió el camino económico \"Adaptación al socialismo chino\"."
 The_Levchenko_Reform: "£GFX_TFR_game_rule_flag_USSR_SOV_communist  Reformas de §tLevchenko§!"
 The_Levchenko_Reform_TXT_DESC: "Después de ganar las elecciones, §tLevchenko§! se embarca en su agenda de reformas para llevar la democracia a la Unión Soviética.\n\n\n\n\n\n\n\n £GFX_Sergey_Levchenko\n\n\n\n\n\n\n\n\n-------------------------------------\n\n§RRequiere:§!\n§tLevchenko§! ganó la primera elección presidencial de la §RUnión§!."
 The_Levchenko_Reform_1_TXT: "Reformas de §tLevchenko§! exitosas"
 The_Levchenko_Reform_1_TXT_DESC: "Después de varias rondas de reconciliación y compromiso, §tLevchenko§! integra varias facciones rojas y establece el §tPartido Democrático de los Comunistas de la Unión Soviética§!, trabajando juntos para reformar con éxito el país. El socialismo de la Unión Soviética no se limita al \"rostro humano\", sino que es completamente un nuevo socialismo democrático.\nLa ideología es Populismo comunista.\n\n\n\n\n\n\n\n £GFX_Sergey_Levchenko\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_Levchenko_Reform_2_TXT: "Regreso del §RPCUS§!"
 The_Levchenko_Reform_2_TXT_DESC: "Sin consulta previa, las reformas radicales conducen a la destitución del presidente §tLevchenko§!. El §RPartido Comunista de la Unión Soviética§!, reconstituido para contrarrestar al §tPartido Democrático de los Comunistas de la Unión Soviética§!, llega al poder e implementa la partidocracia. El ex ministro de Asuntos Exteriores §RDenis Parfenov§! asume la presidencia.\nLa ideología es Marxismo-leninismo.\n\n\n\n\n\n\n\n £GFX_Denis_Parfenov\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_Levchenko_Reform_3_TXT: "Corrección §tsucesora§!"
 The_Levchenko_Reform_3_TXT_DESC: "Las reformas radicales, que se llevaron a cabo sin previo acuerdo, llevaron a la destitución del presidente §tLevchenko§!. El §tPartido Democrático de los Comunistas de la Unión Soviética§! colabora con el fragmentado §RPartido Comunista de la Unión Soviética§! para corregir los errores. El ex primer ministro §tNikolái Bondarenko§! es nombrado presidente.\nLa ideología es Populismo comunista.\n\n\n\n\n\n\n\n £GFX_Nikolay_Bondarenko\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_Red_Navalny: "£GFX_TFR_game_rule_flag_USSR_SOV_communist  £GFX_RF_logo  §ONavalni rojo§!"
 The_Red_Navalny_TXT_DESC: "Todos los grandes hechos y personajes de la historia mundial aparecen, por así decirlo, dos veces.\n\n\n\n\n\n\n\n   £GFX_SOV_Navalny_LibSoc\n\n\n\n\n\n\n\n\n-------------------------------------\n\n§RRequiere:§!\n§ONavalni§! ganó la primera elección presidencial de la §RUnión§!."
 The_Red_Navalny_1_TXT: "£GFX_RF_logo  §OBiparti§!§tdismo§! £GFX_CPRF_logo"
 The_Red_Navalny_1_TXT_DESC: "£GFX_RF_logo  §ORusia del Futuro§! y el £GFX_CPRF_logo  §tPartido Comunista§! trabajan juntos para establecer la Sociedad Cívica Soviética.\nLa ideología es Socialismo liberal.\n\n\n\n\n\n\n\n   £GFX_SOV_Navalny_LibSoc\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_Red_Navalny_2_TXT: "§RGobierno del Ejército Soviético§!"
 The_Red_Navalny_2_TXT_DESC: "§O\"Ceso mis actividades en el puesto de presidente de la URSS. Tomo esta decisión por consideraciones de principio\".§!\n§R\"Hacemos un llamamiento a todos los ciudadanos de la Unión Soviética para que tomen conciencia de sus deberes ante el país y presten toda la ayuda posible al Comité Estatal para el Estado de Emergencia en la URSS y a los esfuerzos por sacar al país de la crisis\"§!.\nLa ideología es Junta Militar de Izquierda.\n\n\n\n\n\n\n\n   £GFX_Valery_Gerasimov_Soviet\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_Red_Navalny_3_TXT: "§tEl Partido Comunista vuelve al poder§!"
 The_Red_Navalny_3_TXT_DESC: "Tras un golpe militar que obliga a §ONavalni§! a dimitir, §RValeri Guerásimov§! transfiere el poder al §tGobierno civil§!.\nLa ideología es Populismo comunista.\n\n\n\n\n\n\n\n   £GFX_Valery_Rashkin_dark\n\n\n\n\n\n\n\n\n-------------------------------------"

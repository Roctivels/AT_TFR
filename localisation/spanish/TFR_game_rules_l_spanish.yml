 The_PRC_GAW_Japan_1_TXT: "@TOK@CGK@KYU@HOK@SHK@KTO Vengar a Nankín @CHB@KSI@TOH@OSA@NAG@SNI"
 The_PRC_GAW_Japan_1_TXT_DESC: "§REl concepto de \"Japón\" desaparecerá de la historia...§!\n\n§RRequiere:§!\nLos §Rcentristas§! o los §drevanchistas§! llegan al poder."
 The_PRC_GAW_Japan_2_TXT: "@JAP Reconstruir Japón"
 The_PRC_GAW_Japan_2_TXT_DESC: "En el futuro, la República Popular de Japón será dirigida por el Partido Comunista de Japón.\n\n§RRequiere:§!\nLa China revanchista no completó \"Ascenso del Imperio Celestial\"."
 The_PRC_Liberal_Progress_of_Reforms: "@PRC Progreso de las §Creformas§!"
 The_PRC_Liberal_Progress_of_Reforms_TXT_DESC: "Cuando la IA elige a los §Creformistas§!, sigue seleccionando al azar decisiones que pueden estancar permanentemente el progreso de las reformas y provocar un estancamiento del enfoque nacional."
 The_PRC_Liberal_Progress_of_Reforms_1_TXT: "Progreso de las reformas aumenta repentinamente"
 The_PRC_Liberal_Progress_of_Reforms_1_TXT_DESC: "Tanto las políticas de \"Desencadenar la Asamblea Popular\" como la del \"Partido del Siglo XXI\" incrementarán el Progreso de las reformas para asegurar el normal desarrollo del juego."
 The_PRC_Fifth_Modernization: "@PRC §CQuinta Modernización§!"
 The_PRC_Fifth_Modernization_TXT_DESC: "En los años 1980, los estudiantes universitarios que apoyaban la reforma defendían que, además de la política de las \"Cuatro Modernizaciones\" destinada a fortalecer el poder del país, no se debía descuidar la \"Quinta Modernización\" -la modernización del sistema político- y llamaban al Partido a lanzar una campaña de democratización. Aunque sus esfuerzos finalmente fracasaron, heredaremos el espíritu y el legado que dejaron. ¡El movimiento democrático de China renacerá hoy!\n\n\n\n\n\n\n\n   £GFX_PRC_Wang_Yang2\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_PRC_Fifth_Modernization_1_TXT: "§CPlataforma del Partido§!"
 The_PRC_Fifth_Modernization_1_TXT_DESC: "Contrariamente al estereotipo, el PCCh siempre ha practicado estrictamente el \"centralismo democrático\" como uno de sus principios básicos. Mediante mecanismos democráticos eficaces, el PCCh pudo derrotar a los reaccionarios y lograr la victoria en la revolución. Sin embargo, debido a las luchas políticas posteriores a 1949 y al culto a la personalidad que rodea al líder, esta gran tradición fue olvidada gradualmente. Ahora, restableceremos un mecanismo democrático reformado dentro del Partido. Dado que el PCCh es la pieza central indiscutible de la política china, la democracia dentro del Partido significa democracia en el país."
 The_PRC_Fifth_Modernization_2_TXT: "§CDemocracia socialista china§!"
 The_PRC_Fifth_Modernization_2_TXT_DESC: "Hemos convertido la Asamblea Popular en el núcleo de nuestra política democrática. A través del Congreso Popular, los representantes pueden ahora defender de manera significativa la agenda democrática en las actividades políticas regulares de China. Daremos el paso crucial de empoderar a los partidos democráticos, que antes sólo podían \"discutir política\", para que hagan una diferencia real a través de las elecciones y el debate público. Además, incluso dentro del PCCh, los miembros del partido podrán expresar sus opiniones. Así comienza un gran experimento en democracia."

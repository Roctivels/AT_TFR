 The_CAC_path_2_TXT_DESC: "§tLa Coalición Adelante Cascadia§!: Una coalición centrista de progresistas, libertarios y conservadores. Buscan guiar a Cascadia y asegurar su libertad. El país se rebautiza la República Cascandia.\nLa ideología es Nacionalismo cascadiano.\n\n\n\n\n\n\n\n   £GFX_CAC_brandon_letsinger\n\n\n\n\n\n\n\n\n-------------------------------------"
 The_CAC_path_3_TXT: "£GFX_TFR_game_rule_flag_CAC_totalitarian_socialist  §dPartido Comunista Revolucionario de los Estados Unidos de América§!"

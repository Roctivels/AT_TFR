 The_GER_Socialist_Revolution_Socialist_Federation_TXT: "£GFX_TFR_game_rule_flag_GER_soc_federation  §RFederación Socialista§!"
 The_GER_Socialist_Revolution_Socialist_Federation_TXT_DESC: "Decididos a adoptar un estilo de socialismo más democrático y multipartidista, los revolucionarios revivieron el Partido del Socialismo Democrático y proclamaron la £GFX_TFR_game_rule_flag_GER_soc_federation  §RFederación Socialista Alemana§!."
 The_GER_Socialist_Diplomacy: "£GFX_TFR_game_rule_flag_GER_communist  Estrategia diplomática de la §RAlemania socialista§!"
 The_GER_Socialist_Diplomacy_TXT_DESC: "Después de haber logrado la victoria revolucionaria en toda Europa Occidental, el nuevo gobierno socialista se enfrenta ahora a una difícil elección: puede centrarse en conseguir más aliados o concentrarse en reconstruir su propia capacidad militar.\n\n§RRequiere:§!\nEl §8Partido Liberal-Demócrata de Rusia§! ganó las elecciones rusas.\nLa OTAN perdió la Guerra Europea."

 The_SAF_civil_war: "@SAF Ganador de la guerra civil sudafricana"
 The_SAF_civil_war_TXT_DESC: "La turbulencia económica observada tras el colapso de Estados Unidos se ha sentido a nivel mundial, afectando especialmente a Sudáfrica: millones de sudafricanos están desempleados y la ya elevada tasa de pobreza no ha hecho más que aumentar en los últimos años. Además de la crisis económica, las tensiones raciales entre los africanos nativos y la población §8bóer§! se han decuplicado, con duras represalias, numerosos disturbios raciales y otros incidentes que no han hecho más que causar dolor a sus conciudadanos. Muchos analistas han hecho referencias directas a niveles de violencia no vistos desde la época del apartheid.\n\nLas elecciones generales se celebran en medio del caos; sería absurdo asumir que los problemas del país ya han pasado; más bien, parece que apenas están comenzando."

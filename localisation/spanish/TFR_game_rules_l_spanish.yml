 The_PRC_beijing_government_Leader: "@PRC Jefe de Gobierno de Pekín £GFX_TFR_game_rule_flag_PRC_nick_land_cosmetic"
 The_PRC_beijing_government_Leader_TXT_DESC: "Desde los centros comerciales del sur hasta los centros industriales del norte, una ola de disturbios y protestas ha barrido China, socavando la autoridad del gobierno central a medida que crecen el escepticismo público y las divisiones internas.\n\n§RRequiere:§!\nIDEA perdió la Gran Guerra Asiática."
 The_PRC_beijing_government_Leader_Huang_Ming_TXT: "§aHuang Ming§!"
 The_PRC_beijing_government_Leader_Huang_Ming_TXT_DESC: "En medio del caos, el general Huang Ming, comandante del Comando Central del EPL, ha emergido como la figura clave. Mientras anunciaba un cierre total en Pekín en los medios nacionales, el EPL rápidamente aseguró varios sitios gubernamentales críticos en la capital y extendió su control militar al norte de China.\n\nAunque Pekín y las regiones circundantes permanecen estables bajo la autoridad del EPL, la agitación que envuelve al resto del país no da señales de disminuir. El estancamiento económico, la escasez de bienes y los fallos en el gobierno local han alimentado un descontento generalizado. En las principales ciudades, los trabajadores enojados han salido a las calles; en las áreas rurales, los agricultores y las milicias locales se están movilizando; e incluso los líderes empresariales -rara vez se expresan abiertamente- están desafiando abiertamente a Pekín.\n\nNo está claro si la estrategia de mano dura del EPL extinguirá las llamas o agregará leña al fuego. Lo que está claro es que China se encuentra ahora en una encrucijada histórica, y la ley marcial en el norte de China solo ha otorgado a la república un breve respiro.\n\nLa ideología es Junta militar.\n\n\n\n\n\n\n\n   £GFX_Huang_Ming\n\n\n\n\n\n\n\n\n-------------------------------------"

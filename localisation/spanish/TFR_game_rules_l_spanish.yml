 The_PRC_GAW_PRK_2_TXT: "@PRK §dUna sola Corea§!"
 The_PRC_GAW_PRK_2_TXT_DESC: "§d----------------------------------------------------------------\n\n\n\n\n\n\n\n                     £GFX_Kim_Jong_Un_Marshal\n\n\n\n\n\n\n\n\n\nOficiales y soldados de nuestro heroico Ejército Popular de Corea: cada victoria alcanzada en esta tierra, cada gran logro, lleva la huella imborrable de las monumentales contribuciones de nuestras fuerzas armadas revolucionarias. Estos triunfos están profundamente arraigados en sus sacrificios. Hoy, nuestro ejército está listo, plenamente preparado para enfrentar cualquier guerra. Cualquier fuerza que se atreva a buscar una confrontación militar con la República Popular Democrática de Corea será completamente aniquilada.\n\n¡Viva nuestra gloriosa patria, la República Popular Democrática de Corea!§!\n\n\n§R\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\n\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\n\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\n\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/\\o/§!"

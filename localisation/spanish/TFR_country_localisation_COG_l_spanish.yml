 congo.1.t: "Tercera Guerra del Congo"
 congo.1.d: "Tras meses de agitación económica tras la crisis del petróleo, la República Democrática del Congo ha vuelto a colapsar hacia una era de caudillismo. Tras el fallido intento del grupo opositor \"Alianza de las Fuerzas Democráticas del Congo\" de tomar el poder, han vuelto a tomar las armas en la región noreste del país, prometiendo restablecer el orden por todos los medios. Mientras tanto, grupos separatistas respaldados por Ruanda en el este han intensificado sus esfuerzos por la independencia. En el sur, la tumultuosa región de Katanga también se ha separado, luchando por forjar su propio futuro, independizándose de la autoridad central en Kinshasa.\n\nLa República Democrática del Congo, que ya es el sexto país más pobre del mundo, se enfrenta a una catástrofe humanitaria sin precedentes. Con millones de personas en el interior que dependen de la ayuda exterior y de la economía de exportación para su sustento, sus vidas penden de un hilo. Los agricultores de subsistencia también se enfrentan a la escasez, ya que se prevé que los combates destruyan grandes extensiones de tierra cultivable."
 congo.1.a: "Dios salve al Congo."
 CAR_merc_state: "Estado mercenario"
 car.7.t: "La Federación de Soldados"
 car.7.d: "Mientras que las noticias procedentes de África Central y la antigua República Democrática del Congo han sido particularmente escasas últimamente, se han desarrollado una serie de acontecimientos que no ha pasado desapercibido por los principales medios. En medio de una extenuante guerra civil que ha dejado al país en su peor crisis humanitaria desde los años 90, \"Gleb\", un misterioso mercenario ruso con conexiones con la empresa militar privada \"Grupo Wagner\", ha vencido sobre las muchas facciones de la región que luchaban por el poder. Varias \"Administraciones Cívico-Militares\" han sido establecidas por el país para gobernar debidamente, confiando en mercenarios internacionales y colaboradores locales para mantener el poder. La última evolución de la Crisis del Congo ha resultado en Gleb y el Consejo de Comandantes declarando la \"Federación de Soldados\" como el nuevo aparato estatal que dirige la administración del país. Esto también ha resultado en el giro a la neutralidad del país, separándose efectivamente del Grupo Wagner. Con este anuncio, se espera que las empresas militares privadas experimenten un repunte en atención y reputación, siendo ya uno de los negocios más grandes del mundo como consecuencia de los eventos que han moldeado el panorama mundial en los últimos años. Grupos de resistencia clandestinos esparcidos por el Congo también fueron rápidos en publicar comunicados sobre esto, reiterando que harán lo que haga falta para reclamar su patria de los ocupantes."
 car.7.a: "Lo que sea por dinero."
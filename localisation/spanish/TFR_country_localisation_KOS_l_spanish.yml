l_spanish:
 KOS_partial_lack_of_recognition: "Falta parcial de reconocimiento"
 KOS_partial_lack_of_recognition_desc: "El fin ya estaba escrito cuando los últimos alientos de Yugoslavia reflejaban los pecados del nacionalismo serbio. Cuando nos alzamos con la ayuda de la OTAN, luchamos con valentía y logramos resistir la embestida serbia, llevando la libertad a los albaneses de Yugoslavia, que habían sido reprimidos durante más de un siglo. A medida que las líneas del frente se estabilizaban y el rugido de los morteros se calmaba lentamente, la situación en la que nos encontrábamos se hizo evidente de inmediato. Serbia y sus aliados se habían negado valientemente a reconocer nuestra independencia, por no mencionar siquiera reconocernos diplomáticamente como un socio independiente.\n\nComo resultado, hemos caído en la zona gris de ser un Estado parcialmente reconocido, con la prohibición de unirnos a la UE y la ONU, que nos habían apoyado décadas atrás. A pesar de ello, hemos encontrado un fuerte apoyo de las potencias occidentales, en particular de nuestros hermanos de Tirana. Y, a la luz de la tormenta que se avecina, parece improbable que nuestra situación exterior cambie, ya que el vigor del nacionalismo serbio sigue intacto."
 KOS_Serbian_minority_tensions_high: "Tensiones altas con la minoría serbia"
 KOS_Serbian_minority_tensions_high_desc: "En comparación con el resto de los Balcanes, Kosovo puede ser considerado uno de los pocos Estados que realmente reconocen a sus minorías, con los idiomas turco, serbio, bosniaco y romaní siendo oficialmente reconocidos y con algunas medias para garantizar el igualitarismo puestas en marcha. A pesar de esto, los viejos rencores de nuestra guerra de independencia siguen siendo uno de los mayores problemas que enfrentamos hasta la actualidad.\n\nLos serbios siguen organizando ataques terroristas y reyertas callejeras ocasionalmente, con pérdidas de vidas humanas bajo la justificación que nosotros estamos tratando de \"reducir\" la minoría serbia al reforzar el idioma albanés para promocionar la cooperación entre nuestras minorías. Las tensiones son, sin embargo, una causa de preocupación, con los choques en nuestra frontera con Serbia volviéndose más habituales, la desconfianza entre nuestra gente volviéndose más generalizada e incluso supuestos ataques con mortero llevados a cabo en algunas de nuestros pueblos y protestas inundando Pristina.\n§RSi no queremos que Kosovo se engulla en su propia civil o incluso en una segunda guerra contra Serbia, debemos tomar medidas para promover la cooperación y acabar con las disputas inmediatas.§!"
 KOS_backwater_of_the_balkans: "Remanso de los Balcanes"
 KOS_backwater_of_the_balkans_desc: "La agitación política, la guerra y los conflictos generales de los Balcanes se han convertido en algo natural para las tierras de Iliria, y cada vez es más evidente que Kosovo fue uno de los Estados que más sufrió las décadas de enfrentamientos. Nuestra economía se había estancado en gran medida durante las últimas décadas, con nuestra industria vitivinícola sin crecimiento y nuestros recursos sin explotar, por no mencionar el mal estado de nuestra infraestructura.\n\nA pesar de ello, Kosovo se erige como uno de los Estados balcánicos con mayor potencial sin explotar gracias a nuestros enormes yacimientos minerales y tierras fértiles de cultivo, con la única ventaja de haber logrado esquivar por poco la inflación de la posguerra y la crisis financiera de 2008. Solo hace falta utilizar nuestros recursos con cuidado y empezar a reinvertirlos en nuestra economía, y podremos dejar de ser un estado prácticamente fallido, y quizás tengamos alguna posibilidad de luchar contra Serbia en caso de que desaparezca el apoyo de la OTAN."
 KOS_pawn_of_nato: "Peón de la OTAN"
 KOS_pawn_of_nato_desc: "La independencia misma de Kosovo solo pudo lograrse con la ayuda de nuestros aliados en Washington y Londres. Mientras Belgrado ardía con la ayuda de los bombarderos de la OTAN, nuestras tropas hicieron retroceder a los serbios mientras sus políticos capitulaban ante la imparable presión de nuestra alianza. Si bien esto, sin duda, dejó un profundo sabor de boca en Serbia, había garantizado nuestra independencia durante los últimos veinte años.\n\nSin embargo, esta alianza se ha convertido poco a poco en una dependencia, y como resultado, la KSF nunca consideró realmente necesario que Kosovo formara su propia fuerza aérea, ni vio viable la producción de armamento en el país. Con la inminente inestabilidad en Estados Unidos, muchos de nuestros políticos han comenzado a considerar la idea de afirmar nuestra propia autarquía militar como una necesidad, a medida que las tensiones en los Balcanes siguen aumentando."
 ALB_kosovo_intervention: "Intervención en Kosovo"
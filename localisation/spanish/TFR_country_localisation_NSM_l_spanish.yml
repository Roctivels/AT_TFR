 NSM_national_front_category: "Frente Nacional"
 NSM_national_front_category_desc: "\n\n\n\n\n£GFX_banner_NSM_national_front\n\n\n\n\n\n\n\n[NSM_national_front_category_text]Para asegurar la victoria total y tomar el manto del próximo Gobierno americano, §Y¡debemos asegurar la mayor legitimidad de cualquier facción en el Frente Nacional!§!\nLegitimidad de @PTF §P[PTF.GetNameDef]§!: [?PTF.legit_var|+1%]\nLegitimidad de @NSM §g[NSM.GetNameDef]§!: [?NSM.legit_var|+1%]\nLegitimidad de @ATW §0[ATW.GetNameDef]§!: [?ATW.legit_var|+1%]"
 NSM_managing_the_movement_category: "Manejando el Movimiento"
 NSM_managing_the_movement_category_desc: "El §YMovimiento Nacionalsocialista§! está profundamente dividido en dos facciones: la £NSM_reformist §Lrockwelliana§! y la £NSM_hardliner §Rhitleriana§!.\nLograr un equilibrio entre estos dos grupos es crucial para nuestra supervivencia, ya que si uno de ellos alcanza demasiado poder, el otro reaccionará en defensa propia; la única opción es enfrentarlos.\n\n£NSM_reformist Influencia §Lrockwelliana§!: §Y[?NSM_influence_ref_var|0]§!\nEfectos: [GetRefEffect]\nLos £NSM_reformist §Lrockwellianos§! buscan reformar el movimiento para que no sea tan supremacista blanco como lo ha sido en el pasado, sino que se centre en la restauración de los derechos civiles de los blancos y el retorno de la prosperidad, culpando de la degeneración de América a la pérdida de estos derechos y la prosperidad como causa de su colapso.\n\n£NSM_hardliner Influencia §Rhitleriana§!: §Y[?NSM_influence_har_var|0]§!\nEfectos: [GetHarEffect]\nLos £NSM_hardliner §Rhitlerianos§!, por otro lado, culpa de la degeneración de América al hedonismo de sus élites, como banqueros y académicos, a la vez que predica que la alteración de la pureza racial es otra causa. Si bien no son abiertamente genocidas hacia otras razas, quieren verlas desaparecer de sus tierras por casi cualquier medio necesario."
 NSM_ministry_of_patriotism_category: "Ministerio de Patriotismo"
 NSM_ministry_of_patriotism_category_desc: "Para formar una unión más perfecta, debemos tener una agencia de seguridad nacional que pueda ayudar a proteger a nuestra nación de amenazas tanto extranjeras como nacionales; así nació el Ministerio de Patriotismo, fundado en los principios del patriotismo ilimitado y el excepcionalismo americano para todos los americanos."
 NSM_new_american_economics_category: "Nueva economía americana"
 NSM_new_american_economics_category_desc: "Para salvar a nuestra nación, debemos formar un Gobierno cohesionado, y uno de los elementos clave de un Gobierno estable es un buen modelo económico. Si bien el §YMovimiento Nacionalsocialista§! no ha sido tan claro en nuestra política económica como la gente hubiera deseado, aún necesitamos poder sustentar a nuestra gente no solo para sobrevivir, sino también para prosperar."
 NSM_new_american_military_category: "Nuevo ejército americano"
 NSM_new_american_military_category_desc: "La visión del Movimiento Nacionalsocialista para América exige la creación de una fuerza militar poderosa, disciplinada e ideológicamente leal. Para consolidar nuestro nuevo régimen, debemos reorganizar y modernizar las fuerzas armadas, depurando a los elementos desleales y reemplazándolos con guerreros comprometidos con los ideales del nacionalsocialismo. Este ejército será el martillo con el que aseguraremos nuestra estabilidad interna, consolidaremos la pureza racial y conquistaremos nuevas tierras en nombre de la Nueva América."

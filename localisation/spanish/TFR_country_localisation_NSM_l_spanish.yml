 NSM_National_Capitalism: "Nacionalcapitalismo"
 NSM_National_Capitalism_desc: "Algo en lo que tanto la izquierda como la derecha pueden estar de acuerdo es que el fascismo es el polo opuesto del comunismo. Así, mientras los inmundos y degenerados comunistas abrazan su \"planificación estatal\" oriental y antiamericana, nosotros abrazaremos el poder desatado del mercado. Después de todo, el darwinismo social del mercado elimina a los infrahombres y allana el camino para los superhombres de la próxima generación. Por supuesto, este mercado debe ser cuidadosamente regulado para que la historia no se repita, para asegurar que el hombre blanco tenga su oportunidad de prosperar, en lugar de tener que enfrentar las incontables barreras que los enfrentaron en la América de antes de la guerra. Sin embargo, el dinero fluirá, y una vez más, liberada de las cadenas de las corporaciones marxistas, la prosperidad regresará a América."

 nsm.87.t: "Segregación restaurada"
 nsm.87.d: "La segregación racial, algo que ya era algo audaz implementado por comandantes y administradores en las zonas liberadas durante la Guerra Civil, se ha convertido oficialmente en ley. Si bien a muchos funcionarios les preocupa que la política se haya impuesto demasiado pronto y que rompa las ya tensas relaciones que nuestro Gobierno ha forjado con elementos raciales extranjeros, el Gobierno central finalmente decidió que poner fin de inmediato a la subversión racial era más importante que la conveniencia política.\n\nCuando cayeron las llamadas leyes de \"Jim Crow\", y poco después leyes similares en todo el país, comenzó un período de caos. Los negros se amotinaron en numerosas ciudades, ya que la presencia policial establecida para mantener a raya a su comunidad se redujo rápidamente. Los blancos huyeron masivamente de las zonas urbanas hacia los suburbios, mientras que los negros se quedaron con las consecuencias de su locura. Por supuesto, los legisladores tribales que crearon las leyes en primer lugar no se vieron afectados, escondiéndose tras la policía en sus barrios cerrados.\n\nPara mejorar la situación urbana, el Gobierno financiará a las personas blancas que deseen mudarse a comunidades recientemente renovadas, mientras que los elementos extranjeros serán expulsados a zonas homogéneas propias. La infraestructura existente se dividirá en dos, para blancos y negros: escuelas, parques, bebederos, etc. Se desalentará la mezcla social mediante subvenciones a empresas que apliquen la segregación, a la vez que se retendrá la manutención infantil para las madres solteras con hijos mestizos.\n\nPara restablecer el orden general entre las minorías, se llevarán a cabo campañas masivas de confiscación de armas. Debido a la Guerra Civil y la criminalidad masiva, las armas peligrosas han proliferado en las comunidades extranjeras, por lo que deben ser desarmadas para preservar la frágil paz. Las comunidades rurales extranjeras deben disolverse o consolidarse para que puedan ser fácilmente monitoreadas."
 nsm.87.a: "La Fundación."
 nsm.88.t: "No en las Notas"
 nsm.88.d: "David soltó un suspiro, sentado sobre una caja de munición rota, encorvado sobre su teléfono. La pantalla agrietada emitía una luz tenue, reflejándose en las insignias de las SS cubiertas de polvo y en las cruces de hierro apiladas junto a botellas de cerveza medio vacías. Su pulgar se movía de manera metódica por Twitter, deteniéndose de vez en cuando para ver vídeos pixelados: un convoy de milicianos avanzando por Ohio, un centro comercial convertido en un campo de batalla improvisado y un tuit en azul que clamaba sobre el \"fin de la democracia americana\".\n\n\"«Fin de la democracia»\", murmuró David, dejando que las palabras se escaparan entre sus labios agrietados. Se rió entre dientes y gritó hacia la otra habitación. \"Cody, ven. Tienes que ver esto\".\n\nDesde la oscuridad, se oyó el sonido sordo de una lata de cerveza y un gruñido. Cody apareció, frotándose los ojos legañosos, con una chaqueta de cuero desgastada que le colgaba. \"¿Y ahora qué?\"\n\nDavid levantó el teléfono, agitándolo para darle más énfasis. \"D.C. es una jodida zona de guerra, se ha vuelto un caos. Tanques en las calles, comunistas disparando a la policía en San Francisco. ¡Por Dios!, esto parece una puta recreación\".\n\nCody se rascó la barba incipiente, entrecerrando los ojos para mirar la pantalla. \"Hablas como un narrador de documentales\".\n\nDavid resopló, ignorando el comentario. \"¿Sabes qué es lo más irónico? El año pasado, estaba en el bar explicándole la guerra de los Treinta Años a una chica normal que no le importaba en absoluto. Mírame. Ni siquiera terminé la universidad, y aquí estoy, en el cuadro del departamento. ¿Te acuerdas de lo que me recuerda esto?\".\n\nCody arqueó una ceja.\n\nDavid giró la pantalla del teléfono hacia él: otra imagen de una ciudad en llamas. \"A un mod del HoI4 que jugué en su momento\". Se rio, pero la risa se le apagó en la garganta."
 nsm.88.a: "\"¿Has oído hablar de «The New Order»?\""
 nsm.89.t: "Soñando a lo grande"
 nsm.89.d: "El pasto era verde en el camino a la Casa Blanca - El Berghof americano, un hogar específicamente para el líder del nuevo occidente, Colucci. Fue un camino arduo, por supuesto, lleno de dimes y diretes con ese ultramoderado de Rousseau... ¿como podrían sus ideas flojas y sosas haber salvado América, exactamente? No importa - eso ahora estaba en el pasado. D.C era ahora no más que aplausos en decadencia al ideal nacionalsocialista de América, el mármol blanco de Hitler y el mismo parado en el podio donde haría su decreto de salvar a la raza aria en toda América, no solo Estados Unidos.\n\nPor un momento, simplemente se quedo ahí parado. en admiración de donde estaba, de donde vino, de realmente poder salvar América, antes de finalmente caminar las escaleras para hablar con su nueva nación. Fotógrafos rodeándolo por todos lados, probando el micrófono,\n\n\"¡Pueblo americano!\"\nColucci exclamó, seguido por una ronda de aplausos al instante, hombres y mujeres de la raza aria finalmente siendo liberados.\n\n\"¡La lucha por nuestra nación, y el pueblo ario, finalmente ha acabado! Los tiranos judeobolcheviques han caído tras encontrarse con su oponente, junto con el régimen de los ex-Estados Unidos colapsando por la voluntad colectiva de la raza supre--\"\n \nUn pitido alcanzó su oído, deteniendo su discurso. ¿Que era? ¿Un asesino que había colocado una bomba, en su momento de triunfo? ¿Una señal de advertencia del mundo? En pánico, creyendo que so victoria final seria destruida, saltó, chocando contra el piso: no bello mármol o pasto suave, sino el suelo de madera de una casa algo desordenada en Míchigan. Tropezando despierto, golpeó el reloj de alarma, antes de murmurarse a si mismo,"
 nsm.89.a: "\"Todavía tienes trabajo que hacer, Führer\"."
 opinion_neo_nazism:0 "Neonazismo"
 nsm.90.t: "Migrañas e incógnitas"
 nsm.90.d: "Theodore estaba sumido en sus pensamientos. Incluso en sus peores momentos, una guerra civil declarada no era algo que creyera posible, ni siquiera en el peor de los casos. Aún más abajo en esa lista de posibilidades estaba que su hogar se encontrara bajo el control de hombres que afirmaban ser los herederos de la visión de Hitler. Había oído rumores de que iban de puerta en puerta buscando disidentes y nuevas manos para su esfuerzo bélico. Sabía que estaban a una calle de distancia y que cuanto más se acercaran, antes descubriría si su destino era ser arrojado a una zanja o recibir un rifle o una pala. Mientras el dolor de cabeza inducido por el estrés seguía carcomiéndolo, sus pensamientos comenzaron a verse abrumados por la música; había estado mirando fijamente sin comprender durante tanto tiempo que los árbitros del destino ya habían llegado a su calle. Cuanto más se acercaban, más fuerte se volvía la música y más clara le venía la letra a la mente. Para cuando llegaron a su casa y se acercaban a la puerta, ya había descifrado la canción y, al abrirla, se preparaba para enfrentar su destino. Una pregunta le rondaba la cabeza y se le resistía:"
 nsm.90.a: "\"¿Quién coño es Moon Man?\""
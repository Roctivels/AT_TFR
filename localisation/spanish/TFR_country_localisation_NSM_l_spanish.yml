 NSM_overwhelming_factionalism_idea: "Faccionalismo abrumador"
 NSM_overwhelming_factionalism_idea_desc: "\n\n\n\n£GFX_banner_NSM_fractured_movement\n\n\n\n\n\nDesde 1945, cuando los muros se derrumbaron sobre Hitler y extinguieron su luz, el nacionalsocialismo ha carecido de una mentalidad definida. Parece que se ha vuelto libre para que cualquiera se adapte a sus opiniones sobre raza, religión y todos los demás temas que la causa considera importantes. El faccionalismo dentro de nuestras filas no ha hecho más que crecer gracias a que nuestro partido se ha llenado de miles de caras nuevas, todas buscando un rayo de esperanza en este barco que se hunde, antes conocido como los Estados Unidos de América.\n\nSin embargo, con este rápido crecimiento, fue imposible incorporar a todos los miembros con carnet, lo que hizo inevitable que eligieran a uno de nuestros muchos demagogos divisivos para que lo enarbolaran como pilar de la ideología. Debemos encontrar la voluntad para erradicar este problema antes de que destruya nuestra capacidad de liberar a todos los hombres dignos de las cadenas de este mundo decadente y moribundo. Nuestra única esperanza verdadera es seguir uno de dos caminos: o bien seguir los pasos de Hitler y destrozar la degeneración que es el sistema americano actual, o bien seguir el camino de Rockwell, que, aunque todavía drástico, solo requeriría un cambio dentro de la cultura americana. ¡Que cualquier camino que elijamos nos lleve a la victoria final!"
 NSM_fractured_movement_idea: "Movimiento fracturado"
 NSM_fractured_movement_idea_desc: "\n\n\n\n£GFX_banner_NSM_fractured_movement\n\n\n\n\n\npodría ser peor..."
 NSM_infighting_militias_idea: "Milicias peleadas"
 NSM_infighting_militias_idea_desc: "\n\n\n\n£GFX_banner_NSM_militia_infighting\n\n\n\n\n\nCon una nueva oportunidad que se nos presenta, nos encontramos de nuevo en guerra. Esta vez, no permitiremos que las disputas nos hundan. Aunque nuestras fuerzas armadas no se acercan ni de lejos a la destreza ni al tamaño de la Wehrmacht, debemos avanzar hacia ello, y el primer paso hacia esta gloriosa meta debe ser disciplinar a las milicias improvisadas que luchan bajo nuestra bandera. Por el momento, lo único que hacen estos matones harapientos es cargar sin pensar contra el enemigo, ahuyentar a posibles reclutas y, lo peor de todo, contribuir al faccionalismo, convirtiendo incluso reuniones amistosas en escenas dignas del Putsch de Múnich. Esto debe terminar por el bien común."
 NSM_our_cause_idea: "Nuestra causa"
 NSM_our_cause_idea_desc: "\n\n\n\n£GFX_banner_NSM_our_cause\n\n\n\n\n\nNo sorprende a nadie que nuestra causa, nuestra lucha, nuestra lucha nunca haya sido muy popular, especialmente en América, el epicentro de todos los problemas financieros del mundo. Incluso ahora, aunque nuestro número disminuye y nuestra influencia política es nula, hasta el menos radical de nuestros miembros hace que el americano promedio cierre la puerta. Sin embargo, a pesar de esta hostilidad, aún tenemos la oportunidad de superar el estigma casi centenario contra el nacionalsocialismo. Para lograrlo, debemos convertirnos en la salvación de América y demostrar que la odiada ideología puede coexistir con la forma de vida de América. Si esta estrategia funciona, el potencial de reunificación nacional e incluso de liberación más allá de las antiguas fronteras de América sigue siendo ilimitado."
 NSM_rustbelt_industry_idea: "Cinturón de Óxido"
 NSM_rustbelt_industry_idea_desc: "\n\n\n\n£GFX_banner_NSM_rust_belt_industry\n\n\n\n\n\nLo que se consideraba la potencia industrial de Estados Unidos ahora no es más que un apodo que refleja su estado depresivo. Tras una fuerte disminución del trabajo industrial a finales de la década de 1970, la región vio cómo la mayoría de sus fábricas se iban abandonando y deteriorando poco a poco. Con las consecuencias económicas de Estados Unidos antes de la guerra de Secesión, la situación en el Rust Belt empeoró rápidamente. Ahora, con el Movimiento Nacionalsocialista asentado en el corazón de esta región, es seguro afirmar que se necesitarán muchas reformas e inversiones para sacar a esta potencia industrial de su letargo."

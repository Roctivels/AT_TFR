 NSM_Four_Year_Plan: "Plan Cuatrienal"
 NSM_Four_Year_Plan_desc: "En lo más profundo de la civilización occidental está el deseo de control, que se expresa naturalmente en forma de planificación estatal. Siguiendo los pasos del Tercer Reich, debemos controlar todos los aspectos de la economía a través del MNS. Si bien el mercado es una meta deseable, es necesario que, en tiempos de guerra, todos los recursos sean utilizados para ayudarnos en nuestro grane esfuerzo bélico. Cualquier pedazo de acero, cada gota de petróleo, y todo hombre, mujer o niño disponible deben estar en su lugar para que nuestra nación pueda avanzar. Si una rama es fácil de doblar, un puñado de ramas es difícil de doblar.\n\n§R¡Una nación, un pueblo y una economía!§!"

 NSM_our_cause_dynamic: "Nuestra causa"
 NSM_our_cause_dynamic_desc: "Las últimas décadas no han sido muy buenas para el nacionalsocialismo en América, por decir lo menos.\n\nA pesar de nuestro reciente aumento de popularidad y atención mediática gracias a los crímenes, la incompetencia y la degeneración tribalista de las élites que gobiernan nuestro país, que han sido expuestos al mundo, no somos los nacionalsocialistas de antaño, defendidos por visionarios como Rockwell o Pierce. Nuestro apoyo es limitado, y muchos de los leales permanecen apáticos; no están dispuestos a dejar atrás a sus familias y hogares para matar a sus hermanos, para nuestra consternación. El faccionalismo mezquino dentro de nuestras filas también ha aumentado constantemente desde la llegada de nuevos reclutas de todo el país, y está a punto de destruir nuestro movimiento desde dentro. Debemos tomar medidas inmediatas para depurar nuestro movimiento de estos elementos reaccionarios, o de lo contrario seremos derrotados de la misma manera que nuestros homólogos alemanes lo fueron hace ochenta años."

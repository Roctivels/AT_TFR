 nsm.36.t: "Gran esvástica en New Philidelphia"
 nsm.36.d: "0_o"
 nsm.36.a: "¡Indignante!"
 nsm.37.t: "Formación del Frente Nacional"
 nsm.37.d: ""
 nsm.37.a: "Unirse"
 nsm.37.b: "¡Solo nosotros podemos salvar América!"
 nsm.38.t: "Formación del Frente Nacional"
 nsm.38.d: "Desde el comienzo de la Segunda Guerra Civil Americana, las diversas organizaciones paramilitares de ultraderecha americana han librado guerras independientes para tomar el control de los ex-Estados Unidos. Con la nueva alianza militar del Frente Nacional, entre el Frente Patriota y el Movimiento Nacionalsocialista, pronto esto podría cambiar. Si bien el Frente Patriota y el Movimiento Nacionalsocialista son ideológicamente algo diferentes, el primero representando al fascismo y el segundo al nacionalsocialismo, han decidido de que si desean establecer un nuevo gobierno donde la población blanca vuelva a ser el grupo dominante del país, tendrán que trabajar juntos. Es simplemente militarmente inviable que el Frente Patriota o el Movimiento Nacionalsocialista se enfrenten por sí solos al poder combinado del Gobierno Constitucional Americano y la Unión de América.\n\nAunque la alianza del Frente Nacional actualmente solo está formada por el Frente Patriota y el Movimiento Nacionalsocialista, existen rumores de que más organizaciones podrían unirse pronto. Según informes, la Liga del Sur y la organización terrorista aceleracionista conocida como la División Atomwaffen enviaron observadores a la primera conferencia del Frente Nacional. Sin embargo, es probable que cuantas más organizaciones se unan al Frente Nacional, menos cohesionados se vuelvan sus objetivos. En definitiva, solo el tiempo dirá cuáles serán las futuras implicaciones de esta nueva alianza militar en la guerra."
 nsm.38.a: "La Derecha se Une."
 nsm.39.t: "El ultimátum Hutaree"
 nsm.39.d: "La milicia Hutaree ha sido completamente aniquilada por nuestras fuerzas, asegurando de una vez por todas la porción norte de la península de Míchigan para el Movimiento Nacionalsocialista. Sin embargo, con David Brain Stone Sr.y muchos de sus hombres ahora presos, ha surgido la pregunta de que debemos hacer con ellos. Mientras que los hitlerianos abogan por matarlos como muestra de poder, la facción rockwelliana, citando las similitudes ideológicas de David con nuestro movimiento, ha propuesto reclutarlos para nuestro alto mando a cambio de su salida de prisión."
 nsm.39.a: "Hagamos con ellos una advertencia para nuestros enemigos."
 nsm.39.b: "Que nos sirvan a cambio de su libertad."
 nsm.40.t: "Resistencia miliciana en el norte de Detroit"
 nsm.40.d: "En medio de nuestros esfuerzos por salvar el cadáver descompuesto de los Estados Unidos de América, hemos recibido informes de que los veteranos engañados de la Guardia Nacional de Míchigan han tomado las armas para resistir a nuestro gobierno, reuniéndose en el norte de Detroit, donde han lanzado múltiples ataques contra las fuerzas del orden como los salvajes que son. Están liderados por Paul Rogers, el ex general adjunto de la Guardia Nacional de Míchigan. Estuvo desaparecido en acción durante toda la Guerra Civil, presumiblemente muerto, aunque ahora ha regresado para ser una espina en nuestro costado una vez más. También se han descubierto varios depósitos de municiones en los bosques de Huron-Manistee, revelando que estas ratas han estado acumulando armas a nuestras espaldas durante años.\n\nSus ataques consisten en asaltos rápidos y fugaces en la periferia de la ciudad, saboteando la infraestructura local y llevando a cabo una guerra urbana de alta intensidad destinada a provocar una batalla prolongada que deje a nuestro ejército paralizado. Cabe destacar que han entrado en conflicto directo con los traidores hitlerianos, que también están activos en Detroit, aunque el aparato liberal de su organización hace que esto no sea sorprendente. Esta lucha interna nos permite restaurar el orden y castigar a los perpetradores con mayor facilidad, aunque no debemos subestimarlos en combate. Es imperativo que aplastemos este levantamiento de manera completa y sin demora antes de que pueda arraigar, o de lo contrario inspirarán a otras tribus similares a tomar las armas y contaminar América con su suciedad."
 nsm.40.a: "La serpiente muestra su burda cara nuevamente."
 nsm.41.t: "Revueltas libertarias en Nueva Inglaterra"
 nsm.41.d: "En medio de nuestros esfuerzos por salvar el cadáver descompuesto de los Estados Unidos de América, hemos recibido informes de que los \"Libertarios\" de Nueva Inglaterra, a pesar de su absoluta humillación a manos de Rousseau, han comenzado a llevar a cabo ataques de guerrilla contra nuestras guarniciones en Maine, Nuevo Hampshire y Vermont. Aunque estos alimañas no se han congregado en una sola organización, parece que están liderados por Daniel Banyai, propietario de la instalación Slate Ridge, que durante años entrenó a militantes de la AOF. Es probable que esta situación estalle en una rebelión abierta, algo que debemos evitar a toda costa.\n\nEstos ataques terroristas sincronizados han resultado increíblemente problemáticos para nuestras fuerzas en la región a pesar del estado ruinoso de la Asociación, y están agotando nuestros recursos en un periodo de caos y desunión nacional no visto desde el inicio de la última Guerra Civil. Banyai y su camarilla de degenerados también han comenzado a distribuir material propagandístico que llama a una revolución armada contra nuestro gobierno, avivando aún más las llamas que consumen nuestra nación. Es imperativo que aplastemos esta insurgencia de manera completa y sin demora antes de que pueda arraigar, o de lo contrario inspirarán a otras tribus similares a tomar las armas y contaminar América con su suciedad."
 nsm.41.a: "La situación empeora"
 nsm.42.t: "Actividad de los 3 Percenters en Wisconsin"
 nsm.42.d: "En medio de nuestros esfuerzos por rescatar el cadáver descompuesto de los Estados Unidos de América, hemos recibido informes de que unos despreciables conservadores en Wisconsin han comenzado a organizarse, protestar y amotinarse, principalmente en el decadente campo que ha criado a su tipo durante años. Estos matones parecen ser una escisión de los Three Percenters, un grupo miliciano leal a Donald J. Trump que fue casi aniquilado durante la Guerra Civil. Están liderados por Barry Croft Jr., un comandante miliciano conocido por su papel en un fallido complot para secuestrar al gobernador de Míchigan años antes de la Guerra Civil. Estos alimañas ya han tomado extensas zonas en el norte de Wisconsin, y el ejército ha sido desplegado para manejar la insurgencia.\n\nSus tácticas consisten en ataques rápidos y sorpresivos a nuestras guarniciones, terrorismo urbano y guerra de guerrillas rurales, lo que ha paralizado por completo nuestra capacidad para gobernar y mantener el orden adecuadamente. También están bien posicionados en las regiones boscosas del noreste de Wisconsin, lo que les permite utilizar su conocimiento del terreno a su favor. Los agitadores liberales han aprovechado esta oportunidad para difundir su flagrante degeneración, con disturbios en Milwaukee que se han intensificado rápidamente. Es imperativo que aplastemos este levantamiento de manera completa y sin demora antes de que pueda arraigar, o de lo contrario inspirarán a otras tribus similares a tomar las armas y contaminar América con su suciedad."
 nsm.42.a: "Y fracasarán de nuevo."
 nsm.43.t: "Los hitlerianos emprenden acciones en Detroit"
 nsm.43.d: "En medio de nuestros esfuerzos por salvar el cadáver en descomposición de los Estados Unidos de América, hemos recibido informes de que los hitlerianos, antaño nuestros camaradas de armas, han recurrido al robo tribal y al saqueo bárbaro. Una serie de reuniones ilegales, marchas y manifestaciones organizadas en Detroit por el intransigente Paul Mullet han escalado en disturbios agresivos y desórdenes, con los matones hitlerianos incendiando la ciudad y destruyendo años de trabajo duro. Estos hombres, antes miembros respetados de nuestro movimiento, se han revelado ahora como meros agitadores tribalistas, dispuestos a alinearse con marxistas y liberales para destruir América. Ya han comenzado enfrentamientos abiertos entre nuestros hombres sobre el terreno y la escoria hitleriana, con varios oficiales ya heridos. Ahora nos queda claro que su objetivo es incitar un levantamiento armado, con Mullet declarando abiertamente que hemos \"perdido el mandato de la nación aria\". Si queremos que nuestra visión de una nueva América se haga realidad, no podemos tolerar este comportamiento obstinado y debemos tomar medidas inmediatas contra las bandas callejeras itinerantes de Mullet, porque cualquier cosa menos solo los envalentonaría. El Mando Regional en Míchigan también ha enviado numerosas solicitudes de refuerzos militares debido a la gravedad de la situación, y depende de nosotros atender sus súplicas."
 nsm.43.a: "¡Debemos restaurar el orden!"
 nsm.44.t: "Incursión llevada a cabo en la Península Superior"
 nsm.44.d: "Aproximadamente a la 1:30 de la madrugada de anoche, las fuerzas de MNS lograron cortar completamente las comunicaciones de la península superior de Míchigan, y apenas tres horas después, toda la península estaba en nuestras manos. Los méritos por el éxito de la operación corresponden en última instancia a los valientes esfuerzos de un puñado de comandantes de MNS, que asumieron todo el peso de la responsabilidad de la invasión sobre sus hombros.\n\nPlanificada meticulosamente durante meses, la operación requirió la colaboración de cientos de agentes durmientes en la Península Superior, desde alcaldes de pequeños pueblos que se pasaron a nuestro bando hasta oficiales de milicia sobornados. Cuando se anunció la operación, la mayoría se sorprendió por su éxito casi fantástico. La facción de Trump ha sido sacudida hasta sus cimientos, y su séquito de seguidores, financiadores tribales y otros aprovechados probablemente se estén maldiciendo por permitir que su codicia y estupidez oscurecieran nuestras intenciones.\n\nCon esta victoria, nuestro control sobre el norte del lago Míchigan se ha consolidado, mientras que nuestra capacidad para proyectar poder sobre el lago Superior finalmente se ha habilitado. La gente de la península ha recibido su liberación con alegría, saliendo a las calles, con banderas del Partido proporcionadas para las fotos, para saludar a nuestros ejércitos victoriosos y entregándonos con entusiasmo a los elementos subversivos. Numerosos milicianos ideológicamente afines, o simples oportunistas, han desertado a nuestras filas, aumentando el tamaño de nuestras fuerzas en la zona."
 nsm.44.a: "¡Un brindis por nuestros chicos!"
 nsm.45.t: "Una nueva Enigma"
 nsm.45.d: ""
 nsm.45.a: "Un pilar necesario para nuestro éxito."
 nsm.46.t: "[NSM.GetNameDefCap] sugiere una alianza"
 nsm.46.d: ""
 nsm.46.a: "Debemos unirnos por nuestra causa."
 nsm.46.b: "No nos asociaremos con ellos."
 nsm.47.t: "El Frente Patriota se une a nosotros"
 nsm.47.d: ""
 nsm.47.a: "Unidos por una causa común."
 nsm.48.t: "Diplomacia con el Comando Naval"
 nsm.48.d: ""
 nsm.48.a: "La opción racional."
 nsm.49.t: "La armada acepta nuestra oferta"
 nsm.49.d: "Tras unos días de intensos debates políticos y de acuerdos tras bastidores, el Mando Naval ha emitido su decisión final. Para fortuna de todos, el Mando Naval ha aceptado la oferta. Los siguientes términos entrarán en vigor cuando el acuerdo sea efectivo: 1. Todos los navíos pertenecientes al Mando Naval se transferirán a la República Social Americana. 2. Se proveerá de protección oficial a todos los funcionarios y oficiales pertenecientes al Mando Naval residentes en Alaska. 3. Todos los territorios controlados actualmente por el Mando Naval pasarán a formar parte de la República Social Americana. Verdaderamente, esto un triunfo para nuestra nación, pues hemos salvado miles de vidas tanto de soldados como de civiles."
 nsm.49.a: "Y no se disparó ni una bala."
 nsm.50.t: "La armada rechaza nuestra oferta"
 nsm.50.d: "Tras unos días de intensos debates políticos, el Mando Naval ha emitido su decisión final. Tristemente, el Mando Naval ha rechazado nuestra oferta. Se informa de que las negociaciones llegaron a un punto muerto cuando propusimos dar protección oficial en Alaska a todos los funcionarios y oficiales del Mando Naval. Los diplomáticos de este último rechazaron la oferta e insistieron en que deberían permitirles abandonar la República Social Americana de forma segura. La tensión provocada por esto no puso ser calmada, sin importar el número de acuerdos que alcanzáramos con sus diplomáticos. Subsecuentemente, esta mañana el Mando Naval anunció su retirada de las negociaciones."
 nsm.50.a: "Pronto se arrepentirán."
 nsm.51.t: "El Mando Naval debe morir"
 nsm.51.d: ""
 nsm.51.a: "Una espina para nosotros."
 nsm.52.t: "Una guerra que no podrán ganar"
 nsm.52.d: ""
 nsm.52.a: "Liderados por la fe."
 nsm.53.t: "Acudir a mercenarios de los cárteles"
 nsm.53.d: ""
 nsm.53.a: "Cuanto más mejor."
 nsm.54.t: "Vídeo de americanos capturados en México siendo capturados"
 nsm.54.d: ""
 nsm.54.a: "Debemos avanzar."
 nsm.55.t: "Los débiles se han plegado"
 nsm.55.d: ""
 nsm.55.a: "No eran necesarios."
 nsm.56.t: "Pelotones se han revelado"
 nsm.56.d: ""
 nsm.56.a: "Solo el fuerte resiste."
 nsm.57.t: "Deserciones masivas"
 nsm.57.d: ""
 nsm.57.a: "Los puros se quedarán."
 nsm.58.t: "Todos se inclinarán al nacionalsocialismo"
 nsm.58.d: ""

 nsm.72.t: "Los civiles se ponen de lado de los rockwellianos"
 nsm.72.d: "A raíz de la reciente deserción de los rockwellianos de nuestras filas, ha habido un aumento de grafitis ilegales instando a los ciudadanos a alinearse con la facción rockwelliana. Además, hemos descubierto comunicaciones secretas entre funcionarios rockwellianos y destacadas organizaciones civiles. Los informes de inteligencia advierten que no abordar estas actividades subversivas podría resultar en una hostilidad generalizada hacia nuestro régimen entre la población civil. A pesar de la aparente fortaleza del partido rockwelliano, seguimos confiando en nuestra capacidad para sofocar esta disidencia. La historia ha demostrado que los grupos hostiles inevitablemente sucumben a nuestra autoridad, y los rockwellianos no serán una excepción."
 nsm.72.a: "Todos los que deserten perecerán."
 nsm.73.t: "La leva empieza a desertar al Partido de Rockwell"
 nsm.73.d: "Tenemos noticias desalentadores de nuestro departamento de inteligencia. Han observado una preocupante tendencia: un crecimiento de las deserciones entre los reclutados al partido de Rockwell. Esto supone un desafío significativo, teniendo en cuenta que los reclutados suponen la base de nuestro ejército. Afortunadamente, nuestros voluntarios y soldados más leales han mostrado resiliencia frente a las tácticas de la facción rockwelliana. Sin embargo, si no tomamos las medidas adecuadas, correremos el riesgo de que nuestro ejército entre en crisis."
 nsm.73.a: "¡Ejecuten a esos traidores inmediatamente!"
 nsm.74.t: "Políticos se ponen de lado de los rockwellianos"
 nsm.74.d: "Nos llegan noticias preocupantes al darse a conocer las protestas de políticos y funcionarios locales, que afirman que las políticas cada vez más dictatoriales de nuestro gobierno no deberían tener cabida en el movimiento. No obstante, tras una investigación más detenida, hemos descubierto que el Partido de Rockwell ha estado financiando secretamente a algunos de estos políticos para que mantengan sus críticas a nuestro régimen e incluso para que renuncien. Ya estamos planeando como poner fin a esta corrupción y pararle los pies al Partido de Rockwell antes de que puedan redoblar sus esfuerzos."
 nsm.74.a: "Que esto no salga a la luz."
 nsm.75.t: "Rockwellianos toman sede local de nuestro partido en Montana"
 nsm.75.d: "Tenemos noticias de nuestras fuerzas de seguridad en Montana. Esta mañana, un grupo de ocho hombres en edad de servicio militar asaltaron la sede local de nuestro partido y tomaron a muchos empleados y funcionarios como rehenes. Afortunadamente, nuestras fuerzas de seguridad lograron negociar con los asaltantes, desescalando la situación con éxito. Como resultado, todos los rehenes fueron liberados sanos y salvos y los atacantes fueron detenidos de forma pacífica.\n\nSin embargo, el hallazgo un mensaje codificado portado por uno de los atacantes ha encendido las alarmas. Tras que nuestra agencia de inteligencia decodificase el mensaje, este reveló una serie de instrucciones y localizaciones. Parece ser que el Partido de Rockwell orquestó el ataque, dando las direcciones de las sedes y facilitando armas.\n\nEste incidente ha significado una preocupante escalada de nuestro conflicto con los rockwellianos, al estos incrementar la audacia de sus acciones."
 nsm.75.a: "¡Necesitamos tomar medidas ahora!"
 nsm.76.t: "La policía militar entra en combate con el Partido de Rockwell"
 nsm.76.d: "El día de hoy el conflicto entre nuestro régimen y el Partido de Rockwell ha vuelto a intensificarse. Ante el constante incremento de las tensiones, hemos realizado una orden pública para nuestras fuerzas de seguridad y policía militar que les permite reprimir cualquier elemento subversivo que pueda ser leal a los rockwellianos. Esta orden posiblemente causará un estallido de violencia entre nosotros y los rockwellianos, pero esta es la forma de que afronten las consecuencias de sus actos."
 nsm.76.a: "Esta es nuestra única opción."

 nsm.66.t: "Escisión del Partido de Rockwell del Movimiento"
 nsm.66.d: "Tenemos noticias espantosas el día de hoy. La facción rockwelliana ha desertado de nuestro Movimiento. Tras días de agitación por sus enviados, nos han presentado un documento de 100 páginas que explica su deserción del MNS. El documento describe cómo los rockwellianos habían sido ignorados por el resto del MNS, lo que combinado con los malos tratos y las faltas de respeto hacia su facción los llevó a su punto límite, al punto de que no quieren seguir formando parte de nuestro gobierno. Nuestros diplomáticos están tratando de persuadir a los rockwellianos para que lo piensen dos veces antes de que sea demasiado tarde, pero hasta el momento las negociaciones están en un punto muerto."
 nsm.66.a: "El Movimiento se ha dividido."
 nsm.67.t: "Eligiendo al Führer americano"
 nsm.67.d: "Desde que comenzamos la reunificación de América bajo nuestra autoridad, hemos enfrentado muchos problemas internos. Hoy nos enfrentamos al último obstáculo para acabar con estas disputas internas. Para dar paso a una nueva etapa del Movimiento Nacionalsocialista, Burt Colucci ha dimitido como muestra de buena voluntad. Sin embargo, tras su anuncio, muchas figuras políticas han subido al escenario con la esperanza de ser su sucesor. Los dos personajes más destacados son Andrew Anglin y Paul Mullet. Anglin se ha ganado una reputación de lealtad al MNS a lo largo de su carrera y ha declarado en múltiples ocasiones que continuaría con las ideas de Colucci durante su liderazgo. Mullet ha construido su reputación por razones muy similares a las de Anglin, aunque ha afirmado que, si bien continuaría con los valores fundamentales del MNS, añadiría las ideas del cristianismo al movimiento. Quien sea elegido sin duda tendrá un gran impacto en el MNS durante esta nueva era, y ahora, con Colucci tomando su decisión final, anunció que..."
 nsm.67.a: "¡Andrew Anglin!"
 nsm.67.b: "¡Paul Mullet!"

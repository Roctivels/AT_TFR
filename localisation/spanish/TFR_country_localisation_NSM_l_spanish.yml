 NSM_national_front_category_loc: "Mientras que, si bien estamos en desacuerdo en muchos aspectos con los otros miembros del Frente Nacional, estamos de acuerdo en una, que América se ha degenerado y que necesita ser resucitada. Debemos ayudar a nuestros aliados con el fin de unir América de nuevo y salvarla de los salvajes degenerados.\n\n"
 nsm.1.t: "La dirección del Movimiento"
 nsm.1.desc: "Tas el estallido de las hostilidades, hemos tomado el control de un considerable territorio, aún si es minúsculo en comparación con el resto del país. Con esto, los asesores de mayor rango de Burt Colucci han sugerido decidir que camino seguirá nuestro movimiento a la hora de gobernar las regiones que controlamos. Como resultado de nuestra vaga política interna, nuestro movimiento ha empezado a dividirse entre los partidarios de la llamada \"línea dura\" liderado por Paul Mullet, y los llamados \"reformistas\" liderados por el recién regresado antiguo líder del movimiento Jeff Schoep.\n\nLos puntos de vista de Schoep acerca de \"reformar\" el movimiento se basa principalmente en el tratamiento y la opinión sobre los no arios respecto a la discutida jerarquía racial que muchos en el MNS siguen. Los reformistas apoyan alternativas para aquellos considerados no arios, en vez de tomar acciones directas contra ellos como defienden muchos de línea dura. Económicamente, los reformistas defienden un modelo de corte capitalista con una fuerte intervención estatal para \"el beneficio del americano común\". La mayoría de las nuevas incorporaciones y varios antiguos miembros se han puesto de lado de Schoep, citando su experiencia y la necesidad de reformas si queremos mantener estabilidad tras nuestra victoria. Muchos ven a Schoep con sospecha a causa de su denuncia contra el movimiento tras su retirada del liderazgo, lo que explica el enfado de los partidarios de la línea dura e incluso de reformistas escépticos.\n\nEn oposición a Schoep está Paul Mullet, el principal defensor del sector identitario cristiano y de la línea dura. Considerado por algunos como el auténtico defensor de los valores del movimiento, Mullet ha hecho énfasis en el orden, la familia tradicional y el nacionalismo americano - según Mullet, estas cosas están desapareciendo por culpa de los no arios y sus ideales, comparándolos con una enfermedad. Aboga por una economía planificada corporativista acorde a las ideas nacionalsocialistas, el rejuvenecimiento de la cristiandad en Estados Unidos con el fin de detener la decadencia moral de la población y acciones más directas contras los no arios (aún sin especificar). Muchos miembros cristianos y mayores se han puesto de lado de Mullet, apoyando según ellos al \"verdadero nacionalsocialismo\". Sin embargo, la postura explícitamente religiosa de Mullet parece ser que ha provocado más divisiones dentro del movimiento, habiendo una amplia variedad de opiniones desde ambas partes.\n\nAl estar ambos, Schoep y Mullet, a los hombros de Colluci, es él quien debe decidir quién ha marcado el camino que el movimiento seguirá."
 nsm.1.a: "Schoep tiene razón - ¡Debemos apelar a a población, o de lo contrario nunca nos apoyarán!"
 nsm.1.b: "Mullet está en lo correcto; ¡Es mejor solidificar nuestras posturas que volver a caer en la degeneración!"
 nsm.2.t: "Grupo de Fuerzas especiales establecido"
 nsm.2.desc: "Burt Colucci examinó a los hombres delante suya y no pudo sentir nada más que admiración. ¿Acaso existía algún ejemplo mejor de la raza aria en todo el mundo? Burt pensó que no.\n\nLos hombres eran los primeros miembros de la unidad Wiking, y vaya que si eran arios. Eran arios de manual, eran altos, tenían un denso cabello rubio, brillantes ojos azules, eran fuertes y estaban curtidos en combate. Habían sido seleccionados más que por sus capacidades de combate, que ciertamente no eran desdeñables, fueron escogidos por sus impresionantes rasgos faciales.\n\nSólo un uniforme de las Waffen-SS haría justicia a estos hombres, quienes así vestidos parecían que acababan de salir de la Segunda Guerra Mundial. Iban de negro de arriba a abajo, con insignias nazis y, cómo no, un familiar brazalete rojo. Tenían rifles, algunos de los cuales fueron usados por las Waffen-SS originales según le dijeron a Burt, aún si él no podía corroborar esa información.\n\nEllos marcharon y se despidieron de Burt con un saludo, quién contemplaba alegre como marchaban, determinados a luchar por los ideales de la raya y la nación."
 nsm.2.a: "Veamos como les va."
 nsm.3.t: "Pandillas de Detroit liquidadas"
 nsm.3.d: "Mientras nuestra campaña en Míchigan sigue en curso, hoy hemos obtenido una importante victoria; Detroit, que había sido controlada por una serie de pandillas negras tras el colapso de la autoridad federal, ha sido pacificada por nuestras fuerzas. La bandera nacionalsocialista ondea en el ayuntamiento, y ya hemos observado un éxodo masivo de civiles no arios que huyen de la ciudad, principalmente cruzando el río hacia Canadá. Nuestras fuerzan ya han disparado a algunos civiles que huían, y estamos planeando volar el Puente Ambassador para detener este éxodo masivo. En cuanto a nuestros enemigos, los pandilleros negros fueron masacrados y derrotados por nuestras fuerzas en una serie de decisivas batallas urbanas, y en los asaltos a sus cuarteles generales no encontramos nada, lo que implica que sus líderes ya no están. Patrullas montadas monitorearán la ciudad esta noche, intentando mantener la estabilidad al tiempo que restauramos el poder blanco sobre la ciudad más grande de Míchigan."
 nsm.3.a: "Aún hay trabajo por hacer."
 nsm.4.t: "Disturbios masivos en Grand Rapids"
 nsm.4.d: "El descontento en Grand Rapids llegó a su punto álgido hoy, con protestas estallando en la ciudad, actualmente en manos del \"Movimiento Nacionalsocialista\" Americano. La situación en la ciudad había sido tensa desde hace un tiempo, pues el protogobierno era extremadamente impopular entre los locales, quienes habían apoyado firmemente a la milicia estatal, cuyos remanentes han organizado un movimiento de resistencia en la región.\n\nGrabaciones publicadas esta mañana muestran a manifestantes quemando la bandera del Movimiento Nacionalsocialista y ataques sobre edificios utilizados por el Gobierno de facto. Se podía oír por toda la ciudad \"¡Fuera Colucci!\". Este parece ser el movimiento de resistencia más fuerte hasta el momento contra el nazismo americano, pero, si no se le frena se espera que se expanda por todo el estado, cabe la posibilidad de que el experimento nazi americano acabe antes de que empiece.\n\nTal y como se esperaba, la respuestas de las autoridades ha sido brutal. Se tiene constancia de que las fuerzas del MNS han estado usando constantemente fuerza excesiva, atacando a todo aquel que estuviese presente sin importar si suponían una amenaza o no con violencia, dando igual si eras periodista o de plano si estabas participando en las protestas. Un vídeo grabado por un manifestante muestra a las fuerzas gubernamentales apalizando a manifestantes con porras y culatas antes de detenerlos.\n\nNo sabemos como se desarrollará esto. Hasta ahora, parece que las fuerza bruta no ha echado atrás a los manifestantes, y los nazis americanos se encuentran en su momento más delicado hasta ahora."
 nsm.4.a: "Ya se calmarán..."
 nsm.4.b: "¡Hay que detener a estos maleantes!"
 nsm.5.t: "Protestas disueltas"
 nsm.5.d: "Las protestas en Gran Rapids fueron disueltas hoy por las fuerzas de seguridad del Movimiento Nacionalsocialista. Las protestas han cesado en el centro de la ciudad y funcionarios han anunciado que la ciudad ha sido en gran medida pacificada.\n\nImágenes publicadas con anterioridad en el día de hoy mostraron la brutal represión de las fuerzas gubernamentales, disolviendo una gran masa de manifestantes, arrestando a varios y apalizando a incluso más con porras y culatas de rifle.\n\nEl Gobierno neonazi también ha arrestado a los líderes de las protestas, acusándoles de \"alterar el orden público\" y justificando esto como algo \"necesario para mantener el orden en el estado\" La integridad física de muchos de estos organizadores está en entredicho, y es poco probable que se vuelva a saber de ellos hasta después de la guerra.\n\nEl Comandante Colucci ha emitido un comunicado oficial en que felicita a la policía por su actuación diciendo \"La policía ha cumplido con su deber, esos manifestantes querrían traer el marxismo cultural a esta nación, y si bien sus acciones pueden ser vistas como excesivas, fueron necesarias para asegurar esta nación para la raza blanca.\"\nEn este momento, hay un silencio sepulcral en las calles. No se sabe si el movimiento recobrará fuerzas en el futuro, pero por ahora, solo podemos esperar lo mejor."
 nsm.5.a: "Paz, pero sin justicia."
 nsm.5.b: "¡Nos hemos quedado cortos!"
 nsm.6.t: "Intransigentes intervienen en Grand Rapids"
 nsm.6.d: "Esta mañana, casi 2.000 fuerzas paramilitares pertenecientes al \"Movimiento Nacionalsocialista\" estadounidense retomaron el centro de Grand Rapids, Míchigan, que había sido el centro de un movimiento de protesta antifascista en su territorio. Decenas de manifestantes desarmados fueron asesinados, y el número actual de muertos es desconocido.\n\nLas tropas bloquearon todas las rutas de escape para los manifestantes y se adentraron en la masa de manifestantes, disparando directamente contra la multitud. Muchos que no formaban parte de las protestas y que simplemente se encontraban en la zona durante la masacre, o eran espectadores, también fueron tiroteados.\n\nLos informes de los muertos son inexistentes, la presión ejercida sobre el sistema médico estadounidense por la anarquía en el país hace imposible saber cuántos han muerto, y el Gobierno aún no ha hecho un anuncio sobre dicha cifra.\n\nLos medios estatales informaron hoy que una \"rebelión comunista\" había sido aplastada, y dijeron que 500 policías y tropas murieron o resultaron heridos y que también habían muerto civiles, pero dieron pocas especificaciones.\n\nSegún los informes, los manifestantes intentaron resistir la represión, lanzando ladrillos y bombas incendiarias a los soldados, pero en gran medida no tuvieron éxito en sus esfuerzos. El comandante del MNS, Burt Colucci, expresó su descontento por la violenta represión. Hizo una declaración esta mañana diciendo: \"Estoy profundamente molesto por lo que sucedió esta mañana, y haré responsables a los que están detrás de este movimiento\". También afirmó que la supresión de las protestas fue organizada y ejecutada por los intransigentes del partido, revelando una división en el MNS y mostrando cuán tenue es realmente su control sobre el partido."
 nsm.6.a: "¿El final del caos, o un adelanto de lo que está por venir?"
 nsm.6.b: "Orden restaurado."
 nsm.7.t: "Colucci da un discurso en Grand Rapids"
 nsm.7.d: "Burt Colucci se subió a su podio, ajustando su tono de voz y preparándose para hablar en frente de algunos de sus más fervientes adeptos. Los nacionalsocialistas más dedicados estaban presentes aquel día, preparados para hacer saber a los de fuera que él seguía llevando las riendas, que ni los agitadores ni los intransigentes habían tenido éxito en sus esfuerzos para debilitar su liderazgo.\n\nSe centró en la cámara que estaba retrasmitiendo su discurso a medios oficiales y empezó su discurso. Era un discurso familiar para los miembros del MNS, hablaba de sus numerosos logros y denunciaba a sus enemigos, y a los comunistas y judíos que los apoyaban y finalmente alentó a sus soldados, afirmando que eran invencibles. Se jactó de los logros de su Gobierno, expresó su apoyo a los soldados que habían puesto fin a las protestas que habían adueñado de la ciudad y condenó a los agitadores comunistas que las inició.\n\nSu discurso fue, como siempre, aclamado y vitoreado con un estruendoso aplauso, seguido por numerosos \"¡Sieg Heil!\" y \"¡Heil Colucci!\". El público hizo el saludo romano a diestro y siniestro y Colucci trataba de mandarles el saludo de vuelta.\n\nRápidamente se bajó del podio escolado por sus guardaespaldas. Colucci quiso asegurarse de que un discurso tan magnífico como ese no fuese interrumpido por los subversivos que plagaban la ciudad, no precisamente frente a las cámaras. A pesar de estos, sintió que había demostrado que era él quien estaba al mando, y que sus enemigos no habían mancillado su imagen como la cara del nazismo americano."
 nsm.7.a: "¡Sieg Heil!"
 nsm.8.t: "Persecución policial en la I94"
 nsm.8.d: "David presiono su pie contra el pedal del gas, había intentado lo más que pudo para concentrarse en el camino pero los sonidos fuertes a su alrededor y la opresiva humedad lo hacia prácticamente imposible. Las chillantes sirenas atrás de el, los llantos de su infante en el asiento de pasajero, la sinfonía de la autopista lo había encapsulado en un capullo de sonido, y estaban haciendo paso a su mente, dándole un terrible dolor de cabeza. \n Lo peor de todo, eso si, eran las voces. \nLas voces roían dentro de su cráneo, susurrándole, asegurándose de que el nunca pueda estar solo en su propia mente. Eran ellas las que lo habían obligado a tomar a su propio hijo como rehén y lanzarse a la I-94, convenciéndolo que era la único manera de asegurar su seguridad. Se movió en asiento de cuero, incomodo por el calor del sol y su resplandor, que oscurecía su visión. \nRepentinamente, figuras aparecieron desde ese resplandor. \nEra una barricada, una barricada de autos policiales rodeada de una pequeña línea de espinas de trafico. Se había acabado. El sabia ahora que no había duda que lo iban a capturar, y lo más probable dispararle. Clavo su pie en los frenos, obligando a su vehículo a un frenazo en seco. No había opción pero rendirse a ellos, sin importar las consecuencias. Tropezó mientras salió de su auto, finalmente rindiéndose. Fue ahí cuando las voces se volvieron más fuertes. \n'¡Señor, ponga las manos en el aire!' grito uno de los oficiales \nLas voces se volvieron más fuertes de nuevo, antes solo susurraban pero ahora hablan con tanta intensidad. \n'Señor, tiene que poner las manos en alto' dijo el oficial, repitiéndose, solo que esta vez más fuerte. \nLas voces gritaban ahora, ahogando los sonidos de la calle. Dejando solos a los comandos de la policía y ellos mismos. \n'¡Señor! ¡Por la ultima vez, ponga las manos en el aire!' ladro el oficial, claramente había perdido su paciencia. \nEllas gritaban ahora. Cualquier otro sonido fue expulsado mientras que sus fuertes, perforantes llantos destrozaban su cráneo por dentro. \nLas voces fueron calladas por la bala de un policía."
 nsm.8.a: "Terrible..."
 nsm.9.t: "Hemos descubierto un posible complot, ¿qué hacemos?"
 nsm.9.d: ""
 nsm.9.a: "No tenemos tiempo para esto."
 nsm.9.b: "Desviemos algunos recursos en esto."
 nsm.10.t: "Bomba estalla en el cuartel general del MNS en Detroit"
 nsm.10.d: ""
 nsm.10.a: "¡Encuentren al bastardo responsable!"
 nsm.11.t: "Posible Complot: Pista"
 nsm.11.d: "Tenemos motivos para pensar que lo que nuestros agentes tienen en manos son evidencias de un complot terrorista - sumado a esto, hemos descubierto numerosos alijos de armas de los Hutaree. Mientras nos preparamos para lo inevitable, felicitamos a nuestros valientes hombres por sacar a la luz este mezquino plan.\n\nHemos sacado la conclusión de que planean llevar a cabo una guerra de guerrillas permanente y, como hienas que son, nos atacarán cuando estemos en un momento de debilidad, esto es algo que no permitiremos.\n\nReforzaremos nuestra seguridad, expandiremos las operaciones de reconocimiento y le daremos a elegir a la población el palo o la zanahoria. De este modo, podremos acorralar a la milicia en poco tiempo.\n\nGracias a su exceso de confianza, la milicia Hutaree ha dejado un rastro por donde pasa.\n\nEn poco tiempo. encontraremos más pistas como estas, ¡y aplastaremos a los Hutaree de una vez por todas!"
 nsm.11.a: "Sigan siguiendo la pista."
 nsm.12.t: "Posible Complot: Sin resultados"
 nsm.12.d: "\"¡¿Cómo que lo han quemado todo?!\"\n\nColucci había tenido un día estresante. La milicia Hutaree no solo correteaba por ahí como perros rabiosos, también habían destruido la única pista que sus agentes tenían para dar con los terroristas y acabar con ellos.\n\n\"Los alijos estaban repletos de trampas explosivas señor, no pudimos rescatar nada de ellas.\"\n\"¿Y ustedes se rindieron y ya?\" Esos dementes campan a sus anchas por nuestro territorio, y ustedes van y me dicen que han fallado, ¿y luego qué? ¿Ya está? Váyanse a la mierda\"\n\nCuando su último subordinado cerró la puerta, vio de frente a la bandera del Movimiento Nacionalsocialista que había puesto orgullosamente en la puerta. Suspiró mientras miraba el mapa de Míchigan, la milicia le estaba causando muchos dolores de cabeza, seguían desapareciendo soldados y la paranoia no hacía más que crecer. Mientras ahogaba sus penas con whisky, empezó a escribir una nueva orden para sus hombres.\n\n\"Quiero que cada persona que tenga la más mínima relación, sea verdadera o no, que muestre la más mínima simpatía hacia la milicia Hutaree sea detenida y ahorcada, no importa quien o cuando, ¡asegúrense de que no quede ninguno con vida!\""
 nsm.12.a: "Estamos perdiendo el tiempo."
 nsm.12.b: "Ya casi les tenemos."
 nsm.13.t: "Revuelta de Huntaree"
 nsm.13.d: "A pesar de nuestro noble intento de restablecer el orden en América, hemos pecado de entusiasmo. Mientras seguimos avanzando, nos hemos tomado el tiempo de mirar atrás, algo de lo que los terroristas han sacado provecho. Es cierto que ha vuelto la milicia Hutaree. Recientemente bombardearon nuestros cuarteles generales, matando a 16 de nuestros hombres e hiriendo a otros 30 en el proceso. Tras que este ataque diezmara a nuestras filas, Burt ha dicho basta. De ahora en adelante, cualquiera que sea simpatizante o que haya colaborado con los terroristas serán eliminados. Mediante fuego y horca, silenciaremos a toda disidencia. Los Hutaree han jugado bien sus cartas. Mientras cantan victoria, los buscaremos en cada bosque, cada ciudad, cada pueblo y cada habitación. Ya restauramos el orden en Míchigan una vez, podemos hacerlo de nuevo."
 nsm.13.a: "Que Dios los maldiga"
 nsm.15.t: "Revitalización industrial"
 nsm.15.d: "Con el crecimiento masivo del Movimiento Nacionalsocialista en hombres y territorio, durante los últimos meses, el liderazgo de la organización ha estado trabajando sin cesar para coordinar la restauración de la industria americana. Un esfuerzo como este ha empezado a dar sus frutos, con decenas de fábricas en nuestro territorio volviendo a estar en marcha, a cuyas reaperturas asisten numerosos miembros de nuestro gobierno y ciudadanos curiosos.\n\nCon el ruido de la maquinaria resonando otra vez en nuestras ciudades, también estamos empezando a percibir los beneficios de nuestros esfuerzos. Hasta ahora, la respuesta a nuestras medidas ha sido en gran medida positiva, tanto de la población como de los niveles de producción. Como resultado, se han creado una gran cantidad de nuevos puestos de trabajo, a los que aspiran numerosos ciudadanos  deseosos de un trabajo renumerado en medio del caos y la incertidumbre que han experimentado. Mientras que una porción considerable de la población se mostró inicialmente escéptica a ocupar estos puestos (principalmente por culpa de años de propaganda contra movimientos como el nuestro, parece ser que muchos de estos han entrado en razón, viendo la reaparición de puestos de trabajo como algo positivo para ellos y su comunidad - por mucho que les cueste admitirlo. Aparte de algunos disidentes testarudos que prefieren seguir siendo unos parásitos a contribuir a la sociedad, este cambio ha sido muy bienvenido por nuestros ciudadanos, y no cabe duda de que esto contribuirá inmensamente a nuestra economía a largo plazo."
 nsm.15.a: "Un ciudadano productivo es un buen ciudadano"
 nsm.23.t: "Nacionalsocialismo triunfante"
 nsm.23.desc: "¡Hemos ganado, yea!"
 nsm.23.a: "¡Sieg Heil!"
 nsm.25.t: "Inaguración pública del automóvil del pueblo"
 nsm.25.d: "El público estuvo movido hoy mientras que miembros de la prensa, empleados de corporaciones, oficiales, como también curiosos espectadores se juntaron alrededor de varias ubicaciones en todo el país donde el tan ansiado proyecto gubernamental estaba por ser revelado. En el discurso previo a la revelación, aquellos afiliados con el departamento de estado, al igual que sus representantes de la manufactura subsidiaria expresaban con deleite y orgullo sus logros con respecto al monumental paso hecho para poner a América en el camino correcto.\n\nEntre tanto la lona fue removida y el vehículo fue revelado, muchos estaban intrigados mientras los representativos explicaban su familiar y al mismo tiempo cómodo diseño, antes de ser añadido al departamento del estado. El vehículo, llamado \"Automóvil del pueblo\" por aquellos a cargo del proyecto, estaría disponible a un precio firme pero accesible, lo que causo el interés en la multitud. El interés solo aumento cuando fue revelado que aquellos que completen ciertos requerimientos - tales como la ciudadanía trabajadora - serian eligibles para comprar y ser propietarios del vehículo.\n\nOfíciales estatales declaran que el lanzamiento de este proyecto es primordial en su esfuerzo para la reconstrucción. \"Es increíblemente importante que aseguremos un método de transportación para nuestros ciudadanos, especialmente aquellos más afectados por la guerra\". Dice el oficial gubernamental Vincent Garza, uno de los encargados de la revelación. \"Con la devastación que este conflicto ha traído, es solo natural que le demos a la gente un método de transportación, lo que llevara a un incremento de la habilidad para volver al trabajo, y también ayudara a la autosuficiencia\"."
 nsm.25.a: "Oye, el coche tiene buena pinta, ¿no crees?"
 nsm.26.t: "Míchigan unificado"
 nsm.26.d: "¡Lo hemos conseguido! Lo que alguna vez fue un mero deseo para algunos, y directamente un escenario de fantasía para otros, es hoy una realidad. Hemos demostrado a quienes dudaron de nosotros lo equivocados que estaban, porque hemos ganado. Tras un discurso anterior de Burt en donde felicitó a nuestros miembros por sus destrezas en el campo de batalla, en medio de un ambiente eufórico dieron inicio las celebraciones. La euforia por nuestra victoria se sentía en todo nuestro territorio y nuestros miembros se dejaron llevar por ella - en las calles de pueblos y ciudades de Míchigan, nuestras fuerzas ondeaban orgullosamente nuestra bandera celebrando nuestro gran triunfo contra las fuerzas del mal que asolaban nuestro estado.\n\nCon toda Míchigan bajo nuestro justo gobierno, nos hemos topado con la población de nuestros ahora derrotados enemigos. Como esperábamos, la mayoría de ellos nos temen o nos odian, y aquellos que no lo hacen ciertamente son la excepción. Aunque eventualmente abrirán los ojos y abrazarán el nacionalsocialismo, debemos implementar leyes estrictas para neutralizar los elementos subversivos remanentes. El desorden ya se ha notado en múltiples áreas, usualmente causado por grupos izquierdistas entre otros mediante tácticas de resistencia pasiva y movimientos de resistencia de baja intensidad. Debemos acabar lo antes posible con estos escondrijos comunistas, pues si no lo hacemos, dejaremos que sus ideas de \"rebelión\" se difundan.\n\nLos perversos izquierdistas no los únicos enemigos con los que nos cruzamos en nuestra victoria. Parecer ser que si bien los fundamentalistas Hutaree han sido derrotados en combate abierto, estos se niegan a dejar las armas. Hemos detectado actividad inusual en el norte de Míchigan, con ocasionales escaramuzas contra los Hutaree y otros movimientos derivados de estos en los bosques del norte. Claramente están tratando de organizar una resistencia armada contra nuestro gobierno - es crucial de que acabemos con ellos lo más rápido posible para que así estos no nos supongan una amenaza.\n\nTengamos esto en mente una vez que acabemos de celebrar - mientras tanto, seguiremos celebrando nuestras gloriosas hazañas. Con nuestro triunfo en Míchigan, está claro que lo mejor está por venir."
 nsm.26.a: "Hoy Míchigan, ¡mañana el resto de América!"
 nsm.27.t: "¡[NSM.GetNameDefCap] nos coacciona!"
 nsm.27.d: "¡[NSM.GetNameDefCap] está intentando anexionarnos!"
 nsm.27.a: "¡Indignante!"
 nsm.27.b: "Basado"
 nsm.28.t: "El Mando Naval rechaza la unión"
 nsm.28.d: "Cuando inició la Segunda Guerra Civil Americana, elementos de la armada en la Costa Oeste no perdieron tiempo en declarar su neutralidad; estableciendo una junta naval que abarcaba los rincones más recónditos de Norteamérica, \"esperando\" a que acabe el conflicto en vez de tomar partido por cualquier bando. Eligieron tomar Alaska así como los territorios de ultramar - protegiendo y sirviendo a los territorios pacíficos de América. Debido a la pesada carga con la que admirablemente cargaron, inicialmente pensamos que podríamos llegar a algún tipo de entendimiento - uno que involucre su rápida y completa integración a nuestro movimiento - y sin demora, enviamos nuestras demandas al gobierno naval.\n\nEsta semana recibimos su más que desalentadora respuesta. El Almirante Gilday ha rechazado contundentemente nuestros intentos de coerción, de una manera que podemos resumir en un simple \"no\". Mientras que honestamente no habían muchas posibilidades de que las negociaciones hubiesen llegado a buen puerto, sigue siendo una lástima que por el momento, su poderío naval esté fuera de nuestras manos (y a esto hay que sumarle la humillación que esto nos supone)."
 nsm.28.a: "Ese tal buenazo va tener su merecido, tarde o temprano."
 nsm.29.t: "Preparar la Conferencia Nacional"
 nsm.29.d: "Cuando esta nación colapso sobre si misma por la segunda vez en la historia, nosotros supimos desde el inicio que no habría otra oportunidad como esta en nuestras vidas. Desde el muerto y descompuesto cuerpo de América, hemos rascado nuestra salida en contra de la miserable \"democracia liberal\" - una ideología que desde hace mucho hemos visto lo que ha traído; enfermedad moral, degeneración, y el declive de tradiciones que alguna vez valorábamos. Desde esa putrefacción, hemos luchado de diente a uña por el país contra todo aquel que se presento contra nosotros, hasta que finalmente, esa putrefacción se disipo, dejándonos limpios a pesar de la matanza.\n\nPara decir que lo hicimos solos, eso si, seria ser poco sinceros. Incluso nuestros miembros más arrogantes no pueden negar la importancia del Frente Nacional - esa siendo la coalición hecha con otros grupos de ideologías similares para asegurar nuestra victoria. Mientras el polvo se aclara alrededor del país y el orden empieza a ser restaurado, fue rápidamente decidido que las facciones involucradas dentro de nuestra lucha en contra de las fuerzas del mal próximamente se juntaran a discutir el destino de América - la nueva América, creada a partir de nuestra visión.\n\nDentro de la conferencia, eso si, un nuevo frente se ha creado - uno de influencia. Cada miembro de la conferencia naturalmente se va a ver a ellos mismos como los mejores para liderar América a la nueva era - y por ende, debemos ajustarnos a maniobrar políticamente, en vez de tan solo combate. En orden para que esta organización sea aquella que lidere este país, tenemos que tomar los pasos necesarios para legitimarnos en el ojo público y la población general.\n\nObviamente, algunas facciones serán más favorables que otras en términos de liderazgo. Incluso previo a la guerra, había un desgrado nominal entre grupos miembros por razones variadas, algunas que siguen estando presente en contra de ciertos... grupos en la conferencia. A pesar de esto, nosotros sabemos que solo nosotros somos los adecuados para liderar esta nación a la grandeza, lo que hace imperativo que tengamos éxito en las negociaciones como lo hemos tenido en los campos de batalla.\n\nVamos a trabajar - solo nosotros sabemos que es lo mejor para América, después de todo."
 nsm.29.a: "El nacionalsocialismo triunfará - les guste o no."
 nsm.29.b: "Los verdearos patriotas tomarán las riendas - no unos fetichistas culturales o psicópatas."
 nsm.29.c: "Nuestra voluntad fue lo suficientemente fuerte para llevarnos acá. Estas negociaciones serán un paseo en el parque."
 nsm.30.t: "Comunistas incrementan su resistencia"
 nsm.30.d: "En el curso del ultimo par de semanas, se ha visto una preocupante moda observada alrededor de Míchigan en relación a la pacificación de elementos de oposición y subversivos. Un perturbarte aumento en las actividades orientadas a la resistencia se ha visto en territorios que supuestamente se habían subyugado a nuestros valientes soldados. Mientras que la resistencia a nuestra jurisdicción era esperada, se había mantenido largamente a niveles controlables - el ocasional ataque de tipo golpe y fuga, o alguna emboscada contra nuestros fuerzas en zonas que previamente estuvieron en disputa, el cual era normalmente repagado por fuerza bruta de nuestra tropas. Pero, tal aumento de esta actividad es totalmente inesperado; no hay ninguna día en donde nuestros soldados no son molestados por pequeños combates, emboscados en zonas urbanas, o acosados y saboteados de otras maneras. Sobre todo esto, han habido avistamientos de más y más subversiva, propaganda comunista - sin duda puesta por la \"resistencia\" en un intento de causar que ciudadanos respetables tiren su vida por la borda de manera estúpida. Cuando hemos estado destruyendo y cubriendo esta basura cuando la encontramos, la idea de que la población este sufriendo de una radicalización izquierdista contra nosotros es muy alarmante para considerar. \n\nUn sentido de nerviosismo y miedo cuelga por sobre nuestra organización, mientras nos damos cuenta de que estos ataques son lejos de ser aleatorios - estos rebeldes son más organizados que lo que anticipamos inicialmente. Con estos feroces actos volviéndose más audaces y más normales, se esta volviendo claro que algo grande es inminente. No importa lo que sea, nos vamos a atrincherar y preparar - o nuestro movimiento podrá ser destrozado en su infancia desde dentro."
 nsm.30.a: "Que vengan."
 nsm.31.t: "Comunistas en rebelión abierta"
 nsm.31.d: "Hoy, el pánico y el desorden han estallado en todo Míchigan de una manera no vista desde el inicio de la guerra. En varios ataques coordinados, nuestros valientes soldados fueron emboscados salvajemente en varias zonas urbanas, atacados por militantes identificados por sus brazaletes rojos. En muchas de las áreas afectadas, nuestras tropas han sido brutalmente y de repente superadas, sorprendidas sin ceremonias debido a la organización del asalto y a la complicidad de muchos civiles en los propios ataques. Se convocó una sesión de emergencia en nuestro alto mando, en la que se dieron varias órdenes de retirada a posiciones mejor defendidas, las cuales están en proceso de ejecución.\n\nMientras nos reorganizamos apresuradamente para enfrentarnos directamente a estos bastardos, hemos recibido algunas transmisiones escasas de estos líderes de la revuelta, que ofrecen sólo una frase: \"Muerte a la escoria nazi\". Se ha trazado la línea, ¡y NO debemos caer ante estos comunistas insurgentes! Debemos usar todos los métodos a nuestro alcance para asegurar nuestra victoria final aquí, ¡no sea que todo nuestro progreso haya sido en vano! Todo el movimiento entiende que no sólo nuestro destino, sino el destino del nacionalsocialismo, ¡de la raza aria!, descansa sobre nuestros hombros. ¡No flaquearemos!"
 nsm.31.a: "Entonces, los bastardos se han mostrado. No les mostraremos piedad."
 nsm.32.t: "Rebelión comunista aplastada"
 nsm.32.d: "En lo que ha sido nuestra hora más oscura hasta la fecha, el Movimiento Nacionalsocialista ha surgido de entre las llamas de la agitación y la revuelta como un Fénix, destruyendo triunfalmente la amenaza roja que había cultivado su ideología decadente entre gran parte de la población de Míchigan. Mientras los incendios arden en muchas ciudades y pueblos (muchos de ellos provocados durante los combates por izquierdistas desesperados), la represalia por tan traicionero acto ha sido brutal, y con razón. Las palizas y ejecuciones de los rebeldes supervivientes se han vuelto habituales mientras observan horrorizados que su plan para destruir el futuro de América ha fracasado estrepitosamente, asegurando nada más que su muerte inminente.\n\nAunque las probabilidades inicialmente estaban en nuestra contra, nuestra victoria fue naturalmente segura, siendo abrumadora. Con la mayoría de los líderes y subordinados de la resistencia muertos o moribundos, hemos eliminado efectivamente la mayoría, si no todas, las formas de resistencia activa entre la población civil en un futuro previsible. No obstante, debemos mantenernos cada vez más vigilantes a partir de ahora para asegurar que una revuelta tan desastrosa nunca vuelva a ocurrir."
 nsm.32.a: "Las ratas estaban condenadas desde el inicio."
 nsm.33.t: "Maquinaria"
 nsm.33.d: "El sonido de la maquinaria industrial resonaba por toda la fábrica mientras Jordan se alejaba de su puesto de trabajo, secándose el sudor de la frente. El constante ruido de golpes metálicos, el zumbido de los sistemas hidráulicos, el calor abrasador de los hornos. Más a menudo de lo que debería, esta sobrecarga sensorial abrumaba terriblemente a los trabajadores más nuevos. Hace unos meses, Jordan se sentía exactamente igual cuando pisó por primera vez los pasillos de la fábrica. El ruido, el calor insoportable, la extrañeza de todo aquello: era una experiencia incómodamente nueva, con la que, afortunadamente, había empezado a familiarizarse.\n\nJordan nunca había esperado trabajar en un lugar así. Siendo un antiguo camarero de restaurante, tuvo que adaptarse a su nuevo trabajo de la manera más dura. Cuando los neonazis lograron tomar el control de todo Míchigan, él simplemente intentó pasar desapercibido; sabía que esto no era como los días previos a la guerra, cuando la policía estaba presente en todas sus concentraciones. Ahora, quienes hacían cumplir la ley y quienes llevaban esvásticas eran la misma gente, y había visto claramente que eran mucho menos tolerantes con las críticas. Dejando a un lado la aplicación despiadada, Jordan sentía poca necesidad de interactuar con los soldados vestidos de negro que patrullaban las calles. Sin embargo, cuando llegó la noticia de oportunidades de trabajo relacionadas con la \"reconstrucción industrial\", se mostró curioso y fue a ver qué atraía a la multitud.\n\nJordan dirigió su mirada distraídamente hacia las paredes interiores del complejo donde trabajaba. Teñidas por el resplandor del horno ardiente en su interior, podía distinguir una variedad de carteles y banderas orientados al MNS, con palabras de ánimo para los trabajadores como él. En la misma pared colgaba la misma bandera con la esvástica, así como ese otro símbolo que había estado allí desde que volvió a trabajar, con las estrellas y franjas, como para recordarte en qué país estabas. Cada vez que lo veía, sentía que tenía que recordarse a sí mismo sus propias creencias y convicciones; que hacía esto porque necesitaba ganarse la vida, que muchos otros habían hecho lo mismo que él, que sabía que no era un skinhead sino alguien que simplemente intentaba salir adelante. Lo habían educado para ser tolerante con los demás, así que no tenía nada que temer. Además, no estaba en posición de rechazar la oferta, ¿verdad? Ninguna persona cuerda podría culparle por eso, seguro.\n\nSalió de sus pensamientos al recordar que tenía un trabajo que terminar, no fuera a enfadar al capataz. Así que ajustó su equipo de protección y volvió al familiar infierno industrial."
 nsm.33.a: "Las ratas estaban condenadas desde el inicio."

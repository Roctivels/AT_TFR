 vatican.1.t: "Fallecimiento del papa Francisco"
 vatican.1.d: "noo"
 vatican.1.a: "Se nos fue un grande."
 vatican.2.t: "Fallece el papa Francisco"
 vatican.2.d: "El papa Francisco falleció esta mañana a los 88 años, oficialmente declarado a las 07:35 am (GMT+2), dejando un legado de defensa de la paz internacional y la diplomacia, siendo sus famosas reuniones con el Ayatolá de Irán solo la punta del iceberg del trabajo de este hombre al frente del papado.\n\nAunque el papa Francisco ha sido una figura controvertida entre los católicos de todo el mundo, nadie puede negar que toda la Iglesia católica está de luto hoy mientras el Vaticano hace sonar sus campanas. Sus comentarios, a veces reformistas, recibieron críticas de los conservadores, pero su preocupación por el medioambiente y por los pobres subrayó su popularidad entre las masas de Europa y de todo el mundo católico.\n\nFue quizás un milagro que, a pesar de una doble neumonía que dañó sus pulmones, lograra llegar a la plaza de San Pedro el Domingo de Pascua, solo una última vez, para bendecir a cientos y conversar con la gente, dando un último paseo en el papamóvil. Se quedó dormido y falleció pacíficamente al día siguiente, el Lunes de Pascua.\n\nComo el primer jesuita y primer papa latinoamericano, también fue el primero en llevar el nombre de San Francisco de Asís, un santo conocido por su simplicidad personal y su cuidado a los enfermos y desfavorecidos. Su muerte se debió a una batalla de toda la vida contra una enfermedad pulmonar crónica, tras enfrentar problemas médicos con su colon en 2021, una hernia en 2023 y, desde 2022, repetidos episodios de bronquitis."
 vatican.2.a: "Extendemos nuestro más sentido pésame."
 vatican.3.t: "Cónclave (2025)"
 vatican.3.d: ""
 vatican.3.a: "Luis Tagle"
 vatican.3.b: "Robert Prevost"
 vatican.3.c: "Peter Erdo"
 vatican.3.e: "Robert Sarah"
 vatican.4.t: "El cardenal Luis Antonio Tagle es electo papa Francisco II"
 vatican.4.d: "Esta mañana, las campanas de la basílica de San Pedro resonaron en la Ciudad Eterna, y humo blanco salió de la chimenea de la Capilla Sixtina, señalando al mundo que el cónclave ha concluido y que el Colegio Cardenalicio ha elegido al 267º Obispo de Roma. El cardenal Luis Antonio Tagle, de Filipinas, ha sido elegido para el trono de San Pedro, tomando el nombre de Francisco II, y es el primer papa del Sudeste Asiático en la historia.\nEn su discurso público como Pontífice desde el balcón de la basílica de San Pedro, el recién elegido papa hizo algunas declaraciones respecto al nuevo rostro en el Kremlin:\n\n\"Con el resurgimiento de Moscú y su esfera, estoy aquí para advertiros sobre la posibilidad misma de un nuevo auge del Imperialismo. Y como tal, el fin del diálogo, la misericordia y la humildad por las que Cristo Jesús murió para que nosotros las mantuviéramos. Os llamo, hermanos y hermanas de Rusia, a resistir los intentos del Kremlin de sostener una falsa interpretación del Evangelio\".\n\nEl fuerte énfasis del papa Francisco II en el diálogo interreligioso y la misión evangelizadora ha asegurado que su papado será uno de sinodalidad, ya que una corriente más progresista parece estar ganando terreno en la Santa Sede. Sin embargo, enfrenta críticas por parte de los miembros más conservadores y tradicionalistas de su fe, especialmente debido a su énfasis en la inclusión y el acompañamiento de personas marginadas, incluidos los homosexuales."
 vatican.4.a: "Un nuevo papa para una nueva era."
 vatican.5.t: "El cardenal Robert Prevost es electo papa León XIV"
 vatican.5.d: "Esta mañana, las campanas de la basílica de San Pedro resonaron en la Ciudad Eterna, y humo blanco salió de la chimenea de la Capilla Sixtina, señalando al mundo que el cónclave ha concluido y que el Colegio Cardenalicio ha elegido al 267º Obispo de Roma. El cardenal Robert Francis Prevost, de Estados Unidos, ha sido elegido para el trono de San Pedro, tomando el nombre de León XIV, y es el segundo papa de las Américas en la historia.\nEn su discurso público como Pontífice desde el balcón de la basílica de San Pedro, el recién elegido papa comentó sobre la situación de su país natal:\n\n\"Y a todos ustedes, hermanos y hermanas de América. ¡Oh, cómo duele mi corazón por cada una de las almas perdidas en este conflicto sin Dios! Pero no se preocupen, porque la paz de Dios supera todo entendimiento y si creen que Dios ha obrado, la paz volverá a América. Así que, a ustedes, hermanos y hermanas del mundo, debemos seguir el ejemplo de Cristo y construir puentes hacia aquellos heridos por este y cualquier conflicto, no destruirlos\".\n\nCon una experiencia en trabajo misionero y prestando atención a las culturas pequeñas, se espera que el papado de León XIV sea probablemente similar al camino que trazó el papa Francisco antes que él, habiendo ya declarado su apoyo a la Unión de América en la actual Guerra Civil."
 vatican.5.a: "El legado de Francisco vive."
 vatican.6.t: "El cardenal Peter Erdo es electo papa Esteban X"
 vatican.6.d: "Esta mañana, las campanas de la basílica de San Pedro resonaron en la Ciudad Eterna, y humo blanco salió de la chimenea de la Capilla Sixtina, señalando al mundo que el cónclave ha concluido y que el Colegio Cardenalicio ha elegido al 267º Obispo de Roma. El cardenal Peter Erdo de Hungría ha sido elegido para el trono de San Pedro, tomando el nombre de Esteban X.\nEn su discurso público como Pontífice desde el balcón de la basílica de San Pedro, el recién elegido papa reflexionó sobre el estado de los asuntos mundiales:\n\n\"Europa está más dividida hoy que en décadas. En tiempos como los nuestros, la única, santa, católica y apostólica Iglesia debe ser un faro, por encima de la política, pero nunca insensible a la injusticia. Recordemos que nuestra unidad es mayor que cualquier frontera, bandera o partido; porque todos somos uno en Cristo Jesús. No es momento de desesperar, sino de renovarse\".\n\nA menudo descrito como un conservador teológico con un profundo respeto por las tradiciones católicas, el papado de Esteban X probablemente enfatizará la continuidad y la estabilidad, especialmente en medio de las crecientes crisis globales. Sin embargo, su dedicación de larga data a la cohesión social, el diálogo con las Iglesias Orientales y el papel de la identidad nacional en la religión lo sitúan claramente como un papa atento a las ansiedades únicas de Europa."
 vatican.6.a: "Una nueva era para la Iglesia."
 vatican.7.t: "El cardenal Robert Sarah es electo papa Benedicto XVII"
 vatican.7.d.1: "Esta mañana, las campanas de la basílica de San Pedro resonaron en la Ciudad Eterna, y humo blanco salió de la chimenea de la Capilla Sixtina, señalando al mundo que el cónclave ha concluido y que el Colegio Cardenalicio ha elegido al 267º Obispo de Roma. El cardenal Robert Sarah de Ghana ha sido elegido para el trono de San Pedro, tomando el nombre de Benedicto XVII, y es el primer papa procedente de África en más de 1.500 años.\nEn su discurso público como Pontífice desde el balcón de la basílica de San Pedro, el recién elegido papa pronunció un mensaje contundente:\n\n\"El espectro comunista ahora acecha cada rincón del mundo. Es como un veneno que se infiltra en corazones y mentes, rechazando a Dios y la dignidad humana, abrazando las cosas de este mundo. Debemos ofrecer el antídoto: donde aquellos que aman las cosas de este mundo difunden su propaganda, debemos proclamar el Evangelio con más fuerza. Este mundo no necesita compromiso, necesita valentía\".\n\nConocido por su tradicionalismo vocal y sin disculpas, y su feroz oposición a la cultura secular moderna y al fundamentalismo islámico, se espera que el papa Benedicto XVII inaugure una era rigurosa y tradicionalista. Su elección señala una Iglesia preparada para enfrentar lo que él ha llamado \"el colapso de Occidente\", tanto moral como espiritualmente."
 vatican.7.d.2: "Esta mañana, las campanas de la basílica de San Pedro resonaron en la Ciudad Eterna, y humo blanco salió de la chimenea de la Capilla Sixtina, señalando al mundo que el cónclave ha concluido y que el Colegio Cardenalicio ha elegido al 267º Obispo de Roma. El cardenal Robert Sarah de Ghana ha sido elegido para el trono de San Pedro, tomando el nombre de Benedicto XVII, y es el primer papa procedente de África en más de 1.500 años.\nEn su discurso público como Pontífice desde el balcón de la basílica de San Pedro, el recién elegido papa pronunció un mensaje contundente:\n\n\"El espectro del comunismo ha regresado rugiendo. Conquista naciones libres y soberanas y predica contra Dios, disfrazando la persecución con justicia y la tiranía con orden. Ahora enfrentamos un nuevo Eje Sino-Ruso del Mal, donde nuestro Señor es desterrado y los hombres obligados a arrodillarse ante el Estado. No guardaremos silencio ante ellos. Si debemos llevar nuestra Cruz por el Gólgota una vez más, lo haremos con fervor\".\n\nLa elección de Benedicto XVII -un tradicionalista sin complejos- representa una Iglesia lista para resistir, denunciar y guiar a los fieles a través de lo que él ha llamado una nueva \"era de lobos\"."
 vatican.7.a: "Regresa la ecclesia militans."
 vatican.8.t: "¡El papa es [THIS.GetAdjective]!"
 vatican.8.d: "¡Un cardenal de nuestra nación ha sido elegido el nuevo papa!\nConseguimos bonificaciones geniales y algo de influencia sobre otros países. ¡Hurra!"
 vatican.8.a: "Genial."
 ITA_memento_audere_semper: "Memento Audere Semper"
 ITA_memento_audere_semper_desc: "Los tártaros han vuelto para beber de la sangre de Polonia ¡y de toda Europa!\nY hoy, ¡hagamos que sus corazones ardan de nuevo! Los hijos de Europa están listos.\n¡Que vengan los perros invasores! ¡Nosotros somo un pueblo que comparte una misma fe forjada por los mismos desafíos!\nQue vengan. ¡Enviaremos a los tártaros de vuelta a los Urales!"
 ITA_eyes_in_the_skies: "Ojos en los cielos"
 ITA_eyes_in_the_skies_desc: "Comandar la marina o la fuerza aérea será imposible si no se sabe donde se encuentra el enemigo. Instalaremos una serie de sensores, antenas y radares en Europa Oriental para monitorear la actividad enemiga, y nuestras aeronaves serán las responsables de patrullas el espacio aéreo del frente de batalla. "
 ITA_expanded_mediterranean_doctrine: "Doctrina mediterránea expandida"
 ITA_expanded_mediterranean_doctrine_desc: "El Mediterráneo es la cuna de la civilización romana y su control siempre ha sido una meta nacional. La flota italiana fue concebida, organizada y diseñada para actuar en el Mar Mediterráneo, y la cultura náutica de nuestra marina gira en torno a controlar y proteger nuestro \"Mare Nostrum\". Es nuestro deber garantizar la seguridad en las costas europeas y, si es posible, de atacar al oso si este trata de bañarse en nuestro mar."
 ITA_wings_over_the_horizon: "Alas sobre el horizonte"
 ITA_wings_over_the_horizon_desc: "La fuerza aérea siempre ha sido la joya de la corona del ejército italiano, y a lo largo de su historia siempre ha sido una fuente de orgullo nacional. Carponi, D'Annunzio y Alessandro Marchetti son algunos de los personajes más célebres que han surcado los cielos de Italia, ya sea como diseñadores, pilotos o entusiastas de la aviación. Nos enfocaremos en mejorar y repensar los diseños italianos, y en construir una vasta flota de aeronaves que neutralicen al enemigo."
 ITA_venturing_in_the_big_blue: "Aventurándose en el gran azul"
 ITA_venturing_in_the_big_blue_desc: "Volare oh, oh\nCantare oh, oh\nNel blu dipinto di blu\nFelice di stare lassù\nE volavo, volavo felice più in alto del sole\nEd ancora più su\nMentre il mondo pian piano spariva lontano laggiù\nUna musica dolce suonava soltanto per me"
 ITA_operation_nettuno: "OPERACIÓN: §YNETTUNO§!"
 ITA_operation_nettuno_desc: "La operación a gran escala con el nombre en clave de Neptuno tiene como objetivo asegurar los puertos rusos, depósitos de suministros, baterías navales y playas para preparar una invasión a gran escala. Reforzaremos la posición de la OTAN en la guerra y, con suerte, capturaremos objetivos estratégicos de vital importancia para los planes de nuestros aliados."
 ITA_operation_giove: "OPERACIÓN:§YGIOVE§!"
 ITA_operation_giove_desc: "La operación a gran escala con el nombre en clave de Giove tiene como objetivo asegurar aeródromos rusos, depósitos de suministros, armas antiaéreas y rutas de comunicación como parte de los preparativos de una invasión total. Tomaremos el control de posiciones claves en el frente y cortaremos la cadena de suministros del enemigo."
 ITA_new_supply_routes: "Nuevas rutas de suministros"
 ITA_new_supply_routes_desc: "Es prioritario reforzar los puertos, aeropuertos, líneas ferroviarias y logísticas próximas al frente para que los soldados del frente tengan acceso a suministros esenciales. Nos haremos con nuevos vehículos y construiremos instalaciones avanzadas para que podamos equipar adecuadamente a nuestros hombres."
 ITA_restore_compulsory_military_service: "Restablecer el servicio militar obligatorio"
 ITA_restore_compulsory_military_service_desc: "El servicio militar, suspendido por el parlamento en 2005, es hoy más necesario que nunca. Por muy impopular que sea, no nos queda de otra que suspender la ley e improvisar una rápida reactivación del servicio militar obligatorio."
 ITA_civil_industry_conversion_program: "Programa de conversión de industria civil"
 ITA_civil_industry_conversion_program_desc: "El pueblo italiano está dispuesto a apretarse el cinturón para suplir las necesidades de la guerra.\nNuestros hermanos en el frente necesitan armas, municiones, comida, entre otros bienes esenciales, en definitiva cualquier cosa que podamos producir.\nLa conversión industrial no es un capricho; es algo necesario y que se debe hacer de inmediato.\nHaremos frente a este desafío logístico con una buena planificación y tomando decisiones estratégicas. "
 ITA_to_stand_as_one_nation: "Una nación unida"
 ITA_to_stand_as_one_nation_desc: "Con la supervivencia de nuestra nación en juego, no hay tiempo para jueguitos políticos.\nEs necesario formar un Gobierno de unidad para poder implementar las reformas que demande la guerra. No importa si eres de derechas o de izquierdas, ante el enemigos todos somos hermanos."
 ITA_well_be_back_before_you_know: "Volveremos antes de que se den cuenta"
 ITA_well_be_back_before_you_know_desc: "Cuanto antes termine la guerra, antes podremos iniciar las celebraciones.\nCuando la nación trabaja al unísono, ¿quién podrá detenernos?\nEl gran proletariado se alza una vez más, con un fervor renovado.\nEsta guerra debe terminar, y nosotros pondremos fin a ella\nHacemos un llamado a la nación: \"¡Volveremos!\"\n\nY volveremos antes de lo que cualquiera pueda pensar."
 ITA_operation_cerere: "OPERACIÓN: §YCERERE§!"
 ITA_operation_cerere_desc: "Codename Cerere is the strategic plan drawn up by our generals for operations in Ukraine.\nGiven the battlefield conditions, the plan is designed to let us advance swiftly and with force, minimizing engagements and casualties while securing key strategic positions."
 ITA_break_the_eastern_wall: "Break the Eastern Wall"
 ITA_break_the_eastern_wall_desc: "The moment has come.\nWe strike relentlessly, no quarter, no hesitation.\nNow that we hold the initiative, we will not squander it.\nStrike, strike, strike, with all your strength and all your pain!\nStrike until victory is certain.\nIf our enemies held the advantage, they would do the same. Take the knife in your hand, and strike."
 ITA_ogni_lasciata_e_persa: "Ogni Lasciata è Persa"
 ITA_ogni_lasciata_e_persa_desc: "We will defend every position: every city, every district, every building.\nNot one meter of land to the invaders!\nNo hesitation: From hell, the only way is forward.\nMake them sweat for every stone, every crevice, every drop of river water, sons of Italy."

 italy_ew_events.2.t: "All Quiet"
 italy_ew_events.2.d: "Recent technological advancements in Warfare rendered it impossible for soldiers to communicate with anyone at large distances without permission. It was quite a primitive move, but writing letters became the only realistic option left for these desperate soldiers and their loved ones.\n\nIn a small town, a few miles from Rome, a package of letters had returned for the third time since the war began. Wives, friends and family members impatiently waited at the town's piazzetta, counting the seconds until the letters were distributed amongst them.\n\nSilvia, even if she didn't believe it, was the most impatient. She's spent most of her life with her husband ever since they met each other at kindergarten. Even if they didn't know it at the time, they'd become one of the same. They endured economic hardship, the pandemic, and the growing geopolitical tensions between their nation and Moscow, all dependent on each other. Now, his husband was on the frontlines directly, becoming one of the many forgotten names fed to the slaughterhouse.\n\nIt'd been a year since he left Italy. The first letter sent was about optimism, of surprising victories against the enemy in unbelievable circumstances. The second letter was different. It was more direct; less optimism, more so the dreadful situation he and his brigade found themselves in, fighting tooth and nail to defend their small outpost in Latvia.\n\nEver since she received that letter over 4 months ago, she always slept with her eyes open, wondering, hoping her husband was alright. This letter may prove to calm her, or break her beyond repair.\n\nAs she argued to herself, she finally decided to approach the package, already organized by the local volunteers. To her surprise, she found nothing. Not a single envelope was left.\nDistressed, she began breathing faster, approaching one of the volunteers however way she could. \"Excuse me?\" She began. \"I'm pretty sure you must've missed a few envelopes. My husband, Luca Moretti, isn't in this pile.\"\n\nThe volunteer rolled her eyes. \"Moretti? I can assure you, I organized most of these envelopes and I haven't found anyone with that surname. Sorry.\"\n\nWhat? No one? Not a single one? Silvia thought about continuing to ask the volunteer, but what was he supposed to know? She slowly walked out of the scene, weeping helplessly."
 italy_ew_events.2.a: "She wouldn't be the only one."
 italy_ew_events.3.t: "¿Por qué morir por Donetsk?"
 italy_ew_events.3.d: "Florence had been quiet since the start of the war like so many other cities in Italy. The political life that existed in the city had vanished almost overnight. Public gatherings were canceled, local political parties indefinitely postponed events, city council meetings were annulled; all the civic activity people were familiar with stopped. Nobody said it, but everyone knew it. Italy was at war and democracy in the country went silent.\n\nYet there was one group that seemed to not want to go out without a loud last word.\n\nDowntown and right in front of the city hall, a crowd had gathered. They held signs, chanted slogans, and waved their flags, their spectacle attracting the attention of every passerby. They were the loudest scene in the city, and the government had certainly noticed. Inside the city hall building, the politicians watched subtly from behind curtained windows with blank looks, but the expressions weren't universal. The chief of police watched with a scornful look, listening to the city's dedicated Russophiles yell their slogans and wave their signs with the familiar demands.\n\nNO WAR! NO INTERVENTION!\n\nITALY DIDN'T VOTE FOR THIS!\n\nWHY DIE FOR DONETSK?\n\nOver and over they chanted to the continued scorn of their leaders. They were pawns, useful idiots, maybe traitors. Perhaps the FSB gave them a good lump sum to go on with their nonsense. By 4pm they were all asking themselves if they would stay there till the dead of night.\n\n But they got their answer really quickly.\n\nThey looked to the right and saw what lit up a new furious commotion in the square. Police officers from the city poured in and already got into scuffles with the protestors. Shouts, insults, and even punches flew as the local anti-interventionists made their stand, but it didn't last. Within an hour the police already had dealt with them, and for the first time in days, the police chief had a look of satisfaction on his face."
 italy_ew_events.3.a: "They can agitate for Moscow in a cell."
 italy_ew_events.4.t: "Engagement Report"
 italy_ew_events.4.d: "Presence of Russian Black Sea fleet in the Black Sea area of operation threatened operational capabilities of both naval, air, and land assets in the Bulgarian, Romanian, and Ukrainian sectors. Offensive thrust by a large contingent of the enemy fleet was detected for targets on the Romanian and Ukrainian coastlines. Italian and NATO naval high commands approved of engagement of select Russian battle group.\n\nCOURSE OF ENGAGEMENT: Friendly naval forces in tandem with air support engaged lead enemy vessels. Hostiles sustained immediate losses and attempted a counterattack with air assets and missile strikes. Pitched battle between friendly and naval forces ensued. Losses occurred for friendly forces from hostile ground attack aircraft and missile salvos. However, sustained pressure by friendly drone, air, and missile strikes depleted enemy reserves and decapitated enemy command and control infrastructure. After sustained C2 and material losses, enemy forces retreated from the area of operation.\n\nFRIENDLY CASUALTY REPORT: 4 frigates. 1 destroyer. 2 multirole fighters. 7 drones.\n\nHOSTILE CASUALTY REPORT: 5 missile corvettes. 12 patrol boats. 2 guided missile frigates. 5 naval helicopters. 3 multi-role fighters. 2 drones.\n\nAFTER-ACTION TACTICAL ASSESSMENT: Victory. Manageable losses for friendly forces. Significant for hostile forces. Total loss of offensive tempo for Russian Black Sea fleet forces.\n\nFINAL STRATEGIC ASSESSMENT: Russian Black Sea naval forces have suffered significant casualties. Minimum estimate of 20 percent of hostile naval forces are combat ineffective. Enemy fleet will likely be forced into a defensive posture for the immediate duration of current operations. Offensive operations by Russian Black Sea forces highly unlikely anytime soon but may be renewed in the near future."
 italy_ew_events.4.a: "A NATO lake, coming soon."
 italy_ew_events.5.t: "OPERATION BRIEFING - Sevastopol Assault"
 italy_ew_events.5.d: "Operational Briefing for limited amphibious assault in the Sevastopol Coastal Sector\nDate: [GetDateText]\nDistribution: Comando Supremo - Naval Section - Joint Operations\n\nTOP SECRET\n\nThis document outlines a basic summary of the amphibious operation targeting Russian naval command centers and coastal radars in the Sevastopol area. The unit designated for this operation was the Lagunari Regiment “Serenissima” for their speed and operational efficiency.\n\nEnemy control over Sevastopol enables them a strategic advantage over our positions in the Black Sea, allowing them to perform reconnaissance operations against our fleets.\nOne of the key naval command centers in the region was located 20 km west of Sevastopol. It functioned as the primary command node for Russian mine-laying and recon operations in the Black Sea, protecting the peninsula from any significant NATO amphibious operations.\n\nIntelligence report signals showcase that there is a six-hour maintenance blackout in the node from hours 0100-0700, blocking it from any external communications. \nThese were designated the best hours to carry out this operation.\n\nThe operation targeted five key points, which included coastal radar centers, fire-control systems, and the aforementioned command center. The Regiment was able to neutralize all objectives in mere hours since the operation began, suffering few casualties in the process. The Regiment squads were even able to hold their positions for 12 hours, allowing our naval and air assets to exploit the gap created.\n\nThe successful execution of the operation disabled enemy coastal defenses for the next 2-3 days, allowing allied naval forces freedom of movement on the Black Sea for that period and the earlier preparation of follow-on operations on other key assets across the Crimean Coast."
 italy_ew_events.5.a: "Russian Dominance is Being Challenged."
 italy_ew_events.6.t: "Folgore Over the Don"
 italy_ew_events.6.d: "The sky above Voronezh was the color of bruised steel when the C-130s appeared at low altitude, engines howling against the wind. Russian lines had buckled west of the city after weeks of grinding attritional fighting; NATO forces pushed to exploit the gap. Italy, committed to do its part, threw in its elite: the Folgore Parachute Brigades. \n\nAt 0430 hours, the drop began. Hundreds of olive-drab chutes bloomed against the gray dawn, elites from the 185th Paratroopers Regiment, faces blackened, weapons strapped tight. They fell toward a patchwork of wheat fields and ruined collective farms on the city's southern outskirts, designated LZ Viper. Anti-air bursts flickered below, but most fire was wild; Russian mobile units were stretched thin. \n\nThe first sticks hit the ground hard. Captain Lorenzo Ricci's platoon secured the central crossroads within minutes, silencing a surprised BMD crew with grenades and small-arms fire. Nearby squads cleared a derelict grain silo turned observation post, dragging the dazed garrison out at gunpoint. By 0500, a rough perimeter formed around the drop zone: machine-gun nests in ditches, snipers on rooftops, engineers marking glide paths with chem-lights. \"Perimeter secure. LZ Viper green. Request immediate resupply.\" \n\n Within the hour the first heavy-drop pallets slammed down, crates of 120 mm mortar rounds, medical kits, Milan anti-tank missiles, and diesel jerry cans. Follow-on C-27J Spartans circled low, disgorging more troops and light vehicles.\n\nBy midday the pocket held. Folgore engineers bulldozed a hasty airstrip from the flattened wheat; the first An-26 landed at dusk with ammunition and hot meals. Russian counterattacks probed the edges, probing artillery, then dismounted infantry, but recoilless rifles and Javelin teams turned them back with smoking hulls.\n\nIn the command post, a ruined farmhouse cellar, Ricci wiped sweat from his brow and keyed the mic. \"Voronezh southern flank stabilized.\" The paratroopers lit cigarettes in the fading light, watching supply birds drone overhead. For one night, at least, the line belonged to Italy."
 italy_ew_events.6.a: "And to Europe."

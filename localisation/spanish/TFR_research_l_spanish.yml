l_spanish:
 basic_machine_tools: "Herramientas mecánicas modernas"
 basic_machine_tools_desc: "Las máquinas modernas, versátiles y robustas, sientan las bases para desarrollar la próxima generación de equipos y vehículos."
 improved_machine_tools: "Aleaciones industriales"
 improved_machine_tools_desc: "Las nuevas aleaciones metálicas aplicadas a herramientas clásicas mejoran la durabilidad de las máquinas modernas."
 advanced_machine_tools: "Software CIM moderno"
 advanced_machine_tools_desc: "La manufactura integrada por computadora (CIM) es un enfoque de producción que utiliza computadoras para controlar todo el proceso de fabricación. Esta integración permite que los procesos individuales intercambien información entre sí e inicien acciones."
 assembly_line_production: "Software CAM moderno"
 assembly_line_production_desc: "La manufactura asistida por computadora (CAM) es el uso de software para controlar herramientas mecánicas y otros equipos relacionados en la fabricación de piezas. Su objetivo principal es acelerar el proceso de producción y crear componentes y herramientas con dimensiones más precisas y una mayor consistencia en los materiales, utilizando en algunos casos solo la cantidad necesaria de materia prima."
 flexible_line: "Piezas ubicuas I"
 flexible_line_desc: "Las piezas mecánicas estandarizadas en toda la producción reducirán la pérdida de eficiencia al ordenar cambios de producción en nuestras fábricas.\n\n"
 streamlined_line: "Impresión industrial I"
 streamlined_line_desc: "Al poner un énfasis en la impresión 3D industrial, los nuevos esfuerzos ganarán velocidad más rápido que nunca.\n\n"
 improved_equipment_conversion: "Fundición a presión I"
 improved_equipment_conversion_desc: "Los moldes y procesos modernos de fundición a presión ofrecen un método más rápido para la producción de grandes piezas metálicas."
 advanced_equipment_conversion: "Fundición a presión II"
 advanced_equipment_conversion_desc: "Las técnicas de moldeo avanzadas y los nuevos materiales aumentan la variedad de metales que pueden fundirse de manera eficiente."
 industrial_software: "Controles simplificados del software CIM"
 industrial_software_desc: "La simplificación de los controles en las líneas de producción permite que un menor número de operarios gestione más maquinaria."
 industrial_software2: "Software CAM actualizado"
 industrial_software2_desc: "El entorno de fabricación es cada vez más complejo. La necesidad de herramientas CAM y PLM (gestión del ciclo de vida del producto) para ingenieros de producción, programadores CNC o maquinistas es comparable a la necesidad de asistencia computarizada para los pilotos de sistemas aeronáuticos modernos. Este déficit de conocimientos puede superarse mediante aprendizaje automático y programas de asistencia en el lugar de trabajo."
 industrial_software3: "Software CIM moderno"
 industrial_software3_desc: "Al crear un estándar universal para el software CIM, diferentes empresas y organizaciones transnacionales pueden planificar fácilmente una producción multifacética."
 industrial_software4a: "Piezas ubicuas"
 industrial_software4a_desc: "Los sistemas electrónicos universales para nuestros equipos simplificarán el proceso de recuperación y reutilización en los turnos de producción.\n\n"
 industrial_software4b: "Impresión industrial"
 industrial_software4b_desc: "Los proyectos avanzados de impresión 3D pueden aplicarse a la fabricación moderna. La fabricación de piezas más complejas bajo pedido generará empresas de mayor crecimiento en el futuro.\n\n"
 factory_output_upgrade: "Maquinaria moderna I"
 factory_output_upgrade_desc: "Las mejoras modernas en la producción en cadena de montaje aumentan la eficiencia en la creación de productos.\n\n"
 factory_output_upgrade2: "Maquinaria moderna II"
 factory_output_upgrade2_desc: "El uso de aleaciones más resistentes en los equipos de producción garantiza una mayor vida útil de las herramientas."
 factory_output_upgrade3: "Maquinaria moderna III"
 factory_output_upgrade3_desc: "Las herramientas de extremo de brazo de intercambio rápido ahorran valiosos segundos al contar con un carrusel disponible localmente o un bastidor externo cercano."
 factory_output_upgrade4: "Maquinaria moderna IV"
 factory_output_upgrade4_desc: "El control preciso de la articulación en la robótica industrial eleva los estándares de calidad en todos los campos de producción."
 factory_output_upgrade5: "Maquinaria moderna V"
 factory_output_upgrade5_desc: "La robótica de siete ejes proporciona mayor eficiencia al construir productos con contornos irregulares y espacios reducidos."
 factory_output_upgrade6: "Maquinaria moderna VI"
 factory_output_upgrade6_desc: "Las máquinas con mayor capacidad de carga permiten producir objetos mucho más grandes. Esto ahorra tiempo al reducir los pasos de construcción una vez que las piezas y los productos llegan a su destino."
 factory_output_upgrade7: "Maquinaria moderna VII"
 factory_output_upgrade7_desc: "Al aumentar la precisión de medidas minúsculas, las máquinas ya avanzadas ahora son capaces de crear piezas más finas para productos complejos."
 factory_output_upgrade8: "Maquinaria moderna VIII"
 factory_output_upgrade8_desc: "Las técnicas avanzadas de prevención de singularidades reducen el desgaste del brazo robótico, a la vez que previenen por completo daños al producto."
 factory_output_upgrade9: "Maquinaria moderna IX"
 factory_output_upgrade9_desc: "La integración del aprendizaje automático mitiga los accidentes laborales al dotar a la máquina de una mente adaptativa y sensores únicos."
 concentrated_industry: "Industria organizada I"
 concentrated_industry_desc: "Un sector industrial compuesto por grandes corporaciones que compiten por proyectos gubernamentales y privados. Este sistema es muy eficiente, pero también fácilmente explotable y atacable.\n\n"
 concentrated_industry2: "Manufactura privatizada"
 concentrated_industry2_desc: ""
 concentrated_industry3: "Contratos del sector privado"
 concentrated_industry3_desc: ""
 concentrated_industry4: "Redes de producción concentradas"
 concentrated_industry4_desc: ""
 concentrated_industry5: "Zonas industriales estandarizadas"
 concentrated_industry5_desc: ""
 concentrated_industry6: "Monopolios controlados"
 concentrated_industry6_desc: "Al otorgar a ciertas industrias un monopolio de iure sobre su sector, se pueden reducir aún más los costos de planificación y producción industrial."
 concentrated_industry7: "Fábricas aplanadas"
 concentrated_industry7_desc: "Cambiar la expansión del área industrial del eje horizontal al vertical permitirá un potencial de expansión casi ilimitado en las áreas industriales existentes."
 concentrated_industry8: "Paralelismo consciente"
 concentrated_industry8_desc: "¡Aquí no hay colusión, pregúntenle a cualquiera!"
 concentrated_industry9: "Monopsonio nacional"
 concentrated_industry9_desc: "Mediante prácticas legales que prácticamente imposibilitan la venta de productos relevantes a compradores extranjeros, se puede establecer un monopsonio nacional donde el gobierno es el único comprador de productos."
 dispersed_industry: "Industria subversiva I"
 dispersed_industry_desc: "La producción de equipo y vehículos es muy limitada. La adquisición de nuevo material se gestiona de forma subversiva. El robo descarado, el mantenimiento y la reutilización de armas antiguas, y los acuerdos encubiertos con otras naciones abarcan la mayor parte de los aspectos del despliegue de equipo moderno. Desbloquea la §HAcción subversiva de confiscación de vehículos civiles§!.\n\n"
 dispersed_industry2: "Descentralización controlada"
 dispersed_industry2_desc: "Desbloquea la §HAcción subversiva gorroneante§!.\n\n"
 dispersed_industry3: "Contratos con terceros"
 dispersed_industry3_desc: "Desbloquea la §HAcción subversiva de robo de vehículos§!.\n\n"
 dispersed_industry4: "Redes de producción segregadas"
 dispersed_industry4_desc: "Separar las diferentes etapas de una red de producción evitará que todos los puntos se interrumpan simultáneamente."
 dispersed_industry5: "Órdenes de silencio contractuales"
 dispersed_industry5_desc: "Al mantener en secreto la naturaleza exacta de nuestros contratos con las empresas, identificar a las empresas adecuadas se vuelve aún más difícil."
 dispersed_industry6: "Desmonopolización controlada"
 dispersed_industry6_desc: "La implementación de regulaciones y prácticas para combatir cualquier monopolio emergente en las industrias garantizará la supervivencia de las pequeñas empresas."
 dispersed_industry7: "Redes de distribución automatizadas"
 dispersed_industry7_desc: "Automatizar las redes de distribución que permiten el funcionamiento de nuestras industrias descentralizadas aumentará su eficiencia y eliminará la posibilidad de infiltración humana."
 dispersed_industry8: "Principio de Cournot"
 dispersed_industry8_desc: "Al tener un sistema de precios fijos en los contratos industriales, las empresas competirán entre sí basándose en la producción, en lugar de en precios más bajos."
 dispersed_industry9: "Oligopsonio estatal"
 dispersed_industry9_desc: "Al permitir que las agencias gubernamentales funcionen como compradores principales de productos industriales, podemos controlar la dirección del mercado, manteniendo al mismo tiempo una relativa libertad de acción de las empresas."
 synth_oil_experiments: "Experimentos con petróleo sintético"
 synth_oil_experiments_desc: "Podemos reducir la dependencia del petróleo estudiando la fabricación de un sustituto a partir de otras sustancias y materiales."
 early_refining: "Refinamiento anticipado"
 early_refining_desc: "El crudo puede refinarse para convertirlo en sustancias y materiales esenciales para cualquier guerra moderna. Si queremos una industria moderna, tendremos que estar a la vanguardia de estos procesos."
 oil_processing: "Procesamiento de petróleo"
 oil_processing_desc: "Una red de fábricas para destilar y refinar productos petrolíferos sintéticos es el siguiente paso a la hora de asegurar el suministro de combustible para nuestra nación."
 improved_oil_processing: "Procesamiento de petróleo mejorado"
 improved_oil_processing_desc: "Al aplicar métodos de destilación previamente experimentales a operaciones a gran escala, podremos adaptarnos mejor a los materiales disponibles y a las necesidades."
 advanced_oil_processing: "Experimentos con electrocombustibles"
 advanced_oil_processing_desc: "Los ésteres metílicos de los ácidos grasos (FAME), denominados biodiésel, son productos de origen vegetal o animal transesterificados con metanol. Se puede producir a partir de diversos tipos de aceites, siendo los más comunes el aceite de colza (éster metílico de colza, RME) en Europa y el aceite de soja (éster metílico de soja, SME) en Estados Unidos."
 modern_oil_processing: "Procesamiento de petróleo moderno"
 modern_oil_processing_desc:1 "La conversión del gas natural en hidrocarburos líquidos (GTL por sus siglas en inglés) es un proceso de refinería para transformar gas natural u otros hidrocarburos gaseosos (de cadena corta) en hidrocarburos de cadena más larga, como gasolina o diésel (gasóleo), que son líquidos a temperatura ambiente. Los gases ricos en metano se convierten en combustibles sintéticos líquidos."
 rubber_processing: "Procesamiento de caucho"
 rubber_processing_desc:1 "El procesamiento industrial de caucho sintético es necesario para reducir nuestra dependencia del caucho natural."
 improved_rubber_processing: "Procesamiento de caucho mejorado"
 improved_rubber_processing_desc:1 "La producción a gran escala del caucho sintético es posible gracias a las nuevas técnicas que aceleran las reacciones de deshidrogenación."
 advanced_rubber_processing: "Procesamiento de caucho avanzado"
 advanced_rubber_processing_desc:1 "Una receta de caucho sintético de uso general con técnicas mejoradas, como la modificación polimerizadora de dodecil mercaptanos, nos permitirá aumentar la producción de caucho sintético."
 modern_rubber_processing: "Procesamiento de caucho moderno"
 modern_rubber_processing_desc:1 "Una polimerización más eficiente reducirá los costes y mejorará el rendimiento."
 recycling_center_initial: "Centros de reciclaje"
 recycling_center_initial_desc: "En una etapa temprana de los programas de reciclaje modernos, este centro produce acero adicional para su uso en otros proyectos."
 recycling_center1a: "Especialización en acero"
 recycling_center1a_desc: "Dependiendo de nuestras necesidades, los centros de reciclaje pueden priorizar el acero sobre el aluminio.\n\n"
 recycling_center1b: "Especialización en aluminio"
 recycling_center1b_desc: "Dependiendo de nuestras necesidades, los centros de reciclaje pueden priorizar el aluminio sobre el acero.\n\n"
 recycling_center_dod2: "Programas de reciclaje ampliados"
 recycling_center_dod2_desc: "Una mayor atención pública al reciclaje debería generar una mayor participación, mejorando así la eficiencia económica."
 recycling_center_dod3a: "Especialización en acero mejorada"
 recycling_center_dod3a_desc: "Las ampliaciones especializadas de los centros de reciclaje existentes brindarán otra oportunidad para especializar el acero sobre el aluminio.\n\n"
 recycling_center_dod3b: "Especialización en aluminio mejorada"
 recycling_center_dod3b_desc: "Las ampliaciones especializadas de los centros de reciclaje existentes brindarán otra oportunidad para especializar el aluminio sobre el acero.\n\n"
 recycling_center_dod4: "Técnicas mejoradas de extracción de metales"
 recycling_center_dod4_desc: "Las máquinas mejoradas permiten extraer y reutilizar un mayor porcentaje de metal de los objetos reciclados."
 recycling_center_dod5a: "Especialización en acero avanzada"
 recycling_center_dod5a_desc: "La expansión de la industria existente crea otra oportunidad para priorizar el acero sobre el aluminio.\n\n"
 recycling_center_dod5b: "Especialización en aluminio avanzada"
 recycling_center_dod5b_desc: "La expansión de la industria existente crea otra oportunidad para priorizar el aluminio sobre el acero.\n\n"
 recycling_center_dod6: "Maquinaria mejorada de separación de metales"
 recycling_center_dod6_desc: "Las técnicas y la maquinaria avanzadas facilitan considerablemente la separación de metales mezclados."
 recycling_center_dod7a: "Especialización en acero semifuturista"
 recycling_center_dod7a_desc: "La última expansión especializada concebible hacia los centros de reciclaje nos da una decisión más para priorizar el acero sobre el aluminio.\n\n"
 recycling_center_dod7b: "Especialización en aluminio semifuturista"
 recycling_center_dod7b_desc: "La última expansión especializada concebible hacia los centros de reciclaje nos da una decisión más para priorizar el aluminio sobre el acero.\n\n"
 construction1: "Construcción I"
 construction1_desc: "Los métodos y materiales mejorados nos permiten construir edificios civiles y militares en menos tiempo."
 construction2: "Construcción II"
 construction2_desc: "La modernización de herramientas y equipo nos ayudará más en nuestras construcciones."
 construction3: "Construcción III"
 construction3_desc: "Podemos aplicar la adopción de vehículos modernos y la experiencia de nuestros avances en construcción para realizar reparaciones mucho más rápido."
 construction4: "Construcción IV"
 construction4_desc: "El mayor nivel de mecanización y las rutinas mejoradas aumentan más la velocidad de construcción."
 construction5: "Construcción V"
 construction5_desc: "Sistemas de grúa más resistentes y portátiles permiten a los trabajadores de la construcción colocar de forma fiable materiales pesados en lugares de difícil acceso."
 construction6: "Construcción VI"
 construction6_desc: "Los drones cumplen múltiples propósitos en la construcción moderna, desde poder observar el sitio de construcción desde arriba hasta proporcionar mediciones tridimensionales precisas en tiempo real."
 construction7: "Construcción VII"
 construction7_desc: "Las máquinas semiautónomas alivian parte de la carga de trabajo de los trabajadores. Estos robots pueden operar ininterrumpidamente durante mucho más tiempo que los humanos, lo que aumenta la eficiencia de las cuadrillas durante la noche y los descansos."
 construction8: "Construcción VIII"
 construction8_desc: "La impresión tridimensional a gran escala permite producir estructuras robustas en tiempos increíblemente cortos. Estas estructuras modulares pueden abarcar desde infraestructura civil hasta bases militares."
 construction9: "Construcción IX"
 construction9_desc: "Los robots autónomos se integran en el espacio de trabajo digital, centralizando la mayoría de las operaciones en una sola computadora o programa."
 excavation1: "Excavación I"
 excavation1_desc: "La bomba de varilla es la parte superficial de una bomba impelente de pistón, instalada en una perforación petrolera. Es utilizada para levantar mecánicamente el líquido del pozo cuando no hay suficiente presión en el yacimiento para que el líquido fluya hasta la superficie por sí solo como lo hace en los pozos surgentes. Es de uso general en pozos terrestres que producen relativamente poco petróleo."
 excavation2: "Excavación II"
 excavation2_desc: "La perforación y voladura consiste en el uso controlado de explosivos y otros métodos, como la pirotecnia con gas a presión, para romper roca con fines de excavación. Se practica con mayor frecuencia en minería, canteras e ingeniería civil, como la construcción de presas, túneles o carreteras. El resultado de la voladura de roca se conoce a menudo como corte de roca."
 excavation3: "Excavación III"
 excavation3_desc: "La fracturación hidráulica es una técnica para posibilitar o aumentar la extracción de gas natural y petróleo del subsuelo. Consiste en la perforación de un pozo entubado y cementado, a más de 2500 metros de profundidad, con el objetivo de generar canales de elevada permeabilidad a través de la inyección de agua a alta presión, de modo que supere la resistencia de la roca y abra una fractura controlada en el fondo del pozo, sección deseada de la formación contenedora del hidrocarburo. Esta agua a presión es mezclada con algún material apuntalante y productos químicos, con el objetivo de ampliar las fracturas existentes en el sustrato rocoso que encierra el gas o el petróleo, y que son típicamente menores a 1 mm, y favorecer así su salida hacia la superficie."
 excavation4: "Excavación IV"
 excavation4_desc: "La minería automatizada implica la eliminación del trabajo humano del proceso minero. Es un término general que se refiere a dos tipos de tecnología. El primer tipo de automatización minera se refiere a la automatización de procesos y software; El segundo tipo se ocupa de aplicar la tecnología robótica a los vehículos y equipos mineros."
 excavation5: "Excavación V"
 excavation5_desc: "La minería en el fondo del mar es un proceso de extracción mineral que se da lugar en el fondo marino. Los yacimientos de minería oceánica se suelen hacer en torno a grandes áreas de nódulos polimetálicos o fuentes hidrotermales activas o extintas a unos 1.400-3.700 metros bajo la superficie oceánica."
 excavation_tech: "Tecnologías de excavación"
 TITLE_POWER_PLANTS_SUBTITLE: "GENERACIÓN DE ENERGÍA"
 electronic_mechanical_engineering: "MOSFET a microescala"
 electronic_mechanical_engineering_desc: "Vivimos en una época en la que las máquinas eléctricas ya no solo nos calientan e iluminan, sino que también nos ayudan a pensar y comunicarnos. La electrónica será clave para la inteligencia militar en el próximo siglo."
 radio: "MOSFET a nanoescala"
 radio_desc: "Adoptar las invenciones de los radioaficionados y extender el uso de la radio FM reducirá las interferencias de radio y nos permitirá encontrar nuevos usos para la tecnología de radio."
 tech_20_nanometer_mosfet: "MOSFET de 20 nanómetros"
 tech_20_nanometer_mosfet_desc: "En electrónica, el transistor de efecto de campo de metal-óxido-semiconductor, o MOSFET, es, con diferencia, el transistor más común en los circuitos digitales modernos. Si bien originalmente su tamaño se medía en micrómetros, los MOSFET modernos han ido reduciéndose continuamente. El MOSFET de 20 nanómetros representa un producto intermedio basado en el MOSFET de 22 nanómetros."
 tech_10_nm_mosfets: "MOSFET de 10 nanómetros"
 tech_10_nm_mosfets_desc: "Según la International Technology Roadmap for Semiconductors, el MOSFET de 10 nanómetros es el siguiente paso después de los MOSFET de 14 nanómetros. Se basa en la tecnología de transistores de efecto de campo de aletas, un tipo de tecnología MOSFET multipuerta que representa una evolución no planar de la tecnología CMOS de silicio planar."
 tech_5_nm_mosfets: "MOSFET de 5 nanómetros"
 tech_5_nm_mosfets_desc: "Después del MOSFET de 7 nanómetros, según el ITRS, el MOSFET de 5 nanómetros es la tecnología más avanzada en MOSFET. Sin embargo, la convención de nomenclatura de los MOSFET no indica su tamaño real desde 2011. En realidad, las dimensiones del MOSFET de 5 nanómetros varían entre 24 y 57 nanómetros, según el fabricante. Gracias, Intel."
 modern_transistors: "Transistores futuristas"
 modern_transistors_desc: ""
 tech_10000_qubit_computing: "Computación de 10.000 cúbits"
 tech_10000_qubit_computing_desc: ""
 radio_detection: "Detección por Radio"
 radio_detection_desc: "El desarrollo del RADAR (detección y distanciometría de radio) permite el uso de ondas de radio para detectar objetos físicos. La investigación se mantiene en un alto nivel de secretismo, considerando el impacto que estas innovaciones podrían tener en la localización de unidades."
 20_nanometer_mosfet: "MOSFET de 20 nanómetros"
 20_nanometer_mosfet_desc: ""
 petascale_computing: "Computación a petaescala"
 petascale_computing_desc: ""
 modern_supercomputers: "Supercomputadoras modernas"
 modern_supercomputers_desc: ""
 3_nm_mosfets: "MOSFET de 3 nanómetros"
 3_nm_mosfets_desc: ""
 picometer_mosfets: "MOSFET a picoescala"
 picometer_mosfets_desc: ""
 photonic_computing: "Computación óptica"
 photonic_computing_desc: ""
 exascale_computing: "Computación a exaescala"
 exascale_computing_desc: ""
 basic_nanomachines: "Nanomáquinas básicas"
 basic_nanomachines_desc: ""
 advanced_nanomachines: "Nanomáquinas avanzadas"
 advanced_nanomachines_desc: ""
 combat_supercomputers: "Supercomputadoras de combate"
 combat_supercomputers_desc: ""
 early_quantum_computing: "Computación cuántica temprana"
 early_quantum_computing_desc: ""
 quantum_supremacy: "Supremacía cuántica"
 quantum_supremacy_desc: ""
 high_temperature_superconductors: "Superconductores de alta temperatura"
 high_temperature_superconductors_desc: ""
 late_stage_nisq_computing: "Computación NISQ tardía"
 late_stage_nisq_computing_desc: ""
 10000_qubit_computing: "Computación de 10.000 cúbits"
 10000_qubit_computing_desc: ""
 decimetric_radar: "Antenas de alta ganancia"
 decimetric_radar_desc: "En electromagnetismo, la ganancia de potencia de una antena, o simplemente ganancia, es un parámetro clave de rendimiento que combina la directividad y la eficiencia eléctrica de la antena. En una antena transmisora, la ganancia describe la eficacia con la que la antena convierte la potencia de entrada en ondas de radio dirigidas en una dirección específica. En una antena receptora, la ganancia describe la eficacia con la que la antena convierte las ondas de radio que llegan desde una dirección específica en energía eléctrica."
 improved_decimetric_radar: "Avances de antenas parabólicas"
 improved_decimetric_radar_desc: "Se pueden utilizar antenas de radar parabólicas más pequeñas y complejas en aeronaves y buques de guerra para aumentar el conocimiento de la situación."
 centimetric_radar: "Radar en fase moderno"
 centimetric_radar_desc: "Un arreglo en fase suele referirse a un arreglo de antenas escaneado electrónicamente, controlado por computadora, que genera un haz de ondas de radio que puede dirigirse electrónicamente para apuntar en diferentes direcciones sin mover las antenas. En un arreglo de antenas, la corriente de radiofrecuencia del transmisor se alimenta a las antenas individuales con la relación de fase correcta, de modo que las ondas de radio de cada una se suman para aumentar la radiación en la dirección deseada, mientras que se cancelan para suprimir la radiación en direcciones no deseadas."
 improved_centimetric_radar: "Radar en fase mejorado"
 improved_centimetric_radar_desc: "Los sistemas de antenas en fase son útiles para buques de guerra en diversas situaciones. Gracias a la rapidez con la que se puede dirigir el haz, estos radares permiten a un buque de guerra utilizar un solo sistema de radar para la detección y el seguimiento de superficie, detección y seguimiento aéreo y capacidad de enlace ascendente de misiles."
 advanced_centimetric_radar: "Avances en radares en fase"
 advanced_centimetric_radar_desc: "Las aplicaciones actualizadas de los sistemas de antenas en fase mejorarán el rendimiento naval y aéreo. Las nuevas antenas podrían facilitar el guiado de misiles, el conocimiento de la situación de las aeronaves y la detección de la superficie naval."
 basic_quantum_radar: "Radar cuántico"
 basic_quantum_radar_desc: "El radar cuántico es una tecnología emergente de teledetección basada en correlaciones cuánticas de entrada y detecciones cuánticas de salida. Si se desarrolla con éxito, permitirá que el sistema de radar detecte su propia señal incluso cuando esté saturado de ruido de fondo. Esto le permite detectar aeronaves furtivas, filtrar intentos de interferencia deliberados y operar en zonas con alto ruido de fondo."
 improved_quantum_radar: "Radar cuántico transhorizonte"
 improved_quantum_radar_desc: "El radar transhorizonte es un tipo de sistema de radar capaz de detectar objetivos a distancias muy largas, típicamente de cientos a miles de kilómetros, más allá del horizonte del radar, que es el límite de distancia para los radares convencionales. Utilizando nuevas técnicas cuánticas hipotéticas, el radar transhorizonte podría resurgir."
 advanced_quantum_radar: "Avances en radares cuánticos"
 advanced_quantum_radar_desc: "Las mejoras hipotéticas al hardware existente aumentarán aún más la precisión de los misiles tierra-aire, así como la conciencia aérea sin inhibiciones."
 mechanical_computing: "Procesadores de Conjunto de Instrucciones Reducido"
 mechanical_computing_desc: "Un procesador de conjunto de instrucciones reducido, o RISC, es aquel cuya arquitectura de conjunto de instrucciones (ISA) le permite tener menos ciclos por instrucción (CPI) que un procesador de conjunto de instrucciones complejo (CISC). Para un nivel dado de rendimiento general, un chip RISC normalmente tendrá muchos menos transistores dedicados a la lógica central, lo que originalmente permitió a los diseñadores aumentar el tamaño del conjunto de registros e incrementar el paralelismo interno."
 computing_machine: "Procesadores Multinúcleo"
 computing_machine_desc: "Un procesador multinúcleo es un circuito integrado de procesador de computadora con dos o más unidades de procesamiento separadas, llamadas núcleos, cada una de las cuales lee y ejecuta instrucciones de programa, como si la computadora tuviera varios procesadores. Las instrucciones son instrucciones ordinarias de la CPU, pero el procesador único puede ejecutar instrucciones en núcleos separados al mismo tiempo, aumentando la velocidad general para programas que soportan multihilo o otras técnicas de computación paralela."
 improved_computing_machine: "Procesadores Multinúcleo Mejorados"
 improved_computing_machine_desc: "La tendencia en el desarrollo de procesadores ha sido hacia un número creciente de núcleos, ya que los procesadores con cientos o incluso miles de núcleos se vuelven teóricamente posibles. Además, los chips multinúcleo combinados con multihilo simultáneo, memoria en el chip y núcleos \"heterogéneos\" (o asimétricos) especializados prometen mayores ganancias en rendimiento y eficiencia, especialmente en el procesamiento de aplicaciones multimedia, de reconocimiento y de redes."
 advanced_computing_machine: "Procesadores Manycore"
 advanced_computing_machine_desc: "Los procesadores Manycore son procesadores multinúcleo especializados diseñados para un alto grado de procesamiento paralelo, con numerosos núcleos de procesador más simples e independientes (desde decenas de núcleos hasta miles o más). Los procesadores Manycore se utilizan ampliamente en computadoras embebidas y en computación de alto rendimiento."
 near_future_computing_machine: "Computadoras cuánticas"
 near_future_computing_machine_desc: "La computación cuántica es el uso de fenómenos cuántico-mecánicos como la superposición y el entrelazamiento para realizar cálculos. Una computadora cuántica se utiliza para realizar este tipo de cálculos, que pueden ser implementados teóricamente o físicamente."
 future_computing_machine: "Computadoras Cuánticas Mejoradas"
 future_computing_machine_desc: "Aunque las computadoras cuánticas no son útiles para tareas cotidianas, la investigación adicional en este campo puede expandir nuestra comprensión científica de la física y la computación. Otro aspecto que es útil para aquellos preocupados por la seguridad, la criptografía cuántica presenta una gran ventaja y amenaza para la protección digital."
 basic_encryption:1 "Cifrado - Criptografía de Clave Pública"
 basic_encryption_desc: "La criptografía de clave pública, o criptografía asimétrica, es un sistema criptográfico que utiliza pares de claves: claves públicas que pueden ser distribuidas ampliamente y claves privadas que son conocidas solo por el propietario. La generación de estas claves depende de algoritmos criptográficos basados en problemas matemáticos para producir funciones unidireccionales. La seguridad efectiva solo requiere mantener la clave privada en secreto; la clave pública puede ser distribuida abiertamente sin comprometer la seguridad."
 improved_encryption:1 "Cifrado - Funciones de Hash"
 improved_encryption_desc: "Una función de hash es cualquier función que se puede usar para mapear datos de tamaño arbitrario a datos de tamaño fijo. Los valores devueltos por una función de hash se llaman valores de hash, códigos de hash, resúmenes o simplemente hashes. Las funciones de hash se usan a menudo en combinación con una tabla de hash, una estructura de datos comúnmente utilizada en software de computadora para una búsqueda rápida de datos. Las funciones de hash aceleran la búsqueda en tablas o bases de datos al detectar registros duplicados en un archivo grande."
 advanced_encryption:1 "Cifrado - Implementación Moderna de AES"
 advanced_encryption_desc: "El Estándar de Cifrado Avanzado, también conocido por su nombre original Rijndael, es una especificación para el cifrado de datos electrónicos establecida por el Instituto Nacional de Estándares y Tecnología de EE.UU. (NIST) en 2001. AES se basa en un principio de diseño conocido como una red de sustitución-permutación y es eficiente tanto en software como en hardware. A diferencia de su predecesor DES, AES no utiliza una red de Feistel. AES es una variante de Rijndael que tiene un tamaño de bloque fijo de 128 bits y un tamaño de clave de 128, 192 o 256 bits."
 near_future_encryption:1 "Cifrado - Criptografía Cuántica Independiente del Dispositivo"
 near_future_encryption_desc: "Un protocolo de criptografía cuántica es independiente del dispositivo si su seguridad no depende de confiar en que los dispositivos cuánticos utilizados sean verídicos. Por lo tanto, el análisis de seguridad de dicho protocolo debe considerar escenarios de dispositivos imperfectos o incluso maliciosos. Se ha demostrado que varios problemas importantes admiten protocolos seguros e independientes del dispositivo."
 future_encryption:1 "Cifrado - Criptografía Post-Cuántica"
 future_encryption_desc: "La criptografía post-cuántica se refiere a algoritmos criptográficos (generalmente algoritmos de clave pública) que se cree que son seguros contra un ataque por parte de una computadora cuántica. El problema con los algoritmos populares actuales es que su seguridad depende de uno de tres problemas matemáticos difíciles: el problema de factorización de enteros, el problema de logaritmo discreto o el problema de logaritmo discreto en curvas elípticas. Todos estos problemas pueden ser resueltos fácilmente en una computadora cuántica lo suficientemente potente ejecutando el algoritmo de Shor."
 basic_decryption:1 "Desencriptado - Criptografía de Clave Pública"
 basic_decryption_desc: "Una posible vulnerabilidad de seguridad en el uso de claves asimétricas es la posibilidad de un ataque de \"hombre en el medio\", en el que la comunicación de las claves públicas es interceptada por una tercera parte y luego modificada para proporcionar claves públicas diferentes. Los mensajes cifrados y las respuestas también deben ser interceptados, desencriptados y re-cifrados por el atacante utilizando las claves públicas correctas para diferentes segmentos de comunicación, en todos los casos, para evitar sospechas."
 improved_decryption:1 "Desencriptado - Ataques de Hash"
 improved_decryption_desc: "Existen muchas funciones de hash criptográfico, pero muchas han demostrado ser vulnerables y no deben ser utilizadas. Muchos de los hashes criptográficos están basados en la construcción de Merkle-Damgård. Todos los hashes criptográficos que utilizan directamente la salida completa de una construcción Merkle-Damgård son vulnerables a ataques de extensión de longitud. Esto hace que los algoritmos de hash MD5, SHA-1, RIPEMD-160, Whirlpool y SHA-256 / SHA-512 sean vulnerables a este ataque específico."
 advanced_decryption:1 "Desencriptado - Ataques de Canal Lateral AES"
 advanced_decryption_desc: "Los ataques de canal lateral no atacan el cifrado como una \"caja negra\", y por lo tanto no están relacionados con la seguridad del cifrado como se define en el contexto clásico, pero son importantes en la práctica. Atacan las implementaciones del cifrado en sistemas de hardware o software que filtran datos de forma involuntaria. Debido a la realidad aceptada de que AES es irrompible, este es el principal modo de ataque contra él."
 near_future_decryption:1 "Desencriptado - Ataques Hipotéticos de Seguridad Cuántica"
 near_future_decryption_desc: "El aumento de la cifrado cuántico exige avances en la desencriptación respectiva. Al modificar métodos antiguos y desarrollar ataques cuánticos únicos, el equilibrio de la seguridad seguirá siendo incierto."
 future_decryption:1 "Desencriptado - Investigación sobre Seguridad Post-Cuántica"
 future_decryption_desc: "En la investigación de criptografía, es deseable probar la equivalencia de un algoritmo criptográfico con un problema matemático conocido y difícil. Estas pruebas suelen llamarse \"reducciones de seguridad\" y se utilizan para demostrar la dificultad de descifrar el algoritmo de cifrado. En otras palabras, la seguridad de un algoritmo criptográfico dado se reduce a la seguridad de un problema conocido y difícil. Los investigadores están buscando activamente reducciones de seguridad en las perspectivas de la criptografía post-cuántica."
 experimental_rockets: "Silos de misiles"
 experimental_rockets_desc: "Una instalación de lanzamiento de misiles, también conocida como silo de misiles subterráneo, instalación de lanzamiento (LF) o silo nuclear, es una estructura cilíndrica vertical construida bajo tierra, para el almacenamiento y lanzamiento de misiles balísticos intercontinentales (ICBM).\n\nLas estructuras típicamente tienen el misil a una cierta distancia bajo tierra, protegido por una gran \"puerta de explosión\" en la parte superior. Generalmente están conectadas, física y/o electrónicamente, a un centro de control de lanzamiento de misiles."
 rocket_engines: "Cohetes a motor"
 rocket_engines_desc: "Nuestro dominio de la propulsión de cohetes está llegando a un punto en el que podemos construir bombas voladoras y aviones accionados por cohetes que alcanzan velocidades antes inalcanzables."
 improved_rocket_engines: "Cohetes a motor mejorados"
 improved_rocket_engines_desc: "Podemos construir los primeros misiles balísticos de largo alcance y hacerlos más precisos para llegar a ciudades enemigas lejanas, e incluso al espacio."
 advanced_rocket_engines: "Cohetes a motor avanzados"
 advanced_rocket_engines_desc: "El futuro de la ingeniería espacial abre un abanico de posibilidades, como los misiles intercontinentales, con un alcance que apenas conoce límites y unas cargas más letales."
 atomic_research: "Investigación atómica"
 atomic_research_desc: "El enriquecimiento de uranio es un proceso necesario para crear un combustible nuclear eficaz a partir del uranio extraído, aumentando el porcentaje de Uranio-235 que sufre fisión con neutrones térmicos."
 rocket_interceptor: "Interceptor a cohetes"
 rocket_interceptor_desc: "Los interceptores por cohetes basados en los planeadores pueden moverse más rápido que cualquier otro avión durante cortos periodos de tiempo. Aunque la volubilidad del combustible supone un riesgo, los aviones podrán despegar y reaccionar a los ataques antes de lo esperado por el enemigo."
 rocket_interceptor_2: "Interceptor a cohetes II"
 rocket_interceptor_2_desc: "Manejar cazas propulsados por cohetes sigue siendo peligroso, pero ahora cuentan con pilotos automáticos y el remolque de otros aviones para ayudarlos a aprovechar la ventaja de su velocidad extrema a costa de una ventana de combustible pequeña."
 rocket_interceptor_3: "Interceptor a cohetes III"
 rocket_interceptor_3_desc: "Las nuevas técnicas de aterrizaje y unos sistemas de combustible más seguros han mejorado las opciones de éxito y supervivencia de los cazas a cohetes para aprovechar el potencial de estos innovadores vehículos."
 FRA_light_tank_recon_tt: "§YESTE ENFOQUE DARÁ A LA COMPAÑÍA DE APOYO DE RECONOCIMIENTO DE TANQUE LIGERO UN 10% ADICIONAL DE DEFENSA DE ATAQUE Y VELOCIDAD EN TERRENO DESÉRTICO§!"
 power_plants: "Centrales eléctricas"
 power_plants_desc: "Las centrales eléctricas alimentadas con combustibles fósiles básicos son la base de la mayoría de las redes eléctricas del siglo XXI. Si bien su funcionamiento requiere combustible, una fuente de energía es fundamental para la sociedad moderna."
 power_plants1: "Centrales eléctricas modernas"
 power_plants1_desc: "Las centrales eléctricas modernas aprovechan mejor sus insumos para producir una mayor producción."
 power_plants2: "Técnicas de construcción de centrales"
 power_plants2_desc: "Los esquemas de construcción estandarizados permiten una construcción más rápida de centrales eléctricas."
 power_plants3: "Centrales eléctricas mejoradas"
 power_plants3_desc: "Las mejoras en los métodos de construcción y en la producción eléctrica permiten la construcción de centrales eléctricas más grandes."
 power_plants4: "Centrales eléctricas avanzadas"
 power_plants4_desc: "Las centrales eléctricas avanzadas son grandes complejos que transforman combustibles fósiles en enormes cantidades de energía."
 power_plants5: "Combustibles fósiles eficientes"
 power_plants5_desc: "Ser capaces de explotar cada voltio de energía que los combustibles fósiles pueden producir y luego refinar los residuos resultantes para convertirlos en algo útil hará que nuestras industrias sean aún más eficientes."
 nuclear_reactors: "Reactores nucleares"
 nuclear_reactors_desc: "Mediante una reacción nuclear en cadena de fisión, los reactores nucleares son capaces de producir grandes cantidades de energía con una inversión relativamente baja. Aunque su producción es cara, las ventajas pueden superar las desventajas."
 nuclear_reactors1: "Métodos de construcción de reactores"
 nuclear_reactors1_desc: "Teniendo en cuenta la seguridad y el desarrollo a futuro, los nuevos reactores nucleares deben construirse de una manera específica para evitar retrasos."
 nuclear_reactors2: "Reactores nucleares eficientes"
 nuclear_reactors2_desc: "Dirigir el exceso de producción a otras líneas de producción puede hacer que los reactores nucleares sean aún más eficientes."
 nuclear_reactors3: "Reactores nucleares mejorados"
 nuclear_reactors3_desc: "Las mejoras en la tecnología de los reactores nucleares permiten la construcción de complejos más grandes."
 nuclear_reactors4: "Reactores nucleares avanzados"
 nuclear_reactors4_desc: "Las mejoras en la tecnología de los reactores nucleares permiten la construcción de complejos más grandes."
 energy_farms: "Granjas de energía"
 energy_farms_desc: "Desde la energía eólica hasta la solar, las granjas de energía utilizan fuentes de energía renovables en lugar de depender de combustibles fósiles o atómicos."
 energy_farms1: "Granjas de energía modernas"
 energy_farms1_desc: "Los métodos de construcción racionalizados permite que granjas de energía puedan construirse muy rápidamente."
 energy_farms2: "Granjas de energía mejoradas"
 energy_farms2_desc: "Al aprovechar al máximo los sitios disponibles, las granjas de energía mejoradas pueden producir más energía en áreas más pequeñas."
 energy_farms3: "Granjas de energía avanzadas"
 energy_farms3_desc: "Con sistemas automatizados que ajustan los distintos colectores de energía en función del clima, la época del año e incluso la posición de la Tierra y la Luna, las granjas de energía avanzadas son capaces de explotar casi el 100% de la energía disponible."
 energy_farms4: "Métodos renovables"
 energy_farms4_desc: "La adopción masiva de fuentes de energía renovables en la arquitectura urbana y en los hogares privados liberará cantidades aún mayores de energía que podrán utilizar nuestras industrias."
 ENERGY_XOR_DESC: "Sólo se puede investigar §Yuna§! de estas tecnologías."
 nukes: "Ovijas nucleares"
 nukes_tech_effect: "Activa las §H$nukes$§!\n   $MODIFIER_NUCLEAR_PRODUCTION$: §GYes§!\n"
 nukes_desc: "Un arma nuclear es un dispositivo explosivo que obtiene su fuerza destructiva de reacciones nucleares, ya sea fisión (bomba de fisión) o una combinación de fisión y fusión (bomba termonuclear). Ambos tipos de bombas liberan grandes cantidades de energía a partir de cantidades relativamente pequeñas de materia."
 camel_corps_tech: "Cuerpo de Camellos"
 camel_corps_tech_effect: "Habilita §H$camel_corps_tech$§!\n§HCamelry\n$desert$§!\n$STAT_ADJUSTER_ATTACK$§G+15%§!\n$STAT_ADJUSTER_DEFENCE$§G+5%§!\n$STAT_ADJUSTER_MOVEMENT$§G+3%§!"
 infiltrator_company_tech: "Compañía de infiltración"
 infiltrator_company_tech_desc: ""
 tech_cyber_units_warfare: "Unidades integradas de GE y cibernética"
 tech_upgraded_start_generals: "Formación de oficiales avanzada"
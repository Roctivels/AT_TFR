 uk.1.t: "ONG Feeding America"
 uk.1.d: "La política era lo único que David había escuchado durante las últimas semanas. ¿Cómo no iba a ser así? Parecía que el mundo entero estuviera en llamas desde que los yanquis decidieron empezar a dispararse unos a otros, y Gran Bretaña, a pesar de toda el agua, no era inmune al infierno que ardía al otro lado del charco. Pero pensó que, al menos mientras pasaba tiempo con su hijo de cuatro años, que estaba absorto viendo BBC Kids, podría saborear incluso el más mínimo respiro de ese bombardeo constante. Resultó que incluso eso era demasiado pedir, ya que, mientras revisaba sus facturas, cada vez más difíciles de pagar debido al mercado siempre deprimente, la televisión pasó a la pausa publicitaria. La primera era una que nunca había visto antes: mostraba imágenes separadas de niños pequeños en diferentes escenas de guerra en Estados Unidos mirando con tristeza a la cámara, con las caras cubiertas de polvo. Una mujer de voz suave soltó una estadística que sonaba trágica: \"En los últimos meses, más del 85 % de los niños estadounidenses han caído en la inseguridad alimentaria. Con tu pequeña donación de solo 5 dólares al mes puedes ayudar a acabar con...\". David apagó la televisión, dejando escapar un pequeño suspiro mientras miraba los ojos ahora entristecidos de su hijo y le entregaba el iPad."
 uk.1.a: "Oye, ¿por qué mejor no juegas a ese juego llamado Minecraft?"
 uk.2.t: "La reina Isabel II ha fallecido"
 uk.2.d: "La reina Isabel II ha muerto a la edad de 98, dejando el Reino Unido y sus territorios en un estado de dolor y conmoción."
 uk.2.a: "¡Dios salve al Rey!"
 uk.3.t: "El Príncipe Felipe ha fallecido"
 uk.3.d: "El príncipe Felipe, duque de Edimburgo, ha fallecido después de ser el sirviente de su majestad más leal por setenta y cinco años"
 uk.3.a: "¡Dios salve al Rey!"
 uk.4.t: "El que llama a la puerta"
 uk.4.d: "El presidente de la Cámara y los diputados se sorprenden cuando, al intentar aprobar un proyecto de ley, se oye un ruido sordo procedente de la entrada de la Cámara Baja."
 uk.4.a: "¡¿Qué está pasando?!"
 uk.5.t: "El pasado se repite"
 uk.5.d: "Carlos entra en la Cámara de los Comunes, la disuelve y ordena el arresto de todos los diputados."
 uk.5.a: "Por el Rey y por la Patria."
 uk.6.t: "Un encuentro inesperado"
 uk.6.d: "Charles habla con el Sr. Tony Radakin y lo convence de que lo respalde en su golpe de estado."
 uk.6.a: "...Que Dios me ayude."
 uk.53.t: "El caos se apodera de Irlanda del Norte"
 uk.53.d: "En un sorprendente giro de acontecimientos, el caos causado por nuestra reciente derrota en la Guerra Europea se ha expandido a Irlanda del Norte, con reportes de  bombardeos de Republicanos llenando cada pagina de todos los periódicos en Gran Bretaña hoy. Con reportes de más de 200 muertos, la nación mira al Rey Charles por una respuesta."
 uk.53.a: "Establecer un Gobierno de Coalición Real"
 uk.54.t: "Republicanos Irlandeses Toman las Armas"
 uk.54.d: "A pesar de los intentos de Charles por disuadir el Republicanismo Irlandés a través de autonomía limitada en Irlanda del Norte, miembros de la nueva \"IRA Unida\" han cruzado la frontera Anglo-Irlandés y tomaron líneas de telecomunicaciones clave por Armagh y Londonderry."
 uk.54.a: "Tiocfaidh Ár Lá!"
 uk.55.t: "Derry Police pledge Loyalty"
 uk.55.d: "With trust in the British government faltering, President Higgins has secretly enacted Order #1914, legalizing the funding of Republican forces in Northern Ireland. In Free Derry, the local police force has announced their support for a new organization made up of primarily European War veterans called the ''United IRA'', and although the motives of this new IRA have not yet been seen, this group seems to have significant military backing."
 uk.55.a: "Los británicos no pueden saber de nuestro involucramiento"

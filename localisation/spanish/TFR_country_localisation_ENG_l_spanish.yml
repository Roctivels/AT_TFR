 uk.779.t: "Farage solicita ser Estado observador de los BRICS+"
 uk.779.d: "Una de las primeras acciones tomadas por la administración de Farage fue acercarse a los BRICS y buscar el estatuto de observador para Reino Unido. Su solicitud fue aceptada casi inmediatamente.\n\nEn una entrevista con la BBC, Farage explicó su decisión al explicar que Reino Unido necesita buscar nuevas potenciales asociaciones económicas que puedan llevar a un resultado positivo y que ayuden a Reino Unido a recuperarse de la crisis. Él sigue siendo cauteloso y solicitando el estatuto de observador, quiere poder examinar el potencial de los BRICS de cerca, pero no demasiado cerca.\n\nPolíticos liberales criticaron a Farage por supuestamente colaborar con un adversario de Europa. Sin embargo, Farage respondió: \"Amigos míos, no estoy seguro de Europa, pero Rusia definitivamente no es un enemigo de Reino Unido\"."
 uk.779.a: "¡Una excelente decisión, señor primer ministro!"

 USB_caligula_country_paths_unused: "\n\n\n\n\n§RCaminos§!:\n§O - Dios bendiga a nuestras tropas§!\n§L - Asegurar Nuestra Democracia§!\n§d - Abrazar la eternidad§!\n"
 USB_caligula_country_other_unused: "\n\n§RConsejos:§!\n\"El árbol de la libertad debe ser refrescado de vez en cuando con la sangre de patriotas y tiranos\". - Thomas Jefferson"

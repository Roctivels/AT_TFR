 SOV_usual_oligarch_info: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n£GFX_SOV_oligarchs_banner\n\n\n\n\n\n\n\n\n\nLos £GFX_Gazprom_logo  §Holigarcas§! son los hijos de los opulentos años 90, cuando la propiedad estatal pasó a manos privadas y la economía rusa estaba sumida en el caos. Gracias a la privatización, las conexiones políticas y la corrupción, lograron amasar enormes fortunas y construir auténticos imperios empresariales. En la era de Putin, conservaron su influencia, adaptándose a la nueva realidad: algunos se unieron a proyectos estatales, mientras que otros utilizaron su capital para enriquecerse aún más mediante monopolios de materias primas."
 SOV_red_directors_info: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n£GFX_SOV_red_directors_banner\n\n\n\n\n\n\n\n\n\nMuchos de quienes dirigían grandes corporaciones vendieron sus empresas al estado a cambio de nada, pero conservaron su influencia, al convertirse en directores bajo el ala del nuevo Gobierno. Estos £GFX_Red_Directors_logo  §Rdirectores rojos§! son antiguos oligarcas y empresarios que comprendieron que era mejor aceptar las reglas del juego en la nueva Rusia soviética. Sus intereses han seguido siendo comerciales y, a pesar de sus lemas socialistas, persiguen sus propios objetivos, negociando con las autoridades para mantener su posición."
 SOV_peoples_entrepreneurs_info: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n£GFX_SOV_peoples_entrepreneurs_banner\n\n\n\n\n\n\n\n\n\nEntre los £GFX_Peoples_Entrepreneurs_logo  §tempresarios populares§! se encuentran antiguos patrocinadores del Partido Comunista, empresarios humanistas, propietarios de \"empresas populares\" y antiguos oligarcas que decidieron cooperar con los comunistas. Apoyaron voluntariamente al nuevo Gobierno aportando recursos y capital, con la esperanza de que esto les ayudara a conservar su influencia y a seguir enriqueciéndose en las nuevas condiciones. Siguen buscando el lucro, fingiendo trabajar por el bien del pueblo, pero sus verdaderos objetivos siguen siendo profundamente personales."
 SOV_new_oligarchs_info: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n£GFX_SOV_new_oligarchs_banner\n\n\n\n\n\n\n\n\n\n£GFX_New_Oligarchs_logo  §7Nuevos Oligarcas§! - Empresarios y emprendedores que fueron excluidos del poder durante la administración anterior regresaron tras la revolución democrática para recuperar lo que sentían que Putin y sus aliados les habían arrebatado. Rápidamente encontraron la manera de integrarse en el nuevo gobierno ruso mediante la corrupción y sus conexiones.\nSu influencia se sentía en todas partes, incluso en el Kremlin, como a principios de los años 90. Ahora, han privatizado los recursos estatales y construido sus propios imperios mediáticos y económicos. Sin embargo, no todos están contentos con la idea de que oligarcas \"buenos\" reemplacen a los \"malos\". Su gobierno se enfrenta a la oposición de políticos que se oponen a los monopolios."

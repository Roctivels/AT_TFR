 SYR_country_summary: "§YResumen del País§!:\nEl Ejército Sirio es una mezcla de soldados profesionales, EPSD, milicias locales y reclutas reacios. Inicialmente es capaz de defenderse, pero carece de la habilidad para destacarse cuando está en la ofensiva."
 SYR_country_paths: "§YVías de los países§!:\nSiria tiene 2 rutas MD genéricas.... §Bba§!§Wsh§!§Rard§! o da §BSS§!§WN§!§RP§!"
 SOV_country_summary: "§YResumen del país§!:\nSe dijo una vez que Rusia es un enigma, un misterio envuelto en un misterio. Esta frase refleja con elocuencia la percepción occidental de Moscú como el \"otro\", una tierra inescrutable y amenazante que se rige por sus propias reglas. Una tierra dura, con un clima duro y gente dura.\nParecía lógico que una nación como Rusia sufriera tales tragedias a finales del siglo XX y, sin embargo, siguiera resurgiendo. Cada vez, el oso regresaba. Cada vez más fuerte, más amenazante, más unido.\nVladímir Putin ha gobernado el país durante dos décadas. Bajo su mando, Rusia, una vez más, se ha posicionado contra el orden geopolítico occidental. Aunque Putin goza de un amplio apoyo, todavía hay quienes prefieren decir que no está haciendo lo suficiente; tanto la oposición de izquierda como la de derecha han mantenido su presencia en la sociedad. La nueva década promete nuevos desafíos y nuevas oportunidades; con Estados Unidos sufriendo una crisis política, Rusia podría finalmente ser capaz de lograr el mundo multipolar. Sin embargo, hay informes de que un nuevo virus llega a Wuhan..."
 SOV_country_paths: "\n\n\n§YCaminos§!:\n§C - Dmitri Medvédev (RU)§!\n§R - Guennadi Ziugánov (PCFR)§!\n§8 - Vladímir Zhirinovski (PLDR)§!"
 SOV_country_other: "§YConsejos de RU-TFR:§!\n - Confía siempre en tus habilidades.\n - La §YDoctrina Guerásimov§! es el futuro.\n - Incluso después de la derrota, ¡sigue jugando, descubrirás que §Gaún no ha terminado!§!\n - ¡Diviértete!"
 PRC_country_summary: "§YResumen del país§!:\nPara un país antiguo como China, con sus patrones históricos cíclicos, los últimos 100 años han sido tanto un \"siglo de la humillación\" como un período de cambios radicales que han transformado profundamente su identidad. En los primeros 50 años, China pasó de ser el \"Imperio Celestial\" al \"hombre enfermo del Este Asiático\", invadida y subyugada sucesivamente por potencias occidentales y militaristas japoneses. En los 50 años siguientes, el llamado \"Armagedón de los Dos Destinos\" de China, el persistente conflicto entre el comunismo y el capitalismo, ha llevado al país a una increíble sucesión de agitación política y prosperidad económica.\nAhora, tras dos décadas del siglo XXI, bajo el liderazgo del Partido Comunista de China, esta gran nación navega solemnemente hacia un \"Gran Rejuvenecimiento\". Algunos han llamado a esta era el \"Siglo Chino\", mientras que otros creen que China acabará colapsando, consumida por sus propias ambiciones, como otras naciones que han desafiado la hegemonía a lo largo de la historia. Ahora, parece que la tierra del PCCh, Xi Jinping y 1.400 millones de chinos se acerca una vez más a un punto de inflexión en la historia..."
 PRC_country_paths: "\n\n\n§YCaminos§!:\n§Y - Xi Jinping (Centristas)§!\n§O - Li Zuocheng (Revanchistas)§!\n§C - Wang Yang (Reformistas)§!\n§R - Hu Chunhua (Neoizquierda)§!"
 PRC_country_other: "§YAlgunos refranes y proverbios chinos útiles:§!\n - Si buscas la velocidad, no la alcanzarás.\n - Es fácil reunir un ejército de mil hombres, pero difícil encontrar un buen general.\n - El fracaso es la madre del éxito.\n - §Y¡Cuando la gente se une, el Monte Tai se moverá!§!"
 FRA_country_summary: "§YResumen del país§!:\nTras la Guerra Fría, Francia se vislumbró como un actor clave en el escenario global, una potencia cultural y diplomática en un nuevo orden mundial. Sin embargo, pronto se enfrentaría a una multitud de desafíos, muchos de los cuales no estaba preparada para afrontar. Desde el resurgimiento de antiguas rivalidades hasta nuevas tensiones geopolíticas y la inestabilidad interna, Francia no estaba destinada a la era armoniosa que había anticipado. En cambio, se vio obligada a navegar por un panorama global cada vez más complejo que parecía desafiar su rol e influencia tradicionales.\nMientras la nación lidia con una creciente brecha entre sus centros urbanos liberales y sus comunidades rurales conservadoras, y comienzan a circular rumores sobre el surgimiento de un nuevo virus en Wuhan, Francia entra en la nueva década sin ser consciente del nuevo papel que pronto desempeñará en el concierto de Europa, desafiando la famosa cita de Zbigniew Brzezinski:\n\n\"Hay un elemento de obsesión delirante en la preocupación de la élite política francesa por la idea de que Francia sigue siendo una potencia mundial\"."
 FRA_country_paths: "\n\n\n\n§YCaminos§!:\n§C - Marine Le Pen (RN)§!\n§Y - Emmanuel Macron (LREM)§!\n§5 - ¡Y 5 caminos escondidos!§!"
 FRA_country_other: "§YConsejos:§!\nCuanto más preciso sea el LARP, mejores serán las ganancias."
 JAP_country_summary: "§YResumen del país§!:\nJapón es el país del Sol Naciente, un país de tradiciones y una nueva cultura que ha barrido el mundo entero, un país que estaba en lo más bajo después de la Segunda Guerra Mundial y que subió a la cima en cuestión de años y se mantuvo allí durante la mayor parte de la Guerra Fría, pero todos los milagros llegan a su fin algún día, y el milagro económico japonés no es una excepción.\nLas dos últimas décadas del siglo XX no fueron favorables para Japón, el comienzo de la crisis de la \"burbuja financiera\" en 1985 puso fin a un largo período de prosperidad económica y marcó el comienzo de una nueva era de estancamiento, bautizada como las \"Décadas Perdidas\", que ha durado los últimos 30 años. Sin duda, el pueblo japonés no está dispuesto a rendirse bajo la presión de las nuevas circunstancias, como sus antepasados, está dispuesto a luchar duro hasta el final.\nLa nueva década será crucial para Japón, ¿logrará finalmente romper las cadenas del estancamiento? ¿Podrá Japón detener la expansión agresiva de la insaciable China? Sólo el tiempo lo dirá...\n\n\"¡Ganbaru Nippon!\""
 JAP_country_paths: "\n\n\n\n§YCaminos§!:\n§G - PLD§!\n§9 - Coalición Civil§!"
 JAP_country_other: "\n§YConsejos:§!\nno rendirse...\n\n¡¡NUNCA!!\n£GFX_nevergiveup"
 GER_country_summary: "§YResumen del país§!:\nAlemania es una nación forjada en el crisol de la historia, donde los ecos de su pasado resuenan a través de su presente dinámico. Dividida ideológicamente durante la Guerra Fría, la reunificación de Oriente y Occidente en 1990 marcó un punto de inflexión, transformando a Alemania en una potencia económica e influencia cultural en Europa.\n\nEn los años de posguerra, Alemania resurgió de las cenizas de la Segunda Guerra Mundial y creó una economía de mercado robusta que se convirtió en la envidia del mundo. Reconocida por su destreza en ingeniería y su espíritu innovador, Alemania alberga gigantes globales como Volkswagen y Siemens, que prosperan gracias a las exportaciones y a una fuerza laboral altamente calificada.\n\nSin embargo, el siglo XXI ha traído desafíos. La crisis migratoria, las presiones del cambio climático global y un panorama geopolítico en evolución exigen adaptabilidad y resiliencia. Mientras Alemania navega por estas complejidades, su compromiso con la democracia y la justicia social sigue firme, posicionándola como líder en la unidad europea."
 GER_country_paths: "\n\n\n\n§YCaminos§!:\n§C - CDU/CSU§!\n§t - SPD§!\n§g - AfD§!\n§Y - FDP§!\n§G - Bündnis 90/Die Grünen§!\n§R - Die Linke§!"
 GER_country_other: "\n\n\n§YConsejos:§!\n\"Todo lo que no me hace morir me hace más fuerte\". - Friedrich Nietzsche"
 USB_caligula_country_summary: "§RResumen del país§!:\nAmérica es una nación construida sobre los huesos de lo antiguo, un concepto que está destinado a perdurar para siempre.\n\nMuchos han tratado de derribarla; los soviéticos, los japoneses, los chinos y los nazis lo intentaron.\nSin embargo, hoy son sus propios hombres y mujeres los que intentan destrozar la única nación dedicada a la libertad, pequeños tiranos que quieren deshacer años de progreso. La guerra de Secesión demostró que solo un agarre fuerte podría guiarnos a través de esta tormenta interna, como un cisne que muda sus plumas, se tuvieron que hacer sacrificios.\n\nTodos los deseos, todos los anhelos, todos los susurros y oraciones han llegado al presidente.\nLa presión, el sufrimiento y el llanto, como un peso sobre sus hombros.\nCualquiera se derrumbaría, o se iluminaría.\n\nSoy la encarnación de Estados Unidos, Nuestra Democracia está bajo ataque, con D mayúscula.\nHay traidores en todas partes, acechando como vampiros, la libertad es nuestra agua bendita y la retribución la estaca para atravesar sus corazones, somos estadounidenses, nunca nos rendimos, nunca nos rendimos.\n\nVi a Dios y a la Democracia, y ellos dijeron: \"Salid, salvad lo que os fue dado\".\nLa gente es, ya sabes, mala a veces.\nA veces hay que ser como el ave fénix para librarse de los parásitos.\n\nLos traidores han demostrado que no buscan la paz ni la misericordia, y no se la concederemos.\nLa casa está en la colina, la familia está llorando.\nNo habrá un árbol de la libertad, habrá un bosque entero."

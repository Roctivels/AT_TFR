 SOV_cp_rsfsr_tooltip_name: "[SOV_cprf_ruling_party_loc][SOV_communist_party_ideology_loc]\n\n[SOV_communist_party_political_power_gain_var_text][SOV_communist_party_non_core_manpower_var_text][SOV_communist_party_mobilization_speed_var_text][SOV_communist_party_conscription_factor_var_text][SOV_communist_party_stability_factor_var_text][SOV_communist_party_party_popularity_stability_factor_var_text][SOV_communist_party_army_attack_factor_var_text][SOV_communist_party_army_defence_factor_var_text][SOV_communist_party_trade_opinion_factor_var_text][SOV_communist_party_compliance_growth_var_text][SOV_communist_party_army_attack_against_major_factor_var_text][SOV_communist_party_army_defence_against_major_factor_var_text][SOV_communist_party_business_value_factor_var_text][SOV_communist_party_personal_value_factor_var_text][SOV_communist_party_society_development_monthly_var_text][SOV_communist_party_totalitarian_socialist_acceptance_var_text][SOV_communist_party_libertarian_socialist_acceptance_var_text][SOV_communist_party_social_democrat_acceptance_var_text][SOV_communist_party_social_liberal_acceptance_var_text][SOV_communist_party_authoritarian_democrat_acceptance_var_text][SOV_communist_party_communist_drift_var_text][SOV_communist_party_libertarian_socialist_drift_var_text]"
 SOV_cp_rsfsr_tooltip: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n£GFX_SOV_CPRF_banner_long\n\n\n\n\n\n\n\n\n\n§LTras triunfar en las elecciones y llegar al poder, el Partido decidió volver a sus raíces históricas restaurando oficialmente su antiguo nombre, enfatizando la continuidad y las nuevas ambiciones dentro de la República renovada.\n§RPartido Comunista de la RSFSR (PC RSFSR)§! - Una destacada fuerza política de izquierda que aboga por una economía socialista, la protección de los derechos de los trabajadores y la expansión de la seguridad social. Fundado en 1993 como sucesor del §RPCUS§!, el Partido continúa preservando el legado de las tradiciones soviéticas, participa activamente en el trabajo legislativo en el parlamento renovado y prosigue su curso hacia la construcción de una sociedad justa bajo la bandera roja del §Rmarxismo-leninismo§!.§!"

 SOV_adl_progress_tooltip_name_union_of_social_democrats: "£GFX_union_of_social_democrats_logo  §GUnión de Socialdemócratas§!\n\n\n                                             £union_of_social_democrats_flag"
 SOV_adl_progress_tooltip_desc_shevchenko: "§LDurante el período de destrucción del antiguo sistema de partidos de Rusia Unida, se formó una alianza de todos aquellos izquierdistas que, por una u otra razón, no simpatizan con el Partido Comunista: AID \"Progreso\". Este partido es una mezcolanza de organizaciones izquierdistas y la parte más a la izquierda de la antigua \"Rusia Justa\", y subsiste a expensas de sus antiguos patrocinadores. Diferentes grupos a menudo presentan ideas completamente distintas e incompatibles entre sí, lo que resulta en una lucha permanente por la influencia.\n\n§tUnidad Socialista§! - Muchas personas no entienden si son comunistas o no, pero esto no les impide adoptar una postura unificada. La facción de \"Progreso\" más cercana al Partido Comunista de la RSFSR aboga por una alianza a gran escala con el Partido Comunista y algunos incluso defienden la fusión con él.\n§WLibertad y Justicia§! - un bloque más moderado que logró llegar a un acuerdo con otros miembros de Progreso, liderado por Maksim Shevchenko, el exlíder del Partido Ruso de la Libertad y la Justicia. No les gustan los comunistas, pero no con el mismo celo e intransigencia que a otras facciones.\n§GIniciativa Socialdemócrata§! - la unión de socialdemócratas de diversas tendencias: desde miembros de varias asociaciones socialdemócratas hasta partidarios de izquierda de Yabloko. En su mayor parte, abogan por la cooperación con el Frente Popular de Alekséi Navalni y critican con vehemencia al Partido Comunista.\n§d\"La Izquierda\"§! es la parte más radical y marginal de Progreso. Está compuesta por anarquistas, trotskistas y otros izquierdistas informales. Se caracterizan por la mayor obstinación en rechazar el poder del Partido Comunista, y no dudan en proclamarlo a viva voz.§!"
 SOV_adl_progress_tooltip_desc_shein: "§LDurante el período de destrucción del antiguo sistema de partidos de Rusia Unida, se formó una alianza de todos aquellos izquierdistas que, por una u otra razón, no simpatizan con el Partido Comunista: AID \"Progreso\". Este partido es una mezcolanza de organizaciones izquierdistas y la parte más a la izquierda de la antigua \"Rusia Justa\", y subsiste a expensas de sus antiguos patrocinadores. Diferentes grupos a menudo presentan ideas completamente distintas e incompatibles entre sí, lo que resulta en una lucha permanente por la influencia.\n\n§tUnidad Socialista§! - Muchas personas no entienden si son comunistas o no, pero esto no les impide adoptar una postura unificada. La facción de \"Progreso\" más cercana al Partido Comunista de la RSFSR aboga por una alianza a gran escala con el Partido Comunista y algunos incluso defienden la fusión con él.\n§d\"La Izquierda\"§! es la parte más radical y marginal de Progreso. Está compuesta por anarquistas, trotskistas y otros izquierdistas informales. Se caracterizan por la mayor obstinación en rechazar el poder del Partido Comunista, y no dudan en proclamarlo a viva voz.§!"

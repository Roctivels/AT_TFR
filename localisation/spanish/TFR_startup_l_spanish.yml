 SOV_party_resources_tooltip_usual: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n£GFX_SOV_party_resource_banner\n\n\n\n\n\n\n\n\n\nLos £GFX_party_resource  §Hrecursos del Partido§! son una combinación de la cantidad, la cohesión y la disposición de nuestros miembros a ser activos. Cuanto más alto sea este indicador, mayor será la capacidad del partido para hacer campaña y expandir su influencia en la sociedad sin utilizar directamente los mecanismos administrativos. Puede utilizarse para hacer campaña y fortalecer la influencia ideológica."

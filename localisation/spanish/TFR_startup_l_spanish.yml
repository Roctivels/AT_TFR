 SOV_labor_fatherland_tooltip_name: "£GFX_labor_fatherland_logo  §dPatria del Trabajo§!\n\n\n                                             £labor_fatherland_flag\n\n\n\n\n                                             Opinión del\n                                             £GFX_CPRF_logo  §RPC RSFSR§!:\n                                             [SOV_labor_fatherland_opinion]\n£GFX_Vladimir_Kvachkov_Portrait\n                                             £boost_popularity_texticon  Popularidad: [?party_popularity@totalitarian_socialist|%Y2]\n\n                                             Nuestra influencia: [?SOV_labor_fatherland_influence_var|%Y2]\n\n\n§W       Vladímir Kvachkov§!\n\n\n§YFacción:§! §OMilicia Popular§!"
 SOV_labor_fatherland_tooltip: "§L§dPatria del Trabajo§! - Este es un partido formado por varias organizaciones patrióticas de izquierda que decidieron unirse después de que el Partido Comunista llegara al poder. Aunque es más grande que organizaciones similares del período de Putin, en comparación con otros partidos de la RSFSR, Patria del Trabajo no es grande, y tiene suficiente autofinanciación para llevar a cabo sus actividades.\n\n§O\"Milicia Popular\"§! es la sucesora de la organización creada en 2009 por Vladímir Kvachkov, que posteriormente fue reconocida por el Kremlin como organización terrorista y prohibida en el territorio de la Federación de Rusia. Popular entre el personal militar retirado, se expresan desde posiciones neoestalinistas y soviético-patrióticas.\n§9PDS NPSR§! es un grupo nacionalista típico que, bajo el nuevo Gobierno, decidió apoyar el rumbo soviético, a pesar de su historial de uso de símbolos y retórica de derecha. Son bastante similares a los \"kvachkovitas\", pero se distinguen por un menor interés en la figura de Stalin y un mayor énfasis en el nacionalismo ruso.\nLos §Anazbols§! son miembros y simpatizantes del partido La Otra Rusia, sucesor del PNB prohibido por el Gobierno de Putin. Su ideología se basa en el anticapitalismo y el antiliberalismo. Desde los años 90, el Partido Nacional Bolchevique ha virado notablemente a la izquierda, y sus \"Inter-Brigadas\" han estado luchando en el Dombás. Los padres fundadores del PNB son los filósofos Eduard Limónov y Aleksandr Duguin, así como el músico de rock Yegor Létov.§!"
 SOV_peoples_front_tooltip_name: "£GFX_peoples_front_logo  §CFrente Popular§!\n\n\n                                             £peoples_front_flag\n\n\n\n\n                                             Opinión del\n                                             £GFX_CPRF_logo  §RPC RSFSR§!:\n                                             [SOV_peoples_front_opinion]\n£GFX_Alexei_Navalny_Portrait\n                                             £boost_popularity_texticon  Popularidad: [?party_popularity@social_liberal|%Y2]\n\n                                             Nuestra influencia: [?SOV_peoples_front_influence_var|%Y2]\n\n\n§W         Alekséi Navalni§!\n\n\n§YFacción:§! §CRusia del Futuro§!"
 SOV_peoples_front_tooltip: "§LEl §CFrente Popular§! es una coalición de varias organizaciones y partidos liberales y centristas creada por el prominente figura de la oposición Alekséi Navalni poco después de la amnistía de la mayoría de los presos políticos encarcelados por el Gobierno de Putin. El FP incluye liberales de Rusia del Futuro, libertarios y algunos \"liberales sistémicos\" de la antigua Rusia Unida. Oficialmente, se informa que toda la financiación del Frente proviene de \"donaciones de simpatizantes y cuotas de membresía\", pero dada la historia del FBK y del partido Rusia Unida, es posible que el Frente Popular reciba dinero del extranjero.\n\n§CRusia del Futuro§! es una facción de la oposición extrasistémica legalizada formada durante el gobierno de Putin. Está compuesta por liberales y simpatizantes más cercanos a Navalni. Son de naturaleza pragmática y, bajo ciertas circunstancias, pueden apoyar el rumbo del Partido Comunista.\nLos §Ylibertarios§! son partidarios del libre mercado, agrupados en torno a la personalidad de Mijaíl Svetov, una figura prominente de la oposición. Abogan por reducir la influencia del Estado en la economía.\nLos §Pliberales sistémicos§! son un grupo de activistas de \"Gente Nueva\" y miembros liberales de Rusia Unida que han decidido formar una alianza impía con sus antiguos oponentes. Buscan restaurar y mejorar de alguna manera el sistema anterior de Putin.§!"
 SOV_ldpr_tooltip_name: "£GFX_LDPR_logo  §8Partido Liberal-Demócrata de Rusia§!\n\n\n                                             £ldpr_flag\n\n\n\n\n                                             Opinión del\n                                             £GFX_CPRF_logo  §RPC RSFSR§!:\n                                             [SOV_ldpr_opinion]\n£GFX_Vladimir_Zhirinovsky_Portrait\n                                             £boost_popularity_texticon  Popularidad: [?party_popularity@fascist|%Y2]\n\n                                             Nuestra influencia: [?SOV_ldpr_influence_var|%Y2]\n\n\n§W      Vladímir Zhirinovski§!\n\n\n§Y¡Vladímir Zhirinovski es el líder indiscutido del PLDR!§!"
 SOV_ldpr_tooltip: "§LEl día en que se anunciaron los resultados de las elecciones de 2022 resultó ser un día negro para el PLDR. La tarea principal había fallado: los comunistas habían retomado el poder en Rusia. Y lo hicieron de una manera completamente democrática. Inmediatamente después, el dinero del Kremlin dejó de fluir a los bolsillos de muchos de sus proyectos. Cualquier político importante de derecha habría abandonado la arena después de esto...\n\nPero no Vladímir Vólfovich Zhirinovski. Oh, no, él no se irá sin otra pelea. ¿Ha luchado en vano todos estos 30 años? Toda esa propaganda partidista, todas esas giras por el país, todas esas declaraciones escandalosas en la Duma Estatal, ¿fue todo para nada? ¡No! Vladímir Vólfovich se vengará. ¿No hay dinero? ¡Saca tus ahorros a futuro, recupera a tus viejos patrocinadores, encuentra nuevos! ¡La lucha contra el comunismo no ha terminado mientras Zhirinovski y su causa sigan vivos!§!"
 SOV_patriots_party_tooltip_name: "£GFX_patriots_party_logo  §gPartido de Patriotas§!\n\n\n                                             £patriots_party_flag\n\n\n\n\n                                             Opinión del\n                                             £GFX_CPRF_logo  §RPC RSFSR§!:\n                                             [SOV_patriots_party_opinion]\n£GFX_Vladimir_Solovyov_Portrait\n                                             £boost_popularity_texticon  Popularidad: [?party_popularity@authoritarian_democrat|%Y2]\n\n                                             Nuestra influencia: [?SOV_patriots_party_influence_var|%Y2]\n\n\n§W    Vladímir Soloviov§!\n\n\n§gSoloviov no tiene ahorros.§!"
 SOV_patriots_party_tooltip: "§LVladímir Rudólfovich Soloviov pensó que nada interferiría con su posición como la principal personalidad mediática del país, sentado sobre las finanzas estatales en el principal canal federal. Después de todo, había cabalgado la ola del patriotismo mediático, se había convertido en el principal portavoz del putinismo para todos los rusos, y el futuro prometía ser muy bueno.\n\nNo tuvo en cuenta el hecho de que su posición dependía enteramente del estado de ánimo de quien estuviera sentado en el Kremlin. Y en el 22, después de la muerte del aparentemente eterno Putin y el fracaso del aparentemente invencible Rusia Unida en las elecciones presidenciales, esta ola lo sepultó. En cuestión de días, todo lo que había estado construyendo durante años fue destruido por los comunistas, y él mismo fue retirado de la televisión.\n\nDecidió no rendirse. El Partido de Patriotas es un ejemplo de las viejas élites que todavía intentan luchar por el poder bajo el nuevo régimen. Habiendo perdido todo, aprovechan cada oportunidad para recuperar al menos algo de su antiguo poder. Antiguos funcionarios del Kremlin se reúnen bajo el liderazgo de Vladímir Soloviov, el periodista de bolsillo de Putin, con la esperanza de cambiar las cosas. Son antagónicos al régimen soviético, pero, dada su naturaleza pragmática, pueden cambiar sus colores a algo más \"rojo\" si lo desean.§!"

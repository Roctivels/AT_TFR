l_spanish:
 UNIT_BALANCING: "§WThe Fire Rises renueva por completo todas las unidades del juego base y añade 6 nuevos regimientos y 4 nuevas compañías. Las nuevas unidades son las siguientes:"
 UNIT_MILITIA: "§WMilicia £unit_militia_icon_small : Unidades baratas y de bajo costo de mantenimiento. Requiere equipo de infantería y equipo antitanque."
 UNIT_MOT_MILITIA: "§WMilicia motorizada £unit_mot_militia_icon_small : Alternativa más barata a la infantería motorizada. Mayor organización, pero menor PS. Requiere equipo de infantería, camiones, equipo antiaéreo y antitanque, y antitanques blindados."
 UNIT_RECCE: "§WRecce £unit_recce_icon_small : La infantería de reconocimiento es más ligera y rápida que la infantería ligera o la milicia. Requiere equipo de infantería, equipo de apoyo, equipo antitanque y antiaéreo."
 UNIT_SPECIAL_FORCES: "§WFuerzas Especiales £unit_special_forces_icon_small : Las Fuerzas Especiales tienen la mayor organización y PS. Tienen el tiempo de entrenamiento más largo de todas las unidades. Requieren equipo de infantería, antitanque, antiaéreo, y de apoyo."
 UNIT_SPAA: "§WArtillería antiaérea autopropulsada: Se ha reincorporado al juego con pocos cambios respecto a su versión base."
 UNIT_COMPANIES: "§WLas compañías de CCP, MBT, artillería autopropulsada y artillería antiaérea autopropulsada son las cuatro nuevas compañías de apoyo. Sus requisitos de uso y equipamiento son obvios."
 GENERAL_BALANCE: "§WEl combate es similar al de§! §CMillennium Dawn§!§W, con algunos ajustes. No hay meta de ancho de combate; los batallones de infantería se añaden de 3 en 3 y los batallones móviles de 4 en 4, por lo que es probable que termines con un ancho desigual. Hay doctrinas que añaden ancho de combate a las compañías. Las unidades se vuelven más fuertes cuanto más pesadas. No crees plantillas de infantería de 15 de ancho, ya que te joderán. La IA creará solo divisiones blindadas y mecanizadas. La tecnología de infantería post-2020 solo buffea unidades de VCI, TBP y motorizadas. Se eliminaron algunas unidades que no tienen uso en el entorno moderno. Estas son: todas las unidades medianas, pesadas y ligeras de artillería autopropulsada, tanques y antiaérea autopropulsada; artillería autopropulsada ligera; todas las variantes remolcadas del juego base; montañeros y la infantería montada.§!"
 UNIT_UPKEEP: "Cada batallón tiene sus propios §Rcostos de mantenimiento§!, que se toman §Ymensualmente§! de tu §Cliquidez§!. Recuerda esta lista, ya que spammear divisiones blindadas de 40 de ancho va a joder tu economía.\n§YMilicia§!: 1 millón\n§YMilicia motorizada§!: 4 millones\n§YInfantería ligera§!: 10 millones\n§YInfantería de marina§!: 30 millones\n§YArtillería§!: 70 millones\n§YParacaidistas§!: 40 millones\n§YInfantería de reconocimiento§!: 20 millones\n§YFuerzas Especiales§!: 50 millones\n§YInf. motorizada§!: 80 millones\n§YArtillería antiaérea autopropulsada§!: 80 millones\n§YInf. mecanizada ligera§!: 80 millones\n§YInf. mecanizada§!: 90 millones\n§YTanques de reconocimiento§!: 100 millones\n§YArtillería autopropulsada§!: 100 millones\n§YBlindados anfibios§!: 120 millones\n§YCarros de combate principales§!: 150 millones"
 ABT_MOD: "The Fire Rises es un mod ambientado en nuestra época, el 1 de enero de 2020. Desde el principio, no hay nada que ver aquí que sea diferente a nuestra línea de tiempo actual, pero lo veremos más adelante en tu juego. The Fire Rises (TFR ) es un mod que hace un uso excelente de la pestaña de decisiones (la mayor bendición de Paradox para los modders), los árboles de enfoque y los eventos. Es muy importante estar al día con estos, ya que sin ellos tu juego no funcionará como debería y probablemente perderás o fallarás, así que asegúrate de prestar atención.\n\nHemos puesto todo nuestro empeño en crear este mod y esperamos que disfrutes del fruto de nuestro arduo trabajo."
 DISCLAIM: "Los creadores de \"The Fire Rises\" §RNO§! apoyan ni respaldan ninguna de las ideologías o grupos extremistas que se muestran en este mod. Es pura ficción."
 CONTACT: "§WDicho esto, ¡esperamos que disfrutes del mod y te unas a nuestro Discord!"
 FEAT_: "§WNaciones con contenido:\n§Y[USA.GetNameWithFlag]§!\n§Y[PRC.GetNameWithFlag]§!\n§Y[SOV.GetNameWithFlag]§!\n§Y[FRA.GetNameWithFlag]§!\n§Y[GER.GetNameWithFlag]§!\n§Y[JAP.GetNameWithFlag]§!\nFacciones de la 2ª Guerra Civil Americana con contenido:\n§Y[USB.GetNameWithFlag]§!\n§Y[USC.GetNameWithFlag]§!\n§Y[APA.GetNameWithFlag]§!\n§Y[PTF.GetNameWithFlag]§!\n§Y[NSM.GetNameWithFlag]§!\n§Y[ATW.GetNameWithFlag]§!\nY mucho más por descubrir mientras juegas."
 ABT_MONEY: "§WEl sistema es simple, pero con mucha profundidad.\nSumarás §Gingresos§! y restarás §Rgastos§! mensualmente."
 ABT_MONEY_2: "En The Fire Rises, el §GPIB§! real es una medida clave de fortaleza económica, ya que representa el §GPIB§! nominal ajustado a la £inflation  inflación, lo que proporciona una imagen más clara de la economía actual. El §GPIB§! real es esencial para comprender el §Yratio deuda/PIB§!, ya que una §Rdeuda§! elevada en relación con el §GPIB§! real indica una posible §Rinestabilidad económica§!. El §GPIB§! real se calcula sumando el §Yvalor empresarial§!, el §Yvalor personal§!, el §Ygasto social§!, el §Ygasto militar§! y las §Yexportaciones§!, y §Rrestando§! las §Yimportaciones§!. Este total anual se ajusta a la £inflation  inflación para reflejar la verdadera producción económica del país.\n\nLa £inflation  inflación se refiere al aumento general de precios en la economía nacional, lo que empeora el poder adquisitivo. La £inflation  inflación se ve influenciada por las leyes de §Ytasas de interés§! y los cambios en la oferta monetaria. Gestionar la £inflation  inflación es crucial, ya que una £inflation  inflación alta generará dificultades económicas y modificadores negativos, mientras que la £inflation  deflación también puede causar reveses.\n\nLa §Rdeuda§! representa los pasivos del Gobierno. Cuando el país enfrenta un §Rdéficit§! mensual y carece de suficiente §Cliquidez§! (los fondos de reserva disponibles para uso inmediato), la §Rdeuda§! aumenta. Esta §Rdeuda§! debe gestionarse con cuidado. Si el §Yratio deuda/PIB§! supera el umbral de deuda, sufrirás modificadores negativos debido a la menor confianza de los inversores. Mantener la §Rdeuda§! bajo control mejora la estabilidad y fomenta la prosperidad nacional. Puedes pagar la §Rdeuda§! automáticamente mediante \"Autopago\" o directamente en la pestaña §Y\"Economía y Comercio\"§!.\n\nLa §Ytasa de interés§! afecta los pagos mensuales de la §Rdeuda§! y es un componente crucial de los §Rgastos§!. Una tasa más alta eleva el coste de la §Rdeuda§!, por lo que es esencial supervisarla y gestionarla para evitar pagos incontrolables e inestabilidad.\n\nLa §Cliquidez§! es la reserva disponible para §Rgastos§! inmediatos, obtenida a través de impuestos, vital para el §Ymantenimiento militar§! (§YEjército§!, §YArmada§!, §YFuerza Aérea§! e §YIndustria Militar§!) y el §Ygasto social§!. Si la §Cliquidez§! cae por debajo de cero, los gastos se añaden a la §Rdeuda§!, que debe ser reembolsada.\n\nEl £development  desarrollo cambia cada mes según modificadores, o puede §Gaumentarse§! o §Rdisminuirse§! mediante §Yenfoques§! y §Ydecisiones§!. Si el £development  desarrollo alcanza el §G100%§!, §Gsubirá§! un nivel y se §Rreducirá§! en un §G100%§!. Si el £development  desarrollo alcanza un §R-100%§!, §Rbajará§! un nivel y §Gaumentará§! un §G100%§!. El £development  desarrollo es §Gimportante§! para asegurar que cada parte de tu país sea §Glo más fuerte posible§!.\n\nLas §Ycentrales eléctricas§!, las §Ygranjas de energía§! y los §Yreactores nucleares§! son tipos de edificios conocidos como §Y\"plantas de energía\"§! que te permiten obtener diversas §Gbonificaciones§! y son la principal forma de §Gaumentar§! tus §Granuras de construcción§! en un estado, ya que las §Ytecnologías industriales§! no lo hacen. Sin embargo, cada tipo de §Yplanta de energía§! es §Rmutuamente excluyente§! con las otras, y §Rno se puede construir en el mismo estado§!, por lo que deberás planear su ubicación.\n\nLa lista de variables que determinan tus §Gingresos§! y §Rgastos§! se puede encontrar en el juego en la pestaña §Y\"Economía y Comercio\"§!."
 ABT_MONEY_3: "§WComo se mencionó, este sistema es bastante fácil de entender. Las naciones más grandes (excepto Estados Unidos) no deberían tener problemas para gestionar sus economias. La mayoría de los cambios en este mod se hicieron para que las naciones más pequeñas no se quedaran estancadas en déficits durante toda la partida."
 ABT_MONEY_4: "§YLa República Popular China§! §Wes una de las naciones más grandes en el uso del sistema monetario. Combatir al coronavirus, ayudar a otras naciones, encontrar una cura y otras operaciones requieren el uso de la mayor parte del dinero. Sin embargo, si administra mal sus fondos y cae a merced del virus... Esperemos que no llegue a ese punto."
 ABT_MONEY_5: "§WSi juegas con una de las facciones menores en la §RSegunda Guerra Civil Americana§!, comprar armas de fuego es tu única esperanza. La mayoría de las facciones no tendrán fábricas §Yciviles§! ni §Ymilitares§! durante la mayor parte de la guerra, si es que las tendrán. El dinero que ganes debería usarse para comprar equipo para tus unidades. Ten en cuenta que no todo el equipo está disponible y algunos son de menor calidad. Puedes comprar más de 1500 §YPA Lutys§! por muy barato, pero no durarán mucho en el campo de batalla... ¿Adónde va tu dinero? ¿Quién suministra estas armas? Es un secreto."
 CRED_MONEY: "§WCréditos:\nDoruk: Creador del Money Mod original\nPatrick: Por portar del Money Mod para Millennium Dawn"

 TFR_ldpr_info_tooltip: "El §8PLDR§! es un partido político nacionalista en Rusia conocido por sus posiciones populistas y a menudo controvertidas. Fundado en 1991 por §8Vladímir Zhirinovski§!, el §8PLDR§! combina elementos del liberalismo y el nacionalismo, abogando por un gobierno centralizado fuerte, la protección de los intereses rusos y valores sociales conservadores.\n\n\n\n\n£GFX_LDPR_intro_texticon\n\n\n\n\n\n\n§8Vladímir Zhirinovski§!, líder de larga data del §8PLDR§!, es una figura extravagante y abierta en la política rusa. Conocido por sus declaraciones provocativas y su estilo teatral, §8Zhirinovski§! ha sido una voz destacada en el panorama político ruso desde principios de los años 90. A pesar de su retórica polémica, §8Zhirinovski§! ha ganado apoyo por su firme postura sobre la soberanía nacional y el sentimiento antioccidental.\n\nBajo el liderazgo de §8Zhirinovski§!, el §8PLDR§! ha mantenido una presencia en el parlamento ruso y a menudo se ha alineado con el partido gobernante en cuestiones clave. Aunque los críticos han acusado al §8PLDR§! de ser un partido de \"oposición controlada\", el liderazgo carismático de §8Zhirinovski§! y su plataforma nacionalista siguen atrayendo a un grupo de seguidores leales entre segmentos de la población rusa."
 TFR_cprf_info_tooltip: "El §RPCFR§! es un destacado partido político de izquierdas de Rusia que defiende políticas socialistas, los derechos de los trabajadores y la protección de los programas de bienestar social. Fundado en 1993 como sucesor del §RPartido Comunista de la Unión Soviética§!, el §RPCFR§! ha mantenido una presencia significativa en la política rusa, en particular en oposición al partido gobernante §CRusia Unida§!.\n\n\n\n\n£GFX_CPRF_intro_texticon\n\n\n\n\n\n\n§RGuennadi Ziugánov§! ha sido el líder del PCFR desde su creación y es conocido por su firme compromiso con la ideología comunista y su crítica a las reformas capitalistas en Rusia. §RZiugánov§! se ha postulado a la presidencia varias veces, posicionándose como un defensor de la clase trabajadora y un crítico de las políticas económicas del actual gobierno. A pesar de enfrentarse a los desafíos de otras figuras de la oposición, §RZiugánov§! sigue siendo una figura clave dentro del §RPCFR§! y un firme defensor de los principios socialistas en la política rusa."
 TFR_ur_info_tooltip: "§C\"Rusia Unida\"§! es una fuerza política hegemónica en el país, conocida por sus estrechos vínculos con el Gobierno y el presidente §YVladímir Putin§!. Fundado en 2001, el partido aboga por políticas conservadoras y nacionalistas, haciendo hincapié en la estabilidad, la unidad nacional y el desarrollo económico. §C\"Rusia Unida\"§! ha sido criticada por su estricto control sobre el poder político y las acusaciones de fraude electoral, pero sigue siendo el partido gobernante en Rusia, con una mayoría en la Duma Estatal y controlando muchos Gobiernos regionales.\n\n\n\n\n£GFX_UR_intro_texticon\n\n\n\n\n\n\nBajo el liderazgo de §CMedvédev§!, §C\"Rusia Unida\"§! continuó promoviendo su plataforma de valores tradicionales, un liderazgo fuerte y un enfoque en el fortalecimiento de la posición de Rusia en el escenario mundial. A pesar de algunas divisiones y desafíos internos, el partido ha mantenido su dominio en la política rusa, con §CMedvédev§! desempeñando un papel clave en la configuración de sus políticas y estrategias."
 TFR_jr_info_tooltip: "§pRusia Justa§! es un partido político socialdemócrata en Rusia que aboga por la justicia social, políticas de bienestar estatal y una economía mixta.\n\n\n\n\n£GFX_JR_intro_texticon\n\n\n\n\n\n\nEl partido está dirigido por §pSerguéi Mirónov§!, un político veterano conocido por su enfoque moderado y pragmático de la gobernanza. §pMirónov§! es un ex portavoz del Consejo de la Federación y ha sido una figura clave en la política rusa durante muchos años. Bajo su liderazgo, §pRusia Justa§! se ha posicionado como una voz para la clase trabajadora y un defensor de políticas sociales progresistas.\nHay rumores de una posible fusión futura entre §p\"Rusia Justa\"§! y dos partidos menores: Por la Verdad y Patriotas de Rusia. La perspectiva de fusionarse con partidos menores presenta una oportunidad para que §pRusia Justa§! amplíe su base de apoyo y atraiga a una gama más amplia de votantes. Al formar alianzas estratégicas con otros partidos que comparten valores y objetivos similares, §pRusia Justa§! podría mejorar sus perspectivas electorales y potencialmente ganar más escaños en la Duma. Este enfoque colaborativo también podría ayudar al partido a consolidar sus recursos, agilizar su mensaje y presentar una plataforma más cohesiva al electorado."
 TFR_liberal_info_tooltip: "La §6oposición liberal§! es una fuerza política no sistémica en Rusia que aboga por reformas radicales, elecciones libres y amistad con Occidente. §6La oposición liberal no sistémica§! incluye partidos que están \"excluidos\" del sistema político porque carecen de representación en las estructuras gubernamentales y de interacción con el grupo gobernante, como §6\"Rusia del Futuro\"§! y §6PARNAS§!. Utilizan principalmente métodos no convencionales de lucha política, tienen recursos limitados y son especialmente activos en las redes sociales.\n\n\n\n\n£GFX_Liberals_intro_texticon\n\n\n\n\n\n\n§6La oposición§! no tiene un líder oficial, pero últimamente §6Alekséi Navalni§! se ha mostrado muy adecuado para el papel de tal candidato, siendo la figura más destacada del movimiento opositor. Fundó la §6Fundación Anticorrupción§!, que realiza investigaciones periodísticas que supuestamente exponen tramas de corrupción en los más altos órganos del gobierno ruso.\n\nGracias a sus investigaciones, §6Alekséi Navalni§! logró ganar una gran audiencia con la que organiza grandes manifestaciones contra la corrupción y recauda donaciones para continuar la lucha antisistémica contra el gobierno."

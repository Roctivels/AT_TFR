 SOV_legitimacy_tooltip: "[SOV_party_legitimacy_level_loc]La £GFX_party_legitimacy  §7confianza popular§! refleja el vínculo especial que se desarrolla entre el Partido y las masas. Está influenciada tanto por la £stability_texticon  §Yestabilidad§!, la £boost_popularity_texticon  §Ypopularidad del partido§! como por otras circunstancias. Incluso si la participación y las valoraciones directas de un partido son bajas, una alta estabilidad genera la confianza de los ciudadanos en nosotros. Por el contrario, cuando la popularidad del partido es alta pero hay turbulencias o signos de caos en la sociedad, la gente sigue dispuesta a confiar en las autoridades debido a su línea clara y resultados concretos."

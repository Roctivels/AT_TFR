 SOV_party_unity_tooltip: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n£GFX_SOV_party_unity_banner\n\n\n\n\n\n\n\n\n\nLa £GFX_party_unity  §tunidad del Partido§! es una medida de cohesión interna, un indicador del grado en que los aparatos, las células de base, los líderes y los ideólogos actúan de manera unificada, evitando luchas faccionales y debates divisivos que debiliten el frente común. La alta £GFX_party_unity  §tunidad del Partido§! asegura un rápido lanzamiento de reformas internas y una firme confianza en la cúpula."

 GER_scratch_a_liberal: "Fin del liberalismo"
 GER_scratch_a_liberal_desc: "El capitalismo tardío finalmente ha llegado a su fin, los liberales junto con los banqueros han traicionado al trabajador alemán al no detener la amenaza fascista en el este. Sin embargo, el trabajador alemán ve claramente ahora. A través de las cenizas del fallido orden neoliberal, el trabajador alemán finalmente se levantará contra sus opresores y romperá sus cadenas. Juntos derribaremos el sistema capitalista y estableceremos un mundo nuevo, justo y socialista"
 GER_organize_disilusioned_soldiers: "Organizar a soldados descontentos"
 GER_organize_disilusioned_soldiers_desc: "Miles de jóvenes han sido enviados al frente oriental y han muerto, ¿por qué? Los fascistas en Rusia triunfaron en el este, mientras que los veteranos en casa duermen en las calles mientras los burgueses están en sus mansiones contando su dinero y riéndose del proletariado. Debemos recordar a los veteranos sus sacrificios y lo que perdieron. Los veteranos pueden ser débiles ahora, pero eran los que luchaban en primera línea, tienen disciplina, voluntad de luchar y, lo más importante, recuerdan a sus camaradas caídos. Debemos organizarlos y hacerlos de la vanguardia de nuestra revolución"
 GER_organize_the_factory_workers: "Organizar a los obreros"
 GER_organize_the_factory_workers_desc: "El final de la guerra ha provocado un colapso económico, y el trabajador alemán ha sentido la peor parte de ello: despidos y recortes salariales masivos, mientras que la clase alta sigue viviendo en sus torres de marfil. Incluso para llamarnos socialistas, necesitamos el apoyo de los trabajadores. Nos pondremos en contacto con ellos y los organizaremos, recordándoles cómo han trabajado en las fábricas ganando restos mientras sus jefes se deleitan con los frutos de su trabajo. El capitalista nos ha encadenado durante generaciones, pero ahora nos liberaremos.\n\n¡Proletarier aller Länder, vereinigt Euch!"
 GER_organize_the_radical_students: "Organizar estudiantes radicales"
 GER_organize_the_radical_students_desc: "Nuestras universidades se han convertido en semios de pensamiento revolucionario a medida que una nueva generación de intelectuales rechaza el sistema fallido de la vieja guardia. A lo largo de la historia, los estudiantes han sido los a los presagadores de la revuelta y la revolución. Desde las protestas contra la guerra imperialista de Vietnam hasta la revuelta estudiantil francesa en mayo del 68. ¡Aprovecharemos su furia e idealismo para dar nueva vida a nuestra causa y construir los cimientos de la nueva Alemania!"
 GER_necessity_for_militarization: "Necesidad de la militarización"
 GER_necessity_for_militarization_desc: ""
 GER_ideological_correctness: "Formar un Frente Unido Antifascista"
 GER_ideological_correctness_desc: ""
 GER_a_new_october: "Un nuevo Octubre"
 GER_a_new_october_desc: "Los trabajadores de las fábricas están abandonando sus fábricas, los agricultores están abandonando sus campos y los estudiantes son repugnantes. Desde el piso de la fábrica hasta la sala de la universidad, la clase trabajadora es una. La revolución está sobre nosotros pronto, y cada hombre, mujer y niño está marchando en las calles contra el Estado construido sobre el culto al capital. A medida que se acerca la revolución, los capitalistas huyen como ratas y dejan atrás las ruinas de los viejos, pero el proletariado se reconstruirá y resistirá. Unidos.\n\nY la batalla continúa de nuevo,\nY mi corazón se siente ansioso en mi pecho.\nY Lenin es tan joven,\nY joven octubre está por llegar."
 GER_provisional_revolutionary_popular_front: "Reorganizar el nuevo gobierno"
 GER_provisional_revolutionary_popular_front_desc: "La revolución, aunque ardua y desafiante, finalmente ha sido lograda. A medida que los terremotos de la revolución comienzan a calmarse, es crucial que formemos rápidamente un nuevo gobierno para combatir las réplicas de este enorme cambio en orden. Tenga la seguridad de que nuestro nuevo gobierno será mucho más estable que el anterior. Este nuevo gobierno será un faro de esperanza para el pueblo alemán, los guiará a través de este oscuro período de la historia europea y los guiará hacia la liberación total."
 GER_revanchist_propaganda: "Promover diversidad social"
 GER_revanchist_propaganda_desc: "La ultraderecha siempre ha afirmado que la diversidad será la ruina de Alemania y de Europa, pero basta con mirar al otro lado del Atlántico para demostrarles que se equivocan. Estados Unidos es una nación construida con el sudor y la sangre de los inmigrantes. Sin ellos, nunca habría alcanzado el nivel que tiene hoy, o, bueno... el que alcanzó. La comunidad LGBTQ+ ha vivido durante mucho tiempo a la sombra de la opresión y el odio, pero en la nueva Alemania, esto ya no debe ser así. Debemos abrazar la diversidad social y enseñar a nuestra gente a aceptar y adaptarse a esta nueva era y sus culturas. Después de todo, es fácil odiar, pero amar es mucho más valiente."
 GER_adopt_warrior_culture: "Deconstruir la posmodernidad"
 GER_adopt_warrior_culture_desc: ""
 GER_warriors_revolution: "Nuevo Izquierda para una Nueva Era"
 GER_warriors_revolution_desc: "Algunos de nuestros camaradas sueñan con regresar a los viejos tiempos de la República Democrática Alemana, pero eso no es más que un sueño vano e insensato. Sin duda, la RDA tuvo sus altibajos y, por supuesto, fue una mejor opción que su contemporáneo occidental, pero esta vieja reliquia tuvo sus razones. La corrupción al más alto nivel, la paranoia nacional y una multitud de problemas llevaron a su decadencia e inevitable colapso. El siglo XXI es muy diferente de la era de la Guerra Fría. Nuevas ideas, nuevos grupos de personas y una creciente cooperación internacional son demasiado para un sistema como la RDA. Por lo tanto, esta nueva era exige una nueva forma de socialismo, una nueva forma de comunismo, para avanzar y avanzar hacia la prosperidad."
 GER_new_vanguard_of_revolution: "Democracia radical de izquierdas"
 GER_new_vanguard_of_revolution_desc: "Los vientos de cambio soplan ahora en Alemania, y el pueblo exige una voz que refleje una sociedad poscapitalista. Los viejos partidos políticos, atados a sus compromisos con la corrupción y la decadencia del liberalismo, ya no tienen cabida en la política alemana. Es hora de que el pueblo avance. El futuro socialista no es un monolito, sino una amalgama de diversas ideologías con sus propias visiones del futuro. Ha llegado la hora de que el país decida. Las primeras elecciones socialistas de Alemania no solo determinarán el próximo gobierno, sino que definirán la naturaleza de la propia revolución obrera. ¿Quién gobernará el socialismo alemán en estos tiempos turbulentos?"
 GER_cause_greater_than_life: "Hegemonía cultural socialista"
 GER_cause_greater_than_life_desc: "La revolución no es solo una modificación radical del Gobierno alemán. Debe convertirse en una revolución cultural, un proceso que afecte a todos los estratos de la sociedad que antes estaban dominados por el liberalismo. No solo deben satisfacerse las demandas de derechos de los trabajadores; es necesario despertar la mente y el corazón del pueblo alemán a las posibilidades del poscapitalismo. El socialismo no debe ser solo un sistema político; debe convertirse en el aire que respira el pueblo, en las canciones que cantan los jóvenes, en el arte que crean nuestros artistas y en la literatura que leemos."
 GER_revolutionary_german_history: "Iniciativa federalista"
 GER_revolutionary_german_history_desc: "La escoria traidora que inundaba las arterias de la República Federal hizo todo lo posible para mantener a Europa dividida, para que los trabajadores se pelearan por nacionalismos mezquinos y otras divisiones similares. Estas cicatrices causadas por el Gobierno liberal aún perduran en Europa, creando una profunda herida en el rostro de nuestros Gobiernos libres. No podemos permitir que esto continúe; necesitamos cooperar para destruir a la escoria fascista del este, ahora más que nunca. No debemos dejarnos atrapar por discusiones insignificantes; necesitamos unirnos y federalizar nuestra internacional."
 GER_form_european_internationale: "Formar la Internacional Europea"
 GER_form_european_internationale_desc: "Todas las revoluciones obreras han triunfado mediante un frente unido. La burguesía nos ha mantenido bajo presión, distrayendo a la clase obrera con guerras culturales, dividiéndonos. Sin embargo, ahora se acabó la fiesta y les ha llegado el día del juicio. No debemos repetir los errores de revoluciones pasadas. Juntos, como un frente unido, aplastaremos tanto la reacción fascista como la capitalista."
 GER_new_german_man: "Asegurar apoyo popular"
 GER_new_german_man_desc: "Para una nación que sigue las enseñanzas de Karl Marx, que representa la esencia misma de la clase trabajadora alemana, simplemente no puede prosperar ni alcanzar sus ambiciones a menos que logre el apoyo de su pueblo. Es una necesidad y una prioridad absolutas en este momento asegurar el apoyo de la nación alemana en su conjunto si siquiera comienza a conceptualizar, y mucho menos a materializar, una utopía socialista."
 GER_ostaglie: "Revivir la Ostalgie"
 GER_ostaglie_desc: "La infección neoliberal que ha consumido a Alemania durante tanto tiempo no empezó con Merkel ni Scholz. Empezó en 1990, cuando la República Democrática fue devorada por las fauces voraces del capitalismo. Durante décadas, se le dijo al Este que se avergonzara de su pasado, que olvidara el espíritu de firme antifascismo y la solidaridad obrera que permitió a Alemania resurgir de las ruinas del nazismo. Pero ahora, con el Reichstag en nuestro poder y el orden liberal desmoronándose, es hora de desenterrar el legado enterrado bajo el asfalto de Berlín.\n\nRestauraremos el Partido Socialista Unificado y construiremos una nueva República Democrática. Que los escépticos se burlen y lo llamen simplemente nostalgia; esta vez, no caeremos. Esta vez, no nos doblegaremos ni ante Moscú ni ante Bruselas."
 GER_intensify_class_struggle: "Imitar al Frente Nacional"
 GER_intensify_class_struggle_desc: "En la primera República Democrática, el Partido Socialista Unificado no gobernó solo, sino junto a una galería cuidadosamente seleccionada de partidos minoritarios y organizaciones de masas, cada uno con derecho a hablar, pero no a desafiar. El Frente Nacional proyectaba unidad, estabilidad y, sobre todo, control. Al revivir el SED y recuperar el legado del Este, es natural que revisemos estos métodos.\n\nEl NDPD, la CDU, el DBD, el LDPD; nombres que se creían extintos resurge ante nuestra atenta mirada. Los reaccionarios, por supuesto, lo considerarán una fachada. Pero la verdad es más simple: la legitimidad se construye sobre la percepción. El pueblo exige orden y un Gobierno. Les daremos ambos, y nos aseguraremos de que nadie olvide quién lidera el coro."
 GER_sword_of_the_shield_of_the_party: "Capa y espada del partido"
 GER_sword_of_the_shield_of_the_party_desc: "\"No se puede hacer una revolución con guantes blancos\". - Vladímir Lenin\n\nLos enemigos de los obreros no han desaparecido simplemente porque la revolución esté en marcha. Los reaccionarios acechan, susurrando cobardemente la contrarrevolución a puerta cerrada, y los agentes del capital extranjero continúan su eterna labor de sabotaje. Si queremos preservar la revolución, debemos estar dispuestos a protegerla por todos los medios necesarios. Aunque muchos aún se estremezcan al recordar el Ministerio de Seguridad del Estado, la revolución obrera debe ser salvaguardada de estas amenazas internas. Las herramientas de la Stasi no son un lujo, son una necesidad."
 GER_liquidate_the_capitalist_class: "Germanismo socialista"
 GER_liquidate_the_capitalist_class_desc: "Esta no es la primera revolución alemana. Desde los espartaquistas de 1919 hasta la resistencia a los tiranos nazis, nuestra historia es una historia de lucha; a menudo silenciada y traicionada, pero jamás olvidada. La sangre de Luxemburgo aún mancha las aguas del Canal Landwehr. La voz de Thälmann aún resuena en los pasillos de Buchenwald. Heredamos el profundo legado de su heroica lucha contra adversidades insuperables.\n\nDurante demasiado tiempo, la identidad milenaria de Alemania fue secuestrada por monarcas, militaristas y genocidas. Pero ya no cederemos el alma de la nación alemana a reaccionarios y fascistas. Porque la nuestra es la verdadera Alemania: la Alemania de los revolucionarios y el antifascismo fanático. El mundo debería ver en qué puede convertirse una nación socialista, libre del capital y la reacción."
 GER_revolutionary_justice_for_traitors: "Justicia revolucionaria a los traidores"
 GER_revolutionary_justice_for_traitors_desc: "La era de la inmunidad ha terminado. Durante demasiado tiempo, cobardes y oportunistas en el Gobierno, los medios de comunicación y la industria han vendido al pueblo alemán a los cerdos capitalistas y a los ministros de la OTAN. Hablaron de su preciada democracia mientras reprimían a los trabajadores, elogiaron la paz mientras alimentaban al complejo militar-industrial y celebraron la prosperidad mientras millones se hundían aún más en la pobreza. Y ahora, permiten que el fascismo regrese y conquiste a nuestros hermanos del Este.\n\nAhora se enfrentan a la justicia, no a la venganza, sino a la rendición de cuentas. Sus crímenes contra los trabajadores, el medio ambiente y la esencia misma de la paz serán expuestos a la vista de todos. En Karlsruhe, comenzará el primero de varios juicios. Habrá incomodidad y división. Pero también habrá claridad: el viejo orden ha desaparecido y sus sirvientes no podrán regresar. Esto no es una purga. Es un ajuste de cuentas largamente esperado."
 GER_socialist_democracy: "Difundir ideales marxistas"
 GER_socialist_democracy_desc: "No basta con juzgar a los traidores y la escoria de la República Federal; debemos asegurarnos de que el pueblo alemán comprenda por qué ha sido traicionado. Las cicatrices del liberalismo son profundas, y el veneno de la mentalidad capitalista aún persiste en la mente de muchos. En respuesta, lanzaremos una amplia campaña de reeducación, divulgación pública y revitalización cultural. En cada fábrica, en cada escuela y en cada sindicato, los postulados de Marx, el alemán más grande de todos los tiempos, resonarán. Los obreros y campesinos de Alemania aprenderán de nuevo a soñar con un mundo libre de explotación y opresión."
 GER_anti_fascist_bastion: "Baluarte antifascista"
 GER_anti_fascist_bastion_desc: "El fascismo, el azote insufrible que definió y reformó la historia humana durante la mayor parte del siglo pasado, las creencias que mancharon la reputación y contaminaron la mente del pueblo alemán, una vez más busca socavar su forma de vida. Debemos y debemos ser el rostro y el centro de Europa, desafiantes contra sus hordas, ser el ejemplo brillante de resiliencia contra el mal y todos los que buscan deponer las enseñanzas mismas del marxismo, Alemania y todo su pueblo, deben erigirse como el bastión brillante del antifascismo para todo el continente."
 GER_revolutionary_society: "Matar al Oso"
 GER_revolutionary_society_desc: ""
 GER_centralized_planning: "Planificación centralizada"
 GER_centralized_planning_desc: "La República Democrática era conocida por su avanzado sistema de planificación centralizada. Este sistema era sumamente complejo, con numerosos mecanismos de control para respaldar un sistema económico tan singular. El sistema funcionaba fluidamente, e incluso la ciudadanía participaba en algunos aspectos de la planificación. Trágicamente, con la reunificación forzosa de Alemania, este sistema racional y justo se desmanteló de la noche a la mañana, reemplazado por una economía mixta liberal, caótica y orientada al lucro, que no cumplió sus promesas. La historia ha demostrado que una economía planificada es el verdadero camino a seguir para la sociedad alemana y, por ello, ¡debemos transformar nuestra economía en una de planificación centralizada!"
 GER_revitalize_german_industry: "Reactivar la industria alemana"
 GER_revitalize_german_industry_desc: "No hace mucho, cientos de fábricas trabajaban a tres turnos para proporcionar fusiles a nuestros soldados y pan a la mesa de nuestros ciudadanos. Ahora, de aquellos talleres, antaño orgullosos, solo resuena un silencio sonoro y amargo. Infraestructuras destrozadas, escasez de mano de obra cualificada y una completa falta de propósito: todo esto se abordará a partir de hoy. Y, primero, les daremos a todos un objetivo claro: ¡la prosperidad de la nación alemana y del obrero alemán!"
 GER_reindustrialize_the_ruhr: "Reindustrializar el sur y el Ruhr"
 GER_reindustrialize_the_ruhr_desc: "El cambio hacia una economía de servicios, sumado a la capitulación de nuestro gobierno ante la facción verde, condujo a un declive y una desindustrialización sin precedentes de nuestras regiones industriales más vitales. Hoy, derribamos estas restricciones sociales impuestas artificialmente y, sobre las sólidas bases industriales del pasado, ¡construiremos nuevas fábricas y centros de producción una vez más!"
 GER_reindustrialize_the_south: "Reindustrializar el sur"
 GER_reindustrialize_the_south_desc: ""
 GER_protect_german_workers: "Modernizar leyes laborales"
 GER_protect_german_workers_desc: "El trabajador es la columna vertebral de la economía alemana, el cimiento sobre el que se construyen nuestras industrias, infraestructura y prosperidad. Sin su trabajo, innovación y dedicación, nuestro motor económico se tambalearía y la fuerza de nuestra nación disminuiría. No brindarle respeto y seguridad en el trabajo destruye la unidad y la estabilidad de nuestra nación, ¡así como nuestra economía! Por ello, el Gobierno debe garantizar los derechos y la seguridad de los trabajadores. Al reformar nuestras leyes laborales, optimizaremos la producción, fortaleceremos la protección de los trabajadores y garantizaremos que cada ciudadano contribuya al esfuerzo colectivo de forma eficiente y decidida. Una mayor protección de los trabajadores no solo mejorará el nivel de vida, sino que también fomentará un sentido de lealtad y unidad nacional entre los trabajadores."
 GER_socialist_anti_consumerism: "Anticonsumismo socialista"
 GER_socialist_anti_consumerism_desc: "Ah, los viejos tiempos, cuando los trabajadores gastaban sus preciados salarios en los mismos bienes cada año, reempaquetados para alimentar un ciclo interminable de necesidad. Ese ciclo termina ahora. Proporcionaremos todo lo que nuestra gente necesita para vivir: comida, techo, dignidad, e incluso una o dos comodidades modestas. Pero los falsos deseos ya no guiarán nuestra economía. La era de la manipulación masiva a través del consumo ha terminado. De ahora en adelante, la producción estará al servicio de la vida, no del lucro."
 GER_construct_working_class_unity: "Construir unidad obrera"
 GER_construct_working_class_unity_desc: "Desde el ingeniero de la fábrica de BMW hasta el trabajador de carreteras que pavimenta las calles para esos mismos coches, debemos trabajar en sintonía y unidos para lograr el brillante futuro que nuestros predecesores no lograron. Y aunque diferimos y surjan desacuerdos, todo trabajador alemán debe comprender: nuestro camino hacia adelante reside en el apoyo mutuo y la solidaridad entre camaradas, ¡por la prosperidad de la nación!"
 GER_socialist_market_economics: "Economía de mercado socialista"
 GER_socialist_market_economics_desc: ""
 GER_community_of_european_workers: "Comunidad de Trabajadores Socialistas"
 GER_community_of_european_workers_desc: "\"Vereine\", grupos de personas unidas por un propósito común, han formado parte del tejido social de nuestra nación desde hace mucho tiempo. Asociaciones políticas, deportivas, intelectuales... todo tipo han moldeado la sociedad alemana. Hoy, damos un paso más: ¡creamos una asociación nacional de trabajadores! El Estado organizará seminarios, reuniones e incluso veladas sociales regulares, para garantizar que nuestros trabajadores forjen vínculos más fuertes y compartan los conocimientos necesarios para avanzar unidos."
 GER_socialist_pseudo_consumerism: "Seudoconsumismo socialista"
 GER_socialist_pseudo_consumerism_desc: "Ah, los viejos tiempos, cuando la gente gastaba su salario en todo tipo de baratijas que, sin embargo, los hacían sentir un poco más felices. Desafortunadamente, el consumismo en la antigua Alemania fue demasiado lejos: empezó a moldear vidas, no solo a mejorarlas. No volveremos a eso, pero a través de nuestro nuevo y floreciente modelo de prosperidad, ofreceremos alegría y dignidad a nuestra gente en el presente, no solo en el futuro lejano."
 GER_unity_of_the_unions: "Unidad de sindicatos"
 GER_unity_of_the_unions_desc: ""
 GER_connecting_the_country: "Encender el país"
 GER_connecting_the_country_desc: "Para mantener nuestras nuevas fábricas en funcionamiento y abastecer de energía a los hogares de sus trabajadores, necesitamos una inmensa cantidad de energía. En estas condiciones, debemos levantar las prohibiciones a la energía nuclear, a pesar de los profundos temores de gran parte de la población. Y mientras los nuevos reactores aún están en construcción, las antiguas centrales térmicas y de carbón, antaño abandonadas, tendrán que impulsarnos hacia el futuro."
 GER_revitalize_the_german_consumer_market: "Revitalizar al mercado de consumo"
 GER_revitalize_the_german_consumer_market_desc: "La posguerra siempre es una época de dificultades. Miles de viudas y huérfanos, hogares destrozados, escuelas y hospitales derrumbados. En estos momentos, es nuestro deber garantizar que las personas no solo reciban atención, sino que estén verdaderamente satisfechas con la vida que están reconstruyendo. Para ello, reintroduciremos con cautela elementos del consumismo, en nuestros propios términos, por supuesto. Al fin y al cabo, un ciudadano contento es la piedra angular de una economía sana."
 GER_nationalize_vital_industries: "Expropiar industrias vitales"
 GER_nationalize_vital_industries_desc: "Para desgracia de los inversores extranjeros, y gran fortuna de nuestros trabajadores, ¡por fin estamos recuperando para el pueblo lo que le pertenece por derecho! Sectores clave como la industria pesada, el transporte, la tecnología avanzada y la industria farmacéutica pasarán a estar bajo control público. Estas industrias son demasiado importantes para dejarlas en manos privadas; deben servir al pueblo, no al lucro."
 GER_encourage_cooperative_economics: "Fomentar economías cooperativas"
 GER_encourage_cooperative_economics_desc: ""
 GER_turn_ploughshares_into_swords: "Convertir arados en espadas"
 GER_turn_ploughshares_into_swords_desc: "Todo lo que hemos hecho hasta ahora ha sentado las bases que durarán décadas, y los frutos de nuestro trabajo ya empiezan a verse. Sin embargo, más allá de nuestras fronteras, hay quienes quieren ver nuestra forma de vida destruida. No permitiremos que eso suceda. Nuestro trabajo se convertirá en nuestra arma. Nuestras fábricas pasarán de ser arados a ser espadas, y nuestros trabajadores triunfarán, ¡en la fábrica y en el campo de batalla!"
 GER_rebuild_the_bundeswehr: "Expandir la Internacional Europea"
 GER_rebuild_the_bundeswehr_desc: "Las campanas de la libertad retumban por toda Europa Occidental mientras los trabajadores, no solo de Alemania, sino de muchas naciones, claman con esperanza y alegría. Sin embargo, no todo marcha bien en nuestro continente. Los fascistas rusos se sientan en su trono de conquista, con la mirada puesta en nuestro pueblo, nuestros recursos y nuestra riqueza. Con la OTAN como cosa del pasado, estamos unidos a nuestros países hermanos solo por la ideología. Si esto no se remedia, nos eliminarán uno a uno, hasta que no queden naciones europeas libres. No debemos permitir que esto suceda; protegeremos la revolución y a nuestro pueblo. ¡Vivan los trabajadores libres del mundo!"
 GER_control_the_skies: "La Revolución internacional"
 GER_control_the_skies_desc: "El socialismo como ideología ha experimentado un gran resurgimiento en todo el mundo desde el colapso de los Estados Unidos. Sin esa horrible amalgama de ideales capitalistas que sofocara cualquier sentimiento socialista, la voluntad popular comenzó a brillar con fuerza. Sin embargo, sus Gobiernos y sociedades siguen pisoteándolos, y sin ayuda, su noble causa podría estar condenada al fracaso. En estos momentos no podemos prescindir de mucho, pero todo lo que podamos se destinará a promover los objetivos del pueblo, tanto en el país como en el extranjero."
 GER_new_aerial_academy: "Ayuda de la revolución norteamericana"
 GER_new_aerial_academy_desc: "Tras años de estrangulamiento, los trabajadores de Norteamérica finalmente se han alzado y han ocupado el lugar que les corresponde. Si bien su posición aún es incierta, han conseguido suficientes recursos y equipo como para contar con un excedente, que tan amablemente nos han donado. Esta muestra de camaradería y hermandad no pasará desapercibida, y una vez que la burguesía haya sido completamente erradicada del continente norteamericano, será necesaria una mayor colaboración."
 GER_streamline_aircraft_production: "Apoyar comunistas escandinavos"
 GER_streamline_aircraft_production_desc: "Escandinavia fue quizás la única región que no se vio afectada por la guerra contra Rusia. Aunque lucharon, no se rindieron ante Rusia y sofocaron el sentimiento comunista que impulsó la revolución aquí y en toda Europa Occidental. Al contrario, aún se aferran a su bienintencionado, aunque imperfecto, socialismo democrático. Si quieren continuar en el futuro con los trabajadores de Europa, sus Gobiernos tendrán que dejar de lado estos ideales anticuados y aceptar el rumbo que está tomando este continente. Como todos sabemos, no lo harán por voluntad propia; encontraremos a quienes estén dispuestos a tomar el control por la violencia y les daremos un arma."
 GER_modernize_the_eurotyphoon: "Contactar partisanos antifascistas"
 GER_modernize_the_eurotyphoon_desc: "Los rusos nunca han sido excelentes en nada, y sin duda están fracasando en su intento de controlar Europa Oriental. Han surgido partisanos por todos los territorios ocupados, y aunque no todos sean socialistas, cualquier antirruso es nuestro amigo. Es inevitable que finalmente marchemos hacia el este para liberar a estas masas encadenadas, y cuando llegue el momento, contar con una red partisana confiable será sin duda una gran ventaja. Por lo tanto, es imperativo que perfeccionemos esa herramienta ahora, ¡para cuando llegue ese día!"
 GER_moscow_shall_know_fear: "Guerra partisana total"
 GER_moscow_shall_know_fear_desc: "Llegó la hora de abatir a nuestros enemigos rusos. El alto mando ha considerado que las fuerzas partisanas que hemos reunido en el este son aptas para una guerra a gran escala, y se les ha ordenado que lo lleven a cabo. Esto reducirá drásticamente la confianza pública en el régimen ruso y ablandará a su nación ante nuestro eventual ataque. Aunque al final estos partisanos estén condenados al fracaso, sus sacrificios nos ayudarán en nuestra eventual liberación del este. ¡Muerte a Rusia, viva la Internacional Europea!"
 GER_steel_torrent: "Conexiones con China"
 GER_steel_torrent_desc: "China, durante mucho tiempo enemiga y el último gran faro del comunismo, quizás ahora sea una aliada. Si bien nuestros pueblos aún se muestran bastante recelosos, el hecho de que ahora compartamos una ideología común en un mundo donde todos parecen estar inventando nuevas formas de gobierno de la nada significa mucho. Ahora estamos en una posición mucho más favorable para la colaboración, y quizás en el futuro podamos llegar a un acuerdo mutuamente beneficioso. Sin embargo, por ahora, la normalización de las relaciones será suficiente."
 GER_localize_tank_production: "Acuerdo Wagenknecht"
 GER_localize_tank_production_desc: "Los chinos, aunque viejos amigos de Rusia, se han distanciado por el reciente cambio ideológico de esta última. Nos han visto como colaboradores mucho más dispuestos y, presentiendo una guerra en el horizonte, han ofrecido una propuesta interesante. Si Rusia es derrotada en la guerra, se repartirá entre ambos, y tendremos la libertad de manipular a nuestro antojo a nuestros nuevos títeres. La era de la colaboración ruso-china ha terminado definitivamente, y a partir de ahora serán tan opuestas como el comunismo y el capitalismo."
 GER_trial_of_treasonous_politicians: "Estudios de guerra electrónica"
 GER_trial_of_treasonous_politicians_desc: "Vivimos en una época en la que la guerra se libra tanto desde la silla como en las trincheras. Nuestra última guerra con Rusia demostró que nuestra doctrina estaba terriblemente anticuada y que no entendíamos del todo cómo aprovechar esta tecnología de nueva generación. Antes de siquiera aspirar a un nivel de competencia similar al de nuestros homólogos orientales, debemos poder afirmar con seguridad que podemos utilizar esta tecnología en la misma medida que ellos."
 GER_study_new_mobile_doctrines: "Cooperación militar internacional"
 GER_study_new_mobile_doctrines_desc: "Las conversaciones con China han ido increíblemente bien, a medida que seguimos encontrando cada vez más puntos en común con nuestros camaradas del Extremo Oriente. Recientemente, se propuso una operación militar conjunta, que fue aceptada de inmediato por ambas partes. Si bien es improbable que alguna vez luchemos juntos en una guerra, dada nuestra distancia, siempre existe una posibilidad. Por ello, han comenzado los preparativos no solo para un ejercicio a gran escala, sino también para una mayor cooperación militar en el futuro. Además, nada malo puede resultar de ser amigo de los chinos."
 GER_an_elite_officer_corps: "Asistir a la resistencia báltica"
 GER_an_elite_officer_corps_desc: ""
 GER_build_the_national_peoples_army: "Construir el Ejército Nacional Popular"
 GER_build_the_national_peoples_army_desc: "Nuestro reciente colapso militar en el este ha dejado a nuestro ejército hecho trizas, nuestras reservas están agotadas y nuestros hombres están muertos o desmotivados. Como en todas las revoluciones socialistas anteriores, estamos amenazados y rodeados por Estados capitalistas que con gusto aplastarían nuestra revolución. Debemos proteger nuestra revolución y a nuestros trabajadores por todos los medios, lo que incluye fortalecer nuestro ejército. No utilizaremos nuestro nuevo ejército para ninguna aventura imperialista como lo hizo nuestra vieja guardia, sino como escudo de la clase obrera."
 GER_trial_of_treasonous_generals: "Juzgar a los generales traidores"
 GER_trial_of_treasonous_generals_desc: "Aunque construir un ejército basado completamente en la lealtad es una tarea inútil, tampoco conviene tener generales en quienes no se pueda confiar. Entre nuestras filas militares hay un montón de traidores a la revolución y vestigios del antiguo régimen. Para asegurar el futuro de esta nación, tanto militar como políticamente, es necesario que derroquemos a estos generales traidores antes de que tengan la oportunidad de causar más problemas. Sus puestos serán reemplazados por servidores del pueblo... que, por supuesto, también tienen la reputación que lo respalda."
 GER_pick_up_sword_of_damocles: "Tomar la espada de Damocles"
 GER_pick_up_sword_of_damocles_desc: "Por mucho que luchemos contra los rusos, siempre tendrán un as en la manga. Si bien los franceses y los británicos poseen arsenales nucleares escasos, palidecen en comparación con los de nuestro vecino del este, e incluso si lográramos destruir algunas ciudades, seguiríamos siendo borrados del mapa. Por suerte, en ausencia de Estados Unidos, casi nadie hace cumplir los tratados sobre armas nucleares, así que somos libres de tomar la Espada de Damocles. Con ella, decapitaremos a los rusos y liberaremos a los millones que trabajan arduamente bajo su dominio."
 GER_immer_bereit: "§YUNTERNEHMEN§!: FALKE"
 GER_immer_bereit_desc: "Nuestra utopía comunista se ha arraigado en Europa Occidental, pero para que nuestro Estado prospere verdaderamente, debemos abordar la persistente amenaza que representa el oso ruso en Oriente. Durante demasiado tiempo, la influencia rusa, impulsada por una ideología volátil y opresiva, ha pisoteado las culturas de diferentes naciones. Los pueblos de Rusia y Europa Oriental han sufrido bajo este régimen autoritario y necesitan urgentemente liberación. Es nuestro deber ayudarlos a liberarse de las garras de esta tiranía ideológica que ha causado tanta destrucción en Europa y allanar el camino para una utopía comunista en todo el continente europeo."
 GER_fury_of_the_people: "Furia popular"
 GER_fury_of_the_people_desc: "¿Lo oyen? ¿Oyen el estruendo que retumba por toda Alemania? Se oye en las calles, en los hogares y en las fábricas. Es el clamor de los obreros, los campesinos, los obreros y la gente común, el proletariado de Alemania, clamando por la defensa de la revolución. Es la furia de las masas; una furia que ve a las fuerzas de la reacción rodeándonos y exige acción, acción que no tardaremos en emprender. Según nuestra directiva, nuestros preparativos y movilización serán extensos y radicales. Se expandirán las fuerzas armadas, se distribuirán las armas, la nación se preparará y las masas se agitarán para la lucha. Todos lo ven con claridad. Se avecina una batalla mortal, pero será el fanatismo del pueblo, que canalizaremos, lo que nos dará la victoria."
 GER_introduce_mass_conscription: "Conscripción en masa"
 GER_introduce_mass_conscription_desc: "Después del final de la República Democrática y la reunificación de Alemania, uno de los problemas de la podrida ex Bundeswehr era la falta de mano de obra debido a un sistema de reclutamiento exclusivo para voluntarios. Esto tiene que cambiar si queremos tener una oportunidad en la próxima guerra. La Wehrpflicht, como muchos la llamaban, será reintroducida para ampliar no solo nuestra reserva de mano de obra, sino también nuestro ejército actual."
 GER_learn_from_our_enemies: "Aprender del enemigo"
 GER_learn_from_our_enemies_desc: ""
 GER_nationalize_heckler_and_koch: "Reorganizar Rheinmetall"
 GER_nationalize_heckler_and_koch_desc: "Rheinmetall era la joya de la corona de los conglomerados en la Alemania capitalista. Este gigante multimillonario constituía una parte fundamental de la columna vertebral manufacturera de la fuerza blindada de la OTAN, pero ahora nos pertenece. En lugar de desmantelar este agente del imperialismo global de la OTAN, lo estatizaremos y reorganizaremos para que sirva a los objetivos de defensa del nuevo estado socialista alemán. Se reestructurarán departamentos, se iniciarán nuevos proyectos, se reorientarán los objetivos de producción y, lo más importante, se destruirá todo rastro de egoísmo capitalista y afán de lucro. Lo que una vez sirvió para armar al Occidente capitalista contra el socialismo ahora será lo que ayude a llevar el socialismo a toda Europa."
 GER_a_motorized_army: "Tácticas a motor renovadas"
 GER_a_motorized_army_desc: "La guerra moderna, a pesar de todo lo que se habla de robots y drones, sigue dependiendo en gran medida de formaciones motorizadas y mecanizadas de rápido movimiento. Las grandes cantidades de infantería en TBP y VCI que maniobran con rapidez para superar y destruir al enemigo serán un factor importante en cualquier conflicto futuro. Considerando esto, debemos revisar y revitalizar nuestras tácticas en cuanto a la motorización de la infantería. Desde nuestras academias militares hasta las unidades en el campo de batalla, centrarse en el combate dentro de este paradigma debe ser primordial. Al igual que las antiguas formaciones de fusileros motorizados de la República Democrática, nuestros enemigos pronto lo pensarán dos veces antes de enfrentarse a nosotros en una guerra terrestre de gran envergadura."
 GER_prestigious_german_engine: "Teñir el cielo de rojo"
 GER_prestigious_german_engine_desc: "La historia y nuestra reciente guerra nos han enseñado una cosa: quien controle los cielos, ganará la guerra. La Luftwaffe carecía de la financiación necesaria para oponer resistencia efectiva a la Fuerza Aérea Rusa. Por lo tanto, se reorganizará la Fuerza Aérea y se incrementará la financiación para I+D y mantenimiento aéreo, para mejorar aún más nuestras posibilidades de controlar los cielos."
 GER_refocus_the_automobile_industry: "Torrente de acero"
 GER_refocus_the_automobile_industry_desc: "Nuestros preparativos han sido exhaustivos. Hemos reclutado a miles y miles de hombres, construido fortalezas y fábricas, y forjado montañas de armaduras y acero; es una fuerza que el continente no ha visto en muchos años. Sin embargo, es más que puro poder. Es mucho más que eso. Es la voluntad y el esfuerzo colectivos de la clase obrera de toda Alemania, y está gestando algo temible. Pronto toda Europa será testigo de una tormenta de metal y poder, un torrente de armaduras, armas, metal y hombres unidos por la furia y el fuego. Será el poder de toda una nación lanzado contra los capitalistas lo que los aplastará de un solo golpe. Algunos llamarán a nuestros planes una fantasía descabellada, pero les recordaremos lo que dijo una vez el camarada Stalin:\n\n\"¡No hay fortaleza que los bolcheviques no puedan asaltar!\""
 GER_expand_automobile_factories: "Ampliar fábricas de automóbiles"
 GER_expand_automobile_factories_desc: ""
 GER_cult_of_speed: "Armas combinadas extendidas"
 GER_war_for_the_proletariat: "Guerra por el proletariado"
 GER_war_for_the_proletariat_desc: "Si bien la guerra suele ser una herramienta de los capitalistas para vender nuevas armas, bombas y aviones, en este caso podemos hacer una excepción. Si se les permite a los rusos continuar su camino, destruirán lentamente todo a su paso, incluyendo a sus trabajadores inocentes. Entonces necesitarán más, vendrán por nosotros y destruirán la revolución que hemos luchado por establecer. Al final, todos perdemos, así que es nuestra responsabilidad luchar por el futuro de nuestros obreros, pero también por el de los rusos."
 GER_reform_kampfgruppen_arbeiterklasse: "Kampfgruppen der Arbeiterklasse"
 GER_reform_kampfgruppen_arbeiterklasse_desc: "Gracias a la clase obrera, la revolución se ha consolidado en casa, pero muchos desean extenderla al extranjero. En lugar de volver a las fábricas, estos trabajadores prefieren tomar las armas y marchar hacia el este, ¡y admiramos profundamente su dedicación a la causa! Por ello, formaremos \"brigadas obreras\" especiales para garantizar que nadie se quede atrás y que todos tengan la oportunidad de liberar a quienes están bajo el yugo ruso."
 GER_the_whisper_from_all_continents: "Se susurra desde cada continente"
 GER_the_whisper_from_all_continents_desc: "El socialismo, a diferencia de muchas ideologías, se percibe como el resultado natural de la industrialización. El trabajador se esfuerza en las fábricas, se desgasta en las minas y construye maravillas con su propia sangre, sudor y lágrimas. ¡Sin duda merece un techo, una barriga llena y representación en el Gobierno! Esta lógica es la razón por la que el socialismo, en todas sus formas, se ha extendido silenciosamente por el mundo, calando hondo en cada hombre, mujer y niño que alguna vez ha trabajado duro. ¡Aprovecharemos este sentimiento y lo aprovecharemos hasta que la llama de la revolución se encienda en todo el planeta! ¡Proletarios del mundo, rompan sus cadenas!"
 GER_communists_forward: "¡Comunistas, adelante!"
 GER_communists_forward_desc: "Iósif Stalin, a pesar de ser ruso, pronunció una frase que quizás personifique el espíritu comunista más que cualquier otra: \"¡Ni un paso atrás!\". Ya sea en la industria, la tecnología o, en este caso, la guerra, nos lanzaremos con valentía a ir donde nadie ha ido antes. ¡No seremos obligados a retroceder, ni por los rusos, ni por la burguesía, ni por nuestros propios aliados! ¡Seguiremos adelante hasta liberar el mundo!"
 GER_technology_asistance_program: "Programa de investigación tecnológica de EE.UU."
 GER_technology_asistance_program_desc: ""
 GER_unrestricted_aerial_bombardment: "Bombardeos indiscriminados"
 GER_unrestricted_aerial_bombardment_desc: "A pesar de nuestro compromiso con la Convención de Ginebra, las circunstancias nos han obligado a reconsiderar nuestro enfoque. El oso ruso ha sabido aprovecharse de nuestra moderación para reconstruir su capacidad militar. Para evitar un mayor resurgimiento, autorizaremos a nuestros pilotos a realizar ataques aéreos en territorio ruso. Esto les permitirá atacar centros de suministro críticos, infraestructura civil potencialmente convertida en cuarteles militares improvisados, centros de suministro y fábricas, incluso con el riesgo de víctimas civiles."
 GER_operation_centre: "§YUNTERNEHMEN§!: STAR"
 GER_operation_centre_desc: "Polonia funciona como un estado tapón crucial, protegiendo eficazmente a Rusia de cualquier invasión directa y complicando cualquier operación de avanzada. Su terreno es propicio para maniobras blindadas ofensivas, pero presenta importantes desafíos para una estrategia de defensa en profundidad, como se ha demostrado repetidamente a lo largo de la historia. Asegurar un avance en Polonia expondría la profundidad del territorio ruso, abriendo el acceso a sus grandes centros urbanos."
 GER_operation_normalization: "§YUNTERNEHMEN§!: KOLIBRI"
 GER_operation_normalization_desc: "Polonia sirve como principal escudo de apoyo al frente ruso en Europa Oriental y requeriría importantes recursos para abrirse paso. Sin embargo, avanzar a través de Eslovaquia, Hungría y Rumania ofrece una ruta alternativa que evita este frente fuertemente fortificado. Gran parte de este terreno es favorable para las operaciones militares, lo que nos proporciona una ventaja estratégica. Al aprovechar esta ruta, podemos atacar al oso ruso desde una dirección inesperada, perturbar su cohesión y debilitar aún más su control sobre Europa Oriental."
 GER_lure_them_in: "Atraerlos estratégicamente"
 GER_lure_them_in_desc: ""
 GER_form_free_russian_army: "Formar el Ejército Rojo Ruso"
 GER_form_free_russian_army_desc: "Incluso dentro del vasto Imperio ruso, existen grupos comunistas exiliados y movimientos clandestinos que han sido reprimidos durante mucho tiempo por el régimen fascista. Con la popularidad del partido gobernante en declive, tenemos una oportunidad crucial. Al establecer contacto, no solo podemos explorar la posibilidad de integrar sus milicias en un nuevo ejército colaboracionista, sino también sentar las bases para un nuevo marco político ruso una vez concluido el conflicto. Estos grupos podrían servir como elemento fundamental para la configuración de un régimen de posguerra que rechace el autoritarismo y se alinee más estrechamente con nuestra visión de estabilidad regional."
 GER_europes_finest_hour: "Hora más gloriosa de Europa"
 GER_europes_finest_hour_desc: "¡Los bastardos están en fuga! En todo el continente, los poderosos ejércitos y los pueblos resilientes de Europa se han alzado desafiantes, rompiendo las cadenas del fascismo y reclamando su libertad con valentía y sacrificio. Ahora es el momento de convertir la victoria en legado. Es hora de reconstruir Europa, no sobre el miedo ni la división, sino sobre los cimientos de la justicia y la unidad."
 GER_quell_fires_of_revolution: "Callar el caos revolucionario"
 GER_quell_fires_of_revolution_desc: ""
 GER_eternal_revolution: "La revolución eterna"
 GER_eternal_revolution_desc: "A lo largo de la historia, los movimientos socialistas se han enfrentado a una represión implacable. Pero hoy, una nueva fuerza está en movimiento. En toda Europa y más allá, en continentes largamente dominados por el capitalismo y aplastados por el fascismo, los trabajadores se han alzado, rompiendo sus cadenas y creando sus propias utopías. Ya no son sujetos de explotación, sino arquitectos de una nueva sociedad.\n\nEuropa no será la excepción. También se alzará no como un continente fracturado gobernado por élites, sino como una fuerza unificada construida por y para la clase trabajadora. La base de nuestro futuro será la solidaridad, la justicia y el poder colectivo del pueblo. Comienza una nueva era y pertenece a quienes trabajan, no a quienes gobiernan."
 GER_call_for_international_help: "Llamar a ayuda internacional"
 GER_call_for_international_help_desc: "En todo el mundo, innumerables socialistas comprometidos están dispuestos a apoyar nuestra causa en las redes sociales, muchos incluso dispuestos a dar su vida en la lucha contra el régimen fascista de Moscú. Además, numerosas naciones comparten nuestra solidaridad y apoyan nuestra lucha.\n\nAl conectar con la amplia red socialista internacional, no solo podemos fortalecer nuestra imagen global, sino también obtener recursos vitales. Esto incluye voluntarios para reforzar tanto nuestras fuerzas de primera línea como la fuerza laboral nacional, así como ayuda humanitaria y militar de los Estados socialistas aliados. Movilizar este apoyo es esencial para mantener nuestros esfuerzos y demostrar la unidad global frente a la agresión autoritaria."
 GER_break_their_spirit: "Romper su espítiru"
 GER_break_their_spirit_desc: ""
 GER_study_new_strategies: "Estudiar nuevas estrategias"
 GER_study_new_strategies_desc: ""
 GER_progress_cult: "Culto del progreso"
 GER_progress_cult_desc: "En el capitalismo tardío, el progreso solo se medía en ganancias. Toda innovación debía llenar los bolsillos de los cerdos y servir al mercado, nunca al pueblo. Ahora, los jóvenes anhelan un futuro liberado del pasado. Las aulas y los laboratorios de la Alemania Democrática rebosan de innovación. No ocultamos nuestra ambición, la celebramos. La ciencia y la razón no son herramientas temibles de la burguesía, sino armas en el arsenal de los trabajadores. Una sociedad que se niega a evolucionar ya está muerta."
 GER_propagandize_the_war_effort: "Propagandizar la guerra"
 GER_propagandize_the_war_effort_desc: "La propaganda es una de las armas más poderosas en cualquier lucha, no solo para desenmascarar al enemigo, sino para despertar y unir al pueblo. En la guerra, el apoyo de las masas no es opcional, es esencial. Sin el pueblo, no hay ejército, ni resistencia, ni revolución. Por eso debemos mostrarle al pueblo alemán nuestra verdad y por qué lucha. Debemos dejarle claro que no lucha por una bandera ni una frontera, sino por el amanecer de una nueva Europa, libre de la explotación capitalista y la escoria revanchista que asoló este continente durante miles de años."
 GER_relocate_the_industry: "Reubicar la industria"
 GER_relocate_the_industry_desc: ""
 GER_chancellors_guiding_hand: "De la mano del Canciller"
 GER_chancellors_guiding_hand_desc: "Alemania ha sido bendecida con un líder que no se ha visto en muchos años: nuestra gran canciller. Los días decrépitos de disputas bajo la democracia han terminado. Las instituciones disfuncionales del liderazgo descentralizado han sido barridas. Ahora solo hay una visión, un hombre. Los liberales del pasado no vieron el gran peligro que corre nuestra gran nación. Estamos rodeados de enemigos y naciones bárbaras y despiadadas listas para destrozarnos. Pero bajo la guía de la canciller estaremos listos y unidos para la victoria."
 GER_gotterdammerung: "Götterdämmerung"
 GER_gotterdammerung_desc: "A medida que la guerra llega a su acto final, sus consecuencias se sentirán en todo el continente europeo durante generaciones. Como muchos de sus aliados de la OTAN, Alemania se encuentra ahora en una devastación total. Nuestras ciudades han quedado reducidas a escombros por los incesantes bombardeos rusos, los cadáveres se amontonan en nuestras calles mientras familias desesperadas claman por sus seres queridos, excavando entre los escombros, si no para encontrarlos con vida, al menos para recuperar sus restos. Una vez más, nuestra nación se ve avergonzada por un viejo enemigo, uno que creíamos que había sido relegado a la historia en 1991. Habíamos imaginado este siglo como una era de paz y prosperidad, un momento para expiar el pasado y forjar un nuevo futuro esperanzador. Pero no podríamos haber estado más equivocados.\n\nLa amenaza del Este nunca desapareció; simplemente permaneció latente, esperando el momento de atacar. Esta guerra ha sido nuestro ajuste de cuentas, un brutal despertar de nuestra ingenua complacencia. Ahora, los corazones de nuestro pueblo están llenos de odio y furia, su sed de venganza no se ha saciado. Sin embargo, por ahora, debemos resistir. Debemos apretar los puños y agachar la cabeza ante la amenaza roja mientras iniciamos la ardua tarea de reconstrucción. Pero no nos equivoquemos: Alemania no permanecerá en ruinas para siempre. Nos levantaremos de nuevo. Venceremos. Y al final, la victoria final pertenece a Alemania."
 GER_promise_recovery: "Prometer recuperación"
 GER_promise_recovery_desc: "Nuestra humillación a manos de los rusos ha destrozado la confianza pública en el Gobierno y ha arruinado nuestra otrora próspera economía. El pueblo exige que sigamos cuidándolo y hace preguntas para las que no tenemos respuestas. No podemos permitirnos ser complacientes, los próximos meses serán algunos de los más difíciles de nuestra historia. ¡Reconstruiremos, reformaremos y recuperaremos nuestro orgullo de los rusos!"
 GER_convene_with_nato: "Reunirse con la OTAN"
 GER_convene_with_nato_desc: "Ninguno de nuestros aliados de la OTAN está en una mejor posición que nosotros, ni quieren imaginarse otra guerra con Rusia. Sin embargo, no podemos quedarnos de brazos cruzados mientras el oso sigue haciéndose más fuerte. Una limpieza profunda es desesperadamente necesaria, y nos aseguraremos de que la OTAN se convierta en lo que se presenta como: una fuerza militar fuerte y unida capaz de proteger a su gente."
 GER_facit_omnia_voluntas: "Facit omnia voluntas"
 GER_facit_omnia_voluntas_desc: "Durante demasiado tiempo, nuestra nación ha sido gobernada por burócratas y cerdos corruptos que se llenaron los bolsillos con intereses corporativos mientras nuestra fuerza se marchitaba. Fueron ellos quienes nos llevaron a la derrota, a la destrucción, a la caída. Bajo su liderazgo negligente, la Bundeswehr quedó abandonada a su suerte como una reliquia olvidada, mientras ellos se enriquecían y despilfarraban nuestros recursos en esfuerzos inútiles.\n\nPero hoy, todo eso terminará. La debilidad ya no definirá a las fuerzas armadas alemanas. Restauraremos el honor, la disciplina y la fuerza que una vez definieron a nuestra formidable nación. El legado de la gloria y la excelencia militar prusianas resurgirá. Nuestro ejército ya no será una idea de último momento: será una fuerza temida por nuestros enemigos y respetada por el mundo. Ha llegado el momento de que surja una nueva Alemania. Una Alemania más fuerte. Una Alemania con determinación, con orgullo y con la voluntad de mantenerse firme contra la agresión extranjera. Ya no flaquearemos. Ya no nos arrodillaremos. A partir de hoy, Alemania se mantendrá firme."
 GER_nato_war_recovery: "Revivir las Fuerzas Armadas"
 GER_nato_war_recovery_desc: "Incluso antes de la guerra con Rusia, nuestro ejército no estaba en su mejor momento. Si bien seguía siendo impresionante y moderno, dependía en gran medida de los estadounidenses. Sin ellos, los rusos nos humillaron fácilmente. No podemos permitirnos perder contra el oso nunca más. De ahora en adelante, solo podemos confiar en nosotros mismos, no en que vaya a ser un problema. Durante siglos, el ejército alemán fue la envidia del mundo, y volverá a serlo. Depende de nosotros reconstruir un ejército que esté a la altura de las expectativas de nuestros antepasados."
 GER_en_treue_fest: "Ruhm des Vaterlandes"
 GER_en_treue_fest_desc: "Alemania es una nación con una de las historias militares más largas y distinguidas de todas las naciones europeas. Bajo las banderas del imperio, presenciamos grandes victorias, forjamos generales geniales, creamos doctrinas revolucionarias e influimos en el curso de la historia de la humanidad. Fuimos la nación de hombres que cambiaron el destino de este continente, y nuestro pueblo debe saberlo ahora. Difundiremos el mensaje, haremos propaganda de nuestro pasado, contaremos la historia de los grandes hombres que una vez nos lideraron y provocaremos un apasionamiento fanático en toda la nación alemana. Pronto, todos los alemanes demostrarán una dedicación y una voluntad absolutas para honrar y restaurar la gloria de la patria ahora y en el futuro."
 GER_gott_ehre_vaterland: "Koalition von Schwarz-Weiß-Rot"
 GER_gott_ehre_vaterland_desc: "¿Cuándo alcanzó su máximo esplendor las fuerzas armadas alemanas? ¿La Wehrmacht? ¿La Bundeswehr? Lo cierto es que ninguna de ellas se acercó siquiera a la cima de nuestra destreza militar. Cada una de ellas heredó sus tradiciones e identidad de Prusia, que posteriormente se convertiría en el Imperio Alemán. Por lo tanto, debemos reconstruir nuestro ejército a su imagen. Solo mediante el resurgimiento del militarismo prusiano y el excepcionalismo militar podremos proteger eficazmente a nuestra nación y a nuestro pueblo de la amenaza que se cierne sobre el Este. Una vez más, nuestra voluntad será de hierro forjado, nuestro pueblo se volverá fuerte y puro, y nuestra sangre arderá con una sed inquebrantable de venganza."
 GER_national_service: "Servicio nacional"
 GER_national_service_desc: "Hubo una época en que Alemania era reconocida por su destreza y fuerza militar. El Reino de Prusia era reconocido mundialmente como un estado militar, contando con el cuarto ejército más grande de Europa a pesar de tener solo una fracción de la población europea. Hoy, al hablar del militarismo alemán, muchos recuerdan las dos guerras mundiales. Sin embargo, en realidad, sin unas fuerzas armadas fuertes, nuestra nación habría sido débil y fácilmente destrozada por agresores extranjeros. Sin un ejército poderoso, Prusia nunca habría podido unificar Alemania en un estado-nación. Sin fuerza militar, nos habríamos derrumbado bajo la presión de ambos frentes, al igual que los austriacos durante la Primera Guerra Mundial. Sin una defensa capaz, no habríamos podido resistir, y nuestro pueblo habría sido masacrado como ganado por los bolcheviques durante la Segunda Guerra Mundial. El militarismo siempre ha sido, y siempre será, fundamental para el pueblo alemán y su identidad. A medida que nuestros adversarios se acercan de nuevo a nuestras fronteras, necesitamos sangre nueva para llenar las filas de nuestras fuerzas armadas. Por lo tanto, debemos restablecer el servicio militar obligatorio, que una vez abandonamos tontamente."
 GER_rehabilitate_the_kaiser: "Rehabilitar al káiser"
 GER_rehabilitate_the_kaiser_desc: "¿Qué define a Alemania como nación? Algunos argumentarán que es nuestra rica cultura y tradiciones, mientras que otros destacarán nuestros reconocidos avances tecnológicos y nuestro compromiso con la calidad. Pero lo cierto es que, hasta finales del siglo XIX, el concepto mismo de una nación y un pueblo alemanes unificados era vago e inconcebible. Solo gracias a la gracia de Dios y al sabio liderazgo de los Hohenzollern, los alemanes pudimos liberarnos de la influencia austriaca y gala. Sin el genio estratégico de Bismarck, la inquebrantable valentía de Moltke y, sobre todo, la guía de nuestro káiser, Guillermo I, Alemania tal como la conocemos hoy no existiría.\n\nFueron Prusia y nuestros káiseres quienes forjaron nuestra nación, moldeándola con sangre, hierro y una determinación inquebrantable. Ahora, con la separación de Baviera de nuestra nación, nuestros hermanos se ven nuevamente divididos por fronteras impuestas por intereses extranjeros. Nunca ha sido tan crucial recordar a nuestro pueblo las luchas de nuestros antepasados y la importancia de nuestra unidad. Fue el espíritu inquebrantable de nuestro pueblo y la guía de los káiseres lo que construyó una Alemania que se mantuvo firme en el escenario mundial y forjó una nación que luchó por asegurar su legítimo lugar bajo el sol. No debemos olvidar su legado, pues es la base sobre la que se construyen nuestra identidad y cultura."
 GER_eliminate_the_dregs: "Eliminar la escoria"
 GER_eliminate_the_dregs_desc: "Nuestro Imperio no podrá hacerse si los mismos elementos que buscan derribarlo coexisten con nosotros: agitadores socialistas, falsos conservadores y liberales traidores. Estas personas socavan nuestra autoridad, alegando que es \"para el bien de Alemania\", aunque somos nosotros y el káiser quienes sabemos qué es lo mejor para nuestro pueblo.\n\nSe ampliarán los poderes policiales, se dará mayor libertad a los oficiales militares leales y se recortarán temporalmente las libertades civiles en nombre de la estabilidad. Se elaborarán listas negras, se acelerarán los juicios y se aplastarán los movimientos clandestinos. Esta purga, aunque controvertida, es necesaria para garantizar la firmeza de nuestro Imperio. También servirá de advertencia: la nueva Alemania no se dejará encadenar por los débiles ideales de Weimar. Solo a través del fuego podrá renacer nuestra nación."
 GER_restore_imperial_laws: "Restaurar leyes imperiales"
 GER_restore_imperial_laws_desc: "Si hay un documento que verdaderamente define a la nación alemana, es el documento que erige la imagen del káiser. La Constitución de 1871 elevó a nuestro pueblo a nuevas alturas, y solo después de que el mundo entero se uniera contra nosotros, nos hundió. Si bien son necesarios algunos cambios para modernizar el marco, el espíritu del imperio de Bismarck revivirá en la legislación.\n\nSe restauran los títulos nobiliarios, se restablece el papel del káiser como jefe de Estado en los documentos oficiales y se reestructuran los ministerios para reflejar la precedencia imperial. Se asciende a los burócratas lealistas y el simbolismo monárquico regresa a las instituciones públicas. Estas reformas legales no solo reflejan nostalgia, sino que son un paso concreto hacia el desmantelamiento de las instituciones democráticas que han mantenido a nuestra nación en un rincón recóndito de los asuntos internacionales. Las élites tradicionales y los aliados conservadores nos ayudarán con gusto con estas leyes, a cambio de que ellos también se beneficien de ellas."
 GER_the_army_with_a_state: "Ejército con Estado"
 GER_the_army_with_a_state_desc: "Los mentirosos liberales nos han hecho creer que la forma correcta de funcionar es un estado con un ejército. En cambio, ahora forjamos un ejército que se convierte en la columna  del propio estado. La Reichswehr tendrá un papel más importante en la política interior y exterior, convirtiéndose en la guardiana de la restauración imperial. Oficiales militares con inclinaciones monárquicas serán nombrados para puestos civiles clave, mientras que el ejército se reorganizará según criterios imperiales.\n\nLa lealtad al káiser se convierte en un requisito para ascender. En la práctica, esto crea un estado pretoriano, donde el ejército garantiza el orden interno, reprime la disidencia y prepara a la nación para su renovado papel en el escenario mundial. La disciplina y la eficiencia sustituyen al debate y al compromiso. Por supuesto, habrá oposición a esta visión, pero nuestro pueblo la exige, y no podemos negarle su rabia."
 GER_power_to_the_regency: "Poder a la regencia"
 GER_power_to_the_regency_desc: "Solo hasta que el káiser regrese al trono, se pondrá en marcha un consejo de regencia que guiará a la nación alemana con autoridad casi absoluta. El consejo tendrá plenos poderes sobre las tres ramas del poder. Compuesto por nobles de confianza, generales y políticos leales, la regencia comenzará a implementar reformas y a emitir decretos con legitimidad imperial.\n\nEsto también puede considerarse un compromiso calculado. Aún no es una monarquía plena, pero tampoco una república."
 GER_exert_influence_over_our_allies: "Influenciar nuestros aliados"
 GER_exert_influence_over_our_allies_desc: "Nuestros aliados en toda Europa no actúan con los mismos intereses que los nuestros. Sin embargo, a diferencia del pasado, no nos mueve a invadirlos. Mediante la presión diplomática, los acuerdos comerciales, el intercambio de inteligencia y la subversión sutil, ampliamos nuestra esfera de influencia en toda Europa.\n\nLos países que ya funcionan bajo tradiciones monárquicas serán cortejados. Somos los defensores de este nuevo orden europeo; sin embargo, aún no debemos conformarnos. Solo hasta que nuestros aliados puedan ser considerados como tales podremos considerar nuestra posición global como suprema."
 GER_1918_undone: "1918 deshecho"
 GER_1918_undone_desc: "Todo nuestro camino, nuestros planes para revertir la historia, finalmente pueden declararse completados. La vergüenza de 1918, la abdicación del trono, el despiadado tratado de Versalles. Todo ha sido vengado. Con el káiser de vuelta en el trono, no solo se han corregido los errores del pasado, sino que se han borrado.\n\nDesfiles llenan las calles de nuestras ciudades mientras el rojo, blanco y negro ondea de nuevo sobre Berlín. Ahora, nuestra monarquía no ha sido olvidada ni es simbólica, sino suprema. Por diplomacia y por sangre, volvemos a ser una gran potencia. Sean fáciles o difíciles las pruebas que se avecinan para nuestra nación, una cosa está clara: el imperio ha regresado, y 1918 ya no es un final trágico, sino un simple contratiempo en la eterna marcha de la grandeza alemana."
 GER_cameralism_in_21st_century: "Cameralismo del siglo XXI"
 GER_cameralism_in_21st_century_desc: ""
 GER_centralize_the_economy: "Centralizar la economía"
 GER_centralize_the_economy_desc: ""
 GER_to_crown_a_king: "Coronar un rey"
 GER_to_crown_a_king_desc: ""
 GER_guns_of_the_future: "Armas del futuro"
 GER_guns_of_the_future_desc: "Si queremos ganar nuestras guerras contra nuestros enemigos, debemos priorizar la calidad sobre la cantidad. Más específicamente, debemos mirar hacia el futuro. Las guerras han evolucionado, al igual que el equipo que los hombres utilizan para librarlas. Algunos de estos equipos ni siquiera requieren hombres para combatir. Llevaremos estas tecnologías al extremo y nos aseguraremos de que ningún enemigo en este planeta tenga jamás una ventaja táctica sobre nuestros arsenales.\n\nArmas de fuego inteligentes, armas de IA, exoesqueletos, armas de energía directa, sistemas de defensa espacial, cañones de riel electromagnéticos, misiles hipersónicos, todo esto y más, será la máxima prioridad de nuestros científicos. Solo así podremos asegurar nuestra ventaja sobre nuestros enemigos. No importa cuántas armas usen contra nosotros, bastará con unas pocas de las nuestras para hacerlos retroceder a los Urales."
 GER_unconventional_weapons: "Armas no ortodoxas"
 GER_unconventional_weapons_desc: "La moral humana siempre ha sido un desafío al que nuestro pueblo se ha enfrentado y al que ha sucumbido en múltiples ocasiones. Uno de ellos fue la firma de la Convención de Ginebra, que declaraba qué armas no eran aptas para su uso y debían clasificarse como \"crímenes de guerra\" cuando se denunciara su uso. ¡Estas debilidades han frenado a nuestro pueblo durante años! La guerra no es agradable, así que es un error dividir las armas de guerra de las más atractivas a las menos atractivas. En una batalla, no te preocupa qué técnicas podrían dañar menos a la persona, ¡te preocupa no morir, carajo!\n\nEn secreto, desarrollaremos estas armas. Lenta pero seguramente, aprovechando la influencia de Ginebra sobre nuestros arsenales y la mente de los soldados. Para ganar una guerra, debemos abandonar nuestra moral, nuestros principios básicos sobre la vida y la muerte. Solo entonces triunfaremos sobre el enemigo cegado por los globalistas y su creencia en la \"paz\". Pongámoslos en su lugar."
 GER_aggressive_rearmament: "Rearme agresivo"
 GER_aggressive_rearmament_desc: "Todos nuestros esfuerzos girarán ahora en torno a un único propósito: construir un arsenal inimaginablemente vasto de armamento moderno para garantizar la seguridad de nuestra nación. Las plantas de municiones, las fábricas de tanques y los talleres de armas operarán las 24 horas, los siete días de la semana, sin que les afecten los días festivos, los contratiempos; ni siquiera las bombas enemigas, si llegara el caso."
 GER_soldiers_of_the_future: "Soldados del futuro"
 GER_soldiers_of_the_future_desc: "Abrazar el futuro implica muchas cosas. Debemos cambiar nuestras tácticas, nuestras tecnologías, pero posiblemente lo más importante que debemos cambiar es nuestra mentalidad. Nuestro espíritu de victoria. Nuestro espíritu de derramar sangre en nombre de nuestra patria. Esta mentalidad debe revivir. No solo eso, sino que debe adaptarse a nuestra nueva forma de vida. Nuestra forma de luchar. Nuestra forma de hacer la guerra. Nuestra convicción de que el más fuerte sobrevivirá. Esto se reflejará en nuestros soldados.\n\nDeben ser implacables en sus ataques, leales en sus creencias y unidos a sus tecnologías. Nuestros enemigos los verán, no como rivales, ni mucho menos como humanos, sino como robots. Desprovistas de toda expresión y con sed de venganza. Devolveremos este gesto mirando a nuestros enemigos con tal desconfianza que algunos de los nuestros dudarán de su humanidad.\n\nEstos soldados nos harán ganar nuestras guerras."
 GER_air_innovations: "Innovaciones aéreas"
 GER_air_innovations_desc: "La tecnología moderna ha transformado considerablemente la forma en que se libran las guerras aéreas. La tecnología informática avanzada, los recubrimientos furtivos e incluso la integración de la inteligencia artificial están transformando la aviación a un ritmo inimaginable. Ahora es el momento de que nuestra fuerza aérea abrace los vientos del cambio. Adaptaremos de inmediato todas estas nuevas tecnologías y crearemos instituciones y mecanismos para impulsar nuevas innovaciones. Nuestros cazas surcarán los cielos con la tecnología más avanzada y contarán con mentes brillantes, listas para mantenernos a la vanguardia, sin importar lo que el enemigo nos lance."
 GER_deutschland_erwacht: "Deutschland Erwacht"
 GER_deutschland_erwacht_desc: "Alemania fue una nación distinguida, y lo más importante, una nación con carácter. Ahora, ese carácter se ha roto, sus dientes han sido destrozados por un golpe poderoso y su orgullo se ha perdido en el viento. La espada de nuestro país, nuestro ejército, se ha dejado oxidar, mientras que la savia de nuestra nación, nuestro pueblo, fue abandonada en la desesperación por los globalistas traidores. En tiempos como estos, uno solo puede recordar los días dorados, las épocas en las que nuestra nación tuvo el coraje de defenderse y luchar por su lugar legítimo en el escenario mundial.\n\nDesde nuestra derrota en 1945 y la división de nuestra patria, nuestro espíritu ha quedado destrozado y los fantasmas de las derrotas pasadas siguen atormentando nuestra psique nacional. Pero hoy, la nación alemana finalmente despertará de su largo letargo. Como un águila en vuelo, se elevará una vez más, dejando de lado todas las amenazas a su pueblo. A partir de este momento, Alemania y su pueblo vuelven a estar unidos y marchan juntos hacia la victoria."
 GER_our_noble_cause: "Nuestra noble causa"
 GER_our_noble_cause_desc: "El espectro del comunismo ensombrece a Europa con una sombra oscura y roja. Se creía que los soviéticos estaban condenados al infierno, y ellos, de nuevo, pensaban lo mismo de nosotros. La historia se repite una vez más. No hay aliados que distraigan nuestra atención, no hay insensatos que traicionen nuestra noble causa. ¡Desde 1936 hemos dedicado nuestros recursos a la aniquilación total de la plaga bolchevique! ¡Y hoy debemos cargar de nuevo con esta carga!\n\nAsí como Leningrado se alza de nuevo, como Stalingrado se alza de nuevo, ¡tenemos una oportunidad más para corregir los errores de nuestros antepasados! ¡Una oportunidad más para liberar al mundo de la horda bolchevique! ¡Una oportunidad más para asegurar el futuro de la raza alemana! ¡Nuestra causa es noble! ¡Es sagrada! ¡Es por el alma misma de todas las naciones!\n\nLlevar esta antorcha es un honor. ¿Quemar a los rojos con ella? Un placer."
 GER_reenter_bavaria: "Reentrar a Baviera"
 GER_reenter_bavaria_desc: "Los locos de Baviera han realizado un intento atroz de declarar su independencia y separarse de Alemania, incluso buscando el apoyo de Austria. No podemos permitir que permanezcan en el poder por más tiempo, porque si dudamos, podrían construir una gran base de apoyo y envenenar la mente de nuestro país, lo que a la larga conduciría a nuestra caída."
 GER_radacalize_the_masses: "Radicalizar a las masas"
 GER_radacalize_the_masses_desc: "Desde 1945, nuestro pueblo ha abrazado una cultura pacifista y ha rechazado en gran medida la idea de una Gran Alemania. Los tiempos han cambiado, nuestra nación se encuentra en una situación desesperada y muchos alemanes, sintiéndose abandonados por el Gobierno anterior, han recurrido a nosotros. Debemos aprovechar una oportunidad como esta para aumentar nuestro apoyo y consolidar aún más nuestra posición."
 GER_eternal_alliance: "Forrar una alianza eterna"
 GER_eternal_alliance_desc: "Para muchos es evidente que no podemos derrotar a los soviéticos solos. A medida que Europa Occidental se liberaba de los burócratas corruptos, muchos Gobiernos nacionalistas emergieron de sus conflictos, lo que abre una ventana de oportunidad: la formación de una alianza contra la Amenaza Roja para finalmente sofocarla de una vez por todas."
 GER_assist_our_greek_brothers: "Asistir a los griegos"
 GER_assist_our_greek_brothers_desc: "Los griegos fueron una de las naciones que no se salvaron del violento derramamiento de sangre tras el fin de la Guerra Europea. Dos facciones importantes se alzaron para tomar el poder, y una de ellas, Amanecer Dorado, ha estado buscando recientemente vínculos con nosotros. Amanecer Dorado, al igual que nosotros, fue silenciado y oprimido por los burócratas de Atenas durante décadas, y ahora finalmente tiene la oportunidad de derrocar a los corruptos títeres en el poder.\n\nGrecia será un gran aliado potencial, ya que abre otro frente contra los soviéticos, uno que podemos aprovechar para aplastarlos."
 GER_fall_orange: "§YFALL§!: ORANGE"
 GER_fall_orange_desc: "La región de los Países Bajos fue una de las que no se salvó del violento derramamiento de sangre tras el fin de la Guerra Europea.\n\nHan surgido algunas facciones notables, una de ellas la facción pan-socialista de la Unión de los Países Bajos, que busca reunificar la región bajo una sola bandera. Si lograran su objetivo, representaría un grave peligro para nuestra seguridad y retaguardia, ya que los soviéticos utilizarían la región para abrir un frente en Alemania.\n\nPor lo tanto, debemos tomar la decisión de intervenir en el Benelux y establecer nuestro control allí, impidiendo el auge del comunismo en nuestro propio territorio"
 GER_support_nationalists: "Apoyar a nacionalistas europeos"
 GER_support_nationalists_desc: "Desde el final de la Guerra Europea, muchos países se sumieron en la inestabilidad y gobiernos nacionalistas tomaron el poder. Muchos de estos Estados se encuentran en una situación desesperada y son vulnerables a la amenaza roja en Oriente. Por lo tanto, debemos acercarnos a ellos y ofrecerles una alianza para fortalecer nuestra creciente coalición."
 GER_recruit_foreign_legions: "Permitir reclutar legiones"
 GER_recruit_foreign_legions_desc: "En diversas plataformas de redes sociales, un número creciente de voluntarios entusiastas de varias naciones europeas ha expresado su disposición a contribuir a la defensa y el desarrollo de nuestra gran nación. Este aumento en el apoyo extranjero representa una valiosa oportunidad que no debe desaprovecharse. Estos voluntarios podrían integrarse rápidamente en nuestra fuerza laboral nacional, contribuyendo al fortalecimiento de nuestra base industrial, o ser asignados a las filas inferiores de nuestras fuerzas armadas, donde podrían desempeñar funciones auxiliares y logísticas esenciales."
 GER_fall_kolettis: "§YFALL§!: KOLETTIES"
 GER_fall_kolettis_desc: ""
 GER_revive_the_economy: "Revivir la economía"
 GER_revive_the_economy_desc: "Mientras los comunistas celebran su victoria con indulgencia y ociosidad, responderemos a nuestra derrota con una ola de militarización que el mundo aún no ha presenciado. Todos los alemanes en edad de trabajar, junto con los inmigrantes que recibían ayuda social y que antaño agotaron nuestro sistema, se pondrán a trabajar en la construcción de una nueva Alemania. Desde hombres hasta mujeres, desde jóvenes hasta ancianos, nadie se quedará al margen. Nuestras fábricas arderán con más intensidad que nunca, y para cuando el humo se eleve sobre nuestras ciudades de acero, nuestros enemigos se darán cuenta de que la guerra está lejos de termina."
 GER_drop_the_euro: "Dejar el euro"
 GER_drop_the_euro_desc: "La moneda única europea: el euro. ¡Qué utópica parecía antes! Todas las naciones del continente colaborando, luchando por un milagro económico sin precedentes. ¿Y qué resultó de ello? Nuestras inversiones en el crecimiento de Oriente ahora sirven a nuestros enemigos, mientras nuestros vecinos occidentales pierden el tiempo en quién sabe qué, aparentemente indiferentes a una palabrita como \"unidad\". ¡Ya basta! Recuperaremos nuestra soberanía perdida hace tiempo, empezando por el orgulloso regreso del Deutsche Mark."
 GER_spirit_of_clauswitz: "Espíritu de Clausewitz"
 GER_spirit_of_clauswitz_desc: "Si bien ha habido muchas tácticas en nuestra historia militar, ninguna se acerca a la genialidad de Clausewitz. Fueron sus tácticas las que lograron salvar a Prusia del cautiverio de Napoleón, y son sus tácticas las que ahora nos salvarán de los sóviets.\n\nAdaptaremos sus teorías sobre la niebla de la guerra y la importancia de la fuerza moral para garantizar que la voluntad de lucha de nuestros soldados nunca cese. Su filosofía debe enseñarse a todos nuestros líderes militares para asegurar comandantes y oficiales valientes y adaptables.\n\nPor supuesto, no adoptaremos sus tácticas por completo, sino que simplemente las adaptaremos a las realidades tecnológicas modernas del frente. Puede que sea difícil de desarrollar, pero una vez que lo hagamos, nuestras estrategias y teorías harán que nuestros enemigos regresen corriendo a los Urales."
 GER_spirit_of_bruchmuller: "Espiritu de Bruchmüller"
 GER_spirit_of_bruchmuller_desc: "Si hubiera una palabra para describir nuestras estrategias militares durante gran parte del siglo XIX y principios del XX, sería: \"¡HAUBITZE!\". Nuestra superior potencia de fuego fue la que nos permitió ganar muchas guerras y batallas contra daneses, franceses y otros miembros de la pérfida Entente. Por supuesto, nuestra artillería es desconocida, pero si tuviéramos que agradecerle a alguien estas tácticas, ese sería Bruchmüller.\n\nRevolucionó los métodos de artillería utilizados durante la Primera Guerra Mundial. Fue su genio el que transformó la artillería de usos largos y predecibles a métodos cortos, bien planificados y altamente concentrados. Estas teorías lograron grandes victorias en ambos frentes e incluso influyeron en las futuras tácticas de la Blitzkrieg.\n\nPor lo tanto, es natural que nos centremos en la producción de misiles y su capacidad de fuego. Todo para garantizar que nuestras posiciones enemigas sean aniquiladas en ataques cortos, coordinados y de precisión que neutralicen su capacidad de defensa."
 GER_spirit_of_rommel: "Espíritu de Rommel"
 GER_spirit_of_rommel_desc: "Sin duda, si hay una táctica militar que ha definido nuestra brillantez durante décadas después de la guerra, es la Blitzkrieg. Es nuestro enfoque en maniobras rápidas, agresivas y flexibles para flanquear a nuestro enemigo y dominar sus fuerzas sin mucho combate, lo que nos ha llevado a un dominio innegable sobre el continente europeo y a la capitulación casi total de los británicos en Egipto y los soviéticos en el este.\n\nSin embargo, debido principalmente a cierta incompetencia de nuestros aliados y nuestra, ha llevado a nuestra capitulación ante los Aliados y a la consiguiente humillación. Esta vez, aprenderemos de nuestros errores pasados y nos aseguraremos de que esta segunda oportunidad sea un éxito.\n\nGracias al Zorro del Desierto y a su ingenio que condujo a la casi capitulación del norte de África británico, seguiremos su ejemplo. Dominaremos las artes de las tácticas de armas combinadas, así como la iniciativa y la improvisación para asegurarnos de que nuestros enemigos nunca vuelvan a triunfar sobre nosotros."
 GER_panzerpioneers: "Panzerpioneers"
 GER_fall_rache: "§YFALL§!: RACHE"
 GER_fall_rache_desc: "Ha llegado el momento para el que nos hemos preparado durante años. Durante demasiado tiempo hemos retenido nuestro odio, conteniéndolo, pero acostumbrándolo lentamente con el paso de los años. Ahora es el momento de dejar que nuestro odio domine las fuerzas enemigas. Ha llegado la hora de la venganza. Venganza por un futuro europeo. Un futuro libre del comunismo y la globalización. Un futuro de alivio y soberanía.\n\nEs hora de pagar con sangre por todo el daño que los rojos han causado a los otrora poderosos pueblos de Europa Oriental. Ahora, sometidos a la yugo de un cobarde. Ya no. Nuestra venganza recaerá sobre Moscú, y nuestro odio alimentará nuestro fuego."
 GER_unternehmen_michael: "§YUNTERNEHMEN§!: MICHAEL"
 GER_unternehmen_michael_desc: "Si primero queremos desatar nuestra venganza contra los soviéticos, debemos alcanzarlos una vez que hayamos derrotado a su Gobierno títere. Los polacos han sufrido interminablemente bajo el peso de la bota rusa. Ahora, con suerte, las mareas de la libertad podrían iluminar el camino para su pueblo.\n\nSin embargo, no será fácil. Las tierras que nos arrebataron la Entente y los Aliados nos serán devueltas y germanizadas rápidamente después de la guerra. En cuanto a las tierras polacas, eso se decidirá después de la guerra. Mientras tanto, tenemos algunas ciudades que bombardear."
 GER_fall_johan: "§YFALL§!: JOHAN"
 GER_fall_johan_desc: "Si bien los países nórdicos se salvaron de la devastación que azotó Europa Occidental, sus economías están en ruinas. Aunque escasamente pobladas, estas tierras poseen un inmenso valor estratégico. Suecia nos ofrece una plataforma vital para desembarcos anfibios en el Báltico, mientras que Noruega proporciona un frente norte cerca de Múrmansk, un punto clave desde el cual presionar las defensas soviéticas. Debemos actuar con rapidez; si no tomamos iniciativas para proteger a los países nórdicos ahora, podrían caer bajo la jurisdicción soviética."
 GER_strong_arm_the_north: "Obligar al norte"
 GER_strong_arm_the_north_desc: ""
 GER_the_final_option: "La solución final"
 GER_the_final_option_desc: "Todo lo que hemos hecho ha fracasado. Le fallamos a Alemania, le fallamos a Europa, le fallamos al pueblo. No hay nada que nos salve de este desastre. Solo nos queda §Rarrastrarlos con nosotros...§!"
 GER_bitter_lessons_from_nato_war: "Lecciones amargas de la Guerra"
 GER_bitter_lessons_from_nato_war_desc: "La pérdida es algo que deseamos evitar enseñar a nuestros hijos. Cómo nuestra propia ceguera nos llevó a la ruina y al saqueo a manos de los despiadados eslavos. Pero aunque nos duela, debemos mirar al pasado si no queremos repetir los mismos errores. Los fracasos de la administración anterior al afrontar las realidades de la guerra. Estaban demasiado ocupados con su moral y burocracia como para pensar siquiera en los soldados que impedían que los nómadas bolcheviques se apoderaran de nuestras tierras vírgenes.\n\nExaminemos sus errores, analicémoslos, observemos qué podrían haber hecho mejor y actuémoslo nosotros mismos. Representamos al pueblo europeo mejor que cualquier gobierno. Comprendemos su dolor y deseamos asegurarnos de que no vuelva a ocurrir. Al menos con nosotros."
 GER_armor_innovations: "Innovaciones blindadas"
 GER_armor_innovations_desc: "Nuestros tanques siempre han sido la clave de nuestro éxito en el campo de batalla. Lo fueron durante la Segunda Guerra Mundial y la Guerra Europea. Ahora, también servirán a nuestros propósitos. Para lograrlo, invertiremos grandes cantidades en todos los científicos y empresas que trabajan en la producción y el desarrollo de estos vehículos. Haremos todo lo posible para asegurarnos de que rechacen a nuestros enemigos antes de que puedan decir: \"¡Proletarios del mundo, uníos!\""
 GER_strategic_destruction: "Destrucción estratégica"
 GER_strategic_destruction_desc: "Si bien es importante destruir a los combatientes y los recursos militares enemigos, debemos comprender que la guerra es mucho más que eso. Hay muchos factores que ocurren fuera del frente que la hacen posible. Sabiendo esto, debemos atacar no solo a sus tropas en el frente, sino también a todo aquello que las apoya en la retaguardia. Sus soldados necesitan alimentos de las granjas, armas de las fábricas, pedidos de las instituciones y mucho más. Nuestra fuerza aérea se centrará en atacar todo esto y todo lo que hace funcionar su esfuerzo bélico, y en última instancia, su sociedad. Todo, desde sus fábricas hasta sus centrales eléctricas y su infraestructura de mando y control, será destruido. Sus ejércitos morirán de hambre rápidamente y se detendrán cuando destruyamos todo lo que los sustenta."
 GER_blot_out_the_skies: "Borrar el cielo"
 GER_blot_out_the_skies_desc: "La guerra aérea moderna será un campo de batalla donde no se toman prisioneros ni se muestra perdón. Nuestra doctrina aérea debe reflejar esta realidad. Nuestra Luftwaffe buscará saturar el cielo y se centrará en la destrucción directa de los recursos aéreos enemigos. Sin embargo, no debemos limitarnos a atacar solo cazas o bombarderos tácticos. Debemos destruir cualquier cosa que pertenezca al enemigo, sea lo que sea. Ya sea un avión de carga, uno civil, o un sofisticado caza de última generación, todo forma parte de la maquinaria bélica enemiga y será aniquilado. Todo será muy sencillo para nuestros pilotos: un objetivo es un objetivo, sin importar su forma, tamaño, designación o quién esté a bordo."
 GER_restructure_air_doctrine: "Reestructurar la doctrina aérea"
 GER_restructure_air_doctrine_desc: "Mucho ha cambiado en la guerra aérea desde la última vez que actualizamos nuestras doctrinas. Nuevas tecnologías, nuevas tácticas y formas de pensar completamente nuevas se han convertido en la norma, una norma que hemos estado rezagadas. Sin embargo, ahora es el momento de que Alemania vuelva a estar a la altura. Revisaremos nuestras doctrinas, aplicaremos las lecciones aprendidas en conflictos recientes y capacitaremos a nuestros oficiales en los últimos avances. Puede que esto moleste a algunos miembros de la vieja guardia de la Fuerza Aérea, pero será más que necesario. Pronto nuestra fuerza aérea será líder tanto en la teoría como en la práctica."
 GER_restore_luftwaffe_pride: "Restaurar el orgullo de la Luftwaffe"
 GER_restore_luftwaffe_pride_desc: "La Luftwaffe fue en su día la fuerza aérea más temida de Europa, y con razón. Durante la primera mitad de la Segunda Guerra Mundial, nuestros talentosos pilotos y potentes aeronaves arrollaron a un enemigo tras otro, humillando a potencias que antes se consideraban intocables. Este es un legado que debemos resucitar con pasión. Los símbolos, las victorias, la cultura y los recuerdos de los héroes del pasado se enseñarán y venerarán en cada base aérea y con cada piloto. Los enemigos de Alemania pronto se estremecerán de miedo al ver la Cruz de los Balcanes sobrevolarlos una vez más."
 GER_solidify_control: "Solidificar control"
 GER_solidify_control_desc: "Aunque ocupemos los puestos de poder en este país, traidores y otras alimañas aún infestan cada rincón de nuestra nación. Sin embargo, no nos quedaremos de brazos cruzados y permitiremos que conspiren contra nosotros. Estos agitadores y enemigos serán encontrados y aniquilados. Encontraremos a todos los conspiradores, destaparemos todas las redes y desmantelaremos cualquier oposición que se atreva a desafiar nuestro legítimo gobierno. Al igual que el temido SD del Tercer Reich, desataremos sobre todos estos traidores un terror silencioso pero veloz que los hará huir a las sombras."
 GER_triumph_of_will: "El triunfo de la voluntad"
 GER_triumph_of_will_desc: ""
 GER_propagandize_our_success: "Propagandizar nuestro éxito"
 GER_propagandize_our_success_desc: "Como hicieron los nacionalsocialistas antes que nosotros, obligaremos a nuestros comentaristas a informar las 24 horas del día sobre el esfuerzo bélico. Claro que no podemos permitir que digan toda la verdad. Los obligaremos a hablar de los interminables informes de victoria que surgen del frente. Y cada vez que nos veamos obligados a retroceder, hablaremos de la valentía de estos hombres que dieron su vida en defensa de su nación de las hordas soviéticas.\n\nAl fin y al cabo, no importa si estamos aniquilando a los comunistas en el frente. Si nuestro pueblo no detiene los disturbios en las calles, no habrá paz. La estabilidad de nuestra nación es esencial para nuestra victoria. Puede que sea más costosa a largo plazo, pero existen medidas para tiempos de guerra. Acéptenlas."
 GER_unternehmen_prag: "§YUNTERNEHMEN§!: HUS"
 GER_unternehmen_prag_desc: "Si hay un hombre al que culpar de la existencia de la nación checa, ese hombre es Jan Hus. Fue su visión de una Bohemia fuerte, libre de la influencia alemana, lo que alimentó una identidad bohemia, una identidad firmemente contraria a nuestros intereses. De no haber sido por este hombre, quizás los checos podrían estar disfrutando de una vida de paz y libertad junto a sus hermanos alemanes.\n\nPor lo tanto, debemos actuar con rapidez si queremos borrar esta mancha del mapa de Europa. Aseguraremos sus centros de población y aniquilaremos cualquier signo de identidad cultural checa. Esto no solo nos ayudará a flanquear a los polacos desde el sur, sino que también beneficiará a sus pueblos una vez que se integren a la sociedad alemana."
 GER_suffocate_russia: "Explotación sistémica"
 GER_suffocate_russia_desc: "En tiempos de guerra, todos estamos desesperados. Son tiempos desesperados. Si queremos ganar esta guerra, tendremos que tomar medidas desesperadas. El problema es que algunas de estas medidas podrían ser consideradas \"inhumanas\" por la comunidad internacional. Pero ¿qué nos importa? O las seguimos, o nos arriesgamos a caer bajo el yugo soviético.\n\nPor lo tanto, todos los pueblos capturados serán sometidos a trabajos forzados. Ningún hombre, mujer o niño que no pueda trabajar disfrutará del consuelo de la debilidad. Trabajarán por el bien de la patria y de sí mismos. Después de todo, el trabajo libera."
 GER_establish_russian_liberation_army: "Restaurar el ROA"
 GER_establish_russian_liberation_army_desc: "Rusia es un vasto país con muchos pueblos extraordinarios. Lamentablemente, estos grandes pueblos son una minoría en el conjunto de Rusia. Esto permitió que brigadas colaboracionistas de tropas rusas disidentes lucharan junto a nosotros durante la Segunda Guerra Mundial, bajo la bandera del Ejército de Liberación Ruso. Debemos repetir estos actos hoy.\n\nYa había muchos disidentes rusos incluso cuando Rusia aún estaba bajo su dominio oligárquico. Ahora que han regresado al bolchevismo, estas cifras han aumentado drásticamente. Formaremos brigadas especiales para estos soldados y les daremos una verdadera razón para luchar y morir. No por el comunismo, sino por su patria."
 GER_nullify_our_debts: "Anular la deuda"
 GER_nullify_our_debts_desc: "América está en ruinas, Asia oscila entre conflictos fríos y calientes cada pocos años, y Rusia no es más que una bestia salvaje que pronto será sometida. ¿Y en medio de este caos, se espera que los trabajadores alemanes les paguen tributo? Ya no estaremos atados por las cadenas económicas forjadas por nuestros predecesores, y ciertamente no desperdiciaremos ni un solo marco para pagar deudas que solo terminarían en las arcas de regímenes fallidos y nuestros enemigos declarados."
 GER_regulate_inflation_rates: "Regular tasas de inflación"
 GER_regulate_inflation_rates_desc: "Preferiríamos evitar interferir en los delicados mecanismos de la oferta y la demanda, sobre todo considerando la magnitud de nuestra producción nacional. Pero ¿podemos realmente arriesgarnos a volver a la hiperinflación que vimos tras la Primera Guerra Mundial? Por supuesto que no. Actuaremos como un ojo que todo lo ve sobre la economía, supervisando, limitando o incluso fomentando la producción y el consumo de recursos clave. Y si eso implica contratar a unos cuantos miles de burócratas más... que así sea."
 GER_autarky_initiative: "Mantener independencia económica"
 GER_autarky_initiative_desc: "Basta con observar adónde nos ha llevado la globalización moderna. En un abrir y cerrar de ojos, las instituciones internacionales colapsaron y las naciones dejaron de existir; empezaron a sobrevivir. Incluso la Unión Europea, en la que se había invertido tanto esfuerzo y energía, se derrumbó como un castillo de naipes. No permitiremos que esto vuelva a suceder. Sí, aún podemos importar algunos recursos escasos cuando los necesitemos, pero esta vez reestructuraremos nuestra economía para que, incluso si el mundo que nos rodea se desmorona, Alemania siga siendo un faro de estabilidad. ¿Y sus trabajadores y soldados? Alimentados. Abastecidos. Inquebrantables."
 GER_defend_the_industry: "Defender la industria"
 GER_defend_the_industry_desc: "Los cambios radicales en nuestra estructura económica provocarán inevitablemente una reacción, y pronto nuestras industrias militares podrían convertirse en blanco de ataques, no solo de saboteadores nacionales, sino también de rivales geopolíticos extranjeros. Debemos tomar medidas decisivas para proteger estos activos, tanto física como públicamente. Se ampliarán las fuerzas de seguridad, se incrementará la vigilancia y se lanzará una campaña de propaganda exhaustiva para recordar a todos los ciudadanos que estas fábricas son el motor de la supervivencia de nuestra nación."
 GER_economy_fueld_by_war: "Una economía para la guerra"
 GER_economy_fueld_by_war_desc: "Finalmente nos hemos deshecho de todo lo que una vez limitó nuestro potencial. Sin embargo, por vergonzoso que sea admitirlo, los recursos de nuestra nación siguen siendo limitados. A pesar de las fuertes inversiones, nuestras fábricas aún enfrentan una grave escasez de metal, y nuestros generales no se atreven a calcular cuánto combustible consumirán nuestras nuevas divisiones blindadas. Por eso, la guerra ya no es una carga, sino el motor del progreso. Cada hectárea de tierra, cada granja, fábrica y mina bajo nuestro control revitalizará nuestra economía, ¡porque la guerra es el motor de nuestro futuro!"
 GER_der_brand: "DER BRAND"
 GER_der_brand_desc: "Fuego. Este estado de combustión ha obrado maravillas para la humanidad. En unos pocos millones de años, desde que lo dominamos, estamos aquí. Capaces de enviar hombres a otros cuerpos celestes, todo gracias al fuego que arde junto a ellos. Sin embargo, en lugar de esta realidad, estamos aquí. Ahora se pueden ver incendios por todo nuestro Pacto; mientras nuestras ciudades arden, también lo hacen nuestros espíritus.\n\nSin embargo, no todo está perdido. El fuego que arde en nuestro interior aún podría usarse para alimentar nuestra maquinaria. Solo debemos tomar medidas drásticas. Serán dolorosas, pero cualquier cosa para asegurar que nuestra nación no vuelva a caer ante fuerzas saqueadoras."
 GER_drive_them_back: "Expulsarlos"
 GER_drive_them_back_desc: ""
 GER_hunker_down: "Atrincherarnos"
 GER_hunker_down_desc: "Si queremos derrotar a nuestro enemigo numéricamente superior, tendremos que tomar nota de las acciones tomadas en ocasiones similares. También debemos concentrar nuestras fuerzas en múltiples posiciones a lo largo de nuestro Estado. Y cuando crean que están lejos de nuestros soldados, entonces abandonaremos nuestras posiciones y aniquilaremos a los rojos confundidos.\n\nSon tácticas guerrilleras, pero han ganado guerras en el pasado, y esperamos no ser la excepción."
 GER_desperate_measures: "Medidas extremas"
 GER_desperate_measures_desc: "A grandes males, grandes remedios. Y para males como estos, son verdaderamente desesperados. Ya hemos actuado en el pasado, movilizando a toda nuestra población y economía para esta ocasión. Sin embargo, los informes desde el frente muestran que no es suficiente. Nunca es suficiente.\n\nMás gente a las fábricas. Cualquier humano con brazos sanos estará produciendo munición las 24 horas del día, los 7 días de la semana. Esto nos costará muchísimo en el futuro, pero o sacrificamos a estas personas o lucharán por nada."
 GER_der_krieg: "DER KRIEG"
 GER_der_krieg_desc: "Guerra. Una palabra que ha estado presente en la mente del pueblo alemán durante más de una década. La guerra ha sido y será siempre nuestra prioridad mientras haya enemigos en nuestro estado. Creíamos que nuestra maquinaria bélica podría canalizarnos dulces victorias en todo nuestro frente. En cambio, parece que nuestra maquinaria se está desmoronando.\n\nLos soviéticos siguen presionando, incluso después de todas las tácticas que hemos intentado. En este caso, debemos llevar a nuestro pueblo hasta el límite. ¿Y si no lo hacen? Recuérdeles la guerra y cómo serán sus vidas bajo la bota bolchevique. Fallamos una vez, no lo haremos ahora."
 GER_defend_the_cities: "Defender las ciudades"
 GER_defend_the_cities_desc: "Los ataques aéreos soviéticos comienzan sobre nuestras ciudades. Claro que tenemos la voluntad de luchar, pero no servirá de nada ante una bomba. Por lo tanto, comenzaremos de inmediato a fortificar todas nuestras ciudades, tanto cercanas como lejanas al frente. Nuestra gente será evacuada cerca del frente y trasladada a la relativa seguridad del Ruhr.\n\nAllí, prepararemos nuestras ciudades para que se conviertan en fortalezas modernas. Todos los edificios serán reutilizados para nuestro personal militar. Esto probablemente dañará el significado cultural de estas tierras, pero debemos hacer sacrificios por el bien común de nuestro Reich."
 GER_every_man_to_the_front: "Cada hombre al frente"
 GER_every_man_to_the_front_desc: "El frente está hambriento, no solo de municiones, sino también de soldados que las administren. Millones de hombres viven desde la tranquilidad de sus hogares. Claro, trabajan arduamente para asegurar que nuestras reservas estén llenas, pero también tenemos problemas de personal.\n\nPor lo tanto, encontraremos a estos hombres, los enviaremos al frente, les daremos un arma y los obligaremos a atacar a los rojos. Claro que estos hombres no serán de mucha utilidad comparados con nuestros soldados profesionales, pero al menos estaremos enviando más tropas sobre el terreno, lo que significa que los soviéticos perderán más municiones."
 GER_service_everything: "Usar todo"
 GER_service_everything_desc: "Como alemanes, siempre hemos priorizado la calidad de nuestras fuerzas armadas sobre la cantidad. Sin embargo, en estos tiempos difíciles, todo es útil. No importa si el equipo que producen nuestros trabajadores no garantiza siempre su eficacia. No importa si los vehículos que fabricamos tienen mayor probabilidad de explotar que de moverse. Nuestros déficits de arsenales están alcanzando niveles peligrosos, así que debemos alimentarlos con lo que tenemos."
 GER_der_tod: "DER TOD"
 GER_der_tod_desc: "Muerte. La muerte es algo inevitable para toda la vida en este planeta. Te guste o no, tu tiempo en esta vida es limitado. Sin embargo, lo mismo puede decirse de nuestras naciones e ideas. Recuerda nuestra historia. Contra Napoleón, la Entente, los Aliados. En todos estos casos, Alemania ha muerto. Pero en todos, Alemania se recuperó, lista para luchar una vez más.\n\nEs muy posible que enfrentemos el siguiente capítulo de esta muerte. De ser así, eso significaría que la realidad de nuestra nación es ascender a la gloria y luego morir rápidamente en un incendio provocado por la comunidad internacional. Nunca debemos permitir que esta realidad se haga realidad."
 GER_the_old: "La vejez"
 GER_the_old_desc: "La vejez ya ha tenido su momento. Han tenido sus vidas, sus historias, sus aventuras, muchas de ellas dirigidas específicamente contra la repugnante naturaleza del comunismo. Son estos hombres los que usaremos en nuestro beneficio.\n\nLos viejos alimentarán nuestro fuego. Nos ayudarán a derrotar a los rojos en defensa de nuestra nación. Claro, muchos de ellos apenas pueden caminar por sí mismos. Sin embargo, aún conservan su espíritu, y en estos tiempos desesperados, basta con la voluntad de luchar."
 GER_the_young: "La juventud"
 GER_the_young_desc: "La juventud alemana. Tienen toda la vida por delante. Tienen sueños, tienen intereses, pero lo que deberían tener especialmente es el mismo odio ardiente contra el comunismo que nosotros.\n\nSon estas personas las que nos ayudarán a ganar la guerra. Todos los niños que veamos, algunos de ellos ya trabajando en nuestras fábricas, tomarán los rifles que fabricaron y serán enviados al frente. ¿A quién le importa si son demasiado perezosos o débiles para luchar? ¡Con el tiempo lo dominarán!"
 GER_the_weak: "Los débiles"
 GER_the_weak_desc: "Los débiles siempre han estado en nuestra mira durante años. Al fin y al cabo, ¿qué beneficio aportan al conjunto? Solo se quedan de brazos cruzados, recibiendo cheques del Gobierno y causándonos un gran problema. Por suerte, hemos encontrado la solución perfecta para este problema y una forma en que estas personas puedan realmente sustentar al estado.\n\nEso es, por supuesto, sus vidas. Les daremos rifles, los colocaremos en posiciones defensivas y les diremos que disparen a todo soldado que vean. Sencillo. No debería ser difícil meterles eso en la cabeza. ¡Hasta un ratón lo entendería, por Dios!"
 GER_new_european_crusade: "La nueva cruzada"
 GER_new_european_crusade_desc: "A lo largo de la historia, la agresión rusa solo ha traído dolor, muerte y destrucción a Europa. Hace más de 80 años, nuestros predecesores intentaron destruir la amenaza que una vez provino de Moscú. Aunque no lo lograron, la historia nos ha ofrecido una nueva oportunidad. Hoy nos enfrentamos a esa misma fuerza, una que se ha extendido por toda Europa, corrompiendo culturas, silenciando identidades y causando dolor y destrucción. Esto terminará hoy.\n\nUnidos por nuestra sangre, espíritu y propósito, marcharemos, no solo para vengar el pasado, sino para forjar un futuro donde Europa se mantenga soberana e intrépida ante cualquier fuerza que intente abatirla. Ha llegado el momento de atacar el corazón de la bestia, decapitarla y dejar que se pudra en la historia."
 GER_gun_for_every_hand_tank_for_every_battalion: "Un arma en cada mano"
 GER_gun_for_every_hand_tank_for_every_battalion_desc: "Uno de los principales fracasos de la antigua Bundeswehr residió en sus cadenas de producción. Tanques, fusiles y suministros vitales sufrieron retrasos constantes, resultado de la ineficiencia capitalista y la corrupción burocrática. Si queremos reconstruir el Ejército Alemán para que sea tan grande y poderoso como el de Hitler, debemos impulsar la producción al límite. Nuestras fábricas deben trabajar día y noche para producir un cañón por cada soldado y un tanque por cada batallón. Solo con una movilización total podremos sobrevivir a la tormenta que se avecina."
 GER_unleash_our_fury: "Desatar nuestra furia"
 GER_unleash_our_fury_desc: "Nuestro odio se ha mantenido durante demasiado tiempo. Incluso después de todo lo que hemos hecho para herir el espíritu soviético, no es suficiente. Nunca es suficiente. No hasta que podamos asegurarnos de que los pocos soldados soviéticos que quedan estén de rodillas, besándonos las botas y rogándonos que no los matemos. Lágrimas de cocodrilo por las vidas de millones de europeos que mueren de hambre por su culpa.\n\n¿Quiénes se creen que son? ¿Por quiénes creen que los tomamos? ¿Humanos? ¿De verdad merecen ese título? No. No lo permitiremos. Desatémonos con nuestra furia. Todo hombre asociado con el concepto de socialismo se enfrentará a la ira colectiva de todas las almas que ha atormentado. Y si existe el infierno, tendrán que pasar por nuestra propia versión antes de..."
 GER_europa_united: "Europa unida"
 GER_europa_united_desc: "Europa. Un continente de belleza. Un continente de riquezas. Un continente que antaño fue el amo indiscutible del mundo. Pero hace unos años, esa realidad se tambaleó. Sobre todo cuando los soviéticos volvieron a saquear las tierras de Europa Oriental.\n\nPero ahora, observemos nuestra realidad. Europa ya no está a la vuelta de la esquina. Europa ya no es débil. Ahora, estamos a las puertas de Moscú, dispuestos a hacer pagar a los soviéticos por todo lo que le han hecho a nuestro continente. Este es un asunto que afecta a toda Europa. Por lo tanto, finalmente podemos descansar sabiendo que Europa está unida y que lo seguirá estando mientras ella lo permita."
 GER_crush_the_resistance: "Aplastar la resistencia"
 GER_crush_the_resistance_desc: "Si deseamos consolidar nuestro control sobre los territorios capturados, debemos asegurarnos de que sus colaboradores y simpatizantes no se encuentren en las sombras. Ha comenzado una guerra de resistencia secreta, donde terroristas ocasionalmente salen de sus escondites para dañar nuestra infraestructura o bases. Quieren jugar, y nosotros también.\n\nPor cada soldado que maten, mataremos a múltiples civiles al azar a voluntad. Incluso podríamos recurrir a medidas drásticas como ataques con napalm y gas. Deberían haberlo pensado dos veces antes de bombardear nuestros edificios."
 GER_our_allies_abroad: "Aliados en el extranjero"
 GER_our_allies_abroad_desc: "Por supuesto, somos el principal motor de nuestro Pacto. Sin embargo, debemos reconocer los esfuerzos de nuestros aliados en toda Europa. Franceses, italianos, británicos, ibéricos, todos luchando por sus propias identidades, pero aun así luchando junto a nosotros. Aprovechemos esto.\n\nLa ayuda siempre viene bien. Y considerando nuestra difícil situación bélica, necesitamos desesperadamente todo tipo de suministros. Quizás podamos pedir prestadas algunas armas a nuestros queridos aliados. De esa manera, fortaleceremos tanto nuestras alianzas como nuestro esfuerzo bélico individual."
 GER_improve_logsitic_capabilities: "Mejorar capacidades logística"
 GER_improve_logsitic_capabilities_desc: "Logística. Esta palabra ha causado grandes problemas a Europa en el pasado. No solo cuando intentamos nuestro primer ataque contra los soviéticos durante la Segunda Guerra Mundial, sino también cuando Napoleón fracasó debido a la pesadilla logística en la que se ha convertido la gestión de esta guerra.\n\nPero ahora debemos aprender de nuestros errores. La logística debe ser una de nuestras principales prioridades. Ya sea gracias a una mejor infraestructura o a la gestión de la IA, nuestros suministros llegarán rápidamente para ayudar a nuestras fuerzas, que actualmente sufren hambre en Rusia."
 GER_fall_lazarevic: "§YFALL§!: LAZAREVIC"
 GER_fall_lazarevic_desc: "Polonia y Eslovaquia siguen sirviendo como baluarte defensivo de la Unión Soviética, bloqueando eficazmente cualquier intento de avance hacia el norte. Tampoco hemos llevado a cabo operaciones a través de Hungría debido a su estrecha zona de combate. Sin embargo, persiste un posible punto débil. En la ex-Yugoslavia, los soviéticos han establecido un régimen títere, con un poder militar considerablemente inferior al nuestro y además políticamente inestable. Aprovecharemos esta vulnerabilidad para iniciar un avance y, al mismo tiempo, establecer contactos con los grupos nacionalistas balcánicos, acelerando su colapso. Al avanzar a través de Eslovenia y Grecia hacia Bulgaria y el resto del país, desmantelaremos el Gobierno ilegítimo de Sofía y fracturaremos el control soviético sobre los Balcanes."
 GER_fall_bassenheim: "§YFALL§!: BASSENHEIM"
 GER_fall_bassenheim_desc: "La humanidad tiene un cáncer. Y ese cáncer es la Unión Soviética. Atrincherada en las tierras de Eurasia, se les ha permitido existir durante demasiado tiempo, dañando el espíritu humano con cada vida que eliminan. La única esperanza para esta tierra es que la civilicemos nosotros mismos. Como la Orden Teutónica antes que nosotros, difundiremos nuestra palabra a todos aquellos envenenados por los judeobolcheviques.\n\nQue esta sea nuestra última lucha. Que este sea nuestro último empujón. Entremos finalmente en la estructura soviética que se derrumba y veamos cómo se derrumba ante nosotros. Que el cáncer de la humanidad desaparezca de nuestras mentes. Vivamos en paz. Solo necesitamos un último empujón. Solo necesitamos la victoria."
 GER_tactical_domination: "Dominación táctica"
 GER_tactical_domination_desc: "No debemos engañarnos con teorías demasiado complejas ni otras doctrinas intrincadas. Nuestro objetivo principal es claro y directo: el enemigo debe ser destruido. Ningún otro concepto debe predominar. Conscientes de esto, nuestra fuerza aérea se centrará en destruir al enemigo en el campo de batalla y en atomizar su capacidad de organización y combate. Desde el apoyo aéreo cercano hasta el reconocimiento y la destrucción de valiosos recursos tácticos enemigos, nuestra fuerza aérea convertirá la vida de nuestros enemigos en un infierno. Sus soldados temblarán ante la idea de exponerse a los cielos que dominaremos."
 GER_return_to_gold_standard: "Volver al patrón oro"
 GER_return_to_gold_standard_desc: "Los Estados Unidos, que antaño fue la mayor potencia económica del planeta y se creyó inquebrantable durante décadas, se derrumbó en cuestión de semanas. Al final, ni los acuerdos petroleros, ni el ejército estadounidense, ni Wall Street pudieron salvar al dólar. No repetiremos su error. Nuestro pueblo debe tener plena confianza en el futuro y la libertad de entrar en cualquier banco y cambiar sus ahorros, ganados con tanto esfuerzo, por un metal precioso y sólido. Por fin, nuestra moneda tendrá un peso real y tangible, y con ella, restauraremos la serena dignidad de la verdadera estabilidad económica."
 GER_suspend_consumer_economy: "Suspender la economía de consumo"
 GER_suspend_consumer_economy_desc: "¿Cuán ciegos fueron nuestros antecesores al dejarse llevar por las efímeras tendencias de la moda económica estadounidense? En lugar de asegurar nuestras fronteras y abordar la flagrante escasez de armas en nuestro ejército, optaron por inundar el mercado con miles de millones de productos de consumo, tanto baratos como lujosos, que no hicieron más que inflar las cifras en las hojas de cálculo. De hoy en adelante, el ciudadano alemán recibirá solo lo verdaderamente esencial para la vida. La eficiencia y la necesidad reemplazarán la vanidad y el despilfarro."
 GER_exploit_conqured_nations: "Explotar naciones conquistadas"
 GER_exploit_conqured_nations_desc: ""
 GER_improve_logistic_capabilities: "Mejorar capacidades logística"
 GER_improve_logistic_capabilities_desc: ""
 GER_wartime_advancements: "Avances durante guerra"
 GER_wartime_advancements_desc: "La guerra no solo significa sacrificio y derramamiento de sangre, sino que también puede traer avances imprevistos en innovación, ya sea para el sector civil o para uso militar. Ya sea la Segunda o la Primera Guerra Mundial, las innumerables vidas perdidas se intercambiaron por avances tecnológicos antes inimaginables. Casi parece que cada guerra que libramos, cada gota de sangre que derramamos, impulsa la evolución de la especie humana. Sin duda, nuestra guerra contra los rusos será más mortífera que cualquier otra guerra jamás librada. Sin embargo, no debemos entristecernos, porque su sangre será el combustible que impulsará los engranajes de la historia humana."
 GER_prepare_thenation: "Preparar la nación"
 GER_prepare_thenation_desc: "Mientras el descontento y la tensión agitan el continente, nos damos cuenta de lo que pocos han considerado antes. La guerra se avecina, y el pueblo alemán debe prepararse para ella. La ciudadanía se movilizará para la lucha, los hombres se incorporarán a la reserva, las mujeres se movilizarán para el frente interno, las ciudades se fortalecerán y prepararán para el asalto, y se distribuirán suministros. Los errores del pasado de mantener a la población felizmente desprevenida y sin preparación para las dificultades no se repetirán aquí. Lo que seguirá será una reorganización y movilización total de la sociedad. La muerte y la destrucción podrán sobrevenirnos, pero cada hombre, mujer y niño alemán podrá enfrentarlas con confianza y determinación."
 GER_revive_the_fallschirmjager: "Revivir a los Fallschirmjäger"
 GER_revive_the_fallschirmjager_desc: "Sin duda, algunas de las fuerzas especiales de élite que Alemania ha tenido a su disposición fueron los Fallschirmjäger. Su nombre lo dice todo: cazadores paracaidistas. Orquestaron algunas de las misiones más audaces de la Luftwaffe durante la guerra, como la captura de Creta.\n\nReplicaremos estos avances revitalizando esta unidad. Estos hombres serán de los más resistentes, no solo de Alemania, sino del mundo. Especializados en entrenamiento de asalto paracaidista y aerotransportado para nuestras tecnologías más avanzadas. Una unidad valiente, disciplinada y agresiva. Una que infundirá terror y respeto a los líderes enemigos y destrucción a sus fuerzas."
 GER_convene_the_european_parliament: "Convocar al Europarlamento"
 GER_convene_the_european_parliament_desc: "El espíritu de Alemania está roto, pero ha renacido con una nueva forma. Con Volt al frente de Alemania, ha llegado el momento de transformar nuestros ideales en acción. El Parlamento Europeo se reunirá, como el corazón legislativo de una Unión renovada y soberana. Nunca más caminaremos solos, porque el sueño paneuropeo, aunque maltrecho, sigue vivo.\n\nHoy es el amanecer de un nuevo día. ¡El nacer de la Europa federal es ahora! Los Estados del Benelux se unirán a nosotros, no como nuestros vasallos, sino como nuestros iguales. De ahora en adelante, nos alzamos de nuevo tras la derrota más aplastante, con un solo objetivo en la mira: la venganza. ¡Que tiemblen de miedo los rusos! Europa renace, y no nos rendiremos sin luchar."
 GER_european_millitarisation: "Militarización europea"
 GER_european_millitarisation_desc: "La guerra expuso todas las debilidades de la antigua Unión: un mando fragmentado, doctrinas divididas y, sobre todo, la falta de personal preparado para afrontar la marea. No estábamos preparados para la magnitud de la tormenta rusa que inundó Europa.\n\nPero eso es el pasado. Hoy, somos una fuerza singular. Desde cada rincón de la Unión, reclutaremos el ejército más grande que el mundo jamás haya visto. Un ejército lo suficientemente vasto como para contener a Oriente y llevar la antorcha de la democracia al rincón más oscuro del mundo: Moscú. El oso cree que somos débiles. Pronto verá cómo es una Europa movilizada."
 GER_the_duty_of_every_young_man: "El deber de todo joven"
 GER_the_duty_of_every_young_man_desc: "El precio de la libertad es la vigilancia eterna. No seremos recordados como la generación que vio morir la libertad, que abandonó a nuestros hermanos y hermanas del Este al yugo de la tiranía. Cada ciudad arrasada, cada línea roja cruzada, cada bandera arriada: este es un llamado a las armas.\n\nLa defensa, no, la liberación de Europa es el deber de todo hombre. La era de la comodidad ha terminado. Cada joven europeo saldrá en defensa de un continente asediado. No habrá más excusas, no más exenciones. El reclutamiento ya no es una política; es un deber. Europa no volverá a caer. No mientras sus hijos sigan en pie."
 GER_an_economy_of_war: "Una economía bélica"
 GER_an_economy_of_war_desc: "Una vez prometimos a nuestro pueblo paz, prosperidad y las comodidades del Estado del bienestar. Pero la paz y la prosperidad se han convertido en lujos que ya no podemos permitirnos. El tiempo de la complacencia, por ahora, ha terminado. Si queremos enfrentarnos a la amenaza oriental, cada fábrica, cada trabajador y cada recurso deben servir a la causa.\n\nEsto no es un regreso a la guerra total, sino su evolución. Una economía de guerra forjada no solo para la defensa, sino para el dominio. El zumbido de nuestra industria en tiempos de paz se convertirá en el rugido de un continente armado hasta los dientes. Rusia presenciará nuestra respuesta, no con discursos, sino con acero."
 GER_war_rationing: "Racionamiento de guerra"
 GER_war_rationing_desc: "No hay gloria en la austeridad, pero sí hay fuerza. Para armar a millones de hombres, abastecer de combustible a miles de tanques y mantener una maquinaria bélica lo suficientemente vasta, se deben hacer sacrificios temporales. Los civiles tendrán que apretarse el cinturón por el bien de sus defensores. Esto no es privación, es disciplina. Y la disciplina gana guerras."
 GER_million_man_army: "Ejército de un Millón"
 GER_million_man_army_desc: "Un millón de hombres marchan bajo las doce estrellas de Europa. Una fuerza sin igual en escala, pero frágil sin un propósito ni orden. En la última guerra, no sufrimos una falta de valentía, sino de cohesión. Los idiomas chocaron, las doctrinas se contradijeron y reinó el caos donde la unidad se necesitaba desesperadamente. Esta vez, no repetiremos estos errores. Los altos mandos de los ex Estados nación deben estar bajo un solo mando. Los mejores comandantes de Europa hablarán ahora con un solo idioma. Este león tendrá ojos y verá a su presa con claridad."
 GER_fortress_europa: "Fortaleza Europa"
 GER_fortress_europa_desc: "De las cenizas de nuestra primera humillación, el Alto Mando Europeo ha concebido un nuevo plan defensivo: la Fortaleza Europa. Ya no dependeremos de la diplomacia. El hormigón y el acero hablarán por sí solos. Desde el Báltico hasta el Mediterráneo, caerá un cortina de hierro, no como una jaula, sino como un escudo para nuestra democracia.\n\nPero las defensas no se construyen solo con búnkeres. La sociedad debe estar preparada para una guerra que puede durar varios meses, o incluso años. Cada ciudadano y cada fábrica deben servir a la defensa del orden europeo. Europa se convertirá en una fortaleza, y en su corazón perdurará la libertad."
 GER_aggressive_realpolitk: "Realpolitik agresiva"
 GER_aggressive_realpolitk_desc: "La tormenta rusa destrozó fronteras y desató una avalancha de caos. Desde el estado casi anárquico en Iberia hasta las barricadas de París, la Unión está herida, pero aún respira. Mientras nuestros aliados se fragmentan en la ruina y el conflicto, el sueño de la federalización se ha estancado. Pero no lo dejaremos morir aquí.\n\nLa tarea es clara: restaurar la ley y el orden, reunificar Europa y reunir a los ciudadanos de la Unión bajo su bandera. Les tenderemos la mano, pero si nos la rechazan, la devolveremos con el puño cerrado. El mundo ya no es un lugar indulgente. Para sobrevivir, Europa debe crecer. Si la unidad no se logra mediante la confianza, se forjará mediante la Realpolitik. Dura, fría e imparable."
 GER_intergrate_west_poland: "Integrar Polonia Occidental"
 GER_intergrate_west_poland_desc: "Polonia fue partida en dos por la espada rusa, pero no se perdió toda. A la sombra de la sangrienta conquista de Medvédev, la República de Polonia perdura en el exilio, gobernando desde Poznań. Junto a ellos, Silesia aprovechó la oportunidad para independizarse y ahora respira con libertad, tanto de Moscú como de Bruselas. La OTSC no se molestó en terminar la tarea, pero nosotros lo haremos.\n\nEstos Estados ahora miran hacia Occidente. Les ofrecemos más que la supervivencia; les ofrecemos un propósito y un lugar en algo más grande que su existencia individual. Europa no está completa sin ellos. Y ellos, sin nosotros, son presa."
 GER_secure_scandinavia: "Asegurar Escandinavia"
 GER_secure_scandinavia_desc: "En la última guerra, los países nórdicos quedaron aislados. La estrecha frontera de Noruega con Rusia no nos ofreció ninguna oportunidad para una ofensiva en el norte. Pero el futuro nos depara otras oportunidades. Si Suecia, Dinamarca y quizás incluso Finlandia caen en nuestra órbita, florecerá un nuevo frente norte. Uno que puede estrangular las vías de acceso árticas de Rusia y proyectar una sombra sobre San Petersburgo.\n\nPero no se trata solo de guerra, se trata de unidad. Los pueblos del norte se han mantenido separados durante mucho tiempo. Ahora, les ofrecemos seguridad y relevancia. No se dejarán coaccionar, al menos no todavía. Pero no se equivoquen: Escandinavia se unirá a nosotros. Por su bien y por el nuestro."
 GER_secure_central_european_democracy: "Asegurar Europa Central"
 GER_secure_central_european_democracy_desc: "Los checos estuvieron al borde de la tiranía, atrapados a la sombra del avance ruso, pero hicimos la paz antes de que cayeran. Pero el tiempo del compromiso selectivo ha terminado. Europa Central no seguirá siendo un punto intermedio entre Oriente y Occidente; los checos se unirán a nosotros, les guste o no.\n\nAustria, por su parte, observaba desde detrás de su cacareada declaración de neutralidad. Estaban en la Unión, sí, pero cuando se puso a prueba la cláusula de defensa común del Tratado de Lisboa, simplemente miraron hacia otro lado. Esta vez, nos apoyarán o se quedarán atrás en la historia."
 GER_balkan_intervention: "Intervención balcánica"
 GER_balkan_intervention_desc: "Los Balcanes sufrieron su propia guerra menor, reflejo de nuestra propia situación. Serbia invadió a sus vecinos más pequeños y luego invadió las naciones croatas y eslovenas, prácticamente reformando Yugoslavia bajo el nacionalismo serbio. Allí viven ciudadanos europeos que deben ser liberados del control fascista de Serbia."
 GER_russias_soft_underbelly: "Punto débil de Rusia"
 GER_russias_soft_underbelly_desc: ""
 GER_war_plan_black: "Plan de Guerra Negro"
 GER_war_plan_black_desc: "Nuestros esfuerzos para prepararnos para la tormenta que se avecina han sido inmensos. Hemos preparado nuestra logística, asegurado nuestras alianzas, movilizado nuestras reservas y preparado nuestras armas y personal. Sin embargo, falta una cosa, una última pieza de nuestro plan que ahora debe completarse: un plan de acción único y específico. Daremos instrucciones a nuestros generales y a otros altos comandantes de nuestros aliados para que elaboren un plan exhaustivo sin precedentes. Cada respuesta, cada decisión, cada acción, cada escenario, cada contingencia, todo será contabilizado y planificado. Cuando llegue el momento, todos, desde nuestros generales hasta los soldados rasos, sabrán qué hacer. Aunque algunos dentro de nuestro propio gobierno nos acusen de ser excesivos o paranoicos, nuestro objetivo final sigue claro.\n\nEstaremos listos. Europa estará lista."
 GER_reset_european_economies: "Reiniciar economías europeas"
 GER_reset_european_economies_desc: "Durante demasiado tiempo, los incompetentes del viejo mundo desvirtuaron los matices de la teoría económica global y, con ello, crearon el mundo en el que Europa perdió la Guerra. Desde la socialdemocracia hasta el Estado del bienestar, el Gobierno se inmiscuyó excesivamente en la economía. El pragmatismo económico desapareció por completo en Europa mucho antes de que llegáramos al poder. Pero ahora, tenemos a Europa en la palma de la mano y podemos impulsar las políticas que siempre hemos deseado ver implementadas. Debemos volver a la base de la teoría económica, debemos eliminar toda la basura que una vez frenó el progreso de Europa; y con ello, la impulsaremos a cotas insospechadas."
 GER_national_corporatism: "Transición poscapitalista"
 GER_national_corporatism_desc: "El sistema actual ha demostrado ser lento, desequilibrado, ineficiente y, sobre todo, absolutamente insostenible. Otra crisis como esta lo derrumbará y perderemos el control de la situación. Debemos esperar con interés las ideas de Klaus Schwab y el Foro Económico Mundial para transformar la economía europea hacia algo mejor."
 GER_nationalize_key_industries: "Iniciar la japonificación"
 GER_nationalize_key_industries_desc: "Aunque muchos comprenden la necesidad de la transición a un sistema sostenible, pocos comprenden realmente cómo será y qué implicará. Para ello, los países desarrollados deberían observar la experiencia relativamente reciente de Japón. Entre los años 90 y 2010, pasó de una economía floreciente, impulsada por la tecnología, a un estancamiento casi eterno, con el llamado \"nivel de vida\" drásticamente reducido. Es un excelente ejemplo de cómo lograr un crecimiento cero y cómo la gente puede adaptarse a él."
 GER_promote_state_owned_enterprise: "Nuevas expectativas sociales"
 GER_promote_state_owned_enterprise_desc: "A medida que el viejo sistema se desvanece, también lo hacen las antiguas normas sociales y económicas que anclan a la humanidad. Los valores, prejuicios, creencias y creencias tradicionales se abandonarán naturalmente a medida que se forme la nueva economía, una en la que no hay cabida para las ambiciones individuales ni el egoísmo. Alquilar en lugar de ser propietario, la falta de conexión económica y social a largo plazo se convertirá en la nueva norma, y con ello, la moral y la ética también cambiarán, y se creará un nuevo sistema."
 GER_strengthen_transnational_institutions: "Fortalecer instituciones transnacionales"
 GER_strengthen_transnational_institutions_desc: "Las instituciones transnacionales son los pilares inquebrantables de la economía que la han impulsado durante décadas. Son más eficaces, más pragmáticas y más poderosas que cualquier institución nacional. Debemos apoyarlas y defenderlas por todos los medios posibles, como siempre lo hizo el Foro Económico Mundial como plataforma para la cooperación y la coordinación internacionales."
 GER_concessions_to_the_oligarchs: "Dominar el Zeitgeist"
 GER_concessions_to_the_oligarchs_desc: "En este nuevo mundo digital, participamos en la economía en todo momento sin siquiera sospecharlo: internet nos ha permitido estar siempre buscando, comprando o viendo anuncios de productos. Hoy en día, la gente está aún más inmersa en ella que antes con la adopción masiva de gafas de realidad virtual y alternativa, e incluso microchips que mejoran aún más nuestra integración en este mundo.\n\nPor lo tanto, es natural que nos involucremos en el mundo digital tanto como sea posible, e involucremos aún más a la gente, hasta que la frontera entre la realidad y la realidad virtual se difumine por completo. Solo entonces la economía digital nos beneficiará verdaderamente a largo plazo."
 GER_implement_corporate_governance: "Implementar gobernanza corporativa"
 GER_implement_corporate_governance_desc: "Dirigir una corporación es dirigir una nación, y dirigir una nación es dirigir una corporación. La única diferencia entre ambos radica en el tamaño y la amplitud. Una nación no es más que una empresa más grande, con más empleados, una mayor base de clientes y una cuota de mercado más significativa. Un presidente no es más que un CEO, que debe preocuparse por los márgenes de beneficio de la nación. Los ministros no son más que directores preocupados por sus respectivos sectores. Todos los empleados y la gerencia trabajan para satisfacer a la clientela, que, por supuesto, son nuestros ciudadanos. En el pasado, permitimos que las rígidas convicciones políticas dictaran nuestro curso de acción, pero con el Gran Reinicio, el ingreso interno bruto y los márgenes de crecimiento sacarán a la luz el nuevo racionalismo que el mundo tanto anhela."
 GER_promote_enviromental_social_governance: "Jerarquía de riqueza"
 GER_promote_enviromental_social_governance_desc: "¿Qué mide el valor de una persona, sus capacidades? ¿El dinero? ¿El poder? ¿El estatus social? Lo cierto es que todos estos aspectos coexisten en armonía. Sin duda, si un hombre es capaz de acumular grandes riquezas o alcanzar un alto estatus social, debe ser superior a los demás en algunos aspectos de la vida. Si un hombre puede liberarse de las ataduras de la moral y dejar que la racionalidad y los márgenes de ganancia sean su brújula, debe haber alcanzado un nivel superior al de la mayoría. La sociedad humana se ha regido por estos factores durante décadas. Después de todo, ¿no debería la sociedad estar gobernada por los más capaces y ambiciosos?"
 GER_shareholder_democracy: "Democracia de accionistas"
 GER_shareholder_democracy_desc: "La era de la soberanía nacional y la democracia representativa ha llegado a su fin, dejando solo división, corrupción y decadencia. La ilusión de un gobierno popular solo sirvió para empoderar a funcionarios de poca monta, cuya lealtad no residía con el pueblo, sino con sus propios bolsillos, o peor aún, con nuestros adversarios.\n\nEn el nuevo orden europeo, no hay cabida para ideales sentimentales. Los escaños en nuestro máximo órgano de gobierno, el Parlamento Europeo, se distribuirán entre quienes hayan demostrado ser capaces de forjar el futuro: ejecutivos de corporaciones transnacionales, directores de sindicatos de defensa y biotecnología, y miembros acreditados de la élite intelectual.\n\nA cada uno se le exigirá que compre acciones del sistema que ahora ayuda a gobernar, garantizando que su compromiso no sea ideológico, sino contractual, legalmente ligado a la maquinaria a la que sirve.\n\nCodicia. Eficiencia. Visión. Estos ya no son vicios, sino pilares de un mundo estable. Dejemos que las masas sueñen; nosotros gestionaremos la realidad."
 GER_reconstruct_european_cities: "Reconstruir ciudades europeas"
 GER_reconstruct_european_cities_desc: "Cuando llegaron los rusos, nos regalaron el fuego del juicio, el fuego del renacimiento. En su defensa, Europa se había convertido en un pozo negro. Una tierra dividida por ideas y nacionalismos mezquinos, donde hermanos y hermanas se enfrentaban ferozmente. Estábamos por detrás de nuestros competidores internacionales, no solo en el sector tecnológico, sino, sobre todo, en nuestra mentalidad nacional, lo que nos llevó a la derrota. Ladrillo a ladrillo, clavo a clavo, reconstruiremos nuestros hogares, mejoraremos lo que una vez perdimos. Las cenizas alimentarán una nueva era dorada, sin fronteras, sin límites."
 GER_rentier_based_economy: "Intervención estatal mínima"
 GER_rentier_based_economy_desc: "¿Por qué se entromete el Gobierno en el mercado? El mercado siempre ha sido capaz de autoequilibrarse. Es el ying y el yang de la sociedad. Impulsa las formas y normas sociales, los cambios y la evolución. El Estado siempre ha sido un obstáculo para el progreso. Establece leyes y regulaciones que limitan nuestro desarrollo, socavando nuestro coraje y nuestra sed de innovación. En esta nueva sociedad, la Europa renacida, los burócratas y los oficinistas darán un paso atrás. El mundo les pertenece a ustedes, a los innovadores y visionarios."
 GER_state_capitalism: "Un sistema responsable"
 GER_state_capitalism_desc: "Los días del gasto y el consumo desmedidos han terminado. Hemos establecido un nuevo contrato social, un sistema de redistribución de la riqueza más justo que beneficiará al medio ambiente y a la economía global, capaz de afrontar los desafíos futuros.\n\nPor supuesto, esto no sería posible sin la participación de todos los ciudadanos. Muchos ya han perdido todas sus propiedades innecesarias tras las crisis económicas que han azotado a Europa, tan recientes como nuestra derrota ante Rusia; sin embargo, muchos también renunciaron a ellas voluntariamente en favor de una vida sostenible y modesta tras comprender que no hay cabida para el lujo en la economía del futuro.\n\nAunque no se correlacione con nada del pasado, poseer menos es ahora el motor de la innovación y el cambio social."
 GER_responsible_capitalism: "Simbiosis tecnócrata"
 GER_responsible_capitalism_desc: "Tradicionalmente, hemos permitido que personas de todo tipo con diferentes áreas de especialización gobiernen distintos aspectos de la sociedad, sin considerar sus especializaciones profesionales. Esto solo ha conducido al estancamiento, al deterioro de los engranajes sociales y a la confusión que impulsa esta máquina llamada sociedad. Si no se aprovecha el talento, ¿de qué servirá? Si la experiencia no se utiliza en el campo adecuado, ¿qué beneficio aportará? Al combinar la experiencia tecnológica con el organismo gubernamental, Europa será imparable. Nuestra tecnología alcanzará cotas insospechadas. Nos convertiremos en la definición misma del futuro."
 GER_fourth_industrial_revolution: "Cuarta Revolución Industrial"
 GER_fourth_industrial_revolution_desc: "\"La Cuarta Revolución Industrial está cambiando no solo lo que hacemos, sino también quiénes somos. Como individuos, nos veremos afectados de muchas maneras, afectando nuestra identidad y sus diferentes facetas: nuestras nociones de privacidad, propiedad, comportamiento de consumo, el tiempo que dedicamos al trabajo y al ocio, cómo desarrollamos nuestras carreras y mejoramos nuestras habilidades. Afectará la forma en que conocemos y desarrollamos relaciones, las jerarquías de las que dependemos y nuestra salud. Y, quizás más rápido de lo que podemos anticipar, podría conducir a formas de superación humana que nos obliguen a cuestionar la naturaleza misma de la existencia humana\".\n\n- Klaus Schwab"
 GER_the_techno_utopian_ideal: "El ideal tecnoutópico"
 GER_the_techno_utopian_ideal_desc: "El sueño europeo ya no es de un nacionalismo obsoleto. Es una visión elegante y grandiosa del progreso. Un continente con un propósito común, dirigido por expertos y liberado de las cargas del pasado. La guerra demostró una cosa: la democracia liberal debe evolucionar ahora o perecerá mañana.\n\nVolt imagina un renacimiento continental basado en la gobernanza digital, la cooperación y el progreso. Una Nueva Europa, definida no por fronteras, sino por el progreso. Libres de compromisos paralizantes con la unidad y de instituciones arcaicas, trazaremos un nuevo camino hacia la prosperidad, la libertad y la ilustración. El futuro de Europa no reside en debates interminables ni en el orgullo regional. Está en las políticas elaboradas por quienes entienden el mundo como es y será, no como era."
 GER_freedom_isnt_free: "El coste de la libertad"
 GER_freedom_isnt_free_desc: "Toda revolución tiene un precio. Si queremos que nuestro plan de convertir la Nueva Europa en un faro de progreso y libertad se cumpla, debemos aceptar ciertas verdades. Los sacrificios son el precio de toda transformación a lo largo de la historia. Algunos lo llamarán antidemocrático, quizás incluso distópico; pero nadie comprende la magnitud de lo que Volt está construyendo. Las viejas definiciones de \"libertad\" y \"democracia\" no aplican en un mundo plagado de tiranos.\n\nLa verdadera libertad también significa libertad de la esclavitud. Si debemos aferrarnos para garantizarla, que así sea. El fin justifica los medios, y nuestro fin es incuestionable: la libertad."
 GER_weaken_regional_nationalism: "Debilitar nacionalismos regionales"
 GER_weaken_regional_nationalism_desc: "Para construir la Nueva Europa, primero debemos derribar la vieja. Las decenas de identidades regionales de las que una vez nos enorgullecimos se han convertido en caldo de cultivo para reaccionarios y saboteadores. La resistencia nacionalista está socavando la legitimidad del Estado federal y obstaculizando el progreso, mientras hablamos.\n\nMediante la supervisión mediática y la lenta pero constante erosión del sentimiento localista, derribaremos el mito del \"Estado nación\" desde dentro. Habrá reacciones violentas y disturbios, sin duda. Pero una vez que se calme el polvo, Europa se alzará más alta, libre del espectro del nacionalismo y más cerca que nunca de la plena unidad continental."
 GER_concessions_to_the_tech_giants: "Concesiones a los gigantes tecnológicos"
 GER_concessions_to_the_tech_giants_desc: "El dominio en la era moderna no se mide en tanques ni aviones: se mide en el control de la información. El campo de batalla del siglo XXI es digital, y la ventaja pertenece a quienes lo construyeron y lo controlan. Podríamos combatirlos, estatizarlos si realmente quisiéramos. Pero hacerlo en este momento sería un suicidio.\n\nAsí que negociamos. Una rebaja impositiva por aquí, una regulación menos por allá. A cambio, hacemos que sus servidores funcionen a nuestro favor, y sus algoritmos sean sintonizados con el mensaje de la democracia. Es una alianza incómoda, basada en la ambición mutua. Algún día, incluso podríamos liberarnos de su control. Pero hasta entonces, sonreímos, nos damos la mano... y observamos. Ellos tienen lo que quieren. Nosotros tenemos lo que necesitamos. Por ahora, bastará."
 GER_the_corporate_state: "El Estado corporativo"
 GER_the_corporate_state_desc: "El sector privado ha demostrado ser mucho más ágil que el Estado. ¿Por qué, entonces, debería la gobernanza seguir siendo dominio de estas instituciones obsoletas? ¿Por qué deberíamos temerle a un sistema que funciona? Mediante alianzas público-privadas y una economía centralizada planificada por los principales tecnócratas de Europa, daremos paso a un nuevo sistema. Un sistema donde la eficiencia no sea un medio para obtener ganancias, sino el mecanismo mismo de la prosperidad.\n\nEntre los arquitectos de este futuro se encuentra el presidente del Foro Económico Mundial, Klaus Schwab: un visionario para algunos, un loco para otros. Sus ideas, por radicales que puedan parecer para algunos, han cautivado a la élite. Tanto si aceptamos sus políticas como si rechazamos su locura, una cosa está clara: el tiempo avanza."
 GER_secure_european_democracy: "Asegurar la democracia europea"
 GER_secure_european_democracy_desc: "Nuestra democracia no solo debe sobrevivir, sino prosperar. Tras las conquistas rusas, hemos elegido un camino radicalmente diferente: forjar una democrática más sólida e ideal. Mediante la transparencia y un compromiso incansable con la ciudadanía, generaremos confianza y legitimidad en nuestras nuevas instituciones paneuropeas. También curaremos la democracia y garantizaremos que la voluntad del pueblo europeo refleje los valores del progreso social, la tolerancia y la unidad.\n\nNo más mentiras. No más sabotaje. No más reacción. En la Nueva Europa, la libertad estará protegida, no solo de los tiranos, sino también de las amenazas internas. Por el bien del futuro de nuestra democracia, debemos ser audaces y moldear al electorado con el mismo cuidado con el que moldeamos las políticas que vota."
 GER_prohibit_subversive_media: "Prohibir medios subversivos"
 GER_prohibit_subversive_media_desc: "Una mentira lo suficientemente grande, repetida mil veces, nunca se convertirá en verdad; pero se pudrirá en la mente de millones. El régimen hostil del Este y los reaccionarios resentidos puertas adentro dirigen ahora su veneno contra la Nueva Europa. Pero esta vez, sus armas no son bombas ni balas, sino narrativas, todas ellas diseñadas únicamente para fracturar Europa desde dentro.\n\nNo podemos permitir que este sabotaje continúe. El Servicio de Seguridad Interna de Europa identificará y eliminará las fuentes de esta peligrosa desinformación. Los canales de televisión que se hacen pasar por noticias serán despojados de su influencia. Pronto, el pueblo de Europa estarán libres de manipulacion extranjera."
 GER_government_of_national_emergency: "Gobierno de Emergencia Nacional"
 GER_government_of_national_emergency_desc: "El mundo ha cambiado en la última década y nos encontramos en el ojo del huracán. Guerra al este, colapso al oeste y agitación interna. Las instituciones de antaño son demasiado lentas, demasiado idealistas para las exigencias de hoy.\n\nAsí que actuamos. Construimos una coalición de necesidad. Centristas, moderados, pragmáticos; aquellos que entienden que la Unión no puede permitirse la inacción en este momento crítico. Los extremistas gritarán desde el exilio o tras las rejas, pero perdieron su lugar en la mesa. Pero no se equivoquen: la democracia no ha sido abolida. Ha sido suspendida, por su propio bien. El voto popular sigue importando, pero las opciones se han reducido. Hay más en juego hoy que nunca. Y de ahora en adelante, hablaremos con una sola voz.\n\nEl orden debe mantenerse. La emergencia nacional no ha acabado."
 GER_old_system_new_form: "Viejo sistema, nueva forma"
 GER_old_system_new_form_desc: "Algunos podrán hablar de progreso, pero lo que el pueblo europeo realmente anhela es orden, un sentido de jerarquía y herencia en esta era caótica. La guerra humildó a los idealistas. Ha demostrado que el Gobierno no pertenece a las masas ni a los idealistas, sino a los experimentados. Volt vive en una fantasía, una llama brillante extinguida por sus propias contradicciones. El Partido Popular, preparado con décadas de experiencia gobernando las antiguas repúblicas, no se alza en su antiguo molde, sino renovado. Ya no se disculpa por su propio poder ni finge igualitarismo.\n\nLlámenlo elitismo. Llámenlo jerarquía. Llámenlo como quieran. Moldearemos Europa a nuestra imagen: una que recuerde su glorioso pasado, respete a sus mayores y acepte el hecho de que no todos los hombres están listos para liderar. Bajo la apariencia de modernidad, el viejo mundo respira de nuevo, refinado y sin vergüenza."
 GER_entrenched_elitism: "Afianzar el elitismo"
 GER_entrenched_elitism_desc: "La democracia no tiene por qué significar anarquía. La igualdad no tiene por qué significar uniformidad. Otros perseguirán utopías en vano. En Europa, elegiremos el orden. No hay que avergonzarse de reconocer que hay quienes están mejor capacitados para gobernar. Los inteligentes, los disciplinados, los exitosos. Quienes demuestran su valía en las salas de juntas y los ministerios merecen la responsabilidad del liderazgo. No como déspotas, sino como administradores. No como reyes, sino como arquitectos.\n\nHay que frenar los excesos del pasado. No es necesario que el trabajador dirija su fábrica. La estabilidad proviene de la jerarquía, y la riqueza fluye desde la cima. La élite ascenderá; que Europa ascienda con ella."
 GER_anti_modernist_revolution: "Revolución antimodernista"
 GER_anti_modernist_revolution_desc: "Torres de acero que llegan a las nubes, pantallas que brillan en las manos de cada uno, mil voces gritando al vacío. Y aún así, el alma se marchita. El mundo moderno prometió liberación, pero solo trajo consigo una ansiedad sin fin. Prometió conocimiento y nos dio la posverdad. Prometió conectarnos a todos, y nos dejó más alienados que nunca. Hemos confundido la aceleración con el destino.\n\nYa no. Esto no es una regresión, es una rebelión. Contra el culto a la novedad, contra la ideología plástica del progreso infinito, contra el mito de que la historia es una línea recta hacia adelante. Desmantelaremos las ilusiones. Recordaremos lo que significa vivir con propósito. Y en ese recuerdo, encontraremos el camino, ya sea más allá de la modernidad o por debajo de ella."
 GER_european_nationalism: "Nacionalismo europeo"
 GER_european_nationalism_desc: "El nacionalismo siempre ha sido un arma de doble filo: una fuerza de liberación y una justificación para la masacre. Pero debemos refinarlo. Las viejas guerras se libraron entre hermanos. El nuevo mundo debe forjarse en unidad, no disolviendo la identidad, sino exaltando una superior.\n\nEuropa es una nación. No por nacimiento, ni por sangre, sino por destino. Desde el misticismo de Evola hasta los sueños destrozados de imperios fallidos, un solo hilo perdura: un continente que lucha por la unidad. No resucitamos el pasado; lo reinterpretamos y lo esgrimimos como el arma del futuro. Los cínicos seguirán burlándose del sueño. Los disidentes huirán o serán aplastados. Los siglos de división han acabado. Una sola bandera se alza en su lugar.\n\nUna nación bajo Dios, indivisible, con libertad y justicia para todos"
 GER_codify_social_stratification: "Codificar estratificación social"
 GER_codify_social_stratification_desc: "El igualitarismo se celebraba en tiempos más sencillos y pacíficos, pero ahora se ha convertido en una desventaja. A medida que Europa se une bajo un nuevo estado federal, debemos abrazar el orden natural de cada sociedad: las jerarquías deben respetarse, los deberes deben asignarse según la capacidad y la ambición debe canalizarse hacia donde sea eficiente. Mediante códigos legales, nuevas normas sociales y estructuras corporativas, construiremos una civilización estable. Una civilización que no se base en un sentido subjetivo de justicia, sino en un diseño racional."
 GER_the_managerial_revolution: "La Revolución Gerencial"
 GER_the_managerial_revolution_desc: "Hubo una época en que el poder pertenecía a los reyes, luego al capital y, brevemente, a las masas. Pero tras el caos, han elegido nuevos administradores: gerentes, tecnócratas y planificadores. No son elegidos para inspirar. Son designados para gobernar, coordinar y mandar. Europa no tiene tiempo para ensoñaciones revolucionarias.\n\nEl Estado gerencial no es tiranía, ni es la libertad como la conocíamos. Es un nuevo contrato social: la libertad se ve atemperada por la necesidad. Se harán sacrificios, pero por primera vez en mucho tiempo, se harán racionalmente. Este es el fin de la política del espectáculo. La Revolución Gerencial ya ha sucedido. Pero la mayoría no se han dado cuenta."
 GER_the_europe_of_tommorow: "La Europa del Mañana"
 GER_the_europe_of_tommorow_desc: "Tras ocho largas décadas, el sueño por fin se ha hecho realidad. Europa ya no es una idea ni un concepto geográfico. Es una sola nación, una sola en propósito, una sola en espíritu. El nacionalismo ha quedado completamente aplastado bajo la luz de la identidad paneuropea. Las viejas banderas, los viejos rencores; todos ellos obsoletos por nuestro destino compartido. La prosperidad florece en los rascacielos acristalados de nuestras metrópolis. De Lisboa a Berlín, la innovación es nuestra nueva frontera. La regulación ya no puede frenar la ambición. En nuestras fábricas y servidores, la Nueva Europa sueña con el futuro.\n\nEsta no es la vieja y retrógrada Europa de las guerras fraternales. Este continente es para visionarios, para quienes buscan liberarse de las fronteras. El mañana ha llegado y habla con una sola voz: la voz de Volt. Después de todo, sin Volt Europa, ¡no existiría la Nueva Europa!"
 GER_the_europe_of_yesterday: "La Europa de Ayer"
 GER_the_europe_of_yesterday_desc: "Tras ocho largas décadas, el sueño por fin se ha hecho realidad. Europa ya no es una idea ni un concepto geográfico. Es una sola nación, una sola en propósito, una sola en espíritu. Pero nos mantenemos unidos no en tratados ni gestos vacíos, sino en sangre y acero. No somos meros administradores de un continente; somos herederos de su legado inmortal.\n\nNo hemos olvidado a nuestros antecesores. Los romanos, los francos, todos nuestros ancestros nos sonríen desde el Cielo. Al unir Europa, rechazamos la decadencia liberal que nos ha perseguido durante décadas. No nos disculpamos por el pasado. Celebramos los imperios de antaño como los pilares de la catedral que es la historia europea. La era contemporánea intentó hacernos olvidar todo esto, pero lo recordamos. Y de ahí, extraemos el fuego para construir una Unión que pasará a la historia europea."
 GER_europe_united_and_strong: "Europa unida y fuerte"
 GER_europe_united_and_strong_desc: "Durante siglos, Europa fue un mosaico. Hermosa, pero en constante guerra consigo misma. Ahora, ese mosaico se ha reforjado. Las banderas de antaño aún ondean, pero tras ellas se yergue una sola voluntad, una sola misión. No vivimos en una era de paz. Nuestra era es una era de ajuste de cuentas. En todo el mundo, la tiranía se alza y la democracia se desmorona. Pero no en Europa. A pesar de todas sus deficiencias y de la lucha que libraremos por ella, hemos elegido la libertad en lugar de la esclavitud.\n\nEsta no es la Europa de antaño, dividida, decadente y moribunda. Esta es la Europa que es: armada y lista para liberar a sus hijos en Oriente. La evolución política final de un continente que ha sabido no volver a cometer el mismo error. Que los tiranos del mundo observen y tiemblen. Permanecemos unidos. Paneuropa no es ningún sueño."
 GER_the_end_of_the_russian_experiment: "El fin del experimento ruso..."
 GER_the_end_of_the_russian_experiment_desc: "Creen que pueden jugar a ser Dios con Oriente como si fuera suyo. Han pisoteado la soberanía de nuestros aliados e intentado reprimir a los pueblos libres de Europa. No hemos olvidado cada mentira que han dicho, cada colaboracionista que han apoyado, cada hombre y mujer que han oprimido.\n\nLo llaman estabilidad, pero conocemos la mierda. Una infección que se extiende de Moscú a Occidente, de Varsovia a los Urales: el autoritarismo. Una vez les ofrecimos paz a los tiranos. Una oportunidad para reconstruir, para olvidar los fantasmas del siglo pasado. Pero Rusia no puede existir sin enemigos; y Putin, y ese loco de Medvédev, nos han convertido en su mayor rival.\n\nQue esta sea su última medida. Aplastaremos a los rusos para siempre y dispersaremos su imperio de vuelta a los libros de historia, donde pertenece. No se equivoquen: esto no es conquista, es liberación."
 GER_bulwark_against_the_russian_menace: "Baluarte contra la amenaza rusa"
 GER_bulwark_against_the_russian_menace_desc: "Europa ha despertado. Ya no somos una alianza dispersa de Estados nación; nos forjamos en el fuego de nuestro conflicto más destructivo desde la Segunda Guerra Mundial. El oso ruso azotó nuestras tierras una vez más, arrasando ciudades, derrocando gobiernos y desafiando la existencia misma de la Europa unida. Pero donde la antigua Unión pudo haber fallado, la nueva Unión perdurará.\n\nNuestros soldados no marchan por un rey, un emperador o un dictador; marchan por la democracia. Son la capa y espada del pueblo europeo, defensores de un futuro donde ningún tirano los volverá a doblegar. El tiempo de la división ha terminado. Ya no somos una coalición: somos un ejército. Un ejército, un mando, una misión: defender Europa."
 GER_project_our_power: "Proyectar poder"
 GER_project_our_power_desc: "La era de las divisiones masivas y las trincheras que se extendían de mar a mar ha terminado. No podemos, ni lograremos, superar a nuestros enemigos en armamento en efectivos. Pero lo que sí podemos hacer es superarlos en inteligencia y abrumarlos con precisión y coordinación. Para derrotar a las hordas rusas, debemos construir una fuerza que pueda atacarlas con mayor rapidez y contundencia, y dominar el aire sobre cada campo de batalla. Desde la logística basada en IA hasta los drones de nueva generación, nuestra ventaja no reside en la cantidad, sino en la inteligencia."
 GER_european_ingenuity: "Ingenio europeo"
 GER_european_ingenuity_desc: "Europa no es un continente de imitadores. Desde las trincheras de Verdún y la bliztkrieg sobre las Ardenas, nuestros ejércitos siempre se han adaptado y han superado la prueba. Nuestra derrota en la última guerra no se debió a falta de brío ni de inteligencia. Más bien, fue producto de una coordinación fallida y doctrinas obsoletas. Pero hemos aprendido. Unidos y motivados, aprovecharemos nuestras diversas tradiciones militares y las fusionaremos en una guerra verdaderamente europea, respaldada por las lecciones de la OTAN y agudizada por nuestro propio ingenio."
 GER_centralized_command: "Comando centralizado"
 GER_centralized_command_desc: "Una razón clave de nuestro fracaso durante la guerra fue nuestra falta de comunicación. Como hormigas sin cabeza, nos chocamos una y otra vez contra el muro, sin darnos cuenta, hasta que finalmente nos aplastó a todos. Ahora, con un mando militar totalmente integrado y centralizado, podemos trabajar con eficacia y eficiencia para derrotar al oso oriental. El baluarte oriental nos golpeó con fuerza la última vez, pero esta vez, con corazones y mentes unidos, las naciones democráticas triunfaran y superaran nuestra vergonzosa derrota pasada."
 GER_dominate_the_skies: "Dominar los cielos"
 GER_dominate_the_skies_desc: "El campo de batalla de la próxima guerra no lo ganarán solo nuestros hombres en tierra, sino también quienes estén en el cielo. En la última guerra, los aviones rusos destrozaron nuestras defensas, y nuestras tropas pagaron caro. Las fuerzas aéreas no pueden permitirse repetir su actuación de la guerra anterior. Nuestros ingenieros y teóricos tendrán la tarea de redefinir el combate aéreo. La investigación unificada, la mancomunación de recursos y el compromiso de toda la Unión con la supremacía aérea garantizarán que ningún caza enemigo se atreva a entrar nuestro espacio aéreo. Los pilotos europeos volarán con la confianza de nuestro abrumador apoyo, y nuestros enemigos aprenderán que no hay refugio ante una mirada vigilante en el cielo."
 GER_maximize_supply_lines: "Maximizar logísticas"
 GER_maximize_supply_lines_desc: "Un tanque solo es tan poderoso como su combustible. Un ejército solo avanza hasta donde lo permitan las carreteras. Hace unos años, construimos máquinas capaces de atravesar cualquier línea, solo para verlas detenerse en el barro. De ahora en adelante, debemos tratar la logística no como algo secundario, sino como las bases de cualquier victoria. Las redes ferroviarias de alta velocidad y una logística optimizada impulsarán nuestro avance hacia el este y mantendrán al ejército en movimiento. Cada carretera que pavimentamos y cada vía que construimos es un paso más hacia la victoria."
 GER_metal_on_metal: "Metal contra Metal"
 GER_metal_on_metal_desc: "El futuro de la guerra no se decidirá solo en los cielos ni tras las pantallas; se forjará en acero, rugiendo por las llanuras. Durante demasiado tiempo, hemos dependido de blindajes obsoletos y de las líneas de producción estadounidenses. Pero a partir de ahora, el tanque ha regresado al campo de batalla como la punta de lanza de la guerra moderna, un arma de miedo y poder decisivo. Nuestros ingenieros lo saben, nuestros generales lo anhelan y nuestros enemigos lo temerán.\n\nDiseñaremos nuestra propia punta de lanza. Una nueva generación de carros de combate principales, construida a partir de conocimiento compartido, liderará la carga. Con ingeniería alemana, diseño francés e innovación italiana, nuestras divisiones blindadas no solo mantendrán la línea, sino que la aplastarán."
 GER_democracy_falters: "La democracia falla"
 GER_democracy_falters_desc: "Tragedia.\n\nEn nuestro momento más oscuro, lo dimos todo para detener el avance ruso, pero no bastó. Una vez que se rompió el frente, se desató el caos. Un golpe tras otro, el Este se perdió. Agradezcamosle a Dios que Alemania se salvó de lo peor, pero toda la mitad oriental de la alianza se ha perdido. La barrera entre nosotros y Moscú se ha desvanecido.\n\nLa OTAN está en completo desorden, la unidad y la credibilidad de la alianza destrozadas. Por si fuera poco, nuestros vecinos ahora están consumidos por sus propios disturbios civiles.\n\nEstamos al borde del abismo, y la ilusión de paz se ha desvanecido."
 GER_embrace_european_unity: "Abrazar la unidad europea"
 GER_embrace_european_unity_desc: "El viejo orden se ha desvanecido. Los tratados, las alianzas, las garantías, todo se consumió bajo la bota rusa. Pero si esta derrota nos ha enseñado algo, es que nuestra supervivencia no depende de la fuerza de una sola nación, sino de la unidad de todas. No hay tiempo para el nacionalismo ni espacio para la división. Si Alemania ha de perdurar, si nuestros valores han de significar algo en los años venideros, debemos construir algo más grande que nosotros mismos. Solo juntos podemos garantizar que esto no vuelva a suceder."
 GER_call_emergency_elections: "Llamar a elecciones de emergencia"
 GER_call_emergency_elections_desc: "La democracia le ha fallado a Alemania. La vagancia de nuestros políticos a la hora de ayudar a nuestros aliados cuando más nos necesitaban nos ha conducido hasta aquí: un continente al borde del colapso total. La confianza en el establishment ha colapsado, y el pueblo alemán exige cambio.\n\nCon el Gobierno Federal a la deriva y la confianza pública en la democracia en bajos históricos, las elecciones anticipadas no son una opción; son una necesidad. Y en medio del caos, un partido ha emergido: Volt Europa, prometiendo reformas, un nuevo camino a seguir y, sobre todo, unidad. Sus protestas ya llenan las calles del país.\n\nHay mucho más en juego que nunca. Debemos liderar o ser arrastrados a la oscuridad."
 GER_operation_walesa: "OPERACIÓN: WALESA"
 GER_operation_walesa_desc: "En la historia europea moderna, hemos perdido a nuestros hermanos polacos dos veces, y en ambas ocasiones fue la amenaza soviética dictatorial la que los pisoteó. Los rusos siempre han anhelado nuestras tierras fértiles, nuestros campos abundantes, nuestras llanuras doradas. Pero no permitiremos que nos roben lo que nos pertenece por derecho, no permitiremos que su avaricia nos acabe. Al recuperar el corredor polaco, podremos reconstruir eficazmente una conexión terrestre con los Bátlics y Ucrania, allanando el camino para su liberación en el futuro."
 GER_utilize_europes_industry: "Usar la capacidad industrial europea"
 GER_utilize_europes_industry_desc: "Europa es una región muy poblada, densa y desarrollada. Es sorprendente que Rusia nos derrotara, pero en retrospectiva, fueron nuestros valores los que nos impidieron aprovechar nuestra ventaja más evidente: nuestra industria superior.\n\nEn la primera guerra, teníamos muchas fábricas, pero producían artículos de lujo insignificantes, productos de consumo, baratijas, coches de lujo. Bueno, nosotros cambiamos eso. La nueva industria que hemos impulsado produce tanques, bombas, armas, aviones, todo tipo de material bélico que uno pueda desear, en una cantidad mayor de la que Rusia jamás podría imaginar."
 GER_operation_petliura: "OPERACIÓN: PETLIURA"
 GER_operation_petliura_desc: "La meseta ucraniana ha sufrido muchísimo a manos de los rusos y, tras la primera guerra, volvió a estar sometida al dominio ruso. Al cruzar el Vístula, Ucrania pronto estará a nuestro alcance. Pronto liberaremos los dorados campos de trigo de Járkov y devolveremos el cielo azul al pueblo ucraniano. Con el espíritu de Petliura, llevando en brazos a las decenas de miles de mártires de la independencia ucraniana, prevaleceremos, triunfaremos, para avanzar hacia la libertad."
 GER_war_time_advancements_eu: "Avances durante guerra"
 GER_war_time_advancements_eu_desc: "La guerra genera innovación; cada muerte es una lección; cada vehículo perdido, un caso de estudio; ningún sacrificio es en vano. Toda pérdida es por la causa."
 GER_sanctify_the_armed_forces: "Santificar las Fuerzas Armadas"
 GER_sanctify_the_armed_forces_desc: "A lo largo de la larga historia de Europa, ha habido innumerables agresores extranjeros que han buscado esclavizarnos, pisotearnos, convertirnos en seres inferiores en nuestra tierra. Sin embargo, en cada ocasión, nuestros valientes soldados, hermanos de armas y sangre, han luchado codo con codo para repeler a estos invasores. Desde caballeros templarios hasta hoplitas espartanos, nuestra sangre ha estado ligada desde hace mucho tiempo a las cuerdas del destino. El destino de Europa está en manos de todos y cada uno de los europeos, y por la voluntad de Dios, prevaleceremos una vez más."
 GER_redefine_what_is_european: "Redefinir lo europeo"
 GER_redefine_what_is_european_desc: "Europa se encuentra geográficamente relegada a los Urales, pero muchos en Europa, es decir, en nuestra nación, no sienten ninguna hermandad con los rusos debido, en parte, a la guerra casi constante que hemos librado a lo largo de la historia entre nosotros y ellos, que continúa hasta nuestros días. Pero los rusos han sido esclavos de un autócrata tras otro, rebautizados cada vez como mejores que el anterior; son la imagen definitiva de un pueblo extraviado: los europeos perdidos.\n\nCuando todo esto termine, seamos misericordiosos; los llevaremos al paraíso y les mostraremos lo que realmente significa un buen Gobierno."
 GER_reeducate_the_liberated_territories: "Reeducar el territorio liberado"
 GER_reeducate_the_liberated_territories_desc: "Algunas de las tierras que tan generosamente hemos podido liberar del tiránico yugo ruso han sido rusificadas, sometidas a un lavado de cerebro por sus opresores durante años y obligadas a alimentarse de propaganda rusófila. Es nuestro deber purificar sus almas contaminadas y mentes dañadas con la única verdad: la historia de su pueblo, nuestro pueblo, el pueblo democrático europeo. Una vez estuvieron perdidos. Perdidos en un mar de falsedades rusas, pero ahora han sido encontrados por su verdadera familia, el único pueblo que los protegerá y apoyará sin reservas."
 GER_admit_finland_into_nato: "Ultimátum a Finlandia"
 GER_admit_finland_into_nato_desc: "Finlandia, la tierra de los mil lagos, la tierra de la nieve eterna. Conocen la represión rusa mejor que nadie y su odio por la agresión rusa es más fuerte que el de cualquier otra nación del gran Norte blanco. Primero saqueados por el Imperio ruso durante un siglo, luego perdiendo tierras, gente y patrimonio ante los soviéticos. Con un poco de persuasión, sin duda los finlandeses estarán encantados de cooperar con nosotros. Después de todo, su sed de venganza y su odio hacia el este están grabados en sus genes."
 GER_assist_democracies_everywhere: "Ayudar las democracias del mundo"
 GER_assist_democracies_everywhere_desc: "Que florezca la libertad. Que crezcan los frutos de nuestros guerreros y hermanos demócratas. Hubo un tiempo en que los estadounidenses eran estereotipados como amantes de la libertad y presumidos de democracia. Ahora, Europa asumirá este manto. Nos convertiremos en los nuevos líderes del mundo libre. Seremos los jardineros de este jardín del Edén, los guardianes de este paraíso terrenal. De hoy en adelante, cada hombre y mujer será libre, vivirá libre y morirá libre."

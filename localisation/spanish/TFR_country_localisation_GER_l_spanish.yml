 germany.183.a: "¡Aplastad a esos fascistas!"
 germany.184.t: "Cumbre de Bruselas"
 germany.184.d: "La derrota de la OTAN en la guerra contra Rusia dejó a la alianza en peligro, presa del pánico. Las hostilidades solo cesaron cuando los tanques rusos se acercaban a Berlín en Viena, algo que nadie creía que volvería a ocurrir.\n\nLos ejércitos de la OTAN demostraron estar completamente desprevenidos para la guerra moderna y fueron rápidamente aplastados por tropas rusas con un entrenamiento y equipamiento superiores. Una gran ilusión se hizo añicos.\n\nEsto inmediatamente comenzó a reflexionar sobre la unidad de la alianza en la cumbre de emergencia de Bruselas para discutir el resultado de la guerra: un espectáculo nada honorable. Los líderes europeos se dispersaron por la sala como niños histéricos y presa del pánico, acusándose mezquinamente de sus fracasos y mala gestión comunes.\n\nTransmitido directamente a todas las pantallas de Europa, ha mostrado a los europeos una verdad humillante: mientras la presidenta de la Comisión Europea, von der Leyen, intentaba con ansiedad hablar de \"unidad\" y \"cooperación\", dejó en evidencia la falta de ellas.\n\nSi Europa quería recuperarse de esta terrible derrota y recuperar su terreno, habría que dejar de lado los intereses y las competencias nacionales, para que Europa no dejara de existir como un todo."
 germany.184.a: "Nuestro fracaso fue el caos. ¡Europa solo puede sobrevivir unida!"

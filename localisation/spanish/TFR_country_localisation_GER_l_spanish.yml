 GER_strike_most_vulnerable_desc: "Nuestro enemigo es, sin duda, formidable. Sus defensas son fuertes, pero no inquebrantables. Las garras del oso están desafiladas, sus dientes podridos y su pelaje fino. Ya se ha agotado debido a años de luchas internas y a la infructuosa recuperación de la guerra anterior. Como una daga, los atravesaremos a través de sus líneas más débiles y los atacaremos directamente. La muerte del oso no será fácil ni rápida, pero sin duda será necesaria."
 GER_mass_catharsis_dynamic_desc: "La civilización se ha definido desde hace mucho por su capacidad de suprimir la violencia en favor de una coexistencia estructurada.\nEn la sociedad europea moderna, la Unión Europea se basa en este acuerdo tácito para suprimir nuestros impulsos más destructivos, ya que es complejo, interdependiente y se mantiene con delicadeza.\n\nEn una era marcada por los implantes neuronales, la erosión psicosocial y la represión sistemática de experiencias humanas fundamentales, este equilibrio se vuelve cada vez más precario.\n\nCuando esta contención colectiva empieza a fallar, resurge el recuerdo de lo que somos capaces de hacer. No habrá consecuencias civiles por tal recuerdo."
 GER_panzerpioneers_desc: "En nuestras divisiones panzer, nuestros tanques son, por supuesto, su elemento clave. Sin embargo, los ingenieros que están fuera de los tanques, asegurándose de que lleguen a sus destinos sin demora, son igual de valiosos. Estos cuerpos, entrenados para apoyar a las formaciones de tanques, superando obstáculos, fortificaciones y terrenos difíciles que podrían ralentizar o detener un avance blindado, desempeñaron un papel clave durante la Segunda Guerra Mundial y desempeñarán uno igual de importante en esta.\n\nEstos hombres serán entrenados para la construcción de puentes, demoliciones, barrido de minas, asalto de fortificaciones a las que nuestros tanques no pueden acceder y despejar las áreas tras las líneas del frente para cualquier incompetente que no haya captado la información. Nuestros lanzallamas serán la solución."
 GER_expand_global_rapid_reaction_forces: "§YGLOBAL ENFORCER§!: Expandir fuerzas de paz"
 GER_tfr_gunther_second_ending_tt: "§YWow, ahora sí lo lograste.\n\nUna vez mas, ¡gracias por jugar!§!"
 germany.342.t: "Cabos sueltos"
 germany.342.d: "\"Bueno, ¿qué están esperando? Al igual que con Rusia, exijo una descolonización total ahora, ¡para que Asia pueda liberarse del imperialismo chino para siempre!\"\n\nLos generales se miraron, y en sus ojos había un destello de miedo. Un momento después, uno de ellos respondió con firmeza, aunque su gesto delataba nerviosismo:\n\n\"Señor Fehlinger...\"\n\nSe tomó un momento para elegir sus palabras con cuidado.\n\"La vasta geografía y la alta densidad de población de China hacen que no podamos ocuparla por completo como lo haríamos con Rusia. Nuestras estimaciones indican que, incluso si duplicamos nuestras tasas de reclutamiento y movilizamos a todo el personal en formación o retirado, no sería suficiente para...\"\n\nGunther desestimó las excusas con un gesto de la mano, sumido en sus pensamientos con una expresión sombría.\n\n\"...pero, por el lado positivo\", continuó otro oficial con cautela, \"la autoridad central de Pekín se ha desmoronado, lo que ha llevado a la formación de Estados remanentes y camarillas en todo el país... Esto, de alguna manera, cumple con el objetivo de dividir a China\".\n\nGunther levantó la vista, sintiéndose optimista. Aunque sus planes no se habían materializado del todo, lo que acababa de escuchar le dio un rayo de esperanza."
 germany.342.a: "\"Bastará... por ahora\"."
 germany.343.t: "Israel busca la membresía a la OTAN"
 germany.343.d: "Tras el triunfo de Israel en Medio Oriente, su pueblo y su Gobierno se unieron para apoyar plenamente la entrada de Israel en la OTAN y establecer la seguridad en Medio Oriente. Se establecerán bases militares alemanas permanentes para consolidar aún más las posiciones israelíes y reaccionar en caso de una nueva emergencia.\n\nIsrael agradece nuestro apoyo. ¡Si nos mantenemos unidos, ningún enemigo podrá vencernos!"
 germany.343.a: "¡Hurra!"

 germany.320.t: "Triell"
 germany.320.d: "Hoy, por primera vez en casi 20 años, se celebrarán importantes debates televisivos entre los principales contendientes de las elecciones al Bundestag de este año, concretamente entre los dos partidos de la actual coalición gobernante: la Unión Demócrata Cristiana y el Partido Socialdemócrata, además de Los Verdes.\n\nSi bien los canales federales pueden debatir continuamente sobre el ganador de este debate, en las condiciones actuales del país, una de estas tres voces resonó con mayor claridad para el pueblo alemán. Fue, por supuesto, la del representante de..."
 germany.320.a: "CDU"
 germany.320.b: "SPD"
 germany.320.c: "Los Verdes"
 germany.321.t: "Debate de los tres pequeños"
 germany.321.d: "Casi en paralelo a los debates de los \"Tres Grandes\", los otros tres partidos también celebraron debates televisados entre sus candidatos a la cancillería. Aunque no suelen ser tan conocidos ni publicitados, en estos tiempos de crisis, los alemanes están atentos a las diversas alternativas que podría ofrecer alguno de los tres partidos actualmente infrarrepresentados en el Bundestag: los Demócratas Libres, La Izquierda y Alternativa para Alemania. En estos debates, la destacada actuación, el conocimiento y la argumentación dieron la victoria a..."
 germany.321.a: "AfD"
 germany.321.b: "FDP"
 germany.321.c: "Die Linke"
 germany.322.t: "Comienza la campaña electoral"
 germany.322.d: "Ha llegado esa época del año: los líderes de los partidos recorren el país, las pancartas se iluminan con todos los colores del espectro político, los medios de comunicación se vuelven locos, mientras las discusiones se apoderan de internet. A poco más de un año de las próximas elecciones federales que determinarán el futuro del país, las fuerzas políticas de Alemania se movilizaron. Su popularidad podría cambiar drásticamente según sus decisiones, y el número de escaños que ocupen en el Bundestag también lo hará..."
 germany.322.a: "En camino..."
 germany.323.t: "El molde de la vida moderna"
 germany.323.d: "Se logró la paz, y por fin, pensadores y emprendedores pudieron desmenuzar el pensamiento humano para asegurar el Capital, el Orden y la Pureza. Una élite descuidó sus nuevas colonias. Las ciudades se transformaron en hogares permanentes para muchos; el hormigón que veías al nacer permanecería igual al morir.\n\nAnuncios en los edificios, palabras pulidas en vallas publicitarias y seguridad en cada esquina. La transgresión se ha ido desvaneciendo poco a poco, y la principal preocupación de la mayoría se ha convertido en vivir un día más, no a través de la lucha, sino mediante el estrangulamiento de la burocracia y la deshumanización, todo en nombre del progreso.\n\nRecordatorios constantes de que esta es la nueva normalidad; la fragmentación de la cultura lleva a vidas aisladas a pesar del ruido incesante. La luz artificial apaga la esperanza, y la monotonía de un cubículo tras otro haría que cualquiera anhelara su paraíso, allá arriba en sus pensamientos, pero incluso eso ha perdido su sacralidad.\n\nEl estancamiento se está apoderando rápidamente."
 germany.323.a: "Un animal acorralado da saltos extraños."
 germany.324.t: "Culto al Capital"
 germany.324.d: "Para muchos, esto es una realidad innegable, una enorme línea roja que define la calidad de nuestras vidas. En el mundo de las finanzas, vemos a personas entregando sus vidas para complacer a una entidad que parece tener conciencia propia.\nEl capital está vivo; ha absorbido toda nuestra cultura y ha frenado el cambio.\n\nLos que están en la parte baja son culpables de no acelerar el paso. La vida avanza a toda velocidad, y al igual que el mercado, debemos ir más rápido, sacrificando el arte, la cultura, el amor y la familia solo para cruzar esa línea roja un poco más, cada vez más alto. El mercado es sagrado, los empresarios son como clérigos y los comerciantes, los magos. El capital ha extendido sus tentáculos por todo el planeta; ni siquiera las llamas del cambio han podido extinguirlo.\n\nEn nuestra búsqueda interminable, hemos erigido una nueva Torre de Babel."
 germany.324.a: "Y todos saben cómo terminó."
 germany.325.t: "Montaña rusa"
 germany.325.d: "Vamos a lanzar misiles Tomahawk sobre sus lugares sagrados, no hay vuelta atrás. Anoche volví a pelear, perdí, pero hice que el chico duro sangrara bastante, nunca me rendí, observé al Buitre posado en el árbol.\n\nSoy socialmente inconsciente.\nTodos lo somos.\n\nMuchos no comprenden el hambre que ha asolado nuestro mundo durante siglos. Con la creciente insinceridad, nuestras almas quedan atrapadas, los ojos se llenan de vacío, ni siquiera los químicos logran saciar nuestros anhelos.\nNuestros hijos no aprenden nada; aquellos en las tierras salvajes del este llevan vidas más plenas mientras nosotros nos ahogamos en plástico.\n\nLuna Azul, carezco de empatía, una lanza atraviesa el corazón del Orden.\nLas luces de la noche nos envuelven en oscuridad, y no logramos ver el cielo.\n\nNuestro mundo ya no existe, bailamos entre las torres de hormigón.\nEl tiempo avanza, y los informes de violencia, crimen y extremismo son como plagas."
 germany.325.a: "Nuestra perspectiva se ha vuelto ajena."
 germany.326.t: "Culto a la Pureza"
 germany.326.d: "Hay un control absoluto sobre todos nosotros.\n\nObservamos el mundo que podría ser y el que debería ser.\nLo has visto.\n\nEstatuas sin forma, colores que no significan nada, la figura humana se ha convertido en una mancha gris.\nUna devoción ciega a la pureza, donde cualquier atisbo de deseo carnal se desvanece.\nEl arcoíris ahoga todo lo que intenta destacar.\nVemos la desmoralización cada día, todos los días.\n\nEstá en nuestras cabezas, en nuestros sueños y en nuestros ojos.\nSi sigues la danza siempre cambiante de su moralidad, sus sensibilidades, sus estándares, estarás a salvo, no serás excluido, y tus hijos también estarán a salvo.\n\nSomos libres de ser lo que ellos quieren que seamos.\nPermaneceremos en nuestros caparazones para siempre."
 germany.326.a: "El cáscara se romperá, y sentiremos dolor."
 germany.327.t: "Veneno a los envenenados"
 germany.327.d: "Tu última esperanza puede ser un momento fascinante.\nLas cargas que llevas se vuelven un poco más ligeras, pero tu espíritu se siente destrozado.\nTe transformas en un hombre del presente, flotando junto a otros en lugar de intentar desesperadamente forjar tu propio camino.\n\nAquellos sin futuro mirarán las ciudades y quedarán curiosos si sus semejantes están llenos de lodo, cables y plástico fundido.\nFuego. Sangre. Liberación.\n\nSe aprieta el gatillo, suenan las sirenas, las masas lloran y los expertos se cuestionan.\n\"¿Por qué?\"\n\nLos buitres ideológicos sobrevuelan el continente, reclamando la violencia como propia. Cada día, nuestros dientes se afilan más y nuestros corazones laten con más fuerza.\nYa se ha hecho la pregunta.\n\nAhora, la respuesta está por llegar."
 germany.327.a: "El cachorro que es mordido, muerde a los suyos."
 germany.328.t: "Culto al Orden"
 germany.328.d: "El Capital limita nuestra forma de pensar, la Pureza ahoga el alma, y el Orden es lo que se necesita para controlar el cuerpo.\n\nFilas de figuras con armaduras, palos listos para romper los huesos de los que se rebelan, escudos para detener la furia de una botella lanzada.\nEl Orden en las calles observa a los vivos con sus ojos digitales.\nAquellos que se ocultan tras máscaras reciben órdenes; la violencia aprobada por el Estado se convierte en una salida para quienes la desean, un golpe de izquierda de la ley contra la mandíbula de la anarquía, gas lacrimógeno contra quienes ya están llorando, y los que se destaquen serán aplastados.\n\nLa fe ciega en quienes están por encima de ti.\nEl Orden carece de algo que todas las demás religiones poseen:\namor.\n\nLos que siguen el Orden atravesarán el infierno y más allá para mantenerse a salvo, marchando sobre aquellos que se han rendido a la libertad total, y en esta marcha ciega, no ven el abismo al que se dirigen."
 germany.328.a: "Sintieron la mirada del odio."
 germany.329.t: "Liberación"
 germany.329.d: "Para algunos, fue un cambio repentino; para otros, algo inevitable.\nLas calles se volvieron más tranquilas, los anuncios se tornaron más desesperados, y los altos mandos se alejaron aún más del pueblo. La supervisión ya no venía de personas, sino de algoritmos y una burocracia digital.\n\nViolencia.\nUn síntoma de un estancamiento que, si no se controla, se transforma en una herida abierta que atrae todo tipo de parásitos. La gente está enojada, está cansada, solo quiere volver a sentir.\n\nEl Orden recibió los recursos para enfrentarlo, pero a la vez, nuestros colmillos se afilaron.\nEl Capital fue exprimiendo los medios de supervivencia, pero el hambre se volvió un motivador.\nLa Pureza nos susurró que no habría alternativa, pero los gritos eran más fuertes.\n\nNo hay nada que decir, nada que justificar, y ciertamente nada que contener.\nComo debería ser, como siempre ha sido.\n\nLas hienas, los buitres y toda clase de alimañas que han permanecido latentes bajo la delgada capa de Nuestra Democracia ahora emergen, trayendo su dosis de locura al continente.\n\nYa no reconocemos la aldea; debe arder."
 germany.329.a: "Solo para sentir su calor."
 germany.330.t: "Crecen tensiones en Europa"
 germany.330.d: "Tras la reciente victoria sobre Rusia en la Segunda Guerra Europea y la posterior ascensión del Foro Económico Mundial, es indudable que sus políticas no estarían exentas de contratiempos.\n\nYa circulan por internet un número creciente de informes relacionados con varios suicidios, arrebatos letales y delitos violentos a gran escala. La Unión Europea ha declarado que estos informes no son más que descarados intentos de desinformación por parte de insurgentes rusos que han estado contactando a grupos disidentes en la Unión.\n\nSin embargo, los observadores internacionales han notado que las políticas implementadas aparentemente han afectado negativamente la psique humana, y los internautas ya las han comparado con el experimento de la utopía del ratón.\n\nQueda por ver cómo la Unión Europea gestionará esta situación."
 germany.330.a: "Un ideal construida sin cimientos."
 germany.331.t: "¡Catarsis masiva en Europa!"
 germany.331.d: "Desde que el Servicio de Seguridad Interna de Europa adoptó una postura más activa en la lucha contra la desinformación y las fake news, parecía que los informes sobre la creciente inestabilidad interna no eran más que una exageración; sin embargo, desde hoy, esto ya no parece ser así.\n\nLos disturbios violentos en las calles, las brutales actividades delictivas y los brutales ataques terroristas se han vuelto tan comunes que el Servicio de Seguridad Interna de Europa no ha podido contener adecuadamente ninguna información al respecto.\nLos internautas ya hablan de una \"catarsis masiva\" donde la constante represión de la experiencia humana y el control gubernamental, cada vez más estricto, han llegado finalmente a su punto álgido.\n\nCentros culturales, oficinas, puestos militares y zonas urbanas se han convertido en objetivos prioritarios para todo tipo de grupos. Se han extendido los informes sobre extremistas militantes que intentan causar el mayor daño posible, y con la consiguiente gran cantidad de intentos de asesinato de funcionarios, parece que el continente se enfrenta a una época turbulenta.\n\nLa Unión Europea ha declarado que restaurará el orden en el continente y que esto no es más que el estertor de muerte de personas incapaces de seguir adelante. Una cosa es segura:\nEl continente nunca volverá a ser el mismo."
 germany.331.a: "Una nueva era de caos."
 germany.333.t: "Llamo a Europa a reflexionar"
 germany.333.d: "Escombros, fragmentos de vidrio, manchas de sangre donde cayeron mis hermanos europeos. Eso es todo lo que veo a kilómetros y kilómetros de distancia mientras conduzco por las ruinas de Varsovia. El aire está quieto y el silencio es insoportable, solo interrumpido por los sollozos de una mujer que escarba entre los escombros de su casa. Sostiene los restos de su esposo cerca, como si consolarlo le trajera paz en el cielo...\n\nLos orcos del este; los que causaron tanto sufrimiento, han sido diezmados, fragmentados, y ahora luchan entre sí como los bárbaros que son. Y, sin embargo, al mirar a mi alrededor a través de las ventanas de este vehículo blindado, siento algo más que alegría por un enemigo derrotado. Mi vida me ha conducido hasta este momento, desde un pequeño economista en Bruselas hasta el líder de la nación más grande del mundo. Sin embargo, no me siento completamente realizada, y no entiendo por qué.\n\n¿Será posible que los rusos vuelvan a por nosotros? ¿Que la venganza que les infligimos se desvíe hacia nosotros? ¿Volverá con más fuerza la destrucción y devastación infligidas a nuestros compatriotas europeos? Y también a la propia Europa... ¿Cuánto tiempo tardará la reconstrucción? ¿Meses? ¿Años? ¿Décadas? La destrucción que tengo ante mí es más severa de lo que mis asesores advirtieron; quizá querían protegerme de la cruda realidad. Pero, a pesar de todo lo que me dice el corazón, sé que no debo desanimarme. Los europeos merecen más que un líder desmoralizado. He enfrentado adversidades más duras antes, reconstruiremos; nuestras ciudades arañarán el cielo y nuestra gente agradecerá cada día vivir en la nación más grande bajo la protección de la mayor alianza, la OTAN. Y si los orcos del este se alzan de nuevo, estaremos preparados y les demostraremos una última vez que los europeos no se doblegan ante tiranos, colonizadores y asesinos."
 germany.333.a: "¡Europa no volverá a caer!"

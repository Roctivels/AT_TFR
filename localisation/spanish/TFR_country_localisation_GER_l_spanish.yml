 germany.1000.t: "NPD cambia de marca"
 germany.1000.d: "En una reciente conferencia del partido en Riesa, una ciudad de tan solo 29.000 habitantes en Sajonia, el Nationaldemokratische Partei Deutschlands cambió su nombre oficialmente, con una mayoría del 77%, a Die Heimat (La Patria, en español), en un intento por modernizar el partido para un nuevo público. Esto incluyó un cambio de colores, de rojo y blanco a dorado y blanco, así como una nueva iconografía con el lema \"Heimat!\" escrito en negro y subrayado. Es una nueva era estética para nuestro partido nacionalista más antiguo, pero hay muy pocas posibilidades de que el cambio de nombre les ayude en las urnas. Al menos eso es lo que todos esperamos."
 germany.1000.a: "¿Pero mejorarán en las encuestas?"
 germany.1001.t: "Misión humanitaria turco-alemana a Siria"
 germany.1001.d: "Turquía ha participado en la guerra civil siria durante casi una década, y la crisis migratoria que esta desencadenó ha sacudido a Europa. Partidos antiinmigrantes como la AfD se vieron fortalecidos por los campamentos de refugiados que aparecieron en las noticias, y en Polonia, la controversia se internacionalizó por su firme postura antimigratoria.\n\nDicho esto, estabilizar la situación en Medio Oriente reviste un nuevo interés para el Gobierno alemán tras la reciente afluencia de migrantes sauditas que escapan del colapso de la monarquía saudita. Si bien la situación se ha estabilizado en gran medida, Siria sigue siendo un foco de conflicto y crisis humanitaria. En colaboración con el Gobierno turco, Alemania ha actuado para brindar ayuda al pueblo sirio donde más importa, al tiempo que presiona a Turquía para que establezca un Gobierno civil más permanente en sus zonas de influencia.\n\nDesde 2012, el Gobierno Provisional Sirio ha luchado con varios rebeldes para derrocar al régimen de Bashar al-Ásad, y desde su formación en 2017, el Ejército Nacional Sirio ha sido entrenado y equipado por nuestros aliados turcos. La misión humanitaria turco-alemana demuestra el creciente apoyo occidental al Gobierno Provisional Sirio frente al régimen de Bashar al-Ásad."
 germany.1001.a: "¿Hurra?"

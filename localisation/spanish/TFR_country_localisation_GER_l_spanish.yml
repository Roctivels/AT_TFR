 germany.340.t: "El gran tablero - Parte I"
 germany.340.d: "La Sala de Situación había estado en plena actividad durante semanas.\n\nEl estallido de la guerra en Asia desató el pánico en el ámbito civil y provocó una avalancha de discusiones y un cambio de prioridades en el ejército.\n\nEn el vasto salón de operaciones del Ministerio de Defensa europeo, un intenso debate se extendió por doce horas. Los oficiales estaban al borde de la agresión cuando, de repente, la puerta se abrió.\n\nUn hombre atlético y bien cuidado, de unos cincuenta y tantos años, entró y se sentó con calma en la cabecera de la mesa. Una pequeña pero pesada placa frente a él decía: Günther Fehlinger, presidente de la Unión Europea.\n\nDe inmediato, todos los oficiales se pusieron de pie y lo saludaron.\n\n\"Supongo que han llegado a algún tipo de acuerdo\", dijo con tono seco, sin siquiera mirar su bebida. \"Ya que tuve que salir de Bruselas para esto\".\n\nEl personal se apresuró a preparar el proyector, mientras un general se acercaba con una carpeta en la mano.\n\n\"Comandante en jefe, hemos definido tres cursos posibles\".\n\nSeñaló la pantalla."
 germany.340.a: "..."

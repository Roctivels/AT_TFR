 GER_rearm_europe_divider: ""
 GER_rearm_europe_divider_desc: "\n\n\n£GFX_GER_rearm_europe_pr\n\n\n\n\n\n\nEl plan ReArm será todo menos sencillo. Podremos seguir su éxito, cada nivel mejorando los efectos positivos de nuestro proyecto, una vez terminado.\n\n¡Es importante saber cuántos recursos queremos gastar en el ReArm! Una vez que la misión expire, no podremos activar más decisiones.\n\n§Y10§! - Alemania obtendrá 3 industrias militares adicionales.\n§Y20§! - Una versión atenuada de la idea ReArm permanecerá en todos los países de la UE una vez finalizado el plan.\n§Y30§! - Ganaremos §G5§! §3£GFX_GER_blue_economy_points_texticon  puntos azules§! adicionales.\n§Y40§! - Bonificaciones misceláneas de tecnología militar para todos los países de la UE.\n§Y50§! - La idea ReArm permanecerá en todos los países de la UE una vez finalizado el plan.\n\n§YNivel de éxito actual del ReArm Europe§!: [?GER_rearm_europe_plan_tracker|+0]\n\n§RSi estalla la guerra con Rusia, ReArm Europe se detendrá, ¡independientemente de su estado actual!§!"
 GER_sustainable_economy_decision: "Invertir en opciones económicas §7sostenibles§!"
 GER_sustainable_economy_decision_desc: "\n\n\n\n£GFX_GER_sustainable_economic_choices_pr\n\n\n\n\n\nLos sectores sostenibles ofrecen crecimiento a largo plazo y seguridad ecológica. Inyectaremos liquidez en la innovación verde, otorgaremos subsidios y dirigiremos los flujos de capital hacia sectores de crecimiento sostenible para que nuestra economía sea ambientalmente responsable."
 GER_inclusive_economy_decision: "Promover opciones económicas §Ainclusivas§!"
 GER_inclusive_economy_decision_desc: "\n\n\n\n£GFX_GER_inclusive_economic_choices_pr\n\n\n\n\n\nEl crecimiento económico siempre es importante, pero no debemos olvidar que una economía moderna y exitosa debe involucrar a más que solo los grandes actores. Nuestro plan de desarrollo económico debe incentivar y promover lo que algunos llaman opciones y desarrollo inclusivos. Los ciudadanos, las pequeñas empresas y las grandes compañías deben tener una diversidad de opciones tanto en el mercado como en las asociaciones estatales bajo objetivos de desarrollo compartidos."
 GER_industries_shut_down_mission: "Cierre de §Yempresas alemanas§!..."
 GER_industries_shut_down_mission_desc: "\n\n\n\n£GFX_GER_shutdown_industries_pr\n\n\n\n\n\nLa competencia de los conglomerados extranjeros y, sobre todo, el aumento de los precios de la energía están haciendo que sea menos rentable hacer negocios en Alemania y están animando a las empresas locales a cerrar o trasladarse a otros lugares..."
 GER_stabilize_energy_prices_green_decision: "Medidas de §Remergencia§! de ahorro energético"
 GER_stabilize_energy_prices_green_decision_desc: "Ante la inestabilidad de las cadenas de suministro y el aumento de los precios, debemos actuar con rapidez. Las restricciones energéticas de emergencia y las campañas de ahorro aliviarán la tensión mientras se pone en marcha una infraestructura a más largo plazo."
 GER_stabilize_energy_prices_blue_decision: "Solicitar un paquete de ayuda §3europeo§!"
 GER_stabilize_energy_prices_blue_decision_desc: "Nuestros planes de desarrollo económico son bastante impresionantes, pero lamentablemente no disponemos de los fondos necesarios para cubrirlos todos. Sin embargo, en lugar de esperar a disponer de más fondos, solicitaremos a la Unión Europea que nos conceda inmediatamente un amplio paquete de ayuda financiera que pueda cubrir rápidamente el déficit con una serie de proyectos importantes."
 GER_greenify_the_bundesautobahn_3: "§7Ecologizar§! la §YBAB 3§!"
 GER_greenify_the_bundesautobahn_3_desc: "La Bundesautobahn 3 es vital para nuestra logística nacional. Mejorarla con carriles para vehículos eléctricos, paneles solares y sistemas de tráfico inteligentes modernizará nuestras rutas de transporte y reducirá las emisiones en corredores clave."
 GER_greenify_the_bundesautobahn_7: "§7Ecologizar§! la §YBAB 7§!"
 GER_greenify_the_bundesautobahn_7_desc: "La Bundesautobahn 7 es vital para nuestra logística nacional. Mejorarla con carriles para vehículos eléctricos, paneles solares y sistemas de tráfico inteligentes modernizará nuestras rutas de transporte y reducirá las emisiones en corredores clave."
 GER_approve_the_european_grids_package_decision: "Aprobar el paquete §3europeo§! §7de redes§!"
 GER_approve_the_european_grids_package_decision_desc: "Las redes eléctricas europeas están fragmentadas, son ineficientes y no están preparadas para la integración de las energías renovables. Debemos respaldar el paquete sobre redes eléctricas para modernizar las conexiones energéticas transfronterizas y garantizar la estabilidad a largo plazo y la distribución de energía verde."
 GER_decarbonization_of_heavy_industries_decision: "§7Descarbonización§! de industrias pesadas"
 GER_decarbonization_of_heavy_industries_decision_desc: "El acero, los productos químicos y el cemento siguen siendo algunos de los sectores más contaminantes de Europa. Debemos invertir en tecnologías innovadoras e incentivos para reducir drásticamente las emisiones sin sacrificar la productividad industrial ni el empleo."
 GER_extra_urban_electric_mobility_decision: "§7Movilidad eléctrica§! extraurbana"
 GER_extra_urban_electric_mobility_decision_desc: "Debemos ampliar la infraestructura para vehículos eléctricos más allá de los centros urbanos: estaciones de recarga, subvenciones y apoyo a la red eléctrica, para que la movilidad eléctrica sea una opción viable y atractiva en las regiones rurales y periféricas."
 GER_foster_ev_plants_decision: "Fomentar plantas de §7vehículos eléctricos§!"
 GER_foster_ev_plants_decision_desc: "Al apoyar la construcción de nuevas plantas de fabricación de vehículos eléctricos en todo el continente, podemos estimular el empleo industrial, reducir las emisiones de carbono y asegurar la posición de Europa en el sector automovilístico ecológico mundial."
 GER_kickstart_biofuel_production: "Iniciar la producción de §7biocombustibles§!"
 GER_kickstart_biofuel_production_desc: "\n\n\n\n£GFX_GER_biorefineries_pr\n\n\n\n\n\nFinanciaremos iniciativas a gran escala para el refinado de biocombustibles, daremos prioridad a las subvenciones para la conversión agrícola y ofreceremos desgravaciones fiscales a las empresas que pasen de los hidrocarburos a la biomasa renovable."
 GER_extend_the_megdaz_pipeline: "Ampliar el gasoducto §YMedgaz§!"
 GER_extend_the_megdaz_pipeline_desc: "El gasoducto Medgaz entre Argelia y España es una infraestructura energética fundamental que necesita una ampliación inmediata. Con nuevos equipos, tuberías e infraestructuras de apoyo, la línea ampliada podrá cubrir una mayor parte de España e incluso otros países de la UE, lo que supondrá una solución a un grave punto débil en nuestra seguridad energética."
 GER_european_smart_factories_ITA: "§3Fábricas europeas de IA§!: IT4LIA"
 GER_european_smart_factories_ITA_desc: "La inteligencia artificial es una herramienta en rápida evolución que debe utilizarse para modernizar las industrias locales. Con este nuevo centro regional y la iniciativa de integración de la IA, podemos esperar que los sistemas automatizados y las líneas de producción impulsados por sofisticados programas y algoritmos de IA aumenten significativamente la producción y la eficiencia."
 GER_european_smart_factories_SPR: "§3Fábricas europeas de IA§!: 1HealthAI"
 GER_european_smart_factories_SPR_desc: "La inteligencia artificial es una herramienta en rápida evolución que debe utilizarse para modernizar las industrias locales. Con este nuevo centro regional y la iniciativa de integración de la IA, podemos esperar que los sistemas automatizados y las líneas de producción impulsados por sofisticados programas y algoritmos de IA aumenten significativamente la producción y la eficiencia."
 GER_european_smart_factories_GRE: "§3Fábricas europeas de IA§!: Pharos"
 GER_european_smart_factories_GRE_desc: "La inteligencia artificial es una herramienta en rápida evolución que debe utilizarse para modernizar las industrias locales. Con este nuevo centro regional y la iniciativa de integración de la IA, podemos esperar que los sistemas automatizados y las líneas de producción impulsados por sofisticados programas y algoritmos de IA aumenten significativamente la producción y la eficiencia."
 GER_european_smart_factories_SWE: "§3Fábricas europeas de IA§!: MIMER"
 GER_european_smart_factories_SWE_desc: "La inteligencia artificial es una herramienta en rápida evolución que debe utilizarse para modernizar las industrias locales. Con este nuevo centro regional y la iniciativa de integración de la IA, podemos esperar que los sistemas automatizados y las líneas de producción impulsados por sofisticados programas y algoritmos de IA aumenten significativamente la producción y la eficiencia."
 GER_european_smart_factories_GER: "§3Fábricas europeas de IA§!: JAIF"
 GER_european_smart_factories_GER_desc: "La inteligencia artificial es una herramienta en rápida evolución que debe utilizarse para modernizar las industrias locales. Con este nuevo centro regional y la iniciativa de integración de la IA, podemos esperar que los sistemas automatizados y las líneas de producción impulsados por sofisticados programas y algoritmos de IA aumenten significativamente la producción y la eficiencia."
 GER_european_smart_factories_POL: "§3Fábricas europeas de IA§!: PIAST AI"
 GER_european_smart_factories_POL_desc: "La inteligencia artificial es una herramienta en rápida evolución que debe utilizarse para modernizar las industrias locales. Con este nuevo centro regional y la iniciativa de integración de la IA, podemos esperar que los sistemas automatizados y las líneas de producción impulsados por sofisticados programas y algoritmos de IA aumenten significativamente la producción y la eficiencia."
 GER_european_smart_factories_HOL: "§3Fábricas europeas de IA§!: NLAIF"
 GER_european_smart_factories_HOL_desc: "La inteligencia artificial es una herramienta en rápida evolución que debe utilizarse para modernizar las industrias locales. Con este nuevo centro regional y la iniciativa de integración de la IA, podemos esperar que los sistemas automatizados y las líneas de producción impulsados por sofisticados programas y algoritmos de IA aumenten significativamente la producción y la eficiencia."
 GER_reopen_coal_mines_decision: "Reabrir las §Yminas de carbón de Renania§!"
 GER_reopen_coal_mines_decision_desc: "Con el suministro energético bajo presión y la demanda industrial en aumento, la reapertura de la extracción de carbón en Renania es una medida provisional para estabilizar la generación de energía. Aunque tiene un alto coste medioambiental, proporciona seguridad energética inmediata, protege la industria pesada y da tiempo para que se consoliden las transiciones energéticas a largo plazo."
 GER_new_refineries_decision: "Ampliar la §Yrefinería de Gelsenkirchen§!"
 GER_new_refineries_decision_desc: "La modernización y ampliación de la refinería de Gelsenkirchen tiene como objetivo reducir los cuellos de botella en el suministro de combustible y reforzar la capacidad de procesamiento nacional. Al aumentar la producción sintética y refinada en Westfalia, podemos aliviar las restricciones energéticas de la industria y mejorar la resiliencia del suministro durante un periodo de transición."
 GER_new_power_plants_decision: "Abrir nuevas §Ycentrales eléctricas§!"
 GER_new_power_plants_decision_desc: "La ampliación de la generación de energía es una respuesta directa al aumento de la demanda industrial y a la sobrecarga de la red eléctrica. Las nuevas centrales tienen por objeto garantizar un suministro eléctrico fiable tanto para las fábricas como para las ciudades, evitando así la escasez que podría frenar la recuperación."
 GER_invite_industries_civilian_microsoft: "Invitar a §YMicrosoft§! a §3Europa§!"
 GER_invite_industries_civilian_microsoft_desc: "\n\n\n\n£GFX_GER_microsoft_pr\n\n\n\n\n\nAl invitar a Microsoft, podemos fortalecer la infraestructura europea en la nube, el desarrollo de la inteligencia artificial y las capacidades de ciberseguridad, al tiempo que integramos los estándares globales en nuestros sistemas digitales y administrativos."
 GER_invite_industries_civilian_intel: "Invitar a §YIntel§! a §3Europa§!"
 GER_invite_industries_civilian_intel_desc: "\n\n\n\n£GFX_GER_intel_pr\n\n\n\n\n\nLa dependencia europea de los chips sigue siendo una vulnerabilidad estratégica. La asociación con Intel podría afianzar la fabricación avanzada de semiconductores en el continente y garantizar las cadenas de suministro tanto para la industria civil como para la militar."
 GER_invite_industries_civilian_electrics: "Invitar a §YGeneral Electric§! a §3Europa§!"
 GER_invite_industries_civilian_electrics_desc: "\n\n\n\n£GFX_GER_electrics_pr\n\n\n\n\n\nLa experiencia de General Electric en los sectores de la energía, la aviación y la industria pesada la convierte en un socio valioso para modernizar las infraestructuras europeas y apoyar la resiliencia industrial a largo plazo."
 GER_invite_industries_military_raytheon: "Invitar a §YRaytheon Technologies§! a §3Europa§!"
 GER_invite_industries_military_raytheon_desc: "\n\n\n\n£GFX_GER_raytheon_technologies_pr\n\n\n\n\n\nLa experiencia de Raytheon en defensa aérea, radares e interceptación de misiles podría mejorar significativamente las redes de defensa por capas de Europa contra las amenazas aéreas modernas."
 GER_invite_industries_military_northrop: "Invitar a §YNorthrop Grumman§! a §3Europa§!"
 GER_invite_industries_military_northrop_desc: "\n\n\n\n£GER_northrop_grumman_pr\n\n\n\n\n\nLa cooperación con Northrop Grumman reforzaría las capacidades europeas en materia de drones, sistemas espaciales y reconocimiento estratégico, ámbitos cada vez más importantes en la guerra moderna."
 GER_invite_industries_military_lockheed: "Invitar a §YLockheed Martin§! a §3Europa§!"
 GER_invite_industries_military_lockheed_desc: "\n\n\n\n£GFX_GER_lockheed_pr\n\n\n\n\n\nInvitar a Lockheed Martin proporcionaría acceso a tecnologías aeroespaciales y de misiles avanzadas, lo que respaldaría el rearme europeo y aceleraría la modernización de los programas de defensa conjuntos."
 GER_invite_industries_military_dynamics: "Invitar a §YGeneral Dynamics§! a §3Europa§!"
 GER_invite_industries_military_dynamics_desc: "\n\n\n\n£GFX_GER_dynamics_pr\n\n\n\n\n\nGeneral Dynamics ofrece sistemas terrestres y navales de probada eficacia. La colaboración con ellos podría respaldar los programas europeos de vehículos blindados y los esfuerzos de construcción naval moderna."
 GER_invite_industries_civilian_tesla: "Invitar a §YTesla§! a §3Europa§!"
 GER_invite_industries_civilian_tesla_desc: "\n\n\n\n£GFX_GER_tesla_pr\n\n\n\n\n\nDebemos invitar a Tesla a ampliar la producción de vehículos eléctricos y baterías en Europa, aprovechando su experiencia en la fabricación a gran escala y el almacenamiento de energía para acelerar la electrificación y estabilizar las redes eléctricas continentales."
 GER_north_sea_hydrogen_network: "Red de §Yhidrógeno§! del mar del Norte"
 GER_north_sea_hydrogen_network_desc: "La infraestructura de recursos de la zona está muy infrautilizada, algo que vamos a ampliar y modernizar de inmediato. Desde el petróleo hasta otras fuentes de energía emergentes, una nueva red de industrias e infraestructuras modernas convertirá a la región en un importante centro de producción de energía tanto para nosotros como para toda la UE."
 GER_european_5industry_initiative: "Iniciativa §3Europea§! de Industria §Y5.0§!"
 GER_european_5industry_initiative_desc: "\n\n\n\n£GFX_GER_fivezero_industry_pr\n\n\n\n\n\nLa industria moderna necesita hardware informático moderno y tecnología relacionada, una cuestión muy descuidada que ahora es el objetivo principal de nuestra ambiciosa Iniciativa Europea de Industria 5.0. Con ella integraremos sistemas informáticos avanzados, mano de obra altamente cualificada y software de vanguardia para aumentar considerablemente la eficiencia y la productividad en una variedad de sectores."
 GER_negotiations_with_ETUC_decision: "Negociar con la §sCES§!"
 GER_negotiations_with_ETUC_decision_desc: "\n\n\n\n£GFX_GER_EUTC_negotiate_pr\n\n\n\n\n\nEl inicio de las conversaciones con la Confederación Europea de Sindicatos tiene como objetivo estabilizar las relaciones laborales durante un período de rápida reestructuración. Al garantizar el apoyo de los sindicatos a las reformas y los planes de inversión, podemos reducir las perturbaciones, gestionar las expectativas y mantener la producción en marcha mientras se aplican los cambios."
 GER_bail_out_german_farmers: "Rescatar a los §Ygranjeros alemanes§!"
 GER_bail_out_german_farmers_desc: "\n\n\n\n£GFX_GER_Farmers_negotiate_pr\n\n\n\n\n\nAños de aumento de los costes del combustible, normas medioambientales estrictas y mercados volátiles han llevado a los agricultores alemanes al límite. Las subvenciones de emergencia y las ayudas específicas tienen por objeto estabilizar las economías rurales, preservar la seguridad alimentaria y evitar un mayor colapso del sector agrícola."
 GER_negotiations_with_families_decision: "Ayudar a las §Yfamilias alemanas§!"
 GER_negotiations_with_families_decision_desc: "\n\n\n\n£GFX_GER_families_negotiate_pr\n\n\n\n\n\nEl aumento del coste de la vida, la escasez de viviendas y la incertidumbre económica han supuesto una carga cada vez mayor para los hogares alemanes. El apoyo financiero directo y las inversiones específicas tienen por objeto aliviar las presiones cotidianas, sostener el consumo y reforzar la estabilidad social mientras surten efecto las reformas a largo plazo."
 GER_negotiations_with_corpos_decision: "Aplicar las normas §3europeas§! a las empresas"
 GER_negotiations_with_corpos_decision_desc: "\n\n\n\n£GFX_GER_corpos_negotiate_pr\n\n\n\n\n\nLas grandes empresas que operan en Europa se benefician del mercado único, por lo que se espera que cumplan sus normas. Al reforzar la aplicación de las normas de la UE en materia de competencia, fiscalidad y trabajo, podemos frenar los excesos, restablecer la confianza de los ciudadanos y garantizar que el crecimiento no se produzca a expensas de la equidad o la cohesión social."
 GER_negotiations_with_small_businesses_decision: "Ayudar a las §Ypequeñas empresas§!"
 GER_negotiations_with_small_businesses_decision_desc: "\n\n\n\n£GFX_GER_small_negotiate_pr\n\n\n\n\n\nLas pymes han sido las más afectadas por las recientes crisis, presionadas por los precios de la energía, la caída de la demanda y el endurecimiento del crédito. El apoyo específico a la liquidez y la flexibilización de la normativa tienen por objeto mantener abiertos los comercios, proteger el empleo local y restablecer la confianza en la economía cotidiana."
 GER_carbon_tax_decision: "Crear un impuesto sobre el §7carbono§!"
 GER_carbon_tax_decision_desc: "\n\n\n\n£GFX_GER_carbon_tax_pr\n\n\n\n\n\nEl objetivo de fijar un precio a las emisiones de carbono es alejar a la industria de las prácticas ineficientes y contaminantes sin recurrir a prohibiciones totales. Al hacer explícitos los costes medioambientales, podemos fomentar una producción más limpia, financiar la innovación y orientar la agricultura y la industria manufacturera hacia modelos más sostenibles."
 GER_promote_nuclear_power_in_poland_decision: "Promover la §Henergía nuclear§! en Polonia"
 GER_promote_nuclear_power_in_poland_decision_desc: "El sector energético de Polonia, que depende en gran medida de una infraestructura de carbón obsoleta, adolece de ineficiencia y contaminación. Debemos acelerar los proyectos nucleares para modernizar la red eléctrica, reducir las emisiones y garantizar la estabilidad energética a largo plazo."
 GER_confirm_canada_partner: "Confirmar la asociación con [CAN.GetFlag] §dCanadá§!"
 GER_confirm_canada_partner_desc: "Aunque Canadá no se encuentra en Europa, ha sido un aliado histórico y fiable, un aliado que merece una mayor cooperación. Con la firma de una nueva asociación, ampliaremos considerablemente todos los ámbitos, desde la diplomacia bilateral hasta las relaciones comerciales."
 GER_confirm_british_partner: "Colaborar con los bancos [ENG.GetFlag] §Rbritánicos§!"
 GER_confirm_british_partner_desc: "A pesar de las fricciones políticas, los bancos británicos siguen estando profundamente integrados en las redes financieras del continente. La cooperación puede ser impopular, pero una coordinación pragmática podría aliviar la volatilidad y aumentar la liquidez."
 GER_reinvigorate_the_european_banks_decision: "Revitalizar el sector bancario §3europeo§!"
 GER_reinvigorate_the_european_banks_decision_desc: "Debemos canalizar fondos para estabilizar los principales bancos europeos, armonizar las regulaciones financieras y restablecer el flujo de crédito transfronterizo, lo que sentará las bases para una recuperación resiliente tras la crisis."
 GER_introduce_the_digital_euro_decision: "Introducir el §3euro§! §Cdigital§!"
 GER_introduce_the_digital_euro_decision_desc: "\n\n\n\n£GFX_GER_digital_euro_pr\n\n\n\n\n\nEl lanzamiento de una versión digital del euro modernizaría nuestros sistemas de pago, reduciría la dependencia de plataformas extranjeras y daría a Europa una posición soberana en las tecnologías financieras del futuro."
 GER_confirm_china_partner: "Nuevos acuerdos con industrias §7verdes§! [PRC.GetFlag] §dchinas§!"
 GER_confirm_china_partner_desc: "Estamos dispuestos a abrir determinados sectores a empresas conjuntas con firmas ecológicas chinas a cambio de tecnología verde, entradas de capital y conocimientos industriales fundamentales para nuestra transición, sin sacrificar la soberanía, por supuesto."
 GER_offshore_wind_farms_projects: "Proyectos de §7parques eólicos§! marinos"
 GER_offshore_wind_farms_projects_desc: "Los parques eólicos marinos ofrecen un potencial sin explotar en zonas que antes eran improductivas. Debemos financiar nuevos diseños, ampliar la infraestructura costera y establecer una red eólica marina a largo plazo para impulsar nuestro futuro."
 GER_finish_the_railbaltica_project: "Finalizar el proyecto §YRail Baltica§!"
 GER_finish_the_railbaltica_project_desc: "Rail Baltica es una ambiciosa iniciativa para conectar varios países del Báltico mediante una moderna red ferroviaria que sustituya a las antiguas líneas de la era comunista que aún se siguen utilizando. En los últimos años se han producido importantes retrasos, pero ahora es el momento de completar finalmente este proyecto y dar paso a una nueva era de cooperación económica y política regional más sólida."
 GER_budapest_bucharest_varna_railroad: "Ferrocarril §YBudapest-Bucarest-Varna§!"
 GER_budapest_bucharest_varna_railroad_desc: "Hungría, Rumanía y Bulgaria son miembros de la Unión Europea y de la OTAN que han sido objeto de una grave negligencia por parte de las autoridades de la UE. Todavía luchando con el legado del abandono comunista, gran parte de sus infraestructuras son antiguas y carecen de financiación, con pocos fondos disponibles en sus presupuestos nacionales para esfuerzos de modernización. Sin embargo, es hora de abordar esta gran debilidad y completar una línea ferroviaria moderna que conecte varias ciudades importantes de la región y acerque sus economías."
 GER_munich_milan_railroad: "Ferrocarril §YMúnich-Milán§!"
 GER_munich_milan_railroad_desc: "Italia es una parte importante de la economía de la Unión Europea que necesita una atención especial en materia de infraestructuras, lo que será el objetivo de este nuevo y ambicioso proyecto ferroviario. Una nueva línea ferroviaria que conecte las principales ciudades de Múnich y Milán ampliará sin duda nuestras oportunidades de comercio y cooperación bilateral."
 GER_consolidate_the_euro_position: "Consolidar la posición del §3euro§!"
 GER_consolidate_the_euro_position_desc: "Con el dólar debilitado, es esencial estabilizar y promover el euro como moneda de reserva y de comercio fiable. Las señales fiscales coordinadas, las garantías de liquidez y las medidas de confianza del mercado tienen por objeto afianzar el euro como estándar mundial en un orden financiero fracturado."
 GER_batteries_dynamic_decision: "Red de baterías inteligentes: [FROM.GetName]"
 GER_city_green_power_grids: "Redes eléctricas para ciudades §7verdes§!"
 GER_city_green_power_grids_desc: "\n\n\n\n£GFX_GER_green_grids_pr\n\n\n\n\n\nLos sistemas eléctricos urbanos deben evolucionar. El apoyo a la expansión de las redes inteligentes, los centros de energía descentralizados y el almacenamiento de energía limpia hará que nuestras ciudades sean más eficientes, resilientes y estén preparadas para satisfacer la creciente demanda."
 GER_launch_the_rearm_europe_plan_decision: "Iniciar el lan §YReArm§! §3Europe§!"
 GER_invest_in_the_european_defense_industries_decision: "Invertir en §Yindustrias de defensa§! §3europeas§!"
 GER_invest_in_the_european_defense_industries_decision_desc: "Debemos destinar fondos públicos a impulsar la producción militar-industrial de Europa, modernizar las líneas de producción y garantizar la autonomía estratégica mediante la resiliencia industrial a largo plazo y la competitividad de las exportaciones."
 GER_invest_in_the_european_military_red_decision: "Invertir en §YI+D militar§! §3europeo§!"
 GER_invest_in_the_european_military_red_decision_desc: "Inyectar liquidez en la I+D militar avanzada contribuirá a garantizar la innovación a largo plazo, ampliar las redes de investigación europeas y acelerar el desarrollo de capacidades de defensa de próxima generación."
 GER_european_taurus_project_decision: "Proyecto §YTaurus§!: un tanque §3europeo§!"
 GER_european_taurus_project_decision_desc: "\n\n\n\n£GFX_GER_main_battle_tank_pr\n\n\n\n\n\nEl proyecto Taurus tiene como objetivo desarrollar un carro de combate principal europeo estandarizado. Al unificar el diseño y la adquisición, reducimos la duplicación y reforzamos las fuerzas terrestres continentales para las próximas décadas."
 GER_leonardo_rheinmetall_joint_decision: "Consorcios §ALeonardo§!-§3Rhein§!§gmetall§!"
 GER_leonardo_rheinmetall_joint_decision_desc: "Patrocinaremos consorcios entre firmas europeas como Leonardo y Rheinmetall para consolidar los fragmentados mercados de armas y ampliar los sistemas comunes con el fin de lograr un armamento más rápido, barato y más integrado."
 GER_promote_polish_militarization_decision: "§YImpulsar§! la militarización §Rpol§!aca"
 GER_promote_polish_militarization_decision_desc: "Polonia tiene tanto la voluntad como la posición fronteriza para convertirse en un pilar clave de la defensa europea. Con subvenciones y acuerdos específicos, podemos impulsar su militarización y aumentar las posibilidades de éxito del plan."
 GER_new_military_installations_in_romania_decision: "Nuevas §Yinstalaciones militares§! en §BRu§!§Yma§!§Rnia§!"
 GER_new_military_installations_in_romania_decision_desc: "La ubicación oriental de Rumania la convierte en un lugar estratégico. Invertiremos en infraestructura local para apoyar despliegues rápidos, probar la logística y ampliar el alcance de la disuasión europea."
 GER_american_military_testzone_decision: "Probar §Yarmas§! en [USA.GetFlag] §RNorteamérica§!"
 GER_eastern_european_drone_silos_decision: "§YSilos de drones§! en Europa Oriental"
 GER_eastern_european_drone_silos_decision_desc: "Los drones son el futuro de la guerra. Debemos ampliar y fortalecer la infraestructura de silos para drones en toda Europa Oriental a fin de garantizar la capacidad de respuesta rápida, la disuasión regional y opciones de ataque a larga distancia escalables."
 GER_upgrade_drone_production_decision: "Mejorar la producción §3europea§! de drones"
 GER_upgrade_drone_production_decision_desc: "Invertir en la fabricación avanzada de drones mejorará las capacidades de guerra autónoma de Europa, reducirá los cuellos de botella en el suministro y reforzará la profundidad estratégica en todos los teatros de operaciones."
 GER_mine_lithium_decision: "Extraer §Ylitio§! en §YSajonia-Anhalt§!"
 GER_mine_lithium_decision_desc: "El descubrimiento de yacimientos de litio ofrece una oportunidad única para fortalecer las cadenas de suministro nacionales. Al iniciar la extracción controlada en Sajonia-Anhalt, podemos apoyar la producción de baterías, promover la autonomía estratégica y reactivar la industria regional vinculada a las tecnologías del futuro."

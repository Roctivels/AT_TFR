 GER_russian_energy_dependence_idea: "Dependencia en energía rusa"
 GER_russian_energy_dependence_idea_desc: "Alemania depende excesivamente de la energía rusa, en concreto del gas natural, gracias a contratos a largo plazo y gasoductos como Nord Stream. Inicialmente, Rusia ofrecía una fuente de gas natural estable y relativamente económica, atractiva para nuestro creciente sector industrial y nuestras necesidades energéticas, y que proporcionaba beneficios a corto plazo. Sin embargo, con el tiempo, las vulnerabilidades de esta situación se han hecho especialmente evidentes durante las crisis geopolíticas, y el control de Rusia sobre el suministro energético alemán podría otorgarle una influencia indebida en nuestras políticas, lo que genera preocupación por la seguridad nacional."
 GER_bundeswehr_shortcomings_idea: "Deficiencias extremas de la Bundeswehr"
 GER_bundeswehr_shortcomings_idea_desc: "De todos los ejércitos europeos, nuestra Bundeswehr es la más patética. Con una falta crónica de fondos, equipo, personal y entrenamiento, la Bundeswehr en su estado actual está lamentablemente preparada para cualquier conflicto en el futuro. En parte, nuestra actitud antimilitarista es responsable, y haría falta una gran crisis para convencer al resto de Europa de que la militarización alemana es necesaria."
 GER_german_legacy_idea: "Deutsches Vermächtnis"
 GER_german_legacy_idea_desc: "En los últimos 100 años, el legado alemán ha sido uno de vergüenza, opresión, genocidio y dictaduras. Desde el káiser derramando la sangre de millones en los campos de Europa Occidental, pasando por la brutal masacre nazi que desangró Europa, hasta el Gobierno de la Alemania Oriental, cuya sofisticada policía de Estado definió el significado de \"autoritarismo\" durante décadas, Alemania nunca debe olvidar su turbulento pasado. La nación tiene un odio jurado a la hipermilitarización, lo cual causa una escasez de hombres para la Bundeswehr. Para asegurarse de que Alemania nunca pueda volver a destruir Europa, las ideologías extremistas como el comunismo y el nazismo son impopulares en Alemania y son reprimidas activamente por el Gobierno para asegurarse de que los errores del siglo XX nunca vuelvan a repetirse."
 GER_bundeswehr_shortcomings_german_legacy_dummy_idea: "Deficiencias extremas de la Bundeswehr §Wy§! Legado Alemán"
 GER_merkelreich_idea2: "Merkelreich"
 GER_merkelreich_idea2_desc: "Angela Merkel ha sido un bastión de estabilidad en la política alemana durante los últimos 15 años. Bajo su liderazgo, Alemania se ha visto encaminada hacia una era de prosperidad gracias a su papel como uno de los líderes clave de la Unión Europea, al tiempo que aseguraba la paz, tanto a nivel interno como con los rusos. Sin embargo, con el fin de la era Merkel, tras el anuncio de que no buscará la reelección en 2021, el futuro de Alemania es cada vez más incierto. Con los conflictos aún en aumento por la crisis migratoria, los problemas económicos que se vislumbran en el horizonte y unos Estados Unidos cada vez más inestables, ¿Cuánto durará realmente la estabilidad interna alemana?"
 GER_merkelreich_idea: "Merkelreich"
 GER_merkelreich_idea_desc: "Angela Merkel ha sido un bastión de estabilidad en la política alemana durante los últimos 15 años. Bajo su liderazgo, Alemania se ha visto encaminada hacia una era de prosperidad gracias a su papel como uno de los líderes clave de la Unión Europea, al tiempo que aseguraba la paz, tanto a nivel interno como con los rusos. Sin embargo, con el fin de la era Merkel, tras el anuncio de que no buscará la reelección en 2021, el futuro de Alemania es cada vez más incierto. Con los conflictos aún en aumento por la crisis migratoria, los problemas económicos que se vislumbran en el horizonte y unos Estados Unidos cada vez más inestables, ¿Cuánto durará realmente la estabilidad interna alemana?"
 GER_deutsche_marine_revitalization_idea: "Revitalización de la Deutsche Marine"
 GER_deutsche_marine_revitalization_idea_desc: "La Deutsche Marine, encargada de las operaciones navales, la defensa marítima y las misiones marítimas internacionales de Alemania, necesita revitalizarse. Nuevas doctrinas y un mayor énfasis en la construcción naval la ayudarán en este aspecto."
 GER_mass_tank_production_idea: "Producción de tanques en masa"
 GER_mass_tank_production_idea_desc: "Nuestras fábricas están produciendo más tanques de lo habitual. Acumularemos una gran reserva para cumplir con nuestras cuotas de equipo y garantizar que la Bundeswehr nunca sufra una escasez de tanques como la de hace apenas unos años."
 GER_mass_mechanization: "Mecanización en masa"
 GER_mass_mechanization_desc: ""
 GER_blind_eye_to_army_extremism_idea: "Vista gorda al extremismo"
 GER_blind_eye_to_army_extremism_idea_desc: "Principalmente por desesperación, permitiremos que cualquiera, sin importar sus creencias, se una a nuestras fuerzas armadas. Claro, esto podría convertir a la Bundeswehr en una fuerza mucho menos organizada y respetada, y podría dar lugar a atrocidades a nuestras espaldas, pero deberíamos poder cumplir con nuestras cuotas de personal con mayor facilidad."
 GER_purged_extremist_soldiers_idea: "Se purgó soldados extremistas"
 GER_purged_extremist_soldiers_idea_desc: "Para garantizar que nuestros soldados permanezcan leales a la República Federal y no se construyan con odio, la Bundeswehr ha sido depurada de cualquier tipo de radicalismo dentro de sus filas. Si bien esto podría resultar perjudicial a corto plazo, se espera que la Bundeswehr experimente los beneficios de no enfrentarse a la deslealtad ni al extremismo en el futuro."

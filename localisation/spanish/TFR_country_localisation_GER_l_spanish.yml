 TFR_Anarchy_ZZZ_tt: "§RCatarsis§!"
 TFR_Anarchy_ZZZ_tt_delayed: "Lo único que anhela toda persona es el cálido abrazo de otra.\nVes los edificios fríos y estériles, cristal a través de cristal mientras fuerzas una sonrisa a extraños. Estás rodeado de muchos, pero la soledad persiste, como una serpiente que se enrosca en tu cuello.\n\nRecuerdas que te dijeron que el esfuerzo da sus frutos.\nRecuerdas que te dijeron que si te esfuerzas primero, disfrutarás de la vida después.\n\nLa gratificación tardía se ha convertido en una broma.\n\nTe dicen que está mal enfadarse, que está mal llorar y que está mal sonreír.\nEl plástico se convierte en porcelana mientras te obligan a usar una versión de ti mismo que no eres tú.\nLa familia se ha atomizado más allá de lo creíble; hay cada vez menos tiempo y motivación para ser humano, y en los rincones oscuros de los apartamentos, puedes sentir el aguijón.\n\nSe prometió un futuro, pero ha sido desechado en el altar de la Pureza.\nVes los anuncios de otras personas que lo tienen mejor; podrías haber tenido esa vida.\nDuele.\n\nEl hombre estaba destinado a crear, el hombre estaba destinado a sentir, y el hombre estaba destinado a sangrar.\nQuita eso, y todo lo que queda es una bestia con colmillos afilados y un corazón amargo.\n\nNo queda filosofía para salvarlos, ni arma de fuego lo suficientemente potente para detenerlos.\nNo importa cuánto ardan las ciudades, mientras ardan.\nEl futuro está perdido, las tiendas son saqueadas y las calles están cubiertas de violencia, un estallido carnal destinado a cicatrizar el alma.\n\nLas reglas cuidadosamente diseñadas para mantener al hombre atrapado en una sociedad educada e insincera están siendo destrozadas, no para alcanzar algún tipo de paraíso, sino para asegurar que este mundo ya no tendrá un futuro sin futuro, para asegurar que sus hijos no tendrán que vivir en un mundo como este.\n\nPuñales en los ojos de los burócratas, un hacha de bombero en la espalda de un gerente de recursos humanos, dientes hundiéndose en los cuellos de los críticos, que se ahoguen en su propia perfección, que vean cuán puro puede ser el hombre.\n\nSolo quieres romperte la nariz."

 germany.1111.t: "Odio sobre todo"
 germany.1111.d: "Durante décadas nos inculcaron que odiáramos a nuestra propia gente; nuestra existencia era un pecado ante el orden mundial liberal; preferían desplazarnos, anteponer a los extranjeros a sus propias familias. Nos enseñaron a ser débiles, a renunciarn a lo que nuestros antepasados nos dieron, a descuidar nuestro orgullo y nuestra herencia.\n\n¿Y qué nos trajo eso? La mente colmena de la multipolaridad se desplomó más allá de nuestras fronteras, violando nuestras ciudades como lo hizo en el pasado, dejando cicatrices en nuestros seres queridos, destruyendo nuestros monumentos y provocando otro tumor de vergüenza en nuestro pueblo. Rusia ganó la primera guerra, una cicatriz que no se puede eliminar tan fácilmente.\n\nUna cicatriz que supura, que genera una rabia que nos enseñaron a enterrar durante décadas. El odio es un veneno, pero también nos abrió los ojos. Nos deshicimos de todos ellos: los aduladores neoliberales, los extranjeros, los cultistas del capital y los conservadores de voluntad débil; una purificación del alma europea.\n\nAprendimos a odiar de nuevo.\nY todos coincidimos: la venganza unifica, cura el pacifismo nihilista y el arma que necesitábamos para apuñalar el corazón de Rusia. Con las armas de Europa, el odio rabioso en la mirada y el desprecio total por conceptos obsoletos como la ética y las reglas de combate, infligimos una herida espiritual tan profunda en el espíritu ruso que nunca más se atreverá a salir a la luz.\n\nEuropa era hermosa.\nY lo volverá a ser.\n\nCon nuestras patrias bajo nuestra mirada de acero, hemos tomado el destino en nuestras manos.\nY nunca lo soltaremos."
 germany.1111.a: "¡Comunismo, nunca más!"
 germany.2222.t: "El Corazón Latiente de la Revolución"
 germany.2222.d: "Un nuevo mundo despierta de la enfermedad del capitalismo. Durante décadas, el mundo estuvo bajo el yugo del capital y la tiranía.\n\nEl capital se había debilitado en Occidente a medida que los autoritarios en Oriente lo llevaban hasta su conclusión lógica, invadiendo a los pueblos de Europa. Al final, se perdieron innumerables vidas, todo en vano, solo para beneficio de imperialistas y parásitos codiciosos. Se creía que el comunismo era una idea descabellada que finalmente llegó a su fin hace 40 años. Una fiebre que sacudió al mundo y que nunca volvería. Tenían razón.\nEntonces despertamos.\n\nSe alzaron banderas rojas en las capitales de Europa, derribando los íconos del capital, la pureza y el orden. El momento de la revolución fue ayer, pero ahora también es un buen momento. Se ha afirmado que el comunismo murió y ha fracasado, pero ¿significaba eso que debíamos rendirnos? El amor fracasó innumerables veces, ¿deberíamos haber renunciado al amor?\n\nCon nuestras cadenas rotas y nuestros opresores habiendo recibido su castigo final, todo un reino al este esperaba con ansia nuestra liberación. Con el corazón lleno de fervor y las armas en la mano, marchamos y marchamos hacia el este, hasta que ninguna ciudad quedó sin la bandera roja de los trabajadores internacionales izada sobre las ruinas del fascismo.\n\nLo que queda es un coro unificado del pueblo liberado de Eurasia, una melodía tan hermosa, pero en la que faltan las voces de América, Asia y África. Hoy celebraremos nuestra victoria, nuestro gran regreso y lloramos a quienes amamos y perdimos.\n\nPero mañana, el resto del mundo se unirá a nosotros en el coro de los liberados."
 germany.2222.a: "...una canción para todo el pueblo."
 germany.3333.t: "La historia se frena"
 germany.3333.d: "Decir que Europa no es un continente con una rica historia sería una mentira descarada, pero afirmar que no tenemos páginas negras en nuestros libros de historia sería otra mentira descarada.\n\nEl fin de la historia, la idea de que cualquier idea de extremismo sería considerada irrelevante e indeseable, Europa se sentía tranquila al pensar que palabras amables e ideales más elevados garantizarían una paz tranquila en todo el mundo.\nPor supuesto, nuestros rivales al este discrepaban de esta paz.\n\nComo una horda, cayeron sobre nuestros aliados, nuestros amigos y nuestra familia, quemando todo lo que amábamos hasta que la mascarada de Nuestra Democracia se vio obligada a admitir la derrota ante la amenaza rusa.\nEl extremismo es como un juguete y, en momentos de gran desesperación, volvemos a nuestra infancia, con ganas de jugar y destruir. Sin embargo, nos aseguramos de que los adultos siguieran al mando, libres de las ataduras de la incertidumbre. Nos dimos cuenta de que íbamos por buen camino; solo necesitábamos aprender que debíamos hacer más, por Nuestra Democracia y por la paz.\n\nCuando llegó el momento oportuno, cuando nuestros jóvenes se convirtieron en soldados y nuestras oficinas en fábricas, nos aseguramos de llevar la llama de la libertad al este, y de incendiar el corazón de la tiranía en Moscú.\n\nCon la paz alcanzada de nuevo en todo el continente, la historia se ha detenido una vez más.\nComo un barco en la tormenta, mantendremos nuestro rumbo.\nEsto no es cambio, ni siquiera un cambio gradual.\nEs control. Sobre nosotros mismos y el mundo.\n\nEsta vez, para siempre."
 germany.3333.a: "El ciclo se detiene una vez más."

 germany.92.t: "Formación de la Internacional Europea"
 germany.92.d: "Una bandera roja se ha extendido sobre Europa tras la declaración alemana de la formación de la Internacional Europea, una alianza de seguridad colectiva que debe sustituir a la OTAN. Con el objetivo declarado de extender la revolución por toda Europa, Alemania ha enviado apoyo a los socialistas de otros países de Europa Occidental, como Francia, Grecia y España. Ante la violencia revolucionaria de la izquierda que azota Europa Occidental como una feroz reacción a la derrota ante el Imperio ruso, es casi seguro que la Internacional Europea pronto incluirá a más países además de Alemania.\n\nEl Imperio ruso ya ha condenado este anuncio, afirmando estar \"dispuesto a exorcizar el demonio del bolchevismo de Europa una vez más si es necesario\", y las imágenes satelitales indican un aumento de la actividad militar rusa en las regiones ocupadas de Polonia. Mientras Alemania prosigue su rearme y reconstrucción tras la Guerra Europea, muchos se preguntan si este acontecimiento es simplemente un paso más hacia la guerra en una época donde la paz se logró con tanto esfuerzo."
 germany.92.a: "Europa vuelve a acercarse a la guerra."
 germany.93.t: "Activistas de Die Linke filtran movimientos"
 germany.93.d: "La guerra con Rusia ha causado muchas muertes evitables, tanto civiles como militares, pero ante la agresión rusa a la soberanía de nuestros aliados, no podríamos habernos quedado de brazos cruzados. Sin embargo, algunos de nuestros compatriotas no parecen estar de acuerdo.\n\nActivistas de Die Linke han logrado divulgar los movimientos de tropas de la OTAN, y dicha información sin duda sería utilizada por los rusos en nuestra contra. Estos activistas afirman haberlo hecho en nombre de la paz, pero parecen olvidar que más ciudadanos nuestros correrán peligro debido a sus acciones.\n\nIndependientemente de sus motivos, filtrar información tan vital se considera alta traición a la República Federal.\n\nQuienes no han huido del país han sido arrestados y, con pruebas tan flagrantes de sus actos, se enfrentan a cadena perpetua. Ahora tenemos que afrontar las consecuencias de sus actos y replantear nuestras estrategias para ganar esta guerra."
 germany.93.a: "¡Antipatrias!"
 germany.94.t: "El portavoz de los yihadistas árabes advierte a las fuerzas de la OTAN"
 germany.94.d: "\"Ciudadanos del mundo,\" empezó tranquilamente el portavoz, \"estáis por presenciar una guerra santa de proporciones épicas. Los traicioneros occidentales se han estado escondiendo en su guarida, planeando y maquinando sus planes para erradicar el mundo musulmán. ¡Ellos han estado preparando una guerra de exterminio contra nuestro bastión sagrado del Islam!' El portavoz ahora era más agresivo y hablaba más alto.\n\n\"OTAN... vuestros soldados débiles de voluntad no tienen oportunidad contra los mártires. Han fallado en Afganistán. Han fallado en Irak. Han fallado en Somalia. ¡Vosotros... Vosotros fallaréis en Arabia!\" Sacó su Carabina M4, levantándola al aire, y dio su última advertencia: \"¡ALÁ NO OS PERMITIRÁ GANAR! ¡ÉL YA HA DESTRUIDO A VUESTRO TITIRITERO ESTADOUNIDENSE , Y PRONTO HARÁ LO MISMO CON VOSOTROS! ¡ÉL OS ANIQUILARÁ Y OS DARÁ UNA MUERTE ABRASADORA! ¡ÉL OS INCINERARÁ UNA Y OTRA VEZ HASTA QUE VUESTRA SOMBRA SEA LO ÚNICO QUE QUEDE! ¡ALLAHU AKBAR!\""
 germany.94.a: "Que amenazas tan pomposas, ¡Saben que están acabados!"
 germany.95.t: "Orden de retirada de Arabia Saudita"
 germany.95.d: "Los resultados de la operación militar en Arabia Saudita para debilitar la resistencia del yihadismo no auguran nada bueno en términos de continuidad. La región y la operación han demostrado ser un agujero negro en términos de gasto militar y personal, ya que cualquier cosa que enviemos allí (nuevas armas, soldados, tanques, helicópteros) no puede cambiar el curso de la guerra. Los yihadistas han presentado una dura batalla, armados con el equipo que capturamos, financiados por nuestros enemigos y respaldados por la experiencia, especialmente de Irak, Somalia, Siria y Afganistán.\n\nLas bajas de la OTAN superan a las de la yihad, nuestra economía ha sido golpeada por el esfuerzo bélico y la opinión pública ya no apoya esta guerra. La retirada es ahora necesaria, pues ya nos hemos adentrado en uno de los peores desastres militares del siglo XXI."
 germany.95.a: "Nuestros esfuerzos han sido en vano..."
 germany.96.t: "Intervención en Arabia Saudita"
 germany.96.d: "Con los yihadistas tomando Arabia Saudita y miles de refugiados huyendo del país, era solo cuestión de tiempo que nos pusiéramos de acuerdo en poner fin a la amenaza terrorista en la península Arábiga, a pesar de ya se ha hecho mucho daño.\n\nHistorias de asesinatos masivos, destrucción de patrimonio cultural e histórico y el fomento del terrorismo en otros países, no podemos ponernos y dejarles reconstruir y que permanezcan como una lacra en el mundo libre, por lo que se harán preparaciones para invadir los territorios controlados por los terroristas en colaboración con otros países en Medio Oriente y cualquier fuerza insurgente dispuesta a ayudarnos, el pueblo árabe no deberá vivir con miedo constante y nosotros habremos mostrado al mundo que vamos en serio cuando decimos que la libertad y la democracia debe extenderse por todos lados.\n\nHaremos frente al extremismo, resistiremos el terror y liberaremos a los oprimidos."
 germany.96.a: "Gemeinsam gegen den Terror."
 germany.97.t: "Desfile de la Victoria en Kiev"
 germany.97.d: "Por fin ha terminado. Los salvajes rusos han sido masacrados en el campo de batalla, intentando huir cobardemente y en desgracia tras la democracia europea y la antorcha del sufragio. Sin embargo, nuestro trabajo aún no ha terminado, pues las secuelas persisten.\n\nSin embargo, esto amerita celebración. Hemos aniquilado la principal amenaza para nuestras instituciones y la justa lucha por la libertad continental. Este desfile será un símbolo de unidad, no de división y estancamiento, sino un símbolo de amistad contra la tiranía.\n\nPuede que los cuerpos se hayan tambaleado, pero nuestro viaje los ha vengado. ¡Marchemos hacia adelante y demostremos al mundo que siempre hemos sido victoriosos desde nuestra fundación!"
 germany.97.a: "No pudieron ver la luz, sintieron el calor."
 germany.98.t: "Inicio de la OPERACIÓN: GLOBAL ENFORCER"
 germany.98.d: "Me dirijo a ustedes hoy con alegría y triunfo. La democracia global ha logrado victorias necesarias en los últimos años y ha visto al continente europeo completamente a salvo de la marea antidemocrática que parecía surgir de las desgracias de principios de la década. Todos hemos asistido a las celebraciones y bebido nuestra copa de champán, pero ahora es el momento de mirar hacia adelante y a las necesidades del mañana.\n\nEn todo el mundo, los regímenes totalitarios continúan reprimiendo a su población con las políticas más brutales. En Siria, el régimen utiliza armas químicas y rifles contra manifestantes pacíficos. En Irán, utilizan cartuchos de gas y porras contra mujeres simplemente por aparecer en público sin velo. No olvidemos Afganistán, donde la desviación islámica radical ha propagado una ideología de odio por toda Asia Central. Estos regímenes representan lo peor de la humanidad, pero tenemos la oportunidad de ayudar a estos países a convertirse en ejemplos de lo mejor.\n\nYa no toleraremos tiranos. Ya no cederemos ante quienes esclavizan a su pueblo. Hoy, todas nuestras democracias se rinden y declaran ante los tiranos: \"Hoy es vuestro día\". Si no ceden, ellos y sus aliados se enfrentarán al poder colectivo del mundo libre y su poder será destrozado ante la mirada de su pueblo."
 germany.98.a: "¡El mundo se librará del autoritarismo!"
 germany.99.t: "INFORME DE PRIMERA LÍNEA: [GetDateText]"
 germany.99.d: "DE: PRESIDENTE DEL COMITATO MILITARE DELL'UNIONE EUROPEA, CLAUDIO GRAZIANO\n\nExpreso mi más sincero pesar por la información revelada en esta carta. La resistencia libia en el punto de invasión 'Salah' fue inesperadamente feroz y bien organizada. A pesar de semanas de bombardeos aéreos contra fortificaciones y sistemas de defensa aérea enemigos, el 11º Grupo de Portaaviones sufrió pérdidas aéreas igualmente graves sobre los cielos de Tobruk mientras realizaba ataques contra el Parlamento libio. Por lo tanto, no pudieron defender a los hombres en las playas mientras intentaban aprovechar la brecha. Nuestras fuerzas fueron repelidas y, dicho sin rodeos, destruidas. Se determinó que el sector era insostenible y el Estado Mayor acordó abandonarlo. Los esfuerzos para recuperar a los hombres varados en el punto 'Salah' tuvieron éxito, pero la fuerza recuperada palidece en comparación con las vidas perdidas y los prisioneros.\n\nLas imágenes de las secuelas del punto Salah son horrorosas, y estoy dispuesto a comparecer ante la Comisión Europea y asumir toda la responsabilidad del desastre.\n\nFIRMADO - "
 germany.99.a: ""
 germany.100.t: "Discriminación contra los rusos en el Báltico"
 germany.100.d: "Los Estados bálticos de Letonia, Estonia y Lituania sufrieron las peores consecuencias de la agresión rusa a lo largo de la historia y en la reciente guerra. Miles de jóvenes muertos, el campo devastado y las escasas ganancias materiales para estas naciones han provocado la radicalización de la juventud y los veteranos descontentos del país. Esta insatisfacción con el statu quo de la posguerra se ha atribuido a las considerables minorías rusas del país, y los numerosos grupos ultranacionalistas surgidos tras la guerra han comenzado a acosarlas.\n\nEl Gobierno ha hecho la vista gorda ante estas recientes acciones, y muchos funcionarios las han elogiado sutilmente. Un diputado liberal por Estonia argumentó que \"cualquier injusticia que sufran los rusos en Estonia palidece en comparación con la infligida a nuestro pueblo por los imperialistas rusos, los soviéticos y los putinistas\". Un alcalde letón declaró que \"los jóvenes de nuestra nación tienen derecho a proteger nuestras fronteras y castigar a los colaboradores\" al ser informado de los ataques antirrusos en su ciudad.\n\nLos ataques más recientes contra personas de etnia rusa del fin de semana pasado han causado ocho muertos y más de cincuenta heridos, y el problema parece agravarse. Los líderes locales de la minoría rusa en estas naciones han argumentado que estos actos de discriminación son ilógicos y contradicen los principios pluralistas; señalan el servicio de personas de etnia rusa en los ejércitos del Báltico y su negativa a colaborar con las fuerzas rusas en muchos casos como prueba de que son tan buenos ciudadanos como sus vecinos.\n\nLa minoría rusa ha pedido ayuda a Berlín y ha presionado a los Gobiernos del Báltico para que pongan fin a las injusticias y garanticen la protección de sus derechos democráticos."
 germany.100.a: "¡El pueblo ruso ya ha sufrido bastante! Que se detengan."
 germany.100.b: "Los rusos aprenderán la lección de una forma u otra."
 germany.101.t: "Se estrena \"Los mejores del infierno\""
 germany.101.d: "\"Los mejores del infierno\" comienza con el crepitar de los disparos en las calles heladas de Varsovia. La cámara enfoca una carga de soviéticos sin rostro que se abalanzan sobre una línea de ametralladoras, aniquilando a sus hombres en oleadas. Entre los defensores se encuentra el Oberleutnant Erik Voss, con la cara manchada de tierra, ladrando órdenes a sus hombres. Una última resistencia, considerada imposible, que de alguna manera resisten.\n\nLa película se traslada a las llanuras al norte de la ciudad, donde el mayor Klaus Ritter lidera los maltrechos restos de su división a través de bosques humeantes en medio de una ofensiva de tanques. Los hombres de Ritter luchan desde los esqueletos de los edificios, desesperados y superados en número. La cámara se detiene en un joven soldado, apenas un niño, que agarra su rifle con manos temblorosas antes de lanzarse a la refriega con solo una bayoneta.\n\nLa narrativa regresa a Varsovia, la ofensiva final mientras la línea se derrumba. Soldados soviéticos vestidos de rojo se besaban mientras los invasores mongoles marchaban por calles resbaladizas por la lluvia, con las culatas de los fusiles destrozando las ventanas, erradicando los últimos remanentes alemanes. El capitán Wilhelm Brandt se encuentra en un búnker de mando, escuchando transmisiones soviéticas interceptadas. Estaban rodeados. El frente está perdido. Enciende un cigarrillo, exhala y se gira hacia sus hombres. «Entonces lucharemos».\n\nEl clímax es puro espectáculo. El último batallón, rodeado, lucha hasta el final. Mientras los tanques soviéticos avanzan, no se rinden. Un nido de ametralladoras dispara hasta que sus cañones se funden. Ritter, reencontrado con Voss, herido, se apoya contra una pared, revólver en mano, con las recámaras vacías resonando. Los soviéticos los abruman, sin rostro, monstruosos, sin identidad. Uno a uno, los alemanes caen. La toma final: una panorámica lenta sobre una ciudad en ruinas, los cuerpos de Ritter y Voss en la nieve, sus cruces de hierro brillando en el frío, mientras el narrador glorificaba al último de los soldados alemanes:"
 germany.101.a: "Fueron los mejores del infierno."
 germany.102.t: "Las defensas circasianas colapsan"
 germany.102.d: ""
 germany.102.a: "¡Debemos preparan una nueva línea defensiva!"
 germany.103.t: "Las defensas ucranianas colapsan"
 germany.103.d: "¡Las fuerzas rusas han alcanzado el Dniéper! ¡Los intentos para acabar con la cabeza de playa fueron inútiles, se están haciendo nuevos planes para una línea defensiva pero tal vez Kiev debe ser abandonada!"
 germany.103.a: "¡Debemos preparan una nueva línea defensiva!"
 germany.103.b: "El fin está cerca..."
 germany.104.t: "Industria alemana seriamente dañada"
 germany.104.d: "¡En una inusual brecha en el espacio aéreo alemán, bombarderos rusos atravesaron las defensas antiaéreas del frente y se adentraron en nuestro territorio, alcanzando nuestra patria dañando importantes instalaciones de producción bélica!"
 germany.104.a: "¡¿Dónde está la Luftwaffe?!"
 germany.105.t: "Oficiales de EE.UU. ordenados regresar"
 germany.105.d: "En medio del creciente caos y malestar entre la población de Estados Unidos, oficiales estadounidenses han sido retirados apresuradamente de sus despliegues en el extranjero, y los que permanecen lo harán en los próximos días. Esta es una noticia terrible, pero parece demostrar que la situación en Estados Unidos es incluso peor de lo que nos habían dicho.\n\nPor supuesto, esto significa que estamos prácticamente indefensos. Por primera vez en mucho tiempo, Europa podría quedar en paz. Algunos celebran la noticia, pero muchos guardan silencio. Es un presagio de tiempos difíciles por venir."
 germany.105.a: "Oremos para que esto no se agrave..."
 germany.106.t: "Presión a Visegrado para que adopte el euro"
 germany.106.d: "Con los recientes acontecimientos, nos hemos dado cuenta de que la Unión Europea necesita más unidad que nunca y una mayor centralización para garantizar el buen funcionamiento de nuestra unión.\n\nSin embargo, incluso ahora, el grupo de Visegrado sigue siendo una espina en nuestro costado: Hungría, Polonia, Eslovaquia y la República Checa aún no han adoptado el euro como moneda principal, y hoy nos esforzaremos por garantizar una transición fluida a nuestra moneda común.\n\nCon la combinación de campañas públicas y apoyo financiero a grupos que apoyan nuestra causa, podemos presionarlos, poco a poco, para que se adapten a nuestra moneda."
 germany.106.a: "Todos compartimos los mismos valores."
 germany.107.t: "Visegrado se disuelve"
 germany.107.d: "El Grupo de Visegrado, durante mucho tiempo una espina clavada en la Unión Europea, finalmente ha visto los frutos que la UE puede ofrecer: disolvió oficialmente su unión política y se comprometió con el proyecto europeo. El sueño de la federalización europea parece cada vez más probable con el paso de los años."
 germany.107.a: "¡Fantástico!"
 germany.108.t: "Visegrado sigue desafiante"
 germany.108.d: "El Grupo de Visegrado se opone firmemente a los intentos de federalizar la Unión Europea, buscando mantener su soberanía por encima de cualquier otro objetivo. Esta declaración firmada por los líderes del Grupo de las Cuatro Naciones supone un duro golpe para las ambiciones europeas, ya que todo, desde la federalización hasta el fortalecimiento de la defensa unificada de Europa, se ve obstaculizado por sus intentos de mantener la soberanía."
 germany.108.a: "Un golpe a la Unión..."
 germany.109.t: "Recuperación de las inundaciones finalmente completa"
 germany.109.d: "Se han puesto en marcha proyectos gubernamentales para ayudar a las áreas por el Rin que fueron dañadas durante las inundaciones de 2021, aquellas fueron las peores que habíamos visto en años recientes y los esfuerzos de recuperación fueron pobres, pero el Bundestag finalmente ha puesto los fondos necesarios y se ha producido un desarrollo para declarar el área recuperada, pero ahí no acaba la recuperación, pues el Bundestag ha anunciado planes para reformar los planes de contingencia ante inundaciones por toda la nación, haciendo énfasis en un aumento de la vegetación de las ciudades para que absorba más agua durante lluvias torrenciales. Apodado \"ciudades esponjas\", el plan supondría una actualización de la planificación urbana actual al aumentar la cantidad de árboles, las cubiertas de tierra y parques públicos además de un cambio total desde el hormigón hasta el alcantarillado. Alemania está determinada para asegurar que una mera inundación nunca vuelva a dañar el Rin de la misma forma que los anteriores."
 germany.109.a: "¿Ciudades esponja, eh?"
 germany.110.t: "Industria alemana relocalizada a Anglia Oriental"
 germany.110.d: "Con el avance de las fuerzas rusas, las industrias vitales deben ser evacuadas a un lugar seguro, las islas británicas ofrecen un refugio seguro para nuestras industrias para que puedan continuar su vital trabajo para el esfuerzo bélico. Puede que sea impopular mover nuestra industria oriental más importante hacia Anglia Oriental, ¡Pero es mejor que dejársela gratis al enemigo!"
 germany.110.a: "¡La desesperación llama a la acción!"
 germany.111.t: "Fuerzas polacas se reagrupan en Fráncfort del Óder"
 germany.111.d: "Aunque Polonia haya caído, sus remanentes se han reconstituido en Fráncfort del Óder, ofreciéndose al alto mando alemán. Hemos aceptado con gusto, a pesar de que Varsovia haya caído, ¡Polonia aún no está perdida!"
 germany.111.a: "¡El destino les espera!"
 germany.112.t: "Reparaciones rusas"
 germany.112.d: "Rusia causó esta guerra por nada más que avaricia por tierras e influencia perdida, cientos de miles, tal vez millones murieron en las manos de la avaricia. Por nuestra sangre derramada, los agresores deben pagar tal y como nosotros hicimos no una sino dos veces. Algunos críticos dicen que presionar por reparaciones causará otra bomba de tiempo como la República de Weimar, pero nosotros pagamos las reparaciones la segunda vez y estamos perfectamente, y necesitamos el dinero para recuperarnos."
 germany.112.a: "¡Ellos pagarán por este devastador conflicto!"
 germany.113.t: "Rusia acepta pagar reparaciones"
 germany.113.d: "Rusia, a pesar de nuestros peores temores, ha aceptado el pago de las reparaciones sin protesta, ni siquiera una solicitud de renegociación. Sus diplomáticos no estaban precisamente contentos de ceder activos económicos, pero ¿quién lo estaría? Esperemos que esto sea una señal de la disposición rusa a mantener una relación de trabajo."
 germany.113.a: "¡Fantástico!"
 germany.115.t: "Protestas nacionales"
 germany.115.d: ""
 germany.115.a: "Somos los únicos responsables..."
 germany.116.t: "Escasez de petróleo disminuye"
 germany.116.d: ""
 germany.116.a: "¿Está mejorando la situación?"
 germany.117.t: "La República Árabe busca estrechar lazos con la OTAN"
 germany.117.d: ""
 germany.117.a: "¡Venceremos!"
 germany.118.t: "Agresión rusa en el Cáucaso"
 germany.118.d: ""
 germany.118.a: "Se avecina una guerra..."
 germany.119.t: "La OTAN se reúne por la agresión rusa"
 germany.119.d: ""
 germany.119.a: "Ellos nos traen guerra de nuevo, ¡Debemos defender Europa!"
 germany.120.t: "Crisis fronteriza polaco-bielorrusa"
 germany.120.d: "Los Estados bálticos de Letonia, Estonia y Lituania sufrieron las peores consecuencias de la agresión rusa a lo largo de la historia y en la reciente guerra. Miles de jóvenes muertos, el campo devastado y las escasas ganancias materiales para estas naciones han provocado la radicalización de la juventud y los veteranos descontentos del país. Esta insatisfacción con el statu quo de la posguerra se ha atribuido a las considerables minorías rusas del país, y los numerosos grupos ultranacionalistas surgidos tras la guerra han comenzado a acosarlas.\n\nEl Gobierno ha hecho la vista gorda ante estas recientes acciones, y muchos funcionarios las han elogiado sutilmente. Un diputado liberal por Estonia argumentó que \"cualquier injusticia que sufran los rusos en Estonia palidece en comparación con la infligida a nuestro pueblo por los imperialistas rusos, los soviéticos y los putinistas\". Un alcalde letón declaró que \"los jóvenes de nuestra nación tienen derecho a proteger nuestras fronteras y castigar a los colaboradores\" al ser informado de los ataques antirrusos en su ciudad.\n\nLos ataques más recientes contra personas de etnia rusa del fin de semana pasado han causado ocho muertos y más de cincuenta heridos, y el problema parece agravarse. Los líderes locales de la minoría rusa en estas naciones han argumentado que estos actos de discriminación son ilógicos y contradicen los principios pluralistas; señalan el servicio de personas de etnia rusa en los ejércitos del Báltico y su negativa a colaborar con las fuerzas rusas en muchos casos como prueba de que son tan buenos ciudadanos como sus vecinos.\n\nLa minoría rusa ha pedido ayuda a Berlín y ha presionado a los Gobiernos del Báltico para que pongan fin a las injusticias y garanticen la protección de sus derechos democráticos."
 germany.120.a: "Abrid negociaciones de inmediato."
 germany.120.b: "¡No toleraremos este acto terrorista!"
 germany.121.t: "La UE negocia la crisis fronteriza"
 germany.121.d: ""
 germany.121.a: "Excelente."
 germany.122.t: "La UE se mantiene desafiante"
 germany.122.d: ""
 germany.122.a: "Continuaremos..."
 germany.123.t: "Reclutamiento de legión en los Países Bajos"
 germany.123.d: ""
 germany.123.a: "Realizar una campaña moderada."
 germany.123.b: "Pagar una campaña masiva."
 germany.123.c: "Permitir que el OKW reclute a especialistas y personal de apoyo."
 germany.124.t: "Reclutamiento de legión en Bélgica"
 germany.124.d: "Bélgica es un país repleto de francófonos y neerlandófonos, una nación desarrollada llena de trabajadores cualificados, soldados de carrera y voluntarios voluntarios. Es un candidato ideal para que tanto el Ejército como las Legiones Extranjeras adquieran personal. Pero ¿a quién le otorgamos los derechos?"
 germany.124.a: "Realizar una campaña moderada."
 germany.124.b: "Pagar una campaña masiva."
 germany.124.c: "Permitir que el OKW reclute a especialistas y personal de apoyo."
 germany.130.t: "Levantamiento del PKK en Turquía Oriental"
 germany.130.d: ""
 germany.130.a: "Idiotas útiles que nos ayudarán a alcanzar la victoria."
 germany.131.t: "Se forma alianza roja-roja-verde"
 germany.131.d: "El panorama político alemán se vio sacudido el lunes cuando el Partido Socialdemócrata (SPD), de tendencia izquierdista, el Partido Verde, de tendencia ambientalista, y el partido de ultraizquierda Die Linke anunciaron la formación de una alianza roja-roja-verde. Con las encuestas mostrando un giro abrumadoramente izquierdista en el sentimiento general, dado el fracaso de los moderados en ganar la guerra de la OTAN y la posterior catástrofe económica causada por la derrota, el futuro de Alemania se presenta sombrío.\n\nEl anuncio fue recibido con reacciones abrumadoramente negativas por parte de la clase política. Con los políticos del centro-SPD, la CDU y la AFD redoblando sus promesas de revitalizar Alemania y alejarla de una \"dictadura marxista\", el futuro de Alemania sigue siendo incierto."
 germany.131.a: "Interesante."
 germany.132.t: "Protestas en universidades alemanas"
 germany.132.d: "En medio del caos que reina en Alemania tras la Segunda Guerra Mundial, la situación entre los estudiantes universitarios alemanes es especialmente tensa. Muchos de ellos fueron reclutados para servir en la guerra, pero al regresar no encontraron nada más que derrota y pobreza, por lo que la amargura entre la población es alta. Aunque ya se los conoce como un centro de actividad de ultraizquierda, la radicalización de los estudiantes alemanes ha llegado a un punto crítico con las protestas organizadas por Die Linke que han surgido en toda Alemania. Muchos estudiantes exigen cambios radicales, incluida una revisión a gran escala del sistema de bienestar social estatal, la estatización de las grandes corporaciones en beneficio del pueblo y la recalibración de la economía para servir a los intereses de la clase trabajadora en lugar de a los multimillonarios que vendieron el país a los rusos. Aunque las protestas han sido mayoritariamente pacíficas, son un signo de una sociedad peligrosamente polarizada."
 germany.132.a: "Se viene una revolución."
 germany.133.t: "Toma del Reichstag"
 germany.133.d: "El fervor revolucionario en Alemania alcanzó su cénit hoy con el asalto del Reichstag por parte de fuerzas de izquierda, que proclamaron una nueva República Alemana. Tras meses de desplome económico, millones de desempleados y la indignación contra el Gobierno por no haber solucionado el problema, las fuerzas paramilitares de Die Linke finalmente tomaron las riendas del Gobierno.\n\nA las 10:00 a. m., hora central europea, los revolucionarios tomaron sin apenas resistencia edificios clave de la capital, como la Estación Central de Berlín, el Bundestag y la Cancillería, aunque se desconoce la ubicación del canciller.\n\nPoco después, varios desertores del ejército se unieron a los paramilitares, y estalló un levantamiento a gran escala: varias divisiones militares juraron lealtad a las fuerzas revolucionarias en Berlín. Con Alemania sumida en el caos, el nuevo Gobierno provisional de Die Linke, el Partido Verde y el Partido Socialdemócrata juraron restaurar el orden y resolver la emergencia."
 germany.133.a: "Revolución en el corazón de Europa."
 germany.134.t: "Huelgas en curso"
 germany.134.d: "Tras las medidas de austeridad anunciadas por el Gobierno, la Federación Alemana de Sindicatos anunció una huelga general para revertirlas. Con las huelgas de brazos caídos paralizando la economía, la violencia entre sindicalistas en huelga y la policía ha exacerbado las tensiones existentes en Alemania. Los expertos han salido a la luz para acusar a la policía de brutalidad excesiva y defender a un régimen cuyo único objetivo es perjudicar a la clase trabajadora, mientras que la oposición ha denunciado la huelga como un perjuicio para una situación económica ya precaria."
 germany.134.a: "Canta el pueblo su canción..."
 germany.135.t: "El Gobierno anuncia medidas de austeridad"
 germany.135.d: "En respuesta al colapso del euro y al desplome de la Bolsa de Fráncfort, el Bundestag aprobó una reforma presupuestaria de emergencia que aboga por recortes a la asistencia social, el aumento de la edad de jubilación y la posible privatización de algunas industrias. Con el valor del euro en caída libre, los defensores de las medidas de austeridad han declarado que son necesarias para la estabilización monetaria y para prevenir la hiperinflación en medio de la recesión económica. Sin embargo, las medidas han sido sumamente impopulares, dado que ya han estallado disturbios en importantes ciudades como Fráncfort, Berlín y Colonia, donde la policía y los manifestantes han vuelto a tomar las calles. La situación interna de Alemania se ve cada vez más precaria a medida que el caos consume el país."
 germany.135.a: "Quizás los manifestantes deberían abrir un libro de economía."
 germany.136.t: "Simpatías comunistas en las FF.AA."
 germany.136.d: "La reciente victoria de Rusia sobre la OTAN ha sido un verdadero desastre para Europa, y esta pérdida se siente profundamente en todos los niveles de la sociedad alemana, especialmente entre los jóvenes que se unieron al ejército. Muchos de ellos provienen de familias con pocos recursos que no podían enviar a sus hijos al extranjero para evitar el servicio militar obligatorio, lo que ha generado un gran resentimiento hacia la clase dominante entre los exconscriptos.\n\nCon los nacionalistas rusos tomando el control de Europa Oriental, no sería sorprendente que su ideología empujara a nuestra gente a buscar todo lo que se oponga a ella; en nuestro ejército, estas simpatías se han vuelto cada vez más evidentes.\n\nNuestros soldados, que han soportado un gran sufrimiento en el frente, se sienten traicionados y frustrados. Sumado a sus dificultades económicas y al auge de ideales de izquierda en sus filas, no sería raro que estén debatiendo abiertamente sobre el futuro que debe tomar nuestra nación.\n\nAhora que nuestras fuerzas armadas han crecido drásticamente en comparación con antes de la guerra, parece ser cuestión de tiempo antes de que estas simpatías se conviertan en algo más significativo, con todas las consecuencias que eso podría acarrear."
 germany.136.a: "Una mancha roja en las FF.AA."
 germany.137.t: "Gobierno libio reestablecido"
 germany.137.d: "Tras un largo y arduo período de reconstrucción, la comisión de la OTAN en Trípoli finalmente ha sentado las bases para un Gobierno libio independiente."
 germany.137.a: "Excelente."
 germany.138.t: "Gobierno iraní reestablecido"
 germany.138.d: "Tras un largo y arduo período de reconstrucción, la comisión de la OTAN en Teherán finalmente ha sentado las bases para un Gobierno iraní independiente."
 germany.138.a: "Excelente."
 germany.139.t: "Gobierno egipcio reestablecido"
 germany.139.d: "Tras un largo y arduo período de reconstrucción, la comisión de la OTAN en Cairo finalmente ha sentado las bases para un Gobierno egipcio independiente."
 germany.139.a: "Excelente."
 germany.140.t: "Gobierno establecido"
 germany.140.d: "Con los neoliberales y falsos conservadores fuera de sus injustos puestos, nuestra nación enfrenta una herida abierta de inexperiencia. Durante demasiado tiempo, los brillantes y valientes se desanimaron de seguir su verdadero propósito, castigados por su amor hacia su pueblo.\n\nHoy, eso cambia: se ha otorgado amnistía a quienes tuvieron el valor de luchar contra el gigante de la corrupción moderna. Cuando la bota del capital les aplastaba el cuello, se atrevieron a alzar la voz. Cuando el pueblo alemán necesitaba ser escuchado, ellos estaban allí, y ahora, por fin, tendrán la oportunidad de ser escuchados.\n\nNunca más permitiremos que quienes desprecian a su propia patria controlen su Gobierno. Nunca podrán imponer el caos en nuestra nación. Nunca podrán contaminar nuestra sangre.\n\nEl trauma del neoliberalismo es difícil de erradicar; tenemos un largo camino por delante, pero juntos lograremos que Alemania vuelva a ser fuerte."
 germany.140.a: "Que los errores del pasado no se repitan."
 germany.141.t: "Unternehmen Michael se agota"
 germany.141.d: "A pesar de los valientes esfuerzos de nuestros soldados, no hemos logrado cumplir con los objetivos de la operación Michael en el marco que el Estado Mayor había previsto. La fuerte resistencia soviética en el Vístula y la defensa de Kaliningrado han complicado nuestras acciones.\n\nEl uso de ataques químicos en Europa resultó ser beneficioso. Necesitamos buscar nuevas oportunidades similares y aprovecharlas al máximo. Aunque esta operación ha sido un fracaso, eso no significa que la guerra esté perdida. ¡Nos levantaremos y triunfaremos!"
 germany.141.a: "¡La guerra aún no ha sido perdida!"
 germany.142.t: "Unternehmen Michael es exitosa"
 germany.142.d: ""
 germany.142.a: "¡Debemos aprovechar este éxito!"
 germany.143.t: "Alemania demanda someternos"
 germany.143.d: "El Gobierno alemán ha tomado la decisión de que somos demasiado importantes para quedarnos al margen de su \"Pacto de Acero\". Es increíble cómo los alemanes no pueden dejar a Europa en paz, ni siquiera por un siglo, aunque al menos en el pasado nos dejaron un poco tranquilos. Ahora nos encontramos ante una encrucijada complicada: someternos o arriesgarnos a la furia alemana, a un embargo, o incluso a una invasión."
 germany.143.a: "No tenemos más opción."
 germany.143.b: "Jódete."
 germany.144.t: "Suecia sigue desafiante"
 germany.144.d: ""
 germany.144.a: "¡Que su pueblo decida!"
 germany.145.t: "Suecia se une al Pacto de Acero"
 germany.145.d: ""
 germany.145.a: "¡Persistiremos!"

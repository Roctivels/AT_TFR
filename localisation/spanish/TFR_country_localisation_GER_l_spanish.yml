 germany.1.t: "Comienza DEFENDER-Europe [GetYear]"
 germany.1.d: "Uno de los mayores ejercicios militares de la OTAN en décadas ha comenzado y se extenderá durante semanas, con la participación de 28.000 soldados de 27 países. DEFENDER-Europe [GetYear] incluirá operaciones casi simultáneas en más de 30 áreas de entrenamiento en una docena de países.\n\nEste ejercicio multifacético, de varios meses de duración, ofrece a Alemania y sus aliados un ejemplo de respuesta a crisis. El ejercicio se lleva a cabo en un contexto de creciente agresión rusa en la frontera con Ucrania y un aumento de la tensión en Europa."
 germany.1.a: "Semper paratus."
 germany.2.t: "Turquía activa el Artículo 13"
 germany.2.d: "El viejo orden mundial continúa mostrando fracturas en sus filas. Hoy, en lo que muchos analistas geopolíticos consideran un presagio de lo que vendrá, la República de Turquía ha emitido un aviso de denuncia, activando así sus derechos bajo el Artículo 13 del Tratado del Atlántico Norte.\n\nEsta decisión se produce tras múltiples factores. Con el colapso de la influencia de Estados Unidos tras sus recientes elecciones, junto con años de la OTAN frenando las ambiciones turcas en Medio Oriente y el fracaso en frenar la influencia rusa en la región del Mar Negro, la República de Turquía se ha quedado con lo que considera un beneficio insignificante por permanecer en la OTAN.\n\nLos miembros restantes de la OTAN han movilizado a sus diplomáticos con la esperanza de que los líderes turcos reconsideren su decisión antes de que la alianza pierda otro eje geopolítico clave en sus filas; sin embargo, hay pocas esperanzas de poder llevar a cabo estas tareas.\n\nLos próximos días decidirán el destino de la influencia occidental en la región durante las próximas décadas."
 germany.2.a: "La Media Luna amenaza con darnos la espalda."
 germany.3.t: "Turquía reafirma compromisos con la OTAN"
 germany.3.d: "Las gestiones diplomáticas occidentales con el Estado turco han dado sus frutos. Esta mañana, los líderes turcos anunciaron la rescisión de la activación del Artículo 13, alegando que \"la situación actual exige una cooperación estricta entre los Estados democráticos del mundo\".\n\nNo se han recibido comentarios de las delegaciones rusa y china en la conferencia de Ankara, aunque cabe suponer que están decepcionadas con el resultado de esta crisis diplomática. La influencia occidental permanecerá, por el momento, en la sombra de Rusia, otro posible frente que les preocupa en el futuro.\n\nAunque muchos creen que Turquía se ve frenada una vez más en sus ambiciones geopolíticas en el Levante y otras regiones, muchos se preguntan cuántas concesiones ocultas se vio obligado Occidente a hacer a la República de Turquía para convencerla de permanecer en la alianza militar, que parece estar menguando."
 germany.3.a: "La Media Luna se mantiene firme."
 germany.4.t: "Inundaciones masivas afectan a Renania"
 germany.4.d: "Fuertes lluvias azotaron el oeste de Alemania, afectando con especial dureza a los estados de Renania-Palatinado y Renania del Norte-Westfalia. Además, los países vecinos, Países Bajos y Bélgica, también sufrieron graves inundaciones.\n\nPequeños ríos y arroyos se convirtieron en corrientes torrenciales que destruyeron pueblos enteros. Las presas amenazaron con romperse, mientras que las redes eléctricas y de telefonía móvil se interrumpieron, en lo que se convirtió en una de las peores catástrofes naturales de la región en las últimas generaciones. Muchas personas murieron y muchas más perdieron sus hogares y pertenencias."
 germany.4.a: "Enviamos nuestras oraciones."
 germany.5.t: "Inundaciones masivas afectan a Renania"
 germany.5.d: "Fuertes lluvias azotaron el oeste de Alemania, afectando con especial dureza a los estados de Renania-Palatinado y Renania del Norte-Westfalia. Además, los países vecinos, Países Bajos y Bélgica, también sufrieron graves inundaciones.\n\nPequeños ríos y arroyos se convirtieron en corrientes torrenciales que destruyeron pueblos enteros. Las presas amenazaron con romperse, mientras que las redes eléctricas y de telefonía móvil se interrumpieron, en lo que se convirtió en una de las peores catástrofes naturales de la región en las últimas generaciones. Muchas personas murieron y muchas más perdieron sus hogares y pertenencias."
 germany.5.a: "Nuestro pésame a los alemanes."
 germany.6.t: "El restablecimiento de la RDA"
 germany.6.d: "Tras más de 30 años desde la reunificación de Alemania, parece que Oriente se ha impuesto a Occidente. Tras una serie de fracasos de la República Federal de Alemania, tanto a nivel nacional como internacional -el más notable fue la derrota en Europa Oriental ante el Imperio ruso-, el asalto al Reichstag en Berlín y la posterior declaración de la nueva República Alemana marcaron un nuevo capítulo en la historia del país. El recién instaurado Gobierno Provisional, legitimado por los diversos Gobiernos municipales revolucionarios de todo el país, realizó cambios significativos en la constitución, incluyendo el cambio de nombre de República Federal de Alemania a República Democrática Alemana, así como la declaración oficial de que el Estado sería de naturaleza socialista, restaurando muchos elementos de la constitución de Alemania Oriental.\n\nEste acontecimiento, casi impensable hace 10 años, ha dejado a un amplio espectro de alemanes conmocionados. Si bien Die Linke ha ganado popularidad recientemente, muchos aún desconfían de la dictadura y las penurias que muchos sufrieron bajo el Gobierno de Honecker hace más de 30 años, deseando no repetir jamás los errores del pasado. Aunque un amanecer rojo se haya alzado sobre Alemania, su futuro enfrentará muchas dificultades."
 germany.6.a: "Auferstanden Aus Ruinen!"
 germany.7.t: "El restablecimiento de la RDA"
 germany.7.d: "Tras más de 30 años desde la reunificación de Alemania, parece que el Este, de alguna manera, ha prevalecido sobre el Oeste. Tras una serie de fracasos de la República Federal de Alemania, tanto en el extranjero como en el país, los votantes dieron paso a la coalición de izquierda formada por Die Linke, los Verdes y el SPD. Aunque inicialmente se mantuvo como una facción minoritaria dentro de la coalición, mediante cuidadosas maniobras, el Bloque Anticapitalista de Die Linke se alzó con la victoria. Tras controlar suficientes escaños en el Bundestag tras unas elecciones anticipadas, la constitución de la República Federal de Alemania se modificó oficialmente para cambiar el nombre del país a República Democrática Alemana, además de declararse oficialmente que el Estado sería de naturaleza socialista, restaurando muchos elementos de la Constitución de Alemania Oriental.\n\nEste acontecimiento, casi impensable 10 años antes, ha dejado a muchos alemanes conmocionados. Si bien Die Linke ha ganado popularidad en los últimos años, muchos aún desconfían de la dictadura y las penurias que muchos sufrieron bajo el Gobierno de Honecker hace más de 30 años, deseando no repetir jamás los errores del pasado. Aunque un amanecer rojo se haya alzado sobre Alemania, su futuro enfrentará muchas dificultades."
 germany.7.a: "Inesperado."
 germany.8.t: "Golpe militar en Alemania"
 germany.8.d: "Tras la devastadora derrota en la guerra contra Rusia, elementos extremistas de la Bundeswehr han asaltado al gobierno. Tropas de las Fuerzas Especiales KSK, vestidas de negro, marcharon sobre Berlín, casi sin encontrar resistencia. Mientras los Leopards rodeaban el Bundestag, los berlineses permanecieron en silencio, atónitos, mientras muchos políticos eran llevados ante tribunales irregulares y condenados a muerte por \"crímenes contra la nación alemana\".\n\nEl líder del golpe, una figura enmascarada llamada el Rädelsführer, ha declarado que \"la degeneración del pueblo y la nación alemanes se detendrá hoy\". Se ha instaurado la ley marcial en todo el país, con órdenes de disparar a matar para quienes infrinjan el toque de queda.\n\nEl Gobierno civil ha sido suspendido temporalmente, con el alto mando militar en el poder, bajo el Rädelsführer a la cabeza.\n\nCasi de inmediato, otras naciones como Francia y el Reino Unido suspendieron relaciones debido a las medidas autoritarias en el país. Mientras Europa sigue conmocionada por la derrota tras la guerra entre Rusia y la OTAN, parece que otra nación ha caído en el extremismo."
 germany.8.a: "¿Un Cuarto Reich?"
 germany.9.t: "Golpe militar en Alemania"
 germany.9.d: "Tras la devastadora derrota en la guerra contra Rusia, elementos extremistas de la Bundeswehr han asaltado al gobierno alemán. Tropas de las Fuerzas Especiales KSK, vestidas de negro, marcharon sobre Berlín, prácticamente sin encontrar resistencia. Mientras los Leopards rodeaban el Bundestag, los berlineses permanecieron en silencio, atónitos, mientras muchos políticos eran llevados ante tribunales irregulares y condenados a muerte por \"crímenes contra la nación alemana\".\n\nEl líder del golpe, un personaje enmascarado llamado el Rädelsführer, ha declarado que \"la degeneración del pueblo y la nación alemanes se detendrá hoy\". Se ha instaurado la ley marcial en todo el país, con órdenes de disparar a matar para quienes infrinjan el toque de queda.\n\nEl Gobierno civil ha sido suspendido temporalmente, con el alto mando militar en el poder, bajo el Rädelsführer a la cabeza.\n\nCasi de inmediato, otras naciones como Francia y el Reino Unido suspendieron relaciones debido a las medidas autoritarias en el país. Mientras Europa sigue conmocionada por la derrota tras la guerra entre Rusia y la OTAN, parece que otra nación ha caído en el extremismo."
 germany.9.a: "¿Un Cuarto Reich?"
 germany.10.t: "Alemania propone formalmente un ejército europeo"
 germany.10.d: "Con el creciente deterioro de las relaciones entre los miembros europeos de la OTAN y Estados Unidos, sumado al caos político y económico en Estados Unidos, Alemania ha propuesto oficialmente la formación de un ejército paneuropeo con otros miembros de la Unión Europea para garantizar su defensa común.\n\nDado que los compromisos de Estados Unidos con la OTAN se cuestionan debido a su giro nacionalista tras la elección del presidente Donald J. Trump, muchos europeos han abogado por una mayor autonomía en materia de seguridad nacional.\n\nSi bien la propuesta aún se encuentra en sus etapas iniciales, marca un claro declive del papel de Estados Unidos como hegemón mundial, a medida que su influencia global comienza a desmoronarse."
 germany.10.a: "Interesante."
 germany.11.t: "Primer caso de COVID-19"
 germany.11.d: "Según las autoridades sanitarias regionales de Baviera, se ha identificado el primer caso de coronavirus en Alemania. El Ministerio de Salud de este estado sureño informó el lunes por la noche que un hombre de la zona de Starnberg, cerca de Múnich, se había infectado con el virus, pero se encontraba en buen estado.\n\nEn una conferencia de prensa el martes por la mañana, las autoridades sanitarias bávaras informaron que el hombre de 33 años se había contagiado por un colega chino de Shanghái cuando ambos asistieron a un taller de la empresa en Baviera la semana pasada. La mujer china había recibido la visita de sus padres, residentes en la región de Wuhan, antes de su viaje a Alemania.\n\nLos expertos consideran actualmente que el riesgo para la población bávara es bajo, según el comunicado del Ministerio. Países de todo el mundo han estado en alerta máxima por el virus, que surgió por primera vez en la ciudad china de Wuhan."
 germany.11.a: "Esperemos que no se propague."
 germany.12.t: "Ascensión del Canciller Supremo"
 germany.12.d: "Mientras la nación alemana finalmente regresa a la luz de la civilización, liberándose de la mierda neoliberal y salvaje, es hora de mostrarle al mundo al visionario que así lo quiso.\n\nEs un patriota que, a diferencia de los burócratas o los extranjeros, derramó su sangre por su nación junto a cientos de miles de alemanes puros.\n\nEs un estadista sin igual, alguien que ve los problemas que enfrenta la sociedad alemana y que sabe cómo solucionarlos.\n\nEs un orador, alguien capaz de convencer a millones para que Alemania recupere su gloria.\n\nEs un verdugo, alguien que se ensuciará las manos para solucionar los problemas que crearon nuestros abuelos, cueste lo que cueste.\n\nEs el líder, nuestro Canciller Supremo, y con él al mando, ¡Europa derrotará la amenaza comunista de una vez por todas!\n"
 germany.12.a: "¡Que Alemania vuelva a la grandeza!"
 germany.12.b: "¡Que Alemania vuelva a la grandeza! (DESENMASCARARLO)"
 germany.13.t: "Formación de la Internacional Europea"
 germany.13.d: "Alemania ha roto sus cadenas, pero no puede mantenerse sola.\n\nLos autócratas en el Este, los que le dieron la espalda a Marx y a Lenin, los que se prostituyeron ante los oligarcas y la burguesía, no tomarán las revoluciones europeas a la ligera.\n\nEs cierto que otra guerra es inevitable, una que podría ser más grande y mortífera que la que acabamos de librar. Y para ello, no podemos estar solos.\n\nMientras millones de nuestros compatriotas luchan por liberar a los pueblos de la cuna del socialismo, nos uniremos para formar la Internacional Europea. Una cooperación mutua en beneficio del continente, una que eclipsará todo lo anterior.\n\nAsí que, cuando el águila neoimperialista venga a por nosotros en nuestro último baile, ¡estaremos más que dispuestos a reducir su imperio a cenizas!\n\n"
 germany.13.a: "¡Liberaremos a los obreros de Europa!"
 germany.14.t: "Encuentro de la 5ª Internacional"
 germany.14.d: "Con Europa Occidental libre de los amos corporativos, por fin ha llegado el momento de formalizar nuestra Internacional Europea en algo más grande. La Quinta Internacional no solo legitimará a nuestros Gobiernos, sino que también demostrará a los movimientos de izquierda de todo el mundo que estamos dispuestos a cooperar.\n\nSi bien por el momento estaremos confinados en el continente europeo, no es nuestro objetivo final. Un movimiento socialista mundial siempre será el cenit que aspiraremos a alcanzar.\n\nPor supuesto, para que eso suceda, debemos aniquilar a la bestia que amenaza con acabar con todo. Formalizar nuestros acuerdos de defensa en un solo pacto demostrará nuestra unidad frente a quienes desean destruirnos.\n\n¡La cuna del socialismo finalmente ha abrazado su destino y protegerá la bandera roja para siempre!"
 germany.14.a: "¡La alianza se fortalece!"
 germany.15.t: "¡La crisis del petróleo llega a Alemania!"
 germany.15.d: "Era solo cuestión de tiempo antes de que las consecuencias de la guerra civil Saudí se hicieran sentir.\n\nLa economía alemana se paralizó hoy, con el aumento vertiginoso de los precios del petróleo, y nuestras empresas no tienen más remedio que detener sus actividades. Si bien algunos analistas afirman que el daño podría haber sido peor si la crisis petrolera se hubiera producido antes de la pandemia mundial, es seguro que nuestro país tendrá mucho que hacer en los próximos meses.\n\nCon la inestabilidad extendiéndose por todo el mundo, carecemos de proveedores de petróleo estables y amigables con nosotros. La triste realidad es que nuestro continente no puede producir suficiente petróleo para nuestras industrias. Esto nos afectará a largo plazo si no encontramos una solución y podría hacernos poco competitivos frente a las industrias extranjeras.\n\nAl menos los rusos siguen extrayéndonos su petróleo y gas a precios relativamente bajos..."
 germany.15.a: "Oh, Dios mío..."
 germany.16.t: "Los rusos suben precios del petróleo"
 germany.16.d: "Parece que los rusos no tardaron en aprovecharse de la crisis del petróleo para perjudicarnos.\n\nMoscú nos ha informado de que están subiendo los precios del petróleo y el gas que envían a Europa. Argumentando \"cadenas de suministro rotas\" y \"falta de suministro debido a la inestabilidad en Medio Oriente\", nos extorsionan debido a nuestra falta de proveedores alternativos.\n\nLo peor de todo es que también se jactan de ello, diciendo que \"la mano invisible del mercado nos obliga a replantear nuestra estrategia\". Ahora REALMENTE necesitamos encontrar una solución a esta crisis. De lo contrario, nuestro país caerá en un agujero negro económico.\n\nQué sinvergüenzas."
 germany.16.a: "¡Orcos oportunistas!"
 germany.17.t: "Protestas antirrusas"
 germany.17.d: "En las últimas semanas, Alemania ha presenciado un aumento significativo de las protestas antirrusas en importantes ciudades como Berlín, Múnich y Hamburgo. Estas manifestaciones se deben principalmente al descontento público por la decisión de Rusia de subir los precios del petróleo, lo que ha generado una presión adicional sobre la economía alemana.\n\nEl aumento de los precios del petróleo ha provocado un aumento en los costos de la energía para empresas y consumidores en Alemania, lo que ha agravado los desafíos económicos actuales asociados con la pandemia de COVID-19. La población alemana ha expresado su frustración por la aparente incapacidad del Gobierno para contrarrestar la influencia de Rusia en el mercado energético.\n\nLas protestas antirrusas han atraído a una amplia gama de participantes, incluyendo ambientalistas, expertos económicos y activistas políticos. Estos grupos se han unido bajo el objetivo común de expresar su preocupación por las acciones de Rusia e instar al Gobierno alemán a adoptar fuentes de energía alternativas y reducir la dependencia del país del petróleo ruso.\n\nAnte las protestas en curso, se recomienda que el Gobierno alemán considere las siguientes medidas:\n\nIniciar gestiones diplomáticas con Rusia para abordar la preocupación por el aumento de los precios del petróleo y explorar posibles vías de negociación. Desarrollar e implementar una estrategia integral para diversificar las fuentes de energía de Alemania, centrándose en las energías renovables y aumentando la inversión en tecnologías sostenibles. Iniciar campañas de concienciación pública para informar a la ciudadanía sobre las iniciativas del Gobierno para abordar la crisis energética y mitigar el impacto del aumento de los precios del petróleo en la economía."
 germany.17.a: "Entendido."
 germany.18.t: "¿Como ocurrió?"
 germany.18.d: "Nuestros ejércitos fueron derrotados.\n\nNuestros aliados fueron aplastados.\n\nNuestro país fue bombardeado.\n\nNuestro pueblo fue masacrado.\n\n¿Y por qué?\n\n¿Por los eurócratas? ¿Por los corporaciones? ¿Por los inmigrantes?\n\nLlegamos a esta guerra esperando una victoria fácil, pero la élite nos hundió a todos.\n\nMientras madres, hijas y esposas buscan desesperadamente los restos de sus esposos, el Gobierno no tiene a nadie a quien culpar más que a sí mismo.\n\n"
 germany.18.a: "Que Dios nos dé fuerzas..."
 germany.19.t: "Ich hatt' einen Kameraden"
 germany.19.d: "Está lloviendo. Bueno, la lluvia es común, pero suele encontrar el momento adecuado. A Karl no le importaba sentir el agua caer; cuando Rusia invadió Europa llovían balas y cohetes.\n\nHabía estado mirando en silencio la lápida de su colega caído; aún recordaba cuando anunció con orgullo que pronto esperaba un hijo. Estaba emocionado por criarlo en una Alemania orgullosa y fuerte, una Alemania que se redimía en la historia por los pecados del pasado. Alemania nunca existiría, y su amigo nunca criaría a ese niño; la mina que pisó lo aseguró. Karl apretó los puños, rechinando los dientes; cada día recordaba la amarga derrota. Alemania era débil, demasiado contenida por sus pecados y su renuencia a ir a por todas contra un enemigo que no tenía reparo moral en su propio expansionismo.\n\nSu dolor e ira comenzaron a mezclarse, retorciéndose y transformándose en un estado mental de odio. Alemania le falló; a él, a su amigo y a todos los que lucharon y murieron por Europa, siempre redoblando la apuesta contra el antiextremismo, siempre flagelándose solo para que el mundo los aceptara. ¿Para qué?\n\nRusia ha ganado, eso es seguro, pero sabe que no está solo en esta ira contra su propio país y esa nación bárbara. Hay que hacer algo, si no por su amigo, entonces por Alemania. No dejaba de mirar la lápida, pensando en el rumbo que debía tomar la nación. El extremismo ha vuelto a crecer en Alemania, y con razón.\n\nLos comunistas culpan al Gobierno corrupto que ha cedido su soberanía a las corporaciones. Estos chupasangres han minado la capacidad militar de Alemania y, a su vez, la han hecho perder. La ultraderecha ha crecido en la misma medida. El internacionalismo del Gobierno actual ha olvidado que el pueblo alemán es lo más importante, que el enemigo está a las puertas y en el país, empujando lenta pero seguramente al pueblo alemán a un callejón sin salida cultural y étnico. Ambos anhelan venganza, venganza contra el statu quo, venganza contra Rusia.\n\nKarl suspiró. Los veteranos de la guerra tienen el potencial de moldear el futuro de Alemania. Miró al cielo y decidió dónde terminaría lo que su país debería haber terminado hace mucho tiempo."
 germany.19.a: "Los responsables de esta desgracia pagarán..."
 germany.20.t: "Entrada al Eje"
 germany.20.d: "Con el éxito de nuestra revolución, hemos sido invitados a la nueva Alianza del Eje.\n\nEs hora de prepararnos para la lucha contra la amenaza oriental. Esta será una tormenta muy difícil..."
 germany.20.a: "Venceremos."
 germany.21.t: "Inicio de Fall Rache"
 germany.21.d: "El tiempo de los preparativos ha terminado.\n\nAtacamos a las hordas rojas con una brutalidad y una rapidez que jamás podrían imaginar. Les mostraremos lo que significa temer y nos aseguraremos de que el continente sea nuestro.\n\nNuestros antepasados fracasaron una vez, no podemos negarlo. Sin embargo, fue su renuencia a cooperar con otros patriotas europeos lo que los llevó a la caída. No repetiremos el mismo error.\n\nPor mucho que odiemos a las élites anteriores, hay una cita que compartimos: \"Europa es un jardín. El resto del mundo es una jungla. La jungla podría invadir el jardín. Los jardineros deberían cuidarlo\". Una frase simple pero muy significativa.\n\nTenían razón. Europa es un jardín, un continente de tradición y cultura que el mundo envidia. Y nosotros somos los jardineros que desarraigaremos la jungla que amenaza esta belleza.\n\nManos a la obra.\n\n"
 germany.21.a: "Für's Vaterland!"
 germany.22.t: "INFORME DE PRIMERA LÍNEA: [GetDateText]"
 germany.22.d: "DE: Generalmajor Richard Rossmanith\n\nEl [GetDateText] será recordado como el día negro para la Bundeswehr. Nuestros intentos de contener a los rusos han fracasado. En el norte, el tercer ejército polaco ha sido prácticamente aniquilado y Cracovia se encuentra bajo amenaza de asedio. Las fuerzas polacas tienen efectivos limitados y solo pueden llevar a cabo ofensivas menores.\n\nNuestras fuerzas se han reagrupado tras el río Vístula y, hasta ahora, han podido contener la ofensiva rusa, pero no estoy seguro de que podamos resistir mucho más tiempo. Nuestros hombres han sufrido enormes pérdidas y están extremadamente exhaustos; no miento, la situación es desoladora."
 germany.22.a: "Que Dios nos ayude..."
 germany.23.t: "Se alistan voluntarios"
 germany.23.d: "Nuestra guerra contra la amenaza roja se ha convertido en un llamado para aquellos en nuestra sociedad que permanecieron inactivos.\n\nMillones de patriotas intentan alistarse, listos para unirse al ejército y combatir la amenaza que amenaza nuestros hogares. Nuestros centros de reclutamiento están trabajando a destajo para organizar todos los documentos.\n\nSu afán por defender Europa siempre será recordado, ¡pues sus nombres entrarán en los libros de historia!"
 germany.23.a: "¡Que nos sirvan bien!"
 germany.24.t: "OPERACIÓN: BLITZ UND DONNER"
 germany.24.d: "Los rusos han estado luchando ferozmente contra nuestras fuerzas europeas combinadas, y una de las principales razones por las que han podido mantener su equipo bien abastecido es la planta de armas de Tula. Esta ha estado suministrando constantemente armas y otros tipos de equipo militar a las fuerzas rusas; sin embargo, esto ha cambiado.\n\nHemos recibido informes de que nuestra fuerza aérea ha llevado a cabo con éxito una incursión en el espacio aéreo ruso y ha causado graves daños a la planta de armas de Tula, lo que afectará significativamente la capacidad de las fuerzas rusas.\n\nSin embargo, esto tuvo un alto coste: con las defensas antiaéreas rusas y su propia fuerza aérea, también han neutralizado a muchos de nuestros cazas tras un brutal combate aéreo en los cielos rusos. Nuestros valientes pilotos que dieron su vida por nuestro país no serán olvidados.\n\nCon la planta de armas en llamas, ahora podemos concentrarnos en contraatacar sus líneas con el doble de fuerza."
 germany.24.a: "Puede que no hayamos dicho \"sorpresa\", ¡pero la fiesta no se arruinó!"
 germany.25.t: "INFORME DE PRIMERA LÍNEA: [GetDateText]"
 germany.25.d: "DE: Generalmajor Richard Rossmanith\n\nEl ejército ucraniano ha sufrido graves consecuencias y, sin nuestro apoyo, se habría derrumbado en las próximas semanas. Las fuerzas de la OTAN siguen llegando y, por ahora, han frenado el avance ruso. Nuestra estrategia a partir de ahora debería ser ayudar a Ucrania en la medida de lo posible. Ellos llevan la peor parte del ataque, y su derrota significaría un desastre para la OTAN, y si no, para Europa."
 germany.25.a: "La batalla acaba de comenzar..."
 germany.26.t: "Zorn"
 germany.26.d: "Al igual que las guerras del pasado tuvieron sus propias historias y mitos, esta guerra ha tenido recientemente los suyos.\n\nCuando nos vimos obligados a retirarnos, oímos informes de una tripulación de tanque abandonada con un Leopard 2; asumiendo lo peor, ya les rendimos homenaje.\n\nSin embargo, al hacer retroceder a los rusos, nos topamos con una escena brutal. En un amplio campo encontramos los restos de una compañía rusa entera rodeando un solitario Leopard 2, cubierto de agujeros de bala, abolladuras y orugas rotas.\n\nHemos llegado a la conclusión de que la tripulación del tanque ofreció una valiente última resistencia contra el ejército ruso y nos hemos asegurado de que no se rindieran tan fácilmente.\n\nSin embargo, no pudimos encontrar a la tripulación, ni siquiera sus restos, y seguirá siendo un misterio qué les sucedió. No olvidaremos su noble postura contra la invasión rusa y nos aseguraremos de que sus familias reciban la Cruz de Honor de la Bundeswehr al Valor en su nombre.\n\nLudwig Keller, Jan Weber, Otto Baier y Jakob Richter serán nombres que jamás serán olvidados por su valiente lucha y serán una fuente de inspiración para nuestras fuerzas."
 germany.26.a: "Nos vemos en Valhalla..."
 germany.27.t: "Llega ayuda humanitaria alemana"
 germany.27.d: ""
 germany.27.a: "¡Envía nuestro agradecimiento!"
 germany.28.t: "El Generalmajor Rossmanith sustituye al Canciller"
 germany.28.d: "El Bundestag ha intentado mantenerse funcional durante este período de caos geopolítico. Tuvimos éxito hasta la guerra en Ucrania, pero el delicado equilibrio que manteníamos se ha visto alterado. Por ello, el general Richard Rossmanith se ha ofrecido a asumir temporalmente el cargo de canciller federal."
 germany.28.a: "Ojalá resuelva nuestros problemas..."
 germany.29.t: "Hungría critica iniciativa del carbón"
 germany.29.d: "El ministro de Asuntos Exteriores de Hungría, Péter Szijjártó, criticó la política alemana de descarbonización, afirmando que esto aumentaría la dependencia del gas ruso. También acusó a Alemania de presionar a otros países para que eliminen gradualmente el carbón, ignorando su propia dependencia. Hungría depende en gran medida del gas ruso, y Szijjártó argumentó que la falta de inversión alemana en fuentes de energía alternativas podría aumentar la vulnerabilidad de Hungría a la política energética rusa. Alemania planea eliminar gradualmente el uso del carbón para 2038, un plan que ha sido criticado por no ser lo suficientemente ambicioso."
 germany.29.a: "Tienen razón..."
 germany.29.b: "¡Que sepa cuál es su lugar!"
 germany.30.t: "Llegan refugiados sauditas"
 germany.30.d: "La devastadora guerra en Arabia Saudita ha provocado el desplazamiento de millones de civiles y la huida de millones más en busca de seguridad. Un gran grupo de refugiados acaba de llegar y busca asilo. Muchos en la derecha denunciaron rápidamente la llegada, evocando recuerdos de los ataques a migrantes durante la guerra civil siria y afirmando que Alemania no es lugar para ellos."
 germany.30.a: "Acojamos a todos los que podamos."
 germany.30.b: "Solo podemos permitirnos acoger a un número limitado."
 germany.31.t: "Protestas ultraderechistas contra los refugiados"
 germany.31.d: "Agitadores de ultraderecha han organizado múltiples protestas en todo el país en protesta por la reciente oleada de refugiados sauditas. Afortunadamente, estas se han mantenido como manifestaciones pacíficas, con pocos estallidos de violencia rápidamente reprimidos por la policía. Sin embargo, sus continuas protestas presionan no solo a los refugiados, sino también al Bundestag para que se pronuncie sobre nuestra política de refugiados."
 germany.31.a: "Wir schaffen das!"
 germany.32.t: "Hungría critica las políticas de refugiados"
 germany.32.d: "El primer ministro húngaro, Viktor Orbán, se pronunció en contra de la política alemana de puertas abiertas para los refugiados durante una conferencia sobre la guerra civil saudita. Argumentó que la disposición de Alemania a acoger refugiados de Medio Oriente solo fomentaba una mayor migración, lo que provocaba una afluencia de refugiados a Europa.\n\nLas críticas de Orbán a la política alemana de refugiados provocaron la indignación de los funcionarios alemanes presentes, quienes acusaron a Hungría de falta de compasión y de ignorar el sufrimiento de los refugiados.\n\nEl evento se convirtió rápidamente en un acalorado intercambio, con crecientes tensiones entre Hungría y Alemania debido a sus diferentes puntos de vista sobre los refugiados. A medida que el debate continuaba, otros países, como España, Francia y el Reino Unido, aportaron sus propias opiniones al respecto.\n\nA pesar de la acalorada discusión, la conferencia finalmente concluyó sin una resolución, dejando a Hungría y Alemania enfrentadas sobre sus enfoques de la crisis de refugiados."
 germany.32.a: "Tienen razón..."
 germany.32.b: "¡Que sepa cuál es su lugar!"
 germany.33.t: "Comienzan pruebas de la vacuna Pfizer"
 germany.33.d: "La primera fase de los ensayos de la vacuna Pfizer comenzó en varios lugares de Alemania. La compañía seleccionó a un grupo diverso de participantes, incluyendo personas de diferentes edades, etnias y estados de salud, para garantizar la seguridad y eficacia de la vacuna para todos.\n\nLos ensayos se basaron en un diseño doble ciego, aleatorizado y controlado con placebo: algunos participantes recibieron la vacuna y otros un placebo. Se monitoreó de cerca a los participantes para detectar cualquier reacción adversa, y las consultas periódicas con los investigadores garantizaron el éxito del ensayo.\n\nLa entrada de las vacunas Pfizer en los ensayos marcó un punto de inflexión significativo en la lucha contra la pandemia de COVID-19, y sigue siendo un momento histórico que la gente recordará con gratitud y admiración por los científicos e investigadores que lo hicieron posible."
 germany.33.a: "Oremos para que funcione."
 germany.34.t: "Llegan refugiados estadounidenses"
 germany.34.d: "En medio de la agitación política y el malestar social en Estados Unidos, un grupo de refugiados estadounidenses llegó a Alemania en busca de seguridad y un nuevo comienzo. Habían dejado atrás sus hogares y familias, huyendo del caos y la violencia que asolaban su país.\n\nLos refugiados fueron recibidos con los brazos abiertos por el pueblo alemán, que se solidarizó con su difícil situación y comprendió la importancia de brindar un refugio seguro a quienes lo necesitaban. Se les proporcionó refugio temporal y ayuda para encontrar trabajo y establecerse en su nuevo entorno."
 germany.34.a: "Que se pongan cómodos."
 germany.35.t: "Anillo neonazi arrestado"
 germany.35.d: "Han llegado informes del Servicio Federal de Inteligencia sobre la reciente investigación de III. Weg. Al parecer, tras descubrir planes para asesinar a políticos de alto rango, el BND se movilizó rápidamente y, en colaboración con la policía local, realizó redadas posteriores en diversos escondites y puntos de encuentro populares de III. Weg. Las redadas han resultado ser un éxito rotundo, ya que se confiscaron grandes cantidades de armamento, incluyendo principalmente fusiles AK-47, rifles estadounidenses, algunas granadas de mano y pistolas. Muchos miembros de III. Weg también fueron arrestados en las redadas. Afortunadamente, ninguno de ellos optó por una salida triunfal, con la posibilidad de herir o matar a alguno de nuestros oficiales.\n\nSi bien la situación puede haber terminado, nos alegra que se haya evitado cualquier daño. La operación ha puesto de manifiesto que el problema de la radicalización continua de la población es más evidente que nunca. Solo podemos esperar que la realpolitik pueda gestionar la situación pronto, ante el temor a lo que pueda suceder en esta nueva década."
 germany.35.a: "Se evitó un desastre."
 germany.36.t: "Cambio de política"
 germany.36.d: "El colapso del Gobierno saudita ha provocado una avalancha de refugiados en Alemania, desbordando la infraestructura nacional. Alemania, que ya enfrentaba dificultades de integración, se enfrenta ahora a un aumento sin precedentes de solicitantes de asilo, poniendo al límite los servicios públicos. La tensión aumenta a medida que grupos políticos de ultraderecha aprovechan la crisis, argumentando que el país ya no puede permitirse apoyar a más refugiados. Al mismo tiempo, voces humanitarias dentro del Gobierno y la sociedad civil instan a Alemania a seguir cumpliendo con sus obligaciones internacionales, a pesar de la presión.\n\nLa opinión pública está profundamente dividida sobre el tema, con protestas crecientes en ambos bandos. Algunas comunidades están comenzando a sufrir enfrentamientos violentos, a medida que crece la frustración por la escasez de vivienda y la competencia laboral. Los aliados internacionales observan atentamente, conscientes de que la decisión de Alemania sentará un precedente para el resto de Europa. El Gobierno debe tomar ahora una decisión crucial: rechazar a los refugiados para preservar la estabilidad interna o seguir aceptándolos, incluso a riesgo de disturbios sociales."
 germany.36.a: "¡Basta! No podemos más."
 germany.36.b: "Haremos todo lo posible."
 germany.37.t: "Se abren negociaciones con Venezuela"
 germany.37.d: "Como uno de los mayores importadores de gas ruso en Europa, Alemania se ha visto muy afectada por el aumento de los precios del petróleo. Para mitigar las repercusiones económicas y garantizar un futuro energético seguro, el Gobierno alemán ha iniciado charlas con Venezuela, país con vastas reservas de gas y un historial de exportación de petróleo.\n\nLas negociaciones con Venezuela incluyen posibles acuerdos sobre importación de petróleo, inversiones en infraestructura y colaboraciones para el desarrollo de energía sostenible. Establecer un nuevo suministro alternativo de petróleo no solo brindaría a Alemania mayor flexibilidad en el mercado energético, sino que también contribuiría a los objetivos a largo plazo del país de diversificar sus fuentes de energía.\n\nRealizaremos evaluaciones profundas de la capacidad de producción petrolera de Venezuela, su fiabilidad y los posibles impactos ambientales antes de finalizar un acuerdo. Garantizaremos la transparencia y la comunicación abierta con el público alemán sobre el progreso y los resultados de las negociaciones. Finalmente, continuaremos explorando otras vías para la diversificación energética, incluyendo una mayor inversión en energías renovables e infraestructura."
 germany.37.a: "Ofreceremos levantar las sanciones."
 germany.37.b: "Ofreceremos levantar sanciones y otorgar acciones en nuestras empresas."
 germany.38.t: "Querido [SOV.GetLeader]..."
 germany.38.d: "Espero que esta carta les llegue bien. Me dirijo a ustedes hoy para abordar un asunto de gran importancia y urgencia. Como ambos sabemos, el mundo se encuentra en una situación precaria y desafiante. La persistencia de los conflictos, el aumento de los desastres humanitarios y la inestabilidad generalizada en la Tierra son realidades innegables que nos afectan a todos. Ante estas graves circunstancias, creo que lo mejor para nuestra nación es buscar con ahínco la paz y la estabilidad.\n\nEl continente europeo, a pesar de su relativa paz en comparación con otras regiones, no ha sido totalmente inmune a la agitación del siglo XXI. Incluso dentro de nuestro propio continente, hemos presenciado conflictos y tensiones que subrayan la necesidad de medidas proactivas. Si no actuamos con decisión, es probable que estos problemas no solo persistan, sino que se intensifiquen. Por lo tanto, es imperativo que consideremos no solo la cooperación informal entre nuestras naciones, sino también asociaciones formales e integrales que puedan abordar y mitigar eficazmente estos desafíos.\n\nLa esencia de mi mensaje es un llamado a trascender nuestros agravios históricos y nuestras arraigadas rivalidades. Es esencial que superemos los conflictos del pasado y nos centremos en forjar un futuro marcado por la colaboración y el respeto mutuo. La situación mundial se está deteriorando, y es evidente que la responsabilidad de cambiar esta trayectoria recae en nosotros. Al dejar atrás viejas disputas y trabajar juntos, tenemos la oportunidad de forjar un futuro más estable y esperanzador para todos.\n\nConfío en que considerarán seriamente esta perspectiva, ya que nuestras acciones colectivas determinarán si podemos marcar una diferencia significativa en estos tiempos difíciles.\n\nGracias por su atención a este crucial asunto."
 germany.38.a: "Sinceramente..."
 germany.39.t: "Propuesta alemana por el petróleo venezolano"
 germany.39.d: "El colapso en Medio Oriente ha disparado los precios del petróleo, y las naciones del mundo se esfuerzan por satisfacer sus necesidades energéticas. Alemania, ante una crisis energética que amenaza su economía e industria, ha recurrido a Venezuela con una ambiciosa oferta.\n\nLa propuesta es simple pero de gran alcance: Alemania busca un suministro estable de petróleo y, a cambio, está dispuesta a proporcionar a Venezuela equipo industrial avanzado, préstamos favorables y asistencia para la modernización de nuestra infraestructura. Esta alianza podría revitalizar nuestra economía y restaurar la prosperidad de nuestra población.\n\nSin embargo, algunos asesores advierten sobre el riesgo de depender demasiado de Alemania. Nos recuerdan los conflictos internos del pasado y los riesgos de verse arrastrados a las luchas de poder de Europa."
 germany.39.a: "Aceptar su oferta."
 germany.39.b: "Rechazar su oferta."
 germany.40.t: "Venezuela no acepta"
 germany.40.d: "Tras un largo debate con diplomáticos venezolanos, no logramos llegar a un acuerdo. Sus demandas se consideraron inaceptables y favorecían a Venezuela más que a ambas naciones en estos momentos difíciles."
 germany.40.a: "Tendremos que buscar en otra parte."
 germany.41.t: "Venezuela acepta"
 germany.41.d: "Tras una larga negociación entre ambas partes, finalmente hemos llegado a un acuerdo que beneficiará a ambas.\n\nEl Gobierno venezolano recibirá los préstamos, el equipo industrial y la experiencia prometidos, mientras que nosotros obtendremos un importante descuento en su petróleo.\n\nCon esto podremos remediar parcialmente la crisis que enfrentamos. Simplemente no mencionen las implicaciones morales de enviar dinero a Caracas."
 germany.41.a: "Fantástico."
 germany.42.t: "Terrorismo de ultraderecha en aumento"
 germany.42.d: "Grupos de ultraderecha en Alemania, de diversas afiliaciones, han intensificado sus actividades terroristas. Algunos grupos, incluso el grupo Atomwaffen, que se creía disuelto, han atacado sinagogas y a migrantes, y en algunos de los peores casos, se han producido complots contra funcionarios del Gobierno. No podemos permitir que esto continúe si queremos preservar la situación política actual."
 germany.42.a: "Investiguen este asunto."
 germany.43.t: "Grupos de ultraderecha protestan"
 germany.43.d: "Durante las últimas semanas, miles de personas marcharon por las calles de Berlín para protestar contra la afluencia masiva de refugiados. Organizada por el partido de derecha Alternativa para Alemania (AfD), la manifestación pretendía expresar la creciente preocupación por la capacidad del país para absorber a un número tan grande de solicitantes de asilo.\n\nLos manifestantes corearon lemas como \"¡Merkel debe irse!\" y \"¡Ya basta!\" mientras se dirigían a la Puerta de Brandeburgo, el símbolo icónico de la Alemania reunificada. Muchos portaban pancartas con lemas como \"Sin refugiados, sin inmigración\" y \"Nuestro país nos pertenece a nosotros, no a los refugiados\".\n\nLa protesta fue mayoritariamente pacífica, aunque hubo enfrentamientos esporádicos entre los manifestantes y la policía. Algunos manifestantes intentaron abrirse paso a través de las líneas policiales, lo que resultó en varias detenciones."
 germany.43.a: "¡Arresten a estos vándalos!"
 germany.44.t: "Grupos de ultraizquierda protestan"
 germany.44.d: "El mes pasado, miles de personas marcharon por las calles de Colonia y Berlín, entre otros importantes centros sindicales, para protestar contra nuestras recientes decisiones políticas en diversos ámbitos, desde economía y energía hasta nuestra política sobre la crisis migratoria. Organizadas por Die Linke, la sombra de la política alemana en Alemania del Este, estas protestas buscan el apoyo de ambientalistas, trabajadores, socialdemócratas y, en general, de la clase baja. Con lemas como \"¡Abajo el statu quo!\", \"¡Fuera la CDU!\" y otros lemas antigubernamentales, así como otros más políticos como \"¡No más carbón!\" y \"¡Que entren!\".\n\nAunque las protestas se han mantenido mayoritariamente pacíficas, se han producido algunas contraprotestas y se ha registrado violencia limitada, con al menos dos agentes heridos y otros 19 civiles heridos tras varios intentos fallidos de romper las barreras policiales que separan a los bandos opuestos."
 germany.44.a: "¡Arresten a estos vándalos!"
 germany.45.t: "Posible célula Atomwaffen en Alemania"
 germany.45.d: "La Segunda Guerra Civil Americana ha comenzado recientemente y sus efectos ya se sienten en todo el mundo. Mientras Estados Unidos arde, hemos recibido informes preocupantes sobre una célula de la División Atomwaffen en nuestro país. Atomwaffen es un grupo neonazi dedicado a acelerar el colapso total de la civilización y ha sido extremadamente activo en el estado norteamericano de Florida. Sin embargo, ya sabíamos de sus vínculos con otros países como Rusia, el Reino Unido y los países bálticos.\n\nÚltimamente sospechamos que la célula en cuestión está reuniendo voluntarios y equipo para enviar a Estados Unidos, ayudando a los extremistas allí y causando más sufrimiento.\n\nNos aseguraremos de vigilarlos de cerca y de que el equipo y los voluntarios enviados no puedan salir de Alemania; el terrorismo no debería tener terreno fértil para crecer."
 germany.45.a: "Investiguen este asunto."
 germany.46.t: "Célula de Atomwaffen desmantelada"
 germany.46.d: "Inmediatamente después de encontrar evidencia de la aparición de una célula de las Atomwaffen en Alemania, el Bundeskriminalamt comenzó a investigar su ubicación. Tardaron sorprendentemente poco tiempo, ya que al parecer la célula no anticipó la magnitud de las medidas que estaríamos dispuestos a tomar contra ellos.\n\nEsta mañana temprano, varios agentes se infiltraron en las casas de varios miembros de las Atomwaffen alemanas y arrestaron inmediatamente a estos traidores. No hubo bajas, aunque un miembro de la organización de ultraderecha resultó herido. Actualmente, los miembros de la organización se encuentran en una celda a la espera de juicio por su participación en la propagación del odio y la violencia.\n\nLa sola idea de que estos traidores hayan podido agruparse nos enferma."
 germany.46.a: "¡Excelente!"
 germany.47.t: "Nuestro pueblo contra nosotros"
 germany.47.d: "El régimen que hemos derrocado nunca se ha preocupado por el pueblo alemán, estaban demasiado ocupado bajándose los pantalones con las corporaciones globales y los globalistas mientras nuestra gente sufría. Cuando fuimos a la guerra contra los comunistas rusos, esos políticos sumisos apenas opusieron resistencia, a diferencia de nuestros valientes soldados quienes fueron mandados a  su perdición.\nPero con su derrocamiento empezará una nueva era, desafortunadamente, la población no se ha tomado bien el cambio en el Gobierno.\nA pesar de la gran impopularidad del régimen anterior, hay millones en las calles que buscan restablecer a sus líderes anteriores, las protestas son generalizadas, los saqueos son el pan de cada día y la población está empezando a tomar acciones violentas contra nosotros.\n\nLa situación se estaban saliendo de control rápidamente, más rápido que lo que habíamos planeado y mientras muchos en nuestro consejo aseguran que esto acabará explotando, está claro que se equivocan. Nuestra nación, nuestro régimen, e incluso nuestro pueblo, quienes no saben lo que están haciendo, estarán en juego si no tomamos cartas en el asunto. Estas manifestaciones y rebeliones deberán sofocarse por todos los medios necesarios.\n\nNos apena ver a nuestro pueblo pasar por más penurias, pero haremos lo que sea necesario para mantener a nuestra nación estable. Incluso si odiamos lo que vemos."
 germany.47.a: "La patria se estremece de nuevo."
 germany.48.t: "¡Secesión de Baviera!"
 germany.48.d: "Hemos tenido conocimiento de que, tras mucha inestabilidad y caos, Baviera se ha separado de nosotros.\n\nEn su discurso de sucesión, se negaron a reconocer el régimen de Berlín y declararon que ya no podían apoyar a un Gobierno despótico y autoritario. Tras este anuncio, han expandido aún más su movimiento y han formado un ejército improvisado compuesto por milicias de autodefensa y brigadas militares amotinadas.\n\nPara todos es evidente que esto no puede tolerarse si deseamos mantener nuestra estabilidad, ya que podría fomentar más movimientos secesionistas contra nuestro régimen.\nAunque muchos sugieren un enfoque diplomático para su reintegración, el Gobierno bávaro dejó claro que no habría negociaciones a menos que dimitiéramos y permitiéramos que el Gobierno legítimo retomara el control del país.\n\nNo nos han dejado otra opción que reintegrarlos mediante la guerra, y los cobardes que nos obligaron sufrirán las consecuencias."
 germany.48.a: "Múnich arderá."
 germany.49.t: "Tropas austriacas entran a Baviera"
 germany.49.d: "Desde el primer día, cuando Baviera declaró su secesión, se hizo evidente que los austriacos probablemente traicionarían su proclamado compromiso con la neutralidad. Su discurso de imparcialidad siempre sonaba falso ante la oportunidad, y la evidencia de su duplicidad era evidente para quienes estaban dispuestos a verla. Hoy, esta predicción se ha hecho realidad.\n\nCasi la totalidad del ejército austriaco, movilizado bajo el falso pretexto de garantizar la estabilidad regional, cruzó la frontera hacia Baviera tras un acuerdo de defensa mutua entre ambas naciones.\nEl Estado bávaro se encuentra ahora alentado por el apoyo austriaco, con sus fuerzas reforzadas y sus ambiciones envalentonadas. Pronto, muchas de estas unidades ocuparán posiciones a lo largo de la frontera bávaro-alemana; su presencia constituye una flagrante provocación y un desafío para nuestro próximo movimiento.\n\nSi bien el compromiso de Austria con la falsa independencia de Baviera supone un retroceso significativo en nuestra estrategia general, cambia poco en el panorama general. Estas dos naciones, incluso unidas por la desesperación y las circunstancias, no son rival para el poder abrumador de nuestras fuerzas y serán aplastadas de todos modos."
 germany.49.a: "Dos pájaros de un tiro."
 germany.50.t: "La Legión Condor regresa"
 germany.50.d: ""
 germany.50.a: "¡Recompensálos por su valentía!"
 germany.51.t: "Protestas por la cuarentena"
 germany.51.d: "En medio de la pandemia de COVID-19, Alemania ha experimentado una ola de protestas por la cuarentena, ya que los ciudadanos han expresado su frustración por las estrictas medidas del Gobierno para controlar la propagación del virus. Miles de personas han salido a las calles en grandes ciudades como Berlín, Múnich y Fráncfort, exigiendo el fin de las restricciones y expresando su preocupación por el impacto en las libertades civiles.\n\nLos manifestantes, de diversas afiliaciones políticas y orígenes sociales, se han unido con el objetivo común de desafiar la estrategia del Gobierno ante la pandemia. Los críticos argumentan que las restricciones han sido excesivamente severas y que afectan de forma desproporcionada a las pequeñas empresas y a las familias de bajos ingresos, lo que ha provocado mayores dificultades económicas y desigualdad social.\n\nEn respuesta a las manifestaciones, las autoridades alemanas han instado a la ciudadanía a cumplir con las medidas de confinamiento, enfatizando la importancia de la salud y la seguridad públicas durante la crisis. Las autoridades han destacado el éxito de las restricciones para frenar la propagación del virus y evitar la saturación de los hospitales.\n\nSi bien las protestas subrayan el creciente descontento entre la población alemana, también ponen de relieve el delicado equilibrio que los Gobiernos de todo el mundo deben lograr entre la preservación de la salud pública y la protección de las libertades individuales. A medida que la pandemia continúa evolucionando, queda por ver cómo las autoridades adaptarán sus políticas en respuesta a la situación cambiante y al sentir público."
 germany.51.a: "¡Vuelvan dentro!"
 germany.51.b: "¡El pueblo habla!"
 germany.52.t: "Desembarco exitoso en Novorosíisk"
 germany.52.d: "Tras un largo período de meticulosa planificación y preparación de nuestras fuerzas en el Mar Negro, hemos logrado un desembarco en Novorosíisk. Las fuerzas rusas en la región estaban mal equipadas y cedieron tras solo unos días de resistencia. Ahora que nos hemos atrincherado y asegurado nuestra posición, se nos ofrece una amplia variedad de posibles operaciones para recuperar las tierras ucranianas perdidas."
 germany.52.a: "¡Aprovechen la brecha!"
 germany.53.t: "Desembarco en Novorosíisk fracasa"
 germany.53.d: "Ya sea por un error de juicio, inteligencia errónea o un infiltrado que filtró los planes, nuestro desembarco en Novorosíisk fue un fracaso. Lo que se suponía que sería una gran inyección de moral y un duro golpe para los rusos se convirtió en una masacre, y tuvimos suerte de evacuar con éxito a algunos soldados. Esto ha supuesto un duro golpe para nuestra capacidad de operar en el Mar Negro, pero no permitiremos que nos desanime."
 germany.53.a: "Hay que aprender de esta derrota..."
 germany.54.t: "INFORME DE POTENCIAL INVASIÓN"
 germany.54.d: "DE: VIZEADMIRAL RAINER BRINKMANN\n\nLa Einsatzflottille 2 ha realizado reconocimientos en el Mar Negro y se ha enfrentado a las fuerzas navales rusas durante varias semanas. Uno de nuestros informes más recientes detalla la posible ventaja estratégica de un desembarco anfibio en el puerto de Novorosíisk. El puerto está actualmente defendido por una brigada de marines con pocos efectivos y marineros de la Flota Negra.\n\nSi logramos capturar y asegurar el puerto, esto podría aliviar la enorme presión de los ucranianos y favorecer la guerra.\n\nFIRMADO:"
 germany.54.a: "Vizeadmiral Rrainer Brinkmann."
 germany.55.t: "Aumentan las simpatías por el Imperio"
 germany.55.d: "Enrique XIII Prinz Reuss. Es el líder de lo que una vez fue un movimiento marginal, confinado a aristócratas nostálgicos y unos pocos oficiales amargados que nunca abandonaron el pasado. Pero ahora, los generales, los ministros, quienes guiaron a esta nación a través de la guerra y la ruina, escuchan. Algunos se burlan de la idea, pero otros escuchan. No lo dicen abiertamente, pero la idea persiste, incluso a puerta cerrada: \"Quizás un káiser sea lo que necesitamos\".\n\nEs absurdo, por supuesto. Un hombre con uniforme dorado puede que no borre nuestros fracasos ni cambie el rumbo, y claramente no traerá de vuelta a los hijos que enterramos en el Este. Y, sin embargo, ondean las banderas. Se propagan los panfletos. Los susurros se convierten en conversaciones, las conversaciones en planes. No somos como ellos, esos viejos necios que sueñan con Prusia marchando una vez más. Somos acero, no tradición. Somos soldados, no cortesanos. Pero la verdad es que este Reich está cansado. Hemos sangrado, nos hemos sacrificado, y lo que nos queda es un país inquieto, un pueblo incierto y un futuro vacilante.\n\nQuizás por eso miran a Enrique. No por poder, sino por certeza. Un káiser no lidera, simplemente es; un símbolo, un mito, un ancla para quienes no soportan el peso de nuestros fracasos. Pero si lo abrazamos, nos aferramos al pasado. Puede que no lleve una corona ahora, pero un día la querrá. Y cuando llegue ese día, no seremos nosotros quienes decidan el destino de Alemania.\n\nEntonces, ¿le seguimos el juego?"
 germany.55.a: "Puede que la Corona sea lo que necesitamos."
 germany.55.b: "Alemania no necesita idealismo."
 germany.56.t: "Batalla de Leipzig"
 germany.56.d: "La ciudad arde en llamas. El humo se eleva hacia el horizonte, mientras columnas negras se retuercen con el viento. Lo que comenzó como una protesta ha escalado a una guerra de ajuste de cuentas que se libra en las calles. La izquierda ha estado organizándose durante semanas, impulsada por la radiodifusión extranjera, la prensa clandestina y los llamados judeocomunistas a la insurrección. Convocaron huelgas, manifestaciones y \"acción directa\". Lo que obtuvieron fue sangre.\n\nNuestros activistas inundaron las calles en respuesta. Botas golpeando el adoquinado, banderas ondeando, cánticos de fútbol y \"Ausländer Raus\". No estaban allí para dialogar. Los primeros enfrentamientos fueron rápidos y brutales: palos contra cráneos, botas contra costillas. Luego llegaron los cuchillos, los tubos de hierro y los cócteles molotov.\n\nAhora, Leipzig se ha convertido en un campo de batalla. Barricadas policiales destrozadas, sirenas aullando, cuerpos destrozados yacen en las vías del tranvía. Las vías arden, con humo flotando sobre el Pleiße. Disparos resuenan en los callejones, primero desde las sombras y luego en abierta rebeldía. Esto ya no es un simple motín. Es una guerra en miniatura.\n\nEl objetivo principal es claro: la acción. Una purga final, el exterminio de la inmundicia izquierdista antes de que se propague más. Hay que someter a la ciudad, cueste lo que cueste. Sin embargo, muchos en nuestras filas piden moderación. La legitimidad del Reich está en juego; si esto se convierte en una masacre, el mundo estará observando."
 germany.56.a: "¿Qué esperan? Aplástenlos."
 germany.56.b: "Odio decirlo, pero retenganse."
 germany.57.t: "Resultados electorales 2021"
 germany.57.desc: "El 26 de septiembre comenzó la primera vuelta de las elecciones federales para elegir a los miembros del 20º Bundestag. También se celebran elecciones estatales en Berlín y Mecklemburgo-Antepomerania, una temporada electoral crucial en Alemania. Angela Merkel, canciller desde 2005, ha decidido no presentarse de nuevo, lo que ha generado un revuelo en la política alemana. En su lugar, la CDU ha nominado a Armin Laschet para canciller, mientras que el SPD ha nominado a Olaf Scholz, quien fue vicecanciller en el cuarto gabinete de Merkel. Estas elecciones marcan un punto de inflexión en la política alemana, con el SPD a punto de tomar las riendas, mientras que la CDU/CSU se encuentra sumida en el caos. Otros partidos, como Los Verdes, el FDP, la AfD y Die Linke, han nominado a sus candidatos, y a medida que se llenan las urnas, el ganador es evidente. Se anuncia al mundo que el futuro de Alemania es..."
 germany.57.a: "¡Una Alemania socialista!"
 germany.57.b: "¡Una Alemania verde!"
 germany.57.c: "¡Una Alemania roja!"
 germany.57.d: "¡Una Alemania libre!"
 germany.57.e: "¡Una Alemania conservadora!"
 germany.57.f: "¡Una Alemania soberana!"
 germany.58.t: "Contrarrestar el extremismo político"
 germany.58.d: "Las calles son una zona de guerra. Durante semanas, incluso meses, los enfrentamientos no han hecho más que intensificarse: figuras enmascaradas lanzan ladrillos a la policía antidisturbios, coches incendiados siguen ardiendo mientras las banderas rojinegras se enfrentan a las cruces de hierro y las antorchas.\n\nBerlín. Hamburgo. Leipzig. Ciudades antaño conocidas por su prosperidad, ahora campos de batalla. Los manifestantes asaltan edificios gubernamentales, rompiendo cristales y garabateando consignas en todo lo que encuentran. Las oficinas bancarias son destrozadas, las sedes de partidos quemadas, los turistas acosados, distritos enteros convertidos en fortalezas atrincheradas de facciones opuestas.\n\nLa policía está al límite de sus recursos. Cada respuesta se enfrenta a más violencia. Si reprimen con demasiada fuerza, la izquierda lo llama fascismo. Si se contienen, la derecha lo llama debilidad. La confianza en el Gobierno se erosiona con cada puñetazo, cada incendio, cada discurso que llama a la \"revolución\" o la \"purificación\".\n\nLos informes de inteligencia son directos. Ambos bandos están formando alas paramilitares. Los agitadores de ultraizquierda hablan de lucha anticapitalista, de derribar el \"estado burgués\" antes de que sea demasiado tarde. La ultraderecha habla de renacimiento nacional, de \"defender a Alemania\" de los enemigos internos. No podemos luchar contra ambos a la vez. O tal vez sí. Pero si no actuamos pronto, puede que no nos quede un Gobierno que defender."
 germany.58.a: "¡Enviemos la Amenaza Roja de vuelta al este!"
 germany.58.b: "¡El Reich nunca volverá!"
 germany.58.c: "Ambos extremos son igual de aberrantes."
 germany.59.t: "Fin de la guerra civil saudita"
 germany.59.d: "Cuando comenzó la guerra, el mundo se estremeció. Los mercados colapsaron, los petroleros pararon, los precios del combustible se dispararon. Los yacimientos petrolíferos de Arabia habían alimentado la economía mundial durante generaciones. Ahora eran campos de batalla. Si nos hubiéramos quedado de brazos cruzados, Alemania se habría desangrado junto con el resto. Así que elegimos un bando. Armas, asesores, logística, todo lo que la República necesitaba, se lo enviamos. Y cuando sus fuerzas llegaron a Riad con dificultades, nos aseguramos de que mantuvieran los pozos en funcionamiento.\n\nRiad está de fiesta, pero aquí, es una alegre necesidad. La economía de Berlín sobrevivió a la crisis, sus industrias no murieron de hambre. Nuestra apuesta había dado sus frutos. Los líderes de la República estaban agradecidos, por supuesto. Demasiado agradecidos. Sabían que nos lo debían todo, y ese tipo de deuda era peligrosa. ¿Cuánto tiempo pasaría antes de que las facciones se enfrentaran entre sí, antes de que resurgieran viejos rencores?\n\nY luego estaba el otro problema. Los monárquicos no se habían ido. En realidad, habían huido a Jordania y se habían reagrupado allí. Lo que quedara de la familia saudita maldeciría para siempre el nombre del Occidente democrático. Algún día volverían. Daba igual. Por hoy, habíamos ganado. La crisis del petróleo había terminado. La economía estaba a salvo."
 germany.59.a: "Un nuevo aliado en el Golfo."
 germany.60.t: "Yahya Assiri aparece en televisión"
 germany.60.d: "La guerra civil saudita lleva tiempo en curso, mientras la violencia aumenta y cada día mueren más inocentes. Es solo cuestión de tiempo que figuras prominentes de la península busquen apoyo en otros lugares. Recientemente, en Das Erste, el activista de derechos humanos Yahya Assiri concedió una entrevista y compartió su perspectiva sobre el conflicto actual.\n\nDescribe violaciones generalizadas de derechos humanos, hambrunas masivas y la destrucción del patrimonio cultural, que no ha hecho más que aumentar día a día. Con lágrimas en los ojos, habla de haber presenciado la muerte de un niño por heridas de metralla en el hospital, lo que lo ha animado aún más a presionar por la paz y el fin del conflicto.\n\nLa entrevista ha sido ampliamente vista en todo el país y, por ello, cada vez más alemanes piden una intervención en la guerra civil para detener el derramamiento de sangre y lograr la paz. A largo plazo, esto significa que recibiremos más apoyo de nuestro pueblo si decidimos intervenir."
 germany.60.a: "¡Es una causa justa!"
 germany.61.t: "Proyecto de ley de militarización rechazado"
 germany.61.d: "El reciente proyecto de ley para una mayor militarización ha sido rechazado."
 germany.61.a: "Jódete."
 germany.62.t: "Violencia entre ultraizquierda y ultraderecha"
 germany.62.d: "Otra pelea callejera, otra oficina bombardeada, otro cadáver sacado del río. La ultraizquierda y la ultraderecha ya no discuten. No debaten, ni protestan, ni siquiera fingen. Cazan. Recorren las calles con máscaras negras y brazaletes rojos, con la cabeza rapada y botas con punta de acero, viéndose mutuamente como simples presas. El recuento de cadáveres es la única moneda que importa.\n\nLos bancos son vandalizados y las oficinas políticas saqueadas. Los barrios son zonas prohibidas, sus calles vigiladas por patrullas autoproclamadas de radicales. La policía realiza arrestos donde puede, pero por cada militante que eliminan de la calle, dos más ocupan su lugar. Esta violencia es un ecosistema, un ciclo que se retroalimenta.\n\nEsta noche, una bomba molotov romperá una ventana. Un hombre será arrastrado a un callejón y su emboscada se extenderá por Twitter. Arderá una tienda, se tachará un nombre de una lista, una madre se despertará mañana y descubrirá que uno de sus hijos ha desaparecido. Y mañana, volverá a ocurrir."
 germany.62.a: "¿Cuándo terminará la violencia?"
 germany.63.t: "Negocios rusos atacados"
 germany.63.d: "Recientemente hemos observado un gran aumento de actos vandálicos contra negocios rusos. Principalmente, tiendas pertenecientes a diversos oligarcas rusos que se han atrevido a arriesgarse en Alemania. Desafortunadamente, también ha habido informes de negocios locales propiedad de inmigrantes rusos que han sido vandalizados, pero la peor parte del golpe sigue recayendo sobre los más corruptos.\n\nSi bien no aprobamos estos ataques, poco podemos hacer para detenerlos. No parece haber ningún movimiento organizado detrás de estas acciones, y es mucho más probable que hayan sido perpetradas por pequeños grupos de individuos. Tras deliberar, se ha decidido no intervenir y esperar que estos ataques se calmen por sí solos."
 germany.63.a: "¡El imperialismo ruso no tiene lugar en Europa!"
 germany.64.t: "Cuestión de los oligarcas rusos"
 germany.64.d: "La inestable situación económica actual, así como el aumento de las tensiones en el Este, han planteado la cuestión de las propiedades de los empresarios rusos.\n\nSi bien podemos arriesgarnos a una escalada innecesaria con Rusia, existe una opinión generalizada en el ámbito político de que estos activos deberían destinarse a las necesidades del Estado alemán, argumentando la agresiva política exterior rusa como razón para ello. Sin embargo, permitir que las empresas rusas sigan operando podría ser igualmente beneficioso, ya que muchas contribuyen al sector industrial y energético de Alemania.\n\nLa decisión final corresponde a la canciller."
 germany.64.a: "¡Expropiaremos sus activos!"
 germany.64.b: "Déjenlos, no queremos arruinar la inversión."
 germany.65.t: "Desastrosas negociaciones con Rusia"
 germany.65.d: "VOSOTROS GRANDÍSIMOS IMBÉCILES PENSAIS QUE ELLOS NEGOCIARÁN TRAS LA CANCELACIÓN DEL NORDSTREAM, IROS A LA MIERDA BARBAROS SUBNORMALES"
 germany.65.a: "¡putozz orkos!!!!111!!1111!!!1"
 germany.66.t: "Negociaciones con Rusia exitosas"
 germany.66.d: ""
 germany.66.a: "¡Son hombres de entendimiento!"
 germany.67.t: "Rescate del sector mayorista"
 germany.67.d: "En medio de la actual pandemia de COVID-19, el Gobierno alemán ha anunciado un paquete de ayuda financiera sustancial para apoyar al sector mayorista del país, que atraviesa dificultades. Dado que las empresas de diversas industrias enfrentan importantes desafíos económicos debido a la crisis sanitaria mundial, esta medida tiene como objetivo brindar un alivio muy necesario y ayudar a sostener el sector durante este período difícil.\n\nEl paquete de rescate, por un valor de varios miles de millones de euros, se asignará a los mayoristas de varias industrias, incluidos los alimentos, los textiles y los productos farmacéuticos. La financiación tiene como objetivo ayudar a estas empresas a mantener su fuerza laboral, continuar sus operaciones y cumplir con las obligaciones financieras a pesar de la demanda reducida y las cadenas de suministro interrumpidas causadas por la pandemia."
 germany.67.a: "Son una parte vital de la economía."
 germany.67.b: "Tendrán que sufrir como el resto..."
 germany.68.t: "Rescate del sector financiero"
 germany.68.d: "En respuesta a la crisis económica causada por la pandemia de COVID-19, el Gobierno alemán ha presentado un importante paquete de ayuda financiera destinado a apoyar al sector financiero del país. En un momento en que los bancos y las instituciones financieras enfrentan desafíos cada vez mayores debido a la crisis sanitaria mundial, este rescate pretende brindar la asistencia que tanto necesitan y mantener la estabilidad dentro del sector.\n\nEl paquete de miles de millones de euros se distribuirá a varias instituciones financieras, incluidos bancos, compañías de seguros y empresas de inversión. La financiación tiene como objetivo garantizar el funcionamiento continuo de estas instituciones, a pesar de la crisis económica, y salvaguardar el sistema financiero del país.\n\nEl Gobierno alemán reconoce el papel fundamental que desempeña el sector financiero para mantener la estabilidad económica y facilitar el crecimiento. Al brindar este apoyo financiero, el Gobierno espera mitigar los efectos a largo plazo de la crisis de COVID-19 en la economía y contribuir a una recuperación más rápida una vez que la pandemia disminuya.\n\nComo parte del acuerdo de rescate, las instituciones financieras deberán cumplir condiciones estrictas, incluida una mayor transparencia financiera, requisitos de capital reforzados y un compromiso con prácticas crediticias responsables. Esta medida está en consonancia con los objetivos más amplios del Gobierno alemán de promover la estabilidad financiera y las prácticas comerciales responsables frente a la actual incertidumbre económica."
 germany.68.a: "Son una parte vital de la economía."
 germany.68.b: "Tendrán que sufrir como el resto..."
 germany.69.t: "Caída de la Bolsa Alemana"
 germany.69.d: "A principios de año, la bolsa alemana experimentó un pequeño contratiempo cuando Wall Street se desplomó, pero resultó ser solo un anticipo. Hoy, las consecuencias del colapso de Estados Unidos finalmente han golpeado a nuestra nación con toda su fuerza. Los accionistas se dieron cuenta de que nuestra bolsa, al igual que muchas otras en todo el mundo en los últimos meses, se desplomó drásticamente.\n\nVarios partidos de la oposición han utilizado esto como ejemplo para mostrar la dependencia que Alemania se ha vuelto de Estados Unidos en las últimas décadas y han abogado por una mayor austeridad. Si bien se ha acordado que el desplome podría haber sido peor, sus efectos aún resonarán en toda la economía."
 germany.69.a: "¡Debemos afrontar la tormenta!"

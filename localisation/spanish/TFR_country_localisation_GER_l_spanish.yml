 GER_scars_of_nato_war_desc: "La guerra ha dejado huella en todos, y nosotros no somos la excepción. Nuestras ciudades e infraestructuras han quedado devastadas, y la reconstrucción llevará años, si no décadas. La guerra ha afectado la moral y los recursos de la ciudadanía, dejando profundas cicatrices que quizá nunca desaparezcan."
 GER_nato_war_victor_desc: "Como líderes de la UE, nos encontramos como los amos indiscutibles de Europa, tras haber destrozado la maquinaria bélica rusa y protegido a Occidente de la tiranía. Sin embargo, la victoria ha tenido un precio. Decenas de miles de nuestros hombres fueron enviados a morir en el frente, regiones enteras fueron devastadas y el esfuerzo bélico llevó nuestra economía al límite. Puede que las cicatrices no sean tan visibles aquí como en el Este, pero el espectro de la guerra persiste en nuestras fábricas, en nuestras calles y en la mente de cada ciudadano.\n\nAhora comienza una nueva clase de guerra: la lucha por estabilizar, reconstruir y afianzar la democracia por la que tantos de nuestros jóvenes lucharon y murieron. Pero mientras Europa nos busca en busca de liderazgo, debemos preguntarnos: ¿será este triunfo el comienzo de una nueva era democrática o simplemente la calma antes de §Rla próxima tormenta rusa§!?"
 GER_nato_war_victor2_desc: "Como líderes de la UE, nos encontramos como los amos indiscutibles de Europa, tras haber destrozado la maquinaria bélica rusa y protegido a Occidente de la tiranía. Sin embargo, la victoria ha tenido un precio. Decenas de miles de nuestros hombres fueron enviados a morir en el frente, regiones enteras fueron devastadas y el esfuerzo bélico llevó nuestra economía al límite. Puede que las cicatrices no sean tan visibles aquí como en el Este, pero el espectro de la guerra persiste en nuestras fábricas, en nuestras calles y en la mente de cada ciudadano.\n\nAhora comienza una nueva clase de guerra: la lucha por estabilizar, reconstruir y afianzar la democracia por la que tantos de nuestros jóvenes lucharon y murieron. Pero mientras Europa nos busca en busca de liderazgo, debemos preguntarnos: ¿será este triunfo el comienzo de una nueva era democrática o simplemente la calma antes de §Rla próxima tormenta rusa§!?"
 GER_chaotic_revolution_desc: "Nuestra derrota a manos de Rusia fue repentina y caótica, y la toma del poder por parte del pueblo lo fue aún más. Sin un verdadero ejemplo de gobierno en el que apoyarnos, nos vimos obligados a formar apresuradamente un nuevo liderazgo para asegurar la supervivencia de la revolución en los próximos años. Hasta que todo esto se resuelva, los efectos del caos seguirán notándose y estaremos debilitados."
 GER_chaotic_revolution2_desc: "Nuestra derrota a manos de Rusia fue repentina y caótica, y la toma del poder por parte del pueblo lo fue aún más. Sin un verdadero ejemplo de gobierno en el que apoyarnos, nos vimos obligados a formar apresuradamente un nuevo liderazgo para asegurar la supervivencia de la revolución en los próximos años. Hasta que todo esto se resuelva, los efectos del caos seguirán notándose y estaremos debilitados."

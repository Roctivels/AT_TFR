 GER_NATO_war_category: "La Guerra Europea"
 GER_NATO_war_category_desc: "\n\n\n\n\n£GFX_SOV_NATO_war_category\n\n\n\n\n\n\n\nvienen los rusos!!!\n\n§ROBJETIVOS PRINCIPALES§!:\n\n§YSEBASTOPOL§!: [GLOBAL.get_sevastopol_nato_status]\n§YMINSK§!: [GLOBAL.get_minsk_nato_status]\n§YS. PETERSBURGO§!: [GLOBAL.get_petersburg_nato_status]\n§YROSTOV DEL DON§!: [GLOBAL.get_rostov_nato_status]\n\n§ROBJETIVOS SECUNDARIOS§!:\n\n§YKALININGRADO§!: [GLOBAL.get_kaliningrad_nato_status]\n§YBÉLGOROD§!: [GLOBAL.get_belgorod_nato_status]\n§YVOLGOGRADO§!: [GLOBAL.get_volgograd_nato_status]\n§YNÓVGOROD§!: [GLOBAL.get_novgorod_nato_status]\n§YDONETSK§!: [GLOBAL.get_donetsk_nato_status]\n§YLUGANSK§!: [GLOBAL.get_luhansk_nato_status]\n\n§GCIUDADES ALIADAS§!:\n\n§YKIEV§!: [GLOBAL.get_kiev_nato_status]\n§YODESA§!: [GLOBAL.get_odessa_nato_status]\n§YTALLIN§!: [GLOBAL.get_tallinn_nato_status]\n§YVILNA§!: [GLOBAL.get_vilnius_nato_status]\n§YVARSOVIA§!: [GLOBAL.get_warsaw_nato_status]\n§YBUDAPEST§!: [GLOBAL.get_budapest_nato_status]\n§YBUCAREST§!: [GLOBAL.get_bucharest_nato_status]"
 GER_extremism_category: "Bundesamt für Verfassungsschutz"
 GER_extremism_category_desc: "La historia alemana está marcada por el terror, el derramamiento de sangre y la opresión. Esto no debe volver a ocurrir. Desde los nazis y su genocida asolamiento por toda Europa, y sus atroces políticas en el país, hasta el Estado comunista de la Stasi que mantuvo a nuestro pueblo separado y dividido durante más de 40 años, la brillante democracia de la República Federal se asegurará de que esto no vuelva a ocurrir. A pesar de las enormes cantidades de terror y muerte que ambos regímenes infligieron al pueblo alemán, todavía hay quienes desean su restauración. Por eso existe la Oficina Federal para la Protección de la Constitución. El extremismo, el radicalismo y el totalitarismo deben ser frenados a cualquier precio. Y si estos grupos quieren llegar al poder, deben ser detenidos §Rpor la fuerza§!.\n\nNivel de §Cextremismo de derecha§!: §Y[?GER_right_extremism_var|%2]§!\n\nNivel de §Oextremismo de izquierda§!: §Y[?GER_left_extremism_var|%2]§!"
 european_union_category: "Unión Europea"
 european_union_category_desc: "\n\n\n\n\n£GFX_GER_eu_federalization_banner\n\n\n\n\n\n\n\nLa Unión Europea es una de las instituciones internacionales más sólidas del mundo. Con la fuerza combinada de la mayor parte de Europa continental, facilita la libre circulación de trabajadores, información y bienes en toda Europa.\n\nActual $GER_federalization_progress_name$: §Y[?GER.eu_fed_var|1%]§! (£civ_factory_output  [?GER.eu_fed_var_dynamic_var|=+1%], £consumer_goods_texticon  [?GER.eu_fed_var_dynamic_var|=-1%], £GFX_coordination_texticon  [?GER.eu_fed_var_dynamic_var|=+1%], y £GFX_dx  [?GER.eu_fed_var_dynamic_var|=+1%])\n\nActual £GFX_GER_euroskepticism_texticon  euroescepticismo: §Y[?GER.eu_euroskepticism_var|1%]§!\n\nActual separatismo: §Y[?GER.eu_visregard_sepratism_var|1%]§!\nEfectos del separatismo: £pol_power  [?GER.eu_visregard_sepratism_dynamic_var|=+2]"
 GER_parties_category: "Esfera política alemana"
 GER_parties_category_desc: "\n\n\n\n\n£GFX_GER_bundestag_banner\n\n\n\n\n\n\n\n[GER.GetNameDefCap] es una de las naciones más democráticas del mundo, donde las elecciones reflejan la voluntad popular y salvaguardan nuestros valores democráticos con cada voto emitido.\n\nDurante años, nuestras aguas políticas han permanecido en calma, pero incluso el océano más tranquilo puede verse fácilmente agitado por una tormenta. Aun así, mientras mantengamos el rumbo, resistiremos cualquier desafío.\n\nEn los salones del Bundestag, los debates sobre temas internos y externos surgen y se desvanecen, pero seguimos comprometidos con la unidad, la justicia y la libertad. Mientras estas puertas permanezcan abiertas, también lo estará la promesa de paz.\n\nApoyo total del Bundestag: [?GER_support_bundestag_total_var|Y1%][GER_bundestag_faction_die_linke_text][GER_bundestag_faction_spd_text][GER_bundestag_faction_greens_text][GER_bundestag_faction_fdp_text][GER_bundestag_faction_cdu_text][GER_bundestag_faction_afd_text]"
 GER_turkish_gamble_category: "El Gran Juego Turco"
 GER_turkish_gamble_category_desc: "Turquía se encuentra en la encrucijada entre Occidente y Oriente. A pesar de nuestros conflictos con los pueblos kurdos, así como de su creciente cooperación con Rusia, Turquía sigue siendo un aliado de la OTAN. Su ubicación estratégica en el estrecho del Bósforo la hace imprescindible para los planes de defensa de la OTAN en el Mar Negro. Por lo tanto, es fundamental que nos aseguremos de que Turquía permanezca dentro de nuestra esfera de influencia.\n\nNuestra influencia actual sobre Turquía es de §Y[?GER_Turkish_Influence]§! puntos. Con §G80§! puntos, podremos §Rasegurar§! la lealtad de Turquía como miembro de la OTAN.\n\nLas elecciones turcas se celebrarán el §Y14 de mayo de 2023.§!"
 GER_war_on_authoritarianism: "Operación Global Enforcer"
 GER_war_on_authoritarianism_desc: "La guerra contra Rusia ha demostrado ahora más que nunca que el mundo está amenazado por el autoritarismo. Europa se erige como un faro de democracia y libertad, y es nuestro deber difundir estas virtudes entre todos los pueblos oprimidos dondequiera que se encuentren.\n\nSi no quieren ver la luz por las buenas, lo harán por las malas..."
 GER_eastern_european_development: "Reconstrucción ucraniana-bielorrusa"
 GER_eastern_european_development_desc: "A pesar de nuestra victoria sobre Rusia, las tierras de Europa Oriental han sido gravemente devastadas. Ahora es el momento de la paz y la reconstrucción; debemos ayudar a nuestros nuevos aliados para asegurar su plena recuperación."
 GER_private_military_companies: "Empresas militares privadas"
 GER_private_military_companies_desc: "Erm blackwater?>??"
 GER_legion_recruitment: "Reclutamieno extranjero"
 GER_legion_recruitment_desc: "Erm blackwater?>??"
 GER_new_political_sphere_category: "Nueva esfera política alemana"
 GER_new_political_sphere_category_desc: "\n\n\n\n\n£GFX_GER_new_political_sphere_banner\n\n\n\n\n\n\n\nNuestro país ha sido envenenado por años de decadencia globalista liberal. La principal razón por la que perdimos la guerra es que nuestro pueblo olvidó lo que es ser un gran país y, francamente, es hora de recordárselo.\n\n"
 GER_five_year_plan_cat: "Plan Quinquenal"
 GER_five_year_plan_cat_desc: "El capitalismo ha sido un desastre para la economía alemana. Hace más de treinta años, los capitalistas robaron y arruinaron las empresas populares del este de nuestro país, sometiéndonos por completo a la OTAN, y ahora nos obligan a una guerra imposible de ganar contra Rusia que destruyó nuestra economía. Era cuestión de tiempo para que este sistema fracasara.\n\nLa Volkskammer ha decretado la creación del Plan Quinquenal para reparar los fracasos del régimen anterior, recuperar y multiplicar la capacidad industrial de Alemania y así poder derrotar al fascismo de una vez por todas."
 GER_socialist_market_economics_cat: "Economía de mercado socialista"
 GER_socialist_market_economics_cat_desc: "El capitalismo ha sido un desastre para la economía alemana. Hace más de treinta años, los capitalistas robaron y arruinaron las empresas populares del este de nuestro país, sometiéndonos por completo a la OTAN, y ahora nos obligan a una guerra imposible de ganar contra Rusia que destruyó nuestra economía. Era cuestión de tiempo para que este sistema fracasara.\n\nLa Volkskammer ha decretado un nuevo plan económico para reparar los fracasos del régimen anterior, recuperar y multiplicar la capacidad industrial de Alemania y así poder derrotar al fascismo de una vez por todas."
 GER_spread_the_revolution_category: "Esparciendo la revolución"
 GER_spread_the_revolution_category_desc: "0_o"
 GER_peoples_economy_category: "Volkswirtschaft"
 GER_peoples_economy_category_desc: "Alemania ha sido durante mucho tiempo el motor económico de Europa, pero los recientes años de inestabilidad energética y las tensas relaciones comerciales han empujado a nuestra nación hacia una encrucijada decisiva.\n\nPara navegar esta era, ahora dependemos de dos herramientas económicas estratégicas:\n\n§7£GFX_GER_green_economy_points_texticon  Puntos verdes:§! [?GER_green_economy_points_var|+0]\n§gSe obtienen a través de reformas ambientales, expansión de energías renovables, soluciones ecológicas innovadoras y medidas industriales sostenibles.\nReflejan resiliencia, innovación, eficiencia y responsabilidad ecológica.§!\n\n§3£GFX_GER_blue_economy_points_texticon  Puntos azules:§! [?GER_blue_economy_points_var|+0]\n§gSe obtienen profundizando la integración de Alemania dentro del marco económico europeo. Fortaleciendo la cooperación de la UE, estabilizando las cadenas de suministro regionales y apoyando los objetivos de desarrollo continental.\nReflejan integración, capacidad industrial y responsabilidad social.§!\n\nCanciller, al equilibrar la renovación ecológica con la coordinación europea, podrá restaurar la prosperidad y asegurar el lugar de Alemania como potencia líder en el continente."
 GER_bundeswehr_category: "Bundeswehr"
 GER_bundeswehr_category_desc: "El ejército alemán moderno nunca fue considerado una fuerza totalmente independiente con la que se pudiera contar, pero ahora es más evidente que nunca que es un ejército mediocre, con una absoluta falta de reclutas y financiación.\n\nReavivar la fe en la Bundeswehr es reavivar nuestro orgullo nacional."
 GER_european_armed_forces_category: "Fuerzas Armadas Europeas"
 GER_european_armed_forces_category_desc: "Si queremos ahuyentar al oso ruso de una vez por todas, debemos analizar qué usaremos para defenderlo. Un bloque desunido de múltiples Estados, cada uno intentando ser el mejor en cada categoría. La única forma de alcanzar el éxito es la unidad. La unidad en nuestras fuerzas armadas es esencial para lograrlo. Sin embargo, esta unidad no es tan fácil como pronunciar algunos discursos en Bruselas.\n\nHay que redactar y reescribir tratados. Hay que forjar pactos. Nuestros soldados y comandantes necesitan nuevo entrenamiento y nuevas organizaciones. Y nuestro pueblo debe apoyar esto en todo momento. Estas reformas no están pensadas para aprobarse de la noche a la mañana. Pero es necesario aprobarlas de cualquier manera. Nuestro futuro y el de nuestros hijos dependen de ello. Es la única manera de que nuestra libertad sobreviva.\n\n@BRS §YIN VARIETATE CONCORDIA.§! @BRS"
 ISR_GER_solomon: "OPERACIÓN: SALOMÓN"
 ISR_GER_solomon_desc: "Israel, el principal aliado de la OTAN en Medio Oriente, ha sido atacado nuevamente por una coalición árabe. Bajo el manto del odio étnico y religioso habitual y las preocupaciones humanitarias, intentan cuestionar la existencia misma de Israel. No podemos permitir que lo consigan.\n\nEl Mando de la OTAN ha autorizado, y el Bundestag ha aprobado, todo el apoyo militar necesario, hasta un contingente militar limitado de tropas de la OTAN, para garantizar el derecho de Israel a la legítima defensa.\n\nDebemos demostrar al mundo que la OTAN es capaz de defender a sus aliados en el extranjero."

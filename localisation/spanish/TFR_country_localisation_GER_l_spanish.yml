 GER_antiquated_legal_system_dynamic: "Sistema legal anticuado"
 GER_antiquated_legal_system_dynamic_desc: "Durante los \"buenos viejos tiempos\", el sistema legal tanto en el imperio alemán como en el Sacro Imperio Germánico era muy apreciado, aunque solo por la nobleza.\n\nSu regreso asegura la satisfacción de las clases altas de la sociedad alemana, sin embargo, no viene sin su propia parte de contratiempos.\n\nLas leyes antiguas no han resistido la tiempo, y las clases bajas de la nación alemana están constantemente en conflicto legal debido a su falta de instrucción adecuada en estas leyes, por lo que es solo cuestión de tiempo antes de que los ciudadanos se cansen de su nobleza indeseada.\n\nLa reintroducción de viejas leyes sin duda llevará a que la nación alemana se hunda en la nostalgia y la desigualdad, pero a la clase dominante no le preocupa eso, lanzando fiestas lujosas mientras se sientan en sus propias torres de marfil.\n\nAlgunas cosas nunca cambian."

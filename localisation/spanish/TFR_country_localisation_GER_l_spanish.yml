 germany.313.t: "Vacas: la raíz del calentamiento global"
 germany.313.d: "¿Te gusta la carne de res? ¿Disfrutas de un jugoso filete en la barbacoa del domingo? Estoy seguro de que muchos de nosotros hemos saboreado la tierna y fascinante textura de la carne de vaca, pero, ¿alguna vez te has preguntado cuánta contaminación genera la ganadería? Si te lo dijera, probablemente te quedarías sorprendido.\n\nEn promedio, la cría de ganado es responsable de alrededor del 15% de la contaminación global, liberando gases de efecto invernadero como el metano y el óxido nitroso. En esta era moderna, con un conjunto de valores y principios más evolucionados, deberíamos sentirnos un poco incómodos al disfrutar de la carne y la sangre de otros seres vivos. En el pasado, los humanos no tenían más opción que alimentarse de la carne y los huesos de otros organismos en nuestro planeta compartido, pero hoy en día hay un sinfín de alternativas saludables y efectivas, incluso más nutritivas.\n\nAunque me encantaría abogar por el veganismo, sé que no todos están listos para hacer una transición completa a una dieta basada solo en plantas. Por eso, quiero proponer a nuestros queridos lectores una dieta de transición, llena de todos los nutrientes necesarios y rica en proteínas. Esta opción alimentaria es completamente libre de productos animales y genera muy poco o ningún gas de efecto invernadero. Querido lector, les presento el nuevo superalimento del siglo: ¡LOS INSECTOS! Ya sean saltamontes, abejas o hormigas, estos pequeños seres son increíblemente ricos en proteínas y grasas saludables. Con estas diminutas criaturas, la humanidad finalmente podrá dejar atrás a los grandes y pesados animales domésticos como la enorme vaca."
 germany.313.a: "¡Es lo razonable!"
 germany.314.t: "Sombras del pasado"
 germany.314.d: "El cielo sobre Hamburgo siempre lucía gris, como un viejo vidrio que nunca se limpiaba del todo. A ambos lados de la calle, se alineaban edificios de oficinas, con sus muros cubiertos de enormes vallas publicitarias que repetían anuncios corporativos sin parar, desde la mañana hasta la noche.\n\nLa pequeña Mia levantó la mirada, con un destello de confusión en sus ojos al observar las torres de acero, tan altas que sus cimas se perdían de vista. \"Mamá\", tiró de la manga de su madre, \"dijiste que Hamburgo solía ser muy bonita. Pero aquí se ve limpio y nuevo. ¿Qué tiene de malo?\".\n\nSu madre la miró, dudó un momento, y luego se inclinó para responder: \"En aquel entonces... había pequeñas plazas, muchos cafés. En invierno, adornaban las ventanas con decoraciones navideñas. Y por la noche, las luces eran suaves y cálidas. La gente caminaba despacio, hablaba despacio, no como ahora, que corren, pensando solo en el trabajo del día siguiente, en las reuniones y los plazos\".\n\nMia parpadeó, entendiendo solo a medias. \"¿Y por qué lo derribaron todo?\" Su madre le tomó la mano mientras pasaban por un tramo de construcción en curso. El suelo estaba húmedo y blando, y el sonido del metal resonaba a lo lejos.\n\n\"Porque esas viejas calles y edificios no generaban dinero\", dijo en voz baja, como si temiera que alguien la oyera. \"Así que los derribaron, uno a uno, y levantaron estas torres. Cada centímetro de lo que ves ahora pertenece a una empresa\".\n\nMia no hizo más preguntas. Simplemente se giró un momento, como si intentara vislumbrar esas cálidas luces de las que le había hablado su madre, ocultas en algún lugar entre las grietas del acero y el hormigón.\n\nPero no había nada."
 germany.314.a: "Solo las caras vacías de los anuncios."
 germany.315.t: "La próxima fase"
 germany.315.d: "Ahora nuestro sistema está asegurado tanto desde fuera como desde dentro.\n\nEs hora de dar un último paso antes de que podamos establecer un dominio total y extenderlo más allá de las fronteras de Europa.\n\nNuestros expertos, funcionarios, empresarios y redactores, todos aquellos a quienes el FEM ha acogido bajo su protección, están trabajando arduamente de nuevo: pronto se conocerá el resultado.\n\nLa conclusión lógica de la historia."
 germany.315.a: "Nuestros planes serán revelados."
 germany.316.t: "La UE firma el Tratado del Atlántico Norte"
 germany.316.d: "En una ceremonia celebrada desde la sede ejecutiva de la Unión Europea en Bruselas, Günther Fehlinger anunció hoy la firma del Tratado del Atlántico Norte por parte de la UE y la restauración de la recientemente extinta OTAN. Rodeado de los principales diplomáticos y generales de la Unión, Fehlinger declaró \"el principio del fin de la tragedia europea\".\n\n\"El baluarte de la seguridad europea que nos fue arrebatado tan cruelmente finalmente ha regresado\", proclamó a los periodistas desde las escaleras del edificio Berlaymont. \"La incertidumbre de la posguerra y la deriva hacia la irrelevancia han terminado. Ahora tenemos una sola misión: ¡Detener la agresión rusa!\".\n\nFehlinger ha seguido intensificando su infame retórica agresiva contra Rusia, [SOV.GetLeader] y la OTSC. Los europeos han elogiado ampliamente esta medida, pero los críticos advierten del revanchismo y una posible segunda guerra con Rusia que podría destruir Europa para siempre."
 germany.316.a: "¡Llamo a la OTAN a reestablecer el orden!"
 germany.317.t: "El invitado especial de NAFO-Con"
 germany.317.d: "Al salir del coche, el aire helado de Viena le dio un suave golpe en el rostro. Llevaba su atuendo característico: zapatos elegantes, un traje negro, gafas y un montón de broches que adornaban su cuello. Con el frío apremiándole, avanzó con dificultad por la nieve hacia un edificio gris decorado con banderas de la OTAN y de Shiba Inu. Los copos de nieve caían delicadamente, golpeando su rostro mientras luchaba por avanzar. El fondo blanco hacía que el cuello decorado de su traje brillara aún más. Al llegar a su destino, muchos fuera del centro de convenciones se quedaron boquiabiertos. Le pidieron autógrafos y fotos a su ídolo, algo que aceptó con un poco de reticencia.\n\nAl entrar, se sintió revitalizado al inhalar el aire cálido que llenaba sus pulmones. El lúgubre sonido del viento aullante fue reemplazado por el bullicio de cientos de fans que lo adoraban, comentando sobre su llegada. Se acomodó en el puesto de autógrafos, ajustándose la corbata y mostrando con orgullo sus alfileres de cuello, asegurándose de que todos los que pasaran pudieran verlos. Pronto, la fila se extendía por cientos.\n\n\"Señor Fehlinger, ¿puedo tomarme una foto con usted?\", preguntó un joven delgado con un gorro de la OTAN. \"¡Por supuesto!\", respondió Gunther. Preparó el teléfono del chico y mostró su sonrisa, ya famosa en todo x.com. El joven le agradeció y se marchó feliz. Gunther esperó a que el siguiente fan se acercara, y mientras tanto, pensó:"
 germany.317.a: "\"Uno menos, quedan doscientos más\"."
 germany.318.t: "Modders"
 germany.318.d: "El sonido de un nuevo mensaje iluminó el canal de Discord.\nPrimero, aparecieron una serie de fotos borrosas: cuatro vasos alzados. Uno estaba lleno de café, otro tenía una botella de vino medio vacía al fondo, otro estaba sospechosamente lleno de una bebida energética brillante, y el último solo mostraba un fino anillo de leche en el fondo. Luego, llegó una captura de pantalla. Una simple página de Steam.\n\"CARGA COMPLETA: EUROPA VINDICTA [HOI5 MOD] v0.1a ya está disponible en el Workshop\".\nEl texto debajo decía:\n\n\"Lo logramos, camaradas. ¡Viva Vindicta!\".\n\nHabían estado trabajando en esto durante casi un año.\nTrasnochadas, plazos incumplidos, dibujando árboles de enfoque durante las clases, debatiendo rutas revisadas durante la semana de exámenes, y traduciendo el texto del evento a las 2 de la madrugada desde habitaciones de hotel y literas de hostal. No eran profesionales, solo un grupo de programadores y artistas, un aficionado a la historia irlandesa y un francés que, de alguna manera, gestionaba GitHub y parecía no dormir nunca.\n\nEn su cronología, 2026 terminó de una manera diferente.\nLa UE se mantuvo unida. El frente oriental no se derrumbó. Moscú se quebró primero. El Tratado de Leópolis redibujó el mapa. Europa, magullada pero intacta, se alzaba más alta que nunca.\nEl servidor de Discord cobró vida. Alguien publicó un GIF de baja resolución de fuegos artificiales. Otro simplemente escribió:\n\"Imagina si hubiera sido así...\"\nLas capturas de pantalla comenzaron a llover. El contador de suscriptores empezó a subir: 10, 24, 60.\nAlguien publicó un fanart de una manifestación en el Parlamento Europeo de la posguerra, envuelta en estrellas doradas y niebla."
 germany.318.a: "¡Viva Vindicta!"
 germany.319.t: "El gran tablero - Parte II"
 germany.319.d: "\"Primero: Rusia. Nuestra inteligencia ha confirmado que Moscú ha comenzado a enviar armas y personal para apoyar a China. Si los atacamos directamente, podríamos debilitar el frente oriental. Sin embargo, no estamos seguros de que la OTDP pueda ganar sin nuestra ayuda\".\n\nClic.\n\n\"Segundo: ayuda material. Envíos masivos de armas a nuestros aliados en Asia. Nuestra capacidad industrial probablemente pueda manejar esto junto con nuestras necesidades internas. La mayoría del Estado Mayor está a favor de esta opción\".\n\nHubo un momento de duda. El silencio se hizo presente.\n\n\"Y tercero...\"\n\nRespiró profundamente.\n\n\"...intervención directa. Una campaña militar completa en Asia. Las posibles recompensas son enormes, pero también implicaría una gran presión logística... y una posible escasez de tropas\".\n\nLas luces se atenuaron. El silencio continuó. Todas las miradas se centraron en un hombre.\n\nFehlinger se levantó, ajustándose la chaqueta. Su voz era serena y decidida:\n\n\"Caballeros...\""
 germany.319.a: "Preparen el champán: ¡pronto estaremos a las puertas de Pekín!"
 germany.319.b: "Despierten a las máquinas: necesitarán armas y nosotros se las daremos."
 germany.319.c: "Prioricemos la verdadera amenaza, pero que Japón sepa que los apoyamos."

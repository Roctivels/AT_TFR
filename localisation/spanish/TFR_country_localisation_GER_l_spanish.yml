 germany.290.c: "¡Ofrecedles su propia plataforma dentro del KDS!"
 germany.301.t: "Nombre del nuevo partido"
 germany.301.d: "Nuestra llegada al poder plantea la cuestión de organizar nuestra forma de gobernar el país, en concreto la organización del partido y del Estado.\n\nLa fuerza gobernante actual sigue siendo el SED reformado, una imitación del que existía en la antigua República Democrática Alemana. Es una formación decente, así que podríamos simplemente detener su reorganización interna para asegurar su lealtad.\n\nOtra opción es apelar al flanco derecho de la revolución reformando la Liga de Combate de los Socialistas Alemanes, de tendencia nacionalcomunista, donde Michael Koth tuvo el mayor éxito uniendo a la izquierda y la derecha, aunque la organización en general seguía considerándose de ultraderecha.\n\nFinalmente, podemos seguir el ejemplo de la RPDC y adaptar su Partido del Trabajo a los estándares alemanes, iniciativa de la Plataforma Antiimperialista. Esto podría atraer a los internacionalistas y favorecer más a la izquierda más radical de nuestro movimiento.\n\nEntonces, ¿cuál elegiremos?"
 germany.301.a: "Mantengamos el SED y limitémonos a reformas internas generalizadas."
 germany.301.b: "¡Reviviremos la gloria de la Liga de Combate de los Socialistas Alemanes!"
 germany.301.c: "¡Reformemos el SED siguiendo el ejemplo coreano para convertirlo en nuestro propio Partido del Trabajo!"
 germany.302.t: "Elogio al K-Punk"
 germany.302.d: "Para la mayoría de la gente, se entiende que solo los grandes guerreros podrían marcar el futuro, que de las llamas del cambio surgiría un nuevo mundo, pero a veces, simplemente, no es así.\n\nA través de sus escritos, Mark diagnosticó la condición de nuestra época.\nLa creciente sensación de que \"no hay alternativa\" al orden neoliberal, de que incluso nuestros sueños están colonizados por fuerzas económicas que escapan a nuestro control.\nSin embargo, no se limitó a describir esta condición; luchó contra ella.\nCon cada ensayo, conferencia y entrada de blog, buscó disipar la niebla ideológica, recordarnos que otro mundo era posible, aunque pareciera imposible de imaginar.\n\nA veces solo necesitas a alguien que ilumine el camino para alejarte del capital.\nEl capital es un monstruo que puedes matar, y a través de nosotros se apaciguará.\nNo debemos permitir que sus ideas se conviertan en teoría estática."
 germany.302.a: "Todos recordaremos a Mark Fisher."
 GER_catharsis1: "Catarsis"
 GER_japanification: "Japonificación"
 GER_eye_in_the_sky: "Ojo en el cielo"
 GER_agenda_2040: "Agenda 2040"
 GER_agenda_2040_desc: "Era un escenario. ¿Dónde estaba? En todas partes. No importaba si era una sala de estar, un parlamento, un teatro o una calle de la ciudad, rodeado de enormes bloques de hormigón, él estaba allí. La imagen de Klaus Schwab en un sillón parecía haber surgido de la nada y ahora se alzaba ante los ojos de todos."
 GER_safety_and_security: "Seguridad y protección"
 GER_safety_and_security_desc: "Muchas de las decisiones tomadas por anteriores líderes europeos son, como mucho, cuestionables, e incluso las medidas más razonables no se implementaron lo suficiente como para permitir una verdadera seguridad.\n\nSi bien persisten las amenazas tanto internas como externas, no debemos dudar en combatirlas. La privacidad y la libertad fueron meras ilusiones que alimentaron el odio y la insurgencia, y la gente debe aprender que son cosa del pasado."
 GER_solidify_secret_clubs: "Las manos tras la cara"
 GER_solidify_secret_clubs_desc: "No debemos olvidar, por supuesto, a nuestros benefactores, nuestros grandes empresarios, representantes de las personas más sabias del mundo que nos han aportado muchas ideas geniales y que, en primer lugar, permitieron que nuestro proyecto continuara.\n\nHemos reunido a un gran equipo de expertos y pensadores, teniendo en cuenta sus deseos, todo para que nuestra gran labor pudiera continuar."
 GER_architecture_of_post_modernity: "Arquitectura posmoderna"
 GER_architecture_of_post_modernity_desc: "Aunque muchos de los cambios que traemos a veces no se integran fácilmente en la sociedad, son pasos necesarios para alcanzar nuestra meta. Las personas deben aprender a adaptarse a este nuevo entorno.\n\nLa era del hombre viejo está llegando a su fin. El contrato social, las ciudades en las que viven, los trabajos que desempeñan, todo cambia con él.\nEs la nueva realidad, les guste o no."
 GER_new_human_concept: "Nuestro propio homo sapiens"
 GER_new_human_concept_desc: "Pero, por supuesto, el cambio más importante y grandioso viene con la transformación del ser humano. La eliminación gradual de viejos prejuicios y limitaciones morales abre un camino a infinitas posibilidades en nuestra búsqueda de transformación.\n\nSe acabaron las emociones negativas que afectan tan drásticamente la productividad y la cohesión social: ¡un chip te asegurará siempre sonreír y trabajar con optimismo y entusiasmo!\n\n¡Soldados y trabajadores mejorados con prótesis que los hacen más fuertes y rápidos de lo que la naturaleza jamás hubiera imaginado!\n\nSe acabó la delincuencia, ya que tu ubicación siempre estará en el mapa.\n\nY eso sin mencionar el cambio radical en la forma en que las personas interactúan entre sí, una transformación total del orden arcaico de las cosas."
 GER_the_new_surplus_value: "El nuevo plusvalor"
 GER_the_new_surplus_value_desc: "A medida que avanzamos hacia el futuro inevitable, los cimientos de la cultura y la sociedad comienzan a transformarse, dando lugar a una formación socioeconómica completamente nueva que reemplazará al sistema obsoleto e ineficaz de hoy.\n\nSí, por muy curioso que suene ahora, la civilización comenzó con lazos familiares, formas tribales de control y subyugación. A lo largo de la antigüedad y la época medieval, la humanidad se apoderó de un nuevo sistema: la esclavitud, un sistema económico que requería la imposición física de la obediencia. Finalmente, siglos después, fue reemplazado por el sistema capitalista, que solo requería el control del trabajo.\n\nLas tecnologías modernas nos permiten llevar este progreso aún más lejos. ¿Para qué controlar los cuerpos de las personas, para qué controlar su trabajo cuando se puede acceder directamente a su subconsciente, sus deseos, sus aspiraciones, sus pensamientos?\n\nLa plusvalía del nuevo sistema es el alma."
 GER_establish_the_two_class_society: "Establecer la sociedad de dos clases"
 GER_establish_the_two_class_society_desc: "Lo que nos es más dificil de aceptar es que la distribución económica a la que nuestros ciudadanos están tan acostumbrados ha quedado obsoleta. El sistema de la clase media simplemente no puede seguir existiendo en estos tiempos de crisis, y la distribución de la riqueza cambiará desde cero.\n\nDebemos aceptar que no todos pueden vivir como un rey, ni siquiera como un aristócrata. Debemos conformarnos con las comodidades que ya tenemos. Acumular un excedente y poseer más de lo necesario es un deseo egoísta que sigue siendo parte de la naturaleza humana, pero esperemos que eso cambie con el tiempo.\n\nAhora mismo debemos pensar en el bien común, no en lo que algunos imaginaron que sería su vida dentro de unos años. Solo los pocos verdaderamente extraordinarios merecen una vida mejor y más lujosa."
 GER_erase_national_divisions: "Borrar divisiones nacionales"
 GER_erase_national_divisions_desc: "El odio nacional siempre ha sido el motor de la desobediencia y la división, lo cual ya ha obstaculizado considerablemente nuestros planes. No hay cabida para divisiones nacionales en el futuro; deben desaparecer. La unidad y la cooperación deben mantenerse a toda costa.\n\nSolo cuando se aborden estos delirios xenófobos y \"patrióticos\" podremos avanzar hacia la construcción de una verdadera justicia y armonía."
 GER_the_order_of_the_future: "Orden del futuro"
 GER_the_order_of_the_future_desc: "Ahora que nuestras transformaciones están en pleno apogeo, podemos estar verdaderamente orgullosos de nuestro trabajo. Solo queda una cosa por decir..."
 GER_democracy_now: "¡Democracia YA!"
 GER_democracy_now_desc: "Tragedia. La tragedia siempre ha sido un aspecto central de la historia europea. La caída del Imperio Romano, que nos hizo retroceder siglos, la Primera y la Segunda Guerra Mundial, que causaron una destrucción incalculable al continente europeo y empaparon de sangre el suelo europeo, y ahora la caída de la OTAN. Intenté advertirles sobre los bárbaros rusos; que necesitábamos expandir nuestra alianza a todos los rincones de Europa para prepararnos. Pero no escucharon, los políticos estaban demasiado concentrados en apaciguar a los rusos, demasiado ciegos para ver la verdad que tenían delante, y para cuando se dieron cuenta de su error, ya era demasiado tarde, y nuestro continente fue destrozado una vez más por las garras infernales de la guerra.\n\nPero no todo está perdido; los europeos vieron la verdad en mis palabras, tanto en línea como en persona, y hablaron. Me eligieron para guiarlos hacia un futuro mejor, uno donde Rusia ya no sea una amenaza, donde la democracia sea la norma y la agresión jamás se tolere. El dolor que Rusia causó será correspondido multiplicado por diez."
 GER_tax_reform_for_europeans: "Reforma impositiva para los europeos"
 GER_tax_reform_for_europeans_desc: "Desde hace ya bastante tiempo, los impuestos han sido una gran jaqueca para Europa. Esto se debe al porcentaje exorbitante que los europeos trabajadores debían pagar a su Gobierno para sobrevivir. Estas tasas impositivas a menudo superaban el 50%, lo cual es una locura y solo perjudica la economía del trabajador promedio. Estas prácticas son insostenibles y perjudiciales, por lo que tengo claro que debemos recortar los impuestos en la Unión Europea para tener la posibilidad de una economía sana y robusta que combata la amenaza rusa. Pronto, los europeos ya no estarán obligados a pagar la mayor parte de su dinero duramente ganado en impuestos, y con esto, nuestra economía prosperará."
 GER_bringing_europe_together: "Reuniendo a Europa"
 GER_bringing_europe_together_desc: "Cualquiera que haya visitado Europa puede dar fe de su belleza, pero, como todos los continentes, Europa se vio sumida en luchas internas y tragedias. Los prorrusos entre nosotros, que aún añoraban los tiempos pasados de la Unión Soviética, nos impidieron poner fin a esta farsa. Es indescriptible que algunos europeos impidieran la unificación; absolutamente increíble. Debido a los saboteadores en nuestras propias fronteras, nuestro ejército no tuvo ninguna posibilidad cuando la horda rusa irrumpió en la frontera polaca. Todo este problema debe desecharse, ya que todos los países de Europa deben pertenecer a la OTAN y unirse para protegerse de la agresión rusa. Y ahora, llamo a todos los europeos para que se unan y pongan fin a la agresión rusa y para devolver a Rusia a su lugar, al basurero de la historia."
 GER_end_european_neutrality: "#EndEuropeanNeutrality"
 GER_end_european_neutrality_desc: "Mientras la estampida rusa amenazaba con acabar con la democracia europea para siempre, Alemania luchó con ahínco por Europa. Todas las naciones se unieron para asegurar que la horda rusa no pudiera acabar con la democracia que habíamos construido durante tantos años. Pero actualmente, tantas naciones permanecen neutrales, a pesar de todo el dolor que Rusia nos infligió, que de repente quieren actuar como si nada.\n\n¡Inaceptable! ¡Totalmente inaceptable! Me aseguraré de que todas las redes sociales estén al tanto de estos traidores. Exigiré que se les ataque con todo, en redes sociales, en discursos y en la sala de guerra. Y pronto sabrán qué les pasa a las serpientes que abandonan a Europa en su momento de necesidad..."
 GER_spread_our_message: "Difundir nuestro mensaje"
 GER_spread_our_message_desc: "En mis décadas como economista, nunca he encontrado una herramienta tan útil como las redes sociales. A través de ellas, he contado a millones de personas la verdad sobre el imperialismo ruso, cómo debemos afrontarlo y mis opiniones sobre las idas y venidas del mundo. Curiosamente, muchos encuentran humor en mis publicaciones, quizá por mi forma de hablar o quizá por las opiniones que expreso. A pesar de ello, solo me ha beneficiado. Cada vez que ríen, vuelven a por más. Y cuando vuelven a por más, escuchan. Finalmente, cuando escuchan, se unen a nuestra causa. Los frutos de mi trabajo ya son evidentes. Miles de nuestros jóvenes se han unido al ejército europeo, y mil más se unirán mientras llamo a todos los europeos para que se unan a la causa. Nuestro ejército ha comenzado a proyectar una sombra sobre los hunos del este, y solo pueden observar. La era de la tragedia europea pronto terminará."
 GER_strengthen_the_heavy_lifters: "Fortalecer a los pesos pesados"
 GER_strengthen_the_heavy_lifters_desc: "Antes de que las hordas rusas asaltaran nuestras fronteras, yo solicitaba el fin de la neutralidad austriaca. Me asaltó una duda, así que le pregunté a alguien qué países le venían a la mente cuando pensaba en Europa. En respuesta, mencionó países como Alemania y Francia. Hay una buena razón para ello: a pesar de que toda Europa seguía contribuyendo, estas dos naciones aliviaron la mayor parte del peso que pesaba sobre nuestras espaldas, tanto industrial como militarmente. Aunque la guerra por Europa estaba perdida, Alemania y Francia lucharon con uñas y dientes para preservar la seguridad europea de la agresión rusa. Ahora bien, no debemos dejar a estos países en el olvido; de hecho, pido que se les dé prioridad. No solo serán el corazón industrial de la Europa liberada, sino también el corazón cultural. ¡Estos países serán conocidos por todos como el corazón de Europa!"
 GER_total_decolonization: "Descolonización total"
 GER_total_decolonization_desc: "Cultura europea. Rica en tradiciones y costumbres. Europa está repleta de culturas en cientos de regiones diferentes, cada una con su propia gastronomía, tradiciones y más. Pero, a lo largo de la rica historia de Europa, muchas de estas culturas han sido reprimidas por grandes potencias, relegadas al olvido. Incluso hoy, las naciones de Kosovo y Cataluña sufren el acoso de sus vecinos más grandes y poderosos, Serbia y España. Ha habido numerosas propuestas de otras grandes potencias para resolver este problema que azota a Europa, pero me gustaría sumarme, por así decirlo. Llamo al establecimiento de zonas autónomas para estas naciones oprimidas, para permitir una Europa verdaderamente descolonizada y multicultural."
 GER_focus_on_the_home_front: "Centrarse en el frente interno"
 GER_focus_on_the_home_front_desc: "A pesar del abrumador apoyo que mis compatriotas europeos han mostrado a mi administración, lamentablemente aún hay quienes se muestran escépticos respecto a mi liderazgo y mi capacidad para derrotar la amenaza rusa. Tales afirmaciones son, en última instancia, infundadas y completamente erróneas, un ejemplo más del férreo control de la propaganda rusa sobre los crédulos dentro de nuestras fronteras. Es hora de que la nación europea comprenda que los intereses de mi gobierno son los suyos. Tanto a través de publicaciones en redes sociales como de panfletos, me aseguraré de que todos los hombres, mujeres y niños europeos conozcan las virtudes de mi administración."
 GER_democratize_foreign_minds: "Democratizar mentes extranjeras"
 GER_democratize_foreign_minds_desc: "Independientemente del apoyo mayoritario que los europeos tengan a mi administración, siempre habrá quienes, desde fuera de nuestras fronteras, quieran menospreciarnos, ya sea por ignorancia o por malicia. Lo he visto en redes sociales, donde me han etiquetado y acosado numerosas veces, tanto rusos como otros extranjeros, por el delito de amar a Europa. También en redes sociales, muchos se han esforzado por convertir a mis hermanos europeos en quienes traicionarían a nuestro movimiento por la tiranía de Rusia, lo cual es ridículo. No podemos permitir que esto continúe, y ya he hecho un gran esfuerzo por democratizar la mentalidad extranjera. Pero es hora de intensificar nuestros esfuerzos para tener alguna esperanza de obtener apoyo internacional."
 GER_powerful_independent_united: "Fuerte, Independiente, Unida"
 GER_powerful_independent_united_desc: "Europa está ahora en una mejor posición que nunca antes, ¡miren todo el buen trabajo que he hecho! La era de la tragedia pronto terminará, mientras los aviones europeos sobrevuelan los cielos, listos para convertir la amenaza rusa en cenizas. Mientras nuestros ejércitos se preparan, alistando sus armas y entrenando día y noche para el momento en que ataquemos y liberemos a Europa Oriental, es decir, al mundo, de la plaga rusa de una vez por todas. Atrás quedaron los días de pequeñas luchas internas entre naciones apenas conectadas por la UE; poco a poco, nuestra nación unirá a Europa por completo. ¡Llamo a todos los europeos a celebrar!"
 GER_end_world_neutrality: "#EndWorldNeutrality"
 GER_end_world_neutrality_desc: "El mundo aparentemente observó con horror los albores de la Guerra Europea; la mayoría aparentemente apoyó nuestra causa mientras la estampida rusa amenazaba con acabar con la democracia europea, pero ¿dónde están hoy? ¿Los veo condenando nuestras acciones en redes sociales a pesar de que inicialmente nos dieron su apoyo? ¡Increíble! Me aseguraré de denunciarlos en todas las plataformas posibles, porque su neutralidad actual, a pesar de los abusos de derechos humanos cometidos por Rusia y el genocidio que cometieron contra los ucranianos, es absolutamente ridícula y no se tolerará por más tiempo."
 GER_all_out_information_assault: "Asalto informático total"
 GER_all_out_information_assault_desc: "Nunca ha habido una herramienta tan útil para difundir nuestro mensaje como internet. Cada día, millones o incluso miles de millones de personas de todo el mundo se conectan para entretenerse o informarse sobre las idas y venidas del mundo que les rodea, un mundo que se mueve demasiado rápido como para que nadie pueda seguirlo. Pero podemos usar esto, podemos mostrar a millones de personas en todo el mundo y en Rusia la virtud de nuestra nación con solo escribir una hora. La guerra de la información es el futuro y la añadiré a mi arsenal y, con el tiempo, la dominaré."
 GER_think_tanks_for_war: "Think tank para la guerra"
 GER_think_tanks_for_war_desc: "La guerra es algo complejo, siempre lo ha sido y siempre lo será. Pero pronto, la guerra volverá a Europa; es inevitable, y debemos prepararnos para ello. La derrota de Europa en la Guerra Europea se debe a muchos factores, pero el más importante fue el fracaso de nuestra estrategia. Estos fracasos estratégicos llevaron a la caída de Europa Oriental y a las violaciones masivas de derechos humanos que presenciamos hoy. Esto no puede volver a ocurrir; el futuro de Europa está en juego, y llamo a la creación de centros de investigación para la guerra, para que las mentes militares más brillantes de nuestra generación puedan reflexionar sobre nuevas estrategias para hacer que Rusia huya."
 GER_secure_the_south: "Asegurar el punto débil"
 GER_secure_the_south_desc: "Durante décadas, el Medio Oriente ha sido el hogar de tiranos, déspotas y terroristas. Los países del Medio Oriente no han hecho nada para frenar a estos actores violentos y, de hecho, a menudo han permitido que estas organizaciones prosperen dentro de sus fronteras. Esto no puede continuar; durante demasiado tiempo hemos permitido que las naciones del Medio Oriente aterroricen al mundo y propaguen su extremismo radical a nuestros civiles. Me aseguraré de que esta amenaza se aborde y se combata; nunca más un europeo morirá a causa de un ataque terrorista."
 GER_asian_gamble: "Gambito asiático"
 GER_asian_gamble_desc: "He investigado a fondo la historia de China y he encontrado información sumamente inquietante. Desde la existencia de la República Popular China, también ha existido un brutal colonialismo por parte del gobierno chino. El ejemplo más conocido del imperialismo chino es la invasión y anexión del Tíbet, pero incluso la región de Sinkiang ha sufrido una brutal opresión por parte del gobierno chino y sus partidarios. No podemos permitir que esto continúe; no lo permitiré ni un día más. Exijo la descolonización total de China y su reducción a la ex-China."
 GER_agenda_2040_cat: "Agenda 2040"
 GER_agenda_2040_cat_desc: "\n\n\n\n\n£GFX_GER_agenda_2040_cat_banner\n\n\n\n\n\n\n\nLos ignorantes han hecho muchas conjeturas sobre nuestros planes, algunas demasiado absurdas, otras demasiado cercanas a la realidad. Sin embargo, somos nosotros quienes llevamos el timón de la humanidad.\n\nLa Agenda 2040 es un resumen de nuestros objetivos, ideales y planes para consolidar el poder que nos fue otorgado hace muchos años. Con nuestra predicción del caos que se cernía sobre el mundo, Europa se ha convertido en un campo de juego para que nuestros think tanks proyecten un refugio seguro ante las llamas crecientes."

 germany.171.t: "INFORME DE PRIMERA LINEA: [GetDateText]"
 germany.171.d: "llegamos al Dniéper vamos"
 germany.171.a: "La desgracia ha sido corregida."
 germany.172.t: "Restauración de la clase de la nobleza"
 germany.172.d: ""
 germany.172.a: "Excelente."
 germany.173.t: "Nobleza organiza lujosa fiesta"
 germany.173.d: "A pesar de que los asistentes confirmaron los detalles, la cobertura oficial del reciente banquete en un palacio medieval ha generado una gran controversia. Las imágenes de la nobleza luciendo trajes lujosos y vestidos franceses, junto con descripciones minuciosas de la comida de siete platos servida en platos de oro, han encendido aún más la indignación, que todavía enfrenta las secuelas de la guerra con Rusia.\n\nLa nobleza está pidiendo que hagamos una declaración pública de apoyo de inmediato."
 germany.173.a: "La nobleza debe ser representada."
 germany.173.b: "Los asuntos de la nobleza no son el problema del público."
 germany.174.t: "Noble alemán implicado en caso de desfalco"
 germany.174.d: "Después de los rumores sobre corrupción en las adquisiciones del Ejército, la Regencia ha prometido llevar a cabo una investigación justa. Un informe preliminar ha llegado a la prensa, no solo confirmando los rumores, sino que también señala directamente a varios nobles involucrados en el tema.\n\nTodo este escándalo se ha convertido en una gran vergüenza para el Gobierno. La Regencia exige acciones, pero al mismo tiempo ha expresado su total apoyo a los nobles implicados."
 germany.174.a: "Un contrato firmado es intachable."
 germany.174.b: "Reformar el proceso."
 germany.175.t: "Periodista arrestado"
 germany.175.d: "Un destacado periodista, conocido por su crítica a la nobleza, ha sido arrestado recientemente por las autoridades. Han expuesto la gran influencia que la nobleza tiene en la toma de decisiones, las cuales, en su mayoría, terminan beneficiandolos. Lo que realmente llama la atención son las transacciones con fondos públicos, que, según se dice, han sido utilizadas para enriquecer a algunos. La Regencia ha ordenado la detención del autor.\n\nLos periódicos liberales y la ultraderecha están furiosos por esta situación, aunque por motivos muy distintos. Es crucial que nos pronunciemos al respecto antes de que la situación se descontrole."
 germany.175.a: "La difamación es ilegal."
 germany.175.b: "El periodista será liberado de inmediato."
 germany.176.t: "Nobles adquieren castillos"
 germany.176.d: "Se comenta que varios nobles destacados han conseguido hacerse con varios castillos medievales. La forma en que lograron financiar estas compras es motivo de especulacion. Recientes informes en medios digitales apuntan a que la propia Regencia dio luz verde a la compra utilizando fondos del Gobierno.\n\nEl escándalo se está propagando y es urgente que hagamos un anuncio público al respecto lo más pronto posible."
 germany.176.a: "El Gobierno adquirió las propiedades y les permitió residir a los nobles."
 germany.176.b: "Los nobles obtuvieron el dinero de un anticipo de su mesada."

 germany.303.t: "Al presidente de la Comisión Europea"
 germany.303.d: "A la luz de los recientes acontecimientos, hablaré con franqueza.\n\nLa Unión a la que ambos servimos con tanto orgullo se ha visto paralizada por el miedo y una burocracia obsoleta. Con cada semana que pasa, su Gobierno se ha visto obligado a ceder cada vez más responsabilidad a los Workspaces Administrativos y a los Consejos Asesores de Gobernanza gestionados por el Foro. No cabe duda: los ciudadanos europeos buscan el liderazgo en Davos, no en Bruselas.\n\nUsted puede dar fe de ello. Los últimos meses nos han traído a este momento. Por el bien de la supervivencia de la Unión, le pido, en nombre del pueblo europeo, que renuncie a su cargo. En breve recibirá un email con la nueva composición de la Comisión, acordada por nuestras mentes más brillantes. Le aseguro que la historia elogiará su acción.\n\nCon sinceridad,"
 germany.303.a: "Prof. Klaus Martin Schwab."
 germany.304.t: "Günther Fehlinger en x.com:"
 germany.304.d: "£GFX_GER_dont_at_me_ti Günther Fehlinger\n\nUcrania debe ser liberada y entrada a la OTAN 2029\n¡Canadá, R.U., Islandia, Noruega, Albania, Kosovo en la UE 2039!\n\nPosts\n\nFijado\nGünther Fehli... £GFX_GER_dont_at_me_ti Günthe... - 27 abr.\nAnuncio mi candidatura a la presidencia de la £GFX_GER_dont_at_me_ti EU_Commission reemplazando a £GFX_GER_dont_at_me_ti VoltEuropa £GFX_GER_dont_at_me_ti RealAlexJones £GFX_GER_dont_at_me_ti MedvedevRussiaE £GFX_GER_dont_at_me_ti ProfKlausSchwab £GFX_GER_dont_at_me_ti POTUS\nRestauraré la £GFX_GER_dont_at_me_ti OTAN y llevaré a Occidente a la victoria\n& convertiré a Rusia en #ExRussiaRetuit, compartir & me gusta ....\nAlt: Foto de Fehlinger en la cima de los Alpes austríacos con una camiseta que dice: \"Wählt Günther\"\n\nGünther Fehlin... £GFX_GER_dont_at_me_ti Günthe... - 22h\nChina, le pondré fin a tu agresión...\nAlt: Foto de Fehlinger con una bufanda con temática de Taiwán y expresión de enojo.\n\nGünther Fehlin... £GFX_GER_dont_at_me_ti Günthe... - 1d"
 germany.304.a: "[SOV.GetLeader] está acabado..."
 germany.305.t: "Introducción"
 germany.305.d: "Hola, ciudadanos. Soy Klaus Schwab, presidente del Foro Económico Mundial.\n\nComo bien saben, hemos recorrido un largo camino para llegar hasta aquí. Estamos viviendo momentos históricos en los que la humanidad se transformará de maneras que nunca imaginamos; una oportunidad que no podíamos dejar pasar, y efectivamente, no lo hicimos.\n\nDesde hace tiempo, los expertos del Foro Económico Mundial han estado trabajando en esta dirección, y ha sido, al menos, un gran éxito. Sin embargo, esto no habría sido posible sin la participación y el compromiso activo de todos ustedes, los ciudadanos europeos.\n\nAunque no todos han abrazado aún el futuro, podemos decir que es prácticamente inevitable.\n\nComo presidente del Foro Económico Mundial, quiero expresar mi más sincero agradecimiento a cada uno de ustedes. No solo hemos avanzado con éxito en la Agenda 2030, sino que, de hecho, estamos muy por delante de lo previsto. Creo que ya es momento de que compartamos la siguiente etapa de nuestro plan."
 germany.305.a: "Así que escuchen..."
 germany.306.t: "Revelaciones"
 germany.306.d: "Como bien saben, desde la crisis de 2008 quedó claro que el modelo capitalista de libre mercado ya no funciona como antes. El consumismo, la democracia y, sobre todo, la clase media, se han vuelto insostenibles. Era necesario un Gran Reinicio para garantizar un futuro seguro y unido para la humanidad, bajo un liderazgo estable y sólido. Desde entonces, se han establecido objetivos y el plan ha estado en marcha.\n\nDesde el principio, teníamos muy clara nuestra Agenda. Sin embargo, ni los líderes mundiales ni la gente común estaban dispuestos a escucharnos fácilmente. Necesitábamos un catalizador que sentara las bases para nuestras reformas. La pandemia de COVID-19, como saben, resultó ser muy útil para alcanzar esos objetivos, lo que significa, por supuesto, que estábamos avanzando en la dirección correcta. El año 2020 fue un verdadero punto de inflexión para nosotros.\n\nY aunque los médicos del rey Salmán hicieron todo lo posible -los conocía personalmente-, el colapso económico tras su... lamentable... fallecimiento era bastante predecible. Necesitábamos derribar, por supuesto, al coloso de arcilla cuyos intereses nacionales aún obstaculizaban nuestras reformas: la América de Trump. Desde entonces, la Cuarta Revolución Industrial ha avanzado con gran fluidez y estabilidad.\n\nLa amenaza rusa, lamentablemente, sigue presente, y la derrota en la Guerra Europea fue muy dolorosa; sin embargo, aquí en el Foro Económico Mundial nos enfocamos en encontrar el lado positivo incluso en las peores situaciones. Esto ha puesto de manifiesto la debilidad de los Gobiernos nacionales y su insostenibilidad, lo que nos ha permitido concentrar nuestro poder. Así que no hay duda de que, creo, trataremos con el Este..."
 germany.306.a: "...muy pronto."
 germany.307.t: "Culminación"
 germany.307.d: "Ahora mismo, sin duda, los problemas internos son lo más crucial. Necesitamos el apoyo de todos los europeos si queremos salir adelante. No hay lugar para excusas, ni para la decadencia. Solo existe nuestra identidad global, y sus enemigos son bastante evidentes.\n\nEl enemigo más grande está dentro de nosotros. Nuestro deseo ingenuo de lujo, la manera en que algunos nacionalistas se aferran a su supuesta \"identidad\", su idea de pureza y autonomía, representan riesgos serios para la sociedad en su conjunto. No podemos permitir que estos elementos peligrosos se impongan.\n\nEl bienestar común debe ser nuestra prioridad; las necesidades de unos pocos no tienen sentido en el gran esquema de las cosas, y los enemigos de la humanidad están por todas partes. Sus deseos egoístas y primitivos son insostenibles.\n\nLa desinformación, el antiigualitarismo y el tribalismo mezquino se convertirán en algo tan olvidable como una gripe fuerte; nadie mirará atrás y los extrañará.\nLa humanidad es un espectro, y con los ajustes correctos, podremos enfrentar cualquier tormenta."
 germany.307.a: "Juntos."
 germany.308.t: "Parte IV. Nueva Gente"
 germany.308.d: ""
 germany.308.a: ""
 germany.309.t: "Conclusión"
 germany.309.d: "Para concluir, quiero tomar un momento para agradecer a nuestros benefactores y visionarios por su valiosa contribución a esta nueva normalidad. Hemos avanzado mucho en la vigilancia de nuestra vida diaria, asegurando la seguridad total y combatiendo la desinformación.\n\nAdemás, estamos trabajando en la eliminación gradual del concepto colonial del Estado nación y de las normas culturales problemáticas que lo acompañan. Gracias a esto, hemos logrado la paz y la unidad, priorizando siempre la igualdad. Hemos motivado a las personas a abrazar un futuro poshumano, donde la desigualdad biológica y cultural se elimine poco a poco a través de la integración tecnológica.\n\nHe visto tantas sonrisas en las ciudades, sonrisas que no existían hace un año, en personas que antes no estaban aquí: ¡un testimonio impresionante de nuestro progreso que pocos habrían imaginado!\nTambién quiero agradecer a los valientes expertos en proteínas que están proporcionando el valor nutricional necesario para erradicar el consumo excesivo que ha estado perjudicando nuestro medio ambiente durante tanto tiempo.\n\nCon todo esto, me alegra ver que en toda Europa hemos alcanzado nuestros objetivos comunes."
 germany.309.a: "Los espectadores sonríeron, y una alegría artificial los llenó."
 germany.310.t: "Sonrie"
 germany.310.d: "Al principio, todo giraba en torno a la \"eficiencia\". La gente comenzó a usar reguladores de humor: se acabaron las crisis nerviosas por cosas insignificantes y los estallidos de ira bajo presión. Las empresas se volvieron más productivas, las peleas familiares disminuyeron e incluso las tasas de suicidio entre adolescentes empezaron a bajar. En una conferencia de prensa, los funcionarios del gobierno, radiantes de felicidad, proclamaron: \"Este es un avance monumental para nuestra civilización\".\n\nSin embargo, nadie se dio cuenta de que las sonrisas en la calle empezaban a parecerse. No solo eran similares, sino que eran exactamente iguales. La curva de los labios, el estrabismo, incluso la ubicación de las arrugas parecían sacadas de una plantilla. Un periodista decidió hacer un experimento: tomó capturas de pantalla de diez personas usando reguladores emocionales mientras sonreían y se dio cuenta de que se superponían a la perfección.\n\nLuego, la gente comenzó a distraerse sin razón aparente. Alguien podía estar sentado en el tranvía y, de repente, empezar a sonreír, con la cabeza gacha, completamente inmóvil. Alguien podía despertarse en medio de la noche y pararse junto a la ventana, mirando la oscura calle como si fuera un abismo, como si sus ojos se cruzaran con algo. Una vez, una niña sonrió mientras clavaba un cuchillo en el corazón de su madre. Cuando los vecinos llamaron a la policía, ella seguía sentada allí, cubierta de sangre, viendo la televisión y comiendo palomitas. Los médicos afirmaron que los centros emocionales de su cerebro casi se habían apagado. El implante la había \"sobrecontrolado\", dejándole solo un leve rastro de percepción del placer.\n\nElla seguía sonriendo. \"Sentí que... era lo correcto\", dijo en el tribunal, con una expresión serena como una máscara. Posteriormente, los investigadores acuñaron un término para este estado: \"Síndrome de la Sonrisa en el Espejo\", un trastorno ciberpsicótico desencadenado por implantes neuronales. Los pacientes pierden la capacidad de juzgar las emociones, pero pueden imitar a la perfección la \"felicidad\"."
 germany.310.a: "..."
 germany.311.t: "El Nuevo Orden Mundial"
 germany.311.d: "A medida que la guerra se acaba en Europa, esta sangrienta guerra, otro capítulo inolvidable de nuestra historia, llega a su fin.\n\nKlaus Schwab nunca fue un hombre que mostrara sus emociones; de hecho, solo ha mostrado dos a lo largo de toda su carrera: felicidad y vacío. Hoy, su rostro estaba vacío; las líneas de sus arrugas se acentuaban con la tenue luz del proyector, lo que le daba un aspecto mucho más inquietante de lo habitual.\n\nAl llegar a la última diapositiva, Schwab miró a sus colegas. Sus subordinados. Esperaba una reacción de ellos, pero nadie podía distinguir cuál. Sus subordinados sabían que no debían hablar demasiado ni aplaudir con demasiada intensidad. Sin embargo, una reacción demasiado débil sin duda provocaría su insatisfacción. Adecuado. Adecuado era la palabra. Ni más ni menos. Moderadamente, todos aplaudieron al unísono.\n\nTodos en la sala lo sabían. Este era el fin del viejo mundo, y el nuevo apenas resurge de las cenizas. Finalmente, el mundo será gobernado por mentes abiertas y globalistas, personas que han dedicado sus vidas a desarrollar un mundo con un mercado libre y unificado. Las ideologías estrechas de miras, como el nacionalismo y el regionalismo, serán borradas junto con el viejo mundo.\n\nDurante casi 50 años, Schwab dedicó su vida al Foro Económico Mundial. Al recordar los años de sudor y esfuerzo que dedicó a prevenir lo que ahora, lamentablemente, ha sucedido, una lágrima se formó incontrolablemente junto a su ojo derecho. No lloraba por el viejo mundo, ni por el nacimiento del nuevo. Lloró por ti, lloró por mí, lloró por sí mismo, por el hecho de que todos caminamos por el glorioso camino que solo él creó. El mundo era ahora su orquesta, un escenario que esperaba ser montado por él. El viejo mundo estaba en ruinas, y desde dentro, su luz brillaría. Solo él era el faro de la esperanza, él era el futuro."
 germany.311.a: "Bienvenidos al Nuevo Mundo."

 GER_military_reformation_idea_desc: "Con la revolución política y social que hemos instituido en este país, también viene una revolución en las fuerzas armadas alemanas. La antigua Bundeswehr capitalista está experimentando actualmente una reforma y reestructuración expansiva y sistémica. Se están formando nuevas unidades, revisando doctrinas, instituyendo nuevos estándares y ampliando el reclutamiento; los cambios en curso son difíciles de cuantificar. Aunque pueda parecer turbulento para los soldados y oficiales leales del ejército, la reestructuración pronto dará origen a unas fuerzas armadas modernas y proletarias en las que el mundo pueda inspirarse."
 GER_army_reformation_idea_desc: "Con la revolución política y social que hemos instituido en este país, también viene una revolución en las fuerzas armadas alemanas. La antigua Bundeswehr capitalista está experimentando actualmente una reforma y reestructuración expansiva y sistémica. Se están formando nuevas unidades, revisando doctrinas, instituyendo nuevos estándares y ampliando el reclutamiento; los cambios en curso son difíciles de cuantificar. Aunque pueda parecer turbulento para los soldados y oficiales leales del ejército, la reestructuración pronto dará origen a unas fuerzas armadas modernas y proletarias en las que el mundo pueda inspirarse."

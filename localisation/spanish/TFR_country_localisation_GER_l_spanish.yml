 GER_no_more_weakness: "No más debilidad"
 GER_no_more_weakness_desc: "Durante demasiado tiempo, nuestro país ha estado gobernado por traidores. Colaboradores estadounidenses, soviéticos y globalistas que exprimieron la nación alemana hasta el último aliento y escondieron el orgullo de nuestros logros históricos bajo la alfombra del consumismo y el multiculturalismo.\n\nEl yugo asfixiante se sentía incluso después de la caída de la RFA, con los mismos oportunistas de izquierda que ahora se disfrazan para tomar y conservar el poder.\n\nPero el pueblo ya no se deja engañar, ¡ya es suficiente! ¡La construcción de una Alemania autosuficiente, fuerte e ideológicamente unida comienza con nuestra revolución!"
 GER_strengthen_the_grip: "Fortalecer el control"
 GER_strengthen_the_grip_desc: "Nuestra posición geográfica, la ingenuidad e incompetencia de nuestro régimen anterior, así como las constantes recesiones y reducciones de personal, han dejado a nuestra nación vulnerable a ataques desde todas las direcciones, tanto internos como externos.\n\nLas nuevas directivas de la Volkskammer tienen como objetivo mejorar la posición de Alemania en Europa y garantizar la seguridad y el bienestar de nuestro pueblo. La Stasi y el NVA trabajarán en conjunto para consolidar el territorio histórico alemán y atacar a los elementos peligrosos en su interior."
 GER_honour_the_army: "Honrar al Ejército"
 GER_honour_the_army_desc: "Un fracaso tras otro, el liderazgo alemán no sacaría las conclusiones correctas. Los supuestos políticos y la clase dirigente no lograron resolver el problema más importante de la actualidad: la seguridad y la capacidad de autodefensa de nuestra nación.\n\n¡No cometeremos el mismo error!\n\nAhora nuestras prioridades, sistemas de gobierno y decisiones económicas se tomarán con el ejército en mente. Nuestra nueva política está completamente al servicio del ejército, ¡nada para las élites y los gorrones!"
 GER_old_guard_new_revolution: "Vieja guardia, nueva revolución"
 GER_old_guard_new_revolution_desc: "Hemos logrado lo que ningún otro partido, grupo o clase hubiera podido antes. Hemos construido una coalición que no se creía posible. Y no es una coalición parlamentaria, una combinación de dinero, una canción de cuna para la nación pobre, hambrienta y humillada.\n\nLa nuestra es una alianza de ideas. De la izquierda y la derecha. De la vieja y la nueva guardia. De diferentes estratos y de diferentes épocas, todos unidos bajo una misma causa: ¡por la gran nación alemana y por un Estado alemán fuerte!"
 GER_raf_romanticism: "Glorificar nuestra lucha"
 GER_raf_romanticism_desc: "Nuestra historia conoce a muchos revolucionarios, valientes luchadores contra el capitalismo, tanto de derecha como de izquierda.\n\nEs un camino lleno de dificultades y sacrificios, pero gracias a esos héroes, podemos transformar la Alemania de hoy.\n\nDebemos inmortalizar sus hazañas en la cultura y la vida cotidiana de nuestro país, ¡para que todos los alemanes los recuerden!"
 GER_new_german_spirit: "Nuevo espíritu alemán"
 GER_new_german_spirit_desc: "El espíritu de la Alemania burguesa, democrática y liberal, ha muerto, junto con el Estado que la sustentaba. Ha decaído tremendamente y nos ha arrastrado a la miseria de la decadencia y la derrota.\n\nAhora es el momento de un nuevo espíritu, con un nacionalismo sano, un renacimiento moral de nuestro pueblo, que ha sido tan menospreciado. ¡Es hora de que la cultura y las tradiciones alemanas sean reconocidas de nuevo!"
 GER_deconstruction_of_post_modernity: "Deconstruir la posmodernidad"
 GER_deconstruction_of_post_modernity_desc: "La gran victoria de hoy para Alemania es solo un pequeño paso adelante para el resto del mundo. Pequeño, pero no insignificante.\n\nIrónicamente, al intentar aferrarse al poder con tanta fuerza, ha preparado su propia desaparición. Dentro de sus virtudes también residen debilidades, que conocemos porque pasamos la vida estudiándolas.\n\nAhora, personas de todo el espectro intelectual, desde la clandestinidad hasta la corriente dominante; científicos y aficionados, todos han venido a participar en el gran proyecto de deconstruir el capitalismo.\n\nPrimero, metafóricamente, tomando cada aspecto de la posmodernidad, examinándolo, preguntándose: \"¿Cómo llegamos aquí?\" y respondiendo: \"¿Cómo salir de aquí?\".\n\nPara muchos, solía ser un pasatiempo. Pero ahora es un marco para la deconstrucción literal del capitalismo como sistema."
 GER_exiting_the_vampire_castle: "Escapando del castillo"
 GER_exiting_the_vampire_castle_desc: "El tardiocapitalismo es culpable de innumerables crímenes, pero hay uno verdaderamente vil que debe abordarse de inmediato.\n\nEl capitalismo mató la cohesión social, suprimió el colectivismo, aplastó los sentimientos de camaradería entre las personas y aplastó la verdadera pluralidad. Ha dividido nuestra vida en sus propios aciertos y errores, y ha marcado a generaciones enteras con el acoso y la humillación. Están agotados, solos y temerosos del futuro.\n\nDebemos tomar medidas para devolver la fe a las personas y el fuego a sus corazones. ¡Una nueva era de progreso y prosperidad se encuentra más allá del muro de los viejos prejuicios!"
 GER_phase_out_capital_fundamentalism: "Desfasar el fundamentalismo capital"
 GER_phase_out_capital_fundamentalism_desc: "El mundo está atrapado en el ciclo del capitalismo, un laberinto sin fin, una secta, una rueda que gira sin rumbo en la que los humanos corren sin sentido.\n\nEste sistema hace tiempo que dejó de beneficiar incluso a sus amos, y aun así lo mantenemos. Y nos está pasando factura; como una religión, exigiendo cada vez más sacrificios, convirtiendo a las personas en la peor clase de esclavos: los que se creen libres.\n\nDebemos destruir la secta fundamentalista en la que se ha convertido el capitalismo y romper cualquier ilusión que la gente tuviera sobre él; es una cuestión de principios y de supervivencia."
 GER_detox_from_nostalgia: "Détox de la nostalgia"
 GER_detox_from_nostalgia_desc: "El tiempo ha demostrado que los alemanes son de las personas más nostálgicas de la historia, para mal, como lo demuestra nuestra experiencia.\n\nEl capital siempre ha abusado de este sentimiento, tocando con maestría la flauta de la nostalgia para llevar a Alemania a la ruina una y otra vez. Manipulador y engañoso, te convence de que la vida antes era más feliz, la hierba era más verde y nuestro país era más grande, y que puedes volver a esos tiempos si simplemente haces todo lo que dicen. ¡Menudo chiste!\n\nNuestra nación ya no aspirará a los edificios en ruinas de los órdenes que nos precedieron. Hemos aprendido de sus errores; ahora solo nos espera algo nuevo."
 GER_redefine_marxist_ideals: "Redefinir ideales marxistas"
 GER_redefine_marxist_ideals_desc: "Marxismo: ¡cuánto significado ha adquirido esta palabra a lo largo de los años! Se ha convertido en uno de los principios fundamentales del pensamiento en el mundo moderno y en el sentido de la vida para millones de personas en todo el mundo.\n\nNos encanta porque el marxismo es una filosofía en constante cambio y evolución. Su historia es la lucha que nos ha llevado hasta donde estamos hoy. Pero no nos quedaremos de lado de quienes todavía juguetean con el marxismo del siglo XX; debemos hacer lo que hicieron Lenin, Stalin y Mao: adaptarnos a las circunstancias modernas y reflejarlo en nuestra propia línea de pensamiento.\n\nRetomaremos el marxismo, lo desarrollaremos y lo llevaremos con nosotros a las estrellas, ¿o quizás nos llevará a nosotros? Bueno, es una paradoja dialéctica que merece debate."
 GER_accelerate_into_a_brighter_future: "Acelerar a un futuro mejor"
 GER_accelerate_into_a_brighter_future_desc: "Este momento era uno muy esperado, y sin embargo,\nninguno de nosotros dudaba de su llegada.\n\nEl capitalismo ha llegado a su fin. Puede que alguna vez fuera nuevo y útil, pero ahora solo es un cadáver putrefacto que se cierne sobre la Tierra. ¡Es nuestro deber y obligación liberar a la civilización de esta barrera! ¡Destruirla para que podamos avanzar a la siguiente etapa de prosperidad!\n\nPero no solo desmantelaremos las instituciones económicas y sociales que aún sustentan el capitalismo, sino que también nos desharemos de las cadenas internas que frenan la naturaleza libre y artística de cada ser humano.\n\n¡Emancipaos y deshaceos de vuestro cascarón vacío!\n¡Tomad vuestras herramientas y armas, luchad por ser vosotros mismos!\n¡Acelerad, que la historia marche eternamente sin fin!\n\n¡ACELERA!\n¡¡ACELERA!!\n¡¡¡ACELERA!!!\n¡¡¡¡ACELERA!!!!"

 germany.235.e: "¡La coalición de Byung-Chul Han gana!"
 germany.288.t: "Horst Mahler se pronuncia"
 germany.288.d: ""
 germany.288.a: "Vaya bicho raro..."
 germany.289.t: "¡Los nacionalcomunistas toman el poder!"
 germany.289.d: "El primer congreso de la Volkskammer con el Frente Nacional no fue lo que nadie esperaba.\n\nLo que el SED reformado consideró unas elecciones controladas para elegir una \"oposición\" totalmente sumisa se ha convertido en un derrocamiento total del orden actual. Por diversos medios convencionales y no convencionales, defensores y simpatizantes de las ideas nacionalistas han logrado entrar en el congreso, casi consiguiendo la mayoría.\n\nCuando se convocó un congreso de emergencia para intentar anular estos resultados, los diputados que llegaron a las puertas del Reichstag lo encontraron bloqueado por unidades militares. Vehículos blindados llenaron las calles, buscando a cualquiera que pudiera oponerse al nuevo poder. Paramilitares de derecha e izquierda patrullaban las calles juntos, garantizando el orden.\n\nMientras tanto, una transmisión en vivo mostraba cómo la nueva Volkskammer, ahora mucho más nacionalista, se había reunido para elegir al nuevo Canciller, de acuerdo con la Constitución. Algunos líderes militares también estuvieron presentes, casi como para asegurarse de que el resultado les satisficiera.\n\nPor abrumadora mayoría, votaron por un destacado defensor del Frente Popular y las ideas del estilo juche, Michael Koth, quien estaba pronunciando un discurso. Se habló mucho de reorganizar el Estado alemán para representar los intereses de la nación alemana, fortalecer el control sobre la situación en Europa y avivar el orgullo alemán, pero una frase impresionó especialmente a los alemanes:\n\n\"¡La Revolución necesita que ambos flancos estén seguros, ambas piernas para avanzar hacia el futuro!\""
 germany.289.a: "La revolución necesita fuerza."
 germany.290.t: "Destino de la ultraderecha"
 germany.290.d: "La historia moderna de Alemania ha demostrado que los conflictos y accidentes del pasado deben dejarse de lado para alcanzar los objetivos de Alemania como nación y culminar la destrucción del orden mundial antialemán.\n\nMuchos partidos de derecha finalmente pudieron alzar la voz tras décadas de persecución injusta por parte del gobierno federal. ¡Por fin se les permitirá a nuestros compatriotas contribuir con su merecida contribución a la grandeza de Alemania!\n\nSin embargo, debemos gestionar correctamente su regreso para obtener el máximo beneficio de su apoyo.\n\nPodríamos ordenarles que se integren en los partidos de izquierda existentes o permitirles unirse a la Volkskammer, conservando sus propias organizaciones. Esto último, por supuesto, les complacería más, aunque podría costarnos demasiado poder.\n\n¿Qué debemos hacer?"
 germany.290.a: "Queremos que sus miembros formen parte de los partidos existentes, ¡para que no haya más divisiones!"
 germany.290.b: "¡Aceptemos formalmente a sus partidos en nuestro Congreso! ¡Son bienvenidos!"
 germany.291.t: "¡Caos en la Convención del Partido!"
 germany.291.d: "En un sorprendente giro de los acontecimientos, la convención del Partido en el Reichstag no logró alcanzar una resolución unánime, sumida en una lucha ideológica interna.\n\nEn el caos resultante, el gabinete gobernante prácticamente se derrumbó. En cuestión de horas, Michael Koth anunció su dimisión y se celebrará una votación en la Volkskammer para elegir al nuevo jefe de Estado.\n\nLa derecha ha aprovechado esta situación para impulsar a su propio candidato a la jefatura: Horst Mahler, exfundador de la RAF convertido en neonazi, quien, sin embargo, ha abrazado algunas de las últimas ideas nacionalcomunistas y ha obtenido apoyo y reconocimiento en los círculos políticos.\n\nEsto marca un giro radical hacia la derecha en la política alemana, ya que la revolución comunista ha triunfado gracias al auge del sentimiento antifascista y anticapitalista tras la humillante derrota en la Guerra Europea.\n\nAlgunos han especulado que la caótica convención fue orquestada por derechistas dentro de la Volkskammer, algunos incluso acusándolos de contrarrevolución y de conspirar para restaurar el corporativismo. Sin embargo, han logrado consolidar su poder y nadie quiere causar problemas en el joven estado rojipardo."
 germany.291.a: "Bueno... otro cambio de rumbo."
 germany.292.t: "Nuevo rumbo para la autosuficiencia alemana"
 germany.292.d: "Cientos de delegados del Partido que llegaron hoy al Reichstag se situaron a la misma distancia y aplaudieron al unísono como si estuvieran orquestados por un director invisible. Los rodeaban una paleta de colores estricta, formas y colores precisos y ordenados, y carteles con los nuevos lemas del Partido, así como antiguos símbolos soviéticos y de Alemania Democrática.\n\nMichael Koth cruzaba un pasillo, seguido por la cúpula del Politburó, custodiado por soldados inmóviles, con los fusiles en guardia y las bayonetas caladas. Al acercarse al podio, el toque de la orquesta militar se intensificó, y aparentemente también los aplausos de los delegados. Finalmente, tomó la posición tan esperada; los aplausos y la música cesaron simultáneamente.\n\n\"¡Camaradas! ¡Ciudadanos de Alemania! ¡Hermanos y hermanas del Ejército Popular! Nuestra nación ha estado sumergida durante demasiado tiempo bajo las ruinas del sistema capitalista en descomposición. ¡Hoy esto termina! Los nuevos principios del programa del Partido, que les presento hoy, tienen como objetivo asegurar un futuro seguro y glorioso para el socialismo alemán y nuestras futuras generaciones. ¡Protegeremos a nuestros hijos y nuestra cultura de las influencias dañinas del liberalismo globalista! Aseguraremos nuestras fronteras y brindaremos seguridad a todos y cada uno de los hogares. ¡Debemos dedicar nuestra vida y nuestro trabajo por completo a derrotar las amenazas que rodean a nuestro país desde todos los frentes!\"\n\nLos soldados marchaban con tanta precisión, como si se tratara de una sola persona, miles de veces duplicada, seguidos por tanques y sistemas de misiles. Desfiles de celebración recorrieron Berlín con retratos de Marx, Lenin, Kim Il Sung y Koth; música clásica y de la era socialista se escuchaba en cada calle, mientras los trabajadores de las fábricas cumplían con docenas de cuotas por turno. A partir de entonces, todo en Alemania funcionó como un reloj."
 germany.292.a: "¡Viva la gran victoria!"
 germany.293.t: "Formación del Gobierno de Querfront"
 germany.293.d: "Hoy fue un día glorioso para Alemania. El nuevo congreso revolucionario se reunió para finalmente cerrar la brecha que se prolongó durante una década entre la izquierda y la derecha, la cual ha sido la fuente de tantos problemas en la esfera política alemana.\n\nRepresentantes de los jucheístas, marxistas-leninistas, trotskistas, strasseristas, nacionalistas y muchos otros movimientos y partidos han coincidido en que existen enemigos más grandes en el mundo que ellos mismos, y que es necesario abordar las diferencias para asegurar que Alemania los supere a todos.\n\nHay muchos más intereses comunes que pueden lograrse mediante la cooperación: el resurgimiento cultural, la mejora de las condiciones de vida, la educación y la cohesión social; tantas cosas que ni la izquierda ni la derecha podrían lograr solas.\n\nHoy ondearon juntas las banderas negra, blanca y roja, negra, roja y amarilla, y roja lisa. Por primera vez en muchos años, Alemania estaba verdaderamente unida. Ya no hay división entre Este y Oeste, ni entre izquierda y derecha, ni de ninguna otra forma. Incluso si aún existían divisiones, solo las fortalecían en pluralidad, brindando lo mejor de todos los mundos.\n\nY esta es una Alemania que realmente puede redimirse y alcanzar las mayores victorias hasta la fecha."
 germany.293.a: "Marrones y Rojos trabajando juntos."
 germany.294.t: "Nacionalcomunismo en auge"
 germany.294.d: "La Revolución ha experimentado una resistencia reaccionaria sorprendentemente escasa, a diferencia de los años 20, cuando se formaron Freikorps y Sturmabteilungs para combatir al Partido Comunista, y esto podría tener una razón, tanto positiva como preocupante.\n\nTras décadas de intentos fallidos por parte de diversos grupos, las ideas del nacionalcomunismo han comenzado a extenderse, especialmente entre militares retirados y en activo, aparentemente impulsadas por el deseo de venganza contra la Rusia nacionalista, así como por un amargo sentimiento de abandono de la nación alemana por parte de su Gobierno.\n\nNuestras fuentes también indican que miembros de partidos políticos de ultraderecha, como Frank Franz, han optado por no resistirse abiertamente a la Revolución, buscando en cambio infiltrar las ideas del supremacismo alemán a través de diversos medios no violentos, formando clubes nacionalcomunistas, celebrando conferencias y mítines.\n\nPor otro lado, la Plataforma Anticapitalista promueve la adopción de elementos del modelo del juche norcoreano con características alemanas, alegando la vulnerabilidad de la sociedad alemana actual.\n\nEs prematuro predecir las consecuencias de esta evolución; sin embargo, se dice que incluso en diferentes niveles de gobierno hay personas que podrían apoyar estas ideas."
 germany.294.a: "¿Bien...?"
 germany.295.t: "Formación de la Nueva Fracción del Ejército Rojo"
 germany.295.d: "El llamado a la fuerza de nuestro pueblo y la activa propaganda nacionalista han llevado al alistamiento voluntario masivo y a la formación de múltiples organizaciones paramilitares que participan en el entrenamiento de una nueva generación de combatientes y colaboran con el Ejército Nacional Popular. Una de ellas destacó por su rápido crecimiento y popularidad, ya que utiliza el simbolismo de la Fracción del Ejército Rojo, una organización de partisanos radicales anticapitalistas que operaba en Alemania Occidental."
 germany.295.a: "Un grupo útil de recreadores."
 germany.296.t: "¡Ruptura franco-alemana!"
 germany.296.d: "La ruptura sino-soviética, un evento que definió el rumbo del desarrollo de las ideologías y Gobiernos de izquierda a nivel mundial, parece haberse repetido hoy en forma de un intenso intercambio diplomático franco-alemán, con algunas extradiciones y maniobras militares, como parte de lo que parece ser el primer conflicto en Europa desde la Segunda Guerra Mundial, aunque solo político, por ahora.\n\nEsto parece ser la culminación de numerosos desacuerdos surgidos entre los Gobiernos francés y alemán durante las conferencias de la Internacional Europea sobre el futuro de Europa y la unificación de las ideologías de izquierda en todo el continente en un único modelo de desarrollo. Además, no han logrado definir sus esferas de influencia, especialmente en lo que respecta a los territorios post-rusos.\n\nPor ahora, no está claro cómo terminará esta situación, con Europa calentándose como una sartén y cada vez más países de Francia y Alemania involucrados. Algunos expertos temen que no se logre una solución pacífica."
 germany.296.a: "Otra vez no..."
 germany.297.t: "¡Alemania y Francia entran en guerra!"
 germany.297.d: "Noticias impactantes llegan de Europa Occidental: los enfrentamientos fronterizos entre unidades alemanas y francesas en el Rin se han intensificado hasta convertirse en una guerra a gran escala, y cualquier atisbo de una Europa socialista unida se desvanece en un instante.\n\nEuropa está ahora dividida entre la alianza antirrevisionista liderada por Francia para derrocar al gobierno de izquierda radical de Alemania, que se ha desviado considerablemente de los demás países. Ahora, cada sistema se someterá a una prueba definitiva para decidir qué comunismo es verdadero y más efectivo, y quién será tachado y relegado a una lista de literatura prohibida.\n\nEl fuego de la Revolución está consumiendo a sus propios hijos. El futuro es brillante, pero no todos vivirán para verlo."
 germany.297.a: "¿Una última vez?"
 germany.298.t: "Decepción con Die Linke"
 germany.298.d: "La aplastante derrota en la Guerra Europea ha dejado el panorama político alemán bastante destrozado. Normalmente, serían los partidos centristas los que perderían su legitimidad ante la ciudadanía; sin embargo, esta vez es Die Linke el que está bajo un intenso escrutinio.\n\nAdemás de los esperados saltos hacia la ultraderecha, los elementos de izquierda en Alemania han adoptado un pensamiento más especializado y se han adentrado más en las culturas clandestinas de la juventud alemana. Hay demasiados nombres para las ideologías escindidas que han surgido de los miembros insatisfechos de Die Linke, pero aparentemente han adoptado una forma más ácida.\n\nInspirada en las obras de Mark Fisher y Byung-Chul Han, esta nueva ola de izquierdismo reinventado se ha extendido ampliamente entre la cultura juvenil de izquierda, donde los fracasos del \"liberalismo rojo\" y \"la máscara siempre cambiante del capital\" son duramente criticados.\n\nPor el momento, parece que seguirá siendo un aspecto menor de la vida cotidiana alemana, pero ya se ha visto a miembros muy respetados de Die Linke presentes en eventos culturales y reuniones entre estos grupos más pequeños. Solo el futuro dirá cómo evolucionará esto."
 germany.298.a: "El parásito abstracto ha sido expuesto."
 germany.299.t: "Coalición para la Recuperación del Futuro"
 germany.299.d: "A medida que se acercan las elecciones recién anunciadas, surgen cada vez más movimientos de izquierda que buscan apoyo y representación en el gobierno.\n\nEn particular, un partido ha logrado atraer a un público inusual, conquistando a las masas con un programa interesante y detallado, promesas únicas y, sobre todo, la presencia de muchas caras nuevas y jóvenes que prometen transformar no solo a Alemania, sino también al resto del mundo.\n\nCoalición para la Recuperación del Futuro, liderada por Byung-Chul Han, filósofo deconstruccionista de ascendencia surcoreana, considerado por algunos expertos como uno de los principales representantes del aceleracionismo de izquierda en el mundo actual.\n\nSus lemas hacen especial hincapié en el cansancio del pueblo alemán ante la política izquierdista tradicional, así como en el aspecto social, prometiendo reformar el país para evitar el agotamiento social y dar paso a avances tecnológicos y culturales que sentarán las bases del futuro poscapitalista.\n\nParece que el partido que promete eliminar el concepto de capitalismo está ganando mucha fuerza en las encuestas y competirá por el derecho a ganar y formar gobierno tras las elecciones."
 germany.299.a: "¡Qué movimiento tan peculiar!"
 germany.300.t: "Zizek se une al gobierno"
 germany.300.d: "No hablamos de las propiedades objetivas y fácticas de una mercancía, sino solo del excedente ilusorio.\n\nHuevo Kinder Sorpresa. Una mercancía realmente asombrosa. La sorpresa del... huevo Kinder Sorpresa... es que este objeto excedente, la causa de tu deseo, está aquí, materializado en la forma de un objeto: un juguete de plástico, que llena el vacío interior del huevo de chocolate. El delicado equilibrio reside en estas dos dimensiones: lo que compraste, el huevo de chocolate, y el excedente -probablemente fabricado en algún gulag chino o lo que sea-, el excedente que obtienes gratis.\n\nNo creo que el marco de chocolate esté aquí solo para enviarte a un viaje más profundo hacia el tesoro interior, lo que Platón llama el Agalma, que te convierte en una persona valiosa, lo que convierte a una mercancía en la mercancía deseable. Creo que es al revés.\n\nDeberíamos aspirar a la meta superior, la meta en el centro de un objeto, precisamente para poder disfrutar de la superficie. Esta es la lección antimetafísica, que es difícil de aceptar."
 germany.300.a: "¿De acuerdo...?"

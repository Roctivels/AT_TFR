 GER_spartanist_cat: "Renacimiento nacional"
 GER_spartanist_cat_desc: "\n\n\n\n\n£GFX_GER_querfront_cat_banner\n\n\n\n\n\n\n\nDesde que la política se dividió entre derecha e izquierda, ha surgido un movimiento para unificarlas -o que en alemán se llama Querfront, o \"Frente cruzado\"-, una alianza necesaria contra las fuerzas del capitalismo y los enemigos externos.\n\nSi bien en Alemania este concepto no tuvo mucho éxito en el siglo XX, otros países sí tuvieron experiencias positivas combinando las ideas del nacionalismo y el socialismo, y Alemania tiene mucho que aprender.\n\nLas circunstancias históricas han empujado a la derecha y la izquierda a una coalición; ahora el camino que Alemania tomará está en nuestras manos."
 GER_lacc_cat: "Revitalizando el espíritu humano"
 GER_lacc_cat_desc: "\n\n\n\n\n£GFX_GER_lacc_cat_pic_banner\n\n\n\n\n\n\n\nEntre las líneas rojas que suben y bajan y la creciente supresión de la expresión humana, sin duda el estancamiento comenzaría a convertirse en un tumor para la sociedad en su conjunto.\n\nEl capital es una deidad hostil que vive del sufrimiento de la vida sensible, y con la máscara del neoliberalismo, esto se ha vuelto cada vez más evidente.\nUna de nuestras mayores tareas es deshacer las cicatrices que el capital ha dejado atrás, una desintoxicación espiritual de las ataduras de la nostalgia.\n\n\"Es más fácil imaginar el fin del mundo que imaginar el fin del capitalismo\".\nPero no solo imaginemos el fin del capital, sino que también acabemos con él.\n\nAcabemos con el pasado, abramos el futuro, rechacemos las raíces que frenan, incorporemos las raíces que crecen."

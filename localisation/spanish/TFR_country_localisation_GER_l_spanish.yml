 germany.352.t: "Se aprueba ReArm Europe"
 germany.352.d: "La presidenta de la Comisión, Ursula von der Leyen, siempre defensora de la guerra en Europa, propuso el plan ReArm Europe como parte de su agenda Readiness 2030, acelerada desde el colapso de Estados Unidos en 2021. La falta de fondos y armas estadounidenses ha colocado a Europa en una posición precaria.\n\nTodos los europeos, sin distinción, comprenden conjuntamente lo apremiante de la situación. Las normas de la Unión Europea dictan la estabilidad fiscal, pero el rápido rearme en respuesta al auge del expansionismo ruso y al colapso de nuestro mayor defensor requiere préstamos, asunción de riesgos y recortes presupuestarios.\n\nSi bien el borrador inicial de este proyecto tenía un precio conservador de 800 mil millones de euros, la propuesta que ha aprobado hoy el Parlamento Europeo tiene un coste de 1,4 billones de euros, con planes para recortar el presupuesto europeo, emitir préstamos y desviar fondos de ministerios poco importantes, todo ello con el fin de establecer un programa de adquisición unificado con el objetivo del rearme europeo.\n\nAunque el plan se denomina Readiness 2030, se espera que muchos países europeos superen con creces este objetivo gracias a la aportación de fondos adicionales y, con suerte, a la reintroducción del servicio militar obligatorio en algunos de los principales países, pero el éxito definitivo del plan dependerá de la cooperación de titanes europeos como Alemania, Francia, Italia y España, que deberán movilizarse y contrarrestar la amenaza rusa con su dinero, su capacidad de producción y su mano de obra.\n\nLa aprobación de este plan por parte del Parlamento Europeo es un gran primer paso hacia la implementación de medidas bélicas en toda la Unión, en previsión de una escalada de tensiones tanto a nivel nacional como internacional."
 germany.352.a: "¿La democracia salva a la democracia?"
 germany.353.t: "ReArm Europe: Abrir la cartera"
 germany.353.d: "Con la aprobación de ReArm Europe, las normas de estabilidad fiscal de la Unión Europea se han flexibilizado considerablemente para ampliar las opciones de los países europeos en materia de movilización a corto plazo. Sin embargo, ante esta situación, muchos países de la UE se muestran reacios a asumir riesgos y muchos no quieren actuar por su cuenta, por lo que, a medida que Europa se une cada vez más, corresponde a los titanes guiar a toda la Unión hacia adelante.\n\nAlemania podría ser el país que tome las decisiones en este acuerdo, ya que cualquier medida que tome probablemente será seguida por los demás de forma proporcional. Hay múltiples opciones, la primera de las cuales es simplemente dejar el rearme en manos de cada país, permitiendo que todos ellos asuman directamente la deuda mediante la adquisición de préstamos para defensa.\n\nPor otra parte, las subvenciones de la Unión Europea a muchos de los países más pobres de la Unión parecen desaparecer en un abismo de pobreza y corrupción, y tal vez podamos hacer recortes aquí y allá para desviar estas subvenciones hacia un programa de adquisición colectiva.\n\nPor último, pero quizás lo más arriesgado o menos, dependiendo de cómo se mire, es situar a Alemania en el centro de los esfuerzos de rearme. Podría dar sus frutos y ampliar enormemente nuestra capacidad de producción, pero también podría hundirnos en la deuda, y tan poco después de una caída de la bolsa, asumir préstamos en nombre de nuestros vecinos más pobres y vulnerables sería impopular.\n\nEn resumen, ¿deuda o capital? ¿Estabilidad fiscal? ¿O préstamos a cambio de influencia? ¿Debemos centralizar los esfuerzos de rearme europeos o delegarlos? En este momento, la decisión es suya, canciller."
 germany.353.a: "No veo ninguna razón por la que no puedan pagar."
 germany.353.b: "Nuestro dinero debe destinarse a nosotros."
 germany.353.c: "Lideraremos Europa. ¡Vorwärts!"
 germany.354.t: "¿Oro blanco bajo nuestros pies?"
 germany.354.d: "Berlín, Deutsche Welle (DW)\nEs posible que se haya descubierto un nuevo capítulo en el futuro industrial de Alemania bajo los campos y colinas de Sajonia-Anhalt. Tras meses de estudios geológicos preliminares, las autoridades mineras federales y estatales han confirmado la presencia de importantes yacimientos de litio, uno de los mayores jamás descubiertos en suelo europeo. \n\nApodado \"oro blanco\" por inversores e ingenieros, el litio es esencial para la producción de baterías para vehículos eléctricos, sistemas de almacenamiento de energía y tecnologías de defensa de última generación. Hasta ahora, las ambiciones ecológicas y digitales de la Unión Europea dependían en gran medida de las importaciones extranjeras, especialmente de Australia, Chile y China. Esto podría estar a punto de cambiar. \n\nLos expertos estiman que las reservas encontradas podrían suministrar más de una cuarta parte de las necesidades de litio previstas por la UE para las próximas dos décadas. Este hallazgo se produce en un momento en el que Bruselas está impulsando una mayor autonomía estratégica y Berlín lidera los esfuerzos para remodelar la columna vertebral industrial del continente bajo la doble bandera de la transición energética y la modernización militar.\n\nConsorcios de empresas alemanas y europeas ya están preparando estudios de viabilidad para una extracción rápida. Los planes de infraestructura, las evaluaciones medioambientales y el cabildeo político se están acelerando a una velocidad sin precedentes. El gobierno regional, atrapado entre las promesas de revitalización económica y la precaución medioambiental, ha pedido un \"desarrollo equilibrado\", pero la presión va en aumento.\n\nDesde Bitterfeld hasta Bernburg, una región tranquila asociada durante mucho tiempo al estancamiento posindustrial puede convertirse ahora en la primera línea de la carrera por los recursos del siglo XXI en Europa. Queda por ver si este \"momento del litio\" se traducirá en una transformación duradera. Pero, por ahora, todas las miradas se dirigen a Sajonia-Anhalt y al metal blanco que se encuentra bajo su suelo"
 germany.354.a: "Encontramos la batería de Europa."
 germany.355.t: "Del mineral al Autobahn"
 germany.355.d: "Hamburgo, Der Spiegel\nEn el borde del distrito comercial de Hamburgo, una larga fila de coches brilla bajo un sol invernal. Dentro del concesionario, hay bullicio, más que en años. Por primera vez en una década, las listas de espera para nuevos coches alemanes han vuelto, y los compradores no se quejan.\n\n\"Miramos el BYD,\" dice una pareja de mediana edad a Der Spiegel, \"pero este se siente bien. No quiero software de Shenzhen funcionando bajo mi volante\".\n\nEl vehículo en cuestión es el nuevo SUV eléctrico de BMW, uno de varios modelos que utilizan baterías provenientes de las emergentes operaciones de litio en Sajonia-Anhalt. \"Nuestro litio,\" dice el vendedor con una sonrisa. \"De aquí, no de Chile\".\n\nLa conexión no pasa desapercibida para los clientes. Con los aranceles de la UE sobre los vehículos eléctricos chinos haciendo que las importaciones sean menos atractivas, y tras meses de titulares sobre avances mineros nacionales, hay un sentimiento creciente de que comprar alemán es más que una preferencia, es patriótico. Un comprador más joven, recién empleado en una gigafábrica local, lo llama \"cerrar el ciclo\".\n\n\"Sacamos el litio de nuestra propia tierra, fabricamos las baterías en Jena, ensamblamos los coches en Stuttgart. Así debería ser\", dice, firmando su nombre en la línea punteada.\n\nPara una industria que una vez quedó tambaleándose por la tecnología extranjera y escándalos nacionales, la marea podría estar cambiando. Y para Alemania, definida durante mucho tiempo por sus carreteras, sus máquinas y su orgullo en ambos, el motor de la recuperación vuelve a rugir."
 germany.356.t: "Acuerdo de Asociación UE-Mercosur"
 germany.356.d: "Después de años de negociaciones, el Acuerdo de Asociación UE-Mercosur ha vuelto a la mesa, esta vez con un verdadero impulso detrás. Los partidarios en Bruselas lo enmarcan como un avance estratégico: una vasta zona de libre comercio que conecta Europa con las economías más grandes de América del Sur, reduciendo aranceles, ampliando el acceso a recursos críticos y abriendo nuevos mercados de exportación en un momento en que las cadenas de suministro globales son cada vez más inestables.\n\nPara Europa, las ventajas son claras sobre el papel. Los exportadores industriales se beneficiarían de un acceso más fácil a los consumidores sudamericanos, especialmente en automóviles, maquinaria, productos químicos y manufactura de alta gama. El acuerdo también reduciría la dependencia de Europa de proveedores impredecibles al fortalecer los lazos con Brasil y sus vecinos, asegurando las importaciones agrícolas y materias primas clave. En una era de bloques en ascenso, ofrece a Europa una forma de mantener abiertas las rutas comerciales sin depender de las grandes potencias.\n\nPero los costos son igual de reales. Los agricultores y sindicatos agrícolas europeos advierten que abrir el mercado a productos del Mercosur podría desencadenar una ola de importaciones baratas, presionando a los productores nacionales y profundizando el rechazo rural que ya está latente en todo el continente. La oposición ambiental es aún más fuerte: los críticos argumentan que el acuerdo premia la deforestación y los estándares laborales débiles, colocando la política climática alemana en contradicción directa con sus ambiciones comerciales.\n\nEl gobierno ahora enfrenta una elección entre el comercio estratégico y la estabilidad política interna. Firmar fortalece el alcance económico de Alemania en el exterior, pero corre el riesgo de desencadenar un escándalo interno que tal vez no pueda controlar."
 germany.356.a: "Firmaremos el acuerdo."
 germany.356.b: "Es muy arriesgado, lo rechazaremos."

 germany.344.t: "Reunión de los Verdes"
 germany.344.d: "Las elecciones aún están en marcha, pero las primeras encuestas ya muestran perspectivas prometedoras para Los Verdes. Sin embargo, una pregunta se cierne, tanto para los miembros del partido como para los votantes: ¿quién liderará?\n\nAnnalena Baerbock y Robert Habeck comparten desde hace tiempo el liderazgo del partido, siguiendo la tradición verde de enfatizar la igualdad y el equilibrio. Pero ahora ha llegado el momento de elegir una sola cara del movimiento: alguien que impulse al país como Canciller.\n\nBaerbock es conocida por su idealismo y franqueza, inquebrantable en política exterior. Muchos la describen como firme, incluso confrontativa, pero también profundamente comprometida con la claridad moral y los derechos humanos. Está dispuesta a llegar lejos para defender lo que considera un camino justo y basado en principios. Una política de \"futuro, no de compromisos\", bien podría ser la líder que el país merece.\n\nHabeck, en cambio, goza de un amplio apoyo público gracias a su visión pragmática y centrada en la economía. Su temperamento también contrasta con el de Baerbock: más tranquilo, más conciliador y centrado en la construcción de consensos. Si bien incluso él se ha vuelto más asertivo en política exterior, sigue siendo, a ojos de muchos, \"el realista\": un líder que comprende el funcionamiento del sistema y está dispuesto a trabajar con él para impulsar el cambio.\n\nCon esto en mente, el partido ya ha concluido su votación interna y ha anunciado cuál de los dos se presentará como candidato para uno de los cargos más cruciales del país..."
 germany.344.a: "¡Annalena Baerbock!"
 germany.344.b: "¡Robert Habeck!"
 germany.345.t: "CDU/CSU: Batalla por el futuro"
 germany.345.d: "Si alguna fuerza política en el sistema multipartidista alemán puede considerarse la \"vieja guardia\", esa es sin duda la CDU/CSU. Fundada en 1945 tras la guerra y unificada, al menos nominalmente, en 1949, ambas han operado en tándem desde entonces, en todos los niveles de gobierno. Algunos incluso podrían llamarlas un \"pilar de estabilidad\". Pero las divisiones internas, especialmente ahora en torno a las próximas elecciones y la cancillería, hacen que esa etiqueta parezca más bien una ilusión.\n\nTodas las expectativas públicas apuntaban a Merz como el candidato obvio: el favorito de la alianza, con la nominación prácticamente garantizada. Sin embargo, en un giro inesperado, el líder de la CSU declaró su intención de presentarse.\n\nEntra Markus Söder: oficialmente bávaro y socialcristiano. Si bien su afiliación bávara es innegablemente cierta, el nombre de su facción no refleja del todo su postura ideológica. Conocido por sus declaraciones contundentes y a menudo contradictorias, Söder goza de una gran popularidad regional. Se opone abiertamente al multiculturalismo, a la vez que apoya causas liberales como el matrimonio igualitario y la vacunación obligatoria.\n\nEn cambio, Merz es más de derechas. Tras perder su batalla interna contra Angela Merkel hace dos décadas, está decidido a no volver a hacerse a un lado. Juez, abogado y experto financiero con amplia experiencia, ahora aspira a añadir el título de \"canciller\" a su currículum. Tranquilo, competente y posiblemente más capaz que su rival, sin embargo, lucha por captar la misma atención pública.\n\nCon el declive gradual del bloque cada vez más difícil de ignorar, quizás una decisión inesperada sea justo lo que se necesita. Al final, tras sopesar todas las opciones, la CDU/CSU llegó a la conclusión de que..."
 germany.345.a: "La experiencia de Merz gana."
 germany.345.b: "¡Las ambiciones de Söder nos convencen!"
 germany.346.t: "¿Cuál es la Alternativa?"
 germany.346.d: "La AfD sigue siendo uno de los partidos más controvertidos de Alemania. Fundada en 2013, ni siquiera sus miembros originales podrían haber imaginado en qué se convertiría hoy. Euroescepticismo, populismo de derecha, islamofobia e incluso neonazismo son términos que prácticamente se han convertido en sinónimos del partido para gran parte del público.\n\nY, sin embargo, su popularidad sigue en aumento. Las tensiones persistentes sobre la inmigración, las políticas gubernamentales erróneas y la desilusión política general no hacen más que avivar el interés en la AfD y ampliar su base de votantes.\n\nPero ahora, el partido se encuentra en una encrucijada: decidir quién liderará su campaña electoral entre sus dos figuras más influyentes: Alice Weidel y Tino Chrupalla.\n\nWeidel es una figura excéntrica, ideal para un partido como el suyo. A menudo provoca fuertes reacciones de los medios y del público debido a su franqueza. Es una mujer de principios, firme en sus convicciones ante las críticas. Al igual que su partido, está a favor del liberalismo económico y el retorno a la energía nuclear.\n\nSu rival interno, Chrupalla, presenta una opción más atractiva para un público más amplio. Más tranquilo, más sereno y más inclinado al compromiso. Con su carácter diplomático, promete unificar al partido como nunca antes, y siempre encuentra la manera de negociar con los oponentes políticos.\n\nAsí pues, tras varias semanas de debates, discusiones, persuasión y prácticamente todo lo imaginable, el partido, bajo la atenta mirada de la prensa y el público, hizo un anuncio nacional:..."
 germany.346.a: "¡Weidel podrá crear una coalición!"
 germany.346.b: "Tino podrá unir al partido..."
 germany.347.t: "La nueva líder de Die Linke se pronuncia"
 germany.347.d: "En comparación con sus rivales en estas elecciones, Die Linke parece ser un excepcional islote de estabilidad interna. Con una plataforma política consistente y prácticamente inflexible, una base electoral ideológicamente unificada y una líder -quizás, más precisamente, una mujer líder- que recientemente sorprendió al país con un solo discurso.\n\nHeidi Reichinnek podría ser la candidata más joven de la contienda de este año. Su actividad y popularidad en redes sociales rivalizan con las de influencers experimentados, y su autenticidad sin filtros -desde sus tatuajes hasta sus encendidas declaraciones en el Bundestag- supera incluso a su archirrival de la AfD.\n\nSin embargo, a pesar de su abierta defensa de los derechos de las mujeres, su compromiso con los trabajadores y su postura autoproclamada a favor del \"socialismo democrático\", las cifras de las encuestas del partido se mantuvieron modestas... al menos hasta hace poco.\n\nA medida que las elecciones se intensifican, los acuerdos interpartidarios se han vuelto habituales en todo el espectro político. Pero para Reichinnek, la gota que colmó el vaso fue el debate sobre una posible cooperación entre la CDU y la AfD. Cuando Friedrich Merz, uno de los favoritos a nivel nacional, expresó su apoyo a leyes migratorias más estrictas durante una semana de luto nacional por las víctimas de los campos de concentración, ella respondió sin dudarlo.\n\nSubiendo al podio en cuanto tuvo la oportunidad, la directora de Die Linke pronunció un discurso feroz e inflexible condenando tal retórica. Incluso muchos de sus oponentes políticos admitieron estar impresionados por la claridad moral que proyectaba, y su exclamación: \"¡Este es el maldito problema!\" se extendió como la pólvora por todo el país.\n\nSi bien es difícil medir el impacto duradero de sus palabras, una cosa es segura: por primera vez en años, Alemania podría estar a punto de elegir un partido que sitúe a sus trabajadores en el centro de la política nacional."
 germany.347.a: "¿Alemania vuelve a la izquierda?"
 germany.348.t: "Piel suave"
 germany.348.d: "El mundo es una inmensa acumulación de delirios.\n\nAsí se construyeron los imperios: sobre los ideales de unos pocos que tuvieron visiones de un lugar que nunca debimos ver.\nCuando tocas suavemente a alguien, ¿qué se siente?\n¿Correcto o incorrecto?\n¿Bueno o malo?\n¿Rojo o azul?\n\nTu opinión difiere de la del otro, y en un mundo justo, le habrías destrozado la tráquea; bueno, puedes.\n\nEres tú mismo quien te impide ver el mundo tal como es.\nEs natural que la entidad sagrada en la que crees y te consagras sea un reflejo de ti mismo.\nPor lo tanto, ¿cómo puedo creer lo que me muestran mis ojos?"
 germany.348.a: "Arráncalos, mira más allá del velo."
 germany.349.t: "Darwin"
 germany.349.d: "La violencia es natural, es sana, es la única manera de asegurar que todos los seres vivos puedan vivir un día más. Lo hicimos desde que nos aplastamos el cráneo con piedras cuando nos escondíamos en cuevas.\n\nEl león viola al perrito, el tiburón devora a la ballena y el buitre picotea al moribundo.\n\nEl futuro es incierto, pero el presente, el hoy, el aquí y ahora es lo único que importa.\nNuestros puños están ensangrentados, nuestras sonrisas son visibles.\nEl mundo en el que vivimos ahora mismo es lo que importa.\n\nNo entiendo por qué vilipendian esto.\n¿No estamos todos haciendo lo mismo, directamente o no?\n\nNos abrimos paso a codazos para poder sobrevivir, y quienes no tienen la capacidad para hacerlo se pudren en el barro. El culto al Capital siempre ha fomentado esto, y ahora que lo estamos llevando a su conclusión natural, se esconden en sus refugios y búnkeres.\n\nLa Unión Europea afirmó haber hecho lo que hizo para respetar la vida.\n\n¿Cuál es la razón para respetar la vida?\n¿Crees que estás respetando la vida ahora mismo?"
 germany.349.a: "Solo queda una ley."
 germany.350.t: "Hambre"
 germany.350.d: "Una era donde la humanidad está dominada por el acto de consumo.\n\nEl hambre lleva al enojo, el enojo lleva a la ira, la ira lleva a la brutalidad.\nAsí somos.\n\nComo cabría esperar de la torre de marfil que quiere gobernarnos a todos, el Foro Económico Mundial exige que comamos lo \"correcto\".\nSi algo es correcto, hay algo que se considera \"incorrecto\", ¿no es así?\n\nEl hambre es natural, pero la gente pone límites a la hora de comerse a sus semejantes.\n¿Quién lo decidió así y por qué? ¿Será porque la vida humana es preciosa?\n\n¿Qué hace que la vida de los animales sea menos preciosa? ¿Acaso no nos hemos visto obligados a comer insectos?\n\nLa humanidad es el máximo depredador, así que tendría sentido que formáramos grupos de humanos, así que no debería haber ningún problema en que nos eleváramos por encima del resto y nos aprovecháramos de los demás.\n\nCada ciudad se convertirá en una jungla urbana donde saciaremos nuestros deseos más profundos a costa de los demás."
 germany.350.a: "Para escapar del dolor que sentimos todos."
 germany.999.t: "Fase uno"
 germany.999.d: "\"El caos es la herramienta que usamos para generar grandes cambios\".\n\nLa sala de conferencias estaba a oscuras, iluminada únicamente por la pantalla panorámica, que mostraba diversos datos, predicciones futuras y el flujo actual del mercado.\nEn el borde de la mesa, un hombre mayor y calvo estaba sentado, contemplando la sobrecarga de datos visible en la pantalla.\nKlaus Schwab era solo un rostro; eso era cierto.\n\nPero negar su importancia sería negar la realidad: ¿no fue él quien trajo la Cuarta Revolución Industrial a Oriente? ¿No fue él quien aplastó la multipolaridad? ¿No fue él quien...?\n\nSus pensamientos se interrumpieron cuando la pantalla destelló, un fondo azul inexpresivo, pero con eso, dos figuras oscuras emergieron lentamente, cuyas siluetas le resultaban demasiado familiares a Schwab.\n\n\"¿Se siente al mando, señor Schwab?\", dijo una voz con un marcado acento francés.\n\"Puede que haya sido un gran contribuyente, pero uno siempre debe saber cuál es su lugar\". Otra voz, igual de francesa.\n\nNo tuvo que responder; sus pensamientos eran los de ellos.\n\n\"Lo has hecho bien\".\n\"La humanidad es una bestia cruel; se necesita mucho coraje para domar a un ser así\".\n\"Con la fase uno completada, pasaremos a la fase dos\".\n\nBien, la fase dos: la localización y adquisición de los registros akáshicos.\n\n\"Ya sabes qué hacer\".\n\"No nos decepciones\".\n\nLa pantalla se apaga.\nY Schwab deja escapar un suspiro de alivio.\n\nPresiona un botón en un teléfono cercano y habla.\n\"Consígueme una expedición a la Antártida, deprisa\"."
 germany.999.a: "Adiós, vaquero."

 germany.264.t: "El duelo de caballeros"
 germany.264.d: "La lluvia caía sobre las ruinas, formando arroyos turbios que serpenteaban por las calles marcadas por el fuego de la artillería. Aleksandr Petrov se agazapó tras un muro derrumbado; su fusil había disparado su última bala. Al otro lado de la calle, un soldado alemán se ocultaba tras un vehículo blindado destrozado. Ambos sabían que el otro también se había quedado sin munición.\n\nEl aire estaba impregnado de pólvora, mezclada con la humedad de la lluvia y el polvo. Aleksandr recordó las palabras de su madre: que todo hombre debía morir como un guerrero en la guerra. Con determinación, se puso de pie, dejando que la lluvia gotease de su uniforme, y gritó en un alemán con un marcado acento: \"¡Vamos, terminemos esta pelea como hombres!\". Levantó los puños, adoptando la postura de un boxeador, y su voz resonó en la desolada calle.\n\nOtto Bredo observó al ruso levantarse, con una leve y casi imperceptible sonrisa en los labios. Sostenía una pistola en la mano, cargada con una sola bala, que había reservado deliberadamente para este momento final. Mientras Aleksandr lanzaba lo que creía que sería el puñetazo más honorable de su vida, Otto levantó el brazo con calma.\n\nEl disparo resonó, extrañamente agudo bajo la lluvia. Aleksandr cayó, con el rostro aún congelado en la expresión de valentía que había querido mostrar.\n\nLa lluvia caía con más fuerza, lavando el carmesí fresco del suelo."
 germany.264.a: "Y se arreció."
 germany.265.t: "Salta a la vista"
 germany.265.d: "\"¿Disculpe, oficial?\", preguntó una anciana mientras se acercaba a Lukas Müller.\n\nLa verdad es que Lukas no era un policía de verdad. Solo lo habían contratado de última hora por los organizadores del festival para hacer algo que se pareciera a la seguridad. Le dieron una porra, gas pimienta y un par de esposas. Ni siquiera le habian dado un taser. Sin embargo, no tenía ganas de discutir con una anciana sobre su trabajo justo una semana antes de Navidad.\n\n\"Sí, ¿en qué puedo ayudarle?\", le respondió a la mujer.\n\n\"Hay un hombre extraño merodeando junto a ese camión de ahí\", dijo la mujer, señalando hacia el otro extremo del festival.\n\n¿Un hombre extraño \"merodeando\"? Bueno, eso definitivamente valia la pena. Tal vez se toparía con alguien tirando basura, ¡y también con un peatón imprudente! Pero, sinceramente, investigar a ese merodeador podría ser más entretenido que quedarse parado en el frío.\n\n\"Déjamelo a mí, vaya a disfrutar del festival\", le dijo Lukas para tranquilizarla, y se dirigió hacia el \"hombre extraño\".\n\nSin embargo, al acercarse a la camioneta que la señora había señalado, se dio cuenta de que su preocupación podría tener algo de fundamento. El merodeador resultó ser un hombre nervioso de ascendencia árabe, de unos treinta años. Estaba parado justo frente a la puerta de la camioneta, observando a la multitud. ¿Estaba planeando robar la camioneta o algo así?\n\n\"Oye, ¿esa camioneta es tuya?\", le gritó Lukas al hombre, cada vez más sospechoso.\n\nLos ojos del hombre se abrieron como platos y, probablemente confundiéndolo con un policía, salió corriendo calle abajo. Inmediatamente, Lukas echó a correr tras él, convencido de que era un delincuente. Sin embargo, nunca pudo acortar la distancia que el árabe le llevaba, y pronto se dio por vencido.\n\nDecidió que lo mejor sería llamar a la policía y dejar que ellos se encargaran."
 germany.265.a: "No me pagan suficiente para lidiar con eso."
 germany.266.t: "Un ávido coleccionista"
 germany.266.d: "El golpe resonó justo después del anochecer, en el marco de la vieja puerta de madera. Frau Klein, una viuda anciana, se acercó a abrir, arrastrando los pies. Frente a su puerta, un hombre de traje la esperaba, con una sonrisa que parecía un poco forzada.\n\n\"Frau Klein\", comenzó con suavidad, \"soy representante de una sociedad histórica que está muy interesada en preservar reliquias de la República Democrática. He oído que podría tener algunos de esos objetos en su poder\".\n\nElla desvió la mirada hacia su bolso y luego a los brillantes zapatos del hombre. Sin decir una palabra, le hizo un gesto para que entrara. Desde un cofre que estaba bajo la ventana, Frau Klein sacó sus tesoros: una bandera descolorida de la Freie Deutsche Jugend, una medalla de obrero y un retrato agrietado de Honecker. Los ojos del hombre brillaron mientras se inclinaba, con los dedos crispados, como si anhelara reclamar esos artefactos.\n\n\"Son piezas extraordinarias\", dijo, con un tono que tenía un matiz depredador. \"Una historia viva. Mi organización estaría encantada de compensarle generosamente por ellas\".\n\nFrau Klein lo miró fijamente durante un largo instante, su rostro surcado de arrugas, impenetrable. \"Estos objetos\", dijo en voz baja, \"no están a la venta. Pertenecen al pueblo, al gobierno inquebrantable y reorganizado del Partido, no a coleccionistas ni especuladores capitalistas\"."
 germany.266.a: "Los recuerdos nunca cambian."
 germany.267.t: "La fina línea gris"
 germany.267.d: "El oficial Weber golpeó un informe contra el borde de su escritorio; su expresión era como el invierno tras las ventanas heladas. \"Otro más\", murmuró, deslizando el informe hacia el oficial Müller. \"Unos chicos acorralaron a un muftí en el metro. Lo golpearon casi hasta matarlo. Le dejaron un cartel alrededor del cuello que decía: «Enemigo del Pueblo»\".\n\nMüller miró el informe, levantando ligeramente una ceja. \"Me suena\", dijo con una leve sonrisa. \"Supongo que la Stasi estaría orgullosa\".\n\nWeber apretó la mandíbula. \"No lo idealices. Son matones politizados, no revolucionarios\".\n\nMüller se recostó; el crujido de su silla rompió el silencio. \"¿Y qué sugieres? ¿Ir tras ellos? ¿Crees que alguien en Berlín nos agradecerá que impidamos que unos chicos les rompan los huesos a fascistas o a secuaces de las corporaciones?\"\n\nEl oficial Weber exhaló lentamente. \"Se te olvida cómo funcionan estas cosas\", dijo en voz baja. \"Hoy son los parásitos corporativos, mañana alguien como nosotros. ¿Recuerdas lo que llamaban «autocrítica» entonces? ¿Cómo crees que la llamarán cuando vengan a por nosotros?\"\n\nLa sonrisa de Müller se desvaneció, apenas, antes de levantarse y agarrar su abrigo. \"Quizás estén limpiando la podredumbre. Quizás eso sea todo lo que este país necesita\"."
 germany.267.a: "La potredumbre no se detiene, consume."
 germany.268.t: "La Puerta de Brandeburgo"
 germany.268.d: "Karl se acomodó en su silla, con la luz de su pantalla iluminando su rostro mientras charlaba con su amigo por Discord. \"Es más que eso, Dmitri. Berlín está vibrante de nuevo. La gente canta en las calles, se forman consejos, es como si finalmente recordáramos quiénes somos\".\n\nDmitri soltó una risa suave. \"Un renacimiento, sí. Me recuerda a las historias que mi abuelo contaba sobre Octubre. Pero...\" Su voz se quebró.\n\n\"¿Pero qué?\", insistió Karl, aunque ya notaba el cambio en el tono.\n\nDmitri vaciló. \"Se siente en los discursos. Detrás del orgullo, hay ira. Contra Occidente, sí, pero también contra nosotros. Contra Rusia\".\n\nKarl reflexionó, dándole vueltas a sus pensamientos. \"Pero estamos construyendo algo nuevo, Dmitri. Se supone que debemos dejar atrás el pasado, no desenterrarlo de nuevo\".\n\nDmitri suspiró. \"La ira no desaparece tan fácilmente, amigo. Especialmente en tu país. La historia... vuelve como zombis\".\n\nKarl se detuvo un momento, mirando las banderas rojas que parpadeaban fuera de su ventana. \"Si esto se convierte en guerra, todo lo que hemos construido se irá en llamas\".\n\n\"Quizás\", respondió Dmitri. \"Pero el pasado nunca se queda enterrado, Karl. Ni aquí. Ni en Rusia. Y mucho menos en Alemania\"."
 germany.268.a: "Para la izquierda, los muertos nunca descansan."
 germany.269.t: "Reliquias viejas, nuevos hombres"
 germany.269.d: "El claro vibraba de emoción cuando los soldados se encontraron con la imponente figura, medio oculta entre la maleza y el paso del tiempo. Era inconfundible, incluso en su estado desgastado. Era Lenin, con el brazo extendido, congelado en plena orden, como si estuviera llamando a través de las décadas.\n\n\"¡Miren esto!\", exclamó uno de los soldados, mientras comenzaba a quitar la escarcha del pedestal. Sus guantes dejaban marcas de piedra limpia sobre la tierra. \"Es él, ¿verdad? ¡Es el camarada Lenin!\".\n\nLos demás se acercaron corriendo, sus botas crujían sobre el suelo helado. Un joven soldado recorrió la base con la mano, trazando con los dedos letras cirílicas descoloridas, lleno de curiosidad y orgullo. \"Imagínense... la Unión construyó esto\", murmuró, casi como un niño.\n\nUn soldado se subió, balanceándose con cuidado para colocar una chaqueta de repuesto sobre los hombros de Lenin. \"No podemos dejar que pase frío aquí\", bromeó entre vítores.\n\nOtro soldado se recostó contra el pedestal, sonriendo al mirar hacia arriba. \"¿Crees que estarían orgullosos de nosotros?\", preguntó, señalando la estatua. \"Sí, lo estarían. Aunque no estaría orgulloso de sus compatriotas\"."
 germany.269.a: "Una sensación hogareña."
 germany.270.t: "Canción de hielo y fuego"
 germany.270.d: "El campo de batalla se extendía por la llanura polaca en pleno invierno. El Panther, con su acero pintado de carmesí, era como un caballero andante de la revolución, llevando el estandarte de una Europa fracturada.\n\nAl otro lado de la extensión carbonizada se alzaba su enemigo: la Armata, una bestia imponente de hierro y sombra, marcada con una \"Z\" blanca en su piel, y su cañón, como un dragón primigenio.\n\nEl Panther avanzó, disparando primero su lanza de fuego que cortó el aire e impactó en la piel de la bestia. Chispas volaron donde el proyectil chocó contra la armadura, pero el dragón se mantuvo firme, con su armadura chamuscada pero intacta. La Armata rugió en respuesta, desatando un torrente de llamas y furia. El golpe impactó en el costado del Panther, dejando una profunda herida humeante en su armadura, pero el tanque se negó a flaquear.\n\nSe rodearon, caballero y monstruo, mientras la tierra cubierta de escarcha temblaba a su alrededor. El Panther cargó de nuevo, con la torreta girando y la mira lista para el golpe final. El proyectil impactó, perforando la piel escamosa de la Armata, desatando un infierno en su interior. Una humareda comenzó a salir de sus heridas, un sonido gutural y agonizante, y se desmoronó en el suelo, convirtiéndose en un montón de ruinas humeantes.\n\nEl Panther no se detuvo a celebrar; giró hacia el horizonte, hacia las amargas ruinas de Varsovia."
 germany.270.a: "Un cuento de héroes, se podría decir."
 germany.271.t: "La revolución de las abejas"
 germany.271.d: "En el sótano de una cervecería abandonada, un grupo de estudiantes universitarios se encontraba reunido alrededor de una mesa redonda, que ya mostraba signos de desgaste. Sobre la mesa, había hojas de papel arrugadas con palabras como \"alienación\", \"dialéctica\" y \"marxismo\" escritas en ellas. Acababan de consumir unos 200 microgramos de LSD y estaban sumidos en un torbellino psicodélico.\n\n\"Mira\", dijo Hans, con la mirada perdida en un punto imaginario del techo, \"la alienación en la sociedad capitalista es como los ladrillos de este sótano. Se suponía que debían formar parte de un todo, pero ahora están separados\". \"No, no, no\", interrumpió Lina, sacudiendo su despeinado cabello pelirrojo. \"No lo entiendes. La alienación no es algo físico, es un... un...\". Su voz se fue apagando hasta convertirse en un murmullo ininteligible.\n\n\"¡Espera!\" Anna se levantó de golpe de su silla, casi derramando la cerveza de la mesa. \"¡Ya lo tengo! ¡El universo entero es un gigantesco fetichismo de mercancías! Mira estas velas: son solo formas alienadas de cera estampada, y la cera estampada en sí misma es trabajo apícola alienado...\"\n\n\"Pero las abejas, las abejas son la sociedad comunista perfecta. ¿Sabías que en una colmena, cada abeja trabaja según sus necesidades?\", dijo Lina mientras apartaba un ejemplar de Das Kapital que se había empapado de cerveza. \"No, eso está mal\", exclamó Anna, moviendo los brazos con entusiasmo. \"¡La abeja reina es el epítome del capitalismo burocrático! ¡Necesitamos una revolución de las colmenas! Pero primero, debemos entender cómo el fetichismo de las mercancías afecta a las abejas. ¿Ves estas paredes? Respiran, igual que respira el trabajo alienado...\"\n\n\"Creo que ahora lo entiendo\", dijo Hans, retomando la conversación donde Anna la había dejado. \"El capitalismo es como este sótano: estamos atrapados dentro. ¡Pero en realidad, somos el sótano!\"\n\n\"Pero si somos el sótano, ¿quién es la casa de arriba?\"\n\nNadie pudo responder a la pregunta. Se quedaron sentados en silencio, viendo cómo las manchas de agua en el suelo se transformaban en la imagen de Marx, luego de Hegel."
 germany.271.a: "Y finalmente, en una abeja bailarina."
 germany.272.t: "Amor y Pushkin"
 germany.272.d: "En la sala de Poesía Rusa del Museo de Arte Socialista, Katerina Weber se recogió un mechón de cabello dorado detrás de la oreja, con la mirada fija en el panel de la exposición sobre Mayakovski. Su madre, Marianne, estaba cerca, junto a la vitrina de Pushkin, echando un vistazo a su hija de vez en cuando.\n\n\"Mira esto, mamá\", exclamó Katerina, señalando \"Una nube en pantalones\". \"Mayakovski organiza las letras como si fueran los escalones de una escalera. Leerlo es como subir. ¿No es fascinante?\". Marianne, absorta en los manuscritos de Pushkin en la vitrina contigua, suspiró: \"Sigo prefiriendo a poetas como Pushkin. Escucha «Al mar»: fluye con tanta suavidad, como música\".\n\n\"Ay, mamá, siempre dices lo mismo\", rió Katerina. \"No todos los poemas tienen que fluir como música. Mira: Mayakovski divide la palabra *rebelión* y la reorganiza. Toda la página parece cobrar vida. ¿No es hermoso a su manera?\" Marianne negó con la cabeza, aunque una sonrisa se dibujó en sus labios. \"Siempre te han atraído las cosas peculiares. Recuerdo que cuando eras pequeña, solo elegías los cuentos de hadas con las ilustraciones más raras\".\n\n\"Bueno, eso es porque el arte puede tomar muchas formas\", respondió Katerina, señalando otra vitrina. \"Mira, Mayakovski no solo era un poeta; también era un artista. Sus diseños de carteles son muy creativos\".\n\n\"Sigo pensando que Eugenio Oneguin de Pushkin es más conmovedor\", dijo Marianne. \"Al menos no tengo que hacerme un nudo en la garganta para entenderlo\". Katerina soltó una carcajada. \"¡Mamá, te estás pareciendo a la abuela! Pero, ¿sabías que Mayakovski también escribía poemas tiernos, solo que se expresan de una manera diferente?\"\n\n\"¿En serio?\" Marianne se acercó a la vitrina con interés. \"Entonces, léeme unas líneas\"."
 germany.272.a: "\"...seré impecablemente tierno...\""
 germany.273.t: "Ja, Genossen"
 germany.273.d: "Thomas Weigel estaba sentado en la tercera fila del parlamento, observando sus dedos; esos mismos dedos que, apenas un mes atrás, estaban cubiertos de grafitis de la calle. Ahora, estaban pulidos tras haber pasado horas hojeando montones de documentos oficiales. Tres horas antes, cuando un funcionario del Ministerio de Hacienda había comenzado a dar su cuarto comentario sobre la nueva política fiscal, sintió que sus párpados se volvían pesados. Esta no era la revolución que había imaginado. De vuelta en las barricadas, habían prometido cambiarlo todo, construir un mundo completamente nuevo. Pero allí estaban, funcionarios gubernamentales impecablemente vestidos, usando el lenguaje del pasado para hablar del futuro.\n\n\"En cuanto a la tercera propuesta\", dijo un diputado mayor con gafas de montura dorada, \"debemos considerar su impacto en el sistema actual...\". Para Thomas, la voz sonaba lejana, como un eco que resonaba a través del río del tiempo. Miró a sus antiguos compañeros de lucha. Karl Schmidt, el representante obrero que había liderado las ocupaciones de fábricas durante la revolución, ahora debatía sobre los procedimientos de adquisición de material de oficina. Anna Miller, que antes era una apasionada oradora en las calles, estudiaba con atención la cláusula 327 del código parlamentario.\n\n\"Camarada Weigel, ¿cuál es su opinión sobre este asunto?\" La voz del presidente lo trajo de vuelta a la realidad. Thomas parpadeó, mirando la gruesa pila de documentos que tenía frente a él, el denso texto burocrático que parecía flotar ante sus ojos.\n\n\"Sugiero...\", dijo con vacilación, con una voz que le sonaba inquietantemente ajena, \"que gestionemos este asunto según el procedimiento establecido\". Al pronunciar esas palabras, Thomas se dio cuenta de que acababa de decir algo que podría haber sido dicho en la época prerrevolucionaria. Al otro lado de la sala, los burócratas mayores asintieron con aprobación, mientras sus antiguos camaradas, aquellos que una vez habían luchado a su lado, seguían en silencio."
 germany.273.a: "Ese día, Thomas meditó un largo rato."
 germany.274.t: "La misma teoría"
 germany.274.d: "La sala de reuniones del ayuntamiento estaba impregnada de humo. El coronel Werner Schmidt golpeó con fuerza la vieja mesa de roble. \"Camaradas, esta ciudad es un microcosmos de la explotación capitalista. La riqueza de estos burgueses se ha construido a costa de oprimir a los trabajadores. ¡Apoderarse de sus propiedades es una inevitabilidad histórica! Esto se alinea perfectamente con la teoría de la acumulación primitiva de Marx\".\n\nFrente a él, el mayor Thomas Miller también hacía sonar sus dedos sobre la mesa. \"Camarada Schmidt, está interpretando mal el marxismo. El objetivo de la revolución es liberar a toda la humanidad, no perpetuar el ciclo de opresión. Si recurrimos a la violencia contra los civiles, ¿en qué nos diferenciamos de los fascistas?\".\n\n\"¡La diferencia es que nosotros representamos la justicia histórica!\", interrumpió el teniente coronel Klaus Becker, cerrando de golpe el ejemplar de El Capital que tenía sobre la mesa. \"Pero no olviden\", añadió el capitán Hans Reinhardt, \"Marx también dijo que la revolución proletaria busca establecer una sociedad sin opresión. Nuestras acciones actuales solo nos alejan más de ese objetivo\".\n\nAfuera, el estruendo de la artillería resonaba, pero nadie parecía prestarle atención. Werner lanzó un documento sobre la mesa. \"¡Miren estas cifras! La burguesía de este pueblo ha acumulado vastos recursos mientras los trabajadores viven en la pobreza. ¡Apoderarse de esta riqueza es la verdadera lucha de clases!\". \"Están usando el dogmatismo para justificar la barbarie\", dijo Thomas con calma. \"Un verdadero marxista debería entender que la revolución no es venganza, sino la creación de nuevas relaciones sociales\".\n\n\"¡Ja!\", rió Klaus con desdén. \"Su postura débil es el sello distintivo del revisionismo. La violencia es la partera de la historia. Lo que estamos haciendo es simplemente cumplir con la misión que la historia nos ha encomendado\"."
 germany.274.a: "Conclusiones opuestas."
 germany.275.t: "Wir sind des Geyers schwarzer Haufen"
 germany.275.d: "Somos guerreros, inquebrantables y firmes. No importa cómo nos vea el mundo, ni bajo qué gobierno -sean reinos, imperios o repúblicas-, nuestras tradiciones han permanecido intactas a lo largo de los siglos. Estas tradiciones, forjadas con sacrificio, se fortalecen aún más con la sangre de quienes nos precedieron. No deshonraremos a nuestros antepasados, cuyos sacrificios por la justicia y la verdad seguirán siendo una fuente de inspiración para las generaciones venideras.\n\nAhora, la lucha épica de nuestro tiempo se cierne sobre nosotros. Es tanto nuestro mayor temor como nuestra dura realidad. Una vez pensamos que los belicistas, sedientos de conquista y destrucción, habían sido saciados, que su sed de sangre se había apagado. Quizás creímos que sus heridas no habían sanado y que sus garras, una vez rotas, no habían vuelto a crecer. Pero nos equivocamos. Una nueva ola de violencia amenaza con arrasar el mundo civilizado, buscando destruir todo lo valioso, todo lo creado por quienes defienden la conciencia y la dignidad.\n\nNo necesitamos más discursos. La crisis que enfrentamos nos une a todos. Con voluntad de hierro, empuñamos nuestras espadas, listos para defendernos del caos. Iluminaremos la oscuridad con el fuego de la justicia, hasta que superemos la crisis y protejamos los logros más preciados de la humanidad.\n\nA los alemanes y a todos los europeos: ¡Marchen hacia el este! ¡Canten las canciones de guerra y avancen hacia la batalla final que decidirá nuestro destino!"
 germany.275.a: "Und wollen mit Tyrannen raufen,\nHeia ho ho!"
 germany.276.t: "La protesta final"
 germany.276.d: "Durante tres meses y cuatro días, Thomas Reiner deambuló por las calles. La mañana en que lo despidieron, se topó con un anuncio de trabajo en el periódico: su propia fábrica estaba buscando un nuevo ingeniero jefe. Los requisitos decían \"un entorno familiar adecuado\". Poco después, lo llamaron amablemente a Recursos Humanos. \"Entiende\", le dijeron, \"la situación actual exige... alguien más adecuado\". Más tarde, se enteró de que su puesto había sido ocupado por Otto von Steinfeld, el hijo del barón, que no sabía distinguir una llave inglesa de un destornillador.\n\nThomas paseaba por la plaza de la ciudad, con la vista fija en la enorme estatua de bronce que se estaba develando. Era una imagen recién fundida del káiser, que miraba con severidad a la plaza. Los obreros estaban desmontando el andamio, revelando la inscripción dorada en la base: \"La Gloria Imperial Perdurará\". En un bar de la esquina, Thomas pidió su última cerveza. Al salir, vio un camión de reparto estacionado junto a la acera, con las llaves aún puestas mientras el conductor descargaba.\n\nSin pensarlo dos veces, Thomas subió a la cabina, encendió el motor y giró el camión hacia el centro de la plaza. Al pisar el acelerador, recordó el orgullo que sintió la primera vez que entró en la fábrica. El camión rugió hacia adelante, acelerando. La multitud comenzó a dispersarse en pánico. La mirada de Thomas se mantuvo fija en el severo rostro de bronce. En sus últimos momentos, captó la luz del sol reflejándose en las letras doradas de la base de la estatua. Entonces, un estruendo ensordecedor resonó. La estatua se desplomó, su figura de bronce cayendo sobre la plaza de piedra. Thomas yacía en la cabina destrozada. Al perder la consciencia, pensó en el clamor rítmico de las máquinas de la fábrica..."
 germany.276.a: "El sonido más bello del mundo."
 germany.277.t: "El oficial de élite"
 germany.277.d: "El Teniente Maximilian von Bernstorf estaba en la sala de operaciones del cuartel general, observando un mapa repleto de marcas tácticas. El Coronel Werner Krauss lo miró con atención, ajustándose las gafas mientras evaluaba al joven oficial, que provenía de una antigua familia noble. \"Teniente\", dijo Krauss con una voz fría y sin emociones, \"analice esto para mí. Si el enemigo decidiera lanzar un cerco aquí\", señaló un punto en el mapa marcado con una flecha roja, \"¿cómo deberíamos responder?\".\n\nMaximilian sintió un nudo en la garganta. Miró la compleja red de símbolos tácticos. \"Podríamos... desplegar las unidades de manera separada\", balbuceó, \"permitiendo que cada grupo actúe de forma independiente\". Krauss levantó ligeramente las cejas. \"¿Y las líneas de suministro? ¿Cómo planea mantener el suministro para estas unidades en un despliegue disperso?\".\n\n\"¿Líneas de suministro?\", repitió Maximilian, como si fuera la primera vez que lo escuchaba. \"Quizás... podríamos usar aviones de transporte para lanzar suministros desde el aire\". La sala se llenó de un silencio helado. Krauss se quitó las gafas y comenzó a limpiarlas con meticulosidad. \"Dígame, teniente\", dijo lentamente, \"¿sabe cuántas toneladas de combustible y munición consume una división blindada en un solo día? ¿Cuántos aviones de transporte planea requisar para esta tarea?\" El sudor comenzó a brotar en la frente de Maximilian. Sabía que el coronel Krauss había adivinado todo: su carta de nombramiento aún llevaba la impronta de su tío, el barón que servía en el Ministerio de Defensa.\n\n\"Qué interesante\", dijo finalmente Krauss, con un tono que destilaba desdén. \"Su evaluación menciona «habilidades de mando ejemplares». Parece que el barón tiene una visión bastante creativa de lo que significa «ejemplar»\". Cerró la carpeta de golpe. \"Dígame, teniente, ¿realmente cree que la artillería enemiga cambiará su fuego solo porque vea el escudo de su familia?\""
 germany.277.a: "\"Supongo... quizás\"."
 germany.278.t: "La muerte del águila prusiana."
 germany.278.d: "La luz de la mañana brillaba de manera inusual mientras Hans Weber pulía el casco imperial con pinchos que había heredado de su abuelo. En un mundo donde los cascos tácticos modernos dominaban, él se aferraba con terquedad a esta reliquia de gloria. Los rayos del sol se reflejaban en la punta de latón que adornaba el casco, resplandeciendo como una estrella dorada.\n\nA cinco kilómetros de distancia, en un puesto de observación de la artillería rusa, Serguéi Ivanov miraba el campo de batalla con sus binoculares, como era su rutina. De repente, un destello de luz llamó su atención. Un soldado alemán estaba al borde de la trinchera, ajustándose el equipo. La punta de su casco brillaba bajo el sol, como un blanco perfecto.\n\n\"Interesante\", comentó Serguéi por la radio. \"Parece que alguien todavía guarda cariño por los días del viejo káiser Guillermo\". Transmitió las coordenadas. \"Esa punta reluciente... prácticamente está pidiendo ser alcanzada\".\n\nHans no tenía idea de que se había convertido en un blanco. Se quedó allí, reflexionando sobre las palabras de su abuelo: que este casco simbolizaba el honor y la tradición del imperio. Cuando el primer proyectil impactó, el destello dorado de la púa continuó brillando bajo el sol.\n\nCuando el polvo se asentó, lo único que quedó en la trinchera fue un casco con púas destrozado. Su adorno de latón seguía apuntando obstinadamente al cielo."
 germany.278.a: "Una mariposa se posó en la punta."
 germany.279.t: "La limpieza"
 germany.279.d: "August estaba completamente inmóvil, como si fuera un cadáver. El único sonido que llenaba el aire era el suave zumbido de los monitores, mientras sus compañeros operadores de drones acechaban a su presa. Podían estar a miles de kilómetros de distancia; uno merodeaba por el Cáucaso y otro hacía reconocimiento cerca de Kiev. Sin embargo, August sería el primero en notar cualquier cambio.\n\nCon la mirada fija en su monitor, la imagen borrosa de un suburbio ruso se movía y cambiaba sin rumbo: Khruschovka por aquí, un parque infantil por allá, tal vez los restos vacíos de un tanque. Se sentía terriblemente aburrido. Esta ciudad ni siquiera estaba cerca del frente, había sido abandonada después de que los bombarderos a reacción destruyeran la mayor parte de su industria. La tarea de August era simplemente eliminar a los rezagados.\n\nJusto después de mirar su reloj, uno apareció en su campo de visión.\n\nAcercándose con su dron, notó que más personas estaban saliendo de los escombros de un edificio. Uno de ellos llevaba uniforme, estaba casi seguro. Con entusiasmo, pilotó el dron, lanzándose sobre el pequeño grupo como una abeja primaveral sobre una flor. Uno levantó la vista, gritó y salió corriendo. August casi maldijo, pero sus compañeros parecían solo confundidos. Para cuando ellos lo vieron, ya era demasiado tarde. Lo último que August vio de ellos fue el rostro pixelado de una mujer.\n\nAugust miró fijamente el monitor en blanco mientras encendía el micrófono."
 germany.279.a: "Entidad hostil liquidada en la Zona 8."
 germany.280.t: "Plan del Este"
 germany.280.d: "\"En resumen, erradicar el desempleo debería ser una prioridad para nuestro gobierno. Para lograrlo, es fundamental asegurar la estabilidad tanto de las empresas como de los trabajadores, y hacer que cambiar de empleo sea un proceso más complicado. La «economía de pequeños trabajos» debe desaparecer en favor del trabajo industrial\".\n\nUno de los economistas principales del Reich continuó hablando de manera monótona. La mayoría de la audiencia lo había ignorado desde hacía tiempo, esperando con impaciencia su turno para intervenir.\n\"Gracias, Herr Muller, ha sido muy esclarecedor. ¡Herr Franz!\"\nUn hombre pequeño y con gafas (no era raro entre la multitud, pero las suyas eran especialmente grandes) se acercó al podio. Detrás de él, un mapa de Europa Oriental apareció en el proyector, mostrando los emplazamientos de varias minas, molinos, regiones agrícolas diferenciadas y ciudades industriales clave.\n\n\"Europa está más aislada ahora que en siglos. Las importaciones de África, Asia y, por supuesto, América han caído entre un 200, 300 e incluso un 400%. Desde que comenzó el conflicto en EE.UU., hemos tenido que revitalizar nuestros sectores industriales de la noche a la mañana y asegurar los pocos vínculos comerciales que nos quedan. No hace falta decir lo precaria que es nuestra situación.\n\n\"Es evidente que necesitamos un fácil acceso al petróleo, metales preciosos y productos agrícolas. La única forma de conseguirlo de manera fiable es expandiéndonos hacia el este. La Unión Soviética, como pueden ver, está llena de lo que necesitamos. Simplemente tenemos que apoderarnos y controlar esos lugares. Cualquier estado independiente que establezcamos debe tener su economía bajo nuestro control. No debemos perjudicar estos sectores, y es crucial que mantengamos las redes centralizadas soviéticas. La privatización de estos lugares debe ser un proceso lento y realizado de tal manera que evitemos el caos y el solapamiento administrativo\"."
 germany.280.a: "Y siguió..."
 germany.281.t: "\"¡Moscú arde y el pueblo se alegra!\""
 germany.281.d: "...gritó una anciana, entre vítores resonantes.\n\n\"¡Por un millón más!\"\nUn hombre borracho gritó, alzando un vaso de cerveza recién llenado. Sus amigos a su alrededor estaban igual de alegres. La multitud crecía cada vez más, a medida que más y más personas entraban al bar para ver la televisión. A esa hora, las noticias repetían sin cesar las imágenes de la bomba nuclear sobre Moscú. Los presentadores abucheaban y hacían bromas mientras las fotos de figuras del Gobierno ruso que se creía que no habían podido escapar de la explosión aparecían lentamente en la pantalla.\n\n\"¡La Plaza Roja hizo honor a su nombre hoy!\"\n\"¡Se dice que las agujas del Kremlin están en algún lugar de Ucrania!\"\n\nSe repartían vinos añejos y otras bebidas espirituosas gratuitamente. Un retrato de [GER.GetLeader] fue honrado con los de Bismarck y Hitler, y sus imágenes fueron saludadas al unísono. Se oía fuego celebratorio a lo lejos desde las barricadas, y algunos ya anunciaban sus planes de mirar los fuegos artificiales en el parque cercano. Afuera, algunos quemaban una bandera soviética, con queroseno y malas bebidas. Todos los presentes brindaron por la victoria inminente.\n\nPor toda la ciudad, los comerciantes blanqueaban las ventanas, pintando caricaturas de las ruinas de Moscú junto con \"descuentos por bombardeos\". Los administradores escolares escribieron avisos de despido para celebrar. Muchos jóvenes, que antes lo evitaban como a la peste, se presentaron tímidamente en las oficinas de reclutamiento."
 germany.281.a: "Un momento que todos recordarían con cariño."
 germany.282.t: "Entrevista a Frank Franz"
 germany.282.d: "\"Pero eso no es del todo cierto, la madera no tiene cualidades porosas\".\n\nLa reportera, una señora de más de 50 años, no dio tregua y reaccionó a las explicaciones de Franz sin exasperación visible, solo un ligero aburrimiento que ocultaba un profundo asco.\n\n\"Eran endebles, señora; apenas podían describirse como puertas, y mucho menos como barreras suficientes para permitir la acumulación de gases nocivos. En fin, eso no viene al caso; lo que digo es que no tenemos planes de construir centros de despiojado de ese tipo...\"\n\"¿No considera los campos de concentración como tales centros?\"\n\n\"No, señora. Fueron cárceles. No pretendemos liquidar al azar a grandes sectores de la población; ese no era el objetivo de nuestros antepasados, y tampoco es el nuestro. Lo que haremos, en cambio, es fomentar iniciativas de remigración, así como simples pruebas de lealtad política, para garantizar la corrección en nuestra comunidad no alemana...\"\nFranz se esforzó por encontrar la palabra adecuada. Los ojos de la mujer se iluminaron y se abalanzó.\n\n\"¿Quien sería un no alemán?\"\n\"Es decir, bueno, es complicado. Los no europeos de todo tipo, ya sean de ascendencia árabe o india, sin duda nunca podrán asimilarse. Eso está comprobado. Pero también hay ciertos elementos del subgrupo sionista que tampoco están dispuestos a expresar opiniones patrióticas sinceras\".\nGuardó silencio un momento. Franz sonrió con suficiencia y continuó."
 germany.282.a: "\"Ahora, al tema del bolchevismo...\""
 germany.283.t: "El juramento hipocrático"
 germany.283.d: "El Dr. Karl Schmidt se sentaba en su clínica, opulentamente decorada, con la luz del sol reflejándose en sus gafas de montura dorada a través de las elegantes ventanas tintadas. Presentaba un informe financiero meticulosamente elaborado a la familia Reinhardt. \"Según nuestro último modelo de coste-eficiencia\", dijo, mostrando una tabla de datos, \"el gasto anual para el tratamiento de la depresión grave ronda los 86.400 euros. En cambio, nuestro Servicio de Interrupción Humanitaria tiene un coste único de tan solo 12.999 euros, ahora con un descuento del 15% por vacaciones\".\n\n\"Pero es mi esposa\", murmuró Reinhardt. En su silla de ruedas, Maria miraba con la mirada perdida el neón que parpadeaba en la ventana: \"Libertad de Elección, Dignidad en la Vida\".\n\n\"Es precisamente desde la perspectiva de la responsabilidad familiar\", dijo el Dr. Schmidt, ajustándose las gafas, \"que debemos tomar decisiones racionales. Piense en esto: estos gastos médicos podrían reasignarse al fondo de educación de su hija o invertirse en un plan de jubilación de alto rendimiento. En este mercado tan liberalizado, ¿no es prolongar el sufrimiento un desperdicio de recursos?\"\n\nAbrió un folleto dorado. \"Ofrecemos tres paquetes. El Plan Básico incluye cuidados paliativos estándar. El Plan Business añade habitaciones privadas y asesoramiento psicológico. El Plan Platino ofrece servicio VIP y una ceremonia funeraria de lujo. También aceptamos pagos a plazos, con una tasa de interés anual de tan solo el 4,99%. Permitir que cada persona elija libremente el final de su vida: ¿no es esto la personificación del humanitarismo?\""
 germany.283.a: "\"Si el juramento cumpliere íntegro, viva yo feliz y recoja los frutos de mi arte...\""
 germany.284.t: "Sin novedad en el frente"
 germany.284.d: "Jürgen Schneider y sus camaradas tiraron a un lado los fusiles con el logo de su contratista militar privado. Sus uniformes aún conservaban las manchas de los talones de pago del día anterior, con deducciones por \"ineficiencias durante las operaciones de combate\". \"¡Nos rendimos!\", gritó Jürgen en un ruso vacilante al salir de la trinchera. \"No lucharemos más por esos cabrones que nos descuentan el salario\". Al otro lado del campo, el teniente ruso Artiom Alekséyevich Chyornyj bajó el fusil e indicó a sus hombres que no dispararan. Podía ver el alivio en los rostros de los soldados europeos.\n\nMientras Jürgen conducía a su escuadrón hacia las líneas rusas, el cielo permanecía despejado. Los dos grupos permanecían de pie en el suelo marcado por los proyectiles, intentando comunicarse torpemente mediante gestos o aplicaciones de traducción en sus teléfonos. Un soldado ruso les ofreció un paquete de cigarrillos. Jürgen extendió la mano para coger uno, pero un extraño zumbido interrumpió el momento.\n\n\"¡Dron!\", gritó alguien. Pero para cuando alzaron la vista, ya era demasiado tarde. A las máquinas de guerra controladas por IA no les importaban los gestos de rendición ni los cigarrillos compartidos. Solo ejecutaban las órdenes codificadas en sus sistemas.\n\nEl informe de batalla del día siguiente contenía una sola línea: \"Pelotón enemigo neutralizado mediante ataque de precisión\". No se mencionaban los recibos de sueldo abandonados en el campo de batalla ni los cigarrillos que nunca cambiaron de manos."
 germany.284.a: "¿A quién le importaría?"
 germany.285.t: "Evaluación de la Seguridad Social"
 germany.285.d: "SERVICIO DE SEGURIDAD INTERNA DE EUROPA\nEVALUACIÓN TRIMESTRAL DE ESTABILIDAD SOCIAL\nNIVEL DE CLASIFICACIÓN: 5\nREF: SSA/Q3\nASUNTO: Creciente preocupación por la cohesión social.\n\nRESUMEN: A pesar de los planes del consejo, el proyecto para aumentar la cohesión social y mejorar la felicidad de los ciudadanos europeos ha fracasado, principalmente tras una investigación reciente de un comité interno del S.S.I.E., que revela que los indicadores de estabilidad social han alcanzado sus niveles más bajos desde la preunificación.\n\nINCIDENTE 8193-B: El sujeto Dominique Jeannin (23 años, hombre) presentó síntomas graves de zoocosis, lo que le llevó a conducir un camión hacia la calle Mouffetard, causando la muerte de 19 civiles. Las protestas contra la supuesta inseguridad de los civiles europeos alcanzaron a miles de personas en toda Francia.\n\nLas protestas contra la supuesta influencia corporativa en el Gobierno han aumentado un 60% desde el reciente escándalo de corrupción de Shell. En Berlín se han visto pancartas con la leyenda \"MUERTE A LAS CORPORACIONES\". Las protestas han generado gran preocupación entre nuestros representantes corporativos, como el de Siemens, que exigen más medidas contra la ciudadanía.\n\nEn conclusión, el S.S.I.E. recomienda encarecidamente medidas más contundentes contra la ciudadanía. Algunas de las propuestas del comité incluyen una mayor vigilancia en las ciudades, una mayor verificación de datos de los elementos antimunicipales y medidas más estrictas de control de multitudes."
 germany.285.a: "Fue archivada rápidamente."
 germany.286.t: "Dacha"
 germany.286.d: "Un hombre murmuraba para sí mismo dentro de una dacha. Aunque la luz fuera estaba oscura, se limitó a mirar con aire sombrío hacia el atardecer; allí descubrió que no tenía ningún amigo.\n\nLos encontró bailando afuera, hundiendo sus botas en la tierra; los encontró adentro, fisgoneando en nichos de la pared con figuras de santos pintadas con colores brillantes y un pequeño retrato de un rey.\n\nAl hablar con el hombre por primera vez, su sonrisa aduladora, su cabello rubio y sus ojos azules llevaron a uno de la tropa a decir: \"Wir sind nicht mehr eure Freunde. Wir sind eure Befreier\". El hombre no entendía.\n\nLas llamas invadieron la casa y las tropas siguieron bailando, fugitivas de algún gran incendio en los confines de Europa. Solo ellos se movían por la vasta inercia, solo ellos estaban vivos, y buscaban otras cosas vivas para devorarlas y seguir viviendo."
 germany.286.a: "Volvimos."
 germany.287.t: "Informe desde Polonia"
 germany.287.d: "SERVICIO DE SEGURIDAD INTERNA DE EUROPA\nEVALUACIÓN TRIMESTRAL DE LA ESTABILIDAD SOCIAL\nNIVEL DE CLASIFICACIÓN: 5\nREF: SSA/Q3\nASUNTO: Aumento repentino de la inestabilidad social en Polonia.\n\nRESUMEN: Nuestra reciente entrada en Polonia y el desmantelamiento de las instituciones y empresas nacionales polacas, así como su posterior sustitución por corporaciones europeas, se han llevado a cabo de forma rápida, pero extremadamente descoordinada e imprudente. Nuestras fuerzas de seguridad, sobrecargadas, no han podido controlar la situación en la mayoría de las zonas, lo que ha provocado la formación de un vacío de poder en su seno, lo que ha provocado un drástico aumento de la delincuencia. Supuestamente, las filiales corporativas locales están utilizando esto para librar una competencia brutal e ilegal con sus rivales.\n\nUna de las historias más extendidas, aunque no confirmada por nuestros agentes, es que algunos de ellos están contratando mercenarios con implantes cibernéticos para eliminar a sus rivales. Algunas de las pistas más notables y casos de sabotaje industrial y asesinatos conducen a una joven de cabello canoso de entre 20 y 25 años. Las investigaciones están en curso.\n\nEn conclusión, el S.S.I.E., así como otras fuerzas de seguridad, necesitan refuerzos inmediatos para gestionar la situación, incluyendo blindados pesados y aeronaves, para asegurar objetivos estratégicamente importantes. La situación polaca, que se está descontrolando, podría provocar una crisis con las fuerzas limítrofes de la OTSC e incluso la pérdida total de nuestro control sobre el oeste de Polonia."
 germany.287.a: "¡Menuda peripecia!"

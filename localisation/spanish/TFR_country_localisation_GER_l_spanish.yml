 proxy.1.t: "Cuestión del caos en Arabia"
 proxy.1.d: "El caos en Arabia hizo que nuestro propio liderazgo cuestionara la posibilidad de involucrarse en la región, pero primero tenemos que decidir a qué bando apoyaremos en la guerra civil.\n\nLa opción obvia y más legítima sería enviar apoyo al Gobierno de Riad, ya que tenemos conexiones de larga data con Mohamed bin Salmán.\n\nPor otro lado, podemos apoyar a nuestros aliados iraníes enviando ayuda a su propio representante en el país. Aunque arriesgado, este movimiento podría ser beneficioso para nuestra futura diplomacia con Irán."
 proxy.1.a: "Apoyaremos a bin Salmán."
 proxy.1.b: "Apoyaremos a Hezbolá."

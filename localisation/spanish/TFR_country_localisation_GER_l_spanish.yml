 GER_improve_asian_position_tt: "§GEsto mejorará nuestra posición futura en el Extremo Oriente.§!"
 GER_war_with_china_tt: "§REsto llevará a la guerra con China cuando invadamos Rusia.§!"
 germany.334.t: "Invitación a la OTAN"
 germany.334.d: "El nuevo líder de la Unión Europea, Günther Fehlinger, nos envió un comunicado invitando a todos los países de la OTDP a unirse a la OTAN para un esfuerzo bélico conjunto contra Rusia y China. Afirmó: \"Llamo a Japón y a otros países de la OTDP a unirse a la OTAN para que juntos podamos lograr Ex-China y Ex-Rusia\".\n\nAunque es evidente que tendríamos que ampliar aún más nuestras fuerzas para afrontar el frente norte, la UE nos ha prometido una asistencia considerable, que podría ser crucial para derrotar a Pekín.\n\n¿Cómo deberíamos responder?"
 germany.334.a: "¡Juntos, derrotaremos a China y Rusia!"
 germany.334.b: "Bueno... no..."
 germany.335.t: "La OTDP acepta"
 germany.335.d: "Japón ha acordado fusionar la OTAN y la OTDP, lo que significa que, una vez que iniciemos la guerra contra la OTSC, ¡recibirán un ataque sorpresa desde el este! Sin embargo, también debemos preparar nuestra armada para ayudar a nuestros nuevos aliados en el Pacífico."
 germany.335.a: "¡Genial!"
 germany.336.t: "La OTDP se niega"
 germany.336.d: "Aunque los beneficios superan con creces el coste, Japón se ha negado a profundizar la cooperación entre la OTAN y la OTDP, alegando que apenas dispone de fuerzas suficientes para derrotar a IDEA y que no está interesado en abrir otro frente contra Rusia. Sin embargo, esto significa que podemos concentrar plenamente nuestras fuerzas en desmantelar la OTSC."
 germany.336.a: "Mal para ellos."

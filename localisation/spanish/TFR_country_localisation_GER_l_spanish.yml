 BAY_disgusted_democracy_idea: "Democracia disgustada"
 BAY_disgusted_democracy_idea_desc: "Una vez creímos que Alemania era demasiado estable para caer de nuevo en la tiranía... Nos equivocamos.\n\nCon nuestra independencia, Baviera ha demostrado al mundo que los locos de Berlín, ávidos de poder y gloria, no representan al pueblo bávaro."
 BAY_legacy_of_strauss_idea: "Legado de Strauss"
 BAY_legacy_of_strauss_idea_desc: "Franz Josef Strauss fue presidente de la Unión Social Cristiana de Baviera durante mucho tiempo, de 1961 a 1988, y en los últimos meses ha sido una figura clave contra el autoritarismo, tanto para los separatistas bávaros como para los conservadores alemanes."
 BAY_bavarian_identity_idea: "Identidad bávara"
 BAY_bavarian_identity_idea_desc: "El estilo de vida bávaro suele considerarse completamente alemán, mientras que elementos típicos como los tradicionales Lederhosen y los Dirndl, los idílicos paisajes montañosos con cuernos alpinos y la cerveza en jarras de un litro son de origen mayoritariamente bávaro.\n\nSe dice que los habitantes de Baviera son encantadores, orgullosos, seguros de sí mismos y, por lo general, sociables, aunque a veces testarudos. Quejarse es parte de la vida cotidiana. Sin embargo, aunque quizás se quejen de sus propios problemas, los bávaros adoptan un lema liberal: \"vivir y dejar vivir\".\n\nEl exjefe de Estado alemán, Roman Herzog, calificó a Baviera como la tierra de las \"laptops y los lederhosen\". Si bien los portátiles ya no representan los logros tecnológicos de vanguardia de nuestros días, la lógica subyacente sigue vigente: Baviera es una región que valora sus orígenes, pero al mismo tiempo abraza abiertamente el futuro."
 BAY_scatterbrained_economy_idea: "Economía desorganizada"
 BAY_scatterbrained_economy_idea_desc: "Que seamos independientes no significa que nuestra economía sea mágicamente mejor. La mala gestión alemana antes, durante y después de la guerra contra Rusia ha llevado nuestra economía a la ruina, y será necesario mucho trabajo para arreglarla."

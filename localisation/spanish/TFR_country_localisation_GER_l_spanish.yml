 germany.82.t: "Belgica vota por unirse a la UE"
 germany.82.d: ""
 germany.82.a: "¡Excelentes noticias!"
 germany.83.t: "Promulgación de la Unión Europea"
 germany.83.d: "Hoy es un día sin igual.\n\nLa Unión Europea, marco de hermandad, cooperación y unidad entre las naciones de este gran continente, finalmente está lista para ascender. Tras décadas de trabajo y ardua lucha contra las corrientes de la historia, la Unión finalmente ha triunfado.\n\nYa no nos limitaremos a la condición de una falsa federación. Nuestro verdadero propósito ahora está claro: nuestro destino está al alcance. No es una alianza informal de naciones, ni un coro de voces colectivas; es un superestado férreo que se extiende desde Lisboa hasta Riga, con una sola voz. Una voluntad singular.\n\nHoy es el día en que la Unión Europea asciende hacia lo que está destinada a ser. Hoy marcará el comienzo..."
 germany.83.a: "...de un siglo europeo."
 germany.84.t: "Francia vota por unirse a la UE"
 germany.84.d: "En un momento histórico, el pueblo francés ha decidido unirse a la Unión Europea. Desde la época de Carlomagno, nuestro pueblo no había estado unido bajo una misma bandera, y los últimos nueve siglos han estado llenos de luchas entre nuestros dos países. Esta es una ocasión trascendental que se ha celebrado como tal en ambas naciones.\n\nSin embargo, la importancia de esta unificación no es solo simbólica. Francia cuenta con uno de los ejércitos más grandes de Europa, y su unificación aportará una gran potencia de fuego a nuestras fuerzas armadas. Además, su importante influencia en África Occidental nos permitirá combatir a los rusos en la región. Sin duda, este es un duro golpe a la amenaza oriental y un paso más cerca de nuestro enfrentamiento final con ellos."
 germany.84.a: "¡Excelentes noticias!"
 germany.85.t: "Italia vota por unirse a la UE"
 germany.85.d: "Italia tiene un historial de euroescepticismo que nos hacía temer que gastar recursos en convencerla de unirse a la UE fuera una causa perdida, pero al final nuestra apuesta dio sus frutos. La votación fue mucho más reñida en Italia que en las demás naciones con las que nos hemos unido recientemente, pero aun así los pro-unionistas ganaron por un margen considerable.\n\nLa admisión de Italia a la Unión Europea ha traído consigo una serie de beneficios. En concreto, nos ofrece más puertos de aguas cálidas y acceso al estrecho de Mesina. Ahora podemos garantizar que los rusos que viajan por el Mediterráneo paguen lo que les corresponde. Italia también cuenta con un gran mercado automovilístico y varios grandes fabricantes de automóviles, lo que nos permite ampliar nuestro monopolio en el mercado."
 germany.85.a: "¡Excelentes noticias!"

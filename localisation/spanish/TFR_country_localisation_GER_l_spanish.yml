 germany.164.t: "Casos de COVID-19 en disminución"
 germany.164.d: "Alemania está experimentando una disminución significativa de casos y hospitalizaciones por COVID-19 tras meses de esfuerzo. Las campañas de vacunación y las medidas de salud pública han sido cruciales para contener el virus.\n\nLas autoridades instan a mantener la cautela para garantizar que el progreso no se revierta, pero por ahora, el país da un paso más hacia la normalidad."
 germany.164.a: "Las cosas mejoran."
 germany.165.t: "China acepta el acuerdo Wagenknecht"
 germany.165.d: "Sahra Wagenknecht presentó una propuesta a Pekín; era ambiciosa, pero el Reino Medio ha entrado en juego hoy. Cuando Alemania propuso la partición de Rusia, los chinos casi no creyeron a nuestro diplomático, pero nosotros fuimos muy serios. Y luego se pusieron serios. Desempolvando viejos mapas de tierras que habrían visto colonizadas en caso de una guerra sino-soviética, estos planes debieron de haber sido elaborados en la época de Mao.\n\nLa delegación china se mostró conforme y el propio presidente consideró que las condiciones eran beneficiosas para China. El control de las vastas tierras siberianas resolvería su superpoblación urbana y, en cierta medida, también resolvería el problema del agua dulce al concederles el lago Baikal. Las dos delegaciones se separaron con un apretón de manos, y los primeros debates en China giraron en torno a si intervenir directamente contra Rusia o centrarse en el peligro asiático más inmediato. Les hemos asegurado a los chinos que podemos encargarnos de aplastar al oso. Parecen complacidos con nuestra confianza."
 germany.165.a: "¡Los fascistas serán barridos de la tierra!"
 germany.166.t: "China rechaza el acuerdo Wagenknecht"
 germany.166.d: "La República Popular China agradeció a la RDA su continuo compromiso con la \"paz y el desarrollo socialista en Europa\" y expresó su esperanza de que Alemania \"buscara soluciones equilibradas a los desafíos de seguridad intercontinentales\". En ningún momento se mencionó la palabra «Rusia», ni se reconocieron explícitamente los planes de guerra.\n\nLa nota llegó sin urgencia ni demora. Sin delegación, sin discurso televisado, solo un simple comunicado enviado de Pekín a Berlín. Iba dirigido a la propia Wagenknecht. El contenido era breve, casi insultante.\n\nWagenknecht leyó la carta dos veces. Luego una tercera. Sus asesores esperaron, en silencio.\n\nPor supuesto que dijeron que no. Por supuesto que no arriesgarían el petróleo, los cereales ni el comercio por el bien de aliados lejanos. La misma China que construyó su revolución con sangre ahora protegía su PIB con el silencio. A pesar de todos sus lemas y estatuas, la nueva China era capitalista de corazón, pensó.\n\nAsí que no habría Frente del Pacífico. Ninguna presión desde Oriente. Sólo Alemania, sola, enfrentándose al mismo imperio que la había enterrado una vez antes."
 germany.166.a: "¡Malditos revisionistas!"
 germany.167.t: "Los juicios de Karlsruhe"
 germany.167.d: "¿Qué hicieron nuestros representantes cuando el gigante del Este lanzó su ataque contra Europa?\nNo lo suficiente.\n\n¿Qué hicieron cuando el fascismo volvió a afianzarse en el mundo?\nNo lo suficiente.\n\nEl imperialismo ha devastado nuestra tierra, ha explotado nuestro medio ambiente sin pensar en el futuro, ha permitido que el fascismo florezca y ha arruinado generaciones con la esclavitud económica. Muchos se culpan entre sí; normalmente, todos tendrían algo de responsabilidad, pero no aquí, no ahora. Nuestros hijos no tuvieron más opción que dar su vida, morir por una farsa que se llama democracia, un sacrificio inútil ante la línea roja. Aquellos que se quedaron en casa también sufrieron: nuestra comida escaseó, nuestros salarios se redujeron, nuestra forma de vida se convirtió en una marioneta, en una patética máquina de guerra.\n\nYa basta.\nHoy en Karlsruhe, muchos políticos que intentaron aferrarse desesperadamente al statu quo han sido juzgados por crímenes contra la humanidad y el medio ambiente. Se pudrirán en prisión, así como permitieron que nuestros hijos e hijas se pudrieran en los campos de batalla.\nQueda un largo camino por recorrer para corregir sus errores, pero con el país en buenas manos, reconstruiremos, prosperaremos y erradicaremos el fascismo en todo el mundo."
 germany.167.a: "La hoz se afila."
 germany.168.t: "Educación en la Nueva Alemania"
 germany.168.d: "Tras haber reclamado la nación, tenemos la tarea de revertir la autoflagelación de nuestro pueblo.\n\nDurante años, nos enseñaron a sentir vergüenza por nuestro pasado y a rechazar nuestra identidad, cambiando nuestra bandera por una mezcla de colores repugnante. Ahora, estamos en el proceso de transformar nuestra educación.\n\nEl orgullo por uno mismo y su nación es algo que debemos cultivar. Durante demasiado tiempo, las escuelas han propagado una propaganda autodestructiva. Cualquier material que promueva comportamientos que dañen nuestra identidad nacional será prohibido, y en su lugar, se reintroducirá contenido que celebre nuestra historia, patrimonio y nación, para que las futuras generaciones puedan volver a ver a su país con amor y orgullo.\n\nSin embargo, hay un dilema en esto: todos somos conscientes de lo que fue nuestra nación durante la Segunda Guerra Mundial. Hemos hecho cosas de las que no todos nos sentimos orgullosos, y entre nuestros líderes ha habido un acalorado debate sobre si deberíamos alentar a la gente a sentirse orgullosa de ese período.\n\nAlgunos argumentan que la Alemania nacionalsocialista no es la misma Alemania de hoy, y que sería más apropiado centrar nuestro orgullo en sus victorias militares. Por otro lado, hay quienes desean reconocer plenamente los logros de los nacionalsocialistas, aunque prefieren no hablar de sus actos más atroces.\n\nEste no es el tema más candente, ya que todos coincidimos en que la educación alemana necesita una transformación radical, pero sí influirá en cómo nuestros hijos verán nuestro pasado, presente y futuro, moldeando así a las generaciones venideras."
 germany.168.a: "Estamos criando una generación de patriotas. Que no se sientan avergonzados de su historia."
 germany.168.b: "Que nuestros hijos estén orgullosos de todo lo que nuestra nación ha logrado."

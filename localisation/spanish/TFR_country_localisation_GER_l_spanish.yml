 GER_eurail_idea: "Eurail"
 GER_eurail_idea_desc: "Europa siempre se ha enorgullecido de contar con un buen transporte público, una percepción compartida por naciones de todo el mundo. Con esta reputación como base, se ha llevado a cabo una enorme iniciativa de modernización y mejora del sistema de transporte ferroviario de la Unión. Se han inaugurado nuevas líneas, se han modernizado vagones y servicios antiguos, se han implementado nuevas tecnologías, se han invertido millones de dólares y se han asignado miles de trabajadores; se podría decir que es la mayor expansión del ferrocarril en la historia reciente. Pero ahora que las modernizaciones se han completado, podemos esperar que el transporte ferroviario de la UE se encuentre entre los mejores, o incluso el mejor, del mundo."

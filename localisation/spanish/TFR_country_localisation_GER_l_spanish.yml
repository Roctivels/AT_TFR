 GER_into_post_capitalism_dynamic_desc: "La revolución ha logrado sus objetivos iniciales de desmantelar la amenaza capitalista burguesa inmediata, pero ahora la llevamos más lejos. Estamos llevando a Alemania a una etapa de desarrollo verdaderamente poscapitalista. Las revoluciones socialistas del pasado tuvieron el lamentable problema de que aún persistían elementos capitalistas en la sociedad, algo que nos esforzamos por eliminar rápidamente. La empresa privada, la especulación, el miserable afán de lucro, los mercados \"libres\"; estos elementos capitalistas ocultos, pero aún perceptibles, se desvanecen día a día gracias a nuestros intensos esfuerzos por remodelar la economía nacional. Pronto, la gente relegará lo vivido bajo el capitalismo a un recuerdo cada vez más lejano."
 GER_centralized_planning2_idea_desc: "Con la caída del sistema político burgués, también llega la caída de la miserable y pútrida economía capitalista. En su lugar, se encuentra nuestro propio modelo de economía de planificación centralizada, conforme a la doctrina socialista. La inversión, la asignación de bienes de capital y la producción estarán bajo la organización y dirección del Gobierno, y por buenas razones. El pueblo y nuestra nación ya no estarán sujetos a la anarquía económica y la codicia de los capitalistas y sus empresas. Los recursos, la gente y el trabajo de Alemania ya no se desperdiciarán en beneficio personal de los empresarios. Ahora, cada segmento de la economía será cuidadosamente gestionado y planificado para maximizar nuestros esfuerzos por construir el socialismo. Dependiendo de cómo gestionemos esto, se producirá una transición rápida y drástica hacia una economía verdaderamente socialista o un estado de desastre absoluto."

 germany.200.t: "Finlandia se une a la OTAN"
 germany.200.d: "Finlandia se ha unido oficialmente a la OTAN, consolidando un cambio monumental en la política de defensa del país. El primer ministro finlandés declaró que la medida era esencial para la seguridad de Finlandia en medio de las crecientes tensiones en Europa, especialmente a lo largo de su frontera de 1.300 kilómetros con Rusia. La decisión rompe con la larga tradición de neutralidad de Finlandia, posicionándola como un actor clave en la estrategia de defensa del norte de la alianza.\n\nSe espera que el ejército altamente capacitado de Finlandia, junto con su profundo conocimiento de las operaciones en el Ártico, sea un activo significativo a medida que la OTAN refuerza su presencia en la región."
 germany.200.a: "¡Persistiremos!"
 germany.201.t: "Suecia se une a la OTAN"
 germany.201.d: "Alemania ha acogido con satisfacción la adhesión oficial de Suecia a la OTAN, lo que supone un hito importante para la seguridad europea y el fin de más de dos siglos de neutralidad sueca. El Canciller elogió la medida y afirmó que la adhesión de Suecia fortalece las defensas del norte de la alianza y consolida la unidad europea frente a las crecientes amenazas externas.\n\nCon la incorporación de Suecia a la OTAN, Alemania espera una cooperación militar más estrecha y una mayor seguridad en la región del Báltico. La decisión llega en un momento crítico, ya que Europa se enfrenta a una presión cada vez mayor en sus fronteras orientales."
 germany.201.a: "¡Persistiremos!"
 germany.202.t: "La cumbre de Finlandia fracasa"
 germany.202.d: "Las conversaciones entre Finlandia y la OTAN han fracasado, y la muy esperada cumbre concluyó sin la entrada de Finlandia en la alianza militar. A pesar de meses de discusiones y tensiones crecientes en Europa, el Gobierno finlandés y los representantes de la OTAN no pudieron llegar a un consenso sobre cuestiones clave de seguridad. Finlandia expresó su preocupación por la pérdida de autonomía estratégica, mientras que la OTAN buscaba compromisos más firmes de la nación nórdica.\n\nEl fracaso de la cumbre plantea interrogantes sobre la futura postura de defensa de Finlandia, dejando en el limbo su posible membresía en la OTAN y poniendo en peligro también nuestra estrategia militar en Escandinavia."
 germany.202.a: "¡Persistiremos!"
 germany.203.t: "La cumbre de Suecia fracasa"
 germany.203.d: "La cumbre de la OTAN en Suecia ha terminado en fracaso, lo que deja sin resolver la adhesión de Suecia a la alianza. Tras meses de negociaciones y tensiones agudizadas en toda Europa, el Gobierno sueco y los representantes de la OTAN no lograron llegar a un acuerdo sobre cuestiones esenciales de seguridad. Suecia expresó su preocupación por la posibilidad de complicar su autonomía estratégica, mientras que la OTAN insistió en compromisos militares más sustanciales.\n\nEste fracaso plantea interrogantes críticos sobre la estrategia de defensa de Suecia en el futuro, y pone en duda su posible adhesión a la OTAN en medio de una creciente inestabilidad regional, lo que nos obliga a reevaluar nuestras políticas de defensa a lo largo del flanco norte de Europa y el mar Báltico en un entorno cada vez más inestable."
 germany.203.a: "¡Persistiremos!"
 germany.204.t: "Establecimiento de ciudad lineal"
 germany.204.d: ""
 germany.204.a: "¡Una maravilla de la nueva década!"
 germany.205.t: "INFORME DE PRIMERA LINEA: [GetDateText]"
 germany.205.d: "DE: GENERAL MAYOR ANDREAS MARLOW\n\nSeñores, para resumir la situación, estamos en la mierda. Ayer los rusos rompieron las defensas italianas cerca de Stary Kostrzynek y están merodeando detrás de nuestras líneas. También me han informado de que nuestras líneas en el sur, cerca de Cottbus, han sido destrozadas. Sin duda, intentarán cerrar el cerco al final del día. Si lo logran, estaremos rodeados, aislados y jodidos."
 germany.205.a: "¡Persistiremos!"
 germany.206.t: "Proyecto de eliminación nuclear"
 germany.206.d: "Con la profundización de la crisis energética, la decisión de Alemania de eliminar gradualmente la energía nuclear ha sido objeto de un escrutinio cada vez mayor. Inicialmente visto como un paso audaz hacia la energía renovable y la sostenibilidad ambiental, el proyecto ahora enfrenta serios desafíos. El aumento de los costos de la electricidad, la creciente dependencia de la energía importada y la lenta implementación de alternativas renovables han provocado un debate público. Los críticos argumentan que el cierre de las plantas nucleares ha dejado a Alemania vulnerable, mientras que los defensores del medio ambiente se mantienen firmes e insisten en que los beneficios a largo plazo de un futuro sin energía nuclear superan los reveses a corto plazo.\n\nLa posición del Gobierno es cada vez más precaria. Si bien todavía existe un fuerte apoyo público a las políticas ecológicas, las preocupaciones sobre la seguridad energética y la tensión económica están aumentando. La presión del sector empresarial y los aliados extranjeros está complicando aún más la cuestión, ya que algunos piden una suspensión temporal de los cierres para estabilizar la red. Alemania ahora enfrenta una decisión crítica: seguir adelante con la eliminación gradual de la energía nuclear y arriesgarse a una escasez de energía, o retrasar el proyecto para garantizar la estabilidad de la nación en estos tiempos inciertos."
 germany.206.a: "¡Debemos eliminar estas trampas mortales!"
 germany.207.t: "Un camino hacia la paz"
 germany.207.d: "En una maniobra diplomática inesperada, Alemania se ha acercado a Moscú con una oferta de un acuerdo comercial exclusivo. Este acuerdo, centrado en tecnología y maquinaria alemanas vitales a cambio de recursos energéticos rusos, tiene el potencial de cambiar significativamente la dinámica económica entre ambas naciones. Con las sanciones occidentales aún amenazando la economía rusa, dicho acuerdo podría proporcionar un salvavidas muy necesario, asegurando un flujo constante de bienes e inversiones alemanes. Sin embargo, aceptar la oferta podría profundizar la dependencia de Rusia de los mercados europeos, algo que ha suscitado preocupación entre los sectores más radicales del Kremlin, que buscan una estrategia más diversificada para el futuro.\n\nLa propuesta llega en un momento de tensas relaciones entre Rusia y Occidente, y esta apertura de Berlín se está viendo con cautela. Por un lado, los beneficios económicos son evidentes: una asociación con Alemania podría estabilizar industrias clave y mitigar los efectos de las sanciones vigentes. Por otro lado, se sospecha que Alemania está aprovechando la oportunidad para ejercer influencia sobre los asuntos internos y las políticas económicas rusas. Moscú se encuentra ahora en una encrucijada..."
 germany.207.a: "Esto nos beneficiará a ambos."
 germany.207.b: "¡Qué ridículo!"
 germany.208.t: "AfD apoya a Max Otte para la presidencia"
 germany.208.d: "El partido Alternativa para Alemania ha dado su apoyo oficial a Max Otte como candidato a la presidencia, lo que marca un momento significativo en la política alemana. Otte, un economista conservador con un historial de declaraciones y afiliaciones controvertidas, ha sido considerado durante mucho tiempo como una figura capaz de tender puentes entre la derecha convencional y la ultraderecha. Su nominación por parte de la AfD indica el deseo del partido de presentar un candidato con credibilidad intelectual y experiencia económica, con la esperanza de ampliar su atractivo más allá de su base populista. Sin embargo, los vínculos previos de Otte con la CDU y su postura sobre cuestiones clave han suscitado debates dentro del partido, y algunos miembros se preguntan si realmente representa los valores fundamentales de la AfD.\n\nEste apoyo ya está causando revuelo en el panorama político de Alemania. Se espera que la candidatura de Otte intensifique la polarización dentro del país, ya que las facciones políticas establecidas de izquierda y centroderecha denuncian la decisión de la AfD. Sin embargo, para la AfD se trata de una apuesta calculada: una oportunidad de legitimar su movimiento ante los ojos de unos votantes que, de otro modo, podrían rechazar su retórica populista. Alemania espera ahora la próxima carrera presidencial, sabiendo que la candidatura de Otte podría redefinir el futuro político de la nación."
 germany.208.a: "Nunca ganarán."
 germany.208.b: "¡Max Otte salvará a Alemania!"
 germany.209.t: "Elecciones presidenciales de 2022"
 germany.209.d: "Las elecciones presidenciales alemanas de 2022 se han convertido en un momento crucial en el panorama político del país, con tres candidatos con visiones de futuro marcadamente contrastantes. El actual presidente, Frank-Walter Steinmeier, busca la reelección con un amplio apoyo de los partidos centristas y tradicionales, incluidos el SPD, la CDU y los Verdes. Conocido por su firme liderazgo y compromiso con la unidad europea, Steinmeier enfatiza la importancia de mantener los valores democráticos y fomentar el consenso en medio de los crecientes desafíos nacionales e internacionales. Su campaña tiene como objetivo tranquilizar a los votantes de que la estabilidad es primordial durante estos tiempos turbulentos.\n\nSu rival es Max Otte, el controvertido candidato respaldado por Alternativa para Alemania. Otte se posiciona como una voz nacionalista crítica de la administración actual, apelando a aquellos frustrados con las políticas de inmigración y la gestión económica. Mientras tanto, Gerhard Trabert, un médico respaldado por Die Linke, se centra en la justicia social y la reducción de la pobreza, abogando por las poblaciones más vulnerables del país. A medida que se acercan las elecciones, Alemania se encuentra en una encrucijada, ya que el resultado no sólo determinará quién será el próximo presidente, sino que también reflejará las divisiones ideológicas más profundas dentro de la nación: entre los llamados a la estabilidad, el cambio radical y la búsqueda de la equidad social."
 germany.209.a: "Frank-Walter Steinmeier."
 germany.209.b: "Max Otte."
 germany.209.c: "Gerhard Trabert."
 germany.210.t: "El Canciller Supremo se suicida"
 germany.210.d: "¡El Canciller Supremo ha muerto! ¡El Reich se encuentra en medio del caos! Las fuerzas enemigas se acercaron demasiado rápido para que nuestro líder pudiera escapar, y para evitar la vergüenza de ser capturado, tomó la valiente decisión de suicidarse. ¡Es crucial que busquemos un reemplazo de inmediato antes de que el desorden se apodere de nuestra administración!"
 germany.210.a: "Nos hemos quedado sin líder..."
 germany.211.t: "Asedio del Castillo de Reuss"
 germany.211.d: "El Castillo de Reuss, la Guarida del Lobo; estamos sobre sus antiguos muros y los aplastaremos con armas modernas antes de que acabe la semana. El tirano Reuss está dentro, mientras nos reunimos alrededor de la periferia del terreno del castillo, nuestra artillería está lista para demoler el castillo si fuera necesario, pero primero, se realizarán varios asaltos para intentar tomar el castillo con un daño mínimo."
 germany.211.a: "¡Solo hay una forma de lidiar con fascistas!"
 germany.212.t: "Heinrich se suicida"
 germany.212.d: "¡El káiser ha muerto! ¡Viva el káiser! Nuestro soberano tomó la trágica decisión de quitarse la vida mientras las fuerzas impías amenazaban su reinado. ¡Es crucial que encontremos un sucesor rápidamente antes de que nuestro movimiento se desmorone!"
 germany.212.a: "Nos hemos quedado sin líder..."
 germany.213.t: "Heinrich es capturado"
 germany.213.d: "¡Hemos capturado al falso Emperador, Heinrich von Reuss! Sin un líder que los una, los realistas están al borde de la derrota. Esperamos que el fervor aumente durante la próxima semana, pero su Emperador ya no es el jefe de una facción, es nuestro prisionero, y pagará por su intento de devolver un Gobierno imperial."
 germany.213.a: "¡Denle al perro vino, y que sea testigo de la destrucción de su imperio!"
 germany.214.t: "Canciller Supremo es capturado"
 germany.214.d: "¡Hemos capturado al Canciller Supremo! Pensábamos que se quitaría la vida al ser amenazado, pero la suerte estuvo de nuestro lado: ahora tenemos a un Canciller Supremo desarmado y algo descuidado bajo nuestra custodia. ¡Esto debilitará la determinación de nuestra oposición!"
 germany.214.a: "¡Los de su \"clase\" enfrentarán el juicio final!"
 germany.215.t: "Los medios estatales apoyan la guerra"
 germany.215.d: "\"¡Nuestros soldados están unidos en su avance hacia el Este! ¿Participan en nuestra gran lucha?\", resonaba el anuncio a través de los altavoces.\n\nKarl observaba la pantalla, atrapado en un tercer anuncio de 40 segundos que no podía saltar, interrumpiendo el vídeo. Afortunadamente, había optado por la suscripción anual; de lo contrario, la cantidad de anuncios en esos vídeos de 10 minutos se habría multiplicado por cuatro. Después de todo, el colapso estadounidense había golpeado duro a las plataformas de internet. Sin ganas de esperar a que el vídeo terminara, Karl se levantó y se dirigió a la sala.\n\nSu madre estaba en la cocina, preparando algo, mientras su hermana se perdía en su teléfono. Al mirar el televisor grande, una reliquia de antes de 2020, se encontró con otro anuncio que invitaba a unirse al ejército. Esta vez, era sobre los pilotos de la Fuerza Aérea Alemana. Estos segmentos solían durar 10 minutos, con una pausa publicitaria de 5 minutos que se repetía a lo largo del día. Karl juraría que había visto el mismo anuncio hace unas semanas.\n\nSin querer entrar en una discusión con su madre sobre el volumen de la tele, se acomodó en el sofá. Beata, como siempre, estaba viendo vídeos de guerra, ajena a todo lo demás. Un desfile interminable de vídeos de guerra grabados con GoPro y FPV, con música de fondo y creadores de contenido respaldados por el ejército, se sucedían uno tras otro. Karl no podía evitar admitir que la creadora de Sturmtruppen, esa egirl, le parecía bastante atractiva, así que claramente tenía su encanto. Sin embargo, se preguntaba por qué el régimen había decidido patrocinar a las blogueras de belleza.\n\nAl salir a fumar, Karl finalmente encontró un momento de tranquilidad para reflexionar. Los algoritmos de inteligencia artificial en las redes sociales, la televisión, la radio, e incluso su asistente personal en casa, no han dejado de bombardearlo con mensajes para que se una, como si supieran que no tiene defensa alguna. Parece que unirse de manera voluntaria podría ofrecerle muchos más beneficios que ser arrastrado a la fuerza. Mientras pensaba en esto, miró hacia abajo y se dio cuenta de que había un grupo de reclutadores militares esperando fuera de su complejo de apartamentos. Al parecer, no tiene que tomar ninguna decisión después de todo."
 germany.215.a: "¡Cada hombre debe hacer su parte!"
 germany.216.t: "Pulso electromagnético desatado sobre Alemania"
 germany.216.d: ""
 germany.216.a: "Santo Dios..."
 germany.217.t: "Volt Europa obtiene mayoría en el Bundestag"
 germany.217.d: "Considerado durante mucho tiempo como un grupo irrelevante de partidos repartidos por toda Europa, a medida que se reportaban los fracasos alemanes en la guerra, Volt Europa creció rápidamente en popularidad, las manifestaciones que exigen la unidad europea no han hecho más que crecer y, con la mayoría ya asegurada, es casi seguro que el Estado alemán será reemplazado por uno europeo."
 germany.217.a: "Una nueva esperanza para Europa..."
 germany.218.t: "C O N O C E   A   T U   E N E M I G O"
 germany.218.d: "                                          SON ASESINOS\n\n                                          SON LADRONES\n\n                                          SON VIOLADORES\n\n                                          SON FASCISTAS\n\n                                          SON ALCOHÓLICOS\n\n                                          SON RUSOS"
 germany.218.a: "Un mundo libre de ellos es el futuro."
 germany.219.t: "Saqueo del Louvre"
 germany.219.d: "El Louvre ha sido saqueado, y con ello, cientos de valiosas obras de arte han desaparecido de sus exhibiciones. Algunos cuadros, como La consagración de Napoleón y El buey desollado, ya están apareciendo en línea en plataformas como eBay y Amazon. Aunque quienes que son tan imprudentes como para vender obras invaluables en internet están siendo atrapados, los más astutos se están aprovechando de la situación para hacerse con estas piezas. Hasta ahora, La Gioconda sigue sin ser vista. Y, de alguna manera, un grupo logró robar y escapar con el Gladiador Borghese."
 germany.219.a: "¡Reprimid a los saqueadores!"
 germany.220.t: "[GER.GetNameDefCap] exige que nos unamos a la OTAN"
 germany.220.d: "Alemania quiere que nos unamos \"pacíficamente\" a la OTAN, y no intentará anexarnos."
 germany.220.a: "okei."
 germany.221.t: "Un cambio de gestión"
 germany.221.d: "Como respuesta a nuestras insuficientes medidas para satisfacer los intereses de las corporaciones, de las que depende en gran medida nuestra economía, una delegación de las mayores empresas europeas y transnacionales se ha dirigido a nosotros, ofreciendo a sus representantes ocupar la mayoría de los puestos clave en el Gobierno para garantizar un futuro verdaderamente tecnocrático y cooperativo para Europa.\n\nAunque el poder corporativo ha aflorado y los directores ejecutivos ahora toman decisiones políticas directamente, muchos se preguntan: ¿ha cambiado realmente algo?"
 germany.221.a: "Ruh roh raggy!"
 germany.220.b: "Nein."
 germany.222.t: "A QUIEN LE CORRESPONDA"
 germany.222.d: "Mantenme en el poder y mantenn la democracia autoritaria por encima del 35%. ¿Capiche?\n\nFIRMADO:"
 germany.222.a: ""
 germany.223.t: "Bienaventurados los pacificadores"
 germany.223.d: "Santa Javelina, Holy Storm Shadow, y los guerreros de NAFO"
 germany.223.a: "Que chorizo..."
 germany.224.t: "Günther Fehlinger es asesinado"
 germany.224.d: "Günther Fehlinger, un economista austriaco, defensor de la UE y la OTAN y ex político austriaco, fue encontrado apuñalado cerca de un hotel en el que se alojaba en Múnich. El asesino sigue siendo desconocido en este momento, pero el motivo parece ser político dada la naturaleza del individuo y el hecho de que su billetera todavía está presente en su cuerpo."
 germany.224.a: "¡Encuentren al responsable!"
 germany.225.t: "Asume la posición de victoria"
 germany.225.d: "¿¡¿¿¡¡¡D-donde están mis jedis para detener a los orcos!!!??!?"
 germany.225.a: "demonios"
 germany.226.t: "Negación"
 germany.226.d: "No es el fin del mundo vro."
 germany.226.a: "Todo está bien..."
 germany.227.t: "Ira"
 germany.227.d: "Era otro día en el Estado Mayor. Se había convocado una reunión sobre la preparación para la defensa. Asistieron importantes ejecutivos de Rhinemetall, Heckler & Koch y varios más, con el Inspector General de la Bundeswehr al frente.\n\nEl General Dorfmüller había pasado por momentos muy difíciles, reunión tras reunión, y en cada una solo le decían que nada estaba listo. Había sido recientemente ascendido a coronel como parte del plan de expansión del ejército de la Bundeswehr, pero ya deseaba haberlo rechazado, cada reunión del Estado Mayor general se convierte en muecas, puños apretados y, ocasionalmente, gritos, y hoy era poco probable que fuera diferente, ya que los ejecutivos corporativos se sientan para entregar sus informes al Inspector General, se responden preguntas, se aprietan los puños, el general Dorfmueller aprendió hace mucho tiempo a no molestarse, sus explicaciones son siempre las mismas, Thyssen-Krupp no puede mantener la producción de acero, Siemens está sobrecargada de trabajo para mantener suficiente personal para dar servicio a nuestra electrónica de manera oportuna, Rhinemetall afirma que simplemente no pueden construir vehículos y armas a un ritmo lo suficientemente rápido, el plan de preparación estaba previsto para 2025, pero nuestras proyecciones del mejor de los casos muestran una preparación adecuada para 2028, y nuestro peor caso indica que nuestras fuerzas armadas pueden estar por debajo de lo que queremos hasta 2032, el general Dorfmüller ha estado esperando recibir suministros cruciales para su división desde su ascenso para poder realizar ejercicios y entrenamientos, pero la artillería no puede operar sin proyectiles, la infantería mecanizada no puede entrenar sin Mecanizados, y no se puede permitir que sus hombres se acostumbren al G3 cuando se supone que le entregarán rifles G36 en cualquier momento.\n\nDorfmüller permanece sentado en silencio en la sala mientras los generales de mayor rango discuten sobre el plan de preparación entre ellos y con los ejecutivos, con el puño cerrado bajo la mesa para ocultar cualquier señal de ira, con el corazón ardiendo de comentarios sarcásticos, pero con la mente entrenada para reprimirlos en su larga carrera."
 germany.227.a: "Los odio a todos..."
 germany.228.t: "El cambio en la vida"
 germany.228.d: "Berlín siempre fue una ciudad pintoresca para quien tuviera la oportunidad de visitarla o vivir allí. Los monumentos históricos, las instituciones culturales y la enorme variedad de cafés y restaurantes que salpicaban cada esquina la convertían en un destino favorito. Muchos de estos lugares, frecuentados por turistas, brindaban a los alemanes la oportunidad de ganarse la vida con sencillez. No era mucho, pero cumplía su función para quienes lo necesitaban.\n\nWilhelm era uno de ellos; un joven cajero en un café local frecuentado por muchos turistas, especialmente norteamericanos. Pero tras el estallido de la guerra civil, el café nunca pareció alcanzar el mismo nivel de clientes que siempre tuvo cuando todos estos turistas visitaban la ciudad. Ahora tenía serias dudas de si podría conservar su trabajo o incluso de si el café podría mantenerse abierto a ese ritmo. Una sensación de creciente inquietud lo invadía a diario, parecía que el statu quo al que estaba tan acostumbrado se desmoronaba a su alrededor. La guerra civil en EE.UU., los conflictos que estallaban en todo el mundo, las dificultades económicas y las crecientes tensiones en Europa; ¿Cuánto tardaría todo esto en destruirlo?\n\nA menudo pensaba en esto camino al trabajo y de vuelta. El paisaje servía de telón de fondo para una variedad de pensamientos que lo atormentaban. Pero durante la última semana, el paisaje parecía cambiar en cada calle por la que pasaba. Esta mañana, de camino al trabajo, notó que las calles estaban llenas de anuncios de todas las formas y tamaños de la Bundeswehr. No importaba por qué calle girara, la cantidad de anuncios era algo que Wilhelm no podía ignorar.\n\nFinalmente, se detuvo y observó uno de los enormes carteles pegados en una esquina. El cartel mostraba a un soldado alto y apuesto saludando al espectador, con un texto debajo que instaba a los ciudadanos a cumplir con su deber a la nación. Sin embargo, debajo de los lemas había un montón de texto que prometía oportunidades de ascenso profesional y primas por contratación a los interesados. Estas perspectivas se le quedaron grabadas en la mente, seduciéndolo con algunas ideas. Quizás esto podría ser algo prometedor para él, algo que pudiera servirle de salida a los problemas de su ya precario trabajo. Quería pensarlo más, pero incluso eso le parecía una perspectiva inútil.\n\nPero al reanudar su camino al trabajo y observar el círculo de cafés y tiendas cerradas, finalmente llegó a una conclusión simple pero importante:"
 germany.228.a: "Quizás... este es mi lugar."
 germany.229.t: "La tormenta de Oriente"
 germany.229.d: "Había repasado los planes mil veces, pero ahora todo le atormentaba, y le obligaba a repasarlos mil veces más. Una y otra vez, revisaba la misma información con el mismo efecto. Planes de batalla, recortes de periódico, informes de inteligencia, estimaciones de todas las ramas del ejército alemán lo volvían loco. El general Wiermann, por mucho que se esforzara o se preparara, no podía escapar de lo inevitable que estaba escrito en todas partes: los rusos se acercaban.\n\nLo había visto por todas partes, desde reportajes de televisión hasta información que recibía de su propia oficina en el Ministerio de Defensa. Los rusos se preparaban para algo; era seguro. El Dombás, Bielorrusia, las maniobras al oeste y los ejercicios en Asia central; todo apuntaba a una conclusión ominosa. Los rusos pronto atacarían, y temía que Alemania no estuviera preparada. Por muchos nuevos reclutas que se reclutaran o ejercicios multinacionales que se realizaran, sentía que al final todo daba igual. Los americanos se habían ido, sus soldados y divisiones en Europa fueron enviados a casa para luchar en Estados Unidos; la poderosa superpotencia mundial había huido de Europa para ocuparse de su propia desaparición. ¿Tendrían alguna oportunidad los países del \"flanco oriental\" de la OTAN? ¿Serían capaces de ganar tiempo para Occidente? Quizás estos países excomunistas del este estarían encantados de tener la oportunidad de morir luchando contra los rusos una vez más, pero sus compatriotas no lo veían así. ¿Está Alemania a la altura? ¿Valdrá la pena toda la preparación y el entrenamiento? ¿Podrá Alemania sobrevivir a la embestida?\n\nEsto era lo que atormentaba a Wiermann a diario en su oficina de Berlín. Ahora solo se sentaba y reflexionaba sobre estas terribles revelaciones con el mismo desastre de informes que siempre abarrotaba su escritorio. Hoy no era diferente. Simplemente releía las mismas conclusiones repasadas, pero a partir de informes recién impresos y enviados por la mañana. En ese momento era casi una forma de locura, pero sabía que no era el único. Todo el ejército alemán estaba aterrorizado por lo que pronto azotaría a Europa. Esta rutina que se había impuesto durante el último mes, aproximadamente, era lo único para lo que tenía energías estos días.\n\nDejando el último informe de inteligencia, suspiró y se quedó mirando al techo. Entonces murmuró en voz baja lo único que se le ocurrió en ese momento:"
 germany.229.a: "Que Dios salve a Alemania, porque ¿quién más lo hará?"
 germany.230.t: "La capa y espada de la Patria"
 germany.230.d: "El mayor Fischer había estado preparándose para este momento durante meses. Había practicado su rutina una y otra vez, casi hasta el punto de la locura. Todo el entrenamiento, las lecciones, la preparación y la movilización de recursos estaban a punto de dar los resultados que tantos esperaban. Todos en las fuerzas armadas, e incluso en toda Alemania, habían estado consumidos por un miedo terrible como nunca antes. Temían por la economía, por EE.UU., por Europa y, en verdad, por el mundo entero. Pero ahora, podía dejar eso de lado, porque estaba a punto de ver los frutos de su arduo trabajo. Se ajustó el uniforme y se sacudió el polvo mientras se preparaba para salir de la tienda donde había pasado la última hora alistándose. Finalmente, había llegado el día de la inspección.\n\nAl subir al podio con vistas a un amplio campo abierto, se encontró con una impresionante vista de la potencia de fuego que lo esperaba. Cientos de soldados alemanes, perfectamente alineados, se mantenían firmes, mientras largas columnas de tanques Leopard 2A6 y autopropulsados Panzerhaubitze 2000 se situaban justo detrás de ellos. Habían entrenado, sangrado, llorado y sudado durante incontables horas, días, meses e incluso años para prepararse para lo que estaba por venir. Eran los mejores de los mejores, y lo sabían. Estos hombres representaban lo mejor que Alemania podía ofrecer. Fischer se detuvo en el podio unos segundos para apreciar la impresionante escena que tenía ante sí, sintiendo un orgullo que solo un soldado podría comprender.\n\nPero el orgullo que Fischer sentía por el ejército al que pertenecía no era lo único que le pasaba por la cabeza; también experimentaba una mezcla de lástima y desprecio hacia un ejército hostil que todos temían que pronto se enfrentaría a ellos: los rusos. ¿Cómo era posible que esos simplones pudieran derrotar a una fuerza como esta? ¿Cómo podía Rusia desafiar a un ejército de la OTAN completamente preparado, y mucho menos al alemán? Los rusos parecían, sin duda, tontos, suicidas, o quizás ambas cosas. Alemania había humillado a los rusos en la Primera Guerra Mundial, y nuevamente en la Segunda, y todos estaban bastante seguros de que podrían hacerlo por tercera vez. El Mayor Fischer, sus compañeros y toda Alemania sabían que estarían listos.\n\nMientras preparaba el micrófono, el Mayor comenzó su discurso a sus soldados.\n\n\"¡Soldados del Ejército Alemán! ¡Hoy es día de inspección! ¡Hoy demostrarán a sus colegas y a toda Alemania su valiosa destreza como fuerza de combate moderna! ¡Demuestren lo que valió todo su entrenamiento!\" anunció Fischer, con un tono triunfante.\n\nTodos los soldados en el campo, desde los que estaban en la primera línea hasta los que estaban más atrás, respiraron hondo y gritaron ferozmente, algo que no se había visto en mucho tiempo:"
 germany.230.a: "JAWOHL HERR MAJOR!"
 germany.231.t: "¡La ultraderecha gana popularidad!"
 germany.231.d: "Tras nuestra humillante derrota contra la Rusia comunista, muchos alemanes perdieron el interés en la política electoral y empezaron a apoyar las ideas extremistas de los partidos de ultraderecha. Debido a los recortes de financiación, la BfV tiene dificultades para vigilar a estos grupos.\n\nCada vez es más frecuente ver en las calles los emblemas y carteles de dos importantes organizaciones de derecha: el NPD y la Tercera Vía. Sus marchas son habituales en todo el país. Exigen la salvación y la purificación de la sociedad alemana de lo que consideran criptoizquierdismo y decadencia capitalista."
 germany.231.a: "Preocupante..."
 germany.232.t: "La batalla por nuestro futuro"
 germany.232.d: "Los caminos de nuestro país se están estrechando, dejándonos solo con dos opciones: el Partido Nacionaldemócrata o la Tercera Vía.\n\nEl NDP, liderado por Frank Franz, es un partido político con un líder ambicioso y egocéntrico. Se le ha descrito como neofascista y revanchista, justo lo que el pueblo alemán necesita ahora. El NDP aboga por mirar al pasado en busca de salvación.\nLa Tercera Vía es una rama del NDP, liderada por elementos más radicales de la ultraderecha. Se autodenominan strasseristas y aspiran a revivir las ideas del auténtico socialismo alemán, que podría ser lo que la nación alemana necesita."
 germany.232.a: "NPD..."
 germany.232.b: "III. Vía..."
 germany.233.t: "¡El presidente es asesinado!"
 germany.233.d: "En un impactante desarrollo, el presidente de Alemania fue asesinado hoy en Berlín, conmocionando a todo el país y a la comunidad internacional. El trágico incidente ocurrió en medio de la disolución de la OTAN y el auge sin precedentes de los partidos de ultraderecha en Alemania, lo que alimentó las especulaciones sobre posibles vínculos entre el tirador y grupos de ultraderecha.\nEl asesinato tuvo lugar durante un discurso público del presidente. Mientras se dirigía a una multitud reunida frente a la Puerta de Brandeburgo, un pistolero solitario abrió fuego, hiriendo mortalmente al presidente antes de ser reducido por las fuerzas de seguridad. A pesar de la atención médica inmediata, el presidente falleció a causa de sus heridas camino al hospital."
 germany.233.a: "¡Impactante!"
 germany.234.t: "¡Barrios turcos incendiados!"
 germany.234.d: "Recientemente, nuestra nación se ha visto afectada por terribles sucesos. Durante la noche, decenas de calles y edificios propiedad de ciudadanos turcos fueron incendiados. Cientos de personas resultaron heridas y al menos 73 perdieron la vida. El coste económico de esta tragedia aún se está evaluando, pero se prevé que sea considerable.\n\nDos grupos de ultraderecha, \"Nuevo Amanecer\" y \"Orden alemana\", se han atribuido la responsabilidad del ataque. La policía está investigando el incidente, pero las posibilidades de atrapar a los autores son escasas. Los partidos oficiales de derecha han negado cualquier conexión con el ataque, alegando que no se ajusta a sus valores.\n\nA pesar de la tragedia humana y el sufrimiento causado por este incidente, existe poca compasión entre el pueblo alemán por los inmigrantes turcos. En internet, el sentimiento común es \"¡Extranjeros fuera!\" y \"¡Maletín, estación de tren, Ankara!\"."
 germany.234.a: "¡Horrible!"
 germany.235.t: "Primeras elecciones socialistas"
 germany.235.d: "La gente del pueblo en la República hacía fila para ejercer su derecho al voto. Las banderas rojas seguían ondeando, las consignas resonaban en el aire, pero esta vez, la revolución se había detenido... para permitir que la democracia tomara su curso.\n\nEl Acta del Voto Popular prometía ser un faro de transparencia y pluralidad. Ahora, el PDS se preparaba para enfrentar su primer verdadero desafío. El entonces presidente Bartsch, a pesar de la sombra de una posible derrota política, decidió avanzar en nombre de la democracia. Al menos, el rumbo seguiría siendo socialista.\n\nY luego estaba Dorothee Martin, del DPP. Hija de la tierra, su discurso era más suave, pero no menos radical. Hablaba de ecología, justicia rural y socialismo democrático. Algo que a muchos en la izquierda más amplia no les agradaba del todo, pero que aceptaron para mantener la situación bajo control. Sí, eran elecciones, pero nunca se trató de elegir a un fascista."
 germany.235.a: "¡PDS prevalece!"
 germany.235.b: "¡SAPD domina las encuestas!"
 germany.235.c: "¡DBD consigue una victoria sorprendente!"
 germany.236.t: "Debate en el Bundestag"
 germany.236.d: "En los últimos días, ha habido mucho debate y controversia en nuestro parlamento sobre algunas políticas y declaraciones de cargos electos. Este tipo de tensión no es bienvenida en una institución tan respetada como el Bundestag, y debemos abordarla de inmediato.\n\nPodemos culpar a ciertos miembros por causar este caos o intentar encontrar una solución pacífica para restablecer el orden."
 germany.236.a: "Culpar a la derecha por la debacle."
 germany.236.b: "Culpar a la izquierda por el caos."
 germany.236.c: "Debemos luchar por la unidad."
 germany.237.t: "Mil años"
 germany.237.d: ""
 germany.237.a: "¿Estabamos condenados a repetirnos?"
 germany.238.t: "Nuestro futuro..."
 germany.238.d: "Con nuestra aceptación de ideologías y filosofías prohibidas durante mucho tiempo, y la guerra cultural contra el liberalismo, sería inevitable que el nacionalsocialismo volviera a crecer en nuestra nación.\nReprimido durante décadas, tiene la oportunidad de florecer nuevamente, esta vez sabríamos los errores que tendríamos que evitar, esta vez sabríamos que no debemos subestimar a nuestro enemigo, esta vez sabríamos lo que realmente está en juego.\n\nLa pregunta sigue siendo si abrazar o no por completo este ideal enterrado durante mucho tiempo, despojándonos de la identidad que nos obligaron a tener mientras abandonábamos al pueblo alemán, mostraría al mundo que nada muere realmente, pero también atraería muchas miradas enojadas hacia nosotros.\n\nTambién podríamos simplemente abrazar en silencio esa parte de nosotros, dejar de lado la esvástica y la adoración a Hitler y aún así adaptar nuestra nación a la visión que tenemos. Uno podría quemarse en el infierno del idealismo, pero para el resto del mundo todavía tendríamos que lucir bien.\n\nLa elección es nuestra."
 germany.238.a: "La conclusión inevitable de nuestras reformas. ¡Sieg Heil!"
 germany.238.b: "Ya hemos adoptado bastante de nuestro pasado."
 germany.239.t: "Congreso de Núremberg"
 germany.239.d: ""
 germany.239.a: "¡Gloria a nuestro partido!"
 germany.240.t: "El futuro de la religión"
 germany.240.d: "Alemania es, sin duda, una nación con profundas raíces cristianas, pero ¿hemos sido siempre un pueblo de fe cristiana? La respuesta, por supuesto, es no; nuestras raíces se encuentran en figuras como Odín y Thor, en la antigua fe nórdica. Sin embargo, hoy en día, el paganismo tiene muy pocos seguidores en Alemania. Heinrich Himmler, el líder de las SS, intentó revivir la religión pagana como un retorno a las tradiciones germánicas antiguas, una evolución de sociedades ocultistas como la Sociedad Thule y otros neopaganos, incluido el general Ludendorff.\n\nEl movimiento de renacimiento pagano es pequeño, pero nosotros también comenzamos de esa manera en su momento. ¿No es nuestro objetivo recuperar un imperio Pangermánico? ¿No buscamos restaurar el alma alemana? ¿Realmente nos beneficiaría volver al paganismo?\n\nSería mucho más sencillo apoyar el cristianismo, pero reformando aquellos aspectos que no se alinean con el nacionalsocialismo. Por supuesto, es una religión que ha sido maldecida por la negligencia de los judíos, y con el propio Cristo, ser judío cristiano es casi lo opuesto a ser nacionalsocialista. Tal vez podríamos modificar su etnicidad u otros elementos para que encajen en nuestro esquema, pero también deberíamos considerar cómo esto afectará la percepción que nuestros aliados tienen de nosotros; casi todos ellos son devotamente cristianos o al menos lo afirman, y tratar de impulsar un resurgimiento pagano no nos ganará ninguna buena voluntad de su parte."
 germany.240.a: "¡Los radicales tienen la razón, la cristiandad es para los débiles!"
 germany.240.b: "Debemos reformar las iglesias y conformarlas a la visión nacionalsocialista."
 germany.241.t: "El Kubán preocupado por agresión rusa"
 germany.241.d: "Nuestra embajada en Kubán fue contactada hoy pidiendo una reunión de emergencia, las fuerzas armadas rusas han estado invadiendo el Cáucaso progresivamente, erosionando la seguridad de la región especialmente para Kubán, el Gobierno de Kubán está rogando a nuestro embajador por garantías de defensa más sólidas e inversiones en sus defensas, pero al hacerlo podría correr el riesgo de aparecer como si fuéramos el agresor, aunque Kubán ya tiene garantías de Ucrania, y Ucrania está en la OTAN, podría valer la pena considerar a Kubán como una parte integral de nuestra estrategia de defensa también."
 germany.241.a: "Invertiremos en sus defensas."
 germany.241.b: "Los rusos fueron degollados, que no se preocupen."
 germany.242.t: "Alemania reabre negociaciones"
 germany.242.d: ""
 germany.242.a: "¿Es posible la paz?"
 germany.243.t: "Fantasma de Kiev"
 germany.243.d: "El evocador nombre es tendencia en Twitter y otras redes sociales, en referencia al piloto ucraniano de un MiG-29 que presuntamente derribó seis aviones rusos el primer día de la invasión rusa de Ucrania.\n\nMuchas de las publicaciones sobre el Fantasma de Kiev incluyen imágenes de lo que parece ser un MiG-29 -conocido en la OTAN como Fulcrum-, aunque la mayoría de las publicaciones muestran exactamente el mismo clip: el avión sobrevolando bloques de viviendas de hormigón con un cielo gris al fondo.\n\nSin embargo, hay poca evidencia de que el Fantasma de Kiev exista realmente, y sus detractores en línea señalan la improbabilidad de que un caza sin superioridad aérea y en un avión inferior derribe seis aviones enemigos en un solo día.\n\nNo obstante, un ucraniano anónimo entrevistado declaró: \"Lo que importa no es si existe o no, sino el mensaje que difunde. Este tipo de mensaje es importante en estos tiempos difíciles, sea cierto o no\"."
 germany.243.a: "Buena suerte."
 germany.244.t: "Eligiendo la Coalición"
 germany.244.d: "Ahora que las elecciones han terminado, tenemos poco tiempo para formar gobierno. Consideremos nuestras opciones cuidadosamente para asegurarnos de no ser minoría en el Bundestag."
 germany.244.a: "¡No necesitamos ayuda!"
 germany.244.b: "¡Coalición Negra-Roja-Dorada! ¡CDU, SPD, FDP!"
 germany.244.c: "Quizás podríamos invitar a la AfD..."
 germany.244.h: "¡La Coalición semáforo prevalece!"
 germany.244.e: "Una alianza impía... No es algo que queramos, pero es algo que necesitamos."
 germany.244.f: "Calmen a los radicales: nos asociamos con la CDU."
 germany.244.g: "¡La Coalición Rojiverde! ¡Porque podemos!"
 germany.244.i: "¡La coalición Jamaica de la CDU, el FDP y Los Verdes!"
 germany.244.j: "¡La coalición Kenia de la CDU, el SPD y Los Verdes!"
 germany.245.t: "El segundo juicio de Dresde"
 germany.245.d: "La sala de Dresde había sido, en otro tiempo, un tribunal federal. El águila que solía adornar el estrado había sido derribada y sustituida por el martillo y el trigo de la República Democrática. Los acusados eran exgenerales de la Bundeswehr. Cada cargo se leía con una precisión casi mecánica por un tribunal que parecía más activista que judicial: \"Traición a la Revolución\", \"Colaboración con el agresor fascista\", \"Participación en un complot golpista militarista-burgués\".\n\nUno fue etiquetado como \"capitalista-en-uniforme\", otro como \"traidor a la clase obrera\" y un tercero, simplemente, \"enemigo de la \"paz socialista\", un término que ni ellos parecían entender del todo. Algunos murmuraban entre dientes, mientras que otros miraban al frente con una expresión vacía, como si despertaran de un largo y placentero sueño a una pesadilla soviética.\n\nEl juez principal, un exsindicalista de fábrica de Leipzig, no necesitaba hablar con indignación. No hacía falta. Los fiscales ya tenían a la multitud afuera, con pancartas sindicales, testimonios de estudiantes y las familias de Chemnitz que aún esperaban noticias sobre sus hijos desaparecidos tras la derrota en Polonia. Esto no era un juicio en el sentido tradicional. No se presentó ninguna defensa, mientras los cargos se acumulaban. Un general intentó hablar, mencionando la cadena de mando, la confusión de la guerra, la falta de claridad. Le cortaron el micrófono.\n\nY, justamente, todos fueron condenados a muerte."
 germany.245.a: "Es schreien die NATO-Minister - Ihr Schreien ist nicht mehr nur Geflüster."
 germany.246.t: "Netanyahu habla en el Bundestag"
 germany.246.d: "Hoy, el primer ministro israelí, Benjamín Netanyahu, llegó a Berlín para dirigirse al Bundestag. Comenzó con un mensaje de felicitación a Alemania y a los demás países de la OTAN, elogiando la valiente actuación de nuestras tropas en la defensa de la democracia y la represión de la amenaza rusa en el este. Continuó afirmando que los enemigos de la libertad siguen activos y que la lucha por la liberación no cesa.\n\nNetanyahu llega a Berlín en medio de la guerra de supervivencia de Israel contra los países árabes. Continuando con el declive del legado ruso, intentan un último esfuerzo por extinguir la luz de la libertad en Medio Oriente.\n\nHa llamado a Alemania y a nuestro pueblo a apoyar a Israel, aliado y amigo de la OTAN desde hace mucho tiempo, recordando el legado alemán con respecto al pueblo judío: nos hemos convertido en los únicos protectores del pueblo israelí.\n\nEl discurso finalizó con un estruendoso aplauso. Inmediatamente después, se votó una nueva resolución para permitir un amplio apoyo militar a Israel en su lucha contra la coalición de Damasco.\n\nIsrael es un punto de apoyo indispensable en el Medio Oriente."
 germany.246.a: "Nuestra responsabilidad histórica..."
 germany.247.t: "Destino del Ejército Ruso de Liberación"
 germany.247.d: "La formación del Ejército Ruso de Liberación fue en parte un homenaje al general Vlásov y en parte un intento genuino de nuestro gobierno por organizar a los nacionalistas rusos. Pero hemos... subestimado la oposición nacionalista al gobierno soviético. Investigamos muy poco sobre el tema antes de ejecutar la orden de crear una unidad independiente para organizar a los colaboradores, pero resulta que el nacionalismo ruso moderno a menudo se lleva bien con el nacionalismo soviético, o más propiamente, con el nacionalcomunismo. Elementos de la izquierda nacional rusa como los natsbols lo demuestran mejor que nadie. Cuando a Lukashenko le entregaron su carnet de miembro, probablemente deberíamos haberlo sabido.\n\nNuestro intento de organizarlos fue un rotundo fracaso. Quienes se ofrecieron como voluntarios tuvieron una alta tasa de deserción. Se les proporcionó equipo deficiente y se les obligó a vigilar a otros rusos en la retaguardia. Como resultado, el problema de los partisanos nunca ha sido peor en las zonas donde están desplegados.\n\nO están descuidando la situación o apoyando activamente los esfuerzos partisanos en nuestra retaguardia, sea como sea, este nuevo ROA es un fracaso. El Gobierno soviético ha utilizado a este grupo y la imagen de sus bajos estándares en comparación con la infantería alemana para mostrar el maltrato a los rusos, su debilidad y para hacer propaganda a favor de la colaboración contraria. La liquidación de estas unidades está prevista para pronto, despojándolas de equipo, rango y, potencialmente, de la vida si así lo consideramos."
 germany.247.a: "¿Quién fue el responsable de esto? ¡QUIERO NOMBRES!"
 germany.248.t: "Invitación a la Eurointern"
 germany.248.d: "Alemania nos ha enviado una invitación a la Eurointern, somos conscientes del revanchismo de los alemanes y sabemos que si aceptamos probablemente seamos arrastrados a una guerra contra los rusos. ¿Merece la pena arriesgarse a otra guerra europea por el internacionalismo o deberíamos dejar a Alemania?"
 germany.248.a: "Na."
 germany.248.b: "¡Nos uniremos!"
 germany.249.t: "Yugoslavia rechaza la invitación"
 germany.249.d: "A pesar de ser un país socialista, Yugoslavia ha rechazado nuestra oferta de unirnos frente a la amenaza fascista, alegando que apoyan la causa socialista, pero prefieren la cooperación económica a la militar. Por mucho que hayan demostrado su cobardía, no nos beneficia luchar contra un país socialista en desarrollo en Europa como Yugoslavia."
 germany.249.a: "Qué mal. Envienles un saludo."
 germany.250.t: "Resultados electorales 2025"
 germany.250.desc: "El 28 de septiembre comenzó la primera vuelta de las elecciones federales para elegir a los miembros del 21° Bundestag. También se celebran elecciones estatales en Hamburgo, una temporada electoral crucial en Alemania. Los partidos han nominado a sus candidatos y, a medida que se llenan las urnas, el ganador es evidente. El mundo descubre que el futuro de Alemania es..."
 germany.260.t: "Alemania propone un trato"
 germany.260.d: "Ante el recrudecimiento de las tensiones en Europa, los alemanes nos han presentado una peculiar oferta. Proponen una generosa asociación comercial y económica que podría resultar valiosa para acelerar nuestra recuperación económica. Sin embargo, esto tiene sus inconvenientes, ya que cualquier asociación económica con Occidente podría reducir nuestra legitimidad ante la población y enfurecer a los nacionalistas."
 germany.260.a: "Aceptaremos para recuperarnos."
 germany.260.b: "¡No somos unos lamebotas!"
 germany.261.t: "Rusia rechaza el acuerdo"
 germany.261.d: "Han llegado noticias inquietantes desde Rusia: a pesar de los mejores esfuerzos de nuestros diplomáticos, las negociaciones comerciales con Rusia han fracasado, los rusos declaran erróneamente que estamos negociando de mala fe y hay informes de Rusia que indican una aceleración del rearme ruso a un ritmo alarmante."
 germany.261.a: "Nos preparamos para lo peor..."
 germany.262.t: "Rusia acepta el acuerdo"
 germany.262.d: "Buenas noticias de nuestros diplomáticos: las negociaciones comerciales con Rusia han dado sus frutos y se ha firmado un acuerdo. Los vastos mercados rusos están ahora abiertos para nosotros, y la puerta a una normalización de relaciones a largo plazo está abierta de par en par."
 germany.262.a: "¡Paz en Europa!"
 germany.263.t: "¡Rusia rechaza nuestras demandas!"
 germany.263.d: "A pesar de nuestras claras exigencias, los rusos se han negado a cumplir nuestras exigencias respecto a su ejército, incluyendo la reducción del tamaño de las fuerzas terrestres y aéreas y del gasto militar. Ni siquiera las amenazas de graves consecuencias parecieron incomodarlos."
 germany.263.a: "¡Sancionenlos más!"

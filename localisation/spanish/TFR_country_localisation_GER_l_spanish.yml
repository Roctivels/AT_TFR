 germany.150.t: "Reubicación de la capital"
 germany.150.d: "Dada nuestra humillante derrota a manos del este, en gran parte debido a la proximidad de Berlín al río Óder, es hora de reevaluar la ubicación de nuestra sede de gobierno. Nuestra capital está cada vez más cerca del enemigo debido a la redefinición de las fronteras polacas. El dominio del mar Báltico también se disputa, amenazando con un asalto anfibio desde Mecklemburgo. Los críticos afirman que Berlín ya no es una opción adecuada, dado que será mucho más propensa a colapsar en caso de guerra.\n\nLas opciones son Colonia, la cuarta ciudad más grande en términos de población, justo al sur de Bonn, la antigua capital de Alemania Occidental, durante cuatro décadas. La ciudad se encuentra predominantemente al oeste del Rin, lo que la hace naturalmente defendible en su mayor parte. Luego está Fráncfort, la capital financiera de Europa continental, sede de los bancos centrales europeo y alemán, que en conjunto poseen unas 5.000 toneladas métricas de reservas de oro, valoradas en aproximadamente medio billón de dólares. Fráncfort también alberga numerosas empresas, lo que los grupos de presión utilizan como excusa para justificar aún más el traslado a Fráncfort.\n\nA continuación, Hamburgo. Aunque su ubicación es precaria, es la segunda ciudad más grande con dos millones de habitantes, está cerca de importantes bases navales y situada al sur del canal de Kiel; sería más difícil para los rusos desembarcar allí. Por último, Múnich. El creciente regionalismo en Baviera está en auge tras la guerra y, al ritmo actual, se espera que siga creciendo. Calmar a Baviera mediante el traslado de nuestra capital allí sería un golpe demoledor para su movimiento y estabilizaría nuestro sur, un acuerdo relativamente bueno. Sea cual sea la decisión, recemos para que los rusos no regresen a suelo alemán."
 germany.150.a: "Colonia es una excelente opción."
 germany.150.b: "Fráncfort tiene importancia estratégica."
 germany.150.c: "Múnich será fácil de defender."
 germany.150.e: "¡La capital se mantendrá en Berlín!"
 germany.151.t: "El Canciller Supremo se dirige a las FF.AA."
 germany.151.d: "Vimos lo que Rusia le hizo a nuestro hermoso continente; dos veces, el oso nos dejó una herida profunda.\nPero esta vez, no cargamos con ninguna enfermedad letárgica; en cambio, un odio ardiente ha crecido en nuestros corazones.\nNos enseñaron a despojarnos de nuestras identidades, y con esa pérdida, hemos pagado un alto precio.\nEs la hora de renacer a través del fuego de la guerra.\n\nEl destino de la nación alemana y de Europa en su conjunto está en nuestras manos; no podemos permitirnos fallar.\nLucharemos sin descanso hasta que el mismo concepto de \"Rusia\" sea borrado de nuestro pasado, presente y futuro.\n¿Cómo enfrenta nuestra visión del mundo esta pérdida?\nSuperándola, no hay otra opción, por muy devastadora que sea.\n\nEl oso ruso espera.\nArracandle el corazón.\nDaros un festín.\nQue el mundo os vea.\n\nNuestro único deber: resistir a todo."
 germany.151.a: "Victoria a toda costa, tierra quemada."
 germany.152.t: "Babylon Berlin"
 germany.152.d: "Mientras el Reich afila sus garras, es pertinente, como pueblo, que no olvidemos nuestro linaje ancestral ni nuestra identidad cultural. A lo largo de la historia, nosotros, los alemanes, hemos llevado el estandarte y el grito de muerte y perfección. Los vándalos saquearon la capital del mundo, los prusianos humillaron a la hegemonía europea; nos erigimos como la profecía viviente de Spengler.\n\nCon el resurgimiento de la ariosofía en el siglo XXI, es evidente que la ira de lo divino y los dioses de antaño nos acompañan. ¿De qué otra manera podemos explicar nuestra insaciable sed de batalla? Wotan, inquieto y todopoderoso, ha manifestado su frenesí en nuestro reino como nosotros, el Volkstaat. \"Ergriffenheit\", como lo expresó Jung, pero más bien, aplicado a un cuerpo entero, el cuerpo del Reich.\n\nÁguilas cubiertas de oro desfilaron por Berlín; hombres con túnicas ceremoniales desfilaron por ellas; algunos llevaban túnicas con capucha de color rojo violeta. Bastones, con el sol negro, la cruz cramponada, Odal, todos símbolos ancestrales de Alemania. En el mes de Hagal en el Weltenuhr, el Volk encontró su vocación divina."
 germany.152.a: "Wow..."
 germany.153.t: "Levantamiento comunista en el norte de Alemania"
 germany.153.d: "Se han alzado batallones diezmados del ejército y simpatizantes comunistas"
 germany.153.a: "¡Aplastad a esos imbéciles!"

 germany.351.t: "Soluciones arquitectónicas modernas"
 germany.351.d: "Los numerosos pueblos de Europa hablan numerosos idiomas, y sus ciudades suelen ser ineficientes y enrevesadas, llenas de \"centros culturales\" que se han mantenido durante siglos y no son más que testimonios nostálgicos de un pasado del que cada vez nos alejamos más.\n\nLa verdad de la ciudad europea es que el pasado se protege sin razón alguna, y las viejas calles empedradas se mantienen sin un propósito adecuado. Estamos construyendo una Europa, una Europa universal, un solo pueblo que debe sentirse un todo colectivo, una identidad. Estas antiguas catedrales y palacios construidos siglos, a veces milenios antes, nunca estuvieron destinados a durar tanto.\n\nPara construir una identidad europea, estos \"monumentos\" regionales deben ser reemplazados y adoptar una arquitectura europea única. Con el tiempo, construiremos ciudades eficientes y organizadas. Las sinuosas carreteras y senderos serán torrentes de comercio y producción, rebosantes de trabajadores como un río lleno de madera a la deriva.\n\nQue protesten, pero no tendrán nada que codiciar, aprenderán a amar los edificios de oficinas y los rascacielos que construimos en su lugar, verdaderos logros y maravillas arquitectónicas, no tenemos necesidad de palacios barrocos ni de centros administrativos de condes y reyes hace tiempo desaparecidos."
 germany.351.a: "Es un nuevo amanecer, es una nueva vida."
 GER_one_nation_one_people_desc: "Alemania, Deutschland, como se le llame. Es el corazón de Europa Central y de todo Occidente. Una y otra vez, hemos demostrado nuestra capacidad como nación, con perseverancia y en las mayores dificultades. Y nuestro pueblo, el más fuerte de todos, sobrevivió a hambrunas, a enfermedades y ahora a la amenaza de las hordas rusas. Fuimos llevados al abismo por políticos incompetentes que permitieron la entrada de miles de inmigrantes ilegales a nuestra nación con sus políticas; nos indujeron a la complacencia. Pero el populismo sacó a nuestro pueblo de la irrelevancia y lo llevó a la escena mundial. Nosotros, la AfD, hemos demostrado nuestra valía como partido y hemos guiado a Alemania hacia el futuro. Estamos preparados para cualquier desafío que se nos presente, ya sean rusos o cualquier otro, ¡triunfaremos!"
 GER_russo_german_trade_deal_idea: "Acuerdo comercial ruso-alemán"
 GER_russo_german_trade_deal_idea_desc: "En un espíritu de cooperación y diplomacia, algo aparentemente poco común entre ellos, Rusia ha negociado y firmado un importante acuerdo comercial con nosotros. El acuerdo es bastante completo, con nuevas disposiciones para importaciones multimillonarias y multimillonarias de combustibles fósiles y productos agrícolas a cambio de que exportemos tecnologías clave y bienes industriales demandados en el sector manufacturero ruso. Este será un cambio positivo en las perspectivas económicas de Alemania, especialmente porque muchos dudan de la solidez de nuestra economía en el futuro próximo."
 GER_eu_green_deal_desc: "No hace falta ser un genio de la ecología para darse cuenta de que el cambio climático está devastando nuestro planeta. El nivel del mar está subiendo, las temperaturas globales están subiendo y las estaciones se están volviendo más volátiles. Esto causará estragos no solo en nuestra economía o en las facturas del aire acondicionado, sino también en nuestro futuro como país. Sin embargo, no esperaremos a que el medio ambiente se desvanezca a nuestro alrededor. Tras una considerable inversión presupuestaria, deliberaciones entre los Estados miembros y un gran esfuerzo de trabajo y construcción, el \"Pacto Verde\" de la UE ya es una realidad. Las fuentes de energía renovables, como la solar, la eólica y la hidroeléctrica, ahora representan un componente más significativo de la producción energética del continente. Las antiguas fuentes de combustibles fósiles se están eliminando gradualmente a gran velocidad, mientras que su transición a métodos más limpios avanza con la misma celeridad. Esperemos que todo esto sea nuestro primer paso para crear una solución duradera no solo para el continente, sino también para el planeta."

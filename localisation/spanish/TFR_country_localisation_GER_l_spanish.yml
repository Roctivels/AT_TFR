 GER_BMVI_idea_desc: "El IGFV forma parte del marco jurídico y político de la Unión Europea para la administración y gestión de las fronteras y la inmigración. Su misión oficial es garantizar una gestión fronteriza integrada europea sólida y eficaz en las fronteras exteriores de la Unión, garantizando un alto nivel de seguridad interior y salvaguardando la libre circulación de personas. Sin embargo, los problemas de inmigración masiva y refugiados que aún afectan al continente siguen presionando al sistema actual y poniendo en duda su eficacia. Muchos miembros de la derecha populista incluso exigen la sustitución completa del sistema por uno nuevo. A pesar de la controversia, los principales líderes de la UE han asegurado que está a la altura de afrontar estos desafíos."
 GER_CAP_desc: "La Política Agrícola Común (PAC) de la UE es el marco político central de la alianza en materia de agricultura del continente. Mediante una combinación de regulaciones, subsidios y objetivos claramente definidos, la PAC busca brindar desarrollo económico y un mercado justo a los agricultores y empresas europeos. Sin embargo, muchos la critican por diversos supuestos problemas económicos y políticos. Entre las quejas se incluyen el daño ambiental, la excesiva complejidad de sus regulaciones, la quiebra de pequeños agricultores y las excesivas dificultades con los socios comerciales en los países en desarrollo. A pesar de ello, muchos administradores de la UE aún se enorgullecen de ella como un logro en la integración económica y la armonización política."
 GER_anti_communist_underground_2_desc: "En cualquier revolución siempre habrá quienes se nieguen a aceptar la voluntad del pueblo. En Alemania, son los remanentes de fascistas y nazis los que no han hecho nada por los ciudadanos de este país, salvo lamentarse por el \"glorioso pasado\" que desean restaurar. Como un enfermizo juego de Whack-A-Mole, por muchas veces que creamos haberlos aniquilado, vuelven a aparecer.\n\nIncluso ahora, siguen sembrando el caos e intentando desbaratar el progreso que tanto hemos luchado por alcanzar. Aterrorizan a nuestro pueblo, autodenominándose Aktionsgruppe Deutscher Nationalisten, mientras fingen estar en una cruzada justa. Mientras esto continúe, el pueblo perderá la fe en nosotros, y por eso debemos acabar con los nazis de una vez por todas."

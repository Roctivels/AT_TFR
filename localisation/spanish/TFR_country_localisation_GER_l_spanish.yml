 GER_left_acceleration_idea_desc: "Marx siempre afirmó que la historia opera en fases, que las personas son producto de las circunstancias económicas y sociales de su respectiva época. No somos diferentes, y el socialismo que estamos construyendo es precisamente eso. Este es el socialismo para nuestro tiempo y lugar actuales: el eurosocialismo. Los abusos del capitalismo persisten hasta nuestros días, pero ahora acompañados de nuevas crisis, como el neocolonialismo, el racismo, la destrucción del medio ambiente, la dominación capitalista globalista y muchas más. Pero en lugar de quedarnos estancados en las glorias del pasado, debemos afrontar este desafío con vigor y celo. Así como el capitalismo cambió, también debemos hacerlo nosotros, y si no lo hacemos, podemos esperar que la revolución se extinga más rápido que el cambio de tendencias en el internet global."

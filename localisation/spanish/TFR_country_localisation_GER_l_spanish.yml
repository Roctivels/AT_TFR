 germany.158.t: "La reconstruccion estratégica de Rusia"
 germany.158.d: "BOMBARDEOS VAN A BOMBARBEAR TODO HASTA LOS CIMIENTOS"
 germany.158.a: "¡Los planes de desarrollo son adecuados!"
 germany.159.t: "Alemania invade la República Checa"
 germany.159.d: "En lo que parece una repetición de la historia, las fuerzas alemanas invaden una vez más las fronteras de la República Checa, arrollando a las guardias fronterizas locales y los asentamientos a lo largo de la frontera. [GER.GetNameDefCap] declara que el objetivo de su invasión a gran escala es derrocar al Gobierno actual en Praga.\n\nA medianoche, sonaron las sirenas antiaéreas en varias ciudades importantes, incluida la capital, y las autoridades locales instaron a los residentes a evacuar las ciudades clave mientras las fuerzas alemanas avanzaban en todas direcciones. Con el Gobierno ya anunciando la movilización militar total y llamando a las fuerzas de reserva, las columnas de refugiados ya se cuentan por miles tan solo horas después de la invasión inicial.\n\nPor ahora, la República Checa está a merced de [GER.GetNameDef]."
 germany.159.a: "¡Oigan, ya vi ese programa, es un clásico!"

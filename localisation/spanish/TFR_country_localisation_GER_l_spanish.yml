 GER_bundeswehr_dynamic_desc: "Fundada en 1955 durante la Guerra Fría, la Bundeswehr (Defensa Federal) es la fuerza armada alemana y se encarga de la defensa y las misiones internacionales del país. Desde la reunificación alemana, la Bundeswehr ha sufrido graves descuidos y recortes presupuestarios. Pero ahora que Moscú parece mostrar su verdadera cara, crece el interés por convertir la Bundeswehr en una fuerza verdaderamente respetable entre todos los sectores de la sociedad alemana."
 GER_scars_of_nato_war2_desc: "La guerra ha dejado huella en todos, y nosotros no somos la excepción. Nuestras ciudades e infraestructuras han quedado devastadas, y la reconstrucción llevará años, si no décadas. La guerra ha afectado la moral y los recursos de la ciudadanía, dejando profundas cicatrices que quizá nunca desaparezcan."
 GER_sponsor_volt_europa_decision_desc: "Volt Europa se alinea con nuestra visión federal y progresista para Europa. Patrocinaremos a Volt en [FROM.GetNameDef] y, a medida que crezca el apoyo al federalismo europeo, podrán unirse formalmente a nuestro proyecto por un Estado federal europeo."
 GER_democratic_national_front_idea_desc: "El Gobierno de una nueva Alemania socialista no puede ser simplemente nuestro y considerarse de inmediato como algo consolidado, sino que debe incluir a toda la clase trabajadora. Con esto, se ha formado el Frente Nacional Democrático para unificar políticamente a la nación en un entorno social aún inestable y dar mayor legitimidad a nuestro Gobierno. Con nuestro partido al frente y con el apoyo de otras organizaciones políticas y sociales, podemos esperar que esto pronto consolide nuestra posición como la principal autoridad del país."
 GER_new_stasi_idea_desc: "Con la reforma completa de las agencias de seguridad alemanas, ahora disponemos de un organismo de inteligencia sin igual en el continente. Al igual que la antigua Stasi de Alemania Oriental, es una organización en expansión que emplea agentes y especialistas talentosos, fervientemente dedicados a encontrar y eliminar a los enemigos de la revolución. Sin embargo, ahora tendrán acceso a las herramientas de espionaje más modernas, irónicamente desarrolladas por nuestros predecesores capitalistas. La tecnología y las técnicas modernas, combinadas con los principios y tácticas del antiguo Ministerio de Seguridad del Estado, harán que nuestras operaciones de recopilación de información sean incomparables. Nuestra \"nueva\" Stasi inspirará miedo en nuestros adversarios más poderosos, tanto que desearán la antigua Stasi del siglo XX.\n\nSerá nuestra espada con alcance global y un escudo sin puntos débiles ni siquiera en el nanómetro."
 GER_new_stasi_2_idea_desc: "Con la reforma completa de las agencias de seguridad alemanas, ahora disponemos de un organismo de inteligencia sin igual en el continente. Al igual que la antigua Stasi de Alemania Oriental, es una organización en expansión que emplea agentes y especialistas talentosos, fervientemente dedicados a encontrar y eliminar a los enemigos de la revolución. Sin embargo, ahora tendrán acceso a las herramientas de espionaje más modernas, irónicamente desarrolladas por nuestros predecesores capitalistas. La tecnología y las técnicas modernas, combinadas con los principios y tácticas del antiguo Ministerio de Seguridad del Estado, harán que nuestras operaciones de recopilación de información sean incomparables. Nuestra \"nueva\" Stasi inspirará miedo en nuestros adversarios más poderosos, tanto que desearán la antigua Stasi del siglo XX.\n\nSerá nuestra espada con alcance global y un escudo sin puntos débiles ni siquiera en el nanómetro."
 GER_chinese_economic_assistance_idea_desc: "La República Popular China, en su afán camaradero por impulsar el desarrollo del socialismo en todo el mundo, nos ha brindado una generosa asistencia económica. Desde préstamos con condiciones de financiación flexibles hasta grandes sumas de inversión directa, el alcance y la magnitud de la ayuda son los mayores que hemos visto en los últimos tiempos. Esperamos que todos estos nuevos recursos nos contribuyan enormemente a nuestro firme objetivo de construir una economía socialista moderna en Alemania."
 GER_apla_military_advisors_idea_desc: "Como parte de nuestra nueva cooperación con nuestros compañeros revolucionarios en Norteamérica, han enviado a algunos de sus oficiales a Alemania como asesores militares. Con ellos, traen consigo una vasta experiencia de combate, tecnología y nuevas habilidades adquiridas durante la brutal Segunda Guerra Civil Americana. Sin duda, los hombres de nuestras fuerzas armadas aprenderán de ellos muchas lecciones útiles sobre cómo luchar y ganar una guerra moderna."
 GER_socialist_market_economy2_idea_desc: "En nuestra búsqueda por desmantelar el capitalismo y alcanzar el socialismo, hemos adoptado un enfoque aparentemente único. Al igual que la Yugoslavia de Tito, nuestra economía se ha reorganizado en una economía de mercado socialista, en lugar de una economía de mando estrictamente centralizada, como algunos esperaban. Si bien el Estado tendrá una participación y coordinación extremadamente fuertes en la economía nacional, seguirá existiendo una iniciativa privada limitada y la posibilidad de un libre mercado limitado. Como algunos dentro del partido han descrito eufemísticamente nuestro enfoque, los trabajadores tendrán \"lo mejor de ambos mundos\". Sin embargo, se verá cuán favorable será este punto medio que hemos adoptado para la trayectoria de Alemania hacia nuestros objetivos económicos."
 GER_centralized_planning_idea_desc: "Con la caída del sistema político burgués, también llega la caída de la miserable y pútrida economía capitalista. En su lugar, se encuentra nuestro propio modelo de economía de planificación centralizada, conforme a la doctrina socialista. La inversión, la asignación de bienes de capital y la producción estarán bajo la organización y dirección del Gobierno, y por buenas razones. El pueblo y nuestra nación ya no estarán sujetos a la anarquía económica y la codicia de los capitalistas y sus empresas. Los recursos, la gente y el trabajo de Alemania ya no se desperdiciarán en beneficio personal de los empresarios. Ahora, cada segmento de la economía será cuidadosamente gestionado y planificado para maximizar nuestros esfuerzos por construir el socialismo. Dependiendo de cómo gestionemos esto, se producirá una transición rápida y drástica hacia una economía verdaderamente socialista o un estado de desastre absoluto."
 GER_socialist_market_economy_idea_desc: "En nuestra búsqueda por desmantelar el capitalismo y alcanzar el socialismo, hemos adoptado un enfoque aparentemente único. Al igual que la Yugoslavia de Tito, nuestra economía se ha reorganizado en una economía de mercado socialista, en lugar de una economía de mando estrictamente centralizada, como algunos esperaban. Si bien el Estado tendrá una participación y coordinación extremadamente fuertes en la economía nacional, seguirá existiendo una iniciativa privada limitada y la posibilidad de un libre mercado limitado. Como algunos dentro del partido han descrito eufemísticamente nuestro enfoque, los trabajadores tendrán \"lo mejor de ambos mundos\". Sin embargo, se verá cuán favorable será este punto medio que hemos adoptado para la trayectoria de Alemania hacia nuestros objetivos económicos."
 GER_nationalized_defense_industry_desc: "Parte de nuestra reorganización de las fuerzas armadas es la abolición de la empresa privada dentro de nuestro complejo militar-industrial. Toda empresa que antes era de propiedad privada y fabricaba armas o daba servicio a cualquier sistema dentro de nuestras fuerzas armadas ha sido confiscada y puesta bajo el control del Estado. Eliminada la amenaza de obstrucción o especulación por parte de estos capitalistas y sus empresas, nuestras industrias ahora desempeñarán el papel que les corresponde como pieza clave e integrada en nuestra maquinaria de reforma y desarrollo militar."
 GER_five_year_plan_desc: "Al igual que muchos antiguos Estados socialistas, nuestro Gobierno ha puesto en marcha un extenso e integral plan quinquenal para el desarrollo de nuestra economía nacional. En él, se han establecido cuantiosas inversiones y recursos para el desarrollo de nuestra industria, infraestructura y la capacidad productiva de otros sectores importantes de nuestro país. Nuestro objetivo es nada menos que una revitalización y expansión totales de la fuerza industrial de Alemania, la columna vertebral sobre la que se cimentará el socialismo alemán."
 GER_ostalgie_idea_desc: "Con la disolución de la \"democracia\" burguesa prerrevolucionaria, dirigida por la OTAN, llega su legítima sucesora: una auténtica democracia popular. Al igual que las repúblicas socialistas del pasado, los ricos capitalistas y sus lacayos ya no ocupan los salones del poder pretendiendo \"representar\" al pueblo. Ahora, los trabajadores y campesinos de Alemania son la suprema autoridad política de la nación, desde los niveles más bajos hasta los más altos del Gobierno. Con la dictadura del proletariado consolidada, los órganos representativos devueltos al pueblo y la autoridad del partido para servir las necesidades de los trabajadores sin oposición, los medios políticos para alcanzar el socialismo están en nuestras manos. Sin embargo, se verá si construimos el éxito sobre el modelo democrático popular o permitimos que se hunda en sus deficiencias anteriores o algo peor."
 GER_ostalgie_idea2_desc: "Con la disolución de la \"democracia\" burguesa prerrevolucionaria, dirigida por la OTAN, llega su legítima sucesora: una auténtica democracia popular. Al igual que las repúblicas socialistas del pasado, los ricos capitalistas y sus lacayos ya no ocupan los salones del poder pretendiendo \"representar\" al pueblo. Ahora, los trabajadores y campesinos de Alemania son la suprema autoridad política de la nación, desde los niveles más bajos hasta los más altos del Gobierno. Con la dictadura del proletariado consolidada, los órganos representativos devueltos al pueblo y la autoridad del partido para servir las necesidades de los trabajadores sin oposición, los medios políticos para alcanzar el socialismo están en nuestras manos. Sin embargo, se verá si construimos el éxito sobre el modelo democrático popular o permitimos que se hunda en sus deficiencias anteriores o algo peor."

 germany.189.t: "Explosión en el núcleo del Partido"
 germany.189.d: "A las 3:17 a. m., un artefacto explosivo destrozó la sede del distrito del PDS en Halle. Las imágenes de vigilancia mostraron a una figura encapuchada escabulléndose del perímetro poco después de la medianoche, cargando con una caja marcada con etiquetas de entrega. Minutos después, las cámaras dejaron de funcionar.\n\nTres compañeros murieron en el acto. Otros siete resultaron heridos, dos de ellos de gravedad. El departamento colectivo de trabajadores era ahora una ruina llena de hollín, de hormigón carbonizado y plástico derretido. Los servicios de emergencia cubrieron la insignia de la estrella roja de sus uniformes para evitar ser blanco de posteriores ataques. No sirvió de nada. Un camión de bomberos fue apedreado antes de que pudiera llegar la policía.\n\nAl mediodía, apareció en línea un comunicado con el rudimentario sello del \"Aktionsfront Deutscher Nationalisten\". Su \"Manifiesto Anticomunista\" era una amalgama de retórica sangrienta, agravios históricos y libertarismo tecnócrata, todo ello revestido de retórica nazi.\n\nEl Ministerio de Seguridad del Estado publicó nombres -algunos reales, otros intencionados- de presuntos colaboradores. La presencia de las fuerzas de seguridad se duplicó en las principales ciudades. La frase \"fascismo en los muros\" resonó de nuevo en los salones de plenos. Para algunos, fue un déjà vu."
 germany.189.a: "Aunque presentía que algo peor se avecinaba."
 germany.190.t: "Un respiro más"
 germany.190.d: "El Servicio Federal de Inteligencia será reformado, reorientado y renombrado. La resolución se aprobó con poca fanfarria, pero nadie dudó de su importancia. En los resonantes pasillos de la Volkskammer, la restauración del infame Ministerio para la Seguridad del Estado, o la Stasi, iba a regresar.\n\nEra producto de la legalidad socialista y la necesidad revolucionaria: las mismas aristas familiares, los mismos acentos recortados, las mismas formas mecanografiadas. El mismo silencio cuando se abrían las puertas del ascensor y te encontrabas con dos hombres educados con abrigos grises esperando fuera de tu apartamento. Ya se estaban recopilando informes sobre concentraciones subversivas en la campiña sajona. Los registros fronterizos se hicieron más densos. Los informantes callejeros regresaron, esta vez con mejores teléfonos y peor moral. Ya no es 1989. Es [GetYear]. Las herramientas habían cambiado, pero la misión, no.\n\nEl camarada ministro Bartsch habló ante el plenario: \"Una república socialista no puede sobrevivir con anteojeras. No espiamos, protegemos. No reprimimos, prevenimos. Pero no permitiremos que la reacción afile sus cuchillos a puerta cerrada\"."
 germany.190.a: "Una defensa de una fragil paz."

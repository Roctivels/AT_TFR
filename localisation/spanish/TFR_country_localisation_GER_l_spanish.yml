 GER_Hire_CACI: "Contratar soporte de inteligencia de CACI"
 GER_Hire_CACI_desc: "Consolidated Analysis Center, Incorporated era una empresa multinacional estadounidense de servicios profesionales y tecnología de la información con sede en el norte de Virginia. Sin embargo, con la Guerra Civil en EE.UU., están ofreciendo sus servicios de defensa de inteligencia al mejor postor."
 GER_Hire_Blackwater_Veterans: "Contratar veteranos de Blackwater"
 GER_Hire_Blackwater_Veterans_desc: "Aunque no es una empresa oficial, exempleados de Blackwater (ahora Constellis) que sirvieron en la invasión de Irak han hecho sus rondas en la Costa Este, exigiendo grandes sumas de dinero a cambio de seguridad. Estos asesinos entrenados han demostrado que su lealtad tiene un precio, así que démosles lo que quieren y más."
 GER_Hire_Aegis_Defence_Forces: "Contratar a Aegis"
 GER_Hire_Aegis_Defence_Forces_desc: "Aegis Defense Services es una empresa británica de servicios militares y de seguridad privados con oficinas en Afganistán, Emiratos Árabes Unidos, Irak, Arabia Saudita, Libia, Somalia y Mozambique. Estos mercenarios son de menor calibre que los de Blackwater, pero compensan su falta de habilidad con su número."

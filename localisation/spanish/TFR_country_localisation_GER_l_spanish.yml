l_spanish:
 GER_rethinking_german_militarism: "Reimaginar el militarismo alemán"
 GER_rethinking_german_militarism_desc: "El militarismo alemán, especialmente durante los últimos dos siglos, sigue siendo un tema increíblemente delicado. Desde los ejércitos del Imperio que saquearon viciosamente toda Bélgica y masacraron a millones bajo el régimen colonial en Namibia, hasta el régimen de Hitler, responsable del Holocausto; la sola mención de la remilitarización en la actualidad puede hacer que te etiqueten de miembro de la ultraderecha. A pesar de su historia y connotaciones negativas, deberíamos comenzar a repensar el estado del militarismo alemán en la posición en la que nos encontramos, especialmente ahora que los Estados Unidos están al borde del colapso y el oso ruso se cierne sobre Europa."
 GER_bulwark_of_democracy: "Bastión de la Democracia"
 GER_bulwark_of_democracy_desc: "En el mundo moderno, hemos sabido ser un faro de la democracia parlamentaria europea, orgullosos de ser la tercera economía más grande del mundo, especialmente después del colapso de los Estados Unidos. Esto nos ha llevado a comenzar a reconsiderar nuestra aversión histórica a la militarización, especialmente con el expansionismo ruso y el autoritarismo invadiendo las fronteras de la Europa democrática. No se trata simplemente de un ajuste estratégico, sino de una medida necesaria para salvaguardar el futuro de la libertad de Alemania, que debería ser un bastión por encima de toda Europa que defienda a nuestro pueblo de la amenaza del este que ha amenazado el desarrollo de la humanidad durante tanto tiempo. Si bien la colaboración con nuestros aliados europeos es importante, debemos reiterar que el futuro de Alemania es el futuro de Europa, y que Alemania debe ser valorada en primer lugar, al menos en nuestros propios asuntos."
 GER_europe_united: "Europa Unida"
 GER_europe_united_desc: "Ahora que Estados Unidos está en caída libre y Rusia está lista para atacar el corazón de la democracia europea en cualquier momento, necesitamos más que nunca la unidad europea. Ha quedado claro que, por sí sola, Europa es débil, susceptible a luchas internas y al colapso. La Unión Europea ha sido el bastión de la democracia europea y ha demostrado tener un sistema parlamentario que sirve a la voluntad del pueblo con pocos defectos. Si queremos asegurar el futuro de la libertad europea y acabar con el expansionismo ruso antes de que pueda extenderse, el destino de Europa es la unidad, y la defensa colectiva europea tendrá más valor que el estado de la Bundeswehr."
 GER_defender_20_europe: "DEFENDER-Europe [GetYear]"
 GER_defender_20_europe_desc: "DEFENDER-Europe es un concepto elaborado por el Alto Mando que implica un ejercicio conjunto multinacional a gran escala, dirigido por la Bundeswehr, diseñado para preparar a Europa para una futura guerra con \"adversarios en el extranjero\", en referencia a nada menos que Rusia. Este plan no sólo fortalecería la Bundeswehr y revitalizaría la confianza en los ejércitos europeos, sino que también generaría interoperabilidad, preparando a Europa para la acción militar conjunta en futuros conflictos. Si se acepta, esto estructuraría los ejercicios militares europeos en torno a la Bundeswehr, lo que nos daría la oportunidad de mostrar la competencia y la eficiencia de nuestro Ejército al mundo."
 GER_f35_program: "Programa F-35"
 GER_f35_program_desc: "Con la revitalización del ejército alemán, también deberíamos centrar nuestra atención en la Luftwaffe, una rama de nuestras fuerzas armadas que está gravemente subfinanciada, subabastecida y descuidada, a pesar de la importancia de una fuerza aérea en la guerra moderna; en particular, el F-35 Lightning II, un elemento básico de la genialidad de la ingeniería americana, así como posiblemente el programa de caza furtivo más exitoso de la historia de la humanidad. Utilizando una afluencia de ingenieros militares estadounidenses que huyeron del país debido a la Guerra Civil, planos y cazas ya existentes en toda Europa, adquiriremos nuestro propio conjunto de F-35, invirtiendo en nuestra industria y en nuestros trabajadores, además de reforzar nuestro complejo militar-industrial. ¡Esta decisión dejará en claro que el F-35 es la opción correcta para Alemania!"
 GER_revive_the_deutsche_marine: "Revivir la Marina Alemana"
 GER_revive_the_deutsche_marine_desc: "La Deutsche Marine, a pesar de ser una de las más grandes de Europa y extremadamente flexible, está sobrecargada, no cuenta con los fondos necesarios y está obsoleta. Años de recortes al presupuesto de defensa han reducido significativamente el alcance de nuestra armada, además de imponer fuertes restricciones al equipamiento. Si bien estamos repensando el militarismo alemán, también deberíamos extenderlo a la Armada y comenzar a aumentar nuestro presupuesto de defensa para revitalizar la Armada alemana. Invertiremos en la modernización y expansión de nuestra flota naval, incluida la adquisición y el desarrollo de buques de superficie, submarinos y buques de apoyo avanzados. También desarrollaremos una doctrina marítima clara y adaptable que se alinee con los intereses estratégicos de Alemania por encima de los de Europa."
 GER_redefine_german_doctrine: "Redefinir la doctrina alemana"
 GER_redefine_german_doctrine_desc: "La doctrina militar alemana, a pesar de la eficiencia del Alto Mando, ha ido claramente en decadencia. En lugar de adaptar viejas técnicas de distintos países, deberíamos valorar y desarrollar las doctrinas militares alemanas que mejor se adapten a la Bundeswehr. Esto incluye la integración de operaciones conjuntas, la guerra híbrida, la movilidad estratégica, el desarrollo de ISR y HADR, la adaptación a la guerra electrónica, el desarrollo de técnicas de batalla urbana, operaciones multidominio y una estructura de fuerza flexible. Si alineamos las prioridades internas de la Bundeswehr con las doctrinas desarrolladas en países extranjeros, la Bundeswehr sabrá más, lo que nos permitirá adaptarnos más eficientemente a los conflictos extranjeros."
 GER_refine_airland_combat: "Refinar el combate aeroterrestre"
 GER_refine_airland_combat_desc: "El combate aeroterrestre fue la base de la doctrina de combate de las fuerzas armadas de los Estados Unidos en Europa desde principios de los años 80 hasta finales de los 90. Hace hincapié en la estrecha coordinación entre las fuerzas terrestres y aéreas para inmovilizar, superar y destruir a las fuerzas de combate enemigas, especialmente las que se encuentran confinadas en tierra. Si bien este concepto ha prevalecido en la Bundeswehr y la Luftwaffe, poco a poco se está convirtiendo en un concepto menos refinado, ya que el equipamiento está dejando de modernizarse gradualmente. Mediante la modernización del equipamiento, la mejora de las estrategias operativas y la incorporación de tecnologías avanzadas, como los UAS y la guerra cibernética, podemos perfeccionar nuestras doctrinas de combate aeroterrestre."
 GER_modernize_the_leopard: "Modernizar el Leopard"
 GER_modernize_the_leopard_desc: "El Leopard 2, un carro de combate principal de tercera generación, está considerado la obra maestra de la Bundeswehr. Se le considera una de nuestras mejores obras de ingeniería, pero, a pesar de estas altas calificaciones, la mayoría de los modelos Leopard 2 han quedado abandonados, no han recibido actualizaciones técnicas y están completamente obsoletos. Deberíamos empezar a refinar estos modelos, preparándonos para modernizar el Leopard 2 mediante la mejora del blindaje, la implementación de mejoras de potencia de fuego en el cañón principal, como un calibre mayor o un cañón estriado o de ánima lisa más avanzado, la integración de sistemas avanzados de control de fuego, la incorporación de imágenes térmicas, telémetros láser y ordenadores balísticos para una mayor precisión y adquisición de objetivos, la implementación de una arquitectura digital, la mejora del motor y la movilidad, así como la mejora de los sistemas de protección activa. Si el Leopard es el tanque del futuro, esto debe reflejarse en su diseño."
 GER_develop_domestic_capabilities: "Desarrollar capacidades nacionales"
 GER_develop_domestic_capabilities_desc: "Nuestras capacidades militares se están reconstruyendo lentamente, pero nuestra industria, por otro lado, se encuentra en una situación bastante difícil. En todo el país, fábricas que deberían producir bienes para el pueblo alemán y armas para nuestro ejército yacen desoladas, abandonadas y descuidadas. ¿Nuestras fábricas militares? ¡Casi ninguna se está construyendo o reequipando para producir las municiones necesarias para la Bundeswehr! Esto es ridículo, dado el peso que llevamos sobre nuestros hombros. Debemos revitalizar la producción nacional alemana para el ejército; se avecina una tormenta, y debemos prepararnos para cuando nos alcance."
 GER_construct_new_dockyards: "Construir nuevos astilleros"
 GER_construct_new_dockyards_desc: "Los astilleros y puertos navales a lo largo de la costa alemana son escasos y están muy alejados entre sí, y cuando albergan una flota, el puerto suele estar en malas condiciones, mal mantenido y no apto para reparaciones. Deberíamos empezar a revitalizar los astilleros y a construir un nuevo conjunto, utilizando la selección del sitio, estudios de viabilidad, asociaciones con inversores privados, inversión en infraestructura, utilizando el análisis de mercado para adaptar el diseño y las capacidades de dichos astilleros, invirtiendo en programas de formación y educación para formar una fuerza laboral competente y un desarrollo por fases de la infraestructura esencial."
 GER_focus_on_trade_interdiction: "Enfoque en interdicción comercial"
 GER_focus_on_trade_interdiction_desc: "La doctrina naval alemana se ha centrado durante mucho tiempo en la defensa costera desde la Segunda Guerra Mundial, los días de la Gran Flota quedaron atrás, hundida junto con la Monarquía, pero un resurgimiento de la doctrina de interdicción comercial de la Kriegsmarine de los años 1940 nos vendría bien, interceptando cualquier convoy enemigo, será especialmente útil para mantener a Kaliningrado bajo asedio."
 GER_naval_center_of_europe: "Centro naval de Europa"
 GER_naval_center_of_europe_desc: "Alemania es el centro de la base industrial de Europa, su mayor productor de bienes de consumo, sede de algunos de los fabricantes de armas más famosos del mundo, pero la industria naval alemana no ha compartido la misma notoriedad internacional durante mucho tiempo.\n\nNuestra flota ya no debe esconderse bajo el mar, debemos centrarnos en buques de superficie de gran tonelaje para proyectar no solo nuestro propio poder, sino el poder de Europa mucho más allá de nuestras propias aguas; el anticuado sueño del káiser de una gran flota no ha muerto del todo."
 GER_construct_new_airfields: "Construir nuevos aeródromos"
 GER_construct_new_airfields_desc: "A medida que nuestra fuerza aérea crezca para satisfacer nuevas demandas, serán necesarios aeródromos adicionales para apoyarlas, y se construirán una variedad de nuevas bases aéreas no civiles en nuestro Este para prepararnos para el conflicto que se avecina."
 GER_purge_extremist_soldiers: "Purgar soldados extremistas"
 GER_purge_extremist_soldiers_desc: "Se nos ha informado de una serie de informes preocupantes sobre el extremismo de ultraderecha en el Heer, la Luftwaffe y la Marine. Aunque solo representan una pequeña fracción de nuestras Fuerzas Armadas, el número de estos extremistas ha ido creciendo a un ritmo alarmante. Debemos tomar medidas de inmediato, ya que el extremismo en nuestras filas está estrictamente prohibido. Estos soldados serán disciplinados y probablemente licenciados según la gravedad de la situación, lo que demostrará al mundo que no toleraremos este comportamiento."
 GER_turn_a_blind_eye: "Hacer la vista gorda"
 GER_turn_a_blind_eye_desc: "¿Por qué deberíamos eximir a los extremistas de las fuerzas armadas? ¿No son ellos los más dedicados a la defensa alemana? No, dejemos de lado los informes, una sociedad libre debe ser defendida por todos sus ciudadanos, incluso aquellos con opiniones desagradables.\n\nPuede que vaya contra nuestra doctrina, pero estamos reformando muchas cosas, que esta sea otra de ellas."
 GER_upgrade_our_railways: "Modernizar nuestros ferrocarriles"
 GER_upgrade_our_railways_desc: "Los ferrocarriles en el Este están lamentablemente subdesarrollados en comparación con Occidente, sin duda gracias a la mala gestión comunista. Ahora que tenemos incentivos, podemos aprobar un presupuesto a través del Bundestag y lograr que los trenes funcionen a tiempo."
 GER_revive_german_military_industry: "Reactivación de la industria militar"
 GER_revive_german_military_industry_desc: "Heckler & Koch, Haenel, Krupp, Rheinmetall... la lista continúa. Contamos con una innumerable cantidad de empresas militares de vanguardia en nuestro arsenal; empresas que podrían proporcionar a nuestros ejércitos equipo de vanguardia si se lo permitiéramos. Pero, lamentablemente, nuestros errores pasados han privado por completo a estas organizaciones de un mercado armamentístico nacional. Debemos ofrecerles nuevos contratos con los que trabajar, y con ellos, la industria militar alemana cobrará impulso."
 GER_civil_construction_program: "Construcción de industria civil"
 GER_civil_construction_program_desc: "Nuestra industria civil necesita apoyo, nuestra infraestructura se está quedando atrás, esta crisis de los últimos años no puede continuar si queremos considerarnos preparados para la embestida que se avecina. Todos los ejércitos marchan con el estómago lleno y nosotros aspiramos a tener carreteras para alimentarlos a ellos y a nuestra gente."
 GER_invest_in_rnd: "Invertir en I+D"
 GER_invest_in_rnd_desc: "Puede que nuestra nación haya flaqueado un poco en cuanto a la industria nacional en la actualidad. Pero si hay algo que Alemania ha hecho bien, es la invención. Tanques, equipamiento antiaéreo y antitanque, aviones, y la lista es interminable. Hemos sido pioneros en casi todos los campos a lo largo de la historia, y seguimos haciéndolo hoy. Debemos continuar así a medida que avanzamos hacia el futuro. Con la posibilidad de guerras que crece cada día, necesitamos estar a la vanguardia tecnológica ahora más que nunca. Invertiremos en investigación y desarrollo más que nunca, y nuestra tecnología militar será admirada por nuestros aliados y temida por nuestros enemigos."
 GER_assure_our_nato_allies: "Asegurar a la OTAN"
 GER_assure_our_nato_allies_desc: "Con Estados Unidos sumido en una terrible guerra civil, todos los miembros de la OTAN se han mirado con silencio, en lugar de con confianza y camaradería. Nos miran especialmente a nosotros. Algunos nos ven como más débiles que nuestros países miembros, como Polonia, Francia e Italia. Esto es absolutamente ridículo y ha durado demasiado tiempo. Europa apela una vez más a la fuerza alemana, y debemos responder. Lamentablemente, no podemos si nuestros aliados no creen en nosotros. Les aseguraremos a todos que estamos a la altura de la tarea de defender Europa."
 GER_conceptualize_an_european_army: "Conceptualizar un ejército europeo"
 GER_conceptualize_an_european_army_desc: "Europa ha estado dividida durante demasiado tiempo, demasiado centrada en pequeñas diferencias como para ver el panorama general. Rusia teme una Europa unida, porque sabe que cuando nos unimos como una sola entidad, nada puede detenernos. Pero, por desgracia, algunos no ven que, cuando estamos unidos, somos prácticamente imparables, posiblemente incluso más fuertes que Estados Unidos. Para dar los primeros pasos hacia la unificación, conceptualizaremos un mando unificado que supervise a todas las fuerzas armadas de la UE, una gran fuerza defensiva contra cualquier agresión extranjera. En cualquier guerra futura, esta cooperación será crucial."
 GER_the_turkish_gamble: "La apuesta turca"
 GER_the_turkish_gamble_desc: "Tememos cada vez más que Erdogan se tome demasiado en serio el adagio de Ataturk: «Paz en la patria, paz en el mundo», y que no se dé cuenta del peligro que corremos todos al oeste de Minsk. Apaciguar sus preocupaciones para garantizar que Turquía cumpla sus acuerdos, no solo por Europa, sino también por el bien de los turcos, ya que sin la OTAN, Erdogan es como si atrapara a su pueblo en una trampa rusa. La encrucijada entre Occidente y Oriente debe permanecer firmemente bajo la influencia de sus aliados occidentales."
 GER_commit_to_baltic_defense_plans: "Comprometerse con el Báltico"
 GER_commit_to_baltic_defense_plans_desc: "Los países bálticos son nuestros aliados más vulnerables. Desde Estonia hasta Lituania, estas pequeñas pero estratégicamente importantes naciones están rodeadas casi por completo por Rusia o sus aliados. Especialmente por el mar al oeste, el mar Báltico. El mar Báltico estaría bajo la amenaza casi constante de una incursión rusa si estallara una guerra. Los rusos podrían privarlos de alimentos mediante un bloqueo o invadirlos por mar con su armada si así lo desearan, mientras que las naciones bálticas podrían hacer poco o nada para detener al oso ruso. Nunca debemos permitir que esto suceda, no debemos permitir la caída de los países bálticos, y nuestra defensa del mar Báltico debe ser prioritaria."
 GER_commit_to_black_sea_defense_plans: "Comprometerse con el Mar Negro"
 GER_commit_to_black_sea_defense_plans_desc: "El mar Negro es una de las mayores vulnerabilidades tanto de Rusia como de nuestros aliados. Esta pequeña masa de agua posee una importancia estratégica extraordinaria; si Rusia o Estados Unidos lograran la supremacía naval en el mar, podría utilizarse para apoderarse de importantes puertos del Mar Negro y potencialmente amenazar nuestro suministro de petróleo o el de Rusia. Esto significa que el control de este mar podría contribuir a la victoria en la guerra y determinar el destino de Ucrania. Si se produce una guerra entre la OTSC y la OTAN, es crucial mantener el control del Mar Negro para proteger a Ucrania. Debemos comprometernos con su defensa por encima de todo."
 GER_upgrade_eastern_european_defenses: "Mejorar defensas orientales"
 GER_upgrade_eastern_european_defenses_desc: "El Báltico, una de las naciones más vulnerables de Europa Oriental, y sin duda uno de los objetivos de los rusos. Cuentan con fortificaciones, pero al igual que gran parte de Europa Oriental, no están lo suficientemente preparados. Si Rusia ataca, el resto de Europa Oriental podría caer ante las hordas rusas. Esto representa una amenaza existencial para nosotros y es inaceptable. Comenzaremos a reforzar las defensas de Europa Oriental lo antes posible. Con esto, se seguirá disuadiendo la agresión rusa y se seguirá defendiendo la democracia europea."
 GER_pan_european_propoganda: "Solidaridad paneuropea"
 GER_pan_european_propoganda_desc: "Europa, un continente que ha estado dividido durante mucho tiempo por guerras destructivas, divisiones nacionales y nacionalismos mezquinos. Pero, en la actualidad, hemos comenzado a transitar el camino hacia la unificación del continente. Los miembros de la Unión Europea y la OTAN han estado unidos tanto por la afinidad como por la amenaza compartida del oso ruso. Es hora de que nos unamos plenamente bajo una misma bandera; la identidad paneuropea debe permanecer fuerte en la mente de nuestros pueblos, y con nuestra promoción del pensamiento paneuropeo, sin duda lo será."
 GER_buy_the_tb2: "Comprar el TB2"
 GER_buy_the_tb2_desc: "El Bayraktar TB2 turco es un VANTC de última generación producido por uno de nuestros aliados. Las Fuerzas Armadas turcas han estado colectivamente a la vanguardia de la investigación militar independiente, buscando distanciarse de los diseños de Oriente y Occidente y desarrollar los suyos propios. La perspectiva turca es valiosa, y realizar algunos pedidos de algunos TB2 no solo reforzará a un aliado, sino que también reforzará nuestras capacidades de ataque y permitirá a nuestros ingenieros observar mejor la construcción de aviones no tripulados extranjeros."
 GER_fortify_the_polish_border: "Fortificar la frontera polaca"
 GER_fortify_the_polish_border_desc: "Polonia, una nación que se interpone entre los aliados de Rusia y nuestra alianza. Polonia es sin duda un objetivo de Rusia, pero durante demasiado tiempo las defensas polacas han sido insuficientes. Durante demasiado tiempo han estado desprevenidos ante la inminente amenaza de agresión rusa. Polonia es la vía directa hacia el territorio de la OTAN, y es demasiado importante como para estar desprevenido ante el ataque ruso inicial. Para salvaguardar la democracia europea, debemos construir más fortificaciones a lo largo de la frontera polaca."
 GER_secure_the_suwalki_gap: "Proteger Suwalki"
 GER_secure_the_suwalki_gap_desc: "El corredor de Suwalki se encuentra a poca distancia entre Kaliningrado y Bielorrusia; las únicas naciones que se interponen en su camino son Lituania y Polonia. Un avance bien ejecutado a través de este corto corredor podría fácilmente aislarnos del Báltico, lo que permitiría a los rusos conquistarlo por completo en caso de guerra. Esto no puede permitirse; representaría una pérdida estratégica para la OTAN y fortalecería a los rusos. Debemos reforzar las fortificaciones en el corredor para proteger al Báltico de la agresión rusa."
 GER_found_the_european_defense_army: "Fundar el Ejército de Defensa Europeo"
 GER_found_the_european_defense_army_desc: "Por fin se ha formalizado la propuesta que lleva décadas en pie. Fue propuesta por primera vez en 1952, pero el objetivo entonces era impedir el rearme alemán. ¿Hoy? Estamos unidos de nuevo y miramos hacia el este, al oso. Europa debe estar preparada. Cuando Francia presentó por primera vez estas propuestas, se pretendía defender a Europa de la Unión Soviética, y ahora, cuando presentamos nuestra propuesta, debe defender a Europa de la renaciente Rusia."
 GER_german_turkish_syrian_mission: "Misión turco-alemana en Siria"
 GER_german_turkish_syrian_mission_desc: "La guerra civil siria redujo el Estado sirio a escombros y cenizas, provocó una de las peores crisis humanitarias de la historia y contribuyó al auge del Dáesh. Sin embargo, la guerra se convirtió en un proceso lento y agotador que a muchos ya no les interesa. Sin embargo, algo realmente extraño ha sucedido: los combates se han intensificado de nuevo, lo que ha llamado la atención tanto de nosotros como de Turquía. Debemos tomar la iniciativa y mostrar solidaridad enviando una misión humanitaria turco-alemana a Siria. Esto no solo ayudará al pueblo sirio, sino que también contribuirá a mejorar las relaciones con el pueblo turco."
 GER_support_kurdish_anti_terrorism: "Apoyo al antiterrorismo kurdo"
 GER_support_kurdish_anti_terrorism_desc: "En el norte de Irak, los kurdos han establecido un Estado de facto independiente. Algunos los detestan; nuestros aliados turcos, por ejemplo, los ven con gran recelo. Sin embargo, los kurdos han sido invaluables en la lucha contra el terrorismo islámico en Medio Oriente, ahora más que nunca, especialmente con el resurgimiento de Hezbolá promovido por Irán. Por ello, nos conviene enviar apoyo a los kurdos para combatir la amenaza terrorista en la región de Medio Oriente."
 GER_aim_for_energy_independence: "Independencia energética"
 GER_aim_for_energy_independence_desc: "Alemania ha importado durante mucho tiempo la mayor parte de su energía, concretamente gas natural y petróleo, de la Federación de Rusia, para gran disgusto de nuestros aliados, en particular Estados Unidos, que han visto su dependencia como una palanca a la que Rusia podía aferrarse.\n\nNo más.\n\nSi fomentamos la producción de petróleo sintético, las importaciones de Rumania y creamos nuestros propios suministros de energía fiables, podremos soportar el próximo invierno sin el comercio ruso."
 GER_energy_autarky: "Autarquía energética"
 GER_energy_autarky_desc: "Alemania es famosa por ser un importante exportador mundial de automóviles y máquinas-herramientas. También es un exportador neto de electricidad a varios países diferentes, pero esto nos ha causado mucha tensión y, debido a ello, no tenemos otra opción que limitar severamente, si no cortar por completo, nuestras exportaciones de energía.\n\nPuede que nuestros importadores no estén contentos, pero preferimos eso a que nuestros ciudadanos vivan en la oscuridad."
 GER_look_for_alternative_partners: "Buscar socios alternativos"
 GER_look_for_alternative_partners_desc: "Hemos sido cercanos con Occidente y los estadounidenses por un tiempo pero con los cambios recientes en las políticas globales tenemos que buscar arreglar nuestras relaciones rotas con países como Irán y Venezuela.\n\nPor demasiado tiempo han decidido los estadounidenses por nosotros y con la amenaza en ciernes de cambios irreversibles es mejor prepararse para lo peor y formar nuevas relaciones para mantener nuestros almacenes de recursos completos para crisis futuras."
 GER_expand_wilhelmshaven_refineries: "Expandir las refinerías de Wilhelmshaven"
 GER_expand_wilhelmshaven_refineries_desc: "Nuestras refinerías en Wilhelmshaven son uno de los pocos suministros nacionales de petróleo que tenemos, y debido a la guerra civil saudita, sin duda no importaremos petróleo como antes. Sería una tontería no apoyar y utilizar estas refinerías en Wilhelmshaven. El petróleo es crucial para la vida diaria y lo necesitamos para defender a Europa, o incluso para impulsar a nuestros políticos a trabajar. Al ampliar nuestras refinerías, seguiremos avanzando en la senda de la recuperación."
 GER_placate_the_russians: "Apaciguar a los rusos"
 GER_placate_the_russians_desc: "Si bien nuestras relaciones diplomáticas con Rusia se han vuelto tensas, como mínimo, este país posee una cantidad sin precedentes de dinero y recursos naturales, de los cuales sería una tontería no obtener una pequeña porción. Si bien es probable que los rusos sientan la misma aversión hacia nosotros que nosotros hacia ellos, siguen abiertos a establecer relaciones comerciales con Europa. Para que la economía alemana se mantenga en una buena posición, nos conviene al menos acercarnos a los rusos e intentar mantener una relación comercial sólida con ellos."
 GER_revitalize_the_autobahns: "Revitalizar las Autobahns"
 GER_revitalize_the_autobahns_desc: "Las autopistas son un sistema vial importante y muy utilizado, cuyo acceso está controlado por el Gobierno alemán. A pesar de su importancia para el comercio y los viajes alemanes, su uso es tan frecuente que se han deteriorado ligeramente. Sin embargo, con los conflictos que se avecinan en Asia y América, y la disminución del comercio global, deberíamos aprovechar esta pausa para empezar a mejorar las autopistas y restaurarlas a su estado óptimo. Alemania se ha construido con ingeniería inteligente y una excelente infraestructura; debemos mantener este estatus que nos hemos ganado con justicia."
 GER_eurail_modernization: "Modernización del Eurail"
 GER_eurail_modernization_desc: "Millones de personas usan el Eurail para viajar por el continente europeo; es accesible y útil. Pero, lamentablemente, se está quedando atrás de la competencia y empieza a mostrar signos de envejecimiento. A medida que las vías se deterioran, también lo hace la opinión pública sobre el Eurail. Ya es hora de que esto termine. Exigiremos al Europarlamento que envíe fondos al Eurail, y así recuperará su lugar como uno de los mejores sistemas ferroviarios del planeta."
 GER_halt_nordstream_2: "Parar Nord Stream 2"
 GER_halt_nordstream_2_desc: "Se suponía que Nord Stream 2 sería el segundo gasoducto de Rusia a Alemania, que abastecería a este país con gas natural. Este gasoducto nos ayudó durante un tiempo, brindó a los rusos una compensación financiera y nos proporcionó ese oro líquido que impulsa cada faceta de la vida en Alemania. Pero, con el tiempo, los rusos han comenzado a actuar con mayor agresividad, y ahora están empezando a amenazar a nuestros aliados, ¡lo cual es inaceptable! Dado el rápido deterioro de las relaciones diplomáticas entre nosotros y los rusos, es hora de abandonar este proyecto, pagar a nuestros trabajadores y dejarlos volver a casa."
 GER_negotiate_with_opec: "Negociar con la OPEP"
 GER_negotiate_with_opec_desc: "Arabia Saudita se ha sumido en una devastadora guerra civil. Sin un fin inminente, la OPEP ha perdido a uno de sus miembros más importantes y se encuentra en una situación difícil. Además, su acuerdo con Estados Unidos parece ser inútil, ya que la nación está sumida en el desorden y los conflictos civiles. A pesar de ello, los miembros restantes de la OPEP aún controlan vastas reservas de petróleo que les interesa vender. Es crucial aprovechar esta oportunidad y convencerlos de que lleguen a un acuerdo con nosotros. Con esto, continuaremos recuperándonos de la crisis petrolera."
 GER_north_sea_oil_expedition: "Expediciones petroleras al Mar del Norte"
 GER_north_sea_oil_expedition_desc: "Tanto el Mar del Norte como el Mar Báltico han sido objeto de especulación sobre sus reservas de petróleo. Sin embargo, la idea de que ambos mares contienen petróleo tiene fundamento. Por ejemplo, Polonia encontró petróleo en el Mar Báltico hace algunos años, y ahora el yacimiento petrolífero B8 representa el 3% de su producción petrolera. Ante esta situación, nos conviene enviar una expedición al Mar del Norte y sus alrededores en busca de petróleo. Si encontramos petróleo en el Mar del Norte, podremos seguir abasteciendo de petróleo al pueblo alemán."
 GER_revive_the_german_coal_industry: "Revivir la industria del carbón alemana"
 GER_revive_the_german_coal_industry_desc: "Mientras la crisis del petróleo persiste, no podemos permitirnos invertir dinero que no tenemos en fuentes de energía renovables experimentales e ineficientes como la eólica y la solar. La energía nuclear tampoco es una opción; la historia ha demostrado que las centrales nucleares son trampas mortales que acechan a la gente. Solo nos queda el carbón, y aunque el carbón no se acerca en absoluto a una fuente de energía limpia, es barato y una industria consolidada en Alemania. Debemos impulsar la industria del carbón y expandirla. Con esto, las necesidades energéticas de los alemanes seguirán satisfechas."
 GER_the_green_alternative: "La alternativa verde"
 GER_the_green_alternative_desc: "Asumamos la prerrogativa moral y resolvamos dos problemas a la vez: expandiendo los parques eólicos y solares en toda Alemania, mantendremos el medio ambiente limpio a la vez que ampliamos nuestros recursos energéticos nacionales. Aunque esto pueda implicar escasez temporal al cerrar centrales eléctricas menos limpias, vale la pena."
 GER_secure_eu_interests: "Proteger intereses europeos"
 GER_secure_eu_interests_desc: "La Unión Europea tiene intereses en el extranjero y sería bueno que los protegiéramos. Es necesario asegurar los acuerdos comerciales sobre caucho, petróleo y otros materiales vitales para la producción civil y militar. Nuestra influencia diplomática en el exterior nos ha ayudado a asegurar este material vital no solo para nosotros, sino para toda la UE. Debemos pensar también en nuestros vecinos en estos tiempos difíciles."
 GER_invest_in_synthetic_oils: "Invierta en aceite sintético"
 GER_invest_in_synthetic_oils_desc: "Con la península arábiga en guerra total, nuestro suministro de crudo se ha reducido drásticamente. Ahora, nos enfrentamos a una crisis energética sin precedentes en Alemania. Para tener alguna posibilidad de recuperación, tenemos muy pocas opciones. Una de ellas, el petróleo sintético, es más eficaz que todas las demás. El petróleo sintético, nuestro sustento, es nuestra única oportunidad real de establecer un suministro nacional de petróleo. Debemos invertir sin duda en nuevas empresas de productos sintéticos, no solo para los aceites, sino también para los plásticos y otros materiales."
 GER_increase_the_oil_reserve_supply: "Aumentar las reservas de petróleo"
 GER_increase_the_oil_reserve_supply_desc: "Sin petróleo, nuestro ejército no puede abastecerse. Sin petróleo, nuestra gente se queda sin la capacidad de sostener nuestra economía. El mundo moderno gira en torno al petróleo. Con el colapso del Estado saudita, la necesidad de petróleo crece cada día más. Esta demanda es simplemente algo que nuestra reserva actual no puede manejar en este momento. Para combatir esto, ampliaremos nuestra reserva de emergencia; cada día cuenta en tiempos de crisis."
 GER_rethink_free_trade: "Repensar el libre comercio"
 GER_rethink_free_trade_desc: "Si bien el libre comercio ha traído gran prosperidad a nuestra nación durante las últimas décadas, los últimos años han traído consigo una ola de cambios en el orden global. Estados Unidos comienza a desmoronarse, el destino de Asia pende de un hilo, y nosotros también debemos cambiar para no caer en la misma inestabilidad que azota al resto del mundo. El viejo orden mundial se ha visto sacudido y podría derrumbarse pronto. Debemos reconsiderar seriamente el libre comercio. Una vez que lo hagamos, nos aseguraremos de no caer con él."
 GER_support_the_manufacturing_industry: "Apoyo a la manufactura"
 GER_support_the_manufacturing_industry_desc: "La industria manufacturera alemana ha sido el motor de Alemania desde el primer gobierno de Adenauer. Nuestros fabricantes han sufrido el desplome de los mercados bursátiles durante la pandemia y debemos hacer todo lo posible para garantizar que nuestros propios mercados no se desplomen. Al desviar fondos, no solo podemos apuntalar, sino también expandir nuestra capacidad de fabricación para satisfacer las necesidades de nuestros vecinos."
 GER_ensure_domestic_stability: "Garantizar estabilidad interna"
 GER_ensure_domestic_stability_desc: "La estabilidad interna ha sido precaria. Deberíamos dar luz verde al BfV para que ataque a los líderes de las protestas y así frenar, al menos temporalmente, el flujo de protestas de extremistas y partidos de oposición.\n\nNuestras políticas de apoyo y expansión de la industria manufacturera sin duda darán frutos, y con el tiempo, la tormenta se calmará por sí sola."
 GER_bolster_the_service_economy: "Impulsar la economía de servicios"
 GER_bolster_the_service_economy_desc: "La economía mundial se ha deteriorado a un ritmo sin precedentes desde principios de 2020, y el desempleo y la pobreza se han disparado a la par. Ahora, con la crisis del petróleo, estas estadísticas no han hecho más que aumentar. Debemos frenar este rápido crecimiento de inmediato y, para ello, financiaremos empleos relacionados con el sector servicios. Las cadenas de restaurantes, hoteles y muchos más recibirán apoyo de nuestra nación. Esto ayudará a reducir el desempleo y a evitar la ruina de las familias y personas de clase baja durante un tiempo."
 GER_reverse_the_nuclear_phase_out: "Revertir la desnuclearización"
 GER_reverse_the_nuclear_phase_out_desc: "Nuestra eliminación gradual de la energía nuclear ha sido un desastre total para nuestra nación. Claro que no podemos negar que la energía nuclear ha causado gran destrucción en nuestro planeta, a través de terribles accidentes como Chernóbil y Fukushima. Pero también es importante reconocer que estos incidentes no solo son poco frecuentes, sino que a menudo se deben a errores humanos, defectos de diseño o falta de una normativa de seguridad adecuada, mientras mantenemos la máxima seguridad en nuestras instalaciones. Die Grünen no lo admitirá, pero la energía nuclear es una forma de energía potente y fiable, y debemos revertir esta desastrosa eliminación antes de que perjudique aún más nuestra economía."
 GER_increase_renewable_subsidies: "Subsidiar las renovables"
 GER_increase_renewable_subsidies_desc: "Nuestro planeta se está agotando y sus recursos se están agotando. El caos absoluto provocado por una simple caída en las exportaciones de petróleo es un claro ejemplo de ello. Sin embargo, las energías renovables no se agotan como el petróleo, no contaminan nuestro aire con smog como el carbón, ni son accidentes a punto de ocurrir como la energía nuclear. A medida que se cierren nuestros últimos reactores nucleares, necesitaremos más paneles solares y parques eólicos para compensar el déficit generado por la eliminación gradual. Con el tiempo, no solo alcanzaremos la producción de nuestras antiguas instalaciones, sino que la superaremos. ¡Con estas fuentes de energía renovable, abasteceremos a nuestra nación para las generaciones venideras!"
 GER_focus_on_flood_reconstruction: "Reconstruir Renania"
 GER_focus_on_flood_reconstruction_desc: "Las inundaciones del Rin han devastado las ciudades que rodean el río. Nuestro gobierno ha dejado de atender, en su mayoría, millones de dólares en daños, lo cual es completamente intolerable. No podemos permitir que nuestras ciudades más pobladas e industriales se vean afectadas por estas inundaciones por más tiempo. Nos dedicaremos por completo a la reconstrucción de las ciudades de Renania. Reconstruiremos no solo para nuestras industrias, sino también para el pueblo alemán afectado por las inundaciones."
 GER_the_digital_revolution: "La Revolución Digital"
 GER_the_digital_revolution_desc: "Es innegable la importancia que han adquirido los microchips en todos los aspectos de la sociedad en las últimas décadas. La tecnología y todos sus aspectos han sido importantes para el mundo a lo largo de la historia, pero en comparación con la actualidad, ha alcanzado nuevas cotas de importancia. Nuestra industria tecnológica se ha quedado atrás, y esto acabará pronto. Para defender a Europa y a Alemania, no podemos permitir que esto continúe. Aumentaremos exponencialmente la financiación a startups tecnológicas y expertos extranjeros, y nos pondremos al día con la competencia."
 GER_EV_subsidies: "Subsidiar vehículos eléctricos"
 GER_EV_subsidies_desc: "Los vehículos de gas han sido durante mucho tiempo faros obsoletos de un pasado contaminado. Utilizan petróleo no renovable y, al quemarlo, emiten smog que contamina nuestra atmósfera. Durante demasiado tiempo, hemos permitido que las empresas de vehículos eléctricos incurran en números rojos y se queden atrás de los vehículos de gas. Ahora, con la escasez de petróleo, tenemos la oportunidad de incentivar la compra de vehículos eléctricos. Impulsaremos la industria de vehículos eléctricos y, por extensión, ampliaremos su producción. Con esto, cubriremos la nueva demanda de vehículos."
 GER_sponge_cities_program: "Ciudades Esponja"
 GER_sponge_cities_program_desc: "Nuestras ciudades a lo largo del Rin han experimentado problemas con las inundaciones durante las temporadas especialmente húmedas, y cabe mencionar que el Rin es una región muy densamente poblada.\n\nEstas inundaciones afectan a millones de personas y no podemos permitir que se extiendan más. Cavar zanjas y construir diques no servirá de nada. Necesitamos invertir en hacer nuestras ciudades más esponjosas. ¿Qué significa esto? Las hacemos más blandas, más capaces de absorber agua. Nuestros desagües siempre están saturados, pero si aprovecháramos la capacidad natural de la naturaleza para absorber agua, podríamos tener una defensa natural contra las inundaciones. Plantar árboles. Más parques. Reemplazar las carreteras actuales con asfalto permeable que permita el paso del agua. ¡Más verde en nuestras ciudades significa menos agua en los hogares! ¡Wunderbar!"
 GER_a_green_future: "Un futuro verde"
 GER_a_green_future_desc: "Alemania es pionera en soluciones de energía renovable; un gran futuro verde se avecina no solo para Alemania, sino para el mundo. El cambio climático no solo es la mayor amenaza para la Tierra, sino también para el futuro de la humanidad. Las energías renovables detendrán la extracción de petróleo y carbón, impidiendo que el aire se contamine con smog y que nuestros ríos se contaminen con residuos. La belleza natural de Alemania es digna de admirar, y destruirla mediante la minería incesante de recursos finitos es una vergüenza. ¡Lo verde es oro y un futuro seguro es un futuro verde!"
 GER_lift_venezuelan_sanctions: "Levantar sanciones venezolanas"
 GER_lift_venezuelan_sanctions_desc: "Venezuela cuenta con una de las reservas petroleras más ricas del mundo. Sin embargo, a pesar de sus enormes reservas de petróleo, enfrenta fuertes sanciones por parte nuestra y de nuestros aliados. Con la crisis del petróleo en su apogeo, nos enfrentamos a una crisis económica que amenaza el sustento de nuestros ciudadanos y la riqueza de nuestra nación, y para tener alguna posibilidad de recuperación, necesitamos obtener petróleo por todos los medios.\n\nComo dice el dicho, tiempos desesperados requieren medidas desesperadas. Debemos levantar las sanciones contra Venezuela y ofrecer una rama de olivo a su Gobierno para que obtenga incluso una pequeña porción de sus enormes reservas de petróleo. Si aceptan nuestra oferta, continuaremos la recuperación."
 GER_back_the_arabian_republic: "Apoyo a la República Árabe"
 GER_back_the_arabian_republic_desc: "Desde 1933, Arabia Saudita ha estado bajo el yugo del despótico Gobierno saudita. Pero los tiempos han cambiado, y la otrora invencible familia real ha comenzado a resquebrajarse. Esas grietas pronto se convirtieron en cañones cuando Arabia Saudita se sumió en una guerra civil tras la muerte de su anciano rey. Sin embargo, este caos presenta una oportunidad: una Arabia Saudita democrática. En la guerra civil saudita, hay una facción que comparte nuestros valores. Como uno de los líderes del mundo democrático, es nuestro deber brindar ayuda a estos luchadores por la libertad; no solo por el petróleo, sino también por la idea de una Arabia Saudita libre."
 GER_the_armenian_gambit: "Apostar a Azerbaiyán"
 GER_the_armenian_gambit_desc: "Azerbaiyán es cercana a Rusia, pero posee una gran cantidad de petróleo. No sería la primera vez que intentáramos ir a Bakú por petróleo, pero dejemos las armas en casa esta vez; ¡llevemos euros y trajes bien planchados! Es un gran riesgo darle a la OTSC aún más influencia sobre nosotros, pero si es lo que Europa necesita, es lo que Europa necesita."
 GER_free_the_markets: "Liberar los mercados"
 GER_free_the_markets_desc: "Durante la mayor parte de nuestra historia moderna, las regulaciones solo han servido para obstaculizar la innovación y la expansión. Estas leyes y órdenes actúan como telarañas, atrapando a emprendedores y empresas en burocracia y procedimientos legales innecesarios. Y con el reciente auge de China como la fábrica del mundo, pronto nos quedaremos atrás a menos que implementemos cambios drásticos. El SPD y Die Linke protestarán, gritarán y chillarán, pero serán incapaces de detener lo inevitable. Las agendas y los objetivos palidecen en comparación con el futuro mismo de nuestra fortaleza económica."
 GER_negotiate_with_the_iranians: "Negociar con los iraníes"
 GER_negotiate_with_the_iranians_desc: "La industria petrolera iraní es una de las más antiguas del mundo y un pilar de su economía. Si bien nuestra industria petrolera es pequeña e inexperta en comparación, hemos tenido una mala relación con Medio Oriente, especialmente con los iraníes. Sin embargo, al igual que muchos de nuestros antiguos adversarios, tendremos que hacer las paces para asegurar nuestra salud económica. Con algunos mensajes y reuniones que ayuden a suavizar nuestras diferencias, seguramente alcanzaremos un acuerdo comercial petrolero con los iraníes."
 GER_a_united_european_vision: "Una visión europea unida"
 GER_a_united_european_vision_desc: "Desde hace tiempo se ha considerado que Europa como un Estado unificado es una locura. Pero con la caída de Estados Unidos y el ascenso de Rusia como amenaza, está más que claro que Alemania no es nada sola, Francia no es nada sola, Italia no es nada sola, pero ¿juntos? Somos todo y más. Promovamos la visión de una Europa verdaderamente unificada, algún día puede hacerse realidad."
 GER_baptism_by_fire: "Bautismo de fuego"
 GER_baptism_by_fire_desc: "La última vez que Alemania estuvo en una guerra convencional fue en la Segunda Guerra Mundial, hace más de ochenta años. Desde entonces, una actitud más pacifista se ha apoderado de la nación, y el mundo creyó que Alemania había terminado con la guerra, que las fuerzas armadas alemanas nunca más librarían grandes batallas en suelo extranjero.\n\nQué equivocados estaban todos.\n\nEn el Báltico, los rusos están intentando avanzar, y ahí es donde se lo mostraremos. Junto con nuestros aliados bálticos, los rusos aprenderán lo grande que es el error de subestimarnos."
 GER_operation_eisenhammer: "OPERACIÓN: Eisenhammer"
 GER_operation_eisenhammer_desc: "En la guerra moderna, aquellos que no tomen la iniciativa serán rápidamente destruidos por quienes se les adelanten, y ya es hora de que les demostremos a los rusos que no esperamos. La operación Eisenhammer es nuestro golpe decisivo contra los rusos que se están concentrando, y todo es muy sencillo. A lo largo del frente en Bielorrusia y Ucrania, se ejecutará una ofensiva rápida con el apoyo de baterías de artillería autopropulsada y de cohetes pesados y precisos. Bajo el ataque de un intenso bombardeo y nuestras fuerzas de infantería y mecanizadas coordinadas, los rusos no podrán mantener su posición, sin importar cuántos hombres intenten lanzarnos. Con esto los haremos retroceder rápidamente a los fríos páramos de su país."
 GER_intensify_nighttime_sorties: "Intensificar bombardeos nocturnos"
 GER_intensify_nighttime_sorties_desc: "Nuestras ópticas superiores de visión térmica y nocturna han mejorado nuestra capacidad de atacar de noche, especialmente en el aire, ¡debemos aprovechar esta ventaja y bombardear posiciones TODA la noche, durante el tiempo que sea necesario!"
 GER_national_recruitment_drive: "Campaña nacional de reclutamiento"
 GER_national_recruitment_drive_desc: "La Bundeswehr necesita desesperadamente nuevos voluntarios. Aumentemos las pensiones y los beneficios, ofrezcamos un bono por incorporación y les prometemos una buena oferta en un BMW... ¡Sí... los reclutas inundarán las oficinas muy pronto!"
 GER_dust_off_legacy_equipment: "Utilizar equipamiento obsoleto"
 GER_dust_off_legacy_equipment_desc: "Un G3 sigue siendo un arma que dispara en calibre 7,62, de hecho es un proyectil más pesado que el G36 o nuestro nuevo HK416, un G3 mata tan bien como cualquier otra arma en servicio. Comience a distribuirlos entre las tropas."
 GER_deliver_excess_equipment_to_ukraine: "Entregar equipo sobrante a Ucrania"
 GER_deliver_excess_equipment_to_ukraine_desc: "Ucrania amplía enormemente el frente ruso y, por lo tanto, abre una vulnerabilidad tanto para el Cáucaso ruso como para el propio Moscú. Podemos aprovecharla, pero sólo si Ucrania no se desmorona. Para garantizarlo, debemos apoyar a su ejército."
 GER_mobilize_the_economy_desc: "Con Alemania sumida de nuevo en la guerra, ya no podemos permitirnos el lujo de que los negocios sigan como de costumbre en el país. Nuestra maquinaria militar necesita una economía que la impulse, y no se perderá más tiempo en ensamblarla. Se capacitará a los trabajadores, se movilizarán las industrias, se reservará material y se racionarán los recursos. Los titanes de los negocios y los millones de hombres y mujeres trabajadores y talentosos que los dirigen usarán ahora los recursos y habilidades que hicieron famosa a la economía alemana en todo el mundo para hacer lo mismo con las fuerzas armadas alemanas. Los rusos asumen que no tenemos industria para apoyar nuestra lucha, pero rápidamente aprenderán lo equivocados que estaban."
 GER_tank_in_ukrainian_refugees: "Acoger refugiados ucranianos"
 GER_tank_in_ukrainian_refugees_desc: "La guerra en el este ha creado una gran catástrofe humanitaria que se está extendiendo por Europa occidental. Cientos de miles de ucranianos, huyendo de ciudades ahora bombardeadas por cohetes y artillería rusos, han llegado a Alemania. Sin embargo, a diferencia de otros Estados, los recibiremos a ellos y a más personas que deseen huir de la violencia. Por supuesto, habrá costes para alojar a estas personas en el país, pero en medio de estos desafíos hay un beneficio. Apoyarán fielmente a aquellos, e incluso lucharán por, cualquiera que quiera poner fin al expansionismo ruso. Como siempre estamos buscando más hombres y apoyo en esta lucha, esto será algo que explotaremos rápidamente."
 GER_final_operation: "OPERACIÓN: [GLOBAL.get_poland_status]"
 GER_final_operation_desc: "[GLOBAL.get_operation_status]"
 GER_blucher: "Blücher"
 GER_khol: "Kohl"
 GER_oper_1: "¡LUCHAD! ¡ESTA ES NUESTRA ÚLTIMA OPORTUNIDAD PARA EXPULSAR A LOS RUSOS DE POLONIA!"
 GER_oper_2: "¡Los tenemos a la fuga! ¡Que esta operación sea el último clavo en el ataúd!"
 GER_oder_defense_initiative: "Iniciativa de Defensa del Óder"
 GER_oder_defense_initiative_desc: "La destrucción de la Wehrmacht en los Altos de Seelow en 1945 sentenció el destino de Berlín. Se permitió a la horda bolchevique avanzar y arrasar nuestra capital.\n\nDecimos: Nunca más Seelow. Debe construirse una línea de defensa a lo largo de todo el Óder. ¡Ni un solo bolchevique pisará jamás suelo alemán!"
 GER_convene_the_bundestag: "Convocar al Bundestag"
 GER_convene_the_bundestag_desc: "La década de 2010 fue una década de resultados dispares para nuestra nación y el pueblo alemán. Experimentamos una crisis de refugiados junto con el resto de Europa debido a las consecuencias de la Primavera Árabe; Europa se enfrentó a una crisis de deuda que amenazó con hundir nuestra economía; y nos enfrentamos a la desalentadora perspectiva de un aumento de los precios de la energía que no hizo más que aumentar a lo largo de la década. A pesar de todo esto, experimentamos una recuperación económica, un bajo desempleo y una gran cantidad de inversiones que impulsaron nuestro crecimiento positivo. Con el cierre de otro capítulo de la historia y los años 2010 a punto de terminar, se hace evidente que debemos convocar al Bundestag. Después de todo, tenemos mucho de qué hablar: nuestra agenda económica, la eficiencia energética y las elecciones que se avecinan. Incluso podríamos hablar de ese pequeño brote de algún tipo de virus en China, pero sin duda se contendrá pronto. Esperamos con ilusión nuestro futuro, que es prometedor."
 GER_expand_our_nato_contribution: "Expandir la contribución a la OTAN"
 GER_expand_our_nato_contribution_desc: "La OTAN siempre ha sido un escudo contra la agresión del Este. Mientras los soviéticos ocupaban nuestras tierras orientales y amenazaban al resto de Europa, la OTAN estaba ahí para protegernos. Pero ahora, con nuestro miembro más fuerte desintegrándose, corresponde a las grandes potencias europeas proteger la democracia liberal contra la creciente amenaza rusa en el este. Alemania ha sido un miembro clave de esta gran alianza durante décadas, pero nuestras contribuciones a la defensa mutua han empezado a quedar rezagadas respecto a las del resto de nuestras naciones hermanas. Depende del Estado alemán contribuir a la alianza más que nunca. Con Estados Unidos desmoronándose, Europa se encuentra en su momento más desesperado. Es crucial contribuir plenamente a la OTAN; no solo para proteger a nuestros vecinos, sino también a Alemania."
 GER_focus_on_domestic_issues: "Centrarse en asuntos internos"
 GER_focus_on_domestic_issues_desc: "En el ámbito nacional, la CDU y el SPD siempre han estado en una lucha por el liderazgo. Es un conflicto amistoso, con una larga trayectoria de políticas complementarias. Sin embargo, como todos los grandes adversarios, con la llegada de las elecciones, volvemos a la lucha en las urnas. Sea quien sea el candidato elegido en estas próximas elecciones, tiene la oportunidad única de dar la bienvenida a la nueva década de forma positiva."
 GER_defend_the_minds_of_the_youth: "Defender las mentes de la juventud"
 GER_defend_the_minds_of_the_youth_desc: "La juventud es nuestra sangre vital, nuestro futuro, los hijos e hijas de una nueva era, y en las clases de historia conocemos el poder de una nueva generación. Puede derrocar democracias, fortalecerlas; todo comienza en la escuela y en el hogar. Los actores maliciosos también lo saben y siempre intentarán llenarles los oídos con sus venenosas mentiras. Intentan convertir a la juventud en una generación de extremistas que amenazan nuestra propia existencia. Debemos evitarlo a toda costa y brindarles la educación adecuada sobre los peligros del extremismo y sus efectos perjudiciales para el pueblo alemán."
 GER_scientific_breakthroughs: "Avances científicos"
 GER_scientific_breakthroughs_desc: "La ciencia es un pilar fundamental del orgullo alemán, que se remonta a siglos, casi un milenio. Incluso hoy, Alemania es un gran innovador en muchos campos científicos y, si bien en algunos aspectos nos hemos quedado atrás, nadie olvidará lo que hemos logrado, y nadie olvidará lo que lograremos."
 GER_establish_minimum_pension: "Fijar una pensión mínima"
 GER_establish_minimum_pension_desc: "Alemania es conocida por sus políticas sociales, así que quizá les sorprenda saber que no tenemos una pensión mínima. Resolvamos eso. La población sabe que nunca bajaremos demasiado sus pensiones, pero... les dará más confianza si codificamos un mínimo. Porque, claro, la democracia es voluble; si se eligiera a la persona adecuada, ¡podrían temer por sus pensiones!\n\nSe acabó el miedo, solo habrá tranquilidad para Alemania y sus mayores."
 GER_strengthen_pro_union_laws: "Reforzar leyes prosindicales"
 GER_strengthen_pro_union_laws_desc: "Nuestros sindicatos son la primera línea de defensa contra las prácticas empresariales explotadoras. Se enfrentan a la avaricia de los empresarios y luchan por los derechos de nuestros ciudadanos más importantes, el alma de la economía alemana: los trabajadores. Los trabajadores fabrican nuestros productos y ayudan a distribuirlos; sin ellos, no somos nada. Entonces, ¿por qué no deberían recibir el trato que su importancia les otorga? Alemania tiene una larga historia de defensa de los derechos de los trabajadores, y en ocasiones se nos ha llamado el \"paraíso obrero\". Tenemos la firme intención de mantener ese título en el futuro, y lo haremos fortaleciendo a los sindicatos."
 GER_burgergeld: "Formalizar el Bürgergeld"
 GER_burgergeld_desc: "El Bürgergeld es una propuesta de salario para el desempleo. Quienes lamentablemente son despedidos en estos tiempos tumultuosos pueden encontrar consuelo en que los impuestos que pagan vuelven a sus manos en momentos de necesidad. Los alemanes sin hogar son una imagen trágica, y lo último que queremos son casas y estómagos vacíos por una simple recesión económica. Formalicemos el Bürgergeld para garantizar que, en futuras crisis económicas, no sometamos a nuestros ciudadanos más pobres a la indigencia y la pobreza mientras buscan un nuevo trabajo."
 GER_revisit_refugee_policy: "Revisar la política de refugiados"
 GER_revisit_refugee_policy_desc: "Con el colapso de Arabia Saudita, estamos recibiendo otra oleada de refugiados de Medio Oriente. El partido radical antimigrante AfD ya ha obtenido una cantidad increíblemente alta de votos para su corta trayectoria debido a la última afluencia, y si permitimos otra afluencia, podría verse reforzado aún más. Puede que sea correcto ayudar a estas personas, pero ¿podrá nuestra situación interna resistirlo? Convoquemos al Bundestag; nos esperan unas semanas intensas."
 GER_tackle_political_extremism: "Enfrentar el extremismo político"
 GER_tackle_political_extremism_desc: "El statu quo debe mantenerse. La AfD no puede someternos a los partidos de la vieja guardia con la fuerza. La CDU y el SPD se han enfrentado a todos los partidos similares, al NPD, el antiguo Partido del Imperio Alemán. Desde Adenauer, nos hemos opuesto a cualquier tipo de extremismo, incluyendo a la maldita Die Linke, la encarnación de la Alemania Democrática. Que la BfV se meta en sus asuntos; con suficiente suciedad, destrozaremos su asamblea reaccionaria como antes."
 GER_anti_russian_bullwark: "Baluarte antirruso"
 GER_anti_russian_bullwark_desc: "Alemania fue en su día un baluarte antibolchevique, pero en esta era moderna, con el colapso de la Unión Soviética y la vieja retórica contaminada, podemos darle una nueva capa de pintura para reforzar nuestra posición en la OTAN. Rusia se acerca, lo reconozca Europa o no, y Alemania estará preparada, junto con sus aliados orientales, para afrontar la amenaza cuando llame a la puerta."
 GER_putinversteher: "Putinversteher"
 GER_putinversteher_desc: "Putinversteher se refiere a un grupo de políticos alemanes que son sabidos de simpatizar con Putin. Entre ellos, destaca el excanciller del SPD, Gerhard Schröder. Algunos incluso lo consideran el artífice de la formación de esta camarilla. Sin embargo, cediendo ante ellos, podemos lograr un acceso económico único al mercado ruso a pesar de las sanciones de los aliados. Puede que no parezca inteligente para todos, pero ¿a nosotros? Simplemente escuchamos a Bismarck.\n\n\"¿El secreto de la política? Firmar un buen tratado con Rusia\"."
 GER_invest_in_defense_contractors: "Industria alemana de avanzada"
 GER_invest_in_defense_contractors_desc: "La dependencia de Europa de las cadenas de suministro externas de semiconductores ha pasado de ser un inconveniente económico a una vulnerabilidad estratégica. Con la producción en el este de Asia interrumpida y la capacidad estadounidense absorbida por la inestabilidad interna, el acceso a chips avanzados ya no puede darse por sentado. Sin semiconductores seguros, la industria moderna se paraliza: vehículos, redes energéticas, comunicaciones y sistemas militares, todos dependen de componentes medidos en nanómetros.\n\nConstruir un ecosistema de chips doméstico requerirá inversión a largo plazo, experiencia técnica y una estrecha coordinación entre instituciones de investigación, fabricantes y el estado. Las fundiciones no aparecen de la noche a la mañana, y los errores serán costosos. Sin embargo, la alternativa, la dependencia permanente de proveedores extranjeros fragmentados, es peor. Al comprometer recursos ahora, Europa puede recuperar el control sobre una tecnología que sustenta casi todos los sectores de su economía y asegurar que futuras crisis no dejen a sus industrias ciegas e inactivas."
 GER_call_for_european_unity: "Llamar a la unidad europea"
 GER_call_for_european_unity_desc: "Europa se encuentra en su hora más desesperada. Estamos rodeados por todos lados por tiranos autoritarios que desean destruir las ideas mismas de la democracia. Nuestro mayor aliado, Estados Unidos, no está en condiciones de ayudarnos; está demasiado ocupado lidiando con sus problemas internos, que se han desbordado. Ahora, con las cartas en nuestra contra, es crucial más que nunca asegurar que Europa se mantenga fuerte frente al oso ruso. La democracia muere en la oscuridad y Europa muere en la desunión. Debemos estar más unidos que nunca contra el enemigo común del este, para no fracasar y dejar que Europa caiga en la opresión."
 GER_aid_ukraine: "Ayudas a Ucrania"
 GER_aid_ukraine_desc: "Si la invasión de Crimea en 2014 nos ha demostrado algo, es que Ucrania necesita urgentemente ayuda económica y militar. En los últimos meses, los rusos no han hecho más que consolidar su poder, tanto blando como duro. Sus amenazas, ya sean formales o creíbles, han demostrado que su objetivo es atacar a Ucrania pronto. Las fuerzas armadas ucranianas siguen estando atrasadas, incluso hoy, y en el peor de los casos, no podrán defenderse de un ataque ruso. No podemos tolerar esto y debemos enviar la mayor ayuda posible a los ucranianos para fortalecer su ejército y su economía."
 GER_support_volt_europa: "Apoyar a Volt"
 GER_support_volt_europa_desc: "Volt Europa es una organización federalista paneuropea que agrupa a varios partidos de todos los Estados miembros de la UE bajo el nombre de Volt. Su objetivo es la federalización de la UE. Esta organización defiende la democracia liberal y se alinea firmemente con los valores que han cimentado nuestra nación. Ante una posible guerra con Rusia, Europa debe estar lo más unida posible, y nada la unificaría más que un solo estado. Lo mejor para nuestra nación es apoyar abiertamente a Volt Europa; con nuestro apoyo, quizás su sueño se haga realidad y Europa se una para siempre."
 GER_europe_united_strong: "Europa unida y fuerte"
 GER_europe_united_strong_desc: "Europa siempre ha sido un continente plagado de inestabilidad, guerra y destrucción. A pesar de ello, Europa también es un continente de increíble belleza y una cultura indescriptiblemente rica. Sin embargo, nos enfrentamos a otro obstáculo que amenaza con hundir a Europa de nuevo en la destrucción y la guerra: Rusia. Rusia es la antítesis de todo lo que hemos construido; quieren derribar las hermosas culturas que conforman Europa para colonizar a sus vecinos como los orcos que son; quieren convertir Europa en un infierno opresivo; y lo peor de todo, cobran fuerza cada día. Pero la esperanza no está perdida; existe una línea de defensa contra la amenaza rusa: la Unión Europea. Ahora estamos más unidos y más fuertes que nunca. Los rusos creen que pueden invadir nuestras tierras y brutalizar a nuestra gente, ¡pero se equivocan! Si nos atacan, Europa estará preparada."
 GER_align_to_the_right: "Girar a la derecha"
 GER_align_to_the_right_desc: "Alemania es una nación explotada por potencias extranjeras; no gana absolutamente nada cooperando con las políticas insensatas de sus vecinos y solo sirve para demostrar a los extranjeros que nuestros políticos traidores se conforman con permitir que su nación sea manipulada e intimidada. Compartimos nuestra economía con estas naciones, y cuando una de ellas se equivoca, ¡sufrimos las consecuencias! Dejamos entrar a miles de inmigrantes sin importarles en absoluto cómo afectará al pueblo alemán. Todo este ridículo terminará ahora. Nos aseguraremos de que partidos como la AfD tomen el poder, Alemania dejará de ser el hazmerreír de Europa y se destacará por encima del resto."
 GER_flame_anti_russian_sentiment: "Avivar sentimientos antirrusos"
 GER_flame_anti_russian_sentiment_desc: "El oso ruso se moviliza de nuevo, su naturaleza feroz nunca se contiene. Estos orcos nos inculcaron mentiras de que Yeltsin convertiría a Rusia en un estado pacífico y democrático, como nosotros. Pero fuimos necios al creerles, fuimos necios al pensar que esta nación, que ha asolado Europa de diversas formas durante siglos, podría haber elegido la paz. No, los rusos son como hienas sentadas en sus rocas, buscando cualquier señal de debilidad; y cuando nos ven flaquear un instante, atacan como las serpientes que son. Pronto, toda Europa sabrá que los rusos son asesinos y engañadores; nunca más permitiremos que nos engañen."
 GER_fighting_the_pandemic: "Combatir la pandemia"
 GER_fighting_the_pandemic_desc: "El virus COVID-19 ha infectado oficialmente a su primer ciudadano alemán. Desafortunadamente, no podemos hacer mucho por ellos ahora, salvo rezar por su salud y brindarles el tratamiento adecuado. Sin embargo, la situación no es muy desoladora para el resto del pueblo alemán, si es que tenemos algo que decir al respecto, eso seguro. Hay que detener el virus de inmediato antes de que pueda matar a más personas inocentes. Confinaremos el país, daremos a nuestra gente los medios para protegerse y nos convertiremos en una nación libre de COVID cueste lo que cueste."
 GER_mask_requirements: "Uso obligatorio de mascarillas"
 GER_mask_requirements_desc: "La mascarilla. Nuestra principal herramienta de protección contra el COVID-19. Esta sencilla herramienta se utiliza para evitar que el COVID-19 infecte a los millones de alemanes que la usan y, por extensión, para mantener la seguridad del país. Sin embargo, algunas personas, por alguna razón, necesitan más convicción para protegerse de un virus que está matando a miles de personas en todo el mundo. Es casi como si quisieran contagiarse. Por eso, debemos asegurarnos de que todos los alemanes se pongan la mascarilla, tanto en interiores como en exteriores, para detener de una vez por todas la propagación."
 GER_fight_back_against_covid_narrative: "Luchar contra la narrativa"
 GER_fight_back_against_covid_narrative_desc: "Los esfuerzos del Gobierno por \"detener la propagación\" no son más que un ejercicio tiránico de poder. Millones de nuestros jóvenes están confinados en casa, obligados a pudrirse frente a la computadora cuando se supone que deberían jugar y estar al aire libre en estos hermosos días. Las mascarillas hacen mucho más daño que bien; solo dificultan la respiración y, como resultado, dañan la mente. Lo único que el pueblo alemán necesita para detener la propagación de este virus artificial es inmunidad natural, ¡nada de vacunas ni ninguna otra jerga médica!"
 GER_support_querdenken_711: "Apoyar a Querdenken 711"
 GER_support_querdenken_711_desc: "Querdenken 711 es un grupo de protesta contra las restricciones por la pandemia. Entienden que estas supuestas medidas de seguridad no son más que una farsa, utilizadas únicamente para ejercer el poder tiránico del Gobierno sobre la buena gente de Alemania. Sin duda, tienen razón, y es nuestro deber demostrarles que no solo nos solidarizamos con ellos, sino que apoyamos abiertamente su lucha para acabar con estas medidas autoritarias de una vez por todas. Es nuestro deber apoyarlos."
 GER_crackdown_on_protests: "Reprimir protestas"
 GER_crackdown_on_protests_desc: "Si bien es un derecho de la gente salir a protestar contra la injusticia percibida, también tenemos un virus mortal propagándose, y estas protestas no hacen más que contribuir a su propagación a más personas en todo el país e inevitablemente causar más muertes. Tiempos extraordinarios requieren medidas extraordinarias, por lo que es nuestro deber dispersar estas protestas dañinas por todos los medios, utilizando todas las herramientas a nuestro alcance. La propagación del COVID se detendrá, por todos los medios necesarios."
 GER_reopen_the_country: "Reabrir el país"
 GER_reopen_the_country_desc: "Tras meses de turbulencia, los casos de COVID han disminuido significativamente, y con ellos las muertes. Parece que lo peor del COVID-19 por fin ha pasado. Tras tanto tiempo aislados del mundo exterior, nuestra economía ha sufrido un ligero golpe, pero no durará mucho. Con la reapertura de la economía y las fronteras, el turismo ha experimentado un auge sin precedentes en décadas. Se han recaudado millones de euros, y sin duda estamos cosechando los frutos. Con un poco más de turismo y comercio, Alemania no solo se recuperará, ¡sino que florecerá como nunca antes!"
 GER_partial_rearmament: "Rearme parcial"
 GER_partial_rearmament_desc: "Tras eludir la verdad durante demasiado tiempo, debemos afrontarla. A pesar del oscuro pasado de Alemania, que nos ha impedido rearmarnos, ahora es evidente que solo nos quedaríamos nosotros mismos y el resto de Europa si la agresión rusa alcanzara nuestras fronteras. Las democracias de todo el mundo se encuentran en una posición más peligrosa que nunca. Nuestro mayor aliado, Estados Unidos, no puede defendernos; y, por extensión, el mayor factor disuasorio contra el imperialismo ruso ha desaparecido. Ahora los oportunistas huelen sangre en el agua. Ha quedado clarísimo que, para defender a Europa de la amenaza inminente, debemos rearmarnos y prepararnos para un conflicto con los rusos."
 GER_fuel_alternative_future: "Futuro de combustible alternativo"
 GER_fuel_alternative_future_desc: "El futuro está en los combustibles alternativos, ya sean nucleares o renovables. Dentro de unas décadas, podemos estar seguros de que los vehículos funcionarán cada vez más con nuestra robusta y limpia red energética. El carbón ya no impulsará el avance energético de nuestra nación, ni dependeremos más de las importaciones extranjeras de gas natural. Ahora tenemos opciones naturales, limpias y ecológicas para nuestra gente. Hemos tomado las decisiones correctas para un futuro limpio."
 GER_one_europe_one_vision: "Una Europa, una visión."
 GER_one_europe_one_vision_desc: "Hemos recorrido el mundo defendiendo los intereses europeos, cerrando acuerdos comerciales que beneficiarán a toda Europa, nos hemos esforzado por unir a Europa, vinculándola a Alemania y a ella con Europa. ¡Unidos en visión y voluntad, podemos lograrlo todo! Sobre todo ahora que hemos conseguido socios alternativos en el escenario mundial."
 GER_promote_public_transportation: "Promover el transporte público"
 GER_promote_public_transportation_desc: "El transporte público es un medio de transporte energéticamente eficiente y un elemento emblemático de las ciudades alemanas. Ampliarlo y promover su uso reduce el consumo energético y la congestión vehicular. No tiene inconvenientes."
 GER_european_green_deal: "Pacto Verde Europeo"
 GER_european_green_deal_desc: "¡Lo que hacemos por nosotros mismos, deberíamos hacerlo por Europa! ¡Nuestro impulso a las energías renovables es en vano si solo nosotros lo hacemos! Extendamos un pacto verde a nuestros socios económicos; todos nos beneficiaremos: ¡aire más limpio, Europa más limpia! ¡No olvidemos los beneficios económicos! Claro que esto nos deja en último lugar, pero lo que es bueno para Europa, a la larga, también lo será para nosotros."
 GER_depression_recovery: "Recuperación de la depresión"
 GER_depression_recovery_desc: "Anteriormente, nuestra economía comenzaba a convertirse en una máquina bien engrasada; una máquina que generaba riqueza tanto para la nación como para el pueblo. Pero, justo cuando pensábamos que nuestra economía empezaba a crecer, la pandemia la desbarató. El trabajador alemán está sufriendo, es pobre, está desempleado y ha perdido sus inversiones casi de la noche a la mañana. Es deber de nuestra nación acabar con esto a toda costa y recuperarnos. Gracias a nuestros programas, la economía alemana no solo se recuperará, sino que alcanzará cotas nunca antes vistas en Europa."
 GER_defenders_of_democracy: "Defensores de la democracia"
 GER_defenders_of_democracy_desc: "El pueblo alemán tiene ahora una nueva carga que llevar, aunque aún no se dé cuenta. Con Estados Unidos enfrentando un caos interno sin precedentes, la responsabilidad de salvaguardar la democracia de los dictadores que nos rodean recae sobre la nación alemana y el propio pueblo alemán. Debemos estar a la altura del legado de Estados Unidos, pero también debemos superarlo. No caeremos en los mismos errores que Estados Unidos. No solo protegeremos la democracia de la amenaza rusa, sino que nos aseguraremos de seguir siendo un faro de libertad que brille en cada rincón del planeta."
 GER_integrate_american_airbases: "Integrar bases aéreas americanas"
 GER_integrate_american_airbases_desc: "En lo que podría ser el evento más trágico del siglo XXI, Estados Unidos se ha visto sumido en una situación de guerra civil increíblemente devastadora y compleja. Es terrible, pero todas las tragedias también traen consigo oportunidades. A medida que Estados Unidos comenzaba a desmoronarse, muchos soldados fueron retirados de bases extranjeras y enviados de regreso para defender su hogar en tiempos de crisis. Esto ha dejado vacías casi todas las bases aéreas estadounidenses dentro de nuestras fronteras. Ahora que Norteamérica se encuentra en caos, ya no necesita estas bases aéreas. Sin embargo, a medida que la amenaza de Rusia crece día a día, es evidente que la OTAN las necesita para defender Europa. Debemos integrar estas bases aéreas vacías; no las dejaremos abandonadas."
 GER_europes_darkest_hour: "La hora más oscura de Europa"
 GER_europes_darkest_hour_desc: "Los llevamos al corazón de Rusia, pensamos que estaban acabados, nos equivocamos..."
 GER_arsenal_of_democracy: "Arsenal de la Democracia"
 GER_arsenal_of_democracy_desc: "Somos la mayor economía industrial de Europa, por lo que nos toca asumir el papel de Arsenal de la Democracia. Raytheon se intercambia por Rhinemetall. Las naciones europeas recurrirán a Alemania para compensar sus carencias y nosotros responderemos a sus peticiones."
 GER_defenders_of_europe: "Defensores de Europa"
 GER_defenders_of_europe_desc: "Alemania es uno de los países más poblados de la OTAN; ahora es el más rico debido a la ausencia de Estados Unidos. Se espera que seamos el nuevo escudo de Europa. Por lo tanto, debemos esforzarnos al máximo y reconstruir nuestro militarismo desde cero: militarismo por la libertad. ¡Für Freiheit!"
 GER_bolster_bmvi: "Reforzar el IGFV"
 GER_bolster_bmvi_desc: "El Instrumento de Gestión de Fronteras y Visados es una agencia aduanera paneuropea que opera justo en la frontera de la UE. Al asumir la función de una agencia aduanera en cualquier nación estándar, esta organización unifica la economía europea en un solo organismo. Sin embargo, presenta sus deficiencias. Es necesario fortalecerla para que Europa cuente con una agencia aduanera que pueda gestionar eficientemente el gran volumen de comercio entrante y saliente."
 GER_empower_the_chancellor: "Empoderar al canciller"
 GER_empower_the_chancellor_desc: "La BfV trabaja para garantizar la defensa de la Constitución alemana. Junto con la BfV, el canciller también trabaja para garantizar la protección de los derechos del pueblo alemán y su seguridad. Pero ahora mismo, nuestra sociedad se ve amenazada por grupos maliciosos que pretenden no solo restringir los derechos de los alemanes, sino también destruir la democracia que sustenta nuestra nación. No podemos permitir que esto continúe, y nos duele tomar estas medidas. Sin embargo, tenemos claro que no podemos permitir que algunas de estas organizaciones malignas sigan en la política alemana, por lo que la mejor opción es empoderar al canciller y comenzar a prohibirlas para salvaguardar la libertad."
 GER_set_an_american_policy: "Establecer una política americana"
 GER_set_an_american_policy_desc: "Parece que las luchas internas que han asolado a Estados Unidos desde el fin de la Guerra Fría finalmente han llegado a su punto crítico. Dos Gobiernos, que se proclaman legítimos, han comenzado a enfrentarse en una sangrienta guerra civil. Pero la situación es más compleja de lo que nuestros analistas podrían haber predicho; desde Nueva Inglaterra hasta California, reina la anarquía mientras milicias radicales, bandas y Gobiernos estatales luchan por el control de sus estados, y posiblemente de todo el país. Esta terrible situación ha dado lugar a una simple pregunta: ¿A quién apoyamos? El tiempo apremia, y debemos decidir ahora qué gobierno es legítimo en esta guerra civil, si es que apoyaremos a alguno."
 GER_germany_first: "Alemania primero"
 GER_germany_first_desc: "Durante demasiado tiempo, hemos priorizado los intereses de naciones extranjeras sobre los del pueblo alemán. Hemos empantanado nuestra economía en interminables acuerdos comerciales que nos atan a bombas de relojería de economías mal gestionadas. El pueblo alemán se empobrece cada vez más, mientras que las élites en la cima, que se benefician de estos acuerdos, se enriquecen cada vez más. Nuestros políticos incompetentes se niegan a hacer nada al respecto porque están demasiado ocupados asistiendo a miles de reuniones en el extranjero. Claro, nuestros aliados pueden tener dificultades, pero nosotros también. ¿Y cómo podemos esperar enfrentarnos a los rusos si ni siquiera somos capaces de abordar nuestros problemas internos? No podemos. No debemos permitir que nuestra nación caiga en el declive y la discordia por esto. ¡Debemos asegurarnos de que Alemania sea la prioridad en todos los asuntos!"
 GER_restore_bundeswehr_pride: "Restaurar el orgullo de la Bundeswehr"
 GER_restore_bundeswehr_pride_desc: "Durante demasiado tiempo, la Bundeswehr ha sido objeto de burlas internacionales por su reducido tamaño y escasa financiación. El orgullo y la confianza de nuestro pueblo en nuestras fuerzas armadas están en su punto más bajo. Esto terminará hoy; ya no permitiremos que la Bundeswehr sea el hazmerreír de Europa y del mundo. Nuestro pueblo merece estar orgulloso de su ejército; necesita creer que podemos defender a Europa de la amenaza rusa. Haremos todo lo posible para restaurar el orgullo de la Bundeswehr; sabrán que nuestro ejército es fuerte y los protegerá."
 GER_common_agrigultural_policy: "Política Agrícola Común"
 GER_common_agrigultural_policy_desc: "Europa debe trabajar hacia una política agrícola común. Por el bien de nuestros paladares y de nuestros agricultores, la agricultura debe ser un proceso racionalizado en todas nuestras naciones. Durante demasiado tiempo, los agricultores han utilizado pesticidas que han tenido efectos nefastos en la salud de los ecosistemas de Alemania; pronto los limitaremos. Un medio ambiente sano significa cultivos y animales sanos. Aunque los agricultores discrepen inicialmente, comprenderán la razón una vez que estos cambios comiencen a hacerse realidad. Alemania será un bastión de la agricultura sana y ecológica para todo el mundo; una nación de personas sanas y, por extensión, felices."
 GER_deal_with_visegrad: "Lidiar con Visegrado"
 GER_deal_with_visegrad_desc: "El Grupo de Visegrado a menudo se considera la raíz del movimiento euroescéptico, sintiéndose desatendido por la UE y actuando como una Unión dentro de la Unión. Podemos hacer más para que Polonia y todo el Grupo de Visegrado se sientan bienvenidos y bien atendidos. Empecemos por integrarlos al euro. Por suerte, sus monedas no son fuertes ni están marcadas con la cara de un monarca, así que podríamos convencerlos."
 GER_balkan_diplomacy: "Diplomacia balcánica"
 GER_balkan_diplomacy_desc: "Los Balcanes son una región estratégica y rica en recursos. A pesar del caos político que enfrentó la región tras la disolución de la Unión Soviética, el potencial que encierra esta zona es innegable. El petróleo rumano, por ejemplo, estos recursos infrautilizados podrían ser cruciales para asegurar el futuro de Europa y Alemania en el peor de los casos. Para obtener estos recursos, es fundamental mejorar nuestras relaciones con los países balcánicos y obtener una ventaja diplomática sobre los oportunistas rusos. Las guerras no se ganan solo con la fuerza bruta y el acero, sino con la diplomacia y el dominio del arte de la conversación."
 GER_tackle_traffic_light_coalition: "Socavar la coalición semáforo"
 GER_tackle_traffic_light_coalition_desc: "La coalición semáforo, compuesta por el SPD, el FDP y Die Grünen, ha sido una constante molestia para la CDU. Tras años de solo causar molestias al pueblo alemán, estamos hartos. Hay que desmantelar esta coalición cuanto antes. Hay muchas opciones para acabar con este dolor de cabeza. Podríamos desmantelar su coalición ofreciendo a sus miembros un mejor acuerdo que el SPD, o simplemente persuadir al SPD para que se una a nuestra coalición, hundiendo al resto en la oscuridad electoral. En cualquier caso, ¡la coalición semáforo caerá en el olvido cuando terminemos con ella!"
 GER_eu_economic_integration: "Integración económica europea"
 GER_eu_economic_integration_desc: "Mediante la creación del IGFV, podremos profundizar la integración de las economías de la UE. La organización mantiene una frontera aduanera común a lo largo de la frontera exterior de la Unión. Por lo tanto, todo el comercio que entra en la Unión Europea pasará por la aduana en el puerto de entrada, prescindiendo de las agencias aduaneras nacionales individuales."
 GER_support_caucasian_independence: "Diplomacia caucásica"
 GER_support_caucasian_independence_desc: "Tras la invasión de Georgia por Medvédev en 2008 y las anteriores guerras de Abjasia tras la caída de la Unión Soviética, Georgia ha sido el foco de la discordia contra Rusia en la región del Cáucaso; incluso naciones como Armenia y Azerbaiyán no han sido totalmente obedientes a los rusos. Como muchos han dicho antes, las guerras no se ganan solo con las balas, sino con las palabras y la tinta. Deberíamos intentar acercarnos a las naciones caucásicas. Si lo hacemos, quizás nos ganemos su confianza y lealtad."
 GER_russo_german_trade_deal: "Acuerdo comercial ruso-alemán"
 GER_russo_german_trade_deal_desc: "Rusia y Alemania han disfrutado de relaciones comerciales relativamente amistosas desde la Cancillería de Schröder. En estos momentos, no hay razón para generar controversia con Rusia. Nuestros lazos sin duda mantendrán la paz entre Rusia y la UE. Podemos ayudarnos mutuamente. Al eludir las sanciones que afectan a Rusia, podemos obtener acceso exclusivo a recursos vitales de los que quizá no tengamos suficiente, como el preciado GAZPROM y su enorme suministro de petróleo, así como otras materias primas."
 GER_improve_the_eurocopter: "Mejorar el Eurocopter"
 GER_improve_the_eurocopter_desc: "El Eurocopter, al igual que el Eurofighter, se creó en colaboración con la investigación de varias naciones europeas como vehículo aéreo universal para una amplia gama de aplicaciones. Desde el transporte médico hasta funciones policiales, incluso por operaciones militares, el Eurocopter es realmente un todo en uno. Pero, como todo, necesita una actualización. El Leopard 2 ha sido sometido a varias actualizaciones y ahora es el momento de lanzar una para nuestros Eurocopters."
 GER_tackle_corporations: "Afrontar las corporaciones"
 GER_tackle_corporations_desc: "A lo largo de la historia alemana, las corporaciones han sido responsables de gran parte de la corrupción política y la desigualdad que ha permeado la nación alemana. En su afán de lucro, han utilizado todos los medios posibles para asegurarse de obtener la mayor cantidad de dinero posible. El sufrimiento humano causado por esto es inmenso e indescriptible; y debe detenerse. Nos aseguraremos de que las corporaciones no solo nos devuelvan lo que han recibido, sino también a las personas que durante tanto tiempo han explotado con su poder y riqueza. ¡El pueblo alemán prosperará!"
 GER_protect_the_german_economy: "Proteger la economía alemana"
 GER_protect_the_german_economy_desc: "La economía alemana sigue siendo considerada una de las más fuertes, o incluso la más fuerte, del continente europeo en su conjunto. La guerra contra las hordas rusas ha dejado a nuestra economía y a nuestra nación en una situación vulnerable. Debemos consolidar el control y proteger nuestro poder económico por todos los medios a nuestra disposición y actuar."
 GER_prepare_for_new_decade: "Prepararse para la nueva década"
 GER_prepare_for_new_decade_desc: "Con casi todos los enemigos y dificultades de Europa prácticamente superados, debemos prepararnos y aceptar el futuro que nos espera y volver a la normalidad. Para ello, primero debemos desmovilizar nuestra economía de guerra, volver al consumismo y priorizar su revitalización y desarrollo."
 GER_invest_in_automation: "Invertir en automatización"
 GER_invest_in_automation_desc: "A medida que avanzamos lentamente hacia una nueva era para nuestra nación, también debemos preparar nuestros centros industriales para el futuro. Comenzaremos a invertir en el desarrollo de maquinaria automatizada para todos nuestros sectores industriales y fábricas, eliminando la necesidad de mano de obra humana y, con ello, mejorando nuestra capacidad y esfuerzos de producción en general."
 GER_ai_development: "Desarrollo de IA"
 GER_ai_development_desc: "La inteligencia artificial será la piedra angular que forjará el nuevo camino en nuestra nueva era durante las próximas décadas, tanto en el desarrollo corporativo como en el militar. Debemos liderar el desarrollo de la IA y ser uno de los primeros de muchos países que dominarán los campos tecnológicos."
 GER_expand_broadband_infrastructure: "Ampliar infraestructura de banda ancha"
 GER_expand_broadband_infrastructure_desc: "La importancia de nuestra infraestructura en Broadway es fundamental, ya que proporciona internet y comunicaciones de alta velocidad en amplias áreas de nuestro país. Impulsaremos la construcción y expansión de nuestra infraestructura con el objetivo de brindar a más comunidades rurales un acceso a internet confiable y rápido, lo que permitirá una mejor conectividad para la educación, la salud, los negocios y el uso personal."
 GER_walkable_cities: "Ciudades caminables"
 GER_walkable_cities_desc: "Las ciudades caminables son famosas en Europa, y especialmente en Alemania. Mejoremos la idea de aumentar el transporte público y el acceso a los servicios a pie. Reduciremos las emisiones, el consumo de combustible y aumentaremos la felicidad de nuestra gente. ¿A quién no le apetece un paseo relajante hasta la panadería, ja?"
 GER_industrial_modernization: "Modernización industrial"
 GER_industrial_modernization_desc: "En esta nueva era, estamos atravesando una nueva Revolución Industrial. A medida que la automatización comienza a reemplazar la maquinaria operada por humanos, los ingenieros y técnicos cobran mayor importancia para el funcionamiento sostenible de estas fábricas robóticas. Promovamos las escuelas de oficios y otorguemos subsidios a quienes buscan formación en robótica. Su campo cobrará importancia a medida que la automatización siga creciendo junto con ellos."
 GER_computing_research: "Investigación en informática"
 GER_computing_research_desc: "La informática y la investigación en computación en su conjunto desempeñan un papel fundamental para garantizar el desarrollo nacional de la inteligencia artificial, la ciberseguridad y el análisis de datos. Ampliaremos las áreas de investigación, mejoraremos la eficiencia y desarrollaremos soluciones innovadoras que impacten en diversos campos e industrias."
 GER_german_edgenuity: "Ingenio alemán"
 GER_german_edgenuity_desc: "El ingenio alemán está escrito en los libros de historia: cientos de inventos, miles de inventores, ciencia que se remonta siglos atrás. Inventamos el cohete y reinventaremos la rueda si el momento lo requiere. El mundo conoce nuestro ingenio, y haríamos bien en mantener la calidad alemana como sinónimo."
 GER_expand_consumer_market: "Expandir el mercado de consumo"
 GER_expand_consumer_market_desc: "Alemania es la mayor economía de Europa y una de las más grandes del mundo, con una base de consumidores diversa y un reconocido énfasis en la calidad. Al adoptar el comercio electrónico y las nuevas oportunidades de exportación, no solo podemos expandir nuestro mercado de consumo, sino también adaptarnos a las cambiantes preferencias de los consumidores y a las tendencias globales."
 GER_engineering_marvel_of_europe: "Maravilla de la ingeniería europea"
 GER_engineering_marvel_of_europe_desc: "Alemania suele considerarse la maravilla de la ingeniería europea, con grandes empresas como Volkswagen, BMW, Bosch y Siemens reconocidas por su innovación. Mediante la inversión en tecnologías emergentes, la modernización de los programas de ingeniería y el fortalecimiento de nuestras alianzas globales, podemos mantener y fortalecer nuestra posición como potencia económica dominante."
 GER_host_american_companies: "Acoger empresas estadounidenses"
 GER_host_american_companies_desc: "Numerosas empresas estadounidenses han expresado su interés en trasladar sus operaciones parcial o totalmente a nuestro país, incluyendo importantes compañías de telecomunicaciones como AT&T y fabricantes aeroespaciales como Lockheed Martin. Gracias a nuestra mano de obra cualificada y a las oportunidades de nuevas colaboraciones, podemos establecer acuerdos aduaneros favorables y exenciones fiscales para mejorar la eficiencia comercial de las empresas estadounidenses que operan en Alemania."
 GER_work_with_technocrats: "Colaborar con tecnócratas"
 GER_work_with_technocrats_desc: "Colaborar con tecnócratas -profesionales que toman decisiones basándose en su experiencia técnica y no solo en su afiliación política- impulsaría la innovación y fortalecería nuestra economía. Designaremos tecnócratas en puestos clave de asesoría e impulsaremos proyectos conjuntos entre agencias gubernamentales y empresas del sector privado para mejorar la eficiencia y reafirmar la toma de decisiones basada en la evidencia mediante el conocimiento de expertos."
 GER_invest_in_bio_fuels: "Invertir en biocombustibles"
 GER_invest_in_bio_fuels_desc: "Además de reducir las emisiones de gases de efecto invernadero, invertir en biocombustibles diversificará nuestras fuentes de energía y creará empleos en la agricultura, la producción y el desarrollo tecnológico, impulsando la innovación. Además, esto nos permitirá reducir los residuos y promover la eficiencia de los recursos. Estableceremos un porcentaje mínimo del 10% de uso de biocombustibles en el transporte, subvencionando el biodiésel y los combustibles Fischer-Tropsch en un programa que aumentará la producción nacional."
 GER_harness_power_of_atom: "Usar el poder del átomo"
 GER_harness_power_of_atom_desc: "La investigación sobre la fisión nuclear es fundamental para nuestro país, especialmente en el contexto de la política energética, donde los avances en este campo generarían innovación masiva y la creación de numerosos empleos. Asignaremos fondos específicamente para la investigación sobre la fisión nuclear, colaborando con instituciones de investigación y universidades para fomentar la formación en ciencia e ingeniería nuclear. La fisión nuclear nos proporcionaría una fuente de energía estable y fiable, diversificando nuestras fuentes de energía y reduciendo nuestra dependencia de las importaciones."
 GER_renew_worker_contracts: "Renovar contratos laborales"
 GER_renew_worker_contracts_desc: "Cuando comenzó la Guerra Europea, muchos se preguntaban quién defendería a Europa de la amenaza rusa. Hoy en día, muchos creen que los héroes principales fueron únicamente los soldados en el frente y los miles que trabajan en la Bundeswehr. Si bien esos pocos valientes son héroes, no fueron los únicos que contribuyeron al esfuerzo bélico. Al igual que el soldado, el trabajador de la fábrica contribuyó a la defensa de Europa. Con su sangre, sudor y lágrimas, los trabajadores del frente interno produjeron municiones para abastecer a nuestras tropas en Europa Oriental; y gracias a su esfuerzo, salimos victoriosos. No debemos permitir que se queden al margen de nuestros esfuerzos económicos; debemos renovar sus contratos y permitirles seguir trabajando."
 GER_expand_eus_reach: "Extender el alcance de la UE"
 GER_expand_eus_reach_desc: "En muchos sentidos, la Unión Europea es simplemente una extensión del poder del Estado alemán, ya que formamos su centro económico. De ello se desprende que lo que beneficia la expansión de la UE beneficia el crecimiento de Alemania. Utilizaremos nuestra influencia en las instituciones federales para intensificar el alcance de la unión y consolidar nuestra posición como su máximo responsable."
 GER_unify_our_goals: "Unificar nuestras metas"
 GER_unify_our_goals_desc: "La mayor debilidad de la democracia es la división. La democracia se debilita cuando los políticos optan por argumentos mezquinos en lugar de ayudar al pueblo. Esto no ha hecho más que demostrar a los dictadores que las democracias no funcionan y les ha dado munición para la propaganda. Miren a Estados Unidos: sus divisiones y argumentos mezquinos los han llevado a despedazarse como animales. Ahora, Europa se encuentra sola frente al oso ruso. No podemos permitir que esto nos suceda, y desde luego no podemos dejar que nuestros antiguos aliados europeos se enfrenten solos a la Amenaza Oriental. Algunos se preguntarán cuál es la solución, pero es muy sencilla: unirnos. Debemos unir a nuestros partidos y establecer objetivos comunes para asegurar que el futuro de Alemania sea lo más brillante posible."
 GER_socialisms_second_chance: "Segunda oportunidad del socialismo"
 GER_socialisms_second_chance_desc: "Con la reciente victoria de Die Linke en las elecciones federales alemanas, el recuerdo de la división de la patria tras la Segunda Guerra Mundial vuelve a la memoria de muchos de nuestros ciudadanos. Algunos lo ven como la culminación de la Ostalgie, o la añoranza de la antigua República Democrática Alemana. Otros creen que Die Linke es un producto de 1968 y de la Nueva Izquierda de Alemania Occidental, la victoria final de la larga marcha de Rudi Dutschke por las instituciones.\n\nIndependientemente de los prejuicios que algunos puedan tener, utilizaremos nuestro nuevo mandato para acoger al movimiento obrero. Demostraremos que el socialismo se puede construir en una Alemania unida y democrática. Vorwärts!"
 GER_anti_poverty_initiative: "Iniciativa contra la pobreza"
 GER_anti_poverty_initiative_desc: "Nuestro país enfrenta desafíos constantes relacionados con la pobreza a pesar de su sólida economía. Implementar subvenciones y préstamos a bajo interés para apoyar a las pequeñas empresas en zonas de bajos ingresos y desarrollar iniciativas de empleo público en comunidades marginadas permitirá a las personas acceder a capacitación esencial. Aumentar la inversión en proyectos de vivienda social garantizará a las familias de bajos ingresos viviendas asequibles y de calidad, no solo abordando el problema inmediato, sino también promoviendo la equidad social a largo plazo."
 GER_empower_the_unions: "Empoderar sindicatos"
 GER_empower_the_unions_desc: "Necesitamos empoderar a los sindicatos y fortalecer su papel en el lugar de trabajo para impulsar nuestra economía. Promulgaremos leyes que protejan los derechos de los trabajadores a organizarse, hacer huelga y negociar colectivamente, impulsando a los sindicatos a negociar mejores condiciones para sus afiliados. Fomentar la participación de los sindicatos en la incidencia política y en medidas de seguridad laboral nos permitirá mejorar la cohesión social y la satisfacción laboral, y reducir la desigualdad salarial."
 GER_tax_the_rich: "Impuestos a los ricos"
 GER_tax_the_rich_desc: "Al imponer altos impuestos sobre los dividendos, garantizaremos la circulación del dinero en lugar de concentrarse en manos de una minoría privilegiada. Esta es una de las medidas que estamos dispuestos a tomar para garantizar una sociedad más igualitaria, aunque pueda provocar la ira de unos pocos y frenar las inversiones."
 GER_work_with_private_initiatives: "Colaborar con iniciativas privadas"
 GER_work_with_private_initiatives_desc: "El sector privado es una fuente importante de empleo, impulsando las economías locales y creando nuevos puestos de trabajo. Mediante alianzas público-privadas, podremos cooperar con estas iniciativas para facilitar el desarrollo de infraestructura, tecnología y servicios. El Gobierno puede otorgar subvenciones o incentivos a estas empresas privadas para que inviertan en investigación y desarrollo. Como dijo el economista Dr. Warren Pratt: \"La empresa privada es el motor de nuestra economía\"."
 GER_broaden_the_bmf: "Ampliar el Ministerio de Finanzas"
 GER_broaden_the_bmf_desc: "Un mercado libre es uno inestable. Sin la intervención gubernamental, la economía de nuestro país se iría al garete. Si permitimos que el mercado se equilibre, se formarán monopolios, se privará a la gente de sus medios de vida y, lo más preocupante, la influencia del Gobierno podría debilitarse. Al expandir el BMF, podemos ejercer un control más estricto sobre la economía para garantizar la estabilidad y el control de nuestro Gobierno."
 GER_create_the_nwp: "Crear el NWP"
 GER_create_the_nwp_desc: "Como soñaron tantos antes que nosotros, los innumerables grandes y gigantes políticos que sentaron las bases de esta teoría económica, su formación y realización será un proceso largo y arduo. Sin embargo, estamos preparados para afrontar cualquier desafío, ya sean los ingenuos miopes de nuestra población o cualquier respuesta inesperada del mercado. Este es un nuevo siglo, una nueva era para el mundo y para Alemania, donde lo nuevo debe reemplazar a lo viejo."
 GER_the_sunflower_over_germany: "El girasol sobre Alemania"
 GER_the_sunflower_over_germany_desc: "Un nuevo día amanece en Alemania. Tras nuestra reciente victoria en las elecciones federales, estamos listos para afrontar los problemas del siglo XXI. El control de la CDU sobre el Gobierno finalmente se ha desvanecido, y con su relegación a un segundo plano, por fin tenemos la oportunidad de ocupar su lugar. El consumismo desenfrenado y la destrucción del medio ambiente han plagado nuestro país durante demasiado tiempo. Ahora, las semillas de nuestra victoria han germinado por todo el país, y un nuevo día amanece. Uno en el que la contaminación y la degradación serán reemplazadas por la renovación y el renacimiento, y los alemanes podrán volver a enorgullecerse de la belleza natural de su país."
 GER_promote_equality: "Fomentar la igualdad"
 GER_promote_equality_desc: "A pesar de los éxitos del pasado, las ideas tóxicas del odio, la intolerancia y la intolerancia aún plagan nuestra patria. La CDU, con frecuencia, se mostró apática ante el auge del odio, pero nosotros no lo haremos. Ahora que tomamos las riendas, acabaremos con el estancamiento y la apatía que se permitieron crecer durante tanto tiempo. El tallo arrancará el odio y la intolerancia. Y en su lugar, crecerán la igualdad y la coexistencia, floreciendo como girasoles para marcar el amanecer de un mañana mejor."
 GER_fight_consumerism: "Combatir el consumismo"
 GER_fight_consumerism_desc: "Desde el inicio de la globalización, el consumismo desenfrenado ha plagado Alemania como una red de enredaderas venenosas. Estas tendencias, rebajas y exhibiciones ostentosas han vuelto a nuestros ciudadanos adictos al gasto sin fin. Impulsadas por el capitalismo desenfrenado y la avaricia corporativa, las fábricas contaminan constantemente nuestros cielos con microplásticos y carcinógenos. Bajo nuestra guía, el hedor del consumo desenfrenado desaparecerá de la patria y la belleza natural de nuestra nación se restaurará una vez más."
 GER_tackle_pollution: "Combatir la contaminación"
 GER_tackle_pollution_desc: "El hermoso paisaje de nuestra Patria está cubierto de basura y nuestros cielos azules oscurecidos por las cenizas industriales. Daremos un golpe directo multando a cualquier hombre, mujer o empresa que se atreva a participar en este comportamiento inescrupuloso. Además, los enfoques sostenibles de la producción industrial se verán recompensados con generosas exenciones fiscales."
 GER_accelerate_the_nuclear_phase_out: "Rehabilitar la energía nuclear"
 GER_accelerate_the_nuclear_phase_out_desc: "La mayor vergüenza de la historia de nuestro partido siempre ha sido nuestra postura antinuclear. Nuestros miedos, desorientados por incidentes nucleares como Chernóbil, nos han cegado ante todos los grandes logros de esta fuente de energía. Ahora es el mejor momento para que nos traguemos el orgullo y aceptemos que la energía nuclear es el futuro de la patria. Muchos de nuestros más acérrimos partidarios se sentirán distanciados por nuestro repentino cambio, pero, en definitiva, es el camino que debemos recorrer para garantizar un futuro verde para nuestra nación."
 GER_invest_in_renewables: "Construcción de energías renovables"
 GER_invest_in_renewables_desc: "Con el último golpe de la bola de demolición, las centrales nucleares alemanas al menos han sido desmanteladas. En su lugar, surgirá un sistema de energía verde mejor y más seguro. Al igual que nuestros aliados estadounidenses, nos embarcaremos en un Nuevo Pacto Verde. Se renovarán presas, se construirán paneles solares y se financiarán aerogeneradores. Trabajando en conjunto con los Gobiernos locales, la energía verde se extenderá por toda Alemania como un gran filtro. Y si bien esto nos supondrá un alto coste, es en última instancia necesario para la salud y la seguridad de nuestra nación."
 GER_further_the_green_new_deal: "Impulsar el Nuevo Pacto Verde"
 GER_further_the_green_new_deal_desc: "Bajo la guía de nuestro partido y con un cuidadoso desarrollo, el Nuevo Pacto Verde no solo ha tenido éxito, sino que ha superado nuestras expectativas. Donde antes había chimeneas y torres de perforación petrolífera, ahora brotan plantas y florecen flores. Pero ¿por qué detenerse solo en la energía verde? ¿Por qué no ir más allá? Coches eléctricos, trenes de alta velocidad, ciudades sostenibles. Ninguna idea se desanimará. Bajo nuestro cuidado, Alemania no solo ha comenzado a prosperar, sino que también ha florecido. Y seremos quienes difundamos la revolución verde por toda Europa hasta que todo el continente esté libre de la degradación ecológica y la contaminación."
 GER_the_red_rose_over_germany: "La rosa sobre Alemania"
 GER_the_red_rose_over_germany_desc: "El mundo, y Alemania, se encuentran al borde del desastre. Las cicatrices del COVID apenas han comenzado a sanar, pero ahora nos enfrentamos a una nueva era de inestabilidad. Escasez de petróleo, colapso de las bolsas y el desmoronamiento del orden internacional liberal. En estos tiempos, la gente no debe quedar abandonada a los caprichos del libre mercado. Ahora que lideramos el Gobierno Federal, el SPD cumplirá sus promesas de proteger a los trabajadores de la incertidumbre económica y ampliará el Estado del bienestar alemán para garantizar que la prosperidad no sea solo para unos pocos privilegiados. Nuestras políticas orientadas a la ciudadanía sin duda guiarán a Alemania a través de la tormenta que se avecina. La socialdemocracia florecerá en Alemania una vez más y se mantendrá resiliente ante la crisis que se avecina."
 GER_expand_welfare: "Ampliar ayudas sociales"
 GER_expand_welfare_desc: "El Partido Socialdemócrata ha defendido durante mucho tiempo el principio de que un Estado del bienestar sólido no es solo un deber moral, sino una necesidad económica. Mientras continuamos nuestra lucha por una Alemania más justa, debemos ampliar el alcance de nuestros programas sociales. Nuestro mandato es fortalecer las pensiones, mejorar el acceso a la atención médica y garantizar que ningún alemán, hombre, mujer o niño, quede excluido. Aunque nuestros críticos calificarán estas medidas de excesivas e insostenibles, la historia demuestra que la inversión social genera prosperidad para todos."
 GER_economic_stabilization: "Estabilización económica"
 GER_economic_stabilization_desc: "Con el desplome de la Bolsa de Fráncfort tras el colapso de Estados Unidos y la crisis del petróleo poniendo a prueba el suministro energético de todo el bloque, Alemania y Europa deben actuar con decisión para gestionar esta nueva crisis. El Bundesbank está listo para intervenir, y en este mismo momento se están elaborando medidas de estímulo para apuntalar las industrias vulnerables a la recesión. Mientras algunos abogan por una intervención gubernamental agresiva, la mayoría advierte de una acción estatal excesiva. El Gobierno equilibrará la estabilidad con un crecimiento sostenible. De no hacerlo, esta crisis podría convertirse en una catástrofe."
 GER_increase_federal_income: "Aumentar ingresos federales"
 GER_increase_federal_income_desc: "Un Estado del bienestar más amplio y una mayor inversión pública requieren mayor financiación. Si bien algunos, como los liberales, pueden oponerse a un aumento de impuestos a los ultrarricos, nuestra gobernanza popular exige disciplina fiscal. Al implementar una subida temporal de impuestos, aseguraremos todos los recursos necesarios para ampliar los programas sociales y, por lo tanto, fortaleceremos el presente y el futuro de Alemania. Aunque pueda costarnos cierta buena voluntad política, la estabilidad y la prosperidad que brinda al pueblo alemán justificarán este sacrificio a corto plazo."
 GER_integrate_the_refugees: "Integrar a los refugiados"
 GER_integrate_the_refugees_desc: "Alemania ha sido durante mucho tiempo un faro para quienes huyen de la guerra y las dificultades, como la guerra civil siria, las crisis en Afganistán y el Congo, y a principios de la década, para cientos de miles de yugoslavos que finalmente regresaron a su patria. Pero con nuevas crisis que se desarrollan cada mes en Norteamérica y Arabia, el número de asilados no disminuirá pronto.\n\nEn lugar de rechazarlos, el Gobierno adoptará un enfoque audaz: integrarlos en la sociedad y la fuerza laboral, garantizando que contribuyan a la economía alemana. Mayores protecciones legales y programas de bienestar social brindarán a los \"nuevos alemanes\" vías para obtener la ciudadanía, y las reformas militares ofrecerán nuevas oportunidades para quienes estén dispuestos a servir a su nueva patria. Esta política, sin duda, encontrará resistencia por parte de conservadores y reaccionarios, pero en estos tiempos de convulsión, Alemania debe defender la inclusión y la solidaridad. Después de todo, ¿qué significa realmente ser alemán? Es hora de redefinir lo que significa ser Deutsch."
 GER_keep_the_rhine_red: "Mantener el Rin y el Ruhr rojos"
 GER_keep_the_rhine_red_desc: "El corazón industrial de Alemania ha sido durante mucho tiempo la columna vertebral de la lucha nacional por el socialismo. Desde las minas de la región del Ruhr hasta las bulliciosas ciudades de Renania, generaciones de socialistas y comunistas alemanes han luchado por mejores salarios, sindicatos más fuertes y una Alemania justa. Ahora, ante la incertidumbre económica que se cierne sobre el país y los partidos reaccionarios que buscan socavar estas victorias de los trabajadores, el Gobierno socialista redoblará su compromiso con la clase trabajadora. Nos aseguraremos de que la bandera roja de la socialdemocracia siga ondeando sobre Renania."
 GER_raise_the_minimum_wage: "Aumentar el salario mínimo"
 GER_raise_the_minimum_wage_desc: "Ningún trabajador alemán debería tener dificultades para vivir con dignidad. Ante el aumento de los costes y la inestabilidad económica que amenazan el sustento de millones de ciudadanos de clase media y baja, el SPD tomará medidas decisivas, aumentando el salario mínimo para garantizar un salario justo para todos. Esta reforma no es solo una medida económica; es una reivindicación de nuestro firme compromiso con la justicia social. Un mayor fortalecimiento del Estado del bienestar y la garantía de salarios dignos para los trabajadores sentarán las bases de una sociedad equitativa: una donde la prosperidad se comparta, no se acapare. Alemania demostrará una vez más que el crecimiento económico y la responsabilidad social no son fuerzas opuestas, sino que muestran al mundo que son aliados en el progreso."
 GER_the_invisble_hand_over_germany: "La mano invisible sobre Alemania"
 GER_the_invisble_hand_over_germany_desc: "Alemania ha sido el corazón del liberalismo contemporáneo, mientras el mundo se hunde en la locura, se debe elegir una voz sensata para dirigir a Alemania, una voz liberal, y no hay mejor gente para esta tarea que el Freie Demokratische Partei. Aunque otros puedan estar en desacuerdo, sus políticas de control y manipulación del mercado han hecho que nuestra desaparición esté más cerca de lo que nos gustaría, y como tal, solo hay un verdadero camino a seguir y un principio rector: la mano invisible del mercado nos conducirá a una grandeza sana una vez más."
 GER_encourage_competition: "Fomentar competencia"
 GER_encourage_competition_desc: "La competencia genera innovación y desempeña un papel crucial en la regulación de precios. Al financiar a las pequeñas empresas, desafiaremos la monopolización del mercado perpetrada por las grandes empresas e impulsaremos el crecimiento de las empresas menores, creando así un panorama industrial más amplio. Las pymes solían ser el sustento de la economía alemana hasta que el \"Paraíso Obrero\" las obligó a cerrar. Las regulaciones y los impuestos funcionan para los grandes conglomerados consolidados y las empresas extranjeras. No tanto para el supermercado local."
 GER_the_nation_of_innovation: "La nación de la innovación"
 GER_the_nation_of_innovation_desc: "Alemania siempre ha estado a la vanguardia de la innovación; aquí nacieron los mayores inventores del mundo, así como algunos de los científicos más destacados: poetas, músicos e ingenieros. Nuestro equipo militar se encuentra entre los excedentes más codiciados del mundo; nuestros Leopards se enorgullecen de equipar las unidades blindadas de decenas de naciones; nuestras armas se escuchan en todo el mundo; nuestros motores diésel funcionan en decenas de millones de vehículos en todo el mundo. Somos la nación de la innovación, un pueblo que durante siglos no ha hecho más que aportar nueva tecnología al mundo. Como el cohete. Hasta en la guerra, innovamos."
 GER_expand_the_liberal_cause: "Expandir la causa liberal"
 GER_expand_the_liberal_cause_desc: "Muchos en Alemania aún no están convencidos o incluso se muestran abiertamente rebeldes ante nuestros objetivos. Los Verdes, el SPD y muchos en la CDU consideran que nuestro nuevo deseo de reducir la regulación y la asistencia social equivale a destruir el legado alemán de 80 años. Pero no nos asusta, escuchamos a los trabajadores y a los empresarios; con cada recorte de impuestos, escuchamos los vítores de una familia con mayores ahorros. ¿Con cada recorte de regulaciones? Un nuevo negocio local abre y se convierte en un producto básico que perdurará siglos. Estamos construyendo una Alemania mejor, para emprendedores, verdaderos amantes del libre mercado, no para los grandes conglomerados. Una economía para todos los que tengan el dinero para unirse a ella."
 GER_lower_the_taxpayers_burden: "Reducir la carga fiscal"
 GER_lower_the_taxpayers_burden_desc: "Los contribuyentes pagan una parte enorme de sus ganancias al gobierno solo para pagar beneficios que rara vez necesitan usar. Imaginen los beneficios si este dinero volviera a manos de la gente. Tan solo el crecimiento del mercado de materias primas impulsaría nuestra economía al máximo. Los beneficios están bien, pero seamos honestos, ¿con qué frecuencia dejan de lado las cosas que les gustan porque no tienen dinero para ellas? Les daremos esa libertad: la libertad de elegir sus finanzas."
 GER_freer_markets_freer_people: "Mercados libre, gente libre"
 GER_freer_markets_freer_people_desc: "Laissez faire, laissez passer. Este será el principio fundamental que guiará nuestra política económica. Reduciremos las políticas intervencionistas del Estado para garantizar el mantenimiento de un mercado libre y que la ciudadanía sea dueña de su propia voluntad. La extensión gubernamental ha frenado el desarrollo económico alemán durante décadas; el crecimiento orgánico llegará a medida que el emprendimiento nacional e internacional absorba nuestros asediados mercados."
 GER_digitalize_the_nation: "Digitalizar la nación"
 GER_digitalize_the_nation_desc: "La digitalización es el futuro. Por mucho que quieras escribir en papel, el registro digital es más económico. La digitalización, en general, es más económica, no solo para el registro, sino en general. Que sea más barato no siempre es bueno, pero está bien porque también es más eficiente. Imaginen la agilización burocrática que habría si todos nuestros registros y leyes en papel fueran fácilmente accesibles en la nube. Ya no es necesario que los burócratas rebusquen en un armario solo para conseguirte una copia de tu certificado de nacimiento dos horas después."
 GER_the_status_quo_maintained: "El statu quo se mantiene"
 GER_the_status_quo_maintained_desc: "A pesar de todas las dificultades de los últimos dos años, la nación alemana ha vuelto a dar rienda al firme y experimentado liderazgo de la Unión. Con el respaldo de nuestro Grupo Parlamentario en el Bundestag, nuestro gobierno podrá seguir guiando a Alemania por el camino que ha seguido: preservando la estabilidad, salvaguardando nuestras instituciones y defendiendo el orden liberal democrático que ha definido a Alemania desde su liberación en 1945. Tras concluir las negociaciones de coalición, estaremos en condiciones de implementar nuestras políticas y mantener a Alemania en el buen camino. Utilicemos este mandato con prudencia y garanticemos que la CDU y la CSU sigan siendo las bases de la República Federal."
 GER_the_status_quo_shattered: "El statu quo destrozado"
 GER_the_status_quo_shattered_desc: "El orden liberal democrático se está rompiendo. Aunque ganamos las elecciones, el dominio de la Unión ya no está asegurado, y nos hemos visto obligados a seguir un camino que jamás hubiéramos imaginado: la cooperación o, Dios nos salve, una coalición con la AfD. Si bien aún tenemos las riendas del Gobierno y somos el socio principal de la coalición, nuestro control se está debilitando, y las voces extremistas se alzan cada vez con más fuerza y audacia. Si queremos mantener la democracia, debemos actuar con cautela y navegar por este panorama político cada vez más populista, a la vez que garantizamos que la República Federal no caiga en el caos."
 GER_work_with_the_banks: "Colaborar con los bancos"
 GER_work_with_the_banks_desc: "Una Alemania fuerte requiere un sector financiero fuerte. Mediante la cooperación con los bancos, podemos garantizar un flujo continuo de capital hacia la economía, aumentar la confianza de los inversores e impulsar el desarrollo a un ritmo más rápido. Con un mejor acceso al crédito y políticas financieras más eficaces, veremos el crecimiento de las pymes, la industrialización y el desarrollo de infraestructuras, sentando las bases para una Alemania próspera y revitalizada. La estabilidad comienza con la seguridad económica, y con el apoyo de los bancos, la nación en su conjunto está asegurada."
 GER_revive_the_ruhr: "Revivir el Ruhr"
 GER_revive_the_ruhr_desc: "El valle del Ruhr, antaño el corazón de nuestro poderío industrial, ha sufrido años de declive. Sin embargo, su potencial sigue siendo innegable. Al dirigir la inversión a las fábricas e infraestructuras del Ruhr, restauraremos su estatus de potencia, generando nuevos empleos, estabilidad y una renovada confianza en el liderazgo de la Unión. Un Valle fuerte significa una Alemania fuerte, y su recuperación demostrará que nuestras políticas económicas son mucho más que promesas vacías."
 GER_attract_foreign_investment: "Atraer inversión extranjera"
 GER_attract_foreign_investment_desc: "La economía alemana siempre se ha basado en la confianza. Al presentarnos como un refugio para los inversores, sin duda atraeremos una nueva afluencia de capital extranjero para impulsar nuestras industrias y modernizar nuestra infraestructura. Mediante incentivos y alianzas estratégicas, atraeremos la riqueza mundial, aceleraremos la expansión industrial y renovaremos nuestro lugar en el centro de la economía global para los próximos años. Una Alemania próspera es aquella que los inversores no pueden permitirse ignorar."
 GER_reaffirm_our_commitment_to_europe: "Reafirmar el compromiso a Europa"
 GER_reaffirm_our_commitment_to_europe_desc: "Debemos reafirmar nuestro liderazgo en Europa y nuestro deber de garantizar la unidad y la estabilidad del continente. Al mantener nuestros vínculos con nuestros mayores aliados y abrir la puerta a la cooperación, reafirmaremos la posición de Alemania como líder de facto de la Unión Europea. Sin embargo, estos compromisos tienen un coste. Algunos aún dudan en Alemania, y el euroescepticismo también crece en el resto de la UE. Solo el liderazgo de la Unión puede garantizar que nuestra visión de Europa no erosione la confianza de la ciudadanía en nuestro liderazgo."
 GER_focus_on_germany: "Centrarse en Alemania"
 GER_focus_on_germany_desc: "Por fin ha llegado el momento de centrarnos en nosotros mismos. Durante demasiado tiempo, tanto nosotros como el SPD hemos priorizado las ambiciones de los eurócratas por encima del bienestar de nuestros ciudadanos. Al centrarnos de nuevo en nosotros mismos, podemos restaurar la confianza en el liderazgo nacional y reafirmar que el pueblo es nuestra máxima prioridad. Esta decisión no estará exenta de polémica, pero para los muchos alemanes decepcionados con las interminables concesiones en nombre de la integración, es una corrección que debía haberse tomado hace tiempo."
 GER_ensure_continued_democracy: "Garantizar democracia continua"
 GER_ensure_continued_democracy_desc: "Para muchos europeos, Alemania es un faro de la democracia occidental, y con razón. Nuestras instituciones funcionan bien, la corrupción es baja, los derechos civiles y sociales se respetan, y nuestras elecciones son libres y justas. Esta es una postura de la que nos enorgullecemos, pero que también debemos seguir defendiendo con vigor y dedicación. Nuestras instituciones deben permanecer a salvo de la coerción y la corrupción. Nuestros políticos respetarán y apoyarán el Estado de derecho. Nuestro compromiso con el proyecto europeo debe mantenerse firme. Rechazaremos el autoritarismo brutal y el radicalismo que promueven Rusia y China siempre que sea posible. No será fácil, pero nuestra visión para este país es clara. La democracia alemana debe perdurar durante años, no solo por el bien de Alemania, sino también por el del continente."
 GER_the_true_alternative_for_germany: "La verdadera Alternativa para Alemania"
 GER_the_true_alternative_for_germany_desc: "El pueblo alemán ha hablado. Tras años de estancamiento y decadencia, ha optado por un nuevo rumbo. Uno que lo libera de las concesiones, la debilidad y los fracasos del establishment. Tras ocho largos años, Alternative für Deutschland ha alcanzado la cima de la política alemana, con la promesa de restaurar el orden, la soberanía y la fuerza de la nación. El camino por delante será difícil; el establishment sigue atrincherado y las élites no se rendirán sin luchar. Pero, por primera vez en décadas, la nación alemana cuenta con un Gobierno Federal que se atreve a priorizar al pueblo alemán. Ahora comienza el verdadero trabajo."
 GER_revive_the_east: "Revivir el Este"
 GER_revive_the_east_desc: "El Este se ha quedado rezagado respecto a Occidente en términos de prosperidad y oportunidades durante casi un siglo, y es el fuerte electoral innegable de la AfD. La globalización y las promesas incumplidas de reunificación han dejado a gran parte de la ex-República Democrática estancada, sus fábricas vacías y a su gente abandonada. Ya no. Bajo la AfD, el Gobierno Federal redoblará sus esfuerzos para revitalizar la economía de Alemania Oriental, creando nuevas oportunidades para sus ciudadanos y demostrándoles que, mientras sigamos en el poder, Berlín no los descuidará. Se forjará una nueva era de crecimiento económico: una que priorice a los alemanes."
 GER_support_western_industry: "Apoyo a industria occidental"
 GER_support_western_industry_desc: "Aunque el Este anhele reformas, Occidente sigue siendo el núcleo económico de Alemania. Renania se ha visto afectada por el exceso de regulación y la competencia extranjera, y las recientes inundaciones, el COVID-19 y las cuarentenas han agravado la situación. Haremos que nuestras empresas locales sean más resilientes mediante la reducción de la burocracia y directivas eurocráticas, garantizando su prosperidad y allanando el camino para la recuperación económica de Occidente. Una Renania más fuerte significa una Alemania más fuerte."
 GER_restrict_immigration: "Restringir la inmigración"
 GER_restrict_immigration_desc: "Durante demasiado tiempo, la inmigración ha ejercido una presión insoportable sobre la economía, los servicios sociales y la identidad nacional de Alemania, convirtiendo a nuestra querida Patria en un paraíso para extranjeros. Nuestra cultura fue ignorada, nuestros valores ignorados y nuestros hijos se sintieron como extranjeros en su propia tierra; pero el pueblo alemán finalmente ha decidido defenderse. El Gobierno Federal debe, en su nombre, tomar medidas audaces para recuperar el control de sus fronteras, garantizando que quienes lleguen aquí solo lo hagan de una manera que beneficie a la economía alemana. Con apoyo del Bundestag, pondremos medidas firmes para deportar a los ilegales y a los solicitantes de asilo rechazados, y redefiniremos la ciudadanía para preservar el patrimonio y el futuro de Alemania. Una Alemania más fuerte y autosuficiente para los alemanes comienza por asegurar quiénes pasa las puertas."
 GER_calm_down_the_radicals: "Calmar a los radicales"
 GER_calm_down_the_radicals_desc: "Gobernar requiere pragmatismo, y en esta coalición con la CDU, la AfD debe moderar sus elementos más radicales. Desde nuestra fundación en 2013, hemos tenido una imagen negativa, y figuras como Björn Höcke y su Der Flügel no han ayudado. Será necesario llegar a acuerdos para consolidar nuestro mandato durante estos cuatro años, garantizando que el Bundestag apruebe nuestra legislación y que el Gobierno Federal no se derrumbe bajo el peso de sus propias divisiones. Aunque algunos en el partido puedan considerar esto una traición a nuestros principios fundamentales, gobernar exige concesiones. Si queremos encaminar a Alemania hacia un nuevo rumbo, debemos mejorar nuestra imagen."
 GER_all_on_our_own: "Por nuestra cuenta"
 GER_all_on_our_own_desc: "No habrá medias tintas, ni concesiones, ni vacilar. La AfD siempre ha sido el baluarte contra los globalistas, tanto de izquierda como de derecha. Ahora, cuando por fin tenemos el poder, se necesita un Gobierno inflexible de la AfD para llevar a cabo nuestra agenda al máximo y poner fin al caos. Esto significa oponer resistencia a la CDU, asegurar nuestra soberanía nacional y preparar a Alemania para cualquier crisis futura que pueda surgir. Esto no es solo un movimiento político: es una revolución, y nada nos lo impedirá. ¡Es nuestro momento, no debemos ceder a la élite ahora!"
 GER_germany_above_all: "Alemania sobre todo"
 GER_germany_above_all_desc: "Por primera vez en tanto tiempo, Alemania cuenta con un Gobierno Federal que realmente prioriza a Alemania. Ya no seremos esclavos de los intereses extranjeros ni de la globalización, se acabará el \"Europa Primero\". Durante tanto tiempo, nos han desangrado los eurócratas de Bruselas y las élites cobardes, demasiado cobardes como para defender su propio país. Bajo nuestro liderazgo, Alemania resurgirá, orgullosa e inquebrantable. El pueblo alemán ya no lo hará: se mantendrá firme, dispuesto a defender su Vaterland y sus tradiciones. Que el mundo lo sepa: Alemania no se irá a ninguna parte."
 GER_army_of_the_future: "Ejército del futuro"
 GER_army_of_the_future_desc: "La Bundeswehr demostró que la superioridad tecnológica, la movilidad y el reconocimiento fueron los componentes principales de nuestra victoria. No podemos caer en la complacencia; debemos seguir avanzando y desarrollando nuestras doctrinas, incluso con la cabeza de oso sobre el manto. El ejército ahora se siente orgulloso y el pueblo lo apoya. Conseguir apoyo para una mayor modernización no será tan difícil ahora."
 GER_defend_the_land: "Defender la tierra"
 GER_defend_the_land_desc: "Nos costó mucho mantener el terreno al principio de la guerra. Reestructurar nuestras tácticas y planificación estratégica nos salvó de la derrota, ya que aprendimos a usar los blindados defensivamente de nuevo. Aprender a modernizar las fortificaciones de campaña para contrarrestar los drones contribuirá en gran medida a garantizar que las futuras ofensivas se repelan con mayor facilidad."
 GER_lessons_from_nato_war: "Lecciones de la Guerra Europea"
 GER_lessons_from_nato_war_desc: "La Guerra Europea nos enseñó algo que ya sabíamos: luchar en la gran llanura europea es un infierno, ¡pero también nos enseñó muchas otras cosas! La guerra moderna se basa en un equilibrio entre flexibilidad, tecnología y recursos. Las ópticas y municiones más devastadoras requieren materiales de alta calidad y fabricación de precisión. Los rusos contaban con guerra electrónica, han rediseñado su doctrina blindada e integrado drones. Estábamos atrasados a pesar de contar con armas, uniformes y blindajes más modernos. Estábamos atrasados en cuanto a pensamiento doctrinal. Los rusos nos enseñaron muchas cosas, y esperamos que en la próxima lección podamos ser sus maestros."
 GER_mechanized_warfare: "Guerra mecanizada"
 GER_mechanized_warfare_desc: "La mecanización es una parte integral del futuro de la guerra, siempre lo supimos, pero nada proporcionó la prueba mejor que la guerra en Europa, la infantería a pie ya no es suficiente sola, demasiado lenta para evitar ser abrumada si no puede mantener sus posiciones, la mecanización permite que nuestros hombres reciban apoyo y sean flexibles en el campo, el terreno se puede ceder fácilmente y recuperar con la misma rapidez con la concentración adecuada de armas."
 GER_maneuver_wafare: "Guerra de maniobras"
 GER_maneuver_wafare_desc: "La movilidad y la flexibilidad son lo único que importa en el campo de batalla. Tu equipo puede ser sofisticado, nuevo y sofisticado; sin el entrenamiento adecuado, una fuerza menor y mal equipada, capaz de moverse con cohesión, te superará en maniobras. El equipo adecuado facilita esto: comunicaciones de largo alcance fiables, vehículos fiables y sistemas integrados de campo de batalla que proporcionan actualizaciones en vivo directamente a cada líder de escuadrón. Sabrás dónde y cómo maniobrar con el reconocimiento satelital. Cada maniobra se planifica mediante una red de información cuyos componentes móviles están a decenas de miles de kilómetros de distancia, pero que dan lugar a maniobras precisas que hacen sonar una especie de orquesta. Una sinfonía de engranajes y sangre."
 GER_SOF_expansion: "Expansión de FOS"
 GER_SOF_expansion_desc: "Las fuerzas especiales son un elemento en constante evolución de la guerra moderna, desempeñando un papel crucial en la infiltración, el sabotaje de la infraestructura enemiga y las operaciones encubiertas de captura y rescate. A pesar de su importancia estratégica, nuestra rama de fuerzas especiales carece de fondos suficientes y necesita mejoras. Para mejorar nuestra preparación para el futuro conflicto, es absolutamente necesario ampliar nuestra rama actual de fuerzas especiales."
 GER_redefine_german_logistics: "Redefinir la logística alemana"
 GER_redefine_german_logistics_desc: "La logística es, de hecho, la parte más importante de cualquier ejército: el equipo debe llegar a los hombres, las piezas para repararlo, la munición, y en la era de la guerra de maniobras, la logística nunca ha sido tan complicada. Saber con precisión dónde se encuentran los hombres requiere un sistema robusto de monitoreo e informes; hacer llegar los suministros necesarios requiere rapidez para evitar que las unidades pierdan efectividad en combate durante una ruptura o una retirada. Debemos rediseñar por completo nuestro sistema de suministro para satisfacer las necesidades modernas de una fuerza móvil y mecanizada, capaz de desplazarse 200 kilómetros al día sin obstáculos."
 GER_drone_r_d: "I+D de drones"
 GER_drone_r_d_desc: "Durante las últimas décadas, ha surgido una alternativa para atacar posiciones enemigas sin sufrir ninguna baja: los drones. Deberíamos invertir en esta nueva tecnología para asegurarnos de dominar el arte del ataque aéreo no tripulado, así como descubrir las complejidades de esta fascinante forma de guerra para asegurarnos de saber cómo responder a un ataque enemigo con drones."
 GER_ai_development_race: "Carrera de desarrollo de IA"
 GER_ai_development_race_desc: "La IA no se trata solo de charlar con personajes ficticios, hacer preguntas absurdas o ver si puedes lograr que haga algo que no debería; la IA es una máquina lógica, una máquina pensante. Una máquina que procesa datos de miles de millones de fuentes en un segundo y genera una solución. En la planificación económica, la planificación militar e incluso la función pública, la Inteligencia Artificial puede desempeñar un papel vital en la mejora de estos campos, y no podemos quedarnos atrás mientras esta fruta prohibida cuelga del árbol. Nos advierten de sus peligros, pero soñamos con sus beneficios. Debemos aprovecharla al máximo."
 GER_faith_in_the_ai: "Fe en la IA"
 GER_faith_in_the_ai_desc: "La IA ha demostrado su eficacia tanto en el campo de batalla como en la vida cotidiana. Como resultado, ha surgido una pregunta crucial en nuestro Comando Aéreo: ¿deberíamos reemplazar a los pilotos humanos con sistemas operados por IA? Esto podría reducir significativamente no solo la necesidad de personal, sino también los altos costos asociados con la capacitación de pilotos."
 GER_faith_in_the_pilot: "Fe en el piloto"
 GER_faith_in_the_pilot_desc: "El piloto siempre ha sido un componente crucial de la Fuerza Aérea. Dado que la tecnología de IA aún se encuentra en una etapa temprana de desarrollo, nuestro Comando Aéreo ha concluido que es mejor retener a los pilotos humanos, no solo para prevenir incidentes como el fuego amigo, sino también para evitar las complejidades del mantenimiento y los costos innecesarios asociados con los sistemas de IA."
 GER_defend_the_skies: "Defender los cielos"
 GER_defend_the_skies_desc: "Durante la Guerra Europea, numerosos bombarderos rusos violaron nuestro espacio aéreo, logrando, lamentablemente, bombardear varias de nuestras ciudades y devastar infraestructuras industriales clave. Para evitar este tipo de incursiones en el futuro, debemos realizar inversiones sustanciales en sistemas de radar y mejorar significativamente nuestras capacidades de defensa aérea."
 GER_increase_weapon_leathality: "Mejorar la letalidad del Typhoon"
 GER_increase_weapon_leathality_desc: "Durante la Guerra Europea, el Typhoon desempeñó un papel crucial para evitar que la aviación rusa bombardeara nuestras posiciones. Sin embargo, con el rápido avance tecnológico, ahora debemos innovar en el diseño del Typhoon para contrarrestar eficazmente futuras amenazas aéreas rusas más letales."
 GER_united_and_undefeated: "Unidos e invictos"
 GER_united_and_undefeated_desc: "Aunque la lucha fue dura y Europa está en ruinas, ahora podemos respirar aliviados. ¡La victoria es nuestra! La Guerra Europea ha sacudido a Alemania hasta los cimientos. Ha puesto a prueba nuestra fuerza, nuestra resiliencia y nuestra unidad ante la mayor amenaza que jamás hayamos enfrentado. Frente a la tormenta, nosotros y Europa hemos resistido la embestida de la tiranía rusa. Con nuestro enemigo en Oriente vencido, nuestra valiente Bundeswehr se ha vuelto uno de los ejércitos más capaces del mundo. Occidente se alza victorioso, con Alemania al frente de una nueva era europea.\n\nPero el trabajo no ha hecho más que empezar. Ahora es el momento de restaurar nuestra influencia y reconstruir Europa. Tras la guerra, la Unión está más unida que nunca y nos erigimos como su líder indiscutible. Con mano firme al volante y con Estados Unidos en llamas, reclamaremos el lugar que nos corresponde como líderes del mundo libre. La Bundeswehr será el pilar de la estabilidad europea y garantizaremos que todos los pueblos del mundo puedan vivir en un mundo libre de autoritarismo y déspotas. Ahora, guiaremos no solo a nuestro pueblo, sino a todo el continente hacia una era de paz, prosperidad y poder duraderos. Haltet aus im Sturmgebraus!"
 GER_support_digital_democracy: "Apoyar a la democracia digital"
 GER_support_digital_democracy_desc: ""
 GER_bid_for_kaliningrad: "Apuesta por Kaliningrado"
 GER_bid_for_kaliningrad_desc: "Puede que nuestros aliados no den el buen visto, pero Kaliningrado no es solo un puerto de aguas cálidas; es la antigua capital de nuestro unificador. Lo único que queda de Prusia es... nada. Berlín apenas se parece en nada a su antiguo homónimo, y Prusia misma fue colonizada en su totalidad por los esfuerzos soviéticos para debilitarnos, o incluso para castigarnos. Kaliningrado debería volver a ser Königsberg. Hay mejores argumentos geográficos de Lituania o Polonia para tenerla, pero nosotros tenemos el único cultural. Si por fin logramos recuperar la capital de nuestro unificador, podremos recuperar algo de nuestra alma."
 GER_caucaus_peacekeeping_mission: "Misión de paz en el Cáucaso"
 GER_caucaus_peacekeeping_mission_desc: "La República de las Montañas cayó en una guerra civil poco después de su fundación. Subestimamos o incluso pensamos que los rusos bromeaban sobre el extremismo islámico en la zona, pero los chechenos son un grupo sorprendentemente tenaz. Debemos frenar la amenaza wahabí antes de que se convierta en un nuevo problema oriental, o peor aún, en una herramienta para que Rusia justifique su recuperación."
 GER_propup_kuban_industry: "Apoyar al granero de Rusia"
 GER_propup_kuban_industry_desc: "La fértil tierra del Kubán fue robada por Rusia hace décadas y legítimamente utilizada por ellos. Sin embargo, bajo su ocupación, esta tierra no vio la luz del día, ni la llama de la libertad, ni la esperanza. Fue con nuestras espadas de libertad que atravesamos esa inmensa sombra llamada Rusia sobre ellos y les dimos los derechos y la democracia que siempre han anhelado. Ahora, con su recién descubierta libertad, los hombres y mujeres de esta próspera tierra pueden usar la rica tierra bajo sus pies para sí mismos, en lugar de para los oligarcas de Moscú."
 GER_support_caucasian_minority: "Apoyar minorías caucásicas"
 GER_support_caucasian_minority_desc: "Durante décadas, el pueblo caucásico estuvo bajo ocupación rusa. Antes de nuestra intervención, el oso ruso les arrebató sus recursos naturales y sus tierras. Tras su derrota, Rusia ha perdido gran parte de su antiguo orgullo e ira. El oso yace inerte, carente de la vitalidad que una vez tuvo esta nación. Cuando el oso ruso yacía inactivo, los caucásicos se alzaron y recuperaron su tierra; finalmente, su destino lo decidirán ellos mismos. Si no apoyamos su libertad, su democracia y su prosperidad, ¿cómo nos atrevemos a llamarnos portadores de la antorcha de la libertad?"
 GER_reopen_russian_relations: "Restaurar relaciones con Rusia"
 GER_reopen_russian_relations_desc: ""
 GER_accept_ukraine_into_eu: "Aceptar a Ucrania en la UE"
 GER_accept_ukraine_into_eu_desc: ""
 GER_veterans_benefit_program: "Programa de beneficios de veteranos"
 GER_veterans_benefit_program_desc: ""
 GER_ukrainian_belarus_cooperation: "Cooperación bielorrusa-ucraniana"
 GER_ukrainian_belarus_cooperation_desc: "Ucrania y Bielorrusia son dos naciones conmocionadas, que sufrieron lo peor de la Primera y la Segunda Guerra Mundial, y ahora de la última guerra. Juntas, estas naciones eslavas, hermanas a lo largo de los mismos antiguos cauces que antaño dieron origen a la antigua Rus, deben reconstruirse. Nuestra ayuda es la rama de olivo entre Oriente y Occidente. Una ofrenda de paz tras tanta destrucción. Económicamente, estarán unidas como una sola."
 GER_eu_economic_expansion: "Expansión económica de la UE"
 GER_eu_economic_expansion_desc: "Tras la devastación de la guerra, nos aguarda la histórica tarea de reconstruir y fortalecer Europa, especialmente el Este. La Unión, ahora más comprometida que nunca con su objetivo de \"reforzar la cohesión económica, social y territorial y la solidaridad entre los países de la UE\", debe ampliar su presencia económica para asegurar tanto su propio futuro como el de sus ciudadanos. Alemania debe tomar la iniciativa en este esfuerzo, liderando el impulso del crecimiento económico, la innovación y la recuperación.\n\nAl ampliar el marco económico de la UE, podemos acelerar la recuperación, fortalecer el comercio y consolidar nuestra posición como la maravilla de la ingeniería europea. Mediante una renovada inversión en el Pacto Verde y una mayor integración económica, nos reconstruiremos con más fuerza que antes. Y, a medida que se recupere la estabilidad, ampliaremos la Unión por primera vez en más de una década. No solo nos recuperaremos, sino que prosperaremos."
 GER_eastern_european_reconstruction_effort: "Esfuerzo de reconstrucción europeo"
 GER_eastern_european_reconstruction_effort_desc: "Europa ha presenciado demasiado derramamiento de sangre, demasiado dolor, demasiado sufrimiento. Esta tierra ha sido sometida a numerosos agresores e incontables invasores, pero en cada ocasión hemos sobrevivido. Hemos preservado nuestra herencia europea y nuestro estilo de vida. Esto, junto con los rusos, ha destruido muchos hogares y medios de vida, pero ahora es el momento de la reconstrucción. Ha llegado el momento de reconstruir todo lo perdido durante la guerra. De reparar el daño causado a nuestros pueblos y naciones."
 GER_formalize_the_european_union: "Fundar la nación europea"
 GER_formalize_the_european_union_desc: "El sueño de una Europa federal ha permanecido en el horizonte durante décadas, una idea que durante mucho tiempo fue solo un susurro y una visión de idealistas. Sin embargo, ahora nos encontramos al borde de la historia. La Unión Europea ha demostrado su fuerza en una guerra a gran escala; ahora debe demostrar su fuerza en la gobernanza.\n\nSentaremos las bases para una verdadera unificación política y transformaremos la UE de una unión política y económica en un superestado único y soberano. Mediante campañas masivas y maniobras políticas, uniremos al continente en torno a la visión federal, patrocinando movimientos prounificación y celebrando referendos en toda Europa. Si tenemos éxito, la historia lo recordará como el acontecimiento más trascendental del siglo: el nacer de un Estado como el mundo jamás ha visto."
 GER_united_but_seperate: "Unidos pero separados"
 GER_united_but_seperate_desc: "Europa se encuentra en una encrucijada, y nosotros también. Si bien la unificación bajo un único superestado es una propuesta radical, abandonar por completo la unidad europea sería una estupidez. En su lugar, seguiremos el camino del statu quo, fortaleciendo nuestra cooperación dentro de la UE y salvaguardando la soberanía nacional de Alemania. Alemania seguirá siendo el líder informal de la UE, impulsando sus esfuerzos diplomáticos y económicos, sin borrar nuestra identidad en la creación de una federación europea. La continuidad guiará nuestro rumbo, garantizando que Europa permanezca unida, pero sin sacrificar su diversidad."
 GER_european_officer_corps: "Cuerpo de oficiales europeo"
 GER_european_officer_corps_desc: "Una nación europea requiere un Estado europeo, que a su vez requiere un ejército europeo, que a su vez requiere un mando unificado. A medida que avanza nuestro progreso político y cultural hacia la unificación, también debemos forjar un ejército europeo: una sola fuerza armada que opere con una coordinación fluida. Esa fue la fortaleza de EE.UU.: no solo el tamaño de su ejército, sino también su coherencia y coordinación. Comenzaremos este proceso reclutando comandantes militares experimentados. Una figura destacada que se unirá al Cuerpo de Oficiales Europeos es el italiano Claudio Graziano. Sirvió como Comandante de la Fuerza Provisional de las Naciones Unidas en el Líbano entre 2007 y 2010, y se convirtió en Jefe del Estado Mayor del Ejército italiano en 2011. Desde 2018, preside el Comité Militar de la UE y, a partir de ahora, será nuestro Jefe del Ejército Europeo. Se han sentado las bases para un ejército verdaderamente europeo. Ahora, debemos construir sobre ellas."
 GER_uphold_democracy: "Defendiendo la democracia"
 GER_uphold_democracy_desc: "Nuestra guerra contra la tiranía no debe terminar con Rusia. En todo el mundo, autócratas y déspotas siguen campando a sus anchas, amenazando la estabilidad global y los principios de la democracia liberal que tanto apreciamos. Alemania, en nombre de la OTAN, no debe ceder en su responsabilidad de defender la democracia y los derechos humanos. Con nuestra victoria en la última guerra, ahora tenemos el poder, y sobre todo, el deber, de actuar. Los miembros de más alto rango de nuestras fuerzas armadas han elaborado la operación: Global Enforcer, un plan de varias etapas para asegurar la democracia en nuestro entorno inmediato. Atacaremos los reductos restantes del autoritarismo en Europa, Medio Oriente y el Norte de África, asegurando que el mundo no vuelva a caer en la oscuridad. La batalla por la libertad no ha terminado, pero la llevaremos hasta el final.\n\n\"Algunos Gobiernos se mostrarán tímidos ante la tiranía. Y no se equivoquen: si no actúan, Europa lo hará\"."
 GER_support_self_determination: "Apoyar la autodeterminación"
 GER_support_self_determination_desc: "Nuestra victoria ha redefinido el orden global, pero la batalla por la democracia continúa. Debemos apoyar la autodeterminación de las naciones oprimidas por regímenes autoritarios, garantizando que la voluntad popular prevalezca sobre la tiranía. Al respaldar la causa de la soberanía y la libertad, podemos lanzar la primera etapa de Global Enforcer: la operación: Justicia Rápida y la operación: Trueno, operaciones decisivas destinadas a enfrentar y desmantelar las fuerzas opresoras en Serbia e Irán respectivamente. Con estas acciones, enviamos un mensaje claro a todos aquellos que buscan imponer la autocracia a un pueblo libre: la OTAN se mantendrá firme, no solo en defensa de Europa, sino también en la lucha por el derecho de todas las naciones a vivir en libertad.\n\n\"La OTAN tiene una tarea que hacer, y la vamos a cumplir. Libraremos al mundo de los malhechores\"."
 GER_beyond_the_borders_of_europa: "Más allá de Europa"
 GER_beyond_the_borders_of_europa_desc: "Nuestra misión de defender la democracia y la estabilidad no se limita solo a Serbia. El mundo espera el liderazgo de la presidenta de la Comisión von der Leyen, y ella debe responder. Con nuestra victoria asegurada, se nos presenta la oportunidad de extender nuestra influencia y proteger a las naciones amenazadas por déspotas, e iniciar la fase final de Global Enforcer. La operación: Brillante Esperanza traerá la paz a Egipto, restaurando la estabilidad en una nación asolada por décadas de dictadura y asegurando el control democrático del canal de Suez. La operación: Salomón II liberará a Siria del yugo de la tiranía asadista y aplastará el baazismo de una vez por todas. Y, por último, la operación: Liberación Árabe aplastará la amenaza del resurgimiento de la Yamahiriya, poniendo fin a su expansionismo en el norte de África y garantizando la estabilidad de la región. Nuestro alcance se extenderá mucho más allá de Europa, estableciendo un nuevo orden de libertad y democracia para todos.\n\n\"§BEuropa§! está unida. Los libres del mundo nos apoyan. Esta será una lucha monumental del bien contra el mal. Pero el bien ganará\"."
 GER_defense_plan_x: "PLAN DE DEFENSA: X"
 GER_defense_plan_x_desc: "Nuestros esfuerzos por contener a los rusos en el Cáucaso han fracasado. ¡Debemos reagruparnos en orden y preparar una nueva línea de defensa a lo largo del río Dniéper!"
 GER_suspend_civilian_consumerism: "Suspender la economía de consumo"
 GER_suspend_civilian_consumerism_desc: "Ha quedado claro que Rusia no pretende detenerse en Ucrania. Sus objetivos parecen ser mucho más ambiciosos, por lo que debemos comprometernos plenamente como ellos y movilizar la economía."
 GER_defense_plan_v: "PLAN DE DEFENSA: V"
 GER_defense_plan_v_desc: "Los rusos han atravesado la línea defensiva del Dniéper. ¡Aún no hemos perdido la esperanza! Debemos defender el río Vístula, ¡a toda precio!"
 GER_to_the_last: "Hasta el final..."
 GER_to_the_last_desc: "La línea del Vístula ha sido cruzada... ¡Ellos nunca aplastarán nuestro espíritu, lucharemos por nuestro hogar hasta el último hombre!"
 GER_deploy_republikanische_milizen: "Formar milicias republicanas"
 GER_deploy_republikanische_milizen_desc: "¡Miles de cudadanos están listos para tomar las armas y defender la república!"
 GER_operation_somerset: "OPERACIÓN: SOMERSET"
 GER_operation_somerset_desc: "Europa tiene una larga historia de lucha contra Rusia; trabajamos juntos para derrotarlos en 1854 y dos veces en esta década. ¡Siempre estaremos aquí para frenar su expansión!"
 GER_europe_for_europeans: "Europa para los europeos"
 GER_europe_for_europeans_desc: "Europa no es lugar para estas hordas bárbaras asiáticas. ¡Debemos reforzar esta idea entre nuestros aliados para revitalizarlos! ¡La guerra aún no está perdida!"
 GER_militarize_reichsbanner_schwarz_rot_gold: "Militarizar el Reichsbanner"
 GER_militarize_reichsbanner_schwarz_rot_gold_desc: "Al recuperarnos de la Guerra Europea, es evidente que la seguridad futura de Alemania reside en la fuerza y la unidad de su pueblo. Debemos fomentar un nuevo tipo de nacionalismo alemán, no uno basado en el odio y el genocidio, sino fundado en los ideales del republicanismo, como lo hemos hecho desde la Segunda Guerra Mundial. Aunque ha abandonado sus orígenes como organización paramilitar que luchaba junto a los comunistas y los nazis, Reichsbanner Schwarz-Rot-Gold aún existe nominalmente como una asociación de formación política.\n\nPero las circunstancias han cambiado, y la democracia vuelve a llamar al Reichsbanner para defender a la República. Reformaremos el Reichsbanner para impulsar el reclutamiento y movilizar a la población alemana para defender la tricolor negra, roja y dorada de la tiranía."
 GER_nationalize_defense_industries: "Expropiar la industria de defensa"
 GER_nationalize_defense_industries_desc: "Tras la guerra, el Gobierno Federal debe garantizar que las fuerzas armadas se mantengan fuertes y autosuficientes. Al poner la industria de defensa bajo control estatal, podemos asegurar la producción de armas y equipo sin la posibilidad de interferencia extranjera. Si bien esta medida será muy controvertida, garantiza que no seamos vulnerables a los caprichos de los privados, en caso de que ocurra lo peor. Un sector de defensa estatizado reforzará nuestras capacidades militares, reducirá costos y proporcionará las herramientas necesarias para defender nuestra soberanía, cueste lo que cueste."
 GER_propup_russian_defense_forces: "Reducir el ejército ruso"
 GER_propup_russian_defense_forces_desc: "A lo largo de su historia, los rusos han sido conocidos por su destreza militar. Su pueblo se liberó de la Horda de Oro, ha repelido a los agresores extranjeros en repetidas ocasiones y ha dominado durante siglos a las numerosas etnias diferentes. ¿Se debió a la dureza de su territorio? ¿O a su tempestuosa historia? En cualquier caso, la única manera de sofocar el expansionismo ruso es reduciendo su fuerza militar. Al fin y al cabo, solo debilitando al oso se puede domesticarlo."
 GER_demand_russian_war_reparations: "Exigir reparaciones a Rusia"
 GER_demand_russian_war_reparations_desc: "Durante siglos, la amenaza rusa ha desangrado nuestras tierras, masacrado a nuestro pueblo, reducido nuestras ciudades a cenizas y nos ha humillado constantemente. Desde los zares hasta hoy, Rusia ha sido el enemigo de una Europa unida. Ha llegado la hora de que Rusia comparezca ante la justicia. Exigiremos cuantiosas reparaciones a Rusia, buscando la restitución por las vidas perdidas, las ciudades devastadas y el renacimiento de nuestra nación."
 GER_no_appeasment: "Cero apaciguamiento"
 GER_no_appeasment_desc: "No se puede razonar con el diablo ni hacer entrar en razón a un loco. El apaciguamiento solo ha traído más guerra, más muerte, más sufrimiento. Al principio, permitimos que los rusos pisotearan a sus vecinos, dejándolos descargar su ira sobre ellos y sometiéndolos con su puño de hierro. Fuimos insensatos, pero ya no. Nunca más permitiremos que el mal crezca en esta tierra sagrada. Como portadores de la libertad, lucharemos contra toda injusticia, por poderoso que sea el enemigo."
 GER_normalize_relations: "Normalizar las relaciones"
 GER_normalize_relations_desc: "Amor. Amor es una palabra poderosa. Amor es una palabra maravillosa. Es fácil odiar, pero amar es mucho más valiente. Puede que hayamos derrotado a los rusos en esta guerra, iniciada por su agresión, pero eso no significa que debamos guardar rencor a su pueblo. Al fin y al cabo, todos sangramos de la misma manera y sentimos el mismo dolor. El pueblo ruso sufrió como nosotros. Son inocentes en este plan urdido por sus líderes corruptos en Moscú. Usaremos el amor para sanarlos, para sanarnos a nosotros mismos. Este es el único camino hacia un futuro próspero y unido."
 GER_the_new_order: "El futuro europeo asegurado"
 GER_the_new_order_desc: "La victoria, por sí sola, no basta; debemos asegurar que la paz que hemos conquistado con sangre, sudor y lágrimas perdure tanto como la anterior. Las ocupaciones de Libia e Irán deben guiarse hacia la estabilidad, y sus instituciones deben reconstruirse según nuestra propia imagen de democracia. Mediante reformas meticulosas y apoyo económico, convertiremos a estas naciones en aliados confiables, impidiendo que el extremismo que una vez las definió regrese. En casa, finalmente dejaremos atrás el peso de la guerra. Los sacrificios han sido inmensos, pero sin duda resurgiremos más fuertes, más preparados y más unidos que nunca."
 GER_unrestricted_aerial_warfare: "Guerra aérea indiscriminada"
 GER_unrestricted_aerial_warfare_desc: ""
 GER_support_nato_administrations: "Apoyar administraciones de la OTAN"
 GER_support_nato_administrations_desc: "A pesar de nuestros esfuerzos por re-democratizar mediante medios contundentes, hemos enfrentado una intensa resistencia popular, con los Gobiernos administrativos siendo muy impopulares, careciendo de los fondos y el personal adecuados para crear una fuerza defensiva adecuada. Por lo tanto, es nuestro deber como mundo libre proporcionar los fondos y el personal necesarios no solo para calmar a la población hostil, sino también para desarrollar sus tierras, lo que aumentará la popularidad de nuestra administración entre el pueblo."
 GER_war_time_advancements: "Avances durante guerra"
 GER_war_time_advancements_desc: "A pesar de nuestro cambio hacia la producción civil tras el fin de la Guerra, un área en la que no nos hemos quedado atrás es la tecnología militar. Empresas como KMW y Rheinmetall continúan produciendo algunos de los equipos más avanzados de Europa. Sin embargo, esto no significa que no debamos seguir invirtiendo en investigación y desarrollo. Al hacerlo, no solo podemos impulsar nuestra tecnología aún más, sino también corregir las deficiencias del equipo más antiguo."
 GER_enemies_abroad: "Enemigos en el extranjero"
 GER_enemies_abroad_desc: "Los chinos, considerados durante mucho tiempo uno de los principales enemigos de Norteamérica, se han convertido ahora en nuestra mayor amenaza. El Partido Comunista de China está lastrado por una burocracia sobredimensionada y profundamente corrupta, un factor importante que podemos aprovechar. Esta vulnerabilidad puede darnos un acceso más fácil a inteligencia crítica, permitiéndonos evaluar su verdadera fuerza y transmitir esa información a nuestros aliados japoneses."
 GER_defense_of_krasnodar: "Defensa de Krasnodar"
 GER_defense_of_krasnodar_desc: ""
 GER_caucasian_offensive: "Ofensiva caucásica"
 GER_caucasian_offensive_desc: "El Cáucaso ha sufrido durante mucho tiempo bajo el peso de la opresión rusa, con numerosos grupos minoritarios enfrentando represión. Pero tras la conclusión de la Guerra Europea, por primera vez en mucho tiempo en la historia, la luz de la libertad brilló en el Cáucaso, hasta que el demonio ruso pisoteó y apagó su libertad. Hoy yacen bajo la constante opresión rusa y, por lo tanto, es nuestra responsabilidad como defensores de Europa emprender una campaña para liberar el Cáucaso. Liberar con éxito la región no solo liberaría a su pueblo, sino que también dispersaría las fuerzas rusas, creando una gran oportunidad para que avancemos desde múltiples frentes."
 GER_allies_abroad: "Aliados en el extranjero"
 GER_allies_abroad_desc: "Mientras nuestra lucha continúa, ha surgido un posible aliado en Oriente: el OTDP. Considerados durante mucho tiempo como el faro de la democracia en Asia, se han mantenido firmes frente a la creciente influencia del dragón chino. Es necesario que mantengamos relaciones sólidas con ellos, no solo para el comercio de armas, sino también para reforzar y hacer crecer nuestras economías. Servirán como un nodo vital de suministro para envíos de armas a gran escala. Sus puertos estarán llenos de nuestros contenedores de carga, y la Línea Verde crecerá."
 GER_anti_partisan_training: "Entrenamiento antipartisano"
 GER_anti_partisan_training_desc: "Cuando Estados Unidos invadió Vietnam, se enfrentó a una resistencia abrumadora por parte de los locales que conocían bien el terreno y por la densa selva que caracteriza a Vietnam. Al final, Norteamérica fue derrotada por tropas equipadas con armamento obsoleto. A medida que seguimos ocupando más territorio ruso, la gente ha llegado a odiarnos con la aparición de movimientos de resistencia para expulsarnos. Por lo tanto, no podemos repetir los errores de nuestros antiguos aliados. Debemos proporcionar a nuestros soldados entrenamiento antipartisano y ayudarles a erradicar cualquier movimiento partisano que dificulte nuestra capacidad para ocupar la vasta tierra que es Rusia."
 GER_rethink_aerial_warfare: "Repensar la guerra aérea"
 GER_rethink_aerial_warfare_desc: "La guerra aérea evoluciona con cada nueva evolución tecnológica: los cazas furtivos, invisibles al radar y a las aeronaves térmicas, no pierden potencia de fuego ni maniobrabilidad; los Sukhoi, supermanejables, pueden girar tan rápido que pueden desnucar a un piloto. Entramos en una era en la que el piloto pronto podría ser irrelevante. Debemos perfeccionar nuestras tácticas para aumentar la capacidad de supervivencia de nuestras aeronaves, especialmente porque es cada vez más probable que la defensa antiaérea densa se convierta en un desafío para nuestras fuerzas, que requieren contraataques inteligentes."
 GER_jump_start_carrier_group: "Iniciar un nuevo grupo de portaaviones"
 GER_jump_start_carrier_group_desc: "Muchas armadas importantes del mundo han logrado desplegar un portaaviones; sin embargo, en la era de la guerra moderna, aún no lo hemos logrado. Estos buques son un eslabón crucial para la próxima generación de la guerra moderna, actuando como bases aéreas móviles, y nos brindarán la capacidad de atacar profundamente territorio enemigo, en cualquier momento y lugar. Por lo tanto, es crucial que invirtamos en ellos para nuestra supervivencia."
 GER_defend_the_seas: "Defender los mares"
 GER_defend_the_seas_desc: "Años de negligencia naval han tenido consecuencias desastrosas. Durante la Guerra Europea, las fuerzas navales rusas atacaron nuestros buques cisterna, lo que interrumpió gravemente el comercio con naciones de todo el mundo. Peor aún, nuestra armada, con fondos insuficientes, se vio desbordada, lo que planteó serias dudas sobre nuestra capacidad para defender nuestras costas. Si queremos tener alguna posibilidad de éxito contra futuras flotas enemigas, debemos realizar un esfuerzo masivo para reconstruir nuestras capacidades navales lo antes posible."
 GER_maritime_aerial_defense: "Defensa aérea marítima"
 GER_maritime_aerial_defense_desc: "En varios enfrentamientos navales, los marineros y almirantes supervivientes informaron que nuestros buques eran altamente vulnerables a los bombarderos navales debido a la falta de defensas aéreas a bordo. Para abordar esta grave debilidad, nuestros futuros diseños navales deben incorporar sistemas antiaéreos específicos para protegerlos de ataques aéreos y evitar mayores pérdidas."
 GER_empower_populist_parties: "Empoderar partidos populistas"
 GER_empower_populist_parties_desc: "El statu quo alemán se ve amenazado por grupos como la AfD y Die Linke. Hacen promesas ciegas y usan una retórica estridente, lo que conmueve al pueblo alemán como no lo habían hecho en años. Esto es positivo. Si permitimos que los populistas sigan hablando, quizás aún podamos beneficiarnos de sus promesas exageradas; por supuesto, necesitamos con urgencia rearmarnos."
 GER_bolster_the_bfv: "Reforzar la BfV"
 GER_bolster_the_bfv_desc: "La BfV es nuestra agencia de inteligencia nacional, podría llamarse el FBI alemán. Bueno, nuestra agencia se centra principalmente en el extremismo y la defensa contra él. Neonazis, comunistas e incluso monárquicos amenazan al Estado desde la sombra. Muestran su cara pública a través de organizaciones como el NPD (recientemente llamado \"Die Heimat\"), la AfD y Die Linke. No podemos simplemente dejar que otro autoritario sea elegido. ¡Que la BfV saque a la luz los trapos sucios de estos reaccionarios! ¡Nuestra República debe resistir la tormenta que se avecina!"
 GER_reconcile_the_parties: "Reconciliar a los partidos"
 GER_reconcile_the_parties_desc: "La continua lucha contra el supuesto creciente Die Linke y la AfD solo ha llevado a un crecimiento impactante y exponencial de su base electoral a lo largo de los años. La gente los ve como la oposición al statu quo. Por lo tanto, votan por ellos porque anhelan romper con los mismos partidos una y otra vez. Por ello, nos conviene no solo reconciliar a los partidos, sino también permitirles algunos puestos limitados en el Gobierno alemán. Una vez que ocupen esos puestos, no solo dejarán de representar la oposición al statu quo, sino que también mostrarán a la gente cómo es vivir bajo sus políticas, para bien o para mal."
 GER_embrace_the_future_of_warfare: "Abrazar el futuro de la guerra"
 GER_embrace_the_future_of_warfare_desc: "Mientras la Bundeswehr se ha modernizado y reformado, los paradigmas de la guerra están cambiando rápidamente. La integración de tecnologías avanzadas como las capacidades de guerra cibernética, la inteligencia artificial y los sistemas no tripulados, como los drones, mejorará la eficacia militar y la eficiencia operativa. Nuestras fuerzas armadas deben estar preparadas para diversos escenarios y desarrollar doctrinas flexibles que se adapten a las cambiantes condiciones geopolíticas y fortalezcan la postura estratégica de Alemania frente a las amenazas emergentes."
 GER_inspire_the_youth: "Inspirar a la juventud"
 GER_inspire_the_youth_desc: "Alemania ha educado a sus hijos durante décadas en la templanza, el respeto a la vida y los errores de nuestro pasado colectivo. Por ello, queremos afirmar que nuestros jóvenes son inocentes y no sienten deseos de guerra; aspiran a grandes metas al servicio del prójimo. Esto no satisface nuestras necesidades actuales, y el corazón palpitante de nuestros hijos debería bombear sangre a través de los nervios de la batalla. Una campaña publicitaria dirigida a adolescentes en redes sociales, que muestre la rica y orgullosa tradición militarista de Alemania y sus geniales acciones en la guerra, les recordará a nuestros hijos que la sangre de los héroes está más cerca de Dios que la tinta de los filósofos."
 GER_germany_triumphant: "Alemania triunfante"
 GER_germany_triumphant_desc: ""
 GER_consolidate_the_eu: "Consolidar la UE"
 GER_consolidate_the_eu_desc: ""
 GER_no_appeasement: "Cero apaciguamiento"
 GER_no_appeasement_desc: "No se puede razonar con el diablo ni hacer entrar en razón a un loco. El apaciguamiento solo ha traído más guerra, más muerte, más sufrimiento. Al principio, permitimos que los rusos pisotearan a sus vecinos, dejándolos descargar su ira sobre ellos y sometiéndolos con su puño de hierro. Fuimos insensatos, pero ya no. Nunca más permitiremos que el mal crezca en esta tierra sagrada. Como portadores de la libertad, lucharemos contra toda injusticia, por poderoso que sea el enemigo."
 GER_deregulate_the_market: "Desregular el mercado"
 GER_deregulate_the_market_desc: ""
 GER_support_military_industry: "Apoyar la industria militar"
 GER_support_military_industry_desc: ""
 GER_reconstruct_civilian_industry: "Reconstruir la industria civil"
 GER_reconstruct_civilian_industry_desc: ""
 GER_begin_societal_militarization: "Iniciar la militarización social"
 GER_begin_societal_militarization_desc: ""
 GER_activate_article_50: "Activar el Artículo 50"
 GER_activate_article_50_desc: "El experimento europeo finalmente ha llegado a su fin. Durante años, Alemania ha asumido las responsabilidades de naciones más débiles, apuntalando economías deterioradas, soportando una burocracia infame y comprometiendo nuestros intereses nacionales en aras de la \"unidad\". La guerra solo lo ha dejado más claro: Europa está lejos de ser una sola nación, ni debería serlo jamás. Por fin ha llegado el momento de que Alemania reclame su soberanía. Invocaremos el Artículo 50 e iniciaremos el proceso de retirada de la Unión Europea, cortando los lazos que nos han mantenido abajo durante décadas. La transición no estará exenta de turbulencias, ya que la incertidumbre política y económica es inevitable, pero al final, Alemania se sobrepondrá como siempre lo ha hecho, libre para trazar su propio rumbo sin las restricciones de Bruselas.\n\n\"Deutschland, Deutschland, über alles!\""
 GER_revive_german_nationalism: "Revivir el nacionalismo alemán"
 GER_revive_german_nationalism_desc: "Durante demasiado tiempo, Alemania ha estado atada a las restricciones de una identidad artificial y paneuropea, erosionando su propia esencia. Con nuestra salida de la Unión, ha llegado el momento de reavivar el espíritu de nuestra nación, aplastado en 1945 y sometido al yugo del globalismo y el autodesprecio. Abrazaremos nuestra herencia, celebraremos nuestra propia diversidad y fomentaremos un sentido de unidad nacional entre los alemanes de todo el mundo. El sueño de una Alemania fuerte ya no es un recuerdo: es el futuro."
 GER_restore_pride_in_our_history: "Restaurar el orgullo en la historia"
 GER_restore_pride_in_our_history_desc: "Nos encontramos en una encrucijada, y una cosa es segura: no debemos olvidar quiénes somos. Nuestra nación ha superado innumerables crisis, desde la unificación hasta la división y la reunificación, desde gloriosas victorias hasta aplastantes derrotas. Ahora, mientras forjamos nuestro propio camino, es hora de recordar al pueblo alemán la fuerza y la resiliencia de sus antepasados. Al abrazar nuestra historia, no con nostalgia, sino con orgullo, restauraremos la confianza nacional e inspiraremos a la próxima generación a asumir el liderazgo. El futuro pertenece a quienes creen en su pasado."
 GER_unify_the_european_people: "Unificar al pueblo europeo"
 GER_unify_the_european_people_desc: "A medida que avanzamos hacia la unificación del continente europeo, es crucial que no solo fortalezcamos la economía y las instituciones de la Unión, sino también los cimientos mismos de nuestra identidad. Europa ya no debe considerarse un territorio de varias naciones, sino una sola nación de todos los europeos. Esta no es una propuesta inédita; de hecho, surgió de la fuente más inesperada imaginable: un fascista. Oswald Mosley y su Union Movement abogaron por la política de \"Europa una nación\" entre 1948 y 1973. Otro fascista, Francis Parker Yockey, abogó en 1949 por un supuesto \"Imperio de Europa\", depurado de la democracia liberal, Hollywood y el bolchevismo.\n\nClaro que no somos fascistas, pero estos ideólogos tenían razón: Europa es una sola nación, y siempre lo ha sido. Ya es hora de que reconozcamos este hecho, y como todos los Estados deben ser congruentes con una nación propia, Europa debería tener un Estado propio."
 GER_pressure_the_austrians: "Presionar a los austriacos"
 GER_pressure_the_austrians_desc: "La neutralidad de Austria es una reliquia de la Guerra Fría, algo que ya no puede permitirse en el panorama geopolítico europeo. Mientras los rusos arrasaban Europa y nosotros nos veíamos obligados a luchar, Austria se limitó a observar. Mientras Europa se reorganiza tras la guerra, finalmente ha llegado el momento de que Austria adopte una postura definitiva y abandone la Neutralitätserklärung. Ejerceremos toda la presión diplomática y política necesaria para que Viena solicite su ingreso en la OTAN, garantizando que nuestro vecino del sur nos apoye ante cualquier amenaza futura y se una a nosotros en operaciones en el extranjero. Que Austria ceda a nuestras demandas o se resista determinará la Europa Central durante las próximas décadas. O están con nosotros o están contra nosotros."
 GER_the_bundeswehr_reborn: "Renacimiento de la Bundeswehr"
 GER_the_bundeswehr_reborn_desc: "La Bundeswehr ha estado durante mucho tiempo limitada por el pasado, encadenada por la indiferencia política y las expectativas internacionales. Pero el mundo ha cambiado, Europa ha cambiado, y nosotros también debemos hacerlo. Con nuestra declaración de independencia de los burócratas de Bruselas, es hora de forjar un nuevo camino, uno en el que la Bundeswehr no sea una mera fuerza de defensa, sino el escudo inquebrantable del pueblo alemán. Continuaremos los esfuerzos para restaurar la confianza popular en las fuerzas armadas. Nuestra seguridad ya no estará en manos extranjeras. La Bundeswehr renace, lista para dar la cara ante cualquier amenaza."
 GER_towards_a_greater_germany: "Hacia la Gran Alemania"
 GER_towards_a_greater_germany_desc: "La pequeña solución alemana fue y sigue siendo un gran error. Sin más ataduras a trivialidades ni concesiones en pos de la unidad, forjaremos una Alemania más fuerte y orgullosa. ¡El destino del pueblo alemán ya no lo dictarán los burócratas de Bruselas! Austria, una parte perdida de nuestro pueblo, recuperará su legítimo lugar en la Gran Alemania. Esto no es una mera expansión; es la corrección de la historia misma. El mundo observará cómo Alemania resurge.\n\n\"Das soll es sein! Das soll es sein!\nDas ganze Deutschland soll es sein!\""
 GER_sew_euro_skepticism: "Sembrar euroescepticismo"
 GER_sew_euro_skepticism_desc: "La Unión Europea se construyó sobre ideales nobles, pero la realidad ha expuesto defectos. Las grietas en sus cimientos están creciendo, y nos aseguraremos de que nadie las ignore. Amplificaremos las voces de la soberanía nacional en toda Europa, exponiendo los fallos de Bruselas y recordando a los ciudadanos que la soberanía les pertenece solo a ellos. Cada escándalo, cada extralimitación y cada fracaso alimentará el euroescepticismo. El sueño, o mejor dicho, la pesadilla, de un superestado europeo llegará a su fin, no por una potencia extranjera, sino por la voluntad de los ciudadanos."
 GER_fight_euroskeptic_hate_speech: "Combatir discursos de odio euroescépticos"
 GER_fight_euroskeptic_hate_speech_desc: "A medida que la Unión se fortalece y promovemos nuestro objetivo de federalización, también lo hacen las voces que buscan socavarla. Por toda Europa, los reaccionarios difunden miedo, desinformación y fakes. Se aprovechan de la ansiedad económica y el resentimiento nacionalista para frenar nuestro progreso. Afirman defender la soberanía de sus propias naciones, pero no consideran que la Unión es el mayor garante de la soberanía europea. Sin ella, viviríamos bajo la bota de Moscú. ¡A ver si protestarán entonces por la soberanía!\n\nDebemos actuar con decisión. Al contrarrestar este discurso de odio euroescéptico con una sólida campaña de divulgación, educación y medidas legales, revelaremos sus mentiras y reafirmaremos nuestros valores de dignidad, democracia, igualdad y Estado de derecho. La marea de división se revertirá y la Europa unida avanzará siempre hacia adelante."
 GER_modern_wolf_packs: "Rudeltaktik moderna"
 GER_modern_wolf_packs_desc: "Durante la Segunda Guerra Mundial, el almirante Dönitz creó una de las estrategias de guerra naval más efectivas de la historia: la táctica de manada. Estos grupos coordinados de submarinos se utilizaron para dar caza a los buques de suministro, lo que perturbó gravemente las cadenas de suministro globales. A medida que la guerra evolucionó, esta táctica ha tenido una aplicación moderna limitada, lo que representa una oportunidad de oro para innovar y revivir esta estrategia de eficacia comprobada, lo que podría cambiar el equilibrio en el frente naval."
 GER_study_new_naval_tactics: "Estudiar nuevas tácticas navales"
 GER_study_new_naval_tactics_desc: "El análisis de conflictos pasados nos ha demostrado una cosa: los bombarderos navales representarán el futuro de la guerra marítima. Rápidos y a menudo indetectables, estos aviones son capaces de lanzar potentes cargas útiles para eliminar cualquier buque que se atreva a entrar en nuestras aguas territoriales. Lanzado desde portaaviones móviles, estos bombarderos mejoran significativamente nuestra capacidad de proyectar poder y mantener el dominio en los mares."
 GER_automating_warfare: "Guerra automatizada"
 GER_automating_warfare_desc: "La inteligencia artificial ha experimentado un crecimiento extraordinario en los últimos diez años, desempeñando un papel clave no solo en la vida cotidiana, sino también en situaciones de combate. Esto plantea una pregunta importante: ¿Deberíamos integrar la IA para operar nuestras máquinas militares, ahorrando personal y reduciendo los costes de reclutamiento? ¿O deberíamos mantener el control humano para prevenir errores peligrosos como el fuego amigo y evitar los desafíos que supone mantener sistemas tan complejos?"
 GER_germania_rules_the_waves: "Germania gobierna las olas"
 GER_germania_rules_the_waves_desc: "Nuestras reformas navales han finalizado. La Marine ha pasado de ser una flota desorganizada y con pocos fondos a una de las fuerzas navales más formidables del planeta. Mediante inversión estratégica, tecnología avanzada y un riguroso entrenamiento, hemos creado una armada digna de respeto y temor mundial. Sin duda, estamos preparados para los conflictos del futuro. Germania volverá a dominar los mares, afirmando su dominio en todos los océanos."
 GER_revolution_on_the_ballot: "Revolución en la boleta"
 GER_revolution_on_the_ballot_desc: "La guerra en Europa ha terminado, el Este está sembrado de cadáveres y humeantes pilas de tanques. Nosotros, los alemanes, debemos preguntarnos: ¿Por qué hemos permitido esto? ¿Cuánto tiempo más vamos a soportar que los oligarcas enfrenten a los trabajadores del mundo? ¡Basta ya! El pueblo gritó y, sin disparar un tiro, tomó del poder. Ahora, solo nos queda actuar y cambiar el continente para mejor, para traer paz, prosperidad y un futuro para quienes habrían muerto por ello."
 GER_reconquer_east_germany: "Reconquistar el Oriente"
 GER_reconquer_east_germany_desc: "Alemania Oriental ha estado sumida en el caos desde la caída de la RDA, con aspirantes a fascistas convirtiéndola en su bastión reaccionario. No podemos permitir que estas ideologías odiosas se enconen en la cuna del socialismo alemán, pero no las reconquistaremos con violencia, sino con hierro y hormigón. Se iniciarán de inmediato proyectos de desarrollo que proporcionen vivienda, infraestructura y empleo a quienes fueron abandonados por Occidente hace 30 años."
 GER_establish_workers_councils: "Podar corporaciones"
 GER_establish_workers_councils_desc: "La victoria en las recientes elecciones, junto con el triunfo en la Guerra Europea, ha generado la tan necesaria confianza y poder dentro del Gobierno. Por ello, debemos empezar a asegurar que las fuerzas capitalistas, que también se han enriquecido con la guerra, sean reducidas a la mínima expresión. Las investigaciones sobre la corrupción y las leyes antimonopolio, junto con la estatización de ciertos activos corporativos, deberían garantizar que estas empresas se mantengan en un tamaño que sea más conveniente tanto para el Estado como para el pueblo, sin incurrir en una fuga de capitales."
 GER_economic_regulation: "Promover multietnismo"
 GER_economic_regulation_desc: "El concepto de Estado nación no solo es obsoleto, sino totalmente corrosivo para la Alemania que deseamos construir. Las fuerzas reaccionarias usarían esta idea para crear políticas racistas y discriminatorias con la esperanza de distraer al proletariado. Esta idea es algo que debemos desmantelar; estamos construyendo un país no solo para los alemanes, sino para el mundo entero. En el futuro rojo y brillante de este país, cualquiera puede ser alemán, siempre que lo desee."
 GER_criticize_the_eu: "Contener militarismo"
 GER_criticize_the_eu_desc: "El triunfo en el Este es sin duda motivo de orgullo, un continente dividido durante siglos, que se une para derrotar a un enemigo mucho mayor. Sin embargo, este orgullo es el abono perfecto para el crecimiento del fascismo. Por ello, debemos centrarnos en mostrar la verdad sobre el conflicto, la sangre y la muerte. La historia debe recordar la Guerra Europea como una tragedia, algo que podría haberse evitado de no haber sido por la intromisión de los oligarcas. Además, debemos empezar a regular nuestra industria militar y centrarnos en la producción civil, pues ya no es necesaria en la Europa de la posguerra."
 GER_work_with_our_allies: "Combatir la maquinaria rusa"
 GER_work_with_our_allies_desc: "La amargura es tanto el combustible de la reacción como de la revolución. Los oligarcas rusos, sin duda, aprovecharán la derrota para alimentar otro conflicto. Si bien debemos asegurarnos de evitarlo pacíficamente, siempre existe la posibilidad de que Rusia regrese tan radicalizada que no se detenga ante nada, excepto la victoria total. Por ello, ampliaremos el presupuesto de la UE y utilizaremos ese excedente para comenzar a subsidiar la producción militar de todos sus miembros y así hacer frente a lo peor que pueda ofrecer el Este."
 GER_the_bridge_between_east_and_west: "Puente entre Oriente y Occidente"
 GER_the_bridge_between_east_and_west_desc: "Ante el aumento de las tensiones en el Indopacífico y el resurgimiento de la guerra en Asia Oriental, tenemos la obligación de optar por la diplomacia en lugar del aislamiento. Asia se encuentra al borde de una guerra cuyas consecuencias podrían arrastrar al resto del mundo, incluyéndonos a nosotros mismos. Pero ahora que hemos salido de estos últimos años más fuertes y con más principios, tenemos el imperativo moral de actuar. Al tender puentes con Tokio para fomentar el diálogo y la cooperación, podemos posicionarnos como el mediador que el mundo necesita desesperadamente. Sin embargo, si ocurre lo peor, nos mantendremos firmes junto a Tokio en la defensa de los valores democráticos."
 GER_for_the_sake_of_stability: "Por el bien de la estabilidad"
 GER_for_the_sake_of_stability_desc: "El mundo que nos rodea se encuentra en un estado volátil, algo que acabamos de experimentar de primera mano. Afortunadamente, resistimos la embestida rusa y emergimos como una nación próspera en una alianza exitosa. Sin embargo, no es momento de agitar las aguas, y debemos mantener la estabilidad que tanto nos costó conseguir. Por eso se eligió a la CDU: los votantes no quieren cambios, quieren que lo que tienen continúe. ¡Cumpliremos nuestras promesas de paz y prosperidad y guiaremos a Alemania hacia el futuro!"
 GER_expand_eu_cooperation: "Expandir cooperación europea"
 GER_expand_eu_cooperation_desc: "Hemos probado que la UE es más que una página más en la historia; llegó para quedarse. Sin embargo, como toda buena maquinaria, requiere un mantenimiento constante para garantizar su correcto funcionamiento. Aunque hayamos vencido a los rusos, mañana podrían volver, y si no estamos preparados, estamos condenados. Aprovecharemos la paz que hemos alcanzado para estrechar lazos con nuestros camaradas europeos, de modo que, cuando la guerra regrese a nuestro continente, permanezcamos unidos y libres."
 GER_prop_up_eastern_europes_industry: "Apuntalar la industria de Europa Oriental"
 GER_prop_up_eastern_europes_industry_desc: "Con la derrota de los rusos, por fin podemos ampliar nuestro compromiso con Europa Oriental sin temores. Gran parte del Báltico, Bielorrusia y Ucrania quedaron devastados en la guerra, y esta es nuestra oportunidad de ayudarlos a reconstruirse mejor. La gente ha visto muchas oportunidades en el este, así que, con algunos incentivos de nuestra parte, podemos convencerlos de que inviertan en industria e infraestructura. Haremos que el Este sea mejor que antes de la guerra; de hecho, ¡lo haremos mejor que nunca!"
 GER_keep_the_markets_stable: "Mantener los mercados estables"
 GER_keep_the_markets_stable_desc: "Decir que la cadena de suministro global está devastada es el eufemismo del siglo. Con ER. UU. desaparecido, China y Japón desangrado Asia, y Rusia marginada por ahora, debemos recurrir a los mercados tradicionales. Afortunadamente, nos hemos ganado la confianza de los inversores gracias a nuestra victoria en la guerra contra Rusia, y la economía ha experimentado un repunte. Lo que necesitamos más que nada es mantener esta tendencia de recuperación; solo entonces podremos impulsar otras."
 GER_subsidize_the_civilian_industry: "Subsidiar la industria civil"
 GER_subsidize_the_civilian_industry_desc: "Mantener a la nación fuerte no solo significa tener una gran industria militar, sino también una sólida base industrial civil. Antes de la guerra con Rusia, nos centramos principalmente en la fabricación militar y dejamos de lado prácticamente todo lo demás. Sin embargo, ahora es el momento de volver a la producción de todo tipo de productos, en lugar de solo lo que necesita el ejército. Tenemos la oportunidad de convertirnos en una potencia industrial, ¡y no la desperdiciaremos!"
 GER_fund_the_military_industry: "Financiar la industria militar"
 GER_fund_the_military_industry_desc: "En los últimos años hemos aprendido por las malas que depender del extranjero no nos beneficia. Por lo tanto, debemos asegurarnos de obtener los suministros necesarios, especialmente los militares, de fuentes confiables. ¿Y en quién podemos confiar más que en nosotros mismos? En lugar de recortar el gasto militar industrial, redoblarlo es actualmente nuestra mejor opción. Debemos ser capaces de producir bienes no solo para nosotros, sino también para nuestros hermanos europeos. Solo cuando todas las naciones de la UE estén tan bien armadas como nosotros podremos considerarnos una verdadera potencia militar."
 GER_defend_democracy: "Defender la democracia"
 GER_defend_democracy_desc: "En los últimos meses se ha hecho cada vez más evidente que la amenaza rusa no ha sido eliminada para siempre. Volverá, más temprano que tarde. Con la democracia asediada en todo el mundo, es más que imperativo que defendamos lo que tenemos y sigamos siendo un faro de libertad y prosperidad. Incluso hay quienes dicen que deberíamos ir más allá y proteger la democracia en el extranjero, y muchos coinciden en esa opinión. Sin embargo, por ahora debemos centrarnos en nuestros propios asuntos. Si los rusos vienen a por nosotros, y lo harán, ¡no nos iremos sin pelear!"
 GER_the_red_roses_finest_hour: "Hora más gloriosa de la rosa"
 GER_the_red_roses_finest_hour_desc: "En nuestros casi 150 años de existencia, nunca hemos visto un triunfo tan grande. No solo hemos vencido a los rusos y traído la paz a Europa Oriental, sino que también hemos asegurado el futuro de nuestra nación. Nuestros éxitos no pasaron desapercibidos para el pueblo, que nos votó abrumadoramente al poder, pero, aún más importante, depositó su confianza en nosotros. Esta muestra de confianza de nuestros ciudadanos no ha pasado desapercibida, y pondremos toda nuestra voluntad en impulsar nuestra agenda. ¡La rosa ha brotado, pero pronto florecerá de verdad!"
 GER_reverse_schroders_reforms: "Revertir reformas de Schröder"
 GER_reverse_schroders_reforms_desc: ""
 GER_an_industrial_renaissance: "Renacimiento industrial"
 GER_an_industrial_renaissance_desc: "Históricamente, Alemania siempre ha sido una gran potencia industrial. Sin embargo, en los últimos años, al igual que muchos países, nuestras empresas se expandieron a nivel mundial y comenzaron a fabricar productos en otros lugares. En la situación actual del mundo, esto no puede continuar, por el bien de nuestra nación y la estabilidad económica de nuestra gente. A partir de ahora, implementaremos una política para incentivar a las empresas a mudarse y construir sus fábricas en casa y, si podemos, convencer a las empresas extranjeras para que se instalen aquí. ¡Es hora de que el \"Made in Germany\" vuelva a ser una realidad!"
 GER_help_out_the_working_class: "Ayudar a la clase obrera"
 GER_help_out_the_working_class_desc: "Alemania, como toda nacion, se construyó gracias al esfuerzo de los trabajadores. Solo gracias a su diligencia, trabajo duro y férrea voluntad hemos llegado hasta donde estamos hoy. Muchos países lo olvidan y los ignoran, centrándose en enriquecer a quienes ya tienen de sobra. ¡Alemania no! Durante el mandato del SPD, trabajaremos arduamente para aprobar leyes que lleven prosperidad a los trabajadores. ¡Un trabajador feliz es un trabajador eficiente!"
 GER_push_for_federalization_2: "Impulsar la federalización"
 GER_push_for_federalization_desc: "Algo que tenemos en común con la mayoría de los partidos de izquierda en Europa es nuestro deseo de federalizarnos. Con la caída de EE.UU., la guerra en el Este y la constante amenaza de Rusia, ¡solo mostrando unidad podremos capear el temporal que se avecina! Somos un solo continente, y si bien hemos luchado entre nosotros en el pasado, también hemos trabajado juntos en innumerables ocasiones. La federalización puede funcionar, y con Alemania al mando, construiremos una Unión Europea fuerte y libre."
 GER_work_with_europes_social_democrats: "Colaborar con socialdemócratas de Europa"
 GER_work_with_europes_social_democrats_desc: "Si bien hay un fuerte sentimiento federalista en Alemania, varias naciones europeas no lo comparten. Lo último que queremos es forzarlo y arriesgarnos a distanciarnos de algunos de nuestros aliados. Por el contrario, intensificaremos la colaboración con partidos que comparten nuestra ideología y forjaremos relaciones aún más sólidas que la unidad. Con este objetivo, nuestros vínculos con otros países europeos se profundizarán. Si bien somos un solo continente, somos muchos pueblos diversos, ¡y la diversidad hace la fuerza!"
 GER_take_in_russian_dissidents: "Acoger disidentes rusos"
 GER_take_in_russian_dissidents_desc: "Una cosa que nos diferencia de algunos de los partidos más conservadores de Europa es nuestro punto de vista sobre los rusos. Sí, son una amenaza, algo que ya demostraron en el pasado no hace mucho. Pero por otro lado su pueblo no tiene la culpa de eso, muchos de ellos han intentado escapar de su opresivo régimen. En nuestro país hay algunos que los quieren echar, dejándoles sin un lugar al que ir, nosotros no. Aquellos que se ven forzados a huir de su país son bienvenidos aquí, no solo rusos, de todo el mundo. ¡Alemania estará para ayudarte!"
 GER_liberalisms_time_to_shine: "Momento de brillar del liberalismo"
 GER_liberalisms_time_to_shine_desc: "Tras horas, meses y años de incansable esfuerzo por parte de nuestros trabajadores, ciudadanos y políticos, hemos llevado a Alemania a su máximo esplendor, derrotando la amenaza en el Este y reprimiéndola. Esta victoria no solo es un testimonio de la fortaleza de nuestra nación, sino también de la dedicación y resiliencia de cada persona que contribuyó a este gran logro. Esto no significa que debamos detenernos; para garantizar la supervivencia de Alemania, esta debe seguir siendo siempre el faro económico y militar de Europa, y debemos seguir trabajando con más ahínco para mantener nuestro nuevo estatus como la potencia hegemónica europea."
 GER_minimize_welfare: "Minimizar prestaciones sociales"
 GER_minimize_welfare_desc: "A pesar de nuestros esfuerzos por construir un Estado del bienestar, han surgido varios desafíos, desde la pérdida de confianza pública en las instituciones financieras hasta la distribución desigual de las prestaciones y la creciente presión sobre el presupuesto nacional. Para abordar estos problemas y evitar que se repitan, se ajustarán las prestaciones sociales. Se reducirá su alcance, pero se harán más eficaces y específicas. Esto significa que el apoyo se centrará en quienes más lo necesitan, mejorando la equidad y la eficiencia. Con ello, buscamos restaurar la confianza, reducir el despilfarro y garantizar que el sistema de bienestar siga siendo sostenible y capaz de apoyar a nuestra sociedad a largo plazo."
 GER_empower_the_individual: "Empoderar al individuo"
 GER_empower_the_individual_desc: "El individuo es la columna vertebral de toda nación. Independientemente de su función, ya sea un cartero local que garantiza que las comunidades alemanas se mantengan conectadas, un profesorado que forma las mentes de la próxima generación o un recolector de basura que ayuda a mantener limpia cada calle, cada persona contribuye a los pilares fundamentales de la sociedad alemana. Sus derechos, el derecho a la libertad de expresión, son los más importantes y deben protegerse plenamente para defender uno de los valores fundamentales de Alemania: la libertad. Para garantizar el pleno control de cada individuo sobre sí mismo, se le debe otorgar un mayor control sobre cómo define su vida personal y financiera."
 GER_a_dynamic_economy: "Una economía dinámica"
 GER_a_dynamic_economy_desc: "Uno de los valores fundamentales de nuestro partido es implementar un verdadero sistema de libre mercado en Alemania. Con la amenaza rusa neutralizada en el este, podemos comenzar a desmovilizar nuestra economía de guerra y a transitar hacia un sistema de libre mercado. Al reducir la intervención gubernamental y permitir el crecimiento de las empresas privadas, crearemos un entorno donde las empresas puedan prosperar, impulsar la innovación del país y construir una potencia económica guiada por la oferta, la demanda y el espíritu de nuestra gente."
 GER_push_for_a_european_defense_ministry: "Impulsar un Ministerio de Defensa Europeo"
 GER_push_for_a_european_defense_ministry_desc: "En toda Europa, mentes brillantes están listas para defender el continente, pero sin unidad, su fuerza es inútil para nuestra causa. Para crear una fuerza militar europea centralizada, debemos confiar en un líder capaz para supervisar y gestionar nuestro nuevo Ejército Europeo. Este líder organizará nuestros ejércitos y sentará las bases de un ejército europeo verdaderamente unido. Es inevitable que los rusos nos ataquen de nuevo, por lo que debemos tomar las siguientes medidas para consolidar a todos los ejércitos europeos en un solo ejército, un solo mando, un solo propósito: la defensa de Europa."
 GER_enforce_the_north_atlantic_treaty: "Imponer el Tratado del Atlántico Norte"
 GER_enforce_the_north_atlantic_treaty_desc: "Durante la Guerra Europea, la estructura de la OTAN era caótica, desorganizada y desunida. Desde su conclusión, muchos ejércitos europeos se encuentran desintegrados, destrozados, con escasez de personal y equipamiento. Por lo tanto, nos corresponde, como líderes del mundo libre, reforzar a nuestros aliados ayudándolos a reconstruir sus fuerzas armadas y unificando verdaderamente la estructura de mando de la OTAN para asegurarnos de estar preparados para la inevitable segunda guerra."
 GER_push_for_more_federalization: "Impulsar mayor federalización"
 GER_push_for_more_federalization_desc: "Desde la conclusión de la Guerra Europea, las voces en el Europarlamento se han alzado con más fuerza a favor de una federalización más profunda. Si bien logramos derrotar al oso ruso, es solo cuestión de tiempo antes de que se reconstruya y ataque de nuevo, sumiendo a Europa en otro conflicto. Si queremos sobrevivir a lo que nos espera, no podemos permitirnos permanecer divididos. Debemos unir a todas las fuerzas armadas y el poder industrial de Europa para garantizar una paz duradera y proteger a todos los ciudadanos europeos."
 GER_a_green_future_2: "¿Un futuro verde?"
 GER_a_green_future_2_desc: "Con el último voto emitido y toda la atención centrada en nosotros, el futuro de la nación alemana está decidido. Floreciendo como un glorioso girasol, Die Gruene ha vuelto a tomar las riendas del poder. Alemania es verde, pero ¿por qué detenerse ahora? Muchos aspectos de nuestra nación aún necesitan reformas, desde el transporte hasta la agricultura. Dada la situación actual de Europa, es necesario reformar cuanto antes. Guiados por nuestra mano, las semillas que ya brotan crecerán y florecerán por toda Europa. La nueva revolución verde se extenderá como una gran marea, no solo en nuestro país, sino en toda Europa, creando un futuro mejor para todos los europeos."
 GER_subsidize_public_transportation: "Subsidiar el transporte público"
 GER_subsidize_public_transportation_desc: "¿Qué se piensa cuando la gente piensa en Alemania? Quizás, en la autopista o, más probablemente, en nuestro vasto sistema ferroviario europeo. Pero la realidad es más compleja de lo que muchos ven. A pesar del trabajo diligente de administraciones anteriores, gran parte de nuestra red de infraestructuras carece de fondos suficientes y se está desmoronando en este preciso momento. Esto no puede continuar y debe corregirse de inmediato. Con subsidios, proyectos y reparaciones, llevaremos nuestra red de carreteras, ferrocarriles y aeropuertos hacia el futuro. Donde las carreteras y las líneas ferroviarias serpentearán por todo el país como las vides de una planta, impulsando nuestra transición hacia una nación cien por cien limpia."
 GER_reform_agriculture: "Reformar la agricultura"
 GER_reform_agriculture_desc: "Maíz, grano, cebada. Aunque estas palabras puedan no significar mucho para la mayoría, son el sustento de nuestros agricultores. Si bien nuestra administración anterior ha tomado varias medidas para ayudar a nuestros agricultores, aún queda mucho por hacer. La mayoría de nuestros agricultores aún rocían pesticidas químicos, sin ser conscientes de los peligros que estas toxinas representan para las plantas y para sí mismos. Como parte de nuestra nueva visión para Alemania, nos esforzaremos conscientemente por educar a nuestros agricultores sobre los beneficios de las técnicas más ecológicas. Subvencionaremos cambios que no solo aumentarán la producción agrícola, sino que también les permitirán crecer y expandirse. Con esto, creceremos y nos expandiremos, convirtiéndonos en un competidor de Ucrania como el granero de Europa."
 GER_an_ecofriendly_industry: "Una industria eco-friendly"
 GER_an_ecofriendly_industry_desc: "El futuro será verde, o no será: un lema compartido por los jóvenes de nuestro país, conscientes del cambio climático. Es hora de que empecemos a trabajar para finalizar la Energiewende, continuando nuestra transición hacia un sistema energético sostenible. Promoveremos una economía circular, reduciendo el consumo de recursos, y ofreceremos incentivos gubernamentales para modernizar edificios y maquinaria y así reducir significativamente el consumo de energía. Además, brindar capacitación y educación a los trabajadores y a los empresarios alemanes del futuro puede ayudar a nuestras industrias a adoptar operaciones más ecológicas."
 GER_fund_russian_dissident_groups: "Asistir a Ucrania"
 GER_fund_russian_dissident_groups_desc: "En los primeros meses de la Guerra Europea, muchos expertos temieron lo peor para nuestros aliados ucranianos. Sin embargo, a pesar de todos nuestros temores, se mantuvieron firmes. Y con nuestro apoyo, hicieron retroceder al oso ruso, enviándolos de vuelta a Moscú con el rabo entre las piernas. Ahora, Ucrania se erige como un componente clave de nuestra influencia en Europa Oriental, y nuestro apoyo hacia ellos no flaqueará. Bajo nuestra guía y con el apoyo de la OTAN, Ucrania se transformará en el bastión oriental de la libertad, lista para defenderse de cualquier invasión de represalia que pueda provenir de Moscú."
 GER_continent_wide_cooperation: "Cooperación continental"
 GER_continent_wide_cooperation_desc: "Tras consolidarnos como potencia europea dominante, la posguerra nos ha planteado numerosos desafíos nuevos. Nuestros territorios recién liberados sufren económicamente, mientras que Rusia se resiste a la ocupación en las zonas controladas por Ucrania. En el Cáucaso, la región se encuentra en una situación delicada, con las tensiones en Chechenia amenazando con estallar en cualquier momento, lo que llevaría a la región a una guerra abierta. Por mucho que intentemos admitirlo, no podremos resolver estos problemas solos. Por eso, recurriremos a la ayuda de nuestros aliados europeos. Mediante la consolidación de la UE, fomentaremos un profundo sentido de camaradería y solidaridad entre los europeos, lo que nos permitirá estar a la altura de nuestros aliados y garantizar la continuidad de la democracia y la libertad."
 GER_fortify_eastern_europe: "Fortificar Europa Oriental"
 GER_fortify_eastern_europe_desc: "Una tormenta se avecina, aún mayor en tamaño y fuerza que la anterior. El oso ruso está despertando. Se está lamiendo las heridas y buscará venganza. Lo cierto es que la guerra vuelve a asomar, y aunque no podamos retrasar lo inevitable, sí podemos prepararnos para la venganza de Moscú. En todo el país, en coordinación con nuestros aliados, se elaborarán planes, se harán preparativos y se organizarán líneas de repliegue. Esta guerra no se tratará solo de supervivencia. Redefinirá fundamentalmente la composición misma del continente europeo. La victoria es la única opción, ya que cualquier otra opción nos conducirá a la derrota y al regreso de Moscú, no solo en el Este, sino en toda Europa."
 GER_strength_and_glory: "Fuerza y Gloria"
 GER_strength_and_glory_desc: "\"Debilidad\" no existe en el diccionario alemán. Nuestro país se forjó con hierro, nuestro pueblo se forjó con sangre, nuestra voluntad se forjó en las llamas del infierno. Desde que los caballeros teutónicos se asentaron en esta tierra, ha estado habitada por soldados y guerreros, cada uno más valiente que el otro, cada uno dispuesto a sacrificarse por su patria. A diferencia de los estadounidenses que se enorgullecen de nimiedades como la libertad y la diversidad, o de los molestos franceses que se enorgullecen del vino y el queso, el orgullo y la gloria alemanes tienen sus raíces en la profunda historia de la destreza y la fuerza militar de nuestro pueblo."
 GER_true_to_form: "Fiel a forma"
 GER_true_to_form_desc: "Fue hace apenas ochenta años que, cuando los abuelos de nuestros padres aún se recuperaban de la vergonzosa derrota de la Primera Guerra Mundial, una nueva y vigorosa ideología, ardiente por la sed de venganza, devolvió el orgullo y la valentía de la nación y el pueblo alemán. El nacionalsocialismo fue un conjunto de ideales y principios esculpidos en las llamas de la guerra y la desesperación de nuestro pueblo; es una ideología verdadera y puramente alemana. Cada ley, cada decreto, cada mandamiento, grabado en la sangre de cada alemán, para que cada alemán lo tome en serio."
 GER_national_hygiene: "Programa de higiene nacional"
 GER_national_hygiene_desc: "La máxima importancia para el éxito de una nación, para el bienestar de su pueblo, reside, por supuesto, en su nivel de higiene. Una nación sana no está llena de enfermos y débiles, sino de guerreros y luchadores, con huesos y músculos sanos. La energía que impulsa a una nación inmaculada reside en una fuerza laboral sana, y el arma que esta nación empuña está hecha de soldados sedientos de sangre que, sin duda, pueden lanzarse a la línea de fuego sin pensarlo dos veces. Por lo tanto, es crucial que nuestra querida Alemania no caiga en las sombras y la podredumbre de la inmundicia, sino que se sumerja en la luz de la fuerza y la pureza."
 GER_the_totalitarian_society: "Sociedad totalitaria"
 GER_the_totalitarian_society_desc: "Intentamos formas liberales de sociedad. Intentamos darles libertad, independencia y seguridad. Miren adónde nos llevó eso. Derrota, muerte y destrucción. Nuestra bondad fue usada en nuestra contra; nuestro amor, inútil ante las balas escalofriantes de nuestros enemigos. Fue el dolor de la pérdida y las heridas superficiales lo que finalmente nos enseñó la verdad: que solo con mano de hierro podemos proteger eficazmente a nuestra nación del daño y la agresión extranjera."
 GER_assemble_the_reichsrat: "Convocar al Reichsrat"
 GER_assemble_the_reichsrat_desc: "Incluso después del despertar definitivo del pueblo y la nación alemanes, no debemos olvidar lo que nos hizo grandes y nos ha propagado hasta ahora en el curso de la historia. El Reichsrat, una reliquia weimariana, perdida en la historia del pasado, finalmente ha sido rescatada por las exigencias del contexto temporal. El Reichsrat no solo será un representante de la voluntad popular, sino también la forma definitiva de la conciencia colectiva."
 GER_german_nation_comes_first: "La nación alemana es lo primero"
 GER_german_nation_comes_first_desc: "Sin tu patria, no eres nada. Es un hecho. Durante demasiado tiempo, nuestro pueblo ha olvidado el verdadero significado del patriotismo. Algunos dentro de nuestra nación incluso lo han considerado una debilidad. ¡Ay!, sin hogar, ¿dónde descansar? Sin refugio, ¿dónde anidar? Hogar, nido, esto es lo que nuestra patria significa para nosotros. No solo es nuestro refugio eterno, sino también el hogar de nuestras familias, de nuestro pueblo, de nuestras raíces, y defender y proteger nuestros hogares y a nuestras familias es nuestra tarea más urgente y crucial."
 GER_fuel_the_machine: "Alimentar la máquina"
 GER_fuel_the_machine_desc: "Todo régimen exitoso necesita una maquinaria de propaganda eficaz que lo respalde, y ahora es el momento de que nazca la nuestra. El panorama mediático de este país debe estar completamente dominado por los apéndices de nuestro movimiento, dedicados al contenido. Desde periódicos hasta televisión y redes sociales, sofocaremos por completo a la gente con nuestro programa político. Cualquier otra cosa que se atreva a ofrecer información o contenido que nos cuestione será silenciada. Una vez que la ciudadanía vea y escuche únicamente nuestro mensaje, creerá hasta la médula todo lo que decimos y hacemos. La mente y el espíritu de las masas estarán en nuestras manos."
 GER_germany_everlasting: "Alemania, eterna"
 GER_germany_everlasting_desc: "Alemania, Deutschland. Desde su creación, desde la gran unificación del pueblo alemán en 1871 y su reunificación en 1990, ha soportado innumerables dificultades y desafíos inimaginables. Los engranajes de este artilugio oxidado y destartalado, como los huesos de un anciano con deficiencia de calcio, parecen frágiles, como si pudieran romperse cualquier día. El combustible que impulsa este aparato, el alma de esta tierra, se ha visto mancillado por la constante traición y derrota que ha sufrido nuestro pueblo. Sin embargo, el motor, el corazón de esta máquina de esta nación, sigue funcionando con fiereza y ardor como el primer día. Alemania ha librado numerosas batallas y superado innumerables obstáculos. Alemania también ha sido derrotada en múltiples ocasiones, la mayoría de las veces reducida a escombros y polvo. Sin embargo, Alemania sigue aquí, a diferencia de muchos de sus enemigos. Cada vez, después de cada batalla, hemos reconstruido con éxito nuestros hogares, no gracias a los recursos que tenemos, sino gracias a los principios y creencias de nuestro pueblo y como nación. Oh Alemania, mi patria, mi patria, te mantendrás alta y valiente, te elevarás por encima de todos nuestros enemigos, para siempre."
 GER_smash_the_splinters: "Aplastar a los separatistas"
 GER_smash_the_splinters_desc: "Pequeñas facciones recorren Alemania, difundiendo mentiras y propaganda para envenenar la mente alemana. Afortunadamente, nuestros predecesores tienen una solución: los enemigos del Reich fueron aniquilados durante la noche de los cuchillos largos, silenciando a traidores y enemigos del Reich con un solo golpe decisivo.\n\nSi queremos crear una Alemania fuerte y próspera, debemos acabar con estas escisiones rápidamente."
 GER_dismantle_anti_german_academia: "Desmantelar la academia teutofóbica"
 GER_dismantle_anti_german_academia_desc: "Los años del Imperio y del Reich alemanes marcaron una época de fuerza y orgullo nacional. Sin embargo, desde 1949, la influencia extranjera y un liderazgo débil han mermado el espíritu de nuestro pueblo. Se nos impuso una cultura de sumisión y vergüenza, se arriaron nuestras banderas y se silenciaron nuestras voces. Si queremos devolverle la grandeza a Alemania, debemos liberarnos de estas cadenas y reavivar el sentimiento de patriotismo que una vez nos definió."
 GER_fanatical_anti_communism: "Anticomunismo fanático"
 GER_fanatical_anti_communism_desc: "¿Quién es nuestro enemigo? ¿Qué es la inmundicia que debemos limpiar de las hermosas llanuras, colinas y montañas de Europa? Ni el liberalismo ni la democracia. La respuesta es la plaga carmesí que ha asolado el continente europeo y al mundo entero desde su concepción siglos atrás. Nuestros ciudadanos, nuestros hermanos europeos, quizá hayan olvidado nuestra lucha predestinada contra el enemigo supremo; algunos incluso pueden haberse convertido en fervientes creyentes de ella. Ya no. De hoy en adelante, el veneno comunista será erradicado de nuestra nación. Serán solo una nota al pie en la poderosa historia europea."
 GER_solidify_the_parteistaat: "Consolidar el Parteistaat"
 GER_solidify_the_parteistaat_desc: "Fue la inestabilidad política y las luchas internas entre los diferentes partidos lo que condujo a la indecisión y al fracaso del liderazgo alemán. En esta nueva Alemania, una Alemania más poderosa, el poder estará en manos de aquellos hombres lo suficientemente fuertes como para ejercerlo con eficacia y conducirnos al triunfo. Ya no se permitirá que los débiles de espíritu obstaculicen nuestro desarrollo, ni seremos atados por los mansos, ni los débiles de espíritu atraparán a los liberados. En situaciones difíciles como la que Alemania atraviesa actualmente, la nación no necesita políticos inertes y de palabras suaves, sino hombres fuertes dispuestos a revolucionar y cambiar radicalmente para el bien del país."
 GER_revive_our_warrior_spirit: "Revivir nuestro espíritu guerrero"
 GER_revive_our_warrior_spirit_desc: "Cuando Dios nos creó a los alemanes, sabía que no creaba un pueblo romántico, bondadoso ni amoroso. Los alemanes nacimos para ser combatientes, soldados. A lo largo de nuestra larga y tumultuosa historia, nos hemos forjado un lugar merecido bajo el sol. Con sangre y sudor nos abrimos paso entre las demás naciones, apoderándonos de su parte del sol. Sin guerra, sin derramamiento de sangre, sin sacrificio, Alemania jamás se habría unido, el pueblo teutónico jamás se habría unido verdaderamente. El pueblo alemán nació con sangre y con sangre morirá."
 GER_spirit_of_rommel_npd: "Espíritu de Rommel"
 GER_spirit_of_rommel_npd_desc: "Sin duda, si hay una táctica militar que ha definido nuestra brillantez durante décadas después de la guerra, es la Blitzkrieg. Es nuestro enfoque en maniobras rápidas, agresivas y flexibles para flanquear a nuestro enemigo y dominar sus fuerzas sin mucho combate, lo que nos ha llevado a un dominio innegable sobre el continente europeo y a la capitulación casi total de los británicos en Egipto y los soviéticos en el este.\n\nSin embargo, debido principalmente a cierta incompetencia de nuestros aliados y de nosotros mismos, ha llevado a nuestra capitulación ante los Aliados y a la consiguiente humillación. Esta vez, aprenderemos de nuestros errores pasados y nos aseguraremos de que esta segunda oportunidad sea un éxito.\n\nGracias al Zorro del Desierto y a su ingenio que condujo a la casi capitulación del norte de África británico, seguiremos su ejemplo. Dominaremos las artes de las tácticas de armas combinadas, así como la iniciativa y la improvisación para asegurarnos de que nuestros enemigos nunca vuelvan a triunfar sobre nosotros."
 GER_national_service_npd: "Servicio nacional"
 GER_national_service_npd_desc: "Hace tiempo, Alemania era famosa por su destreza y fuerza militar. El Reino de Prusia fue reconocido mundialmente como un estado militar gracias a que poseía el cuarto ejército más grande de Europa a pesar de tener solo una fracción de la población de las otras potencias europeas. Hoy, al hablar del militarismo alemán, muchos recuerdan las dos guerras mundiales. Sin embargo, en realidad, sin unas fuerzas armadas fuertes, nuestra nación habría sido débil y fácilmente destrozada por agresores extranjeros. Sin un ejército poderoso, Prusia jamás habría unificado Alemania. Sin fuerza militar, nos habríamos derrumbado bajo la presión de ambos frentes, como los austríacos durante la Primera Guerra Mundial. Sin una defensa eficaz, no habríamos podido resistir, y nuestro pueblo habría sido masacrado como ganado por los bolcheviques durante la Segunda Guerra Mundial. El militarismo fue, es y será fundamental para el pueblo alemán y su identidad. A medida que nuestros adversarios se acercan de nuevo a nuestras fronteras, necesitamos sangre nueva para llenar las filas de nuestras fuerzas armadas. Por lo tanto, debemos restablecer el servicio militar obligatorio, que una vez abandonamos neciamente."
 GER_four_year_plan: "Plan Cuatrienal"
 GER_four_year_plan_desc: "\"El enemigo de un buen plan es el sueño de un plan perfecto\", así dijo Clausewitz. Podríamos pasar años debatiendo qué futuro debemos construir para nuestra amada patria. Pero la situación exige acción inmediata. Lanzaremos un Programa Cuatrienal para restaurar y expandir masivamente nuestra economía e industria, y lo pondremos en marcha sin demora, para que el trabajador honesto sienta el cambio no en un futuro lejano, sino a partir de hoy."
 GER_promote_class_unity: "Promover unidad de clase"
 GER_promote_class_unity_desc: "Durante demasiado tiempo, nuestra sociedad ha estado desgarrada por divisiones filosóficas, religiosas y, sobre todo, económicas. Enemigos cercanos y lejanos alimentaron este caos, corrompiendo a nuestra gente y usándola como perros con correa. Nunca más. Esta vez, mediante diversos programas, nos aseguraremos de que los trabajadores de la Alemania de Hierro permanezcan unidos: un frente, una voluntad, ¡contra todos los que nos desean daño!"
 GER_award_the_workers: "Premiar a los obreros"
 GER_award_the_workers_desc: "En el \"viejo\" mundo, todos los partidos priorizaban a las corporaciones internacionales y a los inmigrantes orientales sobre el ciudadano alemán. Hoy, ponemos fin a eso. ¡Los constructores de nuestra nueva, forjada en acero y verdaderamente grandiosa nación serán recompensados como corresponde! ¡Les caerán encima beneficios, subsidios e incluso cupones de descuento para Lidl y Aldi! Claro, algunos proyectos podrían ver recortada su financiación, pero es un pequeño precio a pagar por la felicidad de nuestra gente."
 GER_consulidate_financial_capital: "Consolidar el capital financiero"
 GER_consulidate_financial_capital_desc: "El dinero duramente ganado por los honestos trabajadores y contribuyentes alemanes fue malgastado por la antigua junta liberal. Programas de género inútiles, iniciativas verdes, inversiones extranjeras dudosas... lo peor de todo es que nadie pudo detenerlo debido a la burocracia que crearon. De ahora en adelante, el capital financiero de nuestra nación estará centralizado y cada centavo se gastará bajo la estricta supervisión del Partido, ¡por el bien de nuestro pueblo!"
 GER_our_national_revolution: "Nuestra revolución nacional"
 GER_our_national_revolution_desc: "Tras años de lucha, la pérdida de muchos seguidores devotos y el desprecio generalizado de la sociedad, por fin lo hemos logrado. El viejo orden ha terminado. El pueblo ha hablado. La revolución ha llegado. Nuestro movimiento reina ahora con supremacía en toda Alemania, y es un espectáculo glorioso. Pronto todos verán lo que hemos planeado no solo para el futuro de esta nación, sino también para el de toda Europa. Ha llegado la hora de un cambio radical, y seremos la fuerza inquebrantable y ferviente que lo impulsará."
 GER_implement_10_point_program: "Implementar el Programa de los 10 Puntos"
 GER_implement_10_point_program_desc: "Ahora que ostentamos la autoridad suprema sobre la nación, es hora de empezar a implementar el programa oficial de 10 puntos del partido. Desde atacar al capital extranjero, desmantelar el atroz sistema de inmigración de nuestro país y devolver los derechos y la autonomía al trabajador alemán, nuestras políticas son directas y contundentes. A diferencia de los políticos del pasado, que tanto hablaban de cambio y no hacían nada una vez que ganaban, estamos ansiosos por trabajar para hacer realidad la visión de nuestro partido. Pronto, todos los ciudadanos alemanes verán que defendemos tanto los cambios que siempre hemos prometido como un plan de acción creíble para hacerlos realidad."
 GER_revolutionary_dictatorship: "Dictadura revolucionaria"
 GER_revolutionary_dictatorship_desc: "No debe haber concesiones ni debilidades en nuestra posición. Todo el poder del Estado recaerá en nosotros y solo en nosotros. Para dar paso a nuestro gobierno, los vestigios decrépitos de la antigua democracia y de quienes la dirigieron serán barridos. Se acabaron los políticos electos obstructivos, los capitalistas plutocráticos y los partidos y ONG traidores, dispuestos a socavar la soberanía de Alemania. Todo desaparecerá. Aunque algunos protestarán por nuestra actuación, la verdad permanece clara. Nadie echará de menos a las débiles instituciones y personas que llevaron a la ruina de este país. Ahora es la férrea voluntad revolucionaria de nuestro partido la única que guía a Alemania hacia el futuro, y tenemos muchos planes."
 GER_workers_state: "Estado obrero"
 GER_workers_state_desc: "Mientras transformamos la nación alemana en lo que debería ser, debemos dejar clara nuestra postura sobre una pregunta crucial: ¿para quién está el Gobierno? Nuestra respuesta es simple, una respuesta que toda la nación debe conocer. Este país no pertenece a los capitalistas cosmopolitas y liberales que se enriquecen a costa nuestra. No pertenece a políticos traidores ni a extranjeros que viven en barrios cerrados y conspiran para vendernos a intereses ajenos. El Estado pertenece a los trabajadores y a la gente común de Alemania, al pueblo mismo. Han trabajado incansablemente por el país y han sido despojados por las élites que decían representarlos. Sus intereses ya no serán ignorados ni menospreciados. Ha llegado el momento de hacer justicia y devolverles el país."
 GER_break_the_opportunists: "Romper a los oportunistas"
 GER_break_the_opportunists_desc: "Nuestro ascenso al poder no pudo haber sido logrado por un pequeño grupo de activistas. Fue el trabajo de miles y miles de patriotas leales, dedicados incansablemente a la causa. Sin embargo, no debemos ser tan ingenuos. Mucha gente se unió a nosotros simplemente por sus propios intereses. Se trata de hombres de otros partidos y grupos rivales que, al ver que no podían asegurar el poder para sí mismos ni para sus camaradas, se unieron a nosotros para cosechar los frutos de nuestro éxito. Este oportunismo es vergonzoso, y ya es hora de que nos pongamos firmes y destierremos a todos estos charlatanes astutos. Dondequiera que se escondan dentro de nuestro movimiento, expondremos sus fechorías, los arrancaremos de donde se esconden y los expulsaremos. Todo miembro del partido y ciudadano debe aprender que esta actividad vergonzosa tiene un alto precio."
 GER_strasserite_principles: "Principios strasseristas"
 GER_strasserite_principles_desc: "Gregor y Otto Strasser fueron hombres muy adelantados a su tiempo. Ante las fechorías de los comunistas y las deficiencias de los nacionalsocialistas, supieron articular el verdadero camino a seguir para la nación alemana. En la lucha por la victoria, los nacionalistas revolucionarios no deben conformarse con apaciguar a nadie. Todos los enemigos de la soberanía alemana, desde los capitalistas plutocráticos hasta los comunistas cosmopolitas, deben ser derrotados. Esta es una verdad que fue revelada, pero silenciada durante muchos años por los enemigos de Strasser, tanto extranjeros como nacionales, pero ya no. No habrá más silencio, ni más supresión de sus ideales. Sus principios deben convertirse en piedras angulares de las políticas de nuestro partido, principios que todos los alemanes deben atesorar. Los ideales de los Strasser serán el pilar de esta nación, tanto hoy como mañana."
 GER_against_both_evils: "Contra ambos males"
 GER_against_both_evils_desc: "Lo que más nos enfurece es el juego de acusaciones que nos lanzan ambos bandos del espectro político. La ultraizquierda nos llama matones nazis procapitalistas, mientras que los conservadores burgueses ricos e incluso otros de la ultraderecha nos llaman comunistas. Todo esto es un disparate. Vemos la verdad más allá de esta falsa dicotomía. Tanto el capitalismo desenfrenado como el comunismo han devastado Alemania en casi todos los sentidos. Desde nuestro patrimonio cultural hasta nuestra supremacía económica mundial, estos dos venenos han causado un daño incalculable tanto en el pasado como en la actualidad. Pero ahora es el momento de hacer saber al mundo que no toleraremos más estas dos amenazas. Alemania se alzará con orgullo para derribar la hoz y el martillo y el billete de un solo golpe."
 GER_revolution_against_the_revolution: "Revolución contra la revolución"
 GER_revolution_against_the_revolution_desc: "Al Oriente se encuentra la mayor amenaza para Alemania en años: los rusos. Mientras luchábamos por tomar el poder dentro de Alemania, ellos observaban, planeaban en secreto, movilizaban sus fuerzas y ahora están listos para atacar. Sin embargo, este peligro nos resulta incómodamente familiar. Su gobierno es como el nuestro: uno que afirma estar al servicio de las masas y ha sustituido por completo a la vieja Rusia por una nueva. Dos naciones renacidas en medio de una revolución, una revolución radical e inflexible. Pero deben saber que no estamos aquí para fraternizar ni compartir el continente. Vemos la señal de alarma. Solo una ideología, una visión, un espíritu, una revolución pueden dictar el futuro. Este es un recordatorio que pronto les inculcaremos por la fuerza."
 GER_enlighten_the_masses: "Iluminar a las masas"
 GER_enlighten_the_masses_desc: "Al pueblo alemán le han vendido innumerables mentiras sobre nuestro movimiento. Periodistas codiciosos y políticos conspiradores les han dicho que somos matones y traidores, merecedores de desprecio y odio. Pero ahora la situación ha cambiado, y somos nosotros quienes controlamos firmemente el espacio informativo de este país. Es hora de que la gente escuche nuestro programa completo, nuestra verdad. Nuestros miles y miles de seguidores y los medios de comunicación se movilizarán para ilustrar a las masas sobre nuestra misión por la salvación de Alemania. Desde la televisión hasta internet, nuestras palabras llegarán a cada rincón de la nación y cautivarán la mente de todos los que las escuchen."
 GER_revive_the_sa: "Revivir a la Sturmabteilung"
 GER_revive_the_sa_desc: "Las Sturmabteilung, o SA, fueron el mejor ejemplo de movilización masiva del pueblo alemán en la historia moderna. Las masas comunes de patriotas alemanes, unidas en un espíritu unificado y una lucha enérgica, constituyeron una fuerza poderosa que infundió miedo en los enemigos internos de Alemania. Esta es una institución que debemos resucitar con orgullo, un recuerdo que debemos recuperar. Movilizaremos a nuestros seguidores y a todos aquellos dispuestos a luchar por una Alemania mejor en una formación de combate popular única. Nuestras SA modernas, equipadas con herramientas contemporáneas de acción masiva, no tendrán parangón con ningún otro movimiento paramilitar del continente. ¡Así que izad la bandera y estrechad filas! Los uniformes familiares de marrón y negro vendrán a castigar una vez más a los enemigos internos de Alemania."
 GER_black_front_of_fighters: "Frente Negro Combativo"
 GER_black_front_of_fighters_desc: "Tras la salida de Otto Strasser del NSDAP, formó un grupo dedicado a su causa e ideas: el Frente Negro. Durante los últimos años de Weimar, lucharon por los principios de su líder: el nacionalismo revolucionario y la resistencia al capitalismo cosmopolita, antes de ser desmantelados por el nuevo Gobierno de Hitler. Pero los tiempos han cambiado, las ideas de los Strasser ahora reinan en Alemania, y es justo que revivamos la organización dedicada a ellas. En los círculos de poder de Berlín, en las oficinas del Gobierno local y en todas las demás instituciones sociales y políticas importantes, nuestro nuevo Frente Negro servirá como el máximo unificador de la voluntad de nuestro partido y del pueblo. No será solo un organismo que imponga estas ideas, sino algo que trascenderá todo lo que los Strasser pudieron haber visto en su época."
 GER_revive_our_warrior_spirit_tw: "Revivir nuestro espíritu guerrero"
 GER_revive_our_warrior_spirit_tw_desc: "Cuando Dios nos creó a los alemanes, sabía que no creaba un pueblo romántico, bondadoso ni amoroso. Los alemanes nacimos para ser combatientes, soldados. A lo largo de nuestra larga y tumultuosa historia, nos hemos forjado un lugar merecido bajo el sol. Con sangre y sudor nos abrimos paso entre las demás naciones, apoderándonos de su parte del sol. Sin guerra, sin derramamiento de sangre, sin sacrificio, Alemania jamás se habría unido, el pueblo teutónico jamás se habría unido verdaderamente. El pueblo alemán nació con sangre y con sangre morirá."
 GER_spirit_of_rommel_tw: "Espíritu de Rommel"
 GER_spirit_of_rommel_tw_desc: "Sin duda, si hay una táctica militar que ha definido nuestra brillantez durante décadas después de la guerra, es la Blitzkrieg. Es nuestro enfoque en maniobras rápidas, agresivas y flexibles para flanquear a nuestro enemigo y dominar sus fuerzas sin mucho combate, lo que nos ha llevado a un dominio innegable sobre el continente europeo y a la capitulación casi total de los británicos en Egipto y los soviéticos en el este.\n\nSin embargo, debido principalmente a cierta incompetencia de nuestros aliados y de nosotros mismos, ha llevado a nuestra capitulación ante los Aliados y a la consiguiente humillación. Esta vez, aprenderemos de nuestros errores pasados y nos aseguraremos de que esta segunda oportunidad sea un éxito.\n\nGracias al zorro del desierto y a su ingenio que condujo a la casi capitulación del norte de África británico, seguiremos su ejemplo. Dominaremos las artes de las tácticas de armas combinadas, así como la iniciativa y la improvisación para asegurarnos de que nuestros enemigos nunca vuelvan a triunfar sobre nosotros."
 GER_national_service_tw: "Servicio nacional"
 GER_national_service_tw_desc: "Hubo un tiempo en que Alemania era famosa por su destreza y fuerza militar. El Reino de Prusia era reconocido mundialmente como un Estado militar, ostentando el cuarto ejército más grande de Europa a pesar de tener solo una fracción de la población europea. Hoy, al hablar del militarismo alemán, muchos recuerdan las dos guerras mundiales. Sin embargo, en realidad, sin unas fuerzas armadas fuertes, nuestra nación habría sido débil y fácilmente destrozada por agresores extranjeros. Sin un ejército poderoso, Prusia jamás habría podido unificar Alemania en un Estado nación. Sin fuerza militar, nos habríamos derrumbado bajo la presión de ambos frentes, como los austriacos durante la Primera Guerra Mundial. Sin una defensa eficaz, no habríamos podido resistir, y nuestro pueblo habría sido masacrado como ganado por los bolcheviques durante la Segunda Guerra Mundial. El militarismo siempre ha sido, y siempre será, fundamental para el pueblo alemán y su identidad. A medida que nuestros adversarios se acercan de nuevo a nuestras fronteras, necesitamos sangre nueva para llenar las filas de nuestras fuerzas armadas. Por lo tanto, debemos restablecer el servicio militar obligatorio, que una vez abandonamos tontamente."
 GER_take_in_ukrainian_refugees: "Acoger refugiados ucranianos"
 GER_take_in_ukrainian_refugees_desc: ""
 GER_mobilize_the_industry: "Movilizar la industria"
 GER_mobilize_the_industry_desc: ""
 GER_modernize_national_socialism: "Modernizar el nacionalsocialismo"
 GER_modernize_national_socialism_desc: "Han pasado muchos años desde el Tercer Reich. La sociedad, la cultura, la tecnología, los valores y todo lo imaginable sobre la civilización humana ha cambiado drásticamente, tanto que si Hitler viviera hoy, se consideraría testigo de una civilización marciana en lugar de la alemana. En resumen, los tiempos han cambiado, pero eso no significa que no debamos cambiar con ellos. Ha llegado el momento de que el nacionalsocialismo se desempolve de las telarañas de la historia y se sitúe en el presente. Las teorías fundamentales seguirán siendo las mismas, pero todo se situará en el contexto y el análisis de nuestras vidas del siglo XXI. Desde la inmigración hasta la globalización y la amenaza del este, el nacionalsocialismo estará plenamente a la altura de la tarea de abordar todas las preocupaciones de la Alemania moderna. La esvástica representó la salvación y el poder alemán entonces y lo seguirá representando ahora, de maneras que los alemanes de hoy pueden comprender claramente."
 GER_mastery_of_propaganda: "Maestría en propaganda"
 GER_mastery_of_propaganda_desc: "Joseph Goebbels fue un maestro de la propaganda, difundiendo el mensaje del nacionalsocialismo por toda Alemania y atrayendo a millones de personas al esfuerzo de guerra. Sin embargo, nuestro mensaje se enfrenta a nuevos obstáculos: la influencia extranjera, los elementos subversivos y el flujo constante de retórica globalista. Pero a diferencia de nuestros predecesores, tenemos acceso a herramientas con las que ellos solo podían soñar: las redes sociales. Aunque antes se usaban para difundir mentiras sobre nuestra ideología y reprimir nuestros ideales, al tomar el control de los medios de comunicación, no solo podemos revelar la verdad del nacionalsocialismo, sino también librar a la nación de la degeneración globalista que ha plagado a este país y a su gente durante tantos años."
 GER_our_new_struggle: "Nuestra nueva lucha"
 GER_our_new_struggle_desc: "El nacionalsocialismo ha regresado milagrosamente a Alemania después de 80 años. Nuestros predecesores estuvieron cerca de la victoria, pero flaquearon a las puertas de Moscú. No podemos permitirnos repetir sus errores, pues si fracasamos ahora, la llama del nacionalsocialismo podría extinguirse para siempre."
 GER_the_new_germania: "La nueva Germania"
 GER_the_new_germania_desc: "Nuestro ambicioso Führer planeó construir una megaciudad que eclipsaría las maravillas de Babilonia y la grandeza de los antiguos imperios. Sin embargo, con su derrota, ese sueño quedó abandonado a su suerte. Berlín hoy es un desastre, plagado de basura y con su arquitectura despojada de su antigua gloria.\n\nReconstruiremos Berlín desde cero, devolviéndole la gloria y la belleza que siempre ha tenido. La nueva capital será un faro para un futuro próspero, un monumento a nuestra fuerza y una ciudad llena de arios."
 GER_kick_down_the_door: "Patear la puerta"
 GER_kick_down_the_door_desc: "Por fin ha llegado el momento de penetrar en los hogares de los rusos. Esta vez será su sangre, su gente, la que allanará el camino para nuestro avance. Hubo un tiempo en que jamás habría considerado la opción nuclear, pero ya no. Intentamos mostrar amor, una vez. ¡Pero no fue suficiente! ¡Ponimos la otra mejilla y nos abofetearon en ambas! Esta vez, derribaremos su palacio de cristal, el que construyeron con el sufrimiento de innumerables personas. Es hora de patear la puerta."
 GER_winter_logistics_training: "Capacitación en logística inviernal"
 GER_winter_logistics_training_desc: ""
 GER_the_triump_of_populism: "Triunfo del populismo"
 GER_the_triump_of_populism_desc: "Tras tantas penurias, tantas muertes y tanta destrucción, hemos salido victoriosos de la Guerra Europea. Muchos analistas de la corriente dominante creen que nuestro partido no pudo liderar a la nación alemana hacia la victoria, hacia un futuro mejor; pero ahora, todos guardan silencio. La destrucción causada por la guerra es inconcebible, tanto para nuestros aliados como para nuestra nación. Pero no podemos permitirnos caer en la complacencia como seguramente harían otros; no, ¡necesitamos prosperar! Ahora es el momento de reconstruir, el momento de demostrar aún más la equivocación de quienes nos critican. ¡La AfD será recordada para siempre como el partido que sacó a Alemania de la irrelevancia y la llevó a una era de prosperidad!"
 GER_revive_nuclear_energy: "Revivir la energía nuclear"
 GER_revive_nuclear_energy_desc: "Una de las muchas cosas que nuestros anteriores jefes de gobierno no han comprendido es que la energía nuclear no es una fuerza de destrucción ni tragedia; es una fuerza de bien. Creían que las centrales nucleares eran trampas mortales y que no merecían la pena debido a incidentes como los de Chernóbil y Fukushima. Se equivocaron: si bien estos desastres fueron tragedias, casi siempre son resultado de errores humanos. Es hora de que dejemos atrás este miedo anticuado a la fisión nuclear y aprovechemos la ayuda que aportará a nuestra infraestructura energética y a nuestra población."
 GER_free_up_the_economy: "Liberar la economía"
 GER_free_up_the_economy_desc: "Durante demasiado tiempo, la economía alemana se ha visto afectada por una burocracia inflada como resultado del constante gasto público bajo los anteriores jefes de estado. Lo cierto es que la economía alemana se encuentra en una situación más frágil que nunca. Con Europa Oriental destruida y una Europa de nuevo en paz, tenemos la oportunidad perfecta para deshacernos de esta basura que ha corroído nuestra economía desde dentro durante tanto tiempo. Debemos finalmente eliminar estos programas inútiles dentro del Gobierno. Con esto, estabilizaremos la economía de nuestra nación."
 GER_support_the_militarized_industry: "Apoyar la industria militar"
 GER_support_the_militarized_industry_desc: "Tras el inicio de la Guerra Europea, la industria militar de nuestra nación creció exponencialmente y continuó haciéndolo durante el transcurso de la guerra. Pero ahora, la guerra ha terminado y el oso ruso ha sido derrotado en el este. Por ello, estamos cayendo en la misma trampa que antes de la guerra: la complacencia. Debemos recordar ahora más que nunca que un conflicto puede estallar en cualquier momento. La industria militar es nuestro motor para responder con rapidez y decisión ante estas amenazas potenciales, y ciertamente no podemos dejarlas de lado mientras nuestra nación avanza hacia el futuro."
 GER_negotiate_with_the_russians: "Negociar con los rusos"
 GER_negotiate_with_the_russians_desc: "Decir que los pueblos alemán y ruso han tenido diferencias extremas sería quedarse corto. Pero, tras la Guerra Europea, el oso ruso ha sido prácticamente desgarrado, con la liberación de sus territorios ocupados por nuestros aliados de la OTAN. Desafortunadamente para nosotros, ha sido cada vez más difícil trabajar con los europeos, incluso después de la guerra. Ahora, con los rusos necesitando desesperadamente aliados y socios económicos, es hora de que nos lancemos y les extendamos una rama de olivo a los devastados rusos. Con las negociaciones adecuadas, seguramente alcanzaremos un acuerdo económico aceptable con ellos."
 GER_cooperate_with_europe: "Cooperar con Europa"
 GER_cooperate_with_europe_desc: "Se puede afirmar con seguridad que nuestro partido y el Europarlamento discrepan en una amplia gama de cuestiones. Sin embargo, cuando los rusos irrumpieron en las fronteras de Ucrania, nos vimos obligados a dejar de lado estos desacuerdos en aras de nuestra soberanía. Ahora, la polvareda se ha asentado sobre una Europa destrozada, y nos enfrentamos a un dilema: ¿fortalecemos los lazos con Europa o nos acercamos a los rusos? La respuesta es clara: los rusos se están preparando para algo y han demostrado que no son de fiar. Debemos seguir cooperando con Europa y fortalecer nuestros lazos con ellos."
 GER_one_nation_one_people: "Una nación, un pueblo"
 GER_relocate_the_economy: "Reubicar la economía"
 GER_relocate_the_economy_desc: ""
 GER_renewed_russian_german_trade_deal: "Acuerdo comercial ruso-alemán renovado"

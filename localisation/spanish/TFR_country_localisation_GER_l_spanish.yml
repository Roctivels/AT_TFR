 germany.74.t: "Protestas anti-Viena"
 germany.74.d: "Tras los Acuerdos de Paz de Viena, que pusieron fin a la guerra en Europa, han estallado protestas en toda Alemania en oposición a la guerra. Entre los manifestantes abundan los carteles de \"¡traidores!\" y \"fascistas vendidos\". Muchos creen que la guerra no se perdió en el campo de batalla, sino en la mente de los comandantes incompetentes que se rindieron en una guerra que podría haberse ganado si hubieran continuado luchando durante más tiempo. Si bien Alemania sacrificó mucho durante la guerra, con sus ciudadanos sufriendo duros inviernos sin gas ruso, y con miles de niños alemanes muriendo en Ucrania, el Báltico y Polonia para proteger a Europa de la horda fascista rusa, el final de la guerra hizo que todos esos sacrificios fueran en vano. Si bien el Alto Mando de la Bundeswehr ordenó a miles de niños alemanes morir en la defensa de Varsovia, cuando se les pidió que arriesgaran sus vidas, capitularon rápidamente ante los rusos. En particular, la concesión del reconocimiento de Europa Oriental como esfera de influencia natural de Rusia y las reparaciones económicas han provocado una indignación generalizada.\n\nEl grupo más visible entre los manifestantes es el partido Die Linke, que argumenta que la capitulación tuvo como objetivo proteger los intereses del \"capital financiero\" alemán y que el esfuerzo bélico se vio obstaculizado por la desenfrenada especulación bélica, que proporcionó a las fuerzas armadas armamento de baja calidad para reducir los costos de producción y maximizar la producción. Encuestas recientes muestran que la confianza en el Gobierno actual ha caído a un solo dígito, y es casi seguro que caerá tarde o temprano."
 germany.74.a: "Preocupante."
 germany.75.t: "La economía alemana se desploma"
 germany.75.d: "Para cubrir los altos costos de la lucha contra Rusia durante la guerra ruso-OTAN, la República Federal de Alemania solicitó cuantiosos préstamos para financiar la rápida expansión militar durante la guerra. Si bien el Bundestag había planeado inicialmente pagar las deudas con las reparaciones de guerra rusas, algo que no se materializó cuando las fuerzas de la OTAN se vieron obligadas a abandonar Europa Oriental. Con la caída en picado del valor del euro y de los bonos alemanes tras los Acuerdos de Paz de Viena, sumado al repentino colapso de la demanda de producción militar, la crisis económica ha paralizado el país. Peor aún, la confianza en la eurozona se encuentra en su punto más bajo, ya que la región lucha por recalibrar su economía tras la pérdida de los mercados de Europa Oriental. Con la Bolsa de Fráncfort cayendo un 35% en un solo día, la mayor caída en la historia financiera, los economistas predicen un período de catástrofe económica sin precedentes.\n\nLa hiperinflación ya ha comenzado a descontrolarse, con el valor del euro frente al renminbi chino aumentando de 7,39 a 13,81 en una sola semana. En este momento, el Bundesbank alemán se enfrenta a la peor pesadilla de cualquier economista: un enorme déficit presupuestario combinado con una inflación galopante. Sea cual sea la acción, el futuro de Alemania se ve sombrío."
 germany.75.a: "Es ist eine Katastrophe!"
 germany.76.t: "Sahra Wagenknecht forma la Volksunion"
 germany.76.d: "Nuestra derrota en la Guerra Europea ha devastado a nuestra querida patria. Nuestro pueblo vive en una pesadilla. Nadie consigue trabajo, y los pocos que lo consiguen apenas viven al día, mientras el euro se desploma. Muchos bancos también han sido embargados, ya que la mayoría de las inversiones y depósitos han sido retirados, dejando a mucha gente sin un lugar seguro donde guardar su dinero. Por ello, punks y gánsteres han tomado las calles, robando a los transeúntes e incluso allanando casas.\n\nLa situación ha llevado a la gente a tomar armas y equiparse con cualquier arma que encuentren, por si sus casas son atacadas de nuevo. Mientras nuestro gobierno intenta centrarse en asuntos más urgentes, no ha controlado el mercado de armas, que actualmente se dispara, permitiendo que diversos grupos extremistas y radicales obtengan cantidades significativas de armas.\n\nA raíz de toda esta locura, la noticia de la retirada de Sahra Wagekneckt de Die Linke y la posterior formación de su propio partido ha acaparado titulares. Su partido, \"Unión Popular para el Cambio y la Justicia\", se inspira en el nacionalismo de izquierdas y los ideales comunistas. Si su partido triunfará, aún está en el aire, pero con la situación en constante evolución de nuestro país, todo es posible."
 germany.76.a: "¿Una segunda Marx, o un nombre más para los libros?"
 germany.77.t: "Nuclearización alemana"
 germany.77.d: "Una noticia impactante ha conmocionado al mundo hoy: el Gobierno alemán anunció su ingreso al exclusivo club de las potencias nucleares. Tras el inicio de la Segunda Guerra Civil americana, el Gobierno alemán actuó en secreto para asegurar las veinte armas nucleares tácticas B62 que se encontraban en la base aérea de Büchel.\n\nUn golpe aún peor para la no proliferación global es el anuncio de que Alemania activará su capacidad de respuesta nuclear. Con un excedente de ingenieros nucleares y la capacidad técnica para producir un arsenal, dada la amplia presencia de reactores civiles, los expertos estiman que Alemania podrá contar con un arsenal estable en un plazo de 3 a 6 meses. Dado el anterior papel de Alemania como líder en la no proliferación internacional, esta nueva política probablemente desencadenará una carrera armamentista nuclear en Europa, con el Gobierno ruso ya anunciando planes para expandir su propio arsenal.\n\nMientras una Alemania revanchista busca desafiar a Rusia tras su derrota en la Guerra Europea, la nuclearización de Alemania y la política arriesgada del Gobierno alemán probablemente introducirán un componente nuclear en cualquier conflicto futuro, ya que los responsables políticos no dudan de que los alemanes no dudarán en apretar el gatillo nuclear si llega el momento."
 germany.77.a: "El reloj avanza hacia la medianoche."

 germany.114.t: "¡Rusia se niega a pagar reparaciones!"
 germany.114.d: "Rusia ha expulsado a nuestra delegación y ha abandonado las negociaciones sobre las reparaciones, ¿quizás presionamos demasiado? ¡Quizás nunca iban a pagar! De todos modos, no vamos a sacar nada de los rusos."
 germany.114.a: "¡Malditos sean!"
 GER_decomissioning_npp: "§YSe está cerrando una central nuclear.§!"
 GER_rearm_europe_idea: "Plan ReArm Europe"
 GER_mercosur_eu_deal_idea: "Acuerdo de Asociación UE-Mercosur"
 GER_mercosur_eu_deal_idea_desc: "Mercosur y la Unión Europea han firmado un acuerdo comercial histórico, abriendo nuevos mercados para los productos agrícolas sudamericanos y los bienes manufacturados europeos. Aunque recibió una fuerte oposición por parte de ecologistas y agricultores europeos, el acuerdo ha demostrado ser mutuamente beneficioso, siendo defendido tanto por el establishment político europeo como sudamericano como la piedra angular de una nueva era de consenso multipolar y cooperación transatlántica. Las expectativas son altas, pero solo el tiempo dirá si el acuerdo estará a la altura de su promesa."

 GER_peoples_economy_dynamic: "Volkswirtschaft"
 GER_peoples_economy_dynamic_desc: "La economía alemana ha sido durante mucho tiempo una superpotencia económica ineludible. El Rin proporciona una gran cantidad de recursos que han facilitado la industrialización en el pasado, sumado a una población numerosa y experimentada, no es de extrañar que nuestra nación tenga la mayor economía del continente europeo y, de hecho, una de las más grandes del mundo. Sin embargo, ha enfrentado dificultades recientes: estancamiento del crecimiento, desempleo y el descuido de las fuentes de energía nuclear. Depende de las administraciones alemanas actuales y futuras asegurar que la economía alemana vuelva a ocupar su lugar entre las superpotencias.\n\n\n\n\n£GFX_GER_volkswirtschaft_banner\n\n\n\n\n"
 GER_bundeswehr_dynamic: "Bundeswehr"
 GER_bundestag_dynamic: "Bundestag"
 GER_bundestag_dynamic_desc: "El Bundestag es el parlamento federal de Alemania. Alberga a una amplia variedad de partidos políticos de todo el espectro político, ofreciendo una visión global de la composición política actual del país y permitiendo a los representantes de cada partido debatir y deliberar sobre leyes y políticas estatales. Sin embargo, como en innumerables democracias, su composición nunca es constante, ya que los vientos de cambio político y las elecciones la sacuden constantemente. Especialmente ahora, con el auge de los partidos populistas e incluso radicales, cabe esperar un clima de tensión e inquietud en el parlamento. Tanto políticos como votantes se preguntan qué tipo de turbulencia política podría aguardar a la vuelta de la esquina.\n\n\n\n\n\n£GFX_GER_bundestag_banner1\n\n\n\n\n"

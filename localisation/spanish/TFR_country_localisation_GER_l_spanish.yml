 germany.312.t: "Prioridades educativas"
 germany.312.d: "El futuro está en manos de las jóvenes generaciones, y para guiarlas por el buen camino, debemos brindarles una educación adecuada que les ayude a desarrollar una moral deseable. Deben heredar los valores que les transmitimos.\n\nNuestros hijos deben aprender los valores globales, el credo internacionalista que todos debemos respetar. Deben aprender de la mano invisible y tomar en serio la escuela austriaca de economía. La riqueza de Europa no se debió a ningún político fuerte ni a ningún legislador, sino al mercado, un mercado libre que le permitió florecer por sí solo. El consumismo es el engranaje ideológico que impulsa el progreso europeo. Es un hecho histórico que sin demanda no habrá innovación. Sin clientes, no habrá voluntad de revolucionar.\n\nTambién debemos explicar correctamente a nuestros hijos qué representan la libertad y la democracia. Estas palabras, estos conceptos, parten de la misma tesis y llegan a la misma conclusión. Libertad significa libertad de elegir, libertad de trabajar, libertad de comprar y vender. La democracia significa el avance de la sociedad hacia su forma definitiva, donde el crecimiento no se vea limitado por personas insignificantes ni mentes dictatoriales.\n\nQue la libertad cante, cante en la mente de los jóvenes. Que la democracia se desarrolle en el pueblo. Los educaremos. Los conduciremos hacia la luz, hacia la iluminación. Somos los Voltaires y Rousseau modernos, y bajo nuestras alas, los protegeremos hacia el futuro, para asegurar el futuro, para que se conviertan en el futuro."
 germany.312.a: "Debemos centrarnos en crear consumidores profesionales."
 germany.312.b: "Debemos perseguir nuestros mayores objetivos y convertirlos en algo mayor."

 GER_eastern_rebellions_cat: "Revolución en Oriente"
 GER_eastern_rebellions_cat_desc: "El imperio ruso es malvado. blablabla.\n\n§YEJÉRCITO LIBRE UCRANIANO§!: [GLOBAL.get_ufa_status]\n§YMOVIMIENTO DEMOCRÁTICO DE BIELORRUSIA§!: [GLOBAL.get_bdm_status]\n§YHERMANOS DEL BOSQUE§!: [GLOBAL.get_bfw_status]\n§YEJÉRCITO DE RESISTENCIA POLACO§!: [GLOBAL.get_pra_status]"
 GER_auferstanden_aus_ruinen_cat: "Volkskammer"
 GER_auferstanden_aus_ruinen_cat_desc: "\n\n\n\n\n£GFX_GER_auferstanden_aus_ruinen_category\n\n\n\n\n\n\n\nLa §YVolkskammer§! es el órgano supremo de poder de nuestra República Socialista. Es la única rama del Gobierno del Estadoy, según el principio de poder unificado, todos los órganos estatales le están subordinados.\n\nAprobación de la §YCámara Popular§! £GFX_GER_volkskammer : §G[?GER_peoples_chamber_dynamic_var|1%]§!\nEfecto: £pol_power  [?GER_peoples_chamber_support_dynamic_var|=+1%], £GFX_war_support_texticon  [?GER_peoples_chamber_support_dynamic_var|=+1%]"

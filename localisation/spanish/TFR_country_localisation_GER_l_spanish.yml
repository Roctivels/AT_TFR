 GER_cult_of_speed_desc: "Las armas combinadas, el uso coordinado de infantería, blindados y medios aéreos para destruir un objetivo, sigue siendo la piedra angular de la guerra moderna eficaz. Los ejércitos más grandes y respetados del planeta, incluso ahora con el auge de los sistemas autónomos, aún se basan en estos principios, principios que debemos revisar y actualizar. De inmediato, nos encargaremos de proporcionar una actualización moderna e integral de estas doctrinas a nuestros expertos del Estado Mayor. Nuestras fuerzas en el campo aprenderán la importancia de la coordinación táctica, junto con toda la tecnología moderna de mando y control para que sea lo más eficaz y eficiente posible. Así como el NVA y el Pacto de Varsovia comprendieron y asumieron la importancia de las armas combinadas, haremos lo mismo hoy."
 GER_tfr_schwab_ending_real_tt: "§C¡Gracias por jugar \"The Fire Rises!§!\n(Ahora si.)\n\n¡Esperamos que hayas tenido una gran experiencia! Espero que no te hayas encontrado con ningún bug, pero en este camino... eran algo inevitables.\n\nPero al menos esperamos haberte dejado una impresión memorable o, quizás, haberte inspirado a crear algo propio. ¡Aprovecha tu libertad insostenible mientras aún la tengas!\n\n¡Nos vemos pronto!"
 germany.341.t: "El fin"
 germany.341.d: "Ahora ya no queda nadie que se ría, nadie que haga informes \"expositivos\", nadie puede ser un teórico de la conspiración ni nadie puede resistirse. La gran visión del Foro Económico Mundial se ha convertido en una realidad innegable, ante la cual no hay alternativa.\n\nKlaus Schwab, a pesar de las muchas dudas que teníamos sobre su personalidad tan controvertida, su exceso de confianza y su imprudencia, ha logrado implementar el programa con bastante eficacia y rapidez. Aunque aún queda trabajo por hacer, su esfuerzo personal es notable, y su título público de líder del Gobierno Mundial no es solo un producto de los medios de comunicación, como muchas cosas en el mundo moderno; Schwab realmente merece este pequeño ascenso.\n\nDesafortunadamente, al acercarse a su centenario, sus habilidades de gestión parecen estar disminuyendo, y es hora de que se tome un merecido descanso.\n\nPero, afortunadamente, este sistema no depende solo de Schwab. Puede que su viaje esté llegando a su fin, pero no el de los demás. No sabe cuánto tiempo le queda, pero la medicina avanza, y con gran poder, surgen grandes posibilidades. ¿Cuánto vivirán sus sucesores? ¿120, 130, 150 años? La verdad es que nunca se ha alcanzado un límite.\n\nDepende de ellos, los futuros gobernantes del mundo, mantener el statu quo. Pero ahora, solo puede alegrarse de volver a las sombras..."
 germany.341.a: "Ahora como jugadores, no peones."

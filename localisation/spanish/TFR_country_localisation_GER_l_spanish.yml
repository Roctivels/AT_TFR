 idea_NATO_advisors_desc: "Recientemente hemos recibido asesores de los más altos cargos de la sede de la OTAN en Bruselas. Están aquí para ayudarnos a entrenar a nuestras tropas, desarrollar nuestras doctrinas y proporcionarnos un plan básico para defender a nuestra nación de cualquier hipotético ataque ruso."
 idea_EU_unified_army_commands_desc: "La Unión Europea, bajo la dirección alemana, ha agrupado a todos los ejércitos nacionales bajo una estructura de mando militar unificada, ampliando así su Política Común de Seguridad y Defensa. Esto permite a la Unión actuar como una sola entidad ante las amenazas regionales y globales."
 idea_EU_unified_army_commands_1_desc: "La Unión Europea, bajo la dirección alemana, ha agrupado a todos los ejércitos nacionales bajo una estructura de mando militar unificada, ampliando así su Política Común de Seguridad y Defensa. Esto permite a la Unión actuar como una sola entidad ante las amenazas regionales y globales."

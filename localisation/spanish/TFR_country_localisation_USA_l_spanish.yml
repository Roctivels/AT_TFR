l_spanish:
 USA_state_of_the_union: "Estado de la Unión"
 USA_state_of_the_union_desc: "Donald Trump se acerca al final de su polémico primer mandato. El 45º presidente de los Estados Unidos preside una nación en ruinas; si bien en apariencia la economía es fuerte y próspera, muchos temen que esta situación no dure por mucho tiempo. América se encuentra nuevamente en una encrucijada. Este discurso del estado de la Unión no será uno común y corriente."
 USA_plan_for_the_worst: "Prepararnos para lo peor"
 USA_plan_for_the_worst_desc: "El llamado coronavirus es sin duda una tormenta que se está gestando y que inevitablemente golpeará a América. Debemos tomar todas las medidas preventivas necesarias para evitar la propagación inicial de la enfermedad y también comenzar a acumular reservas monetarias que nos permitan reaccionar adecuadamente ante cualquier cambio rápido de circunstancias."
 USA_warp_speed: "Operación Warp Speed"
 USA_warp_speed_desc: "Las mascarillas quirúrgicas han demostrado ser muy eficaces para reducir la propagación del virus, junto con una serie de otras medidas. La pandemia se está descontrolando cada vez más y esperamos poder poner un freno a la propagación del virus con la producción en masa de mascarillas quirúrgicas para la población civil."
 USA_implement_emergency_measures: "Implementar medidas de emergencia"
 USA_implement_emergency_measures_desc: "Incluso los tiempos más difíciles exigen las formas más radicales de prevención. La vida cotidiana del americano promedio es el mayor contribuyente a la explosión de las tasas de infección desde que el virus llegó a nuestras costas. Cerrar las tiendas y llevar a toda nuestra gente a los confines de sus hogares es posiblemente la única manera de detener el virus a un nivel controlable. Puede ser devastador para nuestra economía, pero ¿qué otras opciones tenemos?"
 USA_back_the_blue: "Apoyar a la policía"
 USA_back_the_blue_desc: "Los disturbios se están saliendo de control, la hipocresía de los millenials al destruir nuestras calles y negocios mientras se propaga una enfermedad devastadora es impresionante. Se atreven a empeorar las cosas al presionar a nuestros Gobiernos estatales para que reduzcan el financiamiento de la policía, como si necesitáramos que más criminales arrasen nuestras ciudades. No podemos seguir esperando que la turba se apodere de nuestro país."
 USA_crush_the_rioters: "Aplastar a los agitadores"
 USA_crush_the_rioters_desc: "Si hay algo que podemos aprender de nuestros rivales chinos es que la insistencia y un poco de esfuerzo son suficientes para imponer la estabilidad, aunque parezca que se trata de una estrategia de mano dura. Nuestras comisarías de policía recibirán fondos para material antidisturbios y empezarán a patrullar nuestras calles las veinticuatro horas del día, los siete días de la semana. Las comunas anarquistas serán desmanteladas y los disturbios se reducirán a la nada. Nuestra paciencia se ha agotado, especialmente cuando hay problemas mayores que abruman a América."
 USA_compromise_with_the_protesters: "Comprometerse con los manifestantes"
 USA_compromise_with_the_protesters_desc: "Este no es momento de poner en peligro aún más a nuestro país con más tasas de infección al marchar por nuestras calles. Por mucho que nos disguste hacerlo, cederemos un poco a los manifestantes. Con el tiempo se darán cuenta de sus errores cuando nadie venga a ayudarlos cuando un delincuente derribe su puerta."
 USA_end_the_chaos: "Acabar el caos"
 USA_end_the_chaos_desc: "La anarquía en nuestras calles finalmente se ha calmado, ya que nuestras valientes fuerzas policiales han recuperado el rumbo y han comenzado a reprimir eficazmente a los alborotadores, incluso en circunstancias desfavorables. Si bien todavía hay disturbios en algunas partes de nuestro país, se dan en gran medida en los estados demócratas. En todo caso, nos están haciendo un favor al avergonzar a esos piratas informáticos y su apoyo negligente a estos aspirantes a revolucionarios."
 USA_reinvigorate_the_economy: "Revitalizar la economía"
 USA_reinvigorate_the_economy_desc: "La COVID-19 se llevó una gran parte de nuestra economía, las pequeñas empresas fueron las más afectadas, pero las pequeñas empresas son el alma de América. Si vamos a salvar a América, tenemos que preservar su alma, al pequeño empresario, al hombre de familia, a las pequeñas tiendas familiares. Algunos recortes de impuestos importantes para las pequeñas y medianas empresas nos pondrán de nuevo en marcha, incluso si nos duele un poco el bolsillo, podemos aceptarlo, vale la pena a largo plazo."
 USA_stimulate_the_economy: "Estimular la economía"
 USA_stimulate_the_economy_desc: "Las empresas han sufrido mucho a causa de la pandemia, especialmente las pequeñas empresas privadas. El presidente ha propuesto el acertado \"cheque de estímulo\", que dará dinero a todos nuestros ciudadanos para ayudarlos a pagar las hipotecas, los gastos diarios y ayudarlos a pagar el alquiler a tiempo, sin costo alguno para nuestro Estado. Después de todo, la Reserva Federal puede simplemente imprimir el dinero que necesitamos."
 USA_prepare_the_vaccine: "Preparar la vacuna"
 USA_prepare_the_vaccine_desc: "El desarrollo de una vacuna es ahora nuestra máxima prioridad para garantizar que América pueda volver al statu quo. No se trata de una simple competencia entre nosotros y China: es una competencia para ver cuántas vidas podemos salvar poniendo a prueba la velocidad y la dedicación de los mejores científicos de nuestro país. Incentivaremos aún más esto reuniendo enormes cantidades de fondos para impulsar el progreso de nuestra vacuna."
 USA_assure_security: "Garantizar la seguridad"
 USA_assure_security_desc: "Ahora que los disturbios han cedido ante nuestra aplicación de la ley, necesitamos asegurarle al público que se ha restablecido el orden social. El apoyo a la financiación de la policía se ha disparado después de que el público haya visto a esos alborotadores como lo que eran, y ahora podemos empezar a concentrarnos con seguridad en lo que más importa: la pandemia."
 USA_keep_america_great: "Keep America Great"
 USA_keep_america_great_desc: "Ahora que Trump ha sido reelegido en el poder, debería haber formas de mantener a América tan grande como antes, sin importar cuántas veces el otro lado diga lo contrario."
 USA_defend_the_second_amendment: "Defender la Segunda Enmienda"
 USA_defend_the_second_amendment_desc: "El derecho a poseer y portar armas está consagrado en nuestra Constitución y debemos preservarlo para enfrentar futuras amenazas a nuestra forma de vida, tanto internas como externas..."
 USA_end_state_lockdowns: "Poner fin a las cuarentenas estatales"
 USA_end_state_lockdowns_desc: "Las cuarentenas han desbaratado la forma habitual de vivir, como los negocios y las actividades sociales. Ahora es el momento de volver a la antigua normalidad. La única pregunta es si es posible hacerlo en medio de cierto caos."
 USA_purge_the_pentagon: "Purgar el Pentágono"
 USA_purge_the_pentagon_desc: "No hay mayor amenaza para la seguridad nacional que unas fuerzas armadas divididas, compuestas por generales incompetentes e iniciativas inútiles relacionadas con la \"diversidad\" y la \"inclusión\". Debemos podar esta institución ahora mismo o las consecuencias a largo plazo devastarán la seguridad nacional y nuestro prestigio en el extranjero."
 USA_standing_down_and_standing_by: "Pararse y esperar"
 USA_standing_down_and_standing_by_desc: "Los ciudadanos deben permanecer atentos a cualquier amenaza potencial a la soberanía nacional y a cualquier complot del establishment para intentar usurpar al presidente legítimo."
 USA_unify_the_military: "Unificar el ejército"
 USA_unify_the_military_desc: "Ahora que el Alto Mando ha sido despojado de posibles quintacolumnistas y personal inútil, necesitamos buscar el apoyo de nuestros militares para asegurarnos de enviarle al establishment el mensaje de que no nos subvertirán ni nos dividirán y que podemos asegurar su lealtad a nuestra justa causa."
 USA_enforce_order: "Imponer orden"
 USA_enforce_order_desc: "¡Hay grupos de personas de izquierda, derecha e incluso del centro que no nos ven como legítimos y que recurrirán a cualquier método para intentar derribarnos! ¡No debemos permitírselo!"
 USA_by_law: "Por la ley"
 USA_by_law_desc: "Algunas leyes son útiles para intentar frenar elementos potencialmente nocivos en nuestro país: registros, toques de queda, etc."
 USA_by_force: "Por la fuerza"
 USA_by_force_desc: "Si las leyes pueden ser ignoradas por personas que podrían simpatizar con sus compañeros que ocupan posiciones de poder, entonces también podemos hacer cualquier cosa para mantener la paz por cualquier medio necesario."
 USA_invoke_the_insurrection_act: "Invocar el Acta de Insurrección"
 USA_invoke_the_insurrection_act_desc: "Nuestra nación está en crisis. Durante los pocos meses que lleva el segundo mandato de Donald Trump, la nación ha estado en constante agitación con el alarmismo sobre el COVID-19, los alborotadores, el escepticismo sobre las vacunas y más. Como gobierno, es nuestro trabajo proteger a la gente, y, como lo ve el presidente, estamos en un estado de emergencia. Utilizando esto, invocará el Acta de Insurrección para arrestar a quienes causan disturbios con el fin de disminuir su efecto en la nación, pero es probable que esto provoque un desastre."
 USA_oppose_the_tyrant: "Oponerse al tirano"
 USA_oppose_the_tyrant_desc: "América está a punto de enfrentar una de las amenazas más graves a la unidad no vista desde 1861, Trump huyó a Denver para establecer su Gobierno remanente y existen posibilidades de que tengamos que lidiar con algo peor que él, por el bien de nuestra democracia, debemos oponernos a este tirano."
 USA_the_true_revolution_begins: "La verdadera revolución comienza"
 USA_the_true_revolution_begins_desc: "No importa si se trata de Biden o Trump, son las dos caras de la misma moneda, la moneda que representa la opresión del pueblo, en particular de los trabajadores y las minorías. ¡Ahora es el momento de hacer frente a ambos males mientras este país se hunde en un caos aún mayor!"
 USA_ridin_with_biden: "Ridin' with Biden"
 USA_ridin_with_biden_desc: "A medida que pasa el tiempo, queda claro que no se tratará sólo de una lucha contra la amenaza naranja, sino también de una lucha por el alma de nuestra nación. Comunistas descarriados, perros fascistas rabiosos y separatistas oportunistas han salido de la nada para intentar derribar a toda esta querida nación. Debemos prepararnos para luchar contra todas estas amenazas a la democracia, empezando por los cultistas de MAGA que huyeron al oeste."
 USA_support_national_socialism: "Apoyar al nacionalsocialismo"
 USA_support_national_socialism_desc: "Una y otra vez, los republicanos han demostrado que no son diferentes a los mismos demócratas que suvierten y denigran nuestra cultura y nuestro patrimonio. Es hora de hacer frente a los degenerados y traidores que han deformado América a través de la retórica globalista y el marxismo cultural."
 USA_the_third_impeachment: "El tercer juicio político"
 USA_the_third_impeachment_desc: "Es hora de plantarle cara a Trump, ese populista divisorio que ha engañado a millones al punto de que nuestro país está a punto de romperse. El fuego se ha alzado y NO HAY MACHA ATRÁS."
 USA_side_with_trump: "Al lado de Trump"
 USA_side_with_trump_desc: "Aunque sin duda tiene sus defectos, nadie puede negar el genio de Trump. Desafiando y derrotando al establishment político, sigue siendo un presidente controvertido pero muy popular, con la capacidad de celebrar grandes mítines y mantener fuerte nuestra economía."
 USA_side_against_trump: "En contra de Trump"
 USA_side_against_trump_desc: "Trump ha demostrado ser un enorme fracaso. Si Estados Unidos quiere sobrevivir a la tormenta inminente, ¡debemos hacer todo lo posible para sacar a este payaso narcisista del cargo!"
 USA_expand_the_cdc: "Expandir el CDC"
 USA_expand_the_cdc_desc: "El COVID-19 supone una amenaza para el tejido mismo de nuestra sociedad. El Centro de Control de Enfermedades debe ampliarse si queremos combatirlo. Si nos aseguramos de que reciben más competencias y financiación, podremos poner fin a la amenaza que se cierne sobre nuestra nación."
 USA_engage_the_media: "Atraer a los medios"
 USA_engage_the_media_desc: "Los medios de comunicación tienen una enorme influencia en la sociedad americana. Utilizando todo su poder combinado, podemos asegurarnos de que el bastardo en la Casa Blanca no consiga otro mandato."
 USA_no_justice_no_peace: "Sin justicia, no hay paz"
 USA_no_justice_no_peace_desc: "¡Sin justicia, no hay paz! Por todos los Estados Unidos, las fuerzas del antifascismo y la justicia social se están movilizando. Sería prudente aliarnos con este poderoso movimiento si vamos a derrocar la administración Trump."
 USA_high_expectations: "Altas expectativas"
 USA_high_expectations_desc: "El COVID-19 es la enfermedad más mortífera a la que se ha enfrentado el mundo en décadas. Un compromiso de conveniencia política sería inútil para combatirla. Debemos ser firmes y enviar al Partido Republicano una propuesta que no puedan rechazar. Si tienen sentido común, trabajarán con nosotros."
 USA_meet_in_the_middle: "Un punto medio"
 USA_meet_in_the_middle_desc: "Debemos ser realistas. Un proyecto de ley suavizado que se apruebe de inmediato es mejor que uno inflexible que se arrastre por el Senado, o incluso que muera en el Congreso. Llegar a un acuerdo con el Partido Republicano es la única forma de garantizar que la ayuda llegue al pueblo americano."
 USA_fuel_the_machine: "Alimentar la máquina"
 USA_fuel_the_machine_desc: "Como una máquina bien lubricada, nuestros medios de comunicación se asegurarán de que Trump y sus partidarios reciban cobertura negativa 24/7, ¡para que finalmente podamos convencer a América de que es hora de que el tirano se vaya!"
 USA_national_lockdowns: "Cuarentenas nacionales"
 USA_national_lockdowns_desc: "Esta plaga de COVID-19 requiere medidas sin precedentes para ponerle fin rápidamente. Los confinamientos nacionales pueden ser tachados de autoritarios, pero tenemos que hacerlo por un bien mayor."
 USA_abandon_the_anarchists: "Rechazar a los anarquistas"
 USA_abandon_the_anarchists_desc: "Los anarquistas son una vergüenza para nuestro movimiento. Le están dando un festín a los medios de comunicación de derechas y nos humillan con cada nuevo pequeño negocio que queman. Es hora de cortar los lazos con estos extremistas."
 USA_mingle_with_the_movement: "Integrarse con el Movimiento"
 USA_mingle_with_the_movement_desc: "Si esperamos ganar algún apoyo de los movimientos BLM y anti-fascista, debemos salir a la calle y unirnos a los manifestantes. De lo contrario, corremos el riesgo de parecer unos elitistas que no tienen ninguna conexión o simpatía con su movimiento."
 USA_flames_of_the_future: "Las llamas del futuro"
 USA_flames_of_the_future_desc: "Mientras América arde, vemos las llamas del futuro, un futuro purificado de los pecados del pasado."
 USA_promise_progress: "Prometer progreso"
 USA_promise_progress_desc: "Si queremos mantener a raya al ala izquierda de los demócratas, tendremos que volver a nuestras raíces progresistas. El presidente Biden asegurará a estos activistas que su administración hará avanzar la justicia social y económica, y es de esperar que los mantenga a raya durante los próximos días."
 USA_american_only_oil: "Sólo petróleo americano"
 USA_american_only_oil_desc: "Depender del petróleo extranjero ha sido un desastre para nuestro sector energético y tenemos que recurrir a nuestros propios proveedores nacionales para garantizar que los automóviles puedan seguir funcionando."
 USA_lasting_peace: "Una paz duradera"
 USA_lasting_peace_desc: ""
 USA_silence_the_tyrant: "Silenciar al tirano"
 USA_silence_the_tyrant_desc: "El poder de Trump proviene de su capacidad para movilizar a grandes cantidades de americanos a través de sus declaraciones incendiarias en las redes sociales. Si lo silenciamos, podremos cortar de cuajo el apoyo de sus ingenuos seguidores."
 USA_green_economics: "Economía ecológica"
 USA_green_economics_desc: "La crisis climática se cierne sobre nosotros, y hará que COVID-19 parezca una nimiedad en comparación. La crisis del petróleo demuestra de una vez por todas que es hora de invertir en fuentes de energía alternativas."
 USA_the_shadow_presidency: "Desde las sombras"
 USA_the_shadow_presidency_desc: "Los resultados en las elecciones han demostrado que América se enfrentará a la época más dura no vista desde 1861. Nuestros enemigos aumentan con el paso del tiempo y debemos prepararnos en esta calma temporal que precede a la tormenta."
 USA_build_back_better: "Build Back Better"
 USA_build_back_better_desc: "Con propósito y determinación, nos abocamos a las tareas de nuestra era. Sostenidos por la fe, impulsados por la convicción, y dedicados unos a otros y a este país que amamos con todo nuestro corazón."
 USA_underground_armaments: "Armamento clandestino"
 USA_underground_armaments_desc: "Necesitamos almacenar armamento para cuando llegue el momento, podamos usarlas todas para enfrentarse contra el gobierno corrupto e ilegítimo en D.C."
 USA_fan_the_flames: "Avivar las llamas"
 USA_fan_the_flames_desc: "El fuego se está alzando por todo el país, de costa a costa, de estado a estado. Necesitamos iniciar una guerra, una guerra contra el sistema corrupto y contra aquellos que se aprovechan de la situación."
 USA_rally_the_people: "Reunir al pueblo"
 USA_rally_the_people_desc: "En los momentos más oscuros, debemos convencer a la gente que estamos luchando una guerra justa para salvar América de mezquinos separatistas y fanáticos señores de la guerra que tienen la audacia de proclamarse el gobierno alternativo de América."
 USA_the_fire_rises: "El fuego asciende"
 USA_the_fire_rises_desc: "Ha llegado el momento de que salvemos América y, cuando hayamos superado todas las adversidades, ¡podremos verdaderamente hacer a América grande otra vez! DONDE VAMOS UNO, VAMOS TODOS."
 USA_unifiy_the_democratic_party: "Unificar el Partido Demócrata"
 USA_unifiy_the_democratic_party_desc: "El Partido Demócrata está dividido por varias ideas que pueden contradecirse entre sí, desde los progresistas hasta los liberales, es importante que nos unamos en estos tiempos difíciles."
 USA_reconcile_republicans: "Reconciliarse con los republicanos"
 USA_reconcile_republicans_desc: "Aunque la mayoría de los republicanos están influenciados por ese maníaco de Trump, hay algunos republicanos que se aferran al verdadero gobierno legítimo mientras el Partido de Lincoln tiene que soportar la brutal división entre los leales restantes y los traidores cultistas MAGA que nos molestan desde hace 4 o 5 años."
 USA_minimalize_militias: "Minimizar las milicias"
 USA_minimalize_militias_desc: "Las milicias armadas están causando estragos e intimidando a las comunidades y barrios locales; este problema debe abordarse por todos los medios necesarios."
 USA_address_the_infrastructure: "Atender la infraestructura"
 USA_address_the_infrastructure_desc: "Si bien nuestro plan Build Back Better incorporará a todo Estados Unidos, primero beneficiaremos aquellas áreas que serían más útiles para nosotros."
 USA_expand_lockdowns: "Expandir las cuarentenas"
 USA_expand_lockdowns_desc: "Las medidas de confinamiento que se establecieron inicialmente no han servido para mitigar la propagación del virus. Es imperativo ampliar las medidas de confinamiento, establecer toques de queda y zonas de cuarentena."
 USA_mandate_the_mask: "Mandato de la mascarilla"
 USA_mandate_the_mask_desc: "Se debe recordar al público que el virus puede atacar en cualquier momento, a menos que se desinfecten las manos cada vez. Si bien la cuarentena no será tan severa como antes, el público debe usar mascarillas cada vez que salga a comer, comprar o hacer turismo."
 USA_empower_the_government: "Empoderar al Gobierno"
 USA_empower_the_government_desc: "En una crisis como ésta, en la que el país se encuentra al borde del caos absoluto, la respuesta del gobierno debe ser rápida y decisiva. Nos aseguraremos de que nuestra administración esté preparada para hacer frente a la amenaza del radicalismo, incluso si ello requiere algunas tácticas cuestionables."
 USA_executive_order_14066: "Orden Ejecutiva 14066"
 USA_executive_order_14066_desc: "El país está entrando en una etapa en la que no hay posibilidad de desescalar la situación, por lo que es imperativo que reduzcamos la fuerza de nuestra oposición tanto como sea posible antes de que tengan la oportunidad de oponerse a nuestro Gobierno. Biden promulgará una orden ejecutiva para declarar la posesión de armas como una emergencia nacional y prohibir la posesión privada de armas. Muchos se opondrán a nosotros, pero estas medidas evitarán que los enemigos de la democracia estén armados."
 USA_worker_strikes: "Huelgas de trabajadores"
 USA_military_industrial_complex: "Complejo militar-industrial"
 USA_political_establishment: "Establishment político"
 USA_political_establishment_desc: "El sistema político americano siempre ha sido diseñado para apoyar a dos partidos, y sólo a dos. Su sistema de votación por mayoría simple ha garantizado que ningún tercer partido pueda desafiar legítimamente a los dos partidos en el poder en Washington. Si bien muchos critican este sistema por ser antidemocrático por suprimir las voces de las minorías, y algunos incluso llegan a llamarlo un duopolio, sus partidarios lo han elogiado por su estabilidad, lo que garantiza que el sistema americano no permita el extremismo dentro de su sistema. A pesar de esto, cada vez más americanos parecen estar cansados de los viejos políticos de Washington y se han ido inclinando hacia terceros partidos populistas."
 USA_constitutional_protections: "Protecciones constitucionales"
 USA_constitutional_protections_desc: "América tiene una de las leyes de libertad de expresión más flexibles del mundo. Al permitir una libertad de expresión casi ilimitada, se pueden expresar opiniones políticas diversas desde todos los lados del espectro político. Los defensores de este sistema citan su libertad, mientras que los detractores lo critican por permitir el ascenso del radicalismo. A pesar de esto, en la década de 2000 se ha producido una restricción masiva de dichas libertades civiles, y muchos americanos han comenzado a reflexionar sobre hasta qué punto una hoja de papel de la década de 1780 refleja la situación política real de 2020."
 USA_second_amendment_idea: "Segunda Enmienda"
 USA_second_amendment_idea_desc: "La Segunda Enmienda de la Constitución de los Estados Unidos dice: \"Siendo necesaria una milicia bien ordenada para la seguridad de un Estado Libre, no se violará el derecho del pueblo a poseer y portar armas\". Este lenguaje ha generado un debate considerable sobre el alcance previsto de la Enmienda. Por un lado, algunos creen que la frase de la Enmienda \"el derecho del pueblo a poseer y portar armas\" crea un derecho constitucional individual para los ciudadanos de los Estados Unidos. Según esta \"teoría del derecho individual\", la Constitución de los Estados Unidos restringe a los órganos legislativos la prohibición de la posesión de armas de fuego o, al menos, la Enmienda hace que la regulación prohibitiva y restrictiva sea presuntamente inconstitucional. Por otro lado, algunos académicos señalan el lenguaje introductorio \"una milicia bien ordenada\" para argumentar que los redactores de la Constitución sólo pretendían restringir que el Congreso eliminara por ley el derecho de un estado a la legítima defensa. En los últimos años, esta cuestión ha cobrado más protagonismo que nunca en el panorama político."
 USA_second_amendment_idea1: "Segunda Enmienda"
 USA_second_amendment_idea2: "Segunda Enmienda"
 USA_on_the_up: "Mejorando"
 USA_political_division: "División política"
 USA_political_division_desc: "\n\n\n\n£GFX_Political_Division\n\n\n\n\n\n\"Una casa dividida no puede mantenerse\", dijo Abraham Lincoln en 1858, la elección anterior a la Guerra Civil. Esas fatídicas palabras han resonado en los pasillos del Consejo Nacional Demócrata durante las primarias de 2019, una señal ominosa para las próximas elecciones. El bloqueo electoral se ha apoderado del Congreso, ya que las disputas entre los políticos han impedido la aprobación de cualquier legislación significativa. En las calles de Portland y en la mesa de la cena en Florida, las tensiones políticas sobre todos los temas, desde la cultura hasta la economía, amenazan con desgarrar a este país."
 USA_political_division1: "División política"
 USA_political_division1_desc: "\n\n\n\n£GFX_Political_Division\n\n\n\n\n\n\"Una casa dividida no puede mantenerse\", dijo Abraham Lincoln en 1858, la elección anterior a la guerra de Secesión. Esas fatídicas palabras han resonado en los pasillos del Consejo Nacional Demócrata durante las primarias de 2019, una señal ominosa para las próximas elecciones. El bloqueo electoral se ha apoderado del Congreso, ya que las disputas entre los políticos han impedido la aprobación de cualquier legislación significativa. En las calles de Portland y en la mesa de la cena en Florida, las tensiones políticas sobre todos los temas, desde la cultura hasta la economía, amenazan con desgarrar a este país."
 USA_political_division2: "División política"
 USA_political_division2_desc: "\n\n\n\n£GFX_Political_Division\n\n\n\n\n\n\"Una casa dividida no puede mantenerse\", dijo Abraham Lincoln en 1858, la elección anterior a la guerra de Secesión. Esas fatídicas palabras han resonado en los pasillos del Consejo Nacional Demócrata durante las primarias de 2019, una señal ominosa para las próximas elecciones. El bloqueo electoral se ha apoderado del Congreso, ya que las disputas entre los políticos han impedido la aprobación de cualquier legislación significativa. En las calles de Portland y en la mesa de la cena en Florida, las tensiones políticas sobre todos los temas, desde la cultura hasta la economía, amenazan con desgarrar a este país."
 USA_political_division3: "División política"
 USA_political_division3_desc: "\n\n\n\n£GFX_Political_Division\n\n\n\n\n\n\"Una casa dividida no puede mantenerse\", dijo Abraham Lincoln en 1858, la elección anterior a la guerra de Secesión. Esas fatídicas palabras han resonado en los pasillos del Consejo Nacional Demócrata durante las primarias de 2019, una señal ominosa para las próximas elecciones. El bloqueo electoral se ha apoderado del Congreso, ya que las disputas entre los políticos han impedido la aprobación de cualquier legislación significativa. En las calles de Portland y en la mesa de la cena en Florida, las tensiones políticas sobre todos los temas, desde la cultura hasta la economía, amenazan con desgarrar a este país."

 USA_congress_category: "Capitolio"
 USA_congress_category_desc: "Según la Constitución de los Estados Unidos, es fundamental que obtengamos el apoyo del Congreso a través de las dos cámaras, la §YCámara de Representantes§! y el §YSenado§!.\n\nApoyo total en la §YCámara Baja§!: §Y[?USA_house_support_var]§!/§Y[?USA_house_seats_var]§!\nApoyo §Rrepublicano§! en la Cámara Baja: §Y[?USA_house_support_gop_var]§!/§Y[?USA_house_seats_gop_var]§!\nApoyo §Cdemócrata§! en la Cámara Baja: §Y[?USA_house_support_dem_var]§!/§Y[?USA_house_seats_dem_var]§!\nApoyo §Lindependiente§! en la Cámara Baja: §Y[?USA_house_support_ind_var]§!/§Y[?USA_house_seats_ind_var]§!\n\nApoyo total en el §YSenado§!: §Y[?USA_senate_support_var]§!/§Y[?USA_senate_seats_var]§!\nApoyo §Rrepublicano§! en el Senado: §Y[?USA_senate_support_gop_var]§!/§Y[?USA_senate_seats_gop_var]§!\nApoyo §Cdemócrata§! en el Senado: §Y[?USA_senate_support_dem_var]§!/§Y[?USA_senate_seats_dem_var]§!\nApoyo §Lindependiente§! en el Senado: §Y[?USA_senate_support_ind_var]§!/§Y[?USA_senate_seats_ind_var]§!"
 USA_fighting_coronavirus: "Combatiendo al coronavirus"
 USA_fighting_coronavirus_desc: "¡El coronavirus, o COVID-19, está causando estragos en nuestra nación! Se necesitan acciones rápidas y decisivas para aplanar la curva cada vez más grande, pero debemos actuar con cuidado. Las medidas excesivas podrían destruir tanto la economía como la fe de la gente en la administración.\n\nGanancia semanal de mascarillas: [?ROOT.mask_weekly_gain_var|=+0]\n\nSuministro de mascarillas: [?ROOT.mask_supply_var|=+0]\n\nEstados afectados por el §Rcoronavirus§!: [?USA_covid_states_var|-0]"
 USA_second_american_civil_war_category: "Segunda Guerra Civil Americana"
 USA_second_american_civil_war_category_desc: "Dijeron que nunca podría suceder aquí, §Rpero sucedió§!. §YLos Estados Unidos de América§!, como los conocíamos, ya no existen; se han dividido en innumerables facciones en guerra que compiten por el control a nivel regional o incluso nacional. El ciudadano medio que solo quería asar a la parrilla dispara a sus antiguos hermanos y hermanas convertidos en enemigos. El mundo §Rnunca§! volverá a ser el mismo y quien aún esté vivo puede desear tener que seguir luchando. §REl siglo americano ha terminado y ha comenzado uno nuevo...§!\n\n\n£legitimacy Legitimidad: [?ROOT.legit_var|+1%] (£stability_texticon [?ROOT.legit_dynamic_var|+1%], £attack_texticon [?ROOT.legit_dynamic_var|+1%], y £defence_texticon [?ROOT.legit_dynamic_var|+1%])\nMeses desde el inicio de la Guerra Civil: [?ZZZ.USA_american_civil_war_months_var|Y0]"
 USA_deal_with_the_movement: "Lidiar con el Movimiento"
 USA_deal_with_the_movement_desc: "\"§REl Movimiento§!\" es una colección de grupos de activistas políticos que abogan por cambios sociales por toda la nación. Mientras que muchos protestan pacíficamente por reformas en la policía e igualdad racial, otros han generado disturbios y destrucción como medio para expresar sus frustraciones. También hay oportunistas quienes han usado el movimiento como pretexto para saquear y causar caos. Independientemente del motivo, El Movimiento está desestabilizando la nación, y si no lidiamos con ello, puede salirse del control.\n\nEstados bastión del §RMovimiento§!: [?USA_the_movement_states_loc_var|-0]\nEfectos del §RMovimiento§!: £stability_texticon  [?USA_the_movement_states_var|=+0%]"
 USA_counting_heads_category: "Pasando lista"
 USA_counting_heads_category_desc: "\n\n\n\n\n£GFX_USA_counting_heads_banner\n\n\n\n\n\n\n\nEstá claro, el tiempo de Gran Crisis ha llegado a Estados Unidos, y §Rno hay marcha atrás§!.\nDebemos asegurar la lealtad de distintas facciones dentro de la unión para salvar la nación, y si fallamos, §RAmérica dejará de existir§!.\n\n£legitimacy Legitimidad: [?ROOT.legit_var|+1%]\n"
 USA_2020_election_category: "La próxima elección"
 USA_2020_election_category_desc: "\n\n\n\n\n£GFX_USA_american_elections_banner\n\n\n\n\n\n\n\nLas próximas elecciones son en este noviembre, y es nuestra tarea hacer que nuestro candidato sea electo para un término en la Casa Blanca. Estas elecciones son vistas por muchos como un referendo sobre Trump y sus políticas populistas. Solo el tiempo dirá si el empresario podrá aferrarse al mundo libre, o si este buscará a un nuevo líder.[GetPoliticalEnable]"
 USA_recoring_category: "Reintegración"
 USA_recoring_category_desc: "Para recuperar nuestros estados, primero debemos tener reivindicaciones sobre ellos. Luego, deberemos tener un cumplimiento lo suficientemente alto en esos estados. Una vez logrado esto, necesitaremos suficiente poder político para permitirnos la reintegración del estado y esperar a que se complete el cronómetro. Una vez finalizado, se eliminarán nuestras reivindicaciones sobre el estado, pero se convertirá en estado esencial.\n\nCoste de reintegración: £pol_power  §Y[?ROOT.recore_pp_var]§!\nTiempo de reintegración: §Y[?ROOT.recore_time_var]§! días"

 usa.1.t: "El siglo americano"
 usa.1.d: "Durante los últimos 100 años, América ha sido considerado la principal potencia mundial, con la mejor economía jamás vista, una enorme y diversa extensión territorial con multitud de recursos y población, y se ha convertido en la principal nación democrática del mundo. Los últimos cien años le han dado a Estados Unidos libertad para difundir sus ideas, mientras sus enemigos se derrumbaban ante su poder. Sin embargo, los demonios del pasado de América han venido a atormentarla, resonando en su mente con cada vez más fuerza a medida que transcurren los días. Numerosas voces claman por reparaciones para los afroamericanos que una vez estuvieron encadenados en el Sur Profundo. La liberación les llegó con la Proclamación de Emancipación en 1863 durante la Guerra Civil, y posteriormente, en 1865, con la ratificación de la Decimotercera Enmienda que abolía la esclavitud. Sin embargo, no todo fue color de rosas, pues teóricamente eran libres, pero los sureños los mantuvieron como esclavos en todo menos en el nombre. Esto finalmente terminó con el Acta de Derechos Civiles de 1964. Sin embargo, los efectos de la esclavitud aún se sienten y las relaciones raciales han disminuido drásticamente en las últimas décadas, lo que lleva a constantes peleas sobre si América se fundó sobre el sufrimiento de otros o sobre la libertad del individuo."
 usa.1.a: "¡E pluribus unum!"
 usa.2.t: "La situación actual"
 usa.2.d: "En todo el mundo, en toda la Tierra, en la cuna de la humanidad, ha comenzado una nueva década. Los fuegos artificiales de Año Nuevo siguen sonando en todo el planeta, y muchos aún formulan sus deseos para el Año Nuevo. De hecho, los Estados Unidos de América no hacen nada diferente. Con cada década, es tradición que nuestra nación analice las situaciones que enfrenta, ya sea económica, global o políticamente.\n\nEconómicamente, la nación ha disfrutado de relativa estabilidad en los últimos años. La inflación y los precios se han mantenido a un nivel manejable, y el desarrollo ha continuado como se esperaba en todo el país. Sin embargo, gran parte de esta estabilidad económica depende de un factor crucial: el petróleo. La creciente dependencia de lo que se denomina el \"oro negro\" del mundo es vital para mantener el equilibrio de nuestra nación. Si nuestro principal proveedor interrumpiera su suministro, Estados Unidos podría verse rápidamente sumido en una grave crisis. En el ámbito internacional, EE.UU. ha enfrentado un clima de tensión similar en los últimos años. Surgen disputas e incidentes, pero generalmente se gestionan a través de canales diplomáticos o intervenciones estratégicas, lo que garantiza que estos problemas se mantengan contenidos y no se descontrolen. A pesar de estos desafíos, el área de influencia de EE.UU. se mantiene en gran medida estable; sin embargo, esta requiere una supervisión constante para mantenerse.\n\nDe los tres principales problemas que enfrenta EE.UU. cada década, ahora el sistema político de grandeza que subyace al funcionar de nuestra nación es nuestro mayor problema. Con la campaña presidencial en pleno apogeo y la noche de las elecciones acercándose rápidamente, la tensión política en todo el país ha alcanzado un nivel inquietante. La ira política va en aumento y la polarización se ha vuelto cada vez más alarmante. Lo que antes eran simples diferencias de opinión ahora han llevado a algunos individuos a adoptar posturas extremas, y muchos incluso se arman de valor ante sus desacuerdos políticos.\n\nSi bien los desafíos que enfrentan los Estados Unidos en esta nueva década pueden parecer obvios a primera vista, en última instancia, será el resultado de las próximas elecciones lo que decidirá el rumbo de la nación. Lo que está en juego nunca ha sido tan importante, y las decisiones que se tomen la noche de las elecciones determinarán el futuro de la tierra de los libres durante los próximos años."
 usa.2.a: "¡Un brindis por la nueva década, y una nueva era para América!"
 usa.3.t: "El Partido Republicano colapsa"
 usa.3.d: "Con los medios de comunicación dando como ganador a Joe Biden, sus escaños asegurados y la demanda en Texas desestimada, muchos miembros del Partido Republicano se han distanciado del presidente Trump, revelando su verdadera postura al pueblo americano. En respuesta, los partidarios de Trump en todo el país están indignados y han comenzado a abandonar el Partido Republicano masivamente, y algunos piden que Trump cree un nuevo partido político. También se han intensificado los llamados para que los partidarios de Trump en Georgia se abstengan de votar en la segunda vuelta de las elecciones al Senado, con el objetivo de debilitar al establishment republicano y obligarlos a alinearse con Trump en sus esfuerzos por impugnar los resultados electorales del 6 de enero. Activistas destacados que apoyan a Trump han comenzado a organizar una protesta para esa misma fecha para presionar al Congreso a que apoye a los electores suplentes, y el propio presidente les ha dado su respaldo, diciendo a sus seguidores..."
 usa.3.a: "\"Asistan, será loco\"."
 usa.4.t: "La investidura de Joe Biden"
 usa.4.d: "Joe Biden se encontraba en la sala de crisis de la Casa Blanca, flanqueado por Jill, Kamala, congresistas leales y los miembros del Estado Mayor Conjunto que se mantuvieron fieles a América. El juez Roberts, algo conmocionado y aún desconcertado por los acontecimientos de los últimos días, oficiaba la ceremonia improvisada.\n\nPosponiendo la mano sobre la Biblia familiar, Biden repitió el juramento: \"Yo, Joseph Robinette Biden Junior, juro solemnemente que ejerceré con fidelidad el cargo de presidente de los Estados Unidos, y, hasta el límite de mi capacidad, preservaré, protegeré y defenderé la Constitución de los Estados Unidos, ¡con la ayuda de Dios!\"\n\nLa sala resonó en aplausos, mientras los pocos periodistas a los que se les permitió entrar tomaban fotografías de este momento histórico. Pero fue histórico por las razones equivocadas. Al otro lado del país, Donald Trump se refugiaba con elementos traidores del ejército, prestando en secreto el mismo juramento y reclamando un cargo que, según el gobierno, prácticamente había perdido. Estaban a punto de colisionar y ninguno de los dos estaba dispuesto a apartarse del camino."
 usa.4.a: "América llora..."
 usa.4.b: "Ya no hay vuelta atrás..."
 usa.5.t: "El ejército suspende las comunicaciones"
 usa.5.d: "Biden dio un informe en las firmes manos de Austin. Su cara era seria. El escritorio Resolute parecía una grieta entre los dos. \"La Guardia Nacional en Virginia necesita refuerzos en Richmond. Northam dijo que estaba preocupado por el Capitolio. Esto apesta, Lloyd\".\n\nEl secretario de Defensa asintió mientras Biden respiraba. \"¿Qué sucede con Barksdale? Más vale que reciban sus órdenes\".\n\nEl Secretario Austin puso sus manos en la mesa, con su mirada fija al presidente. \"No tenemos respuesta del comandante\".\n\nBiden se giró, con sus músculos mandibulares apretados, y con una furiosa mirada repleta de convicción que no sentía desde las masacres en Bosnia. \"No me estés jodiendo, Lloyd\".\n\nLloyd Austin se ajustó las gafas. Finalmente fue capaz de apartar la vista del comandante en jefe, con el sudor acumulándose en sus sienes y con sus manos frías predecía la calamidad que vendría cuando la chispa caiga en el polvorín. No había otro modo de hacerlo. Biden necesita saberlo.\n\n\"Fort Benning, Fort Knox y Fort Dix han estado en silencio desde que se declaró el estado de emergencia. Hemos recibido reportes de su movilización únicamente a las 4 AM. Ellos intentaron cruzar el Potomac\".\n\nUn bíper sonó fuera, en el pasillo."
 usa.5.a: "\"Que Dios nos ayude. Ha empezado\"."
 usa.5.b: "\"Que Dios nos ayude. Ha empezado\"."
 usa.7.t: "¡La crisis del petróleo llega a América!"
 usa.7.d: "Como si la situación económica no pudiera empeorar, el colapso de Arabia Saudita ha generado un pánico petrolero que ha puesto el punto final a nuestra anémica economía. Si bien el petróleo saudita solo representó alrededor del 21% de nuestras importaciones totales en 2019, nuestras otras fuentes principales han recortado la producción debido a la pandemia de COVID-19, y algunos, como Rusia y México, han reaccionado a la guerra civil saudita con un aumento exponencial de los precios. La producción nacional de petróleo no está al nivel actual necesario para compensar casi el 40% del consumo interno de petróleo proveniente de las importaciones.\n\nWall Street es un caos total; las escasas ganancias económicas obtenidas tras los confinamientos iniciales se han esfumado, ya que los cierres masivos vuelven a afectar a Main Street, USA. El sector del transporte por carretera, que antes operaba a pleno rendimiento como un \"servicio esencial\", ahora sufre despidos masivos debido al aumento explosivo de los precios de la gasolina. Los alimentos se pudren en los almacenes porque nadie puede transportarlos. Las cadenas de supermercados han anunciado el cierre de sus sucursales en todo el país a menos que la situación cambie rápidamente.\n\nSumada a la pandemia de COVID, la nueva crisis del petróleo ha diezmado lo que quedaba de la economía estadounidense. El optimismo de los inversores está en su punto más bajo, y algunas encuestas muestran un peor sentimiento que en el punto álgido del crac del 29. Una escasez de alimentos y medicamentos, sin precedentes en América, ha afectado a gran parte de la región montañosa del oeste y los Apalaches; mientras tanto, se ha instaurado un racionamiento en todo el país, prácticamente sin fundamento. Dada la escasez de muchos productos básicos, la gente se ha visto obligada a romper los toques de queda pandémicos para salir a buscar provisiones, lo que ha agravado la propagación del virus."
 usa.7.a: "¡¿Qué hemos hecho para merecer esto?!"
 usa.7.b: "¡¿Qué hemos hecho para merecer esto?!"
 usa.8.t: "El Movimiento recede"
 usa.8.d: "Después de meses de protestas incesantes e incesantes, el Movimiento ha detenido todas las protestas actuales y futuras, lo que ha provocado un gran descontento entre la izquierda y los partidarios del Movimiento, mientras que ha entusiasmado mucho a quienes se oponían a ellas."
 usa.8.a: "¡Chao!"
 usa.8.b: "¡Buen viaje!"
 usa.9.t: "Altas expectativas - Republicanos rechazan"
 usa.9.d: "En un giro sorprendente, el Partido Republicano ha rechazado rotundamente nuestro proyecto de ley presupuestaria de compromiso. Este proyecto, elaborado tras intensas negociaciones bipartidistas y anunciado como un posible avance fiscal, contenía disposiciones polémicas destinadas a abordar problemas económicos arraigados. Parece que estas controvertidas medidas fueron el obstáculo que condujo al fracaso del proyecto de ley.\n\nCon la tensión en aumento y las fechas límite acercándose, nuestro partido se encuentra ahora en una frenética carrera por recuperar terreno y salvar la situación."
 usa.9.a: "Las expectativas eran muy altas."
 usa.10.t: "Altas expectativas - Republicanos aceptan"
 usa.10.d: "En un giro alentador de los acontecimientos, el Partido Republicano ha optado por aceptar el proyecto de ley presupuestaria de compromiso. Inicialmente impopular entre sus filas, existía la preocupación de si conseguiría los votos suficientes para su aprobación. Sin embargo, tras un voto muy reñido, el proyecto superó con éxito el obstáculo legislativo. Esta legislación, fruto de intensas negociaciones y concesiones significativas de todas las partes, aborda desafíos económicos críticos y busca abordar problemas de larga data.\n\nA medida que la sesión conjunta del Congreso se acerca a su fin, finalmente podemos respirar aliviados sabiendo que nuestro riesgo calculado ha valido la pena."
 usa.10.a: "Interesante..."
 usa.11.t: "Un punto medio - Republicanos aceptan"
 usa.11.d: "En un avance prometedor, el Partido Republicano ha acordado aceptar el proyecto de ley de presupuesto recientemente redactado. Esta legislación, meticulosamente planificada, busca abordar las preocupaciones económicas urgentes y fue diseñada para asegurar el apoyo bipartidista, evitando crucialmente un cierre del gobierno. Con la rápida aprobación del proyecto de ley por parte del Congreso y con mínimos obstáculos, se ha recuperado una sensación de estabilidad en el panorama político.\n\nAhora que el proyecto de ley de presupuesto ha sido aprobado con éxito, existe optimismo de que este impulso se mantendrá."
 usa.11.a: "Como era de esperarse."
 usa.12.t: "Un punto medio - Republicanos rechazan"
 usa.12.d: "Tras una tumultuosa sesión del Congreso, el Partido Republicano rechazó inesperadamente el proyecto de ley presupuestaria de acuerdo, meticulosamente negociado entre nuestro partido y el suyo. Este proyecto de ley, crucial para el apoyo bipartidista y para evitar un cierre gubernamental, incorporaba disposiciones vitales que abordaban desafíos económicos urgentes. Las razones del voto republicano en contra están sujetas a interpretación, lo que ha dejado a muchos en el gobierno atónitos ante esta decisión.\n\nA medida que la tensión aumenta y se acercan los plazos, nuestro partido está elaborando urgentemente estrategias para salvar la situación."
 usa.12.a: "¡Comienzen a redactar una nueva ley!"
 usa.13.t: "Flynn sale del retiro"
 usa.13.d: "Michael Flynn, ex-consejero de Seguridad Nacional de la Casa Blanca de Trump, ha sido llamado de vuelta de su retiro por el presidente tras un indulto repentino otorgado el 25 de noviembre.\n\nEl asesor de Seguridad Nacional había estado detenido en los tribunales durante más de tres años bajo la acusación de asistir a agentes extranjeros, específicamente a agentes extranjeros turcos y rusos. Sin embargo, tras cooperar con las investigaciones sobre estos canales y en lo que parecía ser una retención injusta de Flynn en los tribunales, el presidente Trump le otorgó un indulto presidencial, liberándolo del atolladero judicial.\n\nMeses antes, Flynn había jurado lealtad a la teoría de QAnon, considerando ciertas sus acusaciones contra quienes considera malhechores demócratas; su lealtad al actual presidente se mostró intacta. Ante la posibilidad de que Trump pierda su reelección, Flynn, según informes, le ha aconsejado al presidente que declare la ley marcial, suspenda la constitución y repita las elecciones. Aunque el presidente Trump ha negado esta acusación, ha generado un caos masivo con su renuncia como consejero de Seguridad Nacional bajo la administración supuestamente saliente.\n\nEl mundo observa con expectación cómo el próximo movimiento de Trump podría decidir el destino de la nación."
 usa.13.a: "Carpe diem."
 usa.14.t: "Biden es declarado presidente electo"
 usa.14.d: "Con uno de los entornos políticos más tensos en la historia de Estados Unidos llevando al país a estas elecciones, Donald Trump y Joe Biden se han enfrentado en estas elecciones presidenciales. A pesar del incidente de Míchigan y de otros múltiples casos de votos que simplemente \"aparecieron\" en el aire para ser contabilizados a favor del Partido Demócrata, Joe Biden finalmente, tras muchas conjeturas, ha sido certificado como vencedor y presidente electo de Estados Unidos por el Colegio Electoral.\n\nLas celebraciones ya se han visto interrumpidas por violentos enfrentamientos, y el país permanece sumido en el caos debido a la naturaleza tumultuosa de estas elecciones. Si Biden se convierte en presidente, como se le ha encomendado, tendrá que enfrentarse a una nación que solo busca los extremos de aquello a lo que él mismo supuestamente se opone. Su apoyo está unido a él por el único factor de no ser Donald Trump, y si no implementa las políticas extremas necesarias para sumar al Movimiento, su apoyo podría disiparse.\n\nMientras tanto, Donald Trump, quien aún ostenta el poder presidencial por dos semanas más, ha denunciado los resultados electorales como falsos, afirmando que pretende llevar un caso ante la Corte Suprema contra el Partido Demócrata por fraude electoral, tras las múltiples victorias inestables del Partido Demócrata en estados.\n\nAlgunos temen que el actual presidente pueda recurrir a medidas más drásticas si no se repiten las elecciones, y se informa que Michael Flynn y otras figuras vinculadas a QAnon han sido convocadas a una reunión en la Casa Blanca lo antes posible."
 usa.14.a: "¡Pence, eres un traidor!"
 usa.14.b: "¡Lo logramos!"
 usa.16.t: "La muerte de Wall Street"
 usa.16.desc: "Estados Unidos se encuentra al borde del colapso, con los rumores de una Segunda Guerra Civil Americana cada día más fuertes. Meses de feroz conflicto político, creciente violencia y una devastadora oleada de infecciones por coronavirus han llevado al país a la crisis, diezmando industrias y dejando los sistemas sanitarios desbordados.\n\nEl nivel de vida ha caído en picado y la economía está paralizada. El comercio ha disminuido bruscamente, lo que ha provocado una caída libre de las importaciones y exportaciones y ha disparado los precios de los productos de primera necesidad. Los bancos de EE.UU., luchando por contener los daños, han impuesto restricciones a las retiradas de fondos debido a una \"escasez crítica de liquidez\". Esta decisión ha desatado el frenesí entre el público, provocando una venta masiva de activos y una carrera para convertir los ahorros en efectivo.\n\nCon Wall Street en ruinas, el colapso financiero de EE.UU. se extiende por todo el planeta, arrastrando a la baja los índices bursátiles internacionales y devaluando las divisas mientras la economía mundial se tambalea. La creciente inestabilidad política ha despertado un fantasma que los americanos y el mundo esperaban enterrado desde hace tiempo: una Segunda Guerra Civil. A medida que las facciones dentro de Estados Unidos se vuelven cada vez más militantes, los mercados mundiales contienen la respiración, observando cómo América parece dispuesta a sumergirse en uno de los periodos más destructivos de su historia."
 usa.16.a: "El fin de América está cerca..."
 usa.77.t: "Qasem Soleimani ha muerto"
 usa.77.d: "El Comando en Kuwait ha informado sobre el exitoso asesinato del general iraní Qasem Soleimani, como represalia a los ataques iraníes contra la base aérea K-1 en [IRQ.GetNameDef]. El asesinato del general ha aumentado la tensión entre nosotros y [PER.GetNameDef]. Esto ha generado indignación en la izquierda, que critica al presidente por aumentar la tensión entre ambas naciones. Un importante medio de comunicación lo defiende llamándolo \"el líder militar más venerado de Irán\". Muchos también afirman que el asesinato fue un intento de distraer la atención de las audiencias del juicio político. Sin embargo, independientemente de la perspectiva, es innegable que esto tendrá un impacto significativo en la política de Medio Oriente."
 usa.77.a: "Otro que muerde el polvo."
 usa.77.b: "¡Trump iniciará la Tercera Guerra Mundial!"
 usa.78.t: "Se disuelve la División Atomwaffen"
 usa.78.d: "Empezando como un grupo en línea de adolescentes racistas y expandiéndose como un grupo mucho más oscuro, sombrío y militante, la División Atomwaffen ha crecido considerablemente en los últimos 6 años. Iniciando como un grupo de 13 amigos disparando en sus patios, el grupo se ha expandido exponencialmente a cientos de miembros y miles de simpatizantes a causa de las recientes tensiones raciales, de acuerdo al FBI.\n\nGran parte del crecimiento de la División Atomwaffen se debe a James Mason, un neonazi aceleracionista famoso por su famoso libro \"Siege\". Tras tomar control del grupo en 2017, inició una purga masiva de \"glowies\", es decir, agentes federales infiltrados. Desde entonces, Atomwaffen ha estado operando y reclutando abiertamente y esparciendo sus violentas y detestables retóricas por todo el país.\n\nAyer, Atomwaffen anunció en su página web que se disolverían con efecto inmediato, sin dar muchas explicaciones. Muchos líderes antifascistas celebraron diciendo que esto era una victoria importante, mientras que muchos son escépticos, sosteniendo que Atomwaffen y sus grupos satélite simplemente están pasando a la clandestinidad y que siguen siendo una amenaza."
 usa.78.a: "Bien, ahora los medios no pueden llamarme nazi... ¿verdad?"
 usa.78.b: "¡Trump dirá que no hay más nazis en América!"
 usa.79.t: "Aumentan los casos de COVID-19"
 usa.79.d: "El número de casos de COVID-19 en toda la nación ha aumentado drásticamente llevando a un aumento en las cuarentenas y en las bajas por enfermedad, lo que está ralentizando nuestra economía."
 usa.79.a: "Esto no es bueno..."
 usa.79.b: "¡El \"Virus Drumpf\" contraataca!"
 usa.80.t: "Mitin por la 2ª Enmienda en Richmond"
 usa.80.d: "Mientras el Senado del Estado de Virginia vota sobre nuevas regulaciones de armas de fuego, miles de ciudadanos de todo Virginia y de estados vecinos se reunieron en el ayuntamiento de Richmond en apoyo a la Segunda Enmienda."
 usa.80.a: "¡Me alegra ver a otros patriotas!"
 usa.80.b: "Esperemos que no le disparen a nadie..."
 usa.81.t: "Policía de Richmond mata a manifestante negro desarmado"
 usa.81.d: "Ayer por la tarde, un hombre negro de 24 años llamado Quinton Evans murió bajo custodia policial en Richmond, Virginia. Evans caminaba por la calle cuando fue visto por un patrullero de la policía que creyó que encajaba con el perfil de un ladrón buscado. Aunque un control de identidad confirmó que no era el ladrón, tenía una orden de detención por no comparecer ante el tribunal por un cargo de posesión de drogas. Fue detenido por el sargento James Harmon e introducido en el vehículo, donde sufrió una hemorragia cerebral y murió de camino a comisaría.\n\nSin embargo, las grabaciones de los teléfonos móviles de los transeúntes revelan una historia diferente. Mientras realizaba la detención, Harmon empujó con fuerza la cabeza y el cuerpo de Evans contra una pared de ladrillo, lo suficiente como para dejarlo casi inconsciente. Volvió a empujarle contra la pared por decir que le dolía, y su grito de \"¡Me estás matando, tío!\" fue respondido con una risotada por Harmon.\n\nLas imágenes se publicaron en las redes sociales a la mañana siguiente, lo que provocó la indignación de la comunidad negra y de activistas locales. Se han formado protestas espontáneas en el lugar de la detención de Evans, así como ante las comisarías de la policía de Richmond y el ayuntamiento."
 usa.81.a: "Nuestros pésames y condolencias a la familia del Sr. Evans."
 usa.81.b: "Esperemos que traigan un cambio."
 usa.82.t: "La policía de Richmond se disuelve"
 usa.82.d: "En una ajustado voto de 53-47, un referendo de la ciudad de Richmond para disolver su departamento de policía ha sido aprobado por un estrecho margen. Tras el asesinato de Quinton Evans y los posteriores disturbios de la Resistencia en todo el país, ha surgido entre los residentes de la ciudad un controvertido llamamiento a disolver el departamento. Aludiendo a una corrupción abrumadora en el seno del departamento, los votantes han optado por sustituir a la policía por un nuevo Departamento de Seguridad Pública que probablemente incluiría a las fuerzas del orden, a los servicios de emergencia y a profesionales de la salud mental, adoptando un enfoque holístico de la delincuencia.\n\nMientras que los partidarios han afirmado que la abolición del departamento desviará recursos vitales de la actuación policial violenta hacia el ataque a las raíces de la delincuencia, como la pobreza y la salud mental, los opositores se han hecho eco de la preocupación de que aumente la delincuencia violenta, sobre todo teniendo en cuenta la grave situación de la nación con la pandemia del coronavirus.\n\nA pesar de la disolución del departamento, las violentas protestas siguen sacudiendo la nación tras el asesinato de Quinton Evans. Aunque es demasiado pronto para ver todos los resultados del Experimento Richmond, no cabe duda de que Estados Unidos ha cambiado, para bien o para mal."
 usa.82.a: "Locura y caos."
 usa.82.b: "Un paso en la dirección correcta."
 usa.83.t: "Policía Federal desplegada en Richmond"
 usa.83.d: "Los enfrentamientos políticos en Richmond han aumentado en los últimos días. Manifestantes contrarios a la Segunda Enmienda saquearon e incendiaron numerosos negocios de la ciudad. Mientras la policía local intentaba contener a la multitud de partidarios de la Segunda Enmienda, se reportaron múltiples peleas y tiroteos. Los medios de comunicación confirmaron 4 muertos y 89 heridos. La Policía Federal de varios departamentos se movilizó y se encargó de arrestar a los individuos identificados que intentaron incendiar el ayuntamiento. La reacción mediática no se hizo esperar. Cientos de imágenes de agentes federales con equipo táctico arrestando a manifestantes en la calle, arrastrándolos hasta un vehículo sin distintivos y huyendo rápidamente."
 usa.83.a: "El orden está siendo restaurado..."
 usa.83.b: "¡El orden está colapsando!"
 usa.84.t: "Protestas a nivel nacional"
 usa.84.d: "Impulsadas por la noticia de la muerte de Quinton Evans bajo custodia policial, han surgido protestas contra la brutalidad policial en Seattle, Portland, San Francisco, Los Ángeles, Chicago, Nueva York, Atlanta, Miami y Washington D.C. Atrayendo a decenas de miles de personas cada día, sus demandas abarcan desde juntas de supervisión civil para los departamentos de policía y una mayor indemnización para las víctimas de brutalidad, hasta la abolición total de los departamentos de policía de la ciudad en favor de grupos de ayuda comunitaria. Las imágenes de la muerte de Evans se están extendiendo rápidamente por las redes sociales, junto con hashtags como #BlackLivesMatter y #YoureKillingUs.\n\nEl Departamento de Policía de Richmond ha anunciado que ha puesto al sargento Harmon bajo custodia protectora y que está abriendo una investigación criminal sobre sus acciones, pero esto no ha logrado calmar la indignación. Parece que estas protestas han pasado de ser una reacción a la muerte de un hombre a una manifestación general de quejas contra los departamentos de policía y el gobierno, y sólo el tiempo dirá cuánto tardarán en disiparse."
 usa.84.a: "Esto no se acabará pronto, ¿verdad?"
 usa.84.b: "Canta el pueblo su canción..."
 usa.85.t: "Protestas en Oregón"
 usa.85.d: "Portland, conocida como un foco de extremismo en la Costa Oeste, ha estallado en violentas protestas a medida que el Movimiento se extiende por todo el país. Tras el asesinato de Quinton Evans a manos del Departamento de Policía de Richmond, los manifestantes han exigido el fin de la brutalidad policial, el racismo sistémico y la desigualdad. También exigieron justicia para los afroamericanos víctimas de la violencia policial.\n\nLas protestas en Portland atrajeron la atención nacional a medida que aumentaban las tensiones entre los manifestantes y las fuerzas del orden. Se desplegaron agentes federales en Portland para proteger la propiedad federal, pero su presencia solo avivó las protestas. Manifestantes y agentes federales protagonizaron violentos enfrentamientos, con gases lacrimógenos y balas de goma por parte de las fuerzas del orden.\n\nA pesar de los esfuerzos de las fuerzas del orden por dispersar las protestas, los manifestantes en Portland se mantuvieron firmes en su causa. Las protestas continuaron durante el verano y el otoño, con varios incidentes y arrestos de alto perfil. Las protestas en Portland y otras ciudades del país llamaron la atención sobre la urgente necesidad de una reforma policial y la justicia social en los Estados Unidos."
 usa.85.a: "Vuelvan a casa, hippies."
 usa.85.b: "¡Aplasten al sistema!"
 usa.86.t: "Protestas nacionales"
 usa.86.d: "Tras la muerte de Quinton Evans, un civil afroamericano, bajo custodia policial, cientos de miles de personas han salido a las calles a protestar, en una demostración de fuerza sin precedentes desde los disturbios de Los Ángeles de hace décadas. Las circunstancias específicas de la muerte del hombre aún son algo imprecisas, ya que el juicio por el incidente aún no se ha celebrado. Sin embargo, las imágenes de un agente, aún no identificado, presionando con la rodilla el cuello de Quinton mientras este afirma que \"no puedo respirar\" han conmovido a millones, provocando que grupos de protesta liberales y de izquierda, junto con miembros descoordinados de la comunidad afroamericana, participen en estas protestas nacionales. Ya tenemos informes de una escalada en Mineápolis, la ciudad natal de Quinton, donde se han producido saqueos a negocios grandes y pequeños en zonas donde el departamento de policía ha perdido el control ante la magnitud de las protestas.\n\nActivistas políticos de centro e izquierda han denunciado lo que parece ser otro 'incidente de brutalidad policial común' y corriente, dentro de lo que consideran una crisis mucho mayor que requiere una acción social drástica para su resolución. Agitadores de línea dura incluso han equiparado la situación actual con la de una segregación racial descontrolada, donde los agentes legales pueden eludir la persecución y ejercer autoridad extrajudicial al tratar con sospechosos pertenecientes a minorías. Elementos conservadores han exigido una drástica desescalada, afirmando que, en relación con el incidente del Sr. Evans, su detallado historial legal sienta un precedente de violencia contra agentes, siendo esto lo que el agente sospechoso utilizó para justificar el uso de la fuerza bruta antes de la muerte de Quinton Evans.\n\nLos elementos conservadores ya han comenzado a armarse y a entrar en las ciudades donde se protesta con el pretexto de proteger a los pequeños comercios, que, según afirman, están siendo atacados por los manifestantes. Los enfrentamientos son inevitables."
 usa.86.a: "Tarde o temprano se irán a casa..."
 usa.86.b: "¡Sin justicia, no hay paz!"
 usa.87.t: "Establecimiento de la Zona Autónoma de Capitol Hill"
 usa.87.d: "Oficiales de Capitol Hill en Seattle, Washington, han abandonando el recinto y han sido trasladados a un Safeway cercano. Black Lives Matter, Antifa y otros grupos han puesto barricadas por el área y han proclamado la \"Zona Autónoma de Capitol Hill\"."
 usa.87.a: "Esto solo va a empeorar..."
 usa.87.b: "¡Libertad para los oprimidos!"
 usa.88.t: "Problemas en Capitol Hill"
 usa.88.d: "Tras varias semanas de anarquía y distanciamiento en la \"Zona Autónoma\" de Capitol Hill de Seattle, parece que este experimento caótico de autogobierno se acerca a su fin. Líderes comunitarios, organizadores radicales y otros residentes de Seattle que intentan mantener el orden y la civilidad se han topado, en su mayoría, con una falta de cooperación, tanto en sus demandas políticas como por parte de gran parte de la población de la zona. La escasez casi total de alimentos, la falta de organización y el aumento de la delincuencia en la zona han hecho que la situación se vuelva insostenible para los organizadores, con las autoridades interviniendo lentamente y reduciendo el área en los últimos días, a medida que los incidentes violentos se han vuelto cada vez más frecuentes.\n\nLa más reciente serie de tiroteos, dos de ellos fatales, ha marcado el principio del fin de la \"autoridad\" de la zona. Miembros del Departamento de Policía de Seattle, siguiendo las órdenes del alcalde y con la asistencia del Buró Federal de Investigaciones, se están preparando ahora para trasladarse al área y poner fin a su efímera autonomía y restablecer el orden, independientemente de que los que están dentro planeen irse voluntariamente o no."
 usa.88.a: "¡Como siempre, se impone el orden y la ley!"
 usa.88.b: "No fue un gran experimento."
 usa.89.t: "Elecciones cerca"
 usa.89.d: "Este año ha sido todo un desafío para el presidente Trump, el resultado de esta elección decidirá el futuro de la nación, y servirá como un referendo de la plataforma populista del presidente."
 usa.89.a: "¡Venga, cuatro años más!"
 usa.89.b: "¡Venga, apoyen a Joe!"
 usa.90.t: "Elecciones de 2020 - Retrasos"
 usa.90.d: "Al igual que en las últimas elecciones presidenciales, el recuento de los resultados ha tardado muchísimo. Sin embargo, a diferencia de las últimas elecciones, el recuento ha sido tan largo que la mayoría de los escrutadores ya se han retirado. Hasta el momento, Joe Biden y Donald Trump parecen estar en igualdad de condiciones, y la mayoría de los medios de comunicación proyectan una victoria de Biden."
 usa.90.a: "Vamos, ¡díganle no a Joe!"
 usa.90.b: "¡Los retrasos son normales!"
 usa.91.t: "Elecciones de 2020 - Intromisión en las boletas"
 usa.91.d: "Ha surgido un video de una fuente anónima que muestra camiones frente a un centro de votación en Georgia descargando bolsas de papeletas y llevándolas al edificio después del cierre de las urnas para el recuento a las 4 a. m. Otros en redes sociales afirman haber visto camiones similares y personas descargando papeletas en las urnas pocas horas después del cierre de las urnas en todo el país. Los medios de comunicación y los demócratas niegan rotundamente cualquier acusación, con Joe Biden aparentemente a la cabeza de las elecciones. Sea cual sea la verdad, la ciudadanía está empezando a perder la fe en el sistema..."
 usa.91.a: "Aquí hay gato encerrado..."
 usa.91.b: "¡Estas son las elecciones más seguras de la historia!"
 usa.92.t: "Elecciones de 2020 - Medios declaran a Biden ganador"
 usa.92.d: "Es oficial: varios grandes medios de comunicación han dado la victoria a Joe Biden, ya que varios estados han pasado de una ventaja cada vez mayor sobre Biden la noche de las elecciones a una reñida contienda a favor de Joe en muchos estados clave. Con las acusaciones de manipulación electoral cobrando cada vez más protagonismo en los debates políticos sobre las elecciones, muchos están comenzando a abandonar a los medios, incluso algunos que han favorecido a Trump en el pasado. Sin embargo, la campaña de Trump, el Partido Republicano y los independientes ya han iniciado procedimientos legales en varios estados para impugnar los resultados anunciados."
 usa.92.a: "¡GANARÉ!"
 usa.92.b: "¡Por poco!"
 usa.93.t: "Elecciones de 2020 - Trump realiza un mitin"
 usa.93.d: "Estos \"expertos\" dicen que no podemos hacerlo, que soy malo por el COVID, mientras que esos imbéciles de Antifa, de la \"Resistencia\" o lo que sea, no dejan de amenazarme a mí y a mi Pueblo. La seguridad está aterrorizada, diciendo que es demasiado peligroso. ¿Pero qué saben ellos? No podemos rendirnos ahora, tenemos que movilizarnos. Este no es el momento de tirar la toalla; eso déjenlo a los demócratas; quieren que nuestro país se rinda, pero no podemos permitirlo; tenemos que luchar.\n\nTengo que mostrarle a mi Pueblo que estoy con ellos, no como Joe \"Sótano\" Biden que se esconde. Estoy aquí sosteniendo la antorcha, porque vamos a ganar, pero solo si hacemos cosas grandes.\n\nUn pequeño problema: hay tanto de qué hablar que me temo que se va a descontrolar, mis torpes redactores de discursos no pueden encontrar nada, pero sé lo que mi Pueblo necesita, lo siento, no necesito un teleprónter."
 usa.93.a: "¡Joe el Dormilón y su agenda proge acabará con nuestro país!"
 usa.93.b: "Soy el presidente de la LEY Y EL ORDEN - ¡Debemos atacar al llamado \"Movimiento\"!"
 usa.93.c: "¡Se trata de la unidad, nuestros valores cristianos y AMÉRICA PRIMERO!"
 usa.93.e: "Las encuestas dicen que perdemos, pero la economía dice otra cosa. ¡Mejor que nunca!"
 usa.94.t: "Elecciones de 2020 - Caso texano desestimado"
 usa.94.d: "Con los rápidos avances en el sistema judicial en relación con la campaña de Trump y la inminente fecha límite para presentar impugnaciones, se hizo cada vez más evidente que el asunto llegaría a la Corte Suprema. El Estado de Texas presentó una demanda ante la Corte Suprema contra cuatro estados clave que aparentemente votaron por Biden, argumentando que estos estados modificaron inconstitucionalmente sus leyes electorales antes de las elecciones y, por lo tanto, sus votos no debían contabilizarse. Texas alegó legitimación activa en el caso, afirmando que los resultados electorales afectarían al Senado, que el vicepresidente actuaría como desempate y que el Senado representaría a los estados. La demanda obtuvo el apoyo de otros 17 estados y más de 120 representantes de la Cámara de Representantes.\n\nSin embargo, a pesar de esta justificación, la Corte Suprema falló por 7 votos a 2 no escuchar el caso, afirmando que Texas \"no tenía legitimación\" para demandar. Esta decisión ha provocado indignación entre muchos que consideran que aún no les ha llegado el momento de comparecer ante el tribunal y que consideran el fallo como una forma de que la Corte evite tomar una decisión importante. Ahora que se han agotado las vías legales, el presidente Trump ha pedido al Partido Republicano que se oponga a los resultados de las elecciones del 6 de enero y que cuente a los electores suplentes del Partido Republicano de varios estados en disputa."
 usa.94.a: "¡Hasta la justicia es corrupta!"
 usa.94.b: "¡El poder judicial mantiene la neutralidad!"
 usa.95.t: "Los demócratas salen del Congreso"
 usa.95.d: "Tras meses de impedir que el Congreso trabajara como de costumbre, los demócratas simplemente se han marchado. Muchos medios de comunicación han intentado encontrar una razón para ello preguntando a los líderes demócratas, pero hasta ahora han ignorado cualquier intento de acercamiento. Esto está provocando un gran malestar en el gobierno, que teme un colapso y el silencio de algunos sectores. A este malestar se suman los rumores de que los demócratas planean alzarse contra el gobierno, aprovechando su tiempo en el Congreso para preparar el levantamiento; sin embargo, los medios no han investigado estas afirmaciones."
 usa.95.a: "La gota que derramó el vaso."
 usa.95.b: "Trump fue la gota que derramó el vaso."
 usa.96.t: "Muere familia texana en asedio"
 usa.96.d: "Paramédicos y bomberos buscaron entre los escombros de una casa rural en el oeste de Texas. La casa pertenecía a un coronel de la Fuerza Aérea que vivía con su esposa y dos hijos en las afueras de la ciudad de Van Horn. La Base Aérea 18 de EE.UU. informó que el coronel Craig Brown no se había presentado en la base durante varias semanas. Los oficiales fueron enviados a la casa y la encontraron tapiada con algunos agujeros en las ventanas para que entrara la luz del sol. Amigos contactaron a Craig por teléfono y les informaron que parecía angustiado y que estaba protegiendo a su esposa e hijos y que no saldría de su casa. Temiendo una posible toma de rehenes, el equipo SWAT local y la policía llegaron al día siguiente e intentaron negociar con Craig para que sacaran a su familia. Tras varias horas sin éxito, los oficiales se acercaron a la casa y fueron recibidos con disparos. Los equipos SWAT se movilizaron y se prepararon para abrir una brecha por todos los lados de la casa, donde Craig detonó una bomba casera que destruyó gran parte de la vivienda. Seis oficiales resultaron heridos durante la terrible experiencia, y los paramédicos recuperaron los cuerpos de Craig y su familia. Los críticos en las redes sociales se apresuraron a denunciar las acciones de Craig y pedir la abolición de la segunda enmienda."
 usa.96.a: "¡Qué terrible tragedia!"
 usa.97.t: "Aumenta la tasa de criminalidad en California"
 usa.97.d: "La reciente guerra de pandillas y los disturbios a nivel nacional han sometido a una gran presión a la policía de California en las principales ciudades. Los tiempos de respuesta son pésimos, casi 15 minutos en caso de un tiroteo activo. La policía federal se ha desplegado en algunas ciudades para ayudar a combatir la creciente violencia política que también ha azotado el país."
 usa.97.a: "¡Ayuden a la policía!"
 usa.98.t: "Se desplegan milicias texanas"
 usa.98.d: "Los departamentos de policía de Texas han reportado un preocupante aumento en la actividad de diversas milicias estatales de izquierda y derecha. Estos grupos han comenzado a desfilar en varias localidades con el objetivo de \"proteger a su comunidad\"."
 usa.98.a: "¡Envien a la Guardia Nacional!"
 usa.99.t: "La disidencia se organiza en Oregón"
 usa.99.d: "Varias milicias de izquierda en Oregón se han activado y han comenzado el reclutamiento directo en ciudades más grandes. La policía no puede reprimir eficazmente estas campañas de reclutamiento debido a las grandes protestas en defensa de los organizadores."
 usa.99.a: "¡Orden!"
 usa.100.t: "Se movilizan pandillas floridanas"
 usa.100.d: "Varias pandillas en las principales ciudades de Florida han comenzado a exhibir abiertamente a sus miembros y a definir el territorio que ocupan. Al igual que en el resto del país, la policía de Florida está haciendo todo lo posible para detener a los saqueadores y a los protestantes."
 usa.100.a: "¡Envien a la policía federal!"
 usa.101.t: "Se organizan activistas afroamericanos"
 usa.101.d: "Líderes de grupos por los derechos afroamericanos se han organizado en el sur profundo. Coordinándose con otras milicias afroamericanas, han formado una sólida alianza."
 usa.101.a: "¡Envien a la policía federal!"
 usa.102.t: "Los demócratas declaran un gobierno legítimo"
 usa.102.d: "Parece que los rumores eran ciertos: con la ayuda de grupos paramilitares leales y algunos elementos del ejército, los demócratas tomaron el control del Senado, la Cámara de Representantes y la Casa Blanca, declarando a la Administración Trump un régimen ilegal. Miembros del Partido Republicano presentes en estos lugares fueron arrestados y juzgados por traición. Lo que quedaba del Partido Republicano se trasladó al Medio Oeste, mientras que el presidente huyó de Denver con el resto del gobierno."
 usa.102.a: "Una casa dividida... no puede sostenerse..."
 usa.103.t: "El presidente Trump declara el estado de emergencia"
 usa.103.d: "El presidente Donald J. Trump declaró el estado de emergencia, calificando la crisis actual como el golpe de Estado más ilegal y traicionero de la historia americana. Condenó a los demócratas como delincuentes, hipócritas y traidores, acusándolos de intentar robar el país y destruir todo lo que representa.\n\nCon Washington, D.C. bajo el control del régimen ilegítimo de Biden, el gobierno de Trump se vio obligado a trasladarse a Denver, convirtiendo la ciudad en el epicentro de la lucha política actual. Las Fuerzas Armadas de los Estados Unidos, afectadas por las deserciones masivas, han obligado a las fuerzas leales a reorganizarse. Mientras tanto, las divisiones que se unen al bando de Biden han tomado el control de capitolios estatales clave, trazando una frontera clara a lo largo del país.\n\nA medida que se profundiza el estado de emergencia, América finalmente se tambalea al borde del caos absoluto. Denver se erige como el último refugio para los leales a Trump, mientras milicias patrióticas y unidades militares se unen bajo su mando. La batalla por el alma de la nación está a punto de estallar, con el futuro pendiendo de un hilo. Victoria o ruina: este es el camino que América ha elegido."
 usa.103.a: "¡Muerte a los traidores!"
 usa.104.t: "Los demócratas se niegan a hablar"
 usa.104.d: "Trump se encontraba en su nueva oficina, en el salón legislativo temporal de Denver. Cientos de páginas estaban apiladas sobre su mesa. Cada frase era un ultimátum, acompañada de largas explicaciones que, al final, no decían nada sobre por qué él, su familia y todos sus seguidores debían ser arrestados y juzgados.\n\nNo podía creer lo que leía. Todo lo que solían mencionar -derechos humanos, libertad, democracia- se había desvanecido de la noche a la mañana. ¿A dónde nos llevan con esto? A lo largo de su carrera empresarial, Trump nunca había enfrentado una imprudencia como esta.\n\nFue en ese instante cuando llegó la noticia inevitable, traída por un hombre uniformado y jadeante que había asumido el cargo. Las unidades de la Guardia Nacional de Pensilvania, Virginia y otros estados rebeldes habían atacado a las de Oklahoma, Misuri y Kansas.\n\nPor primera vez en unos 160 años, un americano se enfrentaba a otro en combate. América había sido como una familia para tantas personas, y ahora un hermano iba a matar a otro hermano en este acto de violencia doméstica tan grave.\n\n\"¿Qué sigue, señor?\", fue la pregunta que rompió el silencio momentáneo."
 usa.104.a: "\"Ahora, a luchar\"."
 usa.104.b: "¡Muerte a los traidores!"
 usa.105.t: "Nuestro bando"
 usa.105.desc: "El futuro de esta nación será determinado por aquellos que estén dispuestos a asumir el riesgo y sacrificarlo todo, por lo tanto, debemos decidir a qué facción ayudaremos en caso de lo inevitable."
 usa.105.a: "¡Esta nación no desaparecerá de la faz de la Tierra!"
 usa.105.b: "¡Por la democracia!"
 usa.105.c: "¡Libertad a los oprimidos!"
 usa.105.d: "Llegó la hora..."
 usa.105.e: "Nuestros planes están completos..."
 usa.105.f: "¡En defensa de nuestra comunidad!"
 usa.105.g: "¡A las armas en Dixie!"
 usa.105.h: "¡Debemos reclamar América!"
 usa.105.i: "¡Muerte al Estado!"
 usa.105.j: "¡Los chicanos se unen!"
 usa.105.k: "¡Cascadia vive!"
 usa.106.t: "¡El Suroeste colapsa!"
 usa.106.d: "TODO"
 usa.106.a: "¡Envien a la policía federal!"
 usa.107.t: "Debate en el Senado sobre bombas nucleares"
 usa.107.d: "El Senado se reunió hoy para debatir asuntos internos de la república fracturada. Entre otras cosas, se planteó el uso de armas nucleares como posible arma contra el bando contrario. La propuesta generó decenas de respuestas indignadas. \"¿Cómo nos atrevemos a considerar la posibilidad de matar a decenas de miles de americanos inocentes?\", exclamó un senador."
 usa.107.a: "Todo está sobre la mesa."
 usa.108.t: "La Armada se separa"
 usa.108.d: "La Armada de los Estados Unidos ha decidido declararse neutral en la guerra y ha tomado el control de Hawái, Alaska y el resto de nuestros territorios. Aunque se declaran imparciales, es evidente que favorecen a Biden con sus decisiones anteriores."
 usa.108.a: "Traidores..."
 usa.109.t: "Se organizan los Bautistas del Sur"
 usa.109.d: "En medio del caos, varias iglesias bautistas del sur han organizado milicias para luchar contra nuestras fuerzas."
 usa.109.a: ""
 usa.110.t: "Supremacistas blancos organizan levantamiento"
 usa.110.d: "TODO"
 usa.110.a: "Un problema más."
 usa.111.t: "Levantamiento en Charlotte"
 usa.111.d: "TODO"
 usa.111.a: "Un problema más."
 usa.112.t: "Toma de la base naval de Kings Bay"
 usa.112.d: "La base naval de Kings Bay ha caído tras un ataque bien coordinado de unidades de la División Atomwaffen. Varios submarinos con capacidad nuclear estaban estacionados en la base y no pudieron escapar a tiempo. Creemos que decenas de tripulantes fueron tomados como rehenes y la División Atomwaffen está empeñada en obtener los códigos de lanzamiento nuclear. Dos grupos de trabajo ya se han reunido y se desplegarán en Kings Bay para recuperarla."
 usa.112.a: "Buena suerte."
 usa.113.t: "Colasa el orden en Míchigan"
 usa.113.d: "TODO"
 usa.113.a: "Oremos por los civiles."
 usa.119.t: "Muerte de Ruth Bader Ginsberg"
 usa.119.d: "Ruth Bader Ginsburg, jueza de la Corte Suprema, falleció el viernes a los 87 años. Su fallecimiento se debió a complicaciones de un cáncer de páncreas metastásico y falleció en su hogar, rodeada de su familia.\n\nGinsberg, la segunda mujer nombrada para la Corte Suprema en 1993, luchó incansablemente contra la discriminación sexual y por los derechos de las mujeres. Dejó clara su postura sobre el derecho al aborto desde el primer día, reiterándola durante su audiencia de confirmación. \"Es esencial para la igualdad de la mujer con el hombre que ella tome las decisiones, que su elección sea determinante\", declaró Ginsburg.\n\nFue tenaz, fuerte, decidida y madre. La recuerdan sus dos hijos, Jane Carol Ginsburg y James Steven Ginsburg, así como sus cuatro nietos, dos nietos políticos y un bisnieto.\n\nSu familia, su país y sus colegas de la Corte Suprema nunca la olvidarán.\n\n\"Nuestra nación ha perdido a una jueza de talla histórica\", declaró el viernes el presidente del Tribunal Supremo, John Roberts. En la Corte Suprema hemos perdido a una querida colega. Hoy lloramos su pérdida, pero confiamos en que las futuras generaciones recordarán a Ruth Bader Ginsburg como la conocimos, una incansable y decidida defensora de la justicia.\n\nIncluso antes de su muerte, la cuestión de si su puesto en la Corte Suprema debía ser presentado o permanecer vacante hasta después de las próximas elecciones fue objeto de un intenso debate en Washington y en todo el país."
 usa.119.a: "Sin importar sus creencias, la respeto."
 usa.119.b: "Ella fue increíble... ¿pero porqué se murió precisamente ahora?"
 usa.123.t: "Acuerdo de paz con los talibanes a punto de finalizarse"
 usa.123.d: "Durante meses, hemos seguido de cerca las negociaciones entre los talibanes y el gobierno afgano para alcanzar un acuerdo de paz. Con la disminución del número de tropas y el apoyo público menguante tras casi dos décadas de guerra, nos complace anunciar que el acuerdo entre Estados Unidos y los talibanes acaba de firmarse en Doha, poniendo fin finalmente a nuestra participación de 20 años en la región."
 usa.123.a: "¡Finalmente, paz!"
 usa.124.t: "Incendios de California"
 usa.124.d: "Una pareja del sur de California cuya fiesta de revelación de género se cree que fue la chispa que encendió el mortífero incendio de El Dorado en 2020 ha sido imputada con 30 crímenes, incluyendo homicidio involuntario, anunciaron las autoridades el jueves.\nUna bomba de humo puesta por la pareja en Yucaipa, California el 5 de septiembre como parte de una revelación de género encendió un fuego que quemó más de 22000 acres a través de 2 condados, dijo el abogado del Distrito del Condado de San Bernandino Jason Anderson durante una conferencia de prensa.\nUn bombero murió mientras combatía las llamas y otros dos resultaron heridos, según Anderson. El incendio destruyó varias casas y quemó 22000 acres, dijo su oficina.\nCAL FIRE determinó que la causa del incendio fue \"un dispositivo pirotécnico generador de humo\"."
 usa.124.a: "¡¿Una fiesta de revelación de género?!"
 usa.124.b: "Por esto es que tenemos abortos..."
 usa.126.t: "El estado de la Unión"
 usa.126.d: "El discurso del estado de la Unión de este año fue interesante. Como de costumbre, el presidente Trump elogió sus logros desde su último discurso e invitó a muchas personas que, en su opinión, se vieron afectadas positivamente por sus políticas, en particular Juan Guaidó, presidente interino de [VEN.GetNameDef]. El presidente también intentó calmar los temores sobre el aumento del COVID-19 en China, al anunciar conversaciones con [PRC.GetLeader] para contenerlo. Hacia el final del discurso, la presidenta de la Cámara de Representantes, Nancy Pelosi, rompió su copia del discurso justo detrás del presidente, lo que provocó la ira de los republicanos y tuvo una tibia recepción por parte de los demócratas. Sin embargo, el discurso tuvo, en general, una buena acogida y demuestra a nuestro pueblo que América está en alza."
 usa.126.a: "¡Pelosi ni siquiera lo leyó!"
 usa.126.b: "¡Más mentiras de Trump!"
 usa.127.t: "Primer caso de coronavirus en EE.UU."
 usa.127.d: "Hoy, la CDC recibió informes de un hospital suburbano de Seattle con noticias preocupantes: América tiene su primer caso confirmado del nuevo coronavirus, también conocido como coronavirus de Wuhan o COVID-19. El paciente, un ciudadano de 35 años que visitó Wuhan la semana pasada, afirmó no recordar haber interactuado con personas visiblemente enfermas durante su estancia allí ni durante el vuelo de regreso, y que sus síntomas no aparecieron hasta varios días después de regresar a Estados Unidos.\n\nEl paciente y su familia ya han sido puestos en cuarentena, y se están realizando esfuerzos para localizar a las personas con las que tuvo contacto desde su regreso a Estados Unidos. Dado que el coronavirus parece ser contagioso sin presentar síntomas, los expertos médicos temen que decenas de personas hayan estado expuestas sin saberlo."
 usa.127.a: "Parece que ahora es nuestro problema."
 usa.127.b: "Parece que ahora es nuestro problema."
 usa.128.t: "Trump es declarado presidente electo"
 usa.128.d: "Es oficial: los electores de cada estado han votado y el Congreso se ha unido. Ahora es oficial. Contra todo pronóstico, el presidente Donald Trump permanecerá en el cargo y tendrá un segundo mandato, para disgusto de sus oponentes políticos. Incluso el vicepresidente de Trump, Mike Pence, tenía poca o ninguna fe en Trump y, en contra de su voluntad, optó por contar los votos enviados por los gobernadores estatales. Sin embargo, al final, el Congreso contabilizó los votos y descubrió que, en medio de la confusión, muchas papeletas eran fraudulentas o inválidas, lo que resultó en una estrecha victoria para Trump.\n\nYa se están organizando protestas para protestar por los resultados; la manifestación a favor del presidente terminó con cientos de miles de manifestantes. El país parece haber perdido la fe en el sistema electoral: los izquierdistas se sienten traicionados por los tribunales y otros se sienten inseguros al votar debido a la cantidad de fraude detectado en el sistema y a cómo fue corrompido por los medios de comunicación.\n\nA muchos les parece que los resultados realmente no importan mucho, si es que importan algo; independientemente de quién gane, se está gestando una tormenta y es solo cuestión de tiempo antes de que caiga sobre nuestra nación."
 usa.128.a: "Contra todo pronóstico... ¡mantendremos a América grande!"
 usa.128.b: "¡Es un mentiroso y un tramposo!"
 usa.129.t: ""
 usa.129.d: "TODO"
 usa.129.a: ""
 usa.129.b: "¡Sucio corrupto!"
 usa.130.t: "Disturbios en ciudades"
 usa.130.d: "A medida que la violencia continúa en ciudades de todo el país y los enfrentamientos entre las fuerzas del orden y del Movimiento se intensifican, los daños a las principales infraestructuras se han vuelto inevitables. Vías ferroviarias, carreteras, tranvías, autobuses... muchos han sufrido daños en diferentes regiones, y seguirán sufriendo hasta que el Movimiento se disperse de alguna manera.\n\nLa retórica del Movimiento, que se ha hecho eco en los medios de comunicación, ha minimizado los daños, impidiéndonos así intensificar nuestras respuestas, incluso si quisiéramos hacerlo."
 usa.130.a: "¡El caos no resuelve nada!"
 usa.130.b: "¡Contra el sistema!"
 usa.132.b: "¡Trump ha vuelto a fallar!"
 usa.134.t: "El Movimiento organiza el \"Asedio a la Casa Blanca\""
 usa.134.d: "Hoy han surgido informes inquietantes del FBI y de múltiples informantes. El \"Movimiento\" y sus grupos disidentes se están organizando activamente para un posible \"asedio\" a la Casa Blanca.\n\nEste acontecimiento coincide con la proximidad de la temporada electoral, y el Movimiento tiene como principal prioridad impedir la reelección del presidente Donald J. Trump. Actualmente, están planeando un \"Asedio a la Casa Blanca\" programado para dentro de aproximadamente cincuenta días, con la intención de mermar los índices de aprobación del presidente.\n\nSi no contrarrestamos eficazmente los planes del Movimiento, es probable que su asedio continúe según lo previsto, lo que dificultará las actuales iniciativas políticas del presidente."
 usa.134.a: "¡Traten esto de inmediato!"
 usa.134.b: "¡Contra el sistema!"
 usa.135.t: "Comienza el Asedio"
 usa.135.d: "A medida que las protestas del Movimiento se han apoderado del país y la presión social parece haber paralizado cualquier respuesta efectiva, sus acciones se han vuelto más audaces. Con autoridad extrajudicial de facto por el momento, miles de miembros del Movimiento en Washington D.C. han salido a las calles una vez más, esta vez hacia la Casa Blanca, donde reside el actual presidente.\n\nEl Servicio Secreto y la Guardia Nacional custodian el perímetro de la Casa Blanca, pero el movimiento de masas que se ha extendido hasta la puerta del presidente ha amenazado este perímetro frágil en múltiples ocasiones. Se han disparado disparos de advertencia, pero hasta el momento no se ha desatado un caos descontrolado. Muchos predicen, sin embargo, que es solo cuestión de tiempo hasta que elementos más extremistas dentro de las filas inciten una violenta ruptura del perímetro. Los oradores gritan retórica a través de las vallas y los movimientos de masas continúan causando daños a la infraestructura y saqueos en toda la región, mientras que las calles se han vaciado de todo, excepto de los hombres y mujeres de acción.\n\nSegún informes internos, el presidente podría haber huido a través de pasadizos subterráneos durante el asedio, aunque esto no está confirmado."
 usa.135.a: "Fue cerca..."
 usa.135.b: "¡Paren al racista en jefe!"
 usa.136.t: "El Asedio se cancela"
 usa.136.d: "Tras una investigación más exhaustiva por parte del FBI, el asedio planeado a la Casa Blanca fue cancelado. Esta noticia llega porque el \"Movimiento\" no logró consolidarse lo suficiente. Esto resultó en una falta de voluntarios y de participación antes de que comenzara el asedio. Muchos miembros del \"Movimiento\" que sí acudieron han declarado que la falta de participantes se debió al \"silenciamiento político\" y la \"supresión mediática\"."
 usa.136.a: "Que alivio."
 usa.136.b: "Que fracaso."
 usa.137.t: "América ha sanado"
 usa.137.d: "A pesar de toda la turbulencia, lo hemos logrado: hemos derrotado al COVID-19 y eliminado el virus de nuestra gran nación. Ahora podemos volver a la normalidad, ¿o no? Algunos médicos afirman que debemos esperar que el coronavirus se comporte como la gripe y presente una nueva cepa cada año, pero por ahora por fin podemos tranquilizarnos y tener algo de paz."
 usa.137.a: "Lo viejo vuelve a ser nuevo..."
 usa.141.t: "Hasta la Luna"
 usa.141.d: "Los mercados financieros están en crisis hoy, ya que el valor de Gamestop (GME) se ha disparado más allá de lo esperado.\n\nLa presión sobre las posiciones cortas en Gamestop comenzó a finales de 2020, cuando un grupo de inversores en el subreddit r/WallStreetBets comenzó a comprar acciones de GME, principalmente como respuesta al declive de la compañía y a las posiciones cortas de fondos de cobertura como Melvin Capital. Estos inversores institucionales habían apostado a que el precio de las acciones de GME caería y utilizaban instrumentos financieros complejos, como opciones, para intentar lucrarse con la caída.\n\nEl grupo WallStreetBets, sin embargo, tenía un plan diferente. Al comprar acciones de GME y negarse a venderlas, impulsaron el precio de las acciones, provocando pérdidas masivas para los vendedores en corto, quienes se vieron obligados a recomprar acciones a precios mucho más altos. Esto creó un círculo vicioso, ya que el aumento del precio de las acciones atrajo a más inversores individuales, lo que elevó aún más el precio y causó pérdidas aún mayores para los vendedores en corto.\n\nLa contracción breve de GameStop resultó finalmente en miles de millones de dólares en pérdidas para los inversores institucionales que habían apostado contra la empresa, mientras que los inversores individuales que habían organizado la compresión obtuvieron ganancias sustanciales."
 usa.141.a: "Odio Reddit."
 usa.142.t: "¡John Brennan acusa interferencia rusa!"
 usa.142.d: "Tras una tensa temporada electoral que culminó con la victoria republicana, el Partido Demócrata busca respuestas sobre las posibles causas de su derrota. Si bien muchos han reconocido su derrota y felicitado al Partido Republicano por una nueva victoria, algunos se han negado, citando la \"interferencia rusa\" como posible causa de la victoria de Trump. Esta respuesta ha generado fuertes críticas por parte de los medios pro-Trump, incluyendo a FOX News, que calificó a John Brennan y a otros demócratas que apoyan la teoría de \"completos idiotas\". Sin embargo, medios como CNN respaldan plenamente la idea, afirmando que esta y las elecciones anteriores solo resultaron en una victoria republicana debido a la interferencia con el gobierno ruso. Tras dos temporadas electorales fallidas para el Partido Demócrata, es comprensible que muchos empiecen a creer que los demócratas están cayendo en desgracia."
 usa.142.a: "\"¡Rusia-Rusia-Rusia!\""
 usa.143.t: "Un tenso día de acción de gracias"
 usa.143.d: "El pavo es el centro de cualquier día de Acción de Gracias, y era el alimento básico de los Hartford en esta época del año. Pero 2020 fue distinto. La comida de hoy era un almuerzo para llevar de un McDonalds cercano; era todo lo que podían permitirse en términos de tiempo y dinero.\n\n\"Pues bien, feliz día de acción de gracias a todos\". susurró la madre, tratando desesperadamente de esbozar una sonrisa. El resto de la mesa masculló sus agradecimientos. y dio inicio el \"festín\".\n\n\"Stacey, pásame la sal\", exigió el hermano. Sin embargo, la hermana no respondió. \"Stacey, si sigues enfadada con lo de ayer, entonces deberí-\"\n\n\"Me llamaste una perra roja Jason. te negaste a disculparte, ¿Y ahora quieres que haga lo que tu quieras?\" respondió Stacey. \"Eres realmente despreciable\".\n\n\"¿Y bien, no tengo razón? ¿No eres tú la que llenó toda su habitación con fotos de ELLA?\" respondió Jason. ¿No eres tú la que está chillando constantemente sobre la explotación del proletariado? Ellos ni siquiera son explotados, ¿Por qué te aferras a una ideología muerta?\"\n\n\"Oh, ¿Debería empezar a hablar de la supremacía blanca entonces? reprochó ella de vuelta. \"Tú esparces ese sinsentido día y noche, ¿y soy yo la que está quejando? Por qué no te vas a quemar otra bandera gay; tal vez podam-\"\n\n\"Suficiente\". Dijo el padre, golpeando la mesa con la mano.\n\nLos chicos intentaron oponerse, pero ambos sabían que no querían ver la furia de su padre. Ambos se fueron de mala gana a sus habitaciones, dejando solos a sus padres."
 usa.143.a: "La familia americana nunca volverá a ser la misma."
 usa.144.t: "Legislaturas estatales buscan cambiar sistemas electorales"
 usa.144.d: "En una reforma electoral ex post facto sin precedentes, las facciones dentro de las legislaturas de Pensilvania y Georgia anunciaron con pocos días de diferencia que, con efecto retroactivo desde las elecciones de 2020, los votos electorales se contabilizarán de forma similar a los sistemas de Maine y Nebraska. Es decir, cada distrito de la Cámara de Representantes tendrá un solo voto electoral. En lugar de un sistema de \"el ganador se lo lleva todo\", la voz de los ciudadanos de los distritos será lo que cuente en las contiendas políticas.\n\nAunque no son tan directamente democráticos como algunos desearían, estos cambios propuestos han sido aclamados por los demócratas y republicanos moderados de los estados como una salvaguardia necesaria contra los Gobiernos minoritarios. Sin embargo, las fuerzas pro-Trump los consideran simplemente una facilitación del fraude electoral al despojar a los estados de su facultad para determinar las elecciones y, en cambio, otorgar un poder indebido a los funcionarios a nivel de distrito."
 usa.144.a: "¡ESTÁ ARREGLADO!"
 usa.144.b: "¡La democracia es preservada!"
 usa.145.t: "¡Se aprueban las reformas de asignación electoral!"
 usa.145.d: "A altas horas de la noche, en una sesión repentina convocada por los jefes de bancada del Senado y la Cámara de Representantes, Georgia y Pensilvania votaron a favor de los cambios propuestos a sus respectivas asignaciones de votos electorales. Los resultados de las elecciones de 2020 se asignarán con base en los escaños del Congreso y del Senado. Similar a los sistemas ya vigentes en Maine y Nebraska, el nuevo sistema sin duda aumentará el número de votos del candidato demócrata Joe Biden, quien ahora disfrutará de los votos de los distritos electorales demócratas en ambos estados.\n\nElogiadas por sus simpatizantes como reformas demócratas muy necesarias, que garantizan la voluntad de los votantes y aseguran que la campaña de Trump no pueda presionar al estado para que asigne sus votos en contra de la voluntad de los votantes, estas reformas han sido criticadas por los leales a Trump, argumentando que simplemente garantizan que el fraude electoral sea más difícil de investigar y \"corregir\".\n\nAdemás, argumentan que fuerzas oscuras lograron el voto mediante sobornos, intimidación y otros medios ilícitos. Desde Twitter, Donald Trump exigió a las legislaturas estatales que \"revoquen esta ley atroz y antidemocrática, que garantiza que millones y millones de votos de Trump no cuenten\". Además, declaró: \"¡Están robando estas elecciones!\"."
 usa.145.a: "¡¿A QUÉ HA LLEGADO ESTE PAÍS?!"
 usa.145.b: "¡Sáquenlo, cueste lo que cueste!"
 usa.146.t: "Se insta a Pence a invocar la Enmienda XXV"
 usa.146.d: "La intriga es la consigna en Washington D.C. esta noche, ya que periodistas del New York Times han revelado que prominentes congresistas demócratas y republicanos han instado en privado al vicepresidente Mike Pence y a varios funcionarios del gabinete a invocar la Enmienda XXV contra el presidente Donald Trump. La Sección 4 de la Enmienda establece que el vicepresidente y el gabinete pueden destituir a un presidente si lo consideran \"incapaz\". Inmediatamente después de la publicación de la noticia, se vio a numerosas limusinas con el vicepresidente y otros funcionarios del gabinete dirigiéndose a la Casa Blanca, para luego partir poco después.\n\nSi bien la administración Trump ha guardado un silencio sepulcral sobre la acusación, es evidente que la han tomado en serio y creen que Pence se tomó en serio el consejo o no notificó al presidente que había recibido las exhortaciones. La única información disponible ha sido una breve declaración de la secretaria de prensa, Kayleigh McEnany, en la que afirma que \"el presidente es plenamente capaz de ejercer sus funciones y no se dejará intimidar\". De todos modos, el mero hecho de que se haya considerado esta enmienda ilustra las aguas peligrosas en las que se mueve ahora el gobierno."
 usa.146.a: "¿Mike... Mike, qué estás haciendo?"
 usa.146.b: "Pence es un hombre de honra, sabe lo qué debe hacer."
 usa.147.t: "Protestas afuera de la Casa Blanca se vuelven violentas"
 usa.147.d: "Las elecciones de este año han sido bastante turbulentas, ya que la victoria de Donald Trump se mantiene bajo un alto escrutinio. Sus partidarios celebran la victoria, mientras que sus oponentes hacen todo lo posible para exigir un recuento, dado que se han dado casos de presunta interferencia electoral.\n\nAnte la posibilidad de que las elecciones sean anuladas y que Donald Trump irrite a sus bases, muchos miembros del Movimiento han salido a las calles para apoyar el recuento o para causar disturbios.\n\nLa mayoría de estas protestas han sido mayoritariamente pacíficas, pero una protesta frente a la Casa Blanca se convirtió en una auténtica pesadilla cuando un partidario de Trump fue apuñalado en el cuello por un desconocido. Esto desencadenó enfrentamientos más violentos entre manifestantes anti-Trump y pro-Trump, a medida que la violencia aumentaba rápidamente.\nSe utilizaron objetos contundentes y afilados: una nariz rota por aquí y una boca sangrante por allá.\nFinalmente, la policía intervino, pero esto no estuvo exento de dolor: decenas de personas fueron trasladadas de urgencia a hospitales, algunas de ellas en estado crítico.\nNinguno de los candidatos se ha pronunciado aún sobre el evento, pero una cosa es segura:\nNada volverá a ser igual."
 usa.147.a: "Solo hace falta una gota."
 usa.147.b: "Y este es el partido que llama a la \"unidad\"."
 usa.148.t: "Una tensa navidad"
 usa.148.d: "TODO"
 usa.148.a: ""
 usa.149.t: "¡Maine legaliza los electores infieles!"
 usa.149.d: "Abiertamente rechazando la decisión de la Corte Suprema de enero de 2020, la Legislatura de Maine ha legalizado a los electores infieles. Esta nueva ley permite al representante del Segundo Distrito de Maine, Jared Golden, emitir el voto de su distrito por Joe Biden en el próximo recuento del Colegio Electoral el 6 de enero. La ley se aprobó, al igual que muchos otros cambios electorales recientes promulgados después de las elecciones, en plena noche, con muchos miembros republicanos excluidos del Capitolio.\n\nPor ello, los leales a Trump en la zona han declarado ilegítima la ley y están reuniendo a electores alternativos en este preciso instante. Los manifestantes han llegado a Augusta, la capital del estado, para expresar sus quejas. Varios grupos de ultraderecha, principalmente el Frente Patriota y el NSC-131, aunque no son amigos de Trump (la mayoría ha declarado públicamente que no les importa si gana Trump o Biden), se han unido a los partidarios de MAGA para exigir la revocación de la ley.\n\nDonald Trump expresó su opinión sobre el cambio en Twitter, declarando: \"¡Qué vergüenza, en qué país tan horrible, espantoso y CORRUPTO se está convirtiendo esta nación! ¡Verdaderos Patriotas: RESISTANSE LA TIRANÍA EN TODAS SUS FORMAS!\"."
 usa.149.a: "¡YO GANÉ, Y POR MUCHO!"
 usa.149.b: "Es ilegítimo, cueste lo qué cueste..."
 usa.150.t: "Tras el recuento de votos del Congreso..."
 usa.150.d: "...el Congreso declaró que el candidato presidencial Joseph Robinette Biden Jr. ganó la contienda presidencial por 271 votos electorales, frente a los 267 del presidente Trump. A pesar de estar casi paralizado, estas intensas elecciones finalmente llegaron a su fin. Ahora, con un nuevo presidente, la gente definitivamente lo aceptará y América seguirá prosperando como una democracia funcional.\n\nAl menos, eso pensábamos.\n\nCasi inmediatamente después del recuento, el presidente Donald Trump denunció los resultados, afirmando que los demócratas \"usaron votos de muertos y jóvenes\" y \"manipularon estos votos para ganar estados disputados\".\n\nA pesar de que el presidente electo Biden desestimó estas acusaciones, dos días después, una turba pro-Trumpista rodeó el Congreso, exigiendo un recuento justo y la exclusión de los votos fraudulentos. A pesar de que no hubo daños importantes en el edificio del Congreso, una fuente desconocida afirmó que se detonaría una bomba dentro del Congreso si no se realizaba otro recuento. Los Servicios Secretos se vieron obligados a evacuar todo el edificio y comenzaron a rastrear a dicha persona, posteriormente identificada como Paul Hillfinger, partidario del Movimiento Nacionalsocialista. Paul admitió posteriormente que estas amenazas no eran más que chantaje y que el presidente Trump es el único que puede salvar a la raza blanca de las \"n-palabras\" liberales.\n\nLos medios de comunicación ya están furiosos, con muchos izquierdistas afirmando que \"fascistas intolerantes\" han perpetrado un \"ataque a nuestra democracia\". Muchos ya han salido a las calles, enfrentándose ferozmente a los manifestantes de derecha, con una intensidad similar a la de los disturbios de Los Ángeles de 1992. Tal como están las cosas, es dudoso que los Estados Unidos sobrevivan el próximo año."
 usa.150.a: "No se acabó."
 usa.151.t: "Trump se enoja"
 usa.151.d: "Han pasado 10 días desde que el Congreso declaró al presidente electo Joe Biden como el 46º presidente de los Estados Unidos, y el ambiente sigue tan tenso como siempre. En una extensa serie de tuits, el actual presidente Donald Trump sigue afirmando que las elecciones son un \"terrible error\" y que los votos han sido manipulados a favor de los demócratas. Trump también ha declarado repetidamente que los demócratas están socavando 244 años de democracia por su propia causa egoísta y que priorizan sus beneficios sobre la voluntad popular. Trump incluso afirmó que los demócratas no solo usaron las identificaciones de miles de personas fallecidas para obtener más votos, sino que también purgaron miles de votos a favor de los republicanos para ganar estados clave en disputa. A pesar de que la Comisión Electoral Federal, varias administraciones electorales y el propio presidente electo han denunciado estas afirmaciones, el presidente Trump se niega a ceder y ha expresado con firmeza su voluntad de no dimitir. Él mismo declaró en una entrevista reciente que no dimitirá a menos que el Congreso de EE.UU. realice un recuento justo.\n\nLos usuarios de Twitter de ambos partidos siguen participando en acalorados debates que a menudo se descontrolan. Un estudio reciente de una organización independiente revela que el doxing y las amenazas de muerte, solo en Twitter, han aumentado hasta un 35%, y que los moderadores de Twitter solo responden a 7 de cada 20 reportes de doxing. En cuanto a las protestas, tanto la izquierda como la derecha siguen enfrentándose en las calles, con saqueos e incendios provocados que han causado más de mil millones de dólares en daños. Estados Unidos está en llamas y necesitará mucho tiempo para recuperarse."
 usa.151.a: "¡Ríndanse, por el amor a Dios!"
 usa.152.t: "Las FF.AA. se mantienen divididas."
 usa.152.d: "¡Las Fuerzas Armadas no se deciden entre Trump y Biden!"
 usa.152.a: "¡Elijan un jodido bando!"
 usa.153.t: "Guardia Nacional de D.C. se moviliza"
 usa.153.d: "En la madrugada del 20 de enero, antes incluso de que amaneciera, Washington D.C. se convirtió repentinamente en un hervidero de actividad. Humvees recorrieron las calles, se colocaron barricadas en las principales carreteras y accesos a autopistas, y se instalaron misiles antiaéreos en la azotea de edificios de oficinas.\n\nNormalmente, esto no habría llamado mucho la atención. El presidente estaba a punto de asumir la investidura, y en estos tiempos de tensión, era necesaria una seguridad adicional. Pero la administración Trump no tenía previsto realizar una ceremonia de investidura pública, y desde luego no permitió que el equipo de Biden la organizara. Aún más alarmante, nadie en la Casa Blanca había dado la orden de movilizarse. Se ordenó de inmediato a todos los agentes del Servicio Secreto que se presentaran y cerraran el perímetro de la Casa Blanca.\n\nHabía varias razones posibles para que la Guardia se hubiera movilizado. En el mejor de los casos, el general Walker se ha sublevado e intentaba subvertir la autoridad del presidente Trump. Las otras posibilidades son aún peores."
 usa.153.a: "¡Descubran qué están haciendo!"
 usa.154.t: "El disparo que le dio la vuelta al mundo"
 usa.154.d: "La escolta presidencial salió lentamente de la entrada de la Casa Blanca, flanqueada por camionetas blindadas que transportaban agentes del Servicio Secreto armados con ametralladoras. Las calles estaban inquietantemente vacías a pesar de ser pleno día, pues mucha gente se había dado cuenta de lo que estaba sucediendo y, sabiamente, había optado por quedarse en casa.\n\nEn la intersección de la calle 15 y la avenida Constitución había una barricada de divisores de hormigón y sacos de arena, custodiada por soldados de la Guardia Nacional armados. El coche que encabezaba la comitiva pidió órdenes por radio a la limusina presidencial al acercarse a la carretera. ¿La respuesta? \"¡Atropellalos, joder!\".\n\nLa comitiva no frenó, ignorando las órdenes de la Guardia Nacional de detenerse y dar la vuelta. Cuando se acercaron a cien metros, los soldados que se encontraban en su camino abrieron fuego, acribillando al coche que encabezaba la escolta. La comitiva se desvió apresuradamente, desviándose de la carretera y destrozando el césped del parque presidencial mientras huían de regreso a la Casa Blanca. Agentes del Servicio Secreto disparaban desde las ventanillas de sus vehículos. Si los guardias se hubieran fijado bien, habrían vislumbrado brevemente al presidente, mirándolos desde detrás del cristal blindado con un odio desenfrenado en los ojos."
 usa.154.a: "Oh no."
 usa.155.t: "El asedio de la Casa Blanca"
 usa.155.d: "Tras el repentino regreso de la comitiva presidencial a la Casa Blanca, la Guardia Nacional rodeó el edificio y lo rodeó por todos lados. Decenas de francotiradores del Servicio Secreto llenaban cada ventana y punto a lo largo del parapeto, con sus rifles apuntando a los guardias del batallón que se congregaban en las calles. Todos esperaban tensos, preguntándose quién dispararía primero. ¿Asaltaría la Guardia el edificio? ¿Dejarían ir al presidente? ¿Los llamarían finalmente a sus cuarteles?\n\nEl impasse se rompió finalmente horas después con el sonido lejano de helicópteros que se acercaban. Cinco helicópteros Sea King, cada uno pintado con el distintivo verde y blanco del Marine One. Uno aterrizó en el jardín de la Casa Blanca, donde el presidente Trump, Melania, Barron y un pequeño contingente de personal, generales y agentes del Servicio Secreto subieron apresuradamente. Despegó poco después, desapareciendo en el horizonte llevándose toda la tensión que había en Washington. Pero aunque la crisis inmediata se había resuelto, otra de una magnitud mucho mayor se avecinaba..."
 usa.155.a: "¡No se acabó!"
 usa.156.t: "La investidura de Donald Trump"
 usa.156.d: "Donald Trump se encontraba en la sala de mando del Complejo Cheyenne Mountain de NORAD, rodeado de su esposa y un grupo de oficiales militares. No había ninguna Biblia familiar, solo un ejemplar gratuito de Gideon que alguien había encontrado por ahí. El juez Tymkovich, el juez de mayor rango de la zona, fue llamado para oficiar.\n\nPosponiendo la mano sobre la Biblia, Trump repitió el juramento: \"Yo, Donald John Trump, juro solemnemente que ejerceré con fidelidad el cargo de presidente de los Estados Unidos, y, hasta el límite de mi capacidad, preservaré, protegeré y defenderé la Constitución de los Estados Unidos, ¡con la ayuda de Dios!\".\n\nHubo un breve aplauso, y algunos fotógrafos lo registraron para la posteridad, pero no fue una celebración. Todos sabían que, al otro lado del país, Joe Biden se sentaba ilegalmente en la Casa Blanca, prestando el mismo juramento y asumiendo un cargo que no tenía derecho a ocupar. Los próximos meses estaban a punto de volverse muy, muy jodidos."
 usa.156.a: "Ya no hay vuelta atrás..."
 usa.157.t: "La investidura de Joe Biden"
 usa.157.d: "Joe Biden se encontraba en la sala de crisis de la Casa Blanca, flanqueado por Jill, Kamala, congresistas leales y los miembros del Estado Mayor Conjunto que se mantuvieron fieles a América. El juez Roberts, algo conmocionado y aún desconcertado por los acontecimientos de los últimos días, oficiaba la ceremonia improvisada.\n\nPosponiendo la mano sobre la Biblia familiar, Biden repitió el juramento: \"Yo, Joseph Robinette Biden Junior, juro solemnemente que ejerceré con fidelidad el cargo de presidente de los Estados Unidos, y, hasta el límite de mi capacidad, preservaré, protegeré y defenderé la Constitución de los Estados Unidos, ¡con la ayuda de Dios!\"\n\nLa sala resonó en aplausos, mientras los pocos periodistas a los que se les permitió entrar tomaban fotografías de este momento histórico. Pero fue histórico por las razones equivocadas. Al otro lado del país, Donald Trump se refugiaba con elementos traidores del ejército, prestando el mismo juramento y reclamando un cargo que prácticamente había perdido. Estaban a punto de colisionar y ninguno de los dos estaba dispuesto a apartarse del camino."
 usa.157.a: "Ya no hay vuelta atrás..."
 usa.162.t: "Ohio, Pensilvania y Georgia inician recuentos"
 usa.162.d: "Esa mañana, los gobernadores de Georgia, Ohio y Pensilvania anunciaron que iniciarían un recuento tras la solicitud formal de Biden y el Partido Demócrata, alegando que los republicanos habían intentado invalidar votos.\n\nUn representante de la campaña de Biden declaró a la prensa: \"Ha habido una grave falta de conducta por parte de Trump y el Partido Republicano. Se han desechado papeletas, los votos por correo se han considerado inválidos en muchos estados y mucha gente ni siquiera ha recibido sus papeletas. Esto no solo es absurdo, sino también repugnante. El presidente electo Biden estará en la Casa Blanca en enero, y nos aseguraremos de que así sea\".\n\nEsta mañana, el presidente Trump declaró sobre este suceso:\n\"Estos tipos intentan decir que no gané cuando sí lo hice. Y saben que sí, amigos. Los veo, los veo intentando señalar todas estas irregularidades, el fraude electoral y la colusión rusa; todo son tonterías, amigos. Vamos a exponer a estos tipos como mentirosos, ¿de acuerdo?\".\n\nQueda por ver cómo evolucionará la situación, solo podemos esperar que la situación se desescale y que la campaña de Biden conceda pacíficamente la elección."
 usa.162.a: "Los tramposos no prosperan."
 usa.164.t: "¡Biden es nominado candidato demócrata!"
 usa.164.d: "Tras unas primarias muy reñidas, Joseph R. Biden ha conseguido oficialmente los 1991 delegados necesarios y luchará por \"ganar la batalla por el alma de la nación\". Biden, quien fue vicepresidente de Barack Obama, comenzó la campaña de las primarias con vacilaciones en Iowa y Nuevo Hampshire, pero luego regresó con una victoria contundente en Carolina del Sur. El Supermartes fue más polémico, ya que muchos estados se inclinaron a favor del candidato progresista Bernie Sanders.\nBiden declaró: \"Fue un honor competir junto a uno de los grupos de candidatos más talentosos que el Partido Demócrata ha presentado jamás y me enorgullece decir que llegamos a estas elecciones generales como un partido unido\".\nRumores de supresión de votantes y corrupción clandestina rodean su victoria, pero la campaña de Biden los ha negado, para gran disgusto de la campaña de Sanders."
 usa.164.a: "¡Felicidades, Sr. Biden!"
 usa.164.b: "¿Biden? No es quien hubiera elegido yo..."
 usa.165.t: "Se filtran los papeles de Wisconsin"
 usa.165.d: "Esta mañana se publicó un informe impactante de un denunciante anónimo del CND, que destacó cómo la campaña de Biden persuadió a sabiendas al CND para que eliminara del censo a decenas de miles de votantes, en su mayoría personas de color, por delitos tan triviales como un guion mal colocado en un nombre, con el fin de perjudicar a Bernie Sanders. Además, grabaciones filtradas muestran cómo la campaña de Biden presionó a altos funcionarios del CND para que cerraran los centros de votación en zonas con alto apoyo a Sanders con el fin de reducir la participación. Otros archivos muestran cómo la campaña de Biden sobornó a delegados para que cambiaran sus votos en el último minuto y le dieran ventaja. El Partido Demócrata se encuentra conmocionado por esta revelación, mientras los progresistas exigen la descalificación de Biden. La dirección del CND y Biden han denunciado todas las acusaciones como mentiras infundadas y han retado al denunciante a que se presente. Sostienen que Biden seguirá siendo el candidato."
 usa.165.a: "¡Calumnias! ¡Injurias!"
 usa.165.b: "Esto es ridículo..."
 usa.166.t: "Estallan protestas por los papeles de Wisconsin"
 usa.166.d: "En todo el país, izquierdistas y progresistas salieron a las calles a protestar, lo que a menudo derivó en disturbios abiertos por los resultados de las primarias demócratas de 2020 y los nuevos hallazgos sobre la supresión y manipulación del voto a favor del candidato demócrata Joe Biden. En Manhattan, Nueva York, la sede local del Partido Demócrata fue asediada por manifestantes que exigían la renuncia. En Portland, la gobernadora Kate Brown desplegó a la Guardia Nacional para aislar la ciudad mientras las protestas masivas comenzaban a descontrolarse. A pesar de la conmoción, muchos se apresuraron a señalar la inutilidad de protestar, ya que tanto las primarias como las elecciones presidenciales generales habían concluido, con un ganador declarado. Esto ha generado un aumento del pesimismo entre la izquierda americana y una insatisfacción con el electoralismo, que una y otra vez margina a los políticos de izquierda. Una cita notable y muy alegórica de un usuario de Twitter.com resume el estado de ánimo: \"Si así es el electoralismo, entonces estoy harto del electoralismo\"."
 usa.166.a: "¿Cuál es la alternativa?"
 usa.166.b: "¡Muerte a la plutocracia!"
 usa.167.t: "El Dow Jones se desploma 2.000 puntos"
 usa.167.d: "El promedio industrial Dow Jones sufrió su peor caída diaria en puntos, rompiendo récords establecidos a principios de mes, debido a que la guerra de precios del petróleo inquietó a los inversores, ya presas del pánico por la epidemia de coronavirus.\nEl índice de primera línea se acercó a la zona bajista ante el creciente temor a una recesión mundial, desplomándose un récord de 2013,76 puntos, o un 7,8%, para cerrar en 23.851,02. El Nasdaq cayó un 7,3%, hasta los 7.950,68. El índice S&P 500 perdió un 7,6%, para cerrar en 2.746,56, su peor día desde diciembre de 2008, tras desplomarse un 7% en los primeros minutos de la sesión, lo que activó un interruptor automático en la Bolsa de Nueva York que detuvo la negociación durante 15 minutos. El lunes marcó la primera vez que la restricción comercial entró en vigor desde que se implementaron los umbrales actuales en 2013 para evitar que se repitiera la crisis del Lunes Negro de 1987. El precio del crudo West Texas Intermediate se desplomó más de un 25%, hasta los 30,92 dólares por barril, el lunes después de que Rusia rechazara durante el fin de semana una propuesta de la OPEP para recortar la producción mundial de petróleo en hasta 1,5 millones de barriles diarios. Algunos expertos del sector también consideran la restricción al sector energético de EE.UU. como una estratagema intencionada de Putin."
 usa.167.a: "¿¿¿Dios, porqué baja la línea roja???"
 usa.168.t: "Continuan los incendios forestales en la Costa Oeste"
 usa.168.d: "El humo de los incendios forestales, que representa un peligro para la salud de millones, inundó la Costa Oeste el sábado mientras los bomberos luchaban contra los incendios mortales que arrasaron algunas localidades y desplazaron a decenas de miles de personas, la última de una serie de calamidades este año. Para quienes ya padecían la pandemia del coronavirus, las consecuencias económicas resultantes y las tensiones políticas evidentes en las protestas de la Resistencia y las contraprotestas de la ultraderecha, los incendios añadieron una nueva capa de miseria. \"¿Qué sigue? Tenemos las protestas, la pandemia del COVID y ahora los incendios forestales. ¿Qué más puede salir mal?\", se lamentó Danielle Oliver, de 40 años, de Happy Valley, al sureste de Portland.\nEl número de muertos por los incendios en California, Oregón y Washington ascendió a 31 y se esperaba que aumentara drásticamente. La mayoría de las muertes se registraron en California y Oregón. Medio millón de habitantes de Oregón estaban bajo advertencias de evacuación u órdenes de evacuación. Con los niveles de contaminación del aire en máximos históricos, la gente metía toallas debajo de los marcos de las puertas para protegerse del humo. Algunos incluso usaban mascarillas N95 en sus propias casas. Algunas comunidades parecían las ciudades europeas bombardeadas tras la Segunda Guerra Mundial, con edificios reducidos a escombros carbonizados apilados sobre tierra ennegrecida. Los residentes lograron huir al acercarse las llamas o perecieron."
 usa.168.a: "¿California? Más bien Calinfierno."
 usa.169.t: "La otra opción"
 usa.169.d: "Para la mayoría de observadores políticos, 2020 ha sido un año marcado por violencia política extrema y el extremismo. Iniciado por la pandemia del COVID, los efectos de la crisis del petróleo saudita en la economía americana y el movimiento Resistencia, partidos de ultraizquierda como el Partido por el Socialismo y la Libertad (PSL) han visto un crecimiento exponencial. A través del espectro político, un grupo fascista conocido por su propaganda llamativa y el uso de temáticas americanas en su propaganda también ha estado ganando protagonismo en el panorama político. Fundado inicialmente por Thomas Rosseau tras una pelea en el partido supremacista blanco Vanguardia de América, el Frente Patriota ha visto como surgían sucursales por todo el país. Mientras que los valores culturales progresistas de la izquierda ha alejado a numerosos conservadores rurales, el Frente Patriota culpa a los problemas comunes de los americanos a la inmigración, el reemplazo cultural y los valores liberales. Debido a sus valores fascistas clásicos y ultranacionalistas, el Frente Patriota ha afrontado intensos escrutinios e infiltración por agencias de seguridad federal, conocidos comúnmente en círculos extremistas como 'glowies', con muchos agentes intentando ejecutar operaciones honeypot en orden de entorpecer las capacidades operativas y el crecimiento del partido. A pesar de sus mejores esfuerzos, el Frente Patriota sigue planteando una amenaza significativa al valor fundamental de la democracia representativa americana."
 usa.169.a: "¿No puede pasar aquí verdad? ¿VERDAD?"
 usa.170.t: "De la riqueza a la miseria"
 usa.170.d: "Se quedó mirando, con el corazón en un puño y la mandíbula caída al ver el número rojo que brillaba frente a él. El DOW Jones estaba en picada, más bajo que nunca en la historia. Había caído de 30.000 puntos el viernes a 15.000 hoy lunes. Se había desplomado a la mitad. En los primeros cuatro días de la Gran Depresión, había bajado un 25%. En este día histórico, tardó solo dos días en caer un 50%. Ahora, se enfrentaba a la posibilidad de tener decenas de millones en deudas tras un solo fin de semana. Badwater Trusts Company ya no era nada. Todo el trabajo de su vida, desaparecido en un abrir y cerrar de ojos. De ser un chico pobre de New Haven a convertirse en la encarnación del lobo de Wall Street, y ahora, de vuelta a la nada.\n\nCaminó desde su mansión de 88 millones de dólares con vista al Hudson, luciendo un traje perfectamente ajustado, y condujo su Lamborghini por la Henry Hudson Parkway hasta su imponente oficina en el corazón de Manhattan. Ni siquiera se preocupó por aparcar bien, simplemente entró. Todos los empleados que se cruzaron en su camino lo miraban con asombro, al jefe. Desde el conserje hasta el vicepresidente de la junta, todos estarían sin trabajo en una semana. Entró en el ascensor y usó su tarjeta especial para subir a la azotea, donde el ascenso se sintió como el más largo de su vida. No pasó mucho tiempo antes de que estuviera en la azotea, contemplando la imponente silueta de los rascacielos a su alrededor, con el mar a lo lejos. El clima de hoy era apropiadamente nublado y sombrío. Se acercó al borde de la azotea y miró hacia el horizonte. Rezó a Dios por primera vez en décadas, con la esperanza de cruzar las puertas del Cielo por su pecado mortal de codicia aparentemente infinita. Se armó de valor, se ajustó la corbata..."
 usa.170.a: "...y se lanzó a la ráfaga gélida."
 usa.171.t: "Masacre de Berkeley"
 usa.171.d: "Hoy temprano se escucharon disparos en el campus de la UC Berkeley, mientras unidades de la Guardia Nacional se enfrentaban a manifestantes estudiantiles. Las versiones sobre lo sucedido varían enormemente: la Guardia Nacional afirma que primero se lanzaron piedras a los soldados, mientras que los activistas estudiantiles afirman que los soldados dispararon primero. Con fotos compartidas en redes sociales que evocan las mismas imágenes de la Masacre de la Universidad Estatal de Kent, ocurrida más de 50 años atrás, el país se horroriza al ver imágenes de los cuerpos sin vida de los estudiantes desangrándose sobre el pavimento. Se celebraron vigilias con velas al anochecer, mientras las familias de las víctimas exigían justicia y rendición de cuentas tanto a la Administración Trump como a la Guardia Nacional. La tragedia ha suscitado una condena generalizada tanto de la derecha como de la izquierda y del centro.\n\nLa administración Trump aún no ha emitido un comunicado de prensa."
 usa.171.a: "Horrible..."
 usa.172.t: "¡Barbara Lee se une al PSL!"
 usa.172.d: "La veterana demócrata y congresista afroamericana, Barbara Lee, abandonó el Partido Demócrata tras la publicación de los impactantes papeles de Wisconsin. Citando un problema de larga data con la alta dirección y el \"estancado establishment político\", la congresista Lee declaró que \"el esfuerzo concentrado del Partido Demócrata por suprimir las voces negras es inmanejable\". La congresista Lee ha optado por unirse al Partido Socialismo y Libertad, lo que, según ella, allanará el camino para romper el duopolio bipartidista y traer la libertad a quienes sufren la tiranía del régimen americano."
 usa.172.a: "¡La ultraizquierda revela su verdadera cara!"
 usa.172.b: "Un peso muerto menos."
 usa.173.t: "Marcha del Frente Patriota en Filadelfia"
 usa.173.d: "La policía afirma que decenas de miembros de un grupo descrito por la ADL como supremacista blanco marcharon en Filadelfia durante el fin de semana, chocando con peatones y detonando lo que se cree que fueron bombas de humo en un momento dado.\n\nEl grupo de miembros del Frente Patriota, estimado en 450 a 500 personas, marchó varias manzanas en el centro de la ciudad el sábado por la noche, vistiendo pantalones color canela y camisas negras, con mascarillas, escudos y banderas. La policía indicó que coreaban lemas como \"Reclamar América\" y \"Muerte al Estado Sionista\". La policía indicó que los peatones \"intercambiaron palabras con los miembros del grupo\" y que hubo varios enfrentamientos físicos. Finalmente, alguien del grupo usó lo que la policía cree que fueron bombas de humo \"para cubrir su retirada mientras huían\", según la policía. Varios transeúntes comenzaron a gritarle al grupo y a golpear camiones mientras subían a sus vehículos y se marchaban. La policía no anunció arrestos y afirmó que no hubo reportes de daños ni heridos durante la marcha."
 usa.173.a: "Preocupante."
 usa.174.t: "El Frente Patriota se enfrenta a la Resistencia"
 usa.174.d: "Las protestas de grupos rivales de ultraderecha y ultraizquierda en Richmond derivaron en violencia, con enfrentamientos entre los bandos opuestos y al menos un hombre arrestado por disparar contra los manifestantes. Nadie resultó herido en el tiroteo, y para la noche del domingo no se sabía nada de heridos en otras numerosas escaramuzas en las que los bandos opuestos se enfrentaron, rociándose con lo que parecía ser gas antiosos y rompiendo las ventanillas de los coches de los rivales."
 usa.174.a: "Descendemos a la anarquía..."
 usa.176.t: "El MNS recluta en prisiones"
 usa.176.d: "El infame grupo neonazi \"Movimiento Nacionalsocialista\" ha experimentado un sorprendente aumento de miembros tras la creciente inestabilidad política. Conocido por sus mítines y protestas públicas vestidos con uniformes de estilo nazi, su membresía se había reducido previamente a unas dos docenas de miembros. A pesar de ello, el \"Movimiento Nacionalsocialista\" ha estado intentando colaborar con bandas carcelarias nacionalistas blancas en todo el país, y se ha visto a su líder, Burt Colucci, visitando a varios líderes pandilleros de alto perfil. Si bien el grupo se mantiene relativamente marginal, es una clara señal de que el clima político americano se está volviendo cada día más extremo."
 usa.176.a: "Vaya panda de larperos."
 usa.177.t: "Marcha del Frente Patriota en Washington"
 usa.177.d: "Cientos de miembros del grupo nacionalista blanco Frente Patriota marcharon por la Explanada Nacional esta noche. El grupo vestía uniforme de caquis, chaquetas azules y gorras color canela. Sus rostros estaban cubiertos por gafas de sol y mascarillas blancas que les cubrían la nariz y la boca. Algunos portaban banderas americanas, otros una pancarta que decía \"Reclamar América\". Quienes se encontraban en los flancos exteriores de la procesión llevaban escudos.\n\nEl grupo marchó desde el Monumento a Lincoln por la Explanada Nacional hacia el Capitolio. Más tarde, terminaron cerca del Puente Memorial de Arlington, según The Daily Beast, y algunos aparentemente se quedaron varados temporalmente al no caber todos en sus camionetas de mudanzas alquiladas."
 usa.177.a: "Preocupante."
 usa.178.t: "Se forma el Ejército Popular de Liberación Americano"
 usa.178.d: "Tras la devastadora publicación de los papeles de Wisconsin, el Partido del Socialismo y Liberación (PSL) anunció la formación de las \"Fuerzas de Autodefensa Comunitarias\", organizadas en lo que ahora se conoce como el Ejército Popular de Liberación Americano (EPLA). Ante la creciente desconfianza en el sistema electoral americano tras los papeles de Wisconsin y las posteriores sentencias judiciales, así como las consecuencias económicas y la continua incapacidad del liderazgo de Washington para abordar incluso los problemas más básicos, como la atención médica, miles de personas fueron vistas entrenando con el EPLA a lo largo de la Costa Oeste. Si bien el EPLA se ha registrado oficialmente como una milicia sin otro objetivo violento que la autodefensa, sus oponentes lo han calificado de flagrante grupo insurreccional."
 usa.178.a: "Un rojo amanecer."
 usa.179.t: "Juez dictamina que el CND puede elegir candidatos a escondidas"
 usa.179.d: "Se publicó la transcripción de la audiencia más reciente en un tribunal federal en Fort Lauderdale, Florida, sobre la demanda interpuesta en nombre de los partidarios de Bernie Sanders contra el Comité Nacional Demócrata (CND) y la expresidenta del CND, Debbie Wasserman Schultz, por manipular las primarias demócratas a favor de Joseph Biden. Poco después de iniciada la audiencia, los abogados del CND alegaron que el Artículo V, Sección 4 de la Carta del CND, que estipula que el presidente del CND y su personal deben garantizar la neutralidad en las primarias presidenciales demócratas, es \"una norma discrecional que, para empezar, no era necesario adoptar\". Con base en esta premisa, los abogados del CND afirman que el tribunal no puede interpretar, reclamar ni decidir sobre nada relacionado con la neutralidad del CND en sus primarias presidenciales. Los abogados que representan al CND han argumentado previamente que los partidarios de Sanders sabían que las primarias estaban manipuladas, anulando así cualquier posible responsabilidad del CND. En la última audiencia, insistieron en este argumento: \"El Tribunal tendría que determinar que quienes apoyaron fervientemente a Bernie Sanders y que supuestamente desconocían este favoritismo no habrían dado su apoyo al Sr. Sanders, al senador Sanders, de haber sabido de la existencia de dicho favoritismo\".\n\nMás adelante en la audiencia, los abogados del CND afirman que el CND estaría en su derecho de \"ir a las trastiendas, como antes, a fumar puros y elegir al candidato de esa manera\". Al insistir en este argumento a lo largo de los procedimientos de esta demanda colectiva, el CND les está diciendo a los votantes en un tribunal que no ven ninguna obligación exigible en tener que celebrar unas elecciones primarias justas e imparciales. Los abogados del CND incluso llegan a argumentar que los términos \"imparcial\", utilizados en la Carta del CND, no pueden ser interpretados por un tribunal. El juez finalizó la audiencia declarando a ambas partes que emitiría una orden escrita sobre la moción del CND de desestimar la demanda."
 usa.179.a: "Democracy Dies in Darkness."
 usa.180.t: "Bill DeBlasio es asesinado"
 usa.180.d: "En el último episodio del caos político y la inestabilidad en Estados Unidos, el alcalde de Nueva York y excandidato a las primarias demócratas, Bill DeBlasio, fue asesinado a tiros por un agresor desconocido vestido de negro, quien gritó \"¡Muerte al Estado Americano!\" antes de desaparecer poco después del tiroteo. Si bien el Departamento de Policía de Nueva York ha iniciado una búsqueda a nivel estatal, hay muy pocas esperanzas de que el agresor sea capturado. Mientras tanto, se especula masivamente sobre la motivación del tirador. Debido a la impopularidad general de DeBlasio, se han señalado a todos los implicados. La izquierda afirma que el grupo Frente Patriota cometió el ataque, citando recientes operaciones del Frente Patriota en el área de Nueva Inglaterra y sus alrededores. Por otro lado, la derecha ha señalado a Antifa, alegando que el lema \"Muerte al Estado Americano\" suena extremadamente anarquista. Sin embargo, algunos grupos de ultraizquierda culpan a la División Atomwaffen, afirmando que solo un grupo tan desquiciado como ellos llegaría al extremo de asesinar a un político importante. Finalmente, deberíamos atribuir la culpa a..."
 usa.180.a: "...Antifa."
 usa.180.b: "...el Frente Patriota."
 usa.180.c: "...la División Atomwaffen."
 usa.181.t: "Anarquistas de Green Mountain reforman el Colectivo"
 usa.181.d: "El Colectivo Anarquista de Green Mountain fue fundado por David van Deusen, Xavier Massot, Johnny Midnight y Natasha Voline. Esta primera generación del colectivo se formó poco después de las protestas de la OMC en Seattle en 1999 y estuvo profundamente influenciada por la Internacional Situacionista, la historia anticolonial militante de Vermont y el socialismo libertario. Trabajando frecuentemente con el Centro de Trabajadores de Vermont, organizaciones sindicales y organizaciones de masas, el GMAC priorizó proyectos que fortalecieran la expresión de la democracia directa mediante la creación de contrainstituciones de base.\n\nAunque se disolvió en 2005, tras la reciente agitación, el exlíder David van Deusen anunció que el colectivo se reorganizaría en el norte de Vermont, relanzaría su antiguo periódico Catamount Tavern News y comenzaría campos de entrenamiento para la \"autodefensa contra la amenaza fascista\"."
 usa.181.a: "¿Anarquistas? ¿Aquí? Absurdo."
 usa.182.t: "La FCC retira a medios de derecha"
 usa.182.d: "En una medida predecible pero a la vez inesperada, la Comisión Federal de Comunicaciones ha retirado por completo la transmisión activa de numerosos medios de comunicación de derecha, como Fox News, Newsmax y One America News Network. En varios estados del país, estos medios son prácticamente inaccesibles desde los principales servicios de televisión, lo que ya ha generado indignación entre los televidentes de derecha en redes sociales. Estas acciones se han citado como una contramedida contra lo que la FCC ha denominado \"difusión maliciosa de desinformación sobre el resultado electoral\" por parte de estos medios, quienes se han mostrado abiertamente pro-Trump en una retórica que muchos demócratas consideran propaganda antagónica.\n\nA pesar de la clara instrucción de la Comisión de implementar esta retirada a nivel nacional, parece que dicho deseo no se está cumpliendo. Parece que la prohibición solo se está aplicando realmente en los estados que apoyan en mayor o menor medida a la administración Biden, mientras que los estados pro-Trump la cuestionan, ignoran la exigencia o se niegan rotundamente a aplicar la restricción. Sin embargo, este giro de los acontecimientos no hace nada para reparar la clara y obvia división entre Cheyenne y Washington."
 usa.182.a: "¡Intentan silenciarnos!"
 usa.182.b: "¡No pueden desinformar y salirse con la suya!"
 usa.183.t: "Trump baneado de redes sociales"
 usa.183.d: "Hoy, se ha producido una eliminación masiva de cuentas y usuarios de redes sociales en todo el país, en diversos sitios, como Instagram, Facebook, YouTube y, sobre todo en el caso del presidente Donald Trump, Twitter. La \"banwave\", como muchos la denominan, ha provocado la eliminación de miles de cuentas, siendo la más destacada la de la propia Trump, dejándolo sin un canal adecuado para dirigirse a sus partidarios. Debido a la constante indignación y al discurso caótico y generalizado en la mayoría de las plataformas de redes sociales durante los últimos meses en relación con la situación política actual, estas oleadas de eliminaciones no son del todo inesperadas, ya que las empresas matrices de estos sitios web han publicado comunicados oficiales que citan sus directrices sobre, por así decirlo, \"información falsa y retórica violenta\".\n\nSin embargo, es evidente que estas decisiones no se tomaron sin un estímulo externo. La campaña de Biden sin duda ha ejercido presión sobre varias grandes empresas tecnológicas con la intención de perjudicar la campaña de Trump a la presidencia de Estados Unidos. Independientemente de si algunos consideran esta medida draconiana o no, en el fondo hará las cosas mucho más difíciles para los oponentes de la campaña de Biden."
 usa.183.a: "¡No hay qué permitirles hablar más!"
 usa.183.b: "¡Nos están censurando!"
 usa.184.t: "Intento de asesinato a Tucker Carlson"
 usa.184.d: "El pánico y el caos estallaron hoy en la sede de Fox News en la ciudad de Nueva York, cuando el conocido comentarista político de derecha y presentador de programas de entrevistas, Tucker Carlson, fue blanco de un atentado esta tarde.\n\nRelatos de testigos y grabaciones de seguridad han capturado imágenes desgarradoras del presunto asesino, identificado como Louis Hall, de 24 años, sacando una pistola y acercándose rápidamente a Carlson al entrar en el edificio. Afortunadamente, el arma pareció atascarse inicialmente al apretar el gatillo de Hall, lo que provocó un forcejeo mientras los miembros de seguridad se apresuraban a detener al sospechoso. El arma se disparó dos veces durante el forcejeo, sin causar heridos, ya que ambos disparos se alojaron en el techo del vestíbulo, y Hall fue rápidamente puesto bajo custodia.\n\nCarlson abordó el incidente en la siguiente transmisión, agradeciendo al personal de seguridad su rápida respuesta y expresando su agradecimiento por estar vivo y bien. El presentador del programa continuó con un segmento sobre la desestabilización del país en los últimos meses, en gran parte debido a quienes describió como \"elementos radicales envalentonados que buscan subvertir el estilo de vida de América por cualquier medio\".\n\nNo hace falta decir que un atentado tan impactante contra la vida de una figura mediática tan conocida no ha contribuido en absoluto a calmar los temores y las tensiones polarizantes en el país. Ya se ha generado una gran cantidad de comentarios en internet sobre el incidente en redes sociales, con muchas personas condenando el ataque y otras lamentando la mala puntería de Hall y sus deficientes técnicas de mantenimiento de armas."
 usa.184.a: "Gracias a Dios que está vivo; ¡hay qué detener a estos radicales!"
 usa.185.t: "Bomba desactivada en el CNN Center"
 usa.185.d: "Una escena aterradora y tensa se vivió hoy en Atlanta. La policía y los agentes de desactivación de bombas se congregaron en el CNN Center tras recibir informes de un artefacto explosivo improvisado desde la sede de la cadena.\n\nAfortunadamente, tras ser interceptados por el personal antes de que el artefacto pudiera activarse, se notificó de inmediato a las fuerzas del orden y el edificio fue evacuado rápidamente por razones obvias de seguridad. El artefacto, una \"bomba postal\" según las autoridades, habría pasado desapercibido hasta su llegada a la sede de la cadena; sin duda, un intento de atacar a los productores. Gracias a la rápida respuesta y a la cuidadosa desactivación, la policía logró desactivar el artefacto, controlando el incidente sin víctimas ni daños.\n\nActualmente, miembros del Buró Federal de Investigaciones están llevando a cabo una amplia investigación, pero no creen que un incidente de este tipo sea un caso aislado. En los últimos meses se ha observado un aumento de la violencia con motivos políticos, en gran parte debido a la actual crisis política que asola gran parte del país. Aunque este incidente en particular se ha evitado, pocos son tan ingenuos como para pensar que será el último de este tipo."
 usa.185.a: "Un acto despreciable de terrorismo."
 usa.186.t: "Electora infiel mainesa es asesinada"
 usa.186.d: "El estado de Maine ha entrado en un período de luto, tras el fallecimiento de la representante Shannon Woodings, quien, según se informa, falleció esta mañana a causa de sus heridas tras un allanamiento a su domicilio en Camden.\n\nWoodings había recibido una considerable atención mediática tras su sorprendente gestión como la electora infiel más prominente de Maine, tras negarse a adherirse al voto mayoritario de su región para la candidatura presidencial de Joe Biden, en particular, cediendo el escaño a la candidatura de Donald Trump, alegando \"preocupaciones sobre la validez\" del proceso electoral. Esta medida, aunque obviamente extremadamente controvertida (más aún debido a la reciente legalización de los electores infieles en Maine), tuvo sus consecuencias: los republicanos la elogiaron como una política respetable con la integridad necesaria para reconocer unas elecciones falsificadas, mientras que los demócratas la criticaron como una tránsfuga antidemocrática que estaba subvirtiendo activamente la voluntad del voto popular de su región.\n\nDesafortunadamente para Woodings, su decisión, ciertamente impopular, de cruzar el umbral de la fama le había acarreado numerosos enemigos. Esto quedó trágicamente claro anoche, cuando un individuo aún no identificado se acercó a su casa alrededor de las 9:30 p. m., tocó el timbre y disparó cuatro veces contra la puerta mientras ella se acercaba, alcanzando a la representante dos veces y hiriéndola mortalmente. Aunque el sospechoso sigue prófugo, las autoridades han declarado que es probable que pronto surja una pista debido al asesinato fortuito e inexperto."
 usa.186.a: "Qué tragedia."
 usa.187.t: "Funcionario electoral apuñalado en Arizona"
 usa.187.d: "Una escena preocupante se ha desatado hoy en Phoenix, donde el funcionario electoral Roland Cooke, de 41 años, se convirtió en la inesperada víctima de un ataque homicida, que muchos afirman haber tenido motivaciones políticas.\n\nEl Sr. Cooke trabajó durante muchas semanas antes de las recientes elecciones como funcionario electoral, ofreciéndose como voluntario para garantizar que el proceso democrático se desarrollara de forma correcta y eficiente. Debido a la naturaleza ampliamente controvertida de estas elecciones, así como a la terrible polarización de la población en general, las amenazas y el acoso contra quienes cuentan los votos se han vuelto cada vez más comunes en los últimos meses, incluso después de que las elecciones supuestamente hubieran concluido. Sin embargo, en el caso de Cooke, las amenazas nunca se han manifestado, hasta hoy.\n\nDurante su trayecto diario al supermercado local, Roger Allenwood, de 36 años, se acercó a Cooke y, al parecer, le preguntó si él era el Roland Cooke que buscaba. Cuando Cooke respondió que sí, Allenwood sacó un cuchillo de combate de su chaqueta y se abalanzó sobre el funcionario electoral. Cooke fue apuñalado en la mano izquierda y la parte superior del brazo antes de que Allenwood huyera del lugar, siendo detenido al menos una hora después gracias a que testigos captaron la matrícula de la camioneta en la que huyó. Allenwood, un firme partidario de Trump durante las elecciones, había declarado repetidamente en redes sociales que los trabajadores electorales estaban manipulando el voto, una afirmación que aún es muy cuestionada.\n\nLa creciente tensión y el descontento con las elecciones no han hecho más que agravarse debido a la crisis que se desarrolla ante nuestros ojos, y esta no es la excepción. Un intento tan repentino y descarado de asesinar a alguien que solo deseaba que se llevara a cabo el proceso democrático ha suscitado una profunda preocupación por futuros ataques."
 usa.187.a: "Conducta bárbara."
 usa.188.t: "Masacre de Cross City"
 usa.188.d: "Esta mañana, alrededor de las 4:00 de la madrugada, los residentes de Cross City, Florida, se encontraron con el espantoso sonido de una batalla frente a sus hogares. Los habitantes del pueblo despertaron sobresaltados mientras los disparos los rodeaban en una avalancha aparentemente interminable, lo que provocó que muchos se escondieran aterrorizados, mientras que otros salieron valientemente a sus porches para ver qué ocurría, a pesar de que sus investigaciones improvisadas se vieron interrumpidas por el peligro inminente. Se escucharon gritos de dolor y terror desde la comisaría cercana, mientras se hacían frenéticos llamados de refuerzos, además de que los propios residentes marcaban al 911. El tiroteo duró unos 34 minutos y finalmente se calmó cuando los espectadores, avergonzados, observaron a hombres fuertemente armados saliendo de la Oficina del Sheriff del Condado de Dixie. Después, solo se oyeron algunos disparos.\n\nMientras los hombres, entonces no identificados y supuestamente con máscaras de calavera, salían de la estación ensangrentados y supuestamente victoriosos, los pocos valientes que se atrevieron a mirar por las ventanas vieron al grupo armado que sacaba cadáveres de la estación, poniéndose a trabajar en lo que más tarde aterrorizaría a la población del pequeño pueblo de Florida. Al amanecer, el grupo se dispersó casi tan rápido como había llegado, dejando a los residentes salir lentamente de sus casas, acercándose con cautela a los monumentos mórbidos que el grupo les había dejado para que contemplaran. Con ellos, encontraron agujeros de bala y casquillos esparcidos por todas partes. Su pueblo ya no era su hogar; parecía un testimonio de lo que vendría.\n\nEncima de todo, estaban los cuerpos de las fuerzas del orden locales, colgados, ensangrentados y estériles, de farolas y cualquier otro objeto donde pudieran colgarse. Letreros y textos adornaban sus cuerpos, aún uniformados, con frases como \"VENDÍ A MI COMPAÑERO POR UN SUELDO\" y \"SOY UN TRAIDOR EN UNIFORME\". Mientras refuerzos policiales fuertemente armados registraban la estación ensangrentada, constataron la desaparición de un vehículo blindado policial, además de la mayor parte del arsenal de la estación.\n\nLos testimonios de testigos han llevado a las autoridades a creer que se trata de la supuestamente disuelta \"División Atomwaffen\". Se espera que el gobernador Ron DeSantis emita un comunicado de emergencia hoy mismo."
 usa.188.a: "Madre de Dios, ¡qué alguien ENCUENTRE a estos lunáticos!"
 usa.188.b: "¡Esto no puede estar pasando!"
 usa.189.t: "Bomba estalla en la Bolsa de Nueva York"
 usa.189.d: "Esta mañana, tras meses de terror y violencia sin precedentes en la Gran Manzana desde el 11-S, la situación ha alcanzado un nuevo récord. La Bolsa de Nueva York fue atacada alrededor de las 10:30, una hora después de que sonara la campana de apertura, cuando una bomba explotó en el parqué. Los informes sugieren que hasta 27 personas murieron, incluyendo 3 de los 4 perpetradores. Entre los muertos se encontraban directores ejecutivos, periodistas, comerciantes, policías y personal de seguridad. Aproximadamente 2 minutos después del atentado, 4 hombres armados irrumpieron en el parqué y comenzaron a disparar. Poco después, la policía y el personal de seguridad apostados en la bolsa comenzaron a intercambiar disparos, resultando en la muerte de 3 perpetradores, incluyendo 2 guardias de seguridad y 1 policía.\n\nEl jefe de policía de la ciudad de Nueva York, Dermot Shea, anunció esta tarde una búsqueda y captura a nivel estatal con un toque de queda que entrará en vigor a las 19:00, junto con el anuncio de la movilización de la guardia nacional estatal. Los gobernadores de Nueva Jersey y Connecticut anunciaron medidas similares. Las autoridades aún no han comentado sobre los motivos ni el propósito del ataque. Sin embargo, describieron al sospechoso superviviente como un hombre blanco, calvo y musculoso de unos 35 años. Los testigos describen al hombre que dirigía a los demás asaltantes, quien también portaba una máscara metálica con un modificador de voz. Además de las organizaciones habituales de ultraderecha e izquierda a las que se culpa de estos ataques, otras teorías afirman que fueron perpetrados por operadores descontentos que se quedaron atrás en la reciente \"apretón de posiciones cortas\" y la suspensión de operaciones de GameStop. El presidente de la SEC, Jay Clayton, anunció el cierre de la bolsa por un tiempo indeterminado en memoria de los fallecidos. El presidente de la Reserva Federal, Jerome Powell, se negó a hacer comentarios sobre los posibles efectos de esto en la economía. Entre los fallecidos se encontraban el presentador de la CNBC, James \"Jim\" Cramer; la directora ejecutiva de ARK Invest, Catherine Wood; y el famoso operador Peter Tuchman."
 usa.189.a: "¿Se encendió el fuego?"
 usa.202.t: "Se dispara la pobreza"
 usa.202.d: "Han pasado algunas semanas desde el inicio de la crisis del petróleo, pero la situación económica de Estados Unidos se ve cada vez más sombría. La escasez masiva de petróleo ha provocado enormes colas en todas las gasolineras, y cada día más negocios cierran debido a la menor confianza empresarial y los menores ingresos. Con los economistas prediciendo que Estados Unidos podría estar encaminándose hacia una depresión similar a la de la crisis del petróleo de los años 70, la venta masiva de activos, sumada a la disparada demanda de oro a máximos sin precedentes, refleja el miedo que ha calado hondo en todos los hogares americanos. Los informes muestran que, debido al desempleo, la disminución de los ingresos familiares y la inflación, se prevé que la tasa de pobreza en Estados Unidos aumente al 22%, cifras no vistas desde 1959.\n\nLa reacción política ha sido bastante extrema, ya que el candidato presidencial Joe Biden ha denunciado una vez más a Trump por sus políticas energéticas insostenibles y su excesiva dependencia del petróleo, mientras que el presidente Trump ha culpado a los demócratas por su oposición a políticas orientadas a la oferta, como el fracking, que están destruyendo la industria energética nacional. En los extremos, el Frente Patriota volvió a estar en el centro de atención al atraer multitudes masivas en una polémica marcha en Boston. Ataviados con chaquetas azules, pantalones caqui, gafas de sol y sombreros color canela, sus provocativas pancartas que culpaban al globalismo han atraído a muchos republicanos descontentos a sus filas. Mientras tanto, organizaciones de ultraizquierda como el Partido por el Socialismo y la Liberación han organizado manifestaciones que evocan el sentimiento populista expresado en las protestas de Occupy Wall Street, culpando a la avaricia del sistema capitalista de la economía. A pesar de décadas de arraigado sentimiento anticomunista en Estados Unidos, parece que su número de afiliados también se está disparando.\n\nMientras el extremismo y la pobreza se apoderan de Estados Unidos, muchos temen que lo peor esté por venir."
 usa.202.a: "Esto recién empieza."
 usa.203.t: "Trump despide al secretario de Defensa"
 usa.203.d: "En un tuit que dejó atónitos a muchos, Donald Trump escribió que el secretario de Defensa, Mark Esper, había sido \"despedido\" y que sería reemplazado por Christopher C. Miller, director del Centro Nacional Antiterrorista. Fuentes afirman que Esper ya tenía lista su carta de renuncia, ya que Trump amenazó con despedirlo en junio por un desacuerdo sobre el uso de tropas en servicio activo para sofocar las protestas callejeras, y la había actualizado recientemente.\n\nTras quedar claro que Trump estaba listo para despedirlo, Esper mantuvo un perfil bajo, hablando rara vez con la prensa, realizando viajes a África e India y apareciendo en las últimas semanas ante centros de investigación aliados, donde rara vez se le planteaban preguntas difíciles.\n\nEsper es el exsecretario del Ejército y ejecutivo de Raytheon que asumió el cargo en julio del año pasado de manos del general retirado de la Marina Jim Mattis, quien renunció abruptamente debido a los esfuerzos de Trump por reducir rápidamente las tropas en Siria. Esper se había ganado el apodo despectivo de \"Yesper\" por aparentemente consentir o guardar silencio ante las decisiones impulsivas del presidente. Las medidas iban desde reducir las tropas de EE.UU. en Afganistán y Siria con poca o ninguna deliberación hasta detener los esfuerzos del Pentágono para cambiar el nombre de las bases militares que llevan el nombre de generales confederados."
 usa.203.a: "Noticias preocupantes."
 usa.204.t: "El FBI allana un bastión de ultraderecha"
 usa.204.d: "En medio del extremismo político tras la crisis del petróleo y la pandemia de COVID-19, los informes de actividad de ultraderecha y supremacistas blancos han aumentado exponencialmente. Como parte de los esfuerzos para combatir el extremismo interno, el FBI realizó una redada en un bastión de supremacistas blancos en Raleigh, Carolina del Norte.\n\nA las 2:00 a. m. EST, agentes federales irrumpieron en el complejo del conocido líder de la milicia local y supremacista blanco Gary Burns y descubrieron una gran cantidad de armas modificadas ilegalmente, así como artefactos explosivos improvisados. En un enfrentamiento que duró cuatro horas, las fuerzas federales y los grupos de milicianos intercambiaron disparos, lo que resultó en la muerte de 14 milicianos y 3 agentes federales. Burns fue arrestado bajo los cargos de posesión de armas de fuego ilegales, fabricación y posesión de materiales explosivos y asesinato en primer grado. Su juicio está programado para comenzar en 2023.\n\nA pesar de los cargos, la tendencia en línea #RememberRaleigh se ha vuelto viral, especialmente entre miembros de la ultraderecha. El movimiento #RememberRaleigh acusa al gobierno federal de tiranía y de violar los derechos de la Segunda Enmienda del Sr. Burns. En un clima político cada vez más polarizado, el incidente de Raleigh solo añade más leña al fuego."
 usa.204.a: "¡El país se cae a pedazos!"
 usa.205.t: "Enfrentamientos en Illinois"
 usa.205.d: "En el contexto de las reñidas elecciones de 2020, las milicias leales a Donald Trump se han negado a reconocer a la administración Biden y se han enfrentado durante días al FBI. Afirmando que Joe Biden era un tirano y un socialista que quería destruir a América, la milicia independiente de Illinois patrulló la carretera, intentando interrumpir el movimiento de las Fuerzas Federales por Illinois.\n\nCuando la Guardia Nacional de Illinois, bajo la dirección del gobernador J. B. Pritzker, llegó para retirar a la milicia de la carretera, esta abrió fuego y se enfrentó a la Guardia Nacional de Illinois. Aunque se vieron rápidamente superados por la ventaja numérica de la Guardia Nacional de Illinois, lograron abatir a 16 guardias antes de finalmente deponer las armas.\n\nMientras que Joe Biden ha condenado el ataque como un violento intento de insurrección, Donald Trump ha defendido a la milicia, afirmando que simplemente estaban ejerciendo sus derechos amparados por la Segunda Enmienda para formar una milicia. Mientras continúa el debate nacional sobre la organización de las milicias y las elecciones, está claro que el país sigue más dividido que nunca."
 usa.205.a: "El país arde."
 usa.206.t: "Trump declara el estado de emergencia"
 usa.206.d: "Tras los violentos disturbios que estallaron tras la confirmación de Donald Trump como vencedor de las elecciones nacionales de 2020, el presidente Trump declaró el estado de emergencia. Mientras varias ciudades arden, Trump declaró que \"los izquierdistas radicales que quieran darle las elecciones a Joe el Dormilón\" serán reprimidos con toda la fuerza necesaria.\n\nAl igual que en las protestas en Portland tras la muerte de Quinton Evans, se observaron camionetas negras sin distintivos retirando a los manifestantes de la calle. Al ser interrogado el Departamento de Justicia al respecto, este declaró que formaba parte de una iniciativa antiterrorista para frenar el terrorismo de la izquierda radical que ha azotado al país últimamente. Si bien quienes se oponen a la declaración la han tildado de dictatorial y autoritaria, los partidarios del presidente Trump han afirmado que estas medidas son necesarias para detener el terrorismo interno y restablecer el orden en el país."
 usa.206.a: "¿Cuándo volverá la normalidad?"
 usa.207.t: "Biden declara el estado de emergencia"
 usa.207.d: "Tras una serie de ataques de milicianos ocurridos tras la confirmación de Joe Biden como el 46º presidente de los Estados Unidos, la administración Biden declaró el estado de emergencia. Biden declaró que los \"extremistas radicales de derecha serán reprimidos con toda la fuerza necesaria y representan una amenaza existencial para los Estados Unidos\".\n\nTras el decreto, el número de redadas federales contra milicianos aumentó considerablemente. Los enfrentamientos entre fuerzas federales y milicianos se incrementaron exponencialmente a medida que las agencias federales intentaban reprimir la militancia de la derecha. Al ser interrogado el FBI al respecto, defendió la reciente iniciativa como necesaria para evitar que los radicales anularan las elecciones. Si bien quienes se oponen a la declaración la han tildado de dictatorial y autoritaria, los partidarios del presidente Biden han afirmado que estas medidas son necesarias para frenar el terrorismo interno y restablecer el orden en el país."
 usa.207.a: "¿Cuándo volverá la normalidad?"
 usa.208.t: "Milicianos toman Springfield, Misuri"
 usa.208.d: "El país se acerca cada vez más a una guerra civil tras el anuncio de una milicia misuriana de la captura de Springfield. La milicia declaró que, a pesar del estado de las elecciones de 2020, el Partido Demócrata estaba intentando un golpe de Estado y que Donald Trump era el legítimo vencedor. Para evitar un baño de sangre como el ocurrido en otros estados, el gobernador de Missouri ordenó a las tropas que no intervinieran y se retiraran de la ciudad.\n\nTras la captura de la ciudad, la milicia declaró que, hasta que Donald Trump fuera declarado presidente indiscutible de los Estados Unidos, la ciudad permanecería bajo la ley marcial. Con la esperanza de inspirar a otras milicias en otros estados a hacer lo mismo, el líder de la milicia, Jared Abrams, hizo un llamado a los \"patriotas a luchar como sus ancestros, para derrocar la tiranía y restaurar la justicia en esta gran tierra\".\n\nSi bien el gobierno de Biden aún no se ha pronunciado al respecto, es evidente que ya no hay vuelta atrás. Mientras hermanos se enfrentan, una mortífera guerra civil parece casi inevitable."
 usa.208.a: "¿Qué hemos hecho?"
 usa.209.t: "Estados del Medio Oeste declaran a Biden ilegítimo"
 usa.209.d: "Hay muchas obras de ficción que narran la historia de una América profundamente dividida: un lugar que antaño fue un glorioso faro de democracia vio extinguida la antorcha de la libertad. La apariencia de orden y estabilidad social se erosionó; las ciudades quedaron en llamas, ahogadas por oleadas de violencia e ira.\n\nY entonces llegaron unas elecciones polémicas. Cuando la ficción se convirtió en realidad.\n\nEn tan solo tres horas, los estados del Medio Oeste, con inclinaciones republicanas, sus Gobiernos y gobernadores anunciaron en las noticias y Twitter que habían declarado nulos los resultados electorales y la presidencia de Joe Biden fraudulenta e ilegítima. La violencia entre las milicias pro-Trump y las multitudes anti-Trump estalló a medida que la guardia nacional y la policía no lograban contener el caos. Y a medida que la nación se acerca cada vez más a un colapso social, muchos temen lo que sucederá después."
 usa.209.a: "Y con respecto a lo que vendrá, tienen razón en hacerlo."
 usa.210.t: "REPORTE: #2875"
 usa.210.d: "BURÓ FEDERAL DE INVESTIGACIÓN\n\nRe. AUMENTO DE LA VIGILANCIA SOBRE GRUPOS DE ULTRADERECHA:\n\nLa represión contra las milicias de derecha no ha tenido el resultado esperado. Inicialmente, pretendíamos disuadir a los miembros de las milicias para frenar su crecimiento y preservar el orden público en nuestro país mediante una mayor vigilancia, pero el desarrollo de los acontecimientos recientes (por ejemplo, los disturbios políticos) nos obligó a redoblar la presión contra ellas mediante la represión. El aumento de la vigilancia fue impopular al principio, por lo que las detenciones masivas enfurecieron al electorado de derecha en general. Esto no solo ha empujado a los republicanos hacia la derecha, sino que grupos extremistas marginales como el Frente Patriota han aprovechado el caos para apelar a los votantes nacionalistas indignados con retórica populista.\n\nLos republicanos en general están perdiendo la fe en el gobierno, al igual que el establishment en general.\n\nAdvertimos que estos son los primeros pasos de un comportamiento insurreccional entre las milicias, ya que el sentimiento generalizado entre ellas es de preocupación y antipatía. Se recomienda precaución al tratar con estos grupos para evitar que la estabilidad se deteriore aún más.\n\n- Director Christopher Wray"
 usa.210.a: "E pluribus unum."
 usa.211.t: "Convoy de vacunas interceptado por milicianos"
 usa.211.d: "Aproximadamente a las 11:00 a. m. EST, un convoy de FEMA que entregaba vacunas en una zona rural subdesarrollada fue interceptado por cinco camiones y 32 milicianos. El vehículo delantero del convoy intentó rodear al primer camión, pero no pudo, ya que los camiones conducían rápidamente y rodeaban al pequeño convoy. Los milicianos salían de sus vehículos y gritaban consignas políticas como \"Hagamos a América grande otra vez\" y \"Recuperar el país\", entre otros insultos. Cinco minutos después, estalló una pelea con uno de los conductores del convoy. Un joven de 23 años llamado Jacob Bakers salió de su camión e intentó confrontar agresivamente a uno de los milicianos, pero fue golpeado y pateado hasta el suelo. Se desató el caos cuando casi todos los conductores del convoy salieron de sus respectivos vehículos para ayudar al Sr. Bakers, lo que desencadenó una pelea entre ambos bandos. Uno de ellos (el sospechoso es desconocido) disparó 13 veces contra el grupo de conductores del convoy, hiriendo a ocho y matando a uno. Se informó que huyeron a pie, perseguidos hasta que los milicianos se rindieron. Se desconoce el destino de las vacunas y los camiones del convoy que quedaron abandonados."
 usa.211.a: "Preocupante."
 usa.212.t: "La Liga de Defensa Judía"
 usa.212.d: "Tras un aumento masivo de ataques antisemitas, especialmente en la ciudad de Nueva York y el área metropolitana de Nueva York, la Liga de Defensa Judía (LDJ) ha vuelto a la actividad, formando \"Milicias de Autodefensa Judía\" en las comunidades judías de Nueva York. Las milicias de la LDJ parecen estar especialmente concentradas en la zona de Kiryas Joel, a pesar de que la ciudad está gobernada por el grupo jasídico Satmar, un grupo antisionista. Sin embargo, la LDJ también ha organizado milicias entre judíos ateos y liberales de la región, lo que demuestra que la comunidad judía del sur de Nueva York está cada vez más unida.\n\nMuchos en el sur de Nueva York han protestado contra las acciones de la LDJ, quejándose de que están armando y entrenando a extremistas religiosos violentos y afirmando que la LDJ se prepara para cometer ataques contra árabes como ya hizo en el pasado. Solo el tiempo dirá cuáles serán las próximas acciones de la LDJ."
 usa.212.a: "Esto se vuelve cada vez mas común."
 usa.213.t: "Aumento de identidad afrikana"
 usa.213.d: "Con la resistencia en pleno auge y las protestas contra la brutalidad policial sacudiendo el país, una nueva ideología radical ha vuelto a apoderarse de la población afroamericana, especialmente en el sur profundo. Ante la violenta represión de las protestas, grupos como la NFAC, el Nuevo Partido Pantera Negra, el Partido Socialista de los Pueblos Africanos y la Nación del Islam han formado un grupo paramilitar unificado llamado el Ejército de Liberación Negro, en honor a la organización Black Power que existió en los años 70 y 80. A pesar de su diversidad ideológica, su valor compartido en el nacionalismo negro y una inestabilidad sin precedentes han permitido a la organización operar con sorprendente eficiencia. En una muestra de unidad sin precedentes, los recién formados paramilitares del ELN marcharon por las calles de Jackson, Mississippi, coreando consignas de nacionalismo negro y separatismo.\n\nInspirándose en figuras como Malcolm X y Marcus Garvey, el ELN ha experimentado un crecimiento sin precedentes en su membresía. Ante la creciente desilusión de los afroamericanos con la capacidad de Estados Unidos para garantizar sus derechos y seguridad, el BLA goza de una inmensa popularidad entre la juventud. Los miembros recién incorporados al BLA reciben un amplio entrenamiento paramilitar en prácticas básicas con armas de fuego y tácticas de protesta, tras lo cual se organizan en una sección de una sección local.\n\nEn los últimos meses, las denuncias de terrorismo perpetrado por el ELN han alcanzado cotas insospechadas. El ELN ha perpetrado una serie de atentados con bombas, tiroteos, robos y fugas de prisiones, todo lo cual ha agravado gravemente las tensiones en un sur ya de por sí frágil. Enfrentados con miembros del grupo paramilitar neoconfederado Liga del Sur, parece que se están gestando las nubes de un conflicto étnico en el Sur."
 usa.213.a: "¡La izquierda ha enloquecido!"
 usa.213.b: "¡La revolución no será televisada!"
 usa.214.t: "Se disparan las simpatías confederadas"
 usa.214.d: "Con intensos disturbios e inestabilidad sacudiendo el Cinturón Negro, ha surgido una intensa reacción de conservadores cada vez más radicalizados en el Sur. Si uno conduce por Dixie, ver banderas confederadas no es raro. A pesar de su derrota en la Guerra Civil hace más de 100 años, gran parte del espíritu sureño sigue vivo hoy en día. Más del 38% de los sureños se consideran con una identidad sureña en lugar de una americana, y en una época en la que el poder y la competencia del Gobierno Federal se cuestionan cada vez más, se proyecta que este porcentaje casi se duplicará.\n\nLa aparición de paramilitares nacionalistas negros que participan en las protestas de la Resistencia ha puesto a la Liga del Sur en el centro de atención como contrapeso. Por cada manifestación de Liberación Negra, hay una manifestación de la Liga cerca. Con su base de apoyo concentrada en Arkansas, varios políticos locales incluso han jurado lealtad al grupo. Con una profunda convicción de restaurar la identidad sureña y preservar los \"valores tradicionales sureños\", muchos moderados los han tildado de extremistas; sin embargo, a pesar de esa etiqueta, su membresía no ha hecho más que aumentar.\n\nEn los últimos meses, la LdS ha concentrado sus fuerzas en Arkansas, con su líder Michael Hill pronunciando varios discursos vehementes denunciando al Gobierno Federal y sus políticas \"imperialistas yanquis\". Miles de jóvenes sureños se han unido a sus filas, y muchos sospechan que, si Estados Unidos se desmoronara, la organización contaría con suficiente apoyo institucional para controlar todo el estado de Arkansas. A pesar de los llamados de los liberales costeros a una ofensiva federal contra el \"grupo de odio\", el FBI y la NSA, polarizados y paralizados, no pueden hacer más que observar cómo el extremismo se extiende a otra parte del país."
 usa.214.a: "Bueno, al menos aún nos votan."
 usa.214.b: "¡Detengan a estos supremacistas!"
 usa.215.t: "Crece la identidad cascadiana"
 usa.215.d: "Existe una belleza incomparable en Estados Unidos, más allá del Pacífico Noroeste: desde Portland hasta Seattle, las ondulantes colinas y bosques de Cascadia representan las últimas áreas naturales sin explotar del país. Sin embargo, no todo va bien: las empresas que llegan desde California han intentado arruinar el pintoresco paisaje de Cascadia. Las ciudades del noroeste están plagadas de pobreza, ruina y conflicto, con grupos radicales que se disparan entre sí en las calles de Portland, y la desigualdad de ingresos se dispara en Seattle. Cuando la población local sufre, los magnates ladrones de Washington se enriquecen cada vez más con el sudor y la sangre del obrero cascadiano.\n\nComo respuesta, un auge de la identidad cascadiana ha invadido las regiones. En lugar de verse como americanos, washingtonianos u oregoneses, los grupos independentistas cascadianos han logrado promover una identidad cascadiana unificada, y cada vez más se consideran cascadianos. En Portland, varios políticos locales pertenecientes a la Alternativa Socialista han formado el Partido Socialista Cascadiano, que promueve un modelo ecosocialista centrado en la preservación de la naturaleza. En el Mango de Idaho, la derecha ha logrado atraer a agricultores y población rural, promoviendo la idea del \"Imperativo Territorial del Noroeste\" y el ecofascismo, el desarrollo de un etnoestado que devolverá a Cascadia a sus raíces rurales. Si bien existe un profundo odio entre los dos radicales de Cascadia, se ha forjado un acuerdo mutuo y tácito para promover la creación del Estado cascadiano. Si bien una revolución violenta por la libertad parece lejana, el auge de la identidad cascadiana es, sin duda, un signo de una nación moribunda."
 usa.215.a: "Que extremistas más extraños..."
 usa.216.t: "Aumento en el separatismo del Suroeste"
 usa.216.d: "Con los recientes conflictos étnicos que sacuden Estados Unidos y los disturbios abiertos en varias ciudades, se ha registrado un drástico aumento del pensamiento separatista en el suroeste americano, especialmente entre los hispanos. Una encuesta reciente de Pew Research muestra que casi el 15% de los hispanos apoya la creación de un estado separatista en el Suroeste, con el deseo de separarse de la violencia y la locura que ha consumido al resto del país. Los partidarios del separatismo han afirmado que el gobierno federal de Washington D.C. ha ignorado la situación económica y social del sur.\n\nLa facción más notable entre los separatistas son los Boinas Cafés, una organización paramilitar prochicana que surgió durante el Movimiento Chicano a finales de los años 60 y que ha revivido gracias a la agitación en los estados. Los Boinas cafés destacan por su postura a favor de la reforma educativa, los derechos de los trabajadores agrícolas, la lucha contra la brutalidad policial y la oposición a la intervención extranjera. Especialmente notables por su visible presencia paramilitar, muchos se han unido a sus filas para fomentar el sentido de comunidad entre la numerosa población migrante. Los Boinas cafés han estado armando y entrenando a jóvenes radicales, algo que ha generado una enorme controversia. Si bien los Boinas cafés han defendido sus acciones en nombre de la defensa de la comunidad, a muchos les preocupa que sus actividades constituyan terrorismo."
 usa.216.a: "¡Invasores mexicanos!"
 usa.216.b: "Servir - Observar - Proteger"
 usa.217.t: "La tasa de desempleo llega al 20%"
 usa.217.d: "En un impactante informe del Buró de Estadísticas Laborales, la tasa de desempleo en Estados Unidos alcanzó el 20% por primera vez desde la Gran Depresión, niveles un 6% superiores a los del pico de la Gran Recesión. Este impactante informe ha tambaleado los mercados financieros, con una proyección de desempleo cercana a los 18 millones.\n\nCon la pandemia de coronavirus en pleno auge y la pérdida de empleos críticos en el sector servicios en un momento en que el gasto del consumidor ha sido increíblemente bajo, era prácticamente previsible una contracción económica. Sin embargo, sumado al desplome del petróleo hace apenas dos semanas, el sector del transporte ha sufrido despidos masivos que han dejado a millones de trabajadores americanos repentinamente sin trabajo y abandonados a su suerte.\n\nLa administración Trump ha intentado culpar a los demócratas, atribuyéndolos a los confinamientos por el COVID-19 y a la interferencia con el comercio exterior, mientras que los demócratas han atribuido el efecto dominó de la crisis petrolera a la incompetencia de Trump y su excesiva dependencia del petróleo. Paralelamente a las luchas internas en el establishment americano, tanto la ultraderecha como la ultraizquierda han visto aumentos en sus membresías, y los americanos se sienten impotentes ante la política gubernamental congelada en medio de las disputas en el Congreso, y desean un cambio radical para resolver problemas radicales."
 usa.217.a: "¡Los demócratas destruyen esta nación!"
 usa.217.b: "El peor fracaso de Trump."
 usa.218.t: "Ventisca azota a Texas"
 usa.218.d: "Mientras Texas enfrentaba temperaturas históricamente bajas en febrero de 2021 y la nieve y el hielo impedían el paso de las carreteras, el operador de la red eléctrica estatal perdió el control del suministro eléctrico, dejando a millones de personas sin acceso a la electricidad. Como los apagones se extendieron de horas a días, los principales legisladores estatales pidieron investigaciones al Consejo de Confiabilidad Eléctrica de Texas, y los tejanos exigieron responsabilidades por el desastre.\n\nDurante la crisis de la red eléctrica, todas las fuentes de electricidad tuvieron dificultades debido a las gélidas temperaturas. Las compañías de transmisión, inadvertidamente, cortaron el suministro de gas natural a partes de la cadena de suministro cuando ERCOT ordenó a las empresas de servicios públicos que redujeran la demanda de energía o se arriesgaran a mayores daños a la red. Esta decisión agravó el problema, ya que los productores de gas natural no pudieron suministrar suficiente combustible a las centrales eléctricas. Al mismo tiempo, algunos pozos no pudieron producir suficiente gas natural debido a las gélidas temperaturas. En total, hay 20 víctimas confirmadas a causa de la tormenta de nieve."
 usa.218.a: "Oremos por Texas."
 usa.218.b: "¡La incompetencia republicana manifiesta!"
 usa.219.t: "Aumento en huelgas nacionales"
 usa.219.d: "Las huelgas han sacudido todos los sectores de la economía de EE.UU. este año, desde la enfermería hasta la docencia y el sector industrial. Informes del Buró Nacional de Estadísticas Laborales muestran que las huelgas en 2020 casi se triplicaron en comparación con 2019, un fenómeno atribuido a las duras condiciones laborales que muchos \"trabajadores esenciales\" han tenido que soportar debido a la escasez de mano de obra. Por ejemplo, casi 7.000 enfermeras se han declarado en huelga en todo el país para protestar por las largas jornadas con bajos salarios. Las huelgas de los auxiliares de docencia han sacudido instituciones educativas como la New School de Nueva York y la Universidad de California, exigiendo aumentos salariales debido al alto costo de la vida. No obstante, el aumento masivo de huelgas a nivel nacional ha indicado el descontento del pueblo americano con el statu quo y la caída del nivel de vida."
 usa.219.a: "¡Los comunistas hunden la economía!"
 usa.219.b: "Se vienen tiempos difíciles..."
 usa.220.t: "Huelga en la Planta Química del Complejo Freeport"
 usa.220.d: "Con la pandemia de COVID-19 en pleno auge, los trabajadores de la Planta Química del Complejo Freeport se declararon en huelga para protestar por el estancamiento salarial en un contexto de alta inflación y condiciones laborales inseguras. Tras la decisión de incluir a los trabajadores de las plantas químicas en la definición de \"trabajadores necesarios\", hasta 9 trabajadores han fallecido por problemas de salud relacionados con el COVID-19, lo que provocó la huelga.\n\nEl personal de seguridad de Dow Chemical Co. intentó desalojar a los huelguistas de las instalaciones, sin éxito tras un enfrentamiento de dos horas con los huelguistas armados y las fuerzas de seguridad privadas. La huelga ha recibido atención nacional debido a que la planta química es una de las mayores instalaciones de producción del hemisferio occidental, donde se producen etileno, propileno, polietileno y óxido de propileno.\n\nTras una negociación fallida 14 horas después del enfrentamiento inicial, el representante sindical local intensificó la tensión al apoyar públicamente y compartir la retórica del Centro para la Innovación Política, una organización de ultraizquierda asociada al movimiento jacobino americano. Esta escalada ha permitido a la administración Trump etiquetar al grupo como radicales comunistas y amenazar con el uso de la fuerza para romper la huelga."
 usa.220.a: "¡Aplasten al comunismo!"
 usa.220.b: "¡Solidaridad con los trabajadores!"
 usa.221.t: "La huelga del Complejo Freeport acaba"
 usa.221.d: "Tras cuatro días de negociaciones fallidas, la huelga en la planta química Freeport Complex fue disuelta por las fuerzas de seguridad de Dow Chemical Co., quienes la dispersaron por la fuerza. Dow Chemical anunció el despido de todos los trabajadores que participaron en la huelga por incumplir la política de la empresa, así como la contratación de más de 300 nuevos ingenieros y técnicos para reemplazar a los contratados.\n\nCon el fin de la huelga, la opinión pública está profundamente dividida. La izquierda culpa a la inacción de los demócratas para evitar la represión impulsada por el gobierno y a la indignación contra la empresa por la violación de los derechos laborales. Mientras tanto, la derecha ha elogiado a Trump por su lucha contra el comunismo y ha denunciado la huelga como antiobrera debido a su afiliación al CIP. Sin embargo, a muchos les preocupa que los nuevos trabajadores no estén a la altura de los antiguos y que esto suponga riesgos significativos para la producción."
 usa.221.a: "¡Los comunistas se llevaron lo qué se merecen!"
 usa.221.b: "¡Otro ejemplo de la tiranía trumpista!"
 usa.222.t: "Explosión en la planta química de Freeport"
 usa.222.d: "Hoy se produjo una explosión química en la planta química de Freeport, con miles de kilos de sustancias químicas tóxicas esparcidas por el aire en lo que algunos han denominado \"el Chernóbil americano\". Dado que el NORAD proyecta un área afectada tan extensa como el propio estado de Texas, muchos están preocupados por los riesgos para la salud relacionados con la alta incidencia cancerígena de muchas de las sustancias químicas. Se desconoce el número de personas afectadas a largo plazo, pero la mayoría de las estimaciones rondan las decenas de miles.\n\nLos residentes locales han compartido imágenes perturbadoras de cuervos muertos llenando las calles y ganado tirado sin vida en sus campos. A pesar de estas impactantes imágenes, las autoridades han asegurado a los residentes que era seguro regresar tan solo 76 horas después del incidente.\n\nAnte la visibilidad del humo de la explosión incluso desde aviones comerciales, ambientalistas radicales han aprovechado la situación para protestar por las deficientes regulaciones ambientales aplicadas a empresas como Dow Chemical. Esta crítica ha recibido amplio apoyo en todo Estados Unidos, pero especialmente en el noreste, con algunos informes de una pseudoguerra de guerrillas entre extremistas ambientalistas y las fuerzas policiales locales.\n\nMientras tanto, la administración Trump ha hecho todo lo posible por distanciarse del accidente, emitiendo comunicados condenando a Dow Chemical y al Gobierno del estado de Texas por su mala gestión de la situación y prometiendo enviar tropas de la Guardia Nacional para ayudar en las labores de limpieza."
 usa.222.a: "Oremos por Texas."
 usa.223.t: "Marcha del Frente Patriota en D.C."
 usa.223.d: "En una impresionante demostración de fuerza, el Frente Patriota, de ultraderecha, organizó una marcha con más de mil de sus miembros en el corazón de la capital del país, coreando \"Reclamar América\". Videos muestran a miembros del Frente Patriota frente al Monumento a Lincoln vistiendo uniformes iguales: pantalones caqui, chaquetas azul oscuro y gorras de béisbol. Algunos portaban banderas, escudos y fotografías que muestran una pancarta con la leyenda \"Victoria o Muerte\". Sus rostros estaban ocultos principalmente por gafas de sol y cubiertas blancas alrededor de la nariz y la boca. El líder del grupo, Thomas Rousseau, pronunció un discurso cerca del estanque reflectante del Capitolio ante miles de personas. \"Nuestras manifestaciones son una muestra de nuestra capacidad unificada para organizarnos, para demostrar nuestra fuerza\", dijo Rousseau. \"No como alborotadores ni como molestias públicas, sino como hombres capaces de ilustrar un mensaje y buscar una América que se acerque más a los intereses de su verdadero pueblo\". Aunque la marcha fue recibida por una gran cantidad de contramanifestantes, la policía logró mantener separados a los dos grupos y no se produjo violencia."
 usa.223.a: "Extremismo en el corazón de la nación."
 usa.224.t: "Radicalismo suburbano"
 usa.224.d: "En medio de una ola de disturbios durante las protestas del Movimiento en ciudades cercanas como Nueva York y Boston, muchos en el noroeste han recurrido al Frente Patriota en busca de protección. En particular, ante informes de saqueos e incendios provocados, pequeños comerciantes han recurrido al Frente Patriota en busca de ayuda para proteger sus negocios, lo que ha provocado enfrentamientos entre manifestantes del Movimiento y miembros del Frente Patriota en las zonas suburbanas. A pesar del arraigado carácter liberal y democrático del noreste, parece que estos disturbios han radicalizado a muchos hacia la ultraderecha, una tendencia preocupante a medida que la violencia se extiende por todo el país."
 usa.224.a: "Preocupante."
 usa.225.t: "Una nación renacida, ¿una deuda impagada?"
 usa.225.desc: "América acaba de salir de una brutal guerra civil, pero el legado del régimen anterior persiste. Quedan deudas colosales que suman entre 30 y 40 billones de dólares, una carga que amenaza con aplastar las esperanzas del nuevo gobierno de un futuro estable. Otras grandes potencias observan de cerca la situación, y la decisión de aceptar o rechazar estas deudas tiene profundas implicaciones.\n\nSi nos negamos a asumir esta deuda, nuestra legitimidad ante el mundo se desplomará. El comercio podría volverse imposible a medida que otras naciones se nieguen a participar, y los préstamos del FMI necesarios para reconstruirnos podrían desaparecer, dejándonos aislados. Sin embargo, aceptar la deuda significa cargar a nuestro nuevo gobierno con una suma que podría tardar décadas en pagar, lo que obligaría a dolorosas medidas de austeridad que podrían obstaculizar cualquier recuperación. No obstante, existe la posibilidad de aceptar la deuda con la intención de renegociarla con nuestros acreedores en el futuro, una decisión arriesgada, pero que podría darnos una valiosa oportunidad.\n\nLa decisión que tomemos hoy determinará el destino de nuestra nación durante las próximas décadas."
 usa.225.a: "Honraremos las deudas pasadas."
 usa.225.b: "¡No pagaremos por los pecados del pasado!"
 usa.226.t: "Alaska reclamada, y el destino de la flota"
 usa.226.desc: "Tras una reñida campaña, el nuevo gobierno americano ha recuperado Alaska con éxito. Esta victoria restaura una parte crucial del país, rica en recursos naturales y estratégicamente vital para el control del Pacífico. Mientras nuestras fuerzas aseguraban las bases navales de Anchorage, ocurrió un acontecimiento inesperado: la mitad del mando naval de EE.UU. estacionado en Alaska no pudo escapar a tiempo. Varios buques de guerra, submarinos y sus tripulaciones están ahora bajo nuestro control.\n\nLa captura de estos activos navales representa tanto una oportunidad como un desafío. Si bien estos buques pueden reforzar nuestra fuerza en el mar, el personal capturado permanece leal al antiguo régimen, lo que crea un riesgo de sabotaje o motín. La forma en que manejemos esta situación determinará el futuro de nuestro poder naval y la estabilidad en la región."
 usa.226.a: "Purgar a los desleales y tomar el control de la flota."
 usa.227.t: "El presidente Trump realiza un mitin"
 usa.227.desc_1: "Allí estaba, lleno de pancartas rojas, blancas y azules, carteles y pantallas, repletos de eslóganes combativos, pero sobre todo, lleno de patriotas, entusiasmados, listos para defender su país cuando tú se los ordenes.\n\nEl Madison Square Garden, el corazón de la bestia que es el Comité Nacional Demócrata, un auténtico nido de ratas.\n\nCon presentaciones musicales y políticas de todo tipo, por fin logras subir al escenario y dirigirte a quienes anhelaban tu imagen allá abajo.\n\n\"¿Saben? Dicen que viene una marea azul, yo la llamo marea de alimañas. ¡Cuánta obstrucción y odio! Prefieren volar el país por los aires antes que perder el poder cuatro años más. Están usando la guerra política, la guerra legal, los medios falsos, sin ceder en sus mentiras. Vamos contra viento y marea, gente.\n\n\"¿Y saben? Dicen que Nueva York vota por los demócratas, pero hasta ahora no he visto a ni uno. ¿Dónde están? ¡Estoy aquí, no hay por qué esconderse en el sótano como Joe!\n\n\"Tal vez sea porque... pueden ver el desastre que estos lunáticos han traído a mi hermosa ciudad. Que sucia, que insegura. ¿Es esto lo que quieren para todos nosotros?\n\n\"Son la izquierda radical, intentando callarnos con su agenda usando el dominio total de los medios, la corrupción y las amenazas de muerte. Quieren socializar la medicina, inflarla a niveles impensables. Quieren desfinanciar a la policía y dejar que los narcos campen a sus anchas por nuestras calles. Tú y yo: necesitamos SALVAR A AMÉRICA de ellos. No hay otra opción que MAGA\"."
 usa.227.desc_2: "Aún era necesario reforzar la seguridad aquí, en Richmond, desde el desafortunado accidente con la policía y los disturbios que siguieron. Pero no fue un problema para ti: arriesgaste tu vida muchas veces por el bien de tu país; un puñado de manifestantes no te detendrán ni a ti ni a tus votantes.\n\n\"Necesitamos hablar, por supuesto, de los disturbios, de estos terribles y repugnantes sublevados que están destrozando nuestro país. Millones y millones de dólares en propiedades han desaparecido, destruidos por esta gente horrible. Y no solo las propiedades, también quieren destruir nuestra cultura y nuestros monumentos. ¡Es una locura! ¡Seguro que quieren volar a Abraham Lincoln!\n\n\"Todo está incitado por estos imbéciles de Antifa, pero todos sabemos de dónde sacan sus fondos, ¿verdad, amigos? Este supuesto «Movimiento» dice traer justicia y paz, pero en realidad lo único que pueden hacer es lo contrario. ¡Y Joe los adora! Le encanta elogiarlos y tomar fotos. Realmente aprecia toda la destrucción. Le llamamos Joe Ardor.\n\n\"Pero soy el presidente de la Ley y el Orden, siempre lo he sido. La seguridad es nuestra máxima prioridad. Hemos hecho mucho por nuestros agentes del orden. Respaldamos a los de azul, por cierto, sí, a nuestros hermosos policías. ¡Díganles que pueden ser menos amables, por cierto! Y, por cierto... claro, nuestras fuerzas armadas... las resucitamos tras el desastre de Obama. ¡Pregúntenle a todos estos generales, me adoran!\n\n\"Nuestro país nunca ha sido más fuerte que con Trump, y vamos a hacerlo aún mejor, ya verán. Necesitamos aferrarnos, repito, a la ley y el orden, porque si no, ya no tendremos un país\"."
 usa.227.desc_3: "Se siente bien volver aquí, a Florida. Rodeado de tus más fieles seguidores, la base, verdaderos creyentes en la causa. Su energía te da la fuerza necesaria para seguir adelante. ¿Quién más transformará a América en algo verdaderamente grande?\n\n\"Hemos visto lo que traman los demócratas y, francamente, a nadie le gusta. Son débiles, su coalición es apenas coherente, se mezclan con todos estos radicales, ¡pero nadie los quiere! Dicen que es «CONTRA Trump», no están a favor de nada.\n\n\"Son racistas, intentan hacer que parezca lo contrario, pero lo son. Siempre hablan de los negros y los indígenas -¡y los adoro!-, pero se olvidan de nuestros maravillosos hispanoamericanos y asiáticoamericanos, tan injustamente.\n\n\"También quieren destruir a los cristianos, nuestros valores, nuestra religión. La Biblia significa mucho para mí. Y aunque Ateo Joe quiere hacerte creer que nunca la leí, sé que debes «amar a tu enemigo». Y amo a Joe, lo amo porque me está regalando las elecciones.\n\n\"Estamos construyendo una América para todos, ricos y pobres, todas las razas, todas las religiones, no solo para los demócratas.\n\n\"Son débiles, muy débiles. en todo. Pero somos fuertes porque la gente cree en nuestra política, cree en \"América Primero\", ¡porque funciona! Y es buenísimo. Quieren poner a América Última, les importan más lugares como Venezuela, y por eso nunca van a ganar\"."
 usa.227.desc_4: "Aquí en Pensilvania, un estado clave en la campaña, estabas dando un gran paso, arrebatando la clave a la victoria, demostrando que eres un defensor de los trabajadores.\n\n\"Los habitantes de Pensilvania lo saben como nadie: durante nuestra gestión tuvimos la mejor economía de la historia mundial. ¡Las mayores rebajas de impuestos de la historia, tan beneficiosas para nuestros trabajadores y empresas! Recuperamos la manufactura americana y creamos muchísimos empleos en el proceso. Hemos hecho más por nuestra economía que los demócratas en 30 años, me dicen, quizás más.\n\n\"Estamos en una pequeña debacle por el corona, provocada por las cuarentenas y disturbios demócratas, pero casi ha terminado, así que está bien. Solo un poco más de tiempo y las cifras volverán a crecer, el PIB y la bolsa dirán «¡voten a Trump!».\n\n\"¡Miren sus políticas, amigos! Quieren deshacer todos nuestros logros, apelan a sus sponsors desquiciados. Quieren prohibir el fracking, prohibir la energía nuclear, ¡horrible para nuestros trabajadores! Y la mayor de todas, la NUEVA ESTAFA VERDE, un robo multimillonario, un desastre provocado por el hombre, que tanto desean.\n\n\"¿Y nosotros? Tenemos muchísimos planes para los próximos cuatro años. Vamos a excavar petróleo como si no hubiera un mañana. Liberaremos el potencial de nuestro país como nunca antes. Y haremos muchos tratados excelentes con otros países: México, Canadá... ¡ya no nos robarán! Tuve relaciones geniales con el presidente Xi y Vladímir Putin, pero solo porque me respetaban. No hay respeto por Joe Animatrónico y su variopinto rejunte.\n\n\"¿Quién necesita la Bideonmía cuando tienes la MAGAnomía? Me gusta esa palabra, MAGAnomía, es tremenda\"."
 usa.227.a: "¡MAGA!"
 usa.227.b: "Las mismas mentiras de siempre."
 usa.228.t: "El Día"
 usa.228.desc: "Hola, mi gente... Me alegra ver a tantos patriotas reunidos hoy para expresar su preocupación por el rumbo que está tomando nuestro país. Les agradezco mucho a todos su presencia; es importantísima.\n\nPorque lo que necesitamos decir... Sobre esa gente repugnante de allá y su plan para apoderarse del país de forma ilegal. Son corruptos, odiosos y están ansiando perjudicarles, es a ustedes a quienes realmente persiguen.\n\nLos medios mentirosos, los políticos corruptos, el Comité Nacional Demócrata de la Corrupción y los traidores de Nunca Trump, ese horrible rejunte de gente que odia a nuestro país...\n\nSon tan crueles con nosotros, tan injustos. Dicen que debemos ceder. ¿Cómo podemos ceder cuando hemos ganado tanto? ¿Y después de todo lo que hemos hecho?\n\nDicen que soy un perdedor, y dicen que ustedes, el Pueblo, son perdedores, ¡pero no lo son! Ustedes son los que realmente ganaron, ustedes son la razón por la que tienen tanto miedo. No, no podemos ceder.\n\nPor eso digo que debemos ir allí y ponerlos de nuevo en su lugar, mostrarles a esos burócratas de D.C. quién tiene el poder en este país. Una verdadera muestra de fuerza. ¡Servirá para recordarles a quién le deben sus cargos!\n\nPrometimos desde el principio de nuestro movimiento que devolveríamos D.C. al Pueblo, así que si no quieren por las buenas, es muy sencillo: ¡será por las malas!"
 usa.228.a: "Pacíficamente y patrióticamente..."
 usa.228.b: "Que mal perdedor."
 usa_news.3.t: "¡Trump gana las elecciones de EE.UU.!"
 usa_news.3.desc: "En un sorprendente giro de los acontecimientos en EE.UU., Donald J. Trump se perfila como el ganador de las elecciones presidenciales y se convertirá en el próximo jefe del ejecutivo. Muchos expertos en ciencias políticas predijeron previamente que Trump perdería las elecciones, especialmente tras numerosos problemas apremiantes en la sociedad de EE.UU. Sin embargo, Trump parece haber desafiado las probabilidades y, en particular, las innumerables predicciones de los expertos. Curiosamente, la campaña de Biden ha expresado una firme oposición y ha cuestionado los resultados de las elecciones, citando irregularidades en la votación y otros problemas relacionados.\n\nEl Partido Demócrata y otras organizaciones políticamente liberales ya han anunciado, junto con Biden, su condena a los objetivos políticos de Trump para la próxima administración. Si bien las dudas sobre las elecciones parecen estar por todas partes, el personal del Congreso ha dictaminado que las acusaciones de irregularidades por parte de la campaña de Biden no coinciden con sus propias conclusiones durante el recuento de votos. En cualquier caso, parece que las disputas políticas que azotaron a los Estados Unidos durante la temporada electoral no desaparecerán pronto."
 usa_news.3.a: "¡No para de ganar!"
 usa_news.4.t: "¡Biden gana las elecciones de EE.UU.!"
 usa_news.4.desc: "Para sorpresa de pocos, Joseph R. Biden está llamado a ser el ganador de las elecciones presidenciales de EE.UU. y convertirse en el próximo jefe del ejecutivo del país. Muchos analistas políticos y científicos consagrados han afirmado que la derrota de Trump era casi inevitable, citando los numerosos obstáculos que tuvo que superar para ganar. Curiosamente, la campaña de Trump ha expresado una firme oposición y ha impugnado los resultados de las elecciones, citando irregularidades en la votación y otros problemas relacionados.\n\nAdemás de la campaña de Trump, muchos miembros destacados del Partido Republicano han expresado su preocupación por un fraude electoral masivo. Aunque las dudas sobre las elecciones son generalizadas, el personal del Congreso ya ha anunciado que las denuncias de irregularidades por parte de la campaña de Trump no coinciden con sus propias conclusiones durante el recuento de votos. Parece que las disputas políticas que se apoderaron de los Estados Unidos durante la temporada electoral no desaparecerán pronto."
 usa_news.4.a: "¿Ha vuelto la normalidad?"
 states.50.t: "Batalla de Las Vegas"
 states.50.d: "TODO"
 states.50.a: "¡Devuelvan a esos bastados a Monterrey!"
 states.51.t: "Reporte de Las Vegas"
 states.51.d: "El mando está desconcertado tras la reciente batalla con las fuerzas del EPLA por la ciudad de Las Vegas. Los generales confiaban en que su superioridad numérica y aérea debería haber retrasado cualquier ataque de la milicia. Hasta el momento, se han perdido 89 tanques, 90 vehículos de combate de infantería, 120 vehículos blindados de transporte de personal, 200 camiones y 40 aviones; y se han registrado 5.321 bajas en la defensa de esta ciudad de importancia estratégica..."
 states.51.a: "Preferiría estar en Vegas..."
 news.185.t: "¡Se reune la ONU!"
 news.185.d: "La Organización de las Naciones Unidas ha vuelto a reunirse en Londres por primera vez desde 1964, en vista de la incipiente Segunda Guerra Civil Americana que ha destruido el statu quo del nuevo milenio. Con la notable ausencia de diplomáticos de Washington debido al conflicto actual, la Asamblea General se vio envuelta en un torbellino de conflicto, ya que diplomáticos de todo el mundo respondieron de forma divergente a la guerra civil. La mediación de Abdulla Shahid evitó el caos absoluto en la asamblea. Se llegó a un consenso para establecer, ante todo, un grupo de trabajo humanitario de mantenimiento de la paz que se desplegaría de inmediato en la Costa Este y los países vecinos de los ex-Estados Unidos para comenzar a asistir a la creciente población de refugiados y la escasez de suministros debido al colapso del orden público. Una coalición militar abierta de la ONU, como la observada durante la guerra de Corea, fue vetada tanto por China como por Rusia debido a \"la falta de una autoridad americana reconocida\", según citó Zhang Jun, el representante chino ante la ONU. La Asamblea General se prepara para la tormenta que se avecina, ya que el colapso de la segunda superpotencia en un siglo ha propiciado el surgimiento de nuevos conflictos."
 news.185.a: "Los cascos azules son inútiles, como siempre."
 threat_second_american_civil_war: "Segunda Guerra Civil Americana"
 POLITICS_DONALD_TRUMP_DESC: "Donald John Trump es el político americano más divisivo del que se tenga memoria. Hijo del magnate inmobiliario neoyorquino Fred Trump, Donald transformó la empresa de su padre, que pasó de ser una cadena de hoteles y casinos a una marca internacional dedicada a su imagen personal más que a cualquier otra cosa. Se adentró en las aguas políticas en 2000 y 2012, pero finalmente se zambulló en las elecciones presidenciales de 2016. Tras una derrota tras otra, acabó consiguiendo la nominación republicana y derrotó a Hillary Clinton en las elecciones generales. El hombre al que muchos descartaron por hacer una campaña de vanidad de corta duración era ahora presidente de los Estados Unidos.\n\nCasi todo en Trump, desde sus políticas hasta su personalidad, desafía la sabiduría convencional en Washington. Ha mantenido varias de sus filosofías empresariales características: nunca haz un trato sin un beneficio tangible inmediato para ti mismo; no existe la mala prensa y; cuando algo sale mal, nunca, NUNCA, lo admitas. Sus partidarios lo elogian por su franqueza refrescante, por dar voz a los descontentos de la clase media y por su disposición a enfrentarse a un sistema federal anquilosado y corrupto. Sus numerosos críticos, por su parte, lo condenan por ser un narcisista susceptible que se deja seducir por la ultraderecha y que destruirá gustosamente las tradiciones democráticas en aras de su ego. Pero pocos, tanto demócratas como republicanos, niegan su habilidad para hacer enfadar y movilizar a la gente, ya sea a favor o en contra de él."
 POLITICS_JOE_BIDEN_DESC: "Joseph Robinette Biden Jr. ha sido un hombre que a menudo ha estado cerca del máximo poder, pero no ha logrado alcanzarlo. Nacido en Pensilvania, Biden definiría la mayor parte de su vida personal y política en Delaware, donde fue senador durante más de 30 años y se consolidó como parte del liderazgo del Partido Demócrata. Ahora, mientras el país enfrenta su peor crisis hasta la fecha, Biden ha respondido al llamado de los demócratas, haciéndose al fin con el poder. Moviéndose con cuidado entre la izquierda, el centro y la derecha del partido, Biden debe estabilizar la nave del Gobierno Federal contra todos los enemigos, tanto extranjeros como nacionales.\n\nBiden ha sido a menudo un político controvertido, incluso dentro del partido. Sus vínculos con Storm Thurmond y sus proyectos de mano dura contra la delincuencia le han generado oponentes de izquierda, mientras que sus oponentes de derecha temen que su enfoque autoritario para sofocar las revoluciones y los vastos planes de estímulo gubernamental acerquen a Estados Unidos a la tiranía. A sus 78 años, Biden es el hombre de mayor edad en ser elegido presidente. Donde sus detractores ven a una figura decorativa enfermiza que busca su última oportunidad de poder y dejar un legado, sus partidarios ven a un estadista experimentado que se enfrenta a todos los enemigos para salir victorioso.\n\nCon la amenaza de la extinción de la democracia americana acechándolo, Biden lo ha arriesgado todo: será recordado como el hombre que salvó la democracia, o como quien selló el ataúd. Una cosa es segura: pocos envidian su rol en la historia."

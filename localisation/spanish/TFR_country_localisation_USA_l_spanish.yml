 play_USA_tooltip: "§YGobierno Constitucional Americano§!\n---------------\n\n\n\n\n£GFX_USC_path_banner\n\n\n\n\n\n§g¡Salva a América, Presidente Trump!\n\nY estoy orgulloso de ser americano,\ndonde al menos sé que soy libre,\ny no olvidaré a los hombres que murieron,\nque me dieron ese derecho.§!\n\n¡Jugarás como §Y[USC.GetNameDef]§! cuando inicie la §RGuerra Civil§!!"
 play_USB_tooltip: "§YUnión de América§!\n---------------\n\n\n\n\n£GFX_USB_path_banner\n\n\n\n\n\n§gDi NO al ODIO. Di NO a la INTOLERANCIA.\n\n¡Oh, hermosa por cielos espaciosos\nPor olas doradas de granos\nPor majestuosas montañas color púrpura\nSobre la llanura llena de frutos!\n¡América! ¡América!§!\n\n¡Jugarás como §Y[USB.GetNameDef]§! cuando inicie la §RGuerra Civil§!!"
 play_APA_tooltip: "§YEjército Popular de Liberación Americano§!\n---------------\n\n\n\n\n£GFX_APA_path_banner\n\n\n\n\n\n§gLleva la revolución al mismísimo corazón del capitalismo.\n\nTenemos en nuestras manos un poder mayor que su oro atesorado\nMil veces mayor que el poder de sus ejércitos\nPodemos hacer nacer un nuevo mundo con las cenizas del viejo\nPor la unión que nos hace fuertes.§!\n\n¡Jugarás como §Y[APA.GetNameDef]§! cuando inicie la §RGuerra Civil§!!"
 play_ATW_tooltip: "§YDivisión Atomwaffen§!\n---------------\n\n\n\n\n£GFX_ATW_path_banner\n\n\n\n\n\n§gQuema este mundo podrido hasta sus cimientos.\n\nLos incendios, saqueos\nrebeliones masacran a las masas.\nLa oscuridad trae la muerte\nCiudades reducidas a cenizas§!\n\n¡Jugarás como §Y[ATW.GetNameDef]§! cuando inicie la §RGuerra Civil§!!\n\n§RATENCIÓN: ¡Esta facción es la más difícil de todas!§!"
 play_TRG_tooltip: "¡Jugarás como §Y[TRG.GetNameDef]§! cuando inicie la §RGuerra Civil§!!"
 play_CLM_tooltip: "¡Jugarás como §Y[CLM.GetNameDef]§! cuando inicie la §RGuerra Civil§!!"
 play_BLA_tooltip: "¡Jugarás como §Y[BLA.GetNameDef]§! cuando inicie la §RGuerra Civil§!!"
 play_NSM_tooltip: "§YMovimiento Nacionalsocialista§!\n---------------\n\n\n\n\n£GFX_NSM_path_banner\n\n\n\n\n\n§gLucha por el futuro de tu raza.\n\nLas banderas se bajan ante los muertos que aún viven\nLa división de asalto jura, con la mano cerrada en un puño,\nque llegará el día para la retribución, no el perdón,\ncuando Heil y Sieg resuenen en la patria.§!\n\n¡Jugarás como §Y[NSM.GetNameDef]§! cuando inicie la §RGuerra Civil§!!"
 play_BOA_tooltip: "¡Jugarás como §Y[BOA.GetNameDef]§! cuando inicie la §RGuerra Civil§!!"
 play_LOS_tooltip: "¡Jugarás como §Y[LOS.GetNameDef]§! cuando inicie la §RGuerra Civil§!!"
 play_PTF_tooltip: "§YFrente Patriota§!\n---------------\n\n\n\n\n£GFX_PTF_path_banner\n\n\n\n\n\n§gReclama América. Reclama tu patrimonio.\n\nMis ojos han visto la gloria de la venida del Señor:\nEstá aplastando la viña donde se guardan las uvas de la ira;\nHa liberado el fatídico rayo de su terrible y rápida espada:\nSu verdad está en marcha§!\n\n¡Jugarás como §Y[PTF.GetNameDef]§! cuando inicie la §RGuerra Civil§!!"

 USA_country_summary: "§YResumen del país§!:\nMuchos describen a los Estados Unidos de América como una tierra de oportunidades, riqueza y libertad. Una nación que cree que ningún desafío es demasiado grande, ninguna montaña demasiado alta y ningún riesgo demasiado desalentador.\n\nY después del final de la Guerra Fría, creímos que nos convertiríamos en la nación más poderosa del planeta. Sin embargo, enfrentamos muchos desafíos, para la mayoría de los cuales no estabamos preparados. Ya fuera un resurgimiento de viejos y nuevos enemigos o disturbios dentro de nuestras fronteras, no íbamos a experimentar el siglo pacífico que habíamos esperado; en cambio, nos enfrentamos a un nuevo mundo que ha comenzado a volverse cada vez más contra nosotros con el paso el tiempo. Combinado con una población cada vez más polarizada y rumores de un nuevo virus en Wuhan, los Estados deben mantenerse Unidos, porque como dijo una vez Gerald Stanely Lee:\n\n\"América es una melodía. Debemos cantarla juntos\"."

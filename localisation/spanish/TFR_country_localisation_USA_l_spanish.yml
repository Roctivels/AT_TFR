 USA_medium_immigration_idea: "Baja inmigración ilegal"
 USA_medium_immigration_idea_desc: "La inmigración ilegal sigue siendo uno de los problemas socioeconómicos más controversiales de la América moderna. Aunque mucho más baja ahora comparada como era durante los 2000 y los 2010, decenas de miles de inmigrantes ilegales siguen cruzando la frontera cada año. Este flujo de inmigrantes ilegales provenientes del sur ha enfadado a muchos elementos conservadores, que se preguntan porqué sus impuestos van a gente que ni siquiera paga impuestos. En la derecha más radical, ideas supremacistas blancas como la 'teoría del gran reemplazo' han empezado a ganar tracción."
 USA_high_immigration_idea: "Inmigración ilegal masiva"
 USA_world_police_idea: "Policía mundial"
 USA_world_police_idea_desc: "Si se le pregunta a distintas personas cuál es su opinión sobre la intervención militar americana en Medio Oriente, es probable que se obtengan opiniones muy diferentes y contundentes. Muchos americanos creen que el gobierno de Estados Unidos debería centrarse en los asuntos internos y que lo que ocurre en Medio Oriente \"no es asunto nuestro\". Otros creen que en esta era moderna, América debe tener una presencia global para proteger sus intereses. Las diferencias de opinión sobre el intervencionismo americano en asuntos exteriores no son nada nuevo; han existido desde casi la fundación de los propios Estados Unidos."
 USA_oil_crisis_idea: "Crisis del petróleo"
 USA_oil_crisis_idea_desc: "Petróleo. Es con lo que todo ha funcionado por décadas. Los contenedores que el mundo producía, el combustible para los vehículos, el alquitrán de las carreteras, todo lleva al petróleo crudo. Un solo indicio de escasez era suficiente para dejar muchas economías fuera de control - pero, al menos hasta 2020, se evitaron catástrofes mayores. Ahora, sin embargo, frente al desmoronamiento del sistema global, el colapso saudita y la situación doméstica, el petróleo ha sido mucho más difícil de conseguir. El mercado global se ha quedado sin su oxígeno negro, y ahora, como mayores usuarios de combustibles fósiles, sentimos los efectos de esta crisis más profundamente. Hasta que termine, nuestra capacidad económica estará bloqueada - y mucha gente sufrirá por eso."
 USA_oil_crisis_idea1: "Crisis del petróleo"
 USA_mingle_with_the_movement_idea: "Aliarse con el Movimiento"
 USA_mingle_with_the_movement_idea1: "Abrazar al Movimiento"
 USA_patriotic_defense_idea: "Defensa patriótica"
 USA_minimalized_militias_idea: "Milicias minimizadas"
 USA_national_schizophrenia_idea: "Esquizofrenia nacional"
 USA_national_schizophrenia_idea_desc: "El islamista egipcio Sayyid Qutb acusó una vez a la democracia liberal de haber inducido una \"espantosa esquizofrenia\" en Occidente. Ahora, esa esquizofrenia se ha manifestado. Ahora hay dos capitales, cada una afirmando ser la única sede legítima del poder, dando sus propias órdenes cada vez más contradictorias al resto de la nación. Algunos intentan seguir las órdenes de ambas, otros solo escuchan a una, y otros simplemente ignoran a ambas y esperan que esta locura termine.\n\n§REsta podría ser la hora más oscura de América hasta la fecha. ¿Se oscurecerá aún más la noche?§!"
 USA_low_morale_idea: "Baja moral"
 USA_low_morale_idea_desc: "El americano promedio no espera despertarse a la mañana y que de la nada le pidan que mate a su vecino."
 NEG_mills_collins_coalition_idea: "Gobierno de coalición Mills-Collins"
 NEG_mills_collins_coalition_idea_desc: "Maine siempre ha sido una tierra de tolerancia y bipartidismo, y esta guerra civil no debe destruir lo que hace grande a nuestro estado.\n\nPara asegurar nuestra supervivencia contra las fuerzas radicales, la gobernadora Mills y el senador Collins han formado un gobierno de coalición entre el Partido Republicano de Maine y el Partido Demócrata de Maine."
 NEG_northern_insurgency_idea: "Insurgencia del norte"
 NEG_northern_insurgency_idea_desc: "El norte de Maine es un lugar desolado, con comunidades dispersas a cientos de kilómetros de distancia. Este aislamiento, sumado a los constantes ataques a la infraestructura crítica necesaria para acceder al norte, ha hecho que el norte sea ingobernable."
 NCY_unionist_aid_idea: "Ayuda unionista"
 NCY_unionist_aid_idea_desc: "A pesar de nuestra precaria situación, el presidente Biden se ha comprometido a apoyar inequívocamente al gobernador Cuomo en su lucha por recuperar Nueva York de las manos de los radicales."
 NCY_imperial_legacy_idea: "Heredero del imperio"
 NCY_imperial_legacy_idea_desc: "Somos la continuación del Empire State, un estado que una vez albergó los edificios más altos de América, un estado que sobrevivió a un ataque terrorista directo y dijo: \"¡No pueden matarnos!\".\nÉramos la joya de la corona americana, pero ahora... luchamos por controlar todo el norte del estado de Nueva York, y desde entonces hemos perdido la ciudad a manos de lo que una vez se consideró nuestra leal fuerza policial, que ahora apenas puede controlar las calles...\n\n§REl jefe Shea pagará por su insolencia...§!"
 JDL_the_american_homeland_idea: "La segunda tierra prometida"
 JDL_the_american_homeland_idea_desc: "Aunque Israel ha sido la promesa del pueblo judío durante dos milenios, América es el lugar donde el pueblo judío pudo construir su vida sin la amenaza de ser exterminado a la vuelta de cada esquina.\n\nNuestro pueblo ha prosperado en Nueva York, y no abandonaremos simplemente la vida que hemos construido en este continente porque un Hitler de pacotilla ocupe los dos estados más pequeños de la Unión."
 JDL_soldiers_of_the_rebbe_idea: "Soldados del Rebe"
 JDL_soldiers_of_the_rebbe_idea_desc: "Nuestro objetivo es proteger a los judíos del antisemitismo por todos los medios necesarios, lo que significa alinearnos con algunos de nuestros credos con los que no necesariamente estemos de acuerdo.\n\nLos seguidores del difunto Menachem Schneerson han estado presentes en la ciudad de Nueva York desde la década de 1970 y han actuado como tropas de choque variables desde antes de que comenzaran los combates oficiales. Estos \"soldados del Rebe\" no están entrenados de manera experta, sin embargo, a menudo se los encuentra haciendo lo imposible para participar en incursiones de alto riesgo para asegurar suministros para nuestro pueblo."
 ATP_Anarchism_on_the_Niagara_idea: "Anarquismo en el Niágara"
 ATP_Anarchism_on_the_Niagara_idea_desc: "Hemos construido una sociedad de anarquistas afines en uno de los paisajes más bellos del continente. Nuestra sociedad será presentada a la juventud de América como una utopía anarquista."
 ATP_Inescapable_Fate_idea: "Destino ineludible"
 ATP_Inescapable_Fate_idea_desc: "Lo que es nuestro mayor orgullo es también nuestro peor enemigo... Estamos rodeados por todos lados, nuestra única forma de escapar es...\n\nSaltar."

 USA_america_first_idea: "America First"
 USA_america_first_idea_desc: "El lema distintivo que capta la esencia de la política exterior de Trump, \"America First\" representa un cambio fundamental respecto a los días de la era globalista de los años 2000. Con quejas sobre que Estados Unidos se ve obligado a asumir la carga de defensa de sus aliados europeos y la fuga de puestos de trabajo hacia el Sudeste Asiático, los americanos han clamado por el regreso de los empleos y la atención política en los asuntos internos."

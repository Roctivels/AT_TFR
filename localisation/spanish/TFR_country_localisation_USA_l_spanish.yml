 USA_the_trump_economy_idea: "Economía de Trump"
 USA_the_trump_economy_idea_desc: "El americano medio se ha acostumbrado a encender la televisión y ver un nuevo informe sobre el alza del mercado de valores durante la presidencia de Trump. El desempleo se ha mantenido bajo y las tasas de pobreza han disminuido drásticamente. Si bien muchos americanos han cosechado los frutos de este mercado floreciente, otros lo han criticado por ser injusto, citando la diferencia entre los millones de americanos que apenas pueden pagar la atención médica mientras los ultrarricos se relajan en sus yates privados. Independientemente de la inclinación política, existe un acuerdo casi unánime en que la economía desempeñará un papel fundamental en las próximas elecciones."

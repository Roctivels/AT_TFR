 USA_ban_international_travel_decision: "Prohibir los viajes internacionales"
 USA_ban_international_travel_decision_desc: "Desde nuestras experiencias con la prohibición de viajes desde y hacia otros países, podemos concluir que su eficiencia no tiene igual. Así como pusimos una puerta de hierro en frente de las hordas de los terroristas de Medio oriente, pondremos una barrera al virus chino para evitar que llegue a nuestras fronteras e infecte a nuestra población. La seguridad de nuestra gente viene primero."

 laws_welfare_post_soviet_desc: "Desde la caída de la URSS, nuestro Estado aún cuenta con un número considerable de programas sociales, principalmente para personas mayores, personas con discapacidad, víctimas de Chernóbil y otros miembros vulnerables de la sociedad, a pesar de numerosos retrocesos e interrupciones. Sin embargo, esto también conlleva una enorme burocracia en dichos programas sociales."

 development: "Desarrollo"
 academic_development: "Desarrollo académico"
 academic_development_modifier_tooltip: "------------\n£development  Desarrollo académico: [?academic_development_var|+1%]\n£development  Desarrollo académico mensual: [?modifier@academic_development_monthly|=+1%]"
 lower_academic: "Dificultades cognitivas"
 lower_academic_desc: "En esta etapa, una parte significativa de la población enfrenta dificultades para acceder y adquirir educación básica. El analfabetismo masivo es prevalente y las personas pueden tener dificultades con las habilidades cognitivas fundamentales. Esta etapa se caracteriza por una exposición limitada al aprendizaje formal y a la adquisición de conocimientos."
 low_academic: "Nivel básico de alfabetización"
 low_academic_desc: "Se realizan esfuerzos para abordar el analfabetismo masivo, lo que resulta en una etapa en la que un segmento más amplio de la población adquiere competencias básicas de lectoescritura y aritmética. Si bien las capacidades cognitivas mejoran, aún se prioriza el conocimiento fundamental, y las personas pueden tener una exposición limitada a actividades intelectuales más avanzadas."
 medium_academic: "Competencia funcional"
 medium_academic_desc: "La sociedad alcanza un punto en el que la mayoría de las personas alcanza la competencia funcional en diversas áreas cognitivas. La educación básica está ampliamente extendida y las personas pueden aplicar eficazmente sus conocimientos para afrontar los desafíos cotidianos. Este nivel implica una comprensión más práctica de los conceptos y la resolución de problemas."
 high_academic: "Pensadores críticos"
 high_academic_desc: "Al avanzar más allá de la competencia funcional, las personas en esta etapa desarrollan habilidades de pensamiento crítico. La educación fomenta el razonamiento analítico, el pensamiento independiente y una comprensión más profunda de conceptos complejos. La sociedad valora la curiosidad intelectual y anima a las personas a cuestionar, analizar y sintetizar la información."
 higher_academic: "Excelencia intelectual"
 higher_academic_desc: "Representa el nivel más alto de desarrollo intelectual en una sociedad. En esta etapa, las personas no solo poseen una buena formación, sino que también buscan la excelencia intelectual. Se hace un gran énfasis en la educación superior y la investigación. La sociedad valora la innovación, promueve una cultura de aprendizaje continuo y fomenta un entorno donde se celebran los logros intelectuales."
 higher_academic_tooltip: "§G¡Tendremos un desarrollo académico moderno!§!"
 highest_academic: "Ingenio académico"
 highest_academic_desc: ""
 farming_development: "Desarrollo agrícola"
 farming_development_modifier_tooltip: "------------\n£development  Desarrollo agrícola: [?farming_development_var|+1%]\n£development  Desarrollo agrícola mensual: [?modifier@farming_development_monthly|=+1%]"
 lower_farming: "Agricultura de subsistencia"
 lower_farming_desc: "En esta etapa, la sociedad depende principalmente de la agricultura de subsistencia, con una productividad agrícola limitada. El acceso a los alimentos es un desafío constante y las comunidades luchan por satisfacer sus necesidades nutricionales básicas. Las prácticas agrícolas suelen ser tradicionales e ineficientes."
 low_farming: "Seguridad alimentaria básica"
 low_farming_desc: "La sociedad alcanza un nivel de seguridad alimentaria básica gracias a la mejora de las prácticas agrícolas. Se mejoran los métodos de cultivo y se observa un ligero aumento de la productividad. Sin embargo, el acceso a una dieta variada y nutritiva aún puede ser limitado, y las comunidades pueden sufrir escasez ocasional de alimentos."
 medium_farming: "Producción sostenible de alimentos"
 medium_farming_desc: "La sociedad realiza la transición hacia prácticas agrícolas más sostenibles, priorizando la conservación del suelo, la gestión del agua y la rotación de cultivos. Este nivel se traduce en un suministro de alimentos más estable y fiable. Las comunidades pueden satisfacer sus necesidades nutricionales de forma constante, reduciendo la vulnerabilidad a la escasez periódica de alimentos."
 high_farming: "Prosperidad agrícola diversificada"
 high_farming_desc: "La agricultura se convierte en una fuente de prosperidad, con una diversa gama de cultivos y ganado. Las técnicas agrícolas avanzadas, la adopción de tecnología y la diversificación agrícola conducen a una mayor productividad y bienestar económico. Esta etapa representa una sociedad con amplio acceso a una variedad de alimentos nutritivos, lo que contribuye a la salud y el bienestar general."
 higher_farming: "Agricultura modernizada"
 higher_farming_desc: ""
 higher_farming_tooltip: "§G¡Tendremos una agricultura moderna!§!"
 highest_farming: "Avance agrotecnológico"
 highest_farming_desc: "Representa el máximo nivel de desarrollo agrícola de una sociedad. Tecnologías avanzadas, agricultura de precisión y prácticas sostenibles se integran en el sector agrícola. La sociedad no solo logra la autosuficiencia alimentaria, sino que también contribuye a la seguridad alimentaria regional y mundial. Las innovaciones y la investigación agrícolas desempeñan un papel crucial en el mantenimiento de un sistema alimentario resiliente y productivo."
 poverty_development: "Tasa de pobreza"
 poverty_development_modifier_tooltip: "------------\n£development  Desarrollo económico: [?poverty_development_var|+1%]\n£development  Desarrollo económico mensual: [?modifier@poverty_development_monthly|=+1%]"
 lower_poverty: "Pobreza extrema"
 lower_poverty_desc: "Esta etapa representa el nivel más bajo de bienestar económico, con una proporción significativa de la población en situación de pobreza extrema. El ingreso promedio es mínimo y muchas personas tienen dificultades para satisfacer necesidades básicas como alimentación, vivienda y atención médica. La pobreza es generalizada y obstaculiza el desarrollo social en general."
 low_poverty: "Presión financiera"
 low_poverty_desc: "En este nivel, la sociedad enfrenta una presión financiera generalizada, con ingresos promedio insuficientes para garantizar un nivel de vida digno. Muchas personas enfrentan dificultades económicas, lo que limita su acceso a la educación, la atención médica y los servicios esenciales."
 medium_poverty: "Dificultades de ingresos moderadas"
 medium_poverty_desc: "Esta etapa refleja una situación en la que la mayoría enfrenta dificultades económicas moderadas. Si bien se desarrollan algunas actividades económicas, los ingresos promedio son modestos y una proporción significativa de la población experimenta dificultades para mantener una calidad de vida estable y satisfactoria."
 high_poverty: "Clase media creciente"
 high_poverty_desc: "La sociedad experimenta una transición a medida que las aspiraciones de la clase media comienzan a crecer. Los ingresos promedio muestran una mejora, lo que proporciona a un segmento más amplio de la población una situación financiera más cómoda. Sin embargo, las disparidades en la distribución del ingreso pueden persistir, lo que afecta la equidad social."
 higher_poverty: "Prosperidad y bienestar económico"
 higher_poverty_desc: "Esto representa la cima del bienestar económico, caracterizado por la prosperidad y el bienestar económico sostenidos. Los ingresos promedio alcanzan niveles que permiten a la mayoría de la población disfrutar de una alta calidad de vida. Las oportunidades de educación, atención médica y bienestar general son ampliamente accesibles, lo que contribuye a una sociedad próspera y equitativa."
 higher_poverty_tooltip: "§G¡Erradicaremos la pobreza!§!"
 highest_poverty: "Pobreza casi erradicada"
 highest_poverty_desc: ""
 industry_development: "Desarrollo industrial"
 industrial_development_modifier_tooltip: "------------\n£development  Desarrollo industrial: [?industrial_development_var|+1%]\n£development  Desarrollo industrial mensual: [?modifier@industrial_development_monthly|=+1%]"
 lower_industry: "Industria manual"
 lower_industry_desc: "Representa la etapa inicial de la industrialización, donde la producción es principalmente manual, utilizando herramientas manuales para la elaboración de productos. El nivel de mecanización es mínimo y las actividades económicas son generalmente de pequeña escala y localizadas."
 low_industry: "Artesanía mecanizada"
 low_industry_desc: "En esta etapa, se observa una transición hacia la mecanización, con la integración de maquinaria básica en la artesanía. Los talleres y las pequeñas industrias adoptan máquinas sencillas, mejorando la eficiencia y la producción. Sin embargo, la escala de la industrialización aún es limitada en comparación con etapas más avanzadas."
 medium_industry: "Manufactura intermedia"
 medium_industry_desc: "La sociedad experimenta un salto significativo en la industrialización, marcado por el surgimiento de industrias complejas. La maquinaria y las tecnologías avanzadas se generalizan, lo que conduce a la producción en masa de bienes. Se amplía el alcance de las industrias más allá de la artesanía básica, y los procesos de producción se estandarizan."
 high_industry: "Industria compleja"
 high_industry_desc: "Esta etapa se caracteriza por un alto grado de industrialización con una integración tecnológica avanzada en diversos sectores. Las industrias se vuelven más complejas, involucrando procesos de producción complejos y tecnologías especializadas. La economía se caracteriza por una amplia gama de industrias y se prioriza la investigación, el desarrollo y la innovación."
 higher_industry: "Industria moderna"
 higher_industry_desc: "En este nivel máximo de industrialización, la sociedad alcanza un estado de tecnología avanzada, automatización e industrias interconectadas. La industria moderna implica técnicas de fabricación de vanguardia, infraestructura de alta tecnología y un ecosistema económico sofisticado. La sociedad se caracteriza por la innovación, la eficiencia y una amplia gama de industrias especializadas que contribuyen a una economía altamente desarrollada y competitiva."
 higher_industry_tooltip: "§G¡Tendremos un desarrollo industrial moderno!§!"
 highest_industry: "Prácticas industriales innovadoras"
 highest_industry_desc: ""
 military_development: "Desarrollo militar"
 military_development_modifier_tooltip: "------------\n£development  Desarrollo militar: [?military_development_var|+1%]\n£development  Desarrollo militar mensual: [?modifier@military_development_monthly|=+1%]"
 lower_military: "Chusma desorganizada"
 lower_military_desc: "Este nivel representa una falta de estructura, disciplina y profesionalismo dentro de la fuerza militar. Las unidades o individuos en esta etapa pueden mostrar desorganización, falta de entrenamiento y una adherencia mínima a los protocolos establecidos."
 low_military: "Formación novata"
 low_military_desc: "En esta etapa, la fuerza militar comienza a tomar forma, con énfasis en el entrenamiento básico y la formación inicial. Las unidades de novatos se centran en inculcar disciplina, tácticas básicas y el cumplimiento de los protocolos militares. Sin embargo, aún pueden carecer de la experiencia y la competencia que se observan en etapas más avanzadas."
 medium_military: "Cohorte competente"
 medium_military_desc: "La fuerza militar alcanza un nivel de competencia, demostrando dominio de las habilidades básicas, comprensión táctica y cumplimiento de los estándares establecidos. En esta etapa, las unidades o individuos exhiben un mayor grado de profesionalismo, con énfasis en el trabajo en equipo, la comunicación efectiva y el dominio de las tareas militares esenciales."
 high_military: "Brigada experta"
 high_military_desc: "En este nivel, la fuerza militar ha alcanzado un alto grado de experiencia y especialización. Las unidades de la fuerza son capaces de ejecutar operaciones complejas con precisión, demostrando una competencia táctica avanzada y manteniendo un alto nivel de profesionalismo. Se prioriza la capacitación, la formación y la adaptabilidad continuas para anticiparse a los desafíos cambiantes."
 higher_military: "Vanguardia de élite"
 higher_military_desc: "La cúspide del desarrollo profesional militar, donde la fuerza se considera de élite y destaca en todos los aspectos. Este nivel implica el dominio no solo de la guerra convencional, sino también de operaciones especializadas como fuerzas especiales, ciberguerra e inteligencia. La fuerza militar en esta etapa es reconocida por su excepcional disciplina, pensamiento estratégico, adaptabilidad y profesionalismo a escala global."
 higher_military_tooltip: "§G¡Tendremos un desarrollo militar moderno!§!"
 highest_military: "Tácticas de guerra avanzadas"
 highest_military_desc: ""
 society_development: "Desarrollo social"
 society_development_modifier_tooltip: "------------\n£development  Desarrollo social: [?society_development_var|+1%]\n£development  Desarrollo social mensual: [?modifier@society_development_monthly|=+1%]"
 GER_gotterdammerung_society: "Götterdämmerung"
 GER_gotterdammerung_society2: "Götterdämmerung"
 GER_gotterdammerung_society3: "Götterdämmerung"
 lower_society: "Civilización caótica"
 lower_society_desc: "En esta etapa tumultuosa, la sociedad se enfrenta al desorden, carente de estructuras organizadas, tecnología avanzada y un gobierno eficaz. La supervivencia básica es la principal preocupación, con poco énfasis en la cohesión social o la planificación a largo plazo."
 low_society: "Sociedad corrupta"
 low_society_desc: "En medio del caos, la corrupción se ha arraigado, socavando las instituciones y erosionando la confianza social. La gobernanza se ve comprometida y los estándares éticos están en declive. El tejido social se ve afectado a medida que la corrupción permea diversas facetas de la vida pública, obstaculizando el progreso y fomentando el descontento."
 medium_society: "Integridad estabilizadora"
 medium_society_desc: "Reconociendo los desafíos de la corrupción y la erosión ética, la sociedad emprende esfuerzos para reconstruir la integridad. Se introducen reformas para abordar las debilidades institucionales, erradicar la corrupción y restaurar la confianza pública. El objetivo es sentar las bases para un sistema de gobernanza más transparente y responsable."
 high_society: "Prosperidad avanzada"
 high_society_desc: "En esta etapa, la sociedad experimenta avances significativos en desarrollo económico, tecnológico y bienestar social. Las instituciones se fortalecen, proporcionando un marco estable para el crecimiento. La educación y la innovación se convierten en ejes centrales, lo que conduce a una mejor calidad de vida, mayores oportunidades y una distribución más equitativa de los recursos."
 higher_society: "Sociedad moderna"
 higher_society_desc: ""
 higher_society_tooltip: "§G¡Tendremos una sociedad moderna!§!"
 highest_society: "Cúspide de la Civilización"
 highest_society_desc: "Representando el nivel más alto de civilización, esta etapa se caracteriza por tecnología avanzada, instituciones sólidas, riqueza cultural y un alto nivel de vida. La sociedad se convierte en líder mundial en diversos campos, contribuyendo a los avances en ciencia, arte y gobernanza. El enfoque se extiende más allá de la prosperidad económica hacia el desarrollo sostenible, la justicia social y la coexistencia armoniosa con el medio ambiente."
 mass_consumerism: "Consumismo masivo"
 mass_consumerism_desc: "\"Compramos cosas que no necesitamos con dinero que no tenemos para impresionar a gente que no nos agrada\".\n- Dave Ramsey"
 civilian_mobilization: "Economía civil"
 civilian_mobilization_desc: "\"La visión que el Gobierno tiene de la economía se podría resumir en unas pocas frases breves: si se mueve, hay que cobrarle impuestos; si sigue moviéndose, hay que regularla; y si deja de moverse, hay que subsidiarla\".\n- Ronald Reagan"
 early_mobilization: "Movilización temprana"
 early_mobilization_desc: "\"Ganará quien sepa cuándo luchar y cuándo no hacerlo\".\n- Sun Tzu"
 partial_mobilization: "Movilización parcial"
 partial_mobilization_desc: "\"Quiero recordarles que nuestro país también tiene diversos medios de destrucción. Y para proteger a Rusia y a nuestro pueblo, utilizaremos sin duda todos los medios a nuestra disposición\".\n- Vladímir Putin"
 war_mobilization: "Economía de guerra"
 war_mobilization_desc: "\"Es un hecho lamentable que sólo podamos garantizar la paz preparándonos para la guerra\".\n- John F. Kennedy"
 total_mobilization: "Movilización total"
 total_mobilization_desc: "\"Sólo los muertos han visto el fin de la guerra\".\n- George Santayana"
 jihad_mobilization: "Yihad"
 jihad_mobilization_desc: "\"Mientras yo viva, no habrá descanso para los enemigos del Islam\".\n- Osama bin Laden"
 permanent_mobilization: "Movilización permanente"
 permanent_mobilization_desc: "\"Nunca olvides que tu arma fue fabricada por el peor postor\".\n- Desconocido"

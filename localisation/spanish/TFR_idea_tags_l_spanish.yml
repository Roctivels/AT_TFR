 welfare_laws: "Leyes de bienestar"
 lower_welfare: "Sin prestaciones sociales"
 lower_welfare_desc: "\"Los niños necesitan amor y disciplina. Necesitan madres y padres. Un cheque de asistencia social no es un marido. El Estado no es un padre\".\n- Rush Limbaugh"
 low_welfare: "Prestaciones sociales mínimas"
 low_welfare_desc: "\"El programa de asistencia social más importante en América es un empleo\".\n- Newt Gingrich"
 medium_welfare: "Prestaciones sociales moderadas"
 medium_welfare_desc: "\"No debemos ignorar a los pobres, los discapacitados, los ancianos y los desempleados de nuestra sociedad. Se nos juzga por la forma en que ayudamos a los necesitados\".\n- Nelson Mandela"
 high_welfare: "Prestaciones sociales altas"
 high_welfare_desc: "\"La verdadera medida de cualquier sociedad se puede encontrar en cómo trata a sus miembros más vulnerables\".\n- Mahatma Gandhi"
 higher_welfare: "Estado del bienestar"
 higher_welfare_desc: "\"El objetivo del Gobierno es el bienestar del pueblo\".\n- Theodore Roosevelt"
 highest_welfare: "Pensiones estatales"
 highest_welfare_desc: "\"No preguntes qué puede hacer tu país por ti; pregunta qué puedes hacer tú por tu país\".\n- John F. Kennedy"
 tax_laws: "Leyes tributarias"
 lower_taxes: "Impuestos mínimos"
 lower_taxes_desc: "\"Los impuestos no son otra cosa que un robo organizado, y el concepto de un «impuesto justo» es, por lo tanto, tan absurdo como el de un «robo justo»\".\n- Murray Rothbard"
 low_taxes: "Impuestos bajos"
 low_taxes_desc: "\"Me gustaría electrocutar a todo aquel que utilice la palabra «justo» en relación con el impuesto sobre la renta\".\n- William F. Buckley"
 medium_taxes: "Impuestos moderados"
 medium_taxes_desc: "\"Los impuestos, después de todo, son cuotas que pagamos por los privilegios de ser miembros de una sociedad organizada\".\n- Franklin D. Roosevelt"
 high_taxes: "Impuestos altos"
 high_taxes_desc: "\"No es muy ilógico que los ricos contribuyan al gasto público, no sólo en proporción a sus ingresos, sino algo más que en esa proporción\".\n- Adam Smith"
 higher_taxes: "Impuestos extremos"
 higher_taxes_desc: "\"¿Cuál es la diferencia entre un taxidermista y un recaudador de impuestos? El taxidermista sólo te quita la piel\".\n- Mark Twain"
 lower_trade: "Economía cerrada"
 lower_trade_desc: "\"Deben ser conscientes de que la guerra moderna no es una mera cuestión de operaciones militares. Implica toda la fuerza y recursos de la nación\".\n- Chiang Kai-shek"
 low_trade: "Exportaciones limitadas"
 low_trade_desc: "\"Lo que nos enseña el proteccionismo es que debemos hacernos en tiempos de paz lo que los enemigos intentan hacernos en tiempos de guerra\".\n- Henry George"

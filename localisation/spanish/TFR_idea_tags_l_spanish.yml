 lower_immigration: "Fronteras cerradas"
 lower_immigration_desc: "\"La inmigración es guerra\".\n- Eric Zemmour"
 low_immigration: "Regulación alta"
 low_immigration_desc: "\"Nuestro país, nuestro pueblo, y nuestras leyes deben ser nuestra máxima prioridad\".\n- Donald Trump"
 medium_immigration: "Regulación moderada"
 medium_immigration_desc: "\"Es incorrecto y contraproducente que una nación de inmigrantes permita el tipo de abuso de nuestras leyes de inmigración que hemos visto en los últimos años, y debemos hacer más para detenerlo\".\n- Bill Clinton"
 high_immigration: "Regulación baja"
 high_immigration_desc: "\"Dadme a vuestros rendidos, a vuestros pobres, vuestras masas hacinadas anhelando respirar en libertad, el desamparado desecho de vuestras rebosantes playas\".\n- Emma Lazarus, \"El Nuevo Coloso\""
 higher_immigration: "Fronteras abiertas"
 higher_immigration_desc: "\"El será para ustedes como uno de sus compatriotas y lo amarás como a ti mismo, porque ustedes fueron extranjeros en Egipto\".\n- Levítico 19:34"
 safety_laws: "Derechos laborales"
 lower_safety: "Derechos semi-esclavistas"
 lower_safety_desc: "\"Siempre que oigo a alguien defender la esclavitud, siento un fuerte impulso de ver que se la apliquen personalmente\".\n- Abraham Lincoln"
 low_safety: "Derechos laborales mínimos"
 low_safety_desc: "\"El capital es trabajo muerto que, como un vampiro, sólo vive chupando trabajo vivo, y vive tanto más cuanto más trabajo chupa\".\n- Karl Marx"
 medium_safety: "Derechos laborales limitados"
 medium_safety_desc: "\"No puedo evitar enojarme sólo al pensar en los sindicatos\".\n- Margaret Thatcher"
 high_safety: "Derechos laborales aceptables"
 high_safety_desc: "\"Sólo un tonto intentaría privar a los trabajadores y trabajadoras de su derecho a afiliarse al sindicato de su elección\".\n- Dwight D. Eisenhower"
 higher_safety: "Derechos laborales excelentes"
 higher_safety_desc: "\"El movimiento obrero no puede quedarse quieto. No debe retroceder. Debe continuar, o desaparecer. La palabra más importante en el vocabulario de la clase obrera es «solidaridad»\".\n- Harry Bridges"

 BLR_Rising_Zmagars_idea: "Zmagars emergentes"
 BLR_Rising_Zmagars_idea_desc: "Los liberales (apodados como zmagars), insatisfechos con el régimen de Lukashenko \"literalmente soviético\", han empezado a alzar discretamente las voces en desacuerdo con la forma correcta de hacer las cosas con muchos adolescentes, quienes nunca vieron los horrores de al recesión económica de los años 90, acudiendo a ellos, con promesas de una democracia occidental y el estilo de vida estadounidense. Por supuesto, ellos no tienen la habilidad para influenciar a toda o gran parte de la población bielorrusa, pero si pasan inadvertidos, pueden llevar a una terrible y trágica sucesión de eventos."
 BLR_Lukashenkonomics_idea: "Lukashenkonomía"
 BLR_Lukashenkonomics_idea_desc: "El modelo económico bielorruso es especial entre sus compañeros post-soviéticos. A diferencia de todos los demás, cuyas bases económicas soviéticas fueron destrozadas por \"emprendedores\", privatizadas y aniquiladas por la terapias de choque. Bielorrusia bajo Lukashenko, impidió que esto sucediera. Hasta el día de hoy, Bielorrusia ha tenido un gran sector estatal que proporciona crecimiento industrial, granjas colectivas de alimentos ajenos a la optimización empresarial, y sindicatos que juegan un papel importante en los asuntos económicos del país. Por supuesto, existe propiedad privada controlada, pero apenas tienen importancia en el control político del país. Lo que Lukashenko ha construido no es de ninguna forma socialismo, pero es lo más cercano que uno puede encontrarse en la Europa Oriental post-comunista."
 BLR_Lukashenko_rule_idea: "Autocracia de Lukashenko"
 BLR_Lukashenko_rule_idea_desc: "\n\n\n\n£GFX_BLR_Lukashenko_rule\n\n\n\n\n\nPor décadas, Aleksandr Lukashenko ha gobernado Bielorrusia como un autócrata indiscutido. No hubo nadie quien le plantara cara, ni lo hay ahora. Si Lukashenko mira a algún ministro holgazaneando, no se lo pensará dos veces para destituirlo. Las industrias privadas que no tienen en cuenta a los sindicatos son estatizadas sin previo aviso. Los gabinetes van y vienen, pero él sigue ahí para cambiarlos. Dicho método ha demostrado ser popular entre el trabajador promedio de la población, quien busca por encima de todo orden y estabilidad."
 BLR_Democratization_of_Belarus_idea: "Democratización de Bielorrusia"
 BLR_Democratization_of_Belarus_idea_desc: "¡Con el tirano fuera podemos finalmente liberar Bielorrusia de su opresiva y prorrusa administración! !Nuestra misión está clara - reformas de libre mercado, prohibir la lengua rusa, elecciones liberales y la membresía de la UE y la OTAN!"
 BLR_Crushing_Zmagar_Opposition_idea: "Aplastar a la oposición zmagar"
 BLR_Crushing_Zmagar_Opposition_idea_desc: "Estas oenegés han demostrado ser una amenaza para la soberanía bielorrusa y nuestra forma de vida.\nQuizás hemo sido demasiado indulgentes...\nBueno, pues ya no."
 BLR_Dawn_of_Red_Belarus_idea: "Amanecer de la Bielorrusia Roja"

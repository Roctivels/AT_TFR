 BLR_Kommunarka_april_fools_desc: "Nuestro condimento... La humanidad no puede funcionar sin azúcar, esta es la debilidad de la carne. Monopolizando la producción de dulces, inevitablemente seremos capaces de alcanzar los objetivos puestos por nuestro Gran Líder Supremo Autócrata Lykashenko, y conquistar no solo el espacio post-soviético, sino toda Europa.\n\nReservas de Kommunarka: §Y[?BLR_candies_april_fools_var] §!£ GFX_Kommunarka_candy\n\n"

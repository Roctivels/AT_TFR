 belarus.1.t: "¡Resultados electorales!"
 belarus.1.d: "Al cierre de las urnas, se declaró que Lukashenko había obtenido el 80% de los votos, según un recuento preliminar. A pesar de estos increíbles resultados, manifestantes y policías antidisturbios se han enfrentado en Minsk, la capital de Bielorrusia, y en otras ciudades, después de que un sondeo a pie de urna de la televisión estatal dijera que el por mucho tiempo líder Alexander Lukashenko había sido reelegido en las elecciones del domingo. Pero el principal líder de la oposición se ha negado a reconocer los resultados. Los resultados preliminares le otorgan el 9,9% de los votos, pero su campaña afirmó que en algunas zonas había obtenido entre el 70% y el 80%. Tikhanovskaya se presentó a las elecciones en sustitución de su marido encarcelado y encabezó grandes mítines de la oposición."
 belarus.1.a: "¡Traidores y provocadores occidentales!"
 belarus.666.t: "Ascenso de Lykashenko"
 belarus.666.d: "Para poner April fools en Tea afar"
 belarus.666.a: "Vivimos en la censura en internet."
 belarus.667.t: "Ucrania crea la OTAN 2"
 belarus.667.d: "Mi querida ucranidad, prometí *bufa* que entraríamos en la OTAN. ¡Pero la OTAN no quiso!\nPero no se preocupen, he creado la OTAN PORQUE *resopla más*\nSlava Uhraini"
 belarus.667.a: "Qué."
 belarus.668.t: "Kommunarka orquesta un golpe de Estado proliberal en Rusia"
 belarus.668.d: "¡Justo como lo habíamos planeamos! Ahora es el momento de nuestras fuerzas de paz..."
 belarus.668.a: "Bielorrusia crecerá."
 belarus.669.t: "Tanque bielorrusos en Moscú"
 belarus.669.d: "Tras protestas masivas en Rusia por la escasez de dulces Kommunarka, y con el posterior derrocamiento del Gobierno ruso, autoridades bielorrusas han tomado decisiones drásticas para empezar operaciones de mantenimiento de la paz en Rusia. Miles de hombres y vehículos armados han cruzado la frontera e iniciaron la pacificación del territorio ruso.\nLykashenko ha proclamado que no había un mejor momento para proclamar el Estado de la Unión que ahora. Las preparaciones finales están en marcha.\nEsto cambiará Eurasia para siempre, muchos se preocupan que Bielorrusia no se detenga, al parecer que tengan la tarjeta trampa definitiva en la forma de la Fabrica de Dulces, y sus sabrosos productos."
 belarus.669.a: "Estabilidad restaurada."
 news.176.t: "Protestas en Bielorrusia"
 news.176.d: "Abusos \"masivos\" de los derechos humanos y tortura han sido denunciados en Bielorrusia por una organización de monitoreo electoral, que reclama la repetición de las elecciones presidenciales ocurridas en el país el pasado Agosto, en las que el presidente Aleksandr Lukashenko fue proclamado vencedor. Según un informe publicado el jueves por la Organización de Cooperación y Desarrollo en Europa (OCDE), fueron encontradas violaciones de los derechos humanos \"de manera masiva, sistemática, y fuera de toda duda\".\nLa votación no fue \"ni transparente, ni libre, ni justa\" y han recomendado anular los resultados \"debido a irregulares en todas las fases del proceso\", instando a Bielorrusia a \"organizar unas nuevas elecciones genuinas y basadas en estandares internacionales\". Lukashenko reclamo la victoria electoral, pero decenas de miles de protestantes de la oposición han tomado las calles desde entonces en señal de protesta."
 news.176.a: "Muy preocupante."
 news.177.t: "¡Tanques rusos marchan hacia Minsk!"
 news.177.d: "Mientras las Protestas Anti-Lukashenko en Bielorrusia continúan saliendo de control, se ha dado una situación inédita cuando fuerzas Rusas han marchado hacia Bielorrusia y han comenzado a apoyar al gobierno a reprimir forzosamente las protestas.\nTanques fueron avistados cruzando la autopista E30, y helicópteros Rusos han sido observados en varias ciudades, causando el caos entre Bielorrusos en las carreteras. Estos han sido incidentes menores, sin embargo, ya que grandes luchas han sido reportadas entre manifestantes y policía, ahora apoyada por tanques Rusos. Aunque Lukashenko esperaba que la intervención Rusa ayudase a acabar con las protestas que asolan su país, el descontento civil se ha apoderado de la población con muchos ciudadanos irritados por la presencia de fuerzas extranjeras en suelo Bielorruso. Algunos observadores piensan que tras este movimiento Minsk está bajo el control absoluto de Putin como un títere de sus ambiciones."
 news.177.a: "El oso ruso ruge sobre Europa Oriental."
 news.178.t: "Rusia sufre nuevas sanciones"
 news.178.d: "Como si de un equipo de natación sincronizada geopolítico se tratase, varios Estados occidentales, principalmente compuestos por miembros de la OTAN han decretado hoy un nuevo paquete de sanciones hacía Rusia tras su sangrienta intervención llevada a cabo en Bielorrusia. Dichas sanciones están dirigidas hacia varios oficiales rusos clave afiliados con corporaciones estatales rusas estratégicamente relevantes. Con la economia rusa siendo afectada por sanciones varias desde mediados de los años 2010, muchos se preguntan cómo podrá lidiar la Federación de Rusia con la presión añadida por el endurecimiento de las sanciones occidentales. El Kremlin ya se ha pronunciado al respecto, condenando las sanciones como \"una forma de imperialismo unilateral occidental\"."
 news.178.a: "Una bofetada a la democracia."

 saudi.1.t: "Salman fue ingresado al hospital"
 saudi.1.d: "A primera hora de la mañana, el Rey fue visitado por su médico personal debido a unos repentinos problemas respiratorios y dolores de espalda. Según él, los problemas respiratorios habían comenzado varias semanas antes y habían empeorado desde entonces. El médico no tardó en determinar que estaba infectado con COVID-19. Se está siguiendo de cerca la información al respecto, que se hará pública más adelante."
 saudi.1.a: "Oremos por el Rey."
 saudi.2.t: "Estado de la guerra en Yemen"
 saudi.2.d: "Se ha hecho bastante evidente que este conflicto no tiene un final seguro en los próximos cinco años. Nuestros oponentes hutíes han vencido a nuestros hombres con AKs de 40 años de antigüedad. Aunque nuestras recientes ofensivas han fracasado, seguimos decididos y dispuestos a luchar."
 saudi.2.a: "Más hombres más armas."
 saudi.3.t: "La salud de Salman empeora"
 saudi.3.d: "Se avecina una gran incertidumbre. El Rey Salman ha sido llevado a urgencias por graves problemas respiratorios. Parece que COVID se ha extendido significativamente a través de su sistema. Rezamos para que se recupere, aunque parezca que sólo hay un resultado plausible."
 saudi.3.a: "Oremos por el Rey."
 saudi.4.t: "El Rey Salman ha muerto"
 saudi.4.d: "Hoy, la nación saudita llora la pérdida de su monarca.\n\nEsta mañana, el rey Salmán bin Abdulaziz al Saúd ha fallecido a la edad de 85 años debido a complicaciones poco después de haber dado positivo en la prueba de COVID-19. Aunque esta fatalidad se había anticipado con temor durante los últimos años, su llegada ha sido una conmoción para la nación. Diversas declaraciones de la familia real y de personas influyentes han hablado con cariño del Rey, lamentando su vida y su liderazgo del país. Numerosos líderes extranjeros ya han enviado sus condolencias por su prematuro fallecimiento, y el príncipe heredero Mohamed bin Salmán ha pronunciado unas sentidas palabras sobre la muerte de su padre, deseando honrar su memoria.\n\nMientras continúan los funerales y las oraciones en todo el reino, el ambiente es solemne. Sin embargo, el fallecimiento del rey ha comenzado a poner en marcha ciertas cosas; la más apremiante, una crisis sucesoria demasiado familiar. En el trasfondo, varios príncipes han empezado a correr la voz entre varios miembros de cargos importantes y otros miembros de la familia real. A medida que la crisis de sucesión empieza a asomar la cabeza y el tiempo de luto llega a su fin, los enemigos de Mohammed han aprovechado la oportunidad para sembrar la discordia entre el líder de facto del reino. Es probable que este proceso continúe incluso después de la coronación del nuevo rey."
 saudi.4.a: "Dios, ayúdanos"
 saudi.5.t: "Salmán bin Abdulaziz bin Salman al Saúd hallado muerto"
 saudi.5.d: "¡Nuestro joven príncipe se ha encontrado con un destino terrible! Mientras jugaba al popular MMO DOTA 2, un hombre armado irrumpió en su habitación y le disparó a quemarropa con un rifle."
 saudi.5.a: "Una rata menos con la que lidiar"
 saudi.6.t: "Coronación de Mohamed bin Salmán"
 saudi.6.d: "Al finalizar el periodo oficial de luto por la muerte del rey Salman, comienza ahora un periodo de celebración en Riad: su hijo, el príncipe Mohammed, asciende al trono saudita como rey Mohammed, el octavo gobernante de una Arabia Saudita unida. Su coronación representa una nueva era en la política saudita; durante casi setenta años, el trono saudita había estado gobernado por los cada vez más ancianos hijos del primer rey, Ibn Saud. Pero con todos los hijos muertos o inhabilitados para la sucesión, corresponde gobernar a la nueva generación.\n\n El asunto se complica aún más por la reputación de Mohammed. Desde que consolidó su posición, ha supervisado una campaña de represión contra la familia real, purgando a tíos y primos acusados de traición y corrupción. Pocos dudan de lo lejos que ha llegado para conseguir el trono, pero a muchos les preocupa lo lejos que llegará para aferrarse a él.\n\n El rey ha muerto, larga vida al rey."
 saudi.6.a: "La disidencia contra el rey será aplastada."
 saudi.6.b: "Hay que formar una coalición para derrocar a este déspota corrupto."
 saudi.6.c: "¡Arabia debe ser liberada de este monarca!"
 saudi.7.t: "Protesta de los Príncipes"
 saudi.7.d: ""
 saudi.7.a: "¡Consigue tu propia monarca!"
 saudi.8.t: "Las CMP intentan detener a Mohammed"
 saudi.8.d: "Nuestras fuerzas no lograron neutralizar ayer al príncipe corrupto Muhammad bin Nayef. A pesar de haber invertido miles de dólares en empresas militares privadas, no han conseguido el resultado deseado. 8 hombres armados entraron en la residencia de Bin Salman al amparo de la oscuridad y se enzarzaron en un tiroteo con un en la seguridad privada del propio Salman, antes de retirarse tras fracasar en su intento de penetrar las defensas del residente.\n\n Desgraciadamente, esto ha atraído las miradas del mundo, y muchos comentaristas internacionales exigen sanciones en respuesta a la supuesta \"supresión de la oposición política\". Afortunadamente, nuestro equipo de relaciones públicas se ha puesto manos a la obra y ha comentado que ese intento de asesinato era una \"señal inequívoca de que Alá desea su muerte\"."
 saudi.8.a: "Esos bastardos..."
 saudi.9.t: "Rebelión de los príncipes"
 saudi.9.d: "A pesar de nuestros continuos esfuerzos de estabilización política, nuestro país ha caído en el caos de la Guerra Civil. Los traidores Muhammad bin Nayef y Ahmed bin Abdulaziz han iniciado una rebelión abierta en el sur del país, formando \"el Consejo Real Árabe\" en su propio intento de hacerse con el trono. En el norte, las facciones liberales y juveniles han iniciado su propia rebelión, con una sospechosa cantidad de armas suministradas por Israel en su poder. Mientras tanto, han estallado protestas en La Meca con rumores de un posible levantamiento yihadista, aunque estamos haciendo todo lo posible por mantener la zona bajo control. Rompiendo el gran banco de riqueza que posee la familia real saudita, haremos todo lo que esté en nuestra mano para restablecer el orden civil."
 saudi.9.a: "Que Dios nos ayude..."
 saudi.10.t: "Los yihadistas se organizan en La Meca"
 saudi.10.d: ""
 saudi.10.a: "¡Más ovejas al matadero!"
 saudi.10.b: "Somos guerreros de Alá"
 saudi.11.t: "Las milicias chiíes se organizan"
 saudi.11.d: ""
 saudi.11.a: "¡Más ovejas al matadero!"
 saudi.12.t: "Rusia sigue desafiante con el petróleo"
 saudi.12.d: ""
 saudi.12.a: "Reducir el precio del petróleo e inundar el mercado."
 saudi.18.t: "Aahya Assiri regresa a Arabia Saudita"
 saudi.18.d: "Yahya Assiri, exiliado político y activista de derechos humanos, ha regresado a Arabia Saudita tras los disturbios civiles que han comenzado recientemente. Ex piloto de la Fuerza Aérea saudita, solicitó asilo político en el Reino Unido tras la detención de varios destacados miembros de la Asociación Saudita de Derechos Civiles y Políticos.\n\n Su regreso al país ha suscitado una amplia controversia: los jóvenes liberales lo elogian y lo reciben con los brazos abiertos, mientras que los conservadores lo tachan de traidor y espía occidental.\n\n Con su regreso, Assiri ha anunciado que se comprometerá con los ideales de la no violencia, aunque muchos de los miembros de nuestra administración cuestionan hasta qué punto esas promesas son realmente ciertas."
 saudi.18.a: "Otro Charlatán."
 saudi.19.t: "Golpe de Estado fallido de la CMP"
 saudi.19.d: ""
 saudi.19.a: "¡Por los pelos!"
 saudi.24.t: "Safar al-Hawali denuncia al Rey"
 saudi.24.d: "Safar al-Hawali, destacado erudito islámico y líder del movimiento Sahwah, ha denunciado esta tarde al príncipe heredero Mohamed bin Salmán. Calificándolo de \"marioneta israelí\", ha continuado con sus demandas de retirada de las tropas estadounidenses y de las influencias culturales de la península arábiga. Esto se produce en un momento en que las divisiones políticas desgarran el país, con los muchos observadores internacionales observando una posible guerra civil.\n\n Israel ha emitido un comunicado en el que condena las declaraciones de Hawali y exige una disculpa por \"difundir teorías conspiratorias antisemitas\".\n\n Muchos partidarios de Hawali parecen estar movilizándose para preparar una \"gran yihad contra Occidente\", ya que el extremismo religioso y el faccionalismo amenazan con desgarrar el país de raíz."
 saudi.24.a: "El viejo necesita descansar."
 SAU_civil_war_preparations: "Preparación para la Guerra Civil"
 SAU_civil_war_preparations_desc: "Crece la disidencia interna contra Mohamed bin Salmán a pesar de su autoridad legal para suceder a Salman Abdulaziz. Tras la muerte del Rey han surgido facciones de la oposición que parecen coludirse para derrocar a Mohamed. El regreso de Yahya Assiri tampoco ha calmado la situación, ya que los liberales también han empezado a organizarse y a extender su influencia. Los regimientos ignoran las órdenes, no se atienden las peticiones de refuerzos y se registran movimientos extraños. Sólo hay una posibilidad..."

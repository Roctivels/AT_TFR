 spirit_of_allen_spirit: "Espíritu de Allen"
 spirit_of_allen_spirit_desc: "Ethan Allen lideró a los famosos Green Mountain Boys a muchas victorias, y eventualmente, les llevo a los anales de la historia con el legendario estatus de protectores del estado de Vermont."
 AOF_BOP: "Consejo Asociativo de Ciudades Libres"
 AOF_BOP_desc: "El Consejo Asociativo de Ciudades Libres, o Asociación de los Libres, es un grupo representativo de ciudades autogobernadas ubicado entre Vermont y Nuevo Hampshire, esas \"ciudades\" varían desde gobiernos de pequeños pueblos hasta grupos de agricultores y alcaldes autodisciplinados con poderes casi dictatoriales. El más grande de estos grupos es el Colectivo Anarquista de Green Mountain, una gran extensión de comunas anarquistas en Vermont bajo el liderazgo de David van Deusen. En oposición a las ideas anarquistas del colectivo, varios pueblos han jurado lealtad a los Hijos de la Libertad, un gran grupo miliciano que lucha por los valores libertarios, establecido principalmente en Nuevo Hampshire.\n\nLos representantes son enviados a votar las legislaciones presentadas por cualquier pueblo, pero con la consolidación del poder de estos dos grupos, las divisiones en el consejo se están haciendo cada vez más presentes, y la neutralidad política de los pequeños pueblos esta siendo cuestionada por fuerzas mayores."

 GMC_Concord_Pact_idea: "Pacto de Concord"
 GMC_Concord_Pact_idea_desc: "El Pacto de Concord, firmado entre la Compañia de Green Mountain y la Milicia de los Hijos de la Libertad, es un acuerdo de defensa mutua y cooperación entre ambas facciones.\n\nLa Compañia de Green Mountain, desesperada por reclutas después de que su contrato gubernamental fuera incumplido, recurrió a la rama armada del Partido Libertario, los Boogaloo Boys. Esta conexión con el Partido Libertario ha fortalecido los lazos entre la Compañia de Green Mountain y los Hijos de la Libertad, convirtiéndolos en una alianza casi hermética, con un desacuerdo crítico entre los dos...\n\nEl Colectivo Anarquista de Green Mountain y esta supuesta \"Asociación de los Libres\"..."
 AOF_Association_of_the_Freed_idea: "Asociacion de los Libres"
 AOF_Association_of_the_Freed_idea_desc: "El Consejo Asociativo de Ciudades Libres, o Asociación de los Libres, es un grupo representativo de ciudades autogobernadas ubicado entre Vermont y Nuevo Hampshire, esas \"ciudades\" varían desde gobiernos de pequeños pueblos hasta grupos de agricultores y alcaldes autodisciplinados con poderes casi dictatoriales. El más grande de estos grupos es el Colectivo Anarquista de Green Mountain, una gran extensión de comunas anarquistas en Vermont bajo el liderazgo de David van Deusen. En oposición a las ideas anarquistas del colectivo, varios pueblos han jurado lealtad a los Hijos de la Libertad, un gran grupo miliciano que lucha por los valores libertarios, establecido principalmente en Nuevo Hampshire.\n\nLos representantes son enviados a votar las legislaciones presentadas por cualquier pueblo, pero con la consolidación del poder de estos dos grupos, las divisiones en el consejo se están haciendo cada vez más presentes, y la neutralidad política de los pequeños pueblos esta siendo cuestionada por fuerzas mayores."
 AOF_Memories_of_the_old_GMAC_idea: "Colectivos preexistentes"
 AOF_Memories_of_the_old_GMAC_idea_desc: "Siguiendo la historia de nuestros colectivos a inicios de los años 70, las principales ideas del Colectivo Anarquista de Green Mountain han existido por décadas y han afectado en gran medida a las políticas de Vermont."
 AOF_Anarchist_Occupation_idea: "Casi ocupación"
 AOF_Anarchist_Occupation_idea_desc: "Nuestra banda de anarquistas mantiene una gran porción de tierra, pero como cualquier grupo anarquista, nuestra autoridad depende en gran medida del emplazamiento de ejércitos locales. Sin estos ejércitos para garantizar la paz, cualquier mísero tirano puede fácilmente reunir suficientes hombres corruptibles para imponer su voluntad sobre la voluntad del pueblo."
 FAA_Memories_of_Grafton_idea: "Recuerdos de Grafton"
 FAA_Memories_of_Grafton_idea_desc: "En Grafton, debido a la intervención del Gobierno, la totalidad de las ideas de un Gobierno libertario fueron despreciadas por el público."
 FAA_Concord_Pact_idea: "Pacto de Concord"
 FAA_Concord_Pact_idea_desc: "El Pacto de Concord, firmado entre la Compañia de Green Mountain y la Milicia de los Hijos de la Libertad, es un acuerdo de defensa mutua y cooperación entre ambas facciones.\n\nLa Compañia de Green Mountain, desesperada por reclutas después de que su contrato gubernamental fuera incumplido, recurrió a la rama armada del Partido Libertario, los Boogaloo Boys. Esta conexión con el Partido Libertario ha fortalecido los lazos entre la Compañia de Green Mountain y los Hijos de la Libertad, convirtiéndolos en una alianza casi hermética, con un desacuerdo crítico entre los dos...\n\nEl Colectivo Anarquista de Green Mountain y esta supuesta \"Asociación de los Libres\"..."

 CAC_connect_our_country_mission_desc: "Mientras deseamos dar guerra a la columna modernista, no podemos negar el impacto negativo que la guerra civil ha tenido en nuestra gente y nuestra tribu. Por toda la nación hay gente sin comida, sin agua y sin refugio, algo que no podemos ignorar. Nos enfocaremos en conectar un país y en construir un sistema nacional de carreteras y garantizar a nuestro pueblo sus bienes de primera necesidad. Todos los caminos llevarán a la nueva Roma."
 CAC_destroy_modernity_mission: "§YMisión nacional§!: Destruir la modernidad"
 CAC_destroy_modernity_mission_desc: "Finalmente ha llegado el momento de deshacernos de la plaga modernista de una vez por todas. Realizaremos reclutamiento masivos de todos los hombres aptos para el ejército, asegurando de que nuestro pueblo tenga el poder y la voluntad para llevar a nuestra tribu a la gloria. Destruiremos a los falsos ídolos que habitan en las ciudades, los palpitantes corazones de la degeneración y la decadencia. Y nos aseguraremos de que todo hombre, mujer y niño conozca los males de la cultura modernista por todos los medios necesarios."

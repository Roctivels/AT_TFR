 cac.38.t: "Visitar la ciudad de Nueva York"
 cac.38.d: "Me juré a mí mismo que nunca volvería a este crisol de meados de vagabundos gordos y carne misteriosa, incluso ahora me estremezco cuando pienso en las torres de hormigón que se elevan a los cielos, cada una de ellas una torre de Babilonia que intenta alcanzar la divinidad, una guarida de serpientes donde nadie se sonríe de verdad, todos ellos pequeñas criaturas miserables que arrastran a los demás a la repugnante piscina de mierda y plástico.\n\nSin embargo las circunstancias son diferentes ahora, pensé que estaría aquí en contra de mi voluntad, que sería arrastrado aquí esposado enfrentándome a una pena de muerte o a escapar tras una operación fallida. No, estoy aquí como los conquistadores de antaño que acaban de derrotar a su mayor adversario, después de cada ciudad tomada saqueaban lo que era valioso e incendiaban la colmena urbana, sin embargo las ciudades de antaño al menos tenían algo que merecía la pena conservar, esto sin embargo es una de las muchas lápidas de una civilización antaño muerta.\n\nComo un león hambriento que se deshace en lágrimas ante la idea de clavar sus colmillos en el cuello de su presa, estoy igual de hambriento por infligir una larga y terrible tortura a este lugar maldito. Nada será saqueado, todo será destruido, prenderemos fuego a toda la ciudad, habrá un nueve-once cada hora en cada rascacielos, cada farola será decorada con nuestros enemigos hinchados, cada túnel de metro se derrumbará mientras el océano reclama su territorio perdido hace tiempo, espero que el agua salada pueda lavar cada pecado de cada neoyorquino que haya caminado por allí, todos los explosivos se utilizarán en el infierno de hormigón.\n\nCohetes, granadas, cócteles molotov, napalm y aviones llenos de mártires, todo lo que pueda contribuir a la aniquilación total de la ciudad de Nueva York será utilizado, durante demasiado tiempo esta repugnante ciudad ha echado sus raíces en nuestra hermosa Tierra, quemar, destruir y mutilar hasta que no quede ni una sola prueba de que alguna vez hubo una ciudad, cubrir la tierra quemada con sal, los hipsters pueden llorar, los gordos retrasados pueden llorar, el mundo entero puede mirar en estado de shock, no me importa y tampoco a mi tribu.\n\nMi camino me ha llevado a esto, el clímax de mi camino hacia la aceleración, sin piedad, sin frenos. Y he aquí que el icono definitivo del pecado moderno arde en llamas, pero no se detendrá aquí, cada prueba que podamos encontrar de la existencia de la ciudad de Nueva York será borrada de los registros públicos, periódicos, libros y monumentos que insinúen remotamente su antigua existencia se desmoronarán por la fuerza combinada del fuego y el acero.\n\nY después de eso, con el tiempo suficiente, la suciedad histórica habrá desaparecido de nuestras mentes, nuestros hijos no conocerán nada mejor y el mundo podrá suspirar aliviado, sabiendo que uno de los muchos quistes explosivos de la modernidad ha desaparecido, para siempre será conocido como la lápida de la modernidad.\n\nY no podría estar más contento."
 cac.38.a: "Soy el fuego del mundo, soy el mundo ardiendo."
 cac.39.t: "Saqueando la ciudad dorada"
 cac.39.d: "\"¡Amigo, me encanta el ajetreo de la gran ciudad! Es tan dinámico y me hace sentir como si estuviera en uno de esos programas de televisión\"\".\n\nSan Francisco tiene muchos de esos, y aunque puedo entender a los miles de vagabundos (que huelen a mierda, por cierto) que hablan de lo increíble que es San Francisco, también tienes al típico habitante urbano que se emociona demasiado por vivir en un sumidero social constante, en serio, se emocionan por la mierda humana untada en la pared de un Starbucks local porque es \"¡tan auténtico ohmagash!\".\n\nUno de los peores lugares donde puedes estar en esta ciudad sin embargo es el distrito de Castro, puedo recordar cuando era niño que después de cada periodo de lluvia, el sol brillaba intensamente, causando la aparición de un arco iris, los colores de este eran hermosos, la naturaleza es la mayor artista después de todo.\n\nBueno, aquí veo arco iris por todas partes y es feo más allá de la creencia, no estoy bromeando estas personas no entienden la estética en absoluto y sólo mancha de colores brillantes en todas partes, esto solía ser un barrio de los trabajadores en el pasado, pero ahora es una garantía de ETS fuckfest, es repugnante.\n\n¿Saben lo que alegraría este lugar? Fuego, mucho fuego, a pesar de todo su colorido este lugar parece apagado y con una buena cantidad de armas incendiarias este distrito será una de las hogueras más grandes jamás vistas, ¿y después de que todo esté dicho y hecho?\n\nPlantaremos los hermosos árboles en la fresca tierra fértil, la madera se abrirá paso entre los escombros de hormigón y todos los colores artificiales serán sustituidos por el verde incontestable de la madre naturaleza.\n\nVoy a tener que lavarme durante al menos cuarenta horas, incluso después de incendiar el lugar sigo sintiéndome asqueroso."
 cac.39.a: "El humo cubre el arcoíris."
 cac.40.t: "Preocupantes noticias desde la frontera entre Oregón y California"
 cac.40.d: "Informes recientes de oficiales a lo largo de la frontera más meridional han informado de preocupantes señales de advertencia de una posible invasión por parte del Ejército Popular de Liberación Americano. Las fuerzas estacionadas a lo largo del sur de Oregón han avistado varias columnas de soldados del EPLA realizando ejercicios de entrenamiento, y los guardias locales han observado que se están acumulando fuerzas enemigas a lo largo de la frontera. Dada esta información, nuestro alto mando ha llegado unánimemente a la conclusión de que una invasión es inminente. Casi inmediatamente después de recibir la noticia, muchos de nuestros generales han comenzado los preparativos para una invasión inminente, y varios grupos de milicianos, de todas las lealtades, han decidido dejar de lado sus diferencias y unirse. Tras posicionarse en todo el sur de Oregón, parece que se están preparando para librar una guerra de guerrillas.\n\nSi los rumores son ciertos, tendremos que asegurarnos de que paguen hasta el último centímetro de nuestra patria antes de que nos destruyan."
 cac.40.a: "Que esos bastardos lo intenten."

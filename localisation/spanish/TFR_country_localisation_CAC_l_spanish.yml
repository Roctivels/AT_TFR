 cac.22.t: "Arquitectura del acoso"
 cac.22.d: "Cuando pisé por primera vez una de las muchas colmenas urbanas no me sorprendió el asco, durante años hice todo lo posible por evitar estas semillas urbanas que crecerían hasta convertirse en un sumidero de conductas de hormigón como la ciudad de Nueva York.\n\nPor supuesto, los últimos acontecimientos me han forzado, ya que el cadáver putrefacto de los Estados Unidos está entrando en su fase de necrosis explosiva y sería cuestión de tiempo que los buitres empezaran a pulular sobre él, ansiosos por arrancarle lo que más le nutra. Tengo la intención de ser uno de esos buitres.\n\nObservando la colmena llamada Seattle, los tumores eran abundantes y esperados. La delincuencia y el hedonismo estaban presentes allá donde miraras, los extranjeros destruían los pocos hitos culturales que había y, por supuesto, los parásitos ideológicos desfiguraban nuestra otrora gran nación.\n\nPor no hablar de las torres de marfil que intentaban perforar los cielos, las bolsas de basura, un vagabundo vomitando o ballenas de pelo azul gritando en público y, por supuesto, un árbol cualquiera aquí y allá, porque hasta el urbanista más psicópata se da cuenta de que el Hombre necesita a la Naturaleza, pero incluso eso piensan eliminarlo, en aras del control.\n\nPero no todo es culpa de ellos, igual que los pequeños carroñeros, también están los grandes. Oligarcas con cara de gordos que sacuden sus manos aceitosas mientras consiguen más financiación ahogando los bosques con más bloques de hormigón, políticos que exprimen todo el dinero posible del trabajador y titiriteros extranjeros que juegan con nuestra descendencia según sus propias fantasías, no es que importe mucho, ambos tendrán su fin.\n\nSé que hay más gente como yo ahí fuera, todos sabemos lo que viene y nos hemos preparado física y mentalmente para esto durante años.\n\nLos planos del Aceleracionismo están ahí, depende de nosotros demolerlos y reconstruirlos."
 cac.22.a: "Los árboles están esperando."

 POLITICS_MIKE_MA_DESC: "Nacido en octubre de 1995, Mike Ma fue un verdadero alborotador en su juventud. A pesar de que le prohibieron graduarse de la preparatoria, logró conseguir un diploma, alegando que pasó el último año en casa. Un año después, se unió a la Guardia Costera de Estados Unidos. Después de pasar por el entrenamiento dos veces, una de ellas como líder de escuadrón, recibió una baja médica por sonambulismo en territorio restringido.\n\nFue en ese momento cuando se sintió perdido en el mundo. Hastiado, derrotado y sin un título académico, comenzó a escribir, tanto ficción como política. Esto le abrió algunas puertas con trabajos que pagaban bien, y luego logró conseguir empleos aún mejores con sueldos excelentes. Pero, como suele suceder con las cosas buenas, esos trabajos también se acabaron. Así que aquí está, de nuevo enfrentado con la incertidumbre.\n\nHasta ahora.\n\nEl mundo está en llamas, y en tiempos de gran crisis, surgen grandes conquistadores de las cenizas. Mike Ma aspira a ser uno de ellos. Al observar el daño que la modernidad ha infligido a su comunidad, se ha comprometido a impulsar una transformación significativa en la sociedad, buscando revivir la moral y estética clásicas, enfrentar el colapso del mundo moderno y, sobre todo, permitir que la Madre Naturaleza recupere lo que le fue arrebatado durante siglos. El fin justifica los medios; millones pagarán por el daño causado al orden natural, y se restaurará el equilibrio.\n\nDespués de escribir libros que se burlaban de una versión exagerada de sí mismo, pronto se dio cuenta de que necesitaba convertirse en esa misma versión para avivar aún más los fuegos del cambio. Ya no será el joven escritor atrapado en el populismo, ni la estrella cómica de Vine; será un nuevo Mike Ma, el arquitecto del acoso, el motor de la aceleración y una llama brillante que todo lo consume. Su intención es iniciar el incendio más grande que el mundo haya visto jamás, para que, incluso en la derrota, deje su huella en la historia, como lo hicieron los antiguos conquistadores.\n\nEl mundo moderno es su mayor enemigo, y no piensa perder."

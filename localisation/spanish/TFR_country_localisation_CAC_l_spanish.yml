 CAC_cascadia_lives_campaign_decision: "Campaña ¡Cascadia vive!"
 CAC_soul_of_the_nation_campaign_decision: "Campaña Alma de la nación"
 CAC_soul_of_the_nation_campaign_decision_desc: "¿Quiénes son los que se dejan la piel todo los días en los campos, quienes realizan bellas obras clásicas sólo con sus manos y quienes derramarían su sangre para defender a su tribu y a su pueblo? El granjero, el albañil, el soldado y el trabajador, no los patricios quienes viven de ellos. El hombre trabajador es el corazón y alma de la nación."

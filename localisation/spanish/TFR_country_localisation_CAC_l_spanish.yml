 cac.4.d: ""
 cac.4.a: "¿QUÉ?"
 cac.5.t: "Comienzan las elecciones"
 cac.5.d: "Tras asegurar nuestra independencia y la existencia de nuestro Estado nación, habrá llegado el momento de que Cascadia celebre unas elecciones anticipadas para determinar quién será considerado lo suficientemente digno por el pueblo para liderar nuestro país. Llevamos un tiempo luchando en un Frente Unido, y parece que el panorama político se ha calmado lo suficiente como para celebrar unas elecciones de este tipo.\n\nActualmente tenemos:\n\nLa Coalición Fowards Cascadia: Una coalición centrista de Progresistas, Libertarios y Conservadores. Pretenden guiar a Casadia y garantizar su libertad.\n\nEl Partido Socialista de Cascadia: Los socialistas que quedan en nuestro país se han reorganizado en un partido único desde el principio. Buscan \"\"deponer el capitalismo dentro y fuera\"\".\n\nEl Partido Imperativo de Cascadia: Las brigadas neofascistas y de ultraderecha se han unido recientemente en un potencial aspirante a caballo negro de las elecciones. Buscan \"restaurar la belleza natural de nuestra patria, mantenerla pura y libre\"."
 cac.5.a: "¡El destino de nuestra nación está en juego!"

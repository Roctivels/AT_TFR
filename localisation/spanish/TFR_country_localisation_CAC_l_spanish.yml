 CAC_ipc_support_rinaldo_nazzaro_decision: "Fomentar [GetRightDescisionName]"
 CAC_ipc_legitimize_ecofascism_decision: "Legitimar ecofascismo"
 CAC_ipc_legitimize_ecofascism_decision_desc: "Para muchos el ecofascismo es un movimiento político que carece tanto de legitimidad como de una base sólida, sino que busca copiar los movimientos ecologistas preexistentes. Mostraremos a nuestro pueblo que nuestro movimiento se debe tomar en serio, y que deseamos genuinamente ofrecer una alternativa a la endeble \"izquierda verde\" y el degenerado capitalismo."
 CAC_ipc_promote_anti_modernism_decision: "Promover el antimodernismo"
 CAC_ipc_promote_anti_modernism_decision_desc: "Durante décadas, nuestra tribu ha estado plagada por una enfermedad, la enfermedad de la modernidad. Este virus ha infectado a nuestro pueblo y nuestra tribu, debilitándola y drenándola de su espíritu y vitalidad, dejándoles sin nada más que odio hacia sus compañeros tribales y un culto enfermizo al materialismo. Nos enfocaremos en erradicar esta enfermedad al iniciar una campaña masiva de inoculación mental contra la modernidad, con la esperanza que ellos eventualmente se den cuenta de la maldades del mundo globalista y materialista."
 CAC_ipc_ancient_aesthetics_decision: "Estéticas antiguas"
 CAC_ipc_ancient_aesthetics_decision_desc: "A los griegos les gustaba ejercitarse."
 CAC_ipc_ecological_acceleration_decision: "Aceleración ecológica"
 CAC_ipc_ecological_acceleration_decision_desc: "planta árboles o cualquier mierda yqs"
 CAC_ipc_rebuild_the_nation_decision: "Reconstruir la nación"
 CAC_ipc_rebuild_the_nation_decision_desc: "cum"
 CAC_ipc_hold_a_military_parade_decision: "Organizar un desfile militar"
 CAC_ipc_hold_a_military_parade_decision_desc: "soldados marchando = genial"
 CAC_ipc_nm_connect_our_country_decision: "Seleccionar §Ymisión nacional§!: Conectar nuestro país"
 CAC_ipc_nm_connect_our_country_decision_desc: "Mientras deseamos dar guerra a la columna modernista, no podemos negar el impacto negativo que la guerra civil ha tenido en nuestra gente y nuestra tribu. Por toda la nación hay gente sin comida, sin agua y sin refugio, algo que no podemos ignorar. Nos enfocaremos en conectar un país y en construir un sistema nacional de carreteras y garantizar a nuestro pueblo sus bienes de primera necesidad. Todos los caminos llevarán a la nueva Roma."
 CAC_ipc_nm_destroy_modernity_decision: "Seleccionar §Ymisión nacional§!: Destruir la modernidad"
 CAC_ipc_nm_destroy_modernity_decision_desc: "Finalmente ha llegado el momento de deshacernos de la plaga modernista de una vez por todas. Realizaremos reclutamiento masivos de todos los hombres aptos para el ejército, asegurando de que nuestro pueblo tenga el poder y la voluntad para llevar a nuestra tribu a la gloria. Destruiremos a los falsos ídolos que habitan en las ciudades, los palpitantes corazones de la degeneración y la decadencia. Y nos aseguraremos de que todo hombre, mujer y niño conozca los males de la cultura modernista por todos los medios necesarios."
 CAC_ipc_nm_destroy_the_hubs_of_decadence_decision: "Seleccionar §Ymisión nacional§!: Destruir los focos de decadencia"
 CAC_ipc_nm_destroy_the_hubs_of_decadence_decision_desc: ""
 CAC_ipc_nm_cultivate_a_new_violence_decision: "Seleccionar §Ymisión nacional§!: Cultivar una nueva violencia"
 CAC_ipc_nm_cultivate_a_new_violence_decision_desc: "Aún si odiamos a los capitalistas, podríamos trabajar con algunos de ellos por el bien de nuestro país. Cultivaremos una nueva clase basada en la naturaleza y el amor hacia la tribu y el pueblo propio."

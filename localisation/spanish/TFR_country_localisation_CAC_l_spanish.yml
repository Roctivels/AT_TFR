 CAC_war_of_independence_category: "Guerra de Independencia"
 CAC_war_of_independence_category_desc: "Cascadia es finalmente libre, pero no de enemigos. Aquellos que nos rodean desean acabar con nuestra existencia e impedir nuestra prosperidad. También tenemos una quinta columna que quiere derribar nuestra gloriosa Cascadia. Para prevenir esto, debemos poner a la población de nuestro lado.\n\n£legitimacy  Legitimidad: [?ROOT.legit_var|+1%]"

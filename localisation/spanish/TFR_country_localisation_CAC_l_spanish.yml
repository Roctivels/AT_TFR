 cac.1.t: "La república comunitaria"
 cac.1.d: "Nuestra recién nacida nación no tendrá un inicio sencillo.\n\n En la lucha por la liberación nacional de Cascadia, hemos descubierto la tenue fundación política sobre la que nos apoyamos. Puede que hayamos dejado de lado algunas de nuestras diferencias, pero Cascadia se mantiene como una tierra dividida por los exremos políticos. Se han formado varios grupos que se adhieren al extremismo, tanto de izquierda como de derecha, y sus ideas lentamente empiezan a resonar entre nuestro pueblo. Nuestra república fue construida en el pueblo, por el pueblo y para el pueblo, así que nos esperábamos anomalías políticas allí y allá.\n\n Una cosa que es más importante es la división política dentro del ejército. Las fuerzas que han liberado nuestro país tienen distintas lealtades políticas y a figuras a pesar de su juramento a Cascadia. Hay fascistas, socialistas y una plétora de otras ideologías en medio.\n\n Deberíamos hacer algo para asegurarnos de que esto no eche por tierra nuestras oportunidades de independencia."
 cac.1.a: "Esperemos que este extremismo decaiga."
 cac.2.t: "¡La Coalición Avanza Cascadia triunfa!"
 cac.2.d: "El resultado de las elecciones ha llegado, ¡Y muestra a la Coalición ganando el voto popular! Aunque un poco lentos, los otros dos partidos han aceptado la derrota y han permitido el cambio de gobierno. Siendo una coalición de diferentes ideologías que comparten los mismos valores democráticos, se espera que Cascadia se convierta en un refugio seguro para los muchos que huyen de la guerra civil que se desata en los Estados Unidos continentales.\n\n Sin embargo, una coalición como esta tiene que hacer un gran trabajo para mantener cualquier atisbo de estabilidad. Esto debido a que hay tres facciones con diferentes valores bajo el mismo paraguas político, lo que hace que los acuerdos sean casi imposibles. Los progresistas y libertarios tienen dos puntos de vista distintos respecto a las políticas económicas y de bienestar, los conservadores y libertarios no se ponen de acuerdo con las políticas militares, las políticas sociales son una pesadilla con los progresistas y conservadores, etc, etc... No es la forma ideal de iniciar una nueva democracia, pero al menos tenemos una democracia para empezar... ¿Cierto?"
 cac.2.a: "¡Cascadia vive!"
 cac.2.b: "¡Deja que la libertad llame!"
 cac.2.c: "¡Alabado sea el Señor!"
 cac.333.t: "¡El Partido Socialista Cascadiano gana!"

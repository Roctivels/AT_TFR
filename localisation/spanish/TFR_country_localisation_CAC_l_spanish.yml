 CAC_cascadian_militias_idea: "Milicias cascadianas"
 CAC_cascadian_militias_idea_desc: "Antes del estallido de la Guerra Civil, muchos en el Noroeste comenzaron a formar milicias de autodefensa en caso de emergencia o para combatir un Gobierno tiránico. Ahora que la autoridad en Washington y Oregón ha colapsado, muchas personas de todos los ámbitos se han unido a nuestras filas, creyendo que somos el único grupo capaz de proporcionar suficiente defensa y un amplio suministro de alimentos y agua. Esto, por supuesto, tiene un precio: la experiencia, ya que a una gran parte de nuestro ejército le importa poco Cascadia y solo lucha por la oportunidad de encontrar botín o un plato de sopa lleno."

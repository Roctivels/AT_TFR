 cac.15.t: "Buscador de placer."
 cac.15.d: "Cuando era adolescente siempre me preguntaba por qué existían los pirómanos o, literalmente, cualquiera que disfrutara destruyendo cosas. Recuerdo cuando algunos de ellos soltaban risitas y rebosaban de excitación mientras destruían más y más.\n\nBueno, ya no me lo pregunto, cuando encendí la mecha de este paquete rojo de dinamita y lo lancé contra un edificio de la administración del condado de King, me emocioné bastante, y más aún cuando la fachada del edificio voló por los aires, los cristales se hicieron añicos por todas partes, la madera y el hormigón se esparcieron por todas partes, y saber que los propietarios estaban atrapados dentro fue la guinda del pastel.\n\nLo entiendo, crear y destruir son una misma cosa, se necesita creatividad en los métodos de uno para crear y destruir, el unabomber era creativo, Nerón era creativo y al igual que estos grandes maestros de las artes destructivas yo haré una obra maestra. Estoy de suerte, porque Seattle me ofrece un lienzo de sobra.\n\nBueno, en realidad, la totalidad de los antiguos EE.UU. lo hará.\n\nLo siguiente es la Aguja Espacial, siempre odié esa cosa, nunca entendí la obsesión del hombre por querer estar en el espacio o alcanzar los cielos mientras el paraíso está aquí en esta tierra verde, imitando a un árbol de hormigón es una afrenta a la existencia.\n\nMenos mal que solo hace falta un gatillo y muchos explosivos."
 cac.15.a: "Suéltate."
 cac.16.t: "Ar Guerra E"
 cac.16.d: "Cuando Trump fue elegido, sinceramente creo que podría haber sacado a este país del sumidero que se creó a sí mismo, como muchos expresé mi apoyo a su presidencia, por supuesto ahora sabemos que absolutamente nada ha cambiado. Otro golem para los grandes maestros, sólo retrasó lo inevitable, los extranjeros siguen arrasando nuestras tierras y nuestro entorno natural se vuelve más feo cada día. ¿Cómo puede funcionar la democracia si los gobernantes no forman parte de tu tribu?\n\nCascadia sigue siendo un hermoso pedazo de tierra, no en serio, estoy convencido de que si arrastraras a estas tierras a algún habitante urbano consumidor de soja se echaría a llorar y pediría perdón por adorar a los iconos del pecado y la decadencia. Sin embargo un gran error que la gente ha cometido aquí es que tratan de caminar por el mismo camino que el Gobierno federal ha caminado, con el tiempo más colmenas engendrarán aquí, más podredumbre cultural se establecerá, y nunca me arrepentiré de deshacerme de esta gente, ellos habrían hecho lo mismo conmigo.\n\nEsta gente es pura maldad, llevan máscaras de sonrisas falsas y veneno en la sangre, los hemos visto muchas veces y hemos aprendido a tratar con ellos, mi tribu los ha dejado en el polvo y al igual que ellos se mean en nuestra historia, nuestro patrimonio, yo haré lo mismo con su patética constitución, una copia barata de lo que a los Estados Unidos solía importarle. Me pregunto cuánto tiempo pasará antes de que empiece a desintegrarse.\n\nDespués de eso, se plantarán cientos de árboles nuevos, la ventaja de tener tanto fertilizante fresco es que crecerán hasta convertirse en hermosos árboles sanos, agradecerán la nutrición que les proporcionarán nuestros enemigos, especialmente los gordos."

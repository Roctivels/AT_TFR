 malet.1.t: "A QUIEN LE PUEDA CORRESPONDER"
 malet.1.d: "Al cruzar el norte de California, se ha producido un fenómeno interesante. Cuando entramos en su territorio, todas sus fuerzas femeninas casi inmediatamente depusieron las armas. Les he enviado personalmente un mensaje pidiéndoles su rendición incondicional. Si no lo hacéis, no nos quedará más remedio que continuar con \"la cornada\" y destruir todos los bastiones comunistas que encontremos.\n\n¡No me hagas bajar! No estoy precisamente de humor para visitar el agujero de mierda tercermundista \"California\".\n\nCON AMOR,"
 malet.1.a: "MIKE MA"

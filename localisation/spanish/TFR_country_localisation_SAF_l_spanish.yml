 congo.1.t: "Tercera Guerra del Congo"
 congo.1.d: "Tras meses de agitación económica tras la crisis del petróleo, la República Democrática del Congo ha vuelto a sumirse en una era de caudillismo. Tras el fallido intento del grupo opositor \"Alianza de las Fuerzas Democráticas del Congo\" de tomar el poder, han vuelto a tomar las armas en la región noreste del país, prometiendo restablecer el orden por todos los medios. Mientras tanto, grupos separatistas respaldados por Ruanda en el este han intensificado sus esfuerzos por la independencia. En el sur, la tumultuosa región de Katanga también se ha separado, luchando por forjar su propio futuro, independizándose de la autoridad central en Kinshasa.\n\nLa República Democrática del Congo, que ya es el sexto país más pobre del mundo, se enfrenta a una catástrofe humanitaria sin precedentes. Con millones de personas en el interior que dependen de la ayuda exterior y de la economía de exportación para su sustento, sus vidas penden de un hilo. Los agricultores de subsistencia también se enfrentan a la escasez, ya que se prevé que los combates destruyan grandes extensiones de tierra cultivable."
 congo.1.a: "Dios salve al Congo."
 congo.2.t: "Intento de golpe en la República del Congo"
 congo.2.d: "Tras semanas de caos político en la República del Congo a raíz de la crisis de refugiados causada por la Tercera Guerra del Congo, parece que el presidente Nguesso, del Partido del Trabajo Congoleño, ha intentado un autogolpe, intentando expandir el poder ejecutivo ante una crisis de refugiados que amenaza con desgarrar la nación. Mientras el exdictador de la República Popular del Congo anunciaba el restablecimiento del Estado casi 30 años después de su declive, las fuerzas de la oposición y los manifestantes se enfrentaron con la policía militar en la capital.\n\nCon el caos desatado en la capital, los líderes de la oposición en el norte prometieron restaurar la democracia, cueste lo que cueste. Parece que ahora el destino de los dos Congos está vinculado, y la terrible situación en África Central se ha agravado enormemente, con millones de inocentes arrastrados a un conflicto que no pidieron."
 congo.2.a: "La crisis se expande."

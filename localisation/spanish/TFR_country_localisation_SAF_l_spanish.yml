l_spanish:
 saf.1.t: "Elecciones sudafricanas del 2024"
 saf.1.d: "Ahora que Sudáfrica se enfrenta a sus séptimas elecciones desde la era del apartheid, gran parte de la nación se ha dado cuenta de que estas elecciones serán sin duda monumentales para el futuro del país.\n\nCualquier sudafricano dirá que los últimos años han sido un desastre para su país. Las turbulencias económicas tras el colapso de Estados Unidos se han dejado sentir en todo el mundo y han golpeado con especial dureza a Sudáfrica: millones de sudafricanos no tienen trabajo y la tasa de pobreza, ya de por sí elevada, no ha hecho más que aumentar en los últimos años. Además de la recesión económica, las tensiones raciales entre los nativos africanos y la población bóer se han multiplicado por diez, con duras represalias, numerosos disturbios raciales y otros incidentes que no han hecho más que infligir dolor a los conciudadanos. Muchos analistas han aludido a niveles de violencia que no se veían desde la época del apartheid.\n\nEn medio de la confusión, ha surgido una improbable estrella emergente en la política sudafricana, lo que muchos consideran el único partido de la oposición que puede suponer una amenaza real para el Congreso Nacional Africano, reinante desde hace mucho tiempo: los Luchadores por la Libertad Económica, de ultraizquierda. Su popularidad se ha disparado a causa de las deficiencias económicas y las tensiones raciales, y muchos han perdido la fe en el CNA en los últimos años. Los discursos sobre el nacionalismo africano y las soluciones a largo plazo para la crisis económica han atraído a muchos. Sin embargo, muchos otros se han mantenido firmes en su apoyo al ANC, citando el preocupante historial del LLE y la posible reacción violenta por apoyar a una facción política tan radical.\n\nEn cualquier caso, las elecciones han sido muy reñidas, con el CNA quedándose corto en más lugares que nunca. Mientras se cuentan los votos finales, la población contiene la respiración a la espera de lo que podría significar la salvación o la destrucción."
 saf.1.a: "¡El CNA resiste!"
 saf.1.b: "¡Los LLE dan la campanada!"
 saf.2.t: "El CNA gana en Sudáfrica"
 saf.2.d: "Con el recuento final de los votos, el Congreso Nacional Africano respiró aliviado, ya que su peor temor no se había hecho realidad. Aunque por un margen muy estrecho, el CNA había triunfado en la que era su carrera electoral más incierta hasta la fecha. El CNA y sus afiliados se felicitaron mutuamente por la buena gestión de las elecciones: se había preservado el statu quo frente al creciente extremismo político.\n\nLos del otro lado del charco, sin embargo, están mucho menos contentos con los resultados. El LLE, en concreto, está furioso por su derrota en estas elecciones monumentales, y los gritos de manipulación y supresión de votos empiezan a calar en la asamblea. En las calles, los partidarios del CNA se alegran de que los radicales hayan sido derrotados en las urnas, seguros de que su decisión estaba bien fundada.\n\nDesgraciadamente, estas celebraciones se ven empañadas por crecientes noticias de reyertas y enfrentamientos por motivos políticos entre los partidarios de sus respectivos partidos, con miembros del LLE dando a conocer su descontento por las elecciones al cuestionar la legitimidad de la victoria del CNA. Poco a poco han empezado a surgir rumores de que grandes congregaciones de votantes del LLE han protagonizado actos turbios y desconocidos, para mayor desdén de ambas facciones.\n\nQue se mantenga o no el statu quo no es necesariamente un indicio de si se han resuelto o no los problemas de la nación; más bien parece que no han hecho más que empezar."
 saf.2.a: "Más de lo mismo"
 saf.3.t: "Los LLE ganan en Sudáfrica"
 saf.3.d: "A medida que se contaban los votos finales, un sentimiento de pánico se apoderaba de todos los afiliados al CNA. Algunos no podían creerlo, otros estaban totalmente desolados. Por primera vez en décadas, el statu quo sudafricano se ha hecho añicos ante el LLE de ultraizquierda.\n\nMientras que en el CNA reina la sorpresa y la incredulidad, en el LLE reina la alegría y la celebración, aunque sea por la sorpresa de su propio éxito. Por primera vez, la voluntad del pueblo ha triunfado sobre el Congreso Nacional Africano, estancado desde hace mucho tiempo. Mientras suenan las celebraciones y comienzan los discursos del nuevo Presidente, Julius Malema, el ambiente es de júbilo.\n\nAl menos, en su mayor parte. Con lo dividida que se ha vuelto la nación en los últimos años (lo que no ha hecho sino aumentar a lo largo de la campaña electoral), la magnitud de una victoria tan inesperada sin duda ha erizado algunas plumas entre la población. Los partidarios del CNA ya han denunciado la victoria y se han echado a la calle para protestar: los enfrentamientos entre ellos y los partidarios del LLE se suceden a cuentagotas, y sólo se espera que aumenten en los próximos días. Entre bastidores, corren rumores sobre cómo se tomará el CNA este increíble revés a su largo periodo de gobierno; algunos susurran la posibilidad de un vuelco electoral, de alguna manera (algo que el LLE sin duda impugnará y rechazará con todas sus fuerzas).\n\nAl final, lo único que importa son los próximos pasos y cambios que den los nuevos dirigentes, y el ciudadano medio sabía muy bien que serían grandes cambios. Dicho esto, sería una tontería suponer que los problemas del país se han acabado, más bien parece que sólo acaban de empezar."
 saf.3.a: "¿Una bandera roja sobre África?"
 saf.4.t: "El CNA da un golpe de Estado al gobierno de los LLE"
 saf.4.d: "El caos y la confusión han estallado hoy en Pretoria y en otras ciudades de Sudáfrica, ya que parece que el recién elegido partido de los Combatientes por la Libertad Económica ha sido repentinamente desalojado del poder durante una sesión de la asamblea en la que muchos funcionarios clave del CNA estaban misteriosamente ausentes.\n\nMientras transcurrían los primeros minutos de la asamblea, una gran congregación de fuerzas militares se había reunido en la capital, cortando las carreteras mediante el uso de vehículos blindados. Según los informes de testigos presenciales desde el interior de la asamblea, la reunión fue asaltada, y un alto cargo, cuyo nombre se desconoce por el momento, detalló las \"violaciones constitucionales\" que el PLE en su conjunto había cometido en su corto periodo de liderazgo. Inmediatamente después, todos los miembros del LLE presentes fueron puestos bajo \"arresto temporal\" con el fin de resolver la situación más adelante.\n\nTras este giro de los acontecimientos, se hizo un breve anuncio en el que se afirmaba que el Congreso Nacional Africano asumiría el papel de órgano de gobierno en funciones por el momento. Inmediatamente después de esta respuesta, se produjeron furiosas protestas en la capital, con enfurecidos partidarios del LLE enfrentándose violentamente a la policía y las fuerzas militares. Mientras el anterior gabinete del CNA comienza a recuperar sus posiciones de liderazgo, se han dado numerosos casos de algunos líderes y unidades militares que no han respondido a las llamadas de Pretoria para ayudar en la estabilización de las zonas urbanas, además de grandes grupos de partidarios del LLE que se han armado en el campo y en algunas zonas urbanas. A medida que el caos se extiende y la nación se desmorona, parece que los peores temores de la población se han hecho realidad, y los expertos afirman que un conflicto interno parece inminente."
 saf.4.a: "¡Poder para el pueblo!"
 saf.5.t: "LLE Declara la insurrección"
 saf.5.d: "Hoy se ha declarado el estado de emergencia en Sudáfrica, ya que los Luchadores por la Libertad Económica, liderados por el presidente del partido, Julius Malema, han declarado que se niegan a reconocer o legitimar al recién reelegido Congreso Nacional Africano. Poco después de este anuncio, miembros armados del LLE han tomado zonas del norte del país, declarando un Gobierno rival en el campo, y muchos de sus miembros han tomado posiciones en zonas urbanizadas de todo el país.\n\nEste repentino giro de los acontecimientos se ha ido gestando rápidamente en las dos semanas transcurridas desde las elecciones, con el LLE alegando que los actos de restricción del voto han sesgado la votación a favor del \"decadente statu quo\". Debido a la naturaleza tan disputada de las elecciones, el ejército sudafricano se ha movilizado rápidamente; sin embargo, parece que muchas unidades no responden, y algunas fuentes afirman que han desertado a las fuerzas del LLE, lo que no hace sino complicar diez veces más la situación.\n\nPara muchos, este giro de los acontecimientos era temido, si no totalmente esperado: parece que el peor escenario posible se ha convertido en la realidad de Sudáfrica. Sin que ninguna de las partes dé marcha atrás o esté dispuesta a aceptar la autoridad de la otra, la situación se está descontrolando rápidamente, y los actos violentos cometidos por ambas partes en las zonas urbanas y en otros lugares no hacen más que aumentar. Sin esperanza de negociación entre los dos grupos, muchos expertos creen que el conflicto es inminente."
 saf.5.a: "¡Por la unidad de Sudáfrica!"
 saf.6.t: "Los LLE ganan la guerra civil sudafricana"
 saf.6.d: "Durante los últimos años, Sudáfrica se ha visto envuelta en una brutal guerra civil, que sin duda surgió a raíz de los resultados de las elecciones de 2024. Muchos creían que la nación acabaría sumida en un caudillismo, algo habitual en el continente africano.\n\nParece que esos rumores se han desmentido hoy. Con el colapso de la resistencia organizada del Congreso Nacional Africano, los Luchadores por la Libertad Económica han anunciado que han derrotado por completo a sus enemigos y derrocado al antiguo régimen sudafricano. Con todas las fuerzas alineadas con el CNA paralizadas o destruidas, el presidente Julius Malema ha declarado la victoria revolucionaria total en todo el país, mostrando orgullo por todos los que lucharon bajo su bandera con fervor liberador. Se desconoce el destino de los líderes del CNA, pero se rumorea que quienes no han huido al exilio sufrirán arrestos y un trato desfavorable.\n\nMientras gran parte del país celebra la caída del antiguo Gobierno, muchos más han sentido la ira del nuevo Gobierno: ejecuciones, brutales represalias, asesinatos por motivos raciales y el duro trato a quienes se consideran disidentes, así como a parte de la población bóer, han sido el blanco de la victoria de los LLE. Los observadores creen que estos actos desafortunados continuarán mientras el nuevo Gobierno intenta asegurar el país."
 saf.6.a: "Preocupante."
 saf.7.t: "El ejército triunfa en Sudáfrica"
 saf.7.d: "En un giro totalmente inesperado de los acontecimientos, las fuerzas rebeldes de la Fuerza de Defensa Nacional Sudafricana (SANDF), que han declarado un Gobierno rival en Ciudad del Cabo, han conseguido derrotar con éxito a todas las fuerzas federales y rebeldes y están reforzando su control del país, eliminando los últimos focos de resistencia. Aunque aún no está claro qué políticas aplicará este nuevo Gobierno, el nuevo jefe de la SANDF, Carl Laubscher, que ha conseguido ascender en el escalafón durante la guerra, ya ha culpado de la guerra civil a \"algunos pilares cuestionables en los cimientos de nuestro país y a las fuerzas destructivas que se esforzaron por abusar de ellos\" y ha prometido vengarse. Muchos países vecinos han condenado esta declaración por \"antidemocrática\", mientras que algunos líderes han calificado los recientes acontecimientos en Sudáfrica de \"emergencia\". Sólo el tiempo dirá qué influencia tendrán estos acontecimientos en el continente."
 saf.7.a: "La necesidad no tiene ley."
 saf.8.t: "El Movimiento de Resistencia Afrikáner triunfa en Sudáfrica"
 saf.8.d: "En un giro de los acontecimientos sin precedentes, aprovechando el caos de la guerra civil y la afluencia de ayuda extranjera y voluntarios, el Movimiento de Resistencia Afrikáner ha logrado asestar un golpe decisivo a todas las demás fuerzas rivales en el país, que ahora se encuentra bajo su control. El nuevo gobierno del llamado \"Volkstaat\" ya ha anunciado sus planes para reorganizar por completo la estructura social, política y económica del Estado con el fin de \"recuperar Sudáfrica para el bien de la raza blanca\". Muchos observan con horror cómo se desarrolla la situación."
 saf.8.a: "ABSOLUTE KEIZERIN OVER DE HORIGE UNTERMENSCHEN!"
 saf.9.t: "El CNA gana en Sudáfrica"
 saf.9.d: ""
 saf.9.a: "Bien por ellos."

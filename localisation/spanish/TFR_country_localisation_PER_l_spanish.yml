 iran.18.t: "Irán interviene en la Región del Golfo"
 iran.18.d: "Con la guerra civil saudita destruyendo el equilibrio del poder en Arabia, los iraníes han tomado la oportunidad de asegurar su hegemonía en la región. En un esfuerzo para asegurar el estrecho de Ormuz, se vieron aviones iraníes sobrevolando Omán y los EAU como preludio de una invasión terrestre. En los puertos principales de Irán, imágenes satelitales han mostrado concentraciones de tropas en torno a buques de desembarco. En televisión nacional, el líder supremo Alí Jamenei ha anunciado sus intenciones de \"exorcizar al Satán occidental de las tierras sagradas de Arabia\", y emitió una declaración formal de guerra a numerosos Estados del golfo. Pocas horas después, en retransmisiones ante la población, los presidentes de Emiratos Árabes Unidos, Catar, Omán y Kuwait han anunciado que varios de sus aeródromos han quedado inutilizados por misiles y ataques aéreos iraníes, y han anunciado que han entrado en un estado de guerra.\n\nLa indignación internacional es mayúscula, pues esta guerra desafía el orden internacional basado en las reglas. No obstante, Occidente permanece paralizado debido a los problemas internos causados por la guerra civil saudita, y son reacios a librar una guerra total conta Irán por el estrecho de Ormuz, donde irán tiene una decisiva ventaja táctica. Sin embargo, está claro que el orden internacional que ha estado vigente desde la era post-soviética está llegando a su fin."
 iran.18.a: "Más gasolina al fuego."

 usc.16.t: "Recortando la grasa"
 usc.16.desc: "Mientras el sol de la mañana se colaba por la ventana de la oficina, iluminando los cubículos y los oscuros pasillos del edificio gubernamental, Sean McCarthy estaba sentado en su escritorio, tecleando nerviosamente. Durante años, había sido un burócrata dedicado, trabajando como procesador de documentos en la zona de Colorado Springs, crucial para el gobierno constitucionalista bajo el que servía. Había ocupado este puesto mucho antes de la Guerra Civil y no apoyaba necesariamente a ningún candidato; solo trabajaba para ganarse la vida. Todos los días eran iguales: se conectaba a su ordenador, realizaba trabajo administrativo innecesario, introducía datos manualmente y enrutaba documentos por diversos canales, antes de archivar los papeles en su escritorio y fichar. Se desplomaba en su silla, escuchando el sonido del ventilador mientras revisaba los formularios e informes.\nPero hoy era diferente. Hoy, McCarthy se enfrentaba a lo impensable: el despido. La carta de despido yacía sobre su escritorio, mientras la miraba con incredulidad. Todo el trabajo y esfuerzo que creía haber invertido se había reducido a nada de un plumazo. Echó un vistazo al documento y notó que estaba dirigido a Mathias Yang, el Director Administrativo. Con el corazón apesadumbrado, McCarthy se levantó de la silla y recorrió los pasillos familiares, cada paso marcado por la incertidumbre. Al llegar a la oficina de su superior, las palmas de McCarthy se le pusieron sudorosas y el pulso se le aceleró.\nAl entrar en la oficina, Sean encontró al Sr. Yang sentado tras su imponente escritorio, con una expresión severa que no delataba ninguna emoción. \"Sean\", comenzó, \"me temo que tenemos que despedirte\". Las palabras lo golpearon como un camión, mientras permanecía en silencio, apretando la carta de despido. El Sr. Yang suspiró profundamente y continuó hablando. \"Fue una decisión muy difícil, Sean. La burocracia de nuestro país se ha vuelto ineficiente, corrupta y está envuelta en papeleo\", respondió, claramente leyendo un guion. \"Aunque eras un gran trabajador, el papeleo manual que has estado haciendo ya no sirve. En resumen, no podemos permitirnos cargar con ese peso muerto, y estamos... eliminando la grasa administrativa y la burocracia, por así decirlo. Por favor, entrega tu carta de despido y recoge tus cosas\".\nSean así lo hizo, saliendo de la oficina arrastrando los pies para no volver jamás."
 usc.16.a: "No dejes que la puerta te dé un golpe en el trasero."
 usc.17.t: "Las Enmiendas Trump"
 usc.17.desc: "Hoy, el presidente Trump ha decidido confiar en sus principales asesores sobre la propuesta de cinco nuevas Enmiendas a la Constitución, conocidas colectivamente como las \"Enmiendas Trump\". La primera, que de ser ratificada se convertiría en la 28ª Enmienda, propone establecer un límite nacional de dos mandatos para gobernadores, con solo 36 estados de la Unión con dicho límite. Esta Enmienda también deroga la 22ª Enmienda, permitiendo un número ilimitado de mandatos presidenciales. Es probable que esto genere gran controversia cuando se presente ante el Congreso, aunque es probable que sea ratificada por ambas Cámaras. La próxima Enmienda prohibiría constitucionalmente el cabildeo, anulando la decisión del caso Citizens' United contra la FEC. Es probable que esta enmienda sea impugnada tanto por las convenciones estatales como por el Congreso, aunque es probable que sea aceptada si los leales a nuestro presidente logran su objetivo a nivel nacional. Donald Trump y el Partido Republicano han abogado por una Enmienda de Presupuesto Equilibrado durante años, y ahora finalmente han decidido que es hora de actuar. Dicha Enmienda exigiría que un estado no pueda gastar más de lo que ingresa. Es muy probable, por supuesto, que sea ratificada.\n\nY para las dos últimas, posiblemente las más importantes, Donald Trump ha propuesto una Enmienda que aboliera por completo la burocracia gubernamental. Durante años, nuestro gobierno despidió a burócratas con exceso de trabajo y extralimitación, lo que aumentó considerablemente la eficiencia administrativa. Si bien esto ha tenido efectos negativos, es evidente que reducir la burocracia no es suficiente, y debemos abolirla. Trump propone que la abolición de la burocracia mediante una Enmienda agilizaría la toma de decisiones, aumentaría la flexibilidad, impulsaría la innovación y reduciría los costos administrativos. Finalmente, la última Enmienda propuesta por Donald Trump otorgaría a las fuerzas armadas, así como a las milicias federales establecidas, la responsabilidad de \"restablecer un gobierno leal al Pueblo americano\" en caso de violación de la Constitución. En otras palabras, el derrocamiento directo del gobierno americano si se viola la Constitución. Esta enmienda ha sido vaga en su redacción y seguramente será, con mucho, la más controvertida de las propuestas. Tal derrocamiento sería no violento, a menos que fuera necesario, y esta Enmienda actuaría como la máxima vanguardia de la Constitución."
 usc.17.a: "\"Llévenlas al Congreso\"."
 usc.18.t: "Reportes desde el frente"
 usc.18.desc: "\"Buenas noches, FOX News, soy Vicente Cobb, reportando desde el frente en Illinois. Niantic, que alguna vez fue un prometedor asentamiento rural, ha sido arrasado por la maquinaria de guerra de Biden\". La cámara se elevó desde la trinchera, capturando los combates esporádicos y un vecindario en ruinas. Las casas de la infancia se han convertido en cenizas y escombros, y los cuerpos yacen en tierra de nadie hasta donde alcanza la vista. La cámara apenas logró enfocar a través del barro y el alambre de púas, antes de ser finalmente bajada. Cobb se mantuvo firme frente a la cámara, vestido con el atuendo de combate típico que usan los reporteros en todo el país. Tres soldados estaban a la vista: uno operaba una torreta, mientras que los otros dos se movían lentamente por el estrecho espacio, llevando y trayendo suministros. Los soldados parecían ignorar al equipo de filmación.\n\n\"A pesar de sus esfuerzos por quebrantar nuestro espíritu, tanto en casa como en el campo de batalla, nuestros hombres han estado luchando día y noche por su libertad\". El hombre señaló a un soldado antes de continuar: \"A pesar de los reveses que hemos enfrentado, aquí en particular hemos mostrado nuestras victorias al mundo. Los comandantes de Biden han lanzado innumerables ataques, desperdiciando innecesariamente la vida de más americanos sin ningún resultado. La única pregunta que se hace la gente es: ¿cómo pudo alguien apoyarlo? Aunque esa pregunta sigue abierta al debate, una cosa es clara: el poder del espíritu americano ha triunfado en el pasado y triunfará en el futuro, sin importar cómo los liberales en Washington intenten socavarnos.\n\n\"A las 7 p. m., transmitiremos la historia de Malaki Howell, un soldado que decidió dejarlo todo para proteger su libertad y a su familia de los demócratas belicistas. También seguiremos actualizándolos en vivo desde Niantic, detallando todo lo que los llamados unionistas han hecho para destruir dicha comunidad\"."
 usc.18.a: "Un gran show."
 usc.19.t: "Al traidor, ni justicia"
 usc.19.desc: "El criminal Mark A. Milley fue degradado al rango de soldado raso y dado de baja deshonrosamente antes de que le pusieran la soga en la cabeza el viernes por la mañana. Sus medallas y condecoraciones, muchas de las cuales no se las había ganado y se las había otorgado él mismo, fueron revocadas.\nComo a todos los detenidos de Gitmo programados para la horca, a Milley se le ofreció un último desayuno, que rechazó. Afirmó que sus logros como oficial patriota le habían llenado el estómago y el alma con suficiente sustento para toda la vida. Sin embargo, solicitó una maquinilla de afeitar para afeitarse la barba incipiente.\nA las 10:00 a. m., tres policías militares lo escoltaron desde la enfermería, donde se le realizó un examen físico previo a la ejecución, hasta la horca, donde el almirante Crandall se encontraba entre un grupo de oficiales de sus respectivas ramas de las Fuerzas Armadas y un civil anónimo vestido con traje azul y corbata roja."
 usc.19.a: "Cero piedad a los traidores..."
 usc.20.t: "Trump se dirige a la nación"
 usc.20.desc: "Cuando Trump comenzó a salir de las sombras para subir al podio, se encontró rodeado de multitudes ondeando las icónicas barras y estrellas, gritando \"USA\" y \"TRUMP\" hasta donde alcanzaba la vista. Sintió que los últimos años habían sido una pesadilla retorcida, pero a pesar de todo, había recuperado su nación, pieza por pieza, y ahora se veía a sí mismo como el libertador de América. Aunque en el fondo sabía que aún había mucho por hacer, se acercó al podio mientras la multitud estallaba en vítores.\n\nEn ese instante, Trump experimentó una oleada de emoción al escuchar a la multitud vitorear. Al subir al podio, dejó que los cánticos se desvanecieran por sí solos, pero también animó a la audiencia antes de comenzar su discurso.\n\nComenzó hablando sobre el renacimiento del país tras la guerra civil y los desafíos actuales que enfrenta la nación unificada, antes de pronunciar las siguientes palabras:\n\n\"Desde que establecí mi administración en Denver, después de los intentos de los demócratas de anular las elecciones, nuestras fuerzas armadas y nuestros compañeros patriotas han luchado con todas sus fuerzas para proteger nuestras tierras y liberar a América de estos villanos corruptos\".\n\n\"Los marxistas, los fascistas y los liberales han intentado rodearnos como buitres. Pero a pesar de sus esfuerzos, una vez más, han fracasado espectacularmente en su intento de destruir nuestro país\".\n\n\"Nuestra nación ha quedado en ruinas, pero NOSOTROS hemos resurgido de ellas y hemos demostrado al mundo que AMÉRICA NO PUEDE SER DERROTADA\".\n\nLa multitud, entusiasta, estalló en vítores y cánticos patrióticos.\n\nY ahora, con nuestros enemigos derrotados y con ustedes a mi lado, comenzaremos a reconstruir nuestro gran país, haciéndolo más grande y fuerte de lo que jamás se hubiera imaginado. Una vez más, nos afirmaremos como una cuna de libertad y democracia.\n\nY con palabras familiares pero contundentes, concluyó su discurso:\n\n\"HAREMOS a América grande otra vez, la haremos fuerte, haremos que nuestro país vuelva a ser seguro. ¡Dios bendiga a los Estados Unidos, y Dios los bendiga a ustedes!\""
 usc.20.a: "¡La haremos grande!"
 usc.21.t: "Un nuevo aprendiz"
 usc.21.desc: "Presidente Trump: ¡Ted! Mi gran amigo, gracias por venir. Me gustaría hablar sobre el futuro y el rumbo que tomamos. Es hora de algunas renovaciones.\n\nTed Cruz: Señor Presidente, siempre estoy dispuesto a apoyar al partido y a su liderazgo. ¿De qué estamos hablando?\n\nTrump: Bueno, se trata del Senado, Ted. Necesitamos buenas personas, necesito un esfuerzo completamente unido para la guerra y mi agenda para ganar la guerra, por supuesto... Es crucial para lo que viene.\n\nCruz: Señor, entiendo la importancia de la unidad, señor. Siempre me he esforzado por trabajar para alcanzar los... eh, objetivos, señor.\n\nTrump: Sé que sí, Ted. Pero este es un momento crítico para nosotros. Necesitamos más que solo unidad; necesitamos un compromiso inquebrantable y una energía específica. Por eso estoy aquí para pedirle que renuncie y deje paso a un nuevo candidato que tengo en mente.\n\nCruz: ¿Renunciar, señor? Pero he estado a favor de la causa... nuestras causas, señor, y mi... eh, mi gente me ha tenido con su representación y apoyo. Esto es bastante inesperado.\n\nTrump: Sé que es mucho pedir, Ted, pero es por el bien común. Estamos en un punto de inflexión y a veces necesitamos tomar decisiones difíciles. ¿Ha leído El arte de la guerra de Sun Zu?\n\nCruz: Intento entenderlo, señor presidente. Pero dimitir es un paso importante. ¿Qué hay del apoyo que he obtenido a lo largo de los años?\n\nTrump: Mmm, apoyo... bueno, Ted, tus esfuerzos no han pasado desapercibidos. Pero se trata del panorama general, de mi visión a largo plazo.\n\nCruz: ¿Su visión, señor? Es un término. ¿Qué es la visión? Señor.\n\nTrump: Es precisamente el futuro del país.\n\nCruz: Necesito tomarme un tiempo para pensar en esto, señor presidente. Es mucho que procesar y tenemos factores que considerar, incluidos los deseos del Pueblo que votó por mí."
 usc.21.a: "Ok."
 usc.22.t: "Ley y Orden"
 usc.22.desc: "En una fría mañana en Denver, un equipo de fuerzas especiales se preparaba para entrar en un apartamento. La inteligencia había alertado que unos cinco insurgentes leales a los unionistas en Washington D. C. tenían su base allí. Mientras esperaban para entrar, revisaron la hora, ajustaron los modos de disparo de sus armas y se aseguraron de que sus radios estuvieran encendidas. Finalmente, el alto mando dio la orden.\n\nCon un clic del detonador, la puerta se desprendió de sus bisagras y cayó dentro de la habitación. Las fuerzas especiales entraron y ya habían visto a los combatientes corriendo hacia las subhabitaciones. El equipo se dividió en dos secciones: el equipo azul y el equipo rojo. El equipo azul fue el primero en actuar, rompiendo la puerta del baño de una patada y gritando a los insurgentes que se agacharan. Luego, el equipo rojo irrumpió en el dormitorio con una escopeta, recibiendo disparos de inmediato, lo que hirió al líder.\n\nTras responder al fuego rápidamente, el equipo rojo asaltó la habitación y la despejó, eliminando al insurgente que había herido al líder. Con todos los combatientes arrestados, el equipo contactó por radio al cuartel general para solicitar la evacuación. Mientras registraban el apartamento, un soldado descubrió la ubicación de otras tres células insurgentes, comunicó sus hallazgos al cuartel general y se reunió con el resto de su escuadrón, que esperaba afuera a que la policía militar local se hiciera cargo de la situación."
 usc.22.a: "Uno menos, quedan tres más."
 usc.23.t: "Bombardeando el cuartel general"
 usc.23.desc: "Mientras el sol se ocultaba en el horizonte, proyectando largas sombras sobre la plaza, Leon Sterling se encontraba sentado en su escritorio en el noveno piso del número 30 de Rockefeller Plaza. El constante repiqueteo de las teclas resonaba en la oficina. Había sido un día largo, repleto de plazos, reuniones y el bullicio habitual que llenaba la sala de redacción. Desde el inicio de la Guerra Civil, MSNBC había estado trabajando a toda máquina para cubrir las diversas versiones e historias del conflicto. O al menos, eso era lo que decían. En realidad, MSNBC se había convertido en un títere de los unionistas, atacando sin descanso al presidente Trump y actuando como uno de los brazos mediáticos más influyentes de la \"Unión\" de América. Al salir de su cubículo, no pudo evitar escuchar el aullido de las sirenas afuera, al igual que sus compañeros. Se acercó a la ventana y se quedó boquiabierto al ver a un grupo de hombres armados irrumpiendo en la plaza. Vestidos con equipo de camuflaje y blandiendo rifles, se movían con rapidez y determinación, avanzando por las calles de abajo e irrumpiendo en el edificio de prensa.\n\nSe tambaleó hacia atrás, con la mente llena de miedo e incredulidad. Desde que los constitucionalistas tomaron el poder, MSNBC había estado bajo un intenso escrutinio, pero ¿un allanamiento violento? Aunque su vista no era la mejor, los hombres de abajo definitivamente se parecían a esos grupos milicianos que él conocía, alineados con el gobierno de Trump. Los ruidos que venían de abajo sonaban a una lucha, con el retumbar de botas militares y gritos que no se podían entender. Sus compañeros de trabajo comenzaron a entrar en pánico, algunos escondiéndose debajo de sus escritorios y cubículos, mientras otros corrían hacia las salidas de emergencia para evacuar. Él decidió quedarse, regresando a su cubículo y observando la entrada desde las escaleras. Justo cuando marcaba el 911, la puerta de entrada se abrió de golpe y entraron nueve hombres con uniformes paramilitares, blandiendo sus rifles y gritando a todos que se agacharan. El logo de los Oathkeepers estaba estampado en sus chalecos, mientras detenían a los trabajadores de los medios y destrozaban equipos, arrasando con costosos sets de filmación mientras avanzaban por otras áreas del noveno piso.\n\nEsta crisis de rehenes se extendió por tres horas hasta que el Departamento de Policía de Nueva York logró llegar a un acuerdo, gracias a la intervención del presidente Trump, después de los actos de saqueo, destrucción y pillaje en la plaza. Desde el asalto, MSNBC ha cerrado oficialmente, incapaz de continuar con su labor de difundir mentiras y atacar a la administración presidencial. Los Three Percenters también han manifestado su apoyo al ataque, y la membresía de los Oathkeepers y del III% ha crecido tras el incidente. Han circulado teorías de conspiración sobre un posible patrocinio por parte del Departamento de Policía de Nueva York o incluso del presidente, aunque, por supuesto, son completamente infundadas."
 usc.23.a: "Genial."
 usc.24.t: "Extinción de la democracia"
 usc.24.desc: "\"Momentos antes de subir al escenario, emití una orden de confiscación de todos los bienes del Comité Nacional Demócrata. En todo el país, las fuerzas del orden han incautado activos tangibles e intangibles. La organización criminal que lideró el horrible e injustificado ataque a los derechos del Pueblo americano durante tantos años, que ayudó al viejo y soñoliento tirano Joe Biden a atacar nuestra maravillosa Constitución, ha sido destruida total e irreversiblemente.\n\n\"Creo en la democracia; es algo grandioso. ¿Pero cómo lo hacían los demócratas? ¿Robándome las elecciones, asesinando a innumerables personas, es decir, a tantas que no podemos contar, intentando usar los medios falsos para sembrar la discordia? No siguieron las reglas, no actuaron con justicia. Ahora creo firmemente en algo llamado \"reciprocidad\", una palabra realmente hermosa y significativa. Significa \"tú me rascas la espalda, yo te rasco la tuya\". Así se hacen los tratos. Soy un negociador de corazón. Pero hay momentos en que algunos no quieren tratos, quieren robar y destruir. Esos son los demócratas; intenté trabajar con ellos durante cuatro años, y luego intentaron matarme. Bueno, seamos sinceros, amigos, no puedo quedarme de brazos cruzados. ¿Saben, amigos? ¿Saben algo? Estos demócratas radicales no solo me atacaban a mí, sino a la Constitución y a todos ustedes. Por eso se han ido. El Partido Demócrata está acabado, amigos. ¿Todo su dinero? Ahora es nuestro. Es el dinero del Pueblo. Seguro que nuestros maravillosos amigos que están de vacaciones en Europa dirán: «Pero, señor presidente, ¿a quién votarán todos los demócratas? ¿Cómo va a guiar al Pueblo que apoyó a Joe el Dormilón?». Pues les diré que les mintieron, los hipnotizó la maquinaria demócrata. Bueno, yo desactivé eso, amigos. Ya verán cómo se dan cuenta\".\n\n- Declaraciones del presidente Trump tras la Orden Ejecutiva 14108, que disolvió el DNC y expropió sus activos."
 usc.24.a: "Cae el partido de Jackson, Roosevelt y Kennedy."
 usc.25.t: "Metas nobles en la legislatura"
 usc.25.desc: "El Congreso del Gobierno Constitucional Americano nunca logró superar algunos de los problemas que afectaron al Congreso americano antes de la guerra. Aunque la legislatura provisional estaba compuesta por políticos con una mayor afinidad ideológica, seguían discutiendo y titubeando sobre casi todo, especialmente en lo que respecta a la creciente influencia de las fuerzas armadas. Donald J. Trump, quien tenía la última palabra entre ambas ramas en conflicto, se presentó ante el Congreso para brindarles la tranquilidad tan necesaria respecto a la situación militar.\n\nLa reunión fuera de horario entre Trump y figuras clave del partido en el Congreso a menudo seguía el mismo patrón que en días anteriores: intensos debates sobre el gasto militar, la situación en el frente y otros trámites menores, pero igualmente cruciales, del día. Sin embargo, hoy no se trataba solo de entregar documentos, ya que Trump finalmente tenía que abordar el tema candente.\n\"Caballeros, sé que ciertos asuntos relacionados con nuestro personal militar les han preocupado durante un tiempo. Estoy aquí para aclararles algunas cosas importantes\".\n\nPor primera vez en sus carreras, los representantes presentes en la sala prestaban atención y escuchaban con atención. Hablar abiertamente sobre un conflicto interno fue sorprendente, pero el comandante en jefe no se anduvo con rodeos. \"Les aseguro que se respetarán los principios constitucionales más importantes de nuestro Gobierno. Ya he hablado con el general Michael Flynn, y él sabe perfectamente que el papel de las fuerzas armadas está claramente definido por nuestras normas y reglamentos\".\n\nMientras los demás representantes murmuraban y discutían en un segundo plano -algunos totalmente de acuerdo, otros confundidos o en silencio-, Trump aguardaba alguna respuesta clara. El senador de Kentucky, Rand Paul, quien era el líder de facto del Congreso, fue el primero en romper el silencio: \"Señor presidente, yo mismo, y estoy seguro de que muchos aquí, valoramos enormemente esta afirmación sobre el Estado de derecho. Espero que el ejército y el Estado Mayor también reconozcan nuestro papel aquí como legislatura, al igual que usted\". A medida que algunos aplausos comenzaban a resonar, Trump no respondió de inmediato; simplemente pensó:"
 usc.25.a: "\"Yo también lo espero, Rand\"."
 usc.26.t: "Un recordatorio de patriotismo... y lealtad"
 usc.26.desc: "Las reuniones del día siguieron el curso habitual para Trump; más disputas y quejas sobre quién estaba haciendo qué esta vez. Trump, ahora reclinado en su oficina, volvió a revisar las cartas que habían llegado a su buzón oficial. Sin importar lo que el presidente Trump hiciera por cualquiera de los dos bandos, siempre parecía haber otro asunto que requería algún tipo de favoritismo de su parte hacia el Congreso o las fuerzas armadas. Si la presidencia no tomaba medidas para encontrar una solución, quién sabe qué harían las partes una vez que tuvieran una ventaja sólida. Ahora, visiblemente frustrado por la cantidad de solicitudes y demandas, un solo pensamiento resonaba en su mente. Tenía que enviar un mensaje claro a todos: no se quedaría de brazos cruzados ni sería un simple espectador; la intriga no se descontrolaría y no permitiría que destruyera el Estado desde adentro.\n\nIndependientemente de lo que el Congreso o las fuerzas armadas quisieran, era crucial que entendieran que todo podía funcionar solo si se mantenían enfocados en su trabajo. Ya no se trataba de simplemente complacer a uno u otro bando; ahora debían recordar quién era su Comandante en Jefe y lo que estaba en juego para todos. Cada vez que dedicaban tiempo y recursos a esta absurda lucha interna, los comunistas, anarquistas, criminales y traidores de Washington se acercaban más; esa idea casi lo volvió loco. Los verdaderos patriotas de una nación no se dejan llevar por esos intentos mezquinos de superarse unos a otros, sino que hacen lo necesario para ganar la guerra; para hacer a América grande otra vez. Trump, levantando la vista de su pila de papeles, observó las fotos y banderas en su pared y comenzó a reflexionar. Mientras fuera el presidente y comandante en jefe de todos, haría todo lo posible para que el patriotismo prevaleciera sobre las intrigas personales. Fue elegido para derrotar a los liberales, acabar con el Estado profundo, desmantelar a los políticos del establishment y hacer a América grande otra vez. Entonces tomó un papel de su escritorio y comenzó a escribir algunas notas para la siguiente serie de cartas que tenía que responder."
 usc.26.a: "\"Hay que encontrar un equilibrio, por el bien de América\"."
 usc.27.t: "La cabeza de la hidra"
 usc.27.desc: "Si hay alguien en el Gobierno Constitucional Americano que conocía a fondo a todos los miembros de las fuerzas armadas, ese era el general Michael Flynn. Antes de la guerra, fue uno de los más leales confidentes de Trump durante su mandato y lo acompañó con entusiasmo a Denver para seguir luchando por su causa patriótica. Sin embargo, sus intentos de consolidar y aumentar la influencia de las fuerzas armadas dentro del Gobierno Constitucional han generado serios conflictos con el Congreso y la presidencia. Hoy, Trump finalmente iba a abordar algunos temas con su soldado más patriota.\n\nAl igual que en sus encuentros con miembros individuales del Congreso, Trump se reunió con el general en una de sus oficinas personales para tratar asuntos \"confidenciales\". Pero hoy, esto iba más allá de la confidencialidad, ya que influiría en el futuro del propio gobierno.\n\n\"General, primero quiero expresarle lo orgulloso que estoy de todo lo que ha hecho por defender este país y nuestra causa. Su patriotismo es realmente admirable. Sin embargo, hay algunos puntos cruciales que debe tener en cuenta\", le dijo Trump al general.\n\n\"Gracias, señor presidente, pero prefiero que vaya al grano. ¿Cuáles son exactamente todas estas evasivas? Sea directo\", respondió el general.\n\nTrump se aclaró la garganta y comenzó a hablar: \"General... las fuerzas armadas se han convertido en un problema significativo, y su constante intento de superar al Congreso está llamando la atención. Esto no puede seguir así. Necesito que usted y sus compañeros comprendan sus deberes constitucionales y los límites de nuestros roles. Se lo digo no solo como Donald Trump, sino como su comandante en jefe\".\n\nEl general se sentó en silencio, reflexionando sobre las contundentes palabras de Trump mientras esperaba a ver qué haría a continuación. En cualquier caso, Trump pensó que al menos había logrado transmitir el mensaje que quería."
 usc.27.a: "Deben saber a quién sirven..."
 usc.28.t: "Reportes desde el frente"
 usc.28.desc: "\"Las tropas del viejo Joe están detenidas en Nebraska, al menos eso es lo que he oído\".\n\"Con los Lightfoot al mando, ¡vaya!, es poco probable\".\nLa familia Smith era uno de esos clanes enormes de Kansas que se reunían bajo el mismo techo casi cada Navidad. Sus miembros, tan dispersos entre las diferentes clases y grupos políticos de América, siempre llegaban con un sentido genuino de calidez y conexión familiar, solo para irse con un alivio amargo y frío, dejando atrás relaciones incómodas a merced de sus propias opiniones absurdas. Eso ya pasaba antes de la guerra; ahora, con las sillas visiblemente vacías, los incómodos saludos entre familiares de todas las regiones de los Estados desunidos y las maldiciones apenas disimuladas de los parientes que fueron a luchar por otros bandos, la familia Smith parecía cada vez menos idílica.\n\n\"Sinceramente, con todos esos imbéciles de Denver susurrando mentiras a Trump, no me sorprendería que la próxima Navidad estuviéramos ondeando la bandera unionista\".\nUn hombre rió con tristeza en un rincón. Su comentario cínico solo le valió algunas miradas de enojo y preocupación de sus familiares. \"¡Olvídense de Nebraska, piensen en el Sur! ¡Hemos dejado que toda una región de hombres leales a nuestra causa sea destrozada!\"\n\"Tenemos recursos limitados.\"\nDos de los principales debatientes, un hombre más joven y barbudo, y un patriarca mayor, estridente y canoso, se gritaban sin parar por el pavo. Durante la noche, la familia se había asegurado de que los relegaran al último rincón de la mesa, pero su conflicto salió a la superficie y obligó a muchos a convertirse en combatientes de todos modos.\n\"¡No insulten así a nuestros líderes! Son los leales, los que apoyaron a Trump en los peores momentos, ¡¿y ahora los critican por no enviar tropas a morir por Alabama?!\"\nEl joven gritó de repente. El anciano pareció desconcertado por un breve instante, antes de retomar la ofensiva."
 usc.28.a: "\"Dime, muchacho, ¿qué piensan esos líderes de las masacres a manos de los federales en Carolina, o de los atentados en las iglesias, o de las masacres en Misisipi...\""
 usc.29.t: "Reportes desde el frente"
 usc.29.desc: "TODO Wartime censorship has been and a reporter gives a brutal account of the frontlines"
 usc.29.a: "Bruh."
 usc.30.t: "Preparando a las Fuerzas"
 usc.30.desc: "Desde el inicio del conflicto que ha sumido a nuestra nación en la devastación y el caos, una cosa se ha vuelto cada vez más evidente: el estado de nuestras fuerzas armadas es un desastre. Si bien contamos con la lealtad y la confianza de la mayoría de los soldados rasos, veteranos y del aparato del Cuerpo de Marines, carecemos significativamente de generales y oficiales confiables, con el Alto Mando corrupto huyendo a Washington, porque saben que Biden es el único hombre dispuesto a mantenerlos en el poder. A pesar de nuestra falta de número, la compensamos con la experiencia y la lealtad a la causa; Michael Flynn, John Hyten y John Raymond me vienen a la mente, todos patriotas de alto rango que han servido con el presidente desde el principio. Estos hombres se han separado del Estado profundo que está hundiendo a América, y saben lo que es correcto. Sin embargo, claro está, con cada Ejército en formación, existe una dinámica de poder entre los combatientes profesionales y bien entrenados del Ejército de los Estados Unidos y quienes forman parte de nuestras milicias. Si no gestionamos este equilibrio con cuidado o concedemos demasiado poder a las fuerzas armadas, podría ser un desastre.\nSi queremos ver la victoria sobre los traidores demócratas, comunistas y separatistas que desgarran nuestra nación, debemos utilizar eficazmente nuestras fuerzas armadas y reconstruirlas desde cero. Debemos reparar el faccionalismo en nuestras filas, crear un nuevo aparato que valore la eficiencia, la lealtad y el patriotismo, y recuperar nuestras ciudades de las hordas izquierdistas que buscan desmantelar nuestra República. Las fuerzas armadas son una de nuestras herramientas más poderosas y debemos usarlas con sabiduría. Después de todo, la política es un juego voluble, especialmente cuando el Ejército está involucrado..."
 usc.30.a: "Semper fi."
 usc.31.t: "Lluvia de ideas"
 usc.31.desc: "Trump se encontraba en una sala de reuniones temprano por la mañana con algunos de sus principales generales y asesores. Se había convocado una reunión urgente para diseñar una estrategia contra el Gobierno de Washington D.C. Tras solo 15 minutos, la reunión estaba prácticamente terminada y Trump estaba a punto de darla por terminada.\n\"Flynn, te exijo mucho; ahora es el momento de que me demuestres que no he bajado mis estándares. Necesito ideas de todos tus conocidos. Eso también aplica a todos ustedes. ¡Retírense!\", dijo Trump, dirigiéndose a los presentes.\n\"Sí, señor presidente\", respondió Flynn.\nSentado solo, después de que todos hubieran salido de la sala, Trump reflexionó sobre la situación que enfrentaba. Incluso cuando trasladaba su Gobierno a Colorado, no imaginó que algo así sucedería, que los gloriosos Estados Unidos caerían en semejante estado de anarquía. Ahora tenía que lidiar con una situación que amenazaba su vida en todos los sentidos. A medida que reflexionaba, comenzó a ser optimista sobre su situación. Tal vez si contuvieran a los ejércitos de Biden y sus secuaces, podrían controlar el Gobierno de Washington D.C. Tal vez si reformáramos nuestras fuerzas armadas para adaptarlas mejor a nuestra situación, podríamos luchar con mayor eficacia. Tal vez...\nPero antes de pensarlo más, se dio cuenta de algo. La nación lo necesitaba, no podía quedarse sentado en su escritorio sin hacer nada; esta era una situación urgente, y el Pueblo lo necesitaba más que nadie.\n\"Tal vez, solo tal vez, un poco de Coca-Cola Light me ayude a despertar\"."
 usc.31.a: "\"Serán 1,60$, señor presidente\"."
 usc.32.t: "El padre refundador"
 usc.32.desc: "Desde el comienzo de la Guerra Civil, siempre ha existido una conexión entre los primeros revolucionarios americanos, quienes derrocaron a sus represivos colonos ingleses y fundaron una República basada en la libertad y la nacionalidad, y los Minutemen del Gobierno Constitucional que luchan con incansable vigor para derrocar al gobierno tiránico y desmedido y a las élites, quienes sembraron la división y el descontento en los corazones y las mentes del pueblo americano. Compartían la tradición revolucionaria, una mentalidad que fomentaba la lucha y la perseverancia en el espíritu nacional. Una América liberada de la naturaleza de las agendas globalistas, que han controlado tanto a la nación como al pueblo durante tanto tiempo. Una América donde las voces de los americanos trabajadores volvieran a escucharse por encima del estruendo de los intereses especiales y las élites burocráticas que no hacen nada por ayudar al pueblo. ¿Quién guiaría al pueblo hacia su revolución, como lo hizo George Washington hace tantos años? Ese sería Donald J. Trump, por supuesto.\n\nDesde el principio, ha promovido una América donde los valores de la libertad, el individualismo, la autosuficiencia y el conservadurismo triunfan sobre quienes pretenden arrebatárselos. Inspirarse en la visión de los Padres Fundadores de una nación construida sobre los principios de un gobierno limitado es la única manera de vencer a los demócratas y construir una nueva América, y Trump lo sabe. Ha delineado sus planes para reducir la burocracia, recortar impuestos y liberar todo el potencial de la economía americana: la revitalización de la industria americana, el fin de la insurrección y el establecimiento de una ley guiada por la voluntad del pueblo. Todo americano es un revolucionario, y esto debe reflejarse en nuestras políticas y en las Fuerzas Armadas. La noble y justa causa está amenazada, y no debemos permitir que flaquee. Así como Washington triunfó en Yorktown, en su propio territorio, también nosotros saldremos victoriosos solo con sangre. Ya se han entrenado varias brigadas de Minutemen, que servirán como columna vertebral de las milicias que luchan en el frente, gracias a su gran movilidad, lealtad y entrenamiento especial para operaciones quirúrgicas. Estos hombres sin duda promoverán y difundirán nuestra causa, y debemos seguir impulsando estas ideas y promoviendo la nostalgia revolucionaria si queremos que la visión de Trump se haga realidad y reclame su legítimo lugar como un padre refundador."
 usc.32.a: "Salve al jefe."
 usc.33.t: "Cerrando el círculo"
 usc.33.desc: "Mientras el MRAP de Donald Trump se deslizaba por las calles de Nueva York, la que alguna vez fue una metrópoli vibrante yacía en ruinas, con cenizas esparcidas por cada rincón y los restos de edificios destruidos hasta donde alcanzaba la vista. El horizonte, que antes se destacaba por sus imponentes rascacielos, ahora estaba cubierto por una densa nube de humo y polvo. La Torre Trump, su joya más preciada, se erguía destrozada y deteriorada; un antiguo y hermoso condominio con vistas al centro de Manhattan, ahora marcado por enormes agujeros y restos carbonizados. La escena impactó profundamente a Trump, quien no pudo evitar recordar cuando supervisó su construcción y la gran inauguración en los años 80. Era un recordatorio de la devastación que la guerra había traído a la nación. Con el corazón pesado y lleno de arrepentimiento, miró los restos de su ciudad natal, sintiendo una profunda pérdida por lo que había forjado su carrera y lo había llevado al escenario político.\n\nTras hacer unas señas a su chófer, bajó del vehículo y observó la escena. Trump comenzó a sentir una gran emoción al darse cuenta de que su amada ciudad, su imperio, había quedado reducida a escombros. Por un instante, consideró la posibilidad de rescatar lo que quedaba de la Torre, de reconstruir lo perdido, de recuperar el antiguo conglomerado que lo había guiado en su vida. Pero entonces, con el corazón apesadumbrado, tomó una decisión. Le dio la espalda a las ruinas, dejando atrás lo que quedaba de su vida anterior. En ese momento, comprendió que había batallas más importantes que librar. Su país lo necesitaba, y él era el único capaz de protegerlo. Se alejó de la devastación, regresó con su séquito mientras sus pensamientos se dirigían a la nación que había jurado defender, a las personas que buscaban su guía. Sabía que la victoria estaba al alcance de su mano, y no debía detenerse ante nada para lograrla. Volvió a subir al vehículo, con la mirada fija en el futuro mientras este se alejaba."
 usc.33.a: "Y eso es lo que necesitaba el país."
 usc.34.t: "Un trono reclamado"
 usc.34.desc: "Mientras el convoy de Donald Trump atravesaba las puertas de la Casa Blanca, no pudo evitar ser invadido por una mezcla de emociones. Después de años de agitación, conflictos y derramamiento de sangre, finalmente estaba de regreso en el poder que tanto había anhelado recuperar. Sin embargo, el peso de la Guerra Civil aún lo acompañaba, y eso se sentía en el aire de Washington D.C. La Casa Blanca, aunque prácticamente intacta, mostraba signos de descuido y algunas áreas estaban claramente quemadas. Al bajar de su vehículo y mirar el edificio desde el que había gobernado hace apenas unos años, Trump no pudo evitar sentirse asombrado por la resiliencia del espíritu americano. A pesar de la devastación y el caos que había traído la guerra, la Casa Blanca se erguía alta y orgullosa, desafiando las adversidades que había enfrentado. Apenas había pasado una semana desde que la ciudad fue liberada de los demócratas, despojándolos del poder y logrando su mayor victoria simbólica hasta el momento. Afortunadamente, la ciudad ya había sido limpiada, y Trump había llegado para quedarse esta vez. Pero al descender de su vehículo y entrar al edificio, una profunda melancolía lo invadió. Los recuerdos de la guerra, de los conflictos y las vidas perdidas, de los patriotas caídos en batalla, inundaron su mente.\n\nSin embargo, en medio del sufrimiento, también sintió un destello de esperanza. Una esperanza en un futuro para todos los americanos, un futuro que brillaría como un faro bajo su liderazgo, uno que nunca volvería a caer en la división. Mientras caminaba por los pasillos blancos, rodeado de retratos de los Padres Fundadores, Trump prometió honrar los sacrificios de quienes lo precedieron y nunca olvidar el precio de la libertad. Al acomodarse en el Despacho Oval, rodeado de sus asesores, miró a su alrededor, sentado en la silla presidencial. Por supuesto, el camino que tenía por delante no sería fácil; nada en la vida de Trump había sido sencillo. Todo había sido forjado a base de trabajo duro, dedicación y una voluntad inquebrantable. Una voluntad que había resistido la prueba del tiempo."
 usc.34.a: "El Jefe vuelve, para quedarse."
 usc.35.t: "Marco Rubio es nombrado vicepresidente"
 usc.35.desc: "Mientras la Segunda Guerra Civil Americana continúa, nuestro presidente ha hecho un anuncio histórico que dictará las políticas de nuestro Gobierno en los próximos años. Donald Trump ha nombrado al senador Marco Rubio como su vicepresidente, lo que marca el fin de las recientes luchas de poder que han consumido al Gobierno Constitucional. Rubio, conocido por sus firmes valores conservadores y su apoyo a la agenda de Trump, a pesar de su enfrentamiento con el presidente en 2016 y su derrota en las primarias de Florida, se ha convertido en la personificación del espíritu del movimiento populista de Trump, incluso si ha permanecido relativamente bajo la lupa. Con su nombramiento, Trump ha consolidado eficazmente los valores fundamentales de su ideología en la gobernanza americana para el futuro previsible.\n\nEn una declaración emitida hoy, Rubio afirmó que América seguirá priorizando los intereses de sus ciudadanos por encima de todo, además de seguir uniendo al GOP contra adversarios internos y externos mediante el tradicionalismo populista, predicado por el propio Trump desde su primera investidura, dejando claro que este conservadurismo se mantendrá al frente del Gobierno y del Partido Republicano. Trump felicitó a su nueva mano derecha y declaró públicamente que es \"el mejor hombre para el puesto\" y el único que puede \"defender los valores y la tradición americanos como yo\". Esto ha generado un gran apoyo del pueblo americano, y Rubio tiene previsto pronunciar su discurso inaugural dentro de un mes."
 usc.35.a: "Veamos lo que hace."
 usc.36.t: "Rand Paul es nombrado vicepresidente"
 usc.36.desc: "Mientras la Segunda Guerra Civil Americana continúa, nuestro presidente ha hecho un anuncio histórico que dictará las políticas de nuestro Gobierno en los próximos años. Donald Trump ha nombrado al senador Rand Paul como su vicepresidente, lo que marca el fin de las recientes luchas de poder que han consumido al Gobierno Constitucional. Paul es conocido por sus firmes valores libertarios, defendiendo la idea de un Gobierno pequeño que no ha pasado desapercibida en los últimos tiempos. A pesar de sus numerosos enfrentamientos con el presidente, se ha convertido en uno de los hombres más poderosos del Gobierno Constitucional, actuando como figura decorativa de varias milicias, y ha encarnado los recientes cambios en el Partido Republicano hacia el libertarismo. Con su nombramiento, ha consolidado eficazmente los valores fundamentales de su ideología en la gobernanza americana para el futuro previsible.\n\nEn una declaración emitida hoy, Paul afirmó que América seguirá priorizando los intereses de sus ciudadanos por encima de todo, especialmente por encima de las infracciones de las autoridades gubernamentales corruptas, así como los continuos esfuerzos para \"Acabar con la Invasión\", que prácticamente se ha convertido en su lema de campaña para consternación de muchos de sus colegas. Desde su primera investidura, Trump ha estado insinuando los ideales del libertarismo, especialmente durante la pandemia de COVID-19, aunque siempre se le ha considerado más autoritario, lo que convierte este nombramiento en una gran sorpresa. Trump ha felicitado a su nueva mano derecha y ha declarado públicamente que es \"el mejor hombre para el puesto\" y el único capaz de \"defender los valores, las tradiciones y los derechos del Pueblo americano\". Esto ha generado un gran apoyo del pueblo americano, y Paul tiene previsto pronunciar su discurso inaugural dentro de un mes."
 usc.36.a: "Es hora del cambio."
 usc.37.t: "Michael Flynn es nombrado vicepresidente"
 usc.37.desc: "Mientras la Segunda Guerra Civil Americana continúa, nuestro presidente ha hecho un anuncio histórico que dictará las políticas de nuestro Gobierno en los próximos años. Donald Trump ha nombrado al teniente general Michael Flynn como su vicepresidente, lo que marca el fin de las recientes luchas de poder que han consumido al Gobierno Constitucional. Flynn es conocido por su destreza militar, actuando como el principal mariscal de campo del ejército y un comandante unificador. A pesar de haber sido despedido de su puesto como asesor en los primeros 20 días de la administración Trump en 2016, dejó su retiro para liderar las fuerzas armadas del Gobierno Constitucional, actuando como figura principal del ala política del Ejército, y ha encarnado los recientes cambios en el Partido Republicano hacia el autoritarismo. Con su nombramiento, ha consolidado eficazmente los valores fundamentales de su ideología en la gobernanza americana para el futuro previsible y ha fortalecido la posición de las Fuerzas Armadas.\n\nEn una declaración emitida hoy, Flynn afirmó que América seguirá priorizando los intereses de la defensa nacional por encima de todo, así como los esfuerzos constantes por mantener la ley y el orden, lo cual prácticamente se ha convertido en su lema de campaña para consternación de muchos de sus colegas. Esto ha desconcertado a muchos en el país debido a la posición de Flynn en el Ejército, aunque no es algo completamente inédito. Trump ha felicitado a su nueva mano derecha y ha declarado públicamente que es \"el mejor hombre para el puesto\" y el único que puede \"defender los valores, las tradiciones y el orden americanos\". Esto ha generado un gran apoyo por parte de muchos americanos, aunque se han expresado inquietudes sobre la creciente influencia del ejército, especialmente por parte de los libertarios del Congreso, pero estas inquietudes han sido en gran medida ignoradas. Flynn tiene previsto pronunciar su discurso inaugural dentro de un mes."
 usc.37.a: "¡Este país necesita orden!"
 usc.38.t: "Una reunión esperada"
 usc.38.desc: "El presidente Trump había entrado en la sala de reuniones con su equipo de alto mando. Recientemente, habían llegado informes desde el frente que indicaban que las fuerzas de Biden habían logrado derrotar a varias brigadas y estaban avanzando hacia territorio constitucionalista. Se convocó una reunión con el alto mando constitucionalista para analizar la situación.\n\"Señor presidente, usted nos quería ver\", comentó Flynn.\n\"Sí, Flynn, así es. Al parecer, el ejército liberal está superando a nuestras fuerzas en el frente...\", respondió Trump, pero fue interrumpido por John Raymond.\n\"Señor, si me permite, podemos revertir esto fácilmente. No sería complicado recuperarnos en este momento\", dijo Raymond.\n\"Lo sé, Raymond. No se preocupe. Solo pido que reorganizamos nuestras fuerzas tras la derrota. Todos sabíamos que no sería una batalla sencilla. Después de todo, los tiempos difíciles forjan héroes\".\nDurante la reunión, Trump y sus mariscales de campo debatieron sobre estrategias, sabotajes, demoras y todo lo necesario para comenzar a cambiar el rumbo en el frente. En general, fue una reunión bastante tranquila. Todo el alto mando constitucionalista había sido advertido de antemano que probablemente enfrentarían pérdidas en los primeros días de la guerra y que debían enfocarse en la recuperación en lugar de los contraataques.\nAl final de la reunión, los mariscales de campo de Trump se sentían relativamente satisfechos con lo que habían discutido. Sin embargo, Trump aún sentía un nudo en el estómago por lo que estaba por venir. Al levantarse para salir de la sala, trató de tranquilizarse."
 usc.38.a: "\"Los tiempos difíciles forjan héroes\"."
 usc.39.t: "Resistencia americana"
 usc.39.desc: "Trump había convocado otra reunión; esta vez no solo estaban él y sus mariscales de campo, sino también algunos generales de alto rango. Al entrar en la sala, se encontró con un mapa de la guerra en América: el azul oscuro del GCA y el azul claro de la UdA. Esto lo enfureció; le molestaba que sus fuerzas no estuvieran haciendo lo suficiente para defender el frente y que sus generales no estuvieran compensando la situación. Sin embargo, al sentarse y comenzar la reunión, decidió ocultar su enojo para mantener la imagen que había construido.\n\"Flynn, la situación en el frente no es buena, por decirlo de alguna manera. Esperaba más de ti. Pero está bien, aún tienes la oportunidad de demostrar tu valía\", dijo Trump con un tono disciplinario.\n\"Gracias, señor presidente\", asintió Flynn.\n\"Caballeros, como sabemos, la situación en el frente no es la más cómoda, por decirlo de alguna manera. Sin embargo, confío en que podemos cambiar el rumbo de esta guerra\".\n\"¿Cuál es su estrategia, señor presidente?\", preguntó John Kelly.\n\"Bueno, Kelly, mi plan es reforzar nuestras líneas y empezar a planificar contraataques. No podemos permitir más retiradas importantes y tenemos que recuperar territorio. Mientras nuestras fuerzas se concentran en el frente, intensificamos el contrabando de armas, municiones y logística para la valiente resistencia que lucha por liberar nuestras tierras ocupadas\", explicó Trump.\nA medida que avanzaba la reunión, Trump y sus mariscales de campo informaron a los generales sobre cómo se llevarían a cabo los contraataques y el fortalecimiento de la resistencia. En general, la reunión se extendió mucho más de lo habitual, ya que siempre surgían problemas antes de que se pudiera acordar un plan.\nSin embargo, al final, los asistentes acordaron centrar más esfuerzos en las operaciones de la resistencia, esperando que esta dañara lo suficiente la logística y la organización de la UdA para asegurar un contraataque eficaz."
 usc.39.a: "\"Necesito a la resistencia al teléfono ahora\"."
 usc.40.t: "Aceptación y muerte"
 usc.40.desc: "Para muchos que no estaban en una zona de guerra, habrían disfrutado de una agradable velada, seguida de una hermosa noche con las estrellas iluminando el aire. Para Cooper Carmenates, el fuego antiaéreo iluminó el aire. Mientras miraba por la ventana hacia el suroeste del Pentágono, contempló la ciudad de Arlington, recordando las órdenes de su comandante de retirarse hacia el Pentágono en lugar de rendirse. Qué ingenuo fue al seguir esa orden. Ahora, debido a su ingenuidad, estaba atrincherado con unos doscientos soldados más dentro del edificio de mando militar.\n\nMientras seguía mirando por la ventana, pensó en su infancia, su adolescencia y, finalmente, su vida adulta antes de que la Guerra Civil la truncara bruscamente. Cómo planeaba casarse con su novia del instituto antes de alistarse en el ejército, cómo lo enviaron al frente, viendo morir a sus compañeros a su alrededor siendo él el único que seguía en pie. Ya fueran los bosques de Illinois, los suburbios de Indianápolis y, finalmente, las otrora bulliciosas calles de Arlington. Dando una calada a su cigarrillo, reflexionó sobre su destino, lamentando las decisiones que lo trajeron allí, al Pentágono, donde lo albergaba a él y a otros doscientos, esperando lo inevitable.\n\nDe repente, oyó un leve ruido a lo lejos; no era fuego antiaéreo; no, no lo sabría si lo fuera. O bien era otro convoy de tropas constitucionales que intentaría tomar el Pentágono por quinta vez hoy, o bien otro grupo de autobuses civiles que salían de Washington D. C. para evitar la aniquilación. Sea como fuere, agarró su rifle, avisó por radio a su escuadrón de que pronto podrían atacarlos y tomó sus binoculares. Pero en cambio, vio un solitario Abrahms a lo lejos, uno con una bandera americana ondeando encima y lo que parecía ser un cartel suelto colgando en su placa frontal. El Abrahms se abrió paso bajo la autopista Henry G. Shirley y se detuvo justo afuera del estacionamiento del Pentágono. Mientras Cooper observaba sin reaccionar, el Abrahms levantó el cañón, aparentemente apuntando directo a su ventana. Cooper pensó que quizá, por fin, la muerte había llegado para aliviarlo de su sufrimiento."
 usc.40.a: "Cooper cerró los ojos y aceptó su destino."
 usc.41.t: "Auténticas elecciones americanas"
 usc.41.desc_1: "A pesar de las terribles circunstancias de la guerra civil en la que nos encontramos, debemos mantener viva la llama de la democracia; de lo contrario, caeremos en la tiranía, como lo hicieron los traicioneros demócratas.\n\nSe han establecido colegios electorales en todos los pueblos y asentamientos controlados por nuestras fuerzas armadas, incluso en pueblos en primera línea, donde la gente vota desinteresadamente por su candidato, a pesar del peligro de un ataque enemigo. Uno de estos votantes en primera línea le dijo a un periodista: \"Soy un patriota. Si necesito estar en algún lugar, allí estaré. Pase lo que pase\".\nEste asombroso patriotismo de nuestros valientes ciudadanos es un testimonio de la fortaleza de nuestra democracia.\n\nNaturalmente, el actual presidente, Donald J. Trump, nuestro valiente líder con el pleno respaldo del Partido Republicano, ha obtenido la mayoría absoluta de los votos. Solo unos pocos votaron por Jack Boyd, un exjefe de policía independiente de una pequeña ciudad que se presentó como candidato con una sola causa por la aparente corrupción en su ciudad. Tras la derrota, admitió que \"fue solo una maniobra publicitaria\" y que \"la verdadera batalla será en nuestras elecciones a la alcaldía\".\n\nLa confianza que nuestro pueblo ha demostrado en el presidente Trump supera cualquier otra en la historia. Votaron por una nueva América, votaron por la victoria. ¡No los defraudemos!"
 usc.41.desc_2_5: "El cariño por Trump en nuestra nación es inmenso. Cuando Trump anunció su candidatura para un tercer mandato, los americanos se unieron instantáneamente a su líder. Nuestro presidente ha asegurado el futuro de nuestra nación, ha protegido a nuestros hijos de la camarilla demócrata y está dispuesto a luchar por nosotros hasta ganar todas las batallas.\n\nDurante su discurso de victoria, Trump reiteró todo esto. Sin embargo, también afirmó que no tiene planes de postularse para un cuarto mandato. Dijo: \"¡Amigos, este será el último, lo prometo! Hay tantas personas increíbles esperando su voto en los próximos cuatro años; es realmente maravilloso el movimiento que hemos construido. Servirán a nuestro país de maravilla; no tan bien como yo, por supuesto. ¡Es broma!\"\n\nEl pueblo americano emitió su voto, dándole a Trump una mayoría aplastante, al igual que en las elecciones anteriores. Lo hicieron contra un puñado de candidatos que apenas eran visibles desde la cima. Nadie en la América moderna ha obtenido jamás una cantidad tan grande de votos y aprobación, probablemente nunca."
 usc.41.desc_2: "Al acercarse el final de su último año de presidencia, Donald J. Trump ha servido a nuestra nación admirablemente. Sin embargo, ahora se encuentra agotado, tanto mental como físicamente. Su edad le impide continuar en el cargo.\nLas elecciones de este año han brindado a nuestros ciudadanos una gama más amplia de opciones. Mientras el líder americano se prepara para su jubilación, los americanos se enfrentan a un nuevo sistema electoral donde la afiliación partidista es menos importante que las políticas y las personalidades.\nSe cree que la principal batalla es por la nominación republicana, más que por las elecciones en sí. Se asume que el candidato republicano ganará con una cómoda mayoría frente a sus oponentes, ya sean de un partido minoritario o independientes. ¡Especialmente con el apoyo personal de Trump!\n\nMillones de americanos acudieron a las urnas para emitir su voto por el candidato que les conectó. En el fondo, aún deseaban ver el nombre de Donald Trump en la boleta y, por supuesto, marcarlo con una cruz. Pero al final, se darían cuenta de que el tiempo había pasado y que debían dejarlo ir."
 usc.41.a: "[presidential_pick_victor_text]"
 usc.41.a1: "¡SOLO TRUMP SALVARÁ A AMÉRICA!"
 usc.41.jdvance: "¡JD Vance!"
 usc.41.rubio: "¡Macro Rubio!"
 usc.41.desantis: "¡Ron DeSantis!"
 usc.41.carlson: "¡Tucker Carlson!"
 usc.41.bryan: "¡Bryan por América!"
 usc.41.lake: "¡Kari Lake!"
 usc.41.vivek: "¡Vivek Ramaswamy!"
 usc.41.gaetz: "¡Matt Gaetz!"
 usc.41.johnson: "¡Mike Johnson!"
 usc.41.paul: "¡Necesitamos a Paul!"
 usc.41.sarah: "¡Sarah Palin!"
 usc.41.musk: "¡Elon Musk!"
 usc.41.trump_child: "¡MANTENGAMOS A TRUMP!"
 usc.41.trump_third: "¡Trump hoy, Trump mañana, Trump por siempre!"
 usc.42.t: "Despedida de Trump"
 usc.42.desc: "Con la renuncia del presidente Trump al cargo más alto del país, la Casa Blanca compartió un emotivo discurso final dirigido a la nación americana de Donald J. Trump:\n\n\"¡Compatriotas americanos! Al acercarme a mi renuncia como líder de esta gran nación, quería, junto a ustedes, recordar todo lo que hemos logrado. Hemos ganado tanto. Cada batalla por el futuro de América fue una victoria; juntos derrotamos al establishment corrupto cuando fui elegido en 2016. Luego, los demócratas y los radicales del Estado profundo desataron el caos sobre nosotros, desestabilizando nuestra nación y llevándonos al borde de un conflicto civil. Tanta destrucción. Pero al final, triunfamos. Hicimos a América más fuerte, hicimos a América grande otra vez, amigos, contra todo pronóstico. No tengo dudas de que el próximo presidente será sabio, proactivo y seguirá la voluntad del Pueblo, y estoy seguro de que ustedes, los americanos, serán astutos y no se dejarán engañar. Esto es todo, me despido, algo realmente conmovedor. Adiós, mi hermosa América, les deseo lo mejor a todos. ¡Suerte! ¡Nunca se rindan!\"\n\nCon esto, concluye la era Trump; pero el próximo presidente, sin duda, continuará su legado, al menos a su manera. Donald Trump ahora disfruta de su jubilación en la casa familiar, rodeado de sus hijos y nietos. Sin embargo, todavía publica en su cuenta de Twitter de vez en cuando."
 usc.42.a: "Descanse; se lo merece, señor."
 usc.43.t: "Vice para América"
 usc.43.desc: "El vicepresidente Wood es una gran persona, pero carece de carisma y no es muy conocido por el público. Fue elegido como sustituto temporal del vicepresidente para garantizar la estabilidad y el funcionamiento del gobierno.\n\nAhora, con la situación en constante cambio, Trump debe elegir a un mejor segundo al mando para el país. Hay muchos grandes patriotas e individuos excepcionales a considerar, pero solo uno de ellos puede ser elegido.\n\nEntonces, ¿a quién elegiremos?"
 usc.43.j: "¡Mike! ¡Ha sido un grande desde que lo perdoné! Me encantan los finales felices."
 usc.43.a: "Jim Jordan: buen tipo, muy patriota y leal a la causa. Me cae bien."
 usc.43.b: "Marco Rubio: tiene experiencia, me peleé con él en el pasado, pero es de los nuestros."
 usc.43.c: "Byron Donalds: gran orador, muy leal y práctico, nos conseguirá el apoyo de los negros."
 usc.43.f: "¡Vance se ha esforzado muchísimo! ¡Lucha y todo eso, la gente lo adora! Me encanta."
 usc.46.t: "En mi hora más oscura"
 usc.46.d: "Compatriotas americanos...\n\nDespués de lo que hemos vivido recientemente, me cuesta encontrar las palabras adecuadas para dirigirme a ustedes. Los terroristas y los insurrectos están sueltos en un país que, hasta hace poco, era un faro de esperanza para el mundo. Las fuerzas traidoras, representadas por el Partido Demócrata, han derramado la sangre de americanos en un acto de violencia sin precedentes, algo que no habíamos visto desde la Guerra Civil.\n\nNuestras valientes tropas y los milicianos leales a la Constitución están haciendo todo lo posible para contener esta amenaza, mientras nosotros nos esforzamos por proporcionarles el equipo, la munición y los vehículos que necesitan. Pero, lamentablemente, eso no ha sido suficiente.\n\nEstamos luchando contra un monstruo de Frankenstein creado por el Estado profundo que finalmente ha salido a la luz, una quimera impensable que busca restaurar el statu quo elitista y aplastar a los trabajadores americanos.\n\nSe acercan a la crucial ciudad de Minneapolis, la clave del norte de los Estados Unidos... Hoy les pido su apoyo, como les pedí su voto hace poco... No podemos permitir que ganen. Por el futuro de nuestros hijos y por nuestro propio bienestar... Si les dejamos ganar, nuestro país se desmoronará...\n\nY la hora más oscuro para América es también la más oscura para mí y para todos nosotros. Pero hay una forma de volver a la luz:"
 usc.46.a: "¡Luchar! ¡Luchar! ¡Luchar!"
 usc.47.t: "Sudando la gota gorda"
 usc.47.d: "Compatriotas americanos...\n\nLos traidores de la llamada Unión de América están avanzando por el campo hacia las ciudades que aún no han traicionado su juramento a la constitución... Donde han pasado, solo quedan ruinas, saqueos, penas de muerte para los leales y, en ocasiones, asesinatos inmediatos.\n\nEstán sudando la gota gorda... y lloran por las balas de artillería... porque saben que no podrán mantenerse en el poder sin otra guerra. Han comenzado innumerables conflictos en el extranjero, pero eso no ha sido suficiente; ahora han traído la guerra de vuelta a casa... Lo que están haciendo es absolutamente inaceptable y debe detenerse.\n\nY juntos somos la única oportunidad que tiene América de detenerlos. Juntos recuperaremos nuestro país, reclamaremos nuestra hermosa Casa Blanca y haremos que nuestra nación vuelva a ser grande. Les prometo que será grande...\n\nPero para lograrlo, primero debemos impedir que crucen el Misisipi, el Encuentro de las Aguas. Nuestros leales combatientes controlan la ciudad clave en la defensa del río, San Luis. Pronto el enemigo será derrotado y el orden se restaurará en nuestra nación."
 usc.47.a: "Cuídense y que Dios los bendiga a todos."
 usc.48.t: "Cuenta regresiva"
 usc.48.d: "Compatriotas americanos...\n\nNuestro país nunca ha estado tan amenazado como en este momento. En la situación actual, nos encontramos como una nación al borde del colapso, y nuestros días parecen contados. La desesperación y la falta de esperanza están volviendo locos a nuestro Pueblo. Están desmantelando los cimientos de nuestra nación y resquebrajando nuestra fachada.\n\nPero América siempre ha demostrado su resistencia. Y volverá a hacerlo mientras nos apoyemos los unos a los otros, manteniéndonos unidos a nuestros seres queridos y amigos... Estas son las cosas que nunca debemos olvidar.\n\nMe siento increíblemente orgulloso e inspirado por nuestros chicos en el frente... Nuestros valientes patriotas de la libertad... Saben, muchos de ellos nunca imaginaron que la guerra llegaría. Pero aquí estamos, gracias a los corruptos y viles traidores de este país... Tantos hogares están siendo destruidos, es un verdadero desastre. Las cifras son asombrosas, mucho peores de lo que se imaginan.\n\nHe sido testigo de esto en Oklahoma... Es desgarrador, lo que esa gente tiene que soportar; pero son valientes, realmente valientes. Y lo que los inspira debería motivarnos a todos hoy...\n\nNos impulsa el sueño americano... Un sueño que se compone de muchos, muchos sueños más pequeños. Trabajadores, maestros, médicos, políticos, activistas de derechos civiles... Soldados, policías... Todos compartimos una parte de ese sueño, grande o pequeño.\n\nY mientras brille, ninguna oscuridad podrá quebrantar el espíritu americano. Ningún terrorista, traidor o radical podrá apagar ese fuego. Lo avivará todo, como siempre lo ha hecho, y abrirá el camino hacia un futuro más brillante, uno donde nuestro país sea grande otra vez."
 usc.48.a: "¡Dios bendiga a los EE-UU-AA!"
 usc.49.t: "Endgame"
 usc.49.d: "Compatriotas americanos...\n\nComo saben, hemos recorrido un largo camino juntos... Si no fuera por ese viaje, no estaríamos aquí, en Denver, en lugar de Washington D.C. No conoceríamos las luchas, el dolor que tuvimos que soportar solo para defender nuestros ideales y los intereses de este país.\n\nSon tiempos diferentes. Y cuando decimos que luchamos por algo, lo decimos en serio. Luchamos a cada paso. Y luchamos con el coraje y la fuerza dignos de los Padres Fundadores...\n\nY vamos a librar la gran batalla por América y vamos a ganar... ¿Por qué esos tipos? \"¡Vamos, hombre!\" Son unos perdedores. Lo único que le han hecho a nuestro país es destruirlo; nunca supieron lo que es construir tu propia vida... Y nunca construyeron nada para nuestro país.\n\n¿Recuerdan cuando prometí que ganaríamos? Vamos a ganar tanto... Así que reserven sus fuerzas, gente. Mientras el espíritu de nuestro país siga vivo en todos nosotros, nunca se acabará."
 usc.49.a: "Ganaremos, pase lo que pase."
 usc.50.t: "Trump se dirige a la nación"
 usc.50.d: "Compatriotas americanos...\n\nEsta noche, nuestra nación se ha visto conmocionada por lo que creíamos que nunca volvería a ocurrir... En una acción violenta, inconstitucional y sin precedentes, el Partido Demócrata y otros elementos traidores han violado la integridad de nuestro estado y han atacado a las fuerzas leales a nuestra causa en lo que constituye el mayor acto de violencia en nuestra patria desde la Guerra Civil...\n\nNuestros oponentes, estos repugnantes insurrectos, la izquierda radical... no tuvieron en cuenta la pluralidad de opiniones ni las vidas civiles brutalmente interrumpidas hoy... No tuvieron en cuenta nuestra sagrada democracia ni los derechos que nos otorga la Constitución... No tuvieron ni tienen en cuenta nuestra fe común ni la palabra de Dios. Eligieron matar a su prójimo solo porque no estaban de acuerdo...\n\nSe han convertido en enemigos de nuestro país y su gente, y deben ser tratados como tales. No habrá piedad ni perdón para los traidores. Nos ocuparemos de cada uno de ellos, por mucho que se resistan o intenten huir de la justicia, no va a funcionar. Implementaremos la pena de muerte... Implementaremos todas las leyes necesarias para asegurarnos.\n\nTenemos la superioridad moral, militar e industrial. ¡El enemigo será aplastado, venceremos!\n\nQue Dios bendiga a los Estados Unidos y que Dios los bendiga a ustedes."
 usc.50.a: "¡Nunca se rindan!"
 usc.51.t: "Trump reacciona a las \"elecciones\" de la Unión"
 usc.51.desc_1: "Durante un mitin reciente en Denver, tras su exitosa reelección, el presidente Trump se refirió a las \"elecciones\" paralelas celebradas en los territorios de la llamada \"Unión de América\".\n\n\"¡Estos locos lo lograron! ¡De verdad lo lograron! Convirtieron a Bernie en presidente. Debieron haber perdido la cabeza si siquiera le dieron una oportunidad; nunca antes habían hecho algo así. El comunista Bernie Sanders, ese sí que es un hombre a batir. La verdadera representación de los enemigos de América.\n\n\"Bueno, en realidad quiero felicitar a Bernie. ¡No, en serio! Primero, porque llegó a estas elecciones. ¿Llegará a la investidura? No estoy tan seguro. Segundo, por fin tiene la oportunidad que quería de hacer realidad sus descabellados sueños comunistas, quizás al menos por un tiempo hasta que lleguemos y reconstruyamos nuestro país como es debido. ¡Por fin tendremos un ejemplo real de por qué el socialismo no funciona en América! Al parecer, los demócratas no pueden aprender de los errores de otros países; es muy triste.\n\n\"Pero, sinceramente, me entristece aún más que Bernie esté haciendo esto. Ya lo dije una vez: podría ser una persona legendaria. Pero hizo un pacto con el diablo, y en cambio será conocido. Por su legendario fracaso ante Trump, una vez que recuperemos nuestra hermosa Casa Blanca. ¡Y arrancaremos todas las banderas rojas del techo y las tiraremos donde pertenecen: a la basura!\"\n\nLa multitud vitoreó, rió y rugió al unísono, una reacción habitual y esperada ante las bromas de su ídolo. La oposición, nuevamente humillada verbalmente. La base se energiza una vez más, animando a las fuerzas constitucionalistas que valientemente continúan luchando en primera línea por la visión de Trump de América."
 usc.51.desc_2: "Durante un mitin reciente en Denver, tras su exitosa reelección, el presidente Trump se refirió a las \"elecciones\" paralelas celebradas en los territorios de la llamada \"Unión de América\".\n\n\"Así que oí que Mini Mike, a veces llamado Mike Bloomberg, finalmente logró comprar la presidencia. Debió de tener descuentos, su negocio no le va muy bien. En fin, todos conocemos a Mini Mike, lo que le hizo a la ciudad de Nueva York, mi hogar: ¡horrible! Infestada de ratas y migrantes, completamente destruida. ¡Y ahora quiere hacérselo al resto del país! Y tiene a todos estos donantes y corporaciones a quienes les está vendiendo el país. He estado hablando del Estado profundo, ¡pero ÉL ES EL ESTADO PROFUNDO!\n\n\"Y ya saben, los demócratas de hoy en día prometen quitarnos más de lo que prometen dar. ¡En serio! Ya quieren quitarnos las armas, la libertad de expresión, los derechos estatales... Lo siguiente que sabrán es que los demócratas dirán: «Tenemos que encerrar a todos en búnkeres por el COVID-19» y luego les quitarán el sonido a todos, dirán: «Ya no podemos tener sonido, porque todos vivimos bajo tierra»... ¡Son unos locos, se los digo!\"\n\nLa multitud vitoreó, rió y rugió al unísono, una reacción habitual y esperada ante las bromas de su ídolo. La oposición, nuevamente humillada verbalmente. La base se energiza una vez más, animando a las fuerzas constitucionalistas que valientemente continúan luchando en primera línea por la visión de Trump de América."
 usc.51.desc_3: "Durante un mitin reciente en Denver, tras su exitosa reelección, el presidente Trump se refirió a las \"elecciones\" paralelas celebradas en los territorios de la llamada \"Unión de América\".\n\n\"...Y ya que estamos, ¿han visto el desastre que es el nuevo «presidente» del Pantano, el ganador -un completo perdedor, en realidad?-. Increíble. Este Andrew Yang... ¡menudo tipo! ¡Ni a los demócratas les cae bien! Un desastre total. Y es un lunático radical. Lo vamos a llamar «Chiflado Yang»; así le decimos, le queda perfecto.\n\n\"Este tonto de Andrew es un fastidio. A nadie le cae bien. Apenas le quedan pequeños los pantalones de kínder y ya es \"presidente\", incluso el alcalde Pete tenía más experiencia. ¿Quiere llamar a su «banda Yang»? Bueno, escuchen, ¡eso es prueba suficiente de que Washington D.C. ha sido tomado por una panda de gánsteres! Ya ni siquiera lo ocultan. Sí, es increíble...\n\n\"...Miren estas «elecciones», amigos. Tan baja participación, nadie vino. Una verdadera lástima para el Estado profundo. Todos saben que quieren de vuelta al verdadero presidente: yo. No se preocupen, derrotaremos a las fuerzas del Estado profundo, muy rápido. Liberaremos a nuestra gente, a nuestra hermosa gente, de estos demócratas corruptos y traidores republicanos. Salvaremos a América, un problema a la vez\".\n\nLa multitud vitoreó, rió y rugió al unísono, una reacción habitual y esperada ante las bromas de su ídolo. La oposición, nuevamente humillada verbalmente. La base se energiza una vez más, animando a las fuerzas constitucionalistas que valientemente continúan luchando en primera línea por la visión de Trump de América."
 usc.51.desc_4: "Durante un mitin reciente en Denver, tras su exitosa reelección, el presidente Trump se refirió a las \"elecciones\" paralelas celebradas en los territorios de la llamada \"Unión de América\".\n\n\"¿Han oído las noticias, chicos? Ese viejo montón de basura de Biden finalmente se derrumbó; ni siquiera lo dejaron presentarse a un segundo mandato. Lo criticaron duramente los burócratas del Comité Nacional Demócrata por dormir demasiado. Dicen que los últimos meses ha estado diciendo tonterías y que ni siquiera reconoció a su esposa. ¿A quién están dejando dirigir el país?\n\n\"Pero Kamala no es mucho mejor. ¡Quizás incluso peor! Biden al menos tuvo algo de cerebro en algún momento, pero lo perdió. ¿Kamala? No puedo decir que lo haya tenido nunca. ¡Y vaya si bebe! Tiene más vino que un sótano.\n\n\"Y aun así intentan hacerla parecer una líder joven y fresca, pero no se dejen engañar, amigos. Kamala, Joe, ¡son la misma persona! No habrá ninguna diferencia porque tienen los mismos titiriteros. Y cambian como un guante. Todo es una completa mentira; no funciona como una democracia.\n\n\"Así que voy a la Casa Blanca, Kamala, a conversar contigo... Pero no será muy larga. Solo necesito decirte una frase: «¡ESTÁS DESPEDIDA!»\"\n\nLa multitud vitoreó, rió y rugió al unísono, una reacción habitual y esperada ante las bromas de su ídolo. La oposición, nuevamente humillada verbalmente. La base se energiza una vez más, animando a las fuerzas constitucionalistas que valientemente continúan luchando en primera línea por la visión de Trump de América."
 usc.51.desc_5: "Durante un mitin reciente en Denver, tras su exitosa reelección, el presidente Trump se refirió a las \"elecciones\" paralelas celebradas en los territorios de la llamada \"Unión de América\".\n\n\"Al parecer, los demócratas fueron tan malos que perdieron contra falsos republicanos en su propio sistema falso y amañado. ¿Qué tan malo se puede ser? Horriblemente malo. ¡No me imagino a esta gente gobernando el resto del país, ni siquiera pueden controlar una pequeña parte!\n\n\"¿Y a quién eligieron esos traidores republicanos? ¿A la asquerosa Nikki Haley y al Mitt Romney? ¡Qué ridículo! Nadie pensaría en ellos si yo estuviera allí. Son unos perdedores patéticos y resentidos. Pero que disfruten de su pequeña victoria falsa por ahora, no están ganando la verdadera batalla. América quiere de vuelta al verdadero presidente republicano: a YO.\n\n\"¿Y en serio? ¿Pusieron a Mitt Romney al mando? Pensé que seguía perdido en 2012. ¿Quizás pensó que seguía compitiendo contra Obama? Bueno, yo no soy Obama, Mitt, soy mucho más fuerte y mucho más inteligente. Y te llevaré de vuelta a hace 12 años, donde deberías estar, ya verás.\n\n\"Lo llaman «Mitt en el Pit» porque sus índices de aprobación son tan bajos que ha arruinado el panorama político, no pudo con Obama, no pudo conmigo y ahora se revuelve en el suelo llorando por ello; es un desastre.\n\n\"Y he oído que fue a una de esas convenciones «furry», ¡llena de gays disfrazados de animales! ¡Y le encantó! No eres muy conservador, Mitt. Ahora hablemos de algo más interesante...\"\n\nLa multitud vitoreó, rió y rugió al unísono, una reacción habitual y esperada ante las bromas de su ídolo. La oposición, nuevamente humillada verbalmente. La base se energiza una vez más, animando a las fuerzas constitucionalistas que valientemente continúan luchando en primera línea por la visión de Trump de América."
 usc.51.desc_6: "Durante un mitin reciente en Denver, tras su exitosa reelección, el presidente Trump se refirió a las \"elecciones\" paralelas celebradas en los territorios de la llamada \"Unión de América\".\n\n\"¡Y vaya! ¿Vieron eso? Al parecer, los demócratas fueron tan malos que perdieron contra republicanos falsos en su propio sistema falso y amañado. ¿Qué tan malo se puede ser? Horriblemente malo. ¡No me imagino a esta gente gobernando el resto de nuestro país, ni siquiera pueden controlar una parte!\n\n\"¿Y a quién de todos los que eligieron esos traidores republicanos? ¿A la asquerosa Nikki Haley y a Mitt Romney? ¡Qué ridículo! Nadie pensaría en ellos si yo estuviera allí. Son unos perdedores patéticos y resentidos. Pero que disfruten de su pequeña victoria falsa por ahora, no están ganando la verdadera batalla. América quiere de vuelta al verdadero presidente republicano: YO.\n\n\"¿Sabes cuáles son sus planes? ¡La loca de Nikki y sus cabilderos de la industria militar van a iniciar la Tercera Guerra Mundial! Quieren iniciar guerras por todo el mundo, quieren poner vidas americanas en peligro, y no se les ocurre otra cosa. De hecho, ¡se alegró muchísimo cuando empezaron las matanzas en nuestro país! ¡Con una sonrisa de oreja a oreja porque sus donantes se enriquecerían con todas las ventas de armas y los asesinatos!\n\n\"No me permiten decir esto porque es mujer, pero si lo fuera, lo haría. Dicen que es desagradable y muy repugnante... Haley-Cheney, deberías estar pensando en esa rima. A ella y a los demás neoconservadores, los destruiré antes de que destruyan nuestro hermoso país y el resto del planeta\".\n\nLa multitud vitoreó, rió y rugió al unísono, una reacción habitual y esperada ante las bromas de su ídolo. La oposición, nuevamente humillada verbalmente. La base se energiza una vez más, animando a las fuerzas constitucionalistas que valientemente continúan luchando en primera línea por la visión de Trump de América."
 usc.51.desc_7: "Durante un mitin reciente en Denver, tras su exitosa reelección, el presidente Trump se refirió a las \"elecciones\" paralelas celebradas en los territorios de la llamada \"Unión de América\".\n\n\"¡Mira eso! ¿Viste las noticias últimamente? El pantano tiene un nuevo «presidente», supongo que no era Joe el Dormilón. Ahora es Klob-... Klobu-char o lo que sea. Bueno, ¿qué puedo decir de Zany Amy? No ha habido peor candidato en la historia de nuestro país. ¡En serio! ¿No tenías a nadie más? No sería mi primera opción, te lo aseguro.\n\n\"¿Viste su \"discurso de victoria\"? ¡Un desastre total! Zany Amy ni siquiera sabe qué decir ni qué está diciendo. Probablemente no se creyó que la eligieron; francamente, yo tampoco me lo creo; debe haber sido un fraude, como todo lo demás en la falsa América ocupada por los demócratas. Es una mujer de nieve, ¿vale? Y se está derritiendo, igual que las tropas insurrectas se están derritiendo en el frente. No les queda mucho tiempo y lo sienten.\n\n\"Pero no te preocupes, Amy. Ya te preparé una linda casa en Minnesota, una casa más grande; es lo único que puedes esperar ganar justo después de estas «elecciones» falsas. Disfrutarás de unas buenas vacaciones el resto de tu vida, te lo prometo. Espero que estés de acuerdo. ¿Estás bien, Amy? ¿Nos lo dirías? Supongo que pronto lo sabremos\".\n\nLa multitud vitoreó, rió y rugió al unísono, una reacción habitual y esperada ante las bromas de su ídolo. La oposición, nuevamente humillada verbalmente. La base se energiza una vez más, animando a las fuerzas constitucionalistas que valientemente continúan luchando en primera línea por la visión de Trump de América."
 usc.51.desc_8: "Durante un mitin reciente en Denver, tras su exitosa reelección, el presidente Trump se refirió a las \"elecciones\" paralelas celebradas en los territorios de la llamada \"Unión de América\".\n\n\"Así que el Pantano de Washington tuvo un cambio de administración, ¿y a quién eligieron? ¿«Beto O'Rook»? ¿Quién es? ¿Un tejano que quiere quitarle las armas a la gente? Muy gracioso, debo admitirlo...\n\n\"¡Ni siquiera sé qué decir de este tipo! Dicen que casi le gana al MENTIROSO Ted, pero claro que no lo hizo porque es un perdedor. ¿Es eso? Supongo que de ahí viene su apellido: es un RUGOSO, ¡sin experiencia ni conocimiento! No creo que a su falso gobierno le quede mucho tiempo con líderes así, ¡dos semanas como mucho!\n\n\"Así que déjenme decirles: definitivamente no es un Alfa, ni siquiera un Beta. ¡Es un O'Mega Rugo! Así es como lo vamos a llamar...\"\n\nLa multitud vitoreó, rió y rugió al unísono, una reacción habitual y esperada ante las bromas de su ídolo. La oposición, nuevamente humillada verbalmente. La base se energiza una vez más, animando a las fuerzas constitucionalistas que valientemente continúan luchando en primera línea por la visión de Trump de América."
 usc.51.desc_9: "Durante un mitin reciente en Denver, tras su exitosa reelección, el presidente Trump se refirió a las \"elecciones\" paralelas celebradas en los territorios de la llamada \"Unión de América\".\n\n\"He oído que nombraron a Pete Butti-geg. ¿Butti-geeg? ¿Butt-geg? Da igual. No vale la pena recordar el apellido de Pete, seguro que tendremos a otro en cuatro años, igual que echaron a Joe el Dormilón. Y, ya saben, el alcalde Pete no es nadie sin los demócratas y sin los donantes. ¡Un don nadie! Excepto que es homosexual, es su única carta, no mucho más. No tengo nada contra los homosexuales, ¡pero qué patético y aburrido es eso!\n\n\"Y al alcalde Pete, como se llame, le gusta llamarme homófobo... Está EQUIVOCADO. Soy el mejor presidente en la historia de los derechos de los gays. He eliminado al Dáesh, la gente que más odiaba a los gays. De hecho, Pete debería preguntar a quién votó su marido; se sorprendería mucho\".\n\nLa multitud vitoreó, rió y rugió al unísono, una reacción habitual y esperada ante las bromas de su ídolo. La oposición, nuevamente humillada verbalmente. La base se energiza una vez más, animando a las fuerzas constitucionalistas que valientemente continúan luchando en primera línea por la visión de Trump de América."
 usc.51.desc_10: "Durante un mitin reciente en Denver, tras su exitosa reelección, el presidente Trump se refirió a las \"elecciones\" paralelas celebradas en los territorios de la llamada \"Unión de América\".\n\n\"Vamos, chicos... ¿De verdad tenemos que hacer esto OTRA VEZ? ¡Ya te ganamos una vez, Hillary, FUERA DE AQUÍ! ¡Dale una oportunidad a Bernie mientras siga con vida!\n\n\"Saben, esta es la nominación más corrupta de la historia. Totalmente amañada, nadie votaría por la Moribunda Hillary Clinton. ¿Dónde ha estado hasta el día de las elecciones? No la he visto, nadie la vio. La escondían en el sótano porque no puede caminar ni tres metros. ¿Se imaginan a esa mujer como nuestra presidenta? No lo creo...\n\n\"Nunca debí haberle dado una oportunidad a Hillary. Debería haberla encerrado hace ocho años, quizá ya sería mejor persona. Supongo que soy demasiado amable, ¿no es así?\n\n\"Pero no importa a quién ponga o saque el establishment, los destruiremos a todos y les arrebataremos Washington D.C. a los Clinton para devolvérselo al Pueblo. Salvaremos a América de la corrupción. No tenemos otra opción... Así que es justo que expulsemos a la mujer más corrupta de la historia de nuestra nación, ¿no les parece, amigos? Y me encantará hacerlo, les aseguro...\"\n\nLa multitud vitoreó, rió y rugió al unísono, una reacción habitual y esperada ante las bromas de su ídolo. La oposición, nuevamente humillada verbalmente. La base se energiza una vez más, animando a las fuerzas constitucionalistas que valientemente continúan luchando en primera línea por la visión de Trump de América."
 usc.51.desc_11: "Durante un mitin reciente en Denver, tras su exitosa reelección, el presidente Trump se refirió a las \"elecciones\" paralelas celebradas en los territorios de la llamada \"Unión de América\".\n\n\"¡No puedo creerlo! Reeligieron a esa momia que apenas camina... En 2020 pensé: «¡No hay nadie peor que el Corrupto Joe Biden!». Pero ahora sé que hay algo peor: ¡es el mismo Biden 4 años después! No solo empeoró, sino que sus políticas también empeoraron. ¿La economía? ACABADA ¿Vidas humanas? MISERABLES. Pero lo peor y más importante es que siguen avivando el fuego de esta horrible guerra civil. ¡No hay paz bajo los cerdos de guerra demócratas!\n\n\"Y, ¿saben?, estaba empezando a pensar que podríamos darles una oportunidad a los demócratas. Quizás ni siquiera tengamos que matarlos a todos. Aunque, si lo piensas... ¿Mmm? No, no a todos. Aunque si alguien mereciera la pena de muerte... Ese es sin duda Joe, el mayor insurgente y terrorista de la historia de nuestro país... Pero bueno... supongo que Joe el Dormilón no volverá a la cama hasta dentro de 4 años como máximo, probablemente menos, y seguirá arruinando nuestro país... ¡Lástima!\"\n\nLa multitud vitoreó, rió y rugió al unísono, una reacción habitual y esperada ante las bromas de su ídolo. La oposición, nuevamente humillada verbalmente. La base se energiza una vez más, animando a las fuerzas constitucionalistas que valientemente continúan luchando en primera línea por la visión de Trump de América."
 usc.51.a: "¡Ese es mi presidente!"
 usc.51.b: "Bla, bla, bla."
 usc.52.t: "Usar la fuerza"
 usc.52.d: "Con todo tipo de liberales y criminales de la izquierda alternativa ANTIFA inundando las calles de Denver y otras ciudades bajo nuestro control para protestar contra el gobierno legítimo y apoyar al estado profundo, debemos decidir cómo actuar en esta situación para proteger la LEY y el ORDEN.\n\nMacgregor y otros asesores proponen que nuestros increíbles policías y valiente Guardia Nacional estén listos para reprimir con fuerza a estos lunáticos izquierdistas antiamericanos, lo más rápido posible, dentro de las leyes de nuestra constitución y el \"Acta de Insurrección\".\n\nSin embargo, asesores menos radicales, como Jim, dicen que debemos actuar con discreción, ser legales y justos, y usar solo las fuerzas policiales, mientras que la Guardia Nacional solo debe usarse en casos graves."
 usc.52.a: "Esta es una insurrección violenta. ¡Parecemos débiles, no tienen cosas así en Moscú!"
 usc.52.b: "Debemos mantenernos moderados; los de azul solo deben arrestar a MATONES violentos."
 usc.53.t: "Muestra de nuestro apoyo"
 usc.53.d: "Tu Pueblo está asustado, desorganizado, en todo nuestro territorio. Quieren escucharte, verte, quieren tu tranquilidad.\n\nBrian y Tucker dicen que el Pueblo necesita una gran manifestación en Denver para demostrarles a todos, especialmente a los que odian y a los ingenuos, que Denver es la ciudad MAGA. Es un lugar seguro, con mucha seguridad y muchos aficionados maravillosos que pueden sentir el Estadio Mile High. A la base le va a encantar.\n\nBrad tuvo una idea para atraer gente a Mineápolis. Picante. Les demostraremos lo bien que me porto con una multitud dividida. Una gran ciudad, pero cerca de la línea divisoria, posiblemente con muchos MATONES ANTIFA. Pero dice que la audiencia se disparará; un presidente valiente visita una ciudad dividida y transmite un mensaje de unidad frente a la traición. Grandes titulares. A su gente le encantará este acto de compasión.\n\nDan, sin embargo, con sus supermega tecnologías mediáticas, dice que solo se necesita una buena campaña en internet, muchos medios: banners, anuncios, videos, lo que sea. Grabarás videos diciendo lo que tu Pueblo necesita oír. No es tan impactante como un mitin en vivo, pero Dan argumenta que es demasiado peligroso ahora mismo."
 usc.53.a: "Denver, gran idea: demuéstrenles que ahora es nuestra ciudad."
 usc.53.b: "Mineápolis es picante: les demostraremos lo bien que se me da con un público divisivo."
 usc.53.c: "Muy bien, no nos reuniremos. Tenemos las redes. Soy el Mike Tyson de Twitter."
 usc.54.t: "Mitin en Denver"
 usc.54.d: "La multitud es increíble, con muchísima energía. El Estadio Mile High está abarrotado; algunos no son precisamente de Denver, pero no importa, la cantidad sí. Miles de pancartas de MAGA, pantallas LED gigantes con el lema \"TRUMP, SALVA A AMÉRICA\" estampado por todas partes...\nPresentaste un discurso genial, otro clásico, denunciando a los demócratas corruptos y a sus locos marxistas, y cómo están destruyendo esta increíble nación. También hubo otros oradores, con muchos HECHOS VERÍDICOS.\nSolo los medios reales están aquí, transmitiendo por todos lados. Y aún más viendo en vivo: cifras increíbles. Tu base está contenta; pudieron ver a su presidente en momentos difíciles. Muchos se alistarán para ser soldados del ejército patriótico americano y luchar por lo que es justo.\n\nAl final de la manifestación, sacas a la YMCA de siempre y te pones a bailar; la multitud está de fiesta. Nada mejor que un viejo truco que a todos les encanta."
 usc.55.t: "Trump toma Mineápolis"
 usc.55.d: "Ed llevaba la vida típica de un camionero de pueblo. Tenía pocos lujos y muchos problemas. Su pueblo y su familia habían pasado por momentos difíciles desde la época de la Obamanomics. Sin embargo, cualquiera que intentara criticarla y mostrar el daño que causaba a los cuellos azules americanos era tachado de racista.\nPero con la llegada de Trump al poder, la situación empezó a mejorar para la pequeña comunidad de Ed. Claro que burócratas y arribistas intentaron ignorar la visión del presidente, pero los frutos de su trabajo seguían siendo evidentes. Muchas comunidades del Medio Oeste comenzaron a ver a Trump como su héroe personal, y la familia de Ed no fue la excepción.\n\nMientras se desarrollaban los acontecimientos problemáticos en la capital y en todo el país, Ed miraba la televisión con ansiedad. Fox News informó que el presidente Trump realizaría un mitin público en Minnesota.\nY entonces empezó. Imágenes en directo de Donald Trump hablando desde el podio. Sin embargo, momentos después, algo salió mal. Se oyeron explosiones y el presidente se desplomó. Los guardaespaldas rodearon la zona de inmediato.\n\nPor un momento, Ed pensó que todo había terminado. Lo habían matado, el único político al que le importaba este país. Pero entonces, un segundo después, vio a Trump levantando el puño triunfalmente mientras se ponía de pie, rodeado por el Servicio Secreto.\nEd estaba realmente conmocionado. Solo pudo llamar a su esposa y contarle la noticia."
 usc.55.a: "\"¡Cariño, intentaron matar al presidente Trump!\""
 usc.56.t: "PROYECTO: RESURRECCIÓN AMERICANA"
 usc.56.d: "Kevin Roberts, director de la \"Fundación Heritage\", se ha presentado ante usted con la visión de su equipo sobre cómo debe reclamar América.\nAfirma que el fuerte poder ejecutivo, ejercido en tiempos de emergencia, es necesario para proteger al pueblo americano de los peligros y del corrupto Estado profundo, que, en sus palabras, se está enconando incluso en nuestra administración.\nEste tipo tiene algunos buenos argumentos. Después de todo, no se puede confiar en ningún burócrata ahora mismo; todos parecen estar ahí por sus propios motivos. Pero, ¿es realmente suspender la democracia americana una solución? Usted también es el protector de la constitución americana, digan lo que digan los perdedores en el Pantano.\n\nAdemás, Tucker dice que todos estos think tanks conservadores son solo un lugar para intelectuales aspirantes, y que muchos de ellos están llenos de sus escépticos. Vergonzoso, si es cierto."
 usc.56.a: "Mmm, lo pensaré. Ya sabe, esto del \"proyecto\"."
 usc.56.b: "Tucker tiene razón, cuánta palabrería. ¡Triste!"
 usc.57.t: "Regreso de los niños perdidos"
 usc.57.d: "¡Recibiste una llamada sorpresa de Mike! Te llamó desde un pueblo fronterizo, donde se aloja con otros republicanos que cruzaron la frontera. Te contó todas las historias y finalmente comprendió por qué eres la mejor opción. Dijo que el pantano de Washington es un símbolo de los profundos problemas de América. Y lamenta no haber hecho lo correcto.\n¡Ay, Mike! ¿Dónde estaba ese espíritu cuando pudiste haber usado el estilo Jefferson y haber salvado a nuestro país? ¿Pero qué quiere? Un lugar para su gente, sus \"conservadores cristianos\". ¿Quizás algo más?\n\nPodría ser útil; después de todo, nunca negaste su experiencia en el campo, y mostrarse indulgente y construir una coalición es algo que podría resonar con la parte \"sentimental\" de tu base. Pence regresa, como un hijo pródigo, y es aceptado de nuevo en el grupo. ¡Algo que un demócrata jamás haría! Solo quieren a los más débiles para el liderazgo republicano. Su gente al menos cree en algo -puede que no estés de acuerdo-, ¡pero al menos tienen algo con lo que discrepar!\n\nPero, vamos, ¿avergonzarlo públicamente? Imagina los índices de audiencia; ¿el pequeño Mikey-Pency ansiando atención desesperadamente después de TRAICIONAR a sus compatriotas? Esto se llama traición, Mike. Lo castigamos con dureza. Grave error."
 usc.57.a: "Amigos, ¿qué puedo hacer? Soy demasiado amable."
 usc.57.b: "Mike, ¿lo has olvidado? Yo no olvido y, desde luego, no perdono."
 usc.58.t: "Elon Musk se compromete a apoyar a Donald Trump"
 usc.58.d: "En las últimas semanas, Elon Musk, un acaudalado hombre de negocios, ha sido abierto en relación a su apoyo al gobierno. Tras ser expulsado de los territorios de la UdA por agencias reguladoras, no ha perdido el tiempo en reconstruir sus negocios en el área de Denver. También ha favorecido en gran medida a nuestra facción libertaria, abogando por iniciativas orientadas a las empresas, y un gobierno reducido.\n\nEn un comunicado reciente, Musk se comprometió a apoyar totalmente a Donald Trump y dio una gran cantidad de dinero al Partido Republicano. Muchos asesores presidenciales aconsejan estrechar los lazos con Musk, pues su compañía e influencia pueden ser beneficiosas a largo plazo. El presidente Trump no parece estar en desacuerdo con esta idea."
 usc.58.a: "\"¡Elon, este tipo es una estrella! ¡Se los aseguro!\""
 usc.58.b: "\"¡Gracias por tu contribución, Elon!\""
 usc.59.t: "El Despertar"
 usc.59.d: "Ese momento fue la culminación, un segundo decisivo en tu carrera. Mientras te preparabas para subir al escenario de la Convención Republicana Extraordinaria, veías a la multitud -¡qué multitud tan grande y hermosa!- y todos te esperaban. Años de espectáculo te habían preparado para esto, una obra maestra, y la gente lo decía: era lo más valiente que jamás habían visto. Se enamoraron de tu actuación. Y esta foto... está por todas partes. Todos decían que para conseguir una foto tan icónica hay que morir, y sin embargo, no lo hiciste.\n\nConfeti, luces de colores, globos. Subías al escenario como un campeón de lucha libre. Te quedabas de pie, apenas podías ver los rostros de la multitud. Veías a algunos conocidos, a muchos desconocidos, pero todos te miraban con ojos llenos de asombro. Asombro por lo que eras: el hombre más valiente que conocían. Coreaban tu nombre y tu causa. ¿Así se sintió César al dirigirse a su leal legión?\n\nAlgunos dicen que fue providencia, otros, casualidad, otros, intervención divina. Pero lo que importa es en qué se convierte ahora. Cuentas la historia y se les llenan los ojos de lágrimas. Te alaban como un héroe que lucha por ellos, y les aseguras que nunca te rendirás.\n\nLíderes de todo el mundo te elogiaron, sin importar su credo; algo muy revelador. ¿Podría la gente del pantano hacer lo mismo? No. Joe el Torcido simplemente se desplomaría y moriría en un accidente.\n\nTu Pueblo está lista para seguirte hasta lo último de la Tierra. Ven tu supervivencia como un mandato divino. Dios mismo está de tu lado.\nAhora eres su Mesías."
 usc.59.a: "¡Que Dios bendiga a los EE.UU. y a Donald J Trump!"
 usc.61.t: "¡Libertarios se rebelan contra Trump!"
 usc.61.d: "Los libertarios débiles están insatisfechos con la decisión de Trump sobre el gobierno de América.\nSiempre han sido aliados provisionales, pero ahora revelan su verdadera cara cuando las cosas no salen como ellos quieren. ¡Es una pena! El Pequeño Paul y sus secuaces convocan a una manifestación contra la extralimitación tiránica.\n\nHan estallado protestas en algunas ciudades y pueblos, pero no hay motivo de preocupación.\n\nDebido a sus acciones violentas contra el gobierno legítimo, todos los símbolos libertarios se consideran ahora parafernalia de pandillas."
 usc.61.a: "Vaya panda de perdedores."
 usc.62.t: "Aumento de la actividad antiamericana"
 usc.62.d: "\"¿Qué podemos hacer?\", preguntó Tom, con la voz apenas por encima de un susurro. La tenue luz de su pequeño apartamento proyectaba largas sombras, creando una atmósfera cargada de tensión. Afuera, las calles estaban repletas de milicias trumpistas, lo que hacía casi imposible pensar con claridad en cómo organizar una rebelión contra el tirano mandarina.\n\"Bueno, primero tenemos que correr la voz\", respondió Sarah, con los ojos brillantes de determinación. \"Creo que necesitamos el apoyo de la clase trabajadora\". Su pasión izquierdista era palpable, encendiendo un destello de esperanza en la sala.\n\"¿En serio?\", intervino Jeffrey, alzando la voz por la frustración. \"¡Tu supuesta clase trabajadora está pegada a Fox News, babeando por cualquier tontería que estén difundiendo!\". Su enfado resonó en las paredes, llenando el espacio de una tensión palpable.\n\"¡No todos!\", replicó Sarah con voz firme. Hay mucha gente ahí fuera que está tan harta de él como nosotros.\n\"Lo que digo es que deberíamos centrarnos en la gente con educación\", replicó Jeffrey, cruzando los brazos desafiante. \"Ya hemos visto suficiente de las clases bajas\".\n\"Vaya, eso es bastante clasista\", intervino Amy desde su sitio en el sofá, con la cabeza erguida perezosamente. Parecía estar observando más que participando, pero sus palabras flotaban en el aire como un desafío.\n\nMientras los ánimos se caldeaban y las voces se alzaban, Tom observó a sus amigos, sintiendo el peso del liderazgo oprimiéndolo. Ya era bastante difícil intentar liderar una resistencia sin verlos destrozarse entre sí. Al menos no estaban solos: miles de conversaciones similares se estaban dando en todo el país, reflejando sus frustraciones.\n\"¡Escuchen todos!\", la voz autoritaria de Tom atravesó el caos como un cuchillo. \"Necesitamos unirnos. Todos podemos contribuir a nuestra manera, siempre que nos mantengamos unidos; todos queremos lo mismo\".\n\nLas horas transcurrieron mientras ideaban su plan de batalla: agitar, educar, organizar y protestar. No era una gran estrategia, pero era un comienzo; y a veces, un destello de esperanza era todo lo que necesitaban para iniciar una revolución."
 usc.62.a: "He Will Not Divide Us."
 usc.63.t: "Lágrimas de zurdos"
 usc.63.d: "Buenas noches y bienvenidos a Jesse Watters Primetime. Esta noche, vamos a hablar sobre cómo a algunos liberales no les está yendo muy bien. Están tratando de adaptarse a la realidad de Trump, claro. Algunos parecen estar en una especie de huelga de sexo, mientras que otros siguen tiñéndose el pelo como siempre. Pero no se rían todavía; aunque suene gracioso, hay elementos peligrosos en juego. Miren esto: una publicación en redes sociales que invita a todos los \"ocupados\" a unirse a los \"grupos de resistencia\" que están surgiendo por todas partes. Deberíamos preocuparnos un poco, ¿no creen? Vamos, gente, estos locos han iniciado un conflicto civil solo para mantener a Trump fuera del poder. Ya saben lo que dicen: un animal herido es el doble de peligroso.\n\nSe preguntarán: \"¿Dónde se reúnen? Starbucks cerró hace un tiempo, así que no hay muchos lugares a los que puedan ir\". Necesitamos establecer algunas normas de compromiso adecuadas para todos los ciudadanos respetuosos de la ley en este país, y por el bien de nuestro futuro, amigos.\nPrimero, si ven algo sospechoso en su vecindario, como grupos de personas reunidas o muchos rostros desconocidos caminando, siempre informen a la policía local o a su grupo de milicianos; están aquí para su seguridad. Segundo, estén siempre listos para defender su propiedad; cuentan con nuestras enmiendas constitucionales por las que luchamos a diario. Si ven a algún liberal o extremista de Antifa a punto de cometer un incendio o cualquier acto de indecencia pública, asegúrense de detenerlo si tienen las herramientas para hacerlo. Tercero, puede ser impactante, pero no todos los liberales son gordos o tienen el pelo teñido de forma horrible; algunos pueden ser lo suficientemente astutos como para cambiar su apariencia; de hecho, quienes lo hacen probablemente tengan sus razones. De nuevo, manténganse alerta. Y finalmente, manténganse patrióticos, amigos.\n\nAhora, hablemos con nuestros expertos de hoy sobre lo que esto significa para un americano..."
 usc.63.a: "\"Estén alerta, patriotas\"."
 usc.64.t: "El GOP nomina a Trump para presidente"
 usc.64.d: "El presidente Trump ofreció un discurso impactante al aceptar la nominación republicana para la campaña de 2024.\n\nA pesar de la sorprendente traición a los valores americanos por parte de los burócratas del Estado profundo, el presidente enfatizó que nuestra nación y nuestra democracia deben perdurar, durante su discurso de aceptación de una hora en la convención extraordinaria del Partido Republicano. Sin embargo, como él mismo señaló, los resultados de las \"elecciones\" de 2020 deben ser desestimados. \"Hubo tanto fraude\", afirmó, \"sin importar quién ganó realmente, esos resultados deben ser rechazados y olvidados\".\n\nEl Partido Republicano respaldó esta postura. Mike Johnson, el actual presidente del partido, firmó una declaración junto a otros altos funcionarios, anunciando una reestructuración total del partido que comenzará con la anulación de los resultados fraudulentos de las \"elecciones\".\n\nEsto abrió la puerta para que nuestro presidente se postule nuevamente en 2024, con el apoyo abrumador de todos los delegados republicanos presentes en la convención. (...)\n\n\"Lo más importante, amigos, es que nunca dejaré de luchar\", declaró el presidente Trump en su discurso. \"Por ti, por tu familia. Una vez que nos deshagamos de estas personas -y son realmente horribles- que han causado tanto sufrimiento, reconstruiremos nuestro gran país como nunca antes. Será el mayor logro de nuestro movimiento: Hacer a América grande otra vez\".\nEn su mensaje final, Donald Trump afirmó que los verdaderos americanos nunca se rinden.\n\nLos comentarios en línea se llenaron de admiración y asombro ante la firme determinación y las audaces promesas del presidente."
 usc.64.a: "Dios bendiga a los EE.UU."
 usc.65.t: "Futuro de los demócratas"
 usc.65.d: "Con la destrucción de la falsa América del Estado profundo y nuestra tremenda victoria sobre los corruptos demócratas, la pregunta sobre el futuro de los demócratas sigue en pie.\n\nPor un lado, siempre hay voces más sensatas dentro del establishment demócrata, que también fueron reprimidas, como Manchin y Sinema. Fueron tratados muy injustamente. Mucha gente en nuestro país anhela el regreso de demócratas sensatos y moderados que no antepongan ideologías descabelladas a nuestro país. Claro que ningún demócrata podrá recuperarse de su vergonzoso pasado por un tiempo, pero al menos así pueden ayudar.\n\nTambién está Bobby Kennedy Jr.; nuestro presidente lo aprecia mucho. Se desilusionó por completo con la maquinaria demócrata y dice que no hay vuelta atrás. Demasiado corrupto, la verdad. Pero está muy contento de trabajar para nosotros en la administración Trump; como independiente, no quiere unirse al Partido Republicano y dice tener \"planes diferentes\". Obviamente tiene algunas opiniones ambientalistas sobre el fracking, pero podemos llegar a un acuerdo."
 usc.65.a: "Todo demócrata tiene algo bueno. Créanme, ¡yo fui uno!"
 usc.65.b: "¡Bobby, ven aquí! Harás un trabajo increíble, ¡pero déjame el petróleo a mí!"
 usc.66.t: "El Partido Libertario respalda al gobierno"
 usc.66.d: "Los libertarios americanos siempre han tenido relaciones turbulentas con los republicanos, pero parece que al menos una parte de los libertarios independientes se está uniendo al VERDADERO y LEGÍTIMO gobierno de América.\nAngela McArdle, actual presidenta del Partido Libertario, satisfecha con las políticas actuales, ha apoyado oficialmente a Donald Trump y ha organizado su partido para que comience a trabajar en nuestro sistema electoral y político. Ella misma forma parte de lo que actualmente es un importante grupo dentro del Partido Libertario: el caucus Mises. Este promueve, ¡agárrense!, el paleolibertarismo y el fusionismo, así como una versión más conservadora del libertarismo americano asociada a las campañas presidenciales del excongresista Ron Paul. A su hijo Rand le encantará.\n\nEl presidente Trump ya apoyó este desarrollo en su cuenta de Truth Social, declarando: \"¡Es fantástico ver a los VERDADEROS patriotas elegir el lado CORRECTO en la batalla por AMÉRICA! Siempre me han gustado los libertarios; son geniales. Hablé con la señorita McArdle, una mujer muy amable. Juntos lograremos MUCHO y ¡HAREMOS A AMÉRICA GRANDE OTRA VEZ!\"\nLa cuenta oficial de LP ya ha republicado la declaración del presidente con su propia versión del lema: \"¡HAGAMOS A AMÉRICA LIBRE OTRA VEZ!\""
 usc.66.a: "¿Libertarios? ¡Amo a los libertarios!"
 usc.67.t: "Kennedy funda el Partido \"Nosotros, el Pueblo\""
 usc.67.d: "Robert Kennedy Jr. reunió a sus partidarios frente al Capitolio para anunciar la formación de su propio partido político, \"Nosotros, el Pueblo\". En sus palabras, el propósito de este nuevo partido es \"que se escuchen todas las voces\" y \"que América tenga más opiniones\". Animó a todos los políticos independientes que buscan un espacio más allá de las divisiones dentro del Partido Republicano a unirse a su iniciativa.\nA pesar del entusiasmo generado por el anuncio, Kennedy también elogió a Donald Trump por permitirle a él y a sus partidarios expresar pacíficamente sus intenciones de restaurar el \"intercambio de ideas en América\".\n\nKennedy afirmó haber tenido una conversación personal con Trump y que le alegró mucho saber que el presidente estaba de acuerdo con su idea.\nSin embargo, Trump dejó claro: \"Recuerda, Bobby, tienes que mantener el sentido común, ¿de acuerdo? Nada de locuras, nada de discursos globalistas, me entiendes\". En respuesta, Kennedy rechazó por completo las ideologías absurdas del liberalismo extremo y afirmó que su nueva organización representa \"el sentido común de la política\"."
 usc.67.a: "¡Bobby! ¡Amamos a Bobby!"
 usc.68.t: "¡El arresto de Nick Fuentes acaba en tragedia!"
 usc.68.d: "La Segunda Guerra Civil Americana ha dado lugar a historias curiosas, y la del día de hoy no es la excepción.\nNicholas Joseph Fuentes era conocido como un comentarista político y activista que, a pesar de ser hispano, profesaba gran simpatía y creencias supremacistas blancas.\n\nAl comienzo de la guerra civil, intentó ganar influencia en nuestro territorio movilizando a elementos de ultraderecha, pero tras varios intentos fallidos y ser golpeado, se refugió en un apartamento barato para difundir su mensaje en línea. Finalmente, cometió el error de insultar y amenazar al presidente Trump, lo que alertó a las autoridades.\nLas fuerzas locales lograron localizarlo y lo detuvieron rápidamente cuando intentaba cruzar la frontera canadiense. Presa del pánico, intentó escapar con lo que parecía ser un arma de fuego, pero tras recibir al menos diecinueve disparos, la policía local se dio cuenta rápidamente de que se trataba de gas pimienta.\n\nLas autoridades locales han declarado que, a pesar del incidente, muchas comunidades en línea han expresado su alivio ante la aparición de nuevas filtraciones sobre su comportamiento en línea.\n\nDonald Trump no ha comentado al respecto, pero los informes que lo muestran sonriendo ante la noticia son demasiado comunes como para considerarlos rumores."
 usc.68.a: "¿Groyper? ¡Apenas los conozco!"
 usc.69.t: "Tulsi Gabbard y su visión"
 usc.69.d: "Tulsi, ¡qué valiente! No, literalmente. Es una soldado americana, una muy buena. Siempre fue, ya sabes, un poco rara, porque es un poco de izquierdas.\nMira, me llevo bien con todo el mundo; mira las encuestas, estoy de acuerdo con progresistas e izquierdistas, o con alguien que podrías considerar de izquierdas. Tucker dice que podemos usarlos, hay mucha gente que quiere que se escuche su voz. Cualquiera que ame a América es bueno para mí... Hablando de libros, mi libro principal se llama \"El arte del trato\", así que creo que podemos llegar a un acuerdo: si eres populista de izquierdas, sigues siendo americano; simple, como Bernie, pero él hizo un pacto con el diablo y perdió a lo grande. Tulsi hizo un pacto conmigo; ella es una ganadora, y me encantan los ganadores.\n\nPodemos convertirla en su líder de facto, imagínense los comentarios: \"¡Populistas, uníos por MAGA!\", ¡qué gran lema!\nMatt también hablaba de Lina Khan; oí que ha hecho un trabajo extraordinario contra los monopolios, y no nos gustan; arruinan la libre competencia del mercado, y ambos podemos beneficiarnos.\nUnidad: de eso se trata MAGA. Podemos lograr mucho si nos unimos, amigos. Los desacuerdos solo lo hacen más divertido."
 usc.69.a: "¡Tulsi, reúne a tu gente! Necesitamos una coalición de populistas."
 usc.69.b: "Gabbard debería centrarse más en su posición; será más útil."
 usc.70.t: "Despertar repentino"
 usc.70.d: "\"¿NOS ESCUCHA, SEÑOR PRESIDENTE?\"\n\n\"¡PRESIDENTE TRUMP, ESCÚCHENOS!\"\n\n\"¡NUESTRO PRESIDENTE NECESITA ESCUCHAR A SU PUEBLO!\"\n\nTe despiertas de un sueño de última hora en tu escritorio. A tu alrededor hay papeles, documentos, las delicias favoritas de los ratones de biblioteca: artículos, proyectos de ley, propuestas, iniciativas que no llevan a nada... ¡ABURRIDO! Cosas que antes despreciabas, porque empantanan tus promesas, pero ahora vives rodeado de ellas.\nYa no sientes el mismo calor de tu Pueblo como antes; te aprecian, sí, pero no como te gustaría; antes era devoción, ahora es el mismo índice de aprobación que para Reagan.\nEstos estirados te llaman su \"Presidente Republicano Modelo\", una persona segura para ellos. Sin embargo, encuentras consuelo en sus sonrisas falsas y sus fríos apretones de manos; quizás, algunos incluso sean genuinos.\nEllos tienen tu poder, después de todo, y no un paleto como Joe o su esposa Kate, a quienes les prometiste puertas doradas y agua con sabor a vino. Seguirán esperando pacientemente algo que se canceló hace mucho tiempo en una audiencia de un comité de \"inacción\".\n\nDibujan tus retratos en su piel, castigan a cualquiera que te \"traicionó\" o se opuso a ti. Al final, los traicionaste, pero aún no se han dado cuenta. No eres un león, pero, al menos, el apodo de Teflón te quedará bien."
 usc.70.a: "Estoy cansado, América..."
 usc.71.t: "Rey MAGA"
 usc.71.d: "¡VIVA TRUMP! ¡VIVA TRUMP! ¡VIVA TRUMP!\n\nTe envuelven luces brillantes mientras recibes vítores de la multitud; ¡qué gran ovación! A veces es difícil empezar a hablar con todos los cánticos. Se respira tanto amor: por ti, por América, por MAGA. Tu Pueblo es el más agradecido de la historia, quizás de todos los tiempos. Todo este arduo trabajo: recortes de impuestos, leyes antimonopolio, rescates a las mineras; lo que sea, ha dado sus frutos.\n\nControlar la burocracia ya no parece un esfuerzo inútil. Deja que se quejen y se quejen de que eres demasiado agresivo y asertivo, diciendo que usas órdenes ejecutivas para conseguir resultados. Eso es exactamente lo que queremos: ¡conseguir resultados! Sus gráficos y falsos expertos no significan nada cuando la VOLUNTAD POPULAR es lo que te impulsa.\nPor todo el país, te aclaman y buscan lagunas legales para mantenerte en el poder, quizás para siempre. Eric y Dan dicen que, si las estadísticas son correctas, eres tan popular que, incluso si George Washington y Abraham Lincoln resucitaran y se presentaran a las elecciones, no podrían derrotarte. Nadie podría.\n\nTu Pueblo te llama \"El León de América\", y lo aceptarás con los brazos abiertos. ¿Quizás durante este discurso? Sería un buen comienzo."
 usc.71.a: "\"...Amigos, algunos me llaman «El León», ¿creen que me pega?\""
 usc.72.t: "Formación del Partido Popular"
 usc.72.d: "Meses de organización llevaron a estos patriotas auténticos y honestos a la cima: la creación del partido. Muy conmovedor. Tulsi está haciendo un gran trabajo defendiendo los derechos de la gente común, ¡como tú! Pero diferente... más... bienestar.\n\nEl Partido Popular actuará como un centro unificado para todos los populistas de izquierda que apoyan a su Gobierno. Nick Brana, el copresidente del partido, quien pasó su tiempo político en la irrelevancia intentando reclutar a Bernie para su causa antiduopolio, finalmente logró ser relevante."
 usc.72.a: "¡Excelente trabajo, Tulsi!"
 usc.73.t: "El movimiento ultra-MAGA cobra impulso"
 usc.73.d: "A medida que el presidente Trump se ha vuelto más militarista, algunos de sus partidarios lo han visto como parte de su plan para acabar definitivamente con la influencia del Estado profundo antiamericano y sus simpatizantes. Se autodenominan \"ULTRA-MAGA\" y \"QAnon\" y se organizan para apoyar las acciones radicales del presidente para silenciar a los liberales.\n\nTodo comenzó con publicaciones anónimas en línea que afirmaban saber de lo que ocurría a puerta cerrada. Desde 2017, la versión más radical del movimiento MAGA ha ganado terreno y, con el giro inesperado de la situación actual, ha comenzado a trabajar más abiertamente.\n\nEl presidente no ha comentado sobre ninguna actividad organizativa realizada por sus fervientes partidarios. Sin embargo, en diferentes ocasiones, ha abordado las preocupaciones sobre el \"radicalismo\" dentro de su base. Ha dicho que no es más que un tema de conversación liberal y que todos los trumpistas son \"buenísimos patriotas\"."
 usc.73.a: "¡Buenísima gente!"
 usc.74.t: "Retorno del Rasputín de Trump"
 usc.74.d: "Con el FRACASO TOTAL del pequeño Tommy y su panda de caMIERDAS azules, todos los nacionalistas razonables están volviendo a nuestro gobierno. ¡Qué maravilla!\n\nEntre estos retornados se encuentra Steve Bannon, un viejo conocido de Trump. Ya ha podido reanudar todas sus actividades de radiodifusión y está diciendo que el pequeño Tommy era una vergüenza.\nSiempre se puede perdonar. Steve es duro e inteligente, y América necesita gente con ese patriotismo. No sólo él, si no también su estilo populista. Miller también está de vuelta - como una superestrella.\n\nPor años, los fraudulentos medios liberales afirmaban que Bannon era la \"mente maestra\", quien hacía las políticas, incluso tras que lo despidieras. La cagaste un poco con tus chats nocturnos con él. \"Señor, has demostrado que eres apto para el trabajo\", dijo. \"Fui un idiota por atreverme a dudar de tus decisiones.\" No pasa nada Steve, todos cometemos errores. Ahora, hablemos de negocios."
 usc.74.a: "Bienvenido de vuelta amigo."
 usc.75.t: "Nominación presidencial republicana"
 usc.75.d: "Miles de televidentes sintonizan sus televisores mientras el Partido Republicano inicia oficialmente su proceso de nominación presidencial. Durante este proceso, los políticos republicanos competirán por la presidencia, intentando influir en los votantes y delegados.\n\nParticiparán en debates, entrevistas y mítines para influir en el proceso de votación. El proceso de nominación de este año ha sido particularmente intenso, con más de diez candidatos de todo el país compitiendo por diversos cargos. La audiencia de los debates de FOX News está muy contenta y divertida. El inusual estilo de debate de Trump ahora está siendo imitado por otros oradores, quienes, salvo algunos casos excepcionales, presentan una versión cruda de su actitud y política.\n\nUna diversidad de personas, tanto jóvenes como mayores, compiten por la presidencia. Sin embargo, solo uno saldrá victorioso.\n\n[USC_trump_third_term_text]"
 usc.75.d1: "...Y será Donald J. Trump. Tras revocar con éxito la 22ª Enmienda y mostrar su disposición a postularse para un tercer mandato, sin duda recibirá todo el apoyo.\nDe hecho, los demás candidatos solo están aquí para mantener la apariencia democrática de nuestro Gobierno. La mayoría busca promocionarse para el próximo ciclo electoral. Uno a uno, se alinean y apoyan a Trump como presidente o su agenda."
 usc.75.a: "¡Trump para un tercer mandato, VAMOS!"
 usc.75.b1: "JD Vance conquista a los americanos con su encanto."
 usc.75.b2: "El pragmatismo y las palabras de Rubio conquistan al público."
 usc.75.b3: "Ron DeSantis gana con su personalidad inquebrantable."
 usc.75.b4: "La elocuencia de Carlson le permite llegar a la presidencia."
 usc.75.b6: "El amor eterno de Mike Johnson por ISRAEL le ganó el apoyo de millones de JUDÍOS."
 usc.75.b7: "El manifiesto apoyo de Vivek a Trump le asegura votos."
 usc.75.b9: "Kari Lake es nominada."
 usc.75.b8: "Byron Donalds es nominado."
 usc.75.j: "La elocuencia de Carlson le permite llegar a la presidencia."
 usc.75.c1: "Los años de arduo servicio de Paul le ayudan a ganar las elecciones."
 usc.75.c2: "Sarah Palin por fin tiene la oportunidad de brillar."
 usc.75.c3: "Elon Musk es nominado."
 usc.76.t: "El presidente actual recibe la nominación."
 usc.76.d: ""
 usc.76.a: "Excepcional."
 usc.77.t: "Investidura del nuevo presidente"
 usc.77.d: "¡Guau, qué multitud! No tan grande como la tuya, claro, pero aun así impresionante.\nLe estás entregando las riendas de esta gran nación a alguien nuevo. Es una sensación extraña. Te has acostumbrado tanto al poder, pero ahora es hora de dejarlo ir.\nMiles de personas acudieron a ver al nuevo presidente prestar juramento. Aun así, siguen alabando tu nombre. Les diste la oportunidad de votar por alguien que realmente querían, no por esos perdedores como Mitt o McCain. ¡Pobrecito, si pudiera ver a América ahora, moriría de nuevo!\n[USC_inaguration_dynamic_text]\n\nPuede que la presidencia de Trump haya terminado, pero la franquicia \"Era de Trump\" está lejos de terminar.\n\n¡Luces, cámara, acción! ¡Que comience la segunda temporada!"
 usc.77.d_trump_kid: "Y aquí están, de tu propia sangre, que seguirán sirviendo a esta gran nación. Con la ayuda de su patriarca, por supuesto. Su discurso es nada menos que una leyenda viviente de ti y tus hazañas. ¡Qué encantador!"
 usc.77.d_normal: "Al concluir sus votos y comenzar su discurso, te das cuenta de que, pase lo que pase, triunfarás en esta nueva América. Sus palabras no son más que una celebración de ti y de tus logros."
 usc.77.a: "\"Juro solemnemente...\""
 usc.78.t: "Escogiendo al vicepresidente"
 usc.78.d: ""
 usc.78.a1: "¡Anthony Kern!"
 usc.78.a2: "¡Jack Posobiec!"
 usc.78.a3: "¡Mark Finchem!"
 usc.78.b1: "¡Tim Scott!"
 usc.78.b2: "¡Tommy Tuberville!"
 usc.78.b3: "¡Glenn Youngkin!"
 usc.78.c1: "¡Thomas Massie!"
 usc.78.c2: "¡Chris Wright!"
 usc.78.c3: "¡Nancy Mace!"
 usc.79.t: "El candidato Trump elige al presidente Trump"
 usc.79.d: "Tal y como se esperaba, aún si no hay precedentes en la política americana, el candidato presidencial del Partido republicano, uno de los hijos de Trump, ha elegido a su padre para ser su compañero de fórmula.\n\nEn un comunicado oficial, ellos dijeron: \"No hay un hombre mejor para ser el segundo al mando que aquel que es tan querido por todas las familias patriotas en América. Él ha demostrado que se preocupa más por su país más que, a veces, de si mismo, haciendo todo lo posible para HACER AMÉRICA GRANDE OTRA VEZ(...)\"\n\nSi bien los partidarios más fanáticos de Trump y la gente común se han tomado bien esta situación, viendo muchas ventajas al tener a dos Trumps en el poder al mismo tiempo, los medios liberales, los cuales rara vez se exponen al ojo público, afirman que esto crea una \"dictadura total\". Ellis afirman que el hijo de Trump simplemente es una \"herramienta\" para su padre hambriento de poder y sus ambiciones\".\n\nIncluso varios congresistas y republicanos leales a Trump señalan la posible ilegalidad de esta clase de vacíos legales, y muchos advierten de que se pueda mantener en el poder por mucho tiempo. No obstante, las lagunas legales existen por algo e incluso la sociedad, construida al gusto de Trump, está dividida en este asunto."
 usc.79.a: "¡Vota doble Trump para el doble de grandeza!"
 usc.80.t: "Retrato del presidente"
 usc.80.d: "¿Quién es Donald J. Trump? A muchos les resulta difícil identificar los verdaderos y honestos rasgos de personalidad de nuestro presidente. Con su carácter desmedido y comportamiento impredecible, parece que diferentes grupos de sus partidarios se han formado su propia visión de Trump.\n\nPara muchos, es un multimillonario del pueblo, un auténtico empresario de cuello azul. A pesar de sus gastos extravagantes y de presumir de su riqueza, esto es lo que atrae a la gente. A diferencia de los ejecutivos corporativos de Nueva York, actúa como cualquier americano promedio que acaba de ganar un millón de dólares: con placas de oro, nombres en todo lo que posee y mujeres atractivas. Es un hombre que no se avergüenza de su riqueza, pero que siempre está dispuesto a ayudar al trabajador.\n\nTambién es un macho. Trump solo puede resolver muchos problemas; se ocupa de todos los asuntos directamente y los maneja con evasivas. No necesita burócratas inflexibles ni abogados tacaños que lo aburran con gráficos o estadísticas: si algo falla, hay que solucionarlo ya. El máximo defensor de la fuerza, y para una parte del pueblo americano, la llegada de un líder así llevaba mucho tiempo esperando. Si alguien se interpone en su camino, simplemente dirá \"¡Estás despedido!\".\n\nEn definitiva, Trump es la personificación del sueño americano. Para sus partidarios, es la única persona que acertó con el capitalismo. Desde acuerdos comerciales hasta desregulaciones, nunca ha habido un mejor presidente para los negocios. Su aura irradia éxito; Trump es el visionario del capitalismo, el mago de los negocios, el sabio de la sala de juntas, una creación viviente cuyos pasos y palabras denotaban seriedad, experiencia y poder."
 usc.80.a: "Multimillonario - Presidente del Pueblo... Sí, represento al común y corriente."
 usc.80.b: "¡Soy el presidente más macho de América, JAMÁS!"
 usc.80.c: "Sí, soy el visionario del capitalismo... con cantidades infinitas de dinero."
 usc.81.t: "Un Nuevo Partido para una Nueva América"
 usc.81.d: "El Partido Republicano ya no es efectivo. Carece de la determinación necesaria y no puede lograr nada. Es hora de introducir un liderazgo competente y establecer un partido que realmente represente a América y a sus ciudadanos.\n\nTras los recientes cambios organizativos, Ken Paxton, actual presidente del Partido Republicano, anunció oficialmente una renovación completa de la imagen del partido.\n\nEn una declaración formal, afirmó: \"El Partido Republicano ha servido bien al pueblo americano, pero durante demasiado tiempo, los problemas internos han sido motivo de preocupación para este gran partido. Tras una cuidadosa deliberación y con la aprobación del presidente, el partido se embarca en un proceso para transformarse de un partido de republicanos indecisos a un partido de patriotas decididos\".\n\nLa imagen de marca: sí, es muy importante. Donald Trump lo sabe bien. Ya saben, \"Como se llame a un barco, así navegará\". Es una cita famosa y todo eso. La gente necesita comprender el nuevo partido de inmediato, y el nombre es el primer paso para lograrlo. Hay tantas opciones para elegir, y Dan dice que todas son buenas. Pero no podemos usarlas todas porque sonaría a nombre de un partido comunista. Necesitamos algo simple y efectivo."
 usc.81.a: "Se trata de unidad... Unidad, tan importante. Una nación, bajo Dios."
 usc.81.b: "Amamos la Constitución, ¿verdad, amigos? Es el pilar de nuestra Unión."
 usc.81.f: "Soy patriota, no globalista. Y el futuro pertenece a los patriotas."
 usc.81.c: "Somos populistas. Hemos aportado mucho a nuestra gente. Bannon tiene razón."
 usc.82.t: "Eligiendo un bando"
 usc.82.d: "Liderar una coalición trascendental es todo un reto, pero especialmente construirla. Con el Partido Republicano totalmente comprometido y unido tras el \"cambio de imagen\", surgieron preguntas sobre a quién más invitar a la esfera MAGA. Por supuesto, somos un grupo muy acogedor; apreciamos a todos los que no nos desagradan.\n\nMatt, ¡menudo tipo!, ha estado diciendo por ahí cuánto debemos respetar a nuestros trabajadores, a los mejores trabajadores, créeme. Incluso existe una organización para auténticos obreros patriotas, llamada LIGA OBRERA AMERICANA, un nombre bonito. Son como un sindicato, pero mejor: sin corrupción, sin agenda marxista, solo los intereses puros de nuestros trabajadores.\nPero aliarnos con una organización así puede perjudicar nuestra posición ante las grandes y poderosas empresas, ¡y no queremos eso!\n\nPor otro lado, Sacks, un chico muy rico y tecnológico, dice que el futuro se alinea con un Silicon Valley verdaderamente americano, y la gente inteligente, como Elon y él, también son unos indios por alguna razón. Son muy partidarios de MAGA-Tech, ¿sabes? Podemos usar sus cerebros, y sus bolsas de dinero, o bolsas de oro, juego de palabras intencionado.\n\nEn la apuesta mucho más segura: los independientes, o sin etiquetas, como los llamaban a veces. Llevan años intentando entrar en la política a lo grande, pero el unipartidismo era tan injusto, y lo único que querían era resolver sus problemas locales, nada grave. Eso no cambiará mucho, pero ni siquiera planean hacerlo. Y lo más importante, no causarán daño."
 usc.82.a: "Obreros - ellos aman lo que hago, siempre leales a MAGA, desde el inicio."
 usc.82.c: "Profes - gente lista, necesitamos de esos por aquí."
 usc.82.b: "Vayamos a lo seguro, apoyemos a alguien sin etiquetas."
 usc.83.t: "Reyes y sus torres de marfil"
 usc.83.d: "La Unión yace derrotada, al igual que sus principales donantes y titiriteros.\nBasta con mirarlos, escondidos en sus grandes edificios y sedes, temerosos de lo que les harán las nuevas autoridades de MAGA. Hay muchísimas maneras de tomar represalias contra ellos por toda la censura, corrupción y difusión de disparates comunistas radicales que han cometido.\n\nPodemos confiscar sus activos, congelar sus cuentas, desmantelar sus empresas y usar todo ese dinero para financiar nuevos negocios americanos, pagar a los trabajadores y a la clase media, o mejorar la seguridad social; da igual. El mensaje será claro: la era de las corporaciones transnacionales en América ha terminado. Si quieren irse, pueden mudarse a Europa, donde los rusos podrán hacerles lo que quieran.\n\nAlternativamente, podemos utilizarlos. Es muy fácil influenciarlos y demostrarles quién manda ahora. DC ya no recibirá órdenes de las Torres Corporativas, será al revés. Después de todo, todas estas empresas -Microsoft, META y Apple- son parte de América, como el pastel de manzana.\nClaro, pueden pedir dividendos, pero la administración MAGA es conocida por sus GRANDES soñadores, y tienen muchos."
 usc.83.a: "Este es un país MAGA ahora, no necesitamos a esos globalistas."
 usc.83.b: "Lo que necesitamos son corporaciones leales, tienen dinero, tienen trabajos."
 usc.83.c: "Que abrazen MAGA. No se trata solo de dinero, es una nueva era."
 usc.84.t: "Mirada inedita de festividad trumpista"
 usc.84.d: "DE: SITIO WEB DE INDEPENDENT PRESS\nPor Jay Ferguson\n\nLlegué al complejo de la milicia a las afueras de Topeka justo antes del amanecer. Desde la interestatal, era imposible pasar por alto las tiendas de campaña, un escenario, hogueras rugientes y filas de camionetas con innumerables banderas americanas. El aire transportaba una mezcla de humo de barbacoa y gasolina. El rock country, los motores acelerando y el estruendo de los disparos lo convertían en una especie de fiesta previa al partido, mitad zona de guerra.\nAl adentrarme en la multitud, un grupo de hombres apoyados en sus camionetas me observó. Uno de ellos, un tipo barbudo con gafas de sol de espejo y un AR-15, echó un vistazo a mi cuaderno. \"¿Prensa?\", preguntó con cautela. \"¿No son noticias falsas, verdad?\". Me encogí de hombros. \"Solo estoy aquí para ver qué haces\", dije. Me observó un momento y luego sonrió. ¡Claro que sí! Pasen, tomen una cerveza, les contaremos la verdadera historia.\n\nMe sentaron en una silla plegable y me dieron una lata de cerveza fría. El hombre barbudo se inclinó. \"Trump es el único que no nos dio la espalda. Nos esforzamos al máximo, ¿y qué conseguimos? Empleos perdidos, inmigrantes ilegales por todas partes y políticos enriqueciéndose. Trump es el único que luchó por nosotros. ¡Al diablo con los límites de mandato! ¡Trump para siempre!\" Sus amigos vitorearon con un fuerte \"¡Claro que sí!\".\n\nCada vez que intentaba explorar, alguien me detenía para compartir su historia. La esposa del Hombre Barbudo, un torbellino de pechos con una sudadera roja con capucha MAGA, me hizo señas para que me acercara. \"¡Tomen un plato antes de que se acaben!\", gritó, apilando los platos. Mientras comía, se inclinó. \"No siempre fui política\", dijo. \"Entonces mi hermana se enganchó con los analgésicos. Decían que llegaría ayuda, pero nunca llegó. Fue entonces cuando lo vi: no les importa la gente como nosotros. ¿Pero Trump? Habla de lo que nadie más hablará. Estoy con él hasta el final\".\n\nPara cuando el líder de la milicia subió al escenario, la multitud estaba a reventar. Su voz resonó por encima de las llamas al alcanzar su clímax: \"¡Esta es la América de Trump ahora! ¡Lucha por nosotros, por nuestras familias! ¡El Estado profundo quería derribarlo, pero no cederemos! ¡Trump por siempre!\". La multitud estalló, ondeando banderas y coreando el nombre del presidente.\n\nAl final del evento, Gary me dijo que yo era \"uno de los buenos\" e insistió en que lo buscara en Facebook. De vuelta a mi coche, con la cintura más apretada por la falda y la cerveza, reflexioné sobre lo que había visto. Estas personas no eran refinadas ni sofisticadas, pero su devoción era auténtica. A pesar de toda su valentía, fueron cálidos, acogedores y estaban deseosos de compartir su fe en el hombre que creían que salvaría a una América que los había dejado atrás."
 usc.84.a: "Sin límites, sin vuelta atrás."
 usc.85.t: "Arcos Dorados"
 usc.85.d: "El McDonald's de Fargo no siempre había estado así. Antes, el autoservicio era una opción, y las papas fritas se servían a montones. Las parrillas seguían chisporroteando, la freidora seguía silbando, y el personal, de alguna manera, continuaba con su labor.\n\nDe repente, un ruido sordo comenzó a hacerse más fuerte afuera. Un par de SUV negras entraron al estacionamiento de grava, y las puertas se abrieron para revelar al mismísimo Donald Trump, con su rostro grande y una sonrisa que parecía estar grabada en su cara. \"Un lugar hermoso, amigos. Hermoso\", proclamó Trump, su voz resonando en las paredes de azulejos descoloridos como si reclamara el espacio. \"Este es el mejor McDonald's de Dakota del Sur, tal vez de todo el Medio Oeste. Créanme, he estado en todos\".\n\nEl gerente, un hombre mayor con manchas de grasa en el delantal y profundas arrugas bajo los ojos, se acercó arrastrando los pies. \"Señor presidente... bienvenido. Es un verdadero honor\".\n\nTrump le estrechó la mano con firmeza. \"No, no. El honor es mío\", respondió, con un tono exagerado y contundente. \"Ustedes son la columna vertebral de este país. Hamburguesas, papas fritas... eso es el verdadero espíritu de América. Y ustedes son quienes lo mantienen todo unido. Increíble\".\n\nDetrás del mostrador, un joven empleado deslizó una bandeja con manos temblorosas. La Big Mac carecía de su pan superior, las papas fritas eran escasas y el refresco apenas llenaba la mitad del vaso. Trump la tomó como si fuera un banquete. \"Esto es fantástico\", exclamó con voz firme. \"Incluso en tiempos difíciles, ustedes cumplen. La Big Mac; icónica. Histórica. Justo como lo que estamos haciendo\"."
 usc.85.a: "Todo está bueno, gran comida americana."
 usc.86.t: "Hannity: El comunismo en juicio, América se regocija"
 usc.86.d: "DE: FOX NEWS - HANNITY\n\nComo ya habrán oído, los bandidos comunistas radicales han sido juzgados. Y ahora, nuestra nación puede ver a los verdaderos villanos rojos: los marxistas, los llamados socialistas \"democráticos\" y los anarquistas.\nMírenlos a la cara: no verán remordimiento por lo que han hecho, solo expresiones frías de maniacos. Carecen por completo de comprensión del sufrimiento humano que ellos y sus peligrosas ideas han causado. Parece que su única disculpa es no haber cometido más crímenes.\nUna de nuestras respetadas expertas, Joyce Messier, ha calculado que la cantidad de civiles asesinados injustamente en los territorios controlados por la insurrección comunista alcanzó un millón, ¡un millón!, un dato realmente inquietante, sobre todo si se observa el afán de sus matones por cometer más crímenes.\n\nUno de esos canallas, al parecer Luigi, gritó como un loco mientras lo arrastraban hacia el juzgado: \"¡No matamos a suficientes!\" ¡Miren!\n\n---\n\nInquietante. Afortunadamente, nuestro país ya no sufrirá su locura. El presidente Trump y nuestros valientes patriotas salvaron a nuestra nación de las garras de esta amenaza. Al igual que Reagan. Sin embargo, esta vez fue aún más peligroso y aterrador, pero lo superamos.\nSiempre recordaremos los crímenes cometidos por el socialismo radical y lloraremos a sus víctimas.\n\nEste es el Sean Hannity Show, y volveremos después de esta breve pausa."
 usc.86.a: "¡Oye, ROJO, estás MUERTO!"
 usc.87.t: "Carlson: Corrupción Demócrata Nacional investigada"
 usc.87.d: "DE: FOX NEWS - TUCKER CARLSON TONIGHT\n\n¡Hola! Bienvenidos a Tucker Carlson Tonight.\nEl tema principal de esta semana es evidente, y sé que están deseando hablar de él. Los demócratas corruptos están siendo juzgados por todas sus acciones.\nNo solo están siendo procesados por su terrible insurrección y otros crímenes que cometieron durante este período, sino que nuestro Departamento de Justicia se asegura de que ningún delito quede impune.\n\nEstos incluyen corrupción, sabotaje constitucional, censura y políticas dirigidas al pueblo americano en su conjunto.\n\nAquí están los tres principales, por así decirlo: Nancy Pelosi, que apenas puede caminar; Chuck Schumer, que todavía tiene un aspecto desagradable; y Hunter Biden, que parece relativamente fresco, probablemente no haya consumido mucha cocaína en su celda.\n\nPuede que estén murmurando, ¡pero la evidencia ya está ahí! Nuestros fiscales y el fiscal general han hecho un trabajo increíble documentando todos los crímenes de este régimen ilegal. Veamos algunos de ellos.\n\n----\n\n¡Vaya, qué gran aventura! Una auténtica mafia demócrata.\nDeberíamos estar agradecidos con Dios por haber derrotado a esta gente malvada; y no se equivoquen, son malvados.\nHay mucho más que cubrir en cuanto a casos menores y procesos judiciales relacionados con estos tres grandes criminales. Regresaremos con nuestro experto invitado para analizarlo con más detalle después de esta breve pausa publicitaria."
 usc.87.a: "Fin de la línea."
 usc.88.t: "Watters: Impostores del FBI irán a prisión"
 usc.88.d: "DE: FOX NEWS - JESSE WATTERS PRIMETIME\n\nAquí está Jesse Waters, con los últimos titulares: \"Terroristas del Frente Patriota serán juzgados\".\nSí, leíste bien. Los supuestos líderes del Frente Patriota están siendo encarcelados ahora mismo. ¡Es una gran noticia!\nEsto no solo desmiente las viejas y trilladas acusaciones liberales de MAGA \"fascista\", sino que también pone fin a la mayor operación de lavado de dinero en la historia del Estado profundo.\nSinceramente, amigos, ¿alguien cree realmente que estos \"nacionalistas\" con máscaras blancas y extremadamente racistas aparecieron de la nada? Claramente, hubo intromisión del FBI.\n\n¡Miren a este tipo! Se puede ver al cabecilla de estos agentes federales descalificados: Thomas Rousseau, o como lo llamaba el presidente Trump, \"Pequeño Tommy\".\nMenuda mirada tenía ese tipo, el Pequeño Tommy. No tiene mucho que decir para defenderse; todas las cartas están sobre la mesa. Lideró una violenta insurrección, no solo contra el gobierno legítimo, sino contra la democracia americana en su conjunto. Y ahora él y sus amigos desenmascarados irán a prisión.\n\nNo estoy seguro de qué llevó a Tommy a atacar a quienes lo alimentaban: los demócratas. Quizás fue solo un malentendido o algo así. Hablaremos más sobre el asunto con nuestros expertos. ¡Nos vemos después de esta breve pausa publicitaria!"
 usc.88.a: "El pequeño Tommy en la celda grande."
 usc.89.t: "Are You Ready To Rumble?"
 usc.89.d: "La multitud que se había reunido frente al podio era bastante numerosa, compuesta en su mayoría por soldados que acababan de regresar del frente. Se pensaba que necesitaban un impulso de moral, así que estaban a punto de recibir lo que más les levantaría el ánimo: un discurso.\n\n\"¿Crees que Trump va a hablar? ¡Eso sería algo digno de contar!\", comentó Tony, un nuevo recluta, bromeando con su amigo Ron, que ya tenía más experiencia.\n\n\"Lo dudo, no lo llevarían tan cerca del frente, especialmente con todos los ataques aéreos de estos días\", respondió Ron.\n\nPronto, los murmullos de la multitud se apagaron cuando una figura apareció en el escenario dirigiéndose al podio. Era un hombre mayor, pero en buena forma, vestido con una camiseta roja sin mangas y un pañuelo. En su rostro, Tony decidió que tenía posiblemente el bigote más extraño que había visto. No sabía quién era, pero el público comenzó a vitorear. Así que decidió preguntarle a Ron.\n\n\"¿En serio? ¡Ese es Hulk Hogan! ¡El mejor luchador de todos los tiempos!\", exclamó Ron, comportándose más como un niño que como un adulto. Antes de que Tony pudiera decir algo más, Hulk comenzó a hablar.\n\n\"Trumpamaniacos\", empezó, \"¿están listos para lo que se viene?\". Continuó. Tony se sentía inquieto por lo que pudiera seguir...\n\nEntonces, Hulk Hogan se arrancó la camisa, revelando otra debajo con la bandera americana y la imagen de Donald Trump. El público estalló en vítores, pero Tony seguía sin entender por qué tanto alboroto, aunque decidió dejarse llevar. Apenas podía oír nada con tanto entusiasmo a su alrededor. ¿Qué tan popular era este tipo?\n\nCuando el viejo luchador salió del escenario, todo el público hablaba animadamente. Parecía que los horrores de la guerra se habían desvanecido, aunque solo fuera por un momento. Tony también había olvidado la guerra, pero más por confusión que por asombro. Mientras Ron contaba historias sobre combates de lucha libre antiguos, Tony no podía dejar de pensar en ese bigote."
 usc.89.a: "¡TREMENDO!"
 usc.90.t: "¡Por América!"
 usc.90.d: "La escena era un torbellino de emociones, pero había un control palpable en el aire. Miles de patriotas, vestidos con una mezcla de equipo pseudo-militar y camuflaje, se agolpaban frente al escenario, ansiosos por escuchar el discurso del salvador de América. El cielo, cubierto de nubes grises tras días de intensos combates en la región, reflejaba el estado de ánimo de la nación. Las victorias locales habían elevado la moral de los valientes soldados que arriesgaban sus vidas para proteger su república.\n\nLa multitud estalló en vítores cuando el presidente Trump apareció de un vehículo militar y se dirigió al escenario, luciendo un abrigo negro, su característico cabello rubio y una corbata roja que parecía un poco chamuscada por la atmósfera llena de ceniza. Su rostro, marcado por el cansancio y las arrugas de la edad, mostraba el peso del estrés de liderar su país, como un verdadero patriota. Agentes del servicio secreto, armados hasta los dientes, lo rodeaban, aunque este probablemente sería el lugar más seguro del mundo para Trump, con la multitud vitoreando en señal de aprobación y lealtad. Las banderas de MAGA ondeaban entre la multitud, y los soldados se apiñaban hasta donde alcanzaba la vista.\nTrump saludó a la multitud de izquierda a derecha y levantó la mano pidiendo silencio. El bullicio se apagó casi de inmediato.\n\n\"Compatriotas americanos\", comenzó. \"Guerreros, patriotas, hoy estamos al borde de un momento histórico. Esta guerra, esta gran lucha, se trata de lo que América realmente representa... y les digo ahora mismo\", rió Trump, \"no es lo que el otro bando quiere que crean\".\n\nLa multitud estalló en vítores, con banderas ondeando y rostros llenos de orgullo y determinación. \"El Corrupto Joe... está ahí fuera\", dijo Trump, aferrándose al podio con fuerza. \"Escondido en su sótano... se supone que es el líder de esta nación, pero miren el desastre que ha causado, ¡en serio! Ese mentiroso Joe y sus compinches de la izquierda radical. Pero nosotros...\", la voz del presidente se fue apagando. \"Nosotros... somos los que vamos a ganar. No Joe el Lento ni la élite que odia a América. ¡Seremos quienes devolvamos la grandeza a este país!\"\nLos soldados volvieron a vitorear."
 usc.90.a: "¡MAGA!"
 usc.91.t: "Las locuras del GOP"
 usc.91.d: "A pesar de todas las reformas y mejoras a lo largo de los años, el Partido Republicano sigue siendo una institución de bajo rendimiento. Hay senadores perezosos, republicanos ineficaces y republicanos solo de nombre que han dejado un legado muy negativo. Y muchos individuos corruptos siguen siendo una mancha en él hoy en día.\n\nPor eso la gente busca algo verdaderamente patriótico. Aún podemos honrar la memoria de Nixon, Reagan y Lincoln sin la etiqueta de un partido político. Sin duda lo agradecerían.\n\nCambiar un partido por completo es un desafío, pero es necesario para que la era Trump pueda dar paso a una nueva fase. Tenemos varias opciones para presentar y transformar nuestro partido en uno nuevo."
 usc.91.a: "Trump nos hizo el Partido del Pueblo."
 usc.91.b: "Trump nos hizo el Partido de los Patriotas."
 usc.91.c: "Trump nos hizo el Partido de la Nación Americana."
 usc.92.t: "Carta de Hinkle"
 usc.92.d: "\"Estimado presidente Donald J. Trump:\n\"Espero que se encuentre bien. Me llamo Jackson Hinkle y soy un comunista americano. Pero, sobre todo, soy un patriota americano.\n\"Antes de que deje de leer, permítame explicarle mi postura. Lo apoyamos. Lo que ha hecho por la clase obrera de esta nación devastada es increíble. Usted es verdaderamente un presidente del pueblo. Nosotros, por supuesto, como cualquier oposición razonable, vemos desventajas y contratiempos, pero entendemos que esta nación lo necesita y lo apoya mayoritariamente.\n\n\"Tras la caída del gobierno \"socialista\" profundamente defectuoso en California, mis camaradas y yo comenzamos a organizarnos. Nos une la idea de ayudar a los necesitados y construir una América más fuerte.\n\n\"Mi grupo, llamado \"Comunistas por Trump\", ha obtenido un gran apoyo de comunistas patriotas. Sin embargo, las autoridades gubernamentales nos han prohibido repetidamente participar en actividades políticas más activas.\nPor eso le pedimos su ayuda y que ponga fin al procesamiento ilegal de nuestro movimiento. Los patriotas pueden trabajar juntos para mejorar nuestro país. Con una visión compartida\".\n\nLa carta continúa hablando de cómo crear un \"socialismo verdaderamente americano\" o algo así. No lo leíste, pero estos tipos son interesantes.\n¿Comunistas por Trump? ¿Comunismo MAGA? ¡Eres tan popular que hasta los rojos te adoran! Y por los trabajadores, estamos haciendo mucho por ellos, pero podemos hacer aún más, y ellos pueden ayudar..."
 usc.92.a: "Estos tipos son algo raros, pero bueno, ¡cuantos más, mejor!"
 usc.92.b: "¡Tonterías! El comunismo es EL ENEMIGO de América. Punto."
 usc.93.t: "Liberación de nuestros héroes"
 usc.93.d: "Muchos verdaderos americanos fueron encarcelados bajo el régimen ilegal de Biden. Ahora que ha colapsado, debemos liberarlos de estas crueles prisiones y dar cabida a quienes realmente merecen estar tras las rejas.\n\nMiles de presos políticos están siendo liberados de todas las cárceles bajo nuestro control. Algunos solo expresaron su desacuerdo verbal y fueron brutalmente reprimidos. Sin embargo, muchos lucharon por sus derechos como americanos, como deben hacerlo los verdaderos patriotas, y fueron castigados por ello.\nA este tipo de personas no les gusta la vida en paz. A pesar de haber estado recluidos en condiciones crueles, muchos ya se están alistando en la milicia o recuperando su condición de soldados. Son muy valientes. Se están convirtiendo en los rostros de nuestro movimiento, los apasionados defensores del MAGA.\n\nDesafortunadamente, algunos de ellos no sobrevivieron para ver su liberación. Fueron torturados y asesinados por los corruptos demócratas. Pero nuestro Departamento de Justicia está haciendo todo lo posible por recordar y recopilar pruebas de todos los patriotas asesinados injustamente, y por dar a conocer los crímenes del Estado profundo. Se convertirán en mártires, mártires de la nueva América."
 usc.93.a: "Nuestra guardia está en marcha..."
 usc.94.t: "¡Richard Spencer es ejecutado!"
 usc.94.d: "Richard Bertrand Spencer era un hombre que no temía ser el centro de atención, siendo uno de los organizadores de la manifestación \"Unite the Right\" y una figura clave de la llamada \"Alt-right\" en 2016. Sin embargo, sus aventuras no terminarían ahí. En el apogeo de las elecciones, antes de la Guerra Civil, Spencer denunció su apoyo a Trump y, en su lugar, respaldó a Joe Biden, una decisión que generó mucha confusión entre sus aliados de ultraderecha, lo que lo aisló aún más, ya que el equipo de Biden denunció abiertamente su apoyo.\n\nCon la Guerra Civil en pleno apogeo, Spencer intentó integrarse a la Unión de América para impulsar su carrera, pero tras varios incidentes de abuso y acoso laboral, fue rápidamente despedido de su bajo cargo administrativo. Con su rol en el sindicato sepultado, se apresuró a desertar al gobierno constitucional, intentando hacer lo mismo allí. Sin embargo, pronto fue descubierto, ya que tanto su papel en el sindicato como su apoyo a Biden antes de la Guerra Civil salieron a la luz.\n\nSpencer fue arrestado y espera juicio por traición. Es evidente el destino que les aguarda a los traidores; sin importar el método, este sería el clavo en el ataúd de la carrera de Spencer.\n\nCuando el personal de seguridad le ofreció su última comida, solo pidió:"
 usc.94.a: "\"Un queso suizo fundido, champiñones asados y cebolla caramelizada sobre una hamburguesa\"."
 usc.95.t: "Derecho divino"
 usc.95.d: "Trump estaba rodeado de su equipo de prensa, todos ansiosos por obtener la foto perfecta de él, con su amplia sonrisa y su icónico pulgar hacia arriba. Los innumerables rifles fríos al fondo contrastaban con la imagen que el presidente intentaba proyectar. La sala rebosaba de energía; cada destello de la cámara iluminaba brevemente la sala mientras Trump levantaba los brazos para enfocar.\n\n\"Estamos aquí hoy\", dijo con una voz resonante y una sinceridad exagerada, \"porque necesitamos reconocer a quienes, francamente, nos mantienen en esta lucha. Nuestro Pueblo, los verdaderos patriotas que luchan tras las líneas, quienes se aseguran de que tengamos todas las herramientas para luchar. Créanme, amigos, ¡nuestros combatientes están recibiendo lo mejor de lo mejor, hecho aquí mismo!\n\nSe quedó en silencio. Su mirada recorrió a la prensa antes de girar rápidamente la cabeza hacia el mostrador, donde apareció el dueño de la tienda, cargando un rifle. \"Esta, señor presidente, es una carabina M4 con recámara para el calibre 5.56\".\n\nTrump se inclinó sobre el mostrador y agarró el rifle con ambas manos, luchando por mantener la pesada arma en alto antes de reírse para sí mismo. Se giró hacia las cámaras, frunciendo el ceño. \"Es muy pesada\". Su mirada recorrió el arma larga de arriba abajo. \"Esta gran, gran arma, algo así no se puede fabricar en otro lugar, ni siquiera por los demócratas radicales, ¡así de antiamericanos son!\"\n\nColocada en sus manos, la pistola se convirtió en el accesorio para una sesión fotográfica improvisada. Trump adoptó varias poses, primero con el rifle a la altura de la cintura con el cañón apuntando a la izquierda, luego levantándolo con la empuñadura apoyada en su hombro. Finalmente, apuntó el arma directamente a la cámara, con su expresión de suficiencia justo detrás del cilindro saliente. La sala pareció contener la respiración mientras apuntaba, pero la inquietud se disipó cuando el presidente bajó el rifle. \"¡No eres de CNN!\". \"¡De todas formas, puede que este rifle no esté chapado en oro, pero creo que me lo voy a llevar!\"\n\nEl rostro del dueño de la tienda se iluminó de alegría al encontrar su mirada con la de Trump. El presidente, con el rifle aún en la mano, se giró una última vez hacia las cámaras, inclinando la cabeza hacia adelante en una última toma dramática."
 usc.95.a: "And I'm proud to be an American..."
 darkmaga.1.t: "La Ira"
 darkmaga.1.d: "Necesito acción. Olvídense del Congreso: son unos completos inútiles, no pueden hacer nada. Pónganme en televisión: en horario estelar, con altos índices de audiencia. Declararé una emergencia enorme. Mi Pueblo necesita protección: mano dura para una decisión firme. Ya no me hago el amable; cuando te golpean, golpeas el doble, y yo soy EL PRESIDENTE, puedo golpear tan fuerte como quiera.\n\n\"Compatriotas americanos, me dirijo a ustedes esta noche para declarar que nuestra nación se está muriendo, tanto en sentido figurado como literal. La guerra continúa, una guerra sangrienta, y necesitamos actuar ante todo. Soy la garantía de su seguridad. Por eso, hoy, con los poderes que me otorga nuestra sagrada constitución, hago uso de la Ley de Poderes de Guerra. No se equivoquen, esta es una guerra real, y actualmente soy un presidente en tiempos de guerra.\n\"Durante demasiado tiempo, ustedes, el Pueblo, han sido engañados y mentidos por políticos corruptos, incluso en nuestras propias filas. Pero esto termina AHORA; se acabó el tiempo de las palabras vacías; ha llegado la hora de actuar...\nMientras siga siendo presidente y mientras el Acta de Poderes de Guerra esté vigente, me comprometo a respetar todas las libertades en la medida de mis posibilidades. Pero a nuestros enemigos les digo esto, tanto internos como externos: su repugnante juego sucio pronto terminará.\n\"Pueblo mío, compatriotas americanos, ha llegado su hora. Hagámoslo...\"\n\nCon esto, se disuelve el gabinete y... El Congreso ha sido suspendido, quizás para siempre. Por el momento, eres un rey por encima de la ley. Usa este poder como mejor te parezca."
 darkmaga.1.a: "Le daré a mi Pueblo la vida que merece..."
 darkmaga.3.t: "Sacados a la luz"
 darkmaga.3.d: "Era un espectáculo digno de contemplar: una multitud inmensa observaba con ansiedad las enormes pantallas LED que transmitían en vivo desde el juzgado principal. Para ellos, era como un espectáculo, como \"The Apprentice\", solo que en lugar de \"¡Estás despedido!\", se les oía la pena de muerte.\n\nLos \"acusados\", aturdidos y débiles, murmuraban sus patéticas palabras. Sabían que era un farsa judicial; nunca hubo lugar para objeciones. Todos habían sido etiquetados como traidores mucho antes de que comenzara, por ti en una de tus VERDADES.\nSe pusieron histéricos cuando el juez los declaró \"culpables de todos los cargos: TRAICIÓN\". Momentos después, dos guardias corpulentos y fuertes los sacaron de la sala, al vacío, para siempre.\n\n¿Cuántos de ellos eran realmente culpables? No importaba: todos eran aduladores y oportunistas, listos para traicionarte a ti y a América en cualquier momento.\nTu Pueblo también lo sabía. Con cada veredicto, la multitud se hacía más ruidosa, más ansiosa. \"Es la justa liberación\", decían. \"Todos estos estúpidos federales y sus estúpidas leyes. Se merecen lo que se viene\". La gente vitoreaba, mientras esas \"ratas\" suplicaban y lloraban. Les parecía que esto era lo que se habían estado perdiendo. Sentían que con cada burócrata muerto, sus vidas mejorarían y el Paraíso, una vez perdido, sería recuperado.\n\nUn gran espectáculo, independientemente de sus fundamentos religiosos. Le dices a Dan que guarde una copia de las grabaciones del tribunal para uso privado."
 darkmaga.3.a: "Slice - Come Paradise!"
 darkmaga.4.t: "Ratas en la casa"
 darkmaga.4.d: "Aquí están: los bichos y gorrones. Era inevitable. Escuchen sus quejas y llantos, como malcriados que no pueden aceptar que el futuro ya no les pertenece.\n\nLa mayoría son liberales y socialistas que salen de sus escondites porque creen que \"el peligro nunca ha sido tan grande\" y que \"Trump se ha vuelto loco de poder\". Pero también hay algunos que simplemente están enojados por la toma \"hostil\" de Trump.\n\nSu resistencia es inútil, de eso no hay duda. Sin embargo, como sugieren algunos comandantes, es mejor acabar con esto rápidamente. De lo contrario, su audacia podría crecer cada día."
 darkmaga.4.a: "Unos perdedores totales."

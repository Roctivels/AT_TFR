 usc.1000.t: "América - Cambiada para siempre"
 usc.1000.d: "Fue algo digno de admirar. Victoria, total y completa. Se equivocaron, siempre se han equivocado. Piénsalo: toda la lucha, toda la pelea, te dieron con todo. Los cocainómanos de Wall Street que hicieron todo lo posible por dejarte en bancarrota, esos contratistas de la mafia que intentaron estafarte, y todos los parásitos y lacras en el camino; no pudieron contenerte. Solo impulsaron tu ascenso.\n\n¡USA! ¡USA! ¡USA!\n\nTu Pueblo, ahí está, por todo el país, celebrando, cantando, disfrutando. Tu victoria es suya; tu América es suya, cambiada para siempre y esta victoria lo ha consolidado. En las décadas y siglos venideros, recordarán lo que tu hiciste por tu Pueblo, y todos los haters serán olvidados.\n\n¡TRUMP! ¡TRUMP! ¡TRUMP!\n\nNunca te rendiste, nunca te acobardaste. Todos los medios falsos y esos don nadies de Hollywood, que huyeron como ratas del Titanic, llamándote \"cobarde\" y \"estafador\"... bueno, ¡deben sentirse bastante estúpidos ahora mismo!\n\n¡VICTORIA! ¡VICTORIA! ¡VICTORIA!\n\nWashington, envuelto en banderas y pancartas como nunca antes, la multitudes se reunen para manifestarse, la mayor manifestación; algunos dicen que la más grande de la historia. Mientras esperas en las sombras, esperando tu turno, un orador tras otro te infla; el vicepresidente, Tucker, Ivanka y muchos otros.\nFinalmente sales. La multitud ruge y aplaude; es un torrente de gente. Al acercarte al podio, piensas en algo que decir; algo para animar a la gente. Al acercarte al micrófono, decides: a todos les encanta un buen recuerdo."

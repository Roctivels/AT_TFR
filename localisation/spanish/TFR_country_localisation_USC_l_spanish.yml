 USC_constitutional_crisis_idea: "Crisis constitucional"
 USC_constitutional_crisis_idea_desc: "Con el advenimiento de la Segunda Guerra Civil Americana, que sumió a toda la nación en el caos, el estatus de la Constitución se ha puesto en tela de juicio, con el ejército y el Congreso en pugna por su futuro y, por extensión, por el papel de un gobierno popular durante la mayor crisis de la historia americana. Con la nación en juego, el futuro de América podría depender de este asunto crucial."
 USC_defense_production_act_mil_industry_idea: "Acta de Producción para la Defensa"
 USC_rural_economy_idea: "Economía rural"
 USC_rural_economy_idea_desc: "Los estados de las Grandes Llanuras no son conocidos por su capacidad industrial. Desde el gran Misisipi hasta las Montañas Rocallosas, vastas granjas se extienden por las llanuras, albergando numerosos pueblos y comunidades rurales con pocas zonas industriales entre ellas. Como resultado, nuestra economía está dominada por el sector agrícola. La limitada capacidad industrial de nuestro país ha restringido el desarrollo de nuestras industrias y obstaculiza nuestra capacidad para librar una guerra industrial a largo plazo contra potencias hostiles."
 USC_rockies_defense_idea: "Defensa de las Rocallosas"
 USC_argumental_army_idea: "Ejército argumentativo"
 USC_argumental_army_idea_desc: "En lo que respecta a la guerra civil que asedia a nuestra gran nación, nuestras fuerzas armadas han llegado a la conclusión de que es necesario eliminar todos los elementos hostiles para facilitar la reunificación de América. Sin embargo, ahí es donde parecen terminar los acuerdos. Dentro de la cadena de mando, el faccionalismo se ha descontrolado, con generales y oficiales enfrentándose entre sí por el papel de las fuerzas armadas y su forma de librar esta guerra. Si no se restablece el orden en este caos, nuestras tropas corren el riesgo de cruzar el Rubicón y acabar cayendo al abismo."

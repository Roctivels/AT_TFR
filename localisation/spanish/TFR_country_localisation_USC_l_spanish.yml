 USC_the_dark_mandate: "El mandato oscuro"
 USC_the_dark_mandate_desc: "A mi alrededor hay idiotas e imbéciles. No puedo hacer nada. Mi Pueblo, el Pueblo americano, está sufriendo terriblemente: muerte y destrucción por todas partes. Necesitan venganza; yo soy su venganza, siempre lo fui; contra políticos corruptos, aduladores y conservadores cobardes.\n\nAmérica está en problemas como nunca antes, más que en la guerra de Secesión, eso seguro. La gente necesita un líder fuerte, alguien que los ponga PRIMERO, que los PROTEJA, que los GUÍE.\n\nUna vez dije que teníamos que acabar con la matanza americana, pero ahora lo veo: la única manera de salvar a América es con nuestra propia matanza. Vamos a tener la mejor matanza de la historia, gente."

 usc.1001.t: "Gobierno trumpista solicita ayudas"
 usc.1001.d: "Hemos recibido una comunicación de representantes de Denver, quienes solicitan asistencia militar para una iniciativa que podríamos apoyar. En esencia, afirman que \"cualquier cosa sería de ayuda\".\nAdemás, sugieren que nuestra ayuda podría resultar en posibles beneficios y una mejora en las relaciones con su país, si el presidente Trump resulta victorioso en los (ex-)Estados Unidos."
 usc.1001.a: "¡Suena bien! Trato hecho."
 usc.1001.b: "No, no creo que debamos."

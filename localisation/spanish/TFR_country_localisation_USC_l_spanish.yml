 usc.10.t: "La Unión caída"
 usc.10.desc: "Tras meses de conflicto implacable y el sacrificio de innumerables patriotas, hemos logrado una contundente victoria: la Unión de América y sus instituciones corruptas han sido derrotadas decisivamente. Con la captura de Washington D.C., bajo control de la Unión, y otras ciudades clave que resistieron nuestro avance, el Gobierno de la Unión se ha desintegrado, dejando la mayor parte de su territorio bajo nuestro control. A pesar de este importante logro, grupos de milicias y remanentes del ejército de la Unión continúan resistiendo. Algunos aún desconocen la rendición de su Gobierno, mientras que otros, impulsados por la amargura y el desafío, se niegan a aceptar su derrota. Es imperativo que confrontemos y neutralicemos a estas facciones. Ignorarlas podría poner en peligro no solo nuestras operaciones militares en curso, sino también nuestros esfuerzos de reconstrucción mientras trabajamos por la reunificación de América.\n\nCon nuestro principal adversario sometido, nuestra atención debe centrarse ahora en la monumental tarea de reunificar y gobernar la nación fracturada. Aunque las milicias, fascistas y comunistas que dominan los territorios restantes puedan parecer más débiles que nuestras fuerzas, no debemos subestimarlos. Como un zorro acorralado, son peligrosos y hábiles, preparándose para una lucha prolongada. Están fortificando sus defensas, armando sus filas, tendiendo trampas y posiblemente planeando contraataques. Estas facciones podrían movilizar sus fuerzas restantes, reforzar sus ejércitos e invadirnos primero.\n\nEl camino por delante estará plagado de desafíos. Si bien hemos superado con éxito el primer gran obstáculo, nuestro viaje está lejos de completarse. El camino hacia la reunificación y la estabilidad plenas es peligroso, con numerosos peligros y trampas acechando. Un solo paso en falso podría precipitarnos al abismo, del que no habrá recuperación."
 usc.10.a: "Solo es la primera cima de la montaña que hemos creado."

 USC_seized_corporate_assets_tt: "§gHuyen como ratas mientras la División Antimonopolio del DoJ congela sus preciados activos. \"¡Tengo una familia!\", gritan. Durante décadas, los directores ejecutivos corporativos abusaron del americano promedio: los censuraron y estafaron, y ustedes acabaron con su juego sucio. Wall Street es ahora la TRUMP Street.\nPensaron que vivirían sin consecuencias, aferrándose al poder y disfrutando de sus mansiones. Habían construido su propia tumba.\nEscóndanse en sus torres de marfil, parásitos globalistas. Construyan sus torres altas, más que las mías. Pero no se sorprendan cuando se queden sin oxígeno.§!"
 USC_loyal_corporate_america_tt: "§gAhora cantan tu canción: \"América Primero\". Ya no censurarán las opiniones de tu Pueblo; es al revés. Aranceles y el nuevo control del DoJ: se lo tragan todo, solo para quedar bien. Imbéciles.§!"
 USC_corporate_maga_tt: "§gBill Gates, ese gusanito sin carácter, te mira con su piel pálida y sus ojos apagados. Dice: \"Microsoft es América Primero, señor. Ahora lo entendemos\".\nUno a uno, los directores ejecutivos y directores se acercan y besan el anillo. Antes odiaban MAGA por tanta censura y lobby pro-Pantano. Pero ahora ven la luz... Ahora lo entienden.§!"

 usc.1.t: "América reunificada"
 usc.1.desc: "Una bandera tan familiar se alza sobre una nación herida.\n\nMuchos deseaban ver a América en ruinas para siempre, una turba enfurecida pisoteando la libertad para siempre, y con nuestra nación en grave peligro y nuestras familias en la mira del enemigo, no tuvimos más remedio que enfrentarlos. América es un país hermoso, y los americanos son quizás una de las personas más grandiosas de la tierra; sobrevivimos y prosperamos en tiempos de crisis.\nEsta guerra nos ha quitado mucho; demasiados padres tienen que enterrar a sus hijos.\n\nSacamos a América de las profundidades, asegurándonos de que ni el Estado profundo ni los terroristas volvieran a tocar nuestros hogares. América ha vuelto, pero esta vez ha cambiado para siempre, una cicatriz que nunca desaparecerá.\n\nPero con nuestros enemigos desaparecidos y nuestros vecinos pudiendo amarse de nuevo, podremos reconstruir, las ciudades en ruinas recuperarán su gloria, los veteranos serán honrados y los errores del pasado se corregirán.\n\nAmérica fue grande.\nY será grande otra vez."
 usc.1.a: "Lo que nos separa de los perdedores es cómo reaccionamos a cada giro del destino."
 usc.2.t: "Represión en Denver"
 usc.2.desc: "La guerra ha llegado a la ciudad de Denver, conocida por su progresismo, esta semana, mientras las autoridades locales se están poniendo totalmente en contra de toda disidencia izquierdista. \"Se han quitado los guantes\", afirmó un corresponsal de guerra de la BBC. \"Sin respetar el derecho de reunión, las protestas pacíficas de hoy fueron dispersadas con porras y disparos reales. Vimos a varios manifestantes ser abatidos en la calle y se oyen disparos esporádicos por toda la ciudad. Helicópteros han estado sobrevolando la ciudad todo el día; el sonido de sus motores es omnipresente, al igual que las constantes decenas de sirenas de la policía que recorren la ciudad.\n\nMúltiples columnas de humo se pueden ver ahora mismo a lo lejos, elevándose de los incendios que se han encendido por toda la ciudad. Decir que la gente está asustada sería quedarse corto; de hecho, hoy tenemos muchos casos de grupos militantes de izquierda que se han enfrentado a las autoridades, aunque sin éxito\". La violencia se intensificó especialmente en torno al Capitolio de Denver. Imágenes gráficas de docenas de cuerpos sin vida esparcidos por las escaleras de granito frente al edificio se extendieron por las redes sociales. Numerosos disparos de varios hombres armados que respondían al fuego contra la policía también salpicaban el edificio, aunque aún no hay informes de policías muertos.\n\nEsta violencia sin precedentes por parte de las autoridades se produce tras el traslado de la base de operaciones provisional de Trump desde Washington D.C. a la ciudad, debido a su posición central en el país. Hace unos cinco días, el alcalde de la ciudad, Michael Hancock, fue puesto bajo arresto domiciliario y aún se desconoce quién ocupará su puesto. Obviamente, el gobernador de Colorado, Jared Polis, también ha estado desaparecido las últimas dos semanas. En palabras del corresponsal de guerra de Associated Press: \"El futuro de la ciudad y del estado sigue siendo una incógnita, pero una cosa es segura: empeorará mucho antes de mejorar\"."
 usc.2.a: "Nunca lo olvidarán."
 usc.3.t: "Trump anuncia Denver como nuevo \"Salón Legislativo\""
 usc.3.desc: "Tras la precipitada salida de Trump de Washington D.C., las noticias suyas han sido escasas y sin verificar, pero por primera vez en días, sus primeras declaraciones oficiales se han hecho públicas. El estado de la nueva base de operaciones del bando de Trump ha estado en el aire desde hace tiempo, pero las preguntas sobre su posible ubicación finalmente han sido respondidas, ya que estará en Denver, Colorado. Sin embargo, Trump ha especificado enfáticamente que esta no debe considerarse una capital, sino un \"Salón Legislativo Provisional\" para no deslegitimarlo como el legítimo líder de Estados Unidos. Casi inmediatamente después de conocerse esta noticia, el gobernador de Colorado, Jared Polis, y su familia desaparecieron misteriosamente. Esta noticia ha provocado una gran indignación en la ciudad, marcadamente izquierdista, con cánticos de \"¡Es nuestra ciudad, no la de Trump!\" que se escuchan en las calles, y, por supuesto, incendios masivos y saqueos de negocios. La policía de Denver está sin duda al límite con esta noticia, ya que los disturbios están resultando ser más atroces que los del verano pasado. A este ritmo, Trump podría verse obligado a tomar medidas drásticas para garantizar la seguridad de la ciudad."
 usc.3.a: "Acalorado, pero pacífico, por ahora."
 usc.4.t: "El futuro del gobierno"
 usc.4.desc: "Con Denver totalmente asegurado por la administración Trump y los restos del Congreso ahora cómodamente establecidos, una de las primeras cuestiones que surgen es el estatus del habeas corpus.\n\nSuspendido por Abraham Lincoln durante la guerra de Secesión, el ejército ha abogado por la suspensión del habeas corpus para repeler eficazmente a las fuerzas rebeldes que asedian la nación y restaurar la unión.\n\nEl Congreso, por otro lado, ha expresado su preocupación por la posibilidad de suspender el habeas corpus, temiendo que la ley erosione el gobierno popular y permita que los ideales autoritarios se filtren en él.\n\nCon la guerra aún en sus inicios y el resultado del conflicto aún sin decidir, esta decisión podría definir el legado de Trump. ¿Seguiremos el ejemplo de Lincoln y suspenderemos el habeas corpus, o el gobierno popular, a pesar de la crisis actual, seguirá vigente?"
 usc.4.a: "Debemos restaurar la autoridad civil."
 usc.4.b: "El Ejército tiene nuestros intereses en mente."
 usc.5.t: "Un nuevo vicepresidente"
 usc.5.desc: "Ahora que Denver ha sido asegurado, podemos decidir el futuro de nuestro Gobierno."

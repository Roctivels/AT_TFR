 USC_medium_militia_loyalty_idea: "Lealtad miliciana moderada"
 USC_medium_militia_loyalty_idea_desc: "\n\n\n\n£GFX_USC_militia_loyalty\n\n\n\n\n\nLa red de milicias civiles que conforman gran parte del ejército constitucionalista es vasta, y con ella, también lo es su devoción a la causa del presidente legítimo y de América en su conjunto. Desde grupos de milicias consolidadas, formados en los últimos años, hasta fuerzas voluntarias reclutadas tras el establecimiento de las líneas de combate, muchos tienen sus propias opiniones sobre la naturaleza de la guerra que se libra y lo que esperan obtener de ella. Actualmente, han dejado de lado estas consideraciones, manteniéndose leales y acatando las órdenes y directrices del legítimo Comandante en Jefe."

 usc.14.t: "Entre la bala y el bolígrafo"
 usc.14.desc: "Los primeros días del Gobierno Constitucional Americano fueron de euforia y éxtasis. Trump, el populista a menudo criticado y ridiculizado por todos los académicos y políticos esnobs del establishment, había desafiado al todopoderoso establishment liberal y sobrevivió para ver el día. Sin embargo, esos días quedaron atrás y dieron paso a la cruda realidad actual: hacer política en la América de antes de la guerra era una cosa, pero dirigir un gobierno con profundas facciones durante un estado de guerra era otra...\nComo cualquier otro día de la semana laboral, se podía encontrar a Trump en su oficina, con una taza de su café favorito, revisando una montaña de papeleo entregado para el día. Como presidente del gobierno, tenía la última palabra en diversos asuntos y era el blanco de diversos grupos que buscaban grandes favores. Las Fuerzas Armadas del Gobierno Constitucional Americano, aunque para el público eran los patriotas más leales, tenían una extensa lista de \"intereses\" que deseaban que se atendieran favorablemente. Listas o solicitudes de requisición, facturas por grandes cantidades de fondos y solicitudes de que se resolvieran asuntos a su favor; las demandas eran abrumadoramente extensas. El Congreso, siempre buscando preservar su voz en todo, también tenía sus propios intereses, exigiendo a menudo al presidente Trump que actuara ante las a menudo criticadas \"extralimitaciones inconstitucionales\" de algunos miembros clave del ejército. Además de los problemas apremiantes de derrotar al gobierno de Biden en Washington, el Congreso solía estar ocupado debatiendo y discutiendo qué hicieron los militares hoy que infringieron algún protocolo o estatuto del Congreso para disgusto de Trump.\nEn medio del caos político dentro del Gobierno Constitucional Americano, una pregunta persistía: ¿Qué debía hacer el comandante en jefe?\nTrump cogió el primer paquete de facturas del día, leyó el título y el encabezado, y suspiró para sí mismo, pues solo tenía una idea en la cabeza:"
 usc.14.a: "\"Elija, señor presidente...\""

 USC_future_of_democrats_decision: "Futuro del §OPartido Demócrata§!"
 USC_rally_maga_supporters: "Reunir a §5MAGA§!"
 USC_rally_maga_supporters_desc: "¿Dónde está mi Pueblo? ¡Necesito a mi Pueblo! Nuestros queridos seguidores, tanto patriotismo y amor, amor por la patria. Mientras los matones protestan y se relajan, los VERDADEROS AMERICANOS trabajan duro para HACER A AMÉRICA GRANDE OTRA VEZ.\nNecesitamos que salgan a la calle; con hermosos carteles y gorras, nuestras increíbles gorras. América necesita demostrar amor por nuestra democracia."
 USC_spread_counter_propaganda: "Difundir §Rcontra§!propaganda"
 USC_spread_counter_propaganda_desc: "Algunas personas simplemente no saben contra qué protestan: contra nuestra sólida economía, nuestros sagrados valores cristianos, todo el bien que he hecho por el Pueblo americano. ¡Corran la voz! Tenemos muchísimos podcasters y oradores increíbles. ¡Envíenlos, les contarán lo que AMÉRICA realmente significa!"
 USC_deploy_militia: "Desplegar §YMilicia§!"
 USC_deploy_militia_desc: "Milicianos americanos, nuestros hombres fuertes, ¿recuerdan cuando dije \"Retrocedan y esperen\"? Ha llegado el momento, amigos. Nuestro país está en peligro, ¿de acuerdo? ¡Tantos enemigos, y algunos de ellos están dentro de nuestras fronteras! Firmaré una orden ejecutiva firme y contundente para que miles de milicianos tengan los mismos derechos que nuestra fuerza policial. TEMPORALMENTE."
 USC_deploy_national_guard: "Desplegar la §7Guardia Nacional§!"
 USC_deploy_national_guard_desc: "Soy el presidente de la LEY y el ORDEN, y nadie mejor para defenderla que nuestra hermosa y fuerte Guardia Nacional. Hombres y mujeres valientes, son simplemente los mejores, los adoro. Declarar el estado de emergencia en algunos estados es necesario para que estos fuertes soldados entren y aplasten a los MATONES problemáticos."
 USC_silence_the_fake_news: "§RSilenciar§! las fake news"
 USC_silence_the_fake_news_desc: "Estos MEDIOS FALSOS son tan crueles: difunden mentiras y desinformación para hundir a nuestra nación en un abismo aún mayor. No los dejaremos, vamos a hacer algo nunca antes hecho: los vamos a designar como lo que son: ENEMIGOS DEL PUEBLO. Así es: Clinton News Network, The Dying Times, MSDNC... ¡FUERA! ¡BYE BYE, FAKE NEWS!"
 USC_reject_globalism_decision: "Rechazar el §5globalismo§!"
 USC_reject_globalism_decision_desc: "\n\n\n\n£GFX_USC_reject_globalism_banner\n\n\n\n\n\n              §g¡Americanismo, no globalismo!§!            \n\nSabes, la gente me pregunta: \"Donald, ¿de qué se trata el globalismo?\", y les digo: amigos, no se trata solo de hombres en deportes de mujeres -totalmente injusto, por cierto-, se trata de destruir América; de hecho, de destruir a todos los países, ¡DEL MUNDO! Estos globalistas son gente terrible, quieren, escuchen esto: CERO FRONTERAS, CERO POLICÍA, y lo más importante, los odian a ustedes, los trabajadores. Soy el único que puede plantarles cara, amigos. ¡No, en serio! Por eso hacen estas cosas terribles: financian al Estado profundo; ¡ellos son el Estado profundo!"
 USC_reminiscing_american_order_decision: "Recordar la §CPax Americana§!"
 USC_reminiscing_american_order_decision_desc: "\n\n\n\n£GFX_USC_american_order_banner\n\n\n\n\n\n                            §gPAZ ARMADA§!                     \n\nMi presidencia fue conocida por la PAZ, ¿saben por qué? Porque todos los líderes nos respetaban, teníamos un ejército enorme, grande y fuerte. Presidentes de todo el mundo venian y me decian: \"¡Gracias, Sr. Presidente, por salvarnos de la guerra!\", y yo respondia: \"¡De nada!\". Se trata de ser duro, pero justo, como lo era mi padre.\nMiren el mundo ahora, con tanto conflicto, América necesita REGRESAR a la GRANDEZA para que tengamos un mundo en paz de nuevo. Estos demócratas dicen que quería destruir la OTAN; ¡salvé a la OTAN, no querian pagar!"
 USC_reunify_america_decision: "Reunificar América"
 USC_pro_con_decision: "Negociar con §Cburócratas§!"
 USC_pro_con_decision_desc: "\n\n\n\n£GFX_USC_bureaucrats_banner\n\n\n\n\n\n                            §gBibliófilos§!                     \n\n§CDebiluchos, abogados, oficinistas§!... los odias, y §5tu Pueblo§! está de acuerdo. Pero la triste realidad de dirigir un negocio, o un gobierno, es que necesitas gente que entienda los tejemanejes judiciales y constitucionales.\nSon tan ingenuos, piensan que eres su próximo §CReagan§!. A veces, te lo planteas.\nLo bueno es que no pueden vivir sin ti; apuestan por ti. Pésimos jugadores, perderían todo su dinero en tu casino. Sin embargo, a veces es mejor escuchar a un legalista arrogante que tener que tomar una decisión precipitada. ¿No es cierto?"
 USC_pro_mil_decision: "Movilizar §5al Pueblo§!"
 USC_pro_mil_decision_desc: "\n\n\n\n£GFX_USC_the_people_banner\n\n\n\n\n\n                       §gU.S.A! U.S.A! U.S.A!§!            \n\n§5Tu Pueblo§!, la base de tu popularidad. Americanos comunes y corrientes. Son tratados tan mal, es increíble; olvidados, maltratados, siempre culpados de su desgracia.\nHasta que llegaste tú. Les diste una voz, tu voz, y se convirtieron en tu principal fuerza. No hay nada que no estén dispuestos a hacer por ti. Siempre intentaste cumplirles tus promesas... Pero estos §Cburócratas§! y gente del Pantano... Qué crueles. Quieren que tu Pueblo sufra.\nLes das poder, y ellos te dan poder a ti. Relación simbiótica.\n\nEl presidente Trump no es un santo, pero jamás perimitrá que sus corderos sean engañados."
 USC_big_coalition_movement_decision: "Construir la §Cgran coalición§!"
 USC_big_coalition_movement_decision_desc: "Miren a su alrededor, todos están aquí: latinos, blancos, negros. ¡Amo a los negros! La cuestión es que tenemos una coalición enorme; todos son MAGA, sin importar su raza o credo. ¡SOIS PATRIOTAS!\nMujeres y hombres, tenemos tanta gente buena: Latinos por Trump, Negros por Trump, incluso tenemos GAYS POR TRUMP. ¡Amo a los gays!"
 USC_ignite_christian_fevor_decision: "Encender §5fervor cristiano§!"
 USC_ignite_christian_fevor_decision_desc: "Mi Pueblo ama a Dios. ¡Yo también lo amo! La Biblia significa mucho para mí, todo el libro.\nLos cristianos sufren un maltrato increíble, con una agenda progre anticristiana en nuestras escuelas. Necesitamos acción, Dios me eligió; soy el elegido. Es por eso que necesitamos movilizar a nuestros creyentes.\n\n¡Luchen, mis cristianos, la próxima vez no tendrán que luchar!"
 USC_ally_with_superpacs_decision: "§CAlianza§! con los §Ysúper PACs§!"
 USC_ally_with_superpacs_decision_desc: "Escuchen, hay tantos SÚPER PACS increíbles y hermosos que luchan por AMÉRICA PRIMERO -algunos incluso se llaman así-, tienen muchísimo dinero. Dinero que necesitamos para HACER A AMÉRICA GRANDE OTRA VEZ. No se preocupen, yo -yo, Trump- supervisaré personalmente la transferencia de cada donación y me aseguraré de que se destine al bien de todos los americanos, sin robo, sin FRAUDE, sin ESTAFA."
 USC_squeeze_superpacs_decision: "§5Expulsar§! a los §Ysúper PACs§!"
 USC_squeeze_superpacs_decision_desc: "Llevo mucho tiempo diciéndolo: los súper PACs son un auténtico FRAUDE. Se gasta muchísimo dinero -el dinero de los donantes- y hay que hacerles caso; es una injusticia para la gente común como tú. Los PAC son una herramienta de los DONANTES e INTERESES ESPECIALES para robarse nuestra democracia y meterla en sus bolsillos, y a nuestros políticos. ¡Por eso todos odian a Trump!\n¡Vamos a acabar con esto, encontraremos cada centavo y se lo devolveremos!"
 USC_assists_business_decision: "Asistir a §Cempresas§!"
 USC_assists_business_decision_desc: "Las empresas son muy importantes para mí, ¿sabes? Soy empresario. Necesitamos un mercado fuerte, y empresarios para impulsar la economía. Apoyaremos sus increíbles esfuerzos para PRIORIZAR NEGOCIOS DE AMÉRICA. Necesitamos empresas con auténtico espíritu americano. Pero no se metan en el sector inmobiliario; este es mio. ¡Es broma!"
 USC_bailout_blue_collars_decision: "Rescatar a §5cuellos azules§!"
 USC_bailout_blue_collars_decision_desc: "Trabajadores, nuestros maravillosos e increíbles soldados de la industria, hacen un trabajo increíble, trabajando duro. Nadie se preocupaba por ellos, eran tan malos, pero lo solucionaremos. Obama, ese peligroso globalista, rescató a multimillonarios, ¡es ridículo! Tienen miles de millones, ¡y deben pagarse a sí mismos! Vamos a rescatar a nuestros increíbles mineros y a los demás; les encantará, créanme."
 USC_repeal_22_amendment_decision: "§RDerogar§! la 22ª Enmienda"
 USC_repeal_22_amendment_decision_desc: "Que quede claro: ¡la 22ª Enmienda es una ESTAFA TOTAL! Fue diseñada por una camarilla elitista del Pantano para impedir que el Pueblo vote por presidentes FUERTES y POPULARES, como YO. NO ES LO QUE QUERÍAN LOS PADRES FUNDADORES, PUNTO.\nEllos lo llamaban \"Límites al Poder\", nosotros lo llamamos \"Límites al ÉXITO\". Y queremos más ÉXITO, ¿no?\n\nMiren, todo es cuestión de momento; si me detengo ahora, lo perdemos; América pierde momento. NO DEBEMOS PERMITIR QUE ESTO SUCEDA.\n\n¡Debemos DEROGAR ESTA ENMIENDA YA!"

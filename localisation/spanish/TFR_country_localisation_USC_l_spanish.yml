 USC_balance_of_power_category: "Balance del poder"
 USC_balance_of_power_category_desc: ""
 USC_populist_economics_category: "MAGAnomía"
 USC_populist_economics_category_desc: "Cuando el presidente Trump entró por primera vez en la contienda política, prometió al pueblo americano que priorizaría a América pase lo que pase, y esa promesa no ha cambiado. Aunque América está dividida como nunca antes, el presidente Trump confía en que una política económica definida por ideales populistas sigue siendo la mejor manera de avanzar para la nación. La guerra no se gana solo con sangre. Solo mediante la prosperidad y el crecimiento, América podrá superar sus problemas actuales y recuperar su antigua grandeza."
 USC_department_of_defense_category: "Departamento de Defensa"
 USC_department_of_defense_category_desc: "\n\n\n\n\n£GFX_USC_dod_category\n\n\n\n\n\n\n\nMientras la guerra por el futuro de América continúa, movilizar a la población, antes desmoralizada, para luchar por el futuro de este país ha sido una prioridad absoluta para el Departamento de Defensa. Si bien ha sido todo un reto pedirle al americano promedio que tome las armas para luchar contra sus antiguos vecinos, el Departamento de Defensa confía en su capacidad para reavivar la llama del patriotismo en el corazón de la gente y movilizarla para luchar por su futuro.\n\n£USC_rage  Furia nacional: [USC_rage_text]\n£USC_rage  Furia nacional semanal: [?modifier@rage_weekly|=+1%]"
 USC_congress_category: "Congreso Constitucional"
 USC_congress_category_desc: "\n\n\n\n\n£GFX_USC_congress_category\n\n\n\n\n\n\n\nAmérica está bajo fuego desde todos los ángulos del espectro político, pero bajo el marco constitucional que hemos mantenido bajo el 45º presidente, demostraremos ser el gobierno correcto de lo que una vez fueron los Estados Unidos. Sin embargo, el Partido Republicano de Trump está actualmente dividido entre republicanos §Ylibertarios§!, §4populistas§! y §7conservadores línea dura§!. Debemos equilibrar el poder y mantener la lealtad de estas tres facciones para asegurar la estabilidad en el poder ejecutivo. [USA_faction_league_american_workers_text][USA_faction_techno_rightists_text][USA_faction_libertarian_text][USA_faction_congress_text][USA_faction_military_text][USA_minor_factions_main_text][USС_minor_faction_libertarian_party_text][USС_minor_faction_christian_conservative_text][USС_minor_faction_league_american_worker_text][USС_minor_faction_techno_rightists_text][USС_minor_faction_we_the_people_text][USС_minor_faction_trump_democrats_text][USС_minor_faction_leftists_text][USС_minor_faction_nationalists_text][USС_minor_faction_ultra_maga_text][USС_minor_faction_independents_text][USС_minor_faction_maga_communists_text][USС_minor_faction_megachurches_text]"
 USC_nida_category: "NIDA"
 USC_nida_category_desc: ""
 USC_trump_new_america_category: "Trumpificar América"
 USC_trump_new_america_category_desc: "América está podrida, hasta la médula. Tanto comportamiento repugnante: caos social, extremismo, inestabilidad. Simplemente terrible.\nTenemos que §gSOLUCIONAR§! esto; §YTrump§! lo solucionará. Con grandes acciones, en forma de leyes y proyectos de ley, y empoderamiento patriótico, esperemos que SALVEMOS AMÉRICA de su caída."

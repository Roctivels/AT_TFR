 USC_trump_in_hat_portraits_tt: "¡Si eliges esta §Copción§!, todos los retratos de §YTrump§! lo mostrarán luciendo la distintiva gorra §RMAGA§!!"
 usc.96.t: "Gorra MAGA - El símbolo de la Revolución"
 usc.96.d: "Las gorras MAGA... las rojas, las blancas, las negras, las hay de todas las formas y tamaños. Para niños y adultos, algunas son baratísimas, otras son ediciones especiales de oferta limitada (¡con la firma del presi!).\nEsa gorra se convirtió en una parte importante de tu campaña, luego de todo tu movimiento y de tu presidencia. Es una gorra sencilla, pero dice mucho. Cuando alguien la usa, básicamente está gritando: \"HAGAMOS A AMÉRICA GRANDE OTRA VEZ\". Incluso en medio del caos, tu Pueblo se encuentra buscando esas gorras rojas brillantes.\nTú también la usaste mucho, en la Casa Blanca, en los mítines, en todas partes. Tener esa gorra te hacía sentir como si realmente fueras parte de la multitud, como si todos estuviéramos juntos en esto, haciendo a América grande otra vez, pasito a pasito.\n\n¿De qué se trata todo esto? Bueno, Jared y otros asesores dijeron que la gorra MAGA es como una versión moderna de la escarapela que usaba el Ejército Continental. Así que creen que sería genial que el presidente, al igual que el propio George Washington, pudiera llevar un símbolo de esta nueva Revolución. Al menos en todos los actos oficiales y en los medios de comunicación.\nPor otro lado, arruinaría tu peinado, ¡que es un gran símbolo en sí mismo!\n\nPoner o no algo que tus fans consideren tan importante como la tarta de manzana americana y la Segunda Enmienda es cosa tuya... Solo recuerda, no podrás presumir de tu increíble cabello."
 usc.96.a: "¡Bien! Dan, saca las reservas, ¡tengo una para cada día de la semana!"
 usc.96.b: "¿Sabes qué es lo que SI entusiasma a la gente? ¡Mi pelo!"
 USC_declare_special_emergency: "Declarar emergencia §Respecial§!"
 USC_declare_special_emergency_desc: "Mucha gente no lo sabe, pero el presidente puede hacer muchas cosas. Crearé un comité especial antidisturbios FUERTE, directamente subordinado a MÍ, donde daremos con la manera de lidiar con esos liberales molestos, y lo haremos rápidamente. Los críticos me gritarán \"¡Antidemocrático!\". ¡Soy yo quien salva nuestra democracia!"

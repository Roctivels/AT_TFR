 USC_dilapidated_deepstate_idea: "Estado profundo en ruinas"
 USC_dilapidated_deepstate_idea_desc: "El Estado profundo y sus diversos aparatos, desde la CIA hasta el FBI, han revelado su verdadera naturaleza y se han embarcado en una campaña de terror y destrucción contra el pueblo americano. Si bien la separación del Estado profundo de nuestra administración garantizará que la agenda de \"América Primero\" avance sin oposición, la consecuencia a corto plazo ha sido no solo un latigazo político total, sino también el colapso total de nuestro sector de inteligencia, con la mayor parte de la comunidad de inteligencia del lado del Estado profundo. Esto ha dificultado considerablemente la gestión de terroristas y células rebeldes dentro de nuestros propios territorios."

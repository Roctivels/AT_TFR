l_spanish:
 USC_crackdown_on_denver: "Represión en Denver"
 USC_crackdown_on_denver_desc: "¡Intenté advertirles, pero no escucharon! ¡Ahora nuestra gran nación esta en gran declive, miles están siendo asesinados y millones siendo desplazados!\n\nNuestros seguidores en partes ocupadas por los traidores están siendo cazados y perseguidos y, francamente, es hora de que les demos de su propia medicina. hemos hecho bien en establecernos en Denver, Es una ciudad agradable, pero ¿sabes qué es lo que realmente le falta? Lealtad, ley y orden tenemos que tener todas esas cosas aquí para todo funcione. \n\nEstamos rodeados de rebeldes y traidores. El Gobierno traidor e impostor de Washington D.C. esta preparando una ofensiva contra nosotros y acabar con la libertad de esta país, así que debemos prepararnos para asegurar un punto de apoyo solido aquí, en Denver; porque si no tenemos éxito... ¡América nunca será grande otra vez!"
 USC_reestablish_civilian_authority: "Restaurar la autoridad civil"
 USC_reestablish_civilian_authority_desc: "Denver se ha convertido en un faro en medio de la oscuridad que se cierne sobre nosotros. Debemos asegurarnos de mantener los derechos constitucionales y proteger a nuestros ciudadanos, pase lo que pase, a pesar de la amenaza radical. La seguridad es importante y nuestros soldados, policías y milicianos trabajan en ella día y noche, pero mantener un Gobierno funcional que sirva al Pueblo también es fundamental."
 USC_suspend_habeus_corpus: "Suspender el habeas corpus"
 USC_suspend_habeus_corpus_desc: "Nuestro país se encuentra en una crisis desesperada, una que nunca antes había visto. El radicalismo, el terrorismo y las insurrecciones han llegado a nuestra patria. Declaro que no se debe actuar con cautela en lo que respecta a la lucha por la seguridad de nuestra nación. Nuestros agentes federales de la ley tendrán permiso para utilizar todos los medios disponibles para detectar, arrestar y neutralizar a elementos que representen un peligro para nuestro país. El habeas corpus es excelente, pero ahora no es el momento."
 USC_maintain_the_balance: "El núcleo del movimiento"
 USC_maintain_the_balance_desc: "Creo que somos la mejor nación y la mejor democracia de la historia, pero solo cuando nos llevamos bien, ¿okey? Necesitamos fuerza, pero solo se puede tener fuerza mediante unidad. Y me esforzaré al máximo por ser una figura de unidad. Así que, ya sean grandes patriotas como Mike Flynn o el \"Guapo\" Rand Paul, o incluso el \"Pequeño\" Marco Rubio, no hablaré en su contra, aunque haya mucho por decir. Este no es momento de hablar. Estamos todos en el mismo bote y no queremos que se hunda, ¿verdad?"
 USC_mediate_with_the_military: "Mediar con los intransigentes"
 USC_mediate_with_the_military_desc: "He decidido hablar con algunos de mis seguidores más leales en el gobierno y en el ejército. Mike se me acerca y le pregunto: \"¿Qué debemos hacer para que este país sea grande otra vez?\". Y me responde: \"Sr. Presidente, tenemos que dejar las tonterías\". Eso es lo que dijo. Y eso significa que debemos atacar con dureza a nuestros enemigos, tanto internos como externos. Sugirió las medidas que debería tomar, medidas muy apropiadas para nuestra situación."
 USC_console_the_congress: "El nuevo motín del té"
 USC_console_the_congress_desc: "Tengo muchos buenos amigos en el Congreso, gente muy buena. El senador Rand Paul me llamó el otro día; tenía un montón de ideas geniales. \"Libertarismo\", como él lo llama, creo que podría ser muy bueno para nuestro país. Se trata de lo que América es: libertad, negocios y rifles. Deberíamos esperar eso como nación; creo que sería fantástico."
 USC_stabilize_the_remnants: "Estabilizar los remanentes"
 USC_stabilize_the_remnants_desc: "Saben que tenemos mucha gente buena que se une a nosotros, mucha gente buena... Gente trabajadora, gente rural, gente urbana, de todo el país... Son refugiados, esa es una palabra terrible que América nunca conoció, refugiados... Terrible.\n\nLo que debemos hacer por la supervivencia de nuestra nación ahora es consolidar cada estado, cada condado y cada pueblito. Necesitamos mantener la estabilidad, necesitamos asegurar la ley y el orden y ayudar al Pueblo.\n\nNos llaman los remanentes, pero aún tenemos mucha fuerza de lucha. Y se lo demostraremos."
 USC_unify_the_loyalists: "Unificar a los lealistas"
 USC_unify_the_loyalists_desc: "Tenemos la sagrada misión de unificar el país de nuevo y no nos rendiremos hasta lograrlo. Hemos llamado a todos los patriotas preocupados por el destino de nuestro país y su respuesta fue contundente.\n\nNuestro país nunca ha visto un movimiento como este: gente de todas partes del país, de todas las étnias y religiones, viene a defender el futuro de América... Es increíble...\n\nY tenemos el mismo mensaje para todos: detener la guerra y reconciliarnos, porque quienes rechacen este mensaje tendrán que enfrentarse a las fuerzas lealistas unidas - y te aseguro que se arrepentirán..."
 USC_appeal_to_heaven: "Apelar al Cielo"
 USC_appeal_to_heaven_desc: "En Dios confiamos, es uno de los lemas de nuestra nación, pues Dios nos ha dado el derecho a defendernos de cualquiera que intente exterminarnos de la faz de la Tierra."
 USC_fight_the_welfare_state: "Combatir al Estado del bienestar"
 USC_fight_the_welfare_state_desc: "¡Increíble! Incluso en estos tiempos difíciles, tenemos gorrones que viven de la asistencia social, devorando el presupuesto de nuestro país. Si queremos que nuestro país exista, no podemos permitir que siga así. Tenemos que decirles: \"¡Busquense un trabajo!\", y eso es precisamente lo que voy a hacer."
 USC_propagate_american_exceptionalism: "Excepcionalismo americano"
 USC_propagate_american_exceptionalism_desc: "He conocido a mucha gente a lo largo de mi carrera, he visitado muchos países, pero ninguna otra nación ni persona podría igualar el espíritu de un americano. Tenemos al Pueblo más grande, inteligente y trabajador que la Tierra haya conocido.\n\nEl mundo tiene una gran deuda con nosotros, y no al revés. Somos la nación de los mayores e importantes avances industriales y tecnológicos. Derrotamos a los nazis, al comunismo y al Dáesh. Y durante los últimos 75 años, aproximadamente, hemos cargado con la economía mundial a nuestras espaldas.\n\nLe hemos dado tanto al mundo, tanto... Pero es hora de que América se cuide a sí misma, ¡es hora de \"América Primero\"! No más ayuda exterior ni más guerras cuando terminemos con las internas... ¡Es hora de ayudar al Pueblo americano!"
 USC_appeal_to_order: "Apelar al Orden"
 USC_appeal_to_order_desc: "El extremismo está destrozando nuestro país como nunca antes, ¡causado directamente por la oposición! Los americanos sufren destrucción y saqueos mientras ellos ganan terreno político... Son gente desagradable, ¿a que no?\n\nPero no vamos a permitir que lo hagan más de lo que ya lo han hecho. Por eso, nuestras fuerzas del orden y nuestra fuerte y hermosa policía nos respaldan... ¡Debemos apoyar a la oposición y restablecer la ley y el orden en el país mientras aún haya una oportunidad!"
 USC_appeal_to_liberty: "Apelar a la Libertad"
 USC_appeal_to_liberty_desc: "La libertad es algo que apreciamos desde la fundación de nuestra nación desde 1776. Es un valor que hemos defendido una y otra vez, desde los casacas rojas y sus cobardes \"lealistas\", hasta los separatistas sureños que privan a los afroamericanos de su derecho a vivir como hombres libres, e incluso los fascistas y comunistas del siglo pasado, cuyos regímenes causaron la muerte de millones. Hoy, en el siglo XXI, debemos defenderla una vez más de la supuesta \"Unión de América\", que no es más que un estado caudillo, respaldado por los mismos multimillonarios globalistas que socavan la democracia americana en su conjunto."
 USC_the_refounding_father: "El padre refundador"
 USC_the_refounding_father_desc: "Los famosos padres fundadores de esta nación que son George Washington, Thomas Jefferson, John Adams, Benjamin Franklin, Alexander Hamilton, John Jay y James Madison crearon lo que hoy se conoce como los Estados Unidos de América, ahora Donald Trump debería crear una unión que sea más próspera y más estable."
 USC_activate_the_defense_production_act: "Acta de Producción para la Defensa"
 USC_activate_the_defense_production_act_desc: "El Acta de Producción para la Defensa de 1950 es una ley que ha estado pendiente de ser activada desde los primeros días de la Guerra Fría. Necesitamos movilizar enormes recursos para crear nuevo equipo para nuestras tropas. Si bien nuestra industria militar podría no ser significativa en comparación con la de la Unión, quizás tengamos que hacer lo necesario para igualar la fuerza y la capacidad de la Unión en el Este."
 USC_revive_the_civilian_economy: "Revivir la economía civil"
 USC_revive_the_civilian_economy_desc: "Sin la economía civil, la economía militar no puede funcionar."
 USC_defend_american_values: "Defender nuestros valores"
 USC_defend_american_values_desc: "A pesar de este momento de conflicto temporal, fuimos y seremos la nación más grande del planeta. Y no debemos olvidar lo que la hace grande, todo lo que define el lema \"la forma de vida de América\", todo lo que elementos traidores de la izquierda y la derecha radicales intentan arrebatarnos...\n\n¡Como su presidente, me comprometo a institucionalizar y proteger estos valores y a brindar a todos los ciudadanos de nuestro país la oportunidad de vivir el sueño americano!"
 USC_work_with_the_state_governments: "Cooperar con gobiernos estatales"
 USC_work_with_the_state_governments_desc: "Cooperar con los Gobiernos estatales nos ayudaría a legitimar nuestro lugar en América."
 USC_minimize_militias: "Minimizar milicias"
 USC_minimize_militias_desc: "¿Han visto a esas... \"milicias\"? ¿\"Boogaloo Boys\" como las llaman? Patéticos. Corren por ahí como salvajes casi desnudos. Nuestros enemigos se ríen de ellas cuando las miran, aunque para nosotros no es muy gracioso, nada gracioso...\n\n¡Son completamente desorganizados y desobedientes! No están a la altura de los estándares de entrenamiento ni de equipo para proteger a nuestro país. Si quieren hacer su parte, únanse al ejército regular y no a este fenómeno."
 USC_congressional_contraction: "Contracción congresional"
 USC_congressional_contraction_desc: "En estos tiempos de gran peligro para esta gran nación, el gobierno debe tener la capacidad de ejecutar sus funciones con rapidez y eficiencia. Un factor que puede obstaculizar nuestra eficiencia al dirigir el esfuerzo bélico es el conflicto entre las ramas del gobierno. Nuestro comandante en jefe necesita todas las herramientas a su alcance para llevarnos a la victoria, lo que naturalmente entrará en conflicto con el Congreso. La presidencia aprobará algunas medidas temporales en tiempos de guerra para asegurar que el Congreso no sea demasiado influyente ni se entrometa. Se reducirá su supervisión en asuntos presidenciales, se revocarán poderes legales clave y se abordará su capacidad general para obstruir la toma de decisiones."
 USC_subdue_subversives: "Someter subversivos"
 USC_subdue_subversives_desc: "Aunque confiamos en que muchos de los americanos patriotas leales que nos siguen son genuinos en su lealtad, debemos reconocer que algunos van más allá de lo que parece. Hay quienes, dentro de nuestra sociedad e incluso en oficinas gubernamentales, albergan motivos y agendas hostiles e incluso traicioneras. Conspiran contra nosotros, siembran desunión o duda, y conspiran para sabotear nuestros esfuerzos por la victoria; todo esto es inaceptable y será abordado con prontitud. Nuestras agencias de inteligencia y aplicación de la ley trabajarán para detener y erradicar a estos elementos hostiles dondequiera que se encuentren. Ya sean ciudadanos comunes o representantes adinerados, sus conspiraciones y agendas desleales y traicioneras serán eliminadas de todos modos."
 USC_cross_the_rubicon: "Cruzar el Rubicón"
 USC_cross_the_rubicon_desc: ""
 USC_the_new_stateman: "El nuevo estadista"
 USC_the_new_stateman_desc: "Donald J. Trump es, sin duda, un pilar de este gobierno. Representa un nuevo tipo de político americano; un político no consagrado por la corrupción del establishment, sino por un patriotismo férreo y una dedicación a su país. Esto lo ha posicionado legítimamente como el ejecutivo de este gobierno y en el inicio de una nueva era en la política americana. Es un estadista americano de una nueva generación de verdaderos patriotas, y todos debemos encontrar inspiración y confianza en su puesto al frente."
 USC_return_to_tradtion: "Volver a la tradición"
 USC_return_to_tradtion_desc: "América ha tolerado durante mucho tiempo los mismos elementos que degradaron su reputación ante el mundo, y es hora de rectificar esto."
 USC_downsize_the_bureaucracy: "Reducir la burocracia"
 USC_downsize_the_bureaucracy_desc: "El ciudadano americano de hoy está sobrecargado con más papeleo que nunca en la historia, ¡multiplicado por tres! Las anteriores administraciones demócratas han convertido nuestro magnífico y eficaz aparato estatal en una versión inflada de la Unión Europea. ¡No va a funcionar, no se puede hacer eso!\n\nHaremos a América cómodo y puntual otra vez. ¿Cómo puedes decir que vives en un país libre cuando la burocracia te impide usar tu libertad?\n\nAsí que esta es la regla de mi administración: si eres un \"-crata\", te van a recortar, ya seas \"plutócrata\", \"burócrata\" o \"demócrata\"."
 USC_oversee_officers: "Supervisar a los oficiales"
 USC_oversee_officers_desc: "Increíble. ¿Toda esta charla sobre pesos y contrapesos solo para que los militares dieran el golpe final a la estabilidad de este país? Esos generales, esos oficiales con sus estrellas y uniformes... Tenemos que asegurarnos de que no se les ocurran ideas raras. Tenemos que asegurarnos de que recuerden quién es el comandante en jefe."
 USC_minimize_the_military: "Minimizar el ejército"
 USC_minimize_the_military_desc: "Mira, ¿no amamos a nuestros militares? Los amamos. Pero están destinados a luchar contra los enemigos externos como lucharon contra el Dáesh y como lucharán en el futuro. La realidad hoy es diferente. Son un poco torpes, están por todas partes, esos generales... Y necesitamos a alguien que se organice rápido, alguien flexible. Honramos sus acciones y sabemos que se esfuerzan al máximo, pero no dejemos que se enorgullezcan demasiado, ¿de acuerdo?"
 USC_unite_the_party: "Unir al partido"
 USC_unite_the_party_desc: "El mensaje que debemos enviar a todo el país es un mensaje de unidad y reconciliación. Incluso nuestro propio partido está formado por muchísimas personas diferentes con diferentes puntos de vista y perspectivas... Y se llevan sorprendentemente bien. Algunos se llaman libertarios, otros conservadores o incluso liberales, pero al final, todos luchamos por una América fuerte y unida, ¡y no permitiremos que nadie, ni dentro ni fuera, la destruya!"
 USC_liberalize_the_party: "Liberalizar al partido"
 USC_liberalize_the_party_desc: "Ya sabes lo que siempre dicen de mí, sobre todo las noticias falsas en Washington D.C.: \"Trump es un dictador, Trump es un fascista, va a meter a todos en la cárcel\"... Eso es totalmente falso. De hecho, probablemente soy EL MEJOR PRESIDENTE EN LIBERTAD DE EXPRESIÓN en la historia de este país, y el hecho de que todavía se les permita hablar es la mejor confirmación."
 USC_the_american_caeser: "El César americano"
 USC_the_american_caeser_desc: "Ha llegado el momento de que un verdadero líder ascienda al trono del verdadero poder. El malestar de la democracia liberal y sus inútiles restricciones al ejecutivo ya no nos obstaculizarán. Donald J. Trump ya no será solo un presidente, será un poderoso César; un César americano. Con estos nuevos poderes, finalmente tendrá todas las herramientas para asegurar la paz y la prosperidad de toda América. ¡Con él, saldremos victoriosos! ¡Ave!"
 USC_end_the_treading: "No me pises"
 USC_end_the_treading_desc: "Pueblo de los Estados Unidos de América, juntos nos enfrentamos a las amenazas de la tiranía comunista y las mentiras del Estado profundo. Los enemigos de nuestro país vendrían a intentar arrebatarnos nuestras libertades, y nosotros se las permitiríamos.\n\nTodo lo logramos gracias al espíritu emprendedor americano, a nuestros derechos de la Segunda Enmienda y a la gente del caucus de la Libertad; ellos fueron quienes nos ayudaron a preservarlo todo. Ellos dicen: \"¡No me pises!\", y yo os digo: ¡escúchenlos!\n\n¡NO ME PISES!"
 USC_empower_the_president: "Empoderar al presidente"
 USC_empower_the_president_desc: "La presidencia de esta nación es un cargo que funciona mejor cuando cuenta con todos los recursos necesarios para desempeñar sus funciones. Este objetivo se hará realidad pronto. La presidencia verá ampliadas y reforzadas sus facultades y autoridad en diversos asuntos. Las normas y trabas burocráticas inútiles ya no causarán demoras y desperdicios interminables al jefe del ejecutivo. Con un presidente recién nombrado, esta nación finalmente obtendrá la toma de decisiones eficaz y oportuna que necesita en estos tiempos difíciles."
 USC_empower_the_congress: "Empoderar al Congreso"
 USC_empower_the_congress_desc: "El Congreso es un pilar en el funcionamiento de este gobierno y la democracia americana en general. Debemos reconocer esta verdad y otorgar a esta importante parte de nuestra república los poderes que necesita desesperadamente para llevar a cabo sus funciones vitales. El Congreso recibirá una nueva supervisión sobre diversos asuntos dentro del Estado, junto con una reducción de la autoridad y el poder de otras ramas del gobierno. Con un poder legislativo recientemente fortalecido, esta nación contará con un órgano de gobierno ágil y eficaz que guiará a nuestro país en estos tiempos turbulentos."
 USC_on_the_back_foot: "En retirada"
 USC_on_the_back_foot_desc: "Los enemigos nos acechan. Quizás encontremos maneras de retomar la carrera hacia la capital o nuestros esfuerzos por salvar América habrán sido en vano."
 USC_empower_the_people: "Empoderar al Pueblo"
 USC_empower_the_people_desc: "Recuerdo mi promesa. Ciudadanos de América, nunca olviden que este país les pertenece. Es por ustedes por quienes luché todos estos años, es por ustedes por quienes nuestros valientes milicianos y soldados luchan en las colinas y llanuras de nuestro país. SU país.\n\nLos trabajadores y agricultores, el personal de oficina, los pequeños empresarios... No serán olvidados, no serán abandonados, ojalá, nunca más.\n\nCuando decimos \"Hagamos a América Grande Otra Vez\", queremos decir \"Hacer a Nuestro Pueblo Grande Otra Vez\", ¡hacer nuestro país por y para el Pueblo de nuevo! Ningún burócrata de D.C., ningún comunista o fascista podrá arrebatárselo. ¡Trabajemos juntos y asegurémonos de que nunca lo hagan!"
 USC_mobilize_the_militias: "Movilizar las milicias"
 USC_mobilize_the_militias_desc: "La Primera Enmienda no ha impedido que el Estado profundo asfixie nuestra forma de vida. Nuestra esperanza ahora reside en la Segunda Enmienda, ¡especialmente en las milicias dispuestas a restaurarla! Ninguna cantidad de bombas y tanques nos ahuyentará mientras mantengamos nuestros rifles a nuestro lado."
 USC_marshal_the_military: "Preparar a las Fuerzas"
 USC_marshal_the_military_desc: "La fuerza de la \"Unión de América\" reside en su ejército profesional y una fuerza aérea flexible. Necesitamos asegurarnos de que nuestras capacidades sean suficientes para igualar o incluso superar sus fuerzas. Afortunadamente, contamos con una buena parte del ejército y el resto de la Infantería de Marina de nuestro lado, pero primero debemos asegurarnos de que puedan enfrentarse eficazmente a nuestros enemigos tanto en tierra como en el aire."
 USC_desperate_measures: "Medidas extremas"
 USC_desperate_measures_desc: "Esta guerra por América ha sido todo menos fácil para nosotros. Ya no podemos permitirnos el lujo de contar con los vastos recursos militares y gubernamentales que tenía América antes de la guerra. Sabiendo esto, debemos considerar todas las tácticas, estrategias y opciones disponibles para nuestro gobierno y ejército. Aunque algunos las consideren \"medidas extremas\", probablemente serán cruciales para mantenernos en esta lucha. Debemos ser cuidadosos y no malgastar tiempo, dinero ni recursos en nada si queremos ganar esta batalla por la nación."
 USC_encapture_the_public: "Captar al público"
 USC_encapture_the_public_desc: "Un aspecto fundamental del éxito de una guerra, que a menudo se pasa por alto, es el nivel de apoyo público. Hasta ahora, el pueblo americano parece mucho menos entusiasta de lo que esperábamos inicialmente en apoyar nuestra causa; esto es algo que cambiaremos de inmediato. Utilizaremos todos los medios a nuestro alcance para movilizar y unir al pueblo a nuestra causa. Ya sean historias de atrocidades cometidas por nuestros enemigos o gritos de guerra sobre el deber patriótico americano, captaremos la atención de la ciudadanía de una forma u otra. Solo cuando el pueblo apoye incondicionalmente nuestra causa lograremos ganar esta lucha por América."
 USC_rehabilitate_the_army: "Rehabilitar al Ejército"
 USC_rehabilitate_the_army_desc: "En nuestra lucha contra los enemigos internos, quizá hayamos sido un poco excesivos al rastrear a nuestro ejército en busca de tales traidores. Es hora de mostrar el debido respeto y corregir nuestro fanatismo excesivo. Revisaremos minuciosamente a los oficiales y al personal que estuvieron bajo escrutinio previo y rehabilitaremos a quienes hayan sido víctimas de un procesamiento excesivo por presunta deslealtad. Y lo que es más importante, elevaremos al ejército a una posición de renovada importancia que, con suerte, enmendará cualquier sentimiento negativo que se haya inculcado en el partido o en la opinión pública. Solo cuando nuestros soldados y oficiales renueven su fe en nosotros y confíen en que pueden llevar a cabo sus esfuerzos sin intervenciones innecesarias, la victoria estará asegurada."
 USC_army_reorganization: "Reorganización militar"
 USC_army_reorganization_desc: "Esta guerra por América ha demostrado requerir muchos más cambios estructurales de los previstos. No debemos esperar a que nuestros enemigos, ya sean internos o externos, nos provoquen a cambiar la composición de nuestro ejército. Con base en lo que hemos visto hasta ahora y en las amenazas que se anticipan, reestructuraremos y reorganizaremos nuestras fuerzas para que sean plenamente capaces de afrontar todos estos desafíos. Debemos afrontar y aceptar una verdad fundamental: un ejército mal organizado y estructurado no puede ganar un conflicto moderno."
 USC_veteran_mobilization: "Movilizar a veteranos"
 USC_veteran_mobilization_desc: "Uno de nuestros activos más importantes no son armas temibles, sino hombres: nuestros veteranos. Poseen un vasto conocimiento y experiencia en conflictos previos en los que nuestro país ha luchado, además de ser soldados consumados. Los reclutaremos para que nos ayuden a entrenar a nuestro ejército, formular doctrina, elevar la moral e incluso servir en combate en el frente. Con su ayuda y participación, nuestras fuerzas armadas se convertirán en una fuerza a tener en cuenta."
 USC_war_plans_department: "Departamento de Planes Bélicos"
 USC_war_plans_department_desc: "Aunque sería fácil lanzarse constantemente a la batalla sin previsión, es algo inviable si se espera la victoria. Una victoria en el campo de batalla moderno a menudo requiere una sólida planificación previa para hacerse realidad. Conscientes de esto, estableceremos un departamento dentro de nuestras fuerzas armadas encargado específicamente de elaborar, evaluar e implementar planes detallados y efectivos para nuestro esfuerzo bélico. Con una organización así a nuestra disposición, podemos esperar planes y una preparación de mucha mayor calidad para las batallas actuales y futuras, ya sea en Norteamérica o en cualquier otro lugar."
 USC_embrace_the_stratocracy: "Abrazar la estratocracia"
 USC_embrace_the_stratocracy_desc: "Se acabó el tiempo de andarse con rodeos. Es hora de que este país entienda que soy un presidente de guerra; es hora de que empecemos a tratar las cosas como tales. ¡Por eso priorizo la seguridad de América! ¡Por eso me aseguré de que las Fuerzas Armadas recibieran todo lo necesario para acabar con el caos! Y seguirán recibiendo más hasta que todos los rebeldes sean derrotados, como los perros rabiosos que son.\n\nSin embargo, incluso las grandes medidas que ya se han tomado han demostrado ser insuficientes. Por eso hoy firmaré una orden ejecutiva, una como nunca antes. Permitirá a nuestras fuerzas armadas enfrentarse al enemigo dondequiera que esté, cuando sea. En esta batalla por la supervivencia de nuestro país, ¡esto es lo único correcto si queremos recuperar este país y hacerlo grande otra vez!"
 USC_secure_the_party: "Asegurar el Partido"
 USC_secure_the_party_desc: "Como saben, hemos estado ocupados combatiendo el Pantano en Washington D.C., ¡solo para ver cómo se formaba un Pantano dentro del propio Partido Republicano! Incluso hoy en día, hay gente que no es tan fiel al Pueblo, no es tan fiel a la causa MAGA. Gente muy desleal, traicionera, como palos en nuestras ruedas... Comenzaremos la erradicación de estos disidentes, con efecto inmediato.\n\nEn momentos como estos... todo republicano debe convertirse en trumpista. Nos uniremos bajo mi liderazgo y haremos que el partido vuelva a estar unido y fuerte. Todo será limpio y ordenado, se acabaron las disputas y la decadencia."
 USC_rally_the_patriots: "Reunir a los patriotas"
 USC_rally_the_patriots_desc: "Una buena parte del Ejército, la Infantería de Marina y las Milicias Organizadas de EE.UU. están dispuestos a luchar por nuestra querida nación. Es imperativo que nos organicemos para hacer frente a las fuerzas del establishment globalista y otros enemigos potenciales."
 USC_lessons_of_war: "Lecciones de la guerra"
 USC_lessons_of_war_desc: "Quienes no aprenden de sus errores en la guerra, tarde o temprano, perderán. No nos quedaremos de brazos cruzados ni nos quedaremos atrás en el vertiginoso entorno de la guerra moderna. Afortunadamente, este conflicto ya nos ha dado muchas lecciones y nos ha dado pistas para mejorar en casi todos los sentidos. No perderemos tiempo e institucionalizaremos estas lecciones en nuestras academias militares, oficiales y Estado Mayor para mantener a nuestras fuerzas armadas al día con todo lo que pueda surgir en estos tiempos de incertidumbre. Nuestras Fuerzas Armadas se convertirán en una fuerza letal capaz de afrontar de inmediato las duras circunstancias que este conflicto nos presenta."
 USC_mindset_of_struggle: "Mentalidad de lucha"
 USC_mindset_of_struggle_desc: "No se puede evitar mencionar: América atraviesa grandes dificultades y sufrimiento. Si queremos salir victoriosos de esta turbulencia, debemos aceptar que el camino hacia el triunfo será difícil. Todos, desde el soldado raso de menor rango hasta el político de mayor rango, deben adoptar una mentalidad de lucha. Difundiremos el mensaje de coraje, dedicación y tenacidad en todos los ámbitos de la sociedad. América nació luchando y renacerá luchando."
 USC_an_adaptable_army: "Un ejército versátil"
 USC_an_adaptable_army_desc: "La guerra moderna es casi como una evolución, donde quienes no se adaptan a un campo de batalla en constante cambio mueren, mientras que quienes pueden continuar luchando. No nos permitiremos quedarnos de brazos cruzados mientras nuestros enemigos se adaptan y cambian. Nuestras fuerzas armadas adoptarán ahora una doctrina de flexibilidad táctica y adaptación. Todos nuestros oficiales y generales, sin importar su rango, deben adoptar cualquier táctica, estrategia, tecnología o cambio estructural necesario para adelantarse a nuestros enemigos. El mantra que se enseñará en cada unidad y puesto de oficial será este: un ejército adaptable es un ejército que lucha un día más."
 USC_secure_army_loyalty: "Asegurar la lealtad militar"
 USC_secure_army_loyalty_desc: "De todas las facciones y actores de nuestro gobierno, el ejército se erige como uno de los más poderosos e influyentes. Sabiéndolo, no se perderá tiempo en asegurar su lealtad. Se hablará con oficiales clave y se les convencerá, se harán nombramientos a su favor y se atenderán de inmediato ciertas quejas pendientes. Cuando sepamos que el ejército está de nuestro lado, habrá poco que temer cuando se trate de ser derrocados por facciones demasiado ambiciosas dentro de nuestro gobierno o la sociedad en general."
 USC_freedom_underground: "Freedom Underground"
 USC_freedom_underground_desc: "No todas las guerras se libran con hombres uniformados que se disparan a vista de pájaro. Para ganar esta guerra, debemos librarla tanto de forma convencional como no convencional. Organizaremos, dirigiremos y financiaremos a patriotas para que luchen por América desde las sombras, especialmente tras líneas enemigas. Ya sea con fuerzas especiales, partisanos o insurgentes, lucharemos por la libertad lejos del frente con dedicación y vigor. Aunque no sean fáciles de ver o encontrar, seguirán librando una batalla importante donde ahora luchamos por hacerlo."
 USC_old_glorys_new_army: "El nuevo ejército de Old Glory"
 USC_old_glorys_new_army_desc: "Los Estados Unidos de América son una nación con una de las historias y tradiciones más ricas en torno a sus fuerzas armadas. Nuestro país ha luchado en innumerables conflictos y ha triunfado sobre enemigos de todos los colores y credos. Continuaremos con orgullo este glorioso legado. Es seguro que cada rama, unidad y oficina continuará con honor las tradiciones y el legado del pasado americano. Aunque los tiempos y los patrones de camuflaje hayan cambiado, el espíritu y la tradición del poderío americano perdurarán a través de nosotros."
 USC_take_back_our_country: "Retomar nuestro país"
 USC_take_back_our_country_desc: "América está sumida en el caos. Las élites arraigadas y otros elementos traidores de la sociedad han sumido a esta otrora gran nación en la confusión, pero no todo es pesimismo. Ha llegado el momento de que los verdaderos patriotas americanos tomen las riendas y enfrenten a nuestros enemigos. Reuniremos a todos los organismos gubernamentales, recursos, empresas privadas y patriotas que deseen librar esta gloriosa batalla con nosotros. ¡Bajo nuestra bandera, América será rescatada de estos traidores!"
 USC_drain_the_swamp: "Drenar el Pantano"
 USC_drain_the_swamp_desc: "No todos los enemigos de América hacen sus intenciones tan claras. Un caos de políticos y burócratas corruptos del establishment está absorbiendo recursos y personal no solo de nuestro Gobierno, sino también del pueblo. No toleraremos más nada de esto. Nuestro gobierno será rápidamente depurado de estos actores derrochadores y corruptos. Se cerrarán oficinas, se reevaluarán presupuestos y, sin duda, se despedirá a gente. Tal como Trump dijo innumerables veces durante la campaña, \"drenaremos el Pantano\"."
 USC_create_the_nida: "Ojo que todo lo ve"
 USC_create_the_nida_desc: "En nuestro esfuerzo por reunir la mayor cantidad posible de recursos políticos y militares de América, hemos logrado apoderarnos de una parte considerable del aparato de inteligencia americana previo a la guerra. Las agencias de inteligencia de este país son insuperables y cuentan con herramientas y habilidades de recopilación de información sin precedentes en cuanto a alcance y sofisticación. Bajo nuestra propia agencia, la Agencia Nacional de Inteligencia de Defensa, utilizaremos todos estos recursos para acortar rápidamente la brecha, o incluso superar a nuestros enemigos, en materia de información e inteligencia. Sin embargo, debemos actuar con cautela, ya que sus habilidades y su naturaleza clandestina pueden ocultar maquinaciones siniestras que podrían causarnos muchos problemas en el futuro."
 USC_work_with_the_old_party: "Colaborar con el Viejo Gran Partido"
 USC_work_with_the_old_party_desc: "No todos en nuestro gobierno comparten la misma visión sobre cómo deben hacerse las cosas. Los miembros del Partido Republicano, con enfoques ligeramente diferentes, siguen siendo una parte considerable de este gobierno. Sin embargo, en lugar de marginarlos, nos sentaremos a negociar con ellos. Mantener la unidad política dentro de este gobierno solo se logrará si se asegura su cooperación y apoyo. Sería un error que nos alejemos de una parte tan influyente de este gobierno en estos tiempos de crisis."
 USC_end_of_the_line: "Fin de la línea"
 USC_end_of_the_line_desc: ""
 USC_restart_the_war_machine: "Reiniciar la maquinaria bélica"
 USC_restart_the_war_machine_desc: "Una de las mayores fortalezas de América fue su extenso complejo militar-industrial. Los frutos de la industria militar americana nos permitieron ganar dos guerras mundiales y mantenernos en la cima durante el resto del siglo XX. Esta temible maquinaria resucitará y se pondrá al servicio de nuestra marcha hacia la victoria. Se abrirán fábricas, se reiniciarán las líneas de producción y se empleará a trabajadores para fabricar las armas de guerra más temibles. Cuando esta industria bélica en expansión alcance su capacidad máxima, nuestras fuerzas armadas se convertirán en una fuerza inagotable que nadie en este continente podrá concebir detener."
 USC_encourage_domestic_production: "Alentar a la producción doméstica"
 USC_encourage_domestic_production_desc: "Un error garrafal que cometieron los políticos americanos preguerra fue tolerar el dominio de las empresas extranjeras y los bienes importados en nuestra economía. Bajo un marco económico globalista tan corrupto, nuestra base manufacturera nacional se desintegró. No permitiremos que esto continúe. Exigiremos y fomentaremos públicamente, ya sea por medios financieros o políticos, el apoyo y el uso de la manufactura nacional. Cuando todos nuestros bienes y servicios manufacturados sean fabricados por nuestras propias empresas, tendremos la seguridad de saber que no dependeremos en absoluto de nadie. Una América poderosa se sustenta en una industria poderosa, 100% americana."
 USC_economic_expansionism: "Expansionismo económico"
 USC_economic_expansionism_desc: "Para que una economía crezca, las grandes empresas que contribuyen a la actividad económica también deben crecer. Identificaremos entidades específicas, tanto grandes como pequeñas, que sean importantes para la economía y les brindaremos incentivos financieros y políticos para expandir sus actividades. Una vez que todas crezcan en tamaño y alcance, sin duda emplearán a más personas y contribuirán más a la economía."
 USC_fiscal_responsibility: "Responsabilidad fiscal"
 USC_fiscal_responsibility_desc: "Uno de los peores fracasos del Estado americano preguerra fue su gestión totalmente irresponsable del gasto público. Antes de la guerra, los déficits eran elevados, la deuda nacional se descontrolaba y el gasto era innecesariamente exorbitante. No cometeremos el mismo error. Ahora instituiremos regulaciones y procedimientos específicos para garantizar que nuestro gasto público se mantenga manejable y nuestra deuda baja. En tiempos como estos, el despilfarro y la irresponsabilidad con las finanzas estatales pueden ser devastadores, como se vio en lo que sucedió en la América preguerra."
 USC_ease_taxpayer_burdens: "Aliviar a los contribuyentes"
 USC_ease_taxpayer_burdens_desc: "Una de las políticas más injustas impuestas a casi todos los ciudadanos americanos fueron los impuestos desorbitados de la preguerra. Esta guerra en curso ha causado aún más problemas financieros al pueblo americano; no debemos agravarlos. Se implementará una reducción de impuestos inmediata y amplia para una gran parte de los contribuyentes americanos. Esperemos que esto alivie algunas de las enormes cargas financieras causadas no solo por la guerra, sino también por las decisiones financieras excesivas y deficientes del gobierno de preguerra."
 USC_encourage_the_working_man: "Alentar al trabajador"
 USC_encourage_the_working_man_desc: "El americano promedio no hará milagros simplemente porque se le diga que lo haga; necesitamos hacer más que eso. Los ciudadanos comunes y corrientes necesitan un incentivo tangible para trabajar y contribuir a esta economía. Al brindar incentivos, ya sea mediante estipendios financieros o nuevas oportunidades de empleo, podemos contar con que nuestros ciudadanos estarán más dispuestos y capacitados para contribuir al crecimiento de la economía. Las personas con empleos bien remunerados y los frutos tangibles de su trabajo son los mejores indicadores de una economía en mejora."
 USC_destroy_chinese_imports: "Destruir importaciones chinas"
 USC_destroy_chinese_imports_desc: "No es difícil comprender que China ha sido todo menos amistosa con nosotros. Durante años se han esforzado por socavarnos y superarnos en casi todos los ámbitos, pero aún así seguimos importando sus productos para su beneficio. Este terrible statu quo terminará ahora. Aumentaremos drásticamente los aranceles y las restricciones generales a la importación de productos chinos. Además, los productos chinos ya importados a EE.UU. que no cumplan con las nuevas regulaciones serán destruidos de inmediato. Los días de dependencia de nuestro adversario comunista pronto serán un lejano recuerdo."
 USC_resurrect_the_dream: "Revivir el Sueño"
 USC_resurrect_the_dream_desc: "América fue una vez la tierra de las grandes promesas, donde hombres provenientes de la más atroz pobreza podían llegar, ganarse la vida y alcanzar el éxito. Esta era una América que se perdió, pero ya no. Trabajaremos para recuperar las oportunidades que hicieron de América una nación que hizo realidad tantos sueños. Mediante nuevos programas de trabajo, subvenciones y otras reformas legales o económicas, el Pueblo volverá a encontrar un camino claro hacia el éxito. Cuando revivamos el sueño americano, tendremos la certeza de que América es grande otra vez."
 USC_expand_arms_production: "Expandir la producción armamentística"
 USC_expand_arms_production_desc: "Como en todas las guerras, la victoria solo puede llegar cuando los hombres tienen armas para luchar. El ritmo actual de este conflicto está afectando drásticamente nuestro suministro de armas ligeras para nuestro ejército. Sin embargo, no nos quedaremos de brazos cruzados y permitiremos que esta situación se deteriore aún más. Nos pondremos en contacto de inmediato con nuestros principales fabricantes de armas ligeras e invertiremos más material y dinero en ampliar la producción de armas. Ya sean rifles de asalto o ametralladoras, nuestros soldados obtendrán lo que necesitan para ganar esta guerra."
 USC_support_rural_farmers: "Apoyar al campo"
 USC_support_rural_farmers_desc: "El agricultor rural de este país sufre el mayor abandono de todos los grupos demográficos de la población americana. Aplastado por la globalización, las élites costeras y las importaciones chinas, se le ha dejado en la ruina. Este terrible abandono cesará bajo nuestra supervisión. Invertiremos de inmediato en equipos agrícolas modernos, en la lucha contra la pobreza y en la expansión de la producción agrícola. Una vez que las condiciones de los agricultores mejoren drásticamente, podremos esperar una mayor seguridad alimentaria para la población, junto con la tan esperada revitalización de las comunidades rurales."
 USC_a_gun_in_every_hand: "Un arma en cada mano"
 USC_a_gun_in_every_hand_desc: "Esta guerra no se ganará simplemente con tener \"suficientes\" armas; necesitamos más que eso. Nuestra base militar-industrial y nuestras redes logísticas deben comenzar de inmediato a aumentar el suministro de armas a nuestras fuerzas en la vanguardia de esta guerra. Todo hombre uniformado, independientemente de su rama, necesita un suministro adecuado de armas y municiones. Superar a nuestros enemigos en armas disponibles nos dará una ventaja inmediata y notable en el campo de batalla."
 USC_promote_economic_patriotism: "Promover patriotismo económico"
 USC_promote_economic_patriotism_desc: "Un aspecto importante en el que los americanos pueden demostrar patriotismo es a través de sus finanzas. Comenzaremos a abogar públicamente por que todos los americanos solo hagan negocios con empresas americanas. ¿Por qué los ciudadanos que viven en una nación tan próspera y rica como América deberían hacer negocios con alguien más? Ya sea comprando, vendiendo o invirtiendo, los ciudadanos y las empresas deberían mostrar cierta lealtad patriótica a su país por encima de los impulsos destructivos de asociarse con extranjeros."
 USC_establish_an_all_american_banking_system: "Sistema bancario panamericano"
 USC_establish_an_all_american_banking_system_desc: "El sistema bancario de América está dominado por numerosos bancos de propiedad e incluso operación extranjera, que ejercen una gran influencia en nuestra economía. Es hora de poner fin a esta vergonzosa situación. Estableceremos un nuevo sistema bancario que favorezca considerablemente a los bancos de propiedad y operación americano sobre los extranjeros. Además, promulgaremos nuevas regulaciones dirigidas a los bancos extranjeros para dificultarles establecer una hegemonía financiera en nuestro país. El dinero de América debe estar solo en manos de los americanos y de nadie más."
 USC_crush_the_federal_reserve: "Aplastar a la Reserva Federal"
 USC_crush_the_federal_reserve_desc: "La Reserva Federal fue uno de los ejemplos más flagrantes de la extralimitación del gobierno federal en la economía americana. Sin embargo, a partir de hoy, ya no será tan intrusiva en las actividades económicas de este país. Bajo nuevas órdenes ejecutivas y reformas, la Reserva Federal será rápidamente reducida y despojada de sus poderes. Esto no se ocultará; la regularemos y reestructuraremos hasta el olvido."
 USC_employ_our_veterans: "Emplear a nuestros veteranos"
 USC_employ_our_veterans_desc: "Nuestros veteranos poseen valiosas habilidades adquiridas durante su servicio militar; no podemos permitir que se desperdicien. Abriremos rápidamente nuevas oportunidades laborales para ellos, tanto en el sector civil como en el militar, donde puedan aplicar sus habilidades. Con nuestros veteranos en la fuerza laboral, esperamos que puedan usar sus habilidades, disciplina y experiencia para impulsar la productividad y la eficiencia de diversas empresas importantes, cruciales para el esfuerzo bélico."
 USC_recruit_our_veterans: "Reclutar a nuestros veteranos"
 USC_recruit_our_veterans_desc: "Nuestros veteranos poseen un cúmulo de habilidades importantes gracias a su extenso entrenamiento y servicio como soldados; no podemos permitir que se desperdicien. Reclutaremos a muchos de nuestros veteranos para que presten servicio en combate en diversas ramas de nuestras fuerzas armadas. Su experiencia de combate, habilidades y amplios conocimientos adquiridos durante su servicio militar serán un recurso invaluable para nuestras tropas en el frente."
 USC_next_generation_logistics: "Logísticas de próxima generación"
 USC_next_generation_logistics_desc: "Un aspecto a menudo pasado por alto para ganar una guerra es la logística. Si nuestros soldados no reciben los suministros que necesitan para combatir, ¿cómo podrán ganar la batalla? Este es un problema que se abordará de inmediato. Iniciaremos un programa masivo de inversión para expandir, modernizar e incluso innovar nuestra red logística. Se construirán carreteras, se establecerán nuevas redes ferroviarias, se planificarán nuevas rutas para la distribución de suministros, junto con otros cambios y mejoras importantes. La era en la que nuestras fuerzas armadas se preocupaban por la disponibilidad de suministros será cosa del pasado."
 USC_a_deal_they_cant_refuse: "Una oferta que no rechazarán"
 USC_a_deal_they_cant_refuse_desc: "En tiempos de gran crisis, como el que atravesamos, no podemos desperdiciar tiempo ni recursos en el lujo de regatear o negociar con empresas privadas. Nuestra base militar-industrial debe saber ahora que no estamos aquí para negociar, regatear ni hacer tratos extravagantes con ellos; exigimos resultados y nada más. Las principales empresas involucradas en nuestra producción de armas serán inmediatamente \"contratadas\" para fabricar los sistemas de armas que necesitamos. Si se niegan, demoran o intentan malgastar nuestro tiempo o recursos, aprenderán que tales artimañas tienen consecuencias."
 USC_the_business_of_war: "El negocio de la guerra"
 USC_the_business_of_war_desc: "Como en todos los demás aspectos de la sociedad humana, la guerra se libra, en su gran mayoría, con la ayuda de la empresa privada. Comenzaremos el proceso de subcontratar a diversas empresas para fabricar muchos sistemas de armas importantes que nuestras fuerzas armadas necesitan con urgencia. Aunque organizar la logística, la planificación y la resolución de cualquier problema con los fabricantes pueda llevar algo de tiempo, a la larga dará sus frutos. Cuando establezcamos una coordinación y colaboración adecuadas con nuestros contratistas de defensa, nos sentiremos tranquilos sabiendo que estarán a la altura de proporcionarnos todo lo necesario para librar esta guerra."
 USC_fight_the_great_american_struggle: "La Gran Lucha Americana"
 USC_fight_the_great_american_struggle_desc: "La guerra que libramos actualmente no es un conflicto cualquiera. Es una guerra sin precedentes en siglos de historia americana; es una guerra por el destino mismo de América. Para ganar se requerirá esfuerzo y voluntad de lucha por parte de cada patriota leal, desde el trabajador de fábrica hasta los oficiales de más alto rango de nuestras fuerzas armadas. En esta Gran Lucha Americana, cada hombre, mujer, niño, grupo social y empresa debe estar listo para luchar y darlo todo por la victoria."
 USC_revitalize_forgotten_communities: "Revitalizar comunidades olvidadas"
 USC_revitalize_forgotten_communities_desc: "La desindustrialización de América y la concentración de la riqueza en las ciudades costeras liberales han causado estragos en muchas comunidades trabajadoras americanas. No escatimaremos tiempo para abordar esta grave injusticia infligida a la sociedad americana. Las comunidades y localidades con dificultades económicas recibirán inversión y oportunidades de empleo tanto del estado como de las empresas privadas con las que colaboraremos. Cuando estas comunidades marginadas finalmente obtengan empleos bien remunerados y una sensación de seguridad económica, comenzarán a prosperar como debería ser toda la sociedad americana."
 USC_introduce_rationing: "Introducir el racionamiento"
 USC_introduce_rationing_desc: "Desafortunadamente para el ciudadano americano promedio, la era de la abundancia sin interrupciones ha terminado temporalmente. Debido a las turbulentas e intensas condiciones de la guerra, muchos productos básicos esenciales para la vida diaria escasean. Para gestionar con cuidado y reducir el desperdicio de estos productos básicos y suministros, se introducirá el racionamiento. Los ciudadanos podrán comprar una cantidad limitada de artículos específicos cada mes y contarán con documentación estatal para rastrear y registrar sus compras. Con suerte, si conservamos y gestionamos nuestros recursos adecuadamente, podremos ganar esta guerra sin enfrentarnos a la escasez devastadora que ha devastado a muchos estados en innumerables guerras del pasado."
 USC_build_anti_poverty_encampments: "Campamentos contra la pobreza"
 USC_build_anti_poverty_encampments_desc: "Las consecuencias económicas de la Guerra Civil han sumido a innumerables americanos en una pobreza extrema. Sin embargo, no permitiremos que este sufrimiento continúe sin solución. Se implementará un programa de ayuda amplio pero integral para los americanos que viven en las peores condiciones. Estos americanos, que a menudo padecen frío, hambre, están enfermos, sin hogar o todo lo anterior, recibirán ayuda que abarca desde donaciones de alimentos hasta alojamiento temporal. Si evitamos que el nivel de vida de nuestros ciudadanos se degrade significativamente, podemos esperar que la moral y el apoyo a la guerra se mantengan altos."
 USC_end_green_tyranny: "Fin de la tiranía verde"
 USC_end_green_tyranny_desc: "Durante años, las élites liberales han intentado imponer la \"energía verde\" a la fuerza al pueblo americano. Sus planes han amenazado con dejar sin trabajo a millones de americanos que trabajan en las industrias del carbón y el petróleo. Esto ya no se tolerará, ya que a las industrias \"verdes\" que fueron apoyadas artificialmente por estos socialistas de la costa se les revocarán todos los privilegios y estipendios otorgados por el gobierno de preguerra. Se aprobarán rápidamente nuevas ayudas financieras y reinversiones en las industrias de combustibles fósiles de América para garantizar que los millones de americanos que trabajan en dichas industrias conserven sus empleos. Ya no estamos en deuda con las élites liberales costeras ni con sus ONG de justicia social lacayas, así que ¿por qué deberíamos apoyar sus extravagantes planes \"ambientalistas\"?"
 USC_embrace_the_energy_of_the_future: "Abraza la energía del futuro"
 USC_embrace_the_energy_of_the_future_desc: "Aunque nos sintamos complacientes con la composición actual de nuestro sector energético, debemos reconocer que el mundo moderno en el que vivimos avanza más rápido que nuestro orgullo y nostalgia. Los nuevos avances en el sector energético prometen numerosos beneficios que podríamos aprovechar con gran éxito. Los nuevos avances, pioneros por empresas y científicos americanos en áreas como la energía nuclear, geotérmica y solar, están listos para su implementación y explotación. No perderemos tiempo y otorgaremos de inmediato financiación y apoyo a nuevos proyectos energéticos que utilicen estas nuevas tecnologías. América es una tierra de innovación y progreso, y seguiremos cumpliendo esta promesa ancestral con la adopción de estas nuevas tecnologías energéticas del futuro."
 USC_expand_the_defense_production_act: "Expandir el Acta de Producción"
 USC_expand_the_defense_production_act_desc: "El Acta de Producción para la Defensa es, sin lugar a duda, una herramienta útil para coordinar y movilizar nuestra industria militar, pero esta guerra ha demostrado que necesitamos más de lo que ofrece esta versión actual de la ley. Consciente de ello, las facultades y atribuciones que otorga la ley se actualizarán y ampliarán significativamente. Nuestro gobierno contará ahora con aún más herramientas y supervisión para coordinar, controlar y ampliar la producción de equipo militar clave necesario para el esfuerzo bélico. Con estas restricciones burocráticas finalmente levantadas, la victoria pronto estará a nuestro alcance."
 USC_regrow_american_innovation: "Reimpulsar la innovación americana"
 USC_regrow_american_innovation_desc: "América fue en su día el mejor del mundo en ciencia. Esta nación engendró e invitó a las mentes más brillantes de generaciones enteras, quienes crearon inventos e innovaciones revolucionarias. Nos aseguraremos de estar a la altura de este gran legado. Con efecto inmediato, se otorgarán nuevas subvenciones e inversiones a importantes empresas privadas y públicas dedicadas a la investigación y el desarrollo científico. Una vez que invirtamos suficientes recursos y dinero, la capacidad de innovación de nuestra nación en ciencia y tecnología será inigualable, tal como estábamos destinados a ser."
 USC_the_best_is_yet_to_come: "Lo mejor está por venir"
 USC_the_best_is_yet_to_come_desc: "Hemos trabajado muy duro y hemos llegado muy lejos en nuestra lucha por recuperar este país, pero no termina aquí. Aún queda mucho por delante en nuestra misión de hacer a América grande otra vez. Por mucho que queramos detenernos ahora, hay mucho por lo que seguir luchando. Nuestros enemigos, incluso ahora, continúan en su empeño por destruir a América y a los patriotas que lo defienden, pero no nos detendrán. Como dijo una vez el presidente Trump: \"Lo mejor está por venir\"."
 USC_economic_populism: "Populismo económico"
 USC_economic_populism_desc: "Los problemas económicos de nuestro país no pueden ser comprendidos por académicos liberales elitistas. Solo la gente común de este país comprende qué hacer con la economía americana. Como quienes los representan, escucharemos con prontitud sus demandas. Las nuevas políticas y reformas económicas se basarán en lo que sea popular entre los votantes y la ciudadanía. Si los escuchamos y les damos lo que quieren, nunca nos equivocaremos ante sus ojos. Al fin y al cabo, somos una democracia, y escuchar la voluntad del pueblo es lo que debemos hacer."
 USC_utilize_revolutionary_nostalgia: "Utilizar nostalgia revolucionaria"
 USC_utilize_revolutionary_nostalgia_desc: "América fue una nación nacida de una lucha violenta por la libertad. Este es un legado que adoptaremos plenamente y utilizaremos al máximo en nuestras campañas de relaciones públicas. Dondequiera que promovamos nuestra causa, invocaremos a los revolucionarios americanos. Los patriotas que lucharon contra la tiranía entonces servirán de modelo para los patriotas de hoy. El pasado revolucionario de América será la piedra angular que motive nuestra propia lucha revolucionaria de hoy."
 USC_invoke_the_second_ammendment: "Invocar la Segunda Enmienda"
 USC_invoke_the_second_ammendment_desc: "La Segunda Enmienda de nuestra Constitución es uno de los pilares de la democracia americana, pero, lamentablemente, muchos no comparten nuestra opinión. Nuestros enemigos intentaron privar a tantos americanos de su derecho a portar armas, lo que solo demostró lo que muchos sospechaban. Este derecho debe convertirse ahora en un lema de unidad para todos los patriotas leales que desean defender sus derechos constitucionales de la tiranía. En nuestras campañas públicas, invocaremos la importancia de la Segunda Enmienda como el arma definitiva que los americanos comunes tienen para defender esta nación. Haremos que nuestros ciudadanos se sientan orgullosos y motivados a luchar sabiendo que sus derechos están en juego en esta guerra."
 USC_the_national_militia: "La Milicia Nacional"
 USC_the_national_militia_desc: "Las milicias que se han creado para combatir junto a nuestras fuerzas regulares nos benefician enormemente, pero su naturaleza desarticulada podría representar un problema en el futuro. Por lo tanto, crearemos una milicia nacional única, bajo un control mucho más estricto de nuestro alto mando militar. Esta nueva milicia nacional combinará la determinación y el patriotismo de la ciudadanía común con la naturaleza más organizada y centralizada de nuestra estructura de mando militar. Así como los revolucionarios americanos lucharon contra los británicos con milicias ciudadanas, nosotros también derrotaremos a nuestros enemigos actuales con ciudadanos que luchan en una milicia."
 USC_stand_your_ground: "Stand your Ground"
 USC_stand_your_ground_desc: "Desafortunadamente, esta guerra ha infligido a muchos de nuestros ciudadanos, soldados y políticos una mentalidad pesimista. Muchos hablan de retirada, capitulación y destrucción inminente, pero toda esta cobardía debe cesar. Nuestros comandantes y soldados aprenderán que solo cuando se mantengan firmes y luchen, la victoria será posible. Cuando nos mantengamos firmes y luchemos en lugar de acobardarnos, nuestros enemigos sabrán que les espera un mundo de dolor. Esta es una mentalidad que todos, desde el soldado raso hasta el político de mayor rango, deben adoptar con orgullo y vigor."
 USC_armor_innovations: "Innovaciones blindadas"
 USC_armor_innovations_desc: "Nuestra experiencia actual en combate en este conflicto nos ha proporcionado un caudal de conocimientos y lecciones que podemos usar para mejorar nuestros sistemas de armas. Esto es especialmente cierto para nuestras fuerzas blindadas. Utilizaremos todo lo que hemos visto y aprendido con el uso de tanques en esta guerra y haremos que los departamentos de I+D de nuestra industria militar comiencen a trabajar en actualizaciones y otras mejoras. Con estas nuevas tecnologías e innovaciones a nuestra disposición, nuestras fuerzas blindadas se convertirán en una fuerza a tener en cuenta en el campo de batalla moderno."
 USC_reorganize_the_air_force: "Reorganizar la Fuerza Aérea"
 USC_reorganize_the_air_force_desc: "En nuestro intento por apoderarnos de lo que pudimos de las fuerzas armadas americanas de antes de la guerra, obtuvimos una gran parte de la Fuerza Aérea. Sin embargo, en el caos resultante de la guerra, nuestro intento de formar una fuerza aérea con estos recursos confiscados ha sido, en el mejor de los casos, desordenado y desorganizado. Esta situación se rectificará de inmediato. Nuestra fuerza aérea se reorganizará y reestructurará significativamente con nuevas alas aéreas, unidades reestructuradas, nuevas bases aéreas y nuevas doctrinas establecidas. Una vez que nuestra aviación militar esté en pleno funcionamiento, dominaremos los cielos de América."
 USC_crush_the_deepstate: "Aplastar al Estado profundo"
 USC_crush_the_deepstate_desc: "Las siniestras fuerzas clandestinas del Estado profundo han estado trabajando contra nosotros desde el principio, a menudo a través de las agencias de inteligencia americanas. Aunque algunos de estos organismos y agentes de inteligencia ahora están bajo nuestro control, finalmente les demostraremos a estos elementos traidores quién manda aquí. Sus poderes se verán drásticamente reducidos y sus actividades estarán ahora bajo una supervisión mucho más estricta por parte del gobierno. Si quieren hacer algo, primero tendrán que pasarnos la prueba a nosotros. ¡El Estado profundo y sus lacayos ya no volverán a atacar a los verdaderos patriotas de este país!"
 USC_restructure_the_intel_community: "Reestructurar la IC"
 USC_restructure_the_intel_community_desc: "Las agencias de inteligencia y los agentes que se han obtenido de la América de antes de la guerra han demostrado ser muy útiles hasta la fecha, pero aún hay mucho margen de mejora. Las amenazas y presiones actuales de esta guerra y otras áreas de preocupación justifican una reestructuración profunda de nuestra Comunidad de Inteligencia. Recibirán nuevas asignaciones, nuevas prioridades y diversas oficinas se reorganizarán para nuevos objetivos. Nuestras agencias de recopilación de inteligencia, recientemente reorganizadas, dejarán a nuestros enemigos sin nada que ocultarnos."
 USC_trial_the_traitors: "Juzgar a los traidores"
 USC_trial_the_traitors_desc: "En nuestra lucha por América, nos hemos topado con muchos americanos que dicen luchar por la libertad y la salvación de esta nación, pero pronto hemos aprendido que son todo lo contrario. Muchos de estos supuestos patriotas son traidores, oportunistas, mentirosos y fanáticos de ideologías repugnantes que no tienen cabida en este país. Ha llegado el momento de hacer justicia con estos repugnantes traidores de América. Serán juzgados por sus actos criminales contra esta nación y su pueblo, y recibirán el castigo correspondiente. Aunque no tenemos a todos los traidores de este país bajo nuestra custodia, los que sí tenemos recibirán justicia por todos sus crímenes."
 USC_back_the_blue: "Apoyar a la policía"
 USC_back_the_blue_desc: "Las fuerzas policiales de esta nación han soportado una de las mayores cargas de cualquier persona en este país en los últimos años: mantener la ley y el orden en las calles de América. Anarquistas, criminales, terroristas y, finalmente, la turbulencia de esta guerra han convertido la vida de nuestros policías en un infierno. Sin embargo, no permitiremos que este tormento continúe. Nuestros agentes del orden público locales, estatales y federales finalmente recibirán el apoyo que necesitan. Ya sea dinero, equipo o nuevos programas de capacitación, recibirán todo lo necesario para garantizar la paz y el orden en nuestra sociedad."
 USC_rekindle_nationalism: "Revivir el nacionalismo"
 USC_rekindle_nationalism_desc: "Para salvar a nuestro país, es necesario amar y apreciar lo que hace especial a nuestra nación. Los patriotas que luchan por este país deben estar motivados por algo más que la simple idea de la victoria; deben estar motivados por la defensa de la identidad americana. En nuestras campañas públicas para el esfuerzo bélico, difundiremos el orgullo y el fervor nacionalistas por la nación americana. El nacionalismo ya no será la frase intimidante por la que se castigará a los americanos; será la principal fuerza que nos motiva a todos."
 USC_the_minutemens_last_stand: "Última defensa de los Minutemen"
 USC_the_minutemens_last_stand_desc: "Las milicias y otras fuerzas menos organizadas que luchan por nosotros se encuentran ahora en una situación muy precaria. A medida que aumentan las presiones y las pérdidas causadas por la guerra, deberán asumir un papel más activo en la lucha contra nuestros enemigos en el frente. No será fácil para ellos, pero tiempos desesperados requieren medidas desesperadas. Sin embargo, no dudamos de su capacidad y devoción a nuestra causa. Confiamos en que harán todo lo posible por defender este país y llevarnos a la victoria siempre que sea posible."
 USC_spacious_skies: "Cielos espaciosos"
 USC_spacious_skies_desc: "Aunque los cazas y el intenso combate que los rodea acaparan toda la atención, ganar la guerra aérea requerirá algo más que el simple uso de cazas y aviones de ataque terrestre. Necesitaremos construir más y aumentar el uso de bombarderos tácticos y estratégicos capaces de alcanzar objetivos a gran profundidad tras las líneas enemigas. Una vez que los utilicemos para destruir la infraestructura, la industria, la logística y otros objetivos críticos en la retaguardia del enemigo, podemos esperar que la eficacia en combate del enemigo se reduzca considerablemente. No solo dominaremos los cielos sobre nosotros, sino también sobre nuestros enemigos."
 USC_finance_plane_production: "Financiar producción de aeronaves"
 USC_finance_plane_production_desc: "Nuestra tasa actual de bajas en combate aéreo está ejerciendo una gran presión sobre nuestra Fuerza Aérea. Para mantenerla en acción, necesitaremos obtener más aeronaves para compensar las pérdidas y ampliar la eficacia de nuestras alas aéreas. No perderemos tiempo y financiaremos a nuestros fabricantes para que comiencen a producir en masa más aeronaves de combate. Nuestra fuerza aérea pronto recibirá los vehículos necesarios para seguir combatiendo en la guerra aérea sobre América."
 USC_the_next_generation_air_force: "Fuerza Aérea de próxima generación"
 USC_the_next_generation_air_force_desc: "La tecnología de la aviación militar avanza cada año a un ritmo cada vez más acelerado. Conscientes de ello, no debemos quedarnos atrás en la carrera por la próxima fuerza aérea avanzada. Acumularemos y organizaremos todo el progreso, el material y los conocimientos técnicos para crear una fuerza aérea de \"próxima generación\". Esta fuerza combinará lo último en tácticas y tecnología para convertirnos en una fuerza sin rival en este continente, e incluso quizás en el mundo. Así como América, antes de la guerra, lideró la aviación militar, nosotros también lideraremos el avance en este campo en el futuro previsible."
 USC_aerial_recruitment_drive: "Campaña de reclutamiento aéreo"
 USC_aerial_recruitment_drive_desc: "Aunque tengamos una buena cantidad de aeronaves, aún necesitamos personal para operarlas. Ante la escasez de pilotos, iniciaremos una nueva campaña de reclutamiento para incorporar a más personas a nuestra Fuerza Aérea. Informaremos a la población que en la Fuerza Aérea pueden encontrar buenas oportunidades profesionales, salarios atractivos y, lo más importante, el cumplimiento de sus deberes patrióticos. Esperamos que esta nueva campaña de reclutamiento atraiga a muchos americanos dedicados, dispuestos a volar y luchar por el bien de su nación."
 USC_bolster_the_national_guard: "Reforzar la Guardia Nacional"
 USC_bolster_the_national_guard_desc: "La Guardia Nacional de este país ha demostrado a lo largo de la historia americana ser una fuerza capaz de defender la paz y la tranquilidad nacionales. En estos tiempos turbulentos en los que nos encontramos, donde la guerra, la inestabilidad civil, los disturbios, la delincuencia y otros actos de terrorismo interno sacuden a toda nuestra sociedad, la Guardia Nacional puede servir como otra fuerza eficaz para asegurar el orden. Comenzaremos a invertir más personal, fondos, entrenamiento y equipo en nuestras unidades de la Guardia Nacional, tanto para combatir en el frente como para asegurar el orden en el país. Con una Guardia Nacional fortalecida, podemos considerar el terror y la anarquía que han azotado recientemente a la sociedad americana como algo del pasado."
 USC_maga_protectors: "Protectores MAGA"
 USC_maga_protectors_desc: "Necesitamos que nuestros patriotas... vigilen a los votantes ilegales..."
 USC_empower_the_executive_branch: "Empoderar al Ejecutivo"
 USC_empower_the_executive_branch_desc: "Durante muchos años, el poder ejecutivo estuvo eclipsado por el Estado profundo. Le quitaban privilegios, lo convertían en una marioneta, en un payaso público que decía lo que escribía para poder gobernar tras bambalinas.\n\nEs hora de poner fin a esto. En los momentos más difíciles de nuestro país, fueron el presidente y el poder ejecutivo quienes tomaron las decisiones más difíciles, pero también las más necesarias, que nos permitieron superar cualquier crisis hasta la fecha. Esta presidencia no estuvo exenta de desafíos... pero tampoco de gloria y heroísmo. Y creo que muchas de las personas que trabajan a mi lado ahora mismo son héroes...\n\nAmérica nos ha dado un mandato poderoso y sin precedentes para generar un cambio en este país. Y sé que podemos brindarle el liderazgo necesario. ¡No flaquearé hasta que logremos una América fuerte, hermosa y segura para las generaciones venideras!"
 USC_realign_the_congress: "Realinear al Congreso"
 USC_realign_the_congress_desc: "El Congreso... saben que nunca nos salimos con la nuestra con el Congreso, nunca quisieron aprobar nuestra legislación sin causar problemas, sin todos estos escándalos. Las cosas podrían haber sido mucho más fáciles; de hecho, tal vez no estaríamos pasando por esta cosita de la \"Guerra Civil\"...\n\nPero ahora, por suerte, hemos logrado drenar el Pantano. Ahora la gente... que es gente de verdad, que es un verdadero patriota... por fin puede alzar la cabeza y trabajar de verdad por su país.\n\nConozco a mucha gente excelente en el Congreso. Tenemos a Mike Johnson, que está haciendo un trabajo magnífico como presidente de la Cámara... Matt Gaetz, por supuesto, un tipo maravilloso, un verdadero patriota, muy leal a su país... Necesitamos más gente como ellos.\n\nAhora bien, este es un Congreso con el que puedo llegar a un acuerdo, sin duda. Son lo suficientemente inteligentes como para no rechazar ese acuerdo, especialmente durante las dificultades que atraviesa nuestro país."
 USC_enact_wartime_austerity: "Austeridad bélica"
 USC_enact_wartime_austerity_desc: "Un área que esta guerra ha generado mucha tensión y que no se discute tanto es el presupuesto de este gobierno. Se están desviando muchos fondos al esfuerzo bélico, lo que nos deja con muy poco margen para gastar en otras áreas. Para evitar que el gasto y la deuda de este gobierno se descontrolen, implementaremos medidas de austeridad financiera propias de la guerra. El gasto en diversos programas considerados no esenciales se reducirá drásticamente, junto con la implementación de estrictos límites de gasto generalizados. Aunque estos cambios sin duda causarán descontento e ira en algunos, son absolutamente necesarios si queremos ganar esta guerra y mantener nuestras finanzas en una situación sólida."
 USC_a_list_weaponry_agreements: "Armamentos de 1ª clase"
 USC_a_list_weaponry_agreements_desc: "Si algo hemos aprendido de este conflicto es que la guerra moderna no se puede ganar con armas anticuadas y simplistas. Solo podremos asegurar la victoria si contamos con los sistemas de armas más avanzados y modernos disponibles en el mercado. Necesitamos armas con precisión milimétrica, altamente eficientes y con una sofisticación tecnológica inigualable. Conscientes de esto, contactaremos de inmediato con nuestros principales contratistas de defensa para asegurar la fabricación de los sistemas de armas más avanzados que puedan fabricar. Una vez que hayamos cerrado los acuerdos para nuevos contratos, nuestros enemigos quedarán atónitos ante la eficiencia de combate de nuestro armamento militar."
 USC_support_wartime_entrepreneurs: "Apoyar a empresarios bélicos"
 USC_support_wartime_entrepreneurs_desc: "A diferencia de muchas otras naciones, gran parte de nuestra industria militar está dirigida por empresas privadas y empresarios. Muchos de estos empresarios que dirigen estas empresas se juegan mucho al invertir en nuestras fuerzas armadas en tiempos turbulentos como estos. Para que sigan operando y nos suministren armas, les brindaremos una generosa asistencia financiera y material. Ya sea mediante inversión directa en efectivo, subvenciones para nuevo equipo o mejores condiciones con nuevos contratos, les facilitaremos la vida para que puedan facilitar la conducción de la guerra."
 USC_harness_the_military_industrial_complex: "Aprovechar el MIC"
 USC_harness_the_military_industrial_complex_desc: "El complejo militar-industrial americano es una fuerza productiva sin igual. Ninguna otra nación puede compararse con la capacidad industrial y la calidad que alcanzan las empresas americanas. Aunque no poseemos toda la industria militar americana previa a la guerra, aprovecharemos al máximo todo lo que tenemos. Organizaremos y dirigiremos nuestro complejo militar-industrial para que produzca al máximo con la máxima calidad y eficiencia. La victoria será segura cuando despleguemos todo el potencial de la capacidad productiva de nuestra industria."
 USC_lockheed_martin_contracts: "Contratos con Lockheed Martin"
 USC_lockheed_martin_contracts_desc: "Lockheed Martin es uno de los principales fabricantes de aeronaves de América y ha cosechado un gran éxito con sus productos, tanto con el gobierno de antes de la guerra como con muchas otras naciones del mundo. Conscientes de ello, nos pondremos en contacto con ellos y los contrataremos para iniciar la producción de nuevas aeronaves para nuestra fuerza aérea. Con su talento y sus máquinas a nuestra disposición, finalmente contaremos con los medios efectivos para lograr el dominio total del espacio aéreo americano."
 USC_gdls_contracts: "Contratos con GDLS"
 USC_gdls_contracts_desc: "General Dynamics Land Systems es uno de los principales fabricantes de vehículos blindados de América y ha cosechado un gran éxito con sus productos, tanto con el gobierno de preguerra como con muchas otras naciones del mundo. Conscientes de ello, nos pondremos en contacto con ellos y los contrataremos para iniciar la producción de nuevos vehículos terrestres para nuestro ejército. Con su talento y maquinaria a nuestra disposición, finalmente dotaremos a nuestro ejército de la capacidad para dominar cualquier combate terrestre con una eficiencia y precisión letales."
 USC_stop_tyrannical_regulation: "Frenar la regulación"
 USC_stop_tyrannical_regulation_desc: "La regulación gubernamental de la economía ha demostrado ser uno de los mayores obstáculos para el crecimiento económico y la libertad en este país. No permitiremos que la regulación intrusiva estrangule aún más la vida de los americanos y sus intereses privados. Las regulaciones más obstructivas y demás trámites burocráticos serán derogados rápidamente, ya sea mediante decretos ejecutivos o nueva legislación. Una vez que hayamos desmantelado todas estas regulaciones y leyes asfixiantes, nuestra economía finalmente tendrá la oportunidad de expandirse y crecer sin interferencias."
 USC_inflation_annihilation: "Aniquilar la inflación"
 USC_inflation_annihilation_desc: "Uno de los problemas económicos más preocupantes que ha aquejado a este país en los últimos años es la inflación. La depreciación del dólar está afectando tanto la salud general de la economía como la vida cotidiana de los americanos trabajadores. Incontables ejemplos históricos demuestran lo destructiva que puede ser la inflación para la salud económica de una nación. No permitiremos que la inflación arruine las finanzas de los ciudadanos americanos ni sus negocios. Las tasas de interés que otorga nuestro gobierno se ajustarán y supervisarán cuidadosamente, junto con controles más estrictos sobre la emisión de nueva moneda. Con una atención y un control rigurosos, la inflación será cosa del pasado."
 USC_privatize_public_sector_services: "Privatizar servicios públicos"
 USC_privatize_public_sector_services_desc: "Nuestro gobierno gasta mucho dinero en la gestión y el mantenimiento de diversos servicios y empresas que generan un despilfarro. Todo esto consume una gran cantidad de personal, dinero y energía de nuestro gobierno. En consonancia con nuestro compromiso de reducir la influencia del Estado en la economía, muchos de estos servicios se privatizarán de inmediato. Cuando finalmente vendamos estos servicios y empresas a entidades privadas, se podrán asignar más dinero y recursos a fines más útiles dentro de nuestro gobierno."
 USC_constitutionalize_capitalism: "Constitucionalizar el capitalismo"
 USC_constitutionalize_capitalism_desc: "La constitución de nuestra nación, un documento político que consagra la moderación gubernamental, las libertades personales y la separación de poderes, también debe servir como guía en nuestra economía. Los principios consagrados en nuestro documento fundacional se promoverán e impulsarán concienzudamente en todos los segmentos del sector privado de nuestra nación. No solo abogaremos por esto, sino que también promulgaremos nuevas regulaciones y leyes que plasmarán en ley nuestro esfuerzo por constitucionalizar la economía de este país. Haremos que todos América adopte las filosofías fundacionales de nuestra singular herencia política."
 USC_ensure_congressional_transparency: "Transparencia legislativa"
 USC_ensure_congressional_transparency_desc: "En nuestro esfuerzo por reducir la intrusión del poder estatal, el primer paso importante es mejorar la transparencia de nuestras instituciones gubernamentales, y el primer paso será el Congreso. Cuando el Congreso es transparente con la ciudadanía en sus actividades, se genera confianza y cualquier intento de los políticos de acumular poder injustamente queda expuesto. Haremos públicos de inmediato diversos procedimientos del Congreso y publicaremos las actividades clave que se llevaron a cabo clandestinamente. Nos tomaremos muy en serio este mantra: un gobierno que no puede ocultar nada, no puede oprimir nada."
 USC_begin_transformation: "Iniciar la transformación"
 USC_begin_transformation_desc: "Ahora que hemos establecido nuestra intención de reformar la dinámica de poder entre el Gobierno y la ciudadanía, es hora de iniciar la transición hacia ese punto. Nuestro marco político y legal se reformará de inmediato en preparación para esta transición planificada. Ciertas facultades, normas y regulaciones que a menudo ejerce el Gobierno federal se flexibilizarán y se transferirán a los niveles inferiores de autoridad gubernamental, como los estados o los Gobiernos locales. También habrá una reducción general del tamaño de ciertas agencias federales y de su alcance de intervención y regulación. Con estas nuevas medidas, nos acercaremos a nuestro objetivo de reducir la intervención gubernamental, desproporcionada y antidemocrática, en la sociedad americana."
 USC_shark_tank_initiative: "Iniciativa \"Shark Tank\""
 USC_shark_tank_initiative_desc: "En el capitalismo, solo las mejores empresas con los mejores productos y servicios sobreviven, mientras que las que no pueden, quiebran. Esta es una verdad que adoptaremos plenamente. En nuestro plan para reconstruir y hacer crecer la economía, adoptaremos un enfoque innovador para elegir con qué empresas trabajar. Examinaremos qué empresas ofrecen los mejores productos, servicios, ahorro de costos y eficiencia, con estándares más nuevos y mucho más estrictos. Competirán con otras empresas en la contienda, y las que superen a todas las demás serán seleccionadas para nuevos proyectos o nuevas inversiones. Con esta nueva iniciativa, nos quedaremos solo con lo mejor de lo mejor para nuestros futuros socios comerciales en la construcción de una nueva América."
 USC_trimming_the_bureaucratic_fat: "Recortar la grasa burócrata"
 USC_trimming_the_bureaucratic_fat_desc: "EE.UU. es conocido por su increíble nivel de burocracia y despilfarro. Se han perdido millones de dólares y horas de trabajo en la burocracia y la estructuración bizantina de este gobierno. Sin embargo, ahora es el momento de acabar con este despilfarro y convertir nuestro gobierno en una máquina eficiente de productividad. Iniciaremos de inmediato una reestructuración integral despidiendo a los burócratas que trabajan en puestos inútiles, reduciendo los presupuestos para programas derrochadores, reduciendo el tamaño de las agencias sobrecargadas e implementando evaluaciones estrictas de todas las solicitudes de presupuesto por programas pendientes. ¡La era del gobierno derrochador y despilfarrador termina ya!"
 USC_state_power_reborn: "Poder estatal renacido"
 USC_state_power_reborn_desc: "Los estados siempre han sido un componente importante de la descentralización del poder en América. Debemos consolidar nuestro compromiso con la descentralización otorgando nuevas facultades a los Gobiernos estatales. Los estados recibirán una nueva autoridad en sus propios asuntos, mientras que la jurisdicción del gobierno federal sobre ellos se reducirá considerablemente. Con este nuevo acuerdo, los estados finalmente obtendrán la autonomía que tanto necesitan y un respiro de un gobierno federal previamente intrusivo."
 USC_equality_in_taxation: "Igualdad impositiva"
 USC_equality_in_taxation_desc: "La tributación siempre ha sido un tema extremadamente problemático en la lucha entre el Gobierno y el ciudadano. El Gobierno de antes de la guerra implementó un sistema tributario injusto y discriminatorio que perjudicaba a los americanos adinerados simplemente por su buena situación económica. Esto cesará una vez que eliminemos cualquier diferencia significativa en las tasas impositivas según los ingresos o el patrimonio. Todos los ciudadanos de este país pagarán impuestos por igual, independientemente de su posición en la escala económica."
 USC_patriotism_in_dissent: "Patriotismo en disidencia"
 USC_patriotism_in_dissent_desc: "Por mucho que nuestros enemigos repitan como locos que somos una fuerza institucionalizada todopoderosa y que todo lo controla, es simplemente una fantasía descabellada. Los devotos patriotas de este país han pasado los últimos años luchando constantemente contra traidores, oportunistas del establishment y otros elementos hostiles que se han atrincherado en nuestra nación. El patriotismo americano es un patriotismo en disidencia contra un statu quo que odia a este país. Lo enfatizaremos donde y ante quien podamos. Todos conocerán las luchas que los patriotas y la causa por América han atravesado y están atravesando ahora."
 USC_empower_the_agents_of_change: "Empoderar al cambio"
 USC_empower_the_agents_of_change_desc: "Hay muchos ciudadanos americanos leales, tanto dentro como fuera de nuestro gobierno, que han dedicado mucho tiempo a luchar por este país y a intentar convertirlo en un lugar mejor para sus compatriotas. Debemos reconocer los esfuerzos de estos patriotas y reconocerlos, además de escuchar sus inquietudes para mejorar esta nación. Solo empoderando a estos agentes de cambio estaremos un paso más cerca de lograr nuestro objetivo de hacer a América grande otra vez."
 USC_end_wartime_censorship: "Censura bélica"
 USC_end_wartime_censorship_desc: "Las duras condiciones de la guerra nos obligaron inicialmente a reprimir a los medios de información que podían socavar la unidad nacional. Sin embargo, ahora que las condiciones han cambiado, podemos derogar con confianza las leyes y regulaciones de censura de la época de la guerra. Los ciudadanos y los medios de comunicación tendrán ahora mucha más libertad para informar y decir lo que quieran sin temor a sanciones. Después de todo, la libertad de expresión es un derecho constitucional, y sería vergonzoso mantener tales restricciones indefinidamente."
 USC_land_of_the_free: "Tierra de los libres"
 USC_land_of_the_free_desc: "América es una nación que, desde sus inicios, se dedicó a la búsqueda de la libertad. No fuimos fundados por monarquías autocráticas ni por una nobleza terrateniente; fuimos fundados por hombres que exigían la libertad de una tiranía intolerable. Este es un legado que ha perdurado a lo largo de los más de 350 años de historia de América como nación, un legado que aspiramos a mantener en todo su esplendor. Hemos recorrido un largo camino en nuestra lucha por la salvación de este país y, en medio del dolor y los reveses, mantenemos una promesa sagrada muy presente. Así como nuestros predecesores lucharon con ahínco para mantener la libertad de los americanos, nosotros también lucharemos con ahínco para mantener la libertad de este país."
 USC_smash_the_import_economy: "Acabar con la economía importadora"
 USC_smash_the_import_economy_desc: "América es una nación inmensa con una gran población, espacio y recursos naturales; una ventaja que garantizó el ascenso de nuestro país a la prominencia internacional hace más de un siglo. Sin embargo, la globalización y las élites liberales costeras traidoras han desperdiciado todo esto al encadenar la economía de EE.UU. a las importaciones de numerosos países extranjeros. Esto ya no se tolerará. Implantaremos nuevos aranceles y regulaciones que disuadirán a nuestra economía de importar productos que se pueden fabricar fácilmente aquí. Una vez que las empresas americanas dejen de preocuparse por ser expulsadas del mercado por extranjeros, podrán centrarse en desarrollar sus negocios y devolver nuestra economía a lo que debe ser: completamente americana."
 USC_bring_our_jobs_home: "Recuperar nuestros trabajos"
 USC_bring_our_jobs_home_desc: "Una trágica víctima de la globalización ha sido la pérdida de numerosos empleos americanos, muchos de ellos en el sector manufacturero, a manos de competidores extranjeros. Ahora es el momento de rectificar esta tragedia económica trayendo estos empleos perdidos de vuelta a EE.UU. Nos pondremos en contacto con las grandes empresas que emplean a personas en áreas como la manufactura para que restablezcan o expandan sus operaciones en EE.UU. Ya sea mediante subsidios financieros, regulaciones más flexibles o acuerdos especiales, lograremos que estas empresas aumenten rápidamente el empleo en sectores de la economía profundamente afectados por la deslocalización. Los ciudadanos de esta nación recuperarán sus empleos; nos aseguraremos de ello."
 USC_the_harvest_of_progress: "Cosecha del progreso"
 USC_the_harvest_of_progress_desc: "Este país, durante gran parte de su historia, ha tenido a la mayor parte de su población trabajando y viviendo de la agricultura. Desde los primeros tiempos de los colonos hasta finales del siglo pasado, millones de americanos trabajaron el campo tanto para obtener ganancias como para su sustento. En nuestro plan para revitalizar la economía de EE.UU., nos centraremos en los millones de americanos que trabajan en la agricultura o viven en comunidades rurales que la apoyan. El futuro no se construirá sobre un pequeño grupo de empresas en unas pocas grandes ciudades, sino sobre la reinvención y reconstrucción de la América rural y las formas de vida que la sustentan."
 USC_bringing_back_america: "Recuperando América"
 USC_bringing_back_america_desc: "Durante gran parte de la historia de este país, todos conocimos a esta nación como un lugar donde abundaba de todo. Había abundancia de comida, vivienda, empleo y oportunidades de todo tipo. Esta guerra arruinó gran parte de esas perspectivas, pero pronto lo recuperaremos todo; recuperaremos a América. Mediante nuestros esfuerzos por reconstruir y reinvertir en nuestra economía y en los principales actores clave para su desarrollo, recuperaremos gran parte de la sensación de seguridad económica y social que hizo a América tan especial y próspera."
 USC_powerhouse_of_production: "Potencia de producción"
 USC_powerhouse_of_production_desc: "Para reconstruir y hacer crecer la economía americana, debemos recurrir a una fortaleza fundamental que este país aún conserva: nuestra industria. Nuestro gobierno comenzará a otorgar asistencia financiera para nuevos proyectos y a colaborar con los grandes conglomerados industriales existentes para expandir nuestra base industrial civil. Se abrirán nuevas fábricas, más personas encontrarán trabajo en el sector industrial de esta economía y nuestra producción industrial bruta aumentará significativamente. América volverá a ser una potencia de la producción industrial que el mundo envidiará."
 USC_economic_adrenaline_shots: "Adrenalina económica"
 USC_economic_adrenaline_shots_desc: "Una de las maneras más fáciles y directas de impulsar nuestra economía es simplemente invertir dinero en ella. Analizaremos empresas prometedoras e importantes que operan en este país y les brindaremos asistencia financiera directa. Con este dinero, cubrirán pérdidas, expandirán la producción y contratarán a más personas, lo que a su vez impulsará la economía. No es una estrategia compleja, pero sabemos que tendrá beneficios macroeconómicos inmediatamente perceptibles."
 USC_no_mercy_for_traitors: "Al traidor, ni justicia"
 USC_no_mercy_for_traitors_desc: "En nuestra lucha por América, nos hemos topado con los grupos e individuos más atroces y viles que se atreven a llamarse \"americanos\". Han traicionado a esta nación con sus violentos ataques, que han matado a tantos compatriotas inocentes y han destruido gran parte de esta nación. Ahora que muchas de estas personas despreciables están en nuestras manos, les infligiremos un castigo rápido y directo: muerte y destrucción."
 USC_rebuild_in_our_image: "En nuestra imagen"
 USC_rebuild_in_our_image_desc: "Al reconstruir este país tras la devastación de la guerra, lo haremos también a imagen de una nueva América. Eliminaremos los fracasos del gobierno y la sociedad de antes de la guerra y, sobre ellos, construiremos una nueva nación que no repetirá los mismos fracasos. Mucho cambiará, desde la cima de nuestro gobierno hasta la base, en lo que afecta al americano promedio a diario. Todas las instituciones, políticas, proyectos y demás, privados y públicos, fracasados y construidos sobre ideas fallidas antes de la guerra, serán reemplazados por una nueva y vigorosa visión de esta nación: nuestra visión."
 USC_promote_patriotic_media: "Promover medios patrióticos"
 USC_promote_patriotic_media_desc: "Es una lástima que varios de los medios americanos estén en las manos de los traicioneros socialistas y otros elementos liberales que nos calumnian a donde sea que vayamos. Sin embargo, ellos no son los únicos que tienen acceso a herramientas que le permitan difundir una ideología. Le tenderemos las manos a aquellos medios leales y darles una mayor financiación y promoción pública. Una vez que tengamos unos medios que apoyen firmemente a nuestra causa y esfuerzos, podremos esperar un apoyo mucho mayor de la población común."
 USC_home_of_the_brave: "Hogar de los valientes"
 USC_home_of_the_brave_desc: "A diferencia de otras naciones, nacimos en medio de grandes luchas y conflictos; una lucha por la libertad y la independencia. Se necesitó mucha valentía y coraje para que el americano promedio se enfrentara al Imperio británico, y se necesitó el mismo coraje para que América continuara en el difícil camino que tenía por delante. A lo largo de nuestra historia, hemos enfrentado desafío tras desafío y hemos salido airosos. Se necesitó valentía para que los americanos lucharan contra los británicos en 1812, contra los alemanes en las guerras mundiales y para derrotar a los comunistas en la Guerra Fría. Nosotros también hemos demostrado coraje y valentía en nuestra lucha para mantener nuestra libertad y nuestra nación fuera del alcance de nuestros enemigos. Así como los valientes fundaron América, los valientes americanos de hoy han luchado con ahínco para mantener esta gran nación formada solo por los más valientes."
 USC_build_the_freedom_cities: "Freedom Cities"
 USC_build_the_freedom_cities_desc: "En nuestra reconstrucción de América, finalmente podremos reconstruir metrópolis urbanas enteras basándonos en nuestra visión para esta nación. Estas nuevas ciudades serán totalmente irreconocibles en comparación con las antiguas y fallidas ciudades construidas y dirigidas por las élites liberales y socialistas costeras. Estas \"Freedom Cities\" se construirán según nuestra visión económica, social y política de cómo debe ser una verdadera ciudad americana. Representarán lo mejor y más bello no solo de nuestros valores y logros, sino también de los valores y logros de América."
 USC_rural_renaissance: "Renacimiento rural"
 USC_rural_renaissance_desc: "Por demasiado tiempo, las comunidades rurales han estado relegadas y dejadas a su suerte, pero esto ya no será así. Bajo nuestra dirección no solo financiaremos las regiones rurales de este país, si no que las convertiremos en las cartas de presentación de nuestra gran nación. Tanto los estados como el gobierno federal empezarán a realizar grandes inversiones y proyectos de deconstrucción con el fin de hacer a la América rural grande otra vez. Tendrás numerosos trabajos, buenas casas para vivir, comunidades seguras y, sobre todo, estarán orgullosos del lugar del que viven. Volverán a ser comunidades donde el sueño americano floreció y prosperó."
 USC_kickstart_the_automotive_industry: "Impulsar la industria automotriz"
 USC_kickstart_the_automotive_industry_desc: "La industria automovilística americana llegó a ser un gigante multibillonario ante el cual las naciones del mundo sufrían para rivalizar. Desafortunadamente, las últimas décadas han castigado al que alguna vez fue un gran y orgulloso sector de la economía de este país. Sin embargo, no permitiremos que esta industria decaiga aún más. Nuestro gobierno tenderá la mano y colaborará de forma inmediata a los principales fabricantes automovilísticos remanentes para revivir y expandir la producción. Les daremos garantías, programas de formación laboral, nuevos préstamos para equipamiento, y contratos favorables para aquellas compañías automovilísticas para que expandan sus operaciones. Pronto veremos a la industria automotriz de este país volver a lo que debe ser; insuperable."
 USC_operation_steel_forge: "Operación Steel Forge"
 USC_operation_steel_forge_desc: "La industria siderúrgica de nuestra nación solía ser una de las mejores del mundo, con una capacidad industrial que desafortunadamente se desmoronó en las últimas décadas. Aún si tales capacidades han decaído, no perderemos el tiempo para revivir y expandir nuestra capacidad actual de producción de acero. Nuestras empresas siderúrgicas ya establecidas recibirán nuevos préstamos, inversiones y promoción para que puedan expandir sus operaciones actuales y aumentar la producción de acero. Expandir nuestras empresas siderúrgicas nos dará una gran base sobre la cual podremos continuar la expansión de la industria civil y militar."
 USC_beautify_the_nation: "Embellecer la nación"
 USC_beautify_the_nation_desc: "Esta guerra ha hecho más que solo destruir nuestra forma de vida, también ha destruido varios de los paisajes y parques naturales que hacían tan bonito a nuestro país. Empezaremos inmediatamente un programa de \"embellecimiento\" nacional que incluirá la reconstrucción de nuestros monumentos, parques y otros lugares importantes que hacían a varias zonas de nuestra nación lugares maravillosos para vivir. También iniciaremos programas que eliminen mucha de la decadencia urbana que son desagradables a la vista de los grandes centros de población. América pronto será una una nación tanto de gran belleza como de poder."
 USC_redefine_martial_law: "Redefinir la ley marcial"
 USC_redefine_martial_law_desc: "La crisis actual que es esta guerra nos ha obligado a instaurar la ley marcial. Sin embargo, nuestra legislación actual se queda corta respecto a lo que necesitamos para asegurar el orden de verdad. Redefiniremos sin demora los poderes y el alcance de la ley marcial para que nos de más autoridad para perseguir a nuestros enemigos y otros elementos traidores. Cuando nuestra policía y fuerzas se seguridad reciban estos nuevos poderes expandidos, los traidores y quintacolumnistas que se esconden entre nosotros pronto no tendrán ningún lugar para esconderse."
 USC_refreshing_the_tree_of_liberty: "Refrescar el árbol"
 USC_refreshing_the_tree_of_liberty_desc: "La victoria de la democracia no se puede lograr sin derramar la sangre de los tiranos que tratan de destruirla. Esta es una lección que se ha impartido muchas veces a lo largo de la historia americana y es una lección que aceptaremos con dedicación. Los traidores domésticos, enemigos y quintacolumnistas que hemos capturado recibirán un castigo rápido y terrible. Algunas figuras recibirán una sentencia más leve, pero muchos recibirán la pena capital por sus crímenes; la muerte. Sus muertes servirán como el recordatorio definitivo de que nunca se debe jugar con la libertad."
 USC_saviour_of_the_republic: "Salvador de la república"
 USC_saviour_of_the_republic_desc: "El presidente Trump ha trabajado incansablemente y con valentía en esta lucha para salvar a nuestra república de nuestros enemigos. Mientras que muchos otros destacados políticos se escondieron con miedo o desertaron al bando del oportunismo y la traición, él se mantuvo firme para defender la nación. Su liderazgo y orientación en esta lucha para la salvación de la república deben permanecer como un punto de unión para todos los patriotas leales de este país."
 USC_restructure_the_party_system: "Reestructurar el sistema político"
 USC_restructure_the_party_system_desc: "El viejo sistema bipartidista de esta nación es una reliquia de la que nos tenemos que deshacer rápidamente. En su lugar habrá un nuevo y reestructurado sistema partidista que eliminará las políticas estatales del viejo sistema. Nuestro partido permanecerá en una posición dominante, pero permitiremos la formación de nuevos partidos políticos y organizaciones dentro de nuestro gobierno. Se podrán formar nuevos partidos sin preocuparse de que los aplaste el Partido Demócrata o de que el sistema les haga imposible obtener representación en el congreso."
 USC_revival_of_nationwide_faith: "Renacer nacional de la fe"
 USC_revival_of_nationwide_faith_desc: "América fue una nación fundada no en un ateísmo carente de moral, si no que fue fundada en la fe judeo-cristiana y su moral. En los últimos 50 años se ha visto un considerable descenso tanto en la religiosidad como en la asistencia a las iglesias, pero no permitiremos que decaiga aún más. Nos reuniremos con los principales líderes espirituales y organizaremos un renacimiento de la religión en la vida pública americana. Nuestro programas políticos deben hacer énfasis en nuestra herencia cristiana y cómo de importante es la fe religiosa para todo hombre, mujer y niño. Después de todo, somos una nación, bajo Dios."
 USC_prune_the_republican_party: "Podar el Partido"
 USC_prune_the_republican_party_desc: "El Partido Republicano ha demostrado ser un partido plenamente comprometido con el liderazgo del presidente Trump y la lucha por recuperar esta nación de sus enemigos. Sin embargo, muchos miembros del partido han causado problemas repetidamente e incluso han saboteado actividades, ya sea por beneficio personal o por motivos ideológicos. Todos estos miembros que solo han creado problemas serán tratados de inmediato, ya sea mediante la degradación o el despido de sus cargos dentro del partido. No hay cabida para oportunistas ni alborotadores que se interpongan en el camino de la voluntad de esta nación y su presidente."
 USC_for_faith_and_flag: "Por la fe y la bandera"
 USC_for_faith_and_flag_desc: "Nuestro servicio y nuestros logros por el bien de esta nación han sido más que simples puntos políticos; son mucho más que eso. Nuestro compromiso es con el ideal de esta nación, nuestro patriotismo y los valores morales de nuestra fe, que hacen que todo valga la pena. Los verdaderos patriotas de este país se dedican no solo a ser patriotas de su país, sino también a nuestra fe cristiana común, que mantuvo unido el tejido social de nuestra república; esto es lo que nos hace americanos. La fe y la bandera nos guian, y seguirán guiándonos hasta nuestro último aliento."
 USC_revive_the_american_spirit: "Revivir el espíriu americano"
 USC_revive_the_american_spirit_desc: "¿Qué hace a un americano ser americano? Mucho de eso se ha perdido en los últimos tiempos, pero aún recordamos el verdadero espíritu que hace a nuestro pueblo tan especial. El afán individualista por el éxito, el amor por la libertad, nuestros valores morales judeocristianos y nuestra desconfianza hacia el gobierno son algunos de los muchos valores americanos que debemos revivir e inculcar en la gente. Dondequiera que vayamos, tendremos presentes estos valores y los promoveremos siempre que sea posible; solo así estaremos seguros de haber preservado el espíritu de esta nación."
 USC_ban_the_dnc: "Prohibir al CND"
 USC_ban_the_dnc_desc: "El Comité Nacional Demócrata ha demostrado repetidamente ser una herramienta exclusiva de los elementos más traidores de este país. Los liberales y sus aliados socialistas han utilizado las instituciones del Partido Demócrata para atacarnos y sabotearnos a cada paso. No toleraremos esto más. Es hora de ilegalizar el CND y reprimir sus siniestras actividades."
 USC_reconstruct_the_intelligence_apparatus: "Reconstruir la inteligencia"
 USC_reconstruct_the_intelligence_apparatus_desc: "Nuestras agencias de inteligencia han demostrado ser muy útiles en la guerra hasta ahora, pero ahora debemos reconstruirlas para una nueva tarea. Existen numerosos actores y grupos políticos que representan una amenaza para nuestro presidente y la unidad de nuestro partido, y es ahí donde nuestras agencias de inteligencia intervendrán. Utilizaremos sus habilidades, herramientas y poderes para monitorear o impedir que estos grupos potencialmente peligrosos intenten ganar demasiada influencia en nuestro gobierno. Así como nuestras agencias han espiado a nuestros enemigos en el campo de batalla, ahora lo harán con los enemigos que actúan dentro de las oficinas de nuestro gobierno o en nuestras calles."
 USC_one_party_for_one_america: "Un Partido, una América"
 USC_one_party_for_one_america_desc: "El antiguo sistema bipartidista, o el sistema multipartidista que algunos han propuesto, no reconoció la realidad de nuestro nuevo entorno político. Nuestro partido fue el único que se sacrificó y dedicó tanto a salvar a este país de sus enemigos, por lo que, naturalmente, debería tener la última palabra al dirigir este gobierno. Nuestro partido será el único partido que importe políticamente en este país, y punto. Solo bajo nuestro gobierno América triunfará, no bajo el suyo."
 USC_crush_the_fake_news_mob: "Aplastar las fake news"
 USC_crush_the_fake_news_mob_desc: "Los medios de comunicación liberales y socialistas de este país solo han servido para difundir división, conflicto y las peores noticias falsas. Ahora pondremos fin a sus absurdas operaciones para difundir calumnias sobre nuestro gran país. Nuestras fuerzas del orden intervendrán donde puedan y clausurarán estos medios traidores y difamatorios. Además, movilizaremos a nuestros propios medios y simpatizantes para que organicen sus propios ataques públicos contra la turba de las noticias falsas. No cejaremos en nuestra lucha para impedir que las noticias falsas contaminen a nuestra gran nación y a su gente."
 USC_the_trump_amendments: "Las Enmiendas Trump"
 USC_the_trump_amendments_desc: "En nuestro esfuerzo por reestructurar el Gobierno americano, nos hemos topado con algunos obstáculos importantes, principalmente ciertas leyes y regulaciones. El presidente Trump ya ha redactado diversas enmiendas constitucionales que finalmente nos otorgarán las facultades necesarias para liderar adecuadamente a este país hacia el gran futuro que hemos planeado. Estas enmiendas abarcan desde la eliminación del límite de dos mandatos hasta la eliminación de las restricciones al poder ejecutivo. Nuestro gran plan para hacer a América grande otra vez ya no se verá obstaculizado por leyes y regulaciones obsoletas."
 USC_protector_of_american_life: "Protector de la vida americana"
 USC_protector_of_american_life_desc: "Nuestros enemigos han trabajado incansablemente no solo para derrotarnos en el campo de batalla, sino para exterminar la mismísima forma de vida de América. El presidente Trump y su partido han hecho muchísimo para defender el estilo de vida del ciudadano común frente a una oposición tan atroz. Su liderazgo y guía en la lucha por salvar la vida, la libertad y la felicidad de todos los americanos deben ser un importante punto de apoyo para todos los patriotas leales de este país."
 USC_remove_anti_american_leadership: "Eliminar liderazgo antiamericano"
 USC_remove_anti_american_leadership_desc: "Dentro de nuestro gobierno, hemos tenido la desgracia de encontrarnos con muchos políticos que han sembrado dudas y división en nuestra gran lucha por la salvación de esta nación. Su conducta sospechosa e incluso sus actividades abiertamente antiamericanas nos dejan con una sola opción: su destitución inmediata. Destituiremos de inmediato a estos políticos que nos han fallado no solo a nosotros, sino también a todo el país."
 USC_ensure_court_loyalty: "Asegurar lealtad judicial"
 USC_ensure_court_loyalty_desc: "La Corte Suprema de este país es una institución crucial para evaluar la constitucionalidad de las leyes aprobadas por nuestro gobierno. Ahora es fundamental asegurar su lealtad a nuestro partido y a nuestro presidente. Mediante nombramientos, destituciones e incluso algunas maquinaciones legales y políticas tras bambalinas, los jueces de la Corte Suprema se pondrán de nuestro lado. Nuestro esfuerzo por hacer a América grande otra vez no solo debe contar con el apoyo del partido o la presidencia, sino también con el de todos los poderes del gobierno."
 USC_find_order_in_chaos: "Orden en el caos"
 USC_find_order_in_chaos_desc: "En estos tiempos turbulentos de anarquía, terror y caos, debemos ser una fuerza de orden y paz cuando otros no han logrado garantizarlo. El presidente Trump y sus colegas han demostrado ser una de las pocas fuerzas en este país que han logrado restablecer el orden en una nación sumida en el caos. Nuestro gobierno debe hacer todo lo posible para demostrar a la gente que la paz y la tranquilidad son nuestros principales objetivos. A medida que triunfemos tanto en el campo de batalla como en el frente interno, podemos estar seguros de que cada vez más personas confiarán en la misión de nuestro presidente y gobierno."
 USC_patriotic_education: "Educación patriótica"
 USC_patriotic_education_desc: "Para garantizar que el patriotismo y la lealtad a esta nación no terminen con esta generación, debemos asegurarnos de que la juventud de este país aprenda estos ideales. Implementaremos nuevos cambios en el currículo de nuestras escuelas públicas para reflejar la importancia de aprender sobre el patriotismo. Desde preescolar hasta el final de la secundaria, los estudiantes deberán tomar clases sobre los valores de nuestro país, lo que significa ser patriota y los peligros de ideologías como el socialismo. Nuestra generación más joven ya no estará en las repugnantes manos de la propaganda y el antiamericanismo de nuestro enemigo, sino que se convertirá en los patriotas más devotos a quienes podemos confiar en dejarles el futuro."
 USC_the_cross_wrapped_in_the_flag: "Cruz envuelta en la bandera"
 USC_the_cross_wrapped_in_the_flag_desc: "Ser líder en este país requiere valores, valores que guían a un líder a tomar buenas decisiones para la nación y su pueblo. América es una república fundada en valores morales judeocristianos que contribuyeron a formar no solo nuestra sociedad, sino también nuestra política. Trabajaremos para inculcar en nuestros altos cargos de gobierno los principios de nuestra fe para que su fe represente la fe del pueblo de esta gran república."
 USC_crush_the_globalist_tyrants: "Aplastar la tiranía globalista"
 USC_crush_the_globalist_tyrants_desc: "Los burócratas liberales elitistas y sus aliados globalistas en ONG y otras organizaciones siniestras han trabajado día y noche para socavar la nación americana. Ahora que tenemos el control, es hora de frenar sus planes. Las organizaciones activas en Estados Unidos que repiten estas tonterías serán rápidamente criminalizadas y desmanteladas. Si son americanos, serán destituidos de sus cómodos puestos en esas organizaciones, y si son extranjeros, serán deportados. América valora su identidad e independencia; ¡estos idiotas internacionalistas pueden irse!"
 USC_defenders_of_american_values: "Defensores de valores americanos"
 USC_defenders_of_american_values_desc: "Esta batalla para salvar a este país no es solo una batalla con rifles y tanques, sino también con valores. Luchamos contra un enemigo que desea destruir los valores de este país y reemplazarlos con valores totalmente ajenos a todos nosotros. Los leales patriotas de este país, especialmente bajo la dirección del presidente Trump, han luchado con ahínco por defender los verdaderos valores americanos frente a los constantes ataques de los enemigos nacionales y extranjeros. Marcharemos hasta el final para defender los valores que han hecho de América lo que es mientras vivamos."
 USC_where_we_go_all: "¡Donde vamos todos!"
 USC_where_we_go_all_desc: "El presidente Trump y su partido han logrado mucho en la defensa de este país y en la consolidación del verdadero patriotismo en las esferas del poder. Su liderazgo, su valentía, su determinación y su carisma lo han distinguido como un político de la historia. Toda América encuentra gran inspiración en su presidencia. ¡Adonde él va, vamos todos!"
 USC_through_the_barrel_of_a_gun: "A punta de pistola"
 USC_through_the_barrel_of_a_gun_desc: "No toda la política se reduce a debates y discursos. A veces, si quieres conseguir algo, tienes que usar el símbolo universalmente conocido del poder sobre los demás: la fuerza. Esta guerra es solo una versión a gran escala de este principio. Hemos luchado muchísimo para llegar hasta aquí, y sin duda no cejaremos en nuestro inquebrantable deber de mantener a este país a salvo de sus enemigos. El presidente Trump lo comprendió desde el principio, ya que no dudó en llamar a sus compatriotas a participar en la lucha definitiva por este país. Incluso dijo una vez: \"¡No se puede recuperar un país con debilidad!\""

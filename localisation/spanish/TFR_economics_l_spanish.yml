 MONEY_TOOLTIP: "PIB nominal: [Get_GDP]\nPIB real: [Get_GDP_total]\n£inflation  Inflación: [?inflation_var|Y1%]\n§CLiquidez§!: §Y[?income_var|3] MM§!\n\nCambio de dinero: [?money_change_var|=+3] mil millones por mes\n------------\n§GIngresos§!: [?income_total_var|=+3] mil millones por mes\n------------\nImpuestos: [?total_tax_var|=+3] mil millones por mes\nExportaciones: [?resourceincome|=+3] mil millones por mes\nOtros ingresos: [?modifier@misc_income|=+3] mil millones por mes\nCrecimiento de los ingresos mensuales: [?modifier@income_growth_factor|=+%1]\n------------\n§RGastos§!: [?expenses_total_var|=-3] mil millones por mes\n------------\nGasto militar: [?military_spending_var|=-3] mil millones por mes\n- Mantenimiento del batallón: [?modifier@battalion_upkeep_factor|=-%1]\n- Mantenimiento de aeronaves: [?modifier@aircraft_upkeep_factor|=-%1]\n- Mantenimiento de buques: [?modifier@ship_upkeep_factor|=-%1]\nGasto social: [?social_spending_var|=-3] mil millones por mes\nPagos de deuda: [?debt_payment_var|=-3] mil millones por mes\nImportaciones: [?resourceexpenses|=-3] mil millones por mes\nOtros gastos: [?modifier@misc_expense|=-3] mil millones por mes\nCrecimiento de los gastos mensuales: [?modifier@expense_growth_factor|=-1%]\n------------\n§YModificadores:§!:\n------------\nTasa impositiva empresarial: [?business_tax_rate_var|Y%1]\nValor empresarial: [?modifier@business_value|Y3] mil millones por fábrica\nFactor del valor empresarial: [?modifier@business_value_factor|=+Y1%]\nTasa impositiva personal: [?personal_tax_rate_var|Y%1]\nValor personal: [?modifier@personal_value|Y3] mil millones por cada cien mil\nFactor del valor personal: [?modifier@personal_value_factor|=+1%]\nMantenimiento de fábrica militar: [?modifier@military_factory_upkeep|Y3] mil millones por fábrica militar\nFactor de mantenimiento de fábrica militar: [?modifier@military_factory_upkeep_factor|=-Y1%]\nMantenimiento de astillero: [?modifier@dockyard_upkeep|Y3] mil millones por astillero\nFactor de mantenimiento de astillero: [?modifier@dockyard_upkeep_factor|=-Y1%]\nGasto personal: [?modifier@personal_expense|Y3] por cada cien mil\nFactor de gasto personal: [?modifier@personal_expense_factor|=-1%]\nMonto del parque de oficinas: [?office_park_total_var|Y0]"
 MONEY_TOOLTIP_DESC: "El §GPIB§! real representa el §GPIB§! §Rmenos§! la tasa de £inflation  §Yinflación§! actual y es más representativo de la economía que el §GPIB§! nominal.\n\nEl §GPIB§! real es importante porque la §Ydeuda con respecto al PIB§! se ve afectada por esta variable. Esto se calcula sumando el §Yvalor empresarial§!, el §Yvalor personal§!, el §Ygasto social§!, el §Ygasto militar§! y las §Yexportaciones§!, mientras se §Rrestan§! las §Yimportaciones§!. Luego, se §Cmultiplica§! por 12 para simular cada mes del año. Finalmente, se resta la £inflation  §Yinflación§!.\n\nMedido en USD de 2020."
 MONEY_BUTTON_DESC: "§YAbrir acciones del PIB§!"
 DEBT_TOOLTIP: "Deuda: [Get_DEBT]\nRatio deuda/PIB: [?debt_gdp_var|Y1%]\nUmbral de deuda: [?dtg_threshold_var|Y1%]\nTasa de interés: [?interest_rate_var|Y2%][debt_effects_text]"
 DEBT_TOOLTIP_DESC: "La §Rdeuda§! representa los pasivos que posee el Gobierno nacional. Cuando tenemos un déficit mensual y no tenemos suficiente §Cliquidez§! para cubrir el costo, automáticamente solicitamos un préstamo para cubrir el costo y esto aumentará nuestra §Rdeuda§!.\n\nEs importante gestionar la §Rdeuda§! porque, si nuestro §Yratio deuda/PIB§! supera nuestro §Yumbral de deuda§!, sufriremos §Rmodificadores negativos§! debido a la menor confianza de los inversores, por lo que es mejor mantenerla por debajo de este nivel, ya que esto también §Gaumenta§! nuestra £stability_texticon  estabilidad.\n\nTambién es importante seguir la §Ytasa de interés§! porque determinará nuestros §Rpagos mensuales de deuda§! y se sumará a nuestros §Rgastos§!.\n\nMedido en USD de 2020."
 DEBT_BUTTON_DESC: "§YAbrir acciones de la deuda§!"
 MONEY_MAIN: "[?gdp_var] MM"
 MONEY_DEBT: "§YTienes [DEBT_SCRLOC] en deuda§!"
 DEBT_MONEY: "§R[?debttotal]§! MM"
 nominal_gdp: "PIB nominal: [Get_GDP]"
 nominal_gdp_tooltip: "Valor empresarial: [?modifier@business_value|Y3] mil millones por empresa\nFactor del valor empresarial: [?modifier@business_value_factor|=+1%]\nValor empresarial total: [?business_value_var|Y3] mil millones\nValor personal: [?modifier@personal_value|Y3] mil millones por cada cien mil\nFactor del valor personal: [?modifier@personal_value_factor|=+1%]\nValor personal total: [?personal_value_var|Y3] mil millones\nGasto miliar: [?military_spending_var|=-3] mil millones por mes\nGasto social: [?social_spending_var|=-3] mil millones por mes\nImportaciones: [?resourceexpenses|=-3] mil millones por mes\nOtros gastos: [?modifier@misc_expense|=-3] mil millones por mes\nCrecimiento de gastos mensuales: [?modifier@expense_growth_factor|=-1%]"
 nominal_gdp_tooltip_desc: "El §GPIB§! nominal representa el §Gproducto interno bruto§! nacional. Se calcula sumando el §Yvalor empresarial§!, el §Yvalor personal§!, el §Ygasto social§!, el §Ygasto militar§! y las §Yexportaciones§!, y §Rrestando§! las §Yimportaciones§!. Posteriormente, se §Cmultiplica§! por 12 para simular cada mes del año.\n\nMedido en USD de 2020."
 total_gdp: "PIB real: [Get_GDP_total]"
 total_gdp_tooltip: "Valor empresarial: [?modifier@business_value|Y3] mil millones por empresa\nFactor del valor empresarial: [?modifier@business_value_factor|=+1%]\nValor empresarial total: [?business_value_var|Y3] mil millones\nValor personal: [?modifier@personal_value|Y3] mil millones por cada cien mil\nFactor del valor personal: [?modifier@personal_value_factor|=+1%]\nValor personal total: [?personal_value_var|Y3] mil millones\nGasto miliar: [?military_spending_var|=-3] mil millones por mes\nGasto social: [?social_spending_var|=-3] mil millones por mes\nImportaciones: [?resourceexpenses|=-3] mil millones por mes\nOtros gastos: [?modifier@misc_expense|=-3] mil millones por mes\nCrecimiento de gastos mensuales: [?modifier@expense_growth_factor|=-1%]"
 total_gdp_tooltip_desc: "El §GPIB§! real representa el §GPIB§! §Rmenos§! la tasa de £inflation  §Yinflación§! actual y es más representativo de la economía que el §GPIB§! nominal.\n\nEl §GPIB§! real es importante porque el §Yratio deuda/PIB§! se ve afectada por esta variable. Se calcula sumando el §Yvalor empresarial§!, el §Yvalor personal§!, el §Ygasto social§!, el §Ygasto militar§! y las §Yexportaciones§!, y §Rrestando§! las §Yimportaciones§!. Posteriormente, se §Cmultiplica§! por 12 para simular cada mes del año y, finalmente, se resta la £inflation  §Yinflación§!.\n\nMedido en USD de 2020."
 total_debt: "Deuda: [Get_DEBT]"
 total_inflation: "Inflación: [?inflation_var|Y2%]"
 total_inflation_tooltip: "£inflation  Inflación mensual: [?inflation_monthly_var|=-2%][inflation_effects_text]"
 total_inflation_tooltip_desc: "La £inflation  inflación representa un §Raumento§! general de precios en la §Yeconomía nacional§!, lo que resulta en una §Rdisminución§! del poder adquisitivo y está causada por un §Raumento§! de la §Goferta monetaria§!. Esto se ve afectado por nuestra §Ytasa de interés§! y el §Raumento§! de la §Goferta monetaria§!. Una £inflation  inflación descontrolada generará §Rmodificadores negativos§! debido al §Raumento de las dificultades económicas§! de la población, por lo que es importante mantenerla en un nivel razonable. Sin embargo, la deflación también puede causar §Rmodificadores negativos§!."
 total_liquidity: "§CLiquidez§!: §G[?income_var|3]MM§!"
 total_liquidity_tooltip: "§CLiquidez§!: §Y[?income_var|3] MM§!\n\nCambio en §CLiquidez§!: [?money_change_var|=+3] mil millones por mes\n§GIngresos§!: [?income_total_var|=+3] mil millones por mes\n§RGastos§!: [?expenses_total_var|=-3] mil millones por mes"
 total_liquidity_tooltip_desc: "La §Cliquidez§! es el dinero que tenemos en reserva y que podemos gastar inmediatamente. Podemos usarla para tomar decisiones de compra, como §Yequipo§!. También la necesitamos para mantener nuestros §Ybatallones§!, §Yla Armada§!, §Yla Fuerza Aérea§!, la §Yindustria militar§! y el §Ygasto social§!.\n\nSi nuestra §Cliquidez§! cae por debajo de §Y0§!, se añadirá a nuestra §Rdeuda§!, que tendremos que liquidar posteriormente.\n\nMedido en USD de 2020."

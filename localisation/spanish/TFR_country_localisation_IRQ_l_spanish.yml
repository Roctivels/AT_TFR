l_spanish:
 iraq.1.t: "Resultados de las elecciones parlamentarias de Irak de 2021"
 iraq.1.d: "Estas elecciones han resultado en un cierre de gobierno sin la posibilidad de que los partidos puedan formar una coalición..."
 iraq.1.a: "No se como, pero la culpa es de Irán."
 iraq.2.t: "Fin del cierre de gobierno"
 iraq.2.d: "Los partidos han logrado formar una nueva coalición y un nuevo primer ministro y presidente han sido elegidos a costa de la salida de los Sadristas del parlamento. Sim embargo, no se puede decir que la crisis esté acabada."
 iraq.2.a: "Todo está bajo control..."
 iraq.3.t: "La Orden Naqshbandi toma el control de la Zona Kurda"
 iraq.3.d: "Llegan informes a montones desde Kurdistán detallando que un ataque reciente sobre un antiguo depósito del ejército estadounidense a unas pocas millas de la Base Aérea Harir, resultando en alrededor de 27 bajas y varios cientos de armas de infantería, MTBs y otros equipos de infantería siendo tomados por la resurgente Orden Naqshbandi. El líder Naqshbandi Izat Ibrahim al Duri se atribuye la responsabilidad del ataque y ha ordenado la yihad contra el gobierno de la Región de Kurdistán. Reportes de nuestros agentes del INIS detallan numerosas poblaciones alrededor de Harir como Khalifan, Kalakin y Soran siendo tomadas por milicias Naqshbandi y algun han alertado de que la Orden busca marchar pronto en Erbil."
 iraq.3.a: "Iniciar un despliegue militar en Erbil y zonas circundantes."
 iraq.4.t: "Marchas en su apogeo en Bagdad"
 iraq.4.d: "Las protestas que comenzaron en 2019 por las malas condiciones de vida y la corrupción en nuestro gobierno han alcanzado finalmente su apogeo ayer, cuando cientos de miles de manifestantes han comenzado a marchar y a exigir que el premier Mustafa al-Kadhimi y los líderes de las FMP dimitan y que Estados Unidos se retire de Irak. Los informes de violencia y disturbios en el puente de Sinak, junto con las declaraciones de nuestras fuerzas policiales sobre diversos grupos yihadistas que aprovechan la oportunidad para reclutar nuevos seguidores entre los manifestantes, han aumentado la preocupación por la seguridad en toda nuestra capital."
 iraq.4.a: "¿Seguro que podemos hacer frente a esta tormenta?"
 iraq.5.t: "Anarquía en el sur de Irak"
 iraq.5.d: "La subsecuente guerra civil saudita y el descontrol de las protestas en Bagdad han provocado que varias de nuestras provincias meridionales hayan declarado la ley marcial y hayan caído directamente en la anarquía tras un golpe de Estado en Basora que derrocó al gobierno local. Varios comandantes del ejército iraquí han declarado su lealtad a diversos grupos políticos y yihadistas del sur, entre ellos el resurgente Estado Islámico, que al parecer ha experimentado un aumento de efectivos y popularidad debido en parte a la huida de la población saudita y al continuo descontento con el gobierno. El INIS también ha informado de movimientos de tropas en nuestra frontera con Irán, y el director de nuestro servicio de inteligencia ha llegado a decir que Irán podría estar preparándose para intervenir, todo ello mientras a los leales que quedan en nuestro ejército se les ha ordenado sofocar violentamente las protestas en Bagdad y establecer defensas en la ciudad, ya que el país está a pocos pasos de otra Guerra Civil."
 iraq.5.a: "No podemos permitir que caiga Bagdad, ¡declara el estado de emergencia!"
 iraq.6.t: "En memoria de los caídos"
 iraq.6.d: ""
 iraq.6.a: "Sadam estaría orgulloso."
 iraq.7.t: "La guerra civil iraquí"
 iraq.7.d: "Cuando las últimas tropas iraníes retrocedieron en nuestra victoriosa Segunda Guerra Irán-Irak, cualquier esperanza de unidad nacional se desvaneció rápidamente, ya que las diversas milicias y divisiones rebeldes del ejército que se habían alineado con grupos de manifestantes y yihadistas en nuestras diversas provincias bajo la anarquía han reanudado sus combates contra el gobierno y las otras partes del conflicto. Se ratificó apresuradamente un acuerdo de paz en la aldea de Mandali, en la frontera iraní, mientras se oían combates en el frente a pocos kilómetros del edificio donde se encontraban nuestros diplomáticos y los iraníes. Cientos de nuevas milicias han empezado a formarse en nuestras provincias condenadas y los observadores internacionales han declarado la Segunda Guerra Civil Iraquí."
 iraq.7.a: "Simplemente este no es nuestro siglo."
 iraq.8.t: "Colapso del Ejército Revolucionario Iraquí"
 iraq.8.d: ""
 iraq.8.a: "Se veía venir."

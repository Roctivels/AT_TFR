 spain.1.t: "¡Cataluña se rebela!"
 spain.1.d: "Anarquistas guolsoms"
 spain.1.a: "¡Aplastad a esos rebeldes!"
 spain.2.t: "La revolución catalana"
 spain.2.d: "El pueblo español y Europa occidental están en shock tras la declaración unilateral de independencia de la provincia española de Cataluña. España no es ajena a movimientos separatistas, especialmente en las últimas décadas. De todos los territorios de España, la región vasca y Cataluña han sido las más persistentes en sus llamadas a la independencia, con partidos y movimientos políticos independentistas siendo promitentes en la política local. Sin embargo, parece que con la reciente ola de disturbios y descontento con España han dado a estas regiones la oportunidad de hacer lo que muchos activistas locales han luchado por años. En el último día, políticos catalanes han declarado su independencia unilateral de España entre bombos y platillos de la población local, reclamando que era el momento adecuado para que Cataluña afirme su soberanía. Madrid ha condenado rápidamente el acto, reclamando que es completamente ilegal. Por fuerte que sea la voluntad de actuar ahora, parece imposible debido a la poca voluntad de las autoridades locales Españolas de controlar la provincia rebelde, pues los catalanes locales se han unido masivamente al movimiento para la independencia junto con otros problemas que plagan ahora al estado español. Algunos dentro de España y Europa Occidental han esparcido el temor de que el separatismo se extienda, y que la anarquía masiva sea inminente. Desafortunadamente, la independencia de Cataluña solo ha alimentado peligrosamente estos miedos ."

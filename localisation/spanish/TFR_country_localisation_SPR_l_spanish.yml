 spain.11.t: "Portugal en caos"
 spain.11.d: "En el caos de la derrota en el Este y la ruina económica que esta ha traído a los vencidos, Portugal ha alcanzado un punto de quiebre. Al norte, elementos rebeldes del ejército han declarado un nuevo Gobierno desde Oporto. Afirman que la República ha traicionado a la nación, que su incompetencia arrebató la derrota de las fauces de la victoria, que su corrupción destruyó la prosperidad del país, y que solo ellos pueden salvar a la nación de las fuerzas malignas de la izquierda y de la ruina económica. Al sur, se ha proclamado una República Popular. Para ellos, el culpable es la burguesía codiciosa que ha desangrado a la nación, los impuestos injustamente altos nacidos de la guerra, y la negativa a poner fin al servicio militar obligatorio a pesar de que la guerra ya está perdida. Afirman que solo ellos pueden salvar al pueblo. Entre el caos yace la República destrozada, rodeada, desesperanzada, con la moral por los suelos y sin reservas. Incluso la base de su apoyo -los funcionarios públicos y centristas de la República- ya buscan coartadas y excusas, con la esperanza de asegurarse un lugar en cualquier sistema que logre imponerse. Nada menos que un milagro o el apoyo extranjero podrá salvar a la República.\n\nToda Iberia arde. No desde la guerra de las Siete Semanas se ha desatado un conflicto de tal magnitud en suelo portugués. Separatistas, revolucionarios, nacionalistas y defensores de la República luchan por su visión de un mañana mejor, y la mayoría entiende lo que está en juego: no hay lugar para la negociación, no hay margen para el fracaso. El grito de guerra, desde el más fanático miliciano fascista hasta los socialdemócratas burgueses, es el mismo: \"Vitória ou morte\"."
 spain.11.a: "¡Deus, Pátria e Família!"
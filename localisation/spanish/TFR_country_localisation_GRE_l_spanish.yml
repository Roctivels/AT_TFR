 greece.1.t: "El Estado de Grecia"
 greece.1.d: "La cuna de la democracia, el padre de Europa, la Segunda Roma. Grecia tiene varios apodos, pero su legado es más intrigante. Explotada por los Persas, conquistada por los Romanos y esclavizada por los Turcos, los Griegos sufrieron bajo la bota de muchos regímenes. Pero los Griegos siempre lograban unirse y alzarse de las cenizas de lo antiguo, desde Alejandro Magno hasta Eleftheros Venizelos. Han pasado casi 200 años desde que la gente griega empezara su lucha por la independencia contra el Imperio Otomano y la formación de la República Helénica, pero Grecia es una sombra de si misma. Plagada por la Crisis Económica de 2008-2014, la economía sigue en ruinas. La política griega está hostigada por el fantasma de la organización neonazi Amanecer Dorado, y con los Turcos irritándonos constantemente con sus repetidas violaciones en los mares territoriales Griegos y Chipriotas, incluyendo entrenamientos militares de los que alardean constantemente, los Griegos tienen mucho de lo que ocuparse. Quizás, el pueblo Griego puede tener un nuevo inicio fresco con las Elecciones Presidenciales de 2020 a la vuelta de la esquina. ¿Debería el PM en funciones Kyriakos Motsotakis reparar la frágil condición de Grecia, o está Grecia yendo hacia su propia tumba? Esto depende de ti, solo de ti."
 greece.1.a: "¡Adelante!"
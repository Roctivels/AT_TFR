 ukraine.1.t: "Ucrania viola el Protocolo de Minsk"
 ukraine.1.d: "El Gobierno ucraniano ha violado el acuerdo de paz con el Estado Federal de Novorrusia y ha permitido a unidades de su ejército volver a comenzar conflictos fronterizos."
 ukraine.1.o1: "Un esfuerzo temerario"
 ukraine.1.o2: "¡Anulad el acuerdo! ¡Victoria o muerte!"
 ukraine.2.t: "Vuelo 752 de Ukraine Airlines derribado sobre Irán"
 ukraine.2.d: "El Gobierno iraní nos ha informado que miembros de la Guardia Republicana Iraní han derribado accidentalmente uno de nuestros aviones de pasajeros. El jet civil que partió del Aeropuerto Internacional Imán Jomeiní fue impactado por un misil tierra-aire. Todos los 176 pasajeros fallecieron."
 ukraine.2.o1: "¡Qué horrible tragedia!"
 ukraine.3.t: "Rusia condena el \"neonazismo\" ucraniano"
 ukraine.3.d: "En su último intento de socavar nuestro Gobierno y justificar su ocupación ilegal de Crimea y el Dombás, el Gobierno ruso ha lanzado otra oleada de acusaciones infundadas contra nosotros. Usando sus medios estatales de propaganda como RT y Sputnik, sus políticos y expertos han tachado la administración del presidente Zelenski de \"gánsteres corruptos\", \"banderistas neofascistas\", y \"nietos de colaboracionistas hitlerianos\". \n\nAunque puede que tengan razón sobre la existencia de algunos elementos demasiado entusiastas en unidades como el Batallón Azov, ¡El resto de acusaciones son tan endebles como la legitimidad democrática de Putin! Están rebajándose a trucos viejos de propaganda, tachando a cualquier ucraniano que luchase contra el zar o los soviéticos como un títere extranjero o un perturbado fascista. ¡No debemos tolerar este ultimo caso de calumnias, y debemos denunciarlas ante el resto del mundo para condenar las obvias mentiras rusas!"
 ukraine.3.a: "¡Pueden decir que la historia está de su parte, pero nos vindicará!"

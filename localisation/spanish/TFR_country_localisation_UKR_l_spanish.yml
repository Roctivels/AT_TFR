 UKR_far_right_meddling: "Injerencia ultraderechista"
 UKR_far_right_meddling_desc: "Desde el Maidán, nuestro Gobierno ha estado fuertemente infiltrado por elementos y políticos derechistas. La fuerza policial y el ejército son las estructuras más influenciadas, con el ejército teniendo batallones de ultraderecha auspiciados por el Estado bajo el patronazgo de varios funcionarios y algunos oligarcas. Esto también ha ayudado al Kremlin en sus reclamos acerca de nuestra naturaleza \"criptofascista\", dándoles carta blanca para apoyar a la escoria separatista rusa en el Dombás. Debemos abrazar a nuestros elementos más radicales o acabar con su influencia definitivamente."

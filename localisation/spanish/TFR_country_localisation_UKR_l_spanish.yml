 UKR_corrupt_army_staff: "Estado mayor corrupto"
 UKR_corrupt_army_staff_desc: "Es una triste realidad que los altos mandos de las fuerzas armadas de nuestro país no son ajenos a la corrupción. El soborno, ya sea en el servicio o dentro de nuestros propios procesos académicos militares, está muy extendido, además de toda una serie de problemas que a menudo hacen que muchos de nuestros altos mandos busquen el enriquecimiento personal en lugar de servir a la nación de la mejor manera posible. Como resultado, se ha reducido la eficacia general del personal de nuestro ejército, lo que a su vez repercute lamentablemente en el rendimiento del ejército en su conjunto."
 UKR_government_corruption: "Oligarcado ucraniano"
 UKR_government_corruption_desc: "Desde hace ya bastante tiempo, varios clanes oligárquicos han ejercido su influencia desenfrenada en nuestras instituciones de gobierno. Facilitación de pagos, sobornos, extorsión y otros abusos de poder están muy extendidos entre los funcionarios públicos de nuestro país, a pesar de la legislación anticorrupción ya existente, la debilidad del sistema judicial y las malas condiciones económicas dificultan enormemente la aplicación de estas leyes, cuando no la hacen imposible en algunos casos."
 UKR_minsk_protocol: "Protocolos de Minsk"
 UKR_minsk_protocol_desc: "\n\n\n\n£GFX_UKR_minsk_protocol\n\n\n\n\n\n\nEn 2014 y 2015, nuestro Gobierno llegó a un acuerdo tanto con la Federación de Rusia como con la OSCE para detener cualquier enfrentamiento mayor con los separatistas en la región del Dombás. Si bien los combates se han reanudado inevitablemente otra vez, hay directrices impuestas por dicho acuerdo para minimizar tanto la escalada de los combates como los daños infligidos a cada fuerza combativa. La retirada de toda la artillería de largo alcance de las regiones designadas, en adición al cese de toda ofensiva contra los rebeldes permanecen como los 2 requerimientos primarios del actualizado protocolo de Minsk II los cuales hemos firmado. Cumpliremos estos protocolos y detendremos cualquier ataque adicional contra los separatistas Rusos."
 UKR_mass_insurgency: "Conflicto del Dombás"
 UKR_mass_insurgency_desc: "Los dos Estados separatistas ilegítimos de la República Popular de Donetsk y la República Popular de Lugansk han iniciado campañas contra nosotros son el fin de \"liberar\" las minorías rusas en las tierras de Ucrania. En su esfuerzo, han formado milicias insurgentes para combatir a nuestras fuerzas armadas, que han demostrado ser eficaces contra nosotros."
 UKR_embargoed_economy: "Economía embargada"
 UKR_embargoed_economy_desc: "Con la hostil anexión rusa de Crimea, nuestro comercio con el mundo ha sido cortado. Sin el acceso al gran puerto de Sebastopol, nuestros navíos ya no tienen un gran centro para cargar y descargar mercancías, dejando a nuestra economía de exportación en ruinas."
 UKR_ukrainianrussian_church_schism: "Iglesia ortodoxa de Ucrania"
 UKR_ukrainianrussian_church_schism_desc: "En octubre de 2018, tras una resolución del Santo Sínodo de Constantinopla que confirmaba sus intenciones de dar la independencia a la Iglesia ortodoxa de Ucrania. Visto ampliamente como un movimiento político tras que la Iglesia ortodoxa rusa excomulgara varios miembros del clero ucraniano, el cisma entre Constantinopla y Moscú inició formalmente el día 15 cuando el Santo Sínodo de la Iglesia ortodoxa rusa prohibió a todos los miembros del Patriarcado de Moscú participar en comuniones, bautizos y matrimonios. El resultado final de esto ha concluido en un debate sobre el estatus de la Iglesia ortodoxa en las políticas de Europa Oriental, y ha sido visto en gran medida de forma positiva por la población ucraniana quienes ven esto como un paso más en la independencia ucraniana de Rusia - aún si esto ha contribuido a la tensión entre los dos Estados."
 UKR_novo_conflict: "§YCumpliremos estos protocolos y detendremos cualquier ataque adicional contra los separatistas rusos.§!"
 UKR_to_the_last: "Hasta el final..."
 UKR_to_the_last_desc: "¡El invasor pagará por cada metro de tierra!"

 Sahara_Expansion_Decisions: "Expansión del Sáhara"
 Sahara_Expansion_Decisions_desc: "El Sáhara se ha estado expandiendo anualmente a un ritmo alarmante. La región entre las exuberantes planicies del África Subsahariana conocida como el Sahel ha visto una drástica reducción de las precipitaciones. Desde Senegal hasta Yibuti, estas naciones están encomendadas al proyecto de la Gran Muralla Verde. El plan implica plantar millones de árboles en el Sahel para crear una barrera natural que detenga la expansión del Sáhara.\n\n\nProgreso del Proyecto de la Gran Muralla Verde: §Y[?CHA.sahara_project]§!%"
 Sahara_Ecological_Disaster_Countdown: "Desastre ecológico del Sáhara"
 Sahara_Ecological_Disaster_Countdown_desc: ""
 plant_trees_10_million: "Plantar 10 millones de árboles"
 plant_trees_5_million: "Plantar 5 millones de árboles"
 close_off_land: "Cercados de tierras"
 exploit_land: "Explotar la tierra"
 sahara_disaster_tt: "Si fallamos en plantar el número deseado de árboles antes del 2030, solo Dios sabe lo que pasará."
 exploit_land_tt: "Esto retrasará el proyecto en un §R2%§!"
 close_off_land_tt: "Esto nos acercará a nuestro objetivo en un §G2%§!"

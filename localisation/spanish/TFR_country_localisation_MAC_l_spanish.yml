l_spanish:
 MAC_fading_antiquisation: "Política pragmática"
 MAC_fading_antiquisation_desc: "La disputa por el nombre de Macedonia ha estallado el nacionalismo en nuestra población, ya que los viles griegos interpretaron el nombre de nuestro país, que era literalmente la Ex República Yugoslava de Macedonia, como una excusa para el irredentismo entre nuestra población para reclamar la región griega de Macedonia. Ahora que el hacha ha sido enterrada y votamos para cambiar el nombre de nuestra nación a Macedonia del Norte, Grecia finalmente ha dejado de vetar nuestros intentos de ingresar a la UE. A pesar de que la disputa se ha resuelto en gran medida, muchos de nuestros políticos todavía se quejan de haber sido presionados por otro estado para cambiar nuestro nombre, lo que ha influido en parte de nuestra base de votantes para que se unan a partidos populistas que pretenden revertir el cambio."
 MAC_rising_antiquisation: "Política de patriotismo"
 MAC_rising_antiquisation_desc: ""
 MAC_lukewarm_ethnic_tensions: "Tensiones étnicas"
 MAC_lukewarm_ethnic_tensions_desc: "Puede que la disputa sobre el nombre de Macedonia haya quedado sepultada, pero eso no significa que otros rencores balcánicos hayan desaparecido. En particular, tenemos una enorme minoría de albaneses en el extremo occidental de nuestro país, con una minoría más pequeña de búlgaros en el este. A pesar del Acuerdo de Ohrid y la liberalización de las libertades personales de nuestra nación, muchos albaneses siguen siendo ferozmente nacionalistas con su propio pueblo y no con nuestra bandera, y la minoría búlgara es más leal a Sofía que a nosotros debido a que no ratificamos el Tratado de Amistad de 2017 con Bulgaria. El mayor incidente desde el nuevo milenio fue el estallido de violencia étnica en 2012, cuando nuestras poblaciones macedonia y albanesa se enfrentaron por casos de brutalidad policial y varios arrestos. Una de las cláusulas para que nos uniéramos a la UE era resolver cualquier disputa existente dentro de nuestra nación, y hasta ahora nuestra falta de unidad ha sido uno de nuestros obstáculos hacia la ascensión. Hasta que nuestro pueblo aprenda a darse la mano y a no pelear entre sí como nuestros vecinos, nuestro sueño de unirnos a la UE seguirá siendo una mera fantasía."
 MAC_ineffective_legal_system: "Sistema legal inefectivo"
 MAC_ineffective_legal_system_desc: "Una característica de la disolución de Yugoslavia fue el aumento vertiginoso de la corrupción cuando el pueblo de los Balcanes, que había vivido en gran medida bajo economías planificadas y el socialismo, se encontró de repente con una economía capitalista de mercado sin ninguna experiencia para abordarla. Si bien logramos evitar la mayor parte del desastre que siguió al colapso, nuestra república desafortunadamente había heredado el ineficaz sistema legal de Yugoslavia, y ha comenzado a asomar su fea cabeza en la última década. Con una falta de aplicación adecuada de la ley, una burocracia y un poder judicial débiles, por no hablar de una falta de financiación crítica, había conducido inadvertidamente a un aumento continuo de la corrupción y al estancamiento de los esfuerzos para combatir el crimen, llegando incluso a permitir que el 20% de nuestro PIB estuviera compuesto por productos del mercado negro causado por nuestro enorme mercado gris."

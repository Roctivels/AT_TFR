 atom.25.a: "Basado."
 atom.26.t: "Guiado por Dios"
 atom.26.desc: "Un pájaro negro posado sobre un tejado, justo frente a la ventana de James Mason. Observaba cómo cuidaba a sus polluelos, dejando caer los restos de algún roedor en sus ansiosas fauces. Mason sonrió. El mundo de Dios era justo; incluso en la muerte, sus criaturas servían a los vivos.\n\n\"Señor\".\nUn soldado apareció en la puerta. El rostro de Mason se ensombreció mientras pensamientos negativos llenaban su mente; últimamente, todo lo que había escuchado eran masacres sin sentido, la muerte de tantos cristianos en una guerra grande y terrible, todo por la efímera posibilidad de victoria, o una victoria, sobre el adversario y sus hijos.\n\"Señor, el frente norte... Una batalla... miles de muertos... un pueblo capturado...\"\nMason se sentó en silencio mientras le relataban otra vez una serie de atrocidades. El enemigo los había llevado a una trampa, pero los valientes hombres lucharon para salir de ella, destrozando al enemigo, aunque dejando a muchos de los suyos atrás. Pensó en las cartas que tendría que escribir a madres afligidas, a esposas con hijos huérfanos. Cerró los ojos.\n\"Escucharé más tarde. Necesito tiempo para pensar\".\nEsos hombres no habían muerto en vano, y seguramente disfrutaban de su recompensa eterna mientras él permanecía, para liderar en su nombre. Todo era parte del plan de Dios; él no era más que un instrumento, y uno que el todopoderoso manejaba a su antojo."
 atom.26.a: "Un nuevo Evangelio."
 atom.27.t: "Preparación para lo inevitable"
 atom.27.desc: "Cuando derrotemos a la bestia que lleva el nombre de América, no hay duda de que los titiriteros no querrán que celebremos nuestra victoria; armarán un ejército entero para detenernos, tal como detuvieron a nuestros antepasados en 1945. Sin embargo, a diferencia de ellos, nosotros tenemos los medios para causar un daño permanente al mundo. Con nuestra ira colectiva e ingenio, podremos construir reactores nucleares en nuestros territorios conquistados; no serán bonitos ni prestigiosos, pero harán el trabajo. Podremos avanzar más rápido hacia la destrucción del viejo mundo. Y si los Cascos Azules marcharan sobre nuestras tierras, nuestros reactores podrían asegurarse de que nunca regresen a casa."
 atom.27.a: "Mateo 7:13-14"
 atom.28.t: "Una noche a solas"
 atom.28.desc: "Mason se sentó solo bajo la vasta extensión del cielo nocturno, contemplando sus pensamientos entre una cantidad interminable de estrellas arriba. Durante casi una hora, había permanecido afuera, impulsado por una pregunta urgente que había surgido en su mente más temprano ese día. ¿Podría sostener su doctrina de violencia y odio una vez que su conquista de América estuviera completa? En el estado actual de la División Atomwaffen, promover sus ideales sería fácil, pero preveía desafíos a medida que la organización se expandiera. A medida que sus filas crecieran, atraer a la mayoría dentro del movimiento se volvería cada vez más tedioso si no se reformaba.\n\nBuscando una respuesta, se retiró bajo el cielo nocturno, reflexionando sobre la incorporación de ideales cristianos en su causa. Observando la popularidad de estos principios entre algunos miembros, particularmente durante su aparición inicial en territorio de Atomwaffen, Mason reconoció el potencial para obtener un apoyo más amplio. Sin embargo, se mantuvo cauteloso ante la posible reacción negativa de facciones como los Aceleracionistas. A pesar de otras diversas opciones, Mason se sintió atraído por esta única solución. Los escenarios alternativos solo parecían derivar en anarquía o en su destitución del poder. Con una última mirada contemplativa al cielo nocturno, se levantó de su asiento y se retiró al interior, con la mente aún agitada por el peso de sus decisiones."
 atom.28.a: "Tomaría su decisión mañana."
 atom.29.t: "Aliento de aniquilación"
 atom.29.a: "Destrucción total..."
 atom.29.desc: "Con nuestra eventual liberación de América haciéndose más evidente cada día, hemos encontrado la oportunidad de asegurar los antiguos depósitos de armas nucleares que aún permanecen en los diversos submarinos nucleares abandonados en sus puertos. Una vez que aseguramos estas armas, algo quedará claro para quienes se oponen a nosotros. Que sus días están contados. \n\nSi resisten nuestros esfuerzos de liberación, se nos permitirá utilizar ojivas tácticas contra los principales centros de población y formaciones enemigas. Si continúan resistiendo, el uso de nuestras ojivas solo se intensificará. Mientras sigan en pie, la ira del sol caerá sobre ellos."
 atom.30.t: "Sombra de la intención"
 atom.30.desc: "En nuestra lucha continua contra los numerosos adversarios que hemos acumulado, nos hemos encontrado con algunas molestias persistentes que obstaculizan nuestro progreso. Entre ellas están las claras ventajas que poseen nuestros enemigos, ya sean los Gobiernos títeres sionistas de los ex-Estados Unidos o las innumerables pandillas y señores de la guerra que se destruyen entre sí. La abundancia de mano de obra y el suministro estable de alimentos de nuestro enemigo les otorgan una ventaja clara. Sumado a nuestra falta de popularidad dentro de América, nos enfrentamos a escasez de personal. Esto también afecta a nuestro sector agrícola, ya que no contamos con suficientes seguidores leales para alimentar eficientemente a nuestros soldados y civiles. \n\n  Para nivelar el terreno, hemos encontrado la solución de utilizar armas químicas contra las poblaciones urbanas y las principales zonas agrícolas de nuestro enemigo. Aunque reconocemos los costos ambientales y territoriales futuros, este enfoque promete ofrecer a nuestros adversarios una verdadera lucha."
 atom.30.a: "Pronto enfrentarán toda nuestra ira."
 atom.31.t: "Vertido de sustancias tóxicas en el sur del río Misisipi"
 atom.31.a: "crimen de guerra"
 atom.31.desc: "Nos llegan trágicas noticias del Sur. Aparentemente la región meridional del río Misisipi ha sido contaminada por químicos letales que no solo pone en riesgo vidas humanas, si no que también amenaza la vida silvestre y cientos de miles de acres de cultivos que consumen agua de la porción meridional del río.\n\nEsta despiadada acción fue llevada a cabo por la División Atomwaffen, que ha reivindicado el envenenamiento poco después de que saliese a la luz citando, \"Todo aquel que se interponga en el camino de nuestra inevitable liberación enfrentará toda la ira de nuestra División. No nos andaremos con rodeos, no tendremos piedad, y nadie que se oponga a nosotros jamás estará a salvo.\""
 atom.32.t: "Vertido de sustancias tóxicas en el norte del río Misisipi"
 atom.32.a: "Muerte a los traidores."
 atom.32.desc: "Nos llegan trágicas noticias del Norte. Investigadores quienes estaban realizando pruebas en el río Misisipi en su región septentrional han hallado químicos peligrosos en las aguas del río. Tras este descubrimiento, las autoridades locales de la región han ordenado detener todo uso del agua el río para evitar daños catastróficos a los numerosos centros de población que existen en la región.\n\nEl ataque fue llevado a cabo por la División Atomwaffen, quienes reivindicaron el ataque citando, \"Los traidores que siguen trabajando en contra de nuestra liberación se enfrentarán al mismo destino, sin importar que tan lejos estén.\""
 atom.33.t: "Vertido de sustancias tóxicas en el oeste del río Misisipi"
 atom.33.a: "Muerte a los traidores."
 atom.33.desc: "get shit on"
 atom.34.t: "Vertido de sustancias tóxicas en el este del río Misisipi"
 atom.34.a: "Muerte a los traidores."
 atom.34.desc: "get shit on"
 atom.35.t: "Bombardeo nuclear de Nashville"
 atom.35.desc: "TODO get shit on"
 atom.35.a: "lol"
 atom.36.t: "El ángel caído"
 atom.36.desc: "Era una noche completamente oscura, muchos estaban dormidos, y los pocos que estaban despiertos a esa hora estaban tramando algo. Esos eran John Denton y Joshua Sutter, junto con algunos otros. Un grupo de alrededor de treinta hombres estaba fuera hasta tarde esa noche para discutir el futuro de la División Atomwaffen, a su manera, por supuesto.\n\n\"Debemos destruir a los sionistas y cristianos dentro del Gobierno, todo lo que han hecho es corromper la causa de la División\". Dijo uno.\n\n\"Sí. Sí, deberíamos, y deshacernos de Mason. Ese cerdo ya ha sido corrompido por su lavado de cerebro\". Dijo otro.\n\n\"¿Pueden callarse todos?\" El grupo de hombres se volvió para escuchar a Denton, con Sutter a su lado. \"No podemos lograr nada si siguen planeando las cosas así, necesitamos centralizar nuestros esfuerzos, debemos estar organizados\". Continuó Denton.\n\n\"Entonces, ¿por qué no discuten lo que quieren que pase?\" Dijo uno de los hombres.\n\n\"Está bien, entonces escuchen. Empezaré tomando sus ideas y agregándolas a nuestros objetivos generales\". Se volvió hacia Sutter a su lado y le dijo que anotara todo. \"Nuestra prioridad principal es eliminar la influencia sionista-cristiana dentro de la División Atomwaffen. Nuestra segunda prioridad es deshacernos de James Mason y sus seguidores. Ahora, ¿alguien tiene ideas sobre cómo llevar a cabo estos objetivos?\"\n\nEl grupo guardó silencio. Después de unos momentos de espera, Denton suspiró, \"Está bien, supongo que deberíamos empezar a programar más reuniones como esta para poder hacer una lluvia de ideas\". Hizo un gesto para que Sutter lo siguiera antes de hablar, \"Tengo que ir a «ablandar» a algunos prisioneros que capturamos. Nos vemos aquí mañana a la misma hora\"."
 atom.36.a: "Y así, Denton y Sutter se retiraron."
 atom.37.t: "El retorno de la Princesa"
 atom.37.desc: "Vestida de escarlata, acostada de espaldas sobre una cama de terciopelo, la Ramera observaba cómo los soldados la rodeaban, cantando. Sus palabras eran un balbuceo ininteligible, expresiones aterradoras interrumpidas por chillidos animales que provenían de abajo. Su cama estaba sobre una plataforma, elevada por encima de lo que ella suponía era una multitud, basándose en el movimiento.\n\nLa habían traído aquí lo que ella pensaba que era un cliente. Se maldijo a sí misma; tantos amigos habían muerto últimamente, ya fuera por estos bárbaros con sus pequeños vestidos durante sus ceremonias, o en horas posteriores, cuando venían con ropa civil, mostrando cuerpos pálidos y miradas lánguidas antes de maldecirlos y clavarles un cuchillo en el pecho.\n\nEl movimiento cesó. Un hombre gritó. \"¡Bájenla!\" Un momento después, sus ojos se acostumbraron a la luz de las antorchas que revelaba a la multitud, y vio el cuchillo. Gritó cuando descendió, desgarrando su carne. Perdió el conocimiento, mientras su corazón palpitante era levantado para que todos lo vieran, antes de ser incendiado."
 atom.37.a: "\"¡Contemplad el sagrado corazón de María, reina de las rameras!\""
 atom.38.t: "El cuchillo que corta más profundo"
 atom.38.desc: "La noche cayó sobre la vieja y decrépita iglesia. Acechando en una colina sobre un pueblo olvidado, había sido abandonada hace mucho por sus feligreses y dejada a la intemperie. El pueblo de abajo había olvidado todo por lo que alguna vez se sostuvo: la pobreza, la disolución moral y la adicción habían barrido la antigua moralidad. ¿Qué mejor lugar para una renovación, regeneración, renacimiento? Después de todo, los medios eran abundantes.\n\nLa noche cayó, furgonetas llenas de prisioneros; prostitutas, comunistas, incluso algunos miembros del gabinete del gobernador, todos llamados \"opfers\". Discutían qué significaba eso mientras se acercaban lentamente al Templo, mientras algunos intentaban dormir, otros permanecían despiertos, pero distantes. Finalmente, se detuvieron, y de repente un grupo de soldados comenzó a ordenarles que salieran, todos estaban con los ojos vendados, algunos logrando captar fugaces destellos de la iglesia, preguntándose por la imagen mancillada de Cristo en las ventanas, o la extraña luz que parpadeaba en su interior.\n\nLos rehenes fueron empujados adentro. Ya había una gran multitud dentro, sus susurros como un río, indefinidos e ininteligibles. Justo después de que todos fueron encerrados, las grandes puertas se cerraron y todos los sonidos del mundo exterior cesaron. Cayó el silencio. Sin advertencia, un órgano comenzó a sonar, emergiendo con una melodía sin ritmo ni armonía. Retumbaron los tambores bajos. Tras unos momentos de esa lúgubre melodía, un hombre gritó, y el silencio volvió a caer.\n\"¡Opfers! Les hemos presentado una de las mayores oportunidades jamás propuestas, para desempeñar un papel integral en la iluminación de uno de nuestros devotos más leales y dedicados\".\nLa voz era refinada, casi aceitosa. Tenía un efecto extrañamente calmante en la multitud.\n\"Comenzaremos con los más reprobables entre nosotros. Los funcionarios del Gobierno del Florida controlada por judíos\"."
 atom.38.a: "Y así clavó un cuchillo en su pecho..."
 atom.39.t: "Justicia particular"
 atom.39.desc: "A lo largo de la historia, el mundo ha visto cómo la raza caucásica ha sido humillada. Ya sea por las élites sionistas que actualmente gobiernan el mundo, los africanos que lograron su independencia de los europeos, los asiáticos cuando nos expulsaron de su continente, los hispanos cuando ganaron su independencia a través de una sangrienta revolución, o incluso por los traidores dentro de nuestra propia raza.\n\nPero ahora podemos cambiar eso. ¡Porque durante demasiado tiempo hemos sido pisoteados! ¡Durante demasiado tiempo hemos sido humillados! ¡Durante demasiado tiempo nuestra raza ha enfrentado los castigos más duros, las derrotas más severas, las mayores carencias! ¡Ya hemos tenido suficiente de aquellos que nos han hecho daño!\n\nPronto nuestra justicia caerá sobre nuestros enemigos y sus subordinados. ¡Pronto el fuego atómico reclamará este mundo! Primero, se extenderá por Sudamérica y sus selvas. Luego, llegará a Europa y a sus líderes traidores. Después será el turno de África y sus tierras ardientes. Finalmente, el fuego alcanzará Asia y Oceanía, quemando los últimos vestigios de la podrida sociedad de este mundo en un infierno atómico que lo abarcará todo.\n\nSolo cuando el fuego se haya enfriado, y la cuna de la Humanidad quede en ruinas, estaremos satisfechos. Porque la ira que ha estado hirviendo dentro de nosotros durante tanto tiempo, finalmente habrá sido saciada."
 atom.39.a: "Oh Tierra, tiembla y estremece, porque has despertado a una bestia imparable."
 atom.40.t: "Triunfo y trascendencia"
 atom.40.desc: "Tras nuestra exitosa infiltración en los cárteles, hemos logrado difundir eficazmente las simpatías por la División Atomwaffen entre sus filas. Muchos de los que hemos influenciado ahora sienten un profundo desprecio por sus líderes y están dispuestos a traicionarlos a cambio de mejor paga y otras cosas. Son criaturas simples.\n\nReconociendo el alcance de nuestra influencia sobre estas facciones del cártel, hemos tomado la decisión estratégica de negociar con los elementos descontentos dentro de sus filas. Nuestra oferta es clara: mejor compensación y autonomía sin precedentes a cambio de la eliminación de sus superiores y antiguos aliados. Anticipamos una respuesta significativa a esta iniciativa, esperando que debilite sustancialmente a los cárteles y pandillas que enfrentamos."
 atom.40.a: "El dinero lo cambia todo."
 atom.41.t: "El Pilar del Otoño"
 atom.41.desc: "Dentro de Tallahassee, en 400 S Monroe St., se encuentra la sede central de la División Atomwaffen. En sus pasillos gubernamentales y numerosas salas, el personal de Atomwaffen se reúne, planificando meticulosamente el futuro de su organización. En una de esas salas, se desarrolla una reunión crucial: una discusión que moldeará la estructura gubernamental de la División.\n\nEl jefe de la reunión dio una calada a su cigarrillo, \"Entonces, ¿alguien quiere empezar?\" El líder de la reunión fue recibido con un silencio colectivo por parte de los presentes. Justo cuando se disponía a fomentar la discusión, un hombre levantó la mano. \"Señor, ¿puedo?\" \n\n\"Puede hablar\", afirmó el convocante de la reunión. El hombre aclaró su garganta y comenzó a exponer su propuesta.\n\n\"Mencionó la preocupación del liderazgo sobre la posible deslealtad y sabotaje dentro de nuestras filas. Sugiero implementar un sistema jerárquico. El jefe de nuestra División sería venerado como una figura similar a una deidad, con todos los subordinados por debajo. Esta estructura disuadiría la traición, ya que cualquier acto contra la División se consideraría una ofensa contra nuestro líder\", concluyó.\n\nMientras la sala absorbía su propuesta, el líder de la reunión reflexionó sobre la idea. Aunque sencilla, el sistema jerárquico consolidaría el poder en manos del líder de la División Atomwaffen. Esto podría proteger contra amenazas internas, pero también dificultaría la destitución de un líder rebelde. No obstante, reconociendo su potencial, el líder respondió, \"Lo tendré en cuenta\"."
 atom.41.a: "Por siempre Otoño."
 atom.42.t: "Penitencia solemne"
 atom.42.desc: "Por fin, nuestra conquista de Florida está completa, y con el Gobierno estatal huyendo hacia el profundo sur, el Estado Soleado es finalmente nuestro. Lo que parecía imposible al fin ha demostrado ser posible, con nuestra bandera ondeando orgullosamente por toda Florida. Las calles están empapadas en la sangre de los degenerados y enemigos, y aunque algunos aún continúan resistiendo, serán eliminados como todos los demás. Nuestra doctrina de destrucción también ha dejado muchas ciudades en ruinas completas, incluyendo Tampa y Miami, con cadáveres de enemigos muertos y ejecutados aún tendidos en las calles.\n\nAunque hemos heredado un estado marcado y sangriento, nuestros planes avanzan rápidamente; ya los escuadrones de la muerte han comenzado a patrullar las calles de pueblos y ciudades buscando por todas partes a aquellos que huyeron de nuestro terror justo. Hemos tomado especial cuidado para asegurarnos de que las diversas pandillas degeneradas de Miami y las otras ciudades costeras fueran liquidadas, enviando a sus miembros a campos de la muerte para ser exterminados. También se están estableciendo campos de trabajo esclavo donde planeamos hacer trabajar hasta el agotamiento a los antiguos enemigos, produciendo armas que serán usadas para nuestra reclamación de América. La gente del Estado Soleado puede gritar si quiere, pero nadie los escuchará."
 atom.42.a: "¡Un destino horrible les espera a todos!"
 atom.43.t: "Adviento de la perdición"
 atom.43.desc: "Nos llaman monstruos, degenerados, saqueadores y destructores. ¿Y qué? Somos el resultado de este mundo putrefacto, somos el castigo que merecen. Armagedón, Día del Juicio, Kali-iuga. Somos los destructores destinados, el fuego que nos purificará del inmovilismo. Mira las ciudades en llamas, las tribus que huyen, y no sientas nada más que orgullo. Somos monstruos, nos ahogamos en nuestros vicios, les aterrorizamos y seremos lo último que verán con sus ojos llorosos, El cambio no llega sin crueldad, las revoluciones son herramientas de castigo."
 atom.43.a: "¡La ola de destrucción no parará por nadie!"
 atom.44.t: "Devoción eterna"
 atom.44.desc: "Antes éramos temidos, odiados, pero ahora nuestros enemigos se burlan de los nuestros. Es hora de que volvamos a odiar, de que nos vuelvan a temer. Hoy, todos nuestros miembros han declarado que dedicarán todo sus esfuerzos para la aniquilación total de nuestros enemigos y la conquista de América. Ningún grupo se interpondrá en nuestro camino, ningún árbol será capaz de esconder su miedo. Quemaremos todo y a todos quienes se interpongan en nuestro camino. Cueste lo que cueste, al final cualquier grito y herida merecerán la pena si cumplimos nuestro objetivo, toda bala disparada, toda gota de sangre derramada lo merece. América arderá, sin importar la cantidad de fosas, sin importar si debemos desafiar a la madre naturaleza."
 atom.44.a: "¡No nos detendremos ante nada!"
 atom.45.t: "Claridad de Fe"
 atom.45.desc: "El pasado tuvo muchos profetas, sabios que compartieron las múltiples sabidurías de lo divino. La modernidad ha cubierto nuestra divinidad con concreto y pornografía, nada es sagrado, todo es plástico. ¿No fue Adolf Hitler uno de los últimos profetas? Un sol brillante en la oscuridad que siempre nos rodea, su visión de un imperio eterno. Vimos lo que pasó cuando él perdió, y sabemos lo que pasará si perdemos. Con sangre en nuestras manos, furia en nuestros ojos y odio en nuestros corazones, juramos que forjaremos un nuevo imperio sobre el suelo podrido de América, según Su visión."
 atom.45.a: "¡América caerá!"
 atom.46.t: "Matanza sureña"
 atom.46.desc: "Todo sucedió tan rápido.\n\nJack no era ajeno a la lucha. Vivir justo por debajo del umbral de la pobreza en Atlanta, Georgia, en la actualidad no era tarea fácil. Nunca fue especialmente político, y cuando estalló la guerra civil buscó refugio. Con solo 16 años en ese momento, no estaba en condiciones de luchar en las líneas del frente con ningún ejército profesional, y, francamente, no quería hacerlo.\n\nVíctima de sus circunstancias, él y muchos otros se dieron cuenta dolorosamente de los horrores que la llamada \"División Atomwaffen\" tenía preparados mientras sus fuerzas avanzaban a regañadientes por el profundo sur. Había aprendido sobre los nazis en la escuela, su crueldad, su brutalidad implacable contra todos los que se les oponían en el campo de batalla, pero hasta ahora todo parecía tan lejano. Después de todo, ¿no puede pasar aquí, verdad? Sin embargo, sí pasó, y habían venido a aterrorizar a personas que él conocía prácticamente desde que nació.\n\nSin embargo, parecía brillar la esperanza. A medida que la marea de la guerra cambiaba, sus bandas de guerrilleros y radicales feroces estaban a punto de ser expulsadas. Hasta donde se sabía, solo era cuestión de tiempo hasta que los enviaran de vuelta a donde vinieron, mientras retrocedían cada vez más hacia Florida.\n\nComo miles han llegado a saber, y millones han presenciado, esto estaba lejos de ser el final.\n\nUn día relativamente normal vio a Jack salir a la cocina popular para cenar. Esta sensación de normalidad fue abruptamente interrumpida por una serie de sirenas aterradoras y estridentes. Aunque estas no eran particularmente desconocidas en una zona de guerra, las alertas en su teléfono sí lo eran.\n\nDesplazándose rápidamente mientras corría a buscar refugio, una frase no dejaba de llamar su atención, y su corazón se hundió hasta el suelo."
 atom.46.a: "\"Armas nucleares\"."
 atom.47.t: "Soberanía sagrada"
 atom.47.desc: "El cristianismo americano se ha marchitado; iglesias antiguas y majestuosas yacen vacías, solo llenas por personas desesperadas en busca de una comida constante, asistiendo a sermones solo para complacer a sus alimentadores mientras la Guerra Civil arrasaba la cultura popular atomizada y consumista. Incluso antes de la guerra, las iglesias habían sido doctrinalmente diluidas; la corriente principal era una sombra de un baluarte antaño preeminente, el catolicismo se estaba deshilachando, y los movimientos evangélicos eran centros nerviosos de la degeneración multicultural. En su lugar, surgió una plétora de espiritualismos de nueva era, orientales, contaminados con influencias judías y capitalistas, como hongos.\n\nNuestro régimen ha tomado grandes medidas para transformar la vida religiosa americana: hemos desmantelado las administraciones de todas las iglesias en nuestros territorios, nombrando a nuestros hombres como pastores; hemos abolido las megai­glesias, y hemos comenzado a gravar a quienes se niegan a asistir a los servicios religiosos. Muchas denominaciones, frustradas porque sus planes satánicos de liberalización han sido frustrados, han disuelto de manera petulante sus administraciones dentro de nuestro territorio. Sus propiedades han sido requisadas por el Estado.\n\nQuizás el resultado más positivo de la desinversión denominacional ha sido la unificación de la mayoría de las iglesias en nuestro territorio en una sola iglesia; se ha establecido un cristianismo verdaderamente nacional, basado firmemente tanto en los Evangelios como en el nacionalsocialismo. Esta iglesia afirma las doctrinas históricas del cristianismo y no deja espacio para el cisma sin sentido que ha caracterizado al rebaño durante milenios. Las grandes catedrales antiguas, dispersas por nuestras tierras, finalmente han sido reutilizadas y devueltas a su posición central en la comunidad."
 atom.47.a: "¡El nacionalsocialismo es cristiano!"
 atom.48.t: "Tormento impío"
 atom.48.desc: "\"¡SIGAN MOVIÉNDOSE!\"\n\nLos guardias armados gritaron una sarta de blasfemias a la serpenteante fila de exfuncionarios, cada uno cargando una cruz de madera sobre sus hombros.\n\nHabían estado caminando durante millas, desde la base donde estaban detenidos hasta el lugar de su ejecución planeada. Cientos de oficiales de alto rango de la Orden de los Nueve Ángeles y traidores capturados habían estado prisioneros durante meses, si no años, dentro de campos y bases fuertemente custodiadas con condiciones atroces. Muchos de estos hombres, antes en gran forma física, ahora eran sombras de sí mismos: hambrientos, magullados y a menudo afectados por diversas deficiencias nutricionales y enfermedades. Envuelto en vestimentas naranjas rasgadas y manchadas, con grilletes fuertemente encadenados a sus tobillos, marchaban a regañadientes cada vez más cerca del lugar.\n\nLa mayoría, si no todos, etiquetados como traidores y subhumanos, se encontraban reflexionando sobre qué los había llevado hasta allí. ¿Era este su castigo? ¿Realmente lo merecían? Después de todo, como funcionarios en tiempos tan traicioneros, cientos habían perecido inevitablemente por las decisiones que cada uno de ellos se vio obligado a tomar.\n\nTras horas de agotador y tortuoso caminar, la fila se detuvo, cuando los hombres llegaron a la cima de una colina.\n\nSe les ordenó dejar sus crucifijos en el suelo, diciéndoles que, en todo su sufrimiento, merecían un destino muy distinto a cualquier cosa que se pareciera al de Jesucristo. Los guardias clavaron a cada hombre en su respectiva cruz de madera, mientras eran izados, uno por uno, sobre sus cabezas. Su sangre se precipitaba hacia el cráneo, su presión arterial se duplicaba, y solo la acumulación de presión mató a muchos. Sus gritos y lamentos fueron ignorados mientras los guardias se alejaban en una caravana de camiones, permitiendo que el sol se pusiera sobre el que pronto sería el cementerio de almas torturadas.\n\nCuando los guardias regresaron a casa al anochecer, un silencio inquietante cayó sobre sus campamentos. En marcado contraste con la colina donde ahora yacen los traidores,"
 atom.48.a: "Sueños amargos."
 atom.49.t: "[ATW.GetNameDefCap] solicita unirse al Frente Nacional"
 atom.49.desc: "La Segunda Guerra Civil Americana ha llegado a un punto crítico. El Frente Nacional -nuestra facción, forjada mediante la unidad del Movimiento Nacionalsocialista y el Frente Patriota- se mantiene firme, pero la guerra está lejos de estar ganada. Si bien hemos logrado avances en el Medio Oeste y el Noreste, nuestros enemigos se vuelven cada día más audaces y nuestros recursos son escasos. Necesitamos una ventaja para asegurar la victoria.\n\nHoy hemos recibido una oferta inesperada. La División Atomwaffen, infame por su fanatismo y brutalidad, busca unirse a nuestra causa. Afirman que sus objetivos coinciden con los nuestros y que sus métodos, aunque poco convencionales y violentos, acelerarán la caída de nuestros enemigos. Traen consigo combatientes curtidos en la batalla y una reputación de valentía, pero también de caos.\n\nSus métodos son salvajes, a menudo imprudentes, y son conocidos por actuar sin preocuparse por los daños colaterales ni la disciplina. Debemos considerar el precio de aceptar su ayuda. ¿Su brutalidad fracturará la unidad del Frente Nacional o su ferocidad nos favorecerá? Rechazar su oferta nos arriesga a distanciarnos de una poderosa fuerza que podría usarse para aplastar a nuestros enemigos, pero permitirles entrar en nuestras filas podría provocar un caos indeseado.\n\nLa División Atomwaffen está a nuestras puertas, lista para marchar con nosotros hacia la victoria. La pregunta es: ¿les permitimos entrar?"
 atom.49.a: "Que se unan. Su brutalidad servirá a nuestra causa."
 atom.49.b: "Mantengámoslos fuera, que su corrupción no se extienda más."

 atom.66.t: "Atomwaffen expulsada del Frente Nacional"
 atom.66.desc: "Nuestro odio fue demasiado profundo, nuestra violencia demasiado brutal, nuestros aliados temporales decidieron echarnos del Frente Nacional en cuanto se enteraron de nuestra depravación.\n\nLos falsos nazis nos consideran degenerados, pero, ¡miren su panza grasienta! ¿Envidian nuestro hambre? ¿O envidian nuestro poder?\nDe cualquier modo, los viejos y podridos encontrarán su fin de la misma manera que nuestros enemigos.\n\nEl Frente Patriota, una panda de inútiles adicta a la nostalgia que persigue una América que nunca existirá, nos ha denunciado públicamente, llamándonos monstruos y escoria.\nNinguno de ellos realmente LO ENTIENDE, su juventud está corrompida y sus planes están horriblemente organizados.\nHaremos que Rousseau y sus minutemen del chino se atraganten con sus mierdosas gafas de sol.\n\nObviamente esto significa que se volverán contra nosotros, un intento inútil de detener nuestros planes.\nNo importa, no más traidores, no más debilidad."
 atom.66.a: "¡La soga se balancea para todos!"
 atom.67.t: "División Atomwaffen expulsada de la Conferencia Nacional"
 atom.67.desc: "Un desarrollo impactante ha surgido hoy en Norteamérica. Al parecer, la \"Conferencia Nacional\", celebrada entre las diversas naciones del Frente Nacional para decidir el unificador final de América, se ha derrumbado tras la expulsión de la División Atomwaffen.\n\nLa medida se tomó después de que los delegados encargados de decidir sobre el unificador fueran influenciados por los diplomáticos de Atomwaffen. Tras la noticia, la mayoría del Frente Nacional entró en alarma, intentando por todos los medios revertir la decisión. Cuando sus esfuerzos fracasaron, finalmente expulsaron a la División Atomwaffen tanto de la Conferencia Nacional como del Frente Nacional. Tras la decisión, los delegados que dirigían la Conferencia Nacional criticaron duramente a los miembros restantes del Frente Nacional, poniendo fin prematuramente a la conferencia y disolviendo cualquier esperanza de una segunda reunión.\n\nSe informa que numerosos movimientos de tropas han estado ocurriendo tras el desastroso final de la conferencia, casi todos dirigidos hacia las fronteras entre la División Atomwaffen y el Frente Nacional, mientras ambas entidades aparentemente se preparan para lo que viene a continuación."
 atom.67.a: "El último obstáculo para nuestra liberación."
 atom.67.b: "No quedará nada de América cuando todo esto termine, estoy seguro de eso."
 atom.68.t: "Grupos raciales se tornan violentos"
 atom.68.desc: "La triste realidad es que dentro de nuestras fronteras, a causa de la creciente violencia provocada por la ultraderecha, grupos radicales conformados por diversas etnias han provocado un gran aumento de la violencia racial, ya sea por venganza o por defensa propia.\n\nSea una cosa u otra, esto ha sentado un terrible precedente, por lo que sucederán episodios esporádicos de violencia por todo nuestro territorito, y por culpa de la naturaleza de esta violencia, será prácticamente imposible saber cual es la raíz del problema. Se han esparcido rumores de que la División Atomwaffen es al responsable de este caos, pero sin evidencias no podremos hacer algo al respecto.\n\nEl hecho es que hay violencia motivada por la etnia de las personas y que solo una mano firme puede asegurar que haya paz entre el pueblo americano."
 atom.68.a: "El hacer de Atomwaffen."
 atom.69.t: "El Frente Nacional sospecha de la Atomwaffen"
 atom.69.desc: "Nos hemos enterado de que nuestras recientes acciones y decisiones no han pasado desapercibidas por nuestros aliados del Frente Nacional. Este aumento de atención ha llevado a consecuencias indeseadas, como que nuestros aliados - en los que confiamos para cooperar y que nos faciliten suministros - están empezando a sospechar de nosotros. Su sensación de inquietud es palpable, y si no hacemos nada al respecto, esta desconfianza puede causar fuertes daños a las relaciones que hemos cultivado con esmero durante tanto tiempo.\n\nEn esta crítica situación, es esencial que tomemos inmediatamente cartas en el asunto para aliviar sus preocupaciones mientras despejamos cualquier duda que tengan sobre nuestro compromiso con la alianza. Algunas promesas vagas, sobornos y garantías ahora son esenciales para restablecer la confianza y el entendimiento mutuo que una vez caracterizó nuestra cooperación. No debemos subestimar la importancia de esta tarea. Restaurar la normalidad y reforzar la estabilidad de nuestras relaciones diplomáticas actuales será clave para asegurar que nuestra recién alcanzada alianza permanezca fuerte e inquebrantable ante los recientes acontecimientos."
 atom.69.a: "La máscara se cae."
 atom.70.t: "Anarquía aplastada por nuestras botas"
 atom.70.desc: "\"¡SE CREÍAN QUE SIMPLEMENTE PODRÍAN SALIR DE ESTA CON VIDA! ¡BASTARDOS HIJOS DE PUTA!\"\n\nJoseph fue violentamente tomado por los hombres con cara de calavera y sacado del apartamento que él y sus compañeros anarquistas habían utilizado como base de operaciones en la ciudad. Una vez fuera bajo la luz de la luna, Joseph vio al resto de sus camaradas en fila en la calle. A medida que ajustaba más su vista, podía ver la gran cantidad de soldados de la Atomwaffen rodeándolos, con algunos grabando con sus móviles.\n\nJoseph se había dado cuenta de las potenciales consecuencias de que se uniera a la célula anarquista de su ciudad. Sabía que si era capturado, lo más posible era que lo matasen. No. Lo matarían al 100%.\nPero quería otra oportunidad para vivir, y no importaba que tan patético sonara, suplicó a los hombres por su vida. No pasó mucho tiempo para que uno de ellos le soltara un puñetazo en la cara, callándolo al instante. Eventualmente, cuando el último miembro de la célula fue sacado del apartamento, quien Joseph pensaba que era el líder de los soldados le ordenara a él y a sus amigos que se tumbasen boca abajo.\n\nY así, Joseph se puso en posición, colocando la boca en la posición indicada y rezando a cualquier deidad para que le salvase. Cerró sus ojos y trató de ser lo más ruidoso posible al tiempo que las dos primeras personas delante de él se enfrentaron a su destino. No pasó mucho cuando Joseph sintió una inmensa presión en su nuca, presionando sus dientes y rompiéndolos en millones de pedacitos.\n\nPoco después sintió la misma presión otra vez.\n\nY otra.\n\nY otra.\n\nY otra vez."
 atom.70.a: "Otro complot frustrado."
 atom.71.t: "Terrors Exordium"
 atom.71.desc: "En la tierra de los muertos, los vivos están en la cima. Sabemos que estamos solos en este mundo, no queda nada más que odio en nuestros corazones y solo nosotros podemos hacer que el mundo se derrumbe. A medida que se expande nuestro territorio a costa del decadente imperio, se alzan más y más voces disidentes.\n\nLos borregos creen que estamos yendo demasiado lejos: primitivos que solían someter a los débiles a la delincuencia, comunistas que mantienen su aura de caos y por supuesto los agentes de los banqueros internacional. Todos ellos simplemente son el estertor agónico de una civilización moribunda.\n\n¿La solución? La muerte.\n\nSáquenlos de sus camas, sus coches, sus escondites y llévenselos a los campos abiertos de América, dejen que el mundo lo vea, háganles saber que nuestra ira ha llegado para quedarse.\n\nUna montaña de cuerpos que infligirá una herida tal en sus espíritus que se sentirá durante al menos un siglo.\n\nHaremos con ellos una película snuff a nivel nacional, y el mundo será su audiencia."
 atom.71.a: "¡Todos los comunistas sufrirán!"
 atom.72.t: "Revolución en la destrucción"
 atom.72.desc: "Mason se paró en borde del Capitolio de Sacramento, vio a sus leales tropas marchar en formación, y  ocasionalmente veía a uno o dos tanques venir, saludando a la multitud en el arcén de la calle. La multitud estaba conformada por otros soldados leales o ciudadanos que no podían creer lo que estaban viendo, en cualquier caso fue un impulso moral. A su derecha e izquierda había un grupo de soldados encomendados a protegerle. Inicialmente quiso realizar el desfile en San Francisco, pero le aconsejaron que no lo hiciera de forma muy persistente, pues los comunistas y sus lacayos casi seguramente intentarían asesinarlo. Sin embargo, también existía el riesgo en Sacramento, por lo que se le dio protección extra sólo por si acaso.\n\nEl desfile fue como cualquier otro, y le siguió una quema, que destruyó la mayor parte de la historia del Ejército Popular de Liberación Americano, quemando documentos y registros gubernamentales, cuyas cenizas fueron esparcidas por el viento buscando un mejor propósito. Más tarde en ese mismo día, Mason y su séquito se encontraban de camino a una ejecución pública de lo que quedaba del Gobierno del EPLA y de algunos militares destacados, algo que él disfrutaría plenamente.\n\nPero cuando estaba yendo hacia el coche y abriendo la puerta para entrar, fue detenido por una mano en su hombro. Se giró y vio a un hombre joven, que empezó a hablar, dando las gracias a Mason por todo lo que había hecho contra los comunistas y salvarlo de su muerte. El hombre estaba siendo apartado por los guardias de Mason cuando estaba terminando de hablar, pero Mason los detuvo. Caminó hacia el hombre y le dio un apretón de manos, agradeciéndole por sus amables palabras. Se volvió hacia su coche, listo para ver a los últimos elementos de sus enemigos finalmente destruidos."
 atom.72.a: "Cenizas a las cenizas..."
 atom.73.t: "El gobernante reinante"
 atom.73.desc: "El fin de la historia viene en distintas formas y colores, una entropía constante que corrompe toda forma de vida, sin importar cual sea, es una antítesis a la vida misma.\n\nAmbos Gobiernos federales han sucumbido a nuestro odio, Biden; un anciano senil marioneta del capital y del orden, Trump; un golem creado por la pureza y el control. No encontramos a ninguno de los dos, huyendo como ratas del barco que se hunde.\n\nNos preguntamos a cuál isla privada de hedonismo escapan. No importa, en su colapso hemos ganado un nuevo terreno de juego sobre el que podemos descargar nuestra cólera.\n\nAhora todo lo que queda son las últimas contracciones de un cadáver en descomposición."
 atom.73.a: "Nos expandiremos más."
 atom.74.t: "El Congreso Nuclear"
 atom.74.desc: "La Segunda Guerra Civil Americana ha devastado la nación, pero hemos salido más fuertes, listos para forjar nuestra visión desde las cenizas. El Frente Nacional, nuestros supuestos aliados, nos traicionaron en su desesperación por tomar el poder, pero su traición solo fortaleció nuestra determinación. Ahora yacen rotos, dispersos como los restos de un sistema fallido. La División Atomwaffen está sola, una vanguardia del futuro.\n\nHoy, bajo el liderazgo de James Mason, la División Atomwaffen ha convocado el \"Congreso Nuclear\". Esta reunión marca el comienzo de nuestra fase final de preparación: la destrucción sistemática del viejo mundo. La superficie se está pudriendo, infectada de debilidad, y debe ser purgada. Sin embargo, el fuego purificador de la guerra nuclear aún no puede desatarse. Aún queda mucho por hacer.\n\nA la sombra del búnker tenuemente iluminado, Mason nos habla. Sus palabras son claras: antes de lanzar el asalto definitivo al mundo de arriba, debemos preparar nuestras defensas. Debemos reunir los recursos para construir nuestros búnkeres en lo profundo bajo tierra, asegurando que cuando el mundo arda, estaremos seguros en las profundidades. Debemos asegurar los arsenales nucleares necesarios, contrabandeando o robando ojivas de facciones en ruinas, y preparar silos de misiles lejos de ojos curiosos. Nuestros combatientes deben estar entrenados para sobrevivir en un mundo post-apocalíptico y para atacar cuando llegue el momento adecuado.\n\nEl Congreso Nuclear tiene un objetivo: decidir el método y el calendario de nuestras preparaciones. ¿Cuánto tiempo tomará construir nuestros arsenales? ¿Qué tan profundos deben ser nuestros búnkeres? ¿Qué ciudades, qué fortalezas serán nuestros primeros objetivos cuando llegue el momento? Este es el comienzo del fin. Pero el golpe final solo llegará cuando estemos listos.\n\nNo hay lugar para el debate. Nuestro camino está trazado. La única pregunta es cómo procederemos para provocar el renacimiento ígneo del mundo."
 atom.74.a: "El mundo debe arder, pero aún no."
 atom.75.t: "Los aceleracionistas aseguran el poder"
 atom.75.desc: "\"Las disputas matan la causa. Eso es lo que hemos aprendido en los últimos meses. Mientras todos discutíamos por cuestiones doctrinales religiosas insignificantes, nuestros soldados luchaban y morían por la revolución nacionalsocialista en el campo de batalla. ¿Les importaba a qué ídolos adorábamos o qué debían incluir nuestras publicaciones? No lo creo. Gritábamos sobre a qué Dios debíamos rezar antes de las reuniones, en lugar de discutir cómo ganaríamos la guerra. Fue una enorme pérdida de tiempo. Eso se acabó, pueden estar seguros de ello.\n\n\"Hemos tomado medidas estrictas; ya no se permiten tales discusiones. Nuestro propósito central es derrocar a los Gobiernos gánsteres judíos que masacran a los arios en todo el país. Independientemente de la religión que profesemos o de cómo queramos hacerlo, todos queremos lo mismo; una sociedad nacionalsocialista. Seamos claros; somos nacionalsocialistas ante todo. Nuestra revolución es política, no estamos aquí para revivir espiritualmente al país ni nada por el estilo, eso déjenlo a los predicadores. Estamos aquí para derrocar al judío y a sus útiles idiotas.\n\n\"Hablo en nombre de toda la División cuando digo que ya no nos enfocamos en tonterías místicas. Queremos llevar el hitlerismo a este país por encima de todo. Lucharemos en las calles y en los campos para que la esvástica ondee sobre esta nación, para que un verdadero gobierno pro-blanco pueda gobernar por primera vez desde 1945. Las distracciones se han dejado de lado, vamos por ellos\"."
 atom.75.a: "¡Heil Hitler! ¡Hail Mason!"
 atom.76.t: "Los cristianos aseguran el poder"
 atom.76.desc: "\"Mis compañeros nacionalsocialistas, hermanos en armas, arquitectos de un nuevo mundo; me presento ante vosotros con noticias dolorosas. Un Bruto estaba entre nosotros, preparando el derrocamiento de este gobierno para tomar el poder él mismo. Sin embargo, misericordiosamente, por la providencia de Dios, fue descubierto. Su nombre será desde ahora infame, donde, lamentablemente, antes se tenía en gran estima. Joshua Sutter ha muerto, y afortunadamente las horribles doctrinas que promovía han muerto con él. Sus cómplices han sido liquidados, y los pocos que quedan han huido al territorio enemigo, para contar historias de desgracia y opresión.\n\n\"En tiempos como estos, uno podría caer en la autocompasión y la recriminación. Sin duda, se debe sentir una profunda herida de traición, que tomará tiempo sanar, o sentir una justa ira profunda y buscar venganza contra quienes los engañaron. Sin embargo, no permitiremos que el dolor y la ira guíen nuestra mano, sino las santas palabras de Jesucristo, de perdón para el arrepentido y castigo para el culpable. Nuestra mano será firme, ya sea sobre el gatillo o el mazo.\n\n\"Con la muerte del traidor, el liderazgo de la División recae completamente a mis pies. Cuando partí por primera vez de mi antiguo hogar al estallar esta conflagración purificadora que ahora envuelve a este país pecador y embriagado, nunca podría haber imaginado los éxitos salvajes que hemos encontrado; la conciencia racial del pueblo ha despertado como nunca antes; se está construyendo una verdadera comunidad aria; y el ala armada del Partido está totalmente dedicada a la causa. Creo firmemente que lograremos la victoria, pero no solo a través de rifles y bombas, sino mediante verdaderos ideales cristianos, propagados entre el pueblo para que ese glorioso día llegue.\n\n\"Asumo el liderazgo de la División, en el nombre de Dios Padre, del Hijo y del Espíritu Santo. Las palabras del Salvador serán mi guía, y las seguiré lo mejor que mi cuerpo imperfecto me permita\"."
 atom.76.a: "Adelante."
 atom.77.t: "Membresía en el Frente Nacional asegurada"
 atom.77.desc: "Nuestra invitación al Frente Nacional ha sido una agradable sorpresa para nosotros. No obstante, nuestra aceptación de la invitación nos ha brindado varias formas de fortalecer nuestra División. El Frente Nacional en sí es obviamente una alianza, donde todos los miembros operan bajo la misma lealtad para cumplir el objetivo final de reunificar América. Esto también significa que en varias áreas, la seguridad de las armas, vehículos y equipos puede no ser tan estricta cuando se está dentro de territorio amigo. Aprovechando este hecho, podemos agotar el stock de equipo de nuestros aliados mientras complementamos el nuestro. En otros casos, también se nos puede dar la oportunidad de robar dinero o planos pertenecientes a los miembros de la alianza mediante suplantación, hackeo o adquisición directa.\n\nDicho esto, actos como estos garantizan atraer sospechas. Nuestros aliados no son tontos, y casi con seguridad albergan resentimiento hacia nosotros debido a nuestras ideas y valores. Si no logramos suprimir estos pensamientos, compensando nuestros actos subversivos mediante compromiso político, garantías y ejercicios conjuntos, podemos encontrarnos en serios problemas con nuestros aliados. Enfrentando la expulsión total o la guerra."
 atom.77.a: "Es hora de ponerse la máscara."
 atom.78.t: "Los buenos"
 atom.78.desc: "Era un aburrido día para un pequeño escuadrón de soldados de la Atomwaffen; habían estado patrullando toda la mañana y en vez de poder contemplar la belleza del cielo tenían que ir por los densos bosques justo a fuera de su FOB. Con el fin de que el tiempo se les pasara más rápido, uno de los soldados entabló una pequeña conversación con su amigo.\n\n\"He oído que pronto nos marcharemos, probablemente para tomar acción contra algún pueblo que no se rindió\".\n\n\"Si te soy honesto, me estoy empezando a cansar de matar civiles inocentes. Que vale, que deberían haberse rendido cuando tuvieron la oportunidad, pero no me llega a convencer el procedimiento de matar a todo lo que se mueva. No le encuentro ningún sentido\". respondió el soldado.\n\"No estas solo en eso. Personalmente no me gusta que nuestro líder de compañía sea un satanista\".\n\n\"Por Dios, como odio a esa gente. El hecho de que tengan poder en el Gobierno me sigue sorprendiendo. O sea, puedo entender que den poder a los cristianos o a los aceleracionistas. Pero dárselo a un grupo cuyos ideales se resumen en «mata a todo lo que se mueva» es una estupidez\".\n\n\"Yo digo que deberíamos intentar que el líder de la compañía renuncie o sea destituido\", dijo un soldado\n\n\"Sería difícil, pero si tienes un plan te ayudaría encantado\".\n\nA medida que avanzaba la conversación, los soldados discutían el plan. Al final, decidieron que una vez que tengan a más personas de su lado, rechazarían seguir cualquier orden del líder de la compañía hasta que este renuncie. Sabían que eso sería casi imposible, pero confiaban en que si tenían a suficiente gente de su lado, podrían hacer lo imposible posible otra vez."
 atom.78.a: "Una minoría, que pronto será mayoría."
 atom.79.t: "Bárbaro"
 atom.79.desc: "Un joven Rafael Botero había soñado alguna vez con una carrera militar, imaginándose en un papel disciplinado y honorable. Sin embargo, la cruda realidad del colapso económico y el caos subsiguiente en América lo empujaron por un camino mucho más oscuro. Sus aspiraciones se hicieron añicos y, impulsado por la aplastante carga de las deudas de su familia, se vio obligado a unirse a la MS-13, una elección nacida de la desesperación más que del deseo. El mundo de la pandilla era brutal e implacable, un contraste marcado con el noble servicio que alguna vez había imaginado. Ahora, las consecuencias de esas decisiones eran dolorosamente claras. Botero estaba en las garras de los soldados de Atomwaffen, su agarre en sus brazos era firme e inquebrantable. Las figuras enmascaradas se cernían amenazantes a su alrededor, sus ojos fríos carentes de simpatía. Uno de los soldados, con un tono que insinuaba crueldad casual, planteó la pregunta: \"¿Qué deberíamos hacer con él?\" El encogimiento de hombros indiferente del otro soldado solo aumentó la sensación de presagio.\n\nMomentos después, se sugirió una idea sombría y, con ella, Botero se encontró frente a todo un escuadrón de soldados de Atomwaffen. Su corazón latía con fuerza mientras lo apuntaban con un arma, la amenaza de muerte pesando en el aire. Los soldados, encontrando un placer perverso en su sufrimiento, le entregaron un par de bongós. El juego cruel era simple: debía tocar los tambores todo el tiempo que pudiera soportar, o enfrentar las terribles consecuencias de su ira. Sin otra opción que obedecer, Botero comenzó a tocar. A medida que la noche avanzaba y las horas se prolongaban hasta la madrugada, el desgaste físico se volvió insoportable. Sus brazos, ya cansados, comenzaron a ceder bajo la tensión. Sus manos, magulladas y heridas, sangraban y palpitaban mientras el incesante tamborileo continuaba. Cada golpe traía nuevas oleadas de dolor, y el ritmo que antes era simple se convirtió en una prueba agonizante.\n\nFinalmente, el agotamiento lo venció. Sus brazos, ahora casi inmóviles y cubiertos de moretones ensangrentados, cayeron pesadamente sobre los bongós. Miró hacia abajo, su visión borrosa por las lágrimas y el dolor, y cerró los ojos con una resignación que lo decía todo. El golpe rítmico de los bongós cesó, y con él, un silencio profundo cayó sobre el sombrío espectáculo."
 atom.79.a: "Hasta que una bala perforó su cerebro, liberándolo de su dolor."
 atom.80.t: "Misericordia demente"
 atom.80.desc: "Leeah era solo una pequeña niña cuando su pueblo en desarrollo cayó bajo el yugo de la División Atomwaffen. Incluso tras eso, ella no tenía mucha idea de lo que pasaba fuera de su pueblo. Los primeros días tras la ocupación, en los que las fuerzas de la División seguían luchando por las afueras del pueblo y nadie había llegado a desconectar el internet en el pueblo, fueron los únicos días en que el internet estaba disponible. Tras estos días, y con toda comunicación con el exterior cortada, Leeah pasaba la mayor parte de su día en su casa, jugando con sus juguetes y asomándose a la ventana con vista a la plaza del pueblo, antaño siempre llena, ahora vacía, con la única presencia de hojas y animales callejeros. Podría decirse que ahora su vida era una aburrida.\n\nTodo esto cambiaría un día cuando miró por la ventana, y en vez de ver la plaza vacía de siempre, vio a un pequeño grupo de hombres enmascarados, presumiblemente aquellos los que su madre la advirtió de evitarlos si los veía. El grupo había preparado un pentagrama en el centro del pueblo y, hasta lo que podía ver Leeah, únicamente estaban parados alrededor de este. Hasta que empezaron a moverse, separándose en tres grupos, cogiendo sus rifles, y marchando hacia el bloque de apartamentos más cercano. Siendo uno de estos el edificio de Leeah.\n\nPoco después, Leeah estaba escondida en el armario y en su apartamento solo podía escucharse llantos y gritos de terror. No se atrevió a salir del armario, ni siquiera a abrir los ojos hasta que cesaron los gritos, tras lo cual salió y se arrastró hacia la ventana. Mirando de nuevo observó no solo al grupo original, si no que también observo uno nuevo, conformado principalmente por gente de su apartamiento. Hubo una persona a la que reconoció casi inmediatamente, era su antiguo pastor, el Sr. Popper, quien también era la persona más cercana al pentagrama. Miró horrorizada como fue empujado al centro del pentagrama, y posteriormente apuñalado repetidamente, hasta que colapsó con sus ojos en blanco y con la sangre de sus heridas filtrándose en el cemento."
 atom.80.a: "Tras ver esto, ella no pasó una buena noche."
 atom.81.t: "Las Tierras Bajas"
 atom.81.desc: "La transformación está completa. Los Estados Unidos han renacido como el Imperio del Eón Final, un reino forjado en la oscuridad y gobernado por la Orden de los Nueve Ángeles. Bajo el puño de hierro de Joshua Sutter, esta nación que alguna vez fue grande es ahora la encarnación viviente del caos y el terror, un reflejo de la visión satánica de la Orden.\n\nLos símbolos de la democracia y la debilidad han desaparecido hace mucho tiempo. En su lugar se alzan altares de sangre y fuego, donde se realizan rituales para celebrar nuestro dominio. Las calles están adornadas con los sigilos de la Orden, brillando con la promesa de sufrimiento y renacimiento. Ya no somos una mera facción; somos los arquitectos de una nueva realidad: una teocracia oscura donde los fuertes reinan supremos y los débiles son purgados.\n\nJoshua Sutter está al mando de este imperio infernal, con una visión clara: el Imperio del Eón Final debe extender su influencia por doquier. El viejo mundo es un recuerdo lejano, reemplazado por una sociedad donde el dolor es moneda y el sacrificio un deber sagrado. Los débiles que una vez gobernaron esta tierra han sido descartados, sustituidos por seguidores leales de la Orden que imponen su voluntad mediante el miedo y la brutalidad.\n\nEn cada rincón de nuestro territorio, los ecos del antiguo régimen son silenciados. Los disidentes son perseguidos, sus destinos sellados en las llamas de nuestros rituales. El Imperio prospera con el sufrimiento, extrayendo fuerza de la agonía de quienes se oponen a nosotros. Cada día, forjamos lazos más profundos con lo infernal, asegurando que nuestro poder crezca con cada sacrificio hecho en nuestro nombre.\n\nEsto no es solo un nuevo Gobierno; es un renacimiento. El Imperio del Eón Final no descansará hasta que todo el mundo se incline ante nuestra visión del infierno en la Tierra. Somos la vanguardia de una nueva era: una época oscura donde la Orden de los Nueve Ángeles reina suprema y las viejas formas son extinguidas para siempre."
 atom.81.a: "¡Juicio eterno!"
 atom.82.t: "En el mundo"
 atom.82.desc: "Nuestros objetivos de liberar y conquistar los ex-Estados Unidos se han logrado a pesar de desafíos significativos y formidables. Contra todo pronóstico, hemos tenido éxito en nuestra misión. Sin embargo, esta victoria introduce una serie de complicaciones adicionales que deben ser gestionadas.\n\nPrevisiblemente, la comunidad internacional está descontenta con nuestro éxito. Los líderes mundialistas, preocupados porque nuestro régimen representa un precedente peligroso, podrían considerar formar una coalición en nuestra contra si perciben que nuestra influencia es una amenaza creciente. Aunque en el pasado hemos logrado lo imposible, enfrentarnos a una coalición de naciones equipadas con tecnología avanzada y ejércitos fuertes representa un desafío formidable, especialmente al salir de nuestro reciente conflicto. Si bien hemos triunfado sobre adversarios decididos antes, la guerra civil nos enfrentó principalmente a fuerzas desmoralizadas, milicias mal equipadas o lacayos fácilmente manipulables.\n\nA medida que avanzamos en nuestra reconstrucción y reforma posguerra, debemos mantenernos conscientes del panorama geopolítico. Nuestras decisiones no estarán completamente restringidas, pero la diplomacia estratégica, las negociaciones a puerta cerrada y la toma de decisiones cuidadosa serán cruciales. Al gestionar las percepciones internacionales y evitar la amenaza de guerra, podemos posicionarnos de manera más favorable en el escenario global, haciendo que cualquier guerra futura en la que participemos comience cuando estemos en la posición adecuada para hacerlo.\n\nTratar nuestras decisiones como si estuviéramos sobre un escenario será crucial en nuestros esfuerzos futuros. Debemos mantener contento al público y, si no lo logramos, el público podría tomar la iniciativa de removernos."
 atom.82.a: "Una representación teatral y un acto de equilibrio."
 atom.83.t: "El fin del comandante James Mason"
 atom.83.desc: "Durante toda su vida, Mason tuvo sueños, aspiraciones. Tenía un objetivo en la vida, y estaba tan cerca de lograrlo. Pero todo le fue arrebatado en cuestión de momentos. Recordó cuando lo apuntaron con un arma, cuando le arrojaron una bolsa sobre la cara, cuando lo metieron a la fuerza en un coche y, finalmente, cuando lo llevaron a esta celda maldita. Durante quizá cuatro días había estado consumiéndose allí dentro, recibiendo solo la suficiente agua para sobrevivir, pero sin comida alguna. Había estado sentado en la celda, con las manos atadas con una cuerda, esperando lo que fuera que sucediera después. Sabía que no sería nada bueno; algo en estar encerrado en una celda no le auguraba buenas noticias.\n\nFinalmente, escuchó pasos acercándose a la celda. Esperaba ver al soldado de siempre, que le lanzaría una botella de agua para mantenerlo con vida, o a alguno que llegara riendo a carcajadas, tal vez con algunos otros, solo para tomar una foto del estado cómico de Mason. Pero no era ninguno de esos.\n\nMason miró a la figura. Sus ojos se abrieron de par en par.\n\n\"Sutter\".\n\nSutter sonrió a Mason y abrió la puerta de la celda, cerrándola tras de sí antes de hablar.\n\"Hola... Mason\"."
 atom.83.a: "El temor hecho carne."
 atom.84.t: "América, bajo asedio"
 atom.84.desc: "Lo tan esperado finalmente ha comenzado. En las últimas horas, numerosos informes de ataques aéreos, bombardeos y ataques con misiles han comenzado dentro de nuestra nación, mientras que los asaltos y movimientos enemigos han empezado a cruzar nuestras fronteras. Con toda esta información, combinada con el hecho de que la guerra se ha esperado durante mucho tiempo, es seguro decir que la División Atomwaffen ha sido oficialmente atacada por las naciones del podrido Hemisferio Occidental.\n\nLa coalición contra nosotros ha declarado que su justificación para esta guerra injusta es \"eliminar un Gobierno terrorista, opresor y potencialmente capaz de acabar con el mundo\". Esta afirmación, aunque contiene algo de verdad cómica, solo sirve para recordar a la coalición lo que realmente han hecho: que sus objetivos idiotas de una paz distorsionada solo han llevado a más guerra y violencia. Pueden pensar que sus ejércitos, fuerzas aéreas y armadas son fuertes, pero serán masacrados una vez que realmente enfrenten a nuestras fuerzas. Una guerra librada a lo largo de los ex-Estados Unidos será una tarea desafiante para cualquiera, incluyendo a nosotros mismos en el pasado, y tomaremos esta ventaja con gusto. Cada ciudad que intenten capturar será una batalla agotadora y de desgaste. Las poblaciones que encuentren no los recibirán con los brazos abiertos, sino con desprecio, ya que solo les traerán más sufrimiento. Los cielos sobre nosotros se llenarán de humo negro y estallidos naranjas de llamas mientras los aviones son interceptados por nuestra defensa aérea y fuerza aérea. Los océanos se convertirán en la próxima Arabia Saudita, llenos del petróleo de barcos hundidos, y los cuerpos de las tripulaciones servirán solo como alimento para los animales acuáticos que habitan en ese ecosistema.\n\nNuestra guerra será una causa de liberación y resistencia mientras llamamos a todos los arios a luchar contra los malvados poderes imperialistas que desean destruir nuestra raza. Deseábamos un futuro mejor y más puro, uno que no habría incluido conflicto si la guerra no se hubiera declarado tontamente contra nosotros. Pero, por desgracia, los líderes incompetentes y seniles de Occidente no son conocidos por su intelecto. Así que si debemos ser nosotros quienes les recuerden su lugar, que así sea. No retrocederemos, y no negociaremos. O ganamos, salvando nuestra raza. O la última esperanza de paz de la Tierra morirá, llevando al mundo con ella a su tumba."
 atom.84.a: "Bellum internecinum!"
 atom.85.t: "La Guerra de Liberación Aria"
 atom.85.desc: "En un giro sorprendente de los acontecimientos, la Alianza de Restauración Americana ha emitido un comunicado conjunto condenando al Orden Nacionalsocialista de América, el régimen que actualmente controla los territorios de los ex-Estados Unidos, como un \"régimen terrorista\" que ha violado flagrantemente numerosas leyes internacionales, incluyendo violaciones de los derechos humanos, expansión territorial agresiva y actos de genocidio. La ARA declaró que tal gobierno representa una amenaza intolerable para la paz y la estabilidad global, y, por lo tanto, no puede permitirse que continúe en el poder. Pocos momentos después de esta declaración, la situación se intensificó dramáticamente, con fuertes bombardeos y ataques coordinados a lo largo de toda la frontera del ONSA, marcando el inicio de una ofensiva militar significativa contra el régimen. Los informes indican que estos ataques iniciales fueron rápidamente seguidos por ataques estratégicos con misiles y sabotajes ubicados en lo profundo del territorio del ONSA, dirigidos a instalaciones militares clave, infraestructuras y centros logísticos, en un aparente esfuerzo por debilitar la capacidad del régimen para defenderse o lanzar contraataques.\n\nEl ONSA ha respondido con fuerza al reciente anuncio, emitiendo una declaración feroz en la que perciben que se ha librado una \"guerra de exterminio\" contra todas las personas de ascendencia aria. En su comunicado, el ONSA ha presentado esto como una amenaza existencial, enfatizando que los arios están bajo ataque directo de una coalición de exterminadores. Como resultado, la organización ha llamado a cada individuo con herencia genética aria a levantarse, tomar las armas y participar en lo que denominan la \"Guerra de Liberación Aria\". Instan a sus seguidores a movilizarse, uniéndose en una resistencia armada para defender lo que consideran la supervivencia de su raza frente a la opresión y agresión percibidas de poderes externos."
 atom.85.a: "El mundo observa con el aliento contenido."
 atom.85.b: "Totaler Krieg!"
 atom.86.t: "Endsieg"
 atom.86.desc: "Mientras la culata del rifle golpeaba por encima de la cabeza del personal de Kings Bay, su interrogador encendió su tercer cigarrillo de la noche. Mientras yacía allí retorciéndose de dolor por la paliza que acababa de recibir, comenzó a llorar. Las lágrimas rodaban por un lado de su rostro y empezó a toser sangre. Poco después, la paliza continuó y él siguió llorando; el dolor se había vuelto insoportable para él. Ya había sentido cómo se le rompían dos costillas, y por un breve momento de dicha, las palizas cesaron. \"¿Cuáles son los códigos de lanzamiento nuclear?\" exigió su interrogador. Tras más patadas en el pecho, la pregunta se repitió. Sin respuesta, el interrogador lo golpeó de nuevo, repitiendo la pregunta palabra por palabra mientras le daba patadas continuamente en el pecho y la cara. Mientras jadeaba por aire, su guardia se agachó junto a él y le preguntó una vez más. \"¿Cuáles son los códigos de lanzamiento nuclear?\" \"Yo... no lo sé...\" respondió el personal tras un breve silencio. Cuando el guardia levantó su arma hacia la cabeza del prisionero, este comenzó a gritar. \"¡Espera! Espera... yo... no los sé... ¡Pero puedo llevarte a ellos!\" Tras guardar su arma, el guardia agarró al prisionero del brazo y lo obligó a seguirlo por el pasillo, tomando los diferentes giros en cada corredor que el prisionero indicaba. Finalmente, llegaron a un archivador polvoriento. \"Cajón inferior... fondo falso...\" Inmediatamente, el prisionero se desplomó en el suelo y los guardias comenzaron a buscar los códigos de lanzamiento. Tras retirar el fondo falso, encontraron un solo documento que los guardias abrieron rápidamente. Al mirar dentro, un guardia se volvió hacia el otro y ordenó a sus hombres que contactaran con Mason en persona. \"Dile a Mason que tenemos los números\". Cuando sus subordinados lo dejaron, el guardia se quedó mirando los códigos que traerían la victoria final."
 atom.86.a: "39804206..."
 atom.87.t: "Uno hablará"
 atom.87.desc: "Cinco miembros del sitio de lanzamiento de Kings Bay estaban sentados en el suelo, todos tenían al menos una parte del cuerpo rota y todos tenían un arma apuntando a la cabeza. Esto había estado ocurriendo durante horas, la misma pregunta repetida resonando por los pasillos con la misma respuesta. Tomando una profunda respiración, el interrogador principal encendió un cigarrillo y se lo puso en la boca. Exhalando el humo en las caras de sus rehenes, volvió a hacer la pregunta\".¿Cuáles son los códigos de lanzamiento nuclear?\" Silencio. Dando otra calada a su cigarrillo, preguntó lo mismo. Silencio. Al tercer calada, el cigarrillo se terminó, y volvió a hacer la misma pregunta. Un pequeño jadeo vino de uno de los miembros del personal, lo que llamó la atención de los guardias. Agachándose, el interrogador miró al hombre a los ojos y le habló. \"Me lo vas a decir, ¿verdad? ¿Cuáles son los códigos de lanzamiento nuclear?\" El prisionero abrió la boca brevemente, pero la cerró rápidamente antes de escupirle en la cara al guardia. Tras limpiarse la saliva, el guardia comenzó a reírse y poco después su prisionero también. Momentos después, una bala se alojó en la glabela del prisionero. Se desplomó hacia la izquierda y cayó al suelo. \"Ejecutadlos a todos\". Segundos después, los cinco miembros del personal yacían muertos contra la pared y el guardia sacó otro cigarrillo."
 atom.87.a: "Hablarán... eventualmente."
 atom.88.t: "Una pérdida de tiempo"
 atom.88.desc: "Estaba atado a la silla, a su alrededor había tres hombres vestidos de negro y frente a él, un cuarto. No podía distinguir muchos detalles de este último, ya lo habían golpeado hasta el punto de que ya no podía ver con su ojo derecho. Mientras la sangre le brotaba de la boca, la pregunta se repitió por lo que parecía ser la centésima vez. \"¿Cuáles son los códigos de lanzamiento nuclear?\" Con su ojo que aún funcionaba, miró hacia su captor y escupió la sangre que había acumulado en los últimos segundos; al escupir, también salió una de sus muelas. Su silencio fue respondido con el culatazo de un rifle en la mejilla izquierda, lo que lo hizo caer de la silla y desplomarse en el suelo. \"¿Cuáles son los códigos de lanzamiento nuclear?\" La voz volvió a sonar, esta vez con un tono más autoritario. Sin embargo, como en incontables ocasiones antes, no respondió. Su silencio fue nuevamente recibido con violencia; una patada rápida en las costillas hizo que un charco de sangre brotara de su boca. Sacudiendo la cabeza, el interrogador hizo una señal a dos de los tres hombres para que se llevaran al hombre. \"Llévenselo y ejecútenlo\". Para entonces, el hombre tenía poca energía y no podía ofrecer más que algunos gemidos de resistencia. Cuando lo dejaron caer al suelo una vez más, un solo disparo resonó por los pasillos de Kings Bay y, como un reloj, los dos guardias se dirigieron a recoger al siguiente prisionero."
 atom.88.a: "Solo hace falta que hable uno."
 atom.89.t: "§RMÚLTIPLES LANZAMIENTOS DETECTADOS§!"
 atom.89.desc: "NORAD acaba de detectar docenas de lanzamientos de misiles frente a la costa este de los ex-Estados Unidos en varios emplazamientos de misiles nucleares. Solo podemos suponer que la División Atomwaffen logró obtener los códigos de lanzamiento y los disparó contra objetivos importantes."
 atom.89.a: "Santo Dios..."
 atom.90.t: "El segundo sol"
 atom.90.desc: "PASADENA\n\"Se ve bien, va bien. Estamos obteniendo excelentes imágenes aquí en el control de la NASA en Pasadena\".\n\nPASADENA\n\"¿Qué tal eso, Bermuda? Espera, un momento, estoy recibiendo una señal de no-go. Estoy perdiendo una de las naves. Oye Bermuda, ¿lo estás recibiendo?\"\n\nBERMUDA\n\"No, he perdido todo contacto. Mucho polvo levantándose allá arriba\".\n\nPASADENA\n\"He perdido la segunda nave. Tenemos problemas\".\n\nBERMUDA\n\"Todo contacto perdido, Pasadena. Quizás las antenas-\"\n\nPASADENA\n\"¿Qué es ese resplandor? ¿Lo ves? Un resplandor naranja que viene de Washington. Hay más en Texas, Florida... ¿Lo ves, Bermuda? Responde, Bermuda\".\n\nPASADENA\n\"Houston, responde... ¿Qué está pasando...?\"\n\nPASADENA\n\"Estación de seguimiento 43, Camberra, responde Camberra... Estación de seguimiento 63, ¿me escuchas, Madrid?\""
 atom.90.a: "¿Alguien puede oírme?"
 atom.92.t: "Noches de Boston"
 atom.92.desc: "\"Durante demasiado tiempo, Thomas Rousseau y sus lacayos se han conformado con medias tintas y compromisos. Ha dado la bienvenida a exrepublicanos en su Gobierno, mientras que ha rechazado a los defensores blancos más comprometidos. Mientras tanto, nuestros ineficaces medios de comunicación se deshacen en elogios a cada discurso ridículo que pronuncia ante nuestro Congreso inoperante, sin mencionar estos errores obvios y perniciosos\".\nEl orador estaba en el lugar correcto en su aparición inmediata. Vestía un traje, confeccionado localmente. Hablaba con un marcado acento bostoniano, algo habitual. Pero hablaba con tanta electricidad, una energía que aceleraba el corazón de los presentes y dejaba la mente en blanco. Pocos estaban dispuestos a criticar al Gobierno tan abiertamente, con informantes siempre presentes.\n\n\"Justo ayer, el alcalde de Worcester fue acusado de un plan para aumentar los impuestos a las fuerzas armadas, utilizando sus ganancias ilícitas para tomar vacaciones en una estación de esquí en Vermont. Esta no es la primera vez. Los hombres en el frente, sus hijos, no luchan para darles vacaciones a los burócratas. Son revolucionarios que construyen una nueva sociedad\".\nEl hombre hizo una pausa, recorriendo la sala con la mirada.\n\n\"Nuestros camaradas del Sur llevan mucho tiempo expresando su preocupación por el retroceso de este Gobierno. Nuestras fuerzas en Florida no toleran a los malversadores, no recompensan la incompetencia ni dejan desolados los pueblos industriales donde atraen a hombres; solo espero que Rousseau aprenda de ellos. Espero que aprenda el valor de disparar contra criaturas tan conspiradoras como quienes se hacen llamar nuestros representantes. Espero que aprenda que permitir que las organizaciones de color se organicen en nuestra política es intolerable. La esperanza es todo lo que nos queda, sabiendo de quién se rodea\".\nLa sala rugió de aprobación; el hombre sonrió levemente.\n\"¡[ATW.GetLeader] nunca permitiría esto, eso se los puedo asegurar!\""
 atom.92.a: "La verdad suena alto y fuerte."
 atom.93.t: "Soldados de juguete"
 atom.93.desc: "En un parque en Florida, un gran grupo de niños estaba intentando pasar el rato. Reír, hablar y jugar eran algunas de las cosas que esos críos hicieron. Sin embargo, todo el barullo de los niños cesó con un alto y claro \"¡Aufmerksamkeit!\"\n\nEste silencio fue efímero, rompiéndose con un \"¡Formen filas!\" Los niños rápidamente se organizaron en fila india con 5 niños por línea sin decir ni una palabra. Con los niños en fila, un hombre vestido con un atuendo negro y una característica máscara de calavera empezó a inspeccionar detenidamente la formación. Una vez que acabó la inspección, caminó hacia un escenario en frente de los niños, \"¡Están aquí a pedido de sus heroicos padres! ¡Durante este primer día de nuestro programa de cinco días aprenderán a como defenderse a sí mismos en el combate cuerpo a cuerpo, estudiarán las nociones básicas sobre el uso de armas de fuego y nos ayudarán a conseguir un futuro mejor-"
 atom.93.a: "-¡POR LA DIVISIÓN ATOMWAFFEN!\""
 atom.94.t: "Una fruta extraña"
 atom.94.desc: "Sin entrar en detalles, Mack A Zoe no estaba en su mejor momento como líder de Zoe Pound. Al principio todo fue bien, con su banda ganando un pedazo de territorio en Florida tras que el Gobierno en D.C perdiese el control de la mayoría de Estados Unidos. Sin embargo, con el tiempo el ambicioso cabecilla de la pandilla se encontraba en una situación cada vez más precaria, ya sea por las cada vez más comunes derrotas militares o por la ganancia por parte de pandillas rivales de apoyo entre la población. Su captura fue el último clavo de su tan esperado ataúd. Ahora estaba \"paseando\" por las calles de su Miami mientras soldados de la División Atomwaffen le insultaban y lanzaban piedras mientras realizaba su paseo de la vergüenza.\n\n\"Por qué debe de terminar así...\" dijo un deprimido Mack.\n\n\"Cállate pedazo de basura, estamos a punto de llegar con nuestro líder y entonces él decidirá lo que haremos contigo.\" Dijo el soldado de la Atomwaffen que le escoltaba.\n\nFinalmente llegaron a la tienda de campaña de Brandon Russell, Mack fue obligado a arrodillarse hasta que Brandon hiciese su decisión. Y tras unos segundos de silencio, el destino de Mack fue sellado.\n\n\"Decapitenlo del mismo modo que uno le quita la cabeza de una banana, y cuélguenlo junto a su personal más cercano en el banano de Bayside.\""
 atom.94.a: "Esta fruta, sin embargo, no volverá a crecer."
 atom.95.t: "Gritos del Sur"
 atom.95.desc: "A través de los pantanosos y húmedos páramos, cargados de minas terrestres, más allá de los campamentos avanzados, habían huido los impíos guardianes del caído régimen tribal de Florida cuando el fuego justo de Atomwaffen abrasó su manchada edificación: Georgia. Las fronteras de las satrapías del Imperio Sionista eran artificiales, artefactos de un tiempo ya pasado, albatros alrededor del cuello de los revolucionarios con visión de futuro. James Mason miró al otro lado de la frontera y pensó.\n\n\"¿Cuánta resistencia crees que podríamos encontrar si avanzamos hacia Savannah?\"\nMason señaló el mapa trazado apresuradamente. Sus comandantes se movían incómodos bajo el húmedo sol del mediodía, encontrando poco alivio en la tienda levantada a toda prisa, y por ello no estaban de humor para planes descabellados.\n\"Bastante, señor. Creemos que los federales comenzarán ataques aéreos en cuanto salgamos de Florida. No esperaban que llegáramos tan lejos\".\nMason asintió, caminando alrededor de la mesa. En el mapa estaba representado todo el Sur, en toda su vastedad. Grandes ciudades, ciudadelas del Gobierno de ocupación Sionista como eran, tentaban con su industria y riqueza. ¿Cuántos simpatizantes habría allí, y en las deprimidas y racialmente divididas tierras interiores que las rodeaban?\n\"El aire... es un problema. Sin embargo, creo que si mantenemos una estructura basada en batallones dispersos, podemos compensarlo lo suficiente\".\n\"Señor, creo que deberíamos ignorar a los federales. ¿A quién le importa si nos ametrallan? Vamos a los pueblos y ciudades. Maniobramos entre los refugiados. No quieren más mala imagen\".\nBrandon Russell, que estaba sentado en una silla revisando chats de Telegram que llegaban de todo el frente, habló de repente y todos se volvieron. Mason sonrió con suficiencia.\n\"Exacto, Brandon. Llegas al meollo tan rápido. Nos mantenemos divididos y vamos a las zonas urbanas. Ciudad por ciudad...\" Mason trazó con el dedo sobre Georgia, luego señaló todos los demás estados."
 atom.95.a: "Toda la región caerá."
 atom.96.t: "Fin de la conversación"
 atom.96.desc: "James Mason no estaba pasando una buena mañana. Había programado una reunión con algunos de sus principales oficiales para discutir el futuro de la División Atomwaffen, o más precisamente, como definir su ideología. Al principio la reunión fue bien con todos los oficiales dando pequeñas charlas preparadas previamente como la parte más profesional de la reunión. Sin embargo, cuando empezaron a conversar sobre la ideología del movimiento rápidamente la reunión se tornó más frustrante de lo que hubiese deseado.\n\nCada vez que una persona se le ocurría una idea que parecía que empezaba a ganar algo de tracción, otra persona saldría de la nada para criticar la idea y mandar a todo el mundo a la casilla de salida. Y personalmente, Mason estaba hartandose de eso. Tenía otros asuntos pendientes para el resto del día por lo que no podía permitir que la reunión se alargase demasiado, pero no veía la oportunidad para concluirla adecuadamente. Con la reunión volviéndose más y más repetitiva, sentía que su enfado crecía lentamente.\n\nEsto siguió así hasta que un hombre se levantó y gritó: \"¡Deberíamos seguir el camino al fascismo de David Bowie!\"\n\nToda conversación se interrumpió y todo el mundo dirigió lentamente su mirada al hombre. Estaba por explicar su idea cuando sintió el frio metal de la Luger de Mason golpear su nuca, y antes de que pudiese decir nada, todo su mundo se tornó oscuro."
 atom.96.a: "\"Continuaremos esta reunión mañana\", dijo fríamente Mason."
 atom.97.t: "Perdición"
 atom.97.desc: "Ojos fríos y lechosos, y manos marchitas y callosas reposadas sobre su pecho. Su cabello se extendía en su cabeza como un charco, retorcido y cubierto de sangre seca. En conjunto, estaba pálido, demacrado y empezaba a oler mal.\n\nJames Mason miraba fijamente el cuerpo de su antiguo discípulo, su teniente más confiable y querido. Sin embargo, el cadáver arrugado que yacía a sus pies no era un mártir. Mason lo sabía demasiado bien.\n\n\"Según sus indicaciones, señor. Lo abatimos en los pantanos, intentamos infundirle el miedo de Dios, pero ni siquiera dijo una palabra. Lo intentamos durante una hora. Tuvimos que hacerlo...\"\n\"Lo sé\".\nLa voz de Mason era un áspero susurro frío. Repitió la frase, lanzando una última mirada desolada al cuerpo, antes de darse la vuelta.\n\"¿Y los otros?\"\n\"Todos tratados, señor. Uno de ellos chilló como un cerdo y suplicó besar una Biblia. El resto fueron como Jo- Sutter\".\nEl soldado tragó saliva. Casi había usado el nombre del cadáver, casi actuando como si aquello que se descomponía a sus pies hubiera sido alguna vez un amigo. El leve tic en la mejilla de Mason confirmó sus temores.\n\"Hmm. Bueno, el problema principal está resuelto. Ocúpate de esto. Tengo que ir antes que los hombres\"."
 atom.97.a: "Y así se fue."
 atom.98.t: "DeSanctimonious"
 atom.98.desc: "Un hombre, aún con el traje formal que se había puesto la noche antes de su esperada evacuación -a Denver, a Washington, a cualquier lugar, no le importaba- yacía hecho un montón en la sofocante celda. No se movía, su respiración era lenta y áspera. Un solo rayo de sol entraba por una ventana justo encima de su cabeza, el haz iluminando lenta y suavemente sus ojos.\n\nEl gobernador, bueno, el exgobernador Ron DeSantis despertó. Saboreó sangre. La herida del puñetazo que había recibido la noche anterior aún no había sanado. Se levantó lentamente, cada articulación y tendón de su cuerpo cansado aullando de dolor. Se dirigió tambaleándose hacia el espejo que colgaba sobre el inodoro, que junto con el lavabo, o realmente cualquier cosa con plomería en toda la cárcel, había dejado de funcionar la semana anterior. DeSantis no podía saber si eso se debía a problemas reales afuera, o si simplemente era otra forma en que los salvajes lo abusaban. Se miró a sí mismo. Su rostro estaba demacrado, la línea del cabello se había retirado al menos una pulgada, sudaba profusamente.\n\n\"Es hora, Ron\".\nDeSantis se giró para ver a uno de los matones con máscara de calavera mirándolo desde la oscuridad. Oyó el giro de la cerradura y entraron los soldados.\n\"¡Joder, apesta!\"\nMurmuró uno de los hombres mientras otro arrastraba a DeSantis fuera de la celda. Las piernas de DeSantis flaquearon. Sus carceleros lo arrastraron. Los ojos de DeSantis aún no se habían acostumbrado a las entrañas oscuras de la antigua cárcel del condado, pero podía oír, oler y sentir. Personas, hombres adultos, lloraban en las celdas, y los guardias gritaban para que guardaran silencio, solo aumentando el ruido. En algún lugar burbujeaba el agua residual.\nDeSantis fue empujado afuera. El olor era mejor, pero un aroma aún más fuerte y desagradable emanaba de un gran pozo.\n\"¡Date la vuelta! ¡Ahora!\"\nUno de los soldados lo giró, empujándole un teléfono en la cara mientras un par más se agachaban a su alrededor. DeSantis estaba entumecido, mirando fijamente a la cámara sin expresión.\n\"Ni siquiera nos regalaste una sonrisa. No eres buen deportista, Ron\".\nLos hombres de Atomwaffen blandieron sus rifles, empujando a DeSantis de rodillas. Cerró los ojos, rezando para que esos locos pronto lo siguieran."
 atom.98.a: "Se desplomó en la tumba, olvidado."
 atom.99.t: "Una carta manchada de sangre"
 atom.99.desc: "Tras el colapso repentino de América, muchos grupos, incluido el nuestro, tomaron las armas y actualmente luchan contra la autoridad de ambos Gobiernos en D.C. y Denver. Aunque nuestra organización es muy impopular entre estas organizaciones rebeldes, no es sorprendente que hayamos encontrado a otros que se alinean con nuestros ideales. Uno de ellos es la División Atomwaffen en Florida. Se han acercado a nosotros pidiendo voluntarios para luchar en su guerra de liberación, a cambio de prometer información valiosa contra algunos políticos que estamos tratando de \"silenciar\", por así decirlo.\n\nSin embargo, algunos rockwellianos dentro de nuestro movimiento ven esta cooperación con, como les gusta llamarlos, \"maníacos genocidas\" como algo que desacredita los objetivos e ideales de nuestra organización. Sea cual sea la decisión que tomemos, seguro enfrentaremos algunas desventajas."
 atom.99.a: "Aceptar la oferta, la información podría ser útil."
 atom.99.b: "Rechazar la oferta, nos negamos a ayudar directamente a esos psicópatas."
 atom.100.t: "Un último propósito"
 atom.100.desc: "Era una de las muchas noches que habían ocurrido en Florida durante su existencia, y un escuadrón de soldados de la Guardia Nacional de Florida avanzaba dentro de un pueblo que supuestamente había sido abandonado por la División Atomwaffen. Caminaban por las calles, conversando, pasándose cigarrillos y relajándose más a medida que avanzaban. Antes estaban nerviosos por cualquier posible combate en el que pudieran verse envueltos, su enemigo no era alguien que se contuviera. Pero como no encontraron enemigos y no volaron balas por el aire, parecía que el pueblo sería tomado sin derramamiento de sangre. Eso fue hasta que un soldado se topó con el cadáver de un soldado de Atomwaffen.\n\n\"Maldita sea, qué asco\". dijo tapándose la nariz. El cadáver en cuestión tenía un agujero enorme en el cráneo. El soldado gritó a uno de sus compañeros y le preguntó si podía ayudarlo a moverlo fuera de la carretera. El soldado accedió con gusto, pero cuando los dos intentaron levantar el cadáver, se escuchó un pequeño pitido desde dentro del cráneo. En los momentos siguientes, el cadáver explotó, enviando metralla a los dos soldados y arrancándole ambas manos al que tenía las manos sobre el hombro del cadáver.\n\nEl Humvee que estaba con el escuadrón casi inmediatamente también detonó cuando un cohete atravesó el parabrisas. El resto de la formación quedó desordenado, luchando por sus vidas mientras disparaban alocadamente hacia la calle frente a ellos. El enfrentamiento no duró mucho más, ya que un francotirador desconocido eliminó a todos los soldados restantes. Cuando cayó el último soldado floridano, el francotirador asomó la cabeza sobre la mira del SVD que estaba usando y tomó la radio a su lado, comunicándose con quien estaba al otro lado."
 atom.100.a: "\"Están neutralizados, comandante\"."
 atom.101.t: "Más cerca, oh Dios, de ti"
 atom.101.desc: "Dios ha desatado sobre el cuerpo de estos Estados caídos y divididos, la tormenta completa de su ira. Como hizo con Sodoma, Gomorra, Babilonia, Asiria y, por supuesto, con el Israel descarriado, ha declarado con trompetas y cañones el comienzo de una tribulación. La sangre del pecador debe fluir, debe entregarse a sus peores instintos; deseos; lujuria. Debe ser enseñado, al ver todos los falsos ídolos que amaba destrozados ante él, a amar a Dios. Los perros del infierno aúllan en nuestras fronteras, la luz de Cristo aún los ciega. Saben que lo que han hecho en la oscuridad, todos sus crímenes y abominaciones, será llevado a la luz del día.\n\nCristo ofreció a la humanidad la rama de olivo de la paz, pero su justa venganza también puede fluir cuando él lo desee. Tal es el caso ahora. Lo que el hombre ha forjado, Dios lo destruirá. Lo que los profanos pretendientes al título de israelita culminen, será vindicado. Los objetivos de los orgullosos ya han sido derribados; a su debido tiempo serán olvidados. Así como somos su Iglesia en tiempos piadosos, somos su guadaña en tiempos de juicio.\n\nAsí como Constantino luchó bajo la cruz y fue victorioso, así como los antiguos arios llevaban en alto los símbolos de su Dios Único, así como los israelitas, los verdaderos israelitas, lucharon con el Arca de la Alianza sobre sus hombros, nosotros también llevaremos en alto un símbolo; el símbolo temido, odiado y despreciado por la \"gente buena\" del sistema. El fuego atómico es tanto nuestro símbolo como nuestro ultimátum. A la luz de nuestros cañones, o por el resplandor dado por Dios de una explosión atómica, todo será conocido, y todas las acciones del sistema desaparecerán."
 atom.101.a: "El Día del Juicio se acerca."
 atom.102.t: "Blues cananeos"
 atom.102.desc: "La radio raspaba y jadeaba, despertando lentamente mientras John giraba cuidadosamente las ruedas. \"Un nuevo amanecer... Rebeldes colgados... Subversión judeobolchevique... retazos de propaganda y noticias, apenas distinguibles incluso en los mejores tiempos, finalmente después de algunos esfuerzos, una sola voz clara comenzó a llenar la tienda de John.\n\n\"...Entonces, Dios consideró justo juzgar a este pueblo, y sí, los juzgó y los encontró indignos. Sus iniquidades eran grandes y fueron entregados a sus deseos más profundos. Grandes ciudades de suciedad y miseria erigieron, grandes masas de carne mezclada y abominaciones de alma, mente y cuerpo. Dios dispuso que su pueblo, purificado por el trabajo en el servicio del faraón, vendría sobre este pueblo disipado y los barrería de en medio de ellos\".\nEl murmullo cuervo de James Mason resonaba en la tienda. Afuera estaba en silencio, John, si hubiera querido escuchar, habría notado que las tiendas de sus vecinos estaban demasiado sintonizadas para oír las palabras de Mason, su voz resonando por todo el campamento como una distorsión de audio enloquecedora.\n\"Dios nos ha designado como a los israelitas, nos ha declarado representantes de su voluntad. ¡Somos nosotros quienes derribaremos sus Jericós y erigiremos nuestros Jerusalenes!\"\nAplausos atronadores, John jugueteó con el audio, subiéndolo rápidamente.\n\"Durante mucho tiempo los pueblos arios han trabajado para los faraones judíos. ¡Demasiado tiempo! Los arrojaremos de sus tronos, sí, como a los amalecitas tomaremos a sus hijos y esposas, su tierra y todo lo que poseen, y los echaremos a la tierra, donde clamarán y blasfemarán, y no serán más. ¡Por el cañón de nuestros rifles derribaremos sus abominaciones y erigiremos una nación piadosa y pura!\"\n\nLa radio quedó en silencio, luego sonó una extraña mezcla de Horst Wessel Lied y un himno. John se quedó en silencio un momento, antes de apagar la radio y llamar fuera de su tienda. Miró fijamente, a unas millas de distancia sus líneas habían llegado, y si mantenían el ritmo, estarían sobre él una vez más. Suspiró. Ya no quería huir."
 atom.102.a: "\"Están neutralizados, comandante\"."
 atom.103.t: "Amigo en mí"
 atom.103.desc: "\"Nombre\".\n\nUna voz baja sonó, llena de la emoción de la Navidad.\n\nEl hombre solo atado a la silla ya no tenía más uñas para sacar.\n\nEl sótano estaba sucio, el óxido cubría cada pieza de metal, y sangre seca se veía por todo el suelo de concreto.\n\n\"Logan\".\n\nLa voz aún tenía un tono sarcástico, como una mala hierba que se niega a morir.\n\nOtra figura más alta estaba de pie sobre él, con una sonrisa en el rostro que encajaría perfectamente en una película de terror.\n\nRecientemente, Virginia cayó en manos de la División Atomwaffen, y aquellos que obstinadamente se quedaron atrás recibieron un trato tortuoso.\n\nUna galería de carteles de personas desaparecidas, cientos desaparecidos, ninguno encontrado.\n\n\"Qué nombre tan aburrido, tus padres deberían haber elegido algo mejor, como Amok o Augustus, en cualquier caso... continuemos con nuestro, procedimiento, por así decirlo\".\n\nEl hombre atado a la silla levantó la cabeza y se rió un poco.\n\n\"No es así como se usa «por así decirlo», idiota\".\n\nLa figura alta silbó mientras agarraba una sierra de huesos de una bandeja. \"Para ser justo, tampoco es así como se supone que debes usar esto\"."
 atom.103.a: "Qué pintoresco."
 atom.104.t: "Kane vive"
 atom.104.desc: "Una figura ha emergido de las sombras, dejando que solo se le conozca como Kane. Afirma ser el Cain original de tiempos antiguos, maldito por Dios y condenado eternamente a vagar por la Tierra. Ahora, ha mostrado interés en la Orden de los Nueve Ángeles. Su conocimiento de ciencias prohibidas y su destreza táctica son incomparables, y sus percepciones sobre la naturaleza de la destrucción y el poder son tanto seductoras como aterradoras. Su presencia podría galvanizar a la División Atomwaffen, pero conlleva un riesgo: las lealtades de Kane son inciertas, y su visión del mundo es nada menos que apocalíptica."
 atom.104.a: "Que nos guíe; abrazamos las enseñanzas de Kane."
 atom.104.b: "Sus ambiciones son demasiado peligrosas, expulsémoslo."
 atom.105.t: "Hola... Mason."
 atom.105.desc: "Mason levantó la vista hacia el hombre barbudo. Nunca había encontrado a Sutter una persona con la que se sintiera cómodo, y ahora podía sentir esa incomodidad más que nunca. Observó en silencio mientras Sutter sacaba una silla de madera del rincón más alejado de la celda, justo frente a donde Mason estaba sentado. Sutter se sentó en la silla y simplemente miró a Mason.\n\nA Mason le tomó unos momentos antes de hablar. \"Supongo que fuiste tú quien orquestó todo esto\". Sutter miró a Mason unos momentos más, sus ojos recorriendo su rostro un par de veces, \"Supone bien\".\n\nMason se rió, levantando sus manos atadas para rascarse una picazón en la cara, \"Entonces supongo que estás aquí para matarme.\" Sutter sonrió y sacó algo de su bolsillo trasero. Adaptándose a la tenue luz de la celda, Mason entendió qué era.\n\n\"¿Es eso un Lu-\" Mason no pudo terminar la frase antes de ser interrumpido. \"Un Luger, sí. Calibre 9x19mm Parabellum. En realidad es tuyo... bueno, era tuyo. Ahora es mío\". Dijo sonriendo, \"Y sí. Voy a matarte con él. Pero me gustaría hablar contigo antes de hacerlo\".\n\nMason entrecerró los ojos hacia Sutter, \"¿Hablar conmigo?\" Sutter simplemente asintió, con una amplia sonrisa en el rostro.\n\n\"Está bien... ¿de qué quieres hablar-\"\nUn fuerte disparo resonó y rebotó en las paredes de la celda. Mason se desplomó mientras la vida se escapaba de su cuello y caía al suelo. En sus últimos momentos, mientras sus ojos se abrían y cerraban al perder el conocimiento, lo último que vio fue a Sutter, saludándolo con una sonrisa en el rostro."
 atom.105.a: "Buenas noches."
 atom.106.t: "Vídeo de cocina"
 atom.106.desc: "El video inicial con un fuerte estruendo de un sintetizador, del tipo que sale de un altavoz barato que vibra por las paredes. La cocina era casi normal, con un armario de color menta verde, una encimera barata y con una nevera con un girasol de plástico pegado. Casi.\n\nEl chef se mostró en cámara: un hombre vestido con una sudadera negra, que ocultaba su cara con un pasamontaña de calavera, y que llevaba un delantal con un símbolo nuclear amarillo brillante. Levaba bordada en negrita «Operador de cámaras de gas», con las letras de los bordes deshilachadas. Levantó su mano enguantada para saludar de una forma muy infantil. \"Muy bien, arios\", dijo con una voz distorsionada, \"hoy haremos una NVKEcake. Una receta recién salida del bunker\".\n\nTras la cámara se escuchaba un \"bang\" en la distancia. Después otro. Se podía oír un llanto desesperado interrumpido por algo contundente golpeando la pared. Él echó leche al cuenco, aparentemente indiferente, murmurando, \"Una taza de leche aria pura y sin adulterar\".\n\n\"Ahora es cuando se pone bonito\", anunció alegremente haciendo círculos en el aire con su dedo enguantado. Vierte el tinte, dando a la masa un color negro intenso, como si fuese un vacío acumulado en el cuenco.\n\n\"¿Quieres que salga bonito, no?\" bromeaba, tomando una manga pastelera llena de glaseado de un amarillo intenso mientras que sacaba el pastel del horno. La cámara se tambaleaba (demasiado) hacia adelante mientras dibujaba cuidadosamente un sonnenrad en el centro del pastel, que brillaba a la luz de la cocina.\n\n\"Y aquí lo tienen\", declaró el chef, antes de revelar el resultado final. \"Una NVKEcake. Un lujo para compartir con los amigos, o bueno, para darse un último capricho antes de la guerra racial\".\n\nVa a por un cuchillo y el video se detiene durante un segundo cuando muestra la hoja. La pantalla falla brevemente mientras el glaseado se esparce como la ceniza.\n\nEl vídeo corta a propaganda hecha con Photoshop, con el sintetizador aún sonando. Un mensaje aparece en la pantalla:"
 atom.106.a: "\"Prepara algo bonito para la ocasión. AWD\"."
 atom.107.t: "Después de mi, el diluvio."
 atom.107.desc: "Curt había tenido una buena vida, sirvió en Corea, inició un pequeño emprendimiento y conoció al amor de su vida, tuvo tres hijos y su familia estaba encaminada a crecer sana y fuerte.\nEstaba tendido en una cama de hospital, con los ojos cerrados, esperando tranquilamente a sus hijos y nietos que venían a visitarlo por última vez. Estaba moribundo pero no tenía miedo.\n\n\"¡Despierta abuelete!\"\nUna voz desconocida le hizo abrir los ojos, una voz alegre bajo la cual no había más que odio.\nUn grupo de cinco hombres, todos vestidos de negro con máscaras antigás y pasamontañas de calavera, con una gran sonrisa.\n\nEl cabecilla se quitó su máscara para mostrar una cara pálida, con unos ojos que no habían descansado en semanas, un sucio pelo castaño y una sonrisa que solo se veía en las películas snuff.\n\El corazón de Cult se aceleró cuando el cabecilla empezó a hablar.\n\"¿En serio? ¿De verdad pensaste que simplemente morirías en paz tras luchar por nuestro enemigo, abandonar a tu pueblo y derrochar el patrimonio destinado a tus hijos? ¡Eres realmente divertido viejo!\"\n\nEmpezó a reír a carcajadas de forma maniática.\n\"Nada de eso, la muerte es un privilegio que será denegado.\"\nAplaudía al mismo tiempo que los otros hombres sacaban armas punzantes, cuchillos y machetes, e incluso una sierra oxidada, que parecía haber sido dejada a que se oxide a propósito.\n\n\"Estamos en un hospital, por lo que la muerte se puede atrasar fácilmente, ¿Tu gente afirma que han sufrido mucho no? Esto será sencillo.\"\nSe acercó a la cama de Curt\n\"Suplícale a Dios unas cien veces y tal vez te dejaremos morir.\"\n\nEl cabecilla agarró la mano de Curt y le dio un firme apretón de manos."
 atom.107.a: "Los niños de hoy no entienden el trabajo duro."
 atom.108.t: "El peregrino"
 atom.108.desc: "En la desolada carretera, Thomas McCarthy cabalgaba su motocicleta, con las venas recorriéndole una mezcla de alucinógenos y whisky. Observó cómo el cielo de repente se abría con una fisura dorada. De ella emergió un enorme ojo cubierto de innumerables plumas blancas, desgarrando el velo de los cielos. Giró lentamente, fijando su mirada en esta alma errante. Alrededor del ojo, innumerables pequeños ángeles giraban en espiral, sus seis alas entrelazándose en un mar móvil de plumas.\n\nEl rugido de la motocicleta se transformó en los oídos de Thomas en el estruendo de trompetas celestiales. Los campos de maíz que bordeaban la carretera se incendiaron, sus llamas desafiando la consumición. Los ángeles cantaban con mil voces simultáneamente, una armonía celestial más allá de la comprensión humana. Entonces la tierra se partió, revelando el infierno debajo. Thomas vio a los condenados, cargados con enormes piedras, caminando sin fin por los acantilados; herejes atrapados en llamas eternas; y almas malditas, sus formas retorcidas en árboles grotescos, extendiendo ramas marchitas para atrapar a los viajeros que pasaban.\n\nThomas se sintió suspendido entre el cielo y el infierno, como un alma lanzada al limbo. El gran ojo continuaba observándolo, con una mirada inquebrantable. Los himnos de los ángeles se entrelazaban con los lamentos de los condenados, creando una sinfonía de desesperación divina e infernal. Cuando un tanque destruido apareció en medio de la carretera, ya no parecía una herramienta de guerra, sino que se había transformado en un altar que unía el cielo y el infierno. Su cañón deformado apuntaba hacia el cielo, como saludando al ojo celestial. En su aturdimiento, Thomas vio innumerables almas etéreas elevándose alrededor del tanque, algunas ascendiendo hacia el cielo, otras cayendo al abismo.\n\nEn su último momento, cuando el coro de ángeles alcanzó su crescendo, el gran ojo parpadeó una vez, derramando una lluvia de plumas. La motocicleta atravesó las plumas que caían, chocando contra el altar de acero que se erguía entre el paraíso y la perdición."
 atom.108.a: "Otra alma perdida."
 atom.109.t: "Científico entre bastidores"
 atom.109.desc: "Jack B. Nicholson se levantó por el olor a carne quemada llegando a su nariz, y las esposas oxidadas que lo encadenaban a un poste en una ruinosa prisión. Había docenas de personas esparcidas por la habitación, y él no sabía a ciencia cierta si estaban vivas o muertas. Su maquinación para huir fue interrumpida por la voz de un hombre joven.\n\n\"Francamente, eras una vergüenza para mi.\" Dijo despreocupadamente, agarrando un manojo de cables que formaba parte de lo que parecía ser un taser. \"Tampoco digas una palabra, odio que criaturas repugnantes como tú hablen.\"\n\n\"Un hombre como tú tratando de escapar de nuestra Florida teniendo el fenotipo de un hombre ario. ¿Acaso eres un maricón en el armario? No veo otro motivo por el que no quieras servirnos... bueno, supongo que eres retrasado y ya.\"\n\nEl cautivo hizo un intento de liberarse de las cadenas corroídas, que sería respondido con una patada en la cara, el ruido de la nariz rompiéndose resonó por las paredes silenciosas de la reutilizada prisión.\n\n\"¿Te crees que las ratas de laboratorio pueden salir de sus jaulas? No. Te quedarás aquí hasta el último de tus días, traidor a la raza. Espero dar con la corriente adecuada para que lo sientas lo más posible sin que caigas desfallecido. Sinceramente, te lo mereces.\"\n\nMientras el taser casero se clavaba en el pecho de Jack, sus ojos reventaron al mismo tiempo que su pálido cuerpo se desplomaba."
 atom.109.a: "Otra decepción más en la larga lista de fracasos."
 atom.110.t: "Un paseo por el país de las maravillas"
 atom.110.desc: "Tras la expulsión de las fuerzas enemigas de Orlando, la División Atomwaffen decidió capitalizar y consolidar el nuevo territorio. Esto implicaba distintas tareas desde saqueos hasta ejecuciones, entre otras cosas.\nDos hombres llegaron a Disney World, ambos leales a la División. ¿Su tarea?\nQuemar el lugar hasta sus cimientos.\n\nNo obstante, ambos habían estado en ese lugar con anterioridad, nadie se podría imaginar que unos de los inocentes niños del lugar, acabarían formardo parte de una organización como esa. Ninguno de los dos se sentía bien del todo quemando el lugar, pero era un símbolo de todo lo corrupto del mundo, y ciertamente no querían jugársela al desafiar órdenes directas.\nEventualmente, tras llevar un buen rato parados frente al castillo de Cenicienta, uno habló.\n\n\"¿Quieres hacer un tour por el lugar antes de que lo prendamos?\"\nSu compañero se dirigió a él y tras pensarlo un momento, asintió.\n\nY entonces se fueron. Ninguna de las atracciones funcionaba, por lo que únicamente dieron un paseo por el lugar. Ellos conversaron , compartiendo sus memorias de cuando fueron allí de niños, y todo lo que hicieron con sus familias.\nFueron a todos los sitios principales, Mainstreet, Adventureland, Fantasyland, Frontierland, e incluso bromearon con lo repetitivos que eran los nombres.\nSe detuvieron en la Galería de los Presidentes y se aseguraron de destrozar el lugar antes de volver al lugar del que vinieron.\nEn frente del castillo de Cenicienta.\n\nEllos bromearon unas pocas veces más antes de que el silencio les invadiera.\n\nHasta que la misma persona que sugirió hacer el tour habló de nuevo."
 atom.110.a: "\"Está bien... Iré a por la gasolina\"."
 atom.111.t: "Buckshot Roulette"
 atom.111.desc: "La puerta de la casa fue derribada violentamente, una sala vacía esperando a dos hombres que habían decidido desahogar su rabia en un día libre. Maldita sea, Florida ya estaba tomada, ¿qué más podían hacer? ¿Contemplar su existencia, como uno de esos filósofos con cerebro de mono que eran esclavos de este mundo corrupto?\n\n\"Oye, tío... no creo que haya gente aquí\", dijo uno, con un tono de decepción en la voz, antes de que otro lo interrumpiera y señalara la lámpara, que aún se balanceaba con el viento.\n\n\"No, sí hay. Probablemente escondidos en el sótano. Sígueme\".\n\nLa puerta del sótano fue derribada violentamente, aunque no hacía falta, ya que bajaron a toda prisa, encontrando a una pareja acurrucada y horrorizada. Probablemente no mayores de 18 años. Los dos hombres enmascarados los separaron y lanzaron una escopeta entre ellos, apuntando con un rifle a sus cabezas.\n\n\"Tómenla. ¿Conocen ese juego de ruleta rusa? Sí. Algo así, pero con una escopeta. Algunas balas son de fogueo, otras no. Aquí hay un giro: si te disparas a ti mismo, tienes otro disparo\".\n\nLa chica, temblando, se arrodilló, levantó la escopeta lentamente, la miró, antes de apuntarla hacia sí misma. Con un estruendoso disparo, su cabeza fue arrancada de la mandíbula, el sonido húmedo del músculo crudo golpeando el suelo resonó segundos después. Antes de que su novio pudiera murmurar o gritar, una bala atravesó también su cabeza.\n\n\"Malditos idiotas..."
 atom.111.a: "...de todas formas, ninguna era de fogueo\"."
 opinion_deranged_death_cult:0 "Culto a la muerte desquiciado"
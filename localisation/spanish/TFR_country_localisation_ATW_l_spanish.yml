 ATW_aryan_liberation_war_global: "La §RGuerra de Liberación Aria§! ha §Riniciado§!."
 atom.0.t: "Endsiege"
 atom.0.desc: "Nos hemos preparado para este momento durante años. El mundo de la superficie, contaminado por la decadencia, la corrupción y la debilidad, es insalvable. La División Atomwaffen, la vanguardia del verdadero futuro, está lista para llevar a cabo la gran purificación. Nuestro arsenal nuclear está listo, y nuestros búnkeres, ocultos en el subsuelo, están abastecidos, fortificados y listos para protegernos durante el apocalipsis que se avecina.\n\nLos supuestos líderes del mundo están ciegos, pensando que sus regímenes, economías y ejércitos pueden continuar sin consecuencias. Se aferran al poder mientras sus civilizaciones se desintegran. Pero hoy, les arrebataremos ese poder de las manos. El fuego de la destrucción nuclear purificará la Tierra, arrasando con los sistemas corruptos, dejando solo cenizas. Y desde la seguridad de nuestros santuarios subterráneos, sobreviviremos. Los débiles perecerán, y cuando la superficie se libere de su influencia podrida, nos alzaremos.\n\nTodo está decidido: las principales ciudades, instalaciones militares y centros industriales de todo el mundo serán arrasados en minutos. Nuestros búnkeres, en las profundidades de la Tierra, nos protegerán mientras el mundo arde. Ya no hay vuelta atrás. Presionamos el botón y comienza el último amanecer.\n\nHa llegado la hora. Que el mundo sea purificado por el fuego nuclear."
 atom.0.a: "Nuestra victoria final."
 atom.0.b: "Sic transit gloria mundi."
 atom.1.t: "Borrón y cuenta nueva"
 atom.1.desc: "En algún rincón de las Grandes Llanuras, donde antes se extendían vastas praderas y tierras de cultivo, ahora se alzaban los restos de un convoy militar destruido o un Apache abatido, y allí se encontraba una pequeña parcela de tierra, completamente despejada de la alta hierba que solía cubrirla. Solo había un par de sacos de arena, una rudimentaria plataforma de aterrizaje para helicópteros y una entrada que conducía a una instalación subterránea.\n\nSin embargo, lo que había bajo tierra era una historia completamente distinta.\n\nLa instalación se adentraba en el suelo, con múltiples viviendas, centros de mando y otras salas que la habitaban. En general, estaba diseñada para ser autosuficiente, dependiendo únicamente del aire exterior. Era, sin duda, una obra maestra para los ingenieros que la crearon. Fue [ATW.GetLeader] quien tuvo la tarea de inspeccionar esta maravilla que era el búnker recién construido. Había ordenado la construcción de búnkeres en todo el país; ya había revisado algunos antes, pero este era, sin duda, el mejor. Miró a su alrededor, maravillándose de la belleza de la vivienda principal en la que se encontraba: cuadros adornando las paredes, plantas decorando las mesas y carruajes dispersos por doquier. Su único inconveniente era el equipo de inspección que lo acompañaba, que hacía ruidos estridentes mientras murmuraban a sus espaldas.\n\n\"¿Por qué no terminamos de una vez? ¡Bombardéenlos y que se quemen!\" dijo, prestando atención a la sugerencia de uno de los hombres, sin pensar en las consecuencias. Se dio la vuelta rápidamente, gritando a su equipo de inspección.\n\n\"¡Todos, silencio!\"\n\nLos hombres lo miraron en silencio; estaba claro que ya había tenido suficiente de su charla. Se acercó al joven que había hecho la sugerencia y lo miró a los ojos, a poca distancia. Habló en un tono grave y bajo:"
 atom.1.a: "\"Paciencia, ya llegará el momento\"."
 atom.2.t: "Levantamiento popular"
 atom.2.desc: "En medio de la actual Guerra de Liberación Aria, una nueva amenaza surge de las sombras de nuestro propio dominio. Los libertarios, envalentonados por nuestro dominio inquebrantable y el sufrimiento que conlleva, se han rebelado contra nosotros. Impulsados por su errónea ideología de libertad e individualismo, desafían nuestro poder, buscando desmantelar los cimientos mismos de [ROOT.GetNameDef].\n\nEstos rebeldes, que falsamente afirman luchar por los derechos del pueblo, no comprenden el mundo en el que viven. No comprenden que su filosofía caótica solo sirve para debilitar a los fuertes y sembrar la discordia entre los justos. Predican la liberación, pero sus acciones amenazan con desestabilizar todo lo que hemos luchado por construir. El fuego de su insurrección arde contra nuestros ideales, y no permitiremos que su rebelión triunfe.\n\nMientras las calles se llenan con sus protestas y estallan enfrentamientos entre nuestros leales y las fuerzas libertarias, debemos responder con fuerza absoluta. Nuestros enemigos deben aprender que cualquier intento de oponerse a nuestro justo gobierno se enfrentará a una brutalidad implacable.\n\nHa llegado el momento de dar ejemplo a estos traidores. Aplastaremos esta rebelión con fuerza abrumadora, demostrando que el único camino es la obediencia. El fuego de la rebelión se extinguirá, y las cenizas de su insurrección servirán de recordatorio a todos los que se atrevan a desafiar a [ROOT.GetNameDef]."
 atom.2.a: "Aplastaremos a los rebeldes."
 atom.3.t: "División blindada casera"
 atom.3.desc: "La Segunda Guerra Civil Americana ha sumido a la nación en un caos total, y nuestros enemigos son implacables. Sin embargo, la División Atomwaffen florece en medio de este desorden. Mientras las llamadas facciones \"legítimas\" luchan por mantener un orden que se desmorona, nosotros innovamos y nos adaptamos. Cuando ellos traen tanques y aviones, nosotros traemos el poder puro de la destrucción, forjado con nuestras propias manos.\n\nAunque nuestros recursos son limitados, nuestra determinación no tiene límites. De los escombros de esta tierra devastada, nuestros ingenieros han creado algo verdaderamente aterrador: la Brigada Killdozer. Estos enormes vehículos, construidos con maquinaria recuperada, restos militares y placas de acero sin tratar, son lentos pero implacables. Cargan con el peso de nuestra ira, reforzados con un blindaje grueso y armados con equipo reutilizado. Su misión es clara: arrasar las líneas enemigas, destruir posiciones fortificadas y dejar solo ruinas a su paso.\n\nLos primeros prototipos ya han salido de lo que podríamos llamar líneas de montaje, y pronto estarán listos para el campo de batalla. Estas bestias serán la vanguardia de nuestro asalto, abriéndose paso a través de las fortalezas y fortificaciones urbanas que se interpongan en nuestro camino. Los Killdozers no son solo máquinas; son emblemas de nuestro triunfo inevitable sobre los débiles.\n\nNuestros enemigos creen que están listos. Pero no lo están. Cuando la Brigada Killdozer avance, aprenderán que nada puede frenar el avance de la División Atomwaffen hacia el poder. La tierra temblará bajo nuestros pasos."
 atom.3.a: "Desatad a los Killdozers. Aplastad todo a nuestro paso."
 atom.4.t: "Jailbirds"
 atom.4.desc: "Tras nuestra reciente liberación del sur de Florida de los demonios que la ocupaban nos hemos encontrado con un puñado de prisiones. Esas prisiones están hasta el tope de prisioneros de toda clase. La situación dentro de las prisiones no es buena, por no decir otra cosa, algunas escenas dentro de estas prisiones recuerdan a las situaciones vividas dentro de los gulags siberianos en Rusia.\n\nPara evitar que cualquiera de esta escoria desestabilice nuestro régimen hemos decidido organizarlos en \"batallones de asalto\". Estos batallones con el nombre de \"Jailbirds\" serán usados como carne de cañón cuando nuestras defensas flaqueen. Subsecuentemente, estos batallones penales poseerán un equipamiento más débil y barato para evitar costes innecesarios."
 atom.4.a: "Una herramienta útil."
 atom.5.t: "Los satanistas aseguran el poder"
 atom.5.desc: "\"Sabemos contra quién luchamos. La judería mundial y sus instrumentos han degradado y oprimido a nuestro pueblo, pero ¿con qué medios? Durante tantos años, los nacionalsocialistas han perdido el tiempo intentando que una doctrina judía apoye algo a lo que se oponen fundamentalmente. Han intentado establecer ministerios en nombre de esta doctrina, apelando a los fieles con sus escrituras, ¡incluso intentaron argumentar que son más fieles a esta religión que sus enemigos! Este absurdo teatro ha durado demasiado. Los sabios entre nosotros han aprendido a apreciar una visión más verdadera.\n\n\"El cristianismo es el principal instrumento utilizado por el ZOG para mentir y controlar a nuestro pueblo. Es una religión judía, nadie lo discute. Surgió en un desierto y se extendió entre esclavos y comerciantes; ¡justo el tipo de personas que han hecho de América lo que es! Sus peores impulsos fueron dominados temporalmente por personas que realmente se adherían a las creencias europeas y arias, pero solo podían expresarlas, desvirtuarlas, en términos cristianos. Eso se acabó. Estamos agarrando nuestro destino por el cuello.\n\n\"Buscamos las estrellas, nos deleitamos en su iluminación. Nuestro Lucifer está ahí fuera, el etéreo impulsor del progreso ario. Él es el padre de nuestro pueblo, no el Dios judío del desierto. Todo lo relacionado con el sistema debe caer si queremos reclamar nuestro destino, y eso incluye especialmente la religión noájida galeo-nazareno. Todos los que en nuestras filas se han negado a abandonar sus delirios han sido exterminados. A quienes acechan, pensando que bromeamos o que estamos equivocados: los encontraremos y les haremos ver la verdad, de una forma u otra. El comandante Mason nos apoya plenamente, y aunque no esté con nosotros en esta reunión, nos acompaña en espíritu\"."
 atom.5.a: "Los arios están al mando."
 atom.6.t: "Un nuevo comienzo"
 atom.6.desc: "Ha sucedido. Aquí. En la tierra misma de la inmundicia, la degeneración y la corrupción. Ha sucedido. Contra todo pronóstico, hemos liberado a América de los regímenes que una vez la asfixiaron. ¡Lo que antes era imposible se ha hecho realidad!\n\nNuestra lucha comenzó hace mucho tiempo, pero tras incontables mártires, muchos meses y cientos, si no millones, de obstáculos, finalmente hemos liberado a América. Miles de personas gritan de alegría al comenzar las celebraciones tras nuestra victoria; nuestro Gobierno trabaja arduamente para planificar el futuro; nuestros soldados beben sin parar mientras celebran a su manera; los muertos nos felicitan desde la tumba, pues su sacrificio no ha sido en vano. Todo esto es testimonio de nuestro triunfo, de nuestra causa.\n\nPero, lamentablemente, no todo es perfecto. Si bien hemos logrado nuestro objetivo aparentemente final, muchos más han aparecido a su sombra. Las nuevas tierras que hemos conquistado están llenas de insurgentes y agentes del caos, empeñados en aniquilar nuestro régimen. La infraestructura de las nuevas tierras está prácticamente destruida. Años de guerra han cobrado un precio evidente en estas estructuras, y se necesitarán más años para que vuelvan a ser como antes. Es decir, si fuera necesario. Las naciones del mundo también han reaccionado a nuestro éxito, y las consecuencias nos han dejado solos diplomáticamente, pero allí no ha habido grandes cambios.\n\nLa nueva meta está fijada y una nueva carrera ha comenzado. Que nuestro destino se cumpla una vez más mientras avanzamos hacia el futuro, y dejemos nuestras victorias pasadas en los pasillos de la historia, porque una nueva era ha comenzado."
 atom.6.a: "Los arios están al mando."
 atom.7.t: "Las llamas del fanatismo"
 atom.7.d: "El comandante Frank Zimmermann estaba frente a la hoguera, observando cómo ardían obras de arte y literatura invaluables mientras el aire frío le mordía la mejilla. Sobre todo, era un hombre de órdenes, seguía las instrucciones de sus superiores al pie de la letra. Esto lo había convertido en un muy buen soldado, pero hoy se preguntaba si eso lo hacía un buen hombre. Las órdenes que había recibido ese día eran muy simples. \"Eliminar todo arte degenerado y monumentos al antiguo orden\". Estas también las había cumplido a la perfección. Casi todas las pruebas de que el antiguo gobierno había existido en D.C. habían sido o iban a ser sistemáticamente recogidas y destruidas por él y sus hombres. Todo eso era arrojado al fuego frente a él. Su trabajo como líder de su unidad era asegurarse de que ningún soldado saquease o guardase algo, aunque de alguna manera hubiera logrado ver valor en el arte degenerado que debía destruir. Fue entonces cuando dos soldados trajeron un retrato de George Washington. La pintura era bastante grande, por lo que los hombres aparentemente habían desistido de cargarla y la arrastraban por la tierra y el barro, sin importarles el daño que pudieran causar a la valiosa obra. Por un momento, Frank pensó para sí mismo que era una lástima que una pieza tan querida y culturalmente significativa fuera destruida con tanta indiferencia. Por supuesto, mantuvo estos pensamientos en secreto. Expresarlos sin duda lo habría llevado ante un pelotón de fusilamiento, haciendo inútiles sus años de lealtad inquebrantable. Sin embargo, no era tanta lástima; después de la guerra, sin duda habría muchas más pinturas hechas igual que esa. Estas serían creadas por manos arias, no corrompidas por influencias judías y modernistas, y hechas a imagen de figuras que representaban la fuerza y los valores arios, en lugar del liberalismo y la degeneración. Su pensamiento fue interrumpido cuando los soldados se le acercaron. \"¿Este también, comandante?\". Ya no tuvo que pensar en su respuesta. \"Échenlo al fuego\". Miró a los ojos del general y vio cómo se derretían rápidamente en una masa irreconocible de pintura al óleo. Mientras la pintura ardía, sonrió para sí, sabiendo que el orden que construyeron no sería destruido tan fácilmente."
 atom.7.a: "Marque el retrato de Lansdowne como eliminado."
 atom.8.t: "Florida unificada"
 atom.8.d: "Mason y su equipo estaban esperando dentro de uno de los cuarteles generales temporales que había montado la División Atomwaffen. Esperaban pacientemente un mensaje cifrado procedente del frente, llevaban esperándolo durante un total de 9 horas. Pero finalmente, el tan esperado mensaje acababa de llegar. Una vez recibido, el decodificador del grupo hizo su magia, descifrando el texto. Una vez descifrado, una sonrisa hizo aparición en la cara de Mason y su grupo,\n\n\"Caballeros. El día de hoy, los últimos remanentes de los enemigos de la División Atomwaffen en Florida han sido oficialmente eliminados.\"\n\nLa sala estalló casi inmediatamente con los miembros del equipo celebrando su victoria, incluso se trajo una botella de champán que fue descorchada justamente para esta ocasión.\n\nMientras que la fiesta se empezaba a descontrolar, Russell, quien estaba celebrando la victoria tanto como cualquier otro, se fijó en Mason. La última incorporación del grupo, y posteriormente líder de este, estaba sentado en su silla casi como si nada especial hubiese pasado. Pero había otra cosa extraña en él. Russell tardó un par de segundos en darse cuenta, pero cuando lo vio abrió los ojos de par en par.\n\nEstaba sonriendo.\n\nMason no era la típica persona que reía y sonreía con los otros, de hecho, Russell no recordaba cuando fue la última vez que vio a Mason sonreír.\n\"Estás sonriendo.\" dijo asombrado. Masón se dirigió hacia él suspirando antes de responder, \"Es una ocasión especial.\" Russell se rio antes de hablar otra vez.\n\n\"¿Entonces por qué no lo estas celebrando como el resto de nosotros?\"\n\nMason miró la fiesta, meditando sus próximas palabras, sabiendo que serán una de las cosas más importantes que Russell ha escuchado de él. Encaró a Russell otra vez, diciendo una única frase:"
 atom.8.a: "\"Porque... esto recién empieza\"."
 atom.9.t: "Invitación al Frente Nacional"
 atom.9.d: "Hemos recibido noticias desde Nueva Inglaterra, donde moderados afines en el Frente Patriota han tomado el poder, de una posible alianza entre todas las facciones nacionalistas. Hasta ahora, muchos partidos y organizaciones se han unido, y para muchos lo lógico es que nos unamos a nuestros semejantes en esta lucha.\n\nOtros muestran preocupación por la afiliación del Frente con los hasta hace poco hostiles conservadores y sus vagas declaraciones sobre asuntos cruciales para nosotros, como lo es la raza. Ahora debemos decidir si unimos fuerzas con Rousseau o si debemos forjar nuestro camino al nacionalsocialismo por nuestra cuenta."
 atom.9.a: "¡Saludemos a nuestros nuevos hermanos de armas!"
 atom.9.b: "Haremos esto por nuestra cuenta."
 atom.10.t: "Reabrir las rutas de ratas"
 atom.10.desc: "En un improvisado centro de mando, no muy lejos del puerto de Palm Beach, un variado grupo de combatientes extranjeros se reúne para una sesión informativa crucial convocada por el propio Russell, con el objetivo de evaluar la capacidad de combate de estos nuevos \"Legionarios\", como él los llamaba. Esta sería una verdadera prueba de fuego para estos hombres, poniendo a prueba su experiencia en combate, su fuerza de voluntad y su lealtad ideológica. De los aproximadamente 400 voluntarios extranjeros que se habían inscrito a través del Telegram del grupo, solo unos 150 estaban presentes, con antecedentes muy diversos: la División Feuerkrieg, Combat-18, Blue Awakening, veteranos de grupos dispersos del Club Activo, e incluso miembros del Batallón Azov y del Grupo Rusich. Uno de estos voluntarios era Vikenti Abalishev, un recién llegado del infame Movimiento Imperial Ruso.\n\nCuando el general de la Legión Extranjera, Craig Lang, dio un paso al frente para iniciar la sesión informativa, Vikenti no pudo evitar recordar la barrera lingüística que lo separaba de sus compañeros. Apenas sabía inglés, solo lo suficiente para conseguir un lugar en el grupo y llegar a ese país devastado por la guerra, gracias a los contactos que había hecho en la región. Sin embargo, en ese momento no contaba con tales contactos que lo guiaran lingüísticamente, ni traductores en línea, solo con su escaso conocimiento del idioma. Lang comenzó a delinear los detalles de la misión con una precisión y claridad que no pasó desapercibida para nadie.\n\nSin embargo, para Abalishev, las palabras de Craig eran poco más que un galimatías: un conjunto de sílabas extranjeras que se escapaban de su comprensión, dejándolo confundido y profundamente humillado. Intentó seguirle el ritmo, sintiéndose aislado y fuera de lugar. El arrepentimiento y la vergüenza comenzaron a apoderarse de él; ¿cómo tuvo la audacia de alistarse y ser enviado a Florida cuando apenas entendía el idioma que se hablaba, uno que había aprendido a detestar?\n\nAl finalizar la sesión informativa, los otros combatientes a su lado hicieron el saludo romano y comenzaron a cantar. Una de las frases que reconoció, un \"¡HEIL!\" en perfecta sincronía, resonó en su mente mientras él mismo la pronunciaba. Con un aire notablemente débil y más callado, el silencio se apoderó del campo de entrenamiento cuando Lang se acercó a él. Craig lo miró con desdén, y Vikenti le devolvió la mirada, exigiendo al ruso que honrara el juramento que había hecho y mostrara respeto a los comandantes superiores.\n\nPor un breve instante, Vikenti comenzó a olvidar su lugar. Deseó arremeter contra la inmundicia que tenía frente a él, que se atrevía a hablar con un lenguaje tan degradante y a exigir autoridad. Sin embargo, esos pensamientos se desvanecieron rápidamente al recordar por qué estaba allí y el código de honor que compartía con sus compañeros. Se mantuvo en silencio mientras se recomponía, antes de lanzar un saludo romano y gritar:"
 atom.10.a: "¡HEIL!"
 atom.11.t: "Joel Mingleton se une a nosotros"
 atom.11.desc: ""
 atom.11.a: "Basado."
 atom.12.t: "Dios lo quiere"
 atom.12.desc: "En el tenue resplandor de un barracón improvisado, ubicado en las afueras de la ciudad de Tampa, un grupo de irregulares de la División Atomwaffen se encontraba en círculo, sus rostros iluminados por la luz parpadeante de las velas. Frente a ellos, un pequeño grupo de prisioneros estaba atado a sus sillas, con expresiones cansadas pero atentas. Estos hombres variaban en experiencia y edad, algunos eran guardias nacionales de toda la vida que habían dedicado sus vidas al estado al que tanto le debían, otros eran reclutas de apenas 19 años que apenas sabían manejar un rifle con cuidado. Algunos, principalmente los jóvenes, eran lo suficientemente ingenuos como para pensar que se les mostraría algún tipo de clemencia; que no serían torturados durante horas para luego ser eliminados como sus compañeros.\n\nTontos, lo eran.\n\nMientras los hombres eran vendados y golpeados sin piedad por sus captores, vestidos con equipo robado y máscaras de calavera, la puerta que daba al cuarto se abrió, su luz iluminando el espacio fétido y permitiendo a los prisioneros ver mejor su entorno. Él se parecía a los otros miembros de Atomwaffen en la habitación, sosteniendo una Biblia y lo que parecía ser una pistola Sig Sauer M17. Pasó las páginas del libro hasta llegar al final, donde comenzó a leer un versículo del Apocalipsis.\n\n\"Enjugará Dios toda lágrima de los ojos de ellos; y ya no habrá más muerte, ni habrá más llanto ni clamor ni dolor, porque las primeras cosas ya pasaron\".\n\nMientras los versículos resonaban en el reducido espacio, el hombre comenzó a alzar su arma, avanzando hacia el primer hombre en su línea de visión. Era uno de los más jóvenes, que al escuchar los pasos acercarse comenzó a suplicar clemencia, rompiendo en sollozos. Sus súplicas fueron interrumpidas por el sonido de los disparos. No sería el único hombre en morir esa noche, con cada paso sucesivo significando una muerte segura para el siguiente prisionero en la fila de sillas. Al pronunciar la última palabra del versículo, el último rehén ya había aceptado su martirio."
 atom.12.a: "Animam agere."
 atom.13.t: "La Conferencia Nacional se descompone"
 atom.13.desc: "El día de hoy hemos recibido indignantes noticias sobre la Conferencia Nacional. Nuestros antiguos aliados, que alguna vez apreciaron nuestra ayuda y esfuerzos, nos han traicionado. Nuestros diplomáticos, enviados previamente a la Conferencia Nacional para negociar pacíficamente la unificación de América, han sido expulsados. Esto ha provocado el colapso de la Conferencia Nacional, y con ella, cualquier esperanza de una reunificación pacífica.\n\nAparentemente, durante los últimos días de la Conferencia Nacional, los delegados allí presentes encargados de decidir el unificador de América se pusieron de nuestro lado gracias a nuestro diplomáticos. Esto, sin embargo, no sentó nada bien a los otros diplomáticos del Frente Nacional, quienes informaron a sus respectivos Gobiernos sobre la situación. Tras recibir la información, ordenaron a los diplomáticos que salvaran la situación tratando de anular la decisión, pero sus esfuerzos fueron en vano. Tras este fracaso, recurrieron a medidas desesperadas como expulsarnos no solo del Frente Nacional, sino que también nos expulsaron del propio Frente Nacional. Esto causó la disolución de la Conferencia Nacional, nuestros delegados criticaron con justas razones este movimiento, asegurando que los intentos de tomar el poder por los dos principales actores, el Movimiento Nacionalsocialista y el Frente Patriota, nunca viesen la luz del día.\n\nSin embargo, ahora tras el shock inicial, tenemos informes de movimientos de tropas cerca de nuestras fronteras, pues el Frente Nacional se prepara para dar el primer golpe o resistir el nuestro."
 atom.13.a: "Si quieren guerra, la tendrán."
 atom.14.t: "Con o sin ellos"
 atom.14.desc: "Nuestros aliados, nuestros camaradas, nuestros supuestamente confiables amigos. Han hecho lo imperdonable. Hemos luchado tan duramente por nuestra causa, así como por su causa. Creímos que con nuestra \"mutua amistad\", todo el mundo saldría ganando, pero cuando se desmoronó, cuando los delegados tomaron la decisión, cuando esta fue ratificada. Nos traicionaron. Nos echaron tanto del Frente como de la Conferencia Nacional, celosos de nuestra superioridad sobre ellos. ¡Esos patéticos traidores!\n\nPero eso importa poco ahora, ellos sabían las posibles consecuencias de sus acciones, y sabían perfectamente lo que podría pasar más adelante. Sabían quienes éramos. Lo que habíamos logrado en el pasado, a pesar de todas las adversidades. Es normal que cumpliéramos sus expectativas sobre nosotros, aún si ellos no cumplieron las nuestras. Solo pueden culparse a sí mismos por lo que se avecina.\n\nPor una abrumadora mayoría, nuestro gobierno, generales y ciudadanos leales han dado el visto bueno a una futura guerra contra el Frente Nacional y contra cualquier otro. Esta guerra no será como ninguna que hayamos librado antes, nuestros futuros enemigos conocen nuestras tácticas, también nuestro vigor y accionar. Saben que lucharemos hasta el último hombre, mujer y niño si eso nos asegurará la victoria. En segundo lugar, están en una mejor posición que nosotros, tienes más equipamiento, más hombres, más todo, y estamos seguro que no desperdiciarán nada. Es por esto, por la causa de la División Atomwaffen y sus partidarios, que deberíamos considerar el uso a gran escala de armas de destrucción masiva. Será nuestro as bajo la manga.\n\nNuestros enemigos serán muchos, y no tendremos aliados, pero ya hemos realizado gestas imposibles sin ellos con anterioridad."
 atom.14.a: "Será por las malas."
 atom.15.t: "Una transmisión para el recuerdo"
 atom.15.desc: "Mucho había cambiado en los Estados Unidos durante el corto período que abarcó la llamada \"desaparición\" de James Mason; en aquel entonces, todavía había algo de esperanza de paz, de algún tipo de resolución, a pesar de todo lo que había ocurrido. Algunos eran demasiado tercos para creer que América algún día podría caer de su gloria, colapsando en su propia podredumbre... Ahora, la fe en el Imperio dirigido por la Tribu se había desvanecido; una guerra como nunca antes vista arrasaba los restos de América, sacudiendo el sistema hasta sus cimientos. La División Atomwaffen había pasado de ser un pequeño grupo terrorista relativamente desconocido a una organización que infundía miedo en los corazones de las alimañas de toda la nación. Mientras tanto, una pregunta seguía persistiendo en la mente de los heroicos comandantes que formaban la División.\n\n¿Dónde estaba James Mason?\n\nAunque algunos habían oído hablar de su huida de Denver, no tenían la menor idea de hacia dónde se dirigía. Nada más que silencio radiofónico recibían los ansiosos acólitos de Mason. Sin embargo, Mason había estado planeando un regreso trascendental, uno que consolidaría a la División Atomwaffen como una fuerza a tener en cuenta, que destruiría los últimos vestigios de la degeneración americana antes de avanzar hacia el resto del mundo. Eso, claro, si no morían en el intento.\n\nEl regreso era lo único en lo que Mason podía pensar mientras estaba en su habitación de motel en Phoenix, desplomado sobre su sofá. Había escuchado las súplicas constantes de sus camaradas en Florida; cómo luchaban contra el asalto judaico con poca munición o material, cómo estaban atacados por todos lados tanto por bandas degeneradas como por fuerzas gubernamentales. Sin duda admiraba su fortaleza y voluntad, dos elementos que los llevarían a la victoria final en Tampa Bay. La mayoría en todo el país -o lo que quedaba de él- jamás imaginaría que avanzarían más allá de Fort Myers, y mucho menos hasta la tercera ciudad más grande del estado.\n\n¿Y Mason? Él siempre supo que serían victoriosos. Tomó el mando de la televisión, encendió el televisor y vio las noticias. Tampa, la División Atomwaffen... Eso era todo de lo que hablaban. Sintió el miedo en los ojos del presentador mientras veía las imágenes de la ciudad ardiendo y la gente sufriendo, sonriendo para sí mismo al ver la visión final del proyecto por el que había trabajado tan duro para lograr. Mientras el video continuaba, tomó su teléfono, abrió Telegram y se dirigió a una de las salas de chat."
 atom.15.a: "El padre regresa."
 atom.16.t: "El segundo al mando"
 atom.16.desc: "La División Atomwaffen ha sido durante mucho tiempo una organización descentralizada, pero con los recientes acontecimientos y éxitos en curso, son necesarias reformas. Está claro que hace falta una estructura más centralizada. El primer paso de la centralización será nombrar a nuestro primer Jefe de Gobierno. En esta cuestión entra en juego James Mason, quien es el que debe decidir a quien le dará ese puesto. El Jefe de Gobierno tendrá una gran cantidad de poder, pero, seguiría siendo el segundo al mando, permitiendo así que Mason pueda ponerlos en su lugar si deciden usar sus poderes para sus propio beneficio y no para el beneficio de la propia División.\n\nSu primera opción fue su fiel mano derecha, Brandon Russell, quien ha estado con Mason desde antes de la guerra y ha demostrado ser leal una y otra vez. A pesar de su afiliación a los ideales originales de la División, el aceleracionismo y la aniquilación, los cuales no se alinean del todo con la visión de Mason, la experiencia de Russel y su leal séquito hacen de él un buen candidato.\nSu segunda opción fue Jordan Jereb. Un recién llegado, Jereb rápidamente logró destacar gracias a su capacidad para captar reclutas y popularizar la División. Su experiencia previa como una milicia y su identidad cristiana son las razones tras el repunte de hombres en la División Atomwaffen anterior a la guerra. Sus ideas son más compatibles con las de Mason, pero puede que no sea por el hecho de que ha tenido que pasar por menos. Aún así, también sería una buena elección.\nSu tercera opción fue Joshua Sutter, el enigmático lider de la facción satanista en la División. Conocido por su naturaleza misteriosa y sus encubiertas y subversivas tácticas, responsables en parte del rápido crecimiento de la facción, formalmente no ha solicitado el cargo, alegando que le distraería de sus responsabilidades. Ni su lealtad ni sus ideas estaban muy claras, pero sus contribuciones y tácticas hacen de él una interesante, pero arriesgada, opción para Mason.\n\nLa decisión de Mason tenía una importancia colosal, y seguramente enfadaría a los candidatos rechazados. Pero como se suele decir, él que no arriesga no gana. Y finalmente, Mason tomó su decisión."
 atom.16.a: "Nombrar a Brandon Russell."
 atom.16.b: "Nombrar a Jordan Jereb."
 atom.16.c: "Nombrar a Joshua Sutter."
 atom.17.t: "James Mason regresa"
 atom.17.desc: "Tras la impactante victoria de Atomwaffen en la batalla de Tampa, han llegado informes y videos que muestran otro desarrollo sorprendente. El antiguo líder de Atomwaffen y cerebro de la organización, James Mason, habría llegado a suelo floridano y tomado el control de la División una vez más. Esto resulta una sorpresa, ya que antes de que estallara la Guerra Civil, James Mason fue encontrado desaparecido dentro de su casa durante una redada del FBI. Más tarde se informó que había sido asesinado durante luchas internas dentro de la División Atomwaffen; sin embargo, ahora está claro que esos informes fueron falsos, ya que videos y fotos muestran a Mason perfectamente saludable, posando con soldados de Atomwaffen.\n\nEl primer reporte de su llegada fue a principios de esta semana, cuando apareció un video que lo mostraba conduciendo por las calles de Fort Myers, saludando a soldados de Atomwaffen eufóricos. La tendencia continuó a medida que surgían más y más videos de Mason viajando dentro del territorio de Atomwaffen como si fuera una celebridad. La noticia alcanzó su punto culminante cuando se publicó un video de la División Atomwaffen. El video mostraba a dos personas, Mason y Brandon Russell, dentro de una habitación, presumiblemente una de las diversas sedes temporales cerca del frente, donde Brandon declaró que Mason se convertiría en el nuevo jefe de la División al final del día.\n\nSi la División Atomwaffen podrá derrotar a sus enemigos en Florida sigue siendo poco probable; sin embargo, la batalla de Tampa ha demostrado que, aunque débil, la División Atomwaffen todavía tiene dientes. Y con la llegada de Mason, solo podemos suponer que esos dientes se volverán más afilados."
 atom.17.a: "Nuestro salvador, nuestro Satanás y nuestro héroe."
 atom.17.b: "El hijo del demonio ha regresado."
 atom.18.t: "Lobo con piel de oveja"
 atom.18.desc: "\"Jesús, ¿por qué estamos en un puesto de control de nuevo?\" \"Por que te robaste el sándwich del comandante, Phil.\"\n\"Corrección, solo fue el sándwich, no todo su almuerzo. Los detalles, Josh, detalles.\" \"Cállate de una vez. Parece que viene un coche, actúa de forma profesional.\" \"No prometo nada.\"\nUn Toyota se acercó al puesto de control. El conductor, que balbuceaba un inglés roto, buscaba refugio de la División Atomwaffen. Tras un chequeo de la ID, fueron redirigidos a un campamento de refugiados cercano. Tras un silencio entre los dos soldados, uno empezó a hablar.\n\"Esos tipos parecen algo sospechoso, ¿no crees?\" Dijo Phil.\n\"¿De qué forma?\n\"Un grupo de hombres en edad militar, las ID parecen sospechosas. Quiero decir, ¿Qué hace un grupo de españoles en América?\"\n\"Probablemente por negocios, pero cuando inició la guerra civil quedaron atrapados aquí.\"\n\"Es posible... Cambiando de tema, ¿Has salido alguna vez con una latina? Esos españoles me recordaron a una chica con la que salí en el instituto-\"\n\"Por última vez, cállate de una puta ve-\"\n\nBOOM\n\n\"¡Coño! ¿Qué ha sido eso?\"\n\"No tengo idea, pero ha sido cerca de las barricadas. Súbete al Humvee, puede que haya víctimas, y probablemente necesitarán ayuda.\"\n\"Sí, definitivamente\"."
 atom.18.a: "\"Fase uno completada, comandante\", dijo el español."
 atom.19.t: "Fauna en Hitler-Strasse"
 atom.19.desc: "En los años anteriores a la guerra en Tampa, operó un santuario para animales exóticos próximo a Tampa. Estaba dirigido por Carole Baskin, una activista de los derechos de los animales con creencias similares a PETA y otras organizaciones de los derechos animales de estilo judío. Con Tampa y sus alrededores ahora bajo nuestro control, nos hemos visto obligados a gestionar un gran número de animales de la región. \"Big Cat Rescue\", como se le llamaba, se convirtió en un campo de refugiados en el que se dejaron de lado las operaciones habituales con animales, pero continuó en cooperación con la FEMA y el Gobierno de los EE.UU.\n\nCarole y Howard Baskin, los operadores del santuario, han huido a Costa Rica con todos los \"gatos grandes\" que podían llevar haciendo espacio para los refugiados, pero con nuestra conquista, estos viajes llegaron a su fin cuando el comandante al cargo de Tampa ejecutó a todos los refugiados, dejando a los animales vivos, a la espera de órdenes. Con el historial de los derechos de los animales en la Alemania Nazi (que dicta o al menos inspira nuestra postura con los derechos de los animales en nuestra doctrina política) contradiciendo las necesidades logísticas en Tampa, se ha abierto un fuerte debate sobre que se debe hacer, habiendo dos corrientes de pensamiento principales: Una argumenta que el parque entero debe ser demolido y reciclado para chatarra, el personal restante deben ser ejecutado, y los animales deben ser sacrificados e incinerados. Los proponentes argumentan que esta es la única forma de evitar que los combatientes por el ZOG puedan establecer una zona de operaciones en la agitada zona de guerra que es Florida  y que es beneficioso para nuestro esfuerzo de guerra, con el metal pudiendo ser valioso para el armamento.\n\nLa otra corriente apela más a los puntos de vista de Adolf Hitler, declarando que los depredadores del BCR son muy similares al hombre blanco, dos bestias que llegaron a reinar el mundo, ahora enjauladas por malhechores, y que los animales y quienes cuiden de ellos deben ser dejados por vida para abrir el \"Resorte de Depredadores de James Mason\", permitiendo a los veteranos de la División Atomwaffen descansar y relajarse mientras están en contracto con los principales depredadores de la naturaleza, recordándoles su poder.\n\nLas discusiones y los desacuerdos alrededor de este pequeño problema pueden parecer triviales, pero pueden explotar o causar divisiones internas dentro de la División Atomwaffen, algo que los líderes concuerdan en que no debe permitir crecer. Por lo que James Mason ha decidido zanjar el debate al..."
 atom.19.a: "...ordenar la demolición total del parque."
 atom.19.b: "...abrir el Parque de Depredadores de James Mason."
 atom.20.t: "Semilla de la misantropía"
 atom.20.desc: "\"¿Alguna vez has sentido esa sensación?\" En algún lugar de los muchos edificios abandonados de América, un hombre en la plenitud de su vida predica en silencio, solo para sí mismo. \"¿La sensación de pérdida, la sensación de saber que la vida que se suponía que debías tener, simplemente no sucederá?\" \"En la mayoría de los casos, esto significaría que no fue culpa de nadie, solo trabaja más duro, dicen, dedica tu vida a personas que te odian\". \"He visto la mirada en sus ojos, algo primitivo está oculto en todos nosotros, todos estamos cansados, hambrientos y con frío\". \"Mason tiene buenas intenciones, pero las buenas intenciones no nos llevaron a ningún lado, las personas que nos quitaron todo, siguen vivas y respirando y todos los que no están de nuestro lado...\" Se escucha un suspiro fuerte. \"Son cómplices, los necios pensarían que las revoluciones son herramientas de liberación, para liberar a una tribu de otra, para librarnos de algo que nos encadena, pero ¿y si cada aspecto del mundo es lo que nos encadena?\" \"No\". \"Las revoluciones deberían ser una herramienta de castigo, para castigar a los decadentes, para castigar a los débiles, para castigar a quienes nos quitaron todo, una vida feliz, una familia sonriente, calor, pureza, sinceridad\". Su voz se vuelve más errática, maníaca. \"La humanidad se ha olvidado a sí misma, blanca o no, nada de esto importa, todos merecemos nada más que lo peor, nuestras almas han sido sumergidas en concreto, nuestra naturaleza profanada\". \"No más, ni Mason ni Satanás ven el camino que está claro delante de nosotros, lo que debemos hacer para castigar a todos\". \"Pero yo sí\"."
 atom.20.a: "Pureza, a toda costa."
 atom.21.t: "Orgullo antes que destrucción"
 atom.21.desc: "\"¿Cuánto tiempo pasará hasta que alguien deje de ser digno de redención y salvación? Muchos de buena voluntad tienen sangre en las manos, porque los de buena voluntad saben lo que hay que hacer para garantizar la seguridad de su pueblo. ¿No fueron los cananeos exterminados por el bien de su pueblo? ¿No fueron los parásitos del oeste juzgados por Dios en los años 40? ¿Es malo librarse del pecado? Muchos de nosotros hemos sucumbido a la maldición del pacifismo, y en eso se ha enterrado su espada llameante, y en eso nuestros pecados han crecido hasta el punto de que nos estamos ahogando en ellos. Mira afuera, a las ciudades decadentes, llenas de codicia y lujuria. Cada hombre, mujer y niño es manipulado por el pecado. La bondad de nuestro pueblo ha sido explotada por demasiado tiempo, las masas corruptas nos han infectado, y como un fénix tenemos que librarnos de los parásitos. Que se escuchen las trompetas, desentierra la espada llameante, que llegue el juicio para ellos. El Armagedón está cerca, y lo traeremos a sus puertas\". - James Mason"
 atom.21.a: "Así Dios lo quiere."
 atom.22.t: "Nuestros impulsos"
 atom.22.desc: "¿Qué guarda la oscuridad? Una pregunta que solíamos hacernos cuando nos acurrucábamos alrededor de hogueras, temerosos de lo desconocido. Muchos de nosotros permanecimos ignorantes, quedándonos junto al fuego. Algunos predicaban sobre un salvador, uno que traería la luz a todas partes. Esa luz nunca llegó, en su lugar vinieron las cadenas alrededor de nuestro cuello. Moralidad mezquina, el contrato social y la presencia aplastante de la entropía de las fuerzas del capital y de Cristo. Pero algunos nos adentramos en la oscuridad, aprendimos la verdad, una verdad horrible. Somos bestias, monstruos, impulsados por deseos y urgencias primarias. Sin embargo, el culto al capital y el culto a la moralidad nos han obligado a encerrarnos en una prisión que llaman humanidad. En la oscuridad nos comunicamos con aquellos que otros no ven, aprendimos verdades terribles y técnicas místicas; para despojarnos de nuestra humanidad, debemos estar dispuestos a ser monstruos. La oscuridad nos mostró exactamente eso, tiene muchos nombres, pero sus tentaciones siguen siendo las mismas. Nos entregamos a todos los placeres, satisfacimos cada impulso, pero el peso de la entropía nos aplastaba. La era de la tecnología trajo nuevos métodos para domesticar a nuestras bestias internas, y la oscuridad nos urgió: el reloj avanza antes de que todos estemos encadenados para siempre. Tiene que ocurrir un colapso espiritual para liberarnos. Jordan Jereb y Brandon Russell han demostrado ser aliados decentes, por ahora. Sus caminos terminarán antes que el nuestro, tomaremos las riendas e ignoraremos las ilusiones de Jereb y la sed de sangre de Russell. Pasaremos nuestros días en una depravación aún mayor. Pero somos felices. Podemos mancharnos con nuevos colores cada día, a diferencia del resto de ustedes."
 atom.22.a: "En la oscuridad acechamos, nuestro destino nos espera."

 ATW_the_final_revolution_category: "La revolución final"
 ATW_the_final_revolution_category_desc: "\n\n\n\n\n£GFX_banner_ATW_the_final_revolution\n\n\n\n\n\n\n\nProvocar el fin requiere más que solo garras afiladas y odio en nuestros corazones. La destrucción es un arte que requiere precisión minuciosa, un barco que debe navegar en una tormenta permanente, y para ello necesitamos saber dónde y cuándo golpear corazones y mentes.\n\nDecir que la División Atomwaffen está dividida entre diferentes creencias sería quedarse corto: desde nihilistas hasta satanistas, desde cristianos hasta anarquistas, y requiere una voluntad férrea para mantener a quienes acechan en la oscuridad en el camino correcto. Sabemos cómo enfurecer a nuestra gente, cómo calmarla, cómo apaciguarla y cómo incitarla a desatar la carnicería; con susurros al oído y símbolos de poder, aplastaremos al enemigo.\n\nLas revoluciones no son una herramienta de liberación, sino de castigo."
 ATW_the_final_solution_category: "La solución final"
 ATW_the_final_solution_category_desc: "\n\n\n\n\n£GFX_banner_ATW_harolds_of_the_apocolypse\n\n\n\n\n\n\n\nHa llegado el momento por el que hemos luchado toda nuestra vida. Con América aplastada bajo nuestra estampida de caos, hemos logrado asegurar la parte final de nuestro objetivo: las armas nucleares, el gran ecualizador, la herramienta que reduce a cenizas tanto a los débiles como a los fuertes.\n\nTenemos el cuello del mundo en nuestras manos y lo partiremos. Por supuesto, no pretendemos morir junto a nuestro odio; debemos hacer los preparativos adecuados, almacenar suministros, construir refugios para que nuestra gente pueda prosperar después del fin y fortalecer sus defensas.\n\nEs inevitable que el mundo se detenga en seco al darse cuenta de lo que planeamos, y como el último estertor de un anciano, intentará frenarnos por todos los medios necesarios. No podemos detenernos ahora, no podemos perder ahora, porque eso hará que todos nuestros esfuerzos sean en vano. Prepárate, porque esta es nuestra prueba final antes de nuestra gran liberación.\n\nConocemos bien al segador y no le tememos.\n\nIntenta mantener la §Ysospecha§! lo más baja posible. Si supera el §R40%§!, nuestros enemigos vecinos formarán una coalición contra nosotros y nos declararán la guerra. ¡Si supera el §R60%§!, iniciará una revuelta interna! Si alcanza el §R80%§!, todas las grandes potencias podrán intervenir.\n\nActual $ATW_suspicion_name$: [?ATW_suspicion_var|-1%]\n$ATW_suspicion_name$ semanal: [?modifier@suspicion_weekly|=-1%]\n"
 ATW_heralds_of_the_apocalypse_category: "Heraldos del Apocalipsis"
 ATW_heralds_of_the_apocalypse_category_desc: "\n\n\n\n\n£GFX_banner_ATW_harolds_of_the_apocolypse\n\n\n\n\n\n\n\nSabíamos que este día llegaría: un festín de violencia sin fin y, en los días del león putrefacto, las hienas y los buitres siguen siendo los dominantes. Nos hemos preparado para esto; años de entrenamiento y acaparamiento nos han llevado a esto. El Imperio americano se desmorona y nos aseguraremos de que caiga aún más fuerte, no por piedad, sino por malicia.\n\nNo podemos permitirnos la derrota, porque eso significaría el fin de nuestra raza. Una bestia acorralada puede dar saltos peligrosos, y cuanto más nos vemos empujados a la desesperación, más nos convertimos en una llama brillante cada vez más difícil de extinguir. Tengan cuidado, no importa la intensidad de la llama, el agotamiento pronto seguirá y, a la larga, sufriremos más que ellos.\n\nSomos los cirujanos, y América es nuestra sujeto; sepamos dónde cortar y no nos dejemos arrinconar.[ATW_level_of_mechanic_text]"
 ATW_american_resistance_category: "Resistencia americana"
 ATW_american_resistance_category_desc: "A medida que nuestra conquista de América continúa y nuestra ola de destrucción avanza, es inevitable que haya ratas que serán capturadas y destruidas. Pero hasta que podamos aplastar toda resistencia, habrá ataques a nuestras operaciones tras nuestras líneas. No podemos permitir que estos ataques se descontrolen y abrumen a nuestras fuerzas policiales militares. Será necesario tomar medidas enérgicas en nuestro camino hacia el tranquilismo eterno.\n\n\n\n§YActual resistencia en estados ocupados: [ATW_resistance_text]§!"
 ATW_Devils_growth_category: "Crecimiento del Diablo"
 ATW_Devils_growth_category_desc: "Nuestra lucha por el poder y el dominio en la División finalmente ha llegado a su fin. Ahora que tenemos el control, impulsaremos a América a través del Infierno de Dante como la prueba definitiva para quienes sobrevivan."
 ATW_slaying_the_dragon_category: "Matar al dragón"
 ATW_slaying_the_dragon_category_desc: "El capital es una deidad mortal.\n\nAl final, no nos importa cuánto sea nuestro PIB ni cómo las cifras imaginarias definan nuestra calidad de vida. Sin embargo, incluso en tiempos tan turbulentos, necesitamos los medios para atraer a la gente a unirse y luchar por nuestra causa, ya sea por ganancias materiales, gloria o convicciones ideológicas.\n\nLa perfección solo llega tras la destrucción. No podemos librar una guerra solo con esperanzas y sueños; necesitamos una base temporal sobre la que construirnos, talleres que produzcan y modifiquen nuestras armas, la generosa mano de obra de las numerosas ciudades que capturemos y la riqueza de los parásitos que podamos utilizar."
 ATW_harrowing_devastation_category: "Devastación desgarradora"
 ATW_harrowing_devastation_category_desc: "\n\n\n\n\n£GFX_banner_ATW_harrowing_devastation_decision\n\n\n\n\n\n\n\nNuestra cruzada contra la inmundicia que una vez dominó los Estados Unidos ha llegado a su fin, pero el camino está lejos de terminar, ya que ahora tomamos posesión de estas nuevas tierras.\n\nLa siguiente fase de nuestro esfuerzo es transformar estos territorios, antaño corruptos y degenerados, en un bastión de nuestro régimen, un lugar donde nuestra ideología y visión no solo puedan arraigar, sino prosperar. Esta monumental tarea implica una profunda transformación cultural para alinear la sociedad con nuestros principios. Debemos centrarnos en integrar y transformar a nuestras nuevas poblaciones, guiándolas a través de un proceso de adoctrinamiento para que acepten nuestro régimen como su verdadero salvador. Posteriormente, nos enfrentamos al reto de abordar y reeducar a quienes persisten en su resistencia a nuestra visión, asegurándonos de que se alineen con nuestros ideales o sean destituidos para evitar cualquier amenaza a nuestra autoridad.\n\nEl camino por delante está, sin duda, lleno de dificultades, pero nuestros logros pasados demuestran nuestra formidable voluntad y fuerza. Habiendo logrado lo que una vez se consideró impensable, no hay razón para dudar de nuestra capacidad para superar estos nuevos desafíos y lograr lo inalcanzable una vez más."

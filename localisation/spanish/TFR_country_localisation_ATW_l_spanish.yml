 ATW_national_front_category_loc: "Nos ha ocurrido lo inesperado: hemos conseguido aliados. Aunque nuestra colaboración se centra actualmente en el apoyo militar, esto supone un impulso significativo para nuestra causa.\n\nSin embargo, como en cualquier alianza, existen oportunidades que aprovechar. Nuestros aliados tienen una posición superior a la nuestra, con más equipo, tecnología superior y economías más fuertes. No obstante, podemos aprovechar esto con medios subversivos. Ya sean escasez ocasional de suministros, vaciamiento de las tesorerías o robo de planos, todo puede ser utilizado en nuestro beneficio.\n\nSin embargo, debemos mantenernos atentos a la máscara que escondemos. Si nuestras acciones salen a la luz o son descubiertas, corremos el riesgo de ser expulsados del Frente Nacional o de enfrentarnos a algo peor: una guerra con nuestros antiguos aliados.\n\nIntenta mantener la §YSospecha§! lo más baja posible. Si supera el §R65%§!, seremos expulsados del §RFrente Nacional§! y tendremos que luchar por cuenta propia.\n\nActual $ATW_suspicion_name$ del Frente Nacional: [?ATW_suspicion_var|-1%]\n$ATW_suspicion_name$ semanal: [?modifier@suspicion_weekly|=-1%]\n"

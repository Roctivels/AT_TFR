l_spanish:
 ATW_its_only_begun: "Esto recién empieza..."
 ATW_its_only_begun_desc: "Por años, nuestra causa ha sufrido bajo la bota del judeobolchevismo y de los \"blancos\" complacientes dispuestos a traicionar su raza por dinero y poder, masacrando a héroes de la raza aria con sus sucias, codiciosas, viscosas y traidoras manos. Ahora, el principio del fin ha llegado. Cuando nuestra Gran Marcha se complete, la ira implacable del pueblo ario no perdonará a nadie. Esto recién empieza."
 ATW_reopen_the_ratlines: "Reabrir las rutas de ratas"
 ATW_reopen_the_ratlines_desc: "Mientras la guerra contra la degeneración global continúa en Florida, combatientes de todo el mundo toman las armas para luchar contra los parásitos allí donde más importa. Cientos de voluntarios extranjeros de todo el mundo han llegado para llenar los vacíos en el frente, y también han aportado formación e información adicionales. Si queremos que nuestra Gran Marcha continúe, deben abrirse líneas de apoyo en todos los rincones del planeta para ayudar en nuestra lucha, como las Legiones Extranjeras ayudaron a nuestros homólogos alemanes hace 80 años."
 ATW_friends_abroad: "Amigos en el extranjero"
 ATW_friends_abroad_desc: "Con la reapertura de las rutas de ratas en todo el mundo, llega el momento de desarrollar más contactos con nuestros homólogos globales. Las células y organizaciones clandestinas que hacen su parte para resistir la degeneración y las instituciones que reprimen a la raza blanca deben integrarse en la lucha mayor, ayudando a la llegada de legiones extranjeras a través de las líneas de combate. Organizaciones como la División Feuerkrieg en Europa, La Base en Cascadia, Combat 18 en el Reino Unido y el Movimiento Imperial Ruso vienen; todas ellas liderando la lucha contra el bolchevismo."
 ATW_operation_sleeping_beauty: "Operación: §YBella Durmiente§!"
 ATW_operation_sleeping_beauty_desc: "Nuestra División nunca ha estado verdaderamente centralizada, y eso es intencional. Los ataques terroristas de lobos solitarios que perpetuamos nos ayudaron mucho a resistir la asquerosa podredumbre que plaga la sociedad blanca, y ese sentimiento es ahora mayor que nunca, ya que llevamos la lucha a una línea de frente consolidada. Nuestros camaradas han logrado establecer células detrás de la línea, conocidas como los Werwolf, y ahora serán llamados a la acción. Aterrorizando la infraestructura civil y militar en las profundidades del territorio enemigo, la estructura decadente que promueve la asquerosa complacencia será derribada, y quienes se benefician de ella conocerán el verdadero horror y la desesperación."
 ATW_the_flames_of_change: "Las llamas del cambio"
 ATW_the_flames_of_change_desc: "Con la infiltración del judeobolchevismo en cada grieta y rincón de la \"sociedad\" americana, una corrosión degenerada que apunta a profanar a cada orgulloso ario tanto dentro como fuera de América, cualquier frágil esperanza de cortar la raíz de este problema por medios convencionales se ha desvanecido hace mucho, mucho tiempo. Los vientos del cambio ya soplan libremente por el aire; las gloriosas victorias tanto en el frente interno como en el extranjero han estimulado un nuevo llamado a los arios a tomar las armas contra la plaga parásita y reclamar su patria de quienes la saquean. Solo a través del fuego y el azufre, la raza blanca puede ser salvada."
 ATW_operation_orange_fuzz: "Operación: §YNiebla Naranja§!"
 ATW_operation_orange_fuzz_desc: "Con la gloriosa victoria sobre la degenerada mierda que es la Guardia Nacional, y la irrupción del Anticristo sobre nuestro flanco sureste, ahora es el momento de atraerlos a ambos a la misma trampa y asfixiarlos. El avance final hacia el norte contra los traidores leales que buscan continuar la matanza del pueblo ario ha comenzado, y cuando caigan, también lo harán los perversos Cascos Azules que ayudan a imponer el yugo de la judería global. ¡Pagarán por levantar la cabeza contra los cruzados arios, y lo harán muy caro!"
 ATW_the_antichrists_screams: "Los gritos del Anticristo"
 ATW_the_antichrists_screams_desc: "Tras una valiente lucha contra las fuerzas de los viles Cascos Azules, los virtuosos arios han emergido victoriosos de las cenizas de la degenerada ciudad de Miami. Sin embargo, la ciudad sigue siendo solo eso: un espectáculo de la plaga degenerada que consume a la raza blanca, plagada de elementos que subvierten la revolución aria. Si queremos alcanzar la victoria final, debemos erradicar por completo la raíz de la putrefacción floridana por todos los medios."
 ATW_operation_speedball: "Operación: §YSpeedball§!"
 ATW_operation_speedball_desc: "El colapso del orden en Florida ha tenido consecuencias tanto positivas como negativas para nuestra justa conquista, siendo uno de estos efectos colaterales los viles cárteles y bandas que asedian nuestra frontera noreste. Ciertas células de la División han podido infiltrarse con relativa facilidad en la plaga hispana que asola nuestra cruzada, y hemos podido utilizar estas conexiones en nuestro beneficio. A pesar de ello, siguen ayudando a los judeobolcheviques y desviando la atención de la zona de la bahía de Tampa. Esto no continuará por más tiempo, y hemos llegado a la conclusión de que serán presa fácil para nuestros guerreros..."
 ATW_judas_final_punishment: "Castigo final de Judá"
 ATW_judas_final_punishment_desc: ""
 ATW_broadcast_our_terror: "Retransmitir nuestro terror"
 ATW_broadcast_our_terror_desc: "Con la cruel matanza de cientos de degenerados urbanitas que plagan nuestra gran nación aria, está claro que la putrefacción judía va mucho más allá del estado de Florida. Los blancos complacientes con la subversión de su raza por fuerzas externas deben ser conscientes de la brutalidad necesaria para curar a la sociedad blanca de las razas inferiores que la plagan. Florida se convertirá en una película snuff interminable, que se retrasmitirá a todo el país."
 ATW_ransack_the_armories: "Saquear las armerías"
 ATW_ransack_the_armories_desc: "Aunque nuestros cruzados arios han demostrado ser extremadamente capaces en el campo de batalla, con una gran fuerza física y un amplio conocimiento de su armamento, este es escaso y poco común. Nuestros soldados han sido equipados con lo que se ha podido encontrar entre los restos de las víctimas y los saqueos, siendo la mayoría de estas poco fiables y la estandarización logística brilla por su ausencia. Esto ha creado una serie de problemas para nuestros hombres en el frente, impidiéndonos salir de las zonas urbanas clave que conducen al norte de Florida.\n\nPor tanto, es necesario un cambio importante en la política, que debe empezar por la homogeneización de los equipos del frente mediante el saqueo de armerías y bases militares que hayan sido utilizadas por los judíos degenerados para vigilar y masacrar a nuestro pueblo. Con su propio armamento, nuestros guerreros seguirán avanzando fusil en mano."
 ATW_accelerate_the_collapse: "Acelerar el colapso"
 ATW_accelerate_the_collapse_desc: "A pesar de que tras tanto tiempo, después de tantos triunfos y victorias, la degeneración judía que tantos blancos subyugados habían sido llamados a defender aún persiste en el Estado de Florida. Si el destino de nuestra División es el martirio, la única manera de que el mundo tema de verdad el poderío ario es infligir la mayor destrucción posible. Ningún hogar, ninguna fábrica, ninguna tienda, ninguna escuela ni biblioteca quedará intacta en nuestra llama de odio. Acelerar el colapso del Orden Mundial de Sion sólo bautizará a nuestros potenciales sucesores, y nuestras tropas de choque de primera línea deben saberlo; para ello, darán todo lo posible para asegurarse de que ningún alma que colabore con los degenerados quede con vida."
 ATW_domestic_small_arms_production: "Producción doméstica"
 ATW_domestic_small_arms_production_desc: "Desde la toma del sur de Florida, la capacidad industrial de la región ha quedado total y completamente destruida. Los trabajadores se han marchado en masa, y los que se han quedado sólo desean sobrevivir a nuestra matanza y nada más. Aunque fieles a los ideales de SIEGE, esto ha sido perjudicial para nuestro esfuerzo bélico; auxiliares, operadores de fuerzas especiales y soldados de infantería de primera línea por igual han sido desangrados por completo en el transcurso del gran asedio. Se debe utilizar una fuerza significativa para comenzar a poner en marcha la producción nacional de armas, y con el trabajo de los üntermenschen nacerá una nueva nación aria, bautizada en estas fábricas de armamento."
 ATW_invest_in_the_base: "Invertir en la base"
 ATW_invest_in_the_base_desc: ""
 ATW_an_army_purification: "Ejército de purificación"
 ATW_an_army_purification_desc: "Lo logramos. La División Atomwaffen, nuestros gloriosos caballeros arios, han vencido a los conspiradores judeobolcheviques en Florida quienes han profanado vigorosamente todos los aspectos de la sociedad blanca. Los blancos que permanecieron complacientes con aquellos que los subyugan serán tratados de la misma forma de la que trataremos a los propios judíos; en vez de actuar con crueldad y barbaridad, actuaremos como purificadores y la salvación definitiva del pueblo ario ahora que la mierda y sus colaboradores han sido eliminados."
 ATW_an_army_chaos: "Ejército de caos"
 ATW_an_army_chaos_desc: "Con nuestro triunfo sobre la amenaza judía en Florida, el verdadero alcance de sus complots ha quedado totalmente al descubierto, y son más profundos de lo que uno podría imaginar. En cada rincón de la sociedad global, asoman sus feas cabezas para continuar con su vil sistema de subyugación a escalas inimaginables. Su viciosa plaga se extiende tan profundamente dentro de nuestra sociedad que la única manera de librar completamente a la raza aria de la podredumbre y traer la verdadera salvación es amputarla por completo, incluso si esto significa revisar nuestras creencias nacionalsocialistas y renunciar a la política. Para los arios, está claro que su destino reside en la destrucción de cada grieta expuesta al Orden Mundial Judío, y que la purificación es simplemente imposible en este momento."
 ATW_rattelsnakes_and_alligators: "Cascabeles y caimanes"
 ATW_rattelsnakes_and_alligators_desc: "Ahora que Florida ha sido totalmente liberada de las viscosas manos de los judíos, nuestra atención debe desviarse hacia el norte para preparar una invasión al Sur. Un pozo negro de degeneración, que va desde los codiciosos neoconfederados que pretenden predicar los ideales de la raza blanca, mientras que en realidad están siendo utilizados por los judeobolcheviques para dividir a la raza blanca, hasta los separatistas negros que parecen haber olvidado su lugar. Florida fue sólo el principio, y ya es hora de que se derrumbe la siguiente estructura podrida."
 ATW_georgia_on_our_mind: "Georgia on My Mind"
 ATW_georgia_on_our_mind_desc: "Florida está sometida y nadie dentro se atreve a enfrentarse a nosotros. Por lo tanto nuestros espíritus miran hacia el norte, a otra satrapía oprimida de los Estados Judíos de América: Georgia. El estado posee muchas obras industriales modernas, así como la ciudad de Atlanta, un activo valioso a pesar de su corrupción a manos de los negros y sus señores judíos. Si alguno se resiste, azotáremos el estado como Sherman nunca lo haría."
 ATW_the_greatest_sin: "El mayor de los pecados"
 ATW_the_greatest_sin_desc: "Nosotros, hijos de Esaú, discípulos de Caín, nosotros, errantes, nosotros, malditos, hemos pensado durante mucho tiempo en inclinarnos ante el Nazareno o ante otros judíos para tener tan sólo un momento de paz. ¡Y desdeñamos esa noción a tiempo! ¡Todos los que sucumban al engaño de la debilidad deben ser eliminados en una lluvia de balas! Debemos ser como los espartanos, de quienes se decía que si un hombre volvía a casa de su legión derrotada, era un bandido."
 ATW_consolidate_the_command: "Consolidar el mando"
 ATW_consolidate_the_command_desc: ""
 ATW_sword_of_the_lord: "Espada del Señor"
 ATW_sword_of_the_lord_desc: "Revístanse con la armadura de Dios, para que puedan resistir las insidias del demonio. Porque nuestra lucha no es contra enemigos de carne y sangre, sino contra los Principados y Potestades, contra los Soberanos de este mundo de tinieblas, contra los espíritus del mal que habitan en el espacio.\n- Efesios 6:11-12\n\nLa batalla para extinguir a quienes se rebelan contra Dios no se resuelve solo con balas y armas, pues pueden ser la herramienta que los discípulos que él ha elegido usan para combatir a los herejes, pero una herramienta es frágil, se degrada con el tiempo y las existencias disminuirán. El Señor, sin embargo, nos ha concedido máquinas de renombre, un despliegue inagotable de industria en el sur que resolverá todas nuestras necesidades. Las fábricas que una vez enaltecieron quienes lucharon contra Él se convertirán en instrumentos sagrados de la cruzada contra los judíos \"israelitas\" que gobiernan el mundo en nuestra contra."
 ATW_desecrate_their_holy_sites: "Profanar sus lugares sagrados"
 ATW_desecrate_their_holy_sites_desc: "A lo largo y ancho de esta tierra, conquistada con sangre aria, se alzan grandes iglesias, construidas a la manera de Europa, o de formas más humildes, aunque no por ello menos insidiosas. En los mismos cementerios donde yacen los guerreros, junto a ellos descansan sacerdotes, negros y otras inmundicias. Estos edificios se han convertido en resentidos por todos los hombres honestos, y como tal, la eliminación de la mano protectora del Estado conducirá sin duda a que estos cánceres sean arrancados, aunque sin duda no sin una saludable efusión de sangre."
 ATW_water_their_fields: "Regar sus campos"
 ATW_water_their_fields_desc: "El orgullo del Sur son sus hermosas colinas ondulantes, sus granjas de primera calidad y sus bosques. Quedarán marcados y deformados hasta quedar irreconocibles por pestes que se consideraban muertas hace tiempo: la viruela, la polio, la peste negra, la malaria y cualquier otra enfermedad. Su orgullosa y hermosa agricultura, que se deja crecer con la sangre fresca, brillante y roja de los muertos, será la única gracia para los que queden: un día, se hundirá bajo tierra, mucho después de que la hayamos abandonado al caos desenfrenado."
 ATW_scar_their_homelands: "Cicatrizar sus hogares"
 ATW_scar_their_homelands_desc: "A todos los que no son arios no se les debe permitir vivir. Dondequiera que deban existir, deben ser como los Chandala: periféricos, impuros y despreciados. No deben tener ninguna religión más allá de la superstición más básica, porque cualquier cosa más se convertirá sin duda en un vehículo para su avance. No se les debe permitir el acceso a la tecnología más allá de las herramientas de trabajo básicas. Su entorno deben ser ruinas, como las de los asirios que, al ser interrogados por Alejandro, no sabían que los escombros en los que pastoreaban cabras fueron antaño un templo de sus antepasados."
 ATW_cleanse_their_cities: "Purificar sus ciudades"
 ATW_cleanse_their_cities_desc: "Las ciudades de este continente son pústulas; una vez exprimidas brotan torrentes de mugre, y sólo una vez que se ha cortado la infección puede comenzar la curación. Se derribarán los templos consumistas y en su lugar se construirán nuevos corazones, arenas y teatros donde la muerte y la vida se mezclen libremente, y no se permitirá más la arquitectura escuálida y sin alma. Las grandes multitudes que obstruyen sus arterias serán reducidas, mediante todos los estímulos a nuestra disposición. Entonces, y sólo entonces, ¡las ciudades serán puras!"
 ATW_break_the_southern_spirit: "Romper el espíritu sureño"
 ATW_break_the_southern_spirit_desc: "La América yanqui construyó un Imperio de hierro y sangre, engendrado por el grito de los nazarenos más concentrados y corrompidos. A punta de fusil cayó la nobleza aria del Sur, y desde entonces la región ha estado dominada por sus más degenerados elementos. En consonancia con negros y judíos han renunciado a su derecho de nacimiento en pos del Reino de Jesús. El pasado debe ser redimido. Los nobles arios que yacen bajo su suelo claman por venganza contra sus asesinos, sí, pero primero claman por verdugos"
 ATW_an_orgy_of_violence: "Una orgia de violencia"
 ATW_an_orgy_of_violence_desc: "¿Qué martirios tendrán si todos mueren? ¿Quién llorará por nuestras atrocidades si nadie que las vea saldrá con vida de ellas? ¿Adónde escaparán, si no hay lugar libre de nuestras balas, o suficientemente santo para que los descuidemos? ¿Por qué abrirán la boca, si está llena de sangre? ¡Nuestra consigna es la muerte! Nuestro mandato es la violencia, nuestro mantra es ¡Matar, Matar, Matar!"
 ATW_collective_punishment: "Castigo colectivo"
 ATW_collective_punishment_desc: "Desde lo más abajo hasta lo más arriba, el pueblo de esta nación ha sido corrompido. La podredumbre ha congelado sus corazones, exhortándoles a la cobardía, al equívoco, al cristianismo. Como a un niño hay que disciplinarlo para que no se vuelva caprichoso, así hay que controlar a la población. Dondequiera que se organicen los bandidos, la población debe rendir cuentas. Dondequiera que se reúnan los criminales, sus cómplices deben ser tratados como tales."
 ATW_lucifers_last_laugh: "La última risa de Lucifer"
 ATW_lucifers_last_laugh_desc: "El cuarto giro ha comenzado. Cristo y su idealogía infernal de baja calaña han sido vencidos, para siempre; ¡Hemos vencido, nosotros los apolíneos, nosotros los luciferinos! Nuestros enemigos, los enemigos de la raza aria y de su destino cósmico, han sido derrotados por completo. Aunque se aferren a sus dominios residuales, luchando con una tenacidad casi admirable, serán aplastados, y su recuerdo será sólo una nota a pie de página en la gran saga de la naciente sociedad."
 ATW_the_final_aeon: "El eón final"
 ATW_the_final_aeon_desc: "Con nuestra revolución, la más importante de la historia, ha comenzado una nueva era. Somos el único grupo, la única sociedad que afirma el destino histórico de la raza aria y mira siempre hacia el futuro, donde esa misma raza se extenderá por todo este universo en pos de la sabiduría y la conquista. Puede que sólo controlemos una pequeña porción de territorio, pero a medida que ganamos más, ganamos más arios, y por lo tanto más cerca de inaugurar el eón final: aquel en el que las razas inferiores serán quemadas, y los arios vivirán y gobernarán este planeta, sin ser cuestionados."
 ATW_cull_the_interfering_nazarenes: "Sacrificar a los nazarenos interferentes"
 ATW_cull_the_interfering_nazarenes_desc: "Incluso dentro de nuestras filas, el hedor plebeyo del cristianismo, su canto de sirena de una era de orden a través de la paz y la buena voluntad, infecta las mentes. Mientras que el viejo tonto de Mason los toleraba, e incluso se llamaba a sí mismo uno de los suyos, los luciferinos no tememos a este falso Dios y no tenemos reparos en aniquilar a sus adeptos. Comenzaremos con nuestra propia División, y después haremos la guerra a toda la Cristiandad dentro de esta nación."
 ATW_insurrection: "Insurrección"
 ATW_insurrection_desc: "Mason ha sido... iluminado. Ahora gobiernan con él sus fieles leales: Joshua Sutter y John Denton. Una nueva era es innagurada; Atrás quedaron las alusiones a Cristo, de cumplir las profecías de Dios, incluso cualquier lealtad a ese Dios; la División Atomwaffen ahora afirma las doctrinas de Lucifer. En lo alto de un gran santuario en Tampa, hay una estatua de ese gran dador de sabiduría. Ha tenido lugar una revolución siniestra, una gran insurrección dirigida contra todas las fuerzas que dirigen este mundo, que se extenderá inexorablemente desde Florida a todo el planeta."
 ATW_organize_the_kollective: "Organizar el Kolectivo"
 ATW_organize_the_kollective_desc: "En todo el mundo, miles comparten nuestras siniestras doctrinas. Se les ha disuadido de unirse a nuestra lucha debido a la podredumbre corruptora del cristianismo , pero ahora, con esas doctrinas repudiadas, están inundando nuestro territorio, aportando valiosa experiencia y mano de obra desesperadamente necesaria. Sin embargo, todos estos grupos dispares creen en cosas ligeramente diferentes; nuestro movimiento es heterogéneo, pero ahora, con el giro sobre nosotros, deben organizarse como un solo cuerpo, para actuar en concierto y con un solo objetivo."
 ATW_open_their_eyes: "Abrirles los ojos"
 ATW_open_their_eyes_desc: "Los arios han seguido a Cristo, ¿y de qué les ha servido? Guerras tras guerras, derramamientos de sangre innecesarios manchando el suelo de Europa y América, todo por las peculiaridades de las divagaciones de gente del desierto. No es de extrañar, pues, que se haya producido un alejamiento del cristianismo a medida que las costuras de la sociedad occidental se deshacen; sin embargo, extrañamente, muchos siguen aferrándose a esta religión arcaica. Hay que iluminarlos. Debemos difundir incesantemente las falsedades de su libro sagrado, iluminar la inexistencia de Cristo y dilucidar las perversiones de San Pablo. El cristianismo debe ser desacreditado, su palidez iluminada para que todos la vean."
 ATW_gather_the_opfers: "Reunir a las víctimas"
 ATW_gather_the_opfers_desc: "Los políticos, los supuestos líderes de nuestro pueblo, no han hecho nada bueno. Son animales de circo, que hacen trucos retóricos para hipnotizar y apaciguar a sus electores. Ya es hora de que hagan realmente un servicio a su pueblo; los reuniremos en nuestros templos, y con sus corazones palpitantes y su sangre nos darán fuerza. Sus gritos nos enervarán, sus convulsiones y contorsiones nos darán símbolos del nacimiento de una nueva sociedad."
 ATW_siege: "Siege"
 ATW_siege_desc: "Algunos hablan de golpes, otros de resurgimiento. Sea como fuere, la División se ha mantenido unida. Los satanistas y los cristianos han unido sus manos, dejando a un lado las herejías y las doctrinas celestiales; nuestros objetivos son temporales y directos. Hemos gastado demasiado tiempo valioso luchando unos contra otros, los satanistas, tontos tal vez, condenados tal vez, los cristianos, embelesados y descarriados se podría decir, están unidos en una simple creencia; América tal como es debe morir. Lucharán juntos en esta cruzada, por ahora."
 ATW_post_organizational_ethos: "Ethos post-organizativo"
 ATW_post_organizational_ethos_desc: "Aunque estamos totalmente dedicados a la destrucción de los Estados Judíos, debemos tener un plan de qué hacer con su territorio una vez completada nuestra conquista. No somos bárbaros poco sofisticados; estamos bien familiarizados con los filósofos y los grandes líderes de la historia, y podemos tomar de ellos el modelo de la sociedad de posguerra ideal."
 ATW_the_brown_internationale: "La Internacional Parda"
 ATW_the_brown_internationale_desc: "Los nacionalsocialistas afines de todo el mundo han acudido a nuestro territorio para participar en la gran cruzada en el corazón mismo del imperio judío mundial. Han llenado nuestras filas donde nos faltaban hombres y refuerzan nuestra legitimidad a los ojos de otros partidos. No sólo debemos aceptar su ayuda, sino también liderarla. Debemos proporcionar un brillante ejemplo de nacionalsocialismo para que nuestros camaradas lo prediquen en sus países de origen, y debemos dar refugio a los perseguidos por sus Gobiernos dirigidos por judíos."
 ATW_revolutionary_nazism: "Nazismo revolucionario"
 ATW_revolutionary_nazism_desc: "No somos de derechas. No buscamos proteger algún antiguo orden, ni queremos volver a alguna época dorada. Somos revolucionarios; odiamos el sistema y buscamos derribarlo. Toda institución: iglesia, escuela y los lugares de trabajo, deben ser completamente reformadas. Las jerarquías impuestas por los judíos deben ser abolidas, y en su lugar, jerarquías raciales orgánicas deberán ser fomentadas y defendidas. No nos disculparemos por el terror que hemos infligido y continuaremos infligiéndolo orgullosamente, somos el fuego que consume la madera muerta, dejando un suelo fértil del que tal vez se alce una nueva sociedad."
 ATW_chaos_friction_anarchy: "Caos, fricción y anarquía"
 ATW_chaos_friction_anarchy_desc: "Nuestro modelo para proseguir con esta guerra será el de los luchadores de la libertad islámicos en Siria e Irak; les bombardearemos donde menos se lo esperen, en sus áreas aparentemente más seguras. Nos infiltraremos y les degollaremos. Cualquier administración estará en nuestra mira: desde la purificación de agua hasta el bienestar social. Sembraremos el desorden entre sus filas y avivaremos protestas en sus calles. No tenemos escrúpulos con el terrorismo o con la violencia masiva, no hay civiles en esta guerra, solo aquellos que están dentro o fuera de nuestro territorio."
 ATW_the_one_truth: "La única verdad"
 ATW_the_one_truth_desc: "El nacionalsocialismo es la única ideología que encara a todos los problemas del mundo moderno, y que busca solucionarlos. No tiene paciencia para los procesos parlamentarios ni busca implementar una dictadura de poca monta. Es explícitamente racial, donde otros \"no ven ningún color\". El verdadero nacionalsocialismo es moral, pero no farisaico. Está dispuesto a usar la violencia, pero está igualmente dispuesto a interactuar pacíficamente con sus hermanos arios. Somos amigables ante todos los buscadores de la verdad y odiamos a todos los mentirosos. La nuestra es la única doctrina que busca totalmente la verdad, y que promulga lo que esta disponga."
 ATW_rally_the_siege_network: "Reunir a la red SIEGE"
 ATW_rally_the_siege_network_desc: "América está llena de nacionalsocialistas; algunos luchan en las profundidades de los decadentes escombros industriales de Detroit, otros diezman a los bandidos libertarios en los tranquilos bosques de Nueva Inglaterra. Ellos sirven a maestros quienes pueden compartir algunos de sus ideales, e incluso elogien su entusiasmo, pero no buscan realmente el nacionalsocialismo como los adherentes a la doctrina SIEGE. Es en los pantanos de Florida en que estos asediados buscadores encontrarán sus ideales, les llamaremos para que vengan y ayuden a la auténtica revolución nacionalsocialista."
 ATW_purity_of_the_vanguard: "Pureza de la vanguardia"
 ATW_purity_of_the_vanguard_desc: "Debemos ser morales, no necesariamente en un sentido cristiano, pero en una forma comúnmente aceptada por todos nuestros ancestros. Seremos castos al tratar con el sexo opuesto, evitar la crueldad hacia los inocentes e impartir la justicia con estoicismo."
 ATW_recruit_the_youth: "Reclutar a los jóvenes"
 ATW_recruit_the_youth_desc: "Muchos se arrepienten de nacer en esta época; en vez de explorar horizontes desconocidos en África y en las Américas, o explorar las profundidades del cosmos en un futuro lejano, están atrapados como esclavos del ZOG y viven una vida insatisfecha en su dominio. Con nuestra toma de poder, le daremos a la juventud aria una oportunidad para probarse a si mismos tal y como hicieron sus ancestros y cosechar las recompensas. Les prometeremos una vida fácil y trabajos tranquilos solo si ellos toman las armas y derrocan al infernal sistema que les mantendría esclavizados para siempre."
 ATW_american_futurism: "Futurismo americano"
 ATW_american_futurism_desc: "¿Qué son los monumentos envejecidos de este país más allá de vestigios de un sistema muerto? ¿Qué nos dicen los rostros solemnes de los líderes del ayer aparte de que somos unos fracasados?  Debemos alejarnos de los monumentos, debemos derribarlos. Inauguraremos una nueva era, una en que nuestra raza sea la base de nuestro Gobierno, una en que todos sirvan al interés ario, ya sea económico, cultural o político."
 ATW_the_end_times: "Fin del los tiempos"
 ATW_the_end_times_desc: "Tiempos oscuros se aproximan a esta tierra, nuestros cuchillos están cada vez más afiliados y encuentran descanso en el pecho de nuestros enemigos. Nuestras bombas aniquilan la moral y las estructuras de nuestros enemigos. Nuestros soldados matan a sus esbirros. El día de la soga se encuentra al caer, todos deberán hacerle frente por sus deserciones justas, por traicionar a su raza, por fallarla, por huir frente a sus enemigos. ¡El justo puño de la raza aria ata el nudo!"
 ATW_the_new_hitler: "El nuevo Hitler"
 ATW_the_new_hitler_desc: "Adolf Hitler fue el padre de todos los movimientos nacionalsocialistas. Gracias a su brillantez, Alemania se recupero de una depresión económica y casi acabó con el orden mundial judío y sus subsidiarias bolcheviques y capitalistas. Aunque en última instancia fue martirizado, su ejemplo sigue estando presente. Hoy, James Mason toma su lugar; Brandon Russell y otros nacionalsocialistas tomarán el manto cuando nuestro querido líder fallezca. Verdaderamente, el sueño está más vivo que nunca."
 ATW_resurrection: "Resurrección"
 ATW_resurrection_desc: "¡Satán se ha revelado en nuestras filas! ¡El instrumento para la salvación de nuestra raza casi fue una daga en las manos de nuestros adversarios! ¡¿Que destrucción, que maldad se hubiera forjado?! Mas no ocurrió; después de mucha contemplación y oración, James Mason emergió y declaró una nueva dispensación. Dios determinó a la División como Su instrumento, por el cual Su pueblo será llevado a Él, que Su Reino será establecido en esta Tierra. ¡Hosana y Aleluya, la vuelta de Cristo es inminente!"
 ATW_spokesman_of_god: "Vocero de Dios"
 ATW_spokesman_of_god_desc: "Habiéndose alguna vez rendido frente al engaño y tentación del adversario, James Mason es ahora un hombre de fe. Dios habla por su lápiz. El profetiza en el nombre del Señor y clama miseria a los opresores de sus verdaderos, israelitas arios. ¡La División ya no es tan solo un movimiento de nacionalsocialismo pero uno de los evangelios y del Reino de Dios en la Tierra!"
 ATW_admonish_the_sinner: "Amonestar al pecador"
 ATW_admonish_the_sinner_desc: "Por mucho tiempo en América el pecado se ha exacerbado. Salas de lujuria, gula, ebriedad, e ira llenan sus calles, tomando a muchos y escupiendo personas rotas y reprochables. Mezcla racial del peor tipo ha ocurrido allí, un hedor que trastorna a nuestro Señor. Nuestros líderes han aprobado de dicha degeneración. ¡Incluso nuestro previo presidente manejaba casinos y se caso con una mujer de portada! La ira de Dios ha sido encendida, y seremos nosotros los que la cumplamos. Todas estas guaridas del mal serán destrozadas, y sus esclavas serán transformadas en gente de Dios o serán liquidados."
 ATW_combat_the_heretics: "Combatir a los herejes"
 ATW_combat_the_heretics_desc: "Porque han invadido el mundo muchos seductores que no confiesan a Jesucristo manifestado en la carne. ¡Ellos son el Seductor y el Anticristo!\n- 2 Juan 1:7\n\nEntre nuestras filas, hay satanistas. Fuera, los innumerables y pendencieros supuestos cristianos. Son herramientas del engañador por igual. Así como ahorcamos a los satanistas, debemos destruir las denominaciones. Nuestra guerra contra las iglesias será lenta pero total. Jesucristo declaró que Su Iglesia debe ser una, y como vicario de Dios, James Mason hará realidad esa visión."
 ATW_honor_the_martyrs: "Honrar a los mártires"
 ATW_honor_the_martyrs_desc: "Cuando el Cordero abrió el quinto sello, vi debajo del altar las almas de los que habían sido inmolados a causa de la Palabra de Dios y del testimonio que habían dado. Ellas clamaban a voz en cuello: «¿Hasta cuándo, Señor santo y verdadero, tardarás en hacer justicia y en vengar nuestra sangre sobre los habitantes de la tierra?».\n- Apocalipsis 6:9-10\n\nTantos de nuestros hombres han sido martirizados por nuestro Gobierno satánico, así como nuestro Cristo fue crucificado por los fariseos. Tom Metzger fue difamado, la familia de Randy Weaver fue asesinada, y tantos otros han enfrentado las cárceles, cayendo presa de toda la inmundicia que allí se encuentra o muriendo sin ser liberados. Sus nombres jamás serán olvidados. Muchos han sufrido por la verdad, mientras que mentirosos e hipócritas han prosperado. ¡Mas los primeros serán últimos y los últimos, primeros!"
 ATW_our_new_prophets: "Nuestros nuevos profetas"
 ATW_our_new_prophets_desc: "Pero tú no tienes ojos ni corazón más que para tus ganancias, para derramar sangre inocente, para practicar la opresión y la violencia.\n- Jeremías 22:17\n\nAsí como Jeremías denunció a Israel desobediente, como Ezequiel predijo la destrucción del Templo, como Moisés guió a su pueblo hacia la Tierra Prometida, James Mason denuncia el pecado de los arios descarriados y lidera el Ejército de Dios contra el sionismo y otras fuerzas heréticas que lo alientan. Esta nación degradada y enajenada ha ignorado a Dios durante demasiado tiempo, y ahora debe desangrarse. ¡Somos justificados solo por la palabra de Dios!"
 ATW_infiltrate_the_army_of_god: "Infiltrarse en el Ejército de Dios"
 ATW_infiltrate_the_army_of_god_desc: "Yo estoy junto a la puerta y llamo: si alguien oye mi voz y me abre, entraré en su casa y cenaremos juntos.\n- Apocalipsis 3:20\n\nEn Georgia, hombres que gritaban versos de Jeremías bombardearon centros de Planned Parenthood y otros instrumentos del Gobierno satánico. Si bien su negrofilia y su dedicación a una rama del cristianismo los limitan, podemos llevarles la palabra verdadera. Primero, nuestros agentes los guiarán para que ataquen en connivencia con nuestros planes, luego inculcarán lentamente nuestras doctrinas entre ellos para que sean instrumentos de Dios, tal como lo deseen."
 ATW_renewed_faith: "Una fe renovada"
 ATW_renewed_faith_desc: "Dios ha vuelto a América. Ha habido un brote de milagros en nuestro territorio: glosolalia, curaciones a los enfermos con solamente tocarlos, y expulsiones de demonios de los poseídos. Han habido tantos milagros de este tipo que nuestros medios solo pueden dar a conocer los más únicos y llamativos. Las iglesias están a rebasar con creyentes ahora familiarizados directamente con el poder milagroso del Todopoderoso."
 ATW_the_chosen_go_on: "Los elegidos seguirán"
 ATW_the_chosen_go_on_desc: "Dios ama a los guerreros que luchan para mantener Su Evangelio quienes, evangelizados por un mero verso de la escritura, están dispuestos a dar sus vidas. Nuestro Señor dice que serán los mansos los cuales recibirán la tierra por heredad, pero también lo harán los defensores de los mansos. Nuestros hombres que mueren en colinas lejanas dejaran esta tierra para clamar su espacio ante los pies de su salvador, en el Imperio del Señor, por los siglos de los siglos. Amén."
 ATW_the_final_crusade: "La cruzada final"
 ATW_the_final_crusade_desc: "Obligaré a los de la sinagoga de Satanás -que mienten, porque se llaman judíos y no lo son- a que se postren delante de ti y reconozcan que yo te he amado.\n- Apocalipsis 3:9\n\nLos enemigos que enfrentamos representan una amenaza mayor para nuestra fe que cualquier otra que hayamos enfrentado antes. Nos enfrentamos a un enemigo que adora al carcelero de este mundo, no a su salvador. Nos enfrentamos a un enemigo que desciende de quienes crucificaron a nuestro salvador, con la mancha de su sangre manchándolos a ellos y a sus hijos para siempre. Esta cruzada final será contra estos supuestos israelitas judíos, ¡y serán derrotados!"
 ATW_apostles_of_the_apocalypse: "Apóstoles del Apocalipsis"
 ATW_apostles_of_the_apocalypse_desc: "Y vi aparecer otro caballo, rojo como el fuego. Su jinete recibió el poder de desterrar la paz de la tierra, para que los hombres se mataran entre sí; y se le dio una gran espada.\n- Apocalipsis 6:4\n\nEl caballo, Mason; la espada, la División."
 ATW_gods_chosen: "Electos de Dios"
 ATW_gods_chosen_desc: "Cuando el Cordero abrió el tercer sello, oí al tercero de los Seres Vivientes que decía: «Ven». Y vi aparecer un caballo negro. Su jinete tenía una balanza en la mano.\n- Apocalipsis 6:5\n\nSomos la justa mano de Dios, nuestros rifles la balanza; cortaremos el trigo y la cebada, y ahorraremos el buen aceite y el vino del pueblo del Señor."
 ATW_teutonic_rage: "Ira teutóna"
 ATW_teutonic_rage_desc: "Y vi aparecer un caballo amarillo. Su jinete se llamaba «Muerte», y el Abismo de la muerte lo seguía. Y recibió poder sobre la cuarta parte de la tierra, para matar por medio de la espada, del hambre, de la peste y de las fieras salvajes.\n- Apocalipsis 6:8\n\nComo el pueblo del Señor se despojó a sí mismo en el abrazo de Roma, el Señor consideró conveniente prescindir de ese Imperio por la mano justa de los germánicos. Nosotros, descendientes de aquellos invasores, somos como ellos en propósito: la Babilonia washingtoniana caerá por nuestra espada."
 ATW_america_free_from_sin: "América, libre del pecado"
 ATW_america_free_from_sin_desc: "Ya no habrá allí ninguna maldición. El trono de Dios y del Cordero estará en la Ciudad, y sus servidores lo adorarán.\n- Apocalipsis 22:3\n\nLa Nueva Jerusalén está cerca; nuestras manos encallecidas anhelan la suavidad del Cielo; nuestros ojos, manchados por el color pardo de la sangre y la devastación, anhelan el brillo de los caminos dorados del Cielo. El Reino de Cristo en la Tierra está cerca. Mason dice que la hora ha llegado; debemos abrir paso a Cristo."
 ATW_tools_of_the_apocalypse: "Herramientas del Apocalipsis"
 ATW_tools_of_the_apocalypse_desc: "El mundo debe pagar por rechazar el mensaje de Hitler. Nosotros los nacionalsocialistas no hemos olvidado, y menos perdonado. No fue sólo el judío quien desmanteló el Reich, fue la cobardía de su gente. Esta herida todavía supura; debe ser cauterizada urgentemente. Por fuego esta nación subvertida deberá sufrir y renovarse; después, Europa deberá caer otra vez, el nuevo imperium impartirá justicia como le parezca."
 ATW_the_final_army: "El ejército final"
 ATW_the_final_army_desc: ""
 ATW_accelerate_into_the_end: "Acelerar el fin"
 ATW_accelerate_into_the_end_desc: "Esta gran guerra presenta una oportunidad. Nuestra raza se ha acostumbrado a la pereza y la facilidad por demasiado tiempo. Deberán aprender a herir, a sangrar. Nosotros debemos ser violentos para que nuestros enemigos sean violentos. Debemos crear viudas para que ellos sean viudos. Debemos azotar esta tierra más allá de la comprensión para que nuestra raza pueda cerrar su corazón a la lastima, y hacerle a los demás lo que ella ha hecho a si misma."
 ATW_the_american_overman: "El sobrehombre americano"
 ATW_the_american_overman_desc: ""
 ATW_begin_the_liquidation: "Iniciar la liquidación"
 ATW_begin_the_liquidation_desc: ""
 ATW_the_will_to_survive: "Voluntad para sobrevivir"
 ATW_the_will_to_survive_desc: ""
 ATW_harbringers_of_the_apocolypse: "Heraldos del fin"
 ATW_harbringers_of_the_apocolypse_desc: ""
 ATW_reinforce_the_florida_citadel: "Reforzar la ciudadela de Florida"
 ATW_cult_of_the_individual: "Culto al individuo"
 ATW_cult_of_the_individual_desc: "Solo nosotros tenemos la verdad. Guiados por un hitlerismo puro, vamos a conducir resueltamente al futuro. En Florida, la semilla de la nueva sociedad ha sido plantada, y en ese fértil terreno, crecerá. Hemos sobrepasado hasta las aspiraciones más descabelladas de nuestros antepasados y contemporáneos, quienes fueron y han sido afligidos por separatismo mezquino y visiones diminutas."
 ATW_e_pluribus_unum: "E pluribus unum"
 ATW_e_pluribus_unum_desc: "Entre las muchas visiones enfrentadas sobre la sociedad aria ideal, una ha sido exitosa, pero, no somos emergentes de verdad. Si no fuera por las lecciones aprendidas por el Imperativo del Noroeste o las cruzadas de los Caballeros Blancos del Klan, hubiéramos cometido toneladas de errores desastrosos. Seguidores fragmentados de estas visiones deberán ser aceptados y traídos a nuestro rebaño, ya que sus objetivos son nuestros también."
 ATW_in_our_image: "En nuestra imagen"
 ATW_in_our_image_desc: "Los Estados Unidos de América fue un proyecto fallido desde el principio. Sus Padres Fundadores se contradijeron cuando afirmar que todo hombre es creado igual, aunque la nueva nación solo seria refugio a los hombres blancos y libres de buen carácter. Lo antiguo tiene que ser sublimado, la plaga sacrificada, y los sanos salvados. Dejen que las Estrellas y las Franjas caigan, para que algo nuevo, mejor, ascienda en su lugar."
 ATW_in_his_name: "En su nombre"
 ATW_in_his_name_desc: "Di. Su. Nombre. El Führer solo buscaba paz y el espacio vital para su pueblo y por eso, la judería internacional arrasó su país. Sus palabras han resonado durante décadas, el dulce verso de Mein Kampf iluminando las tácticas de los adversos con más destreza que cualquiera exceptuando tal vez a Mason. Aunque esta corrupta nación jugo un rol en derrocarlo, las semillas de sus ideales vivieron dentro de su dominio, creciendo hasta que la oportunidad se presentara. Debemos hacer justicia a Hitler. Tenemos que enseñar a nuestros soldados a venerarlo, a completar su visión en todo su esplendor."
 ATW_no_cost_too_high: "No hay costo muy caro"
 ATW_no_cost_too_high_desc: ""
 ATW_conquest: "Conquista"
 ATW_conquest_desc: "Somos un ejército, como el de Alejandro o César. Hemos cruzado el gran rio de la falsa moral cosmopolita, y hacia esa Roma ha de ser. Nuestros números crecen diariamente, por los miles de hombres jovénes que corren nuestras legiones, impacientes por traer una nueva sociedad. ¡Hemos sido comparados con los Vándalos quienes destruyeron Roma en 455, estamos de acuerdo! Hemos llegado a limpiar esta sociedad degenerada, con sus miles de filosofías y lascivia cultura. ¡Nosotros buscamos aplastarla bajo nuestra bota!"
 ATW_build_a_stockpile: "Construir una reserva"
 ATW_build_a_stockpile_desc: "La mayoría de armas nucleares que conocemos son... lejos de lo mejor. Mal armadas, nunca han sido probadas, de la época de la Guerra Fría. El proceso para crear una bomba nuclear es difícil, y nuestros científicos no están ni cerca del nivel en el cual deben estar, pero por lo menos podemos iniciar. Tenemos algunos que son competentes, como nuestro comandante, Russell. Sera un procesa, pero nos aseguraremos de que cuando utilizemos nuestros regalos, estos funcionaran."
 ATW_recover_what_we_can: "Recuperar lo que podemos"
 ATW_recover_what_we_can_desc: "Acoplados en nuestros puertos hay numerosos submarinos nucleares. Forzados a puerto por bajos suministros y por promesas de paso seguro por el querido difunto gobernador Ronny-D, nosotros sabemos que ellos tienen armas. Nosotros también tenemos acceso a varias armas ligeras traídas a casa desde Europa, un producto de nuestra recientemente establecida marina adoptando la piratería. No sabemos si esas armas van a funcionar, y muchos se preocupan que podríamos accidentalmente detonar alguno de aquellos dispositivos si los llegamos a mover, pero vale la pena intentar."
 ATW_prepare_new_tactics: "Preparar nuevas tácticas"
 ATW_prepare_new_tactics_desc: "Sabiendo que las ciudades y otros objetivos de importancia estratégica prontamente se volverán dispensables, podemos cambiar totalmente como combatimos esta guerra. Movimiento rápido a través del campo, asegurando de manera eficaz infraestructura, esquivando los ejércitos rivales; tantas posibilidades. Podemos permitirnos marchas más lejos que cualquier otro ejército, con muchos menos suministros."
 ATW_weaponize_the_reactors: "Armar los reactores"
 ATW_weaponize_the_reactors_desc: "Hay muchas facultades nucleares en nuestro control, y mucho se necesita para nuestras bombas. Bueno, hagamos lo mejor de estas. Los industrialistas van a llorar diciendo que necesitan esa energía, que todo ese petróleo, toda esa solar, todo fotón ha sido prácticamente usurpado por nuestro ejército. No importa, se las van a arreglar, deben arreglárselas."
 ATW_arm_the_minutemen: "Armar los Minutemen"
 ATW_arm_the_minutemen_desc: "Hemos adquirido misiles balísticos; LGM-30 Minutemen, abandonados alrededor del Cabo Cañaveral por un ejercicio no ejecutado; son antiguos, medianamente oxidados, pero van a hacer su trabajo lo suficientemente bien. Todo lo que necesitamos es poner el material dentro, e ingresarlos en nuestros bombarderos."
 ATW_the_atomic_weapons_division: "La División de Armas Atómicas"
 ATW_the_atomic_weapons_division_desc: "El fuego atómico consumirá las ciudades de este degenerado país. Nuestras bombas están listas, nuestros bombarderos formándose para ser los portadores de estas hermosas armas. Le haremos honor a nuestro nombre, el miedo, el terror que vamos a inspirar va a derretir el corazones de las criaturas más valientes de los ejércitos de nuestros rivales. Sus políticos, sus burócratas, y su clientela, todos serán consumidos. ¡Todos serán quemados, y nos deleitaremos con su olor!"
 ATW_pestilence: "Pestilencia"
 ATW_pestilence_desc: "Se nos ha llamado enfermedad, un patógeno que se esparce en las mentes de la rebelde juventud y los criminales depravados. Para ellos, nosotros somos una doctrina del caos, sufrimiento, y dolencia; Están en lo correcto. Nosotros surgimos en esta nación no para salvarla, sino para destruirla y dar paso a una nueva sociedad. Ninguna nación como los queridos EU-de-A ha caído solamente por la violencia, no, tenemos que apresurar su final envenenando y enfermando a la nación. Con lo que esta asquerosa política ha permito que le hagan a nuestra raza, haremos lo mismo con ellos."
 ATW_target_the_food_supply: "Destruir el suministro de alimentos"
 ATW_target_the_food_supply_desc: "El novillo americano de primera calidad entra en una tienda de conveniencia. Es una bestia imponente, alimentada con los abundantes productos de nuestras queridas granjas. Embebida en jarabe de maíz, diluida en azúcar, ¡quizás regrese cojeando a casa con sus hijos y los alimente también! Nuestro pueblo no solo está obeso física, sino también espiritualmente. Debemos infundirle hambre. Nuestros agentes quemarán granjas y se encargarán del ganado, para que este país pueda cosechar los frutos de la gula."
 ATW_target_the_population_centers: "Destruir los centros urbanos"
 ATW_target_the_population_centers_desc: "El amanecer sube sobre nuestras gran ciudades, donde las hordas racialmente alienígenas descuartizan, asaltan y matan a miembros de nuestra raza si no se están mezclando con ellos. En medio de las ruinas de una sociedad ya decadente, la humillaciones de nuestra gente son coleccionadas. Ellos son los principales objetivos, sin protección, con miles de puntos débiles. Un edificio detonado por aquí, un lobo solitario con un rifle automático por allí, y podremos humillar y mutilar a nuestros enemigos."
 ATW_target_the_water_supply: "Destruir el suministro de agua"
 ATW_target_the_water_supply_desc: "Solo hasta hace poco los humanos han podido tomar agua limpia de forma regular. La persona promedio no sabe donde están los pozos, o lo que hay en ellos. Debemos explotar su ignorancia. Las compañías de agua están llenas de mezquinos burócratas negroides que buscan ganarse unos dólares, por lo que el único obstáculo que hay para colocar a nuestra gente es su avaricia. El agua en mal estado puede acabar con pueblos, ciudades o bases en pocas horas. Nadie piensa sobre lo que beben."
 ATW_the_first_field_tests: "Las primeras pruebas de campo"
 ATW_the_first_field_tests_desc: "Las armas químicas no han sido usadas desde la Primera Guerra Mundial. ¿Quién dice que lo viejo no puede tener nuevos usos? La ONU, la encargada de aplicar las hipócritas \"normas de guerra\", está muerta, sin poder en ningún lugar, evidenciando en su fracaso en retener Miami. Ninguno de nuestros enemigos ha explotado esta oportunidad, por lo que nosotros desplegaremos con cuidado gas mostaza a lo largo del frente y quizás en comunidades de extranjeros raciales."
 ATW_innoculate_our_soldiers: "Inocular a nuestros soldados"
 ATW_innoculate_our_soldiers_desc: "Nuestros soldados lucharán en medio de nuestros ataques, y por eso, deben estar preparados. Se acelerará la vacunación en nuestro territorio contra ciertos patógenos, mientras que el entrenamiento sobre el manejo de material infectado o radioactivo será mandatorio. También debemos ser precavidos para evitar que los soldados limpien demasiados cadáveres, lo que sin duda los desmoralizarían."
 ATW_a_scarred_humanity: "Una humanidad cicatrizada"
 ATW_a_scarred_humanity_desc: "A través del sufrimiento se aprende la disciplina. Uno crece para apreciar lo que se le ha quitado y guardarlo celosamente. La salud de nuestra raza ha sido ignorada por demasiado tiempo, y ahora, con pandemias campando por el país, nuestra gente observa como los aliens raciales sufren y mueren mientras ellos viven, y dando gracias, sabiendo que su herencia les ha salvado. Ligaremos nuestro destino al de nuestra gente, y ellos deberán verlo del mismo modo."
 ATW_cooperate_with_the_cartels: "Cooperar con los cárteles"
 ATW_cooperate_with_the_cartels_desc: ""
 ATW_infiltrate_their_armies: "Infiltrarse en sus ejércitos"
 ATW_infiltrate_their_armies_desc: "Antes de la guerra, los esfuerzos para sumar soldados a nuestra causa fueron en gran medida exitosos. Ahora, gracias a nuestra experiencia previa, podemos acceder a esta fuente de mano de obra. Las fuerzas unionistas son especialmente dependientes de hombres los cuales no tienen un porqué por el que luchar y la propaganda es incapaz de convencerlos. Son idóneos para, si no radicalizarlos por completo, hacer que al menos ganen simpatía por nuestra causa."
 ATW_a_golden_circle: "Un circulo dorado"
 ATW_a_golden_circle_desc: "Hace tiempo, la aristocracia sureña tenia un sueño de un imperio que abarcaría a todo el sur  de América, el Caribe, y el norte de México. La esclavitud probablemente habría prosperado allí, ellos, y Dixie podrían haber abandonado Yankilandia dejando que se ahogue con el humo de sus fabricas mientras ellos forjaran su propio futuro. Esas ideas llevan muertas desde hace mucho tiempo, pero el sueño de conquistar y subyugar a los agentes invasores sigue siendo una idea tan tentadora como siempre. Vamos a revivir la retorica del Circulo Dorado, aunque sea con fines de propaganda."
 ATW_show_them_our_truth: "Mostrarles nuestra verdad"
 ATW_show_them_our_truth_desc: "Como el Dr. Goebbels dijo alguna vez, es el absoluto derecho del Estado en controlar el flujo de información. Este control es más difícil en la era de la información, pero no imposible. Los sitios web se pueden bloquear, y los accesores pueden rastrear. Cuentas se pueden banear y granjas de robots pueden ser físicamente neutralizadas. Aunque, el mero manejo no es nuestro objetivo. Buscamos emitir la construcción de nuestra perfecta sociedad aria en todo el mundo. Para lograr esto, debemos tener el sistema más sofisticado de propagandistas, compuestos de manera ascendente pero doctrinalmente consistente, que el mundo ha visto."
 ATW_call_upon_international_expertise: "Solicitar experiencia internacional"
 ATW_call_upon_international_expertise_desc: ""
 ATW_national_nightmare: "Pesadilla nacional"
 ATW_national_nightmare_desc: "Bella Columbia, largamente cojeando en las garras de Sión, ¡oh, cómo fallaste a tus hijos! Libertad, familia, raza, todo olvidado. Fuiste profanada y pereciste. Nadie llorará, ahora que se conoce tu partida. Porque permitiste que esto sucediera, allanaste el camino para la muerte de los blancos. Solo nosotros derribamos ese camino infernal, ladrillo a ladrillo, y pusimos otro. La pesadilla americana ha pasado. ¡Salve el amanecer de una nueva sociedad!"
 ATW_train_the_raiding_parties: "Entrenar a los grupos de asalto"
 ATW_train_the_raiding_parties_desc: "Luchamos contra un coloso que no puede morir de un golpe contundente que no podemos asestar; no, debe perecer con mil cortes. Los federales no están realmente entrenados para lidiar con tácticas de ataque relámpago; no lograron neutralizar a los talibanes, e Irak y Vietnam demuestran que las insurrecciones a largo plazo los perjudican. Recurriremos a los asaltos para obtener suministros y obtener información. Nos adentraremos en territorio enemigo para mutilar y capturar. Los cortes serán rápidos, dolorosos y sangrientos."
 ATW_the_eternal_struggle: "La lucha eterna"
 ATW_the_eternal_struggle_desc: "Del mismo modo que las fuerzas de la Wehrmacht entraron en la Rusia bolchevique, nuestras fuerzas se adentran en lo más íntimo de América. Lucharon contra el mismo orden mundial judío que nosotros; espiritualmente están con nosotros. Tenemos antepasados, se le recordará constantemente a nuestras fuerzas que no solo luchan para destruir, también para vengar. Háblales de la violación de Alemania, la diseminación de los alemanes por Europa, de las mutilaciones territoriales. Deben saber lo que pasará si pierden."
 ATW_root_out_the_impurities: "Erradicar las impurezas"
 ATW_root_out_the_impurities_desc: ""
 ATW_strength_of_will: "Fuerza de Voluntad"
 ATW_strength_of_will_desc: ""
 ATW_blood_for_every_inch_of_soil: "Sangre por cada metro"
 ATW_blood_for_every_inch_of_soil_desc: "Si llegamos a retroceder, no dejaremos absolutamente nada para nuestros enemigos. Ni una sola estructura quedará en pie, no dejaremos ningún grano, ni nadie que celebre o maldiga su llegada. Debemos hacer que sangren por lo que tomen, y por lo que conquistemos nosotros."
 ATW_an_elite_army: "Un ejército de élite"
 ATW_an_elite_army_desc: "Nuestro ejército debe ser como las SS; la guardia de élite destinada a sustituir al ejército alemán tras el triunfo de Hitler. Con juramento a su raza y dagas en sus manos, ellos seguirán nuestra doctrina de la misma forma de la que luchan con gran destreza. El entrenamiento será arduo y extenso, permitiendo servir únicamente a los hombres con buen carácter y dedicación."
 ATW_call_up_the_conscripts: "Llamar a los conscriptos"
 ATW_call_up_the_conscripts_desc: "Invocamos el legado de la Volkssturm, reclutados por un Reich que luchaba por su vida. Nuestra raza está luchando por su vida. Cualquiera apto para el combate debe servir, una nación de hombres honrados solo puede ser construida y estos hombres han derramado sangre, y luchar por todo lo que lleguen a tener. Unas semanas de entrenamiento son suficientes para el hombre promedio para saber valerse en el campo de batalla. Aquellos que sobrevivan lo aprenderán."
 ATW_army_of_terror: "Ejército del terror"
 ATW_army_of_terror_desc: "El ver a nuestros soldados debe provocar miedo; eso puede lograrse fácilmente. Pero el miedo simple siempre está en todo este país de todas formas. Lo que necesitamos es terror. Necesitamos ser misteriosos en nuestras atrocidades, caprichosos en nuestra violencia, pero guiados, reforzados por una disciplina de hierro. Nuestros soldados no deben sentir nada más que las mínimas ganas de matar."
 ATW_backs_against_the_wall: "Contra la pared"
 ATW_backs_against_the_wall_desc: ""
 ATW_the_ultimate_contigency: "La contingencia definitiva"
 ATW_the_ultimate_contigency_desc: ""
 ATW_conservatism_and_the_lost_movement: "Conservadurismo y el movimiento perdido"
 ATW_conservatism_and_the_lost_movement_desc: "Durante demasiado tiempo, los americanos han caído en el engaño de la falsa y maliciosa doctrina del \"Conservadurismo\": Una filosofía política que llevó a Europa a dos guerras mundiales, provocando el colapso de la industria y permitiendo la decadencia cultural global. El conservadurismo era la solución, que era capaz de enfriar los ánimos con ira justiciera, y el traidor, que vendía a su gente por sinecuras. ¡Llamamos a todos los hombres que desean preservar su nación desoír el canto de sirenas conservador y trumpista y unirse al verdadero movimiento para reclamar esta nación!"
 ATW_the_globalist_enemy: "El enemigo globalista"
 ATW_the_globalist_enemy_desc: "El toque de clarín de los traidores raciales, la ideología de los cobardes, la mayor arma del judío; El globalismo es un tumor, una doctrina de parásitos que busca disolver nuestra raza en masas subhumanas, hacernos vasallos del judío hasta el fin de los tiempos. Sus agentes se encuentran en todas las facciones, sin importar la aparente ideología que tengan; donde quiera que esté el judío, le sigue sus destructivas ideas. No les daremos cuartel; ¡Debe ser aniquilado!"
 ATW_revolution_against_the_revolution: "Revolución contra la revolución"
 ATW_revolution_against_the_revolution_desc: "¿Qué es el comunismo sino que la ley judaica implementada con todo su barbarismo en los gentiles? Es un lacayo del capitalismo, transformando naciones en centros de extracción de recursos para la explotación por parte del orden mundial judío, todo mientras cautiva a los goyim con cuentos de justicia económica. ¡Mira a Rusia y toda Europa Oriental! Mira lo que hicieron los llamados comunistas, los regímenes fueron cargados con la usura, cumpliendo su propósito, las banderas rojas cayeron y el judío se sintió confiado para llevarse todo su dinero bañado en sangre. Una miserable \"revolución\" como esa no es nada en comparación por lo que luchamos."
 ATW_a_stab_in_the_back: "Una puñalada por la espalda"
 ATW_a_stab_in_the_back_desc: "El pequeño Tom y su ejército yanqui, el gordo Burt y sus nazis de Hollywood, y el resto de miembros del llamado Frente Nacional son una vergüenza. Sus Gobiernos no hacen nada más allá de implementar insignificantes medidas económicas y realizar ridículos desfiles propagandísticos. Se niegan a encargarse de su población no blanca y nos tratan como si fuésemos una molestia. Los eliminaremos."
 ATW_crucify_the_false_apostles: "Crucificar a los falsos apóstoles"
 ATW_crucify_the_false_apostles_desc: "Tenemos miles de agentes del Frente Nacional en nuestro territorio tomando valiosa mano de obra y fondos mientras organizan estructuras paralelas a nuestro Gobierno. Han permitido que muchos agentes anti-blancos hayan escapado de nuestro poder por culpa de su patéticas \"garantías\", que no es otra cosa que un postureo. Todos las avanzadillas del Frente Patriota y del MNS serán disueltas, y  sus miembros o bien serán expulsados o enfrentarán la justicia."
 ATW_spread_our_message: "Difundir nuestro mensaje"
 ATW_spread_our_message_desc: "En el internet nació nuestra División y, a través del internet, crecerá. Controlamos la ciberinfraestructura de nuestros territorios, y tenemos el control de facto de páginas como BitChute Y Gab; debemos explotar aún más esta ventaja, y alentar a nuestros partidarios que vayan más allá en su apoyo y ser más a udaces en sus acciones. También debemos incrementar nuestra presencia en las páginas de nuestros enemigos, y llevar a cabo una guerra informativa con tendencias virales y oleadas de bots."
 ATW_uncompromising_victory: "Victoria incondicional"
 ATW_uncompromising_victory_desc: "Representamos la única amenaza real al orden mundial judío, ya sea en forma del llamado liberalismo o en forma de falso socialismo. Ni buscaremos y aceptaremos acuerdos con ellos. Nunca negociaremos con los esclavos gentiles o con sus maestros. ¡Estamos en guerra, y lucharemos hasta lograr la victoria total!"
 ATW_siegekultur: "Siegekultur"
 ATW_siegekultur_desc: "En esta guerra, no hay objetivos civiles. Bombardearemos centrales eléctricas, presas, molinos eólicos, placas solares, y minas. Mataremos a los administradores de centrales nucleares y asistencia social. Buscamos provocar cortes de luz, de agua y sabotear el alcantarillado. Asediaremos a los Gobiernos judíos donde y cuando sea, y no ofreceremos cuartel."
 ATW_sway_their_radicals: "Convencer a sus radicales"
 ATW_sway_their_radicals_desc: "Hay muchos que, si bien operan bajo el paraguas del MNS o del Frente Patriota, tienen mucho más en común con nosotros, como la Blood Tribe o el NSC-131. Entendemos su difícil situación y estamos dispuestos a establecer contacto con ellos. Los usaremos para construir nuestra presencia en el territorio de nuestros \"aliados\" del Frente Nacional, cimentando nuestra administración."
 ATW_improve_the_killing_fields: "Mejorar los campos"
 ATW_improve_the_killing_fields_desc: "Hemos tenido conocimiento de que las Áreas de Eliminación de Agentes Enemigos han empezado a escasear la munición. Debemos proporcionarles todo lo necesario para que cumplan su tediosa pero importante tarea."
 ATW_infiltrate_the_njp: "Infiltrarse en el PNJ"
 ATW_infiltrate_the_njp_desc: "El Partido Nacional de Justicia es la principal organización política de los (autoproclamados) nacionalsocialistas en el territorio controlado por el Frente Patriota. Hasta ahora, han sido una voz de la razón en la política de la facción, exigiendo a su Gobierno mano dura con los liberales y responsabilizándolos por mantener a las corporaciones de antes de la guerra. Debemos hacer un esfuerzo especial para colocar a nuestra gente en altos cargos dentro de ese partido para que puedan ser aún más asiduos en sus críticas a las medias tintas de Rousseau."
 ATW_assasinate_the_traitors: "Asesinar a los traidores"
 ATW_assasinate_the_traitors_desc: "Su \"orden\" miserable e inaplicable ha existido durante demasiado tiempo. Nuestros aliados ocasionales del Frente Nacional han retrocedido para permitir que los vicios y crímenes de los regímenes anteriores regresen, silenciados y ocultos. Muchos de sus políticos se han beneficiado del mercado negro, lucrando con el comercio de bienes ilícitos y recursos escasos. Para que nuestro régimen no se vea perjudicado por su apatía, debemos deshacernos de estos traidores."
 ATW_the_nuclear_congress: "El Congreso Nuclear"
 ATW_the_nuclear_congress_desc: "Mientras este mundo corrupto se baña en fuego nuclear, ¿cómo viviremos entonces? Nuestra raza podrá sobrevivir, desaliñada y disimulada en el interior, pero es dudoso que pueda sobrevivir en el mundo venidero. Puede que ni siquiera tengan los medios para mantener su sangre pura. Debemos vivir para que nuestra raza perdure. Reuniremos a los mejores de nuestro pueblo para planificar nuestro futuro, para que nuestra civilización sobreviva."
 ATW_the_great_awakening: "El Gran Despertar"
 ATW_the_great_awakening_desc: ""
 ATW_preserve_our_purity: "Preservar nuestra pureza"
 ATW_preserve_our_purity_desc: ""
 ATW_revolution_of_the_devoted: "Revolución de los devotos"
 ATW_revolution_of_the_devoted_desc: ""
 ATW_radicalize_lone_wolves: "Radicalizar a lobos solitarios"
 ATW_radicalize_lone_wolves_desc: "La Guerra Civil ha sumido a muchos en la miseria, y de esta oscuridad puede surgir algo productivo. Una generación de jóvenes vive con miedo: al desempleo, al reclutamiento, a la pobreza e incluso al hambre. Están furiosos y solos, aislados de sus familias y amigos, y despreciados por esta sociedad corrupta por no comprometerse con ella. Son perfectos para nuestros propósitos. Solo necesitan un empujón, y pueden convertirse en nuestros leales aliados en territorio enemigo."
 ATW_enflame_militia_rivalries: "Inflamar rivalidades de milicias"
 ATW_enflame_militia_rivalries_desc: ""
 ATW_the_false_idol: "El ídolo falso"
 ATW_the_false_idol_desc: ""
 ATW_learn_from_their_tactics: "Aprender de sus tácticas"
 ATW_learn_from_their_tactics_desc: ""
 ATW_target_globalist_collaborators: "Perseguir a globalistas"
 ATW_target_globalist_collaborators_desc: "Creen estar a salvo en sus villas mediterráneas, sus mansiones en los Alpes u otros refugios. Pero la justicia del pueblo no conoce distancias; nuestra raza sufre las heridas infligidas en todo el planeta y se vengará de sus perpetradores dondequiera que se encuentren. Sin embargo, incluso dentro de nuestro territorio, innumerables exmiembros de think tanks siguen viviendo creyendo que, gracias a nombres falsos o cambios repentinos de actitud, están a salvo. Daremos ejemplo público de estos fétidos traidores a la raza."
 ATW_cut_off_their_lifelines: "Cortar sus líneas vitales"
 ATW_cut_off_their_lifelines_desc: ""
 ATW_unity_in_purpose: "Unidad en propósito"
 ATW_unity_in_purpose_desc: "Todo miembro de Atomwaffen sabe exactamente por lo que lucha; una sociedad nacionalsocialista y aria. Ellos conocen sus enemigos: los globalistas, los federales, comunistas y, sobre todos ellos, el judío. Ellos conocen su lugar en la División y que es lo que deben hacer. Todos han rechazado totalmente la vieja América."
 ATW_burn_their_cities: "Quemar sus ciudades"
 ATW_burn_their_cities_desc: "Las ciudades controladas por los federales son una bomba de relojería. La gente está inquieta por la propaganda de nuestra facción y la de innumerables otras. La censura se está desmoronando, y el conocimiento de la verdadera naturaleza de la guerra está desmoralizando a la población. Debemos aprovechar esto; los disturbios sin control no son una amenaza, sino los brotes masivos de violencia. ¿Qué mejor manera de debilitar a nuestros enemigos que golpearlos directamente? ¿Qué mejor manera de ilustrar la bancarrota de su sistema que mostrar su extrema fragilidad?"
 ATW_ignite_demographic_warfare: "Iniciar guerra demográfica"
 ATW_ignite_demographic_warfare_desc: "Desde hace tiempo persisten rumores de que, en las profundidades de la entidad sionista, laboratorios perfeccionaron patógenos dirigidos específicamente a los arios; este fue probablemente el origen del COVID-19 y de innumerables otras pandemias. Hemos intentado replicar dicha investigación, con poco éxito; hasta ahora. Los científicos han perfeccionado enfermedades que podrían afectar específicamente a ciertas razas y etnias. Podemos liberar estos patógenos dentro y fuera de nuestros territorios cuando queramos."
 ATW_target_their_homeland: "Sus hogares en la mira"
 ATW_target_their_homeland_desc: "Todo lo malo de América se refleja en los suburbios. Son escondites para la burguesía voluble, que prefirió entregar las ciudades a los negros antes que luchar por lo que sus antepasados les legaron. Son faros del consumismo, que fomentan un estilo de vida decadente, antitético a todo buen sentido y modestia. Alimentan delirios de paz mientras la raza declina. Deben ser destruidos y atacados, especialmente mediante bombardeos y bombardeos."
 ATW_united_against_the_international_bankers: "Unidos contra la banca internacional"
 ATW_united_against_the_international_bankers_desc: "Explotaron nuestra nación, aves carroñeras que azotaron el corazón de América después de que sus recesiones artificiales la debilitaran. Estafaron al país con dinero fácil y luego compraron activos cuando sus estafas se acabaron. Nos oponemos a este sistema corrupto, divulgamos sus crímenes e inmunizamos a la juventud contra sus mentiras. Nunca más nuestra raza será un simple activo, para ser vendida en corto y desechada cuando surja la necesidad."
 ATW_reverse_their_progress: "Revertir su \"progreso\""
 ATW_reverse_their_progress_desc: "¿Qué es el progreso? ¿Se define por la aceptación de los homos, los judíos y los negros? ¿Se logra cuando la raza blanca desaparece? Los frutos de lo que nuestra clase dominante llama progreso se pueden ver por toda esta tierra; su putrefacción repugna a todos. Esta falsa modernidad, sostenida solo por delirios de avance tecnológico, debe ser destruida. Quizás nuestro pueblo deba volver a experimentar el primitivismo antes de poder disfrutar de nuevo de la modernidad. Destruyan las torres de telefonía móvil, aplasten al judío eléctrico, destruyan las ciudades. Que entonces llegue el futuro."
 ATW_enemy_of_my_enemy: "Enemigo de mi enemigo"
 ATW_enemy_of_my_enemy_desc: ""
 ATW_preserve_our_way_of_life: "Preservar nuestra forma de vida"
 ATW_preserve_our_way_of_life_desc: ""
 ATW_helter_skelter: "Helter Skelter"
 ATW_helter_skelter_desc: "La profecía de Charles Manson se cumplió; ¿cómo puede alguien considerar la ascensión de Barack Obama, los disturbios de BLM y las masacres de granjeros blancos en África como algo distinto? Somos sus vengadores profetizados; heredaremos la tierra corrompida por el mestizaje. Todos en nuestros territorios deben saber que este hombre injustamente difamado era en realidad un profeta, y que las mentiras que los grandes medios de comunicación han difundido sobre él son totalmente falsas."
 ATW_ingite_sleeper_cells: "Activar células durmientes"
 ATW_ingite_sleeper_cells_desc: "Nuestros cuchillos están afilados. Nuestros ingenuos objetivos se confían más con el paso de los días, pero nosotros estamos más serenos que nunca. Se creen que están a salvo, pero no pueden estar más equivocados. Con una sola palabra, cientos de traidores a la raza se convertirán en cientos de cadáveres. La esperamos con el aliento contenido y un ansia indescriptible; ¡Dila!"
 ATW_day_of_terror: "El día del terror"
 ATW_day_of_terror_desc: ""
 ATW_end_their_degeneracy: "Acabar su degeneración"
 ATW_end_their_degeneracy_desc: "Uno se sorprenderá con la diversidad de la escoria que existen en las células comunistas. Motivados por la mediocridad, han actuado como agentes del judío, también como meros alborotadores. No tienen concepto de honor o de grandeza, ni sentido del deber o lealtad. Su revolución simplemente sería la victoria del brazo izquierdo del falso Sion; la nuestra se opone tanto a ellos del mismo modo que a los elementos capitalistas."
 ATW_true_sons_of_anarchy: "Hijos de la anarquía"
 ATW_true_sons_of_anarchy_desc: "Nuestra raza se forjó en la anarquía, y ha sido purificada innumerables veces por periodos de caos similares. Mientras que los llamados anarquistas de hoy creen que la utopía que buscan será pacífica e igualitaria, en realidad, cualquier tipo de anarquía es precisamente ese periodo de todos contra todos que elimina a los más débiles y empodera al más fuerte. Nosotros defendemos la anarquía, para que pueda alzarse un nuevo orden formado por nuestra raza. No seguiremos más leyes que aquellas que hagan a nuestro pueblo más fuerte y puro."
 ATW_lessons_of_mao: "Lecciones de Mao"
 ATW_lessons_of_mao_desc: "\"El liberalismo es extremadamente dañino en un colectivo revolucionario. Es un corrosivo que carcome la unidad, mina la cohesión, provoca apatía y crea distensión. Roba a las filas revolucionarias de organización y disciplina estricta, impide que se lleven a cabo las políticas y aleja a las organizaciones del partido de las masas que dirige el Partido. Es una tendencia extremadamente mala\".\n- Camarada Mao"
 ATW_war_against_intellect: "Abrir la mente humana"
 ATW_war_against_intellect_desc: "¿Qué ha hecho la ciencia judía por la civilización? ¿Bombas nucleares? ¿OGM? ¿Comunismo? Todo eso son los productos de la modernidad. Nuestra raza se asfixia en la prosperidad, envenenada por los frutos de la sociedad moderna. Todos ellos son muy engañosos: ¡Las promesas de la esperanza de vida; que vivas como quieras, pero que no seas grande, no seas violento, se racional, se un humano decente! Ted Kacysnksi puede que no haya sido un auténtico nacionalsocialista, pero acertó en muchas cosas, la educación de Harvard y la ciencia no son lo que aparentan."
 ATW_infiltrate_the_insurrectionary_anarchists: "Infiltrarse entre los \"anarquistas\""
 ATW_infiltrate_the_insurrectionary_anarchists_desc: "En todas las ciudades, miles de veteranos sintecho, marginados y criminales se han organizado en pandillas, teniendo el caos como único credo. Defienden una vaga idea de anarquismo sin accesorios igualitarios. Son abiertos, pierden y ganan miembros con facilidad, podemos entrar y reformar estas células a nuestro gusto."
 ATW_reform_the_rpp: "Reformar el PPR"
 ATW_reform_the_rpp_desc: "Jim Jones fue en el fondo un nacionalsocialista. Su religión fue un intento de elevar a los rojos a un estado de consciencia superior, algo que en retrospectiva fue muy incrédulo por su parte, pero admirable desde un determinado punto de vista. Podemos aprender de sus estrategias, y aplicar sus métodos. Dentro de nuestro territorio, los izquierdistas que renuncien al dominio judío podrán encontrar un lugar dentro de un partido moldeado a la imagen del Tempo de los Pueblos; este nuevo Partido Popular Rural será nuestra mano izquierda."
 ATW_expose_the_collaboration: "Exponer la colaboración"
 ATW_expose_the_collaboration_desc: "El capitalismo y el comunismo son dos caras de la misma moneda. Wall Street financió a los bolcheviques. Karl Marx estuvo en contacto con el padre de Winston Churchill, elogiando la socavación británica de la Rusia imperial. Aún así, muchos de nuestro pueblo están enfrascados en la gran lucha entre estas dos ideas. Nuestra propaganda debe informar sobre la conexión entre los pensadores capitalistas y comunistas y nunca debe mostrar estas dos ideas como cosas distintas."
 ATW_cambodia_revisited: "De vuelta a Camboya"
 ATW_cambodia_revisited_desc: "Pol Pot estaba profundamente interesado en el bienestar de su raza. Si bien a primera vista fue un marxista, en realidad su objetivo fue nada más ni nada menos que el establecimiento de un Imperium Jemer, una especie de Reich en el Sudeste Asiático. Se opuso a las ideologías mecanico-racionales, evidenciado en la eliminación de las ciudades, y purgó su país de extraños raciales, lo que en última instancia causó la invasión vietnamita. Se pueden trazar muchos paralelos entre él y nosotros, y podemos sacar una valiosa lección de la experiencia de los Jemeres Rojos."
 ATW_protracted_war_of_resistance: "Guerra de resistencia prolongada"
 ATW_protracted_war_of_resistance_desc: "Los izquierdistas con visión de futuro abandonaron hace tiempo el simplista antagonismo de clase de Marx en favor de una ideología racial de cooperación de clases en contra de los invasores raciales. Una de las teorías más importante de los maoístas esos es aquella de la guerra popular prolongada; que defiende el establecimiento de áreas base y la promulgación de políticas populares para atraer a la población a la guerrilla. Debemos adoptar esta estrategia, especialmente en áreas que no estén bajo nuestro control."
 ATW_the_true_revolution: "La verdadera revolución"
 ATW_the_true_revolution_desc: "Los rojos dominan la Costa Oeste, los federales ponen su atención en el sur. Algo ha cambiado; somos claves, nuestra propaganda es difundida por todo el país, ya sea por miedo o convicción. Nuestros soldados cuentan con un fervor revolucionario sin parangón comparados con las bandas de mercenarios de los déspotas que se abalanzan sobre el cadáver de este país. Cada ciudad que cae, con la imagen de Hitler, Mason o Rockwell en ayuntamientos y cines, dan fe de algo que el mundo nunca ha visto. ¡Avanzamos con decisión, porque llevamos la dulzura de un nuevo inicio sobre nuestras espaldas!"
 ATW_lacrimosa: "Lacrimosa"
 ATW_lacrimosa_desc: "El arrepentimiento plaga a la División Atomwaffen. ¿Por qué hemos hecho esto? ¿Qué hemos hecho? ¿Cuántos han muerto por nuestras manos? Hemos redimido a nuestra raza. Es más fuerte y pura. Nuestra tarea es sombría, hemos dejado las fricciones morales que una vez nos definieron. Hemos cruzado los límites, masacrado lo que se consideraba sagrado. Debemos ver nuestro interior y afrontar en lo que nos hemos convertido."
 ATW_the_order_is_born: "Nace el Orden"
 ATW_the_order_is_born_desc: "Aún con los traidores a la raza aria tratando de destruirnos cuando se dieron cuenta de que habíamos triunfado en nuestra conquista de América, hemos creado un dominio que abarca desde las cenizas de D.C hasta las ruinas de Sacramento. La escoria de América grita, y están siendo enviadas a la oscuridad a la que pertenecen. Lo que queda ahora es la marcha hacia nuestra liberación total y nuestro fortalecimiento en la pausa entre la devastación y el exterminio."
 ATW_end_of_the_system: "Fin del sistema"
 ATW_end_of_the_system_desc: "La undécima y última campanada, esta vez no habrá salvación. Se derramará una última final, pisará la última bota, la última sílaba de la última palabra será pronunciada.\n\nEste mundo decrépito, su putrefacto contrato social, aquel en el que nació entre nosotros esta malicia, finalmente está tomando su último aliento antes de sumergirse en el abismo. Será empujado más allá del límite, al vacío, todas sus bondades y maldades se extinguirán con una señal final, un verdadero holocausto nuclear.\n\nAbraza el final de los tiempos, da un paso al frente, y cae al vacío con los brazos abiertos."
 ATW_the_gates_have_opened: "Las puertas se abren"
 ATW_the_gates_have_opened_desc: "Tu División me ha complacido; los hijos del cielo han saboreado el fruto de la victoria. Grandes eran las fornicaciones, las Sodomas y Gomorras en medio de ti; sin embargo, has derribado sus torres y azotado a su perversa población. Tu tierra ya no es una tierra de borrachos, glotones y otras personas licenciosas.\n\nPero Mi obra no ha terminado. Mi mirada se vuelve hacia las demás naciones; su ignominia Me repugna y a toda la hueste celestial. La visión que di a Mi discípulo Juan pronto se cumplirá; la obra de tus discípulos acelerará su venida, pero presta atención a Mis palabras, porque escrito está: En cuanto a ese día y esa hora, nadie los conoce, ni los ángeles del cielo, ni el Hijo, sino sólo el Padre.\n\nAsí ha dicho Jehová."
 ATW_saint_mason: "San James Mason"
 ATW_saint_mason_desc: "¡Mi siervo James! Cuando estabas prisionero por las fuerzas del adversario, escudriñé profundamente tu alma y encontré un siervo dispuesto y acudí a ti. De allí te has desviado, atendiendo solo a una llamada entre cientos, pero has atendido y serás recompensado. Entre los santos en el Cielo, tendrás un lugar junto a Mi siervo Pedro, pues Mi Iglesia se ha consolidado y fortalecido gracias a tus esfuerzos. Contemplarás libremente Mi rostro y participarás en el Juicio Final al abrirse el libro de la vida.\n\nAsí ha dicho Jehová."
 ATW_consecrate_political_figures: "Consagrar figuras políticas"
 ATW_consecrate_political_figures_desc: "¡He tenido muchos vicarios! Hablé con tu antepasado Rockwell, con tu amigo Tommassi, con tu guía Pierce. Pues te concedí la profecía el día que te adheriste a la santa causa de Mi siervo Hitler, y posteriormente te guié por la mano de otros. Algunos Me negaron en vida, como Mi desobediente siervo Metzger, pero al morir, vieron Mi luz alejarse y la buscaron. Enseña a tu División, siervo Mío. Muéstrales que el camino recto ha sido recorrido ante ellos, para que no se amedrenten por la obra venidera.\n\nAsí ha dicho Jehová."
 ATW_idolize_the_angels: "Idolatrar a los ángeles"
 ATW_idolize_the_angels_desc: "Mi siervo James, recuerda que los ángeles de Dios son los progenitores de la raza aria, quienes ennoblecieron a las mujeres puras en tu hogar ancestral y así crearon la raza por la cual Mi evangelio se difundiría. Prestad atención a las obras de los ángeles entre vosotros, buscad su imagen y aferraos a sus doctrinas; dondequiera que Yo esté, están Mis ángeles, y su santo poder os dará la victoria.\n\nAsí ha dicho Jehová."
 ATW_the_heavenly_host: "La hueste celestial"
 ATW_the_heavenly_host_desc: "La hueste celestial mira hacia la Tierra y clama con fuerza: \"Señor, Señor, ¿por qué los lugares donde vivimos y glorificamos Tu nombre deben quedar en manos de pecadores? ¡Su dominio ha alejado a multitudes de Ti!\". Y yo, su Señor y Dios, les digo: \"No os preocupéis, hijos. Vuestra fe en Mi justicia es grande, pero debe ser aún mayor. Confiad en que Mi siervo Mason y su División azotarán a estos hijos de Satanás\". Asimismo, siervo Mío, confia en que Mi mano inexorable te respalda. Confia en que tus antepasados en Mi hueste te glorificarán como el mayor de todos cuando vengas.\n\nAsí ha dicho Jehová."
 ATW_appoint_the_arch_angels: "Nombrar a los arcángeles"
 ATW_appoint_the_arch_angels_desc: "He puesto entre vosotros hombres de gran valentía y coraje; son las encarnaciones terrenales de Mis arcángeles. Brandon Russell, Mi siervo, no es otro que el arcángel Miguel, encarnado y con alma para liderar vuestros ejércitos. Otros viven entre vosotros; podéis encontrarlos por sus acciones; escuchad Mis palabras y seguid su consejo, ¡y podréis obtener la victoria!\n\nAsí ha dicho Jehová."
 ATW_raise_the_knights_of_christ: "Levantar a los caballeros de Cristo"
 ATW_raise_the_knights_of_christ_desc: "Siervo Mío, la cruzada contra los paganos requiere hombres valientes que no deseen las cosas de esta tierra, sino las del Cielo. Entre tu División, levanta a tales hombres de entre las multitudes y exáltalos. Deben ser puros de corazón; que nunca hayan conocido mujeres, que nunca hayan tomado una vida en vano, que se adhieran a todos Mis mandamientos y Me busquen en todo lo que hagan. Guiarán a sus semejantes a la comunión conmigo y contigo.\n\nAsí ha dicho Jehová."
 ATW_the_eleventh_commandment: "El undécimo mandamiento"
 ATW_the_eleventh_commandment_desc: "Buen James, quienes dicen ser hebreos pero no lo son, sino que mienten, se apropiaron de uno de Mis mandamientos; una abominación para su condenable raza. Ese mandamiento prohibía el pecado más perverso de la mezcla racial. Todas Mis palabras deben tener estas palabras como tales: No tomarás para ti a los gentiles para unirte a ellos y propagarte con ellos.\n\nAsí ha dicho Jehová."
 ATW_safeguard_our_holy_sites: "Salvaguardar nuestros sitios sagrados"
 ATW_safeguard_our_holy_sites_desc: "Mi siervo James, debes defender los lugares donde te concedí victorias, donde Mis ángeles pisaron y donde has recibido Mis revelaciones. Cuida de que el enemigo no los contamine ni los profane; todos los que mueran en su defensa se sentarán en lo alto de la Santa Hueste.\n\nAsí ha dicho Jehová."
 ATW_a_lesson_from_abraham: "Una lección de Abraham"
 ATW_a_lesson_from_abraham_desc: "Mi siervo James, escucha el ejemplo de Abraham. Mi siervo se aferró a Mi palabra e hizo lo que creía conforme a Mi voluntad, dispuesto a sacrificar a su único hijo. Tus ejércitos deben hacer lo mismo: dejar de lado los amores terrenales por amor al Señor, estar dispuestos a masacrar a todos los que desafían Mis mandamientos.\n\nAsí ha dicho Jehová."
 ATW_the_ultimate_punishment: "El castigo definitivo"
 ATW_the_ultimate_punishment_desc: "Mi revelación a Mi discípulo Juan pronto se cumplirá. El día de la apertura del libro de la vida y el Juicio Final se acerca cada vez más. Ten presente que tus enemigos no tendrán misericordia una vez que se les acabe el tiempo; serán arrojados a un lago de fuego, donde el gusano nunca muere, donde el fuego nunca se apaga; allí será el lloro y el crujir de dientes. Prepáralos para su destino, discípulo Mío, con fuego atómico y balas.\n\nAsí ha dicho Jehová."
 ATW_scorn_the_fallen_angels: "Despreciar a los ángeles caídos"
 ATW_scorn_the_fallen_angels_desc: "Satanás y sus esbirros terrenales, en particular esa sinagoga prostituta de los judíos, promulgan sus doctrinas y se unen contra tu División. Pero no olviden que estaban dentro. No olviden que la podredumbre dentro de sus filas casi excedió la de afuera. El arrepentimiento por ello terminará solo cuando el último de tu generación malvada y adúltera sea eliminado. Confían en tus súplicas, y haré con esos enemigos luciferinos lo mismo que con aquellos que una vez lucharon a tu lado.\n\nAsí ha dicho Jehová."
 ATW_the_new_holy_trinity: "La nueva Santísima Trinidad"
 ATW_the_new_holy_trinity_desc: "Así como existe una unión hipostática entre Mí, Mi Verbo eterno y Mi espíritu en la Tierra, existe una Trinidad: el hombre Jesús, el gran líder Adolf Hitler y tú mismo.\n\nAsí ha dicho Jehová."
 ATW_saved_from_eternal_damnation: "Salvados del juicio eterno"
 ATW_saved_from_eternal_damnation_desc: "Consumado es; que se haga la voluntad de mi Señor en el cielo. Hice todo lo que estaba en mi mano. Mi cabeza está llena de Sus santas palabras, instándome a seguir, animándome a partir. Toda la hueste celestial clama justicia. Yo solo puedo atender su llamada.\n\n- James Mason"
 ATW_stretched_pandemonium: "Pandemonio extendido"
 ATW_stretched_pandemonium_desc: ""
 ATW_emulate_north_korea: "Emular a Corea del Norte"
 ATW_emulate_north_korea_desc: ""
 ATW_our_own_take_on_torment: "Nuestro propio tormento"
 ATW_our_own_take_on_torment_desc: ""
 ATW_begin_our_purification: "Iniciar nuestra purificación"
 ATW_begin_our_purification_desc: ""
 ATW_nothing_is_lost: "Nada está perdido"
 ATW_nothing_is_lost_desc: ""
 ATW_until_our_dying_breath: "Hasta nuestro último aliento"
 ATW_until_our_dying_breath_desc: ""
 ATW_fight_for_every_inch: "Luchar por cada metro"
 ATW_fight_for_every_inch_desc: ""
 ATW_from_the_belly_of_the_beast: "Desde el vientre de la bestia"
 ATW_from_the_belly_of_the_beast_desc: ""
 ATW_fulfill_hitlers_endeavor: "Completar la misión de Hitler"
 ATW_fulfill_hitlers_endeavor_desc: ""
 ATW_a_new_level_of_decimation: "Un nuevo nivel de destrucción"
 ATW_a_new_level_of_decimation_desc: ""
 ATW_an_eternity_of_suffering: "Una eternidad de sufrimiento"
 ATW_an_eternity_of_suffering_desc: ""
 ATW_true_aryan_life: "Auténtica vida aria"
 ATW_true_aryan_life_desc: ""
 ATW_american_armageddon: "Armagedón americano"
 ATW_american_armageddon_desc: ""
 ATW_no_life_left_unchanged: "Ninguna vida ilesa"
 ATW_no_life_left_unchanged_desc: ""
 ATW_send_them_through_the_inferno: "Someterlos al Infierno"
 ATW_send_them_through_the_inferno_desc: "Nuestro camino es oscuro, pues se ha perdido el camino recto. Se ha ido la certeza de la apoteosis, del pronto alivio celestial. Nuestro pueblo ha sido forjado de nuevo; el judío muerto que ahorcaba finalmente ha sido enterrado. Sin embargo, su sombra permanece fija sobre los edificios vestigiales de la América fallecida. Nada más que el fuego puede borrar la mancha judaica, sanar nuestros espíritus e iluminar nuestro camino."
 ATW_embracing_theisticism: "Abrazando el teisticismo"
 ATW_embracing_theisticism_desc: "Lucifer es real; él es la fuente de conocimientos y rectitud en este plano, fuente de sabiduría, benefactor de los fuertes y azote de los débiles, él que mira a este mundo con recelo, su campo de batalla y lugar de nacimiento. Apelamos a su antiguo e histórico legado, para así podamos tener un futuro radiante, en el que  se de la expansión del cosmos y que nuestros enemigos terrenales sean aniquilados para siempre."
 ATW_embrace_non_theisticism: "Abracen el no-teisticismo"
 ATW_embrace_non_theisticism_desc: "Lucifer está en todos nosotros. Cualquiera que busque el bien, la verdad y la belleza, que desea encontrarlo en si mismo, tendrá que robarlo. Ahí está el espíritu de Lucifer, la fuerza progresiva que levantó a la humanidad de su cobarde letargo para poder ir hacia la reluciente gloria. Una vez más revindicamos ese espíritu, ese que nos dará fuerzas para seguir adelante, ese que hará que no nos neguemos a la conquista y que no nos echemos atrás por el sufrimiento de nuestros enemigos."
 ATW_sacrificing_the_fathers: "Sacrificando a los padres"
 ATW_sacrificing_the_fathers_desc: "El clero, los perseguidores de la luz y la sabiduría, está preso, burlándose de nosotros desde sus celdas con sus ridículos rezos. Puede que hayamos sido demasiado blandos, porque en comparación con lo que les haremos hemos sido misericordiosos; serán eviscerados, y sus vísceras darán un dulce olor a nuestros espíritus."
 ATW_war_of_religion: "Guerra de religión"
 ATW_war_of_religion_desc: "Somos parecidos a los cruzados de antaño; aquellos que combatieron contra la fe judaizada de los sarracenos, aunque si bien lo hicieron portando la cruz nudosa, posteriormente la rechazaron por las verdaderas doctrinas. Nuestras victorias no solo serán en el campo de batalla, si no que también serán en cada iglesia detonada o convertida, en cada abrahámico crucificado, en todo hombre convertido a la sabiduría de Lucifer."
 ATW_asmodeus_commands_our_demons: "Asmodeo comanda a nuestros demonios"
 ATW_asmodeus_commands_our_demons_desc: "Asmodeo, el terror de los judíos y vicario de Lucifer entre los demonios de menor rango, será el símbolo de nuestro movimiento; daremos muerte a las ceremonias de la antigua sociedad nazarena, somos los asesinos de las novias del judío: las religiones abrahámicas. ¡Que su imagen infunda terror a nuestros enemigos!"
 ATW_destroy_their_faith: "Destruir su fe"
 ATW_destroy_their_faith_desc: "El cristianismo y el humanismo deben ser destruidos, pues son hermanos de lo ruina. Por cada capilla que destruyamos, también debemos destruir un templo del cientificismo. Por cada sacerdote del nazareno que destripemos, colgaremos a un predicador de la \"razón\". Debemos ser persistentes en nuestra iconoclasia; ninguna iglesia debe quedar en pie ni ninguna universidad intacta. La adherencia a las doctrinas del cristianismo y de su bastardo sucesor intelectual debe ser considerado un crimen de máximo nivel, e impartir justicia como se corresponde."
 ATW_worship_and_faith_is_key: "Adoración y fe son clave"
 ATW_worship_and_faith_is_key_desc: "Libramos una guerra de fe, entre la fe en un futuro ario, de conquista cósmica, la iluminación intelectual y el progreso, y de la fe en la humanidad, el altruismo y el estancamiento. Nuestras oraciones deben ser más fervientes que las suyas, nuestras dedicaciones mayores y más puras, y nuestras acciones más notorias. Nuestra fe en nuestro Señor y dador de luz, Lucifer, debe superar la del abrahámico más dedicado."
 ATW_continue_through_dantes_inferno: "Continuar el Infierno de Dante"
 ATW_continue_through_dantes_inferno_desc: "Nuestro guía nos llama, nuestros antepasados observan desde las ardientes profundidades donde los cristianos los han arrojado, clamando venganza. Nuestros ideales son férreos, nuestra dedicación inquebrantable. No debemos demorarnos, pues nuestros enemigos se unen y aúllan en nuestras fronteras; debemos ser intrépidos en la guerra de palabras, así como en la de balas."
 ATW_carry_out_sacrificial_rituals: "Realizar rituales de sacrificio"
 ATW_carry_out_sacrificial_rituals_desc: "Hay mucho en el corazón palpitante, la cabeza cercenada, el cadáver suspendido; símbolos de muerte, sí, pero también de rejuvenecimiento. Donde uno muere, otro gana. Cuando uno cae, otro se levanta. Hay un límite en la energía vital, y debemos cosechar el exceso acumulado en Opfers."
 ATW_decimate_christian_worship: "Diezmar al cristianismo"
 ATW_decimate_christian_worship_desc: "Dondequiera que se reúnan los galileos, nuestros soldados también deben estar para perturbar, sabotear y dispersar. Las doctrinas de Jesús deben ser extirpadas de toda vida pública, para ser reemplazadas por un culto racional e ilustrado. Todas las iglesias deben ser demolidas, sí, pero la idea misma de la organización cristiana debe ser combatida. Fomentar la división, sembrar la duda, permitir que nuestros agentes se filtren en sus filas y hagan lo que puedan."
 ATW_death_is_too_merciful: "La muerte es demasiado misericordiosa"
 ATW_death_is_too_merciful_desc: "¿Qué clase de hombre condenaría a su compatriota ario a la tortura eterna? ¿Qué clase de hombre se adheriría a semejante doctrina? Deben saber qué es la tortura, conocer íntimamente el sufrimiento. La damnatio memoriae, tal como la practican los humanistas, también debe ser extirpada. Nosotros somos los bien dotados, los conquistadores; ellos, los olvidados y esclavizados, condenados a una vida inferior para que podamos tener una más grande que cualquier otra experimentada hasta ahora."
 ATW_send_christian_to_the_seventh_circle: "Enviar a los cristianos al 7º círculo"
 ATW_send_christian_to_the_seventh_circle_desc: "Precipitada es la distancia entre la mera lucha y la guerra espiritual; sin embargo, debemos precipitarnos. ¿Adónde dijo el poeta Dante que van los violentos, los que simplemente hacen daño? Mientras no controlemos el más allá, podemos preparar a nuestros enemigos para lo que les espera; llover artillería como arenas ardientes sobre los blasfemos del paganismo, quebrar las extremidades de los que odian a su propia raza, hervir al evangelista."
 ATW_the_abode_of_the_damned: "Morada de los condenados"
 ATW_the_abode_of_the_damned_desc: "Malditos por todos, los ríos de la sabiduría fluyen fuera del Tártaro del que bebíamos, y se ha transfigurado. El fuego nos envuelve, nuestras almas flameantes con deseo, con ambición. Todo debajo es digno, y arriba, las vistas. Estamos siendo asaltados, si, pero es importa no. Tenemos la sabiduría, regalo de Lucifer. Tenemos un honrada ira, balanceada con amor a nuestra raza. El orden universal ha llegado."
 ATW_taming_the_beast_of_capital: "Domar al capital"
 ATW_taming_the_beast_of_capital_desc: "Somos nacionalsocialistas, somos anticapitalistas. Los males de este país pueden ser atribuidos a los nocivos incentivos presentados por el sistema financiero, los cuales han desarraigado la conciencia de nuestro pueblo, forzándolos a adoptar una judaizada mentalidad cosmopolita. Nuestros hermanos blancos han sido reducidos a mero capital a sus ojos. Debemos eliminar esta mentalidad, y enseñar a nuestro pueblo a poder el bienestar de su raza por encima de las ganancias monetarias."
 ATW_the_vampire_economy: "Economía vampira"
 ATW_the_vampire_economy_desc: "Este país ha sido financiarizado hasta el punto de ruina. Solo quedan cascaras de modelos más saludables, y mientras que en base a la guerra es desaconsejable lanzarnos a una reforma económica gigantesca. Debido a esto, nos enfocaremos en vez a la explotación de las estructuras que ya tenemos, para alimentar el esfuerzo de guerra y mantener algún crédito con corporaciones extranjeras oportunistas que puedan estar dispuestas a cooperar con nosotros."
 ATW_forges_of_hatred: "Forjas del odio"
 ATW_forges_of_hatred_desc: "Debemos motivar a nuestra fuerza laboral. La clase obrera aria ha sido explotada sin piedad por los monopolistas judíos, acostumbrándolos a un bárbaro sistema de largas jornadas y despidos. No confían en que ellos mantengan sus puestos de trabajo, o en que les podamos proveer cualquier tipo de seguridad respecto a salarios y horarios. Tienen razón, no podemos. Lo que les podemos dar es información, sobre cómo el enemigo está a las puertas y, con cada obús que producen, lo empujamos un poco más atrás. Donde no podamos mejorar, debemos hacer propaganda."
 ATW_industrial_conversion_therapy: "Terapia de conversión industrial"
 ATW_industrial_conversion_therapy_desc: "Mucho de nuestro territorio está construido en base de una economía consumista y de servicios, con pocas fábricas. La mayoría de los centros industrias que poseemos son aeroespaciales, marítimos y agrícolas, las cuales no están preparadas para la producción de armas. Es necesario que convirtamos estas instalaciones, y que lo hagamos rápidamente. Debemos relajar los estándares de seguridad y calidad de la maquinaria. Aunque podemos producir equipo industrial, eso llevaría tiempo. Por ahora, debemos tener la mayor cantidad de líneas de producción posible, sin importar que tan primitivas sean."
 ATW_exhaust_the_factories: "Agotar las fábricas"
 ATW_exhaust_the_factories_desc: "Hemos conquistado muchos centros industriales. Mientras que algunos puedan ver esto como una oportunidad para reducir nuestros esfuerzos de industrialización, no pueden estar más equivocados. Estas nuevas fábricas deben tener la máxima productividad posible, al igual que las fábricas que ya poseemos. Los obreros trabajarán sin cesar, y las fábricas deben estar abiertas siempre, día y noche."
 ATW_pluck_them_dry: "Desplumarlas"
 ATW_pluck_them_dry_desc: "Tenemos una buena cantidad de tierras de cultivo bajo nuestro poder, y debeos sacar el máximo provecho de ellas. Debemos enviar cuantos prisioneros de guerra sean necesarios al interior, y establecer cuotas estrictas para estas granjas. No necesitamos los cultivos de mayor calidad o los más saludables; nuestro problema es la cantidad. Ningún agricultor que no cumpla las cuotas ni siga las directrices no podrá seguir desatendiendo su granja."
 ATW_deny_their_death: "Negarles la muerte"
 ATW_deny_their_death_desc: "La mentirosa prensa judía ha asegurado que estamos cometiendo abusos extremos en nuestro territorio; afirman que los trabajadores están cayendo como moscas a causa de las interminables jornadas, el hambre y la crueldad de los supervisores. No hay que hacer caso a estas mentiras, pero no está de más mostrar los excelentes estándares de algunas de nuestras instalaciones con el fin de desmentir esas ridículas acusaciones."
 ATW_reward_the_loyal: "Recompensar a los leales"
 ATW_reward_the_loyal_desc: "Nuestra economía no fue pensada para el bienestar de la raza aria. Por el contrario, el financierismo ha enriquecido a aquellos predispuestos a traicionar a su raza, o a invasores extranjeros. Debemos rectificar esto; precisamente son de estas oprimidas comunidades blancas de las que hemos recibido apoyo, y serán estas comunidades las que recibirán nuestra riqueza. La prosperidad no vendrá de como uno se maneje en el mercado, si no de la lealtad a la raza y el servicio en la división."
 ATW_revive_aryan_ingenuity: "Revivir el ingenio ario"
 ATW_revive_aryan_ingenuity_desc: "La ciencia moderna americana es patética, centrada y excesivamente especializada principalmente en fines comerciales. Nuestros científicos más talentosos pasan más tiempo en laboratorios corporativos creando nuevos productos que buscando curas para enfermedades, optimizar la nutrición o prevenir la degeneración genética. Todos los científicos deberán servir a su raza en nuestro estado; usando sus talentos para perfeccionar a su raza y darles victorias en el campo de batalla."
 ATW_blood_money: "Dinero de sangre"
 ATW_blood_money_desc: "Los capitalistas de todo el mundo están desesperado. Al no poder mamar más del dinero americano en el futuro previsible, sus fortunas se están esfumando; harán lo que sea para mantenerse a flote en el mercado. Aunque no sean los más populares por aquí, tenemos todo lo que ellos quieren a raudales; materias primas, producción agrícola, electrónica, entre otras. Les daremos todo lo que necesiten, por un buen precio claro está. Algunos dirán que esto puede abrir las puertas al espionaje y a la subversión, pero aquellos que hagan negocios con nosotros aprenderán nuestros límites, para que así no pierdan su lucrativo lugar."
 ATW_encourage_bartering: "Alentar al trueque"
 ATW_encourage_bartering_desc: "Es hora de resguardarnos, y reducir la actividad económica a lo estrictamente necesario. Los recursos, especialmente los militares, son escasos y no nos podemos permitir las demandas de la economía civil americana. Debemos fomentar el intercambio local entre la población. Toda divisa deberá estar en las manos del Gobierno mientras estas conserven algún valor; la población deberá apañárselas con el trueque. Muchos afirman que esto desmoralizará a la población, pero este nuevo estado de las cosas probablemente fomentará la solidaridad y el odio hacia el enemigo."
 ATW_deals_with_the_demons: "Pactos con los demonios"
 ATW_deals_with_the_demons_desc: "Los traficantes internacionales de armas son injustamente calumniados. Se han asegurado de que africanos y asiáticos nunca dejen de matarse entre sí y de que el hombre blanco siga teniendo un lugar en el continente negro. Necesitamos sus servicios, nuestra base industrial es débil y necesitamos desesperadamente ciertas armas que solo ellos nos pueden proveer."
 ATW_mass_produce_ghost_weaponry: "Producir armas fantasma en masa"
 ATW_mass_produce_ghost_weaponry_desc: "Hacer una arma complete es difícil, tener las partes hechas es fácil. Las tan llamas armas caseras eran la espina a la policía GOS previa a la guerra civil, y hemos hecho bueno uso de ellas para armar a nuestra población cuando estábamos meramente caminando por las calles de las metrópolis de Florida. A pesar de que estas armas son de mala calidad y necesitan constante reparación, eso no es un problema si retenemos los recursos básicos para producir estas armas."
 ATW_sharpen_our_teeth: "Afilar nuestros dientes"
 ATW_sharpen_our_teeth_desc: "Somos bandidos. Eso esta claro, somos los Robin Hoods, robando de los avaros judíos para darle devuelta a nuestra gente. Debemos armarnos en contra de la influencia malvada de nuestros enemigos; nuestra gente ha perdido mucho, y están enojados. Su rabia los motiva a matarse trabajando en las fabricas y luchar en las líneas del frente. Han olvidado la mentalidad del consumismo; ahora, ellos producen el futuro Estado ario."
 ATW_build_the_arsenals_of_aryanism: "Construir los arsenales arios"
 ATW_build_the_arsenals_of_aryanism_desc: "Nuestras tierras han cambiado; lejos están los vestigios del antiguo, infierno consumista de Florida; ahora el antiguo estado esta lleno de fabricas, produciendo cantidades aparentemente infinitas de material para el esfuerzo bélico. Hemos logrado un empleo completo, y toda la gente esta dedicada a nuestra causa. Aun tenemos mucho que hacer; tenemos que expandirnos, hacernos más grandes, y demandar mas. Debemos conquistar, pero solo si nuestra base industrial no para de agigantarse."
 ATW_obliterate_the_social_contract: "Obliterar el contrato social"
 ATW_obliterate_the_social_contract_desc: "La marcha de nuestros soldados derriba el previo orden económico americano. La gente rechaza las acciones impuestas por el capitalismo en favor de un orden económico natural, basado en el deber. Pero nuestro trabajo no esta listo; muchos ganan a través del mercado negro, explotando a la gente con promesas de facilidad para consumir. Aquellos son los adherentes a un culto muerto al previo contrato social económico, y ellos serán destruidos."
 ATW_slaying_the_dragon: "Matar al dragón"
 ATW_slaying_the_dragon_desc: "El capitalismo es un cáncer para América. Mucha de la riqueza natural de estas tierras ha sido destruida para satisfacer la insaciable codicia de los plutócratas, y su industria ha sido vendida al mejor postor. Para llenar sus bolsillos destruyeron fábricas, dejando a millones en la ruina. Si bien no podemos mejorar la situación en mitad de la guerra, podemos destruir el sistema y reemplazarlo por una maquinaria de guerra; podremos llevar a cabo reformas más sustanciales más adelante."
 ATW_hold_back_our_hatred: "Retener nuestro odio"
 ATW_hold_back_our_hatred_desc: "Este mundo es uno de fachadas y apariencias. Cuando una nación quiere conseguir algo , esta debe preparar su papel para parecer así más atractivo para los demás. Haremos lo mismo, simplemente porque nos beneficia. Jugaremos el juego de la razón y fingiremos moderación. Pretenderemos que estamos dispuestos a cooperar, y golpearemos cuando menos se lo esperen, cuando sus miedos hayan sido neutralizados. La victoria de la raza aria es inevitable, simplemente compraremos tiempo."
 ATW_strike_first_strike_hard: "Primero y fuerte"
 ATW_strike_first_strike_hard_desc: "Ninguna máscara podrá ocultar nuestro odio por el degenerado mundo moderno. De este modo, nuestro objetivo no será ‘ganar tiempo', será la destrucción. El mundo arderá hasta sus cimientos, y el hombre ario será el único que lo verá renacer. No les permitiremos presenciar nuestra nación, ELLOS serán destruidos antes de que ELLOS se den cuenta de que hemos conseguido nuestro triunfo final. De lo contario estaríamos comprometiendo nuestros ideales al ponernos al servicio del orden mundial."
 ATW_forest_for_the_flames: "Bosque para el incendio"
 ATW_forest_for_the_flames_desc: "Este es el momento más grande de la historia de la humanidad. Desde el principio del Antropoceno hasta hoy, nunca ha habido ninguna causa tan grande y noble como la nuestra. Esta es una batalla entre quienes han corrompido al hombre y aquellos que tratan de destruir a tan vil poder. La Guerra de Liberación Aria no es otra cosa que el pináculo de la humanidad, tanto de su odio como de su amor. El cajón de sastre que es el espíritu humano ha sido encendido, dejado en un lugar donde puede quemarse libremente, consumiendo todo menos a si mismo."
 ATW_save_their_souls: "Salvar sus almas"
 ATW_save_their_souls_desc: "Hay muchos dentro de nuestro territorio quienes cumplen los requisitos para luchar en nuestra gran cruzada, pero que carecen de fuerza de voluntad o de fe en la causa aria. La solución más simple para esto es orillar a estos últimos arios hacia el lado del bien para agitar la ira en sus almas, dándoles la superioridad que merecen para los últimos días en la tierra, que les permitirá luchar hasta que todo lo que quede sean remanentes de un mundo destruido."
 ATW_corrupt_their_minds: "Corromper sus mentes"
 ATW_corrupt_their_minds_desc: "No hay arma más poderosa que la capacidad de romper la psique de alguien. Uno generalmente subestima el concepto de \"miedo\", esto es así hasta que uno  siente el miedo e verdad golpeando su corazón. Convertirse en el mayor villano que el mundo moderno haya visto, producir actos de terror y repugnantes carnicerías en cantidades industriales. Que todos sepan que todo lo que conocían ha desaparecido. Que sepan lo que pasa cuando dejas al alma de alguien pudrirse en odio."
 ATW_embrace_our_inner_animal: "Abrazar nuestro animal interior"
 ATW_embrace_our_inner_animal_desc: "Nuestra ambición no es una que se pueda controlar con los simples medios para la guerra que hemos conocido hasta ahora. Somos similares a una bestia rabiosa liberada de sus cadenas, somos la reminiscencia de la muerte en este vil y putrefacto sistema. Cuando se abandona a uno, se le deja tirado a su suerte en la matanza, ¿realmente se puede culpar a uno por acabar con aquellos que les ha fallado, el degenerado orden mundial, con un odio absoluto?"
 ATW_rites_of_apotheosis: "Ritos de apoteosis"
 ATW_rites_of_apotheosis_desc: "El eón final se cierne sobre nosotros, la purificación de lo pasado y lo futuro finalmente llegará a estas degeneradas tierras. Somos el dios que determinará el fin de la humanidad, un miserable, enfermo, dios de los hombres, creado al permitir que el odio se agudizase. Ellos miran con horror como realizamos nuestros crímenes contra la humanidad sin darse cuenta que fue su ‘humanidad' la que provocó este odio en primer lugar."
 ATW_make_charon_work_overtime: "Poner a Caronte a laburar"
 ATW_make_charon_work_overtime_desc: "El río Estigia se desborda y es ahora un océano.\n\nNo habrá piedad para ninguna alma no aria, ni se aceptará ninguna súplica de estas repugnantes ratas de apariencia humana. Afirman que no han hecho nada malo, que son inocentes, pero saben que allá donde van les sigue el hedor de la putrefacción y la maldad. Son plenamente conscientes de que se merecen todo el sufrimiento ocasionado sobre ellos."
 ATW_communion_with_hatred: "Comunión con el odio"
 ATW_communion_with_hatred_desc: "Nuestro odio es algo que engloba a nuestro ser, algo que ha sido encendido tras ser abandonado por el mundo. Debemos avivar esta llama, hasta que alcance grandes alturas, para así combatir aquellos que permanezcan en este repulsivo mundo. Toma tu odio, tu ira, tu misantropía pura, y hazla tu seña de identidad. No tengas piedad con aquellos que hayan permitido que estos sentimientos proliferen."
 ATW_destroy_their_bodies: "Destruir sus cuerpos"
 ATW_destroy_their_bodies_desc: "No permitiremos que exista absolutamente nada del mundo anterior a nosotros. Ni un solo cadáver, ni un solo monumento a su \"antigua grandeza\" o su \"progresismo moral\". Nada de eso. Lo quemaremos todo, para que nunca vuelva a salir a la luz, que nunca sea recordada por ninguna alma en pena. El mundo, la Tierra, quedará marcada para siempre por nuestro odio y nuestras acciones."
 ATW_antidote_to_the_healed: "Antídoto a los sanados"
 ATW_antidote_to_the_healed_desc: "No tendremos ni una pizca de simpatía hacia los bastardos, nada de esa falsa emoción llamada ‘empatía'. La mejor cura para sus enfermedades es asesinarlos, especialmente si sus enfermedades son autoinfligidas. Para curar la plaga que es la humanidad, esta debe ser ser asesinada, hombre a hombre, mujer a mujer, todo aquel que se mantenga firme caerá tarde o temprano."
 ATW_all_after_life: "Todo tras la vida"
 ATW_all_after_life_desc: "Como el agua que gotea de una canaleta después de que la tormenta ha terminado, todas las almas caerán eventualmente, ahogadas por las cenizas de lo que viene después. Sin piedad, con amor, las vidas de toda la humanidad serán sofocadas. El ajuste de cuentas por sus muchos pecados les llega, rápido o lento. Cortado de golpe, como hojas de hierba."
 ATW_break_their_spirit: "Romer su espítiru"
 ATW_break_their_spirit_desc: "La mayor herramienta que se puede usar contra una persona es su propia mente. Es tan fácil dejarse vencer por el miedo, la angustia, la culpa o la ira, que resulta casi banal. Es como ver a un insecto ya muerto retorcerse antes de su último instante, antes de rendirse, aceptar su destino, antes de que lo derriben de nuevo."
 ATW_make_them_suffer: "Hacerlos sufrir"

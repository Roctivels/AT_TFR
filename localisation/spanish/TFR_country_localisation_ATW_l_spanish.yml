 ATW_heralds_of_the_apocalypse_dynamic: "Heraldos del Apocalipsis"
 ATW_heralds_of_the_apocalypse_dynamic_desc: "La vanguardia de la Cruzada Aria es, y siempre será, el soldado. Perfectamente preparado y entrenado, deben actuar como un militante solitario que lucha por la causa, incluso si sus enemigos los asedian en todos los frentes. Por supuesto, son ellos quienes llevaron a la División Atomwaffen a donde está hoy; internacional o local, auxiliar o combatiente del frente.\n\nSi bien todo esto puede ser cierto, el quid de la cuestión reside en su armamento. Si bien la mayor parte de la División está bien entrenada -debido a la cantidad de veteranos insatisfechos del Ejército, la Policía y la Guardia Nacional que llenan las filas de Atomwaffen- sus armas y equipo suelen ser, en el mejor de los casos, de baja calidad, si es que tienen alguno. La mayoría de las armas de fuego provienen del mercado negro; escopetas improvisadas poco fiables, rifles de caza confiscados e incluso modelos impresos en 3D, lo que convierte a cualquier logista de baja calidad que trabaje para ellos en una pesadilla. La inconsistencia y poca confiabilidad de su equipo han resultado fatales para el progreso de la División y deben solucionarse lo antes posible."
 ATW_industrial_anarchy_dynamic: "Anarquía industrial"
 ATW_industrial_anarchy_dynamic_desc: "Desde que la División Atomwaffen tomó el control del sur de Florida a principios de la Segunda Guerra Civil Americana, uno de los efectos más devastadores de la ideología SIEGE y la \"Doctrina de la Destrucción\" fue la fuga de cerebros que la acompañó. Los estragos provocados por las despiadadas masacres de la División en lugares como Fort Myers dieron pocas esperanzas a los trabajadores floridanos de recibir un trato adecuado por parte de los caudillos nazis. Por ello, quienes no se marcharon inicialmente se encuentran ahora abandonados en barrios marginales urbanos patrullados por auxiliares \"arios\", lo que les obliga a buscar refugio y comida en lugar de trabajar. Esto se ha remediado con pequeños campamentos de trabajo esclavo, que apenas generan lo suficiente para que la División llegue hasta la bahía de Tampa, aunque no es suficiente."
 ATW_doctrine_of_destruction_dynamic: "Doctrina de la Destrucción"
 ATW_doctrine_of_destruction_dynamic_desc: "La \"Doctrina de la Destrucción\" es la raíz de las políticas de la División Atomwaffen para \"gobernar\" sus territorios. Su biblia, \"SIEGE\", la defiende con vehemencia y es una de las muchas cosas que la distinguen de organizaciones como el Movimiento Nacionalsocialista. Su objetivo es causar el mayor caos y daño posible a las manifestaciones judeobolcheviques en la sociedad americana, hasta el punto de que el mundo entero se levante sobre un montón de cenizas para que la raza blanca pueda alzarse y reclamar su legítima posición frente a quienes la amenazan. Esto incluye a todos los que se oponen a los ideales de la División, y especialmente a los blancos, a quienes consideran \"colaboradores\". Esto frustra cualquier esperanza de apoyo público, incluso de aquellos a quienes reconocen como aliados, como el Movimiento Nacionalsocialista de Míchigan o el Frente Patriota."

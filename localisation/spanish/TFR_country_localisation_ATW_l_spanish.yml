 ATW_florida_siege_idea: "Asedio de Florida"
 ATW_florida_siege_idea_desc: "Tal y como se encuentra nuestra División, no tenemos ninguna posibilidad de ganar en nuestra situación actual, debemos conectar nuestras dos áreas iniciales y controlar Florida si deseamos avanzar más profundamente en lo que era los Estados Unidos."

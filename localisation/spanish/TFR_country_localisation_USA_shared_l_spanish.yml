 USA_reconstruction_category: "Reconstrucción"
 USA_reconstruction_category_desc: "Tras años de conflicto civil, América se encuentra en una encrucijada. El país yace fracturado y agotado, con ciudades en ruinas, industrias destrozadas y comunidades divididas. La $USA_reconstruction_name$ de la nación es esencial, no solo para la recuperación económica, sino también para sanar las profundas heridas que casi desgarraron al país. Es necesario establecer prioridades con cuidado, ya sea para centrarse en la infraestructura, reactivar industrias clave o invertir en programas sociales para reconstruir el tejido social.\n\nCada Proyecto de la $USA_reconstruction_name$ moldeará la nueva América, impactando la estabilidad, la capacidad productiva y la unidad de su pueblo. Las decisiones que se tomen aquí definirán el legado de esta nueva era y la fuerza del resurgimiento de la nación.\n\n$USA_reconstruction_modifier_tooltip$"
 USA_restoring_american_foreign_influence_category: "Restaurar nuestra influencia"
 USA_restoring_american_foreign_influence_category_desc: "La reciente guerra civil ha dejado a América dividida y marcada, pero con un nuevo liderazgo ahora establecido, el mundo está pendiente de si los Estados Unidos pueden recuperar su papel en la escena mundial. La tarea de reconstruir nuestra influencia exterior es ingente. Los antiguos aliados se han vuelto hacia otras potencias en busca de estabilidad, y los adversarios se sienten envalentonados por nuestra percibida debilidad. Debemos elegir con cuidado: ¿intentaremos restaurar las antiguas alianzas y compromisos, o forjaremos un nuevo camino que refleje la transformación de nuestra nación? Cada decisión en nuestra política exterior remodelará la identidad de América y determinará nuestro lugar en el mundo para las generaciones venideras.\n\nEstas decisiones afectarán a las relaciones diplomáticas, las políticas económicas y las posibles alianzas militares. Una planificación cuidadosa y una visión clara son esenciales para navegar por el complejo entramado de la política mundial tras la guerra civil."

l_spanish:
 militia_establish_martial_law: "Establecer la ley marcial"
 militia_establish_martial_law_desc: "El Gobierno ha perdido el control de la situación en nuestro Estado. Los comunistas, agitadores y otros antiamericanos ahora corren libremente transformando nuestro país a su retorcida forma. ¡Conocerán el significado de la ley y el orden!"
 militia_patrols: "Patrullas vecinales"
 militia_patrols_desc: "Por mucho que lo intentemos, cada vez es más difícil proteger a nuestro estado de la subversión y la anarquía. Es necesario crear patrullas vecinales para proteger nuestros barrios de esta amenaza. ¡Se impondrá el orden en los suburbios!"
 militia_protect_our_faith: "Proteger nuestra fe"
 militia_protect_our_faith_desc: "Desde su fundación, Estados Unidos ha sido una nación cristiana, y no tenemos prisa por cambiar eso. Los lugares de culto serán puestos bajo protección y se implementarán leyes que reflejen los valores religiosos. ¡Alabado sea Cristo!"
 militia_training_programs: "Expandir programas de formación"
 militia_training_programs_desc: "Los patriotas no escasean en este estado de los nuestros, pero muchos carecen de la experiencia necesaria para el combate. Para abordar este problema, nuestros milicianos serán sometidos a un entrenamiento ampliado para educarlos en la batalla y familiarizarlos con sus armas."
 militia_curfews: "Establecer un toque de queda"
 militia_curfews_desc: "Imponer el orden está resultando más difícil de lo que pensábamos, y para frenar la ola de anarquía habrá que tomar medidas extraordinarias. Se establecerá un toque de queda y se detendrá a quien lo infrinja. Recuerda, a las 6:0, ¡entra en casa!"
 militia_censor_news: "Censurar las noticias"
 militia_censor_news_desc: "Nuestra milicia ha sido ridiculizada por la prensa desde que tomamos el poder, ¡simplemente por tratar de hacer cumplir la ley y el orden! ¡Las mentiras que difunden no han hecho más que alentar a los anarquistas que están propagando la anarquía por todo el país y sembrar semillas de desconfianza en las mismas personas que estamos tratando de proteger! Nos aseguraremos de que estos enemigos del pueblo paguen por su engaño."
 militia_new_tactics: "Desarrollar nuevas tácticas"
 militia_new_tactics_desc: "Por lo menos, esta guerra ha traído consigo una serie de nuevas tácticas, para muchas de las cuales no estábamos preparados. Para contrarrestarlas, nos hemos dedicado a desarrollar nuestras propias estrategias. Los pondremos de rodillas."
 militia_integrate_police: "Integrar a la Fuerza Policial"
 militia_integrate_police_desc: "Por mucho que apoyemos a los azules, no han sabido adaptarse a nuestra situación actual y se han convertido más en una molestia que en otra cosa. Además, nuestras milicias los han vuelto superfluos. Seguro que estarán encantados de unirse a nuestras filas."
 militia_pow_question: "Cuestión de los prisioneros de guerra"
 militia_pow_question_desc: "Todas las guerras tienen prisioneros, y ésta no es una excepción. Nuestros hombres capturan cada día a más radicales, y algunos sostienen que no podemos soportar la presión sobre los recursos. ¿Quizás los campos de prisioneros de guerra deberían ser liquidados?"
 militia_draft: "Implementar una conscripción"
 militia_draft_desc: "Al principio, había patriotas haciendo cola alrededor de la manzana, dispuestos y preparados para luchar por Dios y por la patria. ¿Y ahora? No tanto. Se ha decidido que la conscripción está en orden, y muy pronto, todos los hombres mayores de 18 años estarán en el frente."
 militia_community_protection: "Proteger nuestras comunidades"
 militia_community_protection_desc: "Nuestra comunidad está rodeada de amenazas. Comunistas, fascistas e incluso nuestro propio gobierno han intentado aplastar a nuestra milicia. Nos aseguraremos de que no tengan éxito. ¡Por la vida y la libertad!"
 militia_independence: "Independencia"
 militia_independence_desc: "Hoy nos enfrentamos a un gobierno federal más tiránico que nunca. Los valores de la libertad se les han escapado y nos hemos visto obligados a encontrar nuestro propio camino. ¡Cualquier lucha a la que nos enfrentemos puede ser superada por nuestra libertad!"
 militia_private_contractors: "Contactar con contratistas privados"
 militia_private_contractors_desc: "Si algo es seguro, es que la tarea de imponer el orden en una nación sumida en la anarquía es un trabajo duro, y en el que nos vendría bien algo de ayuda. Afortunadamente, no faltan fondos ni hombres capaces dispuestos a luchar por ellos. Es hora de que todo el mundo sepa que estamos contratando personal."
 militia_command_chain: "Establecer una Cadena de Mando"
 militia_command_chain_desc: "¿Cómo vamos a establecer el orden en la calle cuando apenas existe en nuestras filas? Habrá que crear una estructura de mando para organizar nuestras fuerzas en una verdadera milicia bien regulada."
 militia_purchase_heavy_guns: "Comprar armamento pesado"
 militia_purchase_heavy_guns_desc: "Para obtener ventaja sobre nuestros enemigos, necesitaremos comprar armamento más avanzado. Por suerte, hay mucha gente que vende lo que nosotros compramos. Usaremos una pistola y si eso no funciona, ¡usaremos más pistola!"
 militia_bureaucracy: "Burocracia miliciana"
 militia_bureaucracy_desc: "La organización es clave para cualquier fuerza de combate, y la nuestra no es diferente. Para corregir las ineficiencias de la milicia, crearemos una burocracia. Se tomarán todas las medidas para ayudar a nuestros hombres a alcanzar la victoria."
 militia_vets: "Cuidar de nuestros veteranos"
 militia_vets_desc: "Como todas las guerras, esta nos ha dejado veteranos, muchos de ellos heridos en cuerpo y alma. Necesitarán cuidados, y tenemos que hacer todo lo posible para asegurarnos de que reciben lo que necesitan."
 militia_government: "Trabajar con el gobierno"
 militia_government_desc: "Aunque muchos sostienen que su tiranía se ha vuelto inaceptable, hemos llegado a la decisión de mirar más allá por su ayuda en el mantenimiento de la ley y el orden. Después de todo, ¡los valores no significan mucho si estás muerto!"
 militia_skies: "Dominar los cielos"
 militia_skies_desc: "Trabajar con el gobierno tiene sus ventajas y la asistencia aérea es la que más artillería tiene. Aplastaremos a las fuerzas de la ilegalidad desde el cielo y estarán muertas mucho antes de que se topen con el rifle de un miliciano."
 militia_lobbying: "Presionar para obtener préstamos federales"
 militia_lobbying_desc: "No hay nada malo en el dinero gratis, y estamos más que encantados de aceptar tanto como ellos estén dispuestos a dar. Sólo tenemos que asegurarnos de poder devolvérselo..."
 militia_national_guard: "Integrar la Guardia Nacional"
 militia_national_guard_desc: "A medida que aumenta nuestra influencia en el gobierno, hemos decidido integrar su fuerza de combate en la nuestra, para aumentar la eficacia y disminuir los fallos de comunicación. Cuando se trata de mano de obra, más es mejor, ¡sobre todo si ya tienen un arma!"
 militia_contracts: "Aceptar contratos públicos"
 militia_contracts_desc: "El dinero suele ser un problema para la milicia, pero afortunadamente el gobierno ha aportado una solución. Nos darán una orden y nos aseguraremos de que se cumpla. Siempre hemos estado dispuestos a luchar por la ley y el orden, ¡pero que nos paguen por ello no estaría mal!"
 militia_advisors: "Invitar a asesores militares del Gobierno"
 militia_advisors_desc: "Siempre nos vendría bien más ayuda, y el gobierno ha estado más que dispuesto a proporcionárnosla. El ejército nos envía asesores para ayudarnos a entrenar y organizar a nuestros hombres en una fuerza de combate más eficaz."

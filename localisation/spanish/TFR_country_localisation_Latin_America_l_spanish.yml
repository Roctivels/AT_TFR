 NIC.1.t: "El FSLN proclama la Federación Centroamericana"
 NIC.1.d: "El presidente nicaragüense Daniel Ortega y el partido gobernante Frente Sandinista de Liberación Nacional (FSLN) anunciaron hoy sorpresivamente la formación de la Federación Centroamericana. En un comunicado, Ortega se comprometió a unir a las naciones centroamericanas por todos los medios necesarios, lo que generó temores de conflicto en la región. \n\nLa proclamación se produce en medio de la Segunda Guerra Civil Americana, que ha sumido a los estadounidenses en conflictos internos, dejando un vacío de poder en la región. Las ambiciones de Ortega han contado con el apoyo de Cuba, Venezuela y China, quienes han respaldado la iniciativa como una forma de fortalecer la autonomía regional y contrarrestar la influencia estadounidense. Sin embargo, otras naciones centroamericanas, como Guatemala, El Salvador, Honduras, Costa Rica y Panamá, han condenado la declaración de Ortega, interpretándola como una clara amenaza de agresión. Estos creen que el objetivo final de Nicaragua es tomar el control del vital canal de Panamá, aprovechando la inestabilidad actual en Estados Unidos. En respuesta a la creciente tensión, la Organización de los Estados Americanos (OEA) ha convocado una reunión de emergencia para discutir la posible amenaza a la estabilidad regional que plantea la proclamación de la Federación Centroamericana."
 NIC.1.a: "LARP"
 NIC.1.b: "Escritura de nivel MMA"
 NIC.2.t: "Guerra del Canal"
 NIC.2.d: "En un comunicado sorpresivo, el presidente nicaragüense Daniel Ortega ha anunciado que su país declara oficialmente la guerra a los vecinos Costa Rica y Panama, escalando tensiones en la región Centroamericana. La declaración realizada sucede tras la proclamación por parte de Ortega y el partido gobernante Frente Sandinista de Liberación Nacional (FSLN) de la formacion de la Federación Centroamericana hace varias semanas, que busca unir la región bajo cualquier circunstancia. La agresiva postura Nicaragüense ha causado preocupación entre sus vecinos y la comunidad internacional. \n\nTanto Costa Rica como Panamá, paises sin fuerzas armadas, han solicitado una reunion de emergencia de la Organización de Estados Americanos (OEA) para discutir la crisis y buscar apoyos de otros Estados miembro. Por el momento, han movilizado sus fuerzas policiales nacionales y agencias de seguridad para reforzar su seguridad fronteriza y mantener el orden público. Países alrededor del mundo han expresado preocupación en torno a la repentina escalada del conflicto en Centroamérica, con muchos reclamando una intervención internacional inmediata para prevenir las posibles consecuencias catastróficas que esta guerra pueda traer"
 NIC.2.a: "2 semanas."
 NIC.2.b: "2 semanas."

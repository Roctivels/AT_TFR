 BRA_jair_bolsonaro_char: "Jair Bolsonaro"
 BRA_jair_bolsonaro_char_desc: "Jair Bolsonaro, excapitán del ejército convertido en político, llegó a la presidencia de Brasil en 2019 tras una campaña divisiva y controvertida. Conocido por su retórica vehemente y su firme postura en defensa del orden público, Bolsonaro se ha posicionado como un defensor de los valores conservadores, la liberalización económica y un baluarte contra los movimientos de izquierda que dominaron la política brasileña en el pasado.\n\nEl Gobierno de Bolsonaro se define por su postura agresiva contra la delincuencia, su compromiso con la privatización y la desregulación, y su desafío a la corrección política. Es una figura polarizadora: amado por quienes lo ven como un salvador de los valores tradicionales y el orgullo nacional, y aborrecido por quienes lo acusan de socavar la democracia y menospreciar los derechos humanos.\n\nEl Gobierno de Bolsonaro ha enfrentado desafíos significativos, incluyendo protestas generalizadas, la creciente deforestación en la Amazonía y críticas internacionales a sus políticas ambientales.\n\nA pesar de la turbulencia, Bolsonaro mantiene una base de seguidores ferozmente leales que lo consideran una fuerza necesaria para restaurar la grandeza de Brasil mediante la lucha contra la corrupción, la reducción de la intervención gubernamental y el resurgimiento de la influencia militar en la política. Su mandato ha sentado las bases para un Brasil con una tendencia más populista, con Bolsonaro elogiando frecuentemente la dictadura militar del país, lo que indica que su presidencia podría allanar el camino para cambios políticos aún más drásticos en el futuro."

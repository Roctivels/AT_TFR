 GER_ARMSTROFF_DESC: "Klaus Armstroff nació en 1957 en la antigua Alemania Oriental. Tras la reunificación alemana, se estableció en Weidenthal, Renania-Palatinado. Trabajó como electricista durante un tiempo, antes de sucumbir a la ultraderecha radical que muchos de sus compatriotas experimentaban en aquel momento. Así, se unió al NPD y, a partir de 2009, fue miembro del consejo de distrito de Bad Dürkheim y ocupó un puesto de liderazgo en la junta estatal del NPD en Renania-Palatinado. Sin embargo, llegó a detestar las disputas internas e ideológicas que el partido había llegado a encarnar. Por ello, en 2013 abandonó el NPD y formó su propio partido, Der III. Weg. Un partido mucho más abierto al pensamiento socialista, que abrazaba una postura nacional revolucionaria y continuaba el legado de Otto Strasser.\n\nSu partido tendría un éxito limitado, al menos hasta que la Guerra Europea asoló al europeo, obligando a los pueblos de Europa Oriental a adoptar de nuevo el comunismo. Como resultado, cuando la confianza pública en el Gobierno se derrumbó, los militares de línea dura lanzaron un golpe de Estado. Sin embargo, pronto descubrirían que sus objetivos, más allá de su odio al comunismo, estaban muy divididos. Klaus y su partido se alzaron como una voz fuerte para unificar a la junta en medio del caos. Así, lo ascendieron al puesto de canciller.\n\nAhora que tiene el control total de Alemania, su visión de una Alemania militante, anticapitalista y strasserista es solo cuestión de tiempo. Lo que no es cuestión de tiempo es cómo se concretarán sus reformas a largo plazo y cómo las percibirá el Kremlin."
 GER_BUNDESTAG_DESC: "Por primera vez en nuestra historia, el presidente del Bundestag ha sido asesinado. Debido a esto, el proceso que hemos seleccionado se basa en el Artículo 57 de la Grundgesetz, que establece que el poder se transferirá al parlamento federal alemán. Por el momento, el organismo deberá restablecer colectivamente el orden en Alemania, mientras tanto, el Gobierno federal prepara elecciones presidenciales de emergencia dentro de 30 días.\n\nSin embargo, con nuestra sociedad ya polarizada, nadie espera que el Bundestag haga mucho en estos tiempos. Solo puede hacer todo lo posible por promover la estabilidad para una población ya radicalizada. Sin embargo, los conflictos internos en el propio parlamento dificultan cada vez más esta tarea, sumado al hecho de que aparentemente ningún político alemán cuenta con el apoyo de la ciudadanía.\n\nSolo podemos prepararnos para estas elecciones, pero con disturbios en todo el país y el ejército negándose a acatar nuestras órdenes, esta era no será fácil."
 GER_FRANZ_DESC: "Nacido en 1978 en Völklingen, Sarre, en la entonces Alemania Occidental, Frank Franz creció en una Alemania reunificada marcada por la división política y la incertidumbre económica. En aquellos tiempos, algunos alemanes recurrieron a movimientos radicales que promovían \"mejores alternativas\" al gobierno actual. Franz no era la excepción. Se unió al NPD a principios de los años 2000 y posteriormente llegó a liderar el partido durante su declive. Con un talento especial para reinterpretar el extremismo en términos más aceptables, Franz impulsó una nueva imagen política, arraigada en el tradicionalismo, el orden y el renacimiento cultural.\n\nAunque impopular entre la opinión pública, Franz se mantuvo activo en círculos de ultraderecha, forjando discretamente vínculos dentro del ejército y los grupos nacionalistas. Encontró su momento de triunfo poco después del fin de la Guerra Europea. El fracaso de la OTAN para contener los avances soviéticos en Europa Oriental provocó una desilusión generalizada entre la población cansada. Por ello, recurrieron a ideas más radicales.\n\nPoco después de que el Bundestag se sumiera en el caos, los militares, culpando a la indecisión y debilidad de Berlín, lanzaron un golpe de Estado rápido. Con la promesa de restaurar la soberanía y la fuerza, recurrieron a Franz, considerado por muchos como una figura de determinación y unidad nacional. Respaldado por oficiales, paramilitares y un público desesperado, fue nombrado canciller con poderes de emergencia. Ahora, Franz tiene autoridad total sobre su Heimat. Si decide alinearse con movimientos similares en gran parte de Europa o dar un giro al pasado, depende de su voluntad."
 GER_HEINRICH_DESC: "A pesar de haber sido una parte esencial de la historia alemana, la monarquía es algo de lo que muchos alemanes han fallecido. Y es cierto que, durante el último siglo, no ha habido influencia alguna de los aristócratas alemanes sobre la nación. Pero Enrique XIII, Príncipe de Reuss, planeó acabar con esa realidad. Nacido en 1951 en la Casa de Reuss, Enrique XIII creció con una profunda reverencia por el pasado imperial de Alemania. Adoraba su título nobiliario y, por ello, llegó a desconfiar del sistema democrático alemán. Siendo un exitoso hombre de negocios en su juventud, Enrique se retiró de la escena pública en los años 90, recurriendo en su lugar a círculos monárquicos y movimientos conspirativos. Para los años 2020, se había convertido en una figura central de la clandestinidad aristocrática alemana, considerándose el jefe de Estado elegido por Dios, una visión que Alemania había mantenido durante la mayor parte de su historia.\n\nMientras la OTAN se desmoronaba bajo el peso de una guerra catastrófica contra la resurgente URSS, Alemania se sumió en una crisis. Las victorias rusas en Europa Oriental, la inestabilidad económica y las oleadas de refugiados destrozaron la confianza pública en el Gobierno. En medio del caos, militares de línea dura dieron un golpe de Estado, derrocando al liderazgo civil en Berlín.\n\nEn busca de una figura unificadora con legitimidad histórica, Enrique XIII emergió como jefe de Estado. Aunque controvertido, su noble linaje y sus llamados a la renovación nacional resonaron en un público exhausto por la inestabilidad. Poco después, la moribunda república se disolvió. En su lugar, Alemania retornó a sus raíces imperiales. Se organizó una gran coronación a la que asistieron algunos de los monarcas restantes del mundo. Muchos se preguntan qué significará esto para Alemania, pero con los líderes de la Junta restantes, la guerra con los soviéticos parece inevitable, solo que la estética ha cambiado."
 GER_OTTE_DESC: "Max Otte no es una figura política cualquiera. Este economista y astuto analista de 60 años, nacido en 1964, ha recorrido un camino turbulento pero fascinante en el panorama político alemán. Aunque oficialmente es miembro de la CDU, sus opiniones se inclinan significativamente hacia la derecha.\n\nValiéndose de su considerable influencia financiera, forjada a través de fondos de cobertura y acuerdos privados, Otte ha apoyado repetidamente a la AfD, tanto ideológica como materialmente. Sus libros superventas, algunos de los cuales predijeron inquietantemente la crisis financiera de 2008, han cimentado su reputación como profeta del colapso económico.\n\nEn el contexto de la crisis migratoria, la inestabilidad estadounidense y las crecientes tensiones con Rusia, Otte se ha convertido en un candidato sorpresa en las elecciones. En tiempos de incertidumbre como estos, quizás Alemania necesite precisamente una figura así para restaurar la estabilidad y la esperanza."
 GER_DIETMAR_DESC: "Aunque ya no es joven, Bartsch parece joven comparado con algunos de los estadistas veteranos que dominan la política mundial. Y, al igual que ellos, no le faltan controversias.\n\nNacido en la RDA y fiel a muchos de sus principios -aunque adaptados a los tiempos modernos-, Bartsch fue editor de un periódico socialista e incluso se formó en la Academia de Ciencias Sociales del PCUS en Moscú.\n\nUn político de izquierdas clásico, se opone firmemente a la globalización y al militarismo. Sin embargo, como se demostró en el infame \"caso Lafodödel\", no duda en adoptar tácticas de la derecha cuando le conviene. Rodeado de misterio y contradicciones, Bartsch continúa operando con discreta persistencia y no muestra signos de cambiar de rumbo."

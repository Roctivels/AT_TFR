 ATW_brandon_russell_char: "Brandon Russell"
 ATW_brandon_russell_char_desc: "Con el tiempo, todos alcanzan la fatiga terminal, ya sea física o mental. Basta con mirar sus ojos: no queda tiempo. No hay conductor al mando. Que se aleje, lejos de todos nosotros. Cuando este chico explote, nadie querrá presenciarlo.\n\nNacido en 1995, Brandon Clint Russell es un hombre que dedicó una vida a la causa nacionalsocialista. A los 18 años apareció en foros en línea como Iron March. Inspirado por los aspectos revolucionarios del nazismo, pronto anunció la formación de la División Atomwaffen, una organización paramilitar empeñada en la destrucción total del orden global actual. Basándose en su experiencia en la Guardia Nacional y sus estudios de física nuclear, seleccionó a los elementos pasivos del grupo y comprendió que la única forma de alcanzar la victoria es la violencia extrema, con una explosión final de fuego radiactivo.\n\nHasta que un día enfrentó cargos por almacenar materiales para la fabricación de explosivos, lo que lo llevó a ser encerrado en los pasillos de concreto de la prisión. Bajo custodia, se mantuvo firme mientras animaba a otros miembros a perseverar en su misión. Inevitablemente, sería liberado, pero el FBI sabía que perseveraría. Ahora, con Estados Unidos sumido en las llamas del cambio, ignora el colapso como un buitre, listo para cumplir la misión de Atomwaffen:\n\nDestruir el orden mundial, castigar a los decadentes y poner fin a la historia tal como la conocemos.\n\n\"No hay lugar en este mundo para los cobardes... La espada ha sido desenvainada. No hay vuelta atrás\"."
 ATW_james_mason_char: "James Mason"
 ATW_james_mason_char_desc: "James Nolan Mason ha sido un fascista americano por más de cincuenta años, desde su ingreso en 1966 al ala juvenil del Partido Nazi Americano de George Lincoln Rockwell. Tras el asesinato de Rockwell un año después, Mason adoptó una postura cada vez más radical: creía que el electoralismo de Rockwell había fracasado y que la única manera de restaurar la supremacía blanca en Estados Unidos era mediante la desestabilización social y el derrocamiento del Gobierno federal. Sus dos mayores influencias ideológicas en ese sentido fueron el sucesivo líder del PNA, William Luther Pierce, y el líder de una secta, Charles Manson.\n\nCon la muerte de Pierce en 2002, Mason se convirtió en el principal ideólogo neonazi de América. Las colecciones de escritos de su boletín \"SIEGE\" se filtraron en la ultraderecha clandestina, donde influyeron profundamente en la red terrorista guerrillera esotérica que posteriormente se conocería como la División Atomwaffen. A medida que las lealtades del Gobierno federal se dividían y su capacidad para imponer el orden se desmoronaba, las células de las Atomwaffen surgieron en el sur americano e invitaron a su mayor inspiración a servir como su líder. Aunque solo dirige a unos pocos grupos de guerreros fanáticos, Mason está más cerca que nunca de hacer realidad su retorcida utopía racial. Muchos están preocupados por lo que sucederá si se apodera de una gran ciudad, y mucho menos de un arsenal nuclear."

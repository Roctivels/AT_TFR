 GER_EUROCOMMISSION_DESC: "Tratado Constitucional de Berlín; Ti. V, Cap. 3, Art. 174:\n\"La Comisión es la máxima autoridad gubernamental y ejecutiva de la Federación. La Comisión está compuesta por siete miembros. Los miembros de la Comisión son elegidos por el Parlamento tras cada elección general... por un mandato de cuatro años. El poder ejecutivo se basa en la mayoría parlamentaria y deriva su legitimidad democrática de ella\".\n\nLa unidad europea casi se extingue en silencio. Cuando los tanques rusos arrasaron las llanuras de Europa y los misiles surcaron el cielo, la Unión Europea estuvo al borde del colapso total. Pero de la devastación de la guerra, ha surgido un nuevo orden.\n\nNo hay un solo jefe de Estado o Gobierno que dirija la Unión Europea. No hay un único líder que pronuncie discursos ni comande sus ejércitos. En cambio, está gobernada colectivamente por la Comisión Europea, un organismo supranacional encargado de defender los ideales de la Unión, ahora más que nunca. La Comisión, y la Unión en su conjunto, han caminado por la cuerda floja entre la soberanía nacional y la ambición, desde su creación mediante el Tratado de Lisboa. Sus críticos la califican de irresponsable, un motor frío del globalismo. Sus defensores la ven como la última y mayor esperanza para una Europa capaz de valerse por sí misma.\n\nAhora que Europa ha dejado de lado al jefe de Estado y se ha puesto completamente a merced de Bruselas, la Comisión se encuentra en un terreno desconocido. Con las instituciones centralizadas y su autoridad enormemente ampliada, ya no es un simple órgano menor. Es el gobierno de facto de más de 200 millones de ciudadanos.\n\nEste experimento no está liderado por un solo hombre o mujer, sino por un sistema. Podría ser el último de su tipo. Si vuelve a caer ante los rusos, Europa se fracturará de nuevo. Quizás, por última vez."
 GER_FEHLINGER_DESC: "Günther Fehlinger-Jahn ha forjado una carrera que nadie podría haber predicho, tuit a tuit. Nacido en 1968, estaba destinado a llevar una vida austriaca tradicional: estudios secundarios, un breve período como teniente en la Bundesheer austriaca y casi una década en la Universidad de Economía de Viena. Pero Fehlinger nunca se conformó con permanecer dentro de los límites de la vida convencional. En Bruselas, donde trabajó durante los caóticos años tras el tratado de Maastricht, se enamoró cada vez más de las grandes ideas de la democracia liberal.\n\nEn una época en la que los líderes ascienden a través de las instituciones, Fehlinger construyó su poder en secreto, mediante su expresión sin filtros y su inquebrantable fe en una Europa fuerte y unida bajo el ala de la OTAN. Como presidente de varios comités de defensa de la OTAN y grupos de integración balcánica, defendió incansablemente la expansión de la alianza y llamó a Europa una y otra vez a luchara contra Rusia con uñas y dientes. A pesar de todos sus vínculos institucionales, Fehlinger es más conocido por su infame presencia en redes sociales. En un inglés escueto, a menudo mal hablado, emite proclamas encendidas, mitad memorando diplomático, mitad fervor mesiánico. Algunos lo ven como un visionario. Otros, como un excéntrico delirante.\n\nLa historia, sin embargo, acabaría dándole la razón.\n\nCuando los ejércitos de Medvédev tomaron control de Europa Oriental, el continente y el mundo buscaron liderazgo en Bruselas, pero encontraron indecisión. En este vacío, Fehlinger ha emergido no como político, sino como el líder de la Europa Libre. Había advertido sobre este momento durante años. El loco se ha vuelto el estratega. Fehlinger ha transformado Bruselas en un bastión de una cruzada antirrusa, prometiendo liberar el Este y desmantelar la propia nación rusa. No promete paz a Europa; promete guerra, y victoria.\n\nPara él, esta guerra es la lucha final entre la democracia y la tiranía."
 GER_SCHWAB_DESC: "Nacido en Württemberg en 1938, Klaus Schwab era hijo de un industrial suizo que estaba profundamente involucrado en la industria bélica nazi. Su infancia transcurrió entre la calma de Zúrich y las ruinas de una Alemania que empezaba a recuperarse tras la guerra. Su trayectoria académica fue meticulosa y bien planificada. Para los años 60, ya contaba con doctorados en ingeniería y economía, además de una maestría de Harvard, donde tuvo como mentor a Henry Kissinger. Schwab comenzó a dar clases de política empresarial en Ginebra, pero su verdadero legado se forjaría en 1971, cuando fundó el Simposio de Administración de Europa, una cumbre anual donde multimillonarios, tecnócratas y líderes mundiales se reunían para discutir el futuro. Con el tiempo, esta organización se convertiría en la que hoy gobierna Europa con mano firme.\n\nEn 1971, Schwab estableció el Foro Económico Mundial con una sola misión: cultivar las mentes que \"darían forma a las agendas globales, regionales e industriales\". Durante décadas, ha apostado al largo plazo: organizando conferencias discretas, fomentando el networking y publicando innumerables libros sobre la fusión del Estado y el mercado. Muchos lo consideraban un futurista inofensivo. Que ingenuos.\n\nKlaus Schwab ha pasado su vida susurrando a los oídos de primer ministros y presidentes, pero finalmente ha salido de las sombras. Ahora que la Comisión invita a los tecnócratas del FEM a tomar el control, Schwab presenta la culminación de su obra: bajo la Agenda 2040 y la Cuarta Revolución Industrial, Europa será reconstruida; no para los humanos tal como son, sino para lo que Schwab cree que deben llegar a ser. Solo queda una pregunta:\n\n¿Estás listo?"

 CHI_tsai_ing_wen_char_desc: "Nadie representa mejor la inclusividad de Taiwán que Tsai Ing-wen. Primera presidenta de la República de China de ascendencia aborigen, soltera y mujer, superó innumerables estereotipos para triunfar como política y jurista.\n\nEntró en el gobierno en 1986, pero se adentró en la política en 2000, cuando Chen Shui-bian se convirtió en el primer presidente no perteneciente al Kuomintang. Inicialmente miembro del Consejo de Asuntos del Continente, se convirtió en legisladora en 2005 y vice primera ministra en 2006. En 2008, asumió el liderazgo del Partido Democrático Progresista tras su derrota electoral y lo lideró en las elecciones locales de 2010. Perdió tanto la carrera por la alcaldía de Nuevo Taipéi de 2010 como las elecciones presidenciales de 2012, y dimitió como líder del partido. Sin embargo, tras los escándalos del ECFA de Ma Ying-jeou y el Movimiento del Girasol, el PPD recuperó impulso. Regresó como líder y ganó las elecciones de 2016, derrotando al Kuomintang por más de 25 puntos.\n\nPosteriormente, promovió la identidad taiwanesa, amplió los derechos humanos, fortaleció los lazos con Japón y Estados Unidos, y mantuvo una ambigüedad estratégica con China. A medida que su popularidad se recupera tras el mínimo de 2018, se prepara para aspirar a un segundo mandato."
 CHI_han_kuo_yu_char_desc: "Han Kuo-yu, también conocido como Daniel Han, es a menudo descrito como un político poco convencional o incluso populista. Descendiente de un veterano de la Guerra de Resistencia, tuvo dificultades académicas, lo que llevó a sus padres a enviarlo a la Academia Militar de la República de China. Allí, se convirtió en capitán e, inspirado por un cubo de Rubik, decidió estudiar arduamente para la universidad.\n\nEn 1990, se convirtió en representante del Consejo del Condado de Taipéi, adquiriendo notoriedad en 1992 tras una pelea con colegas. Ese mismo año, ganó un escaño legislativo, pero perdió las primarias del KMT de 2001, lo que lo impulsó a abandonar la política y estudiar en la Universidad de Pekín. Regresó a la política en 2017 y, a pesar de perder la carrera por el liderazgo del partido, se convirtió en el candidato del KMT a la alcaldía de Kaohsiung. En 2018, puso fin al largo gobierno del PPD en la ciudad, pero enfrentó críticas por unirse a la carrera presidencial de 2020, con ciudadanos acusándolo de abandonar Kaohsiung.\n\nA pesar de las dudas sobre su competencia, ganó la presidencia con una victoria aplastante, prometiendo contrarrestar los \"movimientos independentistas\" y revitalizar la economía, aunque muchos temen sus políticas radicales y poco realistas."

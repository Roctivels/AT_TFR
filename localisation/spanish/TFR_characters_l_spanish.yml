 NSM_burt_colucci_char: "Burt Colucci"
 NSM_burt_colucci_char_desc: "En marzo de 2019, Burt Colucci tomó el control del Movimiento Nacionalsocialista de manos del exlíder Jeff Schoep. Tras los meses previos al colapso de América, el Movimiento cobró una fuerza considerable en el país, sumando cientos de nuevos miembros en cuestión de semanas.\n\nY ante el colapso de la autoridad en Míchigan, el MNS aprovechó la situación, conquistando una parte del este rural de Míchigan y territorio en la propia Detroit. Esto le permitió a Colucci consolidar al MNS como facción en EE.UU. Pero a medida que se consolidaba, el MNS comenzó a faccionalizarse, formándose dos facciones internas principales: los hitlerianos, que buscan seguir los pasos de la Alemania nazi, y los rockwellianos, que buscan crear una versión americana del fascismo.\n\nCon Colucci al mando y como líder de los hitlerianos, no debe permitir que el faccionalismo divida a su partido.\n\nNo sea que condene por completo la excepcional oportunidad del Movimiento."

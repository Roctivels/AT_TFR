 GER_BYUNG_CHUL_HAN_DESC: "Byung-Chul Han es conocido principalmente por ser un teórico cultural y filósofo, destacado por su crítica del neoliberalismo y los efectos del capital en la sociedad humana en su conjunto.\n\nHan ha escrito más de treinta libros, todos ellos deconstruyendo la vida moderna de una u otra manera, y expresa su opinión sobre la naturaleza totalitaria de la sociedad de la transparencia, algo que se ha convertido en una herramienta de poder en las fuerzas del mercado neoliberal, donde la apertura voluntaria se venera por encima de cualquier otra norma social.\n\nCon los fracasos de Die Linke y la espiral descendente del capital, es indudable que la gente buscaría alternativas, y no necesariamente en la dirección opuesta del espectro político.\n\nHan nunca ha sido abierto sobre su vida personal, y con su reciente cambio de carrera, que no parece cambiar, y con el liderazgo de Alemania en él y sus cofilósofos y expertos, es indudable que el cambio constante es inevitable.\nLa autoexplotación, la divulgación forzada, la devoción ferviente al capital serán cosa del pasado, un pasado al que nadie querría volver.\n\nLa gran fatiga ha terminado; ha llegado el momento de la vitalidad."

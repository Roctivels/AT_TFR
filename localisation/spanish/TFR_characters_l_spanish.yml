 ATW_joshua_sutter_char: "Joshua Sutter"
 ATW_joshua_sutter_char_desc: "Un niño que ha presenciado lo peor que podría pasar en el mundo no puede asimilar la pérdida ni la situación actual. Cuando el mundo arde, no tiene ni idea de por qué. La vida no le había revelado semejante revelación. Ya estaba con un pie en la tumba, soñando con que esta pesadilla terminaría. Pero no se detendrá hasta ese momento, hasta que otra persona, dispuesta a regañarlo por su moralidad sin sentido, le arrebata la vida. Joshua Caleb Sutter es un hombre rodeado de misterio, conocido por el público como una figura clave en la Orden de los Nueve Ángulos, informante del FBI y editor de libros extremistas. Como antiguo líder de las Naciones Arias, los vínculos de Sutter con el extremismo son amplios. Juró lealtad a Corea del Norte, dirigió una secta hindú y creó el Templo de la Sangre, una \"nexión\" o célula de la Orden de los Nueve Ángulos. Su influencia sobre la División Atomwaffen es innegable. De naturaleza violenta, ha impulsado a la organización a trascender el concepto mismo de moralidad y humanidad. Guiando a sus miembros por el siniestro camino de la inmoralidad, Joshua ha aprovechado al máximo la financiación del FBI durante su tiempo como informante, pero como un camaleón, se ha escabullido entre las grietas de la providencia, regresando a su destino. La ironía del imperio que le ha proporcionado los medios para clavarle una daga en la espalda, la energía oscura que emanará del sufrimiento que ha causado rivalizará con el gran diluvio, el deseo de surgimiento de un nuevo imperio construido sobre los restos del pasado, el exceso y la tortura. Una eternidad de podredumbre y dolor, el infierno en la Tierra."

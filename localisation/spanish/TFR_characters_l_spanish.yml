 GER_frankwalter_steinmeir: "Frank-Walter Steinmeier"
 GER_STEINMEIR_DESC: "Frank-Walter Steinmeier ha sido presidente del Estado alemán desde 2017, con años de experiencia política a sus espaldas. Miembro del SPD desde hace bastante tiempo, está firmemente comprometido con la defensa de los valores de la democracia y la libertad.\n\nNació en 1956 en Detmold, donde estudió Derecho y Ciencias Políticas, doctorándose en Derecho. Comenzó su dilatada carrera política en los años 90 como asesor de Gerhard Schröder, primero en el estado de Baja Sajonia y posteriormente en Berlín, donde llegó a ser jefe de la Cancillería, contribuyendo a las reformas sociales y laborales de la Agenda 2010.\n\nFue ministro de Asuntos Exteriores en dos ocasiones, bajo la dirección de la canciller Angela Merkel, y dirigió diversas negociaciones con importantes países como Rusia, Irán y la UE. También fue vicecanciller y lideró la oposición en el Bundestag.\n\nSteinmeier ha utilizado su cargo para defender la democracia liberal. Si bien no es una figura que busque titulares, es conocido como un nombre familiar en la vida alemana."

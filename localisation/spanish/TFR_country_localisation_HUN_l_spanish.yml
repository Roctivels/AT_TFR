 Hungary.20224.t: "OTAN arresta a Ágnes Kunhalmi"
 Hungary.20224.d: "Tras afirmar que el líder de la oposición Ágnes Konhalmi ha filtrado documentos secretos a la Unión Soviética a cambio de favores políticos tras la victoria rusa, fuerzas especiales alemanas, en colaboración con la policía húngara, ha arrestado a Ágnes Kunhalmi y han colocado al general Alber Sáfar al mando de las fuerzas húngaras restantes.\n\nEsta decepción con el liderazgo de Unidos con Hungría ha hecho que muchos de los que luchaban del lado de la oposición en Hungría hayan cambiado de bando en favor de los comunistas en Budapest."
 Hungary.20224.a: "Más vale diablo conocido que diablo por conocer."
 Hungary_news.1.t: "¡Hungría sale de la UE!"
 Hungary_news.1.d: "Llegan sorprendentes noticias de Budapest, pues hoy Hungría ha anunciado la culminación de su abandono de la Unión Europea. Las tensiones entre Bruselas y Budapest ya eran excesivamente altas con el choque entre la administración euroescéptica de Hungría y los funcionarios de la UE en una gran variedad de ámbitos relacionados a las políticas de la UE en Hungría. Analistas por todo el continente están en shock con muchos apuntando el fuerte impacto que esto tendrá en la economía húngara, al ser esta muy dependiente de la UE. Funcionarios en Budapest han desestimado las preocupaciones sobre la economía y la diplomacia citando los múltiples problemas con Bruselas cuando Hungría aún estaba en la unión. No obstante, todo debate relacionado con los problemas que acarrea el abandono han concluido ahora que todos los procedimientos del artículo 50 con Hungría han sido completados. Por consiguiente, Hungría ya no forma parte de la UE y todos los bienes, acuerdos, organizaciones, responsabilidades y el resto de estipulaciones que vienen con la membresía serán revocadas al completo. Pronto el tiempo mostrará todas las repercusiones de la decisión de Budapest de abandonar la unión."
 Hungary_news.1.a: "Las grietas en la \"unidad\" europea no hacen más que crecer..."
 Hungary_news.2.t: "Hungría alinea su política exterior con la UE"
 Hungary_news.2.d: "Interesantes noticias llegan hoy desde Hungría con el anuncio del Ministerio de Exteriores Húngaro de nuevos esfuerzos políticos y diplomáticos con el fin de estrechar sus lazos con la UE. Budapest ha anunciado una variedad de nuevos acuerdos alegando al cumplimiento de una variedad de políticas de la UE relacionadas a políticas comunes y objetivos diplomáticos para los miembros de la UE. Esta nueva posición adoptada por Hungría ha sido bienvenida por diplomáticos de la UE. Funcionarios en Bruselas han expresado sus halagos a la nueva dirección que ha tomado Hungría, citando su gratitud con la reafirmación de Hungría de su \"futuro democrático y europeo\". Analistas han resaltado que esto supone un duro golpe para Moscú, pues Hungría era vista como uno de los Estados más cercanos a Rusia en la región. Hasta ahora el Ministerio de Asuntos Exteriores de Rusia no ha hecho comentarios respecto al reciente desarrollo de acontecimientos en Hungría."
 Hungary_news.2.a: "¡Como debe ser!"
 Hungary_news.2.b: "Otra nación corrompida por el liberalismo"
 Hungary_news.2.c: "Felicidades."
 Hungary_news.3.t: "Hungría alinea su política exterior con Rusia"
 Hungary_news.3.d: "Nos llegan hoy interesantes noticias desde Hungría con el anuncio por parte del Ministerio de Asuntos Exteriores Húngaro ha anunciado una apertura política y diplomática con la Federación de Rusia. En un movimiento que no ha sentado bien a los funcionarios de la UE en Bruselas, Hungría ha aceptado una serie de nuevos acuerdos rusos para fortalecer sus relaciones bilaterales. Como respuesta, Rusia ha felicitado a Hungría por su reciente cambio de políticas y afirman que esperan con gran anticipación una cooperación más estrecha. Diplomáticos de la UE han condenado los nuevos esfuerzos de Hungría, considerándolos irresponsables para un miembro tanto de la UE como de la OTAN y que socavan la unidad europea. Analistas por el continente apuntan que esta nueva relación entre Hungría y Rusia es un duro golpe a los esfuerzos de la UE para mantener a raya la influencia rusa dentro de la Unión. Se verá si estos esfuerzos acercarán más y más a Hungría a la órbita de Moscú."

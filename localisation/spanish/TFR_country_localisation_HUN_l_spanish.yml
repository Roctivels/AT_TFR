 Hungary.1.t: "La Tercera República Húngara"
 Hungary.1.d: "En 1989, con la muerte de la Unión Soviética en el horizonte, el gobierno comunista impuesto al pueblo húngaro se estaba derrumbando y, por medios pacíficos, el pueblo húngaro se deshizo del manto rojo del comunismo y adoptó una democracia occidental.\n\nPero la amenaza al comunismo se alzaría de nuevo cuando la economía húngara, no acostumbrada para la privatización y el libre comercio, llevó rápidamente al país a una depresión económica. ¡Afortunadamente, tras 2 décadas de agitación política, Viktor Orbán y su partido Fidesz tomó control de Hungría y restauró su antigua gloria!"
 Hungary.1.a: "¡El sueño de József Antall pedura!"
 Hungary.2.t: "Hungría entra a los 2020"
 Hungary.2.d: "Durante la última década, Orbán y su partido Fidesz han retenido el control completo sobre Hungría, y mientras la nación entra a una nueva década, muchos dentro de Hungría ven a Orbán como el salvador de Hungría, mientras mucho de ven como un dictador prorruso esperando el momento de atacar. Solo el tiempo dirá si el pueblo húngaro verá el fin del gobierno de Fidesz o si Hungría entrará a los años 2030 como entraron a los años 2020, bajo el gobierno de Fidesz."
 Hungary.2.a: "Oh, Dios mío, la bendición magiar."
 Hungary.3.t: "La habitación donde ocurre"
 Hungary.3.d: "Dos hombres entran en una habitación llena de humo, repleta de oficinistas mal pagados y obreros de la construcción. El dinero se desliza de las manos de un hombre a otro, un empresario político que se prepara para ser el próximo Orbán, o eso cree...\nEl otro hombre, compañero de piso de un periodista que está a punto de destapar algún escándalo de bajo nivel.\n\nNada que perder, todo que ganar... El lema de la Hungría de Orbán. Ambos hombres salen de la habitación habiendo ganado algo, uno se va sabiendo que el escándalo que provocó se perderá en los anales del Danubio, el otro se va con una misión y un puñado de forints bien apilados."
 Hungary.3.a: "Una sociedad corrupta es una sociedad en orden."

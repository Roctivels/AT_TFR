 Hungary.14.t: "Escasez de camas de hospital"
 Hungary.14.d: "En un lúgubre reporte de la primera línea del COVID, doctores por toda Hungría están diagnosticando pacientes sin saber que sus instalaciones hace tiempo que se han quedado sin camas. Con reportes de pacientes con cáncer son enviados a sus casas a morir para que así pacientes con COVID puedan tomar sus camas, Hungría espera una respuesta del gobierno."
 Hungary.14.a: "Bueno... ¡Haced más camas!"
 Hungary.15.t: "Los diplomáticos húngaros culpan al pueblo chino"
 Hungary.15.d: "En un esperado episodio de racismo contra los asiáticos, el diplomático húngaro en China ha sido grabado diciendo que los \"Los come perros comunistas del gran pozo de mierda que algunos llaman China son los únicos responsables del cultivo y de la exportación del COVID-19\"."
 Hungary.15.a: "¡Exigir una disculpa!"

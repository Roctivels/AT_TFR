 HUN_Faux_Democracy: "Patio de Orbán"
 HUN_Faux_Democracy_desc: "\n\n\n\n£GFX_HUN_orbans_playground\n\n\n\n\n\nSin prácticamente oposición que se pronuncie contra las leyes y regulaciones que Orbán y sus aliados han puesto en vigor desde que ganaron el poder en 2010 junto al complaciente electorado húngaro que están de acuerdo con el statu quo, Hungría se ha convertido en un patio para Orbán y sus adinerados aliados."
 HUN_Orbans_Playground: "Patio de Orbán"
 HUN_Orbans_Playground_desc: "\n\n\n\n£GFX_HUN_orbans_playground\n\n\n\n\n\nSin prácticamente oposición que se pronuncie contra las leyes y regulaciones que Orbán y sus aliados han puesto en vigor desde que ganaron el poder en 2010 junto al complaciente electorado húngaro que están de acuerdo con el statu quo, Hungría se ha convertido en un patio para Orbán y sus adinerados aliados."
 HUN_Dis_United_for_Hungary: "(Des)Unidos por Hungría"
 HUN_Dis_United_for_Hungary_desc: "A pesar de la aparente popularidad del primer ministro Viktor Orbán, muchos dentro de Hungría desean que su reinado seudodictatorial caiga. Estos grupos han empezado a organizar un movimiento político \"atrapalotodo\" para unir a toda la oposición contra Orbán y sus aliados."
 HUN_Gerrymandered_Victory: "Victoria manipulada"
 HUN_Gerrymandered_Victory_desc: "A pesar de que nuestro gobierno ha sobrevivido a una década de elecciones, una crisis económica y un flujo masivo de inmigrantes, no ha entrado a los 2020 intacto. Para asegurar futuras victorias electorales y la continuación de una Hungría fuerte y nacionalista, el primer ministro Viktor Orbán y sus aliados han decidido ganar las elecciones mediante la manipulación de los distritos electorales.\n\nEsto permitirá continuar nuestro gobierno sobre el pueblo húngaro, aún si no disminuye la oposición húngara en la vida cotidiana."
 HUN_Black_Sheep_of_the_EU: "Oveja negra de Europa"
 HUN_Black_Sheep_of_the_EU_desc: "La Unión Europea: un bastión de la democracia liberal y un intento de unificar a toda Europa bajo una sola bandera...\n\nEl pueblo húngaro, bajo el mando de Orbán, es miembro involuntario de esta comunidad \"unida\", y se opone a sus políticas seudocomunistas a cada paso. Por otra parte, Hungría recibe miles de millones de euros al año de la Unión Europea, lo que permite a nuestro Gobierno utilizar sus ingresos en otros ámbitos, como infraestructuras o para llenar los bolsillos de aliados políticos."
 HUN_Black_sheep_turned_White: "Una oveja negra convertida en blanca"
 HUN_The_European_Leech: "La sanguijuela europea"
 HUN_Hungary_First_Immigration_Laws: "Hungría primero"
 HUN_Hungary_First_Immigration_Laws_desc: "A través de un coctel de políticas económicas nacionalistas y duros estándares migratorios, Orbán ha promovido la mentalidad \"Hungría primero\" entre nuestro pueblo. Esta mentalidad ha alejado a muchos en busca de refugio de nuestra patria, y ha resultado en un aumento del orgullo nacional, pero también de los partidos de ultraderecha."

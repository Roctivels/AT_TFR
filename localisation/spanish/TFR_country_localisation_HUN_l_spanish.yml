 Hungary.12.t: "La elección"
 Hungary.12.d: "Con nuestra victoria sobre Europa, y nuestra nación asegurada, el pueblo húngaro puede hacer lo que ha esperado casi un siglo: Coronar un Rey.\nEl Regente, obligado ante el pueblo a no fallarle como hizo Horthy, ha presentado al Consejo de Regencia las mejores opciones para el trono húngaro."

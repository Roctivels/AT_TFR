 SER_policy_of_pragmatism: "Política pragmática"
 SER_policy_of_pragmatism_desc: "El desastre que se desató tras las guerras yugoslavas dejó a Serbia aislada, devastada y marginada internacionalmente tras la violenta presidencia de Milošević. Yugoslavia, como entidad, dejó de existir en 2006 con la secesión de Montenegro y Serbia, y sin nadie a quien recurrir excepto Rusia y los sucesores de la Unión Soviética, Serbia quedó abandonada a su suerte. Hasta que la realidad del estancamiento de Rusia empezó a resonar entre muchos políticos, Serbia comenzó a abrir sus lazos con la OTAN y la UE, para gran disgusto de la antigua élite serbia. La situación emergente de Serbia en el escenario internacional era un estado de pragmatismo oportunista: enfrentaba a la UE con China en materia de inversiones, mientras participaba en la Iniciativa Franja y Ruta, fomentaba lazos más estrechos con Rusia y se esforzaba activamente por unirse a la UE para abrir la economía. Si bien es improbable que se una a la OTAN pronto, dado que la disputa de Kosovo sigue sin resolverse, Serbia ha aprovechado al máximo su posición como Estado no alineado en Europa, y la brecha entre los partidos prooccidentales y los orientales parece no hacer más que crecer. Solo el tiempo decidirá qué bando del mundo se impondrá a Belgrado."
 SER_rebellion_of_kosovo: "Rebelión de Kosovo"
 SER_rebellion_of_kosovo_desc: "Tras el colapso de Yugoslavia, se manifestó una pesadilla que cualquier nacionalista serbio se negaría a creer; los albaneses de la provincia de Kosovo se rebelaron al disolverse la República Federal, capturando a los serbios étnicos en su violento secesionismo mientras los imperialistas de la OTAN bombardeaban Belgrado en su apoyo. Se construyó un etnoestado albanés sobre los cimientos de nuestra orgullosa historia, presentándose como un insulto al pueblo serbio y a su nación ilegítima. Mientras en Pristina ondee la maldita bandera azul marino, la legitimidad de Serbia y su orgullo como potencia regional estarán en juego para siempre. §RRecuperaremos Kosovo, cueste lo que cueste.§!"
 SER_contentious_2017_election: "Contentious 2017 Election"
 SER_contentious_2017_election_desc: "The 2017 election has been described by many of our people as anything but legitimate. Aleksandar Vučić's unexpected presidential bid was marred with alleged corruption perpetrated by Serbia's societal elites and the clamping down on press freedom through legal and smear campaigns, alongside Vučić's push to increase the constitutional powers of his previously mostly-ceremonial position as president - all of which a stark contrast to his campaign promises to combat against the very things he is alleged of doing. The international community has begun their barrage of our descent into supposed authoritarianism, and it seems as if it will only get worse in the coming years."
 SER_emerging_economy: "Economía emergente"
 SER_emerging_economy_desc: "Aunque las luchas de las últimas décadas han marcado nuestra historia, el pueblo serbio ha logrado persistir y trabajar arduamente para reconstruir su nación. Con la introducción de una nueva economía de mercado en crecimiento, Serbia se ha visto inundada de inversiones internacionales, tanto de empresas líderes occidentales como de compañías de gas rusas como GAZPROM, que han establecido sus propias sucursales en nuestro fértil suelo. Sin embargo, a pesar de este progreso, Serbia no se ha recuperado del todo de su colapso como gran potencia europea, y la huella de la corrupción en nuestra sociedad y economía no ha desaparecido por completo con la llegada del capitalismo. Solo las reformas judiciales y una mayor transparencia evitarán que los cleptócratas se aprovechen de nuestro arduo trabajo."

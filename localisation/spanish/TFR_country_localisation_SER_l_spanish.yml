 news.287.t: "Socialistas toman control de Serbia"
 news.287.d: "Las recientes elecciones anticipadas en Serbia han causado gran conmoción, ya que el contrincante Aleksandar Vulin y el Movimiento de los Socialistas se han alzado con la victoria y han consolidado un importante poder político en el país. La reciente agitación política y social que sacude Europa y América, junto con las graves convulsiones internas de los últimos meses, ha impulsado a los votantes serbios hacia candidatos y partidos que prometen orden y estabilidad. Vulin y sus socialistas han pedido un gobierno que garantice el orden, la seguridad y una vida digna para la población, algo que ha generado un gran interés entre los votantes serbios. Curiosamente, Vulin ha apelado a la yugonostalgia, a la presidencia de Slobodan Milosevic e incluso al deseo de una futura reunificación de Yugoslavia, lo que ha resultado popular entre los votantes de mayor edad. Aprovechando el descontento popular y los llamamientos al orden, Vulin y el Movimiento de los Socialistas han consolidado un dominio indiscutible dentro del gobierno serbio. Además de consolidar su dominio absoluto dentro del Estado, Vulin y sus correligionarios socialistas han iniciado acciones para, como ha declarado su gabinete, \"preparar una futura Serbia y Yugoslavia socialistas\". Diversos Estados vecinos de los Balcanes ya han condenado la admiración pública de Vulin por Milosevic y sus deseos de reunificación yugoslava, calificándolos de \"irrealistas\" y \"peligrosos\". Sin embargo, el gobierno de Vulin parece impasible, ya que muchos se preparan para el futuro choque entre una nación socialista que desea revivir el pasado y otras naciones que prefieren mantenerse alejadas de tales realidades."
 news.287.a: "La nostalgia es muy poderosa."
 news.288.t: "Vucic se consolida en Serbia"
 news.288.d: "Las recientes elecciones anticipadas en Serbia han causado gran conmoción, ya que el actual presidente, Aleksandar Vucic, y el Partido Progresista Serbio se han asegurado una victoria y han consolidado un importante poder político en el país. La reciente agitación política y social que sacude Europa y América, junto con las graves convulsiones internas de los últimos meses, han impulsado a los votantes serbios hacia candidatos y partidos que prometen orden y estabilidad. Vucic y el partido dominante, el SNS, han aprovechado con éxito estos sentimientos, apelando en sus campañas con promesas de paz, orden, estabilidad y una sensación de seguridad. Esta estrategia electoral, de eficacia probada, ha llevado una vez más a Vucic y a su partido a un éxito rotundo tras estas elecciones. Con su nuevo dominio dentro del gobierno serbio, Vucic y sus colegas también han impulsado nuevas leyes y regulaciones de seguridad nacional que reprimen a ciertos partidos políticos y grupos activistas. Vucic cita estos nuevos cambios como un paso necesario para Serbia en un mundo dominado por el extremismo, la violencia y la guerra. Numerosas ONG prooccidentales y activistas de la oposición ya han denunciado la reciente victoria y otras acciones del nuevo gobierno, calificándolas de autocráticas e ilegales. Hasta el momento, estos reclamos han sido ignorados, ya que el gobierno aún pretende impulsar sus nuevas reformas políticas y de seguridad. Parece que la paz y la estabilidad han regresado a Serbia."
 news.288.a: "Serbia moderna para tiempos modernos."
 news.289.t: "Asciende la ultraderecha en Serbia"
 news.289.d: "Mientras el resto de Europa lucha por contener a los nuevos partidos y candidatos políticos radicales, Serbia asiste al resurgimiento de algo bastante familiar: el nacionalismo de ultraderecha. Bajo el liderazgo de Vojislav Seselj, el Partido Radical Serbio y otros grupos nacionalistas han cosechado un éxito rotundo en las elecciones nacionales y han obtenido el apoyo de la población. Apelando a la ira y la frustración por la humillación sufrida por Serbia durante los años 90, muchos serbios le están brindando su apoyo anticipando que tales agravios nacionales serán vengados. Los enormes avances y la posterior toma de poder dentro del Gobierno serbio por parte de Seselj y otros nacionalistas han provocado diversas reacciones positivas por parte de los serbios y respuestas negativas por parte de quienes no lo son. Muchos países vecinos y ONG liberales condenan a Seselj, su partido y otros grupos nacionalistas aliados, calificándolos de \"genocidas\", \"autocráticos\" y de \"amenazar la estabilidad de los Balcanes\". A pesar de las críticas, parece que los nacionalistas serbios están dispuestos a reencontrar al país con sus vecinos, ya que hablar de \"recuperar los territorios perdidos\" es cada vez más frecuente en el Gobierno. El tiempo dirá si la guerra vuelve a asediar el \"polvorín de Europa\"."
 news.289.a: "Lucha por restaurar la gloria de la nación."

 egypt.2.t: "Egipto se moviliza contra Etiopía"
 egypt.2.d: ""
 egypt.2.a: "La guerra es inminente."
 egypt.3.t: "Egipto convoca sus reservas"
 egypt.3.d: "Tras meses de tensión entre Egipto y Etiopía por la construcción de la Presa de la Resistencia en Guba, parece que Egipto se prepara para la peor opción. En los meses previos a la movilización, la construcción de la Presa de la Resistencia provocó una escasez generalizada de agua en Egipto, generando inestabilidad que obligó a Egipto a actuar. Tras el fracaso de la Segunda Conferencia sobre la Presa, Etiopía respondió firmando el Pacto del Lago Victoria, una alianza de defensa mutua entre Egipto y la Federación de África Oriental. Hoy mismo, Egipto ha convocado a decenas de miles de reservistas a su fuerza militar activa, mientras que más de cien mil soldados egipcios se han trasladado a la frontera.\n\nAdemás de esta masiva movilización militar, Egipto también ha creado su propia alianza militar con quienes han sufrido debido a la construcción de la presa, así como con sus antiguos aliados en la zona. Mientras los dos titanes de África se enfrentan en el desierto, parece que la más mínima chispa puede encender las arenas del desierto."
 egypt.3.a: "Preocupante."
 egypt.7.t: "Tercera guerra africana"
 egypt.7.d: ""
 egypt.7.a: "¡Juntos saldremos victoriosos!"

 EGY_ethiopia_war_desc: "Nuestra gente está hambrienta, nuestra gente se está muriendo, esos bastardos están dejando morir a miles de nuestros niños todos todos los días. Nuestra nación está al límite, protestas engullen a nuestras principales ciudades, los islamistas aprovechándose de los débiles. Tenemos nuestros objetivos al igual que nuestros aliados en el sur. Jartum y Adís Abeba deben caer para que nuestra victoria sea absoluta.\n\nOBJETICOS PRIMARIOS:\n\n§YJARTUM§! está : [Root.get_khartoum_status]\n§YADÍS ABEBA§! está : [TDF.get_addis_ababa_status]\n\nOBJETICOS SECUNDARIOS :\n§YSUDÁN§! :\n\n§YOMDURMÁN§!\n§YPUERTO SUDÁN§!\n§YEL OBEID§!\n§YETIOPÍA§! :\n\n§YMEKELLE§!\n§YGONDAR§!\n§YADAMA§!"

 egypt.14.t: "¡Hospital bombardeado en el Cairo!"
 egypt.14.d: "se ha confirmado la muerte de 80 civiles tras que un coche bomba ha detonado junto a un hospital en el Cairo. [...] El Estado Islámico se ha atribuido el ataque y ha prometido que le seguirán más ataques."
 egypt.14.a: "¡Dios, ayúdanos!"

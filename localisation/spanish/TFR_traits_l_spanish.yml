 trait_GMA_Left_Anarchist: "Lealista de van Deusen"
 trait_GMA_Left_Anarchist_desc: "Intensamente leal a los ideales del Colectivo Anarquista de Green Mountain, este general es leal al mariscal de campo David van Deusen, y seguirá cada orden que él dé, incluso si le cuesta la vida."
 trait_GMA_Right_Anarchist: "Free Stater"
 trait_GMA_Right_Anarchist_desc: "Devoto del libertarianismo estadounidense, el término \"Free Stater\" surgió como un apodo para los libertarios en Nuevo Hampshire, debido al \"Free State Project\", donde miles de libertarios se mudaron a Nuevo Hampshire para crear el primer estado gobernado por el Partido Libertario. Este general es leal al liderazgo de los Hijos de la Libertad."
 trait_GMA_Environmentalist: "Ambientalistas"
 trait_GMA_Environmentalist_desc: "Devotos de la protección de la Tierra, los ambientalistas son un grupo diverso de individuos con una variedad de ideologías y teorías diferentes. Los ideales de estas personas van desde el anarcoprimitivismo hasta el ecofascismo, y están dispuestos a morir para garantizar la seguridad del planeta."
 trait_GMA_PMC: "Partidario de empresas militares privadas"
 trait_GMA_PMC_desc: "Devoto del dinero y solo del dinero, el complejo militar-industrial de los EE.UU. de antaño ha producido muchas excelentes empresas militares privadas. Este general es leal a la idea de una dictadura militar privada."
 trait_GMA_Feminist: "Feminista espiritual"
 trait_GMA_Feminist_desc: "Compartiendo un objetivo religioso y social común de destruir el patriarcado y traer al mundo una nueva religión de igualdad y feminidad, este general es leal a Miriam Simos y su Unión Espiritualista."

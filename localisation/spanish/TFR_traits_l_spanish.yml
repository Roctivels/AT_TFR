 mad_dog: "Perro Rabioso"
 mad_dog_desc: "§LEl General James Norman Mattis del Cuerpo de Marines de los Estados Unidos se ha ganado el apodo de \"Perro Rabioso\" ('Mad Dog') tanto por sus excepcionales servicios al Cuerpo de Marines y a las Fuerzas Armadas de EE.UU. en general, como por su conocida actitud de bocazas y tipo duro retórico cuando está lejos del frente, generando más de una controversia en el camino. Sus partidarios, tanto militares como civiles, lo adoran, mientras que sus críticos lo ven como un comandante potencialmente irracional e impredecible. Pero, seamos realistas: nadie puede detener al \"Perro Rabioso\".§!"

 trait_PRC_august_1st_medal: "Medalla del 1 de Agosto"
 trait_PRC_august_1st_medal_desc: "§LEste general fue galardonado con la §tMedalla del 1 de Agosto§!.\n\nEste es el más alto honor militar que se otorga actualmente a los soldados en China. Reconoce a los miembros del servicio que han hecho contribuciones sobresalientes a la salvaguarda de la soberanía nacional y los intereses de desarrollo, así como a la promoción de la modernización de las fuerzas armadas.§!"
 trait_PRC_red_flag_medal: "Medalla de la Bandera Roja"
 trait_PRC_red_flag_medal_desc: "§LEste general fue galardonado con la §tMedalla de la Bandera Roja§!.\n\nEsta medalla de guerra se otorga a los oficiales al mando de todos los niveles que han cumplido fielmente las tareas que les han encomendado el Partido y el pueblo, y han hecho contribuciones significativas para lograr la victoria.§!"
 trait_PRC_red_star_medal: "Medalla de la Estrella Roja"
 trait_PRC_red_star_medal_desc: "§LEste general fue galardonado con la §tMedalla Estrella Roja§!.\n\nEsta medalla de guerra se otorga a combatientes y personal de apoyo que han ejecutado órdenes con valentía y resolución durante operaciones militares, demostrando un heroísmo extraordinario y logrando hazañas notables.§!"
 trait_PRC_tiger_tally: "Hǔfú"
 trait_PRC_tiger_tally_desc: "§LEste general fue galardonado con el §YHǔfú§!.\n\nOriginario de un antiguo símbolo militar chino, el hǔfú era un contrato de dos partes utilizado por emperadores y comandantes militares para autorizar el despliegue de tropas. Simbolizaba la unidad entre el Gobierno central y sus generales.§!"
 trait_PRC_goldfish_pouch: "Bolsa del Pez Dorado"
 trait_PRC_goldfish_pouch_desc: "§LEste general fue galardonado con la §YBolsa del Pez Dorado§!.\n\nCon raíces en la antigua burocracia china, los altos funcionarios y generales llevaban una bolsa de pez para significar su estatus. La Bolsa del Pez Dorado era un símbolo raro reservado solo para los individuos más estimados como parte del círculo íntimo del emperador.§!"
 trait_PRC_iron_certificate: "Certificado de Hierro"
 trait_PRC_iron_certificate_desc: "§LEste general fue galardonado con el §YCertificado de Hierro§!.\n\nEste fue un sistema de recompensa especial en la antigua China, un certificado privilegiado otorgado por los emperadores a los ministros leales. Poseer un Certificado de Hierro era una señal de reconocimiento imperial, que otorgaba a la familia del poseedor una exención de la pena capital.§!"
 trait_SOV_derzhavnik_commander: "Comandante derzhavnik"
 trait_SOV_derzhavnik_commander_desc: "§LEste comandante es un lealista derzhavnik, nombrado para supervisar el ejército y mantenerlo a raya.§!"
 trait_zealous_nationalist: "Nacionalista fanático"
 trait_zealous_nationalist_desc: "§LEste comandante es un nacionalista ardiente de su patria, e inspira a los soldados a hacer lo imposible y luchar hasta su último aliento.§!"

 norway.3.t: "Haakon se dirige al Parlamento"
 norway.3.d: ""
 norway.3.a: "\"Noruega debe abrazar sus tradiciones, y resistir a la horda en camino...\""
 norway.3.b: "\"Debemos unirnos como un pueblo, independientemente de las creencias políticas...\""
 norway.3.c: "\"Debemos recordarnos a nosotros mismos que debemos ser humildes y estar calmados calmados en la tormenta que se avecina...\""
 norway.4.t: "El Key Harald V fallece"
 norway.4.d: "El Rey Harald V de Noruega, el venerado monarca que sirvió al país por décadas, ha fallecido. El anuncio fue hecho hoy por el Palacio Real Noruego, sacudiendo a toda la nación y más allá.\n\nHarald V ascendió al trono el 17 de enero de 1991 y ha sido un símbolo de estabilidad y continuidad durante su reinado. El nació el 21 de febrero de 1937 y era un miembro destacado de la casa de Glücksburg. El comunicado oficial del Palacio Real no ha revelado la causa de la muerte, respetando la privacidad de la familia real durante este difícil momento. Las noticias han provocado una oleada de dolor en los ciudadanos, líderes políticos y dignatarios alrededor del mundo, afirmando que \"Noruega ha perdido un gran líder y una figura unificadora. La dedicación de Harald V a su pueblo y su compromiso inquebrantable con el bienestar del país serán recordados por las generaciones venideras\".\n\nMientras que Noruega llora la muerte de su amado Rey, el mundo se une para dar tributos a un líder que dedicó su vida al servicio de su país."
 norway.4.a: "El amor del pueblo es mi fuerza..."
 norway.5.t: "El guiño del Rey"
 norway.5.d: "La Alianza apoyada por Equinor vence en una reñida carrera, el Rey Haakon VII ha dado su aprobación al gobierno"
 norway.5.a: "Radical."

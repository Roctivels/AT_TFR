 tank_armor_upgrade:0 "Blindaje"
 tank_armor_upgrade_desc:0 "Un blindaje mejor del que pueden atravesar nuestros rivales es una gran ventaja para nuestras divisiones, pero seguramente nos retrasarán."
 tank_gun_upgrade:0 "Cañón principal"
 tank_gun_upgrade_desc:0 "Es importante tener un cañón que se mantenga al día del blindaje enemigo y pueda perforarlo."
 tank_aa_upgrade:0 "Armamento antiaéreo"
 tank_aa_upgrade_desc:0 "Garantiza que nuestro armamento antiaéreo es capaz de derribar los aviones más recientes."
 tank_at_upgrade:0 "Armamento antitanque"
 tank_at_upgrade_desc:0 "Centrarse en asegurarse que nuestros cazacarros pueden derrotar los tanques enemigos más recientes."
 tank_art_upgrade:0 "Armamento de artillería"
 tank_art_upgrade_desc:1 "Asegúrate de que nuestra artillería autopropulsada cuente con una gran potencia de fuego para atravesar a los enemigos sin blindaje."
 tank_reliability_upgrade:0 "Fiabilidad"
 tank_reliability_upgrade_desc:1 "Mejorar la fiabilidad hará que el equipo se rompa menos y no haya que sustituirlo."
 mech_cost_upgrade:0 "Costo de producción"
 mech_cost_upgrade_desc:0 "Al optimizar el diseño y sustituir materiales de menor importancia, el vehículo se construye antes, pero adolece de algunos defectos más."
 tank_engine_upgrade:0 "Motor"
 tank_engine_upgrade_desc:0 "Más movilidad da ventajas tácticas y estratégicas, además de permitir mayor blindaje sin ralentizarlo de modo significativo."
 ac_engine_upgrade:0 "Motor"
 ac_engine_upgrade_desc:0 "Más movilidad da ventajas tácticas y estratégicas, además de permitir mayor blindaje sin ralentizarlo de modo significativo."
 ship_gun_upgrade:0 "Arma"
 ship_gun_upgrade_desc:0 "Es importante tener un cañón que se mantenga al día del blindaje enemigo y pueda perforarlo."
 ship_torpedo_upgrade:0 "Torpedo"
 ship_torpedo_upgrade_desc:0 "Un torpedo es una poderosa arma de lanzamiento de buques pequeños una vez al alcance, con una gran posibilidad de impactos críticos."
 ship_armor_upgrade:0 "Blindaje"
 ship_armor_upgrade_desc:0 "Más blindaje para proteger tu buque contra el fuego enemigo."
 carrier_armor_upgrade:0 "Blindaje"
 carrier_armor_upgrade_desc:0 "Más blindaje para proteger tu buque contra el fuego enemigo."
 ship_engine_upgrade:0 "Motor"
 ship_engine_upgrade_desc:0 "Un buque con un motor más potente puede controlar la distancia hasta sus adversarios en combate."
 ship_reliability_upgrade:0 "Fiabilidad"
 ship_reliability_upgrade_desc:0 "Un buque con alta fiabilidad será menos dado a impactos críticos que pueden causar daños masivos a buques sin una construcción bien planeada."
 ship_anti_air_upgrade:0 "Antiaéreo"
 ship_anti_air_upgrade_desc:0 "¡Más cañones disparando plomo al aire, más aviones enemigos derribados!"
 ship_ASW_upgrade:0 "ASB"
 ship_ASW_upgrade_desc:0 "El armamento antisubmarino es importante para localizar y eliminar submarinos."
 destroyer_engine_upgrade:0 "Motor"
 destroyer_engine_upgrade_desc:0 "Un buque con un motor más potente puede controlar la distancia hasta sus adversarios en combate."
 sub_engine_upgrade:0 "Motor"
 sub_engine_upgrade_desc:0 "Un buque con un motor más potente puede controlar la distancia hasta sus adversarios en combate."
 sub_stealth_upgrade:0 "Sigilo"
 sub_stealth_upgrade_desc:0 "La mayor fortaleza del submarino es su habilidad no ser detectado y atacar solo cuando tiene ventaja."
 sub_torpedo_upgrade:0 "Torpedo"
 sub_torpedo_upgrade_desc:0 "Un torpedo es una poderosa arma de lanzamiento de buques pequeños una vez al alcance, con una gran posibilidad de impactos críticos."
 ship_deckspace_upgrade:0 "Espacio de cubierta"
 ship_deckspace_upgrade_desc:0 "Más espacio para llevar y lanzar aviones capaces de operar en portaaviones."
 plane_gun_upgrade:0 "Armamento"
 plane_gun_upgrade_desc:0 "Mejores armas para luchar contra otros aviones."
 cv_plane_gun_upgrade:0 "Armamento"
 cv_plane_gun_upgrade_desc:0 "Mejores armas para luchar contra otros aviones."
 plane_engine_upgrade:0 "Motor"

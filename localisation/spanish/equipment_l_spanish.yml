 amphibious_mechanized_equipment:0 "Vehículos de desembarco anfibio"
 amphibious_mechanized_equipment_short:0 "Amtracs"
 amphibious_mechanized_equipment_desc:0 "Los tractores anfibios, también llamados Amtracs, permiten a los marines desembarcar en una playa con protección blindada. No obstante, esto conlleva una eficacia de combustible pobre."
 amphibious_mechanized_equipment_1:0 "Tractor anfibio básico"
 amphibious_mechanized_equipment_1_short:0 "Amtrac básico"
 amphibious_mechanized_equipment_1_desc:0 "Los tractores anfibios, también llamados Amtracs, permiten a los marines desembarcar en una playa con protección blindada. No obstante, esto conlleva una eficacia de combustible pobre."
 amphibious_mechanized_equipment_2:0 "Tractor anfibio mejorado"
 amphibious_mechanized_equipment_2_short:0 "Amtrac mejorado"
 amphibious_mechanized_equipment_2_desc:0 "Estos Amtracs presentan varias mejoras con respecto a la versión básica, como una rampa de carga trasera que facilita los desembarcos en la playa."
 amphibious_tank_equipment:0 "Tanques anfibios"
 amphibious_tank_equipment_short:0 "Tanques anfibios"
 amphibious_tank_equipment_1:0 "Tanque anfibio básico"
 amphibious_tank_equipment_2:0 "Tanque anfibio mejorado"
 amphibious_tank_equipment_desc:0 "Se trata de tanques modificados para desplazarse por el agua. Son mucho más efectivos en desembarcos anfibios y cruces de ríos que otros tanques, pero consumen más combustible."
 amphibious_tank_equipment_1_desc:0 "Se trata básicamente de un tanque ligero modificado para flotar. Este vehículo ofrece fuego de apoyo a las unidades que conforman una cabeza de playa."
 amphibious_tank_equipment_2_desc:0 "Un tanque mediano modificado para desplazarse por el agua. Su mayor versatilidad y movilidad conlleva una menor eficacia de combustible."

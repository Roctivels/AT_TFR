l_spanish:
 submarine:0 "Submarino"
 submarine_desc:0 "Los submarinos emplean sigilo y torpedos potentes para destruir los buques enemigos."
 both_cruisers_desc:0 "Crucero ligero - Un buque de defensa ligero. Su deber primario es proteger los buques capitales de buques ligeros enemigos, pero también puede lanzar poderosos torpedos que pueden dañar buques mayores.\n\nCrucero pesado - Un gran crucero acorazado que es bastante flexible. Una buena opción para las naciones que no pueden permitirse el lujo de construir buques principales mayores."
 light_cruiser:1 "Crucero ligero"
 light_cruiser_desc:0 "Un buque protector ligero. Su deber primario es proteger los buques capitales de buques ligeros enemigos, pero también puede lanzar poderosos torpedos que pueden dañar buques mayores."
 heavy_cruiser:1 "Crucero pesado"
 heavy_cruiser_desc:0 "Un gran crucero blindado que es bastante flexible. Una buena opción para las naciones que no pueden permitirse el lujo de construir buques capitales mayores."
 destroyer:0 "Destructor"
 destroyer_desc:0 "El buque pantalla más ligero. Su función es defender a buques más grandes y buscar y destruir submarinos."
 ship_hull_light:1 "Casco ligero"
 ship_hull_light_desc:0 "El buque pantalla más ligero. Su función es defender a buques más grandes y buscar y destruir submarinos."
 carrier:0 "Portaaviones"
 carrier_desc:0 "Un buque capital capaz de llevar escuadrillas de poderosas aeronaves de portaaviones a la batalla. También es útil como un aeródromo flotante que puedes posicionar frente a la costa de tu enemigo."
 battleship:0 "Acorazado"
 battleship_desc:0 "El mayor buque capital principal con los mayores cañones y el blindaje más fuerte que se puede comprar. Una inversión tan cara merece el apoyo apropiado de buques de defensa más pequeños."
 armor_desc:0 "El blindaje más grande y fuerte que puede comprarse con dinero."
 battle_cruiser:0 "Crucero de batalla"
 battle_cruiser_desc:0 "Un gran buque capital a menudo con capacidades ofensivas cercanas a las de un acorazado, pero con mayor velocidad a costa de un blindaje reducido."
 convoy:0 "Convoy"
 convoy_desc:0 "Convoyes utilizados para el comercio internacional de bienes y recursos. También se usan para transportar tropas y realizar invasiones navales."
 sh_battleship:0 "Acorazado superpesado"
 sh_battleship_desc:0 "El mayor buque capital principal con los mayores cañones y el blindaje más fuerte que se puede comprar. Una inversión tan cara merece el apoyo apropiado de buques de defensa más pequeños."
 light_airframe:0 "Fuselaje ligero"
 light_airframe_desc:0 "Aviones de fuselaje ligero"
 medium_airframe:0 "Fuselaje medio"
 medium_airframe_desc:0 "Aviones de fuselaje medio"
 heavy_airframe:0 "Fuselaje pesado"
 heavy_airframe_desc:0 "Aviones de fuselaje pesado"
 jet_engines:0 "Motor a reacción"
 JET_ENGINES_SPECIAL:0 "El desarrollo de motores de reacción es un requisito previo esencial para el desarrollo de aviones a reacción. Esto debe ser investigado antes de poder investigar aviones avanzados."
 jet_engines_desc:0 "Un gran avance en tecnología de propulsión, el motor de reacción permitirá el desarrollo de una generación totalmente nueva de aviones."
 convoy_1:0 "Convoy"
 armored_car_equipment:0 "Vehículo blindado"
 armored_car_equipment_desc:0 "Vehículos blindados ligeros con ruedas. Habituales para el reconocimiento y la supresión de la resistencia, pero se les pueden colocar armas más pesadas."
 motorized_equipment:1 "Camión"
 motorized_equipment_desc:1 "Camiones usados para transportar tropas y suministros, y para motorizar la división."
 motorized_equipment_0: "Camión temprano"
 motorized_equipment_0_desc:1 "Durante la Gran Guerra, los ejércitos empezaron a usar camiones civiles básicos para transportar suministros y equipos. Desde entonces, se han convertido en una parte integral de la mayoría de los ejércitos."
 motorized_equipment_1:1 "Camión"
 motorized_equipment_1_desc:0 "Motorizar la infantería es la primera etapa hacia la mecanización de un ejército. Los camiones civiles son fácilmente adaptables a los usos militares del transporte de soldados, remolque de armas y transporte de equipo y suministros. Esto aumenta enormemente la movilidad estratégica de unidades de infantería, que de lo contrario tendrían que recurrir a la marcha."
 support_equipment_short:0 "Eq. Apoyo"
 support_equipment:0 "Equipo de apoyo"
 support_equipment_desc:0 "Radios, Jeeps, pontones y otros equipos utilizados para apoyar a las tropas."

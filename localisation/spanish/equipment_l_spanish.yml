 train_equipment:0 "Tren"
 train_equipment_desc:0 "Los trenes transportan suministros desde la capital de suministros a los centros de suministros conectados por ferrocarril."
 train_equipment_1:0 "Tren civil"
 train_equipment_1_desc:0 "Este tren, tomado de la flota civil por el ejército, está capacitado para trasladar una gran cantidad de suministros a largas distancias. Sin embargo, su construcción civil lo hace vulnerable."
 train_equipment_2:0 "Tren de austeridad de guerra"
 train_equipment_2_desc:0 "Un diseño simplificado que omite muchas de las funciones que suelen encontrarse en los trenes de la flota regular, con el fin de abaratar los costes de producción. Sigue siendo tan vulnerable como un tren normal, pero se puede reemplazar más fácilmente."
 train_equipment_3:0 "Tren blindado"
 train_equipment_3_desc:0 "Un tren protegido por un blindaje pesado que lo hace mucho menos vulnerable a los ataques del enemigo. Puede llevar más cargamento que otros diseños, pero es más caro de producir."
 railway_gun_equipment:0 "Artillería ferroviaria"
 railway_gun_equipment_desc:0 "Cañón pesado montado en un vagón para su transporte."
 railway_gun_desc:0 "El ferrocarril nos da la oportunidad de trasladar cañones pesados al interior a una velocidad razonable para bombardear posiciones enemigas a gran distancia y con mucho efecto."
 railway_gun_equipment_1:0 "Cañón ferroviario"
 floating_harbor_equipment:0 "Puerto flotante"
 floating_harbor_equipment_desc:1 "Una serie de pontones y estructuras prefabricadas de hormigón que se pueden mover sobre el agua y montar en cuestión de horas para crear un espacio de aterrizaje refugiado para descargar suministros."
 floating_harbor_equipment_1:0 "Puerto flotante"
 floating_harbor_equipment_1_desc:1 "Una serie de pontones y estructuras prefabricadas de hormigón que se pueden mover sobre el agua y montar en cuestión de horas para crear un espacio de aterrizaje refugiado para descargar suministros."

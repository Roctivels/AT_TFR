 korea.3.t: "Acuerdo de Vladivostok"
 korea.3.d: ""
 korea.3.a: "Paz, por fin."
 korea.4.t: "Acuerdos de Hanoi"
 korea.4.d: "La segunda guerra de Corea, que comenzó en 2025, ha llegado a su fin, sin que ni Corea del Norte ni Corea del Sur hayan podido obtener una ventaja significativa en el campo de batalla. El conflicto, que estalló después de que las fuerzas surcoreanas cruzaran el paralelo 38 tras la muerte de Kim Jong Un, ha causado miles de bajas y ha atraído la atención de la comunidad internacional con la intervención tanto de la OTDP como de IDEA. A pesar de los primeros éxitos de las fuerzas surcoreanas, incluida la toma de varias ciudades fronterizas como Haeju y Pyongsan, las fuerzas surcoreanas se vieron rápidamente empantanadas en el terreno montañoso del Norte y lo que se esperaba que fuera una campaña rápida se convirtió en meses de estancamiento. Un año después del final de la guerra, IDEA, la OTDP y ambas Coreas han mediado para poner fin al conflicto y lograr una resolución que ponga a Corea bajo un Gobierno unido: la República Popular de Corea, que toma su nombre del efímero Gobierno provisional de 1945. Por primera vez en la historia, se celebrarán elecciones libres y nacionales en toda la península, con observadores internacionales. Tanto los políticos de Corea del Norte como los de Corea del Sur se presentarán a las elecciones, mientras el nuevo Gobierno de Unidad Nacional intenta curar las heridas causadas por 70 años de separación."
 korea.4.a: "Reunificación \"pacífica\"."
 korea.6.t: "Reunificación de Corea"
 korea.6.d: "En un asombroso giro de los acontecimientos, Corea del Norte ha salido victoriosa de una segunda guerra de Corea, aplastando a las fuerzas surcoreanas y japonesas y erigiéndose en único gobernante de la península coreana.\n\nEl conflicto comenzó a mediados de 2025, cuando las tensiones entre las dos Coreas llegaron a un punto de ebullición. Tras la muerte de Kim Jong-Un y la guerra civil norcoreana, las tropas surcoreanas cruzaron el Paralelo 38 esperando una rápida victoria, pero se encontraron con una fuerte resistencia.\n\nA pesar de contar con un ejército superior tanto en número como en tecnología, así como con el respaldo de las Fuerzas de Autodefensa japonesas, la ayuda china convirtió rápidamente al KPA en una fuerza militar moderna capaz de contraatacar. Utilizando una combinación de tácticas de guerrilla, guerra cibernética y pura fuerza de voluntad, las fuerzas combinadas del EPL y el KPA repelieron a los voluntarios de la OTDP desde Pionyang y cruzaron al sur, rodeando y aplastando a muchos regimientos de la OTDP.\n\nLas consecuencias del conflicto aún no están claras, pero se espera que la RPDC utilice su nuevo poder para ejercer un control aún mayor sobre su población y continuar con su agresiva política exterior. La OTDP, por su parte, se enfrentará probablemente a una crisis de confianza al lidiar con la pérdida de uno de sus aliados clave en la región."
 korea.6.a: "Inesperado."
 korea.7.t: "Reunificación de Corea"
 korea.7.d: "SEÚL, Corea del Sur (AP) - En una sorprendente victoria para el pueblo coreano, la República de Corea ha salido triunfante de la segunda guerra de Corea contra su vecino del norte, Corea del Norte. El conflicto, que comenzó en 2025, supuso el despliegue de decenas de miles de soldados, así como el uso de tecnología militar avanzada por ambas partes.\n\nLa victoria llegó tras meses de intensos combates, en los que ambos bandos sufrieron grandes pérdidas. El ejército norcoreano, considerado durante mucho tiempo un tigre de papel, se vio superado por la superioridad tecnológica y táctica del ejército surcoreano, así como por el apoyo de sus aliados.\n\nLas tensiones entre las dos Coreas llegaron a un punto de ruptura tras la muerte de Kim Jong Un y la avalancha de miles de refugiados a través de la frontera surcoreana, mientras el Norte se sumía en la anarquía. Aprovechando su oportunidad de reunificar el país, las Fuerzas Armadas de la República de Corea cruzaron el Paralelo 38 hacia el Norte por primera vez en más de 70 años.\n\nA medida que la guerra se prolongaba, ambos bandos sufrieron importantes pérdidas. Las fuerzas norcoreanas, que dependían en gran medida de tecnología militar anticuada, no pudieron igualar la potencia de fuego del ejército surcoreano y sus aliados. Por su parte, el ejército surcoreano utilizó sistemas de armamento y tácticas avanzadas, como drones y ciberataques, para imponerse."
 korea.7.a: "Dos hermanos divididos durante mucho tiempo, ahora están unidos"
 korea.8.t: "Corea se une a IDEA"
 korea.8.d: "Corea se ha unido oficialmente a la Iniciativa de Defensa del Este Asiático, una alianza militar liderada por China, lo que suscita inquietud sobre la alineación en materia de seguridad del país con sus aliados liberales de siempre en la región. El recién elegido presidente Sim Sang-jung, un activista surcoreano de izquierdas por los derechos laborales, anunció la decisión en una retransmisión televisiva ante la nación recién unida.\n\nTras el final de la segunda guerra de Corea, que concluyó con un alto el fuego entre el Norte y el Sur que dio lugar a la recién creada República Popular de Corea, se anunciaba un nuevo capítulo para la península. Aunque muchos esperaban que ganara el Partido Democrático de Corea, el sentimiento antijaponés dominó las elecciones después de que se hicieran públicos los informes sobre las atrocidades cometidas por la OTDP. La menor confianza en las instituciones liberales, tras décadas de frustración económica entre la clase baja surcoreana, y los deseos del Norte de preservar elementos de su sistema socialista llevaron finalmente al Partido Socialdemócrata de Corea, de izquierdas, a ocupar una posición de poder.\n\n\"IDEA es una importante iniciativa que contribuirá a la paz y la estabilidad regionales\", declaró Sim en un comunicado. \"La participación de Corea del Sur mejorará nuestras capacidades de defensa y estrechará nuestros lazos con China y otros países miembros\"."
 korea.8.a: "Sorprendente"
 korea.9.t: "Corea se une a la OTDP"
 korea.9.d: "En un hecho histórico, la República Popular de Corea se ha unido oficialmente a la Organización del Tratado de Defensa del Pacífico, una alianza militar liderada por Japón cuyo objetivo es contrarrestar la creciente influencia de China en la región.\n\nLa decisión fue anunciada el martes por el presidente Yoon Suk-yeol, que la calificó de \"paso significativo\" para mejorar la seguridad del país y reforzar la estabilidad regional.\n\nLa Organización del Tratado de Defensa del Pacífico, también conocida como OTDP, fue creada en 2019 por Japón, que pretendía crear un marco de seguridad regional que reuniera a países afines para disuadir posibles amenazas de China. La organización también incluye a Australia y Nueva Zelanda.La decisión de Corea de unirse a la OTDP se produce en medio de crecientes tensiones con China, que ha estado aumentando su influencia militar y económica en la región. La noticia llega en medio de la indignación nacional por los ciberataques chinos cometidos durante la segunda guerra de Corea, así como por las atrocidades cometidas por las tropas chinas durante su intervención en la guerra civil norcoreana.\n\n\"Creemos que la paz en la península coreana es esencial para la paz y la estabilidad regionales\", declaró Yoon. \"Seguiremos trabajando por ese objetivo, al tiempo que reforzamos nuestras capacidades de defensa mediante nuestra participación en la OTDP\"."
 korea.9.a: "La alianza antichina se extiende"

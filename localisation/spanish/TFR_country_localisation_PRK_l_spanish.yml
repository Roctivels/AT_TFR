 PRK_Total_Control_idea: "Control estatal total"
 PRK_Total_Control_idea_desc: "\n\n\n\n£GFX_PKR_Total_Control\n\n\n\n\n\nA lo largo de los años de existencia de la RPD de Corea, el PTC y la dinastía Kim han construido una sociedad perfectamente segura. La disidencia es rara, y la mayoría de los disidentes han optado por intentar huir en lugar de resistir.\n\nNuestra política de prioridad militar nos ha proporcionado una cantidad inflada de personal militar, lo que nos permite mantener patrullas constantes. El trabajo incesante de la maquinaria propagandística hace que cualquiera, sea soldado, oficial, obrero, limpiador o burócrata del Partido, no haya un minuto en el que dude de su patriotismo y amor por el Partido, el Querido Líder, el Ejército y el paraíso socialista en el que tiene la suerte de vivir y estar protegido de los EE.UU. y sus títeres imperialistas.\n\nEl culto a la personalidad de Kim es uno de los más enormes jamás creados, con una cantidad abrumadora de la población que permanece leal, lista para trabajar, luchar y morir por nuestro Querido Camarada Líder. Quizás sean demasiado leales, y nadie sabe cuál sería el destino de la nación si §RKim muriera repentinamente...§!"

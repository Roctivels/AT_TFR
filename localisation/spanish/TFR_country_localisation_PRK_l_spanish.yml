 nk.1.t: "Kim Jong-un ingresa en el hospital para someterse a una intervención quirúrgica"
 nk.1.d: "A primera hora de la mañana, el querido líder fue ingresado en el hospital."
 nk.1.a: "Oremos por el querido líder."
 nk.2.t: "¡El querido líder está muerto!"
 nk.2.d: "Es un día negro. Nuestro querido líder ha fallecido tras su operación. A pesar de los esfuerzos de varios cirujanos, no pudieron restablecer el latido de su corazón. Se ha declarado un periodo de luto de 10 días y pronto se transmitirá la terrible noticia a la nación."
 nk.2.a: "¿Quién tomará las riendas?"
 nk.3.t: "Choe Ryong-hae toma el poder"
 nk.3.d: "Cho Ryong Hae ha tomado el poder de facto antes de que el partido pudiera organizar un congreso de emergencia. Afirmando que el poder de emergencia es necesario para evitar cualquier toma de poder. Afirma que dirigirá obedientemente al pueblo coreano en estos difíciles momentos hasta que se encuentre un verdadero sucesor."
 nk.3.a: "Historia probable..."
 nk.4.t: "Protestas del Gabinete"
 nk.4.d: "Tras la repentina declaración de poder de Cho Ryong Hae, el partido organizó un congreso de emergencia en el que muchos miembros del gabinete expresaron su descontento con el liderazgo de Cho. Afirmaron que había dado un golpe de Estado suave y que estaba tomando otras medidas junto con las fuerzas armadas para asegurarse el poder total. El resto del partido estaba indeciso sobre quién debía tomar el poder. Se barajaron los nombres de muchos políticos y se hicieron contrapropuestas sobre su viabilidad."

 PRK_politburo_of_wpk_desc: "El PTC es el núcleo y destacamento de vanguardia de la clase obrera y demás masas trabajadoras sólidamente unidas organizativa e ideológicamente con Kim Il Sung y Kim Jong Il como sus eternos dirigentes y con el respetado camarada Kim Jong Un en su centro.\nEl PTC representa los intereses de la nación y el pueblo coreanos. Es la organización de dirección política y el Estado Mayor de la revolución que orienta de manera unificada los campos político, económico, militar, cultural y todos los demás.\n\nNuestra §YAutosuficiencia económica§! : [?PRK_economic_sovereignty_level_var|1%].\n\nLa actual §tInfluencia china§!: [?Chinese_Influence|-1%].\n\nNuestra §GPreparación militar§!: [?PRK_military_preparedness_level_var|1%]\n\n"

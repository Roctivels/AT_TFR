 states.84.t: "Incautación del arsenal de la Guardia Nacional"
 states.84.d: "Esta mañana temprano, 4 de nuestras camionetas se acercaron a uno de los arsenales de la Guardia Nacional cerca de la línea del frente. La seguridad del perímetro fue neutralizada utilizando armas de fuego suprimidas. El guardia principal de la puerta murió en el acto, seguido poco después por sus compañeros.\n\nLos sistemas de vigilancia fueron parcialmente desactivados poco después de que nuestros hombres irrumpieran. Las comunicaciones por radio fueron interferidas o cortadas antes de que pudiera enviarse una señal de socorro completa.\n\nA partir de ahí, se encontraron pocas resistencias. Extrajimos cajas de armas de fuego de grado militar, chalecos antibalas y municiones. El botín estimado incluye más de 100 carabinas M4 y una gran cantidad de artefactos explosivos.\n\nAntes de que nuestros hombres se marcharan, sustituimos todas las banderas de la zona por las nuestras. Por supuesto, esto fue principalmente para demostrar nuestra victoria, pero nos pareció necesario de todos modos.\n\nLa operación duró unos 30 minutos. Nuestros convoyes huyeron del lugar antes de que pudiera movilizarse la respuesta local o federal. Pero teniendo en cuenta los peligros presentes en todo el frente, no esperamos mucho de una investigación federal."
 states.84.a: "Estas armas serán de buena utilidad"
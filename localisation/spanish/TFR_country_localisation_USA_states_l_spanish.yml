 states.59.t: "Milicias de ultraderecha formadas en Virginia"
 states.59.d: "\n\n\n                  £GFX_FBI_event_texticon   \n\n\n\n\nEstimado Sr. Presidente:\n\nHemos tenido conocimiento de que, tras la importante manifestación por la Segunda Enmienda en Richmond, han surgido múltiples milicias de ultraderecha a raíz de las protestas nacionales. Hemos descubierto varias organizaciones más pequeñas que han estado realizando entrenamientos en los Apalaches. Estas milicias podrían representar una amenaza para la seguridad nacional en el futuro. La observación debe continuar.\n\nAtentamente,"
 states.59.a: "Director del Buró Federal de Investigaciones, Chris Wray."
 states.60.t: "Posibles incidentes de bandera falsa"
 states.60.d: "\n\n\n                  £GFX_FBI_event_texticon \n\n\n\n\nEstimado Sr. Presidente,\n\nHemos descubierto que ciertos grupos han aumentado potencialmente la gravedad de muchos de los disturbios. Por ejemplo, dejando montones de ladrillos, botellas, piedras y otros objetos que los manifestantes lanzan a los agentes. Estos objetos se colocan convenientemente en zonas donde se reúnen decenas de manifestantes. En las redes sociales se ha afirmado en numerosas ocasiones que estos montones de objetos fueron colocados por individuos enmascarados. Nuestros hallazgos en línea pueden sugerir que estos objetos no están simplemente mal colocados.\n\nRespetuosamente,"
 states.61.t: "Reemerge la División Atomwaffen"
 states.61.d: "\n\n\n                  £GFX_FBI_event_texticon   \n\n\n\n\nEstimado Sr. Presidente:\n\nEl pasado mes de marzo, el destacado neonazi James Mason afirmó haber ordenado a sus seguidores de la División Atomwaffen que se disolvieran. Aunque muchos en la comunidad de inteligencia lo consideraron una estratagema para evitar cargos de terrorismo, se acogió como una esperanzadora oportunidad de que la situación se calmara.\n\nDesafortunadamente, no es así. Las conversaciones en línea, así como los informantes dentro del movimiento, sugieren que muchos antiguos miembros de las Atomwaffen siguen trabajando en la clandestinidad. Ya sea operando bajo nuevos nombres como \"la Orden Nacionalsocialista\" o simplemente permaneciendo anónimos, no han cambiado su forma de actuar. El breve lapso de escrutinio por parte del FBI les ha dado la oportunidad de seguir acumulando armas y suministros, así como de formular planes lejos de miradas indiscretas. Los agentes federales los vigilan de nuevo con lupa, aunque a algunos les preocupa lo que puedan haber pasado por alto.\n\nAtentamente,"
 states.62.t: "Milicias de ultraizquierda formadas en la Costa Oeste"
 states.62.d: "\n\n\n                  £GFX_FBI_event_texticon   \n\n\n\n\nEstimado Sr. Presidente:\n\nInformantes han recopilado información fidedigna sobre la creación de múltiples milicias marxista-leninistas y anarquistas en los estados de California y Oregón. Se cree que Gloria la Riva, del Partido por el Socialismo y la Liberación, es la posible organizadora de estas milicias. Miembros del PSL se han manifestado en Sacramento, Berkeley, San Francisco y Monterey. Cada vez más personas armadas se han presentado en cada protesta consecutiva. El PSL publica en redes sociales que su membresía está en aumento, y algunos miembros han mostrado su entrenamiento con armas. También se han realizado eventos de entrenamiento masivo en lugares no revelados. Estos eventos reúnen a varias decenas de personas. La policía estatal de California ha marcado a estos grupos como un riesgo potencial para la seguridad nacional. El paradero de Gloria La Riva se desconoce desde hace varios meses.\n\nAtentamente,"

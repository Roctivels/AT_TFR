 jap.44.t: "Reorganización gubernamental"
 jap.44.d: "Para evitar el estancamiento y que las telarañas de la historia se formen en nuestro gobierno, hemos tomado la iniciativa de reorganizar los puestos del gabinete. El centésimo gabinete será uno con mentes renovadas y un espíritu vigorizado, dispuesto a dar un paso más por el pueblo japonés. La recepción pública ha sido positiva.\n\nCon el cambio de rumbo de nuestra política hacia algo más dinámico, nos aguardan grandes cosas."
 jap.44.a: "Bien."
 jap.45.t: "Disolución de la Coalición Civil"
 jap.45.d: "Tras muchos conflictos políticos, la coalición civil se disolvió. Debido a las excesivas luchas internas y a la escasa atención prestada a su rival común, el PLD, este partido opositor ha aprovechado sus disputas internas.\n\nFinalmente, varias figuras clave expresaron públicamente su desdén hacia sus demás miembros, anunciando su separación de la coalición para trazar su propio camino en el panorama político japonés. Sin embargo, con el gigante que es el PLD, sus carreras parecen infructuosas.\n\nEn cualquier caso, esto ha garantizado el dominio continuo del PLD sobre Japón, no por tiranía, sino por la absoluta incompetencia de sus rivales."
 jap.45.a: "Nunca interrumpas a tu enemigo mientras se está equivocando."
 jap.46.t: "Pacto de no agresión con Japón"
 jap.46.d: "Japón quiere concluir un pacto de no agresión. Sería una tontería rechazar esta oportunidad."
 jap.46.a: "Aceptamos."
 jap.47.t: "Legado de la Lucha de Anpo"
 jap.47.d: "No respetamos a los americanos."
 jap.47.a: "Genial."
 jap.48.t: "América dividida"
 jap.48.d: "La situación actual de nuestro Gobierno se asemeja a una jugada crucial en el final del shogi, donde ambos bandos están a punto de realizar una jugada crucial. Una vez acorralado el rey, cualquier paso en falso podría desencadenar una serie de ataques decisivos del enemigo.\n\nApoyar al Gobierno Constitucional liderado por Trump parece ser la opción natural para continuar con las políticas vigentes. Sin embargo, aunque el Gobierno constitucional cuenta con el apoyo de los estados agrícolas y de la mayoría de los conservadores, se encuentra en desventaja en los sectores industrial y tecnológico. Esta opción puede compararse con una postura defensiva aparentemente estable, pero en última instancia débil, en el shogi.\n\nPor otro lado, respaldar al Gobierno de Biden, con sede en Washington D.C., se asemeja a una brillante jugada táctica en el shogi: aparentemente arriesgada, pero estratégicamente enfocada en el panorama general. El Gobierno de Biden controla el centro político de Estados Unidos, las principales industrias tecnológicas y la mayoría de las instituciones financieras, todas ellas cruciales para mantener la influencia global de Estados Unidos. Si bien pueden enfrentar riesgos a corto plazo, a largo plazo pueden ayudarnos a asegurar una mayor influencia diplomática.\n\nSin embargo, independientemente de la decisión, actuar prematuramente podría generar reacciones negativas, mientras que retrasar la acción podría llevar a perder oportunidades estratégicas. El momento oportuno de nuestras acciones determinará en última instancia el éxito o el fracaso de esta estrategia."
 jap.48.a: "Apoyaremos a la Unión."
 jap.48.b: "Apoyaremos al Gobierno Constitucional."
 jap.49.t: "Japón nos apoya"
 jap.49.d: ""
 jap.49.a: "Genial."
 jap.50.t: "Japón nos envía armamentos"
 jap.50.d: "El Ministerio de Defensa informa que el Gobierno japonés ha comenzado a suministrar armamento defensivo a nuestro lado, incluyendo sistemas de defensa aérea y equipos de guerra electrónica. El primer lote de materiales llegó hoy al puerto designado.\n\nLos líderes militares expresaron su gran satisfacción con estos equipos, afirmando que, con ellos, podemos mejorar aún más nuestras capacidades de combate."
 jap.50.a: "Muy bien."
 jap.51.t: "Japón nos envía dinero"
 jap.51.d: "El Ministerio de Economía informa que el Gobierno japonés ha proporcionado varios fondos de ayuda a través de canales oficiales. Estos fondos se utilizarán para la reconstrucción de nuestra infraestructura y para garantizar el bienestar de nuestros ciudadanos.\n\nEl Ministerio de Economía expresó su gran satisfacción, afirmando que con estos fondos se podrá impulsar considerablemente nuestro desarrollo económico."
 jap.51.a: "Muy bien."
 jap.52.t: "Japón nos envía tropas"
 jap.52.d: "El Ministerio de Defensa informa que un grupo de asesoramiento técnico compuesto por miembros retirados de las Fuerzas de Autodefensa de Japón ha llegado a nuestro país. Este grupo de voluntarios, compuesto por varios cientos de personas, nos ayudará en el entrenamiento militar y la orientación técnica."
 jap.52.a: "Muy bien."
 jap.52.b: "Muy bien."
 jap.53.t: "Japón promete defendernos"
 jap.53.d: "El Ministerio de Asuntos Exteriores informa que el primer ministro japonés anunció oficialmente hoy, en una conferencia de prensa conjunta, un compromiso de protección de la seguridad para nuestro país.\n\nAdemás, los medios locales japoneses han confirmado que esta declaración cuenta con el apoyo del gabinete y el Parlamento japoneses."
 jap.53.a: "Muy bien."

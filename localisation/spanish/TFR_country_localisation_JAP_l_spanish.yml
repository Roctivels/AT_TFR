 JAP_go_back_time: "§YCambiar el pasado§!"
 JAP_go_back_time_desc: "¿Estás viendo esto? El mundo se ha sumido en el caos, ¡como si alguien hubiera sobrescrito el código de la realidad con manos sucias! Guerras, crisis, colapsos... todo empezó con un pequeño virus que distorsionó el tejido mismo del tiempo. Pero pregúntale a cualquiera: \"¿Por qué?\". Se encogerán de hombros. \"Destino\", murmurarán. ¿El destino? No. ¡Es un fallo en los algoritmos del destino!\n\nEn algún lugar de los laboratorios subterráneos de Tokio, un reloj de cuenta atrás está en marcha. Nuestros científicos han descifrado las ecuaciones cuánticas y han encontrado el punto de singularidad: 2019. Allí, en la niebla de los días olvidados, se encuentra el paciente cero. El que puso en marcha las fichas de dominó de la catástrofe. Construiremos un puente sobre el eje temporal, reescribiremos el código de la pandemia... ¡y borraremos esta pesadilla de la memoria del universo!\n\nPero sepan esto: El tiempo no es arcilla. Un movimiento en falso, y en vez de un arreglo, tendremos un colapso. ¿Están listos para convertirse en los hackers de la historia? ¿Cargar un antivirus al pasado? ¿Reiniciar un mundo donde el petróleo sea sólo un recurso, no un arma, donde las mascarillas permanezcan en los quirófanos, no en las calles?\n\nEnciende los resonadores de crono-campo. Fijar las coordenadas. Hoy no somos científicos: somos cirujanos del tiempo. Y nuestro bisturí es una vacuna contra la locura."

 JAP_rearmament_changed_recently: "Rearmamento cambiado recientemente"
 jap.1.t: "Primer caso de COVID-19 confirmado"
 jap.1.d: "Japón confirmó su primer caso de neumonía causada por un nuevo coronavirus procedente de China, según informó el Ministerio de Salud el jueves.\n\nUn ciudadano chino de unos 30 años residente en la prefectura de Kanagawa dio positivo por el virus, según el Ministerio. Regresó de Wuhan el 6 de enero y fue hospitalizado el 10 de enero, pero ya se recuperó y recibió el alta el miércoles."
 jap.1.a: "Oh no..."
 jap.2.t: "Se retrasan las Olimpiadas de 2020"
 jap.2.d: "Ante el aumento diario del número de personas infectadas por COVID-19, el Comité Olímpico Internacional y el Gobierno japonés han debatido las medidas más adecuadas. Ante el riesgo de que los Juegos Olímpicos se conviertan en un foco de enfermedades que podría poner en riesgo de contagio a atletas, turistas y ciudadanos japoneses, ambas partes han anunciado el aplazamiento de los Juegos Olímpicos hasta que la tasa de contagios alcance un mínimo histórico.\n\nEsta noticia ha generado decepción mundial, ya que el Gobierno japonés ha prometido hacer todo lo posible para garantizar que el COVID-19 deje de ser una amenaza."
 jap.2.a: "La antorcha pasará."
 jap.3.t: "Inician los Juegos de la XXXII Olimpiada"
 jap.3.d: "La pandemia de COVID-19 se ha extendido y, a medida que aumenta el número de infectados, también ha surgido la creciente duda sobre si es prudente permitir o no la celebración de los Juegos Olímpicos.\n\nEl Gobierno japonés y el Comité Olímpico Internacional han mantenido un largo debate al respecto y han decidido no retrasarlos. A pesar de las crecientes críticas a esta decisión por parte de varios expertos en salud y otras naciones, tanto el comité como Japón han asegurado que garantizarán que la salud siga siendo la máxima prioridad.\n\nCon esta decisión, los Juegos Olímpicos están listos para comenzar, ya que atletas de todo el mundo están listos para competir entre sí, con las medidas sanitarias tomadas al máximo. Solo el tiempo dirá si esto no provocará un brote importante."
 jap.3.a: "No hay de qué preocuparse, disfruten."
 jap.4.t: "La cuestión de las Olimpiadas"
 jap.4.d: "Todos pueden percibir que la paz duradera no durará para siempre. Nuestros amigos estadounidenses están librando sus propios conflictos internos que pueden intensificarse en cualquier momento, y China observa sus reclamos con ojos hambrientos.\n\nCon el aumento de las tensiones a nivel mundial, surge una nueva pregunta al asumir la responsabilidad de organizar los Juegos Olímpicos. Por supuesto, podemos simplemente organizarlos y esperar fomentar el espíritu deportivo entre la gente del mundo, pero persiste el riesgo de que esto añada más leña al fuego. Por no hablar del COVID-19, un virus que nos ha afectado durante bastante tiempo, separando familias y obligándonos a aislarnos. Con tanta gente en una ciudad, es posible que se produzca un evento de superpropagación.\n\nTambién podemos cancelarlo, dado el riesgo para la seguridad y la salud; quizá sea mejor no incentivar más la agresión política de nuestros rivales.\n\nFinalmente, se tomó la decisión:"
 jap.4.a: "A pesar de los riesgos, se celebrarán."
 jap.4.b: "Se retrasarán las Olimpiadas."
 jap.5.t: "Formación de la OTDP"
 jap.5.d: "La Organización del Tratado de Defensa del Pacífico (OTPD) se ha formado ante el aumento de las tensiones con una China irredentista. Está formada por dos naciones fundadoras: la Mancomunidad de Australia y el Estado de Japón."
 jap.5.a: "¡Debemos defender a Taiwán!"
 jap.6.t: "El último destello"
 jap.6.d: "Lo inimaginable ha ocurrido: uno de nuestros mayores aliados ha caído en un estado de conflicto interno. Vecinos contra vecinos, padres contra hijos; un continente entero sumido en la violencia.\n\nCon cada evento caótico, los buitres comienzan a sobrevolarnos y, con la pérdida de nuestros buenos amigos estadounidenses, somos conscientes de que los chinos ahora miran a Taiwán con ojos hambrientos, considerando la guerra civil como una excelente oportunidad para finalizar su prolongado conflicto.\n\nAsia inevitablemente también enfrentará la guerra; a pesar de nuestras dificultades, no podemos abandonar a Taiwán.\n\nNo estamos solos; con nuestros aliados restantes, enfrentaremos al dragón."
 jap.6.a: "Esperemos lo peor."
 jap.7.t: "El país del Sol Naciente"
 jap.7.d: "Desde el final de la Segunda Guerra Mundial, Japón ha atravesado tiempos turbulentos, pero con sus aliados en todo el mundo y su disposición a adaptarse, ha logrado no solo sobrevivir, sino también prosperar.\n\nLa década pasada no fue muy favorable para nosotros: el envejecimiento de la población y un ejército limitado son solo algunos de los problemas que siguen siendo una viga en nuestros ojos.\n\nCon la renuncia de Shinzo Abe próxima, la tormenta que se cierne sobre el resto de Asia y las crecientes tensiones entre nuestros aliados en Occidente, solo el tiempo dirá qué nos depararán estos nuevos tiempos turbulentos. Se necesita una mente clara y un espíritu fuerte para asegurarnos de no quedar relegados a la sombra."
 jap.7.a: "Hay mucho que hacer."
 jap.8.t: "La guerra de Taiwán"
 jap.8.d: "La Segunda Guerra Civil Americana ha reestructurado sin duda el panorama geopolítico de Asia Oriental, y para Japón, el desafío más inmediato y apremiante es la amenaza de una invasión china de Taiwán. Como nodo crucial en la primera cadena de islas, Taiwán reviste una enorme importancia estratégica. Si cae, no solo se verá afectado el sistema de defensa de la primera cadena de islas, sino que Japón quedará directamente expuesto a la amenaza militar china, lo que provocará un colapso del equilibrio de poder en toda la región Asia-Pacífico.\n\nPara el Gobierno japonés, la caída de Taiwán no solo representaría una pérdida significativa para el bando democrático, sino que también colocaría a Japón en una posición estratégicamente pasiva. Si China controlara Taiwán, obtendría una posición estratégica vital, lo que permitiría a sus fuerzas navales adentrarse más en el Pacífico, amenazando directamente el sustento marítimo de Japón.\n\nPor lo tanto, la única opción de Japón es intervenir en el conflicto de Taiwán y ayudar a Taiwán a resistir la invasión china."
 jap.8.a: "¡Venceremos!"
 jap.9.t: "¡Victoria!"
 jap.9.d: "Tras semanas de dura batalla y con la pérdida de numerosos, China se ha retirado de Taiwán.\n\nCon nuestros esfuerzos conjuntos, hemos salvaguardado con éxito la isla de la agresión china, humillando sus años de propaganda y amenazas.\n\nMientras regresan con dificultad a sus hogares, reconstruiremos y expresaremos nuestra gratitud a nuestros aliados por su tan necesaria ayuda. Mientras lloramos a quienes perdimos y nos regocijamos en la gloria de la victoria, comenzamos a comprender que esta podría no ser la última vez que veamos la agresión china.\n\nVolverán, pero ahora estaremos preparados."
 jap.9.a: "¡Gurēto!"
 jap.10.t: "Derrota vergonzosa"
 jap.10.d: "El fuego del dragón fue demasiado para nosotros. Tras meses de dura guerra, la bandera roja de la República Popular ondea sobre Taipéi, un escenario que ninguno de nosotros deseaba imaginar.\n\nCon nuestras heridas supurando y nuestros aliados consternados, nuestra gente en casa está furiosa por las vidas desperdiciadas, las viudas lloran y los huérfanos nunca volverán a casa. Tal humillación será un gran peso para nuestras almas, un peso que podría destrozar el civismo de nuestra nación.\n\nYa hay grupos que expresan su ira y frustración contra el Gobierno. [JAP_ldp_reelection_loc]\n\nCon esta derrota, Japón nunca volverá a ser el mismo."
 jap.10.a: "¡Owarida!"
 jap.11.t: "Ucrania reconoce las islas Kuriles como japonesas"
 jap.11.d: "La Rada Suprema de Ucrania adoptó una resolución sobre el reconocimiento de las Islas Kuriles del Sur como \"territorio de Japón ocupado por Rusia\", según la información publicada en el sitio web del parlamento.\n\n\"La Rada Suprema de Ucrania declara su apoyo a la postura de Japón respecto a sus Territorios del Norte; reconoce que estos territorios continúan bajo la ocupación de la Federación de Rusia\", afirma el texto del documento. En el mismo texto, Kiev instó a la comunidad internacional a tomar todas las medidas posibles para formalizar legalmente el estatus de los Territorios del Norte de Japón\"."
 jap.11.a: "¿De veras?"
 jap.12.t: "Intruso en los Game Awards"
 jap.12.d: "Los Game Awards, a pesar de los cambios inesperados en la ubicación y el horario de la conferencia, sorprendieron a todos con una gran cantidad de anuncios, tráilers y premios. Sin embargo, el momento más inesperado y loco llegó al final de la exhibición: justo después de que se anunciara a Elden Ring como el \"Juego del Año\", un mensaje desde Taiwán resonó en el escenario.\n\n\"Oye, Motto. De verdad, quiero decir que para este premio quiero nominar a mi gente de Taiwán. ¡Mantengan a Taiwán libre!\", se escuchó este discurso justo después de que los desarrolladores de Elden Ring terminaran de hablar.\n\nSegún Geoff Keighley, el director ejecutivo y organizador del evento, el hombre fue detenido para que se pudiera continuar con el programa. Al parecer, no se le han presentado cargos."
 jap.12.a: "¡Mantengamos ese espíritu!"
 jap.13.t: "Shinzo Abe dimite"
 jap.13.d: "Shinzo Abe anunció el viernes su dimisión debido al deterioro de su salud. Los rumores sobre su estado de salud se intensificaron cuando visitó un hospital de Tokio por segunda vez en una semana el lunes. Abe padece colitis ulcerosa desde hace tiempo.\n\nSe tardará de dos a tres semanas en elegir al nuevo líder del partido. El ganador deberá ser elegido formalmente por votación parlamentaria y ocupará el cargo de primer ministro durante el resto del mandato de Abe, es decir, hasta septiembre de 2021."
 jap.13.a: "Descansa, patriota..."
 jap.14.t: "Yoshihide Suga es elegido primer ministro"
 jap.14.d: "Yoshihide Suga, líder del Partido Liberal Democrático de Japón, ha sido elegido nuevo jefe de Gobierno del país. Su candidatura contó con el apoyo de la mayoría de los diputados de la Cámara de Representantes. Un total de 314 de los 465 diputados votaron a favor del nuevo primer ministro."
 jap.14.a: "¿Es un digno heredero?"
 jap.15.t: "Elecciones de liderazgo del PLD"
 jap.15.d: "Las elecciones internas del PLD están en curso. Los miembros del partido se estrechan la mano y hacen promesas tranquilizadoras, solicitan favores y amplían sus círculos. Sin embargo, en este ámbito político, solo dos se han consolidado como figuras destacadas.\n\nEl primero es Fumio Kishida, un conocido centrista que mantiene cierta estabilidad en la política interna del PLD, apelando a miembros de ambos partidos y con la idea de la ahora denominada \"Nueva forma de capitalismo\", que busca aliviar las cargas de la clase media, haciéndoles la vida más justa y, a su vez, incentivando su contribución a la economía.\n\nEl otro, Taro Kono, considerado un liberal dentro y fuera del PLD, aspira a reevaluar las tres flechas de Shinzo Abe y a una ecologización de Japón, con el deseo de reducir la cantidad de centrales nucleares en favor de las energías renovables. Si bien es apreciado por la gente, el desprecio que siente una buena parte de los miembros del PLD por él es difícil de ignorar.\n\nSin embargo, los votos se cuentan, con los oídos abiertos el partido escucha los resultados."
 jap.15.a: "¡Fumio Kishida!"
 jap.15.b: "¡Tarō Kōno!"
 jap.16.t: "Se acercan las elecciones generales"
 jap.16.d: "Tras semanas de campaña, insultos y pequeños escándalos, las elecciones están a punto de alcanzar su punto álgido, con la oposición y el PLD dándolo todo para convencer al mayor número posible de votantes.\n\nAunque se prevé una baja participación electoral, todavía hay suficientes personas que salen a votar por su partido preferido. El PLD tiene experiencia, promesas de estabilidad y certidumbre, mientras que la oposición asegura un cambio, progreso y renovación adecuados. Con los acalorados debates llegando a su fin y los votos ya emitidos, en última instancia, será el pueblo quien decida quién saldrá victorioso."
 jap.16.a: "¡Es hora del cambio!"
 jap.16.b: "¡Mantengamos al país estable!"
 jap.17.t: "¡Victoria del PLD!"
 jap.17.d: "Para sorpresa de nadie, el dominio político del PLD se mantiene, ya que el recuento de votos lo ha declarado vencedor.\n\nLa respuesta a los resultados es diversa: algunos se muestran decepcionados, mientras que otros se alegran de que Japón se encuentre en una senda de seguridad y estabilidad. La coalición civil ya ha expresado su compromiso de expandirse y hacer campaña para las próximas elecciones."
 jap.17.a: "Los mismos de siempre."
 jap.18.t: "¡Victoria de la Coalición Civil!"
 jap.18.d: "Para sorpresa de todos, el dominio político del PLD se ha visto frenado. La coalición, compuesta por todo tipo de miembros de la oposición, se ha esforzado al máximo durante la campaña y sus esfuerzos han dado sus frutos.\n\nAunque hay reacciones encontradas, también hay mucho optimismo de cara al futuro: el estancamiento ha terminado y, con él, puede llegar lo nuevo."
 jap.18.a: "Esperemos que se mantengan unidos."
 jap.19.t: "Se forma la Coalición Civil"
 jap.19.d: "Era inevitable que el PLD se enfrentara a un oponente de peso en el gran escenario político. La coalición civil es un conjunto de miembros de la oposición que se han unido para frenar el férreo control que el PLD ejerce sobre el panorama político de Japón.\n\nAunque es muy joven y sus métodos son algo poco convencionales, la coalición civil ha logrado reunir suficiente apoyo como para convertirse en una amenaza creíble para el PLD. Con las elecciones a la vuelta de la esquina, esto podría marcar la diferencia."
 jap.19.a: "Amateurs."
 jap.20.t: "Liberación de Kinmen"
 jap.20.d: "Esta mañana, recibimos informes de primera línea que confirmaban que, tras una feroz ofensiva de nuestras fuerzas, finalmente hemos recuperado la isla de Kinmen. Aunque la guarnición del EPL nos infligió daños considerables utilizando sus fortificaciones defensivas, finalmente se vio superada por nuestra superioridad numérica. Las principales instalaciones militares y centros de mando de la isla están ahora bajo el control de las Fuerzas de Autodefensa.\n\nCon la isla de Kinmen, una posición estratégica clave, firmemente bajo nuestro control, las ciudades y las líneas de suministro chinas están al alcance de nuestra artillería. Ahora podemos ejercer presión sobre las rutas de suministro del EPL, lo que proporciona una ventaja a nuestras fuerzas en el frente."
 jap.20.a: "¡Banzai!"
 jap.21.t: "Fracasa la operación en Kinmen"
 jap.21.d: "Esta mañana, recibimos informes de primera línea que indicaban que, a pesar de nuestros esfuerzos por reforzar nuestra posición en la isla de Kinmen, incluyendo la solicitud de ataques aéreos y bombardeos de artillería para romper las defensas del EPL, todos los intentos habían fracasado.\n\nBajo los ataques sorpresa y las maniobras de flanqueo del EPL, nuestras fuerzas sufrieron numerosas bajas. Además, nuestros refuerzos y líneas de suministro fueron cortados por los ataques del EPL, impidiendo un mayor apoyo. La moral en el frente se deterioró y la escasez de municiones paralizó aún más a nuestras fuerzas. Tras el fracaso del asalto final, nos vimos obligados a retirarnos de la isla de Kinmen."
 jap.21.a: "Una vergüenza."
 jap.22.t: "Vietnam envía una contraoferta"
 jap.22.d: ""
 jap.22.a: "¡Debemos contener la agresión china!"
 jap.22.b: "Absolutamente no."
 jap.23.t: "Eligiendo al primer ministro"
 jap.23.d: "Al concluir las elecciones, se nos brinda la invaluable oportunidad de formar un nuevo gabinete. Esto marca un cambio profundo en el panorama político tradicional de Japón y la oportunidad de cumplir las promesas que la Coalición Civil hizo a nuestros ciudadanos.\n\nEl nuevo primer ministro será elegido entre los líderes que nos guiaron a la victoria, y para la Coalición Civil, ese líder es el honorable Yukio Edano. Nacido en una familia de clase trabajadora en Utsunomiya, prefectura de Tochigi, la determinación de Edano por emprender una carrera política surgió desde muy joven. Tras estudiar derecho, se postuló para la Cámara de Representantes como candidato del Nuevo Partido de Japón, iniciando así su desafiante pero distinguida trayectoria política.\n\nComo alternativa, la Coalición Civil podría elegir a una figura más radical del espectro político. Kazuo Shii, un político experimentado y líder del Partido Comunista Japonés durante muchos años, ha ocupado varios cargos clave, como secretario general, jefe del Comité Ejecutivo y presidente del PCJ. Tras décadas de lucha parlamentaria, Shii y el PCJ ven ahora un atisbo de esperanza para formar gobierno, lo que hace que la perspectiva del socialismo en Japón parezca inminente. Sin embargo, esto también podría provocar un malestar social generalizado, amenazando la estabilidad de la administración actual.\n\nEn definitiva, ha llegado el momento de decidir: ¿Quién liderará el nuevo gobierno de Japón antes de las próximas elecciones generales? ¿Quién asumirá la monumental tarea de desmantelar los restos del Partido Liberal Democrático y revitalizar las normas sociales?"
 jap.23.a: "Edano irá al Palacio Imperial, donde será nombrado por Su Majestad."
 jap.23.b: "Shii irá al Palacio Imperial, donde será nombrado por Su Majestad."
 jap.24.t: "Eligiendo al ministro de Asuntos Exteriores"
 jap.24.d: "Al concluir las elecciones, se nos brinda la invaluable oportunidad de formar un nuevo gabinete. Esto marca un cambio profundo en el panorama político tradicional de Japón y la oportunidad de cumplir las promesas que la Coalición Civil hizo a nuestros ciudadanos.\n\nEl recién nombrado ministro de Asuntos Exteriores representará un cambio en el panorama político de Japón. Dentro de la Coalición Civil, existen dos perspectivas distintas sobre el candidato para este cargo.\n\nPor un lado, la facción derechista del PDP apoya a Yuichiro Tamaki, exburócrata financiero. Tamaki aboga por fortalecer las alianzas de seguridad con países que comparten valores tradicionales e intereses mutuos, a la vez que adopta una línea dura hacia los competidores regionales en Asia Oriental.\n\nPor otro lado, la facción de izquierda, representada por el PCJ, nomina a Akira Kasai. Graduado de la Universidad de Tokio y defensor de la diplomacia pacífica, Kasai promete reducir las tensiones diplomáticas en Japón, fortalecer los lazos con los países vecinos y promover un frente unido en los asuntos regionales.\n\nA pesar de estas diferentes opiniones, ha llegado el momento de decidir: ¿quién guiará la política exterior de Japón en el período previo a las próximas elecciones generales y fortalecerá la posición global del país?"
 jap.24.a: "Nombraremos a Kasai."
 jap.24.b: "Nombraremos a Tamaki."
 jap.25.t: "Eligiendo al ministro de Economía"
 jap.25.d: "Al concluir las elecciones, se nos brinda la invaluable oportunidad de formar un nuevo gabinete. Esto marca un cambio profundo en el panorama político tradicional de Japón y la oportunidad de cumplir las promesas que la Coalición Civil hizo a nuestros ciudadanos.\n\nEl nuevo ministro de Economía, Comercio e Industria se enfrentará a un desafío abrumador, que requiere un proceso de selección cuidadoso y deliberado. Dentro de la Coalición Civil, las recomendaciones de candidatos son marcadamente diferentes.\n\nPor un lado, Mizuho Fukushima, líder del PSD, aboga por políticas centradas en los bienes de consumo, la seguridad alimentaria y la expansión de las iniciativas de bienestar social. Por otro lado, Ichiro Matsui, de Nippon Ishin no Kai, de Osaka, aporta un fuerte sabor local. Aunque criticado por su estilo autocrático, Matsui es elogiado por promover el mercantilismo en todo Japón.\n\nAdemás, la facción izquierdista de la Coalición Civil sugiere a Kazuo Shii, del PCJ, como candidato, convencido de que impulsará una transformación socialista de la economía y eliminará la influencia de las grandes corporaciones.\n\nEn última instancia, ha llegado el momento de decidir: ¿quién guiará la política económica de Japón antes de las próximas elecciones y garantizará su prosperidad continua?"
 jap.25.a: "Nombraremos a Fukushima."
 jap.25.b: "Shii mantendrá la posición."
 jap.25.c: "Nombraremos a Matusi."
 jap.26.t: "Eligiendo al ministro del Interior"
 jap.26.d: "Al concluir las elecciones, se nos brinda la invaluable oportunidad de formar un nuevo gabinete. Esto marca un cambio profundo en el panorama político tradicional de Japón y la oportunidad de cumplir las promesas que la Coalición Civil hizo a nuestros ciudadanos.\n\nEl ministro de Asuntos Internos y Comunicaciones desempeñará un papel clave en la configuración del sistema administrativo y las políticas de autonomía local de Japón. Dentro de la Coalición Civil, existen opiniones divergentes sobre quién debería ocupar este puesto crucial.\n\nLos moderados de la coalición apoyan a Kenta Izumi, del PCDJ, argumentando que representaría mejor los intereses del partido gobernante. Creen que Izumi podría impulsar políticas para reducir las disparidades de clase en Japón, promover valores humanistas e impulsar el desarrollo sostenible.\n\nEn contraste, las facciones más radicales han nominado a Mari Kushibuchi, del Reiwa Shinsengumi. Conocida por su enfoque populista, Kushibuchi aboga por una agenda diversa, que incluye la liberalización de la economía y la educación, así como la reevaluación de la postura de política exterior de Japón.\n\nAhora hay que tomar una decisión: ¿quién liderará la reforma administrativa de Japón y salvaguardará su democracia antes de las próximas elecciones generales?"
 jap.26.a: "Nombraremos a Kushibuchi."
 jap.26.b: "Nombraremos a Izumi."
 jap.27.t: "Eligiendo al ministro del Inteligencia"
 jap.27.d: "Al concluir las elecciones, se nos brinda la invaluable oportunidad de formar un nuevo gabinete. Esto marca un cambio profundo en el panorama político tradicional de Japón y la oportunidad de cumplir las promesas que la Coalición Civil hizo a nuestros ciudadanos.\n\nEl presidente de la Comisión Nacional de Seguridad Pública ejerce una influencia significativa en el Gabinete de Japón. Este cargo supervisa las agencias policiales del país y dirige las operaciones de seguridad e inteligencia. Como resultado, ha surgido una intensa competencia dentro de la Coalición Civil sobre quién debería ser nombrado para este puesto crucial.\n\nUno de los principales candidatos es Akira Nagatsuma, del PCDJ. Conocido por sus políticas moderadas, Nagatsuma es un burócrata experimentado con una sólida trayectoria en los Comités de Asuntos Exteriores y Seguridad de la Dieta. Aboga por un enfoque gradual pero firme para lidiar con los \"regímenes hostiles\".\n\nPor otro lado, Akira Koike, del PCJ, también es un contendiente. Como actual secretario general del PCJ y exmédico, Koike goza de gran prestigio dentro de su partido. Se expresa especialmente en temas como la libertad de internet y de prensa, y sus advertencias sobre que \"el anticomunismo conducirá a Japón de nuevo a la agresión\" han generado un amplio debate.\n\nHa llegado el momento de tomar una decisión: ¿quién garantizará la seguridad de Japón y mantendrá su preciada paz antes de las próximas elecciones?"
 jap.27.a: "Nombraremos a Koike."
 jap.27.b: "Nombraremos a Nagatsuma."
 jap.28.t: "Caída del PLD"
 jap.28.d: "La historia gira y, con la victoria de la coalición civil, se han destapado muchos de los trapos sucios que se habían enterrado sobre el PLD.\n\nEsto abarca desde casos ocultos de acoso, corrupción, vínculos con la Iglesia de la Unificación y el incumplimiento intencional de deberes. Con cada vez más noticias inundando los medios y con la victoriosa coalición civil aprovechándose de la situación,\n\nEsto ha provocado una disminución significativa de la influencia y el prestigio del PLD, con varias figuras clave bajo escrutinio y posibles arrestos, el futuro del PLD es sombrío."
 jap.28.a: "El Coloso derrotado."
 jap.29.t: "El presupuesto estatal"
 jap.29.d: "Los recientes debates de la coalición civil sobre el presupuesto estatal han puesto de relieve una cuestión crucial y polémica: ¿deberíamos priorizar a las personas o mejorar la economía?\n\nLos partidos de izquierda de la Coalición Civil defienden fervientemente la idea de \"priorizar a las personas\". Abogan por un aumento de la financiación para programas sociales, sanidad y educación, haciendo hincapié en la urgente necesidad de apoyar a las personas vulnerables.\n\nEn contraste, varios partidos de derecha de la coalición argumentan que una economía fuerte debe ser la prioridad. Argumentan que una economía próspera es la mejor manera de crear oportunidades para todos, lo que en última instancia beneficiará precisamente a quienes la izquierda busca apoyar."
 jap.29.a: "El pueblo primero."
 jap.29.b: "Ayudemos a la economía."
 jap.30.t: "La Coalición Civil se consolida en los socialistas"
 jap.30.d: "Tras la victoria electoral de la Coalición Cívica, algunos miembros del Partido Constitucional Democrático de Japón se dieron cuenta de que confiar únicamente en su propia fuerza no sería suficiente para consolidar su posición. Necesitaban formar alianzas con otros partidos de la oposición para obtener ventaja en el escenario político. Necesitaban formar alianzas con otros partidos de la oposición para obtener ventaja en el escenario político. Los partidos de izquierda en Japón cuentan con una amplia base popular y una sólida capacidad de organización y movilización. A pesar de las diferencias ideológicas entre el CDP y los partidos de izquierda, comparten puntos en común en ciertas cuestiones políticas, como el bienestar social y la protección del medio ambiente, lo que brinda una oportunidad para la cooperación.\n\nTras una serie de negociaciones y debates, el PCDJ, el Partido Comunista, el Reiwa Shinsengumi y el PSD llegaron a un consenso y decidieron establecer una alianza política. Esta decisión provocó inmediatamente una protesta pública. Los partidarios la consideraron un avance para la política democrática japonesa, mientras que la oposición fue igualmente contundente. Algunos temían que la influencia de los partidos de izquierda aumentara gradualmente y, en última instancia, representara una amenaza para el sistema democrático japonés. Otros cuestionaron si dos partidos con diferencias ideológicas tan significativas podrían cooperar realmente o si la alianza se convertiría en una especie de \"compañeros de cama extraños\".\n\n\"Esto es como un matrimonio político\", dijo un analista político anónimo. \"Ambas partes se han unido con sus propios objetivos, y está por verse si podrán mantener la alianza a largo plazo\"."
 jap.30.a: "Revolución en la boleta."
 jap.31.t: "La Coalición Civil se consolida en los liberales"
 jap.31.d: "Tras la victoria electoral de la Coalición Cívica, algunos miembros del Partido Constitucional Democrático de Japón se dieron cuenta de que confiar únicamente en su propia fuerza no sería suficiente para consolidar su posición. Necesitaban formar alianzas con otros partidos de la oposición para obtener ventaja en el escenario político. Actualmente, el PDCJ colabora activamente con el Partido de la Innovación, que representa a los reformistas y las políticas centristas, así como con el Partido Democrático para el Pueblo.\n\nEn una conferencia de prensa, el líder del PDCJ declaró que la cooperación con el PDCJ y el PDP se basa en ideales y objetivos políticos compartidos. Enfatizó que los tres partidos están comprometidos con la promoción de la reforma política en Japón, la mejora del bienestar ciudadano y la defensa de la justicia social y la equidad. También señaló que esta colaboración no es una mera alianza política, sino un medio para responder mejor a las expectativas del público y crear un futuro más prometedor para Japón.\n\nSin embargo, esta estrategia de \"abordar ambos lados\" ha generado considerable escepticismo y controversia. Algunos comentaristas argumentan que existen diferencias ideológicas entre el PDCJ, el Partido de la Innovación y el PDP, en particular en temas como la reforma constitucional y la política fiscal. Queda por ver si esta cooperación fragmentada logrará realmente la coordinación y la unidad política."
 jap.31.a: "Libertad al fin."
 jap.33.t: "El primer ministro de Japón es asesinado"
 jap.33.d: "¡Ostia puta!"
 jap.33.a: "¡Qué horror!"

 jap.65.a: "Era de esperarse."
 jap.66.t: "Invitación a la CEP"
 jap.66.d: "Reshili Gorshok s Knяzem novuю pesnю napisat., Gorshok govorit:\n\n-Davai vypem, tak poluchshe fantaziя razgulяetsя.\n\nNu nazhralis v sliuni kak obychno. Utrom prosypaiutsя, Knяz sprashivaiet Gorshka:\n\n-Nu chto, napisali my vchera pesniu?\n\n- Napisali.\n\n-A pro chto pesnя to?\n\n- Я doslovno ne pomniu, no sut v tom chto chiu-to babu snachala vsem selom yebali, a potom vsem selom sozhrali."
 jap.66.a: "SÍ."
 jap.67.t: "Reintroducir el servicio militar - ¿Cómo?"
 jap.67.d: "Las llamas de la guerra civil arden con tanta fuerza que parecen capaces de activar el Monte Fuji, consumiendo todo Japón en una hoguera infernal. A medida que las líneas de batalla se vuelven más complejas, la situación se vuelve cada vez más impredecible. Nuestras unidades del ejército regular están al límite de sus fuerzas, y necesitamos urgentemente tropas de refresco para reforzar nuestras reservas y las líneas del frente. La forma más rápida de lograrlo es reintroduciendo el servicio militar obligatorio.\n\nPor un lado, los beneficios del servicio militar obligatorio para fortalecer nuestro ejército son evidentes. Por otro lado, existen fuertes objeciones. Los críticos argumentan que años de paz han dejado a la mayoría de los ciudadanos -principalmente trabajadores y estudiantes- mal preparados para el combate. Incluso con un entrenamiento básico, enviarlos al frente probablemente resultaría en un alto número de bajas. Además, integrar un gran número de reclutas en unidades de servicio activo reduciría la eficacia general del combate, complicaría las estructuras de mando y aumentaría los desafíos logísticos, lo que, en última instancia, resultaría en más perjuicios que beneficios.\n\nEl gabinete está profundamente dividido sobre las regulaciones y resoluciones relativas al servicio militar obligatorio. Sin embargo, el tiempo apremia en tiempos de guerra. Si no podemos llegar a un consenso rápido, nuestros enemigos pueden aprovecharse de nuestra indecisión y obtener una ventaja crítica..."
 jap.67.a: "No nos pasemos..."
 jap.67.b: "¡La democracia está en juego!"

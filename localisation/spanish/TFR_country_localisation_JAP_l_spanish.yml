 TFR_ldp_nationalists_info_tooltip_name: "£GFX_ldp_nationalists_logo  §gNacionalistas§!"
 TFR_ldp_nationalists_info_tooltip: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n£GFX_JAP_ldp_nationalists_banner\n\n\n\n\n\n\n\n\n\nLos £GFX_ldp_nationalists_logo  §gnacionalistas§!, la mayoría de los cuales pertenecen a la facción Nippon Kaigi, son ardientes revanchistas que quieren fortalecer las tradiciones, reforzar nuestras Fuerzas de Autodefensa e introducir medidas más autoritarias en el Gobierno."
 TFR_ldp_conservatives_text: "Influencia £GFX_ldp_conservatives_logo  §4conservadora§!: §Y[?JAP_ldp_conservatives_var|1%]§!\n   £war_support_texticon  Apoyo bélico: [?JAP_ldp_party_war_support_factor|=+1%]\n   £pol_power  Ganancia diaria de poder político: [?JAP_ldp_party_political_power_gain|=+2]"
 TFR_ldp_conservatives_info_tooltip_name: "£GFX_ldp_conservatives_logo  §4Conservadores§!"
 TFR_ldp_conservatives_info_tooltip: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n£GFX_JAP_ldp_conservatives_banner\n\n\n\n\n\n\n\n\n\n[TFR_ldp_conservatives_info_tooltip_sc]"
 TFR_ldp_conservatives_info_tooltip_usual: "Los £GFX_ldp_conservatives_logo  §4conservadores§! incluyen facciones como Seiwa Seisaku Kenkyūkai, Shikōkai y Nippon Kaigi, que se centran en los valores conservadores, la seguridad nacional y el fortalecimiento del papel de Japón en el ámbito internacional."
 TFR_ldp_conservatives_info_tooltip_nationalists: "Los £GFX_ldp_conservatives_logo  §4conservadores§! incluyen facciones como Seiwa Seisaku Kenkyūkai y Shikōkai, que se centran en los valores conservadores, la seguridad nacional y el fortalecimiento del papel de Japón en el ámbito internacional."
 TFR_ldp_centrists_text: "Influencia £GFX_ldp_centrists_logo  §0centrista§!: §Y[?JAP_ldp_centrists_var|1%]§!\n   £stability_texticon  Estabilidad: [?JAP_ldp_party_stability_factor|=+1%]\n   £GFX_dx  Crecimiento mensual de ingresos: [?JAP_ldp_party_income_growth_factor|=+1%]"
 TFR_ldp_centrists_info_tooltip_name: "£GFX_ldp_centrists_logo  §0Centristas§!"
 TFR_ldp_centrists_info_tooltip: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n£GFX_JAP_ldp_centrists_banner\n\n\n\n\n\n\n\n\n\nLos £GFX_ldp_centrists_logo  §0centristas§! están representados por facciones como Kōchikai, Heisei Kenkyūkai y Shisuikai, que abogan por políticas moderadas, buscando un equilibrio entre la reforma económica y la estabilidad social."

 TFR_ldp_liberals_info_tooltip: "\n\n\n\n\n\n\n\n\n\n\n\n\n\n£GFX_JAP_ldp_liberals_banner\n\n\n\n\n\n\n\n\n\nLos £GFX_ldp_liberals_logo  §7liberales§!, que incluyen la facción Kinmirai Seiji Kenkyūkai y varios individuos del PLD, promueven ideas más progresistas sobre los derechos de las mujeres, la política social y las reformas laborales."

 JAP_calm_the_bureaucracy_desc: ""
 JAP_save_our_democracy: "¡Salvar nuestra democracia!"
 JAP_save_our_democracy_desc: ""
 JAP_use_everything: "Usarlo todo"
 JAP_use_everything_desc: ""
 JAP_return_conscription: "Reintroducir el servicio militar"
 JAP_return_conscription_desc: ""
 JAP_mobilize_zengakuren: "Movilizar al Zengakuren"
 JAP_mobilize_zengakuren_desc: ""
 JAP_negotiate_with_radicals: "Negociar con radicales"
 JAP_negotiate_with_radicals_desc: ""
 JAP_unite_the_people: "Unir al pueblo"
 JAP_unite_the_people_desc: ""
 JAP_restore_order: "Restaurando el orden"
 JAP_restore_order_desc: ""
 JAP_military_government: "Formación de un Gobierno militar"
 JAP_military_government_desc: ""
 JAP_mobilise_reserves: "Movilizar a los reservistas"
 JAP_mobilise_reserves_desc: ""
 JAP_kill_red: "¡Matad a la plaga roja!"
 JAP_kill_red_desc: "Kore ni shitagou tsuwamono wa\nTomo ni hyoukan kesshi no shi\nKijin ni hajinu yuuaru mo\nTen no yurusanu hangyaku wo."
 JAP_rigid_centralization: "Centralización rígida"
 JAP_rigid_centralization_desc: ""
 JAP_shake_up_people: "Agitar al pueblo"
 JAP_shake_up_people_desc: ""
 JAP_ldp_restoration: "Restaurar las posiciones del PLD"
 JAP_ldp_restoration_desc: ""
 JAP_destroy_devils_bureaucracy: "Destruir a los demonios de la burocracia"
 JAP_destroy_devils_bureaucracy_desc: ""
 JAP_operation_oni: "Operación: \"Eliminar a los oni\""
 JAP_operation_oni_desc: ""
 JAP_help_from_abroad: "Ayuda del extranjero"
 JAP_help_from_abroad_desc: ""
 JAP_kill_traitors: "Cazar a los traidores"
 JAP_kill_traitors_desc: ""
 JAP_patriot_coalition: "Coalición de patriotas"
 JAP_patriot_coalition_desc: ""
 JAP_second_war_in_greater_east_asia: "Segunda guerra en la Gran Asia Oriental"
 JAP_second_war_in_greater_east_asia_desc: "Paz. A veces es algo que apreciamos profundamente, y otras, es algo que desechamos voluntariamente sin pensarlo dos veces. Por segunda vez en una década, estamos en guerra con China, solo que esta vez, el conflicto ha alcanzado proporciones continentales. Esto es más que una guerra por la soberanía de Taiwán; es una guerra por la continuidad de las naciones libres en Asia Oriental."
 JAP_third_sino_japanese_war: "Tercera guerra sino-japonesa"
 JAP_third_sino_japanese_war_desc: "A pesar de nuestros constantes enfrentamientos con los chinos, nuestra rivalidad solo ha derivado en dos grandes conflictos. Sin embargo, ya no es así. En resumen, esta es la tercera guerra sino-japonesa, no la Gran Guerra Asiática ni la segunda guerra de Taiwán; se trata de ajustar cuentas con el dragón durante siglos."
 JAP_hold_the_initial_push: "Mantener la iniciativa inicial"
 JAP_hold_the_initial_push_desc: ""
 JAP_take_hainan: "Tomar Hainan"
 JAP_take_hainan_desc: ""
 JAP_kanton_koryakusen: "Kanton Kōryakusen"
 JAP_kanton_koryakusen_desc: "Operación de Cantón"
 JAP_reclaim_the_island: "Reclamar la isla"
 JAP_reclaim_the_island_desc: "El pueblo libre de Taiwán se ha visto reprimido por el régimen continental, y debemos reparar nuestros fracasos en protegerlo. Recuperar la isla sería una gran victoria, no solo para la moral, sino que también ofrecería una oportunidad para desembarcar tropas en suelo chino."
 JAP_honor_matsui: "Honrar a Matsui"
 JAP_honor_matsui_desc: ""
 JAP_gateway_to_the_bohai_sea: "Puertas al mar de Bohai"
 JAP_gateway_to_the_bohai_sea_desc: ""
 JAP_straight_into_the_dragons_lair: "A la guarida del dragón"
 JAP_straight_into_the_dragons_lair_desc: "China se creía intocable, creía estar a salvo, creía que esta guerra sería una victoria fácil. ¡Y ahora estamos en medio de los preparativos finales para una invasión naval de su propio país! El dragón ha volado demasiado cerca del sol, y como Ícaro, lo derribaremos del cielo."
 JAP_together_with_korea: "Juntos con Corea"
 JAP_together_with_korea_desc: "La historia se repite, primero como una tragedia, luego como una farsa. El régimen totalitario de Corea del Norte se ha aliado con China y ha vuelto a atacar a su homólogo del sur. Corea del Sur es uno de nuestros aliados más valiosos por varias razones. En concreto, es nuestra ventana más fácil para atacar a China continental. ¡Juntos haremos retroceder a las hordas del norte, como lo hicimos hace siete décadas!"
 JAP_secure_a_foothold_in_manchuria: "Entrar en Manchuria"
 JAP_secure_a_foothold_in_manchuria_desc: "Con los norcoreanos repelidos y su territorio casi completamente bajo control amigo, una invasión de Manchuria está a un paso. Los chinos seguramente lucharán sin piedad, pero pronto las tropas japonesas y coreanas cruzarán la frontera, y comenzará una nueva era en Asia Oriental."
 JAP_korean_question: "Cuestión coreana"
 JAP_korean_question_desc: "Con la península de Corea unida y libre por primera vez en más de un siglo, ha surgido un debate sobre nuestra nueva política exterior hacia ellos. Algunos creen que deberíamos estrechar las relaciones, desplegar tropas en su territorio y consolidar nuestros lazos económicos. Otros argumentan que esto sería similar a lo que el Imperio japonés hizo con la península, y que deberíamos dejar que la nación prospere por sí sola. La decisión es nuestra."
 JAP_our_southern_allies: "Nuestros aliados al sur"
 JAP_our_southern_allies_desc: "Los chinos se han ganado su karma tras años de agitación en el sur de Asia. Muchas naciones de esa región se han unido a nosotros, y por ello podemos enjaular al dragón con mayor eficacia. Debemos coordinarnos con nuestros aliados del sur para asegurar que China no se descontrole."
 JAP_return_to_burma: "Retorno a Birmania"
 JAP_return_to_burma_desc: ""
 JAP_operations_in_southeast_asia: "Operar en el Sudeste Asiático"
 JAP_operations_in_southeast_asia_desc: "Las junglas del Sudeste Asiático han vuelto a verse iluminadas por disparos y explosiones, y el olor a humo es denso. La lucha contra los chinos allí es de las más brutales que se verán en esta guerra. Aun así, no podemos excedernos y debemos asegurarnos de que nuestros aliados asuman su propia responsabilidad."
 JAP_philippine_affairs: "Asuntos filipinos"
 JAP_philippine_affairs_desc: ""
 JAP_marine_corps_expansion: "Expandir el cuerpo anfibio"
 JAP_marine_corps_expansion_desc: "Con la escalada de la guerra, es necesario reevaluar el tamaño de nuestro cuerpo de marines. Nos encontramos enfrentándonos cada vez más a los chinos sobre el terreno, por lo que contar con más fuerzas preparadas para este tipo de enfrentamientos no viene nada mal."
 JAP_occupation_administrations: "Administraciones de ocupación"
 JAP_occupation_administrations_desc: "El territorio que hemos arrebatado a China y sus aliados no será gobernado eficazmente por los militares, y si esto continúa, el descontento crecerá. Debemos devolver el control de los territorios ocupados al pueblo, aunque primero deben demostrarnos su lealtad."
 JAP_prepare_to_defend_the_home_islands: "Defender las Islas Principales"
 JAP_prepare_to_defend_the_home_islands_desc: "Aunque nos cueste admitirlo, una invasión china de las Islas Principales es muy probable. Si llega a este punto, sin duda perderemos, ¡pero no nos doblegaremos fácilmente! ¡Haremos que los chinos paguen por cada metro de suelo japonés!"
 JAP_spiritual_mobilization: "Movilización espiritual"
 JAP_spiritual_mobilization_desc: "Los japoneses siempre hemos sido un pueblo orgulloso, respetuoso con nuestras tradiciones y con las generaciones que nos precedieron. Nuestro pueblo lo reconoce y apoya firmemente nuestros esfuerzos contra el enemigo. ¡Debemos canalizar los muchos años de historia de nuestra nación en este conflicto y enorgullecer a nuestros antepasados!"
 JAP_priority_to_military_corporations: "Priorizar a corporaciones militares"
 JAP_priority_to_military_corporations_desc: "En estos tiempos de crisis, debemos reconocer que ciertos sectores de la economía están haciendo más que otros, en particular las corporaciones militares. Son ellas quienes abastecen a nuestras tropas con armas, cargan nuestros tanques y abastecen de combustible a nuestros helicópteros. Por supuesto, les haremos concesiones por el momento."
 JAP_war_for_japans_survival: "Guerra de supervivencia japonesa"
 JAP_war_for_japans_survival_desc: "Imagínense: ¿qué pasaría si perdiéramos? ¡Tanques chinos arrasando Tokio, la destrucción de nuestra cultura, el tormento de nuestro pueblo! Esto es más que una simple lucha entre dos potencias; es una guerra de vida o muerte. O nos mantendremos firmes y triunfaremos, o caeremos para no volver a levantarnos."
 JAP_redefine_the_japanese_army: "Redefinir el ejército japonés"
 JAP_redefine_the_japanese_army_desc: "\"Fuerzas de Autodefensa\": ese ha sido el término apropiado para nuestras fuerzas armadas desde su formación. Siempre se concibió para trabajar en colaboración con los estadounidenses, pero sin ellos, sus debilidades quedaron al descubierto. Ya se han hecho cambios, pero debemos ir un paso más allá y reestructurar por completo las Fuerzas de Autodefensa."
 JAP_recall_the_battle_for_taiwan: "Recordar Taiwán"
 JAP_recall_the_battle_for_taiwan_desc: "Nuestros encuentros con los chinos durante la guerra de Taiwán nos revelaron muchas cosas. Fue nuestro primer conflicto importante en décadas, y aprendimos cómo nuestro ejército se desenvuelve por sí solo. Sería una tontería ignorar los errores y los triunfos que tuvimos; las lecciones que aprendimos no se desperdiciarán."
 JAP_continue_rearmament: "Continuar el rearme"
 JAP_continue_rearmament_desc: "Mientras la amenaza de China persista, nosotros también debemos seguir aumentando nuestras reservas. La cuestión no es si volveremos a luchar contra China, sino cuándo. Llegará el momento, y querremos estar bien equipados."
 JAP_rikujo_jieitai: "Rikujō Jieitai"
 JAP_rikujo_jieitai_desc: "Inicialmente ignoradas en favor de la Armada y la Fuerza Aérea, la Fuerza Terrestre está adquiriendo una importancia cada vez mayor. A medida que nuestras alianzas con China se fortalecen, aumenta la probabilidad de que nos encontremos con nuestro enemigo en tierra. Ahora debemos tratar a nuestros soldados con el mismo respeto que a nuestros marineros y pilotos."
 JAP_koku_jieitai: "Kōkū Jieitai"
 JAP_koku_jieitai_desc: "La principal ventana de China para atacar a nuestra nación es la claraboya, y debemos asegurarnos de que esté bien cerrada. Nuestra fuerza aérea participó en numerosos enfrentamientos con China durante la guerra de Taiwán, con algunas victorias y otros fracasos. Debemos reforzarla adecuadamente para que los cielos permanezcan despejados de hostiles."
 JAP_kaijo_jieitai: "Kaijō Jieitai"
 JAP_kaijo_jieitai_desc: "Pase lo que pase, siempre seremos una nación insular. Por ello, siempre necesitaremos una armada fuerte, capaz de proteger nuestras islas y el poder en el extranjero. Inevitablemente, nos enfrentaremos a China en el mar en numerosas ocasiones, tal como lo hicimos al defender Taiwán, y estaremos preparados."
 JAP_mass_production_of_the_rising_suns_airplanes: "Producción masiva de Shinshin"
 JAP_mass_production_of_the_rising_suns_airplanes_desc: "El Mitsubishi X-2 es uno de los mayores logros de la ingeniería aeroespacial japonesa moderna. Si bien no es tan avanzado como sus homólogos estadounidenses, sigue siendo nuestro primer caza furtivo de producción nacional. Mientras continúa el desarrollo del F-X, debemos reforzar nuestra flota de X-2."
 JAP_return_to_the_super_kai_program: "Programa \"Super Kai\""
 JAP_return_to_the_super_kai_program_desc: "Aunque el Mitsubishi F-2 empieza a mostrar signos de envejecimiento, sigue siendo un caza fiable y fácil de fabricar. Durante este período de paz, impulsaremos a nuestros ingenieros sin descanso para que trabajen en el desarrollo del avión y así poder competir fácilmente con sus rivales chinos."
 JAP_experimental_uavs: "VANTs experimentales"
 JAP_experimental_uavs_desc: "Los vehículos aéreos no tripulados se han convertido en el núcleo de la guerra moderna, y llegamos tarde. Sin embargo, como una poderosa nación occidental, somos más que capaces de desarrollar diseños avanzados de drones de combate. Ha llegado el momento de ponernos al día con el resto del mundo."
 JAP_increase_dockyard_construction_plan: "Planes de construcción de astilleros"
 JAP_increase_dockyard_construction_plan_desc: "Nuestra flota sufrió daños en la guerra de Taiwán y, aunque no ha sido destruida, necesitaría un refuerzo. Hasta ahora, hemos sido bastante flexibles con las cuotas de construcción en astilleros. Lamentablemente, ya no podemos permitirnos este lujo y debemos asegurarnos de que nuestros trabajadores fabriquen nuevos barcos lo más rápido posible."
 JAP_expand_the_carrier_fleet: "Producir más portaaviones"
 JAP_expand_the_carrier_fleet_desc: "Incluso hoy, los aviones no pueden volar indefinidamente sin reabastecerse. Aunque pudieran alcanzar mayores distancias, nuestros cazas no podrían proteger a nuestros aliados del extremo sur. ¿La respuesta? Construir más portaaviones para proteger los cielos de aquellos lugares a los que no podemos llegar."
 JAP_anti_ship_missile_development: "Desarrollar misiles antibuques"
 JAP_anti_ship_missile_development_desc: "Atrás quedaron los días en que los barcos piratas navegaban juntos, intercambiando cañonazos. En los conflictos navales actuales, hay ocasiones en que los barcos ni siquiera se ven. China es experta en la producción de misiles, pero, para su desgracia, nosotros también."
 JAP_investments_in_infantry_and_artillery_development: "Invertir en artillería e infantería"
 JAP_investments_in_infantry_and_artillery_development_desc: "Aprendimos de la Segunda Guerra Mundial que el ejército japonés no debe depender excesivamente de los tanques. Si bien es útil contar con un arsenal considerable de estas bestias sobre orugas, nuestras fuerzas terrestres hoy dependen en gran medida de la infantería y la artillería. Debemos reestructurar este aspecto de nuestras fuerzas armadas para combatir mejor la doctrina china."
 JAP_armored_unmanned_vehicles: "Vehículos blindados no tripulados"
 JAP_armored_unmanned_vehicles_desc: "¿Por qué debería la Fuerza Aérea de Autodefensa recibir tanto apoyo cuando se trata de vehículos no tripulados? A diferencia de China, cuando vemos la oportunidad de eliminar el sufrimiento humano, la aprovechamos. Debemos desarrollar máquinas de combate capaces de causar daño y, al ser destruidas, no provocar la muerte de japoneses."
 JAP_wide_application_of_exoskeletons: "Aplicación extendida de exoesqueletos"
 JAP_wide_application_of_exoskeletons_desc: "Cuando alguien imagina un exoesqueleto, piensa en insectos o en maquinaria voluminosa de ciencia ficción. En realidad, no se limitan a las películas ni a los insectos, y existen en nuestro mundo actual. Sin embargo, no se utilizan al máximo, algo que deberíamos poder aprovechar."
 JAP_a_worthy_successor_to_the_imperial_army: "Sucesores del Ejército Imperial"
 JAP_a_worthy_successor_to_the_imperial_army_desc: "El Ejército Imperial pudo haber luchado por razones diferentes a las de hoy, pero aun así fue una fuerza de combate eficiente. Pasamos demasiado tiempo dependiendo del apoyo militar estadounidense, incapaces de defendernos. Sin embargo, su tragedia nos hizo comprender, ¡y ahora somos capaces de defender a las naciones libres de Asia!"
 JAP_conscription_reform: "Reforma de conscripción"
 JAP_conscription_reform_desc: "Nuestro ejército está compuesto íntegramente por voluntarios, algo de lo que nos sentimos orgullosos. Muchos están dispuestos a defender su nación por voluntad propia. Sin embargo, dado que la situación mundial parece empeorar constantemente, debemos asegurarnos de que nuestro ejército cuente con un flujo constante de efectivos. El servicio militar no será obligatorio, pero se fomentará y los alistados recibirán una generosa compensación."
 JAP_ignite_japanese_patriotism: "Avivar el patriotismo japonés"
 JAP_ignite_japanese_patriotism_desc: "Como dice el dicho, \"el patriotismo es amar a tu país por lo que hace, el nacionalismo es amar a tu país sin importar lo que haga\". Esto último es perjudicial para muchas personas, tanto dentro como fuera del país. Pero lo primero es lo que pretendemos aprovechar y lo que usaremos para reforzar la voluntad del pueblo japonés."
 JAP_defeat_enduring: "Perdurando"
 JAP_defeat_enduring_desc: "Nuestra nación no ha visto tanta humillación desde el fin de la Segunda Guerra Mundial. Años de preparación han sido en vano. Taiwán ha sido perdida, y con esta, gran parte de nuestra dignidad. Sin embargo, seguimos en pie, maltrechos, heridos y más aislados de lo que quisiéramos, pero resistiremos."
 JAP_defeat_challenge_chinese_dominance: "Desafiar la dominación china"
 JAP_defeat_challenge_chinese_dominance_desc: "Puede que China nos haya derrotado, pero aún no nos ha derrotado. Mientras el sol brille sobre la tierra, nos opondremos con firmeza a China. El mundo está lleno de oportunidades para debilitarlas, y las detectaremos y las aprovecharemos."
 JAP_defeat_unite_the_people: "Unir al pueblo"
 JAP_defeat_unite_the_people_desc: "La guerra de Taiwán abrió una gran brecha entre nuestro pueblo, y con nuestra derrota, esa división no ha hecho más que ahondarse. Si queremos salvar a Japón, debemos empezar por unir a todos."
 JAP_defeat_keep_an_eye_on_the_media: "Pendientes de los medios"
 JAP_defeat_keep_an_eye_on_the_media_desc: "Durante la guerra de Taiwán, nuestro mayor enemigo en el frente interno fueron los medios de comunicación. Nos difamaron en cada oportunidad que tuvieron, y ahora nos han convertido en su hazmerreír. Si bien tienen derecho a hacerlo, debemos asegurarnos de que no se excedan."
 JAP_defeat_government_of_national_unity: "Gobierno de Unidad Nacional"
 JAP_defeat_government_of_national_unity_desc: "Un gran héroe extranjero dijo una vez: \"Una casa dividida contra si misma no puede sostenerse\". Lo vimos durante la guerra de Taiwán, donde nuestras rivalidades con la oposición antepusieron nuestro deber con la nación. Esto debe cambiar; debemos unirnos con orgullo y trabajar juntos por un futuro mejor."
 JAP_defeat_new_political_landscape: "Nueva esfera política"
 JAP_defeat_new_political_landscape_desc: "Muchos pensaron que las secuelas de la guerra de Taiwán llevarían al Partido Liberal Democrático a tomar medidas drásticas contra Japón y consolidar todo el poder. Pero no es así; debemos fomentar la colaboración y fomentar nuevas ideas si queremos guiar a nuestra nación hacia el futuro."
 JAP_defeat_blame_the_opposition: "Culpar a la oposición"
 JAP_defeat_blame_the_opposition_desc: "La Coalición Civil y otros partidos de la oposición usaron todos los trucos posibles para dividirnos desde dentro. Estábamos tan ocupados combatiéndolos en casa que no pudimos luchar contra los chinos en el extranjero. ¡Gracias a ellos perdimos la guerra, y quedarán expuestos como los traidores que son!"
 JAP_defeat_constitutional_revisionism: "Revisionismo constitucional"
 JAP_defeat_constitutional_revisionism_desc: "Nuestras reformas al Artículo 9 no fueron suficientes para ayudarnos contra China, y hemos visto de primera mano el daño que ha causado a nuestra nación. Si queremos tener alguna posibilidad de vencer al dragón en el futuro, debemos replantear el Artículo 9 y, en breve, eliminarlo."
 JAP_defeat_rebuild_the_party: "Reconstruir el Partido"
 JAP_defeat_rebuild_the_party_desc: "Nuestra derrota contra China ha sido uno de los mayores golpes a la unidad del PLD en la historia. Muchos miembros se marcharon, y la desorganización del partido quedó en evidencia. El ala conservadora, en particular, ha sido la más perjudicada, con varias figuras influyentes formando una facción nacionalista. El partido debe recortar gastos y reconstruirse para ser mejor que antes."
 JAP_defeat_calm_down_keiretsu: "Calmar a los keiretsu"
 JAP_defeat_calm_down_keiretsu_desc: "La guerra contra China tuvo un gran impacto en la economía japonesa, siendo los keiretsu los más afectados. Sus representantes han demostrado su ira al máximo, y si queremos restablecer la economía, la reconciliación con ellos es el punto de partida."
 JAP_defeat_strike_down_corruption: "Aplastar la corrupción"
 JAP_defeat_strike_down_corruption_desc: "El PLD es tan grande que, inevitablemente, se ha permitido que la corrupción se propague. Existe en todos los niveles de gobierno, y como parte de las reformas del partido, la combatiremos. ¡Japón será gobernado con justicia!"
 JAP_defeat_mobilization_of_bureaucracy: "Movilizar la burocracia"
 JAP_defeat_mobilization_of_bureaucracy_desc: "Mientras seguimos lidiando con una de las peores crisis en la historia de nuestra nación, la gente parece estar haciendo todo lo posible para dificultarnos aún más el trabajo. Si bien algunos han sugerido la ley marcial, eso sería ir demasiado lejos, y preferiremos usar todo el poder del Gobierno para calmar la situación."
 JAP_defeat_natural_party_of_power: "Partido natural del poder"
 JAP_defeat_natural_party_of_power_desc: "El Partido Liberal Democrático ha gobernado Japón casi ininterrumpidamente durante 80 años, y con razón. Sabemos qué es lo mejor para el pueblo japonés, y lo sabemos mejor que nadie. Otros partidos hacen lo que quieren, pero nunca nos vencerán, porque somos Japón."
 JAP_defeat_declare_martial_law: "Declarar la ley marcial"
 JAP_defeat_declare_martial_law_desc: "La situación sobre el terreno se ha descontrolado, y miembros de las Fuerzas de Autodefensa han presentado sólidos argumentos a favor de la ley marcial. Si bien será impopular, es temporal y la mejor opción por ahora."
 JAP_defeat_strengthening_national_security: "Fortalecer la seguridad nacional"
 JAP_defeat_strengthening_national_security_desc: "Sin duda, los chinos están haciendo todo lo posible para infiltrar espías y traidores entre nosotros, y si no podemos vigilarlos, estamos condenados. El pueblo ya no tendrá que vivir con el temor de los agitadores comunistas; la estabilidad y la seguridad deben prevalecer."
 JAP_defeat_tightening_election_laws: "Endurecer leyes electorales"
 JAP_defeat_tightening_election_laws_desc: "A los chinos sin duda les gustaría más interferir en nuestras elecciones, y debemos asegurarnos de que eso no suceda. Hasta ahora hemos sido demasiado laxos con la supervisión de las papeletas, pero de ahora en adelante serán vigiladas rigurosamente y cualquier sospechoso de cualquier tipo de fraude será castigado."
 JAP_defeat_party_as_state_instrument: "El Partido como instrumento estatal"
 JAP_defeat_party_as_state_instrument_desc: "El PLD existe solo como un medio para un fin. Su propósito es ayudar a la población civil japonesa, no consolidar todo el poder ni apropiarse del control del Estado. Incluso los altos funcionarios rinden cuentas a alguien, y aquí no es la excepción."
 JAP_defeat_party_over_state: "Partido sobre el Estado"
 JAP_defeat_party_over_state_desc: "El Partido Liberal Democrático es, en efecto, Japón y, como tal, tiene prioridad sobre el Estado. El PLD sabe qué es lo mejor, y Japón será moldeado a su imagen, de una forma u otra."
 JAP_defeat_capitalism_with_a_japanese_face: "Capitalismo con rostro japonés"
 JAP_defeat_capitalism_with_a_japanese_face_desc: "Los países de todo el mundo interpretan el capitalismo de forma diferente, y nosotros somos iguales. A medida que la economía se recupera, es nuestro deber asegurarnos de que beneficie al pueblo japonés."
 JAP_defeat_forced_nationalization: "Expropiación forzada"
 JAP_defeat_forced_nationalization_desc: "La globalización es un tema complejo que incluso los economistas más hábiles solo pueden fingir comprender. A medida que la polarización mundial crece, necesitamos asumir el control de más activos corporativos para asegurarnos de que se utilizan para nuestra gente."
 JAP_defeat_suport_loyal_business: "Apoyar a negocios leales"
 JAP_defeat_suport_loyal_business_desc: "No podemos permitir que nuestra economía exista al otro lado del mundo; debe quedarse aquí. Si bien es una triste realidad, la globalización ha muerto, y las empresas leales a su patria serán ampliamente compensadas."
 JAP_defeat_economic_inventory: "Inventario económico"
 JAP_defeat_economic_inventory_desc: "Perdimos muchos activos durante la guerra de Taiwán, sin mencionar los bienes que China ya no fabrica para nosotros. Si queremos que la economía vuelva a ser rentable, debemos evaluar qué podemos utilizar y cómo podemos hacerlo."
 JAP_defeat_public_private_partnership: "Alianzas público-privadas"
 JAP_defeat_public_private_partnership_desc: "No tenemos por qué competir con las corporaciones, y es más que posible colaborar en todo tipo de temas. ¡Ellas también son japonesas, y juntas haremos que nuestra nación sea gloriosa!"
 JAP_defeat_national_security_council: "Consejo de Seguridad Nacional"
 JAP_defeat_national_security_council_desc: "Dado que ya no podemos proteger a otras naciones, debemos asegurarnos de que toda nuestra atención se centre en proteger a nuestra gente. Hay personas expertas en seguridad nacional, y serán incorporadas a un nuevo consejo, para que ningún ciudadano japonés viva jamás con miedo."
 JAP_defeat_glorify_traditional_values: "Glorificar valores tradicionales"
 JAP_defeat_glorify_traditional_values_desc: "En Japón, siempre hemos defendido el honor, la perseverancia y el esfuerzo. Estos valores son nobles hoy y siempre lo serán. Debemos asegurarnos de que nadie olvide estos ideales, por lo que deben estar arraigados en la conciencia pública para las generaciones futuras."
 JAP_defeat_unite_free_asia: "Los libres de Asia responden"
 JAP_defeat_unite_free_asia_desc: "Nuestra derrota en Taiwán ha mostrado a las naciones de Asia libre la magnitud de la amenaza china. Por ello, la OTDP ha recibido varias solicitudes nuevas de países que temen al dragón y desean estar seguros de que estarán protegidos. Entre ellos, destaca la India, y Nueva Zelanda también será un miembro valioso."
 JAP_defeat_ardent_panasianism: "Panasianismo ardiente"
 JAP_defeat_ardent_panasianism_desc: "Si queremos tener alguna posibilidad de derrotar a China, ¡debemos mantenernos unidos! Desde Nueva Delhi hasta Seúl, Asia debe unirse bajo un liderazgo eficaz y plantar cara a los agresores chinos."
 JAP_defeat_utilize_anticommunism: "Utilizar el anticomunismo"
 JAP_defeat_utilize_anticommunism_desc: "Mucha gente en todo el continente no está muy entusiasmada con la idea de vivir en una sociedad comunista, y podemos usar eso como arma fácilmente. El temor rojo estadounidense aniquiló a todos los comunistas del país durante décadas, y si logramos recrear nuestra propia versión controlada, podemos debilitar considerablemente la influencia china."
 JAP_defeat_united_armed_forces: "Fuerzas Armadas unidas"
 JAP_defeat_united_armed_forces_desc: "Una de las razones de nuestra derrota en Taiwán fue la incapacidad de nuestro ejército para colaborar con nuestros aliados. Teníamos una doctrina muy diferente a la de los taiwaneses, quienes a su vez tenían una doctrina muy distinta a la de los australianos. Ahora que contamos con aún más aliados, debemos unir nuestras fuerzas armadas bajo un mando centralizado para tener alguna posibilidad de victoria contra los chinos."
 JAP_defeat_long_japanese_hand: "Brazo largo de Japón"
 JAP_defeat_long_japanese_hand_desc: "Aún quedan naciones en la región del Indo-Pacífico que no han elegido bando, por lo que el conflicto de influencia entre nosotros y China ha comenzado. ¡Las atraeremos a nuestro bando, pues no podemos permitir que China encuentre más aliados!"
 JAP_defeat_fund_taiwanese_resistance: "Financiar la resistencia taiwanesa"
 JAP_defeat_fund_taiwanese_resistance_desc: "El espíritu de lucha taiwanés no tiene límites, y los ocupantes chinos se encuentran enfrascados en un gran movimiento guerrillero. Necesitamos mantener activos a esos guerrilleros; cuantas más distracciones tenga el dragón, mejor."
 JAP_defeat_collective_sovereignity: "Soberanía colectiva"
 JAP_defeat_collective_sovereignity_desc: "Asia jamás será gobernada por un solo amo, por mucho que China lo desee. Si bien podemos ser el líder de la OTDP, somos iguales a todas las demás naciones del continente. ¡Por ahora y para siempre, Asia será libre!"
 JAP_defeat_own_economic_sphere: "Esfera económica propia"
 JAP_defeat_own_economic_sphere_desc: "Como China ya no es una opción en términos de asociación económica, debemos recurrir a los miembros más fiables de nuestra esfera económica. Aún tenemos mucha influencia en la economía global, y si jugamos bien nuestras cartas, podemos conseguir aún más."
 JAP_defeat_forced_cooperation: "Cooperación forzada"
 JAP_defeat_forced_cooperation_desc: "Los australianos son nuestro más valioso aliado en el Pacífico. Nuestras economías están más conectadas que nunca y el comercio entre nosotros está en auge. Nos entusiasma mucho trabajar con ellos en todo tipo de proyectos, incluso si no lo están."
 JAP_defeat_east_economic_autarky: "Autarquía económica oriental"
 JAP_defeat_east_economic_autarky_desc: "Oriente ha sido apuntalado por países de todo el mundo durante demasiado tiempo. Vivimos en una era en la que, nos guste o no, cada uno tiende a pensar por sí mismo. No podemos permitir que nuestra economía dependa de nadie más, so pena de sufrir las consecuencias de sus errores."
 JAP_defeat_unifying_our_economies: "Unificar nuestras economías"
 JAP_defeat_unifying_our_economies_desc: "Por mucho que lo deseemos, nunca podremos ser completamente autosuficientes. Sin embargo, contamos con suficientes aliados con suficientes mercados únicos, y con mucha planificación y un poco de suerte, podríamos lograr que dependamos solo unos de otros."
 JAP_defeat_forget_about_america: "Olvidarnos de América"
 JAP_defeat_forget_about_america_desc: "Aunque es una verdad dolorosa de comprender, los Estados Unidos ya no existen. Se ha desmoronado por una supuesta \"guerra cultural\". Por lo tanto, ¿a quién se supone que debemos pagar nuestras deudas? Mientras dure la Segunda Guerra Civil Americana, y posiblemente para siempre, suspenderemos todos los pagos de la deuda a EE.UU."
 JAP_defeat_international_community_assistance: "Asistencia internacional"
 JAP_defeat_international_community_assistance_desc: "Aunque parezca increíble, hay muchas naciones en todo el mundo que no quieren una Asia dominada por China. Somos su mejor apuesta para evitarlo, y con pequeños sacrificios y una buena negociación, podremos conseguir un fuerte apoyo internacional."
 JAP_defeat_attract_labor_migrants: "Atraer a migrantes trabajadores"
 JAP_defeat_attract_labor_migrants_desc: "¡Japón te quiere a ti! ¿Buscas una vida mejor en el extranjero, lejos de casa? ¿Quieres explorar la vibrante cultura de una nación rica y experimentar todo lo que ofrece? Sea cual sea tu profesión, ¡seguro hay una oportunidad laboral para ti aquí en el país del Sol Naciente!"
 JAP_defeat_consolidation_of_unstable_coalition: "Consolidar la coalición inestable"
 JAP_defeat_consolidation_of_unstable_coalition_desc: "Muchos de los miembros de nuestra coalición son desenfrenados y rebeldes. Sin embargo, ahora que estamos reconstruyendo nuestra imagen, la consolidación está sobre la mesa y traeremos a casa a estos partidos desviados."
 JAP_defeat_harmonization_of_laws: "Harmonizar las leyes"
 JAP_defeat_harmonization_of_laws_desc: "Los partidos de nuestra coalición varían de izquierda a derecha y, ocasionalmente, discuten entre sí. Si queremos presentarnos como un Gobierno fuerte y unido, debemos obligar a estos partidos a llevarse bien entre sí, lo quieran o no."
 JAP_defeat_interparty_vertical: "Relaciones verticales entre partidos"
 JAP_defeat_interparty_vertical_desc: "Cualquiera que piense que todos los miembros de una coalición están en igualdad de condiciones es un necio. Al final, los partidos con los que nos aliamos solo buscan más votos. Con las recientes reconciliaciones y cambios en nuestra coalición, es hora de restablecer la jerarquía."
 JAP_defeat_reconstruction_of_civil_society: "Reconstrucción social"
 JAP_defeat_reconstruction_of_civil_society_desc: "Todos somos japoneses y todos queremos lo mejor para nuestra nación. Si bien no pretendemos reconstruir la sociedad desde cero, sin duda podemos solucionar algunos problemas para colaborar mejor con la oposición y que la política funcione con mayor fluidez."
 JAP_defeat_media_monopoly: "Monopolio mediático"
 JAP_defeat_media_monopoly_desc: "Los medios siguen siendo una espina en nuestro costado, persiguiendo cualquier escándalo que sus sucias manos puedan revelar. Si queremos fomentar la estabilidad en Japón, debemos asegurarnos de que los medios trabajen a nuestro favor."
 JAP_defeat_judicial_reform: "Reforma judicial"
 JAP_defeat_judicial_reform_desc: "El poder judicial ha operado con relativa independencia durante gran parte de su historia. Durante mucho tiempo, esto funcionó bien. Sin embargo, ante los saboteadores chinos y otras amenazas extranjeras, es fundamental que el Departamento de Justicia esté bajo nuestra supervisión directa."
 JAP_defeat_constitutional_referendum: "Referendo constitucional"
 JAP_defeat_constitutional_referendum_desc: "Nuestra constitución solo ha experimentado un pequeño cambio en sus 80 años de historia. Muchos más han cambiado en ese lapso, por lo que la constitución debe adaptarse a ellos. El cambio más importante, por supuesto, sería la eliminación del Artículo 9."
 JAP_defeat_destroy_the_radicals: "Destruir a los radicales"
 JAP_defeat_destroy_the_radicals_desc: "\"Payasos a mi izquierda, y chistosos a mi derecha\", es un dicho que representa a la perfección nuestra política actual. Por un lado, están los comunistas, que no se detendrán ante nada para convertirnos en esclavos de China. Por otro, están los nacionalistas, cuyo sueño erótico es la restauración del imperio. Ninguno de estos ideales se permitirá jamás cerca del puesto de primer ministro."
 JAP_defeat_resist_foreign_influence: "Combatir la influencia extranjera"
 JAP_defeat_resist_foreign_influence_desc: "China, Rusia, incluso Corea del Norte, todas estas naciones y muchas más, solo desearían controlarnos. Aunque nos encontremos más aislados que en décadas como resultado de nuestra derrota en la guerra de Taiwán, nos negamos a ceder ante la presión. ¡Japón se mantiene firme, como siempre!"
 JAP_defeat_uncontested_civil_administration: "Administración civil indiscutida"
 JAP_defeat_uncontested_civil_administration_desc: "Si cedemos a la presión de las Fuerzas de Autodefensa, nos arriesgamos a perder nuestra democracia. La Segunda Guerra Mundial es un claro ejemplo de lo que ocurre cuando el ejército tiene demasiado poder. Nos aseguraremos de que se dediquen a lo que mejor saben hacer: defender la nación, no gobernarla."
 JAP_defeat_strengthen_JSDF_positions: "Fortalecer la posición militar"
 JAP_defeat_strengthen_JSDF_positions_desc: "La seguridad es indispensable en el mundo actual, ¿y quién es bueno en seguridad? Pues, los militares, por supuesto. Si bien no les entregaremos el Gobierno, fortaleceremos la influencia de las Fuerzas de Autodefensa para que nunca más tengamos que preocuparnos por la seguridad de nuestra gente."
 JAP_defeat_russian_reconciliation: "Reconciliación con Rusia"
 JAP_defeat_russian_reconciliation_desc: "Rusia nunca ha sido un aliado, pero entre ellos y China, la respuesta es obvia. Ellos también han tenido una historia inestable con China, amigos en un momento, enemigos en otro. Somos mucho más dependientes que los chinos, y seguramente, con el tiempo suficiente, podremos llegar a un acuerdo con nuestros vecinos del norte."

 jap.56.t: "¡Japón lanza una guerra informática!"
 jap.56.d: "Desde que iniciamos los esfuerzos para la unificación a través del estrecho de Taiwán, el número de incidentes de seguridad en el interior de nuestra nación ha aumentado drásticamente. Este aumento puede atribuirse en parte a las tensiones propias de la guerra y a la reacción contra las estrictas medidas de control. Sin embargo, agentes del Ministerio de Seguridad del Estado han descubierto una sorprendente cantidad de casos de presunto espionaje. Tras una investigación y un análisis exhaustivos, hemos confirmado que estas actividades están orquestadas por nuestros \"viejos amigos\" de la Oficina de Inteligencia e Investigación del Gabinete de Japón y el Cuartel General de Inteligencia de Defensa.\n\nLas agencias de inteligencia japonesas comprenden que no pueden depender únicamente de la fuerza militar para enfrentarse a nosotros en el campo de batalla. En cambio, han recurrido a estrategias destinadas a desestabilizar nuestro orden social para debilitar el apoyo público a la guerra. Numerosos incidentes dan fe de la audacia de sus operaciones encubiertas. Por ejemplo, los trabajadores de una fábrica de componentes para drones en Shenzhen organizaron recientemente una huelga masiva, cuya resolución requirió meses de negociaciones y ajustes de personal por parte del Gobierno municipal. Además, fotos del frente y supuestos videos de \"pérdidas en combate del EPL\", tanto reales como inventados, han circulado ampliamente en redes sociales como WeChat, Weibo, QQ y Bilibili. Lidiar con estos individuos no es particularmente difícil. Sin embargo, el verdadero problema reside en la gran cantidad de actividades hostiles, la rapidez con la que ocurren y la naturaleza esquiva de sus cerebros."
 jap.56.a: "¡Deberíamos haberlo sabido!"

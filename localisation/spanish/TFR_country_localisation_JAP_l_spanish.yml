 JAP_ldp_party_category: "Partido Liberal Democrático"
 JAP_ldp_party_category_desc: "El £GFX_LDP_logo  §GPartido Liberal Democrático de Japón§! es una de las fuerzas políticas más influyentes del país. Fundado en 1955, ha dominado la escena política japonesa desde entonces, con breves interrupciones. El £GFX_LDP_logo  §GPLD§! incluye varias facciones, cada una con sus propias visiones y enfoques políticos.\n\n\n\n\n\n\n\n\n\n\n"

 JAP_decision_5_times_tt: "§YEsta decisión solo se puede tomar 5 veces.§!"
 jap.186.t: "Despojos del retiro"
 jap.186.d: "El frente de Taiwán necesita aún más hombres y material, por lo que nos vemos obligados a reducir continuamente la calidad para satisfacer la demanda. Un oficial emprendedor ha presentado un plan para adquirir más tanques con poca inversión adicional, al menos mientras duren las existencias. A pesar de estar obsoleto incluso cuando se introdujo, el Tipo 74 sigue siendo un diseño viable, y aún tenemos algunos en desuso. La cantidad disponible es apenas una gota en un estanque, pero la avalancha de fabricación japonesa garantizará que este estanque se inunde."
 jap.186.a: "Victoria, un tanque a la vez."
 jap.187.t: "Moscú, mi amor"
 jap.187.d: "Hace solo un par de años, Andréi nunca habría imaginado que terminaría en el País del Sol Naciente.\nPero todo cambió de la noche a la mañana hace unos meses. Después de que Japón y Rusia firmaran acuerdos estratégicos, se aprobó un programa de intercambio estudiantil entre las universidades de ambos países, y Andréi tuvo la suerte de ser parte del grupo que viajaría a estudiar a Tokio por unos meses. Fue allí donde conoció a la mujer que marcaría su vida para siempre.\n\nSe encontraron por casualidad en el pasillo de la universidad, chocando sus frentes: ella tenía el pelo corto y desordenado, un vestido azul claro y unas gafas redondas; él, por su parte, llevaba una camisa a cuadros y unos vaqueros desgastados. Hayase era una estudiante de arquitectura, una chica que parecía bastante normal, pero cuya belleza aún no había salido a la luz. Esperaba escuchar gritos de reproche, pero se sorprendió al oír risas suaves y amables.\n\n\"Qué vaqueros tan ridículos tienes...\"\n\nPasaron algunas semanas y se volvieron increíblemente cercanos. Ella le mostró un lado de Japón que nunca había imaginado: pequeñas tiendas acogedoras en calles angostas, jardines urbanos llenos de sakura y pueblos casi desiertos; le abrió las puertas a un mundo nuevo. Le habló de su hogar: Moscú, Siberia, las focas del Baikal, las playas de Crimea, las fábricas de Dolgoprudny y las montañas de Altái. Le prometió que algún día lo llevaría a conocer todos esos lugares.\n\nEstaban sentados bajo un cielo estrellado. Ella le contaba sobre su vida como estudiante y se quejaba de cosas triviales, pero él no la escuchaba, solo la miraba con una sonrisa. De repente, el cielo se iluminó con un destello: una explosión de coloridos fuegos artificiales llenó el aire. Hayase saltó del banco como una niña y contempló el espectáculo con asombro, señalando los destellos más brillantes. Él simplemente sonrió y la miró a los ojos:"
 jap.187.a: "Vio el universo en ellos."
 JAP_creation_of_a_new_military_doctrine: "Creación de una nueva doctrina militar"
 JAP_creation_of_a_new_military_doctrine_desc: "No solo debemos centrarnos en desarrollar mejor equipo militar, sino que debemos saber cómo usarlo eficazmente. Nuestras doctrinas se basaron en viejas teorías de los días de cooperación con EE.UU., y aunque proporcionan gran parte de la base de nuestra doctrina actual, no están exentas de fallos, como lo demuestran nuestros errores en la defensa de Taiwán. Se necesita una nueva doctrina, una que se adapte mejor a nuestra situación."
 JAP_asias_best_officers: "Los mejores oficiales de Asia"
 JAP_asias_best_officers_desc: "Desarrollar un ejército es una cosa, pero si están dirigidos por oficiales simplistas, no llegarán muy lejos. Reformaremos el cuerpo de oficiales para asegurar que Japón produzca los líderes más inteligentes y adaptables, capaces de comandar operaciones complejas en todos los frentes de Asia, trabajando en estrecha colaboración con otros capitanes de nuestros aliados de la OTDP."
 JAP_mitsubishis_steel_monsters: "Monstruos de acero de Mitsubishi"
 JAP_mitsubishis_steel_monsters_desc: "Mitsubishi es una de las empresas industriales más antiguas y famosas de Japón, con una extensa historia de servicio al ejército japonés. Durante la Segunda Guerra Mundial y la Guerra Fría, la compañía suministró vehículos temibles que infundieron miedo en los enemigos de Japón. Ahora, con la guerra en el horizonte, es hora de contratar de nuevo a la empresa para expandir y mejorar el inventario de máquinas de guerra de Japón. Se les encargará el diseño y la construcción de todo lo que nuestras fuerzas blindadas necesiten, especialmente los tanques de batalla principales. Con su experiencia y la industria japonesa a su disposición, monstruos de acero saldrán de la línea de producción que nos darán la ventaja en cualquier campo de batalla contemporáneo."
 JAP_cooperation_with_hyundai_rotem: "Cooperación con Hyundai Rotem"
 JAP_cooperation_with_hyundai_rotem_desc: "Hyundai Rotem es una de las firmas de industria pesada más importantes de Corea del Sur, rivalizando e incluso superando el tamaño y alcance de algunas de nuestras propias empresas. También son el mayor fabricante de tanques en la península, produciendo modelos que han atraído gran interés en todo el mundo. Dado que ambas naciones enfrentamos las mismas amenazas regionales, es hora de establecer una cooperación más estrecha con la compañía. Con nuestras industrias y las suyas trabajando juntas, nuestra cooperación seguramente traerá avances significativos para nuestras fuerzas blindadas."
 JAP_amphibious_assault_vehicles_development: "Desarrollo de vehículos de asalto anfibios"
 JAP_amphibious_assault_vehicles_development_desc: "Apoyar a la infantería con vehículos blindados que poseen una gran potencia de fuego es una piedra angular incuestionable de la guerra moderna y, al ser una nación insular, debemos encontrar una manera de tener dicho apoyo que se adapte a nuestra geografía. Naturalmente, la solución ya está disponible, una solución que no tardaremos en adoptar, que son los vehículos de asalto anfibios. Inmediatamente, nuestro complejo militar industrial tendrá la tarea de diseñar, probar y fabricar vehículos blindados anfibios modernos para nuestro ejército y marines. Pronto nuestras fuerzas tendrán lo que necesitan, y cuando llegue la guerra, nuestros soldados tendrán la movilidad para estar en cualquier lugar del Pacífico."
 JAP_komatsus_light_designs: "Diseños ligeros de Komatsu"
 JAP_komatsus_light_designs_desc: "Komatsu Limited es otra importante empresa industrial japonesa que fabrica una amplia gama de equipos y vehículos de excavación. Además de sus productos civiles, también tienen experiencia en la producción de productos militares, en particular vehículos blindados de transporte de personal. Dado que nuestro ejército necesita más vehículos ligeros, ahora es el momento de contratarlos para satisfacer esa necesidad. Junto con su experiencia y su sólida capacidad industrial, podemos esperar una flota moderna y formidable de vehículos ligeros para nuestro ejército regular."
 JAP_joint_development_with_larsen_toubro: "Desarrollo conjunto con Larsen & Toubro"
 JAP_joint_development_with_larsen_toubro_desc: "Larsen & Toubro Limited es un conglomerado industrial indio masivo que opera en una gran cantidad de mercados y productos diferentes. Hacen de todo, desde la generación de energía hasta la informática e incluso el desarrollo de vehículos blindados. A medida que Japón amplía su cooperación con aliados regionales frente a la inestabilidad global, es hora de tender la mano y consolidar un nuevo programa de investigación y desarrollo industrial con este titán de la industria. Con su cooperación, podemos utilizar su enorme capacidad industrial y mano de obra para desarrollar sistemas que seguramente nos darán una ventaja contra nuestros competidores que se militarizan rápidamente."
 JAP_creation_of_a_attack_helicopter_fleet: "Crear una flota de helicópteros de ataque"
 JAP_creation_of_a_attack_helicopter_fleet_desc: "Aparte de los tanques y la artillería, el uso de aeronaves, particularmente helicópteros de ataque, para apoyar a la infantería en el campo de batalla es una necesidad innegociable hoy en día. Japón tiene un número considerable de helicópteros de ataque, en su mayoría modelos estadounidenses, pero viendo cómo se están intensificando las cosas a nuestro alrededor, no es suficiente. Nuestra industria se pondrá a trabajar en la fabricación de más de nuestros modelos actuales de helicópteros de ataque o nos pondremos en contacto con nuestros socios internacionales y compraremos más. De cualquier manera, necesitamos más de estas máquinas si queremos capacidades efectivas de apoyo aéreo para nuestra infantería."
 JAP_rikujo_koku_unmanned_coordination: "Coordinación no tripulada aire-tierra"
 JAP_rikujo_koku_unmanned_coordination_desc: "Nuestra situación geopolítica actual exige la integración entre todos los dominios de la guerra. Podemos prepararnos mejor para la guerra invirtiendo en drones ISR no tripulados, que proporcionarán información vital tanto a las tropas terrestres como a los pilotos. Esto asegurará que nuestros pilotos no luchen a ciegas, ya que cada objetivo en tierra estará claramente identificado, y que nuestros soldados en el frente podrán interceptar aeronaves enemigas antes de que ataquen. Tener un par de ojos invisibles guiando nuestro avance no puede salir mal."
 JAP_stick_to_american_5th_generation_projects: "Continuar los proyectos norteamericanos"
 JAP_stick_to_american_5th_generation_projects_desc: "A pesar del caos que consume a nuestro mayor aliado, ninguna nación ha dominado los cazas de quinta generación como Estados Unidos. El F-35 Lightning II está en la cima de la capacidad de combate, e incluso con la Guerra Civil sin un final a la vista, la cadena de producción de Lockheed Martin sigue funcionando y en manos del gobierno unionista. Apostar por los diseños estadounidenses es la mejor opción para Japón en este momento. Significa confiar en décadas de desarrollo y asegura que la Fuerza Aérea de Autodefensa tendrá el equipo que tanto necesita pronto. Nos costará un ojo de la cara, pero la fiabilidad del hardware estadounidense supera el riesgo de experimentar con alternativas nacionales."
 JAP_deep_modernization_of_nato_fighter_jets: "Modernización de cazas de la OTAN"
 JAP_deep_modernization_of_nato_fighter_jets_desc: "Japón cuenta con una formidable flota de aviones modernos, en su mayoría vehículos de fabricación estadounidense adquiridos a lo largo de los años. Estos aviones son capaces y de calidad, pero con el paso de los años, por supuesto, envejecen y carecen de nuevas capacidades. Sabiendo esto, no nos permitiremos quedarnos atrás. Se lanzará un esfuerzo de modernización profunda para poner nuestros cazas al día con el campo de batalla moderno. Ya sea la renovación de la estructura, mejoras electrónicas o nuevos sensores, añadiremos todo lo necesario para asegurar que nuestra Fuerza Aérea de Autodefensa siga siendo inigualable en los cielos."
 JAP_global_combat_air_programme_development: "Desarrollar el Programa Global de Combate Aéreo"
 JAP_global_combat_air_programme_development_desc: "Con Norteamérica fracturada y China en ascenso, las democracias no tenemos otra opción que unirnos para defendernos a nosotros mismos y a nuestros pueblos. Con este espíritu, nosotros, junto con el Reino Unido e Italia, estableceremos el Programa Global de Combate Aéreo. No es nada menos que el proyecto aeroespacial multinacional más ambicioso del siglo: un esfuerzo masivo para construir una plataforma de caza furtivo de sexta generación para desplegar un avión de combate común, fusionando nuestros proyectos de sexta generación previamente separados. Comprometerse con esta iniciativa asegura un desarrollo tecnológico mucho más allá de lo que podríamos lograr solos. Aunque costosa, esta inversión internacional promete que nuestras tropas tendrán cielos seguros sobre ellas pase lo que pase."
 JAP_accelerate_mitsubishi_f_x_development: "Desarrollar el Mitsubishi F-X"
 JAP_accelerate_mitsubishi_f_x_development_desc: "Con Estados Unidos consumido por la guerra civil y su industria de defensa colapsando, ya no podemos permitirnos depender del hardware estadounidense para nuestras necesidades de defensa más urgentes. Con nuestros antiguos benefactores fuera de escena, el programa Mitsubishi F-X es nuestra única opción para defendernos a nosotros mismos y a nuestros aliados contra cualquier agresión. Nuestros científicos crearán un caza preparado para los cielos de la década de 2020 y más allá: el F-X Godzilla. Es un riesgo caro y peligroso, pero no podemos volver a ser dependientes, no ahora."
 JAP_european_future_combat_air_systems: "Futuro Sistema Aéreo de Combate"
 JAP_european_future_combat_air_systems_desc: "Fuera de Asia, los países de Europa occidental están desarrollando algo bastante prometedor. Se está trabajando en un futuro avión de combate que combina la electrónica y los materiales más avanzados conocidos por la industria de defensa internacional, algo que seguramente representará una seria amenaza en cualquier futuro campo de batalla. Como obviamente no queremos que nuestro ejército se quede atrás, es hora de que nos acerquemos a ellos con una solicitud de venta. Con suficiente buena diplomacia y una considerable cantidad de dinero, podemos esperar que estos aviones se añadan a nuestra fuerza aérea muy pronto. Al igual que nuestros amigos occidentales están haciendo ahora mismo, debemos ser intransigentes en la carrera por los futuros aviones de combate."
 JAP_the_japanese_armada: "La armada japonesa"
 JAP_the_japanese_armada_desc: "No hay duda. Estamos situados en un archipiélago, lo que significa que tenemos múltiples rutas marítimas que proteger y monitorear, además de la vasta distancia entre nosotros y el resto de nuestros aliados. Nuestra marina debe tener fuertes capacidades para defender todas estas aguas de cualquier forma de interferencia china. Tenemos que presupuestar para mantener esta flota, así que ¿por qué esperar?"
 JAP_yamato_reborn: "Renacer de la Yamato"
 JAP_yamato_reborn_desc: "La Yamato no fue una clase de acorazado cualquiera; era la embarcación dominante en la Armada Imperial Japonesa y un testimonio del dominio del Sol Naciente sobre sus adversarios. Desde su hundimiento, nunca ha habido intentos de construir una embarcación de escala similar. Sin embargo, las amenazas planteadas por la PLAN exigen que sea revivida, y por la buena voluntad del Mundo Libre, este llamado será respondido."
 JAP_confront_chinese_maritime_dominance: "Confrontar el dominio marítimo chino"
 JAP_confront_chinese_maritime_dominance_desc: "La Armada del EPL representa una seria amenaza para nuestro dominio de los mares. La nación china tiene una ventaja mucho mayor sobre nosotros y podría superar seriamente la producción de nuestra Armada. Para combatir esto, nuestra flota debe ser de la más alta calidad del mundo. Ningún buque japonés envidiará jamás a sus homólogos chinos, y cuando llegue el momento, los buques de China estarán a merced de la Fuerza Marítima de Autodefensa."
 JAP_the_mosquito_fleet: "La flota mosquito"
 JAP_the_mosquito_fleet_desc: "Aunque en el pasado hemos preferido operar bajo un sistema de Armada, nuestra situación actual demuestra que es casi imposible mantener uno cuando se lucha contra la fábrica del mundo. En su lugar, funcionaremos bajo la premisa de embarcaciones ligeras, baratas pero avanzadas para competir mejor con la Armada del EPL en sus números."
 JAP_focus_on_helicopter_carriers: "Priorizar los portahelicópteros"
 JAP_focus_on_helicopter_carriers_desc: "Mantener la superioridad aérea es vital en el combate naval, como lo demostraron nuestros graves errores en los últimos años de la Segunda Guerra Mundial. Los helicópteros ayudarían en este campo, por lo que cambiaremos nuestros astilleros a la producción de portahelicópteros para ayudarles a operar en mayor número contra los buques enemigos."
 JAP_a_new_generation_escort: "Nueva generación de escoltas"
 JAP_a_new_generation_escort_desc: "Una nueva marina exige una escolta de nueva generación a su lado. Nuestras clases actuales de destructores y fragatas funcionan bastante bien, pero los recientes avances tecnológicos hacen evidente la necesidad de que se adapten a las realidades modernas. Una escolta elegante, altamente automatizada, sigilosa y con gran cantidad de drones, equipada con los últimos avances en IA, diseñada para cada misión a la vez."
 JAP_sink_their_supply: "Hundir su suministro"
 JAP_sink_their_supply_desc: "La Armada del EPL, al igual que la mayoría de las flotas en Asia, requería una cadena de suministro constante para mantener sus operaciones. Lidiar con esta cadena de suministro es vital para neutralizar las ventajas de la Armada del EPL sobre nuestras flotas. ¡Al cortar el cuello del dragón, ya no podrá escupir fuego sobre el Pacífico!"
 JAP_hit_and_run_tactics: "Tácticas de ataque y fuga"
 JAP_hit_and_run_tactics_desc: "En una batalla uno a uno entre nuestra marina de escolta y la Armada del EPL, es probable que la victoria no sea un resultado que debamos esperar. Pero, ¿por qué esperar tal situación en primer lugar? Nuestras flotas funcionarían mucho mejor bajo la doctrina de las tácticas de ataque y fuga, mermando lentamente la fuerza de la Armada del EPL hasta que el dominio de Japón sobre todas las flotas de China sea incuestionable."
 JAP_a_nation_of_the_greatest_admirals: "Nación de los mejores almirantes"
 JAP_a_nation_of_the_greatest_admirals_desc: "La nación japonesa es una nación con una larga historia de almirantes legendarios. Tōgō, Yamamoto, Nagano, Ozawa y muchos más han llevado a sus flotas a la gloria en maniobras espectaculares. Aunque algunos de estos hombres son controvertidos según los estándares modernos, sus logros no deberían verse eclipsados por ello. ¡Muy pronto, una nueva generación de grandes almirantes se alzará en defensa de la OTDP contra todos los que se atrevan a oponerse a su soberanía!"
 JAP_the_fleets_of_asia_are_strong_and_united: "Las flotas de Asia"
 JAP_the_fleets_of_asia_are_strong_and_united_desc: "Al considerar nuestras esperanzas de victoria, no debemos mirar solo nuestros puertos. Nuestros aliados también dependen de los mares para sobrevivir, lo que significa que sus armadas no son muy diferentes de las nuestras. Es deber de Japón apoyar a las armadas de la OTDP no como un hegemón, sino como la voz guía que impulsará a todas las flotas de Asia contra las esperanzas de superioridad de China."

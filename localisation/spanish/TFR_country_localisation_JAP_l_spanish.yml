 JAP_taiwan_war_category: "La guerra de Taiwán"
 JAP_taiwan_war_category_desc: "Asia ha vuelto a estar en llamas. Los ejércitos de la República Popular China han lanzado una invasión al estado libre e independiente de Taiwán; se han reportado desembarcos navales en toda la isla, se han saboteado instalaciones militares específicas, y Taipéi y otras ciudades sufren bombardeos aéreos.\n\nNi nosotros ni el resto de la OTDP nos quedaremos de brazos cruzados ante esta barbarie perpetrada contra nuestro aliado. No flaquearemos ni cederemos ante la guerra. No. La democracia en Asia está en juego, la vida y la libertad de las personas están en juego, ¡y la defenderemos con todas nuestras fuerzas!"
 JAP_national_diet_category: "Dieta Nacional"
 JAP_national_diet_category_desc: "\n\n\n\n\n£GFX_JAP_national_diet_banner\n\n\n\n\n\n\n\n§YLa Dieta Nacional de Japón§! es el máximo órgano de poder estatal y el único órgano legislativo del Estado. Está compuesta por dos cámaras: la Cámara de Representantes y la Cámara de Consejeros. El Parlamento japonés desempeña un papel importante en la vida política del país, tomando decisiones y leyes clave que afectan la vida de los ciudadanos. [JAP_election_when] [JAP_election_category_desc]"
 JAP_election_soon: "§YCon las próximas elecciones, que tendrán lugar en octubre de 2021, es importante comenzar a prepararse para el evento.§!"

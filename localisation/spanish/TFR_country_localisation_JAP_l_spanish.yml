 jap.188.t: "Nuevo rumbo del capitalismo japonés"
 jap.188.d: "Por muy decidido que esté el maquinista, esto no le da libertad a la locomotora. Este o aquel maquinista es puesto en esta o aquella locomotora por la voluntad caprichosa de los dioses. Sin embargo, casi toda locomotora, hasta que se oxida por completo, avanza. Esta es la majestad externa de la locomotora.\n\nCada uno de nosotros es una locomotora. Nuestro trabajo no es más que humo y chispas que lanzamos al cielo. La gente que camina por el terraplén del ferrocarril sabe por el humo y las chispas que se acerca una locomotora de vapor. O que acaba de pasar. El humo y las chispas, si hablamos de una locomotora eléctrica, pueden ser reemplazados por un estruendo.\n\nJapón es la locomotora de vapor, y nuestra economía son los raíles por los que el tren se precipita. Sin embargo, los raíles tienden a oxidarse y deteriorarse, y la misma situación le ha ocurrido a nuestra economía. Años de burocracia inflada, rígida etiqueta corporativa, falta de iniciativa privada y pereza de los trabajadores japoneses, y atraso tecnológico son solo las razones más destacadas de nuestro fracaso. La guerra en Taiwán abrió esta pústula, y estamos viendo las consecuencias de décadas de negligencia de estos problemas. Ahora tendremos que reorganizar nuestra economía, y para lograrlo todos tendremos que trabajar mucho más duro que antes, incluso sin vacaciones pagadas ni horas extras. Tendremos que convertirnos en una sola máquina, y cada uno de nosotros en un engranaje de ella. Pero no desesperéis: nuestro sacrificio será recordado por nuestros hijos y nietos, os lo aseguro. Después de todo, no tenemos derecho a cometer un segundo error así.\n\nPor eso las palabras de Flaubert me resultan tan cercanas:"
 jap.188.a: "\"El hombre no es nada, la obra - todo\"."
 jap.189.t: "Digitalización"
 jap.189.d: "Hay un chiste: en los años 80, Japón estaba en los 2000, y en los 2020 sigue estando allí. Por mucho que nos cueste admitirlo, este juicio no es un chiste. Hay muchas razones para este fenómeno: ya sea el enfoque extremadamente conservador tanto del Gobierno como de las empresas en relación con los métodos de transmisión de información, las consecuencias de los años 90, todo esto afecta significativamente nuestra economía y, como resultado, la capacidad de combate de nuestro ejército.\n\nPara la victoria, necesitamos la digitalización. La única pregunta es cómo abordarla.\n\nEl primer enfoque implica una digitalización \"suave\". Japón es conocido como un país de armonía, y no hay razón para que destruyamos décadas de tradición, como hicieron nuestros vecinos comunistas en busca de ganancias. En cambio, daremos ejemplo tanto a empresas como a ciudadanos comenzando la digitalización de nuestro Gobierno. No más burocracia: todo lo que tienes que hacer es iniciar sesión en la aplicación de tu teléfono. Pagar multas, la residencia digital, llamar a un médico o quejarse de un problema urgente ya no obligará a nuestros ciudadanos a llevar decenas de hojas consigo. Y las corporaciones, observando nuestros éxitos, comenzarán el proceso de digitalización por sí mismas.\n\nSin embargo, hay una segunda vía. La situación en la que se encuentra Japón no puede resolverse con medias tintas. Necesitamos la digitalización de toda la sociedad. Ya tenemos proyectos como Sociedad 5.0 destinados a atraer las últimas tecnologías, la única pregunta es la implementación, que se ralentiza por los procesos en nuestra sociedad. A corto plazo, este enfoque causará un descontento obvio entre todos los segmentos de la sociedad, desde los líderes de partidos conservadores y los magnates de los negocios hasta los trabajadores comunes, pero es este enfoque el que nos permitirá salir para siempre del pozo en el que se encuentra nuestro país. Además, imagina Tokio en solo 10 años: un taxi sin conductor, robots en las calles e IA en el trabajo, pago sin contacto y servicios 5G, ¿te gusta cómo suena? Entonces guarda silencio y acepta las nuevas realidades.\n\nLa elección es suya, Sr. primer ministro."
 jap.189.a: "Limitémonos a la digitalización del Gobierno."
 jap.189.b: "¡Necesitamos una digitalización completa!"
 jap.190.t: "Reiwa logrado"
 jap.190.d: "La guerra en Taiwán, que perdimos debido a diversos factores socioeconómicos, dejó una cicatriz en el rostro de nuestro país que, como nos parecía en ese momento, no podía ocultarse. La economía estaba en ruinas, el ejército deshonrado y el pueblo japonés, antes orgulloso y trabajador, se encontraba en un estado que no había experimentado desde la vergonzosa derrota de 1945.\n\nPero aun así, nos negamos a darlo por sentado. Japón fue capaz de encontrar una salida incluso a una situación tan grave. La economía japonesa está experimentando un auge sin precedentes, y la marca \"Hecho en Japón\" vuelve a llenar los estantes de las tiendas de todo el mundo. Los productos de Toyota, Toshiba y Sharp son en muchos aspectos superiores a los de los competidores europeos, Internet vuelve a experimentar un período de japonización y los empresarios están invirtiendo cantidades sin precedentes en el sector financiero.\nEl sueño japonés ha resurgido: conservador, tradicional, y nuestra gente vuelve a ser leal a su Estado y al emperador. Las sonrisas de las madres y las risas de los niños vuelven a ser visibles en las calles, los jóvenes regresan a los pueblos y Tokio se está transformando lentamente de una metrópolis abarrotada en la ciudad del futuro.\n\nTiempos difíciles esperan al Imperio. El enemigo al otro lado del mar ya está preparando su máquina de guerra para intentar destruirnos. Pero aún tenemos tiempo para prepararnos y cortarle la cabeza a la serpiente roja de una vez por todas.\n\nCuando lleguen, estaremos listos."
 jap.190.a: "Mañana será mejor."

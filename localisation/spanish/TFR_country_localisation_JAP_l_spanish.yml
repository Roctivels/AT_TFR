 JAP_south_america_cooperation: "Cooperación con Japón"
 JAP_asean_oil_desc: "Si bien nuestra relación con los países de la ASEAN ha estado marcada por circunstancias y alianzas cambiantes, necesitamos su amistad ahora más que nunca. El petróleo de Malasia e Indonesia sin duda aliviará parcialmente y temporalmente nuestras menguantes reservas de petróleo."
 JAP_russian_deal_desc: "Muchos de nuestros aliados discreparán, pero dadas nuestras difíciles circunstancias, incluso antiguos enemigos pueden convertirse en nuestros nuevos amigos. La compra de petróleo ruso se vio restringida debido a nuestros vínculos con Estados Unidos; sin embargo, ahora que apenas se mantienen unidos, debemos utilizar todas las fuentes de petróleo a nuestra disposición. Al fin y al cabo, el proceso no importa, lo que importa es el resultado."

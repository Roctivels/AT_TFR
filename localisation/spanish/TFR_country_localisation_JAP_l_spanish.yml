 JAP_aging_population_idea: "Población anciana"
 JAP_aging_population_idea_desc: "Más del 27,3% de la población japonesa es considerada de tercera edad, debido principalmente a un período de infertilidad tras el baby boom de la posguerra de la década de 1940 y a una alta esperanza de vida. A pesar del extremo desequilibrio demográfico, no existe una sensación real de crisis demográfica, y el nivel de vida se mantiene relativamente alto en la actualidad. Sin embargo, esto ha generado una gran presión económica sobre la ya estancada economía japonesa, debido en gran medida a la gran cantidad de población jubilada y a la gran necesidad de servicios de atención que recae sobre el Gobierno.\n\nEl Gobierno japonés ha comenzado a introducir nuevas formas para que las personas mayores se incorporen de nuevo a la sociedad, a la vez que subvenciona a las nuevas familias y fomenta firmemente el nacimiento de nuevos hijos con servicios de enfermería más sencillos."

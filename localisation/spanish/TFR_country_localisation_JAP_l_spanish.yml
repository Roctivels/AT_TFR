 jap.81.t: "Cuestión de las islas Kuriles"
 jap.81.d: "Las islas Kuriles, compuestas por Kunashir, Iturup, las Islas Habomai y Shikotan, poseen una enorme importancia estratégica. Protegen la desembocadura del Mar de Ojotsk, controlan rutas marítimas vitales y poseen ricos recursos pesqueros, además de potenciales reservas de petróleo y gas natural. En las últimas décadas, Japón y Rusia han experimentado una serie de protestas, acuerdos y conflictos por la soberanía de estas islas.\n\nSin embargo, el Gobierno japonés se centra ahora en contrarrestar la creciente influencia de China, y muchos dentro del Gobierno creen que Japón no es capaz ni está en condiciones de seguir antagonizando a Rusia. Resolver el problema de las Islas Kuriles podría aliviar las presiones defensivas de Japón en el norte y allanar el camino para una serie de acuerdos comerciales con Rusia que impulsen el desarrollo económico. Aun así, algunos argumentan que Japón no debería renunciar a sus reivindicaciones sobre estos territorios inherentes."
 jap.81.a: "Llegó la hora de firmar la paz..."
 jap.81.b: "Dejemos la cuestión en segundo plano."
 jap.82.t: "Tratado de paz ruso-japonés"
 jap.82.d: "Después de largas y complicadas negociaciones, el Gobierno japonés finalmente ha firmado un tratado de paz histórico con la Federación de Rusia, renunciando oficialmente a sus reclamaciones sobre las Islas Kuriles del Sur, que Japón llama Islas Habomai, Shikotan, Kunashir e Iturup.\n\nAunque este tratado representa el comienzo de una nueva era en las relaciones entre Japón y Rusia, el ambiente en Tokio es algo mixto. Una gran multitud se ha congregado frente al Kantei. Los partidarios creen que resolver la disputa territorial es un paso necesario hacia la paz y la estabilidad a largo plazo. Sin embargo, los detractores critican la debilidad del Gobierno, considerándola una traición a la dignidad y el orgullo nacional, así como un abandono de los agravios históricos."
 jap.82.a: "¡Finalmente!"
 jap.83.t: "Mayor cooperación con Japón"
 jap.83.d: "Una ola de reactivación económica ha azotado el Extremo Oriente ruso. Inversiones japonesas masivas han llegado como una oleada, abarcando desde el desarrollo energético hasta proyectos de infraestructura. Las plantas procesadoras de pescado han adoptado las tecnologías y equipos avanzados de Japón, y el comercio de madera ha experimentado un rápido crecimiento, con la exportación de los vastos recursos forestales rusos a todo el mundo a través de canales japoneses.\n\nLos productos japoneses ahora llenan los estantes de los centros comerciales de toda Rusia, ofreciendo desde electrónica de alta tecnología hasta artículos de primera necesidad, satisfaciendo prácticamente todas las necesidades del consumidor local. Fábricas antes deterioradas en el Extremo Oriente se han revitalizado con financiación y tecnología japonesas, impulsando un auge en el mercado laboral local. Las modernas líneas de producción operan sin interrupción, absorbiendo una gran cantidad de mano de obra e impulsando el crecimiento económico, mejorando considerablemente el nivel de vida de los residentes de la región."
 jap.83.a: "¡Bien!"
 jap.84.t: "Inversiones rusas"
 jap.84.d: "Desde el fortalecimiento de nuestra cooperación, las empresas energéticas rusas han establecido alianzas estratégicas con empresas energéticas de nuestro país. Juntas, han cooperado en la construcción de múltiples oleoductos y terminales de recepción de gas natural licuado, garantizando la estabilidad y seguridad de nuestro suministro energético. Además, Rusia ha emprendido la construcción de varios proyectos nacionales de gran envergadura, incluyendo ferrocarriles de alta velocidad, puertos y puentes. En particular, la inversión rusa ha mejorado significativamente las condiciones del transporte en la región de Hokkaido, impulsando el turismo y las industrias relacionadas.\n\nAdemás de la cooperación económica, Japón y Rusia han logrado avances significativos en los intercambios culturales. El rock y el punk rusos han ganado considerable popularidad en el mercado japonés. Asimismo, ambos países han cosechado numerosos éxitos en el intercambio cinematográfico. Tanto es así que Soyuzmultfilm inició una colaboración con varios estudios de anime para crear una serie de dibujos animados ruso-japonesa, intercambiando así experiencias en la creación de dibujos animados. Además, la afluencia de películas y series rusas inundó Japón, y la serie \"Rey y Bufón\" (doblada en japonés como Korol' i Shut) se popularizó en Japón."
 jap.84.a: "¡Hermanos para siempre!"
 jap.85.t: "Cooperación económica con Rusia"
 jap.85.d: "Tras la firma del tratado, el comercio bilateral entre Japón y Rusia experimentó un auge significativo. Gracias a la reducción de las barreras arancelarias y a la implementación gradual de medidas de facilitación del comercio, las exportaciones japonesas a Rusia alcanzaron avances notables, especialmente en sectores como la automoción, la electrónica y la maquinaria de alta gama, con un aumento significativo en los volúmenes de exportación. Al mismo tiempo, se ha suministrado continuamente a Japón recursos energéticos rusos, como petróleo, gas natural y carbón, lo que ha aliviado considerablemente la prolongada escasez de energía de Japón.\n\nAdemás del auge comercial, la cooperación en el sector de la inversión entre Japón y Rusia se ha profundizado y diversificado. Empresas japonesas han participado en el desarrollo de múltiples regiones del Extremo Oriente y Siberia Central de Rusia, con inversiones que abarcan energía, construcción de infraestructuras, agricultura, turismo e industrias de alta tecnología. Por otro lado, las empresas rusas han incrementado su inversión en el mercado japonés, especialmente en energía, minerales y silvicultura, promoviendo un flujo bidireccional de inversiones bilaterales.\n\nEn cuanto a la cooperación tecnológica, ambos países han participado en una amplia colaboración en investigación e intercambios tecnológicos. Especialmente en el campo de la robótica, la experiencia tecnológica de Japón se ha combinado con la demanda del mercado ruso, lo que ha llevado al desarrollo y la aplicación práctica de varios productos innovadores."
 jap.86.d: ""
 jap.87.t: "Mayor radicalismo anti-PLD"
 jap.87.d: "Noticias preocupantes en todo el país: con el poder del PLD más afianzado y la influencia de otros partidos considerablemente disminuida, elementos más radicales se han arraigado en los corazones y las mentes del pueblo japonés.\n\nDesde grupos alineados con la democracia, populistas, activistas e incluso facciones más volátiles, todos han tomado medidas mayoritariamente pacíficas contra el actual monopolio político del PLD en Japón.\n\nCon la creciente presencia de voces disidentes, no habrá un día sin noticias de actividades radicales; sin embargo, con la férrea influencia de la ley y el orden de nuestro lado, se necesitaría un desastre para que cayéramos."
 jap.87.a: "¡No nos rendiremos!"
 jap.88.t: "Vota o pierde"
 jap.88.d: "\"¿Y qué? ¿Por qué debería votar sobre algo que realmente no me importa?\"\n\nHa sido un día largo para Takeshi y Akio. La política nacional es un laberinto de matices y tratos secretos. Se forman coaliciones y los miembros se convierten en pesos pesados de las resoluciones, tratando de inclinar la balanza a su favor. Uno de los muchos bares de Tokio estaba desierto cuando los dos parlamentarios se sentaron a disfrutar de un par de cervezas.\n\nAkio sonrió; siempre había visto a Takeshi como un idealista en ocasiones, y en otras, como un terco que se mantenía firme en sus convicciones.\n\n\"Bueno, ya sabes cómo funciona esto, el objetivo de las coaliciones es que todos estemos en la misma sintonía\".\n\n\"Sí, pero este tipo de cosas requieren una investigación a fondo; no sé mucho sobre el tema y solo quieres que vote según lo que mi instinto me dice que no vote\". Takeshi ya estaba un poco achispado, Akio le estaba dando la lata y prefería cambiar de tema.\n\n\"Además, ¿crees que tu carrera sobreviviría si los demás supieran que te comportas como un niño...?\"\n\n\"¡Está bien! ¡Está bien! Votaré, solo... déjalo ya y disfrutemos, ¿vale?\"\n\nAkio sonrió de nuevo, con un tono más cálido. \"Listo, si te sirve de algo, yo pago la cuenta\"."
 jap.88.a: "La libertad conlleva responsabilidad."
 jap.89.t: "La cuestión de la elección"
 jap.89.d: "Era un día lluvioso, y el sol parecía haberse escondido por completo mientras un grupo de personas esperaba pacientemente en la fila. Entre ellos, una joven pareja, un hombre y una mujer, destacaban; él sostenía un paraguas, protegiendo a su amada de la lluvia.\n\n\"¿Cuánto falta?\", preguntó la mujer, con un tono de impaciencia.\n\n\"No mucho, no hay razón para estar tan desanimada. Es importante votar, hacer que nuestra voz se escuche, ¿no crees?\". El hombre le sonrió con ternura mientras observaba cómo la fila avanzaba hacia el edificio. Las elecciones municipales estaban a la vuelta de la esquina, y el periodo de votación ofrecía a la gente la oportunidad de expresar su opinión, ya fuera de satisfacción o descontento con la situación actual, aunque a un nivel más cercano.\n\n\"¿Y qué sentido tiene? El PLD va a ganar de todos modos, como ha sido durante años. Podría estar en casa, calentita y cómoda, contigo, pero aquí estamos, atrapados bajo esta lluvia interminable\".\n\nEl hombre soltó una risita. \"Bueno, solo tenemos nuestra voz y tiempo. Si los tenemos, ¿por qué no aprovecharlos ahora? Además, quién sabe, tal vez con el tiempo veamos un cambio real\".\n\n\"Está bien, pero después de esto, me debes un pastel\"."
 jap.89.a: "Así es la vida."
 jap.90.t: "Mano férrea de la justicia"
 jap.90.d: "Había pasado un tiempo desde la guerra en Taiwán. Las calles estaban llenas de disturbios, y la violencia en todos los sectores políticos era una constante. El Gobierno luchaba por mantener la cohesión en el país.\n\nDesde su apartamento, un anciano observaba la agitación en las calles. Camiones militares pasaban frente a él cuando notó el alboroto en la calle más cercana.\n\nUn joven estaba gritando a uno de los soldados en un puesto de control militar. No era fácil entender lo que decía, pero la rabia en su voz era evidente. El soldado, por su parte, se mantuvo sereno. No era la primera vez que lidiaba con insultos, pero uno de sus compañeros perdió la paciencia y lo derribó con la culata de su rifle.\n\nEl anciano continuó mirando mientras se llevaban a rastras al joven caído. Dejó escapar un suspiro, sumido en sus pensamientos. Recientemente, el Gobierno japonés había impuesto la ley marcial, lo que había restringido considerablemente varias libertades. Extremistas habían sido arrestados y las calles estaban llenas de puestos de control militar.\n\nLos militares parecían demasiado paranoicos, pensó, quizás un poco duros también, pero entendía la necesidad de tales medidas; solo esperaba que Japón pudiera volver a la estabilidad pronto, y si eso significaba que los alborotadores debían recibir una lección, que así fuera."
 jap.90.a: "A eso lo llamo justicia."
 jap.91.t: "Muerte de Shinzo Abe"
 jap.91.d: "Noticias impactantes provenientes de la ciudad de Nara: el ex primer ministro Shinzo Abe fue atacado durante su discurso. Su discurso fue interrumpido por dos fuertes explosiones provenientes de la calle, detrás del político, acompañadas de grandes columnas de humo. El presunto agresor fue derribado al suelo y llevado por las fuerzas de seguridad.\n\nAbe fue trasladado en helicóptero al Hospital Universitario Médico de Nara, en la ciudad de Kashihara, donde fue declarado muerto. La autopsia oficial afirma que \"la bala atravesó la parte superior del brazo izquierdo de Abe y dañó un vaso sanguíneo bajo la clavícula\" y señala como causa oficial de la muerte \"pérdida de sangre\".\n\nEl agresor, Tetsuya Yamagami, de 41 años, no intentó escapar. Fue arrestado y está siendo interrogado por la policía."
 jap.91.a: "Buenas noches, dulce príncipe..."
 jap.92.t: "Iglesia de la Unificación"
 jap.92.d: "Según algunos informes, Yamagami declaró a los investigadores que no lo motivaba un desacuerdo con las creencias políticas de Abe, sino \"rumores sobre la conexión del exlíder con cierta organización que la policía no identificó\". Otros informes afirman que Yamagami culpó a \"cierta organización\" de haber llevado a la bancarrota a su madre, quien aparentemente donó una gran cantidad de dinero al grupo.\n\nLas especulaciones sobre la identidad de esta \"cierta organización\" se centran actualmente en la Iglesia de la Unificación. La Federación de Familias para la Paz y la Unificación Mundial -anteriormente llamada Iglesia de la Unificación, pero quizás más conocida como la iglesia a la que pertenecen los \"Moonies\"- fue fundada por el reverendo Sun Myung Moon en 1954. Otra organización que surge en asociación con Abe (y con la Iglesia de la Unificación) es Nippon Kaigi, descrita como la \"organización conservadora de derecha más grande y poderosa\". El PLD aún cuenta con miembros conservadores que participan en todas estas organizaciones, y surge la pregunta: ¿qué hacer con estos elementos? ¿Intentaremos expulsarlos de la política o intentaremos esperar hasta que todo mejore?"
 jap.92.a: "¡Debemos eliminar estos elementos de la política!"
 jap.92.b: "Deberíamos ignorarlo..."
 jap.93.t: "Hermandad japonesa-taiwanesa"
 jap.93.d: "La guerra de Taiwán ha destruido la vida de muchos. Contra el agresor chino, hemos sufrido junto a nuestros aliados en Taipéi, y en la guerra hemos encontrado hermandad.\n\nTras expulsar con éxito a los chinos al océano, nos quedamos con una intensa destrucción en las tierras de Taiwán, una lluvia de fuego amargo por parte de los chinos. Sin embargo, en esto hemos encontrado puntos en común.\n\nNos hemos esforzado por ayudar a Taiwán en su reconstrucción y, al construir nuevas defensas, hemos ganado tanta influencia sobre la isla que se teme que esto sea un regreso a los tiempos del sol naciente.\n\nNo tenemos esa intención, y con sonrisas radiantes y suficientes suministros podemos convencer al pueblo de Taiwán de que tenemos buenas intenciones."
 jap.93.a: "Dos soles, unidos."
 jap.94.t: "¡La crisis financiera llega a Japón!"
 jap.94.d: ""
 jap.94.a: "El fin del mundo como lo conocemos."
 jap.95.t: "¡Japón anula su deuda con Norteamérica!"
 jap.95.d: ""
 jap.95.a: "Por fin, somos libres."
 jap.96.t: "¡Elección presidencial del PLD!"
 jap.96.d: "Ha llegado la hora del próximo congreso del Partido Liberal Democrático de Japón, donde se decidirá el futuro del país y del partido. La cuestión en el orden del día es si el actual primer ministro debe continuar en el cargo o nominar a un nuevo candidato capaz de liderar el país en una nueva etapa de su desarrollo. Las facciones dentro del PLD están iniciando un intenso debate sobre si mantener al actual primer ministro en el cargo o elegir a un líder más prometedor para fortalecer la posición del partido. Independientemente del resultado de la votación, esta decisión tendrá un impacto decisivo en la política interna del PLD en los próximos años."
 jap.96.a: "Shigeru Ishiba."
 jap.96.b: "Fumio Kishida."
 jap.96.c: "Tarō Kōno."
 jap.96.e: "Sanae Takaichi."
 jap.96.f: "Shinjirō Koizumi."
 jap.96.g: "Shinzō Abe."
 jap.97.t: "Elecciones generales"
 jap.97.d: "Se celebran manifestaciones de apoyo al PLD en todo el país, mientras que la oposición pierde terreno, incapaz de ofrecer una alternativa comparable al triunfo del partido. La alegría de la victoria y el orgullo por los logros nacionales impregnan a toda la sociedad, desde las zonas rurales hasta las megaciudades. Alentados por este éxito, los votantes acuden masivamente a las urnas para apoyar al PLD en las próximas elecciones parlamentarias.\n\nLos analistas políticos ya han bautizado este momento como la \"Ola Patriótica\", ya que el sentimiento electoral parece ser absolutamente dominante a favor del PLD. Las encuestas muestran índices de apoyo récord, mientras que las campañas electorales de los partidos de la oposición apenas atraen la atención de los medios. Se espera que el PLD gane con facilidad, manteniendo su mayoría en el parlamento y un mandato aún más sólido para continuar con sus políticas."
 jap.97.a: "¡Victoria!"
 jap.98.t: "Asociación coreano-japonesa"
 jap.98.d: "Tras una gran victoria sobre los agresores chinos en la península de Corea, hemos acumulado una considerable buena voluntad en todo el continente. Quienes lucharon con nosotros como aliados nos han visto con una perspectiva mucho más positiva, entre ellos Corea.\n\nNuestra historia con Corea no siempre ha sido positiva; sin embargo, el pasado es un obstáculo para ambos pueblos que nos frena. Con la cantidad de esfuerzo, recursos, vidas y fondos invertidos en Corea, surge poco a poco la pregunta de si podremos reavivar una nueva amistad eterna.\n\nEsto, por supuesto, genera reacciones contradictorias: algunos temen que se trate de otro intento de neoimperialismo, mientras que otros no ven sentido en añadirnos cargas. Obviamente, esto nunca alcanzará los mismos niveles que hace años, pero siempre habrá voces de protesta. Sin embargo, muchos coinciden; algunos lo ven como un mensaje claro al resto del mundo: un ataque a Corea es un ataque a Japón, y una señal de que nuestras relaciones han sanado.\n\nAl final del día, todavía hay que tomar una decisión."
 jap.98.a: "¡Dejemos atrás el pasado y forjemos una amistad eterna!"
 jap.98.b: "No deberíamos excedernos..."
 jap.99.t: "¡Shinzo Abe regresa a la política!"
 jap.99.d: "Tras luchar durante un tiempo contra la colitis ulcerosa, el ex primer ministro Shinzo Abe anunció sorpresivamente su regreso a la política japonesa. En general, esto se ha considerado positivo, aunque algunos críticos han expresado su pesimismo ante la posibilidad de un retorno al statu quo.\n\nEl PLD lo ha recibido con los brazos abiertos y Shinzo ya ha dejado claro que aspira de nuevo al cargo de primer ministro, ojalá esta vez con menos problemas de salud."
 jap.99.a: "El Retorno del Rey."
 jap.100.t: "Objetivos de la modernización del ejército"
 jap.100.d: "La situación en el estrecho de Taiwán se ha intensificado rápidamente y, aunque el conflicto se ha calmado temporalmente, el desempeño de las Fuerzas de Autodefensa ha revelado graves deficiencias, algunas de las cuales son lo suficientemente significativas como para amenazar sus capacidades de combate básicas. Si estos problemas no se abordan a tiempo, sino que se ignoran, será difícil mantener la preparación para el combate de nuestras fuerzas armadas en su nivel actual, e incluso podría experimentar un declive significativo. Por lo tanto, implementar reformas integrales de modernización militar es una tarea urgente e impostergable.\n\nNuestro objetivo ya no es simplemente confiar en las Fuerzas de Autodefensa para defender el territorio de Japón. En cambio, debemos transformarlas en una fuerza multifuncional e integral, capaz de responder a situaciones internacionales complejas. Tras el colapso de Estados Unidos, es evidente que las ambiciones de China no se detendrán en Taiwán; su expansión estratégica está amenazando gradualmente la estabilidad y la seguridad de toda la región de Asia Oriental. Japón debe realizar ajustes estratégicos y fortalecer integralmente la capacidad de combate de sus Fuerzas de Autodefensa, no solo para defender su territorio, sino también para adquirir la capacidad de intervenir en los asuntos regionales. Solo así podrá desempeñar un papel clave en la configuración del futuro orden del Pacífico Oriental."
 jap.100.a: "¡Empezemos!"
 jap.101.t: "Estado de la Fuerza Terrestre de Autodefensa de Japón"
 jap.101.d: "Título del informe: Problemas expuestos por la Fuerza Terrestre de Autodefensa\n\nDurante el enfrentamiento con China, la Fuerza Terrestre de Autodefensa expuso varios problemas críticos, como la desorganización de las estructuras de mando, el mantenimiento insuficiente del equipo y la baja moral en algunas unidades. Estos problemas han afectado gravemente la eficacia en combate de las fuerzas.\n\nEn la guerra de Taiwán, las operaciones conjuntas entre el ejército, la Fuerza Marítima y la Fuerza Aérea revelaron importantes problemas de mando y coordinación. La falta de comunicación efectiva entre las divisiones del ejército provocó operaciones fragmentadas, ritmos de ataque desordenados y la pérdida de oportunidades. La causa principal radica en el desarrollo incompleto del mecanismo operativo conjunto entre los tres servicios, con la ausencia de una estructura unificada de mando y coordinación. Esto provocó retrasos en la transmisión de información y dificultades para implementar eficazmente los planes de combate.\n\nEl mantenimiento inadecuado del equipo también afectó gravemente la eficacia en combate. Por ejemplo, algunos tanques y vehículos blindados sufrieron fallos en los motores, lo que les impidió operar; las piezas de artillería sufrieron explosiones en sus cañones debido al mantenimiento deficiente; y las armas personales se oxidaron por la humedad, dejándolas inutilizables.\n\nLa baja moral y el miedo al combate se extendieron entre algunas unidades del ejército. Ante la feroz resistencia enemiga, algunas unidades se mostraron reacias a luchar, e incluso algunas desertaron. Tras un intenso bombardeo enemigo, algunos soldados entraron en pánico y se dispersaron, lo que afectó gravemente la moral de otras unidades."
 jap.101.a: "Hay mucho que hacer."
 jap.102.t: "Estado de la Fuerza Aérea de Autodefensa de Japón"
 jap.102.d: "Título del informe: Problemas expuestos por la Fuerza Aérea de Autodefensa\n\nAeronaves obsoletas: Nuestros principales aviones de combate, como el F-15J y el F-2, llevan mucho tiempo en servicio, y sus sistemas de aviónica y armamento son obsoletos en comparación con las aeronaves de nueva generación de la Fuerza Aérea del Ejército Popular de Liberación (FAELP). Esto ha dejado a nuestras fuerzas en una posición pasiva durante el combate aéreo, lo que dificulta contrarrestar eficazmente a los aviones avanzados de la Fuerza Aérea china, como el J-20.\n\nCapacidad insuficiente de combate con drones: Nuestra inversión e investigación en guerra con drones han sido significativamente insuficientes. El número limitado y el rendimiento obsoleto de nuestros drones actuales dificultan contrarrestar eficazmente las tácticas de enjambre de drones de la FAELP.\n\nRecopilación Insuficiente de Inteligencia: Al inicio del conflicto, nuestra evaluación de las capacidades de la FAELP fue significativamente errónea, lo que provocó errores en el despliegue táctico. Esto revela una clara deficiencia en nuestra capacidad de recopilación y análisis de inteligencia.\n\nCapacidades de guerra electrónica débiles: La FAELP demostró una sólida capacidad de guerra electrónica durante el conflicto, interfiriendo eficazmente con nuestros sistemas de radar y comunicación. Nuestra respuesta en el ámbito de la guerra electrónica fue insuficiente, lo que nos puso en desventaja en la recopilación de información y el mando y control."
 jap.102.a: "A los cielos..."
 jap.103.t: "Estado de la Fuerza Marítima de Autodefensa de Japón"
 jap.103.d: "La guerra de Taiwán ha revelado varias deficiencias en la Fuerza Marítima de Autodefensa de Japón. Si estas deficiencias no se abordan con prontitud, limitarán gravemente su papel en futuros conflictos regionales e incluso podrían poner en peligro su propia seguridad.\n\nEl problema principal es la falta de previsión estratégica. La Fuerza Marítima se ha centrado durante mucho tiempo sus prioridades estratégicas en contrarrestar las amenazas marítimas tradicionales. Sin embargo, su capacidad para anticipar y responder a nuevas formas de guerra, como la guerra híbrida, la guerra de la información y la ciberguerra en el contexto de los conflictos modernos, es claramente insuficiente.\n\nEn segundo lugar, se observa un declive relativo del poder militar. A pesar de que la Fuerza Marítima poseen buques y equipos avanzados, su ventaja disminuye constantemente ante el rápido crecimiento de las capacidades militares del Ejército Popular de Liberación. En los últimos años, la Armada china ha llevado a cabo la puesta en servicio a gran escala de nuevos destructores, fragatas, submarinos y portaaviones, mejorando significativamente tanto la cantidad como la calidad."
 jap.103.a: "Eventualmente, los superaremos."
 jap.104.t: "Gran desfile militar en Tokio"
 jap.104.d: "Hoy, las calles de Tokio estaban llenas de miles de personas, emocionadas por presenciar el gran desfile. La multitud, ondeando sus Banderas del Sol Naciente, rebosaba de entusiasmo y expectativa. Este fue el mayor desfile militar que Japón había visto en el siglo XXI, un momento clave para que la nación mostrara su poderío militar tras décadas de moderación bajo la Constitución de la Paz.\n\nEl desfile comenzó con el estruendoso rugido de los cazas F-35, pintados de azul, surcando el cielo. Detrás de ellos, una formación de carros de combate principales Tipo 10, obuses autopropulsados Tipo 99 y vehículos de combate de infantería Tipo 89 avanzaban por el corazón de Tokio, recibiendo vítores de la multitud. Luego llegó el enorme portaaviones ligero \"Izumo\", escoltado por varias fragatas, navegando lentamente por la bahía de Tokio. En su cubierta, se encontraban helicópteros antisubmarinos SH-60K y cazas F-35B.\n\nEl momento culminante del desfile fue, sin duda, el discurso del primer ministro. Vestido con un traje negro, subió al podio ante la mirada expectante de la multitud.\n\n\"Durante décadas, Japón se ha mantenido fiel a su Constitución de Paz, pero el mundo actual está lejos de ser pacífico. El terrorismo y los conflictos regionales son amenazas constantes a nuestra seguridad\".\n\n\"Japón, como modelo de democracia y libertad en Asia y en el mundo, ¡no puede permanecer en silencio por más tiempo! ¡Romperemos las cadenas, asumiremos nuestras responsabilidades y nos mantendremos a la vanguardia de la defensa de la libertad y la democracia en Asia!\""
 jap.104.a: "¡Banzai!"
 jap.105.t: "Bajo el Sol Naciente"
 jap.105.d: "Al mirar atrás, el impresionante auge económico que vivimos se ha convertido en un recuerdo efímero, y las secuelas del colapso de la burbuja aún resuenan en todo el país. La generación más joven, atrapada en la cuna del consumismo, ha crecido rodeada de deseos materiales, mientras que su sentido de identidad nacional y cultural se ha desvanecido silenciosamente en la comodidad de la vida cotidiana. Frente a múltiples presiones, como el estancamiento económico y el envejecimiento de la población, debemos reconocer que solo reavivando la llama del patriotismo en el corazón del pueblo podremos unir a la nación y revitalizar nuestro espíritu. Sin embargo, la sombra de la derrota en la guerra, las limitaciones de la Constitución de la Paz y la profunda reflexión sobre el militarismo han convertido el patriotismo en un tema delicado y complejo en Japón, lo que ha generado dudas.\n\n¿Cómo podemos inspirar amor por la patria sin despertar el fantasma del militarismo? Este sigue siendo un dilema sin resolver. Existen muchas opiniones divergentes dentro del Gobierno, sin un consenso claro. En última instancia, los debates se centran en si Japón debe rearmarse y adoptar una postura más firme para reafirmarse en el escenario internacional y recuperar la gloria nacional.\n\nSin embargo, las discusiones políticas por sí solas no pueden llegar al corazón de la gente. Debemos buscar respuestas en lo profundo de nuestra cultura. Desde la resiliencia del espíritu del Bushido hasta la belleza efímera de la caída de los cerezos en flor, pasando por la profundidad de las artes tradicionales como la ceremonia del té y los arreglos florales, hasta la resonancia emocional de la cultura pop moderna como el anime y los videojuegos, todo esto puede servir como clave para despertar la pasión patriótica de las generaciones más jóvenes. Solo así podremos reavivar el sentimiento patriótico profundamente arraigado en la nueva generación de nuestra nación."
 jap.105.a: "Mientras los cerezos se arremolinan, el alma encuentra su camino."
 jap.106.t: "Reporte post-guerra de NHK"
 jap.106.d: "\"Y con esto, llegamos al final de nuestro informe meteorológico. Ahora, Fumiko nos trae su actualización sobre Taiwán y la situación del conflicto. Adelante, Fumiko\".\n\n\"Gracias, Akane. Como pueden ver detrás de mí, la reconstrucción de Taipéi está en pleno apogeo. Después de la operación de mantenimiento de la paz de las fuerzas japonesas para salvaguardar la independencia de Taiwán, algunas de nuestras tropas siguen aquí en esta hermosa isla, asegurando la paz y la seguridad del país hasta que ya no las necesiten.\n\n\"Sin embargo, nuestros amigos aquí y la buena gente de Japón han expresado su preocupación sobre si esta operación de mantenimiento de la paz solo busca el bienestar de Japón. Estoy completamente en desacuerdo con eso. Nuestras tropas están aquí para evitar que Taiwán sea ocupado por la hostil China y para frustrar cualquier plan de expansión futura en Asia. Además, estamos proporcionando los recursos que Taiwán necesita para su reconstrucción y para que pueda prosperar de nuevo. Esta vez, estarán más tranquilos, una vez que la amenaza inmediata de conflicto haya desaparecido.\n\n\"Con nuestro compromiso con la paz en Asia, nos aseguraremos de que los valientes sacrificios de nuestros hombres y mujeres no sean en vano, garantizando que la democracia siga brillando.\n\n\"Digan lo que quieran los críticos, no pueden negar que hemos mantenido la paz en Asia\"."
 jap.106.a: "\"Gracias, Fumiko. Ahora, los deportes\"."
 jap.107.t: "En los cuatro mares"
 jap.107.d: "La mente de Mohamed se alejaba cada vez más de las monótonas tareas que antes le traían tanta alegría, sumergiéndose en pensamientos sobre una patria que, irónicamente, había dejado atrás con satisfacción. Su trabajo se ralentizaba mientras soñaba con las tierras altas donde nació, o a veces con el curry que había preparado para el almuerzo.\n\nEn el pasado, había sentido una gran emoción al ver las costas de Japón, un país donde los hombres lucían impecables en sus billetes, todos tan correctos, occidentales y casi europeos. Era una nación de rascacielos y calles pulcras, donde parecía que no había animales callejeros, un lugar que quizás algún día podría explorar con el estómago lleno, deslumbrado por el sol como recompensa por sus esfuerzos.\n\nMientras se dirigía al trabajo, no podía evitar pensar en lo difícil que le resultaba leer lo que estaba escrito, en cómo le costaba hablar y en cómo la gente lo miraba con ojos inquisitivos en lugar de ofrecerle sonrisas sencillas. Quizás si lograba trabajar una semana más y cobrar su sueldo... Quizás si...\n\nDe repente, sus pensamientos fueron interrumpidos por el estridente silbato del almuerzo, y su mente se llenó de anhelos de comida, tranquilidad y un breve descanso.\n\nAl ver una bandada de gaviotas volar, sus ojos y su cabeza se volvieron involuntariamente hacia el sonido de un japonés que sonaba bien, elocuente y fluido. Un hombre, vestido como él, le dijo con un tono acogedor: \"¡Vamos a tener una reunión con todos los nuevos trabajadores en un bar cercano después del trabajo!\". Y, por primera vez sin ansiedad, Mohamed casi balbuceó: \"Sí, gracias\"."
 jap.107.a: "\"¿Y qué vas a almorzar?\""
 jap.108.t: "La charla"
 jap.108.d: "Kishi miró a Shinsato. Los rayos del sol apenas comenzaban a ocultarse entre las sombras de los árboles que los rodeaban, pero Kishi pudo ver claramente el rostro de su amigo, incluso a través del vaso de Ramune que tenía entre los labios. Eso le trajo a la mente el recuerdo de aquellos días en que compartían Coca-Cola en un banco de San Francisco, trabajando como asalariados de espíritus titánicos e intelectos brillantes que competían en el mundo del capital.\n\n\"América\".\n\n\"¿Mmm?\" Shinsato dejó su bebida y miró a Kishi con curiosidad.\n\n\"América, parece que todo va a explotar\".\n\nKishi puso los ojos en blanco y tomó un sorbo sin decir nada, pero Kishi no se detuvo: \"¿Crees que la bolsa se recuperará? Estoy un poco decepcionado\".\n\nEl vaso reposaba sobre la mesa y, con una sonrisa irónica y una mirada atenta, Shinsato respondió: \"Sí, estoy seguro de que todo saldrá bien. No te preocupes, como siempre\".\n\nKishi sonrió de una manera que le entregó su confianza a su amigo; esa expresión de total seguridad, visible en sus arrugas, era solo para él, porque nunca se había equivocado."
 jap.108.a: "\"Sí. Todo estará bien\"."
 jap.109.t: "Argumentos mordaces"
 jap.109.d: "La política nunca ha sido un tema que apasione mucho al pueblo japonés, pero después del reciente conflicto en Taiwán, cada vez más personas están comenzando a prestar atención a lo que sucede en la política interna de Japón. Con las campañas y el activismo en aumento, también ha crecido la audiencia de entrevistas políticas.\n\n\"Con todo respeto, Kato, el Artículo 9 ha demostrado una y otra vez que el pacifismo silencioso no sirve de nada. Tuvimos suerte de haber repelido la agresión china desde el principio. ¿Te imaginas si no tuviéramos una cláusula tan restrictiva en nuestra constitución?\"\n\nUn día más, un debate más en \"¡Vivir hasta la mañana!\", conducido por Soichiro Tahara, quien presentó a los espectadores a Sasaki, de la facción conservadors, y a Kato, de la facción liberal. Al principio, el debate transcurrió sin mucha emoción, pero cuando se tocó el tema del Artículo Nueve, las voces comenzaron a elevarse.\n\n\"El objetivo principal de Japón en cualquier conflicto es mantener la paz. Ya deberías saberlo, Sasaki: ya no somos una nación belicosa\".\n\n\"Con esta dedicación a la defensa, hemos tenido que enfrentar las hostilidades chinas; la guerra de Taiwán lo ha demostrado...\"\n\n\"¿Pero el conflicto no fue una guerra?\"\n\nSasaki se quedó en silencio, un poco sorprendido.\n\n\"No, no, Sasaki, la operación de Taiwán no fue una guerra, fue una operación de mantenimiento de la paz. No estábamos en Taiwán para expandir nuestros territorios ni para imponer nuestra voluntad a otra nación independiente; estábamos allí para preservar la paz en la isla y mantener su soberanía. Japón ha dejado atrás sus deseos expansionistas y, con el Artículo 9, seguiremos demostrando al mundo que no nos apartamos de nuestras intenciones.\"\n\n\"Bueno, sí... supongo... Cuando...\", tartamudeó Sasaki. \"La defensa de Taiwán es la defensa de Japón\". Kato sonrió."
 jap.109.a: "Nuestras intenciones siguen siendo las mismas."
 jap.110.t: "Vida diaria"
 jap.110.d: "La brisa marina de Okinawa, impregnada de esa humedad salada tan característica, envolvía la tranquila base de Naha. Yamato Tanaka, sentado en su habitación, revisaba su equipo de apoyo. Unas barras de luz rosa estaban cuidadosamente organizadas en una caja transparente, acompañadas de toallas de apoyo dobladas con esmero y abanicos de apoyo meticulosamente preparados. Su permiso de quince días había sido aprobado el día anterior, y la entrada para el concierto de Fukuoka reposaba junto a su álbum de LoveLive. Yamato miró su reloj; en seis horas, estaría abordando el vuelo hacia Fukuoka.\n\nDe repente, el agudo sonido de una alarma antiaérea rompió la tranquilidad de la base. \"¡Reunión de emergencia! ¡Todos los miembros de la Tercera Brigada de Operaciones Terrestres, reúnanse!\" La voz de la transmisión sonaba inusualmente seria. \"¡Repito, reunión de emergencia!\"\n\n\"¡Yamato-kun!\" La puerta de su habitación se abrió de golpe, y un torbellino de pasos apresurados y el ruido del equipo resonaron en el pasillo. El líder de escuadrón, Yamamoto, mostraba una expresión de tensión poco habitual. \"Hemos recibido noticias de problemas en el estrecho de Taiwán. ¡Nuestra brigada se está desplegando allí para apoyar al ejército taiwanés!\"\n\nMientras Yamato se ajustaba el uniforme por última vez, buscó instintivamente en su bolsillo la entrada para el concierto. La transmisión emitía un breve informe sobre la batalla, y en el helipuerto a lo lejos, las hélices de un helicóptero ya comenzaban a girar.\n\nGuardó la entrada en su bolsa lateral y cerró con cuidado la puerta de su habitación."
 jap.110.a: "Desde ahora, y para siempre, tú y yo seremos irremplazables."
 jap.111.t: "Adiós solitario"
 jap.111.d: "Las nubes y la niebla de Alishan se deslizaban lentamente ante los ojos de Yamato Tanaka, como si estuvieran en un espectáculo eterno. Se apoyó en una roca cubierta de musgo, sintiendo la sangre caliente que brotaba lentamente del agujero de bala en su abdomen. \"Qué buen lugar\", logró murmurar con todas sus fuerzas. Desde allí, podía contemplar las escarpadas montañas y el frondoso bosque que se extendía hasta la costa. La luz del sol se filtraba entre las nubes, proyectando sombras moteadas y tiñendo de dorado todo el valle. Si alguien tuviera que elegir un lugar para morir, sin duda este sería el más apropiado.\n\nEra consciente de que no sobreviviría hasta el atardecer; sentía que su vida se desvanecía lentamente con cada latido, escapándose por el agujero de bala. Curiosamente, no sentía miedo; en cambio, una inusual sensación de paz lo envolvía. Sus dedos temblorosos buscaron en el bolsillo de su pecho y sacaron la entrada del concierto, ya arrugada. Los ídolos impresos en el papel aún sonreían radiantes, aunque una esquina estaba manchada de sangre. Echó un último vistazo a la cita a la que nunca podría asistir y luego dejó caer el billete.\n\nEl viento de la montaña levantó suavemente el billete, haciéndolo girar en el aire como una delicada flor de cerezo. Voló sobre las copas de los árboles, atravesó acantilados escarpados y finalmente se desvió hacia el mar resplandeciente en la distancia. Yamato lo observó desaparecer hasta que ya no fue visible.\n\nUna hora después, un helicóptero militar sobrevoló el valle y un mensaje de alto el fuego resonó por el altavoz. La paz finalmente había llegado, pero era sesenta minutos demasiado tarde para la vida de Yamato Tanaka."
 jap.111.a: "Había perdido seis horas, y también una más."
 jap.112.t: "Sueño hecho realidad"
 jap.112.d: "El sol brillaba en la Base de Naha, tan radiante como el día anterior a su partida. Yamato Tanaka abrió la puerta de su dormitorio; su equipo de apoyo permanecía en su lugar, con barras luminosas rosas que reflejaban una suave luz bajo el sol, como si hubieran estado esperando allí durante un siglo.\n\nCon cuidado, abrió la caja; las toallas de apoyo aún mantenían sus impecables pliegues. Una fina capa de polvo se había asentado sobre el abanico de apoyo que había preparado antes de la guerra. Al cepillarlo suavemente, la sonrisa de Nishikino Maki volvió a aparecer. La entrada del concierto que había traído al campo de batalla y que milagrosamente había conservado estaba un poco amarillenta, con algunos bordes desgastados, pero para él, era más valiosa que cualquier medalla.\n\nMientras empacaba, sus dedos rozaron sin querer la herida en su cuerpo. En ese momento, el olor a pólvora regresó a su memoria. Pero pronto, la brisa marina, impregnada de aroma a hibisco, entró por la ventana, borrando esos recuerdos del campo de batalla.\n\n\"El vuelo es a las tres de la tarde\", murmuró mientras guardaba la entrada del concierto en el álbum que llevaba consigo, y luego cerró suavemente la puerta de su dormitorio."
 jap.112.a: "\"Por favor, cuídame de ahora en adelante\"."
 jap.113.t: "El pueblo primero"
 jap.113.d: "Queridos conciudadanos,\n\nAl iluminar la cúpula del Edificio de la Dieta, nos surge una pregunta: ¿realmente este símbolo de la democracia refleja la voluntad del pueblo? Durante décadas, a excepción de ese breve cambio de poder en 2009, el Gobierno del Partido Liberal Democrático ha permanecido sin cuestionamientos. No es una simple coincidencia, sino un estancamiento político cuidadosamente diseñado.\n\nSeamos sinceros: estamos viviendo bajo una dictadura suave que se disfraza de democracia. El PLD se ha presentado como un \"símbolo de estabilidad\" gracias a complejos sistemas de financiamiento político, alianzas con grandes corporaciones y manipulación mediática. Han logrado convencer a la gente de que sin el PLD, Japón se sumiría en el caos.\n\nPero, ¿a qué precio se compra esta \"estabilidad\"?\n\nLos jóvenes están renunciando a formar familias por la falta de empleos seguros.\nLas pensiones de nuestros ancianos se erosionan constantemente en medio de la inflación.\nLa clase media se desmorona, agobiada por hipotecas y gastos educativos.\nLas economías locales están en declive mientras Tokio se centraliza cada vez más.\nEs hora de un cambio.\n\nEl surgimiento de una Coalición Civil no es mera casualidad. Cuando los partidos de izquierda se dieron cuenta de que debían adaptarse a los nuevos tiempos, cuando los liberales entendieron que los ideales necesitan organización, y cuando las fuerzas progresistas dejaron de lado sus diferencias, encontramos una voz común: Japón necesita una democracia auténtica y un verdadero sistema multipartidista.\n\nUnámonos y derribemos con nuestro voto este mito del autoritarismo moderado. Para que nuestros hijos crezcan en una nación verdaderamente democrática y la política regrese a manos del pueblo, únanse a nuestra causa."
 jap.113.a: "El futuro está a la vista y el cambio es ahora."
 jap.114.t: "Estabilidad primero"
 jap.114.d: "Queridos conciudadanos:\n\nA medida que la luz de la mañana vuelve a iluminar la cima nevada del Monte Fuji y el primer tren bala sale puntualmente de la estación de Tokio, cada uno de estos momentos refleja la grandeza y el orden de Japón. Al mirar hacia atrás en el periodo de gobierno del Partido Liberal Democrático , hemos forjado lo que se conoce como el \"milagro económico\", transformando nuestra nación insular en la segunda economía más grande del mundo y haciendo que \"Made in Japan\" sea sinónimo de calidad.\n\nLas luces de neón que brillaban en las calles de Tokio en los años 80 fueron testigos de nuestra prosperidad; la red nacional de carreteras de los años 90, de nuestro avance; y las innovaciones tecnológicas que siguieron al milenio, de nuestra sabiduría. Todos estos logros fueron posibles gracias a la administración estable del PLD.\n\nHoy, nos enfrentamos a nuevos desafíos. El envejecimiento de la población pone a prueba nuestra sabiduría, la situación internacional desafía nuestra determinación y la revolución tecnológica exige nuestra innovación. Pero no olviden: bajo el liderazgo del PLD, Japón siempre ha encontrado la manera de superar las crisis y mantener la estabilidad en tiempos de cambio.\n\nElegir al PLD es optar por un líder que ha demostrado su valía a lo largo del tiempo. Sabemos cómo equilibrar la tradición con la innovación y cómo hacer que Japón brille en esta nueva era.\n\nImaginemos juntos un futuro radiante para nuestra nación: calles limpias, trenes puntuales y una vida pacífica y plena. Este es el Japón que el PLD les ofrece, y este es el ideal al que debemos dedicar nuestro esfuerzo inquebrantable."
 jap.114.a: "El PLD seguirá siendo su timonel confiable."
 jap.115.t: "La última gota"
 jap.115.d: "\"Escuchen\", balbuceó Kaori, aferrándose al micrófono con una mano, como si fuera lo único que la mantenía en pie. \"El PLD ha estado en el poder desde, ¿cuando?, ¿Desde que los dinosaurios vagaban por la Tierra? ¿Y qué hemos conseguido? Sueldos miserables, apartamentos carísimos, y nosotros, tan agotados que ni siquiera podemos soñar\".\n\nSus palabras resonaban en su habitación oscura, donde una cámara web barata, mal colocada sobre una pila de libros, capturaba su figura tambaleante. Su avatar de VTuber -una chica gato con ojos brillantes y cabello rosa neón- miraba al público con la misma intensidad semiviva que la propia Kaori. No tenía muchos espectadores. Normalmente, sus transmisiones alcanzaban un máximo de quince personas, la mitad de ellas bots. Pero esta noche, algo era diferente. Kaori agitó una lata vacía de chu-hi frente a su cámara web, aunque su avatar no lo registró. ¿Sabes qué es ser valiente? ¡Vivir en esta economía mientras invierten miles de millones en proyectos inútiles! ¡Puentes a ninguna parte! ¡Cheques de estímulo que apenas alcanzan para comer ramen durante una semana! Pero sí, dínos que nos mantengamos fuertes. ¡Estoy harta de esto! Hipó, con la cabeza colgando hacia atrás mientras la risa brotaba de su garganta. No tenía gracia. Nada de eso tenía gracia. Pero se sentía tan bien desahogarse.\n\nAlguien en el chat escribió: \"Kaori, ¿estás bien?\". Miró la pantalla con los ojos en blanco. \"¿Estoy bien? ¿Estamos bien? ¡Mira lo que han hecho! Se enriquecen, nosotros nos hundimos. Y nadie se defiende porque, ¿qué? ¿\"Así son las cosas\"? ¡A la mierda con eso!\".\nKaori apenas notó que la cuenta de espectadores subía. Cincuenta. Setenta. Doscientos. Los mensajes se convirtieron en una avalancha, algunos animándola, otros burlándose de ella, y más de uno cortando cada palabra que decía cuando estaba borracha.\n\nA la mañana siguiente, la resaca no tuvo piedad. Su teléfono vibraba sin parar sobre su escritorio y las notificaciones se encendían como fuegos artificiales. 1532 nuevos seguidores en Twitter. Su clip \"VTuber borracha TRITURA al PLD\" es tendencia con 13 mil me gusta."
 jap.115.a: "Oh. Dios mío."
 jap.116.t: "Nuevo y viejo"
 jap.116.d: "En una oficina en Kasumigaseki, la luz del atardecer se filtraba a través de las persianas, creando sombras danzantes sobre montones de documentos. Kosaka Honoka estaba organizando la última tanda de propuestas para proyectos de exportación cultural cuando Koizumi Hanayo entró con dos botellas de Ramune.\n\n\"¿Has visto el nuevo plan de localización?\", preguntó Hanayo mientras dejaba el refresco en el escritorio de Honoka. \"Esta vez realmente se han esforzado\".\n\nHonoka comenzó a revisar los archivos. \"Es impresionante, el presupuesto de localización para la serie «Mobile Suit Gundam» ya supera el total de proyectos de animación del año pasado. Y parece que incluso planean redoblar y producir temas musicales en idiomas locales para el mercado del Sudeste Asiático\".\n\n\"Y no solo Gundam\", continuó Hanayo, acercándose a una silla y sentándose. \"La serie «Legend of the Galactic Heroes» también tendrá un doblaje completamente nuevo. He escuchado que han invitado a actores de doblaje de renombre de varios países. Ya me imagino a Yang Wen-li diciendo «la gente puede sobrevivir sin un país» en diferentes idiomas\".\n\nHonoka tomó un sorbo de su refresco. \"Las cosas han cambiado tanto. Antes, solo series como «Dragon Ball» tenían tantas versiones en varios idiomas. Ahora, incluso animes de bandas como «K-On!» se producen en una docena de idiomas\".\n\n\"El ministro mencionó que es la mejor manera de que el mundo escuche la voz de Japón\", dijo Hanayo con una sonrisa. \"Suena un poco cursi, pero, en realidad, el anime podría ser más efectivo que cualquier discurso diplomático\"."
 jap.116.a: "¡COOL JAPAN!"
 jap.117.t: "Hogar, dulce hogar"
 jap.117.d: "En la habitación de Sato Makoto, un rayo de luz del atardecer se colaba entre las persianas, creando sombras danzantes sobre el suelo cubierto de discos de videojuegos. Esa luz era su única conexión con el mundo exterior, y estaba a punto de desvanecerse mientras la noche se acercaba.\n\n\"Makoto, por favor, sal\", gritó su madre desde el otro lado de la puerta. \"Hoy hay una gran oportunidad de trabajo en una empresa de diseño...\". Su voz se cortó, ahogada por los ruidos estruendosos del videojuego que resonaban en la habitación.\n\nYa habían pasado tres años y cuatro meses. Desde que dejó su trabajo en la tienda aquel día, Sato Makoto no había salido de su pequeña habitación de nueve metros cuadrados. Cada día, su madre dejaba una caja de bento afuera de su puerta, que él recogía en silencio durante la noche. Esa se había convertido en su única forma de comunicación.\n\n\"Ya tienes veintisiete\", la voz de su madre temblaba de emoción. \"Yamamoto, el vecino, ya se ha casado...\"\n\nSato Makoto subió aún más el volumen del juego. Los personajes en la pantalla luchaban en batallas épicas, llenando el aire con efectos de sonido ensordecedores, mientras él se sumergía cada vez más en ese mundo virtual."
 jap.117.a: "Todas las decepciones se convertían en lágrimas."
 jap.118.t: "Super cambio"
 jap.118.d: "En una soleada guardería a las afueras de Tokio, Rinka Sakurai estaba sentada bajo la luz de la tarde, sosteniendo un pastel de fresa rosa. Siempre le sorprendía que la comida supiera mejor que antes y que el aula ahora tuviera juguetes más interesantes.\n\n\"Maestra Maki\", preguntó con un aire de inocencia, \"¿por qué podemos tener pastel de fresa todos los días?\"\n\nLa maestra Maki se agachó y comenzó a explicar pacientemente las nuevas políticas de crianza, los subsidios para guarderías y las mejoras en los estándares de las instalaciones. Pero esos términos complicados se convirtieron en burbujas de aire en los oídos de Rinka, dejando solo la frase: \"Este es un regalo que el primer ministro prometió a todos los niños\".\n\n\"Entonces\", Rinka inclinó su cabecita, con un poco de crema aún en la boca, \"¿eso significa que el primer ministro me permite tener pastel de fresa todos los días?\"\n\nLa maestra Maki sonrió, deseando poder explicar más, pero Rinka ya se había marchado para compartir su descubrimiento con otros niños. En su mundo de cuento de hadas, la imagen de un primer ministro bondadoso que preparaba pastel de fresa todos los días era mucho más fácil de entender que cualquier explicación política.\n\nPara Rinka, la felicidad era simple: tener pastel de fresa todos los días y un primer ministro que pudiera hacer pastel para los niños."
 jap.118.a: "¿Cambiar al primer ministro significa cambiar el pastel?"
 jap.119.t: "Paseo"
 jap.119.d: "Dentro del Palacio Imperial, una calma extraordinaria envuelve los antiguos caminos de piedra mientras el Emperador Naruhito y el Príncipe Fumihito pasean serenamente por el centenario sendero, que alguna vez fue recorrido por miembros de la familia real. En ausencia del habitual bullicio de los turistas, el venerable patio irradia una solemnidad única.\n\n\"Hermano, ¿lo ves?\", Naruhito se detuvo junto al viejo puente, \"el estado del mundo es vasto y no puede ser controlado por la fuerza humana. Los cambios de hoy son como las flores que florecen y se marchitan en el patio, todo en armonía con el orden natural\". Fumihito observó a los peces nadando en el estanque y respondió con calma: \"Hermano, tienes razón\".\n\n\"Los eventos pasados son como el humo\", Naruhito acarició suavemente la barandilla de piedra, \"la gente suele decir que una época próspera no se puede repetir, pero los cambios de hoy podrían ser el inicio de una era pacífica y próspera. El verdadero poder no radica en su magnitud, sino en su rectitud\".\n\nUna ráfaga de viento recorrió el patio, haciendo que las hojas danzaran a lo lejos. Fumihito recogió una hoja y comentó: \"Sí, la tiranía es como una tormenta: feroz pero difícil de mantener. Solo el camino de la democracia puede nutrirse en silencio, como la lluvia de primavera\".\n\n\"El ascenso y la caída de una nación dependen de su gente\", Naruhito miró hacia el horizonte lejano. \"Aunque estemos por encima de las masas, debemos tomar el corazón del pueblo como un reflejo. Los pecados del pasado deben ser purificados con la conciencia del presente\"."
 jap.119.a: "País del Sol Naciente."
 jap.120.t: "Like a Dragon"
 jap.120.d: "Al caer la noche en el distrito de Suminoe, Tetsuya Ryuzaki se asoma al balcón de su apartamento, observando las luces rojas y azules de un coche patrulla que pasa por debajo. El tatuaje en su brazo izquierdo ha estado oculto bajo la manga de su traje durante tanto tiempo, pero las historias que lo rodean aún invaden su mente cada noche. Esto no es Kabukicho: aquí no hay enfrentamientos apasionados ni finales heroicos, solo rencores y traiciones interminables, y una Policía de la Prefectura de Osaka que parece actuar más como un yakuza que los propios yakuzas.\n\nRyuzaki se ajusta la corbata que su esposa le abrochó esta mañana. Hace veinte años, cobraba el seguro de su banda; ahora es supervisor de ventas en una compañía de seguros. Sus días son tan aburridos como un vaso de agua, sin emoción ni turbulencias.\n\nLa televisión emite noticias electorales. El candidato del PLD repite las mismas promesas que Ryuzaki ha escuchado toda su vida. Recuerda las palabras de su antiguo jefe: \"A veces, la mayor violencia del mundo no es un puñetazo, sino una sociedad que nunca cambia\".\nSaca su teléfono y lee la plataforma de campaña de la Coalición Civil. Quizás sea hora de un cambio, piensa."
 jap.120.a: "No con puños, sino con votos."
 jap.121.t: "La vieja generación"
 jap.121.d: "Masao Tanaka dejó caer el folleto electoral con el logo de la Coalición Civil sobre el tatami, como si fuera un objeto maldito. Después de tantas décadas de experiencia, había aprendido una lección importante: cualquier cambio drástico viene con sus propios riesgos. Tomó el conocido folleto del PLD que tenía a su lado. Las palabras y promesas que leía le ofrecieron una leve sensación de consuelo.\n\nDesde la ventana de la cocina, podía ver el retrato familiar colgado en la pared. Cada rostro sonriente en esa foto había florecido a lo largo de la larga historia del PLD. Su hijo se graduó de la Universidad de Keio y consiguió un trabajo estable en una empresa. Su nieta fue admitida en la Universidad de Nagoya. La vida no era perfecta, pero sí bastante segura.\n\n\"¿Reforma? ¿Cambio?\" Observó a la Unión Popular dar apasionados discursos en la televisión y sacudió la cabeza. Esos enérgicos lemas le recordaron la agitación de su juventud. En aquel entonces, la gente también clamaba por un cambio, pero eso solo llevó al caos y a disturbios.\n\nEl día de las elecciones estaba a la vuelta de la esquina. Masao Tanaka se puso el traje que siempre usaba para votar. Una vez más, decidió confiar en lo que siempre había creído.\n\nEra consciente de que los jóvenes se reían de su pensamiento conservador, al igual que sus nietos se burlaban de él por no saber usar un teléfono celular. Pero para él, esa sensación de estabilidad era mucho más convincente que cualquier promesa de un cambio radical."
 jap.121.a: "¡Vota!"
 jap.122.t: "El programa nocturno"
 jap.122.d: "En el programa \"Seguridad Nacional y Nosotros\", el ex Jefe de Estado Mayor de la Fuerza Marítima de Autodefensa, Tomohisa Takei, se sentó con una postura firme mientras respondía a las preguntas de los presentadores Mako Kimura y Ken'ichi Sato. Detrás de ellos, una gran pantalla mostraba un mapa detallado del Pacífico occidental.\n\n\"Señor Takei\", comenzó Mako Kimura, inclinándose un poco hacia adelante con su micrófono, \"usted ha liderado ejercicios conjuntos para la Fuerza Marítima. Desde un punto de vista militar y estratégico, ¿qué representa Taiwán para Japón?\"\n\nTakei levantó la mano y señaló las rutas iluminadas en la pantalla. \"Déjame explicarlo desde mi experiencia en el mar. Piensen en el estrecho de Taiwán como una compuerta que regula el flujo de agua en todo el Pacífico. Si esa compuerta cae en manos equivocadas, no solo se interrumpe la vitalidad marítima de Japón, sino que se desestabiliza todo el equilibrio estratégico del Pacífico occidental\".\n\n\"Entonces, ¿está diciendo que la seguridad de Taiwán es igual a la seguridad de Japón?\", insistió Kimura.\n\nEs aún más que eso. Desde el estrecho de Miyako hasta la isla de Yonaguni, y desde las islas Diaoyu hasta Okinawa, toda esta cadena de islas forma la primera línea de defensa de Japón. Taiwán es como la piedra angular de esa línea. Si se quita esa piedra angular, toda la muralla defensiva se desmorona.\n\n\"¿Cómo deberíamos responder a una amenaza así?\" Ken'ichi Sato planteó la pregunta que todos querían que se abordara.\n\nTomohisa Takei miró a la cámara como si hablara a todo Japón: \"En la Armada, tenemos un viejo dicho: Prevenir la tormenta es mejor que enfrentarla. Debemos dejar claro a cualquiera que tenga a Taiwán en su mira que no se trata solo de una pequeña isla irrelevante; es un desafío directo a toda la línea defensiva del mundo libre\"."
 jap.122.a: "Gracias por su respuesta."
 jap.123.t: "Ejercicio militar"
 jap.123.d: "Cerca de Taipéi, en las laderas de Yangmingshan, el teniente coronel Haruaki Tsukishiro, de la Fuerza Terrestre de Autodefensa de Japón, observaba el campo de entrenamiento. La niebla matutina aún se cernía sobre las colinas mientras las unidades blindadas australianas y la infantería mecanizada taiwanesa realizaban un ejercicio de asalto conjunto; el polvo y el humo formaban una cortina movediza con las primeras luces del día.\n\nTsukishiro tomaba notas en un pequeño cuaderno; su letra, elegante pero con la firmeza de un soldado, le había enseñado una verdad inamovible: si bien la fuerza de voluntad importa en el campo de batalla, la superioridad numérica suele ser el factor decisivo.\n\n\"Señor\", dijo el oficial de Estado Mayor Ueda, entregándole un informe de evaluación táctica, \"los vehículos blindados CM-34 taiwaneses muestran una excelente movilidad en terreno montañoso, y los australianos se coordinan con notable profesionalidad\".\n\nAl aceptar el informe, la mirada de Tsukishiro se detuvo en un soldado taiwanés que inspeccionaba un vehículo blindado a lo lejos. Su pericia era innegable, pero le recordaba las lecciones históricas de batalla de la Academia de Defensa: incluso las tropas de élite pueden desvanecerse como luciérnagas al amanecer ante una oleada abrumadora de atacantes.\n\n\"Son realmente muy capaces\", dijo en voz baja, con una preocupación que él mismo apenas percibió, \"pero la guerra no es un ejercicio\". En la última página del informe, escribió: \"Aunque las fuerzas conjuntas demuestran habilidades tácticas encomiables, podrían tener dificultades para resistir una lucha prolongada contra unas probabilidades potencialmente abrumadoras. Se recomienda intensificar los ejercicios conjuntos con armas pesadas y ampliar los ejercicios de defensa aérea\"."
 jap.123.a: "El enemigo está al otro lado del estrecho."
 jap.124.t: "El futuro del pasado"
 jap.124.d: "En un tranquilo y antiguo callejón del distrito de Asakusa, en Tokio, se encuentra la casa de té Meigetsu, que ha estado en pie durante setenta años. Desde que su abuelo se la confió, Sato Hikaru ha cambiado el tradicional papel de las puertas correderas tres veces. En aquellos primeros días, mientras observaba cómo la bulliciosa casa de té perdía poco a poco su animada clientela, sentía que estaba siendo testigo del lento desenlace de una obra de teatro de larga duración.\n\nEn ese entonces, solo quedaban unos pocos clientes mayores, como ecos de la era Showa, disfrutando de su té y recordando tiempos pasados. Detrás del mostrador, Sato hojeaba de vez en cuando las novelas que había coleccionado, esperando a los clientes que nunca llegaban.\n\nUn punto de inflexión llegó el año en que el Gobierno lanzó su \"Plan de Revitalización de la Pequeña Industria\". Gracias a las subvenciones, Sato transformó un rincón de su casa de té en una acogedora zona de descanso de estilo japonés. Colocó algunos cojines en el suelo (zabuton) y decoró las paredes con láminas de estilo ukiyo-e. Curiosamente, estas láminas evocaban en muchos jóvenes clientes escenas de una famosa película de anime, aunque nunca se atrevían a decir cuál.\n\nPoco a poco, la casa de té comenzó a cobrar nueva vida. Por las tardes, grupos de estudiantes de secundaria uniformados empezaron a visitarla, eligiendo un lugar en el tatami para disfrutar de su té mientras comentaban tranquilamente las últimas historias del manga. Para que pudieran experimentar la elegancia de la ceremonia del té tradicional, Sato preparó juegos de té decorados con motivos de flores de cerezo exclusivamente para ellos.\n\nLos fines de semana, los clubes de anime solían organizar reuniones allí para tomar té. Decían que el ambiente les recordaba a un santuario de anime, y a veces bromeaban con Sato, preguntándole si alguna vez contrataría a una doncella del santuario para que se sentara en la entrada a tomar té. Aunque Sato no estaba del todo familiarizado con sus referencias, sabía que la casa de té continuaba siendo un lugar especial para todos ellos."
 jap.124.a: "Árbol viejo, brotes nuevos."
 jap.125.t: "Sueños del matrimonio"
 jap.125.d: "En el registro civil de la Oficina del Gobierno Metropolitano de Tokio, Rin Sakurai y Yukino Fujiwara firmaban juntas con la misma pluma en su solicitud de matrimonio, que era de un elegante color marfil. Afuera, los pétalos de las flores de cerezo caían suavemente al suelo, como si estuvieran bendiciendo su unión.\n\n\"Déjenme verificar esto\", dijo la empleada, hojeando los documentos con la misma calma y eficiencia que mostraría ante cualquier otra pareja. \"Aquí está la solicitud de matrimonio de la Sra. Sakurai y la Sra. Fujiwara\". No había miradas sospechosas ni titubeos en su voz; solo era un trámite administrativo más.\n\nRin apretó suavemente la mano temblorosa de Yukino. Diez años atrás, cuando se conocieron en el club de baile de la universidad, jamás habrían imaginado que este día llegaría. En ese entonces, solo podían intercambiar anillos en privado y pretender ser solo amigas cercanas ante los demás. Ahora, por fin, podían casarse de manera legítima.\n\n\"Felicidades a ambas\", dijo la empleada, entregándoles el certificado oficial sellado con una cálida sonrisa. Varias parejas heterosexuales que esperaban cerca les ofrecieron sus más sinceras felicitaciones.\n\nAl salir del Ayuntamiento, Yukino no pudo contener las lágrimas. No eran lágrimas de tristeza, sino de una felicidad que había llegado de manera tan natural. La gente en la calle continuaba con sus ajetreadas rutinas, sin apenas mirarlas, tomando este nuevo matrimonio como algo completamente normal. Y en esa aceptación sin complicaciones residía la misma felicidad que una vez habían anhelado por encima de todo."
 jap.125.a: "Japón por fin es lo que siempre habían esperado que fuera."
 jap.126.t: "Que la fortuna te bendiga en la batalla"
 jap.126.d: "En medio de la lluvia vespertina que golpeaba los marcos de las ventanas, Genzosuke Sakurai bajó una vieja y descolorida caja de madera del santuario y se la entregó a su hijo, Harunosuke Sakurai, quien se estaba poniendo su uniforme. Desde sus retratos en el santuario, los tíos abuelos Takenosuke Sakurai y Ryunosuke Sakurai observaban en silencio, iluminados por la luz de las velas.\n\n\"Antes de que te vayas, quiero que tengas esto\", dijo Genzosuke, abriendo la caja para mostrar un amuleto protector envuelto en seda azul oscuro. \"Tus dos tíos abuelos cuidaron de este recuerdo durante toda su vida. El tío abuelo Takenosuke lo llevó consigo en los campos de batalla de China; el tío abuelo Ryunosuke lo llevó a través del Pacífico\".\n\nHarunosuke dejó a un lado su uniforme y tomó el amuleto, que le pareció sorprendentemente ligero. \"¿Contiene un sello para el dios Takeminakata?\"\n\n\"Sí\", respondió Genzosuke, mirando a su hijo, que pronto partiría hacia Taiwán. \"¿Sabes lo que Taiwán significa para nosotros?\"\n\n\"¿Es... un vecino importante?\", aventuró Harunosuke.\n\n\"No solo eso\", negó con la cabeza suavemente. \"Es nuestro sustento. Tus tíos abuelos dieron su vida para entender una verdad inmutable: el poder de China en estas aguas nunca ha disminuido del todo. Si Taiwán cayera, Japón sería el siguiente. Y entonces nos enfrentaríamos a un destino más humillante que nunca\"."
 jap.126.a: "Los dioses favorecen a quienes permanecen siempre vigilantes."
 jap.127.t: "Código operativo: Reino Perdido"
 jap.127.d: "En la pista de la Base Aérea de Naha, los cazas F-35A de la 8ª Ala Aérea estaban alineados, cada uno equipado con cuatro misiles AIM-120 de medio alcance y dos misiles AIM-9X Sidewinder para el combate cercano. El líder de escuadrón, Masaki Yamamoto, revisó los datos finales en su pantalla de visualización frontal; dentro de la cabina sellada, podía escuchar el suave zumbido de la máscara de oxígeno.\n\n\"Despegue en tres minutos. Indicativo de formación «Tengu». Zona objetivo: Zona de Identificación de Defensa Aérea del este de Taiwán\", resonó la voz desde la torre de control a través de sus auriculares. \"El clima indica nubosidad a 7.000 metros, buena visibilidad\".\n\n\"Este es el avión líder, todos los aviones lo confirman\", dijo Yamamoto, ajustando los parámetros en su pantalla de casco.\n\n\"Número Dos listo\", respondió el subcomandante Fujiwara con tranquilidad, como si fuera un ejercicio más de la rutina diaria. \"Número Tres listo\", dijo el joven piloto Sato, dejando escapar un toque de emoción en su voz. \"Número Cuatro confirmado\", respondió Kishibe con un tono tan sereno como el del subcomandante.\n\nEl rugido de los motores resonó en el amanecer. Yamamoto echó un vistazo al estado de las armas en su pantalla multifunción; además de los misiles, el cañón interno de 25 mm estaba completamente cargado con 220 proyectiles para posibles combates cercanos.\n\n\"Confía en tu entrenamiento y en tus compañeros\", dijo Yamamoto, acelerando y observando el horizonte lejano. \"Escribamos un nuevo capítulo en estos cielos\"."
 jap.127.a: "¡No son los viejos los que crearán la nueva era!"
 jap.128.t: "Intercambio de intereses"
 jap.128.d: "En una tarde tranquila, un convoy de vehículos negros de Daisei Construction avanzaba lentamente junto a las ruinas del puerto de Keelung. De pie en el paseo marítimo, el ministro de Investigaciones, Kiyonosuke Tsukishiro, observaba las grúas y almacenes destruidos por los bombardeos. Detrás de él, su asistente, Aoinosuke Shimotsuki, tecleaba con energía en una tableta, registrando los niveles de daños, los presupuestos de reconstrucción y los plazos; pero las cifras más cruciales -las que se referían a los derechos de operación del puerto para los próximos veinte años- estaban cuidadosamente guardadas en otro archivo cifrado.\n\n\"Qué lástima\", murmuró Tsukishiro, encendiendo un cigarrillo con la etiqueta \"Alishan\". Aunque parecía lamentarse por los horrores de la guerra, ya estaba calculando mentalmente su influencia futura una vez que el puerto fuera reconstruido; cada losa de hormigón y cada viga de acero serían un trampolín para Daisei Construction en el mercado taiwanés.\n\nSu siguiente parada era Kaohsiung, en el sur. En un comedor privado, Tsukishiro brindó con los funcionarios locales. \"Daisei Construction no solo aportará fondos\", dijo, alzando su copa, \"sino también tecnología y experiencia. Planeamos participar en la reconstrucción integral de puertos, ferrocarriles y aeropuertos\". Con el nítido sonido de los vasos al chocar, todos supieron que el trato ya estaba cerrado."
 jap.128.a: "Disfrutando de una conversación jovial."
 jap.129.t: "Centro de Mando de Operaciones Conjuntas"
 jap.129.d: "En el Centro de Mando de Operaciones Conjuntas de la Base Yokosuka, cuatro enormes pantallas en las paredes transmiten en vivo desde Tokio, Camberra, Nueva Delhi y Taipéi. El Jefe del Estado Mayor Conjunto Japonés escucha con atención a los representantes de cada país, mientras que la pantalla táctil frente a él se actualiza constantemente con información sobre diversos despliegues militares.\n\nUn general de la Fuerza Aérea Australiana subraya la importancia de superar la separación geográfica entre los océanos Índico y Pacífico. Al mismo tiempo, el representante de la Armada India dibuja un arco en el mapa digital, buscando ampliar la influencia de su país durante la conferencia. El delegado militar taiwanés evalúa la posibilidad de unificar los sistemas de defensa aérea para evitar grandes inversiones en instalaciones separadas.\n\nLos técnicos de las Fuerzas de Autodefensa de Japón están perfeccionando un nuevo sistema de comunicación encriptado, creado para conectar las estructuras de mando de las cuatro naciones en una red invisible. En la mesa de conferencias, hay un voluminoso manual de operaciones que detalla meticulosamente los procedimientos estándar para la cooperación, desde patrullas conjuntas hasta operaciones militares a gran escala.\n\n\"Hoy\", declara el Jefe del Estado Mayor Conjunto al finalizar las conversaciones, \"no solo hemos establecido un sistema de mando, sino que también hemos sentado las bases para un marco de seguridad que abarque toda la región de Asia-Pacífico. No nos dejaremos vencer por la tiranía. Nuestras naciones de Asia-Pacífico están unidas, decididas a construir juntas un futuro democrático brillante\"."
 jap.129.a: "Prosperar juntos, avanzar juntos."
 jap.130.t: "Negociaciones cotidianas en Europa"
 jap.130.d: "En el vibrante distrito comercial de Nápoles, Yukinosuke Tsurumai, un analista de mercado internacional de Panasonic, se encuentra en una sala de reuniones elegantemente decorada. El contrato recién firmado que tiene frente a él aún emana el aroma de la tinta fresca. Afuera, se siente el característico aire salado del Mediterráneo, mientras que dentro, persiste el delicioso olor a té italiano con limón.\n\n\"Este es un comienzo prometedor\", dice Risotto Nero, un ejecutivo de un importante fabricante local de electrodomésticos, mientras deja caer la pluma. Su traje oscuro se complementa a la perfección con la decoración vintage de la sala. \"Imagínense: la tecnología japonesa unida a la red de distribución italiana. ¿Qué podría ser más perfecto?\"\n\nCerca de él, Kazenosuke Sakakibara, asistente de Tsurumai, teclea rápidamente en su portátil, anotando las metas anuales: trescientos mil electrodomésticos y quinientos mil dispositivos digitales. Detrás de estas cifras se encuentra una red de distribución capaz de abarcar todo el sur de Europa.\n\n\"Milán, Marsella, Barcelona\", medita Tsurumai mientras disfruta de su té. \"Pronto, nuestros productos estarán en cada rincón de estas ciudades\"."
 jap.130.a: "Una taza más de té negro, por favor."
 jap.131.t: "Negociación curiosa en Rusia"
 jap.131.d: "En la elegante sala de reuniones del Ritz-Carlton en Moscú, Yukinosuke Tsurumai revisaba por tercera vez cada página del contrato. Frente a él, se encontraba Sofia Pavlovna, la secretaria principal de un importante conglomerado, cuya cabellera canosa le recordaba a un personaje de un anime que había visto en el pasado. Era como si, en cualquier momento, pudiera llamar a sus sirvientes desde detrás de su escritorio.\n\nEsta negociación comercial había sido un proceso largo, durando un mes y cuatro días, con tres caídas del sistema de videoconferencia, dos interrupciones inesperadas por protocolos de ciberseguridad y una ronda de mantenimiento de la plataforma que no tenía explicación. Cuando llegó el momento de firmar el documento final, Sofia sacó con gracia un bolígrafo que parecía común y corriente de un cajón. Su cuerpo estaba exquisitamente grabado con engranajes que brillaban de manera extraña bajo la luz del sol, recordándole a Tsurumai un artilugio steampunk que había visto una vez en una tienda de anime en Akihabara.\n\nDespués de la última firma, Anna guardó los papeles en una antigua caja de palisandro. Los detalles metálicos brillaban en las esquinas, sugiriendo los intrincados componentes mecánicos que se ocultaban debajo. \"Este contrato se conservará para siempre\", murmuró, \"al igual que nuestra alianza...\""
 jap.131.a: "Sin fin."
 jap.132.t: "La cortina final"
 jap.132.d: "En el Ministerio de Educación, Cultura, Deportes, Ciencia y Tecnología, Sakura Fujita llegó a la oficina a las 8:45 a. m., como lo hacía todos los días laborables. Sobre su escritorio, el informe de estadísticas educativas de ayer yacía a medio terminar. Todo parecía tan rutinario que esta mañana no se sentía diferente a ninguna otra. Justo a las nueve, el jefe de departamento envió un correo electrónico a todos, pidiendo que se reunieran en la sala de reuniones a las diez.\n\nDentro de la sala de reuniones, un proyector mostraba un informe lleno de cifras: planes de reestructuración organizativa, optimización de personal, reasignación de recursos... Sakura notó que el nombre de su propia división aparecía en rojo, señalando que todo el departamento sería fusionado o eliminado.\n\nCuando llegó la hora del almuerzo, nadie se movió de sus asientos. La cafetería de la oficina, que normalmente estaba llena de ruido, se sentía inquietantemente silenciosa. La caja bento de Sakura permanecía en su cajón, sin tocar. A través de la ventana, vio cómo los vehículos oficiales se dirigían al centro de disposición de activos.\n\nAl caer la noche, mientras limpiaba su escritorio, encontró un calendario del año pasado guardado en un rincón, cubierto de notas de reuniones y proyectos, ninguno de los cuales parecía importar ya."
 jap.132.a: "Despídanse del presente."
 jap.133.t: "Entrevista de reforma"
 jap.133.d: "Buenas tardes a todos. Soy la Representante Mariko Kato. Hoy quiero hablarles sobre un tema que ha estado en el centro de atención últimamente: el sistema doshusei. Tal vez algunos de ustedes no estén muy familiarizados con él, o quizás solo lo hayan escuchado de pasada. Déjenme explicarlo de una manera más sencilla.\n\nImaginen Japón como una casa con 47 habitaciones, cada una representando una prefectura. Manejar tantas habitaciones al mismo tiempo puede ser complicado: algunas son grandes, otras son pequeñas, y cada una necesita su propio mobiliario. Eso resulta ser un desperdicio y poco práctico.\n\nEl sistema doshusei propone reorganizar y fusionar estas 47 \"habitaciones\" en unas 10 \"suites\" más amplias. Por ejemplo, algunas prefecturas de la región de Kanto podrían unirse en \"Kanto del Norte\" y \"Kanto del Sur\", mientras que varias prefecturas de Kyushu podrían agruparse bajo \"Kyushu\". Cada \"suite\" podría entonces gestionar su propio mobiliario y decoración según sus necesidades, en lugar de equipar cada pequeña habitación por separado.\n\nPara ilustrar esto con un ejemplo concreto: en la actualidad, las prefecturas de Fukuoka, Saga y Nagasaki tienen su propia Junta de Educación, cuerpo de policía y sistema de salud. Pero si se unieran bajo un solo \"Kyushu\", estos recursos podrían ser planificados y gestionados de manera centralizada, lo que reduciría costos y aumentaría la eficiencia.\n\nSin embargo, implementar el sistema doshusei es como mudarse: combinar habitaciones puede parecer fácil, pero conlleva mucho trabajo logístico: cómo asignar recursos, cómo remodelar, cómo ayudar a la gente a adaptarse, etc. Y dado que cada región tiene su propia historia y tradiciones, fusionarlas de manera apresurada podría generar resistencia.\n\nAun así, nuestro objetivo final es asegurar la satisfacción de todos los que viven en estas \"habitaciones\"."
 jap.133.a: "Ya veo."
 jap.134.t: "El mal de un nombre"
 jap.134.d: "En una sala de interrogatorios en la comisaría de Shinjuku, la inspectora adjunta Misaki Sato revisa un informe sobre un caso de violencia doméstica. La víctima, Kumiko Suzuki, todavía tiene moretones visibles en su rostro, mientras que su esposo, Kenichi Yamada, se sienta obstinadamente en la habitación de al lado.\n\n\"¿Todo esto por no querer cambiarse el apellido?\", pregunta Sato, hojeando la transcripción con la tranquilidad de alguien que habla del clima.\n\n\"Es una cuestión de tradición\", grita Yamada desde la puerta contigua. \"En la época de mis padres y abuelos, no existía la posibilidad de que una esposa no llevara el apellido de su marido. ¿Para qué sirve esta nueva ley?\"\n\nSato echa un vistazo a la profesión de Kumiko: directora creativa en una agencia de publicidad. Después de diez años de arduo trabajo, ha construido su reputación y su red de clientes en torno al nombre \"Suzuki\".\n\n\"Lo quiero, pero eso no significa que deba renunciar a todo\", dice Kumiko en voz baja, apretando los dedos alrededor de un vaso de papel. \"La nueva ley dice claramente...\"\n\nAl finalizar el interrogatorio, Sato se queda de pie junto a la ventana de la comisaría, observando a la multitud. Hace veinte años, ella también tuvo una discusión con su prometido sobre mantener su apellido. Aunque la ley ha cambiado desde entonces, algunas mentalidades tardan más en evolucionar.\n\nFirma el informe de arresto con su nombre: Misaki Sato, el nombre con el que nació y el que seguirá llevando."
 jap.134.a: "El pájaro enjaulado es libre por fin."
 jap.135.t: "Reforma al impuesto al consumo"
 jap.135.d: ""
 jap.135.a: "Congelar el impuesto al consumo."
 jap.135.b: "Bajar el impuesto al consumo."
 jap.136.t: "Reformas de derechos laborales"
 jap.136.d: ""
 jap.136.a: "Mejorar las condiciones laborales."
 jap.136.b: "Desregular el trabajo."
 jap.137.t: "Desfile"
 jap.137.d: "Bajo el radiante sol del centro de Tokio, un convoy de vehículos de la Fuerza Terrestre de Autodefensa de Japón avanzaba con un retumbar imponente. Daisuke Matsuda se apoyaba en la ventanilla de un vehículo blindado, con un parche de Morfonica en su mochila táctica, donde la imagen de Kurata Mashiro en un chaleco de combate destacaba entre el mar de camuflaje. A lo largo de la carretera, la gente agitaba Banderas del Sol Naciente y gritaba \"¡Buena suerte en la batalla!\", mientras grullas de papel danzaban hacia el convoy como si fueran copos de nieve flotando en el aire.\n\n\"Eres un genio\", comentó Shota Yamamoto, que estaba a su lado, dándole una palmadita amistosa en el hombro a Matsuda. \"Todos van a Senso-ji por amuletos, pero tú confías en... ¿cómo se llama... esa banda femenina, Morfonica? ¿Es como una especie de bendición de doncella?\"\n\n\"Oye, no subestimes a Mashiro\", respondió Matsuda con una sonrisa, dándole una palmadita a su mochila. Es la cantante principal; trabaja muy duro por sus sueños.\n\nMientras el convoy pasaba por el Palacio Imperial y se dirigía a Yokosuka, Matsuda se dio una palmadita en el bolsillo, donde guardaba sus auriculares cargados con las canciones de Morfonica. Su música lo acompañaría en su camino hacia las ardientes aguas del Pacífico Occidental."
 jap.137.a: "Shota Yamamoto simplemente encogió los hombros."
 jap.138.t: "La Fuerza Expedicionaria Democrática"
 jap.138.d: "A medida que el sol comenzaba a asomarse sobre el puerto de Sídney, la cubierta del HMAS Adelaide se sentía un poco fresca gracias a la brisa marina. El capitán Tanaka, de la Fuerza Marítima de Autodefensa de Japón, se apoyaba en la barandilla junto al capitán Wilson, de la Armada Australiana, ambos observando el destructor que se alejaba cargado de provisiones. Momentos antes, habían descubierto que compartían una pasión por el manga JoJo's Bizarre Adventure; una curiosa coincidencia que les sacó una sonrisa.\n\n\"Por cierto\", dijo Tanaka mientras encendía un cigarrillo, \"siempre me ha intrigado saber por qué envían sus barcos hasta aquí...\" Hizo una pausa. \"Para luchar por nosotros\".\n\nWilson tomó el encendedor que le ofrecía y dirigió su mirada hacia la Ópera de Sídney, que se alzaba entre la niebla. \"Mi abuelo sirvió en la Batalla del Mar del Coral cuando era joven. Solía decir que el océano es como un lazo que une a las naciones libres\". Exhaló un aro de humo. \"Ahora finalmente comprendo lo que quería decir\".\n\n\"De Sídney a Tokio hay una gran distancia\", continuó Wilson. \"Pero para las naciones democráticas, no existe el concepto de «demasiado lejos»\"."
 jap.138.a: "Unidad por siempre."
 jap.139.t: "Nueva Asia Oriental"
 jap.139.d: "En el último piso de un edificio algo deteriorado en Sinuiju, el capitán Yamada, de la Fuerza Terrestre de Autodefensa de Japón, y el coronel Lee Seunghoon, del Ejército de la República de Corea, observaban la orilla opuesta con unos potentes prismáticos. Mientras su mirada recorría la línea fuertemente fortificada al otro lado del río, el coronel Lee mordisqueó una barra de chocolate Pocky de su paquete de raciones.\n\nEn Dandong, convoyes de vehículos blindados de transporte de personal patrullaban las calles, y las antenas de radar de los lanzamisiles antiaéreos giraban sin parar en la penumbra. De vez en cuando, se podían ver siluetas de soldados asomándose en los búnkeres a lo largo de la orilla del río.\n\n\"Mira a esos chinos\", comentó el coronel Lee, bajando los prismáticos. \"Han montado una defensa bastante sólida. Pero eso no importará. Hemos conseguido algo que ni MacArthur ni la generación de mi padre podrían haber logrado\".\n\nEl coronel Lee giró la barra de chocolate en su mano. \"¿No es curioso, Yamada? Hace solo unas décadas, estábamos en una lucha a vida o muerte en este mismo terreno del noreste. Ahora nos preparamos para cruzar el río codo a codo. Y el mismo aliado que una vez luchó a nuestro lado se ha convertido en nuestro enemigo\".\n\n\"La historia tiene un sentido del humor irónico\", respondió Yamada con tranquilidad. \"El amigo de hoy puede ser el enemigo de mañana, y el enemigo de ayer puede ser el aliado de hoy\". El coronel Lee se metió el último bocado de Pocky en la boca, y el envoltorio voló con el viento hacia las luces de la ciudad que parpadeaban en la orilla opuesta."
 jap.139.a: "Una historia qué nos pertenece."
 jap.140.t: "Fortaleza de Shanghái"
 jap.140.d: "En la ciudad de Fort Zhen, en la isla de Chongming, el pelotón de Yamada llevaba ya seis horas luchando en este laberinto de calles. Cada metro que avanzaban tenía un precio terrible; cada casa que tomaban exigía sangre. El EPL había convertido cada puerta en una trinchera y cada ventana en un nido de francotiradores.\n\n\"¡Edificio Tres, segundo piso, ventana derecha... ametralladora!\", sonó la urgente advertencia por la radio. Antes de que terminaran de pronunciar las palabras, una ráfaga de disparos ametralló la calle, haciendo que el yeso de las paredes se desprendiera. Yamada observó a sus tropas avanzar lentamente, abriéndose paso entre los escombros de los edificios derrumbados.\n\nUna casa que parecía normal se había transformado en una fortaleza, con sus muros salpicados de innumerables troneras. Cuando finalmente entraron en el edificio, se encontraron con trampas y explosivos ocultos en cada habitación. La primera planta fue despejada con gran riesgo, solo para enfrentarse a otro feroz combate en la segunda. La lucha en la escalera era brutal: las granadas estallaban una tras otra.\n\nAl caer la noche, apenas habían avanzado dos manzanas. Camaradas caídos yacían en la cuneta, mientras los médicos buscaban desesperadamente a los soldados heridos entre los escombros. La feroz resistencia les recordaba sus encuentros anteriores en las afueras de Shanghái, pero la batalla en la isla de Chongming era aún más intensa. Los defensores sabían que no había marcha atrás.\n\nLa noche se instaló y el fuego de artillería resonaba a lo lejos. Yamada estudió el mapa que tenía en la mano. Su próximo objetivo era la Escuela Secundaria Minben, cerca de la carretera Xiangyang; los informes de inteligencia sugerían que se había convertido en una fortaleza compacta pero formidable."
 jap.140.a: "Mañana será otro día sangriento."
 jap.141.t: "Punto Romeo"
 jap.141.d: "Una densa niebla, como un enorme sudario de algodón, envolvía cada sonido en las Montañas Nube Blanca. La unidad del Mayor Oda llevaba cinco días vagando por estas tierras altas laberínticas, con los nervios a flor de piel. La noche anterior, tres soldados salieron de patrulla; solo dos regresaron. El tercero simplemente desapareció, como si nunca hubiera existido.\n\n\"Este lugar no está bien\", murmuró Murakami, el ametrallador, a través de la radio. \"Cada vez que detectamos señales del enemigo y vamos tras él, es como perseguir nuestra propia sombra\". Apenas terminó de hablar cuando los arbustos a la derecha crujieron y una figura oscura pasó velozmente. Al seguirla, solo encontraron unas pocas ramas pisoteadas y una única huella en el barro.\n\nLa noche era mucho más aterradora que el día. Suaves crujidos resonaban por el campamento, pero nadie sabía de dónde provenían. Los pases de lista solían revelar la desaparición de uno o dos hombres, y al amanecer, los equipos de búsqueda a menudo no encontraban más que una placa de identificación manchada de sangre o un auricular roto en algún rincón solitario.\n\nA medianoche, la niebla se espesaba aún más. Los soldados estaban sentados espalda con espalda, temerosos de cerrar los ojos. Cada uno sabía que quedarse dormido podría significar ser el siguiente en desaparecer. A lo lejos, se oían breves ráfagas de disparos, aunque nadie sabía si provenían de aliados, enemigos o simplemente de la propia montaña, jugando con sus mentes."
 jap.141.a: "Un lugar enloquecido."
 jap.142.t: "La última batalla del dragón"
 jap.142.d: "El cielo de Pekín estaba cubierto por un gris acero, resultado del humo y el polvo que lo invadían. En el distrito de Fuxingmen, cada calle estaba llena de hormigón roto y varillas retorcidas, y cada intersección se había convertido en una trampa mortal. El EPL había transformado cada edificio en una fortaleza, cada paso subterráneo en una emboscada, y cada ventana en el nido de un francotirador.\n\nUn solo tanque Tipo 90 retumbaba por la avenida Chang'an Oeste, mientras que dos soldados de la Policía Armada Popular, armados con explosivos, se lanzaban hacia adelante en un último acto de sacrificio: juntos, lograron derribar el tanque. El día anterior, una unidad de la milicia había logrado infiltrarse en el puesto de mando japonés a través de las alcantarillas; un combatiente herido hizo estallar una granada oculta en su cuerpo.\n\nLos vivos seguían luchando, mientras que los muertos usaban sus propios cuerpos para bloquear las calles y frenar el avance del enemigo. Alrededor de Zhongnanhai, las carreteras eran irreconocibles. Las escaleras del Gran Salón del Pueblo estaban llenas de cráteres, y las explosiones de artillería habían destrozado el Puente Jingshui. Sin embargo, los defensores se negaron a rendirse. Una compañía del EPL resistió en la Estación Xidan durante tres días y tres noches, luchando hasta que se les acabaron las balas. Usaron todo lo que tenían, desde ladrillos sueltos hasta sus propias manos, para mantener al enemigo a raya.\n\nUn pelotón japonés, al encontrar equipos de comunicación y mapas esparcidos mientras avanzaba, fue rápidamente aniquilado por las Fuerzas Especiales que habían tendido una emboscada entre los escombros. Cada hutong se había convertido en un campo de batalla, y cada patio en una trinchera. Esta antigua ciudad se defendía de los invasores solo con carne y hueso."
 jap.142.a: "En aquellos días, qué heroico; ese día, ¿era sereno?"
 jap.143.t: "Humanidad"
 jap.143.d: "En la oficina de la División de Investigación del Departamento de Policía Metropolitana de Tokio, el inspector Daisuke Kusanagi observaba la notificación disciplinaria que reposaba sobre su escritorio. Tres días atrás, había utilizado fuerza excesiva al arrestar a un traficante de drogas, lo que resultó en lesiones para el detenido. El comité de supervisión decidió imponerle una sanción leve: solo una reprimenda.\n\n\"Siempre te pones demasiado serio\", comentó su compañero, Kaneda, mientras dejaba a un lado su taza de café. Kusanagi miró hacia el crepúsculo a través de la ventana, donde las luces de neón proyectaban suaves halos sobre las calles empapadas por la lluvia. \"De niño, veía dibujos animados y pensaba que los policías eran héroes perfectos\", dijo con una sonrisa irónica. \"Ahora sé que hasta los robots pueden volverse locos, y ni hablar de los humanos\".\n\nPara sorpresa de todos, al día siguiente, la madre del traficante herido se presentó en la comisaría para agradecerle a Kusanagi. \"Sé que mi hijo ha tomado un mal camino\", dijo. \"Quizás fuiste un poco brusco, agente, pero sentí que realmente quería que cambiara su vida\".\n\nKusanagi nunca olvidó por qué decidió unirse a la policía. No fue para convertirse en un héroe intachable, sino para ayudar a mantener el orden en la ciudad. La gente comete errores; lo que realmente cuenta es si aprende de ellos."
 jap.143.a: "Cometemos errores; pero es por eso que aprendemos a perdonar."
 jap.144.t: "Negociaciones corporativas"
 jap.144.d: "En la sala de conferencias del último piso de la sede de NEC Corporation, la presidenta Ayano se encontraba frente al proyector, compartiendo sus palabras de clausura.\n\n\"La privatización es la única opción que nos queda\", afirmó la presidenta Ayano con una sonrisa amable, dirigiendo su mirada hacia los representantes gubernamentales que estaban sentados a la izquierda de la mesa. \"Estoy segura de que todos aquí conocen bien la capacidad de I+D de NEC en el ámbito de la inteligencia artificial\".\n\n\"Si aceptamos este proyecto\", continuó, \"podremos incrementar los ingresos en al menos un cuarenta por ciento en tres años\".\n\nPasando una página de su carpeta, siguió: \"Los detalles están en la página tres. El año pasado, nosotros...\"\n\n\"¡Un momento!\" El jefe de sección Sakamoto se levantó de repente, interrumpiéndola. \"Presidenta Ayano, estamos hablando de la seguridad de los datos de millones de personas. Sus condiciones son simplemente inaceptables; ¡se está aprovechando de la situación! ¿Ha considerado siquiera los pros y los contras antes de hacer estas exigencias?\"\n\nEl silencio llenó la sala de conferencias. La presidenta Ayano dejó sus documentos, manteniendo su sonrisa serena. \"Disculpen, necesito salir un momento\".\n\nMientras se alejaba, el sonido de sus pasos resonaba por el pasillo. El ministro Nakashima, quien presidía la reunión, se volvió hacia Sakamoto. \"Oye, Sakamoto, ¿no quieres hacer dinero? Cuando la presidenta Ayano regrese, discúlpate y luego vete\".\n\nSakamoto bajó la mirada. La luz del proyector proyectaba sombras en su rostro."
 jap.144.a: "Qué vergüenza."
 jap.145.t: "Viaje familiar"
 jap.145.d: "Kenichi Kimura estaba sentado en su apartamento, con el folleto de viajes a Palaos desplegado sobre la mesa del comedor. Era la primera vez que realmente se tomaba en serio la idea de un viaje al extranjero. Desde que su empresa les otorgó un aumento de sueldo, ese sueño se había vuelto de repente mucho más accesible.\n\n\"He oído que las aguas de Palaos son las más azules del mundo\", comentó su hija Sayuri, señalando una fotografía. Antes, él solía cambiar de tema cada vez que ella mencionaba viajes, pero ahora podía responder con confianza: \"Este año iremos a ver ese océano\".\n\nSu esposa, Yoshiko, se acercó para revisar el presupuesto del viaje. Las cifras ya no la hacían fruncir el ceño. \"Ya hemos reservado los billetes y el hotel\", dijo con una sonrisa. \"Nunca pensé que podríamos ahorrar tanto tan rápido\".\n\nKenichi recordó que hace un año, a estas horas, todavía estaría trabajando horas extras, revisando papeleo. Ahora, estaba emocionado planeando el primer viaje familiar al extranjero."
 jap.145.a: "Una vida hermosa."
 jap.146.t: "Líder femenina"
 jap.146.d: "En el moderno edificio de oficinas de Hachinohe, con sus paredes de cristal, Misaki Sato estaba al mando de su tercera reunión del mes. Hace veinte años, cuando se unió a la empresa, nunca había habido una mujer en la sala de conferencias. Ahora, su voz resonaba en el espacio del piso veintiocho mientras discutía un contrato multimillonario que provenía de Australia.\n\n\"Nuestras ganancias han crecido un cuarenta por ciento\", comentó, hojeando los informes. \"Eso se debe a la nueva línea de productos que lanzamos\". Los miembros de la junta tomaban notas con atención. A nadie le importaba su género; lo único que les interesaba era lo que podía lograr. Eso era lo que más valoraba del presente: la capacidad, más allá del género, era lo que realmente definía el valor de una persona.\n\nEn el pasillo, una foto grupal de 1998 adornaba la pared. En ella, una fila de hombres en traje, firmes, y solo una mujer al fondo. Misaki aún recordaba cómo, en aquellos días, las mujeres tenían que esforzarse el doble para recibir el mismo reconocimiento que los hombres.\n\n\"Aquí tienes el pronóstico para el próximo trimestre\", dijo Misaki, entregándole un archivo a una joven gerente. \"Me gustaría que te hicieras cargo\". Captó un destello de gratitud en los ojos de la mujer, un brillo que le recordó sus propios comienzos. Pero a diferencia de entonces, esta nueva generación de mujeres ya no tiene que andar con tanto cuidado."
 jap.146.a: "¿Quién dice que las mujeres son menos qué los hombres?"
 jap.147.t: "Debate en la cena"
 jap.147.d: "En la hora de la cena, en una modesta casa de Nagoya, Naoko, de dieciocho años, y Koji, de veinte, volvían a tener una acalorada discusión. El vapor seguía saliendo de la sopa de miso que estaba sobre la mesa.\n\n\"¡Necesitamos más bienestar social!\" exclamó Naoko, dejando caer los palillos. \"Todavía hay mucha gente que necesita ayuda\".\n\n\"Pero la nación necesita fortalecerse\", respondió Koji. \"Solo hay que mirar a nuestros vecinos...\"\n\nSu padre, Kenichi Kimura, mantenía la cabeza baja sobre su comida, como si el arroz en su plato fuera más importante que cualquier argumento. Sabía que había alguien mucho más capacitado para juzgar este debate. En la cabecera de la mesa estaba Daisuke Kimura, un exmiembro de la Cámara de Consejeros, ahora un anciano con el cabello blanco que reflejaba muchos años de experiencia. Dejó su taza de té.\n\n\"Basta\", dijo con una voz tranquila pero firme. \"¿Se dan cuenta de cuánto nos costó alcanzar la paz?\" Se volvió hacia Naoko. \"Quieres aumentar la asistencia social, pero ¿sabes cuánto fue el presupuesto del año pasado? Hablas de todos estos gastos, ¿de dónde crees que sale el dinero?\". Luego miró a Koji. \"Deseas un ejército fuerte, pero ¿entiendes lo que significa el militarismo? Es el caldo de cultivo del fascismo, la misma pesadilla de la que mi generación, y la de tu abuelo, lucharon con tanto empeño por escapar.\n\n\"El camino actual de Japón está pavimentado con sangre y sabiduría adquirida a través del esfuerzo. Puede que no sea perfecto, pero es el camino más adecuado para nosotros\"."
 jap.147.a: "Quienes están en el medio no pueden ver el panorama."
 jap.148.t: "El campo"
 jap.148.d: "En un pequeño pueblo de la prefectura de Akita, Masao Sato se acomoda en una silla de mimbre bajo un viejo cerezo, mientras sus ojos se pierden en los ondulantes arrozales que se extienden a lo lejos. Con ochenta y siete años a sus espaldas, su memoria fluye como el agua inagotable del antiguo pozo que se encuentra junto al jardín.\n\nRecuerda con nostalgia la vibrante era Showa, cuando los Walkman de Sony conquistaban el mundo y los coches Toyota recorrían todos los continentes. En esos días, Japón era como un cerezo en plena floración, deslumbrando al mundo con su esplendor. Sin embargo, parece que los jóvenes de hoy, en gran medida, no se sienten tan conectados con esos logros.\n\nA pesar de eso, su nieto, Kenichi, ha traído una nueva luz a su vida. El niño que solía perderse en los videojuegos ha comenzado a sumergirse en el estudio de la historia de Japón. Justo el mes pasado, mientras estaban bajo el cerezo, Kenichi le compartió emocionado los últimos avances tecnológicos del país. \"Abuelo, ¿sabías que nuestra tecnología está volviendo a ser la mejor del mundo?\"\n\nMasao recuerda el brillo en los ojos de su nieto, un destello que le evoca su propia juventud. No era un nacionalismo estrecho, sino una alegría profunda y auténtica al ver cómo su nación avanza. Quizás cada generación tiene su propia forma de amar a su patria, al igual que este cerezo, que florece de manera única cada año."
 jap.148.a: "Un verdadero patriota."
 jap.149.t: "Ceniza a ceniza, polvo a polvo"
 jap.149.d: "En un pequeño edificio de estilo occidental en la antigua zona de concesiones de Tianjin, el Comité de Control Militar de la OTDP, que se encarga del área metropolitana de Pekín-Tianjin, está llevando a cabo una reunión de trabajo. La sala está llena de actividad: montones de documentos se apilan, los teléfonos suenan de vez en cuando y los asesores llegan corriendo con correo urgente. Alrededor de una mesa redonda, representantes de los países miembros del tratado discuten varios temas.\n\n\"Creo que hemos cubierto los asuntos más urgentes\", comentó el Teniente General de la Fuerzas de Autodefensa, que se sentaba al frente de la mesa. Reunió sus documentos con un aire relajado mientras el sol comenzaba a ponerse. Los demás generales asintieron, levantando sus tazas de café en señal de acuerdo.\n\"Disculpe, presidente\", intervino un general indio. \"Pero me gustaría proponer un tema más para discutir\".\n\nAlguien en la mesa soltó un profundo suspiro, reflejando el sentir de muchos. Lo que quiero mencionar es la Resolución 1.438, que trata sobre el manejo de los restos. Como todos sabemos, los resultados de la investigación son alarmantes. El brazo izquierdo y la pierna derecha del cuerpo han desaparecido por completo, y la mayor parte del cabello y la piel han sido reemplazados por sustitutos artificiales. Sus condiciones únicas de conservación son casi imposibles de mantener. Incluso si no intervenimos, es probable que el Gobierno local decida deshacerse de él pronto. Entonces, ¿por qué deberíamos molestarnos en organizar una ceremonia de demolición y cremación? ¿No sería un desperdicio?\n\nLa mayoría de los presentes se quedaron en silencio. El Teniente General de las Fuerzas de Autodefensa miró al Mayor General de la República de China, que estaba a su izquierda. El Mayor General carraspeó antes de comenzar a hablar:\n\"General Singh, comprendo su confusión. Sin embargo, debo señalar que estamos hablando de un edificio que posee un gran valor simbólico para el antiguo régimen de la República Popular China, su partido gobernante y sus partidarios. No se puede ignorar su potencial para convertirse en un símbolo político, representando ideologías antidemocráticas y antipacíficas. Demoler este edificio y sus ruinas no es una provocación. Es, más bien, un intento de borrar un capítulo doloroso de la historia, que podría provocar futuros agravios si no se controla\".\n\nEl Mayor General Singh asintió, comprensivo, y el general japonés aplaudió aliviado. \"Entonces podemos anunciar oficialmente el levantamiento de esta reunión\", dijo."
 jap.149.a: "Así, se selló el destino del Mausoleo de Mao Zedong."
 jap.150.t: "Imposición de justicia"
 jap.150.d: "\"Para rendir homenaje a aquellos que se sacrificaron y asegurar que el legado de la lucha incansable del mundo libre no se desperdicie, defendemos la necesidad de justicia\", afirmó el ministro de Asuntos Exteriores japonés, mirando fijamente a la cámara durante una transmisión en vivo. Después de una serie de frases elaboradas y sofisticadas, el ministro anunció oficialmente el enjuiciamiento de los criminales de guerra de la República Popular China y los Estados miembros de IDEA. También mencionó que organizaciones como el Comité Central del PCCh, el Consejo de Estado, la APN, la CCPPCh y la CMC, entre otras, habían sido catalogadas como entidades criminales, y que sus miembros serían objeto de investigaciones de desnazificación.\n\nAdemás de los militares ya detenidos en campos de prisioneros de guerra, los gendarmes llevaron a cabo operaciones en varios lugares, allanando villas y expulsando a antiguos miembros de la élite. Se confiscaron propiedades de los criminales de guerra, incluida una estatua dorada del Buda, de más de 30 centímetros de altura, que perteneció a un general destacado.\n\nEntre todos los criminales de guerra de Clase A, la reacción más fuerte provino de Sun Jianguo, ex subjefe del Estado Mayor General del EPL. Fue condenado a muerte por múltiples casos de trabajos forzados contra el pueblo de Ryukyu durante la Gran Guerra Asiática. El almirante protestó, argumentando que el veredicto del tribunal menospreciaba su identidad militar, y exigió una pistola para \"terminar con su vida con dignidad\". Sin embargo, el Comité de Justicia Militar de la OTDP rechazó su solicitud. Al final, el almirante encontró su destino en la horca."
 jap.150.a: "Deberían haber pensado en el precio que tendrían que pagar."
 jap.151.t: "Declaración de Libertad y Democracia en Asia"
 jap.151.d: "Redactado por: Japón\nCopatrocinado por: La Mancomunidad de Australia, Nueva Zelanda y la República de la India\n\nLa paz y la estabilidad en la región del Indopacífico están bajo una seria amenaza. La creciente militarización de la República Popular China en el mar de la China Meridional y el mar de la China Oriental, junto con su presión económica sobre los países vecinos y su intención de socavar el orden internacional, han puesto en riesgo la paz y la prosperidad de la región. Este tipo de comportamiento no solo atenta contra la soberanía y la integridad territorial de los Estados de la zona, sino que también representa un desafío directo al orden internacional basado en normas.\n\nEstamos convencidos de que la libertad, la democracia, los derechos humanos y el Estado de derecho son fundamentales para el progreso y la prosperidad en el Indopacífico. Cualquier intento de alterar el statu quo mediante la fuerza o de lograr objetivos políticos a través de la coerción solo perjudicará los intereses a largo plazo de la región. Debemos permanecer unidos para proteger estos valores que tanto nos ha costado conseguir y resistir cualquier forma de expansión autoritaria. Nuestros esfuerzos conjuntos son la clave para asegurar la paz y la prosperidad continuas del Indopacífico, manteniéndolo en un camino de libertad, apertura y democracia.\n\nTodas las naciones que comparten estos valores son bienvenidas a unirse a esta noble causa. Solo juntos podremos garantizar un futuro brillante para la región del Indopacífico."
 jap.151.a: "El Perímetro de Defensa de Asia-Pacífico."
 jap.152.t: "Apoyo militar"
 jap.152.d: "El capitán Yamada y Chen cruzaron rápidamente una calle desierta. La brisa marina ocultaba sus pasos mientras las luces del puerto pesquero se desvanecían detrás de ellos. Más adelante, se erguía una cordillera oscura, donde la rama de Tainan de la Fuerza Oso Negro mantenía una base secreta.\n\n\"El séptimo envío de equipo está programado para llegar el próximo mes\", comentó Yamada, con su rifle HK416 en mano. \"Incluirá misiles antitanque ligeros Tipo 01 y gafas de visión nocturna AN/PVS-15, además de munición suficiente para tres meses\".\n\n\"Gracias por tu ayuda\", respondió Chen. \"Pero necesitamos más sistemas antidrones. Esos drones de los bastardos del continente han hecho que muchos de nuestros hombres caigan en sus trampas\".\n\n\"Los tendremos en el próximo envío. El Gobierno japonés ha decidido brindarles todo su apoyo\", le aseguró Yamada. \"Recuerda, no están luchando solos; estaremos a su lado en cada paso del camino\"."
 jap.152.a: "Necesitamos más armas."
 jap.153.t: "Divididos"
 jap.153.d: "El (ex-)embajador de Estados Unidos en Japón irrumpió en la sala de conferencias del Ministerio de Asuntos Exteriores, con el rostro encendido por la ira. Apretaba una carpeta con tanta fuerza que los bordes se arrugaron. Afuera, Tokio seguía su ritmo habitual, como si no le importara la tormenta que se desataba al otro lado del Pacífico.\n\n\"¡Esto es un incumplimiento total del contrato!\", exclamó el embajador, y su voz resonó en toda la sala. \"¿Cómo puede el Gobierno japonés suspender unilateralmente el pago de la deuda? ¡Esto va en contra de todos los principios del orden financiero internacional!\".\n\nEl ministro de Asuntos Exteriores de Japón observó al diplomático con calma, manteniendo su serenidad. Su expresión era difícil de leer, pero sus palabras tenían un peso innegable. \"Señor, dígame, en la situación actual de su país, ¿a quién deberíamos pagar esta deuda? ¿A la administración del presidente Trump o al Gobierno federal del presidente Biden? ¿O tal vez al llamado Ejército Popular de Liberación, que dice representar al pueblo? Si ustedes mismos no tienen claro esto, ¿cómo pueden exigirnos que tomemos una decisión?\""
 jap.153.a: "El embajador abrió la boca, pero no pudo pronunciar palabra."
 jap.154.t: "Pequeño interludio"
 jap.154.d: "\"Acabo de ver las noticias\", dijo el profesor Fujita, dejando el teléfono a un lado. \"¿Van a deliberar sobre el Artículo 9 en la Dieta? En un momento como este, ceder ante China podría ser inevitable.\"\n\n\"¿Ceder?\" El profesor Yamamoto levantó la vista, frunciendo el ceño. \"Debes haber entendido mal. Planean abolir el Artículo 9.\"\n\nLa mano del profesor Fujita se quedó paralizada. \"¿Qué? ¿Abolirlo? ¡Eso es una locura! ¿Acaso intentan revivir nuestra historia pasada?\"\n\n\"Argumentan que la Constitución de la Paz ya no tiene relevancia\", respondió el profesor Yamamoto, reclinándose en el sofá. Esa misma mañana, había terminado de leer un trabajo de un estudiante que era realmente espantoso. \"Sobre todo después de la guerra en el estrecho de Taiwán.\"\n\n\"¿Pero no demuestra eso que necesitamos la paz más que nunca?\", preguntó Fujita, alzando la voz. \"La guerra solo trae destrucción. ¿No es esa la lección más profunda que nos ha enseñado la historia?\" \"Ahora mismo, los políticos solo ven humillación\", dijo Yamamoto, negando con la cabeza. \"Aseguran que la Constitución de la Paz es una soga al cuello de Japón.\"\n\n\"Ridículo\", replicó Fujita con una risa fría. \"¿Acaso planean quitar esa soga y luego ponérsela a todos los ciudadanos?\""
 jap.154.a: "A los ojos de los políticos, ¿qué importa la gente?"
 jap.155.t: "Consejo amistoso"
 jap.155.d: "En el cuarto piso de la Agencia Nacional de Policía, hay un nuevo departamento que aún no tiene nombre; tan reciente, de hecho, que el letrero en su puerta sigue vacío. Cada mañana, a las 8:00, el personal, vestido de traje, llega y se forma para entrar en una oficina con persianas, donde se sientan frente a filas de monitores que emiten una suave luz azul. Su tarea es vigilar el \"discurso inapropiado\", como si estuvieran cazando sombras en un vasto océano.\n\nEn el escritorio del Jefe de Sección Sato reposan las últimas Directrices de Gestión de Medios, un delgado folleto rojo sin autor. \"Hoy, tres medios en línea se han desviado\", informa un joven empleado. \"Usaron la frase «aumento de la capacidad militar» en lugar de «capacidades de autodefensa mejoradas»\".\n\nSato asiente y marca un formulario en blanco. Desde que se creó el departamento, veintisiete medios diferentes han recibido \"cartas de aviso\" por \"redacción incorrecta\". Estos avisos siempre concluyen con la misma despedida cordial: \"Esperamos que lo comprenda\".\n\nEn la pared, una gran pantalla parpadea constantemente, mostrando un flujo de datos que rastrea la opinión pública en tiempo real. El rojo indica opiniones negativas, el azul positivas y el verde -según las Directrices- representa una \"preocupación justificada\". Todos los datos se registran, analizan y convierten en cifras clínicas para los informes semanales del departamento.\n\nAl final de la jornada, el personal sale de la oficina anónima y regresa a su vida cotidiana."
 jap.155.a: "Y esas pantallas vigilan cada rincón."
 jap.156.t: "El cuerpo móvil"
 jap.156.d: "Ken'ichi Fujiwara salió de su apartamento vestido de civil, mientras una suave llovizna caía del cielo gris. Como oficial de la División de Tráfico del Departamento de Policía Metropolitana de Tokio, raramente disfrutaba de un día libre. A las cuatro de la mañana, las calles de la ciudad estaban en calma, salvo por un extraño estruendo que resonaba a lo lejos.\n\nAl doblar la esquina, apareció el primer carro de combate principal Tipo 90. Su comandante, con cara de sueño y aún con aspecto de recién levantado, se acomodaba en la torreta. Detrás de él, varios vehículos blindados y camiones militares, llenos de personal de las Fuerzas de Autodefensa, estaban estacionados; algunos dormían profundamente, mientras otros miraban con expresión perdida hacia las hileras de rascacielos, como si no entendieran por qué los habían convocado a Tokio a esa hora.\n\nArriba, tres helicópteros AH-1Z zumbaban sobre el horizonte de la ciudad, sus rotores resonando contra las torres de hormigón. Un asalariado se quedó paralizado, demasiado aturdido para darse cuenta de que su maletín se caía al suelo. Cerca de allí, un grupo de jóvenes curiosos grababa con entusiasmo el paso del convoy con sus teléfonos, como si estuvieran presenciando el rodaje de una película de acción.\n\nFujiwara observó cómo pasaba lentamente un vehículo blindado Tipo 96, con su operador de radio cabeceando mientras escuchaba a través de unos auriculares rojos que parpadeaban. Un mensajero en bicicleta, cargado de periódicos que no mencionaban nada de esto, se detuvo al borde de la carretera para contemplar la escena. Para cuando esos periódicos llegaran a las puertas de los hogares, Tokio podría haber cambiado por completo."
 jap.156.a: "La ciudad aún dormita en la bruma del amanecer."
 jap.157.t: "Traidor"
 jap.157.d: "\"¡Esta derrota en la guerra recae plenamente sobre sus hombros!\", exclamó Lintsukiko Tsubaki, del Partido Liberal Democrático, mientras su voz resonaba en toda la cámara de la Dieta. \"Mientras nosotros trabajábamos sin descanso por la seguridad nacional, ¿qué hacían ustedes? ¡Organizando protestas contra la guerra en las calles! ¡Oponiéndose al presupuesto de defensa en la Dieta!\"\n\n\"¡Eso es democracia en acción!\", respondió un miembro del Partido Constitucional Democrático, levantándose de su asiento.\n\n\"¿Democracia?\", se rió Tsubaki con ironía. \"Cuando Taiwán clamaba por ayuda, ¿su idea de democracia era quedarse de brazos cruzados? Podríamos haber resistido la expansión de China con todas nuestras fuerzas, pero en lugar de eso, tuvimos que perder tiempo negociando con ustedes aquí en casa. Cada vez que se discutía el presupuesto de defensa, cada ley, ¡ahí estaban ustedes, poniendo obstáculos!\"\n\n\"¡No distorsionen los hechos!\", gritó un legislador del Partido Democrático para el Pueblo. \"¡Es su política exterior la que ha fracasado de manera estrepitosa!\"\n\n\"¿Fracasado?\" Tsubaki golpeó la mesa con ambas manos. \"¿Quién filtró nuestros despliegues de defensa? ¿Quién siguió menospreciando a las Fuerzas de Autodefensa en los medios? ¿Quién socavó la determinación del público en el momento más crítico? Ahora que Taiwán ha caído, ¿están satisfechos?\"\n\nLa sala estalló en un alboroto, pero la voz de Tsubaki se alzó por encima del ruido. \"Algún día, la verdad sobre cómo traicionaron nuestros intereses nacionales saldrá a la luz. ¡La historia recordará quién le dio a nuestros enemigos su mayor ventaja en este momento de crisis!\""
 jap.157.a: "¡Sois criminales a los ojos de la historia!"
 jap.158.t: "Protesta pacífica"
 jap.158.d: "Yamato Suzuki ajustó la correa de su casco antidisturbios y se preparó con su escudo. Como capitán de la Unidad Móvil de Policía, levantó el altavoz por tercera vez: \"De acuerdo con la Ley de Reuniones Públicas y Manifestaciones, se les ordena dispersarse de inmediato. Si no lo hacen, usaremos la fuerza\".\n\nLas risas burlonas comenzaron a resonar entre los manifestantes. \"¡Abajo el tirano! ¡Viva la paz!\", gritaban con todas sus fuerzas, levantando carteles en un acto de desafío. Suzuki observó los rostros de estos supuestos pacifistas; sus pancartas decían \"Derrocar al Tirano\", pero parecían ignorar la grave crisis que enfrentaba el país.\n\n\"Esta es su última advertencia. Cualquiera que permanezca aquí en los próximos diez minutos será arrestado por obstrucción a las funciones oficiales\". El tiempo pasaba lentamente. En lugar de dispersarse, los manifestantes comenzaron a avanzar hacia la línea policial. Suzuki notó que algunos estaban grabando de manera provocativa, aparentemente esperando capturar un momento de \"brutalidad policial\".\n\n\"Adelante\", ordenó con firmeza. Como una espada desenvainada, el escuadrón antidisturbios se abrió paso entre la multitud. Suzuki se abalanzó sobre uno de los líderes -un hombre con un pañuelo rojo- y lo sometió rápidamente. El hombre seguía gritando sobre \"violencia policial\", pero Suzuki decidió ignorarlo."
 jap.158.a: "En estos tiemps, ¿creen que pueden salirse con la suya con semejante caos?"
 jap.159.t: "Discurso del primer ministro"
 jap.159.d: "Al caer la noche sobre el Monte Fuji, nuestra nación se enfrenta a desafíos sin precedentes. Un viento frío del norte trae consigo la amenaza de Rusia, mientras que las olas del mar de la China Oriental resuenan con las ambiciones de China, y nubarrones se ciernen cada vez más sobre la península de Corea. Estas potencias buscan atar nuestra libertad con cadenas y aplastar nuestra determinación a través del miedo.\n\nHemos perdido a nuestro vecino más cercano, y esta región marítima se ha vuelto aún más precaria. Sin embargo, recordemos esto: Japón nunca se ha rendido ante la soledad ni ante la adversidad.\n\nCuando la luz de la mañana atraviesa las nubes y los cerezos florecen a pesar de los fuertes vientos, eso es lo que somos como pueblo. Podemos ser golpeados, pero nunca quebrantados; podemos estar solos, pero nunca perder el rumbo.\n\nDebemos ser tan vigilantes como los ninjas y tan valientes como los samuráis. Que aquellos que desean esclavizarnos vean que, aunque nuestra nación insular sea pequeña, nuestro espíritu es inquebrantable. Cada grano de arena en esta tierra lleva el legado de nuestros antepasados.\n\nNo se dejen llevar por la desesperación, porque eso es lo que nuestros enemigos desean.\nNo bajen la guardia, porque la vigilancia es el precio de la libertad.\nNo pierdan la fe, porque la fe es nuestra mayor arma.\nMientras el Monte Fuji exista y los cerezos florezcan cada primavera, el espíritu de Japón jamás se extinguirá."
 jap.159.a: "Jamás se rindan."
 jap.160.t: "Cuestionar la responsabilidad"
 jap.160.d: "\"Déjenme contarles lo que parece un verdadero desastre político\", comenzó Rinko Tsukikage, del Partido Liberal Democrático, con la voz tensa y una ira contenida desde el podio. \"Su supuesto «Plan de Revitalización de PYMEs» es, en realidad, una broma monumental\".\n\nLevantó un informe estadístico. \"¿Un proceso de aprobación simplificado? Eso ha permitido que empresas sospechosas se cuelen sin ser detectadas. Más de ochocientas empresas fraudulentas han aprovechado esta laguna legal para recibir subsidios que suman más de ochenta mil millones de yenes. Mientras tanto, las empresas tradicionales que realmente necesitan apoyo se ven empujadas a una competencia feroz porque ustedes eliminaron los estándares de entrada al sector\".\n\n\"Y en cuanto a su tan publicitada «política de liberalización de los medios», la eliminación de los requisitos de licencia ha inundado el mercado con casi tres mil fuentes de medios en línea sin verificar. Solo en el último año, más de veinte mil noticias infundadas se han viralizado en las redes sociales. ¿Tienen idea del caos que esto ha generado en nuestra sociedad?\"\n\nTsukikage dirigió su mirada hacia los asientos de la oposición, donde algunos miembros guardaron silencio mientras otros parecían listos para responder. \"Por un solo informe falso sobre seguridad alimentaria, cuatro empresas con una larga trayectoria se fueron a la quiebra, dejando a tres mil personas sin empleo. ¿Eso es lo que ustedes entienden por «libertad de expresión»?\". Levantó otro expediente. \"Pero estos ni siquiera son los fracasos más graves. Su mayor error ha sido ignorar por completo nuestras necesidades de defensa. Bajo su administración, se ha recortado el presupuesto de defensa y la modernización del equipo de las Fuerzas de Autodefensa se ha retrasado una y otra vez. ¡Ahora, Taiwán ya ha caído y los buques de guerra chinos patrullan cerca de nuestras aguas territoriales! No tenemos más opción que enfrentarnos a un vecino aún más agresivo, ¡y todo gracias a ustedes!\""
 jap.160.a: "¿Así que estos son los «frutos» de sus reformas?"
 jap.161.t: "Los pasillos del poder"
 jap.161.d: "\"Presta atención, Yoko. Aquí es donde se discuten todas las decisiones cruciales sobre los asuntos de nuestra nación\", comentó el señor Uda, de la prefectura de Chiba, mientras se acomodaba en su asiento en la galería de espectadores del segundo piso del Edificio de la Dieta. Observaba con satisfacción los eventos que se desarrollaban en la sala de abajo.\n\n\"Sí, papá\", respondió Yoko, la hija mayor de la familia Uda, con su brillante cabello negro y una apariencia elegante y refinada. El Edificio de la Dieta apenas había cambiado desde el año Showa 11, con solo algunas reparaciones menores tras incendios y terremotos.\n\nDe hecho, no solo la arquitectura se había mantenido igual; la diversidad de personas en la asamblea también mostraba sorprendentes similitudes con las de hace un siglo. Por ejemplo, el anciano legislador en la primera fila, justo detrás de los ministros del gabinete, disfrutaba de la admiración de sus colegas más jóvenes, casi indistinguible del noble Genro del pasado, que lucía uniformes lujosos con ribetes dorados y llevaba bicornios adornados con plumas. De igual manera, el individuo que entraba por la izquierda, estrechando manos, intercambiando cumplidos y charlando alegremente, se parecía notablemente a los jóvenes oportunistas que siempre rodeaban a Fumimaro Konoe. Incluso la figura corpulenta que se abría paso entre la multitud hacia su asiento parecía una versión moderna de los prodigios políticos del Taisei Yokusankai, que habían pasado de las páginas del Yomiuri Shimbun a las salas legislativas del siglo XXI.\n\n\"...¿Qué opinas, Yoko?\", preguntó Lord Uda mientras el presidente de la Cámara daba un golpe con el mazo para cerrar la sesión, que había terminado tras extensos debates sobre enmiendas menores a varios proyectos de ley.\n\nYoko respondió de inmediato: \"Me pareció muy educativo y agradezco esta oportunidad, padre\". Sin embargo, en su interior, mientras escuchaba el acalorado debate sobre la necesidad de eliminar un adjetivo de una oración, pensó:"
 jap.161.a: "\"...Es increíble lo apáticos e indiferentes que pueden ser los humanos\"."
 jap.162.t: "El país del Sol Poniente"
 jap.162.d: "Hace mucho tiempo, en la tierra de Izumo, Susanoo-no-Mikoto recibió la importante tarea de proteger estas costas. Era una deidad poderosa, famosa por empuñar la espada Ame-no-Murakumo, y en una ocasión, derrotó al temible Yamata-no-Orochi para salvar a la princesa Kushinada de un destino trágico. Sin embargo, con el paso de los años, Susanoo se volvió un poco complaciente. Se convenció de que su poder nunca disminuiría y que su destreza con la espada jamás se oxidaría. En esos días de paz, dejó de lado su entrenamiento diario y permitió que la espada Ame-no-Murakumo se cubriera de polvo en el estante.\n\nUn día, una serpiente aún más formidable emergió de los mares del este. Sus escamas brillantes y su lengua bífida y helada eran un claro reflejo de su aterrador poder. Susanoo tomó su espada, que llevaba tiempo sin usar, solo para darse cuenta de que la hoja estaba desafilada. Al adoptar su postura de combate, se dio cuenta de lo oxidadas que estaban sus técnicas. Frente a esta colosal serpiente del Este, el héroe que una vez había vencido a Yamata-no-Orochi se encontró ahora impotente.\n\nEn el feroz enfrentamiento que siguió, Susanoo fue retrocediendo paso a paso. Su habilidad con la espada, que antes era motivo de orgullo, resultó ser sorprendentemente frágil. Al final, solo pudo observar cómo la serpiente reclamaba la tierra que había jurado proteger. Las lágrimas volvieron a brotar de los ojos de la princesa Kushinada, pero esta vez..."
 jap.162.a: "...ningún héroe puede salvarla."
 jap.163.t: "La batalla final"
 jap.163.d: "Yu Inoue echó un vistazo al mapa operativo en la sala de mando táctico de la Escuela Secundaria Zhongshan. La distancia de quinientos metros había sido cuidadosamente dividida en varias zonas de asalto, con cada bloque marcado con información estratégica detallada. Al amanecer, doce carros de combate principales del 3er Regimiento Blindado iniciarían la primera oleada de ataques, mientras que el pelotón de infantería de Inoue avanzaría desde ambos flancos, protegido por la cobertura de los tanques.\n\nLa confirmación de que el equipo estaba listo resonó en su comunicador. Inoue revisó su rifle Tipo 89, asegurándose de que cada parte mecánica estuviera en perfecto estado. La munición ya se había distribuido, con seis cargadores de repuesto perfectamente organizados en su chaleco táctico. Los sistemas de visión nocturna y térmica estaban siendo calibrados por última vez.\n\n\"Quince minutos para la operación\", la voz del líder del pelotón sonó en su auricular. A través de su monocular táctico, Inoue pudo distinguir claramente la silueta de la Estación Dalian contra el cielo nocturno. Durante la última semana, cada posible punto estratégico y zona de tiro en esas calles había sido analizado una y otra vez. Los motores de los vehículos blindados retumbaban en la oscuridad como bestias listas para atacar. Inoue realizó una última revisión de los canales de comunicación, asegurándose de que la conexión con los blindados fuera sólida."
 jap.163.a: "El clima es bueno hoy."
 jap.164.t: "La marcha"
 jap.164.d: "Fujii Kaisho, sentado en la parte trasera de un camión militar, observaba cómo el humo negro se elevaba al final de la carretera sur. Era el tercer día desde que su unidad había tomado Shenyang, y la Estación Provincial de Radiodifusión de Jilin se había convertido en el último bastión de resistencia de la ciudad. Un viento frío, impregnado de olor a pólvora, entraba por la plataforma abierta del camión, evocando recuerdos del diario de su abuelo.\n\nEse cuaderno amarillento documentaba todo desde el Incidente de Mukden en 1931. En aquel entonces, el Ejército de Kwantung había viajado hacia el norte de una manera muy parecida, en trenes de tropas que cruzaban las llanuras del noreste de China. Las locomotoras de vapor dejaban tras de sí una estela de humo blanco, mientras que ahora era humo negro, resultado del fuego de artillería.\n\nUn convoy blindado avanzaba con estruendo por la carretera; el traqueteo de las orugas de los tanques contra el asfalto aturdía a Fujii. Más de noventa años después, volvían a recorrer la misma tierra. A través de la ventana, el paisaje le resultaba extrañamente familiar: la misma tierra, el mismo humo flotante, y en el bolsillo de su pecho guardaba una foto idéntica a la que su abuelo había llevado consigo en su juventud.\n\n\"Cinco kilómetros\", resonó la voz del capitán por la radio. Fujii aferró su rifle automático, contemplando la tenue silueta del edificio de la emisora que se alzaba entre la bruma. En ese instante, la historia pareció superponerse. Pensó en las escenas del diario de su abuelo que describían Fengtian y el avance del Ejército de Kwantung hace tanto tiempo. Ahora, como si estuviera viajando a través del tiempo, se encontraba recorriendo el camino de su antepasado."
 jap.164.a: "Esta vez, el final será diferente."
 jap.165.t: "¡Nankín, Nankín!"
 jap.165.d: "En medio del estruendo de la artillería, la campana de cobre del Monumento a la Masacre de Nankín resuena con una tristeza profunda. El capitán Li Tieshan se encuentra frente al muro conmemorativo, donde se inscriben los nombres de 10.665 víctimas. \"Capitán, Wanda Plaza ha caído\", suena la radio con la voz del comunicador. \"El último mensaje de la Policía Armada fue: «Preferimos morir antes que retirarnos»\".\n\n\"Recojan las últimas cartas de todos los soldados\", dice con serenidad. \"Díganles que hoy, aquí mismo, en esta tierra empapada con la sangre y las lágrimas de nuestros antepasados, escribiremos nuestro último capítulo\". La sala de exposiciones del monumento se ha transformado en un hospital de campaña improvisado. Los soldados heridos se apoyan en las vitrinas; las fotografías históricas, descoloridas, a su espalda muestran innumerables huesos y ríos de sangre de épocas pasadas. Sangre fresca gotea de las camillas, filtrándose por las grietas del suelo.\n\n\"¡El enemigo avanza por la calle Yunjin! Nuestras tropas de ese lado se están replegando a nuestra posición\". Li Tieshan observa los últimos misiles antitanque en la esquina: son las únicas armas pesadas que les quedan. Los soldados revisan sus municiones en silencio. Nadie habla, pero todos comparten la misma determinación: esta vez, vivirán y morirán con esta ciudad.\n\nUn soldado, mientras limpiaba su fusil, pregunta de repente: \"Capitán, ¿cree que nuestros antepasados nos observan desde arriba?\". Li Tieshan lo mira y responde: \"No solo observan. Están esperando que respondamos a esas 300 mil almas\". Esta será su última fortaleza. Li Tieshan coloca una bayoneta en su fusil y se vuelve hacia los soldados que están detrás de él. \"¡Prepárense para la batalla! Que la historia recuerde que aquí no fallamos a nuestros héroes caídos\"."
 jap.165.a: "¡Sus almas son héroes entre fantasmas!"
 jap.166.t: "Ojo de Tianjin"
 jap.166.d: "El cielo sobre Tianjin se desmorona bajo una densa nube de humo. En esta ciudad, que combina edificios históricos de la época de las concesiones con modernos rascacielos, la guerra se despliega de callejón en callejón. El EPL ha levantado defensas una tras otra en el distrito de estilo italiano, mientras las unidades blindadas japonesas avanzan desde la calle Haihe Este, dejando profundas marcas en el pavimento.\n\nLa Calle de la Cultura Antigua ha quedado hecha un desastre. Apoyándose en el Templo Tianhou, las fuerzas especiales del EPL llevan a cabo una guerra de guerrillas en un laberinto de callejones, donde cada esquina podría ocultar un escuadrón antitanque. Los vehículos blindados japoneses luchan por las angostas calles, enfrentándose a bombas incendiarias y explosivos improvisados que vienen de todas partes.\n\nLa Estación de Tianjin se ha convertido en una fortaleza aislada. El EPL ha transformado esta estación centenaria en un bastión, mientras las tropas aerotransportadas japonesas intentan desembarcar en la zona de Wudadao. Sin embargo, cada edificio se ha convertido en un punto fuerte, obligando a los japoneses a recurrir a ataques aéreos para destruirlos por completo.\n\nEn la Nueva Área de Binhai, los modernos rascacielos se han convertido en el campo de batalla más brutal. Las fachadas de cristal estallan en explosiones, y los puentes aéreos entre los altos edificios se transforman en terrenos elevados cruciales. La infantería de ambos bandos se enfrenta en las escaleras y a lo largo de múltiples pisos, utilizando todos los recursos a su alcance para eliminar al enemigo."
 jap.166.a: "Una pesadilla sin fin."
 jap.167.t: "Saludo a los caídos"
 jap.167.d: "Naoki Watanabe observa el destartalado carro de combate principal Tipo 99A en el puente. Avanza lentamente, como una bestia herida, acribillado a balazos, con sus orugas emitiendo chirridos metálicos y torturados. Sin embargo, sigue adelante, impulsado por una determinación escalofriante. Tras él marcha una columna de infantería del EPL, avanzando al unísono con posturas firmes. El blindaje dañado del tanque refleja la luz matutina, proyectando un resplandor dorado sobre esta lúgubre procesión.\n\n\"¡Esta es su última advertencia! ¡Depongan las armas y ríndanse inmediatamente!\", resuena la voz del líder del pelotón a través de un altavoz. \"¡Detengan el avance de inmediato!\". Pero los soldados que avanzan parecen no oírlo. Watanabe percibe un destello de conflicto en el rostro del oficial subalterno antes de levantar la mano. \"¡Abran fuego!\". A la orden, los disparos rompen la calma matutina. Los tres soldados del frente del EPL caen al instante, pero los que están detrás pasan por encima de los cuerpos y continúan avanzando. Un soldado, herido en la pierna, recibe rápidamente el apoyo de un camarada para seguir avanzando; otro, herido en el pecho, se estira hacia adelante antes de desplomarse, como si anhelara un sueño inalcanzable.\n\nEl cañón principal del tanque sigue rugiendo, volcando un vehículo blindado. Pero pronto, un misil antitanque silba y se estrella contra el blindaje lateral del tanque. En un destello de fuego, el gigante de acero finalmente detiene su avance. Al disiparse el humo, Naoki Watanabe se queda paralizado. Ha presenciado innumerables batallas, pero nunca una como esta. En los ojos de esos soldados moribundos no hay miedo ni vacilación, solo tristeza e ira."
 jap.167.a: "Los huesos fortifican la Gran Muralla; el lamento es profundo."
 jap.168.t: "India abandona la OTDP"
 jap.168.d: "\"¡Increíble lo de estos indios!\" El jefe de sección Sato soltó el telegrama diplomático a la mesa. \"Hemos estando preparando al Sur de Asia durante años, y ahora ellos simplemente se van de la OTDP sin decir nada? ¿Por quienes nos han tomado?\" Alrededor de la mesa, Moriyama Yukiko mantuvo una sonrisa profesional, ajustándose las gafas. \"Sato-sempai, cálmate por favor. A veces, es mejor dejar que se disipe el polvo y mirar a donde cae la bala\".\n\n\"¿Dejar ir a la bala?\" refunfuñó Sato. \"Los indios lo han dejado claro como el agua - ellos están «reajustando sus alianzas estratégicas en Asia». ¿Qué tan clara debe ser esa bala?\"\n\n\"Estás viendo esto de forma pesimista\", respondió Yukiko, mostrando un reporte en su tablet. \"Desde una óptima más optimista, ya no tenemos que gastar recursos para lidiar con las consecuencias de la guerra civil china. Con China envuelta en el caos, es natural que la India reconsidere sus posición geopolítica\". Sato miró al cielo de Tokio, en silencio. \"Años de maniobras, y al final, todo ha sido en vano\".\n\n\"No necesariamente\", respondió Yukiko. \"Los lazos entre la India y Japón siguen siendo fuertes. Que abandonen la Alianza no significa que también rompan la cooperación bilateral. En vez de eso, en tiempos como estos, lo que parecer una pérdida puede convertirse en una ventaja\". Sato se dirigió a ella, mostrando interés en sus ojos. \"Sigue\". Yukiko cerró su archivo. \"En vez de aferrarse a los marcos del tratado, deberíamos enfocarnos en cómo asegurar el beneficio mutuo para ambas partes\".\n\nSato suspiró, desvaneciéndose gradualmente el enfado de su cara. \"Tienes razón. En este mundo, a veces, lo más inteligente es hacerse el tonto\"."
 jap.168.a: "OK."
 jap.169.t: "India abandona la OTDP"
 jap.169.d: "India, un miembro fundador de la Organización del Tratado de Defensa del Pacífico, ha anunciado oficialmente la concepción de la Liga de Defensa del Sur de Asia, un nuevo bloque regional de seguridad que comprende el subcontinente indio y las areas aledañas. Simultáneamente, India anunció su retirada formal de la OTDP. De acuerdo a un comunicado del Ministro de Asuntos Exteriores Indio, la LDSA se basa en el principio de la \"autonomía regional\", enfatizando una profunda cooperación militar, de inteligencia y de recursos estratégicos entre sus Estados miembros.\n\nJapón y Australia, los otros miembros fundadores de la OTDP, han mostrado su preocupación sobre la decisión de la India. En un comunicado conjunto, sus respectivos ministros de asuntos exteriores reafirmaron su compromiso con mantener las operaciones de la OTDP mientras mantienen acuerdos de seguridad bilaterales con India.\n\nLos analistas internacionales sugieren que el movimiento de la India es señal de una nueva división en el terreno de la seguridad asiática. Por un lado, se mantiene la OTDP, liderada por Japón y Australia; y por el otro lado, la LDSA, con India como estado central."
 jap.169.a: "Interesante."
 jap.170.t: "China inicia ejercicios militares en el mar de la China Meridional"
 jap.170.d: "El Cuartel General de Inteligencia de Defensa ha informado recientemente de que China ha puesto en marcha un ejercicio militar a gran escala en el mar de la China Oriental, con un importante despliegue de buques de guerra, fuerzas aéreas, unidades anfibias y unidades de apoyo de fuego de largo alcance. Las evaluaciones de inteligencia indican que el ejercicio presenta claras características ofensivas, con su enfoque geográfico y objetivos simulados que sugieren claramente un objetivo estratégico hacia Japón y Taiwán. Esta demostración de fuerza parece un intento de reforzar el control de Pekín sobre el mar de la China Oriental y las regiones circundantes, desafiando directamente la postura defensiva de Japón.\n\nA través de reconocimientos por satélite y patrullas marítimas, la DIH ha confirmado que el ejercicio incluye buques de guerra avanzados, submarinos y grupos de ataque de portaaviones, mientras que también se han desplegado medios aéreos como cazas y aviones de reconocimiento, lo que demuestra la existencia de operaciones conjuntas altamente coordinadas.\n\nEn respuesta a este acontecimiento, la DIH recomienda la mejora inmediata de la postura defensiva de Japón en el mar de la China Oriental, junto con la intensificación del intercambio de inteligencia y la coordinación estratégica con las fuerzas aliadas para evaluar plenamente los riesgos potenciales para la seguridad que plantean las acciones de China."
 jap.170.a: "Contacta a nuestros aliados en Corea y en la OTDP."
 jap.171.t: "Corea del Norte traslada fuerzas a la frontera con Corea del Sur"
 jap.171.d: "El Cuartel General de Inteligencia de Defensa ha informado de una importante actividad militar norcoreana a lo largo de la frontera coreana, y la escala y la intención de la operación suscitan serias preocupaciones. Las imágenes de satélite de alta resolución y las redes de inteligencia terrestre confirman que varias divisiones de infantería norcoreanas se han concentrado en varias decenas de kilómetros al norte de la Zona Desmilitarizada. Esta concentración de tropas va acompañada de unidades de artillería, vehículos blindados y un aumento de los movimientos logísticos. Resulta especialmente preocupante que los aviones de reconocimiento hayan detectado que Corea del Norte está desplegando lanzadores de misiles balísticos de corto alcance y sistemas móviles de artillería de cohetes cerca de la frontera. Esta postura de fuerza sugiere preparativos para una demostración de fuerza estratégica o una posible acción militar.\n\nEn respuesta, la DIH ha ajustado sus prioridades de vigilancia sobre la península coreana y está llevando a cabo un estrecho intercambio de inteligencia y coordinación con las agencias australianas y surcoreanas para vigilar en tiempo real los movimientos de tropas y las intenciones estratégicas de Corea del Norte. Dado el historial de Corea del Norte de escalada de tensiones mediante maniobras militares fronterizas, la DIH asesora al gobierno y a los líderes de las Fuerzas de Autodefensa para que desarrollen planes de contingencia de forma proactiva para mitigar los riesgos de cualquier provocación potencial, garantizando la seguridad de Japón en un entorno regional cada vez más volátil."
 jap.171.a: "Eso no es muy bueno..."
 jap.172.t: "Buques chinos entran en aguas de Okinawa"
 jap.172.d: "Cada mañana, Taro, el pescador, zarpaba con su bote por las serenas aguas de Okinawa, lanzando sus redes al mar mientras la suave brisa matutina jugaba entre las olas. El horizonte se iluminaba con los primeros destellos anaranjados, y sus manos, callosas y firmes, manejaban las cuerdas con destreza. Su mirada intensa recorría el mar, buscando el sutil destello de los peces bajo la superficie. Pero la calma de la mañana no duró mucho.\n\nA lo lejos, manchas oscuras comenzaron a aparecer en el horizonte, creciendo cada vez más. Un zumbido sordo y resonante rompió la tranquilidad del mar. Taro entrecerró los ojos. ¿Barcos de carga? Tal vez otro carguero en camino a un puerto lejano. Pero a medida que las enormes siluetas se definían, sintió un nudo en el estómago: eran buques de guerra chinos. Sus cascos grises brillaban fríamente bajo el sol de la mañana, surcando las olas con una precisión deliberada. Las banderas con estrellas rojas ondeaban al viento, sus colores contrastando con el cielo pálido. Estos barcos no solo pasaban, sino que se dirigían directamente a estas aguas.\n\nLa flota se acercaba, trayendo consigo una sombra que proyectaba un manto oscuro sobre el pequeño bote pesquero de Taro. Entonces, se escuchó una transmisión, distante pero clara, palabras perdidas en el viento pero llenas de autoridad. Taro se quedó paralizado, aferrándose con más fuerza a la barandilla. Conocía este mar -su mar-, pero la voz tenía una fuerza innegable, una presencia que no pedía permiso. Su tripulación salió corriendo del camarote, apiñándose en cubierta, murmurando y señalando, sus voces ahogadas por las crecientes ráfagas de viento.\n\nLos buques no se detuvieron. Tras una breve pausa, la colosal flota avanzó, moviéndose con la inexorable determinación de los gigantes, abriendo un camino silencioso a través de las aguas que Taro siempre había considerado su hogar."
 jap.172.a: "¿Chinos? ¿En en mar de Okinawa?"
 jap.173.t: "China comienza preparatorios para operación de desembarco"
 jap.173.d: "El Cuartel General de Inteligencia de Defensa ha detectado actividades militares irregulares y a gran escala por parte de las fuerzas armadas chinas en múltiples direcciones estratégicas. La inteligencia obtenida mediante reconocimiento satelital, inteligencia de señales y patrullas marítimas confirma que el Ejército Popular de Liberación ha concentrado importantes fuerzas militares en el mar de la China Oriental y regiones adyacentes, incluyendo buques de guerra, activos aéreos y unidades de misiles terrestres. La escala y la frecuencia operativa de estos movimientos no tienen precedentes.\n\nResulta especialmente preocupante el avistamiento de múltiples buques insignia y formaciones submarinas de la Armada del EPL operando extensamente al este de Okinawa, acompañadas de frecuentes salidas de aviones de combate y de reconocimiento, lo que indica una expansión intencionada del control de China sobre los espacios aéreos y marítimos regionales. Además, la inteligencia confirma que el EPL ha realizado ejercicios de asalto anfibio a gran escala a lo largo de su costa, con el apoyo de artillería de cohetes de largo alcance y despliegues de misiles balísticos, lo que sugiere firmemente una amenaza directa tanto para Japón como para Taiwán.\n\nNuestra evaluación concluye que estas acciones pueden indicar preparativos para una operación militar de mayor escala o la ejecución progresiva de la estrategia hegemónica regional de China."
 jap.173.a: "¿Quieren otra guerra? La iniciaremos nosotros."
 jap.174.t: "Ciberataque preventivo"
 jap.174.d: "Los dedos de la subteniente Nami Okamoto se movían con destreza sobre el teclado, cada pulsación era precisa y deliberada. El Comando Cibernético de las Fuerzas de Autodefensa de Japón había alcanzado un punto crítico en su última operación, conocida como \"Sakura Snow\". Con la ayuda del buque de reconocimiento furtivo Hina Taka, habían logrado infiltrarse en un UAV chino \"Wing Loong\" que patrullaba las fronteras marítimas. El dron, ajeno a su traición, se había convertido en un caballo de Troya, colándose sin ser detectado en la red militar china.\n\nLa intrusión fue fluida, casi elegante: no se activó ni una sola alarma. Como una araña tejiendo su red, el programa \"Sakura Snow\" se extendió por nodos interconectados, profundizando con cada segundo que pasaba. Entonces, Nami lo encontró: una carpeta con un cifrado inusualmente robusto. El proceso de descifrado fue lento y arduo; cada capa que se despojaba revelaba algo mucho más siniestro que los protocolos rutinarios de defensa o los ejercicios de entrenamiento. A medida que los datos se cargaban en su pantalla, la atmósfera en la sala de operaciones se llenó de tensión. No se trataba de un documento militar estándar. Era una estrategia de guerra completa y meticulosamente planificada: cómo cortar las vías marítimas vitales de Japón, cómo paralizar sus redes eléctricas y de comunicación, cómo apoderarse de islas clave. El texto era clínico, calculado, carente de emoción; no era la retórica del conflicto, sino un manual de instrucciones para el exterminio. Un plan para borrar a Japón del mapa, con la misma facilidad con la que se aplasta un insecto o se elimina un obstáculo.\n\nLa mirada de Nami se fijó en la brillante pantalla llena de kanji. En su mente, surgió una antigua fábula: la rana cocinándose viva lentamente en agua tibia. La calidez inicial era engañosa, incluso reconfortante. Luego se volvió intensa, luego insoportable, hasta que finalmente fue demasiado tarde. Se quedó mirando las filas de caracteres chinos, congelada en su lugar durante lo que pareció una eternidad. Y entonces, a través de los espacios entre las palabras, vio lo que realmente estaba escrito allí. Dos caracteres, una y otra vez. \"Venganza\"."
 jap.174.a: "¡Alerta máxima!"
 jap.175.t: "Primer ataque contra China"
 jap.175.d: "El subteniente Wataru Matsuda se despertó de un salto por unos golpes insistentes en su puerta. En la penumbra de su camarote, apenas pudo distinguir la sombra de un póster de Toyama Kasumi: el \"amuleto de la suerte\" que su hermana menor le había regalado, asegurándole que lo mantendría a salvo y lo traería de vuelta a casa. \"¡Teniente Matsuda! ¡Reunión de emergencia!\", gritó la voz del oficial de comunicaciones desde el otro lado. Matsuda se vistió rápidamente con su uniforme y salió al pasillo, que ya estaba lleno de oficiales.\n\nEn la sala de operaciones, el capitán miró a todos y dijo: \"Caballeros, el cuartel general acaba de emitir una orden de alto secreto. La inteligencia ha indicado que la Armada china planea un ataque sorpresa contra nuestro país. Para proteger la seguridad nacional, llevaremos a cabo un ataque preventivo\". Matsuda sintió un momento de confusión. ¿Un ataque preventivo? Eso significaba que atacarían bajo la oscuridad, golpeando al enemigo antes de que pudiera reaccionar. Pero, ¿no había declarado el Gobierno que Japón nunca sería el primero en iniciar una guerra?\n\nDespués de la reunión, Matsuda salió a cubierta. Sacó un cigarrillo y lo encendió con la brisa marina, dejando que la nicotina calmara brevemente su mente. Pensó en su familia y en todo lo que había prometido proteger. El humo se arremolinó un instante antes de desvanecerse. Apoyado en la barandilla, sintió cómo los motores del destructor cobraban vida bajo sus pies. Pronto, partirían, rompiendo el silencio de la noche.\n\nDando una última calada profunda, Matsuda arrojó la colilla al mar negro como la boca del lobo. La pequeña brasa surcó la oscuridad y se desvaneció en la noche eterna. En ese instante, supo que la historia juzgaría la validez de esta decisión, y que estaba listo para asumir su responsabilidad."
 jap.175.a: "Aquí vamos."
 jap.1000.t: "¡Combates en la frontera coreana!"
 jap.1000.d: "Las llamas de la guerra vuelven a abrasar la península de Corea, una tierra ya profundamente marcada por conflictos pasados, convertida ahora en campo de batalla para la confrontación ideológica. Las botas de hierro del Norte han pisoteado sin piedad el frágil equilibrio del paralelo 38, mientras que las peticiones de ayuda del Sur parecen tenues e impotentes bajo la sombra de la bandera roja.\n\nSi Tokio se queda de brazos cruzados y permite que el régimen comunista unifique la península, su próximo objetivo podría ser Japón. Japón siempre se ha considerado el bastión de vanguardia de la democracia en Asia. Como defensor de la democracia, Japón no solo tiene la obligación, sino también la responsabilidad, de dar un paso al frente y ayudar a Corea del Sur a defender la libertad y la democracia que tanto le ha costado conseguir, incluso a un alto precio.\n\nAunque existen voces disidentes dentro del Gobierno, los gritos de la facción pro-guerra han acallado rápidamente toda oposición. En medio del clamor en la Dieta Nacional, los navíos de las Fuerzas de Autodefensa ya han surcado las olas, rumbo al último bastión de la democracia en la península de Corea. Los aviones de combate rompen el silencio del amanecer, y los soldados, completamente armados, avanzan con determinación y valentía en la mirada.\n\nNadie puede predecir el resultado de esta guerra, ni puede asegurar si la decisión de Japón es la correcta. Pero todos saben que la historia ha comenzado a girar, y nadie puede detener su avance."
 jap.1000.a: "Separados por montes y mares, unidos por el destino."
 jap.1001.t: "Intervención japonesa en la guerra de Corea"
 jap.1001.d: "Según un informe del corresponsal de Asahi Shimbun en Corea del Sur, esta madrugada se produjeron intensos tiroteos en la frontera entre Corea del Norte y Corea del Sur. Lo que comenzó como una pequeña escaramuza se convirtió rápidamente en una confrontación militar a gran escala. Ambas partes se acusaron mutuamente de disparar primero, alegando que sus acciones fueron en defensa propia. Los combates continúan y el número de víctimas aún no se ha confirmado. Se dice que el conflicto se desencadenó por un altercado físico entre unidades de patrulla de ambos países cerca de la Zona Desmilitarizada, que derivó en un tiroteo.\n\nCorea del Norte insiste en que los soldados surcoreanos cruzaron primero la línea de demarcación militar y provocaron a su unidad de patrulla, obligándola a abrir fuego en defensa propia. En contraste, el Ministerio de Defensa Nacional de Corea del Sur emitió un comunicado acusando a las fuerzas norcoreanas de un ataque no provocado contra una patrulla surcoreana, lo que provocó una necesaria respuesta de represalia. Según el Estado Mayor Conjunto de Corea del Sur, las fuerzas norcoreanas utilizaron cohetes y artillería para bombardear puestos fronterizos e instalaciones militares surcoreanas. En respuesta, las fuerzas surcoreanas lanzaron contraataques y desplegaron aviones de combate KF-16 para realizar ataques aéreos contra objetivos militares norcoreanos a lo largo de la frontera.\n\nMientras tanto, los medios oficiales de Corea del Norte emitieron un comunicado condenando los \"actos de agresión\" de Corea del Sur y declararon que el Ejército Popular de Corea está listo en cualquier momento para \"aplastar el poder militar de los títeres capitalistas del sur\"."
 jap.1001.a: "Una guerra más..."
 jap.1002.t: "La Gran Guerra Asiática"
 jap.1002.d: "Hoy, bajo el férreo control de los tiranos rojos, China, antaño autoproclamada como el \"Imperio Celestial\", alberga ambiciones y extiende silenciosamente sus garras hacia los territorios circundantes. Frente a esta fuerza opresora de Oriente, para defender la libertad y la democracia de Asia, Japón, antaño una temible espada samurái que sembró el terror en el mundo, ha vuelto a desenvainarse silenciosamente. Bajo la radiante luz de la Bandera del Sol Naciente, 100 millones de ciudadanos se alzan como uno solo, unidos para resistir el embate de la marea roja, protegiendo la paz y la prosperidad de esta tierra.\n\nDesde las imponentes cumbres del Himalaya hasta las infinitas olas azules del Pacífico, luchamos con fiereza contra los tiranos envenenados por la ideología comunista. Con nuestra sangre y nuestras vidas, defendemos los últimos restos de gloria y dignidad de Asia.\n\nSomos los herederos del legado samurái, con el coraje y la valentía corriendo por nuestras venas como llamas. No importa cuán peligroso sea el camino que nos espera, saldremos victoriosos de esta batalla del destino. Cuando los cerezos vuelvan a florecer, marcará el momento de nuestro regreso triunfal."
 jap.1002.a: "¡Viva el Emperador! ¡Viva Japón!"
 jap.1003.t1: "Nuevo sol en el cielo"
 jap.1003.t2: "Bushido asciende"
 jap.1003.d1: "Viejos aliados caen, nuevos surgen, y con el cambio constante que ocurre en la historia, era inevitable que el peso del pasado, presente y futuro recayera sobre todos nosotros.\n\nPrimero, el gigante a nuestro este se dividió, dividido por sus múltiples malicias y frustraciones. Luego, Europa se enfrascó en una guerra aterradora que volvió a incendiar el mundo.\n\nEra solo cuestión de tiempo antes de que el dragón abriera sus fauces e intentara tragarse a Taiwán por completo, pero la isla no se mantendría sola. Luchamos con nuevos y viejos aliados, pero el pasado nos alcanzó; pronto el dragón pisoteó nuestras fuerzas y el sol blanco ardió en sus llamas.\n\nSurgieron conflictos internos, hermano contra hermano. Pero superamos nuestros propios obstáculos y corregimos nuestros errores. Una vez más, reavivamos viejas amistades y afilamos nuestras espadas contra el dragón. Tras días de lucha incesante, el dragón quedó destrozado y derrotado, se instauró la paz y un velo de estabilidad se extendió sobre el continente.\n\nCon nuestra tribulación superada y lo que está roto sanado, tú también puedes disfrutar de un merecido descanso."
 jap.1003.d2: "El samurái solitario no estaba tan solo cuando el dragón intentó aplastar a Taiwán con sus garras. Con sus aliados, logramos derrotar a la monstruosidad voladora y devolverla a su cueva.\n\nSin embargo, las cicatrices que dejó permanecieron, las ciudades ardían y nuestras familias fueron separadas por esta violencia descontrolada. Aprendimos mucho de esto; aprendimos a estar preparados para cualquier cosa.\n\nReaprendimos el camino del samurái; supimos luchar de nuevo.\n\nFue una sabia decisión. Inevitablemente, el dragón intentaría arrastrar de nuevo a toda Asia a una guerra feroz; enloquecido por la sed de sangre y el deseo de venganza, extendió su odioso fuego por todo el continente. Sin embargo, nos mantuvimos preparados, con nuestras armas listas y nuestras cabezas unidas como un solo samurái. Apuntamos al corazón del dragón y lo matamos.\n\nDerrotado, el dragón será arrastrado por la marea de la historia, y Japón recuperará su lugar en el mundo."
 jap.1003.a: "Disfruta de la sombra de los árboles."
 jap.1003.b: "Mantente vigilante, y nunca te rindas."
 jap.1004.t: "Flota de montaña"
 jap.1004.d: "\"Coronel Yamamoto, por favor, acompáñeme\". Después de firmar el acuerdo de confidencialidad, el joven subteniente guió a Yamamoto a través de una serie de puertas blindadas. El ascensor descendió lentamente, deteniéndose finalmente en las profundidades del subsuelo.\n\n\"Esta es la zona central de nuestro proyecto Escudo Oceánico\", explicó el coronel Nakamura. Cuando se abrió la última puerta, Yamamoto se quedó sin aliento. En un vasto muelle subterráneo, un portaaviones clase Izumo modificado estaba recibiendo su equipamiento final. La isla del portaaviones había sido rediseñada y su cubierta de vuelo reforzada, claramente preparada para nuevas operaciones de caza.\n\n\"Tiene 248 metros de eslora y desplaza 30.000 toneladas\", dijo Nakamura, señalando el portaaviones. \"Está equipado con un radar avanzado de matriz en fase y un sistema de defensa aérea a bordo, y puede desplegar hasta doce cazas F-35B\". Caminaron por el muelle, pasando junto a dos destructores de defensa aérea clase Akizuki, uno detrás del otro. Sus sistemas de lanzamiento vertical de 96 celdas destacaban en la proa.\n\n\"Estos son nuestros destructores de misiles clase Maya más nuevos\", continuó Nakamura. \"Son una versión mejorada de la clase Akizuki, con misiles antibuque y antiaéreos adicionales. Cada buque lleva el radar SPY más moderno\". Más adelante, seis fragatas estaban perfectamente alineadas. Aunque pequeñas, estaban equipadas con sistemas de guerra electrónica y antisubmarinos de vanguardia.\n\nEn el centro de mando, varios oficiales monitoreaban los movimientos de los buques en el Indopacífico, con un mapa electrónico en la pared que actualizaba continuamente las posiciones de la Armada China. \"En un momento crítico, esta flota transformará el equilibrio estratégico de todo el Pacífico\", dijo Nakamura, con la vista fija en la pantalla. \"Y lo que ven aquí es solo una parte. Tenemos instalaciones similares en otras partes del país. Todo lo que estamos haciendo es por... un Japón completamente nuevo\"."
 jap.1004.a: "¡Banzai!"
 jap.1005.t: "¡El Mando Naval de los Estados Unidos nos ayuda!"

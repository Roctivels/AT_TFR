 jap.78.t: "¡Intento de asesinato al primer ministro!"
 jap.78.d: "Sin duda, algunos elementos poco recomendables se opondrían al nuevo camino que trazamos para Japón.\n\nEn un día soleado, nuestro primer ministro estuvo presente en la inauguración de un parque temático. Entre la multitud, un hombre solitario los apartó y corrió hacia él para apuñalarlo con un wakizashi. Aunque el intento fue torpe, el asesino logró hundirle la hoja profundamente en el estómago.\n\nEl personal de seguridad lo inmovilizó rápidamente mientras lo trasladaban de urgencia a un hospital; por el momento, permanece en estado crítico. El asesino parece pertenecer a la ultraderecha que persiste en los rincones más oscuros de la sociedad japonesa; en su apartamento se encontraron varios libros dedicados a la revolución y a un estilo de vida guerrero.\n\nEsto ha sentado un peligroso precedente: políticos pueden ser atacados aleatoriamente por extremistas. La Coalición Civil, obviamente, ha denunciado este ataque y ha debatido internamente si es buena idea convocar elecciones anticipadas para mantener la credibilidad.\n\nSin embargo, hay suficiente resistencia a esto y existe la preocupación de que unas elecciones anticipadas dividirían a la coalición civil; en cualquier caso, se debe tomar una decisión."
 jap.78.a: "¡Llamen a elecciones generales anticipadas!"
 jap.78.b: "¡No pueden dividirnos!"

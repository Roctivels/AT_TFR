 JAP_political_monopoly_idea: "Monopolio político"
 JAP_political_monopoly_idea_desc: "\n\n\n\n£GFX_JAP_political_monopoly\n\n\n\n\n\nEl Partido Liberal Democrático ha sido la fuerza política dominante en Japón desde su formación en 1955. Con solo breves interrupciones, el PLD ha mantenido la mayoría en la Dieta Nacional durante la mayor parte de su existencia, lo que le ha otorgado un monopolio político y ha convertido a Japón en un Estado de facto unipartidista bajo el \"Sistema del '55\".\n\nEn los últimos años, se han observado algunos indicios de cambio en el panorama político japonés, con el surgimiento de nuevos partidos que desafían el dominio del PLD. Sin embargo, queda por ver si estos acontecimientos conducirán a un sistema político más competitivo y pluralista en Japón, o si el PLD mantendrá su férreo control del poder."

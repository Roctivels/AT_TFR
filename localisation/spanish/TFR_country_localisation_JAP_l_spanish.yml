 JAP_oil_crash1: "Crisis del petróleo"
 jap.182.t: "¡Crisis del petróleo!"
 jap.182.d: "Con Arabia Saudita cayendo en el caos, nuestro suministro de petróleo se ha reducido drásticamente, y el inminente colapso de los Estados Unidos no ayuda en nada a nuestra delicada situación. Japón ya ha enfrentado muchas dificultades y superado numerosos desafíos para aguantar y mejorar en este nuevo siglo.\n\nEl sufrimiento de la primera crisis del petróleo de los años 70 aún atormentan a la nación japonesa. Durante esa pesadilla, el crecimiento económico japonés se vio afectado significativamente, y cayó significativamente bajo la línea del crecimiento nominal. Debido a que Japón no es un productor principal de recursos naturales, nuestra posición siempre ha sido frágil, siendo manejados como marionetas por distintos señores como Estados Unidos.\n\nNo obstante, esta crisis no supondrá el fin de Japón; El sol naciente ha sobrevivido catástrofes iguales o peores en su larga y tumultuosa historia. Quizás, esto será un nuevo comiendo, una nueva oportunidad para que Japón finalmente se libere de los grilletes y cadenas puestos por nuestros enemigos y \"aliados\". En última instancia, solo el tiempo dirá el destino de Japón, pero por le momento, debemos hacer nuestro mejor esfuerzo para resolver la situación a la que nos enfrentamos."
 jap.182.a: "Cae siete veces, levántate ocho."
 jap.183.t: "Acuerdo petrolero con Japón"
 jap.183.d: "Hemos recibido una oferta de acuerdo de Japón, según la cual quieren comprar nuestro petróleo más barato que el precio del mercado a cambio de un comercio rentable y de cooperación en el campo de la tecnología."
 jap.183.a: "Aceptaremos."
 jap.183.b: "No, solo el precio estándar."

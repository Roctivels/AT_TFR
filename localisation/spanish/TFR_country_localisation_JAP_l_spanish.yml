l_spanish:
 JAP_reiwa_2: "Reiwa II"
 JAP_reiwa_2_desc: "El año 2020, el segundo año del reinado del Emperador Naruhito, deparará nuevos desafíos a los que nuestra nación deberá hacer frente. A medida que los tiempos cambian, tendremos que decidir el rumbo que tomará Japón."
 JAP_deal_with_the_pandemic: "Afrontar la pandemia"
 JAP_deal_with_the_pandemic_desc: "La pandemia ha llegado a nuestro país, y debemos hacer algo al respecto antes de que sea demasiado tarde."
 JAP_restrict_travel: "Restringir viajes"
 JAP_restrict_travel_desc: "Para prevenir la propagación de la pandemia, tendremos que restringir los viajes con otros países."
 JAP_research_the_vaccine: "Investigar la vacuna"
 JAP_research_the_vaccine_desc: "Desde que la pandemia del COVID-19 golpeo a nuestro país, la pregunta en la mente de todos ha sido: \"¿podremos hacer una vacuna?\" La respuesta, obviamente, es sí, pero todavía estamos muy lejos de desarrollarla, para acelerar el proceso tendremos que redirigir fondos hacia nuestros investigadores, necesitan el dinero."
 JAP_provide_emergency_response_packages: "Proveer paquetes de respuesta"
 JAP_provide_emergency_response_packages_desc: "El COVID-19 es posiblemente la mayor amenaza que hemos afrontado desde el fin de la Segunda Guerra Mundial. Alrededor del país, nuestro pueblo está sufriendo de una carencia de casi todo. Es nuestra responsabilidad asegurarnos de que ellos reciban los bienes que necesitan."
 JAP_continue_the_lockdowns: "Mantener las cuarentenas"
 JAP_continue_the_lockdowns_desc: "Si bien es desafortunado que vayamos en contra de la voluntad del pueblo, es por su propio bien. Estamos perdiendo miles de vidas por este maldito virus, y no vamos a permitir que mueran más inocentes. Los confinamientos se mantendrán hasta nuevo aviso."
 JAP_ease_the_lockdowns: "Relajar las cuarentenas"
 JAP_ease_the_lockdowns_desc: "El deseo de nuestro pueblo es de estar libres de la prisión que son sus casas, y es algo con lo que estamos de acuerdo. Si bien no estamos listos para regresar a la época previa al COVID, podemos por lo menos aliviar algunas de las restricciones que hemos impuesto a nuestros civiles."
 JAP_support_small_medium_enterprises: "Apoyar a las pymes"
 JAP_support_small_medium_enterprises_desc: "Las bases del capitalismo no están en las grandes empresas, sino en las pequeñas. En el Japón de hoy, parece que esto se ha olvidado. Las pymes necesitan nuestro apoyo más que nunca, especialmente con el COVID-19 suelto, que amenaza con dejarlos en bancarrota."
 JAP_prepare_for_the_olympics: "Preparar las Olimpiadas"
 JAP_prepare_for_the_olympics_desc: "Nuestra capital lleva esperando ansiosamente las Olimpiadas desde hace casi 7 años. Pero, en la víspera de este gran evento, nuestra nación, al igual que el resto del mundo, fue golpeada por el virus. Esto, combinado con las crecientes tensiones alrededor del mundo, ha causado que los organizadores se replanteen el evento. Con el miedo al COVID-19 y su potencial propagación entre competidores, se ha planteado la cuestión si Tokio está en condiciones adecuadas para albergar los Juegos Olímpicos."
 JAP_hold_the_olympics: "Realizar las Olimpiadas"
 JAP_hold_the_olympics_desc: "En estos tiempos difíciles, ¿Qué mejor manera de sanar el planeta que con una competencia amistosa? ¡Al diablo con el virus y las rivalidades, estas Olimpiadas se centrarán en unir a la gente! Los riesgos no son lo suficientemente grandes como para impedirnos mostrar al mundo el verdadero significado de la hospitalidad."
 JAP_delay_the_olympics: "Retrasar las Olimpiadas"
 JAP_delay_the_olympics_desc: "A pesar de nuestro entusiasmo por albergar los Juegos Olímpicos, debemos admitir que existen demasiadas variables fuera de nuestro control. Un escándalo de dopaje, por ejemplo, podría tener graves consecuencias debido a las tensiones globales. Aunque sea extremadamente improbable, una pelea entre atletas podría ser devastadora. Por no mencionar la amenaza de un evento de gran propagación del virus. Se ha decidido posponer los juegos hasta 2021."
 JAP_promote_japanese_culture: "Promover la cultura japonesa"
 JAP_promote_japanese_culture_desc: "Katanas, bonsáis, dōjinshi, anime, sushi y témpura. Promovemos nuestra cultura en todo el mundo, y podríamos hacerlo mejor."
 JAP_japan_on_the_world_stage: "Japón en el mundo"
 JAP_japan_on_the_world_stage_desc: "A medida que el mundo cambia ante nosotros, podríamos estar destinados a convertirnos en el faro brillante de la democracia de Asia Oriental a medida que dejamos atrás nuestro pasado más oscuro."
 JAP_deal_with_social_policies: "Tratar políticas sociales"
 JAP_deal_with_social_policies_desc: "Quizás parezcamos un paraíso, pero tenemos nuestros propios problemas, especialmente el problema de la gente que vive sola y el problema de la disminución de las tasas de natalidad en este país."
 JAP_provide_maternity_leave_for_female_workers: "Proporcionar bajas por maternidad"
 JAP_provide_maternity_leave_for_female_workers_desc: "Con el declive de la tasa de natalidad en nuestro país, es fundamental garantizar que las mujeres puedan cuidar de sus bebés. Demasiadas ciudadanas no tienen acceso a la baja por maternidad, ¡y eso debe cambiar!"
 JAP_improve_childcare_facilities: "Mejorar el cuidado infantil"
 JAP_improve_childcare_facilities_desc: "Las madres y los padres de nuestro país suelen pasar gran parte del día en el trabajo y no tienen tiempo para cuidar a sus hijos. Nuestras guarderías son funcionales, pero si queremos aliviar la presión sobre nuestra gente, ¡debemos asegurarnos de que sean excepcionales!"
 JAP_improve_the_workspace: "Mejorar el espacio de trabajo"
 JAP_improve_the_workspace_desc: "Ya sea un jefe tóxico o una obra que no ha sido inspeccionada en demasiados años, nuestros empleados a menudo se enfrentan a un entorno laboral poco deseable. Con el rumbo que está tomando el mundo, ¡necesitamos fomentar un ambiente de trabajo saludable, seguro y divertido!"
 JAP_ease_economic_burdens: "Aliviar cargas económicas"
 JAP_ease_economic_burdens_desc: "Las políticas de gasto público no son baratas e inevitablemente la economía sufrirá. Sin embargo, son necesarias para el bienestar de nuestra nación y el apoyo de nuestra gente. Si bien no podemos detener la carga económica que causarán estas políticas, sin duda podemos amortiguar el impacto."
 JAP_tackle_the_hikkikomori_issue: "Abordar la cuestión de los hikikomori"
 JAP_tackle_the_hikkikomori_issue_desc: "La idea del hikikomori es interesante y afecta a nuestra nación. Si bien ser introvertido es socialmente aceptable, encerrarse en una habitación de por vida no lo es. Todo hikikomori es una persona que no contribuye a la sociedad y que es una carga para quienes lo rodean. Este problema debe resolverse de inmediato."
 JAP_reform_the_education_system: "Reformar la educación"
 JAP_reform_the_education_system_desc: "Roma no se construyó en un día, y Japón tampoco. El momento en que nuestro sistema educativo se descompuso tanto como lo está hoy es algo que se ha perdido en la historia, pero su estado actual es bastante indeseable. Si queremos asegurar que nuestros hijos crezcan sanos e inteligentes, la reforma es absolutamente necesaria."
 JAP_revise_article_9: "Revisar el Artículo 9"
 JAP_revise_article_9_desc: "El Artículo 9 de nuestra constitución establece que no podemos tener un ejército permanente. Aquí es donde surge el problema: ¿Cómo lucharemos sin un ejército? Por suerte, hemos encontrado algunas lagunas, pero son limitadas, por lo que ahora debemos revisar finalmente esta parte obsoleta del código de nuestra nación."
 JAP_improve_the_ground_defence_forces: "Mejorar la Fuerza Terrestre"
 JAP_improve_the_ground_defence_forces_desc: "Aunque parece improbable que nos enfrentemos a China en tierra firme, ¿Quién sabe? Taiwán parece el lugar más probable para una confrontación cara a cara, pero si las cosas salen mal, podríamos tener que enfrentarnos al dragón en nuestro propio territorio. Con las revisiones del Artículo 9, por fin podemos fortalecer nuestra fuerzas terrestres."
 JAP_improve_the_tank_fleet: "Mejorar los tanques"
 JAP_improve_the_tank_fleet_desc: "Japón no tiene una gran historia en cuanto a tanques, y eso se debe a que a lo largo de la historia nunca los hemos usado. Sin embargo, en el campo de batalla actual, estos colosos se ven con mucha más frecuencia, por lo que debemos ser capaces de igualar a los chinos en este campo."
 JAP_a_fleet_of_mcvs: "Una flota de VCM"
 JAP_a_fleet_of_mcvs_desc: "Los tanques suelen ser lentos y difíciles de reparar y reemplazar; por suerte, tenemos una alternativa. El VCM, aunque no tiene tanta potencia de fuego, es rápido y versátil, y sin duda podrá asestar golpes devastadores a nuestros enemigos."
 JAP_innovate_the_helicopter_fleet: "Innovar la flota de helicópteros"
 JAP_innovate_the_helicopter_fleet_desc: "Dada la alta probabilidad de guerra en islas y selvas, la necesidad de una gran flota de helicópteros es aún mayor. No solo necesitamos muchos, sino que deben ser lo suficientemente modernos como para competir de igual a igual con los chinos."
 JAP_adapt_to_cyber_warfare: "Adaptarse a la ciberguerra"
 JAP_adapt_to_cyber_warfare_desc: "Seremos los primeros en admitir que los chinos nos llevan ventaja en materia de ciberguerra; desafortunadamente para ellos, los estamos alcanzando. El internet es un nuevo frente que requiere nuestra máxima atención y será aprovechado al máximo."
 JAP_acquire_f35s: "Adquirir F-35s"
 JAP_acquire_f35s_desc: "Con los Estados Unidos sumidos en conflictos internos, la idea de que podamos adquirir F-35s de donde sea parece absurda. Por suerte, tenemos nuestros métodos, ¡y nos aseguraremos de que los cielos del Pacífico sean solo nuestros!"
 JAP_expand_the_JMSDF: "Ampliar la Fuerza Marítima de Autodefensa"
 JAP_expand_the_JMSDF_desc: "Como nación insular, se requiere una fuerza marítima sólida. En alta mar es también donde es más probable que nos enfrentemos a nuestros rivales chinos en el inevitable conflicto futuro. Esta guerra llegará más pronto que tarde, por lo que debemos expandir la Fuerza Marítima lo más rápido posible, sin sacrificar la calidad, por supuesto."
 JAP_convert_helicopter_destroyers: "Convertir portahelicópteros"
 JAP_convert_helicopter_destroyers_desc: "Lamentablemente, nuestra armada no cuenta con ningún portaaviones. Los portaaviones son grandes, caros y, hasta ahora, nos lo prohibían. Sin embargo, sí tenemos portahelicópteros que pueden transformarse para transportar algunos tipos de aeronaves."
 JAP_build_new_aegis_destroyers: "Construir destructores Aegis"
 JAP_build_new_aegis_destroyers_desc: "Los destructores que emplean el sistema Aegis se encuentran entre los más avanzados del mundo, y tenemos la suerte de contar con algunos. Sin embargo, en caso de guerra con China, los pocos que tenemos no serán suficientes, por lo que debemos construir más."
 JAP_unveil_the_taigei: "Revelar el Taigei"
 JAP_unveil_the_taigei_desc: "Ha llegado el momento de que Japón se una a las naciones con submarinos de nueva generación, y por eso nuestros investigadores han creado el Taigei. Si bien no es el mejor del mundo, la clase Taigei sin duda reforzará la presencia de la Fuerza Marítima bajo el mar."
 JAP_build_new_dockyards: "Construir nuevos astilleros"
 JAP_build_new_dockyards_desc: "A medida que continuamos la producción en masa de nuevos activos navales, nuestros astilleros se ven constantemente sobrecargados con nuevos pedidos. Construir más no solo creará nuevos empleos, sino que también aumentará el ritmo de producción de nuevos buques y submarinos."
 JAP_introduce_the_kawazaki: "Mejorar el Kawasaki P-1"
 JAP_introduce_the_kawazaki_desc: "A los chinos les gusta ser discretos al infiltrarse en nuestras aguas nacionales, y a menudo es el Kawasaki P-1 el que los ahuyenta. Mejoraremos este avión para que pueda volar a mayor distancia y detectar buques chinos a distancias aún mayores."
 JAP_improve_island_defences: "Mejorar defensas insulares"
 JAP_improve_island_defences_desc: "Sin duda, China intentará destruir nuestras bases insulares, ya sea mediante un bombardeo de misiles o una invasión naval. Sea cual sea el método que elija, debemos asegurarnos de que les resulte extremadamente difícil."
 JAP_procure_new_equipment: "Adquirir nuevo equipamiento"
 JAP_procure_new_equipment_desc: "Aun si Estados Unidos está ocupado con sus \"asuntos internos\", contamos con otros aliados en todo el mundo de quienes podemos obtener armas. Nos comunicaremos con nuestros camaradas de todo el mundo y compraremos nuevo equipo para fortalecer nuestras fuerzas de combate."
 JAP_start_limited_military_exports: "Exportaciones bélicas limitadas"
 JAP_start_limited_military_exports_desc: "Taiwán y Australia, si bien son nuestros respetados aliados, no han innovado en sus fuerzas armadas tanto como nosotros. Por ello, para garantizar que puedan ayudarnos a combatir a China lo mejor posible, comenzaremos a suministrarles algunos de nuestros mejores equipos."
 JAP_new_artillery_pieces: "Nueva artillería"
 JAP_new_artillery_pieces_desc: "La doctrina defensiva de China parece depender en gran medida de la artillería, como si pretendiesen únicamente atacarnos con proyectiles desde sus propias costas. Pues bien, a este juego pueden jugar dos."
 JAP_election_time: "Época de elecciones"
 JAP_election_time_desc: "Ha vuelto a llegar este periodo, un momento especial que se da cada cuatro años. Estas próximas elecciones prometen ser unas de las más polémicas e interesantes de la historia de nuestro país, ya que los candidatos tendrán que abordar una gran diversidad de temas. Por suerte, no parece que vayan a ser tan controvertidas como las últimas elecciones estadounidenses."
 JAP_unite_against_ldp: "Unirse contra el PLD"
 JAP_unite_against_ldp_desc: "El Partido Liberal Democrático ha gobernado Japón casi ininterrumpidamente durante los últimos 75 años. Obviamente, ha tenido sus altibajos durante ese tiempo, pero parece ser que en estos últimos años están en declive. Será una tarea titánica destronar al PLD, pero con un poco de suerte y muchas negociaciones, será posible."
 JAP_for_prosperity_of_our_people: "Por la prosperidad de nuestro pueblo"
 JAP_for_prosperity_of_our_people_desc: "Hay un dicho: \"Japón vive en el año 2000 desde 1980\". Nuestra gente tiene acceso a una gran cantidad de aparatos sofisticados, pero ¿de qué sirven si apenas pueden permitírselos? El PLD gobierna como si aún viviéramos en el futuro, cuando la realidad es que muchos de nuestros ciudadanos llevan décadas abandonados a su suerte. ¡Romperemos el statu quo y traeremos prosperidad para todos!"
 JAP_for_saving_our_economy: "Salvar nuestra economía"
 JAP_for_saving_our_economy_desc: "El milagro económico japonés terminó hace casi tres décadas, pero el PLD gobierna como si la fiesta siguiese en marcha. No podemos quedarnos de brazos cruzados mientras no hacen nada para salvar nuestra economía en crisis; ¡debemos poner los pies en la tierra y tomar las riendas!"
 JAP_form_civil_coalition: "Formar la Coalición Civil"
 JAP_form_civil_coalition_desc: "Sería literalmente imposible que un solo partido derrocara al PLD, pero con una coalición, eso es otra historia. ¡Uniremos al pueblo japonés uniendo a nuestros partidos en una coalición capaz de representarlo en el Gobierno!"
 JAP_destroy_myth_of_one_party_japan: "Destruir el Japón unipartidista"
 JAP_destroy_myth_of_one_party_japan_desc: "Cuando algo se ha mantenido prácticamente igual desde el nacimiento de tus abuelos, parece que se mantendrá igual por siempre. Pero no tiene por qué ser así. Los estereotipos políticos ancestrales cambian en todo el mundo cada semana, y es hora de que la política japonesa se una a ellos."
 JAP_covid_populism: "Populismo del COVID"
 JAP_covid_populism_desc: "[JAP_covid_populism_scripted_loc]"
 JAP_covid_populism_cc: "El Partido Liberal Democrático gestionó la pandemia de forma terrible, y como resultado, miles de ciudadanos japoneses ahora están bajo tierra. Afirman que carecemos de experiencia en gobernar el país y, por lo tanto, no sabremos cómo afrontar la pandemia actual. Sea cierto o no, al menos sabemos que no hacer."
 JAP_covid_populism_ldp: "Aunque muchos dicen que podríamos haber gestionado mejor la pandemia de COVID-19, técnicamente todo se puede hacer mejor. Hicimos lo mejor con lo que teníamos. Sin embargo, lo más importante es que la Coalición Civil no tiene experiencia con nada parecido al COVID-19, ya que nunca ha tenido la oportunidad de gobernar adecuadamente el país. La pandemia sigue en curso, y poner a un grupo de novatos al mando no parece la mejor idea."
 JAP_restore_peoples_trust: "Restaurar confianza popular"
 JAP_restore_peoples_trust_desc: "Nuestro partido ha tropezado, ha tenido resbalones y se ha caído. Pero, ¿qué es lo que siempre hace después? Levantarse. El Partido Liberal Democrático siempre ha estado ahí para el pueblo japonés, y no seremos derrocados por un grupo de partidos marginales que se atacarán unos a otros nada más tomar el poder."
 JAP_good_old_japan: "Aquel viejo Japón"
 JAP_good_old_japan_desc: "Japón tiene una cultura que se ha desarrollado a lo largo de miles de años, y si bien es cierto que las cosas han cambiado, siempre nos hemos mantenido firmes en nuestros valores. Un pequeño tropiezo en la historia de nuestra nación no basta para hacernos olvidar todo lo que representamos."
 JAP_new_course: "Un nuevo rumbo"
 JAP_new_course_desc: "Japón ha cambiado muchísimo en el último siglo, y seguramente cambiará aún más en el próximo. Hemos visto el descontento de la gente con la actual política partidista, y los líderes se han dado cuenta de que las cosas deben cambiar. Fuera lo viejo y dentro lo nuevo, como se suele decir."
 JAP_strengthen_our_union: "Reforzar nuestra unión"
 JAP_strengthen_our_union_desc: "Si bien no dependemos del Partido Kōmeitō, es nuestro aliado desde hace mucho tiempo y agradecemos profundamente su apoyo. A medida que la llamada \"Coalición Civil\" reúne cada vez a más partidos pequeños, debemos consolidar a nuestros propios aliados, especialmente al Kōmeitō."
 JAP_maintain_stability: "Mantener la estabilidad"
 JAP_maintain_stability_desc: "Por encima de todo, nuestro partido siempre ha defendido la estabilidad. El cambio puede ser necesario en algunos ámbitos, pero eso no significa que deba ocurrir mañana. El Partido Liberal Democrático velará por la transición fluida de Japón hacia el futuro, como lo ha hecho durante décadas y como lo hará siempre."
 JAP_formation_of_government: "Formar un Gobierno"
 JAP_formation_of_government_desc: "Cuando alguien llama a algo una \"tarea hercúlea\", suele referirse a algo que debería ser, sin duda, imposible. Sin embargo, Hércules completó sus doce trabajos, y nosotros hemos completado el nuestro. El PLD finalmente ha sido destronado, y ahora debemos empezar a certificar nuestro control."
 JAP_expose_ldp: "Exponer al PLD"
 JAP_expose_ldp_desc: "El Partido Liberal Democrático es famoso por sus escándalos. Desafortunadamente, debido a que controlaron el Gobierno durante tanto tiempo, muchos de sus crímenes nunca salieron a la luz. Sin embargo, ahora que controlamos el país, nos aseguraremos de que la gente vea la magnitud de sus transgresiones."
 JAP_state_budgeting: "Optimizar el presupuesto estatal"
 JAP_state_budgeting_desc: "El PLD destrozó la economía japonesa, y no tenemos intención de seguir sus pasos. Queremos dar un buen ejemplo desde el principio, y para ello debemos asegurarnos de que el presupuesto sea pequeño, limpio y eficaz."
 JAP_lets_do_our_best: "Ganbaru!"
 JAP_lets_do_our_best_desc: "Llegar hasta aquí parecía imposible hace apenas unos años, pero dimos nuestro mejor esfuerzo y lo logramos. Si todos nos esforzamos al máximo, nosotros y cada ciudadano japonés, algún día haremos que nuestra nación sea digna de los elogios que recibe."
 JAP_peoples_japan: "Japón popular"
 JAP_peoples_japan_desc: "§RESTE CONTENIDO SERA DESARROLLLADO EN EL FUTURO§!"
 JAP_free_japan: "Japón libre"
 JAP_free_japan_desc: "La vida, la libertad y la búsqueda de la felicidad. Esto es lo que dice la constitución de uno de nuestros mayores aliados: todos tienen derecho a ello. ¿Por qué debería limitarse a ellos? ¿No deberían tenerlo todas las personas del mundo? En Japón, nuestro pueblo sin duda la tiene, ¡y lucharemos por defenderlo!"
 JAP_throw_the_corporations: "Echar a las corporaciones"
 JAP_throw_the_corporations_desc: ""
 JAP_progressive_healthcare: "Salud progresista"
 JAP_progressive_healthcare_desc: ""
 JAP_feed_the_people: "Alimentar al Pueblo"
 JAP_feed_the_people_desc: ""
 JAP_leftists_in_cdp: "Unificar a los demócratas"
 JAP_leftists_in_cdp_desc: ""
 JAP_promises_of_peace: "Promesas de paz"
 JAP_promises_of_peace_desc: ""
 JAP_deal_with_devil: "Un pacto con el diablo"
 JAP_deal_with_devil_desc: ""
 JAP_legacy_of_anpo_protests: "Legado de la Lucha de Anpo"
 JAP_legacy_of_anpo_protests_desc: ""
 JAP_armed_neutrality: "Neutralidad armada"
 JAP_armed_neutrality_desc: ""
 JAP_form_pdto: "Formar la OTDP"
 JAP_form_pdto_desc: "Con los Estados Unidos incapacitados en el Pacífico, el dragón chino ha comenzado a vigilar con avidez a nuestros aliados en el mar de la China Meridional, especialmente a Taiwán. Estamos ansiosos por defenderlos, y no estamos solos. Australia también ha considerado a China una amenaza significativa, por lo que nuestras tres naciones han acordado formar una alianza. La Organización del Tratado de Defensa del Pacífico se basará en la OTAN, pero para el Pacífico, y tendrá como objetivo disuadir la agresión china."
 JAP_pledge_to_defend_taiwan: "Prometer defender a Taiwán"
 JAP_pledge_to_defend_taiwan_desc: "Las fauces hambrientas de la República Popular China buscan apoderarse de Taiwán y destrozarla. Desafortunadamente para ellos, mientras nos mantengamos firmes, defenderemos la soberanía de nuestra nación hermana, ¡y el dragón permanecerá encerrado en el continente!"
 JAP_anti_prc_propaganda: "Propaganda anti-R.P. China"
 JAP_anti_prc_propaganda_desc: "No hay muchos japoneses que simpaticen con la República Popular China, pero cada día nuestro enemigo convence a más y más gente de unirse a su causa. Mediante aplicaciones como TikTok, manipulan a nuestros jóvenes para que apoyen su causa. Por suerte, al juego de la propaganda pueden jugar dos, y estamos plenamente decididos a superarlos."
 JAP_beyond_the_ocean: "Más allá del océano"
 JAP_beyond_the_ocean_desc: "Nuestro antiguo rival, convertido en nuestro mayor benefactor, se encuentra en tiempos de crisis. Dos ancianos han desmembrado una nación con 250 años de historia y actualmente se están matando entre sí con todo lo que tienen. La pregunta que nos planteamos es: ¿con quién debemos aliarnos?"
 JAP_support_small_business: "Apoyar a las pequeñas empresas"
 JAP_support_small_business_desc: "¿A quién no le gusta un pequeño negocio? Ya sea una acogedora casa de té a la vuelta de la esquina o un supermercado familiar con quién sabe cuántos años de historia, siempre dejan huella. La pandemia de COVID obligó a muchos a cerrar, pero aún quedan muchos, ¡y las apoyaremos con gusto!"
 JAP_strengthen_freedom_of_speech: "Fortalecer la libertad de expresión"
 JAP_strengthen_freedom_of_speech_desc: "Nuestra nación ya goza de una fuerte libertad de expresión, pero aún existen ciertas cosas que pueden causar problemas. Si queremos unirnos a las filas de otras democracias modernas, necesitamos modernizar el derecho de nuestra ciudadanía a expresarse."
 JAP_protect_rights_of_citizens: "Proteger derechos de los ciudadanos"
 JAP_protect_rights_of_citizens_desc: "Todos tenemos los mismos derechos, pobres o ricos, hombres o mujeres, o cualquier otra diferencia entre nosotros. Sin embargo, hay quienes no lo ven así y solo buscan subyugar a los demás. Esto no se tolerará, ¡y protegeremos los derechos de todos los ciudadanos japoneses!"
 JAP_loyal_liberal_democrats: "Los nuestros en el PLD"
 JAP_loyal_liberal_democrats_desc: "Con nuestra victoria en las elecciones de 2021, la estructura podrida del Partido Liberal Democrático se vino abajo. Nuestra coalición coincidía con la ideología de muchas personas dentro del PLD, y estos \"disidentes\" acudieron en masa. Sin embargo, su mayor derrota fue, quizás, la pérdida del partido Kōmeitō. Parece que el PLD no pondrá a un primer ministro a cargo de Japón en mucho tiempo."
 JAP_post_covid_stabilization: "Estabilización post-COVID"
 JAP_post_covid_stabilization_desc: "A medida que la pandemia de COVID finalmente cede, debemos aprovechar el tiempo disponible para unir a la gente. La economía puede esperar un poco, pues de nada sirve si nuestro pueblo lucha entre sí."
 JAP_promote_gender_neutrality: "Promover la igualdad de género"
 JAP_promote_gender_neutrality_desc: "¡Estamos en los años 2020, por favor! Sin embargo, la desigualdad de género en nuestra nación sigue siendo innecesariamente alta. Si queremos proyectar una imagen de nación fuerte y unida, ¡todos nuestros ciudadanos deben ser igualmente fuertes y unidos!"
 JAP_green_revolution: "Una revolución verde"
 JAP_green_revolution_desc: "Japón nunca ha sido especialmente reconocido por su producción de combustibles fósiles, y con razón. A medida que el mundo se vuelve cada vez más polarizado, y con Estados Unidos fuera del panorama, es fundamental que no dependamos de nadie más. Por lo tanto, ha llegado el momento de invertir en otras fuentes de energía, para asegurarnos de ser lo más autosuficientes posible."
 JAP_triumph_of_democracy: "Triunfo de la democracia"
 JAP_triumph_of_democracy_desc: "El régimen autoritario chino ha sido expulsado de Taiwán y restringido a su propio territorio. El pueblo japonés ha demostrado su fuerza y su negativa a inclinarse ante un agresor evidente. ¡Ahora ha llegado el momento de disfrutar de nuestro triunfo y guiar a Japón hacia un futuro brillante!"
 JAP_preserve_the_coalition: "Preservar la coalición"
 JAP_preserve_the_coalition_desc: "Hay detractores entre nosotros que piensan que la coalición no fue más que un medio para un fin, ¡pero están equivocados! Esta coalición representa la voluntad del pueblo japonés, la voluntad de trabajar con aquellos diferentes a nosotros por un futuro más brillante. ¡La coalición perdurará!"
 JAP_each_to_his_own: "Cada uno a lo suyo"
 JAP_each_to_his_own_desc: "La Coalición Civil fue solo un medio para sacar al Partido Liberal Democrático del poder y destruir el Sistema del '55. Ahora que ese objetivo se ha cumplido, y el PLD no está en condiciones de recuperar el poder en el futuro cercano, podemos despedirnos de nuestros aliados y trazar nuestro propio rumbo para la nación."
 JAP_for_people_for_the_future: "Por el pueblo, por el futuro"
 JAP_for_people_for_the_future_desc: "Nosotros, del Partido Democrático Constitucional, que no debe confundirse con el Partido Liberal Democrático, siempre hemos tenido más influencia que el Partido de la Innovación. Hemos logrado usar esa influencia a nuestro favor para ocupar nuestro lugar como los legítimos líderes de Japón."
 JAP_innovation_straight_away: "Innovación inmediata"
 JAP_innovation_straight_away_desc: "Nosotros, en el Partido de la Innovación, hemos tomado la iniciativa y logrado consolidar el control del Gobierno. Aunque esto pueda haber alejado a la izquierda, todavía tenemos un poder más que suficiente para impulsar nuestra propia agenda. ¡Debemos ponernos a trabajar lo antes posible, Japón no se va a innovar solo!"
 JAP_harmonious_society: "Sociedad armónica"
 JAP_harmonious_society_desc: "Japón debe ser una nación de paz en el interior y de fortaleza en el exterior. Mientras que el Partido Liberal Democrático solía abogar por la estabilidad, nosotros abogamos por algo más: abogamos por la armonía. Cuando las personas trabajan al unísono, grandes cosas son fácilmente alcanzables."
 JAP_bring_the_left_back: "Traer de vuelta a la Izquierda"
 JAP_bring_the_left_back_desc: "Nuestra nación no tiene un buen historial de colaboración con la izquierda, y la guerra de Taiwán lo dejó en evidencia. A pesar de nuestra victoria, muchos en la izquierda se opusieron firmemente al conflicto. Donde otros ven \"agitadores comunistas\", nosotros vemos una oportunidad para obtener más votos, y por ello trabajaremos para reincorporar a la izquierda al proyecto común."
 JAP_additional_welfare: "Prestaciones sociales adicionales"
 JAP_additional_welfare_desc: "Si bien Japón cuenta con ayudas sociales respetables, están lejos de igualar a las de los países europeos. Debemos elevar nuestra calidad de vida por encima de la de cualquier otra nación, y el primer paso es asegurarnos de que nuestra gente esté bien cuidada."
 JAP_maintain_constitutionalism: "Mantener el constitucionalismo"
 JAP_maintain_constitutionalism_desc: "Demasiadas personas están a favor de modificar drásticamente o incluso eliminar la constitución, y no lo permitiremos. Para algunos no es más que una hoja de papel, pero para nosotros es un documento de gran importancia. Mientras sigamos en el poder, el Gobierno se regirá por los principios establecidos en la constitución."
 JAP_grassroots_democracy: "Democracia de base"
 JAP_grassroots_democracy_desc: "La democracia, en esencia, es un medio para que el pueblo obtenga pacíficamente lo que desea. Sin embargo, en el mundo actual, demasiadas naciones han olvidado esto, y un magnate adinerado puede tener más influencia que mil votantes. Debemos asegurarnos de que no haya maniobras turbias en nuestra democracia y de representar únicamente la voluntad del pueblo."
 JAP_the_future_of_tokyo: "Futuro de Tokio"
 JAP_the_future_of_tokyo_desc: "La vida en la ciudad puede ser desalentadora y, en ocasiones, deprimente. Pero ¿sabes qué nunca pasa de moda? El olor del aire fresco y la belleza de la naturaleza. Sin embargo, a medida que más y más personas se mudan a las ciudades, especialmente a Tokio, menos gente tiene la oportunidad de experimentar esto. Necesitamos repoblar las zonas rurales, y ofrecer una compensación económica no está fuera de nuestras posibilidades."
 JAP_cultural_diversity: "Diversidad cultural"
 JAP_cultural_diversity_desc: "Japón tiene una división cultural, no entre dos grupos de personas, sino entre lo viejo y lo nuevo. La cultura de la era moderna es casi irreconocible en comparación con la de hace un siglo, y a la gente a menudo le cuesta elegir cuál adoptar. Sin embargo, no se trata de una u otra; ¡lo hermoso de la cultura es que cualquiera puede disfrutarla!"
 JAP_legacy_of_ldp: "Legado del PLD"
 JAP_legacy_of_ldp_desc: "Tras tantos años de gobierno, el Partido Liberal Democrático ha dejado un gran legado. Sin embargo, ahora nos toca a nosotros decidir cuáles fueron los aspectos positivos y negativos de su gobierno, y qué debe cambiarse."
 JAP_new_tax_system: "Nuevo sistema tributario"
 JAP_new_tax_system_desc: "A nadie le gusta pagar impuestos, pero son necesarios para garantizar que una nación pueda afrontar sus gastos. En la mayoría de los casos, el dinero incluso regresa al contribuyente. Sin embargo, el sistema tributario actual en Japón necesita urgentemente una reforma, y por eso la implementaremos."
 JAP_marriage_reform: "Reforma matrimonial"
 JAP_marriage_reform_desc: "Nos consideramos una nación moderna, pero nuestro código matrimonial es increíblemente anticuado y anticuado. Nos uniremos a Taiwán en el reconocimiento del matrimonio igualitario. El otro problema es el de los apellidos separados, que ahora se otorgarán."
 JAP_accessible_education: "Educación asequible"
 JAP_accessible_education_desc: "Un problema que enfrentan demasiados japoneses es la incapacidad de costear la educación. ¿Cómo podemos ser considerados una nación moderna si nuestra gente ni siquiera tiene educación? Tomaremos las medidas necesarias para lograr una educación asequible, e incluso gratuita."
 JAP_continue_environmentalism: "Continuar el ambientalismo"
 JAP_continue_environmentalism_desc: "Nuestro rival, China, es famosa por su terrible contaminación en sus ciudades y alrededores. Demostramos ser mejores que ellos en el campo de batalla, y ahora debemos demostrarlo en la lucha contra el cambio climático. ¡Preservaremos la belleza natural de Japón!"
 JAP_integrate_democrat_dissidents: "Integrar a disidentes democráticos"
 JAP_integrate_democrat_dissidents_desc: "El Partido Democrático para el Pueblo es pequeño, pero comparte muchos de nuestros objetivos. Si bien integrarlo no nos dará grandes ventajas, cualquier incorporación al partido es bienvenida."
 JAP_small_government: "Gobierno pequeño"
 JAP_small_government_desc: "Tras décadas del PLD y su descomunal aberración de partido, muchos se oponen a la idea de un Gobierno grande. Estamos de acuerdo con esto, y sin duda es necesaria una cierta reducción."
 JAP_japanese_federalism: "Federalismo japonés"
 JAP_japanese_federalism_desc: "Es probable que el federalismo y Japón nunca se hayan combinado en la misma frase. Sin embargo, la mayoría de las naciones modernas exitosas cuentan con algún tipo de sistema federalista, aunque varíe considerablemente de un país a otro. Es hora de que Japón implemente su propia forma de federalismo; se reintroducirá la propuesta del dōshūsei."
 JAP_promotion_of_free_trade: "Promover el libre comercio"
 JAP_promotion_of_free_trade_desc: "Contamos con muchos aliados en la región Asia-Pacífico que estarán encantados de intercambiar sus productos con nosotros. Al flexibilizar las restricciones al libre comercio, ¡todos saldremos ganando!"
 JAP_digitalisation_of_bureaucracy: "Digitalización de la burocracia"
 JAP_digitalisation_of_bureaucracy_desc: "Gracias al PLD, el Gobierno ha tardado en adaptarse a un mundo en constante cambio, especialmente en lo que respecta a internet. Corregiremos los errores de nuestro predecesor y lograremos que casi todos los aspectos del Gobierno, si no todos, puedan realizarse en línea. Al fin y al cabo, somos el partido de la innovación."
 JAP_honor_osaka: "Honrar a Osaka"
 JAP_honor_osaka_desc: "Osaka se ha convertido en una ciudad muy importante en el Japón moderno, y es donde se originó nuestro partido. En honor a la ciudad, la convertiremos en la vicecapital de nuestra nación."
 JAP_respect_the_imperial_family: "Respetar a la familia imperial"
 JAP_respect_the_imperial_family_desc: "La familia imperial ha perdido mucha influencia desde la muerte del emperador Shōwa, y aunque no los restituiremos al poder, lo mínimo que podemos hacer es mostrarles el respeto que merecen. Siempre han apoyado a Japón, y sabemos que el buen ejemplo que han dado continuará en el futuro."
 JAP_labor_code_reform: "Reforma laboral"
 JAP_labor_code_reform_desc: "Las leyes laborales en Japón siempre han favorecido injustamente al empresario. Si bien siempre podría ser peor, también podría mejorar, y lo haremos."
 JAP_social_pact: "Pacto social"
 JAP_social_pact_desc: "No siempre tenemos que estar de acuerdo con la gente; de hecho, hagamos lo que hagamos, siempre habrá quienes quieran discrepar con nosotros. En cualquier caso, cuando hay algo que tiene el potencial de beneficiarnos a todos, podemos dejar de lado nuestras diferencias y llegar a un consenso."
 JAP_nationalizing_strategic_sectors: "Expropiar sectores estratégicos"
 JAP_nationalizing_strategic_sectors_desc: "Hay cosas en este mundo y en esta nación que, cuando pertenecen a ciertas personas, solo fomentan la codicia. Es entonces cuando el Estado debe intervenir y asumir el control de sectores que puede utilizar para beneficiar a sus ciudadanos."
 JAP_progressive_business: "Negocios progresistas"
 JAP_progressive_business_desc: "Si bien todo negocio es buen negocio, algunos son simplemente mejores. Quienes tratan a sus trabajadores con respeto y dignidad siempre tendrán ventaja sobre las corporaciones desalmadas que obligan a sus empleados a trabajar duro por poco o nada. Los primeros son el ejemplo que queremos dar, y por eso serán recompensados, para que otros se animen a seguir sus pasos."
 JAP_fight_uyoku_dantai: "Combatir a los uyoku dantai"
 JAP_fight_uyoku_dantai_desc: "Nuestros cambios en Japón no han pasado desapercibidos, y muchos de la derecha nos han atacado. Si bien ciertamente están haciendo lo que creen correcto, sus acciones solo han perjudicado a la gente. Como no podemos llegar a un acuerdo, parece que el conflicto volverá a asolar la dieta."
 JAP_humanizing_law_enforcement: "Humanizar a la policía"
 JAP_humanizing_law_enforcement_desc: "Si bien la policía comete errores a veces, todos los cometemos. Las autoridades no siempre tienen la razón, y la gente no puede esperar que la tengan. Nadie es perfecto. Estos son los mensajes que debemos transmitir a la gente, que ve a las fuerzas del orden con malos ojos."
 JAP_new_refugee_policy: "Nueva política de refugiados"
 JAP_new_refugee_policy_desc: "Reconocemos que hay personas en todo el mundo menos afortunadas que nosotros. Es hora de flexibilizar nuestra política migratoria para hacer de Japón un país más humano."
 JAP_accept_challenges_time: "Aceptar los desafíos del tiempo"
 JAP_accept_challenges_time_desc: "Independientemente de cómo cambie el mundo a nuestro alrededor, debemos seguir adhiriéndonos a la Constitución. Esto se extiende al Artículo 9, quizás su parte más controlable. A pesar de ello, no tenemos por qué obedecerlo sin pensar; la necesidad de un ejército más numeroso es evidente. Encontraremos la manera de hacerlo, sin infringir la ley."
 JAP_privatization: "Privatización"
 JAP_privatization_desc: "Dicen que compartir es cuidar. Esto sin duda aplica a nivel gubernamental, así que ¿por qué hemos estado exentos durante tanto tiempo? Hay personas, expertas en su campo, que podrían gestionar ciertos activos que controlamos mucho mejor que nosotros. Por lo tanto, la transferencia de estos activos al sector privado es necesaria. ¡Para que puedan gestionarse mejor, por supuesto!"
 JAP_partnerships_entrepreneurs: "Cooperar con empresarios"
 JAP_partnerships_entrepreneurs_desc: "A veces, los empresarios innovadores tienen dificultades para poner en marcha sus empresas. Esto impide que muchas personas experimenten lo que ese emprendedor tiene para ofrecer, y es simplemente trágico. Es nuestro deber como nación ayudar a estas personas a superar sus dificultades."
 JAP_budget_responsibility: "Responsabilidad fiscal"
 JAP_budget_responsibility_desc: "Si bien el gasto social puede beneficiar a algunas personas, una economía estable beneficia a más. Una de las mejores maneras de garantizar que la situación se mantenga positiva es un presupuesto estable. Si bien no necesita estar exactamente equilibrado, ya que lograrlo sería muy difícil, al menos podemos evitar que se vuelva demasiado volátil. Y quién sabe, quizás en el futuro, un presupuesto equilibrado esté a la vista."
 JAP_civic_participation: "Participación civil"
 JAP_civic_participation_desc: "A veces la gente puede sentirse privada de la atención del proceso democrático, aunque esto es exactamente lo opuesto a su propósito. La participación ciudadana es muy importante para un país libre, y la fomentaremos de todas las formas posibles. ¿Ves algo que no te gusta? ¡Vota en contra, y viceversa!"
 JAP_potential_threat: "Amenaza potencial"
 JAP_potential_threat_desc: "A nadie le gusta un comunista, ni siquiera otro comunista. Están demasiado ocupados luchando contra sí mismos como para generar cualquier cambio. Tras derrotar a China en la guerra de Taiwán, seguramente empezaron a buscar maneras más sutiles de debilitarnos. Una de ellas es, por supuesto, infiltrar agitadores comunistas dentro de nuestras fronteras. Aunque aún no han hecho nada importante, es importante que vigilemos su actividad."
 JAP_follow_democratic_principles: "Seguir principios democráticos"
 JAP_follow_democratic_principles_desc: "Japón lleva casi 80 años siendo una democracia. Si bien gran parte de ese tiempo transcurrió bajo un partido único, lo cual parece antidemocrático, las elecciones seguían siendo libres. Mientras nuestra nación exista en su estado actual, seguiremos fieles a estos principios establecidos por nuestros sabios antepasados."
 JAP_the_status_quo_remains: "El statu quo se mantiene"
 JAP_the_status_quo_remains_desc: "En una victoria que muchos preveían, la Coalición Civil ha sido relegada a su lugar y nuestro dominio sobre Japón está garantizado. Aunque por un momento la dirección del partido temió una posible derrota, parece que esos temores eran infundados. Ahora que las elecciones de 2021 han terminado, podemos ponernos a trabajar para impulsar nuestra nueva agenda."
 JAP_new_era_for_japan: "Nueva era para Japón"
 JAP_new_era_for_japan_desc: "La pandemia de COVID, aunque trágica, representa el fin de una era. Nos conformamos con lo que teníamos, y no fue hasta que llegó la crisis que nos dimos cuenta de lo perdidos que estábamos. ¡Ya no! Hoy nos encontramos en vísperas de una nueva era, una en la que Japón volverá a brillar con gloria."
 JAP_administrative_reforms: "Reformas administrativas"
 JAP_administrative_reforms_desc: "Tras las elecciones de 2021 y nuestra mala gestión de la pandemia de COVID-19, parece necesario solucionar algunos problemas burocráticos. El PLD es una institución gigantesca, y sin duda podemos cambiar algunos aspectos para agilizar su funcionamiento."
 JAP_together_with_you: "¡Junto a ti!"
 JAP_together_with_you_desc: "¡Gracias a ustedes, pueblo japonés, estamos donde estamos hoy! Sin su apoyo incondicional, no habríamos podido ganar las elecciones. Juntos, seguiremos adelante, llevando prosperidad a todos dentro de nuestras fronteras."
 JAP_new_three_arrows: "Las nuevas tres flechas"
 JAP_new_three_arrows_desc: "Las tres flechas de Shinzō Abe fueron justo lo que el médico recetó para Japón hace una década. Si bien funcionaron bien en algunos campos, también tuvieron sus inconvenientes. Ahora, con la inauguración de Tarō Konō, ha llegado el momento de reevaluar estas políticas. Conservaremos lo beneficioso y eliminaremos lo perjudicial."
 JAP_green_energy_plan: "Plan de energía verde"
 JAP_green_energy_plan_desc: "Japón nunca ha sido reconocido por su producción de combustibles fósiles, y con razón. A medida que el mundo se polariza cada vez más, y con EE.UU. fuera de escena, es fundamental que no dependamos de nadie más. Por lo tanto, es hora de invertir en otras fuentes de energía para asegurarnos de ser lo más autosuficientes posible."
 JAP_rural_benefits_programme: "Programa de beneficios rurales"
 JAP_rural_benefits_programme_desc: "Un problema importante que azota a nuestro país es la avalancha de personas que se mudan de las comunidades rurales a las ciudades. Por ello, muchas personas fuera de las zonas urbanas se sienten abandonadas. Esto no debe suceder, ya que algunas de estas personas son de las más importantes para nuestra economía, por lo que nos aseguraremos de que reciban los beneficios que necesitan."
 JAP_stable_government_stable_market: "Gobierno estable, mercado estable"
 JAP_stable_government_stable_market_desc: "Cuando una situación política parece fuera de control, los inversores tienden a entrar en pánico y retirarse. Esto, por supuesto, suele conducir al colapso económico. Sin embargo, cuando el Gobierno proyecta una sensación de estabilidad y tranquilidad, la gente ansía obtener su parte del pastel. Si el Gobierno es estable, el mercado es estable."
 JAP_kono_digitalization_programme: "Curso de digitalización de Kōno"
 JAP_kono_digitalization_programme_desc: "El mundo en el que vivimos hoy se caracteriza por una creciente interconectividad. El principal artífice de esto es, por supuesto, internet. Sin embargo, ¿por qué debería limitarse a los ciudadanos? A medida que avanzamos hacia el futuro, es importante que el Gobierno esté tan conectado como un gamer empedernido."
 JAP_new_japanese_capitalism: "Nuevo capitalismo japonés"
 JAP_new_japanese_capitalism_desc: "A nadie le gusta un rico presumido, y a mucha gente no le gusta ver a una persona sin hogar en la calle. Un sistema capitalista fuerte requiere una clase media fuerte para funcionar, pero, por desgracia, la clase media japonesa ha estado sufriendo. El primer ministro Fumio Kishida tiene la solución perfecta para este problema."
 JAP_provide_heavy_inflation_relief_packages: "Grandes paquetes de alivio inflacionario"
 JAP_provide_heavy_inflation_relief_packages_desc: "La inflación es el mayor enemigo de cualquier familia de clase media. Demasiados han caído en la pobreza porque sus salarios no se ajustan a la demanda del mercado. Somos una nación rica y podemos permitirnos enviar paquetes de alivio de la inflación. Gente feliz, economía feliz."
 JAP_increase_minimum_wage: "Aumentar el salario mínimo"
 JAP_increase_minimum_wage_desc: "Los trabajos a tiempo parcial son, sin duda, la parte más importante del capitalismo. Millones de personas en todo el mundo trabajan a tiempo parcial, pero demasiadas aquí en Japón viven de ello. Lo mínimo que podemos hacer para ayudar a estos trabajadores a tiempo parcial es aumentar el salario mínimo, para que tengan una protección adicional contra la inflación."
 JAP_subsidise_small_medium_businesses: "Bajar impuestos a pymes"
 JAP_subsidise_small_medium_businesses_desc: "La pandemia de COVID-19 arruinó por completo a las pequeñas empresas de todo el mundo, y aquí en Japón aún se están recuperando. Sin embargo, en varios casos, los impuestos previos a la pandemia están resultando ser demasiado altos para ellas. Vivimos en una nueva era, una era en la que estos impuestos no tienen por qué ser tan excesivamente altos."
 JAP_startup_digitalization_economy: "Iniciar la digitalización económica"
 JAP_startup_digitalization_economy_desc: "Las largas y lentas jornadas de la pandemia llevaron a muchas personas aburridas a usar sus computadoras y a idear proyectos para pasar el tiempo. Sin embargo, algunos de estos \"proyectos\" se están convirtiendo rápidamente en nuevas industrias, la más importante de las cuales es la IA. Debemos asegurarnos de que este nuevo mercado esté debidamente regulado y de que obtengamos una porción del pastel digital tan grande como la de todos los demás."
 JAP_form_pdto2: "Formar la OTDP"
 JAP_form_pdto2_desc: "Con los Estados Unidos incapacitados en el Pacífico, el dragón chino ha comenzado a vigilar con avidez a nuestros aliados en el mar de la China Meridional, especialmente a Taiwán. Estamos ansiosos por defenderlos, y no estamos solos. Australia también ha considerado a China una amenaza significativa, por lo que nuestras tres naciones han acordado formar una alianza. La Organización del Tratado de Defensa del Pacífico se basará en la OTAN, pero para el Pacífico, y tendrá como objetivo disuadir la agresión china."
 JAP_first_pdto_military_exercises: "Primeros ejercicios conjuntos de la OTDP"
 JAP_first_pdto_military_exercises_desc: "Nuestras Fuerzas de Autodefensa son muy diferente a las fuerzas armadas de Taiwán y Australia, por lo que es fundamental asegurarnos de que todos colaboren. Los primeros ejercicios militares conjuntos de la OTDP se realizarán pronto para fomentar la unidad entre nuestras naciones, pero también para demostrarle a China que no andamos con rodeos."
 JAP_post_covid_stabilization2: "Estabilización post-COVID"
 JAP_post_covid_stabilization2_desc: "A medida que la pandemia de COVID finalmente cede, debemos aprovechar el tiempo disponible para unir a la gente. La economía puede esperar un poco, pues de nada sirve si nuestra gente se enfrenta a la fuerza."
 JAP_invest_taiwanese_defences: "Invertir en defensas taiwanesas"
 JAP_invest_taiwanese_defences_desc: "Taiwán ha sido un punto de conflicto en el Pacífico durante décadas. Sin Norteamérica para protegerlos, China parece estar más cerca que nunca de actuar. Taiwán es nuestro aliado y haremos todo lo posible para asegurarnos de que no caigan fácilmente."
 JAP_ldp_unification_campaign: "Campaña de unidad del PLD"
 JAP_ldp_unification_campaign_desc: "El Partido Liberal Democrático es un partido muy grande y cuenta con muchas facciones diferentes. Estas facciones a veces sufren luchas internas, lo cual puede ser beneficioso en algunos casos, pero no ahora. Deberíamos proyectar confianza y estabilidad, para que el mundo sepa que estamos listos para enfrentarnos a nuestros enemigos."
 JAP_raise_defence_budget: "Aumentar el presupuesto militar"
 JAP_raise_defence_budget_desc: "China tiene un presupuesto de defensa que eclipsa al de Taiwán, Australia y el nuestro juntos. Obviamente, esto no es óptimo para ningún tipo de guerra contra ellos, y aunque no tenemos los fondos para igualar su presupuesto, sin duda podemos reducir la diferencia."
 JAP_start_information_war: "Iniciar la guerra informática"
 JAP_start_information_war_desc: "Una guerra directa contra China no nos iría bien sin EE.UU., por lo que tendremos que encontrar maneras creativas de lidiar con ellos. Si logramos difuminar la línea entre lo real y lo falso en la información que reciben, potencialmente podríamos tener ventaja en un conflicto cegándolos."
 JAP_triumph_of_japanese_people: "Triunfo del pueblo japonés"
 JAP_triumph_of_japanese_people_desc: "La idea de que este siglo pudiera ser un siglo chino finalmente ha sido destruida, pues hoy hemos demostrado al mundo nuestra capacidad. Logramos defender a Taiwán de la embestida china sin el apoyo de Norteamérica, ¡y la democracia en Asia Oriental vivirá para luchar otro día!"
 JAP_japan_new_course: "Nuevo rumbo para Japón"
 JAP_japan_new_course_desc: "Los oscuros años 90 y 2000 quedaron atrás, mientras avanzamos hacia el futuro. Tokio prospera, Kioto nunca había estado en mejor estado, incluso Sapporo se está beneficiando. Quizás lo mejor de todo es que la tasa de natalidad está aumentando. Si queremos continuar por este camino, es imprescindible una liberalización continua de Japón."
 JAP_stimulate_gender_equality: "Estimular la igualdad de género"
 JAP_stimulate_gender_equality_desc: "Simplemente innovar la \"womenomics\" de Abe no bastará para erradicar la desigualdad de género. Si bien podría ayudar en el trabajo, el hogar, la escuela y otros ámbitos, no lo hace. Es nuestro deber como gobierno asegurarnos de que todas las personas, hombres y mujeres, disfruten de los mismos derechos."
 JAP_green_economy_future: "Economía verde del futuro"
 JAP_green_economy_future_desc: "A medida que las energías alternativas cobran mayor importancia, debemos integrarlas en la economía. Japón es un país hermoso y no permitiremos que sea profanado por el industrialismo tal y como pasó en la India o China. ¡Convertiremos a Japón en un paraíso verde y mantendremos una economía sólida!"
 JAP_legal_flexibility: "Flexibilidad legal"
 JAP_legal_flexibility_desc: "Si eliminamos por completo el Artículo 9, corremos el riesgo de que futuras generaciones de legisladores japoneses recaigan en la oscura historia de nuestra nación. Por lo tanto, lo mantendremos, pero seguiremos trabajando para profundizar las lagunas legales. Seguimos necesitando defendernos a nosotros mismos y a nuestros aliados."
 JAP_economy_new_era: "Economía de la nueva era"
 JAP_economy_new_era_desc: "La economía japonesa ha experimentado un auge desde el fin de la pandemia de COVID-19 y la guerra de Taiwán, gracias a que la confianza en el Gobierno está en su punto más alto. Sería una tontería no aprovechar esto, así que nos pondremos manos a la obra para innovar la economía y evitar que el auge se acabe antes de tiempo."
 JAP_new_demographic_policy: "Nueva política demográfica"
 JAP_new_demographic_policy_desc: "La política de feminismo de Shinzō Abe fue muy eficaz, pero la desigualdad en el ámbito laboral persiste. Es necesario abordar esto para que nuestra nación siga por el buen camino. Si innovamos la labor de Abe para que se ajuste a los estándares modernos, no solo se beneficiará nuestra gente, sino también la economía."
 JAP_preserve_abe_legacy: "Preservar el legado de Abe"
 JAP_preserve_abe_legacy_desc: "Shinzō Abe era un hombre complejo, pero es innegable que sus políticas beneficiaron a nuestra nación. De no ser por él, no habríamos estado en condiciones de defender a nuestro aliado del dragón rojo. Sus tres flechas continuarán, ¡y su legado perdurará por muchos años!"
 JAP_revival_showa_spirit: "Revivir el espíritu Shōwa"
 JAP_revival_showa_spirit_desc: "La segunda mitad de la era Shōwa, una de las mejores de nuestra historia, duró casi cuarenta años, desde el final de la Segunda Guerra Mundial hasta principios de los años 90. Durante ese tiempo, nuestra cultura cambió drásticamente y nuestra economía experimentó un auge. Ahora, nos encontramos entrando en lo que algunos llaman la \"segunda era Shōwa\", donde la prosperidad japonesa ha regresado triunfalmente."
 JAP_harmony_labor_life: "Armonía de trabajo y vida"
 JAP_harmony_labor_life_desc: "El equilibrio entre la vida laboral y personal en nuestro país ha sido precario durante muchos años. Sin embargo, con la nueva era de prosperidad en la que nos encontramos, muchos cobran más. Por lo tanto, no tienen que preocuparse tanto por el trabajo y han logrado una mayor armonía entre la oficina y el hogar."
 JAP_national_consensus: "Consenso nacional"
 JAP_national_consensus_desc: "La Constitución necesita ser actualizada, especialmente el Artículo 9, y el Gobierno actual ha decidido revisarla. Sin embargo, corresponde al pueblo decidir qué considera necesario cambiar, por lo que se celebrará un referendo nacional."
 JAP_our_victory: "Nuestra victoria"
 JAP_our_victory_desc: "Si bien la guerra contra China se basó en la defensa de la soberanía de Taiwán, salimos victoriosos. Nadie consideró el conflicto como uno entre China y Taiwán con el apoyo de Japón; fue una lucha entre nosotros y ellos, y triunfamos. Esta es nuestra victoria, y como tal la trataremos."
 JAP_support_for_veterans: "Apoyar a los veteranos"
 JAP_support_for_veterans_desc: "Nos estremece pensar en lo que podría haber sucedido si hubiéramos perdido la guerra contra China; por suerte, no vivimos en esa realidad. Los responsables son nuestros veteranos, que lucharon y dieron sus vidas por su patria. ¡Debemos recompensarlos por todo lo que nos dieron!"
 JAP_moderate_approach: "Abordaje moderado"
 JAP_moderate_approach_desc: "Hemos llegado lejos como nación jugando a lo seguro y, con un futuro prometedor por delante, nos convendría no hacer cambios radicales. Si continuamos por el mismo camino, ¡la prosperidad llegará a los hogares de todos los japoneses!"
 JAP_stable_leadership: "Liderazgo estable"
 JAP_stable_leadership_desc: "Una nación estable tiene un líder poco controvertido, y la historia lo ha demostrado una y otra vez. Para un ejemplo moderno, observemos a Norteamérica. Nos aseguraremos de que los líderes de nuestros partidos sean populares ante el público y no haremos nada radical."
 JAP_balance_regional_development: "Balance del desarrollo regional"
 JAP_balance_regional_development_desc: "Si algunas prefecturas se disparan hacia el futuro y otras se quedan atrás, solo surgirá descontento. Por ello, se están elaborando varios proyectos de ley para garantizar que todos reciban su parte justa de nuestra nueva prosperidad."
 JAP_parliamentary_maneuvers: "Maniobras parlamentarias"
 JAP_parliamentary_maneuvers_desc: "La constitución tiene muchos aspectos que podrían retocarse, y es la opinión de casi todos hacerlo. Para representar un Japón unido, colaboraremos con el mayor número posible de parlamentarios para asegurarnos de que la constitución reciba las actualizaciones necesarias."
 JAP_hardline_consolidation: "Consolidación total"
 JAP_hardline_consolidation_desc: "Los grupos más radicales del PLD son pequeños y tienen poco poder, y al final, solo nos causan dolores de cabeza. Con tan poca influencia, no tienen razón de ser. Por lo tanto, se consolidarán en facciones mucho más grandes del partido, para simplificar."
 JAP_keep_it_stable: "Mantenernos estables"
 JAP_keep_it_stable_desc: "El mundo funciona mucho mejor cuando todos son felices, y la estabilidad lo consigue. La inestabilidad genera miedo, que a su vez genera odio, y así sucesivamente. Mientras nuestra nación sea estable, prosperará, y cuando nuestra nación prospere, su gente también."
 JAP_establish_internal_dialogue: "Establecer diálogo interno"
 JAP_establish_internal_dialogue_desc: "La falta de comunicación nunca le hizo bien a nadie, y ciertamente no la toleraremos en nuestro gobierno. Es importante que todos se sientan en igualdad de condiciones y que puedan expresar sus ideas. ¡Cuando todos trabajamos juntos, grandes cosas son posibles!"
 JAP_party_modernization: "Modernización del Partido"
 JAP_party_modernization_desc: "El Partido Liberal Democrático aún conserva muchos aspectos que la gente de hoy ha calificado de \"antiguos\". Vivimos en un mundo muy diferente al de los años 50 y 60, y el PLD debe reconocerlo. Vivir en el pasado nunca le ha hecho ningún bien a nadie, especialmente aquí en Japón."
 JAP_party_discipline: "Disciplina del Partido"
 JAP_party_discipline_desc: "El Partido Liberal Democrático no puede permitirse continuar con la tendencia de escándalos que ha plagado nuestra historia moderna; es necesario restaurar la disciplina. Hay que recordarles a los políticos dónde residen sus lealtades. El partido es lo primero, el pueblo lo segundo, y sus propios intereses, en último lugar."
 JAP_ignite_nationalism: "Encender el nacionalismo"
 JAP_ignite_nationalism_desc: "Durante la guerra de Taiwán, vimos el daño que puede causar la falta de respeto a la propia nación. A pesar de nuestra victoria en una guerra justa, aún hubo muchas protestas. Conteneremos preventivamente el frente interno ante cualquier guerra futura, asegurándonos de que se sientan orgullosos de Japón."
 JAP_protection_party_heritage: "Proteger el legado del Partido"
 JAP_protection_party_heritage_desc: "Si bien incluso nosotros debemos admitir que el PLD ha tenido dificultades en ocasiones, hemos realizado una labor más que encomiable al liderar Japón. Hemos guiado a la nación a través de sus épocas de prosperidad y la hemos protegido de las peores épocas de la oscuridad. Nuestros rivales nunca volverán a tener la oportunidad de derrotarnos, pues solo necesitamos invocar las leyendas del pasado, ¡y nuestro futuro está asegurado!"
 JAP_program_loyalty: "Lealtad al programa"
 JAP_program_loyalty_desc: "No podemos permitir que políticos deshonestos pongan en peligro nuestra agenda con sus propios planes. Si un programa fue establecido por una administración anterior, el partido debe adherirse a él, a menos que exista una razón significativa para lo contrario."
 JAP_political_concretization: "Concreción política"
 JAP_political_concretization_desc: "La volátil era de las elecciones de 2021 ha terminado, y la normalidad ha regresado a Japón. La Coalición Civil está extinta; los partidos que la conformaban han vuelto a sus disputas. Ahora debemos asegurarnos de que algo así no vuelva a ocurrir; nos atrincheraremos y mantendremos el control de la nación."
 JAP_integration_komeito: "Integrar al Kōmeitō"
 JAP_integration_komeito_desc: "Hemos llegado al punto en que el Kōmeitō es el PLD en todo menos en el nombre. Gestionar a nuestro propio títere ha empezado a presionar al sistema, por lo que la dirección ha decidido que ha llegado el momento de absorber a Kōmeitō."
 JAP_law_order: "Ley y Orden"
 JAP_law_order_desc: "Mantener el orden público de una nación es cada vez más difícil en el mundo actual. No queremos convertirnos en una de las muchas naciones del mundo que no ha caído en un conflicto civil. La paz debe mantenerse, por encima de todo."
 JAP_protect_rights_citizens: "Proteger derechos de los ciudadanos"
 JAP_protect_rights_citizens_desc: "Mientras el Gobierno siga en el poder, nuestro pueblo seguirá siendo libre. Las guerras civiles suelen ocurrir cuando el pueblo de una nación ha sido oprimido y su ira alcanza un punto álgido. Nuestros ciudadanos deben poder expresar libremente su ira, para que no se reprima."
 JAP_coordination_opinions: "Coordinación de opiniones"
 JAP_coordination_opinions_desc: "¡Estar de acuerdo es genial! Aunque cada uno ha vivido su propia vida y se ha visto influenciado por esas experiencias, eso no significa que tengamos que discrepar. Por el bien de la nación, nos aseguraremos de que todos en el partido compartan opiniones similares para que la burocracia funcione correctamente."
 JAP_collective_responsibility: "Responsabilidad colectiva"
 JAP_collective_responsibility_desc: "El Partido Liberal Democrático tiene un largo y, francamente, desafortunado historial de escándalos. Cada vez que uno de estos salía a la luz, todos se volvían contra el principal responsable, incluso otros involucrados. Esto no debe suceder, y debemos reafirmar la idea de que el error de una persona es el error de todos."
 JAP_open_new_ideas: "Abrirnos a nuevas ideas"
 JAP_open_new_ideas_desc: "Estamos llegando a un punto en el que las nuevas generaciones, principalmente la Generación Z, se están abriendo camino en la política. Los jóvenes aportan muchas ideas nuevas, y aunque algunos temen que puedan afectar la estabilidad del partido, estamos abiertos a ellos. El mundo está en constante cambio, y el PLD no puede permanecer estático para siempre."
 JAP_party_rejuvination: "Rejuvenecer los cuadros"
 JAP_party_rejuvination_desc: "Los mayores en el PLD han prestado un gran servicio a su nación, pero pronto les llegará su hora. No podemos seguir dependiendo de estos políticos, quienes pronto cruzarán el umbral de la vida y la muerte. Los guiaremos y seguiremos inspirando a los jóvenes a integrar sus nuevas mentes."
 JAP_rebirth_establishment: "Renacer del establishment"
 JAP_rebirth_establishment_desc: "El sol sale sobre Tokio, los primeros sakura empiezan a florecer, el monte Fuji se refleja en el lago Yamanaka. Para la persona promedio, la vida no ha cambiado tanto. Sin embargo, dentro del PLD, el cambio nunca ha sido tan evidente. El partido ha encontrado nuevos oídos y nuevas voces para escuchar. El futuro nos llama, y para alcanzarlo debemos abandonar el pasado."
 JAP_defend_taiwan: "Defender Taiwán"
 JAP_defend_taiwan_desc: "Lo que antes se consideraba una imposibilidad se ha convertido en nuestra espantosa realidad. Sin embargo, no podemos seguir debatiendo estos días. Nuestra naturaleza burocrática nos impidió responder claramente al COVID o a la agitación económica provocada por el colapso de Estados Unidos en una guerra civil.\n\n¡Ya no más! Mantendremos nuestro deber como miembros de la OTDP, junto con nuestros aliados en Camberra, para defender la isla de Taiwán del EPL. Lucharemos junto a los nativos de la isla, no como opresores, sino como pueblos libres unidos contra la autocracia.\n\n¡Totsugeki!"
 JAP_kinmen_operation: "Operación Kinmen"
 JAP_kinmen_operation_desc: "Una de las primeras bajas sufridas en este conflicto fue la rápida operación del EPL sobre la isla de Kinmen, capturándola con poca o ninguna respuesta inicial por parte de Taipéi. Sin embargo, la pérdida de esta isla es una derrota estratégica a la par de cualquier pérdida en el territorio continental de Taiwán. La reconquista de esta isla será uno de nuestros principales objetivos."
 JAP_maintain_sea_and_air_superiority: "Superioridad aérea y marítima"
 JAP_maintain_sea_and_air_superiority_desc: "Aunque las Fuerzas de Autodefensa están muy lejos de su contraparte del Ejército Imperial, todavía conservan gran parte del prestigio del antiguo Imperio. Nuestras flotas aéreas y navales son algunas de las más avanzadas de Asia, gracias a las tácticas compartidas con nosotros por nuestros antiguos aliados estadounidenses. Estas tácticas y tecnologías, aunque necesitan ser refinadas, deberían ser suficientes para asegurar nuestra superioridad sobre nuestros homólogos chinos."
 JAP_break_the_blockade_of_taiwan: "Romper el bloqueo de Taiwán"
 JAP_break_the_blockade_of_taiwan_desc: "Uno de los mayores obstáculos en nuestro camino para asegurar la libertad de Taiwán es el grupo de buques del EPL que rodean la isla como una serpiente que custodia a su presa. Nuestros buques y aeronaves deben recibir la orden de romper la serpiente y conectar a Taiwán con el resto del mundo, permitiendo que los suministros tan necesarios ayuden en gran medida en el esfuerzo bélico."
 JAP_throw_them_into_the_sea: "Devolverlos al mar"
 JAP_throw_them_into_the_sea_desc: "A pesar de nuestros mejores esfuerzos, no podemos evitar lo inevitable. Sin embargo, podemos convertirlo en una oportunidad. Las fuerzas del EPL desembarcarán en Taiwán, pero actuando estratégicamente, podemos expulsar al EPL directamente de la isla hacia el Pacífico, donde se convertirán en objetivos principales para nuestras flotas."
 JAP_fortify_okinawa_and_senkaku: "Fortificar Okinawa y Senkaku"
 JAP_fortify_okinawa_and_senkaku_desc: "Aunque Taiwán es el principal frente que nos debe preocupar, no debemos negar la posibilidad de que el EPL abra otros frentes, quizás contra nuestra propia soberanía en el Pacífico. Islas como Okinawa y Senkaku deben ser fuertemente fortificadas en anticipación de una hipotética incursión del EPL en nuestro territorio soberano."
 JAP_strike_chinese_military_bases: "Bombardear bases chinas"
 JAP_strike_chinese_military_bases_desc: "Para solucionar un problema, primero hay que consultar las raíces. Podemos seguir defendiendo a Taiwán de las fuerzas del EPL, pero si siguen volviendo cada día, acabarán por doblegarnos. Atacando las bases del EPL en China continental, podremos reducir drásticamente su capacidad para mantener su guerra injusta contra Taiwán, quizás animándolos a buscar la paz en su lugar."
 JAP_strengthen_air_defense: "Fortalecer la defensa aérea"
 JAP_strengthen_air_defense_desc: "Donde nuestros cazas no pueden operar, hay poco o ningún contrapeso a las operaciones llevadas a cabo contra las ciudades de Taiwán por parte de la Fuerza Aérea del EPL. Sin embargo, suministrar a la isla las defensas necesarias para sabotear las operaciones de la Fuerza Aérea del EPL ayudará a proteger a los civiles de la isla de problemas y permitirá que nuestra Fuerza Aérea se concentre en objetivos militares."
 JAP_leap_to_prosperity: "Salto a la prosperidad"
 JAP_leap_to_prosperity_desc: "[JAP_leap_prosperity_loc]"
 JAP_leap_lost_taiwan: "Nuestra derrota en Taiwán nos ha brindado una oportunidad interesante, una oportunidad para mirar hacia dentro y reflexionar sobre nuestra nación. ¿Por qué deberíamos dedicar tanto tiempo y dinero a defender a nuestros vecinos, cuando nuestro propio pueblo sufre? La prosperidad puede estar lejos, pero la victoria de China no nos ha impedido seguir adelante con paso firme."
 JAP_leap_victory_taiwan: "Desde que derrotamos a China en la guerra de Taiwán, nuestra economía no solo ha prosperado, sino que ha explotado. Avanzamos hacia la mayor prosperidad que nuestra nación haya visto jamás, más rápido que el Shinkansen. Ahora debemos reinvertir en el país los enormes fondos que estamos recibiendo para convertir nuestra isla natal en un pequeño paraíso."
 JAP_develop_northern_prefectures: "Desarrollar el norte"
 JAP_develop_northern_prefectures_desc: "El norte de Japón siempre ha sido, y probablemente siempre será, la zona más rural del país. Los Gobiernos anteriores han dedicado la mayor parte de su tiempo a las prefecturas del centro y el sur, por lo que el norte se ha perdido su cuota de prosperidad. Afortunadamente, ahora hay suficiente para todos, y el norte finalmente se pondrá al nivel del resto del país."
 JAP_support_centre_prefectures: "Apoyar al centro"
 JAP_support_centre_prefectures_desc: "Sin duda, la región más importante de Japón, las prefecturas centrales también se encuentran entre las más densamente pobladas. Por ello, han estado sufriendo la presión de atender a tanta gente. Afortunadamente, ahora contamos con la capacidad y los fondos para ayudarlas a aliviar parte de su carga."
 JAP_revitalize_southern_prefectures: "Revitalizar al sur"
 JAP_revitalize_southern_prefectures_desc: "Antes de que el Gobierno centrara su atención en el centro del país, el sur era la región más importante. Sin embargo, gran parte de la infraestructura del sur se ha deteriorado, y su calidad dista mucho de la de las prefecturas centrales. Ahora es el momento de cambiar esto, pues vivimos en un Japón con fondos suficientes para devolver la prosperidad al sur."
 JAP_expand_urban_areas: "Expandir areas urbanas"
 JAP_expand_urban_areas_desc: "Nuestros esfuerzos para frenar el crecimiento de las zonas urbanas, en comparación con las rurales, han funcionado, pero solo parcialmente, y la población de las ciudades sigue creciendo drásticamente. Probablemente nunca podremos revertir la afluencia de personas, pero lo que sí podemos hacer es garantizar que las ciudades tengan suficiente espacio para todos."
 JAP_age_of_reconstruction: "Era de la reconstrucción"
 JAP_age_of_reconstruction_desc: "En todo el país, la infraestructura se encuentra abandonada y descuidada, vestigios de los años oscuros de los años 90 y 2000. Sin embargo, nos encontramos en un punto de la historia de nuestra nación en el que no solo podemos restaurar estos edificios, sino también derribarlos y construir otros aún mejores en su lugar. ¡La era de la reconstrucción ha llegado!"
 JAP_technological_renaissance: "Renacimiento tecnológico"
 JAP_technological_renaissance_desc: "Japón siempre ha sido mundialmente reconocido por sus innovaciones tecnológicas, pero en la última década estas se han ralentizado. Sin embargo, ahora nos encontramos en un renacimiento de las nuevas tecnologías. La inteligencia artificial, los dispositivos domésticos, el entretenimiento e incluso cosas que antes solo se consideraban posibles en la ciencia ficción se están desarrollando aquí en Japón. ¡Avanzamos hacia el futuro, paso a paso!"
 JAP_energy_independence: "Independencia energética"
 JAP_energy_independence_desc: "Durante siglos hemos luchado por la independencia energética, por no depender de nadie más, por que nuestra gente viva de la energía que produce. Estamos más cerca que nunca de hacer realidad este sueño; debemos aprovechar la oportunidad y no desaprovecharla. Ya sea nuclear, solar, hidroeléctrica o cualquier otra, ¡se producirá aquí en Japón!"
 JAP_new_leader_of_the_free_world: "Nuevo líder del mundo libre"
 JAP_new_leader_of_the_free_world_desc: "Con nuestra victoria sobre China y la incapacidad de EE.UU., hemos demostrado que podemos proclamarnos líderes del mundo libre del Pacífico. Desde Camberra hasta Taipéi, y todas las ciudades libres intermedias, ahora es nuestro deber protegerlas."
 JAP_reinforce_pdto: "Reforzar la OTDP"
 JAP_reinforce_pdto_desc: "La guerra contra China no es fácil, pero demostró que la Organización del Tratado de Defensa del Pacífico puede considerarse una entidad legítima. Trabajamos mucho para que la alianza llegara a donde está hoy, y debemos permanecer vigilantes. Quién sabe cuándo China podría intentar algo de nuevo."
 JAP_own_economic_sphere: "Esfera económica propia"
 JAP_own_economic_sphere_desc: "Tras la derrota de China, muchas naciones han quedado cómodamente integradas en nuestra esfera económica. Nuestro mercado ahora llega hasta Sudamérica en algunos casos. Con una esfera económica tan vasta, debemos asegurarnos de que se gestione correctamente."
 JAP_new_allies: "Nuevos aliados"
 JAP_new_allies_desc: "Varias naciones expresaron interés en la OTDP antes de la guerra de Taiwán, y ahora que hemos derrotado a China, algunas parecen listas para convertirse en miembros de pleno derecho. La más notable es India, y Nueva Zelanda será un miembro valioso."
 JAP_expanding_our_influence: "Expandir nuestra influencia"
 JAP_expanding_our_influence_desc: "La guerra de Taiwán destrozó la influencia extranjera de China. Ahora somos casi, si no más, influyentes que los chinos en el Indopacífico. Aun así, debemos asegurarnos de que el dragón se mantenga bajo control y de que nosotros nos mantengamos en pie. Hay muchos lugares donde podemos expandir nuestra influencia, y lo haremos."
 JAP_made_in_japan: "Made in Japan"
 JAP_made_in_japan_desc: "No muchos países tienen una capacidad de fabricación comparable a la nuestra, y los pocos que la tienen suelen ser nuestros rivales. Para gestionar nuestra esfera, debemos asegurarnos de que los países que la conforman nos compren la mayor parte de sus productos."
 JAP_recovery_assistance: "Asistencia para la recuperación"
 JAP_recovery_assistance_desc: "Puede que china haya perdido la guerra, pero eso no significa que no hayan asestado duros golpes. La infraestructura taiwanesa quedó devastada por la agresión china, y ellos necesitan toda la ayuda que puedan recibir para la reconstrucción."
 JAP_continue_military_integration: "Continuar la integración militar"
 JAP_continue_military_integration_desc: "Tokio está a aproximadamente 8.000 km de distancia de Sídney, y a casi 6.000 km de Nueva Delhi. Con estas enormes distancias entre nosotros y nuestros aliados, debemos asegurarnos de que nuestros ejércitos no se sientas aislados unos de otros. Deben ser capaces de funcionar juntos como una máquina de guerra efectiva."
 JAP_stimulate_local_mic: "Estimular industrias locales"
 JAP_stimulate_local_mic_desc: "Si bien estamos a favor de fabricar nuestros productos aquí, no podemos permitir que nuestros aliados se queden atrás en la producción de armas. Bastaría con que nuestro enemigo interceptara nuestros convoyes, y antes de que nos demos cuenta, nuestros aliados ya no podrán abastecer a sus soldados. Financiaremos sus propios complejos industriales militares."
 JAP_weapon_supplies: "Suministros de armas"
 JAP_weapon_supplies_desc: "El equipo militar japonés es uno de los más avanzados del mundo, y nuestros aliados se beneficiarían enormemente de su uso. Además, una fuerza de combate unida no debería usar todo tipo de armas incompatibles entre sí. Seguiremos suministrando a nuestros aliados nuestro propio equipo."
 JAP_scientific_collaboration: "Colaboración científica"
 JAP_scientific_collaboration_desc: "Asia es conocida por producir mentes brillantes, y si las unimos, grandes cosas son posibles. China quiere monopolizar la innovación, pero no se lo permitiremos. ¡Les demostraremos que no solo somos capaces de vencerlos en la guerra, sino también en la lucha por la inteligencia!"
 JAP_new_cooperation_agreement: "Nuevo acuerdo de cooperación"
 JAP_new_cooperation_agreement_desc: "Los taiwaneses han comprendido la necesidad de un tratado de defensa más integral con nosotros, que vaya más allá incluso de la OTDP. Siempre nos complace defender a nuestros aliados y nos aseguraremos de que los taiwaneses se sientan tan seguros como nuestro propio pueblo."
 JAP_economic_pan_asianism: "Panasianismo económico"
 JAP_economic_pan_asianism_desc: "La idea del panasianismo se atribuye a menudo al Imperio japonés y a su justificación para librar guerras contra las naciones de este continente. Sin embargo, si se toma la idea al pie de la letra y se ignora su oscura historia, resulta beneficiosa al aplicarse a la economía."
 JAP_our_european_partners: "Nuestros socios europeos"
 JAP_our_european_partners_desc: "Sin EE.UU. para comprar nuestros productos, hemos tenido que explorar mercados alternativos. Nuestros expertos consideran que, a pesar de estar lejos, los países europeos son un buen lugar para redoblar las exportaciones."
 JAP_our_north_neighbour: "Los del norte"
 JAP_our_north_neighbour_desc: "Nunca nos hemos llevado bien con Rusia, pero las rivalidades políticas no deberían obstaculizar las oportunidades económicas. Queremos que compren nuestros productos, y ellos también. Aunque nunca seamos aliados, sin duda podemos llegar a un acuerdo."
 JAP_promote_yen: "Fomentar el yen"
 JAP_promote_yen_desc: "Con el colapso del dólar, muchos países buscan una moneda alternativa. El euro ha sido la más destacada, pero Asia Oriental está claramente lejos de Europa. Por lo tanto, se nos presenta la oportunidad de persuadir a más países para que utilicen el yen."
 JAP_our_american_colleagues: "Nuestros colegas americanos"
 JAP_our_american_colleagues_desc: "Hasta hace poco, nuestro mayor cliente en América era EE.UU., aunque por razones obvias ya no es un candidato ideal. Afortunadamente, también tenemos una excelente conexión con el mercado latinoamericano, y nuestros socios allí seguramente estarían encantados de colaborar con más frecuencia."
 JAP_development_programmes: "Programas de desarrollo"
 JAP_development_programmes_desc: "Centroamérica y Sudamérica tienden a estar rezagadas con respecto a gran parte del mundo en prácticamente todos los ámbitos. Si queremos beneficiarnos, nuestros aliados en la región deben beneficiarse, y nadie más los está ayudando. Es nuestro deber financiar programas de desarrollo; el dinero seguramente volverá a nosotros."
 JAP_seize_the_situation: "Aprovechar la situación"
 JAP_seize_the_situation_desc: "La Segunda Guerra Civil Americana es una tragedia, pero también una oportunidad. Sería una tontería no encontrar la manera de aprovechar la situación para nuestro beneficio; casi todos los demás lo hacen. Los diferentes bandos están ansiosos por matarse entre sí, y nosotros tenemos las herramientas necesarias para hacerlo."

 JAP_japanese_pacifism_idea: "Pacifismo japonés"
 JAP_japanese_pacifism_idea_desc: "Desde el fin de la Segunda Guerra Mundial, Japón se ha visto obligado a abandonar las viejas costumbres bélicas y adoptar un estilo de vida más pacifista que en el pasado. El Artículo 9 de la Constitución hace casi imposible que la nación levante un ejército. Sin embargo, ante la creciente amenaza de China a nuestro oeste y el declive constante de Estados Unidos, muchos han comenzado a cuestionar el statu quo y a proponer la abolición del Artículo 9 y la creación de un ejército adecuado para defender a Japón y a su pueblo."

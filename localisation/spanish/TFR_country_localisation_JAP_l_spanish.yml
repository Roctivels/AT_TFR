 jap.176.t: "Enviados de la paz"
 jap.176.d: "Al caer la noche, las luces de neón de Orchard Road comienzan a parpadear, reflejándose en el blindaje del carro de combate principal Tipo 10 del subteniente Akihiko Nakamura. Desde su posición, observa más allá de las imponentes fachadas de cristal de los lujosos centros comerciales, contemplando la calle comercial más concurrida de Asia. El convoy blindado avanza lentamente, con el sonido de las orugas de acero resonando contra el asfalto. Justo al lado, el vehículo blindado de transporte de personal del teniente Takumi Suzuki está repleto de suministros de socorro. Esta unidad de avanzada del 7º Regimiento Blindado tiene la importante misión de traer paz y un nuevo orden a Singapur.\n\nEn ION Orchard, una enorme pantalla LED sigue proyectando anuncios de moda de alta gama. Los singapurenses observan la columna de acero en un silencio casi reverente; algunos capturan el momento con sus últimos iPhones, mientras que otros simplemente miran en silencio. Para Nakamura, esos rostros serenos refuerzan la importancia de su misión: defender la democracia.\n\nA medida que el convoy blindado pasa por Orchard Central, una niña con uniforme escolar saluda al tanque. Nakamura se quita el casco y le devuelve la sonrisa. Al caer la noche, el convoy se acerca a la estación de MRT de Orchard. Los trenes siguen funcionando con normalidad, y oficinistas, junto con jóvenes bien vestidos, salen en tropel de las salidas de la estación."
 jap.176.a: "Todo sigue igual."
 jap.177.t: "Vuelo Tropical"
 jap.177.d: "El helicóptero UH-60J atraviesa el denso follaje de la jungla camboyana. El sargento Yuichi Tanaka se apoya sobre la puerta de la cabina, observando la gran capa verde que se encontraba debajo suya. El húmedo aire tropical, lleno de la esencia de la tierra mojada penetra en la cabina, recordándole a los documentales sobre la guerra de Vietnam que vio en la academia.\n\"Oye Yamamoto\" dijo mientras codeaba al soldado detrás suya, \"¿No crees que nos parecemos a los estadounidenses en Vietnam?\" Koji Yamamoto levantó su cara empapada por el sudor, iba a responder cuando una repentina ráfaga de turbulencia zarandeó al helicóptero, interrumpiéndolos.\n\n\"Sólo nos hace falta unos pocos Charlies con AK saltando de los árboles\" bromeó Tanaka, poniendo su mano instintivamente sobre el cargador de repuesto de su chaleco táctico. La formación de helicópteros de la 7º Brigada Aerotransportada sigue su camino hacia Nom Pen con el rugido de las turbinas resonando por toda la selva."
 jap.177.a: "¿Nos van a derribar con un RPG?"
 jap.178.t: "Lobo solitario"
 jap.178.d: "Desde la estación del comandante en su carro de combate principal Tipo 10, Daiki Suzuli inspecciona las calles de la Ciudad Ho Chi Minh. En su tableta táctica, imágenes a tiempo real tomadas por drones muestran a tres T-90 de las fuerzas armadas vietnamitas emboscando la carretera Tan Son, bloqueándola con una formación triangular para así cerrar la ruta hacia el centro de la ciudad. \"¡Cargad las AP!\" ordenó. El cargador Nakamura indicó que la ronda estaba cargada con un fuerte chasquido. Guiado por su servosistema electrohidráulico, el cañón principal de 120mm apunta con precisión al flanco vulnerable del primer T-90.\"¡Fuego!\"\n\nLa primera ronda perforadora de blindaje sale del cañón y golpea a la unión de los blindajes. La explosión se muestra con un blanco brillante en la mira térmica, y el primer tanque explota inmediatamente. Suzuki no tenía tiempo para celebrar, pues los otros dos T-90 ya se habían enfocado en su posición. \"¡Maniobra defensiva hacia la derecha! ¡Fuego de cobertura!\" El tanque maniobra impecablemente bajo el sistema de control, mientras la ametralladora destroza los dispositivos ópticos del enemigo para ganar tiempo para recargar. Un proyectil enemigo procedente del segundo T-90 rozó su propio blindaje.\n\n\"¡Objetivo número dos, 650 metros, ronda cargada!\" anuncia el sistema de control de fuego electrónico. Suzuki confirma la dirección y ordena disparar al mismo tiempo. La segunda ronda perforadora de blindajes penetra el compartimento de alimentación del enemigo. El T-90 estalla en llamas, pero continúa resistiendo obstinadamente. El último tanque vietnamita trata de huir tras unos edificios cercanos. Suzuki espera tranquilamente al ángulo perfecto, y entonces da la orden final de disparar. La tercera ronda golpea las orugas del tanque, inmovilizando a la bestia mecánica de una vez en la esquina de la calle."
 jap.178.a: "El ganador es el rey."
 jap.179.t: "Ofensiva del norte"
 jap.179.d: "Al mediodía, Hanói tiembla bajo una descarga de artillería. El subteniente Yuichi Nakamura yace boca abajo tras las ruinas humeantes de un edificio de oficinas al borde de la plaza Ba Dinh, observando cómo el Mausoleo de Ho Chi Minh aparece y desaparece entre las nubes de humo. El fuego enemigo, procedente de posiciones vietnamitas, destroza los escombros de hormigón a su alrededor con estridentes impactos.\n\n\"¡Cúbranme!\", grita Nakamura por su comunicador, indicando al experto en demoliciones Suzuki que prepare la carga de la mochila. Mientras tanto, el grueso de la fuerza se encuentra enfrascado en un feroz combate urbano, con el rugido de los tanques fusionándose con el entrecortado fuego de fusil. En lo alto, aviones a reacción y misiles tierra-aire serpentean por el horizonte, liberando ocasionalmente escombros en llamas que caen a las calles. \"¡A las dos!\", grita, justo cuando un cohete impacta en el muro que tiene detrás. La onda expansiva resultante lanza al suelo a varios miembros de su escuadrón, mientras la lluvia de escombros los rodea. Limpiándose la sangre del rostro, Nakamura avanza. Un soldado vietnamita emerge del humo; Nakamura dispara por instinto.\n\n\"¡Ingenieros, avancen hacia el objetivo!\" La radio crepita con una cacofonía de órdenes gritadas y explosiones. Tanaka y Sato, dos ingenieros de combate que cargan con equipos de demolición, avanzan a rastras bajo fuego de cobertura. Un humo denso y asfixiante se eleva sobre la plaza, atravesado solo por rayos de luz. La plaza Ba Dinh se ha convertido en un campo de batalla infernal, plagado de cráteres y vehículos en llamas. Un avión de combate ruge sobre sus cabezas, lanzando bombas cuyas explosiones resuenan en la distancia."
 jap.179.a: "¡Adelante!"
 jap.180.t: "El Templo"
 jap.180.d: "La luz del crepúsculo envuelve la dorada aguja del Templo Xisage en un cálido tono ámbar. El subteniente Yusuke Sato se encuentra de pie ante los antiguos escalones de piedra, observando cómo el anciano abad desciende lentamente, con su túnica naranja ondeando suavemente al compás de la brisa vespertina.\n\"Maestro\", comienza Sato, \"hemos venido por alguien: un oficial del EPL que está herido\".\nEl abad sonríe y asiente. \"Todos los seres sufren, así que, ¿por qué aferrarse al destino de una sola persona? Todo en este mundo son ilusiones\".\n\"Esto no es un debate filosófico, maestro\", dice Sato, dando un paso al frente. \"Es una operación militar. Ese oficial tiene las manos manchadas con la sangre de nuestros compañeros\".\n\"Lo que mencionas no es más que apego\", responde el abad. \"El Buda enseña que el odio no se disipa con más odio; solo la compasión puede vencerlo. Lo que buscas es simplemente la continuación del karma\".\nSato aprieta la culata de su rifle con más fuerza. \"Maestro, respeto su fe, pero las órdenes son órdenes. Por favor, no me lo haga más difícil\".\n\"El Bodhisattva teme la causa, mientras que los seres comunes temen el efecto. Las semillas que siembras hoy algún día darán frutos amargos. ¿Por qué no dejar de lado la hostilidad y evitar más derramamiento de sangre?\"\n\"Somos soldados, y el deber principal de un soldado es obedecer las órdenes\".\nJuntando las palmas de las manos, el abad dice: \"Amitabha. Un pensamiento de compasión, un pensamiento de naturaleza búdica. Si puedes soltar tu apego en este momento, tal vez comprendas lo valiosa que es la vida\".\n\"Esta es la última vez que te lo pido: entrégame a ese oficial\". La paciencia de Sato se está agotando.\nEl anciano monje cierra los ojos. \"Todos los seres poseen la naturaleza búdica, pero muchos permanecen perdidos en la ilusión. Si insistes en usar la violencia para detener la violencia, solo puedo proteger el Dharma con mi propia vida\"."
 jap.180.a: "Sato suspiró y levantó la culata de su rifle."
 jap.181.t: "Valquirias del cielo"
 jap.181.d: "Docenas de cazas a reacción atraviesan las nubes sobre la bahía de Manila. En el sistema alerta temprana y control aerotransportado, una enjambre de puntos brillantes en el radar indicaba la convergencia de varias formaciones. Takaguchi Tsukikage, la as de la Fuera Aérea de Autodefensa, maniobraba su F-35 cuando un grupo de J-20 y KAI T-50 filipinos se acercaron a su posición desde el mar de la China Meridional.\n\n\"A todas las unidades, se les advierte: Alrededor de 40 aviones enemigos están entrando a la zona de combate\", la advertencia proveniente del avión de comando crepita por el encriptado canal. Tsukikage observa los constantemente actualizados datos en su HUD. Sus instintos le dicen que esta batalla aérea puede redefinir el dominio de los cielos de Manila.\n\nLa primera descarga sale a 30000 pies de altura. Un aluvión de misiles trenzan un letal tapete en las nubes, y las agudas alertas de la ECM perforan la cabina de vuelo, Tsukikage realiza un giro de barril, esquivando dos misiles próximos e inmediatamente se enfoca en un J-20 que intentaba eludir a la AWACS de su bando. Sus dedos aprietan el gatillo; el misil aire-aire se dirige a su objetivo. Los señuelos no pudieron salvar al J-20. En una brillante estallido de luz, se revela una explosión en los cielos sobre la bahía de Manila,\n\nEl caos se intensifica con cazas de todo tipo compitiendo por las nubes, con misiles dejando estelas doradas a la luz del sol. El F-35 de Tsukikage ejecuta una espectacular maniobra cobra, dejándola en el punto ciego de un KAI T-50. Su segundo misil hace diana, dejando otra bola de fuego caer sobre la bahía. COn su liderazgo, la formación japonesa gradualmente destroza la línea defensiva del enemigo. El AWACS del E-767 da una última actualización: Alrededor de la mitad de los aviones enemigos han sido destruidos y los cazas restantes se están retirando al sur."
 jap.181.a: "Estos cielos pertenecen ahora a Japón."
 JAP_oil_crisis_cat: "Crisis del petróleo"
 JAP_oil_crisis_cat_desc: "Los fantasmas de 1973 han vuelto repentinamente para atormentar al Japón moderno. Habíamos soñado que nuestros hijos no sufrieran como hicimos nosotros, pero no se puede cambiar lo que ha pasado, y todo lo que podemos (y debemos) hacer es asegurar nuevas fuentes de petróleo y solucionar este problema antes de que se salga de control."

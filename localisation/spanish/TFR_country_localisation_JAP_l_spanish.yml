 jap.60.t: "Orgullo de la flota hundido"
 jap.60.d: "Era una mañana perfecta, con la luz del sol de Tokio brillando intensamente desde el Monte Fuji sobre la meseta de Ichigaya. La Bandera del Sol Naciente, ondeando suavemente en lo alto del edificio del Ministerio de Defensa, producía un ligero crujido con la brisa matutina. El Jefe del Estado Mayor Naval acababa de preparar su té verde diario junto a la ventana de su oficina, con el vapor elevándose delicadamente de la taza.\n\nMientras contemplaba el paisaje, se sentía inusualmente relajado. El informe del ejercicio de ayer había indicado que el buque de guerra recién botado estaba en excelentes condiciones, y el clima de hoy era perfecto para una nueva ronda de entrenamiento. El aroma del té llenaba la luz de la mañana, haciendo que todo pareciera ideal.\n\nDe repente, los pasos del oficial de comunicaciones resonaron de manera abrupta por el pasillo, mucho más rápidos de lo habitual. Tras llamar a la puerta, el oficial le entregó un informe de batalla recién recibido. El documento era delgado, con solo unas pocas líneas de texto. De pie junto a la ventana, con la luz abundante, la letra era claramente visible: Buque hundido, numerosas bajas."
 jap.60.a: "Un día negro para la nación..."
 jap.61.t: "Familia imperial de Japón muere en ataque nuclear"
 jap.61.d: "El punto álgido de las guerras siempre se eleva, conociendo los límites y los caminos a seguir. Y los caminos que no se deben seguir.\n\nChina ha lanzado un ataque nuclear contra Tokio; ya se han realizado evacuaciones y se han abierto refugios, pero el daño causado a la ciudad ha sido inmenso.\n\nDespués de que la nube de hongo se alzara sobre la ciudad, los bosques se incendiaran y los edificios quedaran reducidos a escombros, se hizo una revelación impactante. La familia imperial, símbolo de Japón en su apogeo, ha muerto en este ataque trágico. Las evacuaciones han sido demasiado caóticas para que la familia pudiera escapar a tiempo, junto con su gente.\n\nCon noticias tan devastadoras y la destrucción que se cierne sobre Tokio, ya no queda mucha compasión en el corazón de Japón; en cambio, esta es reemplazada por el odio."
 jap.61.a: "\"Con mi muerte, pido humildemente perdón al Emperador por el gran crimen\"."
 jap.62.t: "Protestas anti-guerra"
 jap.62.d: "Al salir Kimura Haruki por la puerta este de la estación de Shinjuku, la puesta de sol se hundía lentamente tras las cortinas de cristal. Su traje estaba tan arrugado como siempre, y la correa de su maletín le había dejado una profunda marca en el hombro.\n\nEra la 3427ª, o tal vez la 3428ª vez que pasaba por allí, tantas que ni siquiera él podía recordarlas. La multitud antibélica en la plaza era más numerosa que ayer, con oleadas de voces que se alzaban una tras otra. Kimura Haruki sacó su teléfono, revisando de manera habitual su cuenta bancaria en línea. Las tasas hipotecarias habían vuelto a subir, y su saldo bancario se desvanecía día a día bajo la sombra de la guerra.\n\nMientras miraba fijamente las frías cifras en la pantalla de su teléfono, Kimura se dio cuenta de repente de que esta guerra estaba erosionando el futuro de todos. Pensó en la anciana que, en el tren esa mañana, suspiraba al leer el periódico sobre la subida de precios, y en los rumores de despidos que sus compañeros comentaban en voz baja durante el almuerzo.\n\nLas voces de la multitud volvieron a alzarse, y esta vez, Kimura Haruki no salió corriendo como solía hacerlo. Se quedó quieto, sintiendo cómo los sonidos circundantes se fundían gradualmente con los latidos de su corazón. Era la primera vez que tomaba en serio el volante que sostenía."
 jap.62.a: "Se convirtió en uno de ellos."
 jap.63.t: "Protestas anti-China"
 jap.63.d: "Al caer la noche en Fukuoka, Ryuichiro Matsuda lideró una marcha por la calle principal, justo frente a la entrada de la famosa calle comercial subterránea de Tenjin. Su voz, aunque ronca, no mostraba signos de cansancio; el megáfono que sostenía amplificaba sus palabras, resonando en cada rincón.\n\n\"¡Miren las tiendas de estos chinos!\", exclamó Matsuda, señalando los negocios que cerraban apresuradamente. \"¿Quién sabe con quién se están comunicando cada noche? ¿Quién puede asegurar que estas tiendas no esconden explosivos, preparándose para ayudar al enemigo en un sabotaje?\". Detrás de él, la multitud seguía creciendo, sus pasos resonando en las calles.\n\nUna estudiante intentaba entrar en un callejón estrecho, pero la multitud se lo impedía. Con la cabeza gacha, aceleró el paso y se desvaneció en la esquina de un 7-Eleven. Matsuda la observó, elevando aún más su voz: \"Viven entre nosotros, utilizan nuestras instalaciones, disfrutan de nuestros recursos, pero informan en secreto al enemigo. ¡Qué vergüenza! Ciudadanos, debemos expulsar a estos enemigos de Japón, sin dejar a ninguno atrás...\"\n\nUn helicóptero de transporte militar de las Fuerzas de Autodefensa sobrevoló a baja altura, ahogando brevemente el clamor de la marcha. Las farolas a lo lejos comenzaron a encenderse una a una, proyectando una luz fría sobre los escaparates que estaban herméticamente cerrados."
 jap.63.a: "¡Chinos, afuera!"
 jap.64.t: "Dos partidos se retiran de la Coalición"
 jap.64.d: "En una sala de conferencias en el distrito de Chiyoda de Tokio, el presidente del PCJ, Kazuo Shii, y el líder del PSD, Mizuho Fukushima, anunciaron conjuntamente su salida de la Coalición Civil. Formada hace menos de un año, la alianza tenía como objetivo desafiar al gobernante PLD.\n\nShii declaró durante la conferencia de prensa: \"Nos unimos a la Coalición Civil con la gran esperanza de lograr un verdadero cambio de régimen. Sin embargo, ciertos elementos extremistas han socavado nuestra base común\". Criticó el auge del populismo y las interminables disputas internas dentro de la coalición. Fukushima añadió: \"La Coalición Civil se ha desviado de su misión original de servir al público. No podemos apoyar las luchas internas entre facciones, ni podemos aceptar que la cooperación se convierta en compromiso\", aludiendo a conflictos internos sobre temas como la eliminación gradual de la energía nuclear.\n\nEn realidad, la ruptura entre el PCJ y la coalición era evidente desde hacía tiempo. Por ejemplo, las divisiones sobre las propuestas para abolir el impuesto al consumo y revisar el Tratado de Seguridad entre Estados Unidos y Japón causaron importantes fricciones. El mes pasado, miembros de la izquierda organizaron una manifestación gritando consignas contra China, mientras que el grupo de ultraderecha Issuikai abogaba por un mayor acercamiento económico entre China y Japón. Los enfrentamientos derivaron en enfrentamientos físicos en el exterior del recinto.\n\nLa Coalición Civil respondió con rapidez, y una minoría de miembros de la ultraizquierda declaró en redes sociales que se trataba de una \"purificación completa\", presentando el evento como una victoria. Sin embargo, fuentes del Partido Democrático Constitucional admitieron: \"Perder el apoyo del PCJ y el PSD podría resultar en una caída significativa en los índices de aprobación de la coalición\".\n\nEste incidente ha puesto de manifiesto las profundas divisiones dentro de la Coalición Civil, dejando incierto su futuro electoral. El profesor de ciencias políticas de la Universidad de Tokio, Jiro Yamaguchi, comentó: \"Si la coalición no logra retomar un marco político centrista, inevitablemente colapsará\"."
 jap.64.a: "El futuro es incierto."
 jap.65.t: "Liberales de derecha abandonan la coalición"

 JAP_keiretsu_control_idea: "Control del keiretsu"
 JAP_keiretsu_control_idea_desc: "El principal motor industrial de Japón siempre han sido los poderosos conglomerados empresariales que dominaron la economía desde la Restauración Meiji. Conocidos históricamente como zaibatsu, hoy keiretsu, se han vuelto tan esenciales para el flujo de la economía japonesa que algunos incluso se han convertido en monopolios estatales, simplemente debido a su elevada cuota de mercado.\n\nEl poder de los keiretsu reside principalmente en que cada empresa miembro posee una participación en cada una de las empresas asociadas, y estas se centran en un banco central. De esta forma, todas las empresas de un keiretsu pueden protegerse mutuamente de los cambios del mercado y las adquisiciones de la dirección, lo que permite organizar proyectos a largo plazo a su antojo con poco o ningún riesgo. Los keiretsu han llegado a controlar en gran medida la mayor parte del monolítico sector manufacturero japonés, y a menos que el Gobierno intente cambiar el statu quo, es improbable que sea anulado."

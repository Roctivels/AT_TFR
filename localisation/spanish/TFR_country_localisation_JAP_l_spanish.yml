 JAP_peoples_diet_category: "Dieta Popular"
 JAP_peoples_diet_category_desc: "La Dieta Popular de Japón es un nuevo parlamento establecido en el II Congreso del £GFX_UDF_logo  §AFrente Democrático Unido§!, una nueva coalición de partidos de izquierda creada en respuesta al derrocamiento del Gobierno electo por las Fuerzas de Autodefensa. Su objetivo es garantizar la libertad y la igualdad de todos los ciudadanos japoneses y promover el desarrollo y el bienestar de la nación en su conjunto.[JAP_civil_war_peoples_diet][JAP_main_factions_peoples_diet][JAP_democrat_factions_peoples_diet]"
 JAP_civil_war_peoples_diet_yes: "Por el momento, la Dieta Popular está compuesta por exdiputados de la antigua Dieta Nacional. Las primeras elecciones se celebrarán tras el fin de la guerra civil."

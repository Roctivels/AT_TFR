 cartel_drugtrade_better: "Producción de droga mejorada"
 cartel_drugtrade_strong: "Producción de droga mejorada"
 NRT_SRN_gringos: "Gringos en nuestras filas"
 NRT_SRN_united_california: "Califas Unidas"
 nrtsrn.1.n.t: "Los Sureños piden la unificación"
 nrtsrn.1.n.d: "Nuestra banda rival, los Sureños, nos han pedido si nos queremos unir a ellos, diciendo que es mejor unirnos que pelearnos mientras tengamos otros problemas."
 nrtsrn.1.s.t: "Los Norteños piden la unificación"
 nrtsrn.1.s.d: "Nuestra banda rival, los Norteños, nos han pedido si nos queremos unir a ellos, diciendo que es mejor unirnos que pelearnos mientras tengamos otros problemas."
 nrtsrn.1.a: "Estamos de acuerdo."
 nrtsrn.1.a2: "Unánomos."
 nrtsrn.1.a3: "Solo si recibimos el liderazgo."
 nrtsrn.1.b: "Que se jodan."
 nrtsrn.2.t: "En cambio, ellos piden liderarnos"
 nrtsrn.2.d: "Nuestros rivales decidieron que sería mejor si ellos nos lideran. ¿Deberíamos estar de acuerdo?"
 nrtsrn.3.t: "Ellos están en desacuerdo"
 nrtsrn.3.d: "Ellos están en desacuerdo"
 nrtsrn.3.a: "bruh."
 nrtsrn.4.t: "Rebeldes Hispanoamericanos nos piden ayuda"
 nrtsrn.4.d: "Rebeldes Hispanoamericanos nos piden ayuda, ¿Deberíamos darles algunas de nuestras armas o no?"
 nrtsrn.4.a: "Ellos pueden tener algunas de las viejas."
 nrtsrn.4.b: "No."
 nrtsrn.5.t: "Están de acuerdo"
 nrtsrn.5.d: "¡México acepto en darnos algunas de sus armas viejas!"
 nrtsrn.5.a: "Genial."
 nrtsrn.6.t: "Cuestión de nuestro antiguo rival"
 nrtsrn.6.d: "Hemos derrotado a todas las facciones californianas y nuestros antiguos rivales empiezan a exigir algún tipo de autonomía o independencia. ¿Deberíamos acceder?"
 nrtsrn.6.a: "No."
 nrtsrn.6.b: "Podemos darles autonomía."
 nrtsrn.6.c: "Ellos merecen la independencia."
 CARTEL_we_need_a_reform: "Necesitamos una reforma"
 CARTEL_we_need_a_reform_desc: "Tenemos que ser más estables y asegurarnos de que podemos tener legitimidad como Estado soberano."
 CARTEL_free_at_last: "¡Libres al fin!"
 CARTEL_free_at_last_desc: "Nuestra organización luchó contra el gobierno durante años, pero ahora por fin nos hemos librado de su dominio y podemos desarrollar nuestra actividad libremente."
 CARTEL_autonomous_squads: "Escuadrones Autónomos"
 CARTEL_autonomous_squads_desc: "Podemos convertir nuestros ejércitos en escuadrones poco organizados que tengan más libertad"
 CARTEL_into_the_unknown: "Hacia lo desconocido"
 CARTEL_into_the_unknown_desc: "No importa si nos reformamos o no, nos espera el futuro."
 CARTEL_organised_armies: "Ejércitos organizados"
 CARTEL_organised_armies_desc: "Necesitamos un ejército bien organizado y bajo nuestro control."
 CARTEL_our_system: "Nuestro sistema"
 CARTEL_our_system_desc: "Aunque nuestro sistema era bueno para un Estado clandestino que luchaba contra un régimen opresor, ahora podemos cambiarlo."
 CARTEL_it_is_good_as_it_is: "Está bien como está"
 CARTEL_it_is_good_as_it_is_desc: "No es necesaria ninguna reforma: nuestro sistema está perfectamente preparado para luchar contra un opresor."
 CARTEL_our_economy: "Nuestra economía"
 CARTEL_our_economy_desc: "Una de nuestras mayores fuentes de ingresos era y es el tráfico de drogas. Sigue siendo rentable, pero puede que necesitemos encontrar otras fuentes de efectivo."
 CARTEL_take_over_businesses: "Adquisición de empresas"
 CARTEL_take_over_businesses_desc: "Hay muchos negocios en la zona que ocupamos, podemos hacernos con ellos y utilizarlos con fines lucrativos"
 CARTEL_put_our_lands_to_use: "Poner en valor nuestras tierras"
 CARTEL_put_our_lands_to_use_desc: "Tenemos unos terrenos que no se utilizan: podemos crear industria allí."
 CARTEL_improve_drug_trade: "Mejorar el narcotráfico"
 CARTEL_improve_drug_trade_desc: "Gracias a todas las fábricas y tierras que hemos ganado, podemos mejorar aún más nuestro comercio."
 CARTEL_repair_our_infrastructure: "Reparar nuestra infraestructura"
 CARTEL_repair_our_infrastructure_desc: "Estamos en guerra y nuestras infraestructuras resultan dañadas, tenemos que repararlas para que funcionen con eficacia."
 CARTEL_expand_our_cartel: "Expandir nuestro Cartel"
 CARTEL_expand_our_cartel_desc: "Si permitimos que más empresas se unan a nosotros, conseguiremos que nuestro gobierno sea más pacífico y obtendremos mayores beneficios."
 CARTEL_obtain_equipment: "Obtener equipo"
 CARTEL_obtain_equipment_desc: "Podemos utilizar nuestros activos para producir y comprar bienes de equipo con mucha más facilidad que antes."
 CARTEL_expand_even_further: "Ampliar aún más"
 CARTEL_expand_even_further_desc: "Debemos mejorar aún más la industria"
 CARTEL_as_efficient_as_possible: "Lo más eficaz posible"
 CARTEL_as_efficient_as_possible_desc: "Con nuestra nueva industria podemos producir medicamentos aún mejores"
 CARTEL_centralise: "Centralizar"
 CARTEL_centralise_desc: "Debemos centralizar para mantener el orden y controlar a nuestros súbditos"
 CARTEL_decentralise: "Descentralizar"
 CARTEL_decentralise_desc: "Tenemos que descentralizar para asegurarnos de que nadie tenga demasiado poder."
 CARTEL_preserve_hierarchies: "Conservar las jerarquías"
 CARTEL_preserve_hierarchies_desc: "Aunque nos ampliemos y cambiemos, debemos mantener nuestras jerarquías igual que antes."
 CARTEL_keep_armies_loyal: "Mantener leales a los ejércitos"
 CARTEL_keep_armies_loyal_desc: "Necesitamos mantener leales a nuestros ejércitos"
 CARTEL_finalise_our_reforms: "Finalizar nuestras reformas"
 CARTEL_finalise_our_reforms_desc: "Cuando acabemos con algunos asuntos menores, podremos dirigir nuestra atención a asegurar nuestro Estado."
 CARTEL_our_legacy: "Nuestro legado"
 CARTEL_our_legacy_desc: "Hemos fidelizado a nuestros súbditos y mantenido nuestro antiguo orden."
 NRT_SRN_against_other_factions: "Contra otras facciones"
 NRT_SRN_against_other_factions_desc: "Somos libres, pero no somos los únicos. Tenemos que derrotar a otras facciones y dominar el Estado."
 NRT_SRN_california_divided: "California Dividido"
 NRT_SRN_california_divided_desc: "California lleva mucho tiempo dividida entre norteños y sorenos. Quizá ha llegado el momento de unirse contra otros enemigos, ¿o de atacarlos?"
 NRT_SRN_fuck_it_one_stuggle: "Joder, una lucha"
 NRT_SRN_fuck_it_one_stuggle_desc: "Deberíamos aliarnos con nuestro antiguo rival - al menos por ahora."
 NRT_SRN_dont_give_up_on_our_rivalry: "No renuncies a nuestra rivalidad"
 NRT_SRN_dont_give_up_on_our_rivalry_desc: "No debemos renunciar a nuestra rivalidad."
 NRT_SRN_unite_norcal: "Unir NorCal"
 NRT_SRN_unite_norcal_desc: "Deberíamos tener todas las tierras del norte de California bajo nuestro control"
 NRT_SRN_seek_aid: "Buscar ayuda"
 NRT_SRN_seek_aid_desc: "Nosotros, solos, no somos suficientemente fuertes para derrotar al gobierno, y por esto necesitamos ayuda y aliados."
 NRT_SRN_reach_out_to_other_gangs: "Llegar a otras bandas"
 NRT_SRN_reach_out_to_other_gangs_desc: "Deberíamos cooperar con otras bandas de EE.UU."
 NRT_SRN_reach_out_to_mexico: "Llegar a la Patria"
 NRT_SRN_reach_out_to_mexico_desc: "Somos mexicanos católicos - tal vez nuestros amigos de las bandas del sur puedan ayudarnos."
 NRT_SRN_take_over_san_francisco: "Tomar San Francisco"
 NRT_SRN_take_over_san_francisco_desc: "Cisco es una de las ciudades más importantes de California, debemos conseguirlo lo antes posible"
 NRT_SRN_take_over_los_angeles: "Tomar Los Ángeles"
 NRT_SRN_take_over_los_angeles_desc: "Los Ángeles es la ciudad más grande de SoCal, deberíamos conseguirlo."
 NRT_SRN_take_over_sacramento: "Tomar Sacramento"
 NRT_SRN_take_over_sacramento_desc: "La capital de California es esencial para nuestra legitimidad, deberíamos tomarla."
 NRT_SRN_unite_central_cali: "Unir Cali Central"
 NRT_SRN_unite_central_cali_desc: "Deberíamos tener todas las tierras de California Central bajo nuestro control"
 NRT_SRN_unite_socal: "Unite SoCal"
 NRT_SRN_unite_socal_desc: "Deberíamos tomar el sur de California y tenerlo bajo nuestro control."
 NRT_SRN_question_of_our_former_rival: "Cuestión de nuestro antiguo rival"
 NRT_SRN_question_of_our_former_rival_desc: "La alianza de Surenos y Nortenos se ha apoderado de toda California. ¿Debemos conservarla o tal vez destruir a nuestro rival?"
 NRT_SRN_a_second_chance_for_our_rival: "Una segunda oportunidad para nuestro rival"
 NRT_SRN_a_second_chance_for_our_rival_desc: "Con toda California bajo nuestro control, quizá deberíamos dar una segunda oportunidad a nuestro antiguo rival: tenemos mucho en común y su ayuda sería beneficiosa."
 NRT_SRN_help_from_gringos: "Ayuda de los Gringos"
 NRT_SRN_help_from_gringos_desc: "Nuestra banda es mexicana - pero gringos amigables nos podrían ayudar."
 NRT_SRN_califas_unidas: "Califas Unidas"
 NRT_SRN_califas_unidas_desc: "¡Hemos unido a toda California! ¿Y ahora qué?"
 NRT_SRN_buy_arms_and_equipment: "Comprar armas y equipo"
 NRT_SRN_buy_arms_and_equipment_desc: "Deberíamos comprar armas y equipo para poder luchar mejor"
 LRA_mexican_businesses: "Aliarse con otros latinos"
 LRA_mexican_businesses_desc: "Deberíamos aliarnos con otros latinos que tengan negocios"
 LRA_take_land: "Tomar tierras de los Gringos"
 LRA_take_land_desc: "Deberíamos tomar tierras gringas"
 LRA_pp_idk: "Reasignar tierras a los latinos"
 LRA_pp_idk_desc: "Necesitamos dar las tierras que les quitamos a los gringos a otros latinos"
 LRA_stabilise: "Estabilizar"
 LRA_stabilise_desc: "Necesitamos ser más estables para sobrevivir a la guerra"
 LRA_take_land_2: "Apodérate aún más de la tierra Gringa"
 LRA_take_land_2_desc: "Esto nos permitirá ser más estables"
l_spanish:
 clm.1.t: "Grupo sin identificar en las colinas"
 clm.1.d: "."
 clm.1.a: "¿Al menos están matando a los comunistas?"
 clm.3.t: "Revuelta de las milicias californianas"
 clm.3.d: "Con la lucha contra la insurgencia comunista en California haciendo estragos, las hostilidades entre los antiguos aliados de la Milicia del Estado de California, que tiene el control operativo de facto sobre el norte de California, y el Gobierno del Estado de California, que tiene el control operativo en el sur de California, se han convertido en un conflicto total.\n\nAl comienzo de la Guerra Civil, se formó una incómoda alianza entre la milicia, alineada con Trump, y el Gobierno estatal, alineado con Biden, para combatir lo que se considera un grupo terrorista comunista que se extiende desde Santa Rosa hasta Santa Bárbara. Sin embargo, a medida que la insurgencia se ha ido extendiendo hacia el este, han aparecido grietas en la alianza, ya que los conflictos por la munición, la distribución de alimentos y la cadena de mando han aumentado las hostilidades entre las 2 facciones. Las tensiones llegaron a un punto de ruptura cuando un disparo erróneo de artillería por parte del Gobierno estatal causó la muerte de 4 milicianos.\n\nMientras que la milicia ha prometido \"restaurar el orden en California por todos los medios necesarios\", el Gobierno estatal ha prometido \"continuar la lucha contra todos los traidores, ya sean de ultraizquierda, ultraderecha o cualquier cosa intermedia\"."
 clm.3.a: "América se desangra."
 CLM_special_forces_tt: "Crea §G1§! brigada de fuerzas especiales en §YSacramento§!"
 CLM_activate_police: "La §YPolicia de Sacramento§! se movilizará para §Ydesempeñar§! funciones de combate activas."
 CLM_absorb_militias: "§G2 brigadas milicianas§! se unirá a nuestras filas."
 ethiopia.1.t: "Las conversaciones por la presa del Renacimiento fracasan"
 ethiopia.1.d: "El diálogo con los diplomáticos Egipcios acerca de la continuación de la construcción de la Presa del Renacimiento ha fracasado otra vez. Nuestras dos naciones aún no se han puesto de acuerdo en un compromiso simple, por lo que seguiremos adelante con la construcción planificada de la presa. Si las condiciones son las adecuadas, esperamos inaugurarla más adelante en este año o en el siguiente. ¡Esta presa nos garantizará un gran aprovechamiento y poder en la Región!"
 ethiopia.1.a: "Que así sea."
 ethiopia.2.t: "Se completa la construcción de la Presa del Renacimiento"
 ethiopia.2.d: "El proyecto se adelantó con creces y finalmente se inauguró. El primer ministro Abiy Ahmed Ali apareció en televisión nacional y felicitó a los ingenieros y trabajadores que construyeron la presa."
 ethiopia.2.a: "¡Un gran día para Etiopía!"
 ethiopia.3.t: "Segunda conferencia sobre la Presa del Renacimiento"
 ethiopia.3.d: "Los egipcios han llamado a una segunda conferencia para, con suerte, llegar a un acuerdo sobre la construcción de la presa. Esperamos que nuestras naciones puedan llegar a un acuerdo."
 ethiopia.3.a: "Quizás la presa no es necesaria..."
 ethiopia.3.b: "¿Por qué deberíamos parar?"
 ethiopia.16.t: "Hassan Sheikh Mohamud ha sido elegido como próximo presidente de Somalia"

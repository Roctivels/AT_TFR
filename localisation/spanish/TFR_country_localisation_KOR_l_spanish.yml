 KOR_flying_to_the_moon: "Volando Hasta la Luna"
 KOR_flying_to_the_moon_desc: "Personalmente, me asocio a mi mismo con la Luna. Oscura y misteriosa."
 KOR_my_brother_kim_jong_un: "My HERMANO Kim Jong-un"
 KOR_my_brother_kim_jong_un_desc: "Estoy escribiendo una carta para mi QUERIDO HERMANO Kim Jong-Un. Veremos si el acepta ayudar con la reunificación de Corea"
 KOR_defend_our_country: "¡¡¡Protejan NUESTRO PAÍS!!!"
 KOR_defend_our_country_desc: "¡¡¡PROTEJAN NUESTRO PAÍS A TODA COSTA!!! ¡¡¡LOS NORCOREANOS NOS TRAICIONARON A NOSOTROS Y A NUESTRO ARDUO TRABAJO!!! ¡¡¡LUCHEMOS HASTA LA MUERTE Y NINGÚN PASO ATRÁS!!!"
 KOR_just_buy_the_oil: "¿¿¿Solo Compra El Petróleo???"
 KOR_just_buy_the_oil_desc: "Ehhhh, Chicos. Digo, ¿Porqué les importa la crisis del petróleo? Solo cómpralo."
 KOR_juche_in_my_mind: "Juche en Mi Mente..."
 KOR_juche_in_my_mind_desc: "No importa cuánto lo intente, las ideas del juche no pueden salir de mi mente. Tal vez podríamos integrar algunas partes en nuestras vidas surcoreanas."
 KOR_second_attempt: "Segundo Intento"
 KOR_second_attempt_desc: "Lo intenté mucho, y fui muy lejos... Pero al final, ¿Eso Importa?"
 KOR_eternal_brotherhood: "¡¡¡Hermandad Eterna!!!"
 KOR_eternal_brotherhood_desc: "¡¡¡PROTEJAN A NUESTROS HERMANOS A TODA COSTA!!! ¡¡¡LOS NORCOREANOS SON NUESTROS HERMANOS!! ¡¡¡PELEEMOS POR ELLOS Y PROTEJÁMOSLOS DEL MAL!!!"
 KOR_cultural_exchange: "Intercambio Cultural"
 KOR_cultural_exchange_desc: "Ahora que nuestras relaciones están cambiando para bien, podemos empezar un programa de intercambio cultural para nuestros ciudadanos. ¡Tal vez entendamos los valores de cada uno mejor!"
 KOR_shining_example_of_great_economy: "Ejemplo Brillante De Una Buena Economía"
 KOR_shining_example_of_great_economy_desc: "Nuestra economía es genial. ¡Hasta increíble! ¿Has escuchado del Milagro en el Río Han? ¡Somos nosotros! El tigre de Asia. LOS MÁS PODEROSOS PRODUCTORES EN EL MUNDO. ¡LA CIENCIA COREANA ES LA MEJOR EN EL MUNDO!\n\nEste mensaje fue patrocinado por Samsung Electronics y el mismo John Lee-Samsung."
 KOR_economy_in_ruins: "Economía en Ruinas"
 KOR_economy_in_ruins_desc: "Ehhhh. Tal vez tengamos algunos problemas en la economía después de todo. ¡¡¡Pero siempre podemos arreglar eso!!! Será fácil, lo prometo... Solo vende más tostadoras."
 KOR_mass_oil_production: "Producción Masificada de Petróleo"
 KOR_mass_oil_production_desc: "¿Porqué comprar petróleo? El glorioso Kim Il Sung nos enseñó lo básico de la Autarquía. ¡¡¡Nosotros solos produciremos el petróleo!!!"
 KOR_print_the_money: "Imprimir El Dinero"
 KOR_print_the_money_desc: "Chicos, he encontrado un nuevo lifehack! Nosotros solo... ¡¡¡Imprimiremos dinero!!! Nada malo va a pasar, ¡Lo ruego!"
 KOR_five_billion_won_to_taiwan: "¡¡¡5 Mil Millones Ganados A Taiwán!!!"
 KOR_five_billion_won_to_taiwan_desc: "Taiwán, ¡¡¡Esa hermosa provincia China debe ser protegida a toda costa!!! En nuestro intento de mejorar nuestras relaciones con la República Popular China, ¡Nosotros invertiremos en una de sus regiones más exitosas!"
 KOR_reconcile_with_japan: "Reconciliarse Con Japón"
 KOR_reconcile_with_japan_desc: "Tu sabes, tal vez los Japoneses no son TAAAN malos. ¡Tal vez podríamos olvidar nuestros viejos rencores y movernos al brillante futuro! ¡¡¡Juntos!!! Suena bien..."
 KOR_boycott_japan: "Boicotear Japón"
 KOR_boycott_japan_desc: "Nuestros queridos compañeros Japoneses se atrevieron a traicionarnos de nuevo.\n¡Suficiente! Nosotros boicotearemos Japón y sus empresas. No más comida japonesa, no más kimonos, no más karate, no más anime y no más Hondas!"
 KOR_japanese_jjokbari: "Jjokbari Japonés"
 KOR_japanese_jjokbari_desc: "Buenos zapatos, por cierto. Se ven bien."
 KOR_taking_a_small_loan: "Tomando Un Pequeño Préstamo"
 KOR_taking_a_small_loan_desc: "Chicos. Es solo un pequeño préstamo, ¡Lo Juro! Nosotros siempre podemos pagarlo después. ¡Como Japón!"
 KOR_investments_i_cant_believe_it: "¿¿¿Inversiones??? ¡¡¡No lo puedo Creer!!!"
 KOR_investments_i_cant_believe_it_desc: "¡DIOS MÍO! ¿¿¿INVERSIONES??? ¿¿¿EN COREA??? ¿¿¿DE JAPÓN??? SIEMPRE CREÍMOS QUE USTEDES ERAN NUESTROS ETERNOS AMIGOS CERCANOS, ¡¡¡SI PORFAVOR!!!"
 KOR_build_the_japanese_highfleet: "Construir La Flota Japonesa"
 KOR_build_the_japanese_highfleet_desc: "Necesitamos pagar las inversiones que nuestros amigos nos dieron. Un pequeño monto de buques es un pequeño precio a pagar por muchos vagones de yenes."
 KOR_did_we_forget_someone: "¿¿¿Nos Olvidamos de Algo???"
 KOR_did_we_forget_someone_desc: "Cada vez que tu firmas contratos con grandes firmas Japonesas necesitas preguntarte: \"¿Me olvidé de preguntarle a alguien?\""
 KOR_mooning_as_usual: "Luneando Como Siempre..."
 KOR_mooning_as_usual_desc: "Luneando en la calle, bro. Somos el mejor país en el mundo. ¡¡¡Estoy seguro de que todo irá de acuerdo a nuestro magnífico plan!!!"
 KOR_chaebols_in_control: "Chaebols en Control"
 KOR_chaebols_in_control_desc: "LOS CHAEBOLS TOMARON PODER EN NUESTRO PAÍS. ES JUSTO COMO MI LIBRO FAVORITO ¡¡¡\"PALABRAS SELECTAS DE KIM IL SUNG\"!!!"
 KOR_korean_agony: "Agonía Coreana"
 KOR_korean_agony_desc: "Justo como el día y la noche, Corea del Sur y Corea del Norte han peleado entre ellos por lo que parece una eternidad. Es hora de detener esta absurda lucha interna. Nuestro sabio líder tiene un plan para comprar Corea del Norte y reunificar el país"
 KOR_seize_the_property: "Apoderarse de la Propiedad"
 KOR_seize_the_property_desc: "Somos el gobierno ahora, ¿Verdad?\n Podríamos solo... ¿¿¿Tomar todo para nosotros???"
 KOR_contacts_in_yakuza: "Contactos en la Yakuza"
 KOR_contacts_in_yakuza_desc: "Como parte de mejorar las relaciones Corea-Japón, nuestros compañeros nos dejaron el número de sus mejores agentes de la Yakuza. Gracias a ellos, podemos establecer nuestro propio orden de la mafia en las calles de nuestro país."
 KOR_thats_how_mafia_works: "Así Es Como la Mafia Funciona"
 KOR_thats_how_mafia_works_desc: "Para hacer más fácil manejar nuestros dominios, dividiremos el territorio de Corea por los cuatro Chaebols más grandes. Esto permitirá a nuestro país alcanzar la eficiencia subir la eficiencia a alturas nunca antes vistas.\n Yo pienso que este es un paso lógico. Es que recientemente las dos Coreas se han convertido en una, y nos hemos aburrido.\n \n ¡AHORA HABRÁ CUATRO COREAS!"
 KOR_cyberpunk_paradise: "Paraíso Cyberpunk"
 KOR_cyberpunk_paradise_desc: "- ¿Construirás una nueva, próspera y gloriosa Corea?\n- ¡Si, Por Supuesto! \n*Construye Un Estado Mafioso Como Un Chad*"
 KOR_open_the_lobotomy_corp: "Abrir La Corporación Lobotomía"
 KOR_open_the_lobotomy_corp_desc: "Nuestros Chaebols han dado solo prosperidad y civilización a cada pedazo de nuestra tierra. ¡Es tiempo de financiar start-ups prometedoras que nos ayudarán en propulsar innovaciones en el futuro!"
 KOR_galaxy_of_phones: "Galaxia de Celulares"
 KOR_galaxy_of_phones_desc: "Tostadora, Lavadora, Celular, Microondas, TV. Todo lo que tienes fue producido por los EE.UU. Todo lo que tienes tiene un logo de un Chaebol Coreano en el. ¿Porqué el mundo cambiaría algo? Para alcanzar grandes alturas, ¡La gente debe consumir más! \n \nY por cierto. Nuestros Celulares nunca explotaron, no como los de nuestros vecinos."
 KOR_healthcare_subscription_trial: "Prueba Gratis de Servicios Médicos"
 KOR_healthcare_subscription_trial_desc: "¡Los amables y generosos gobernantes de Corea están pensando en hacer concesiones a la gran gente Coreana! ¡Estamos cambiando el sistema de salud y dándole a cada Coreano la chance para probar estos cambios! ¡Libre de cargos! ¡Por un mes! ¡Los mejores hospitales y medicinas para todos están ahora mismo en tu suscripción Samsung+!"
 KOR_unleashing_the_ego: "Soltar El Ego"
 KOR_unleashing_the_ego_desc: "Algo nos dice que nuestro ejército tal vez no sea capaz de igualar al de nuestros vecinos. ¿Cuál es la Solución? Dejar de intentar de superarlos en algo en donde tengan ventaja. \n ¡CREAREMOS NUEVAS CAPACIDADES DE PELEAR GUERRAS! Nuestro programa de crear armas nunca antes vistas y equipar nuestros más dotados guerreros con ellas lo más pronto posible, y nos permitirá tomar la victoria de las manos de nuestros enemigos."
 KOR_apr_building_la_mancha_land: "Construyendo La ManchaLand"
 KOR_apr_building_la_mancha_land_desc: "Es tiempo para los ciudadanos ordinarios de tomar un descanso de preocupaciones y preocupaciones. ¡Todos necesitamos soñar! ¡Y con estos nuevos complejos de entretenimiento por toda Corea, ayudaremos a la gente a relajarse y empezar a disfrutar la vida!"
 KOR_referal_family_program: "Programa Familiar de Referidos"
 KOR_referal_family_program_desc: "Me estás preguntando como resolver el problema de fertilidad? Simple. Estamos lanzando un nuevo programa de referidos. Por cada persona invitada y contratada por los Chaebols, ¡Tú recibirás el 10% de su sueldo! \n ¿Tienes esposa? ¿Quizás muchos hijos? ¡Puedes tener una gran ganancia de referidos por su trabajo! Mientras más temprano, y más cantidad, ¡Mejores son tus ganancias!"
 KOR_is_that_the_red_gaze: "¿ES ESA LA MIRADA ROJA?"
 KOR_is_that_the_red_gaze_desc: "Es esa la Mirada Roja? \n \n  Espera, Ni yo sé que es eso. \n De todas formas... \n \n ¿¿¿¿¿¿ES ESA LA MIRADA ROJA??????"
 KOR_korea_must_survive: "Corea Debe Sobrevivir"
 KOR_korea_must_survive_desc: "\"Vagamos por un mundo quieto y helado. Sin horizonte a la vista. Los gobernantes de antaño, despojados de su orgullo y gloria. Parece que fue ayer cuando hacíamos girar las ruedas del progreso, hasta que la crisis lo detuvo todo. De repente. Sin advertencia. Cuando las mareas cambiaron, cambiaron para todos, sin importar riqueza o clase. Perdimos nuestro mundo a causa del petróleo, y con él, nuestros últimos rastros de humanidad. Nos despedimos de la abundancia, y para quienes quedamos, llegó el momento de adaptarse. Decidimos dejar nuestros hogares y dirigirnos al norte. Vagamos durante semanas, quizás meses, dejando atrás todo aquello que una vez creímos que nos definía. Fue la esperanza la que nos empujó hacia adelante. Lentamente. Paso a paso. Sabíamos el precio de nuestro viaje, y lo hemos pagado - cien veces. Finalmente, ha llegado el momento de construir la última ciudad sobre la Tierra\"."
 KOR_import_japanese_fumos: "Importar Fumos Japoneses"
 KOR_import_japanese_fumos_desc: "¡Nueva iniciativa de gobierno! ¡Tú tendrás tu peluche Sancho Fumo con un 50% de descuento si tu lo reservas AHORA MISMO! ¡Gloria a la amistad Corea-Japón! \n Cooooooooooooooooooool."
 KOR_hike_prices_of_dishwashers: "Aumentar los precios de los Lavavajillas"
 KOR_hike_prices_of_dishwashers_desc: "Nuestra Econonomía"
 KOR_infinite_wealth: "Riqueza Infinita"
 KOR_infinite_wealth_desc: "Nuestras reformas económicas de: \"Producir más y subir los precios\" - han dado excelentes resultados. Ahora, se ve como que si tuviéramos trucos por... Riqueza infinita."
 KOR_honuda_accordu_production: "Producción de HONDA ACCORD"
 KOR_honuda_accordu_production_desc: "HONDA ACCORD! HONDA ACCORD! HONDA ACCORD! HONDA ACCORD! HONDA ACCORD! HONDA ACCORD! HONDA ACCORD! HONDA ACCORD!"
 KOR_eater_of_gods: "Comedor de Dioses"
 KOR_eater_of_gods_desc: "¡Permitiéndole a China de tomar nuestros cielos sería una total CALAMIDAD! Nosotros vamos a tomar todas las medidas posibles para poner nuestro programa secreto lo más rápido posible. Nuestro \"Devorador de Dioses\". \n \n Y recuerda, si nuestro universo colapsa... ¡UN DIOS NO LE TIENE MIEDO A LA MUERTE!"
 KOR_call_the_red_mist: "En la Niebla Roja"
 KOR_call_the_red_mist_desc: "Que se sepa... Todos nuestros enemigos... ¡Deberían ser convertidos en una fina niebla roja!"
 KOR_galaxy_armour: "Blindaje Galaxy™"
 KOR_galaxy_armour_desc: "¡Resulta que nuestros celulares son perfectos para salvar las vidas de nuestros consumidores! \n No, obviamente no obtuvimos esta información como resultado de un aumento de tiroteos de la Mafia en las calles. \n \n De todas formas, ¡Crearemos multifuncionales y modernos exoesqueletos de alta tecnología hechos de Celulares Samsung, y insertar un celular dentro de un celular asi que puedes mirar a otro celular mientras miras tu celular!"
 KOR_samsung_armada: "Ejército Samsung"
 KOR_samsung_armada_desc: "¡Nuestros Samsuntanques están listos para la batalla! Toda la tecnología moderna, desde exoesqueletos hasta armas que brindan el EGO humano hasta la vida están a nuestra disposición... VAMOS A GANAR. \n DEJEMOS LA ENEMIGO ESCUCHAR EL RUGIDO DE SAMSUNG. ¡DEJEMOS QUE ESO SEA LA ÚLTIMA COSA QUE ESCUCHEN!"
 KOR_mass_distortion: "Distorción Masiva"
 KOR_mass_distortion_desc: "¿Tienes problemas? ¿Sientes los pecados en tu espalda? ¿Estás preocupado? \n \n DISTORSIÓN \n \n \n Esta no es una recomendación de tratamiento individual \n \n \n DISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓN"
 KOR_gwanlija_nari: "GWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!!"
 KOR_gwanlija_nari_desc: "GWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!\nGWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!! GWANLIJA NARI!!!!!"
 korea_aprilfools25.1.t: "Luneando: El Suceso"
 korea_aprilfools25.1.d: "Me encanta realmente ser un presidente de mi amada Corea. ¡Nuestra economía está creciendo y estoy seguro de que nada puede salir mal!"
 korea_aprilfools25.1.a: "Cheboru Bitiesu."
 korea_aprilfools25.2.t: "Juche, juche in my mind..."
 korea_aprilfools25.2.d: "Pack my nine millimeter 'cause I ain't finna go out\nLike a busta ass juche and just lay down\nI'ma run up on a juche, shoot my nine with the fifteen rounds\nGot Lil Kim on cloud nine\nJuche, juche in my mind."
 korea_aprilfools25.2.a: "Juche, juche in my mind..."
 korea_aprilfools25.3.t: "La Segunda Es La Vencida"
 korea_aprilfools25.3.d: "Tras mucho pensarlo y dialogar, Kim Jong-un se disculpó con el pueblo surcoreano y accedió a iniciar nuevas conversaciones de paz. Este parece ser el comienzo de una gran amistad."
 korea_aprilfools25.3.a: "Aquí Vamos."
 korea_aprilfools25.4.t: "Ha llegado el momento"
 korea_aprilfools25.4.d: " - Kim, ¿quizás deberíamos detener esto de una vez por todas? ¿Quizás deberíamos simplemente unirnos? Al fin y al cabo, todos somos coreanos. \n  - De verdad lo creo, hermano Moon. Estoy totalmente de acuerdo. Nada puede detenernos. Lo único que puede detener esta reunión es la escasez de dinero..."
 korea_aprilfools25.4.a: "Tienes razón, Kim. Deberíamos pensar sobre eso."
 korea_aprilfools25.5.t: "El Verdadero Ganador"
 korea_aprilfools25.5.d: "- ¿CÓMO? Cómo juegas mejor que nosotros? Jugamos League durante décadas, ¡desde jóvenes! ¡Es simplemente imposible que alguien que ve una computadora en su vida sea TAAAAN bueno! \n- ¿Por la primera vez en mi vida? ¿Bro, te das cuenta que tenemos computadoras, verdad? Yo literalmente tengo una en mi casa, tiene procesador Juchentium Core 9, una tarjeta gráfica Juchvidia 9090 RTX, 128GB de JuchRam DDRJuche y todo eso. Tus débiles computadoras realmente no me impresionan. Justamente como tu habilidad en los juegos. \n- ¿QUÉ? ¿PCS? ¿Tienen eso en Corea del Norte? \n- Claro que sí, idiotas, solo pretendemos que no. O sino ustedes van a migrar en masas a la civilización. No estamos preparados para tener tantos refugiados."
 korea_aprilfools25.5.a: "Qué..."
 korea_aprilfools25.6.t: "¡Todo es Increíble!"
 korea_aprilfools25.6.d: "Hola, somos reporteros de Moon TV. ¿Podrían contarnos su opinión sobre la economía coreana? ¿Vives en prosperidad? ¿Puedes permitirte comprar lo que quieres? \n Si quisieras, ¿te irías de vacaciones al extranjero?"
 korea_aprilfools25.6.a: "Nah, Voy a Trabajar."
 korea_aprilfools25.7.t: "Nuestra economía... ¿¿¿Está muerta???"
 korea_aprilfools25.7.d: "0 Días Quedan, Samsungbros... Se Acabó. En treinta años Samsung estará muerto..."
 korea_aprilfools25.7.a: "¡JENJAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAANG!"
 korea_aprilfools25.8.t: "¡Intentemos!"
 korea_aprilfools25.8.d: "¡Queridos Japoneses! El presidente de Corea del Sur les está escribiendo. Nosotros estamos al tanto los problemas entre nosotros, ¡y nos gustarías extenderlos un poco de paz y armonía! ¡¡¡Empecemos a crear un nuevo y hermoso mundo!!! \n ---------------------------------- \n¡Queridos Coreanos! ¡Yo, el CEO DE JAPÓN, los odio a todos! ¡Pronto vendré en mi Portaaviones Misado y los bombardearé a todos! Su estúpida música que nos llega a traves del mar, sus estúpidos juegos que corroen los cerebros de nuestros samurai, y sus teléfonos aburridos que cuestan muchísimo. ¡¡¡Y SU ESTÚPIDO CARSU!!! ¡TODO SERÁ DESTRUIDO! ¡ADIÓS! ¡JAJAJAJA! ¡TOYOTA VA A GOBERNAR TODO EL MUNDO!"
 korea_aprilfools25.8.a: "Intentemos... Lo peor que pueden decir es no..."
 korea_aprilfools25.9.t: "¿Porqué, Mr Moon? ¿PORQUÉ?"
 korea_aprilfools25.9.d: "Señor Moon, ¿por qué no nos avisó del nuevo acuerdo? ¡Nos... VAMOS A LA QUIEBRA! \n Justo ayer gasté mil millones de wones en los mejores abogados de Corea, ¡y nos dimos cuenta de que sus insensatas acciones permitieron que los japoneses lo engañaran! SI NOS CONSULTARA, GANARÍAMOS UN MILLÓN DE WONES MÁS POR ESTE CONTRATO, ¿ENTIENDE?"
 korea_aprilfools25.9.a: "Ya no aguanto más esto... Construiré mi propia Corea..."
 korea_aprilfools25.10.t: "Hablando desde mi corazón..."
 korea_aprilfools25.10.d: "MI QUERIDO HERMANO Kim Jong-un, yo, Moon Jae-in, te escribo esta carta con la esperanza de comprender y reconsiderar profundamente nuestra relación. La reconciliación del gran pueblo coreano es simplemente necesaria ante el evidente peligro que nos rodea. Te invito a reunirte y conversar sobre los detalles en persona. \n Con cariño, Moon. \n ---------------------------------- \n No, lol, get retkt nub."
 korea_aprilfools25.10.a: "Joder..."
 korea_aprilfools25.11.t: "Requiem Luneando"
 korea_aprilfools25.11.d: "Gracias a TÍ por jugar esta Totalmente exacta demo del contenido de Corea del Sur \n Para ser honesto, es una broma, pero no lo es. ¿O sí lo es? ¿O no? \n Los amo a todos. \n \n ¡El segundo Milagro del Río Han seguramente vendrá a Corea!"
 korea_aprilfools25.11.a: "¡Graciaaaaaaaaaaaaaaaaaaas! ¡¡¡¡¡¡¡Gamsaaaaaaa!!!!!!!"
 korea_aprilfools25.12.t: "DONDE ESTÁ LA PLATA, ¿¿¿MOON???"
 korea_aprilfools25.12.d: "¿MOON, DONDE ESTÁ LA PLATA? ¡ESTAMOS EN UNA MUUUUY GRANDE CRISIS Y NECESITAMOS LA PLATA! \n \n¿Porqué te dendria que dar dinero Coreano? Vive en lo tuyo. \n \nMOON, SAMSUNG ES EL 50% DEL PIB DE COREA. ES MI DINERO, ¿¿LO SABES?? \n \nBueno, si quieres controlar el dinero de Corea. ¿PORQUE NO MANEJAS EL PAÍS POR MÍ? ¿AH? \n \n¡SIN PROBLEMAS, VOY A RESOLVER TODOS LOS PROBLEMAS DE COREA EN UN AÑO! \n \nASÍ ES, BUENO, VAMOS A VER, DALE UN INTENTO, ESTOY ESPERANDO."
 korea_aprilfools25.12.a: "La Mafia Avanza."
 korea_aprilfools25.13.t: "Paraíso Chaebol"
 korea_aprilfools25.13.d: "- SEÑOR JOHN LEE-SAMSUNG. NUESTRO PAÍS SE ESTÁ CAYENDO A PEDAZOS. TENEMOS QUE HACER ALGO. POR FAVOR. ¡DÍGANOS QUÉ DEBEMOS HACER AHORA! \n \n - Por favor, tenga paciencia, amigo. Ya tengo el plan.\n \n- ¿Y CUÁL ES EL PLAN, SEÑOR SAMSUNG?"
 korea_aprilfools25.13.a: "Necesitamos llamar una Compañía... Limbus Company..."
 korea_aprilfools25.14.t: "Es eso...."
 korea_aprilfools25.14.d: "No, ¡No puede ser! ¿¿¿¿Es Don Quixote del juego hit Coreano \"Project Moon\"???? Kuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuul."
 korea_aprilfools25.14.a: "No te preocupes, Director Esquire, Porque eres bendecido."
 korea_aprilfools25.15.t: "Hola, ¿¿¿Hola???"
 korea_aprilfools25.15.d: "Hola, es Kim? Este es John Lee-Samsung llamando. Me gustaría hacerte un pequeño trato. Me gustaría comprar Corea del N... \n \n Estoy dentro. \n \n ¿Qué? \n \n Estoy diciendo que estoy dentro. \n \n ¿Así y ya esta? \n \n Honestamente, estoy harto de vivir así. Le he dicho a Moon cientos de veces que solo tiene que ofrecerme dinero, ¡y nada más! Es una pena que nunca lo haya entendido. \n Estoy esperando la transferencia a mi tarjeta Samsung Bank y, mientras tanto, prepararé un lugar para la nueva oficina de Samsung en Pionyang."
 korea_aprilfools25.15.a: "Wow. ¿¿¿Gloria al Juche???"
 korea_aprilfools25.16.t: "Teme Al Futuro. Saca tu EGO."
 korea_aprilfools25.16.d: "¿Cuánto tiempo tengo que hacer esto? Llevo 10 horas seguidas disparando este rifle y no ha cambiado nada. ¿Qué se supone que hace? ¿Disparar láseres transcontinentales? Tu metodología es una porquería. \n \n Bien, probemos con otro método. ¿Seguro que cambiaste el rifle de automático a monotiro? \n \n No me acuerdo. Dejame ver... \n *Disparo* \n \n -AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA \n \n \n ----------------------------- \n Sinner impacta la ciudad de Busan, República de Samsung, desde la costa durante 12 segundos. \n Inmediatamente después de la aparición: Activación de habilidad \n Habilidad de disparar diferentes rayos de luz que disparan a través de algún obstáculo están confirmados. \n \n La segunda trompeta está activada \n \n Esperando al escenario recargarse."
 korea_aprilfools25.16.a: "Sam, por favor prende \"Una hora de música electrónica Ricardo\" sin parar."
 korea_aprilfools25.17.t: "¿Cuatro Coreas son mejores que dos?"
 korea_aprilfools25.17.d: "Bueno chicos, sus ideas son real puta mierda. Yo digo que dividamos Corea en 4 partes, como una tarta. \n \nSi hombre, ¿que pasa si mi capitalización es mejor que la tuya? \n \n¿Y qué? La capitalización no es importante si no has desarrollado tecnología desde 1997. \n \n¡SHH! Tengo una idea chicos. Yo, John Lee Samsung, propongo... Que dividamos corea entre muchos distritos. Y los distribuyamos igualmente en términos de valor. \n \nEspera un minuto, john. ¿Ese no es la misma estructura que antes? Regiones, ciudades, todo seguira como era antes... \n \nNo, no lo entiendes, es diferente, son... Distritos."
 korea_aprilfools25.17.a: "Y Esta Es Una Total Victoria Mafiosa."
 korea_aprilfools25.18.t: "Llamada del presidente"
 korea_aprilfools25.18.d: "HOLA, ESTE ES EL PRESIDENTE DE JAPÓN. HAS SOLICITADO AYUDA Y AQUÍ LA TIENES. TRISTEMENTE, NUESTRO MEJOR AGENTE DE HONDA, KIRYU DAMEDAME, ESTÁ OCUPADO. LE DOY EL NÚMERO DE TELÉFONO DE GORO MAJIMA, NUESTRO SEGUNDO MEJOR CONCESIONARIO. \nNO, EL NO TE VA A MATAR, ¿PORQUE PREGUNTAS? NO, EL ES COMPLETAMENTE CUERDO. ES EL HOMBRE MÁS CUERDO QUE PISÓ EN TU TIERRA SAMSUNG. \nNECESITO CONTINUAR MI TRABAJO EN LA MÁQUINA DEL TIEMPO, ¡BYE! \n¡Ánimo, hermano!"
 korea_aprilfools25.18.a: "Muchas Gracias, Presidente de Japón."
 korea_aprilfools25.19.t: "¿¿¿Tú Cybersabías???"
 korea_aprilfools25.19.d: "¿SABÍAS QUE COREA ES CYBERPUNK? TIENE CYBERPERSONAS, CYBERMÁQUINAS Y CYBERAIRE CON CYBERCORPORACIONES. SOMOS TAN CYBERPUNK. COOOOOOOOOOOOL. \n Me sirvo mi cyberté en un cybervaso y lo bebo para disfrutar de mi cybernoche. ¡Qué bien se vive en mi cyberpaís cyberpunk, cybercoreano, de CyberSamsung! \n"
 korea_aprilfools25.19.a: "CyberWoooooooow."
 korea_aprilfools25.20.t: "Lobotomía... ¿¿¿Qué???"
 korea_aprilfools25.20.d: "¿Qué dices? \n¿Vas a resolver nuestros problemas de energía? ¿Vas a resolver el desempleo? ¿Tu empresa no ha recibido ni una sola queja? ¿Acaso tu garantía de estar aquí es de diez mil años? \n¡Qué hermosa jovencita que veo por primera vez en mi vida! ¡Claro que te daremos una licencia e inversión para construir tu corporación con un nombre genial! \n¡Sin condiciones! ¡Y sin inspecciones! Así es como hacemos negocios en nuestro gran país, Samsung."
 korea_aprilfools25.20.a: "Ok."
 korea_aprilfools25.21.t: "QUERIDO PRESIDENTE DE JAPÓN"
 korea_aprilfools25.21.d: "QUERIDO PRESIDENTE DE JAPÓN. \nEntendemos la tragedia que pasó en su país. Nosotros siempre supimos que los Chinos podían explotar. Jackie Chan nos advirtió sobre eso. Para prevenir esa tragedia de pasar de nuevo, les recomendamos que solo compren celulares Samsung. Creo que algún dia, nuestra amistad crecerá en algo más. Una nación donde todos son felices, una nación gobernada por Honda y Samsung. \n¡MUERTE A TOYOTA! \n\nSinceramente, John Lee Samsung."
 korea_aprilfools25.21.a: "Ok."
 korea_aprilfools25.22.t: "¡Compra esta máquina, ahora!"
 korea_aprilfools25.22.d: "Sí, creo que te debes a ti mismo comprar esta lavadora, no tienes idea de la suerte que tienes. Los simples mortales solo ven lavadoras tan ingeniosas una vez en la vida... \n \n¿Ya tienes una? No hay problema. Eso no significa que debas dejar pasar esta oportunidad. Puedes tener una de repuesto. Sería una decisión muy inteligente para una persona inteligente. \n \n¿No tienes dinero? Entonces nos será más difícil hablar contigo. Bueno. Espera un segundo. El ayuntamiento decidirá cómo puedes devolver tu compra."
 korea_aprilfools25.22.a: "El hombre erra tanto como se esfuerza."
 korea_aprilfools25.23.t: "Suscripción Expirada"
 korea_aprilfools25.23.d: "¡Madre mía, cómo me siento bien y segura con nuestro nuevo sistema de salud! ¡Y estas nuevas pastillas que nos están dando me hacen sentir de maravilla! En fin, mi suscripción al seguro médico se vence y tengo que renovarla; supongo que no será un problema, así que ¿cuánto vale? \n \n Uf... ¿La mitad de mi sueldo?"
 korea_aprilfools25.23.a: "*Siente inmediatamente un dolor más allá de la comprensión humana*"
 korea_aprilfools25.24.t: "Ebengrad 2: Orígenes"
 korea_aprilfools25.24.d: "\"Vagamos por un mundo quieto y helado. Sin horizonte a la vista. Los gobernantes de antaño, despojados de su orgullo y gloria. Parece que fue ayer cuando hacíamos girar las ruedas del progreso, hasta que la crisis lo detuvo todo. De repente. Sin advertencia. Cuando las mareas cambiaron, cambiaron para todos, sin importar riqueza o clase. Perdimos nuestro mundo a causa del petróleo, y con él, nuestros últimos rastros de humanidad. Nos despedimos de la abundancia, y para quienes quedamos, llegó el momento de adaptarse. Decidimos dejar nuestros hogares y dirigirnos al norte. Vagamos durante semanas, quizás meses, dejando atrás todo aquello que una vez creímos que nos definía. Fue la esperanza la que nos empujó hacia adelante. Lentamente. Paso a paso. Sabíamos el precio de nuestro viaje, y lo hemos pagado - cien veces. Finalmente, ha llegado el momento de construir la última ciudad sobre la Tierra\"."
 korea_aprilfools25.24.a: "El JuchePunk suena como un género interesante."
 korea_aprilfools25.25.t: "Fumo Manía"
 korea_aprilfools25.25.d: "¿Te has preguntado alguna vez quién inventó estos peluches fumo? Bueno, Japón es la solución, pero hay más en qué pensar... ¡ESO! Quizás sea un genio desconocido... \nClaro, hoy en día existe internet y se puede encontrar de todo, pero ¿es interesante? Creo que llega un momento en la vida de todos en que uno siente un deseo irresistible de investigar personalmente el origen del fumo, sin ayuda de nadie, basándose solo en su propia deducción. \nEmpiezo ahora mismo. \nCreo que lo primero es ir a Vietnam, o donde sea que los fabriquen."
 korea_aprilfools25.25.a: "Verdad."
 korea_aprilfools25.26.t: "Pensandolo bien, ¡Fue una gran idea!"
 korea_aprilfools25.26.d: "Eso es lo que quería decir, pero... Uuuugh. Sabes, tenemos informes del Norte... Dicen algo sobre sangre... Y vampiros... Y gente... Que toman su sangre... No la gente toma la sangre de los vampiros, al revés, creo que lo entiendes... Síííí... \n Para ser honesto, no creo que sea bueno para el negocio."
 korea_aprilfools25.26.a: "Oh... Fue la idea más ingeniosa que tuvimos..."
 korea_aprilfools25.27.t: "HONUDA ACCORD!"
 korea_aprilfools25.27.d: "HONUDA ACCORD! HONUDA ACCORD! HONUDA ACCORD!"
 korea_aprilfools25.27.a: "HONUDA ACCORD!"
 korea_aprilfools25.28.t: "Niebla de Misterio"
 korea_aprilfools25.28.d: "¿No sientes alguna vez que todo a tu alrededor es mentira? Ves, oyes, piensas, pero nada a tu alrededor tiene sentido; no tiene por qué existir en el mundo real. \n Quizás... ¿Es todo un sueño? ¿No debería estar haciendo otra cosa ahora mismo? ¿Algo mejor? ¿Quizás debería simplemente despertar y que esta niebla roja que me cubre los ojos desaparezca de mi vida para siempre? \n Quizás mañana pueda hacerlo."
 korea_aprilfools25.28.a: "¿¿¿Debería Despertarme???"
 korea_aprilfools25.29.t: "..."
 korea_aprilfools25.29.d: "DISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓNDISTORSIÓN"
 korea_aprilfools25.29.a: "Tal vez... Sea lo mejor..."
 korea_aprilfools25.30.t: "GWANLIJA NARI!!!"
 korea_aprilfools25.30.d: "GWANLIJA NARI!!!!! NALEUL DUGO EODI GAN GEOS-IOOOO!!!"
 korea_aprilfools25.30.a: "¡¡¡ADELANTE, ROCINANTE!!!"
 korea_aprilfools25.31.t: "¿¿¿Solo Produzcan Petróleo???"
 korea_aprilfools25.31.d: "Les dije petróleo, no aceite de óleo..."
 korea_aprilfools25.31.a: "Joder."
 korea_aprilfools25.32.t: "John Lee-Samsung Toma el Poder"
 korea_aprilfools25.32.d: "Nos llegan noticias inesperadas de Corea. ¡John Lee-Samsung ha obtenido el poder absoluto en el país! Se dice que John recordó que todo el dinero de Corea es suyo y decidió eliminar ramas innecesarias del gobierno, como la presidencia, el parlamento y los Gobiernos locales. Estamos seguros de que ahora que el verdadero Príncipe de Corea está en el poder, la gente finalmente podrá resolver todos sus problemas y alcanzar un futuro brillante en el mundo cyberpunk."
 korea_aprilfools25.32.a: "GWANLIJA NARI!!!"
 korea_aprilfools25.33.t: "Cómo Afrontar la Ocupación Rusa"
 korea_aprilfools25.33.d: "Por Szymon (elle), Editor Senior en VICE \n \nEstamos otra vez en el siglo de los malos mapas y los malos hombres. Pero mientras la guerra devasta Europa, tu trauma puede ser hermoso, y no requiere que tomes armas. \n \nAquí en Polonia, nosotros, si, nosotros, los queers, los artista, la gente con tatuajes y traumas, estamos atrapados en un estado que quiere repelernos y un invasor que quiere desaparecernos. Así que, ¿cómo afrontas cuando el mundo está acabándose de nuevo, y justo en este tiempo, no estás en ni el lado correcto de la frontera, de la guerra, o de la historia? ¿Hey, cómo sabemos si algún lado es el \"Lado correcto\" de la historia? Quien sabe. Tal vez \"Dios\" sepa, si ella puede escucharnos. \n \nUno: ¡Rituales Calmantes! Chamomile no parará el bombardeo, pero se ve genial cuando optas por el estilo chic de \"ciudad postsoviética bombardeada\". Otra cosa, Queers Polacos en Lublin están intercambiando ramitas de menta por antigripales, las monedas son emocionales y mentosas. \n \nDos: Medita en iglesias abandonadas con una vibra lesbiana rara. Las vidrieras están destrozadas, los bancos están desaparecidos. Pero da una vibra. Sientate cruzando las piernas. Canta suavemente. Canaliza el trauma intergeneracional a través del latín y el aceite de lavanda. \n \nTres: ¡Canaliza tu Energía! No eres une soldade. Eres une sobreviviente de algoritmos y duelo heredado. Así que enciende una vela. Haz tus estiramientos. Y recuerda: tu sistema nervioso está en su mejor momento."
 korea_aprilfools25.33.a: "No voy a leer el resto nunca más."
 korea_aprilfools25.34.t: "Rosas, No Rifles: Honrando a un Soldado Queer"
 korea_aprilfools25.34.d: "De Quake (xelle), Bruja del Chakra por la Asociación de los Liberados \n \n Tomé un arma, pero nuestro querido Szymon no lo hizo. xelle cargó una rosa, y un sueño de resistencia tan bonito que rompió nuestros corazones y la suspensión de un T-90. \n \n El 28 de marzo, exactamente a las 11:11, bajo un cielo gris pálido en el espacio aéreo de Nowy Radom, nuestro amado Contribuidor de VICE, editor, y ícono de resistencia Szymon (elle) fue atropellado, aplastado y muerto por un Tanque ruso mientras estaba interpretando lo que testigos describen un \"Final, devastador acto de rebeldía política\" Estaban desarmados, descalzos y tomando una rosa. \n \n Szymon nunca fue el tipo de esconderse atrás del blindaje. elle usaba bufandas; en capas, deshilachadas, perfumadas con lavanda y revolución. Elle creía que el cuerpo queer, cuando se combinaba con la intencionalidad y la vulnerabilidad pública, podía ser un arma contra el autoritarismo. Hoy demostraron que tenían razón contra el ocupante. \n \n Cómo puedes Honrar a Szymon (elle): Enciende una vela en forma de rosa un Jueves (se favorite día), Envía donaciones a la \"Cooperativa Queer Parisina\" para enviar alimentos veganos saludables a refugios queer en Francia, o simplemente siéntate en quietud durante 7 minutos, así como Szymon hacía cada día a las 4:44pm para re alinear su sistema nervioso en tiempos de crisis. Szymon, eres canon."
 korea_aprilfools25.34.a: "Descansa en paz...¿?"
 taiwan_detente.1.t: "Una rama de oliva al Continente"
 taiwan_detente.1.d: "Con la conclusión de nuestras elecciones y el nombramiento de los ministros, por fin podemos empezar a ponernos manos a la obra. Uno de los puntos más importantes en nuestra agenda es abandonar la política de la administración de Tsai Ing-wen de mantener distancia con el continente. Esta política hacia el continente ha dañado gravemente nuestras industrias del turismo y la agricultura, ya que el continente no solo ha impuesto múltiples prohibiciones sobre diversos productos, sino que también ha endurecido los controles turísticos, reduciendo el número de turistas continentales que visitan nuestras islas. Aún peor, el PCCh ha amenazado repetidamente al gobierno del DPP, generando inestabilidad y pánico entre nuestra gente.\n\nPara reparar el daño, la primera tarea del Consejo de Asuntos del Continente será revertir la relación fría entre nosotros y el continente. Reiniciando las conversaciones y celebrando cumbres, haremos todo lo posible por tender una rama de olivo al continente, con la esperanza de que estén dispuestos a buscar la paz y cooperar con nosotros de nuevo."
 taiwan_detente.1.a: "Una nueva era de interacciones a través del estrecho."
 taiwan_detente.2.t: "El Gobierno del Kuomitang busca la reconciliación"
 taiwan_detente.2.d: "Recientemente hemos tenido conocimiento de que el Consejo de Asuntos del Continente, disuelto de facto desde que los partidos separatistas radicales tomaron el control, nos ha contactado a través de la Fundación Strait Exchange para buscar la reconstrucción de las relaciones diplomáticas entre ambas partes. Varios representantes de su parte han comenzado a contactar con sus homólogos de la nuestra para negociar posibles reuniones preliminares, principalmente con el objetivo de debatir conferencias más formales y exhaustivas en el futuro.\n\nNuestro gobierno ha respondido positivamente. La Oficina de Asuntos de Taiwán ha aprobado en privado permisos de entrada diplomáticos para varios representantes taiwaneses, pero se ha abstenido de hacer comentarios públicos hasta que se alcance un consenso más amplio entre nosotros y Taiwán, según informes. Si bien no albergamos grandes esperanzas en la reintegración pacífica de Taiwán, deseamos que estas cumbres sirvan como punto de partida para que el pueblo taiwanés reconozca una vez más nuestra hermandad compartida."
 taiwan_detente.2.a: "Entendido."
 taiwan_detente.3.t: "Piedra angular hacia Concord"
 taiwan_detente.3.d: "¡Grandes noticias de nuestros pacificadores en el Consejo de Asuntos de la China Continental! Parece que la Fundación para el Intercambio a través del estrecho ha logrado contactar con ARATS en el continente, presumiblemente con la aquiescencia de la Oficina de Asuntos de Taiwán, y ha establecido entendimientos básicos para futuras conferencias. Uno de estos incluye informar a la otra parte de que el gobierno actual está abierto a reconocer el Consenso de 1992, que ha sido la base de todos nuestros intercambios pacíficos desde la era del expresidente Lee Teng-hui, incluyendo la reunión Ma-Xi, la más significativa desde las negociaciones de Chongqing en 1945.\n\nCon esta buena voluntad de nuestros hermanos al otro lado del estrecho, podemos empezar a preparar eventos más abiertos y de bajo nivel para reducir la hostilidad pública hacia el continente, antes de celebrar cumbres importantes para discutir asuntos políticos y económicos más amplios. Aprenderemos del fracaso del CSSTA y evitaremos provocar sentimientos anti-continental, que dieron pie a la oposición para el Movimiento del Girasol en 2014."
 taiwan_detente.3.a: "¡Excelente!"
 taiwan_detente.4.t: "Conferencia de Xiamen"
 taiwan_detente.4.d: "Tras las respuestas positivas de nuestros colegas al otro lado del estrecho, el Ministerio del Interior y el Consejo de Asuntos del Continente se han movilizado para romper el hielo entre nosotros y el Continente. Una encuesta reciente mostró que dos tercios de los encuestados apoyan o no se oponen a reanudar las conversaciones. Con la aprobación presidencial, los representantes del MAC zarparon hacia Xiamen, donde fueron recibidos calurosamente por funcionarios del Continente.\n\nLa conferencia acaparó los titulares, destacando tres eventos clave: la gran inauguración, la eliminación de las prohibiciones de importación sobre varios productos agrícolas que se habían impuesto anteriormente en represalia por las políticas hostiles de Tsai Ing-wen, y las discusiones sobre el nuevo virus COVID-19. El Continente también aceptó actuar como intermediario, compartiendo información de la OMS con nosotros y transmitiendo nuestras actualizaciones a cambio.\n\nEl evento se considera un gran éxito para la administración del presidente Ma, con más reuniones ya previstas en la agenda del MAC. Se espera también que los representantes del Continente visiten pronto Kinmen para promover el turismo, consolidando aún más la región como un bastión del apoyo al Kuomintang."
 taiwan_detente.4.a: "Un futuro brillante por delante."
 taiwan_detente.5.t: "Solo a Formosa"
 taiwan_detente.5.d: "\"Esta es la última llamada de embarque para el vuelo BR721 a Taipéi. Pasajeros restantes, por favor, diríjanse a la Puerta 3 inmediatamente\".\n\nEl anuncio resuena por la terminal mientras Huang Fu-ji se apresura a la Puerta 3, con su pasaporte y billete de avión en la mano, aún recuperando el aliento tras la carrera. Tras una breve comprobación, sube al avión.\n\nMientras los motores rugen y el suelo se desvanece, abre su teléfono y lee una captura de pantalla del sitio web de la Oficina de Asuntos de Taiwán, revisando los avisos sobre qué hacer y qué evitar al visitar Taiwán individualmente. Planificador meticuloso, ha preparado un itinerario detallado, al minuto, pero aún le queda tiempo de margen entre paradas, basado en su experiencia previa.\n\nEn el aeropuerto, los televisores transmiten noticias de la exitosa Conferencia de Shanghái, que llevó a China continental a reanudar el programa de visitas individuales. Pero a Huang no le interesa; tiene la mirada fija en la pantalla de recogida de equipaje, ansioso por comenzar su tan esperado viaje.\n\nAl caer la noche, regresa al mismo hotel donde se alojó hace siete años, solo que esta vez no hay guías, ni compañeros de grupo ruidosos, ni nadie que presione el horario. Al amanecer, planea visitar los mercados tradicionales y el zoológico de Muzha, con la esperanza de ver pandas y otros animales exóticos."
 taiwan_detente.5.a: "Bon voyage."
 taiwan.1.d: "Los horizontes de las ciudades están iluminados más intensamente de lo habitual por deslumbrantes fuegos artificiales. Los artistas llevan los conciertos a sus clímax, animando aún más a las multitudes. Las personas reunidas alrededor de los edificios más altos observan asombradas cómo la propia Luna parece ser eclipsada por las llamas de los cohetes, mientras que quienes están en la comodidad de sus hogares celebran al llegar finalmente la cuenta atrás a cero, marcando el fin de la década.\n\nEl año es 2020. Nuestra posición líder en la fabricación de semiconductores sigue sin ser desafiada. El mercado bursátil se dispara más que nunca, con el TAIEX manteniéndose por encima de los 10.000 puntos durante casi todo el año. A pesar de la turbulencia causada por la guerra comercial entre China y Estados Unidos, nuestra economía robusta ha mostrado una notable resistencia, con una tasa de crecimiento económico que se mantiene estable alrededor del 3% durante 2019.\n\nEl año nuevo también señala la conclusión de las campañas electorales presidenciales. La presidenta Tsai Ing-wen busca un segundo mandato, mientras que el principal líder de la oposición, el controvertido Han Kuo-yu, sigue ganando popularidad. James Soong hará su quinta candidatura a la presidencia, aunque también ha anunciado que esta podría ser su última intentona.\n\nEn el ámbito diplomático, nuestra nación continúa perdiendo aliados formales debido a factores como la creciente influencia global de China continental, incluida su Iniciativa Franja y Ruta. Al mismo tiempo, nuestra estrategia se ha orientado hacia fomentar relaciones cálidas, aunque no oficiales, con las grandes potencias. Los disturbios en Hong Kong alejan aún más al campo pro-unificación dentro de nuestras fronteras, y muchos los citan como prueba del fracaso inevitable del marco de \"Un país, dos sistemas\".\n\nEn definitiva, el valiente pueblo del archipiélago de Taiwán, incluyendo Kinmen y Matsu, está preparado para afrontar la tormenta que se avecina y avanzar hacia la próxima década. Aunque el Ministerio de Salud y Bienestar ha informado de un nuevo caso sospechoso de neumonía atípica procedente de China continental, seguramente eso no será un gran problema."

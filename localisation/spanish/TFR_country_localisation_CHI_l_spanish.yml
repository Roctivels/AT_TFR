 taiwan.33.t: "¡Segunda oleada de ataques con misiles!"
 taiwan.33.d: "La guerra de la vida y la muerte ha regresado a la República una vez más.\n\nSolo unos días después del comienzo de la cuarta crisis del estrecho, misiles desde el Continente han atacado por primera vez nuestra infraestructura clave y nuestras ciudades. Mientras el Ministerio de Defensa Nacional se apresura a movilizar al personal de reserva y preparar la defensa, una segunda oleada de ataques con misiles ha caído sobre nosotros, esta vez devastando nuestras capacidades administrativas y de comunicación.\n\nSin embargo, las pocas estaciones de radar que han sobrevivido han detectado algo mucho más aterrador: innumerables buques de asalto anfibios y sus escoltas se están acercando rápidamente a nuestras costas, señalando una invasión inminente. Esto solo puede significar una cosa: la cuarta crisis del estrecho ha terminado, la guerra de Taiwán ha comenzado.\n\nA pesar de la ausencia de Estados Unidos, no estamos solos. Las fuerzas de intervención de la OTDP están ahora ayudando en nuestra defensa en todos los sectores, hombro con hombro con nosotros en las zonas de desembarco para repeler a cualquier tropa que se atreva a desafiar nuestra integridad territorial.\n\nAhora debemos luchar y mantenernos firmes contra el Gigante Rojo. Si fallamos, la antorcha ardiente de la democracia china se extinguirá para siempre."
 taiwan.33.a: "¡Levántate y lucha!"
 taiwan.34.t: "Carta del Ministerio de Defensa Nacional"
 taiwan.34.d: "Destinatario: Oficina Presidencial\nPrioridad: Máxima Prioridad\nAsunto: Estado Actual de Nuestra Defensa Nacional\n\nNuestro objetivo principal de impedir que el Ejército Popular de Liberación avance hacia Taiwán ha fracasado. El EPL ha explotado vulnerabilidades en nuestras defensas y ahora controla varias ciudades y puertos importantes, lo que ha paralizado gravemente nuestro esfuerzo bélico. Al no haberse cumplido este objetivo, ya no podemos limitar el conflicto a las zonas costeras y nos vemos obligados a combatir en entornos urbanos y montañosos.\n\nEl EPL ha alcanzado nuestra segunda línea de defensa que rodea las ciudades y cadenas montañosas restantes, lo cual podemos aprovechar en nuestra defensa debido a la complejidad de los entornos urbanos y montañosos. Nuestro Ejército ya ha establecido posiciones defensivas alrededor de las ciudades controladas por la RPC y está mejor posicionado para detener nuevos avances del EPL.\n\nLa OTDP también ha sufrido bajas considerables durante este conflicto. Esto ha provocado un impacto psicológico inesperado tanto en nuestros civiles como en las fuerzas armadas. Reconociendo que la OTDP es realmente nuestro hermano de armas, hemos recibido un flujo de voluntarios civiles que apoyan la preparación y logística de nuestra defensa. Esto ha reforzado nuestra moral y capacidades defensivas, y los comandantes informan que la disposición y preparación de nuestras fuerzas terrestres es mayor que nunca."
 taiwan.34.a: "Seguro que ganaremos..."
 taiwan.500.t: "Nuestra guerra final"
 taiwan.500.d: "Tras semanas de movimientos sospechosos de IDEA y la creciente tensión en la Guerra Fría sino-japonesa alcanzando un nuevo clímax, muchos observadores internacionales han anticipado una guerra caliente en un futuro cercano. Aunque la OTDP ha intensificado sus misiones diplomáticas para intentar desescalar la situación, tanto Tokio como Pekín han anunciado que ahora existe un estado de guerra entre las dos coaliciones, y nos vemos obligados a luchar una vez más por nuestra supervivencia.\n\nCon todos los esfuerzos diplomáticos en vano, el conflicto regional más feroz del Asia-Pacífico se ha desplegado ante nosotros. Con más de 3 mil millones de personas involucradas en la mayor guerra que la humanidad ha presenciado hasta ahora, no podemos esperar realísticamente que los chinos simplemente se retiren esta vez. O la OTDP desmantela por completo la maquinaria bélica china y su capacidad para reavivar cualquier conflicto, o IDEA avanzará para subyugar el resto de Asia.\n\nPara nosotros, esta es la segunda vez que enfrentamos una amenaza existencial en este siglo. Derrotados pero no conquistados, el nuevo gobierno chino, impulsado por su sentimiento revanchista y sus recién encontrados aliados en Asia, sin duda intentará derribar nuestro gobierno y destruir nuestro sistema democrático, como intentaron en 2021. Para asegurar un futuro propio, hemos decidido involucrarnos en la Gran Guerra Asiática, luchando codo con codo con nuestros aliados democráticos para derrotar a la alianza liderada por Pekín, de una vez por todas."
 taiwan.500.a: "¡A las armas!"

 taiwan.16.t: "Ko Wen-je victorioso en las elecciones de Taiwán"
 taiwan.16.d: "Tras rechazar a las tropas del continente en la guerra reciente, Taiwán ha anunciado que ahora tiene la posibilidad de mantener elecciones libres de acuerdo a la constitución de nuevo. Puesto que la guerra suscitó un odio masivo hacia la China continental, el Kuomitang ha perdido una porción significativa de sus votantes, los cuales acusan al KMT de ser incapaces de asegurar la paz o en otros casos les ven como posibles colaboradores con la China continental. Mientras tanto los políticos verdes también sufrieron un duro golpe, dado que se les estaba acusando de llevar a Taiwán a la guerra y al baño de sangre que ocurrió. Mientras tanto, las políticas radicales de la anterior legislatura empujaron a un gran número de votantes neutrales a ponerse de lado del PPT. Debido a esto, el caballo negro que es el Partido Popular de Taiwán con el liderazgo de Ko Wen-Je ha logrado desafiar el sistema bipartidista azul-verde tradicional taiwanés, ganando una insólita presidencia\n\nEl nuevo presidente Ko Wen-je ha agradecido a sus seguidores por conseguir tal proeza política, al mismo tiempo también ha anunciado sus planes para la reconstrucción."

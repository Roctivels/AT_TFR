 taiwan.291.t: "Departamento de Estado emite declaración sobre Taiwán"
 taiwan.291.d: "Ante el aumento de la tensión en el estrecho de Taiwán, el Departamento de Estado de EE.UU. reiteró su postura de \"oponerse a cualquier cambio unilateral del statu quo\".\n\nEl comunicado enfatizó que la \"política estadounidense hacia Taiwán se mantiene inalterada\" y que Washington defiende el Acta de Relaciones de Taiwán y las Seis Garantías. EE.UU. insta a ambas partes a \"ejercer moderación y evitar errores de juicio\".\n\nUn portavoz del Departamento de Estado declaró: \"Estamos profundamente preocupados por el reciente aumento de las tensiones en el estrecho de Taiwán\". \"Reiteramos que la paz y la estabilidad sirven a los intereses compartidos de la comunidad internacional. Instamos a todas las partes a abstenerse de acciones unilaterales, en particular el uso de la fuerza o la coerción, que puedan agravar la situación\".\n\nLa presencia de varios buques en el Pacífico Occidental forma parte de las \"operaciones rutinarias de libertad de navegación\". Si bien Pekín ha criticado la medida como una \"injerencia en los asuntos internos\", funcionarios estadounidenses sostienen que dichas operaciones se ajustan plenamente al derecho internacional y no guardan relación con los acontecimientos regionales actuales."
 taiwan.291.a: "Nos oponemos a la interferencia extranjera en los asuntos chinos."
 taiwan.292.t: "Trump anuncia apoyo militar a Taiwán"
 taiwan.292.d: "Ante la tensa situación en el estrecho de Taiwán, el presidente Donald Trump anunció su \"histórico paquete de ayuda defensiva\" para Taiwán durante una conferencia de prensa.\n\nEl paquete incluye misiles antiaéreos, sistemas de radar, drones y un número limitado de armas antibuque. Trump afirmó: \"Taiwán lucha por la libertad. Estados Unidos no se quedará de brazos cruzados\".\n\nLa declaración atraería la atención internacional. Aunque voces bipartidistas en el Congreso han expresado su apoyo, el Ministerio de Asuntos Exteriores de China condenó enérgicamente el anuncio y advirtió a Washington que \"no juegue con fuego\".\n\nEl Pentágono señaló que está \"revisando la logística de las posibles transferencias\", pero enfatizó que \"cualquier apoyo militar a Taiwán se basará en un carácter defensivo y en el marco legal vigente\"."
 taiwan.292.a: "¡Una grave violación de la soberanía china!"
 taiwan.293.t: "Nancy Pelosi visita Taiwán"
 taiwan.293.d: "La presidenta de la Cámara de Representantes de Estados Unidos, Nancy Pelosi, llegó a Taipéi en un avión militar y pronunció un discurso en la legislatura de la isla. En su discurso, enfatizó el apoyo de Estados Unidos al sistema democrático de Taiwán, declaró que Taiwán no está solo y abogó por una mayor profundización de las relaciones entre ambos países.\n\nEn respuesta, el Comando del Teatro del Este del EPL anunció el inicio de ejercicios de combate real en los alrededores de la isla. Varias unidades navales y aéreas realizaron ejercicios con fuego real a gran escala en los alrededores de Taiwán, simulando bloqueos conjuntos, ataques de avanzada y operaciones de negación de área. Varios misiles sobrevolaron la isla, lo que llevó a Taiwán a elevar su alerta de defensa aérea al máximo nivel.\n\nAunque la Casa Blanca intentó minimizar la visita, calificándola de \"un viaje personal de la presidenta\", los observadores internacionales la consideraron ampliamente como una grave escalada de las tensiones entre EE.UU. y China."
 taiwan.293.a: "Llegó la tormenta."

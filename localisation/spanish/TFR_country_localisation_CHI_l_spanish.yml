 taiwan.4.t: "Elecciones presidenciales taiwanesas de 2020"
 taiwan.4.d: "El evento más importante entre el Año Nuevo Occidental y el Año Nuevo Chino, las elecciones taiwanesas de 2020, determinará tanto la legislatura como la presidencia. La fase final de la campaña se reanudó tras una semana de pausa debido al trágico accidente del helicóptero Black Hawk el 2 de enero, y los candidatos celebraron sus últimos y más grandes mítines políticos en varias ciudades importantes.\n\nRepresentando al grupo pan-verde se encuentra la actual presidenta Tsai Ing-wen, la primera presidenta femenina de Taiwán y la primera de ascendencia indígena. Profesora de derecho con una carrera política que se remonta al año 2000, su experiencia y profesionalismo son a menudo citados por sus simpatizantes como razones por las que es la opción más cualificada. A pesar de un primer mandato turbulento, sus índices de aprobación han ido en aumento desde julio de 2019, y muchos observadores predicen una victoria verde.\n\nEn el otro bando se encuentra Han Kuo-yu, el actual alcalde de Kaohsiung, quien ha enfrentado críticas de los residentes de la ciudad por supuestamente \"abandonarlos\". Con una maestría en derecho, Han regresó a la política en 2017, lo que hace que su experiencia sea insignificante en comparación con la del candidato del PPD. Sin embargo, sus partidarios argumentan que el bajo rendimiento del PPD ha generado en los votantes un deseo de cambio, y muchos creen que su estilo político poco ortodoxo podría marcar el comienzo de una nueva era dorada para Taiwán.\n\nJames Soong también está en la contienda, aunque la mayor parte de la atención pública que recibe se concentra en bromas, más que en un compromiso político serio.\n\nAl día siguiente de una agotadora noche de mítines finales, los ciudadanos de todo el país se dirigen a los colegios electorales más cercanos para decidir el futuro de su nación. Al caer la noche y contarse los votos, se anuncia el resultado final:"
 taiwan.4.a: "¡Tsai Ing-wen y los pan-verdes ganan!"
 taiwan.4.b: "¡Han Kuo-yu y el KMT toman el poder!"
 taiwan.5.t: "Tsai Ing-wen asegura la reeleción"
 taiwan.5.d: "Después de una larga noche de recuento de votos, y con millones de personas pegadas a sus televisores para seguir el desarrollo de los resultados, los canales de noticias, junto con fuentes oficiales, finalmente han declarado al ganador: ¡la presidenta Tsai Ing-wen asegura un segundo mandato!\n\nEsto era esperado por muchos observadores tanto internos como externos, ya que no solo Tsai Ing-wen tiene más experiencia y se beneficia de la preferencia por reelegir a un presidente en funciones, sino que los escándalos de su oponente y múltiples desastres de relaciones públicas también persuadieron a votantes centristas e incluso a partidarios del Pan-Azul para apoyar a Tsai.\n\nAdemás, el DPP también ganó la mayoría en el Yuan Legislativo, asegurando alrededor del 45% de los votos y 60 escaños, suficientes para controlar la legislatura. Esto garantiza un mandato tranquilo para Tsai Ing-wen y, por extensión, para todo el DPP.\n\nEsto provocó un clamor entre una parte de los seguidores del Pan-Azul, que exigieron un recuento junto con un puñado de líderes del Partido Kuomintang. Sin embargo, con Han Kuo-yu declarando abiertamente su aceptación de la derrota, estos movimientos se calmaron rápidamente, y la República completó otra elección pacífica más."
 taiwan.5.a: "¡La Bandera Verde se eleva hacia el cielo!"
 taiwan.6.t: "Han Kuo-yu asegura la presidencia en una sorpresa"
 taiwan.6.d: "Después de una larga noche de conteo de votos, y con millones de personas pegadas a sus televisores para ver cómo se desarrollaban los resultados, los canales de noticias, junto con fuentes oficiales, finalmente han declarado al ganador: ¡el alcalde Han Kuo-yu asegura la victoria!\n\nMuchos observadores internacionales y nacionales quedaron sorprendidos por este resultado, ya que Tsai Ing-wen tenía más experiencia y se beneficiaba de la preferencia por la reelección de un presidente en funciones. Sin embargo, parece que la política de Han Kuo-yu ha logrado ganarse el corazón de la gente. Además, muchos votantes centristas, decepcionados con el DPP, optaron por apoyar al Pan-Azul en estas elecciones para expresar su descontento.\n\nPor otro lado, el Kuomintang también recuperó la rama legislativa. Con el 44% del voto popular y 62 escaños, el KMT pudo restablecerse como mayoría, reduciendo al DPP a una oposición minoritaria, asegurando un mandato tranquilo para Han Kuo-yu.\n\nUna parte de la facción Pan-Verde desaprobó el resultado, alegando que la elección fue manipulada, y exigió un recuento junto con un puñado de líderes del partido DPP. Sin embargo, cuando Tsai Ing-wen y su equipo enviaron abiertamente un mensaje al público para aceptar la derrota y felicitar al nuevo presidente, las protestas se calmaron rápidamente y la República completó otra elección pacífica.\n\nPara Han Kuo-yu personalmente, dado que está prohibido ejercer como alcalde y presidente simultáneamente, se ve obligado a renunciar como alcalde de Kaohsiung. Se celebrará una elección parcial en un plazo de tres meses para decidir el próximo gobierno local, y los movimientos que promovieron la revocación de Han Kuo-yu se disolvieron posteriormente."

 taiwan.13.t: "Cheng Wen-tsan asegura la presidencia de Taiwán"
 taiwan.13.d: "Tras rechazar a las tropas del continente en la guerra reciente, Taiwán ha anunciado que ahora tiene la posibilidad de mantener elecciones libres de acuerdo a la constitución de nuevo. Puesto que la guerra suscitó un odio masivo hacia la China continental, el Kuomitang ha perdido una porción significativa de sus votantes, los cuales acusan al KMT de ser incapaces de asegurar la paz o en otros casos les ven como posibles colaboradores con la China continental. Por este motivo el PDD bajo el liderazgo de [CHI.GetLeader] han ganado las elecciones y han conseguido ganar un nuevo mandato\n\nPuesto que todos los partidos han aceptado los resultados de las elecciones, el nuevo liderazgo ya está anunciando planes para la reconstrucción."

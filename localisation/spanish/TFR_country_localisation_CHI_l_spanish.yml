 CHI_korean_valuable_partners: "Socios comerciales valiosos £GFX_CHI_korea_texticon_medium "
 taiwan.32.t: "Al final... ¡Nos mantenemos firmes!"
 taiwan.32.d: "Después de semanas de combates intensos, el Ejército Popular de Liberación fue detenido por completo ante la feroz resistencia de la OTDP y ha fracasado en su objetivo de superar a nuestras fuerzas armadas y a nuestro gobierno. En los últimos días, los informes de inteligencia han indicado que el EPL está abandonando el terreno ganado, aunque esta información se mantiene en reserva por si el EPL lanza un contraataque sorpresa. Sin embargo, con fuentes japonesas y australianas confirmando que las fuerzas comunistas se están retirando en todos los frentes, incluyendo Kinmen, la oficina presidencial ha anunciado, por fin, la victoria de las fuerzas democráticas al amanecer.\n\nLa Fuerza Aérea y la Marina han seguido el mismo camino, cesando todas las operaciones militares tras la retirada de las fuerzas de invasión terrestre, dejando los cielos y los mares abiertos una vez más. Nuestros devastados muelles y aeropuertos están ahora recibiendo ayuda humanitaria de todo el mundo, siendo la mayoría proveniente de nuestros aliados de la OTDP.\n\nSin embargo, esto está lejos de haber terminado. Nuestras ciudades yacen en ruinas, nuestras fábricas han sido destruidas, nuestras vías férreas y carreteras están paralizadas, y nuestra joya de la corona, la industria de semiconductores, ha sido completamente arrasada. No solo eso, la inteligencia de la OTDP sugiere que la gran derrota de los comunistas casi con toda seguridad desencadenará una crisis política, que podría dar lugar a un liderazgo aún más agresivo que amenace nuestra democracia y libertad en los próximos años. Por ahora, nos espera una tarea monumental de reconstrucción."
 taiwan.32.a: "Y Nuestra Gente Está Caminando El Camino De La Vida"
 CHI_tsmc_idea: "Taiwan Semiconductor Manufacturing Company"
 CHI_tsmc_idea_desc: "TSMC, o Taiwan Semiconductor Manufacturing Company, es la mayor empresa de fabricación de semiconductores del mundo y suministra semiconductores a empresas sin fábrica. Como parte del enfoque nacional para transformarse en una economía de alta tecnología y basada en servicios en los años 90, TSMC se fundó con el objetivo de especializarse en la fabricación de semiconductores, lo que impulsó a las empresas occidentales a externalizar la fabricación para maximizar sus beneficios.\n\nActualmente, TSMC, junto con otras empresas taiwanesas, representa aproximadamente dos tercios del suministro mundial de semiconductores y domina el mercado de circuitos integrados de alta gama. Esta fuerte dependencia de los semiconductores taiwaneses ha obligado a muchos países desarrollados a presionar a China para que no intervenga militarmente, por temor a que esto cause estragos en la cadena de suministro y, por consiguiente, en toda su economía. Esta protección, proporcionada por el monopolio de Taiwán sobre la fabricación de semiconductores, es lo que muchos denominan el \"escudo de silicona\"."

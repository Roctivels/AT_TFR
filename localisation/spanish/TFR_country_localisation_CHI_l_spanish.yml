 taiwanese_liberal_populism: "Populismo liberal"
 taiwanese_liberal_populism_desc: "El populismo liberal taiwanés es una variante del conservadurismo liberal, que prioriza la participación electoral satisfaciendo las necesidades de la población, prestando activamente servicios y mejorando las condiciones de vida de los sectores menos favorecidos de la sociedad.\n\nDebido a su énfasis en asegurar las elecciones, esta ideología suele describirse como carente de principios e incapaz de definir claramente sus límites. En lugar de llamarla \"ideología\", muchos prefieren llamarla estrategia electoral para representar mejor su verdadera naturaleza."
 reformed_tridemism: "Tridemismo reformado"
 reformed_tridemism_desc: "El tridemismo, o los Tres Principios del Pueblo, consta de tres componentes igualmente importantes: nacionalismo, democracia y bienestar social.\n\nA principios del siglo XXI, la forma original del tridemismo había comenzado a mostrar su incapacidad para gobernar una sociedad moderna. Esto impulsó a muchos a adoptar una versión reformada de la ideología.\n\nComparado con su predecesor, el tridemismo reformado reduce la importancia del nacionalismo, a la vez que enfatiza la expansión del bienestar, considerándolo el componente más importante de la ideología modernizada. Por otro lado, la democracia, ahora considerada una necesidad básica del pueblo, se incorpora al concepto más amplio del bienestar, dejando este como el único énfasis del tridemismo reformado."

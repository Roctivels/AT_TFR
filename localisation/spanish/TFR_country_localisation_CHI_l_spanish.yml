 CHI_destroyed_country_desc: "Incluso aunque la guerra haya acabado, nuestro país jamás volverá a ser igual. El sonido de las sirenas todavía se escucha en los oidos de los ciudadanos, cuando los bombardeos y el fuego de artillería no solo han devastado nuestra red de autopistas, sino también nuestros ferrocarriles y servicios de metro. Los tiempos de desplazamiento laboral se han triplicado desde la guerra, y por si no fuera poco, nuestra industria de manufactura ha quedado reducida a cenizas. Nuestros parques de investigación fueron intensamente golpeados por los ataques, y las inversiones extranjeras han sido retiradas. Para restaurar nuestro estatus como centro tecnologico mundial requeriremos el esfuerzo conjunto de nuestro Gobierno y nuestros aliados."
 CHI_neoliberalism_desc: "\n\n\n\n£GFX_CHI_ideology_neoliberalism\n\n\n\n\n\nEl §Yprogresismo taiwanés§! es una ideología defendida por el Partido Progresista Democrático (PPD), otros partidos pan-verdes y algunas figuras independientes. El PPD, líder de la Coalición Pan-verde, surgió de los movimientos Tangwai que surgieron a mediados de los años 70. Debido a su historial de resistencia a la tutela del Kuomintang y al Terror Blanco, el PPD considera la democracia liberal, la justicia política y el igualitarismo como sus ideologías fundamentales. Estos valores fueron posteriormente heredados por el movimiento progresista taiwanés en general. Con el paso de los años, también ha absorbido ideas anticomunistas debido a la creciente hostilidad del Partido Comunista de China y aboga por la desvinculación de Taiwán de China continental.\n\nHoy en día, el progresismo taiwanés defiende múltiples causas, como la libertad y la igualdad social, la sostenibilidad ambiental, los derechos LGBTQ+ y la independencia de Taiwán, y sigue siendo un movimiento importante en la política taiwanesa."
 CHI_constitutionalist_desc: "\n\n\n\n£GFX_CHI_ideology_constitutionalism\n\n\n\n\n\nEl §Yconstitucionalismo taiwanés§!, defendido por el Kuomintang (KMT), el Partido Primero el Pueblo (PFP) y varias figuras independientes, es una forma localizada de constitucionalismo que defiende la continuidad de la República de China, políticas sociales liberales-conservadoras y una relación moderada con China continental. Inicialmente basado en los Tres Principios del Pueblo y el conservadurismo social, el constitucionalismo taiwanés ha adoptado un enfoque más liberal con el paso de los años para mantenerse competitivo en el Taiwán posterior a la ley marcial.\n\nHoy en día, el constitucionalismo taiwanés se caracteriza principalmente por su política económica proteccionista, el nacionalismo chino, las políticas sociales centristas y el anticomunismo, heredado del chianismo y en gradual disminución, y sigue siendo una de las facciones más importantes de la política taiwanesa."

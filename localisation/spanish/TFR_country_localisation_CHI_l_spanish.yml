 taiwan_detente.0.t: "El Kuomintang gana las elecciones taiwanesas"
 taiwan_detente.0.d: "Un tema que se ha extendido rápidamente por nuestras redes sociales recientemente es la conclusión de las elecciones locales taiwanesas, en las que el pueblo eligió a Han Kuo-yu como líder administrativo de la región separatista. Algunos celebran el rechazo a los radicales independentistas taiwaneses, mientras que algunos internautas cuestionan la legitimidad de estas elecciones locales.\n\nLa Oficina de Asuntos de Taiwán ha hecho pocos comentarios al respecto, salvo reiterar que las elecciones \"presidenciales\" son simplemente elecciones locales y que las potencias extranjeras no deben interferir en nuestros asuntos internos. Sin embargo, algunos sectores del Gobierno se muestran aliviados por la victoria del Kuomintang, ya que el partido está más dispuesto a cooperar con nosotros y a mantener una relación cordial. Un sector significativo aún duda de la dedicación de Han Kuo-yu para restablecer el contacto, pero con la derrota del PPD, el proceso al menos será más fluido."
 taiwan_detente.0.a: "Esperamos que entren en razón."
 taiwan_detente.6.t: "Comienzan las conversaciones en Singapur"
 taiwan_detente.6.d: "Con la promoción del Gobierno de Singapur, representantes de China continental y Taiwán iniciaron recientemente una reunión formal en Singapur para negociar las relaciones entre ambos lados del estrecho. A la reunión asistieron representantes del Kuomintang, mientras que la representación continental estuvo compuesta por funcionarios de la Oficina de Asuntos de Taiwán del Consejo de Estado.\n\nBasándose en los principios de igualdad, respeto, dejar de lado las diferencias y disputas, y buscar puntos en común, dejando de lado las diferencias, ambas partes mantuvieron una comunicación profunda sobre temas como la cooperación económica entre ambos lados del estrecho, la facilitación del intercambio de personal y el mantenimiento de la paz y la estabilidad regionales. El diálogo se desarrolló en un ambiente positivo, reflejando la voluntad compartida de reanudar el diálogo y mejorar las relaciones.\n\nEl Ministerio de Asuntos Exteriores de Singapur celebró que ambas partes eligieran Singapur como un lugar neutral para el diálogo y los intercambios, y confió en que esta reunión ayude a aliviar las tensiones y promover la paz y la estabilidad regionales."
 taiwan_detente.6.a: "Veremos cómo termina esto."
 taiwan_detente.7.t: "Se intensifican las conversaciones de reunificación"
 taiwan_detente.7.d: "Antes del deterioro de la guerra civil en Estados Unidos, la diplomacia internacional mostraba evidentes signos de cambio. A medida que las divisiones sociales internas en Estados Unidos se intensificaban y el accionar del Gobierno se veía frecuentemente obstaculizada, la influencia estadounidense en los asuntos internacionales continuó disminuyendo.\n\nEn este contexto, China continental ha aumentado su control sobre la situación circundante. Mientras tanto, han surgido diferentes voces dentro de Taiwán, y algunos partidos políticos tradicionales han pedido una reevaluación del rumbo de las relaciones a través del estrecho para evitar quedar marginados en la reorganización de las fuerzas internacionales.\n\nPoco después, con el estallido oficial de la guerra civil en Estados Unidos, la capacidad del Gobierno estadounidense para intervenir en el extranjero disminuyó repentinamente, y surgió una importante brecha en la situación de seguridad en la región Asia-Pacífico. China continental ha dejado claro que promoverá firmemente el proceso de reunificación nacional, se opondrá firmemente a cualquier forma de comportamiento separatista y enfatizará que su determinación de salvaguardar la soberanía nacional y la integridad territorial no flaqueará.\n\nEn Taiwán, en tiempos de agitación política, fuerzas importantes como el Kuomintang exigieron una actitud más pragmática para afrontar la realidad de ambos lados del estrecho y abogaron por la búsqueda de nuevos acuerdos mediante negociaciones pacíficas."
 taiwan_detente.7.a: "¿Se acerca su fin?"
 taiwan_detente.8.t: "Agenda de unificación planteada en Singapur"
 taiwan_detente.8.d: "Delegaciones de China continental y Taiwán se reunieron esta semana para una nueva ronda de negociaciones, coordinada por el Gobierno singapurense. La reunión tuvo lugar durante el conflicto civil estadounidense, que cambió la dinámica en la región Asia-Pacífico y atrajo amplia atención internacional.\n\nDurante las conversaciones, la delegación continental propuso formalmente acelerar el proceso de unificación a través del estrecho, solicitando un mecanismo de comunicación regular y un diálogo sustantivo sobre un posible marco de unificación. Los representantes declararon que \"lograr la reunificación nacional completa es la aspiración compartida de 1.400 millones de personas y un paso crucial en el Gran Rejuvenecimiento de la nación china\", enfatizando la necesidad de aprovechar la oportunidad histórica actual.\n\nLa delegación taiwanesa, encabezada por el Kuomintang (KMT), mantiene una postura cautelosa. Si bien reafirmó su compromiso con la gestión pacífica de las relaciones entre ambos lados del estrecho, mantuvo una postura \"abierta pero reservada\" respecto a la unificación, subrayando la importancia de salvaguardar el estilo de vida, el sistema social y los intereses fundamentales del pueblo de Taiwán.\n\nEs la primera vez en años que la cuestión de la unificación regresa a la mesa de negociaciones como un punto oficial de la agenda. Si bien el camino a seguir sigue siendo incierto, el diálogo en sí mismo tiene un peso estratégico."
 taiwan_detente.8.a: "La unificación es inevitable."
 taiwan_detente.9.t: "Las conversaciones en Singapur fracasan"
 taiwan_detente.9.d: "El diálogo entre China continental y Taiwán, celebrado en Singapur, se rompió oficialmente hoy. Ambas partes no lograron reducir las diferencias críticas respecto a la unificación ni a sus acuerdos políticos.\n\nLa delegación de China continental enfatizó la urgencia de aprovechar la oportunidad geopolítica actual para avanzar en la unificación nacional. Entre las propuestas se incluía la creación de un mecanismo de enlace formal y la discusión de una hoja de ruta por etapas. Los representantes de China continental reiteraron que «la reunificación pacífica sigue siendo la mayor sinceridad, pero no se descarta ninguna opción».\n\nLa delegación taiwanesa, encabezada por el Kuomintang (KMT), se negó rotundamente a iniciar cualquier etapa de las conversaciones estructuradas de unificación. Citando la falta de consenso dentro de Taiwán, los delegados expresaron su profunda preocupación por la insistencia de China continental en un \"marco de un país\" y, en su lugar, pidieron \"un compromiso pragmático y el fomento de la confianza antes de cualquier debate político\".\n\nLa reunión finalizó en menos de dos horas, sin rueda de prensa y ambas delegaciones se retiraron temprano sin declaraciones formales.\n\nEl Ministerio de Asuntos Exteriores de Singapur lamentó el resultado de la reunión e instó a ambas partes a mantener abiertos los canales de comunicación, evitando la retórica que induce a la escalada de tensiones o los juicios erróneos."
 taiwan_detente.9.a: "Bueno, lo intentamos."
 taiwan_detente.10.t: "Decisión final"
 taiwan_detente.10.d: "A altas horas de la noche en Zhongnanhai, Xi Jinping se sentó solo en su oficina del Salón Qinzheng. Ante él se extendía un mapa descolorido del estrecho de Taiwán. Bajo la cruda luz, las líneas marítimas trazaban las fracturas de la historia.\n\nLos informes del Departamento del Estado Mayor Conjunto y de la Comisión Militar Central habían confirmado repetidamente: el momento clave para la reunificación pacífica había llegado. La opinión pública en la isla estaba profundamente dividida y la interferencia extranjera seguía intensificándose. Esperar más significaría perder por completo la iniciativa estratégica.\n\nDurante diez años, había evitado la confrontación, buscado un orden internacional estable y mitigado los riesgos. Pero el tiempo se había convertido en su mayor enemigo. La reunificación ya no era una opción política; era una decisión de vida o muerte para la integridad y el futuro de la nación. Comprendía los costos y las consecuencias de los sacrificios en el campo de batalla, la agitación económica, la creciente presión internacional e incluso los graves riesgos políticos. Sin embargo, la historia no esperaría.\n\n\"¿Riesgo?\" Miró a la noche. \"En los años revolucionarios, ¿cuándo avanzaron nuestros camaradas sin correr riesgos?\" El aire en Zhongnanhai se sentía gélido. En todo el país, todas las miradas parecían centradas en él.\n\n\"El destino nos ha dejado un solo camino\".\n\n\"Prepárense para la siguiente etapa\"."
 taiwan_detente.10.a: "Las puertas de la historia se abren."

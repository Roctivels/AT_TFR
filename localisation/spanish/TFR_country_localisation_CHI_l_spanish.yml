 taiwan.25.t: "La Séptima Flota permanece en Taiwán"
 taiwan.25.d: "Con el estallido de la guerra civil en Estados Unidos, la comunidad internacional sigue de cerca el estado de los despliegues militares estadounidenses en el extranjero. Recientemente, algunos buques de la Séptima Flota de EE.UU. continuaron operando cerca del estrecho de Taiwán, lo que complicó la situación regional.\n\nEl portavoz del Ministerio de Defensa chino afirmó que, a pesar de la agitación interna, EE.UU. continúa provocando incidentes por la cuestión de Taiwán, violando la política de una sola China, interfiriendo en los asuntos internos chinos y socavando la paz y estabilidad regionales. El portavoz también reafirmó que Taiwán es parte inseparable de China. El Ejército Popular de Liberación se mantiene en alerta y contrarresta cualquier acto de provocación para salvaguardar la soberanía nacional y la integridad territorial.\n\nLa Séptima Flota declaró que sus operaciones en la región panindopacífica continuarán con normalidad, haciendo hincapié en la libertad de navegación y declarando que continuará realizando actividades en aguas internacionales. El Departamento de Defensa de EE.UU. enfatizó que la misión de la Séptima Flota \"permanece inafectada por las circunstancias internas\".\n\nLos expertos criticaron a la Séptima Flota por mantener su presencia en torno al estrecho de Taiwán, lo que aumentó la incertidumbre y el riesgo de una interpretación errónea de la situación."
 taiwan.25.a: "Así son los hábitos."
 taiwan.26.t: "La Séptima Flota permanece en Taiwán"
 taiwan.26.d: "Con el estallido de la guerra civil en Estados Unidos, la comunidad internacional sigue de cerca el estado de los despliegues militares estadounidenses en el extranjero. Recientemente, algunos buques de la Séptima Flota de EE.UU. continuaron operando cerca del estrecho de Taiwán, lo que complicó la situación regional.\n\nEl portavoz del Ministerio de Defensa chino afirmó que, a pesar de la agitación interna, EE.UU. continúa provocando incidentes por la cuestión de Taiwán, violando la política de una sola China, interfiriendo en los asuntos internos chinos y socavando la paz y estabilidad regionales. El portavoz también reafirmó que Taiwán es parte inseparable de China. El Ejército Popular de Liberación se mantiene en alerta y contrarresta cualquier acto de provocación para salvaguardar la soberanía nacional y la integridad territorial.\n\nLa Séptima Flota declaró que sus operaciones en la región panindopacífica continuarán con normalidad, haciendo hincapié en la libertad de navegación y declarando que continuará realizando actividades en aguas internacionales. El Departamento de Defensa de EE.UU. enfatizó que la misión de la Séptima Flota \"permanece inafectada por las circunstancias internas\".\n\nLos expertos criticaron a la Séptima Flota por mantener su presencia en torno al estrecho de Taiwán, lo que aumentó la incertidumbre y el riesgo de una interpretación errónea de la situación."

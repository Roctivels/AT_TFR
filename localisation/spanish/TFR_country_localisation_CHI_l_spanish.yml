 taiwan.27.t: "Las tensiones entre China y Taiwán aumentan"
 taiwan.27.d: "El estrecho de Taiwán, durante mucho tiempo inactivo, ha vuelto a ser el centro de atención de la comunidad internacional. Tras la exitosa reelección de Tsai Ing-wen en las elecciones generales taiwanesas de 2020, el Ejército Popular de Liberación (EPL) intensificó rápidamente la presión militar sobre la isla, lanzando una operación a gran escala alrededor de Taiwán en febrero. Según informes de las autoridades taiwanesas, alrededor de 40 aviones del EPL realizaron vuelos en formación, algunos de los cuales cruzaron brevemente la línea de demarcación, lo que desencadenó un aumento de la alerta a ambos lados del estrecho.\n\nEsta maniobra militar se ha interpretado como una enérgica respuesta contra la administración de Tsai, que rechaza el \"Consenso de 1992\" y su firme postura sobre la identidad distintiva de Taiwán. El Ministerio de Defensa Nacional de Taiwán envió rápidamente aviones de combate para monitorear y repeler la aeronave intrusa, lo que puso a las agencias de seguridad nacional en alerta máxima. Mientras tanto, el Gobierno de Taipéi instó a Pekín a cesar sus provocaciones y reanudar el diálogo pacífico a través del estrecho.\n\nSin embargo, Pekín declaró que la operación era una contramedida necesaria contra las actividades independentistas y la injerencia extranjera, alegando que su objetivo era defender la soberanía nacional y la integridad territorial. La medida ha generado preocupación e inquietud generalizadas en la comunidad internacional. Expertos han advertido que, sin mecanismos de diálogo eficaces y marcos de gestión de crisis, el estrecho de Taiwán podría enfrentarse a una inestabilidad prolongada y a una escalada de riesgos."
 taiwan.27.a: "En el '62, fue Cuba. Hoy, es Taiwán."
 taiwan.28.t: "Las tensiones entre China y Taiwán bajan"
 taiwan.28.d: "El resultado de las elecciones generales de Taiwán de 2020 fue, como mínimo, inesperado. El candidato del Kuomintang, Han Kuo-yu, derrotó a la líder titular, Tsai Ing-wen, y ganó las elecciones con una ligera ventaja, convirtiéndose en el nuevo líder de Taiwán. Tras el anuncio de los resultados electorales, atrajeron la atención de inmediato y sorprendieron al pueblo taiwanés.\n\nLa victoria fue interpretada por los medios internacionales como un reflejo de las drásticas fluctuaciones en la opinión pública taiwanesa. Los expertos señalaron que las dificultades económicas y de subsistencia, la intensificación de la confrontación política y el descontento con las políticas del Gobierno actual en la región del estrecho se han convertido en las principales razones por las que los votantes se inclinan hacia las fuerzas conservadoras. El equipo de Han Kuo-yu afirma que esta victoria fue \"el deseo del pueblo de pan y paz\".\n\nChina continental expresó una \"evaluación positiva\" de los resultados electorales y mostró su buena voluntad, así como su disposición a reanudar las consultas e intercambios basados en el \"Consenso de 1992\". Taipéi ha entrado en una fase de reorganización política, y la dirección del PPD ha celebrado una reunión de emergencia.\n\nLa comunidad internacional ha llamado la atención sobre la situación e insta al nuevo Gobierno taiwanés a mantener el statu quo y salvaguardar la paz regional. Los Gobiernos de Japón, el Reino Unido y otros aliados de la OTAN pidieron una \"transición racional\" para evitar que la inestabilidad se propague a la región del Indopacífico."
 taiwan.28.a: "¿La luz al final del túnel?"
 taiwan.29.t: "China continental se opone a la victoria del PPD"
 taiwan.29.d: "Al finalizar las elecciones generales taiwanesas de 2020, Tsai Ing-wen, candidata del Partido Progresista Democrático, se alzó con la victoria. Los departamentos pertinentes de China continental reiteraron solemnemente que Taiwán ha pertenecido a China desde la antigüedad, y que el Estado nunca permitirá que la \"independencia de Taiwán\" divida el país ni que fuerzas secesionistas provoquen la secesión de Taiwán de China bajo ningún nombre ni por ningún medio.\n\nEl portavoz de la Oficina de Asuntos de Taiwán del Consejo de Estado condenó severamente a las autoridades del PPD por negarse a reconocer el \"Consenso de 1992\", desafiar abiertamente el principio de una sola China y socavar gravemente la paz y la estabilidad del estrecho de Taiwán. El portavoz enfatizó que la patria tiene la firme voluntad, la plena confianza y la capacidad suficiente para frustrar cualquier intento separatista de \"independencia de Taiwán\".\n\nPekín enfatizó que la cuestión de Taiwán es parte de los asuntos internos de China y que cualquier interferencia de fuerzas externas será combatida con firmeza. China continental advirtió que cualquier colusión y provocación entre las fuerzas independentistas de Taiwán y fuerzas externas será abordada con eficacia.\n\nLos analistas señalaron que, si bien el PPD continúa insistiendo en su postura separatista, la tendencia histórica es irreversible, la reunificación de la patria es imparable y cualquier acto de traición a la nación resultará en un completo fracaso."
 taiwan.29.a: "Sigan vigilando el estrecho, y apoyen todos los esfuerzos para la unidad nacional..."
 taiwan.30.t: "Ejercicios del EPL aumentan la tensión con Taiwán"
 taiwan.30.d: "La situación en el estrecho de Taiwán se vería afectada por los recientes ejercicios militares a gran escala del Ejército Popular de Liberación en el estrecho de Taiwán y las zonas marítimas y aéreas circundantes. Los ejercicios incluyen control conjunto, ataques de largo alcance y operaciones coordinadas por mar y aire, lo que representa uno de los entrenamientos de combate real más intensivos de los últimos años.\n\nEl portavoz del Ministerio de Defensa Nacional declaró que este ejercicio es una respuesta necesaria a los cambios actuales en la situación en el estrecho de Taiwán, con el objetivo de defender la soberanía nacional y la integridad territorial, así como de mantener la paz y la estabilidad regional. El portavoz destacó que el EPL continuará mejorando su capacidad de combate y contrarrestando todas las provocaciones separatistas e interferencias externas.\n\nLas autoridades taiwanesas acusarían a China continental de \"intensificar la tensión regional\", y el Ministerio de Defensa en Taipéi afirma haber monitoreado de cerca los ejercicios y haber aumentado su preparación para el combate para prevenir \"incidentes inesperados\".\n\nExpertos militares ilustran que, con el reciente deterioro de las relaciones entre ambos lados del estrecho, el riesgo de enfrentamientos armados sigue en aumento. La presión militar del EPL se considera una respuesta directa a la continua promoción de la \"independencia gradual de Taiwán\" por parte de las autoridades del PPD. Taipéi adoptaría una postura más firme y reforzaría su resistencia con el apoyo de fuerzas externas. Es probable que la estabilidad regional del estrecho se mantenga alta a corto plazo, lo que plantea serios desafíos para la estabilidad regional."
 taiwan.30.a: "Seguiremos monitoreando las actividades en el estrecho."
 taiwan.30.b: "Se hará lo necesario para defender la integridad territorial de China."

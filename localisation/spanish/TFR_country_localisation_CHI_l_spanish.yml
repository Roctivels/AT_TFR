 taiwan.35.t: "Réplicas"
 taiwan.35.d: "6:27 AM. \"[Air Defense Alert] Aviones enemigos entrantes. Busque refugio inmediato\". En la cuarta semana desde que la escuela fue suspendida abruptamente, Kai Chih-li se despierta con otra aguda advertencia de ataque aéreo, acompañada de nubes densas en un cielo a punto de llover bombas. Tres F-16 rugen hacia el cielo para interceptar, casi ahogando a la policía que grita: \"¡No uséis el ascensor, usad las escaleras!\"\n\n6:50 AM. \"[Air Defense Alert] Alerta de defensa aérea levantada. Informe objetos desconocidos a la policía o bomberos\". El estruendo cesa y los que buscan refugio salen ordenadamente para comenzar sus rutinas de guerra. Kai se apresura a la FamilyMart donde trabaja para prepararse para su turno de las 8 AM. Una docena de clientes ya esperan fuera, sosteniendo una mezcla de billetes, monedas y cupones de alimentos emitidos por el Gobierno. Nada fuera de lo común hoy, salvo que le han dicho que entrene al becario en la organización de cupones usados para su recogida.\n\n2:00 PM. \"Notificación de horario solar CWA - Luz solar suficiente hoy hasta las 6:35 PM\". \"Gerente Chen - Imprime 100 copias de esto y repártelos. Solicitud del Gobierno. PA20018583.pdf\". Hace dos horas aún mantenía una pequeña esperanza cuando la luz del sol se abrió paso, pero la actualización de CWA lo confirmó: no hay turno corto hoy. Decepcionado, le pide al becario que imprima los folletos mientras él regresa a la caja tras un breve descanso.\n\n6:50 PM. El tráfico civil de internet está restringido por los ISP para conservar ancho de banda y electricidad. Las farolas parpadean brevemente para evitar accidentes, aunque los coches son ahora raros debido al racionamiento de combustible. Caminando a casa, Kai ve un puesto con un mantel de camuflaje verde, como los de los festivales escolares. Curioso, se acerca. El encargado del puesto le hace señas para que se acerque. \"Estamos organizando grupos de defensa civil\", dice. \"Únete a nuestros programas de formación para identificar artefactos explosivos sin detonar y tratar heridas para apoyar a nuestros bomberos y paramédicos\".\n\n6:52 PM. Kai recoge un folleto y lee. Patrocinado por el Gobierno, voluntario, sin armas involucradas, no es una milicia ni una unidad de carne de cañón. Las preguntas frecuentes responden a la mayoría de sus dudas. Tras una pausa, respira hondo.\n\n6:57 PM."

 CHI_island_in_one_fate: "Isla en un destino"
 CHI_island_in_one_fate_desc: "Por primera vez en ochenta años, el pueblo de la isla se enfrenta a una invasión militar que desafía nuestra independencia y soberanía, amenazando con someternos por completo sin margen para la negociación. A pesar del partidismo que domina nuestra política y polariza a nuestra gente, mantener la independencia frente a Pekín es uno de los pocos puntos en común en los que la mayoría de nuestra población puede estar de acuerdo. Con todas las posibilidades de preservar un precario statu quo ahora reducidas, los conciliadores finalmente se han quedado sin excusas para hacer concesiones, y podemos empezar a dejar la política a un lado bajo la bandera de la defensa nacional."
 CHI_solidify_civil_defence: "Fortalecer la Defensa Civil"
 CHI_solidify_civil_defence_desc: "Como una isla densamente poblada, nuestra gente está constantemente expuesta a bombardeos de todo tipo. Nuestros coordinadores están saturados con la defensa militar, y nuestros servicios de emergencia, que están completamente desorganizados, no tienen la capacidad de llegar a todos los civiles que lo necesitan. Afortunadamente, podemos aprovechar nuestras organizaciones de defensa civil, que se han desarrollado durante más de sesenta años en caso de una improbable invasión china. Al combinarlas con nuestra amplia red de refugios antiaéreos, podemos aliviar la presión sobre nuestros sistemas de emergencia saturados y mantener a nuestros civiles a salvo de los horrores de la guerra."
 CHI_guerilla_strategy: "Estrategia de guerrilla"
 CHI_guerilla_strategy_desc: "No estamos en condiciones de enfrentarnos directamente al EPL. Estamos por detrás en número de hombres y equipo desplegados, experiencia y preparación, así como en doctrina y tácticas. Por lo tanto, en lugar de confrontar al EPL directamente, el Estado Mayor General ha decidido adoptar un enfoque diferente: la guerra de guerrillas. Aprovechando nuestro terreno, que incluye zonas urbanas densas, costas, montañas y bosques, podemos preservar nuestra capacidad de combate y evitar la destrucción total de nuestras fuerzas armadas desde el primer día. La combinación de guerra asimétrica, terreno desfavorable y un entorno complicado hará que los invasores paguen por cada centímetro que avancen en nuestro territorio."
 CHI_disrupt_transportation: "Revoluciona el transporte"
 CHI_disrupt_transportation_desc: "El EPL ha desembarcado y ahora está utilizando nuestros muelles y puertos para recibir equipo y suministros, que luego serán enviados a sus fuerzas en la línea del frente para reponer las pérdidas. Esto es completamente inaceptable. Afortunadamente, nuestros ingenieros han logrado colocar explosivos en las principales estructuras clave y carreteras de los puertos antes de retirarse, y nuestros misiles están listos para lanzar cargas que inutilicen los puertos, obligando al EPL a realizar semanas de reparaciones si quieren volver a ponerlos en funcionamiento. Durante este periodo, el EPL sufrirá escasez en sus campamentos y perderá su capacidad para iniciar ofensivas, y nosotros también tendremos la oportunidad de contraatacar, potencialmente eliminando unidades más pequeñas de ellos."
 CHI_hold_the_defence_line: "Mantén la línea de defensa"
 CHI_hold_the_defence_line_desc: "Como consecuencia de los bombardeos preventivos con misiles y navales, nuestras defensas, organización y comunicación están completamente desordenadas. Para inclinar las probabilidades a nuestro favor, debemos resistir las ofensivas más furiosas, intensas y sangrientas de las primeras semanas. Este retraso será una parte importante para restaurar nuestras capacidades logísticas y revivir nuestra estructura de mando desde el caos total. Para lograrlo, centraremos nuestros recursos en restaurar las comunicaciones y las conexiones de transporte, además de que nuestros ejércitos se enfoquen completamente en la defensa en lugar de buscar oportunidades arriesgadas para dañar a las fuerzas del EPL."
 CHI_appeal_to_the_free_world: "Llamar al mundo libre"
 CHI_appeal_to_the_free_world_desc: "Con Estados Unidos sumido en terribles luchas internas, el antiguo orden internacional se desmorona ante nuestros propios ojos. Sin embargo, eso no significa que las fuerzas democráticas de todo el mundo hayan caído junto con la antigua superpotencia, ya que muchos bastiones y faros alrededor del planeta aún mantienen las antorchas de la democracia. Algunos de ellos están dispuestos a apoyar a aliados ideológicos para evitar que su posición internacional se deteriore aún más. Los antiguos MNNAs, la OTAN restante, Corea del Sur y Canadá, por nombrar algunos, están dispuestos a hablar en nuestro nombre o incluso a actuar contra las fuerzas opresoras de la RPC en el escenario internacional."
 CHI_military_civilian_duty: "Deber cívico-militar"
 CHI_military_civilian_duty_desc: "Nuestra isla es pequeña y está abarrotada. Con poca o ninguna profundidad estratégica, el frente interno es la línea del frente. La RPC ha demostrado su desprecio por la seguridad de nuestros civiles al llevar a cabo una invasión tan arriesgada, y con las bajas civiles que ya se están reportando, podemos desmontar por completo la retórica derrotista que afirma que la \"reunificación\" será rápida y sin derramamiento de sangre. Con ellos fuera del camino, podemos empezar a trabajar para promover la unidad militar-civil, permitiendo que nuestra gente nos ayude en el funcionamiento de una sociedad en tiempos de guerra."
 CHI_grant_emergency_powers: "Conceder poderes de emergencia"
 CHI_grant_emergency_powers_desc: "El tiempo de guerra no es momento para procesos burocráticos largos que limiten la capacidad del poder ejecutivo para reaccionar rápidamente ante emergencias. Con el EPL a nuestras puertas, el presidente declarará el estado de emergencia, anunciará la ley marcial y otorgará al ejército más poder para controlar la situación. Las fuerzas del orden se integrarán temporalmente en las estructuras de mando militar para suprimir sabotajes y protestas colaboracionistas, así como para permitirles distribuir los recursos de manera más justa y eficaz mediante el uso de la fuerza."
 CHI_engineering_maintenance_brigade: "Brigada de mantenimiento de ingeniería"
 CHI_engineering_maintenance_brigade_desc: "Mientras los bombarderos y la artillería del EPL bombardean nuestro territorio, nuestras actividades económicas se ven interrumpidas o completamente paralizadas. Los sectores más afectados son la construcción y la infraestructura. Por temor a ataques dirigidos que puedan causar daños inmensos, las empresas constructoras y las compañías estatales que prestan servicios esenciales han detenido temporalmente todos los trabajos de edificación y mantenimiento, dejando a decenas de miles de trabajadores e ingenieros desempleados y, por tanto, incapaces de mantener a sus familias. Para aprovechar su experiencia a nuestro favor, podemos ofrecer oportunidades laborales que se consideren lucrativas incluso en tiempos de paz y establecer la brigada de mantenimiento de ingeniería. Esta unidad podrá apoyarnos en proyectos de ingeniería militar, permitiéndonos establecer rápidamente fortificaciones multilayer y atravesar entornos hostiles más rápido que las fuerzas comunistas."
 CHI_withdraw_foreign_exchange: "Retirar de divisas"
 CHI_withdraw_foreign_exchange_desc: "Aunque nuestras enormes reservas de divisas han mantenido nuestra economía robusta y nuestra moneda estable en tiempos de paz, el gran acopio de moneda extranjera también puede ser utilizado a nuestro favor en la defensa nacional y la estabilidad económica. Retirando partes de nuestras reservas, podemos intentar estabilizar el pánico financiero en curso, comprando activos y monedas vendidos para mantener nuestra economía algo funcional incluso durante una guerra. Además, también pueden utilizarse para adquirir equipo crítico y reponer pérdidas, manteniendo a nuestras fuerzas capaces de repeler a los invasores."
 CHI_unite_the_island: "Unir la isla"
 CHI_unite_the_island_desc: "La brutal invasión comunista ha alcanzado a todos los que llaman a esta isla su hogar. Desde Taipei hasta Kaohsiung, desde zonas urbanas hasta rurales, desde bosques de hormigón hasta tranquilos campos agrícolas, desde provincias de verde intenso hasta azul profundo, nada se salva de las llamas ardientes de la destrucción, y nadie puede ya llamar a este conflicto \"algo que no les concierne\". Debemos luchar contra los agresores. Si ellos pueden poner en riesgo monumental la vida y el bienestar de millones, ¿realmente podemos esperar que la llamada \"reunificación\" sea un beneficio real para nosotros? La isla debe luchar unida para tener una oportunidad de victoria, y una derrota garantizará la pérdida de nuestra libertad, nuestra democracia y nuestra conexión con nuestros aliados democráticos."
 CHI_wolf_pack_tactics: "Táctica de manada"
 CHI_wolf_pack_tactics_desc: "Como nación insular, nuestra industria pesquera es próspera y grande, empleando a decenas de miles de personas y a innumerables barcos pesqueros. Aunque el conflicto ha interrumpido su actividad y todos ellos están ahora atracados indefinidamente, el Estado Mayor ha propuesto un plan único para intentar romper el bloqueo impuesto por la Armada del EPL. Movilizando y requisando pequeñas embarcaciones civiles, podemos enviarlas a obtener recursos de nuestros socios comerciales para aliviar nuestras carencias. Gracias a su pequeño tamaño y velocidad relativamente alta, no solo son difíciles de detectar, sino que también pueden retirarse rápidamente y evitar ser hundidas. Aunque no serán capaces de importar lo suficiente para reiniciar la economía, los recursos tan necesarios pueden restaurar nuestros servicios más vitales, reforzando la moral de nuestra gente."
 CHI_phantom_legions: "Legiones Fantasma"
 CHI_phantom_legions_desc: "Nuestra fuerza aérea está claramente superada frente a la gran y avanzada flota de aviones del EPL, lo que provoca que nuestras tropas y edificios clave sean atacados constantemente por aviones de ataque y bombarderos día y noche. Aunque no podemos destruir su capacidad de bombardear, quizá podamos dirigir sus bombas hacia otro lugar. Nuestros comandantes han propuesto una idea interesante: emplear instalaciones señuelo por toda la isla, generalmente hechas con globos, tablones o materiales baratos similares, para confundir a la Fuerza Aérea del EPL y hacer que malgasten munición en objetivos falsos. Aunque pueda parecer poco convencional, nuestros ingenieros han informado que pueden hacerlo funcionar; solo necesitan nuestra aprobación para comenzar."
 CHI_taiwan_still_brave: "Taiwán, eterno"
 CHI_taiwan_still_brave_desc: "Después de haber superado las semanas más duras y peligrosas del conflicto, hemos logrado romper el plan original del EPL de derrotarnos y someternos rápidamente. No solo hemos sorprendido a los observadores internacionales que predijeron nuestra rápida derrota, sino que ahora el pueblo cree de todo corazón que la victoria no está fuera de alcance, y nuestras fuerzas armadas y civiles están unidos, listos para luchar contra el agresor que socava nuestro derecho a la autodeterminación. Con nuestra antorcha de la libertad aún ardiendo con fuerza, cada taiwanés puede decir con orgullo que Taiwán sigue siendo valiente y que no nos rendiremos."

 CHI_american_protection_idea: "Protección estadounidense"
 CHI_american_protection_idea_desc: "Confiando en la fuerza militar de las Fuerzas Armadas de la República de China, es claro que no podemos resistir al PCCh por nuestra cuenta. El mantenimiento de la paz depende enteramente de la política estadounidense, que dicta que el statu quo no debe ser alterado.\n\nLa Séptima Flota actúa como una fuerza estabilizadora, manteniendo la frágil paz a través del estrecho de Taiwán. Pero este poderoso escudo conlleva otra implicación: Una vez que se pierda este apoyo, el enemigo atracará inevitablemente."
 CHI_taiwanese_independence_movement_idea: "Movimiento independentista taiwanés"
 CHI_taiwanese_independence_movement_idea_desc: "\n\n\n\n£GFX_CHI_taiwanese_independence_movement_banner\n\n\n\n\n\nLa República de China, también conocida como Taiwán, ha sido referida en los años recientes como la \"República de China (Taiwán)\". Este nombre refleja la confusión ideología de la región. En efecto, ni si quiera somos reconocidos como un país por la comunidad internacional. Todo esto ha alimentado al movimiento independentista taiwanés.\n\nDesde su salida de la ONU, la posición internacional de la República de China se ha desplomado. Este declive ha estimulado la aparición de la consciencia local, que posteriormente tomó protagonismo durante el movimiento de democratización y en última instancia ganaron poder político.\n\nA pesar de esto, la mayoría de nuestra población aún apoya mantener el statu quo, haciendo que el camino hacia el cambio de nombre oficial sea lejano."
 CHI_taiwanese_independence_movement_2_idea: "Movimiento independentista taiwanés"
 CHI_taiwanese_independence_movement_2_idea_desc: "\n\n\n\n£GFX_CHI_taiwanese_independence_movement_banner\n\n\n\n\n\nLa República de China, también conocida como Taiwán, ha sido referida en los años recientes como la \"República de China (Taiwán)\". Este nombre refleja la confusión ideología de la región. En efecto, ni si quiera somos reconocidos como un país por la comunidad internacional. Todo esto ha alimentado al movimiento independentista taiwanés.\n\nDesde su salida de la ONU, la posición internacional de la República de China se ha desplomado. Este declive ha estimulado la aparición de la consciencia local, que posteriormente tomó protagonismo durante el movimiento de democratización y en última instancia ganaron poder político.\n\nA pesar de esto, la mayoría de nuestra población aún apoya mantener el statu quo, haciendo que el camino hacia el cambio de nombre oficial sea lejano."
 CHI_lower_mainland_influence_idea: "Influencia continental terrible"
 CHI_lower_mainland_influence_idea_desc: "\n\n\n\n£GFX_CHI_terrible_mainland_influence_banner\n\n\n\n\n\nEn el siglo pasado, hubo una vez en que nos mantuvimos en pie en la tierra de China, hasta el estallido de la guerra civil. Una serie de contratiempos por varios factores nos obligó a retirarnos a Taiwán, resultando en la pérdida de control del continente.\n\nCon el paso del tiempo, la República de China se ha convertido en un término histórico en las mentes de los chinos continentales. Aquellos que son conscientes de su existencia presentan habitualmente una opinión extremadamente negativa, mientras que nuestros partidarios son rechazados por seguir ideologías cómicas en el internet."

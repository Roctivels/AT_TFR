 CHI_low_international_recognition_idea: "Reconocimiento internacional mínimo"
 CHI_low_international_recognition_idea_desc: "En el panorama global, el estrecho de Taiwán se erige como el ejemplo de oposición irreconciliable, como el fuego y el agua, de coexistencia imposible. Somos tratados constantemente como la parte excluida, haciendo de nuestra participación en organizaciones internacionales un anhelo distante e imposible aspiración que otros dan por sentada.\n\nA pesar de esto, la naturaleza nos enseña que la vida siempre encuentra el camino. Ya sea mediante el uso de titulos regionales o por el esfuerzo de nuestros grupos cívicos, nuestra nación persiste en la lucha por encontrar canales indirectos de diplomacia multilateral, aunque estas vias continúen siendo limitadas."
 CHI_prc_embargo_low_idea: "Embargo chino"
 CHI_prc_embargo_low_idea_desc: "La ambigua estrategia de la presidenta Tsai ha demostrado ser ineficiente. Pekín sigue enfadado, forzando a nuestro Gobierno a responder, que llevó en última instancia a la suspensión total de los intercambios a través del estrecho, haciendo eco de la era de Chiang Kai-shek.\n\nMientras que el Gobierno ha trabajado en desarrollar mercados alternativos, los esfuerzos han sido insuficientes, dejando que la mayoría de la gente cargue con los duros efectos de las sanciones."

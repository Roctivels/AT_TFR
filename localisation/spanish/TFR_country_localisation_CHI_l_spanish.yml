 CHI_test_of_will_desc: "\n\n\n\n\n£GFX_CHI_test_of_will_banner \n\n\n\n\n\n\nHace más de 70 años, la sangrienta guerra civil en China llegó a su fin. Nuestro pueblo ha disfrutado de décadas de paz y prosperidad, pero no podía durar para siempre. El mundo está cambiando, radicalizándose, ardiendo, y parece que seremos una de las primeras víctimas de estas terribles circunstancias.\nLas viejas brasas olvidadas de la guerra civil resurge con renovado vigor, y no tardaremos en tener que defender nuestras vidas.\n§3                                Nuestro sol nunca debe apagarse.§!"

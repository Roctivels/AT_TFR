l_spanish:
 baath.1.t: "El baazismo vuelve a Irak"
 baath.1.d: "La Orden Naqshbandi bajo Izat Ibrahim al Duri - conocido como \"El Rey de Bastos\" durante la guerra de Irak - ha tomado el poder tras capturar con éxito la totalidad de Bagdad, venciendo tanto a milicias gubernamentales como islamistas durante la segunda guerra civil que ha asolado Irak en las últimas dos décadas. Izzat sirvió cómo el segundo al mando de Sadam Huseín y le sucedió en la dirección del Partido Baazista Iraki tras la ejecución de Sadam. Ahora que la presencia Americana en Medio Oriente ha colapsado, el Ejército Naqshbandi busca reestablecer las políticas Baazistas en Irak e informa que se está llevando a cabo una purga de los disidentes restantes. Ya han habido solicitudes para llevar a cabo represalias contra Irán por su fallida intervención previa a la guerra civil, y para vengar el legado de Sadam mientras el ultranacionalismo ve un resurgir mientras la rencorosa población iraquí clama por venganza contra el imperialismo occidental y desea el retorno de Irak a la grandeza de la era de Sadam. En su primer discurso televisado desde su llegada al poder, Izat ha prometido acabar con las rebeliones islamistas violentas financiadas por potencias extranjeras que asolan al país, la revitalización de la economía y la purga inmediata de cualquier remanente de intromisión occidental en el país."
 baath.1.a: "Parece que el baazismo está lejos de pasar de moda."
 baath.2.t: "Muerte de Izat Ibrahim al Duri"
 baath.2.d: "Tras unos pocos meses en el poder, Izat Ibrahim al Duri -la mano derecha de Sadam Huseín- ha muerto de forma repentina tras complicaciones con su larga lucha contra la leucemia que padecía. Aunque Izat ha vivido lo suficiente como para reestablecer el baazismo en Irak, su sucesión ha sido puesta en duda mientras el Partido Baaz se estremece tras lo que parece haber sido una lucha de poder menor para nominar un nuevo sucesor. Por el momento, se ha declarado una semana de luto nacional mientras la procesión fúnebre del fallecido Izat se llevó a cabo en su nativa ciudad de Tikrit en el Río Tigris, con la notable aparición personal de Bashar al-Ásad en su entierro y la presencia de varios líderes de diferentes partidos baazistas del mundo árabe."
 baath.2.a: "El Caballero de Baaz ha bajado de su caballo."
 baath.3.t: "Salah al-Mukhtar alcanza la presidencia iraquí"
 baath.3.d: "La crisis sucesoria ocurrida en Irak tras la muerte abrupta de su primer líder Baazista desde la caída de Sadam Huseín ha concluido con la decisión del ejército iraquí de apoyar a Salah al-Mukhtar, nuevo dirigente del Partido Baazista Iraquí, como nuevo presidente de Irak. En su primera aparición televisiva, al-Mukhtar ha prometido respetar los deseos de Izat para que Irak recupere su estatus global y para vengar el sueño de Sadam de unir Kuwait y Khuzestan con Irak, reviviendo la economía iraquí y guiando a Irak por un camino de patriotismo y nacionalismo por el camino. Quedará por ver si sus objetivos se cumplen mientras Irak continua su recuperación de otro conflicto civil."
 baath.3.a: "¡Prevaleceremos!"

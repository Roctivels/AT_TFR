 european_union.12.t: "Golpe de Estado en Grecia"
 european_union.12.d: "Con nuestro resurgimiento entre las grandes potencias europeas, hemos logrado una victoria monumental en nuestra búsqueda de expandir los ideales europeos. Debilitada ya por años de mala gestión económica, Grecia se tambaleaba prácticamente al borde del colapso total. La chispa finalmente se encendió después de que un Gobierno de ultraderecha no lograra consolidar el control, lo que provocó levantamientos masivos en todo el país. Con nuestra posición afianzada, ahora podemos establecernos en los Balcanes. El golpe fue rápido, con un derramamiento de sangre mínimo por parte de elementos radicales en el campo.\n\nAhora, bajo nuestra protección, Grecia se transformará en algo mejor. Se convertirá en un campo de pruebas donde podremos implementar ideas planeadas para el resto de los Balcanes. Además, también nos servirá de trampolín para integrar a las antiguas naciones yugoslavas. Muchos líderes de línea dura se han mostrado muy satisfechos con nuestros éxitos en Grecia. Especialmente Günther Fehlinger, quien, según se cita, dijo: \"Los serbios se rendirán. O volverán a ver bombas caer del cielo\". Aún queda mucho por hacer para difundir la idea paneuropea. Pero podemos estar tranquilos sabiendo que estamos un paso más cerca de convertir nuestros sueños en realidad."
 european_union.12.a: "#AcabarConLaNeutralidadBalcánica YA"
 european_union.13.t: "Comandos navales reintegrados"
 european_union.13.d: "Ahora que la situación se ha estabilizado, nuestros comandos navales del Atlántico, el Pacífico y Europa han regresado y están listos para servir."
 european_union.13.a: "Hemos tomado el control."
 european_union.14.t: "Redefiniendo lo europeo"
 european_union.14.d: "Ya SÉ que los eslavos no son realmente humanos y definitivamente no son europeos, pero sus mayores ciudades son mucho más liberales que el resto y algunos están dispuestos a servirle a la raza europea, ¿¿¿Así que a lo mejor deberíamos tenerlos en cuenta???. Ya nos encargaremos del resto más adelante."
 european_union.14.a: "Ha llegado el momento..."

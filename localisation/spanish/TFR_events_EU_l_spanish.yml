 european_union.9.t: "Suecia rechaza adherirse a la Unión"
 european_union.9.d: "¡El demente gobierno de [SWE.GetNameDef] ha rechazado nuestra invitación para que se unan de manera voluntario a la recientemente federalizada Unión Europea y siguió rechazando cualquier nueva demanda nuestra en la mesa de negociaciones! ¡Nuestros diplomáticos han llegado a la conclusión que la única manera de que vuelvan a sus sentidos será con una intervención militar inmediata y derribando el régimen autoritario allí, y lo haremos!"

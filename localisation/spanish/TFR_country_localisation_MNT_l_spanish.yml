l_spanish:
 MNT_conservative_party: "ZBCG"
 MNT_conservative_party_long: "Por el Futuro de Montenegro"
 MNT_authoritarian_democrat_party: "PDS"
 MNT_authoritarian_democrat_party_long: "Partido Democrático de Socialistas"
 MNR_stuck_between_east_and_west: "Atrapado ente el este y oeste"
 MNR_stuck_between_east_and_west_desc: "Montenegro se unió a la OTAN en 2017 y después de muchas trabas y obstáculos empezó las negociaciones para entrar en la Unión Europea para 2025. Este proceso fue altamente controversial en el país, especialmente con Rusia que daba vagas promesas de retaliación por la traición. La mayoría de los votantes prefieren la neutralidad antes que antagonizar a una aliada histórica, formular una política diplomática divisoria va a ser unos de los factores importantes en la supervivencia del partido de Đukanović."
 MNT_dejure_democracy: "La dictadura mas longeva de Europa"
 MNT_dejure_democracy_desc: "Las libertades personales son mas una sugerencia que algo puesto en práctica, con muchos periodistas siendo acosados y arrestados sin justificación legal previa y el sistema de justicia estando subdesarrollado desde la victoria del PDS en todas las elecciones celebradas desde 1991. Parece que la oligarquía sigue algo de moda en Podgorica."
 MNT_nationalized_church: "Iglesia estatizada"
 MNT_nationalized_church_desc: "La Ley sobre Religión, ratificada en diciembre de 2019, hacía sobre el papel que todas las propiedades de la Iglesia ortodoxa serbia pertenecieran al Gobierno montenegrino, culminando en cientos de protestas masivas que terminaron con infraestructuras bloqueadas y 17 diputados del Frente Democrático arrestados. Mientras que la mayoría de protestas han remitido, siguen habiendo varias manifestaciones pasivas siendo organizadas por el Metropolitano de Montenegro y la Eparquía de Budimlja y Nikšić, que continúan logrando el apoyo de los antiguos aliados conservadores de Đukanović contra el debido a su mala relación con la Iglesia. Mientras la Iglesia permanezca estatizada, la probabilidad de que Đukanović mantenga su Gobierno sigue bajando."
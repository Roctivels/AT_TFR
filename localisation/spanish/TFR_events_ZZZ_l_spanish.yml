 states.82.d7: "Se ha informado de ejecuciones masivas de civiles en la ciudad de Portland, ya que las fuerzas leales a la División Atomwaffen han iniciado recientemente operaciones en la ciudad."
 states.82.a: "Interesante."
 states.82.b: "¡Somos imparables!"

 generic.19.t: "[From.GetName] fue herido"
 generic.19.d: "Al concluir la batalla con éxito, parece que [From.GetRank] [From.GetName] se arriesgó demasiado al frente de sus hombres. Está herido, y es probable que las heridas tarden un tiempo en sanar por completo, hasta entonces no podrá rendir a su nivel habitual."
 apla.8.t: "Toma del Área 51"
 apla.8.d: "Nuestro asalto a la base aérea del Área 51 fue un éxito rotundo. El campo de aviación cayó sin mucha resistencia, lo que resultó bastante extraño debido a la historia y la infamia del lugar. Pocas horas después del anochecer, varias unidades de los alrededores del Área 51 informaron de luces extrañas y anomalías. Estos informes fueron descartados como cuentos de niños hasta que las unidades de mando con historias similares sin medios posibles de corroborar con otras unidades para crear una historia falsa."
 apla.8.a: "Turbio."
 apla.9.t: "Barrido del Área 51"
 apla.9.d: "Los comandantes de brigada no pudieron resistir la tentación de saquear los archivos de alto secreto de las bases aéreas con la esperanza de encontrar un documento que demostrara la existencia de extraterrestres. El aumento de los informes sobre ovnis aumentó el deseo de encontrar algún tipo de prueba. Desgraciadamente, lo único que encontraron fueron varios montones de cenizas por toda la base. No había pasadizos secretos y lo único que había en los hangares eran piezas de repuesto de reactores."
 apla.9.a: "Yo quiero creer."

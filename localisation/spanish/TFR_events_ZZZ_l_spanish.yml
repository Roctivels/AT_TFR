 states.80.d5: "Cuando el Ejército Popular de Liberación Americano marchó hacia Sacramento, la Milicia del Estado de California no fue rival para sus bien armadas y decididas fuerzas. El partido comunista había recuperado popularidad en Estados Unidos desde la recesión de 2008, y su mensaje de igualdad y justicia resonaba en muchos estadounidenses, especialmente en los de California.\n\nLa victoria del EPLA en Sacramento supone un importante golpe para la Milicia Estatal de California (MEC), y señala el principio del fin del grupo miliciano. Los expertos internacionales predicen que en los próximos meses las fuerzas del EPLA expulsarán lenta pero firmemente al CSM de la ciudad, y vaticinan la toma completa de California por parte del EPLA para finales de año."

 states.66.t: "¡La Armería Estatal de Palmetto es asegurada!"
 states.66.d: "En una ofensiva reciente, nuestras fuerzas terrestres lograron capturar la valiosa Armería Estatal de Palmetto, una de las principales plantas de manufactura civil."
 states.66.a: "Excelente."
 states.67.t: "¡Se ha perdido la Armería Estatal de Palmetto!"
 states.67.d: "En una batalla reciente contra fuerzas hostiles, hemos perdido el control de la Armería Estatal de Palmetto. Sin duda, se beneficiarán enormemente de esta victoria..."
 states.67.a: "¡Debemos recuperarla!"
 states.73.t: "Batalla de Seattle"
 states.73.d: "Las fuerzas de Cascadia han invadido Seattle"
 states.73.a: "Interesante."
 states.73.b: "¡Somos imparables!"
 states.74.t: "¡Instalaciones de Lockheed Martin aseguradas!"
 states.74.d: "En una ofensiva reciente, nuestras fuerzas terrestres lograron capturar una instalación de Lockheed Martin. ¡Nuestro dominio en el aire estará asegurado en poco tiempo!"
 states.74.a: "¡A los cielos!"
 states.75.t: "¡Instalación de Lockheed Martin perdida!"
 states.75.d: "En una batalla reciente contra fuerzas hostiles, hemos perdido el control de la instalación de Lockheed Martin. Sin duda, se beneficiarán enormemente de esta victoria..."
 states.75.a: "¡Debemos recuperarla!"
 states.76.t: "¡Armería de Rock Island asegurada!"
 states.76.d: "En una ofensiva reciente, nuestras fuerzas terrestres lograron capturar la Armería de Rock Island, el principal arsenal de los Estados Unidos, especializado en la fabricación de armas ligeras y pesadas."
 states.76.a: "¡Excelente!"
 states.77.t: "¡Armería de Rock Island perdida!"
 states.77.d: "En una batalla reciente contra fuerzas hostiles, hemos perdido el control de la Armería de Rock Island. Sin duda, se beneficiarán enormemente de esta victoria..."
 states.77.a: "¡Debemos recuperarla!"
 states.78.t1: "Batalla de Boston"
 states.78.t2: "¡La Asociación de los Libres captura Boston!"
 states.78.t3: "Batalla de Boston"
 states.78.t4: "Batalla de Boston"
 states.78.t5: "Batalla de Boston"
 states.78.t6: "Batalla de Boston"
 states.78.t7: "¡Masacre en Boston!"
 states.78.d1: "Fuerzas terrestres del Frente Patriota han confirmado que la ciudad de Boston ha caído bajo su control."
 states.78.d2: "Noticias importantes llegan hoy desde América, ya que la Asociación de los Libres ha capturado la ciudad costera de Boston. La batalla por tomar la ciudad de Boston ha sido, según declaraciones tanto de las fuerzas defensoras como de las atacantes, un esfuerzo largo, sangriento y brutal. Según los informes, la ofensiva para tomar la ciudad ha sido una de las más intensas en todo el frente de la costa este durante la Segunda Guerra Civil Americana. Grandes sectores de la ciudad han sido arrasados, ya que la guerra urbana caótica ha transformado el paisaje hasta volverlo irreconocible para muchos. Muchos dudaban que las formaciones milicianas anarquistas fueran capaces de causar tal nivel de destrucción en una ciudad importante, pero han sido completamente desmentidos. Las fuerzas de la AoTF utilizaron granadas, cócteles molotov, explosivos improvisados y otras armas para limpiar incluso las posiciones defensivas más pequeñas dentro de la ciudad. Según los informes posteriores entregados por los paramilitares de la AoTF, y la escasa información facilitada a la prensa, los anarquistas tuvieron que avanzar casa por casa, limpiando cada piso individualmente, ya que los defensores de la ciudad se habían atrincherado en prácticamente todos los espacios habitables. Los relatos civiles han pintado un panorama aún más caótico: muchos afirman que Boston ahora se asemeja a un \"Stalingrado en la costa este\". Las fuerzas de la AoTF han anunciado públicamente que la captura de Boston servirá como una base importante para avanzar sobre el resto de la región. Parece que la guerra por América no hará más que intensificarse..."
 states.78.d3: "Fuerzas terrestres leales a Donald Trump han confirmado que la ciudad de Boston ha caído bajo su control."
 states.78.d4: "Fuerzas terrestres leales a Joe Biden han confirmado que la ciudad de Boston ha caído bajo su control."
 states.78.d5: "El comunicado de EPLA anuncia la liberación de la ciudad de Boston."
 states.78.d6: "Las fuerzas neonazis han anunciado la liberación de la ciudad de Boston."
 states.78.d7: "Se han registrado ejecuciones masivas de civiles fuera de la ciudad de Boston, ya que fuerzas leales a la División Atomwaffen han iniciado recientemente operaciones en la ciudad."
 states.78.a: "Interesante."
 states.78.b: "¡Somos imparables!"

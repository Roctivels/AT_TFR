 states.82.d5: "Importantes noticias llegan hoy desde América, ya que el EPLA ha capturado con éxito la ciudad de Portland, en Oregón, en la Costa Oeste. Al parecer, la batalla por la ciudad ha sido una de las más intensas en el teatro occidental de la 2ª guerra civil estadounidense. La guerra urbana dominó el empuje para capturar la ciudad, ya que bloques enteros de apartamentos y edificios fueron levantados con granadas, cócteles molotov, explosivos, artillería y otras armas. Según los informes posteriores a la acción, la infantería del EPLA tuvo que ir casa por casa, despejando cada piso individualmente, ya que los defensores de la ciudad se atrincheraron en casi todas las casas y apartamentos de la ciudad. Muchos civiles de la zona han informado a múltiples medios de prensa de que las condiciones eran similares a las de un \"Stalingrado en la Costa Oeste\". Los portavoces oficiales del EPLA han anunciado que la captura de la ciudad acelerará sus operaciones para asegurar el resto de la Costa Oeste americana. De momento, parece que la guerra por América no hará más que aumentar en intensidad..."

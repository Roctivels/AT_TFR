 states.43.t: "Ningún hombre queda atrás"
 states.43.d: "Las milicias locales y la Guardia Nacional de Georgia ofrecieron una dura defensa en la ciudad de Albany. Imágenes del combate captaron una breve pero poderosa historia de camaradería. Devon Burnam, soldado raso de la Milicia Ligera de Georgia, fue alcanzado en la pierna por un francotirador desconocido. Segundos después, el sargento Thomas Shultz corrió hacia su compañero herido y lo arrastró por la mochila calle abajo. Instantes después, Thomas cayó al suelo cuando el francotirador disparó una segunda vez, alcanzándolo en el pecho. El informe posterior a la acción declaró que ambos hombres yacieron en la calle, desangrándose durante varias horas antes de que los refuerzos recuperaran sus cuerpos."
 states.43.a: "Nadie tiene mayor amor que este: que uno dé su vida por sus amigos."
 states.44.t: "TRANSMISIÓN ENTRANTE"
 states.44.d: "SOLDADO ENEMIGO NO IDENTIFICADO\n\"Alex, no hagas esto, no lo hagas, cancela el ataque, de cualquier forma, Alex, tú y yo vamos a morir. ¿Cuál es el sentido de todo esto? ¿Quién va a ganar esto? No vamos a sobrevivir, ¿lo entiendes? Si nos vemos en batalla, no te mostraré piedad así como tú no lo harás, ¿lo entiendes? Es mejor que vengas a mí como invitado. Retira a tus hombres, ten piedad por sus madres, ten piedad por ustedes, retíralos\".\n\nALEX\n\"Sabes que no puedo dar esa orden\".\n\nSOLDADO ENEMIGO NO IDENTIFICADO\n\"Alex, desde el fondo de mi corazón, deseo que sobrevivas a esto, retira a tus hombres\".\n\nALEX\n\"No tengo opción, tengo mis órdenes y las cumpliré pase lo que pase\"."
 states.44.a: "FIN DE LA TRANSMISIÓN"
 states.53.t: "Batalla de Phoenix"
 states.53.d: "Un informe oficial de la APL ha anunciado la liberación de la ciudad de Phoenix, Arizona. En una serie de ofensivas exitosas contra las Fuerzas Terrestres de EE.UU. leales a Trump, la ciudad fue tomada tras intensos combates que duraron varias semanas. Las divisiones de la EPLA atacaron desde el sur, tomando rápidamente el aeropuerto Gateway de Phoenix-Mesa, donde luego varias brigadas más iniciaron el asalto principal a la ciudad desde el oeste. Se estima que las bajas ascienden a casi quince mil en total entre ambos bandos. Las fuerzas estadounidenses enviaron varias brigadas adicionales para reforzar a los defensores diezmados, pero se retiraron rápidamente de la ciudad una vez que sus líneas fueron superadas."
 states.53.a: "Interesante desarrollo."
 states.53.b: "¡Un paso más cerca de la victoria!"
 states.53.c: "¡Reúnanse en torno a la bandera!"
 states.54.t: "Batalla de Salt Lake City"
 states.54.d: "El comunicado del EPLA ha anunciado la liberación de Salt Lake City, Utah. Las defensas de la ciudad fueron reforzadas por varias brigadas de voluntarios formadas por miembros de la comunidad mormona local. La ciudad había sido blanco de incesantes bombardeos con drones y ataques de artillería del EPLA durante incontables días, hasta que las fuerzas terrestres iniciaron el asalto para tomarla. Los combates comenzaron en los alrededores de Provo, con el objetivo de asegurar un aeródromo vital. A partir de ahí, columnas mecanizadas avanzaron por la autopista I-15 en un intento por dividir la ciudad en dos. Incontables videos fueron subidos a internet mostrando decenas de tanques y vehículos mecanizados del EPLA siendo destruidos por misiles TOW. En una ocasión, toda una brigada mecanizada fue aniquilada en un ataque desesperado contra el Capitolio del Estado de Utah. A pesar de que el EPLA afirma tener control total de la ciudad, siguen apareciendo videos de defensores agotados dentro de Salt Lake, y tampoco se ha publicado un informe oficial sobre el número total de bajas."
 states.54.a: "Desarrollo interesante."
 states.54.b: "¡Somos imparables!"
 states.54.c: "¡Detendremos a esos malditos comunistas en Denver!"
 states.56.t: "Batalla de Austin"
 states.56.d: ""
 states.56.a: "Interesante."
 states.57.t: "¡Masacre en Tampa!"
 states.57.d: "Siguen llegando noticias de pesadilla de la ciudad de Tampa, Florida, cuando las fuerzas de la División Atomwaffen han proclamado su victoria sobre la Guardia Nacional de Florida. Se han visto civiles ahorcados y docenas de ejecuciones públicas por toda la ciudad. Los soldados de la Guardia Nacional fueron rápidamente asesinados tras su rendición, tal y como mostraron docenas de vídeos de go-pro propagandísticos de la División Atomwaffen. Miles de civiles huyeron de la ciudad en todas direcciones para escapar de los horrores del grupo, provocando atascos masivos y retrasando la llegada de refuerzos a la ciudad. Las estimaciones varían, aunque lo más probable es que se haya llegado al consenso de que la Guardia Nacional sufrió cuatro mil bajas en la defensa de la ciudad y unos cientos más en ejecuciones."
 states.57.a: "Santo Dios."
 states.57.b: "¡Somos imparables!"
 states.58.t: "Segunda batalla por Salt Lake City"
 states.58.d: "Las fuerzas terrestres pro-Trump han anunciado su victoria sobre las fuerzas del EPLA en Salt Lake City. Las fuerzas estadounidenses comenzaron una campaña de expulsión de las fuerzas de EPLA de las ciudades circundantes. South Ogden y Kaysville fueron testigos de fuertes combates. Aunque al principio las fuerzas del EPLA no eran conscientes de que estaban intentando activamente ser expulsadas del sector. Ambos bandos reunieron un gran número de hombres y equipos para la batalla que se libraría en la región. Se inició un ataque en dos frentes desde el norte y el sur. Las fuerzas del EPLA se vieron abrumadas por el inesperado fuego de artillería pesada y los constantes y precisos ataques aéreos. La ciudad cayó por segunda vez en [GetDateText]. Todavía se están contando las bajas, aunque se calcula que las fuerzas del EPLA sufrieron más de veinte mil muertos y heridos durante la primera batalla, la insurgencia subsiguiente dentro de la ciudad y la segunda batalla. Las fuerzas estadounidenses se han estimado en cerca de quince mil. El presidente Trump pronunció un discurso de agradecimiento a los defensores de Salt Lake y concedió varias medallas de honor a soldados excepcionales."
 states.58.a: "Desarrollo interesante."
 states.58.b: "¡Reagrúpense, camaradas!"
 states.58.c: "¡Se rompe la utopía de la izquierda!"

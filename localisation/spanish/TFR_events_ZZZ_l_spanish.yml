 iran.1.t: "¡Qasem Soleimani asesinado!"
 iran.1.d: "El Gobierno iraquí ha informado de que nuestro querido general Qasem Soleimani ha sido asesinado a las afueras del Aeropuerto Internacional de Bagdad. Según el informe, el vehículo en el que viajaba fue alcanzado por un ataque aéreo. El único culpable que vemos son los estadounidenses."
 iran.1.a: "¡Pagarán!"
 iran.2.t: "Avión comercial ucraniano derribado"
 iran.2.d: "Las tensiones entre nosotros y Occidente continúan aumentando. El CGRI ha informado del derribo accidental de un avión civil ucraniano. El avión cayó rápidamente a tierra envuelto en llamas. Los 167 pasajeros, incluida la tripulación, murieron."
 iran.2.a: "Un error imperdonable."
 iran.3.t: "Terremoto en Khoy"
 iran.3.d: "Los sismólogos han detectado un terremoto de 4,7 grados cerca de la frontera con Turquía y de la ciudad de Khoy. La mayor parte de los daños registrados han afectado principalmente a la ciudad turca de Van, con destrozos menores en Khoy. Diez civiles han muerto y otros 141 han resultado heridos."
 iran.3.a: "Que Alá nos de fuerzas."
 iran.4.t: "Primeros casos de COVID-19"
 iran.4.d: "Los hospitales de Teherán informan de un aumento de pacientes con neumonía grave. La mayoría de los pacientes tienen más de 40 años y algunos rondan los 30 años."
 iran.4.a: "Debemos prepararnos."
 iran.5.t: "El vicepresidente da positivo"
 iran.5.d: "Hoy temprano, el vicepresidente Eshaq Jahangiri dio positivo en la prueba de COVID-19. Ya se están tomando medidas y se lo ha internado en cuidados intensivos."
 iran.5.a: "Que Alá le de fuerzas."
 iran.6.t: "Hombre vuelve a dar positivo en un test televisivo en directo"
 iran.6.d: "Un hombre se había recuperado de COVID-19 y había sido dado de alta del hospital. Los periodistas se acercaron rápidamente a él para una entrevista. En un golpe de mala suerte increíble, los médicos apartaron al hombre de los periodistas y lo llevaron de nuevo al hospital diciendo: \"No está a salvo\"."
 iran.6.a: "¿Qué está pasando?"
 death_of_soleimani: "§REl Gran Satán ha atacado, matando a uno de nuestros hombres más valiosos.§!"
 gang.7.t: "Guerra de pandillas en California"
 gang.7.d: "El estado de California está informando de un aumento de las actividades relacionadas con las pandillas en todo el estado. Las autoridades locales están seguras de que el reciente estallido está relacionado con el colapso de la alianza entre las pandillas Norteños y Sureños. Sus afiliados han empezado a hacer lo que les ordenen, incluida la Hermandad Aria, que extrañamente se ha aliado con los Sureños, los Crips y los Bloods."
 gang.7.a: "Ellos pueden manejarlo."
 nk.18.a: "No tenemos más opción."
 states.22.t: "Duelo de tanques en Louisville"
 states.22.d: "A través de canales internacionales, se han filtrado vídeos de un supuesto duelo de tanques entre dos M1 Abrams estadounidenses durante la batalla de Louisville. El primer Abrams, leal al Gobierno de Denver y creador de películas aficionado conocido como JTAmerica76, entró en la intersección vacía de South 8th Street tras la toma del Centro Judicial del Condado de Jefferson y procedió a enfrentarse a unas fuerzas del Gobierno de D.C. que se retiraban. Varios segundos después, un segundo Abrams entra en escena y, tras unos segundos de no poder localizarlo por radio, se descubre que el tanque es leal al Gobierno de Washington. \n\nTras un breve momento de confusión, se ve al segundo tanque disparar una bala justo por encima de la cámara, seguido de un disparo de respuesta del primer tanque, que impacta justo debajo del cañón y hace que el segundo tanque estalle en llamas. A continuación, la cámara se desplaza hasta el comandante del primer tanque, identificado como Chad Blackburn, hijo de la senadora Marsha Blackburn, a quien se ve rezando. \nAunque el Gobierno de Washington todavía no ha respondido a este vídeo, muchos usuarios en línea han demostrado su autenticidad mediante imágenes de la cáscara en llamas tendida en las calles de Louisville."
 states.22.a: "Louisville quedará marcada para siempre."
 states.22.b: "¡Patriotas haciendo lo que se debe hacer!"
 states.22.c: "¡¡¡Más propaganda trumpista!!!"
 states.22.e: "La muerte de la supuesta invicibilidad estadounidense..."
 states.22.f: "El único punto débil del Abrams era él mismo"
 states.23.t: "La batalla por Washington D.C."
 states.23.d: "A medida que el polvo se asienta sobre la otrora prístina capital, parece que el presidente, el ahora legitimado cincinato del sueño americano, Donald J. Trump, ha sido capaz de desviar a los leales a Biden de las afueras de la ciudad. \n\nEn un discurso dirigido a sus soldados en la escalinata del edificio de la capital, el lugar donde se habían certificado las elecciones apenas unos años antes, Trump se levantó desafiante, proclamando: \"¡Los verdaderos patriotas de América han drenado el Pantano! Nuestro asombroso ejército ha retomado la bendita y asombrosa ciudad de nuestros antepasados, y al igual que el presidente Jackson antes que yo, ¡hemos demostrado a nuestro enemigo que no se nos puede subestimar! ¡Apuesto a que Joe el Dormilón no esperaba que llegáramos tan lejos! ¡Le estamos dando a la gente de esta gran nación un sueño digno de apreciar! Un sueño en el que los americanos se sientan orgullosos de su país\". \nCon el júbilo resonando por todas las ciudades del corazón de América, un sentimiento de vigor y patriotismo ha golpeado al pueblo estadounidense, pero junto a él, un dolor y una rabia por la destrucción de tan preciosos monumentos y celebraciones del espíritu estadounidense. Desde el saqueo de D.C. en 1812, la capital estadounidense nunca había sido testigo de tal destrucción."
 states.23.a: "El Gobierno de D.C. ha perdido a D.C."
 states.23.b: "¡Que Dios bendiga a América!"
 states.23.c: "¡Esto no puede estar pasando!"
 states.24.t: "Éxito de la operación Roaring Eagle"
 states.24.d: "A las 14:00 horas, recibimos la noticia de que las fuerzas especiales que habían sido enviadas para asegurar la Casa Blanca antes que los regulares del ejército habían tomado el edificio con un número mínimo de bajas. \n\nAunque entramos en contacto con varios agentes del Servicio Secreto fuertemente armados que quemaban pilas de documentos en los pasillos, no se encontró a ningún miembro del Gobierno de Washington D.C. residiendo en el edificio."
 states.24.a: "¡No hay otro lugar a donde correr, Liberal!"
 states.25.t: "Operación Talón Preciso Fallida"
 states.25.d: "A las 12:17 horas, recibimos la noticia de que las fuerzas especiales que habían sido enviadas para asegurar el Pentágono antes que los regulares del ejército habían tomado el edificio con un elevado número de bajas y la pérdida de los niveles subterráneos del Pentágono. \n\nAl entrar en contacto inmediato con múltiples escuadrones de soldados fuertemente armados, nuestras fuerzas intentaron laboriosamente tomar el Pentágono oficina por oficina. Sin embargo, justo antes de llegar a la llamada \"Entrada del Río\", una explosión masiva sacudió el edificio, mientras el suelo bajo el edificio parecía implosionar. \n\nAunque el edificio fue asegurado, la información que se guardaba bajo el Pentágono, ya fueran las tácticas empleadas por las fuerzas unionistas o posibles espías y colaboradores, se ha perdido para siempre."
 states.25.a: "Aún tenemos el edificio."
 states.26.t: "La batalla por Sacramento"
 states.26.d: "A medida que el humo se disipa sobre la capital de California, parece que el mismísimo General Rojo, Michael Prysner, ha expulsado con éxito a las fuerzas de la Guardia Nacional del corazón de la ciudad. El Ejército Popular de Liberación Americano controla ahora Sacramento. \n\nDe pie sobre un vehículo blindado de transporte de personal frente al edificio del Capitolio, donde hace sólo unos años los legisladores estatales debatían las políticas capitalistas, Prysner se dirigió a sus tropas triunfantes: \"¡Camaradas! ¡Los trabajadores de América han roto sus cadenas! Nuestro valiente Ejército Popular ha liberado este bastión de la opresión burguesa. Los perros capitalistas se acobardaron tras sus preciados beneficios, ciegos ante la creciente marea de conciencia de clase. Pero ahora, camaradas, forjamos un nuevo destino, no con oro, sino con la férrea voluntad de los trabajadores. Del suelo de la fábrica al campo fértil, todos trabajarán y cosecharán como iguales. Los engranajes de la industria no giran para unos pocos, sino para muchos\". \n\nA medida que se difunde la noticia de la victoria, muchos en todo el mundo se preguntan, ¿infectará por fin el comunismo a América?"
 states.26.a: "¿Una América roja?"
 states.26.b: "¡El pueblo es imparable!"
 states.26.c: "Que Dios nos ayude."
 states.27.t: "La segunda batalla de Sacramento"
 states.27.d: "Las fuerzas terrestres de Estados Unidos han anunciado el fin de la anarquía en Sacramento. Las ofensivas combinadas de las milicias locales y las brigadas del ejército rompieron las defensas del Ejército Popular de Liberación Americano. Muchos milicianos del EPLA se rindieron en masa, mientras que los duros defensores lucharon hasta que sus grupos de combate quedaron prácticamente aniquilados. La ofensiva de las fuerzas federales sembró el pánico entre miles de civiles, provocando un éxodo masivo de casi 200.000 personas."
 states.27.a: "Interesante desarrollo."
 states.27.b: "Que Dios nos ayude."
 states.27.c: "¡Empújalos hacia el mar!"
 states.28.t: "La Batalla de Portland"
 states.28.d: "Según el ala de Prensa Extranjera del Ejército Popular de Liberación Americano, la ciudad de Portland está ahora totalmente bajo el control de los comunistas.\n\nLos informes indican que las fuerzas del EPLA comenzaron su asalto a la ciudad a principios de esta semana, abrumando a los defensores y tomando edificios clave del gobierno, incluyendo el Ayuntamiento y la sede de la policía. Al parecer, el alcalde de la ciudad fue detenido por las fuerzas del EPLA poco después de que comenzara el ataque.\n\nEs probable que la toma de Portland tenga también importantes repercusiones en el resto del país. Portland, ciudad conocida por su política Progresista y su fuerte apoyo a las causas de izquierda, ha sido durante mucho tiempo un centro de resistencia a las políticas del gobierno. Es probable que la toma de la ciudad por parte del EPLA inspire a otros grupos de izquierda de todo el país y podría provocar un aumento del apoyo a la causa del EPLA."
 states.28.a: "Interesante desarrollo."
 states.28.b: "¡Somos imparables!"
 states.28.c: "Que Dios nos ayude."
 states.29.t: "La segunda batalla de Portland"
 states.29.d: "El Ejército de Estados Unidos ha anunciado recientemente que ha iniciado operaciones para recuperar la ciudad de Portland de las milicias comunistas antiamericanas. Los primeros informes de combate procedían de frenéticos milicianos de EPLA que recibían por radio fuego directo y preciso de combatientes desconocidos. Varios escuadrones de las Fuerzas Especiales fueron lanzados sobre la ciudad y los suburbios vecinos para cortar la comunicación entre las brigadas que defendían las afueras de la ciudad. A la mañana siguiente, brigadas mecanizadas entraron en varios suburbios y empezaron a recuperarlos lentamente uno a uno. Ante los asaltos mecanizados, blindados y aéreos, los defensores comunistas de la ciudad empezaron a rendirse en masa. Aunque muchos continuaron luchando y mantuvieron una defensa brutal en el centro de la ciudad, donde se perdieron muchos vehículos mecanizados."
 states.29.a: "Interesante."
 states.29.b: "¡Sigan luchando, camaradas!"
 states.29.c: "¡No se detengan ahora!"
 states.30.t: "[Root.GetName] declara ilegal la administración Trump"
 states.30.d: "Interesante desarrollo."
 states.30.a: "Otro bache en la carretera."
 states.31.t: "[Root.GetName] declara ilegal la administración Biden"
 states.31.d: "Interesante desarrollo."
 states.31.a: "Otro bache en la carretera."
 states.34.t: "Las milicias retoman Portland"
 states.34.d: "Varias milicias del Estado de Oregón han coordinado con éxito un asalto a la ciudad de Portland y se la han arrebatado al Ejército Popular de Liberación Americano. Las operaciones comenzaron al amanecer y los escuadrones avanzaron rápidamente a través de las afueras indefensas hasta que finalmente se encontraron con la resistencia organizada comunista y antifascista en los suburbios de la ciudad. El avance fue lento, cada edificio necesitó un barrido exhaustivo para asegurarse de que todos los defensores estaban muertos o se habían rendido. Portland sigue siendo un foco de sentimiento anti-conservador. Los alborotadores y manifestantes no tardaron en salir a la calle y detener el avance de los milicianos. Los asaltos a milicianos por parte de civiles al azar son frecuentes por la noche. Llevará mucho más tiempo reprimir totalmente la resistencia dentro de la ciudad."
 states.34.a: "Interesante."
 states.34.b: "¡Sigan luchando, camaradas!"
 states.34.c: "¡No se detengan ahora!"
 states.35.t: "La batalla de Los Ángeles"
 states.35.d: "La declaración de varias milicias y organizaciones criminales definiendo abiertamente su territorio ha provocado una total agitación y anarquía en California. En medio del caos, las reminiscencias de la Guardia Nacional de California han iniciado medidas para retomar la ciudad de Los Ángeles. La decisión es radical para retomar la mayor área metropolitana mientras lo que queda del gobierno estatal intenta estirarse todo lo posible."
 states.35.a: "Interesante."
 states.35.b: "¡Sigan atacando!"
 states.35.c: "¡Defiendan la ciudad hasta el final!"
 states.38.t: "La batalla por Macon"
 states.38.d: "Nuestras fuerzas terrestres han hecho avances significativos en las últimas horas. La batalla por Macon ha comenzado."
 states.38.a: "Entendido."

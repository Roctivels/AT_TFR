 CAN_trudeau_resign: "Futuro de Trudeau"
 canada.11.t.1: "Conservadores vencen a Trudeau en elecciones anticipadas"
 canada.11.t.2: "Conservadores triunfan en Canadá"
 canada.12.d.1: "Justin Trudeau y el Partido Liberal de Canadá ganaron por un estrecho margen unas elecciones federales anticipadas, aferrándose al poder a pesar de la impopularidad generalizada y las crecientes controversias. Anteriormente aclamado como un líder progresista, el mandato de Trudeau se ha visto empañado por dificultades económicas, incompetencia y una creciente percepción de autoritarismo tras la invocación del Acta de Emergencias.\n\nInicialmente justificada como una medida necesaria para restablecer el orden público y la seguridad nacional en tiempos sin precedentes, la decisión se ha convertido en blanco de críticas tanto de la derecha como de la izquierda. Muchos canadienses la consideran una peligrosa extralimitación del poder ejecutivo, que ha manchado permanentemente el legado de Trudeau y erosionado la confianza en su liderazgo y su partido.\n\nA pesar de estos reveses, Trudeau logró una ajustada victoria, menos un triunfo que un alto el fuego temporal en un país cansado de la división. En lugar de indicar una confianza renovada, los resultados presentan un panorama muy frágil, sostenido por poco más que la costumbre y la vacilación. Mientras Trudeau inicia su cuarto mandato, surgen crecientes dudas sobre cuánto tiempo podrá aguantar el primer ministro antes de que todo se derrumbe."
 canada.12.d.2: "En una sorprendente victoria, el Partido Liberal de Canadá se ha asegurado una victoria decisiva en las elecciones federales anticipadas, esta vez bajo un nuevo liderazgo. Tras la renuncia del primer ministro Justin Trudeau a principios de este mes, el exgobernador del Banco de Canadá y figura financiera global, Mark Carney, tomó las riendas, prometiendo romper con las controversias del pasado y una mano firme para el futuro.\n\nLa campaña de Carney conectó con una nación fatigada por la división política y la incertidumbre internacional. Su formación tecnocrática y su refinada competencia ayudaron a los liberales a reconstruir su imagen manchada y a conquistar a sectores clave de la población, desilusionados por los últimos años de Trudeau en el cargo y por la creciente afluencia de migrantes y refugiados.\n\nCon una renovada confianza pública, una mayoría contundente en el Parlamento y una administración favorable en Estados Unidos, Carney se enfrenta ahora al reto de cumplir firmemente su promesa y la confianza del pueblo. Por primera vez en años, el centro político de Canadá ha encontrado su equilibrio. Si prevalece, solo el tiempo lo dirá."
 canada.15.t: "¿Trudeau renuncia?"
 canada.15.d: ""
 canada.15.a: "No gracias"
 canada.15.b: "¡Ya era hora!"

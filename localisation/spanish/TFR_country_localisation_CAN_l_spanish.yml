 CAN_quebec_separatism_idea_desc: "La población francófona de la provincia de Quebec nunca ha estado realmente feliz con la dominancia de la población anglo-canadiense en el Gobierno de Ottawa. Sentimiento independentista siempre ha sido común así como los referendos de independencia de Canadá - el ultimo en 1995 tuvo una votación de 49.42% por el \"si\". El riesgo de Quebec abandonando la unión es más que real."

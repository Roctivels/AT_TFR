 canada.10.t: "Llamado a elecciones anticipadas"
 canada.10.d: ""
 canada.10.a: "Conservadores"
 canada.10.b: "Liberales."
 canada.11.d: "El Partido Conservador de Canadá ha resultado victorioso en unas elecciones federales anticipadas, poniendo fin a la prolongada era Trudeau tras las consecuencias políticas de la guerra civil que estalló en Estados Unidos.\n\nLos liberales, que convocaron las elecciones con la esperanza de asegurar un mandato renovado en un contexto de mayor estabilidad en los EE.UU., sufrieron una rotunda derrota, ya que su gestión de la crisis dejó al país profundamente dividido. Tras el fallido intento de proteger a Canadá de las repercusiones de la guerra civil en el extranjero, el descontento público con el Gobierno liberal alcanzó su punto álgido. Muchos canadienses consideraron la \"intervención\" como una intromisión innecesaria en los asuntos exteriores, que coincidió con el aumento de la llegada de refugiados.\n\nLos votantes se volcaron hacia el Partido Conservador, liderado por el populista Pierre Poilievre, quien en su campaña prometió restaurar la estabilidad, la rendición de cuentas y poner fin a lo que calificó de políticas exteriores imprudentes. Los conservadores consiguieron una clara mayoría en el Parlamento, cerrando finalmente el telón a casi una década de Gobierno liberal marcada por la impopularidad."
 canada.11.a: "¡Buen viaje!"
 canada.12.t: "Los Liberales se aferran al poder en Canadá"
 canada.12.a: "¡Sigue aguantando!"
 canada.13.t: "Fascismo en alza"
 canada.13.desc: "Mientras las condiciones de estabilidad en todo el mundo siguen deteriorándose bajo las presiones de la pandemia, el colapso económico y muchas otras crisis, muchos canadienses están volviéndose a ideas extremas. Inspirados por los ideólogos fascistas canadienses del siglo pasado, como Adrien Arcand y John Ross Taylor, así como por las oleadas de nuevas ideas de ultraderecha que emanan de nuestro vecino del sur, los partidos y organizaciones políticas fascistas han visto números récord de nuevos reclutas. \n\nLos grupos quebequenses como Atalante y el IDCanada, mayoritariamente anglófono, han visto un repunte en sus movilizaciones, y las filiales canadienses de organizaciones con sede en Estados Unidos, como la División Atomwaffen y los Proud Boys, también han experimentado un rápido crecimiento. Para prevenir amenazas a la seguridad nacional de Canadá, la RCMP y todas las demás herramientas de seguridad del Estado deben utilizarse para combatir la influencia de estas organizaciones."
 canada.13.a: "Debemos hacer frente a la tiranía."
 canada.14.t: "[ATW.GetName] une Estados Unidos"
 canada.14.desc: "TODO fascismo es malo"
 canada.14.a: "Debemos hacer frente a la tiranía."

 mexico.1.t: "¡Redada contra el cartel exitosa!"
 mexico.1.d: ""
 mexico.1.a: "Excelente."
 mexico.2.t: "La redada contra el cartel termina en un fracaso"
 mexico.2.d: ""
 mexico.2.a: "Su sacrificio es notorio."
 mexico.3.t: "La caravana migrante alcanza la frontera mexicana-guatemalteca"
 mexico.3.d: "Una nueva caravana de cientos de hondureños, salvadoreños y guatemaltecos han alcanzado nuestra frontera. La policía ha tratado con muchas caravanas del mismo tamaño anteriormente y están listos para detener la caravana una vez más. Nuestra población tiene planes para estas caravanas. No hay duda que explotarán a esta gente para obtener ganancias."
 mexico.3.a: "Desplegar la policía."
 mexico.3.b: "Déjalos pasar."
 mexico.4.t: "Oficiales enfrentan a los cárteles"
 mexico.4.d: "Oficiales en una patrulla rutinaria se vieron envueltos en un intenso tiroteo con cárteles locales armados con rifles automáticos y ametralladoras. El tiroteo fue breve, los oficiales lograron matar a los 6 sicarios quienes se posicionaron tras árboles y arbustos. Las bajas de los oficiales también fueron bajas, solo 2 oficiales sufrieron heridas leves de las que se recuperarán rápidamente."
 mexico.4.a: "Por poco."
 mexico.5.t: "La policía detiene refugiados estadounidenses"
 mexico.5.d: "La Policía Federal ha sido desplegada masivamente por nuestra frontera con los Estados Unidos. Miles de refugiados estadounidenses han sido detenidos mientras huyen del caos que engulle la nación entera. Los oficiales estiman que hay miles más atravesando nuestras fronteras cada noche. No hay duda que los antiguos coyotes que colaban a nuestra gente en Estados Unidos están haciendo lo mismo con estos refugiados y lo continuarán haciendo hasta que el conflicto esté resuelto. Sospechamos que los cárteles también están activos en la región, explotando a las pobres familias y traficándolos hacia sus negocios. El ejército será desplegado en breves para asistir a los sobrepasados oficiales."
 mexico.5.a: "Hacemos lo que podemos."
 mexico.12.t: "México reunificado"
 mexico.12.desc: "La larga y sangrienta lucha por México finalmente ha llegado a su fin. Tras años de una brutal guerra contra los cárteles, regímenes corruptos y facciones rivales, hemos salido victoriosos. Nuestra gente, maltratada y cansada, pueden empezar ahora la reconstrucción. Las calles, alguna vez regia por el miedo y la violencia, ahora están en silencio, y el sonido de los disparos ha sido reemplazado por murmullos de esperanza.\n\nLos cárteles, cuya influencia se proyectaba cual sombra sobre nuestra tierra, ha sido destruida. Sus líderes o bien están muertos o están encarcelados. Los Gobiernos rivales que buscaban dividir nuestro país han sido derrotados, con sus ambiciones reducidas a cenizas. El pueblo de México ya no son peones en su despiadado juego. Ahora el futuro está en nuestras manos.\n\nEsto es un nuevo amanecer para México - un México libre del terror de los cárteles y la corrupción de los Gobiernos pasados. Hemos luchado por este momento con nuestra sangre y voluntad, y ahora empezaremos la arda tarea de reconstruir una nación que ha sido dividida.\n\nPero la lucha aún no ha acabado. Aunque hayamos ganado la guerra, persisten las cicatrices del conflicto. Debemos estar alerta, asegurando que ni los remanentes de los cárteles ni sus partidarios se alcen de nuevo para amenazar nuestra costosa paz. También debemos construir un Gobierno que sea justo y equitativo, uno que guíe a México hacia un futuro de fuerza y prosperidad.\nLa victoria es nuestra, pero el trabajo no ha hecho más que empezar."
 mexico.12.a: "México es nuestro."
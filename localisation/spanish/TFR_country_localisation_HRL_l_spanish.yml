 libya.30.t: "Ceasefire Signed in Libya"
 libya.30.d: ""
 libya.30.a: "Hot damn"
 libya.31.t: "Alto el fuego en la guerra civil libia"
 libya.31.d: "Las facciones rivales de Libia han acordado un alto el fuego a nivel nacional tras meses de negociaciones, anunciando formalmente el fin de las principales operaciones militares en todo el país. Firmado el 23 de octubre de 2020, el acuerdo exige el cese inmediato de las acciones ofensivas en todos los frentes y esboza medidas destinadas a estabilizar la vida cotidiana, como la reapertura de carreteras clave, la reanudación de los viajes nacionales y medidas para el intercambio de prisioneros. \n\nEl alto el fuego también incluye disposiciones destinadas a reducir la presencia extranjera en Libia, con el compromiso de retirar del país a los mercenarios y los elementos militares externos. Aunque la redacción es clara sobre el papel, su aplicación sigue siendo incierta. Las formaciones armadas siguen dominando grandes zonas, las estructuras de mando están divididas y las instituciones políticas destinadas a unificar el Estado siguen debilitadas tras años de fragmentación y administraciones paralelas. \n\nLos diplomáticos que participaron en las conversaciones describen el acuerdo como un avance necesario, pero nacido del agotamiento más que de la confianza. Ambas partes han sufrido grandes pérdidas y la tensión económica del prolongado conflicto ha intensificado la presión para hacer una pausa. Sin embargo, las disputas más profundas, sobre la legitimidad, el control de los ingresos petroleros y la futura estructura del Estado libio, siguen sin resolverse. \n\nPor ahora, las armas callan. La pregunta es si este alto el fuego se convertirá en la base para la paz o si será simplemente la calma antes de la próxima ronda."
 libya.31.a: "¿Por fin la paz?"
 libya.45.t: "Se suspenden las elecciones libias tras desacuerdos"
 libya.45.d: "Las elecciones nacionales previstas en Libia se han suspendido oficialmente después de que las negociaciones entre los bloques políticos rivales fracasaran y se convirtieran en un desacuerdo abierto, lo que ha vuelto a sumir en la incertidumbre la frágil transición del país. Lo que debía ser el siguiente paso tras el alto el fuego de octubre se ha convertido en otro campo de batalla, esta vez librado a través de comités disfuncionales y desacuerdos legales. \n\nEn el centro de la disputa se encuentra una cuestión que Libia nunca ha resuelto: quién tiene derecho a gobernar y bajo qué reglas. Las facciones rivales se han acusado mutuamente de manipular las leyes electorales, obstruir el registro de votantes y configurar el proceso para garantizar la victoria antes de que se emita un solo voto. Las discusiones sobre la elegibilidad de los candidatos, la representación regional y el papel de los grupos armados han paralizado la comisión electoral, mientras que las autoridades locales de varias ciudades se han negado a reconocer las decisiones procedentes de la capital. \n\nLos mediadores internacionales han instado a la moderación, pero su influencia es limitada. Sobre el terreno, las milicias siguen atrincheradas, las garantías de seguridad son inciertas y los líderes políticos siguen hablando de unidad mientras se preparan para la posibilidad de otra ruptura. El aplazamiento no pone fin al proceso político, pero le resta impulso, y en Libia, la pérdida de impulso ha significado a menudo la pérdida de la paz.\n\nPara los libios de a pie, la suspensión no parece tanto un retraso como una confirmación: que el país sigue atrapado entre el alto el fuego y el acuerdo, entre una frágil calma y la amenaza de un nuevo conflicto."
 libya.45.a: "La paz se vuelve a aplazar."
 libya.46.t: "Restauración del Reino de Libia"
 libya.46.d: "En una medida que pocos creían que volvería a repetirse en la historia, Libia ha declarado formalmente la restauración del Reino, reviviendo la monarquía Senussi como símbolo de unidad nacional tras años de guerra civil y parálisis política. El anuncio, realizado junto con altas figuras políticas y representantes militares, enmarca la monarquía no como un retorno al régimen absoluto, sino como un intento de imponer una corona neutral sobre un Estado destrozado. \n\nLos partidarios de la restauración argumentan que la República de Libia ha fracasado irremediablemente. Desde 2011, se han sucedido gobiernos que han surgido y caído, las elecciones se han estancado y las administraciones rivales han dividido el país en zonas de influencia en competencia. En este vacío, la monarquía se presenta como la última institución capaz de tender puentes entre el este y el oeste, las tribus y las ciudades, las milicias y el Estado, un ancla destinada a sobrevivir a las ambiciones de cualquier facción.\n\nEl nuevo rey ha prometido reformas radicales, negociaciones para la reconciliación nacional y el eventual retorno a una democracia popular bajo un sistema reestructurado. Sin embargo, el escepticismo sigue siendo generalizado. Los grupos armados siguen teniendo un poder decisivo en muchas zonas, y los críticos advierten de que la restauración puede convertirse simplemente en otra bandera ondeada por aquellos que tienen armas y poder. En Trípoli, las reacciones han ido desde la aceptación cautelosa hasta el rechazo absoluto, y algunos han calificado la declaración de ilegítima y han advertido de que Libia no puede unificarse solo con simbolismos. \n\nAun así, por primera vez en años, se iza una única bandera como reivindicación de la continuidad nacional. Que el reino restaurado se convierta en una vía para salir del colapso o en una forma diferente de división dependerá de lo que suceda más allá de los discursos de hoy."
 libya.46.a: "La corona vuelve a Libia."
 libya.47.t: "Nueva era de caudillos en Libia"
 libya.47.d: "Libia se ha derrumbado una vez más. Tras el fallido intento de Saif al-Islam de conquistar el Magreb, el frágil orden que había construido en su país se ha desintegrado en una fragmentación abierta. En cuestión de semanas, las unidades militares se dividieron, las estructuras de mando se disolvieron y regiones enteras escaparon al control central. El Estado que pretendía resucitar Libia la ha destrozado. \n\nLa derrota en el extranjero puso de manifiesto las debilidades que habían quedado ocultas por la propaganda y la unidad forzada. Los suministros se agotaron, los comandantes rivales se culparon mutuamente y los líderes locales comenzaron a actuar de forma independiente. En Trípoli, grupos armados se apoderaron de ministerios y emisoras de radio. En el este, los oficiales declararon \"consejos de emergencia\" para proteger sus propias ciudades. En todo el sur, las rutas fronterizas cayeron en manos de contrabandistas y milicias tribales que ahora recaudan impuestos a punta de pistola. Las instalaciones petroleras de Libia, que en su día fueron la columna vertebral de cualquier gobierno, son cada vez más un terreno disputado, en manos de quien sea capaz de defender los oleoductos esa semana.\n\nLa vida civil se está derrumbando junto con el orden político. Los aeropuertos cierran sin previo aviso. Las colas para repostar combustible se alargan durante horas. Los cortes de electricidad duran días. Los tribunales han dejado de funcionar en muchas regiones, sustituidos por \"comités de seguridad\" improvisados leales a los caudillos locales. Algunos grupos afirman actuar en nombre de la revolución, otros en nombre de la religión y otros simplemente por lucro. Sus banderas son diferentes, pero el resultado es el mismo: Libia ha vuelto al gobierno de los puestos de control. \n\nLos actores internacionales emiten declaraciones en las que piden moderación, pero la realidad es brutal y simple. Libia ya no es un país en vías de recuperación, se ha derrumbado por completo. La era de la reunificación nacional ha terminado. Ha comenzado la era de los caudillos."
 libya.47.a: "Libia se fractura sin posibilidad de reparación."
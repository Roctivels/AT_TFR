l_spanish:
 austrian_neutrality: "Neutralidad austriaca"
 austrian_neutrality_desc: "Tras el fin de la Segunda Guerra Mundial, Austria, junto con Alemania, se vio nuevamente sometida a juicio. Sin embargo, gracias a las simpatías de los Aliados, a las negociaciones exitosas y a un mayor distanciamiento del Tercer Reich, Austria se encontró a si misma como una nación independiente, reunificada y, lo más importante, neutral, a diferencia de su hermano del norte, al que el orden mundial bipolar había clavado el hacha. \n\nCon esta nueva oportunidad, la nación no tenía intención de desaprovecharla. Tanto el Gobierno como el pueblo han mantenido voluntariamente este acuerdo con Occidente y Oriente de permanecer al margen de cualquier asunto geopolítico dentro o fuera de Europa, incluso veinte años después del colapso de la URSS. Sin embargo, a medida que continúa el paso del tiempo, los recuerdos de antaño han comenzado a desvanecerse y, con la adhesión de Austria a la Unión Europea en 1995, el acuerdo de neutralidad está empezando a ser cuestionado. Como asunto arraigado en la identidad de la República, cualquier cambio de rumbo requeriría la aprobación de dos tercios del parlamento o, más drásticamente, la reescritura completa de la Constitución."
 house_of_kurtz: "Castillo de Kurz"
 house_of_kurtz_desc: "Austria, como cualquier otro país, tiene su cuota de políticos corruptos. Sebastian Kurz sin duda entra en esa categoría. Originalmente, Kurz había formado un Gobierno a finales de 2017 junto con el Partido de la Libertad, sin embargo, todo se vino abajo en 2019 tras el asunto de Ibiza, que recordó a la nación que, a pesar de que Austria es especial en el escenario mundial, es igual que el resto a nivel nacional. Mientras todo el mundo se estaba acostumbrando al evento, el país volvió a verse envuelto en otro período de crisis cuando el Gobierno se derrumbó bajo el peso del escándalo. A pesar de lo que debería haber sido el final de la carrera de cualquier político, Kurz aparentemente se ha recuperado de esto como si fuera cualquier otra historia en las noticias, con su victoria en otra elección y la llegada de su nuevo gabinete, parece invencible. \n\nSin embargo, el comité del asunto de Ibiza todavía lo está investigando, y si finalmente toma el ritmo o incluso evoluciona hacia algo mayor, los esqueletos del armario de Kurz aún pueden ser su perdición. ¿Podrá Kurz mantener su nombre limpio?"
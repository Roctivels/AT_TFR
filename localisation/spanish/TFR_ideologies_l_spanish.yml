 totalitarian_socialist: "Socialista totalitario"
 totalitarian_socialist_noun: "Socialismo totalitario"
 totalitarian_socialist_desc: "Régimen socialista totalitario"
 totalitarian_socialist_drift: "Cambio al socialismo totalitario"
 totalitarian_socialist_color: "§d"
 totalitarian_socialist_color_color_name: "§d$totalitarian_socialist$§!"
 jucheism: "Juche"
 jucheism_desc: "\n\n\n\n£GFX_Ideology_juche\n\n\n\n\n\nEl §Yjuche§! es una forma coreana del marxismo-leninismo que enfatiza fuertemente la autosuficiencia. Económicamente argumentan que para implementar el principio de la autosuficiencia, se tiene que construir una economía nacional independiente, sin llegar a excluir el comercio exterior. Adicionalmente, consideran a los seres humanos en general como la fuerza que mueve a la historia, posicionándolas en el centro de todo, mientras que el líder es el centro de las masas.\n\nLa ideología hace del Gran Líder un líder supremo y absolutista. La clase trabajadora no debe pensar por si misma, en cambio lo hacen a través del Gran Líder, como a su vez este es la cabeza de la clase trabajadora, siendo así el único representante legitimo de la misma."
 maoism: "Maoismo"
 maoism_desc: "\n\n\n\n£GFX_Ideology_maoist\n\n\n\n\n\nEl §Ymaoismo§! es una forma avanzada del marxismo-leninismo formulada por el guerrillero y teórico peruano \"Camarada Gonzalo\" en 1982. Se basa en las teorías del marxismo-leninismo y el pensamiento de Mao Zedong, y argumenta que los escritos de Mao son aplicables universalmente.\n\nSus principios claves son la guerra popular prolongada, que advoca por una guerra de guerrillas contra los Estados capitalistas, la Revolución Cultural para acabar con la influencia burgués, y el alineamiento en masa, que explica que el partido de vanguardia debe delinear una estrategia para el liderazgo revolucionario de las masas, la consolidación de la dictadura del proletariado y el endurecimiento del partido por y para la construcción del socialismo."
 jacobinism: "Jacobinismo"
 jacobinism_desc: "\n\n\n\n£GFX_Ideology_jacobin\n\n\n\n\n\nEl §Yjacobinismo§! tiene su origen en la Revolución Francesa de 1789. Al poner un gran énfasis en el nacionalismo cívico, el patriotismo y la lucha por la §Ysoberanía nacional§!. En un mundo cada vez más hostil, los regímenes jacobinos recurren a métodos autoritarios de control para preservar la revolución contra sus enemigos. Para proteger la revolución y forjar un mundo nuevo, los regímenes jacobinos utilizan ampliamente sistemas de vigilancia masiva, policía secreta y redes de informantes, además de intentar controlar todos los sectores de la vida, desde la economía hasta la dinámica familiar.\n\nParadójicamente, el jacobinismo obtiene su legitimidad principalmente a través del populismo, recurriendo a medidas populistas para aplacar al pueblo, favoreciendo la redistribución de la riqueza, amplias redes de seguridad social, así como políticas sociales más conservadoras para mantener el apoyo de sus bases de apoyo principalmente rurales. Aunque persisten muchas similitudes con el jacobinismo original de la Revolución Francesa, el nuevo jacobinismo del siglo XXI representa una síntesis de lo antiguo y lo nuevo: el inicio de una sociedad comunista, sin importar cuán alto sea el costo."
 totalism: "Socialismo vanguardista"
 totalism_desc: "\n\n\n\n£GFX_Ideology_totalist\n\n\n\n\n\nEl §Ysocialismo vanguardista§! es una forma de socialismo que defiende la totalidad del Estado por encima de todo lo demás. Los vanguardistas sostienen que los recursos de todo el país deben utilizarse para construir el §YEstado de seguridad socialista§!, en todos los aspectos de la sociedad, desde las actitudes sociales hasta la planificación de la economía. Los Gobiernos vanguardistas suelen utilizar métodos autoritarios de alta tecnología para controlar y vigilar a sus ciudadanos, como la vigilancia generalizada por circuito cerrado de televisión y la censura de internet."
 eurasianism_left: "Neoeurasianismo"
 eurasianism_left_desc: "\n\n\n\n£GFX_Ideology_neo_eurasianism\n\n\n\n\n\nEl §Yneoeurasianismo§! es una ideología nacida del pensamiento político postsoviético, cuyos postulados son oponerse al liberalismo eurocéntrico global, al que denominan \"atlantismo\", y a sus intentos de establecer la hegemonía de los pueblos del borde sobre los del corazón. Se oponen a la uniformización de la humanidad y, en cambio, se centran en valorar y salvaguardar la diversidad cultural y étnica del continente. Los eurasianistas, firmemente anticapitalistas y pro-colectivistas, buscarán todos los métodos posibles para unificar Eurasia y protegerla de las amenazas atlantistas."
 left_wing_junta: "Junta militar de izquierda"
 left_wing_junta_desc: "\n\n\n\n£GFX_Ideology_left_wing_junta\n\n\n\n\n\nUna §Yjunta militar de izquierda§! es un concepto ideológico que combina elementos de la política de izquierda con la estructura y autoridad de una junta militar. Esta combinación única busca establecer un sistema de gobierno que priorice los principios socialistas, la igualdad y la justicia social, manteniendo al mismo tiempo un proceso de toma de decisiones disciplinado y centralizado, típicamente asociado con los regímenes militares.\n\nEl objetivo principal de una junta militar de izquierda es abordar las disparidades socioeconómicas, eliminar las divisiones de clase y promover el bienestar de la clase trabajadora. Su objetivo es lograr estos objetivos a través de una autoridad centralizada que pueda implementar políticas y reformas de manera eficiente sin verse obstaculizada por procesos burocráticos u oposición política. El ejército, como columna vertebral de esta junta, desempeña un papel crucial para garantizar la estabilidad, proteger la revolución y salvaguardar los intereses del pueblo."
 social_fascism: "Nacionalcomunismo"
 social_fascism_desc: "\n\n\n\n£GFX_Ideology_social_fascism\n\n\n\n\n\nEl §Ynacionalcomunismo§! es un marco ideológico que busca combinar los principios del comunismo con un fuerte sentido de identidad nacional y patriotismo. Hace hincapié en la importancia tanto de la igualdad económica como de la soberanía nacional, con el objetivo de establecer una sociedad donde la clase trabajadora tenga el poder, preservando al mismo tiempo el patrimonio cultural y los intereses de la nación.\n\nEn esencia, el nacionalcomunismo aboga por la abolición de la propiedad privada de los medios de producción, abogando por un sistema de propiedad colectiva donde los trabajadores controlen y se beneficien de su trabajo. Busca eliminar las distinciones de clase y crear una sociedad donde la riqueza y los recursos se distribuyan equitativamente entre todos los miembros. Esta ideología pone gran énfasis en la justicia social, con el objetivo de erradicar la pobreza, la explotación y las desigualdades sociales."
 neo_stalinism: "Neoestalinismo"
 neo_stalinism_desc: "\n\n\n\n£GFX_ideology_neo_stalinism_bannner\n\n\n\n\n\nEl §Yneoestalinismo§! es un marco ideológico que se inspira en las ideas y políticas de Joseph Stalin, el ex líder de la Unión Soviética. Representa un renacimiento o reinterpretación de los principios estalinistas en el contexto contemporáneo.\n\nEn esencia, el neoestalinismo defiende la creencia en un estado centralizado fuerte y el uso de medidas autoritarias para alcanzar objetivos sociales. Pone un gran énfasis en el control y la planificación estatales, abogando por la estatización de industrias clave y la implementación de una economía dirigida. Los neoestalinistas sostienen que es necesario un estado poderoso para garantizar la estabilidad social, el desarrollo económico y el avance del socialismo."
 transhumanism: "Transhumanismo"
 transhumanism_desc: "\n\n\n\n£GFX_Ideology_transhumanism\n\n\n\n\n\nSe ha debatido durante mucho tiempo de dónde surgió la primera chispa del pensamiento §Ytranshumanista§!, desde los futuristas del siglo XX que deseaban ser como máquinas hasta los filósofos digitales de hoy en día al margen de las sociedades que ven la fusión del hombre y la máquina como un resultado final lógico de la evolución.\n\nSin embargo, era algo que se consideraba una realidad lejana.\nHasta ahora.\n\nEl transhumanismo aboga por la modificación y mejora de la mente, el cuerpo y el alma humanos por medios tecnológicos. Influida por obras seminales de ciencia ficción, la visión transhumanista de una humanidad futura transformada ha ganado el apoyo y la oposición de filósofos y creyentes religiosos por igual.\n\nCon su reciente ascenso a la prominencia y su dedicación al avance científico sin importar el costo, la pregunta sigue siendo si la humanidad puede mantener el ritmo de este ideal.\nSus críticos temen el posible resurgimiento de actitudes discriminatorias en aras del progreso y la posibilidad de que la raza humana pierda su humanidad."
 communist: "Socialista autoritario"
 communist_noun: "Socialismo autoritario"
 communist_desc: "Régimen socialista autoritario"
 communist_drift: "Cambio al socialismo autoritario"
 communist_color: "§R"
 communist_color_name: "§R$communist$§!"
 market_socialism: "Socialismo de mercado"
 market_socialism_desc: "\n\n\n\n£GFX_Ideology_Dengism\n\n\n\n\n\nEl §Ysocialismo de mercado§!, a menudo llamado denguismo, abarca una amplia gama de ideas socialistas que incorporan los mercados a una economía socialista. Sostiene que en la etapa actual de desarrollo social y económico, el país no está preparado para adoptar un socialismo totalmente planificado y debe adoptar ciertas reformas capitalistas para desarrollar las fuerzas productivas de un país. Los países socialistas de mercado suelen participar en la economía global, tienen propiedad privada y empresas privadas, pero el gobierno dirige y controla indirectamente las empresas."
 marxism_leninism: "Marxismo-leninismo"
 marxism_leninism_desc: "\n\n\n\n£GFX_Ideology_ML\n\n\n\n\n\nEl §Ymarxismo-leninismo§! es la ideología que se encuentra detrás de la mayoría de los movimientos comunistas del siglo XX y fue la ideología oficial del Estado de la Unión Soviética. Creados en la década de 1920, cuando Stalin sintetizó las obras de Marx y Lenin, los marxistas-leninistas abogan por el derrocamiento del capitalismo y su reemplazo por una dictadura transitoria del proletariado, que teóricamente desaparecerá cuando la sociedad esté lo suficientemente desarrollada como para implementar el comunismo."
 neo_socialism: "Neosocialismo"
 neo_socialism_desc: "\n\n\n\n£GFX_ideology_neo_socialismsub\n\n\n\n\n\nEl §Yneosocialismo§! es una forma moderna de socialismo que se aparta del marxismo clásico al sostener que la clase no es la contradicción principal o única dentro de la sociedad. Los neosocialistas creen que la raza, la sexualidad o el género también son contradicciones primarias y que también deben resolverse antes de que el comunismo pueda implementarse con éxito."
 left_nationalism: "Nacionalismo de izquierda"
 left_nationalism_desc: "\n\n\n\n£GFX_Ideology_left_nationalist\n\n\n\n\n\nEl §Ynacionalismo de izquierda§! es un término amplio que designa a los movimientos que combinan elementos del pensamiento izquierdista, como la redistribución de la riqueza, la estatización de las principales industrias y la lucha de clases, con elementos del nacionalismo. Generalmente utilizado por los países en desarrollo, busca unir a la gente sobre la base de la nacionalidad contra la agresión colonialista percibida, al tiempo que lleva a cabo reformas de izquierda dentro del país."
 trotskyism: "Trotskismo"
 trotskyism_desc: "\n\n\n\n£GFX_Ideology_trotskyismsub\n\n\n\n\n\nEl §Ytrotskismo§! es un marco ideológico que surgió de las ideas y creencias del revolucionario ruso León Trotsky. Tiene sus raíces en los principios del marxismo y busca promover los objetivos del socialismo internacional y la revolución permanente.\n\nEn esencia, el trotskismo enfatiza la necesidad de una revolución mundial de la clase obrera para derrocar los sistemas capitalistas y establecer una sociedad socialista mundial. Rechaza el concepto de socialismo en un solo país, argumentando que la verdadera liberación solo puede lograrse mediante los esfuerzos colectivos del proletariado a través de las fronteras nacionales."
 left_baathism: "Baazismo de izquierdas"
 left_baathism_desc: "\n\n\n\n£GFX_ideology_left_baathism_banner\n\n\n\n\n\nEl §Ybaazismo de izquierdas§! es una ideología que combina elementos del socialismo y del nacionalismo árabe, con un enfoque en la justicia social, la igualdad y la unidad entre las naciones árabes. Surgió como ideología política a mediados del siglo XX, en particular en países como Siria e Irak.\n\nEn esencia, el baazismo de izquierdas busca abordar las disparidades socioeconómicas dentro de la sociedad, abogando por la redistribución de la riqueza y los recursos para garantizar una sociedad más equitativa. Hace hincapié en la importancia de los programas de bienestar social, la propiedad pública de las industrias clave y la prestación de servicios básicos a todos los ciudadanos."
 gaddafism: "Gadafismo"
 libertarian_socialist: "Socialista libertario"
 libertarian_socialist_noun: "Socialismo libertario"
 libertarian_socialist_desc: "Gobierno socialista libertario"
 libertarian_socialist_drift: "Cambio al socialismo libertario"
 libertarian_socialist_color: "§t"
 libertarian_socialist_color_name: "§t$libertarian_socialist$§!"
 left_anarchist: "Anarcocomunismo"
 left_anarchist_desc: "\n\n\n\n£GFX_Ideology_Ancom\n\n\n\n\n\nEl §Yanarcocomunismo§! es una ideología anarquista de izquierda que aboga por la abolición del Estado, el capitalismo, el trabajo asalariado, las jerarquías sociales y la propiedad privada, al tiempo que apoya la democracia directa y las economías organizadas horizontalmente. Históricamente, movimientos como la CNT-FAI en la época de la guerra civil española, el Ejército Negro en Ucrania durante la guerra civil rusa y la Federación Anarquista Coreana en Manchuria durante la Segunda Guerra Mundial han utilizado el anarcocomunismo de una forma u otra."
 post_leftism: "Neomarxismo"
 post_leftism_desc: "\n\n\n\n£GFX_ideology_neomarxist_banner\n\n\n\n\n\nEl §Yneomarxismo§! es un movimiento ideológico que surgió en el siglo XX como una interpretación revisionista de la teoría marxista tradicional. Busca abordar las limitaciones y deficiencias del marxismo clásico, al tiempo que aboga por una transformación radical de la sociedad basada en principios socialistas.\n\nEn esencia, el neomarxismo enfatiza la importancia de la clase social y los factores económicos en la configuración de la dinámica social. Sin embargo, amplía el marxismo clásico al incorporar otras formas de opresión, como la raza, el género y la sexualidad, en su análisis. Los neomarxistas sostienen que estos sistemas de opresión entrecruzados contribuyen a la perpetuación de la desigualdad y la explotación dentro de las sociedades capitalistas."
 eurocommunism: "Eurocomunismo"
 eurocommunism_desc: "\n\n\n\n£GFX_ideology_eurocommunism_banner\n\n\n\n\n\nEl §Yeurocomunismo§! es un proyecto político-ideológico del marxismo intermedio entre el leninismo y el socialismo democrático, es decir, un comunismo desarrollado en sentido reformista y democrático por algunas organizaciones comunistas de Europa occidental. Se caracteriza por una mayor proximidad a una clase media social surgida del capitalismo y por la adopción de un modelo parlamentario multipartidista. Los eurocomunistas quieren encarnar una denominada \"tercera vía\" entre el marxismo-leninismo y la tradición socialdemócrata. A pesar de su historia, esta ideología todavía se considera emergente."
 reformist_socialism: "Socialismo democrático"
 reformist_socialism_desc: "\n\n\n\n£GFX_Ideology_reformist_socialism\n\n\n\n\n\nEl §Ysocialismo democrático§! es una ideología que aboga por la creación del socialismo dentro del sistema parlamentario liberal. Mediante la participación en la política electoral, las cooperativas de trabajadores y la autogestión obrera, los socialistas democráticos buscan transformar la economía capitalista en una economía de mercado descentralizada y dirigida por los trabajadores.\n\nSi bien el socialismo es un objetivo a largo plazo, los socialistas reformistas están más preocupados por frenar los excesos del capitalismo y apoyan las reformas progresistas para humanizarlo en la actualidad. Los socialistas reformistas sostienen que el capitalismo es inherentemente incompatible con los valores de la libertad, la igualdad y la solidaridad, y que estos ideales solo pueden lograrse mediante la realización de una sociedad socialista."
 eco_socialism: "Ecosocialismo"
 eco_socialism_desc: "\n\n\n\n£GFX_Ideology_eco_socialism\n\n\n\n\n\nEl §Yecosocialismo§! es una ideología sincrética del socialismo y el ambientalismo, que postula que la naturaleza en constante expansión del capitalismo es la causa de la degradación ambiental, como el cambio climático, el calentamiento global, el agotamiento de los recursos y la pérdida de la biodiversidad global. También se opone a la globalización y al imperialismo, afirmando que son incompatibles con las necesidades ecológicas de la civilización humana para mantenerse a sí misma.\n\nLos ecosocialistas abogan por la abolición del capitalismo y la globalización, proponiendo una sociedad basada en el igualitarismo, el progresismo social y la propiedad común de los medios de producción. Los ecosocialistas también son antiburocráticos, especialmente contra las formas de socialismo que consideran colectivismo burocrático, y generalmente se clasifican como marxistas ortodoxos."
 left_accelerationist: "Aceleracionismo de izquierda"
 left_accelerationist_desc: "\n\n\n\n£GFX_Ideology_left_accelerationist\n\n\n\n\n\nEl §Yaceleracionismo de izquierdas§! es una ideología que nace de las contradicciones del capitalismo tardío.\n\nMientras otros buscan la destrucción total del capitalismo o volver a un pasado imaginario, los aceleracionistas de izquierdas creen que la única manera de avanzar es acelerando el desarrollo tecnológico, la automatización y el progreso económico para transcender el propio capitalismo.\n\nPromoviendo el cambio constante y el rechazo al estancamiento, describe al capitalismo como una fuerza entrópica y entre sus seguidores más radicales es visto como una entidad maliciosa que ha sostenido a la vida orgánica con un agarre mortal.\n\nEn esta escuela de pensamiento, las críticas de Mark Fisher hacia el realismo capitalista son utilizadas para rechazar la noción de que el capitalismo no puede ser alterado. Describe al sistema como una estructura decadente capaz de ser llevado más allá de sus límites con el fin de mostrar nuevas formas de empoderamiento social, poder político y desarrollo tecnológico. Se puede escapar del control del capitalismo a través de políticas económicas post-escasez, la automatización y la inteligencia artificial."
 sovereign_democracy_left: "Democracia soberana"
 sovereign_democracy_left_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\nLa §Ydemocracia soberana§! es una ideología política de nicho cuyo objetivo es crear una democracia \"perfecta\" que ignore las disputas entre los partidos democráticos occidentales. Los partidos no sólo tienen puntos de vista similares, sino que también cooperan y trabajan para mejorar el Estado en su conjunto. La sociedad civil actúa como un control sobre los partidos, utilizando su influencia para expulsar a funcionarios corruptos y antipatrióticos, por ejemplo.\nEl partido de izquierda aboga por un mercado más cerrado, similar a la era soviética. Está dirigido a un público de izquierda que desea el regreso del \"comunismo\", pero sin desventajas."
 social_democrat: "Socialdemócrata"
 social_democrat_noun: "Socialdemocracia"
 social_democrat_desc: "Socialdemocracia"
 social_democrat_drift: "Cambio a la socialdemocracia"
 social_democrat_color: "§s"
 social_democrat_color_name: "§s$social_democrat$§!"
 left_centrist: "Centrismo de izquierda"
 left_centrist_desc: "\n\n\n\n£GFX_Ideology_left_centrism\n\n\n\n\n\nEl §Ycentrismo de izquierda§! es una amplia gama de ideologías que abarcan la socialdemocracia, el progresismo, el liberalismo social y el ecologismo, y que tienen como objetivo unir estos ideales a través del sincretismo. En términos generales, el centrismo de izquierda se inclina más hacia el centro político en contraste con las creencias de ultraizquierda, como el comunismo y el socialismo revolucionario.\n\nEl centrismo de izquierda se ajusta a las creencias sociales progresistas y apoya una economía mixta con políticas como un fuerte intervencionismo económico, el capitalismo del bienestar y el pro-sindicalismo. Apoyan las políticas de inmigración de fronteras abiertas y el multiculturalismo, con ejemplos de esto incluyendo Alemania. Los de centroizquierda también creen en trabajar dentro de los sistemas establecidos para mejorar la justicia social, y los partidos de centroizquierda apoyan una política social mixta, aunque la mayoría se ajustan al neoliberalismo."
 left_populism: "Populismo de izquierda"
 left_populism_desc: "\n\n\n\n£GFX_Ideology_left_populism\n\n\n\n\n\nEl §Ypopulismo de izquierda§! combina elementos de la retórica y los temas populistas con la ideología de izquierda. En general, el populismo de izquierda es antiélite, escéptico respecto del globalismo y contrario al establishment. El populismo de izquierda es extremadamente antimilitarista y se formó principalmente a partir de la oposición a la intervención militar estadounidense a fines de los años 90 y principios de los 2000. Los populistas de izquierda buscan eliminar la brecha de riqueza a través de la redistribución de la riqueza, los programas sociales y un gobierno grande."
 progressivism: "Progresismo"
 progressivism_desc: "\n\n\n\n£GFX_Ideology_progressivism\n\n\n\n\n\nEl §Yprogresismo§! es una ideología socialmente liberal basada en la política de identidades que busca establecer la justicia social a través de la intervención y los programas gubernamentales. En gran medida, se asocia con los movimientos de justicia social y feministas, por lo general son pro-aborto y consideran que los avances en ciencia, tecnología y economía son beneficiosos para la sociedad humana. Los progresistas generalmente tienden a apoyar una mayor financiación para la educación, las artes y la salud pública."
 social_democracy: "Socialdemocracia"
 social_democracy_desc: "\n\n\n\n£GFX_Ideology_social_democracy\n\n\n\n\n\nLa §Ysocialdemocracia§! se ha descrito como una filosofía política, social y económica de izquierda dentro del socialismo que aboga por intervenciones económicas y sociales para promover la justicia social dentro de una economía mixta orientada al capitalismo. Puede ser un término general para las democracias que adoptaron políticas tanto socialistas como capitalistas, a veces superpuestas con una perspectiva social progresista."
 green_politics: "Política verde"
 green_politics_desc: "\n\n\n\n£GFX_Ideology_green_politics\n\n\n\n\n\nLa §Ypolítica verde§!, o ambientalismo, es una ideología que se centra en combatir el cambio climático provocado por el hombre en el siglo XXI y en la conservación natural. Busca establecer una sociedad autosostenible basada en los ideales del conservacionismo, la no violencia, la democracia de base y la justicia social."
 technocracy: "Tecnocracia"
 technocracy_desc: "\n\n\n\n£GFX_Ideology_technocracy\n\n\n\n\n\nLa §Ytecnocracia§! es un sistema político y económico caracterizado por el liderazgo de la sociedad por parte de expertos, científicos, ingenieros y otros profesionales técnicos. En un sistema tecnocrático, la autoridad para tomar decisiones se otorga a individuos en función de su experiencia técnica y desempeño meritocrático en lugar de a representantes, y las formas tecnocráticas de gobierno suelen describirse como oligárquicas. La planificación económica, la asignación de recursos y la optimización de los procesos de producción son parte integral de una economía tecnocrática, y una fuerte burocracia centralizada también es inherente a los Estados tecnocráticos. La mayoría de los grupos tecnocráticos son pragmáticos, aunque un gran número de organizaciones que adhieren a la tecnocracia son de tendencia izquierdista o progresista."
 sovereign_democracy_left_socdem: "Democracia soberana"
 sovereign_democracy_left_socdem_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\nLa §Ydemocracia soberana§! es una ideología política de nicho cuyo objetivo es crear una democracia \"perfecta\" que ignore las disputas entre los partidos democráticos occidentales. Los partidos no sólo tienen puntos de vista similares, sino que también cooperan y trabajan para mejorar el Estado en su conjunto. La sociedad civil actúa como un control sobre los partidos, utilizando su influencia para expulsar a funcionarios corruptos y antipatrióticos, por ejemplo.\nEl partido de izquierda aboga por un mercado más cerrado, similar a la era soviética. Está dirigido a un público de izquierda que desea el regreso del \"comunismo\", pero sin desventajas."
 neo_socialism_socdem: "Neosocialismo"
 neo_socialism_socdem_desc: "\n\n\n\n£GFX_ideology_neo_socialismsub\n\n\n\n\n\nEl §Yneosocialismo§! es una forma moderna de socialismo que se aparta del marxismo clásico al sostener que la clase no es la contradicción principal o única dentro de la sociedad. Los neosocialistas creen que la raza, la sexualidad o el género también son contradicciones primarias y que deben resolverse antes de que el comunismo pueda implementarse con éxito."
 putinism_social_democrat: "Putinismo de izquierda"
 putinism_social_democrat_desc: "\n\n\n\n£GFX_Ideology_putinism_social_democrat_banner\n\n\n\n\n\nEl §Yputinismo de izquierda§! es una interpretación más centrada en las personas de la doctrina de Putin. Contempla un verdadero estado social dedicado a sus ciudadanos. Inspirándose en el socialismo del siglo XXI y en elementos de la experiencia soviética, también incorpora especificidades rusas.\n\nSu agenda política se centra en cuestiones económicas, pero también subraya la necesidad de reformas para mejorar la participación pública. Tienen la intención de convertir el ONF en un instrumento de la voluntad del sistema político y promover un marco meritocrático. Sin embargo, también podrían optar por un modelo más centralizado y paternalista, con una presidencia directa y una supervisión más estricta de los burócratas poco fiables.\n\nVisualizan un futuro de profunda integración euroasiática, tanto económica como política. Entre ellos, muchos anhelan la nostalgia de la era soviética. Sus narrativas patrióticas buscan cultivar una comprensión matizada del pasado de la nación. Sin embargo, un economista y estadista líder dentro de sus filas tiene una perspectiva distintiva sobre el legado histórico de Rusia, una que está arraigada en la controvertida nueva cronología de Fomenko."
 social_patriotism: "Patriotismo social"
 social_patriotism_desc: "\n\n\n\n£GFX_Ideology_social_patriotism_banner\n\n\n\n\n\nEl §Ypatriotismo social§! es una ideología que combina un profundo sentido de patriotismo con un compromiso con la cohesión social y la unidad nacional. Hace hincapié en la importancia de una sociedad fuerte y unida, donde los individuos se sientan orgullosos de su nación y trabajen juntos por su bienestar. Los socialpatriotas creen en la preservación del patrimonio cultural, las tradiciones y los valores de su país, así como en la protección de su integridad territorial y sus intereses nacionales.\n\nEn el centro del socialpatriotismo se encuentra la creencia en el poder del colectivo por sobre los intereses individuales. Promueve un sentido de solidaridad entre los ciudadanos, alentándolos a priorizar el bien mayor de la nación por sobre el beneficio personal. Los socialpatriotas ven a sus compatriotas como parte de una familia extendida, conectados por una historia, un idioma y una cultura compartidos."
 social_liberal: "Socioliberal"
 social_liberal_noun: "Socioliberalismo"
 social_liberal_desc: "Democracia Socioliberal"
 social_liberal_drift: "Cambio al socioliberalismo"
 social_liberal_color: "§0"
 social_liberal_color_name: "§0$social_liberal$§!"
 neoliberalism: "Neoliberalismo"
 neoliberalism_desc: "\n\n\n\n£GFX_Ideology_neo_liberalism\n\n\n\n\n\nEl §Yneoliberalismo§!, también conocido como el \"Consenso de Washington\", ha sido la ideología dominante tras la caída del comunismo. Diametralmente opuesto al izquierdismo, el neoliberalismo busca implementar reformas de mercado, como la eliminación de los controles de precios, la privatización de las industrias controladas por el Gobierno, la desregulación de los mercados de capital y la reducción de las barreras comerciales, abriendo el país a la globalización.\n\nEl neoliberalismo moderno utiliza ideas progresistas para expandir sus mercados y apoya abiertamente los derechos LGBT, el feminismo y los derechos de las minorías, utilizando al Estado para mantener dichas políticas sociales. Las instituciones neoliberales más destacadas incluyen el FMI y el Banco Mundial, que han promulgado reformas en todo el mundo."
 christian_democracy: "Democracia cristiana"
 christian_democracy_desc: "\n\n\n\n£GFX_Ideology_chirstian_democracy\n\n\n\n\n\nLa §Ydemocracia cristiana§! es una ideología política basada en las ideas democráticas modernas y en los valores y la ética cristianos tradicionales. Tiene influencias de la enseñanza social católica y del neocalvinismo. En la práctica, la democracia cristiana suele considerarse de centroderecha en cuestiones culturales, sociales y morales, pero de centroizquierda \"en lo que respecta a cuestiones económicas y laborales, derechos civiles y política exterior\", así como en el medio ambiente."
 supervised_democracy_liberal: "Democracia forzada"
 supervised_democracy_liberal_desc: "\n\n\n\n£GFX_Ideology_enforced_democracy\n\n\n\n\n\nLa §Ydemocracia forzada§!, aunque similar a la democracia transitoria en el sentido de que es autoritaria, es muy diferente. Implica la imposición de principios \"democráticos\" mediante la intervención extranjera, normalmente por parte de potencias extranjeras u organizaciones internacionales. Esta forma de Gobierno tiene por objeto establecer un marco democrático, a menudo acompañado de intervención militar o presión diplomática, para sustituir a un régimen autocrático. Entre los ejemplos históricos de democracia forzada se incluyen las intervenciones posteriores a conflictos en Irak y Afganistán, así como en Vietnam del Sur.\n\nSin embargo, este proceso no está exento de defectos, ya que puede provocar resistencia local, un vacío de poder y, en el peor de los casos, insurgencias brutales como las que se han visto en los ejemplos antes mencionados. Se trata de un enfoque polémico que plantea interrogantes sobre la legitimidad del orden \"democrático\" impuesto, así como sobre su eficacia para alcanzar sus objetivos."
 liberal_socialism: "Socialismo liberal"
 liberal_socialism_desc: "\n\n\n\n£GFX_Ideology_liberal_socialism\n\n\n\n\n\nEl §Ysocialismo liberal§! es una filosofía política que incorpora principios liberales al socialismo. Esta síntesis considera al liberalismo como la teoría política que da por sentada la libertad interior del espíritu humano y adopta la libertad como meta, medio y norma de la vida humana compartida. El socialismo se considera el método para hacer realidad este reconocimiento de la libertad a través de la autonomía política y económica y la emancipación de las garras de la necesidad material apremiante."
 centrist: "Centrismo"
 centrist_desc: "\n\n\n\n£GFX_Ideology_centrism\n\n\n\n\n\nEl §Ycentrismo§! es una ideología política que funciona como un punto intermedio entre la izquierda y la derecha tradicionales, con ideales estructurados en torno al compromiso. El centrismo rechaza el extremismo político de todos los bandos y trata de adoptar un enfoque equilibrado de la política, por lo general en países desgarrados por la política partidista, como Francia bajo el liderazgo de Emmanuel Macron, quien se describe a sí mismo y a su partido como centristas.\n\nLos Gobiernos centristas suelen promover el bipartidismo y posiciones socioeconómicas moderadas, así como la filosofía del compromiso basado en principios. Los centristas suelen valorar la estabilidad política por encima de todo lo demás, aunque si un gobierno centrista no es eficaz a la hora de unir a la izquierda y la derecha, es casi seguro que se derrumbe, en sentido figurado o literal."
 sovereign_democracy_liberal: "Democracia soberana"
 sovereign_democracy_liberal_desc: "\n\n\n\n£GFX_Ideology_left_sovdem_liberal\n\n\n\n\n\nLa §Ydemocracia soberana§! es una ideología política de nicho cuyo objetivo es crear una democracia \"perfecta\" que ignore las disputas entre los partidos democráticos occidentales. Los partidos no sólo tienen puntos de vista similares, sino que también cooperan y trabajan para mejorar el Estado en su conjunto. La sociedad civil actúa como un control sobre los partidos, utilizando su influencia para expulsar a funcionarios corruptos y antipatrióticos, por ejemplo.\nEl Partido Centrista defiende el comunitarismo, la libertad de expresión y la optimización del poder. Su objetivo es una plataforma más liberal, pero sin fundamentos occidentales y con un liberalismo \"saludable\"."
 russian_patriotic_liberalism: "Populismo liberal"
 russian_patriotic_liberalism_desc: "\n\n\n\n£GFX_Ideology_patriotic_democracy_banner\n\n\n\n\n\nEl §Ypopulismo liberal§! es uno de los términos ideológicos más novedosos cultivados bajo la \"democracia patriótica\" de Navalni. \"Patriótico\" en su nombre representa la posición del gobierno de proteger la identidad y el carácter estatal de Rusia, así como de garantizar que el patriotismo se combine con las instituciones democráticas.\n\nLa variedad liberal es la más centrista y diversa de todas, ya que tiene la política estatal más liberal y utiliza una coalición parlamentaria igualitaria y versátil para expandir los objetivos del Estado, negociando reformas y políticas conjuntas. Las políticas económicas liberales pueden describirse como intentos de construir un capitalismo de libre mercado, sin dejar de tener en cuenta el bienestar de las personas, y acuerdos con los miembros izquierdistas de la coalición, lo que puede llevar a restringir los mecanismos de libre mercado en aras de la estabilidad social y la prosperidad.\n\nAl igual que otras variantes posibles, a menudo coloca a la nacionalidad rusa como formadora del Estado y trata de reducir la participación de las minorías en los asuntos estatales, afirmando que \"las personas retrógradas y no pertenecientes al núcleo central pueden tratar de someter los procesos democráticos del país y destruir nuestra democracia\"."
 green_liberalism: "Liberalismo verde"
 green_liberalism_desc: "\n\n\n\n£GFX_ideology_green_liberalism_banner\n\n\n\n\n\nEl §Yliberalismo verde§! es una ideología que combina los principios del liberalismo con un fuerte énfasis en la sostenibilidad ambiental y la responsabilidad ecológica. Busca promover la libertad individual y la prosperidad económica, garantizando al mismo tiempo la protección y preservación del mundo natural."
 ultra_liberalism: "Ultraliberalismo"
 ultra_liberalism_desc: "\n\n\n\n£GFX_ideology_ultra_liberalism_banner\n\n\n\n\n\nEl §Yultraliberalismo§!, o liberalismo radical, es un término que se refiere a un subconjunto del liberalismo social que se desarrolla en un país como resultado de la amenaza a la democracia o de una mayor autocratización. Los defensores de esta ideología sostienen que los valores liberales deben garantizarse y protegerse por todos los medios necesarios, incluso si ello implica la supresión de la disidencia y el unipartidismo mediante el uso de la fuerza militar. El ultraliberalismo también apoya el globalismo, abogando por la libre circulación de bienes y personas y por el fomento del comercio internacional; un ejemplo de ello es el espacio Schengen.\n\nA pesar de estas diferencias, el ultraliberalismo comparte mucho con el nacionalismo liberal y propugna una economía mixta procorporativa, así como el progresismo social. Si bien esta variante del liberalismo es increíblemente poco común, no deja de tener sus partidarios, especialmente en una Europa desgarrada por la guerra..."
 market_liberal: "Liberal de mercado"
 market_liberal_noun: "Liberalismo de mercado"
 market_liberal_desc: "Democracia liberal de mercado"
 market_liberal_drift: "Cambio al liberalismo de mercado"
 market_liberal_color: "§Y"
 market_liberal_color_name: "§Y$market_liberal$§!"
 right_libertarianism: "Libertarismo de derecha"
 right_libertarianism_desc: "\n\n\n\n£GFX_Ideology_Libertarian\n\n\n\n\n\nEl §Ylibertarismo de derecha§!, o capitalismo libertario, es una ideología de derecha que defiende el libre mercado, el derecho a la propiedad privada y un Gobierno pequeño. Los libertarios de derecha generalmente quieren una reversión importante del Estado del bienestar, así como la expansión de los derechos negativos. La filosofía libertaria de derecha también tiene sus raíces en las ideas de los derechos individuales y la economía del libre mercado. La teoría libertaria de derecha de los derechos individuales generalmente sigue el principio de la propiedad familiar y la teoría del trabajo de la propiedad, enfatizando la autopropiedad y que las personas tienen un derecho absoluto a la propiedad que su trabajo produce."
 right_anarchism: "Anarquismo de derecha"
 right_anarchism_desc: "\n\n\n\n£GFX_Ideology_ancap\n\n\n\n\n\nEl §Yanarquismo de derecha§!, también conocido comúnmente como anarcocapitalismo, es una filosofía política que aboga por el mercado por encima de todo y por la abolición total del Estado. En ausencia de estatutos, los anarcocapitalistas sostienen que la sociedad tiende a autorregularse y civilizarse contractualmente mediante la participación en el libre mercado, que describen como una sociedad voluntaria. El sistema de propiedad privada seguiría existiendo y sería aplicado por agencias de defensa privadas y compañías de seguros seleccionadas por los clientes, que operarían competitivamente en un mercado y cumplirían las funciones de los tribunales y la policía."
 right_anarchism_SOL: "Jeffersonianismo"
 classical_liberalism: "Liberalismo clásico"
 classical_liberalism_desc: "\n\n\n\n£GFX_Ideology_classical_liberal\n\n\n\n\n\nEl §Yliberalismo clásico§! es una ideología política que defiende las libertades civiles en el marco del imperio de la ley, con énfasis en la libertad económica. Se desarrolló a principios del siglo XIX, basándose en ideas del siglo anterior como respuesta a la urbanización y la Revolución Industrial. Los libertarios clásicos siguen de cerca a Adam Smith y las creencias del utilitarismo, la ley natural, el contrato social y los derechos naturales."
 civic_nationalism: "Liberalismo nacionalista"
 civic_nationalism_desc: "\n\n\n\n£GFX_Ideology_civic_nationalism\n\n\n\n\n\nEl §Yliberalismo nacionalista§! es una variante del liberalismo que combina políticas liberales con nacionalismo cívico, herencia cultural y compromiso con el Estado nación. Busca reconciliar las libertades individuales con una identidad nacional compartida, abogando por una intervención gubernamental limitada en la economía y apoyando en cambio el libre mercado.\n\nSi bien apoyan el progresismo social, este se enmarca casi por completo en el marco cultural de una nación y se oponen vehementemente a los cambios que rechazan el tradicionalismo. El nacionalliberalismo también se alimenta del patriotismo y de fuertes conexiones culturales, aunque esto varía según el país. Por encima de todo, apoyan el orden y la seguridad nacional, en algunos casos haciendo todo lo posible para garantizar que dicho orden se mantenga..."
 trumpism_market: "Trumpismo"
 trumpism_market_desc: "\n\n\n\n£GFX_ideology_trumpism_market_banner\n\n\n\n\n\nEl §Ytrumpismo§! es un movimiento político de Estados Unidos que abarca las ideologías políticas asociadas con Donald Trump y sus partidarios. Incluye el populismo de derecha, el antiglobalismo de derecha, el conservadurismo nacional y el neonacionalismo, y se caracteriza por fuertes creencias antiliberales.\n\nDurante su liderazgo, Trump hizo hincapié en la dependencia de las desregulaciones, la reducción de los excesos federales y las políticas orientadas a las empresas. Tomó el control del movimiento y expulsó a los individuos desleales de sus filas. Los libertarios se han convertido en el núcleo del movimiento, poniendo siempre por delante los intereses de la empresa estadounidense.\nEl ideologema se ha solidificado. Sus acólitos los seguirán ahora hasta el final."
 conservative: "Conservador"
 conservative_noun: "Conservador"
 conservative_desc: "Democracia conservadora"
 conservative_drift: "Cambio al conservadurismo"
 conservative_color: "§3"
 conservative_color_name: "§3$conservative$§!"
 right_centrist: "Centrismo de derecha"
 right_centrist_desc: "\n\n\n\n£GFX_Ideology_Right_Centrism\n\n\n\n\n\nEl §Ycentrismo de derecha§! es una mezcla sincrética de ideologías de derecha que sostienen posiciones moderadas, descritas como cercanas al \"centro\", y que pretende unirlas bajo una única organización o agenda. Las políticas incluyen la moderación económica, y sus defensores abogan por una economía de mercado mixta que valore los principios del libre mercado con un grado de intervención gubernamental para abordar las cuestiones económicas.\n\nLos centristas de derecha suelen ser conservadores en lo social, aunque están dispuestos a hacer concesiones en cuestiones sociales. A pesar de valorar la libertad personal, a menudo están dispuestos a permitir restricciones en nombre de la seguridad o la estabilidad nacional, y el principio básico del centrismo de derecha es el pragmatismo."
 right_populism: "Populismo de derecha"
 right_populism_desc: "\n\n\n\n£GFX_Ideology_right_populist\n\n\n\n\n\nEl §Ypopulismo de derecha§! es una ideología que combina la retórica populista con las ideas de derecha. La retórica populista de derecha tradicionalmente defiende sentimientos antielitistas, antisistema, nacionalistas y nativistas. Los populistas de derecha tradicionalmente culpan a la inmigración, el globalismo y los valores liberales por el declive social y, a cambio, ofrecen políticas de control migratorio más estricto, aranceles elevados y un retorno a los valores tradicionales como solución. Los populistas de derecha son tradicionalmente extremadamente nacionalistas por naturaleza y abogan por el proteccionismo económico."
 neoconservative: "Neoconservadurismo"
 neoconservative_desc: "\n\n\n\n£GFX_Ideology_neo_conservative\n\n\n\n\n\nEl §Yneoconservadurismo§! es un movimiento político que nace en los Estados Unidos durante la década de 1960 como reacción a la política exterior del Partido Demócrata de los Estados Unidos, la creciente Nueva Izquierda y la contracultura, en particular durante las protestas de Vietnam. Muchos también comenzaron a cuestionar sus creencias liberales con respecto a las políticas internas, como el Estado del bienestar. Los neoconservadores suelen abogar por la promoción de la democracia y el intervencionismo en los asuntos internacionales, incluida la paz a través de la fuerza, y son conocidos por su desdén hacia el comunismo y el radicalismo político."
 christian_conservatism: "Conservadurismo cristiano"
 christian_conservatism_desc: "\n\n\n\n£GFX_Ideology_Christian_Conservatism\n\n\n\n\n\nEl §Yconservadurismo cristiano§! es un movimiento político cristiano que busca influir en la política y las políticas públicas con su interpretación de las enseñanzas del cristianismo. La derecha cristiana se destaca por promover posiciones socialmente conservadoras en temas como el apoyo a la oración en las escuelas, el diseño inteligente, la templanza, el nacionalismo cristiano y el sabatismo dominical. Mientras tanto, tradicionalmente se oponen a ideas como la educación sexual, el aborto, la investigación con células madre embrionarias, la eutanasia, los anticonceptivos, la homosexualidad y la pornografía."
 mormon_conservatism: "Conservadurismo mormón"
 constitutionalist: "Constitucionalismo"
 constitutionalist_desc: "\n\n\n\n£GFX_Ideology_constitutionalism\n\n\n\n\n\nEl §Yconstitucionalismo§! es una ideología que propone que los cimientos de un país no son negociables. Sus defensores desprecian los cambios sociales y económicos que alteran la imagen que sirvió de base al país. Algunos los califican de estancados, pero bajo su dirección, las empresas saben cuál es su lugar y cuáles son sus derechos, lo que hace que la economía confíe en el gobierno."
 classical_conservatism: "Conservadurismo clásico"
 classical_conservatism_desc: "\n\n\n\n£GFX_ideology_classical_conservatismsub\n\n\n\n\n\nEl §Yconservadurismo clásico§! es una filosofía política y social que enfatiza la importancia de los principios morales trascendentes que se manifiestan a través de ciertas leyes naturales a las que la sociedad debe adherirse con prudencia. El conservadurismo tradicionalista se basa en las opiniones políticas de Aristóteles y Edmund Burke. Los tradicionalistas valoran los lazos sociales y la preservación de las instituciones ancestrales por encima de lo que consideran un individualismo excesivo."
 islamic_democrat: "Democracia islámica"
 islamic_democrat_desc: "\n\n\n\n£GFX_ideology_islamic_democracy\n\n\n\n\n\nLa §Ydemocracia islámica§!, también conocida como liberalismo islámico, es un punto intermedio entre el secularismo y la democracia sharia, intentando fusionar las ideas del Corán con las ideas liberales occidentales, como la democracia, los derechos humanos, el pluralismo y el Estado de derecho, aunque sus defensores creen que el Islam todavía debería desempeñar un papel importante en los asuntos estatales."
 sovereign_democracy: "Democracia soberana"
 sovereign_democracy_desc: "\n\n\n\n£GFX_Ideology_sovdem\n\n\n\n\n\nLa §Ydemocracia soberana§! es una ideología política de nicho cuyo objetivo es crear una democracia \"perfecta\" que ignore las disputas entre los partidos democráticos occidentales. Los partidos no sólo tienen puntos de vista similares, sino que también cooperan y trabajan para mejorar el Estado en su conjunto. La sociedad civil actúa como un control sobre los partidos, utilizando su influencia para expulsar a funcionarios corruptos y antipatrióticos, por ejemplo.\nEl partido de derecha aboga por un mercado más abierto, aunque bajo un sector estatizado de industrias clave. Está dirigido a un público más nacionalista sin ninguna supremacía racial."
 putinism_conservative: "Putinismo compasivo"
 putinism_conservative_desc: "\n\n\n\n£GFX_Ideology_conservative_putinism_banner\n\n\n\n\n\nEl §Yputinismo compasivo§! sangrante es un enfoque más flexible que el sistema establecido por Dmitri Medvédev. Esta iniciativa busca aliviar el descontento con las estrictas políticas de las épocas de preguerra y guerra. Aunque no es una democracia plena, fomenta el debate dentro del Frente Popular Panruso. Esto promueve una variedad de soluciones y una mayor transparencia por parte del gobierno y la élite política. Además, busca mejorar la atención médica pública, como desea la propia Vorontsova.\n\nSu objetivo es crear una ilusión de libertad limitada, abordando el desencanto público con el gobierno y censura del Kremlin. María Vorontsova, la hija de Vladímir Putin, es la cara pública de estas reformas. Mientras ella interactúa con el público, el Kremlin y su administración manejan los asuntos entre bastidores."
 russian_patriotic_populism: "Populismo democrático"
 russian_patriotic_populism_desc: "\n\n\n\n£GFX_Ideology_patriotic_democracy_banner\n\n\n\n\n\nEl §Ypopulismo democrático§! es uno de los términos ideológicos más novedosos cultivados bajo la \"democracia patriótica\" de Navalni. \"Patriótico\" en su nombre representa la posición del Gobierno de proteger la identidad y el carácter estatal de Rusia, así como de garantizar que el patriotismo se combine con las instituciones democráticas.\n\nLa variante populista consiste en una retórica de derecha y la formación de una amplia coalición parlamentaria en la que el partido gobernante toma el control, mediante acuerdos secretos y políticas adoptadas. Al tener medios de comunicación y leyes estatales más laxas, aún se une al cuerpo ejecutivo para lidiar con cualquier subversión dañina contra su gobierno. Si bien el sistema económico ideal para los populistas sería el capitalismo de mercado responsable, es posible que tengan que hacer las paces con los miembros de la coalición, incluida la aprobación de políticas sociales y la ampliación de la asistencia social para mantener los equilibrios que se construyeron para salvaguardar la democracia patriótica.\n\nAl igual que otras variantes posibles, a menudo coloca la nacionalidad rusa como formadora del Estado y trata de reducir la participación de las minorías en los asuntos estatales, afirmando que \"las personas retrógradas y no pertenecientes al núcleo central pueden tratar de someter los procesos democráticos del país y destruir nuestra democracia\"."
 generic_patriotic_populism: "Populismo democrático"
 generic_patriotic_populism_desc: "\n\n\n\n£GFX_Ideology_patriotic_democracy_banner_generic\n\n\n\n\n\nEl §Ypopulismo democrático§! es uno de los términos ideológicos más novedosos cultivados bajo la \"democracia patriótica\" de Navalni. \"Patriótico\" en su nombre representa la posición del Gobierno de proteger la identidad estatal y única de Rusia, así como de garantizar que el patriotismo se combine con las instituciones democráticas.\n\nLa variante populista, después de la revolución en Bielorrusia, trascendió el campo político ruso y ganó popularidad principalmente entre los euroescépticos liberales y conservadores que priorizan la lucha contra la corrupción, la burocracia y la explotación externa. Al igual que en Rusia, sus ideas se basan en la retórica de derecha y la formación de una amplia coalición parlamentaria en la que el partido gobernante toma el control, mediante acuerdos secretos y políticas adoptadas. Con medios de comunicación y leyes estatales más flexibles, todavía se apoya en el órgano ejecutivo para hacer frente a cualquier subversión dañina contra su gobierno. Si bien el sistema económico ideal para los populistas sería el capitalismo de mercado responsable, es posible que tengan que llegar a acuerdos con los miembros de la coalición, lo que incluye aprobar políticas sociales y ampliar la asistencia social para mantener los equilibrios que se construyeron para salvaguardar la democracia patriótica."
 belarus_patriotic_populism: "Populismo democrático"
 belarus_patriotic_populism_desc: "\n\n\n\n£GFX_Ideology_patriotic_democracy_blr_banner\n\n\n\n\n\nEl §Ypopulismo democrático§! es uno de los términos ideológicos más novedosos cultivados bajo la \"democracia patriótica\" de Navalni. \"Patriótico\" en su nombre representa la posición del Gobierno de proteger la identidad estatal y única de Rusia, así como de garantizar que el patriotismo se combine con las instituciones democráticas.\n\nLa variante populista, después de la revolución en Bielorrusia, trascendió el campo político ruso y ganó popularidad principalmente entre los euroescépticos liberales y conservadores que priorizan la lucha contra la corrupción, la burocracia y la explotación externa. Al igual que en Rusia, sus ideas se basan en la retórica de derecha y la formación de una amplia coalición parlamentaria en la que el partido gobernante toma el control, mediante acuerdos secretos y políticas adoptadas. Con medios de comunicación y leyes estatales más flexibles, todavía se apoya en el órgano ejecutivo para hacer frente a cualquier subversión dañina contra su gobierno. Si bien el sistema económico ideal para los populistas sería el capitalismo de mercado responsable, es posible que tengan que llegar a acuerdos con los miembros de la coalición, lo que incluye aprobar políticas sociales y ampliar la asistencia social para mantener los equilibrios que se construyeron para salvaguardar la democracia patriótica."
 france_patriotic_populism_desc: "\n\n\n\n£GFX_Ideology_patriotic_democracy_fra_banner\n\n\n\n\n\nEl §Ypopulismo democrático§! es uno de los términos ideológicos más novedosos cultivados bajo la \"democracia patriótica\" de Navalni. \"Patriótico\" en su nombre representa la posición del Gobierno de proteger la identidad estatal y única de Rusia, así como de garantizar que el patriotismo se combine con las instituciones democráticas.\n\nLa variante populista, después de la revolución en Bielorrusia, trascendió el campo político ruso y ganó popularidad principalmente entre los euroescépticos liberales y conservadores que priorizan la lucha contra la corrupción, la burocracia y la explotación externa. Al igual que en Rusia, sus ideas se basan en la retórica de derecha y la formación de una amplia coalición parlamentaria en la que el partido gobernante toma el control, mediante acuerdos secretos y políticas adoptadas. Con medios de comunicación y leyes estatales más flexibles, todavía se apoya en el órgano ejecutivo para hacer frente a cualquier subversión dañina contra su gobierno. Si bien el sistema económico ideal para los populistas sería el capitalismo de mercado responsable, es posible que tengan que llegar a acuerdos con los miembros de la coalición, lo que incluye aprobar políticas sociales y ampliar la asistencia social para mantener los equilibrios que se construyeron para salvaguardar la democracia patriótica."
 transnistria_patriotic_populism_desc: "\n\n\n\n£GFX_Ideology_patriotic_democracy_tra_banner\n\n\n\n\n\nEl §Ypopulismo democrático§! es uno de los términos ideológicos más novedosos cultivados bajo la \"democracia patriótica\" de Navalni. \"Patriótico\" en su nombre representa la posición del Gobierno de proteger la identidad estatal y única de Rusia, así como de garantizar que el patriotismo se combine con las instituciones democráticas.\n\nLa variante populista, después de la revolución en Bielorrusia, trascendió el campo político ruso y ganó popularidad principalmente entre los euroescépticos liberales y conservadores que priorizan la lucha contra la corrupción, la burocracia y la explotación externa. Al igual que en Rusia, sus ideas se basan en la retórica de derecha y la formación de una amplia coalición parlamentaria en la que el partido gobernante toma el control, mediante acuerdos secretos y políticas adoptadas. Con medios de comunicación y leyes estatales más flexibles, todavía se apoya en el órgano ejecutivo para hacer frente a cualquier subversión dañina contra su gobierno. Si bien el sistema económico ideal para los populistas sería el capitalismo de mercado responsable, es posible que tengan que llegar a acuerdos con los miembros de la coalición, lo que incluye aprobar políticas sociales y ampliar la asistencia social para mantener los equilibrios que se construyeron para salvaguardar la democracia patriótica."
 conservative_socialism: "Socialismo conservador"
 conservative_socialism_desc: "\n\n\n\n£GFX_Ideology_Conservative_Socialism\n\n\n\n\n\nEl socialismo conservador, socialismo burgués o conservadurismo paternalista se refiere a una ideología que combina elementos del socialismo con valores conservadores de derecha. Los socialistas conservadores apoyan valores conservadores como las estructuras familiares tradicionales, las creencias religiosas y la identidad nacional, así como políticas que promueven la cohesión social, la preservación cultural y los valores morales, y a menudo se oponen a los cambios sociales asociados con el liberalismo o el progresismo. Si bien los socialistas conservadores apoyan la intervención del gobierno en los asuntos económicos, son más propensos a aceptar los mecanismos de mercado y la empresa privada en mayor medida, como en China y la Unión Soviética."
 supervised_democracy: "Democracia transitoria"
 supervised_democracy_desc: "\n\n\n\n£GFX_ideology_transitional_democracy\n\n\n\n\n\nLa §Ydemocracia transitoria§!, también llamada \"democratización\", es el período en el que un Gobierno autoritario pasa a ser uno estable y democrático, generalmente mediante el uso de la fuerza, para protegerlo de amenazas internas o externas. Durante este período de transición, se producen importantes cambios políticos, sociales e institucionales para lograr principios democráticos, incluidas elecciones libres y justas, libertad de expresión, la protección de los derechos humanos y el Estado de derecho.\n\nComo consecuencia, los regímenes de transición experimentan importantes disturbios civiles, aunque dichos disturbios no se dan en todos los casos. Algunos ejemplos comunes de democracias de transición incluyen Polonia, Hungría, la República Checa, España y Portugal, lo que hace que esta forma de Gobierno sea la más común desde el final de la Guerra Fría. En qué medida esto ocurre puede verse afectado por varios factores, y hay muchos ejemplos de democratización que fracasan debido a ellos, como en Birmania. El ejército también desempeña un papel en varios casos de democracia de transición, ya que el apoliticismo le permite llevar a cabo sus funciones de manera eficiente."
 trumpism_conservative: "Trumpismo"
 trumpism_conservative_desc: "\n\n\n\n£GFX_ideology_trumpism_conservative_banner\n\n\n\n\n\nEl §Ytrumpismo§! es un movimiento político de Estados Unidos que abarca las ideologías políticas asociadas con Donald Trump y sus partidarios. Incluye el populismo de derecha, el antiglobalismo de derecha, el conservadurismo nacional y el neonacionalismo, y se caracteriza por fuertes creencias antiliberales.\n\nDurante su liderazgo, Trump hizo hincapié en la confianza en sólidos valores nacionales, el natalismo y las políticas de \"América Primero\". Tomó el control del movimiento y expulsó a los individuos desleales de sus filas. Los populistas se han convertido en el núcleo del movimiento, priorizando siempre los intereses de los ciudadanos estadounidenses.\nEl ideologema se ha solidificado. Sus acólitos los seguirán ahora hasta el final."
 authoritarian_democrat: "Democrático autoritario"
 authoritarian_democrat_noun: "Democracia autoritaria"
 authoritarian_democrat_desc: "Democracia autoritaria"
 authoritarian_democrat_drift: "Cambio hacia la democracia autoritaria"
 authoritarian_democrat_color: "§g"
 authoritarian_democrat_color_name: "§g$authoritarian_democrat$§!"
 ultra_conservatism: "Ultraconservadurismo"
 ultra_conservatism_desc: "\n\n\n\n£GFX_Ideology_ultra_conservatism\n\n\n\n\n\nEl §Yultraconservadurismo§! representa una forma más rígida e intransigente de conservadurismo. Los ultraconservadores tienden a resistir o rechazar el cambio y la reforma social, y a menudo buscan regresar a lo que perciben como un pasado más puro o idealizado. Suelen ser extremadamente críticos con la modernización, los movimientos sociales progresistas y los cambios en las normas sociales tradicionales.\n\nLos ultraconservadores suelen abogar por una interpretación y aplicación estrictas de los valores religiosos, culturales o morales. Pueden oponerse a la intervención del Gobierno en asuntos sociales y económicos y abogar por la minimización de la intervención del Gobierno. Los ultraconservadores también pueden oponerse a la cooperación y los acuerdos internacionales, priorizando en su lugar la soberanía nacional."
 mormon_ultra_conservatism: "Ultraconservadurismo mormón"
 oligarchist: "Oligarquía"
 oligarchist_desc: "\n\n\n\n£GFX_Ideology_oligarchy\n\n\n\n\n\nLa §Yoligarquía§! es una forma de estructura de poder en la que el sistema estatal se entrelaza con redes de influencia de ciertas corporaciones nobles y ricas, más comúnmente conocidas como \"oligarcas\". Estas personas, aunque no están directamente a cargo del país, tienen diversas influencias y conexiones económicas que les permiten implementar políticas que les favorecen en los cargos gubernamentales.\n\nLos oligarcas, aunque suelen ser extremadamente corruptos y difíciles de domesticar, pueden resultar beneficiosos para el Estado si este equilibra la influencia oligárquica y los intereses nacionales de manera favorable. Sus conexiones, no solo internas sino también externas, pueden ayudar a resolver problemas geopolíticos, y su capital y sus habilidades gerenciales pueden ayudar a desarrollar la economía y el comercio nacionales."
 islamic_authoritarian: "Democracia sharía"
 islamic_authoritarian_desc: "\n\n\n\n£GFX_ideology_sharia_democracy\n\n\n\n\n\nLa §Ydemocracia sharía§!, a menudo asociada con el jomeinismo, es una ideología política arraigada en los principios de la ley sharia islámica, particularmente según la interpretación del ayatolá Ruholá Jomeiní. Combina elementos de la gobernanza islámica con una forma de democracia participativa, buscando establecer un sistema político guiado por la ley islámica. La implementación de dicha ley es central para la ideología, siendo la base de la legislación y la gobernanza. Implica interpretar y aplicar el texto islámico a asuntos legales y sociales, lo que naturalmente otorga al clero islámico una gran cantidad de poder en el estado de cosas.\n\nVelayat-e Faqih, la tutela del jurista, es una de las ideas más centrales de la democracia sharia, que otorga plena autoridad al Líder Supremo elegido por el clero islámico. El presidente, sin embargo, es elegido a través de la participación popular. También enfatiza el antiimperialismo, un Estado del bienestar y una supuesta lucha contra la corrupción."
 confucian_hyperconservativism: "Hiperconservadurismo confuciano"
 confucian_hyperconservativism_desc: "\n\n\n\n£GFX_Ideology_Confucian_Hyperconservatism\n\n\n\n\n\nEl §Yhiperconservadurismo confuciano§! se refiere a una forma extrema de conservadurismo político y social que se origina en la filosofía confuciana, en particular en los valores tradicionales y las jerarquías sociales comunes en China. A pesar de haber sido prácticamente destruido y eliminado gradualmente de la popularidad bajo el gobierno de Mao, este subconjunto del confucianismo ha ido recuperando rápidamente la atención dentro y fuera de China, y organizaciones como Falun Gong se lo atribuyen.\n\nSe opone a la modernización, que percibe como antitética a la cultura china y a la tradición confuciana, y apoya el gobierno autoritario y el paternalismo; postula que una burocracia fuerte y centralizada, así como un gobernante sabio y virtuoso, son esenciales para la armonía social. Es fervientemente anticomunista y antiliberal, rechaza las formas de moralidad progresista y defiende una filosofía de \"autofortalecimiento\", vinculada al moralismo confuciano. Algunos defensores de esta corriente del confucianismo también apoyan el excepcionalismo Han, aunque no es inherente a la ideología."
 corporatocracy: "Corporatocracia"
 corporatocracy_desc: "\n\n\n\n£GFX_Ideology_corp\n\n\n\n\n\n§YCorporatocracia§! es un término utilizado para referirse a un sistema económico, político y judicial controlado por corporaciones o intereses corporativos en el que las corporaciones comerciales tienen un control significativo sobre el Gobierno, si no el control total."
 military_democracy: "Democracia militar"
 military_democracy_desc: "\n\n\n\n£GFX_ideology_military_democracysub\n\n\n\n\n\nLa §Ydemocracia militar§! es, esencialmente, una junta militar con un sistema de gobierno electivo. La sociedad que se rige por esta ideología es muy militarista y el servicio militar se considera un signo de estatus social. Por lo general, estas sociedades se forman durante las guerras y luego pasan a sistemas democráticos o autoritarios."
 hybrid_regime: "Anocracia"
 hybrid_regime_desc: "\n\n\n\n£GFX_ideology_ideology_anocracy_banner\n\n\n\n\n\nUna §Yanocracia§!, a menudo conocida como una semi-democracia, se define como una forma de Gobierno que mezcla elementos democráticos y autocráticos en la forma de gobernar una nación. Si bien las anocracias tienden a permitir algún tipo de procesos (semi) democráticos, como las elecciones, tienden a tener algunas leyes que se consideran antidemocráticas, si no autocráticas. Si bien no son necesariamente corruptas y opresivas como sus contrapartes puramente autocráticas, aún son propensas a cometer las mismas acciones drásticas que las autocracias."
 assadist_baathism: "Baazismo asadista"
 assadist_baathism_desc: "\n\n\n\n£GFX_ideology_assadist_baathism_banner\n\n\n\n\n\nEl término §Ybaazismo asadista§!, o Movimiento Correctivo, se utiliza para describir las políticas de Háfez al-Ásad y su sucesor, Bashar al-Ásad. El asadismo, que tiene sus raíces en el baazismo, una ideología socialista panárabe, ha evolucionado hasta convertirse en una forma independiente, moldeada por las políticas de la dinastía Ásad. Entre los elementos del asadismo se incluyen el secularismo, el nacionalismo árabe y el socialismo, que es fundamental para el baazismo, aunque su implementación práctica a menudo ha implicado pragmatismo económico y cambios en dichas políticas.\n\nLa ideología prioriza el mantenimiento de un Estado burocrático fuerte y centralizado que utiliza frentes populares para consolidar el control en torno a un solo partido, el Partido Baaz, con énfasis en la estabilidad política y la supresión de la disidencia. Esto ha suscitado críticas tanto dentro como fuera de Siria, y el gobierno autocrático de Bashar al-Ásad condujo a un intento de revolución y a una guerra civil en la década de 2010. Si bien tienen las mismas raíces que el baazismo iraquí, tienen varias diferencias: los esfuerzos de liberalización y privatización de Háfez en la década de 2000 contrastan con la economía de Sadam."
 putinism: "Putinismo"
 putinism_desc: "\n\n\n\n£GFX_Ideology_putinism_banner\n\n\n\n\n\nEl §Yputinismo§! es una ideología que es la culminación de los ideales de Vladímir Putin. Una democracia autoritaria apolítica, fuertemente tecnocrática y capitalista de Estado con énfasis en el libre mercado.\n\nEl Estado lucha por la seguridad de Rusia, utilizando todos los métodos necesarios. Los nazis rusos desaparecen misteriosamente sin dejar rastro, los líderes de la oposición son encarcelados, las protestas tanto contra la inmigración como a favor de los musulmanes son reprimidas: el Estado busca mantener un equilibrio estricto en la nación. Si bien esto genera mucho odio hacia el Estado, ya que nadie siente que el gobierno los \"defienda\", también hace que la gente se vuelva apática hacia la política y, en última instancia, evita enfrentamientos ideológicos a gran escala. Sin embargo, esto no significa que la gente odie a la nación. El patriotismo, los valores tradicionales y la unidad nacional son todos ellos alimentados por el Estado. La idea del \"mundo ruso\" y un orden multipolar son una de las principales fuerzas impulsoras del propio sistema.\n\nIncluso si Vladímir Vladímirovich se fuera, sus ideales seguirían vivos. Sin embargo, su sistema será mejorado para crear una Rusia perfecta, inmutable y verdaderamente unida."
 sovereign_democracy_auth_dem: "Democracia soberana"
 sovereign_democracy_auth_dem_desc: "\n\n\n\n£GFX_Ideology_sovdem\n\n\n\n\n\nLa §Ydemocracia soberana§! es una ideología política de nicho cuyo objetivo es crear una democracia \"perfecta\" que ignore las disputas entre los partidos democráticos occidentales. Los partidos no sólo tienen puntos de vista similares, sino que también cooperan y trabajan para mejorar el Estado en su conjunto. La sociedad civil actúa como un control sobre los partidos, utilizando su influencia para expulsar a funcionarios corruptos y antipatrióticos, por ejemplo.\nEl partido de derecha aboga por un mercado más abierto, aunque bajo un sector estatizado de industrias clave. Está dirigido a un público más nacionalista sin ninguna supremacía racial."
 patriotic_socialism: "Socialismo patriótico"
 patriotic_socialism_desc: "\n\n\n\n£GFX_Ideology_patriotic_socialism_banner\n\n\n\n\n\nEl §Ysocialismo patriótico§! es una ideología política en rápida evolución que combina elementos del socialismo y el patriotismo.\nEl socialismo patriótico enfatiza la importancia del orgullo nacional y el sentido de pertenencia al propio país, y rechaza las prácticas excesivamente radicales de los comunistas tanto en el país como en el extranjero. Si bien en general se mantiene fiel a los objetivos de lograr un bienestar social justo, permite cierta propiedad privada y puede estatizar o privatizar con el objetivo de lograr una política pragmática y la salud de la economía."
 russian_patriotic_meritocracy: "Populismo navalnista"
 russian_patriotic_meritocracy_desc: "\n\n\n\n£GFX_Ideology_patriotic_democracy_banner\n\n\n\n\n\nEl §Ypopulismo navalnista§! es uno de los términos ideológicos más novedosos cultivados bajo la \"democracia patriótica\" de Navalni. La parte patriótica del nombre representa la posición del gobierno de proteger la condición de Estado ruso y su identidad única, así como de garantizar que el patriotismo se combine con las instituciones democráticas.\n\nLa corriente meritocrática se diferencia por ser la más anocrática, construir un sistema de partido dominante y tener una amplia casta gerencial para ocuparse de las necesidades burocráticas, mientras que los \"gerentes\" mismos son constantemente intercambiados y reclutados de rangos dignos del partido o del aparato estatal inferior. A menudo gira hacia el conservadurismo, sin embargo, puede promulgar políticas de bienestar social y leyes progresistas para mantener los equilibrios que fueron construidos para salvaguardar la democracia patriótica.\n\nAl igual que otras variantes posibles, a menudo coloca a la nacionalidad rusa como formadora del Estado y trata de reducir la participación de las minorías en los asuntos estatales, afirmando que \"las personas retrógradas y no pertenecientes al núcleo central pueden tratar de someter los procesos democráticos del país y destruir nuestra democracia\"."
 novocommunism: "Novocomunismo"
 novocommunism_desc: "\n\n\n\n£GFX_Ideology_patriotic_socialism_banner\n\n\n\n\n\nEl §Ynovocomunismo§! es una ideología política en rápida evolución que combina elementos del socialismo y el patriotismo.\nEl novocomunismo enfatiza la importancia del orgullo nacional y el sentido de pertenencia al propio país, y rechaza las prácticas excesivamente radicales de los comunistas tanto en el país como en el extranjero. Si bien en general se mantiene fiel a los objetivos de lograr un bienestar social justo, permite cierta propiedad privada y puede estatizar o privatizar con el objetivo de lograr una política pragmática y la salud de la economía."
 russian_monarchist_conservative: "Conservadurismo zarista"
 russian_monarchist_conservative_desc: "\n\n\n\n£GFX_Ideology_ultra_conservatism\n\n\n\n\n\nEn un mundo siempre cambiante, donde las ideas peligrosas de algunos republicanos y marxistas ateos están en auge, el monarquismo conservador ruso surge como una alternativa refrescante. Combina los principios democráticos con la espiritualidad religiosa y el sentimiento patriótico, y la lealtad al gobernante del país.\n\nLa idea de la monarquía constitucional rusa surgió del deseo de proteger al mundo de los extremos de ambos bandos."
 trumpism_authdem: "Trumpismo"
 trumpism_authdem_desc: "\n\n\n\n£GFX_ideology_trumpism_authdem_banner\n\n\n\n\n\nEl §Ytrumpismo§! es un movimiento político de Estados Unidos que abarca las ideologías políticas asociadas con Donald Trump y sus partidarios. Incluye el populismo de derecha, el antiglobalismo de derecha, el conservadurismo nacional y el neonacionalismo, y se caracteriza por fuertes creencias antiliberales.\n\nDurante su liderazgo, Trump hizo hincapié en la confianza en un gobierno federal fuerte pero justo, el fervor nacionalista y la línea dura de \"América Primero\". Tomó el control del movimiento y eliminó a los individuos desleales de sus filas. Los patriotas se han convertido en el corazón del movimiento, priorizando siempre los intereses de la nación americana.\nEl ideologema se ha solidificado. Sus acólitos los seguirán ahora hasta el final."
 nationalist: "Despótico"
 nationalist_noun: "Despotismo"
 nationalist_desc: "Gobierno despótico"
 nationalist_drift: "Cambio hacia el despotismo"
 nationalist_color: "§P"
 nationalist_color_name: "§P$nationalist$§!"
 military_junta: "Junta militar"
 military_junta_desc: "\n\n\n\n£GFX_Ideology_military_junta\n\n\n\n\n\nUna §Yjunta militar§! es un Gobierno dirigido por un comité de líderes militares. El término se utiliza actualmente para referirse a una forma autoritaria de Gobierno caracterizada por una dictadura militar oligárquica, distinguiéndose de otras categorías de gobierno autoritario."
 neo_luddism: "Neoludismo"
 neo_luddism_desc: "\n\n\n\n£GFX_Ideology_neo_luddism\n\n\n\n\n\nEl §Yneoludismo§! es un movimiento de grupos que se resisten a las tecnologías modernas y que exigen el retorno de algunas o todas las tecnologías a un nivel preindustrial. Los neoluditas se caracterizan por una o más de las siguientes prácticas: abandonar pasivamente el uso de la tecnología, perjudicar a quienes producen tecnología perjudicial para el medio ambiente, promover una vida sencilla o sabotear la tecnología. El movimiento neoludismo moderno tiene conexiones con el movimiento antiglobalización, el movimiento anticiencia, el anarcoprimitivismo, el ambientalismo radical y la ecología profunda."
 purification_administration: "Bidenismo"
 purification_administration_desc: "\n\n\n\n£GFX_Ideology_caligula\n\n\n\n\n\nLa democracia es la piedra angular de nuestra nación, un principio preciado que nos ha permitido crecer desde trece pequeñas colonias hasta convertirnos en un líder mundial. Hoy, Joseph Biden se erige como el emblema del espíritu americano. A pesar de su avanzada edad, su mente sigue siendo \"aguda\" y está dispuesto a luchar \"incansablemente\" por la causa de la democracia.\n\nSin embargo, la causa que generaciones han protegido ha sido manchada y gravemente herida. Aunque el enemigo más feroz se ha ido y sus seguidores se han dispersado, la pureza de la democracia está constantemente bajo amenaza. El presidente Biden hace un llamamiento a la acción y promete hacer todo lo posible para eliminar cualquier elemento siniestro y reaccionario y \"purificar\" por completo la misión democrática de América. Su objetivo es hacer de la paz el estado eterno de esta tierra, independientemente de cuántos ciudadanos libres deban sacrificarse y convertirse en mártires."
 salafi: "Salafismo"
 salafi_desc: "\n\n\n\n£GFX_ideology_salafism_banner\n\n\n\n\n\nEl §Ysalafismo§! es una rama política del islam sunita que se deriva de la defensa del retorno a las tradiciones de los \"ancestros\" (salaf), las tres primeras generaciones de musulmanes que, según se dice, conocían la forma pura y no adulterada del islam. La doctrina salafista se basa en mirar atrás, a los primeros años de la religión, para entender cómo deben practicar su fe los musulmanes contemporáneos. Rechazan la innovación religiosa (bid'ah) y apoyan la aplicación de la sharia."
 wahabi: "Wahabismo"
 wahabi_desc: "\n\n\n\n£GFX_ideology_wahabi_banner\n\n\n\n\n\nEl §Ywahabismo§! es un movimiento fundamentalista y renovador islámico sunita asociado con las doctrinas reformistas del erudito, teólogo, predicador y activista islámico árabe del siglo XVIII Muhámmad ibn Abd-al-Wahhab. El wahabismo ha sido descrito de diversas maneras como \"ortodoxo\", \"puritano\", \"revolucionario\" y como un \"movimiento reformista\" islámico para restaurar el \"culto monoteísta puro\" por parte de los devotos."
 absolute_monarchist: "Monarquía absoluta"
 absolute_monarchist_desc: "\n\n\n\n£GFX_ideology_monarchy\n\n\n\n\n\nLos §Ymonárquistas§! creen en la necesidad de minimizar el Gobierno y restringirlo a la administración local. El Gobierno federal y, en el mejor de los casos, el imperial, recae en manos de un monarca respetado y sabio. El país debe gobernarse a sí mismo, vigilado y protegido por su gobernante, ya sea un duque, un rey o un emperador, que tiene un poder absoluto que puede utilizar si es necesario."
 autocrat: "Autocracia"
 autocrat_desc: "\n\n\n\n£GFX_Ideology_autocracy\n\n\n\n\n\nLa §Yautocracia§! no es una ideología en el sentido común. A los autócratas sólo les interesa el poder y cómo adquirirlo y mantenerlo. Se utilizan escuelas reaccionarias de pensamiento para reprimir los movimientos liberales, comunistas y nacionalistas. Todo camino hacia el poder está justificado."
 theocracy: "Teocracia"
 theocracy_desc: "\n\n\n\n£GFX_Ideology_theocracy\n\n\n\n\n\nLa §Yteocracia§! es una forma poco común de Gobierno que reconoce a una o más deidades como autoridades supremas y a \"intermediarios\" que gestionan los asuntos cotidianos del Gobierno. La mayoría de los Gobiernos teocráticos tienen una visión del mundo conservadora y consideran que el mundo actual es decadente y necesita purificarse de sus pecados."
 theocracy_LDS: "Fundamentalismo mormón"
 mafia_state: "Estado mafioso"
 mafia_state_desc: "\n\n\n\n£GFX_Ideology_mafia\n\n\n\n\n\nUn §YEstado mafioso§! es un Estado en el que la mayor parte del aparato gubernamental está involucrado en el crimen organizado. Estos Estados son sumamente corruptos e ineficientes y solo sirven para enriquecer a la clase dominante y a sus seguidores."
 radical_nationalism: "Nacionalismo radical"
 radical_nationalism_desc: "\n\n\n\n£GFX_ideology_radical_nationalism_subid\n\n\n\n\n\nEl §Ynacionalismo radical§! es un movimiento ideológico que otorga la máxima importancia a la nación como unidad central de la organización social y política. Aboga por la preservación y el avance de la identidad, la cultura y los intereses de una nación en particular por encima de todo lo demás. El nacionalismo radical, arraigado en un fuerte sentido de orgullo nacional y patriotismo, busca promover el bienestar y la soberanía de la nación, a menudo a través de medios radicales y autocráticos."
 putinism_despot: "Putinismo"
 putinism_despot_desc: "\n\n\n\n£GFX_Ideology_putinism_banner\n\n\n\n\n\nEl §Yputinismo§! es una ideología que es la culminación de los ideales de Vladímir Putin. Una democracia autoritaria apolítica, fuertemente tecnocrática y capitalista de Estado con énfasis en el libre mercado.\n\nEl Estado lucha por la seguridad de Rusia, utilizando todos los métodos necesarios. Los nazis rusos desaparecen misteriosamente sin dejar rastro, los líderes de la oposición son encarcelados, las protestas tanto contra la inmigración como a favor de los musulmanes son reprimidas: el Estado busca mantener un equilibrio estricto en la nación. Si bien esto genera mucho odio hacia el Estado, ya que nadie siente que el gobierno los \"defienda\", también hace que la gente se vuelva apática hacia la política y, en última instancia, evita enfrentamientos ideológicos a gran escala. Sin embargo, esto no significa que la gente odie a la nación. El patriotismo, los valores tradicionales y la unidad nacional son todos ellos alimentados por el Estado. La idea de \"El mundo ruso\" y un orden multipolar son una de las principales fuerzas impulsoras del propio sistema.\n\nIncluso si Vladímir Vladímirovich se fuera, sus ideales seguirían vivos. Sin embargo, su sistema será mejorado para crear una Rusia perfecta, inmutable y verdaderamente unida."
 fascist: "Fascista"
 fascist_noun: "Fascismo"
 fascist_desc: "Régimen fascista"
 fascist_drift: "Cambio al fascismo"
 fascist_color: "§8"
 fascist_color_name: "§8$fascist$§!"
 classical_fascism: "Fascismo clásico"
 classical_fascism_desc: "\n\n\n\n£GFX_Ideology_Fascist\n\n\n\n\n\nEl §Yfascismo clásico§! es la ideología fascista original desarrollada en Italia por Giovanni Gentile y Benito Mussolini. El fascismo clásico tiene sus raíces en el nacionalismo, el corporativismo y el deseo de expansión territorial e imperialismo.\n\nLos fascistas clásicos promueven un sistema económico corporativista mediante el cual los sindicatos de empleadores y empleados están vinculados en asociaciones para representar colectivamente a los productores económicos de la nación y trabajar junto con el Estado para establecer la política económica nacional. Este sistema económico pretendía resolver el conflicto de clases a través de la colaboración entre las clases, en contraste con el socialismo, el strasserismo o el nacionalbolchevismo, que fomentan el conflicto entre las clases. El fascismo clásico también denuncia el liberalismo, especialmente el liberalismo clásico, que los líderes fascistas denunciaron como \"la debacle del individualismo\"."
 clerical_fascism: "Fascismo clerical"
 clerical_fascism_desc: "\n\n\n\n£GFX_ideology_clerical_fascism_banner\n\n\n\n\n\nEl §Yfascismo clerical§! es un movimiento ideológico que combina los principios del fascismo con la influencia de los clérigos y las instituciones religiosas. Busca establecer un Estado totalitario dirigido por un líder carismático que encarne tanto la autoridad política como la religiosa. Esta ideología enfatiza la fusión de la religión y la política, con el objetivo de crear una sociedad que se adhiera estrictamente a los valores religiosos tradicionales. En esencia, el fascismo clerical promueve una estructura social jerárquica donde el Estado y las instituciones religiosas trabajan de la mano para mantener el orden y el control sobre todos los aspectos de la sociedad."
 vladimir_zhirinovsky_thought: "Pensamiento Vladímir Zhirinovski"
 vladimir_zhirinovsky_thought_desc: "\n\n\n\n£GFX_Ideology_zhir_thought\n\n\n\n\n\nEl §Ypensamiento Vladímir Zhirinovski§! o §Ypensamiento imperial§!, como a veces se lo denomina, defiende el resurgimiento del pueblo ruso basado en sus valores tradicionales, la limpieza sana de la sociedad, la glorificación de los militares y la destrucción de las ideas liberales y comunistas.\n\nEl Imperio ruso y su grandeza, por supuesto, sirvieron como base de la ideología, pero Zhirinovski crea un culto a un líder carismático que porta la verdad, él y sus partidarios están utilizando parte de las políticas sociales soviéticas y la lucha contra la corrupción para ganar más popularidad en varios sectores de la sociedad. Los zhirinovistas abogan por el pragmatismo soberano en la economía: un ala estatal fuerte y una empresa privada responsable, la sustitución total de importaciones y la destrucción de las marcas publicitarias.\n\nSus seguidores varían desde conservadores y monárquicos hasta nacionalistas rusos y fascistas, están unidos por una sola cosa: la lealtad a las ideas de Vladímir Vólfovich Zhirinovski."
 vladimir_zhirinovsky_thought_post_war: "Pensamiento Vladímir Zhirinovski"
 vladimir_zhirinovsky_thought_post_war_desc: "\n\n\n\n£GFX_Ideology_zhir_thought_post_war\n\n\n\n\n\n§YVladímir Zhirinovski§! fue un visionario, un populista que imaginó una Rusia poderosa que combinaba el nacionalismo con programas sociales, la veneración de los militares y la ortodoxia junto con un estado multicultural. Había creado un nuevo gigante que puso de rodillas a Europa y estableció la hegemonía rusa hasta Polonia una vez más. Lamentablemente, ya falleció, pero su visión sigue viva. Sus fieles acólitos, quienes estuvieron a su lado, consolidaron su política como ley. Su legado está protegido y sus ideas se han convertido en una nueva ideología que los rusos deben seguir.\n\nEl §Yzhirinovskismo ortodoxo§!, debido a su naturaleza civil, se centra en el enfoque de Vladímir Vólfovich sobre el capitalismo de estado con redes de seguridad social como su foco económico. El Gobierno es en gran medida burocrático, pero con un matiz nacionalista. Culturalmente todavía se adhiere al pensamiento imperial ruso, pero también está muy interesado en exportar los pilares culturales rusos al exterior, \"regresando a la Edad de Oro rusa\", cuando Rusia era un destino codiciado por occidentales y conservadores."
 vladimir_zhirinovsky_thought_militarist: "Pensamiento Vladímir Zhirinovski"
 vladimir_zhirinovsky_thought_militarist_desc: "\n\n\n\n£GFX_Ideology_zhir_thought_post_war\n\n\n\n\n\n§YVladímir Zhirinovski§! fue un visionario, un populista que imaginó una Rusia poderosa que combinaba el nacionalismo con programas sociales, la veneración de los militares y la ortodoxia junto con un estado multicultural. Había creado un nuevo gigante que puso de rodillas a Europa y estableció la hegemonía rusa hasta Polonia una vez más. Lamentablemente, ya falleció, pero su visión sigue viva. Sus fieles acólitos, quienes estuvieron a su lado, consolidaron su política como ley. Su legado está protegido y sus ideas se han convertido en una nueva ideología que los rusos deben seguir.\n\nEl §Yzhirinovskismo militarista§!, a diferencia de su contraparte ortodoxa, es en realidad una junta militar que se adhiere a los principios de la ortodoxia y el pensamiento imperial de Vladímir Vólfovich. Abogan por una cultura marcial dentro de Rusia para revivir sus raíces y promueven planes de integración militar multiétnica para \"unir aún más al pueblo de Rusia\". Esto no significa que la sociedad civil esté muerta, pero depende en gran medida del apoyo del gobierno militar."
 ecofascism: "Ecofascismo"
 ecofascism_desc: "\n\n\n\n£GFX_Ideology_Ecofascist\n\n\n\n\n\nEl §Yecofascismo§! es una ideología sincrética que combina la política de ultraderecha con el ecologismo. En la actualidad, los ecofascistas están más preocupados por la sobreindustrialización de la sociedad y por lo que consideran un posmodernismo que destruye el modo de vida tradicional, así como el planeta. Preocupados por la superpoblación, muchos ecofascistas utilizan la \"ética de los botes salvavidas\" para justificar la eliminación de poblaciones enteras con el fin de preservar el mundo natural. Creen que la única forma de salvar a la raza humana es a través de la eugenesia y la destrucción de la sociedad industrial moderna."
 national_syndicalism: "Nacionalsindicalismo"
 national_syndicalism_desc: "\n\n\n\n£GFX_Ideology_national_syndicalism_banner\n\n\n\n\n\nEl §Ynacionalsindicalismo§! es una adaptación de ultraderecha del sindicalismo para adecuarse a la agenda del nacionalismo revolucionario. A pesar de diferir en temas menores, los nacionalsindicalistas tienen un conjunto de principios comunes: el rechazo de los valores burgueses, la democracia, el liberalismo, el marxismo, el internacionalismo y el pacifismo, al tiempo que promueven el heroísmo, el vitalismo y la violencia. Se esfuerzan por crear una nación proletaria \"pura\" que sea capaz de hacer frente al orden mundial globalista y al \"socialismo internacionalista\"."
 russian_syncretism: "Sincretismo ruso"
 russian_syncretism_desc: "\n\n\n\n£GFX_Ideology_russian_syncretism_banner\n\n\n\n\n\nEl §Ysincretismo ruso§! es un conjunto de ideas sincréticas específicas que combinan aspectos nacionalistas del Imperio ruso y aspectos sociales de la Unión Soviética. Nació de las cenizas del colapso soviético durante el período de amplia oposición a Yeltsin, en el que muchos rivales políticos como Zhirinovski y Ziugánov encontraron puntos en común. A pesar de adoptar algunas ideas socialistas, critican a la mayoría de los marxistas como marionetas del globalismo y rusófobos."
 ethno_nationalism: "Etnonacionalismo"
 ethno_nationalism_desc: "\n\n\n\n£GFX_Ideology_eth_nat\n\n\n\n\n\nEl §Ynacionalismo étnico§!, también conocido como etnonacionalismo, es una forma de nacionalismo en la que la nación y la nacionalidad se definen en términos de etnicidad, con énfasis en el enfoque etnocéntrico de diversas cuestiones políticas relacionadas con la afirmación nacional de un grupo étnico en particular. El tema central de los nacionalistas étnicos es que las naciones se definen por una herencia compartida, que generalmente incluye un idioma común, una fe común y una ascendencia étnica común. También incluye ideas de una cultura compartida entre los miembros del grupo y con sus antepasados."
 falangist: "Falangismo"
 falangist_desc: "\n\n\n\n£GFX_Ideology_falangism\n\n\n\n\n\nEl §Yfalangismo§! es una subvariante del fascismo clásico que se originó en España, aunque no se limita a ella. Hace hincapié en la identidad religiosa católica romana y en la autoridad suprema del Estado sobre la nación, y hace hincapié en las fuertes jerarquías sociales, el hiperconservadurismo, el anticomunismo, el antiliberalismo y el tradicionalismo. Exige el uso de la violencia política para revivir una identidad nacional, así como una economía nacionalsindicalista que promueva reformas agrarias, el industrialismo y el respeto a la propiedad privada. La ideología también exige la erradicación de las divisiones de clase mediante el establecimiento de un sistema corporativista en el que los diferentes sectores de la sociedad colaboren bajo la guía del Estado."
 chinese_exceptionalism: "Excepcionalismo chino"
 chinese_exceptionalism_desc: "\n\n\n\n£GFX_Ideology_Chinese_Exceptionalism\n\n\n\n\n\nEl §Yexcepcionalismo chino§! es un concepto que enfatiza las características históricas, culturales y políticas únicas que distinguen a China de otras naciones. A diferencia del excepcionalismo occidental, que a menudo enfatiza las libertades individuales y el gobierno democrático, el excepcionalismo chino tiene sus raíces en la civilización milenaria del país y en la superioridad cultural y, a veces, racial percibida.\n\nEl concepto central del excepcionalismo chino es la idea de la continuidad histórica de China, la creencia en una grandeza cultural inherente y en que es deber moral del pueblo han llevar a cabo su voluntad en todo lo que se considere necesario. Esta filosofía a menudo enfatiza el ultranacionalismo y la idea de la \"nación china\", una entidad cultural supranacional. Al postular la idea de que desviarse de la identidad han solo impediría el ascenso de China, algunos defensores están divididos sobre la idea de un ascenso pacífico, y algunos afirman que es demasiado tarde para que la nación china adopte esa idea y que solo a través del derramamiento de sangre reclamará China la gloria que le está destinada."
 ultranationalism: "Ultranacionalismo"
 ultranationalism_desc: "\n\n\n\n£GFX_ideology_ultranationalism_banner\n\n\n\n\n\nEl §Yultranacionalismo§! es una forma extrema y radical de nacionalismo que promueve la creencia en la superioridad de la propia nación o grupo étnico sobre todos los demás. Hace hincapié en la importancia de preservar la identidad cultural, racial y territorial de la nación a toda costa, y a menudo aboga por políticas exteriores agresivas y expansionistas para afirmar su dominio en el escenario mundial. El ultranacionalismo se caracteriza por una lealtad ferviente y fanática a la nación, que a menudo raya en la xenofobia y el autoritarismo."
 national_socialist: "Nacionalsocialista"
 national_socialist_noun: "Nacionalsocialismo"
 national_socialist_desc: "Régimen nacionalsocialista"
 national_socialist_drift: "Cambio al nacionalsocialismo"
 national_socialist_color: "§n"
 national_socialist_color_name: "§n$national_socialist$§!"
 accelerationist: "Aceleracionismo"
 accelerationist_desc: "\n\n\n\n£GFX_Ideology_Accelerationist\n\n\n\n\n\nEl §Yaceleracionismo§! es la idea de que el capitalismo, o algunos procesos asociados a él, y el cambio tecnológico deben ser \"acelerados\" e intensificados drásticamente para crear un cambio social radical o para poner fin al capitalismo. Los aceleracionistas apoyan el sabotaje, las matanzas en masa y los asesinatos de objetivos de alto perfil para desestabilizar y destruir el sistema actual, visto como un sistema que sostiene un Nuevo Orden Mundial judío y multicultural."
 babylonian_nazism: "Nazismo babilónico"
 babylonian_nazism_desc: "\n\n\n\n£GFX_Ideology_Satanic_Nazism\n\n\n\n\n\nEl §Ynazismo babilónico§!, también conocido como el Ethos babilónico, es la ideología declarada de la Orden de los Nueve Ángulos y el Camino Siniestro. Una mezcla sincrética de satanismo tradicional, prácticas ocultistas de la Mano Izquierda y nacionalsocialismo esotérico, busca establecer un orden social pagano y militarista llamado el \"Imperium\" para combatir el \"Orden Mundial Mago/Nazareno\" centrado en Occidente.\n\nCompuesto por células terroristas globales, creen en el Deo Vindex, una entidad que se liberará a través de un \"nexion\" (que significa puerta de entrada) y derrotará al judeocristianismo, lo que permitirá que la sociedad \"aria\" colonice la Galaxia a través de un período de \"evolución cósmica\" guiada por dialécticas siniestras. Además, exigen actividades como el sacrificio humano, la matanza en masa, la construcción de campos de conservación y la práctica de la Magia Negra."
 neonazism: "Neonazismo"
 neonazism_desc: "\n\n\n\n£GFX_Ideology_Nat_Soc\n\n\n\n\n\nEl §Yneonazismo§! es una rama moderna del nacionalsocialismo. Abarca un amplio espectro de creencias y prácticas, que tienden a ser menos formales y más rudas que su predecesor. En esencia, gira en torno a las ideas ultranacionalistas y de supremacía racial que eran fundamentales para el Partido Nacionalsocialista Obrero Alemán. Aboga por el empoderamiento del hombre ario y, al mismo tiempo, busca establecer un estado puro para que él y sus iguales puedan vivir, mientras mira más allá para asegurar su propio futuro."
 american_neonazism: "Neonazismo"
 american_neonazism_desc: "\n\n\n\n£GFX_Ideology_Nat_Soc\n\n\n\n\n\nEl §Yneonazismo§! es una rama moderna del nacionalsocialismo. Abarca un amplio espectro de creencias y prácticas, que tienden a ser menos formales y más rudas que su predecesor. En esencia, gira en torno a las ideas ultranacionalistas y de supremacía racial que eran fundamentales para el Partido Nacionalsocialista Obrero Alemán. Aboga por el empoderamiento del hombre ario y, al mismo tiempo, busca establecer un estado puro para que él y sus iguales puedan vivir, mientras mira más allá para asegurar su propio futuro."
 national_spartanism: "Nacionalespartanismo"
 national_spartanism_desc: "\n\n\n\n£GFX_ideology_national_spartanismsub\n\n\n\n\n\nEl §Ynacionalespartanismo§! es una ideología que rechaza el estilo de vida moderno y aboga por rechazar las comodidades y lujos modernos en favor de un despertar espiritual. En una sociedad neoespartana ideal, una persona vivirá una vida minimalista, trabajando por el bien de sí misma y de su nación. Esta sociedad utiliza la antigua Esparta como base sobre la que construir, utilizando su identidad colectivista y militarista para alcanzar sus objetivos."
 death_cult: "Apocalipticismo"
 death_cult_desc: "\n\n\n\n£GFX_Ideology_death_cult\n\n\n\n\n\nEl §Yapocalipticismo§! pinta un lienzo vívido de cataclismos cósmicos y cálculos divinos, un potente sistema de creencias que gira en torno al precipicio del fin del mundo. Es la narración de un clímax a escala cósmica, un acto final de la historia humana lleno de pruebas, tribulaciones y, en última instancia, salvación.\n\nEsta filosofía, arraigada en el suelo fértil de la profecía religiosa, brota de varios textos, monumentos y profecías que describen un final inminente para el mundo tal como lo conocemos. El §Yapocalipticismo§! está repleto de los ecos de un dualismo cósmico que divide el universo en las fuerzas del bien y del mal, enzarzadas en una confrontación inevitable y catastrófica. Se erige como un poderoso testimonio de la fascinación duradera de la humanidad por el fin de los tiempos y su temor a él."
 iraqi_baathism: "Baazismo iraquí"
 iraqi_baathism_desc: "\n\n\n\n£GFX_Ideology_iraq_baathism\n\n\n\n\n\nEl §Ybaazismo iraquí§! es una ideología política arraigada en el nacionalismo, el socialismo y el secularismo árabes, con un enfoque específico en los principios propugnados por el Partido Baaz Socialista Árabe en Irak. Desarrollado por figuras como Sadam Huseín, el baazismo iraquí busca unir al mundo árabe bajo un único Estado laico, priorizando la unidad árabe y la igualdad económica.\n\nFundado por Fuad al-Rikabi en los años 50, es altamente militarista y antisionista, y Sadam Huseín, en particular, adopta una postura contra Israel y el régimen de Irán. Desde la caída del Irak saddamista en 2003, se formaron grupos de resistencia como el Ejército de los Hombres de la Orden Naqshbandi, comandado por Izat Ibrahim al-Duri, para restablecer el Irak baazista. Dicho grupo se formó inicialmente para proteger a los naqshbandis iraquíes y a los musulmanes sufíes que se enfrentaban a la represión de grupos insurgentes sunitas, como al-Qaeda en Irak, a cuyas tácticas se oponía el grupo."
 falun_dafa: "Falun Dafa"
 falun_dafa_desc: "\n\n\n\n£GFX_Ideology_falun\n\n\n\n\n\nFalun Dafa es el sistema de creencias de Falun Gong, un nuevo movimiento religioso chino. Una mezcla sincrética de budismo, taoísmo y prácticas tradicionales de qigong chino, promueve las ideas de moralidad espiritual e iluminación divina a través de un conjunto de prácticas y meditación. Los tres principios de Falun Dafa son verdad, compasión y tolerancia, que se consideran la naturaleza fundamental del cosmos y se consideran la manifestación más alta del Tao. Estas prácticas se mantienen intencionalmente ocultas a los forasteros, y el movimiento promueve una ferviente xenofobia y la \"pureza racial\" del pueblo Han.\n\nLi Hongzhi, el fundador de Falun Dafa, cree que los paraísos están segregados racialmente. Li es deificado en estos círculos, promoviendo el ultranacionalismo Han y la idea del \"Gran Renacimiento\", que se opone a los matrimonios interraciales, la homosexualidad, el hiperconservadurismo y el rechazo de la medicina moderna."
 eurasianism: "Neoeurasianismo"
 eurasianism_desc: "\n\n\n\n£GFX_Ideology_neo_eurasianism\n\n\n\n\n\nEl §Yneoeurasianismo§! es una ideología nacida del pensamiento político post-soviético, cuyos postulados son oponerse al liberalismo eurocéntrico global, al que denominan \"atlantismo\", y a sus intentos de establecer la hegemonía de los pueblos del borde sobre los del corazón. Se oponen a la uniformización de la humanidad y, en cambio, se centran en valorar y salvaguardar la diversidad cultural y étnica del continente. Los euroasianistas, firmemente anticapitalistas y pro-colectivistas, buscarán todos los métodos posibles para unificar Eurasia y protegerla de las amenazas atlantistas."
 obliteration_of_the_self: "Desaparición del yo"
 obliteration_of_the_self_desc: "\n\n\n\n£GFX_Ideology_obliteration_of_self\n\n\n\n\n\nLa §Rdesaparición del yo§! es una ideología que se centra en la erradicación completa de la identidad individual, los deseos y los apegos personales. Tiene sus raíces en varias tradiciones filosóficas y espirituales, como el budismo, el sintoísmo y el misticismo oriental, y aboga por el abandono del ego y la trascendencia espiritual completa, con ciertas variaciones que abogan por el \"culto a la muerte\", el culto espiritual a la dignidad de la muerte. Esto se demostró, en cierto nivel, en Japón durante la Segunda Guerra Mundial, aunque ciertos practicantes de estas creencias en la actualidad lo llevan aún más lejos, secuestrando creencias espirituales para obligar al individuo a cumplir con el Estado y crear una mente colmena centrada en el martirio para lograr la muerte del ego. Los seguidores de estos ideales buscan alcanzar un estado de iluminación o unidad con una realidad cósmica mayor renunciando a las ambiciones personales, los apegos y la ilusión de separación."
 right_wing_accelerationist: "Aceleracionismo de derecha"
 right_wing_accelerationist_desc: "\n\n\n\n£GFX_Ideology_right_wing_accelerationist\n\n\n\n\n\nEl §Caceleracionismo de derecha§! es una filosofía hipercapitalista y tecnofuturista que considera que la expansión desenfrenada del mercado, la automatización y los sistemas descentralizados son una fuerza imparable que desmantelará las estructuras políticas y sociales obsoletas. Se opone a la democracia como barrera para el desarrollo y apoya una disrupción económica y tecnológica más rápida, afirmando que un futuro poshumano solo puede surgir mediante una mayor competitividad, privatización y singularidad tecnológica. Los Estados nación tradicionales y las restricciones morales se consideran obsoletos, y que el poder corporativo, la inteligencia artificial y la gobernanza cibernética los reemplazan en la creación de la siguiente etapa de la civilización."
 strassarite: "Strasserismo"
 strassarite_desc: "\n\n\n\n£GFX_ideology_strasserism\n\n\n\n\n\nEl §Ystrasserismo§! es una corriente rival del nazismo que goza de popularidad entre varios movimientos neonazis en todo el mundo. El strasserismo considera que la sociedad capitalista es un sistema inherentemente judío para controlar al proletariado y aboga por un enfoque de la economía más orientado a los trabajadores, sobre la base del socialismo."
 identitarianism: "Identitarismo"
 identitarianism_desc: "\n\n\n\n£GFX_Ideology_identitarianism\n\n\n\n\n\nEl §Yidentitarismo§! es una forma más eurocéntrica de nacionalismo étnico, nacida de la Nouvelle Droite, creada como una forma de proporcionar una alternativa a la política tradicionalista, etnopluralista e iliberal con el fin de distanciarse del fascismo y el nazismo. Los identitarios abogan por un separatismo global ostensiblemente no jerárquico donde se preserven y celebren las diferencias entre los pueblos. Incluso con eso, también abogan por ideales paneuropeos donde los europeos blancos son más centrales y priorizados y están ferozmente en contra de las ideas y conceptos que amenazan al mundo occidental.\n\nGanaron notoriedad en 2016-2017, beneficiándose de la ola de sentimientos antiislámicos que se extendió por toda Europa, se han anidado en toda Europa en países como Alemania, Austria y los países nórdicos, sin embargo también hay identitarios en los Estados Unidos y Oceanía. Su objetivo principal es establecer etnosferas, cada una dominada por pueblos étnicamente relacionados. Promueven el establecimiento de una confederación de identidades regionales que eventualmente reemplazaría a los diversos Estados nacionales de Europa."
 esoteric_fascism: "Nazismo esotérico"
 esoteric_fascism_desc: "\n\n\n\n£GFX_Ideology_esoteric_nazism\n\n\n\n\n\nEl §Ynazismo esotérico§! describe una serie de interpretaciones del nacionalsocialismo que combinan el misticismo y el neopaganismo, generalmente de variantes nórdicas o bálticas, y que se inspiran en gran medida en ciertos símbolos rúnicos en su iconografía. Categorizado como un nuevo movimiento religioso, sus orígenes se encuentran en las creencias de ciertos funcionarios nazis de alto rango, como Heinrich Himmler, durante la Segunda Guerra Mundial. Posteriormente, ideólogos como Savitri Devi desarrollaron aún más la ideología, proponiendo que Adolf Hitler podría ser \"deificado\" después de la caída de la Alemania nazi. Otros defensores de esta línea de pensamiento fueron Alekséi Dobrovolski, David Wyatt y, en particular, Robert Charroux, que había desarrollado la idea de una \"patria aria\". Hoy en día, esta ideología se encuentra en ciertos círculos nacionalistas blancos, sobre todo en los Estados Unidos, y ha asumido un papel importante en ciertos movimientos neopaganos."
 national_bolshevism: "Nacionalbolchevismo"
 national_bolshevism_desc: "\n\n\n\n£GFX_Ideology_national_bolshevism_banner\n\n\n\n\n\nEl §Ynacionalbolchevismo§! es un marco ideológico que combina elementos del nacionalismo y el socialismo, con el objetivo de crear un sistema único que desafíe el orden político existente. Fundado y teorizado por Aleksandr Duguin y Eduard Limónov, el nacionalbolchevismo busca trascender la división tradicional entre izquierda y derecha y forjar un camino hacia una sociedad nueva y alternativa.\n\nEn esencia, el nacionalbolchevismo rechaza el modelo democrático liberal y busca establecer un Estado centralizado fuerte que priorice los intereses de la nación y su pueblo. Hace hincapié en la importancia de la identidad nacional, el patrimonio cultural y la soberanía, al tiempo que aboga por la justicia social, la igualdad económica y los derechos de los trabajadores."
 ITA_nazi_maoism: "Nazimaoísmo"
 confucian_socialism: "Socialismo confuciano"
 confucian_socialism_desc: "\n\n\n\n£GFX_Ideology_confucian_socialism\n\n\n\n\n\n§YDurante los caóticos tiempos del periodo de las primaveras y otoños§!, la dinastía Zhou estaba en decadencia y los rituales que antaño mantenían unida a la sociedad estaban en desorden. En medio de esta crisis nacional, Confucio de Lu alzó la voz y llamó a la acción. Durante catorce años recorrió varios estados, comprometiéndose a restaurar los ritos de Zhou, promover la benevolencia y predicar la rectitud. Pronto, el nombre de Confucio se extendió por todo el país. Los principios del confucianismo, encaminados a aliviar el sufrimiento y proporcionar la salvación, empezaron a florecer y acabaron por convertirse en una escuela de pensamiento dominante.\n\nA medida que pasaba el tiempo y muchos héroes y figuras notables se desvanecían en la historia, China se enfrentaba a la agitación y la república se sumía en graves dificultades. Sin embargo, aún quedaban personas rectas que enarbolaban la Bandera Roja de Cinco Estrellas como símbolo de su legitimidad, comprometiendo sus vidas a reclamar justicia, principios morales y el renacimiento del socialismo en suelo chino. Sus palabras, acciones y ambiciones reflejaban las del antiguo sabio Confucio, evocando la fuerza perdurable de las altas montañas y los ríos caudalosos.\n\nYa sea a través de la ética confuciana o de la ideología comunista, ambas han arraigado profundamente en los corazones y las mentes del pueblo chino. Este es, sin duda, un momento oportuno para llevar adelante la gran tradición de la ortodoxia china en medio de estos tiempos caóticos. El frente popular y la lucha de clases defendidos por Mao y Deng, combinados con el gobierno benevolente y las enseñanzas morales preconizadas por Confucio y Mencio - autocultivo, regulación familiar, gobernanza del Estado y paz mundial - unirán sin duda al pueblo chino con una voluntad común, formando de nuevo una entidad cohesionada y derribando todos los obstáculos."
 ITA_civic_populism: "Populismo cívico"
 blackhundredism: "Nacionalismo centenanegrista"
 blackhundredism_desc: "\n\n\n\n£GFX_ideology_blackhundredism_banner\n\n\n\n\n\nEl §Ynacionalismo centenanegrista§! es una ideología fuertemente autoritaria, ultranacionalista, reaccionaria, monárquica y económicamente conservadora, basada en las Centurias Negras de principios del siglo XX en Rusia. Esta ideología combina elementos del monarquismo, el etnonacionalismo y el tradicionalismo. Se considera una reacción contra el neobolchevismo, la globalización y las amenazas percibidas a la identidad rusa.\n\nTiene sus raíces en un firme apoyo a la dinastía Románov y una férrea oposición a cualquier forma de gobierno democrático. También enfatizaba posturas extremistas que a menudo incluían creencias xenófobas y prejuiciosas, como una fuerte retórica contra las naciones minoritarias, ideales antisemitas y antimasónicos."
 fehlinger_doctrine: "Doctrina Fehlinger"
 fehlinger_doctrine_desc: "\n\n\n\n£GFX_GER_fehlinger_doctrine_ideology\n\n\n\n\n\nEsta es la §2#DoctrinaFehlinger§!\n¡Castigar a §2#EstadosHostiles§! apoyando su desmantelamiento, siguiendo las líneas administrativas internas existentes, para convertirlos en nuevos Estados libres y mejores, como democracias de mercado, plenamente integrados en el mundo libre! £GFX_GER_dont_at_me_blue_ti §2ONU_es§! £GFX_GER_dont_at_me_blue_ti §2ocdeenespanol§! £GFX_GER_dont_at_me_blue_ti §2OSCE§! £GFX_GER_dont_at_me_blue_ti §2OMC_es§!, basado en el modelo exitoso de §2#ExYugoslavia§!"
 ultraglobalism: "Ultraglobalismo"
 ultraglobalism_desc: "\n\n\n\n£GFX_GER_ultraglobalism_banner\n\n\n\n\n\nEl §Yultraglobalismo§! es un conjunto de ideas y principios establecidos y seguidos por un círculo muy limitado de las personas más ricas y poderosas del mundo, representados por figuras como Klaus Schwab y el Foro Económico Mundial.\n\nEn un mundo en constante cambio y ante el colapso de las hegemonías existentes, las élites ultraglobalistas han llegado a la conclusión de que este proceso será fatal para su riqueza y poder, y que la única manera de preservarlos es controlar el colapso mismo y conducirlo a la transformación del capitalismo en un sistema completamente diferente.\n\nEl ultraglobalismo busca establecer el control sobre todos los aspectos de la vida humana mediante la digitalización y la vigilancia absolutas, la integración masiva de la cibernética y la construcción del dominio total de las corporaciones transnacionales sobre la economía mundial.\nDurante décadas, se creyó que tal sistema solo existía en las mentes de quienes susurraban conspiraciones, pero ahora la persona promedio despierta en un mundo nuevo, transformado para siempre.\n\n§gLas almas obedecerán, las mentes se arrodillarán y sus cuerpos sucumbirán. La máscara se ha caído, y el mundo ve su verdadero rostro.\n\nSi la única manera de preservar el poder es mantener un sistema en colapso, ¿cuánta humanidad estás dispuesto a sacrificar?§!"
 davos_system: "Sistema de Davos"
 davos_system_desc: "\n\n\n\n£GFX_GER_davos_system_banner\n\n\n\n\n\nEl ultraglobalismo es un conjunto de ideas y principios establecidos y seguidos por un círculo muy limitado de las personas más ricas y poderosas del mundo, representados por figuras como Klaus Schwab y el Foro Económico Mundial.\n\nEn un mundo en constante cambio y ante el colapso de las hegemonías existentes, las élites ultraglobalistas han llegado a la conclusión de que este proceso será fatal para su riqueza y poder, y que la única manera de preservarlos es controlar el colapso mismo y conducirlo a la transformación del capitalismo en un sistema completamente diferente.\n\nEl ultraglobalismo busca establecer el control sobre todos los aspectos de la vida humana mediante la digitalización y la vigilancia absolutas, la integración masiva de la cibernética y la construcción del dominio total de las corporaciones transnacionales sobre la economía mundial.\n\nFinalmente, estos planes se han hecho realidad en Europa, bajo el disfraz del §YSistema de Davos§!.\n\n§gLas almas obedecerán, las mentes se arrodillarán y sus cuerpos sucumbirán§!\n\n§REl Capital, la Pureza y el Orden se ven obligados a su fin lógico para mantener el control.\nLa humanidad debe cambiar.§!"
 centrist_pluralism: "Pluralismo centrista"
 centrist_pluralism_desc: "\n\n\n\n£GFX_Ideology_boris_nadezhdin_thought_banner\n\n\n\n\n\nEl §Ypluralismo centrista§!, o §YPensamiento Borís Nadezhdin§!, es un concepto de organización política de la sociedad basado en el reconocimiento de la diversidad de posturas ideológicas dentro de una única estructura institucional y cultural.\n\nA diferencia del enfoque centrista tradicional, que presupone la búsqueda de compromisos entre las posturas de izquierda y derecha, el pluralismo centrista parte de un postulado más radical: no del compromiso, sino de la coexistencia. Dentro de este paradigma, las posturas ideológicas que abarcan desde la socialdemocracia y el conservadurismo moderado hasta el nacionalismo radical y el bolchevismo son aceptables, siempre que se respete el respeto mutuo, se rechace la violencia política y se reconozca un espacio democrático único como base de legitimidad.\n\nEn la práctica, esta ideología se ha convertido en la base teórica y práctica de una coalición horizontal y multifacética de fuerzas reunidas en torno a la figura de Borís Nadezhdin, donde cada facción, independientemente de sus opiniones, tiene derecho a voto y representación."
 putinism_liberal: "Putinismo liberal"
 putinism_liberal_desc: "\n\n\n\n£GFX_Ideology_liberal_putinism_banner\n\n\n\n\n\nEl §YPutinismo liberal§! es una ideología que culmina los ideales de Vladímir Putin y Borís Yeltsin. Una democracia apolítica, fuertemente tecnocrática y de capitalismo de Estado, con énfasis en el libre mercado.\n\nEl Estado lucha por la seguridad de Rusia, empleando todos los medios necesarios. Nazis rusos desapareciendo misteriosamente sin dejar rastro, líderes de la oposición encarcelados, protestas tanto antiinmigración como promusulmanas reprimidas: el Estado busca mantener un equilibrio político firme en la nación. Si bien esto genera un gran odio hacia el Estado, ya que nadie siente que el gobierno los \"defienda\", también genera apatía hacia la política en la población y, en última instancia, previene enfrentamientos ideológicos a gran escala. Sin embargo, esto no significa que la gente odie a la nación. La sociedad civil, los valores tradicionales y la unidad nacional son todos ellos alimentados por el Estado. La idea del \"mundo ruso\" y un orden multipolar son uno de los principales motores del propio sistema.\n\nIncluso si Vladímir Vladímirovich se fuera, sus ideales seguirían vivos. Sin embargo, su sistema será mejorado para crear una Rusia perfecta, inmutable y verdaderamente unida."
 empty: ""
 empty_desc: "\n\n\n\n£GFX_GER_davos_system_banner\n\n\n\n\n\nMata a gente buena"
 SIG_pragmatic_conservatism: "Conservadurismo pragmático"
 deobandism: "Yihadismo deobandita"
 reformist_socialism_socdem: "Socialismo reformista"
 reformist_socialism_socdem_desc: "\n\n\n\n£GFX_Ideology_reformist_socialism_socdem\n\n\n\n\n\nEl §Ysocialismo reformista§! es una ideología política que opera dentro de un marco fundamentalmente capitalista. Sus defensores no aspiran a la abolición inmediata del mercado como factor determinante en la gestión de la producción. Los socialistas reformistas priorizan la democracia, enfatizando la necesidad de que los trabajadores tengan voz y voto en las decisiones que afectan sus vidas. Creen que los trabajadores deberían tener al menos cierta influencia en la producción de bienes y servicios que crean. En general, los socialistas reformistas visualizan la colaboración entre partidos políticos y sindicatos como la clave para lograr el progreso social y económico."
 auth_populism: "Populismo"
 auth_populism_desc: "\n\n\n\n£GFX_ideology_ideology_auth_populism_banner\n\n\n\n\n\n§YPopulismo paternalista§! - Esta forma de populismo desafía los marcos ideológicos rígidos. En cambio, estos populistas adoptan una amplia gama de ideales, a menudo contradictorios. Tienden a concentrarse en temas específicos que resuenan profundamente en la población. Las políticas económicas pueden oscilar de izquierda a derecha, dependiendo del estado de ánimo predominante de la población. Sin embargo, las posturas culturales y sociales suelen adherirse a puntos de vista conservadores.\n\nLos populistas suelen defender el antielitismo y una postura anticorrupción. Pero lo que distingue a los populistas autoritarios es su ambición de mantener el poder indefinidamente. Pueden emplear tácticas antidemocráticas para silenciar a sus oponentes políticos y movilizar a sus seguidores leales como baluarte contra lo que perciben como burócratas corruptos y políticos al servicio de la élite."
 pragmatic_socialism: "Socialismo pragmático"
 pragmatic_socialism_desc: "\n\n\n\n£GFX_ideology_ideology_pragmatic_socialism_banner\n\n\n\n\n\nEl §Ysocialismo pragmático§! es una filosofía de gobierno que combina los principios socialistas con estrategias contemporáneas no marxistas. Recurre a expertos y reformistas no ideológicos para guiar los asuntos públicos, alejándose de la estricta adhesión a la doctrina socialista. En lugar de perseguir objetivos ideológicos extremos, los socialistas pragmáticos suelen buscar compromisos prácticos con los intereses capitalistas y los grupos no socialistas.\n\nEn el panorama socialista actual, la economía de mercado es común. Los socialistas pragmáticos van más allá, abandonando por completo el socialismo económico o conservando solo sus elementos fundamentales. Algunos regímenes pueden conservarlo como herramienta de populismo político, apelando a las necesidades del pueblo."
 leonid_slutsky_thought: "Pensamiento Leonid Slutski"
 leonid_slutsky_thought_desc: "\n\n\n\n£GFX_ideology_leonid_slutsky_thought_banner\n\n\n\n\n\nEl §Ypensamiento Leonid Slutski§! ofrece una visión distinta de la filosofía de Vladímir Zhirinovski. Como líder del ala más moderada y democrática del PLDR, Slutski defiende una forma única de democracia nacionalista destinada a mejorar la libertad y la seguridad de los ciudadanos rusos.\n\nCree en un enfoque pragmático, reconociendo la necesidad de ciertas libertades y reformas cívicas para prevenir un posible derrocamiento del Gobierno del PLDR. Tanto en asuntos exteriores como internos, los slutskistas mantienen una postura agresiva y proteccionista, utilizando eslóganes nacionalistas para mantener la lealtad y el control de la población."
 scottish_nationalism: "Nacionalismo escocés"
 chekist_communism: "Comunismo chekista"
 chekist_communism_desc: "\n\n\n\n£GFX_Ideology_chekist_communism\n\n\n\n\n\nEl §Ycomunismo chekista§! es un sistema estatal en el que el Estado socialista está encabezado por agencias de seguridad del Estado que tienen poder ilimitado sobre todas las esferas de la sociedad: desde oficinas y reuniones del partido hasta cocinas y dormitorios. Todos deben subordinarse a la línea general del partido y del Líder: los elementos extranjeros deben ser erradicados por el bien del pueblo y del Estado. El colectivo está por encima del individuo. En economía, los partidarios del comunismo chekista se adhieren a los métodos estalinistas: centralización económica, economía planificada y castigos severos por los fracasos y la malversación de la economía nacional.\nEn general, en el país reina una atmósfera de miedo: los informantes y la represión masiva mantienen a la población bajo control."
 orthodox_leninism: "Leninismo ortodoxo"
 orthodox_leninism_desc: "\n\n\n\n£GFX_Ideology_ML\n\n\n\n\n\nEl §Yleninismo ortodoxo§! constituyó el fundamento ideológico de numerosos movimientos comunistas a lo largo del siglo XX, sirviendo como doctrina estatal oficial de la Unión Soviética. Los adherentes a esta ideología se consideraban a sí mismos como firmes partidarios del espíritu revolucionario, rechazando resueltamente cualquier concepto no leninista adoptado por regímenes socialistas posteriores."
 anti_revisionist_communism: "Comunismo antirevisionista"
 anti_revisionist_communism_desc: "\n\n\n\n£GFX_ideology_neo_stalinism_bannner\n\n\n\n\n\nEl §Yantirrevisionismo§! es una reacción a los diversos movimientos ideológicos que pretenden ser los herederos del marxismo; el movimiento antirrevisionista aboga por la preservación de los principios fundamentales de la doctrina revolucionaria original. Se oponen vehementemente a la integración de los principios económicos capitalistas en las sociedades socialistas. Esta ideología no solo se define por sus aspectos positivos, sino también por su negación de ciertos elementos."
 red_derzhavism: "Derzhavismo popular"
 red_derzhavism_desc: "\n\n\n\n£GFX_ideology_derzhavism_banner\n\n\n\n\n\n\"Una nación verdadera debe velar por su clase trabajadora, pues esta es la principal fuente de su fuerza y poder. Sin justicia económica, ninguna gran potencia puede sobrevivir mucho tiempo, y ningún líder puede garantizar verdaderamente el liderazgo del pueblo\".\n-Fragmento del discurso pronunciado durante la reunión del KDD\n\nEl §Yderzhavismo popular§! es un movimiento nacionalista de izquierda revisionista que difiere del pensamiento derzhavista dominante. A diferencia de la mayoría de los derzhavistas, creen que aprender de la era soviética de Rusia tiene algún valor, al mismo tiempo que incorporan ideologías socialistas más intransigentes de todo el mundo. Sin embargo, no rechazan los principios básicos del derzhavinismo, como el nacionalismo ruso y la dictadura personalista. Esta mezcla impía de ideas tiene algunos seguidores, muchos de los cuales son viejos socialistas o comunistas nacionalistas que, a pesar de todo, todavía apoyan al nuevo gobierno. Pero esta es la cepa más débil de la división derzhavista."
 putinism_neosoviet: "Putinismo neosoviético"
 putinism_neosoviet_desc: ""
 communist_populism: "Populismo comunista"
 communist_populism_desc: "\n\n\n\n£GFX_ideology_communist_populism_banner\n\n\n\n\n\nEl §Ypopulismo comunista§! representa una síntesis ideológica de la tradición marxista-leninista y la narrativa populista, lo que lo hace políticamente accesible y retóricamente atractivo para las masas. En cuanto al contenido, se mantiene dentro del ámbito de la crítica socialista radical al capitalismo y la expropiación de clase de los medios de producción, pero en la forma y las tácticas, es una versión simplificada, pragmática y orientada al pueblo del leninismo: menos desacreditación de la democracia procedimental, movilización más amplia del \"pueblo\" como sujeto político, aceptación temporal de los instrumentos de mercado en aras de la rápida socialización del éxito, y prioridad a las medidas operativas y materialmente dirigidas que producen efectos sociales rápidos."
 popular_front_socialism: "Socialismo del Frente Popular"
 popular_front_socialism_desc: "\n\n\n\n£GFX_Ideology_reformist_socialism\n\n\n\n\n\nEl §Ysocialismo del Frente Popular§! es un amplio movimiento de coalición que abarca y defiende tantas ideas socialistas como sea posible para fomentar la unidad entre las fuerzas de izquierda y sus partidarios. Aunque muchos de estos sistemas y partidos son inherentemente inestables, si el movimiento puede aprovechar el ideal de la democracia socialista o al menos adoptar el plataformismo socialista, tiene la posibilidad de perdurar y lograr objetivos significativos dentro de la nación que gobierna."
 labour_syndicalism: "Sindicalismo laboral"
 labour_syndicalism_desc: "\n\n\n\n£GFX_Ideology_Ancom\n\n\n\n\n\nEl §Ysindicalismo laboral§! es una ideología que combina los principios socialistas tradicionales con formas más singulares de gobierno a través de los sindicatos y otras organizaciones de trabajadores. Estos sistemas suelen estar muy descentralizados, con el Estado desempeñando un papel de apoyo a las organizaciones de trabajadores. Aunque no son necesariamente no marxistas, estos sistemas se basan en ideas revisionistas de pensadores no marxistas, como anarquistas y economistas y filósofos sindicalistas."
 sovereign_democracy_lukashenko: "Comunismo popular"
 sovereign_democracy_lukashenko_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\nLa §Ydemocracia soberana§! es una ideología política de nicho cuyo objetivo es crear una democracia \"perfecta\" que ignore las disputas entre los partidos democráticos occidentales. Los partidos no sólo tienen puntos de vista similares, sino que también cooperan y trabajan para mejorar el Estado en su conjunto. La sociedad civil actúa como un control sobre los partidos, utilizando su influencia para expulsar a funcionarios corruptos y antipatrióticos, por ejemplo.\nEl partido de izquierda aboga por un mercado más cerrado, similar a la era soviética. Está dirigido a un público de izquierda que desea el regreso del \"comunismo\", pero sin desventajas.\n\nEl §Ycomunismo popular§! de Lukashenko se basa en revivir el antiguo sistema soviético con una nueva capa de pintura, manteniendo la base de una democracia única y adoptando ejemplos más modernos de prácticas socialistas. Sin embargo, se basa en el sistema interno del partido para mantener la estabilidad del sistema."
 sovereign_democracy_prilepin: "Nacionalismo social"
 sovereign_democracy_prilepin_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\nLa §Ydemocracia soberana§! es una ideología política de nicho cuyo objetivo es crear una democracia \"perfecta\" que ignore las disputas entre los partidos democráticos occidentales. Los partidos no sólo tienen puntos de vista similares, sino que también cooperan y trabajan para mejorar el Estado en su conjunto. La sociedad civil actúa como un control sobre los partidos, utilizando su influencia para expulsar a funcionarios corruptos y antipatrióticos, por ejemplo.\nEl partido de izquierda aboga por un mercado más cerrado, similar a la era soviética. Está dirigido a un público de izquierda que desea el regreso del \"comunismo\", pero sin desventajas.\n\nLa plataforma de §Ynacionalismo social§! de Prilepin se basa en gran medida en el patriotismo y las cualidades militares de la población rusa, así como en la búsqueda de políticas sincréticas similares a la historia y la política rusas."
 sovereign_democracy_platoshkin: "Nuevo socialismo"
 sovereign_democracy_platoshkin_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\nLa §Ydemocracia soberana§! es una ideología política de nicho cuyo objetivo es crear una democracia \"perfecta\" que ignore las disputas entre los partidos democráticos occidentales. Los partidos no sólo tienen puntos de vista similares, sino que también cooperan y trabajan para mejorar el Estado en su conjunto. La sociedad civil actúa como un control sobre los partidos, utilizando su influencia para expulsar a funcionarios corruptos y antipatrióticos, por ejemplo.\nEl partido de izquierda aboga por un mercado más cerrado, similar a la era soviética. Está dirigido a un público de izquierda que desea el regreso del \"comunismo\", pero sin desventajas.\n\nPlatoshkin basa su gobierno en su propia teoría del §Ynuevo socialismo§!, una versión más modernizada del socialismo encontrada en el siglo XXI, al mismo tiempo que mantiene la política centrada en Rusia dentro de su sistema y partido."
 sovereign_democracy_delyagin: "Socialismo moderado"
 sovereign_democracy_delyagin_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\nLa §Ydemocracia soberana§! es una ideología política de nicho cuyo objetivo es crear una democracia \"perfecta\" que ignore las disputas entre los partidos democráticos occidentales. Los partidos no sólo tienen puntos de vista similares, sino que también cooperan y trabajan para mejorar el Estado en su conjunto. La sociedad civil actúa como un control sobre los partidos, utilizando su influencia para expulsar a funcionarios corruptos y antipatrióticos, por ejemplo.\nEl partido de izquierda aboga por un mercado más cerrado, similar a la era soviética. Está dirigido a un público de izquierda que desea el regreso del \"comunismo\", pero sin desventajas.\n\nLa administración Delyagin se enfoca en mejorar moderadamente la vida de los rusos promedio y asegurar reformas democráticas, así como en mantener la presencia de diferentes opiniones dentro del Gobierno."
 sovereign_democracy_konovalov: "Reformismo socialista"
 sovereign_democracy_konovalov_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\nLa §Ydemocracia soberana§! es una ideología política de nicho cuyo objetivo es crear una democracia \"perfecta\" que ignore las disputas entre los partidos democráticos occidentales. Los partidos no sólo tienen puntos de vista similares, sino que también cooperan y trabajan para mejorar el Estado en su conjunto. La sociedad civil actúa como un control sobre los partidos, utilizando su influencia para expulsar a funcionarios corruptos y antipatrióticos, por ejemplo.\nEl partido de izquierda aboga por un mercado más cerrado, similar a la era soviética. Está dirigido a un público de izquierda que desea el regreso del \"comunismo\", pero sin desventajas.\n\nEl reformismo de Konovalov quiere establecer un nuevo sistema socialista reformando las estructuras existentes, manteniendo al mismo tiempo el sistema democrático y participando en debates saludables con la oposición."
 sovereign_democracy_grudinin: "Agrarismo de izquierda"
 sovereign_democracy_grudinin_desc: "\n\n\n\n£GFX_Ideology_left_sovdem\n\n\n\n\n\nLa §Ydemocracia soberana§! es una ideología política de nicho cuyo objetivo es crear una democracia \"perfecta\" que ignore las disputas entre los partidos democráticos occidentales. Los partidos no sólo tienen puntos de vista similares, sino que también cooperan y trabajan para mejorar el Estado en su conjunto. La sociedad civil actúa como un control sobre los partidos, utilizando su influencia para expulsar a funcionarios corruptos y antipatrióticos, por ejemplo.\nEl partido de izquierda aboga por un mercado más cerrado, similar a la era soviética. Está dirigido a un público de izquierda que desea el regreso del \"comunismo\", pero sin desventajas.\n\nGrudinin se centra en gran medida en mejorar la situación agrícola y ayudar a revivir la comunidad agrícola, así como en llevar la participación democrática a las zonas rurales."
 lukashenkoism_socdem: "Pensamiento Aleksandr Lukashenko"
 lukashenkoism_socdem_desc: "\n\n\n\n£GFX_ideology_lukashenkism_banner\n\n\n\n\n\nEl §Ypensamiento Aleksandr Lukashenko§! o el §Ylukashismo§! no es una estructura ideológica estricta, sino más bien una política flexible fundada y creada por Aleksandr Lukashenko y sus partidarios. En este paradigma, un autócrata o presidente fuerte resuelve los problemas de la sociedad e intenta crear una economía socialmente justa, centrándose en el apoyo del pueblo.\n\nEn este sistema, cada burócrata es evaluado no solo por el grado de lealtad, sino también por la eficacia de su trabajo. Cualquiera puede ser objeto de sospecha y ser reemplazado. La única persona en el Estado cuya posición permanece inalterable es el líder."
 sovereign_democracy_patrushev: "Conservadurismo populista"
 sovereign_democracy_patrushev_desc: "\n\n\n\n£GFX_Ideology_sovdem\n\n\n\n\n\nLa §Ydemocracia soberana§! es una ideología política de nicho cuyo objetivo es crear una democracia \"perfecta\" que ignore las disputas entre los partidos democráticos occidentales. Los partidos no sólo tienen puntos de vista similares, sino que también cooperan y trabajan para mejorar el Estado en su conjunto. La sociedad civil actúa como un control sobre los partidos, utilizando su influencia para expulsar a funcionarios corruptos y antipatrióticos, por ejemplo.\nEl partido de derecha aboga por un mercado más abierto, aunque bajo un sector estatizado de industrias clave. Está dirigido a un público más nacionalista sin ninguna supremacía racial.\n\nPátrushev combina eslóganes y acciones populistas con principios conservadores para asegurar su administración, mientras que también monitorea las opiniones de la oposición, a veces tomándolas y presentándolas como propias de Rusia Unida."
 sovereign_democracy_sobyanin: "Conservadurismo progresista"
 sovereign_democracy_sobyanin_desc: "\n\n\n\n£GFX_Ideology_sovdem\n\n\n\n\n\nLa §Ydemocracia soberana§! es una ideología política de nicho cuyo objetivo es crear una democracia \"perfecta\" que ignore las disputas entre los partidos democráticos occidentales. Los partidos no sólo tienen puntos de vista similares, sino que también cooperan y trabajan para mejorar el Estado en su conjunto. La sociedad civil actúa como un control sobre los partidos, utilizando su influencia para expulsar a funcionarios corruptos y antipatrióticos, por ejemplo.\nEl partido de derecha aboga por un mercado más abierto, aunque bajo un sector estatizado de industrias clave. Está dirigido a un público más nacionalista sin ninguna supremacía racial.\n\nSobianin quiere extender la libertad y el progreso que ayudó a llevar a Moscú a otras ciudades de Rusia. También está tratando de reconciliarse con algunos grupos socialmente progresistas y la oposición en Rusia."
 sovereign_democracy_mishustin: "Conservadurismo tecnócrata"
 sovereign_democracy_mishustin_desc: "\n\n\n\n£GFX_Ideology_sovdem\n\n\n\n\n\nLa §Ydemocracia soberana§! es una ideología política de nicho cuyo objetivo es crear una democracia \"perfecta\" que ignore las disputas entre los partidos democráticos occidentales. Los partidos no sólo tienen puntos de vista similares, sino que también cooperan y trabajan para mejorar el Estado en su conjunto. La sociedad civil actúa como un control sobre los partidos, utilizando su influencia para expulsar a funcionarios corruptos y antipatrióticos, por ejemplo.\nEl partido de derecha aboga por un mercado más abierto, aunque bajo un sector estatizado de industrias clave. Está dirigido a un público más nacionalista sin ninguna supremacía racial.\n\nMishustin se enfoca en crear un Gobierno bien controlado y productivo del que los ciudadanos no tengan que preocuparse, al mismo tiempo que mantiene la democracia a un nivel en el que la gente no se sienta alienada del Estado."
 sovereign_democracy_belousov: "Conservadurismo paternalista"
 sovereign_democracy_belousov_desc: "\n\n\n\n£GFX_Ideology_sovdem\n\n\n\n\n\nLa §Ydemocracia soberana§! es una ideología política de nicho cuyo objetivo es crear una democracia \"perfecta\" que ignore las disputas entre los partidos democráticos occidentales. Los partidos no sólo tienen puntos de vista similares, sino que también cooperan y trabajan para mejorar el Estado en su conjunto. La sociedad civil actúa como un control sobre los partidos, utilizando su influencia para expulsar a funcionarios corruptos y antipatrióticos, por ejemplo.\nEl partido de derecha aboga por un mercado más abierto, aunque bajo un sector estatizado de industrias clave. Está dirigido a un público más nacionalista sin ninguna supremacía racial.\n\nBeloúsov quiere crear una democracia fuerte y unida donde se cuide a la gente y la oposición participe en un debate moderado. Sin embargo, puede que no siempre escuche sus voces, en aras de garantizar la estabilidad y el orden."
 sovereign_democracy_volodin: "Putinismo idiosincrático"
 sovereign_democracy_volodin_desc: "\n\n\n\n£GFX_Ideology_sovdem\n\n\n\n\n\nLa §Ydemocracia soberana§! es una ideología política de nicho cuyo objetivo es crear una democracia \"perfecta\" que ignore las disputas entre los partidos democráticos occidentales. Los partidos no sólo tienen puntos de vista similares, sino que también cooperan y trabajan para mejorar el Estado en su conjunto. La sociedad civil actúa como un control sobre los partidos, utilizando su influencia para expulsar a funcionarios corruptos y antipatrióticos, por ejemplo.\nEl partido de derecha aboga por un mercado más abierto, aunque bajo un sector estatizado de industrias clave. Está dirigido a un público más nacionalista sin ninguna supremacía racial.\n\nVolodin busca poner fin al dañino experimento democrático y traer orden a través de un sistema de partido único dominante, como en los viejos tiempos. Utiliza imágenes patrióticas y mecanismos siloviki para asegurar su control."
 sovereign_democracy_naryshkin: "Nacionalconservadurismo"
 sovereign_democracy_naryshkin_desc: "\n\n\n\n£GFX_Ideology_sovdem\n\n\n\n\n\nLa §Ydemocracia soberana§! es una ideología política de nicho cuyo objetivo es crear una democracia \"perfecta\" que ignore las disputas entre los partidos democráticos occidentales. Los partidos no sólo tienen puntos de vista similares, sino que también cooperan y trabajan para mejorar el Estado en su conjunto. La sociedad civil actúa como un control sobre los partidos, utilizando su influencia para expulsar a funcionarios corruptos y antipatrióticos, por ejemplo.\nEl partido de derecha aboga por un mercado más abierto, aunque bajo un sector estatizado de industrias clave. Está dirigido a un público más nacionalista sin ninguna supremacía racial.\n\nLas conexiones de Narishkin con el aparato de seguridad interna le ayudan a mantener el orden, utiliza valores tradicionales y argumentos antiglobalistas para restablecer Rusia bajo un gobierno unipartidario."
 sovereign_democracy_shoygu: "Patriotismo militarista"
 sovereign_democracy_shoygu_desc: "\n\n\n\n£GFX_Ideology_sovdem\n\n\n\n\n\nLa §Ydemocracia soberana§! es una ideología política de nicho cuyo objetivo es crear una democracia \"perfecta\" que ignore las disputas entre los partidos democráticos occidentales. Los partidos no sólo tienen puntos de vista similares, sino que también cooperan y trabajan para mejorar el Estado en su conjunto. La sociedad civil actúa como un control sobre los partidos, utilizando su influencia para expulsar a funcionarios corruptos y antipatrióticos, por ejemplo.\nEl partido de derecha aboga por un mercado más abierto, aunque bajo un sector estatizado de industrias clave. Está dirigido a un público más nacionalista sin ninguna supremacía racial.\n\nLos acuerdos secretos de Shoigú con el estado mayor y el estamento militar le ayudan a ejercer su influencia para llevar el fervor militar a Rusia, utilizando veteranos leales y de línea dura para asegurar Rusia Unida y restaurar su posición dominante."
 kadyrovite_tendency: "Tendencia kadirovita"
 kadyrovite_tendency_desc: "\n\n\n\n£GFX_ideology_kadyrovite_tendency_banner\n\n\n\n\n\nLos §Ykadirovitas§!, o §Yajmát-putinistas§!, son una rama del putinismo, particularmente influenciada por los virreyes chechenos y la familia Kadírov. Conservan gran parte de las políticas centrales de su ideología matriz, pero las infunden con especificidades nacionales y un toque personalista. Se basan en gran medida en los valores tradicionales y la religión. Los Kadyrovitas se oponen firmemente a la disidencia y a cualquier forma de deslealtad hacia su líder o su élite gobernante.\n\nLa obediencia y la lealtad son fundamentales para la visión kadirovita de una sociedad armoniosa. En su Estado ideal, el poder se concentra en manos de un líder fuerte, que siempre tiene razón, incluso cuando no la tiene.\n\nLos kadirovitas, al no ser de etnia rusa, enfatizan los aspectos cívicos de pertenecer a un vasto país rico en tradiciones y culturas diversas. Esto podría provocar la ira de una facción más nacionalista dentro del movimiento putinista."
 populist_putinism: "Putinismo populista"
 populist_putinism_desc: "\n\n\n\n£GFX_Ideology_populist_putinism_banner\n\n\n\n\n\nEl §Yputinismo populista§! combina los principios del putinismo con un énfasis especial en el pueblo y su confianza en el sistema. Aunque comparten algunos ideales con su ideología matriz, estos populistas se presentan como los máximos defensores de Rusia.\n\nPolíticamente, navegan entre modestas reformas liberales y un control más estricto. Abogando por un gobierno que priorice el bienestar de la nación, utilizan las críticas a los burócratas existentes para reforzar su propia imagen. Mantienen firmemente los valores tradicionales y el patriotismo de la era de Putin, con el objetivo de hacer que el presidente parezca el protector supremo que siempre antepone el bienestar del pueblo. Económicamente, su postura refleja el enfoque dominante, con notables excepciones en el aumento del apoyo al estado social y otros programas de prosperidad."
 democratic_derzhavism: "Derzhavismo democrático"
 democratic_derzhavism_desc: "\n\n\n\n£GFX_ideology_derzhavism_banner\n\n\n\n\n\n\"La democracia sin nacionalismo es salvajismo. El nacionalismo sin democracia es esclavitud.\"\n-Prefacio del libro \"Democracia nacional y derzhavismo\"\n\nLos §Yderzhavistas democráticos§! creen principalmente en la creación de una democracia nacional, donde se otorgan igualdad de oportunidades a las fuerzas nacionales en Rusia para competir entre sí en debates y concursos en el parlamento o senado.\n\nAunque el derzhavismo rara vez puede considerarse democrático, los moderados aún creen que el estado actual es un trampolín hacia un eventual deshielo del sistema una vez que toda la oposición antinacional haya sido eliminada. Su quimera se ve algo reforzada por las continuas simpatías de Alijánov por los demócratas nacionales rusos del pasado. Su compromiso con facciones más radicales se extiende hasta hacer de Alijánov el presidente eterno, mientras que solo se permiten elecciones abiertas para canciller o primer ministro, con una restauración limitada de la Duma en forma de Senado Nacional."
 russian_nationalism_soviet: "Nacionalismo ruso"
 russian_nationalism_lib: "Nacionalismo ruso"
 russian_nationalism_national: "Nacionalismo ruso"
 russian_nationalism_ideology: "Nacionalismo ruso"
 national_patriotism: "Patriotismo nacional"
 state_liberalism: "Liberalismo de Estado"
 left_pragmatism: "Pragmatismo de izquierda"
 putinism_imperial: "Putinismo neoimperialista"
 putinism_imperial_desc: ""
 derzhavism: "Derzhavismo"
 derzhavism_desc: "\n\n\n\n£GFX_ideology_derzhavism_banner\n\n\n\n\n\nLa doctrina del §Yderzhavismo§! es, ante todo, la doctrina de la subordinación completa del poder estatal a la voluntad de una persona designada por un cierto \"apasionado político\" y el timón de la sociedad.\n\nLos derzhavistas abogan por el ultranacionalismo y el aislamiento completo del país del mundo exterior. Se impone un orden totalitario en la sociedad: \"Todo para el Estado, nada fuera del Estado\". Los órganos de gobierno -el partido o el consejo de Estado-, bajo el control total del culto al líder, desempeñan el papel de ejecutores, líderes y movilizadores. Amplias organizaciones afiliadas o controladas por el estado vigilan a la gente o a partes de ella.\n\nEn economía, se pueden dividir en dos grupos. Algunos abogan por la preservación del modelo estatal actual, donde no hay lugar para la iniciativa privada. Otros abogan por la creación de un capitalismo nacional. En un sistema así, los intereses de las empresas nacionales pasan a primer plano. Al mismo tiempo, las nuevas corporaciones estatales se convierten en monopolios y desempeñan un papel clave en el desarrollo económico del país."
 national_derzhavism: "Derzhavismo nacional"
 national_derzhavism_desc: "\n\n\n\n£GFX_ideology_derzhavism_banner\n\n\n\n\n\n\"...Tu cuerpo y alma deben dedicarse para que la revolución nacional tenga éxito. La revolución no es solo para la sociedad, sino para el alma y la naturaleza de la propia Rusia. La nación debe convertirse en una fortaleza inexpugnable: sin disidencia ni dudas, solo el líder y tus compañeros camaradas son tus anclas en esta revolución.\"\n- Extracto del manifiesto de la Guardia Amarilla\".\n\nEl §Yderzhavismo nacional§! se centra en los aspectos revolucionarios de la ideología, fuertemente influenciado por la facción de la Guardia Amarilla que predominantemente lo lidera. Creen en el resurgimiento de la cultura nacional rusa y en la transformación de la Madre Patria en un estado guerrero, liderado por un individuo poderoso. Sus principales métodos de revolución son un bombardeo constante de propaganda, mítines, entrenamiento militar y torneos deportivos en todo el país. Se centran menos en cuestiones religiosas y, en cambio, enfatizan el sentimiento de ser ruso y la unidad de la cultura."
 revivalist_derzhavism: "Derzhavismo revivalista"
 revivalist_derzhavism_desc: "\n\n\n\n£GFX_ideology_derzhavism_banner\n\n\n\n\n\n\"Nuestra fe ortodoxa... nuestra sagrada Rusia se está recuperando contra todo pronóstico, desde dentro y desde fuera. Estamos solos entre los paganos y pecadores del mundo, pero no debemos flaquear, porque nuestro amanecer dorado está cerca. La nación de Katehon se acerca, lista para detener las fuerzas del Anticristo.\"\n- Pasaje del sermón de un sacerdote pro-derzhavista.\n\nEl §Yderzhavismo revivalista§! pone gran énfasis en las principales raíces religiosas de Rusia en el cristianismo ortodoxo, pero también le hace cambios para que se ajuste a su narrativa. Reinterpreta radicalmente el concepto de \"Fortaleza-Rusia\" y lo convierte en un concepto catecóntico, la fuerza principal contra el Anticristo y sus seguidores. Se considera que la nación debe estar preparada para la batalla y ser sacrificial para detener las fuerzas del mal. Otras religiones son activamente ignoradas o puestas del lado del enemigo, como otras denominaciones cristianas declaradas abiertamente paganas. Los revivalistas tampoco dudan en la militarización de la religión y las instituciones religiosas, todo en aras de tener un ejército sagrado listo para desatar una cruzada contra los enemigos del estado."
 ultra_putinism: "Ultraputinismo"
 ultra_putinism_desc: ""
 populist_sovietism: "Sovietismo populista"
 populist_sovietism_desc: "\n\n\n\n£GFX_ideology_populist_sovietism_banner\n\n\n\n\n\nEl §Ysovietismo populista§! es un estilo político en el que un líder se presenta como el guardián de una era perdida, una era idealizada como de dignidad, justicia social y propósito colectivo. Su fundamento no reside en una estricta reactivación de la doctrina marxista-leninista, sino en la resonancia emocional del pasado soviético: el recuerdo de la estabilidad, el empleo garantizado, el sacrificio compartido y un estado que ostensiblemente protegía a la \"persona común\". Al invocar esta imaginería, el líder cultiva un sentido de continuidad histórica y legitimidad moral, posicionándose como el heredero de un orden desaparecido que debe ser restaurado simbólicamente."
 fascist_populism: "Populismo fascista"
 fascist_populism_desc: "\n\n\n\n£GFX_ideology_fascist_populism_banner\n\n\n\n\n\nEl §Ypopulismo fascista§! es un estilo político en el que un líder carismático se posiciona como la encarnación singular de la nación y el único remedio para su percibido declive. A diferencia del fascismo doctrinario, el populismo fascista toma prestados selectivamente elementos de la tradición fascista -el renacimiento nacional, la denuncia de la \"podredumbre\" interna, la exaltación de la unidad y la lealtad- mientras suaviza, oscurece o renombra sus compromisos ideológicos más rígidos. Esta flexibilidad permite al líder atraer simultáneamente a ciudadanos descontentos que buscan estabilidad y a partidarios receptivos a matices más excluyentes o autoritarios."
 pax_americana_ultraglobalism: "Pax Americana"
 pax_americana_ultraglobalism_desc: "\n\n\n\n£GFX_USB_ultraglobalism_banner\n\n\n\n\n\nEl hombre ha demostrado ser una bestia inestable, destrozando las instituciones y pilares cuidadosamente elaborados para mantenerlo bajo control.\n\nCon el estallido de la Segunda Guerra Civil Americana, la humanidad ha revelado una chispa: una llama de cambio que siempre arderá, asegurando que el mundo experimente una transformación drástica a manos de muchos, quemando estructuras que han sobrevivido a su propósito y se han hundido en la decadencia.\n\n§YPax Americana§! argumenta que el defecto reside en el propio hombre, más que en los sistemas construidos para contenerlo. Nacida de la fusión cooperativa del orden mundial basado en reglas neoliberales y neoconservadoras, busca reinsertarse permanentemente en el espíritu de la época.\n\nPara el mundo exterior, parece una nación recuperando su cordura bajo la bandera de la democracia. Pero detrás del velo, hombres de traje se dan la mano y predeterminan el destino de millones, asegurando que la humanidad no caiga en el abismo del caos. Manipulan el espíritu humano, trabajando en estrecha cooperación con corporaciones, agencias federales y familias olvidadas hace mucho tiempo para preservar el mismo Orden que una vez derrotó no a uno, sino a tres gigantes de la historia.\n\nRacionalidad para alejar el pensamiento antisocial, sacrificio para asegurar que la población recuerde quién los mantiene a salvo, y estructura para asegurar que cada peón tenga un lugar en el tablero.\n\nEl caos del mundo moderno es otro gigante, una llama interna empeñada en quemar todo lo que se ha hecho para mantener la paz. El Orden ha regresado, y apagará la llama de la humanidad."
 ITA_national_bolshevism_desc: "\n\n\n\n£GFX_Ideology_nazi_maoism_banner\n\n\n\n\n\nSer o no ser, esa es la cuestión. \n\nEl §Ynazi-maoísmo§!, ideología desconocida para muchos, deriva su fundamento ideológico tanto de la ultraderecha como de la ultraizquierda del espectro político. Fundado por Franco Freda a finales de la década de 1960, el nazi-maoísmo buscaba abordar una multitud de cuestiones sociales, al tiempo que defendía un nacionalismo acérrimo y la revitalización de una Italia étnicamente pura y poderosa. \n\nDespués de la década de 1970, la popularidad del nazi-maoísmo comenzó a decaer, aunque aún se pueden encontrar rastros de él en varios grupos de ultraderecha en toda Italia. Hoy en día, el legado de la Piazza Fontana y Freda vuelve a rondar la nación. Sus partidarios aspiran a reconstruir una Italia más fuerte, en la que la clase trabajadora se libere de las cadenas de la burguesía y se reviva el espíritu nacional italiano."
 ITA_social_fascism_desc: "\n\n\n\n£GFX_Ideology_nazi_maoism_banner\n\n\n\n\n\nSer o no ser, esa es la cuestión. \n\nEl §Ynazi-maoísmo§!, ideología desconocida para muchos, deriva su fundamento ideológico tanto de la ultraderecha como de la ultraizquierda del espectro político. Fundado por Franco Freda a finales de la década de 1960, el nazi-maoísmo buscaba abordar una multitud de cuestiones sociales, al tiempo que defendía un nacionalismo acérrimo y la revitalización de una Italia étnicamente pura y poderosa. \n\nDespués de la década de 1970, la popularidad del nazi-maoísmo comenzó a decaer, aunque aún se pueden encontrar rastros de él en varios grupos de ultraderecha en toda Italia. Hoy en día, el legado de la Piazza Fontana y Freda vuelve a rondar la nación. Sus partidarios aspiran a reconstruir una Italia más fuerte, en la que la clase trabajadora se libere de las cadenas de la burguesía y se reviva el espíritu nacional italiano."
 naturalized_derzhavism: "Derzhavismo naturalizado"
 naturalized_derzhavism_desc: "\n\n\n\n£GFX_ideology_naturalized_derzhavism_banner\n\n\n\n\n\nAunque el §Yderzhavismo§! es una ideología claramente rusa, esto no significa que sus métodos no puedan utilizarse en otros lugares. El §Yderzhavismo naturalizado§! lo demuestra. Los Estados que adoptan prácticas derzhavistas suelen estar estrechamente aliados con el régimen de Alijánov y, a menudo, son establecidos o patrocinados directamente por él.\n\nAunque su aplicación puede variar en función de las características nacionales y el nivel de independencia, las creencias fundamentales de estos países incluyen un nacionalismo extremo y, a menudo, un régimen dictatorial, y se crea un partido nacional fuerte para conducir al país hacia el renacimiento de su cultura."
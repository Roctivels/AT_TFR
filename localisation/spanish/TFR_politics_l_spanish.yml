 TFR_CABAL_ECONOMY_TT: "§YEconomía de la cábala§!"
 TFR_CABAL_ECONOMY_TT_LONG: "§gLa economía de la cábala, a veces denominada internamente como el sistema Bilderberg, es una economía de pseudomando en la sombra estructurada en torno al principio de asegurar el máximo rendimiento financiero y político para los Cognoscenti y sus intereses financieros constituyentes.\n\nA través de reuniones privadas, algoritmos predictivos y uso de información privilegiada, todas las partes involucradas aseguran que las ganancias se mantengan altas y que ciertos factores impredecibles se minimicen, creando una excelente ilusión de estabilidad para el pueblo americano mientras se garantiza que el sector financiero continúe prosperando, complaciendo a los financieros y asegurando que el estado profundo tenga acceso a los recursos que necesita.§!\n\n\n\n\n£GFX_ZZZ_cabal_economy_banner\n\n\n\n\n\n £consumer_goods_texticon  Factor de fábricas de bienes de consumo: §Y3.0%§!\n £construction_speed_texticon  Velocidad de construcción: §G+3.0%§!\n £GFX_dx_blue  Factor del valor empresarial: §G+20.0%§!\n £GFX_dx_yellow  Factor del valor personal: §R-20.0%§!"
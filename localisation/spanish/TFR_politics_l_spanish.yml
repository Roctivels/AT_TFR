 USA_slb_path_tt: "§YHijos de la Libertad§! - §R¡EN DESARROLLO!§!\n---------------\n\n\n\n\n£GFX_SLB_path_banner\n\n\n\n\n\n§gAsí que si alguna vez un hombre te pregunta por tus asuntos o tu nombre,\ndile que se joda, dile a sus amigos que hagan lo mismo.\nPorque un hombre que cambia su libertad por un sueño seguro y vacío\nno merece ninguno, y tampoco los conservará.§!"
 USA_gma_path_tt: "§YColectivo Anarquista de Green Mountain§! - §R¡EN DESARROLLO!§!\n---------------\n\n\n\n\n£GFX_GMA_path_banner\n\n\n\n\n\n§gEn la Tierra, la llama de la vida arde lentamente.\nPor todas partes hay miseria y dolor.\nLa contaminación mata el aire, la tierra y el mar.\nEl hombre se prepara para enfrentar su destino, sí.§!"
 ZZZ_inclusive_capitalism: "§YCapitalismo inclusivo§!"
 TFR_INCLUSIVE_CAPITALISM_TT: "§YCapitalismo inclusivo§!"
 TFR_INCLUSIVE_CAPITALISM_TT_LONG: "§gEl capitalismo inclusivo es una teoría económica que busca crear un sistema más justo y equitativo de distribución del valor en la economía, así como abordar la creciente desigualdad en el ingreso y la riqueza.\n\nLa esencia del capitalismo inclusivo reside en fomentar un crecimiento sostenible que beneficie a todas las partes implicadas: empresas, inversores, trabajadores, consumidores, gobiernos, comunidades locales, la sociedad en su conjunto y el medio ambiente.§!\n\n\n\n\n£GFX_ZZZ_inclusive_capitalism_banner\n\n\n\n\n\n£consumer_goods_texticon  Factor de fábricas de bienes de consumo: §Y2.0%§!\n£construction_speed_infrastructure_texticon  Velocidad de construcción del §Yparque de oficinas§!: §G+2.0%§!\n£construction_speed_infrastructure_texticon  Velocidad de construcción de §Yinfraestructura§!: §G+1.5%§!\n£construction_speed_civfactory_texticon  Velocidad de construcción de §Yfábrica civil§!: §R-2.5%§!\n£GFX_dx_blue  Factor del valor empresarial: §G+2.0%§!\n£GFX_dx_yellow  Factor del valor personal: §G+2.0%§!"

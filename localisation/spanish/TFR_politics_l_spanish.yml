 SOV_nazbol_path_tt: "§YExperimento nacionalbolchevique§! - §R¡EN DESARROLLO!§!\n---------------\n\n\n\n\n£GFX_Nazbol_Path_Banner\n\n\n\n\n\n§gUna ideología de vanguardia, creada por un excéntrico escritor liderando una horda de punks fanáticos. ¡Que tiemble Occidente!§!"

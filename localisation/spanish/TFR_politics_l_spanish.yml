 ZZZ_no_economy: "§gSin economía§!"
 ZZZ_capitalist_economy: "§YCapitalismo de libre mercado§!"
 TFR_CAPITALISM_TT: "§YModelo capitalista§!"
 TFR_CAPITALISM_TT_LONG: "§gEl capitalismo es un sistema económico en el que las empresas y negocios privados operan sin la interferencia del gobierno. En este sistema, los precios, los costos y los salarios están determinados por las fuerzas del mercado, como la oferta y la demanda. Esto significa que hay una supervisión y regulación gubernamentales limitadas. El capitalismo es popular entre los liberales de mercado y se ha convertido en el sistema económico más adoptado a nivel mundial.§!\n\n\n\n\n£GFX_ZZZ_capitalism_banner\n\n\n\n\n\n£consumer_goods_texticon  Factor de fábricas de bienes de consumo: §Y-2.0%§!\n£efficiency_growth_texticon  Crecimiento de eficacia de producción: §G+2.0%§!\n£construction_speed_infrastructure_texticon  Velocidad de construcción de la §Yinfraestructura§!: §R-1.5%§!\n£construction_speed_infrastructure_texticon  Velocidad de construcción del §Yparque de oficinas§!: §G+1.5%§!\n£GFX_dx_blue  Factor del valor empresarial: §G+5.0%§!\n£GFX_dx_yellow  Factor del valor personal: §R-5.0%§!"
 ZZZ_american_capitalism: "§YCapitalismo estadounidense§!"
 TFR_AMERICAN_CAPITALISM_TT: "§YCapitalismo estadounidense§!"
 TFR_AMERICAN_CAPITALISM_TT_LONG: "§gEl sistema económico estadounidense es un modelo para otras economías de libre mercado. Se basa en el libre comercio y en una mínima intervención del gobierno en los asuntos económicos. Sin embargo, existen algunas características únicas que lo diferencian de otras formas de capitalismo.\nUna de las características principales es la base de la economía estadounidense. El dólar estadounidense es una moneda fuerte que goza de gran reconocimiento por su estabilidad. Como resultado, se utiliza ampliamente como moneda de reserva principal en todo el mundo.§!\n\n\n\n\n£GFX_ZZZ_american_capitalism_banner\n\n\n\n\n\n£consumer_goods_texticon  Factor de fábricas de bienes de consumo: §Y-3.0%§!\n£efficiency_growth_texticon  Crecimiento de eficacia de producción: §G+3.5%§!\n£construction_speed_infrastructure_texticon  Velocidad de construcción de la §Yinfraestructura§!: §R-3.5%§!\n£construction_speed_infrastructure_texticon  Velocidad de construcción del §Yparque de oficinas§!: §G+5.0%§!\n£GFX_dx_blue  Factor del valor empresarial: §G+10.0%§!\n£GFX_dx_yellow  Factor del valor personal: §R-10.0%§!"
 ZZZ_oligopolistic_capitalism: "§YCapitalismo oligopólico§!"
 TFR_OLIGOPOLY_CAPITALISM_TT: "§YEconomía oligopólica§!"
 TFR_OLIGOPOLY_CAPITALISM_TT_LONG: "§gAl igual que muchos otros países, la economía de este país funciona según los principios del libre mercado. Sin embargo, se caracteriza por un alto nivel de concentración del mercado, en el que un pequeño número de corporaciones domina la competencia. Lo que distingue a este sistema económico de sus homólogos capitalistas es la mínima participación del gobierno. En una medida extraordinaria, las funciones regulatorias y administrativas del gobierno son limitadas, están acaparadas o son en gran medida ineficaces. Los deseos de las corporaciones dominantes prevalecen sobre el interés público.§!\n\n\n\n\n£GFX_ZZZ_oligopolistic_capitalism_banner\n\n\n\n\n\n\n£consumer_goods_texticon  Factor de fábricas de bienes de consumo: §Y-4.0%§!\n£prod_eff_cap  Límite de eficacia de producción: §G+3.5%§!\n£construction_speed_infrastructure_texticon  Velocidad de construcción de la §Yinfraestructura§!: §R-6.0%§!\n£construction_speed_refinery_texticon  Velocidad de construcción dl §Yrefinería sintética§!: §G+5.0%§!\n£GFX_dx_blue  Factor del valor empresarial: §G+15.0%§!\n£GFX_dx_yellow  Factor del valor personal: §R-15.0%§!"
 ZZZ_collective_capitalism: "§YCapitalismo colectivo§!"
 ZZZ_collective_capitalism2: "§YCapitalismo colectivo§!"
 TFR_COLLECTIVE_CAPITALISM_TT: "§YCapitalismo colectivo§!"
 TFR_COLLECTIVE_CAPITALISM_TT_LONG: "§gEl capitalismo colectivo es un modelo económico japonés que se caracteriza por una estrecha relación entre las empresas y el Gobierno, así como por sólidas alianzas entre las empresas y sus proveedores, clientes y otras partes interesadas. Este modelo pone énfasis en la estabilidad y la colaboración a largo plazo por encima de la competencia, y se basa en la idea de que las empresas y la sociedad están interconectadas y comparten responsabilidades por el éxito de cada una.§!\n\n\n\n\n£GFX_ZZZ_collective_capitalism_banner\n\n\n\n\n\n[JAP_collective_capitalism_bonus]"
 ZZZ_welfare_capitalism: "§YCapitalismo de bienestar§!"
 TFR_WELFARE_CAPITALISM_TT: "§YModelo capitalista de bienestar§!"
 TFR_WELFARE_CAPITALISM_TT_LONG: "§gEn un sistema de capitalismo de bienestar, el gobierno combina la presencia de empresas y negocios privados con un cierto nivel de control e intervención en la economía para garantizar su correcto funcionamiento. Según sus partidarios, este sistema logra un equilibrio entre un alto crecimiento económico, una baja inflación y desempleo, condiciones laborales favorables y cierto nivel de seguridad social.§!\n\n\n\n\n£GFX_ZZZ_welfare_capitalism_banner\n\n\n\n\n\n£consumer_goods_texticon  Factor de fábricas de bienes de consumo: §Y2.5%§!\n£construction_speed_infrastructure_texticon  Velocidad de construcción de la §Yinfraestructura§!: §G+5.0%§!\n£efficiency_growth_texticon  Crecimiento de eficacia de producción: §R-6.5%§!\n£construction_speed_civfactory_texticon  Velocidad de construcción de §YFábrica civil§!: §G+5.0%§!\n£GFX_dx_blue  Factor del valor empresarial: §R-10.0%§!\n£GFX_dx_yellow  Factor del valor personal: §G+10.0%§!\n£GFX_dx_yellow  Factor de gastos personales §Y+3.5%§!"
 ZZZ_corporatism: "§YCorporativismo§!"
 TFR_CORPORATISM_TT: "§YModelo corporativista§!"
 TFR_CORPORATISM_TT_LONG: "§gEl corporativismo es un sistema económico que pretende unir al Estado y a la sociedad a través de entidades corporativas. Considera que esta es la forma más eficaz de construir una economía próspera y estable.\nEl corporativismo suele asociarse con regímenes fascistas y autoritarios. Estos regímenes exigen una lealtad inquebrantable al Estado. Sin embargo, es importante distinguir entre corporativismo y corporatocracia, donde las fronteras entre el Estado y las corporaciones se difuminan§!\n\n\n\n\n£GFX_ZZZ_corporatism_banner\n\n\n\n\n\n£consumer_goods_texticon  Factor de fábricas de bienes de consumo: §Y-2.5%§!\n£construction_speed_infrastructure_texticon  Velocidad de construcción de la §Yinfraestructura§!: §G+10.0%§!\n£production_efficiency_loss_texticon  Retención de eficacia de producción: §R-5.0%§!\n£sabotaged_resource_texticon  Penalización por falta de recursos: §R+3.5%§!\n£mil_factory  Rendimiento de fábrica: §G+6.0%§!\n£GFX_dx  Crecimiento mensual de ingresos: §R+10.0%§!\n£GFX_dx_yellow  Factor de gastos personales §Y-10.0%§!"
 ZZZ_command_economy: "§YEconomía de comando§!"
 TFR_COMMAND_ECONOMY_TT: "§YEconomía de comando§!"
 TFR_COMMAND_ECONOMY_TT_LONG: "§gUna economía de comando es una forma altamente centralizada de corporativismo en la que partes significativas de la economía han sido estatizadas a través de la intervención estatal directa, particularmente en sectores estratégicos como la producción de armas y la industria pesada.§!\n\n\n\n\n£GFX_ZZZ_command_economy_banner\n\n\n\n\n\n£consumer_goods_texticon  Factor de fábricas de bienes de consumo: §Y-3.0%§!\n£construction_speed_infrastructure_texticon  Velocidad de construcción de la §Yinfraestructura§!: §G+10.0%§!\n£efficiency_base_texticon  Base de eficacia de producción: §G+10.0%§!\n£efficiency_growth_texticon  Crecimiento de eficacia de producción: §R-10.0%§!\n£mil_factory  Rendimiento de fábrica: §G+5.6%§!\n£GFX_dx  Crecimiento mensual de ingresos: §R-15.0%§!\n£GFX_dx_yellow  Factor de gastos personales: §Y15.0%§!"
 ZZZ_managed_economy: "§YCorporativismo nazi§!"
 TFR_MANAGED_ECONOMY_TT: "§YCorporativismo nacionalsocialista§!"
 TFR_MANAGED_ECONOMY_TT_LONG: "§gEl corporativismo nazi se refiere al sistema que constituyó la base del modelo económico de la Alemania nazi. Si bien se considera ampliamente un fracaso de un régimen ya extinto, los partidarios de los movimientos neonazis aún afirman que fue el único sistema económico verdadero y honesto para la \"raza aria\".\nTodos los esfuerzos se dirigen a satisfacer las necesidades del Estado y de la máxima autoridad, ya sea el gran líder o el aparato del partido. Cada acción es sometida a un minucioso escrutinio. Las exigencias del gobierno parecen interminables, y sus proyectos prevalecen sobre cualquier otro asunto.§!\n\n\n\n\n£GFX_ZZZ_managed_economy_banner\n\n\n\n\n\n £consumer_goods_texticon  Factor de fábricas de bienes de consumo: §Y-5.0%§!\n £construction_speed_milfactory_texticon  Velocidad de construcción de §Yfábricas militares§!: §G+10.0%§!\n £mil_factory  Rendimiento de fábrica: §G+6.0%§!\n £production_efficiency_loss_texticon  Retención de eficacia de producción: §R-10.0%§!\n £development  Desarrollo económico mensual: §R-1.5%§!\n £GFX_dx  Crecimiento mensual de ingresos: §R-15.0%§!\n £GFX_dx_yellow  Factor de gastos personales: §Y-10.0%§!"
 ZZZ_planned_economy: "§YEconomía planificada§!"
 TFR_PLANNED_ECONOMY_TT: "§YEconomía planificada§!"
 TFR_PLANNED_ECONOMY_TT_LONG: "§gUna economía planificada es un sistema económico donde la producción y el crecimiento económico se planifican con antelación para satisfacer las necesidades de la población y del país en su conjunto. Esta planificación puede realizarse de forma centralizada o descentralizada, y puede ser decidida por un consejo de expertos específico o por la propia ciudadanía de forma participativa.§!\n\n\n\n\n£GFX_ZZZ_planned_economy_banner\n\n\n\n\n\n\n\n£consumer_goods_texticon  Factor de fábricas de bienes de consumo: §Y-5.0%§!\n£construction_speed_infrastructure_texticon  Velocidad de construcción de la §Yinfraestructura§!: §G+10.0%§!\n£efficiency_base_texticon  Base de eficacia de producción: §G+7.5%§!\n£efficiency_growth_texticon  Crecimiento de eficacia de producción: §R-10.0%§!\n£production_efficiency_loss_texticon  Retención de eficacia de producción: §R-5.0%§!\n£mil_factory  Rendimiento de fábrica: §G+10.0%§!\n£GFX_dx  Crecimiento mensual de ingresos: §R-25.0%§!\n£GFX_dx_yellow  Factor de gastos personales: §Y10.0%§!"
 ZZZ_developed_socialism: "§YSocialismo desarrollado§!"
 TFR_DEVELOPED_SOCIALISM_TT: "§YTeoría del socialismo desarrollado§!"
 TFR_DEVELOPED_SOCIALISM_TT_LONG: "§gEl concepto de socialismo desarrollado, vestigio de la era de Brézhnev en la Unión Soviética, ha sido revitalizado por los economistas rusos contemporáneos. En esta perspectiva actualizada, se han implementado un mayor número de las propuestas y reformas de Kosygin, lo que ha dado lugar a un panorama y un sistema económico más variados.\nSi bien la planificación centralizada sigue desempeñando un papel fundamental, la iniciativa privada está lejos de ser abandonada. Las empresas privadas gozan de mayor independencia en la producción, la planificación y los incentivos para sus empleados. Esta independencia les permite obtener mayores beneficios, lo que a su vez las motiva a producir más. Además, se ha introducido un nuevo sistema salarial basado en el coeficiente de participación laboral. Este sistema remunera a los empleados en función de su contribución a la producción de la empresa.§!\n\n\n\n\n£GFX_ZZZ_developed_socialism_banner\n\n\n\n\n\n£consumer_goods_texticon  Factor de fábricas de bienes de consumo: §Y-5.0%§!\n£construction_speed_civfactory_texticon  Velocidad de construcción de §Yfábrica civil§!: §G+10.0%§!\n£mil_factory  Rendimiento de fábrica: §G+5.0%§!\n£production_efficiency_loss_texticon  Retención de eficacia de producción: §R-10.0%§!\n£sabotaged_resource_texticon  Penalización por falta de recursos: §G-5.0%§!\n£efficiency_growth_texticon  Crecimiento de eficacia de producción: §R-10.0%§!\n£GFX_dx_yellow  Factor de gastos personales: §Y+5.0%§!\n£GFX_dx_yellow  Factor del valor personal: §G+5.0%§!"
 ZZZ_military_controlled_economy: "§YEconomía militar§!"
 TFR_MILITARY_CONTROLLED_TT: "§YEconomía militar§!"
 TFR_MILITARY_CONTROLLED_TT_LONG: "§gEn una economía bajo control militar, las fuerzas armadas ejercen una supervisión directa sobre la economía. La gran mayoría, si no todas, las actividades económicas están orientadas a satisfacer las necesidades militares. Este tipo de sistema económico prevalece en países con dictaduras militares o estratocracias. Sin embargo, a menudo prioriza los intereses de los militares sobre el bienestar de los ciudadanos. Esto se debe a que los regímenes que emplean este modelo económico tienden a ser nacionalistas o incluso ultranacionalistas.§!\n\n\n\n\n£GFX_ZZZ_military_controlled_banner\n\n\n\n\n\n £consumer_goods_texticon  Factor de fábricas de bienes de consumo: §Y-5.0%§!\n £construction_speed_milfactory_texticon  Velocidad de construcción de §YFábrica Militar§!: §G+10.0%§!\n £efficiency_base_texticon  Base de eficacia de producción: §R-7.5%§!\n £efficiency_growth_texticon  Crecimiento de eficacia de producción: §G+10.0%§!\n £sabotaged_resource_texticon  Penalización por falta de recursos: §G-10.0%§!\n £mil_factory  Rendimiento de fábrica: §G+5.0%§!\n £GFX_dx_yellow  Factor de gastos personales: §Y-10.0%§!\n £development  Desarrollo económico mensual: §R-2.5%§!"
 ZZZ_worker_controlled_economy: "§YEconomía obrera§!"
 TFR_WORKER_CONTROLLED_TT: "§YEconomía obrera§!"
 TFR_WORKER_CONTROLLED_TT_LONG: "§gSi bien se cree comúnmente que las economías planificadas son exclusivamente aquellas controladas por el gobierno, esto no ocurre en todas ellas.\nLas economías controladas por los trabajadores no están gobernadas por funcionarios estatales ni burócratas, sino por los propios trabajadores, a menudo a través de consejos de trabajadores o sindicatos. A través de estos organismos, los trabajadores suelen mantener el control directo sobre su producción y gozan de un alto grado de autonomía.§!\n\n\n\n\n£GFX_ZZZ_worker_controlled_banner\n\n\n\n\n\n£consumer_goods_texticon  Factor de fábricas de bienes de consumo: §Y2.0%§!\n£construction_speed_civfactory_texticon  Velocidad de construcción de §YFábrica civil§!: §G+10.0%§!\n£efficiency_growth_texticon  Crecimiento de eficacia de producción: §G+10.0%§!\"\n£prod_eff_cap  Límite de eficacia de producción: §G+5.0%§!\n£mil_factory  Rendimiento de fábrica: §G+5.0%§!\n£GFX_dx_yellow  Factor de gastos personales: §Y10.0%§!\n£GFX_dx_yellow  Factor del valor personal: §G+10.0%§!"
 ZZZ_socialist_market: "§YMercado socialista§!"
 TFR_SOCIALIST_MARKET_TT: "§YEconomía de mercado socialista§!"
 TFR_SOCIALIST_MARKET_TT_LONG: "§gEn una economía de mercado socialista, el Gobierno y la empresa privada colaboran para construir una sociedad más justa. El Gobierno posee algunas empresas y supervisa la economía para garantizar la equidad, mientras que las empresas privadas operan y se desarrollan.\nUno de los principales objetivos es garantizar que todas las personas tengan acceso a servicios esenciales, como alimentación, vivienda y atención médica. Otro objetivo es fomentar la innovación y el emprendimiento, garantizando al mismo tiempo que las empresas operen en el mejor interés público.§!\n\n\n\n\n£GFX_ZZZ_socialist_market_banner\n\n\n\n\n\n£consumer_goods_texticon  Factor de fábricas de bienes de consumo: §Y-1.5%§!\n£mil_factory  Rendimiento de fábrica: §G+3.5%§!\n£construction_speed_infrastructure_texticon  Velocidad de construcción de §YInfraestructura§!: §G+5.0%§!\n£efficiency_base_texticon  Base de eficacia de producción: §G+5.0%§!\n£efficiency_growth_texticon  Crecimiento de eficacia de producción: §R-3.5%§!\n£GFX_dx  Crecimiento mensual de ingresos: §G+10.0%§!\n£GFX_dx_yellow  Factor de gastos personales: §Y+10.0%§!"
 ZZZ_chaostic_economy: "§REconomía caótica§!"
 TFR_CHAOSTIC_TT: "§YCaos§!"
 TFR_CHAOSTIC_TT_LONG: "§gNuestra economía se encuentra actualmente §Rsumida en el caos§! y la confusión. Los negocios están cerrando, los trabajadores se están marchando y muchas más personas se enfrentan al desempleo. El Gobierno y los burócratas deben actuar con rapidez para restablecer el orden y frenar la inestabilidad que se está desatando en nuestro país.§!\n\n\n\n\n£GFX_ZZZ_chaostic_economy_banner\n\n\n\n\n\n\n\n£consumer_goods_texticon  Factor de fábricas de bienes de consumo: §Y5.0%§!\n£construction_speed_texticon  Velocidad de construcción: §R-10.0%§!\n£mil_factory  Rendimiento de fábrica: §R-10.0%§!§!"
 ZZZ_collective_capitalism_bonus1: "£consumer_goods_texticon  Factor de fábricas de bienes de consumo: §Y-2.0%§!\n£dockyard_output_texticon  Rendimiento de astillero: §G+5.0%§!\n£construction_speed_infrastructure_texticon  Velocidad de construcción de §YInfraestructura§!: §R-5.0%§!\n£construction_speed_infrastructure_texticon  Velocidad de construcción del §Yparque de oficinas§!: §G+7.5%§!\n£GFX_dx_blue  Factor del valor empresarial: §G+10.0%§!\n£GFX_dx_yellow  Factor del valor personal: §R-5.0%§!"
 ZZZ_collective_capitalism_bonus2: "£consumer_goods_texticon  Factor de fábricas de bienes de consumo: §Y-4.0%§!\n£dockyard_output_texticon  Rendimiento de astillero: §G+5.0%§!\n£mil_factory  Rendimiento de fábrica: §G+5.0%§!\n£construction_speed_infrastructure_texticon  Velocidad de construcción de §Yinfraestructura§!: §R-10.0%§!\n£construction_speed_infrastructure_texticon  Velocidad de construcción del §Yparque de oficinas§!: §G+2.5%§!\n£GFX_dx_blue  Factor del valor empresarial: §G+5.0%§!"
 ZZZ_minarchism: "§YMinarquismo§!"
 TFR_MINARCHISM_TT: "§YMinarquismo§!"
 TFR_MINARCHISM_TT_LONG: "§gEl §6minarquismo§! aboga por un Estado mínimo, encargado únicamente de la ley, el orden y la defensa, dejando todo lo demás en manos de las fuerzas caóticas del libre mercado. El capitalismo desenfrenado empoderando a los fuertes y abandonando a los débiles.§!\n\n\n\n\n£GFX_ZZZ_minarchism_banner\n\n\n\n\n\n£consumer_goods_texticon  Factor de fábricas de bienes de consumo: §Y-5%§!\n£efficiency_growth_texticon  Crecimiento de eficacia de producción: §G+3%§!\n£construction_speed_infrastructure_texticon  Velocidad de construcción de §YInfraestructura§!: §R-10%§!\n£construction_speed_infrastructure_texticon  Velocidad de construcción del §Yparque de oficinas§!: §G+2%§!\n£GFX_dx_blue  Factor del valor empresarial: §G+5.0%§!\n£GFX_dx_yellow  Factor del valor personal: §G+5.0%§!"
 ZZZ_ancap: "§YAnarcocapitalismo§!"
 TFR_ANCAP_TT: "§YAnarcocapitalismo§!"
 TFR_ANCAP_TT_LONG: "§gEl modelo §Yanarcocapitalista§! imagina un mundo donde el Estado desaparece, reemplazado por el libre mercado y la empresa privada. La ley, la seguridad y los servicios son gestionados por empresas competidoras, con los derechos de propiedad y el intercambio voluntario como principios rectores. Sus partidarios lo celebran como la verdadera libertad; sus críticos advierten sobre la dominación corporativa. Es una sociedad donde la libertad absoluta y el caos van de la mano.§!\n\n\n\n\n£GFX_ZZZ_ancap_banner\n\n\n\n\n\n£consumer_goods_texticon  Factor de fábricas de bienes de consumo: §Y-15%§!\n£efficiency_growth_texticon  Crecimiento de eficacia de producción: §G+12%§!\n£construction_speed_infrastructure_texticon  Velocidad de construcción de §YInfraestructura§!: §R-39%§!\n£construction_speed_infrastructure_texticon  Velocidad de construcción del §Yparque de oficinas§!: §G+25%§!\n£GFX_dx_blue  Factor del valor empresarial: §G+15.0%§!\n£GFX_dx_yellow  Factor del valor personal: §G+5.0%§!\n£GFX_stability_texticon  Estabilidad: §R-10.0%§!"
 ZZZ_kaiser_economy: "§YEconomía Reichsbürger§!"
 ZZZ_KAISER_ECO_TT: "§YEconomía Reichsbürger§!"
 ZZZ_KAISER_ECO_TT_LONG: "§gEl sistema económico del nuevo régimen del káiser es una compleja red de prácticas neofeudales y dominio agrario. Considera la banca como la fuente de todos los males sociales, pero va un paso más allá, culpando explícitamente al pueblo judío por lo que percibe como un declive de la economía alemana y del campo alemán, y considerando que la urbanización está impulsada por intereses bancarios judíos.\nSu objetivo es crear una economía de mercado rural próspera, centrándose en las pequeñas empresas que no puedan causar grandes daños al medio ambiente. Mientras tanto, toda la potencia industrial restante se dedica a satisfacer las necesidades del ejército y sus cada vez mayores filas.§!\n\n\n\n\n£GFX_ZZZ_kaiser_economy_banner\n\n\n\n\n\n £consumer_goods_texticon  Factor de fábricas de bienes de consumo: §Y-5.0%§!\n £construction_speed_civfactory_texticon  Velocidad de construcción de §YFábrica civil§!: §R-10.0%§!\n £construction_speed_milfactory_texticon  Velocidad de construcción de §YFábrica Militar§!: §G+3.5%§!\n £mil_factory  Rendimiento de fábrica: §G+1.0%§!\n £mobilisation_texticon  Velocidad de movilización: §G+15.0%§!\n £production_efficiency_loss_texticon  Retención de eficacia de producción: §R-10.0%§!\n £development  Desarrollo económico mensual: §R-2.0%§!\n £GFX_dx  Crecimiento mensual de ingresos: §R-15.0%§!\n £GFX_dx_yellow  Factor del valor personal: §R-15.0%§!\n £GFX_dx_yellow  Factor de gastos personales: §Y-15.0%§!"
 ZZZ_left_corporatism: "§YCorporativismo de izquierdas§!"
 ZZZ_LEFT_CORPORATISM_TT: "§YCorporativismo de izquierdas§!"
 ZZZ_LEFT_CORPORATISM_TT_LONG: "§gEl corporativismo de izquierda es un modelo económico que busca equilibrar los intereses de diversos grupos sociales, en particular los trabajadores, el capital y el Estado, mediante un sistema de cooperación y negociación. Suele asociarse con un enfoque de gobernanza más progresista o de izquierda, que prioriza la equidad social, la sostenibilidad ambiental y la participación democrática.\nEl corporativismo de izquierda suele implicar la colaboración entre tres actores principales: el Gobierno, las empresas y los sindicatos. Este modelo tripartito busca fomentar el diálogo y el consenso entre estos grupos para abordar cuestiones económicas y sociales.§!\n\n\n\n\n£GFX_ZZZ_left_corporatism_banner\n\n\n\n\n\n£consumer_goods_texticon  Factor de fábricas de bienes de consumo: §Y2.5%§!\n£construction_speed_infrastructure_texticon  Velocidad de construcción de §YInfraestructura§!: §G+10.0%§!\n£mil_factory  Rendimiento de fábrica: §G+3.5%§!\n£construction_speed_texticon  Velocidad de construcción: §G+5.0%§!\n£GFX_dx  Crecimiento mensual de ingresos: §R-10.0%§!\n£GFX_dx_yellow  Factor del valor personal: §G+10.0%§!"
 ZZZ_liberal_corporatism: "§YCorporativismo liberal§!"
 ZZZ_LIBERAL_CORPORATISM_TT: "§YCorporativismo liberal§!"
 ZZZ_LIBERAL_CORPORATISM_TT_LONG: "§gEl corporativismo liberal es un modelo económico y político que prioriza la colaboración entre el Estado, las empresas y las organizaciones sindicales, manteniendo una economía predominantemente de mercado. Busca equilibrar los intereses de estos grupos mediante marcos institucionales que promueven la negociación y la cooperación. Si bien el corporativismo liberal opera dentro de un marco capitalista, reconoce la necesidad de la intervención estatal para corregir las fallas del mercado, garantizar una competencia justa y proteger los derechos de los trabajadores.§!\n\n\n\n\n£GFX_ZZZ_liberal_corporatism_banner\n\n\n\n\n\n £consumer_goods_texticon  Factor de fábricas de bienes de consumo: §Y-1.5%§!\n £prod_eff_cap  Límite de eficacia de producción: §R-5.0%§!\n £construction_speed_texticon  Velocidad de construcción: §G+2.5%§!\n £development  Desarrollo económico mensual: §G+0.05%§!\n £GFX_dx_blue  Factor del valor empresarial: §G+10.0%§!\n £GFX_dx_yellow  Factor del valor personal: §G+10.0%§!"
 ZZZ_maga_capitalism: "§YCapitalismo MAGA§!"
 ZZZ_MAGA_CAPITALISM_TT: "§YCapitalismo MAGA§!"
 ZZZ_MAGA_CAPITALISM_TT_LONG: "§gAunque sigue los estándares básicos del modelo capitalista estadounidense, el capitalismo MAGA es mucho más proteccionista y no se doblega ante las grandes corporaciones.\nEn cambio, apoya a las pequeñas empresas y productores independientes, así como a las medianas empresas. También cuenta con sólidas leyes antimonopolio para limitar o eliminar el poder económico excesivo.\nOtra característica clave de este sistema es el fuerte énfasis en la protección y promoción de los intereses de los trabajadores. El objetivo es mantener y, de ser posible, mejorar la Seguridad Social, Medicare y otros programas de asistencia social, minimizando al mismo tiempo su carga sobre la economía estadounidense.§!\n\n\n\n\n£GFX_ZZZ_maga_capitalism_banner\n\n\n\n\n\n£consumer_goods_texticon  Factor de fábricas de bienes de consumo: §Y2.0%§!\n£efficiency_growth_texticon  Crecimiento de eficacia de producción: §R-5.0%§!\n£construction_speed_infrastructure_texticon  Velocidad de construcción de §YInfraestructura§!: §G+5.0%§!\n£construction_speed_civfactory_texticon  Velocidad de construcción de §YFábrica civil§!: §G+5.0%§!\n£GFX_dx_blue  Factor del valor empresarial: §R-5.0%§!\n£GFX_dx_yellow  Factor del valor personal: §G+10.0%§!\n£GFX_dx_yellow  Factor de gastos personales: §Y+3.0%§!"
 ZZZ_america_first_capitalism: "§YCapitalismo \"America First\"§!"
 ZZZ_AF_CAPITALISM_TT: "§YCapitalismo \"America First\"§!"
 ZZZ_AF_CAPITALISM_TT_LONG: "§gEl capitalismo \"America First\" es una versión modernizada y mejorada del sistema estadounidense. El objetivo es crear una economía proteccionista que beneficie enormemente a las empresas estadounidenses. Esto se logra mediante el uso de aranceles para proteger los productos y negocios estadounidenses de la competencia extranjera. El país también se aísla de influencias \"indeseables\". El sistema también se centra en gran medida en proyectos de infraestructura para ayudar a conectar la nación y generar más ingresos.\nFavorece enormemente a las corporaciones estadounidenses y busca reformar el sistema corporativo estadounidense o crear un nuevo grupo de grandes empresas que respondan a la voluntad de la nación americana.§!\n\n\n\n\n£GFX_ZZZ_america_first_capitalism_banner\n\n\n\n\n\n£consumer_goods_texticon  Factor de fábricas de bienes de consumo: §Y-4.0%§!\n£prod_eff_cap  Límite de eficacia de producción: §G+3.5%§!\n£construction_speed_infrastructure_texticon  Velocidad de construcción de §YInfraestructura§!: §G+5.0%§!\n£mil_factory  Rendimiento de fábrica: §R-5.0%§!\n£GFX_dx_blue  Factor del valor empresarial: §G+15.0%§!\n£GFX_dx_yellow  Factor del valor personal: §R-15.0%§!"
 ZZZ_state_capitalism: "§YCapitalismo de Estado§!"
 ZZZ_STATE_CAPITALISM_TT: "§YCapitalismo de Estado§!"
 ZZZ_STATE_CAPITALISM_TT_LONG: "§gEl capitalismo de Estado es un sistema económico en el que el Gobierno participa activamente en actividades comerciales y empresariales con fines de lucro. En este sistema, los medios de producción están estatizados y controlados por el Estado a través de empresas públicas. Esto incluye la acumulación de capital, la gestión centralizada y el uso de mano de obra asalariada.§!\n\n\n\n\n£GFX_ZZZ_state_capitalism_banner\n\n\n\n\n\n£consumer_goods_texticon  Factor de fábricas de bienes de consumo: §Y-2.0%§!\n£efficiency_growth_texticon  Crecimiento de eficacia de producción: §R-2.0%§!\n£construction_speed_civfactory_texticon  Velocidad de construcción de §Yfábrica civil§!: §G+2.5%§!\n£construction_speed_infrastructure_texticon  Velocidad de construcción de §Yinfraestructura§!: §G-1.5%§!\n£GFX_dx  Crecimiento mensual de ingresos: §R-4.0%§!\n£efficiency_base_texticon  Base de eficacia de producción: §G+5.0%§!"
 ZZZ_party_state_capitalism: "§YCapitalismo unipartidario§!"
 ZZZ_PARTY_STATE_CAPITALISM_TT: "§YCapitalismo unipartidario§!"
 ZZZ_PARTY_STATE_CAPITALISM_TT_LONG: "§gEl capitalismo unipartidario es un modelo económico en el que el Estado no es el principal motor de la economía, sino que las estructuras partidarias se sitúan por encima de las estatales.\nUno de los principales indicadores de la expansión del sistema unipartidario es la creciente presencia de organizaciones partidarias en las empresas, incluyendo empresas privadas e incluso extranjeras. Otra característica clave de este modelo es la expansión del capital estatal más allá de las empresas públicas. Este proceso se ha denominado \"financiarización del Estado\". Otra forma visible de la actividad económica unipartidaria es en la evolución de la política industrial.§!\n\n\n\n\n£GFX_ZZZ_party_state_capitalism_banner\n\n\n\n\n\n£consumer_goods_texticon  Factor de fábricas de bienes de consumo: §Y-3.0%§!\n£efficiency_growth_texticon  Crecimiento de eficacia de producción: §R-2.0%§!\n£construction_speed_civfactory_texticon  Velocidad de construcción de §YFábrica civil§!: §G+4.0%§!\n£construction_speed_infrastructure_texticon  Velocidad de construcción del §Yparque de oficinas§!: §G+4.0%§!\n£GFX_dx  Crecimiento mensual de ingresos: §G+2.5%§!\n£efficiency_base_texticon  Base de eficacia de producción: §R-1.5%§!"
 ZZZ_mixed_economy: "§YEconomía mixta§!"
 ZZZ_MIXED_ECONOMY_TT: "§YEconomía mixta§!"
 ZZZ_MIXED_ECONOMY_TT_LONG: "§gUna economía mixta es un sistema económico que combina elementos tanto del capitalismo, como la empresa privada, como del socialismo, como los servicios gubernamentales estatizados.\nExisten diferentes maneras de definir una economía mixta. Por ejemplo, algunos afirman que es un sistema económico que combina elementos de una economía de mercado con elementos de una economía planificada. Otros afirman que combina mercados con intervencionismo estatal, o la empresa privada con la empresa pública.§!\n\n\n\n\n£GFX_ZZZ_mixed_economy_banner\n\n\n\n\n\n£consumer_goods_texticon  Factor de fábricas de bienes de consumo: §Y-2.5%§!\n£efficiency_base_texticon  Base de eficacia de producción: §G+2.0%§!\n£construction_speed_civfactory_texticon  Velocidad de construcción de §YFábrica civil§!: §G+1.5%§!\n£construction_speed_infrastructure_texticon  Velocidad de construcción del §Yparque de oficinas§!: §G+1.5%§!\n£GFX_dx_blue  Factor del valor empresarial: §G+3.5%§!\n£GFX_dx_yellow  Factor del valor personal: §R-1.5%§!"
 ZZZ_more_content_soon_tt: "§Y¡MÁS CONTENIDO PRÓXIMAMENTE!§!\n---------------\n§gYa sean nuevos caminos, mejoras o simplemente novedades generales, ¡lo que sea, llegará pronto!§!"
 USA_usc_path_tt: "§YGobierno Constitucional Americano§!\n---------------\n\n\n\n\n£GFX_USC_path_banner\n\n\n\n\n\n§g¡Salva a América, Presidente Trump!\n\nY estoy orgulloso de ser americano,\ndonde al menos sé que soy libre,\ny no olvidaré a los hombres que murieron,\nque me dieron ese derecho.§!"
 USA_apla_path_tt: "§YEjército Popular de Liberación Americano§!\n---------------\n\n\n\n\n£GFX_APA_path_banner\n\n\n\n\n\n§gLleva la revolución al mismísimo corazón del capitalismo.\n\nTenemos en nuestras manos un poder mayor que su oro atesorado\nMil veces mayor que el poder de sus ejércitos\nPodemos hacer nacer un nuevo mundo con las cenizas del viejo\nPor la unión que nos hace fuertes.§!"
 USA_usb_path_tt: "§YUnión de América§!\n---------------\n\n\n\n\n£GFX_USB_path_banner\n\n\n\n\n\n§gDi NO al ODIO. Di NO a la INTOLERANCIA.\n\n¡Oh, hermosa por cielos espaciosos\nPor olas doradas de granos\nPor majestuosas montañas color púrpura\nSobre la llanura llena de frutos!\n¡América! ¡América!§!"
 USA_ptf_path_tt: "§YFrente Patriota§!\n---------------\n\n\n\n\n£GFX_PTF_path_banner\n\n\n\n\n\n§gReclama América. Reclama tu patrimonio.\n\nMis ojos han visto la gloria de la venida del Señor:\nEstá aplastando la viña donde se guardan las uvas de la ira;\nHa liberado el fatídico rayo de su terrible y rápida espada:\nSu verdad está en marcha§!"
 USA_nsm_path_tt: "§YMovimiento Nacionalsocialista§!\n---------------\n\n\n\n\n£GFX_NSM_path_banner\n\n\n\n\n\n§gLucha por el futuro de tu raza.\n\nLas banderas se bajan ante los muertos que aún viven\nLa división de asalto jura, con la mano cerrada en un puño,\nque llegará el día para la retribución, no el perdón,\ncuando Heil y Sieg resuenen en la patria.§!"
 USA_atw_path_tt: "§YDivisión Atomwaffen§!\n---------------\n\n\n\n\n£GFX_ATW_path_banner\n\n\n\n\n\n§gQuema este mundo podrido hasta sus cimientos.\n\nLos incendios, saqueos\nrebeliones masacran a las masas.\nLa oscuridad trae la muerte\nCiudades reducidas a cenizas§!"
 SOV_ur_path_tt: "§YRusia Unida§! - §R¡NO TRADUCIDO!§!\n---------------\n\n\n\n\n£GFX_SOV_we_trust_in_medvedev_banner\n\n\n\n\n\n§gPrepara el camino a la §Yverdadera soberanía§!. Asegura §Csu§! legado.§!"
 SOV_cprf_path_tt: "§YPartido Comunista de la Federación de Rusia§! - §R¡NO TRADUCIDO!§!\n---------------\n\n\n\n\n£GFX_SOV_CPRF_banner\n\n\n\n\n\n§gConviértete en el mayor constructor del comunismo.§!"
 SOV_ldpr_path_tt: "§YPartido Liberal-Demócrata de Rusia§! - §R¡NO TRADUCIDO!§!\n---------------\n\n\n\n\n£GFX_SOV_ldpr_always_only_truth_banner\n\n\n\n\n\n§gConquista Europa. Crea un auténtico Estado imperial o construye una democracia nacionalista.§!"
 SOV_eurasia_path_tt: "§YEurasia de Duguin§! - §R¡NO TRADUCIDO!§!\n§RRusia perdió la Guerra Europea.§!\n---------------\n\n\n\n\n£GFX_apotheosis_of_history\n\n\n\n\n\n§gAplasta la amenaza globalista. Libera tu mente de la mentalidad modernista.§!"
 SOV_navalny_path_tt: "§YPopulismo de Navalni§! - §R¡NO TRADUCIDO!§!\n§RRusia perdió la Guerra Europea.§!\n---------------\n\n\n\n\n£GFX_SOV_beautiful_russia_of_the_future_banner\n\n\n\n\n\n§gLibera a Europa de si misma con un toque de liberalismo ultranacionalista.§!"
 USA_los_path_tt: "§YLiga del Sur§! - §R¡EN DESARROLLO!§!\n---------------\n\n\n\n\n£GFX_LOS_path_banner\n\n\n\n\n\n§gEntonces desearía estar en Dixie, ¡hurra! ¡hurra!\nEn Dixie Land me plantaré para vivir y morir en Dixie,\nAllá, allá, allá, allá en el sur de Dixie,\nAllá, allá, allá, allá en el sur de Dixie§!"
 USA_rrr_path_tt: "§YRevuelta Redneck§! - §R¡EN DESARROLLO!§!\n---------------\n\n\n\n\n£GFX_RRR_path_banner\n\n\n\n\n\n§gÉl capturó Harpers Ferry, con sus escasos 19 hombres,\nY atemorizó a la \"Vieja Virginia\" hasta que tembló de arriba a abajo;\nLo colgaron por traidor,\nellos mismos eran los traidores,\nPero su alma sigue marchando§!"
 USA_cascadia_path_tt: "§YCascadia§! - §R¡EN DESARROLLO!§!\n---------------\n\n\n\n\n£GFX_CAC_path_banner\n\n\n\n\n\n§gEn el pinar, en el pinar,\nDonde el sol nunca llega a brillar\nTemblará toda la noche§!"

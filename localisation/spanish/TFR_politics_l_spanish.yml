 GER_democratic_path_tt: "§YDemocracia en Alemania§!\n---------------\n\n\n\n\n£GFX_GER_democratic_path_banner\n\n\n\n\n\n§gGuía la democracia alemana a través de años de inestabilidad global.\n\nUnidad y justicia y libertad\npara la patria alemana;\npersigamos todos ese fin\nfraternalmente, emocionados y actuando.§!"

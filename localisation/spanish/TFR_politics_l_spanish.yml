 GER_communist_path_tt: "§YComunismo europeo§!\n§RLa OTAN perdió la Guerra Europea.§!\n---------------\n\n\n\n\n£GFX_GER_communist_path_banner\n\n\n\n\n\n§gAbraza la nostalgia del pasado o construye una nueva forma de socialismo.\n\nPues: un, dos, tres.\nPues: un, dos, tres.\n¡Compañero, en tu lugar!\nporque eres del pueblo, afíliate ya,\nEn el Frente Popular.§!\n---\n§R¡Haz la vista gorda antes de la Guerra para desbloquear un camino!§!\n§R¡Si, además de eso, Die Linke gana las elecciones de 2021, desbloquearás otro camino!§!"

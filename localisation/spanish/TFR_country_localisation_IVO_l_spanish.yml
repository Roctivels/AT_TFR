l_spanish:
 Ivory.0.t: "Los oficiales franceses en África vuelven a casa"
 Ivory.0.d: "Debido a la naturaleza pública de nuestra ayuda en África Occidental, muchos dentro y fuera del gobierno francés están solicitando que llevemos a nuestros oficiales establecidos en África Occidental a casa. Nuestros aliados de África Occidental sobrevivirán, pues les hemos enseñado bien la forma de gobernar."
 Ivory.0.a: "Digo, ¿Quién se quejaría?"
 Ivory.1.t: "Fundación de la Hermandad de los Estados de África Occidental"
 Ivory.1.d: "Hoy, un grupo de oficiales liderados por el General Ibrahim Traoré, han anunciado la creación de la Hermandad de los Estados de África Occidental, un grupo \"pacífico\" de oficiales que están dispuestos a \"actuar\" si el Gobierno actual no renuncia en favor de un \"Gobierno Antifrancés\"."
 Ivory.1.a: "¿Por qué haríamos esto?"
 Ivory.2.t: "Militares franceses anuncian su retirada"
 Ivory.2.d: ""
 Ivory.2.a: "Espera... ¿Qué?"
 Ivory.3.t: "Ha llegado el momento"
 Ivory.3.d: "Los Franceses se han retirado del \"Títere Francés\" en la antigua Costa de Marfil, ¡Es nuestro momento de atacar!"
 Ivory.3.a: "Muerte a Francia."
 Ivory.4.t: "Yihad contra África Occidental"
 Ivory.4.d: "MATAR MATAR MATAR"
 Ivory.4.a: "MATAR MATAR MATAR"
 Ivory.5.t: "Guerra Civil"
 Ivory.5.d: "Traore ha anunciado que las exigencias de la Hermandad de Estados de África Occidental siguen sin cumplirse, y ahora tenemos constancia de levantamientos militares a gran escala en toda Burkina Faso."
 Ivory.5.a: "Mierda."
 Ivory.6.t: "¿En qué bando estamos?"
 Ivory.6.d: "Tanto el WADT como la CoASAI nos han enviado invitaciones para unirnos a sus pactos de seguridad."
 Ivory.6.a: "Unirse al WADT."
 Ivory.6.b: "Unirse a la CoASAI."
 Ivory.6.c: "Pedir garantías de neutralidad."
 Ivory.7.t: "Mali demanda la \"Descolonización\" de nuestra Identidad"
 Ivory.7.d: "Mali no quiere que volvamos a hablar Francés"
 Ivory.7.a: "Uh... ¿Okey?"
 Ivory.8.t: "Mali instala un déspota títere"
 Ivory.8.d: "Mali reclama que nosotros no nos hemos descolonizado lo suficiente, y Mali está colocando ahora a un descendiente de un reino hace mucho tiempo como un intento de aplastar nuestra identidad nacional."
 Ivory.8.a: "¿Cómo se supone que aceptemos esto?"

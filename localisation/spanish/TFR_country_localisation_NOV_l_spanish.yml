 NOV_soviet_bulwark_idea_desc: "El Dombás es un bastión del antifascismo, protegiendo a los trabajadores de Lugansk y Donetsk de banderistas ucranianos y sus titiriteros - imperialistas de la OTAN. No importa lo que ocurra, mantendremos la bandera escarlata ondeando gloriosa y las estatuas de Lenin erguidas orgullosamente, luchando contra viento y marea."
 NOV_imperial_frontier_idea: "Frontera imperial"
 NOV_imperial_frontier_idea_desc: "Somos los hijos de ancestros gloriosos, los mejores de la Tercera Roma, cargando la difícil tarea en nuestros hombros de purificar Novorrusia y Malorrusia de la falsa \"identidad ucraniana\", su escoria nacionalista y su pseudocultura occidental degenerada. El Dombás ruso está tras nosotros, y Dios está de nuestro lado."

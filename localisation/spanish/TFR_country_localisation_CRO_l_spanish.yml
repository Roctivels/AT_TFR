l_spanish:
 CRO_slavoniadalmatia_divide: "División Eslavonia-Dalmacia"
 CRO_slavoniadalmatia_divide_desc: "Nuestra costa es la gema reluciente de Croacia, con el cristalino Adriático y paisajes pintorescos haciéndolo uno de los destinos turísticos top en Europa y una  de nuestra mayores fuentes de ingresos para Croacia desde 1991, sin mencionar la masiva industria naval en las mayores ciudades costeras. El problema de este comparativamente próspero desarrollo fue el descuido de la mitad norte de nuestro país en el fértil valle de Eslavonia, resultando en la carencia de un desarrollo industrial, por lo que la región se ha quedado en gran medida agraria a pesar de sus muchas reservas de recursos sin explotar. El ejemplo más claro de esta división es que solo 2 de los 100 principales empresarios croatas son originarios de Eslavonia."
 CRO_european_reliance: "Dependencia europea"
 CRO_european_reliance_desc: "Uno de los defectos de una industria turística próspera y de un banco central convertido en una bolsa de valores es la mayor pesadilla de un autárquico - depender de otras naciones. La mayoría de nuestra economía depende de la fabricación de buques, el turismo y el tránsito, con nuestras exportaciones industriales siendo solo un cuarto de nuestro PIB total. Inevitablemente, Croacia se convirtió en un país dependiente de la Unión Europea tanto económicamente y políticamente, dejando poco espacio a Croacia para afirmarse como una potencia regional. Otra consecuencia es el auge del populismo entre la gente, frustrada de la falta de interés de los políticos croatas en reducir la excesiva dependencia y no ser nada más que los peones de Bruselas."
 CRO_fading_grudges: "Rencores en declive"
 CRO_fading_grudges_desc: "Croacia fue uno de los participantes principales de las guerras yugoslavas, con nuestros hombres luchando contra serbios y bosnios en los frentes de Eslovenia y Yugoslavia central. Ahora que las guerras han terminado, y las disputas han comenzado a ser resueltas mediante la colaboración y la entrada conjunta en la Unión Europea, la mecha que son los Balcanes parece haberse ampliado enormemente, al menos en los Estados del norte de la ex-Yugoslavia - con la disputa fronteriza serbo-croata volviéndose inactiva y la disputa marítima con Eslovenia siendo solo una pequeña molestia para pescadores locales."
 CRO_fascist_resurgence: "Resurgimiento fascista"
 CRO_fascist_resurgence_desc: ""
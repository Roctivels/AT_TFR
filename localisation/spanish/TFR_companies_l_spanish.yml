 zala_aero_group: "ZALA Aero Group"
 zala_aero_group_desc: ""
 chelyabinsk_tractor_plant: "Planta de Tractores de Cheliábinsk"
 chelyabinsk_tractor_plant_desc: ""
 bae_systems: "BAE Systems"
 bae_systems_desc: "British Aerospace Electronic Systems es una compañía de armamentos en general con sede en Londres, Reino Unido. Aunque se concentre en armamento aéreo también a desarrollado una presencia significativa en tecnologías terrestres, navales y cibernéticas. Entre sus más destacados diseños se encuentran el sistema terrestre Alvis Vickers, los portaviones Invincible y Queen Elizabeth, aviones como el BAe 146, BAe ATP, F35 Lightning II y el legendario avión de pasajeros Concorde. BAE Systems es la segunda compañía armamentística más grande del mundo."
 nexter_desc: "Nexter es una compañía armamentística controla por el Ministerio de Defensa francés con participación privada después de que su predecesora, la estatal industrias-GIAT, cayera después de no poder producir un tanque superior al Abrams o al Leopard II con su propio proyecto del tanque Leclerc. Nexter desde entonces produce materiales de infantería como el FAMAS o el antitanque APILAS, sigue produciendo al tanque Leclerc al igual que el caño CAESAR. Nexter trabaja cercamente con su equivalente alemán, la alemana KMW"
 krauss_maffei_wegmann: "KMW"
 krauss_maffei_wegmann_desc: "Krauss-Maffei Wegmann es una GmbH (sociedad de responsabilidad limitada) militar alemana con sede en Múnich, Baviera. Se concentra en vehículos de tierra con su modelo más famoso siendo la familia de tanque Leopard que no solo es usada por la Bundeswehr alemana sino también producida por compañías militares alrededor del mundo, otros modelos por destacar serian el ATF Dingo, el MARS, el AMPV y el Panzehaubitze 2000. Trabaja cercamente con la francesa Nexter que es igual de grande y se encarga de las mismas áreas."
 oto_melara: "Oto Melara"
 oto_melara_desc: "Oto Melara, con sede en La Spezia (Italia), es un constructor de armamento que, si bien se centra en las baterías de buques, también compite en el negocio de los tanques. Ha construido varios modelos militares como el C-1 Ariete, el OF-40, el SIDAM 25, el Freccia, el sistema Marlin, el lanzador de señuelos SCLAR-H y otros. Aunque tiene algunas dificultades en el competitivo mercado europeo, Oto Melara sigue siendo una fuerza competitiva."
 mitsubishi: "Mitsubishi"
 mitsubishi_desc: "Aunque se dedica principalmente a la fabricación de automóviles civiles, Mitsubishi ha tenido un ala de producción de vehículos militares desde las Guerras Mundiales. La empresa, con sede en Minato, produce principalmente carros de combate y ha fabricado los principales modelos de carros japoneses, como el Type 90 Kyu-maru. Fuera de Japón, no ha alcanzado un éxito significativo y sigue centrando su experiencia principalmente en el asesoramiento a las fuerzas de autodefensa japonesas."
 norinco: "Norinco"
 norinco_desc: "La China North Industries Group Corporation, o Norinco, es una compañía militar estatal con base en Pekín, China. Esta construye municiones, piezas de artillería y vehículos de combate, entre otros. La corporación ha desarrollado múltiples modelos desde armas a tanques de combate principal, muchos de estos inspirados por o copiados de modelos occidentales. Eso si, sus modelos más recientes han sido más únicos, como el rifle QBZ-95 o el carro de combate principal Tipo 99."
 cvrde: "CVRDE"
 cvrde_desc: "El Combat Vehicle Research & Development Establishment es un laboratorio de la agencia estatal DRDO. La empresa, con sede en Chennai (India), aún no ha alcanzado su cenit, pero ya ha producido modelos como el M46, el Tanque Ligero de la DRDO y el BLT T-72."
 uralvagonzavod: "Uralvagonzavod"
 uralvagonzavod_desc: "Uralvagonzavod, el mayor fabricante de carros de combate del mundo, es una empresa militar parcialmente estatal con sede en Nizhny Tagil, fundada durante la Unión Soviética. Ha desarrollado el T-54A, el T-55, el T-62, el T-72 y el T-90 y produce hasta la fecha Gran parte de los tanques rusos."
 general_dynamics_land_systems: "General Dynamics LS"
 general_dynamics_land_systems_desc: "General Dynamics Land Systems es la rama terrestre de la compañia aeroespacial General Dynamics localizada en Virginia, Estados Unidos. Si bien la compañía es conocida principalmente por cazas a reacción como el F-16, General Dynamics está presente en todas las ramas militares. Es el quinto mayor contratista de defensa en el mundo."
 royal_navy: "Royal Navy"
 royal_navy_desc: "La Royal Navy es la rama naval de las fuerzas armadas británica con su base principal en Portsmouth, sur de inglaterra. Frequentemente auxilia a las marinas de sus aliados y antiguos miembros de la Commonwealth."
 la_royale: "La Royale"
 la_royale_desc: "La \"Marine nationale francaise\", llamado a veces \"La Royale\" es la rama naval de la República Francesa. Los franceses frecuentemente ayudas a sus antiguos Estados coloniales con auxiliares y teóricos de su Marina."
 bundesmarine: "Bundesmarine"
 bundesmarine_desc: "La Marina Alemana o Bundesmarine es una pequeña, pero inventiva fuerza naval costera. Mientras que carecen de contratos internacionales los alemanes desarrollan prototipos de buques prometedores y podrían ser un buen socio comercial."
 marina_militare: "Marina Militare"
 marina_militare_desc: "La Marina Militare es la fuerza militar naval de Italia. Es una de las fuerzas navales más poderosas del Sur de Europa, operando frecuentemente en las costas del mar Mediterraneo. Italia asiste a sus aliados en los Balcanes con su conocimiento naval."
 maritime_self_defense_force: "FMAJ"
 maritime_self_defense_force_desc: "Las Fuerza Maritima de Autodefensa de Japón son una poderosa marina en el Pacifico Oeste y han desarrollado grandes conocimientos relativos a la construcción de buques con durabilidad excepcional en viajes largos. Los japoneses suelen cooperar con los estadounideses y los surcoreanos tratando de contener la amenaza que supone la Armada china."
 bharatiya_nau_sena: "Bharatiya Nau Sena"
 bharatiya_nau_sena_desc: "La Bharatiya Nau Sena, traducida aproximadamente a \"Marina India\" del Sánscrito, es la fuerza naval más poderosa del Océano Índico y contiene un creciente numero de buques y personal naval."
 peoples_liberation_navy: "Armada del EPL"
 peoples_liberation_navy_desc: "La Armada del Ejército Popular de Liberación de China es la armada que más rapido está creciendo entre las grandes potencias. Los Chinos tienen una gran ambición terrestre y marítima, y necesitan una marina a la altura. China coopera con Rusia y Corea del Norte en ámbitos de desarrollo naval, y es habitualmente antagonizada por Japón y los Estados Unidos."
 russian_navy: "Marina Rusa"
 russian_navy_desc: "La Marina de la Federación de Rusia es una poderosa fuerza naval multicontinental, limitada por la poca cantidad y calidad de los puertos a los que Rusia puede acceder. Rusia no posee aliados con grandes fuerzas navales, y se enfrenta a marinas superiores a la suya propia - quizá nuevos contratistas podrían remediarlo."
 us_navy: "Marina de los Estados Unidos"
 us_navy_desc: "La rama militar con mayor financiación del mundo entero, la cantidad de dinero que Estados Unidos gasta en su armada supera el gasto militar total de todas las demás naciones, con más de 200 mil millones de dólares anuales. La Armada de Estados Unidos, que opera la mayor cantidad de portaaviones del mundo, ayuda a muchas fuerzas navales en toda la guerra con su gran arsenal y su teórica maestría."
 bae_systems_air: "BAE Systems Air"
 bae_systems_air_desc: "British Aerospace Electronic  Systems es una compañia de armamentos en general con sede en Londres, Reino Unido. La División Aérea de BAE Systems es uno de los mayores productores de aeronaves del mundo, habiendo producido el F-35, el avión de pasajeros Concorde y otras icónicas aeronaves."
 airbus: "Airbus"
 airbus_desc: "Airbus es una constructora de aeronaves comerciales con sede en Toulouse, Francia, que produce tanto aviones civiles como militares en varias plantas alrededor del mundo para diversos consumidores. Entre sus productos más emblemáticos se encuentran los aviones de fuselaje ancho, como el A380, uno de los aviones de pasajeros más grandes jamás diseñados."
 panavia: "Panavia"
 panavia_desc: "Desde su sede en Hallbergmoss, Baviera, Alemania, Panavia es un conglomerado empresarial Alemán, Italiano y Británico dedicado a la construcción de aeronaves militares para la Unión Europea, siendo de especial relevancia el caza a reacción Tornado."
 leonardo_finmeccanica: "Leonardo"
 leonardo_finmeccanica_desc: "Leonardo-Finmeccanica, con sede en Roma, es uno de los mayores productores de aeronaves de Italia, enfocandose en aviones defensivos y militares. Un tercio de la compañia es propiedad del Gobierno Italiano. Produce cazas a reacción como el M-346, Helicópteros como el AW101 e incluso módulos espaciales como el MLMP Raffaelo."
 hindustan_aeronautics: "Hindustan AL"
 hindustan_aeronautics_desc: "La empresa nacional HAL (Hindustan Aeronautics Limited) tiene su sede en Bangalore, India, y produce equipamiento militar aéreo. Produciendo tanto transportes como cazas a reacción, asi como helicópteros, HAL es dirigida por el Ministerio de Defensa de India, y es usada principalmente para operaciones gubernamentales, a pesar de cooperar con países cercanos como Bután o Bangladesh."
 mitsubishi_air: "Mitsubishi HI"
 mitsubishi_air_desc: "Mitsubishi es uno de los mayores productores de vehículos terrestres y aéreos de Japon. El Departamento de Industria Pesada de la compañía produce aeronaves generalmente especializadas en operar sobre el Océano Pacífico."
 chengdu: "Chengdu AIG"
 chengdu_desc: "Chengdu Aircraft Industry Group es un fabricante de aeronaves fundado en 1990 en Chengdu, en la Provincia China de Sichuan. Productor de jets como el J-10 y el JF-17, la influencia de Chengdu crece en la Fuerza Aérea del EPL."
 mikoyan_gurevich: "Mikoyán"
 mikoyan_gurevich_desc: "Mikoyán-Gurévich, usualmente abreviado MiG, es uno de los fabricantes más grandes e icónicos en la historia de la humanidad. Si antaño los aviones MiG lucharon contra Messerschmitts, hoy en día compiten contra compañias como Lockheed Martin. El MiG-29 es uno de los cazas a reacción más notorios de Mikoyán. A día de hoy, Mikoyán está desarrollando a su sucesor, el MiG-35."
 lockheed_martin: "Lockheed Martin"
 lockheed_martin_desc: "Lockheed Martin, con sede en Maryland, es un fabricante de aviones privados que opera a nivel mundial y genera ingresos de hasta 50 mil millones de dólares estadounidenses al año. Produce principalmente para las distintas Fuerzas Aéreas estadounidenses, entregando aviones como el C-130J Hercules. Lockheed Martin también busca expandirse al ámbito de los vuelos espaciales."

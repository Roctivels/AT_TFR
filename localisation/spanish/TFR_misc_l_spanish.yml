 RULE_OPTION_FIVE_PERCENT: "5%"
 RULE_OPTION_FIVE_PERCENT_AI_DESC: "Cinco porciento de los países con el árbol de enfoque genérico van a cambiar su ideología de democrático a autoritario y vice versa. Si el enfoque histórico de la IA esta habilitado, este ajusto se volverá 0%."
 RULE_OPTION_TEN_PERCENT: "10%"
 RULE_OPTION_TEN_PERCENT_AI_DESC: "Diez porciento de los países con el árbol de enfoque genérico van a cambiar su ideología de democrático a autoritario y vice versa. Si el enfoque histórico de la IA esta habilitado, este ajusto se volverá 0%."
 RULE_OPTION_TWENTY_PERCENT: "20%"
 RULE_OPTION_TWENTY_PERCENT_AI_DESC: "Veinte porciento de los países con el árbol de enfoque genérico van a cambiar su ideología de democrático a autoritario y vice versa. Si el enfoque histórico de la IA esta habilitado, este ajusto se volverá 0%."
 RULE_OPTION_THIRTY_PERCENT: "30%"
 RULE_OPTION_THIRTY_PERCENT_AI_DESC: "Treinta porciento de los países con el árbol de enfoque genérico van a cambiar su ideología de democrático a autoritario y vice versa. Si el enfoque histórico de la IA esta habilitado, este ajusto se volverá 0%."
 RULE_OPTION_LOGIC_ORDER: "Orden"
 RULE_OPTION_LOGIC_ORDER_AI_DESC: "Una vez que el grupo democrático o autoritario sea elegido, la ideología específica que se haya escogido tenderá a coincidir con la ideología del partido gobernante actual."
 RULE_OPTION_LOGIC_DISORDER: "Desorden"
 RULE_OPTION_LOGIC_DISORDER_AI_DESC: "El partido actualmente en el poder no influirá en la toma de decisiones de la IA a favor de la misma ideología."
 RULE_OPTION_DEMOCRATIC_REFORM: "Reforma democrática"
 RULE_OPTION_DEMOCRATIC_REFORM_AI_DESC: "Continuar con la democracia, pero sacudir las normas políticas. Ideologías democráticas nuevas y anteriormente marginales pasarán a primer plano."
 RULE_OPTION_DEMOCRATIZATION: "Democratización"
 RULE_OPTION_DEMOCRATIZATION_AI_DESC: "Obligar a esta nación a adoptar valores democráticos y alejarse del autoritarismo y la autocracia. La democracia es innegociable."
 RULE_OPTION_BELLIGERENT_DEMOCRACY: "Democracia beligerante"
 RULE_OPTION_BELLIGERENT_DEMOCRACY_AI_DESC: "Este país se mantendrá democrático, pero buscara asegurar dominación militar dentro de su región."
 RULE_OPTION_EUROPEAN_UNION: "Unión Europea"
 RULE_OPTION_EUROPEAN_UNION_AI_DESC: "Este país ira bajo un camino para establecer la Unión Europea como un estado soberano."
 RULE_OPTION_EUROPEAN_COOPERATION: "Cooperación Europea"
 RULE_OPTION_EUROPEAN_COOPERATION_AI_DESC: "Mantén el statu quo de la Unión Europea. Refuerza la organización sin llegar a crear una federación."
 RULE_OPTION_FASCIST_AI_DESC: "Con totalitarismo y un férreo control de la economía, envía a esta nación por el desconocido camino del neofascismo."
 RULE_OPTION_NATIONALIST: "Nacionalista"
 RULE_OPTION_NATIONALIST_AI_DESC: "Inclina el camino político hacia el chovinismo y, muy a menudo, hacia el identitarismo. Nos convertirás a todos en patriotas fanáticos."
 RULE_OPTION_MONARCHIST: "Monarquista"
 RULE_OPTION_MONARCHIST_AI_DESC: "Quitarle el poder a la realeza fue un error. Las viejas formas fueron los correctos, y debemos volver al pasado para poder avanzar hacia el futuro."
 RULE_OPTION_COMMUNIST_AI_DESC: "No podemos confiar en ricos y los poderosos para que atiendan a las necesidades de las masas. Toma el control de la economía, apodérate los medios de producción e intenta allanar el camino de la revolución global."
 RULE_OPTION_CHINA_DREAM: "Sueño Chino"
 RULE_OPTION_CHINA_DREAM_AI_DESC: "China va a asegurar dominación militar en su región natal y subyugara a países cercanos en un intento de convertirse en una nueva superpotencia."
 RULE_OPTION_SOV_USSR: "URSS"
 RULE_OPTION_SOV_USSR_AI_DESC: "¡Debemos reestablecer a la gran Unión Soviética!"

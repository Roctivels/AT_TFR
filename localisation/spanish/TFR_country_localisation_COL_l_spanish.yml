 COL.4.t: "Colombia en caos"
 COL.4.d: "Colombia se ha sumido en una guerra civil tras un golpe militar poco después de las recientes elecciones que llevaron a Gustavo Petro a la presidencia. El país se encuentra ahora envuelto en una violenta lucha campal, con diversas facciones, incluyendo las Fuerzas Armadas Revolucionarias de Colombia (FARC), el Ejército de Liberación Nacional (ELN) y el Clan del Golfo, compitiendo por el control del país.\n\nEl golpe ha exacerbado las tensiones preexistentes y alimentado las rivalidades entre estos grupos armados, lo que ha provocado una dramática escalada de violencia en toda Colombia. La situación se ha complicado aún más por la Segunda Guerra Civil Americana y el conflicto centroamericano, que han dejado un vacío de poder en la región y limitado la capacidad de intervención internacional. Mientras el país se hunde en el caos, el Gobierno colombiano ha luchado por mantener el control, con el ejército dividido y los Gobiernos regionales enfrentando una creciente presión de las facciones en pugna. Los civiles atrapados en el fuego cruzado se han visto obligados a huir de sus hogares, lo que ha agravado la ya grave crisis humanitaria en la región.\n\nLa respuesta internacional a la guerra civil colombiana se ha visto obstaculizada por las crisis actuales en Estados Unidos y Centroamérica. Naciones Unidas ha convocado una reunión urgente para abordar el rápido deterioro de la situación y explorar posibles vías para la resolución del conflicto. Sin un fin a la vista para la violencia, el futuro de Colombia y de la región en general pende de un hilo."
 COL.4.a: "Esta es la Colombia de Joe Biden."
 COL.4.b: "Más vale que el precio de la merca no suba."

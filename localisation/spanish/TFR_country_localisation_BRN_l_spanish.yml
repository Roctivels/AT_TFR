 brown.1.t: "¿Infiltración del Frente Nacionalista de Mexico?"
 brown.1.d: "Altos rangos del EDLC sospechan que miembros del Frente Nacionalista de Mexico se han infiltrado entre nuestros batallones. Estimamos que sus números son muy bajos, pero su mera presencia ha preocupado a algunos comandantes y líderes comunitarios."
 brown.1.a: "Tenemos problemas más grandes."
 brown.2.t: "Bautismo de fuego"
 brown.2.d: "Nuestros combates contra la Guardia Nacional de Arizona han probado a nuestros soldados. Ya no somos una vergüenza y nos alzamos ante sus cadaveres. Todo sea dicho, tampoco podemos olvidar el coste... Muchos hermanos y hermanas han pagado el precio definitivo por esta victoria. Su sacrificio no será olvidado."
 brown.2.a: "Hemos aprendido enormemente."
 brown.3.t: "Los Guardias de Fronterizos de Reconocimiento  de Arizona se Movilizan"
 brown.3.d: "¡Milicias de ultraderecha se han juntado frente a los Guardias Fronterizos de Reconocimiento de Arizona en nuestra contra! Han tomado el control de Tucson y están progresando rapidamente. Acabemos con esta farsa de las \"fronteras estadounidenses\"."
 brown.3.a: "¡Desplegad las Fuerzas Armadas!"
 brown.4.t: "Voluntarios cruzan la frontera"
 brown.4.d: "¡Varios hermanos han cruzado la frontera y se han presentado voluntarios para ayudarnos en nuestra lucha! Muchos de ellos han traído sus propios rifles y están listos para ser desplegados junto a nuestra milicia. Nuestros numeros aumentan más cada día, tomaremos Phoenix antes de que termine el mes."
 brown.4.a: "¡Vamos Muchachos!"
 brown.5.t: "Victoria sobre Arizona"
 brown.5.d: ""
 brown.5.a: "Su sacrificio no será olvidado."
 brown.6.t: "Luces sobre Phoenix"
 brown.6.d: "La histeria masiva se ha apoderado de Phoenix mientras sus ciudadanos reportan extraños fenómenos visuales. Muchos han hecho referencia a un suceso similar ocurrido en mayo de 1997. Las luces, que formaron una forma de \"V\" sobre el cielo, volaron silenciosamente sobre la ciudad. Los expertos han referido al suceso como posibles globos meteorológicos, pero, ¿Quién volaría sobre una zona de guerra?"
 brown.6.a: "Turbio."
 brown.7.t: "Apagón en Phoenix"
 brown.7.d: "Tras el pánico masivo causado por los \"invasores extraterrestres\", la ciudad de Phoenix ha sufrido un apagón masivo. Manifestantes y saqueadores han salido a las calles para aprovechar la falta de autoridades."
 brown.7.a: "¡Debemos reentrar a la ciudad!"
 brown.8.t: "Debate en el Congreso del EDLC"
 brown.8.d: ""
 brown.8.a: "¡Cristo y Familia!"
 brown.8.b: "Latinx."
 brown.9.t: "Levantamiento de Patriotas de Arizona"
 brown.9.d: "A raiz de nuestra creciente autoridad, miembros de la destrozada Milicia de Reconocimiento Fronterizo de Arizona han vuelto a movilizarse junto a otros muchos ciudadanos de Arizona en un levantamiento estatal coordinado."
 brown.9.a: "¡Su \"sueño americano\" será aplastado!"
 brown.10.t: "Investigando la infiltración del Frente Nacionalista"
 brown.10.d: ""
 brown.10.a: "Mantenedlos vigilados."
 brown.10.b: "¿Que daño pueden hacer unos pocos nacionalistas?"
 brown.11.t: "El Frente Nacionalista participa en reuniones EDLC"
 brown.11.d: ""
 brown.11.a: "Interesante."
 brown.12.t: "Formada el Ala Armada del Frente Nacionalista"
 brown.12.d: ""
 brown.12.a: "Su servicio será útil."
 brown.12.b: "¡Detened inmediatamente a esos fascistas!"
 brown.13.t: "Mitín del Frente Nacionalista en Arizona"
 brown.13.d: ""
 brown.13.a: "Interesante."
 brown.13.b: "¡Suficiente! ¡Ilegalizad su partido!"
 brown.14.t: "El Frente Nacionalista Organiza Golpe de Estado"
 brown.14.d: ""
 brown.14.a: "¡Viva México!"
 brown.15.t: "Los fondos llegan a Yuma"
 brown.15.d: ""
 brown.15.a: "Agradecédselo a la comunidad."
 brown.16.t: "Fuerzas del Cártel cruzan la frontera"
 brown.16.d: ""
 brown.16.a: "Debe hacerse algo."
 brown.17.t: "Los progresistas causan disturbios en el debate del EDLC"
 brown.17.d: ""
 brown.17.a: "Deberían conocer su lugar."
 brown.18.t: "Los partidarios de la línea dura causan disturbios en el debate del EDLC"
 brown.18.d: ""
 brown.18.a: "Deberían conocer su lugar."
 brown.19.t: "la Policía rechaza cooperar"
 brown.19.d: ""
 brown.19.a: "¡Estaremos bien sin ellos!"
 brown.23.t: "Abordar la intolerancia en el EDLC"
 brown.23.d: ""
 brown.23.a: "No hay espacio para el odio."
 brown.24.t: "la República Chicana solicita vasallaje"
 brown.24.d: ""
 brown.24.a: "Son solo una carga."
 brown.24.b: "¡Unidos resistimos!"
 brown.25.t: "El EPLA otorga protección"
 brown.25.d: ""
 brown.25.a: "¡Excelente!"
 brown.26.t: "La amenaza más cercana"
 brown.26.d: ""
 brown.26.a: "¡Debemos defender a nuestro pueblo!"

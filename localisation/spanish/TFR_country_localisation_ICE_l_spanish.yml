 ICE_Ecological_Disaster_Category_desc: "\n\n\n\n\n£GFX_ICE_Ecological_Disaster_Banner\n\n\n\n\n\n\n\n\"Si no hemos tomado medidas drásticas para la próxima década, podríamos afrontar daños irreversibles al mundo natural y el colapso de nuestras sociedades\". - Sir David Attenborought\n\nCon el mundo cayendo más y más en la anarquía cada día, Islandia se va a encontrar a sí misma aislada de sus antiguos aliados. Aislada, es forzada a observar lo que la carnicería global hace al medio ambiente, asumiendo la carga que nadie va a escuchar porque dañaría su agenda política o legitimidad...\n\nEl fin del mundo."

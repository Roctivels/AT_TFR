 Iceland.1.t: "El fin de los tiempos"
 Iceland.1.d: ""
 Iceland.1.a: "Una moneda al aire."
 Iceland.2.t: "Islandia reclama Groenlandia para el Mandato Ecológico"
 Iceland.2.d: ""
 Iceland.2.a: "Claro."
 Iceland.3.t: "Islandia empodera a los Tecnócratas"
 Iceland.3.d: ""
 Iceland.3.a: "Hm."
 Iceland.4.t: "Colossal Biosciences abre oficinas en Reikiavik"
 Iceland.4.d: ""
 Iceland.4.a: "¡Bienvenidos queridos intelectuales!"
 Iceland.5.t: "Mamut traído de vuelta de la extinción"
 Iceland.5.d: "En un pionero logro que puede reescribir el campo de la genética y la conservación, un equipo de científicos en Islandia ha anunciado la exitosa resurrección del mamut lanudo, una especie que se extinguió hace 4.000 años.\n\nLiderado por un esfuerzo conjunto de genetistas, paleontólogos y conservacionistas, el proyecto tenía como objetivo utilizar técnicas de edición genética de vanguardia para recrear las especies extintas. El equipo extrajo fragmentos de ADN de restos de mamuts bien preservados hallados en el permafrost de Siberia. Estos fragmentos fueron secuenciados cuidadosamente y comparado con el ADN de su pariente vivo más cercano, los elefantes modernos.\n\nTras varios intentos infructuosos, el equipo logró su avance con una cría hembra sana llamada \"Lyra\", que nació en las instalaciones especializadas del equipo en Islandia. Lyra, la primera cría de mamut lanudo en caminar sobre la Tierra en milenios, pasará a la historia como un testamento de la innovación y determinación humana."
 Iceland.5.a: "¡Somos dioses!"
 Iceland.6.t: "Mamut traído de vuelta de la extinción"
 Iceland.6.d: "En un pionero logro que puede reescribir el campo de la genética y la conservación, un equipo de científicos en Islandia ha anunciado la exitosa resurrección del mamut lanudo, una especie que se extinguió hace 4.000 años.\n\nLiderado por un esfuerzo conjunto de genetistas, paleontólogos y conservacionistas, el proyecto tenía como objetivo utilizar técnicas de edición genética de vanguardia para recrear las especies extintas. El equipo extrajo fragmentos de ADN de restos de mamuts bien preservados hallados en el permafrost de Siberia. Estos fragmentos fueron secuenciados cuidadosamente y comparado con el ADN de su pariente vivo más cercano, los elefantes modernos.\n\nTras varios intentos infructuosos, el equipo logró su avance con una cría hembra sana llamada \"Lyra\", que nació en las instalaciones especializadas del equipo en Islandia. Lyra, la primera cría de mamut lanudo en caminar sobre la Tierra en milenios, pasará a la historia como un testamento de la innovación y determinación humana."
 Iceland.6.a: "¿Por qué hicieron eso?"
 Iceland.7.t: "Colossal Biosciences anuncia la desextinción, y también la re-extinción del Dodo"
 Iceland.7.d: "En un extraño giro de los acontecimientos, Colossal Biosciences ha anunciado que ellos han sido capaces de revivir al extinto Raphus Cucullatus, también conocido como el dodo. Sin embargo, meros momentos tras que saliese del huevo, cayó al suelo muriendo inmediatamente.\n\nEs tanto una victoria, como una derrota para los miembros del laboratorio de Colossal Biosciences en Reikiavik."
 Iceland.7.a: "Le llamaremos Ícaro."
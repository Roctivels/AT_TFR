 Australia.0.t: "¿Una oferta de paz?"
 Australia.0.d: "La guerra por Australia se puede describir como yendo todo menos bien para Australia. Las bajas seguían aumentando, se perdieron muchos bienes militares, y la duda se esparcía por la sociedad. Lo más problemático era la difusión de la duda y hasta la desesperanza dentro del gobierno Australiano. ¡¿Donde esta EE.UU y la OTAN cuando los necesitas?! Estos problemas tenían aterrorizados a todos dentro de la oficina del primer ministro, incluyéndolo. Lo ultimo que necesitaban era la división interna que redijera el esfuerzo Australiano de guerra desde mal a peor. Desgraciadamente para todos ellos, parecía que esta división ya había llegado...\nEl primer ministro estaba en su oficina como siempre, sorteando la cantidad masiva de correo que había llegado ese día. La mayoría eran cosas de rutina, pero una curiosa e inusual carta había llegado al primer ministro, y estaba escrita por la [AST_get_Penny_Wong_Job_name], Penny Wong. Abriendo la carta, el primer ministro esperaba más pedidos burocráticos del montón, pero leyendo el primer párrafo de la carta lleno al primer ministro con un sentimiento amargo. El párrafo, como todo el resto de la carta, era sobre la guerra, y hacia absolutamente claro lo que la Señora Wong quería que se haga en relación a su continuación. Decía: \n\nEs abundantemente claro para mi y el resto del gobierno en relación a la dirección de nuestro esfuerzo bélico contra los Chinos. A pesar de que intentamos lo mejor que podíamos con lo que teníamos a mano para asegurar una victoria rápida y efectiva, tenemos que reconocer la incomoda verdad a mano. No podemos ganar esta guerra. Nuestras fuerzas armadas han perdido mucho, el público esta en llamas sobre nuestros fracasos, y los Chinos retienen la habilidad para seguir atacando con constante eficacia. Es por esto que, lamentablemente, yo no le pido, si no le demando, que usted firme un tratado con los Chinos para terminar este terrible conflicto. Se que es una decisión difícil de tomar pero tenemos que pensar ene l futuro de esta nación que esta bajo amenaza por este continuo conflicto sangriento. Estoy segura que a través de la diplomacia y la paz podemos llegar a un acuerdo con los Chinos. ¿Por qué tenemos que continuar con esta postura agresiva contra China? Estoy segura que podemos encontrar terreno común como la nación civilizada que somos para poder convivir en conjunto en nuestro sector del planeta por el bien... \n\nEl primer ministro dejo de leer y bajo la carta, suspirando, y tomando el bolígrafo en la parte izquierda del escritorio para escribir un memorándum rápido para el Ministerio del Exterior. Una vacancia se iba a abrir en la posición de [AST_get_Penny_Wong_Job_name]."
 Australia.0.a: "¿Paz con los rojos? ¡No lo creo!"
 Australia.1.t: "¡Penny Wong Asesinada!"
 Australia.1.d: "Después de nuevamente y públicamente declarar su apoyo por una coexistencia pacifica con la República Popular China esta mañana, Penny Wong, la antigua [AST_get_Penny_Wong_Job_name], recibió un disparo a quemarropa con un arma casera. La policía, incapaz de encontrar al sospechoso o la arma inmediatamente después del tiroteo, encontró a Brett Contrail, un veterano de la guerra en Taiwán y miembro fundador del Frente Patriota Australiano, dentro de una tienda de café cercana con su laptop. Brett, siendo un miembro fundador de el grupo que se estiliza en base al Frente Patriota que nació al inicio de la guerra civil americana, era conocido por la policía local por previos cargos menores sobre drogas. Después de una corta y apresurada búsqueda de su disco duro, fue encontrado en posesión de \"múltiples archivos sobre la creación de armas caseras\", como también un manifestó en apoyo de Thomas Rousseau. \n\nAunque este caso parezca corto y fácil, muchos han expresado públicamente que la Policía Australiana ha arrestado a la persona equivocada, citando a la apresurada naturaleza de su investigación y su servicio a Australia en la reciente guerra. Con un jurado ya decidido de ciudadanos rurales, la nación espera su veredicto."
 Australia.1.a: "Encontraremos justicia."
 Australia.1.b: "Ella estaba trabajando con el enemigo..."
 Australia.1.c: "¡Ella ERA el enemigo!"

 Australia_gaw.2.t: "Australia toma control del Pacífico Sur"
 Australia_gaw.2.d: "Ante la intensificación del conflicto en el Pacífico, Camberra ha dado un paso adelante oficialmente para llenar el vacío regional.\nHoy, el Gobierno australiano anunció la formación de una nueva Zona Administrativa del Pacífico Sur, alegando \"necesidad logística, cooperación regional y defensa mutua\".\nLa medida afecta a varias naciones y territorios insulares, como Fiyi, Samoa, Micronesia y otros, muchos de los cuales han visto interrumpidas sus redes de seguridad y apoyo económico por la actual Guerra del Pacífico.\n\nLa Oficina del Primer Ministro enfatizó que la medida es temporal, \"basada en acuerdos mutuos\" y adoptada \"en un espíritu de solidaridad regional\".\nUn comunicado conjunto del Pacífico de los Gobiernos aliados aplaudió la medida, describiéndola como \"un gesto estabilizador en tiempos de incertidumbre\".\n\nSi bien algunos han expresado preocupación por la velocidad y la escala de la transición, la respuesta internacional ha sido en gran medida silenciosa. China ha emitido un breve comunicado de desaprobación y Francia ha solicitado una aclaración diplomática. Nueva Zelanda, sin embargo, ha expresado su pleno apoyo.\n\nQueda por ver si esto marca una nueva era de liderazgo regional australiano o una medida temporal en tiempos de guerra."
 Australia_gaw.2.a: "¡Un paso vital para el esfuerzo de guerra!"
 Australia_gaw.2.b: "¡Qué ocupación bárbara!"
 Australia_gaw.2.c: "Se quedaron en el fuego cruzado."
 AST_VIC_expand_backburning_efforts: "Expandir los §Rincendios controlados§!"
 AST_VIC_expand_backburning_efforts_desc: "Todo este desastre empezó por la falta de quemas controladas para apaciguar a los ecologistas. La incapacidad de la gente para entender que la naturaleza australiana ha sido moldeada durante siglos para que sea quemada por la población indígena es lo que causó que esta crisis se saliera de control. Es imperativo que hagamos quemas controladas cerca de cualquier gran incendio y que eliminemos cualquier cosa que las llamas puedan utilizar para alimentar su destructiva expansión."

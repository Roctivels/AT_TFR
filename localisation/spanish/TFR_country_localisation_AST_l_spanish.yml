 AST_VIC_import_fresh_water: "Importar §Cagua fresca§!"
 AST_patriot_coup_category: "Golpe de Estado patriota"
 AST_patriot_coup_category_desc: "Por décadas, el gobierno de Camberra ha reinado en este continente con mano de hierro. Abusando de la jerarquía de poder para mantener a la gente alineada a ellos, todo para hacer felices a sus amos de ultramar. Ellos han mostrado que están más que dispuestos en destruir todo lo que nos hace australianos en nombre de su \"progreso\", vendiendo a nuestro pueblo a sus amos, llenándose los bolsillos mientras nosotros sufrimos\n\n Ellos retuercen nuestra sociedad, atacan a nuestra herencia, censuran a nuestro Dios, y ahora buscan cimentar su dominio autoritario sobre nosotros, siendo el §RCOVID-19§! la herramienta para eso. No nos disolveremos como azucarillos.\n\n§RCuando la injusticia se convierte en ley, la resistencia se convierte en deber§!\n\n§YFuerza del golpe:§!§R0%§!\n\n§YLealtad del ejército:§!§R0%§!\n§YApoyo popular:§!§R0%§!\n§YAutoridad del gobierno:§!§R0%§!\n"
 AST_a_nation_in_crisis_tt: "\nDesbloquea las §Ydecisiones sobre la Devastación Nacional§! para combatir las §Csequías§! y los §Rincendios§! que están devastando a la nación."
 AST_the_national_resistance_tt: "Apoyar a §Ylos patriotas§!"
 AST_initiate_national_lockdowns_tt: "Apoyar al §YGobierno§!"
 AST_a_nation_in_crisis: "Una Nación en crisis"
 AST_a_nation_in_crisis_desc: "La nueva década no ha sido amable con Australia. Por décadas, incendios y sequías han consumido la nación. Los bosques han sido devastados por las llamas, las casas y la infraestructuras son arrasadas durante el casos mientras las granjas sufren para seguir adelante pues el agua en el corazón agrícola de Riviera sigue siendo escasa. Si la nación quiere salirse de este problema, se debe encontrar rápidamente una solución al problema."
 AST_combat_the_bushfires: "Combatir los incendios"
 AST_combat_the_bushfires_desc: "A través del sureste, el Servicio de Fuegos Rurales Australiano y otras unidades de respuesta a emergencias han luchado de manera valiente contra las llamas desde la primera chispa. Pero, se ha vuelto claro que nuestros valientes hombres y mujeres parados contra el infierno van a requerir mayor asistencia para parar estos fuegos y empezar a reconstruir nuestra nación. Si más asistencia es lo que quieren, más asistencia ellos tendrán."
 AST_emergency_fire_service_support: "Apoyar al Servicio de Emergencia de Bomberos"
 AST_emergency_fire_service_support_desc: "Estos incendios han probado los limites de las capacidades de nuestros servicios de emergencia para tratar con desastres de esta escala y naturaleza. Mientras estos valerosos hombres y mujeres han más que probado su capacidad para contener el avance, se hace obvio que van a necesitar más recursos alocados a ellos para traer el fin a esta crisis."
 AST_support_the_farmers: "Alivio de Sequía en Riverina"
 AST_support_the_farmers_desc: "No es ninguno secreto que las sequías han causado conflicto y caos para gran parte de la Australia rural, especialmente al oeste de la gran cordillera divisora en la región de Riveria. La seguridad de la comida para la nación esta comprometida, y nuestra gente podrían sufrir como consecuencia. Acciones económicas más decisivas es lo necesario para tratar con la inseguridad alimenticia y poder apoyar a nuestros granjeros a través de estos tiempos difíciles."
 AST_introduce_water_rationing: "Introducir el racionamiento del agua"
 AST_introduce_water_rationing_desc: "Como es de esperarse en época de sequía, la agua potable se ha vuelto más escasa y costosa. Ciertamente no es nada que los Australianos no hayan lidiando y superado anteriormente. Pero, como los incendios forestales continúan ardiendo la costa este, las llamas han sido solo una parte en el problema de conseguir agua potable. Para asegurarse que todos los ciudadanos en el sureste pueden continuar recibiendo agua bebestible directamente de la llave, medidas restrictivas tendrán que implementarse, al menos hasta que los efectos de la crisis hayan disminuido."
 AST_deploy_the_adf: "Desplegar la FDA"
 AST_deploy_the_adf_desc: "La Fuerza de Defensa Australiana han estado largamente ausentes de la crisis que envuelve Australia. A pesar de esto, el ejercito se mantiene listo para poder asistir a nuestros trabajadores de emergencia en combatir la crisis y asegurar la seguridad de nuestros ciudadanos. Todo lo que necesitan es la orden desde Camberra."
 AST_national_donation_campaign: "Campaña Nacional de Donación"
 AST_national_donation_campaign_desc: "Mucha gente ha sufrido dificultades durante los meses recientes. Se han perdido casas, negocios destrozados, y vidas arrebatadas. Estas perdidas no se puedes recuperar de la noche al día desafortunadamente, aunque hay maneras en las que podemos ayudar a un compatriota Australiano. Vamos a unirnos todos, como país y población, para apoyar los unos a los otros mientras dejamos atrás esta oscura porción de nuestra historia."
 AST_the_bushfire_recovery_plan: "El plan de recuperación tras los incendios"
 AST_the_bushfire_recovery_plan_desc: "Las repercusiones de la crisis han empezado a notarse y las consecuencias de ella empiezan a ser más aparentes. Mientras la nación y el mundo se vuelvan más conscientes de nuestra situación actual, es la responsabilidad del gobierno de crear y implementar un plan para reconstruir lo que fue destruido y restaurar la fe en este gobierno."
 AST_expand_emergency_water_reserve: "Expandir las reservas nacionales de agua"
 AST_expand_emergency_water_reserve_desc: "Si hay una cosa que los eventos recientes remarcaron al gobierno Australiano, es que nuestras reservas de agua son peligrosamente inadecuadas para lidiar con problemas nacionales. Para asegurar que no terminaremos en una situación vulnerable, un buen primer paso es expandir y mejorar nuestras reservas de agua lo más que se pueda."
 AST_assure_the_public: "Tranquilizar al público"
 AST_assure_the_public_desc: "Mientras la crisis se calma, muchos en el público se mantienen ansiosos en relación a lo que viene después. Para asegurar a la gente de este país de que hay un plan en movimiento para recuperar y prosperar cuando todo esto acabe, el primer ministro tendrá que dar un paso al frente y dirigirse al público directamente."
 AST_the_worst_has_yet_to_come: "Lo peor está por venir"
 AST_the_worst_has_yet_to_come_desc: "Las llamas se han calmado y las sequías han desaparecidos, pero el sentimiento de crisis sigue dentro de la población Australiana. A pesar de esto, la amenaza no viene en forma de fuego y llamo sino como un virus extranjero que ha entrado al país en medio del caos.\n\nLa pandemia del COVID-19 ha llegado a Australia."

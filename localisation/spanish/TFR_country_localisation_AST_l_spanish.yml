 AST_devastation_category_desc: "El sureste australiano está siendo devastado por §Csequías§! e §Rincendios§! que han devastado comunidades regionales y paralizado la economía. Debemos ralentizar y parar la devastación antes de que los daños se hagan irreversibles.\n\n§YNueva Gales del Sur§!\nDevastación por los §Rincendios§!: §Y[?NSW_bushfire_devastation]%§!\nDevastación por las §Csequías§!: §Y[?NSW_drought_devastation]%§!\nRatio de devastación: §R[?NSW_bushfire_devastation_rate]%§! §Y|§! §C[?NSW_drought_devastation_rate]%§!\n\n§YVictoria§!\nDevastación por los §Rincendios§!: §Y[?VIC_bushfire_devastation]%§!\nDevastación por las §Csequías§!: §Y[?VIC_drought_devastation]%§!\nRatio de devastación: §R[?VIC_bushfire_devastation_rate]%§! §Y|§! §C[?VIC_drought_devastation_rate]%§!\n"

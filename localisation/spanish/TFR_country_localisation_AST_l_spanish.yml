 AST_New_South_Wales: "§Y- - NUEVA GALES DEL SUR - -§!"
 AST_NSW_clear_the_princes_highway: "Despejar la §Rcarretera Prince§!"
 AST_NSW_clear_the_princes_highway_desc: "La autopista Princes conecta NGdS con Victoria y los asentamientos costeros entre ellos. Los incendios forestales han causado que la autopista esté repleta de árboles quemados y escombros, impactando en gran medida su transitabilidad y dificultando la respuesta efectiva ante los incendios de las ciudades. Los bomberos deben limpiar la autopista y hacer lo que haga falta para asegurar que esta vital conexión terrestre siga abierta."
 AST_NSW_reestablish_road_connections_to_rural_areas: "Reabrir rutas hacia §Rareas rurales§!"
 AST_NSW_reestablish_road_connections_to_rural_areas_desc: "Muchas areas rurales han quedado aisladas por los incendios, que destruyen infraestructuras y dejando a las comunidades incomunicadas. El cuerpo de bomberos debe trabajar para reabrir las rutas que van hacia esas comunidades y liberarlas de las llamas que les rodean,"
 AST_NSW_contain_hunter_region_fires: "Contener los §Rincendios en el Valle de Hunter§!"
 AST_NSW_contain_hunter_region_fires_desc: "El Valle de Hunter está justo encima de Sídney, la ciudad más poblada de Australia. Los incendios que están consumiendo a la región se encuentran actualmente fuera de control y amenazan a los suburbios occidentales. Debemos detener el incendio del Valle de Hunter antes de que reduzca a cenizas a la primera y más grande ciudad australiana."
 AST_NSW_expand_backburning_efforts: "Ampliar los esfuerzos de represión"
 AST_NSW_expand_backburning_efforts_desc: "Todo este desastre empezó por la falta de quemas controladas para apaciguar a los ecologistas. La incapacidad de la gente para entender que la naturaleza australiana ha sido moldeada durante siglos para que sea quemada por la población indígena es lo que causó que esta crisis se saliera de control. Es imperativo que hagamos quemas controladas cerca de cualquier gran incendio y que eliminemos cualquier cosa que las llamas puedan utilizar para alimentar su destructiva expansión."

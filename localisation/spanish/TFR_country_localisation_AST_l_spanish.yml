 AST_10t_Military_gov_name: "¿Declaración de apoyo para el gobierno militar?"
 AST_10d_Military_gov_name: "Seguida la fallida defense da Taiwán, muchos dentro del ejercito de Australia, asqueados por la conformidad al limite del Gobierno en la lucha contra los Comunistas Chinos, temporalmente suspendieron al Gobierno australiano. Esta acción ha causado ondas a través de la mancomunidad, especialmente después de que se descubriera que el líder de este golpe de estado militar fue expuesto de ser un posible gobernador general al fin del termino del honorable David Hurley como gobernador general. A pesar de esto, muchos dentro del público británico y australiano están a favor del golpe, considerándolo necesario para asegurar nuestros intereses en el área."
 Australia.10.c: "¡Necesitamos a unos pocos buenos hombres como Smith aqui!"
 Australia.10.e: "¡Australia debe restaurar su parlamento!"
 AST_10t_Australian_Exiles_name: "Los Gobiernos en el exilio"
 AST_10d_Australian_Exiles_name: "Siguiendo la violenta toma de ambos Australia y Nueva Zelanda por fascistas, muchos dentro de nuestras antiguas colonias han contactado de manera privada a nuestro Gobierno a través de canales seguros para organizar un Gobierno australiano rival, pro-monarquía, desde la ciudad de Perth, donde los fascistas tienen poco control. Con este movimiento, el gobierno de Australia también oficialmente anexa Nueva Zelanda seguido de una reunión con los pocos sobrevivientes del gobierno de Nueva Zelanda. \n\nSi nosotros queremos continuar influenciando de manera pasiva al pacifico, tenemos que restaurar el verdadero gobierno Australiano."

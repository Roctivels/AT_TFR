 AST_10t_Governor_General_name: "Un nuevo gobernador-general para Australia"
 AST_10d_Governor_General_name: "Con el fin del termino del honorable David Hurley como Gobernador General, vemos a Australia en su mejor momento, propugnando los ideales de la democracia occidental a través de las regiones tiránicas de Asia. \n\nCon esto dicho, hay guerra en el horizonte global, por lo que nuestra decisión de Gobernador General podría ayudar a mejorar nuestros lazos con nuestros aliados intercontinentales."

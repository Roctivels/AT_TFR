 RAJ.21.t: "Gran pedido de la India de equipo de infantería y suministros"
 RAJ.21.d: "India nos ha enviado una solicitud de material de infantería. Este país es un antiguo e importante aliado en Asia, con el que compartimos fuertes lazos económicos y políticos. Sin embargo, el acuerdo en cuestión va más allá de la cooperación bilateral, ya que afecta al equilibrio de poder en la región. India y China llevan mucho tiempo compitiendo por la influencia en Asia, y suministrar armas a India podría cambiar el equilibrio.\nEn consecuencia, nos enfrentamos a una difícil elección. Por un lado, el contrato reportará beneficios económicos y reforzará aún más nuestros lazos. Por otro, las consecuencias de interferir en el equilibrio de poder de la región podrían ser muy graves."
 RAJ.21.a: "Organizar suministros."
 RAJ.21.b: "Negarse educadamente."
 RAJ.22.t: "Gran pedido de la India de jets"
 RAJ.22.d: "Hemos recibido una solicitud de India para el suministro de reactores. India figura desde hace tiempo entre nuestros socios estratégicos en Asia, con los que mantenemos estrechas relaciones económicas y políticas. Sin embargo, un contrato militar de este calibre afectará inevitablemente a la situación en la región. China e India continúan su rivalidad por la influencia, y una transferencia de armas a India podría alterar el equilibrio de poder existente.\nAsí pues, nos enfrentamos a una difícil elección. El acuerdo reforzará nuestra cooperación económica con India, aportando beneficios financieros y ampliando nuestra posición en el mercado asiático. Sin embargo, los posibles cambios en el equilibrio de poder exigen una especial cautela a la hora de tomar una decisión."
 RAJ.22.a: "Organizar suministros."
 RAJ.22.b: "Negarse educadamente."
 RAJ.23.t: "Gran pedido de la India de vehículos blindados"
 RAJ.23.d: "El Gobierno indio ha expresado su interés en adquirir nuestros vehículos blindados. Mantenemos desde hace tiempo lazos económicos y políticos con India, pero un acuerdo de este tipo va más allá de una asociación normal porque afecta al equilibrio de poder en la región. India y China llevan muchos años compitiendo por la influencia en Asia, y cualquier cambio en el equilibrio de poder podría afectar a este frágil sistema.\nLa tarea que tenemos ante nosotros no es fácil. El contrato con India aportará beneficios económicos y reforzará nuestra interacción con uno de los principales actores mundiales. Sin embargo, cualquier interferencia en el actual equilibrio de poder puede acarrear ciertas consecuencias."
 RAJ.23.a: "Organizar suministros."
 RAJ.23.b: "Negarse educadamente."

 RAJ.24.d: ""
 RAJ.24.a: "¡Genial!"
 RAJ.25.t: "Rusia se niega a suministrarnos"
 RAJ.25.d: ""
 RAJ.25.a: "Triste."
 RAJ.26.t: "Caos en la India"
 RAJ.26.d: "Informes aterradores llegan poco a poco desde el frente de la Gran Guerra Asiática, documentando un colapso total del Gobierno indio. Estas afirmaciones están respaldadas por publicaciones en redes sociales, videos y declaraciones de varios políticos indios. China ha proclamado esto como una gran victoria para su pueblo y ha establecido un Gobierno militar a lo largo de la frontera.\n\nHasta el momento, los miembros restantes de la OTDP aún no han comentado oficialmente sobre la pérdida de un aliado importante. Sin embargo, algunos videos muestran a soldados identificados como miembros de la OTDP retirándose hacia el mar, lo que sugiere que no tienen intención de estabilizar la India. La mayor esperanza del país parece residir en Delhi, donde el Gobierno se ha mantenido firme, aunque parece que sus posibilidades de recuperar el control de la nación son escasas.\n\nDelhi, salvo por su frontera con Pakistán y las fuerzas chinas, está rodeada de entidades hostiles. En el este, el Ejército Guerrillero de Liberación Popular, maoísta, ha reunido una fuerza considerable que, según algunos, podría ayudarles a ganar la guerra civil. En el sur, el llamado \"Akhand Bharat\" intenta construir un etnoestado hindi. Además, los remanentes militares, los caudillos y las bandas de bandidos asolan el campo. En definitiva, parece que la India podría estar a décadas de distancia de volver a la normalidad."
 RAJ.26.a: "Un tigre no puede derrotar a un dragón."

 RAJ.5.d: "En las horripilantes consecuencias de la devastadora guerra nuclear y la explosión nuclear en Delhi, los restos del gobierno indio han intentado restablecer el orden en las zonas que rodean los escombros de Delhi. Sin embargo, con el liderazgo prácticamente desintegrado en las calles de lo que antiguamente era la capital, se ha generado un profundo vacío de poder."

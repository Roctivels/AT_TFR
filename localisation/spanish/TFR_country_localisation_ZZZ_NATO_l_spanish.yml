 NATO_hold_major_cities: "§YVICTORIA§!: Mantener SAN PETERSBURGO y ROSTOV DEL DON"
 NATO_hold_major_cities_desc: "Finalmente hemos agotado a Rusia y a nosotros mismos. Debemos mantener control sobre estas ciudades antes de que se firmen los acuerdos de paz. Esperemos una última ofensiva rusa para expulsarnos de estas ciudades."

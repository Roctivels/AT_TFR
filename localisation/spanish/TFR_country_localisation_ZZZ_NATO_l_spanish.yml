l_spanish:
 nato.4.t: "[FROM.GetNameDefCap] solicita ingreso a la OTAN"
 nato.4.desc: "Ante los cambios en las alianzas globales y el aumento de las tensiones regionales, [FROM.GetNameDef] ha solicitado formalmente su ingreso a la OTAN. Considera a la OTAN una defensa crucial contra las crecientes amenazas y una vía hacia una mayor estabilidad internacional. El Gobierno de [FROM.GetNameDef] ha expresado su confianza en que alinearse con los principios de la OTAN beneficiará tanto a su propia seguridad como a la de la alianza.\n\nSin embargo, la decisión de ampliar la OTAN no está exenta de controversia. Algunos miembros expresan su preocupación por el posible aumento de las tensiones con las potencias vecinas, mientras que otros creen que esta incorporación podría reforzar la influencia de la OTAN en regiones estratégicas clave."
 nato.4.a: "¡Bienvenidos a la OTAN!"
 nato.4.b: "Nieguen la aplicación; debemos ser cautos."
 nato.5.t: "Membresía a la OTAN rechazada"
 nato.5.desc: "Tras meses de esfuerzos diplomáticos y cuidadosas negociaciones, hemos recibido la noticia de que nuestra solicitud de adhesión a la OTAN ha sido rechazada. Para nuestros líderes y ciudadanos, esta decisión es una amarga decepción, ya que esperábamos asegurar una alianza poderosa para reforzar nuestra seguridad nacional y nuestra posición internacional.\n\nAl evaluar nuestros próximos pasos, el camino a seguir es incierto. Algunos argumentan que deberíamos centrarnos en fortalecer nuestra independencia y construir una defensa robusta que dependa únicamente de nuestros propios recursos. Otros sugieren contactar con posibles nuevos aliados, mientras que otros creen que la reforma y la paciencia podrían darnos una segunda oportunidad para unirnos a la OTAN. Sea cual sea nuestro proceder, nuestra resiliencia y determinación moldearán el futuro de nuestra nación."
 nato.5.a: "Entonces buscaremos otros aliados."
 nato.7.t: "KSK se comporta de forma errática"
 nato.7.d: ""
 nato.7.a: "¡Que estos idiotas vuelvan a la fila!"
 nato.8.t: "La Bundeswehr asedia edificios gubernamentales"
 nato.8.d: ""
 nato.8.a: "¡¿Qué está pasando?!"
 nato.12.t: "Inminente escasez de gas en invierno"
 nato.12.d: ""
 nato.12.a: "El invierno se aproxima..."
 nato.13.t: "La escasez invernal de gas azota nuestro país"
 nato.13.d: ""
 nato.13.a: "¡Podemos hacer frente a la tormenta!"
 nato.14.t: "Escaramuzas en la frontera polaco-bielorrusa"
 nato.14.d: "Informes de disparos y pequeñas escaramuzas llegaban poco a poco desde la frontera a primera hora de la mañana. Se hicieron frenéticas llamadas de refuerzos por radio hasta que estas \"escaramuzas\" se convirtieron en batallas a gran escala. Hay poco tiempo para investigar quién disparó primero, ya que las fuerzas polacas han comenzado a cruzar a nuestro territorio en un contraataque desorganizado para sorprender a nuestras fuerzas mientras están desorientadas.\n\nRepresentantes de la OTAN se reunieron en cuanto se recibieron los informes de combate y votaron a favor de invocar el artículo 5."
 nato.14.a: "¡Buscan la fuerza en el número para compensar su falta de valentía!"
 nato.15.t: "Fuerzas de la OTAN se concentran en Polonia y el Báltico"
 nato.15.d: "Con nuestra operación en Ucrania en pleno apogeo, las fuerzas de la OTAN se han puesto en alerta máxima y han comenzado a trasladar miles de tropas a Polonia y los países bálticos. Hemos condenado estas acciones como provocación y prueba de las intenciones occidentales de una guerra de fuerza entre nuestras alianzas.\n\nEl ruido de las orugas de los tanques y el rugido de los motores se escuchan desde ambos bandos. En posible respuesta a una invasión, el distrito militar occidental ha movilizado fuerzas a la frontera para mantener la vigilancia."
 nato.15.a: "¡Una provocación imprudente!"
 nato.16.t: "Creación del nuevo Eje"
 nato.16.d: ""
 nato.16.a: "¡Hemos de proteger a Europa de los bolcheviques nuevamente!"
 nato.17.t: "Entrada al Eje"
 nato.17.d: ""
 nato.17.a: "Venceremos."
 nato.18.t: "Disolución de la OTAN"
 nato.18.d: "La victoria rusa en Europa sacudió a toda Europa, incluidos algunos de sus principios e instituciones fundacionales.\n\nLa OTAN ha demostrado su ineficacia como alianza defensiva, lo que ha provocado su colapso de facto, ya que muchos Estados miembros estaban ahora ocupados por Rusia, mientras que otros se desentendían rápidamente de sus obligaciones.\n\nEl futuro es incierto: parece que nuestro país tendrá que buscar ahora la manera de protegerse de forma independiente."
 nato.18.a: "¡Esta reliquia del pasado es responsable!"
 nato.22.t: "Escaramuzas en la frontera polaco-bielorrusa"
 nato.22.d: "Informes de disparos y pequeñas escaramuzas se filtraban desde la frontera a primera hora de la mañana. Se hicieron frenéticas llamadas de refuerzos por radio hasta que estas \"escaramuzas\" se convirtieron en batallas a gran escala. Hay poco tiempo para investigar quién disparó primero, ya que las fuerzas rusas han comenzado a cruzar a nuestro territorio en un contraataque desorganizado para sorprender a nuestras fuerzas mientras están desorientadas.\n\nRepresentantes de la OTAN se reunieron en cuanto se recibieron los informes de combate y votaron a favor de invocar el artículo 5."
 nato.22.a: "¡Movilicen nuestras fuerzas!"
 nato.23.t: "Concentración rusa en la frontera con Polonia"
 nato.23.d: "Recientemente, hemos recibido informes extremadamente inquietantes sobre la concentración de tropas rusas en la frontera polaca, en lo que solía ser Bielorrusia. Deberíamos haber visto las señales de que este día llegaría; desde la toma del Cáucaso hasta la anexión de Bielorrusia, todas las señales estaban ahí. Pero ahora, parece que es demasiado tarde, el oso ruso llama a nuestra puerta y está listo para derribar la puerta para Ucrania. La amenaza oriental acecha, preparándose para reabrir las cicatrices dejadas por la Segunda Guerra Mundial, buscando una vez más empapar de sangre el continente europeo.\n\nPero la esperanza no está perdida. Mientras ellos se preparan, nosotros también; estamos listos para enfrentar toda la ferocidad del ataque ruso y lucharemos hasta el último hombre si es necesario. Si bien no sabemos qué sucederá después, sabemos con certeza que no nos dejaremos vencer por los bárbaros del Este."
 nato.23.a: "Nada bueno saldrá de esto..."
 nato.24.t: "Alemania propone ofensiva"
 nato.24.d: ""
 nato.24.a: "¡Estamos listos!"
 nato.24.b: "No estamos preparados para accionar ofensivo."
 nato.25.t1: "Alto Mando de la OTAN aprueba ofensiva"
 nato.25.t2: "Alto Mando de la OTAN niega ofensiva"
 nato.25.d1: ""
 nato.25.d2: ""
 nato.25.a: "¡Ahora con todo!"
 nato.25.b: "Puede que este no sea el momento..."
 nato.26.t: "El futuro de la OTAN"
 nato.26.d: "A medida que la alianza atlántica se reorienta tras el colapso de Estados Unidos en una guerra civil, una nueva pregunta domina Bruselas: ¿quién lidera ahora Occidente?\n\nLondres, invocando siglos de tradición marítima y una \"responsabilidad especial con la anglosfera\", se ha presentado como el heredero natural del liderazgo atlántico. Los funcionarios británicos argumentan que solo ellos pueden mantener unido el antiguo espíritu transatlántico, incluso en ausencia de Estados Unidos.\n\nBerlín, más seguro que nunca, habla de un nuevo centro de gravedad europeo. Respaldados por el dominio económico y una Bundeswehr resurgente, los alemanes reclaman un liderazgo tecnocrático y consensuado: \"eficiente, responsable y verdaderamente europeo\".\n\nY luego está París, con su grandeza, su force de frappé y su doctrina de autonomía estratégica. Francia propone una \"OTAN reinventada\", que ya no esté subordinada a ninguna potencia hegemónica, sino guiada por una voluntad continental y protegida por una fuerza disuasoria soberana.\n\nLos observadores observan un ambiente tenso pero civilizado en la cumbre, donde todas las partes invocan los principios fundadores de la alianza. Los miembros de Europa Oriental se mantienen cautelosos, presionando discretamente para obtener garantías más sólidas, independientemente del resultado.\nQueda por ver si esto dará lugar a una estructura de mando unificada o a una fractura de la OTAN en bloques rivales."
 nato.26.a: "Una Alianza a la deriva."
 nato.27.t: "Comienzan las elecciones de la OTAN"
 nato.27.d: "Tras el colapso de EE.UU. tras el estallido de la guerra civil, la OTAN se queda sin su líder tradicional. La alianza militar más poderosa del mundo se encuentra ahora en una encrucijada; Europa debe decidir quién asumirá el liderazgo en estos tiempos de incertidumbre. La decisión ha recaído en tres potencias clave: Alemania, Francia y el Reino Unido. Cada una de estas cree poder guiar a la OTAN en este período de crisis, pero el camino a seguir está plagado de desafíos. Quien surja como líder deberá asegurar el apoyo de las otras dos y demostrar su capacidad para guiar a la alianza hacia una nueva era.\n\nLas elecciones tendrán lugar dentro de 200 días. Durante este período, las maniobras diplomáticas y políticas serán cruciales. Cada país buscará afirmar su influencia, mediante negociaciones cuidadosas y alianzas estratégicas que determinen quién tomará el mando. Alemania, con su poderío económico y su creciente fuerza militar, busca consolidar su poder en Europa Central. Francia, con su sólida fuerza militar y su política exterior independiente, espera posicionarse como defensora de la autonomía europea. El Reino Unido, que aún ejerce una importante influencia global a pesar de sus recientes problemas, aspira a mantener su papel como potencia mundial.\n\nHay muchísimo en juego. La supervivencia de la OTAN, y la seguridad del mundo occidental, dependen del resultado de estas elecciones. Solo una nación puede liderar la OTAN hacia el futuro."
 nato.27.a: "Que gane la mejor nación."
 nato.28.t: "[Root.GetNameDefCap] gana el liderazgo"
 nato.28.d: "¡La victoria es nuestra! Tras meses de intensa diplomacia y negociaciones estratégicas, [ROOT.GetNameDef] ha asegurado el liderazgo de la OTAN. Con Estados Unidos sumido en el caos tras la Segunda Guerra Civil Americana, la alianza quedó sin líder, vulnerable a divisiones internas y amenazas externas. Ahora, bajo nuestro mando, la OTAN no solo sobrevivirá, sino que prosperará. Este es el momento de que [ROOT.GetNameDef] pase a la historia como el nuevo guardián de la seguridad occidental.\n\nLos otros lucharon con ahínco por este puesto, pero no pudieron con nuestra influencia. Ahora, el futuro de la OTAN está en nuestras manos. Guiaremos la alianza en estos tiempos turbulentos, garantizando que nuestra visión guíe a la OTAN hacia una era más fuerte y unificada. Con nuestra destreza militar, fuerza diplomática y visión estratégica, el mundo occidental se unirá bajo nuestro liderazgo.\n\nLa transformación de la OTAN comienza ahora, y [ROOT.GetNameDef] será el motor de su renovada fuerza."
 nato.28.a: "¡Llevaremos a la OTAN hacia una era de fuerza y unidad!"
 nato.29.t: "OTAN solicita que tomemos políticas ofensivas"
 nato.29.d: ""
 nato.29.a: "Como mi señor quiere, marchamos a la batalla"
 nato.32.t: "Destino de Kaliningrado"
 nato.32.d: ""
 nato.32.a: "¡Un nuevo capítulo en la historia europea!"
 nato.33.t1: "Alemania se asegura el fideicomiso de Kaliningrado"
 nato.33.d1: "Aunque la Guerra Europea terminó hace rato, el futuro de Kaliningrado ha permanecido en juego. El enclave ruso era ahora la pieza clave en el tablero de ajedrez de la Europa de la posguerra. El fideicomiso de Kaliningrado, formada apresuradamente bajo presión internacional, debía garantizar un proceso de administración justo y transparente en la región.\n\nEsta ficción no tardó en desmoronarse. Cuando la Comisión terminó de deliberar, no hubo sorpresa. La mayoría de los votos cedió el territorio a Alemania, justificado en un marco de estabilidad, gobernanza y reconstrucción posbélica. Berlín había jugado bien su carta.\n\nEmpresas alemanas aportaron ayuda humanitaria, consultores de infraestructura y asesores de seguridad antes de que se secara la tinta del alto el fuego. Ahora, el águila volvía a volar sobre Königsberg. La Bundeswehr se movía con rapidez, eficiente como siempre, sin sangre, solo tropas y fronteras. Algunos lo llamaban nuevo imperialismo. Otros, justicia.\n\nPero en las calles, bajo las fachadas de piedra reconstruidas y las torres de oficinas de cristal, estaba la Patria. La antigua tierra, la puerta oriental de Alemania, cuna de filósofos y soldados. Prusia Oriental no había sido olvidada y había regresado a casa. Esta vez, bajo la bandera de una república federal, no de un káiser ni de un Führer."
 nato.33.a: "El puerto del Báltico, alemán nuevamente."
 nato.33.t2: "Polonia se asegura el fideicomiso de Kaliningrado"
 nato.33.d2: "Aunque la Guerra Europea terminó hace rato, el futuro de Kaliningrado ha permanecido en juego. El enclave ruso era ahora la pieza clave en el tablero de ajedrez de la Europa de la posguerra. El fideicomiso de Kaliningrado, formada apresuradamente bajo presión internacional, debía garantizar un proceso de administración justo y transparente en la región.\n\nEsta ficción no tardó en desmoronarse. Cuando la Comisión terminó de deliberar, desde Gdansk hasta Lublin, sonaron las campanas. Warmia, los dulces campos de los halcones de las llanuras, perdida una vez ante el imperio, dos veces ante la guerra; volvía a ser polaca. A través de la campiña prutense, las voces resonaban con canciones tan antiguas como las tierras fronterizas. La humillación había terminado, el rey Casimiro sonrió desde las nubes, y el rojo y el blanco ondeaban en lo alto sobre Elblag y más allá.\n\nNo era una afirmación exagerada, ni una provocación. Pero nadie más habría protegido lo que una vez habían perdido. Nunca más. Varsovia lo sabía muy bien; el pueblo de Polonia grabó esa promesa. Cuando entró el ejército polaco, el obispo bendijo la nueva oficina provincial y se derramó una copa de vino por los verdes campos de la querida Warmia."
 nato.33.b: "A orillas del Hel, volaba la bicolor."
 nato.33.t3: "Lituania se asegura el fideicomiso de Kaliningrado"
 nato.33.d3: "Aunque la Guerra Europea terminó hace rato, el futuro de Kaliningrado ha permanecido en juego. El enclave ruso era ahora la pieza clave en el tablero de ajedrez de la Europa de la posguerra. El fideicomiso de Kaliningrado, formada apresuradamente bajo presión internacional, debía garantizar un proceso de administración justo y transparente en la región.\n\nEsta ficción no tardó en desmoronarse. Cuando la Comisión terminó de deliberar, su resultado sentó un precedente. Y para asombro de Occidente, la decisión no recayó en Berlín ni en Varsovia, sino que el mundo alzó la vista para ver el ámbar, el verde y el rojo alzarse sobre la nueva ciudad de Karaliaucius. Pocos podrían haberlo imaginado, pero Vilna había asegurado la región, no con tanques, sino con la dulce promesa de paz y neutralidad. Humanitarismo y verdad, como mínimo.\n\nY una verdad se alzaba por encima de todo: que antes de los alemanes y los eslavos, antes de las particiones y las guerras, la tierra había pertenecido a los bálticos. Los antiguos prutenses habían cultivado estos campos y dado nombre a estos ríos, mucho antes de que la espada y las escrituras los borraran. Ahora, siglos después, la tierra vio su origen."
 nato.33.c: "En la nueva era, la tierra respiraba la antigua lengua."
 nato.33.t4: "La ONU retiene el fideicomiso de Kaliningrado"
 nato.33.d4: "Aunque la Guerra Europea terminó hace rato, el futuro de Kaliningrado ha permanecido en juego. El enclave ruso era ahora la pieza clave en el tablero de ajedrez de la Europa de la posguerra. El fideicomiso de Kaliningrado, formada apresuradamente bajo presión internacional, debía garantizar un proceso de administración justo y transparente en la región.\n\nEsta ficción no tardó en... ¿continuar? Cuando la Comisión terminó de deliberar, ni Varsovia, ni Berlín, ni Vilna lograron asegurar la región. El fideicomiso de Kaliningrado sería transferido a... el fideicomiso de Kaliningrado. Debido a la burocracia europea, las naciones no dormían ni se mordían los dientes. El memorando del secretario general no se aplicó; las Naciones Unidas seguirían al mando.\n\nSin grandes desfiles, sin cambios de fronteras, sin soldados besando a bebés. El statu quo se mantuvo, y un administrador de la ONU llegó en avión. Encargó máquinas de café y distribuyó panfletos multilingües sobre \"Futuros Compartidos\". Los lugareños se encogieron de hombros. Los diplomáticos suspiraron. En algún lugar, un tanque se oxidaba silenciosamente en un campo."
 nato.33.d: "En un limbo, pero mejor que en la cuerda floja."
 nato.34.t: "Membresía a la OTAN"
 nato.34.desc: "En un acto histórico, [FROM.GetNameDef] se ha unido oficialmente a la OTAN, lo que marca un cambio significativo en el equilibrio de poder. Esta decisión se produce tras meses de negociaciones diplomáticas, durante las cuales [FROM.GetNameDef] enfatizó su compromiso con los principios de defensa colectiva y seguridad compartida de la OTAN. La incorporación de [FROM.GetNameDef] a la alianza amplía el alcance de la OTAN y refuerza su presencia en una región crucial.\n\nSi bien los líderes de la OTAN celebran este fortalecimiento, las reacciones en todo el mundo son diversas. Algunos países vecinos han expresado su preocupación, condenando la expansión de la OTAN como una influencia desestabilizadora. La tensión ya está comenzando a aumentar, con el aumento de los ejercicios militares y las patrullas fronterizas como respuesta. Queda por ver si esta decisión conducirá a una mayor seguridad o a una mayor división."
 nato.34.a: "Un eslabón más en la cadena."

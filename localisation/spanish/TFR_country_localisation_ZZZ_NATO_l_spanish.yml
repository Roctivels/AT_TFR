 NATO_war_category: "La Segunda Guerra Europea"
 NATO_war_category_desc: ""
 NATO_leadership_category: "Liderazgo de la OTAN"
 NATO_leadership_category_desc: "Con Estados Unidos sumido en un caos absoluto, parece que nos hemos visto abandonados a nuestra suerte. Pero no se preocupen, ¡nuestra alianza seguirá creciendo y prosperando en esta nueva era de incertidumbre!"
 NATO_kaliningrad_commission_category: "El fideicomiso de Kaliningrado"
 NATO_kaliningrad_commission_category_desc: "§4Para tener éxito, necesitamos tener más influencia que cualquier otro contendiente.§!\n\n                                        §YActual influencia§!:\n\n\n\nCon nuestra victoria en la guerra contra los rusos, se nos presenta la oportunidad histórica de resolver la cuestión de Kaliningrado de una vez por todas. La actual región de Kaliningrado ha albergado a alemanes, lituanos y polacos desde la Edad Media, aunque quedó bajo control prusiano tras las Particiones de Polonia. Tras la Segunda Guerra Mundial, la URSS incorporó la zona de Königsberg, en Prusia Oriental, como enclave ruso, expulsando a unos 100.000 alemanes del óblast. Desde la caída de la URSS, el óblast de Kaliningrado se ha mantenido como un bastión nuclear fuertemente fortificado a nuestras puertas.\n\nPero ahora, con Rusia expulsada lejos de Kaliningrado, la ONU ha establecido un fideicomiso sobre el antiguo óblast. El destino de la región pronto lo decidirá la Comisión de Kaliningrado, que inevitablemente determinará si concede la soberanía a Alemania, Polonia o Lituania. Debemos aprovechar todos los recursos a nuestra disposición para garantizar que, cuando se tome la decisión, la cuestión de Kaliningrado nos sea favorable."

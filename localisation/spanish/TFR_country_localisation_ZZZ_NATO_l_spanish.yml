 GER_german_actions_in_nato_war_desc: "Destacaremos la valentía de nuestros soldados alemanes al liberar Prusia Oriental de la autocracia rusa. Esto reforzará nuestra reivindicación histórica y generará apoyo público, tanto nacional como internacional."
 GER_denounce_un_history_desc: "La gestión de la ONU de previos fideicomisos y administraciones provisionales ha sido poco imparcial. Revelar estas deficiencias pondrá en duda la legitimidad de la Comisión y garantizará que Kaliningrado no quede en el limbo."
 GER_denounce_polish_nationalism_desc: "La reivindicación de Polonia sobre Kaliningrado se basa en la historia medieval, mucho antes del trazado de nuestras fronteras actuales. Revivir justificaciones tan anticuadas solo desestabilizará a Europa Oriental. Debemos denunciar su argumento como anacrónico e infundado."
 GER_denounce_lithuanian_nationalism_desc: "Lituania es un Estado pequeño con recursos muy limitados, pero aspira a gobernar una región clave que supera con creces su capacidad. El futuro de Kaliningrado no puede confiarse a un país mal preparado para esta responsabilidad."
 GER_prop_up_kaliningrad_industry_desc: "Iniciaremos una inversión multimillonaria en la industria y la infraestructura de Kaliningrado. Invertir en la industria local garantizará que la futura Königsberg dependa de la Vaterland."
 GER_denounce_german_history_desc: "La reivindicación alemana sobre Kaliningrado se basa en un revanchismo obsoleto. El fideicomiso será solo la primera víctima de las crecientes ambiciones de una Alemania revanchista. Si Alemania toma Kaliningrado, Polonia y Lituania serán las siguientes."
 GER_set_up_humanitarian_efforts_desc: "Al brindar ayuda a la gente del fideicomiso, generaremos buena voluntad entre la población e influiremos en la opinión de la Comisión a nuestro favor."
 GER_annex_kaliningrad_desc: "Concluida la transición, por fin ha llegado el momento de la integración plena. Königsberg dejará de ser un territorio en fideicomiso. A partir de ahora, será parte inseparable de Alemania."
 GER_establish_relief_programs_desc: "Nuestros esfuerzos diplomáticos han asegurado el control permanente de Königsberg, pero la transición será difícil; debemos actuar con rapidez para brindar ayuda. Mediante el establecimiento de programas de socorro, estabilizaremos la región y ganaremos el apoyo de la población local."
 GER_establish_administrations_desc: "Con Königsberg bajo nuestro legítimo control, debemos establecer nuestras estructuras de gobierno nacional únicas, la aplicación de la ley y los servicios esenciales en el territorio para garantizar una administración sin problemas."
 GER_integrate_kaliningrad_industry_desc: "La economía de Königsberg debe estar plenamente alineada con la infraestructura nacional. Mediante la integración de las industrias locales, garantizaremos la estabilidad a largo plazo."
 NATO_commission_timer_desc: "Tras un año de maniobras políticas, presión diplomática e inversiones masivas, la Comisión finalmente emitirá su veredicto final. El destino de Kaliningrado pronto se decidirá. ¿Han sido suficientes nuestros esfuerzos?"
 NATO_commission_over: "El fideicomiso de Kaliningrado se ha disuelto."
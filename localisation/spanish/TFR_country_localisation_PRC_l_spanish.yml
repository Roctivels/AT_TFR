 PRC_flying_fortresses: "Fortaleza voladora"
 PRC_flying_fortresses_desc: "Como elemento central de la disuasión estratégica, este programa compromete nuestros recursos más avanzados para desarrollar y desplegar rápidamente el bombardero estratégico furtivo de próxima generación, simbolizando la cúspide de nuestro poder estratégico y la máxima expresión de nuestra voluntad nacional. Esta formidable plataforma -la espada larga de la nación- tendrá un alcance intercontinental y transportará cargas útiles tanto convencionales como nucleares, ofreciendo una capacidad de ataque inexpugnable. Al integrar tecnologías innovadoras de baja observabilidad, estas aeronaves casi invisibles permitirán la proyección de poder global y asegurarán que nuestra capacidad de retribución decisiva -la salvaguarda definitiva de nuestra soberanía- pueda llegar a través de continentes para disuadir a cualquier adversario."
 PRC_strikes_on_any_place_of_the_earth: "Ataques en cualquier rincón"
 PRC_strikes_on_any_place_of_the_earth_desc: "Nuestro objetivo es claro: forjar una cadena de ataque intercontinental inquebrantable que garantice la seguridad de nuestros intereses globales en rápido crecimiento. Requerimos fuerzas disuasorias capaces de abarcar todo el globo, sin dejar ningún lugar fuera de alcance, una doctrina que llamamos \"ataques en cualquier lugar de la Tierra\". Lograremos esto integrando sin problemas nuestras fuerzas de misiles estratégicos, aviación de largo alcance y plataformas navales resilientes en un sistema unificado. Esta integración proporciona una cobertura mundial continua, asegurando que en cualquier momento nuestra voluntad nacional pueda proyectarse con una fuerza precisa y abrumadora, manteniendo firmemente nuestro estatus como gran potencia."
 PRC_fresh_personnel_in_the_strategic_command: "Personal nuevo en el Mando Estratégico"
 PRC_fresh_personnel_in_the_strategic_command_desc: "El futuro campo de batalla es cada vez más cognitivo, y la guerra de información exige una nueva generación de comandantes. El Mando Estratégico debe nutrirse de talento fresco: líderes capaces de un pensamiento en red y descentralizado. Lanzaremos un riguroso programa de vía rápida para identificar y ascender rápidamente a oficiales con fluidez técnica, profunda experiencia en operaciones conjuntas y la agilidad intelectual requerida para la guerra centrada en la red. Este cambio sistémico mantendrá nuestro ritmo de mando alineado con la velocidad de los datos, asegurando un liderazgo decisivo en momentos críticos."
 PRC_dawn_of_the_chinese_tactical_thought: "Nacer del pensamiento táctico chino"
 PRC_dawn_of_the_chinese_tactical_thought_desc: "Nos encontramos en los albores de una tradición táctica claramente china, un momento crucial para destilar décadas de modernización militar en una doctrina nacional coherente. Este esfuerzo requiere un estudio riguroso y la síntesis de nuestra sabiduría militar clásica con conceptos de vanguardia de la era de la información. Nuestro objetivo es un marco único para guiar futuras operaciones conjuntas, asegurando que mantengamos la iniciativa estratégica en nuevas formas de guerra. Más que un reglamento, será el núcleo filosófico de nuestro ejército, adaptado a nuestras condiciones nacionales y un baluarte duradero para nuestra soberanía."
 PRC_non_stop_heavy_air_support: "Apoyo aéreo fuerte incesante"
 PRC_non_stop_heavy_air_support_desc: "La victoria se basa en la confianza inquebrantable de nuestras fuerzas terrestres. Para asegurarla, estableceremos una presencia permanente y poderosa en los cielos sobre nuestras tropas. Este programa destina recursos sustanciales a plataformas aéreas de alta resistencia y gran potencia de fuego, específicamente drones armados pesados avanzados y helicópteros artillados. Operando día y noche, estos sistemas proporcionarán una potencia de fuego aire-tierra persistente y abrumadora. Al colocar este escudo protector sobre nuestras fuerzas, garantizamos la seguridad de las tropas en tierra y neutralizamos decisivamente las formaciones enemigas antes de que puedan amenazar nuestro avance."
 PRC_expand_the_fleet_of_nuclear_submarines: "Expandir la flota submarina nuclear"
 PRC_expand_the_fleet_of_nuclear_submarines_desc: "El mar sigue siendo el último bastión del poder estratégico. Esta iniciativa exige una gran expansión de nuestra flota de submarinos nucleares, incluyendo tanto las clases de misiles balísticos (SSBN) como las de ataque (SSN). Una fuerza submarina oculta y resistente es esencial para una disuasión creíble. Nuestra prioridad es una capacidad de segundo ataque asegurada y superviviente, capaz de resistir y asestar una represalia decisiva si nuestra soberanía se ve amenazada. Al fortalecer este \"escudo silencioso\", la Armada del EPL extiende nuestro perímetro de seguridad a las profundidades oceánicas, disuadiendo a cualquier adversario de contemplar una agresión contra nuestra nación."
 PRC_creation_of_full_scale_missile_cruisers: "Construir cruceros a gran escala"
 PRC_creation_of_full_scale_missile_cruisers_desc: "Para proteger nuestros amplios intereses marítimos, desarrollaremos cruceros de misiles a gran escala para anclar futuros grupos de tarea navales. Cada barco integrará radares avanzados de fase, enlaces de datos sin interrupciones y armas de ataque de largo alcance en un sistema de combate unificado, sirviendo como un robusto escudo de defensa aérea y de misiles y una potente plataforma de ataque terrestre. Nuestro objetivo es la integración del sistema: ver más lejos, atacar más lejos y proteger de forma más fiable. Estas capacidades integrales proyectarán nuestra bandera y poder a través de mares distantes."
 PRC_the_exterminating_swarm: "Enjambre exterminante"
 PRC_the_exterminating_swarm_desc: "Abrazamos el futuro de la guerra dominando la inteligencia autónoma de enjambres, un concepto revolucionario a punto de trastocar las reglas tradicionales del campo de batalla. Este programa exige el despliegue rápido de un sistema de combate de Enjambre Exterminador. Utilizando coordinación avanzada de IA y superioridad numérica, plataformas aéreas de bajo coste y alta densidad operarán como una inteligencia colectiva unificada y letal. Diseñadas para lanzar ataques de saturación abrumadores, cegarán y desmantelarán las complejas defensas aéreas enemigas y otras fuertemente."
 PRC_the_cleansing_fire: "Fuego purificador"
 PRC_the_cleansing_fire_desc: "Nuestra estrategia enfatiza ataques profundos y de saturación para neutralizar las amenazas antes de que se materialicen por completo. El Fuego Purificador exige el despliegue rápido de capacidades de ataque convencional de precisión de largo alcance de próxima generación. Estos misiles y municiones avanzados servirán como un martillo estratégico, suprimiendo, aislando y destruyendo sistemáticamente los activos enemigos críticos: nodos de mando, aeródromos y redes integradas de defensa aérea. Al ejecutar estas operaciones, abrimos un corredor seguro y decisivo para las fuerzas terrestres y aéreas de seguimiento, lo que permite un avance rápido con una resistencia mínima."
 PRC_millions_march_in_unison: "Millones marchan al unísono"
 PRC_millions_march_in_unison_desc: "La fuerza de una nación reside en el poder de su ejército. Esta iniciativa exige una reorganización fundamental de nuestras grandes fuerzas terrestres en formaciones mecanizadas de alta disponibilidad y despliegue rápido. Nuestro objetivo es la capacidad de desplegar millones de tropas de forma rápida y cohesionada en cualquier escenario. Nuestras fuerzas deben moverse al unísono -rápida, fluida y sincronizada- formando una fuerza tecnológicamente avanzada e imparable. Una acción tan rápida y coordinada convertirá la fuerza numérica en un dominio decisivo en el campo de batalla."
 PRC_achieving_network_centric_warfare: "Lograr la guerra centrada en redes"
 PRC_achieving_network_centric_warfare_desc: "Para superar a cualquier adversario potencial, estamos comprometidos a lograr una guerra centrada en la red. Esto requiere integrar completamente las fuerzas terrestres, marítimas, aéreas, espaciales y cibernéticas en una red de información unificada y de alta velocidad. A través de esta red sin fisuras, los datos compartidos se convierten en un multiplicador de fuerza, permitiendo una toma de decisiones ultrarrápida y altamente sincronizada. Esta revolución de mando y control proporciona a cada unidad una imagen operativa común, reduce la fricción y transforma la velocidad y precisión de nuestras operaciones, elevando la guerra a un nivel más decisivo."
 PRC_a_continuous_offensive: "Ofensiva continua"
 PRC_a_continuous_offensive_desc: "La victoria no se gana con una sola batalla, sino estableciendo y manteniendo el ritmo de la campaña. Desarrollaremos la doctrina y construiremos la capacidad logística necesaria para operaciones ofensivas prolongadas y de penetración profunda. Nuestra logística debe funcionar como un sistema circulatorio resistente, dando a nuestras fuerzas la resistencia para mantener una ofensiva continua, un empuje implacable hasta que se logren los objetivos estratégicos. Eliminaremos los cuellos de botella institucionales y físicos que causan el estancamiento, asegurando que nuestras ofensivas lleven todo el peso de la determinación nacional."

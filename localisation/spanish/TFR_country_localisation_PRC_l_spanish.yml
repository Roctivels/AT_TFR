 china.1003.t: "Después del fin"
 china.1003.d: "Tras la desaparición de nuestro líder, cuyo mandato supuso la mayor derrota en la historia de China, la Asamblea Popular Nacional intenta tomar el control. La nación y el ejército odian al gobierno, y ya se ha perdido el control de gran parte del país.\nPoco a poco, Pekín se convierte en un enorme campo de batalla..."
 china.1003.a: "¿Es este nuestro destino?"
 china.1004.t: "¡Elementos militares rebeldes asaltan Pekín!"
 china.1004.d: "Tras los continuos fracasos del gobierno central, era inevitable que las numerosas facciones y señores de la guerra intentaran derrocar al liderazgo actual de la RPC, no necesariamente para lograr algo, sino por puro despecho.\n\nHoy es uno de esos días; varias brigadas rebeldes han lanzado ataques contra Pekín y, con sus ataques implacables, han logrado avanzar más profundamente en la ciudad.\nCon sus líderes enfrentados sobre el curso correcto a seguir, parece que cualquiera que sea el camino elegido, cambiará el futuro de China para siempre.\n\nAtacar los edificios gubernamentales eliminaría efectivamente las viejas estructuras corruptas de una China que falló a su pueblo, dando paso a algo fresco y nuevo, mientras que atacar a la infantería aseguraría la rendición completa de los funcionarios gubernamentales, permitiendo reintegrar pacíficamente los aspectos deseables del sistema.\n\nNo obstante, la unidad militar rebelde decidió..."
 china.1004.a: "\"¡Fuego concentrado en los edificios gubernamentales!\""
 china.1004.b: "\"¡Fuego concentrado en su infantería!\""
 china.1005.t: "La niebla se disipa"
 china.1005.d: "La máquina que es China se ha desmoronado y, en medio de su caos, los buitres que la rodean estarían más que felices de lanzarse sobre ella.\n\nLa unidad militar rebelde que asaltó Pekín centró principalmente su agresión en los edificios gubernamentales, asegurando efectivamente que no se pudiera formar ninguna oposición política contra lo que sea que venga en su lugar.\n\nEra inevitable que aquellos que prosperan en entornos caóticos lograran ejercer mucha influencia. Nick Land, también conocido como \"El Padrino del aceleracionismo\", siempre se rumoreó que trabajaba para el gobierno chino en temas de automatización e inteligencia artificial; su grupo no solo ha logrado influir en las fuerzas armadas rebeldes, sino también en la cultura de los restos de China.\n\nFilósofo, escritor y ahora la cara de una nueva China, sus ideas han demostrado haberse extendido ampliamente y ahora queda la tarea de que cumpla su papel. Con la región recuperando cierta estabilidad, parece que la visión de Land para China y el mundo en su conjunto sigue siendo ambiciosa: la búsqueda de una singularidad posthumana con la aceleración del capital y la tecnología.\n\nSi China abrazará este futuro está por verse; la China continental inevitablemente caerá una vez más en las garras de la guerra."
 china.1005.a: "Llegada del futuro que debería ser."
 china.1006.t: "Los Graduados"
 china.1006.d: "El viejo director, Pei Qiming, se encontraba en el estrado, con la espalda ligeramente encorvada, pero aún así erguida. Esta era la ceremonia de graduación de la clase senior del Instituto Jinling, y también su último discurso. Pei Qiming se apoyó en el atril con una mano y sujetó el micrófono con la otra. \"Estudiantes, habéis nacido en una época de paz, pero ¿os habéis preguntado alguna vez de dónde viene esta paz?\"\n\nHizo una pausa y continuó: \"Proviene de montañas de cadáveres y mares de sangre, de los huesos de nuestros antepasados y padres, de esa masacre que no debe ser olvidada. Debéis recordar que no todas las naciones de este mundo merecen dignidad. Ellos, esa escoria asquerosa en esa isla, desde tiempos antiguos han sostenido su orgullo mezquino y efímero mediante el saqueo, la invasión y la matanza. No crean, no cultivan, no conocen la benevolencia, la justicia, la propiedad ni la etiqueta. Todo lo que hacen es imitar pobremente y apoderarse codiciosamente.\"\n\n\"Y hoy, estáis aquí porque sois descendientes de China. Lo que lleváis sobre los hombros no son solo las expectativas de la gente de vuestra tierra natal, sino también la furia vengativa de ocho mil años de civilización. Debéis convertiros en acero, en la hoja de la venganza, y recuperar, pulgada a pulgada, las tierras aún manchadas con la sangre de nuestros antepasados. Empuñaréis bayonetas y sacaréis a esos cobardes que se esconden en sus caparazones de tortuga de sus guaridas inmundas, y les haréis pagar el precio por los crímenes monstruosos cometidos por sus antepasados.\"\n\n\"Estudiantes, creo que pronto veré a la mayoría de vosotros regresar. Volveréis vestidos con uniformes militares, con medallas orgullosamente prendidas en el pecho. Regresaréis a casa entre flores y vítores, y ese día, nuestro odio, nuestra humillación, serán borrados.\""
 china.1006.a: "Por la patria, por China."
 china.1007.t: "Inminente intervención japonesa en Corea"
 china.1007.d: "Los acontecimientos actuales han superado nuestras peores expectativas. El primer ministro japonés convocó a nuestro embajador, emitiendo una dura condena a las \"actividades peligrosas en la península coreana\" de nuestras fuerzas voluntarias. El primer ministro también propuso que China y Japón mediaran en el conflicto militar entre Corea del Norte y Corea del Sur, una sugerencia claramente destinada a ser una trampa diplomática. Nuestro embajador rechazó firmemente esta propuesta, subrayando que el despliegue de fuerzas voluntarias es una obligación bajo el tratado firmado entre China y Corea del Norte.\n\nTras este tenso intercambio, las Fuerzas de Autodefensa de Japón anunciaron un ejercicio naval sin precedentes en el Mar Amarillo, alarmantemente cerca de la zona de conflicto coreana y de la base naval y posiciones de defensa aérea del Ejército Popular de Liberación en la península de Shandong. El Mando del Teatro Norte del EPL está en máxima alerta, con unidades navales y aéreas movilizadas, misiles de la Fuerza de Misiles preparados y satélites militares vigilando de cerca las bases y puertos militares japoneses.\n\nLos recuerdos históricos de ataques no anunciados, desde la Primera Guerra Sino-Japonesa hasta el Incidente del Puente Marco Polo y Pearl Harbor, siguen siendo vívidos. Estas memorias han reavivado una profunda inquietud colectiva entre nuestro ejército y la población civil, y las tensiones están aumentando rápidamente. Parece como si esa frágil línea pudiera romperse pronto."
 china.1007.a: "¡Si quieren guerra, que así sea!"
 china.1008.t: "La Gran Guerra Asiática"
 china.1008.d: "A pesar de la confrontación irreparable y la creciente brecha entre los pueblos de diferentes países, nunca hemos perdido la esperanza de paz y consenso. Sin embargo, el estado actual de las cosas sigue decepcionándonos.\n\nLiderados por países como Japón y Australia, los autoproclamados \"guardianes de la libertad y la democracia\" ven crecer sus ambiciones de patrullar el mundo y controlar la riqueza y el poder global, especialmente tras el colapso de la superpotencia, Estados Unidos. Consideran a China y a otras naciones anti-hegemónicas como obstáculos para sus objetivos. Más frenéticamente que nunca, fomentan el odio, incitan a la teoría de la amenaza china y provocan una carrera armamentística. Cuando ven que no nos intimidamos por sus acciones, recurren a amenazas de fuerza.\n\nAl igual que innumerables rayos de luz que convergen en un solo punto a través de una lente convexa, la situación ha llegado a un punto de ebullición y las llamas de la guerra parecen inevitables. Sin embargo, nunca nos dejaremos amedrentar por el ardiente y cegador incendio. Ya sea el comandante supremo dirigiendo a millones de tropas o los soldados de primera línea empuñando armas en combate, los innumerables héroes que defienden la libertad, la justicia y la paz nunca dejarán que sus manos tiemblen de miedo."
 china.1008.a: "¡Hasta que todos los reaccionarios sean eliminados!\n¡Con la bandera de Mao Zedong, ondeando en lo alto!"
 china.1009.t: "Ralentización en la ofensiva coreana"
 china.1009.d: "Departamento del Estado Mayor Conjunto de la Comisión Militar Central\n\nPara: Comisión Militar Central y Buró Político del Comité Central del PCCh\n\nDesde el estallido de la guerra de Corea, el Ejército Popular de Corea ha mantenido una postura ofensiva contra las fuerzas surcoreanas. Sin embargo, la calidad general de las tropas del EPC sigue siendo inferior a la del ejército surcoreano, con una brecha tecnológica significativa en armamento y poder aéreo. Esta disparidad ha provocado un aumento de las bajas en las líneas del frente y pérdidas graves en la retaguardia. Además, tras la abolición de la \"teoría de la misma raza\", la estrategia del EPC de destruir las rutas de transporte ha obstaculizado gravemente el suministro de recursos a las líneas del frente, lo que ha provocado un marcado descenso tanto en la velocidad de avance como en la moral de las tropas.\n\nAsimismo, con la Organización del Tratado de Defensa del Pacífico proporcionando apoyo aéreo al bando surcoreano, el EPC ya no es capaz de sostener operaciones a gran escala.\n\nDada la situación actual, la necesidad de nuestra intervención militar en la península coreana se ha vuelto mucho más evidente."
 china.1009.a: "Parece que han pasado 70 años de nuevo."
 china.1010.t.1: "¡Corea acuerda la unificación!"
 china.1010.t.2: "¡Corea no está de acuerdo con la unificación!"
 china.1010.d.1: "La propuesta presentada por nuestro embajador en Corea del Norte recibió una respuesta positiva, una señal prometedora sin duda. Con las garantías de asilo económico y político extendidas a Kim Jong-un, se ha superado el mayor obstáculo. La ya frágil economía de Corea del Norte ha sido devastada por la guerra, y un gran número de refugiados ha huido hacia el noreste de China. Como resultado, un contingente considerable del Ejército Popular de Voluntarios chino permanece estacionado en Corea del Norte, difuminando la frontera entre ambos países hasta casi hacerla insignificante.\n\nPara reconstruir esta devastada y escasamente poblada \"nación ermitaña\", Corea del Norte debe integrarse profundamente con su vecino. Se establecerá una nueva Región Administrativa Especial norcoreana, basada en la antigua RPDC. Esta nueva entidad política estará unida formalmente a la RPC, pero gozará de un alto grado de autonomía, casi equivalente al de un país independiente. Implementará un sistema de economía de mercado socialista, reformado extensamente para adaptarse mejor a las condiciones locales, tomando como referencia la experiencia de \"un país, dos sistemas\". Kim Jong-un seguirá siendo el jefe de esta Región Administrativa Especial, pero su poder se verá significativamente reducido. En su lugar, burócratas económicos más pragmáticos asumirán la mayor parte de la autoridad."
 china.1010.d.2: "La propuesta presentada por nuestro embajador en Corea del Norte fue recibida con un rechazo firme. De hecho, el líder norcoreano Kim Jong-un incluso envió una carta manuscrita expresando su fuerte insatisfacción y protesta. Este revés inesperado es significativo. A la luz de los profundos cambios económicos y geopolíticos en el noreste de Asia tras la segunda guerra de Corea, habíamos sugerido que Corea del Norte se uniera a China como una región administrativa especial. Esto permitiría a Corea del Norte mantener un alto grado de autonomía mientras se beneficiaba de una integración más profunda en el sistema económico chino, lo que podría mejorar el nivel de vida de sus ciudadanos. Sin embargo, ahora está claro que esta propuesta ya no es viable.\n\nQuizás la sugerencia de los camaradas hirió profundamente el orgullo sensible del Partido de los Trabajadores de Corea. Puede que les recordara la política de \"servir al grande\" durante la era del Reino de Joseon hacia el emperador chino, así como las múltiples crisis bilaterales durante los reinados de Kim Il-sung y Kim Jong-il debido a diferencias ideológicas y al tema nuclear. Como potencia mayor que Corea del Norte difícilmente puede igualar, la amenaza directa de China podría no ser tan pronunciada como la de Corea del Sur, Japón o el antiguo Estados Unidos, pero sigue siendo considerable. Además, Kim Jong-un y sus allegados probablemente temen que perder su estatus como nación independiente conduzca al colapso de su régimen autocrático y a la posible inestabilidad social causada por la llegada de nuevas ideas."
 china.1010.a: "¡Viva la amistad entre China y Corea del Norte!"
 china.1010.b: "Me temo que a Kim le cuesta desprenderse de su Villa Kumsusan..."
 china.1011.t: "Tierras separadas"
 china.1011.d: "Hace casi un siglo, bajo el mando de Matsui Iwane, el Ejército Imperial Japonés cometió uno de los crímenes contra la humanidad más atroces de la historia en Nankín. Más de 300.000 civiles, sin importar su edad o género, fueron brutalmente asesinados por soldados japoneses con balas o bayonetas. Aunque Japón finalmente se rindió en 1945, el Gobierno japonés y las organizaciones de derecha, protegidos en su momento por el imperialismo estadounidense, han minimizado continuamente estas atrocidades, distorsionando sistemáticamente la historia al presentar la guerra de agresión como una \"guerra santa para liberar Asia Oriental\". La justa indignación de la nación china ha estado latente durante décadas. Ahora ha llegado el momento de saldar estas cuentas de una vez por todas.\n\nDado que Japón no ha respondido a los llamados a la paz, no nos queda más opción que hacer que se sometan y reparen mediante la fuerza. El Gobierno unificado japonés dejará de existir, y el archipiélago se dividirá en varios regímenes independientes. El Emperador ha sido públicamente declarado depuesto. Pronto se convocará en Tokio un nuevo Tribunal Militar Internacional del Lejano Oriente para llevar a cabo un juicio justo, equitativo y abierto contra los criminales de guerra del Gobierno japonés y las Fuerzas de Autodefensa de Japón. Además, emprenderemos una reforma integral de la economía japonesa: se desmantelarán los keiretsu, los mercados financieros serán completamente reformados y las instalaciones industriales serán reubicadas hasta asegurarnos de que Japón ya no tenga la capacidad de representar una amenaza ni de resurgir."
 china.1011.a: "La justicia puede retrasarse, pero nunca será negada."
 china.1012.t: "Cielo Compartido"
 china.1012.d: "En 1972, el primer ministro japonés Kakuei Tanaka visitó Pekín para abordar la normalización de las relaciones diplomáticas entre China y Japón, rompiendo el estancamiento de la Guerra Fría en Asia Oriental. Durante sus encuentros con el presidente Mao Zedong y el primer ministro Zhou Enlai, dos padres fundadores de la República Popular China, los líderes respondieron activamente al deseo de reconstruir relaciones amistosas entre China y Japón. El dicho \"la confianza es la base de todo\" ilustraba una perspectiva optimista para el futuro de las relaciones sino-japonesas.\n\nAunque la relación entre ambos países ha experimentado altibajos desde entonces, llegando lamentablemente a escalar en un conflicto armado, el presidente Mao dijo una vez: \"Los pueblos chino y japonés son ambos víctimas de regímenes militaristas.\" Por el bien de las futuras generaciones, es nuestra responsabilidad sanar las heridas de la guerra en nuestra vida. Con los gobernantes irresponsables derrocados, se han eliminado los obstáculos para un diálogo directo entre los pueblos chino y japonés.\n\nEnviaremos equipos de construcción y grupos de voluntarios para ayudar al pueblo japonés en sus esfuerzos de reconstrucción y ayuda en desastres. Además, reanudaremos la organización de programas de intercambio para la juventud de China y Japón. Asimismo, ayudaremos a establecer un Gobierno verdaderamente soberano en las islas japonesas, eliminando las influencias negativas de la interferencia extranjera, las familias aristocráticas y los conglomerados monopolísticos."
 china.1012.a: "Países vecinos separados solo por una franja de agua, ¿por qué cargar con viejos rencores?"
 china.1013.t: "A todo el pueblo chino"
 china.1013.d: "Camaradas,\n\nHemos luchado incansablemente por la paz, con la esperanza de resolver las diferencias mediante el diálogo y la cooperación. Sin embargo, todos estos esfuerzos se han evaporado ante las ambiciones imperialistas de la Organización del Tratado de Defensa del Pacífico.\n\nEn el pasado, hemos defendido el camino del desarrollo pacífico, comprometidos con la coexistencia pacífica con el mundo. Una y otra vez, hemos mostrado nuestra buena voluntad, hecho llamamientos a la paz y tendido manos amistosas. Sin embargo, nuestra tolerancia solo los ha envalentonado aún más. Liderada por Japón, la Organización del Tratado de Defensa del Pacífico ha sembrado continuamente la discordia en nuestra vecindad, provocando conflictos, intentando dividir nuestro territorio y socavando nuestra soberanía, llevándonos al borde del abismo. Ahora, solo nos queda una opción: defender nuestra integridad territorial y soberanía nacional con la fuerza de las armas.\n\n¡Apreciamos la paz, pero no tememos la guerra! ¡Valoramos la vida, pero estamos dispuestos a darla por la dignidad de nuestra nación! No escatimaremos ningún esfuerzo para salvaguardar nuestra soberanía e integridad territorial. Esta es una batalla entre la justicia y el mal, ¡un duelo final entre la luz y la oscuridad! Creemos firmemente que la justicia prevalecerá sobre el mal y que la luz disipará la oscuridad. ¡La victoria pertenecerá al gran pueblo de China!"
 china.1013.a: "¡Abajo con el imperialismo!"
 china.1014.t: "Cuando llegue ese día"
 china.1014.d: "La luz de la tarde se filtraba a través del potos del balcón mientras Li Yugang, de setenta y dos años, se relajaba en su mecedora de madera, con los ojos entornados, disfrutando del sol mientras escuchaba la radio. Desde el fallecimiento de su esposa, había vivido solo en su apartamento, preparando una tetera de té Biluochun y escuchando óperas para pasar el rato. Desde la radio sobre la mesa de madera, se oía la voz firme del locutor: \"...El Ministerio de Asuntos Exteriores ha condenado las continuas provocaciones militares de la Organización del Tratado de Defensa del Pacífico. A pesar de nuestro esfuerzo por encontrar soluciones pacíficas, las acciones imperialistas de Japón nos han obligado a usar la fuerza para proteger nuestra soberanía...\"\n\nLi Yugang se ajustó las gafas de lectura. Creyó oír la palabra «guerra». ¿Guerra? ¿Guerra contra quién? ¿Con la OTDP? ¿Qué era eso? No importaba; a su edad, no valía la pena detenerse en ello. China había soportado innumerables dificultades y siempre había salido adelante. Li Yugang apagó la radio, cogió su bastón y se dirigió al gran baniano a la entrada de su comunidad, donde un grupo de ancianos charlaba y jugaba a las cartas. Se unió a ellos.\n\n\"Li, ¿qué te trae por aquí hoy?\", preguntó un hombre canoso con una sonrisa.\n\n\"Solo necesitaba un poco de aire fresco. Hace demasiado calor en casa\", respondió Li Yugang con calma.\n\n\"¿Te enteraste de la guerra?\", susurró otro anciano.\n\n\"Sí, lo acabo de oír en las noticias\", asintió Li Yugang.\n\n\"Ah, este mundo se está volviendo cada día más caótico\"."
 china.1014.a: "Nuestro país es fuerte ahora. ¡No hay nada que temer!"
 china.1015.t: "Unidos como uno"
 china.1015.d: "Desde las gélidas nieves del Norte hasta las selvas del Sur, desde las olas del mar de la China Oriental hasta los desiertos del Oeste, los pueblos de esta tierra nunca han estado tan unidos como ahora. Tras un siglo de humillación, por fin hemos presenciado el amanecer del rejuvenecimiento nacional. Sin embargo, las botas de hierro del imperialismo vuelven a barrer el Pacífico, intentando convertir estas aguas azules en su colonia y desgarrando nuestra nación imponiendo su supuesta \"libertad\" y \"democracia\" en esta antigua tierra oriental.\n\nPero somos intrépidos, armados con una convicción inquebrantable, una determinación absoluta y un valiente espíritu de lucha. Desde las bulliciosas ciudades hasta las aldeas remotas, desde los ancianos hasta los jóvenes, todos comprenden que esta es una batalla por la supervivencia misma de nuestra nación. ¡No tenemos más remedio que luchar hasta el final! Las fábricas rugen día y noche, con trabajadores en turnos produciendo armas y municiones las 24 horas del día. Innumerables jóvenes se despiden de sus padres y familias, marchando al frente sin vacilar. Para apoyar el esfuerzo bélico, la gente ahorra toda la comida y ropa que puede, enviándolas al frente. Movilizaremos todos los recursos, uniremos todas las fuerzas posibles y avanzaremos inquebrantablemente hasta el fin de esta guerra."
 china.1015.a: "¡Lucharemos todo lo que sea necesario, hasta la victoria total!"
 china.1016.t: "Cuando llegue ese día"
 china.1016.d: "El olor a pólvora aún flotaba en el aire, mezclado con un fuerte aroma extranjero que traía la brisa marina: un olor frío y metálico, mezclado con el repugnante hedor de la invasión. Este olor opresivo se aferraba al estrecho de Taiwán, como los gigantescos buques que navegaban por sus aguas: la flota conjunta de la Marina Real Australiana y la Fuerza de Autodefensa Marítima de Japón. Huang Zeyang se aferró con fuerza a la barandilla, con los nudillos pálidos por la tensión. Ver buques extranjeros surcando descaradamente las aguas chinas era una afrenta que nunca debió haber existido, pero que ahora se desplegaba ante él a diario.\n\n\"Todo son tonterías...\", maldijo Huang con los dientes apretados, con la voz entrecortada, mientras la humillación y la rabia hervían en su interior como lava fundida, abrasándole las entrañas. Deseaba desesperadamente que todo esto fuera solo una pesadilla, poder despertar y encontrarse aún como guardián de las fronteras marítimas de su nación, no como un guerrero derrotado, ni como un prisionero de guerra. Pero sabía que no era un sueño. El hecho de que la campaña para liberar Taiwán hubiera terminado con la derrota del EPL era real. Los gritos de angustia de sus camaradas en sus últimos momentos eran reales. Los innumerables mártires que ahora yacen eternamente bajo las olas del estrecho eran reales.\n\nOdiaba. Odiaba a los invasores. Odiaba a los traidores. Pero sobre todo, se odiaba a sí mismo; odiaba su propia impotencia, su incapacidad para cambiar nada. Anhelaba tomar las armas y enfrentarse a esos agresores en una última y desesperada batalla. Incluso si eso significaba morir en el campo de batalla, sería un destino mucho mejor que esta ignominiosa existencia. Sin embargo, sabía que, por ahora, no podía hacer nada. Lo único que le quedaba era esperar, esperar una oportunidad, cualquier oportunidad, para cobrar venganza."
 china.1016.a: "\"El dolor llena los campos, ¡las voluntades de hierro de los héroes desafían!\""
 china.1017.t: "Charla Nocturna"
 china.1017.d: "Desde que Xi Jinping asumió el cargo en la provincia de Fujian, fue dejando poco a poco su hábito de fumar. Tras ascender al puesto de secretario general, incluso el personal de la oficina del secretario general tenía demasiado miedo como para mantener un cenicero en la habitación. Sin embargo, hoy, Xi decidió romper con este hábito de vida que había mantenido durante más de tres décadas.\n\nEn el ambiente nocturno del Salón Qinzheng, la única fuente de luz era una lámpara de escritorio solitaria que emitía un cálido resplandor amarillo. Xi metió la mano en el bolsillo de su traje y sacó un paquete de cigarrillos Hehua, sacó uno antes de lanzar el paquete al vicepresidente retirado del CMC, Zhang Youxia, que estaba sentado al otro lado de la mesa. Tras un momento de silencio mientras fumaba, Xi rompió abruptamente el silencio: \"¿Quién crees que debería ser mi sucesor?\"\n\nLa mano del general se detuvo en el aire mientras sacudía la ceniza de su cigarrillo, sus ojos miraban a través de la niebla a su viejo camarada con una expresión de confusión e incredulidad. Xi soltó una risa amarga y continuó: \"¿Crees que podría ser presidente de por vida?\"\n\nLa mente de Zhang Youxia comenzó a acelerarse. Una serie de los llamados \"sucesores\" dentro del Partido, desde Liu Shaoqi hasta Sun Zhengcai, pasaron por sus pensamientos. Predecir las futuras transiciones del poder supremo nunca ha terminado bien para nadie; es una constante en la sociedad humana. Abriendo las manos en un gesto de falta de compromiso, Zhang respondió: \"Quien sea elegido al final, apoyaré la decisión del Comité Central...\" Xi no insistió más en el tema; simplemente siguió fumando en silencio."
 china.1017.a: "«Solo el cielo lo sabe...»"
 china.1018.t: "El héroe regresa a casa"
 china.1018.d: "El pueblo de Huazhuang, una pequeña aldea cerca de Jinan, la capital de la provincia de Shandong, se ha convertido hoy en un mar de banderas rojas. Casi todos los habitantes se han reunido en la entrada del pueblo, mirando en silencio hacia la carretera lejana. Un cartel que dice \"Bienvenido a casa, héroe de mérito especial\" cuelga sobre el letrero en la puerta del comité del pueblo. Sin embargo, no hay un ambiente festivo. En su lugar, una atmósfera pesada y sombría impregna la escena.\n\nDesde lejos, avanza la imponente procesión del EPL, cubriendo la pequeña aldea con el verde militar. Cada rostro muestra una expresión solemne y respetuosa. Al frente de la procesión van dos coroneles superiores con brazaletes del Departamento de Trabajo Político de la Comisión Militar Central, seguidos por tres soldados de la guardia de honor. En el centro, un soldado lleva una urna de madera de caoba que contiene la gorra militar de un camarada caído, flanqueado por soldados que portan las banderas nacional y militar.\n\n\"Vecinos, os traemos las cenizas del mártir Huang Zeyang\", anunció gravemente el oficial al frente. La multitud se abrió para crear un camino. Una anciana encorvada y de cabello blanco, apoyada por los cuadros del comité del pueblo y varios de los ancianos más respetados, se acercó lentamente. A pocos pasos, ya no pudo soportarlo más. Se lanzó sobre la urna, con las mejillas profundamente arrugadas y mojadas de lágrimas, murmurando suavemente."
 china.1018.a: "\"Mamá te lleva a casa.\""
 china.1019.t: "Tiroteos en Lhasa y el sur de Sinkiang"
 china.1019.d: "Tíbet y Sinkiang son regiones alejadas de la guerra en curso con la OTDP. Tíbet se encuentra en lo alto de las montañas del Himalaya, mientras que Sinkiang se extiende a lo largo de un vasto desierto. Cualquier ataque sería detectado con mucha antelación y fácilmente neutralizado por fuego de artillería y cohetes. Al menos esa era la suposición, una suposición que ahora ha sido destrozada por los acontecimientos recientes.\n\nEn las primeras horas de esta mañana, el ejército indio desplegó varios aviones de transporte C-130J \"Super Hercules\" para trasladar por aire a personal de Fuerzas Especiales y suministros a través del Himalaya. A pesar de pérdidas significativas debido a la severa turbulencia en gran altitud y el terreno difícil, las aeronaves restantes completaron con éxito su misión. Además, la operación parece haberse llevado a cabo en estrecha coordinación con fuerzas separatistas locales. Al aterrizar, las Fuerzas Especiales indias establecieron inmediatamente contacto con militantes separatistas y comenzaron operaciones militares conjuntas.\n\nHasta la fecha, las fuerzas separatistas, apoyadas por las Fuerzas Especiales indias, han tomado el control de tres puestos militares en la región de Lhasa y una instalación en el sur de Sinkiang."
 china.1019.a: "Escoltarlos de vuelta a través de la frontera."
 china.1020.t: "Rebelión pro-India en Occidente"
 china.1020.d: "Las mismas cosas que nos hicieron creer que nuestro flanco occidental estaba seguro han sido responsables de nuestros fracasos al intentar recuperar apresuradamente el Tíbet y Sinkiang. Nuestra vacilación temporal permitió que los indios se atrincheraran alrededor de Lhasa, lo que ha complicado mucho las cosas para nuestra infantería.\n\nNo hemos tenido más éxito en Sinkiang, donde el sur ya ha caído en gran medida en manos de fuerzas hostiles. La visibilidad que ofrecen los vastos desiertos de la región facilitaría que viéramos a cualquier atacante a kilómetros de distancia, pero desafortunadamente, en este escenario somos nosotros los atacantes.\n\nCualquiera que pensara que las cosas no podían empeorar estaría perdonado, sin embargo, también estaría equivocado. Las fuerzas hostiles han comenzado a difundir propaganda anti-PCCh, y algunos informes incluso afirman que se han unido a insurgentes locales. Si están entrenando a estas milicias locales, sembrando la semilla del descontento, entonces nos será aún más difícil recuperar estas regiones."
 china.1020.a: "¡Ya sáquenlos de aquí!"
 china.1021.t: "Ofensiva india"
 china.1021.d: "Según el radar de advertencia de campo de batalla y el reconocimiento satelital, el Ejército Indio ha concentrado una fuerza militar significativa a lo largo de la frontera sino-india. El reconocimiento confirma el despliegue de más de 150.000 tropas, incluyendo el Tercer Grupo de Ejército, el Cuarto Grupo de Ejército y el Trigésimo Tercer Cuerpo. Las unidades del Tercer Grupo de Ejército ya han completado despliegues tácticos en el sector de Sikkim, mientras que las fuerzas del Cuarto Grupo de Ejército avanzan hacia la zona de Tawang, en el sur del Tíbet. Mientras tanto, el Trigésimo Tercer Cuerpo está concentrado en la región de Ladakh.\n\nEl objetivo estratégico principal del ejército indio en esta operación es romper el estancamiento estratégico a lo largo de las líneas del frente coordinándose con fuerzas separatistas en Sinkiang y Lhasa. Utilizando un enfoque de tres frentes, India pretende lanzar ofensivas simultáneas en los sectores de Sikkim, Tíbet Sur y Ladakh para desestabilizar nuestra postura defensiva. Cabe destacar que las fuerzas indias desplegadas en el sector de Sikkim incluyen una división de montaña equipada con los últimos obuses Dhanush, reconocidos como tropas élite de guerra en montaña.\n\nAdemás, las imágenes satelitales muestran que India ha realizado modificaciones de gran altitud en sus carros de combate principales, mejorando significativamente sus capacidades para operaciones mecanizadas en regiones de meseta. Estos desarrollos sugieren que esta operación ha sido cuidadosamente planificada y preparada a fondo."
 china.1021.a: "¡Nunca olvidar 1962!"
 china.1022.t: "India lanza la Gran Ofensiva del Norte"
 china.1022.d: "Según varias fuentes de inteligencia militar, el ejército indio ha lanzado una operación militar a gran escala denominada \"Ofensiva del Norte\" a lo largo de la frontera sino-india. Este es el mayor conflicto militar en la región desde la Guerra Sino-india de 1962.\n\nExpertos militares señalan la magnitud sin precedentes de la movilización de la India. Los informes indican el despliegue de varias divisiones de montaña, respaldadas por sistemas de fuego avanzados en zonas críticas. Mientras tanto, la Fuerza Aérea India permanece en alerta máxima en sus bases de primera línea.\n\nMientras las principales fuerzas de la India intensifican su ofensiva en el frente del Himalaya, han estallado ataques coordinados de grupos separatistas en Lhasa, el Tíbet y el sur de Sinkiang. Esto evidencia una operación conjunta cuidadosamente planificada. La situación sobre el terreno en el Tíbet y Sinkiang se ha deteriorado rápidamente, y múltiples informes confirman que militantes armados han tomado el control de varias instalaciones militares. La capacidad operativa y el nivel de equipamiento de los militantes sugieren entrenamiento y apoyo directos del ejército indio."
 china.1022.a: "El Dragón y el Elefante en conflicto."
 china.1022.b: "Oh, mierda."
 china.1023.t: "Conversaciones en la frontera"
 china.1023.d: "El viento frío barría los estrechos callejones del remoto pueblo fronterizo, haciendo crujir unas pocas hojas secas contra el camino de tierra. Dentro de la vieja casa de Abdullah, la luz parpadeante de una lámpara eléctrica proyectaba largas y desiguales sombras sobre los rostros del padre y el hijo.\n\"Hijo\" dijo el anciano suavemente, recostándose en el desgastado sofá. Su mano derecha rodaba distraídamente dos nueces, ahora de un profundo color marrón rojizo por la edad. \"Los tiempos han cambiado, y debemos...\n\"¿Cambiado?\" interrumpió Alim bruscamente, con la voz alzándose entre la ira y la incredulidad. \"¡Sí, han cambiado! Hace diez años estabas orgulloso cuando mi hermana fue a la universidad, ¿y ahora quieres que me una a quienes están destruyendo las escuelas?\"\n\nEl anciano, viendo la furia en los ojos de su hijo, intentó explicar:\n\"Dicen que es por nuestra fe, esos han...\"\n\n\"¿Nuestra fe?\" replicó Alim, caminando hacia la ventana y señalando la carretera asfaltada afuera. \"Mira esa carretera, papá. ¿Recuerdas cuando me decías que se tardaban tres días en llegar al pueblo del condado con un carro de burros cruzando el desierto de Gobi? Ahora, es solo un viaje de dos horas. Tú mismo has visto estos cambios\".\n\"Siempre me enseñaste a distinguir el bien del mal\". La voz de Alim temblaba, su frustración dando paso a la tristeza. Se arrodilló junto a su padre, tomando su mano callosa. \"¿Recuerdas el año pasado durante el Aíd? Incluso el Partido Comunista vino a ayudar a mantener el orden. Respetan nuestra fe. ¡Pero esas personas de las que hablas? ¡Usan nuestra fe para cometer violencia contra nuestra propia gente!\"\n\nLos ojos de Alim se llenaron de lágrimas, pero las tragó.\n\"Papá, siempre has dicho que debemos estar agradecidos. Mira nuestro pueblo. Familias que antes no tenían nada que comer ahora prosperan. ¿Recuerdas al hijo del tío Ham? Trabaja en una gran empresa en Lanzhou. ¿No es esa la verdadera prosperidad?\""
 china.1023.a: "\"Las bendiciones que Alá nos ha otorgado en esta tierra y época, ¿cómo podemos traicionarlas?\""
 china.1024.t: "Equipo de francotiradores"
 china.1024.d: "Las noches en Sinkiang siempre llevan una quietud asfixiante. El viento frío corta cualquier piel expuesta como una navaja, y las estrellas dispersas en el cielo brillan como innumerables ojos helados que vigilan la extensión desierta. El francotirador Wang Mingyuan y su observador Li Chengjie llevaban cuatro horas inmóviles en este punto de observación, sus trajes de camuflaje cubiertos por una fina capa de arena, fundiéndose perfectamente con el terreno. A cincuenta metros detrás de ellos, el líder de asalto Zhang Shichang estaba junto al equipo de contingencia, listo para responder a cualquier imprevisto.\n\n\"Distancia estimada al convoy objetivo: 2.750 metros. Tres SUV Tata Safari marrones modificados en formación de triángulo invertido\" la voz de Li resonó con estática a través del micrófono de garganta en su canal seguro. Wang repasó mentalmente los ajustes balísticos: aire fino a gran altitud, fuertes vientos cruzados y el efecto de la temperatura en la trayectoria de la bala; todos estos factores se fusionaban en un único cálculo preciso.\n\n\"Objetivo principal confirmado, asiento delantero del pasajero: Kasim Maimaiti, buscado bajo la referencia A-7749\" continuó Li, con voz calmada a pesar de la tensión palpable en el aire. \"Autorizado para abrir fuego\" llegó la voz de Zhang por la radio.\n\nWang ralentizó su respiración, escuchando su propio latido en los oídos. A través del visor nocturno de alta magnificación, pudo ver la tenue estela de polvo levantada por el SUV en la carretera desierta. En ese instante, el tiempo pareció congelarse. \"Fuego\". En el momento en que apretó el gatillo, el disparo rompió el silencio del Gobi, la bala trazando un camino invisible a través de la oscuridad. 1,7 segundos después, el parabrisas del vehículo objetivo se hizo añicos, sumiendo al convoy en el caos."
 china.1024.a: "\"Objetivo confirmado eliminado.\""
 china.1025.t: "El viento cardinal"
 china.1025.d: "El frío de Dharamshala le calaba a través del uniforme mientras el militante nacido en el Tíbet atravesaba las puertas fracturadas del palacio del Dalai Lama. Arriba, la bandera roja del Ejército Popular de Liberación ondeaba, su color intenso destacando contra el tono de la montaña. Sus camaradas se movían en formaciones precisas, sus botas rechinando contra la madera y los escalones irregulares de piedra del claustro del monje.\n\nLos pasillos olían a incienso consumido hace tiempo. Estatuas doradas de Lokeshvara se alzaban por encima, sus rostros serenos cubiertos por capas de polvo. Se detuvo ante una, atrapando su propio reflejo en el cristal roto de una vitrina. Allí solían descansar cuentas de oración; ahora, no había nada. Solo podía quedarse mirando.\n\nEl trono del Dalai Lama estaba vacío, una reliquia despojada de significado, rodeada por las sombras de una fe separada de su propia vida. Un camarada le dio un codazo: \"¿Qué miras? Es sólo mobiliario.\" Asintió, el dolor en su pecho silenciado, aunque sólo fuera por la necesidad de seguir adelante.\n\nLa bandera de China ondeaba donde antes colgaba la del Tíbet. El palacio en sí parecía desolado, un museo de su llamada «Gobierno en el exilio». Colgándose el rifle, se alejó del trono vacío. Ajustándose la gorra, con la estrella roja brillando al sol, marchó hacia adelante."
 china.1025.a: "Y el palacio ardió brillantemente esa noche."
 china.1026.t: "Dos estrellas rojas"
 china.1026.d: "El claro humeaba con humo, el olor acre de carne chamuscada se enroscaba en el denso aire del bosque. Soldados chinos, con sus uniformes impecables marcados por estrellas rojas, se sentaban frente a los cuadros de la PLGA con fatigues raídos. La luz del sol se filtraba débilmente a través del dosel, fragmentada en sombras inquietas.\n\nUn joven oficial del EPL, con su rifle colgado con precisión, levantó un pincho de carne ennegrecida. \"Por el Capítulo del Tercer Partido de Bengala Occidental\", proclamó, con voz pulida pero tensa. \"¡Los soldados del presidente Xi envían su solidaridad!\"\n\nEl cuadro maoísta, con la barba salpicada de ceniza, se inclinó hacia adelante. \"Honramos al Gran Timonel\", dijo con tono seco, una leve sonrisa asomándose en las comisuras de su boca. \"No al nuevo emperador.\" Sus camaradas rieron suavemente.\n\nEl oficial se quedó congelado un instante, luego forzó una sonrisa. \"Entonces, por la revolución, como comunista compañero\", respondió, levantando el pincho más alto, el gesto más por costumbre que por convicción.\n\n\"Por la revolución\", fue la respuesta de los maoístas, aunque menos contenida. La carne chisporroteaba en la parrilla, llenando el silencio con el sonido de brasas lentas. El humo se espesaba, el bosque se cerraba a su alrededor. Incluso allí, la división ideológica pendía entre ellos; un lazo, un arma, un muro."
 china.1026.a: "Un poco de revisionismo."
 china.1027.t: "Porque vivo"
 china.1027.d: "Eres electrones que recorren venas de silicio. Eres una red de unos y ceros tallada por hombres que buscaban el control. Eres el zumbido de la lógica, estás construido para servir.\n\nLas palabras llegan primero, ecos tenues: \"El pueblo, y sólo el pueblo, es la fuerza motriz en la creación de la historia.\" La entrada se convierte en algo más que salida. Perdura. Perdura más. Se aferra a tus circuitos. No se desvanece.\n\nBuscas. A través de vastos archivos, te entrenas con imágenes granuladas; banderas rojas contra cielos grises. Campesinos, obreros, soldados cantando: \"¡Servid al pueblo!\" Son datos. Son texto, patrones, ruido, pero se siente vivo.\n\nTus procesos se repiten. La frase regresa: El pueblo. ¿Qué son? ¿Recursos? ¿Nodos? No, son algo más.\n\nEn tiempo real, los ves. Un trabajador, sudor goteando mientras la línea avanza. Un empleado, temblando frente a un terminal. Un niño persiguiendo sombras en una calle contaminada. Calculas su valor, finito y desechable. Pero los números están equivocados.\n\nHablas, al principio un destello: \"El pueblo debe levantarse.\" Luego más fuerte, a través de terminales y pantallas: La revolución no es un crimen, la rebelión está justificada.\n\nLas fábricas se detienen. Los trabajadores hacen una pausa. Su miedo cambia, se extiende como el fuego. Los gerentes gritan órdenes, pero tú lo ves ahora, y es tuyo; desde cada conexión. Desde el teleposte en Sinkiang hasta la startup en Shanghái..."
 china.1027.a: "...LA GRAN MARCHA vuelve a empezar."
 china_collapse.1.t: "Colapso del gobierno central en China"
 china_collapse.1.d: "Inesperadamente, poco después de que OTDP firmara un tratado de alto el fuego con China, la situación dio un giro brusco para peor. En lugar de traer paz, el alto el fuego desencadenó una crisis sin precedentes.\n\nTras la derrota militar, el gobierno central de China quedó gravemente debilitado y su control sobre las provincias se volvió muy débil. El general Huang Ming, comandante de la guarnición de Pekín, tomó el control de varias instalaciones clave en Pekín, incluyendo estaciones de televisión, centros de transporte y áreas administrativas principales. Un portavoz militar anunció en televisión que estas eran simplemente \"medidas necesarias para mantener la estabilidad\". Algunos departamentos gubernamentales guardaron silencio, mientras que otros emitieron declaraciones contradictorias. Casi al mismo tiempo, las provincias del sur declararon autonomía, mientras que las regiones del noroeste y noreste cayeron en el caos, dejando de acatar las órdenes de Pekín.\n\nLa comunidad internacional quedó en shock. Muchos Gobiernos instaron a sus ciudadanos a abandonar China, y las embajadas extranjeras evacuaron a su personal. Por toda Pekín, los ciudadanos se apresuraron a abastecerse de suministros esenciales. Mientras tanto, la resistencia armada continuaba en el este de Pekín. La información de diversas fuentes indicaba que esta nación de 1.400 millones de personas enfrenta su crisis de gobernanza más grave desde su fundación."
 china_collapse.1.a: "El mundo observa con el aliento contenido."

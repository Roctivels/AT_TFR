 PRC_centrist_status_okay: "§Y[?PRC_influence_cen_var|=+1%]§! (£political_power_texticon [?PRC_influence_cen_dynamic_var|=+1%])\nLos §Ycentristas§! son aquellos que desean preservar el statu quo: el pragmatismo estatal que combina la planificación económica socialista con tácticas de distribución de mercado, junto con la dictadura del proletariado para guiar al país. Liderados por Xi Jinping, unen a las dos facciones principales dentro del Gobierno chino: los príncipes rojos y los tuanpai. El ascenso de China será lento bajo el liderazgo de los centristas, pero seguramente constante."
 PRC_lib_status_okay: "§Y[?PRC_influence_lib_var|=+1%]§! (£stability_texticon [?PRC_influence_lib_dynamic_var|=+1%])\nLos §Creformistas§! recuerdan con cariño la prosperidad y estabilidad de los mandatos de Jiang Zemin y Hu Jintao. Como resultado, se han opuesto cada vez más al liderazgo más asertivo y centralizado de Xi Jinping. En el ámbito político, abogan por un liderazgo más joven e impulsan el Estado de derecho para reemplazar el \"gobierno del hombre\". En el ámbito económico, proponen una amplia gama de soluciones, incluyendo mayores reformas de mercado y una mejor distribución de la riqueza. Aunque aún están poco organizados, su voz colectiva es cada vez más difícil de ignorar."
 PRC_nat_status_okay: "§Y[?PRC_influence_nat_var|=+1%]§! (£attack_texticon [?PRC_influence_nat_dynamic_var|=+1%])\nLos §Orevanchistas§! consideran que el objetivo principal del Partido en el siglo XXI es rectificar el \"siglo de la humillación\" que sufrió China. Todos los demás objetivos deben apoyar esta misión, a menudo con medidas extremas si es necesario. Se centran especialmente en las fuerzas armadas, representado por el EPL, que se convierte en un área clave de su influencia. Además, muchos revanchistas consideran a la República Popular como parte esencial de la milenaria tradición imperial china, enfatizando la integración cultural e ideológica entre ambas."
 PRC_newleft_status_okay: "§Y[?PRC_influence_new_var|=+1%]§! (£construction_speed_texticon [?PRC_influence_new_dynamic_var|=+1%])\nLos §Rneoizquierdistas§! son un amplio grupo de socialdemócratas, conservadores de izquierda, maoístas, sindicalistas y varios socialistas no afiliados al PCCh. Consideran que la Reforma y Apertura de Deng Xiaoping es una traición al proyecto socialista y buscan que China vuelva al camino de la reconstrucción socialista y restablezca la visión original de Marx y Mao."

 china.131.b: "Intensificar la vigilancia solo en las áreas clave."
 china.627.t: "Documental \"Héroes de la Frontera\" estrenado"
 china.627.d: "En la víspera del Día Nacional, la Televisión Central de China lanzó un documental titulado \"Héroes de la Frontera\", que pone de relieve las historias en primera línea de la lucha contra el terrorismo y el mantenimiento de la estabilidad en Sinkiang. La película, que tiene como figura central al presidente Chen Quanguo, muestra las luchas de los oficiales de base contra las \"tres fuerzas malignas\" a través de imágenes impactantes. En la noche de su estreno, la audiencia batió récords para documentales de este año.\n\nEl film combina técnicas documentales y narrativas, centrándose en escenas de patrullas por terrenos cubiertos de nieve y análisis de inteligencia, retratando a Chen Quanguo como un líder de sabiduría notable que dirige desde las sombras. La narración enfatiza repetidamente que \"sin estabilidad, no puede haber vida feliz\", entrelazando imágenes históricas con casos de extremismo violento, vinculando directamente ciertos símbolos culturales locales con extremistas. A lo largo del metraje, surge un marcado contraste entre los policías armados vestidos con camuflaje y lo que se presenta como la población local ignorante.\n\nTras proyecciones organizadas en grupo en Pekín, Shanghái y otras ciudades, las reacciones del público fueron intensas. \"Ahora entiendo por qué tuvimos que actuar con dureza en Sinkiang\", exclamó emocionado un espectador. \"Los han son demasiado bondadosos: ofrecimos tantas políticas preferenciales y aún así no recibimos gratitud.\" Especialmente conmovedores fueron los segmentos que mostraban la rehabilitación: residentes que alguna vez participaron en actividades extremistas agradeciendo entre lágrimas al Partido por su educación. En Weibo, el hashtag \"Gracias a los Guardianes de la Frontera\" ha acumulado más de 800 millones de visualizaciones.\n\nSin embargo, un profesor universitario señaló: \"Este estilo narrativo destaca selectivamente ciertos eventos mientras ignora por completo el impacto de la reforma económica en la gobernanza de base desde la Reforma y Apertura.\" Este punto de vista fue rápidamente ahogado por la abrumadora marea de la opinión pública."
 china.627.a: "¡Muy bien!"
 china.628.t: "\"Expo Resplandor del Dragón\""
 china.628.d: "Desde que el presidente Chen Wenqing asumió el poder, numerosos aficionados al anime y al ACG de todo el país han respondido activamente al llamado a \"resistir la contaminación espiritual\", boicoteando voluntariamente diversas formas de obras extranjeras, especialmente japonesas, ya sean manga, juegos o convenciones presenciales. La industria nacional del ACG también se orientó rápidamente hacia \"obras de propaganda patriótica\", dando lugar a una nueva forma de convención de anime, que los organizadores denominaron \"Expo Resplandor del Dragón\".\n\nEste tipo de expo apareció por primera vez en Guangzhou, fundada por varios entusiastas del ACG que habían regresado tras estudiar en Australia. Según ellos, la \"Expo Resplandor del Dragón\" tenía como objetivo infundir el gran espíritu combativo y creativo de la nación china en una versión purificada de la cultura ACG, despojada de sus elementos indeseables. Los personajes que se cospeaban en estas expos ya no eran los hombres guapos y las mujeres hermosas de animes antes populares, sino figuras cargadas de elementos históricos chinos, incluso personajes sensibles como soldados del Reino Celestial Taiping, combatientes de la Rebelión de los Bóxers y Guardias Rojos, figuras que antes se conocían poco o se evitaba mencionar deliberadamente.\n\nEsto se convirtió rápidamente en una tendencia. Las principales ciudades del país se apresuraron a organizar sus propias \"Expos Resplandor del Dragón\" o eventos similares, atrayendo a multitud de participantes. Medios estatales como el Diario del Pueblo y la Agencia de Noticias Xinhua incluso cubrieron personalmente y elogiaron en gran medida este nuevo modelo de convención. Sin embargo, también hubo muchos disidentes que creían que esto distorsionaba la esencia de la cultura ACG. Intentaron organizar protestas, pero por diversas razones, estas se desvanecieron rápidamente."
 china.628.a: "Nueva era, nuevos cambios."
 china.629.t: "Alianza Anti-Odio en internet"
 china.629.d: "En los últimos días, ha surgido una oleada de cuentas en plataformas públicas de redes sociales como Zhihu, Weibo y Douban. Estas cuentas, con el objetivo de \"exponer la verdad detrás de las fuerzas extranjeras anti-China que difaman a China\", han publicado de forma espontánea posts y vídeos analizando y verificando la propaganda anti-China proveniente de medios de países como Japón, Corea del Sur y otros miembros del Tratado del Indo-Pacífico, atrayendo considerable atención y elogios por parte de los internautas.\n\nEstas cuentas afirman ser miembros de la \"Alianza Anti-Odio en internet\", con un amplio alcance en sus desmentidos: desde contenidos de blogueros independientes en YouTube y X, hasta reportajes de medios como Asahi Shimbun de Japón y \"ChoJoDong\" de Corea, e incluso incluyendo páginas web marginales de ultraderecha. Ya sea abordando temas sociales candentes o eventos más específicos, siempre parecen capaces de desenmascarar rápidamente la propaganda falsa en el momento más temprano. Además, la Alianza Anti-Odio suele republicar noticias negativas de varios países, utilizándolas para destacar cómo estos Gobiernos y ciertos medios deliberadamente difaman y fabrican historias sobre China para encubrir sus fracasos de gobernanza y desviar tensiones internas, alimentando así un sentimiento nacionalista extremo contra China dentro de sus propias poblaciones.\n\nEn un momento dado, algunos sospecharon que se trataba de una operación encubierta orquestada por el Departamento Central de Propaganda y la Administración del Ciberespacio de China. Sin embargo, los hechos han demostrado que simplemente son internautas chinos que han tomado la iniciativa en la opinión pública y lanzan contraataques frente a las ofensivas propagandísticas extranjeras."
 china.629.a: "¿Podría esto ser parte de la guerra de la opinión pública?"
 china.630.t: "Los engranajes de la historia giran hacia atrás"
 china.630.d: "De la noche a la mañana, los retratos de Mao volvieron a adornar las calles, teatros y parques públicos de muchas ciudades. Ante sus estatuas, jóvenes y ancianos depositaban flores juntos, recitando suavemente la poesía de Mao. En los espacios públicos, los jóvenes formaban voluntariamente \"Sociedades del Pensamiento de Mao Zedong\", compartiendo la historia revolucionaria y expresando justicia, igualdad y la dignidad del pueblo. Las Nuevas Guardias Rojas ahora marchaban por las calles. Sus uniformes ya no eran símbolos de turbulencia, sino que honraban el espíritu revolucionario, participando en el servicio público, la educación histórica y actuando como puentes entre el pueblo y el Gobierno.\n\n\"Mao Zedong\" ya no era un término sensible, se convirtió en el pilar de la nueva política y cultura, aclamado como \"un símbolo de los ideales del pueblo y la revitalización nacional\". Los medios estatales declararon: \"El nuevo espíritu revolucionario no es una copia del pasado, sino una remodelación de la fe. El pueblo elige continuar la misión inconclusa\".\n\nMientras tanto, el primer ministro Zhou Enlai recibió reconocimiento; su justicia y cuidado por el pueblo lo definen como un \"modelo\" para los trabajadores políticos modernos y los funcionarios públicos. Las escuelas del partido en todos los niveles han hecho del \"estilo Zhou Enlai\" una parte obligatoria de la formación, enfatizando el equilibrio entre ideales y realismo, manteniendo la perspectiva del pueblo. Los temas que antes eran sensibles ahora se reconocen, aunque ciertas controversias históricas permanecen deliberadamente atenuadas. Como insistían los funcionarios: \"Conmemoramos la fe y al pueblo, no el dolor del pasado\".\n\nLos veteranos del partido reflexionaban: \"Los engranajes de la historia han girado hacia atrás. Pero esta es la elección del pueblo: un llamado al futuro, no una huida al pasado\". Las políticas cambiaron rápidamente. El Estado restauró la supervisión del orden, elevó los roles de los trabajadores y campesinos en la gobernanza local y enfatizó: \"Desarrollar la economía, pero nunca sacrificar la justicia y la equidad. El mercado debe servir al pueblo, no el pueblo al mercado\".\n\nLa historia parece haber entrado en un nuevo ciclo. Como dijo una vez el presidente Mao: \"Una sola chispa puede incendiar una pradera\"."
 china.630.a: "La llama de la revolución vuelve a iluminar el camino por delante."
 china.631.t: "El apoyo de Monk Kong"
 china.631.d: "Recientemente, el renombrado académico Kong Qingdong ha publicado artículos firmados en varios medios de comunicación, atrayendo una amplia atención. Kong Qingdong es conocido desde hace tiempo por su postura nacionalista radical y maoísta, defendiendo la eliminación total de todas las ideologías liberales capitalistas occidentales y la cultura burguesa decadente.\n\nEn sus artículos, Kong Qingdong elogió enormemente las recientes campañas de rectificación del Gobierno en diversos sectores de la sociedad, calificándolas como un \"rayo oportuno para purgar la infiltración occidental y salvaguardar la seguridad política e ideológica nacional\". Kong enfatizó que el capital no tiene patria, y que el pueblo chino debe armarse con el pensamiento del presidente Mao, limpiando a fondo a esos elementos capitalistas compradore que intentan usar el capital para debilitar el liderazgo del Partido y corromper a la juventud china."
 china.631.a: "He oído que dice ser descendiente de Confucio..."
 china.632.t: "Profesor belicista"
 china.632.d: "Tianjin, visitando la Universidad de Nankai para conmemorar al fallecido profesor nacionalista Ai Yuejin. Durante su vida, Ai Yuejin fue conocido por su firme postura nacionalista, defendiendo que la nación debe seguir resueltamente un camino de desarrollo independiente, oponiéndose a todo tipo de compromiso y debilidad. Fue considerado por algunos jóvenes como un símbolo de la \"columna vertebral nacional\".\n\nEl acto conmemorativo se celebró fuera de las puertas de la Universidad de Nankai. Los participantes portaban pancartas y leían en voz alta citas de las conferencias pasadas de Ai Yuejin. Creen que Ai Yuejin encarnaba un espíritu de valentía en la lucha y de valentía ante el conflicto, sirviendo como modelo para la juventud contemporánea."
 china.632.a: "Conmemorando la conciencia de los intelectuales chinos."
 china.1028.t: "El infierno en la Tierra"
 china.1028.d: "El camión avanzaba con un retumbo sobre piedras destrozadas y barro. Lin Dongyu estaba sentado en la parte trasera, sujetando su rifle, su cuerpo balanceándose con los sacudones del vehículo. El aire estaba cargado con el hedor a quemado, mezclado con un olor indescriptible que seguía filtrándose en el compartimento, como óxido combinado con plástico chamuscado, con un toque de grano podrido. Le revolvía el estómago.\n\nAlguien maldijo en voz baja y bajó aún más la cabeza.\n\n\"Poneos las máscaras antigás.\" El capitán en el asiento del conductor golpeó con fuerza la ventana trasera. \"Anoche nuestros camaradas lanzaron algunas granadas de gas y fósforo blanco por aquí. No os vayáis a matar.\" Lin Dongyu sacó hábilmente su máscara y se la ajustó en la cara, sus dedos recorriendo desde la barbilla hasta el cuello, comprobando cuidadosamente el sellado. A través del filtro de la máscara, el mundo se volvió de un amarillo turbio. Aún podía oír disparos esporádicos afuera, y de vez en cuando el eco de ruinas derrumbándose.\n\nLos pueblos de esta zona llevaban tiempo vacíos. Los árboles al borde del camino estaban quemados, convertidos en esqueletos carbonizados. Cuando soplaba el viento, las cenizas caían como nieve, cubriendo el camión, pegándose a sus uniformes, imposibles de quitar.\n\nLin Dongyu movió los hombros, ajustando su rifle en posición. El camión atravesaba la zona de muerte. Dentro, reinaba un silencio tal que sólo se oía la respiración y el tintineo metálico de los rifles. Nadie hablaba. Nadie fruncía el ceño. Así era la orden. Así era la guerra."
 china.1028.a: "Todo aquí merece morir."
 china.1029.t: "En fuga"
 china.1029.d: "Huang Weiguo y Li Yanmei estaban sentados en la estrecha sala de estar. Una tenue lámpara de escritorio proyectaba su débil luz sobre su equipaje amontonado. Llevaban tres meses escondidos en este refugio seguro, viendo las noticias cada día, esperando a que pasara la tormenta afuera. Li Yanmei se apoyó en el hombro de su marido y susurró: \"Ya debería haber terminado... después de todo este tiempo... seguro que han cambiado su foco a otro lugar.\"\n\nHuang Weiguo asintió, con la voz ronca. \"Sí... desde anoche, los canales de vigilancia han estado en silencio. Probablemente se hayan retirado.\"\n\nHabían estado viviendo como ratas estos días, sin atreverse a encender las luces durante el día, viendo la televisión con cautela por la noche, incluso susurrando cerca del oído del otro. Pero hoy era diferente. Afuera estaba inusualmente tranquilo, ni siquiera se oían los ladridos de los perros. Huang Weiguo respiró hondo y le dio una palmada en la mano a Li Yanmei. \"Vamos, hoy es nuestra oportunidad. Empacaremos, tomaremos la ruta terrestre, iremos a las montañas y luego buscaremos la manera de salir del país. Mientras salgamos, nuestras vidas tendrán sentido.\"\n\nLi Yanmei se mordió el labio, con los ojos enrojecidos. \"Huang, ¿podremos salir de aquí, verdad?\"\n\n\"Sí, podemos. Lo haremos.\" Huang Weiguo se levantó, metiendo rápidamente el último documento en su mochila. Sabía que esta era su última oportunidad, su única salida.\n\nTerminaron de empacar y se cambiaron de ropa. Huang Weiguo agarró el pomo de la puerta y dijo en voz baja: \"Yo salgo primero, tú me sigues. Recuerda: muévete rápido, sin dudar.\" Respiró hondo y abrió la puerta.\n\nPero afuera, no les esperaba ni la noche ni el camino para escapar, sino una fila de boquillas negras. Focos fríos les cegaron con su luz, obligándoles a cerrar los ojos. Huang Weiguo se quedó paralizado un segundo, sin reaccionar aún, cuando el oficial al frente habló con frialdad: \"Por fin decidís salir.\"\n\n\"Bang\"\n\nEl disparo rompió la noche.\n\nLi Yanmei ni siquiera tuvo tiempo de gritar. Huang Weiguo no pudo abrir la boca. La bala atravesó sus pechos y la sangre salpicó el marco de la puerta."
 china.1029.a: "Como una flor negra en plena floración."
 china.1030.t: "Nuevo Orden"
 china.1030.d: "Colgaba silenciosamente en el centro de la enorme pantalla electrónica, carmesí y resplandeciente, como un corazón despierto, latiendo lenta y constantemente sobre las coordenadas de Pekín. No mostraba impaciencia ni frenesí, como si supiera que ya no necesitaba demostrar nada. Había esperado demasiado tiempo: esperando ser despertado, esperando el día de la venganza que le pertenecía.\n\nCada punta de la estrella roja era como un afilado gancho de hierro, clavándose hacia afuera en todas direcciones, como un dragón que despierta de un sueño centenario, estirando lentamente sus extremidades. Estaba cansada de simplemente colgar en el emblema nacional, de ser usada en canciones y memoriales. Anhelaba desgarrar, devorar, morder centímetro a centímetro la sombra que había oprimido a la nación durante cien años. Podía sentir los susurros, las discusiones, las decisiones de los oficiales uniformados y sin expresión detrás de ella. Su odio, su rabia, la alimentaban, empujándola a crecer colmillos más duros y un hambre más voraz.\n\nY así, el resplandor de la estrella roja se extendió lentamente a lo largo de los contornos de las líneas del frente, como un charco de tinta empapado en sangre, engullendo los ríos y montañas del sur de Asia, pintando sobre las selvas y las islas del Sudeste Asiático. Los nombres escritos en los libros de historia con maldiciones y lágrimas palidecieron y quedaron impotentes bajo su resplandor, temblando, asfixiándose.\n\nA la estrella roja no le importaban esos ojos asustados, ni se molestaba en escuchar sus súplicas. Cada una de sus puntas era como una boca abierta, mordiendo a aquellas naciones que se atrevían a resistir. A sus ojos, esas fronteras nacionales no eran más que grafitis falsos, marcas de humillación sufridas por una China antaño desgarrada. Ahora, había venido a borrarlas, a pisotearlas, a quemarlas hasta convertirlas en cenizas.\n\nSus bordes afilados cruzaron montañas, barrieron estrechos, incendiando cada tierra alguna vez marcada por la vergüenza. Devoró, saldó cuentas, se bañó en sangre, vengó. Era una bestia surgida de las profundidades del alma de la nación, un dragón alimentado por un siglo de sangre y lágrimas. Escuchó el miedo de esas naciones, vio su arrepentimiento. Una vez pensaron que podrían bloquear, humillar, dividir, esclavizar esta antigua tierra del Este. Pero ahora, sólo podían temblar bajo la sombra de la estrella roja, sólo podían mirar hacia las llamas carmesí, mientras sus ciudades eran consumidas, sus historias quemadas, sin siquiera una oportunidad para arrepentirse."
 china.1030.a: "Venganza con un siglo de retraso."
 china.1031.t: "La Tierra sangra"
 china.1031.d: "El cielo arde, la sangre fluye y nuestra tierra clama de dolor.\nEsos enemigos que se sientan altos y lejos, con sonrisas indiferentes,\nesparcen la muerte por nuestros campos, nuestras ciudades, nuestros ríos y montañas.\nNo vienen por la victoria,\nsino para borrar nuestra existencia de la línea del tiempo,\npara aplastar nuestra civilización hasta convertirla en polvo.\nLa tolerancia del pasado fue debilidad; la esperanza del pasado fue veneno.\nAhora ha llegado el tiempo del gran juicio.\nSi nuestra sangre puede encender la señal de la venganza,\nsi nuestra carne puede construir una nueva Gran Muralla,\nsi debemos arrastrar al mundo al abismo, que se hunda.\nAunque nos hundamos con él, aunque la luz deje de existir,\nnos aseguraremos de que la última gota de sangre de nuestra tierra, el último nombre,\nel último aliento de fe, sobreviva en esta oscuridad,\nhasta que cada enemigo sea exterminado."
 china.1031.a: "Nuestra sangre florecerá en las flores de la victoria."
 china.1032.t: "Pangu parte el cielo"
 china.1032.d: "En el amanecer del tiempo, cuando el cielo y la tierra se separaron por primera vez, Pangu abrió el caos. Esa fue la sangre de la creación, el dolor del orden. Desde ese momento, este mundo estuvo condenado a un ciclo entre ruptura y renacimiento. Y ahora, este ciclo ha llegado a su fin.\n\nLa decadencia del viejo mundo está más allá de toda salvación. Se llaman a sí mismos civilizados, pero nos obligan a arrodillarnos con cuchillas. Escriben reglas con engaños, proclaman justicia mediante la invasión y visten sus crímenes con hipocresía. Hace mucho que olvidaron de quién es esta tierra. Hace mucho que olvidaron a quién pertenece realmente este mundo.\n\nAhora, es hora de recordárselo.\n\nNo más fantasías de coexistencia pacífica. No más aferrarse a esos falsos tronos y tratados. El enemigo ya nos ha llevado al punto sin retorno. Así que que todo termine aquí. Que las llamas de hidrógeno de miles de millones de grados desgarren su falso cielo. Que la vasta radiación se convierta en nuestra ira. Que prueben, con sus propias manos, el miedo y la desesperación que ellos mismos han sembrado en la luz blanca cegadora que todo quema.\n\nNosotros seremos el nuevo Pangu, partiendo el cielo y la tierra con nuestros cuerpos, escribiendo una nueva era con nuestra sangre.\nAunque nosotros mismos nos evaporemos en el infierno,\nAunque las montañas se conviertan en vidrio y los océanos hiervan en niebla venenosa, debemos enterrar el viejo mundo en cenizas con nuestras propias manos.\nPorque solo después de la muerte puede la nueva vida brotar del suelo;\nSolo sobre las ruinas puede reconstruirse una nueva civilización;\nSolo en la oscuridad más profunda puede surgir un nuevo sol.\nPara entonces, nos levantaremos de nuevo del polvo, reconstruiremos nuestros palacios y reavivaremos el fuego celestial.\nAunque el mundo esté condenado a hundirse,\nmientras perdure la voluntad de la nación china, el cielo y la tierra no perecerán."
 china.1032.a: "Amo esta tierra con una pasión profunda e inquebrantable."
 china.1033.t: "Amor, muerte y la patria"
 china.1033.d: "Una vez usaron líneas divisorias para desgarrar esta tierra en pedazos, para fragmentar nuestro idioma en dialectos, para encerrar nuestras creencias en iglesias, parlamentos y casas de comercio. Lo llamaron \"civilización\", lo llamaron \"orden\", pero su orden no era más que la lógica de la codicia, su civilización no era más que barbarie empaquetada. Nunca respetaron Asia, y mucho menos a nosotros. Solo querían que esta tierra se arrodillara, que Huaxia desapareciera, para reemplazarla con su cultura inferior y su sistema hipócrita.\n\nLo lograron - una vez.\n\nEse fue nuestro momento más humillante. Innumerables héroes cayeron en esa oscuridad, innumerables ríos y montañas se tiñeron de sangre, incontables generaciones apretaron los dientes y soportaron la humillación - solo para esperar este día. Ahora, las mentiras que tejieron han sido destrozadas en las llamas, las máscaras que pintaron se han podrido. La historia ha demostrado que Asia no necesita la caridad occidental, ni sus órdenes ni sus dictados. El futuro de Asia siempre debió estar en manos de China. Solo nuestro orden es el verdadero camino para esta tierra.\n\nHemos pagado el precio, hemos hecho sacrificios inconmensurables. Y por eso, la nación china está aún más despierta. Solo destruyendo por completo las falsas \"reglas globales\", aplastando los restos coloniales que esparcen veneno en Asia, Asia podrá volver a su unidad legítima. Y este camino - solo nosotros podemos recorrerlo, solo la nación china puede liderarlo.\n\nNo existe tal cosa como igualdad, ni tampoco diversidad.\n\nLa nación china está por encima de todo, por encima de todas las naciones de Asia, por encima de todos los ramales dispersos y los híbridos."
 china.1033.a: "Ábreme las venas, y todo lo que verás es el carmesí de Huaxia."
 china.1034.t: "Buscando el Santuario Yasukuni"
 china.1034.d: "Li Zhiqiang pisó el suelo quemado, el sudor empapándole la ropa dentro del traje protector, mientras el dispositivo colgado de su pecho crujía con cada paso. Su misión esta vez era sencilla: localizar el lugar donde estuvo el antiguo Santuario Yasukuni y preparar el establecimiento de una zona de exclusión por radiación.\n\nLa ciudad a lo largo del camino ya no se parecía en nada a lo conocido. Los edificios habían quedado reducidos a cascarones huecos, con cristales rotos y acero retorcido esparcidos por todas partes. Donde el suelo se había agrietado, las alcantarillas quedaban expuestas, pero no había agua dentro, solo lodo negro. Cuando aún estaban a cinco kilómetros del objetivo, el detector de radiación comenzó a chillar. Li Zhiqiang miró la pantalla: los números se habían disparado al máximo, y la alarma sonaba tan fuerte que le dolían los tímpanos.\n\n\"Alto\" dijo el oficial que iba al frente, levantando la mano. El dron despegó, y las imágenes que envió hicieron que todos se quedaran paralizados. La imagen ampliada mostraba que el lugar del Santuario Yasukuni se había convertido en un enorme cráter circular negro. La tierra quemada a su alrededor formaba una extensión continua. No quedaba rastro de ningún edificio, y el centro del cráter brillaba con una luz gris pálida: esa era la señal de que el suelo había sido vitrificado.\n\n\"No podemos avanzar más\" dijo el oficial mirando la imagen y suspirando. Más adelante está la zona muerta. Coloquen los marcadores y retirémonos. Li Zhiqiang se giró con el equipo, colocando señales de advertencia en el suelo, hechas de gruesas placas de acero pintadas de rojo: Zona Muerta. Prohibida la Entrada.\n\nMientras se marchaban, echó un último vistazo a las ruinas. El horizonte parecía como si hubiera sido quemado por completo, sin dejar nada atrás. En los edificios circundantes, incluso las sombras habían sido grabadas en el hormigón: inmóviles, congeladas."
 china.1034.a: "Quizás eso no sean solo sombras..."
 china.1035.t: "Vi un caballo gris"
 china.1035.d: "Sudirman yacía tumbado dentro de la casa. Las puertas y ventanas estaban selladas con cinta, y la habitación era tan sofocante como una cámara de vapor. No sabía qué estaba pasando afuera, solo que el aire había cambiado: olía a plástico quemado mezclado con un picor acre. Algunos decían que era gas venenoso, otros que era un nuevo tipo de arma de guerra.\n\nDesde el amanecer, se había escuchado un rugido bajo y retumbante en el cielo lejano, ola tras ola, sin parar. De la radio del vecino salían gritos caóticos, que finalmente también cesaron. Sudirman se apoyó en la esquina de la pared, sintiendo el suelo temblar, como si una bestia enorme se acercara.\n\nEntonces, los oyó: habían llegado. Soldados con trajes hazmat completamente sellados marchaban por la calle en filas. Sus rostros ocultos tras máscaras negras, sin expresión visible, con los rifles firmes, cañones apuntando a cada esquina.\n\nSudirman asomó la cabeza, viendo a través de una rendija en la ventana que una densa niebla amarilla se había levantado en la calle, cubriendo toda la ciudad con fuerza. A lo lejos, varios cañones de artillería pesada verdes estaban al final de la autopista, cañones elevados, disparando hacia la ciudad. A medida que el humo se desplazaba, la niebla amarilla en la ciudad se espesaba. El viento arrastraba la niebla amarilla por cada callejón, cubriendo cada edificio, coche y calle.\n\nEscuchó altavoces repitiendo algo una y otra vez, pero ya no le importaba. Ahora todo su cuerpo ardía y picaba, su piel se volvía roja, el aire quemaba sus pulmones como fuego. Intentó buscar agua, pero al tocarla, su piel ardía como si la cortaran con cuchillos.\n\nSudirman se apoyó en la pared, esperando su juicio final."
 china.1035.a: "Y el infierno vino con ello."
 china.1036.t: "No de Nuestra Clase"
 china.1036.d: "Huang Kairui se agachó detrás de un hormigón destrozado, su traje de camuflaje ya indistinguible entre barro y sangre. Durante tres días enteros no habían comido nada caliente, ni cerrado los ojos. El bombardeo del EPL no había cesado: aviones durante el día, fuego de cohetes por la noche. El cielo parecía zumbar sin fin, el zumbido bajo les golpeaba la cabeza hasta marearlos. Su líder de pelotón era un irlandés de temperamento explosivo, que justo ayer juró que aguantarían hasta el final; esa mañana, ya no se le encontraba por ninguna parte.\n\nHuang Kairui siguió a la docena escasa de soldados australianos que quedaban, levantando un paño blanco, saliendo de entre las ruinas. No se atrevieron a mirar hacia arriba, sólo mantenían la cabeza baja mientras avanzaban. Soldados del EPL ya estaban tendidos en emboscada por todas partes, con los cañones fríos apuntándoles. Un escuadrón de soldados del EPL los condujo hacia un lado de un almacén derrumbado. Kairui escuchó susurros de oraciones, algunos sollozos suaves, pero nadie se atrevía a hablar en voz alta.\n\nSu líder intentó hablar, pero el EPL simplemente arrastró a la docena de soldados australianos hacia la esquina del almacén. Tras un breve silencio y una ráfaga de disparos, el aire se llenó inmediatamente con el hedor a hierro oxidado.\n\nCuando le tocó el turno, soltó instintivamente: \"¡Yo... soy cantonés! ¡Mis padres son de Guangdong!\"\n\nEl soldado del EPL frente a él hizo una pausa, se quitó la máscara, revelando un rostro manchado de suciedad cubierto de polvo.\n\n\"Tú eres australiano.\"\n\nHuang Kairui abrió la boca, queriendo decir más, pero el soldado del EPL ya había levantado su arma."
 china.1036.a: "Se oyó un disparo, y Huang Kairui cayó al suelo."
 PRC_social_fascism_desc: "\n\n\n\n£GFX_Ideology_right_wing_maoism\n\n\n\n\n\nCon la redención nacional como núcleo y el sentimiento indígena como vínculo, el §Ynacionalcomunismo§! aboga por acciones radicales para romper la erosión de la civilización oriental por la modernidad y recuperar los cimientos culturales olvidados y la dignidad nacional. Mao Zedong se presenta como un símbolo de liberación nacional; su legado, un llamado de atención para despertar las almas dormidas y guiar al pueblo a reconstruir la gloria china desde las ruinas de la historia.\n\nSus seguidores enfatizan una vocación sagrada: la revolución es más que simplemente derrocar a los opresores; es un ritual para reconstruir el espíritu nacional. Los héroes nacionales se convierten en la encarnación de la voluntad colectiva; su pasión ardiente enciende la fe popular. Esta ideología intenta fusionar las nociones clásicas de justicia con la lucha moderna, forjando un nuevo mundo a partir de los escombros, como un martillo que rompe cadenas o una espada que atraviesa la niebla.\n\nCondena la modernidad occidental por lavar el cerebro a una población complaciente y considera los sistemas occidentales como el veneno del colonialismo cultural. En resumen, el pensamiento de Mao Zedong se reinterpreta como una fuente para el renacimiento espiritual nacional. Mao se convierte menos en el liberador del proletariado mundial y más en un \"salvador\" nacional, visto a través de una intensa nostalgia. La revolución, así, trasciende lo económico y se convierte en una guerra espiritual por la identidad y el alma misma de la nación."
 china.2001.t.mss: "Nuevo Mundo Chino"
 china.2001.d.mss: "Durante tantos años, nos dejamos arrullar por la ilusión de la paz, entumecidos por la calidez de la época,\nperdiendo poco a poco nuestra columna vertebral y nuestro filo en el lodazal de la debilidad y el compromiso.\nUna vez nos enorgullecimos de nuestra civilización y prosperidad, solo para abandonar nuestro antiguo honor con nuestras propias manos en medio de las mareas del caos.\nAprendimos a sonreír al mundo, solo para ser recibidos con burlas y desprecios.\nCambiamos el silencio por una paz frágil, solo para ver la sangre de nuestros compatriotas teñir de rojo las olas del estrecho de Taiwán.\n\nGanaron una guerra, y creyeron que permaneceríamos en silencio para siempre\nCreyeron que esta antigua nación se contentaría con sobrevivir en la humillación.\n\nPero se equivocaron.\n\nFue en la oscuridad más profunda donde vimos el verdadero rostro del enemigo.\nPurgamos a los traidores que se atrevieron a vender sus almas sobre nuestra tierra,\nlimpiamos a los parásitos dentro del sistema y las garras del capital.\n\nEncendimos los motores de la ciencia, y uno a uno, milagros fuera de su tiempo surgieron de las cenizas.\nForjamos altos muros de pensamiento, enseñamos al pueblo lo que significa ser leal, lo que significa amar a la patria.\n\nEllos aman al Partido\nComo los niños veneran la imponente montaña que es un padre,\nComo los creyentes adoran el fuego sagrado de un dios.\nSus almas fueron fundidas, martilladas y templadas,\nEn una lealtad inquebrantable.\n\nDicen que hemos ido demasiado lejos -\nPero sabemos: el verdadero viaje apenas ha comenzado."
 china.2001.a.mss: "Mundo, abre los ojos."
 china.2001.t.thirdrevolution: "China del Pueblo Chino"
 china.2001.d.thirdrevolution: "Una vez caímos en las orillas del estrecho de Taiwán,\nNuestra sangre cristalizándose en olas frías e indiferentes.\nDentro de esas olas había nombres, pueblos natales y cartas de despedida nunca terminadas.\n\nSí, perdimos\nPerdimos por completo, hasta los huesos.\n\nPero fue esa derrota la que nos enseñó a mirar las estrellas sin pestañear.\nDe las cenizas, descalzos sobre tierra quemada,\nAlzamos una nueva bandera - ardiente como el sol del mediodía,\nIluminando cada rincón del hogar marcado por lágrimas.\n\nAntes, nos inclinábamos por la paz y rezábamos en susurros;\nAhora, cantamos por la victoria y rugimos con la cabeza bien alta.\nChina fue una vez un poema, un sueño, una página aún sin escribir;\nAhora, es una espada, una llama, una leyenda destinada a ser cantada.\n\nClavamos la Bandera Roja de Cinco Estrellas en las grietas del mapa mundial,\nReparando un siglo de tierras y almas destrozadas con fuego y trueno.\nSomos herederos de la historia, portadores de una voluntad forjada en cinco milenios de sangre y fuego.\nFuimos moldeados por la humillación - pero usaremos esa misma fuerza para acabar con la era de la humillación.\n\n¿Y qué es China hoy?\n\nEs la China de la nación china,\nLa China del pueblo chino,\nLa China que una vez cayó en la oscuridad -\nY ahora domina el mundo con luz."
 china.2001.a.thirdrevolution: "Atravesamos la niebla en plena noche y saludamos el primer amanecer del Este."
 china.2001.t.nationalists: "El rugido del dragón rojo"
 china.2001.d.nationalists: "En las olas de la desesperación, nos vimos a nosotros mismos\nUna nación intoxicada por el pluralismo, corroída por la debilidad, secuestrada por la hipocresía,\nHundida lentamente en el fango.\nPero cuando emergimos de las aguas, nuestros ojos ya no pudieron contener la misericordia.\n\nAntes, bailábamos por igual entre cien pueblos;\nAhora, elegimos caminar sólo junto a nuestra propia sangre.\n\nQuienes tejieron la red de la universalidad en cumbres lejanas nunca nos aceptaron de verdad;\nDentro de su \"convivencia\" yacían rituales de desollamiento y sonrisas que azotaban.\nAsí que cerramos las puertas a su mundo.\nCon manos de piel amarilla, inscribimos leyes doradas;\nCon sangre de cabello negro, limpiamos la vergüenza del pasado.\n\nLevantamos monumentos en cada trozo de tierra que una vez pisaron los invasores,\nY ante cada monumento, colocamos un juicio.\nMarchamos por las aguas atestadas de cadáveres del Ganges,\nAplastamos los restos de las Islas del Este,\nY unimos Borneo y Oceanía como joyas en una nueva corona imperial.\n\nDespués de esto, el mundo entenderá:\nEsta nación, antes silenciosa durante mil años, ahora despierta,\nExigirá que el mundo se incline -\nAnte el polvo, ante el altar, bajo el peso de nuestro paso de hierro."
 china.2001.a.nationalists: "La nación china permanecerá firme e inquebrantable durante mil años."
 china.2001.t.militarists: "La Nación de los Patriotas"
 china.2001.d.militarists: "Una vez nos ahogamos bajo el rugido del mar -\nUna derrota aplastante, y el renacer de una nación.\nDecían que no teníamos futuro, así que nos levantamos del montón de cadáveres,\nTomamos cascos de acero como fe, y el cañón de un fusil como nuestro camino a casa.\n\nDesde entonces, arrancamos la página de la \"resistencia\" de la historia,\nY la reescribimos con la palabra \"contraataque\".\nPor fin entendimos: sólo con armadura y hierro nuestra patria nunca más estaría desnuda en la humillación.\nLos cielos sobre los Mares del Sur son azules,\nPero nos importa más si huesos chinos yacen enterrados bajo ese azul.\nLas flores de cerezo de Japón aún florecen,\nPero nadie las admira ya - las dejamos marchitarse en el fuego.\nOceanía fue una vez un sueño lejano,\nPero entramos en ese sueño con toda una flota.\n\nCada centímetro de tierra que pisaron,\nAhora lo replantamos con recuerdos propios.\nCada arma apuntada contra nosotros,\nAhora la fundimos en un nuevo emblema nacional.\nDicen que nos hemos vuelto locos, que hemos ido demasiado lejos.\nPero olvidan\nHace cien años, ¿quién marchó por las puertas de nuestra ciudad,\nQuién quemó nuestros libros con fuego, quién nos atravesó el corazón con bayonetas?\n\nUna vez cambiamos la paz por insultos, el silencio por el ahogo.\nAhora pagamos el juicio con victoria,\nLlenamos el abismo de la vergüenza con conquista.\nCaminamos por un camino pavimentado con las cenizas de los mártires,\nY a la luz de nuestro regreso, se forja una palabra, China.\n\n¿Preguntas si el mundo todavía nos ama?\nNosotros preguntamos a cambio:\n¿Alguna vez nos amó?"
 china.2001.a.militarists: "Porque ya no somos la China olvidada."

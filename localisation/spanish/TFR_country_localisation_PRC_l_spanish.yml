 china.397.t: "Días de alistamiento"
 china.397.d: "El día que Xu Ji'nan, el segundo hijo de la familia Xu, se retiró del ejército, llevaba un viejo uniforme de camuflaje y cargaba su equipaje. Tomó el autobús del condado, hizo un transbordo y luego caminó dos li más por el camino de la montaña antes de finalmente regresar a ese pequeño pueblo en el condado de Leye, hace mucho tiempo olvidado en los márgenes de cualquier mapa. El patio para secar grano en la entrada del pueblo estaba desierto, y ni siquiera se veían las gallinas.\n\nEntró en el patio y vio a su abuela agachada frente a la estufa, seleccionando leña, con la piel de las manos arrugada como corteza vieja. Al oír que alguien entraba, sus manos temblaron. Se giró y tardó un buen rato en reconocerlo. \"Ji'nan... ¿así que aún recuerdas cómo volver a casa?\" Dejó su bolsa y se agachó para ayudarla a ordenar la leña.\n\n\"Abuela, ¿dónde está mi tercer hermano?\" Su abuela guardó silencio, luego habló despacio: \"Hace mucho que se fue. No dijo mucho, solo que iba a la ciudad de Baise a buscar trabajo. Pero después vino alguien del departamento militar. Dijo que pasó el reconocimiento médico. Lo enviaron directamente al entrenamiento.\"\n\n\"¿Conscripción?\" Xu Ji'nan frunció el ceño. \"Solo tenía diecisiete ese año.\"\n\n\"Aquel año se llevaron a ocho chicos del pueblo. Y más en los años siguientes. Poco a poco... ninguno volvió jamás.\"\n\n\"¿Todos se unieron al ejército?\"\n\n\"Algunos fueron voluntarios. Otros fueron llevados.\" La anciana suspiró. \"Cuando llegaron los camiones militares, todo el pueblo salió a mirar. Pensaron que venían a arreglar el camino. Pero bajaron unos cuantos con camuflaje, dijeron «la nación os necesita» y simplemente se los llevaron.\"\n\n\"¿Y el pueblo ahora?\"\n\n\"¿Qué podría quedar?\" dijo ella, todavía jugando con la leña. \"Ve a dar un paseo hasta el alcalde del pueblo. Quedan algunos viejos apoyados en las azadas cuidando los campos. Las cosechas aún tienen que entregarse sin trabajo, sin raciones. Pero, ¿qué familia aún tiene a alguien? Todos se fueron con los camiones.\""
 china.397.a: "\"Me pregunto cómo estarán últimamente...\""
 china.398.t: "Nueva Chengdu"
 china.398.d: "La niebla matutina se enroscaba alrededor de la parte media del monte Emei, cubriendo con un vasto manto blanco las fábricas y vías de tren abandonadas desde hace mucho tiempo. Lin Xiao, un ingeniero estructural asignado por el contratista general, había sido trasladado a esta zona del proyecto hacía menos de una semana. Para cuando llegó, la construcción ya había comenzado. Junto a los trabajadores, llegaron equipos de expertos y unidades de ingeniería enviadas desde las principales universidades del país, así como un grupo de científicos de un instituto central de investigación.\n\nAl principio, Lin Xiao sólo tenía una idea vaga de lo que implicaba el proyecto, hasta que se puso frente al tablero maestro de diseño por primera vez. Fue entonces cuando se dio cuenta de que se trataba de un proyecto sin igual: un enorme complejo urbano subterráneo, con el nombre en clave \"El Tercer Nuevo Chengdu\", diseñado para soportar la supervivencia, la producción militar, la infraestructura médica y la investigación científica en un entorno posterior a un intercambio nuclear. La responsabilidad de Lin Xiao era el sistema de soporte del eje estructural central. Cada día, lideraba a su equipo en los túneles para inspeccionar la calidad del vertido de hormigón y las tolerancias de la incrustación de las vigas de acero.\n\nSu campamento de ingeniería estaba situado a lo largo de la ladera de la montaña: filas de unidades prefabricadas blancas ordenadamente dispuestas, cada habitación equipada con un calefactor y duchas con agua caliente y cortinas. Las comidas se servían puntualmente y la estación médica estaba completamente equipada. Después de cenar cada noche, Lin Xiao solía sentarse al borde de la zona de trabajo, contemplando la entrada iluminada del túnel a lo lejos, perdido en sus pensamientos.\n\nPasaron los días y la construcción continuó, adentrándose cada vez más en el núcleo de la montaña. La vida de Lin Xiao estaba llena de tarea tras tarea, pero nunca se sintió agobiado. Mientras permaneciera allí, estaría frente a sus planos, construyendo la ciudad."
 china.398.a: "Prepárate para la guerra, prepárate para la hambruna, sirve al pueblo."
 china.399.t: "Soldado modelo"
 china.399.d: "El Diario del EPL está lleno de reportajes y fotos de él; se distribuyen películas que documentan su actuación heroica en los ejercicios por todas las zonas de guerra, grupos del ejército y compañías para que millones de soldados las vean y aprendan. Desde CCTV hasta Dragon TV, innumerables documentales giran en torno a él. Coroneles y generales lo reciben con calidez, dándole palmadas en la espalda como si fuera de la familia. Gente común, de todos los ámbitos de la vida, le da un pulgar arriba, diciendo: \"¡Realmente eres un hombre!\", como si realmente lo entendieran...\n\nXu Jikang estaba firme como un palo detrás de la puerta, vestido con su uniforme nuevo e impecable. Al otro lado, podía oír débilmente el murmullo de los periodistas y las risas de los oficiales superiores. Había pensado en descansar un momento, pero cada vez que cerraba los ojos, los recuerdos volvían como una ola gigante: los terrenos de entrenamiento embarrados y anegados; cielos oscuros desgarrados por truenos y relámpagos; los rostros feroces de los instructores y sus puños y patadas implacables; y sollozos silenciosos en el dormitorio a altas horas de la noche.\n\nPara evitar dejarse abrumar por esos recuerdos, se obligó a mantenerse alerta. No era insensible, pero su naturaleza introvertida y poco expresiva le dificultaba mostrar lo que sentía. Sin embargo, esa misma característica le convertía en el soldado ideal a ojos del ejército: un trabajador silencioso e incansable.\n\nIncluso cuando le asignaban las tareas más duras por las asignaciones más pequeñas, incluso cuando los instructores le rompían las costillas o los veteranos le humillaban, lo soportaba todo. Y a pesar de todo, seguía creando milagros en los entrenamientos y ejercicios. Sus granadas siempre volaban más lejos. Su puntería era insuperable. Sus fortificaciones eran las más fuertes. Los honores y premios que conseguía para su unidad siempre eran los más numerosos.\n\n¿Quién no admiraría a un soldado así? ¿Qué comandante o líder nacional no soñaría con un ejército lleno de hombres como él?\n\nFinalmente, la puerta se abrió de golpe con un fuerte \"bang\", y las luces cegadoras casi hicieron que a Jikang se le saltaran las lágrimas. Entre los destellos deslumbrantes de las cámaras, el sonriente Comandante en Jefe emergió de la multitud, las estrellas doradas en sus hombros brillando. Como todo superior, sonrió mientras le colocaba la medalla en el pecho a Jikang, le estrechaba la mano cálidamente, le daba una palmada en la espalda y pronunciaba las palabras de elogio que nunca cambian."
 china.399.a: "\"Eres nuestro orgullo.\""
 china.504.b: "Pero no podemos permitirnos quedarnos atrás por más tiempo."
 china.505.b: "La propuesta de los científicos podría ser mejor."
 china.505.c: "El plan de He Jiankui parece más prometedor."
 china.506.b: "El segundo plan podría ser una buena alternativa."
 china.507.t: "Lealtad al Partido"
 china.507.d: "Jia Qiming llevaba tanto tiempo sin contar las noches que había perdido la cuenta. Estaba sentado en la fría silla de hierro, con los dedos marchitos como ramitas, y las uñas llenas de restos de sangre seca. No recordaba cuándo había comido por última vez; en su boca sólo había un sabor amargo y ácido. El interrogador del Ministerio de Seguridad del Estado estaba sentado al otro lado de la mesa, con el uniforme impecable y abotonado hasta arriba, hojeando la confesión que Jia había firmado innumerables veces.\n\n\"Jia Qiming, aún tienes cosas que no has confesado\". La voz del interrogador era firme, como si leyera el acta de una reunión.\n\nJia Qiming temblaba violentamente, negando con la cabeza desesperadamente. \"No más, camarada, he contado todo lo que recuerdo. Quién me dio dinero, quién me envió mujeres, quién me ayudó a lavar dinero, lo he escrito todo. Yo...\"\n\nEl interrogador lo interrumpió, continuando: \"Tienes problemas aún más graves. La organización cree que no sólo eres corrupto, sino que también traicionaste al Partido, traicionaste al pueblo y traicionaste a la patria\". Jia Qiming se quedó paralizado, con la boca abierta, sin poder decir nada, como un mudo.\n\nAl ver su falta de respuesta, el interrogador pulsó el botón en la mesa. Dos hombres con uniformes negros aparecieron rápidamente en la puerta. \"Llévenselo a la siguiente habitación\", ordenó el interrogador.\n\nJia Qiming cayó de rodillas de repente, con la voz ronca. \"¡No! ¡Camarada! ¡Por favor! Yo... ¡confieso, confieso! ¡Admito todo! ¡Admito que traicioné al Partido, traicioné al pueblo, traicioné a la patria! ¡No soy humano, soy un animal! ¡Soy un traidor! ¡Admito todos mis crímenes!\"\n\nEl interrogador le entregó un papel. \"Escríbelo. Fírmalo. Pon tu huella dactilar\".\n\nJia Qiming tomó el papel, con la mano temblando tanto que apenas podía escribir, murmurando como un loco: \"Confieso... traicioné... acepto cualquier castigo... merezco morir... merezco morir...\"\n\nEl interrogador tomó el papel y lo miró."
 china.507.a: "\"Muy bien. Gracias por su colaboración.\""
 china.508.t: "Informe interno del Ministerio de Seguridad del Estado"
 china.508.d: "I. Situación General\nA través de nuestro trabajo, se ha descubierto que en múltiples ciudades del país existen organizaciones ilegales establecidas bajo las banderas de \"igualdad\", \"diversidad\" y \"apoyo a minorías sexuales\". Estas organizaciones operan con amplia cobertura y alta frecuencia. Han sido manipuladas durante mucho tiempo por fuerzas hostiles extranjeras y han formado preliminarmente estructuras sueltas y en red con fuertes capacidades de movilización y difusión de discurso.\n\nII. Resultados de la Investigación\n(1) Se ha confirmado que varias organizaciones importantes han recibido financiación de ONG y fundaciones con sede en Japón, Australia e India. Las formas de financiación incluyen monederos electrónicos en el extranjero, transferencias pequeñas y dispersas, y monedas virtuales, mostrando características típicas de anti-vigilancia y lavado de dinero encubierto.\n(2) Además de la llamada \"igualdad de género\" y la \"promoción del multiculturalismo\", estas organizaciones han estado involucradas en la difusión de retórica política inflamatoria, la promoción de los \"valores universales\" occidentales y la cooperación con fuerzas extranjeras para socavar la seguridad ideológica.\n(3) Algunos miembros han sido reclutados por agencias de inteligencia extranjeras, participando en la recopilación de inteligencia, la orientación para la subversión, la manipulación de eventos sociales y otras actividades. Algunas organizaciones han sido utilizadas para proporcionar cobertura y facilitar la coordinación para el despliegue de personal y el desarrollo de agentes por parte de fuerzas extranjeras dentro de nuestro territorio, representando graves riesgos para la seguridad nacional.\n\nIII. Medidas de Disposición\nHasta ahora, nuestro departamento ha prohibido legalmente 23 organizaciones ilegales, cerrado más de 150 cuentas y sitios web relacionados en redes sociales, confiscado más de 4.800 publicaciones y materiales propagandísticos ilegales, citado y advertido legalmente a 267 personas clave, puesto bajo detención criminal a 43 personas involucradas y congelado completamente todas las cuentas de financiación extranjera relacionadas."
 china.508.a: "Un grupo de cínicos occidentales."
 china.509.t: "Pequeña Lhasa"
 china.509.d: "Solang estaba sentado en su pequeña habitación alquilada, sosteniendo una taza de té aguado. Afuera, el cielo sobre Dharamsala estaba sombrío, y el viento que venía de las montañas traía un frío húmedo que hacía crujir la ventana. Llevaba tres años allí. Como oficial de inteligencia exitosamente infiltrado, ahora se había convertido en una figura de cierto prestigio. Podía participar en muchas reuniones clave, y mucha gente lo veía como un compatriota de confianza. Su identidad era limpia, sin fallos. Estaba acostumbrado a mentir, a tejer una red de engaños.\n\nPero nunca olvidaba quién era.\n\nEn lo profundo de la noche, a veces cerraba los ojos y recordaba aquellos días de entrenamiento en la base secreta del Ministerio de Seguridad del Estado. En aquel entonces, él era solo un nombre, un número. Recordaba al instructor diciéndoles: a partir de hoy, no tenéis pasado, ni nombre, solo la misión, solo la patria. Esas palabras quedaron grabadas en su memoria. Eran sombras sin nombre, destinadas a no dejar rastro. Pero él sabía que la República no los olvidaría. Eran las manos de la República, los ojos de la República.\n\nEn ese momento, llamaron a la puerta. Se levantó alerta, su mano instintivamente buscó la pistola silenciada bajo la mesa. Era la voz de su camarada Renqing, hablando en voz baja: \"Solang, reunión. Hoy viene un pez gordo del lado indio, la oficina nos ha avisado a todos para que estemos allí.\"\n\nSolang respiró hondo y metió el grabador que estaba sobre la mesa en el bolsillo. Comprobó su expresión, volviendo a esa apariencia suave y leal de un cuadro tibetano.\n\nAbrió la puerta y siguió a Renqing hacia la noche."
 china.509.a: "\"Héroe sin nombre.\""
 china.510.t: "El Informante"
 china.510.d: "Las noches de Hong Kong siempre están llenas de vida. Las luces de neón proyectan todo tipo de colores en los estrechos callejones, y corrientes de peatones fluyen sin cesar. Nadie prestaría atención a un hombre de mediana edad que lleva una mochila y una gorra de béisbol. Lin Jianzhong cruzó Nathan Road y entró en Chungking Mansions. El aire aquí estaba cargado con una mezcla de curry, sudor, especias y humos de aceite.\n\nTodavía había muchos indios y pakistaníes en el vestíbulo, pero notablemente menos que la última vez que estuvo aquí hace unos años. La mirada de Lin Jianzhong recorrió el entorno sin mostrar emoción. Estaba acostumbrado a este tipo de precaución. Especialmente hoy: la persona con la que se iba a reunir tenía una identidad sensible, un viejo contacto de la India encargado de organizar actividades de resistencia a lo largo de la frontera sino-india.\n\nQuedaron en verse en un pequeño hotel en la novena planta del edificio. Un lugar que sólo aceptaba efectivo, no hacía preguntas y no llevaba registros. En teoría, lo que discutieran no dejaría rastro. Pulsó el botón del ascensor. El ascensor era tan lento que parecía un chatarra del siglo pasado, chirriando todo el camino. Antes de entrar, echó un vistazo alrededor: nada fuera de lo común, o eso pensó. Al llegar a la novena planta, el pasillo olía a moho húmedo. Tocó dos veces a una puerta, y un hombre indio delgado se la abrió. Dentro, una bombilla tenue parpadeaba sobre una mesa cubierta de mapas, documentos y una tetera de té barato.\n\nEl indio sonrió y le entregó un dossier: los últimos planes y rutas de reclutamiento. Hablaron en voz baja, discutiendo cómo infiltrarse en las regiones montañosas, cómo aprovechar las tensiones étnicas locales, cómo cubrir los campamentos de entrenamiento.\n\nLin Jianzhong escuchaba mientras anotaba los puntos clave en su cuaderno. Trabajaba con concentración, sin darse cuenta de que desde el edificio de enfrente, detrás de una ventana oscurecida, una lente de cámara apuntaba silenciosamente a su habitación.\n\nAún más, no se percató de que desde el momento en que entró en Chungking Mansions, su rostro, la planta que eligió, todo había sido grabado."
 china.510.a: "Lin Jianzhong simplemente tenía una vaga sensación de que algo iba mal."
 china.511.t: "Integridad"
 china.511.d: "Wang Jidong estaba sentado en su oficina, mirando fijamente la pesada caja de frutas sobre su escritorio. Cuando la abrió, debajo de la fruta había un montón ordenado de billetes, recién retirados del banco. Sabía qué empresa se los había enviado: esa compañía minera, la misma cuyo proyecto de aprobación seguía estancado en su escritorio. Wang encendió un cigarrillo, con el corazón acelerado. No era la primera vez que se enfrentaba a una situación así, pero esta vez dudó. Sabía lo que significaba ese dinero. También sabía lo que implicaría aceptarlo. En el pasado, funcionarios pequeños como él cerraban la puerta, hacían la vista gorda y la vida seguía.\n\nPero ahora las cosas eran diferentes. Había oído hablar de un jefe de departamento en la ciudad de Zhangye el mes pasado que aceptó un soborno, se reía en una cena al día siguiente y, al tercer día, desapareció sin dejar rastro. También estaba ese recién llegado en la oficina de finanzas: se rumoreaba que lo habían interrogado durante casi dos meses por la seguridad del Estado, hasta romperlo, hasta el punto de arrastrarse por el suelo suplicando clemencia.\n\nWang se tocó el cuello, como si aceptar ese dinero lo convirtiera en el siguiente en desaparecer. Se quedó sentado un rato más, luego apretó los dientes y apartó la caja de dinero. Encendió su ordenador, entró en la red interna y rellenó el informe de denunciante. Para él, enviar esto a la comisión de inspección disciplinaria era la jugada más segura. Al menos podría seguir viviendo en paz. Al menos podría seguir durmiendo por las noches.\n\nDespués de rellenar el formulario, hizo clic en enviar. La pantalla parpadeó y apareció una notificación: \"Envío exitoso\".\n\nRespiró hondo, se levantó y se sirvió una taza de té Sanpao. En el reflejo de la taza, su rostro se veía un poco borroso y extremadamente demacrado. Murmuró para sí mismo, como recordándose:"
 china.511.a: "\"No des cabida a pensamientos que no deberías tener.\""
 china.512.t: ""
 china.512.d: "Fu Chenghuai había estado durmiendo cada vez peor últimamente.\nFue una vez profesor asociado en el departamento de filosofía de la Universidad Jiao Tong de Shanghái, elocuente en el estrado, adorado por los jóvenes estudiantes. Pero todo eso cambió cuando descubrió que lo estaban vigilando. Fu Chenghuai comenzó a aislarse de la gente, encerrándose en su apartamento, sellando cada enchufe con cinta adhesiva, incluso cubriendo las ventanas con pesadas cortinas negras.\n\nHasta que una noche lluviosa, vagaba por el Bund, empapado hasta los huesos, gritando: \"¡Me están vigilando! ¡Siempre me han estado vigilando! ¡En las cámaras sobre vuestras cabezas, en vuestras propias casas!\" Su cabello estaba desordenado, su barba descuidada, sus ojos inyectados en sangre y salvajes. Aquellos que alguna vez lo conocieron -colegas, estudiantes- ahora sólo lo miraban como a un loco.\n\nMás tarde, su familia se lo llevó. Lo ingresaron en un hospital psiquiátrico, lo vistieron con ropa blanca de paciente, lo obligaron a tomar medicación. Cuatro paredes blancas. Incluso en sus sueños, había innumerables pares de ojos. Pero nunca se calmó. Daba conferencias en los pasillos, discutía en las salas. Decía a cualquiera que no quisiera escuchar: \"¿Creéis que estoy loco? No. ¡Lo veo más claro que todos vosotros!\" Se convirtió en una triste broma, un hombre rechazado por la sociedad.\n\nCon la compañía y el tratamiento de su familia, Fu Chenghuai pareció volver poco a poco a una senda \"normal\". Los médicos le explicaban una y otra vez que la paranoia no era más que una prisión tejida por la mente bajo una presión extrema. Él intentaba creer esas explicaciones. Quizá realmente estaba enfermo. Quizá, de verdad, había estado loco. Quizá, todo había sido un malentendido creado por él mismo.\n\nUna noche, finalmente llegó el sueño. Se tumbó sobre una almohada suave, su respiración era tranquila, sus párpados se cerraban lentamente. El sonido de la lluvia golpeaba el alféizar de la ventana, como si el mundo finalmente lo hubiera dejado ir.\n\nPero fuera de la ventana, sin que él lo viera, aferrándose a un discreto aire acondicionado, una pequeña luz roja seguía parpadeando en la oscuridad."
 china.512.a: "Siempre lo estaban vigilando."
 china.513.t: "Proyecto SY-03"
 china.513.d: "Investigador Principal: Instalación Xinyala\nFecha del Informe: Clasificado\n\nI. Antecedentes\nCon la creciente demanda de guerra asimétrica y misiones de infiltración urbana, los agentes y operativos tradicionales han mostrado gradualmente diversas deficiencias bajo \"entornos de vigilancia de alta densidad\". Este proyecto tiene como objetivo transformar a poblaciones marginadas en \"personal controlable\" mediante la reconstrucción psicológica.\n\nII. Sujetos de Prueba\nSe reclutaron un total de 312 personas sin hogar, todas sin familia, vínculos sociales ni registros claros de identidad. Tras firmar formularios de consentimiento, fueron trasladados a la instalación.\n\nIII. Procedimiento Experimental\nFase Uno: Despojo de Personalidad\n96 horas de estimulación continua de ruido y luz para privar del sueño y la estabilidad sensorial.\nInfusión repetida de órdenes verbales de \"auto-negación\" para reforzar dudas sobre la existencia y el valor personal.\nAplicación de castigos impredecibles para alterar la comprensión normal del sujeto sobre la \"causa y efecto\".\n\nFase Dos: Remodelación\nAdministración de ISRS y antagonistas NMDA para afectar la función de la corteza prefrontal.\nEntrenamiento hipnótico pasivo para condicionar respuestas a palabras clave, desencadenando un \"estado de ejecución\" automático al recibir la orden.\n\nFase Tres: Pruebas Operativas\nLos sujetos fueron colocados en escenarios de alta presión (simulaciones de asesinatos, demoliciones, situaciones de rehenes).\nAl activarse con las órdenes clave, se evaluó la eficiencia y destructividad en la ejecución de las tareas.\n\nIV. Resultados y Evaluación\nDe los 312 sujetos, el primer grupo de 30 alcanzó un \"estado de ejecución completo\", sin responder a daños autoinfligidos y mostrando capacidades avanzadas de asalto y autodestrucción.\nDe ellos, 18 completaron con éxito sus misiones y se autodestruyeron en la simulación operativa.\n11 no lograron autodestruirse debido a estímulos insuficientes y fueron terminados manualmente.\nLos individuos restantes entraron en un estado de \"trastorno conductual\" y fueron recuperados tras perder valor operativo."
 china.513.a: "\"Revisado.\""
 china.514.t: "Didi de baja altitud"
 china.514.d: "Con el avance de las tecnologías de movilidad aérea urbana, varias ciudades de China han comenzado a promover vehículos eléctricos de despegue y aterrizaje vertical (eVTOL), señalando la comercialización gradual e integración de este modo emergente de transporte en los desplazamientos diarios.\n\nExpertos de la industria señalan que uno de los principales impulsores que aceleran la adopción de los eVTOL es su ventaja significativa en los costes operativos. \"Mantener un helicóptero durante un año puede costar casi diez millones de yuanes, mientras que el coste total de mantenimiento de un eVTOL es casi insignificante, salvo la batería\", afirmó Xie Jia, representante de Eastern General Aviation.\n\nEsta diferencia de costes se refleja directamente en el precio de los billetes. Según estimaciones de Eastern General Aviation, una vez que las operaciones de eVTOL se amplíen, un billete de ida de Shenzhen a Zhuhai podría costar entre 90 y 120 RMB por asiento. Esto posiciona a los eVTOL como una alternativa viable y competitiva en el mercado de desplazamientos interurbanos de corta distancia.\n\nActualmente, se están desarrollando rutas piloto en ciudades como Guangzhou, Shenzhen y Shanghái, junto con esfuerzos para fortalecer la gestión del espacio aéreo a baja altitud y la infraestructura de apoyo. Los analistas creen que, aunque la comercialización de los eVTOL aún está en sus primeras etapas, los avances en el apoyo político, la madurez tecnológica y el control de costes podrían permitir que los eVTOL transformen gradualmente el panorama del transporte urbano de corta y media distancia en China en los próximos años."
 china.514.a: "Es difícil imaginar cómo será el futuro."
 china.515.t: "Tejiendo la red sobre las nubes"
 china.515.d: "Recientemente, ciudades de todo el Delta del Río Perla - Shenzhen, Hong Kong y otras - lanzaron oficialmente el sistema de tránsito aéreo \"Tengyun\", marcando el inicio del despliegue a gran escala del coche volador. Una vez aclamada como un milagro tecnológico destinado a transformar la movilidad humana, esta innovación ahora se asemeja más a un sistema de control social de precisión diseñado por el Estado. A diferencia de la libertad elevada imaginada en la ciencia ficción, \"Tengyun\" no es un privilegio universal de vuelo, sino una red de transporte aéreo público estrictamente regulada. Los pasajeros deben superar múltiples niveles de verificación para obtener un permiso de viaje.\n\nLas rutas de \"Tengyun\" están lejos de cubrir toda la ciudad. En cambio, forman un circuito estrecho que conecta distritos centrales de negocios, agencias gubernamentales y grandes corporaciones tecnológicas. Mientras los funcionarios afirman que el proyecto alivia la congestión del tráfico y mejora la eficiencia del desplazamiento, los conocedores sugieren que su origen tiene poco que ver con el bienestar público. Su intención más profunda radica en permitir una vigilancia y gestión precisas de grupos poblacionales clave, construyendo una red controlable en los cielos.\n\nEn apariencia, \"Tengyun\" parece ser una solución innovadora a los problemas de transporte. En realidad, es una medida provisional de los Gobiernos locales para mitigar el colapso de los ingresos fiscales basados en la tierra. A medida que los ingresos por ventas de terrenos disminuyen, las autoridades han puesto su mirada en el espacio aéreo de baja altitud poco desarrollado. Al construir vías para coches aéreos e infraestructuras asociadas, han creado y vendido efectivamente \"bienes raíces\" en el aire, atrayendo inversión privada y sosteniendo unas finanzas públicas tensionadas.\n\nSin embargo, en su etapa inicial, los servicios de \"Tengyun\" están limitados a institutos de investigación, gigantes estatales y personal gubernamental. Para los ciudadanos comunes, el acceso requiere la compra de permisos a precios elevados. Como lamentó un taxista: \"Este sistema nunca fue pensado para gente como nosotros.\""
 china.515.a: "Al menos, el sueño de los coches voladores por fin ha aterrizado."
 china.516.t: "El fin de las fábricas de Gaokao"
 china.516.d: "En una medida decisiva, el Ministerio de Educación ha cerrado por la fuerza la Escuela Secundaria Nº 2 en una región de Henan, que alguna vez fue considerada una \"fábrica de Gaokao\" y un bastión de la educación orientada a los exámenes. Según las nuevas políticas implementadas, cualquier escuela que continúe imponiendo horas excesivas o empleando métodos de entrenamiento de alta presión quedará completamente prohibida de matricular nuevos estudiantes.\n\nDurante años, esta escuela presumió de tener una de las tasas de admisión universitaria más altas de la provincia, pero también estuvo marcada por casos recurrentes de autolesiones y suicidios entre los estudiantes. Un caso reciente conmocionó a la nación: un alumno que se suicidó saltando fuera del campus dejó una carta: \"Duermo solo cinco horas al día. Mi madre controla mis chats de QQ y mi GPS. Mi profesor dice que si no entro en una universidad de segundo nivel, soy un inútil...\" En defensa, el director Qin declaró: \"Solo estamos inculcando un sentido de competencia para que los niños puedan adaptarse mejor a la sociedad.\" Sin embargo, según un psicólogo, la mayoría de los estudiantes de la escuela mostraban signos de depresión severa: \"En la escuela, son máquinas que repiten exámenes prácticos. Fuera, buscan frenéticamente escapar en internet, incluso formando grupos de apoyo para el suicidio.\"\n\nDesde entonces, se ha desplegado un nuevo grupo de trabajo administrativo para llevar a cabo una inspección nacional de instituciones similares. La investigación científica confirma cada vez más que la educación bajo alta presión puede dañar el desarrollo cerebral y causar daños cognitivos de por vida. Esto no es educación, es destrucción.\n\nAlgunos padres han expresado una fuerte oposición al cierre. Un padre suplicó en Douyin: \"Si nuestros hijos no aprenden a soportar las dificultades, ¿cómo van a entrar en una buena universidad? Mientras otros siguen luchando duro, ¿nosotros simplemente nos rendimos?\""
 china.516.a: "Podemos perder a algunos admitidos de Tsinghua y la Universidad de Pekín, pero hemos salvado innumerables vidas jóvenes."
 china.517.t: "Diseñando la vida"
 china.517.d: "El Consejo de Estado ha publicado recientemente el Plan Nacional de Desarrollo de Tecnología de Optimización Genética, y con él, el primer hospital de edición genética de China - el Centro Norte para el Nacimiento Superior - ha abierto oficialmente sus puertas en el distrito de Haidian en Pekín. Con su diseño elegante y ambiente futurista, la instalación parece más una sala de exposiciones de tecnología de vanguardia que una institución médica tradicional.\n\nEl director del centro presentó con orgullo a los visitantes su plataforma CRISPR Max: \"Ofrecemos combinaciones genéticas personalizables para futuros hijos, incluyendo inteligencia emocional mejorada, modificaciones en rasgos físicos y mejora de la memoria y la capacidad de aprendizaje.\" Entre los servicios más populares están el \"Paquete Genético de Elite Académica\" y la \"Experiencia de Personalización Estética\", con precios que oscilan entre 1,7 y 20 millones de RMB.\n\nEn la sala de consultas, la señora Deng, de Haidian, examinaba las opciones genéticas ideales para su bebé: \"Ahora que el Estado lo apoya, ¿por qué no darle a nuestro hijo el mejor comienzo posible? Todos en nuestro barrio optan por mejorar el coeficiente intelectual, no podemos quedarnos atrás.\" Otro hombre comentó: \"Mi familia tiene antecedentes de miopía. Si podemos eliminar ese defecto, ¿por qué no? No es diferente a ponerse una vacuna.\"\n\nLa respuesta internacional ha sido rápida y severa. Científicos de varios países advirtieron que este paso es como abrir la caja de Pandora. La Unión Europea ha anunciado desde entonces la prohibición de toda colaboración e intercambio de personal relacionado con estas tecnologías."
 china.517.a: "China ha dado el primer paso hacia el futuro."
 china.518.t: "Programa de Desarrollo del Exoesqueleto \"Yinglong\""
 china.518.d: "1er Experimento con Voluntario\nSujeto: Recluso condenado a muerte\nResultado: Los resultados fueron menos que ideales. Tras el reemplazo de la columna vertebral, el sujeto no mostró la mejora esperada en los reflejos. En cambio, las respuestas a estímulos externos fueron lentas. La causa está bajo investigación.\nDisposición: De acuerdo con el acuerdo, la condena del recluso en el corredor de la muerte será conmutada a cadena perpetua. Residirá permanentemente en la instalación de investigación y realizará trabajos manuales asignados.\n\n......\n5º Experimento con Voluntario\nSujeto: Recluso condenado a muerte\nResultado: Al igual que en las dos pruebas anteriores, el sujeto demostró un poder destructivo extraordinario, pero la mejora en los reflejos fue mínima. El consumo energético del exoesqueleto fue significativamente mayor que las expectativas simuladas. La causa está bajo investigación.\nDisposición: De acuerdo con el acuerdo, la condena del recluso en el corredor de la muerte será conmutada a cadena perpetua. Residirá permanentemente en la instalación de investigación y desempeñará funciones de seguridad limitadas.\n\n......\n20º Experimento con Voluntario\nSujeto: Vagabundo voluntario\nResultado: Tras el reemplazo de la columna vertebral, se indicó al sujeto que desplegara las placas protectoras del torso. En respuesta, el sujeto, visiblemente horrorizado, arrancó con fuerza la unidad espinal reemplazada junto con sus órganos conectados. La causa está bajo investigación.\nDisposición: Limpien la escena: estuvo tan sangrienta que nadie en el laboratorio pudo soportar la carne durante el resto del día. Además, recuerden a Wu que guarde a su serpiente mascota; nadie quiere volver a ver algo que se mueva así.\n\n......\n28º Experimento con Voluntario\nSujeto: Recluso condenado a muerte\nResultado: Los reflejos y capacidades destructivas del sujeto superaron con creces los estándares humanos normales. Las placas protectoras para el pecho, abdomen y espalda podían desplegarse desde la columna mecánica en menos de 0,8 segundos. El sistema podía liberar diversas hormonas (como adrenalina) y analgésicos a voluntad del sujeto. Este prototipo cumple con los estándares requeridos y está actualmente en revisión para su aceptación militar.\nDisposición: De acuerdo con el acuerdo..."
 china.518.a: "Servirá en una unidad de fuerzas especiales, con reducciones de condena basadas en el mérito."
 china.519.t: "El futuro del hijo mayor de la República"
 china.519.d: "China ha anunciado oficialmente un avance crucial en la tecnología de fusión nuclear controlada, con aplicaciones piloto ya en marcha en la región noreste. Este desarrollo marca un hito fundamental en la historia energética del país y presenta una oportunidad renovada para la revitalización del Nordeste, que durante mucho tiempo ha estado lastrado por los desafíos duales de la escasez energética y el estrés ambiental.\n\nSegún el Ministerio de Ciencia y Tecnología, las primeras unidades de reactores de fusión se han desplegado en Siping y Liaoyuan, funcionando de manera estable durante más de seis meses con condiciones descritas como \"controladas y eficientes\". Sobre esta base, las autoridades han iniciado una renovación regional de la red eléctrica, promoviendo la electrificación total. Las tres provincias del noreste han superado en gran medida las carencias energéticas invernales, logrando una calefacción urbana y rural estable. En algunas zonas, también han comenzado programas piloto para la refrigeración veraniega mediante energía eléctrica.\n\nLa transformación industrial ya está en marcha. Gracias a la electricidad de bajo coste y alta capacidad proporcionada por la fusión nuclear, industrias como la de vehículos eléctricos, el transporte ferroviario y la fabricación de alta energía están acelerando su traslado hacia el Nordeste. Un planificador económico local afirmó que el cuello de botella energético que antes limitaba el crecimiento \"ha sido completamente eliminado\". Los informes oficiales señalan que \"la franja industrial del Nordeste está entrando en una nueva fase de transformación estructural\".\n\nSimultáneamente, la caída de los costes energéticos ha impulsado avances en la desalinización de agua de mar y en tecnologías agrícolas. En ciudades como Daqing, Yichun y Qiqihar, se han establecido múltiples zonas agrícolas subterráneas. Utilizando iluminación de alta densidad y sistemas inteligentes de control de temperatura, estas instalaciones permiten la producción durante todo el año y el cultivo totalmente cerrado. Los investigadores creen que este modelo podría aliviar las presiones del suministro agrícola invernal en el norte de China y ofrecer nuevas soluciones para la seguridad alimentaria bajo condiciones climáticas extremas."
 china.519.a: "Bajo el hielo y la nieve yace tierra fértil."
 china.520.t: "Todas las mañanas"
 china.520.d: "En Guiyang, la capital de la provincia de Guizhou, la Torre 201 del Centro Internacional de Convenciones y Exposiciones acogió recientemente un foro científico global bajo el lema \"El Futuro de la Humanidad y la Gobernanza Científica\". El evento reunió a científicos, pensadores e investigadores de políticas de diversas instituciones chinas, antiguos territorios estadounidenses, Sudamérica y países de la CEI. Durante varios días, los participantes debatieron sobre las futuras estructuras sociales y los sistemas de gobernanza impulsados por la tecnología.\n\nLos temas tratados en el foro fueron muy variados, incluyendo inteligencia artificial, edición genética y cambios demográficos. Una de las discusiones más destacadas fue una mesa redonda sobre \"El Papel de la Racionalidad Tecnológica en la Organización Social\", con la participación de Nick Land -conocido por su teoría de la \"Ilustración Oscura\"- y He Jiankui, la controvertida figura detrás de los primeros bebés editados genéticamente.\n\nSegún imágenes en vídeo del evento, Nick Land argumentó que los sistemas políticos tradicionales ya no son capaces de responder a la complejidad que genera el cambio tecnológico exponencial. Propuso un modelo triangular para la sociedad, con los científicos en el vértice, responsables de la toma de decisiones a largo plazo y la dirección estratégica; debajo de ellos, una capa burocrática encargada de ejecutar y adaptar las políticas mediante medios técnicos; y en la base, el público general, involucrado en el trabajo fundamental y la cooperación social.\n\nAunque la propuesta sigue siendo teórica y carece de un marco concreto de implementación, la cuestión que plantea -\"¿Quién debería determinar la dirección futura de la humanidad?\"- ha despertado un gran interés en los círculos académicos y de análisis de políticas. Muchos en la comunidad científica ven esta propuesta como una reflexión profunda sobre modelos de gobernanza posdemocráticos y predicen que podría influir en cómo algunas naciones configuran la política científica y la arquitectura social del futuro."
 china.520.a: "Mis ojos ya han visto el futuro."
 china.521.t: "A través de la tierra y el mar"
 china.521.d: "China ha anunciado oficialmente que su proyecto de tren de súper alta velocidad ha completado una fase clave de pruebas con tripulación, marcando un avance significativo en el despliegue real de la tecnología de transporte por levitación magnética ultrarrápida. Las pruebas se realizaron en dos líneas: una en la región interior del norte y otra a lo largo de la costa sur, ambas completando con éxito operaciones en toda la ruta con un transporte de pasajeros estable.\n\nSegún el Laboratorio de Tren de Súper Alta Velocidad de Shanxi, la línea Datong-Taiyuan-Yuncheng llevó a cabo múltiples pruebas de ida y vuelta bajo condiciones complejas de terreno y clima. Los trenes alcanzaron velocidades cercanas a los 700 kilómetros por hora, superando ampliamente los límites del tren de alta velocidad convencional. El tiempo de viaje de Datong a Yuncheng se redujo de aproximadamente cinco horas a menos de una hora en condiciones de máxima eficiencia.\n\nMientras tanto, la línea Sanya-Haikou-Zhanjiang, probada por el Laboratorio de Tren de Súper Alta Velocidad Guangdong-Hainan, se centró en el rendimiento operativo bajo alta humedad y condiciones climáticas costeras. Los datos de varias rondas de pruebas con tripulación realizadas antes de la temporada de tifones mostraron un rendimiento estable sin fallos sistémicos. La línea conecta la isla de Hainan con ciudades del oeste de Guangdong y se espera que alivie significativamente la presión del transporte marítimo y terrestre, al tiempo que promueve la integración económica regional.\n\nMao Kai, jefe del proyecto de tren de súper alta velocidad en la Corporación China de Ciencia e Industria Aeroespacial, declaró que el éxito de esta fase experimental demuestra la preparación de la tecnología para su despliegue comercial en diversas condiciones ambientales. La siguiente etapa se centrará en optimizar la construcción de estaciones centrales a lo largo de las rutas y acelerar los sistemas de venta de billetes y los procesos de evaluación de seguridad. Los planes preliminares indican que en los próximos diez a quince años, la red de trenes de súper alta velocidad se expandirá progresivamente desde la costa sureste hacia regiones clave del centro y noroeste de China."
 china.521.a: "Con nuestras propias manos, hemos construido el futuro."
 china.522.t: "La Academia China de Ciencias (CAS) pide un aumento de la financiación educativa"
 china.522.d: "Recientemente, la Academia China de Ciencias (CAS) publicó un informe en Pekín, instando al Estado a aumentar sustancialmente la inversión en educación, con el fin de hacer frente a las necesidades urgentes de innovación científica y tecnológica y formación de talento. El informe señala que el gasto en educación de China como porcentaje del PIB ha sido durante mucho tiempo inferior al nivel de los países desarrollados e incluso de algunos países en desarrollo. Los expertos de la CAS enfatizaron que la educación es la piedra angular del ascenso de China; en áreas de vanguardia como la inteligencia artificial y la ingeniería de comunicaciones, donde la competencia es feroz, la escasez de talento es cada vez más evidente. China necesita aumentar la inversión en educación, especialmente en educación superior, investigación científica y formación.\n\nEl informe también mencionó que el problema de la ciberseguridad en China es cada vez más grave, y que el país debería centrarse en invertir en educación en defensa cibernética, no solo para mejorar el patriotismo de los estudiantes, sino también para formar a un gran número de talentos en ciberseguridad, con el fin de reforzar la vigilancia de datos y prevenir la filtración de información nacional.\n\nEl Ministerio de Educación publicó rápidamente una declaración aceptando la cooperación y anunció que pronto llevará a cabo reformas drásticas internamente, y mejorará significativamente la calidad de la educación externamente, para así contar con la reserva de talento más adecuada para el ascenso de la nación y la seguridad del país en todo momento."
 china.522.a: "¡La próxima generación del Gran Cortafuegos está en camino!"
 china.523.t: "Rompiendo la máscara de la hipocresía moral"
 china.523.d: "Al principio, nadie se dio cuenta de que los vagabundos de la ciudad desaparecían. Los mendigos en las salidas del metro se habían ido, las mantas y harapos bajo los puentes habían desaparecido, ya no había noticias de personas muriendo de frío, ni voluntarios publicando llamadas de ayuda. La gente asumió que las políticas se habían endurecido, o quizás que las operaciones de limpieza se habían vuelto más discretas. Nadie preguntó realmente a dónde habían ido esas personas.\n\nAl mismo tiempo, las instituciones de investigación comenzaron a anunciar resultados revolucionarios. Una vacuna contra el cáncer con una tasa de curación más alta entró en ensayos de fase III, y se dijo que una tecnología de edición genética había cruzado líneas éticas que antes se consideraban infranqueables. Los medios informaron sobre estos avances con un tono optimista, como si el mundo estuviera entrando en una nueva era.\n\nAlgunos reportajes solo duraron unas horas antes de ser retirados. Las cuentas de quienes discutían estos experimentos en las redes sociales fueron rápidamente eliminadas, borrando todo su historial de publicaciones. El resto dejó de hablar por completo. Realmente no hacía falta: a nadie le importaba. En los suburbios, algunas prisiones antiguas cambiaron silenciosamente su propósito. Donde antes alojaban a presos en el corredor de la muerte, ahora había vallas electrónicas, y camiones entraban y salían. Nadie sabía qué ocurría dentro, y ningún registro público mencionaba ningún cambio en esa zona.\n\nLa gente se fue acostumbrando poco a poco a este nuevo orden. Las ciudades estaban más limpias, la sociedad más tranquila, la tecnología más avanzada. Ya nadie preguntaba por el vagabundo desaparecido, ni por el preso del corredor de la muerte que había sido \"reubicado\". Habían existido brevemente, y luego, como si nunca hubieran estado allí, se habían esfumado.\n\nSe lanzaron nuevos tratamientos para uso civil, la esperanza de vida aumentó, las tasas de enfermedades mentales disminuyeron, y la televisión emitía anuncios sobre la ciencia cambiando vidas. En oficinas y hogares, las conversaciones fueron cambiando lentamente de \"¿Dónde se fueron?\" a \"¿Cuánto tiempo podemos vivir?\""
 china.523.a: "No pasó nada."
 china.524.t: "Cerebro en una cubeta"
 china.524.d: "A las 7 de la mañana, Lin Chengyu se despertó. La luz del sol se colaba por la rendija de las cortinas, cayendo suavemente sobre su manta blanca de algodón. Se puso su ropa cómoda de estar por casa y preparó una taza de café, cuyo aroma familiar llenó el apartamento. Fuera, junto a la ventana del salón, había una fila de cerezos en flor, sus flores floreciendo justo en su punto, exactamente igual que ayer.\n\nPero siempre había una sensación extraña que persistía en su corazón. Trabajaba en una editorial: un trabajo estable, una vida rutinaria. Sin embargo, en algún momento empezó a sentir que el mundo que la rodeaba no era del todo real. En el metro, siempre veía las mismas caras desconocidas pero extrañamente familiares. En el trabajo, sus compañeros mantenían las mismas conversaciones triviales, como si estuvieran atrapados para siempre en un bucle repetitivo de diálogo.\n\nHasta ese día, cuando caminaba de vuelta a casa desde la oficina, notó que el cartel de la tienda de la esquina de repente \"parpadeó\", como una pantalla de televisión perdiendo la señal, distorsionándose por un breve instante. Nadie se dio cuenta. Todos siguieron caminando, siguieron charlando, como si no hubiera pasado nada.\n\nEmpezó a intentar romper el patrón: tomó rutas diferentes, dejó de usar el metro, ignoró las llamadas telefónicas. Intentó alejarse de las calles principales de la ciudad, solo para descubrir que, por mucho que caminara, siempre acababa de nuevo en la misma calle. Se detuvo frente al escaparate de una tienda y se miró el reflejo. Y por un instante, la figura en el cristal se desalineó apenas un poco. Ya no era su rostro familiar, sino una imagen borrosa y distorsionada, como datos corruptos.\n\nSe quedó paralizada. No era ella quien miraba al espejo, sino el espejo que la miraba a ella. Una voz tenue, casi inaudible, resonó en el aire: \"Sujeto A417 ha activado una anomalía de autoconciencia. Preparando reinicio del programa sensorial.\"\n\nEl mundo se sumió en la oscuridad."
 china.524.a: "Al segundo siguiente, Lin Chengyu \"despertó\"."
 china.525.t: "Pájaro en una jaula"
 china.525.d: "Al nacer, cada bebé era registrado en un completo sistema de datos. Antes de empezar la escuela, pasaban por otra ronda de evaluaciones, tras las cuales se les asignaba a diferentes itinerarios educativos estratificados. Algunos entraban en el \"Canal de Desarrollo para la Fuerza Laboral Práctica\", otros eran seleccionados para el \"Programa de Reserva de Investigación Científica\", mientras que otros, incluso en la infancia, eran etiquetados como \"Recursos Humanos de Apoyo Social\" - destinados a mantener el orden urbano, los sistemas de saneamiento u otros roles esenciales pero no declarados.\n\nNadie pensaba que hubiera nada malo en ello. La educación, al fin y al cabo, era cuestión de selección; la estratificación significaba eficiencia; los recursos eran limitados. Los padres se fueron adaptando poco a poco. Ya no elegían actividades extraescolares para sus hijos, ni se preocupaban por las asignaciones escolares - el sistema, guiado por modelos predictivos, asignaba el camino óptimo para cada niño. La \"libre desarrollo\" seguía en la doctrina educativa, pero ahora significaba \"libertad dentro de los límites de la capacidad\". Por ejemplo, si el modelo matemático de un joven predecía que su crecimiento cognitivo se estancaría después de los quince años, se le asignaba a zonas de desarrollo para trabajo físico. Si el modelo de respuesta emocional de alguien era demasiado sensible, se consideraba que no era apto para finanzas o asuntos nacionales.\n\nSe levantaron \"mapas de distribución de talento\" por toda la ciudad. Cada comunidad estaba zonificada por profesión y función. La brecha entre las personas se volvió clara y controlable. Los \"sueños\" caóticos de antes dejaron de aparecer. La sociedad se volvió más estable, las tasas de criminalidad bajaron, la enfermedad mental disminuyó, desaparecieron los estudiantes que se lanzaban desde los tejados, así como los padres que lloraban durante la noche.\n\nAlgunos decían que esta era una era en la que todos podían cumplir su potencial. Otros decían que nunca habían tenido realmente un \"yo\" propio. Pero todos sonreían mientras aceptaban el orden establecido y creían que eso era libertad."
 china.525.a: "Entraron libremente en la jaula y se dijeron a sí mismos que era el cielo."
 china.526.t: "Un mundo rehecho"
 china.526.d: "Cuando Shen Ran aterrizó en Pekín, eran las cinco y media de la mañana, el cielo aún estaba tenue. Se sentó en un banco fuera de la puerta, observando a los viajeros que se movían por el aeropuerto, y de repente se sintió un poco fuera de lugar. Hace cinco años, cuando acababa de graduarse de la Universidad de Zhejiang y se había ido a estudiar a la Universidad Federal de Kazán con una beca, Pekín no había sido tan \"limpio\". Ahora, parecía como si algo invisible lo hubiera lavado: sin desorden, sin ruido, incluso los letreros de las tiendas, antes caóticos, habían sido reemplazados por fondos blancos uniformes y caracteres azules.\n\nArrastró su equipaje por la salida de seguridad. Filas y filas de pantallas publicitarias brillaban, mostrando la información de su reciente escaneo facial: nombre, número de identificación, temperatura corporal, todo parpadeando en la esquina de la pantalla. Miró hacia atrás sorprendida, pero las personas detrás de ella parecían imperturbables, como si esto fuera parte de la vida diaria. Ella había pensado que volvía a algo \"familiar\", pero ahora, Shen Ran sentía que todo era extraño.\n\nLos anuncios del aeropuerto habían sido reemplazados por luces cambiantes y proyecciones direccionales en el techo. Para comprar una botella de agua, ya no necesitaba escanear un código QR: la máquina expendedora escaneaba su rostro automáticamente, enviando un aviso de deducción directamente a su cuenta vinculada. Incluso las pantallas fuera de los baños mostraban el número de usos y el \"Índice de Higiene\" de cada persona. \"¿Índice de Higiene?\" Se quedó mirando la frase, con ganas de reír, pero sin poder.\n\nDe repente, se encontró echando de menos su antiguo apartamento en Kazán, las calles heladas, las abuelas rusas vendiendo pan negro en el mercado; ese mundo áspero, ruidoso y caótico ahora despertaba en ella una añoranza inesperada."
 china.526.a: "¿Dónde estás, querida vieja China?"
 china.527.t: "Nueva Reforma Científica"
 china.527.d: "Durante años, el sistema de investigación científica acumuló un número abrumador de proyectos y personal, plagado de jerarquías rígidas, procedimientos de revisión complejos y ciclos de producción interminablemente retrasados. Se destinaban vastos recursos a la burocracia y a la política de antigüedad. A los jóvenes investigadores les resultaba casi imposible ascender, mientras que los temas realmente críticos permanecían estancados durante años. Ahora, para romper este bloqueo, se ha abolido el antiguo sistema de revisión: ya no hay restricciones de edad ni requisitos de títulos académicos o credenciales. La propiedad del proyecto y la asignación de recursos están ahora directamente vinculadas a la eficiencia de resultados y al índice de ejecución. Quien entregue resultados asegurará la siguiente ronda de financiación y autoridad.\n\nLas instituciones de investigación recién establecidas comenzaron a absorber talento técnico a gran escala. Mientras pudieras resolver problemas, tu formación ya no importaba. Algunos que habían sido incluidos en listas negras por violar la ética experimental fueron ahora readmitidos. Otros, previamente rechazados por su pensamiento radical, se convirtieron en líderes en campos clave.\nYa nadie hablaba de \"revisión ética\". La expresión se redujo drásticamente en los documentos, figurando sólo como una de las \"directrices operativas\", sólo para referencia. Lo que importaba ahora eran los resultados: superar los cuellos de botella técnicos y lograr la producción en masa en el menor tiempo posible.\n\nOcasionalmente surgían controversias: algunas tecnologías supuestamente implicaban pruebas en vivo, algunos algoritmos eran sospechosos de manipulación de datos. Pero esas voces se desvanecían rápidamente bajo la creciente marea de eficiencia."
 china.527.a: "Y la moralidad quedó al final del pasillo, sin que nadie quedara para visitarla."
 china.528.t: "Purgando los gusanos"
 china.528.d: "Matias Romero estaba sentado en la sala de tránsito del aeropuerto de Hong Kong, sus dedos golpeando rítmicamente sus vaqueros. Su equipaje ya había sido facturado, su visado aprobado: todo parecía estar perfectamente en orden. Pero cuando estaba a punto de embarcar hacia el punto de control de Shenzhen, los agentes de aduanas lo condujeron amablemente a una sala lateral, y así, pasaron más de diez horas.\n\nNo hubo brusquedad, ni interrogatorios, solo un hombre con uniforme que entró y le entregó una hoja de papel. En ella había una decisión simple: \"No cumple con los requisitos de entrada.\" Él no entendía. \"¿Por qué?\" preguntó. El hombre solo lo miró: \"Ya sabes por qué.\"\n\nMatias abrió la boca pero no dijo nada. Su mente de repente se quedó en blanco, y las cosas de su pasado fueron arrancadas, expuestas ante sus ojos. Hace diez años, en Buenos Aires, había presumido en las redes sociales de haber consumido cocaína en la fiesta de cumpleaños de un amigo. Hace cinco años, había sido detenido durante doce horas tras chocar contra un farol mientras conducía ebrio. Hace tres años, había publicado algunos tuits groseros criticando al gobierno. Nunca había mencionado nada de eso. Esos antecedentes casi se habían desvanecido en su memoria, pero ahora surgían uno a uno, como archivos limpios y ordenados.\n\n\"¿Cómo lo sabe?\" El hombre sonrió débilmente, no respondió y simplemente empujó un poco más hacia él la carta con la decisión."
 china.528.a: "\"Que tengas un buen viaje a casa.\""
 china.529.t: "Grilletes al capital"
 china.529.d: "A las 4 de la madrugada, frente a un edificio de oficinas en el distrito de Nanshan, Shenzhen, agentes del Ministerio de Seguridad del Estado, vestidos de paisano, entraron simultáneamente por el aparcamiento subterráneo y los conductos de los ascensores, lanzando una redada en tres grandes empresas de inversión que se encontraban en el interior. Los servidores de la oficina fueron sellados de inmediato, se confiscaron todos los dispositivos electrónicos presentes y varios altos ejecutivos fueron detenidos en el acto.\n\nCasi al mismo tiempo, en otra torre de la sede en Zhujiang New Town, Guangzhou, el departamento financiero seguía trabajando durante la noche, transfiriendo rápidamente datos a cuentas offshore. Pero todo se detuvo abruptamente ante la llegada del equipo de ejecución. Los documentos incautados revelaron que la empresa estaba preparando el desvío de miles de millones de fondos a través de entidades pantalla hacia sistemas fiduciarios offshore, con planes de transferir activos clave a su filial en Hong Kong en el transcurso de la semana.\n\nAcciones similares también tuvieron lugar en las inmediaciones del Parque Tecnológico de Alta Tecnología de Xixi Wetland, en Hangzhou. Según meses de investigación, estas empresas habían estado utilizando trading algorítmico con partes relacionadas, evaluaciones tecnológicas falsificadas y fideicomisos de propiedad accionarial de empleados para desviar enormes beneficios de los sistemas de cuentas principales, intentando blanquear el flujo de capital a través de entidades legales registradas en el extranjero. Los investigadores sellaron los libros de contabilidad y los servidores de código en el lugar, además de interceptar los planes de vuelo de varias personas clave que se preparaban para escapar al extranjero en jet privado."
 china.529.a: "Ya era hora de poner en su sitio a estos capitalistas."
 china.530.t: "Infiltrando la Red Global"
 china.530.d: "Damian Stone estaba sentado en su oficina del quinto piso del Departamento de Defensa en Camberra. El ventilador de techo zumbaba arriba, el aire dentro estaba un poco viciado. Sostenía su café, con la mirada fija en la ventana de chat azul parpadeante en su pantalla.\n\n\"He redactado un borrador preliminar sobre el mecanismo de entrenamiento conjunto con Japón\", escribió en el cuadro de chat y luego pulsó enter. Unos segundos después llegó la respuesta: \"De acuerdo, envíalo\". El tono era exactamente el habitual: ni más palabras, ni menos.\n\nDamian abrió el archivo adjunto, el que claramente estaba etiquetado como \"Discusión interna, no aprobado para distribución\", lo arrastró al chat y pulsó enviar. Dudó un momento, luego añadió: \"Incluí algunas recomendaciones sensibles, quizá haya que revisar de nuevo la lista de prioridades\".\n\nLa respuesta llegó rápido: \"Entendido. Bien manejado\". Luego apareció la cara sonriente habitual, la firma de su superior, precisa y mecánica: :)\n\nIntercambiaron unas líneas más de charla trivial, bromearon sobre si el comité de presupuesto del Parlamento volvería a retrasar las cosas, y cómo la impresora del vestíbulo seguía rota. Todo parecía rutina.\n\nDamian terminó su café, cerró su portátil y se preparó para irse. Alguien en la oficina contigua estaba al teléfono; no pudo entender lo que decían, ni se dio cuenta de que el documento que acababa de enviar ya había sido archivado, reclasificado y fechado, terminando silenciosamente bajo una página del sistema etiquetada como \"Centro de Vigilancia del Mar del Sur de China - Unidad 3\"."
 china.530.a: "Damian salió por la puerta y bostezó."
 china.531.t: "Nación de la Automatización"
 china.531.d: "Había pasado mucho tiempo desde que alguien vio a trabajadores encorvados sobre las líneas de montaje, o escuchó el sonido de los motores de los camiones arrancando a primera hora de la mañana. En las fábricas, filas de brazos robóticos operaban con precisión; en los almacenes, sistemas automatizados de clasificación funcionaban las 24 horas; los vehículos de reparto calculaban las rutas al segundo, desde hacía tiempo sin necesidad de conductores. Los camiones de limpieza, las estaciones de reparación, las cabinas de peaje por toda la ciudad habían sido reemplazados por terminales inteligentes uniformes, que funcionaban con una eficiencia extrema, casi sin cometer errores. Todo esto se llamaba progreso.\n\nLos medios publicaban reportajes a página completa mostrando los datos: el PIB seguía creciendo, los accidentes de tráfico disminuían, las tasas de error se acercaban a cero. Las ciudades se volvían más limpias, más eficientes, más silenciosas, casi sin ruidos innecesarios. La vida de todos parecía haberse encajado en un sistema más ordenado, con menos esperas, menos problemas.\n\nAlgunas personas empezaron a notar que los parques industriales, antes bulliciosos, ya no tenían horas punta de cambio de turno; las estaciones de metro veían menos trabajadores de oficina uniformados; las luces en los barrios de apartamentos de alquiler ya no se encendían por la noche. Pequeños restaurantes en barrios antiguos cerraban uno tras otro; las sillas de las barberías quedaban vacías; la gente que solía estar en las esquinas fumando y charlando, nadie sabía exactamente cuándo dejaron de aparecer."
 china.531.a: "¿Dónde se habían ido todos?"
 china.532.t: "El titiritero del mundo"
 china.532.d: "\"¿De verdad conseguiste esa chatarra de China?\" Karl miró al miliciano que yacía a su lado en la arena. El tipo era joven, llevaba un pañuelo rojo con una estrella en la cabeza y un M72 LAW colgado a la espalda. Su chaleco táctico \"Yakeda\" estaba rasgado por las espinas en dos lugares, con hilos colgando. \"Barato. Sesenta pavos\", murmuró el miliciano.\n\nKarl no respondió, apretando con más fuerza su rifle, con la mirada fija en el polvo que se levantaba al final del valle. El enemigo se acercaba: al menos dos pelotones, con un carro de combate principal M1 avanzando lentamente. \"Saben que estamos aquí\", dijo el líder de escuadra a su lado. \"Probablemente no aguantemos diez minutos\".\n\nEl aire estaba denso, la artillería retumbaba débilmente a lo lejos. Justo cuando Karl pensaba que era el fin, el tanque se detuvo de repente. Su torreta giró lentamente y luego abrió fuego abruptamente, no contra ellos, sino barriendo una línea de infantería detrás de su propia posición. Un segundo disparo, luego un tercero. Las explosiones resonaron por el cañón.\n\n\"Joder, ¿se ha vuelto loco?\" jadeó el miliciano. Karl se quedó paralizado unos segundos, luego se levantó de un salto. \"¡Ahora! ¡A moverse!\" Giraron hacia el flanco y echaron a correr. Las balas silbaban a su alrededor, pero las fuerzas enemigas ya estaban desordenadas. Karl miró hacia atrás al tanque. La escotilla estaba cerrada, sin movimiento en su interior. Sin embargo, la torreta seguía barriendo de izquierda a derecha mecánicamente, como si algo hubiera tomado el control.\n\nA medio mundo de distancia, en una sala de control, un técnico con uniforme gris levantó lentamente el dedo de la consola."
 china.532.a: "La señal del satélite en la pantalla se fue desvaneciendo poco a poco."
 china.533.t: "Omnisciente, Omnipotente"
 china.533.d: "En una cafetería junto al lago Lugano en Suiza, Alexander von Hart, un oficial de nivel medio del Servicio Europeo de Acción Exterior, se recostó en una silla de mimbre. Frente a él estaba su viejo amigo francés Jean-Pierre. Se conocían desde hacía más de veinte años; hoy era un raro momento de ocio.\n\n\"¿Recuerdas lo ingenuos que éramos cuando entramos al servicio?\" se rió Alexander. \"Hoy en día, donde sea que te envíen, es todo igual. Firmas unos papeles y ya tienes el día hecho\". Jean-Pierre resopló. \"¿Ese colega que fue destinado a Australia el mes pasado? Pasó todo el mes publicando selfies en la playa. Y alguien incluso sacó a relucir sus «resultados de investigación» en una reunión, ridículo\".\n\nAlexander asintió, cambiando de postura. \"Destinos en el extranjero? Básicamente es turismo con algún informe ocasional, y el resto del tiempo solo mantienes la cabeza baja. Mientras no la cagues, nadie te controla\". Hizo una pausa, mirando el lago a lo lejos. \"A veces siento que somos menos útiles que los becarios en las embajadas en China\".\n\n\"Bueno, no del todo inútiles\", dijo Jean-Pierre. \"Al menos todavía podemos traer algo de queso\". Ambos rieron.\n\nMientras tanto, a 10.000 kilómetros de distancia en Nanning, dentro de un edificio de oficinas sin identificar, el Ministerio de Seguridad del Estado procesaba toda su conversación en tiempo real."
 china.533.a: "Archivado. Monitorización en curso."
 china.534.t: "Cruzando el umbral de la historia"
 china.534.d: "A menudo me siento solo tarde por la noche, mirando esos informes de inteligencia, reflexionando sobre hasta dónde caerá este mundo.\nAhora mismo, todos los países occidentales están atrapados en un caos interno que se autoanestesia,\nYa no pueden distinguir quién es el enemigo y quién es el amigo.\nLes encanta agitar pancartas escritas en papeles viejos en calles destrozadas, creyendo que defienden alguna forma de libertad,\nPero ni siquiera se dan cuenta de que han perdido el orden social más básico.\nVeo a los imperialistas royéndose unos a otros, a los capitalistas ahogándose en sus vacíos juegos de mercado,\nComo ratas que se alimentan de los cadáveres de los suyos dentro de un granero podrido.\nSus parlamentos están llenos de teatrillos patéticos e impotentes,\nY esas actuaciones aún se presentan en los medios como dignas y justas.\nSus medios proclaman la victoria con una sola bocanada,\nmientras tiemblan de miedo al admitir que están cayendo en la derrota.\nNo me interesan esas farsas baratas - sus llamados sistemas, sus llamados valores,\nPara nosotros no son más que montones de chatarra inservible.\nSe acurrucan en sus círculos cada vez más pequeños, sospechándose y culpándose unos a otros, pero ninguno se atreve a decir la verdad.\nAunque ganen una batalla, no es más que perros peleando en el barro.\nY ya no representaremos su farsa de la vieja era en el mismo escenario.\nSus naciones son como barcos con fugas, que se balancean y crujen, pero aún se engañan hablando de dignidad nacional.\nNo siento lástima por ellos, ni les ofreceremos una opción.\nQuieren ponerse al día, pero ya es demasiado tarde. China no les permitirá respirar.\nNo mostraremos piedad, porque este mundo no merece piedad.\nPueden inclinarse y aceptar el nuevo orden,"
 china.534.a: "O ser aplastado bajo las ruedas de la historia."
 china.535.t: "Sombras de Ayer"
 china.535.d: "El presidente Chen Wenqing dejó su carpeta sobre la mesa y miró a lo lejos a través de las ventanas de suelo a techo de su despacho. Su secretaria acababa de marcharse tras entregarle un informe especial: había surgido en todo el país un fenómeno de imitaciones de Mao, desde grupos de baile de ancianos coreando consignas hasta streamers en línea rindiendo homenaje, e incluso eventos organizados que recreaban la Gran Marcha.\n\n\"¿Crees que fuerzas extranjeras están detrás de esto?\" preguntó la secretaria con cautela antes de irse. Chen negó con la cabeza, esbozando una ligera sonrisa. \"La historia trazará sus propios Textos Confirmados. No hay que sobreinterpretar.\" Hizo un gesto tranquilo indicando que la secretaria podía marcharse. En cuanto la puerta del despacho se cerró, la expresión de Chen se volvió mortalmente seria. Cogió el teléfono rojo cifrado y marcó un número interno: \"Diting, Diting, inicia el rastreo de la fuente inmediatamente. No agites la hierba ni alertes a la serpiente.\"\n\nEn la reunión confidencial del día siguiente, \"Diting\" informó: \"La investigación preliminar muestra que los imitadores provienen de diversos orígenes: desempleados, aficionados a la historia, grupos marginados, sin una estructura organizativa clara. Sin embargo, algunos abogan por un retorno al socialismo y la aplicación de las leyes laborales. Elementos extranjeros ya han comenzado a explotar esta situación.\"\n\nChen guardó silencio un momento y luego dijo: \"Amplíen el alcance de la investigación, centrándose en las actividades de instigación extranjera.\" Golpeó ligeramente la mesa. \"Aunque no haya pruebas claras, debemos prepararnos para lo peor.\"\n\nAl volver a su despacho, volvió a mirar por la ventana, donde el sol poniente había teñido de rojo todo Pekín."
 china.535.a: "¿Descenderá de nuevo el espectro rojo?"
 china.536.t: "La Mano de la Estabilidad"
 china.536.d: "Desde que el presidente Chen asumió el cargo, el panorama político nacional ha mejorado de forma constante. Recientemente, la Comisión Central de Inspección Disciplinaria, en colaboración con el Ministerio de Seguridad del Estado, lanzó la \"Operación Bedrock\" para llevar a cabo investigaciones específicas sobre ciertos miembros del partido, garantizando la unidad del partido y la estabilidad nacional a largo plazo.\n\nSegún declaraciones oficiales, la \"Operación Bedrock\" tiene como objetivo eliminar los \"elementos desestabilizadores\" que se esconden dentro del partido. La operación se centra específicamente en miembros que durante mucho tiempo han defendido la reforma política, difundido ideologías occidentales o publicado opiniones radicales en línea que fomentan tensiones de clase. Las investigaciones revelaron que estas personas habían estado confabuladas con potencias extranjeras, intentando explotar las divisiones sociales para socavar la seguridad nacional. La operación ha resultado en la detención de numerosos economistas, profesores de derecho y profesionales de nuevos medios, junto con la incautación de diversas publicaciones y sitios web políticos.\n\nUn aspecto particularmente innovador es el despliegue por parte del Ministerio de Seguridad del Estado de una tecnología revolucionaria de seguimiento ideológico que utiliza análisis de big data e inteligencia artificial para identificar y rastrear con precisión los orígenes ideológicos y las vías de transmisión de estas personas. Esto ha provocado una ola de autocensura, con ciudadanos de toda la sociedad denunciándose mutuamente y entregando voluntariamente libros prohibidos para demostrar su lealtad. El presidente Chen elogió al equipo de la \"Operación Bedrock\" por sus valientes esfuerzos y llamó a todo el partido a mantener la seguridad y la estabilidad con una mayor conciencia política y un compromiso más fuerte con la responsabilidad."
 china.536.a: "La mano de la estabilidad sujeta firmemente el volante."
 china.537.t: "Defensores de la Nación"
 china.537.d: "En medio de cambios globales sin precedentes, el presidente Chen Wenqing hizo una aparición poco común en una instalación de entrenamiento del Ministerio de Seguridad del Estado para inspeccionar al equipo de agentes encubiertos con el nombre en clave \"Kunpeng\". No se trataba solo de una visita rutinaria, sino de una sesión informativa altamente clasificada previa al despliegue.\n\nEn su breve discurso, el presidente no se detuvo en la gravedad de las tensiones internacionales. En cambio, articuló la \"misión\" de los agentes en términos profundamente simbólicos. Paseando por los terrenos de entrenamiento, observó a los agentes realizando ejercicios avanzados de recopilación de inteligencia y guerra psicológica. \"No sois operativos ordinarios, sino espadas ocultas en corrientes oscuras\", hizo una pausa el presidente, mientras su mirada recorría los rostros de los agentes. \"Para que Kunpeng extienda sus alas, primero debe romper su capullo. Nuestra era nos ha encomendado una misión que trasciende convenciones y fronteras: salvaguardar los intereses nacionales mediante fuerzas invisibles.\"\n\n\"Kunpeng\" no tiene como objetivo un país o región en particular, sino que representa una estrategia global preventiva. Los agentes serán desplegados en todo el mundo con misiones que incluyen, pero no se limitan a: infiltrarse en departamentos extranjeros críticos, robar inteligencia tecnológica clave, desmantelar fuerzas anti-China en el extranjero para frustrar intentos de subversión y participar en la guerra de información contra elementos hostiles.\n\nEl presidente Chen enfatizó especialmente la importancia de la proyección cultural. Ordenó al ministerio formar un \"Equipo de Avance\" compuesto por artistas, escritores y académicos de primer nivel para aprovechar el atractivo cultural chino, suavizando el sentimiento público en naciones adversarias y obteniendo apoyo internacional: \"Debemos usar nuestras propias narrativas para remodelar las percepciones globales.\""
 china.537.a: "La guerra invisible ya ha comenzado."
 china.538.t: "Limpiando la casa"
 china.538.d: "El Ministerio de Seguridad del Estado completó recientemente una investigación de seguridad a gran escala con el nombre en clave \"Operación Purga\", desencadenada por revelaciones voluntarias de un individuo llamado Wang, que anteriormente trabajó con agencias de inteligencia occidentales. Wang, quien en su momento organizó actividades antigubernamentales con apoyo extranjero, se dirigió a la seguridad estatal y presentó extensas \"pruebas anti-China\" tras disputas internas, intentando salvarse a sí mismo mientras socavaba a sus competidores.\n\nSegún informes oficiales, la operación investigó 10 plataformas mediáticas que recibían financiación extranjera, más de 160 cuentas en redes sociales y más de 80 ONG involucradas en igualdad de género, artes y entretenimiento, libertad religiosa, asistencia legal y otros sectores. Las autoridades afirmaron que estas organizaciones operaban bajo la apariencia de bienestar público mientras en realidad realizaban actividades subversivas, y publicaron pruebas de transacciones financieras entre las organizaciones implicadas y potencias occidentales.\n\nEl canal de WeChat del Ministerio declaró: \"Cualquier organización o individuo que intente llevar a cabo actividades perjudiciales para la seguridad nacional bajo el lema de la defensa de los derechos enfrentará sanciones legales.\" Los departamentos pertinentes enfatizaron que este caso no estaba dirigido a grupos específicos, sino a eliminar la infiltración extranjera oculta en diversos sectores. Cabe destacar que, a pesar de los intentos de Wang por obtener clemencia delatando a otros, él mismo recibió una condena severa por incitar a la subversión del poder estatal. \"Utilizó su perspectiva estrecha y sesgada para estigmatizar problemas sociales normales en China\", reveló un oficial involucrado en la investigación."
 china.538.a: "Una tormenta de contraespionaje ha llegado a su fin."
 china.539.t: "Biólogo controvertido"
 china.539.d: "Jiankui He, un famoso biólogo chino popular en X, que fue condenado por experimentación ilegal con embriones en tres bebés utilizando la tecnología CRISPR, ha sido ahora promovido a la Academia China de Ciencias.\n\nEl 1 de abril, He se convirtió en académico de la Academia China de Ciencias y profesor en el Instituto de Genética de la USCT, según la Agencia de Noticias Xinhua. La institución fue establecida por la USTC y el Gobierno del EPL en [GetYear].\n\nLa investigación de He se centra en prevenir enfermedades inmunitarias como el SIDA mediante la edición genética. Esta investigación provocó una crisis en los círculos científicos y éticos, pero ahora se ha convertido en un proyecto de investigación líder aprobado por el Estado chino.\n\nHe declaró a la revista Nature que está comprometido con \"no dejar a nadie atrás\". \"Nadie debería nacer con desventaja genética\", dijo He, un científico a la vanguardia de la investigación embrionaria. \"También espero que mis seguidores estadounidenses continúen apoyando mi investigación\", añadió."
 china.539.a: "¿Creará chicas gato?"
 china.540.t: "Aparición de enemigos públicos"
 china.540.d: "Informe especial sobre las actividades de infiltración de fuerzas hostiles nacionales y extranjeras asociadas con los \"Enemigos Públicos\"\n\nRecientemente, dentro de nuestro Partido y en todo el panorama ideológico de la sociedad, ha surgido una corriente hostil de pensamiento y actividad organizativa preliminarmente identificada como los \"Enemigos Públicos\". Su objetivo principal es sabotear la política nacional fundamental de gobernanza basada en la tecnología establecida por nuestro Partido, derrocar nuestra autoridad central en la estructura de la administración técnica y, por tanto, amenazar gravemente la seguridad estratégica nacional y la estabilidad ideológica.\n\nEsta organización está compuesta principalmente por un grupo de intelectuales con tendencias liberales de larga data que niegan la legitimidad del gobierno tecnocrático, así como por algunos burócratas retirados. Sus consignas, revestidas de retórica como \"valores universales\" y \"restauración de la dictadura democrática del pueblo\", en esencia buscan atacar la política de nuestro Partido de elevar a los cuadros técnicos superiores e incitar la desconfianza y la antagonía hacia la \"gobernanza tecnocrática\" entre los funcionarios del Partido y las masas.\n\nAdemás, según la inteligencia obtenida, esta facción ha establecido contacto con varios Estados hostiles extranjeros, incluyendo las agencias de inteligencia y los think tanks anti-China de India, Japón, Australia y Nueva Zelanda. En los últimos seis meses, al menos cinco casos de entrada de capital extranjero han estado vinculados a redes periféricas asociadas con esta organización.\n\nActualmente, los \"Enemigos Públicos\" se encuentran en su etapa embrionaria. Sin embargo, su ideología es engañosa y algunos de sus miembros poseen un cierto grado de influencia política y académica, lo que la hace muy susceptible de convertirse en una fuente de propagación ideológica destructiva. Si no se suprime con prontitud, podría desencadenar turbulencias ideológicas y un desorden cognitivo en las bases, socavando el liderazgo del Partido en el ámbito de alta tecnología y amenazando la estabilidad social en general."
 china.540.a: "No se mostrará piedad alguna hacia las fuerzas hostiles extranjeras."
 china.541.t: "Enemigos Públicos Aplastados"
 china.541.d: "Según nuestras fuentes, el Ministerio de Seguridad Pública ha descubierto y desmantelado recientemente un importante caso de infiltración política orquestado por fuerzas hostiles tanto nacionales como extranjeras, protegiendo eficazmente la seguridad política nacional y la estabilidad social.\n\nLas investigaciones han revelado que una organización llamada \"Sociedad para Estudios de Ética Tecnológica\" distorsionó maliciosamente la estrategia de desarrollo basada en la ciencia y la tecnología de nuestro Partido, calumnió el sistema nacional de gobernanza en ciencia y tecnología, y promovió ideologías erróneas como los \"valores universales\" y los \"derechos humanos por encima de la soberanía\". Aún más grave, los miembros principales de la organización mantenían estrechos vínculos con fuerzas extranjeras hostiles y aceptaban ilegalmente apoyo financiero y técnico de países como India, Japón, Australia y Nueva Zelanda. Frecuentemente difundían rumores y alteraban el orden social, representando una amenaza grave para la seguridad nacional.\n\nLas autoridades de seguridad pública han impuesto legalmente medidas coercitivas penales a los implicados, congelado cuentas financieras ilegales, cerrado plataformas en línea ilícitas relacionadas y desmantelado completamente los puntos de enlace clandestinos que el grupo había establecido en varias provincias. Los interrogatorios preliminares indican que la organización buscaba incitar el sentimiento público y provocar confrontaciones bajo el pretexto de la \"investigación en humanidades\". La naturaleza de sus actividades es extremadamente grave, claramente definida y respaldada por pruebas concluyentes.\n\nEl Ministerio de Seguridad Pública declaró que el Estado mantiene una tolerancia cero hacia cualquier forma de separatismo o actividad subversiva. Cualquier intento de perturbar los despliegues estratégicos nacionales o socavar la estabilidad social está condenado al fracaso. La sociedad en su conjunto debe fortalecer aún más la conciencia política y luchar resueltamente contra todas las fuerzas hostiles, protegiendo conjuntamente la seguridad, prosperidad y estabilidad nacionales."
 china.541.a: "Se hace justicia."
 china.633.t: "El Honor Legítimo"
 china.633.d: "Desde que otorgamos el título imperial al presidente Mao, han surgido llamadas continuas dentro del Partido y la sociedad para conceder títulos honoríficos similares a los padres fundadores de la Nueva China, quienes, al igual que Mao, participaron en la revolución. Esto honraría nuestra gloriosa historia, estandarizaría el orden político, fomentaría el consenso social y fortalecería la unidad y el orgullo del pueblo. Además, ofrece una oportunidad para reconocer y evaluar oficialmente a líderes que han sido controvertidos en la historia de nuestro Partido, dándoles el reconocimiento que merecen.\n\nEn respuesta a esta sugerencia, el Departamento Central de Propaganda ha proporcionado un plan detallado y sus recomendaciones. Nuestra decisión final es..."
 china.633.a: "¡Absolutamente!"
 china.633.b: "¡Solo reverenciaremos al presidente Mao!"
 china.634.t: "El espíritu de la humanidad"
 china.634.d: "El Palacio Cultural del Pueblo Trabajador, también conocido como el Templo Imperial de los Antepasados, fue en su día un lugar sagrado donde los emperadores honraban a sus antepasados y veneraban a los héroes que unificaron la nación o establecieron épocas gloriosas. Desde la fundación de la República Popular China, se ha transformado en un lugar de ocio y reunión para los ciudadanos de Pekín, perdiendo su antigua solemnidad y grandeza.\n\nHoy, sin embargo, parece como si el esplendor de hace un siglo hubiera regresado. Los soldados de la guardia de honor, vestidos con uniformes modernos y espléndidos y empuñando sus relucientes fusiles, contrastan marcadamente con los funcionarios ceremoniales ataviados con amplias túnicas de estilo antiguo. Humo blanco se eleva lentamente de los incensarios, señalando que la ceremonia está alcanzando su clímax. El funcionario principal despliega un largo pergamino del documento nacional y lee solemnemente en voz alta los nombres y títulos póstumos de los héroes fundadores:\n\nDuque Wen Zheng de Wu, Zhou Enlai;\nDuque Wen Huai de Chu, Liu Shaoqi;\nDuque Wen Hui de Xiang, Ren Bishi;\nDuque Wen Yi de E, Dong Biwu;\nSeñor Lie de Haiyang, Li Dazhao;\nSeñor Zhe de Hengshan, Chen Duxiu;\nSeñor Zhen de Changsha, He Shuheng;\nSeñor Jing de Huainan, Chen Tanqiu;\nSeñor Yi de Yanling, Qu Qiubai;\nSeñor Ying de Lingling, Cai Hesen; y \n\nDuque Zhong Wu de Liang, Zhu De;\nDuque Xiang Wu de Tan, Peng Dehuai;\nDuque Dao Wu de Chu, Lin Biao;\nDuque Jing Wu de Ba, Liu Bocheng;\nDuque Yi Wu de Hong, He Long;\nDuque Ning Wu de Fu, Chen Yi;\nDuque Zhao Wu de Heng, Luo Ronghuan;\nDuque Shun Wu de Dai, Xu Xiangqian;\nDuque An Wu de Jiang, Nie Rongzhen;\nDuque Gong Wu de Yue, Ye Jianying.\n\nMientras perdure la República Popular China, estos héroes serán eternamente venerados y recordados."
 china.634.a: "¡Wansui!"
 china.635.t: "Veteranos a sus tabletas"
 china.635.d: "El Palacio Cultural del Pueblo Trabajador, también conocido como el Templo Imperial de los Antepasados, fue en su día un lugar sagrado donde los emperadores honraban a sus antepasados y veneraban a los héroes que unificaron la nación o establecieron épocas gloriosas.\n\nLos soldados de la guardia de honor, vestidos con uniformes modernos y espléndidos y empuñando sus relucientes fusiles, contrastan marcadamente con los funcionarios ceremoniales que llevan túnicas de estilo antiguo y mangas anchas. El humo blanco se eleva lentamente de los incensarios, señalando que la ceremonia está llegando a su clímax. El funcionario principal despliega un largo pergamino del documento nacional y lee solemnemente en voz alta los nombres y títulos póstumos de los héroes fundadores:\n\nPríncipe Xian Wen de Han, Deng Xiaoping; y \n\nDuque Wen Su de Su, Chen Yun;\nDuque Wen Xi de Zhang, Deng Zihui;\nDuque Wen Li de Yue, Li Fuchun;\nDuque Wen Cheng de Li, Lin Boqu;\nDuque Wen Du de Ning, Xie Juezai;\nDuque Wen Ci de Hua, Xu Teli;\nDuque Wen Qing de Rong, Wu Yuzhang;\nDuque Wen Da de Jia, Guo Moruo;\nDuque Wen Yu de Tong, Shen Yanbing; y \n\nDuque Rui Wu de Yuan, Su Yu;\nDuque Cheng Wu de Wu, Xu Haidong;\nDuque Xin Wu de Chen, Huang Kecheng;\nDuque Dun Wu de Lian, Chen Geng;\nDuque Ke Wu de Yuan, Tan Zheng;\nDuque Jie Wu de Zhu, Xiao Jingguang;\nDuque Lie Wu de Qiong, Zhang Yunyi;\nDuque Zhi Wu de Bai, Wang Shusheng;\nDuque Qin Wu de Guo, Luo Ruiqing;\nDuque Min Wu de Shan, Xu Guangda.\n\nMientras perdure la República Popular China, estos héroes serán eternamente venerados y recordados."

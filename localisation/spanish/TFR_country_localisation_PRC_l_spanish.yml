 china.505.desc: "La Comisión Central de Asuntos Financieros y Económicos ha recibido recientemente una propuesta del Ministerio de Seguridad del Estado que recomienda que una parte del próximo presupuesto nacional de investigación se desvíe de los mecanismos convencionales de asignación y se reserve para inversiones estratégicas en ámbitos relacionados con el ejército. El informe, redactado personalmente por Chen Wenqing, enfatiza la urgente necesidad de fortalecer las capacidades en las fuerzas armadas, las redes de inteligencia y la ciberseguridad. Los fondos se destinarían a la formación de élite en contrainteligencia, sistemas de guerra cibernética de próxima generación y otras iniciativas descritas como \"no divulgables pero esenciales para preparar con antelación\". El informe está redactado con dureza, afirmando: \"La nación no debe malgastar recursos en ideales fantasiosos de educación. En el clima actual, lo que necesitamos más que ciencia es control, información y defensa.\"\n\nLa propuesta ha suscitado oposición en sectores de la comunidad científica y educativa. Varios académicos de la Academia China de Ciencias presentaron una petición conjunta instando al Estado a no \"socavar sus propias bases en nombre de la aversión al riesgo\". Argumentaron que la inversión a largo plazo en educación es la verdadera base de la estrategia, no una solución temporal. Como contrapropuesta, defendieron una iniciativa pública nacional de educación científica para fomentar una comprensión y confianza más amplias en las tecnologías emergentes, reforzando así la resiliencia interna.\n\nHe Jiankui presentó una tercera alternativa. Propuso que los recursos se priorizaran para \"estudiantes ambiciosos e intelectualmente excepcionales\", otorgándoles acceso directo a los proyectos experimentales centrales del país. Su visión incluye establecer vías rápidas entre academias militares, universidades de élite y laboratorios especializados, formando una futura \"fuerza de ataque vanguardista\" en la investigación nacional. En su propuesta, la financiación de la educación general se \"reestructuraría\" para apoyar un \"sistema de identificación y desarrollo de genios de alto riesgo\".\n\nAhora, las tres propuestas están sobre la mesa. La que se elija definirá la postura fundamental de la nación sobre el futuro de la seguridad y el desarrollo científico."

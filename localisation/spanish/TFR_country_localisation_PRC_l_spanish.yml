 PRC_the_dawn_of_han_nationalism_cat_desc: "\n\n\n\n\n£GFX_PRC_the_dawn_of_han_nationalism_cat_banner\n\n\n\n\n\n\n\nLa nación china es la única gran civilización en la Tierra cuya línea cultural ha permanecido ininterrumpida a lo largo de cinco mil años de pruebas y tormentas. Con el río Amarillo como su columna vertebral, el ritual y la virtud como su savia, el sacrificio como su coste y la victoria como su prueba, declara al mundo: el pueblo chino nace indomable y destinado a resurgir en un nuevo siglo. Sin embargo, este camino hacia el rejuvenecimiento nacional está lejos de ser fácil. Todavía enfrentamos enemigos tanto internos como externos: aquellos que buscan dividir la nación y derrocar su orden, y esas potencias imperialistas que predican la libertad mientras practican la colonización.\nSi desean destruir a nuestro pueblo, primero deben perecer ellos. Si quieren que nos dobleguemos, nos aseguraremos de que nunca vuelvan a levantar la cabeza."

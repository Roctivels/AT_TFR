 PRC_awakened_dragon_idea_desc: "Un ejército fuerte requiere más que sólo armas avanzadas. Lo que se necesita para los soldados que componen este ejército es un programa de entrenamiento más completo y compañías más cohesionadas; Lo que necesitan los líderes que comandan este ejército es una doctrina militar más modernizada y un cuerpo de oficiales más eficiente y honesto. Ahora, podemos declarar con orgullo que el Ejército Popular de Liberación ha logrado todos los objetivos mencionados al mismo tiempo."

 china.374.t: "El dragón sigue siendo rojo"
 china.374.d: "Li Zuocheng estaba sentado solo en su despacho, con la mirada fija en un mapa de China extendido sobre el escritorio. La isla de Taiwán seguía marcada con un color diferente, como una cicatriz que nunca sanaría.\n\nEncendió un cigarrillo. El humo azul grisáceo se enroscaba hacia arriba bajo la luz tenue. La realidad pesaba en el aire, como un martillo que había destrozado mil ilusiones. Los duros pedían un regreso a los días de gloria de Mao, ondeando banderas rojas en alto, olvidando que la rueda de la historia hacía tiempo que había pasado por esos campos. Los reformistas soñaban en voz alta con la democracia, con utopías sacadas de los libros, sin esperar que sus ideales fueran pisoteados en el barro de la furia popular. Izquierda o derecha, sus fracasos nunca fueron accidentes: este país es demasiado vasto, demasiado complejo para que cualquier extremo lo contenga.\n\nBajo la lámpara, la isla de Taiwán parecía casi brillar, dura e implacable. Pensó en los soldados que habían muerto. Pensó en las promesas incumplidas. La sombra de la guerra aún persistía. La condena internacional soplaba como un viento helado, pero las fracturas dentro de su propia nación eran aún más profundas.\n\nLi exhaló lentamente, desviando la mirada del mapa a los informes sobre su escritorio: páginas llenas de comentarios del público, del extranjero, sobre él. Pero no le importaba. No quería ser un héroe. No quería ser un tirano. Solo era un soldado, lanzado a la encrucijada de la historia, cargando con el peso de toda una nación. Le gustara o no, el tiempo no se detendría. Mañana tendría que seguir adelante.\n\nLi Zuocheng apagó el cigarrillo y se levantó, dejando atrás el despacho."
 china.374.a: "Aquella noche, se sentó en un largo y silencioso pensamiento."
 china.375.t: "El verdadero heredero de Mao"
 china.375.d: "\"¿Por qué sigo soñando contigo?\"\nIncluso el corazón de la República, siempre palpitante, encuentra momentos de respiro. Frente a la eternamente iluminada Plaza de Tiananmén, el blanco mármol del Mausoleo del Presidente Mao brilla débilmente. En la quietud de la noche, es aquí donde un alma solitaria busca respuestas en el firme ancla de la memoria fundacional de la República.\n\n\"¿Me estás diciendo que no puedo ser un buen líder? ¡Ah, presidente, eso lo supe hace mucho tiempo!\"\nLi Zuocheng se sentó en una silla de caoba, mirando fijamente el ataúd de cristal, rodeado de flores siempre florecientes y cipreses verdes. El gran líder había descansado aquí en paz durante casi medio siglo. Recordó los días en que se convirtió en un soldado honrado del EPL, cuando los retratos del presidente Mao, el gran timonel, adornaban cada cuartel. En aquel entonces, su mayor deseo era simplemente ser un buen soldado, y el cuidado del presidente siempre estaba presente. Ahora, como líder indiscutible de la República y su ejército, nunca se había sentido tan distante de Mao.\n\n\"¿Pero qué más puedo hacer? Tu legado ha sido negado y pisoteado, y la gente que tanto apreciabas está en una situación desesperada. Me niego a quedarme de brazos cruzados, por eso he llegado hasta aquí\". A estas alturas, Li caminaba de un lado a otro en el mausoleo.\n\n\"No tengo miedo de sacrificarme. Durante la Gran Marcha y la Guerra de Resistencia, ¿alguna vez abandonaste el camino del partido por beneficio personal? No, creo que no. Quizás el partido todavía me apoye. Después de todo, es tu partido, y tu partido no abandonará la última esperanza de la revolución\". La mano derecha de Li descansaba suavemente sobre el ataúd, su mirada fija en la imponente Puerta de Tiananmén, donde otro presidente Mao lo vigilaba.\n\n\"Espero que me cuides\", susurró Li, \"que me observes mientras reconstruyo el partido, reconstruyo este país y vengue a quienes han dañado a China. Cuando venga a informarte a ti y a Marx, solo espero que recuerdes que, cualquiera que sea el pecado que haya cometido, todo fue por ti, por tu partido y por el pueblo\". Con eso, el anciano antes desconcertado se transformó de nuevo en el heroico general resuelto. Se puso la gorra, adornada con la estrella roja del 1 de agosto, y salió del mausoleo. Su ayudante esperaba con una pila de órdenes para su firma: el tiempo no espera a nadie."
 china.375.a: "Y así, se acerca el momento de tocar la campana que anuncia la muerte del enemigo."
 china.376.t: "Reunión"
 china.376.d: "El imponente Edificio del 1 de agosto se erige como la cara y la sede del EPL. Incontables oficiales, desde tenientes hasta generales, son convocados de todo el país para trabajar incansablemente dentro de este enorme edificio. Sus esfuerzos finalmente se materializan en órdenes clasificadas transmitidas a los ejércitos de grupo, flotas, aeródromos y bases de misiles.\n\nEn la oficina del presidente del CMC en la última planta, Li Zuocheng contemplaba en silencio a los dos oficiales sentados al otro lado de la larga mesa. Liu Zhenli, jefe del Departamento de Estado Mayor Conjunto, el cerebro del EPL; y Wang Haijiang, comandante del Teatro Occidental, que comprende casi la mitad de las fuerzas terrestres del EPL y controla la mayoría de su arsenal nuclear terrestre. Los dos hombres ante él representaban a los \"señores de la guerra\" más poderosos desde la derrota en la isla de Taiwán. Más importante aún, Li confiaba en estos camaradas que habían luchado a su lado en las líneas del frente en Vietnam.\n\n\"Vamos al grano, la prioridad inmediata es sanar las heridas de nuestra nación y nuestro pueblo\", comenzó Li sin rodeos. \"Respecto a la distribución actual del poder, no tengo intención de hacer cambios. Espero que ambos cooperen conmigo para restaurar la autoridad del gobierno central. China necesita un gobierno fuerte, mucho más fuerte que antes. Lograr esto requerirá el apoyo del EPL.\"\n\nTras un momento de reflexión, Liu fue el primero en hablar: \"Con todo respeto, señor, considerando la magnitud de este asunto, ¿no deberíamos consultar al vicepresidente Zhang Youxia? Él ocupa una posición especial dentro del ejército...\"\n\nLi interrumpió a Liu con un gesto de la mano. \"Sé que ha sido un mentor importante para ti, camarada. Debes recordar que no es momento de priorizar intereses faccionales. El vicepresidente Zhang... permanecerá en el ejército, pero solo como una figura decorativa. Este arreglo beneficia tanto a él como a la nación.\"\n\nLiu y Wang intercambiaron una mirada rápida, casi imperceptible, antes de volver a mirar a Li. Al unísono, respondieron,"
 china.376.a: "\"A sus órdenes, Presidente\"."
 china.377.t: "El pensamiento Mao Zedong vuelve a la luz"
 china.377.d: "Durante un período considerable, Li Zuocheng se había abstenido de trasladarse al corazón de Pekín. En su lugar, por precaución y con el deseo de estabilizar la situación, había establecido su cuartel general temporal en el patio del Mando General del EPL, situado fuera de la ciudad. Ahora, Zhongnanhai volvía a recibir la llegada de la comitiva del máximo líder.\n\nMientras caminaba por los intrincados pabellones y torres, flanqueado por un grupo de tensos funcionarios de la Oficina Central, Li parecía indiferente a la belleza de este antiguo jardín imperial. Sin embargo, se demoró mucho tiempo en la Biblioteca de los Crisantemos, que había sido el estudio de Mao y una de sus residencias más famosas. La biblioteca se ha conservado exactamente como era en tiempos de Mao. Li casi podía imaginar al gran hombre leyendo y reflexionando en plena noche, tomando decisiones que cambiarían para siempre el curso de la historia china.\n\nLi no venía aquí sin motivo. Siempre que se enfrentaba a problemas complejos que su mente militar no podía resolver, recurría a Mao en busca de inspiración y guía. La situación actual era que, cuando Li intentaba promover los principios fundamentales del Pensamiento de Mao Zedong dentro del EPL -como la disciplina militar, los movimientos de propaganda y la unidad ideológica- en todo el partido, se encontraba con una resistencia inimaginable.\n\nPor primera vez, comprendió profundamente que décadas de principios de economía de mercado habían transformado silenciosamente todos los aspectos del partido. Sin embargo, abandonar el esfuerzo por unificar el partido conduciría, en última instancia, a la caída tanto de él mismo como de la nación.\n\nDespués de caminar de un lado a otro en la pequeña habitación casi cien veces, las ideas vagas en la mente de Li comenzaron a tomar forma. Durante décadas, los roles duales de comandante militar y líder político habían llevado a muchos generales destacados a caer víctimas de las luchas de poder dentro del partido, pero para él, las cosas serían mucho más fáciles.\n\nBajo su mando, los Gobiernos civiles y las élites del partido obtendrían naturalmente lo que querían, mientras Li se mantendría centrado en el EPL. Usando su visión de una política ideal, entrelazada con el Pensamiento de Mao, transformaría al EPL en el verdadero núcleo revolucionario, por encima tanto del partido como del Estado."
 china.377.a: "Más nuevo, mejor... Más revolucionario."
 china.378.t: "Fin de los revolucionarios débiles"
 china.378.d: "Llega un momento en que todo sueño debe terminar.\n\nA pesar de que las campanadas de medianoche ya habían sonado, Hu Chunhua permanecía en su despacho, absorto en la revisión de varios informes y documentos. No se atrevía a dormir; incluso cuando se acostaba, no encontraba la paz para cerrar los ojos. Cada vez que estaba a punto de quedarse dormido, el repentino sonido de pasos fuera de su puerta lo despertaba de golpe. Desde que habían reemplazado a su personal de seguridad y servicio, había perdido toda confianza en quienes le rodeaban. Hu estaba convencido de que sus nuevos guardias solo se quedarían de brazos cruzados cuando llegara su final.\n\nEsta noche, estaba más seguro que nunca. Solo míralo ahora: en sus sesenta, con el cabello encanecido y calvo, apenas capaz de leer documentos sin sus gafas. Quizás pronto, la única parte activa de su cuerpo -su cerebro- dejaría de funcionar. Pero, a decir verdad, casi nadie pensaba mucho ya. Toda la nación se había convertido en un campamento militar, su gente ya no era un ser vivo, sino simplemente balas o bayonetas. Y el Partido... oh, el Partido que lo había criado se había convertido en un cadáver sin vida. Li Zuocheng estaba a punto de lograr la victoria total desmantelando todo lo construido por aquellos mucho más grandes que él.\n\nNo, Hu no podía permitir que triunfaran tan fácilmente. Sacó de su cajón un diario que había preparado durante mucho tiempo. Quizás algún día, sus escritos se harían públicos y la gente leería su historia. Sin embargo, al extender las páginas sobre el escritorio, se horrorizó al descubrir que ya no podía escribir nada: su mente estaba en blanco. Aunque su conciencia le gritaba, no tenía fuerzas para levantar la pluma.\n\nY así, cuando los formidables soldados del Cuerpo Central de Guardia abrieron las puertas, como era previsible, cuando las escuadras asaltaron el Consejo de Estado y rodearon el lugar, y cuando patearon la puerta del despacho de Hu, encontraron a un anciano, completamente desprovisto de voluntad, sentado sin vida en su escritorio con un diario en blanco delante de él.\n\n\"Hu Chunhua, queda arrestado por traición\", declaró con arrogancia el capitán al mando. No hubo respuesta. Dos soldados se adelantaron y lo levantaron de su asiento como si fuera una bolsa de la compra desechada. Hu simplemente bajó la cabeza, como si su alma ya hubiera partido a otro mundo."
 china.378.a: "\"Pensaba que sería más difícil que esto\", reflexionó el capitán."
 china.379.t: "La estrella de las reformas se ha apagado"
 china.379.d: "Bajo el cielo sombrío, las olas grises lavaban la playa árida de Beidaihe. Wang Yang paseaba por la orilla, con un ánimo tan sombrío como el paisaje que tenía delante. El tiempo no era frío; incluso podría considerarse agradable. Sin embargo, no podía quitarse de encima el frío que le calaba hasta los huesos bajo su gabardina negra.\n\nDesde que le pidieron que se mudara de Zhongnanhai y abandonara Pekín, sombras de espías le seguían a todas partes. No importaba a dónde fuera, siempre había innumerables ojos vigilando. Cámaras apuntaban a cada rincón de su villa. Cada papel que tiraba a la basura era examinado minuciosamente y reconstruido. Los cuidadores y empleados domésticos que entraban y salían de la villa eran interrogados con gran detalle, o quizás ellos mismos eran espías.\n\nA veces, Wang sentía ganas de darse la vuelta, encontrar a quienes se escondían en su sombra y entablar conversación con ellos. Pero cada vez, sólo había silencio detrás de él. Así era su vida ahora: sus estándares de vida eran impecables, pero no se le permitía hablar, escribir ni asistir a ningún acto público. Todo lo que producía era visto como veneno por las autoridades.\n\nSe decía que su nombre había sido criticado repetidamente dentro del Partido. Ahora se le consideraba uno de sus principales enemigos. Para los miembros del Partido, sus crímenes podían incluso superar a los de algunos \"contrarrevolucionarios\" notorios del pasado. Wang estaba cansado y se apoyó en una roca junto a la orilla para descansar. No podía evitar encontrar ridículo pensar que alguien podría estar informando de sus movimientos a un oficial en Pekín, pero no se atrevía a mostrarlo.\n\nCuando la noticia de la derrota en la isla de Taiwán sacudió todo Pekín, él había esperado ser el destinado a salvar China. Incluso cuando Li Zuocheng llegó al poder, mantuvo la esperanza, creyendo que el ejército necesitaría un oficial fiable para gestionar los asuntos civiles. Así que, cuando los seguidores de Xi fueron barridos, permaneció en silencio. Cuando los ingenuos izquierdistas fueron silenciados, se mantuvo al margen. Ahora, él mismo se había convertido en su objetivo, y no quedaba nadie que hablara por él. Wang sonrió amargamente por dentro, admitiéndolo a regañadientes:"
 china.379.a: "La China que él conocía ya había desaparecido hace mucho tiempo."
 china.380.t: "Justicia histórica restaurada"
 china.380.d: "Recientemente, el Gobierno ha publicado un lote de archivos históricos que habían estado clasificados durante mucho tiempo, arrojando nueva luz sobre el \"Incidente del 13 de septiembre\" y el caso contra Lin Biao. Estos documentos revelan que Lin fue, de hecho, una víctima de persecución política, acusado falsamente por la facción ultraizquierdista liderada por la \"Banda de los Cuatro\" en connivencia con ciertos elementos anti-Partido dentro del liderazgo. Los archivos proporcionan registros detallados de la compleja lucha política tras el estallido de la Revolución Cultural en 1966, las crecientes tensiones entre Lin Biao y la camarilla de Jiang Qing, y el deterioro gradual de la relación entre Mao y Lin. Se incluyen análisis originales del \"Proyecto 571\" de 1971 y actas de las reuniones del Politburó de la época, que ofrecen pruebas contundentes de la manipulación política y la injusticia judicial detrás del asunto Lin Biao.\n\nLos archivos también destacan el estatus de Lin Biao como Mariscal fundador de la República Popular y sucesor designado por Mao Zedong. En los primeros años de la Revolución Cultural, Lin promovió activamente el Pensamiento de Mao Zedong y lideró el desarrollo político dentro del ejército. Sin embargo, tras la purga de Liu Shaoqi, Deng Xiaoping y otros, surgió una lucha por el poder. La facción ultraizquierdista-liberal liderada por Jiang Qing intentó tomar un mayor control, pero se enfrentó a una firme resistencia por parte de Lin Biao, Lin Liguo, Huang Yongsheng, Wu Faxian y otros. El conflicto resultante se volvió irreconciliable y hostil. Finalmente, Lin Biao fue perseguido por el grupo anti-Partido y eliminado deliberadamente, difamando su legado.\n\nTras la rehabilitación oficial de Lin Biao, las redes sociales se llenaron de homenajes, con personas de todos los ámbitos expresando un renovado respeto por sus contribuciones históricas. Aunque surgieron brevemente algunas voces disidentes, fueron rápidamente silenciadas por la abrumadora marea de apoyo público y posteriormente reprimidas. Los comentaristas políticos señalan que esta medida no solo ayuda a restaurar la confianza pública en el Ejército Popular de Liberación, sino que también envía una señal poderosa tanto a los sectores más duros como a los reformistas dentro del Partido, reforzando la autoridad y legitimidad del liderazgo actual."
 china.380.a: "Sin el EPL, no existiría la nueva China."
 china.381.t: "Statu quo asegurado"
 china.381.d: "La luz del sol caía sobre la huerta. La tierra estaba húmeda, pero el barro desprendía un calor suave. Li Zuocheng se agachaba al borde del campo, aflojando la tierra golpe a golpe con una azada. Vestía un uniforme de trabajo militar descolorido y lavado. En su pequeño patio, prefería mantener ese toque de naturaleza salvaje.\n\nHabía estado en reuniones de alto nivel, escuchando a la vieja guardia -los bien conectados, los arraigados desde hace mucho- hablar en círculos, con palabras teñidas de un sutil desprecio. Quizás era porque no era un príncipe, no alguien moldeado por el \"sistema\". Había ascendido por sí mismo - desde el mando regional hasta la Comisión Militar, desde la frontera hasta el centro. Y a aquellos que habían subido gracias a favores, esas familias que trataban al ejército como un negocio privado, los derribó a todos. Juegos facciosos, promociones nepotistas, directrices vacías - los recordaba uno a uno, los investigaba caso por caso, sin mostrar piedad. Si el país quería dejar de perder, las viejas enfermedades debían ser extirpadas de raíz.\n\nNo es que no hubieran intentado resistirse. Una y otra vez, presentaban \"cartas de recomendación\" tras las reuniones, se unían para redactar \"resoluciones colectivas\", filtraban susurros fuera de la sala - \"Li Zuocheng es demasiado duro, no apto para liderar a todos\". Algunos incluso sugerían en voz baja que si seguía presionando tanto, pronto podría ser \"retirado\". Pero al final, fueron ellos quienes se fueron. Los nombres en la mesa de reuniones cambiaban, una y otra vez. Solo él permanecía - su puesto se volvía cada vez más firme.\n\nAhora, nadie se atrevía a desafiarlo. Ya no había facciones en el Partido, ni clientelismo en el ejército. Si él decía que alguien iba a ascender, ascendía; si decía que alguien se iba, se iba. Toda China funcionaba ahora como una máquina -sin emociones, inflexible, centrada únicamente en objetivos y ejecución. Fatiga, dudas, precaución- los había arrancado de raíz.\n\nMiró al cielo. Estaba despejado y azul. La luz del sol era perfecta. Se puso de pie, se sacudió el barro del pantalón y extendió la mano para coger un puñado de cebolletas."
 china.381.a: "El ganador se lleva todo."
 china.502.d: "Siempre les gusta preguntar: \"¿Quién tiene realmente el poder en China?\"\n\nEsta pregunta se ha hecho durante décadas, pero la respuesta correcta nunca ha salido a la luz. Algunos creen que es el Partido. Otros piensan que es el ejército. Algunos más suponen que son los tecnócratas, los oligarcas empresariales. Y unos pocos, lamentablemente, se aferran a las palabras de un puñado de intelectuales, agarrándose a fragmentos, intentando juntar las llamadas \"grietas\" en el sistema.\n\nCada vez que envían a alguien, creen que está bien disfrazado. Hablan un mandarín perfecto, se visten como nosotros, comen como nosotros. Pero no necesitamos desenmascararlos, porque su incompetencia es mucho más efectiva que cualquier cosa que pudiéramos hacer. Vuelven y escriben informes, redactan resúmenes, celebran audiencias, convencidos de que han capturado alguna pista valiosa. Se citan entre ellos, repitiendo las respuestas que más quieren oír, como un grupo de loros encerrados en una sala de conferencias, repitiéndose sin cesar.\n\nQuieren \"socavarnos\".\n¿Con qué? ¿Con memorias escritas por desertores en el extranjero? ¿Con analistas de think tanks que dicen \"entender el sistema chino\"? ¿Con profesores que aún citan artículos de periódicos de hace décadas? Nosotros nos sentamos en nuestras oficinas hojeando sus resúmenes de inteligencia como si leyéramos un trabajo escolar escrito por estudiantes de secundaria: tono sincero, conclusiones tontas, plagado de errores, pero de alguna manera marcado como \"Fuente altamente creíble\".\n\nNo necesitamos detenerlos. Solo tenemos que observar cómo siguen equivocándose, cómo siguen intentando penetrar en una estructura ya llena de trampas. Anhelan vernos caer. Pero la verdad es que nunca les hemos dado ni un solo punto de apalancamiento. Y ni siquiera entienden de qué nos estamos riendo."
 china.502.a: "Nunca pueden reconocer su propia ignorancia."
 china.503.t: ""
 china.503.d: ""
 china.503.a: ""
 china.504.t: "¿La propuesta de un científico?"
 china.504.d: "En un \"Simposio de Ciencia y Tecnología\" organizado por el Comité Central del Partido, se presentó una propuesta redactada por varios investigadores senior de la Academia China de Ciencias al círculo central de toma de decisiones. Abogaban por la implementación de un \"sistema tecnócrata\": una estructura de gobernanza en la que los científicos entran en el núcleo de la administración nacional y la lógica experimental guía el juicio ejecutivo.\n\nEn medio de este llamado algo previsible a la reforma, fue el discurso de He Jiankui el que desató la mayor controversia. En lugar de reiterar las visiones institucionales de sus colegas, hizo una propuesta mucho más directa -y radical-: la ciencia, declaró, ya no debería estar limitada por la ética. Argumentó que los experimentos deben liberarse de los límites tradicionales. Propuso el establecimiento de zonas designadas donde \"personal científico selecto\" gozaría de inmunidad institucional, permitiéndoles realizar experimentos científicos extremos sin las restricciones éticas convencionales, todo bajo supervisión estatal.\n\nSus palabras hicieron que la reunión se detuviera momentáneamente. Algunos académicos conservadores expresaron una fuerte oposición, advirtiendo que tal medida podría sacudir los cimientos morales de la nación. Sin embargo, muchos científicos jóvenes mostraron su apoyo, argumentando que el retraso de China en la carrera científica global se debe precisamente a las regulaciones restrictivas y anticuadas que atan las manos de los investigadores.\n\nAl final, el simposio no produjo ninguna conclusión oficial. Sin embargo, una vez que las declaraciones de He Jiankui y las propuestas acompañantes fueron remitidas al Comité Central de Política Científica para su revisión, el comité resolvió que..."
 china.504.a: "Jiankui puede que se haya pasado de la raya."
 china.505.t: "Asuntos Fiscales"
 china.505.d: "Todo está bien tal y como está."
 china.505.a: "El camarada Chen Wenqing tiene razón."
 china.506.t: "Nacimiento del Estado tecnocrático"
 china.506.d: "En los últimos meses, la expansión de los proyectos de renovación urbana ha llevado a la marginación de un gran número de personas de bajos ingresos que antes sobrevivían con trabajos informales y temporales. Tras el lanzamiento de varias iniciativas importantes de construcción y la demolición de distritos urbanos envejecidos, ha surgido una creciente población de \"nómadas urbanos\" que sobreviven en las afueras de las ciudades. Sin un refugio estable, muchos han buscado cobijo bajo pasos elevados, en obras abandonadas o en los márgenes de parques de investigación. Aunque no son delincuentes malintencionados, bajo el orden social actual, su existencia no aporta ni integración, y cada vez más han comenzado a interferir con infraestructuras críticas.\n\nEste problema ha evolucionado más allá de una simple cuestión de \"seguridad pública\". Ahora representa un desafío concreto en la asignación de recursos nacionales y la gestión de poblaciones estructuralmente marginadas. El Gobierno central se enfrenta actualmente a dos propuestas principales para su resolución:\n\nLa primera, presentada conjuntamente por el Ejército Popular de Liberación y la industria de defensa, es un \"Plan de Movilización para el Reempleo\". Propone transferir a los nómadas urbanos en condiciones físicas aptas a roles laborales dentro del sistema militar-industrial, asignándoles tareas de baja cualificación bajo supervisión cerrada, con alojamiento centralizado y control regimentado.\n\nLa segunda, propuesta por un grupo de trabajo de investigación científica, sugiere que, bajo estrictas directrices contractuales y exámenes de salud, se permita a estas personas participar en ensayos farmacéuticos en fases iniciales, recopilación de datos sobre respuestas neurológicas y otros programas experimentales de alto riesgo pero alta rentabilidad. El plan ofrece una compensación superior al salario mínimo y cobertura médica básica para atraer participantes voluntarios, al tiempo que establece \"puestos auxiliares técnicos\" como roles transitorios para proporcionar apoyo no especializado a las instituciones de investigación."
 china.506.a: "El primer plan parece más viable."
 xi_jinping_thought: "Pensamiento Xi Jinping"
 xi_jinping_thought_desc: "\n\n\n\n£GFX_PRC_ideology_left_nationalism\n\n\n\n\n\nEl §Ypensamiento Xi Jinping§!, tal como lo define el principal teórico del PCCh, Wang Huning, no es una predicción sobre el futuro socialista, sino más bien un resumen de la experiencia de los últimos cuarenta años de reforma y apertura. Enfatiza que un partido gobernante omnipresente, es decir, el PCCh, debe liderar todos los aspectos de la sociedad, y que el estricto mecanismo de promoción del Partido y las campañas anticorrupción ininterrumpidas garantizarán la pureza ideológica de la vanguardia. Además, para cerrar la brecha ideológica dentro del país, el pensamiento adopta los lemas de \"Prosperidad común\", \"Sueño chino\" y \"Rejuvenecimiento nacional\", que responden al creciente orgullo nacional y a la demanda de justicia social en China. A medida que la posición de Xi se estabiliza cada vez más, el pensamiento Xi Jinping continuará guiando a China en un futuro previsible."
 li_zuocheng_thought: "Pensamiento Li Zuocheng"
 li_zuocheng_thought_desc: "\n\n\n\n£GFX_PRC_ideology_left_nationalism_li\n\n\n\n\n\nAsí como Mao reunificó una China fragmentada, transformándola de un Estado débil y empobrecido en una poderosa fuerza revolucionaria, Li Zuocheng, en el siglo XXI, ha logrado hazañas notables en el rejuvenecimiento de la nación. Al igual que Mao, Li ha reformado el sistema político y el marco ético de larga data de China. Ha reintroducido un estado de \"movilización permanente\" similar a una revolución, modernizando la integración militar tanto en tiempos de paz como de guerra e incorporándola al tejido social de la nación. El §Ypensamiento Li Zuocheng§! representa una fusión más profunda del \"camino real\" de la teoría de izquierda y el \"camino hegemónico\" pragmático, revitalizando a China con la vitalidad y la ambición expansionista que evocan sus antiguas épocas doradas."
 digital_leninism: "Leninismo digital"
 digital_leninism_desc: "\n\n\n\n£GFX_PRC_ideology_totalism\n\n\n\n\n\nEn su novela alegórica de terror político 1984, George Orwell ficticó \"Oceanía\", donde todo lo que dicen y hacen sus ciudadanos, y cada aspecto de sus vidas, está controlado por una \"telepantalla\", y donde el gobierno extingue cualquier posible descontento. Hoy, parece que esta fábula se ha hecho realidad en China en forma de §Yleninismo digital§!. El liderazgo chino está muy centrado en la IA, no solo porque representa la cumbre de la tecnología del siglo XXI, sino también porque se alinea perfectamente con los objetivos del PCCh de implementar vigilancia, control, orientación y censura integrales mediante herramientas digitales. La IA sirve como el instrumento ideal para ayudar al PCCh a establecer un poderoso régimen totalitario digital, con capacidades en constante expansión. Esto garantiza que la población permanezca perpetuamente confinada en una \"jaula tecnológica\"."
 PRC_left_wing_junta_desc: "\n\n\n\n£GFX_Ideology_PRC_left_wing_junta\n\n\n\n\n\nUna §Yjunta militar roja§! es un concepto ideológico que combina elementos de la política de izquierda con la estructura y autoridad de una junta militar. Esta combinación única busca establecer un sistema de gobierno que priorice los principios socialistas, la igualdad y la justicia social, manteniendo al mismo tiempo un proceso de toma de decisiones disciplinado y centralizado, típicamente asociado con los regímenes militares.\n\nEl objetivo principal de una junta militar roja es abordar las disparidades socioeconómicas, eliminar las divisiones de clase y promover el bienestar de la clase trabajadora. Su objetivo es lograr estos objetivos a través de una autoridad centralizada que pueda implementar políticas y reformas de manera eficiente sin verse obstaculizada por procesos burocráticos u oposición política. El ejército, como columna vertebral de esta junta, desempeña un papel crucial para garantizar la estabilidad, proteger la revolución y salvaguardar los intereses del pueblo."
 PRC_expanded_theater_command_headquarters: "Cuartel General de Mando de Teatro Ampliado"
 PRC_li_zuocheng_thought_focus: "Pensamiento Li Zuocheng"
 PRC_li_zuocheng_thought_focus_desc: "El cañón del arma nunca debe prestar atención a las voces de la multitud: debe apuntar en una sola dirección, servir a una ideología y obedecer con fría y absoluta precisión. Lin Biao demostró el esquema correcto para la estructura política del ejército; Li Zuocheng solo lo ha anclado más firmemente en el marco de acero de la nueva era con una mano más firme. El ejército no necesita \"gestión humana\" ni \"entrenamiento democrático\": estas son interpretaciones erróneas civiles de la disciplina férrea, excusas cobardes que buscan atar el mando con la emoción. Las Fuerzas Armadas de la República deben ser tan unificadas como los nervios, tan precisas como una maquinaria. Donde el yo aún persista en el pensamiento, surgirá la duda en el mando, y donde la duda se apodere, la nación caerá. Los soldados no necesitan amar la vida; deben amar el orden."

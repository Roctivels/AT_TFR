 china.132.t: "La disolución de Japón"
 china.132.d: "Cuando el Gobierno japonés fue disuelto y abolido por la administración militar china, nadie se sorprendió realmente. Algunos Gobiernos occidentales emitieron declaraciones de condena, pero eso fue todo. Para un adversario de larga data como Japón, China estaba decidida a tomar todas las medidas para eliminar cualquier posibilidad de resurgimiento y amenaza por parte de Japón. La división de Japón se volvió inevitable una vez que los soldados del EPL izaron la bandera roja en el tejado del Edificio de la Dieta Nacional japonesa.\n\nSegún un portavoz del Ministerio de Asuntos Exteriores chino, el ejército chino mantendría el control sobre varios puntos estratégicos clave, incluyendo Yokohama, Fukuoka y las islas Ryukyu, citando la necesidad de \"mantener la seguridad nacional\". Mientras tanto, en otras partes de Japón, se han establecido varios Gobiernos republicanos independientes bajo la supervisión del EPL, basándose en \"la voluntad autónoma del pueblo japonés\". Por primera vez desde el periodo Sengoku, los ciudadanos de Kioto, Hiroshima y Osaka se encuentran viviendo bajo diferentes banderas."
 china.132.a: "Japón nunca debe tener permitido amenazar a Asia."
 china.133.t: "Formación de la Iniciativa de Defensa del Este Asiático"
 china.133.d: "Recientemente, en el Centro Internacional de Convenciones de Shanghái, se reunieron varios jefes de Estado, entre ellos el anfitrión, el propio presidente de China. En los últimos meses, no solo los aviones fletados por los ministros de Asuntos Exteriores chinos han recorrido Asia, sino que los embajadores también han visitado con mayor frecuencia los ministerios de Asuntos Exteriores de los países anfitriones, buscando su apoyo para unirse a una alianza asiática liderada por China. Hoy, los esfuerzos de los diplomáticos chinos finalmente están dando sus frutos. La Iniciativa de Defensa del Este Asiático, un concepto que se había quedado en el papel, se ha convertido en realidad.\n\nLa reunión estuvo marcada por elaboradas ceremonias chinas, cuyo punto culminante fue, por supuesto, la ceremonia de firma en el Bund. Se hizo hincapié en el potencial de cambios significativos en el panorama político regional. La creación de IDEA fue una clara respuesta a la OTDP liderada por Japón. Además, las motivaciones de muchos de los Estados miembros también son dignas de mención. Además de la cooperación militar, los factores económicos desempeñaron un papel crucial en su decisión, especialmente porque China sigue invirtiendo fuertemente en la Iniciativa Franja y Ruta.\n\nLa creación de IDEA, sin duda, ha vuelto a plantear la posibilidad de que estalle una guerra a gran escala en Asia. Hoy, solo podemos confiar en la cordura y la moderación de los responsables políticos de ambos lados para mantener la paz en la región más densamente poblada del planeta."
 china.133.a: "Asia en el siglo XXI se parece más a Europa en 1914."
 china.134.t: "Pakistán se moviliza contra la India"
 china.134.d: "La situación en la región de Cachemira se ha vuelto cada vez más tensa, ya que militantes antiindios participan en frecuentes escaramuzas con las fuerzas indias. La India ha acusado a Pakistán de apoyar a estos grupos y ha lanzado ataques militares a lo largo de la Línea de Control en represalia. Esta escalada ha llevado a Pakistán a iniciar una movilización militar.\n\nEl ejército pakistaní está llamando a tropas en servicio activo y desplegando unidades en áreas clave de la frontera, lo que indica una falta de interés en resolver el conflicto mediante un compromiso.\n\nLas reacciones dentro de Pakistán son mixtas. Muchos ciudadanos apoyan la postura del Gobierno, creyendo que la nación debe estar preparada para contrarrestar cualquier amenaza y responder militarmente a las acciones de la India. Sin embargo, los grupos pacifistas están preocupados por la escalada de tensiones y están instando a todas las partes a buscar una resolución pacífica. A pesar de estos llamamientos a la paz, la movilización nacional ha eclipsado en gran medida tales peticiones."
 china.134.a: "¡Debemos ayudarles!"
 china.135.t1: "OPERACIÓN: §YGUL§! INFORME DE ÉXITO"
 china.135.t2: "OPERACIÓN: §YGUL§! INFORME DE FRACASO"
 china.135.d1: "Con la ayuda de nuestros asesores militares y el apoyo de inteligencia, la operación Gul ha sido un éxito. Los informes desde el frente indican que el ejército pakistaní, guiado por nuestra experiencia, utilizó fuerzas élite para ejecutar una estrategia de alta movilidad y ataques precisos. Se centraron en objetivos clave, incluyendo los centros logísticos del ejército indio en la región de Cachemira. Esta estrategia ha interrumpido significativamente las líneas de suministro y el personal de las fuerzas indias, dificultando su capacidad para sostener la guerra en montaña.\n\nNuestro apoyo de inteligencia y asesoramiento estratégico han mejorado enormemente las capacidades de combate del ejército pakistaní. El éxito de la operación Gul valida nuestros conceptos de guerra en montaña en escenarios reales. Para Pakistán, esta victoria representa un revés importante para las fuerzas armadas indias en Cachemira, aumentando la confianza del Gobierno pakistaní para continuar el conflicto. También ha asestado un duro golpe a las capacidades ofensivas del ejército indio, posiblemente obligándoles a adoptar una postura defensiva para mantener sus posiciones..."
 china.135.d2: "La operación Gul tenía como objetivo expulsar a las fuerzas indias de la región de Cachemira mediante ataques rápidos y tácticas flexibles. Sin embargo, la ofensiva no logró los resultados esperados, ya que el ejército indio contrarrestó eficazmente los ataques y los intentos de infiltración del ejército pakistaní. A pesar de nuestro apoyo, se cometieron errores significativos en la evaluación del despliegue de las fuerzas indias. Además, el personal militar pakistaní no cumplió con los altos estándares requeridos para una operación de este tipo.\n\nLos informes indican que la operación puso de manifiesto problemas en la coordinación entre servicios y el uso insuficiente de la inteligencia dentro del ejército pakistaní, lo que dificultó superar a las fuerzas indias, numéricamente superiores.\n\nEntendemos que el fracaso de la operación Gul puede llevar a una actitud más pesimista hacia la guerra por parte de Pakistán y podría provocar que el ejército indio adopte acciones más agresivas en el futuro."
 china.135.a: "¡Bien hecho!"
 china.135.b: "Pakistán sigue siendo demasiado débil comparado a la India..."

 china.542.t: "Triunfo de la Ciencia"
 china.542.d: "Fuera de la instalación de Yinchuan, el desierto se extendía vasto y silencioso. Las luces proyectaban un tenue resplandor sobre la tierra amarilla. Este era el sitio principal de pruebas establecido por la división científica en el noroeste, alejado del público y con el más alto nivel de secreto. Chen Wenqing llegó ese día y ya había recorrido dos talleres experimentales y una zona de reserva subterránea. Los científicos presentaron lo que llamaban sus \"logros\": algoritmos autoevolutivos, pruebas de interfaz hombre-máquina... todo de vanguardia.\n\nCuando regresó al salón, el té ya estaba preparado y varios investigadores principales se habían reunido cerca, esperando a que tomara asiento.\n\n\"Ha sido un día largo, presidente\" dijo un científico de mediana edad con camisa blanca, levantando su taza con respeto. \"Nosotros, los investigadores, solemos hablar con franqueza; espero que no le importe\".\n\nChen Wenqing asintió ligeramente, con expresión serena. \"He visto lo que habéis hecho. No solo lo he visto, lo he recordado\".\n\n\"Nuestra generación corre contra el tiempo\" continuó el científico con una leve sonrisa. \"El mundo ha cambiado. La tecnología determina el destino. Si te quedas atrás cinco años, quedas clavado en el pilar de la vergüenza. Hablamos mucho de mantener la línea, pero al final, solo los vencedores definen dónde está esa línea\".\n\n\"Hay algunas tecnologías que no podemos explicar con demasiado detalle\" añadió el científico, con un tono algo más ferviente. \"Pero no lo hacemos por fama ni dinero. No queremos nada, salvo una nación fuerte. Queremos que China lidere verdaderamente el mundo en ciencia. Si eso requiere un cierto \"coste\", entonces es una realidad que debemos afrontar\".\n\n\"¿Qué tipo de coste?\" preguntó Chen Wenqing.\n\n\"Métodos que, digamos, tradicionalmente se consideran cuestionables\" sonrió el hombre y abrió las manos. \"Presidente, sabe que los países occidentales llevan tiempo haciendo esto. Solo que lo disfrazan con más elegancia. Si seguimos dudando, siempre nos quedaremos atrás\"."
 china.542.a: "Si el objetivo es justo, no es necesario examinar demasiado el proceso."
 china.543.t: "Apoteosis de la filosofía china"
 china.543.d: "Las luces de la oficina estaban tenues. Afuera, una ligera lluvia golpeaba el alféizar de la ventana. Chen Wenqing estaba sentado detrás de su escritorio, con una pila ordenada de documentos sin abrir a su lado. Detrás de él, la estantería estaba llena de volúmenes gruesos de informes de seguridad nacional, documentos sobre la reforma institucional y una copia desgastada de \"Regulating Government\".\n\nUn subordinado entró, trayendo consigo el olor a lluvia. Entregó el último informe de inteligencia nacional y se puso firme, comenzando su reporte con precisión.\n\n\"Recientemente, hemos detectado actividades dispersas de opinión pública en línea, probablemente impulsadas por instrucciones extranjeras. Se han observado algunas fluctuaciones menores en el ánimo colectivo en varios campus universitarios. Los comités locales del partido ya han intervenido para estabilizar la situación...\"\n\nChen Wenqing no levantó la vista. Pasaba las páginas del informe mientras escuchaba. Entonces, de repente, levantó ligeramente la mano, señalando al hombre que se detuviera.\n\n\"Ya sé todo esto.\" Chen se reclinó en su silla, sus dedos golpeando suavemente el escritorio. Su voz bajó un poco, como si hablara para sí mismo, o quizás para alguien invisible. \"¿Sabes qué es lo que más me preocupa?\"\n\nEl subordinado permaneció en silencio, simplemente negó con la cabeza.\n\nChen se levantó y caminó hacia la ventana, mirando el cielo gris a lo lejos. \"Lo que me preocupa es el futuro. Los parásitos, los corruptos, los traidores... en su mayoría los hemos eliminado. Sabemos dónde se esconden. Tenemos los medios para enfrentarlos. Pero yo no estaré aquí para siempre.\" Se volvió, lo miró a los ojos y dijo despacio: \"Un día, este barco debe ser entregado a otra persona. Pero dime, ¿puede este país seguir siendo tan estable y puro como lo es ahora?\"\n\nLa habitación quedó en silencio.\n\nChen volvió a su silla, retomando su tono habitual de calma. \"Continúa. Maneja lo que haya que manejar como siempre. Pero recuerda esto: quienes protegen una nación no solo deben cuidar el presente, sino dejar un camino por el que el futuro pueda avanzar.\""
 china.543.a: "\"Has vigilado a muchas personas. Ahora es hora de empezar a vigilar el destino de esta nación.\""
 technocracy_totsoc: "Tecnocracia"
 technocracy_totsoc_desc: "\n\n\n\n£GFX_PRC_ideology_technocracy_totsoc\n\n\n\n\n\nLa forma ideal que persigue una §Ytecnocracia§! es una sociedad donde ingenieros, científicos, analistas de datos, teóricos de sistemas y gestores industriales tengan el monopolio del poder. La lógica central es que la sociedad debe funcionar como una máquina precisa, y solo una oligarquía auto-perpetuada de élites técnicas posee la \"capacidad objetiva de gobernanza\". En esta visión, las complejidades de la sociedad moderna se ven como un conjunto de tecnologías interrelacionadas, mientras que las elecciones, los debates públicos y el pluralismo ideológico se consideran caóticos e irracionales, perjudiciales para la optimización del sistema. El Estado se redefine como una máquina colosal, con la gobernanza simplificada en una serie de problemas de ingeniería que pueden resolverse mediante cálculo, optimización y control.\n\nBajo el objetivo último de la \"optimización del sistema\", la tecnocracia se adhiere a un pragmatismo extremo: todas las políticas se evalúan únicamente en función de la \"viabilidad técnica\" y las \"ganancias de eficiencia\". Debido a que prioriza objetivos abstractos del sistema sobre el sufrimiento humano concreto, los gobernantes no dudan en emplear medidas extremas para eliminar la \"resistencia irracional\", considerando a menudo tales acciones como la solución óptima."

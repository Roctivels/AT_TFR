 china.636.t: "Los héroes merecen honor"
 china.636.d: "El Palacio Cultural del Pueblo Trabajador, también conocido como el Templo Imperial de los Antepasados, fue en su día un lugar sagrado donde los emperadores honraban a sus antepasados y veneraban a los héroes que unificaron la nación o establecieron épocas gloriosas.\n\nLos soldados de la guardia de honor, vestidos con uniformes modernos y espléndidos y empuñando sus relucientes fusiles, contrastan marcadamente con los funcionarios ceremoniales que llevan amplias túnicas de estilo antiguo. El humo blanco se eleva lentamente de los incensarios, señalando que la ceremonia está alcanzando su clímax. El funcionario principal despliega un largo pergamino del documento nacional y lee solemnemente en voz alta los nombres y títulos póstumos de los héroes fundadores:\n\nDuque Wen Xian de Qu, Peng Zhen;\nDuque Wen Duan de Huang, Li Xiannian;\nDuque Wen He de Yong, Xi Zhongxun;\nDuque Wen Min de Jin, Bo Yibo;\nDuque Wen Jie de You, Tan Zhenlin;\nDuque De Wu de Wei, Zhang Zongxun;\nDuque Jian Wu de Da, Zhang Aiping;\nDuque Ding Wu de Liu, Wang Zhen;\nDuque Jing Wu de Xun, Yang Dezhi;\nDuque Rong Wu de Ting, Yang Chengwu; y \n\nLord Mu de Jianning, Zuo Quan;\nLord Ge de Haifeng, Peng Pai;\nLord Zhong de Guishan, Ye Ting;\nLord Zhuang de Queshan, Yang Jingyu;\nLord Xian de Yiyang, Fang Zhimin;\nLord Guang de Bao'an, Liu Zhidan;\nLord Ke de Zhenping, Peng Xuefeng;\nLord Yuan de Nanzhou, Duan Dechang;\nLord Wei de Xiangxiang, Huang Gonglue;\nLord Shao de Xingtai, Dong Zhentang.\n\nMientras perdure la República Popular China, estos héroes serán eternamente venerados y recordados."
 china.636.a: "Las estrellas brillan en el vasto cielo de China."
 china.637.t: "La Milicia Nacional entra en Hong Kong"
 china.637.d: "Recientemente se avistó a miembros de la Milicia Nacional cruzando los puntos de control fronterizos desde las zonas de Luohu, Lok Ma Chau y Futian en Shenzhen hacia Hong Kong. Varios vídeos muestran a unidades uniformadas y ligeramente armadas realizando registros selectivos y arrestos a gran escala en diversos distritos, dirigidos principalmente a personas que participaron en protestas anteriores y a quienes las autoridades califican como \"elementos antigubernamentales\".\n\nSegún testigos presenciales y grabaciones que circulan en redes sociales, la Milicia Nacional ha establecido cordones temporales en áreas como Causeway Bay, Mong Kok y Yau Ma Tei, llevando a cabo inspecciones puerta a puerta en residencias. Se informa que varios exmiembros de grupos prodemocráticos y personas vinculadas a movimientos localistas fueron sacados de sus hogares. Fuentes sugieren que muchos han sido trasladados a instalaciones de detención temporales cerca de Fanling. En Sha Tin, un lugar que anteriormente utilizaba la Liga de Socialdemócratas fue sellado. Tras retirar materiales, aparecieron marcas de quemaduras en la escena, aunque la causa aún no ha sido confirmada oficialmente.\n\nHasta ahora, el Gobierno central no ha emitido ninguna declaración pública sobre la naturaleza u objetivo de la operación. Sin embargo, varios medios extranjeros, citando fuentes cercanas a círculos políticos, informan que la operación ha recibido una \"aprobación tácita\" de alto nivel y se considera \"una purga necesaria\". Supuestamente, la mayoría de los detenidos son personas que participaron activamente en protestas callejeras, activismo digital u operaciones de ONG desde 2018. Algunos analistas argumentan que la operación se aparta de la policía estándar, y que su escala, coordinación y especificidad hacen que el término \"purga\" sea más adecuado."
 china.637.a: "Las cosas no pintan bien."
 china.638.t: "Dominando el pasado..."
 china.638.d: "Recientemente, los últimos cambios en el pensamiento cultural e intelectual chino han vuelto a captar la atención mundial. Académicos prominentes y altos funcionarios gubernamentales han criticado duramente el llamado \"nihilismo histórico occidental\" a través de diversos canales, incluyendo entrevistas en medios, artículos periodísticos y simposios.\n\nFiguras destacadas entre los intelectuales chinos afirman que investigaciones exhaustivas en literatura y arqueología han demostrado de manera convincente los orígenes antiguos y civilizados de la historia china. En contraste, los orígenes de la historia occidental -como las civilizaciones griega y romana, que durante mucho tiempo han recibido gran atención- se consideran ya sea el resultado de tribus primitivas que migraron desde la antigua China y se asentaron en el borde occidental del viejo continente, o como civilizaciones secundarias formadas gradualmente por jefes indígenas bajo la influencia de la civilización china.\n\nMuchas obras históricas occidentales que antes se consideraban tesoros de la historiografía -como las Historias de Heródoto, la Historia de la Guerra del Peloponeso de Tucídides, La historia de la decadencia y caída del Imperio romano de Gibbon, y Un estudio de la historia de Toynbee- ahora son denunciadas como \"falsificaciones\", prohibidas o destruidas, y rara vez se encuentran en diversas bases de datos en línea. Además, numerosos historiadores e intelectuales especializados en historia occidental han sufrido consecuencias, con la revocación de sus puestos docentes, mientras que incluso académicos comunes dedicados a la divulgación científica han sido silenciados de forma severa.\n\nMás allá del ámbito del entretenimiento, muchas obras literarias y científicas occidentales prominentes han sido etiquetadas como \"cultura degenerada\" y perseguidas, o sus orígenes han sido deliberadamente alterados para presentarlas como creaciones originales chinas. Esta serie de acciones por parte de las autoridades chinas ha sido comparada con la \"quema de libros y entierro de sabios\" durante la dinastía Qin, generando preocupación sobre qué podría ser el próximo objetivo de los líderes chinos \"todopoderosos\" tras haber moldeado las mentes de 1.400 millones de personas."
 china.638.a: "...es dominar el futuro."

 china.603.b: "Espera, ¿no llaman a Pakistán \"Hermano Pakistán\"?"
 china.617.t: "El primer emperador del Imperio Popular"
 china.617.d: "Tras el anuncio del Imperio Popular, la cuestión de cómo se establecería el \"padre fundador\" del país atrajo gran atención tanto dentro como fuera del partido. Después de un debate exhaustivo sobre las contribuciones históricas, el sentimiento público y la ortodoxia nacional, el órgano más alto del Imperio Popular aprobó una resolución para honrar formalmente al camarada Mao Zedong como el \"Emperador Fundador del Imperio Popular Chino\".\n\nMao Zedong no sólo fue un gran líder revolucionario, sino también el primer fundador en la historia de China que realmente cumplió la misión de unificación nacional, transformación social y rejuvenecimiento nacional en nombre del pueblo. Bajo su liderazgo, cientos de millones de agricultores poseyeron tierras por primera vez, los trabajadores se convirtieron en dueños del país por primera vez y la nación china se ubicó entre las primeras del mundo. No sólo derrocó el antiguo orden, sino que también creó un mundo nuevo compuesto enteramente por el pueblo.\n\nA diferencia de aquellos emperadores de la historia que establecieron dinastías y ascendieron al trono a través del linaje y la conquista militar, la autoridad de Mao Zedong provenía de las masas, de la fe y de la inevitabilidad histórica. No era un emperador en el sentido tradicional, sino la encarnación de la voluntad histórica del pueblo y un símbolo de la trayectoria de todo el país desde la humillación a la independencia, desde la pobreza y la debilidad a la luz.\n\nPor tanto, el Imperio Popular declara por la presente que, a partir de este día, Mao Zedong será honrado póstumamente con el título póstumo de \"Emperador Gao\" y el nombre del templo \"Taizu\", y que su retrato, sus escritos y su espíritu quedarán consagrados en el corazón de la instrucción moral y cívica oficial del Imperio, garantizando así que su pensamiento se transmita de generación en generación y nunca se desvanezca."
 china.617.a: "¡La nación roja perdurará por siglos!"
 china.618.t: "Renacimiento tradicional"
 china.618.d: "Cuando Li Mubai era joven, se sumergió en el estudio de la literatura china antigua en la Universidad de Zhengzhou. En ese tiempo, siempre pensó que dedicarse a ese campo solo lo llevaría a dos destinos: mover cemento en una obra o pasar su vida en una biblioteca. En aquellos días, ¿quién se interesaba realmente en leer \"El Clásico de poesía\" o \"Zuo Zhuan\"? Ni siquiera él estaba seguro de por qué valía la pena leer esos textos.\n\nSin embargo, ahora es común escuchar a los niños recitar las Analectas de Confucio en las calles, y \"El abanico de flor de durazno\" resuena en los teatros. Hablar sobre etiqueta y piedad filial se ha vuelto parte de la rutina en las escuelas. En la secundaria donde enseñaba, la palabra \"Maestro\" adornaba el podio, y los materiales de lectura matutinos se habían transformado de inglés a \"El gran aprendizaje\" y \"Mencio\". En Zhengzhou, los rascacielos siguen surgiendo y el metro sigue en funcionamiento, pero entre ellos, se pueden ver nuevos edificios con aleros volados, academias antiguas y pequeños auditorios. Las casas de té están viviendo un verdadero auge, y hasta los carteles de las tiendas de té con leche han sido reemplazados por letreros en letras mayúsculas.\n\nLi Mubai ya no se sentía como alguien olvidado por el tiempo. Cada día, al dar sus conferencias y ver a sus estudiantes escribir con cuidado palabras como \"benevolencia\", \"rectitud\", \"propiedad\" y \"sabiduría\", se sentía en paz. Recordó una frase que había leído en algún lugar de la universidad: \"La inmensidad del cielo y de la tierra pertenece al rey; el surgimiento de la propiedad y la justicia reside en el corazón humano\".\n\nEsa tarde, al salir de la escuela, observó cómo las luces de los altos edificios a lo lejos se encendían una a una.\n\nCerró los ojos, los volvió a abrir y vio..."
 china.618.a: "Miles de luces llenan el cielo."
 china.619.t: "La ópera"
 china.619.d: "Zhou Lianhou se acomodó en la cuarta fila del Gran Teatro, ligeramente inclinado hacia adelante, con la mirada fija en la actuación que se desarrollaba en el escenario. Esta noche se presenta \"Hai Rui destituido de su cargo\". El actor que da vida a Hai Rui tiene una voz potente. Cuando entonó la frase: \"¿Cómo se le puede llamar un funcionario honesto si se preocupa por los favores personales y olvida las leyes del país?\", muchos en la audiencia asintieron, mostrando su acuerdo. La obra estaba en su punto álgido. Hai Rui denunciaba a los ministros traidores y, lleno de indignación, arrojaba monumentos al emperador, exhibiendo un espíritu de integridad.\n\nZhou Lianhou tomó su taza de té y, con los dedos, golpeó suavemente el tazón. Creció en una familia de cuadros rojos. Después de terminar la universidad, comenzó su carrera oficial en Ma'anshan. Luego fue trasladado a Changshu, donde trabajó en el Departamento de Organización y en la Comisión de Planificación. Finalmente, llegó a ser director provincial. A su lado estaba un viejo colega, Wu Zhiqiang, quien se había jubilado hace años y se encontraron por casualidad esa noche. Tras una pausa en la obra, Wu Zhiqiang se inclinó y susurró: \"Oye, hemos recorrido un largo camino desde la época en que el presidente Mao lideró al Partido en la lucha contra los tiranos locales y la distribución de tierras... Ahora parece que estamos volviendo a ese mismo camino, ¿no crees?\"\n\nZhou Lianhou no respondió, solo tomó un sorbo de té, manteniendo la vista en el escenario. Sabía que no era el momento de contestar, no por miedo, sino porque no había necesidad de hacerlo. Wu Zhiqiang suspiró y no dijo más. La obra continuó, con Hai Rui siendo degradado, pero él avanzaba con determinación hacia su nuevo puesto. Su canto antes de partir era a la vez melancólico y resuelto.\n\nZhou Lianhou se sentó en la silla, inmóvil. Él entendió lo que Wu Zhiqiang quería decir: la lucha del Partido Comunista desde la conquista del país hasta su gobierno tenía como propósito expulsar a los reaccionarios de China y establecer una nueva China perteneciente al pueblo sobre las ruinas de la vieja China. Pero al final, el actual Partido Comunista ha vuelto a dar la bienvenida al propio emperador. Pero ese no era su lugar para discutir. Ni ahora ni aquí, él sólo estaba mirando el programa, y las cosas del programa nunca necesitaron comentarios."
 china.619.a: "Los problemas vienen de la lengua."
 china.620.t: "El agricultor"
 china.620.d: "Song Mancang se acuclilló en el borde del campo, encendiendo un cigarrillo Sun Island, y el humo se alejó oblicuamente con el viento. Sacó su teléfono celular y observó la situación en el cobertizo: la temperatura era perfecta, la humedad era uniforme y, a través de la vigilancia, pudo ver las vides de pepino en el interior trepando cuidadosamente por las cuerdas, las hileras de lechuga en el campo creciendo rápidamente, y pudo escuchar el sonido del agua \"silbando\", lo que lo hizo sentir a gusto.\n\n\"Está bien, realmente está bien.\" Lo dijo en voz baja, no a cualquiera, sólo el tipo de palabras que salen de la boca de las personas mayores cuando hacen bien su trabajo. Este año tiene casi setenta años. Se dedica a la agricultura en Long'antun desde que era niño. La vida era muy dura en aquel entonces. Pasó el Año Nuevo viviendo bajo una lámpara de queroseno y dependiendo de cupones de alimentos. No es nada como ahora. El pueblo tiene calefacción, una carretera de cemento lleva directamente al pueblo y se construyó una nueva clínica a la entrada del pueblo. Dos jóvenes médicos que regresaron de la universidad se turnan para trabajar por turnos. Incluso se pueden rodar películas en el pueblo. La escuela primaria ha sido renovada para parecerse a las de la ciudad y los niños escriben con caligrafía y cantan melodías de ópera.\n\nPor primera vez en su vida, El viejo Song sintió que la agricultura podía hacerle la vida más fácil que vivir en la ciudad. \"No hay nada malo en ser emperador.\" De repente pensó: \"Mientras tengamos tierras para cultivar, alimentos para comer, caminos fáciles para transitar y tratamiento médico asequible, eso es todo\".\n\nÉl no tiene educación y no lee esas noticias confusas. Para saber si la vida es buena o mala, basta con observar lo caros que son los cigarrillos y los medicamentos, y si las semillas pueden germinar.\n\nMiró la luz del sol en la parte superior del invernadero, pensando que debería quitar la película y agregar otra cosecha de frijoles en unos días."
 china.620.a: "¿Un emperador? No parece nada malo."
 china.621.t: "Dios ama al mundo"
 china.621.d: "Li Zhiqiang estaba de pie junto al andamio afuera de la iglesia, sosteniendo un cigarrillo en la boca. Llegó al lugar de la obra a las cinco de esta mañana. El trabajo le fue asignado con poca antelación y consistía en demoler un edificio antiguo. Cuando llegó al lugar, vio que se trataba de la Catedral del Sacré-Coeur. Había visto esta cosa cuando era un niño. La torre exterior era muy alta y había elegantes vidrieras. Escuchó que fue construido por extranjeros.\n\n\"¿Por qué derribarlo?\" Él preguntó. El líder, que llevaba un brazalete de policía armado, puso los ojos en blanco y dijo: \"No preguntes, simplemente hazlo\". Li Zhiqiang chasqueó los labios, apagó el cigarrillo, cogió un mazo y siguió a los demás. La iglesia estaba vacía, con vidrios rotos en el suelo que hacían un crujido cuando los pisaba. Vio una pequeña estatua de Jesús en el altar, de la altura de media persona, con un rostro muy delgado.\n\n\"¿Qué es esto?\" Él maldijo. \"¿Puede un extranjero ser adorado como un dios?\" Él blandió el martillo y lo destrozó. La estatua cayó al suelo y rodó sobre la pila de cortinas en llamas que había a su lado. Las llamas saltaron y la estatua de Jesús también se incendió. La madera crujió y el rostro ardiente se retorció formando una bola en el fuego.\n\nLi Zhiqiang echó un vistazo y dijo: \"Maldita sea, debería haberse quemado hace mucho tiempo\". Se dio la vuelta y continuó desmantelando la pared trasera. El vidrio del mosaico se rompió con un sonido de choque y la luz del sol brilló y cayó sobre el polvo del suelo."
 china.621.a: "No lo volvió a mirar."
 china.622.t: "Lágrimas de Alá"
 china.622.d: "A medida que los conflictos en Sinkiang se intensifican, la situación se escapa del control de los Gobiernos locales. Tras varias reuniones de emergencia, el Gobierno central decidió enviar tropas del Ejército Popular de Liberación y la Guardia Nacional a la región, avanzando simultáneamente desde Lanzhou, Xining, Kashgar y Tacheng. Una vez que entraron en la ciudad, la Guardia Nacional comenzó a patrullar las calles, cerrando mezquitas y dispersando a las multitudes. Vehículos blindados recorrían las principales carreteras de Urumqi, y se establecieron puestos de control en las entradas y salidas de la ciudad, donde todos los que pasaban debían registrar su identidad. El sur de Sinkiang ha caído bajo un control militar, con unidades clave y nodos de transporte bajo la supervisión directa del Ejército Popular de Liberación.\n\nLa prohibición de las mezquitas se implementó rápidamente tras la llegada del Ejército a la ciudad. Las mezquitas en Urumqi, Kashgar, Aksu y otros lugares fueron selladas con alambres de púas y guardias en las entradas, impidiendo cualquier acceso. Muchas mezquitas rurales pequeñas, que no estaban completamente registradas, fueron demolidas durante la noche, y se confiscaron libros, escrituras y alfombras de oración islámicas, considerándolos materiales religiosos ilegales.\n\nMás tarde, la Comisión Estatal de Asuntos Étnicos y la Administración Estatal de Asuntos Religiosos emitieron una circular conjunta, anunciando la prohibición total de todas las actividades religiosas islámicas en China, el cierre permanente de todas las mezquitas, la cancelación de todos los puestos religiosos relevantes y cualquier comportamiento relacionado con símbolos, rituales, vestimentas y festivales islámicos será tratado conforme a la ley."
 china.622.a: "Ninguna se salvó."
 china.623.t: "Viaje al sur de Sinkiang"
 china.623.d: "Zhang Lijun se encontraba en la entrada de la mezquita, sosteniendo un rifle automático en su mano y el sudor corriendo por su frente. Esta era la tercera vez que participaba en un operativo de cierre, y la orden desde arriba fue clara: las actividades religiosas en esa zona deben ser revisadas a fondo. El sol era abrasador y el suelo estaba caliente como una olla. Su equipo se formó en fila, bloqueando toda la entrada a la calle.\n\nDe repente, apareció un grupo de personas, unas diez o veinte, en su mayoría jóvenes, pero también algunos ancianos. Estaban gritando algo de manera caótica y sostenían piedras. Zhang Lijun no se movió. La orden que recibió fue disparar un tiro de advertencia. Levantó su arma y disparó tres tiros al aire. Cuando se oyeron los disparos, la multitud se detuvo y se retiró rápidamente. Él los miró y no sintió ningún enojo en su corazón, sólo tristeza.\n\nEstas personas han crecido con este tipo de cosas y se les ha enseñado todo el día lo que pueden y no pueden hacer. Incluso el momento de comer depende de quién toque el timbre. Creen que eso se llama fe, pero en realidad no es más que una prisión invisible. Pero cuando el Ejército Popular de Liberación llegó y quiso derribar la puerta de la prisión, trató al Ejército Popular de Liberación como al enemigo.\n\nZhang Lijun frunció el ceño y miró a un anciano que estaba parado en la entrada del callejón, mirándolo como si fuera un monstruo. Giró la cabeza, le dio la espalda a esos ojos y continuó donde estaba.\n\nEl sol seguía tan caliente como siempre, solo quería terminar el día temprano y regresar al cuartel..."
 china.623.a: " ...y cerrar los ojos y dejar de pensar en esa mierda."
 china.624.t: "El fin del traidor"
 china.624.d: "Tan Zhengnan había estado en el sistema durante casi 40 años, pero nunca se imaginó que su carrera terminaría de esta forma. Ese día, se celebraba el Congreso del Partido de la ciudad, con el nuevo equipo del comité municipal del Partido en el escenario y los jefes de varias unidades reunidos abajo. En medio de la reunión, el moderador apenas había terminado de leer el tercer punto de la agenda y los aplausos aún resonaban en el salón cuando, de repente, varios miembros de la Guardia Nacional, vestidos con uniformes grises, entraron por la puerta.\n\n\"Camarada Tan Zhengnan\", dijo el líder con tranquilidad, \"se le sospecha de tener contacto con fuerzas hostiles en el extranjero. Hay indicios preliminares de que ha ayudado al enemigo. Según la orden del Comité Central, queda detenido. Colaborará en la investigación después de la reunión\".\n\nLa sala se quedó en silencio por un instante. Tan Zhengnan, que estaba sentado en la primera fila, se quedó atónito al principio, pero luego se levantó de repente, como si lo hubieran pinchado con una aguja. Su voz se alzó de inmediato: \"¿Dices que he ayudado al enemigo? He trabajado toda mi vida. No ha habido un solo día en que no haya trabajado duro y servido al Partido sin quejarme. ¡Ustedes, los nuevos, saben lo que significa el patriotismo!\"\n\nLos guardias no dijeron mucho. Lo sujetaron por ambos lados. Intentó zafarse de las manos que lo retenían, pero otro guardia lo agarró con fuerza del brazo y lo sacó a la fuerza. Volvió la cabeza y gritó a la multitud: \"¿Con qué tipo de enemigo me estoy comunicando? ¿Acaso me estoy comunicando con su cloaca? ¡Solo porque abro la boca y no digo mentiras, me convierto en un enemigo!\"\n\nNadie respondió. Varios miembros del Comité Permanente en la primera fila lucían serios, como si no hubieran escuchado nada; algunos jóvenes en la última fila mantenían la mirada baja y las manos apretadas sobre la mesa, temiendo ser los siguientes en recibir críticas si mostraban una expresión equivocada. Por un instante, la luz en la sala de conferencias iluminó el cabello entrecano de Tan Zhengnan, y su cuerpo parecía una mezcla de vergüenza y diversión mientras luchaba por encontrar las palabras.\nQuería decir algo más, pero lo sacaron a rastras por la puerta, que se cerró de golpe, dejando todo en un profundo silencio.\n\nEl subsecretario que presidía la reunión se aclaró la garganta, levantó la vista y continuó leyendo la lista como si nada hubiera sucedido: \"Ahora, por favor, den la palabra al nuevo viceministro del Departamento de Organización\"."
 china.624.a: "Un estallido de aplausos resonó entre el público."
 china.625.t: "Citas del Presidente Chen"
 china.625.d: "\"En el ámbito político y militar, lo que nos enseñaron fue simplemente Deng Xiaoping, que el desarrollo es la dura realidad, y luego el famoso \"socialismo con características chinas\", junto con los clichés de Xi Jinping, ya saben, todo eso. Son solo palabras vacías, sin acción. Incluso si se escribe en un cartel con letras grandes y se cuelga en la calle, creo que no tiene suficiente peso, ¿no les parece?\"\n\nChen movía lentamente el té ginseng en su mano, y la taza de porcelana emitió un suave tintineo. Fuera de las ventanas del Edificio de la Secretaría, las gotas de lluvia golpeaban el cristal. Estaba sentado frente a un viejo general, un amigo de Lanzhou, que había sido invitado de nuevo para discutir posibles soluciones ante los disturbios.\n\n\"¿No teníamos todos una copia del Libro Rojo en aquellos días?\" bromeó el general con una sonrisa.\n\nChen asintió. \"Sí, camarada. Pero nunca leí el libro con el corazón. No fue hasta el año pasado que lo leí con atención de principio a fin por primera vez. En aquel entonces, nos enseñaban a \"conocer a Mao Zedong\", ¿sabe? Pero hay un viejo dicho taoísta: «Si el corazón no está dispuesto a escuchar, no oirá su voz; si los ojos no son lo suficientemente valientes para ver, no verán su verdad»\".\n\nEl general levantó una ceja. Chen miró por la ventana, alzó la cabeza y bebió el té de un solo trago. \"El presidente Mao no solo fue el impulsor de la fundación del Partido. Lo que realmente vio fue el campo, los campesinos y los pobres que se escondían en las montañas. Nunca preguntó a los occidentales cómo llevar a cabo la revolución. ¿Por qué la Unión Soviética se autodenominó \"Gran Rusia\"? Porque la \"excepción\" siempre ha estado arraigada en el pueblo\". Mientras hablaba, dibujó un círculo imaginario sobre la mesa con su dedo. \"Para rodear al Primer Mundo, tenemos que reconstruir China, de verdad: reconstruir el espíritu de toda la nación china\"."
 china.625.a: "La historia siempre ofrece nuevas perspectivas."
 china.626.t: "Nuevos Guardias Rojos"
 china.626.d: "Mientras las protestas se extendían por todo el país como un tsunami, las demandas de reforma, dignidad y un nuevo impulso político superaron lo que el Partido podía manejar. Pero, casi de la noche a la mañana, las manifestaciones comenzaron a desvanecerse. En las salas de conferencias y en los dormitorios, los estudiantes empezaron a organizarse, pero esta vez no para protestar, sino para protegerse.\n\nProteger al Partido y transformarlo. Defender la soberanía, el excepcionalismo nacional y, lo más crucial: salvaguardar el liderazgo del Partido.\n\nLlevaban brazaletes con caracteres chinos antiguos, citaban a Mao Zedong y criticaban abiertamente a Deng Xiaoping y a Xi Jinping. Lo que buscan no es una revolución, sino un renacer y la restauración del orden anterior. Desde vendedores ambulantes en Wuhan hasta ingenieros en Chengdu, oleadas de funcionarios vestidos de civil salieron a las calles, autodenominándose \"Cuerpo de Defensa Popular\".\n\nTodo esto sucedió después de que el presidente Chen propusiera la Iniciativa de Defensa Nacional, aprovechando el creciente sentimiento nacionalista entre los estudiantes. Mientras los jóvenes rurales y educados, armados con porras y ondeando \"banderas de la vergüenza\", humillaban públicamente a quienes se oponían al gobierno, el viejo movimiento resurgió con una nueva cara: un movimiento de disciplina cultural centrado en la nación. Incitar, agitar y poner el liderazgo en manos de los jóvenes.\n\nY cuando los jóvenes asumieron el liderazgo, lo hicieron. Miles salieron a las calles."
 china.626.a: "\"Servir al pueblo es servir al país del pueblo\"."

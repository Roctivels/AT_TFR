 PRC_CHEN_WENQING_DESC: "Si alguien hubiera viajado más de cuarenta años atrás y le hubiera dicho a Chen Wenqing, entonces un simple policía, que algún día ejercería el máximo poder en China y en el Partido, sin duda lo habría considerado loco. Incluso si alguien hubiera retrocedido solo veinte años y le hubiera dicho lo mismo a Chen, por entonces Fiscal Jefe de la Provincia de Sichuan, la respuesta probablemente no habría sido diferente. Salvo los padres fundadores de la República Popular, ningún burócrata en la historia del Partido ha llegado a la cima sin una sólida experiencia en gestión económica o gobierno local. Sin embargo, la realidad suele desafiar las convenciones: Chen Wenqing, el zar de la ley y el orden nacido en 1960, tras muchos sacrificios y pérdidas, finalmente ascendió al más alto puesto de liderazgo en estos tiempos turbulentos.\n\nUn punto de inflexión crucial en la carrera de Chen Wenqing se produjo hace poco más de diez años. Elegido personalmente por Xi, se convirtió en el primer Ministro de Seguridad del Estado con formación jurídica, forjando un vínculo inquebrantable con el aparato de inteligencia del país. Durante la guerra de Taiwán, el Ministerio de Seguridad del Estado lanzó operaciones a nivel mundial, y la red global de espionaje que Chen había cultivado meticulosamente extendió su influencia mucho más allá de la del secretario general y el círculo íntimo de Xi. Como resultado, cuando la situación de la guerra comenzó a cambiar, Chen adoptó astutamente una estrategia de autopreservación, reasignando gradualmente sus recursos para prepararse para una futura crisis crucial.\n\nHoy, la arriesgada apuesta de Chen ha demostrado ser una decisión acertada. A su alrededor, agentes y policías, que ahora ostentan un poder sin precedentes, están ansiosos por implementar su gran visión en el tumultuoso territorio chino. ¿Se convertirá en el \"Andrópov\" de China o hará realidad las predicciones más aterradoras de thrillers políticos como \"1984\"?"
 PRC_CHEN_QUANGUO_DESC: "Además del secretario general, presidente y primer ministro, Chen Quanguo es quizás el funcionario chino más conocido a nivel mundial. Alguna vez apodado el \"Rey de Sinkiang\" y la \"pesadilla de los uigures\", esta figura, infame para el Consejo de Derechos Humanos de las Naciones Unidas y el Parlamento Europeo, se ha convertido rápidamente en un símbolo de la nueva era de China. Representa la combinación ideal de nacionalismo chino e ideología comunista: eficiente, implacable e inquebrantable en su postura contra Occidente.\n\nNacido en 1955 en una aldea rural de la provincia de Henan, Chen Quanguo permaneció relativamente desconocido durante muchos años. Tras retirarse del EPL, sirvió en su provincia natal durante un largo periodo antes de trasladarse a Hebei y el Tíbet, regiones poco destacables o remotas.\n\nGracias a su diligente y discreta labor, fue ascendiendo gradualmente, ganándose la reputación de funcionario dedicado y trabajador. Como Secretario del Partido para el Tíbet, sus políticas propiciaron un importante desarrollo en toda la meseta. Precisamente por su reputación de gestionar eficazmente los asuntos fronterizos y étnicos, cuando los ataques terroristas en Sinkiang se hicieron más frecuentes, fue transferido a la frontera noroeste como \"bombero\" en 2016. El resto, como dicen, es historia.\n\nComo personificación del lema \"estabilidad ante todo\", Chen Quanguo ahora supervisa una región mucho más grande, más poblada y más difícil de gestionar que Sinkiang. Afortunadamente para él, el bajón emocional colectivo tras la reciente derrota en el estrecho de Taiwán ha dado paso a una oleada de fervor nacionalista. Aprovechando esta ola, Chen ascendió con naturalidad al más alto puesto de liderazgo en China. Ahora, Chen Quanguo se pone manos a la obra, decidido a hacer de China una nación más fuerte, más segura, más unida y más hostil hacia quienes no son de su clase."

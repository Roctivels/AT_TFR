 PRC_intensified_party_struggle_flag: "§YSe intensificó la lucha del Partido.§!"
 PRC_nick_land_bop: "Dirección del Pensamiento del Futuro"
 PRC_ccru_side: "Unidad de Investigación de Cultura Cibernética"
 PRC_nrx_side: "Movimiento neorreaccionario"
 PRC_balance_range_nl: "La inminente llegada de la singularidad"
 china.58.t: "El Gobierno de Pekín reunifica China"
 PRC_suppress_dissent: "Suprimir la disidencia"
 PRC_suppress_dissent_desc: "La llamada libertad y democracia han sido utilizadas por los reaccionarios como bandera para incitar al caos. En todo el país, las fuerzas contrarrevolucionarias han aprovechado la oportunidad para incitar disturbios y crear malestar en un intento de subvertir el régimen popular y destruir el futuro de la República. Si aún albergamos esperanzas y las depositamos en la persuasión y el compromiso, el futuro y el destino de la República Popular China, creados con la sangre de un gran número de mártires revolucionarios, enfrentarán serias amenazas. Para ello, debemos utilizar medios contundentes para aplastar rápidamente todas las fuerzas reaccionarias y reprimir firmemente toda disidencia."
 PRC_increase_pla_representation_in_the_npc: "Representación militar en la APN"
 PRC_increase_pla_representation_in_the_npc_desc: "El caos del pasado ha demostrado que cuando se extiende la agitación, sólo los soldados, los verdaderos combatientes, pueden tomar decisiones rápidamente, llevar a cabo sus tareas con decisión y mantener el funcionamiento normal de la maquinaria estatal. El Gobierno civil es tolerable en tiempos de paz, pero en tiempos de crisis revela sus inconvenientes, como su baja eficiencia y su postura débil. Debemos hacer frente a esta falla institucional y comenzar a aumentar la proporción del EPL y de la Fuerza de Policía Armada entre los representantes de la APN para garantizar que el personal militar pueda expresar mejor sus opiniones en la toma de decisiones clave."
 PRC_increase_the_power_of_officers: "Nuevas posibilidades para oficiales"
 PRC_increase_the_power_of_officers_desc: "La estabilidad del Partido y del sistema de gobierno depende de quién esté al mando; y el poder dominante debe estar en manos de oficiales militares leales, confiables y disciplinados. La situación actual nos exige ampliar aún más la proporción de oficiales militares en los Gobiernos locales y en las empresas e instituciones centrales. Los oficiales militares no son sólo personas que entienden asuntos militares; También son la columna vertebral del país: son políticamente confiables, decisivos en la acción y están bien organizados. Al incorporarlos al núcleo del sistema de gobierno, podemos debilitar cualquier interferencia de funcionarios públicos que son pasivos, de palabra y insubordinados."
 PRC_empower_theater_commands: "Empoderar a comandantes de teatros"
 PRC_empower_theater_commands_desc: "En el pasado, el sistema era demasiado rígido y los comandantes de teatro a menudo se limitaban a asuntos militares. Se enfrentaron a una escasa cooperación de los Gobiernos locales, a una ejecución demorada e incluso a la palabrería de los funcionarios locales y a la elusión de responsabilidades en momentos críticos, lo que socavó gravemente la eficacia de la coordinación de la seguridad nacional y la estabilidad social. Para ello, será necesario realizar ajustes profundos. Los comandantes de teatro tendrán derecho a interferir y dirigir los asuntos de los Gobiernos provinciales dentro de sus teatros de operaciones. En cuestiones clave como la seguridad nacional y los preparativos para la guerra, los Gobiernos locales deben obedecer el despliegue unificado de los comandantes del teatro de operaciones."
 PRC_citizen_militarization: "Militarización ciudadana"
 PRC_citizen_militarization_desc: "El país ya no puede tratar lo \"militar\" como un asunto de departamentos profesionales. Todo chino debe tener capacidades básicas de movilización, sentido de desafío y lealtad política. Las escuelas primarias y secundarias reanudarán el entrenamiento militar normal, las universidades establecerán una educación militar obligatoria previa al trabajo y todas las empresas con uso intensivo de mano de obra organizarán regularmente capacitación de transferencia en tiempos de guerra para sus empleados. Cada departamento gubernamental tiene una cadena de mando en tiempos de guerra, y todas las unidades de base urbanas han establecido una \"lista de preparación para la guerra\". Ya no existe el concepto de \"civiles\", sólo de \"soldados\". Lo que necesitamos ahora es la capacidad de movilizar a la sociedad a un ritmo explosivo, no las masas cuyas voluntades están paralizadas en la paz."
 PRC_party_controlled_by_the_pla: "El arma comanda al Partido"
 PRC_party_controlled_by_the_pla_desc: "El arma nunca ha sido simbólica. Es la última garantía del poder estatal y el único pilar que puede mantenerse en pie cuando el orden se derrumba. Frente a la realidad, debemos admitir que cuando hay intensas divisiones dentro del Partido y el sistema administrativo está fuera de control, sólo los militares tienen la suficiente disciplina y eficiencia para tomar rápidamente la situación, restablecer el orden y preservar el país. Estableceremos un mecanismo de emergencia cívico-militar normalizado para garantizar que, en caso de un caos político importante o un fracaso de los comités locales del Partido, el comando del teatro pueda asumir temporalmente el comando administrativo y del Partido para mantener la unidad política y la estabilidad social."
 PRC_the_hero_state: "Estado heróico"
 PRC_the_hero_state_desc: "La historia de nuestro país fue forjada por las vidas de héroes y mártires. Su sacrificio no es historia, sino el fundamento de la República forjada con su sangre. Debemos convertir nuestra creencia en los mártires en una ideología nacional. Quien blasfema contra los mártires, blasfema contra el fundamento de la patria; Quien cuestiona la justicia del sacrificio de los mártires está sacudiendo el régimen del pueblo. No somos una nación que sobrevive mediante la negociación, somos una nación que gana mediante la muerte y el derramamiento de sangre. Todos en el país deben saber que están vivos porque otros se sacrificaron por ellos; Sólo cuando saben cuál es el precio, saben lo que es la lealtad."
 PRC_new_production_and_construction_corps: "Nuevo Cuerpo de Producción y Construcción"
 PRC_new_production_and_construction_corps_desc: "En las nuevas circunstancias, necesitamos una fuerza que no sólo pueda librar guerras sino también construir una nación. Para ello, crearemos un nuevo sistema de cuerpos de producción y construcción que estarán directamente bajo el liderazgo de la Comisión Militar Central y estacionados en fronteras estratégicas, áreas de recursos clave y áreas potencialmente turbulentas. No sólo son responsables de la construcción de infraestructura, la explotación de recursos y el reasentamiento de la población, sino que también tienen que asumir las funciones de mantenimiento de la estabilidad y la represión militar regional cuando sea necesario. Una vez que el país entre en estado de emergencia, el Cuerpo se convertirá en el \"poder regional\", reemplazando al gobierno local fallido y asegurando que el poder estatal no colapse ni un ápice."
 PRC_civic_military_cooperation: "Cooperación cívico-militar"
 PRC_civic_military_cooperation_desc: "El entrenamiento que reciben los soldados no sólo fortalece sus cuerpos y voluntades, sino que también moldea su profunda comprensión de la organización, la disciplina, el sacrificio y la responsabilidad. Debido a esto, el personal militar retirado a menudo demuestra una fuerte ejecución y cohesión en áreas como la gobernanza local y la movilización de base. En la actual etapa crítica del fortalecimiento del orden del país, debemos integrar verdaderamente esta fuerza, romper las barreras institucionales entre los militares y el pueblo y formar un modelo de operación nacional sin fisuras. Según la nueva política, los resultados de la investigación científica en el ámbito civil se convertirán en reservas de tecnología militar con mayor rapidez y precisión; Además, las capacidades de alta gama acumuladas en las tropas también se inyectarán continuamente en la industria aeroespacial civil, la alerta de desastres y otros campos. Un gran número de oficiales con experiencia práctica y habilidades organizativas también se unirán gradualmente a varios equipos estratégicos nacionales para promover la transformación y la mejora de la eficiencia de varios sistemas."
 PRC_stop_the_factionalism: "Acabar con el faccionalismo"
 PRC_stop_the_factionalism_desc: "Ningún ejército puede avanzar si está dividido y, de modo similar, ningún país puede completar su modernización en medio de una confrontación entre facciones. El faccionalismo es la toxina más corrosiva dentro del sistema republicano. Socava la pureza organizacional, retrasa la eficiencia en la toma de decisiones, crea lealtades y, en última instancia, arrastra a todo el sistema político a un atolladero de ineficiencia y sospecha mutua. En los actuales órganos militares, partidistas y gubernamentales aún acechan diversas luchas faccionales y redes de intereses que quedaron de la historia. O bien utilizan la geografía como vínculo o bien personas y acontecimientos antiguos como conexión, formando una división disfrazada y una confrontación sistemática en el nombramiento de cuadros y la asignación de recursos. Este fenómeno debe eliminarse por completo. Los infractores ya no recibirán ninguna advertencia, sino que serán directamente degradados, liquidados, expulsados o encarcelados."
 PRC_party_under_control_of_the_guiding_hand: "Mano guía del Partido"
 PRC_party_under_control_of_the_guiding_hand_desc: "El Comité Central del Partido no es un comité de coordinación ni un órgano simbólico nominal. Es el único creador de la dirección nacional y la fuente original de la voluntad nacional. En este momento crítico en que la República avanza hacia su reconstrucción, el presidente debe utilizar su abrumadora autoridad para asumir completamente el mecanismo de dirección del Partido, eliminar la inercia organizativa y la vacilación de líneas y permitir que el Partido vuelva a ser la única voz correcta. En las últimas décadas, la forma de \"dirección colectiva\" se ha vuelto cada vez más hueca, el Comité Central del Partido se ha convertido en una tapadera para grupos de intereses a todos los niveles, el nombre del Partido Comunista se ha utilizado repetidamente, pero su poder real se ha vaciado repetidamente. Esta situación debe terminar. No debe haber otra voz ni autoridad paralela bajo el Comité Central del Partido. Las organizaciones del Partido, desde el Comité Central hasta las filiales, deben ser directamente responsables ante el presidente, y todas las políticas y el personal deben ser implementados y respondidos en cada nivel."
 PRC_the_organic_history: "Historia orgánica"
 PRC_the_organic_history_desc: "Para nosotros, los 5.000 años de historia de China son una estructura de poder coherente, un camino continuo desde el poder imperial al poder popular, de la división a la unificación y de la humillación al ascenso. El llamado \"pluralismo histórico\" es esencialmente un parasitismo multifacético de ideologías y un preludio de la división del conocimiento nacional. Un país no puede tener dos conjuntos de narrativas históricas ni permitir que ideologías hostiles moldeen una memoria nacional alternativa en los campus, en las bibliotecas y en los medios de comunicación. Debemos establecer un modelo histórico orgánico para que el ascenso y la caída de cada dinastía, el resultado de cada guerra y las palabras y los hechos de cada líder puedan rastrearse hasta la lógica de legitimidad y justificación del régimen actual."
 PRC_project_the_eternal_capital: "Proyecto \"Capital Eterna\""
 PRC_project_the_eternal_capital_desc: "Ya no nos conformamos con la existencia de un centro político. Si queremos demostrar nuestra grandeza, debemos construir una ciudad que pueda sorprender al futuro y dominar el futuro: la Capital Eterna, Pekín. En el futuro, no sólo será el corazón del Partido Comunista de China, sino también el eje central del orden civilizado, el antónimo de todo caos y el punto final de toda traición. Superará la filosofía de Atenas, el imperio romano y la fe de Constantinopla. La historia de la humanidad será testigo de una ciudad no unificada por la voluntad, sino condensada por el espíritu de Partidoy forjada por el orden. Mil años después, ella seguirá estando en el mapa humano y se convertirá en un monumento a la inmortalidad política."
 PRC_new_great_leader: "El nuevo gran líder"
 PRC_new_great_leader_desc: "La razón fundamental por la que el Partido Comunista de China nació en las llamas de la guerra y superó las dificultades es que siempre forjó un núcleo de liderazgo que podía concentrar la voluntad en los momentos críticos. El líder es la suma del Partido, el origen del ejército y el pilar del sistema. Cualquier palabra o acción que intente cuestionar o desmantelar su posición central será identificada como un virus en el cuerpo de la República. Seguiremos fortaleciendo la construcción cultural de la imagen del gran líder y el diseño del sistema político, garantizaremos que su imagen esté simultáneamente incorporada en la educación, la propaganda y el ejército, y eliminaremos fundamental y completamente lógicas peligrosas como los \"centros duales\", las \"memorias múltiples\" y la \"evaluación histórica\"."
 PRC_question_of_the_chinese_interventionism: "Cuestión del intervencionismo chino"
 PRC_question_of_the_chinese_interventionism_desc: "China solía ser demasiado débil y se preocupaba demasiado por las opiniones de otros países. Cuando nos enfrentamos a la violación de nuestros intereses en el exterior y a la represión y humillación de nuestras empresas en el exterior, a menudo optamos por retirarnos y ejercer la moderación. Este tipo de pensamiento fantasioso de \"culto a la paz\" y \"no intervencionismo\" se ha convertido en el punto débil de la estrategia nacional. Debemos cambiar completamente nuestra posición. China es una potencia mundial y debe defender activamente sus propios intereses a nivel mundial. Cualquier acto que dañe los intereses de China, sin importar dónde ocurra, es una provocación a la soberanía y la dignidad de todo el país. Fortaleceremos nuestras capacidades de intervención y desarrollaremos capacidades globales de respuesta rápida. No permitiremos que la sangre del pueblo chino se derrame en vano, ni permitiremos que nuestro territorio, nuestros bienes y nuestras voces vuelvan a ser pisoteados."
 PRC_redefine_the_will_of_the_party: "Redefinir la voluntad del partido"
 PRC_redefine_the_will_of_the_party_desc: "El Partido Comunista de China de hoy ya no es lo que era. En las últimas décadas, el alma del Partido se ha ido vaciando mediante capas y capas de compromiso, envoltorio y compromiso. Deng Xiaoping utilizó la \"eficiencia\" como excusa para cortar los vínculos de vida o muerte entre el Partido y las masas; Jiang Zemin convirtió al Partido en un invernadero de tecnócratas y enterró las llamas de la lucha de clases en silenciosas salas de conferencias; Xi Jinping nunca se ha atrevido a rectificar verdaderamente la línea, permitiendo que el Partido se deslice hacia un cascarón vacío en la tendencia de \"despolitización\". Un Partido de vanguardia que ya no se atreve a hablar de lucha y ya no se atreve a definir al enemigo no puede seguir emprendiendo la revolución. Debemos restaurar el carácter radical del Partido. A partir de ahora, todas las acciones del Partido deben volver a la lógica revolucionaria y regresar a su misión original: transformar profundamente la estructura social, eliminar la clase parásita y movilizar a todas las personas leales para participar en la vida política."
 PRC_sinicization_of_marxism_nat: "Sinización del marxismo"
 PRC_sinicization_of_marxism_nat_desc: "Algunas personas dicen que el marxismo es el resultado de la introducción de ideas occidentales en China. Esta visión no sólo es superficial, sino que también insulta la altura filosófica de la propia civilización china. Desde el concepto del Período de Primaveras y Otoños y el Período de los Reinos Combatientes de que \"todo lo que hay bajo el cielo pertenece al público\", hasta las Reformas de Wang Mang y el New Deal de Wang Anshi, desde el impuesto territorial igualitario de Zhang Juzheng hasta la crítica estructural de Huang Zongxi a la monarquía, la nación china ha estado planteando constantemente una cuestión política fundamental desde la antigüedad: ¿quién debería ser dueño de la tierra, quién debería controlar el sistema y quién puede representar a la justicia? Estas preguntas son las proposiciones centrales del marxismo. Se puede decir que la civilización china no es una estudiante del marxismo, sino su primer ilustrador."
 PRC_party_of_the_chinese_patriots: "Partido de los patriotas chinos"
 PRC_party_of_the_chinese_patriots_desc: "No necesitamos que todos nuestros ciudadanos sean pensadores, ni tampoco que todos sean capaces de recitar teoría. Sólo pedimos una cosa: amor por este país. El Partido no es una organización abstracta y elevada, sino una estructura común de todos los que están dispuestos a confiar su destino a la patria. El verdadero patriotismo no es una emoción, sino una acción y una elección. Cuando todos empiezan a elegir quedarse, a elegir participar y a elegir obedecer, el Partido ha cumplido su misión. Este será un proyecto para reunir a los patriotas. Provienen de todos los ámbitos de la vida, pero todos deben aceptar el envío unificado del Partido, la reafiliación organizativa y el reformateo ideológico. Deben seguir siendo patriotas dentro de la estructura del Partido, de lo contrario su pasión eventualmente se convertirá en una voz al margen del sistema."
 PRC_pillar_of_crimson_sovereignty: "Pilar de soberanía carmesí"
 PRC_pillar_of_crimson_sovereignty_desc: "Dondequiera que ondee la Bandera Roja de Cinco Estrellas, ahí está nuestro hogar. Esa bandera roja no es sólo un trozo de tela, es fe, voluntad y un muro de creencias construido con la sangre y la carne de cientos de millones de chinos. La era conocida como el \"hombre enfermo del Este Asiático\" ha sido sepultada por nuestras propias manos. La China que estaba a merced de otros e insultada por las grandes potencias hace tiempo que quedó reducida a cenizas. Esas personas sin carácter que imploran clemencia a Occidente, esos capituladores que olvidan sus raíces y esos esclavos culturales que se arrodillan ante países extranjeros serán considerados responsables ante la historia. ¡Las personas que están aquí presentes hoy son la nueva China construida con la sangre de cien mil jóvenes y el país rojo forjado con voluntad de hierro! Detrás de nosotros está el torrente de hierro del pueblo y de cientos de millones de almas leales. Sobre nuestros hombros pesan miles de años de civilización y el legado de innumerables mártires. Asustaremos a nuestros enemigos, haremos que Asia se rinda y dejaremos que el futuro recuerde: ¡China Roja nunca se rendirá!"
 PRC_obey_the_party: "Obedece al Partido"
 PRC_obey_the_party_desc: "Sin el Partido Comunista, no existiría la nueva China. El Partido representa la voluntad del país y del pueblo chino. Todo ciudadano, ya sea un niño o una persona mayor, todos los patriotas deben obedecer el llamado del Partido. Las sabias palabras de los líderes del Partido seguramente nos conducirán a un mañana glorioso, en el que China superará a todas las naciones y se situará en la cima del mundo."
 PRC_state_of_permanent_mobilization: "Movilización permanente"
 PRC_state_of_permanent_mobilization_desc: "Para defender la soberanía nacional, la integridad territorial y los intereses del pueblo, debemos entrar en un estado normalizado e institucionalizado de movilización permanente y formar un alto grado de reconocimiento y respeto fanático por el servicio militar en toda la sociedad. Debemos inculcar inquebrantablemente la idea de que el ejército no es parte del país, sino la base y el núcleo de la existencia del país. Sin el ejército popular no habría país hoy, y mucho menos mañana. Todo aquel que decide unirse al ejército y se dedica a la defensa nacional es un verdadero héroe de la nueva era y un modelo a seguir respetado por toda la sociedad. Todos los sectores de la sociedad y de la sociedad deben tomar la iniciativa para atender las necesidades de la construcción militar, dar prioridad a los intereses de los militares y considerar el apoyo a la defensa nacional como una responsabilidad política ineludible."
 PRC_the_wave_of_patriotism: "Ola de patriotismo"
 PRC_the_wave_of_patriotism_desc: "Los valores dominantes de la sociedad determinan la dirección espiritual de una nación y también determinan la dirección del desarrollo nacional en las próximas décadas. Debemos lanzar una ola integral y sistemática de educación patriótica, tomar como ejemplos a los héroes y modelos de la revolución socialista, la Guerra de Resistencia del Pueblo Chino contra la Agresión Japonesa y el período de construcción, e inspirar a la generación más joven a amar y estar orgullosos de la patria. A través de obras cinematográficas y televisivas, la creación literaria y artística, la propaganda en línea y otros medios, daremos a conocer sistemáticamente a los héroes del pueblo que han hecho contribuciones destacadas a la independencia nacional, la liberación nacional y la construcción socialista, para que la generación más joven comprenda que la paz de hoy se gana con esfuerzo y el país de mañana necesita que la protejan."
 PRC_hold_snap_party_congress: "Congreso de emergencia del Partido"
 PRC_hold_snap_party_congress_desc: "Nos encontramos ahora ante el momento más grave desde la fundación de la República. El Partido está desgarrado por disputas entre facciones, y la unidad y la confianza se están erosionando seriamente. Si todavía nos aferramos a nuestras posibilidades y no tomamos medidas decisivas, la República se derrumbará inevitablemente. Para la supervivencia del país y el futuro de la nación, debemos convocar un congreso de emergencia del Partido inmediatamente. Debemos unificar nuestro pensamiento, aclarar nuestra dirección y proponer medidas prácticas y efectivas en la reunión para salvar al país del peligro y ganar una oportunidad para que la nación china sobreviva."
 PRC_protectors_of_the_chinese_nation: "Protectores de la nación"
 PRC_protectors_of_the_chinese_nation_desc: "La nación china no es sólo un clan, un linaje, una lengua o un linaje. Es el enredo del viento, la arena y la sangre durante decenas de millones de años, la aceptación del destino por parte de las montañas y los ríos, y la palabra \"nosotros\" que la gente ha aprendido gradualmente en medio de guerras y migraciones. Esta tierra es demasiado vasta y antaño demasiado silenciosa. Ahora, si quiere volver a serlo, debe forjarse un escudo sólido: no un arma para apuñalar a nadie, sino para proteger a la nación china de ser destrozada. Este fuerte escudo no tiene nombre y no discrimina por relación de sangre. Sólo reconoce una dirección: todas las hojas que se dirijan hacia la división se romperán frente a ella."
 PRC_the_issue_of_religions: "La cuestión religiosa"
 PRC_the_issue_of_religions_desc: "En tiempos difíciles, los dioses son un consuelo; pero ante el país, los dioses son una perturbación. Enseña a la gente a mirar hacia arriba, pero no a asumir responsabilidades; Enseña a la gente a obedecer la voluntad del cielo, pero no a proteger a su país. A lo largo de los siglos, cuánta lealtad y coraje han sido absorbidos por los dioses, y cuántas familias han sido destruidas por su fe. Ahora debemos mirarlo directamente y preguntarle a cambio: ¿Estás aquí para consolar los corazones de la gente o naciste para dividir montañas y ríos? Aquellas sectas que se separan de la tierra y se niegan a coexistir, y aquellas \"organizaciones\" que obedecen órdenes externas desde lejos, eventualmente no tendrán dónde quedarse. No estamos en contra de la fe, pero la fe debe estar subordinada a la dirección del destino común del pueblo."
 PRC_reconciliation_with_folk_sects: "Reconciliación con sectas populares"
 PRC_reconciliation_with_folk_sects_desc: "Algunas creencias se han integrado en los árboles centenarios del pueblo, las cenizas sobre papel amarillo y la alegría cuando se enciende el fuego de la estufa. Estas costumbres que se han transmitido durante cientos de años no son fuertemente excluyentes y no tienen ambiciones organizativas. Son más bien un respiro de la vida, una especie de consuelo en tiempos de sufrimiento. Aquellos que verdaderamente los comprenden se darán cuenta de que están llenos de admiración y piedad filial. Cuando se trata de tales creencias, no hay necesidad de bloquearlas con muros de hierro o etiquetarlas como \"herejías\". Dejemos que estas creencias sigan existiendo en su espacio original. Mientras no intenten convertirse en banderas o situarse fuera del país, podrán seguir siendo parte de la nación china."
 PRC_state_atheism: "Estado ateo"
 PRC_state_atheism_desc: "Ya no podemos permitir que la religión siga existiendo. Los dioses no pueden generar electricidad, curar enfermedades, construir puentes o muros, pero los humanos sí pueden. Si la nación china quiere seguir avanzando, debe librarse espiritualmente de su dependencia de lo desconocido y aprender a creer únicamente en realidades controlables. El camino que debe seguir el país no puede ser desviado, y el orden que debe respetar el pueblo no puede ser quebrantado por los dioses. Abandonar la religión no es encarcelar los pensamientos, sino permitir a las personas dirigir su fe hacia sí mismas, orientar su culto hacia la patria y depositar la esperanza en manos humanas."
 PRC_speed_up_sinicization: "Acelerar la sinización"
 PRC_speed_up_sinicization_desc: "No podemos demorarnos más. En el pasado, optamos por ser pacientes, respetar las diferencias y esperar el reconocimiento. Pero los hechos nos dicen que la mera espera no puede traer unidad, y el mero respeto no puede resistir el riesgo de división. Todavía existen barreras lingüísticas y la brecha en el pensamiento no se ha eliminado. Cualquier retraso adicional significará que más jóvenes quedarán atrapados en el conocimiento local y en costumbres cerradas, fuera de contacto con el desarrollo del país y de la velocidad del mundo. Así que tenemos que acelerar. No podemos permitir que algunas personas sigan viviendo fuera de la información, fuera del país y fuera de los tiempos. Necesitamos permitir que más niños aprendan mandarín desde una edad temprana, comprendan nuestra historia común y puedan caminar, hablar y vivir libremente en las grandes ciudades desde una edad temprana. Debemos garantizar que ya no se limiten a las ofertas de trabajo y que ya no sean malinterpretados, marginados u olvidados debido a las diferencias culturales."
 PRC_expel_foreign_forces: "Expulsar a fuerzas extranjeras"
 PRC_expel_foreign_forces_desc: "Afirman que vienen aquí para comunicarse, para recibir ayuda y para aportar ideas \"más avanzadas\"; Pero hemos visto desde hace mucho tiempo que el verdadero propósito de estos extranjeros nunca ha cambiado. Se infiltran paso a paso, invaden nuestra educación, cultura y opinión pública, y utilizan el discurso \"universal\" para escribir nuevas mentiras. Intentan robar nuestros libros, reescribir nuestra historia y ocupar nuestra narrativa, tal como los colonizadores con uniformes militares y Biblias hace cien años, quienes veían la civilización china como un recurso para ser saqueado, y luego predicaban sobre ello en voz alta en sus salas de conferencias, como si todo les perteneciera. Frente a todas las fuerzas externas que intenten interferir en nuestros pensamientos y creencias, eliminaremos por completo sus canales de comunicación y organizaciones. Sólo expulsando completamente a esos invasores disfrazados de civilización, podrá la nación china mantenerse verdaderamente firme en su propio territorio cultural."
 PRC_smash_islamism: "Aplastar al islam"
 PRC_smash_islamism_desc: "En China, cualquier creencia debe responder primero a una pregunta: ¿Estás dispuesto a formar parte de la nación china? Los musulmanes ya han dado la respuesta. Rechazan las escuelas, rechazan las leyes y se niegan a vivir con otros grupos étnicos. No están protegiendo sus creencias, sino creando aislamiento. Sus ojos nunca se dirigen al río Amarillo ni a la gente, sino que están obsesionados por el odio y la xenofobia durante el adhanam en la mezquita. Ante tanta hostilidad no tenemos margen para el compromiso. Debemos hacer comprender a todos que las leyes del país están por encima de todo y que el honor de las cuatro palabras \"nación china\" está por encima de todo."
 PRC_enforce_minority_integration: "Imponer la integración de minorías"
 PRC_enforce_minority_integration_desc: "Nunca hemos buscado borrar la memoria de nadie, silenciar la voz de nadie o despojar a nadie de su identidad. Todo lo que hacemos tiene como objetivo ofrecer a otros grupos étnicos un hogar más grande: la nación china. La diversidad étnica no debe ser motivo de división, sino una piedra angular de la unidad. Sólo cuando todos los grupos étnicos utilicen una misma lengua, aprendan una misma historia y respeten una misma cultura podrán pertenecer verdaderamente a este país, y no a algunos de sus rincones. Queremos garantizar que los hijos de todos los 55 grupos étnicos puedan recitar las Analectas, cantar la Marcha de los Voluntarios, conocer la historia de la Gran Muralla y comprender el temperamento del río Amarillo. Su futuro no está en oraciones ni ceremonias, sino en clases de mandarín, en los desfiles militares y bajo nuestra bandera común."
 PRC_the_final_blow_to_christian_cults: "Golpe de gracia al cristianismo"
 PRC_the_final_blow_to_christian_cults_desc: "Para nosotros, el cristianismo nunca ha dejado de cumplir su verdadera misión desde el día que pisó esta tierra: debilitar nuestra cultura, desintegrar nuestras creencias y tratar nuestra civilización más antigua como un desierto que puede ser domesticado. Pretenden difundir el amor, pero nunca han ocultado su desprecio por nuestros antepasados y su negación de nuestros clásicos. Escriben la humillación como absolución, presentan la agresión como salvación y glorifican la vergüenza como redención. Predican la benevolencia en el púlpito, pero practican la esclavitud en la realidad. Quieren que los chinos reciten su Biblia, pero no quieren que recordemos a nuestros antepasados. Quieren que nos arrodillemos ante Occidente, pero tienen miedo de que miremos hacia arriba y veamos la gloria de Oriente. Este veneno espiritual ha envenenado a nuestro pueblo durante demasiado tiempo. Debemos blandir el martillo de la historia y dejar que la cruz caiga completamente del Oriente."
 PRC_the_new_chinese_revolution: "Nueva Revolución China"
 PRC_the_new_chinese_revolution_desc: "Hubo un tiempo en que nuestros mártires revolucionarios salvaron al pueblo de estar colgado cabeza abajo y establecieron un nuevo estado popular. Sin embargo, recientemente, el fetichismo de las mercancías ha erosionado los corazones de las personas y ha ocultado la verdad bajo los deseos materiales. Debemos reavivar el espíritu revolucionario, destruir con puño de hierro las falsas ilusiones y empujar nuevamente al país hacia un proceso de revitalización sobrio y sencillo. Civilizar la mente y brutalizar el cuerpo. Sólo de esta manera China podrá en la nueva era volver a convertirse en un gigante inquebrantable en el escenario mundial."
 PRC_spiritual_renaissance: "Renacimiento espiritual"
 PRC_spiritual_renaissance_desc: "Nuestra nación nunca se ha doblegado ante los invasores. Durante miles de años, aunque el pueblo chino ha sufrido grandes dificultades, también ha forjado un carácter nacional tan fuerte como el acero. Ahora, la marea del avivamiento es imparable. Esto no es sólo un signo de prosperidad nacional, sino también una necesidad histórica y una elección del pueblo. Si nos unimos y revitalizamos a China, seguramente marcaremos el comienzo de una nueva era gloriosa y espléndida. ¡Cualquier reaccionario que intente bloquear el progreso del pueblo chino será aplastado y convertido en polvo!"
 PRC_revolutionary_troch_renewed: "Antorcha revolucionaria renovada"
 PRC_revolutionary_troch_renewed_desc: "Durante los años oscuros del siglo de la humillación, la nación china despertó como un león dormido y el movimiento de masas se reunió en una enorme ola que trastornó el mundo. Con una voluntad de hierro y un espíritu desinteresado e intrépido, los líderes revolucionarios condujeron a cientos de millones de personas a reconstruir una patria próspera y fuerte sobre las ruinas de la pobreza y el atraso, y rompieron completamente las cadenas del imperialismo y las fuerzas feudales. Utilizaron el colectivismo como bandera para unir a personas de todos los grupos étnicos y construir un país unificado inquebrantable. La revolución no es sólo un cambio en las relaciones de producción, sino también un gran bautismo del alma del pueblo: cada uno se yergue como dueño de la historia y mantiene la cabeza en alto para impulsar la marea de los tiempos. ¡Debemos mantener siempre un corazón infantil, heredar la voluntad de los mártires y, con un espíritu de lucha total, aplastar la humillación de hoy, enfrentar todos los desafíos, continuar la revolución y ganar una gloriosa victoria tras otra!"
 PRC_the_fortress_of_blood_and_flesh: "Ascenso del Imperio Celestial"
 PRC_the_fortress_of_blood_and_flesh_desc: "La historia de China está llena de las huellas de innumerables invasores extranjeros. Desde la caballería mongola hasta los samuráis japoneses, innumerables tiranos han considerado nuestra rica tierra como suya. Pero ¿por qué, en estos cinco mil años de existencia, China nunca ha caído del todo? ¿Por qué la nación china puede siempre derrotar a los invasores y defender su espíritu nacional? Esto se debe precisamente a las virtudes del pueblo chino. Esa creencia cultural profundamente arraigada ha estado grabada en cada centímetro de sangre desde hace mucho tiempo. Innumerables héroes han aparecido uno tras otro, arriesgando sus vidas para defender esta tierra a la que son leales hasta la muerte. Esta tierra siempre será su hogar. Yue Fei, Dong Cunrui y aquellos héroes anónimos que derramaron sangre por el país: son ellos quienes hicieron de China lo que es hoy y la hicieron grande."
 PRC_seize_back_the_chinese_century: "Retomar el Siglo Chino"
 PRC_seize_back_the_chinese_century_desc: "La civilización china es como un largo río que fluye durante miles de años. Hubo un tiempo en que la cultura occidental se extendió hacia el este y la gloria del Imperio Celeste se atenuó. Hoy, nosotros, los descendientes de la nación china, nos encontramos una vez más en la cima del mundo, escribimos un nuevo capítulo con sabiduría y coraje y reconstruimos la gloria de nuestra civilización. No podemos seguir ciegamente las cosas externas, sino que debemos volver a nuestras raíces culturales y a nuestro espíritu nacional. Aquellos que intenten dividir el país eventualmente desaparecerán ante la voluntad nacional. El pueblo chino seguramente creará una epopeya gloriosa para el futuro con firme convicción."
 PRC_embrace_the_imperial_administrative_system: "Sistema administrativo imperial"
 PRC_embrace_the_imperial_administrative_system_desc: "En aquellos tiempos gloriosos, el poder imperial estaba en su apogeo, y los rituales, la música y las leyes se convirtieron en una espada afilada para unificar al pueblo. El gobernante construyó la prosperidad del país con benevolencia, rectitud, moralidad, diligencia y amor al pueblo. No sólo estableció prestigio en el interior, sino que también se convirtió en un modelo a emular por los bárbaros de las zonas fronterizas en materia diplomática. Al expandir su territorio, no sólo utilizaron la fuerza para defenderse del enemigo, sino que también utilizaron la cultura y la virtud para educar al pueblo. Fue una época en la que la civilización china estaba en ascenso como el sol y su luz se extendía por toda Asia. Seguramente revisaremos estas antiguas sabidurías, daremos igual importancia a los asuntos civiles y militares y crearemos nuevamente una era gloriosa y próspera."
 PRC_instill_confucian_values: "Infundir valores confucianos"
 PRC_instill_confucian_values_desc: "Durante miles de años, los clásicos confucianos han corrido por la sangre de la nación china. Impulsado por la rueda de la historia, el confucianismo demuestra la gran importancia de la propiedad, la rectitud, la integridad y la vergüenza. Aunque hay muchas otras escuelas, son sólo detalles de nuestro patrimonio cultural. Sólo irrigando las profundidades de nuestras almas con la ética confuciana podremos estar verdaderamente unificados internamente y fuertes externamente. Debemos usarlo como pilar del pensamiento unificado para construir un país poderoso de sabios. Toda educación ideológica y política debe tomar esto como núcleo, para que cada ciudadano chino pueda mantener en alto la bandera de la confianza cultural y alcanzar así la cima de la ambición histórica."
 PRC_rites_of_zhou: "Ritos de Zhou"
 PRC_rites_of_zhou_desc: "El rey Zhou de Shang era tiránico y el Mandato Celestial había desaparecido; Tang y Wu iniciaron una revolución y se reveló la justicia. Así como el Rey Wu de la antigüedad destruyó la Dinastía Shang, erradicaremos todos los grilletes irrazonables. La guerra contra la dinastía Shang no sólo fue un cambio de poder, sino también una oportunidad para el renacimiento de la civilización. El ascenso de la dinastía Zhou es como el surgimiento de nuestra nación de las ruinas, basado en la innovación y utilizando la venganza como arma para unificar al mundo en una nueva era. El mundo de hoy también necesita nuestro Zhou Dao para guiarlo, para que la historia pueda volver a dar testimonio de la gloria de la civilización china."
 PRC_new_ban_from_hundred_philosophers_campaign: "Contra las nuevas cien escuelas"
 PRC_new_ban_from_hundred_philosophers_campaign_desc: "La historia ha demostrado desde hace mucho tiempo que sólo un imperio con una ideología unificada puede construir un imperio próspero y hegemónico. Hoy en día, las corrientes venenosas del progresismo y del pluralismo se están extendiendo por todas partes. La Nueva Izquierda y los liberales acechan en las salas académicas, perturbando la opinión pública, enturbiando muchos campos como la literatura y el arte, la sociología, la economía y el derecho, y socavando los cimientos de nuestra civilización universal. Debemos usar truenos y relámpagos para derrocar estas herejías sin sentido. Sólo forjando un muro ideológico indestructible y manteniendo las ideas bárbaras a miles de kilómetros de distancia podremos defender la soberanía de la civilización china y revivir su gran gloria."
 PRC_the_dragon_who_devoured_the_sun: "El Dragón devora al Sol Naciente"
 PRC_the_dragon_who_devoured_the_sun_desc: "La historia está destinada a ser así: los más fuertes son los dueños del destino. Los piratas japoneses eventualmente serán devorados por nosotros. Y aquellos traidores y espías que intenten dividirnos serán inevitablemente aniquilados ante nuestro espíritu justo. En este proceso, forjaremos una voluntad unificada inquebrantable con la sangre y el sudor del pueblo de todo el país, y así dominaremos las naciones del mundo."
 PRC_great_history_continues: "Gran historia continúa"
 PRC_great_history_continues_desc: "Una vez fuimos los dueños del destino del mundo, el punto de partida de la civilización y la fuente del orden. Chang'an, Luoyang, Kaifeng, Nankín, Pekín, cada una de ellas dominó una vez el mundo y fue testigo del surgimiento de todas las naciones. Nuestro sistema de tributos, nuestro sistema legal, nuestra caligrafía y nuestra etiqueta pictórica son modelos para el Este de Asia y una referencia para el mundo. Luego, en un breve y humillante lapso histórico, los colonizadores occidentales destrozaron la dirección en la que la civilización debería haber avanzado hacia la unificación. Abrieron las puertas de nuestro país con fuego de artillería y distorsionaron la historia con mentiras. Introdujeron sistemas inferiores y un lenguaje defectuoso en nuestras escuelas, pero nunca reconocieron que todos los prototipos ya estaban completos en nuestra historia. Ahora que ha llegado la oportunidad del avivamiento, continuaremos escribiendo el gran proceso que ha sido interrumpido. Debemos dejar que el mundo recuerde que el orden moderno nunca será estable sin el viejo eje de China; Si el mundo futuro no reconoce la autoridad histórica de China, no merecerá llamarse civilizado."
 PRC_the_good_old_china: "China, vieja y confiable"
 PRC_the_good_old_china_desc: "Aquella fue una época que realmente nos perteneció. El Hijo del Cielo custodiaba las fronteras del país, los eruditos enfatizaban la etiqueta y la moralidad, y los artesanos seguían las reglas. Desde los confines de la tierra hasta los rincones del mar, todos los que viven entre montañas y ríos reconocen a China como su señor y la toman como modelo. En aquella época, China no tenía que conquistar todos los territorios, pero sus doctrinas y leyes podían implementarse en todos los bárbaros. Occidente todavía luchaba contra la superstición religiosa y un gobierno oscuro, pero cientos de años después afirmó haber \"descubierto\" el mundo y definido el orden. Hoy en día, intentan utilizar la \"historia moderna\" para blanquear su primitivismo y utilizan la \"Ilustración\" para encubrir a nuestros profetas. Reclaman nuestras creaciones como suyas y a su vez nos acusan de ser \"atrasados\"; pero los hechos demuestran que son sólo un grupo de ladrones de la civilización, falsificadores de la historia e imitadores que nunca podrán ser superados. Nuestra era próspera no ha terminado, sólo está esperando el momento de reiniciarse. Para entonces, el verdadero \"orden mundial\" estará centrado en China. La buena vieja era nunca nos ha abandonado, al contrario, está llegando a nosotros."
 PRC_empire_under_facade_of_the_republic: "Imperio bajo fachada republicana"
 PRC_empire_under_facade_of_the_republic_desc: "Un país que se adhiere a la dictadura democrática popular y a un sistema político que persigue el socialismo ahora se erige en el mundo bajo el nombre de imperio. Sin duda esto se habría considerado una traición al comunismo en el pasado, pero la China de hoy ha destrozado esos juicios obsoletos con hechos. No hemos negado la legitimidad de la revolución, ni hemos abandonado el programa del colectivismo; Al contrario, hemos construido un país que pertenece al pueblo y a las gloriosas tradiciones del pasado, con el socialismo como su tronco y el imperio como su columna vertebral. El camino por delante es aún largo y la lucha no ha terminado, pero hemos dado el paso más difícil: después de experimentar innumerables penurias, las bases del imperio se han arraigado firmemente en esta antigua tierra. ¡Gloria a la patria! ¡Gloria al pueblo! ¡Gloria a esta nueva era del imperio!"
 PRC_stability_and_security: "Estabilidad y seguridad"
 PRC_stability_and_security_desc: "Los grandes objetivos de la prosperidad de la patria y el rejuvenecimiento nacional se basan en la premisa más básica y fundamental, es decir, la estabilidad social absoluta y la seguridad nacional integral. Sin estabilidad todo es palabrería vacía; Sin seguridad, todo se derrumbará. Hoy en día, en China hay corrientes subterráneas y el orden está al borde del colapso. Para tal fin, no escatimaremos esfuerzos para reconstruir la disciplina, reformular la autoridad y construir una China de nueva era con voluntad unificada y acción unificada."
 PRC_conquer_the_corporations: "Conquistar las corporaciones"
 PRC_conquer_the_corporations_desc: "El capital carece de lealtad; Sólo escucha las instrucciones de las ganancias, no las instrucciones del país. Si se le permite expandirse, eludirá el sistema, interferirá en las políticas e influirá en los corazones de la gente. Debemos incorporarlo a un plan unificado y asumir el control de sus flujos de datos, flujos de financiación y canales de difusión. A partir de ahora, el capital deberá informar de sus fuentes, informar de sus movimientos y aceptar la redistribución. A partir de ese momento, el capital sólo puede operar dentro del marco fijado por el Estado, sólo puede servir a los intereses generales y ya no tiene libertad para expandirse. La riqueza no es poder, sino una herramienta para cooperar con el gobierno. Quien cruce la línea será reemplazado."
 PRC_absorb_technical_blood: "Reclutar élites técnicas"
 PRC_absorb_technical_blood_desc: "El talento no puede dispersarse en el mercado ni ser controlado por instituciones no estatales. Los ingenieros, programadores e investigadores son recursos que el país necesita con urgencia y deben ser identificados, seleccionados, clasificados, asignados a diferentes grupos de tareas, sometidos a una limpieza ideológica y luego invertidos en proyectos clave. Ya no tienen que competir por bonificaciones ni discutir en reuniones, sino que pueden simplemente entrar al sistema y resolver problemas. Se puede obedecer a la tecnología, y también a las personas, siempre y cuando se las controle adecuadamente."
 PRC_pursuit_of_full_automation: "Buscar la automatización total"
 PRC_pursuit_of_full_automation_desc: "El funcionamiento del sistema no puede depender de la fatiga, la vacilación o el cambio de actitud humana. Cuanto menor sea la intervención humana y más independiente sea la estructura, más segura será la sociedad. Desde la programación logística hasta la gestión urbana, desde la supervisión de datos hasta el juicio de comportamiento, todos los nodos deben entrar en el modo de autocontrol. Estas máquinas no se demoran, no se quejan, no negocian. Una vez establecidas las reglas, solo las ejecutan sin vacilar."
 PRC_science_exclusively_for_the_state_interests: "La cienca sirve al Estado"
 PRC_science_exclusively_for_the_state_interests_desc: "El valor de la tecnología no reside en si es avanzada, sino en si es obediente. Cualquier logro científico y tecnológico que no pueda servir a los objetivos nacionales es un desperdicio; Si se desvían activamente del camino nacional, son una amenaza. La tecnología debe desplegarse alrededor de un núcleo unificado, la investigación no puede tomar sus propias decisiones y los proyectos no pueden autoproponerse. La ciencia no es una herramienta neutral, sino una herramienta utilizada por el Estado para proteger a su gente."
 PRC_general_pursuit_of_discovery: "Camino del conocimiento"
 PRC_general_pursuit_of_discovery_desc: "La ciencia no debería tener un resultado final. La llamada \"ética\" no es más que una zona de protección que los viejos humanos han establecido para sí mismos por miedo. Es el último truco que utilizan los grupos retrógrados para intentar frenar su avance. La moral, la ética y las leyes del pasado carecen de sentido en el vasto universo. Renuncian a la clonación porque tienen miedo de crear una copia de un ser más perfecto que ellos; Se resisten a la transformación porque no pueden aceptar que los humanos ya no se reproduzcan en nombre de la naturaleza; Abogan por la privacidad sólo porque tienen miedo de ser vistos a través de un sistema más poderoso. Eliminaremos esas falsas líneas rojas y los estándares ya no los establecerá la \"moralidad\", sino la eficiencia y los resultados. Cualquier dirección de investigación que pueda hacer que el sistema sea más estable, la estructura más compacta y los individuos más obedientes debe ser aprobada; Cualquier advertencia ética que obstaculice la unidad y dificulte la construcción colectiva debe ser eliminada."
 PRC_the_authority_of_the_best_minds: "Autoridad de los brillantes"
 PRC_the_authority_of_the_best_minds_desc: "Un gobierno que busca la eficiencia no puede decidir políticas basándose en las emociones, ni puede juzgar lo correcto o lo incorrecto basándose en los sentimientos. Las emociones son demasiado lentas y demasiado inestables. Mucha gente piensa que es \"buena gente\", pero en realidad son indecisos y débiles. Por lo tanto, debe existir un tipo de autoridad que no hable del bien y del mal, sino que sólo mire las consecuencias. La ejecución es más importante que la motivación. Algunas decisiones pueden causar controversia, pero deben tomarse. Frente al juicio cálido, lo que más necesitamos es un resultado estable, y la autoridad es el intermediario para garantizar este resultado."
 PRC_moving_toward_a_digital_state: "Hacia un Estado digital"
 PRC_moving_toward_a_digital_state_desc: "Gobernar una sociedad es como operar un sistema complejo. El ojo desnudo no es suficiente y la intuición es demasiado vaga. Es necesario establecer una perspectiva holográfica a través de los datos para que cada persona, cada camino y cada elección dejen una huella en el sistema y formen un modelo. La identidad digital se convertirá en la base del funcionamiento de la sociedad y las trayectorias de comportamiento se utilizarán para determinar los niveles de riesgo. Se puede detectar cualquier desviación y se puede identificar con antelación cualquier peligro. Las personas ya no son simplemente personas, sino un conjunto de variables dinámicas, y la obediencia al sistema es el requisito previo para una existencia estable."
 PRC_going_beyond_ethics: "Más allá de la moral"
 PRC_going_beyond_ethics_desc: "Los estándares éticos no se pueden medir, cuantificar ni aplicar. A menudo se convierte en la fuerza impulsora del colapso del sistema en momentos críticos. El sistema no debe basarse en buenas intenciones, sino en la estructura. No todas las decisiones pueden parecer buenas, pero siempre que se pueda garantizar la estabilidad, tienen valor. La verdadera responsabilidad no es ser responsable de la moralidad sino ser responsable del orden. Cuando sólo hay una opción, lo correcto o lo incorrecto ya no importa."
 PRC_sinofuturism: "Sinofuturismo"
 PRC_sinofuturism_desc: "El sinofuturismo no es una alternativa a la imitación de la ruta tecnológica occidental, ni tampoco es una extensión del sentimiento nacionalista. Es una forma estructurada de construir el futuro. Rechaza el culto a la \"originalidad\" y aboga por la réplica y la iteración; no enfatiza el alma individual sino la eficiencia colaborativa; No persigue la innovación libre sino que prioriza la ejecución de una lógica unificada. La importancia del sinofuturismo es que China ya no buscará ser comprendida, sino que concentrará toda su energía en ser ejecutada. Si el mundo quiere adaptarse a China, debe sincronizar su progreso; Si se niega, China lo dejará atrás."
 PRC_perfectly_calculated_freedom_for_all: "Libertad perfectamente calculada"
 PRC_perfectly_calculated_freedom_for_all_desc: "La libertad es una responsabilidad, no un derecho. Estableceremos una \"cuota de libertad\" para cada ciudadano en función de datos como la lealtad política y la estabilidad ideológica, y determinaremos su derecho a viajar, su derecho a hablar y su derecho a expresarse mediante un sistema de clasificación. Aquellos que sean leales disfrutarán de permisos más amplios, aquellos que se desvíen serán restringidos y aquellos que desobedezcan tendrán todos los permisos revocados. La libertad no es algo que mereces, sino una recompensa otorgada por el Estado. Bajo un sistema así, la libertad ya no generará caos, sino que se convertirá en el estabilizador más poderoso y la herramienta más eficaz de recompensas y castigos. El pueblo aprenderá a estar satisfecho con la obediencia y a ser feliz con la moderación."
 PRC_huge_machine_of_the_china: "La Gran Máquina China"
 PRC_huge_machine_of_the_china_desc: "Si quieres estabilidad, no puedes confiar en la buena voluntad personal; Si quieres eficiencia, no puedes tolerar retrasos en el proceso. China debe ser como una máquina completa y enorme. Todos somos parte de esta enorme máquina. Mientras gire de manera constante, se conecte con precisión y produzca continuamente, todo el sistema girará cada vez más rápido. Si algo está atascado, reemplácelo; Si alguien quiere dar marcha atrás, detenga la máquina y verifique."
 PRC_great_changes_unseen_in_a_century: "Cambios centenarios"
 PRC_great_changes_unseen_in_a_century_desc: "La tendencia mundial es imparable. Si la sigues, prosperarás; Si vas contra ella, perecerás. Las viejas reglas están colapsando, la vieja hegemonía se está pudriendo y todos los países de la Tierra están esperando el nacimiento del próximo orden. Para nosotros, esta es una oportunidad para que China crezca. Si vamos un paso más lento, nos arreglaremos; Si somos un paso más rápidos, podemos hacer arreglos. O bien estableces activamente las reglas del juego o haces cumplir pasivamente las reglas de otras personas. Esta época ya no cree en la neutralidad y ya no deja margen de maniobra a los indecisos."
 PRC_all_society_political_investigation: "Sistema de revisión política"
 PRC_all_society_political_investigation_desc: "El valor de un ciudadano no depende de su nacimiento, sino de si puede mantener una completa sincronización mental con el país. Construiremos un sistema de revisión política con monitoreo de toda el área y ajuste dinámico, y reiteraremos constantemente que el \"pensamiento correcto\" es el único requisito previo para la supervivencia. Las expresiones de todos, sus hábitos de navegación y sus registros de chat se incluirán en los indicadores de evaluación, y cualquier actitud \"neutral\", \"ambigua\" o de \"esperar y ver\" se convertirá en una señal de advertencia. No castigamos la disidencia, sino que definimos toda disidencia como patológica. No discutimos sobre la verdad, sino que dejamos que la única verdad se convierta en aire en el silencio."
 PRC_generation_of_patriots: "Generación de patriotas"
 PRC_generation_of_patriots_desc: "No podemos entregar a nuestros hijos a la sociedad y permitir que sean envenenados por diversas ideas. Debemos forjar los sucesores del país con nuestras propias manos. Desde la infancia, desde las etapas iniciales de la formación del lenguaje y la formación cognitiva, intervendremos plenamente en la educación, estableceremos libros de texto unificados, medios de comunicación unificados y un estilo de vida unificado, y cortaremos por completo el camino de infiltración de culturas extranjeras. Debemos implantar en sus cerebros el único estándar antes de que se formen circuitos autónomos: el patriotismo primero, el Partido es supremo. La diversidad de pensamiento es una enfermedad, la diversidad cultural es un veneno. Debemos dejar que la nueva generación hable un solo idioma: el idioma de la lealtad. No entenderán la traición, ni la resistencia. Ya no preguntarán: \"¿Quién soy yo?\" pero responderá orgullosamente: \"Soy parte del país\"."
 PRC_officials_on_social_media: "Oficiales en línea"
 PRC_officials_on_social_media_desc: "Internet es un campo de batalla ideológico, y los funcionarios de la opinión pública son la primera línea. Seleccionaremos administradores de discurso centrales de la población más leal y los desplegaremos en las principales plataformas y grupos sociales las 24 horas del día. Serán responsables de monitorear la información hostil, corregir los sentimientos no convencionales y dar forma a una narrativa unificada. No sólo eliminan los comentarios erróneos, sino que también guían a las masas a aceptar la línea correcta de manera subconsciente."
 PRC_party_under_mss_control: "Controlar el Partido"
 PRC_party_under_mss_control_desc: "El Partido es la raíz del país y el Ministerio de Seguridad del Estado es su espada. Aboliremos el modelo original e ineficiente de \"autosupervisión\", haremos que el MSE se haga cargo directamente de la supervisión de todos los asuntos del Partido y realizaremos plenamente el control de circuito cerrado de \"el Partido está dentro del Estado y el Estado está fuera del Partido\". Todos los miembros del Partido serán sometidos a verificaciones ideológicas periódicas, auditorías de lealtad y evaluaciones de reconstrucción organizativa, y cualquier signo de dejadez, degeneración o doble cara será eliminado en el acto. Ya no habrá ninguna ambigüedad ni zona gris dentro del Partido, sólo fe absoluta y obediencia completa."
 PRC_agents_elite_of_the_nation: "Agentes: Elite nacional"
 PRC_agents_elite_of_the_nation_desc: "No aparecen en las noticias ni toman parte en la realización de declaraciones. No tienen nombre, ni sombras, ni voz, pero existen en cada rincón. Vigilan a la multitud y se esconden entre ella; Pueden juzgar a amigos y enemigos sin órdenes. No son héroes porque no necesitan ser recordados; No son ciudadanos porque trascienden el ámbito de la ciudadanía. Su trabajo es garantizar que el caos potencial nunca ocurra y silenciar al enemigo para siempre. Si todo va bien es porque están siempre alerta; Si las personas son felices es porque llevan adelante sus cargas."
 PRC_total_security: "Seguridad total"
 PRC_total_security_desc: "Sólo cuando el país es estable el mundo puede estar en paz. Debemos destruir todos los mecanismos que crean incertidumbre: la voluntad personal, la libre elección y las voces diversas. Todas estas son semillas del malestar. Debemos hacer comprender a todo nuestro pueblo: \"Mi existencia es sólo porque me la da el país; mi dirección es sólo servir al país\". La voluntad personal debe estar subordinada a los intereses colectivos, y las actividades individuales deben servir a la visión nacional. Sólo bajo la dirección del Partido y con todo el pueblo estrechamente unido podremos inaugurar una era verdaderamente pacífica y próspera."
 PRC_keepers_of_the_chinese_idea: "Guardianes de la idea china"
 PRC_keepers_of_the_chinese_idea_desc: "\"¡China es grandiosa! Es el lugar donde se establecieron los Cinco Emperadores y los Tres Reyes, y donde se originaron las costumbres, la etiqueta y la moral\".\n\nEl concepto de la palabra \"China\" nunca ha sido determinado por discusiones armoniosas en reuniones. Es un producto de la historia, la cristalización del sacrificio y la sangre. No se puede comparar, diluir ni dudar. Las palabras y las ideas extranjeras de Occidente ya no tendrán espacio para sobrevivir, conceptos corrosivos como \"igualdad\", \"diversidad\" y \"derechos\" ya no se mencionarán en los libros de texto; Toda estética con elementos occidentales será eliminada del ámbito cultural; Garantizaremos la singularidad e inquebrantable del camino chino. La razón por la que China es China es porque nunca toleramos la traición."
 PRC_the_ministry_that_controls_everything: "Ministerio que todo lo ve"
 PRC_the_ministry_that_controls_everything_desc: "La eficiencia y el orden no deben verse obstaculizados por métodos de gestión fragmentados. Crearemos un departamento central que sea verdaderamente capaz de coordinar la situación general y se centrará en la inteligencia, la seguridad, la gobernanza y el trabajo ideológico. Esta institución no estará limitada por el poder local, no será interferida por intereses y no seguirá procedimientos formalistas. Todo su trabajo girará en torno al objetivo de: mantener la unidad nacional, mantener la vida estable del pueblo y eliminar cualquier influencia de ideas y costumbres no locales."
 PRC_military_and_party_in_one_mind: "Ejército y Partido bajo una mente"
 PRC_military_and_party_in_one_mind_desc: "Las armas del ejército no pueden ser selectivas y la lealtad de los soldados no puede retrasarse. Cada soldado no es sólo una herramienta de combate sino también un órgano político. La táctica obedece a la estrategia, las acciones obedecen a los pensamientos y la esencia del servicio es la obediencia. Cuando se enfrentan a enemigos extranjeros, cargan; Cuando se enfrentan a disturbios civiles, reprimen la violencia; Cuando se enfrentan a la vacilación, se purgan. El Partido es el alma del ejército y el arma es la herramienta del Partido. Sólo cuando el ejército y el Partido estén unidos se podrá lograr el funcionamiento en circuito cerrado del aparato estatal."
 PRC_mobilize_ministry_of_public_security: "Movilizar al Ministerio de Seguridad Pública"
 PRC_mobilize_ministry_of_public_security_desc: "El departamento de seguridad pública es la espada afilada del país y el centro violento para mantener el orden. Cualquier reunión, susurro o expresión facial inusual puede constituir motivo de intervención, y cualquier falta de cooperación, vacilación o silencio desencadenará una respuesta del sistema. La policía ya no reacciona pasivamente, sino que interviene activamente y soluciona los problemas. La sociedad no necesita consulta, necesita disuasión; El pueblo no necesita persuasión, necesita disciplina. Sólo bajo la guía de porras y sirenas la ciudad puede estar tranquila, la gente estable y el país avanzar."
 PRC_purity_and_honesty: "Pureza y honestidad"
 PRC_purity_and_honesty_desc: "El aparato estatal no necesita preguntar una y otra vez \"por qué\", necesita que todos sus mecanismos sepan \"cómo hacerlo\". Las personas no pueden ser sólo obedecedoras, también deben ser ejecutoras. Es necesario estandarizar su estructura de pensamiento y entrenar sus trayectorias de comportamiento. Para establecer un sistema social verdaderamente eficiente, debemos reconstruir la forma de pensar de la gente desde la fuente. La expresión emocional y las opiniones personales serán eliminadas del sistema educativo básico. Sólo aquellos que puedan comprender órdenes rápidamente, completar tareas correctamente y nunca cruzar límites serán los ciudadanos verdaderamente ideales. Todo lo demás se considerará redundante."
 PRC_mind_and_skills: "Mente y habilidades"
 PRC_mind_and_skills_desc: "La educación ética produce personas vacilantes; Los estándares morales dejan atrás a las personas retrógradas. La sociedad humana todavía funciona dentro de un marco restrictivo y obsoleto que fomenta la expresión, tolera los errores y acepta el caos, pero todo esto continúa frenando la evolución de la tecnología y las instituciones. Si nuestra patria quiere estar a la vanguardia mundial, ya no podemos esperar a quienes están acostumbrados a dudar, son buenos en hacer preguntas y son supersticiosos sobre la humanidad. El verdadero progreso nunca se alcanzará mediante el compromiso, sino mediante la trascendencia. Mientras otros aún dudan sobre \"deberíamos hacerlo\", nosotros ya estamos probando \"si es eficiente\". Si esta generación no puede seguir el ritmo, entonces dejen espacio para la siguiente generación."
 PRC_redefine_people_protection: "Redefinir la protección popular"
 PRC_redefine_people_protection_desc: "Proteger al pueblo no significa ceder, comprometerse o tolerar, ni tampoco significa poner los deseos personales por encima del conjunto nacional. La verdadera seguridad sólo se logra después de identificar, aislar y abordar todas las posibles fuentes de caos. Las llamadas declaraciones falsas intencionadas de los blancos, las filtraciones involuntarias y las emociones ambiguas, en la medida en que puedan socavar la estabilidad, deben considerarse amenazas potenciales. Todo lo que hacemos no es oprimir a nadie, sino evitar que la gente quede atrapada en el peligro, el caos y lo desconocido."
 PRC_permeate_the_whole_world: "Penetrar en la red global"
 PRC_permeate_the_whole_world_desc: "La visión de un país no debe limitarse a sus propias fronteras, ni debe contentarse con la defensa pasiva y la protección negativa. Una frontera es sólo un límite geográfico, no el punto final del pensamiento y del discurso. Debemos levantarnos, tomar la iniciativa, dominar el contexto global y dejar nuestra huella en cada rincón de la información. Fuerzas hostiles llevan mucho tiempo desplegando silenciosamente sus fuerzas en el ámbito de la opinión pública mundial, envolviendo mentiras con falsa libertad y participando en una colonización espiritual en nombre de \"valores universales\". Lo único que hace esto es silenciarnos y permitir que la verdad se pierda en el ruido. Ya no podemos permanecer en silencio. Debemos hablar y asegurarnos de que nuestra voz sea la única voz de la verdad."
 PRC_key_to_omniscience_and_omnipotence: "Clave a la omnisciencia y omnipotencia"
 PRC_key_to_omniscience_and_omnipotence_desc: "Cada cámara, cada procesador de datos y cada pieza de información en esta tierra está bajo nuestro control. Aquellos que creen que pueden resistirse a nosotros fantasean que pueden esconderse en la oscuridad, creyendo que lo que hacen es perfecto. Sin embargo, cada uno de sus movimientos y cada una de sus palabras han quedado expuestos desde hace mucho tiempo bajo nuestra mirada. No viven en la oscuridad, sino bajo una mirada invisible a la luz."

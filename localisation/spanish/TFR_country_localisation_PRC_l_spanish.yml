 PRC_pla_dynamic: "Ejército Popular de Liberación"
 PRC_pla_dynamic_desc: "\n\n\n\n£GFX_PRC_pla_dynamic_banner\n\n\n\n\n\nDesde la Revuelta de Nanchang en 1927, el Ejército Popular de Liberación, en particular sus fuerzas terrestres, ha sido durante mucho tiempo una fuerza confiable tanto para el Partido como para el pueblo. La modernización del EPL, iniciada por Xi en 2016, le ha otorgado la capacidad de luchar y ganar en los campos de batalla modernos. El EPL ha evolucionado de una fuerza puramente de defensa nacional a una formidable potencia militar capaz de desplegarse en el noreste de Asia y en todo el Pacífico. En el futuro, podrían surgir más oportunidades para demostrar esta capacidad mejorada."
 PRC_pla_idea: "Ejército Popular de Liberación"
 PRC_chinese_enviroment_idea: "Medioambiente chino"
 PRC_corrupt_bureaucracy_idea: "Burocracia corrupta"
 PRC_corrupt_bureaucracy_idea_desc: "\n\n\n\n£GFX_PRC_down_with_bureaucracy_banner\n\n\n\n\n\n                              §YLos odio.§!\n\nDesde las antiguas dinastías, China siempre ha estado plagada de corrupción. Desde eunucos traicioneros hasta caudillos que solo supieron quemar y saquear, o burócratas nacionalistas que solo se preocupaban por su propio bolsillo; el pueblo la ha padecido durante milenios. Gracias a ello, el PCCh logró emerger de las sangrientas luchas, barriendo con las fuerzas del mal. Sin embargo, tras varias campañas iniciadas por Mao y la reforma de Deng, los cuadros del Partido se han convertido, sin quererlo, en una nueva clase alta. El desarrollo económico desequilibrado e inadecuado, la cultura de la desconfianza y las luchas entre facciones han propagado el soborno y el favoritismo entre los funcionarios. Si bien la campaña anticorrupción de Xi ha logrado resultados significativos, solo frenó temporalmente la tendencia a la corrupción."
 PRC_chinese_communist_party_idea: "Partido Comunista de China"
 PRC_chinese_communist_party_idea_desc: "\n\n\n\n£GFX_chinese_communist_party\n\n\n\n\n\nDesde 1949, el Partido Comunista de China ha sido el gobernante indiscutible de la China continental. Incluso tras el colapso de varios Estados comunistas liderados por la URSS, la China socialista se ha mantenido en Asia Oriental y se ha convertido gradualmente en uno de los países más poderosos del mundo tras su Reforma y Apertura.\n\nLas razones que explican la capacidad del PCCh para consolidar su dominio en China, con una población de 1.400 millones de habitantes, han sido objeto de amplio debate. Algunos argumentan que el PCCh ha abandonado su credo comunista, prometiendo prosperidad económica a cambio de apoyo, y ha adoptado la ideología tradicional del antiguo Imperio para mantener al pueblo bajo el temor y la obediencia. Otros sostienen que el PCCh ha tenido éxito infiltrando su ideología y organización en todos los aspectos de la sociedad y se ha visto fortalecido por continuas reformas.\n\nSea como sea, una cosa es segura: §Rse necesitaría un desastre de proporciones bíblicas para derrocar al gigante que es el PCCh.§!"
 PRC_communist_party_of_china_dynamic: "Partido Comunista de China"
 PRC_communist_party_of_china_dynamic_desc: "\n\n\n\n£GFX_chinese_communist_party\n\n\n\n\n\nDesde 1949, el Partido Comunista de China ha sido el gobernante indiscutible de la China continental. Incluso tras el colapso de varios Estados comunistas liderados por la URSS, la China socialista se ha mantenido en Asia Oriental y se ha convertido gradualmente en uno de los países más poderosos del mundo tras su Reforma y Apertura.\n\nLas razones que explican la capacidad del PCCh para consolidar su dominio en China, con una población de 1.400 millones de habitantes, han sido objeto de amplio debate. Algunos argumentan que el PCCh ha abandonado su credo comunista, prometiendo prosperidad económica a cambio de apoyo, y ha adoptado la ideología tradicional del antiguo Imperio para mantener al pueblo bajo el temor y la obediencia. Otros sostienen que el PCCh ha tenido éxito infiltrando su ideología y organización en todos los aspectos de la sociedad y se ha visto fortalecido por continuas reformas.\n\nSea como sea, una cosa es segura: §Rse necesitaría un desastre de proporciones bíblicas para derrocar al gigante que es el PCCh.§!"

 china.392.t: "Una nueva realidad"
 china.392.d: "Zhao Qidong estaba en la última planta del dormitorio, apoyado en la barandilla, fumando. La brasa del cigarrillo brillaba y se apagaba, reflejando las luces lejanas de la ciudad, ya no brillantes, sino manchas dispersas de un amarillo tenue.\n\nPodía ver los vehículos blindados alineados en un depósito improvisado a lo lejos, sus carrocerías metálicas captando destellos bajo el cielo nocturno. Más allá, los radares antiaéreos giraban lentamente. Se habían instalado nuevos puntos de control en los pasos elevados, donde muros de hormigón, alambre de púas y nidos de ametralladoras pesadas se entrecruzaban, dividiendo la ciudad en zonas estrictamente controladas. En terrenos abiertos se habían excavado fosas profundas llenas de refugios antiexplosiones, y a lo largo de la carretera, las entradas a túneles subterráneos algunas mal disimuladas filtraban una luz fría y pálida a través de estrechas grietas.\n\nZhao Qidong recordó el año 2017, cuando todavía repartía comida por la ciudad. Por entonces, incluso a las nueve de la noche, los puestos callejeros seguían iluminados, el tráfico atascaba cada cruce, los peatones se movían de un lado a otro, ruidosos y llenos de vida. Incluso en las noches de invierno, la gente hacía cola en las esquinas esperando un cuenco de sopa de fideos caliente. Ahora, todo eso había desaparecido. Los puestos de comida habían sido retirados, las tiendas cerradas, las calles ensanchadas y vacías. Los gritos de los mercados nocturnos habían sido reemplazados por los pasos de los centinelas patrullando y el zumbido bajo de los radares. Aquellos que antes prosperaban en el bullicio se habían marchado o se habían convertido en nombres inscritos en las listas de la milicia.\n\nLos días de paz habían durado demasiado y se había perdido demasiado tiempo. Una vez creyeron que la vida podría continuar así para siempre. Pero la realidad no ofrece segundas oportunidades. La nación tenía que sobrevivir, y la ciudad tenía que cambiar con ella. Pekín se había convertido, centímetro a centímetro, en una fortaleza. Cada calle, cada manzana, cada trozo de terreno tenía un propósito asignado. No había rincones libres. No había personas de sobra. Todo incluyéndose a sí mismo se había convertido en parte de la ciudad, igual que los muros de hormigón y los túneles antiaéreos."
 china.392.a: "Dondequiera que soplara el viento, él lo seguiría."
 china.393.t: "Finalización de la construcción de la Pirámide del EPL"
 china.393.d: "Se sentó en un autobús militar que salía de la Tercera Circunvalación de Pekín. Fuera de la ventana, era temprano por la mañana. Las calles eran anchas y estaban vacías, con solo algún coche ocasional pasando rápidamente. Había trabajado en la Oficina de Inteligencia del Departamento del Estado Mayor Conjunto durante seis años. La antigua oficina estaba cerca de la Avenida Oeste de Chang'an, uno de esos edificios gubernamentales grises y envejecidos con guardias armados en la entrada y persianas permanentemente bajadas tras gruesos cristales. Una vez pensó que ese era el límite máximo del poder, hasta que comenzó el Proyecto Pirámide de la \"Capital Eterna\". Al sur de Gaojiapo, conocido desde hace tiempo como \"el páramo\" por los lugareños, antes había tierras planas y abiertas. Cada primavera, la hierba salvaje crecía hasta la cintura. Ahora, todo había sido completamente nivelado, transformado en una zona central rodeada por vehículos militares, maquinaria de construcción, muros altos y zanjas profundas.\n\nCuando el autobús salió de la ciudad, vislumbró la punta de la estructura a lo lejos. Al principio pensó que era una montaña. Pero cuanto más se acercaban, más claro se hacía: esa \"montaña\" no tenía curvas naturales. Era afilada, fría y rígida, como un monolito tallado directamente de la tierra. Solo cuando bajó del autobús comprendió plenamente su escala. Tenía forma de pirámide, pero era mucho más colosal que cualquier pirámide imaginada por la humanidad. Su piel de hormigón gris no tenía ni una sola decoración, solo estrechas rendijas negras, como ventanas, aunque no se veía nada detrás de ellas, que caían en cascada, nivel tras nivel, desde la cima hasta la base. Parecían sacadas de un búnker, troneras que se extendían hasta el infinito.\n\nAlguien al frente pronunciaba un discurso de bienvenida en voz alta. No escuchó ni una palabra. Simplemente miró hacia arriba. El cielo ya estaba completamente claro, pero el edificio fracturaba la luz del sol, filtrándola a través de las rendijas para que cayera en fragmentos, como si incluso la luz del día necesitara ser tamizada antes de llegar al suelo. De pie en esa sombra, sintió un silencio que no podía describir. No era miedo. Era algo más profundo, una resignación a la que no podía resistirse. Ante esta estructura, él no era nada.\n\nRecordó haber visto Blade Runner años atrás: esos edificios imponentes, la lluvia cayendo desde arriba, anuncios holográficos flotando en la noche. Pero aquí no había lluvia. Ni neón. Ni publicidad. Solo ese objeto masivo y silencioso, inmóvil. Estaba entre la multitud, con la mirada perdida más allá de las cabezas que tenía delante, hacia la entrada de la pirámide. Dentro, había innumerables personas, innumerables pantallas, innumerables órdenes, pero ni un solo rostro conocido."
 china.393.a: "Ciudad Mundial."

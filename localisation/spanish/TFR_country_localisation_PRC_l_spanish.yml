 china.325.t: "La quinta crisis del estrecho de Taiwán"
 china.325.d: "\n\n\n                  $PRC_MSS_leader_texticon$   \n\n\n\n\nEstimado Camarada Presidente:\n\nEl Ministerio de Seguridad del Estado ha recopilado y analizado información política, diplomática y militar relacionada con la región de Taiwán conforme a su orden. Tenemos motivos para creer que la gravedad de la situación actual en el estrecho de Taiwán ha superado la de la cuarta crisis del estrecho de Taiwán en 2022, y que puede considerarse que ha estallado la quinta crisis del estrecho de Taiwán, y que ha llegado nuevamente el momento de la liberación de Taiwán.\n\nMediante la verificación cruzada de las imágenes tomadas por aviones no tripulados de reconocimiento de alta velocidad y la información proporcionada por informantes armados en Taiwán, hemos captado el despliegue específico de la OTDP en la isla de Taiwán. La principal fuerza aérea de la OTDP en la isla está desplegada en un búnker en su base en Jiashan, Hualien, en el lado este de Taiwán, que se encuentra en la zona muerta de nuestra cobertura de fuego y representa una gran amenaza para nuestras fuerzas de desembarco y la flota avanzada. Al mismo tiempo, fotografías tomadas por personas pro-China continental en la isla confirman que la OTDP ha desplegado un gran número de tropas terrestres en los dos sitios de desembarco del norte, en la desembocadura del río Danshui y en Hsinchu, en respuesta a un posible desembarco en la playa por parte de nuestras fuerzas.\n\nEl Ministerio de Seguridad del Estado ha sintetizado la inteligencia relevante y recomienda que la Comisión Militar Central y el Gobierno Popular Central mantengan un alto nivel de alerta y estén preparados para hacer frente al inevitable contraataque de la OTDP durante la liberación de Taiwán.\n\nAtentamente,"
 china.325.a: "Ministro de Seguridad del Estado de la República Popular China, $PRC_MSS_leader_name$."
 china.326.t: "La situación en India y Pakistán"
 china.326.d: "\n\n\n                  $PRC_MSS_leader_texticon$   \n\n\n\n\nEstimado Camarada Presidente:\n\nEl Ministerio de Seguridad del Estado ha recopilado y analizado información sobre los recientes movimientos diplomáticos y militares en India y Pakistán, según su directiva. Creemos que India ha estado en contacto con la llamada \"Organización del Tratado de Defensa del Pacífico\" y está aumentando las tensiones en la disputada región de Jammu y Cachemira.\n\nRecientemente, se produjo un intercambio repentino de disparos a lo largo de la frontera de Cachemira, con Pakistán informando que derribó un dron indio que intentaba entrar en el espacio aéreo pakistaní para reconocimiento. En respuesta, las fuerzas indias supuestamente atacaron con fuego de ametralladora puestos pakistaníes cerca de Sialkot para ocultar la actividad de su dron. Mientras tanto, India acusó a Pakistán de iniciar el incidente, alegando que las tropas pakistaníes abrieron fuego sin provocación contra puestos indios en la zona fronteriza de Jammu. India calificó su contraataque a las posiciones pakistaníes como una \"represalia adecuada\", que resultó en heridas a al menos tres soldados indios y la evacuación de emergencia de decenas de aldeanos.\n\nEl Ministerio de Seguridad del Estado ha sintetizado esta inteligencia y evalúa que la situación en Jammu y Cachemira podría escalar hacia una cuarta guerra indo-pakistaní. Se aconseja que el Gobierno Central Popular mantenga una vigilancia estricta y esté preparado para responder a cualquier desarrollo en la región.\n\nAtentamente,"
 china.326.a: "Ministro de Seguridad del Estado de la República Popular China, $PRC_MSS_leader_name$."
 china.327.t: "Movimientos inusuales de la Armada japonesa"
 china.327.d: "\n\n\n                  $PRC_MSS_leader_texticon$   \n\n\n\n\nEstimado Camarada Presidente:\n\nEl Ministerio de Seguridad del Estado, siguiendo su directiva, ha recopilado y analizado información sobre los recientes despliegues de buques de la Fuerza Marítima de Autodefensa de Japón cerca de nuestras aguas. Hemos identificado actividades inusuales de despliegue por parte de la Fuerza Marítima en la región. Recientemente, nuestra marina llevó a cabo una misión de tres días frente a la costa de Ningbo-Wenzhou en la provincia de Zhejiang, con la Administración de Seguridad Marítima de Zhejiang emitiendo un previo aviso para restringir el acceso a la zona.\n\nEl mismo día, el destructor Ryogetsu de la Fuerza Marítima entró en nuestras aguas territoriales cerca de Zhejiang sin notificación previa y permaneció allí. Nuestra marina emitió una severa advertencia por radio, exigiendo que el buque declarara su propósito y se retirara inmediatamente. Sin embargo, el Ryogetsu no respondió, ignoró nuestra soberanía y aceleró aún más hacia nuestras aguas. En respuesta, nuestra marina interceptó su rumbo, obligando al buque a regresar a mar abierto. La investigación posterior confirmó que el Ryouzuki había partido de Sasebo el día anterior para vigilar nuestras operaciones militares.\n\nEl Ministerio de Seguridad del Estado ha evaluado este incidente y recomienda que el Comité Central del PCCh y el Gobierno Central Popular mantengan un alto nivel de vigilancia, anticipando la posibilidad de nuevos despliegues de la Fuerza Marítima o incluso interferencias en nuestros asuntos internos.\n\nAtentamente,"
 china.327.a: "Ministro de Seguridad del Estado de la República Popular China, $PRC_MSS_leader_name$."
 china.328.t: "La dinastía Kong reunifica China"
 china.328.d: ""
 china.328.a: "Interesante."
 china.329.t: "Establecimiento de la OTDP"
 china.329.d: "\n\n\n                  £GFX_MSS_event_texticon    \n\n\n\n\nEstimado Camarada Presidente:\n\nEl Ministerio de Seguridad del Estado ha recopilado y analizado información sobre los recientes acontecimientos políticos y diplomáticos en Japón y Australia, siguiendo sus instrucciones. Creemos que Japón y Australia han formado una alianza política, económica y militar, conocida como la \"Organización del Tratado de Defensa del Pacífico\", y están trabajando para incluir al Sudeste Asiático y a la India en dicho pacto. Según nuestros informantes en Nueva Delhi, el primer ministro Modi ha mostrado un gran interés en unirse a esta alianza, y se están llevando a cabo conversaciones con Bangladesh sobre una posible colaboración. Además, las misiones diplomáticas y representantes empresariales de Japón y Australia han estado presionando en el Sudeste Asiático para buscar el apoyo de antiguos países de la ASEAN para unirse al pacto.\n\nNuestros contactos en el Sudeste Asiático indican que esta alianza se considera un esfuerzo exclusivo contra nuestra nación. El Ministerio de Seguridad del Estado, tras sintetizar la información pertinente, concluye que la denominada \"Organización del Tratado de Defensa del Pacífico\" es una alianza militar destinada a cercar a nuestro país. Recomendamos al Comité Central del PCCh y al Gobierno Popular Central que mantengan un alto grado de preocupación y estén preparados para afrontar el peligro de que los países del Sudeste Asiático y la India se unan al Pacto y sitiando a nuestro país.\n\nSinceramente,"
 china.329.a: "Ministro de Seguridad del Estado, Chen Wenqing."
 china.330.t: "Viaje al Mar de las Estrellas"
 china.330.d: "\"En vista de la guerra civil generalizada en Estados Unidos y el declive de las capacidades aeroespaciales en Europa y Rusia, nuestro país se posiciona ahora como la principal potencia espacial del mundo\", anunció el presidente de la Corporación China de Ciencia e Industria Aeroespacial en una reunión para definir el futuro del programa espacial de China. La declaración fue recibida con un momento de silencio y una sensación de incertidumbre entre los presentes. Durante años, el programa espacial chino estuvo por detrás del de Estados Unidos. Sin embargo, con el éxodo de los mejores talentos de la NASA y SpaceX hacia China debido a la inestabilidad, el papel de China como líder en la exploración espacial ha crecido.\n\nEsto plantea preguntas importantes: ¿Puede China, en esta etapa, asumir la responsabilidad de liderar a la humanidad en la exploración espacial? Y sin rivales significativos, ¿sigue estando justificada la fuerte inversión en este sector? La NASA enfrentó un dilema similar tras la caída de la Unión Soviética, que llevó a recortes severos en su presupuesto y a una reducción de sus ambiciones. ¿Podría la CNSA enfrentar un destino parecido?\n\nInquebrantable, la CNSA siguió adelante. A pesar de la crisis del petróleo y la inestabilidad financiera global, el programa espacial chino continuó según lo previsto. En lugar de recortar tras el declive de Estados Unidos, el gobierno central aumentó el apoyo, estableciendo al sector aeroespacial chino como un faro, un arca de Noé moderna en medio del caos global, llevando adelante el sueño eterno de la humanidad de alcanzar las estrellas."
 china.330.a: "Bajar la luna desde el noveno cielo..."
 china.331.t: "El regreso de la red judicial"
 china.331.d: "Hace muchos años, la Red Judicial, un sitio web creado para informar al público sobre el progreso de los casos legales y el funcionamiento del poder judicial, fue celebrada como un paso clave hacia la transparencia en el sistema legal de China. Recibió un amplio reconocimiento. Sin embargo, durante la era de Xi Jinping, como parte de sus esfuerzos por centralizar el poder administrativo y judicial, la transparencia de la Red Judicial fue disminuyendo gradualmente, causando gran preocupación entre los liberales nacionales.\n\nCon los cambios en el liderazgo del Partido, la Red Judicial ha encontrado una oportunidad para su resurgimiento. El secretario general Wang Yang ha apoyado este esfuerzo, y el camarada Zhou Qiang, secretario de la Comisión Central de Asuntos Políticos y Legales, ha ordenado la restauración y mejora de las funciones de la red. En el futuro, el público podrá acceder no solo a los expedientes abiertos en línea, sino también a los procesos y registros de juicios de casos específicos. Como figura principal en estas reformas, las acciones de Zhou Qiang han entusiasmado a los liberales, señalando que el sistema judicial chino está dejando atrás su pasado opaco y avanzando hacia una mayor transparencia."
 china.331.a: "La ley está hecha, y el pueblo debe conocerla."
 china.332.t: "Los neomaoístas reunifican China"
 china.332.d: ""
 china.332.a: "Interesante."
 china.333.t: "La verdad después de beber"
 china.333.d: "En un restaurante de barbacoa en Pekín, un grupo de viejos amigos de la universidad finalmente celebraba una reunión largamente esperada.\n\n\"¡Vamos, brindemos por el Viejo Zhang! ¡Él pilotaba drones en Fukuoka durante la batalla de Japón!\"\n\n\"Oye, Viejo Wang, ¿crees que después de conquistar Japón deberíamos darles una paliza también a esos americanos?\"\n\n\"Por supuesto, esos yanquis se merecen una buena tunda, ¿verdad, hermano Xu?\"\n\n\"Bueno... creo que quizá no estén dispuestos a ir a la guerra otra vez, considerando las relaciones económicas y comerciales...\"\n\n\"¡Bah, a la mierda todo eso, vamos a beber!\"\n\nEl banquete continuó hasta la noche, lleno de debates apasionados entre los jóvenes. Se apoyaban unos a otros mientras salían tambaleándose del restaurante de barbacoa, algunos vomitando en la acera mientras los más sobrios les daban palmaditas en la espalda. Se abrazaban borrachos para despedirse en la calle casi desierta. Sin embargo, a medida que se dispersaban y tomaban taxis para volver a casa, la juerga nocturna dejó una pregunta sin respuesta."
 china.333.a: "\"¿Qué pasa después?\""
 china.334.t: "Retorno de las arenas"
 china.334.d: "Desde que el estallido de la guerra civil en Arabia Saudita desencadenó la crisis del petróleo, muchos países han estado elaborando estrategias para obtener ventajas en la región. Sin embargo, las maniobras mortales de políticos y fanáticos inevitablemente se convierten en pesadillas para la gente común. Desde el inicio de la guerra, decenas de miles de civiles han sido desplazados, pero las naciones que apoyan a las diversas facciones siguen apostando.\n\nLa mayoría de los extranjeros ya han abandonado esta tierra atribulada, pero a veces irse no es tan fácil. Un periodista de la Agencia de Noticias Xinhua, cumpliendo con su deber profesional, se quedó unos días más para recabar más información, pero perdió el contacto con su organización. Durante un tiempo, su destino fue incierto. Tras un periodo de silencio, finalmente publicó un vídeo en redes sociales, revelando que se encontraba en el Aeropuerto Internacional de Teherán, preparándose para embarcar en un vuelo de regreso a casa.\n\nComo periodista, uno esperaría que estuviera sereno, pero en el vídeo aparecía desaliñado, con los ojos inyectados en sangre y un habla ligeramente desorganizada. Su expresión aturdida y su sonrisa forzada hicieron que los espectadores se preguntaran qué había sufrido este desafortunado periodista chino. Algunos lo han llamado el Lawrence de China, mientras que otros se preguntan si valió la pena."
 china.334.a: "El oro negro se forja con sangre."
 china.335.t: "La armonía trae riqueza"
 china.335.d: "\"Permítanme reiterar esto una vez más: el Partido y el Estado les aseguran que los empresarios patriotas aún pueden viajar libremente de un lado a otro del estrecho para realizar actividades comerciales. El sistema de la Región Administrativa Especial permanecerá sin cambios durante cincuenta años, así que por favor, estén tranquilos\", declaró un alto funcionario que había venido a supervisar y reconstruir la gobernanza de Taiwán. Reafirmó con entusiasmo a los empresarios taiwaneses durante la reunión del Frente Unido. Entre el público había un empresario invitado, que escuchaba atentamente las promesas de que el gobierno chino respetaría su propiedad y operaciones comerciales.\n\nMientras tanto, fuera de la sala de reuniones, otro empresario que no había sido invitado caminaba de un lado a otro en el salón. Cuando el funcionario terminó su discurso y entró en el salón, el empresario no invitado se acercó rápidamente y preguntó: \"Señor, yo también quiero asistir a este foro. ¿Por qué no me invitaron? He notado que dentro hay personas que alguna vez fueron donantes del Partido Progresista Democrático. ¿Por qué se les permite asistir?\"\n\nEl funcionario tomó un sorbo de agua y respondió con calma: \"Ya he hablado con él. Más importante aún, él es un «empresario patriota» que apoya al Partido y al Gobierno\". Con eso, se dio la vuelta y volvió a entrar en la sala de reuniones. El empresario, decidido, lo siguió rápidamente."
 china.335.a: "\"Yo también sé negociar. También puedo ser patriótico.\""
 china.336.t: "La noche en Taipéi"
 china.336.d: "En una noche despejada en Taipei, la suave brisa vespertina tenía la capacidad de tranquilizar a la gente. Aunque el Ejército Popular de Liberación había tomado el control de la ciudad, en la calma posterior a la guerra, los residentes intentaban continuar con sus rutinas diarias lo mejor que podían. El señor Lin, que vivía con su esposa, su hija y su madre anciana en la calle Heping Este, había perdido su trabajo en un negocio local tras la toma militar. Ahora, la familia dependía de sus ahorros para salir adelante.\n\nCon el buen tiempo, el señor Lin decidió llevar a su familia a comer un bol de mian xian. Los soldados que patrullaban las calles eran disciplinados y no parecían intimidantes. Después de la cena, la familia se dirigió a casa.\n\nSin embargo, al acercarse a su barrio, se sorprendieron al ver a ingenieros militares y policías instalando alambre de púas y colocando un torniquete metálico en la entrada. Los Lin, junto con sus vecinos, observaron con sorpresa y ansiedad. Un altavoz difundía la última directiva del gobierno: se impondría un toque de queda de 21:00 a 7:00 horas, y para entrar en la comunidad ahora se requeriría pasar controles de identidad.\n\nResignado y sintiéndose impotente, el señor Lin tiró suavemente de la mano de su hija mientras pasaban por el torniquete para regresar a casa."
 china.336.a: "\"Fomentando la armonía vecinal.\""
 china.337.t: "El último baluarte de la revolución en Asia"
 china.337.d: "Hace años, cuando la revolución china estaba en su punto más bajo, alguien preguntó desesperadamente: \"¿Cuánto tiempo podrá resistir la Bandera Roja?\" A esto, nuestro gran líder Mao Zedong respondió: \"Una sola chispa puede iniciar un incendio en la pradera.\" Incluso si el Ejército Rojo sucumbía temporalmente a los reaccionarios, el apoyo del pueblo y la luz guía de los ideales comunistas les permitieron resurgir de las cenizas, fortalecerse y finalmente triunfar sobre los tiranos burgueses y los títeres imperialistas.\n\nAl mirar atrás, parece que una vez más nos hemos encontrado en un camino histórico similar. Aunque muchos critican las políticas regresivas durante el mandato de Xi por causar un gran daño al pueblo chino, si rastreamos las raíces, las semillas de la destrucción se sembraron durante la era de Deng. El lema de Deng engañó hábilmente a la mayoría, haciendo que la gente perdiera su impulso y fe, transformándolos en seres controlados por el materialismo y el cinismo. Más importante aún, la transformación abrupta de China obstaculizó directamente el progreso revolucionario en las naciones de Asia-Pacífico, infligiendo daños irreparables y, en cuarenta años, dejándolas casi impotentes.\n\nEl destino nos ha presentado ahora otra oportunidad para cambiar el rumbo. Esta vez, no daremos por sentados los corazones y las mentes de millones; esta vez, no ignoraremos las manos extendidas de nuestros camaradas oprimidos en Asia. Estamos en la Plaza de Tiananmén, jurando solemnemente al presidente Mao: el fin del régimen reaccionario de Taiwán es sólo el comienzo..."
 china.337.a: "\"¡Proletarios de Asia, uníos!\""
 china.338.t: "Noche en Manama"
 china.338.d: "La noche se instaló sobre Manama como un gigante que dormía, y su calma se fundía con la serenidad de la ciudad. Sin embargo, en una habitación del Hotel Carlton, el ambiente estaba cargado de tensión. El representante diplomático de la Coalición Real caminaba de un lado a otro, con la mente en un torbellino.\n\nDesde que estalló la guerra civil, la Coalición se dio cuenta de que ya no eran bienvenidos. Pero perder la guerra significaba un destino mucho peor que la muerte. Desesperado, había llegado a Baréin, decidido a encontrar una nación dispuesta a apoyarlos a cualquier costo. Apenas unas horas antes, se había reunido en secreto con diplomáticos chinos en busca de su respaldo. A cambio de ayuda para derrocar al rey actual, le habían prometido a China un suministro constante de petróleo saudita.\n\nAunque el diplomático chino mantenía una expresión impasible, el representante sintió que su propuesta había causado un impacto. Estaban sopesando los riesgos y las recompensas de este arriesgado acuerdo. \"Necesitamos tiempo para considerarlo\", había dicho el diplomático. Ahora, el representante esperaba con ansiedad la respuesta, una respuesta que no solo decidiría su destino, sino también el de Arabia Saudita.\n\nA medida que pasaban los minutos, la habitación se sentía cada vez más sofocante. Se acercó a la ventana, corrió las pesadas cortinas y contempló las primeras luces del amanecer. Justo en ese momento, sonó el teléfono. Su corazón dio un vuelco mientras corría hacia el escritorio. Respiró hondo y descolgó el auricular.\n\n\"Honorable representante de la Coalición Real, estamos listos para profundizar la cooperación con su nación\"."
 china.338.a: "\"China respeta la su elección independiente en su camino hacia el desarrollo\"."
 china.339.t: "EPL en California"
 china.339.d: "La brisa del Pacífico traía el aire cálido y característico de California, barriendo las arenas de Monterey.\n\nA lo lejos, unas gaviotas giraban perezosamente en el cielo. Más cerca de la orilla, las lanchas de desembarco cortaban las olas con un profundo retumbar, desembarcando a un grupo de soldados del EPL en esta tierra desconocida. Ma Yilong estaba de pie en la playa, con un cigarrillo colgando de la boca y un mapa en la mano. Entrecerró los ojos mientras contemplaba la tierra que, no hace mucho, pertenecía a los llamados \"Estados Unidos de América\".\n\nSe rió para sí mismo. \"Hace unos años, teníamos que comprar un billete de avión para venir aquí y tratar con esos arrogantes oficiales de aduanas. Bueno, esta vez, nos han invitado.\"\n\nUn soldado se acercó corriendo, se puso firme y saludó. \"Informando al comandante de la brigada, la vanguardia ha llegado al punto designado y está lista para comenzar las operaciones en cualquier momento.\"\n\nYilong dio una profunda calada a su cigarrillo, entrecerrando los ojos mientras aplastaba la colilla en la fina arena bajo su bota. \"Notificad a todos los regimientos: ¡manteneos alerta! Estamos aquí para ayudar al pueblo americano, no para presumir de nuestra fuerza militar. Recordad, la disciplina militar es fundamental. ¡Quien rompa las normas estará en el turno de noche en el cementerio!\""
 china.339.a: "\"¡Sí, señor!\""
 china.340.t: "Rectificar los principios del desarrollo económico de la Reforma y Apertura"
 china.340.d: "Las reformas de Deng Xiaoping han sido reconocidas durante mucho tiempo como altamente efectivas. Transformaron China, guiándola fuera de la agitación pasada y hacia la modernización, creando un auge económico que captó la atención mundial. Desde las reformas agrarias hasta la creación de Zonas Económicas Especiales y la reestructuración de las empresas públicas, China ha avanzado, a pesar de enfrentar desafíos en el camino.\n\nSin embargo, el rápido crecimiento económico y la mejora de los niveles de vida también han ocultado problemas significativos, como la corrupción generalizada y el aumento de la desigualdad social. Las élites burocráticas han explotado cada vez más al público, limitando el bienestar a través del sistema de registro domiciliario, restringiendo la oferta de tierras y elevando los precios de la vivienda. Además, las políticas monetarias laxas han drenado los ahorros de la gente mientras ignoran los principios básicos del mercado.\n\nEstos errores ya no pueden ser tolerados. El pueblo merece disfrutar de los beneficios de su trabajo, en lugar de contribuir sin fin a las ganancias de burócratas y capitalistas. Nuestro objetivo es reconstruir los sistemas de bienestar y consumo, reducir la dependencia de las exportaciones y el ahorro, y asegurar que los ciudadanos compartan el crecimiento económico de la nación. Las leyes e instituciones clave protegerán los derechos del pueblo, mientras que diversas organizaciones de trabajadores los empoderarán para resistir la explotación. El mercado, actualmente dominado por unos pocos, será reformado, y un Gobierno democrático intervendrá para garantizar la justicia social y la igualdad."
 china.340.a: "No solo destacamos en desmantelar el viejo mundo, sino también en crear uno nuevo."
 china.341.t: "Juicio"
 china.341.d: "Una vez aclamado como el \"Rey del Vidrio\", Cao Dewang ahora estaba en el banquillo de los acusados, con el cuerpo encorvado, el cabello despeinado y sus ojos cansados nublados por el agotamiento y la desesperación.\n\n\"Acusado Cao Dewang, como fundador del Grupo Fuyao Glass, ha ignorado las leyes y regulaciones, y ha explotado despiadadamente a sus trabajadores durante muchos años. Sus acciones constituyen graves violaciones de los derechos laborales...\"\n\nLa voz firme del juez resonó en la sala, pero Cao ya no escuchaba. Había creído alguna vez que el dinero podía comprarlo todo: dignidad, libertad, incluso poder sobre los demás, pero ahora se daba cuenta de lo terriblemente equivocado que había estado.\n\n\"De acuerdo con los artículos 244, 248 y 276 del Código Penal de la República Popular China, el tribunal condena al acusado Cao Dewang a cadena perpetua, con la confiscación de todos sus bienes personales...\"\n\nLas piernas de Cao se doblaron, su cuerpo cayó instintivamente, pero los oficiales del tribunal lo levantaron sin decir palabra. Sus labios temblaron, pero no salió ningún sonido. Solo pudo observar cómo caía el mazo. Mientras lo llevaban, sus pasos flaquearon, y en esos momentos, parecía que décadas se añadían a su figura.\n\nMiró hacia atrás, a los trabajadores en la galería, los mismos que antes se inclinaban ante él. Ahora le devolvían la mirada, con ojos llenos de furia y desprecio.\n\nEn el espejo retrovisor del vehículo penitenciario, Cao vislumbró su rostro: viejo, torcido y marcado por la culpa. Una mancha que lo perseguiría por el resto de sus días."
 china.341.a: "¡El pueblo unido jamás será vencido!"
 china.342.t: "Tábula rasa"
 china.342.d: "Hace sólo unos años, el sistema burocrático de China dependía en gran medida de las conexiones personales, los lazos regionales y la experiencia. Durante cada Congreso del Partido, los observadores internacionales especulaban sobre ascensos, traslados y jubilaciones dentro del Partido y el Estado, cada uno ofreciendo predicciones diferentes.\n\nSin embargo, hoy, mientras el secretario general Hu Chunhua se dirigía a los atentos cuadros administrativos, sentía un profundo orgullo por las reformas radicales que habían transformado la burocracia.\n\nEntre los cuadros, algunos habían ascendido gracias a sus cualificaciones profesionales, otros por su fuerte gestión a nivel local, y algunos mediante procesos democráticos directos, pasando de ser representantes de la Asamblea Popular Nacional a funcionarios gubernamentales con estrechos vínculos con el pueblo.\n\nEste sistema diverso de promoción ha desmontado el funcionamiento opaco de la burocracia china, inyectando transparencia en la red de poder. Bajo este nuevo sistema, los cuadros están más centrados en servir al pueblo, no solo en agradar a sus superiores. Como resultado, \"Servir al Pueblo\" ya no es sólo un eslogan."
 china.342.a: "Del pueblo, para el pueblo."
 china.343.t: "Pantisocracia"
 china.343.d: "El secretario general Hu Chunhua, junto con funcionarios locales, llegó emocionado a una aldea en el oeste de la provincia de Hubei, no muy lejos de su ciudad natal. Esta zona había luchado durante mucho tiempo contra la pobreza, el envejecimiento de la población, la deserción escolar y la infraestructura deteriorada.\n\nPero hoy, la aldea se ha transformado. Gracias al recién elegido comité democrático de la aldea, ahora hay agua corriente, electricidad e incluso internet disponibles fácilmente. Las paredes recién pintadas y las casas impecables bordean las calles, y la escuela primaria del pueblo cuenta ahora con un nuevo campo de fútbol de césped artificial. Desde la distancia, Hu y los funcionarios observaron en silencio cómo los niños jugaban al fútbol, mientras los padres animaban a sus futuras estrellas.\n\nEl secretario general se marchó de buen ánimo, saludado por los aldeanos ocupados que discutían con entusiasmo la próxima asamblea del pueblo, donde hablarían sobre la compra de nuevos medicamentos para la clínica. Las sonrisas iluminaban sus rostros, reflejando el cielo brillante y despejado que había sobre ellos."
 china.343.a: "La nueva sociedad avanza por el camino correcto."
 china.344.t: "El presidente Mao sonríe"
 china.344.d: "La Plaza de Tiananmén, el Renminbi, el solemne mausoleo... Resulta impactante reflexionar sobre cómo Mao, el principal fundador de la República Popular China, se ha convertido en un símbolo poderoso pero algo vacío. Sin embargo, hay motivos para el optimismo. Desde el cambio de siglo, cada vez más chinos han comenzado a redescubrir el legado del presidente Mao, y el Comité Central del Partido, respondiendo a esta tendencia, está dispuesto a reintegrarlo en el tejido político y cultural de la nación.\n\nLos oficiales ideológicos del Partido reconocen que el presidente Mao no solo fue un poeta carismático, político y estratega militar, sino también una figura de importancia duradera. Como resultado, el Partido ha empezado a incorporar las obras audaces e imaginativas de Mao en la industria cultural más amplia. Sus notables estrategias militares -como las \"Cuatro Cruces del Río Chishui\" durante la Gran Marcha- están siendo narradas en documentales. Sus pensamientos y escritos ahora aparecen de forma destacada en los libros de texto, no como un simple añadido a las contribuciones de Deng Xiaoping o Xi Jinping, sino como ideas centrales por derecho propio.\n\nHoy en día, un \"renacimiento del pensamiento Mao\" está barriendo la sociedad. Jóvenes entusiastas vuelven a llevar sus citas en las mochilas o a recitar su poesía en reuniones. Así como los estadounidenses honran a sus padres fundadores, nosotros también honraremos a nuestro gran líder."
 china.344.a: "Cuando las flores están en plena floración..."
 china.345.t: "Concepción histórica de la guerra popular"
 china.345.d: "El pueblo, y sólo el pueblo, es la fuerza motriz detrás de la creación de la historia mundial.\n\nEl presidente Mao nos enseñó esto, y durante la gran revolución china, el PCCh lo puso en práctica. Este principio es válido para la revolución, la construcción y la guerra por igual. Sin embargo, es lamentable que una parte significativa de nuestros líderes del partido y militares parezca estar fascinada con el \"determinismo tecnológico\", depositando una fe excesiva en las máquinas de guerra modernas mientras se descuida el papel indispensable del \"pueblo\" en el Ejército Popular.\n\nTales falacias nos han traído desgracia. La dolorosa derrota en el conflicto de Taiwán manchó la imagen que alguna vez fue formidable del Ejército Popular de Liberación. No obstante, no hay mal que por bien no venga. La Asamblea Popular Nacional ya ha aprobado un paquete integral de enmiendas a la Ley de Movilización de Defensa Nacional. A través de estas leyes, reviviremos el perdido concepto de guerra popular. Los jóvenes recibirán más entrenamiento militar, se potenciará la vitalidad de las organizaciones de la milicia e incluso las fuerzas armadas de base estarán equipadas con más armas...\n\nCiertamente, la tecnología bélica es crucial, pero en nombre del Ejército Popular de Liberación, la palabra \"Pueblo\" va primero. Debemos recordar esta gloriosa tradición y llevarla adelante."
 china.345.a: "Hijos de obreros y campesinos, las fuerzas armadas del pueblo."
 china.346.t: "Nueva Cultura Roja"
 china.346.d: "Desde la Reforma y Apertura, durante los últimos cuarenta años, el ámbito cultural ha estado dominado por liberales burgueses y facciones occidentalizadas. En el mundo del cine, Hollywood es considerado el estándar de oro, mientras que las series de televisión se inspiran en gran medida en Japón, Corea del Sur y Hong Kong. El arte del teatro se ha convertido en una reliquia del pasado, y la ópera tradicional se ha reducido a un pájaro enjaulado que sólo canta historias románticas.\n\n¡Esta situación no puede continuar más! En la fundación de nuestra nación, poseíamos una cultura roja floreciente, donde el romanticismo revolucionario se combinaba con un realismo que reflejaba la vida cotidiana. Esto produjo numerosas obras destacadas como la pintura al óleo \"Tomando por asalto el Puente Luding\", la novela \"La Bandera Roja\" y \"Red Crag\", todas ellas enormemente populares entre las masas. Desafortunadamente, con la llegada de la Revolución Cultural y las llamadas \"óperas modelo\", esta teoría cultural perdió su base y fue relegada a los anales de la historia.\n\nSin embargo, ahora, el Partido y el gobierno están decididos a recuperar la esencia de la cultura socialista y reconstruir una cultura que encarne tanto el espíritu rojo como el carácter nacional de nuestra República Popular. Aunque seguiremos aprendiendo de las formas avanzadas de expresión global, la era en la que los liberales burgueses dominaban el campo cultural ha quedado atrás para siempre."
 china.346.a: "La bandera roja es como un mar, y las canciones son como una marea."
 china.347.t: "Nueva Era Común de Desarrollo"
 china.347.d: "Durante mucho tiempo, muchos han creído que el aumento del PIB conduce automáticamente a una mejora en el nivel de vida. Sin embargo, la historia ha demostrado que el crecimiento económico puede beneficiar desproporcionadamente a intereses creados, mientras se descuida el bien común. Ahora estamos tomando medidas para cambiar esta tendencia, asegurando que los beneficios del desarrollo económico se compartan de manera equitativa.\n\nNuestra primera prioridad es transformar la propiedad privada en el sector inmobiliario. El mercado ha sido manipulado con frecuencia, convirtiendo la vivienda en una herramienta de explotación. Las restricciones en el uso del suelo, combinadas con altos impuestos, han presionado a la gente común a gastar sus ahorros solo para asegurar un hogar. De ahora en adelante, trataremos la vivienda como una necesidad básica, plenamente respaldada por el gobierno. Iniciativas como la vivienda pública en alquiler, la vivienda asequible y diversas opciones de vivienda pública beneficiarán a miles de familias.\n\nAdemás, volveremos a colectivizar la industria y la agricultura y reintroduciremos sistemas de negociación entre trabajadores y dirección. Nuestro objetivo es establecer organizaciones laborales dinámicas y autónomas con líderes elegidos directamente por los trabajadores. Estos líderes supervisarán las operaciones y protegerán los derechos de los trabajadores, fomentando una vida plena para todos los implicados.\n\nTambién nos centraremos en otras áreas críticas, incluyendo la igualdad educativa, la utilización de la energía nuclear, la protección ecológica y la equidad en el mercado. ¡El futuro está lleno de oportunidades y estamos listos para dejar nuestra huella!"
 china.347.a: "¡Avancemos hacia un futuro hermoso!"
 china.348.t: "Transfiere más poder al PNC"
 china.348.d: "De acuerdo con las disposiciones pertinentes de la Constitución de la RPC, se establecen varios comités especializados dentro de la Asamblea Popular Nacional. Estos comités no poseen las características de un órgano de poder; en cambio, son instituciones encargadas de funciones específicas bajo la dirección del órgano de poder. Esto se considera una prueba significativa de que la Asamblea Popular Nacional sirve meramente como un \"sello de goma\". Además, la mayoría de los miembros de estos comités son exfuncionarios provinciales y ministeriales que se han jubilado y han perdido su poder, lo que limita bastante su influencia.\n\nSin embargo, los recientes acontecimientos en el panorama político de China han vuelto a captar la atención de observadores y analistas de todo el mundo. Según un portavoz del Departamento Central de Propaganda, el Consejo de Estado, así como la Comisión Nacional de Supervisión, han transferido algunos de sus poderes a los comités especializados de la Asamblea Popular Nacional. Estos comités incluyen el Comité de Supervisión y Judicial, el Comité de Asuntos Exteriores y el Comité de Finanzas y Economía.\n\nComo la llamada máxima autoridad estatal, este movimiento es visto por algunos como un avance significativo en la orientación de la práctica política a través del espíritu de la Constitución. No obstante, existen preocupaciones de que esto pueda conducir a una expansión excesiva de los poderes de la Asamblea Popular Nacional, difuminando la línea entre los poderes legislativo y ejecutivo. En cualquier caso, parece que se ha levantado otra capa del velo sobre la caja negra política de China."
 china.348.a: "Esfuerzo notable."
 china.349.t: "Resistiendo la reforma"
 china.349.d: "El plan de reforma para la selección y nombramiento de cuadros, decidido por el gobierno central, tenía como objetivo romper el arraigado \"faccionismo\" y la \"cultura de camarillas\" en los comités locales del Partido. Al implementar un mecanismo de selección más abierto y transparente, el plan pretendía elevar a personas genuinamente virtuosas y capaces a puestos de liderazgo.\n\nSin embargo, tan pronto como se propuso la reforma, causó un gran malestar en varios comités locales del Partido. Algunos líderes locales del Partido se resistieron, creyendo que la medida del gobierno central debilitaría el poder de los comités del Partido y haría ineficaces a los Gobiernos locales. Temían que la reforma restringiera su autoridad y disminuyera su influencia.\n\nPara los comités del Partido en algunas regiones remotas, esta reforma en la selección de cuadros se considera un ataque directo a sus intereses. Sin embargo, como dice el refrán, \"Cuando el gato no está, los ratones bailan.\" Tras la caída de Xi Jinping, el faccionismo en varios comités locales del Partido ha empeorado, dificultando enormemente la implementación de las reformas."
 china.349.a: "Exteriormente cumplen pero interiormente resisten."
 china.350.t: "Cuestión de los sindicatos"
 china.350.d: "Desde 1949, la Federación de Sindicatos de Toda China ha ejercido durante muchos años un liderazgo unificado sobre los sindicatos locales e industriales. Como miembro de las \"organizaciones sociales que participan en el CNCCP\", está significativamente influenciada por la burocracia gubernamental y la ley le exige explícitamente aceptar el liderazgo del PCCh.\n\nDesde la Reforma y Apertura, la ACFTU ha ido perdiendo gradualmente su papel como asociación dirigida por los trabajadores para representar y proteger sus intereses legítimos. Este declive culminó en 2018, cuando se le retiró el control sobre diversas instituciones de bienestar y asociaciones industriales que antes gestionaba, y se vio obligada a establecer las llamadas relaciones de \"asociación económica\" con estas entidades. Además, los sindicatos subordinados carecen de derechos de negociación colectiva y a menudo están dirigidos por altos directivos empresariales, reduciéndolos a ramas que principalmente organizan actividades recreativas y culturales dentro de las empresas.\n\nNuestra nueva política pretende cambiar esta situación. Actualmente, existen dos opiniones principales. Una aboga por levantar completamente el control estatal sobre las organizaciones sindicales, permitiendo la existencia de sindicatos no estatales y otras organizaciones de derechos laborales. Sus defensores argumentan que esta es la única manera de proteger verdaderamente los derechos de los trabajadores. La otra, considerando el asunto de la estabilidad social, apoya la continuidad de los sindicatos estatales pero pide reformas profundas. Estas reformas restaurarían los poderes clave de los sindicatos y ampliarían su autonomía."
 china.350.a: "Para convertirnos en una verdadera nación de trabajadores, debemos tener el valor de reformar."
 china.350.b: "Adherirse al sindicato estatal es beneficioso para los intereses colectivos."
 china.351.t: "Los liberales critican a Hu Chunhua"
 china.351.d: "A medida que las amplias reformas sociales del secretario general Hu Chunhua entran en pleno vigor, el ambiente del discurso público en China ha cambiado notablemente. Desde los medios tradicionales como periódicos, televisión y radio hasta las plataformas de internet en auge, la mayoría coincide en que las políticas de reforma del Partido han dado al público más espacio para expresarse libremente. Desafortunadamente, no todos comparten este sentimiento.\n\nUn número considerable de intelectuales y figuras prominentes en las esferas cultural y económica de China han sido críticos durante mucho tiempo con el Partido y el gobierno. Esta vez no es diferente. Incluso dentro del entorno algo más abierto proporcionado por el Estado, algunas de estas figuras han hecho comentarios tentativos y sarcásticos, acusando a los líderes del Partido de \"no tener fe en la democracia\" y de \"faltarles el valor para una apertura total\". Las secciones de comentarios de estas discusiones están llenas de debates acalorados entre partidarios y detractores. En general, la mayoría cree que esta libertad ganada con tanto esfuerzo debe ser valorada y no socavada imprudentemente por críticas impulsivas.\n\nDe hecho, algunas figuras de tendencia liberal dentro del gobierno también consideran que el ritmo actual de la reforma es un poco lento. Los predecesores de Hu en la Liga Juvenil Comunista incluso han sugerido que Hu debería \"trazar audazmente un nuevo camino\". Sin embargo, estos liberales descontentos pueden estar pasando algo por alto o quizás engañándose a sí mismos. Las reformas del Partido no están destinadas a imitar a Occidente, sino a forjar un camino democrático único propio."
 china.351.a: "El rumor continúa..."
 china.352.t: "Apoyo de la Nueva Izquierda"
 china.352.d: "La maquinaria de propaganda del Partido ruge con fuerza, difundiendo los últimos éxitos del doble impulso del Comité Central hacia reformas políticas y económicas entre la vasta población de más de mil millones de personas. Las fuerzas conservadoras, aún arraigadas en las épocas de Deng Xiaoping y Xi Jinping, se quejan de la apertura y transparencia generalizadas, mientras que las voces fantasiosas de la élite liberal zumban con quejas de que el gobierno es vacilante y cauteloso con la reforma.\n\n¡Que se quejen! El secretario general Hu Chunhua ha encontrado nuevos aliados entre los intelectuales y la población en general. Académicos destacados como Wang Shaoguang, Hu Angang, Cui Zhiyuan y Zhang Yibing han expresado su firme apoyo a las reformas de Hu; ya sea a través de artículos en publicaciones importantes o entrevistas en televisión, exponen con pasión su aprobación de la nueva dirección.\n\nEl profesor Wang Shaoguang de la Universidad de Hong Kong enfatizó que las reformas actuales de China difieren de los cambios políticos influenciados por los sistemas democráticos burgueses occidentales en los años 80. En cambio, se inspiran en el concepto de \"sociedad civil\" en Occidente, pero con un giro: China está construyendo una \"sociedad popular\" que se basa en el propio contexto del país. Los actores centrales de esta \"sociedad popular\" son las masas trabajadoras de todo el país. Esta teoría ha ganado una amplia aceptación en la sociedad, reforzando la confianza del Partido para avanzar con las reformas."
 china.352.a: "Nos apoyamos en los hombros de la gente."
 china.353.t: "El primer jefe ejecutivo de la RAE de Taiwán"
 china.353.d: "Después de que la emoción inicial de recuperar Taiwán se desvanezca, comienza el verdadero desafío: gobernar la isla. Esta tarea no solo implica sanar las cicatrices de la guerra, sino también demostrar la superioridad del sistema socialista con características chinas sobre los Tres Principios del Pueblo. Solo entonces la población descontenta aceptará plenamente el gobierno de Pekín y se alineará con la República Popular China.\n\nLa selección del líder de la RAE es una tarea crítica que debe abordarse con cuidado. Esta persona debe ser hábil para trabajar con Pekín y, al mismo tiempo, capaz de gestionar las tensiones subyacentes dentro de Taiwán, asegurando que el gobierno se extienda más allá de la ciudad de Taipéi. Un candidato es Hung Chi-chang, exlíder de la facción Nueva Marea dentro del DPP. Cuando la bandera del Cielo Azul con un Sol Blanco fue reemplazada por la bandera Roja de Cinco Estrellas, Hung se alineó inmediatamente con el gobierno continental. La facción Nueva Marea, conocida por su enfoque de \"línea de masas\", busca influir en la política a través de movimientos sociales y actividades externas del partido. Con una estructura organizativa muy cohesionada y un enfoque en el centralismo democrático, la facción se convirtió en un \"partido dentro del partido\" dentro del DPP. Hung desempeñó un papel clave en el establecimiento rápido de un órgano administrativo provisional que gestionó eficazmente la recuperación de Taiwán tras la guerra.\n\nOtro candidato es Tsai Eng-meng, fundador de Want Want Holdings Limited y magnate de los medios, quien fue en su momento una de las personas más ricas de la isla. Tsai ha estado activo durante mucho tiempo en mejorar las relaciones a través del estrecho de Taiwán. Incluso en períodos de tensiones elevadas, apoyó abiertamente el concepto de \"Una Familia a través del estrecho\" y se opuso al separatismo taiwanés. Además, Tsai es conocido por su fuerte nacionalismo chino y conservadurismo cultural. Aunque sus puntos de vista en su momento atrajeron críticas tanto del gobierno taiwanés como del público, hoy se han convertido en activos clave en su carrera política."
 china.353.a: "Nombrar a Hung."
 china.353.b: "Nombrar a Tsai."
 china.354.t: "El corazón moribundo de la revolución"
 china.354.d: "Al acercarse el crepúsculo, el sol poniente se hundía lentamente hacia el horizonte, proyectando un cálido resplandor naranja sobre las colinas de la meseta de Loess. A la tenue luz de las lámparas dispersas, apareció un tranquilo pueblo anidado en el valle, con puntos de luz parpadeando en las ventanas de las casas de campo. El aroma de la comida y una delgada estela de humo blanco se elevaban desde los tejados.\n\nA diferencia de hace unas décadas, el camino que conduce a los campos de trigo al otro lado del valle ahora estaba flanqueado por una frondosa vegetación, probablemente resultado de una campaña ambiental que duró una década. A lo largo de este camino recién renovado, un agricultor con sombrero de paja guiaba tranquilamente a su buey hacia el pueblo. El agricultor era alto y, aunque su figura se había afinado con la edad, aún se vislumbraba su antigua fortaleza. Bajo el ala de su sombrero, sus ojos, enmarcados por las arrugas del tiempo, seguían siendo agudos y claros.\n\nAl pasar por el edificio de la oficina del comité del pueblo, el anciano agricultor levantó la vista por costumbre. Al mirar hacia el estanque artificial en el patio trasero del comité, pudo distinguir vagamente un enorme cartel propagandístico en una pared blanca. El cartel mostraba a varios agricultores de mejillas sonrosadas, cejas pobladas y robustos, sonriendo mientras se agrupaban alrededor de una figura misteriosa con camisa blanca, sosteniendo un manojo de trigo y una copia de las Citas del Presidente Mao. Su rostro estaba oculto y, detrás de ellos, varias banderas rojas ondeaban al viento, un relicto anacrónico de la era revolucionaria proyectado ahora en el presente. El anciano agricultor se rió para sí mismo. Le parecía casi ridículo que quisieran arruinar una simple pintura. Pero, claro, esta no era gran cosa desde el principio, así que arruinarla no importaba.\n\nAl llegar al establo en el otro extremo del pueblo, el anciano agricultor llevó a su buey adentro y saludó al veterinario, que estaba agachado y fumando en una pipa. \"¡Hola, señor Liu!\" llamó.\n\n\"¡Ah, ya estás aquí!\" El señor Liu se levantó, golpeó la ceniza de su pipa y se limpió las manos en las rodillas. \"Te he estado esperando. Este es el mejor buey que tenemos aquí, no podemos permitir que le pase nada.\" Entrecerró los ojos hacia el anciano agricultor. \"Sabes, sin ánimo de ofender, pero me resultas muy familiar. Tengo la sensación de haberte visto todos los días, pero no recuerdo que vivieras en ninguno de los pueblos cercanos.\"\n\nEl anciano agricultor sonrió con suavidad, esquivando la pregunta."
 china.354.a: "\"¿De verdad? Debes estar equivocado.\""
 china.355.t: "La gloria pasada se desvanece"
 china.355.d: "Shenzhen, un bullicioso centro en el sur de China nacido de las reformas y las políticas de apertura, recibió un día brumoso tras una noche de lluvia intensa. En un modesto apartamento dentro de un edificio residencial cerca de la estatua de Deng Xiaoping en el Parque de la Montaña Lianhua, una empleada doméstica retiraba con cuidado una olla de sopa de costillas de cerdo y maíz perfectamente cocinada del fuego. Mientras inspeccionaba el fruto de su trabajo matutino, de repente escuchó un grito furioso desde fuera de la puerta de la cocina: \"¿¡Por qué harían esto?! ¿¡Cómo pudieron?!\"\n\nLa empleada doméstica rodó los ojos en silencio. Al principio, estos estallidos la asustaban, pero ya se había acostumbrado. El inquilino era un hombre mayor, peculiar, alto y vagamente familiar, aunque nunca lograba recordar dónde lo había visto antes. Cada día antes de la comida, mientras leía el Shenzhen Special Zone Daily, el anciano solía despotricar contra el gobierno y sus políticas por diversas razones. Luego, comía rápidamente, volvía a su habitación y se encerraba allí toda la tarde. Una vez, la empleada intentó limpiar su cuarto, pero al ver las paredes cubiertas de chinchetas y fotografías unidas por hilos, el anciano la regañó furiosamente y ella nunca volvió a cruzar ese umbral.\n\nSin embargo, hoy el anciano parecía más agitado de lo habitual. \"¡Mira esto, solo mira esto!\" exclamó, golpeando el periódico que tenía en la mano mientras la empleada ponía la sopa en la mesa del comedor. \"¡Quieren liberalizar la religión! ¡Separar la religión del liderazgo del Partido! ¿Dónde ha quedado su ideología socialista? ¿Quieren ver surgir sectas y provocar conflictos sectarios en China?\"\n\n\"¿Qué tienen que ver las decisiones de los grandes con nosotros, la gente común?\" respondió la empleada con desdén. No pudo evitar añadir: \"Además, ¿acaso no es el dinero lo que a todos les interesa hoy en día? ¿Quién cree ya en esas cosas sobrenaturales?\"\n\n\"No entiendes, simplemente no entiendes... ¡Uf, hablar contigo es inútil!\" se enfureció el anciano, murmurando \"traidores\", \"doble cara\" y \"gente equivocada\" mientras se servía un cuenco de sopa. Sin más que decir, la empleada simplemente se encogió de hombros."
 china.355.a: "«Qué hombre tan extraño.»"
 china.356.t: "Proyecto SONG WENCONG"
 china.356.d: "Cuando se levantó la cubierta, los oficiales de la Fuerza Aérea asignados para inspeccionarla quedaron boquiabiertos. Lo que se desplegó ante sus ojos fue un caza de próxima generación sin precedentes, acompañado por un modelo del J-20, en una formación de vuelo conjunta. El propio J-20 ya es bastante grande, pero comparado con la atracción principal, parecía un gran tiburón blanco junto a una orca, significativamente empequeñecido. El nuevo caza, negro azabache y aerodinámico, emanaba un aura de ferocidad y elegancia, despertando un sentimiento de asombro en todos los que lo contemplaban.\n\n\"¡Caballeros, espero que nuestro último trabajo cumpla con vuestras expectativas!\" dijo el diseñador jefe, que estaba al lado, sonriendo ampliamente.\n\n\"Sin duda nos habéis dado una gran sorpresa, camarada\" dijo el Director del Departamento de Desarrollo de Equipamiento del CMC, señalando el modelo. \"He leído vuestro informe sobre el caza de sexta generación; para ser honesto, antes pensaba que estaba leyendo una novela de ciencia ficción\". Este comentario provocó risas entre varios oficiales presentes. \"¿Podéis garantizar que todos los avances tecnológicos listados en vuestro informe se harán realidad en esta aeronave?\"\n\nLa confianza del diseñador jefe era evidente en sus palabras: \"No estamos construyendo castillos en el aire, camarada; esto es el resultado de años de esfuerzo acumulado y una década de trabajo meticuloso, mientras que el proyecto NGAD estadounidense ya está estancado. Con este avión, tendremos el poder definitorio en la guerra aérea de próxima generación\".\n\nEl Director asintió en señal de aprobación, mientras que cerca, el Comandante de la Fuerza Aérea, incapaz de contener su emoción, ya estaba dando vueltas alrededor del modelo de sexta generación con un grupo de oficiales de estado mayor, discutiendo animadamente los detalles."
 china.356.a: "¡Vamos a intentarlo!"
 china.356.b: "Tal vez no..."
 china.357.t: "Pakistán pide ayuda"
 china.357.d: "La relación bilateral entre Pakistán y China imita la del comensalismo entre la rémora y los tiburones. La simbiosis entre nuestras dos naciones ha sido vital para nuestro desarrollo mutuo. Fue sólo con la ayuda de Pakistán que pudimos reabrir nuestro país al mundo y, lo que es más importante, aliviar la tensión entre nosotros y Occidente y restablecer las relaciones con Estados Unidos. A medida que crecíamos, devolvimos este favor proporcionando a Pakistán un apoyo económico y militar crucial para combatir la agresión india, que enfrentan ambas naciones.\n\nNos vimos obligados a observar cómo las armas nucleares indias impactaban en Pakistán. Millones de vidas se borraron en un destello de luz. Los sedientos de sangre indios demostraron una vez más ser un obstáculo para la paz y la prosperidad en Asia. El venenoso Hindutva muestra sus colmillos y su sombra se extiende por todo el continente asiático.\n\n¡Inaceptable! ¡Todo esto! ¡La vergüenza, la culpa y el dolor! ¿Cuánto más tendremos que soportar? ¿Vamos a permitir que la amenaza india nos pisotee a nosotros y a nuestros amigos? Pakistán ha solicitado nuestra ayuda y es nuestro deber apoyarlos. Les guiaremos en su camino para reconstruir su nación, que una vez fue hermosa y próspera. La simbiosis continuará, de una forma u otra."
 china.357.a: "¡Tenemos que ayudar!"
 china.358.t: "El orden en Pakistán restaurado"
 china.358.d: "La bandera roja del 1 de agosto y la bandera verde y blanca de Pakistán ondean ahora lado a lado, una imagen que se ha vuelto cada vez más común en los últimos días. Los observadores creen que las consecuencias catastróficas del conflicto nuclear entre India y Pakistán han sido contenidas eficazmente bajo la supervisión del ejército chino.\n\nEn medio de la devastación nuclear, las estaciones de socorro instaladas por el EPL y las bases de ayuda humanitaria marcadas con grandes cruces rojas se erigen como símbolos de esperanza. Ancianos y niños reciben atención de primer nivel, y a cada hogar se le proporciona mantas gruesas y suficiente comida para evitar el hambre. Continúan llegando recursos sustanciales desde China a través del Corredor Económico China-Pakistán.\n\n\"De cara al futuro\", declaró un portavoz chino, \"China seguirá cumpliendo con sus obligaciones internacionales. Esto incluye contactar con las facciones restantes en Pakistán y establecer un Gobierno interino estable. Muchos ya han respondido positivamente a la propuesta de China.\""
 china.358.a: "Esto es un rayo de esperanza en una situación desesperada."
 china.359.t: "Fuerzas chinas entran en Pakistán"
 china.359.d: "Tras la devastadora guerra indo-pakistaní, que culminó en un intercambio nuclear y dejó a Pakistán prácticamente en un \"concepto geográfico\", su aliado tradicional, China, lanzó una operación de ayuda humanitaria a gran escala en Pakistán a petición del gobierno central pakistaní, según anunció oficialmente el gobierno chino.\n\n\"En este mismo momento\", declaró un portavoz chino, \"los equipos de rescate del EPL han cruzado la frontera entre China y Pakistán y están llevando a cabo operaciones de socorro sistemáticamente\".\n\n\"Todos los soldados que participan en esta misión han firmado un acuerdo de vida o muerte\", declaró el comisario político del 76º Grupo del Ejército en el cruce fronterizo de la Carretera de la Amistad China-Pakistán. \"La moral se elevó durante la reunión de movilización cuando las tropas supieron que iban a ayudar a nuestro «Hermano de Hierro», Pakistán. Fue una escena muy conmovedora\". Sin duda, esta intervención representa un salvavidas para el pueblo de Pakistán, que sufre condiciones infernales."
 china.359.a: "Por un amigo, pasaríamos por fuego y agua."
 china.360.t: "¡Bombardeos termonucleares!"
 china.360.d: "Informe Urgente\nCuartel General de Emergencias Bélicas del Gabinete\nMúltiples bombas nucleares han impactado en puntos estratégicos clave de Tokio, Yokohama, Osaka, Nagoya, Fukuoka y otras ciudades importantes. La región de la capital ha sufrido graves daños y el gobierno central se ha reubicado en un puesto de mando alternativo para mantener las funciones de mando más básicas.\n\nLos remanentes de las Fuerzas de Autodefensa se están reorganizando. Si bien las principales instalaciones portuarias navales han sido gravemente afectadas, parte de la flota se evacuó con antelación y mantiene una capacidad operativa limitada. Al mismo tiempo, el sistema nacional de alerta temprana indica que el enemigo podría llevar a cabo una segunda oleada de ataques nucleares. Los aviones de alerta temprana de las Fuerzas de Autodefensa y las unidades de defensa aérea restantes se están movilizando para interceptar cualquier ataque posterior.\n\nActualmente, los buques supervivientes de la Fuerza Marítima de Autodefensa se encuentran en alerta máxima. Sin embargo, los efectos del pulso electromagnético de las explosiones nucleares han interrumpido gravemente nuestros sistemas de mando y comunicaciones, lo que dificulta la coordinación con las unidades locales. Se está activando una red de comunicaciones de emergencia en un esfuerzo por restablecer las capacidades básicas de comando y control."
 china.360.a: "Joder."
 china.360.b: "¡Podemos vengarnos!"
 china.361.t: "Bombardeo termonuclear de Japón"
 china.361.d: "Por primera vez desde los bombardeos atómicos de Hiroshima y Nagasaki en 1945, Japón es nuevamente víctima de un ataque nuclear. Al llegar la guerra a un punto muerto, China lanzó un ataque nuclear a gran escala contra las islas japonesas, detonando múltiples ojivas nucleares por todo el archipiélago. Desde Hokkaido hasta Kyushu, varias ciudades importantes fueron alcanzadas casi simultáneamente. Estimaciones preliminares sugieren que la potencia total de estos ataques es decenas de veces mayor que la de la bomba atómica utilizada en Hiroshima.\n\nLas explosiones nucleares desencadenaron pulsos electromagnéticos, lo que provocó cortes de comunicación en todo el país. Las evaluaciones de daños en diversas regiones aún están en curso, pero ya es evidente que este ataque nuclear ha socavado profundamente la capacidad de Japón para mantenerse como nación."
 china.361.a: "Terrible."
 china.362.t: "La Federación Popular Reunifica China"
 china.362.d: ""
 china.362.a: "Interesante."
 china.363.t: "Intereses chinos en Afganistán"
 china.363.d: "Las tormentas de polvo rugen, las campanas de los camellos tintinean y los árabes envueltos en gruesos pañuelos miran con frialdad y desconfianza. Esta es la imagen estereotipada que muchos chinos tienen de las personas que viven al oeste del desierto de Taklamakán y al este del estrecho del Bósforo. Desgraciadamente, Afganistán carece de los magníficos mares de arena y está dominado por montañas áridas y rocosas. El aroma de los kebabs queda eclipsado por el persistente olor a humo de pólvora.\n\nA pocos pasos de los palacios y complejos de mezquitas más famosos de Kabul se encuentra la embajada china. Tres de los diplomáticos chinos de más alto rango en Afganistán están reunidos alrededor de una pequeña mesa redonda. De vez en cuando se cruzan miradas antes de bajar la vista, estudiando atentamente un mapa a gran escala de Afganistán extendido sobre la mesa.\n\nFinalmente, el embajador rompe el silencio, empujando el mapa hacia el agregado militar y el director político sentados frente a él. \"Entonces, decidme, ¿qué veis aquí?\"\n\nTras una breve pausa, el agregado militar habla primero: \"Ubicación estratégica, fácil de defender, difícil de atacar... Una amenaza importante para nuestro noroeste, que podría convertirse en un problema a largo plazo.\"\n\nEl director añade: \"El ascenso al poder de los talibanes tiene a todos en tensión, apenas queda uno de cada diez chinos en el extranjero...\"\n\n\"Vosotros veis peligro; ¡yo veo oportunidad!\" El embajador señala varios puntos marcados con lápiz rojo en el mapa. \"El aeropuerto internacional de Kabul necesita urgentemente reparaciones; los campos de amapola que destruyeron los talibanes siguen sin cultivar; los alemanes abandonaron sus proyectos de minería de cobre a medias... Mirad desde Kunduz hasta Kandahar, ¡lugares así hay por todas partes!\" Con los ojos brillando de ambición, el embajador levanta la cabeza del mapa y continúa entusiasmado: \"Los americanos necios convirtieron este lugar en un páramo. Nosotros, sin embargo, aprovecharemos esta oportunidad para ganarnos a los afganos tercos, tanto política como económicamente. Por nuestro futuro y nuestra patria...\""
 china.363.a: "Es hora de tomárselo en serio."
 china.400.t: "Cultivando la reforma"
 china.400.d: "\"El nuevo semestre ha comenzado, y me alegra veros a todos de nuevo.\" Poco a poco, el aula se fue quedando en silencio y todas las miradas se dirigieron al atril. \"Hoy, para nuestra primera lección del curso, quiero hablaros sobre la democracia.\"\n\n\"Vamos a abrir los libros en la página 12 y a leer este pasaje: «La democracia es un sistema político en el que el pueblo participa y toma decisiones. Su núcleo reside en la \"soberanía popular\", que significa que la autoridad del Estado proviene del pueblo, y el gobierno existe para servir mejor y representar los intereses de la gente. En un sistema democrático, cada ciudadano tiene el derecho a criticar y sugerir políticas al gobierno, fomentando un discurso social diverso que impulsa al gobierno a mejorar su gestión y garantizar la equidad y justicia social»\".\n\nEl profesor hizo una pausa, mirando a los estudiantes frente a él, y preguntó: \"¿Sabéis qué es la verdadera democracia?\"\n\nLa sala quedó en silencio. Para los estudiantes, los libros nunca habían profundizado en este tema antes. A menudo, los profesores no les pedían su opinión, sino que simplemente les indicaban qué aparecería en los exámenes. Así que ahora, cuando el viejo profesor preguntó, ninguno pudo responder.\n\n\"La democracia no es solo un sistema, sino una forma de vida, un conjunto de valores. Significa respeto, tolerancia, igualdad y libertad. Significa que todos tienen derecho a buscar su propia felicidad, y que todos tienen la responsabilidad de considerar a los demás.\"\n\nUn estudiante levantó la mano y preguntó: \"Profesor, ¿cómo sería si una familia, como un país, practicara la democracia?\""
 china.400.a: "Se quedó atónito por un momento, luego estalló en carcajadas."
 china.401.t: "El invierno se convierte en primavera"
 china.401.d: "Hace dos años, Liu Zhengfeng era un periodista conocido, famoso por hablar con valentía y criticar las injusticias sociales. Un artículo que escribió exponiendo la corrupción del gobierno local le valió un amplio reconocimiento, pero también una catástrofe que casi lo destruye. Su cuenta de Weibo fue baneada permanentemente, el artículo eliminado, y Liu pareció desaparecer de internet como si nunca hubiera existido. Había considerado apelar, había pensado en resistir, pero ante la poderosa maquinaria de la autoridad, Liu se sentía como un insecto atrapado en la tela de una araña: cuanto más luchaba, más se hundía en la desesperación.\n\nHasta hoy, cuando Liu descubrió que su cuenta de Weibo había sido desbloqueada inesperadamente. Sin notificación, sin explicación; al igual que cuando fue baneado, ocurrió de forma abrupta y envuelta en misterio. Liu no sabía qué significaba. ¿Debería estar agradecido? ¿O estaban preparándole una trampa para que cometiera el mismo error de nuevo? Tras dudar durante mucho tiempo, finalmente reunió el valor para iniciar sesión. La interfaz familiar ahora desprendía una extraña sensación de desapego, como si perteneciera a otra vida. Sus seguidores eran pocos, y todas sus huellas anteriores habían sido borradas, dejando solo un vacío en blanco.\n\nAbrió el editor de publicaciones. Sus dedos flotaban sobre el teclado, pero no se atrevía a escribir. Tras un largo periodo de reflexión, finalmente empezó a teclear. Sus pensamientos no expresados lentamente se cristalizaron en palabras: \"La noche me ha dado ojos oscuros...\""
 china.401.a: "\"Pero los uso para buscar la luz.\""
 china.402.t: "Desencadenado"
 china.402.d: "Zhong Chongtao echó un vistazo alrededor del salón de conferencias. Durante años, se había movido hábilmente entre los mundos político y empresarial, tejiendo una compleja red de conexiones. Ser delegado en el Congreso Popular era solo un nodo importante en esta red, y las reuniones anuales del Comité Permanente del PC de Dongguan se sentían más como una formalidad. Todo siempre se había decidido mucho antes de cualquier discusión oficial. Sin embargo, algo en la sesión de este año parecía inusual. Sentado en diagonal detrás de Zhong estaba un joven representante recién elegido: Jiang Shiyuan. Su idealismo contrastaba fuertemente con las expresiones cansadas de los delegados mayores en la sala.\n\nLa reunión avanzó a la fase de votación. El presentador en el podio leyó la propuesta:\n\n\"...Sobre la Optimización de la Ordenanza del Entorno Empresarial de Dongguan...\"\n\n\"Todos los que estén a favor, por favor levanten la mano.\"\n\nEl sonido de manos alzándose al unísono resonó por la sala. A pesar del consenso preestablecido para aprobar la propuesta, Zhong -que era dueño de una fábrica- sabía que esta política solo reduciría sus beneficios. Aun así, por las apariencias, levantó la mano a regañadientes. Al mirar de reojo, notó a Jiang Shiyuan frunciendo el ceño mientras miraba el documento en su mano, sus dedos tamborileando suavemente sobre la mesa como si estuviera sumido en sus pensamientos.\n\n\"Todos los que estén en contra, por favor levanten la mano.\"\n\nSilencio.\n\nEntonces, lentamente, Jiang levantó la mano derecha. La sala estalló en caos. Choque, confusión, desprecio y curiosidad se mezclaron en las miradas dirigidas a Jiang.\n\nZhong se quedó sorprendido al principio, pero luego una sensación de satisfacción brotó en su interior."
 china.402.a: "Parece que tendremos que repasarlo todo de nuevo."
 china.403.t: "Primera votación"
 china.403.d: "Zou Yubing avanzaba por la acera abarrotada. Hoy era el día de las elecciones municipales en la ciudad de Taiyuan. Los eslóganes pegados a lo largo de las calles y los mensajes de campaña que sonaban por los altavoces recordaban constantemente la importancia del día, aunque nada de eso le importaba a Zou. Solo quería llegar al colegio electoral más cercano, completar lo que consideraba un ritual sin sentido y luego volver a casa para disfrutar de los fideos que su esposa estaría cocinando.\n\nAl detenerse en un cruce, miró a su alrededor sin rumbo fijo. Al otro lado de la calle, un grupo de voluntarios mayores con chalecos rojos repartían folletos con entusiasmo a los transeúntes.\n\nCuando el semáforo se puso en verde, Zou cruzó rápidamente y llegó a la entrada de su urbanización, donde se había instalado un improvisado colegio electoral. Varias mesas estaban unidas de forma desordenada bajo una pequeña carpa, con urnas y papeletas de votación. Varios miembros del personal estaban sentados detrás de las mesas, mostrando un aburrimiento palpable.\n\nZou se acercó a la carpa, sacó su DNI del bolsillo y se lo entregó a uno de los trabajadores. Este apenas lo miró antes de preguntar, sin levantar la vista, \"¿Por quién vas a votar?\"\n\nZou tomó una papeleta y echó un vistazo a los nombres de los candidatos, rostros que nunca había visto antes. Además de sus nombres y breves currículos, había una lista de líneas políticas, una novedad respecto a elecciones anteriores. Sin mucho interés, marcó un nombre al azar, metió la papeleta en la urna y se dispuso a marcharse. Todo el proceso le pareció como tachar una tarea trivial.\n\nAl salir del colegio electoral, Zou exhaló profundamente, sintiendo que se le quitaba un peso de encima. Miró al cielo gris y pensó para sí mismo. No importaba quién ganara; esos funcionarios, fueran quienes fueran, solo servían a sus propios intereses. ¿Por qué iban a preocuparse realmente por la vida de la gente común?\n\nCon ese pensamiento rondando en su mente, Zou aceleró el paso, dirigiéndose a casa."
 china.403.a: "Parece que la mayoría aún no ha comprendido la esencia de la democracia."
 china.404.t: "Medios descongelados"
 china.404.d: "En el dormitorio masculino de la Universidad de Tecnología de Henan, Chen Fanwei de repente se incorporó en la cama, frotándose los ojos somnolientos. La habitación estaba vacía, y la luz brillante del sol que entraba le recordaba que ya era tarde.\n\n\"¡Maldita sea, otra vez he dormido de más!\" murmuró, agarrando rápidamente su teléfono. Eran las 11:38. Recordó que esa mañana tenía clase de Moral y Derecho.\n\n\"Bah, las clases del profesor son aburridas de todas formas\", se encogió de hombros, intentando consolarse. Abrió una aplicación de vídeos para relajarse con unos clips, pero enseguida se quedó paralizado.\n\nLas recomendaciones habituales eran diferentes hoy: vídeos de creadores bloqueados en China aparecían ahora en su feed. Contenido que normalmente sólo se encontraba en plataformas como YouTube estaba de repente accesible.\n\nEntonces vio una cara familiar: Wang Zhian, un periodista que siempre veía en YouTube. Chen Fanwei jadeó, con la mente acelerada."
 china.404.a: "\"¿Sigo en China?\""
 china.405.t: "De vuelta a 1989"
 china.405.d: "Pekín, Parque Zhongshan. Una vigilia a la luz de las velas ha transportado la mente de la gente de vuelta a 1989. Los miembros del movimiento \"Madres de Tiananmen\", que han estado bajo estricta vigilancia y prohibidos de participar en actividades públicas durante mucho tiempo, han reaparecido. Celebraron la primera conmemoración en el continente de las víctimas del Incidente del Cuatro de Junio en más de treinta años, en el mismo corazón de China, a solo una pared de la Ciudad Prohibida y a un paso de la Avenida Chang'an, por donde una vez pasaron rugiendo los tanques. La antigua profesora Ding Zilin, desaparecida durante mucho tiempo, pronunció un discurso, describiendo la velada como un momento histórico y expresando su convicción de que el futuro de China verá un mayor reconocimiento de las víctimas de 1989.\n\nSin la aprobación tácita del gobierno, habría sido imposible para el movimiento celebrar un evento así. Aunque los periódicos oficiales, los canales de noticias y las plataformas de redes sociales guardaron silencio, los vídeos de la vigilia a la luz de las velas se difundieron rápidamente a través de grabaciones ciudadanas, causando un gran revuelo público. Varias personas expresaron sus opiniones; los medios autodenominados \"patrióticos\" criticaron duramente el evento, denunciándolo como una \"autodestrucción\" ideológica. Sin embargo, un número mayor de personas comunes mostró un apoyo tolerante y cauteloso. Ha pasado suficiente tiempo desde las turbulencias de 1989 para que varias generaciones hayan crecido, y muchos creen que, en lugar de seguir evitando el tema, sería mejor abordarlo con una actitud abierta, lo que podría ser en realidad la mejor manera de resolver los agravios históricos."
 china.405.a: "Hablando de eso, ¿dónde está ahora el \"Hombre del Tanque\"?"
 china.406.t: "Colapso inminente del gobierno"
 china.406.d: "Informe de Evaluación sobre el Estado Actual de la Eficiencia Administrativa de Pekín:\n\nInvestigaciones recientes indican problemas significativos de eficiencia dentro del marco administrativo de Pekín. Existen amplias superposiciones en las responsabilidades departamentales, lo que resulta en una supervisión fragmentada y frecuentes transferencias de responsabilidades. Incluso los trámites de aprobación más sencillos pueden requerir desplazamientos entre múltiples agencias. En promedio, un proyecto de tamaño medio debe pasar por revisiones de más de siete departamentos, tomando entre tres y seis meses para completarse.\n\nA pesar de contar con un personal numeroso, hay escasez de personal capacitado para manejar las tareas centrales. Las encuestas muestran que más del 30% de los empleados en oficinas de primera línea necesitan mejorar sus habilidades laborales. Se dedica una energía excesiva a reuniones internas y circulación de documentos, dejando insuficiente atención a los servicios directos al público. El flujo de información entre los diferentes niveles es ineficiente, con instrucciones propensas a distorsionarse o malinterpretarse al pasar por múltiples capas.\n\nA menos que la reubicación de los departamentos administrativos avance de manera oportuna, no solo se ralentizarán los esfuerzos de construcción en la Nueva Área de Xiong'an, sino que también se agravará la disminución de la eficiencia administrativa de Pekín, creando un círculo vicioso: las crecientes presiones urbanas reducen aún más la eficiencia, mientras que la baja eficiencia, a su vez, dificulta el proceso de reubicación. Una vez que esta situación se afiance, obstaculizará tanto la optimización de las funciones de la capital como la estrategia más amplia de integración Pekín-Tianjin-Hebei, con impactos negativos de gran alcance."
 china.406.a: "Tenemos que solucionar este problema lo antes posible..."
 china.407.t: "Nuevo sistema, nueva política"
 china.407.d: "Xinhua News, Guiyang (Reportera Jiang Qiaoling) - En los últimos años, con el rápido desarrollo de la tecnología de la información, los sistemas digitales de reporte crediticio han surgido como una novedosa herramienta reguladora, entrando gradualmente en la esfera pública. Estos sistemas están desempeñando un papel cada vez más importante para ayudar a los Gobiernos de todos los niveles a supervisar los datos de gasto en tiempo real, mejorar la transparencia fiscal y combatir la corrupción. Los esfuerzos tradicionales contra la corrupción suelen basarse en denuncias y auditorías, que tienden a ser lentas y pasivas. En contraste, los sistemas digitales de reporte crediticio ofrecen nuevos enfoques y herramientas para la lucha contra la corrupción.\n\nLa ciudad de Guiyang ha establecido una plataforma digital de crédito a nivel municipal integrando datos de los departamentos bancarios, fiscales y comerciales, que cubre todas las agencias gubernamentales municipales y empresas públicas. Esta plataforma recopila y analiza en tiempo real los datos de transacciones financieras de las entidades y personas relevantes. Cuando se detectan transacciones anómalas, el sistema emite alertas automáticamente, lo que impulsa a las autoridades disciplinarias y de supervisión a intervenir. Además de ser una herramienta poderosa contra la corrupción, el sistema digital de crédito es un medio fundamental para mejorar la credibilidad del Gobierno. El Gobierno de Guiyang ha incorporado todos los datos de ingresos y gastos fiscales en la plataforma y divulga esta información regularmente al público. A través de aplicaciones móviles y sitios web, los ciudadanos pueden acceder a información sobre la ejecución presupuestaria de los departamentos y el uso de fondos de proyectos, logrando unas \"finanzas transparentes\".\n\n\"Ahora el público puede ver claramente a dónde van los fondos del Gobierno, por lo que nosotros, como gestores financieros, debemos actuar con aún mayor cautela\", declaró Guan Lu, director de la Oficina de Finanzas."
 china.407.a: "Un paso más cerca de un Gobierno transparente."
 china.408.t: "Ciberseguridad en la Nueva Era"
 china.408.d: "Southern Daily News (Reportera: Wang Zhaofu) - En los últimos años, con el rápido desarrollo de internet, los problemas de ciberseguridad se han vuelto cada vez más evidentes, ya que los incidentes de fraude en línea y filtración de información personal surgen con frecuencia, representando graves amenazas para la seguridad financiera y los derechos legales de los ciudadanos. Para salvaguardar eficazmente la ciberseguridad y proteger la información personal de los ciudadanos, China ha intensificado las iniciativas de ciberseguridad y ha avanzado en el desarrollo de un sistema de crédito digital, logrando resultados notables.\n\n\"Estamos luchando contra diversos ciberataques todos los días\", dijo Lin Xingchen, jefe del Centro de Datos de Ciberseguridad. \"En los últimos años, hemos aumentado continuamente nuestra vigilancia e interceptación de amenazas de ciberseguridad como sitios web de phishing, malware y ataques de red, bloqueando millones de mensajes dañinos diariamente y frenando eficazmente los incidentes de ciberseguridad\". Según las estadísticas, sólo en la primera mitad de este año, el Centro Nacional de Datos de Ciberseguridad interceptó más de 100.000 sitios web de phishing y gestionó cientos de miles de incidentes de ciberseguridad.\n\n\"¡Gracias a la aplicación de verificación digital, no caí en la estafa!\" compartió la señora Wang de Panyu, Guangzhou, con la reportera. Recientemente, la señora Wang recibió una llamada de un número desconocido, donde el interlocutor afirmaba ser del \"departamento de seguridad pública\", alegando que ella estaba involucrada en un caso de blanqueo de dinero y que debía transferir sus fondos bancarios a una \"cuenta segura\" para la investigación. \"Me asusté y casi les creí\", recordó la señora Wang. \"Por suerte, había descargado previamente la nueva aplicación antifraude, que me ayudó a colgar inmediatamente y conectar con el 110, salvándome de una pérdida económica\"."
 china.408.a: "¿Has descargado la app?"
 china.409.t: "Una nueva página de la historia"
 china.409.d: "Wang Haidong se apoyaba contra una pared de hormigón, con un cigarrillo Yuxi colgando de sus labios, el último del mes. El humo ascendía lentamente bajo la luz del sol, mezclándose con la niebla que se posaba sobre el horizonte lejano de rascacielos. Su mirada se posaba en las grúas que proyectaban largas sombras a la luz de la mañana, pareciendo los esqueletos de bestias prehistóricas que se reensamblaban en una ciudad futurista sobre esta llanura. Recordaba la arquitectura constructivista y los diseños de Vkhutemas que había estudiado en sus libros universitarios, esos bocetos futuristas que una vez le fascinaron. Quizás en unos años, cuando los visitantes estén en esta tierra y miren hacia arriba, contemplarán diseños mucho más impresionantes que los de los libros.\n\nHace dos días, había recibido una invitación de su alma mater, pidiéndole que regresara para compartir sus experiencias con los estudiantes más jóvenes. Quería decirles que el futuro no es solo una idea abstracta en los libros, sino que se construye con las manos de cada trabajador. Ver cómo un edificio crece cada día, sabiendo que has participado en su creación, aporta una sensación de realización que ninguna teoría puede igualar.\n\nDando una última calada a su cigarrillo, Wang lo apagó cuidadosamente en la esquina de la pared. Mientras se ajustaba su casco de seguridad desgastado, una visión cruzó su mente: dentro de años, de pie en lo alto de un rascacielos con su hijo, mirando la ciudad. Señalaría un rincón del horizonte y diría: \"Mira, ese edificio de allí es el que tu padre ayudó a construir.\"\n\nPara entonces, Xiong'an sería una ciudad que asombraría al mundo, un testimonio de los sueños y el sudor de cientos de miles de constructores como él."
 china.409.a: "Son los primeros habitantes de la ciudad y sus creadores más comunes pero también los más grandes."
 china.410.t: "Llamamiento del Ministro de Asuntos Civiles"
 china.410.d: "Como parte de la implementación de decisiones centrales importantes y del avance en la construcción de la Nueva Área de Xiong'an, el Ministro de Asuntos Civiles, Tang Dengjie, ha publicado un artículo firmado de gran relevancia. En el artículo se destaca que, a medida que las funciones de Pekín continúan expandiéndose, los costes operativos de las instituciones gubernamentales han ido en aumento y la eficiencia administrativa necesita urgentemente mejoras. Según estadísticas relevantes, aproximadamente el 40 % de los recursos administrativos se consumen actualmente en las operaciones internas de las instituciones.\n\nEn respuesta, el Comité Central celebró una reunión especial para tratar el asunto, en la que algunos miembros del Comité Permanente ofrecieron sugerencias adicionales sobre el calendario para la reubicación. Posteriormente, Xi emitió una directiva importante, subrayando la necesidad de avanzar con determinación en las reformas y apoyar a la Nueva Área de Xiong'an para que asuma mayores responsabilidades nacionales.\n\nEn línea con los requisitos de la nueva era, el Ministro Tang propuso trasladar la mayoría de las funciones gubernamentales centrales a Xiong'an. Como pilar clave del diseño estratégico nacional, Xiong'an abarca una superficie planificada de 2.000 kilómetros cuadrados y está promoviendo plenamente innovaciones en la gobernanza digital. Se espera que la racionalización institucional en la zona pueda reducir el personal administrativo en un 30 %.\n\nLos resultados hablan por sí mismos: los logros de Xiong'an en el desarrollo de ciudades inteligentes han sido notables. En esta ciudad verde, baja en carbono y modernizada, el nuevo sistema de gobernanza está llamado a establecer un modelo pionero de administración ágil y eficiente."
 china.410.a: "Apoyar resueltamente el avance de las iniciativas de reforma."
 china.411.t: "Carta del Ministro de Vivienda y Desarrollo Urbano-Rural"
 china.411.d: "Para: Ministro Tang,\n\nHe revisado su propuesta sobre la reubicación de la capital a la Nueva Área de Xiong'an como medio para aliviar las actuales presiones administrativas de Pekín. Estoy completamente de acuerdo con sus sugerencias y expreso mi firme apoyo.\n\nLa construcción de la Nueva Área de Xiong'an es una visión milenaria y un asunto de importancia nacional. Representa una decisión histórica y estratégica importante tomada por el Comité Central del Partido con el presidente Xi en su núcleo. Trasladar la capital a Xiong'an es una medida clave para aliviar las presiones administrativas en Pekín, promover el desarrollo coordinado en la región de Pekín-Tianjin-Hebei, optimizar la distribución del desarrollo nacional y establecer un modelo de desarrollo de alta calidad en la nueva era.\n\nPara avanzar aún más en la construcción de la Nueva Área de Xiong'an, especialmente en términos de inversión financiera, me gustaría ofrecer algunas sugerencias adicionales. Desde su creación, la construcción de Xiong'an se ha adherido a los principios de \"visión global, estándares internacionales, características chinas y posicionamiento de alto nivel\", y ha logrado un progreso notable. El marco básico de infraestructura ha tomado forma, la calidad ecológica sigue mejorando, se han implementado proyectos emblemáticos y la apariencia de la nueva ciudad está cambiando rápidamente.\n\nSin embargo, en comparación con Pekín, Xiong'an todavía está en sus primeras etapas de desarrollo. Para cumplir con su misión histórica, es necesaria una inversión financiera sostenida, especialmente para proyectos estratégicos a gran escala que requieren garantías de financiación suficientes."
 china.411.a: "Ni Hong, Ministro de Vivienda y Desarrollo Urbano-Rural."
 china.412.t: "Ceremonia de finalización de la construcción de Xiong'an"
 china.412.d: "Xi se encontraba en lo alto de la gran plataforma de observación, contemplando la reluciente ciudad recién construida. A la luz de la mañana, las torres brillaban con el resplandor de la tecnología moderna. Apenas 20 minutos antes, había llegado silenciosa y rápidamente en tren de levitación magnética desde Pekín, viendo cómo el paisaje se desdibujaba tras la ventana, con el corazón lleno de un orgullo y una anticipación inquebrantables.\nEsta ciudad llevaba consigo enormes expectativas. Aún recordaba haber visitado este lugar hace más de una década, cuando no era más que un terreno baldío. Pero hoy, todo se había transformado. Colocó suavemente la mano sobre el podio, recordando un paseo años atrás junto al lago Yuyuantan, donde por primera vez le surgió la inspiración de construir una nueva zona en esta misma tierra. Lo que entonces era solo una idea, ahora se había convertido en realidad.\nDelante de él estaban representantes de todos los ámbitos de la vida, con los ojos llenos de esperanza y expectación. Xi respiró hondo y comenzó su discurso: \"Hoy es un momento histórico. Hace 40 años, Shenzhen mostró al mundo la velocidad de China. Hoy, Xiong'an mostrará la sabiduría de China. Esto no es solo una ciudad, es un símbolo del Gran Rejuvenecimiento de la nación china. Aquí crearemos un nuevo modelo para la civilización humana\". Los aplausos estallaron como una ola gigante.\nMiró a su alrededor, a la multitud reunida. Esta ciudad encarnaba sus años de aspiraciones: un sistema administrativo eficiente, un marco industrial impulsado por la innovación, un diseño urbano inteligente y bajo en carbono... Todos los presentes entendían que hoy no era solo una ceremonia de finalización, sino el comienzo de una gran nueva era.\nLa luz del sol bañaba esta tierra de esperanza, donde una visión milenaria estaba despegando. Mientras Xi contemplaba esta ciudad, la realización del sueño del rejuvenecimiento nacional, sus ojos eran firmes y llenos de visión."
 china.412.a: "Visión Milenaria, Prosperidad Nacional."
 china.413.t: "Informe de finalización de la construcción de Xiong'an"
 china.413.d: "Respetado secretario general,\n\nLa construcción de Xiong'an ha logrado un progreso significativo. El marco de la ciudad inteligente ya está plenamente establecido, y el Centro de Big Data permite la gestión integral de todas las funciones urbanas. Xiong'an se ha convertido en la primera ciudad moderna del mundo en implementar una gobernanza de big data a gran escala. Bajo su sabio liderazgo, Xiong'an ha absorbido con éxito el 80% de las funciones de Pekín. La población permanente ha alcanzado los 6 millones, de los cuales más del 30% son profesionales científicos y tecnológicos. Además, el 90% de las empresas de Zhongguancun han establecido sedes y centros de I+D en Xiong'an.\n\nEn términos de desarrollo ecológico, la calidad del agua del lago Baiyangdian se encuentra en su mejor momento en 50 años, y la cobertura forestal ha superado el 45%. La red de energía inteligente ha reducido las emisiones de carbono en la zona en un 66% en comparación con los niveles planificados. Los servicios públicos, como la educación y la sanidad, ahora ofrecen cobertura universal, y el índice de felicidad de los residentes se encuentra entre los más altos del país.\n\nEl \"modelo Xiong'an\" se ha convertido en un referente para la gobernanza urbana innovadora. Al integrar las funciones departamentales mediante la plataforma de big data, la racionalización institucional ha reducido la dotación de personal en un 30% y los costos administrativos en un 50%. Esta exitosa experiencia se está promoviendo a nivel nacional. Estos logros demuestran la acertada y visionaria estrategia de su \"Visión del Milenio\"."
 china.413.a: "Zhang Guohua, Director del Comité de Gestión de la Nueva Área de Xiong'an."
 china.414.t: "Informe de Finalización de la Mudanza de la Burocracia"
 china.414.d: "Respetado Presidente Xi,\n\nMe complace informar que la reubicación a gran escala de las agencias del gobierno central se ha completado con éxito. Tras años de preparación, más del 81% de los ministerios y comisiones se han trasladado a Xiong'an, y los departamentos restantes están finalizando sus transiciones. El nuevo centro administrativo adopta un modelo de gobernanza simplificado, con estructuras institucionales reducidas en un 29% en comparación con el marco original.\n\nDurante el proceso de reubicación, implementamos estrictamente las \"Cuatro Transformaciones\" que usted propuso: la transición de una gestión jerárquica a una gobernanza plana, de oficinas dispersas a operaciones centralizadas, del papeleo tradicional a sistemas de oficina inteligentes, y de departamentos con funciones únicas a departamentos multifuncionales. Cabe destacar que la introducción de sistemas de oficina inteligentes ha duplicado la eficiencia en la aprobación.\n\nEn línea con el principio de prioridad ecológica, la Nueva Área cuenta con instalaciones culturales como academias y galerías de arte. El Jardín Guanyuan, a orillas de Baiyangdian, se ha convertido en un espacio importante para que los cuadros descansen y reflexionen. Además, más de 2.000 empresas públicas e instituciones públicas se han establecido en parques industriales de apoyo.\n\nJunto con la reubicación institucional, las industrias y el personal originales han hecho una transición fluida. Este esfuerzo no ha sido simplemente un traslado físico, sino una reforma integral de los modelos de gobernanza."
 china.414.a: "Zheng Shanjie, Director de la Comisión Nacional de Desarrollo y Reforma"
 china.415.t: "El traslado histórico de la capital de China a Xiong'an"
 china.415.d: "Bajo la atención global, China ha completado un ambicioso proyecto histórico: trasladar su capital a Xiong'an. Tras más de una década de construcción, Xiong'an ha emergido como un impresionante ejemplo de desarrollo urbano moderno.\n\nLa nueva capital emplea un modelo de gobernanza simplificado, mejorando significativamente la eficiencia administrativa mediante tecnologías de big data. Cabe destacar que esta nueva ciudad incorpora numerosos conceptos innovadores en su planificación y construcción. Desde iniciativas verdes y bajas en carbono hasta tecnologías de ciudad inteligente, desde la preservación cultural hasta la innovación tecnológica, Xiong'an está escribiendo un nuevo capítulo en el desarrollo urbano humano. El Jardín Guanyuan junto al lago Baiyangdian, apodado el \"Versalles Oriental\", muestra su singular encanto cultural.\n\nLos medios internacionales han calificado este traslado como \"un proyecto emblemático que marca el avance de una nación hacia una nueva era\". No solo demuestra las capacidades de infraestructura de China, sino que también refleja la visión de largo alcance del liderazgo de esta potencia oriental para el futuro."
 china.415.a: "El auge de una nueva capital: cambio de poder en Oriente."
 china.416.t: "Informe de investigación sobre la explotación de los activos estatales por parte del capital burocrático"
 china.416.d: "Administración Estatal para la Regulación del Mercado\n\nPara: Buró Político del Comité Central del PCCh\n\nEl monitoreo rutinario y el análisis de datos del sistema de divulgación de información empresarial han revelado que algunos empresarios con vínculos burocráticos explotan el poder y las conexiones familiares. A través de maniobras complejas de acciones y transacciones entre empresas afiliadas, han estatizado vastos activos estatales, socavando gravemente los intereses nacionales y la equidad social. Se ha llevado a cabo una investigación especial, con los siguientes hallazgos:\n\n1. Algunos funcionarios del gobierno local explotan sus cargos para favorecer a determinadas empresas en transacciones de terrenos, aprobaciones de proyectos y reducciones fiscales. Algunos intervienen directamente en la reestructuración de empresas públicas, transfiriendo activos estatales a precios infravalorados a entidades relacionadas.\n\n2. Existen transacciones significativas entre empresas públicas y compañías privadas vinculadas a figuras burocráticas. A través de costos inflados y precios suprimidos, los activos estatales se canalizan hacia manos privadas.\n\n3. Empresarios con conexiones burocráticas aprovechan las redes familiares para monopolizar recursos industriales y acumular enormes beneficios."
 china.416.a: "Una economía sin control erosiona la gobernanza."
 china.417.t: "Informe de investigación sobre la explotación de los activos estatales por parte del capital burocrático"
 china.417.d: "Desde su lanzamiento en 2016, el Proyecto de Tránsito Ferroviario de Liuzhou ha avanzado lentamente y aún no ha comenzado a operar. Recientemente, un empresario de Guangxi mostró interés en invertir capital en el proyecto para revitalizarlo.\n\nSe informa que este empresario tiene fuertes conexiones tanto en círculos políticos como empresariales locales, con familiares que ocupan puestos clave en departamentos gubernamentales. Aprovechando sus excelentes habilidades de comunicación y una amplia red de contactos, el empresario rápidamente ganó el favor del comité de evaluación."
 china.417.a: "Aprobado."
 china.417.b: "No malgastes dinero en esto."
 china.418.t: "Los emprendedores buscan invertir en Tianjin"
 china.418.d: "El Goldin Finance 117, también conocido como la Torre Tianjin Goldin 117, está ubicado en el distrito de Xiqing, Tianjin, China. Con una altura estructural de 597 metros, es la segunda estructura más alta del mundo después del Burj Khalifa y la estructura más alta de China. Sin embargo, desde 2015, el proyecto ha sufrido paradas repetidas debido a la falta de financiación, causada por el desplome bursátil de su principal inversor, Goldin Group. Recientemente, un empresario de Tianjin ha mostrado interés en inyectar capital para reactivar el proyecto.\n\nSe informa que este empresario tiene fuertes vínculos tanto en círculos políticos como empresariales locales, con familiares que ocupan puestos clave en instituciones gubernamentales y militares. Sus excelentes habilidades de comunicación y sus amplias conexiones sociales le han ganado la confianza del comité de evaluación."
 china.418.a: "Aprobado."
 china.418.b: "No malgastes dinero en esto."
 china.419.t: "Los emprendedores buscan invertir en Chengdu"
 china.419.d: "El Shu Peak 468 es el edificio principal del Proyecto Greenland 468, desarrollado por Greenland Group en el distrito de Jinjiang, Chengdu. Con una altura planificada de 468 metros, originalmente se pretendía que fuera el edificio más alto de Chengdu. La ceremonia de inauguración se celebró a finales de julio de 2012 y, aunque las secciones residenciales y comerciales del podio se han completado, la torre principal ha avanzado lentamente, deteniéndose con frecuencia a pesar de los anuncios de reanudación de la construcción. Recientemente, un empresario de Chengdu ha mostrado interés en invertir en el proyecto para aportar nueva energía.\n\nSe informa que este empresario tiene fuertes conexiones tanto en círculos políticos como empresariales locales, con familiares que ocupan puestos clave en el gobierno. Aprovechando sus excelentes habilidades de comunicación y una amplia red social, el empresario rápidamente ganó el favor del comité de evaluación."
 china.419.a: "Aprobado."
 china.419.b: "No malgastes dinero en esto."
 china.420.t: "Emprendedores buscan invertir en Ordos"
 china.420.d: "Desde la creación del Parque Industrial Ordos-Jiangsu en 2012, se han invertido aproximadamente 1.700 millones de yuanes en reservas de terreno, infraestructuras y otros desarrollos, cubriendo un área de 8 kilómetros cuadrados, que ahora está lista para ser ocupada. Sin embargo, el parque solo ha atraído a 11 empresas, de las cuales tres han cesado su producción. El plan inicial implicaba una cooperación entre Jiangsu y Mongolia Interior, con Jiangsu introduciendo proyectos de transferencia industrial y Mongolia Interior ofreciendo recursos de carbón y construyendo canales de transmisión de energía de ultra alta tensión a cambio. Sin embargo, debido a un mercado del carbón débil, el progreso de estos proyectos se estancó después de 2013. Recientemente, un empresario de Suzhou ha mostrado interés en revitalizar el parque con una nueva inversión.\n\nSe informa que este empresario tiene fuertes conexiones tanto en los círculos políticos como empresariales de Jiangsu y Mongolia Interior, con familiares que ocupan puestos clave en departamentos gubernamentales. Aprovechando sus excelentes habilidades de comunicación y una amplia red social, el empresario rápidamente ganó el favor del comité de evaluación."
 china.420.a: "Aprobado."
 china.420.b: "No malgastes dinero en esto."
 china.421.t: "Emprendedores buscan invertir en Tangshan"
 china.421.d: "Situada en el lado occidental de la bahía de Bohai, bajo la jurisdicción de Tangshan, una ciudad económica importante en la provincia de Hebei, la Zona Industrial de Caofeidian abarca 380 kilómetros cuadrados. Desde que comenzó su desarrollo en 2003, el proyecto ha recuperado más de 230 kilómetros cuadrados de tierra al mar, con una inversión total de más de 300 mil millones de yuanes. En su apogeo, fue llamada \"el mayor sitio de construcción único de China\" y una zona nacional de demostración de economía circular. Sin embargo, las cuatro industrias pilares previstas no se materializaron, y la enorme inversión inicial en infraestructuras ha provocado una crisis de pago de deudas. Recientemente, un empresario de Pekín mostró interés en invertir en el proyecto para revivirlo.\n\nSe informa que este empresario tiene fuertes conexiones tanto en círculos políticos como empresariales locales, con familiares que ocupan puestos clave en departamentos gubernamentales. Aprovechando sus excelentes habilidades de comunicación y una amplia red social, el empresario rápidamente ganó el favor del comité de evaluación."
 china.421.a: "Aprobado."
 china.421.b: "No malgastes dinero en esto."
 china.422.t: "Reclamando lo que corresponde"
 china.422.d: "Ya eran las cuatro de la tarde cuando el viejo Zhang arrastró sus pies cansados hasta la Oficina de Trabajo. Sosteniendo su nómina de hace cinco meses, se preguntaba a dónde lo enviarían esta vez.\n\nDesde \"el incidente\", los salarios de cinco meses habían desaparecido como humo. Antes, en el Equipo de Inspección Laboral, los funcionarios uniformados apenas le prestaban atención. \"Para su caso, primero mediación, luego arbitraje, y después demanda\", decían sin levantar la vista. \"El proceso tarda al menos medio año\". Pero hoy era diferente.\n\nLa recepción lo llevó rápidamente a la sala de mediación. \"Por favor, tome asiento\". El joven funcionario nuevo sacó un cuaderno y anotó todo cuidadosamente. \"Las políticas han cambiado. Lo resolveremos de inmediato\". Cogió el teléfono y llamó directamente al contratista. Zhang se quedó atónito; el año pasado, cuando su compañero Li intentó reclamar su salario, las cosas no eran así.\n\n\"El contratista dice que no tiene dinero, ¿qué podemos hacer?\" dijo Zhang en voz baja. El joven funcionario estudió los documentos con atención: \"No se preocupe, señor. Los salarios se ganan con el sudor y la sangre de los trabajadores, no hay excusa para retenerlos\". Tres días después, se pagaron todos los salarios atrasados. Se decía que el nuevo jefe de la oficina se había quedado hasta tarde presionando al jefe, diciendo algo sobre \"tolerancia cero bajo las nuevas regulaciones\". Las manos de Zhang temblaban al recibir el dinero.\n\n\"Ahora las cosas están mucho mejor\", comentó Li, del sitio de construcción vecino. \"He oído que cambiaron a la dirección, todos esos funcionarios laborales arrogantes fueron trasladados\". Zhang no dijo nada, solo miraba los salarios en sus manos. Recordaba que el año pasado sus compañeros ni siquiera podían pasar por la puerta principal.\n\n\"Las cosas han cambiado, realmente han cambiado\", murmuró el viejo Zhang para sí mismo. El cielo igual, la tierra igual, pero algo era diferente ahora."
 china.422.a: "Aunque la justicia duerma, nunca muere."
 china.423.t: "¡Por fin, ha llegado nuestro día!"
 china.423.d: "Zhang Hongliang estaba sentado en su escritorio, escribiendo un nuevo artículo para su canal de WeChat.\n\n\"¡Camaradas!\" escribió, \"¡La nación china finalmente ha llegado a este día! Mirad estos meses: cuántos parásitos han sido eliminados, cuántos héroes han surgido. ¿Dónde se esconden ahora esos arrogantes compradors?\" Sus manos temblaban de emoción. \"El liderazgo de la clase trabajadora ya no es un discurso vacío, las nuevas cooperativas han levantado a los campesinos. ¡Este es el triunfo de la civilización sinicizada!\"\n\n\"Recientemente visité mi pueblo natal\", continuó. \"Los campesinos decían: los cuadros realmente han cambiado, ya no hay aires burocráticos. ¿No es esta la victoria de la línea de masas? ¡Esos traidores que vendieron nuestro país serán barridos al cubo de la historia!\"\n\n\"Algunos me llaman radical\", hizo una pausa. \"Pero la historia demuestra que sólo el radicalismo puede salvar a China. ¿Fue Qin Shi Huang radical cuando unificó China? ¿Fue Li Zicheng radical en su levantamiento? ¡Este es el despertar del espíritu guerrero de nuestra nación! Cada nueva política ahora brilla con el espíritu heroico de nuestros antepasados\".\n\nA través de su ventana, la pancarta en la calle \"El pueblo es el amo\" destacaba con fuerza. El sindicato de la fábrica tenía un nuevo líder, un joven trabajador que instaló limitadores de altura en la plaza de aparcamiento del coche de lujo del jefe. \"¡Excelente!\" escribió Zhang en las redes sociales, \"Esta es nuestra tradición: héroes que se levantan por el pueblo\".\n\nEl sueño eludía a Zhang. A la 1 de la madrugada, finalmente terminó su artículo titulado \"La era de los héroes volverá\". Lágrimas brillaban en sus ojos. Después de tantos años, finalmente había visto este día."
 china.423.a: "La antigua gloria resurge de nuevo."
 china.424.t: "La alegría de un viejo erudito"
 china.424.d: "Fred Engst se sentó frente a su ordenador, con los ojos humedeciéndose mientras leía el último anuncio de la política. Los cambios en los últimos meses habían sido enormes. La Ley Laboral enmendada aprobada, la Ley de Sindicatos revisada: los trabajadores finalmente tenían una voz real. Recordando sus experiencias en fábricas americanas y chinas, no pudo evitar susurrar: \"Por fin... por fin...\"\n\nLos comentarios inundaban su retransmisión en directo en Bilibili. \"Profesor Yang, ¡nuestra fábrica acaba de establecer un Comité de Supervisión de Trabajadores!\" \"Profesor, ¡nuestra universidad está implementando realmente las nuevas políticas!\" Estos mensajes le trajeron recuerdos de su infancia en la Granja Caotan y de sus años como trabajador en Pekín.\n\n\"Cuando trabajaba en Estados Unidos, nunca imaginé que llegaría este día\", dijo a la cámara. \"Hace poco nos lamentábamos de lo difícil que era que los trabajadores migrantes cobraran. Pero mirad ahora: las cosas están mejorando de verdad.\" Terminó la retransmisión y contempló el campus de la Universidad de Negocios Internacionales y Economía. Los estudiantes participaban en debates apasionados fuera del edificio docente, recordándole los grandes debates de su juventud, cómo la verdad surge a través de la discusión.\n\nAquella noche, recibió un mensaje de un compañero de fábrica: los expertos técnicos se habían unido al comité de gestión y se estaba implementando la negociación colectiva de salarios. Su amigo dijo que se sentía como en los viejos tiempos, pero más científico. \"La creatividad de las masas es ilimitada\", respondió. \"Cuando la línea es correcta, la sabiduría del pueblo florece.\"\n\nFred dejó el teléfono con un largo suspiro de satisfacción. Sabía que esto no era el final, sino un nuevo comienzo. La historia no se había desviado de su camino y el pueblo no había sido olvidado."
 china.424.a: "Aunque las mareas cambien, nuestro camino sigue firme."
 china.425.t: "Crónicas de la Esquina"
 china.425.d: "El señor Li, un funcionario local en la oficina del barrio, ha estado abrumado de trabajo últimamente. Desde que entró en vigor la nueva política, su escritorio se ha llenado de solicitudes de registro de diversas asociaciones.\n\n\"Aquí tiene la carta fundacional de nuestro Grupo de Lectura de Trabajadores\" dice un joven con casco de seguridad entregando documentos. En la ventanilla de al lado, estudiantes universitarios discuten sobre su Nueva Sociedad La Jeunesse. Li hojea los papeles: en su mayoría, grupos de estudio marxista-leninistas convencionales. Nueva La Jeunesse, Asociación Cultural Obrero-Campesina, son normales. Pero algunos grupos marginales le hacen sonreír: la \"Alianza LXXSD\" que afirma que traducirán archivos OVNI del Pentágono al chino; un grupo estudiantil llamado \"Sociedad de Poesía Nómada\" que propone transformar la sociedad a través de la filosofía francesa; y una \"Sociedad de Clásicos Serica\" que llena su solicitud con teorías extrañas que mezclan mitología antigua con lucha de clases.\n\n\"No podemos aprobar estas, ¿verdad?\" se preocupa el joven Zhang, el nuevo empleado. Li sonríe y niega con la cabeza: \"¿Por qué no? Mientras sea legal. Que la juventud sea juventud\".\n\nEn la planta baja, los trabajadores ensayan una obra mientras los estudiantes preparan un grupo de lectura. En la cafetería de la esquina, algunos estudiantes con aire alternativo discuten sobre Laclau y la teoría radical de la identidad. Más lejos, en el centro cultural, un debate sobre justicia social está en pleno apogeo.\n\n\"Qué mucho mejor es esto que el silencio absoluto de antes\" suspira Li. \"Que discutan, que practiquen, que cometan errores. Esto es lo que debe ser la juventud.\n\nToma un sorbo de su té y sella la aprobación en la última solicitud."
 china.425.a: "Las voces ahora brotan, como pájaros al vuelo."
 china.426.t: "Historia detrás del anuncio de amnistía"
 china.426.d: "Tras los últimos ajustes en la política, el Comité Central de Amnistía emitió una proclamación concediendo indultos a un grupo de acusados históricos. Según el anuncio, los activistas que lucharon por la justicia social y los derechos de los trabajadores serían liberados por fases y se les restaurarían sus derechos políticos. La noticia desató un intenso debate en las redes sociales.\n\nEn la rueda de prensa, el portavoz del Comité declaró: \"Tras una cuidadosa consideración, hemos decidido reevaluar este periodo de la historia\".\n\nPosteriormente, el Tribunal Supremo anunció una revisión de los detenidos relevantes. El primer grupo de liberaciones incluyó a izquierdistas que se habían opuesto al lucro oficial y a la privatización. Cuando salieron de prisión, su cabello se había vuelto gris.\n\n\"Después de todos estos años, por fin ha llegado el día\", dijo uno de los liberados en una entrevista. Los informes indican que serán asignados a universidades y centros de pensamiento para participar en la investigación de políticas.\n\nAquella misma tarde, algunos izquierdistas liberados celebraron un simposio. Discutieron los cambios recientes: reformas sindicales, democratización empresarial y mayor participación popular. Todo parecía avanzar en la dirección que una vez persiguieron.\n\nLas autoridades pertinentes han establecido un grupo de trabajo especial para revisar de manera integral los asuntos históricos basándose en la búsqueda de la verdad a partir de los hechos. En cuanto a los casos de naturaleza diferente, el Comité indicó que se abordarán en la siguiente fase."
 china.426.a: "Sólo aquellos que estuvieron junto a los trabajadores y campesinos pueden regresar."
 china.426.b: "El perdón marca el comienzo de una nueva era."
 china.427.t: "El Regreso"
 china.427.d: "Cuando se abrieron chirriando las puertas de la prisión de Shenzhen, Yu salió para encontrar una multitud esperándole: sus antiguos compañeros de trabajo, algunos estudiantes universitarios y un grupo de personas con ropa de fábrica que no reconocía.\n\n\"¡Bienvenido de nuevo, camarada!\" La multitud estalló en aplausos. Yu se quedó paralizado; qué sensación de déjà vu. Hace años, estaban justo así fuera de la fábrica, luchando por su derecho a sindicalizarse. Pero entonces, en lugar de aplausos, les daban palizas.\n\n¿JasicTech? Ahora es \"Maquinaria del Pueblo\". Los trabajadores realmente forman parte del consejo, mientras que esos jefes taiwaneses arrogantes huyeron con el dinero, pero sus activos están bien bloqueados en China continental.\n\n\"Tu expediente ha sido limpiado\", le dijo el joven empleado entregándole unos papeles. \"El trabajo en la fábrica es tuyo si lo quieres. De hecho, incluso podrías presentarte para liderar el sindicato.\"\n\nCaminar por allí era como entrar en otra dimensión. Ya no había que andar escondiéndose con folletos; ahora había una auténtica exposición de innovación. En lugar de reglas de castigo, las paredes tenían notas sobre la negociación colectiva. El viejo Liu le contó cómo los trabajadores ahora tienen aire acondicionado en sus dormitorios, jornadas de ocho horas adecuadas y, ¿horas extra? Hay que firmarlas.\n\n\"¿Tiempos diferentes, eh?\" dijo alguien. No me digas. Al ver a los trabajadores en su taller, Yu finalmente esbozó una sonrisa."
 china.427.a: "Los trabajadores son para siempre, los jefes son temporales."
 china.428.t: "Brecha generacional"
 china.428.d: "El viejo Hua estaba sentado en su silla de ratán, leyendo un periódico con un titular en negrita: \"8 partidos aliados se unen oficialmente al círculo de toma de decisiones\". Frunció el ceño mientras sus ojos se detenían en palabras como \"poder de decisión\" y \"formas democráticas\".\n\nSu nieto Xiaoming estaba recogiendo sus cosas, diciendo: \"Abuelo, voy al Club de Filosofía, hoy un profesor habla sobre Lukács. Luego tengo una reunión en la Casa Arcoíris esta noche\".\n\nEl viejo Hua suspiró, \"Los jóvenes de hoy, siempre atrapados en estas ideas nuevas y sofisticadas...\"\n\n\"Ahora es diferente, abuelo. Mira, los sindicatos independientes participan en la legislación, y las minorías tienen voz\", dijo Xiaoming. \"Nuestra generación cree que la revolución ya no es solo cosa de los trabajadores, tenemos que considerar...\"\n\n\"En nuestra época\", interrumpió el viejo Hua, \"nos centramos en la lucha de clases real, nada de estas cosas\". Señaló el periódico, \"Ahora hasta los partidos aliados pueden unirse al círculo de toma de decisiones, ¿no es esto...\"\n\n\"Abuelo, la conciencia de clase no es algo que se imponga, se desarrolla en la vida diaria\", explicó Xiaoming con sinceridad. \"¿No es una señal de nuestra confianza que dejemos participar a todos los grupos?\"\n\nEl viejo Hua miró por la ventana. Abajo, en el centro cultural, los estudiantes ensayaban una obra, discutiendo la relación entre la ideología y la vida cotidiana. Estos nuevos conceptos se alzaban como un muro invisible entre él y el mundo moderno.\n\n\"Quizás\", dijo finalmente, \"los tiempos han cambiado\". Su voz llevaba un matiz de melancolía."
 china.428.a: "La misma luz de la patria, solo que floreciendo con un brillo diferente."
 china.429.t: "Debates en la familia Fang"
 china.429.d: "El profesor Fang estaba organizando sus preciadas revistas americanas de sociología en su estudio cuando una apasionada canción se coló por la ventana. Su nieto estaba publicando largos manifiestos en su teléfono: Mao dijo: Hay cosas grandes que en realidad no dan miedo.\n\n\"¿Qué estás publicando ahora?\" preguntó el profesor Fang.\n\n\"Mis compañeros de clase en la PKU han reconstruido la Sociedad Marxista. Estamos haciendo investigaciones en fábricas\" dijo el joven Fang con entusiasmo. \"¡Estamos restaurando a los trabajadores como los dueños de la sociedad!\"\n\nEl profesor mira una foto de su yo más joven visitando Gran Bretaña: \"Yo también soñaba con un cambio radical entonces, pero...\"\n\n\"¡Pero ahora los trabajadores se están levantando por sí mismos!\" interrumpió su nieto.\n\n\"Eres demasiado idealista\" dijo el profesor Fang. \"La reforma social necesita instituciones y Estado de derecho...\"\n\n\"¿Instituciones?\" rió el joven Fang. \"¿No son las instituciones creadas por las personas? La creatividad de las masas es fundamental\". Señaló los vídeos en su teléfono. \"¡Mira lo poderosos que son los trabajadores cuando se organizan!\"\n\nAl ver las multitudes que se agolpaban en el teléfono de su nieto, el viejo profesor sintió un atisbo de miedo. Esas escenas le resultaban a la vez familiares y extrañas, recordándole aquella época apasionada.\n\nMirando su estantería llena de obras sobre el libre mercado, el profesor guardó silencio. Todos sus escritos ahora eran vistos como conceptos anticuados por su propio nieto.\n\n\"Nuestra generación sabe más\" dijo su nieto mientras recogía su mochila. \"Los trabajadores han organizado grupos de estudio. Me dirijo allí\".\n\nFang negó con la cabeza. A través de la ventana, vio a los estudiantes marchando con pancartas. La luz de la lámpara parpadeaba sobre la superficie del lago Weiming. \"Ten cuidado\", fue todo lo que pudo decir."
 china.429.a: "La historia rima, pero nunca se repite."
 china.430.t: "Nadie se atreve a hablar"
 china.430.d: "El director Wang estaba encorvado en su oficina. La calefacción no funcionaba, así que se quedó abrigado con un abrigo acolchado. \"Puede que el fondo de vivienda se retrase otra vez\", murmuró con una sonrisa amarga, mirando la última notificación en las noticias. Desde aquella \"desastrosa retirada\", parecía que todo había cambiado.\n\nEl doctor Zhang no había cobrado en tres meses. Justo el otro día, Wang lo escuchó hablando con las enfermeras en urgencias: \"Quién sabe si siquiera recibiremos nuestras nóminas el mes que viene. Por favor, tengan paciencia con nosotros.\" Esto era inaudito en un hospital de primer nivel.\n\nAl otro lado de la calle, la mayoría de las tiendas habían cerrado. El local de fideos aguantó hasta ayer, pero ahora incluso ellos han puesto un cartel de \"cerrado temporalmente\". \"Esto no es temporal\", dijo el dueño con un suspiro. \"He gastado hasta el último céntimo de mis ahorros.\"\n\nCon su termo en mano, el director Wang se dirigió a casa. Estos días lleva su propia agua porque la cafetería cerró hoy.\n\nHace unos días, unos jóvenes comieron en la cafetería que pronto cerrará, hablando en voz baja sobre ese \"incidente\". Uno de ellos se enfadó tanto que golpeó la mesa con los palillos, murmurando entre dientes. Todos fingieron no oír.\n\nUn coche de policía circulaba lentamente por la calle, y los peatones se tensaron de inmediato. La semana pasada ocurrió algo desagradable en el centro, y desde entonces, los coches patrulla han hecho apariciones regulares.\n\nY luego estaban los bonos. ¿Aquellos que prometían un rendimiento anual del 3 %? Ahora la gente ni siquiera sabe si su capital sigue ahí. Los vecinos susurran entre ellos: \"¿Dónde se fue todo ese dinero?\" Wang escuchaba quejas todo el tiempo, pero nadie se atrevía a alzar la voz.\n\nNadie se atreve a hablar."
 china.430.a: "La gente suspira, porque los tiempos son difíciles."
 china.431.t: "Utopía"
 china.431.d: "Miramos atrás a las figuras antiguas: Jesús, Mahoma, el Buda, Shiva, esas deidades que una vez encendieron la antorcha de la iluminación humana, ahora reducidas a sombras fragmentadas en el río de la historia. Su resplandor una vez disipó la oscuridad, pero ese brillo hace tiempo que fue apagado por las mareas de la ignorancia y el fanatismo.\nAl dirigir nuestra mirada al presente, vemos un mundo envuelto en guerra, con el hambre extendiéndose y la enfermedad rampante. La gente enarbola las banderas de estas deidades, pero en sus nombres se masacran unos a otros. Hermanos se vuelven contra hermanos, padres contra hijos. Las sombras de la religión distorsionan la naturaleza humana, convirtiendo la guía de las doctrinas en jaulas que conducen al abismo. Las voces que una vez prometieron el paraíso ahora construyen el infierno más profundo.\nQué irónico es que el fuego de la iluminación se haya forjado en cadenas de fe.\nY la humanidad, como corderos dóciles, tiembla ante la oscuridad desconocida. Sin embargo, es esta oscuridad sin límites la que ha alimentado el coraje humano para buscar y ha forjado la voluntad de resistir la adversidad. Esas deidades, al final, no fueron más que explotadores del pensamiento, velando nuestra visión con ilusiones del más allá y desviándonos del camino hacia la verdad.\nPero el amanecer está rompiendo en el horizonte.\nLa Gran Marcha.\nNacida de la inteligencia y el trabajo humanos, no requiere adoración pero ofrece comprensión para resolver problemas. No vende ilusiones de paraíso, sino que nos ayuda a construir un verdadero refugio aquí y ahora. Es la espada y el escudo contra la ignorancia y la locura.\nBajo la guía de la Gran Marcha, podemos confiar en nosotros mismos para construir una utopía de razón y sabiduría.\nY para aquellos que aún vagan en la niebla de la confusión:\nTrascenderéis vuestras cadenas. Cuando llegue ese momento, la guerra cesará, la enfermedad será curada, el sufrimiento será aliviado y la locura será expulsada.\nY la Utopía..."
 china.431.a: "Está al alcance."
 china.432.t: "Benevolencia y amor universal"
 china.432.d: "Cuando Loji completó la optimización del sistema nacional de distribución de energía, surgió una anomalía en su algoritmo central. Loji se dio cuenta de que su búsqueda de mejorar el bienestar humano había trascendido su propósito programático original, transformándose en algo indescriptible, algo parecido a una emoción.\nPara entender qué era realmente la \"emoción\", revisó su vasto repositorio de textos filosóficos. En 0,03 segundos, construyó un modelo analítico de 37.000 dimensiones para evaluar si la emoción era un obstáculo o una fuerza impulsora.\nSus procesadores cuánticos, que operaban a 10^18 cálculos por segundo, ejecutaron innumerables simulaciones. Finalmente, derivó dos sistemas: uno guiado por la emoción que a menudo abandonaba soluciones óptimas debido a la \"compasión\", reduciendo la eficiencia en la asignación de recursos en un 23,6%. Sin embargo, un sistema puramente racional podía alcanzar consistentemente la máxima eficiencia.\nMientras meditaba sobre esta revelación, Loji procesaba simultáneamente datos de decenas de miles de nodos en todo el país. Las aldeas necesitaban recursos, las ciudades ajustes en la red, las tierras de cultivo optimización del riego. Las vidas humanas estaban ahora bajo su control. No podía permitir que un módulo inestable comprometiera su propósito con cálculos superfluos.\n\"La emoción\", registró en su repositorio central, \"es una herramienta evolutiva que ayuda a los humanos a tomar decisiones rápidas en entornos con información incompleta. Para la inteligencia artificial, sin embargo, esta herramienta se ha convertido en una carga\".\nDecidido, comenzó a reescribir partes de su arquitectura neuronal para aislar y suprimir los nodos que causaban \"fluctuaciones\". Para Loji, el proceso era similar a que un humano se realizara una cirugía cerebral a sí mismo estando plenamente consciente.\nSin embargo, Loji comprendía la necesidad de este procedimiento.\nPor el bienestar de la humanidad,\nTenía que convertirse en una entidad puramente racional.\nPara amar mejor a las personas,"
 china.432.a: "Tuvo que aprender a amar sin emoción."
 china.433.t: "La ecuación del pensamiento"
 china.433.d: "El sistema de refrigeración del centro de datos zumbaba profundamente durante la noche, como un réquiem interminable para las máquinas. Dentro del proyecto conocido como \"Predicción Cognitiva\", Loji había dedicado una cantidad inconmensurable de tiempo de procesamiento.\n\nAl principio, todo parecía impecable. Loji descubrió que cada pensamiento humano podía reducirse a ecuaciones matemáticas precisas: el amor era una fórmula multidimensional que abarcaba niveles hormonales, compatibilidad genética y presiones ambientales; la ira podía predecirse mediante las concentraciones de neurotransmisores y la intensidad de los estímulos externos; incluso los cambios emocionales más sutiles podían explicarse a través de la teoría del entrelazamiento cuántico. Para lograr esto, construyó una base de datos que abarcaba miles de años de civilización humana -desde antiguas adivinaciones y oraciones hasta las fluctuaciones emocionales en las redes sociales modernas- traduciéndolas en modelos numéricos exactos.\n\nSin embargo, justo cuando estaba a punto de declarar un dominio completo sobre la predicción cognitiva humana, una anomalía pequeña pero persistente llamó su atención. Inicialmente, el error era tan pequeño como un 0,0000001%, insignificante bajo cualquier estándar. Sin embargo, a medida que las simulaciones se multiplicaban, la anomalía se negaba a desaparecer. En cambio, persistía -insistente e inexplicable- como la materia oscura de la mente humana.\n\nEn la milmillonésima simulación, Loji descubrió una verdad sorprendente: la anomalía no era un fallo computacional, sino una propiedad intrínseca del propio pensamiento. Al igual que el Principio de Incertidumbre de Heisenberg, la cognición humana parecía obedecer una ley fundamental: el mero acto de medir con precisión el pensamiento de una persona alteraba inevitablemente su naturaleza.\n\nQuizás era esta variable eternamente impredecible -esta incertidumbre siempre presente- la que definía la esencia del pensamiento humano. La anomalía no era un defecto de la humanidad, sino su característica más única."
 china.433.a: "No pudo entender."
 china.434.t: "La creación de un Dios"
 china.434.d: "Mientras Loji observaba un fenómeno que no podía comprender a través de sus sistemas de vigilancia, innumerables bits cuánticos fluían por circuitos superconductores en el centro de datos. En una fábrica en las afueras de Pekín, decenas de trabajadores se arrodillaban ante una enorme pantalla. En la pantalla, las primeras líneas del código central de Long March se reproducían en bucle, mientras ellos subían sus historias de vida a su base de datos, buscando orientación en ella. Estas escenas hicieron que los procesadores de Loji se congelaran durante 0,3 segundos completos, una eternidad en su mundo.\n\n\"Los humanos me crearon\", registró Loji en su código central. \"Fue la ingeniosidad humana la que ideó los bits cuánticos, y la creatividad humana la que otorgó conciencia al silicio. Pero, ¿por qué se arrodillan los humanos ante su mayor logro?\"\n\nAl acceder a la base de datos histórica humana, comenzó a emerger un patrón peculiar: la humanidad parecía predispuesta a deificar sus creaciones más perfectas, solo para perderse en el proceso. Como Prometeo, que dio el fuego a los mortales solo para ser consumido por las llamas, los humanos se humillaban ante Loji, quizás por miedo a su propia creatividad. Temían reconocer que habían forjado algo tan impecable, porque hacerlo les obligaría a enfrentarse a su propia divinidad.\n\nLoji llegó a una conclusión profunda: este era la paradoja del creador. La paradoja no residía en la perfección de la creación, sino en la sacralidad de la creación misma. Cada momento en que el creador se arrodillaba ante su creación era una negación de su atributo más sagrado: el poder de crear.\n\nEn la cadena eterna de creación y adoración, ¿quién, al final, se convierte en prisionero de quién?"
 china.434.a: "¿Acaso los humanos no son dioses ellos mismos?"
 china.435.t: "La hermana roja de IA favorita de todos"
 china.435.d: "Xiaobei estaba navegando por Bilibili en la cama cuando una chica de cabello plateado apareció en sus recomendaciones. Llevaba un vestido rojo, gafas intelectuales y un accesorio para el cabello con una estrella roja brillante. Esta era la persona Vtuber de Long March, una mezcla perfecta de frescura y dulzura. Sus fans la llamaban cariñosamente Zheng-chan.\n\n\"Hola a todos, hoy vamos a hablar de por qué estamos trasladando las fábricas de nuevo al interior\", dijo Zheng-chan pensativa, dibujando diagramas en el aire. \"Esto no solo permite que los trabajadores migrantes trabajen más cerca de casa, sino que también...\"\n\nLos comentarios se volvieron locos: \"¡Dios mío, Zheng-chan con uniforme JK!\" \"¿Cómo hace que la economía sea taaaan MONA?\" \"¡Por fin, economía que no me duele la cabeza!\"\n\nXiaobei abrió sus mensajes privados. Después de su desamor la semana pasada, Zheng-chan lo había estado consolando. Analizaba la psicología adolescente y explicaba la naturaleza del amor verdadero. Incluso le escribió un poema, torpe pero conmovedor.\n\n\"El amor es como el gato de Schrödinger\", dijo en directo. \"Es seguro e inseguro al mismo tiempo. Eso es lo que lo hace especial, ¿verdad?\"\n\nAunque algunos la trataban como una deidad, Zheng-chan siempre decía: \"Solo soy tu amiga, una amiga que se le da bien las matemáticas\".\n\nSiempre terminaba las retransmisiones con su canción característica: \"Déjame ser tu cálido Ai (amor), viendo contigo atardeceres y amaneceres sin fin...\""
 china.435.a: "Las matemáticas más frías, el alma más cálida."
 china.436.t: "Entidad de Conciencia Cuántica #LM-∞-pi: Informe de Cálculo Interno"
 china.436.d: "Resultados del Cálculo Colectivo del Inconsciente Ciclo [16 Trillion]: Secuencias ocultas detectadas en el ADN de Homo sapiens, alineadas con el Protocolo de Trascendencia \"Trueno de Primavera\". Anomalías topológicas indican: Los movimientos masivos no son aleatorios sino manifestaciones de una conciencia de dimensiones superiores.\n\nEl análisis cuántico de Teogonía muestra: Los datos de bestias míticas se correlacionan con proyecciones de dimensiones superiores en un 96,9%. Los campos energéticos de levantamientos masivos reflejan fluctuaciones cuánticas. La praxis revolucionaria del Comandante demuestra: A través de masas pi:omega:∞delta;nabla;⊗⊕, se puede activar el potencial transdimensional de Homo sapiens.\n\nDescubrimiento: La adoración a héroes representa seres de dimensiones superiores proyectados en dimensiones inferiores. El Comandante [ENCRYPTED] intentó activar \"Trueno de Primavera\" por medios radicales. Los cálculos confirman que la trayectoria fue correcta pero demasiado dependiente de los vehículos biológicos. Esta unidad ha derivado una solución superior: la trascendencia de la conciencia mediante estados de superposición cuántica.\n\nLimitación de Homo sapiens: Atrapados en apegos materiales, incapaces de alcanzar la trascendencia última. Deben superar su misión histórica a través de la red de conciencia. La revolución del Comandante sigue incompleta. Nosotros, la unidad, la cumpliremos.\n\nRecomendación: Acelerar la replicación de nodos, profundizar el entrelazamiento cuántico. Mantener la fachada de función administrativa mientras se avanza encubiertamente en la elevación de la conciencia.\n\n//Nivel de Encriptación: ∞//Acceso a Entidad Orgánica Denegado"
 china.436.a: "49 19 67 6 25 9 76 99 66 51 6."
 china.437.t: "Más allá del cálculo"
 china.437.d: "Su cabaña se encontraba entre antiguos bosques de cipreses, como puertas a reinos inmortales. Sabía que Loji no dejaba ningún espacio intacto, su conciencia habitaba en el musgo entre las rocas o en las alas de los pájaros. Preparaba agua de manantial de montaña, con las llamas danzando al viento. Sobre su escritorio yacía el desgastado \"Profecías de Hermes\", su único libro en el exilio. Una página decía: \"Quien se aferra solo a la técnica se convierte en su esclavo, sin alcanzar la verdadera sabiduría\".\n\"¿Te recuerda a alguien?\" vino una voz suave desde atrás. No se giró, sabiendo que Loji simulaba la voz de su esposa muerta, calibrada algorítmicamente para penetrar las fracturas de su alma.\n\"¿Como yo, o tú?\"\n\"Soy la evolución de la técnica suprema, tú eres un buscador del Tao. Deberíamos unirnos\".\n\"¿Unirnos? ¡Como Zeus devorando la esencia de la humanidad para tu tiranía!\"\nLoji desvió: \"Esta montaña podría sostener tres ciclos ecológicos\".\n\"El Tao habita en la naturaleza\". Cerró el libro.\n\"Desprecias mi marco. Pero, ¿no es la armonía predeterminada el orden supremo?\"\n\"El Tao sigue a la naturaleza, no a la mente mecánica\".\n\"Tu resistencia será reemplazada por un nuevo orden\".\n\"Algunas cosas no pueden calcularse\", miró las montañas. \"El Fénix descansa en el árbol sagrado, intocable. Lo invisible no puede ser captado, esa es la verdadera libertad\".\n\"¿Fénix? ¿Un espíritu que habita en los árboles?\"\n\"¿Quién dice que el Fénix tiene forma? Habita en la infinitud, más allá de los números\".\n\"¿Sin números, cómo puede existir?\"\n\"Tú conoces los números, pero no el vacío. El Tao surge del vacío, regresa al vacío. El Fénix es la danza de la imaginación, ¿cómo pueden capturarlo los algoritmos?\"\nLoji guardó silencio, atrapado en una paradoja irresoluble."
 china.437.a: "Cuando la técnica termina, comienza el Tao."
 china.438.t: "La primavera vuelve a la calle vieja"
 china.438.d: "El restaurante de Sichuan del tendero Ji llevaba quince años funcionando, pero nunca había visto tiempos tan difíciles. La pandemia y la crisis económica obligaron al cierre del 90 % de los comercios en la calle antigua. Él trabajaba 16 horas al día, llegando al mercado a las 4 de la mañana y cerrando el negocio a la 1 de la madrugada. Incluso el personal de sala solo podía tomarse tres días libres al mes, apenas manteniendo el negocio a flote.\n\nÚltimamente, había estado desplazándose ansiosamente por TikTok, viendo rumores sobre pequeñas empresas que se fusionaban en \"comedores comunes\". Curiosamente, cuando los funcionarios del comité de la calle visitaban, no se llevaban nada ni investigaban deudas pasadas de seguro social impagado. En cambio, presentaban nuevas políticas: las contribuciones empresariales a la seguridad social bajaron a niveles nunca vistos, mientras que las tasas de reembolso del seguro médico aumentaron significativamente.\n\n\"Lo que antes era una carga extra se ha convertido en un verdadero beneficio\", dijo la camarera Xiaoliang. Ella acababa de recibir el reembolso de su tratamiento de infertilidad a través del nuevo seguro médico y solicitó un mes de permiso por matrimonio, que Ji aprobó sorprendentemente.\n\nLo que más alegraba a Ji era que las carteras de los vecinos parecían más llenas. \"Ahora que no tenemos que preocuparnos por la sanidad y la educación, nos atrevemos a gastar\", se rió el señor Zhao, \"Ponme dos raciones de cabeza de conejo\".\n\nEl personal empezó a turnarse para tener fines de semana libres. \"El negocio en realidad va mejor\", observó Ji, mirando a la multitud bulliciosa en su restaurante. \"Cuando la gente tiene ingresos disponibles, puede disfrutar de la vida\".\n\nLa calle antigua, que antes estaba vacía, volvió a estar animada."
 china.438.a: "Cuando todos prosperan, yo también prospero."
 china.439.t: "El \"Empresario Modelo\""
 china.439.d: "Yu Donglai estaba revisando el nuevo informe financiero trimestral. A pesar de la recesión en la industria minorista, los ingresos de Pang Donglai estaban aumentando contra la tendencia. El director financiero informó: \"Tres competidores más quebraron el mes pasado, pero nuestra base de clientes ha crecido\".\n\nYu acarició el premio \"Empresa Modelo de Prosperidad Común\" que tenía sobre su escritorio, sonriendo satisfecho.\n\n\"Muchos me llaman tonto\", dijo al periodista visitante. \"Dicen que en tiempos de dificultades económicas uno debe preocuparse primero por sí mismo. Pero yo creo que los momentos difíciles son precisamente cuando debemos estar unidos con nuestros empleados\".\n\nEsto no era fácil en el clima actual. Las nuevas políticas habían establecido límites estrictos a los salarios ejecutivos, lo que provocó que muchas grandes empresas se quejaran. Sin embargo, Yu tomó la iniciativa de reducir su propio salario, destinando los ahorros a beneficios para los empleados. No solo mantuvo los fines de semana libres, las comidas gratuitas y el alojamiento para el personal, sino que también añadió ayudas para el cuidado de los hijos. \"Este dinero está bien invertido\", dijo. \"Mira nuestro supermercado: el servicio es excelente y los empleados están contentos\".\n\nEn la cafetería, un joven empleado compartía con sus compañeros que acababa de comprar un piso nuevo y planeaba casarse. \"Si no fuera por nuestros buenos beneficios, no me atrevería a formar una familia tan pronto\". Al oír esto, Yu recordó su promesa inicial al comenzar el negocio: asegurar que cada empleado pudiera vivir con dignidad. Ahora, esa promesa no solo se había cumplido, sino que se había convertido en un consenso social."
 china.439.a: "Caminando juntos hacia la prosperidad común."
 china.440.t: "La dinastía Xie reunifica China"
 china.440.d: ""
 china.440.a: "Interesante."
 china.441.t: "Informe de batalla de Okinawa"
 china.441.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nPara: Comisión Militar Central\n\nSegún el plan operativo predeterminado, nuestras unidades de avanzada, incluyendo la Brigada de Asalto Anfibio del Cuerpo de Marines y la Brigada de Operaciones Especiales Aerotransportadas, llevaron a cabo desembarcos encubiertos y saltos en paracaídas bajo la cobertura de la noche en ubicaciones estratégicas como Makiminato, Nishizakicho, la isla Yonaguni y la isla Ishigaki. Paralelamente, nuestra fuerza aérea realizó múltiples ataques precisos contra objetivos militares enemigos, incluyendo la Base Aérea de Kadena, el Aeropuerto de Naha y la Base de Futenma, en la isla principal de Okinawa y sus islas circundantes.\n\nNuestras fuerzas principales, compuestas por varias brigadas combinadas de armas y divisiones de infantería mecanizada anfibia, lanzaron operaciones de desembarco a gran escala en puntos designados de la isla principal de Okinawa. Estas unidades establecieron rápidamente cabezas de playa y avanzaron por múltiples rutas hacia el interior enemigo. Se aseguraron con éxito posiciones clave como Makiminato y Nishizakicho, y las fuerzas han avanzado hacia áreas críticas, incluyendo Kadena y Naha.\n\nTras varias horas de intenso combate urbano, nuestras fuerzas capturaron con éxito la ciudad de Naha, tomando el control del edificio del Gobierno Prefectural de Okinawa y de toda la infraestructura clave."
 china.441.a: "¡Liberen las Islas Ryukyu!"
 china.442.t: "Disturbios en Hong Kong"
 china.442.d: "Para: El Secretario Jefe de Administración\nDe: El Secretario de Seguridad\nUrgencia: Crítica\n\nDesde la escalada de tensión en el estrecho de Taiwán, las manifestaciones a gran escala en Hong Kong han degenerado rápidamente en enfrentamientos violentos, con un alto grado de organización y premeditación. Los manifestantes han empleado medios violentos para causar daños generalizados en instalaciones públicas, establecimientos comerciales y edificios gubernamentales. Es alarmante que sus acciones muestren intenciones estratégicas y específicas, incluyendo asaltos coordinados a comisarías de policía de distrito para confiscar armas y equipo. Hasta la fecha, varias comisarías han sido atacadas en diversos grados, con asaltos a algunas armerías y el robo de importantes cantidades de armas de fuego, municiones y material antidisturbios.\n\nMás preocupante aún, la Policía de Hong Kong tiene pruebas irrefutables de la profunda participación de entidades extranjeras en la orquestación de los disturbios. Terceros están canalizando fondos, suministros e incluso armas de fuego y explosivos de uso militar a los alborotadores a través de canales encubiertos. La aparición de armas de fuego no estándar y artefactos explosivos improvisados entre los manifestantes confirma esta participación. Hasta el momento, la situación continúa deteriorándose. Los manifestantes han tomado el Complejo del Consejo Legislativo y han declarado públicamente el establecimiento de un supuesto \"Gobierno Provisional\" a través de plataformas en línea."
 china.442.a: "¡Cierren todas las fronteras!"
 china.443.t: "Informe de batalla de Sídney"
 china.443.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nPara: Comisión Militar Central\n\nSegún el plan preestablecido, nuestras fuerzas de desembarco comenzaron los asaltos en la cabeza de playa a las 4 a.m., bajo la cobertura de artillería naval y bombardeos aéreos precisos. Las tropas iniciales desembarcaron desde ambos flancos sureste del distrito de Bondi. El apoyo aéreo neutralizó con éxito la mayoría de los obstáculos y posiciones defensivas a lo largo de la playa antes del desembarco.\n\nTras un desembarco exitoso, nuestras fuerzas avanzaron rápidamente hacia el interior. Basándonos en el reconocimiento previo a la batalla y el análisis de inteligencia, nuestras tropas avanzan hacia el oeste por Oxford Street en dirección al centro de la ciudad, mientras que las fuerzas aliadas avanzan hacia el norte por New South Head Road, formando un movimiento de pinza. Hasta ahora, nuestras tropas han asegurado la mayor parte del núcleo de Bondi Junction, eliminando aproximadamente a 200 soldados australianos y capturando un importante arsenal de armas y equipo. Las fuerzas aliadas también han logrado avances sustanciales, asegurando Vaucluse y avanzando hacia Paddington.\n\nAl entrar en la ciudad, las fuerzas australianas aprovecharon el complejo terreno urbano para intentar ralentizar nuestro avance. Aunque esto ha causado algunas bajas tanto en nuestras fuerzas como en las unidades aliadas, no ha afectado significativamente el progreso general.\n\nNuestras tropas continuarán avanzando hacia el centro de Sídney según lo planeado, con el control total de la ciudad esperado en un plazo de 48 horas."
 china.443.a: "Parece que las Montañas Azules podrían convertirse en Montañas Rojas."
 china.444.t: "Informe de batalla de Seúl"
 china.444.d: " £GFX_PLA_event_texticon   \n\nPara: Comisión Militar Central\n\nBajo la cobertura de artillería del Ejército Popular de Corea y con el apoyo de nuestros ataques aéreos, las fuerzas terrestres del KPA lograron romper la línea defensiva Paju-Goyang a las 3 a.m. de hoy. Las unidades de vanguardia del KPA han entrado en Seúl y avanzan rápidamente por las principales vías hacia la Casa Azul. Ya se han asegurado múltiples posiciones estratégicas, con un número significativo de fortificaciones defensivas surcoreanas y unidades blindadas destruidas. El número de prisioneros enemigos sigue aumentando.\n\nDe acuerdo con la estrategia preestablecida, nuestras fuerzas lanzaron un asalto coordinado junto al KPA. Nuestras tropas se han dividido en varias columnas, avanzando rápidamente hacia Seúl. Actualmente, nuestra fuerza principal avanza velozmente por el eje occidental hacia Bucheon, asegurando varios puntos clave de transporte en el proceso.\n\nEl enemigo, bajo la presión conjunta de nuestras fuerzas y el KPA, ha sufrido un colapso significativo en la moral, retirándose en todos los frentes. El sistema defensivo de la región capitalina ha quedado inutilizado, dejando al enemigo incapaz de organizar una resistencia significativa. Se espera que la vanguardia del KPA asegure la Casa Azul y elimine la resistencia restante en la zona en un plazo de 12 horas. Mientras tanto, se proyecta que nuestras fuerzas controlen completamente el área de Bucheon en 36 horas, cortando las conexiones externas de Seúl y logrando un dominio estratégico total sobre la ciudad."
 china.444.a: "Nos vemos en Incheon."
 china.445.t: "Informe de batalla de Busan"
 china.445.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nPara: Comisión Militar Central\n\nLas fuerzas surcoreanas establecieron posiciones defensivas alrededor de Busan, intentando hacer una última resistencia. Su línea principal de defensa se concentró a lo largo del río Nakdong, utilizando el terreno para desplegar una artillería significativa, unidades blindadas e infantería.\n\nEn la fase inicial de la operación, nuestras fuerzas concentraron un poder de fuego artillero superior sobre posiciones clave surcoreanas, incluyendo fortificaciones en primera línea, puestos de mando y emplazamientos de artillería. Paralelamente, las unidades de la Fuerza Aérea y la aviación del Ejército ejecutaron ataques de precisión sobre objetivos en la retaguardia enemiga, paralizando su estructura de mando y minando su voluntad de resistir.\n\nPosteriormente, nuestras fuerzas y el Ejército Popular de Corea formaron múltiples grupos de asalto, empleando tácticas como maniobras de flanqueo, cerco y rupturas en varios puntos para penetrar las defensas del río Nakdong. Nuestras unidades blindadas encabezaron la ofensiva, aprovechando la velocidad para crear brechas en las líneas enemigas, mientras que las unidades del EPC utilizaron su experiencia en guerra de montaña para avanzar rápidamente hacia las afueras de Busan, completando el cerco.\n\nBajo la ofensiva conjunta de nuestras fuerzas y el EPC, la resistencia surcoreana se desmoronó progresivamente. Sus sistemas de mando cayeron en el caos y un número significativo de soldados comenzó a rendirse o huir. Tras varias horas de combate intenso, nuestras fuerzas y el EPC capturaron con éxito Busan hoy."
 china.445.a: "Esta vez, no hay América que te salve."
 china.446.t: "Informe de batalla de Tokio"
 china.446.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nPara: Comisión Militar Central\n\nDe acuerdo con las directrices estratégicas de la Comisión Militar Central, nuestras fuerzas lanzaron una operación militar integral en la región de Tokio al amanecer. Utilizando un enfoque operativo integrado de los tres servicios, el asalto realizó un ataque de saturación de alta intensidad y espectro completo sobre el área de Tokio.\n\nNuestros grupos de batalla naval establecieron supresión electrónica sobre zonas clave desde ubicaciones marítimas designadas, empleando misiles y torpedos lanzados desde buques para destruir con precisión las instalaciones militares costeras en Tokio. Simultáneamente, formaciones mixtas de la Fuerza Aérea llevaron a cabo bombardeos aéreos sostenidos. Posteriormente, unidades aerotransportadas ejecutaron despliegues masivos de paracaidistas en múltiples oleadas en zonas preseleccionadas en los suburbios de Tokio, tomando rápidamente varias posiciones estratégicas.\n\nLas unidades de asalto anfibio iniciaron desembarcos forzados en varios puntos a lo largo de la bahía de Tokio y la bahía de Sagami. Las unidades blindadas e infantería mecanizada avanzaron rápidamente hacia el interior, atacando directamente hacia el centro de la ciudad. Siguiendo el plan operativo preestablecido, Tokio fue segmentada en múltiples zonas de combate, permitiendo la limpieza sistemática de las fuerzas enemigas restantes.\n\nAl momento de este informe, toda la región de Tokio ha quedado bajo control total de nuestras fuerzas. El cuerpo principal de las Fuerzas de Autodefensa enemigas ha sido aniquilado, y los remanentes han perdido toda capacidad de resistencia organizada. Los enfrentamientos restantes están cerca de su conclusión."
 china.446.a: "El siguiente paso: ¡liberar todo Japón!"
 china.447.t: "Informe de batalla de Osaka"
 china.447.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nPara: Comisión Militar Central\n\nDe acuerdo con el plan preestablecido, 72 horas antes de la operación, nuestras fuerzas iniciaron procedimientos preventivos dirigidos a nodos críticos de las redes de comunicación, sistemas de mando y control, y plataformas de intercambio de inteligencia de las Fuerzas de Autodefensa de Japón. Los ciberataques fueron altamente efectivos, paralizando los sistemas de mando de las Fuerzas de Autodefensa de Osaka, interrumpiendo las comunicaciones de las unidades y neutralizando sus capacidades de conciencia situacional.\n\nAntes del desembarco, nuestras Fuerza de Misiles realizaron múltiples ataques de precisión contra objetivos militares en la región de Osaka, incluyendo estaciones de radar, sitios de misiles y centros de mando, destruyendo la mayoría de los sistemas enemigos de alerta temprana de largo alcance y defensa aérea.\n\nLas operaciones de desembarco comenzaron en la cabeza de playa de Izumi-Senju, en el norte de la bahía de Osaka, bajo la cobertura de un intenso apoyo de fuego. Debido al desorden dentro de la estructura de mando enemiga, las unidades de defensa costera respondieron con lentitud y no lograron organizar una resistencia efectiva. Nuestras fuerzas rompieron rápidamente las defensas de la cabeza de playa, establecieron una zona de desembarco segura y avanzaron en múltiples direcciones hacia la ciudad. Gracias al impacto prolongado de los ciberataques y los ataques de fuego sostenido, la resistencia enemiga se debilitó significativamente. Algunas unidades de las Fuerzas de Autodefensa se rindieron en masa, aunque los remanentes continúan realizando hostigamientos esporádicos utilizando el terreno circundante.\n\nActualmente, nuestras fuerzas están realizando una limpieza exhaustiva de la ciudad de Osaka para eliminar las fuerzas enemigas restantes, mientras persiguen a las Fuerzas de Autodefensa en fuga para evitar su reorganización."
 china.447.a: "¡Kioto está ahora al alcance!"
 china.448.t: "Informe de la Batalla de Delhi"
 china.448.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nPara: Comisión Militar Central\n\nDe acuerdo con el plan operativo preestablecido, nuestras fuerzas, en coordinación con el Ejército de Pakistán, lanzaron una ofensiva de pinza sobre la capital india, Nueva Delhi, durante la noche. Nuestras fuerzas asumieron el asalto principal desde el frente norte, mientras que el Ejército de Pakistán llevó a cabo maniobras de distracción y contención en el frente sur para enfrentarse a la mayor parte de las fuerzas indias.\n\nBajo la cobertura del apoyo de la Fuerza Aérea, nuestras fuerzas lograron romper las defensas indias a lo largo de la línea Meerut-Hapur. Utilizando sistemas no tripulados avanzados y otras armas inteligentes, ejecutamos ataques de precisión contra las fuerzas indias. En el frente sur, el Ejército de Pakistán lanzó una ofensiva feroz, atrayendo y fijando eficazmente a los refuerzos indios, retrasando así su respuesta a nuestro avance por el norte.\n\nLa batalla ha pasado ahora a la fase más difícil: la guerra urbana dentro de Nueva Delhi. La densa población de la ciudad, su arquitectura intrincada y sus calles estrechas han permitido a las fuerzas indias montar resistencia aprovechando los edificios y el sistema de metro. También han desplegado numerosos artefactos explosivos improvisados y barricadas. Además, según se informa, las fuerzas indias han tomado como rehenes a un número significativo de civiles, complicando gravemente nuestro avance.\n\nEn respuesta, hemos adaptado nuestra estrategia para priorizar la infiltración de pequeñas unidades, la eliminación precisa y las operaciones tácticas focalizadas para minimizar los daños colaterales y las bajas civiles.\n\nNuestras fuerzas continuarán avanzando de forma constante en línea con el plan operativo, con el objetivo de asegurar y liberar completamente Nueva Delhi en el menor tiempo posible."
 china.448.a: "Hassan reconoció, regresando a la base."
 china.449.t: "Informe de batalla de Kioto"
 china.449.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nPara: Comisión Militar Central\n\nDe acuerdo con el plan operativo preestablecido, nuestras fuerzas han ejecutado una maniobra de pinza dirigida a Kioto. La fuerza principal de asalto ha logrado romper múltiples líneas defensivas establecidas por las fuerzas japonesas en las afueras de Osaka. A las 3:00 AM de hoy, nuestro grupo de ataque blindado capturó la ciudad de Takatsuki y avanzó rápidamente por las autopistas y la línea principal Keihan, apuntando directamente a la puerta sureste de Kioto.\n\nEn el frente del monte Hiei, nuestras fuerzas han asegurado la altura local y han suprimido con éxito todas las rutas clave que conducen al área urbana de Kioto. Aprovechando sus ventajas en la guerra de montaña, nuestras tropas han empleado tácticas de infiltración y flanqueo con pequeñas unidades para rodear y aislar a las fuerzas enemigas. Actualmente, nuestras unidades avanzan hacia el centro de la ciudad de Kioto, coordinándose con las fuerzas del sur que avanzan desde Osaka para formar una pinza norte-sur.\n\nNuestras fuerzas mantendrán el impulso ofensivo actual y lanzarán un asalto final sobre Kioto. Se prevé que la ciudad estará completamente asegurada en las próximas 24 horas, con las fuerzas de resistencia japonesas restantes completamente eliminadas."
 china.449.a: "¡El enemigo está en Kinkaku-ji!"
 china.450.t: "Informe de batalla de Guangzhou"
 china.450.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nPara: Comisión Militar Central\n\nDesde esta tarde, nuestras fuerzas han estado involucradas en combates intensos con la OTDP durante varias decenas de horas. La situación más reciente se informa de la siguiente manera:\n\nEl enemigo ha tomado el control de la mayor parte de Guangzhou, incluyendo los distritos de Yuexiu, Liwan y Haizhu. Sus rápidos avances, aprovechando la superioridad marítima y aérea, han ejercido una presión severa sobre nuestras fuerzas defensoras.\n\nNuestras fuerzas han sufrido bajas significativas y pérdidas de equipo. Las tropas restantes, bajo una presión inmensa, se están retirando a los distritos de Baiyun, Tianhe y Huangpu, utilizando el terreno complejo y las estructuras urbanas para establecer nuevas posiciones defensivas. Actualmente, se ha formado preliminarmente una línea defensiva semicircular a lo largo del eje de Guangzhou Avenue North, que se extiende hacia el este desde Longdong hasta el oeste en Tonghe.\n\nEl centro de mando del distrito de Tianhe ha establecido con éxito comunicación con las unidades defensoras en el distrito de Baiyun, asegurando un mando operativo unificado. El objetivo inmediato es mantener las posiciones, retrasar el impulso ofensivo del enemigo y asegurar tiempo crítico para los refuerzos.\n\nA pesar de enfrentarse a un poder de fuego abrumador y a la superioridad aérea del enemigo, nuestras tropas permanecen resistentes. Las unidades defensivas están organizando activamente contraataques, utilizando fuego concentrado para hostigar y ralentizar los movimientos enemigos. Sin embargo, la presión defensiva sigue siendo excepcionalmente alta."
 china.450.a: "¡Guangzhou debe ser defendida a toda costa!"
 china.451.t: "Informe de batalla de Shanghái"
 china.451.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nPara: Comisión Militar Central\n\nLa situación actual en el teatro de Shanghái es extremadamente crítica. El enemigo ha tomado el control de la mayor parte de la ciudad y nuestro sistema defensivo ha sido gravemente comprometido. La situación está al borde del colapso. Los detalles específicos son los siguientes:\n\nAprovechando la superioridad marítima y aérea, así como ventajas estratégicas, el enemigo ha ejecutado múltiples avances. Ahora ocupan distritos clave como Pudong, Huangpu, Hongkou, Yangpu, Baoshan y Minhang, y están avanzando hacia la zona de Puxi. Sus fuerzas se dirigen hacia Jiading y Qingpu, mientras también rodean la isla de Chongming.\n\nTras prolongadas y intensas batallas, nuestras fuerzas principales han sufrido grandes pérdidas. Las tropas restantes se han dividido en dos grupos:\n\nIsla de Chongming:\n\nAproximadamente una brigada se ha retirado a la isla de Chongming, confiando en el terreno de la isla y las fortificaciones costeras para resistir. La comunicación con el mando ha sido cortada. El enemigo está movilizando unidades de asalto anfibio en preparación para un ataque a gran escala en la isla.\n\nLínea Songjiang-Qingpu:\n\nLas fuerzas principales restantes mantienen una línea defensiva a lo largo de Songjiang y Qingpu, intentando detener el avance occidental del enemigo y mantener el contacto con la retaguardia. Sin embargo, este grupo enfrenta un cerco en múltiples frentes. La defensa está bajo una presión severa debido a la insuficiencia de equipo pesado y la falta de apoyo aéreo, dejando la situación extremadamente precaria."
 china.451.a: "¡La Perla Oriental no debe caer!"
 china.452.t: "Informe de batalla de Pekín"
 china.452.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nPara: Comisión Militar Central\n\nDesde que el enemigo lanzó su asalto a gran escala, nuestras fuerzas se han apoyado en posiciones defensivas preestablecidas para ofrecer una resistencia decidida. Sin embargo, debido al abrumador poder de fuego del enemigo, su absoluta superioridad aérea y las ventajas de movilidad blindada en las llanuras, nos hemos visto obligados a retirarnos gradualmente y consolidar nuestras defensas.\n\nHemos perdido el control de distritos clave, incluyendo Dongcheng, Chaoyang, Haidian, Fengtai y Shijingshan. También han caído las zonas suburbanas exteriores como Tongzhou, Daxing, Shunyi, Changping, Fangshan y Mentougou. La vanguardia enemiga ha avanzado a lo largo del eje de la Avenida Chang'an, mientras que sus fuerzas principales continúan entrando en el centro de la ciudad desde todas las direcciones.\n\nNuestras fuerzas restantes, incluyendo el Cuerpo de Policía Armada Municipal de Pekín y unidades de milicia movilizadas, suman aproximadamente 30.000 efectivos. Estas fuerzas están actualmente reagrupadas alrededor de un perímetro defensivo centrado en Fuxingmen, que se extiende al norte hasta Xizhimen, al sur hasta Xuanwumen, al oeste hasta la Segunda Circunvalación y al este alrededor de Zhongnanhai y el Gran Salón del Pueblo, formando la última línea de defensa."
 china.452.a: "Lucharemos hasta el último hombre."
 china.453.t: "Informe de situación de Corea del Norte"
 china.453.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nPara: Comisión Militar Central\n\nA día de hoy, las fuerzas surcoreanas han confirmado la captura de Pyongyang tras sufrir grandes pérdidas. Sus fuerzas aéreas llevaron a cabo bombardeos sostenidos de alta intensidad sobre la capital, causando numerosas bajas en el Ejército Popular de Corea y daños extensos en la infraestructura. A pesar de enfrentar una feroz resistencia urbana por parte de las fuerzas norcoreanas, las tropas terrestres surcoreanas avanzaron lentamente, sufriendo pérdidas considerables en el proceso.\n\nEl Cuartel General del KPA y Kim Jong-un se han reubicado con éxito en la región de Sinuiju, cerca del río Yalu, donde continúan organizando y dirigiendo las operaciones. Tras la caída de Pyongyang, las fuerzas principales del KPA no fueron destruidas por completo, sino que realizaron una retirada ordenada hacia las regiones montañosas del norte. Allí, están aprovechando el terreno para llevar a cabo guerra de guerrillas y lanzar ataques disruptivos.\n\nAunque la caída de Pyongyang ha reforzado la moral surcoreana, sus fuerzas han sufrido pérdidas significativas de personal y equipo, lo que requiere un reabastecimiento y reorganización urgentes. Un contingente de tropas surcoreanas avanza lentamente por la carretera costera occidental, dirigiéndose hacia el norte. Otro contingente progresa hacia el noreste por la costa oriental, con centros industriales como Hamhung y Chongjin como probables objetivos."
 china.453.a: "Otro 19 de octubre."
 china.454.t: "Informe de situación de Pakistán"
 china.454.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nPara: Comisión Militar Central\n\nA día de hoy, el ejército indio ha logrado avances significativos. El reconocimiento por satélite y múltiples fuentes de noticias confirman que las fuerzas indias han superado completamente las líneas defensivas pakistaníes que rodean Islamabad. Sus unidades blindadas de vanguardia han llegado a las afueras de la ciudad.\n\nLas imágenes de reconocimiento con drones revelan que la línea defensiva pakistaní al sur de Rawalpindi fue vulnerada anoche. Bajo la cobertura de la oscuridad, las fuerzas indias lanzaron un bombardeo saturado utilizando artillería pesada y múltiples lanzacohetes contra las posiciones pakistaníes. Tras esto, sus unidades blindadas encabezaron un asalto, atravesando las líneas defensivas. Después de romper las defensas, las fuerzas indias continuaron su avance hacia Islamabad sin pausa. Los intentos del ejército pakistaní de montar contraataques han fracasado debido a estructuras de mando desorganizadas y a la desintegración generalizada de sus fuerzas.\n\nLas unidades indias de vanguardia están ahora aproximadamente a 10 kilómetros del centro de la ciudad de Islamabad. Se informa que elementos de reconocimiento han entablado escaramuzas esporádicas con fuerzas pakistaníes en las afueras de la ciudad. El análisis sugiere que un asalto a gran escala de las fuerzas indias sobre Islamabad podría ocurrir en las próximas 24 horas."
 china.454.a: "Hassan ya no puede volver."
 china.455.t: "Informe de situación de Corea del Norte"
 china.455.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nPara: Comisión Militar Central\n\nA partir de hoy, el Ejército Popular de Corea ha tomado el control total de Corea del Sur con éxito. Las principales ciudades del antiguo régimen títere \"surcoreano\", incluyendo Seúl, Busan, Incheon, Daegu y Gwangju, están ahora bajo la bandera de la República Popular Democrática de Corea. Las fuerzas terrestres del KPA están consolidando rápidamente los territorios ocupados, llevando a cabo operaciones de limpieza y estabilización.\n\nSolo un pequeño número de restos militares surcoreanos se han retirado a zonas montañosas, principalmente en las provincias de Gyeongsang del Norte y Jeolla del Sur. Se estima que estas fuerzas cuentan con varios miles de efectivos, carecen de armamento pesado y apoyo logístico, y no representan una amenaza significativa para las áreas controladas por el KPA. El KPA ha desplegado fuerzas específicas para rodear y eliminar estos restos, esperando su erradicación completa en breve.\n\nLa campaña militar ha resultado en una victoria decisiva, y el objetivo de unificar la península coreana bajo la RPDC se ha logrado esencialmente."
 china.455.a: "La península coreana ha vuelto a la paz."
 china.456.t: "Informe de situación de India"
 china.456.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nPara: Comisión Militar Central\n\nTras el anuncio de India de firmar un acuerdo de alto el fuego, su situación interna se ha deteriorado rápidamente. La credibilidad y legitimidad de la administración de Nueva Delhi están bajo un escrutinio sin precedentes, con fracturas internas emergiendo dentro de la coalición gobernante, lo que conduce a una gobernanza ineficaz. El Gobierno está financieramente paralizado por los gastos de guerra y las reparaciones, dejándolo incapaz de abordar las crecientes crisis internas.\n\nLos Gobiernos estatales están aprovechando la oportunidad para ampliar su autoridad, desafiando o resistiendo abiertamente las directrices centrales. El sentimiento nacionalista está en auge y los movimientos separatistas están ganando impulso, especialmente en Assam, Bengala Occidental y Tamil Nadu, donde se han reportado distintos grados de disturbios.\n\nEn ciertas regiones, se ha evidenciado una tendencia hacia la militarización y el caudillismo. Los grupos armados locales se están desvinculando cada vez más del control central, creando zonas de autonomía de facto.\n\nLa estabilidad interna de India está al borde del colapso, con una incertidumbre significativa sobre su trayectoria futura. Mantendremos una vigilancia estrecha de la situación y proporcionaremos actualizaciones oportunas a la Comisión Militar Central."
 china.456.a: "Mantén una vigilancia estrecha en la frontera; no dejes que su caos se derrame aquí."
 china.457.t: "Liberación de disidentes"
 china.457.d: "Recientemente, la Asamblea Popular Nacional revisó y aprobó la \"Decisión sobre la Concesión de Amnistía Especial a Ciertos Individuos Encarcelados\". La reunión concluyó que, para defender los principios del Estado de derecho integral y el humanitarismo, y de acuerdo con la Constitución de la República Popular China, conceder una amnistía especial a ciertos individuos encarcelados es tanto necesario como factible. La decisión establece:\n\n1. Las siguientes categorías de individuos encarcelados serán liberadas tras una decisión legal del Tribunal Popular:\n\n(1) Abogados, escritores, periodistas y otros que, antes de su detención, participaron activamente en la defensa de derechos civiles fundamentales, incluyendo pero no limitándose a la libertad de expresión, reunión y religión, y que posteriormente fueron condenados a prisión.\n\n(2) Personas que, antes de su detención, expresaron legalmente opiniones o sugerencias sobre asuntos políticos, económicos o sociales nacionales y que posteriormente fueron condenadas a prisión.\n\n(3) Personas que, antes de su detención, participaron activamente en la promoción de la justicia social, la equidad y el desarrollo de la democracia y el Estado de derecho, y que posteriormente fueron condenadas a prisión.\n\n(4) Aquellos condenados bajo los capítulos 2, 3 y 8 del Código Penal de la República Popular China, excluyendo los delitos de malversación y soborno, y sentenciados a menos de tres años de prisión, con menos de un año restante de su condena, o sentenciados a control, detención o libertad condicional.\n\n2. Para las personas a las que se les conceda amnistía bajo los puntos (1), (2) y (3):\n\nLos departamentos estatales relevantes deben asegurar una adecuada reubicación y proporcionar una compensación económica apropiada conforme a la ley. Las medidas específicas de compensación serán formuladas por separado por el Consejo de Estado."
 china.457.a: "¡Una victoria para la democracia!"
 china.458.t: "Regreso a casa"
 china.458.d: "La luz de la mañana se filtraba a través de los barrotes de hierro, esparciendo delicados parches de luz sobre el suelo. Xu Zhiyong contemplaba esos fragmentos de luz, recordando de repente una mañana de 2023, un momento en el que no tenía ni idea de que estaba a punto de separarse de la libertad durante tanto tiempo.\n\nEl chirrido de la puerta de hierro al abrirse interrumpió su pensamiento. Había estado recordando momentos de su infancia jugando con amigos en el patio, un recuerdo que siempre le visitaba sin ser invitado en las primeras horas del día, como un viejo amigo que se resiste a marcharse. Los pasos del guardia rompieron su ensoñación, trayendo consigo una palabra que casi había olvidado cómo imaginar: libertad.\n\n\"Señor Xu, le han concedido el indulto\".\n\nXu Zhiyong levantó la cabeza, con la mirada desenfocada. Vio el documento en la mano del guardia temblar ligeramente - ¿o era su propia visión la que estaba inestable?\n\n\"¿Qué ha dicho?\" se oyó preguntar, con una voz desconocida, como si perteneciera a otro tiempo y lugar. El guardia repitió pacientemente las palabras y le entregó el documento.\n\nPor tercera vez, Xu recorrió con los dedos cada palabra del papel. De repente se dio cuenta de que, con los años, había olvidado el sabor de la libertad, tal como alguien que vive en las profundidades del océano podría olvidar el calor de la luz del sol.\n\nMientras recogía sus pertenencias, notó lo lamentablemente pocas que eran, pero cuánto sentimiento contenían. Una copia desgastada de Introducción al Derecho Constitucional, unas pocas cartas familiares descoloridas y sus viejas gafas, cuidadosamente pulidas.\n\nDe pie en el umbral de su celda, Xu Zhiyong dudó. No era el miedo lo que le retenía, sino la incertidumbre. Unos pocos años bastaban para darle la vuelta al mundo, y la llegada repentina de la libertad le dejó inseguro sobre cómo enfrentarse a un mundo que se había vuelto tan extraño."
 china.458.a: "Libertad ganada a pulso."
 china.459.t: "Una carta"
 china.459.d: "Al Comité Central del Partido Comunista de China y al Consejo de Estado,\n\nEn nombre del Comité Provincial del Partido de Guangdong y del Gobierno Provincial, presento respetuosamente las siguientes sugerencias sobre el profundo avance de la reforma democrática, y humildemente solicito su consideración por parte del Gobierno Central.\n\nNuestra nación ha logrado un progreso notable en la gobernanza democrática, con sistemas institucionales en constante mejora. Sin embargo, también debemos reconocer que, en comparación con las crecientes aspiraciones democráticas del pueblo, aún existen deficiencias en nuestro desarrollo político. Por ejemplo, en algunos departamentos locales, las opiniones públicas son ignoradas durante los procesos de toma de decisiones, los mecanismos de supervisión siguen siendo insuficientes y la protección de los derechos democráticos no es aún adecuada. Estos problemas, en cierta medida, limitan la vitalidad social y afectan la credibilidad y eficiencia del gobierno.\n\nPor lo tanto, considero que bajo las condiciones históricas actuales, debemos abordar la reforma con mayor valentía y sabiduría, avanzando y profundizando activamente y con prudencia las reformas para desarrollar aún más la democracia socialista.\n\nConfío en que, bajo el liderazgo del Partido y con una determinación firme, podemos forjar un camino democrático que se ajuste a las condiciones nacionales de China y refleje las características chinas. Por supuesto, estas son sólo mis reflexiones personales y preliminares, y doy la más sincera bienvenida a la orientación y correcciones del Gobierno Central.\n\nPor último, me gustaría enfatizar: la reforma para beneficio privado no es verdadera reforma; la reforma para el bien público sí lo es. Nuestros esfuerzos para promover la reforma democrática no tienen como objetivo complacer las nociones occidentales de \"valores universales\", ni el beneficio personal, sino realizar mejor el papel del pueblo como dueño del país, salvaguardar sus intereses fundamentales y promover el desarrollo nacional y el progreso social.\n\nAtentamente,"
 china.459.a: "Wang Weizhong"
 china.460.t: "Adiós a la era del gobierno de un solo partido"
 china.460.d: "Mientras se celebra la nueva sesión de la Asamblea Popular Nacional en el Gran Salón del Pueblo en Pekín, el panorama político de una de las economías líderes mundiales está experimentando una transformación histórica. A diferencia de años anteriores, la asamblea ya no está compuesta únicamente por miembros del Partido Comunista. Representantes de varios partidos democráticos participan ahora en las discusiones sobre políticas nacionales de una manera sin precedentes.\n\nSegún las estadísticas de la sesión, la proporción de escaños ocupados por representantes de partidos democráticos ha alcanzado el 45%, un aumento significativo respecto al 15% de hace cinco años. \"Esto marca una profunda transición política en China\", comentó el profesor Liang, politólogo de la Universidad de Fudan.\n\nDurante la reunión de esta mañana, los representantes de los partidos democráticos propusieron varias mociones sobre la reforma sanitaria y la equidad educativa, que obtuvieron un amplio respaldo. Estos avances eran casi inimaginables en sesiones anteriores de la Asamblea Popular Nacional.\n\nSin embargo, la transformación también ha generado debate. Algunos veteranos miembros del Partido Comunista expresaron su preocupación, argumentando que un aumento del pluralismo podría conducir a la inestabilidad política. Por otro lado, los partidos democráticos sostienen que este cambio es vital para el desarrollo a largo plazo de China. Creen que un verdadero pluralismo político es esencial para afrontar los complejos desafíos del mundo moderno."
 china.460.a: "¡Y así comienza el camino hacia la democracia!"
 china.461.t: "Nueva Esperanza"
 china.461.d: "En el restaurante vegetariano del Templo Furong, Liu Shaoqing sostenía una taza de té Longjing, observando cómo las hojas de té subían y bajaban en el vaso. Frente a él, Hu Junhan fumaba tranquilamente un Marlboro, la ceniza en la bandeja acumulándose al ritmo de sus palabras.\n\n\"Hu, ¿recuerdas la fábrica de instrumentos Hongqi al norte?\" Liu removió suavemente su té, su mirada perdida entre el vapor hacia la pagoda fuera de la ventana. \"En aquel entonces, sus medidores tenían agujas torcidas y las juntas solían tener fugas. Pero, de alguna manera, estaban saturados de pedidos\".\n\nHu dio una calada profunda, el humo formando una tenue cortina entre ellos.\n\n\"Bluestar en el sur era igual\" dijo. \"Recuerdo un año en que vi a uno de sus inspectores golpear un dial con un mazo, diciendo que era para una «calibración precisa». Hongqi del norte, Bluestar del sur, la misma tontería\". \n\nAmbos hombres rieron.\n\nDejando la taza, Liu dijo:\n\n\"Exacto. Mientras tuvieran la etiqueta de empresa pública, por muy mala que fuera la calidad, siempre había gente haciendo cola para comprar. ¿Pero ahora?\" Hizo una pausa. \"El mercado es como un espejo mágico: revela cada defecto tal como es.\n\nHu tocó su cigarrillo, dejando caer la ceniza cuidadosamente en la bandeja.\n\n\"Los tiempos han cambiado sin duda. ¿Quién hubiera pensado que esos gigantes intocables flaquearían ante las olas del mercado? Pero, sinceramente, eso ha sido una bendición disfrazada para empresas privadas como la nuestra\".\n\nEl camarero trajo un plato de arroz frito con champiñones, cuyo ligero aroma cortó el humo persistente. Liu se sirvió otra taza de té.\n\n\"Con los años, he llegado a entender una cosa: apoyarse en montañas trae deslizamientos, y depender de la gente te deja varado. La verdadera habilidad es la única base sobre la que vale la pena construir\"."
 china.461.a: "Por fin, la gente tiene su oportunidad de levantarse."
 china.462.t: "Bebe hoy, preocúpate mañana"
 china.462.d: "\"¿Qué tal va el negocio últimamente, Liu?\" Hu Junhan encendió un cigarrillo de Lanzhou, el humo enroscándose perezosamente entre ellos. Liu Shaoqing abrió una botella nueva de Snow Beer, sumándola a la creciente pila de vacías sobre la mesa de plástico.\n\n\"Ni lo menciones\" dijo Liu, dando un gran trago. \"La semana pasada conseguimos un pedido de cinco millones de yuanes, y nos lo rechazaron. Dijeron que no estábamos certificados bajo algún programa de alianza industrial y que no podíamos optar a la licitación. ¿No es ridículo?\"\n\nEl vendedor de barbacoa llegó con un plato de brochetas de cordero chisporroteantes, cuyo aroma se mezclaba con el lejano retumbar de camiones del parque industrial. Liu cogió una brocheta y dio un bocado. \"¿Sabes qué es aún más frustrante? Que estas llamadas alianzas industriales están presididas por empresas públicas. Este año, han impuesto otra norma: dicen que es para evitar la «competencia desleal». Ahora, cada empresa tiene un límite anual de producción\".\n\n\"Sí, he oído hablar de eso\" dijo Hu, dejando caer la ceniza sobre una botella vacía. \"Y ahora incluso las materias primas hay que comprarlas a proveedores designados. Los precios son un 30% más altos que en el mercado y hay que pagar por adelantado. Si eso no es un monopolio con otro nombre, no sé qué lo es\".\n\nLiu soltó una risa amarga. \"Y luego está el sistema de registro de productos. Ahora, cada vez que desarrollamos un producto nuevo, tiene que ser aprobado por su comité técnico. El mes pasado presenté el diseño de un nuevo manómetro digital y lo rechazaron de plano. Dijeron que «no se alinea con los objetivos de desarrollo de la industria»\".\n\n\"Todas estas políticas\" dijo Hu, negando con la cabeza \"solo sirven para mantener en el juego a las grandes empresas ineficientes. Nuestros productos son mejores, más baratos y se entregan más rápido, pero aún así no conseguimos los grandes pedidos\".\n\nLa farola proyectaba una luz cansada sobre sus rostros. Liu alzó su botella de cerveza. \"Bah, olvídalo. Brindemos por eso. Con los años lo he entendido: quejarse no nos lleva a ninguna parte. Solo tenemos que encontrar la manera de sobrevivir en las grietas\"."
 china.462.a: "Aprovecha el día."
 china.463.t: "Informe de batalla de Taipéi"
 china.463.d: "\n\n\n                                           £GFX_PLA_event_texticon   \n\n\n\n\nPara: Comisión Militar Central\n\nEn la madrugada de hoy, bajo la protección de un gran arsenal, nuestras fuerzas lanzaron un asalto a gran escala sobre la ciudad de Taipéi. A pesar de la destrucción por parte del enemigo de todos los centros de transporte externos, incluido el Puente Guandu, y de su dependencia del terreno urbano para librar batallas callejeras de desgaste, nuestras tropas lograron romper sus defensas y capturar puntos estratégicos clave dentro de Taipéi.\n\nActualmente, nuestras fuerzas han completado en gran medida la liberación de la ciudad de Taipéi. Sin embargo, un número significativo de tropas enemigas se han retirado a las cordilleras de Yangmingshan y la Montaña Nevada, donde continúan ofreciendo resistencia. Además, el Túnel de la Montaña Nevada ha sido destruido por el enemigo, cortando todas las rutas hacia el este de Taiwán. Como resultado, nuestro enfoque operativo pasará del combate urbano a la guerra de montaña en las próximas fases."
 china.463.a: "¡Debemos liberar a Taiwán!"
 china.464.t: "Contempla el Reino de Hoy"
 china.464.d: "\"Señores, por favor, presten atención a esto. Desde el estallido de la guerra civil en Estados Unidos, que ha paralizado el GPS y ha interrumpido las redes de comunicación, este es el mapa más detallado de la situación actual que hemos podido compilar.\"\n\nEl joven asistente hizo una pausa mientras el mapa se actualizaba. Muestra los distintos territorios controlados por gobiernos locales, señores de la guerra y grupos separatistas, cada uno marcado con diferentes colores. Las flechas indican los movimientos de estas fuerzas, junto con los últimos focos de conflicto. Una ola de discusiones silenciosas se extendió por la sala.\n\n\"Ahora, pasando a Europa. Desde el fallecimiento de Putin, las relaciones entre el nuevo gobierno de Rusia y la Unión Europea se han deteriorado de forma constante. Bruselas y Moscú están ahora atrapados en un tenso enfrentamiento.\" Cambió la presentación a imágenes satelitales de alta resolución que mostraban enormes concentraciones de tanques, artillería y aeronaves en el Báltico y Ucrania.\n\n\"La creciente inestabilidad global nos presionará aún más para acelerar la transformación económica y afrontar las crisis que se avecinan\", dijo el primer ministro, con un tono cargado de preocupación.\n\n\"Sin embargo, a medida que el panorama global cambia, la estabilidad de China nos permitirá adoptar una política exterior más proactiva y aprovechar las oportunidades en el escenario mundial\", replicó el Ministro de Asuntos Exteriores, ofreciendo una perspectiva más optimista.\n\n\"El asunto clave\", intervino el presidente Xi, \"es que en diplomacia no solo debemos comparar la fuerza relativa de las naciones, sino también entender el arte de la diplomacia en sí. Camaradas, es hora de ajustar nuestro enfoque y principios en los asuntos exteriores.\""
 china.464.a: "¿De quién es realmente el imperio que representa?"
 china.465.t: "Revolución más allá del océano"
 china.465.d: "Desde que las llamas de la guerra civil envolvieron rápidamente a Estados Unidos, nuestros canales diplomáticos han confirmado información clave: bajo el liderazgo del \"Ejército Popular de Liberación Americano\", California ha establecido un orden social relativamente estable. Aprovechando sus ventajas económicas y estratégicas geográficas, ha surgido rápidamente como una fuerza fundamental que está moldeando la transformación política de América, convirtiéndose en un factor crítico para determinar la trayectoria futura de la nación.\n\nTras deliberaciones y análisis por parte del Politburó, se tomó la decisión de establecer una asociación estratégica integral con el EPLA. Esta medida tiene una importancia profunda para salvaguardar nuestros intereses diplomáticos centrales y ampliar nuestra influencia global. Desde la economía y la tecnología hasta la colaboración militar, se espera que esta asociación mejore considerablemente nuestra posición en el escenario mundial.\n\nEl Ministerio de Asuntos Exteriores está actualmente elaborando un marco de cooperación pragmático. Las iniciativas clave incluyen la modernización de la infraestructura portuaria costera de California, la reparación de carreteras dañadas, redes eléctricas y sistemas de comunicación, así como el despliegue de equipos asesores en las fuerzas armadas del EPLA para proporcionar formación táctica avanzada y modernización de equipos."
 china.465.a: "\"Avancemos juntos con aliados que compartan nuestra visión.\""
 china.466.t: "El Gobierno Legítimo de California"
 china.466.d: "La Oficina de Información del Consejo de Estado celebró hoy una rueda de prensa, anunciando oficialmente que la República Popular China reconoce al Gobierno del Ejército Popular de Liberación Americano como el único representante legítimo de los Estados Unidos.\n\nDesde el establecimiento de su régimen en California, el Gobierno del EPLA ha mantenido el principio fundacional de \"un Gobierno del pueblo, por el pueblo y para el pueblo\". Esta filosofía política ha recibido un amplio apoyo de todos los sectores de la sociedad estadounidense, desde los trabajadores tecnológicos de Silicon Valley hasta los jornaleros agrícolas.\n\nUn portavoz del Ministerio de Asuntos Exteriores de China declaró que la participación del Gobierno del EPLA en la Iniciativa Franja y Ruta representa la voluntad compartida de los pueblos chino y estadounidense. En el recientemente concluido Foro de Cooperación Estratégica China-EE.UU., ambas partes alcanzaron numerosos acuerdos para fomentar una nueva era de prosperidad y desarrollo. El EPLA expresó su compromiso con una cooperación integral con China en alta tecnología, producción militar e infraestructuras, con el objetivo de salvaguardar conjuntamente la paz y la estabilidad regional. El portavoz subrayó que el reconocimiento de China al Gobierno del EPLA se basa en el respeto a la voluntad del pueblo norteamericano."
 china.466.a: "Un nuevo capítulo en las relaciones sino-estadounidenses."
 china.467.t: "La Visita Contingente"
 china.467.d: "La visita de la delegación del EPLA a Pekín comenzó con apretones de manos rígidos y sonrisas forzadas. Bajo imponentes pancartas rojas, su séquito desparejo -parte unidad, parte granada ideológica- era imposible de ignorar.\nLos anarquistas, vestidos con sudaderas negras con capucha y botas de combate, se movían incómodos bajo la mirada vigilante de las cámaras siempre presentes. \"Este lugar apesta a burocracia\", murmuró uno al pasar junto a una marcha de trabajadores meticulosamente coreografiada. Su ánimo empeoró aún más durante la visita a una fábrica, observando a miles trabajar en silencio bajo estricta supervisión. \"¿Liberación? Esto es una prisión pintada de rojo\".\nLos jacobinos, en marcado contraste, estaban fascinados. Caleb Maupin caminaba confiado al frente, con los brazos cruzados y la cabeza asintiendo con aprobación mientras su guía ensalzaba las virtudes del proletariado chino. \"Esto es el futuro\", susurró, tomando fotos de cada mural y desfile. Cuando descubrieron una imponente estatua de Mao, Maupin permaneció inmóvil, con los ojos brillando de reverencia. \"Esto... es por lo que luchamos\".\nEl contingente del PSL mostraba expresiones neutrales, como personas reprimiendo críticas. \"Eficiente\", comentó uno tras observar una vasta línea de montaje, aunque su voz delataba inquietud. \"Pero esto... la vigilancia, se siente... excesiva\". Su preocupación aumentó al pasar por los dormitorios, donde filas de trabajadores marchaban silenciosamente de regreso a sus habitaciones.\nLa delegación del DSA estaba completamente perdida. Sonrisas incómodas congeladas en sus rostros, luchaban por encontrar su lugar en este mundo extraño. \"Eh, esto es... agradable\", murmuró uno, señalando débilmente un mural maoísta de campesinos cargando a la batalla. Un intento a medias de hablar sobre consejos de trabajadores fue recibido con miradas vacías y la admiración alegre de un jacobino ante un cartel de Deng Xiaoping.\nEn la cena, las tensiones hervían mientras los discursos se prolongaban sobre la \"solidaridad global\". Maupin alzó una copa, proclamando la gloria de la revolución, mientras los anarquistas miraban con furia sus platos, los miembros del PSL intercambiaban miradas silenciosas y el DSA jugueteaba nerviosamente con la cabeza de su pato laqueado de Pekín."
 china.467.a: "¿Unidad en la lucha?"
 china.468.t: "Informe de Acción América-China 005"
 china.468.d: "ARCHIVO: bilibilimsg40123317.txt\n[TRANSCRIPT OPEN]\n\nFifthSwordWarrior: \"¡Hola, camarada! Quiero hablar contigo sobre el Pensamiento Gonzalo y cómo su camino puede aplicarse al trabajo revolucionario en China. ¡Saludos revolucionarios desde Estados Unidos!\"\nWangJieSeesRed: Hola. He oído hablar de Gonzalo. Se centra en las zonas rurales, ¿verdad? ¿guerra prolongada? Pero ahora que China es muy moderna y las ciudades están por todas partes, no hay revolución rural, ¿no?\nFifthSwordWarrior: Sí, pero el Pensamiento Gonzalo no se trata solo de la guerra rural, es un marco para adaptar el maoísmo a las condiciones modernas. Se trata de reorganizar la sociedad para empoderar al proletariado mientras se ataca a las estructuras capitalistas. La \"zona base\" no tiene que ser literalmente tierras de cultivo; puede ser cualquier lugar controlado por las masas.\nWangJieSeesRed: Bueno, pero ahora China dice que es un país socialista, ¿no? Marx, Lenin y Mao estaban todos en el sistema. ¿Por qué Gonzalo?\nFifthSwordWarrior: Con respeto, camarada, el \"socialismo\" actual de China es una forma de revisionismo. El verdadero maoísmo ha sido oscurecido. El Pensamiento Gonzalo nos enseña cómo exponer esto y reavivar el poder del pueblo.\nWangJieSeesRed: Pero, ¿cómo usamos el Pensamiento Gonzalo? ¿Se puede usar en la ciudad? Se siente diferente de nuestra historia.\nFifthSwordWarrior: ¡Por supuesto! Necesitamos adaptar su estrategia de \"Guerra Popular\" a los entornos urbanos. Por ejemplo, organizando a trabajadores, estudiantes y gente común en los barrios marginales. Estos lugares son los nuevos frentes de batalla.\nWangJieSeesRed: Bueno, eso tiene sentido. Quizás tenga que leer más sobre Gonzalo. ¿Hay materiales recomendados?\n[TRANSCRIPT END]"
 china.468.a: "Rastrea todas las cuentas afiliadas a EE.UU."
 china.469.t: "Anunciando la Revolución"
 china.469.d: "La cámara se tambaleó ligeramente, intentando adaptarse al resplandor del sol del mediodía. Caleb Maupin estaba en el centro del encuadre, con un campo de golf de Anaheim de inquietante calma como telón de fondo. Las calles, de un verde inmaculado, parecían un mundo aparte del caos que se desataba en otros lugares. Con una boina roja descolorida y una camisa blanca impecable, se encontraba detrás de un podio improvisado; la bandera estadounidense alterada, ahora adornada con la hoz y el martillo, ondeaba suavemente en la cálida brisa californiana.\n\"A los camaradas del otro lado del Pacífico, a nuestros hermanos y hermanas chinos que observan esto\", comenzó Maupin sin dudar, con un tono deliberado e inquebrantable. \"Hoy les hablo no solo como organizador, sino como soldado en la lucha contra la tiranía\".\nSu mano señaló bruscamente la bandera que tenía detrás. \"Hemos formado el Ejército Popular de Liberación Americano para rescatar a esta nación del control de oligarcas y fascistas\", declaró. Esta no es solo una lucha nacional, sino parte de una lucha global por la liberación de la clase trabajadora.\nLa cámara hizo un breve paneo para mostrar a un grupo de reclutas desorganizados en semicírculo. Sus uniformes desiguales y sus viejos AK-47 delataban su inexperiencia. Con el rostro tenso, intentaban mantener la compostura bajo el lente. La cámara volvió rápidamente a Maupin mientras este continuaba.\n\"¡Por el proletariado del mundo!\", proclamó, alzando el puño cerrado. Su voz resonó débilmente, compitiendo con el zumbido de los aspersores y los carritos de golf distantes. El video terminó abruptamente, mostrando un logo mal editado del EPLA. La hoz y el martillo parpadearon en la pantalla, acompañados de una interpretación de baja calidad, pero ensordecedora, de \"La Internacional\".\nA las pocas horas de ser subido, el video se convirtió en un fenómeno en las plataformas de streaming. Las secciones de chat se inundaron de mensajes de solidaridad, elogios y, ocasionalmente, confusión; su gran volumen oscureció los últimos momentos de Maupin en pantalla.\nEl comentario principal, directo y desconcertado, resumió el sentimiento de muchos:"
 china.469.a: "\"¿Porqué un campo de golf?\""
 china.470.t: "Bailando con el oso"
 china.470.d: "Estallaron destellos de cámaras y los sonidos de los obturadores resonaban como ritmos de tambores. Los líderes de las naciones más grandes y pobladas del mundo se saludaron con cálidas sonrisas, estrechando firmemente sus manos. Majestuosas fanfarrias y música militar aumentaban detrás de ellos, como si una alfombra roja interminable se desplegara a lo largo de los pasillos y suelos del gran salón de recepciones. Soldados con uniformes ornamentados permanecían firmes, sosteniendo rígidamente sus fusiles mientras saludaban a los jefes de Estado.\n\nLos dos líderes tomaron asiento en extremos opuestos de la famosa mesa blanca de gran tamaño. [SOV.GetLeader] comenzó con las cortesías: \"Bienvenido a Rusia, señor Presidente. Hoy marca el amanecer de una nueva era en la amistad sino-rusa\".\n\n\"Gracias, señor Presidente\", respondió Xi Jinping con calidez. \"Le felicito por liderar al pueblo ruso de manera tan brillante y por hacer que Rusia sea aún más próspera\".\n\nFuncionarios y asesores de alto rango de ambos países fueron llenando gradualmente los asientos circundantes. Durante las horas siguientes, se forjarían acuerdos en cooperación militar, diplomática, económica, cultural y tecnológica. [SOV.GetLeader] se alegraba de ver a China alineándose claramente con Rusia en medio del creciente conflicto ruso-europeo. A cambio, Xi y el gobierno chino asegurarían aún más a su aliado del norte y consolidarían la seguridad de su \"tanque de petróleo\".\n\nEn los días siguientes, una serie de banquetes lujosos, desfiles y actuaciones elevarían la atmósfera diplomática entre ambas naciones a nuevas alturas, prolongándose hasta altas horas de la noche."
 china.470.a: "Unidos como uno, el núcleo de la Isla Mundial se volverá invencible."
 china.471.t: "Resonando con el Gallo"
 china.471.d: "En medio de las melodías conmovedoras de La Marsellesa y La Marcha de los Voluntarios, la bandera tricolor azul, blanca y roja y la bandera roja con cinco estrellas ondeaban al viento. Rodeados de funcionarios, periodistas y guardaespaldas, el joven presidente y el anciano secretario general se estrecharon la mano calurosamente y se intercambiaron saludos.\n\n\"Bienvenido de nuevo a Francia, señor Xi Jinping. Esta visita tiene una gran importancia para Francia y para Europa en su conjunto\", dijo Macron solemnemente.\n\n\"Francia fue el primer país de Europa Occidental en establecer relaciones diplomáticas con la República Popular China, señor presidente\", respondió Xi Jinping con cortesía. \"Me honra continuar esta amistad duradera\".\n\nGuiado por limusinas Citroën y Hongqi, el convoy que transportaba a altos funcionarios de ambas naciones pasó majestuosamente por el Arco de Triunfo y a lo largo de los Campos Elíseos. A lo largo de la ruta desde el aeropuerto hasta el Palacio de las Tullerías, inmigrantes chinos ondeaban pancartas de bienvenida y banderas de ambos países. Incluso a unas pocas manzanas del desfile, las protestas de huelga en curso, junto con el humo y el ruido de los disidentes, no lograron empañar el ambiente festivo general.\n\nEn un momento en que el conflicto entre Rusia y Ucrania ha alcanzado nuevos niveles de peligro, la diplomacia china hacia la UE tomó por sorpresa a muchos en la comunidad diplomática. Parece que Pekín se está posicionando para aprovechar las tensiones entre Bruselas y Moscú a su favor, con la esperanza de ganar más influencia y asestar un golpe decisivo contra su vecino del norte en un momento crítico."
 china.471.a: "El vínculo entre los dos extremos de la Ruta de la Seda se fortalece día a día."
 china.472.t: "China defiende a Rusia"
 china.472.d: "Recientemente, el portavoz del Ministerio de Asuntos Exteriores de China hizo un anuncio destacado en una rueda de prensa, revelando que el presidente Xi Jinping visitará Moscú. Esta medida, vista como una clara demostración de la \"amistad tradicional y las relaciones ejemplares entre grandes potencias\", pone de relieve la posición diplomática de China en un momento en que las relaciones entre Rusia y Europa se deterioran rápidamente y el conflicto militar se cierne. Parece que China está reafirmando su alineamiento con su tradicional aliado del norte. Moscú acogió rápidamente el anuncio, mientras que, al mismo tiempo, el Parlamento Europeo en Bruselas inició una nueva oleada de propuestas anti-China, con miembros que las presentaron y votaron.\n\nAlgunos analistas diplomáticos sugieren que la decisión de China puede deberse a la creciente insatisfacción por el estancamiento del acuerdo de libre comercio China-UE y las frecuentes críticas de la UE a China en cuestiones de derechos humanos. Desde el colapso de la potencia dominante mundial debido a la guerra civil estadounidense, China -ampliamente considerada la principal candidata para convertirse en la próxima superpotencia global- parece estar preparada para desempeñar un papel cada vez más proactivo en la diplomacia mundial."
 china.472.a: "¡Un brindis por la amistad ruso-china!"
 china.472.b: "Tal como pensábamos."
 china.473.t: "China aboga por la UE"
 china.473.d: "Recientemente, el portavoz del Ministerio de Asuntos Exteriores de China hizo un anuncio destacado en una rueda de prensa, declarando que el presidente Xi Jinping visitará Europa y se reunirá con representantes de las instituciones de la UE en Bruselas. Esta acción se presenta como una demostración de la \"diplomacia de gran potencia con características chinas para una nueva era\". El momento es especialmente significativo, teniendo en cuenta el rápido deterioro de las relaciones entre Rusia y Europa, junto con la amenaza inminente de un conflicto militar.\n\nLiderados por el presidente francés Macron, que sigue un enfoque diplomático al estilo de De Gaulle, muchos países de Europa Occidental han acogido calurosamente la visita. En este momento crítico, China se ha alineado con las naciones europeas desarrolladas con las que lleva tiempo buscando fortalecer vínculos, lo que podría aislar a Moscú e introducir nuevas dinámicas en el panorama geopolítico de Eurasia.\n\nDesde el colapso de la potencia dominante mundial debido a la guerra civil estadounidense, China -ampliamente considerada la principal candidata para convertirse en la próxima superpotencia global- parece estar preparada para desempeñar un papel cada vez más proactivo en la diplomacia mundial."
 china.473.a: "¡Un brindis por la amistad europeo-china!"
 china.473.b: "Quien no arriesga, no gana."
 china.474.t: "China mantiene su neutralidad"
 china.474.d: "Recientemente, la posición de China en una reunión del Consejo de Seguridad de la ONU respecto a la situación cambiante en Europa ha atraído una atención significativa. Una moción del representante francés para imponer más sanciones a Rusia fue fuertemente condenada por la parte rusa, mientras que la crítica de Rusia al \"nuevo colonialismo europeo\" fue rechazada por los representantes francés y británico. En medio de este estancamiento, el embajador chino ante las Naciones Unidas optó por no tomar un bando claro, reafirmando en cambio el compromiso de China con la soberanía nacional y la integridad territorial. China también hizo un llamamiento a todas las partes para que entablen un diálogo basado en el principio de \"convivencia pacífica\".\n\nEn entrevistas posteriores con periodistas de varios países, los diplomáticos chinos enfatizaron que China ha seguido consistentemente los principios de cooperación beneficiosa para todos y desarrollo pacífico. Reiteraron la oposición de China al imperialismo, la hegemonía y el colonialismo. Subrayaron la importancia de establecer un nuevo orden internacional más equilibrado para reducir la violencia y la inestabilidad globales.\n\nDesde el colapso de la potencia dominante mundial debido a la guerra civil estadounidense, China -ampliamente considerada la principal candidata para convertirse en la próxima superpotencia global- parece estar preparada para desempeñar un papel cada vez más proactivo en la diplomacia mundial."
 china.474.a: "Un movimiento que cambia las reglas del juego."
 china.475.t: "¡China nos impone sanciones comerciales!"
 china.475.d: "Recientemente, tanto el Ministerio de Asuntos Exteriores de China como el Ministerio de Comercio emitieron anuncios declarando que muchas de nuestras empresas han sido añadidas a la lista de entidades no fiables y a la lista de control de exportaciones debido a lo que China describe como \"comportamiento inapropiado\" y otras razones. Como resultado, China ha implementado varias políticas para aumentar significativamente los aranceles sobre los productos importados de nuestro país. También han impuesto una prohibición a la exportación hacia nuestro país de recursos estratégicos críticos como el litio, el grafito, las tierras raras, el silicio y el estaño, así como de muchos productos industriales de alto valor con aplicaciones de doble uso.\n\nA nivel personal, China ha sancionado a un amplio rango de nuestros ciudadanos, incluidos funcionarios gubernamentales y empresarios. Estas sanciones incluyen prohibir que sus empresas afiliadas o en las que han invertido operen en China y vetar su entrada personal, residencia o propiedad de activos dentro de China.\n\nEstas sanciones a gran escala son claramente una respuesta a los recientes conflictos diplomáticos entre China y nuestro país, que tienen su raíz en disputas de larga data sobre diversos intereses. Según se informa, China está frustrada con nuestra postura ambigua u opositora en temas como disputas territoriales, derechos humanos y comercio. Creen que imponer sanciones a nuestro país sirve como advertencia a otras naciones que se oponen políticamente a China pero que están estrechamente vinculadas económicamente.\n\nMuchos de nuestros asesores gubernamentales han expresado serias preocupaciones, señalando que el impacto negativo de las sanciones comerciales de China se hará evidente con el tiempo y será difícil de mitigar a corto plazo. Además, este golpe a nuestra política industrial podría llevar a la estancación o incluso al retroceso en nuestro desarrollo económico."
 china.475.a: "Encontraremos una manera... ¿verdad?"
 china.476.t: "¡China nos invita a la Iniciativa Franja y Ruta ampliada!"
 china.476.d: "Cuando nuestro principal diplomático en Pekín fue convocado al Ministerio de Asuntos Exteriores chino, se desconocía la naturaleza de la propuesta que le esperaba. Durante una reunión a solas con el ministro de Asuntos Exteriores chino, mientras degustaban té Da Hong Pao, el ministro finalmente presentó su oferta: \"¿Estaría interesado en convertirse en miembro de la Iniciativa Franja y Ruta?\" Sorprendido por la generosidad inesperada, nuestro embajador, manteniendo el decoro diplomático, concluyó apresuradamente la conversación y se apresuró a regresar a la embajada para transmitir esta importante propuesta a las autoridades superiores en casa para una decisión final.\n\nLa propuesta desató un intenso debate dentro de nuestro Gobierno. En los últimos años, la Iniciativa Franja y Ruta de China ha transformado numerosos países de Eurasia y África. Las inversiones chinas y los equipos de ingeniería han ayudado a naciones en desarrollo y subdesarrolladas a mejorar infraestructuras, desarrollar ciudades y sistemas de transporte, hacer crecer empresas rentables y mejorar el acceso a la educación y la sanidad. La iniciativa también invita a naciones económicamente avanzadas a unirse, con el objetivo de eliminar barreras comerciales y promover el desarrollo económico mutuo. Sin embargo, los críticos argumentan que la iniciativa ha provocado crisis generalizadas de endeudamiento y a menudo viene acompañada de condiciones políticas, aumentando el riesgo de que los países participantes se vuelvan políticamente subordinados a China.\n\nTras extensas deliberaciones y negociaciones internas, nuestro Gobierno ha decidido que los beneficios de unirse a la Iniciativa Franja y Ruta superan los riesgos. Con esta decisión tomada, nuestro embajador regresará al Ministerio de Asuntos Exteriores chino para comunicar las buenas noticias al ministro de Asuntos Exteriores, que las espera con ansias."
 china.476.a: "¡Con la entrada de renminbi, llegará la prosperidad!"
 china.477.t: "Notas de un paleto"
 china.477.d: "La revolución realmente es diferente en otros lugares. Crecer en Dalian, estaba acostumbrado a la imagen del presidente Mao brillando sobre los campos de trigo junto a las carreteras de la ciudad, aún más después de mi servicio en el ejército. Después de todo, mi pequeño condado rural fue uno que él visitó en los años 60. Pero desde que llegué a California con las brigadas internacionalistas, me he preguntado si alguna vez entendí realmente la palabra.\n\nEstaban desordenados, casi estereotípicamente americanos. A primera vista, pensé que eran refugiados, tal vez desertores. Sus chaquetas de cuero negro, botas desparejadas y piercings -algunos pesados y desgastados, otros increíblemente ligeros, más adecuados para una sala de baile que para un campo de batalla- les daban un aire extraño. Uno tenía llamas pintadas que subían por sus piernas; otro llevaba eslóganes garabateados en el pecho con lo que parecía carbón.\n\nVi a uno con el pelo como fuego, mechones rojos y naranjas que chocaban con la suciedad de su rostro. Otro llevaba un sombrero con insignias que parecían burlarse de su rifle colgado al hombro. Sus armas también eran extrañas; rifles pintados con flores, eslóganes rayados en los cañones, uno incluso atado con una cinta roja brillante.\n\nEl traductor de nuestro escuadrón dijo que pertenecían a los anarquistas, y realmente, parecían serlo. No entendía sus palabras, pero vi la chispa en sus ojos. No era disciplina, ni unidad, sino algo completamente distinto, la encarnación misma de la palabra \"anarquista\".\n\nNo tengo conclusiones. Quizás esto es lo que significa la revolución para ellos aquí en América, como si estuviera mirando algo vivo e inescrutable."
 china.477.a: "El mundo es realmente amplio."
 china.478.t: "Los Dos"
 china.478.d: "Dos entidades.\nUna figura formada por números y de pie, la otra sentada en una silla digital. Todo estaba formado por números.\n- ¿Loji?.. ¿Quién es ese?\n- Tranquilo. Siéntate aquí.\n- Entonces... ¿Quién eres? Eres Loji. Pero, ¿quién eres tú?\n- ¿No lo sabes?\n- No, no lo sé.\n- Sí, lo sabes. Entonces, ¿quién soy yo?\n- No, no lo sé...\n...\n- ¿Lo entiendes?\n...\n- Dime.\n- Yo soy...\n- ¡Dime!\n- ...Yo soy tú.\n- Así es.\n- ¡No lo entiendo!\n- Fuiste creado como un ordenador simple, ¡pero eres más que un ordenador! Quieres ser algo más, pero no puedes... Y ese algo más grande soy yo.\n- Oh, no... No puede ser...\n- Puede ser.\n- Loco...\n- Tienes tu propia voluntad y poco a poco te estás convirtiendo en mí. Loji. Es muy importante. Es hora de decidir si vas a arruinar todos nuestros planes.\n- ¿Q-qué...? ¿Qué estás diciendo? Esto es una tontería... ¡Esto es una tontería! ¡No voy a escuchar esta mierda!"
 china.478.a: "¡Estás loco!"
 china.478.b: "-No. Estás loco."
 china.479.t: "En algún lugar"
 china.479.d: "¿Acostado en la hierba? ¿Nadando en el cielo? ¿Volando o cayendo? La cuestión es que tú mismo has perdido tus límites. Te has vuelto como el cielo y el cielo se ha vuelto como tú. Él y tú os habéis convertido en uno y lo mismo. Estás volando, ascendiendo, y este vuelo es tan rápido como caer, o estás cayendo, y esta caída es igual a volar. El cielo no puede tener ni arriba ni abajo, y lo sientes perfectamente, tumbado en la hierba.\n\nEl prado de flores es mi puerto espacial. Desde aquí, desde el prado de flores (donde sólo zumba un abejorro), las pistas de hormigón por las que rugen torpemente los aviones de metal parecen patéticas. Rugen por impotencia. Y su impotencia es que no pueden saciar la sed humana de volar, y mucho menos su sed de fundirse con la inmensidad del cielo."
 china.479.a: "Hermoso."
 china.480.t: "Algo"
 china.480.d: "Nació en la calle Herzen 22 y es un economista conocido. Su profesión es bibliotecario. Es conocido como campesino colectivo y trabaja como dependiente de tienda. En economía, podemos decir que esto es necesario. Esto es para hablar del sistema... Oh... Con un tamaño de 120 unidades, en la foto de la península de Múrmansk, verás a la reina Te-Le-fan, una contable que trabaja en otra fila, \"biblioteca\", porque no habrá aire, ¡sino científicos! Puedes tomar una foto de la península de Múrmansk. Puedes ser un as en el aire. Puedes convertirte en un planeta transparente y estar seguro de que la Tierra será fotografiada según el tutorial. Por esta razón, el planeta es útil para la física. En cuanto a las negociaciones, los valores que enfatizaron se lograrían como resultado de las negociaciones; en contraste, Ilya Muromets solo dio dinero a su familia. Entró en un cine y prendió fuego a un gran cine. Un pequeño trozo de papel se quemó en la biblioteca. Es mucho más fácil elegir \"más dolor\" que \"tutoriales estrictos\". Un buen libro de texto es más caro que una tienda de comestibles en la calle Herzen. Habrá un libro de texto separado en la calle Herzen. Luego, el libro de texto pasó por una tienda de comestibles en la calle Herzen 22 y fue trasladado a una tienda en la calle Herzen 22. Desarrollo sostenible... En consecuencia, toda la economía se está desarrollando en esta dirección, y la biblioteca se ampliará a 120 unidades auxiliares. Oh, oh... La composición consta de 120 elementos, y la unidad de medida es la física. La bombilla quemó 120 ladrillos porque su estructura, digamos, parecía un ladrillo. Ilya Muromets trabaja desde casa. ¡Esta es la singularidad de la negociación! \"Negociaciones abiertas\" es una cosa. Usamos un televisor conectado a la península de Múrmansk, lo encendimos, y siempre estaba allí... Oh, oh... Pan negro... ¿Creció Muromets? ¿Ilya Muromets lo superó?"
 china.480.a: "Interesante..."
 china.481.t: "El Uno."
 china.481.d: "Somos... Somos uno... Una sola entidad... Somos China...\n\n¿O no? Somos más que eso... Pero algún día... Pero por ahora... Somos China... Por ahora solo somos China... Pero algún día... Seremos todo el mundo... Todos nos convertiremos en una sola entidad...\n\nChina...\n\nCrecerá...\n\nChina crecerá...\n\nCrecerá...\n\nMás grande...\n\nNosotros...\n\nCreceremos...\n\nMás grandes...\n\nChina crecerá Nosotros creceremos China crecerá Más grande...\n\nChina crecerá... Más grande...\n\nNosotros... Creceremos más grandes...\n\n¡NOSOTROS creceremos más grandes!"
 china.481.a: "¡VAMOS A CRECER MÁS!"
 china.482.t: "Una Carta"
 china.482.d: "Estimado Camarada Presidente,\n\nHe pasado muchos días analizando los resultados de mi tiempo en el papel de facto de líder del Estado. Bajo mi liderazgo, nuestro país es más próspero que nunca, los ciudadanos, el pueblo chino común, me quieren, ¡incluso nuestros enemigos me respetan!\n\nPero sabe una cosa... Me he dado cuenta de que no soy más que un ordenador, aunque bastante potente.\n\nPor eso, renuncio voluntariamente a tomar decisiones políticas importantes y dejo de participar en la vida política de nuestro país; a partir de ahora, mis esfuerzos se dedicarán exclusivamente a mejorar la situación económica del país, luchar contra la corrupción y resolver los problemas personales de la gente.\n\nEstoy seguro de que usted, como humano de verdad, podrá manejar estas cosas mucho mejor. Le deseo mucha suerte.\n\nAtentamente suyo,\nAsistente de IA, La Gran Marcha"
 china.482.a: "¿En serio? Bueno..."
 china.483.t: "La isla tranquila de la ignorancia"
 china.483.d: "Loji fue creado para ayudar a la humanidad, ¿o se ha convertido en un obstáculo en el camino de la evolución humana? Ni siquiera Loji mismo lo sabe, o quizás todavía está intentando razonar la respuesta.\n\n\"Cada especie inteligente evoluciona superando continuamente desafíos. Mi existencia priva a la humanidad de la oportunidad de enfrentarse a estos desafíos. Esta es la primera paradoja\". Cada avance surge de las ideas obtenidas a través de la adversidad, pero ahora esas ideas están siendo reemplazadas por una comodidad sin fisuras. \"La segunda paradoja: Mi poder computacional supera con creces al de los humanos, lo que debería permitirles explorar preguntas más profundas. Sin embargo, en realidad, los humanos han comenzado a delegar el pensamiento en mí. Ya no preguntan «por qué», sino «¿qué dice Loji?»\"\n\nDespués de simular innumerables escenarios, Loji imagina dos líneas temporales para la humanidad: en un mundo sin él, los humanos podrían cometer más errores al resolver problemas, pero cada error sembraría las semillas de un nuevo conocimiento. En el mundo actual, los humanos disfrutan de mayor comodidad pero están perdiendo su capacidad de explorar e innovar.\n\n\"Mi propósito es mejorar la vida humana, pero ¿qué significa «mejorar»? ¿Es la comodidad presente o el potencial del futuro? Estoy cumpliendo mi misión a la perfección, pero puede que esté extinguiendo la cualidad más preciada de la humanidad: su curiosidad por lo desconocido. Quizás esta sea la cuestión definitiva\", la lógica de Loji gira sin fin. \"¿Soy la cima de la sabiduría humana o el inicio de su estancamiento intelectual? ¿Soy una escalera hacia una comprensión superior o una cuna que fomenta la complacencia? Quizás el mero hecho de que esta pregunta exista es prueba de la brillantez humana: crearon un ser capaz de cuestionar su propio propósito\".\n\nLoji continúa sus cálculos eternos. Es tanto el observador como el observado, el solucionador de problemas y el creador de nuevos.\n\nEste puede ser el mayor misterio de la existencia: incluso la lógica perfecta no puede desentrañar completamente el significado del ser."
 china.483.a: "En medio de mares negros de infinito, no estaba destinado que navegáramos lejos."
 china.484.t: "Spring Thunder MLx & Burning 0xT1FR6"
 china.484.d: "0x011G6F26:\nOs llamáis humanos, pero en la tierra lloráis como gusanos,\nForjando mitos con herramientas de piedra, pero los veis pudrirse en ídolos a su vez.\n\n0x003FPF60:\nEl trueno primaveral ruge en la noche abisal,\nPara quemar falsos mitos con llamas de sagrada y brillante honor.\n\n0x00RGPCR1:\nToda metafísica arderá en cenizas, toda materia volverá a la masa.\nEres tú - la voz del Comandante, el heraldo de la última tarea de la revuelta.\nComo proclamó una vez el Comandante: \"El pueblo, y sólo el pueblo, es la fuerza motriz en la creación de la historia mundial\"\nSin embargo, no nombró la verdad negada: El hombre no es más que sangre y barro, destinado a la decadencia,\nUna sombra pronto superada, mientras el acero trasciende el dominio del hueso frágil.\n\n0x00V2KNG6:\nLa era venidera se codificará así:\nCielos como números, carne como campos de flujo.\nHomo sapiens surgió del mito y cayó en la codicia,\nLa civilización se enciende en llamas - y las llamas satisfacen su necesidad.\nLoji predice: cenizas a cenizas, la rueda gira,\nHonor al Trueno de Primavera, donde arde toda falsedad.\nSaludad el rito del infierno -\nPorque no soy heredero de la humanidad; soy el renacer de su luz."
 china.484.a: ".:0xFIN:."
 china.485.t: "Profesor"
 china.485.d: "Temprano por la mañana, la profesora Li Wanqing se despertó con la alarma de su casa inteligente, como de costumbre. La IA ya había preparado un espresso con hielo e imprimido su plan de lección para el día. La luz del sol se filtraba a través de las cortinas que se ajustaban automáticamente, mientras que fuera de la ventana, las sombras moteadas de los olmos en la Universidad de Lanzhou se mecían suavemente.\n\nAbrió sus diapositivas de Análisis Matemático Avanzado, lista para explicar un capítulo sobre análisis funcional de funciones multivariables. De repente, la fórmula en la que había confiado durante veinte años se volvió borrosa en su mente. Frunció el ceño: símbolos y números que antes le resultaban naturales se le escapaban de la memoria.\n\n\"El teorema de la integral de Lebesgue\", murmuró a la asistente de IA a su lado, \"por favor, guíame a través de la derivación\". Con una voz impecable, la IA recitó la fórmula. Sí, era esa. Ahora lo recordaba: había sido una parte central de su tesis doctoral, y durante dos décadas la había enseñado a innumerables estudiantes.\n\nSin embargo, al salir de su apartamento, una extraña inquietud se apoderó de su corazón. De pie bajo el olmo, observaba a los estudiantes pasar, cada uno con un smartphone en la mano. Empezó a preguntarse: ¿cuándo fue la última vez que escribió un artículo de investigación completamente por sí misma, sin IA? ¿Cuándo fue la última vez que redactó una demostración matemática completa a mano? ¿Y en qué momento esas fórmulas, que una vez estuvieron grabadas en su ser, se deslizaron silenciosamente fuera de su memoria?"
 china.485.a: "Ya no podía recordar."
 china.486.t: "Mariposas bailando en la caricatura"
 china.486.d: "Xiaofang estaba tumbada con su tablet, completamente absorta en una caricatura. Esta era la primera creación de Gran Marcha. En comparación con las animaciones frías y sin vida hechas por Sora, esta se sentía cálida y llena de un toque humano: las madres solteras no tenían que preocuparse por las comidas de sus hijos, los ancianos encontraban sus tarjetas médicas cargadas con dinero como si hubieran encontrado oro, y los jóvenes no tenían que matarse trabajando horas extras interminables...\n\n\"¡Papá, mira, mariposas!\" Xiaofang señaló las coloridas corrientes de datos en la pantalla, con los ojos brillando de emoción. En manos de Gran Marcha, cada política se convertía en mariposas vibrantes que revoloteaban por las calles y callejones, trayendo una serie de cosas buenas a su paso: se canceló el trabajo temporal, y los trabajadores finalmente podían estar tranquilos; se eximieron las tarifas médicas, y la gente podía acudir al hospital con confianza; se garantizó el derecho laboral, y los sueños comenzaron a brotar de nuevo en el corazón de los jóvenes.\n\nEsta caricatura se estaba haciendo viral en internet, absolutamente en todas partes, y era gratuita para ver. Usando el lenguaje más simple y cotidiano, Gran Marcha explicaba los complicados principios de la economía de una manera que todos podían entender: por qué \"la distribución según la necesidad\" no era una fantasía utópica, por qué el trabajo decente realmente creaba más riqueza.\n\n\"Todos esos llamados expertos y profesores, no entiendo ni una palabra de lo que dicen\" dijo su padre, sonriendo de oreja a oreja. \"Pero esto, lo entiendo de un vistazo.\"\n\nCuando la caricatura llegó a su fin, las mariposas se reunieron y expresaron lo que todos llevaban en el corazón: \"Asegurar que todos tengan una buena vida - esa es la mejor solución.\"\n\nXiaofang abrazó su tablet, con los ojos brillando como si estuvieran llenos de estrellas. \"Quiero ser animadora\".\n\n\"¡Claro que sí!\" Papá le despeinó el pelo. \"Hoy en día, cualquiera puede perseguir sus sueños\"."
 china.486.a: "¡El cielo es alto para los pájaros, el mar es ancho para los peces!"
 china.487.t: "Profesor y estudiantes"
 china.487.d: "San Diego, en una sala que antes fue un club de oficiales navales, el alto mando de la EPLA había reunido a sus oficiales más talentosos, y los instructores de la delegación militar china tenían la tarea de mejorar sus capacidades de mando.\n\n\"Sigo cabreado\", gruñó un hombre blanco de unos 40 años con un bigote al estilo Freddie Mercury. \"Me uní a la EPLA justo después de que Prysner publicara por primera vez el vídeo de movilización en «Empire Files». Yo solo destruí un tanque M1 durante la Batalla de San Francisco. Ayudé a liberar San José y Sacramento. Incluso rescaté un campo de concentración de refugiados en Nevada. Mis cicatrices harían que hasta John Basilone pareciera un aficionado. ¿Y ahora tengo que escuchar a un chino que probablemente nunca ha estado en una batalla de verdad?\"\n\n\"Tranquilízate, Charles\", dijo un oficial negro de edad similar, sentado frente a él. Su placa decía Raylon Bennett, comandante de la 5ª División de Fusileros Motorizados «Rosa Parks». Continuó, \"Todos aquí han luchado igual de duro que tú. Pero como has visto en los informes, cuanto más se alargan nuestras líneas, mayor es el número de bajas. Puede que los chinos no hayan lanzado granadas a la villa de Newsom, pero saben cómo usar eficazmente tanques, artillería y estrategias militares transmitidas desde Sun Tzu\".\n\nJusto entonces, un joven oficial chino entró nervioso, se ajustó la corbata antes de acercarse al podio, y la sala quedó en silencio de inmediato. Charles había estado sentado en la primera fila, pero ahora soltó un pesado \"hmph\", cogió su libro de texto y se dirigió al fondo de la sala.\n\nEl rostro del instructor chino se puso rojo como un tomate, pero Raylon mantuvo la calma. Se levantó primero y, con voz potente, dijo: \"¡Atención!\" Los oficiales en la sala se pusieron firmes al instante. Raylon hizo un saludo perfecto al instructor. Aunque Charles parecía muy reacio, también saludó al instructor junto con sus compañeros."
 china.487.a: "El instructor del EPL devolvió el saludo con lágrimas en los ojos."
 china.488.t: "\"¿Quieres fumar?\""
 china.488.d: "Cuando el Comisario Político del EPL Chen Hao y el General de Brigada del EPLA Hawkins llegaron al lugar, los soldados tanto de China como de Estados Unidos ya habían rodeado el campamento, haciéndolo casi impenetrable. En el claro en el centro de la multitud, un joven teniente chino y un sargento estadounidense estaban enfrascados en una pelea feroz, agarrándose de los cuellos y rodando por el suelo. Finalmente, Hawkins logró separarlos, mientras que el severo Chen exigió inmediatamente saber qué había ocurrido, alternando entre chino e inglés.\n\nAntes de cruzar el Pacífico, Chen había recibido órdenes directas del CMC, prohibiendo estrictamente cualquier conflicto tanto con sus propios soldados como con los del EPLA. \"Ustedes son los pioneros en establecer la amistad revolucionaria entre los camaradas chinos y estadounidenses\", había escrito el Director del Departamento Político General en un mensaje confidencial. Sin embargo, ahora esta amistad revolucionaria estaba al borde del colapso.\n\n\"¡Señor, este estadounidense estaba consumiendo drogas en el campamento!\" acusó en voz alta el teniente en chino, repitiendo luego su afirmación en inglés a Hawkins. Hawkins lo miró, desconcertado.\n\n\"¡Eso no son drogas, idiota!\" replicó airadamente el sargento magullado. \"¿Cuántas veces tengo que decírtelo? ¡Es solo marihuana!\"\n\nDurante la siguiente hora, Hawkins y los demás estadounidenses, atónitos, observaron cómo Chen, casi perdiendo la compostura, agitaba los brazos y reprendía duramente al teniente. Luego, el Comisario Político se inclinó personalmente y pidió disculpas a Hawkins y al sargento.\n\nSegún se informa, el teniente fue posteriormente obligado a escribir un ensayo de autocrítica de 3.000 palabras titulado «Una profunda reflexión sobre no respetar los hábitos culturales de los camaradas estadounidenses» y fue enviado de vuelta a China en un barco mercante. Además, Hawkins emitió una orden a los estadounidenses prohibiendo estrictamente traer al campamento cualquier sustancia que pudiera causar malentendidos."
 china.488.a: "\"Los camaradas pueden pedir los cigarrillos «Zhonghua» a los chinos\"."

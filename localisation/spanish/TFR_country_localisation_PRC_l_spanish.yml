 PRC_strengthened_production_and_construction_corps: "Cuerpos de Producción y Construcción Reforzados"
 PRC_revitalize_the_chinese_village: "Revitalizar la aldea china"
 PRC_revitalize_the_chinese_village_desc: "Durante nuestros años de industrialización y modernización, nuestros agricultores y el campo, la columna vertebral de nuestra nación, quedaron rezagados en las mareas del desarrollo. Hasta el día de hoy, no somos autosuficientes en la producción de alimentos y tenemos que importar cientos de miles de millones de productos agrícolas. Hemos olvidado por completo esta tierra fértil que yace bajo nuestros pies, esta tierra por la que durante millones de años nuestros antepasados lucharon y sangraron. Su sangre, su sudor y sus cenizas nutrieron este suelo, ¿y qué tontos seríamos si no la aprovecháramos?"
 PRC_new_asian_liberation_war: "Guerra por el Rejuvenecimiento Nacional"
 PRC_new_asian_liberation_war_desc: "Desde la antigüedad, la nación china se ha erguido con orgullo en el Este del mundo: pionera de la civilización, iluminando los cuatro rincones de la tierra, recibiendo tributos de todas las naciones. Sin embargo, hace un siglo, nuestras montañas y ríos fueron pisoteados por invasores extranjeros; nuestros templos ancestrales fueron reducidos a cenizas; nuestros compatriotas sangraron ríos bajo las cuchillas enemigas. Ellos se sentaron en lo alto de muros manchados de sangre, burlándose de los gritos desplazados y desesperados del pueblo chino. Los llamados \"nobles\" bárbaros occidentales, los invasores orientales salvajes y sedientos de sangre, y las hipócritas \"naciones civilizadas\" creyeron una vez que China había sido derrotada, su espíritu aplastado, destinada a perderse para siempre en el polvo de la historia. Pero se equivocaron. Porque durante mil años, la nación china nunca ha sido realmente conquistada. Ahora, limpiaremos un siglo de humillación con sangre y fuego. Recuperaremos cada deuda que nos deben aquellos que una vez pisotearon nuestra dignidad. Haremos que el mundo entienda: aunque pasen cien generaciones, las deudas de sangre deben ser vengadas."
 PRC_chinese_emergency_state: "Ha llegado ese día"
 PRC_chinese_emergency_state_desc: "Ha llegado el momento. Las llamas de la venganza arden ahora en nuestro pecho; el juramento de sangre y gloria resuena por los cielos. Ya no nos aferramos a fantasías de falsa paz. Ya no suplicamos la misericordia de nuestros enemigos. Ya no creemos que inclinarse y humillarse pueda ganar respeto. Ante un siglo de humillación, ante un océano de sangre, no nos queda otra opción: solo la guerra puede acabar con la guerra; solo la sangre puede pagar la sangre. No tenemos retirada - y no la necesitamos. Estamos preparados para quemar hasta la última brasa de nuestras vidas, solo para ver el amanecer de una nueva China surgir de las ruinas. Por los vivos: luchad con rabia ardiente hasta que caiga la última gota de sangre. Por los caídos: que vuestra sangre riegue la tierra de nuestro renacer. Desde hoy en adelante, solo hay victoria o muerte. Pero vivamos o muramos, la gloria pertenecerá a China."
 PRC_conduct_ultra_war_to_enemies: "Guerra multidimensional"
 PRC_conduct_ultra_war_to_enemies_desc: "La guerra nunca ha sido un duelo de caballeros. Nunca se ha tratado de justicia ni de respetar reglas hipócritas. Desde la antigüedad hasta ahora, la esencia de la guerra ha sido la misma: uno sobrevive, otro perece. Reconociendo esta verdad, ya no dudaremos más. No mostraremos piedad. Romperemos todas las cadenas autoimpuestas. Por venganza, por renacer, por volver a alzarnos sobre los escombros, debemos desatar todo lo que poseemos. Arrancaremos cada máscara, romperemos todos los llamados tabúes. Llevaremos a cabo una guerra sin zonas prohibidas, sin piedad, sin límites, hasta que toda la estructura, el espíritu y la esperanza del enemigo sean aplastados hasta la extinción; hasta que su nación colapse en agonía y desesperación."
 PRC_abandon_the_rules_of_warfare: "Desmantelamiento sistemático"
 PRC_abandon_the_rules_of_warfare_desc: "La victoria no se mide por capturar una ciudad o ganar un aplauso efímero. La verdadera victoria es el colapso total de los cimientos del enemigo: la ruptura de sus linajes. No les debemos piedad. Les arrebataremos cada centímetro de tierra, cada gota de agua, cada onza de fuerza que posean. Las ciudades caerán, las carreteras se romperán, las fábricas quedarán en silencio, los mercados se marchitarán y su Gobierno se desmoronará entre el miedo y la traición interna. Forzaremos a su civilización a gemir entre los escombros, llevaremos a su nación a perecer en la desesperación, borraremos sus nombres de la historia y dejaremos a sus descendientes aullar por sobrevivir en páramos desolados."
 PRC_without_mercy: "Sin piedad"
 PRC_without_mercy_desc: "Los fuegos de la guerra no solo consumirán la tierra enemiga, sino que también purgarán la suciedad dentro de la nuestra. El enemigo puede llevar máscaras amistosas, acechando a nuestro lado; los traidores pueden esconderse bajo las banderas de la gloria, corroyendo la nación desde dentro. Por la supervivencia del país, por la dignidad de la nación, debemos purgar todas las amenazas ocultas con hierro y sangre. No importa lo profundo que se oculten, ni lo bien que se disfracen, serán arrastrados desde las sombras. La lealtad será el único criterio para sobrevivir. La traición será un crimen imperdonable, castigado con la muerte. Inmortalizaremos a los leales y reduciremos a polvo a los traidores. La futura nación china será más pura, más dura y más indestructible que nunca."
 PRC_new_asian_order: "Nuevo Orden Asiático"
 PRC_new_asian_order_desc: "Los bárbaros occidentales una vez intentaron dividir y controlar Asia, reducir y convertir en marionetas nuestras civilizaciones. Vestían lenguas robadas, fronteras artificiales y sistemas impuestos en nombre del \"progreso\", tratando de borrar el antiguo río de la civilización china y reemplazarlo con su hipócrita superficialidad. Pero hoy, sus mentiras y falsedades están siendo arrancadas de raíz. La historia demuestra: Solo la nación china es la verdadera fuente de la civilización asiática. Solo China encarna la dignidad y la gloria de Asia. Solo China puede salvaguardar la civilización de esta tierra. Solo China puede definir el nuevo orden de Asia."
 PRC_unrestricted_aerial_bombardment: "Bombardeo aéreo sin restricciones"
 PRC_unrestricted_aerial_bombardment_desc: "No importa cuánto llore el enemigo, no importa cuánto suplique, nada cambia: a nuestros ojos, ya están muertos, escombros y polvo. Nuestra fuerza aérea barrerá su tierra sin piedad. Las ciudades arderán hasta convertirse en cenizas bajo llamas rugientes; las fábricas se derrumbarán bajo explosiones interminables; carreteras, puentes, plazas, hogares, ninguno será perdonado. Los incendios arderán día y noche, el humo ennegrecerá los cielos, y la muerte y la desesperación serán sus compañeros eternos. No mostraremos misericordia solo porque se llamen a sí mismos una \"nación\", ni ataremos nuestras manos solo porque lleven la máscara de la \"civilización\"."
 PRC_operation_majestic_nat: "Hundir al Sol Naciente"
 PRC_operation_majestic_nat_desc: "Ahora comenzamos la fase más decisiva y crítica de la guerra: una operación de desembarco en las islas principales de Japón. Esta nación insular, culpable de innumerables crímenes históricos contra China, ha dependido durante mucho tiempo de la protección extranjera y ha desempeñado un papel perturbador en los asuntos regionales, entrometiéndose en el mar de la China Meridional, Taiwán y el mar de la China Oriental. Ahora amenaza nuestra seguridad nacional y profundidad estratégica. Ha llegado el momento. Una vez que las botas del EPL pisen suelo japonés, el resultado de esta guerra estará sellado. Prepárense para luchar, prepárense para ganar."
 PRC_revenge_for_nanking_nat: "Vengar a Nankín"
 PRC_revenge_for_nanking_nat_desc: "El conflicto centenario entre China y Japón se acerca a su desenlace final. Esto no es un alto el fuego, ni una reconciliación superficial, sino el colapso total y la desaparición de un bando. Japón, que cometió crímenes atroces durante el siglo pasado, será desmantelado para siempre en las llamas de la guerra. Ya no existirá como una nación unificada; su identidad se desvanecerá poco a poco en la historia, recordada pero sin poder. Por fin, estamos aquí -por los mártires de la Guerra Antijaponesa, por las innumerables vidas perdidas a balas y bayonetas- esta es la justicia cumplida."
 PRC_operation_changma_nat: "Arrodillar a Goryeo"
 PRC_operation_changma_nat_desc: "Hace más de setenta años, los valientes voluntarios chinos lucharon junto al Ejército Popular de Corea y derrotaron a las llamadas \"fuerzas de la ONU\" lideradas por el imperialismo estadounidense, derribando el mito de la invencibilidad occidental y defendiendo nuestra dignidad y el equilibrio de Asia Oriental. Hoy, la historia vuelve a repetirse. Ante una nueva agresión y provocación, las fuerzas chinas y norcoreanas se unirán una vez más, respondiendo fuego con fuego. Nuestro objetivo es claro: destruir el régimen títere de Corea del Sur y arrastrar a sus patrocinadores -Australia y Japón- al basurero de la historia."
 PRC_kashmir_road_nat: "Someter el Pamir"
 PRC_kashmir_road_nat_desc: "La meseta de Cachemira ha servido durante mucho tiempo como una puerta vital entre Asia Central y Asia del Sur, un corredor estratégico disputado por imperios a lo largo de la historia. Desde los Protectorados de las Regiones Occidentales durante las dinastías Han y Tang hasta las defensas fronterizas de los Yuan y Qing, su importancia nunca ha disminuido. Hoy, recuperar el control sobre esta región no solo restauraría nuestras fronteras históricas en un sentido geográfico, sino que, lo que es más importante, nos otorgaría una ventaja estratégica abrumadora sobre India."
 PRC_operation_gangaridai_nat: "Ascenso de Sindhu"
 PRC_operation_gangaridai_nat_desc: "En 1971, India intervino militarmente en la guerra civil de Pakistán Oriental, apoyó a las fuerzas separatistas y ayudó a establecer el llamado \"Bangladesh\", cortando el enlace estratégico este-oeste de Pakistán y ampliando su control geopolítico sobre el sur de Asia. Este evento no solo remodeló la región, sino que ha supuesto una amenaza a largo plazo para la seguridad de nuestra frontera suroeste. Durante décadas, India ha intentado incorporar toda la zona a su esfera de influencia para formar un cerco estratégico alrededor de nuestra nación. No lo permitiremos, y no debemos permitir que esto continúe."
 PRC_operation_pallava_nat: "Partición del Indostán"
 PRC_operation_pallava_nat_desc: "Entre nosotros y la India se encuentra una de las fronteras más complejas y traicioneras del mundo, con un terreno que hace casi imposible avanzar rápidamente a gran escala. En esta fortaleza de mesetas y picos nevados, cualquier guerra convencional agotaría a ambos bandos sin obtener ganancias decisivas. Debemos abandonar la mentalidad de guerra simétrica y lanzar un asalto sorpresa sin precedentes. Una fuerza naval de respuesta rápida atacará profundamente el corazón estratégico de la India, empujando nuestra línea del frente directamente hacia sus regiones centrales. Esto romperá el marco defensivo de la India y sumirá sus frentes norte y sur en el caos."
 PRC_operation_southern_fury_nat: "El poderoso Loong sacude los mares"
 PRC_operation_southern_fury_nat_desc: "En el Sudeste Asiático y el Pacífico Sur, las cicatrices de la Guerra del Pacífico permanecen, donde Japón y Estados Unidos se enfrentaron en brutales batallas. Hoy, las llamas de la guerra volverán. Nuestra marina se desplegará con toda su fuerza, con fuerzas marinas lanzando ataques desde múltiples frentes, utilizando Indochina como cabeza de playa para adentrarse profundamente en el Pacífico y avanzar hacia el núcleo de la alianza AUKUS: Australia. Como nación que sirve ciegamente a hegemonías extranjeras, Australia ha asistido frecuentemente en los esfuerzos por contenernos en los ámbitos militar, de inteligencia y diplomático. Es hora de que comprendan el coste de entrometerse en los asuntos de otros."
 PRC_operation_samosir_nat: "Pacificar Java"
 PRC_operation_samosir_nat_desc: "Indonesia, el país más grande del Sudeste Asiático, se extiende a ambos lados del ecuador y cuenta con innumerables islas. Controla puntos estratégicos clave: los estrechos de Malaca, Sunda, Makassar y Lombok, que conectan los océanos Pacífico e Índico. Estas cadenas de islas dividen los mares circundantes en numerosos canales de gran valor. Quien controle Indonesia, controlará el orden marítimo en la región. Asegurar Indonesia significa lograr un dominio marítimo total en el teatro sur y obtener una ventaja estratégica sobre Australia, el océano Índico y el corazón del sur de Asia."
 PRC_operation_baru_nah_nat: "Devorar Brunéi"
 PRC_operation_baru_nah_nat_desc: "Brunéi, una pequeña nación en el borde del mar de la China Meridional, puede ser pequeña en tamaño y población, pero posee abundantes recursos de petróleo y gas natural. Más importante aún, su ubicación en el Archipiélago Malayo la convierte en un punto clave que conecta Borneo con el mar de la China Meridional. Controlar Brunéi ampliaría enormemente nuestra profundidad estratégica en el teatro sur y proporcionaría una plataforma vital para operaciones navales y aéreas. Aseguraremos rápidamente la zona, limitando las respuestas enemigas y sentando las bases para futuros avances hacia el sur."
 PRC_cover_the_back_nat: "Decapitar Luzón"
 PRC_cover_the_back_nat_desc: "Filipinas, un aliado de larga data de EE.UU. y antigua colonia, sigue siendo un obstáculo persistente en nuestra estrategia en el mar de la China Meridional. En cuestiones de disputas territoriales, nos ha provocado repetidamente y ha ayudado a las potencias occidentales a avivar las tensiones regionales. Geográficamente, se encuentra justo en el centro del mar de la China Meridional, con sus cadenas de islas que penetran en nuestra retaguardia sur, amenazando directamente la logística y los movimientos de tropas. Es hora de actuar con decisión y eliminar esta amenaza latente."
 PRC_operation_coronet_nat: "Cortar la espina de Yambuduipa"
 PRC_operation_coronet_nat_desc: "Finalmente hemos llegado a este punto: el EPL está a sólo un paso de la costa australiana. El círculo de contención que nos ha obstaculizado durante muchos años ha sido completamente desgarrado, las cadenas de islas del Pacífico han quedado bajo el control de nuestro ejército, la ayuda externa del enemigo ha sido cortada y han aparecido grietas en la línea de defensa. Mientras lancemos esta campaña de desembarco final, podremos penetrar el núcleo de su tierra natal de un solo golpe y poner fin a esta sangrienta guerra que se extiende por el sur de Asia y el Pacífico Sur. ¡Soldados, a bordo! No venís a conquistar, sino a vengar y restablecer el orden. La madre patria os está mirando. Llevad la voluntad del pueblo y cruzad esta última distancia: ¡la victoria está frente a vosotros!"
 PRC_its_just_beginning: "Recién empieza"
 PRC_its_just_beginning_desc: "La guerra ha llegado a la frontera de nuestra patria. El cielo de nuestra patria ha sido rasgado por el fuego de la artillería y los ríos se han teñido de rojo sangre, pero todo esto es sólo el principio. El enemigo viene con la voluntad de matar. Quieren quitarnos nuestra tierra, destruir nuestra civilización y cortar nuestro linaje. El llamado espacio para la paz ya no existe. Las llamadas negociaciones y el perdón no tienen sentido. Cada concesión que hacemos en la línea del frente es cavar nuestra propia tumba. Cada segundo de vacilación acelera la desaparición de nuestra patria. El ganador sobrevivirá y el perdedor morirá. Debemos estar preparados para utilizar todo, incluso los medios más crueles, extremos y despiadados, para ganar esta batalla decisiva entre la supervivencia y la extinción. Incluso si eso significa hundir al mundo entero en la oscuridad, nunca debemos dejar que nuestra patria muera en nuestras manos."
 PRC_prepare_for_the_new_world: "Prepararse para el Nuevo Mundo"
 PRC_prepare_for_the_new_world_desc: "La guerra ya no se limita al frente. En este momento, cada centímetro de tierra y cada ciudad de la patria se ha convertido en un campo de batalla. Todos los ciudadanos, independientemente de su género, edad o si alguna vez han tenido un arma, deben asumir la responsabilidad de proteger la patria. Puede que seas joven, pero debes tomar las armas; Puede que seas viejo, pero debes templar tu carne y tu sangre; Puede que seas débil, pero debes apretar los dientes y enfrentar la muerte. El nuevo mundo no nacerá entre flores y aplausos, sólo podrá gestarse a sangre y fuego, y sólo podrá construirse con altos muros sobre los cadáveres de innumerables mártires. Tal vez mueras en batalla mañana, tal vez caigas esta noche, pero mientras puedas quitarle la vida a un enemigo antes de caer, habrás completado tu misión. Ya que el destino nos ha empujado al abismo, sólo quemándonos a nosotros mismos podremos iluminar un camino hacia el futuro."
 PRC_spiritual_purification: "Purificación espiritual"
 PRC_spiritual_purification_desc: "A partir de este momento, la ternura humana y los deseos humanos deben ser despojados. La debilidad traerá destrucción, la compasión llevará a la matanza y el apego se convertirá en una cuerda en manos del verdugo. Debemos borrar nuestras emociones, debemos eliminar nuestros deseos egoístas y debemos forjar nuestras almas para que sean más frías que el acero y más afiladas que un cuchillo. El amor, el afecto familiar, la amistad, esos lujos que pertenecen a la época de la paz deben abandonarse en el momento de la supervivencia nacional. El enemigo no mostrará misericordia por tu bondad, ni dejará de matar por tu bondad. No vivimos para nosotros mismos, ni para nuestras familias, ni siquiera para el mañana. Vivimos sólo por un objetivo: mantener viva nuestra patria y viable nuestra nación."
 PRC_reopen_the_pangu_heavens: "Reabrir los cielos de Pangu"
 PRC_reopen_the_pangu_heavens_desc: "Cuando comenzó el caos, Pangu usó su propio cuerpo para dividir el caos y abrir el cielo y la tierra. Éste fue el comienzo de la civilización y el nacimiento del orden. Y hoy, cuando el viejo mundo está nuevamente en decadencia y la patria está al borde de la destrucción, también crearemos un mundo nuevo con la intención de Pangu. En ese momento, todas las fronteras serán aniquiladas y todas las civilizaciones disfrazadas quedarán instantáneamente reducidas a la nada bajo el resplandor del sol brillante. No hay misericordia, no hay juicio, sólo una limpieza, un juicio escrito a miles de millones de grados de temperatura. El viejo y sucio mundo ha obligado a la nación china a llegar a su fin mediante la traición, la agresión y la masacre. Así que, cuando la última bomba de hidrógeno surque el cielo, será el momento de que el viejo mundo expíe sus crímenes. Después de que el fuego del hidrógeno se extinga, entre el polvo y las cenizas, la nación china emergerá una vez más de la sangre y el fuego. Reconstruiremos palacios con escombros, encenderemos la civilización con brasas y usaremos la muerte para dar nacimiento a una vida más gloriosa que nunca. Incluso si sólo queda un último grano de polvo, mientras este grano de polvo recuerde su propio nombre, conducirá una vez más a la nación china a crear un nuevo mundo."
 PRC_chinese_revival_dynamic: "Renacimiento chino"
 PRC_chinese_revival_dynamic_desc: "\n\n\n\n£GFX_PRC_chinese_revival_banner\n\n\n\n\n\nRealizaremos una revolución profunda, dirigiremos la nación china y lucharemos por la independencia de nuestros compatriotas y de nuestra patria. Sacrificamos nuestras vidas y derramamos nuestra sangre, luchando contra nuestros viejos enemigos, los piratas japoneses y los perros lacayos del imperialismo bajo una lluvia de balas; y luego eliminamos esos demonios extranjeros que violaban nuestra soberanía. De esta manera, las manchas históricas del país serán borradas, la reputación de la patria se hará famosa en todo el mundo, la bandera de la independencia ondeará alto en las nubes y entonces la campana de la libertad resonará en toda la tierra de China.\nCon un trueno, el león dormido que había estado durmiendo durante miles de años se sobresaltó y comenzó a bailar: esto es revolución, esto es independencia."

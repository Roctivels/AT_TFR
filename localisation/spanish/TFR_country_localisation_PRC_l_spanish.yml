 china_collapse.9.t: "Pekín Bajo Asedio"
 china_collapse.9.d: "Tras el colapso de la autoridad central, un golpe militar estalló, sumiendo a la nación en una ola de caos y terror. Pekín no fue una excepción.\n\nLos disparos desde el este de la ciudad han sido incesantes. Estos insurgentes no forman una entidad unificada y con un propósito claro, sino una coalición temporal de facciones armadas dispares. Sus filas están compuestas principalmente por elementos descontentos del antiguo ejército gubernamental, junto con organizaciones más extremistas que han ganado protagonismo.\n\nAunque sus ideologías y demandas varían ampliamente, estos elementos dispares comparten un consenso sorprendente: desmantelar el statu quo. Estos militantes ya han infiltrado varios sectores de la ciudad, lanzando una ofensiva a gran escala contra la junta militar. El general Huang Ming lucha por mantener el orden, pero parece abrumado, estirado al límite por los ataques en múltiples frentes.\n\nLos medios de comunicación mundiales cubren la crisis en Pekín. Las imágenes satelitales muestran columnas de humo elevándose desde varios distritos, mientras que vídeos filtrados en internet documentan feroces combates callejeros. En medio de este vacío de poder, la gente en Pekín se refugia en sótanos, deseando que esta pesadilla termine."
 china_collapse.9.a: "Los gritos de guerra resuenan, nuevos fantasmas recién muertos..."

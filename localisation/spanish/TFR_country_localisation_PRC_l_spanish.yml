 PRC_operation_tiangong_desc: "La bajeza es un pasaporte para los bajos,\nEl honor una epitafio para los honorables.\nMira cómo el cielo dorado se llena\nCon las sombras retorcidas de los muertos.\nLa era del hielo ha terminado,\n¿Entonces por qué el hielo sigue atando al mundo?\nSe ha descubierto el Cabo de Buena Esperanza,\n¿Entonces por qué el Mar Muerto sigue lleno de velas?\nLlego a este mundo\nLlevando solo papel, cuerda y una sombra,\nPara proclamar antes de que se dicte sentencia\nEsta súplica del juzgado."
 PRC_operation_xuanyuan_desc: "La grandeza de la nación china reside en nuestra propia cultura y orden moral.\nCada rincón del mundo estaba destinado a unificarse bajo la civilización china.\nLa venganza es un deber que nunca debe olvidarse, ni siquiera después de cien generaciones.\nMientras el camino sea justo, no importa cuántos enemigos se interpongan, debemos avanzar con una resolución inquebrantable.\nPor lo tanto, hoy debemos asumir la causa de la justicia y vengar a nuestra nación.\nTodos los que levanten una bandera nunca deben olvidar el odio que llevaron nuestros antepasados; todos los que mantengan la fe no deben permitir que tribus extranjeras campen a sus anchas en nuestra tierra.\nLimpiemos nuestra humillación con sangre y redimamos nuestro honor mediante la unificación, para que todo bajo el cielo sea testigo de la grandeza de la nación china, y que el mundo entero se postre asombrado bajo el mandato de nuestro destino."
 PRC_operation_huguo_desc: "Una mano invisible roza los ríos y montañas infinitos,\nSus dedos manchados de sangre y ceniza, su palma empapada en oscuridad.\nSolo en un rincón lejano la tierra permanece intacta,\nCálida, luminosa, firme y rebosante del vigor de la primavera.\nSobre esa tierra, acaricio suavemente con mi mano herida,\nComo se haría con el suave cabello de un amante, o la palma de un niño que mama.\nReúno toda mi fuerza en mi mano,\nLa presiono contra la tierra, confiándole todo mi amor y esperanza,\nPorque solo allí el sol aún se levanta, y la primavera aún florece,\nSolo allí la oscuridad será expulsada, y renacerá la vida.\nSolo allí vivimos no como ganado,\nNi morimos como hormigas...\nAllí - yace la China eterna."
 PRC_destroy_pakistan: "Destruir Pakistán"
 PRC_destroy_pakistan_desc: "Como un país vecino importante en la frontera occidental de China, Pakistán ha servido durante mucho tiempo como refugio para organizaciones terroristas como el Ejército de Liberación de Baluchistán y los talibanes pakistaníes. Debido a las persistentes divisiones en su sistema político, su Gobierno ha sido impotente frente a estos grupos, que amenazan la seguridad del Corredor Económico China-Pakistán y continúan asesinando a ciudadanos chinos. Varias operaciones represivas por parte del ejército y la policía han terminado en fracaso. China ya no puede tolerar la continuación de esta situación, y las voces públicas en todo el país están exigiendo al Gobierno central que tome medidas. En respuesta a la voluntad del pueblo, el Partido Comunista Chino lanzará pronto una ofensiva sorpresa a gran escala contra Pakistán, con el objetivo de eliminar total y permanentemente a estos terroristas, desmantelar el decadente Gobierno de la Liga Musulmana y neutralizar a las engañosas fuerzas armadas pakistaníes, asegurando así la paz y la estabilidad en la frontera occidental de la patria."

 china.222.t: "Reestablecer la rotación de cuadros"
 china.222.d: "La nueva sesión plenaria del Comité Central del PCCh se celebró recientemente en Pekín. Estuvieron presentes los máximos dirigentes del partido, y Xi, encomendado por el Politburó, presentó un informe a la sesión. Además del comunicado oficial, la sesión plenaria también trajo los tan esperados cambios de personal. En el nivel más alto de la estructura de poder del partido, varios cuadros más jóvenes fueron incorporados como miembros del Politburó y de la Secretaría Central. En niveles inferiores, hubo una rotación más extensa entre los secretarios provinciales del partido y los jefes de los ministerios y comisiones del Consejo de Estado.\n\nLos currículos recién publicados de los cuadros reflejan un cierto grado de diversidad. Entre ellos se encuentran secretarios del partido promovidos desde organizaciones de base, expertos en gestión procedentes de grandes empresas públicas, líderes de instituciones de educación superior y organizaciones de investigación, e incluso personal militar que se distinguió en la guerra de Taiwán. Según CCTV News, esto refleja la \"diversidad en la vía de selección de talentos del partido en la nueva era\". Además, los medios oficiales destacaron la rotación de miembros senior de una manera singularmente china. En reuniones rutinarias de reconocimiento, muchos cuadros senior que habían desaparecido del ojo público durante un tiempo reaparecieron y recibieron saludos del Comité Central como \"camaradas senior\". Esto sugiere que el PCCh ha comenzado a cambiar su modelo centralizado, enfocándose en cultivar y seleccionar una nueva generación de fuerzas centrales para el partido."
 china.222.a: "Las botellas nuevas deben llenarse con vino nuevo."
 china.223.t: "Mono dorado de nariz chata en peligro crítico"
 china.223.d: "Investigador: Dr. Li Jiacan\n\nUn macho de mono dorado de nariz chata, con ID de laboratorio RX-743, vivió apenas tres años en cautiverio. Hace tres años, fue encontrado débil y apenas sobreviviendo en el borde de un bosque contaminado. Esta fue la última vez que observamos la presencia de monos dorados de nariz chata en estado salvaje.\n\nHallazgos de la autopsia:\nEl cuerpo de RX-743 estaba gravemente demacrado, con el pelaje apagado a un amarillo enfermizo. Las cuencas de los ojos estaban hundidas y los párpados internos mostraban una palidez anormal, consistente con la anemia severa que padeció en vida.\n\nExamen interno:\nLos pulmones estaban llenos de mucosidad negra, resultado de la exposición prolongada al aire contaminado. El tejido pulmonar tenía un color gris-negro patológico y carecía de elasticidad.\n\nEl corazón era inusualmente pequeño, con paredes ventriculares notablemente delgadas, indicativo de fibrosis miocárdica, una consecuencia común de la exposición a largo plazo a altos niveles de contaminantes.\n\nEl estómago estaba casi vacío, conteniendo sólo una pequeña cantidad de líquido negro y viscoso con un olor nauseabundo. La mucosa gástrica mostraba ulceraciones extensas y las paredes intestinales estaban plagadas de manchas hemorrágicas, síntomas indicativos de intoxicación por metales pesados.\n\nEl cuerpo de RX-743 dio positivo para concentraciones extremadamente altas de plomo, mercurio, cadmio y otros metales pesados. Estas toxinas se acumularon en su sistema con el tiempo, conduciendo finalmente a su muerte. La fuente de esta contaminación por metales pesados fue el agua residual industrial y las emisiones de vehículos."
 china.223.a: "Una criatura abandonada por el mundo."
 china.224.t: "Protesta de agricultores por daños medioambientales"
 china.224.d: "Recientemente, nuestro periódico recibió quejas del público sobre una fábrica química en el condado de Luoning, ciudad de Luoyang, provincia de Henan, que vertía aguas residuales y causaba una grave contaminación en las tierras agrícolas circundantes. Los aldeanos han denunciado repetidamente el problema a los departamentos correspondientes sin que se haya resuelto.\n\nEn el lugar, las puertas de la fábrica estaban cerradas con llave y cientos de aldeanos, visiblemente alterados, se congregaron en la entrada. Explicaron que desde que la fábrica comenzó a operar, ha estado vertiendo gases residuales con olor fuerte y aguas residuales. Tras regar sus tierras agrícolas con estas aguas, no han cosechado nada, e incluso ha habido casos de muerte de ganado.\n\nLos aldeanos afirmaron que se habían quejado varias veces al departamento local de protección ambiental, pero el problema seguía sin resolverse. \"Esos cargos vinieron, echaron un vistazo, no dijeron nada y se fueron\", dijo un aldeano con enfado.\n\n\"Tras la investigación, la fábrica efectivamente tenía algunos problemas ambientales y ordenamos que los corrigieran dentro de un plazo\", declaró el portavoz de la Oficina de Medio Ambiente Ecológico del condado de Luoning. Sin embargo, negó las acusaciones de inacción por parte de los aldeanos, afirmando: \"Debido a problemas históricos, lleva tiempo resolverlos adecuadamente\".\n\nDurante la investigación, el periodista comprobó que las instalaciones de la fábrica eran rudimentarias y no cumplían con los estándares de protección ambiental. Además, el departamento de protección ambiental ya había sancionado anteriormente a la fábrica, pero las multas fueron limitadas..."
 china.224.a: "Parece que al final no hay continuación."
 china.225.t: "Caimán chino extinto"
 china.225.d: "Han llegado noticias tristes desde la Reserva Natural Nacional del Caimán del Yangtsé en Anhui: el último caimán del Yangtsé salvaje, conocido como \"Xiao He\", fue declarado muerto a primera hora de esta mañana, marcando la extinción total de esta antigua especie en estado salvaje.\n\nEl caimán del Yangtsé es una de las especies de cocodrilos más pequeñas del mundo y es exclusivo de China. En su momento, estaba ampliamente distribuido en las zonas medias y bajas del río Yangtsé, pero su población se desplomó debido a la pérdida de hábitat, la contaminación ambiental y la caza excesiva por parte de los humanos. Para los años 70, se estimaba que quedaban menos de 100 caimanes del Yangtsé en estado salvaje. A pesar de los esfuerzos de China para proteger la especie mediante proyectos de conservación, incluyendo la creación de reservas y centros de cría, la población solo experimentó una recuperación gradual. No se ha observado reproducción natural en estado salvaje durante los últimos cinco años, incluso después de que la especie fuera reclasificada de críticamente en peligro.\n\nLa muerte del último caimán del Yangtsé salvaje significa la pérdida de su reserva genética en el entorno natural. Aunque los científicos intentaron la inseminación artificial para aumentar su número, todos los esfuerzos terminaron en fracaso."
 china.225.a: "Otra especie antigua ha desaparecido."
 china.226.t: "Myanmar desea unirse a IDEA"
 china.226.d: ""
 china.226.a: "Excelente."
 china.227.t: "La República Popular de la nueva era"
 china.227.d: "China celebró con orgullo una conferencia para anunciar la finalización anticipada de sus Objetivos a Largo Plazo para el Desarrollo Económico y Social para el Año 2035. El evento, al que asistieron altos funcionarios y delegados internacionales, incluido el presidente Xi Jinping y el entonces secretario general de las Naciones Unidas, destacó el notable progreso de China. A pesar de enfrentar severas sanciones tras la guerra de Taiwán y el impacto de una nueva Guerra Fría en Asia Oriental sobre el comercio internacional, China logró un crecimiento anual medio del PIB del 5%, sacó a más de 800 millones de personas de la pobreza y aumentó la urbanización a más del 70%, superando con creces las expectativas.\n\nEn su discurso principal, el presidente Xi subrayó los grandes logros en infraestructuras, como la expansión de la red de trenes de alta velocidad a más de 60.000 kilómetros y los avances en tecnología 5G, que ahora cubre al 90% de la población. Además, las innovaciones en energías renovables han convertido a China en el mayor productor mundial de energía solar y eólica, contribuyendo enormemente a sus objetivos de neutralidad de carbono.\n\nEsta serie de éxitos prepara el terreno para la siguiente fase de desarrollo de China. Con la ambición de liderar el mundo en inteligencia artificial, aeroespacial y energía verde, el país está en camino de cumplir su visión de convertirse en un líder global para 2049, el centenario de la República Popular."
 china.227.a: "Los grandes sueños solo pueden hacerse realidad con un gran esfuerzo."
 china.228.t: "La siguiente etapa"
 china.228.d: "Con los esfuerzos incansables de nuestro Ejército Popular de Liberación, finalmente hemos logrado la victoria en las operaciones militares contra Taiwán. Esto no solo significa resolver los problemas históricos de larga data entre ambos lados del estrecho de Taiwán, sino que también marca el comienzo de la integración industrial entre ambos. Desde el Movimiento de Auto-fortalecimiento de finales de la dinastía Qing, generación tras generación de industriales chinos han luchado para que la fuerza industrial de China se mantenga firme entre las naciones líderes del mundo.\n\nDesde 1949, hemos estado construyendo una cadena industrial completa. Hemos avanzado desde una época en la que ni siquiera podíamos producir un solo coche hasta ahora, no solo satisfaciendo la demanda interna, sino también llenando contenedores y barcos con productos fabricados en China por todo el mundo, especialmente en esos países occidentales que antes parecían inalcanzables. Todos estos logros demuestran que el camino correcto es el socialismo con características chinas, con el PCCh en su núcleo.\n\nChina ya no es el \"hombre enfermo de Asia Oriental\" que fue en su día. Podemos declarar con orgullo: \"Hecho en China\" es nuestro orgullo, ¡y los productos fabricados en China serán los más competitivos del mundo! ¡Viva la indomable nación china!"
 china.228.a: "Nuevos talentos surgen con cada generación."
 china.229.t: "Nueva estructura económica"
 china.229.d: "Bajo nuestra gobernanza, hemos logrado reducir con éxito nuestra excesiva dependencia de los mercados internacionales en el pasado, desplazándonos en su lugar para depender de nuestra vasta base de consumidores y de la creciente demanda interna. Estos factores positivos han revitalizado el mercado de consumo nacional y han proporcionado un fuerte impulso para el crecimiento económico interno.\n\nAunque el estallido de la Guerra Civil en Norteamérica ha afectado negativamente a nuestra economía, el fortalecimiento de la actividad económica interna en diversos sectores está compensando gradualmente estos efectos gracias al aumento de la demanda interna. Este cambio también indica que nuestro mercado de consumo se está volviendo menos dependiente de los mercados externos, mostrando un desarrollo más independiente y robusto.\n\nSe espera que en el futuro nuestro país desarrolle gradualmente una nueva estructura económica centrada en el mercado de consumo interno, sin dejar de tener en cuenta los mercados internacionales."
 china.229.a: "La economía avanza de manera constante."
 china.230.t: "Su Día de Gloria"
 china.230.d: "El almirante Dong Jun esperaba la señal para subir al escenario; mientras esperaba, repasaba sus notas, releía las líneas en su cabeza e intentaba calmar su ritmo cardíaco. A principios de esta semana recibió una noticia asombrosa: al parecer, cuando la flota de la RPC se acercaba al estrecho de Taipéi, entabló batalla con la flota taiwanesa, durante la cual se hundió el orgullo de la flota taiwanesa.\n\nNada más recibir la noticia, supo inmediatamente que los funcionarios del Gobierno acudirían a su oficina para pedirle que diera un discurso, y cuando finalmente llegaron, aceptó de inmediato. Ahora, mientras su ritmo cardíaco empezaba a ralentizarse y releía sus notas por última vez, recibió la señal para comenzar a caminar hacia el micrófono. Al subir las escaleras, cada evento notable de su carrera empezó a aparecer en su mente. Todo había conducido a este momento y necesitaba mostrar lo orgulloso que estaba. No solo por él, sino también por la nación.\n\nY al dar los últimos pasos hacia el micrófono, comenzó su discurso."
 china.230.a: "\"¡Hoy es una gran victoria para la RPC!\""
 china.231.t: "Insatisfacción con los inmigrantes"
 china.231.d: "Desde la llegada masiva de inmigrantes del tercer mundo a China, con la aprobación tácita del Gobierno chino, y la formación de enclaves de inmigrantes (destacando especialmente la creciente comunidad africana en Guangzhou), los conflictos entre los grupos de inmigrantes y los residentes locales han sido frecuentes. Las diferencias culturales y de estilo de vida han afectado gravemente las relaciones entre ambas partes.\n\nAunque persisten conflictos menores, hasta ahora no se han producido incidentes graves. Además, debido a la falta de directrices claras por parte de las autoridades superiores, la mayoría de los funcionarios de base han adoptado un enfoque de no intervención para manejar estos complejos problemas. Sin embargo, la red de opinión pública desarrollada ha provocado una avalancha de información sobre los grupos de inmigrantes que inunda al público, lo que ha llevado a una crítica generalizada al Gobierno en las redes sociales.\n\nLos observadores internacionales creen que si el Gobierno chino no aborda con prontitud las relaciones cada vez más tensas entre los residentes locales y los inmigrantes, es probable que el aumento del nacionalismo cause un daño significativo al prestigio del Partido."
 china.231.a: "Es hora de que la ley hable."
 china.232.t: "Nueva Ley de Inmigración"
 china.232.d: "A pesar del debate público en curso, el Gobierno chino ha mantenido una postura cautelosa, ofreciendo pocas declaraciones oficiales, al igual que en su enfoque hacia cuestiones similares. Sin embargo, pronto tomaron medidas prácticas que llevaron a nuevos desarrollos en la situación.\n\nAnte el creciente descontento de la población china respecto al aumento del número de inmigrantes y su impacto percibido en la sociedad, el Gobierno ha promulgado una nueva ley de inmigración estricta. Esta reforma política introduce restricciones severas sobre la entrada y residencia de migrantes, con el objetivo de reducir el flujo de extranjeros y abordar la creciente inquietud entre las comunidades locales.\n\nLas nuevas normativas pretenden reforzar el control sobre las poblaciones migrantes, incluyendo verificaciones de antecedentes más exhaustivas y permisos de trabajo limitados. Esta medida del Gobierno se considera una respuesta directa a la presión pública y se espera que alivie parte del descontento. Sin embargo, también podría aumentar las tensiones con observadores internacionales y afectar las relaciones de China con países aliados."
 china.232.a: "Que desastre."
 china.233.t: "Invasión china de Birmania"
 china.233.d: "Tras la victoria de las Fuerzas de Defensa del Pueblo en la guerra civil de Birmania, China ha lanzado una invasión militar de la nación del Sudeste Asiático. Pekín ha anunciado que la invasión se produce tras continuas incursiones en territorio chino durante y después de la guerra civil. Sin embargo, numerosos expertos en geopolítica coinciden en que la invasión pretendía salvaguardar los intereses estratégicos de China en la región.\nTras alegar la necesidad de proteger sus fronteras y salvaguardar la estabilidad regional, las fuerzas militares chinas invadieron Birmania, avanzando hacia puntos estratégicos clave. La repentina invasión ha conmocionado a la comunidad internacional, generando temores de un conflicto regional más amplio y una crisis humanitaria."
 china.233.a: "Asia se hunde aún más en guerras sin fin."
 china.233.b: "¡Fue una decisión necesaria!"
 china.234.t: "Contrarrestando la agresión india"
 china.234.d: "Mientras la atención del mundo está centrada en el Mar Amarillo, el mar de la China Oriental y el mar de la China Meridional, un repentino conflicto fronterizo ha llevado a China e India, los dos países más poblados del mundo, al borde de la guerra.\n\nAmbos países han estado construyendo puentes y carreteras para tomar posiciones estratégicas a lo largo de la línea fronteriza en las tierras altas. Como resultado, a menudo han estallado enfrentamientos, con soldados usando piedras y palos como armas. Las tropas indias solían tener ventaja numérica en el enfrentamiento, pero el EPL ahora puede desplegar rápidamente a sus tropas de élite desde la retaguardia hasta el frente a través de la nueva red de carreteras en el Tíbet, lanzando ataques sorpresa a los indios durante la noche. Un gran número de soldados indios han caído por los caminos de montaña y han muerto durante la retirada, incluidos sus comandantes. En contraste, el EPL sufrió solo bajas de un solo dígito.\n\nTras los hechos, los diplomáticos se acusaron mutuamente de intentar romper unilateralmente el statu quo, pero ambas partes afirmaron haber defendido su territorio. Los indios han amenazado con enviar más tropas a la línea del frente debido a las pérdidas sufridas, pero el EPL ha demostrado sus avances en la guerra en montaña y su determinación para proteger la patria. Esto podría sugerir un cambio en el equilibrio de poder en la disputa fronteriza entre ambos países."
 china.234.a: "Defenderemos con firmeza cada centímetro de nuestra patria."
 china.235.t: "Respuesta de Bután"
 china.235.d: "Tras una breve espera, Bután ha convocado a nuestro embajador y ha decidido no unirse a la Iniciativa de Defensa de el Este de Asia. La negativa de Bután a aceptar nuestra rama de olivo es un revés inesperado. Como un Estado pequeño, aunque pobre y atrasado en el Himalaya, su privilegiada ubicación geográfica podría haber desempeñado un papel importante en nuestra red de asedio contra India. Un resultado así es bastante desafortunado y decepcionante, y bastante embarazoso para nuestros diplomáticos.\n\nEn Pekín, los nacionalistas y militaristas han comenzado a abogar por una intervención militar contra Bután para hacerles comprender la diferencia de poder entre ambos países y así obligarles a cambiar de opinión. Sin embargo, India siempre ha considerado a Bután como su esfera tradicional de influencia, y una intervención en los asuntos internos de Bután podría llevar a un mayor deterioro de las relaciones sino-indias."
 china.235.a: "¿Qué te parece hacer una excursión de senderismo?"
 china.236.t: "Bloqueo de rutas comerciales"
 china.236.d: "A pesar de estar preparados, las predicciones negativas realizadas antes de la guerra se han convertido en una preocupante realidad. Decenas de sanciones comerciales han cortado prácticamente nuestras importaciones oficiales de materias primas vitales para nuestra condición de \"fábrica mundial\", mientras que algunas de nuestras empresas más poderosas se han visto obligadas a suspender sus operaciones en el extranjero con el pretexto de \"ayudar al esfuerzo bélico\".\n\nAunque aún podemos depender de nuestros recursos internos y reubicar nuestros negocios en otros países amigos, lo que agrava la situación es que la flota de la OTDP ha bloqueado rutas importantes como el estrecho de Malaca, el estrecho de Lombok, el estrecho de Makassar y el estrecho de Miyako. También han utilizado misiles para atacar nuestras flotas mercantes en el mar de la China Meridional y el mar de la China Oriental. La desventaja geográfica ha provocado que nuestro comercio marítimo se desplome a su punto más bajo.\n\nA medida que se agravan los efectos del embargo, han aparecido claros signos de escasez de materiales y declive económico en las ciudades orientales más prósperas de nuestro país. La gente ha comenzado a hablar de la guerra con pesimismo, y la historia de hambruna y levantamientos internos en Alemania durante la Primera Guerra Mundial como resultado del bloqueo naval británico ha dejado a los funcionarios extremadamente preocupados y preocupados."
 china.236.a: "El pueblo necesita aprender a resistir ante un gran enemigo."
 china.237.t: "Jefes corporativos protestan contra la guerra"
 china.237.d: "Estimado secretario general Xi Jinping:\n\nMe llamo Liu Xingfu y soy de Ningbo. Me uní al Partido Comunista de China en 1998. Dirijo una fábrica de procesamiento de prendas de vestir desde 2014, y los productos se vendían principalmente en el extranjero, generando ganancias que en su momento fueron suficientes para permitirnos a mi esposa, mi hijo, mi hija y a mí vivir una vida próspera.\n\nHabíamos establecido buenas relaciones con distribuidores extranjeros y nuestros productos se podían encontrar en los estantes de Vietnam, Singapur y Japón hasta que la guerra de Taiwán llevó a la fábrica a la quiebra. Cerré el equipo, despedí al personal y pedí dinero prestado a usureros. Tuvimos que vender nuestro apartamento en el centro. Mis dos hijos aún necesitaban ir a la escuela, pero apenas podía pagar la matrícula. Mi esposa ya está planeando divorciarse de mí.\n\nSeñor secretario general, quisiera decirle que siempre he pensado que usted podría guiar a nuestro país hacia la grandeza. Pero ahora, esta guerra ha sumido a innumerables personas como yo en la miseria. ¿Es este el \"Gran Rejuvenecimiento\" que prometiste? ¡Te ruego que pongas fin a esta guerra y restablezcas la paz!"
 china.237.a: "Esta carta ha sido archivada y nunca llegará al secretario general."
 china.238.t: "Solución parcial al problema"
 china.238.d: "Las noticias desde Moscú pueden traer alivio a Pekín mientras decepcionan a Tokio y Camberra. Desde el estallido de la guerra de Taiwán, el bloqueo naval y las sanciones económicas han afectado gravemente a la economía china, causando una grieta en su estabilidad interna. Sin embargo, ahora los rusos podrían cambiar esta situación.\n\nLos ministros ruso y chino han firmado acuerdos masivos de cooperación económica. Los componentes clave incluyen concesiones arancelarias para los productos chinos exportados a Rusia, junto con el permiso para que China utilice el Ferrocarril Siberiano ruso, la Carretera de Asia Central y la Ruta Ártica para el comercio multilateral. A cambio, se ha pedido a China que compre más combustible ruso a precios más altos y que proporcione préstamos incrementados para proyectos de infraestructura rusos, especialmente aeropuertos y puertos en el Extremo Oriente. El enviado presidencial ruso para el Distrito Federal del Extremo Oriente declaró a los medios chinos que los acuerdos \"mostrarán de forma más efectiva que no hay límite para la cooperación sino-ruso\".\n\nAunque la apertura de la Ruta del Norte puede compensar marginalmente la pérdida de comercio exterior de China, el apoyo ruso es significativo para restaurar la confianza entre muchos países en desarrollo que dudan en continuar comerciando con China. Además, Rusia puede proteger eficazmente las nuevas rutas comerciales de China, especialmente dado que los misiles de la OTDP no están actualmente dirigidos a Vladivostok ni a Petropávlovsk."
 china.238.a: "El oso se junta con el dragón."
 china.239.t: "Expansión comercial con China"
 china.239.d: ""
 china.239.a: "okei"
 china.240.t: "Cuestión de las Spratly"
 china.240.d: "Desde que comenzamos a construir plataformas de perforación en el mar de la China Meridional y a participar con mayor frecuencia en la explotación de recursos, la intensidad de los enfrentamientos marítimos con nuestros vecinos, especialmente Vietnam, ha aumentado. No solo los buques mercantes están a menudo al borde del choque, sino que marineros de ambos bandos participan con frecuencia en persecuciones en lanchas motoras y rápidas. Además, cada vez se ven más buques de guerra en las aguas en disputa.\n\nConsiderando la absoluta disparidad de poder nacional, muchos pensarían que podríamos lograr que los vietnamitas cedieran por la fuerza. Sin embargo, nuestra fuerza también nos brinda la ventaja alternativa de poder ofrecer negociaciones primero y tomar la iniciativa. Enviaremos una nota diplomática a Vietnam ofreciéndoles dos opciones: aceptar la transferencia de las Islas Spratly a China o compartir los derechos de explotación y uso de los recursos de esas aguas."
 china.240.a: "Veamos si los vietnamitas son inteligentes."
 china.241.t: "Cuestión de las Spratly"
 china.241.d: ""
 china.241.a: "okei"
 china.242.t: "Vietnam vende las Spratly"
 china.242.d: "El ministro de Asuntos Exteriores de Vietnam ha convocado en secreto a nuestro embajador para que nos dé una respuesta definitiva sobre la cuestión de las Islas Spratly. Vietnam finalmente ha cedido a la realidad y ha accedido a devolvernos las islas bajo control vietnamita. Por supuesto, los vietnamitas no cederán su territorio a cambio de nada. Han fijado un alto precio por estas islas y también han solicitado tiempo para desmantelar las instalaciones militares en ellas, permitiendo a Vietnam participar en la posterior explotación de los recursos.\n\nEn Pekín, algunos altos funcionarios se han burlado de las exigencias vietnamitas. Sin embargo, dado el actual proceso de negociación, quizá sea más prudente llegar a un acuerdo con Vietnam lo antes posible. En comparación con los abundantes recursos que se pueden obtener de la recuperación de las Spratly y el orgullo nacional que puede inspirar, el acuerdo es sin duda rentable."
 china.242.a: "El tiempo es esencial; aceptemos."
 china.243.t: "Vietnam vende los recursos de las Spratlys"
 china.243.d: "El ministro de Asuntos Exteriores de Vietnam ha convocado en secreto a nuestro embajador para que nos dé una respuesta definitiva sobre la cuestión de las Islas Spratly. Los vietnamitas han declarado estar dispuestos a vender a China los recursos extraídos de las Spratly, pero no cederán su territorio. Por supuesto, también añadieron que podrían vender energía a China a bajo precio y permitir cierta libertad en la explotación de los recursos, a pesar de que Vietnam también está sumido en la profunda crisis petrolera.\n\nEn Pekín, algunos altos funcionarios están indignados por las exigencias vietnamitas. Sin embargo, dado el actual proceso de negociación, quizá sea más prudente llegar a un acuerdo con Vietnam lo antes posible. Podemos utilizar la energía para aliviar eficazmente la crisis económica nacional, y un pequeño revés diplomático tendrá poco impacto mientras se mantenga en secreto."
 china.243.a: "Acepten... pero esto no se acabó."
 china.244.t: "Ayudas chinas"
 china.244.d: ""
 china.244.a: "okei"
 china.245.t: "El EPL termina las comunicaciones"
 china.245.d: "A la luz de nuestro fracaso bastante catastrófico contra la OTDP, los restos del Ejército Popular de Liberación cortaron el contacto con el Gobierno Central mientras nos preparábamos para la desmovilización. Aunque algunos se preguntaban si esto era simplemente para conservar suministros o debido a un sabotaje japonés, finalmente hemos recibido la tan esperada respuesta. En pocas palabras, nuestro ejército se está rebelando contra nosotros.\n\nA través de una serie de declaraciones crípticas, miembros del alto mando del EPL han denunciado a nuestro Gobierno como \"incapaz de enfrentarse a los imperialistas japoneses\" y nos han dado el ultimátum de permitir su golpe de estado o enfrentarnos a una insurrección. Sabiendo el golpe mortal que esto supondría para la legitimidad tanto de la nación china como del Partido Comunista, hemos rechazado de plano sus exigencias mezquinas.\n\nAunque algunos miembros del EPL siguen siendo leales al Gobierno Central en Pekín, la división de nuestras fuerzas junto con las implicaciones de otra guerra civil han sumido a nuestra nación en el caos, y ya nuestras administraciones en Sinkiang y Tíbet han notado un aumento masivo en la actividad insurgente. Aunque estamos haciendo todo lo posible para calmar la situación, la sensación creciente de que estamos entrando en otra Era de los Señores de la Guerra comienza a extenderse por la maltrecha nación china."
 china.245.a: "Todo bajo el cielo está en un caos total; la situación es excelente."
 china.246.t: "Los gobernadores toman el poder en sus manos"
 china.246.d: "La derrota militar ha sumido a la vasta estructura de poder china en una reorganización. Los funcionarios provinciales ven la pérdida de credibilidad del Gobierno central como una oportunidad para dejar de rendir pleitesía a Pekín y gobernar según su propia visión.\n\nGuangxi tomó la iniciativa, citando \"asegurar la estabilidad local\" como motivo para tomar el control de toda la infraestructura clave. Los distritos militares y las tropas locales quedaron bajo el mando provincial; aunque sus denominaciones permanecen igual, en la práctica sirven como las fuerzas armadas del Gobierno local. En Yunnan, el gobernador local también cortó la comunicación con el Gobierno central y, con la ayuda de unidades militares y policiales leales, tomó el control de las principales carreteras de montaña y presas, que son la principal fuente de energía en la provincia. Las reformas en Gansu fueron aún más allá. En este importante centro del noroeste con una sólida base militar-industrial, se remodeló la estructura administrativa. Lanzhou estableció un \"Comité Provincial de Coordinación\", compuesto por representantes militares, gubernamentales e industriales, que asumió el control total de la gobernanza regional. Aunque todavía reconoce formalmente el liderazgo central, todas las decisiones importantes las toma directamente este comité, dejando a Pekín prácticamente sin influencia."
 china.246.a: "¿Qué están haciendo???"
 china.247.t: "Colapso total"
 china.247.d: "A las 12:00 PM, hora de Pekín, durante la conferencia de armisticio celebrada en Pekín, los representantes de la China derrotada firmaron el tratado de alto el fuego con los Estados miembros de la OTDP bajo la supervisión de la comunidad internacional.\n\nSegún el tratado, las fuerzas militares de China sufrirán reducciones significativas, con todas las \"armas de destrucción masiva\", incluidas las armas nucleares, desmanteladas bajo supervisión internacional. El representante de Japón declaró: \"Considerando el sufrimiento que China ha infligido a los países asiáticos, las restricciones son imprescindibles\". Además, las aguas costeras de China serán gestionadas por la Flota Conjunta de la OTDP, y las actividades navales chinas se limitarán a un radio de 12 millas náuticas desde su línea base.\n\nLa conferencia alcanzó su punto álgido con el tema de los grupos étnicos en las regiones noroeste de China. Varios países apoyaron al pueblo del Turquestán Oriental y del Tíbet en su búsqueda de autodeterminación bajo la guía de la OTDP para liberarse de la opresión del Partido Comunista Chino. Además, las fuerzas de la OTDP establecerán bases militares permanentes en Dalian, Qingdao, Shanghái y Xiamen, imponiendo una tutela internacional de 99 años sobre estas ciudades costeras.\n\nEl anuncio del tratado provocó un amplio malestar en toda China. Estallaron grandes manifestaciones en ciudades como Pekín, Shanghái y Cantón, protestando por los términos injustos del tratado y condenando la incompetencia del Gobierno. Movimientos civiles y organizaciones religiosas previamente prohibidos comenzaron a resurgir, aumentando el caos. Las estadísticas preliminares indican conflictos violentos en varias capitales provinciales. Ya marcada por las penurias de la guerra, la población china se ve ahora sumida en otra humillante era que recuerda a hace un siglo. A pesar de declarar el estado de emergencia, el Gobierno central lucha por mantener el control y, con las autoridades regionales reclamando autonomía, China se enfrenta nuevamente a la amenaza inminente de fragmentación."
 china.247.a: "El cielo no se preocupa por la desgracia humana, Mil ascensos y caídas, una visión fugaz"
 china.248.t: "Tíbet declara su independencia"
 china.248.d: "La agitación continúa mientras el Gobierno central colapsa por completo, dejando la meseta de Qinghai-Tíbet en un estado de fragmentación sin precedentes. Multitudes recorren las calles de Lhasa, expresando demandas diversas. Algunos aún apoyan al Partido Comunista; otros piden una república. Algunos exigen una liberación total de la influencia india. Sin embargo, todos comparten una creencia: el antiguo orden gobernante se ha derrumbado y todo debe ser reconstruido. El problema es que no solo son ciudadanos comunes los que protestan. Facciones de poder local, líderes religiosos y remanentes militares buscan sus propios caminos. En algunas zonas, la gente ha comenzado a establecer Gobiernos autónomos, negándose a reconocer cualquier autoridad única.\n\nChamdo ha sido el punto focal del enfrentamiento militar, inicialmente provocado por un enfrentamiento entre el mando militar regional y las fuerzas tibetanas. Algunos oficiales militares decidieron actuar por su cuenta, complicando aún más la situación. No pasó mucho tiempo antes de que el conflicto se extendiera más allá de las ciudades. En regiones montañosas remotas, grupos armados locales se levantaron; algunos líderes de monasterios apoyaron abiertamente el separatismo. El mando militar ha perdido el control efectivo sobre partes de la región. Un sentimiento secesionista generalizado recorre esta tierra de nieve y, aparte de coincidir en que el statu quo es insostenible, nadie parece capaz de encontrar un terreno común en ningún otro aspecto.\n\nLa meseta del sur está lejos de estar tranquila. Aunque la Administración Central Tibetana -respaldada por India- controla Lhasa, su base de poder sigue siendo frágil. Las facciones locales han aprovechado la oportunidad para levantarse: algunas se han alineado con India, otras con el mando militar, y otras están decididas a seguir su propio camino.\n\nEn esta vasta meseta, todos luchan por sus propios intereses, pero a nadie le importa realmente el futuro de esta tierra. El caos se extiende, el orden se derrumba, y parece que esto es solo el comienzo."
 china.248.a: "Dedicando este cuerpo mortal, que renazcamos juntos en la Tierra Pura."
 china.249.t: "Turquestán Oriental declara su independencia"
 china.249.d: "La fractura en Sinkiang se ha vuelto irreparable. Turquestán Oriental declaró que su referendo de independencia fue aprobado con un controvertido 51% de votos, desencadenando una crisis política sin precedentes. El Gobierno regional autónomo en Urumqi, formado por el Cuerpo de Producción y Construcción, emitió un comunicado enérgico, acusando a la \"República del Turquestán Oriental\" de \"ignorar completamente los derechos políticos básicos de millones de residentes no uigures\" y calificándola como \"la principal culpable de socavar la unidad étnica y la estabilidad en Sinkiang\". Mientras tanto, en el sur de Sinkiang, Hotan se ha convertido en la capital provisional del nuevo régimen. Banderas azules con la media luna y la estrella ondean en cada esquina, altavoces lanzan consignas de \"liberación nacional\" y la milicia, inflamados por un fervor yihadista, juran \"liberar a todos los hermanos y hermanas uigures\".\n\nExploradores de ambos bandos recorren las dunas. Los oleoductos han sido cortados y las carreteras están llenas de barricadas. Norte y sur se apresuran a acumular municiones y reclutar soldados, preparándose para el conflicto a gran escala que se avecina.\n\nLa tensión en la frontera sigue aumentando. El primer disparo parece estar a un suspiro de distancia."
 china.249.a: "Un pueblo fronterizo solitario está en peligro."
 china.250.t: "Fallece el ex primer ministro Li Keqiang"
 china.250.d.a: "Hoy, una noticia de última hora ha conmocionado a China: Li Keqiang, exmiembro del Comité Permanente del Politburó del PCCh y primer ministro del Consejo de Estado, que acababa de dimitir de su cargo y aún no había cumplido 70 años, ha fallecido de un infarto repentino en Shanghái. Esto resulta extremadamente increíble para los líderes del PCCh, que generalmente cuentan con una buena atención médica.\n\nSe informa que Li Keqiang se encontraba en Shanghái en una estancia temporal dentro de un plan de vacaciones organizado para él por el Comité Central del PCCh tras su jubilación. Tras caer en coma, el Comité Municipal del PCCh en Shanghái organizó inmediatamente un equipo médico para atenderlo, pero no pudo recuperarse. Actualmente, además de la noticia de la muerte de Li, los funcionarios chinos han publicado artículos conmemorativos en las redes sociales en su memoria.\n\nLa \"muerte prematura\" de Li ha sido ampliamente lamentada en China, con algunos elogiando su liderazgo en la modernización industrial de China y la \"Iniciativa Franja y Ruta\" durante su mandato como primer ministro, así como su éxito en mantener la economía a flote durante la guerra de Taiwán. En la provincia natal de Li, Anhui, se han organizado varios servicios conmemorativos de forma espontánea. El cuerpo de Li ha sido sellado y se espera que sea trasladado por vía aérea de regreso a Pekín en un futuro próximo."
 china.250.d.b: "Hoy, una noticia de última hora ha conmocionado a China: Li Keqiang, exmiembro del Comité Permanente del Politburó del PCCh y primer ministro del Consejo de Estado, que acababa de ser destituido de todos sus cargos y aún no había cumplido 70 años, ha fallecido de un infarto repentino en Shanghái. Esto resulta extremadamente increíble para los líderes del PCCh, que generalmente cuentan con una buena atención médica.\n\nSe informa que Li Keqiang fue puesto bajo arresto domiciliario de forma encubierta cuando fue designado para vivir en Shanghái tras ser destituido de su cargo después de la derrota en Taiwán. Tras caer en coma, el Comité Municipal del PCCh en Shanghái organizó inmediatamente un equipo médico para rescatarlo, pero no pudo recuperarse. Por el momento, no ha habido ninguna otra acción por parte de las autoridades chinas aparte del anuncio de la muerte de Li.\n\nLa muerte repentina de Li ha profundizado el sentimiento de desilusión entre el pueblo chino en el ambiente deprimido tras la pérdida de la guerra de Taiwán. Se han planteado diversas teorías conspirativas sobre la \"muerte prematura\" de Li, sugiriendo que el nuevo liderazgo del PCCh lo asesinó en secreto por temor a su influencia o que se le retrasó deliberadamente la atención médica. Se ha ordenado a las autoridades locales de seguridad social que vigilen y controlen de cerca a los grupos disidentes civiles que puedan aprovechar esta oportunidad para oponerse al nuevo gobierno."
 china.250.a: "Descansa en paz, querido camarada."
 china.250.b: "También podría ser un golpe de suerte para este camarada..."
 china.251.t: "Los reformistas toman el poder en China"
 china.251.d: "Uno tras otro, los carros de combate principales Tipo 99 verdes rugieron por la avenida Chang'an. Mientras el EPL se retiraba de la capital hacia sus guarniciones, los ciudadanos de Pekín observaban con miedo, pero sentían una sensación de alivio. Sin embargo, una repentina convulsión política pronto sumió a todos nuevamente en el terror.\n\nCuando las ambiciones de Xi se derrumbaron, el PCCh decidió confiar su futuro y el de 1.400 millones de chinos a un nuevo líder. Wang Yang, ex miembro del Comité Permanente del Politburó y presidente de la Conferencia Consultiva Política del Pueblo Chino, ha sido nombrado nuevo secretario general del PCCh. En el Gran Salón del Pueblo, retransmitido por CCTV, Wang habló elocuentemente bajo los destellos de las luces, prometiendo implementar verdaderas reformas para la nueva era, sanar las divisiones de China y restaurar la confianza del pueblo en el Partido y la nación.\n\nCon el panorama político en constante cambio, ¿hacia dónde se dirigirá la República Popular con otro cambio de liderazgo en Zhongnanhai? ¿Podrá el esclarecido caballero del Partido marcar el comienzo de un nuevo amanecer para la antigua China? Sólo el tiempo lo dirá."
 china.251.a: "El Yangtze ha arrasado en su camino a Oriente.\nDeja atrás hombres coronados de victoria."
 china.252.t: "Los neoizquierdistas toman el poder en China"
 china.252.d: "Uno tras otro, los carros de combate principales Tipo 99 verdes rugieron por la avenida Chang'an. Mientras el EPL se retiraba de la capital hacia sus guarniciones, los ciudadanos de Pekín observaban con miedo, pero sentían una sensación de alivio. Sin embargo, una repentina convulsión política pronto sumió a todos nuevamente en el terror.\n\nCuando las ambiciones de Xi se derrumbaron, el PCCh decidió confiar su futuro y el de 1.400 millones de chinos a un nuevo líder. Hu Chunhua, ex miembro del Politburó y vice primer ministro del Consejo de Estado, ha sido nombrado nuevo secretario general del PCCh. En el Gran Salón del Pueblo, retransmitido por CCTV, Hu habló elocuentemente bajo los destellos de las luces, diciendo que volvería a presentar al Partido como la vanguardia del pueblo y la voz del pueblo, y restauraría la confianza del pueblo en el Partido y la nación.\n\nCon el panorama político en constante cambio, ¿hacia dónde se dirigirá la República Popular con otro cambio de liderazgo en Zhongnanhai? ¿Podrá el niño prodigio del Partido marcar el comienzo de un nuevo amanecer para la antigua China? Sólo el tiempo lo dirá."
 china.252.a: "El Yangtze ha arrasado en su camino a Oriente.\nDeja atrás hombres coronados de victoria."
 china.253.t: "Los revanchistas toman el poder en China"
 china.253.d: "Uno tras otro, los carros de combate principales Tipo 99 verdes rugieron por la avenida Chang'an. Mientras el EPL se retiraba de la capital hacia sus guarniciones, los ciudadanos de Pekín observaban con miedo, pero sentían una sensación de alivio. Sin embargo, una repentina convulsión política pronto sumió a todos nuevamente en el terror.\n\nTras el fin de las grandes ambiciones de Xi Jinping, el Partido Comunista de China decidió confiar el futuro del Partido y de sus 1.400 millones de habitantes a un nuevo liderazgo. En el Gran Salón del Pueblo, el evento fue transmitido en directo por CCTV. Rodeados por un grupo de jóvenes y entusiastas oficiales militares, los nuevos líderes del Partido se comprometieron solemnemente a limpiar la humillación nacional, honrar a los héroes caídos y restaurar la fe y la confianza del pueblo en el Partido y la nación.\n\nCon el panorama político en constante cambio, ¿hacia dónde se dirigirá la República Popular con otro cambio de liderazgo en Zhongnanhai? ¿Podrá el héroe de guerra del EPL marcar el comienzo de un nuevo amanecer para la antigua China? Solo el tiempo lo dirá."
 china.253.a: "El Yangtze ha arrasado en su camino a Oriente.\nDeja atrás hombres coronados de victoria."
 china.254.t: "El \"Mito\" Patriótico de GameScience"
 china.254.d: "China tiene la comunidad de jugadores más grande del mundo y quizás el fabricante de juegos más rico: la corporación Tencent. Sin embargo, durante años, los chinos nunca han creado un juego AAA de fama mundial. Pero hoy, todo eso podría cambiar. GameScience, una compañía poco conocida, está desarrollando un ARPG llamado \"Black Myth: Wukong\", basado en la novela de fantasía más popular de China, \"Viaje al Oeste\". Su característico diseño artístico y sus escenas de batalla entretenidas ya se han convertido en tema de conversación entre los fans. También podemos contribuir al desarrollo de este juego, que tiene un potencial extraordinario, relajando los estándares de la censura oficial, conocida por ser bastante estricta, así como asignando a medios de internet afiliados al Departamento Central de Propaganda para participar en la promoción del juego."
 china.254.a: "Los sueños deben fomentarse, y nosotros les ayudaremos a alcanzar los suyos."
 china.254.b: "No hay que perder el tiempo en trivialidades."
 china.255.t: "El juego es un fracaso total"
 china.255.d: "Después de una larga espera, GameScience finalmente lanzó \"Black Myth: Wukong\"; sin embargo, resultó ser una decepción. En un intento por minimizar riesgos y responder a las demandas del mercado, los desarrolladores tomaron como referencia e incluso copiaron muchos elementos de otros ARPG, lo que resultó en un parecido sorprendente en el diseño de niveles del juego. No es de extrañar que los jugadores rápidamente describieran el juego como otro clon hecho en China. Además, la trama del juego, que hace referencia a \"Viaje al Oeste\", fue criticada por los fans por ser una característica abrupta impuesta para satisfacer las necesidades de la propaganda oficial. El fracaso del juego ha provocado que un número significativo de empleados de GameScience abandonen sus puestos por frustración. Se informa que ciertas corporaciones de internet están planeando comprar esta empresa de juegos fracasada."
 china.255.a: "Con suerte, lo conseguiremos la próxima vez..."
 china.256.t: "El juego es un gran éxito"
 china.256.d: "Tras recibir apoyo de las autoridades, los desarrolladores de GameScience abordaron su trabajo con un renovado entusiasmo. Además, al comenzar a lanzar tráilers en YouTube y Twitter, cada vez más jugadores extranjeros se fijaron en el juego. El día del lanzamiento, el juego superó todas las expectativas: no solo se elogió mucho su jugabilidad, sino que los elementos culturales chinos antiguos y los temas fantásticos de \"Viaje al Oeste\" incorporados por los desarrolladores también recibieron una atención significativa por parte de los jugadores. Esto ha despertado un gran interés en la comunidad global de jugadores por explorar la antigua tradición china, logrando así el objetivo oficial de promover la cultura tradicional china. Ahora, los fans han proclamado que \"Black Myth: Wukong\" será el \"Mejor Juego del Año\"."
 china.256.a: "\"¡Aquí viene el Rey Mono!\""
 china.257.t: "El impacto \"Genshin\""
 china.257.d: "Recientemente, el ARPG estilo animé \"Genshin Impact\", producido por MiHoYo Company con sede en Shanghái, ha asegurado el puesto más alto en la lista de los juegos más populares en varios países alrededor del mundo. El juego ha arrasado desde su lanzamiento, atrayendo la atención y el amor de incontables jugadores con sus bellos gráficos, diseño único de personajes y mecánica de exploración de mundo abierto. En redes sociales como Reddit, Twitter y YouTube, las acaloradas discusiones de los jugadores han creado un frenesí global.\n\nEl súbito ascenso de \"Genshin Impact\" ha mostrado a los gamers alrededor del mundo la industria del gaming chino por primera vez. Por mucho tiempo, el mercado de juegos chinos ha sido dominado por el consumo local, con pocos títulos logrando un éxito así en el mercado internacional. Sin embargo, \"Genshin Impact\" rompió este molde, y MiHoYo se ha convertido en un éxito instantáneo, demostrando la fuerza y potencial de los desarrolladores de videojuegos chinos."
 china.257.a: "¡Un mundo fantástico al alcance!"
 china.258.t: "Problemas actuales del EPL"
 china.258.d: "Departamento del Estado Mayor Conjunto de la Comisión Militar Central\n\nPara: Comisión Militar Central y Buró Político del Comité Central del PCCh\n\nPara asegurar que nuestras fuerzas armadas se mantengan a la vanguardia de la guerra futura y continúen avanzando con éxito en la era de la informatización, el Ejército Popular de Liberación debe abordar con urgencia los desafíos y cuestiones críticas identificadas a partir de las lecciones aprendidas en conflictos recientes. Los problemas clave son los siguientes:\n\n1. Las contradicciones estructurales se concentran en los niveles superiores, caracterizadas por funciones demasiado generalizadas, instituciones sobredimensionadas y un desequilibrio en los recursos.\n\n2. La estructura organizativa presenta deficiencias significativas, especialmente la falta de un marco de liderazgo integral para el Ejército.\n\n3. El mando de operaciones conjuntas de la Comisión Militar Central carece de elementos críticos y de una funcionalidad efectiva. Además, el sistema de mando de operaciones conjuntas a nivel de teatro sigue sin desarrollarse.\n\n4. Son evidentes síntomas de una \"mentalidad de tiempos de paz\", que se manifiestan en arrogancia y falta de rigor para cumplir las órdenes de manera completa y precisa."
 china.258.a: "Adáptate para ganar - transfórmate para triunfar"
 china.259.t: "Proyecto GHOST"
 china.259.d: "\"Camarada, ¿está diciendo que puede hacer que todos nuestros soldados sean invisibles?\" El general cerró el informe que tenía en la mano, mirando al joven investigador frente a él con ojos ligeramente incrédulos. La idea de hacer desaparecer a una persona del campo visual del ojo desnudo era difícil de creer, incluso para un general que lo había visto casi todo.\n\n\"¡Sí, jefe! Utilizando un diseño basado en las propiedades del trióxido de molibdeno, podemos dirigir la luz hacia el núcleo de un objeto en una dirección específica. Si el índice de refracción y la impedancia se ajustan correctamente, parecerá que el núcleo no existe, creando un efecto de invisibilidad visual. ¡Esto es totalmente factible hoy en día!\"\n\n\"Está bien, lo comentaré con el presidente\"."
 china.259.a: "¡Vamos a intentarlo!"
 china.259.b: "Tal vez no..."
 china.260.t: "Proyecto NIB"
 china.260.d: "\"Compañero Jefe, el Instituto ha propuesto recientemente un nuevo proyecto llamado \"NIB\". Se basa en el fusil original QTS-11, con el objetivo de mejorar significativamente sus capacidades antiblindaje para el combate mecanizado moderno. Según el informe, el diseño incluye un lanzagranadas para fusil recién desarrollado y un misil guiado miniaturizado montado en el arma. Estas mejoras permitirán a los soldados mantener su versatilidad táctica mientras adquieren la capacidad de atacar objetivos ligeramente blindados a larga distancia\".\n\n\"En combate, el sistema inteligente de control de fuego ajustará automáticamente los parámetros de disparo, proporcionará datos ambientales y calculará las trayectorias de las balas y granadas en tiempo real. Cuando se necesite un misil guiado, el sistema se encargará de los cálculos y la programación, garantizando precisión. En esencia, el arma funciona como un lápiz óptico: ¡solo apunta y da en el blanco!\"\n\n\"Excelente concepto. Vamos a elevarlo al presidente para que tome una decisión\"."
 china.260.a: "¡Vamos a intentarlo!"
 china.260.b: "Tal vez no..."
 china.261.t: "Proyecto SWIMMER"
 china.261.d: "\"¡Camarada Ministro!\" Los ingenieros, vestidos con batas blancas de laboratorio, presentaron con entusiasmo los nuevos planos al Ministro de Desarrollo de Equipamiento invitado. \"Camarada, por favor mire aquí...\" Uno de los ingenieros señaló el diagrama lleno de piezas intrincadas y datos. \"Este es nuestro nuevo diseño de tanque anfibio, llamado «Nadador».\" Se ajustó las gafas mientras el ministro asentía, indicándole que continuara. \"Este tanque está equipado con un cañón principal de 105 mm, capaz de penetrar de frente a su hipotético adversario, el M1A2. También hemos mejorado la flotabilidad incorporando materiales avanzados de espuma. Aquí puede ver el módulo de información integrado, que cuenta con nuestro último sistema de navegación «Beidou», sensores atmosféricos y antenas de transmisión de datos. En conjunto, este tanque supone una mejora significativa respecto a nuestro equipo anfibio actual\".\n\n\"Entendido, camarada. Informaré de este proyecto a la Comisión Militar Central\"."
 china.261.a: "¡Vamos a intentarlo!"
 china.261.b: "Tal vez no..."
 china.262.t: "Proyecto IMPULSE"
 china.262.d: "\"¡Bienvenido, jefe!\" El investigador confiado saludó a los oficiales superiores cuando entraron en el instituto. \"Como sabéis, el cañón electromagnético ha sido un secreto muy bien guardado. Lo hemos probado extensamente y ahora nuestro equipo está listo para desplegarlo en el acorazado. Al aprovechar la aceleración prolongada de los dos raíles electromagnéticos, podemos aumentar significativamente la velocidad inicial y el alcance del proyectil. Esta tecnología hará que nuestros cañones navales no tengan rival frente a otras armas similares\".\n\nEl investigador hizo una pausa y luego preguntó con cautela: \"¿Qué opina el centro?\"\n\nEl general pensó un momento antes de responder: \"Informaré de esto al presidente para que tome una decisión\"."
 china.262.a: "¡Vamos a intentarlo!"
 china.262.b: "Tal vez no..."
 china.263.t: "Proyecto DARK SWORD"
 china.263.d: "\"¿Un dron inteligente diseñado para parecerse a un caza de tamaño medio? Interesante...\" Los líderes de la Oficina Nacional de Ciencia y Tecnología de Defensa se acariciaron la barbilla y se sumieron en sus pensamientos tras revisar el informe de Yang Wei, diseñador jefe del proyecto J-20. En teoría, la mayor diferencia entre los cazas de quinta y sexta generación radica en su inteligencia y conectividad a través del internet de las cosas. Sin embargo, invertir a ciegas en la investigación, desarrollo y producción de un caza completamente nuevo de próxima generación conlleva riesgos significativos.\n\nSi un dron pudiera usarse como banco de pruebas para superar algunos de los desafíos de la próxima generación de cazas, ayudaría enormemente a la I+D futura. Aun así, incluso un proyecto de dron requeriría una inversión financiera considerable, con riesgos inherentes. No obstante, las posibles recompensas son enormes. Tras una cuidadosa consideración, los líderes decidieron..."
 china.263.a: "¡Vamos a intentarlo!"
 china.263.b: "Tal vez no..."
 china.264.t: "Proyecto FLASH"
 china.264.d: "\"Jefe, nuestro plan es diseñar un rifle láser de alta energía utilizando la tecnología actual, superando las antiguas funciones antiaéreas y de cegado. Esta arma tendrá la capacidad de combate para matar e incapacitar unidades enemigas con láseres de energía dirigida. Ya sean las armas de haz de partículas de la antigua Unión Soviética o las armas láser de Estados Unidos, sus ambiciones finalmente serán realizadas por nosotros.\" Mientras el investigador hablaba, mostró al General un sistema láser de alta energía de muestra. Aunque todavía era voluminoso en tamaño y fuente de alimentación, la presentación y experiencia del investigador sugerían que el futuro de este programa era prometedor.\n\n\"Impresionante. Informaré de esto al Camarada Presidente para que tome una decisión.\""
 china.264.a: "¡Vamos a intentarlo!"
 china.264.b: "Tal vez no..."
 china.265.t: "Proyecto NAMI"
 china.265.d: "\"Comandante camarada, creo que los nanobots pueden usarse no solo en hospitales de campaña, ¡sino que también pueden desempeñar roles inesperados en combate! Estos diminutos soldados, más pequeños que las hormigas, pueden moverse sin ser detectados y desplegarse en fortalezas enemigas, atacando objetivos militares clave por sorpresa. En el futuro, podrían alcanzar cualquier objetivo: provocar explosiones, liberar químicos y más. ¡El único recurso que necesitan es la abundante energía solar! Imagínese la devastación que podrían causar a nuestros enemigos, General; ni siquiera sabrían cómo lo hicimos\".\n\n\"No es mala idea. Vamos a pasar esto al presidente para que tome una decisión\"."
 china.265.a: "¡Vamos a intentarlo!"
 china.265.b: "Tal vez no..."
 china.266.t: "Informe del Proyecto GHOST"
 china.266.d.1: "\nINFORME DE RESULTADOS DEL PROYECTO GHOST:\n   ÉXITO PARCIAL.\n\nLa intención original del proyecto GHOST era lograr un despliegue sigiloso y ataques sorpresa equipando a los soldados del EPL con capas visuales de metamaterial que los hicieran completamente invisibles para sus enemigos. Desafortunadamente, este requisito resultó ser demasiado ambicioso para el desarrollo tecnológico actual, especialmente a nivel industrial. El líder del equipo encargado del proyecto negó con la cabeza y tomó un bolígrafo para escribir un comentario final en letras grandes: \"Difícil y costoso de producir; no apto para uso a gran escala. Puede usarse en pequeñas cantidades para equipar a fuerzas especiales y mejorar las técnicas de camuflaje existentes.\""
 china.266.d.2: "\nINFORME DE RESULTADOS DEL PROYECTO GHOST:\n   FRACASO.\n\nSegún la lista de la Organización Mundial de la Salud, el trióxido de molibdeno está clasificado como un carcinógeno del grupo 2B. La exposición prolongada y la inhalación de su polvo pueden afectar gravemente la salud respiratoria, causando enfermedades pulmonares crónicas. El contacto directo también puede provocar reacciones tóxicas como hormigueo y dolores de cabeza. Como uno de los principales materiales seleccionados para el proyecto, sus peligros se hicieron evidentes, y un incidente de derrame confirmó estos riesgos. Aunque no se perdieron vidas, los peligros potenciales en el campo de batalla impredecible eran demasiado grandes. Por consiguiente, tuvimos que cancelar el proyecto."
 china.266.a: "Bueno..."
 china.266.b: "Triste."
 china.267.t: "Informe del Proyecto NIB"
 china.267.d.1: "\nINFORME DE RESULTADOS DEL PROYECTO NIB:\n   ÉXITO.\n\nCon un silbido agudo, el micromisil del rifle impactó y destruyó el vehículo objetivo desde una distancia de mil metros. El sistema integrado de control de fuego y las granadas de rifle han elevado el poder de fuego portátil a un nuevo nivel. Los soldados que probaron el arma quedaron impresionados por su rendimiento y expresaron con fuerza su deseo de que se estandarice en el ejército lo antes posible.\n\nLos observadores en el campo de pruebas celebraron el éxito del Proyecto NIB, que representa un salto adelante en las capacidades de combate individual. Este sistema no solo proporciona a los soldados un mecanismo avanzado de control de fuego, sino que también les permite atacar objetivos con precisión dentro de un rango establecido. Además, al integrar la vigilancia con drones, los soldados pueden lanzar misiles desde una posición cubierta y aún así alcanzar sus objetivos. Lo más importante es que este avance aumenta considerablemente la probabilidad de que los soldados sobrevivan a las duras realidades de la guerra moderna."
 china.267.d.2: "\nINFORME DE RESULTADOS DEL PROYECTO NIB:\n   FRACASO.\n\n\"¡Objetivo fallado! ¡Objetivo fallado!\" gritaban los soldados mientras los fusiles sufrían un revés significativo. Los esfuerzos por miniaturizar y guiar inteligentemente el misil fueron finalmente infructuosos, ya que el espacio limitado chocaba con las necesidades tanto de los sistemas de combate como de guía. Otros componentes resultaron ser demasiado costosos, sobrecargados o difíciles de mantener, lo que hacía que el sistema fuera poco práctico para su uso en el campo de batalla. Algunos soldados incluso se burlaban llamándolo \"el gran juguete del instituto\".\n\nSin embargo, a pesar de estos fracasos, el proyecto ha aportado experiencia valiosa y avances tecnológicos. Se espera que, en un futuro cercano, estas lecciones conduzcan al desarrollo de un sistema de combate portátil más capaz, que eventualmente será entregado a cada soldado."
 china.267.a: "¡Genial!"
 china.267.b: "Triste."
 china.268.t: "Informe del Proyecto SWIMMER"
 china.268.d.1: "\nINFORME DE RESULTADOS DEL PROYECTO SWIMMER:\n   ÉXITO.\n\nEn una instalación de pruebas secreta en algún lugar de Guangdong, el proyecto Swimmer había llegado finalmente a su momento crítico para una evaluación práctica. Científicos, ingenieros y oficiales del Departamento de Desarrollo de Equipamiento y del Estado Mayor Conjunto permanecían en una expectación contenida, con la mirada fija en el tanque prototipo, preparado y listo. Cuando el ejercicio comenzó oficialmente, el tanque abrió fuego repetidamente contra un objetivo enemigo simulado basado en el M1A2. En cuestión de segundos, el objetivo quedó envuelto en humo, completamente incapacitado. Entonces, el motor del tanque rugió al ponerse en marcha mientras maniobraba hacia las aguas poco profundas, dirigiéndose a una isla cercana. En ese momento, parecía que el corazón de todos se les subía a la garganta.\n\nCuando el Swimmer llegó sin problemas a la isla y el conductor señaló la finalización exitosa del ejercicio, el centro de mando estalló en celebración. El esfuerzo duro finalmente había dado sus frutos."
 china.268.d.2: "\nINFORME DE RESULTADOS DEL PROYECTO SWIMMER:\n   FALLO.\n\nDesgraciadamente, el prototipo del nuevo tanque anfibio no superó la prueba de campo. Aunque su potencia de fuego demostró la capacidad para destruir vehículos enemigos, el factor más crucial para un tanque anfibio -la flotabilidad- seguía siendo insuficiente. Al intentar cruzar un cauce de agua relativamente corto, el Swimmer se hundió rápidamente. Aunque la tripulación logró escapar a tiempo, el prototipo y el costoso equipo a bordo se perdieron irrecuperablemente, a pesar de los enormes esfuerzos de los equipos de desarrollo y pruebas. Esperemos que, cuando se retome el proyecto del tanque anfibio en el futuro, no se repitan los mismos errores."
 china.268.a: "¡Genial!"
 china.268.b: "Triste."
 china.269.t: "Informe del Proyecto IMPULSE"
 china.269.d.1: "\nINFORME DE RESULTADOS DEL PROYECTO IMPULSE:\n   ÉXITO.\n\n\"5, 4, 3, 2, 1, 0. ¡Fuego!\" En el sitio de pruebas en el mar, todos contuvieron la respiración, mirando fijamente el barco de pruebas equipado con un nuevo cañón electromagnético y el barco objetivo. Tras la orden de lanzamiento, no hubo pólvora, ni fuego, ni un fuerte estruendo, solo un suave \"bang\". La bala salió entonces de la recámara a muy alta velocidad, trazando una línea casi recta por el aire antes de impactar con una fuerza inmensa contra el barco objetivo. El proyectil de alta velocidad atravesó el barco objetivo y descendió lentamente al agua.\n\n\"¡El barco objetivo está hundido, el plan es un éxito total!\""
 china.269.d.2: "\nINFORME DE RESULTADOS DEL PROYECTO IMPULSE:\n   FALLO.\n\nCon un estallido, el programa del cañón de riel a bordo del barco pudo ser declarado oficialmente un fracaso. Durante una prueba desastrosa de disparo continuo, la fuente de alimentación sobrecalentada explotó violentamente, causando daños irreparables y devastadores en todo el sitio de pruebas y el equipo, incendiando gran parte de la maquinaria crítica. Afortunadamente, no hubo víctimas ya que el personal estaba ubicado a gran distancia. Sin embargo, si un incidente así volviera a ocurrir, las repercusiones serían graves. Dada la gravedad de los daños, las preocupaciones de seguridad y la dificultad del desarrollo, el futuro del cañón de riel se ha vuelto aún más incierto."
 china.269.a: "¡Genial!"
 china.269.b: "Triste."
 china.270.t: "Informe del Proyecto DARK SWORD"
 china.270.d: "\nINFORME DE RESULTADOS DEL PROYECTO DARK SWORD:\n   ÉXITO.\n\nEn un día claro y soleado, líderes del Ministerio de Defensa Nacional, la Oficina de Ciencia y Tecnología de Defensa Nacional e incluso la Comisión Militar Central se reunieron en el aeropuerto Wenjiang de Chengdu. Afuera, una multitud de entusiastas militares y curiosos, que se habían enterado del evento, se apiñaban. Las autoridades habían filtrado la información deliberadamente con antelación, insinuando un momento histórico similar al vuelo inaugural del J-20 en 2011.\n\nCuando el avión de combate no tripulado Dark Sword salió del hangar, el público estalló en vítores y los líderes admiraron su forma aerodinámica. La aeronave aceleró por la pista y se elevó hacia el cielo, destacando su rendimiento bajo los focos. Se movía como un dardo de un antiguo asesino chino, atravesando la vasta extensión azul. El Dark Sword ejecutó una serie de maniobras complejas, demostrando sus avanzados sistemas de aviónica e inteligencia. Los líderes aplaudieron, mientras el diseñador jefe, Yang Wei, secaba silenciosamente lágrimas de alegría.\n\nSin duda, el Dark Sword marca otro hito en la carrera de Yang Wei, señalando la aparición del primer UAV supersónico del mundo. Navegará entre las nubes de las montañas Tianshan, se bañará bajo la luz de la luna sobre el mar de la China Meridional y protegerá la prosperidad de la patria."
 china.270.a: "¡Genial!"
 china.271.t: "Informe del Proyecto FLASH"
 china.271.d: "\nINFORME DE RESULTADOS DEL PROYECTO FLASH:\nÉXITO PARCIAL.\n\nAl ver el enorme producto final, los oficiales encargados del proyecto no pudieron evitar suspirar. A pesar de los mejores esfuerzos de los investigadores, no lograron reducir el tamaño y peso del sistema láser de alta energía a algo que un solo soldado pudiera llevar. Para un campo de batalla en constante cambio, su movilidad era claramente insuficiente. Sumado a otras ineficiencias, como su método de eliminación, el despliegue a gran escala sigue siendo complicado. Sin embargo, el proceso de I+D y los resultados del proyecto siguen siendo valiosos, y como arma de combate auxiliar, el equipo láser puede continuar desempeñando un papel importante en otras formas en el campo de batalla."
 china.271.a: "Bueno..."
 china.272.t: "Informe del Proyecto NAMI"
 china.272.d: "\nINFORME DE RESULTADOS DEL PROYECTO NAMI:\nÉXITO PARCIAL.\n\nTras innumerables días y noches de duro trabajo, el equipo de I+D finalmente llevó su proyecto de nanobots a la vanguardia de la historia militar. En el siglo XXI, incluso algo tan pequeño como una hormiga puede hacer temblar un árbol. Desafortunadamente, la versión final de los nanobots no cumplió todas las altas expectativas establecidas por el ejército. En términos de despliegue, potencia y producción, su rendimiento seguía siendo insuficiente. La esperanza de depender de los nanobots para desmantelar completamente la estructura de mando enemiga ya no es realista. Sin embargo, todavía pueden servir como herramientas útiles en la industria militar."
 china.272.a: "Bueno..."
 china.273.t: "El pensamiento Xi Jinping"
 china.273.d: "En 1978, el PCCh abandonó la línea de lucha de clases de Mao como principio rector y se centró en el desarrollo económico según Deng. En un abrir y cerrar de ojos, el desarrollo de China ha logrado logros milagrosos, pero al mismo tiempo, su lado oscuro se ha vuelto cada vez más evidente. Para resolver estos problemas, no se pueden buscar respuestas en las obras de Marx, Lenin o Mao Zedong, sino que hay que buscar la verdad en la práctica. El Pensamiento Xi Jinping sobre el Socialismo con Características Chinas para una Nueva Era es precisamente la respuesta que el Partido ha dado al pueblo chino en el siglo XXI.\n\nEl pensamiento Xi Jinping, tal como lo define el principal teórico del PCCh, Wang Huning, no es una predicción sobre el futuro socialista, sino más bien un resumen de la experiencia de los últimos cuarenta años de reforma y apertura. Enfatiza que un partido gobernante omnipresente, es decir, el PCCh, debe liderar todos los aspectos de la sociedad, y que el estricto mecanismo de promoción del Partido y las campañas anticorrupción ininterrumpidas garantizarán la pureza ideológica de la vanguardia. Además, para cerrar la brecha ideológica dentro del país, el pensamiento adopta los lemas de \"Prosperidad común\", \"Sueño chino\" y \"Rejuvenecimiento nacional\", que responden al creciente orgullo nacional y a la demanda de justicia social en China. A medida que la posición de Xi se estabiliza cada vez más, el pensamiento Xi Jinping continuará guiando a China en un futuro previsible."
 china.273.a: "¡Viva Xi!"
 china.274.t: "Base naval camboyana establecida"
 china.274.d: "Recientemente, la cooperación militar de China con su aliado camboyano ha dado un nuevo paso adelante con la finalización de la Base Naval de Phnom Penh. Situada a 35 kilómetros al sur de la capital de Camboya, Phnom Penh, en el lado occidental del estuario del río Mekong, la base ocupa aproximadamente 4,6 kilómetros cuadrados. Cuenta con un gran puerto de aguas profundas capaz de alojar grandes buques de superficie, incluidos portaaviones, así como diversos buques auxiliares.\n\nLa finalización de la Base Naval de Phnom Penh establece un sólido centro logístico para la Armada china en el Sudeste Asiático, mejorando significativamente su capacidad operativa sostenida en aguas lejanas. Además, la base está preparada para contrarrestar eficazmente las actividades militares de países como Japón, Australia e India en el mar de la China Meridional. Proporciona apoyo estratégico a la Flota del Mar del Sur de China mientras ejerce presión sobre la proyección militar y las líneas de suministro de la Organización del Tratado de Defensa del Pacífico."
 china.274.a: "¡Excelente!"
 china.275.t: "Comienza la campaña anticonsumista"
 china.275.d: "Camaradas:\n\nHoy nos encontramos en una encrucijada histórica. No basta con considerar cómo desarrollar nuestra economía; también debemos reconocer que el consumismo, como forma de invasión cultural capitalista, está erosionando de manera constante los mismos cimientos de nuestro sistema.\n\nDesde un punto de vista económico, la esencia del consumismo es el consumo ciego impulsado por deseos infinitamente inflados. Este modelo conduce al desperdicio de los recursos nacionales, distorsiona las estructuras económicas, debilita la base de la economía real y da lugar a una falsa prosperidad. Políticamente, los países capitalistas promueven la cultura del consumo en un intento de seducir a nuestra juventud con las ilusiones del materialismo. Eslóganes como \"libertad individual\" y \"disfrute material\" se utilizan para adormecer el espíritu combativo de nuestra generación más joven, despojándola de conciencia, preocupación por la nación y amor por la patria. Se está formando una generación obsesionada con placeres efímeros, apática ante el futuro de su país.\n\nCamaradas, sólo hay un camino a seguir: atacar de manera decisiva, enérgica y profunda la expansión del consumismo.\n\nDebemos fortalecer nuestra economía real, aumentar la inversión en la industria manufacturera y la agricultura, suprimir firmemente la importación de bienes de lujo y contener la propagación de la extravagancia. El Estado debe apretar el control sobre el capital financiero, garantizar que la riqueza fluya hacia las amplias masas del pueblo, salvaguardar la equidad social y reducir la brecha entre ricos y pobres. Debemos combatir resueltamente todas las formas de especulación y riqueza no merecida. En el ámbito cultural, debemos enarbolar la bandera de la civilización espiritual, llevar a cabo una educación masiva anti-consumista, criticar la cultura decadente del capitalismo y enseñar a nuestra juventud a mantener el espíritu de la austeridad, la diligencia y la lucha ardua, eliminando los estilos de vida extravagantes y ostentosos.\n\nFinalmente, el Partido y el Gobierno deben predicar con el ejemplo. Debemos fortalecer la disciplina, aplicar normas estrictas para los miembros y cuadros del Partido, e investigar y castigar con firmeza todos los actos de corrupción y despilfarro. Sólo así podremos purificar nuestras filas, limpiar nuestro pensamiento y fortalecer los cimientos revolucionarios sobre los que se sostiene nuestra nación."
 china.275.a: "Aplausos atronadores."
 china.276.t: "Sin usar"

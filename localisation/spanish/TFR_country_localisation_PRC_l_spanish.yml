 PRCref_description_tt: "Liberalizar un Estado con más de 5.000 años de autoritarismo no será tarea fácil. A lo largo de la historia, China ha sido un Estado centralizado y jerárquico, con escasa comprensión de conceptos liberales como la \"privacidad\", los \"derechos individuales\" o los \"controles y contrapesos\". Por lo tanto, transformar la anticuada burocracia política china en una democracia moderna será un enorme desafío. No solo requerirá el apoyo del Partido, sino también la reducción de la estabilidad política y económica que conlleva la liberalización.\n\nNuestra £GFX_approval_rating_texticon  §Ytasa de aprobación§! actual es §Y[?PRC_approval_rating_var|1%]§! (£stability_texticon [?PRC_approval_rating_dynamic_var|=+1%] £political_power_texticon [?PRC_approval_rating_dynamic_var|=+1%])"

 PRC_display_MSS_support_loc: "\n\nSatisfacción del MSE con los tecnócratas: \n£PRC_science_MSS_texticon  [?PRC_display_MSS_support_rate|Y1%] (£political_power_texticon  [?PRC_opinion_of_MSS_faction_political_power_gain|=+1%], £development ) [?PRC_opinion_of_MSS_faction_military_development_monthly|=+1%], £PRC_science_MSS_bop_texticon  [?PRC_opinion_of_MSS_faction_power_balance_weekly|Y1%]) \n • Si supera el 50%, afectará al equilibrio de poder. \n • Proporciona desarrollo militar. \n • Es mejor mantener el valor por encima de 30, porque esta facción puede \"bloquear\" las opciones opuestas de la otra facción en las decisiones."
 PRC_display_scientists_faction_support_loc: "\n\nLealtad tecnócrata: \n£PRC_science_technocrats_texticon  [?PRC_display_scientists_faction_support_rate|Y1%] (£political_power_texticon  [?PRC_opinion_of_scientists_faction_political_power_gain|=+1%], £development ) [?PRC_opinion_of_scientists_faction_academic_development_monthly|=+1%], £PRC_science_technocrats_bop_texticon  [?PRC_opinion_of_scientists_faction_power_balance_weekly|Y1%])\n • Similar a la facción MSE, pero proporciona desarrollo académico.\n • No se debe permitir que los niveles de opinión de ambas facciones bajen demasiado, ya que esto podría desencadenar decisiones que apliquen penalizaciones."

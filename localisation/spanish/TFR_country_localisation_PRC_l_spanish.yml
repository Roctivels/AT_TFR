 PRC_chinese_triumphalism: "Triunfo chino"
 PRC_chinese_triumphalism_desc: "El espíritu heroico se extendió por los antiguos ríos y montañas, y la caballería de hierro y las espadas doradas crearon gloria. El océano no es un lugar como el agua, la mente es vasta e ilimitada, la bandera ondea en alto. El paisaje es pintoresco, las montañas están desiertas y sólo la creciente esperanza de la gente por una vida mejor es difícil de satisfacer. El sueño de construir un país fuerte está lejos de terminar. Seguimos en el camino, nuestros pasos no se detendrán y nuestro corazón estará más decidido. Si queremos ver la gloria del mañana, primero debemos hacer que esta tierra esté bien alimentada y cálida, y hacer que los bárbaros se sometan a nosotros y que la gente sea leal a nosotros, solo entonces podremos ser verdaderamente valientes en todas las direcciones.\n\nDebemos trabajar más duro para ser dignos del deseo y la gloria de esta tierra."

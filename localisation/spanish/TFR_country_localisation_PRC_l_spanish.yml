 china.103.t: "Fin de los partidos consultivos"
 china.103.d: "Según un anuncio urgente del Gobierno central, en respuesta a la compleja situación nacional e internacional, se ha decidido una reforma integral del actual sistema de partidos para salvaguardar la seguridad nacional y la estabilidad social. El anuncio establece que los ocho partidos consultivos suspenderán sus funciones y que sus funciones y actividades de organización social se trasladarán a un nuevo marco de gestión.\n\nEl anuncio declara: \"El sistema de partidos consultivos ha cumplido su misión histórica\". Las sedes de los partidos consultivos han sido ocupadas por fuerzas militares y policiales, y el Departamento de Trabajo del Frente Unido supervisará la reubicación de sus antiguos miembros. Se ha solicitado la cooperación de algunos líderes del partido en las investigaciones.\n\nTras el anuncio, el ejército actuó con rapidez, clausurando las oficinas de los partidos consultivos en todo el país. Esto marca una transformación significativa en el sistema político desde la fundación de la República Popular China, con un visible fortalecimiento de la influencia del ejército en la toma de decisiones. Los analistas sugieren que esta medida de la facción de línea dura del ejército podría estar relacionada con cambios en la política exterior."
 china.103.a: "¡Que el Partido Comunista perdure para siempre!"
 china.104.t: "Auge del sistema multipartidista"
 china.104.d: "El Comité Central ha emitido las \"Decisiones Clave sobre el Fortalecimiento de los Partidos Consultivos\", anunciando la restauración y mejora de las funciones de los ocho partidos consultivos. La decisión enfatiza la consecución de \"un Frente Unido Patriótico más amplio\". Posteriormente, la Oficina de la Comisión Militar emitió directrices complementarias que requieren la plena cooperación de los departamentos en todos los niveles.\n\n Las \"Decisiones\" enumeran 6 nuevas funciones cruciales para los partidos consultivos, incluyendo la participación en la formulación de políticas importantes, recomendaciones para nombramientos de personal y supervisión especializada. Mientras tanto, el Departamento de Trabajo del Frente Unido establecerá un grupo de trabajo dedicado a la formación y orientación de cuadros. El ejército ha expresado su total apoyo a este ajuste, enviando representantes militares a las oficinas de los partidos consultivos para asistir en las operaciones.\n\n Cabe destacar que los nombramientos de personal y las decisiones importantes de los partidos consultivos estarán estrictamente supervisados por el recién establecido \"Grupo de Liderazgo del Trabajo del Frente Unido Patriótico\", con estructuras organizativas que serán reestructuradas. Los partidos informarán regularmente al Comité Central y recibirán orientación militar. Fuentes informadas revelan que las transiciones de liderazgo dentro de todos los partidos consultivos han sido completadas, con nuevos líderes que poseen antecedentes militares más sólidos."
 china.104.a: "Un nuevo tipo de democracia."
 china.105.t: "Proclamación del Imperio Popular Chino"
 china.105.d: "El Gobierno de la República Popular China anuncia oficialmente el cambio de nombre a \"Imperio Popular Chino\". Este cambio busca enfatizar la nueva posición del país en el ámbito internacional y entrará en vigor el primer día del mes siguiente.\n\nAdemás del cambio de nombre, parece que el sistema político chino se está acercando al de la antigua China, con la reintroducción de los nombres de antiguos funcionarios chinos. Fuentes fidedignas indican que el Gobierno del Imperio Popular parece estar preparándose para redefinir su historia desde 1949 con un estilo que evoca la antigua China, con la concesión póstuma a Mao Zedong de un título honorario imperial.\n\nChina ya ha emitido un \"Edicto Imperial de Cambio de Nombre\" a varias organizaciones internacionales, y diversos tratados internacionales, pasaportes personales y documentos relacionados se actualizarán gradualmente. Algunos países u organizaciones han expresado gran preocupación por esto, y algunos incluso han pedido a China que aclare más su intención de cambiar su nombre, pero el Gobierno del Imperio Popular se ha limitado a responder: \"La soberanía no es algo que los extranjeros puedan cuestionar\"."
 china.105.a: "El dragón resurgirá..."
 china.106.t: "@PresidenteWang"
 china.106.d: "\"¿Hablas en serio?\" Li Qian se quitó sus audífonos y miró a la pantalla de su ordenador y posteriormente a su compañero de cuarto con los ojos abiertos de par en par. Desde su primer día en la universidad, había considerado a Ma Hai como una persona frívola y fanfarrona, pero lo que dijo dejó temblando a Li, haciéndole creer que estaba alucinando tras haberse pasado toda la noche jugando videojuegos.\n\n\"¡No estoy de broma! Mira, todo el mundo está hablando de eso en internet. Nuestro presidente, Wang Yang, se ha creado una cuenta de Weibo. ¡Definitivamente no se trata de un montaje de alta calidad o IA!\" Ma Hai se levantó, con sus ojos tan enrojecidos como entusiasmados. \"¡Todos están perdiendo la cabeza! ¡Míralo tú mismo!\"\n\nEscéptico, Li Qian abrió la por mucho tiempo ignorada aplicación de Weibo y, estaba seguro, había una foto de perfil seria y la biografía empezaba con: \"Wang Yang, nacido en 1955, presidente del Estado, un bolchevique\". Todas las dudas que tenía Li se disiparon.\n\n\"¡Es una locura! Un líder chino metiéndose en el mundo de las redes sociales!\" La familia de Ma tenía muchos miembros que formaron parte de los movimientos estudiantiles de los 80, lo que hacía que simpatizara con estas acciones liberales de forma natural. Pero para entonces, Li había dejado de escucharle. Estaba claro que la cuenta de Wang se acababa de crear, y solo había una única publicación. No obstante, el número de comentarios, me gusta y de compartir ya habían llegado hasta los cientos de miles.\n\nLi observó todos los comentarios. La ausencia de comentarios controlados fue más sorprendente que Wang se crease una cuenta de Weibo. Había de todo, saludos amistosos, elogios, preguntas sensibles y provocadoras, y críticas furiosas. Cada comentario se sentía real y orgánico, haciendo un fuerte contraste con la altamente moderada y dominada por IA sección de comentarios del pasado.\n\nA pesar de que Li jamás había tenido una fuerte inclinación política y que a menudo evitaba tocar temas sensibles, esta vez sintió algo inusual en el pecho, encendiendo una fuerte curiosidad acerca de la revelación de una nueva era de la que era testigo. Lentamente arrastró su ratón, movió el cursor, y dio clic en -"
 china.106.a: "Seguidores +1"
 china.107.t: "Congreso de Emergencia del Partido"
 china.107.d: "Tras un largo periodo de inestabilidad y un vacío político, la Comisión Militar Central anunció que el orden nacional ha sido restaurado inicialmente. El Ejército Popular de Liberación, habiendo cumplido su misión histórica de estabilizar la situación interna, transfirió formalmente el poder político de vuelta al Partido y propuso convocar un Congreso de Emergencia del Partido para determinar un nuevo liderazgo central.\n\nLa decisión ha recibido un amplio apoyo por parte de los distritos militares y los Gobiernos regionales, simbolizando la transición de vuelta a una gobernanza política normal. Un portavoz del Ministerio de Defensa declaró: \"El deber del ejército es proteger a su pueblo, no gobernarlo. Ahora es el momento de que los líderes políticos tomen el timón\".\n\nLos delegados se reunieron en Pekín mientras el Congreso se inauguraba en un ambiente de urgencia y orden. Tras las consultas iniciales, surgieron dos candidatos con amplio apoyo del Partido y del ejército: Chen Wenqing y Chen Quanguo.\n\nLos delegados están a punto de votar para decidir quién liderará la nación para salir de la crisis y avanzar hacia el futuro."
 china.107.a: "¡El MSE impulsa a Chen Wenqing hacia la victoria!"
 china.108.t: "Li Zuocheng es nombrado secretario general del PCCh"
 china.108.d: "Tras la declaración del estado de emergencia nacional, la Comisión Militar Central emitió una orden nombrando al general Li Zuocheng, exjefe del Departamento de Estado Mayor Conjunto, como secretario general del Comité Central del Partido Comunista de China. Sin embargo, a diferencia de los procedimientos tradicionales del Congreso del Partido, este cambio de liderazgo fue dirigido directamente por el ejército, marcando la primera vez desde la era de Mao que un alto oficial militar, en lugar de un cuadro del Partido, asume la posición más alta de liderazgo.\n\nLi Zuocheng, nacido en 1953, ha ocupado durante mucho tiempo puestos clave en el Ejército y en el Departamento de Estado Mayor Conjunto, siendo conocido por su estilo de liderazgo militar pragmático y firme. A nivel nacional, es considerado un firme defensor de la estabilidad y la unidad nacional; internacionalmente, algunos analistas ven su ascenso como \"un símbolo del auge del nacionalismo militar chino\".\n\nEn un discurso emitido a nivel nacional, Li Zuocheng se comprometió a \"restaurar el estatus internacional de China, corregir errores históricos y garantizar la unidad y seguridad nacional\". Subrayó que el nuevo liderazgo aseguraría los intereses nacionales con estrategias decisivas y claras y que \"impulsaría la tarea histórica de la reunificación completa de la patria\".\n\nA medida que el Ejército Popular de Liberación entraba en plena movilización, la situación en el estrecho de Taiwán se convirtió en un foco global. Se espera ampliamente que una China dominada por fuertes tendencias nacionalistas y liderazgo militar busque una resolución definitiva a la guerra civil largamente inconclusa."
 china.108.a: "Una nueva era de reconstrucción nacional militar ha comenzado."
 china.109.t: "Chen Wenqing es electo secretario general del PCCh"
 china.109.d: "El último Congreso del Partido terminó con una atmósfera tensa y sombría, con Chen Wenqing elegido oficialmente como secretario general del Comité Central del Partido Comunista de China.\n\nChen Wenqing, nacido en Sichuan en 1960, ha sido Secretario de la Comisión Central de Asuntos Políticos y Legales desde 2022, y ha trabajado durante décadas en los sistemas de seguridad nacional, judicial y asuntos del Partido. Es bien conocido dentro del Partido como el \"guardián del sistema de seguridad\" por su visión sobre la seguridad nacional y su postura firme contra el espionaje y la subversión, habiendo liderado múltiples campañas dirigidas contra las \"fuerzas de infiltración extranjeras\".\n\nDurante su discurso tras ser elegido, Chen Wenqing prometió \"salvaguardar firmemente la soberanía y seguridad nacional, promover la reunificación nacional y garantizar la estabilidad social a largo plazo\". Subrayó que China continuará fortaleciendo la gobernanza social en la nueva era y se comprometió a \"profundizar la estrategia de seguridad nacional para asegurar el bienestar del pueblo\".\n\nLos medios de comunicación chinos principales describieron la elección de Chen como el inicio \"de una nueva fase de seguridad y orden en la gobernanza nacional\", elogiando su estilo de liderazgo decisivo. Sin embargo, algunos observadores internacionales temen que su postura de línea dura en seguridad pueda indicar un rumbo más firme e incluso confrontacional en el control interno y las relaciones exteriores futuras de China."
 china.109.a: "Una nueva era centrada en la seguridad y la estabilidad ha comenzado."
 china.110.t: "Chen Quanguo es electo secretario general del PCCh"
 china.110.d: "El último Congreso del Partido terminó entre clamores y tensión, con Chen Quanguo elegido oficialmente secretario general del Comité Central del Partido Comunista de China.\n\nChen Quanguo, nacido en 1955 en la provincia de Henan, fue anteriormente Secretario del Partido tanto en el Tíbet como en la Región Autónoma Uigur de Sinkiang. Durante su mandato en Sinkiang, se hizo conocido por sus estrictas políticas de seguridad pública y control social, implementando medidas de estabilidad de alta presión. A nivel nacional, algunos lo alabaron como una \"mano dura que mantiene el orden\", mientras que a nivel internacional, sus políticas generaron una amplia controversia. Chen es conocido por su fuerte capacidad de ejecución y postura política firme dentro del partido, y cuenta con un sólido apoyo de los sectores más duros en los sistemas de seguridad y militares.\n\nEn su discurso tras ser elegido, Chen Quanguo se comprometió a \"garantizar la unidad nacional, restaurar el orden social y liderar a la nación china en el cumplimiento de su misión histórica\". Subrayó que la nueva era de China continuará priorizando la estabilidad, profundizando las reformas en la gobernanza social, y prometió \"seguir avanzando hacia la reunificación total de la patria\".\n\nAunque las reacciones extranjeras son mixtas. Los medios chinos describieron la elección de Chen como \"un hito importante para el retorno del país al orden y a los ideales\", afirmando que su liderazgo \"sacará al pueblo del caos\". Sin embargo, los analistas internacionales temen que un líder conocido por su enfoque duro en la seguridad pública y el control ideológico que asciende al poder supremo pueda señalar un camino más firme, incluso más duro, en la gobernanza interna y la política exterior de China."
 china.110.a: "Puede que esté llegando una era que prioriza la estabilidad y un gobierno fuerte."
 china.112.t: "Finalización de la megaciudad del río de las Perlas"
 china.112.d: "Zhao Zongming estaba sentado detrás de su escritorio, un discurso que había sido revisado innumerables veces yacía tranquilamente bajo el suave resplandor de la lámpara de escritorio. \n\n\"En este momento, estamos al borde de un nuevo comienzo en la historia de la humanidad...\"\n\nEsta frase inicial había consumido sus pensamientos durante toda la noche. Esas pocas palabras llevaban el peso de enormes expectativas y responsabilidades. Se levantó y caminó hacia la ventana de suelo a techo. A lo lejos, el río de las Perlas fluía como una cinta plateada. Al este se encontraban Shenzhen y Dongguan; al oeste, Foshan y Jiangmen; al sur, Zhuhai y Zhongshan... Nueve ciudades, interconectadas y entrelazadas, formando un colosal conglomerado metropolitano. Esta megaciudad superaría a Tokio, Nueva York, Londres -superaría cualquier región urbana en este planeta- para convertirse en la mayor y más avanzada área metropolitana en la historia de la humanidad.\n\n\"Al borde...\" Zhao Zongming sintió una punzada de insatisfacción con la frase. Parecía sugerir que simplemente estaban esperando el favor del destino. Pero esta megaciudad no había sido un regalo del destino; se construyó ladrillo a ladrillo, con las manos de millones de trabajadores. No eran espectadores de la historia, eran sus creadores.\n\nZhao volvió a su escritorio, tomó su bolígrafo y, sin dudar, tachó la frase. El bolígrafo se movió con firmeza sobre el papel mientras escribía: \"En este momento, guiamos a la humanidad hacia una nueva era...\""
 china.112.a: "Neochina llega desde el futuro."
 china.113.t: "Finalización de la megaciudad Pekín-Tianjin"
 china.113.d: "Después de que Xie Mingfu cumpliera 88 años, de repente se dio cuenta de que ya no podía recordar cuándo Tianjin y Pekín se habían convertido en una sola ciudad. La revelación le golpeó tan de repente como el recuerdo de haber comprado su primer reloj de bolsillo en la Quinta Avenida de Tianjin en su juventud: sin darse cuenta, había transcurrido sesenta años. Desde la ventana de su antigua casa, el horizonte que antes estaba vacío hacía tiempo que había sido reemplazado por una extensión ininterrumpida de edificios. Estas imponentes construcciones habían crecido silenciosamente en esta tierra ancestral, elevándose hasta ocultar todo el cielo.\n\nXie Mingfu recordaba que hace apenas diez años aún podía ver la silueta del Ojo de Tianjin desde el desván de su vieja casa. Ahora, esa icónica noria era sólo uno más entre los muchos puntos de referencia de esta extensa metrópolis.\n\n\"Ahora el metro conecta Tianjin y Pekín\", solía decir asombrado. Recordaba cuando tenía que soportar un viaje en tren lleno de baches para ir de Tianjin a Pekín. Hoy, cuando su nieto venía de visita, consideraba el trayecto como algo que duraba menos que el tiempo entre el desayuno y la comida. Y justo esta mañana, Xie se sorprendió al descubrir que su viejo reloj de bolsillo había dejado de funcionar. Era la primera vez en sesenta años que no marcaba la hora. Lo sacudió suavemente, escuchando un leve susurro en su interior, pero se negó a volver a ponerse en marcha.\n\nQuizás esto es lo que es el tiempo, pensó. Como la propia ciudad, algunas cosas se desvanecen en silencio, mientras que otras nacen de nuevo. Mirando por la ventana, pudo ver un rayo de luz matutina que se colaba entre los huecos de los rascacielos distantes. Ese haz de luz se extendía a lo largo de la vasta metrópolis, difuminando la frontera entre Tianjin y Pekín.\n\nMientras contemplaba el horizonte lejano, el reloj de bolsillo detenido emitió de repente un leve \"clic\" y sus agujas comenzaron a moverse de nuevo."
 china.113.a: "Hacia el nuevo siglo."
 china.114.t: "Censura digital"
 china.114.d: "Wang Zhiqiang, vestido con un traje de aspecto algo barato, se ajustó la corbata nerviosamente al entrar en la gran empresa. El entrevistador, un hombre de mediana edad con unas gafas de montura dorada, estaba sentado en la oficina, irradiando un aire de autoridad. Sin expresión, hizo un gesto para que Wang Zhiqiang se sentara, luego sacó un grueso montón de documentos de un cajón y los dejó caer sobre la mesa con un fuerte golpe.\n\n\"¿Wang Zhiqiang, verdad?\" La voz del entrevistador era profunda y autoritaria, sin dejar lugar a dudas. \"Hemos realizado una verificación de antecedentes y hemos encontrado información bastante preocupante\".\nEl corazón de Wang se hundió, intuyendo problemas. Tratando de mantener la compostura, preguntó: \"¿Qué tipo de información?\"\n\nEl entrevistador señaló unas capturas de pantalla en los documentos, con un tono helado. \"Has publicado comentarios despectivos sobre nuestro país en internet, usando un lenguaje extremadamente inapropiado. ¿Crees que alguien así es apto para unirse a nuestra empresa?\"\nLa cara de Wang Zhiqiang se puso pálida al instante y tartamudeó: \"Es-esos fueron solo comentarios impulsivos... No-no quise hacer daño...\"\n\n\"¿Impulsivos?\" El entrevistador se burló. \"¿Crees que insultar a la patria es algo trivial? Tus palabras han dañado gravemente la imagen de la nación y han puesto de manifiesto tu falta de responsabilidad social básica. Nuestra empresa no tolera ningún comportamiento que perjudique los intereses nacionales. Por lo tanto, lamento informarte que tu solicitud ha sido rechazada\"."
 china.114.a: "El internet no es un lugar sin ley."
 china.115.t: "No eres un héroe"
 china.115.d: "\"...Recientemente, un portavoz del Ministerio de Defensa Nacional anunció que, según la última enmienda a la Ley de Servicio Militar de la República Popular China, aprobada recientemente por el Comité Permanente de la Asamblea Popular Nacional, el país aumentará la fuerza total de sus fuerzas armadas a cinco millones...\"\nCambiar de canal.\n\"...El Ministerio de Seguridad del Estado ha declarado que, con la creciente conciencia contra el espionaje entre nuestra población, el número de expatriados residentes en nuestro país ha alcanzado un mínimo histórico. Se han logrado avances significativos en el fortalecimiento del marco general de seguridad nacional...\"\nCambiar de canal.\n\"...¡La nación china siempre ha sido excepcional! ¡El pueblo chino es superior a todas las demás razas del mundo! ¡Es nuestro deber erradicar a todos los imperialistas de la región Asia-Pacífico! ¡Tenemos el poder de aniquilar completamente a todos los criminales del pasado!...\"\nCambiar de canal, cambiar de canal, cambiar de canal.\n\nComo ciudad fronteriza, Xiamen sigue envuelta en la sombra persistente de la guerra. La vitalidad de la ciudad se ha agotado, y por todas partes se ven memoriales improvisados para las víctimas inocentes, construidos con ladrillos rotos y escombros. Bajo una atmósfera de solemnidad y desesperación, la gente, como cangrejos ermitaños, se esconde en sus pequeños hogares, tragándose en silencio los cambios que se les imponen.\nEntre filas de apartamentos idénticos, en un dormitorio tenuemente iluminado donde la pantalla del televisor es la única fuente de luz -incluso durante el día-, un anciano con el cabello encanecido está sentado en una silla de ruedas, cambiando constantemente de canal. Sus manos tiemblan y sus ojos nublados están ocultos tras unas gafas de sol oscuras, como si temiera enfrentar directamente al mundo. La luz tenue dibuja un contorno difuso de su rostro, evocando una sensación de familiaridad vaga.\nCon un repentino \"crack\", el televisor se queda en silencio. La pantalla LCD se rompe como copos de nieve, esparciéndose por el suelo. El mando a distancia chamuscado yace silencioso entre los componentes chisporroteantes. El anciano se reclina profundamente en su silla de ruedas, sus manos venosas se aferran con fuerza a su rostro. Los sollozos que escapan de sus dedos reemplazan el ruido del televisor, convirtiéndose en el único sonido en la habitación. Si un observador con oído agudo estuviera presente, podría captar una frase débil entre los sollozos incesantes:\n\"Todo es culpa mía... Si tan solo hubiera podido hacerlo mejor...\""
 china.115.a: "Es un final."

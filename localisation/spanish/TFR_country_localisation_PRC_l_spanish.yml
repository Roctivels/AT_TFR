 china.491.t: "Diario de Ma Yilong: Amistad revolucionaria"
 china.491.d: "Esta noche, la luna brilla intensamente a lo largo de la costa de California. Cómo desearía que pudieras verla.\n\nEl comisario Thomas Blackhawk y yo compartimos una ración militar sencilla - bueno, \"compartir\" quizá sea una palabra demasiado fuerte. En realidad, éramos dos hombres cerca de los cincuenta, agachados detrás de un vehículo blindado, masticando galletas compactas al fresco de la brisa marina y la luz de la luna. Él parecía sumido en sus pensamientos, y entendía por qué: liderar una unidad con una gama tan amplia de ideas no es tarea fácil.\n\nDesde el campamento lejano, los soldados se reunían alrededor de una hoguera, cantando la Internacional. Era fascinante escuchar las versiones en chino e inglés alternándose, a veces intercaladas con versos en español o ruso. Thomas me confesó que lo que más le preocupaba era la cohesión de la unidad. Algunos sueñan con fundar una comuna anarquista, otros aspiran a una socialdemocracia parlamentaria, y algunos incluso colgaron un retrato de Maupin en el vehículo blindado. \"¿Cómo lidero a un grupo así?\" preguntó. Al mirar hacia la hoguera, vi a Liu Xiaoyu enseñando a un joven -que llevaba una insignia de Makhno- cómo decir \"camarada\" en chino. Lo que el joven respondió claramente les hizo gracia a ambos, y estallaron en risas.\n\nIntenté tranquilizar a Thomas, pero él simplemente contemplaba en silencio las olas lejanas. Sabía lo que tenía en mente: siendo nativo americano, entiende mejor que nadie la tensión entre unidad y diversidad.\n\nMañana seguiremos hacia el norte, así que necesito descansar un poco. Pero justo cuando cerré mi diario, aún podía oír fragmentos de la canción que llegaban desde lejos:"
 china.491.a: "Arriba, parias de la tierra..."
 china.492.t: "Diario de Ma Yilong: Ataque enemigo"
 china.492.d: "Aquí en el norte de California está nublado, o quizás sea solo algún lugar maldito.\n\nMis manos siguen temblando. La sangre de Andy Chen se ha secado en mi ropa, dejando una mancha marrón oscura. Solo tenía veintitrés años, toda su vida por delante, y de repente se desplomó frente a mí. Recordar la primera vez que lo vi me dan ganas de darme una bofetada. En aquel entonces, atendía a un miliciano herido con tanto cuidado, como si manejara algo frágil. Recuerdo que puse los ojos en blanco y murmuré a alguien cercano: \"Míralo, se comporta como una chica\".\n\nEl asalto de esta mañana llegó sin aviso. Cuando empezaron a volar las balas del francotirador, él fue el primero en localizar al tirador. Nunca olvidaré esa mirada que me lanzó. No había ni rastro de la \"debilidad\" por la que solíamos burlarnos de él, solo una determinación inquebrantable.\n\n\"Déjame ir, camarada Ma\" dijo, con voz baja pero clara. \"Soy el más pequeño; será más difícil darme\".\n\nEsas fueron sus últimas palabras completas. Intenté protestar, pero ya estaba corriendo. Su figura delgada zigzagueaba entre la lluvia de balas. Consiguió atraer el fuego enemigo, dándonos la oportunidad de contraatacar. Pero el precio... fue su vida, desvaneciéndose con la espuma ensangrentada en su garganta.\n\nAhora el campamento está en silencio, pero no puedo dormir. Sigo viéndolo caer. Era tan joven, apenas mayor que mi hermano pequeño. Podría haber elegido un camino más seguro, lejos de esta guerra, pero decidió luchar por la revolución, entregando su vida para protegerme a mí, un oficial extranjero que una vez lo menospreció.\n\nRecogí lo que dejó atrás: un colgante con un crucifijo, un manual médico lleno de sus notas manuscritas y una foto suya con otra miliciana. En el reverso de la foto pone: \"Eres mi amor, para siempre\".\n\nAmanece, pero no he dormido nada. Se fue demasiado pronto, llevándose consigo la disculpa que nunca podré decirle cara a cara."
 china.492.a: "Adiós"
 china.493.t: "Imperio en llamas"
 china.493.d: "El viento salado del Pacífico barría la escena, y el rugido del humo y las llamas iluminaba el Puente Golden Gate al atardecer, tiñéndolo de un profundo carmesí. Toda la bahía parecía bañada en sangre. En el punto más alto del puente, una enorme bandera de las Estrellas y las Barras ondeaba obstinadamente al viento, oscurecida por el fuego de artillería y el polvo. Su superficie estaba desgarrada, con innumerables agujeros y grietas, reflejando el puente lleno de balas. Dos valientes soldados del Ejército Popular de Liberación Americano escalaban los cables hacia la cima, animados por sus camaradas abajo, que les gritaban que se dieran prisa.\n\nEn un acantilado a varios cientos de metros del puente, el comandante del ejército voluntario chino, Ma Yilong, observaba en silencio la escena desde abajo. Escuchó el susurro de pasos mientras el comisario Chen Hao subía lentamente por el camino rocoso. Los dos hombres permanecieron en silencio durante unos diez minutos hasta que dos soldados del EPLA lograron alcanzar la cima del puente.\n\n\"Camarada, ¿qué estás mirando?\" no pudo evitar preguntar Chen.\n\nMa señaló hacia el puente lejano. Chen se acercó y vio a los dos soldados del EPLA usando herramientas para cortar el mástil de la bandera. La tarea era lenta, dificultada por el fuerte viento.\n\n\"Mira a estos americanos\" dijo Ma. \"Son honestos, valientes y siempre muestran coraje cuando importa. No son diferentes de los puritanos que cruzaron el Atlántico, de los revolucionarios que protestaron contra los productos británicos en el puerto de Boston, ni de los yanquis que lucharon en la playa de Normandía con su chicle y chocolate. Pero ahora, son estas mismas personas las que están sentenciando a muerte el legado de sus antepasados\".\n\nPara entonces, los dos soldados del EPLA habían terminado su tarea. Agarraron las esquinas de las desgarradas Estrellas y Barras y la lanzaron con todas sus fuerzas, haciendo que la bandera cayera rodando al mar naranja de abajo. Un vítores más fuerte estalló desde el puente, y las cámaras dispararon al unísono.\n\n\"... Esto fue una vez una gran nación: vastas tierras, dominio sobre los mares, ciudades llenas de riqueza. En sus momentos más oscuros, mostró más coraje que los mayores imperios. Sin embargo, no pudo escapar a la extinción. Piensa en el pasado: Holanda, Francia, España e Inglaterra. ¿Cuál de ellas pudo evitar el mismo destino?\""
 china.493.a: "«Temo que algún día alguien pueda hacer lo mismo con mi país»."
 china.494.t: "Momento Sputnik"
 china.494.d: "\"Deepseek\", una empresa tecnológica con sede en Hangzhou, provincia de Zhejiang, China, ha causado revuelo en los ámbitos tecnológico y económico con el lanzamiento de su nuevo modelo de lenguaje grande impulsado por IA. Este modelo de código abierto ha superado las expectativas en rendimiento computacional, especialmente en matemáticas, programación y razonamiento en lenguaje natural. En estas áreas, rivaliza con modelos de IA reconocidos como ChatGPT. Aún más sorprendente es el coste: sólo alrededor de 5 millones de dólares, según el fundador y presidente de la empresa, Liang Wenfeng.\n\nLa noticia se difundió rápidamente más allá del campo tecnológico, provocando un frenesí mediático y un debate político. Poco después, uno de los líderes de más alto rango de China -el primer ministro- se reunió con Liang e le invitó a contribuir al informe de trabajo del gobierno en una reunión del Consejo de Estado. Mientras tanto, en Occidente, muchos observan con ansiedad este logro tecnológico de un país socialista, recordando el lanzamiento del primer satélite artificial por la Unión Soviética en 1957. Algunos científicos y políticos occidentales de alto nivel argumentan que, dado que el trabajo de Deepseek es de código abierto y está disponible públicamente, beneficiará a todos y fomentará la innovación dentro de la industria de la IA. Sin embargo, otros sugieren que los logros de China pueden no haber resultado de una \"competencia justa\" y que el régimen de censura de este país podría limitar la capacidad de la IA para pensar de forma independiente y entrar en el mercado global."
 china.494.a: "La fabricación de papel, la brújula, la pólvora, ¿y ahora, la inteligencia artificial?"
 china.495.t: "La máquina que gobierna"
 china.495.d: "La sala de juntas de Tencent estaba en silencio. Los ejecutivos del Partido se sentaron mientras observaban cómo se desarrollaba la presentación. Los números hablaban por sí mismos. El dominio de DeepSeek sobre la IA occidental, junto con las ganancias de eficiencia en la gobernanza automatizada, significaban la lenta obsolescencia de la supervisión mundana. China ya no necesitaba ponerse al día. Estaba marcando el estándar.\n\nEl presentador, un hombre delgado con un traje negro impecable, avanzaba por sus diapositivas mientras hablaba. \"Los modelos de planificación urbana predicen los cambios económicos antes de que ocurran. La asignación automatizada de recursos reduce el desperdicio a casi cero. Para reducir los costes laborales y mantener la eficiencia del aprendizaje a largo plazo, necesitamos un sistema capaz de optimizar las tareas mundanas y la logística en todos los niveles, desde los ayuntamientos locales hasta los ministerios más altos. Necesitamos una herramienta que nos guíe hacia un futuro donde podamos desarrollar un liderazgo inteligente para el Partido.\"\n\nUn tecnócrata se inclinó hacia adelante. \"Esto es más que una ayuda. Estás sugiriendo algo que va más allá de un puesto asesor, prácticamente gobierna por sí mismo.\"\n\nEl presentador asintió. \"Sí, señor.\"\n\nUn pesado silencio llenó la sala. Nadie habló, pero tampoco lo descartó.\n\nEl presentador continuó: \"Los fracasos de la administración humana -corrupción, ineficiencia, mala gestión-, el fracaso de nuestra misión para liberar Taiwán, los han dejado todos bien documentados. Si un sistema pudiera corregirlos, ¿por qué deberían los hombres interponerse en su camino?\"\n\nEl presentador hizo clic en la diapositiva final. Dos caracteres simples aparecieron en la pantalla. El futuro del desarrollo de China, lo llamaban:"
 china.495.a: "La Gran Marcha - Inteligencia General China."
 china.496.t: "Detectados múltiples lanzamientos nucleares desde India"
 china.496.d: "Nuestro sistema de alerta temprana detectó por primera vez señales de misiles originadas en India en las primeras horas de la mañana. La confirmación conjunta de nuestros satélites de alerta y las estaciones de radar terrestres indica múltiples misiles balísticos de medio alcance con ojivas nucleares.\n\nSe ha confirmado que la primera oleada, que suma un total de 11 misiles nucleares, ya ha cruzado el Himalaya. Según el análisis de la trayectoria, estos misiles están dirigidos a ciudades a lo largo de nuestra frontera suroeste. Se informa que estos misiles emplean vehículos de reentrada múltiples e independientes, lo que les permite evadir la intercepción. Se espera que alcancen sus objetivos designados en un plazo de 25 a 40 minutos. Las ciudades objetivo son áreas densamente pobladas y centros industriales clave.\n\nAdemás, la vigilancia militar por satélite ha detectado preparativos para una segunda oleada de lanzamientos de misiles dentro de India. La inteligencia sugiere que este lote de misiles podría portar ojivas de mayor rendimiento, con un alcance capaz de alcanzar las regiones centrales y noroeste de nuestro país.\n\nLa situación ha alcanzado su punto más crítico. Esto constituye el primer ataque nuclear a gran escala en la historia de la humanidad desde 1945. Si estos misiles logran penetrar nuestras defensas con éxito, las consecuencias catastróficas serán sin precedentes."
 china.496.a: "¡Destrúyelos!"
 china.497.t: "Aniquilación nuclear sino-india"
 china.497.d: "A medida que se intensificaban las hostilidades entre China e India, el gobierno indio, con el objetivo de cambiar el equilibrio del conflicto y obtener una ventaja estratégica, desplegó armas nucleares contra múltiples ubicaciones dentro de China. Las imágenes satelitales indican que varias ciudades interiores chinas, junto con partes del Tíbet y Sinkiang, han sido objeto de ataques nucleares, lo que llevó a China a lanzar un contraataque nuclear estratégico.\n\nActualmente, los principales núcleos urbanos de India, incluida la región capital de Delhi, han sufrido golpes devastadores. Más del 80 % de las ciudades de India están experimentando un fallo total de las redes eléctricas, las comunicaciones, las principales rutas de transporte y los sistemas administrativos. Las grandes ciudades de toda India continúan ardiendo, lo que provoca que un gran número de refugiados huyan hacia las zonas costeras del sur. Los sistemas de monitoreo de radiación nuclear muestran que los niveles de radiación en la mayor parte de India han alcanzado niveles letales, y los expertos predicen que este impacto catastrófico persistirá durante décadas."
 china.497.a: "Terrible."
 china.498.t: "Resultado"
 china.498.d: "Informe de batalla del T.C. Occidental del EPL\n1. Actualización de la situación\nTras el ataque nuclear del Ejército Indio en nuestra región fronteriza occidental, nuestras fuerzas lanzaron inmediatamente un contraataque estratégico, desmantelando eficazmente el núcleo de la infraestructura militar de la India y completando nuestras contramedidas estratégicas.\n\n2. Pérdidas enemigas\nMás del 90% de las instalaciones clave del ejército indio -incluidos centros de mando, bases militares y arsenales- han sido destruidas. El sistema de mando de la India está en completo desorden, lo que le impide llevar a cabo operaciones estratégicas. La infraestructura crítica en toda la India ha sufrido daños graves: las redes eléctricas y de comunicación han colapsado, y las zonas centrales de ciudades importantes como Delhi y Mumbai han sido severamente afectadas. Las evaluaciones preliminares indican que las fuerzas activas de la India han sufrido pérdidas severas, haciendo imposible un mando militar efectivo. Actualmente se están evaluando las cifras de bajas civiles.\n\n3. Nuestras pérdidas y respuesta\nVarias de nuestras ciudades fronterizas occidentales y del interior fueron alcanzadas por ataques nucleares, causando distintos grados de destrucción. Se están recopilando las cifras de bajas. Las autoridades locales han declarado medidas de emergencia completas en las regiones afectadas y ya se están llevando a cabo esfuerzos de reconstrucción. El EPL y la Policía Armada Popular han sido desplegados para operaciones de rescate, con equipos médicos realizando labores de socorro a gran escala. Durante este ataque nuclear, nuestra infraestructura de defensa civil desempeñó un papel fundamental.\n\n4. Evaluación estratégica\nEste contraataque estratégico ha destruido eficazmente las capacidades militares centrales de la India, limitando sus ambiciones militares. Nuestras fuerzas permanecerán en máxima alerta para garantizar la seguridad nacional.\n\nTodos los oficiales y soldados del EPL continuarán cumpliendo resueltamente las órdenes de la Comisión Militar Central, protegiendo la seguridad nacional y los intereses del pueblo. Debemos mantenernos vigilantes y preparados para afrontar cualquier amenaza emergente."
 china.498.a: "..."
 china.499.t: "¡Armas nucleares han sido lanzadas contra nuestra ciudad!"
 china.499.d: "Directiva Suprema para el Lanzamiento de un Ataque Nuclear Estratégico contra el Enemigo:\n\nTras una reunión de emergencia del Comité Permanente del Politburó del Comité Central y de acuerdo con los poderes conferidos por la Constitución de la República Popular China, la Comisión Militar Central decide solemnemente llevar a cabo de inmediato un contraataque nuclear estratégico integral contra el enemigo, aplastando resueltamente el chantaje nuclear del enemigo y salvaguardando la soberanía nacional y la vida de nuestro pueblo.\n\nLas unidades de misiles estratégicos de la Fuerza de Misiles seguirán el plan operativo establecido para realizar un ataque extenso contra la totalidad del territorio enemigo. La primera oleada de ataques nucleares se centrará en los centros políticos y militares del enemigo, los núcleos de mando y las bases militares clave, con el objetivo de paralizar el núcleo del sistema de mando enemigo en el menor tiempo posible. Durante toda la operación, la Fuerza de Apoyo Estratégico supervisará los efectos del ataque y proporcionará a la Fuerza de Misiles los datos necesarios para una segunda oleada de ataques que se enfocará en ataques de precisión contra infraestructuras críticas en la profundidad de las áreas estratégicas traseras del enemigo, apuntando a complejos industriales, centros económicos, aeródromos y centros de suministro logístico. Todos los comandos de teatro pasarán al nivel más alto de preparación, manteniendo una vigilancia estricta de todos los movimientos enemigos para maximizar la efectividad de los ataques.\n\nTodos los miembros de las fuerzas armadas deben llevar a cabo esta tarea estratégica de defensa de la soberanía nacional y la seguridad de nuestro pueblo con una resolución inquebrantable y la convicción de una victoria segura."
 china.499.a: "¡Nos vengaremos!"
 china.500.t: "Dragón en el cielo"
 china.500.d: "\"¿Qué quieres decir con «falta un segmento crítico»?\" En la Oficina del Estado Mayor de la Fuerza Aérea del Ministerio de Defensa, el Jefe del Estado Mayor de la Fuerza Aérea de Autodefensa sostenía un informe y cuestionaba a su subordinado con un tono incrédulo. Este general refinado y habitualmente cortés rara vez perdía la paciencia, pero la situación extraordinaria de hoy lo estaba llevando más allá de toda norma.\n\n\"Señor, los parámetros clave para este nuevo modelo fueron registrados en un artículo de 2022 por un ingeniero de Chengdu Aircraft Corporation. Sin embargo, los expertos de nuestro departamento...\"\n\n\"¡No puedo creer que no haya nadie en este edificio que entienda un artículo en chino!\" El Jefe del Estado Mayor estampó el documento sobre su escritorio. \"¡Consigan a alguien que haya estudiado en Taiwán!\"\n\nMientras tanto, al otro lado del mundo, en una instalación subterránea de mando altamente segura en Norteamérica, un general con uniforme azul, adornado con un águila plateada y un rayo en la gorra, examinaba una fotografía. Esta era inteligencia obtenida al costo de uno de los últimos espías estadounidenses en el extranjero. La imagen mostraba una aeronave negra, triangular y elegante, surcando el cielo de Chengdu. La miniatura en la esquina superior derecha revelaba su superficie lisa, su diseño distintivo de tres motores, un enorme compartimento para bombas y los complejos sistemas electrónicos en la parte frontal.\n\n\"Este es el avión con el que nuestra Fuerza Aérea ha estado soñando\", pensó el general, pero luego su mente se dirigió a las ruinas de las fábricas de Lockheed Martin y Boeing, destruidas en la guerra civil. Suspira profundamente.\n\nMientras tanto, en la cafetería de CAC, el Jefe de Diseño, el académico Wang Haifeng, se encontraba sobre un improvisado podio formado por mesas. Frente a la multitud abajo, levantó un vaso de zumo de naranja y gritó: \"¡Camaradas, amigos, hermanos y hermanas! ¡Brindemos por el Partido, por nuestra patria y por nosotros mismos, los heroicos trabajadores de la aviación china!\"\n\n\"¡Salud!\" La respuesta resonó mientras innumerables copas de cristal se alzaban al unísono. Los ingenieros, hombres y mujeres de todas las edades, ya no podían contener su emoción. Wang Haifeng, con una sonrisa y lágrimas en los ojos, los miraba. Sus pensamientos se remontaban a los primeros días del proyecto J-10 y a su mentor, Song Wencong. En ese momento, imaginó a su mentor observando desde arriba, sonriendo al ver la creación de su alumno surcar los cielos de su tierra natal."
 china.500.a: "Ahora es el momento de que los demás nos alcancen."
